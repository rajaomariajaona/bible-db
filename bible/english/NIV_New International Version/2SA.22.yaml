- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The earth trembled and quaked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the foundations of the heavens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Vulgate and Syriac (see also Psalm 18:7) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mountains
    marker-yv: yv-n
  - type: text
    text: ' shook;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they trembled because he was angry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Smoke rose from his nostrils;
- type: usfm
  marker: q2
  children:
  - type: text
    text: consuming fire came from his mouth,
- type: usfm
  marker: q2
  children:
  - type: text
