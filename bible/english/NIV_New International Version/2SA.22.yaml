        text: here symbolizes strength.
    marker-yv: yv-n
  - type: text
    text: ' of my salvation.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is my stronghold, my refuge and my savior—
- type: usfm
  marker: q2
  children:
  - type: text
    text: from violent people you save me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“I called to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who is worthy of praise,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have been saved from my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The waves of death swirled about me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the torrents of destruction overwhelmed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The cords of the grave coiled around me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the snares of death confronted me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“In my distress I called to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I called out to my God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From his temple he heard my voice;
- type: usfm
  marker: q2
  children:
  - type: text
