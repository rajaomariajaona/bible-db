document_id: 1KI.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Builds the Temple
  - type: text
    content: In the four hundred and eightieth
  - type: note
    content: Hebrew; Septuagint four hundred and fortieth
  - type: text
    content: ' year after the Israelites came out of Egypt, in the fourth year of Solomon’s reign over Israel, in the month of Ziv, the second month, he began to build the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: And he built the side rooms all along the temple. The height of each was five cubits, and they were attached to the temple by beams of cedar.
  '11':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Solomon: '
  '12':
  - type: text
    content: '“As for this temple you are building, if you follow my decrees, observe my laws and keep all my commands and obey them, I will fulfill through you the promise I gave to David your father. '
  '13':
  - type: text
    content: And I will live among the Israelites and will not abandon my people Israel.”
  '14':
  - type: text
    content: 'So Solomon built the temple and completed it. '
  '15':
  - type: text
    content: 'He lined its interior walls with cedar boards, paneling them from the floor of the temple to the ceiling, and covered the floor of the temple with planks of juniper. '
  '16':
  - type: text
    content: 'He partitioned off twenty cubits at the rear of the temple with cedar boards from floor to ceiling to form within the temple an inner sanctuary, the Most Holy Place. '
  '17':
  - type: text
    content: The main hall in front of this room was forty cubits
  - type: note
    content: That is, about 60 feet or about 18 meters
  - type: text
    content: ' long. '
  '18':
  - type: text
    content: The inside of the temple was cedar, carved with gourds and open flowers. Everything was cedar; no stone was to be seen.
  '19':
  - type: text
    content: 'He prepared the inner sanctuary within the temple to set the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' there. '
  '2':
  - type: text
    content: 'The temple that King Solomon built for the '
  - type: text
    content: Lord
  - type: text
    content: ' was sixty cubits long, twenty wide and thirty high.'
  - type: note
    content: That is, about 90 feet long, 30 feet wide and 45 feet high or about 27 meters long, 9 meters wide and 14 meters high
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'The inner sanctuary was twenty cubits long, twenty wide and twenty high. He overlaid the inside with pure gold, and he also overlaid the altar of cedar. '
  '21':
  - type: text
    content: 'Solomon covered the inside of the temple with pure gold, and he extended gold chains across the front of the inner sanctuary, which was overlaid with gold. '
  '22':
  - type: text
    content: So he overlaid the whole interior with gold. He also overlaid with gold the altar that belonged to the inner sanctuary.
  '23':
  - type: text
    content: 'For the inner sanctuary he made a pair of cherubim out of olive wood, each ten cubits high. '
  '24':
  - type: text
    content: 'One wing of the first cherub was five cubits long, and the other wing five cubits—ten cubits from wing tip to wing tip. '
  '25':
  - type: text
    content: 'The second cherub also measured ten cubits, for the two cherubim were identical in size and shape. '
  '26':
  - type: text
    content: 'The height of each cherub was ten cubits. '
  '27':
  - type: text
    content: 'He placed the cherubim inside the innermost room of the temple, with their wings spread out. The wing of one cherub touched one wall, while the wing of the other touched the other wall, and their wings touched each other in the middle of the room. '
  '28':
  - type: text
    content: He overlaid the cherubim with gold.
  '29':
  - type: text
    content: 'On the walls all around the temple, in both the inner and outer rooms, he carved cherubim, palm trees and open flowers. '
  '3':
  - type: text
    content: The portico at the front of the main hall of the temple extended the width of the temple, that is twenty cubits,
  - type: note
    content: That is, about 30 feet or about 9 meters; also in verses 16 and 20
  - type: text
    content: ' and projected ten cubits'
  - type: note
    content: That is, about 15 feet or about 4.5 meters; also in verses 23-26
  - type: text
    content: ' from the front of the temple. '
  '30':
  - type: text
    content: He also covered the floors of both the inner and outer rooms of the temple with gold.
  '31':
  - type: text
    content: 'For the entrance to the inner sanctuary he made doors out of olive wood that were one fifth of the width of the sanctuary. '
  '32':
  - type: text
    content: 'And on the two olive-wood doors he carved cherubim, palm trees and open flowers, and overlaid the cherubim and palm trees with hammered gold. '
  '33':
  - type: text
    content: 'In the same way, for the entrance to the main hall he made doorframes out of olive wood that were one fourth of the width of the hall. '
  '34':
  - type: text
    content: 'He also made two doors out of juniper wood, each having two leaves that turned in sockets. '
  '35':
  - type: text
    content: He carved cherubim, palm trees and open flowers on them and overlaid them with gold hammered evenly over the carvings.
  '36':
  - type: text
    content: And he built the inner courtyard of three courses of dressed stone and one course of trimmed cedar beams.
  '37':
  - type: text
    content: 'The foundation of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' was laid in the fourth year, in the month of Ziv. '
  '38':
  - type: text
    content: In the eleventh year in the month of Bul, the eighth month, the temple was finished in all its details according to its specifications. He had spent seven years building it.
  '4':
  - type: text
    content: 'He made narrow windows high up in the temple walls. '
  '5':
  - type: text
    content: 'Against the walls of the main hall and inner sanctuary he built a structure around the building, in which there were side rooms. '
  '6':
  - type: text
    content: The lowest floor was five cubits
  - type: note
    content: That is, about 7 1/2 feet or about 2.3 meters; also in verses 10 and 24
  - type: text
    content: ' wide, the middle floor six cubits'
  - type: note
    content: That is, about 9 feet or about 2.7 meters
  - type: text
    content: ' and the third floor seven.'
  - type: note
    content: That is, about 11 feet or about 3.2 meters
  - type: text
    content: ' He made offset ledges around the outside of the temple so that nothing would be inserted into the temple walls.'
  '7':
  - type: text
    content: In building the temple, only blocks dressed at the quarry were used, and no hammer, chisel or any other iron tool was heard at the temple site while it was being built.
  '8':
  - type: text
    content: The entrance to the lowest
  - type: note
    content: Septuagint; Hebrew middle
  - type: text
    content: ' floor was on the south side of the temple; a stairway led up to the middle level and from there to the third. '
  '9':
  - type: text
    content: 'So he built the temple and completed it, roofing it with beams and cedar planks. '
