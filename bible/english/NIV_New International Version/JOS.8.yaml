document_id: JOS.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Ai Destroyed
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Do not be afraid; do not be discouraged. Take the whole army with you, and go up and attack Ai. For I have delivered into your hands the king of Ai, his people, his city and his land. '
  '10':
  - type: text
    content: 'Early the next morning Joshua mustered his army, and he and the leaders of Israel marched before them to Ai. '
  '11':
  - type: text
    content: 'The entire force that was with him marched up and approached the city and arrived in front of it. They set up camp north of Ai, with the valley between them and the city. '
  '12':
  - type: text
    content: 'Joshua had taken about five thousand men and set them in ambush between Bethel and Ai, to the west of the city. '
  '13':
  - type: text
    content: So the soldiers took up their positions—with the main camp to the north of the city and the ambush to the west of it. That night Joshua went into the valley.
  '14':
  - type: text
    content: 'When the king of Ai saw this, he and all the men of the city hurried out early in the morning to meet Israel in battle at a certain place overlooking the Arabah. But he did not know that an ambush had been set against him behind the city. '
  '15':
  - type: text
    content: 'Joshua and all Israel let themselves be driven back before them, and they fled toward the wilderness. '
  '16':
  - type: text
    content: 'All the men of Ai were called to pursue them, and they pursued Joshua and were lured away from the city. '
  '17':
  - type: text
    content: Not a man remained in Ai or Bethel who did not go after Israel. They left the city open and went in pursuit of Israel.
  '18':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Hold out toward Ai the javelin that is in your hand, for into your hand I will deliver the city.” So Joshua held out toward the city the javelin that was in his hand. '
  '19':
  - type: text
    content: As soon as he did this, the men in the ambush rose quickly from their position and rushed forward. They entered the city and captured it and quickly set it on fire.
  '2':
  - type: text
    content: You shall do to Ai and its king as you did to Jericho and its king, except that you may carry off their plunder and livestock for yourselves. Set an ambush behind the city.”
  '20':
  - type: text
    content: 'The men of Ai looked back and saw the smoke of the city rising up into the sky, but they had no chance to escape in any direction; the Israelites who had been fleeing toward the wilderness had turned back against their pursuers. '
  '21':
  - type: text
    content: 'For when Joshua and all Israel saw that the ambush had taken the city and that smoke was going up from it, they turned around and attacked the men of Ai. '
  '22':
  - type: text
    content: 'Those in the ambush also came out of the city against them, so that they were caught in the middle, with Israelites on both sides. Israel cut them down, leaving them neither survivors nor fugitives. '
  '23':
  - type: text
    content: But they took the king of Ai alive and brought him to Joshua.
  '24':
  - type: text
    content: 'When Israel had finished killing all the men of Ai in the fields and in the wilderness where they had chased them, and when every one of them had been put to the sword, all the Israelites returned to Ai and killed those who were in it. '
  '25':
  - type: text
    content: 'Twelve thousand men and women fell that day—all the people of Ai. '
  '26':
  - type: text
    content: For Joshua did not draw back the hand that held out his javelin until he had destroyed
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' all who lived in Ai. '
  '27':
  - type: text
    content: 'But Israel did carry off for themselves the livestock and plunder of this city, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had instructed Joshua.'
  '28':
  - type: text
    content: So Joshua burned Ai
  - type: note
    content: Ai means the ruin.
  - type: text
    content: ' and made it a permanent heap of ruins, a desolate place to this day. '
  '29':
  - type: text
    content: He impaled the body of the king of Ai on a pole and left it there until evening. At sunset, Joshua ordered them to take the body from the pole and throw it down at the entrance of the city gate. And they raised a large pile of rocks over it, which remains to this day.
  - type: heading
    content: The Covenant Renewed at Mount Ebal
  '3':
  - type: text
    content: 'So Joshua and the whole army moved out to attack Ai. He chose thirty thousand of his best fighting men and sent them out at night '
  '30':
  - type: text
    content: 'Then Joshua built on Mount Ebal an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  '31':
  - type: text
    content: 'as Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded the Israelites. He built it according to what is written in the Book of the Law of Moses—an altar of uncut stones, on which no iron tool had been used. On it they offered to the '
  - type: text
    content: Lord
  - type: text
    content: ' burnt offerings and sacrificed fellowship offerings. '
  '32':
  - type: text
    content: 'There, in the presence of the Israelites, Joshua wrote on stones a copy of the law of Moses. '
  '33':
  - type: text
    content: 'All the Israelites, with their elders, officials and judges, were standing on both sides of the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', facing the Levitical priests who carried it. Both the foreigners living among them and the native-born were there. Half of the people stood in front of Mount Gerizim and half of them in front of Mount Ebal, as Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' had formerly commanded when he gave instructions to bless the people of Israel.'
  '34':
  - type: text
    content: 'Afterward, Joshua read all the words of the law—the blessings and the curses—just as it is written in the Book of the Law. '
  '35':
  - type: text
    content: There was not a word of all that Moses had commanded that Joshua did not read to the whole assembly of Israel, including the women and children, and the foreigners who lived among them.
  '4':
  - type: text
    content: 'with these orders: “Listen carefully. You are to set an ambush behind the city. Don’t go very far from it. All of you be on the alert. '
  '5':
  - type: text
    content: 'I and all those with me will advance on the city, and when the men come out against us, as they did before, we will flee from them. '
  '6':
  - type: text
    content: 'They will pursue us until we have lured them away from the city, for they will say, ‘They are running away from us as they did before.’ So when we flee from them, '
  '7':
  - type: text
    content: 'you are to rise up from ambush and take the city. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will give it into your hand. '
  '8':
  - type: text
    content: 'When you have taken the city, set it on fire. Do what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded. See to it; you have my orders.”'
  '9':
  - type: text
    content: Then Joshua sent them off, and they went to the place of ambush and lay in wait between Bethel and Ai, to the west of Ai—but Joshua spent that night with the people.
