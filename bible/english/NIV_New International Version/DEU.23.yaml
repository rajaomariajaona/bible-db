document_id: DEU.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Exclusion From the Assembly
  - type: note
    content: In Hebrew texts 23:1-25 is numbered 23:2-26.
  - type: text
    content: 'No one who has been emasculated by crushing or cutting may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: 'If one of your men is unclean because of a nocturnal emission, he is to go outside the camp and stay there. '
  '11':
  - type: text
    content: But as evening approaches he is to wash himself, and at sunset he may return to the camp.
  '12':
  - type: text
    content: 'Designate a place outside the camp where you can go to relieve yourself. '
  '13':
  - type: text
    content: 'As part of your equipment have something to dig with, and when you relieve yourself, dig a hole and cover up your excrement. '
  '14':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God moves about in your camp to protect you and to deliver your enemies to you. Your camp must be holy, so that he will not see among you anything indecent and turn away from you.'
  - type: heading
    content: Miscellaneous Laws
  '15':
  - type: text
    content: 'If a slave has taken refuge with you, do not hand them over to their master. '
  '16':
  - type: text
    content: Let them live among you wherever they like and in whatever town they choose. Do not oppress them.
  '17':
  - type: text
    content: 'No Israelite man or woman is to become a shrine prostitute. '
  '18':
  - type: text
    content: You must not bring the earnings of a female prostitute or of a male prostitute
  - type: note
    content: Hebrew of a dog
  - type: text
    content: ' into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God to pay any vow, because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God detests them both.'
  '19':
  - type: text
    content: 'Do not charge a fellow Israelite interest, whether on money or food or anything else that may earn interest. '
  '2':
  - type: text
    content: No one born of a forbidden marriage
  - type: note
    content: Or one of illegitimate birth
  - type: text
    content: ' nor any of their descendants may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: ', not even in the tenth generation.'
  '20':
  - type: text
    content: 'You may charge a foreigner interest, but not a fellow Israelite, so that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God may bless you in everything you put your hand to in the land you are entering to possess.'
  '21':
  - type: text
    content: 'If you make a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, do not be slow to pay it, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will certainly demand it of you and you will be guilty of sin. '
  '22':
  - type: text
    content: 'But if you refrain from making a vow, you will not be guilty. '
  '23':
  - type: text
    content: 'Whatever your lips utter you must be sure to do, because you made your vow freely to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with your own mouth.'
  '24':
  - type: text
    content: 'If you enter your neighbor’s vineyard, you may eat all the grapes you want, but do not put any in your basket. '
  '25':
  - type: text
    content: If you enter your neighbor’s grainfield, you may pick kernels with your hands, but you must not put a sickle to their standing grain.
  '3':
  - type: text
    content: 'No Ammonite or Moabite or any of their descendants may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: ', not even in the tenth generation. '
  '4':
  - type: text
    content: For they did not come to meet you with bread and water on your way when you came out of Egypt, and they hired Balaam son of Beor from Pethor in Aram Naharaim
  - type: note
    content: That is, Northwest Mesopotamia
  - type: text
    content: ' to pronounce a curse on you. '
  '5':
  - type: text
    content: 'However, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God would not listen to Balaam but turned the curse into a blessing for you, because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God loves you. '
  '6':
  - type: text
    content: Do not seek a treaty of friendship with them as long as you live.
  '7':
  - type: text
    content: 'Do not despise an Edomite, for the Edomites are related to you. Do not despise an Egyptian, because you resided as foreigners in their country. '
  '8':
  - type: text
    content: 'The third generation of children born to them may enter the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Uncleanness in the Camp
  '9':
  - type: text
    content: 'When you are encamped against your enemies, keep away from everything impure. '
