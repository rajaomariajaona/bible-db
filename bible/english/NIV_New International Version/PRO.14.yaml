document_id: PRO.14
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The wise woman builds her house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but with her own hands the foolish one tears hers down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Whoever fears the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' walks uprightly,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who despise him are devious in their ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A fool’s mouth lashes out with pride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the lips of the wise protect them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Where there are no oxen, the manger is empty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but from the strength of an ox come abundant harvests.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: An honest witness does not deceive,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a false witness pours out lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The mocker seeks wisdom and finds none,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but knowledge comes easily to the discerning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Stay away from a fool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you will not find knowledge on their lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The wisdom of the prudent is to give thought to their ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the folly of fools is deception.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fools mock at making amends for sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but goodwill is found among the upright.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Each heart knows its own bitterness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one else can share its joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The house of the wicked will be destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the tent of the upright will flourish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: There is a way that appears to be right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but in the end it leads to death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Even in laughter the heart may ache,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rejoicing may end in grief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The faithless will be fully repaid for their ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the good rewarded for theirs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The simple believe anything,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the prudent give thought to their steps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The wise fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and shun evil,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a fool is hotheaded and yet feels secure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A quick-tempered person does foolish things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the one who devises evil schemes is hated.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The simple inherit folly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the prudent are crowned with knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Evildoers will bow down in the presence of the good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wicked at the gates of the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The poor are shunned even by their neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the rich have many friends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It is a sin to despise one’s neighbor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but blessed is the one who is kind to the needy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Do not those who plot evil go astray?
- type: usfm
  marker: q2
  children:
  - type: text
    text: But those who plan what is good find
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: show
    marker-yv: yv-n
  - type: text
    text: ' love and faithfulness.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: All hard work brings a profit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but mere talk leads only to poverty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The wealth of the wise is their crown,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the folly of fools yields folly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A truthful witness saves lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a false witness is deceitful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Whoever fears the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has a secure fortress,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and for their children it will be a refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a fountain of life,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: turning a person from the snares of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A large population is a king’s glory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but without subjects a prince is ruined.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Whoever is patient has great understanding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but one who is quick-tempered displays folly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: A heart at peace gives life to the body,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but envy rots the bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Whoever oppresses the poor shows contempt for their Maker,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever is kind to the needy honors God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: When calamity comes, the wicked are brought down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but even in death the righteous seek refuge in God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Wisdom reposes in the heart of the discerning
- type: usfm
  marker: q2
  children:
  - type: text
    text: and even among fools she lets herself be known.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint and Syriac '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: discerning / but in the heart of fools she is not known
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Righteousness exalts a nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but sin condemns any people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: A king delights in a wise servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a shameful servant arouses his fury.
