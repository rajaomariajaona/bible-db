document_id: PRO.14,111
type_code: eng
verses:
  '1':
  - type: text
    content: The wise woman builds her house,
  - type: text
    content: but with her own hands the foolish one tears hers down.
  '10':
  - type: text
    content: Each heart knows its own bitterness,
  - type: text
    content: and no one else can share its joy.
  '11':
  - type: text
    content: The house of the wicked will be destroyed,
  - type: text
    content: but the tent of the upright will flourish.
  '12':
  - type: text
    content: There is a way that appears to be right,
  - type: text
    content: but in the end it leads to death.
  '13':
  - type: text
    content: Even in laughter the heart may ache,
  - type: text
    content: and rejoicing may end in grief.
  '14':
  - type: text
    content: The faithless will be fully repaid for their ways,
  - type: text
    content: and the good rewarded for theirs.
  '15':
  - type: text
    content: The simple believe anything,
  - type: text
    content: but the prudent give thought to their steps.
  '16':
  - type: text
    content: 'The wise fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and shun evil,'
  - type: text
    content: but a fool is hotheaded and yet feels secure.
  '17':
  - type: text
    content: A quick-tempered person does foolish things,
  - type: text
    content: and the one who devises evil schemes is hated.
  '18':
  - type: text
    content: The simple inherit folly,
  - type: text
    content: but the prudent are crowned with knowledge.
  '19':
  - type: text
    content: Evildoers will bow down in the presence of the good,
  - type: text
    content: and the wicked at the gates of the righteous.
  '2':
  - type: text
    content: 'Whoever fears the '
  - type: text
    content: Lord
  - type: text
    content: ' walks uprightly,'
  - type: text
    content: but those who despise him are devious in their ways.
  '20':
  - type: text
    content: The poor are shunned even by their neighbors,
  - type: text
    content: but the rich have many friends.
  '21':
  - type: text
    content: It is a sin to despise one’s neighbor,
  - type: text
    content: but blessed is the one who is kind to the needy.
  '22':
  - type: text
    content: Do not those who plot evil go astray?
  - type: text
    content: But those who plan what is good find
  - type: note
    content: Or show
  - type: text
    content: ' love and faithfulness.'
  '23':
  - type: text
    content: All hard work brings a profit,
  - type: text
    content: but mere talk leads only to poverty.
  '24':
  - type: text
    content: The wealth of the wise is their crown,
  - type: text
    content: but the folly of fools yields folly.
  '25':
  - type: text
    content: A truthful witness saves lives,
  - type: text
    content: but a false witness is deceitful.
  '26':
  - type: text
    content: 'Whoever fears the '
  - type: text
    content: Lord
  - type: text
    content: ' has a secure fortress,'
  - type: text
    content: and for their children it will be a refuge.
  '27':
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a fountain of life,'
  - type: text
    content: turning a person from the snares of death.
  '28':
  - type: text
    content: A large population is a king’s glory,
  - type: text
    content: but without subjects a prince is ruined.
  '29':
  - type: text
    content: Whoever is patient has great understanding,
  - type: text
    content: but one who is quick-tempered displays folly.
  '3':
  - type: text
    content: A fool’s mouth lashes out with pride,
  - type: text
    content: but the lips of the wise protect them.
  '30':
  - type: text
    content: A heart at peace gives life to the body,
  - type: text
    content: but envy rots the bones.
  '31':
  - type: text
    content: Whoever oppresses the poor shows contempt for their Maker,
  - type: text
    content: but whoever is kind to the needy honors God.
  '32':
  - type: text
    content: When calamity comes, the wicked are brought down,
  - type: text
    content: but even in death the righteous seek refuge in God.
  '33':
  - type: text
    content: Wisdom reposes in the heart of the discerning
  - type: text
    content: and even among fools she lets herself be known.
  - type: note
    content: Hebrew; Septuagint and Syriac discerning / but in the heart of fools she is not known
  '34':
  - type: text
    content: Righteousness exalts a nation,
  - type: text
    content: but sin condemns any people.
  '35':
  - type: text
    content: A king delights in a wise servant,
  - type: text
    content: but a shameful servant arouses his fury.
  '4':
  - type: text
    content: Where there are no oxen, the manger is empty,
  - type: text
    content: but from the strength of an ox come abundant harvests.
  '5':
  - type: text
    content: An honest witness does not deceive,
  - type: text
    content: but a false witness pours out lies.
  '6':
  - type: text
    content: The mocker seeks wisdom and finds none,
  - type: text
    content: but knowledge comes easily to the discerning.
  '7':
  - type: text
    content: Stay away from a fool,
  - type: text
    content: for you will not find knowledge on their lips.
  '8':
  - type: text
    content: The wisdom of the prudent is to give thought to their ways,
  - type: text
    content: but the folly of fools is deception.
  '9':
  - type: text
    content: Fools mock at making amends for sin,
  - type: text
    content: but goodwill is found among the upright.
