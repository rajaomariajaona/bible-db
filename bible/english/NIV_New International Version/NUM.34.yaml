document_id: NUM.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Boundaries of Canaan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Command the Israelites and say to them: ‘When you enter Canaan, the land that will be allotted to you as an inheritance is to have these boundaries:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“ ‘Your southern side will include some of the Desert of Zin along the border of Edom. Your southern boundary will start in the east from the southern end of the Dead Sea, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'cross south of Scorpion Pass, continue on to Zin and go south of Kadesh Barnea. Then it will go to Hazar Addar and over to Azmon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: where it will turn, join the Wadi of Egypt and end at the Mediterranean Sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “ ‘Your western boundary will be the coast of the Mediterranean Sea. This will be your boundary on the west.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“ ‘For your northern boundary, run a line from the Mediterranean Sea to Mount Hor '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and from Mount Hor to Lebo Hamath. Then the boundary will go to Zedad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: continue to Ziphron and end at Hazar Enan. This will be your boundary on the north.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“ ‘For your eastern boundary, run a line from Hazar Enan to Shepham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The boundary will go down from Shepham to Riblah on the east side of Ain and continue along the slopes east of the Sea of Galilee.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Kinnereth
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then the boundary will go down along the Jordan and end at the Dead Sea.
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘This will be your land, with its boundaries on every side.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moses commanded the Israelites: “Assign this land by lot as an inheritance. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has ordered that it be given to the nine-and-a-half tribes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'because the families of the tribe of Reuben, the tribe of Gad and the half-tribe of Manasseh have received their inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: These two-and-a-half tribes have received their inheritance east of the Jordan across from Jericho, toward the sunrise.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“These are the names of the men who are to assign the land for you as an inheritance: Eleazar the priest and Joshua son of Nun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And appoint one leader from each tribe to help assign the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'These are their names:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Caleb son of Jephunneh,
- type: usfm
  marker: li2
  children:
  - type: text
    text: from the tribe of Judah;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Shemuel son of Ammihud,
- type: usfm
  marker: li2
  children:
  - type: text
    text: from the tribe of Simeon;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Elidad son of Kislon,
- type: usfm
  marker: li2
  children:
  - type: text
    text: from the tribe of Benjamin;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Bukki son of Jogli,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the leader from the tribe of Dan;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Hanniel son of Ephod,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the leader from the tribe of Manasseh son of Joseph;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kemuel son of Shiphtan,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the leader from the tribe of Ephraim son of Joseph;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Elizaphan son of Parnak,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the leader from the tribe of Zebulun;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Paltiel son of Azzan,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the leader from the tribe of Issachar;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ahihud son of Shelomi,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the leader from the tribe of Asher;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Pedahel son of Ammihud,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the leader from the tribe of Naphtali.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'These are the men the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded to assign the inheritance to the Israelites in the land of Canaan.'
