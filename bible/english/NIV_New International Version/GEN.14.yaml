document_id: GEN.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Abram Rescues Lot
  - type: text
    content: At the time when Amraphel was king of Shinar,
  - type: note
    content: That is, Babylonia; also in verse 9
  - type: text
    content: ' Arioch king of Ellasar, Kedorlaomer king of Elam and Tidal king of Goyim, '
  '10':
  - type: text
    content: 'Now the Valley of Siddim was full of tar pits, and when the kings of Sodom and Gomorrah fled, some of the men fell into them and the rest fled to the hills. '
  '11':
  - type: text
    content: 'The four kings seized all the goods of Sodom and Gomorrah and all their food; then they went away. '
  '12':
  - type: text
    content: They also carried off Abram’s nephew Lot and his possessions, since he was living in Sodom.
  '13':
  - type: text
    content: A man who had escaped came and reported this to Abram the Hebrew. Now Abram was living near the great trees of Mamre the Amorite, a brother
  - type: note
    content: Or a relative; or an ally
  - type: text
    content: ' of Eshkol and Aner, all of whom were allied with Abram. '
  '14':
  - type: text
    content: 'When Abram heard that his relative had been taken captive, he called out the 318 trained men born in his household and went in pursuit as far as Dan. '
  '15':
  - type: text
    content: 'During the night Abram divided his men to attack them and he routed them, pursuing them as far as Hobah, north of Damascus. '
  '16':
  - type: text
    content: He recovered all the goods and brought back his relative Lot and his possessions, together with the women and the other people.
  '17':
  - type: text
    content: After Abram returned from defeating Kedorlaomer and the kings allied with him, the king of Sodom came out to meet him in the Valley of Shaveh (that is, the King’s Valley).
  '18':
  - type: text
    content: 'Then Melchizedek king of Salem brought out bread and wine. He was priest of God Most High, '
  '19':
  - type: text
    content: and he blessed Abram, saying,
  - type: text
    content: “Blessed be Abram by God Most High,
  - type: text
    content: Creator of heaven and earth.
  '2':
  - type: text
    content: 'these kings went to war against Bera king of Sodom, Birsha king of Gomorrah, Shinab king of Admah, Shemeber king of Zeboyim, and the king of Bela (that is, Zoar). '
  '20':
  - type: text
    content: And praise be to God Most High,
  - type: text
    content: who delivered your enemies into your hand.”
  - type: text
    content: Then Abram gave him a tenth of everything.
  '21':
  - type: text
    content: The king of Sodom said to Abram, “Give me the people and keep the goods for yourself.”
  '22':
  - type: text
    content: 'But Abram said to the king of Sodom, “With raised hand I have sworn an oath to the '
  - type: text
    content: Lord
  - type: text
    content: ', God Most High, Creator of heaven and earth, '
  '23':
  - type: text
    content: 'that I will accept nothing belonging to you, not even a thread or the strap of a sandal, so that you will never be able to say, ‘I made Abram rich.’ '
  '24':
  - type: text
    content: I will accept nothing but what my men have eaten and the share that belongs to the men who went with me—to Aner, Eshkol and Mamre. Let them have their share.”
  '3':
  - type: text
    content: 'All these latter kings joined forces in the Valley of Siddim (that is, the Dead Sea Valley). '
  '4':
  - type: text
    content: For twelve years they had been subject to Kedorlaomer, but in the thirteenth year they rebelled.
  '5':
  - type: text
    content: 'In the fourteenth year, Kedorlaomer and the kings allied with him went out and defeated the Rephaites in Ashteroth Karnaim, the Zuzites in Ham, the Emites in Shaveh Kiriathaim '
  '6':
  - type: text
    content: 'and the Horites in the hill country of Seir, as far as El Paran near the desert. '
  '7':
  - type: text
    content: Then they turned back and went to En Mishpat (that is, Kadesh), and they conquered the whole territory of the Amalekites, as well as the Amorites who were living in Hazezon Tamar.
  '8':
  - type: text
    content: 'Then the king of Sodom, the king of Gomorrah, the king of Admah, the king of Zeboyim and the king of Bela (that is, Zoar) marched out and drew up their battle lines in the Valley of Siddim '
  '9':
  - type: text
    content: 'against Kedorlaomer king of Elam, Tidal king of Goyim, Amraphel king of Shinar and Arioch king of Ellasar—four kings against five. '
