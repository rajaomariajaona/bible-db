document_id: DEU.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Year for Canceling Debts
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the end of every seven years you must cancel debts. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give generously to them and do so without a grudging heart; then because of this the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will bless you in all your work and in everything you put your hand to. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There will always be poor people in the land. Therefore I command you to be openhanded toward your fellow Israelites who are poor and needy in your land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Freeing Servants
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If any of your people—Hebrew men or women—sell themselves to you and serve you six years, in the seventh year you must let them go free. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when you release them, do not send them away empty-handed. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Supply them liberally from your flock, your threshing floor and your winepress. Give to them as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has blessed you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember that you were slaves in Egypt and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God redeemed you. That is why I give you this command today.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if your servant says to you, “I do not want to leave you,” because he loves you and your family and is well off with you, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then take an awl and push it through his earlobe into the door, and he will become your servant for life. Do the same for your female servant.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not consider it a hardship to set your servant free, because their service to you these six years has been worth twice as much as that of a hired hand. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will bless you in everything you do.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Firstborn Animals
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Set apart for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God every firstborn male of your herds and flocks. Do not put the firstborn of your cows to work, and do not shear the firstborn of your sheep. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how it is to be done: Every creditor shall cancel any loan they have made to a fellow Israelite. They shall not require payment from anyone among their own people, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s time for canceling debts has been proclaimed. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each year you and your family are to eat them in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God at the place he will choose. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If an animal has a defect, is lame or blind, or has any serious flaw, you must not sacrifice it to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are to eat it in your own towns. Both the ceremonially unclean and the clean may eat it, as if it were gazelle or deer. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you must not eat the blood; pour it out on the ground like water.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You may require payment from a foreigner, but you must cancel any debt your fellow Israelite owes you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, there need be no poor people among you, for in the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you to possess as your inheritance, he will richly bless you, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if only you fully obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and are careful to follow all these commands I am giving you today. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will bless you as he has promised, and you will lend to many nations but will borrow from none. You will rule over many nations but none will rule over you.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anyone is poor among your fellow Israelites in any of the towns of the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you, do not be hardhearted or tightfisted toward them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rather, be openhanded and freely lend them whatever they need. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be careful not to harbor this wicked thought: “The seventh year, the year for canceling debts, is near,” so that you do not show ill will toward the needy among your fellow Israelites and give them nothing. They may then appeal to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' against you, and you will be found guilty of sin. '
