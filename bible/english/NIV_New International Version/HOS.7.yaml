document_id: HOS.7
type_code: eng
segments:
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: whenever I would heal Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the sins of Ephraim are exposed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the crimes of Samaria revealed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They practice deceit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: thieves break into houses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bandits rob in the streets;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: but they do not realize
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I remember all their evil deeds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their sins engulf them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are always before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “They delight the king with their wickedness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the princes with their lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They are all adulterers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: burning like an oven
- type: usfm
  marker: q1
  children:
  - type: text
    text: whose fire the baker need not stir
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the kneading of the dough till it rises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On the day of the festival of our king
- type: usfm
  marker: q2
  children:
  - type: text
    text: the princes become inflamed with wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he joins hands with the mockers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Their hearts are like an oven;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they approach him with intrigue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their passion smolders all night;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the morning it blazes like a flaming fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All of them are hot as an oven;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they devour their rulers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All their kings fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and none of them calls on me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Ephraim mixes with the nations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim is a flat loaf not turned over.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Foreigners sap his strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he does not realize it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His hair is sprinkled with gray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he does not notice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Israel’s arrogance testifies against him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but despite all this
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'he does not return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God'
- type: usfm
  marker: q2
  children:
  - type: text
    text: or search for him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Ephraim is like a dove,
- type: usfm
  marker: q2
  children:
  - type: text
    text: easily deceived and senseless—
- type: usfm
  marker: q1
  children:
  - type: text
    text: now calling to Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: now turning to Assyria.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When they go, I will throw my net over them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will pull them down like the birds in the sky.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I hear them flocking together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will catch them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Woe to them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they have strayed from me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Destruction to them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they have rebelled against me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I long to redeem them
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they speak about me falsely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They do not cry out to me from their hearts
- type: usfm
  marker: q2
  children:
  - type: text
    text: but wail on their beds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They slash themselves,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts and Septuagint; most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: They gather together
    marker-yv: yv-n
  - type: text
    text: ' appealing to their gods'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for grain and new wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they turn away from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I trained them and strengthened their arms,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they plot evil against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They do not turn to the Most High;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are like a faulty bow.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their leaders will fall by the sword
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of their insolent words.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For this they will be ridiculed
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the land of Egypt.
