document_id: HOS.7,111
type_code: eng
verses:
  '1':
  - type: text
    content: whenever I would heal Israel,
  - type: text
    content: the sins of Ephraim are exposed
  - type: text
    content: and the crimes of Samaria revealed.
  - type: text
    content: They practice deceit,
  - type: text
    content: thieves break into houses,
  - type: text
    content: bandits rob in the streets;
  '10':
  - type: text
    content: Israel’s arrogance testifies against him,
  - type: text
    content: but despite all this
  - type: text
    content: 'he does not return to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God'
  - type: text
    content: or search for him.
  '11':
  - type: text
    content: “Ephraim is like a dove,
  - type: text
    content: easily deceived and senseless—
  - type: text
    content: now calling to Egypt,
  - type: text
    content: now turning to Assyria.
  '12':
  - type: text
    content: When they go, I will throw my net over them;
  - type: text
    content: I will pull them down like the birds in the sky.
  - type: text
    content: When I hear them flocking together,
  - type: text
    content: I will catch them.
  '13':
  - type: text
    content: Woe to them,
  - type: text
    content: because they have strayed from me!
  - type: text
    content: Destruction to them,
  - type: text
    content: because they have rebelled against me!
  - type: text
    content: I long to redeem them
  - type: text
    content: but they speak about me falsely.
  '14':
  - type: text
    content: They do not cry out to me from their hearts
  - type: text
    content: but wail on their beds.
  - type: text
    content: They slash themselves,
  - type: note
    content: Some Hebrew manuscripts and Septuagint; most Hebrew manuscripts They gather together
  - type: text
    content: ' appealing to their gods'
  - type: text
    content: for grain and new wine,
  - type: text
    content: but they turn away from me.
  '15':
  - type: text
    content: I trained them and strengthened their arms,
  - type: text
    content: but they plot evil against me.
  '16':
  - type: text
    content: They do not turn to the Most High;
  - type: text
    content: they are like a faulty bow.
  - type: text
    content: Their leaders will fall by the sword
  - type: text
    content: because of their insolent words.
  - type: text
    content: For this they will be ridiculed
  - type: text
    content: in the land of Egypt.
  '2':
  - type: text
    content: but they do not realize
  - type: text
    content: that I remember all their evil deeds.
  - type: text
    content: Their sins engulf them;
  - type: text
    content: they are always before me.
  '3':
  - type: text
    content: “They delight the king with their wickedness,
  - type: text
    content: the princes with their lies.
  '4':
  - type: text
    content: They are all adulterers,
  - type: text
    content: burning like an oven
  - type: text
    content: whose fire the baker need not stir
  - type: text
    content: from the kneading of the dough till it rises.
  '5':
  - type: text
    content: On the day of the festival of our king
  - type: text
    content: the princes become inflamed with wine,
  - type: text
    content: and he joins hands with the mockers.
  '6':
  - type: text
    content: Their hearts are like an oven;
  - type: text
    content: they approach him with intrigue.
  - type: text
    content: Their passion smolders all night;
  - type: text
    content: in the morning it blazes like a flaming fire.
  '7':
  - type: text
    content: All of them are hot as an oven;
  - type: text
    content: they devour their rulers.
  - type: text
    content: All their kings fall,
  - type: text
    content: and none of them calls on me.
  '8':
  - type: text
    content: “Ephraim mixes with the nations;
  - type: text
    content: Ephraim is a flat loaf not turned over.
  '9':
  - type: text
    content: Foreigners sap his strength,
  - type: text
    content: but he does not realize it.
  - type: text
    content: His hair is sprinkled with gray,
  - type: text
    content: but he does not notice.
