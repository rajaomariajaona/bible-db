document_id: 2SA.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: The war between the house of Saul and the house of David lasted a long time. David grew stronger and stronger, while the house of Saul grew weaker and weaker.
  '10':
  - type: text
    content: 'and transfer the kingdom from the house of Saul and establish David’s throne over Israel and Judah from Dan to Beersheba.” '
  '11':
  - type: text
    content: Ish-Bosheth did not dare to say another word to Abner, because he was afraid of him.
  '12':
  - type: text
    content: Then Abner sent messengers on his behalf to say to David, “Whose land is it? Make an agreement with me, and I will help you bring all Israel over to you.”
  '13':
  - type: text
    content: '“Good,” said David. “I will make an agreement with you. But I demand one thing of you: Do not come into my presence unless you bring Michal daughter of Saul when you come to see me.” '
  '14':
  - type: text
    content: Then David sent messengers to Ish-Bosheth son of Saul, demanding, “Give me my wife Michal, whom I betrothed to myself for the price of a hundred Philistine foreskins.”
  '15':
  - type: text
    content: 'So Ish-Bosheth gave orders and had her taken away from her husband Paltiel son of Laish. '
  '16':
  - type: text
    content: Her husband, however, went with her, weeping behind her all the way to Bahurim. Then Abner said to him, “Go back home!” So he went back.
  '17':
  - type: text
    content: 'Abner conferred with the elders of Israel and said, “For some time you have wanted to make David your king. '
  '18':
  - type: text
    content: 'Now do it! For the '
  - type: text
    content: Lord
  - type: text
    content: ' promised David, ‘By my servant David I will rescue my people Israel from the hand of the Philistines and from the hand of all their enemies.’ ”'
  '19':
  - type: text
    content: 'Abner also spoke to the Benjamites in person. Then he went to Hebron to tell David everything that Israel and the whole tribe of Benjamin wanted to do. '
  '2':
  - type: text
    content: 'Sons were born to David in Hebron:'
  - type: text
    content: His firstborn was Amnon the son of Ahinoam of Jezreel;
  '20':
  - type: text
    content: 'When Abner, who had twenty men with him, came to David at Hebron, David prepared a feast for him and his men. '
  '21':
  - type: text
    content: Then Abner said to David, “Let me go at once and assemble all Israel for my lord the king, so that they may make a covenant with you, and that you may rule over all that your heart desires.” So David sent Abner away, and he went in peace.
  - type: heading
    content: Joab Murders Abner
  '22':
  - type: text
    content: 'Just then David’s men and Joab returned from a raid and brought with them a great deal of plunder. But Abner was no longer with David in Hebron, because David had sent him away, and he had gone in peace. '
  '23':
  - type: text
    content: When Joab and all the soldiers with him arrived, he was told that Abner son of Ner had come to the king and that the king had sent him away and that he had gone in peace.
  '24':
  - type: text
    content: 'So Joab went to the king and said, “What have you done? Look, Abner came to you. Why did you let him go? Now he is gone! '
  '25':
  - type: text
    content: You know Abner son of Ner; he came to deceive you and observe your movements and find out everything you are doing.”
  '26':
  - type: text
    content: 'Joab then left David and sent messengers after Abner, and they brought him back from the cistern at Sirah. But David did not know it. '
  '27':
  - type: text
    content: Now when Abner returned to Hebron, Joab took him aside into an inner chamber, as if to speak with him privately. And there, to avenge the blood of his brother Asahel, Joab stabbed him in the stomach, and he died.
  '28':
  - type: text
    content: 'Later, when David heard about this, he said, “I and my kingdom are forever innocent before the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning the blood of Abner son of Ner. '
  '29':
  - type: text
    content: May his blood fall on the head of Joab and on his whole family! May Joab’s family never be without someone who has a running sore or leprosy
  - type: note
    content: The Hebrew for leprosy was used for various diseases affecting the skin.
  - type: text
    content: ' or who leans on a crutch or who falls by the sword or who lacks food.”'
  '3':
  - type: text
    content: his second, Kileab the son of Abigail the widow of Nabal of Carmel;
  - type: text
    content: the third, Absalom the son of Maakah daughter of Talmai king of Geshur;
  '30':
  - type: text
    content: (Joab and his brother Abishai murdered Abner because he had killed their brother Asahel in the battle at Gibeon.)
  '31':
  - type: text
    content: 'Then David said to Joab and all the people with him, “Tear your clothes and put on sackcloth and walk in mourning in front of Abner.” King David himself walked behind the bier. '
  '32':
  - type: text
    content: They buried Abner in Hebron, and the king wept aloud at Abner’s tomb. All the people wept also.
  '33':
  - type: text
    content: 'The king sang this lament for Abner:'
  - type: text
    content: “Should Abner have died as the lawless die?
  '34':
  - type: text
    content: Your hands were not bound,
  - type: text
    content: your feet were not fettered.
  - type: text
    content: You fell as one falls before the wicked.”
  - type: text
    content: And all the people wept over him again.
  '35':
  - type: text
    content: Then they all came and urged David to eat something while it was still day; but David took an oath, saying, “May God deal with me, be it ever so severely, if I taste bread or anything else before the sun sets!”
  '36':
  - type: text
    content: 'All the people took note and were pleased; indeed, everything the king did pleased them. '
  '37':
  - type: text
    content: So on that day all the people there and all Israel knew that the king had no part in the murder of Abner son of Ner.
  '38':
  - type: text
    content: 'Then the king said to his men, “Do you not realize that a commander and a great man has fallen in Israel this day? '
  '39':
  - type: text
    content: 'And today, though I am the anointed king, I am weak, and these sons of Zeruiah are too strong for me. May the '
  - type: text
    content: Lord
  - type: text
    content: ' repay the evildoer according to his evil deeds!”'
  '4':
  - type: text
    content: the fourth, Adonijah the son of Haggith;
  - type: text
    content: the fifth, Shephatiah the son of Abital;
  '5':
  - type: text
    content: and the sixth, Ithream the son of David’s wife Eglah.
  - type: text
    content: These were born to David in Hebron.
  - type: heading
    content: Abner Goes Over to David
  '6':
  - type: text
    content: 'During the war between the house of Saul and the house of David, Abner had been strengthening his own position in the house of Saul. '
  '7':
  - type: text
    content: Now Saul had had a concubine named Rizpah daughter of Aiah. And Ish-Bosheth said to Abner, “Why did you sleep with my father’s concubine?”
  '8':
  - type: text
    content: 'Abner was very angry because of what Ish-Bosheth said. So he answered, “Am I a dog’s head—on Judah’s side? This very day I am loyal to the house of your father Saul and to his family and friends. I haven’t handed you over to David. Yet now you accuse me of an offense involving this woman! '
  '9':
  - type: text
    content: 'May God deal with Abner, be it ever so severely, if I do not do for David what the '
  - type: text
    content: Lord
  - type: text
    content: ' promised him on oath '
