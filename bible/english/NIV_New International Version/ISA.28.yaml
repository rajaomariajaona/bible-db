document_id: ISA.28,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Woe to the Leaders of Ephraim and Judah
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to that wreath, the pride of Ephraim’s drunkards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the fading flower, his glorious beauty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: set on the head of a fertile valley—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to that city, the pride of those laid low by wine!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For it is:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do this, do that,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a rule for this, a rule for that
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '/ sav lasav sav lasav / kav lakav kav lakav '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (probably meaningless sounds mimicking the prophet’s words); also in verse 13
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a little here, a little there.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Very well then, with foreign lips and strange tongues
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God will speak to this people,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to whom he said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “This is the resting place, let the weary rest”;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and, “This is the place of repose”—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they would not listen.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So then, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to them will become:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do this, do that,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a rule for this, a rule for that;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a little here, a little there—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that as they go they will fall backward;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be injured and snared and captured.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you scoffers'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who rule this people in Jerusalem.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You boast, “We have entered into a covenant with death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the realm of the dead we have made an agreement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When an overwhelming scourge sweeps by,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it cannot touch us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for we have made a lie our refuge
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and falsehood
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: false gods
      marker-yv: yv-n
    - type: text
      text: ' our hiding place.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, I lay a stone in Zion, a tested stone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a precious cornerstone for a sure foundation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the one who relies on it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never be stricken with panic.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make justice the measuring line
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and righteousness the plumb line;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hail will sweep away your refuge, the lie,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and water will overflow your hiding place.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your covenant with death will be annulled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your agreement with the realm of the dead will not stand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the overwhelming scourge sweeps by,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be beaten down by it.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As often as it comes it will carry you away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: morning after morning, by day and by night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will sweep through.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The understanding of this message
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will bring sheer terror.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, the Lord has one who is powerful and strong.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like a hailstorm and a destructive wind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a driving rain and a flooding downpour,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will throw it forcefully to the ground.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bed is too short to stretch out on,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the blanket too narrow to wrap around you.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will rise up as he did at Mount Perazim,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will rouse himself as in the Valley of Gibeon—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to do his work, his strange work,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and perform his task, his alien task.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now stop your mocking,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or your chains will become heavier;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, has told me'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of the destruction decreed against the whole land.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen and hear my voice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay attention and hear what I say.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When a farmer plows for planting, does he plow continually?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does he keep on breaking up and working the soil?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he has leveled the surface,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: does he not sow caraway and scatter cumin?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does he not plant wheat in its place,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: barley in its plot,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and spelt in its field?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His God instructs him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and teaches him the right way.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Caraway is not threshed with a sledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor is the wheel of a cart rolled over cumin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: caraway is beaten out with a rod,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cumin with a stick.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grain must be ground to make bread;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so one does not go on threshing it forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wheels of a threshing cart may be rolled over it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but one does not use horses to grind grain.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All this also comes from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose plan is wonderful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose wisdom is magnificent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That wreath, the pride of Ephraim’s drunkards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be trampled underfoot.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That fading flower, his glorious beauty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: set on the head of a fertile valley,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be like figs ripe before harvest—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as soon as people see them and take them in hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they swallow them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be a glorious crown,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a beautiful wreath
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the remnant of his people.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be a spirit of justice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the one who sits in judgment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a source of strength
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to those who turn back the battle at the gate.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And these also stagger from wine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and reel from beer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Priests and prophets stagger from beer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and are befuddled with wine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they reel from beer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stagger when seeing visions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stumble when rendering decisions.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the tables are covered with vomit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is not a spot without filth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who is it he is trying to teach?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To whom is he explaining his message?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To children weaned from their milk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to those just taken from the breast?
