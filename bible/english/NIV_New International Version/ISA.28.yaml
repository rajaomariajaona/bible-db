document_id: ISA.28,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to the Leaders of Ephraim and Judah
  - type: text
    content: Woe to that wreath, the pride of Ephraim’s drunkards,
  - type: text
    content: to the fading flower, his glorious beauty,
  - type: text
    content: set on the head of a fertile valley—
  - type: text
    content: to that city, the pride of those laid low by wine!
  '10':
  - type: text
    content: 'For it is:'
  - type: text
    content: Do this, do that,
  - type: text
    content: a rule for this, a rule for that
  - type: note
    content: Hebrew / sav lasav sav lasav / kav lakav kav lakav (probably meaningless sounds mimicking the prophet’s words); also in verse 13
  - type: text
    content: ;
  - type: text
    content: a little here, a little there.”
  '11':
  - type: text
    content: Very well then, with foreign lips and strange tongues
  - type: text
    content: God will speak to this people,
  '12':
  - type: text
    content: to whom he said,
  - type: text
    content: “This is the resting place, let the weary rest”;
  - type: text
    content: and, “This is the place of repose”—
  - type: text
    content: but they would not listen.
  '13':
  - type: text
    content: 'So then, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' to them will become:'
  - type: text
    content: Do this, do that,
  - type: text
    content: a rule for this, a rule for that;
  - type: text
    content: a little here, a little there—
  - type: text
    content: so that as they go they will fall backward;
  - type: text
    content: they will be injured and snared and captured.
  '14':
  - type: text
    content: 'Therefore hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', you scoffers'
  - type: text
    content: who rule this people in Jerusalem.
  '15':
  - type: text
    content: You boast, “We have entered into a covenant with death,
  - type: text
    content: with the realm of the dead we have made an agreement.
  - type: text
    content: When an overwhelming scourge sweeps by,
  - type: text
    content: it cannot touch us,
  - type: text
    content: for we have made a lie our refuge
  - type: text
    content: and falsehood
  - type: note
    content: Or false gods
  - type: text
    content: ' our hiding place.”'
  '16':
  - type: text
    content: 'So this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “See, I lay a stone in Zion, a tested stone,
  - type: text
    content: a precious cornerstone for a sure foundation;
  - type: text
    content: the one who relies on it
  - type: text
    content: will never be stricken with panic.
  '17':
  - type: text
    content: I will make justice the measuring line
  - type: text
    content: and righteousness the plumb line;
  - type: text
    content: hail will sweep away your refuge, the lie,
  - type: text
    content: and water will overflow your hiding place.
  '18':
  - type: text
    content: Your covenant with death will be annulled;
  - type: text
    content: your agreement with the realm of the dead will not stand.
  - type: text
    content: When the overwhelming scourge sweeps by,
  - type: text
    content: you will be beaten down by it.
  '19':
  - type: text
    content: As often as it comes it will carry you away;
  - type: text
    content: morning after morning, by day and by night,
  - type: text
    content: it will sweep through.”
  - type: text
    content: The understanding of this message
  - type: text
    content: will bring sheer terror.
  '2':
  - type: text
    content: See, the Lord has one who is powerful and strong.
  - type: text
    content: Like a hailstorm and a destructive wind,
  - type: text
    content: like a driving rain and a flooding downpour,
  - type: text
    content: he will throw it forcefully to the ground.
  '20':
  - type: text
    content: The bed is too short to stretch out on,
  - type: text
    content: the blanket too narrow to wrap around you.
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will rise up as he did at Mount Perazim,'
  - type: text
    content: he will rouse himself as in the Valley of Gibeon—
  - type: text
    content: to do his work, his strange work,
  - type: text
    content: and perform his task, his alien task.
  '22':
  - type: text
    content: Now stop your mocking,
  - type: text
    content: or your chains will become heavier;
  - type: text
    content: 'the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, has told me'
  - type: text
    content: of the destruction decreed against the whole land.
  '23':
  - type: text
    content: Listen and hear my voice;
  - type: text
    content: pay attention and hear what I say.
  '24':
  - type: text
    content: When a farmer plows for planting, does he plow continually?
  - type: text
    content: Does he keep on breaking up and working the soil?
  '25':
  - type: text
    content: When he has leveled the surface,
  - type: text
    content: does he not sow caraway and scatter cumin?
  - type: text
    content: Does he not plant wheat in its place,
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: barley in its plot,
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: and spelt in its field?
  '26':
  - type: text
    content: His God instructs him
  - type: text
    content: and teaches him the right way.
  '27':
  - type: text
    content: Caraway is not threshed with a sledge,
  - type: text
    content: nor is the wheel of a cart rolled over cumin;
  - type: text
    content: caraway is beaten out with a rod,
  - type: text
    content: and cumin with a stick.
  '28':
  - type: text
    content: Grain must be ground to make bread;
  - type: text
    content: so one does not go on threshing it forever.
  - type: text
    content: The wheels of a threshing cart may be rolled over it,
  - type: text
    content: but one does not use horses to grind grain.
  '29':
  - type: text
    content: 'All this also comes from the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: whose plan is wonderful,
  - type: text
    content: whose wisdom is magnificent.
  '3':
  - type: text
    content: That wreath, the pride of Ephraim’s drunkards,
  - type: text
    content: will be trampled underfoot.
  '4':
  - type: text
    content: That fading flower, his glorious beauty,
  - type: text
    content: set on the head of a fertile valley,
  - type: text
    content: will be like figs ripe before harvest—
  - type: text
    content: as soon as people see them and take them in hand,
  - type: text
    content: they swallow them.
  '5':
  - type: text
    content: 'In that day the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty'
  - type: text
    content: will be a glorious crown,
  - type: text
    content: a beautiful wreath
  - type: text
    content: for the remnant of his people.
  '6':
  - type: text
    content: He will be a spirit of justice
  - type: text
    content: to the one who sits in judgment,
  - type: text
    content: a source of strength
  - type: text
    content: to those who turn back the battle at the gate.
  '7':
  - type: text
    content: And these also stagger from wine
  - type: text
    content: 'and reel from beer:'
  - type: text
    content: Priests and prophets stagger from beer
  - type: text
    content: and are befuddled with wine;
  - type: text
    content: they reel from beer,
  - type: text
    content: they stagger when seeing visions,
  - type: text
    content: they stumble when rendering decisions.
  '8':
  - type: text
    content: All the tables are covered with vomit
  - type: text
    content: and there is not a spot without filth.
  '9':
  - type: text
    content: “Who is it he is trying to teach?
  - type: text
    content: To whom is he explaining his message?
  - type: text
    content: To children weaned from their milk,
  - type: text
    content: to those just taken from the breast?
