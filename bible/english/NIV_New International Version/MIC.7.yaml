document_id: MIC.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Misery
  - type: text
    content: What misery is mine!
  - type: text
    content: I am like one who gathers summer fruit
  - type: text
    content: at the gleaning of the vineyard;
  - type: text
    content: there is no cluster of grapes to eat,
  - type: text
    content: none of the early figs that I crave.
  '10':
  - type: text
    content: Then my enemy will see it
  - type: text
    content: and will be covered with shame,
  - type: text
    content: she who said to me,
  - type: text
    content: '“Where is the '
  - type: text
    content: Lord
  - type: text
    content: ' your God?”'
  - type: text
    content: My eyes will see her downfall;
  - type: text
    content: even now she will be trampled underfoot
  - type: text
    content: like mire in the streets.
  '11':
  - type: text
    content: The day for building your walls will come,
  - type: text
    content: the day for extending your boundaries.
  '12':
  - type: text
    content: In that day people will come to you
  - type: text
    content: from Assyria and the cities of Egypt,
  - type: text
    content: even from Egypt to the Euphrates
  - type: text
    content: and from sea to sea
  - type: text
    content: and from mountain to mountain.
  '13':
  - type: text
    content: The earth will become desolate because of its inhabitants,
  - type: text
    content: as the result of their deeds.
  - type: heading
    content: Prayer and Praise
  '14':
  - type: text
    content: Shepherd your people with your staff,
  - type: text
    content: the flock of your inheritance,
  - type: text
    content: which lives by itself in a forest,
  - type: text
    content: in fertile pasturelands.
  - type: note
    content: Or in the middle of Carmel
  - type: text
    content: Let them feed in Bashan and Gilead
  - type: text
    content: as in days long ago.
  '15':
  - type: text
    content: “As in the days when you came out of Egypt,
  - type: text
    content: I will show them my wonders.”
  '16':
  - type: text
    content: Nations will see and be ashamed,
  - type: text
    content: deprived of all their power.
  - type: text
    content: They will put their hands over their mouths
  - type: text
    content: and their ears will become deaf.
  '17':
  - type: text
    content: They will lick dust like a snake,
  - type: text
    content: like creatures that crawl on the ground.
  - type: text
    content: They will come trembling out of their dens;
  - type: text
    content: 'they will turn in fear to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God'
  - type: text
    content: and will be afraid of you.
  '18':
  - type: text
    content: Who is a God like you,
  - type: text
    content: who pardons sin and forgives the transgression
  - type: text
    content: of the remnant of his inheritance?
  - type: text
    content: You do not stay angry forever
  - type: text
    content: but delight to show mercy.
  '19':
  - type: text
    content: You will again have compassion on us;
  - type: text
    content: you will tread our sins underfoot
  - type: text
    content: and hurl all our iniquities into the depths of the sea.
  '2':
  - type: text
    content: The faithful have been swept from the land;
  - type: text
    content: not one upright person remains.
  - type: text
    content: Everyone lies in wait to shed blood;
  - type: text
    content: they hunt each other with nets.
  '20':
  - type: text
    content: You will be faithful to Jacob,
  - type: text
    content: and show love to Abraham,
  - type: text
    content: as you pledged on oath to our ancestors
  - type: text
    content: in days long ago.
  '3':
  - type: text
    content: Both hands are skilled in doing evil;
  - type: text
    content: the ruler demands gifts,
  - type: text
    content: the judge accepts bribes,
  - type: text
    content: the powerful dictate what they desire—
  - type: text
    content: they all conspire together.
  '4':
  - type: text
    content: The best of them is like a brier,
  - type: text
    content: the most upright worse than a thorn hedge.
  - type: text
    content: The day God visits you has come,
  - type: text
    content: the day your watchmen sound the alarm.
  - type: text
    content: Now is the time of your confusion.
  '5':
  - type: text
    content: Do not trust a neighbor;
  - type: text
    content: put no confidence in a friend.
  - type: text
    content: Even with the woman who lies in your embrace
  - type: text
    content: guard the words of your lips.
  '6':
  - type: text
    content: For a son dishonors his father,
  - type: text
    content: a daughter rises up against her mother,
  - type: text
    content: a daughter-in-law against her mother-in-law—
  - type: text
    content: a man’s enemies are the members of his own household.
  '7':
  - type: text
    content: 'But as for me, I watch in hope for the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: I wait for God my Savior;
  - type: text
    content: my God will hear me.
  - type: heading
    content: Israel Will Rise
  '8':
  - type: text
    content: Do not gloat over me, my enemy!
  - type: text
    content: Though I have fallen, I will rise.
  - type: text
    content: Though I sit in darkness,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will be my light.'
  '9':
  - type: text
    content: Because I have sinned against him,
  - type: text
    content: 'I will bear the '
  - type: text
    content: Lord
  - type: text
    content: ’s wrath,
  - type: text
    content: until he pleads my case
  - type: text
    content: and upholds my cause.
  - type: text
    content: He will bring me out into the light;
  - type: text
    content: I will see his righteousness.
