document_id: MIC.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Misery
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: What misery is mine!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am like one who gathers summer fruit
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the gleaning of the vineyard;
- type: usfm
  marker: q1
  children:
  - type: text
    text: there is no cluster of grapes to eat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: none of the early figs that I crave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The faithful have been swept from the land;
- type: usfm
  marker: q2
  children:
  - type: text
    text: not one upright person remains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone lies in wait to shed blood;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they hunt each other with nets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Both hands are skilled in doing evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ruler demands gifts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the judge accepts bribes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the powerful dictate what they desire—
- type: usfm
  marker: q2
  children:
  - type: text
    text: they all conspire together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The best of them is like a brier,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the most upright worse than a thorn hedge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The day God visits you has come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the day your watchmen sound the alarm.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now is the time of your confusion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Do not trust a neighbor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: put no confidence in a friend.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even with the woman who lies in your embrace
- type: usfm
  marker: q2
  children:
  - type: text
    text: guard the words of your lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For a son dishonors his father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a daughter rises up against her mother,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a daughter-in-law against her mother-in-law—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a man’s enemies are the members of his own household.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But as for me, I watch in hope for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: I wait for God my Savior;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my God will hear me.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Will Rise
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Do not gloat over me, my enemy!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Though I have fallen, I will rise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though I sit in darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be my light.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Because I have sinned against him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will bear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s wrath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: until he pleads my case
- type: usfm
  marker: q2
  children:
  - type: text
    text: and upholds my cause.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will bring me out into the light;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will see his righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then my enemy will see it
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will be covered with shame,
- type: usfm
  marker: q1
  children:
  - type: text
    text: she who said to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“Where is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God?”'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My eyes will see her downfall;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even now she will be trampled underfoot
- type: usfm
  marker: q2
  children:
  - type: text
    text: like mire in the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The day for building your walls will come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the day for extending your boundaries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: In that day people will come to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Assyria and the cities of Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even from Egypt to the Euphrates
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from sea to sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from mountain to mountain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The earth will become desolate because of its inhabitants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the result of their deeds.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prayer and Praise
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Shepherd your people with your staff,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the flock of your inheritance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: which lives by itself in a forest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in fertile pasturelands.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in the middle of Carmel
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them feed in Bashan and Gilead
- type: usfm
  marker: q2
  children:
  - type: text
    text: as in days long ago.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “As in the days when you came out of Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will show them my wonders.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nations will see and be ashamed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: deprived of all their power.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will put their hands over their mouths
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their ears will become deaf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They will lick dust like a snake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like creatures that crawl on the ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will come trembling out of their dens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they will turn in fear to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will be afraid of you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Who is a God like you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who pardons sin and forgives the transgression
- type: usfm
  marker: q2
  children:
  - type: text
    text: of the remnant of his inheritance?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You do not stay angry forever
- type: usfm
  marker: q2
  children:
  - type: text
    text: but delight to show mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You will again have compassion on us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will tread our sins underfoot
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hurl all our iniquities into the depths of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You will be faithful to Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and show love to Abraham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as you pledged on oath to our ancestors
- type: usfm
  marker: q2
  children:
  - type: text
    text: in days long ago.
