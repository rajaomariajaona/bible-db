document_id: JER.24,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Two Baskets of Figs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: After Jehoiachin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jeconiah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jehoiachin
      marker-yv: yv-n
    - type: text
      text: ' son of Jehoiakim king of Judah and the officials, the skilled workers and the artisans of Judah were carried into exile from Jerusalem to Babylon by Nebuchadnezzar king of Babylon, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' showed me two baskets of figs placed in front of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will send the sword, famine and plague against them until they are destroyed from the land I gave to them and their ancestors.’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One basket had very good figs, like those that ripen early; the other basket had very bad figs, so bad they could not be eaten.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked me, “What do you see, Jeremiah?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Figs,” I answered. “The good ones are very good, but the bad ones are so bad they cannot be eaten.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: ‘Like these good figs, I regard as good the exiles from Judah, whom I sent away from this place to the land of the Babylonians.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My eyes will watch over them for their good, and I will bring them back to this land. I will build them up and not tear them down; I will plant them and not uproot them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will give them a heart to know me, that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . They will be my people, and I will be their God, for they will return to me with all their heart.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘But like the bad figs, which are so bad they cannot be eaten,’ says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', ‘so will I deal with Zedekiah king of Judah, his officials and the survivors from Jerusalem, whether they remain in this land or live in Egypt. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make them abhorrent and an offense to all the kingdoms of the earth, a reproach and a byword, a curse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, their names will be used in cursing (see 29:22); or, others will see that they are cursed.
      marker-yv: yv-n
    - type: text
      text: ' and an object of ridicule, wherever I banish them. '
