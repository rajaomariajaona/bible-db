document_id: ZEC.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Man With a Measuring Line
  - type: note
    content: In Hebrew texts 2:1-13 is numbered 2:5-17.
  - type: text
    content: 'Then I looked up, and there before me was a man with a measuring line in his hand. '
  '10':
  - type: text
    content: '“Shout and be glad, Daughter Zion. For I am coming, and I will live among you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: '“Many nations will be joined with the '
  - type: text
    content: Lord
  - type: text
    content: ' in that day and will become my people. I will live among you and you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has sent me to you. '
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will inherit Judah as his portion in the holy land and will again choose Jerusalem. '
  '13':
  - type: text
    content: 'Be still before the '
  - type: text
    content: Lord
  - type: text
    content: ', all mankind, because he has roused himself from his holy dwelling.”'
  '2':
  - type: text
    content: I asked, “Where are you going?”
  - type: text
    content: He answered me, “To measure Jerusalem, to find out how wide and how long it is.”
  '3':
  - type: text
    content: 'While the angel who was speaking to me was leaving, another angel came to meet him '
  '4':
  - type: text
    content: 'and said to him: “Run, tell that young man, ‘Jerusalem will be a city without walls because of the great number of people and animals in it. '
  '5':
  - type: text
    content: 'And I myself will be a wall of fire around it,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘and I will be its glory within.’'
  '6':
  - type: text
    content: '“Come! Come! Flee from the land of the north,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “for I have scattered you to the four winds of heaven,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: '“Come, Zion! Escape, you who live in Daughter Babylon!” '
  '8':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: “After the Glorious One has sent me against the nations that have plundered you—for whoever touches you touches the apple of his eye— '
  '9':
  - type: text
    content: I will surely raise my hand against them so that their slaves will plunder them.
  - type: note
    content: 'Or says after… eye: 9 “I… plunder them.”'
  - type: text
    content: ' Then you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has sent me.'
