document_id: JDG.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Angel of the Lord at Bokim
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' went up from Gilgal to Bokim and said, “I brought you up out of Egypt and led you into the land I swore to give to your ancestors. I said, ‘I will never break my covenant with you, '
  '10':
  - type: text
    content: 'After that whole generation had been gathered to their ancestors, another generation grew up who knew neither the '
  - type: text
    content: Lord
  - type: text
    content: ' nor what he had done for Israel. '
  '11':
  - type: text
    content: 'Then the Israelites did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' and served the Baals. '
  '12':
  - type: text
    content: 'They forsook the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, who had brought them out of Egypt. They followed and worshiped various gods of the peoples around them. They aroused the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger '
  '13':
  - type: text
    content: 'because they forsook him and served Baal and the Ashtoreths. '
  '14':
  - type: text
    content: 'In his anger against Israel the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them into the hands of raiders who plundered them. He sold them into the hands of their enemies all around, whom they were no longer able to resist. '
  '15':
  - type: text
    content: 'Whenever Israel went out to fight, the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was against them to defeat them, just as he had sworn to them. They were in great distress.'
  '16':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up judges,'
  - type: note
    content: Or leaders; similarly in verses 17-19
  - type: text
    content: ' who saved them out of the hands of these raiders. '
  '17':
  - type: text
    content: 'Yet they would not listen to their judges but prostituted themselves to other gods and worshiped them. They quickly turned from the ways of their ancestors, who had been obedient to the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands. '
  '18':
  - type: text
    content: 'Whenever the '
  - type: text
    content: Lord
  - type: text
    content: ' raised up a judge for them, he was with the judge and saved them out of the hands of their enemies as long as the judge lived; for the '
  - type: text
    content: Lord
  - type: text
    content: ' relented because of their groaning under those who oppressed and afflicted them. '
  '19':
  - type: text
    content: But when the judge died, the people returned to ways even more corrupt than those of their ancestors, following other gods and serving and worshiping them. They refused to give up their evil practices and stubborn ways.
  '2':
  - type: text
    content: 'and you shall not make a covenant with the people of this land, but you shall break down their altars.’ Yet you have disobeyed me. Why have you done this? '
  '20':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with Israel and said, “Because this nation has violated the covenant I ordained for their ancestors and has not listened to me, '
  '21':
  - type: text
    content: 'I will no longer drive out before them any of the nations Joshua left when he died. '
  '22':
  - type: text
    content: 'I will use them to test Israel and see whether they will keep the way of the '
  - type: text
    content: Lord
  - type: text
    content: ' and walk in it as their ancestors did.” '
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had allowed those nations to remain; he did not drive them out at once by giving them into the hands of Joshua.'
  '3':
  - type: text
    content: And I have also said, ‘I will not drive them out before you; they will become traps for you, and their gods will become snares to you.’ ”
  '4':
  - type: text
    content: 'When the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken these things to all the Israelites, the people wept aloud, '
  '5':
  - type: text
    content: and they called that place Bokim.
  - type: note
    content: Bokim means weepers.
  - type: text
    content: ' There they offered sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Disobedience and Defeat
  '6':
  - type: text
    content: 'After Joshua had dismissed the Israelites, they went to take possession of the land, each to their own inheritance. '
  '7':
  - type: text
    content: 'The people served the '
  - type: text
    content: Lord
  - type: text
    content: ' throughout the lifetime of Joshua and of the elders who outlived him and who had seen all the great things the '
  - type: text
    content: Lord
  - type: text
    content: ' had done for Israel.'
  '8':
  - type: text
    content: 'Joshua son of Nun, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', died at the age of a hundred and ten. '
  '9':
  - type: text
    content: And they buried him in the land of his inheritance, at Timnath Heres
  - type: note
    content: Also known as Timnath Serah (see Joshua 19:50 and 24:30)
  - type: text
    content: ' in the hill country of Ephraim, north of Mount Gaash.'
