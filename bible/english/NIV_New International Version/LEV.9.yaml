document_id: LEV.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Priests Begin Their Ministry
  - type: text
    content: 'On the eighth day Moses summoned Aaron and his sons and the elders of Israel. '
  '10':
  - type: text
    content: 'On the altar he burned the fat, the kidneys and the long lobe of the liver from the sin offering, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses; '
  '11':
  - type: text
    content: the flesh and the hide he burned up outside the camp.
  '12':
  - type: text
    content: 'Then he slaughtered the burnt offering. His sons handed him the blood, and he splashed it against the sides of the altar. '
  '13':
  - type: text
    content: 'They handed him the burnt offering piece by piece, including the head, and he burned them on the altar. '
  '14':
  - type: text
    content: He washed the internal organs and the legs and burned them on top of the burnt offering on the altar.
  '15':
  - type: text
    content: Aaron then brought the offering that was for the people. He took the goat for the people’s sin offering and slaughtered it and offered it for a sin offering as he did with the first one.
  '16':
  - type: text
    content: 'He brought the burnt offering and offered it in the prescribed way. '
  '17':
  - type: text
    content: He also brought the grain offering, took a handful of it and burned it on the altar in addition to the morning’s burnt offering.
  '18':
  - type: text
    content: 'He slaughtered the ox and the ram as the fellowship offering for the people. His sons handed him the blood, and he splashed it against the sides of the altar. '
  '19':
  - type: text
    content: 'But the fat portions of the ox and the ram—the fat tail, the layer of fat, the kidneys and the long lobe of the liver— '
  '2':
  - type: text
    content: He said to Aaron, “Take a bull calf for your sin offering
  - type: note
    content: Or purification offering; here and throughout this chapter
  - type: text
    content: ' and a ram for your burnt offering, both without defect, and present them before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'these they laid on the breasts, and then Aaron burned the fat on the altar. '
  '21':
  - type: text
    content: 'Aaron waved the breasts and the right thigh before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering, as Moses commanded.'
  '22':
  - type: text
    content: Then Aaron lifted his hands toward the people and blessed them. And having sacrificed the sin offering, the burnt offering and the fellowship offering, he stepped down.
  '23':
  - type: text
    content: 'Moses and Aaron then went into the tent of meeting. When they came out, they blessed the people; and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to all the people. '
  '24':
  - type: text
    content: 'Fire came out from the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' and consumed the burnt offering and the fat portions on the altar. And when all the people saw it, they shouted for joy and fell facedown.'
  '3':
  - type: text
    content: 'Then say to the Israelites: ‘Take a male goat for a sin offering, a calf and a lamb—both a year old and without defect—for a burnt offering, '
  '4':
  - type: text
    content: and an ox
  - type: note
    content: The Hebrew word can refer to either male or female; also in verses 18 and 19.
  - type: text
    content: ' and a ram for a fellowship offering to sacrifice before the '
  - type: text
    content: Lord
  - type: text
    content: ', together with a grain offering mixed with olive oil. For today the '
  - type: text
    content: Lord
  - type: text
    content: ' will appear to you.’ ”'
  '5':
  - type: text
    content: 'They took the things Moses commanded to the front of the tent of meeting, and the entire assembly came near and stood before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Then Moses said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded you to do, so that the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' may appear to you.”'
  '7':
  - type: text
    content: 'Moses said to Aaron, “Come to the altar and sacrifice your sin offering and your burnt offering and make atonement for yourself and the people; sacrifice the offering that is for the people and make atonement for them, as the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.”'
  '8':
  - type: text
    content: 'So Aaron came to the altar and slaughtered the calf as a sin offering for himself. '
  '9':
  - type: text
    content: 'His sons brought the blood to him, and he dipped his finger into the blood and put it on the horns of the altar; the rest of the blood he poured out at the base of the altar. '
