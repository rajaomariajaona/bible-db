document_id: LEV.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Priests Begin Their Ministry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the eighth day Moses summoned Aaron and his sons and the elders of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the altar he burned the fat, the kidneys and the long lobe of the liver from the sin offering, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the flesh and the hide he burned up outside the camp.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he slaughtered the burnt offering. His sons handed him the blood, and he splashed it against the sides of the altar. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They handed him the burnt offering piece by piece, including the head, and he burned them on the altar. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He washed the internal organs and the legs and burned them on top of the burnt offering on the altar.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aaron then brought the offering that was for the people. He took the goat for the people’s sin offering and slaughtered it and offered it for a sin offering as he did with the first one.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He brought the burnt offering and offered it in the prescribed way. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also brought the grain offering, took a handful of it and burned it on the altar in addition to the morning’s burnt offering.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He slaughtered the ox and the ram as the fellowship offering for the people. His sons handed him the blood, and he splashed it against the sides of the altar. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the fat portions of the ox and the ram—the fat tail, the layer of fat, the kidneys and the long lobe of the liver— '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said to Aaron, “Take a bull calf for your sin offering
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: purification offering
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; here and throughout this chapter
      marker-yv: yv-n
    - type: text
      text: ' and a ram for your burnt offering, both without defect, and present them before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'these they laid on the breasts, and then Aaron burned the fat on the altar. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron waved the breasts and the right thigh before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a wave offering, as Moses commanded.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Aaron lifted his hands toward the people and blessed them. And having sacrificed the sin offering, the burnt offering and the fellowship offering, he stepped down.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses and Aaron then went into the tent of meeting. When they came out, they blessed the people; and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to all the people. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fire came out from the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and consumed the burnt offering and the fat portions on the altar. And when all the people saw it, they shouted for joy and fell facedown.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then say to the Israelites: ‘Take a male goat for a sin offering, a calf and a lamb—both a year old and without defect—for a burnt offering, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and an ox
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word can refer to either male or female; also in verses 18 and 19.
      marker-yv: yv-n
    - type: text
      text: ' and a ram for a fellowship offering to sacrifice before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', together with a grain offering mixed with olive oil. For today the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will appear to you.’ ”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They took the things Moses commanded to the front of the tent of meeting, and the entire assembly came near and stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded you to do, so that the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' may appear to you.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses said to Aaron, “Come to the altar and sacrifice your sin offering and your burnt offering and make atonement for yourself and the people; sacrifice the offering that is for the people and make atonement for them, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Aaron came to the altar and slaughtered the calf as a sin offering for himself. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His sons brought the blood to him, and he dipped his finger into the blood and put it on the horns of the altar; the rest of the blood he poured out at the base of the altar. '
