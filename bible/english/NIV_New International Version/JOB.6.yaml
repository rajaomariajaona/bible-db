document_id: JOB.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job
  - type: text
    content: 'Then Job replied:'
  '10':
  - type: text
    content: Then I would still have this consolation—
  - type: text
    content: my joy in unrelenting pain—
  - type: text
    content: that I had not denied the words of the Holy One.
  '11':
  - type: text
    content: “What strength do I have, that I should still hope?
  - type: text
    content: What prospects, that I should be patient?
  '12':
  - type: text
    content: Do I have the strength of stone?
  - type: text
    content: Is my flesh bronze?
  '13':
  - type: text
    content: Do I have any power to help myself,
  - type: text
    content: now that success has been driven from me?
  '14':
  - type: text
    content: “Anyone who withholds kindness from a friend
  - type: text
    content: forsakes the fear of the Almighty.
  '15':
  - type: text
    content: But my brothers are as undependable as intermittent streams,
  - type: text
    content: as the streams that overflow
  '16':
  - type: text
    content: when darkened by thawing ice
  - type: text
    content: and swollen with melting snow,
  '17':
  - type: text
    content: but that stop flowing in the dry season,
  - type: text
    content: and in the heat vanish from their channels.
  '18':
  - type: text
    content: Caravans turn aside from their routes;
  - type: text
    content: they go off into the wasteland and perish.
  '19':
  - type: text
    content: The caravans of Tema look for water,
  - type: text
    content: the traveling merchants of Sheba look in hope.
  '2':
  - type: text
    content: “If only my anguish could be weighed
  - type: text
    content: and all my misery be placed on the scales!
  '20':
  - type: text
    content: They are distressed, because they had been confident;
  - type: text
    content: they arrive there, only to be disappointed.
  '21':
  - type: text
    content: Now you too have proved to be of no help;
  - type: text
    content: you see something dreadful and are afraid.
  '22':
  - type: text
    content: Have I ever said, ‘Give something on my behalf,
  - type: text
    content: pay a ransom for me from your wealth,
  '23':
  - type: text
    content: deliver me from the hand of the enemy,
  - type: text
    content: rescue me from the clutches of the ruthless’?
  '24':
  - type: text
    content: “Teach me, and I will be quiet;
  - type: text
    content: show me where I have been wrong.
  '25':
  - type: text
    content: How painful are honest words!
  - type: text
    content: But what do your arguments prove?
  '26':
  - type: text
    content: Do you mean to correct what I say,
  - type: text
    content: and treat my desperate words as wind?
  '27':
  - type: text
    content: You would even cast lots for the fatherless
  - type: text
    content: and barter away your friend.
  '28':
  - type: text
    content: “But now be so kind as to look at me.
  - type: text
    content: Would I lie to your face?
  '29':
  - type: text
    content: Relent, do not be unjust;
  - type: text
    content: reconsider, for my integrity is at stake.
  - type: note
    content: Or my righteousness still stands
  '3':
  - type: text
    content: It would surely outweigh the sand of the seas—
  - type: text
    content: no wonder my words have been impetuous.
  '30':
  - type: text
    content: Is there any wickedness on my lips?
  - type: text
    content: Can my mouth not discern malice?
  '4':
  - type: text
    content: The arrows of the Almighty are in me,
  - type: text
    content: my spirit drinks in their poison;
  - type: text
    content: God’s terrors are marshaled against me.
  '5':
  - type: text
    content: Does a wild donkey bray when it has grass,
  - type: text
    content: or an ox bellow when it has fodder?
  '6':
  - type: text
    content: Is tasteless food eaten without salt,
  - type: text
    content: or is there flavor in the sap of the mallow
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: '?'
  '7':
  - type: text
    content: I refuse to touch it;
  - type: text
    content: such food makes me ill.
  '8':
  - type: text
    content: “Oh, that I might have my request,
  - type: text
    content: that God would grant what I hope for,
  '9':
  - type: text
    content: that God would be willing to crush me,
  - type: text
    content: to let loose his hand and cut off my life!
