document_id: JOB.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Job replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then I would still have this consolation—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my joy in unrelenting pain—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I had not denied the words of the Holy One.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “What strength do I have, that I should still hope?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What prospects, that I should be patient?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Do I have the strength of stone?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is my flesh bronze?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Do I have any power to help myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now that success has been driven from me?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Anyone who withholds kindness from a friend
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forsakes the fear of the Almighty.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But my brothers are as undependable as intermittent streams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the streams that overflow
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: when darkened by thawing ice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and swollen with melting snow,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: but that stop flowing in the dry season,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in the heat vanish from their channels.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Caravans turn aside from their routes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they go off into the wasteland and perish.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The caravans of Tema look for water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the traveling merchants of Sheba look in hope.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “If only my anguish could be weighed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all my misery be placed on the scales!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: They are distressed, because they had been confident;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they arrive there, only to be disappointed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Now you too have proved to be of no help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you see something dreadful and are afraid.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Have I ever said, ‘Give something on my behalf,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay a ransom for me from your wealth,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: deliver me from the hand of the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rescue me from the clutches of the ruthless’?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Teach me, and I will be quiet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: show me where I have been wrong.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: How painful are honest words!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But what do your arguments prove?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Do you mean to correct what I say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and treat my desperate words as wind?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: You would even cast lots for the fatherless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and barter away your friend.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “But now be so kind as to look at me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Would I lie to your face?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Relent, do not be unjust;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reconsider, for my integrity is at stake.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: my righteousness still stands
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: It would surely outweigh the sand of the seas—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no wonder my words have been impetuous.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Is there any wickedness on my lips?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can my mouth not discern malice?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The arrows of the Almighty are in me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my spirit drinks in their poison;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God’s terrors are marshaled against me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Does a wild donkey bray when it has grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or an ox bellow when it has fodder?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Is tasteless food eaten without salt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or is there flavor in the sap of the mallow
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: '?'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I refuse to touch it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: such food makes me ill.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Oh, that I might have my request,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that God would grant what I hope for,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: that God would be willing to crush me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to let loose his hand and cut off my life!
