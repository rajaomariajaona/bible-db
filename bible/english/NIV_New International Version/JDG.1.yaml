document_id: JDG.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Fights the Remaining Canaanites
  - type: text
    content: 'After the death of Joshua, the Israelites asked the '
  - type: text
    content: Lord
  - type: text
    content: ', “Who of us is to go up first to fight against the Canaanites?”'
  '10':
  - type: text
    content: 'They advanced against the Canaanites living in Hebron (formerly called Kiriath Arba) and defeated Sheshai, Ahiman and Talmai. '
  '11':
  - type: text
    content: From there they advanced against the people living in Debir (formerly called Kiriath Sepher).
  '12':
  - type: text
    content: 'And Caleb said, “I will give my daughter Aksah in marriage to the man who attacks and captures Kiriath Sepher.” '
  '13':
  - type: text
    content: Othniel son of Kenaz, Caleb’s younger brother, took it; so Caleb gave his daughter Aksah to him in marriage.
  '14':
  - type: text
    content: One day when she came to Othniel, she urged him
  - type: note
    content: Hebrew; Septuagint and Vulgate Othniel, he urged her
  - type: text
    content: ' to ask her father for a field. When she got off her donkey, Caleb asked her, “What can I do for you?”'
  '15':
  - type: text
    content: She replied, “Do me a special favor. Since you have given me land in the Negev, give me also springs of water.” So Caleb gave her the upper and lower springs.
  '16':
  - type: text
    content: The descendants of Moses’ father-in-law, the Kenite, went up from the City of Palms
  - type: note
    content: That is, Jericho
  - type: text
    content: ' with the people of Judah to live among the inhabitants of the Desert of Judah in the Negev near Arad.'
  '17':
  - type: text
    content: Then the men of Judah went with the Simeonites their fellow Israelites and attacked the Canaanites living in Zephath, and they totally destroyed
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' the city. Therefore it was called Hormah.'
  - type: note
    content: Hormah means destruction.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Judah also took
  - type: note
    content: Hebrew; Septuagint Judah did not take
  - type: text
    content: ' Gaza, Ashkelon and Ekron—each city with its territory.'
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was with the men of Judah. They took possession of the hill country, but they were unable to drive the people from the plains, because they had chariots fitted with iron. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered, “Judah shall go up; I have given the land into their hands.”'
  '20':
  - type: text
    content: 'As Moses had promised, Hebron was given to Caleb, who drove from it the three sons of Anak. '
  '21':
  - type: text
    content: The Benjamites, however, did not drive out the Jebusites, who were living in Jerusalem; to this day the Jebusites live there with the Benjamites.
  '22':
  - type: text
    content: 'Now the tribes of Joseph attacked Bethel, and the '
  - type: text
    content: Lord
  - type: text
    content: ' was with them. '
  '23':
  - type: text
    content: 'When they sent men to spy out Bethel (formerly called Luz), '
  '24':
  - type: text
    content: 'the spies saw a man coming out of the city and they said to him, “Show us how to get into the city and we will see that you are treated well.” '
  '25':
  - type: text
    content: 'So he showed them, and they put the city to the sword but spared the man and his whole family. '
  '26':
  - type: text
    content: He then went to the land of the Hittites, where he built a city and called it Luz, which is its name to this day.
  '27':
  - type: text
    content: 'But Manasseh did not drive out the people of Beth Shan or Taanach or Dor or Ibleam or Megiddo and their surrounding settlements, for the Canaanites were determined to live in that land. '
  '28':
  - type: text
    content: 'When Israel became strong, they pressed the Canaanites into forced labor but never drove them out completely. '
  '29':
  - type: text
    content: 'Nor did Ephraim drive out the Canaanites living in Gezer, but the Canaanites continued to live there among them. '
  '3':
  - type: text
    content: The men of Judah then said to the Simeonites their fellow Israelites, “Come up with us into the territory allotted to us, to fight against the Canaanites. We in turn will go with you into yours.” So the Simeonites went with them.
  '30':
  - type: text
    content: 'Neither did Zebulun drive out the Canaanites living in Kitron or Nahalol, so these Canaanites lived among them, but Zebulun did subject them to forced labor. '
  '31':
  - type: text
    content: 'Nor did Asher drive out those living in Akko or Sidon or Ahlab or Akzib or Helbah or Aphek or Rehob. '
  '32':
  - type: text
    content: 'The Asherites lived among the Canaanite inhabitants of the land because they did not drive them out. '
  '33':
  - type: text
    content: 'Neither did Naphtali drive out those living in Beth Shemesh or Beth Anath; but the Naphtalites too lived among the Canaanite inhabitants of the land, and those living in Beth Shemesh and Beth Anath became forced laborers for them. '
  '34':
  - type: text
    content: 'The Amorites confined the Danites to the hill country, not allowing them to come down into the plain. '
  '35':
  - type: text
    content: 'And the Amorites were determined also to hold out in Mount Heres, Aijalon and Shaalbim, but when the power of the tribes of Joseph increased, they too were pressed into forced labor. '
  '36':
  - type: text
    content: The boundary of the Amorites was from Scorpion Pass to Sela and beyond.
  '4':
  - type: text
    content: 'When Judah attacked, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave the Canaanites and Perizzites into their hands, and they struck down ten thousand men at Bezek. '
  '5':
  - type: text
    content: 'It was there that they found Adoni-Bezek and fought against him, putting to rout the Canaanites and Perizzites. '
  '6':
  - type: text
    content: Adoni-Bezek fled, but they chased him and caught him, and cut off his thumbs and big toes.
  '7':
  - type: text
    content: Then Adoni-Bezek said, “Seventy kings with their thumbs and big toes cut off have picked up scraps under my table. Now God has paid me back for what I did to them.” They brought him to Jerusalem, and he died there.
  '8':
  - type: text
    content: The men of Judah attacked Jerusalem also and took it. They put the city to the sword and set it on fire.
  '9':
  - type: text
    content: 'After that, Judah went down to fight against the Canaanites living in the hill country, the Negev and the western foothills. '
