document_id: 1SA.24,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Spares Saul’s Life
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 24:1-22 is numbered 24:22-23.
      marker-yv: yv-n
    - type: text
      text: 'After Saul returned from pursuing the Philistines, he was told, “David is in the Desert of En Gedi.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This day you have seen with your own eyes how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivered you into my hands in the cave. Some urged me to kill you, but I spared you; I said, ‘I will not lay my hand on my lord, because he is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anointed.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See, my father, look at this piece of your robe in my hand! I cut off the corner of your robe but did not kill you. See that there is nothing in my hand to indicate that I am guilty of wrongdoing or rebellion. I have not wronged you, but you are hunting me down to take my life. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' judge between you and me. And may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' avenge the wrongs you have done to me, but my hand will not touch you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As the old saying goes, ‘From evildoers come evil deeds,’ so my hand will not touch you.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Against whom has the king of Israel come out? Who are you pursuing? A dead dog? A flea? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be our judge and decide between us. May he consider my cause and uphold it; may he vindicate me by delivering me from your hand.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David finished saying this, Saul asked, “Is that your voice, David my son?” And he wept aloud. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You are more righteous than I,” he said. “You have treated me well, but I have treated you badly. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have just now told me about the good you did to me; the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivered me into your hands, but you did not kill me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When a man finds his enemy, does he let him get away unharmed? May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reward you well for the way you treated me today. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Saul took three thousand able young men from all Israel and set out to look for David and his men near the Crags of the Wild Goats.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I know that you will surely be king and that the kingdom of Israel will be established in your hands. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now swear to me by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that you will not kill off my descendants or wipe out my name from my father’s family.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David gave his oath to Saul. Then Saul returned home, but David and his men went up to the stronghold.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He came to the sheep pens along the way; a cave was there, and Saul went in to relieve himself. David and his men were far back in the cave. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men said, “This is the day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke of when he said'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '“Today the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' is saying'
      marker-yv: yv-n
    - type: text
      text: ' to you, ‘I will give your enemy into your hands for you to deal with as you wish.’ ” Then David crept up unnoticed and cut off a corner of Saul’s robe.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward, David was conscience-stricken for having cut off a corner of his robe. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to his men, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forbid that I should do such a thing to my master, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anointed, or lay my hand on him; for he is the anointed of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: With these words David sharply rebuked his men and did not allow them to attack Saul. And Saul left the cave and went his way.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David went out of the cave and called out to Saul, “My lord the king!” When Saul looked behind him, David bowed down and prostrated himself with his face to the ground. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to Saul, “Why do you listen when men say, ‘David is bent on harming you’? '
