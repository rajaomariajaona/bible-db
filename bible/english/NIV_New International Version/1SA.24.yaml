document_id: 1SA.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Spares Saul’s Life
  - type: note
    content: In Hebrew texts 24:1-22 is numbered 24:22-23.
  - type: text
    content: 'After Saul returned from pursuing the Philistines, he was told, “David is in the Desert of En Gedi.” '
  '10':
  - type: text
    content: 'This day you have seen with your own eyes how the '
  - type: text
    content: Lord
  - type: text
    content: ' delivered you into my hands in the cave. Some urged me to kill you, but I spared you; I said, ‘I will not lay my hand on my lord, because he is the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed.’ '
  '11':
  - type: text
    content: 'See, my father, look at this piece of your robe in my hand! I cut off the corner of your robe but did not kill you. See that there is nothing in my hand to indicate that I am guilty of wrongdoing or rebellion. I have not wronged you, but you are hunting me down to take my life. '
  '12':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' judge between you and me. And may the '
  - type: text
    content: Lord
  - type: text
    content: ' avenge the wrongs you have done to me, but my hand will not touch you. '
  '13':
  - type: text
    content: As the old saying goes, ‘From evildoers come evil deeds,’ so my hand will not touch you.
  '14':
  - type: text
    content: '“Against whom has the king of Israel come out? Who are you pursuing? A dead dog? A flea? '
  '15':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' be our judge and decide between us. May he consider my cause and uphold it; may he vindicate me by delivering me from your hand.”'
  '16':
  - type: text
    content: 'When David finished saying this, Saul asked, “Is that your voice, David my son?” And he wept aloud. '
  '17':
  - type: text
    content: '“You are more righteous than I,” he said. “You have treated me well, but I have treated you badly. '
  '18':
  - type: text
    content: 'You have just now told me about the good you did to me; the '
  - type: text
    content: Lord
  - type: text
    content: ' delivered me into your hands, but you did not kill me. '
  '19':
  - type: text
    content: 'When a man finds his enemy, does he let him get away unharmed? May the '
  - type: text
    content: Lord
  - type: text
    content: ' reward you well for the way you treated me today. '
  '2':
  - type: text
    content: So Saul took three thousand able young men from all Israel and set out to look for David and his men near the Crags of the Wild Goats.
  '20':
  - type: text
    content: 'I know that you will surely be king and that the kingdom of Israel will be established in your hands. '
  '21':
  - type: text
    content: 'Now swear to me by the '
  - type: text
    content: Lord
  - type: text
    content: ' that you will not kill off my descendants or wipe out my name from my father’s family.”'
  '22':
  - type: text
    content: So David gave his oath to Saul. Then Saul returned home, but David and his men went up to the stronghold.
  '3':
  - type: text
    content: 'He came to the sheep pens along the way; a cave was there, and Saul went in to relieve himself. David and his men were far back in the cave. '
  '4':
  - type: text
    content: 'The men said, “This is the day the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke of when he said'
  - type: note
    content: Or “Today the Lord is saying
  - type: text
    content: ' to you, ‘I will give your enemy into your hands for you to deal with as you wish.’ ” Then David crept up unnoticed and cut off a corner of Saul’s robe.'
  '5':
  - type: text
    content: 'Afterward, David was conscience-stricken for having cut off a corner of his robe. '
  '6':
  - type: text
    content: 'He said to his men, “The '
  - type: text
    content: Lord
  - type: text
    content: ' forbid that I should do such a thing to my master, the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed, or lay my hand on him; for he is the anointed of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '7':
  - type: text
    content: With these words David sharply rebuked his men and did not allow them to attack Saul. And Saul left the cave and went his way.
  '8':
  - type: text
    content: 'Then David went out of the cave and called out to Saul, “My lord the king!” When Saul looked behind him, David bowed down and prostrated himself with his face to the ground. '
  '9':
  - type: text
    content: 'He said to Saul, “Why do you listen when men say, ‘David is bent on harming you’? '
