document_id: 1SA.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel Rebukes Saul
  - type: text
    content: Saul was thirty
  - type: note
    content: A few late manuscripts of the Septuagint; Hebrew does not have thirty.
  - type: text
    content: ' years old when he became king, and he reigned over Israel forty-'
  - type: note
    content: Probable reading of the original Hebrew text (see Acts 13:21); Masoretic Text does not have forty-.
  - type: text
    content: ' two years.'
  '10':
  - type: text
    content: Just as he finished making the offering, Samuel arrived, and Saul went out to greet him.
  '11':
  - type: text
    content: “What have you done?” asked Samuel.
  - type: text
    content: 'Saul replied, “When I saw that the men were scattering, and that you did not come at the set time, and that the Philistines were assembling at Mikmash, '
  '12':
  - type: text
    content: 'I thought, ‘Now the Philistines will come down against me at Gilgal, and I have not sought the '
  - type: text
    content: Lord
  - type: text
    content: ’s favor.’ So I felt compelled to offer the burnt offering.”
  '13':
  - type: text
    content: '“You have done a foolish thing,” Samuel said. “You have not kept the command the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gave you; if you had, he would have established your kingdom over Israel for all time. '
  '14':
  - type: text
    content: 'But now your kingdom will not endure; the '
  - type: text
    content: Lord
  - type: text
    content: ' has sought out a man after his own heart and appointed him ruler of his people, because you have not kept the '
  - type: text
    content: Lord
  - type: text
    content: ’s command.”
  '15':
  - type: text
    content: Then Samuel left Gilgal
  - type: note
    content: Hebrew; Septuagint Gilgal and went his way; the rest of the people went after Saul to meet the army, and they went out of Gilgal
  - type: text
    content: ' and went up to Gibeah in Benjamin, and Saul counted the men who were with him. They numbered about six hundred.'
  - type: heading
    content: Israel Without Weapons
  '16':
  - type: text
    content: Saul and his son Jonathan and the men with them were staying in Gibeah
  - type: note
    content: Two Hebrew manuscripts; most Hebrew manuscripts Geba, a variant of Gibeah
  - type: text
    content: ' in Benjamin, while the Philistines camped at Mikmash. '
  '17':
  - type: text
    content: 'Raiding parties went out from the Philistine camp in three detachments. One turned toward Ophrah in the vicinity of Shual, '
  '18':
  - type: text
    content: another toward Beth Horon, and the third toward the borderland overlooking the Valley of Zeboyim facing the wilderness.
  '19':
  - type: text
    content: 'Not a blacksmith could be found in the whole land of Israel, because the Philistines had said, “Otherwise the Hebrews will make swords or spears!” '
  '2':
  - type: text
    content: Saul chose three thousand men from Israel; two thousand were with him at Mikmash and in the hill country of Bethel, and a thousand were with Jonathan at Gibeah in Benjamin. The rest of the men he sent back to their homes.
  '20':
  - type: text
    content: So all Israel went down to the Philistines to have their plow points, mattocks, axes and sickles
  - type: note
    content: Septuagint; Hebrew plow points
  - type: text
    content: ' sharpened. '
  '21':
  - type: text
    content: The price was two-thirds of a shekel
  - type: note
    content: That is, about 1/4 ounce or about 8 grams
  - type: text
    content: ' for sharpening plow points and mattocks, and a third of a shekel'
  - type: note
    content: That is, about 1/8 ounce or about 4 grams
  - type: text
    content: ' for sharpening forks and axes and for repointing goads.'
  '22':
  - type: text
    content: So on the day of the battle not a soldier with Saul and Jonathan had a sword or spear in his hand; only Saul and his son Jonathan had them.
  - type: heading
    content: Jonathan Attacks the Philistines
  '23':
  - type: text
    content: Now a detachment of Philistines had gone out to the pass at Mikmash.
  '3':
  - type: text
    content: 'Jonathan attacked the Philistine outpost at Geba, and the Philistines heard about it. Then Saul had the trumpet blown throughout the land and said, “Let the Hebrews hear!” '
  '4':
  - type: text
    content: 'So all Israel heard the news: “Saul has attacked the Philistine outpost, and now Israel has become obnoxious to the Philistines.” And the people were summoned to join Saul at Gilgal.'
  '5':
  - type: text
    content: The Philistines assembled to fight Israel, with three thousand
  - type: note
    content: Some Septuagint manuscripts and Syriac; Hebrew thirty thousand
  - type: text
    content: ' chariots, six thousand charioteers, and soldiers as numerous as the sand on the seashore. They went up and camped at Mikmash, east of Beth Aven. '
  '6':
  - type: text
    content: 'When the Israelites saw that their situation was critical and that their army was hard pressed, they hid in caves and thickets, among the rocks, and in pits and cisterns. '
  '7':
  - type: text
    content: Some Hebrews even crossed the Jordan to the land of Gad and Gilead.
  - type: text
    content: 'Saul remained at Gilgal, and all the troops with him were quaking with fear. '
  '8':
  - type: text
    content: 'He waited seven days, the time set by Samuel; but Samuel did not come to Gilgal, and Saul’s men began to scatter. '
  '9':
  - type: text
    content: 'So he said, “Bring me the burnt offering and the fellowship offerings.” And Saul offered up the burnt offering. '
