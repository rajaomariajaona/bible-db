  - type: text
    text: Samuel Rebukes Saul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Saul was thirty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A few late manuscripts of the Septuagint; Hebrew does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: thirty
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' years old when he became king, and he reigned over Israel forty-'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probable reading of the original Hebrew text (see Acts 13:21); Masoretic Text does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: forty-
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' two years.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Saul chose three thousand men from Israel; two thousand were with him at Mikmash and in the hill country of Bethel, and a thousand were with Jonathan at Gibeah in Benjamin. The rest of the men he sent back to their homes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jonathan attacked the Philistine outpost at Geba, and the Philistines heard about it. Then Saul had the trumpet blown throughout the land and said, “Let the Hebrews hear!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So all Israel heard the news: “Saul has attacked the Philistine outpost, and now Israel has become obnoxious to the Philistines.” And the people were summoned to join Saul at Gilgal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The Philistines assembled to fight Israel, with three thousand
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts and Syriac; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: thirty thousand
    marker-yv: yv-n
  - type: text
    text: ' chariots, six thousand charioteers, and soldiers as numerous as the sand on the seashore. They went up and camped at Mikmash, east of Beth Aven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When the Israelites saw that their situation was critical and that their army was hard pressed, they hid in caves and thickets, among the rocks, and in pits and cisterns. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Some Hebrews even crossed the Jordan to the land of Gad and Gilead.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Saul remained at Gilgal, and all the troops with him were quaking with fear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He waited seven days, the time set by Samuel; but Samuel did not come to Gilgal, and Saul’s men began to scatter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So he said, “Bring me the burnt offering and the fellowship offerings.” And Saul offered up the burnt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Just as he finished making the offering, Samuel arrived, and Saul went out to greet him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “What have you done?” asked Samuel.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Saul replied, “When I saw that the men were scattering, and that you did not come at the set time, and that the Philistines were assembling at Mikmash, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I thought, ‘Now the Philistines will come down against me at Gilgal, and I have not sought the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s favor.’ So I felt compelled to offer the burnt offering.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“You have done a foolish thing,” Samuel said. “You have not kept the command the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God gave you; if you had, he would have established your kingdom over Israel for all time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But now your kingdom will not endure; the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has sought out a man after his own heart and appointed him ruler of his people, because you have not kept the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s command.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Samuel left Gilgal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gilgal and went his way; the rest of the people went after Saul to meet the army, and they went out of Gilgal
    marker-yv: yv-n
  - type: text
    text: ' and went up to Gibeah in Benjamin, and Saul counted the men who were with him. They numbered about six hundred.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Without Weapons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Saul and his son Jonathan and the men with them were staying in Gibeah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Two Hebrew manuscripts; most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Geba, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gibeah
    marker-yv: yv-n
  - type: text
    text: ' in Benjamin, while the Philistines camped at Mikmash. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Raiding parties went out from the Philistine camp in three detachments. One turned toward Ophrah in the vicinity of Shual, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: another toward Beth Horon, and the third toward the borderland overlooking the Valley of Zeboyim facing the wilderness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Not a blacksmith could be found in the whole land of Israel, because the Philistines had said, “Otherwise the Hebrews will make swords or spears!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So all Israel went down to the Philistines to have their plow points, mattocks, axes and sickles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: plow points
    marker-yv: yv-n
  - type: text
    text: ' sharpened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The price was two-thirds of a shekel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1/4 ounce or about 8 grams
    marker-yv: yv-n
  - type: text
    text: ' for sharpening plow points and mattocks, and a third of a shekel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1/8 ounce or about 4 grams
    marker-yv: yv-n
  - type: text
    text: ' for sharpening forks and axes and for repointing goads.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So on the day of the battle not a soldier with Saul and Jonathan had a sword or spear in his hand; only Saul and his son Jonathan had them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jonathan Attacks the Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Now a detachment of Philistines had gone out to the pass at Mikmash.
