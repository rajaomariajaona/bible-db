document_id: 2CH.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Other Activities
  - type: text
    content: 'At the end of twenty years, during which Solomon built the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and his own palace, '
  '10':
  - type: text
    content: They were also King Solomon’s chief officials—two hundred and fifty officials supervising the men.
  '11':
  - type: text
    content: 'Solomon brought Pharaoh’s daughter up from the City of David to the palace he had built for her, for he said, “My wife must not live in the palace of David king of Israel, because the places the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' has entered are holy.”'
  '12':
  - type: text
    content: 'On the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he had built in front of the portico, Solomon sacrificed burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '13':
  - type: text
    content: 'according to the daily requirement for offerings commanded by Moses for the Sabbaths, the New Moons and the three annual festivals—the Festival of Unleavened Bread, the Festival of Weeks and the Festival of Tabernacles. '
  '14':
  - type: text
    content: 'In keeping with the ordinance of his father David, he appointed the divisions of the priests for their duties, and the Levites to lead the praise and to assist the priests according to each day’s requirement. He also appointed the gatekeepers by divisions for the various gates, because this was what David the man of God had ordered. '
  '15':
  - type: text
    content: They did not deviate from the king’s commands to the priests or to the Levites in any matter, including that of the treasuries.
  '16':
  - type: text
    content: 'All Solomon’s work was carried out, from the day the foundation of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' was laid until its completion. So the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' was finished.'
  '17':
  - type: text
    content: 'Then Solomon went to Ezion Geber and Elath on the coast of Edom. '
  '18':
  - type: text
    content: And Hiram sent him ships commanded by his own men, sailors who knew the sea. These, with Solomon’s men, sailed to Ophir and brought back four hundred and fifty talents
  - type: note
    content: That is, about 17 tons or about 15 metric tons
  - type: text
    content: ' of gold, which they delivered to King Solomon.'
  '2':
  - type: text
    content: Solomon rebuilt the villages that Hiram
  - type: note
    content: Hebrew Huram, a variant of Hiram; also in verse 18
  - type: text
    content: ' had given him, and settled Israelites in them. '
  '3':
  - type: text
    content: 'Solomon then went to Hamath Zobah and captured it. '
  '4':
  - type: text
    content: 'He also built up Tadmor in the desert and all the store cities he had built in Hamath. '
  '5':
  - type: text
    content: 'He rebuilt Upper Beth Horon and Lower Beth Horon as fortified cities, with walls and with gates and bars, '
  '6':
  - type: text
    content: as well as Baalath and all his store cities, and all the cities for his chariots and for his horses
  - type: note
    content: Or charioteers
  - type: text
    content: —whatever he desired to build in Jerusalem, in Lebanon and throughout all the territory he ruled.
  '7':
  - type: text
    content: 'There were still people left from the Hittites, Amorites, Perizzites, Hivites and Jebusites (these people were not Israelites). '
  '8':
  - type: text
    content: 'Solomon conscripted the descendants of all these people remaining in the land—whom the Israelites had not destroyed—to serve as slave labor, as it is to this day. '
  '9':
  - type: text
    content: 'But Solomon did not make slaves of the Israelites for his work; they were his fighting men, commanders of his captains, and commanders of his chariots and charioteers. '
