verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth of Isaac
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was gracious to Sarah as he had said, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did for Sarah what he had promised. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and she said to Abraham, “Get rid of that slave woman and her son, for that woman’s son will never share in the inheritance with my son Isaac.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The matter distressed Abraham greatly because it concerned his son. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But God said to him, “Do not be so distressed about the boy and your slave woman. Listen to whatever Sarah tells you, because it is through Isaac that your offspring
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seed
      marker-yv: yv-n
    - type: text
      text: ' will be reckoned. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make the son of the slave into a nation also, because he is your offspring.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Early the next morning Abraham took some food and a skin of water and gave them to Hagar. He set them on her shoulders and then sent her off with the boy. She went on her way and wandered in the Desert of Beersheba.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the water in the skin was gone, she put the boy under one of the bushes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then she went off and sat down about a bowshot away, for she thought, “I cannot watch the boy die.” And as she sat there, she
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the child
      marker-yv: yv-n
    - type: text
      text: ' began to sob.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God heard the boy crying, and the angel of God called to Hagar from heaven and said to her, “What is the matter, Hagar? Do not be afraid; God has heard the boy crying as he lies there. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lift the boy up and take him by the hand, for I will make him into a great nation.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then God opened her eyes and she saw a well of water. So she went and filled the skin with water and gave the boy a drink.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sarah became pregnant and bore a son to Abraham in his old age, at the very time God had promised him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God was with the boy as he grew up. He lived in the desert and became an archer. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While he was living in the Desert of Paran, his mother got a wife for him from Egypt.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Treaty at Beersheba
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Abimelek and Phicol the commander of his forces said to Abraham, “God is with you in everything you do. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now swear to me here before God that you will not deal falsely with me or my children or my descendants. Show to me and the country where you now reside as a foreigner the same kindness I have shown to you.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abraham said, “I swear it.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abraham complained to Abimelek about a well of water that Abimelek’s servants had seized. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Abimelek said, “I don’t know who has done this. You did not tell me, and I heard about it only today.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abraham brought sheep and cattle and gave them to Abimelek, and the two men made a treaty. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham set apart seven ewe lambs from the flock, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Abimelek asked Abraham, “What is the meaning of these seven ewe lambs you have set apart by themselves?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abraham gave the name Isaac
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Isaac '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he laughs.
      marker-yv: yv-n
    - type: text
      text: ' to the son Sarah bore him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He replied, “Accept these seven lambs from my hand as a witness that I dug this well.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So that place was called Beersheba,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beersheba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'can mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'well of seven '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: well of the oath.
      marker-yv: yv-n
    - type: text
      text: ' because the two men swore an oath there.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the treaty had been made at Beersheba, Abimelek and Phicol the commander of his forces returned to the land of the Philistines. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham planted a tamarisk tree in Beersheba, and there he called on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the Eternal God. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Abraham stayed in the land of the Philistines for a long time.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When his son Isaac was eight days old, Abraham circumcised him, as God commanded him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abraham was a hundred years old when his son Isaac was born to him.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sarah said, “God has brought me laughter, and everyone who hears about this will laugh with me.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And she added, “Who would have said to Abraham that Sarah would nurse children? Yet I have borne him a son in his old age.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hagar and Ishmael Sent Away
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The child grew and was weaned, and on the day Isaac was weaned Abraham held a great feast. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Sarah saw that the son whom Hagar the Egyptian had borne to Abraham was mocking, '
