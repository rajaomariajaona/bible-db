document_id: GEN.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Isaac
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' was gracious to Sarah as he had said, and the '
  - type: text
    content: Lord
  - type: text
    content: ' did for Sarah what he had promised. '
  '10':
  - type: text
    content: and she said to Abraham, “Get rid of that slave woman and her son, for that woman’s son will never share in the inheritance with my son Isaac.”
  '11':
  - type: text
    content: 'The matter distressed Abraham greatly because it concerned his son. '
  '12':
  - type: text
    content: But God said to him, “Do not be so distressed about the boy and your slave woman. Listen to whatever Sarah tells you, because it is through Isaac that your offspring
  - type: note
    content: Or seed
  - type: text
    content: ' will be reckoned. '
  '13':
  - type: text
    content: I will make the son of the slave into a nation also, because he is your offspring.”
  '14':
  - type: text
    content: Early the next morning Abraham took some food and a skin of water and gave them to Hagar. He set them on her shoulders and then sent her off with the boy. She went on her way and wandered in the Desert of Beersheba.
  '15':
  - type: text
    content: 'When the water in the skin was gone, she put the boy under one of the bushes. '
  '16':
  - type: text
    content: Then she went off and sat down about a bowshot away, for she thought, “I cannot watch the boy die.” And as she sat there, she
  - type: note
    content: Hebrew; Septuagint the child
  - type: text
    content: ' began to sob.'
  '17':
  - type: text
    content: 'God heard the boy crying, and the angel of God called to Hagar from heaven and said to her, “What is the matter, Hagar? Do not be afraid; God has heard the boy crying as he lies there. '
  '18':
  - type: text
    content: Lift the boy up and take him by the hand, for I will make him into a great nation.”
  '19':
  - type: text
    content: Then God opened her eyes and she saw a well of water. So she went and filled the skin with water and gave the boy a drink.
  '2':
  - type: text
    content: 'Sarah became pregnant and bore a son to Abraham in his old age, at the very time God had promised him. '
  '20':
  - type: text
    content: 'God was with the boy as he grew up. He lived in the desert and became an archer. '
  '21':
  - type: text
    content: While he was living in the Desert of Paran, his mother got a wife for him from Egypt.
  - type: heading
    content: The Treaty at Beersheba
  '22':
  - type: text
    content: 'At that time Abimelek and Phicol the commander of his forces said to Abraham, “God is with you in everything you do. '
  '23':
  - type: text
    content: Now swear to me here before God that you will not deal falsely with me or my children or my descendants. Show to me and the country where you now reside as a foreigner the same kindness I have shown to you.”
  '24':
  - type: text
    content: Abraham said, “I swear it.”
  '25':
  - type: text
    content: 'Then Abraham complained to Abimelek about a well of water that Abimelek’s servants had seized. '
  '26':
  - type: text
    content: But Abimelek said, “I don’t know who has done this. You did not tell me, and I heard about it only today.”
  '27':
  - type: text
    content: 'So Abraham brought sheep and cattle and gave them to Abimelek, and the two men made a treaty. '
  '28':
  - type: text
    content: 'Abraham set apart seven ewe lambs from the flock, '
  '29':
  - type: text
    content: and Abimelek asked Abraham, “What is the meaning of these seven ewe lambs you have set apart by themselves?”
  '3':
  - type: text
    content: Abraham gave the name Isaac
  - type: note
    content: Isaac means he laughs.
  - type: text
    content: ' to the son Sarah bore him. '
  '30':
  - type: text
    content: He replied, “Accept these seven lambs from my hand as a witness that I dug this well.”
  '31':
  - type: text
    content: So that place was called Beersheba,
  - type: note
    content: Beersheba can mean well of seven and well of the oath.
  - type: text
    content: ' because the two men swore an oath there.'
  '32':
  - type: text
    content: 'After the treaty had been made at Beersheba, Abimelek and Phicol the commander of his forces returned to the land of the Philistines. '
  '33':
  - type: text
    content: 'Abraham planted a tamarisk tree in Beersheba, and there he called on the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the Eternal God. '
  '34':
  - type: text
    content: And Abraham stayed in the land of the Philistines for a long time.
  '4':
  - type: text
    content: 'When his son Isaac was eight days old, Abraham circumcised him, as God commanded him. '
  '5':
  - type: text
    content: Abraham was a hundred years old when his son Isaac was born to him.
  '6':
  - type: text
    content: 'Sarah said, “God has brought me laughter, and everyone who hears about this will laugh with me.” '
  '7':
  - type: text
    content: And she added, “Who would have said to Abraham that Sarah would nurse children? Yet I have borne him a son in his old age.”
  - type: heading
    content: Hagar and Ishmael Sent Away
  '8':
  - type: text
    content: 'The child grew and was weaned, and on the day Isaac was weaned Abraham held a great feast. '
  '9':
  - type: text
    content: 'But Sarah saw that the son whom Hagar the Egyptian had borne to Abraham was mocking, '
