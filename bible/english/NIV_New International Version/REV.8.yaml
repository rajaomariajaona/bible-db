document_id: REV.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Seventh Seal and the Golden Censer
  - type: text
    content: When he opened the seventh seal, there was silence in heaven for about half an hour.
  '10':
  - type: text
    content: 'The third angel sounded his trumpet, and a great star, blazing like a torch, fell from the sky on a third of the rivers and on the springs of water— '
  '11':
  - type: text
    content: the name of the star is Wormwood.
  - type: note
    content: Wormwood is a bitter substance.
  - type: text
    content: ' A third of the waters turned bitter, and many people died from the waters that had become bitter.'
  '12':
  - type: text
    content: The fourth angel sounded his trumpet, and a third of the sun was struck, a third of the moon, and a third of the stars, so that a third of them turned dark. A third of the day was without light, and also a third of the night.
  '13':
  - type: text
    content: 'As I watched, I heard an eagle that was flying in midair call out in a loud voice: “Woe! Woe! Woe to the inhabitants of the earth, because of the trumpet blasts about to be sounded by the other three angels!”'
  '2':
  - type: text
    content: And I saw the seven angels who stand before God, and seven trumpets were given to them.
  '3':
  - type: text
    content: 'Another angel, who had a golden censer, came and stood at the altar. He was given much incense to offer, with the prayers of all God’s people, on the golden altar in front of the throne. '
  '4':
  - type: text
    content: 'The smoke of the incense, together with the prayers of God’s people, went up before God from the angel’s hand. '
  '5':
  - type: text
    content: Then the angel took the censer, filled it with fire from the altar, and hurled it on the earth; and there came peals of thunder, rumblings, flashes of lightning and an earthquake.
  - type: heading
    content: The Trumpets
  '6':
  - type: text
    content: Then the seven angels who had the seven trumpets prepared to sound them.
  '7':
  - type: text
    content: The first angel sounded his trumpet, and there came hail and fire mixed with blood, and it was hurled down on the earth. A third of the earth was burned up, a third of the trees were burned up, and all the green grass was burned up.
  '8':
  - type: text
    content: 'The second angel sounded his trumpet, and something like a huge mountain, all ablaze, was thrown into the sea. A third of the sea turned into blood, '
  '9':
  - type: text
    content: a third of the living creatures in the sea died, and a third of the ships were destroyed.
