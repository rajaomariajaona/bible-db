document_id: PRO.29
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Whoever remains stiff-necked after many rebukes
- type: usfm
  marker: q2
  children:
  - type: text
    text: will suddenly be destroyed—without remedy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When the righteous thrive, the people rejoice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the wicked rule, the people groan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A man who loves wisdom brings joy to his father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a companion of prostitutes squanders his wealth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: By justice a king gives a country stability,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who are greedy for
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who give
    marker-yv: yv-n
  - type: text
    text: ' bribes tear it down.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Those who flatter their neighbors
- type: usfm
  marker: q2
  children:
  - type: text
    text: are spreading nets for their feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Evildoers are snared by their own sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the righteous shout for joy and are glad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The righteous care about justice for the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wicked have no such concern.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mockers stir up a city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wise turn away anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If a wise person goes to court with a fool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fool rages and scoffs, and there is no peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The bloodthirsty hate a person of integrity
- type: usfm
  marker: q2
  children:
  - type: text
    text: and seek to kill the upright.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fools give full vent to their rage,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wise bring calm in the end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If a ruler listens to lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all his officials become wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The poor and the oppressor have this in common:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gives sight to the eyes of both.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: If a king judges the poor with fairness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his throne will be established forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A rod and a reprimand impart wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a child left undisciplined disgraces its mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When the wicked thrive, so does sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the righteous will see their downfall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Discipline your children, and they will give you peace;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will bring you the delights you desire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Where there is no revelation, people cast off restraint;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but blessed is the one who heeds wisdom’s instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Servants cannot be corrected by mere words;
- type: usfm
  marker: q2
  children:
  - type: text
    text: though they understand, they will not respond.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Do you see someone who speaks in haste?
- type: usfm
  marker: q2
  children:
  - type: text
    text: There is more hope for a fool than for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: A servant pampered from youth
- type: usfm
  marker: q2
  children:
  - type: text
    text: will turn out to be insolent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: An angry person stirs up conflict,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a hot-tempered person commits many sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Pride brings a person low,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the lowly in spirit gain honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The accomplices of thieves are their own enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are put under oath and dare not testify.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fear of man will prove to be a snare,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but whoever trusts in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is kept safe.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Many seek an audience with a ruler,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but it is from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that one gets justice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The righteous detest the dishonest;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wicked detest the upright.
