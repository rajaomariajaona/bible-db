document_id: PRO.29,111
type_code: eng
verses:
  '1':
  - type: text
    content: Whoever remains stiff-necked after many rebukes
  - type: text
    content: will suddenly be destroyed—without remedy.
  '10':
  - type: text
    content: The bloodthirsty hate a person of integrity
  - type: text
    content: and seek to kill the upright.
  '11':
  - type: text
    content: Fools give full vent to their rage,
  - type: text
    content: but the wise bring calm in the end.
  '12':
  - type: text
    content: If a ruler listens to lies,
  - type: text
    content: all his officials become wicked.
  '13':
  - type: text
    content: 'The poor and the oppressor have this in common:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gives sight to the eyes of both.'
  '14':
  - type: text
    content: If a king judges the poor with fairness,
  - type: text
    content: his throne will be established forever.
  '15':
  - type: text
    content: A rod and a reprimand impart wisdom,
  - type: text
    content: but a child left undisciplined disgraces its mother.
  '16':
  - type: text
    content: When the wicked thrive, so does sin,
  - type: text
    content: but the righteous will see their downfall.
  '17':
  - type: text
    content: Discipline your children, and they will give you peace;
  - type: text
    content: they will bring you the delights you desire.
  '18':
  - type: text
    content: Where there is no revelation, people cast off restraint;
  - type: text
    content: but blessed is the one who heeds wisdom’s instruction.
  '19':
  - type: text
    content: Servants cannot be corrected by mere words;
  - type: text
    content: though they understand, they will not respond.
  '2':
  - type: text
    content: When the righteous thrive, the people rejoice;
  - type: text
    content: when the wicked rule, the people groan.
  '20':
  - type: text
    content: Do you see someone who speaks in haste?
  - type: text
    content: There is more hope for a fool than for them.
  '21':
  - type: text
    content: A servant pampered from youth
  - type: text
    content: will turn out to be insolent.
  '22':
  - type: text
    content: An angry person stirs up conflict,
  - type: text
    content: and a hot-tempered person commits many sins.
  '23':
  - type: text
    content: Pride brings a person low,
  - type: text
    content: but the lowly in spirit gain honor.
  '24':
  - type: text
    content: The accomplices of thieves are their own enemies;
  - type: text
    content: they are put under oath and dare not testify.
  '25':
  - type: text
    content: Fear of man will prove to be a snare,
  - type: text
    content: 'but whoever trusts in the '
  - type: text
    content: Lord
  - type: text
    content: ' is kept safe.'
  '26':
  - type: text
    content: Many seek an audience with a ruler,
  - type: text
    content: 'but it is from the '
  - type: text
    content: Lord
  - type: text
    content: ' that one gets justice.'
  '27':
  - type: text
    content: The righteous detest the dishonest;
  - type: text
    content: the wicked detest the upright.
  '3':
  - type: text
    content: A man who loves wisdom brings joy to his father,
  - type: text
    content: but a companion of prostitutes squanders his wealth.
  '4':
  - type: text
    content: By justice a king gives a country stability,
  - type: text
    content: but those who are greedy for
  - type: note
    content: Or who give
  - type: text
    content: ' bribes tear it down.'
  '5':
  - type: text
    content: Those who flatter their neighbors
  - type: text
    content: are spreading nets for their feet.
  '6':
  - type: text
    content: Evildoers are snared by their own sin,
  - type: text
    content: but the righteous shout for joy and are glad.
  '7':
  - type: text
    content: The righteous care about justice for the poor,
  - type: text
    content: but the wicked have no such concern.
  '8':
  - type: text
    content: Mockers stir up a city,
  - type: text
    content: but the wise turn away anger.
  '9':
  - type: text
    content: If a wise person goes to court with a fool,
  - type: text
    content: the fool rages and scoffs, and there is no peace.
