document_id: JER.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God and Idols
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to you, people of Israel. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is the true God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is the living God, the eternal King.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he is angry, the earth trembles;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the nations cannot endure his wrath.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Tell them this: ‘These gods, who did not make the heavens and the earth, will perish from the earth and from under the heavens.’ ”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The text of this verse is in Aramaic.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God made the earth by his power;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he founded the world by his wisdom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stretched out the heavens by his understanding.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he thunders, the waters in the heavens roar;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes clouds rise from the ends of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sends lightning with the rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brings out the wind from his storehouses.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone is senseless and without knowledge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every goldsmith is shamed by his idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The images he makes are a fraud;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have no breath in them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are worthless, the objects of mockery;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when their judgment comes, they will perish.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who is the Portion of Jacob is not like these,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he is the Maker of all things,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: including Israel, the people of his inheritance—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is his name.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Coming Destruction
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gather up your belongings to leave the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who live under siege.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “At this time I will hurl out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who live in this land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring distress on them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that they may be captured.”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to me because of my injury!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My wound is incurable!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I said to myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “This is my sickness, and I must endure it.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not learn the ways of the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or be terrified by signs in the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though the nations are terrified by them.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My tent is destroyed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all its ropes are snapped.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My children are gone from me and are no more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one is left now to pitch my tent
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or to set up my shelter.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The shepherds are senseless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and do not inquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so they do not prosper
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all their flock is scattered.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen! The report is coming—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a great commotion from the land of the north!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will make the towns of Judah desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a haunt of jackals.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah’s Prayer
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I know that people’s lives are not their own;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is not for them to direct their steps.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Discipline me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but only in due measure—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not in your anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or you will reduce me to nothing.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour out your wrath on the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that do not acknowledge you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the peoples who do not call on your name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have devoured Jacob;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have devoured him completely
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroyed his homeland.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the practices of the peoples are worthless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they cut a tree out of the forest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a craftsman shapes it with his chisel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They adorn it with silver and gold;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they fasten it with hammer and nails
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so it will not totter.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a scarecrow in a cucumber field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their idols cannot speak;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they must be carried
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they cannot walk.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not fear them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they can do no harm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor can they do any good.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No one is like you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are great,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your name is mighty in power.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who should not fear you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: King of the nations?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This is your due.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among all the wise leaders of the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in all their kingdoms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no one like you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are all senseless and foolish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are taught by worthless wooden idols.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hammered silver is brought from Tarshish
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gold from Uphaz.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What the craftsman and goldsmith have made
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is then dressed in blue and purple—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all made by skilled workers.
