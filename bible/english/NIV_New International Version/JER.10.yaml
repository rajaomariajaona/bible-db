document_id: JER.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God and Idols
  - type: text
    content: 'Hear what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to you, people of Israel. '
  '10':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is the true God;'
  - type: text
    content: he is the living God, the eternal King.
  - type: text
    content: When he is angry, the earth trembles;
  - type: text
    content: the nations cannot endure his wrath.
  '11':
  - type: text
    content: '“Tell them this: ‘These gods, who did not make the heavens and the earth, will perish from the earth and from under the heavens.’ ”'
  - type: note
    content: The text of this verse is in Aramaic.
  '12':
  - type: text
    content: But God made the earth by his power;
  - type: text
    content: he founded the world by his wisdom
  - type: text
    content: and stretched out the heavens by his understanding.
  '13':
  - type: text
    content: When he thunders, the waters in the heavens roar;
  - type: text
    content: he makes clouds rise from the ends of the earth.
  - type: text
    content: He sends lightning with the rain
  - type: text
    content: and brings out the wind from his storehouses.
  '14':
  - type: text
    content: Everyone is senseless and without knowledge;
  - type: text
    content: every goldsmith is shamed by his idols.
  - type: text
    content: The images he makes are a fraud;
  - type: text
    content: they have no breath in them.
  '15':
  - type: text
    content: They are worthless, the objects of mockery;
  - type: text
    content: when their judgment comes, they will perish.
  '16':
  - type: text
    content: He who is the Portion of Jacob is not like these,
  - type: text
    content: for he is the Maker of all things,
  - type: text
    content: including Israel, the people of his inheritance—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is his name.'
  - type: heading
    content: Coming Destruction
  '17':
  - type: text
    content: Gather up your belongings to leave the land,
  - type: text
    content: you who live under siege.
  '18':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “At this time I will hurl out
  - type: text
    content: those who live in this land;
  - type: text
    content: I will bring distress on them
  - type: text
    content: so that they may be captured.”
  '19':
  - type: text
    content: Woe to me because of my injury!
  - type: text
    content: My wound is incurable!
  - type: text
    content: Yet I said to myself,
  - type: text
    content: “This is my sickness, and I must endure it.”
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Do not learn the ways of the nations
  - type: text
    content: or be terrified by signs in the heavens,
  - type: text
    content: though the nations are terrified by them.
  '20':
  - type: text
    content: My tent is destroyed;
  - type: text
    content: all its ropes are snapped.
  - type: text
    content: My children are gone from me and are no more;
  - type: text
    content: no one is left now to pitch my tent
  - type: text
    content: or to set up my shelter.
  '21':
  - type: text
    content: The shepherds are senseless
  - type: text
    content: 'and do not inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: so they do not prosper
  - type: text
    content: and all their flock is scattered.
  '22':
  - type: text
    content: Listen! The report is coming—
  - type: text
    content: a great commotion from the land of the north!
  - type: text
    content: It will make the towns of Judah desolate,
  - type: text
    content: a haunt of jackals.
  - type: heading
    content: Jeremiah’s Prayer
  '23':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', I know that people’s lives are not their own;'
  - type: text
    content: it is not for them to direct their steps.
  '24':
  - type: text
    content: 'Discipline me, '
  - type: text
    content: Lord
  - type: text
    content: ', but only in due measure—'
  - type: text
    content: not in your anger,
  - type: text
    content: or you will reduce me to nothing.
  '25':
  - type: text
    content: Pour out your wrath on the nations
  - type: text
    content: that do not acknowledge you,
  - type: text
    content: on the peoples who do not call on your name.
  - type: text
    content: For they have devoured Jacob;
  - type: text
    content: they have devoured him completely
  - type: text
    content: and destroyed his homeland.
  '3':
  - type: text
    content: For the practices of the peoples are worthless;
  - type: text
    content: they cut a tree out of the forest,
  - type: text
    content: and a craftsman shapes it with his chisel.
  '4':
  - type: text
    content: They adorn it with silver and gold;
  - type: text
    content: they fasten it with hammer and nails
  - type: text
    content: so it will not totter.
  '5':
  - type: text
    content: Like a scarecrow in a cucumber field,
  - type: text
    content: their idols cannot speak;
  - type: text
    content: they must be carried
  - type: text
    content: because they cannot walk.
  - type: text
    content: Do not fear them;
  - type: text
    content: they can do no harm
  - type: text
    content: nor can they do any good.”
  '6':
  - type: text
    content: 'No one is like you, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: you are great,
  - type: text
    content: and your name is mighty in power.
  '7':
  - type: text
    content: Who should not fear you,
  - type: text
    content: King of the nations?
  - type: text
    content: This is your due.
  - type: text
    content: Among all the wise leaders of the nations
  - type: text
    content: and in all their kingdoms,
  - type: text
    content: there is no one like you.
  '8':
  - type: text
    content: They are all senseless and foolish;
  - type: text
    content: they are taught by worthless wooden idols.
  '9':
  - type: text
    content: Hammered silver is brought from Tarshish
  - type: text
    content: and gold from Uphaz.
  - type: text
    content: What the craftsman and goldsmith have made
  - type: text
    content: is then dressed in blue and purple—
  - type: text
    content: all made by skilled workers.
