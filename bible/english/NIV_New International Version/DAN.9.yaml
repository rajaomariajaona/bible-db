document_id: DAN.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Prayer
  - type: text
    content: In the first year of Darius son of Xerxes
  - type: note
    content: Hebrew Ahasuerus
  - type: text
    content: ' (a Mede by descent), who was made ruler over the Babylonian'
  - type: note
    content: Or Chaldean
  - type: text
    content: ' kingdom— '
  '10':
  - type: text
    content: 'we have not obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ' our God or kept the laws he gave us through his servants the prophets. '
  '11':
  - type: text
    content: All Israel has transgressed your law and turned away, refusing to obey you.
  - type: text
    content: '“Therefore the curses and sworn judgments written in the Law of Moses, the servant of God, have been poured out on us, because we have sinned against you. '
  '12':
  - type: text
    content: 'You have fulfilled the words spoken against us and against our rulers by bringing on us great disaster. Under the whole heaven nothing has ever been done like what has been done to Jerusalem. '
  '13':
  - type: text
    content: 'Just as it is written in the Law of Moses, all this disaster has come on us, yet we have not sought the favor of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God by turning from our sins and giving attention to your truth. '
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' did not hesitate to bring the disaster on us, for the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is righteous in everything he does; yet we have not obeyed him.'
  '15':
  - type: text
    content: '“Now, Lord our God, who brought your people out of Egypt with a mighty hand and who made for yourself a name that endures to this day, we have sinned, we have done wrong. '
  '16':
  - type: text
    content: Lord, in keeping with all your righteous acts, turn away your anger and your wrath from Jerusalem, your city, your holy hill. Our sins and the iniquities of our ancestors have made Jerusalem and your people an object of scorn to all those around us.
  '17':
  - type: text
    content: '“Now, our God, hear the prayers and petitions of your servant. For your sake, Lord, look with favor on your desolate sanctuary. '
  '18':
  - type: text
    content: 'Give ear, our God, and hear; open your eyes and see the desolation of the city that bears your Name. We do not make requests of you because we are righteous, but because of your great mercy. '
  '19':
  - type: text
    content: Lord, listen! Lord, forgive! Lord, hear and act! For your sake, my God, do not delay, because your city and your people bear your Name.”
  - type: heading
    content: The Seventy “Sevens”
  '2':
  - type: text
    content: 'in the first year of his reign, I, Daniel, understood from the Scriptures, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' given to Jeremiah the prophet, that the desolation of Jerusalem would last seventy years. '
  '20':
  - type: text
    content: 'While I was speaking and praying, confessing my sin and the sin of my people Israel and making my request to the '
  - type: text
    content: Lord
  - type: text
    content: ' my God for his holy hill— '
  '21':
  - type: text
    content: 'while I was still in prayer, Gabriel, the man I had seen in the earlier vision, came to me in swift flight about the time of the evening sacrifice. '
  '22':
  - type: text
    content: 'He instructed me and said to me, “Daniel, I have now come to give you insight and understanding. '
  '23':
  - type: text
    content: 'As soon as you began to pray, a word went out, which I have come to tell you, for you are highly esteemed. Therefore, consider the word and understand the vision:'
  '24':
  - type: text
    content: “Seventy ‘sevens’
  - type: note
    content: Or ‘weeks’; also in verses 25 and 26
  - type: text
    content: ' are decreed for your people and your holy city to finish'
  - type: note
    content: Or restrain
  - type: text
    content: ' transgression, to put an end to sin, to atone for wickedness, to bring in everlasting righteousness, to seal up vision and prophecy and to anoint the Most Holy Place.'
  - type: note
    content: Or the most holy One
  '25':
  - type: text
    content: '“Know and understand this: From the time the word goes out to restore and rebuild Jerusalem until the Anointed One,'
  - type: note
    content: Or an anointed one; also in verse 26
  - type: text
    content: ' the ruler, comes, there will be seven ‘sevens,’ and sixty-two ‘sevens.’ It will be rebuilt with streets and a trench, but in times of trouble. '
  '26':
  - type: text
    content: After the sixty-two ‘sevens,’ the Anointed One will be put to death and will have nothing.
  - type: note
    content: Or death and will have no one; or death, but not for himself
  - type: text
    content: ' The people of the ruler who will come will destroy the city and the sanctuary. The end will come like a flood: War will continue until the end, and desolations have been decreed. '
  '27':
  - type: text
    content: He will confirm a covenant with many for one ‘seven.’
  - type: note
    content: Or ‘week’
  - type: text
    content: ' In the middle of the ‘seven’'
  - type: note
    content: Or ‘week’
  - type: text
    content: ' he will put an end to sacrifice and offering. And at the temple'
  - type: note
    content: Septuagint and Theodotion; Hebrew wing
  - type: text
    content: ' he will set up an abomination that causes desolation, until the end that is decreed is poured out on him.'
  - type: note
    content: Or it
  - type: text
    content: ”
  - type: note
    content: Or And one who causes desolation will come upon the wing of the abominable temple, until the end that is decreed is poured out on the desolated city
  '3':
  - type: text
    content: So I turned to the Lord God and pleaded with him in prayer and petition, in fasting, and in sackcloth and ashes.
  '4':
  - type: text
    content: 'I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' my God and confessed:'
  - type: text
    content: '“Lord, the great and awesome God, who keeps his covenant of love with those who love him and keep his commandments, '
  '5':
  - type: text
    content: 'we have sinned and done wrong. We have been wicked and have rebelled; we have turned away from your commands and laws. '
  '6':
  - type: text
    content: We have not listened to your servants the prophets, who spoke in your name to our kings, our princes and our ancestors, and to all the people of the land.
  '7':
  - type: text
    content: '“Lord, you are righteous, but this day we are covered with shame—the people of Judah and the inhabitants of Jerusalem and all Israel, both near and far, in all the countries where you have scattered us because of our unfaithfulness to you. '
  '8':
  - type: text
    content: 'We and our kings, our princes and our ancestors are covered with shame, '
  - type: text
    content: Lord
  - type: text
    content: ', because we have sinned against you. '
  '9':
  - type: text
    content: 'The Lord our God is merciful and forgiving, even though we have rebelled against him; '
