document_id: AMO.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “For three sins of Moab,
  - type: text
    content: even for four, I will not relent.
  - type: text
    content: Because he burned to ashes
  - type: text
    content: the bones of Edom’s king,
  '10':
  - type: text
    content: I brought you up out of Egypt
  - type: text
    content: and led you forty years in the wilderness
  - type: text
    content: to give you the land of the Amorites.
  '11':
  - type: text
    content: “I also raised up prophets from among your children
  - type: text
    content: and Nazirites from among your youths.
  - type: text
    content: Is this not true, people of Israel?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: “But you made the Nazirites drink wine
  - type: text
    content: and commanded the prophets not to prophesy.
  '13':
  - type: text
    content: “Now then, I will crush you
  - type: text
    content: as a cart crushes when loaded with grain.
  '14':
  - type: text
    content: The swift will not escape,
  - type: text
    content: the strong will not muster their strength,
  - type: text
    content: and the warrior will not save his life.
  '15':
  - type: text
    content: The archer will not stand his ground,
  - type: text
    content: the fleet-footed soldier will not get away,
  - type: text
    content: and the horseman will not save his life.
  '16':
  - type: text
    content: Even the bravest warriors
  - type: text
    content: will flee naked on that day,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: I will send fire on Moab
  - type: text
    content: that will consume the fortresses of Kerioth.
  - type: note
    content: Or of her cities
  - type: text
    content: Moab will go down in great tumult
  - type: text
    content: amid war cries and the blast of the trumpet.
  '3':
  - type: text
    content: I will destroy her ruler
  - type: text
    content: and kill all her officials with him,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “For three sins of Judah,
  - type: text
    content: even for four, I will not relent.
  - type: text
    content: 'Because they have rejected the law of the '
  - type: text
    content: Lord
  - type: text
    content: and have not kept his decrees,
  - type: text
    content: because they have been led astray by false gods,
  - type: note
    content: Or by lies
  - type: text
    content: the gods
  - type: note
    content: Or lies
  - type: text
    content: ' their ancestors followed,'
  '5':
  - type: text
    content: I will send fire on Judah
  - type: text
    content: that will consume the fortresses of Jerusalem.”
  - type: heading
    content: Judgment on Israel
  '6':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “For three sins of Israel,
  - type: text
    content: even for four, I will not relent.
  - type: text
    content: They sell the innocent for silver,
  - type: text
    content: and the needy for a pair of sandals.
  '7':
  - type: text
    content: They trample on the heads of the poor
  - type: text
    content: as on the dust of the ground
  - type: text
    content: and deny justice to the oppressed.
  - type: text
    content: Father and son use the same girl
  - type: text
    content: and so profane my holy name.
  '8':
  - type: text
    content: They lie down beside every altar
  - type: text
    content: on garments taken in pledge.
  - type: text
    content: In the house of their god
  - type: text
    content: they drink wine taken as fines.
  '9':
  - type: text
    content: “Yet I destroyed the Amorites before them,
  - type: text
    content: though they were tall as the cedars
  - type: text
    content: and strong as the oaks.
  - type: text
    content: I destroyed their fruit above
  - type: text
    content: and their roots below.
