      text: '6'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For three sins of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even for four, I will not relent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sell the innocent for silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the needy for a pair of sandals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They trample on the heads of the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: as on the dust of the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: and deny justice to the oppressed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Father and son use the same girl
- type: usfm
  marker: q2
  children:
  - type: text
    text: and so profane my holy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They lie down beside every altar
- type: usfm
  marker: q2
  children:
  - type: text
    text: on garments taken in pledge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the house of their god
- type: usfm
  marker: q2
  children:
  - type: text
    text: they drink wine taken as fines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Yet I destroyed the Amorites before them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though they were tall as the cedars
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strong as the oaks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I destroyed their fruit above
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their roots below.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I brought you up out of Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and led you forty years in the wilderness
- type: usfm
  marker: q2
  children:
  - type: text
    text: to give you the land of the Amorites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I also raised up prophets from among your children
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Nazirites from among your youths.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is this not true, people of Israel?”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “But you made the Nazirites drink wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: and commanded the prophets not to prophesy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Now then, I will crush you
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a cart crushes when loaded with grain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The swift will not escape,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the strong will not muster their strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the warrior will not save his life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The archer will not stand his ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fleet-footed soldier will not get away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the horseman will not save his life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Even the bravest warriors
- type: usfm
  marker: q2
  children:
  - type: text
    text: will flee naked on that day,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
