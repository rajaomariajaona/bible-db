document_id: MRK.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Forgives and Heals a Paralyzed Man
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A few days later, when Jesus again entered Capernaum, the people heard that he had come home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They gathered in such large numbers that there was no room left, not even outside the door, and he preached the word to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Some men came, bringing to him a paralyzed man, carried by four of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Since they could not get him to Jesus because of the crowd, they made an opening in the roof above Jesus by digging through it and then lowered the mat the man was lying on. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Jesus saw their faith, he said to the paralyzed man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Son, your sins are forgiven.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now some teachers of the law were sitting there, thinking to themselves, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Why does this fellow talk like that? He’s blaspheming! Who can forgive sins but God alone?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Immediately Jesus knew in his spirit that this was what they were thinking in their hearts, and he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you thinking these things?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Which is easier: to say to this paralyzed man, ‘Your sins are forgiven,’ or to say, ‘Get up, take your mat and walk’?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I want you to know that the Son of Man has authority on earth to forgive sins.”
  - type: text
    text: ' So he said to the man, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you, get up, take your mat and go home.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He got up, took his mat and walked out in full view of them all. This amazed everyone and they praised God, saying, “We have never seen anything like this!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calls Levi and Eats With Sinners
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Once again Jesus went out beside the lake. A large crowd came to him, and he began to teach them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'As he walked along, he saw Levi son of Alphaeus sitting at the tax collector’s booth. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Follow me,”
  - type: text
    text: ' Jesus told him, and Levi got up and followed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'While Jesus was having dinner at Levi’s house, many tax collectors and sinners were eating with him and his disciples, for there were many who followed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the teachers of the law who were Pharisees saw him eating with the sinners and tax collectors, they asked his disciples: “Why does he eat with tax collectors and sinners?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On hearing this, Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is not the healthy who need a doctor, but the sick. I have not come to call the righteous, but sinners.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Questioned About Fasting
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now John’s disciples and the Pharisees were fasting. Some people came and asked Jesus, “How is it that John’s disciples and the disciples of the Pharisees are fasting, but yours are not?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How can the guests of the bridegroom fast while he is with them? They cannot, so long as they have him with them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the time will come when the bridegroom will be taken from them, and on that day they will fast.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No one sews a patch of unshrunk cloth on an old garment. Otherwise, the new piece will pull away from the old, making the tear worse.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And no one pours new wine into old wineskins. Otherwise, the wine will burst the skins, and both the wine and the wineskins will be ruined. No, they pour new wine into new wineskins.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Is Lord of the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'One Sabbath Jesus was going through the grainfields, and as his disciples walked along, they began to pick some heads of grain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The Pharisees said to him, “Look, why are they doing what is unlawful on the Sabbath?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Have you never read what David did when he and his companions were hungry and in need?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In the days of Abiathar the high priest, he entered the house of God and ate the consecrated bread, which is lawful only for priests to eat. And he also gave some to his companions.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Sabbath was made for man, not man for the Sabbath.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So the Son of Man is Lord even of the Sabbath.”
