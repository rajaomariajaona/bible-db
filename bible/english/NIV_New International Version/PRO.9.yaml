document_id: PRO.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Invitations of Wisdom and Folly
  - type: text
    content: Wisdom has built her house;
  - type: text
    content: she has set up
  - type: note
    content: Septuagint, Syriac and Targum; Hebrew has hewn out
  - type: text
    content: ' its seven pillars.'
  '10':
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is the beginning of wisdom,'
  - type: text
    content: and knowledge of the Holy One is understanding.
  '11':
  - type: text
    content: For through wisdom
  - type: note
    content: Septuagint, Syriac and Targum; Hebrew me
  - type: text
    content: ' your days will be many,'
  - type: text
    content: and years will be added to your life.
  '12':
  - type: text
    content: If you are wise, your wisdom will reward you;
  - type: text
    content: if you are a mocker, you alone will suffer.
  '13':
  - type: text
    content: Folly is an unruly woman;
  - type: text
    content: she is simple and knows nothing.
  '14':
  - type: text
    content: She sits at the door of her house,
  - type: text
    content: on a seat at the highest point of the city,
  '15':
  - type: text
    content: calling out to those who pass by,
  - type: text
    content: who go straight on their way,
  '16':
  - type: text
    content: “Let all who are simple come to my house!”
  - type: text
    content: To those who have no sense she says,
  '17':
  - type: text
    content: “Stolen water is sweet;
  - type: text
    content: food eaten in secret is delicious!”
  '18':
  - type: text
    content: But little do they know that the dead are there,
  - type: text
    content: that her guests are deep in the realm of the dead.
  '2':
  - type: text
    content: She has prepared her meat and mixed her wine;
  - type: text
    content: she has also set her table.
  '3':
  - type: text
    content: She has sent out her servants, and she calls
  - type: text
    content: from the highest point of the city,
  '4':
  - type: text
    content: “Let all who are simple come to my house!”
  - type: text
    content: To those who have no sense she says,
  '5':
  - type: text
    content: “Come, eat my food
  - type: text
    content: and drink the wine I have mixed.
  '6':
  - type: text
    content: Leave your simple ways and you will live;
  - type: text
    content: walk in the way of insight.”
  '7':
  - type: text
    content: Whoever corrects a mocker invites insults;
  - type: text
    content: whoever rebukes the wicked incurs abuse.
  '8':
  - type: text
    content: Do not rebuke mockers or they will hate you;
  - type: text
    content: rebuke the wise and they will love you.
  '9':
  - type: text
    content: Instruct the wise and they will be wiser still;
  - type: text
    content: teach the righteous and they will add to their learning.
