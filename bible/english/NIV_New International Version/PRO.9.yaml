document_id: PRO.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Invitations of Wisdom and Folly
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Wisdom has built her house;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she has set up
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint, Syriac and Targum; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: has hewn out
    marker-yv: yv-n
  - type: text
    text: ' its seven pillars.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: She has prepared her meat and mixed her wine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she has also set her table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: She has sent out her servants, and she calls
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the highest point of the city,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Let all who are simple come to my house!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: To those who have no sense she says,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Come, eat my food
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drink the wine I have mixed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Leave your simple ways and you will live;
- type: usfm
  marker: q2
  children:
  - type: text
    text: walk in the way of insight.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Whoever corrects a mocker invites insults;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever rebukes the wicked incurs abuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Do not rebuke mockers or they will hate you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: rebuke the wise and they will love you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Instruct the wise and they will be wiser still;
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach the righteous and they will add to their learning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is the beginning of wisdom,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and knowledge of the Holy One is understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For through wisdom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint, Syriac and Targum; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me
    marker-yv: yv-n
  - type: text
    text: ' your days will be many,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and years will be added to your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If you are wise, your wisdom will reward you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you are a mocker, you alone will suffer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Folly is an unruly woman;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she is simple and knows nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: She sits at the door of her house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: on a seat at the highest point of the city,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: calling out to those who pass by,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who go straight on their way,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Let all who are simple come to my house!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: To those who have no sense she says,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Stolen water is sweet;
- type: usfm
  marker: q2
  children:
  - type: text
    text: food eaten in secret is delicious!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: But little do they know that the dead are there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that her guests are deep in the realm of the dead.
