document_id: PRO.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Invitations of Wisdom and Folly
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom has built her house;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she has set up
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Syriac and Targum; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: has hewn out
      marker-yv: yv-n
    - type: text
      text: ' its seven pillars.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is the beginning of wisdom,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and knowledge of the Holy One is understanding.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For through wisdom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Syriac and Targum; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me
      marker-yv: yv-n
    - type: text
      text: ' your days will be many,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and years will be added to your life.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you are wise, your wisdom will reward you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you are a mocker, you alone will suffer.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Folly is an unruly woman;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she is simple and knows nothing.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She sits at the door of her house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on a seat at the highest point of the city,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: calling out to those who pass by,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who go straight on their way,
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Let all who are simple come to my house!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To those who have no sense she says,
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Stolen water is sweet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: food eaten in secret is delicious!”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But little do they know that the dead are there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that her guests are deep in the realm of the dead.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She has prepared her meat and mixed her wine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she has also set her table.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She has sent out her servants, and she calls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the highest point of the city,
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Let all who are simple come to my house!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To those who have no sense she says,
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Come, eat my food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drink the wine I have mixed.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leave your simple ways and you will live;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: walk in the way of insight.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever corrects a mocker invites insults;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever rebukes the wicked incurs abuse.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not rebuke mockers or they will hate you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rebuke the wise and they will love you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instruct the wise and they will be wiser still;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach the righteous and they will add to their learning.
