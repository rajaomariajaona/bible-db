document_id: 2KI.14,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amaziah King of Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the second year of Jehoash
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joash, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jehoash
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 13, 23 and 27
      marker-yv: yv-n
    - type: text
      text: ' son of Jehoahaz king of Israel, Amaziah son of Joash king of Judah began to reign. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have indeed defeated Edom and now you are arrogant. Glory in your victory, but stay at home! Why ask for trouble and cause your own downfall and that of Judah also?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amaziah, however, would not listen, so Jehoash king of Israel attacked. He and Amaziah king of Judah faced each other at Beth Shemesh in Judah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judah was routed by Israel, and every man fled to his home. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoash king of Israel captured Amaziah king of Judah, the son of Joash, the son of Ahaziah, at Beth Shemesh. Then Jehoash went to Jerusalem and broke down the wall of Jerusalem from the Ephraim Gate to the Corner Gate—a section about four hundred cubits long.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 600 feet or about 180 meters
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took all the gold and silver and all the articles found in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and in the treasuries of the royal palace. He also took hostages and returned to Samaria.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the other events of the reign of Jehoash, what he did and his achievements, including his war against Amaziah king of Judah, are they not written in the book of the annals of the kings of Israel? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoash rested with his ancestors and was buried in Samaria with the kings of Israel. And Jeroboam his son succeeded him as king.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amaziah son of Joash king of Judah lived for fifteen years after the death of Jehoash son of Jehoahaz king of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As for the other events of Amaziah’s reign, are they not written in the book of the annals of the kings of Judah?
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They conspired against him in Jerusalem, and he fled to Lachish, but they sent men after him to Lachish and killed him there. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother’s name was Jehoaddan; she was from Jerusalem. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was brought back by horse and was buried in Jerusalem with his ancestors, in the City of David.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then all the people of Judah took Azariah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also called '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Uzziah
      marker-yv: yv-n
    - type: text
      text: ' who was sixteen years old, and made him king in place of his father Amaziah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was the one who rebuilt Elath and restored it to Judah after Amaziah rested with his ancestors.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeroboam II King of Israel
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fifteenth year of Amaziah son of Joash king of Judah, Jeroboam son of Jehoash king of Israel became king in Samaria, and he reigned forty-one years. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and did not turn away from any of the sins of Jeroboam son of Nebat, which he had caused Israel to commit. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was the one who restored the boundaries of Israel from Lebo Hamath to the Dead Sea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Sea of the Arabah
      marker-yv: yv-n
    - type: text
      text: ' in accordance with the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, spoken through his servant Jonah son of Amittai, the prophet from Gath Hepher.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had seen how bitterly everyone in Israel, whether slave or free, was suffering;'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Israel was suffering. They were without a ruler or leader, and
      marker-yv: yv-n
    - type: text
      text: ' there was no one to help them. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And since the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had not said he would blot out the name of Israel from under heaven, he saved them by the hand of Jeroboam son of Jehoash.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the other events of Jeroboam’s reign, all he did, and his military achievements, including how he recovered for Israel both Damascus and Hamath, which had belonged to Judah, are they not written in the book of the annals of the kings of Israel? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jeroboam rested with his ancestors, the kings of Israel. And Zechariah his son succeeded him as king.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did what was right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but not as his father David had done. In everything he followed the example of his father Joash. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The high places, however, were not removed; the people continued to offer sacrifices and burn incense there.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the kingdom was firmly in his grasp, he executed the officials who had murdered his father the king. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet he did not put the children of the assassins to death, in accordance with what is written in the Book of the Law of Moses where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded: “Parents are not to be put to death for their children, nor children put to death for their parents; each will die for their own sin.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 24:16
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was the one who defeated ten thousand Edomites in the Valley of Salt and captured Sela in battle, calling it Joktheel, the name it has to this day.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Amaziah sent messengers to Jehoash son of Jehoahaz, the son of Jehu, king of Israel, with the challenge: “Come, let us face each other in battle.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehoash king of Israel replied to Amaziah king of Judah: “A thistle in Lebanon sent a message to a cedar in Lebanon, ‘Give your daughter to my son in marriage.’ Then a wild beast in Lebanon came along and trampled the thistle underfoot. '
