document_id: PSA.77,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 77
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 77:1-20 is numbered 77:2-21.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. For Jeduthun. Of Asaph. A psalm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cried out to God for help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cried out to God to hear me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then I thought, “To this I will appeal:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the years when the Most High stretched out his right hand.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will remember the deeds of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, I will remember your miracles of long ago.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will consider all your works
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and meditate on all your mighty deeds.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your ways, God, are holy.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What god is as great as our God?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are the God who performs miracles;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you display your power among the peoples.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your mighty arm you redeemed your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the descendants of Jacob and Joseph.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The waters saw you, God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the waters saw you and writhed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the very depths were convulsed.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The clouds poured down water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the heavens resounded with thunder;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your arrows flashed back and forth.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your thunder was heard in the whirlwind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your lightning lit up the world;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the earth trembled and quaked.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your path led through the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your way through the mighty waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though your footprints were not seen.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I was in distress, I sought the Lord;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at night I stretched out untiring hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I would not be comforted.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You led your people like a flock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the hand of Moses and Aaron.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I remembered you, God, and I groaned;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I meditated, and my spirit grew faint.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '77:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verses 9 and 15.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You kept my eyes from closing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was too troubled to speak.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thought about the former days,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the years of long ago;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I remembered my songs in the night.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My heart meditated and my spirit asked:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Will the Lord reject forever?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will he never show his favor again?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has his unfailing love vanished forever?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Has his promise failed for all time?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has God forgotten to be merciful?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Has he in anger withheld his compassion?”
