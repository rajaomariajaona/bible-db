document_id: PSA.77
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 77
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 77:1-20 is numbered 77:2-21.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. For Jeduthun. Of Asaph. A psalm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I cried out to God for help;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cried out to God to hear me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When I was in distress, I sought the Lord;
- type: usfm
  marker: q2
  children:
  - type: text
    text: at night I stretched out untiring hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I would not be comforted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I remembered you, God, and I groaned;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I meditated, and my spirit grew faint.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '77:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here and at the end of verses 9 and 15.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You kept my eyes from closing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was too troubled to speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I thought about the former days,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the years of long ago;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I remembered my songs in the night.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'My heart meditated and my spirit asked:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Will the Lord reject forever?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will he never show his favor again?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Has his unfailing love vanished forever?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has his promise failed for all time?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Has God forgotten to be merciful?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has he in anger withheld his compassion?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then I thought, “To this I will appeal:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the years when the Most High stretched out his right hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will remember the deeds of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, I will remember your miracles of long ago.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will consider all your works
- type: usfm
  marker: q2
  children:
  - type: text
    text: and meditate on all your mighty deeds.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Your ways, God, are holy.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What god is as great as our God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You are the God who performs miracles;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you display your power among the peoples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: With your mighty arm you redeemed your people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the descendants of Jacob and Joseph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The waters saw you, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the waters saw you and writhed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the very depths were convulsed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The clouds poured down water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the heavens resounded with thunder;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your arrows flashed back and forth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Your thunder was heard in the whirlwind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your lightning lit up the world;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth trembled and quaked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Your path led through the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your way through the mighty waters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though your footprints were not seen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You led your people like a flock
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the hand of Moses and Aaron.
