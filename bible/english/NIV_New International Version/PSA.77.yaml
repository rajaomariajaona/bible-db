document_id: PSA.77,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 77In Hebrew texts 77:1-20 is numbered 77:2-21.
  - type: text
    content: For the director of music. For Jeduthun. Of Asaph. A psalm.
  - type: text
    content: I cried out to God for help;
  - type: text
    content: I cried out to God to hear me.
  '10':
  - type: text
    content: 'Then I thought, “To this I will appeal:'
  - type: text
    content: the years when the Most High stretched out his right hand.
  '11':
  - type: text
    content: 'I will remember the deeds of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: yes, I will remember your miracles of long ago.
  '12':
  - type: text
    content: I will consider all your works
  - type: text
    content: and meditate on all your mighty deeds.”
  '13':
  - type: text
    content: Your ways, God, are holy.
  - type: text
    content: What god is as great as our God?
  '14':
  - type: text
    content: You are the God who performs miracles;
  - type: text
    content: you display your power among the peoples.
  '15':
  - type: text
    content: With your mighty arm you redeemed your people,
  - type: text
    content: the descendants of Jacob and Joseph.
  '16':
  - type: text
    content: The waters saw you, God,
  - type: text
    content: the waters saw you and writhed;
  - type: text
    content: the very depths were convulsed.
  '17':
  - type: text
    content: The clouds poured down water,
  - type: text
    content: the heavens resounded with thunder;
  - type: text
    content: your arrows flashed back and forth.
  '18':
  - type: text
    content: Your thunder was heard in the whirlwind,
  - type: text
    content: your lightning lit up the world;
  - type: text
    content: the earth trembled and quaked.
  '19':
  - type: text
    content: Your path led through the sea,
  - type: text
    content: your way through the mighty waters,
  - type: text
    content: though your footprints were not seen.
  '2':
  - type: text
    content: When I was in distress, I sought the Lord;
  - type: text
    content: at night I stretched out untiring hands,
  - type: text
    content: and I would not be comforted.
  '20':
  - type: text
    content: You led your people like a flock
  - type: text
    content: by the hand of Moses and Aaron.
  '3':
  - type: text
    content: I remembered you, God, and I groaned;
  - type: text
    content: I meditated, and my spirit grew faint.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verses 9 and 15.
  '4':
  - type: text
    content: You kept my eyes from closing;
  - type: text
    content: I was too troubled to speak.
  '5':
  - type: text
    content: I thought about the former days,
  - type: text
    content: the years of long ago;
  '6':
  - type: text
    content: I remembered my songs in the night.
  - type: text
    content: 'My heart meditated and my spirit asked:'
  '7':
  - type: text
    content: “Will the Lord reject forever?
  - type: text
    content: Will he never show his favor again?
  '8':
  - type: text
    content: Has his unfailing love vanished forever?
  - type: text
    content: Has his promise failed for all time?
  '9':
  - type: text
    content: Has God forgotten to be merciful?
  - type: text
    content: Has he in anger withheld his compassion?”
