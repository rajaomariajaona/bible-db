document_id: AMO.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Locusts, Fire and a Plumb Line
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' showed me: He was preparing swarms of locusts after the king’s share had been harvested and just as the late crops were coming up. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then Amaziah the priest of Bethel sent a message to Jeroboam king of Israel: “Amos is raising a conspiracy against you in the very heart of Israel. The land cannot bear all his words. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For this is what Amos is saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Jeroboam will die by the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Israel will surely go into exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: away from their native land.’ ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Amaziah said to Amos, “Get out, you seer! Go back to the land of Judah. Earn your bread there and do your prophesying there. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Don’t prophesy anymore at Bethel, because this is the king’s sanctuary and the temple of the kingdom.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Amos answered Amaziah, “I was neither a prophet nor the son of a prophet, but I was a shepherd, and I also took care of sycamore-fig trees. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' took me from tending the flock and said to me, ‘Go, prophesy to my people Israel.’ '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now then, hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . You say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Do not prophesy against Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stop preaching against the descendants of Isaac.’
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Your wife will become a prostitute in the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your sons and daughters will fall by the sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your land will be measured and divided up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you yourself will die in a pagan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: an unclean
      marker-yv: yv-n
    - type: text
      text: ' country.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And Israel will surely go into exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: away from their native land.’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When they had stripped the land clean, I cried out, “Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', forgive! How can Jacob survive? He is so small!”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' relented.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This will not happen,” the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' showed me: The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was calling for judgment by fire; it dried up the great deep and devoured the land. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then I cried out, “Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I beg you, stop! How can Jacob survive? He is so small!”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' relented.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This will not happen either,” the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'This is what he showed me: The Lord was standing by a wall that had been built true to plumb,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' with a plumb line'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain; also in verse 8.
      marker-yv: yv-n
    - type: text
      text: ' in his hand. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked me, “What do you see, Amos?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “A plumb line,” I replied.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the Lord said, “Look, I am setting a plumb line among my people Israel; I will spare them no longer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “The high places of Isaac will be destroyed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sanctuaries of Israel will be ruined;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with my sword I will rise against the house of Jeroboam.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amos and Amaziah
    marker-yv: yv-h
