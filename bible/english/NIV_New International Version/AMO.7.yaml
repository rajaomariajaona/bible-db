document_id: AMO.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Locusts, Fire and a Plumb Line
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' showed me: He was preparing swarms of locusts after the king’s share had been harvested and just as the late crops were coming up. '
  '10':
  - type: text
    content: 'Then Amaziah the priest of Bethel sent a message to Jeroboam king of Israel: “Amos is raising a conspiracy against you in the very heart of Israel. The land cannot bear all his words. '
  '11':
  - type: text
    content: 'For this is what Amos is saying:'
  - type: text
    content: “ ‘Jeroboam will die by the sword,
  - type: text
    content: and Israel will surely go into exile,
  - type: text
    content: away from their native land.’ ”
  '12':
  - type: text
    content: 'Then Amaziah said to Amos, “Get out, you seer! Go back to the land of Judah. Earn your bread there and do your prophesying there. '
  '13':
  - type: text
    content: Don’t prophesy anymore at Bethel, because this is the king’s sanctuary and the temple of the kingdom.”
  '14':
  - type: text
    content: 'Amos answered Amaziah, “I was neither a prophet nor the son of a prophet, but I was a shepherd, and I also took care of sycamore-fig trees. '
  '15':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' took me from tending the flock and said to me, ‘Go, prophesy to my people Israel.’ '
  '16':
  - type: text
    content: 'Now then, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: . You say,
  - type: text
    content: “ ‘Do not prophesy against Israel,
  - type: text
    content: and stop preaching against the descendants of Isaac.’
  '17':
  - type: text
    content: '“Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Your wife will become a prostitute in the city,
  - type: text
    content: and your sons and daughters will fall by the sword.
  - type: text
    content: Your land will be measured and divided up,
  - type: text
    content: and you yourself will die in a pagan
  - type: note
    content: Hebrew an unclean
  - type: text
    content: ' country.'
  - type: text
    content: And Israel will surely go into exile,
  - type: text
    content: away from their native land.’ ”
  '2':
  - type: text
    content: 'When they had stripped the land clean, I cried out, “Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', forgive! How can Jacob survive? He is so small!”'
  '3':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' relented.'
  - type: text
    content: '“This will not happen,” the '
  - type: text
    content: Lord
  - type: text
    content: ' said.'
  '4':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' showed me: The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' was calling for judgment by fire; it dried up the great deep and devoured the land. '
  '5':
  - type: text
    content: 'Then I cried out, “Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', I beg you, stop! How can Jacob survive? He is so small!”'
  '6':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' relented.'
  - type: text
    content: '“This will not happen either,” the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' said.'
  '7':
  - type: text
    content: 'This is what he showed me: The Lord was standing by a wall that had been built true to plumb,'
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' with a plumb line'
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain; also in verse 8.
  - type: text
    content: ' in his hand. '
  '8':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' asked me, “What do you see, Amos?”'
  - type: text
    content: “A plumb line,” I replied.
  - type: text
    content: Then the Lord said, “Look, I am setting a plumb line among my people Israel; I will spare them no longer.
  '9':
  - type: text
    content: “The high places of Isaac will be destroyed
  - type: text
    content: and the sanctuaries of Israel will be ruined;
  - type: text
    content: with my sword I will rise against the house of Jeroboam.”
  - type: heading
    content: Amos and Amaziah
