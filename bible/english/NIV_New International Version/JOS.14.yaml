document_id: JOS.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Division of the Land West of the Jordan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now these are the areas the Israelites received as an inheritance in the land of Canaan, which Eleazar the priest, Joshua son of Nun and the heads of the tribal clans of Israel allotted to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Their inheritances were assigned by lot to the nine-and-a-half tribes, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded through Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moses had granted the two-and-a-half tribes their inheritance east of the Jordan but had not granted the Levites an inheritance among the rest, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for Joseph’s descendants had become two tribes—Manasseh and Ephraim. The Levites received no share of the land but only towns to live in, with pasturelands for their flocks and herds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the Israelites divided the land, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Allotment for Caleb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now the people of Judah approached Joshua at Gilgal, and Caleb son of Jephunneh the Kenizzite said to him, “You know what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses the man of God at Kadesh Barnea about you and me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I was forty years old when Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent me from Kadesh Barnea to explore the land. And I brought him back a report according to my convictions, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but my fellow Israelites who went up with me made the hearts of the people melt in fear. I, however, followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God wholeheartedly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So on that day Moses swore to me, ‘The land on which your feet have walked will be your inheritance and that of your children forever, because you have followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God wholeheartedly.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut. 1:36
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Now then, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' promised, he has kept me alive for forty-five years since the time he said this to Moses, while Israel moved about in the wilderness. So here I am today, eighty-five years old! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I am still as strong today as the day Moses sent me out; I’m just as vigorous to go out to battle now as I was then. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now give me this hill country that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' promised me that day. You yourself heard then that the Anakites were there and their cities were large and fortified, but, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' helping me, I will drive them out just as he said.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Joshua blessed Caleb son of Jephunneh and gave him Hebron as his inheritance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Hebron has belonged to Caleb son of Jephunneh the Kenizzite ever since, because he followed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, wholeheartedly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: (Hebron used to be called Kiriath Arba after Arba, who was the greatest man among the Anakites.)
- type: usfm
  marker: p
  children:
  - type: text
    text: Then the land had rest from war.
