document_id: LUK.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Shrewd Manager
  - type: text
    content: 'Jesus told his disciples: '
  - type: text
    content: “There was a rich man whose manager was accused of wasting his possessions.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: text
    content: “Whoever can be trusted with very little can also be trusted with much, and whoever is dishonest with very little will also be dishonest with much.
  - type: text
    content: ' '
  '11':
  - type: text
    content: So if you have not been trustworthy in handling worldly wealth, who will trust you with true riches?
  - type: text
    content: ' '
  '12':
  - type: text
    content: And if you have not been trustworthy with someone else’s property, who will give you property of your own?
  '13':
  - type: text
    content: ' '
  - type: text
    content: “No one can serve two masters. Either you will hate the one and love the other, or you will be devoted to the one and despise the other. You cannot serve both God and money.”
  '14':
  - type: text
    content: 'The Pharisees, who loved money, heard all this and were sneering at Jesus. '
  '15':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “You are the ones who justify yourselves in the eyes of others, but God knows your hearts. What people value highly is detestable in God’s sight.
  - type: heading
    content: Additional Teachings
  '16':
  - type: text
    content: ' '
  - type: text
    content: “The Law and the Prophets were proclaimed until John. Since that time, the good news of the kingdom of God is being preached, and everyone is forcing their way into it.
  - type: text
    content: ' '
  '17':
  - type: text
    content: It is easier for heaven and earth to disappear than for the least stroke of a pen to drop out of the Law.
  '18':
  - type: text
    content: ' '
  - type: text
    content: “Anyone who divorces his wife and marries another woman commits adultery, and the man who marries a divorced woman commits adultery.
  - type: heading
    content: The Rich Man and Lazarus
  '19':
  - type: text
    content: ' '
  - type: text
    content: “There was a rich man who was dressed in purple and fine linen and lived in luxury every day.
  - type: text
    content: ' '
  '2':
  - type: text
    content: So he called him in and asked him, ‘What is this I hear about you? Give an account of your management, because you cannot be manager any longer.’
  '20':
  - type: text
    content: At his gate was laid a beggar named Lazarus, covered with sores
  - type: text
    content: ' '
  '21':
  - type: text
    content: and longing to eat what fell from the rich man’s table. Even the dogs came and licked his sores.
  '22':
  - type: text
    content: ' '
  - type: text
    content: “The time came when the beggar died and the angels carried him to Abraham’s side. The rich man also died and was buried.
  - type: text
    content: ' '
  '23':
  - type: text
    content: In Hades, where he was in torment, he looked up and saw Abraham far away, with Lazarus by his side.
  - type: text
    content: ' '
  '24':
  - type: text
    content: So he called to him, ‘Father Abraham, have pity on me and send Lazarus to dip the tip of his finger in water and cool my tongue, because I am in agony in this fire.’
  '25':
  - type: text
    content: ' '
  - type: text
    content: “But Abraham replied, ‘Son, remember that in your lifetime you received your good things, while Lazarus received bad things, but now he is comforted here and you are in agony.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And besides all this, between us and you a great chasm has been set in place, so that those who want to go from here to you cannot, nor can anyone cross over from there to us.’
  '27':
  - type: text
    content: ' '
  - type: text
    content: “He answered, ‘Then I beg you, father, send Lazarus to my family,
  - type: text
    content: ' '
  '28':
  - type: text
    content: for I have five brothers. Let him warn them, so that they will not also come to this place of torment.’
  '29':
  - type: text
    content: ' '
  - type: text
    content: “Abraham replied, ‘They have Moses and the Prophets; let them listen to them.’
  '3':
  - type: text
    content: ' '
  - type: text
    content: “The manager said to himself, ‘What shall I do now? My master is taking away my job. I’m not strong enough to dig, and I’m ashamed to beg—
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: “ ‘No, father Abraham,’ he said, ‘but if someone from the dead goes to them, they will repent.’
  '31':
  - type: text
    content: ' '
  - type: text
    content: “He said to him, ‘If they do not listen to Moses and the Prophets, they will not be convinced even if someone rises from the dead.’ ”
  '4':
  - type: text
    content: I know what I’ll do so that, when I lose my job here, people will welcome me into their houses.’
  '5':
  - type: text
    content: ' '
  - type: text
    content: “So he called in each one of his master’s debtors. He asked the first, ‘How much do you owe my master?’
  '6':
  - type: text
    content: ' '
  - type: text
    content: “ ‘Nine hundred gallons
  - type: text
    content: ' '
  - type: note
    content: Or about 3,000 liters
  - type: text
    content: of olive oil,’ he replied.
  - type: text
    content: “The manager told him, ‘Take your bill, sit down quickly, and make it four hundred and fifty.’
  '7':
  - type: text
    content: ' '
  - type: text
    content: “Then he asked the second, ‘And how much do you owe?’
  - type: text
    content: “ ‘A thousand bushels
  - type: text
    content: ' '
  - type: note
    content: Or about 30 tons
  - type: text
    content: of wheat,’ he replied.
  - type: text
    content: “He told him, ‘Take your bill and make it eight hundred.’
  '8':
  - type: text
    content: ' '
  - type: text
    content: “The master commended the dishonest manager because he had acted shrewdly. For the people of this world are more shrewd in dealing with their own kind than are the people of the light.
  - type: text
    content: ' '
  '9':
  - type: text
    content: I tell you, use worldly wealth to gain friends for yourselves, so that when it is gone, you will be welcomed into eternal dwellings.
