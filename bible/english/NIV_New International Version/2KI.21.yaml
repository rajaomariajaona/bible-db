document_id: 2KI.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manasseh King of Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manasseh was twelve years old when he became king, and he reigned in Jerusalem fifty-five years. His mother’s name was Hephzibah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said through his servants the prophets: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Manasseh king of Judah has committed these detestable sins. He has done more evil than the Amorites who preceded him and has led Judah into sin with his idols. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: I am going to bring such disaster on Jerusalem and Judah that the ears of everyone who hears of it will tingle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will stretch out over Jerusalem the measuring line used against Samaria and the plumb line used against the house of Ahab. I will wipe out Jerusalem as one wipes a dish, wiping it and turning it upside down. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will forsake the remnant of my inheritance and give them into the hands of enemies. They will be looted and plundered by all their enemies; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: they have done evil in my eyes and have aroused my anger from the day their ancestors came out of Egypt until this day.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, Manasseh also shed so much innocent blood that he filled Jerusalem from end to end—besides the sin that he had caused Judah to commit, so that they did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the other events of Manasseh’s reign, and all he did, including the sin he committed, are they not written in the book of the annals of the kings of Judah? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manasseh rested with his ancestors and was buried in his palace garden, the garden of Uzza. And Amon his son succeeded him as king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amon King of Judah
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amon was twenty-two years old when he became king, and he reigned in Jerusalem two years. His mother’s name was Meshullemeth daughter of Haruz; she was from Jotbah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', following the detestable practices of the nations the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had driven out before the Israelites. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as his father Manasseh had done. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He followed completely the ways of his father, worshiping the idols his father had worshiped, and bowing down to them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He forsook the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of his ancestors, and did not walk in obedience to him.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amon’s officials conspired against him and assassinated the king in his palace. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the people of the land killed all who had plotted against King Amon, and they made Josiah his son king in his place.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the other events of Amon’s reign, and what he did, are they not written in the book of the annals of the kings of Judah? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was buried in his tomb in the garden of Uzza. And Josiah his son succeeded him as king.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He rebuilt the high places his father Hezekiah had destroyed; he also erected altars to Baal and made an Asherah pole, as Ahab king of Israel had done. He bowed down to all the starry hosts and worshiped them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He built altars in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', of which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said, “In Jerusalem I will put my Name.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the two courts of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he built altars to all the starry hosts. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He sacrificed his own son in the fire, practiced divination, sought omens, and consulted mediums and spiritists. He did much evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', arousing his anger.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took the carved Asherah pole he had made and put it in the temple, of which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to David and to his son Solomon, “In this temple and in Jerusalem, which I have chosen out of all the tribes of Israel, I will put my Name forever. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will not again make the feet of the Israelites wander from the land I gave their ancestors, if only they will be careful to do everything I commanded them and will keep the whole Law that my servant Moses gave them.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people did not listen. Manasseh led them astray, so that they did more evil than the nations the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had destroyed before the Israelites.'
