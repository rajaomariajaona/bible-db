document_id: DEU.18,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offerings for Priests and Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Levitical priests—indeed, the whole tribe of Levi—are to have no allotment or inheritance with Israel. They shall live on the food offerings presented to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for that is their inheritance. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let no one be found among you who sacrifices their son or daughter in the fire, who practices divination or sorcery, interprets omens, engages in witchcraft, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or casts spells, or who is a medium or spiritist or who consults the dead. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anyone who does these things is detestable to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; because of these same detestable practices the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will drive out those nations before you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must be blameless before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prophet
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The nations you will dispossess listen to those who practice sorcery or divination. But as for you, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has not permitted you to do so. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will raise up for you a prophet like me from among you, from your fellow Israelites. You must listen to him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this is what you asked of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God at Horeb on the day of the assembly when you said, “Let us not hear the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God nor see this great fire anymore, or we will die.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me: “What they say is good. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will raise up for them a prophet like you from among their fellow Israelites, and I will put my words in his mouth. He will tell them everything I command him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I myself will call to account anyone who does not listen to my words that the prophet speaks in my name. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They shall have no inheritance among their fellow Israelites; the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is their inheritance, as he promised them.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But a prophet who presumes to speak in my name anything I have not commanded, or a prophet who speaks in the name of other gods, is to be put to death.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You may say to yourselves, “How can we know when a message has not been spoken by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If what a prophet proclaims in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' does not take place or come true, that is a message the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not spoken. That prophet has spoken presumptuously, so do not be alarmed.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the share due the priests from the people who sacrifice a bull or a sheep: the shoulder, the internal organs and the meat from the head. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are to give them the firstfruits of your grain, new wine and olive oil, and the first wool from the shearing of your sheep, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has chosen them and their descendants out of all your tribes to stand and minister in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s name always.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If a Levite moves from one of your towns anywhere in Israel where he is living, and comes in all earnestness to the place the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will choose, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he may minister in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God like all his fellow Levites who serve there in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He is to share equally in their benefits, even though he has received money from the sale of family possessions.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Occult Practices
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you enter the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you, do not learn to imitate the detestable ways of the nations there. '
