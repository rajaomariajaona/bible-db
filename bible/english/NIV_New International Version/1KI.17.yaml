document_id: 1KI.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Announces a Great Drought
  - type: text
    content: Now Elijah the Tishbite, from Tishbe
  - type: note
    content: Or Tishbite, of the settlers
  - type: text
    content: ' in Gilead, said to Ahab, “As the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, lives, whom I serve, there will be neither dew nor rain in the next few years except at my word.”'
  - type: heading
    content: Elijah Fed by Ravens
  '10':
  - type: text
    content: 'So he went to Zarephath. When he came to the town gate, a widow was there gathering sticks. He called to her and asked, “Would you bring me a little water in a jar so I may have a drink?” '
  '11':
  - type: text
    content: As she was going to get it, he called, “And bring me, please, a piece of bread.”
  '12':
  - type: text
    content: '“As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God lives,” she replied, “I don’t have any bread—only a handful of flour in a jar and a little olive oil in a jug. I am gathering a few sticks to take home and make a meal for myself and my son, that we may eat it—and die.”'
  '13':
  - type: text
    content: 'Elijah said to her, “Don’t be afraid. Go home and do as you have said. But first make a small loaf of bread for me from what you have and bring it to me, and then make something for yourself and your son. '
  '14':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: ‘The jar of flour will not be used up and the jug of oil will not run dry until the day the '
  - type: text
    content: Lord
  - type: text
    content: ' sends rain on the land.’ ”'
  '15':
  - type: text
    content: 'She went away and did as Elijah had told her. So there was food every day for Elijah and for the woman and her family. '
  '16':
  - type: text
    content: 'For the jar of flour was not used up and the jug of oil did not run dry, in keeping with the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken by Elijah.'
  '17':
  - type: text
    content: 'Some time later the son of the woman who owned the house became ill. He grew worse and worse, and finally stopped breathing. '
  '18':
  - type: text
    content: She said to Elijah, “What do you have against me, man of God? Did you come to remind me of my sin and kill my son?”
  '19':
  - type: text
    content: '“Give me your son,” Elijah replied. He took him from her arms, carried him to the upper room where he was staying, and laid him on his bed. '
  '2':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Elijah: '
  '20':
  - type: text
    content: 'Then he cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “'
  - type: text
    content: Lord
  - type: text
    content: ' my God, have you brought tragedy even on this widow I am staying with, by causing her son to die?” '
  '21':
  - type: text
    content: 'Then he stretched himself out on the boy three times and cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “'
  - type: text
    content: Lord
  - type: text
    content: ' my God, let this boy’s life return to him!”'
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' heard Elijah’s cry, and the boy’s life returned to him, and he lived. '
  '23':
  - type: text
    content: Elijah picked up the child and carried him down from the room into the house. He gave him to his mother and said, “Look, your son is alive!”
  '24':
  - type: text
    content: 'Then the woman said to Elijah, “Now I know that you are a man of God and that the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' from your mouth is the truth.”'
  '3':
  - type: text
    content: '“Leave here, turn eastward and hide in the Kerith Ravine, east of the Jordan. '
  '4':
  - type: text
    content: You will drink from the brook, and I have directed the ravens to supply you with food there.”
  '5':
  - type: text
    content: 'So he did what the '
  - type: text
    content: Lord
  - type: text
    content: ' had told him. He went to the Kerith Ravine, east of the Jordan, and stayed there. '
  '6':
  - type: text
    content: The ravens brought him bread and meat in the morning and bread and meat in the evening, and he drank from the brook.
  - type: heading
    content: Elijah and the Widow at Zarephath
  '7':
  - type: text
    content: 'Some time later the brook dried up because there had been no rain in the land. '
  '8':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him: '
  '9':
  - type: text
    content: '“Go at once to Zarephath in the region of Sidon and stay there. I have directed a widow there to supply you with food.” '
