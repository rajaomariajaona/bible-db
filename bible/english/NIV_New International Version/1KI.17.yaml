document_id: 1KI.17,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elijah Announces a Great Drought
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Elijah the Tishbite, from Tishbe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tishbite, of the settlers
      marker-yv: yv-n
    - type: text
      text: ' in Gilead, said to Ahab, “As the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, lives, whom I serve, there will be neither dew nor rain in the next few years except at my word.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elijah Fed by Ravens
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he went to Zarephath. When he came to the town gate, a widow was there gathering sticks. He called to her and asked, “Would you bring me a little water in a jar so I may have a drink?” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As she was going to get it, he called, “And bring me, please, a piece of bread.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God lives,” she replied, “I don’t have any bread—only a handful of flour in a jar and a little olive oil in a jug. I am gathering a few sticks to take home and make a meal for myself and my son, that we may eat it—and die.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elijah said to her, “Don’t be afraid. Go home and do as you have said. But first make a small loaf of bread for me from what you have and bring it to me, and then make something for yourself and your son. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: ‘The jar of flour will not be used up and the jug of oil will not run dry until the day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sends rain on the land.’ ”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She went away and did as Elijah had told her. So there was food every day for Elijah and for the woman and her family. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the jar of flour was not used up and the jug of oil did not run dry, in keeping with the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoken by Elijah.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some time later the son of the woman who owned the house became ill. He grew worse and worse, and finally stopped breathing. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She said to Elijah, “What do you have against me, man of God? Did you come to remind me of my sin and kill my son?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Give me your son,” Elijah replied. He took him from her arms, carried him to the upper room where he was staying, and laid him on his bed. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Elijah: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, have you brought tragedy even on this widow I am staying with, by causing her son to die?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he stretched himself out on the boy three times and cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God, let this boy’s life return to him!”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' heard Elijah’s cry, and the boy’s life returned to him, and he lived. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elijah picked up the child and carried him down from the room into the house. He gave him to his mother and said, “Look, your son is alive!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the woman said to Elijah, “Now I know that you are a man of God and that the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from your mouth is the truth.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Leave here, turn eastward and hide in the Kerith Ravine, east of the Jordan. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You will drink from the brook, and I have directed the ravens to supply you with food there.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he did what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had told him. He went to the Kerith Ravine, east of the Jordan, and stayed there. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The ravens brought him bread and meat in the morning and bread and meat in the evening, and he drank from the brook.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elijah and the Widow at Zarephath
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some time later the brook dried up because there had been no rain in the land. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to him: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go at once to Zarephath in the region of Sidon and stay there. I have directed a widow there to supply you with food.” '
