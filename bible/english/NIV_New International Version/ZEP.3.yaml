document_id: ZEP.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to the city of oppressors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rebellious and defiled!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From beyond the rivers of Cush
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the upper Nile region
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my worshipers, my scattered people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will bring me offerings.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On that day you, Jerusalem, will not be put to shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all the wrongs you have done to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because I will remove from you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your arrogant boasters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never again will you be haughty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on my holy hill.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will leave within you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the meek and humble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The remnant of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'will trust in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will do no wrong;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will tell no lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A deceitful tongue
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will not be found in their mouths.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will eat and lie down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will make them afraid.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing, Daughter Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shout aloud, Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be glad and rejoice with all your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Daughter Jerusalem!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has taken away your punishment,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has turned back your enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the King of Israel, is with you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never again will you fear any harm.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On that day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will say to Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not fear, Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let your hands hang limp.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is with you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Mighty Warrior who saves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will take great delight in you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in his love he will no longer rebuke you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but will rejoice over you with singing.”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will remove from you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who mourn over the loss of your appointed festivals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which is a burden and reproach for you.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At that time I will deal
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with all who oppressed you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will rescue the lame;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will gather the exiles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give them praise and honor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in every land where they have suffered shame.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She obeys no one,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she accepts no correction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She does not trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she does not draw near to her God.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At that time I will gather you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at that time I will bring you home.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give you honor and praise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among all the peoples of the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I restore your fortunes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I bring back your captives
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before your very eyes,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her officials within her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are roaring lions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: her rulers are evening wolves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who leave nothing for the morning.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her prophets are unprincipled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are treacherous people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her priests profane the sanctuary
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do violence to the law.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' within her is righteous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he does no wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Morning by morning he dispenses his justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every new day he does not fail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet the unrighteous know no shame.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerusalem Remains Unrepentant
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have destroyed nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their strongholds are demolished.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have left their streets deserted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one passing through.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their cities are laid waste;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are deserted and empty.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Of Jerusalem I thought,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Surely you will fear me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and accept correction!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then her place of refuge
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: her sanctuary
      marker-yv: yv-n
    - type: text
      text: ' would not be destroyed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor all my punishments come upon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: all those I appointed over
      marker-yv: yv-n
    - type: text
      text: ' her.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they were still eager
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to act corruptly in all they did.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore wait for me,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “for the day I will stand up to testify.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint and Syriac; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will rise up to plunder
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have decided to assemble the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to gather the kingdoms
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to pour out my wrath on them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all my fierce anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole world will be consumed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the fire of my jealous anger.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Restoration of Israel’s Remnant
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Then I will purify the lips of the peoples,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that all of them may call on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and serve him shoulder to shoulder.
