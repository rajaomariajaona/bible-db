document_id: ZEP.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem
  - type: text
    content: Woe to the city of oppressors,
  - type: text
    content: rebellious and defiled!
  '10':
  - type: text
    content: From beyond the rivers of Cush
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: my worshipers, my scattered people,
  - type: text
    content: will bring me offerings.
  '11':
  - type: text
    content: On that day you, Jerusalem, will not be put to shame
  - type: text
    content: for all the wrongs you have done to me,
  - type: text
    content: because I will remove from you
  - type: text
    content: your arrogant boasters.
  - type: text
    content: Never again will you be haughty
  - type: text
    content: on my holy hill.
  '12':
  - type: text
    content: But I will leave within you
  - type: text
    content: the meek and humble.
  - type: text
    content: The remnant of Israel
  - type: text
    content: 'will trust in the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: They will do no wrong;
  - type: text
    content: they will tell no lies.
  - type: text
    content: A deceitful tongue
  - type: text
    content: will not be found in their mouths.
  - type: text
    content: They will eat and lie down
  - type: text
    content: and no one will make them afraid.”
  '14':
  - type: text
    content: Sing, Daughter Zion;
  - type: text
    content: shout aloud, Israel!
  - type: text
    content: Be glad and rejoice with all your heart,
  - type: text
    content: Daughter Jerusalem!
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has taken away your punishment,'
  - type: text
    content: he has turned back your enemy.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the King of Israel, is with you;'
  - type: text
    content: never again will you fear any harm.
  '16':
  - type: text
    content: On that day
  - type: text
    content: they will say to Jerusalem,
  - type: text
    content: “Do not fear, Zion;
  - type: text
    content: do not let your hands hang limp.
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God is with you,'
  - type: text
    content: the Mighty Warrior who saves.
  - type: text
    content: He will take great delight in you;
  - type: text
    content: in his love he will no longer rebuke you,
  - type: text
    content: but will rejoice over you with singing.”
  '18':
  - type: text
    content: “I will remove from you
  - type: text
    content: all who mourn over the loss of your appointed festivals,
  - type: text
    content: which is a burden and reproach for you.
  '19':
  - type: text
    content: At that time I will deal
  - type: text
    content: with all who oppressed you.
  - type: text
    content: I will rescue the lame;
  - type: text
    content: I will gather the exiles.
  - type: text
    content: I will give them praise and honor
  - type: text
    content: in every land where they have suffered shame.
  '2':
  - type: text
    content: She obeys no one,
  - type: text
    content: she accepts no correction.
  - type: text
    content: 'She does not trust in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: she does not draw near to her God.
  '20':
  - type: text
    content: At that time I will gather you;
  - type: text
    content: at that time I will bring you home.
  - type: text
    content: I will give you honor and praise
  - type: text
    content: among all the peoples of the earth
  - type: text
    content: when I restore your fortunes
  - type: note
    content: Or I bring back your captives
  - type: text
    content: before your very eyes,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: Her officials within her
  - type: text
    content: are roaring lions;
  - type: text
    content: her rulers are evening wolves,
  - type: text
    content: who leave nothing for the morning.
  '4':
  - type: text
    content: Her prophets are unprincipled;
  - type: text
    content: they are treacherous people.
  - type: text
    content: Her priests profane the sanctuary
  - type: text
    content: and do violence to the law.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' within her is righteous;'
  - type: text
    content: he does no wrong.
  - type: text
    content: Morning by morning he dispenses his justice,
  - type: text
    content: and every new day he does not fail,
  - type: text
    content: yet the unrighteous know no shame.
  - type: heading
    content: Jerusalem Remains Unrepentant
  '6':
  - type: text
    content: “I have destroyed nations;
  - type: text
    content: their strongholds are demolished.
  - type: text
    content: I have left their streets deserted,
  - type: text
    content: with no one passing through.
  - type: text
    content: Their cities are laid waste;
  - type: text
    content: they are deserted and empty.
  '7':
  - type: text
    content: Of Jerusalem I thought,
  - type: text
    content: ‘Surely you will fear me
  - type: text
    content: and accept correction!’
  - type: text
    content: Then her place of refuge
  - type: note
    content: Or her sanctuary
  - type: text
    content: ' would not be destroyed,'
  - type: text
    content: nor all my punishments come upon
  - type: note
    content: Or all those I appointed over
  - type: text
    content: ' her.'
  - type: text
    content: But they were still eager
  - type: text
    content: to act corruptly in all they did.
  '8':
  - type: text
    content: Therefore wait for me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “for the day I will stand up to testify.
  - type: note
    content: Septuagint and Syriac; Hebrew will rise up to plunder
  - type: text
    content: I have decided to assemble the nations,
  - type: text
    content: to gather the kingdoms
  - type: text
    content: and to pour out my wrath on them—
  - type: text
    content: all my fierce anger.
  - type: text
    content: The whole world will be consumed
  - type: text
    content: by the fire of my jealous anger.
  - type: heading
    content: Restoration of Israel’s Remnant
  '9':
  - type: text
    content: “Then I will purify the lips of the peoples,
  - type: text
    content: 'that all of them may call on the name of the '
  - type: text
    content: Lord
  - type: text
    content: and serve him shoulder to shoulder.
