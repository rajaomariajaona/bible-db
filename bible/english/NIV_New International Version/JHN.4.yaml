document_id: JHN.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Talks With a Samaritan Woman
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Jesus learned that the Pharisees had heard that he was gaining and baptizing more disciples than John— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'although in fact it was not Jesus who baptized, but his disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So he left Judea and went back once more to Galilee.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now he had to go through Samaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So he came to a town in Samaria called Sychar, near the plot of ground Jacob had given to his son Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jacob’s well was there, and Jesus, tired as he was from the journey, sat down by the well. It was about noon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When a Samaritan woman came to draw water, Jesus said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Will you give me a drink?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: (His disciples had gone into the town to buy food.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The Samaritan woman said to him, “You are a Jew and I am a Samaritan woman. How can you ask me for a drink?” (For Jews do not associate with Samaritans.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: do not use dishes Samaritans have used
    marker-yv: yv-n
  - type: text
    text: )
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus answered her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you knew the gift of God and who it is that asks you for a drink, you would have asked him and he would have given you living water.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Sir,” the woman said, “you have nothing to draw with and the well is deep. Where can you get this living water? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Are you greater than our father Jacob, who gave us the well and drank from it himself, as did also his sons and his livestock?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Everyone who drinks this water will be thirsty again,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but whoever drinks the water I give them will never thirst. Indeed, the water I give them will become in them a spring of water welling up to eternal life.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The woman said to him, “Sir, give me this water so that I won’t get thirsty and have to keep coming here to draw water.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He told her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go, call your husband and come back.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “I have no husband,” she replied.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You are right when you say you have no husband.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The fact is, you have had five husbands, and the man you now have is not your husband. What you have just said is quite true.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Sir,” the woman said, “I can see that you are a prophet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Our ancestors worshiped on this mountain, but you Jews claim that the place where we must worship is in Jerusalem.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Woman,”
  - type: text
    text: ' Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “believe me, a time is coming when you will worship the Father neither on this mountain nor in Jerusalem.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You Samaritans worship what you do not know; we worship what we do know, for salvation is from the Jews.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yet a time is coming and has now come when the true worshipers will worship the Father in the Spirit and in truth, for they are the kind of worshipers the Father seeks.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: God is spirit, and his worshipers must worship in the Spirit and in truth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The woman said, “I know that Messiah” (called Christ) “is coming. When he comes, he will explain everything to us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Jesus declared, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I, the one speaking to you—I am he.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Disciples Rejoin Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Just then his disciples returned and were surprised to find him talking with a woman. But no one asked, “What do you want?” or “Why are you talking with her?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then, leaving her water jar, the woman went back to the town and said to the people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“Come, see a man who told me everything I ever did. Could this be the Messiah?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: They came out of the town and made their way toward him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Meanwhile his disciples urged him, “Rabbi, eat something.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have food to eat that you know nothing about.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Then his disciples said to each other, “Could someone have brought him food?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My food,”
  - type: text
    text: ' said Jesus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “is to do the will of him who sent me and to finish his work.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Don’t you have a saying, ‘It’s still four months until harvest’? I tell you, open your eyes and look at the fields! They are ripe for harvest.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Even now the one who reaps draws a wage and harvests a crop for eternal life, so that the sower and the reaper may be glad together.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thus the saying ‘One sows and another reaps’ is true.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I sent you to reap what you have not worked for. Others have done the hard work, and you have reaped the benefits of their labor.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Many Samaritans Believe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Many of the Samaritans from that town believed in him because of the woman’s testimony, “He told me everything I ever did.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'So when the Samaritans came to him, they urged him to stay with them, and he stayed two days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: And because of his words many more became believers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: They said to the woman, “We no longer believe just because of what you said; now we have heard for ourselves, and we know that this man really is the Savior of the world.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals an Official’s Son
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'After the two days he left for Galilee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '(Now Jesus himself had pointed out that a prophet has no honor in his own country.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: When he arrived in Galilee, the Galileans welcomed him. They had seen all that he had done in Jerusalem at the Passover Festival, for they also had been there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Once more he visited Cana in Galilee, where he had turned the water into wine. And there was a certain royal official whose son lay sick at Capernaum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: When this man heard that Jesus had arrived in Galilee from Judea, he went to him and begged him to come and heal his son, who was close to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Unless you people see signs and wonders,”
  - type: text
    text: ' Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “you will never believe.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: The royal official said, “Sir, come down before my child dies.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go,”
  - type: text
    text: ' Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “your son will live.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The man took Jesus at his word and departed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'While he was still on the way, his servants met him with the news that his boy was living. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: When he inquired as to the time when his son got better, they said to him, “Yesterday, at one in the afternoon, the fever left him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Then the father realized that this was the exact time at which Jesus had said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Your son will live.”
  - type: text
    text: ' So he and his whole household believed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: This was the second sign Jesus performed after coming from Judea to Galilee.
