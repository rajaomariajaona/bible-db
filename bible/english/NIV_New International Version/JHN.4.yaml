document_id: JHN.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Talks With a Samaritan Woman
  - type: text
    content: 'Now Jesus learned that the Pharisees had heard that he was gaining and baptizing more disciples than John— '
  '10':
  - type: text
    content: 'Jesus answered her, '
  - type: text
    content: “If you knew the gift of God and who it is that asks you for a drink, you would have asked him and he would have given you living water.”
  '11':
  - type: text
    content: '“Sir,” the woman said, “you have nothing to draw with and the well is deep. Where can you get this living water? '
  '12':
  - type: text
    content: Are you greater than our father Jacob, who gave us the well and drank from it himself, as did also his sons and his livestock?”
  '13':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Everyone who drinks this water will be thirsty again,
  - type: text
    content: ' '
  '14':
  - type: text
    content: but whoever drinks the water I give them will never thirst. Indeed, the water I give them will become in them a spring of water welling up to eternal life.”
  '15':
  - type: text
    content: The woman said to him, “Sir, give me this water so that I won’t get thirsty and have to keep coming here to draw water.”
  '16':
  - type: text
    content: 'He told her, '
  - type: text
    content: “Go, call your husband and come back.”
  '17':
  - type: text
    content: “I have no husband,” she replied.
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “You are right when you say you have no husband.
  - type: text
    content: ' '
  '18':
  - type: text
    content: The fact is, you have had five husbands, and the man you now have is not your husband. What you have just said is quite true.”
  '19':
  - type: text
    content: '“Sir,” the woman said, “I can see that you are a prophet. '
  '2':
  - type: text
    content: 'although in fact it was not Jesus who baptized, but his disciples. '
  '20':
  - type: text
    content: Our ancestors worshiped on this mountain, but you Jews claim that the place where we must worship is in Jerusalem.”
  '21':
  - type: text
    content: ' '
  - type: text
    content: “Woman,”
  - type: text
    content: ' Jesus replied, '
  - type: text
    content: “believe me, a time is coming when you will worship the Father neither on this mountain nor in Jerusalem.
  - type: text
    content: ' '
  '22':
  - type: text
    content: You Samaritans worship what you do not know; we worship what we do know, for salvation is from the Jews.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Yet a time is coming and has now come when the true worshipers will worship the Father in the Spirit and in truth, for they are the kind of worshipers the Father seeks.
  - type: text
    content: ' '
  '24':
  - type: text
    content: God is spirit, and his worshipers must worship in the Spirit and in truth.”
  '25':
  - type: text
    content: The woman said, “I know that Messiah” (called Christ) “is coming. When he comes, he will explain everything to us.”
  '26':
  - type: text
    content: 'Then Jesus declared, '
  - type: text
    content: “I, the one speaking to you—I am he.”
  - type: heading
    content: The Disciples Rejoin Jesus
  '27':
  - type: text
    content: Just then his disciples returned and were surprised to find him talking with a woman. But no one asked, “What do you want?” or “Why are you talking with her?”
  '28':
  - type: text
    content: 'Then, leaving her water jar, the woman went back to the town and said to the people, '
  '29':
  - type: text
    content: '“Come, see a man who told me everything I ever did. Could this be the Messiah?” '
  '3':
  - type: text
    content: So he left Judea and went back once more to Galilee.
  '30':
  - type: text
    content: They came out of the town and made their way toward him.
  '31':
  - type: text
    content: Meanwhile his disciples urged him, “Rabbi, eat something.”
  '32':
  - type: text
    content: 'But he said to them, '
  - type: text
    content: “I have food to eat that you know nothing about.”
  '33':
  - type: text
    content: Then his disciples said to each other, “Could someone have brought him food?”
  '34':
  - type: text
    content: ' '
  - type: text
    content: “My food,”
  - type: text
    content: ' said Jesus, '
  - type: text
    content: “is to do the will of him who sent me and to finish his work.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Don’t you have a saying, ‘It’s still four months until harvest’? I tell you, open your eyes and look at the fields! They are ripe for harvest.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Even now the one who reaps draws a wage and harvests a crop for eternal life, so that the sower and the reaper may be glad together.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Thus the saying ‘One sows and another reaps’ is true.
  - type: text
    content: ' '
  '38':
  - type: text
    content: I sent you to reap what you have not worked for. Others have done the hard work, and you have reaped the benefits of their labor.”
  - type: heading
    content: Many Samaritans Believe
  '39':
  - type: text
    content: 'Many of the Samaritans from that town believed in him because of the woman’s testimony, “He told me everything I ever did.” '
  '4':
  - type: text
    content: 'Now he had to go through Samaria. '
  '40':
  - type: text
    content: 'So when the Samaritans came to him, they urged him to stay with them, and he stayed two days. '
  '41':
  - type: text
    content: And because of his words many more became believers.
  '42':
  - type: text
    content: They said to the woman, “We no longer believe just because of what you said; now we have heard for ourselves, and we know that this man really is the Savior of the world.”
  - type: heading
    content: Jesus Heals an Official’s Son
  '43':
  - type: text
    content: 'After the two days he left for Galilee. '
  '44':
  - type: text
    content: '(Now Jesus himself had pointed out that a prophet has no honor in his own country.) '
  '45':
  - type: text
    content: When he arrived in Galilee, the Galileans welcomed him. They had seen all that he had done in Jerusalem at the Passover Festival, for they also had been there.
  '46':
  - type: text
    content: 'Once more he visited Cana in Galilee, where he had turned the water into wine. And there was a certain royal official whose son lay sick at Capernaum. '
  '47':
  - type: text
    content: When this man heard that Jesus had arrived in Galilee from Judea, he went to him and begged him to come and heal his son, who was close to death.
  '48':
  - type: text
    content: ' '
  - type: text
    content: “Unless you people see signs and wonders,”
  - type: text
    content: ' Jesus told him, '
  - type: text
    content: “you will never believe.”
  '49':
  - type: text
    content: The royal official said, “Sir, come down before my child dies.”
  '5':
  - type: text
    content: 'So he came to a town in Samaria called Sychar, near the plot of ground Jacob had given to his son Joseph. '
  '50':
  - type: text
    content: ' '
  - type: text
    content: “Go,”
  - type: text
    content: ' Jesus replied, '
  - type: text
    content: “your son will live.”
  - type: text
    content: 'The man took Jesus at his word and departed. '
  '51':
  - type: text
    content: 'While he was still on the way, his servants met him with the news that his boy was living. '
  '52':
  - type: text
    content: When he inquired as to the time when his son got better, they said to him, “Yesterday, at one in the afternoon, the fever left him.”
  '53':
  - type: text
    content: 'Then the father realized that this was the exact time at which Jesus had said to him, '
  - type: text
    content: “Your son will live.”
  - type: text
    content: ' So he and his whole household believed.'
  '54':
  - type: text
    content: This was the second sign Jesus performed after coming from Judea to Galilee.
  '6':
  - type: text
    content: Jacob’s well was there, and Jesus, tired as he was from the journey, sat down by the well. It was about noon.
  '7':
  - type: text
    content: 'When a Samaritan woman came to draw water, Jesus said to her, '
  - type: text
    content: “Will you give me a drink?”
  - type: text
    content: ' '
  '8':
  - type: text
    content: (His disciples had gone into the town to buy food.)
  '9':
  - type: text
    content: The Samaritan woman said to him, “You are a Jew and I am a Samaritan woman. How can you ask me for a drink?” (For Jews do not associate with Samaritans.
  - type: note
    content: Or do not use dishes Samaritans have used
  - type: text
    content: )
