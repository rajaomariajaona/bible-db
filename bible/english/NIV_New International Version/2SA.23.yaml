document_id: 2SA.23,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Last Words
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the last words of David:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The inspired utterance of David son of Jesse,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the utterance of the man exalted by the Most High,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the man anointed by the God of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the hero of Israel’s songs:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but Eleazar stood his ground and struck down the Philistines till his hand grew tired and froze to the sword. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought about a great victory that day. The troops returned to Eleazar, but only to strip the dead.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Next to him was Shammah son of Agee the Hararite. When the Philistines banded together at a place where there was a field full of lentils, Israel’s troops fled from them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Shammah took his stand in the middle of the field. He defended it and struck the Philistines down, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought about a great victory.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During harvest time, three of the thirty chief warriors came down to David at the cave of Adullam, while a band of Philistines was encamped in the Valley of Rephaim. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time David was in the stronghold, and the Philistine garrison was at Bethlehem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David longed for water and said, “Oh, that someone would get me a drink of water from the well near the gate of Bethlehem!” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the three mighty warriors broke through the Philistine lines, drew water from the well near the gate of Bethlehem and carried it back to David. But he refused to drink it; instead, he poured it out before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Far be it from me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to do this!” he said. “Is it not the blood of men who went at the risk of their lives?” And David would not drink it.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Such were the exploits of the three mighty warriors.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abishai the brother of Joab son of Zeruiah was chief of the Three.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Most Hebrew manuscripts (see also 1 Chron. 11:20); two Hebrew manuscripts and Syriac '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Thirty
      marker-yv: yv-n
    - type: text
      text: ' He raised his spear against three hundred men, whom he killed, and so he became as famous as the Three. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Was he not held in greater honor than the Three? He became their commander, even though he was not included among them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke through me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his word was on my tongue.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaiah son of Jehoiada, a valiant fighter from Kabzeel, performed great exploits. He struck down Moab’s two mightiest warriors. He also went down into a pit on a snowy day and killed a lion. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he struck down a huge Egyptian. Although the Egyptian had a spear in his hand, Benaiah went against him with a club. He snatched the spear from the Egyptian’s hand and killed him with his own spear. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Such were the exploits of Benaiah son of Jehoiada; he too was as famous as the three mighty warriors. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was held in greater honor than any of the Thirty, but he was not included among the Three. And David put him in charge of his bodyguard.
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Among the Thirty were:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Asahel the brother of Joab,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Elhanan son of Dodo from Bethlehem,
  '25':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shammah the Harodite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Elika the Harodite,
  '26':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Helez the Paltite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ira son of Ikkesh from Tekoa,
  '27':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Abiezer from Anathoth,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Sibbekai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also 21:18; 1 Chron. 11:29); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mebunnai
      marker-yv: yv-n
    - type: text
      text: ' the Hushathite,'
  '28':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zalmon the Ahohite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Maharai the Netophathite,
  '29':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Heled
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew manuscripts and Vulgate (see also 1 Chron. 11:30); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Heleb
      marker-yv: yv-n
    - type: text
      text: ' son of Baanah the Netophathite,'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ithai son of Ribai from Gibeah in Benjamin,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God of Israel spoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the Rock of Israel said to me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘When one rules over people in righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he rules in the fear of God,
  '30':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Benaiah the Pirathonite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hiddai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; some Septuagint manuscripts (see also 1 Chron. 11:32) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hurai
      marker-yv: yv-n
    - type: text
      text: ' from the ravines of Gaash,'
  '31':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Abi-Albon the Arbathite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Azmaveth the Barhumite,
  '32':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliahba the Shaalbonite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the sons of Jashen,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Jonathan '
  '33':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: son of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also 1 Chron. 11:34); Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son of
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Shammah the Hararite,'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ahiam son of Sharar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; some Septuagint manuscripts (see also 1 Chron. 11:35) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sakar
      marker-yv: yv-n
    - type: text
      text: ' the Hararite,'
  '34':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliphelet son of Ahasbai the Maakathite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliam son of Ahithophel the Gilonite,
  '35':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hezro the Carmelite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Paarai the Arbite,
  '36':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Igal son of Nathan from Zobah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Hagri,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also 1 Chron. 11:38); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Haggadi
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zelek the Ammonite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Naharai the Beerothite, the armor-bearer of Joab son of Zeruiah,
  '38':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ira the Ithrite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Gareb the Ithrite
  '39':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Uriah the Hittite.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: There were thirty-seven in all.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he is like the light of morning at sunrise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on a cloudless morning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the brightness after rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that brings grass from the earth.’
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If my house were not right with God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: surely he would not have made with me an everlasting covenant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: arranged and secured in every part;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: surely he would not bring to fruition my salvation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and grant me my every desire.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But evil men are all to be cast aside like thorns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which are not gathered with the hand.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever touches thorns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: uses a tool of iron or the shaft of a spear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are burned up where they lie.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Mighty Warriors
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the names of David’s mighty warriors:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Josheb-Basshebeth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; some Septuagint manuscripts suggest '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ish-Bosheth, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'that is, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Esh-Baal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(see also 1 Chron. 11:11 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jashobeam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' a Tahkemonite,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Probably a variant of '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hakmonite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see 1 Chron. 11:11)
      marker-yv: yv-n
    - type: text
      text: ' was chief of the Three; he raised his spear against eight hundred men, whom he killed'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also 1 Chron. 11:11); Hebrew and other Septuagint manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Three; it was Adino the Eznite who killed eight hundred men
      marker-yv: yv-n
    - type: text
      text: ' in one encounter.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Next to him was Eleazar son of Dodai the Ahohite. As one of the three mighty warriors, he was with David when they taunted the Philistines gathered at Pas Dammim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See 1 Chron. 11:13; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gathered there.
      marker-yv: yv-n
    - type: text
      text: ' for battle. Then the Israelites retreated, '
