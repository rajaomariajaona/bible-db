document_id: 2SA.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Last Words
  - type: text
    content: 'These are the last words of David:'
  - type: text
    content: “The inspired utterance of David son of Jesse,
  - type: text
    content: the utterance of the man exalted by the Most High,
  - type: text
    content: the man anointed by the God of Jacob,
  - type: text
    content: 'the hero of Israel’s songs:'
  '10':
  - type: text
    content: 'but Eleazar stood his ground and struck down the Philistines till his hand grew tired and froze to the sword. The '
  - type: text
    content: Lord
  - type: text
    content: ' brought about a great victory that day. The troops returned to Eleazar, but only to strip the dead.'
  '11':
  - type: text
    content: 'Next to him was Shammah son of Agee the Hararite. When the Philistines banded together at a place where there was a field full of lentils, Israel’s troops fled from them. '
  '12':
  - type: text
    content: 'But Shammah took his stand in the middle of the field. He defended it and struck the Philistines down, and the '
  - type: text
    content: Lord
  - type: text
    content: ' brought about a great victory.'
  '13':
  - type: text
    content: 'During harvest time, three of the thirty chief warriors came down to David at the cave of Adullam, while a band of Philistines was encamped in the Valley of Rephaim. '
  '14':
  - type: text
    content: 'At that time David was in the stronghold, and the Philistine garrison was at Bethlehem. '
  '15':
  - type: text
    content: 'David longed for water and said, “Oh, that someone would get me a drink of water from the well near the gate of Bethlehem!” '
  '16':
  - type: text
    content: 'So the three mighty warriors broke through the Philistine lines, drew water from the well near the gate of Bethlehem and carried it back to David. But he refused to drink it; instead, he poured it out before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: '“Far be it from me, '
  - type: text
    content: Lord
  - type: text
    content: ', to do this!” he said. “Is it not the blood of men who went at the risk of their lives?” And David would not drink it.'
  - type: text
    content: Such were the exploits of the three mighty warriors.
  '18':
  - type: text
    content: Abishai the brother of Joab son of Zeruiah was chief of the Three.
  - type: note
    content: Most Hebrew manuscripts (see also 1 Chron. 11:20); two Hebrew manuscripts and Syriac Thirty
  - type: text
    content: ' He raised his spear against three hundred men, whom he killed, and so he became as famous as the Three. '
  '19':
  - type: text
    content: Was he not held in greater honor than the Three? He became their commander, even though he was not included among them.
  '2':
  - type: text
    content: '“The Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke through me;'
  - type: text
    content: his word was on my tongue.
  '20':
  - type: text
    content: 'Benaiah son of Jehoiada, a valiant fighter from Kabzeel, performed great exploits. He struck down Moab’s two mightiest warriors. He also went down into a pit on a snowy day and killed a lion. '
  '21':
  - type: text
    content: 'And he struck down a huge Egyptian. Although the Egyptian had a spear in his hand, Benaiah went against him with a club. He snatched the spear from the Egyptian’s hand and killed him with his own spear. '
  '22':
  - type: text
    content: 'Such were the exploits of Benaiah son of Jehoiada; he too was as famous as the three mighty warriors. '
  '23':
  - type: text
    content: He was held in greater honor than any of the Thirty, but he was not included among the Three. And David put him in charge of his bodyguard.
  '24':
  - type: text
    content: 'Among the Thirty were:'
  - type: text
    content: Asahel the brother of Joab,
  - type: text
    content: Elhanan son of Dodo from Bethlehem,
  '25':
  - type: text
    content: Shammah the Harodite,
  - type: text
    content: Elika the Harodite,
  '26':
  - type: text
    content: Helez the Paltite,
  - type: text
    content: Ira son of Ikkesh from Tekoa,
  '27':
  - type: text
    content: Abiezer from Anathoth,
  - type: text
    content: Sibbekai
  - type: note
    content: Some Septuagint manuscripts (see also 21:18; 1 Chron. 11:29); Hebrew Mebunnai
  - type: text
    content: ' the Hushathite,'
  '28':
  - type: text
    content: Zalmon the Ahohite,
  - type: text
    content: Maharai the Netophathite,
  '29':
  - type: text
    content: Heled
  - type: note
    content: Some Hebrew manuscripts and Vulgate (see also 1 Chron. 11:30); most Hebrew manuscripts Heleb
  - type: text
    content: ' son of Baanah the Netophathite,'
  - type: text
    content: Ithai son of Ribai from Gibeah in Benjamin,
  '3':
  - type: text
    content: The God of Israel spoke,
  - type: text
    content: 'the Rock of Israel said to me:'
  - type: text
    content: ‘When one rules over people in righteousness,
  - type: text
    content: when he rules in the fear of God,
  '30':
  - type: text
    content: Benaiah the Pirathonite,
  - type: text
    content: Hiddai
  - type: note
    content: Hebrew; some Septuagint manuscripts (see also 1 Chron. 11:32) Hurai
  - type: text
    content: ' from the ravines of Gaash,'
  '31':
  - type: text
    content: Abi-Albon the Arbathite,
  - type: text
    content: Azmaveth the Barhumite,
  '32':
  - type: text
    content: Eliahba the Shaalbonite,
  - type: text
    content: the sons of Jashen,
  - type: text
    content: 'Jonathan '
  '33':
  - type: text
    content: son of
  - type: note
    content: Some Septuagint manuscripts (see also 1 Chron. 11:34); Hebrew does not have son of.
  - type: text
    content: ' Shammah the Hararite,'
  - type: text
    content: Ahiam son of Sharar
  - type: note
    content: Hebrew; some Septuagint manuscripts (see also 1 Chron. 11:35) Sakar
  - type: text
    content: ' the Hararite,'
  '34':
  - type: text
    content: Eliphelet son of Ahasbai the Maakathite,
  - type: text
    content: Eliam son of Ahithophel the Gilonite,
  '35':
  - type: text
    content: Hezro the Carmelite,
  - type: text
    content: Paarai the Arbite,
  '36':
  - type: text
    content: Igal son of Nathan from Zobah,
  - type: text
    content: the son of Hagri,
  - type: note
    content: Some Septuagint manuscripts (see also 1 Chron. 11:38); Hebrew Haggadi
  '37':
  - type: text
    content: Zelek the Ammonite,
  - type: text
    content: Naharai the Beerothite, the armor-bearer of Joab son of Zeruiah,
  '38':
  - type: text
    content: Ira the Ithrite,
  - type: text
    content: Gareb the Ithrite
  '39':
  - type: text
    content: and Uriah the Hittite.
  - type: text
    content: There were thirty-seven in all.
  '4':
  - type: text
    content: he is like the light of morning at sunrise
  - type: text
    content: on a cloudless morning,
  - type: text
    content: like the brightness after rain
  - type: text
    content: that brings grass from the earth.’
  '5':
  - type: text
    content: “If my house were not right with God,
  - type: text
    content: surely he would not have made with me an everlasting covenant,
  - type: text
    content: arranged and secured in every part;
  - type: text
    content: surely he would not bring to fruition my salvation
  - type: text
    content: and grant me my every desire.
  '6':
  - type: text
    content: But evil men are all to be cast aside like thorns,
  - type: text
    content: which are not gathered with the hand.
  '7':
  - type: text
    content: Whoever touches thorns
  - type: text
    content: uses a tool of iron or the shaft of a spear;
  - type: text
    content: they are burned up where they lie.”
  - type: heading
    content: David’s Mighty Warriors
  '8':
  - type: text
    content: 'These are the names of David’s mighty warriors:'
  - type: text
    content: Josheb-Basshebeth,
  - type: note
    content: Hebrew; some Septuagint manuscripts suggest Ish-Bosheth, that is, Esh-Baal (see also 1 Chron. 11:11 Jashobeam).
  - type: text
    content: ' a Tahkemonite,'
  - type: note
    content: Probably a variant of Hakmonite (see 1 Chron. 11:11)
  - type: text
    content: ' was chief of the Three; he raised his spear against eight hundred men, whom he killed'
  - type: note
    content: Some Septuagint manuscripts (see also 1 Chron. 11:11); Hebrew and other Septuagint manuscripts Three; it was Adino the Eznite who killed eight hundred men
  - type: text
    content: ' in one encounter.'
  '9':
  - type: text
    content: Next to him was Eleazar son of Dodai the Ahohite. As one of the three mighty warriors, he was with David when they taunted the Philistines gathered at Pas Dammim
  - type: note
    content: See 1 Chron. 11:13; Hebrew gathered there.
  - type: text
    content: ' for battle. Then the Israelites retreated, '
