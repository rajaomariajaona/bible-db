document_id: ACT.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter Heals a Lame Beggar
  - type: text
    content: 'One day Peter and John were going up to the temple at the time of prayer—at three in the afternoon. '
  '10':
  - type: text
    content: they recognized him as the same man who used to sit begging at the temple gate called Beautiful, and they were filled with wonder and amazement at what had happened to him.
  - type: heading
    content: Peter Speaks to the Onlookers
  '11':
  - type: text
    content: 'While the man held on to Peter and John, all the people were astonished and came running to them in the place called Solomon’s Colonnade. '
  '12':
  - type: text
    content: 'When Peter saw this, he said to them: “Fellow Israelites, why does this surprise you? Why do you stare at us as if by our own power or godliness we had made this man walk? '
  '13':
  - type: text
    content: 'The God of Abraham, Isaac and Jacob, the God of our fathers, has glorified his servant Jesus. You handed him over to be killed, and you disowned him before Pilate, though he had decided to let him go. '
  '14':
  - type: text
    content: 'You disowned the Holy and Righteous One and asked that a murderer be released to you. '
  '15':
  - type: text
    content: 'You killed the author of life, but God raised him from the dead. We are witnesses of this. '
  '16':
  - type: text
    content: By faith in the name of Jesus, this man whom you see and know was made strong. It is Jesus’ name and the faith that comes through him that has completely healed him, as you can all see.
  '17':
  - type: text
    content: '“Now, fellow Israelites, I know that you acted in ignorance, as did your leaders. '
  '18':
  - type: text
    content: 'But this is how God fulfilled what he had foretold through all the prophets, saying that his Messiah would suffer. '
  '19':
  - type: text
    content: 'Repent, then, and turn to God, so that your sins may be wiped out, that times of refreshing may come from the Lord, '
  '2':
  - type: text
    content: 'Now a man who was lame from birth was being carried to the temple gate called Beautiful, where he was put every day to beg from those going into the temple courts. '
  '20':
  - type: text
    content: 'and that he may send the Messiah, who has been appointed for you—even Jesus. '
  '21':
  - type: text
    content: 'Heaven must receive him until the time comes for God to restore everything, as he promised long ago through his holy prophets. '
  '22':
  - type: text
    content: 'For Moses said, ‘The Lord your God will raise up for you a prophet like me from among your own people; you must listen to everything he tells you. '
  '23':
  - type: text
    content: Anyone who does not listen to him will be completely cut off from their people.’
  - type: note
    content: Deut. 18:15,18,19
  '24':
  - type: text
    content: '“Indeed, beginning with Samuel, all the prophets who have spoken have foretold these days. '
  '25':
  - type: text
    content: And you are heirs of the prophets and of the covenant God made with your fathers. He said to Abraham, ‘Through your offspring all peoples on earth will be blessed.’
  - type: note
    content: Gen. 22:18; 26:4
  - type: text
    content: ' '
  '26':
  - type: text
    content: When God raised up his servant, he sent him first to you to bless you by turning each of you from your wicked ways.”
  '3':
  - type: text
    content: 'When he saw Peter and John about to enter, he asked them for money. '
  '4':
  - type: text
    content: 'Peter looked straight at him, as did John. Then Peter said, “Look at us!” '
  '5':
  - type: text
    content: So the man gave them his attention, expecting to get something from them.
  '6':
  - type: text
    content: 'Then Peter said, “Silver or gold I do not have, but what I do have I give you. In the name of Jesus Christ of Nazareth, walk.” '
  '7':
  - type: text
    content: 'Taking him by the right hand, he helped him up, and instantly the man’s feet and ankles became strong. '
  '8':
  - type: text
    content: 'He jumped to his feet and began to walk. Then he went with them into the temple courts, walking and jumping, and praising God. '
  '9':
  - type: text
    content: 'When all the people saw him walking and praising God, '
