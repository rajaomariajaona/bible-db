document_id: 2CH.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Abijah King of Judah
  - type: text
    content: 'In the eighteenth year of the reign of Jeroboam, Abijah became king of Judah, '
  '10':
  - type: text
    content: '“As for us, the '
  - type: text
    content: Lord
  - type: text
    content: ' is our God, and we have not forsaken him. The priests who serve the '
  - type: text
    content: Lord
  - type: text
    content: ' are sons of Aaron, and the Levites assist them. '
  '11':
  - type: text
    content: 'Every morning and evening they present burnt offerings and fragrant incense to the '
  - type: text
    content: Lord
  - type: text
    content: '. They set out the bread on the ceremonially clean table and light the lamps on the gold lampstand every evening. We are observing the requirements of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. But you have forsaken him. '
  '12':
  - type: text
    content: 'God is with us; he is our leader. His priests with their trumpets will sound the battle cry against you. People of Israel, do not fight against the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, for you will not succeed.”'
  '13':
  - type: text
    content: 'Now Jeroboam had sent troops around to the rear, so that while he was in front of Judah the ambush was behind them. '
  '14':
  - type: text
    content: 'Judah turned and saw that they were being attacked at both front and rear. Then they cried out to the '
  - type: text
    content: Lord
  - type: text
    content: '. The priests blew their trumpets '
  '15':
  - type: text
    content: 'and the men of Judah raised the battle cry. At the sound of their battle cry, God routed Jeroboam and all Israel before Abijah and Judah. '
  '16':
  - type: text
    content: 'The Israelites fled before Judah, and God delivered them into their hands. '
  '17':
  - type: text
    content: 'Abijah and his troops inflicted heavy losses on them, so that there were five hundred thousand casualties among Israel’s able men. '
  '18':
  - type: text
    content: 'The Israelites were subdued on that occasion, and the people of Judah were victorious because they relied on the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors.'
  '19':
  - type: text
    content: 'Abijah pursued Jeroboam and took from him the towns of Bethel, Jeshanah and Ephron, with their surrounding villages. '
  '2':
  - type: text
    content: and he reigned in Jerusalem three years. His mother’s name was Maakah,
  - type: note
    content: Most Septuagint manuscripts and Syriac (see also 11:20 and 1 Kings 15:2); Hebrew Micaiah
  - type: text
    content: ' a daughter'
  - type: note
    content: Or granddaughter
  - type: text
    content: ' of Uriel of Gibeah.'
  - type: text
    content: 'There was war between Abijah and Jeroboam. '
  '20':
  - type: text
    content: 'Jeroboam did not regain power during the time of Abijah. And the '
  - type: text
    content: Lord
  - type: text
    content: ' struck him down and he died.'
  '21':
  - type: text
    content: But Abijah grew in strength. He married fourteen wives and had twenty-two sons and sixteen daughters.
  '22':
  - type: text
    content: The other events of Abijah’s reign, what he did and what he said, are written in the annotations of the prophet Iddo.
  '3':
  - type: text
    content: Abijah went into battle with an army of four hundred thousand able fighting men, and Jeroboam drew up a battle line against him with eight hundred thousand able troops.
  '4':
  - type: text
    content: 'Abijah stood on Mount Zemaraim, in the hill country of Ephraim, and said, “Jeroboam and all Israel, listen to me! '
  '5':
  - type: text
    content: 'Don’t you know that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has given the kingship of Israel to David and his descendants forever by a covenant of salt? '
  '6':
  - type: text
    content: 'Yet Jeroboam son of Nebat, an official of Solomon son of David, rebelled against his master. '
  '7':
  - type: text
    content: Some worthless scoundrels gathered around him and opposed Rehoboam son of Solomon when he was young and indecisive and not strong enough to resist them.
  '8':
  - type: text
    content: '“And now you plan to resist the kingdom of the '
  - type: text
    content: Lord
  - type: text
    content: ', which is in the hands of David’s descendants. You are indeed a vast army and have with you the golden calves that Jeroboam made to be your gods. '
  '9':
  - type: text
    content: 'But didn’t you drive out the priests of the '
  - type: text
    content: Lord
  - type: text
    content: ', the sons of Aaron, and the Levites, and make priests of your own as the peoples of other lands do? Whoever comes to consecrate himself with a young bull and seven rams may become a priest of what are not gods.'
