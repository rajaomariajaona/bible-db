document_id: LUK.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Sends Out the Twelve
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus had called the Twelve together, he gave them power and authority to drive out all demons and to cure diseases, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the apostles returned, they reported to Jesus what they had done. Then he took them with him and they withdrew by themselves to a town called Bethsaida, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but the crowds learned about it and followed him. He welcomed them and spoke to them about the kingdom of God, and healed those who needed healing.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Late in the afternoon the Twelve came to him and said, “Send the crowd away so they can go to the surrounding villages and countryside and find food and lodging, because we are in a remote place here.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You give them something to eat.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They answered, “We have only five loaves of bread and two fish—unless we go and buy food for all this crowd.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (About five thousand men were there.)
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Have them sit down in groups of about fifty each.”
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The disciples did so, and everyone sat down. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taking the five loaves and the two fish and looking up to heaven, he gave thanks and broke them. Then he gave them to the disciples to distribute to the people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They all ate and were satisfied, and the disciples picked up twelve basketfuls of broken pieces that were left over.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter Declares That Jesus Is the Messiah
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once when Jesus was praying in private and his disciples were with him, he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who do the crowds say I am?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They replied, “Some say John the Baptist; others say Elijah; and still others, that one of the prophets of long ago has come back to life.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he sent them out to proclaim the kingdom of God and to heal the sick. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But what about you?”
    - type: text
      text: ' he asked. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who do you say I am?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter answered, “God’s Messiah.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts His Death
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus strictly warned them not to tell this to anyone. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Son of Man must suffer many things and be rejected by the elders, the chief priests and the teachers of the law, and he must be killed and on the third day be raised to life.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to them all: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whoever wants to be my disciple must deny themselves and take up their cross daily and follow me.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For whoever wants to save their life will lose it, but whoever loses their life for me will save it.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What good is it for someone to gain the whole world, and yet lose or forfeit their very self?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever is ashamed of me and my words, the Son of Man will be ashamed of them when he comes in his glory and in the glory of the Father and of the holy angels.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Truly I tell you, some who are standing here will not taste death before they see the kingdom of God.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Transfiguration
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'About eight days after Jesus said this, he took Peter, John and James with him and went up onto a mountain to pray. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he was praying, the appearance of his face changed, and his clothes became as bright as a flash of lightning. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He told them: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take nothing for the journey—no staff, no bag, no bread, no money, no extra shirt.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Two men, Moses and Elijah, appeared in glorious splendor, talking with Jesus. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They spoke about his departure,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exodos
      marker-yv: yv-n
    - type: text
      text: ' which he was about to bring to fulfillment at Jerusalem. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter and his companions were very sleepy, but when they became fully awake, they saw his glory and the two men standing with him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As the men were leaving Jesus, Peter said to him, “Master, it is good for us to be here. Let us put up three shelters—one for you, one for Moses and one for Elijah.” (He did not know what he was saying.)
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While he was speaking, a cloud appeared and covered them, and they were afraid as they entered the cloud. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A voice came from the cloud, saying, “This is my Son, whom I have chosen; listen to him.” '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the voice had spoken, they found that Jesus was alone. The disciples kept this to themselves and did not tell anyone at that time what they had seen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Demon-Possessed Boy
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day, when they came down from the mountain, a large crowd met him. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A man in the crowd called out, “Teacher, I beg you to look at my son, for he is my only child. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A spirit seizes him and he suddenly screams; it throws him into convulsions so that he foams at the mouth. It scarcely ever leaves him and is destroying him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whatever house you enter, stay there until you leave that town.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I begged your disciples to drive it out, but they could not.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You unbelieving and perverse generation,”
    - type: text
      text: ' Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “how long shall I stay with you and put up with you? Bring your son here.”
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even while the boy was coming, the demon threw him to the ground in a convulsion. But Jesus rebuked the impure spirit, healed the boy and gave him back to his father. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they were all amazed at the greatness of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts His Death a Second Time
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While everyone was marveling at all that Jesus did, he said to his disciples, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Listen carefully to what I am about to tell you: The Son of Man is going to be delivered into the hands of men.”'
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they did not understand what this meant. It was hidden from them, so that they did not grasp it, and they were afraid to ask him about it.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'An argument started among the disciples as to which of them would be the greatest. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus, knowing their thoughts, took a little child and had him stand beside him. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whoever welcomes this little child in my name welcomes me; and whoever welcomes me welcomes the one who sent me. For it is the one who is least among you all who is the greatest.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Master,” said John, “we saw someone driving out demons in your name and we tried to stop him, because he is not one of us.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If people do not welcome you, leave their town and shake the dust off your feet as a testimony against them.”
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not stop him,”
    - type: text
      text: ' Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “for whoever is not against you is for you.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samaritan Opposition
    marker-yv: yv-h
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the time approached for him to be taken up to heaven, Jesus resolutely set out for Jerusalem. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he sent messengers on ahead, who went into a Samaritan village to get things ready for him; '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the people there did not welcome him, because he was heading for Jerusalem. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the disciples James and John saw this, they asked, “Lord, do you want us to call fire down from heaven to destroy them
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: them, just as Elijah did
      marker-yv: yv-n
    - type: text
      text: '?” '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus turned and rebuked them. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he and his disciples went to another village.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cost of Following Jesus
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As they were walking along the road, a man said to him, “I will follow you wherever you go.”
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Foxes have dens and birds have nests, but the Son of Man has no place to lay his head.”
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to another man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Follow me.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he replied, “Lord, first let me go and bury my father.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they set out and went from village to village, proclaiming the good news and healing people everywhere.
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let the dead bury their own dead, but you go and proclaim the kingdom of God.”
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Still another said, “I will follow you, Lord; but first let me go back and say goodbye to my family.”
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No one who puts a hand to the plow and looks back is fit for service in the kingdom of God.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Herod the tetrarch heard about all that was going on. And he was perplexed because some were saying that John had been raised from the dead, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'others that Elijah had appeared, and still others that one of the prophets of long ago had come back to life. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Herod said, “I beheaded John. Who, then, is this I hear such things about?” And he tried to see him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds the Five Thousand
    marker-yv: yv-h
