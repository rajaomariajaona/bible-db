document_id: LUK.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Sends Out the Twelve
  - type: text
    content: 'When Jesus had called the Twelve together, he gave them power and authority to drive out all demons and to cure diseases, '
  '10':
  - type: text
    content: 'When the apostles returned, they reported to Jesus what they had done. Then he took them with him and they withdrew by themselves to a town called Bethsaida, '
  '11':
  - type: text
    content: but the crowds learned about it and followed him. He welcomed them and spoke to them about the kingdom of God, and healed those who needed healing.
  '12':
  - type: text
    content: Late in the afternoon the Twelve came to him and said, “Send the crowd away so they can go to the surrounding villages and countryside and find food and lodging, because we are in a remote place here.”
  '13':
  - type: text
    content: 'He replied, '
  - type: text
    content: “You give them something to eat.”
  - type: text
    content: 'They answered, “We have only five loaves of bread and two fish—unless we go and buy food for all this crowd.” '
  '14':
  - type: text
    content: (About five thousand men were there.)
  - type: text
    content: 'But he said to his disciples, '
  - type: text
    content: “Have them sit down in groups of about fifty each.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'The disciples did so, and everyone sat down. '
  '16':
  - type: text
    content: 'Taking the five loaves and the two fish and looking up to heaven, he gave thanks and broke them. Then he gave them to the disciples to distribute to the people. '
  '17':
  - type: text
    content: They all ate and were satisfied, and the disciples picked up twelve basketfuls of broken pieces that were left over.
  - type: heading
    content: Peter Declares That Jesus Is the Messiah
  '18':
  - type: text
    content: 'Once when Jesus was praying in private and his disciples were with him, he asked them, '
  - type: text
    content: “Who do the crowds say I am?”
  '19':
  - type: text
    content: They replied, “Some say John the Baptist; others say Elijah; and still others, that one of the prophets of long ago has come back to life.”
  '2':
  - type: text
    content: 'and he sent them out to proclaim the kingdom of God and to heal the sick. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “But what about you?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “Who do you say I am?”
  - type: text
    content: Peter answered, “God’s Messiah.”
  - type: heading
    content: Jesus Predicts His Death
  '21':
  - type: text
    content: 'Jesus strictly warned them not to tell this to anyone. '
  '22':
  - type: text
    content: 'And he said, '
  - type: text
    content: “The Son of Man must suffer many things and be rejected by the elders, the chief priests and the teachers of the law, and he must be killed and on the third day be raised to life.”
  '23':
  - type: text
    content: 'Then he said to them all: '
  - type: text
    content: “Whoever wants to be my disciple must deny themselves and take up their cross daily and follow me.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For whoever wants to save their life will lose it, but whoever loses their life for me will save it.
  - type: text
    content: ' '
  '25':
  - type: text
    content: What good is it for someone to gain the whole world, and yet lose or forfeit their very self?
  - type: text
    content: ' '
  '26':
  - type: text
    content: Whoever is ashamed of me and my words, the Son of Man will be ashamed of them when he comes in his glory and in the glory of the Father and of the holy angels.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “Truly I tell you, some who are standing here will not taste death before they see the kingdom of God.”
  - type: heading
    content: The Transfiguration
  '28':
  - type: text
    content: 'About eight days after Jesus said this, he took Peter, John and James with him and went up onto a mountain to pray. '
  '29':
  - type: text
    content: 'As he was praying, the appearance of his face changed, and his clothes became as bright as a flash of lightning. '
  '3':
  - type: text
    content: 'He told them: '
  - type: text
    content: “Take nothing for the journey—no staff, no bag, no bread, no money, no extra shirt.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Two men, Moses and Elijah, appeared in glorious splendor, talking with Jesus. '
  '31':
  - type: text
    content: They spoke about his departure,
  - type: note
    content: Greek exodos
  - type: text
    content: ' which he was about to bring to fulfillment at Jerusalem. '
  '32':
  - type: text
    content: 'Peter and his companions were very sleepy, but when they became fully awake, they saw his glory and the two men standing with him. '
  '33':
  - type: text
    content: As the men were leaving Jesus, Peter said to him, “Master, it is good for us to be here. Let us put up three shelters—one for you, one for Moses and one for Elijah.” (He did not know what he was saying.)
  '34':
  - type: text
    content: 'While he was speaking, a cloud appeared and covered them, and they were afraid as they entered the cloud. '
  '35':
  - type: text
    content: 'A voice came from the cloud, saying, “This is my Son, whom I have chosen; listen to him.” '
  '36':
  - type: text
    content: When the voice had spoken, they found that Jesus was alone. The disciples kept this to themselves and did not tell anyone at that time what they had seen.
  - type: heading
    content: Jesus Heals a Demon-Possessed Boy
  '37':
  - type: text
    content: 'The next day, when they came down from the mountain, a large crowd met him. '
  '38':
  - type: text
    content: 'A man in the crowd called out, “Teacher, I beg you to look at my son, for he is my only child. '
  '39':
  - type: text
    content: 'A spirit seizes him and he suddenly screams; it throws him into convulsions so that he foams at the mouth. It scarcely ever leaves him and is destroying him. '
  '4':
  - type: text
    content: Whatever house you enter, stay there until you leave that town.
  - type: text
    content: ' '
  '40':
  - type: text
    content: I begged your disciples to drive it out, but they could not.”
  '41':
  - type: text
    content: ' '
  - type: text
    content: “You unbelieving and perverse generation,”
  - type: text
    content: ' Jesus replied, '
  - type: text
    content: “how long shall I stay with you and put up with you? Bring your son here.”
  '42':
  - type: text
    content: 'Even while the boy was coming, the demon threw him to the ground in a convulsion. But Jesus rebuked the impure spirit, healed the boy and gave him back to his father. '
  '43':
  - type: text
    content: And they were all amazed at the greatness of God.
  - type: heading
    content: Jesus Predicts His Death a Second Time
  - type: text
    content: 'While everyone was marveling at all that Jesus did, he said to his disciples, '
  '44':
  - type: text
    content: '“Listen carefully to what I am about to tell you: The Son of Man is going to be delivered into the hands of men.”'
  - type: text
    content: ' '
  '45':
  - type: text
    content: But they did not understand what this meant. It was hidden from them, so that they did not grasp it, and they were afraid to ask him about it.
  '46':
  - type: text
    content: 'An argument started among the disciples as to which of them would be the greatest. '
  '47':
  - type: text
    content: 'Jesus, knowing their thoughts, took a little child and had him stand beside him. '
  '48':
  - type: text
    content: 'Then he said to them, '
  - type: text
    content: “Whoever welcomes this little child in my name welcomes me; and whoever welcomes me welcomes the one who sent me. For it is the one who is least among you all who is the greatest.”
  '49':
  - type: text
    content: “Master,” said John, “we saw someone driving out demons in your name and we tried to stop him, because he is not one of us.”
  '5':
  - type: text
    content: If people do not welcome you, leave their town and shake the dust off your feet as a testimony against them.”
  - type: text
    content: ' '
  '50':
  - type: text
    content: ' '
  - type: text
    content: “Do not stop him,”
  - type: text
    content: ' Jesus said, '
  - type: text
    content: “for whoever is not against you is for you.”
  - type: heading
    content: Samaritan Opposition
  '51':
  - type: text
    content: 'As the time approached for him to be taken up to heaven, Jesus resolutely set out for Jerusalem. '
  '52':
  - type: text
    content: 'And he sent messengers on ahead, who went into a Samaritan village to get things ready for him; '
  '53':
  - type: text
    content: 'but the people there did not welcome him, because he was heading for Jerusalem. '
  '54':
  - type: text
    content: When the disciples James and John saw this, they asked, “Lord, do you want us to call fire down from heaven to destroy them
  - type: note
    content: Some manuscripts them, just as Elijah did
  - type: text
    content: '?” '
  '55':
  - type: text
    content: 'But Jesus turned and rebuked them. '
  '56':
  - type: text
    content: Then he and his disciples went to another village.
  - type: heading
    content: The Cost of Following Jesus
  '57':
  - type: text
    content: As they were walking along the road, a man said to him, “I will follow you wherever you go.”
  '58':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Foxes have dens and birds have nests, but the Son of Man has no place to lay his head.”
  '59':
  - type: text
    content: 'He said to another man, '
  - type: text
    content: “Follow me.”
  - type: text
    content: But he replied, “Lord, first let me go and bury my father.”
  '6':
  - type: text
    content: So they set out and went from village to village, proclaiming the good news and healing people everywhere.
  '60':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Let the dead bury their own dead, but you go and proclaim the kingdom of God.”
  '61':
  - type: text
    content: Still another said, “I will follow you, Lord; but first let me go back and say goodbye to my family.”
  '62':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “No one who puts a hand to the plow and looks back is fit for service in the kingdom of God.”
  '7':
  - type: text
    content: 'Now Herod the tetrarch heard about all that was going on. And he was perplexed because some were saying that John had been raised from the dead, '
  '8':
  - type: text
    content: 'others that Elijah had appeared, and still others that one of the prophets of long ago had come back to life. '
  '9':
  - type: text
    content: But Herod said, “I beheaded John. Who, then, is this I hear such things about?” And he tried to see him.
  - type: heading
    content: Jesus Feeds the Five Thousand
