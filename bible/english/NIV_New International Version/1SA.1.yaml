document_id: 1SA.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Samuel
  - type: text
    content: There was a certain man from Ramathaim, a Zuphite
  - type: note
    content: See Septuagint and 1 Chron. 6:26-27,33-35; or from Ramathaim Zuphim.
  - type: text
    content: ' from the hill country of Ephraim, whose name was Elkanah son of Jeroham, the son of Elihu, the son of Tohu, the son of Zuph, an Ephraimite. '
  '10':
  - type: text
    content: 'In her deep anguish Hannah prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', weeping bitterly. '
  '11':
  - type: text
    content: And she made a vow, saying, “
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, if you will only look on your servant’s misery and remember me, and not forget your servant but give her a son, then I will give him to the '
  - type: text
    content: Lord
  - type: text
    content: ' for all the days of his life, and no razor will ever be used on his head.”'
  '12':
  - type: text
    content: 'As she kept on praying to the '
  - type: text
    content: Lord
  - type: text
    content: ', Eli observed her mouth. '
  '13':
  - type: text
    content: 'Hannah was praying in her heart, and her lips were moving but her voice was not heard. Eli thought she was drunk '
  '14':
  - type: text
    content: and said to her, “How long are you going to stay drunk? Put away your wine.”
  '15':
  - type: text
    content: '“Not so, my lord,” Hannah replied, “I am a woman who is deeply troubled. I have not been drinking wine or beer; I was pouring out my soul to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: Do not take your servant for a wicked woman; I have been praying here out of my great anguish and grief.”
  '17':
  - type: text
    content: Eli answered, “Go in peace, and may the God of Israel grant you what you have asked of him.”
  '18':
  - type: text
    content: She said, “May your servant find favor in your eyes.” Then she went her way and ate something, and her face was no longer downcast.
  '19':
  - type: text
    content: 'Early the next morning they arose and worshiped before the '
  - type: text
    content: Lord
  - type: text
    content: ' and then went back to their home at Ramah. Elkanah made love to his wife Hannah, and the '
  - type: text
    content: Lord
  - type: text
    content: ' remembered her. '
  '2':
  - type: text
    content: He had two wives; one was called Hannah and the other Peninnah. Peninnah had children, but Hannah had none.
  '20':
  - type: text
    content: So in the course of time Hannah became pregnant and gave birth to a son. She named him Samuel,
  - type: note
    content: Samuel sounds like the Hebrew for heard by God.
  - type: text
    content: ' saying, “Because I asked the '
  - type: text
    content: Lord
  - type: text
    content: ' for him.”'
  - type: heading
    content: Hannah Dedicates Samuel
  '21':
  - type: text
    content: 'When her husband Elkanah went up with all his family to offer the annual sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' and to fulfill his vow, '
  '22':
  - type: text
    content: 'Hannah did not go. She said to her husband, “After the boy is weaned, I will take him and present him before the '
  - type: text
    content: Lord
  - type: text
    content: ', and he will live there always.”'
  - type: note
    content: Masoretic Text; Dead Sea Scrolls always. I have dedicated him as a Nazirite—all the days of his life.”
  '23':
  - type: text
    content: '“Do what seems best to you,” her husband Elkanah told her. “Stay here until you have weaned him; only may the '
  - type: text
    content: Lord
  - type: text
    content: ' make good his'
  - type: note
    content: Masoretic Text; Dead Sea Scrolls, Septuagint and Syriac your
  - type: text
    content: ' word.” So the woman stayed at home and nursed her son until she had weaned him.'
  '24':
  - type: text
    content: After he was weaned, she took the boy with her, young as he was, along with a three-year-old bull,
  - type: note
    content: Dead Sea Scrolls, Septuagint and Syriac; Masoretic Text with three bulls
  - type: text
    content: ' an ephah'
  - type: note
    content: That is, probably about 36 pounds or about 16 kilograms
  - type: text
    content: ' of flour and a skin of wine, and brought him to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' at Shiloh. '
  '25':
  - type: text
    content: 'When the bull had been sacrificed, they brought the boy to Eli, '
  '26':
  - type: text
    content: 'and she said to him, “Pardon me, my lord. As surely as you live, I am the woman who stood here beside you praying to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'I prayed for this child, and the '
  - type: text
    content: Lord
  - type: text
    content: ' has granted me what I asked of him. '
  '28':
  - type: text
    content: 'So now I give him to the '
  - type: text
    content: Lord
  - type: text
    content: '. For his whole life he will be given over to the '
  - type: text
    content: Lord
  - type: text
    content: '.” And he worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' there.'
  '3':
  - type: text
    content: 'Year after year this man went up from his town to worship and sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty at Shiloh, where Hophni and Phinehas, the two sons of Eli, were priests of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Whenever the day came for Elkanah to sacrifice, he would give portions of the meat to his wife Peninnah and to all her sons and daughters. '
  '5':
  - type: text
    content: 'But to Hannah he gave a double portion because he loved her, and the '
  - type: text
    content: Lord
  - type: text
    content: ' had closed her womb. '
  '6':
  - type: text
    content: 'Because the '
  - type: text
    content: Lord
  - type: text
    content: ' had closed Hannah’s womb, her rival kept provoking her in order to irritate her. '
  '7':
  - type: text
    content: 'This went on year after year. Whenever Hannah went up to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', her rival provoked her till she wept and would not eat. '
  '8':
  - type: text
    content: Her husband Elkanah would say to her, “Hannah, why are you weeping? Why don’t you eat? Why are you downhearted? Don’t I mean more to you than ten sons?”
  '9':
  - type: text
    content: 'Once when they had finished eating and drinking in Shiloh, Hannah stood up. Now Eli the priest was sitting on his chair by the doorpost of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house. '
