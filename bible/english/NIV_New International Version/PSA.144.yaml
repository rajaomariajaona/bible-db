document_id: PSA.144,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 144
  - type: text
    content: Of David.
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ' my Rock,'
  - type: text
    content: who trains my hands for war,
  - type: text
    content: my fingers for battle.
  '10':
  - type: text
    content: to the One who gives victory to kings,
  - type: text
    content: who delivers his servant David.
  - type: text
    content: 'From the deadly sword '
  '11':
  - type: text
    content: deliver me;
  - type: text
    content: rescue me from the hands of foreigners
  - type: text
    content: whose mouths are full of lies,
  - type: text
    content: whose right hands are deceitful.
  '12':
  - type: text
    content: Then our sons in their youth
  - type: text
    content: will be like well-nurtured plants,
  - type: text
    content: and our daughters will be like pillars
  - type: text
    content: carved to adorn a palace.
  '13':
  - type: text
    content: Our barns will be filled
  - type: text
    content: with every kind of provision.
  - type: text
    content: Our sheep will increase by thousands,
  - type: text
    content: by tens of thousands in our fields;
  '14':
  - type: text
    content: our oxen will draw heavy loads.
  - type: note
    content: Or our chieftains will be firmly established
  - type: text
    content: There will be no breaching of walls,
  - type: text
    content: no going into captivity,
  - type: text
    content: no cry of distress in our streets.
  '15':
  - type: text
    content: Blessed is the people of whom this is true;
  - type: text
    content: 'blessed is the people whose God is the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: He is my loving God and my fortress,
  - type: text
    content: my stronghold and my deliverer,
  - type: text
    content: my shield, in whom I take refuge,
  - type: text
    content: who subdues peoples
  - type: note
    content: Many manuscripts of the Masoretic Text, Dead Sea Scrolls, Aquila, Jerome and Syriac; most manuscripts of the Masoretic Text subdues my people
  - type: text
    content: ' under me.'
  '3':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', what are human beings that you care for them,'
  - type: text
    content: mere mortals that you think of them?
  '4':
  - type: text
    content: They are like a breath;
  - type: text
    content: their days are like a fleeting shadow.
  '5':
  - type: text
    content: 'Part your heavens, '
  - type: text
    content: Lord
  - type: text
    content: ', and come down;'
  - type: text
    content: touch the mountains, so that they smoke.
  '6':
  - type: text
    content: Send forth lightning and scatter the enemy;
  - type: text
    content: shoot your arrows and rout them.
  '7':
  - type: text
    content: Reach down your hand from on high;
  - type: text
    content: deliver me and rescue me
  - type: text
    content: from the mighty waters,
  - type: text
    content: from the hands of foreigners
  '8':
  - type: text
    content: whose mouths are full of lies,
  - type: text
    content: whose right hands are deceitful.
  '9':
  - type: text
    content: I will sing a new song to you, my God;
  - type: text
    content: on the ten-stringed lyre I will make music to you,
