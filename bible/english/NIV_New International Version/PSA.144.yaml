document_id: PSA.144,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 144
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my Rock,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who trains my hands for war,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my fingers for battle.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: to the One who gives victory to kings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who delivers his servant David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From the deadly sword '
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: deliver me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rescue me from the hands of foreigners
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose mouths are full of lies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose right hands are deceitful.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then our sons in their youth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be like well-nurtured plants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and our daughters will be like pillars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: carved to adorn a palace.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Our barns will be filled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with every kind of provision.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our sheep will increase by thousands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by tens of thousands in our fields;
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: our oxen will draw heavy loads.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '144:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: our chieftains will be firmly established
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be no breaching of walls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no going into captivity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no cry of distress in our streets.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Blessed is the people of whom this is true;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'blessed is the people whose God is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He is my loving God and my fortress,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my stronghold and my deliverer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my shield, in whom I take refuge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who subdues peoples
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '144:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many manuscripts of the Masoretic Text, Dead Sea Scrolls, Aquila, Jerome and Syriac; most manuscripts of the Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: subdues my people
      marker-yv: yv-n
    - type: text
      text: ' under me.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', what are human beings that you care for them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mere mortals that you think of them?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They are like a breath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their days are like a fleeting shadow.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Part your heavens, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and come down;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: touch the mountains, so that they smoke.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Send forth lightning and scatter the enemy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shoot your arrows and rout them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Reach down your hand from on high;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deliver me and rescue me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the mighty waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the hands of foreigners
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: whose mouths are full of lies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose right hands are deceitful.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I will sing a new song to you, my God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the ten-stringed lyre I will make music to you,
