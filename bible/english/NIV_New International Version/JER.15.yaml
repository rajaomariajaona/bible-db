document_id: JER.15,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Even if Moses and Samuel were to stand before me, my heart would not go out to this people. Send them away from my presence! Let them go! '
  '10':
  - type: text
    content: Alas, my mother, that you gave me birth,
  - type: text
    content: a man with whom the whole land strives and contends!
  - type: text
    content: I have neither lent nor borrowed,
  - type: text
    content: yet everyone curses me.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said,'
  - type: text
    content: “Surely I will deliver you for a good purpose;
  - type: text
    content: surely I will make your enemies plead with you
  - type: text
    content: in times of disaster and times of distress.
  '12':
  - type: text
    content: “Can a man break iron—
  - type: text
    content: iron from the north—or bronze?
  '13':
  - type: text
    content: “Your wealth and your treasures
  - type: text
    content: I will give as plunder, without charge,
  - type: text
    content: because of all your sins
  - type: text
    content: throughout your country.
  '14':
  - type: text
    content: I will enslave you to your enemies
  - type: text
    content: in
  - type: note
    content: Some Hebrew manuscripts, Septuagint and Syriac (see also 17:4); most Hebrew manuscripts I will cause your enemies to bring you / into
  - type: text
    content: ' a land you do not know,'
  - type: text
    content: for my anger will kindle a fire
  - type: text
    content: that will burn against you.”
  '15':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you understand;'
  - type: text
    content: remember me and care for me.
  - type: text
    content: Avenge me on my persecutors.
  - type: text
    content: You are long-suffering—do not take me away;
  - type: text
    content: think of how I suffer reproach for your sake.
  '16':
  - type: text
    content: When your words came, I ate them;
  - type: text
    content: they were my joy and my heart’s delight,
  - type: text
    content: for I bear your name,
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty.'
  '17':
  - type: text
    content: I never sat in the company of revelers,
  - type: text
    content: never made merry with them;
  - type: text
    content: I sat alone because your hand was on me
  - type: text
    content: and you had filled me with indignation.
  '18':
  - type: text
    content: Why is my pain unending
  - type: text
    content: and my wound grievous and incurable?
  - type: text
    content: You are to me like a deceptive brook,
  - type: text
    content: like a spring that fails.
  '19':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “If you repent, I will restore you
  - type: text
    content: that you may serve me;
  - type: text
    content: if you utter worthy, not worthless, words,
  - type: text
    content: you will be my spokesman.
  - type: text
    content: Let this people turn to you,
  - type: text
    content: but you must not turn to them.
  '2':
  - type: text
    content: 'And if they ask you, ‘Where shall we go?’ tell them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Those destined for death, to death;
  - type: text
    content: those for the sword, to the sword;
  - type: text
    content: those for starvation, to starvation;
  - type: text
    content: those for captivity, to captivity.’
  '20':
  - type: text
    content: I will make you a wall to this people,
  - type: text
    content: a fortified wall of bronze;
  - type: text
    content: they will fight against you
  - type: text
    content: but will not overcome you,
  - type: text
    content: for I am with you
  - type: text
    content: to rescue and save you,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: “I will save you from the hands of the wicked
  - type: text
    content: and deliver you from the grasp of the cruel.”
  '3':
  - type: text
    content: '“I will send four kinds of destroyers against them,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “the sword to kill and the dogs to drag away and the birds and the wild animals to devour and destroy. '
  '4':
  - type: text
    content: I will make them abhorrent to all the kingdoms of the earth because of what Manasseh son of Hezekiah king of Judah did in Jerusalem.
  '5':
  - type: text
    content: “Who will have pity on you, Jerusalem?
  - type: text
    content: Who will mourn for you?
  - type: text
    content: Who will stop to ask how you are?
  '6':
  - type: text
    content: 'You have rejected me,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “You keep on backsliding.
  - type: text
    content: So I will reach out and destroy you;
  - type: text
    content: I am tired of holding back.
  '7':
  - type: text
    content: I will winnow them with a winnowing fork
  - type: text
    content: at the city gates of the land.
  - type: text
    content: I will bring bereavement and destruction on my people,
  - type: text
    content: for they have not changed their ways.
  '8':
  - type: text
    content: I will make their widows more numerous
  - type: text
    content: than the sand of the sea.
  - type: text
    content: At midday I will bring a destroyer
  - type: text
    content: against the mothers of their young men;
  - type: text
    content: suddenly I will bring down on them
  - type: text
    content: anguish and terror.
  '9':
  - type: text
    content: The mother of seven will grow faint
  - type: text
    content: and breathe her last.
  - type: text
    content: Her sun will set while it is still day;
  - type: text
    content: she will be disgraced and humiliated.
  - type: text
    content: I will put the survivors to the sword
  - type: text
    content: before their enemies,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
