document_id: JER.15
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me: “Even if Moses and Samuel were to stand before me, my heart would not go out to this people. Send them away from my presence! Let them go! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And if they ask you, ‘Where shall we go?’ tell them, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Those destined for death, to death;
- type: usfm
  marker: q1
  children:
  - type: text
    text: those for the sword, to the sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: those for starvation, to starvation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: those for captivity, to captivity.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“I will send four kinds of destroyers against them,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “the sword to kill and the dogs to drag away and the birds and the wild animals to devour and destroy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will make them abhorrent to all the kingdoms of the earth because of what Manasseh son of Hezekiah king of Judah did in Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Who will have pity on you, Jerusalem?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will mourn for you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will stop to ask how you are?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'You have rejected me,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: “You keep on backsliding.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I will reach out and destroy you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am tired of holding back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will winnow them with a winnowing fork
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the city gates of the land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring bereavement and destruction on my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they have not changed their ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I will make their widows more numerous
- type: usfm
  marker: q2
  children:
  - type: text
    text: than the sand of the sea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At midday I will bring a destroyer
- type: usfm
  marker: q2
  children:
  - type: text
    text: against the mothers of their young men;
- type: usfm
  marker: q1
  children:
  - type: text
    text: suddenly I will bring down on them
- type: usfm
  marker: q2
  children:
  - type: text
    text: anguish and terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The mother of seven will grow faint
- type: usfm
  marker: q2
  children:
  - type: text
    text: and breathe her last.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her sun will set while it is still day;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she will be disgraced and humiliated.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put the survivors to the sword
- type: usfm
  marker: q2
  children:
  - type: text
    text: before their enemies,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alas, my mother, that you gave me birth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a man with whom the whole land strives and contends!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have neither lent nor borrowed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet everyone curses me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Surely I will deliver you for a good purpose;
- type: usfm
  marker: q2
  children:
  - type: text
    text: surely I will make your enemies plead with you
- type: usfm
  marker: q2
  children:
  - type: text
    text: in times of disaster and times of distress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Can a man break iron—
- type: usfm
  marker: q2
  children:
  - type: text
    text: iron from the north—or bronze?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Your wealth and your treasures
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will give as plunder, without charge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because of all your sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: throughout your country.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I will enslave you to your enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: in
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts, Septuagint and Syriac (see also 17:4); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I will cause your enemies to bring you / into
    marker-yv: yv-n
  - type: text
    text: ' a land you do not know,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: for my anger will kindle a fire
- type: usfm
  marker: q2
  children:
  - type: text
    text: that will burn against you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you understand;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: remember me and care for me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Avenge me on my persecutors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are long-suffering—do not take me away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: think of how I suffer reproach for your sake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When your words came, I ate them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they were my joy and my heart’s delight,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I bear your name,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God Almighty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I never sat in the company of revelers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never made merry with them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I sat alone because your hand was on me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you had filled me with indignation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Why is my pain unending
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my wound grievous and incurable?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are to me like a deceptive brook,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a spring that fails.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “If you repent, I will restore you
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you may serve me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: if you utter worthy, not worthless, words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be my spokesman.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let this people turn to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you must not turn to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I will make you a wall to this people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fortified wall of bronze;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will fight against you
- type: usfm
  marker: q2
  children:
  - type: text
    text: but will not overcome you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I am with you
- type: usfm
  marker: q2
  children:
  - type: text
    text: to rescue and save you,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “I will save you from the hands of the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: and deliver you from the grasp of the cruel.”
