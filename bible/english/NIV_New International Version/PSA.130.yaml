verses:
  '1':
  - type: heading
    content: Psalm 130
  - type: text
    content: A song of ascents.
  - type: text
    content: 'Out of the depths I cry to you, '
  - type: text
    content: Lord
  - type: text
    content: ;
  '2':
  - type: text
    content: Lord, hear my voice.
  - type: text
    content: Let your ears be attentive
  - type: text
    content: to my cry for mercy.
  '3':
  - type: text
    content: 'If you, '
  - type: text
    content: Lord
  - type: text
    content: ', kept a record of sins,'
  - type: text
    content: Lord, who could stand?
  '4':
  - type: text
    content: But with you there is forgiveness,
  - type: text
    content: so that we can, with reverence, serve you.
  '5':
  - type: text
    content: 'I wait for the '
  - type: text
    content: Lord
  - type: text
    content: ', my whole being waits,'
  - type: text
    content: and in his word I put my hope.
  '6':
  - type: text
    content: I wait for the Lord
  - type: text
    content: more than watchmen wait for the morning,
  - type: text
    content: more than watchmen wait for the morning.
  '7':
  - type: text
    content: 'Israel, put your hope in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'for with the '
  - type: text
    content: Lord
  - type: text
    content: ' is unfailing love'
  - type: text
    content: and with him is full redemption.
  '8':
  - type: text
    content: He himself will redeem Israel
  - type: text
    content: from all their sins.
