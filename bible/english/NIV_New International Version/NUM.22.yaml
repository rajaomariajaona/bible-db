document_id: NUM.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Balak Summons Balaam
  - type: text
    content: Then the Israelites traveled to the plains of Moab and camped along the Jordan across from Jericho.
  '10':
  - type: text
    content: 'Balaam said to God, “Balak son of Zippor, king of Moab, sent me this message: '
  '11':
  - type: text
    content: ‘A people that has come out of Egypt covers the face of the land. Now come and put a curse on them for me. Perhaps then I will be able to fight them and drive them away.’ ”
  '12':
  - type: text
    content: But God said to Balaam, “Do not go with them. You must not put a curse on those people, because they are blessed.”
  '13':
  - type: text
    content: 'The next morning Balaam got up and said to Balak’s officials, “Go back to your own country, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has refused to let me go with you.”'
  '14':
  - type: text
    content: So the Moabite officials returned to Balak and said, “Balaam refused to come with us.”
  '15':
  - type: text
    content: 'Then Balak sent other officials, more numerous and more distinguished than the first. '
  '16':
  - type: text
    content: 'They came to Balaam and said:'
  - type: text
    content: '“This is what Balak son of Zippor says: Do not let anything keep you from coming to me, '
  '17':
  - type: text
    content: because I will reward you handsomely and do whatever you say. Come and put a curse on these people for me.”
  '18':
  - type: text
    content: 'But Balaam answered them, “Even if Balak gave me all the silver and gold in his palace, I could not do anything great or small to go beyond the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God. '
  '19':
  - type: text
    content: 'Now spend the night here so that I can find out what else the '
  - type: text
    content: Lord
  - type: text
    content: ' will tell me.”'
  '2':
  - type: text
    content: 'Now Balak son of Zippor saw all that Israel had done to the Amorites, '
  '20':
  - type: text
    content: That night God came to Balaam and said, “Since these men have come to summon you, go with them, but do only what I tell you.”
  - type: heading
    content: Balaam’s Donkey
  '21':
  - type: text
    content: 'Balaam got up in the morning, saddled his donkey and went with the Moabite officials. '
  '22':
  - type: text
    content: 'But God was very angry when he went, and the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' stood in the road to oppose him. Balaam was riding on his donkey, and his two servants were with him. '
  '23':
  - type: text
    content: 'When the donkey saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' standing in the road with a drawn sword in his hand, it turned off the road into a field. Balaam beat it to get it back on the road.'
  '24':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' stood in a narrow path through the vineyards, with walls on both sides. '
  '25':
  - type: text
    content: 'When the donkey saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', it pressed close to the wall, crushing Balaam’s foot against it. So he beat the donkey again.'
  '26':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' moved on ahead and stood in a narrow place where there was no room to turn, either to the right or to the left. '
  '27':
  - type: text
    content: 'When the donkey saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', it lay down under Balaam, and he was angry and beat it with his staff. '
  '28':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' opened the donkey’s mouth, and it said to Balaam, “What have I done to you to make you beat me these three times?”'
  '29':
  - type: text
    content: Balaam answered the donkey, “You have made a fool of me! If only I had a sword in my hand, I would kill you right now.”
  '3':
  - type: text
    content: and Moab was terrified because there were so many people. Indeed, Moab was filled with dread because of the Israelites.
  '30':
  - type: text
    content: The donkey said to Balaam, “Am I not your own donkey, which you have always ridden, to this day? Have I been in the habit of doing this to you?”
  - type: text
    content: “No,” he said.
  '31':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' opened Balaam’s eyes, and he saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' standing in the road with his sword drawn. So he bowed low and fell facedown.'
  '32':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' asked him, “Why have you beaten your donkey these three times? I have come here to oppose you because your path is a reckless one before me.'
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  - type: text
    content: ' '
  '33':
  - type: text
    content: The donkey saw me and turned away from me these three times. If it had not turned away, I would certainly have killed you by now, but I would have spared it.”
  '34':
  - type: text
    content: 'Balaam said to the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', “I have sinned. I did not realize you were standing in the road to oppose me. Now if you are displeased, I will go back.”'
  '35':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Balaam, “Go with the men, but speak only what I tell you.” So Balaam went with Balak’s officials.'
  '36':
  - type: text
    content: 'When Balak heard that Balaam was coming, he went out to meet him at the Moabite town on the Arnon border, at the edge of his territory. '
  '37':
  - type: text
    content: Balak said to Balaam, “Did I not send you an urgent summons? Why didn’t you come to me? Am I really not able to reward you?”
  '38':
  - type: text
    content: “Well, I have come to you now,” Balaam replied. “But I can’t say whatever I please. I must speak only what God puts in my mouth.”
  '39':
  - type: text
    content: 'Then Balaam went with Balak to Kiriath Huzoth. '
  '4':
  - type: text
    content: The Moabites said to the elders of Midian, “This horde is going to lick up everything around us, as an ox licks up the grass of the field.”
  - type: text
    content: 'So Balak son of Zippor, who was king of Moab at that time, '
  '40':
  - type: text
    content: 'Balak sacrificed cattle and sheep, and gave some to Balaam and the officials who were with him. '
  '41':
  - type: text
    content: The next morning Balak took Balaam up to Bamoth Baal, and from there he could see the outskirts of the Israelite camp.
  '5':
  - type: text
    content: 'sent messengers to summon Balaam son of Beor, who was at Pethor, near the Euphrates River, in his native land. Balak said:'
  - type: text
    content: '“A people has come out of Egypt; they cover the face of the land and have settled next to me. '
  '6':
  - type: text
    content: Now come and put a curse on these people, because they are too powerful for me. Perhaps then I will be able to defeat them and drive them out of the land. For I know that whoever you bless is blessed, and whoever you curse is cursed.”
  '7':
  - type: text
    content: The elders of Moab and Midian left, taking with them the fee for divination. When they came to Balaam, they told him what Balak had said.
  '8':
  - type: text
    content: '“Spend the night here,” Balaam said to them, “and I will report back to you with the answer the '
  - type: text
    content: Lord
  - type: text
    content: ' gives me.” So the Moabite officials stayed with him.'
  '9':
  - type: text
    content: God came to Balaam and asked, “Who are these men with you?”
