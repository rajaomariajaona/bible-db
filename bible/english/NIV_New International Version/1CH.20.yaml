document_id: 1CH.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Capture of Rabbah
  - type: text
    content: 'In the spring, at the time when kings go off to war, Joab led out the armed forces. He laid waste the land of the Ammonites and went to Rabbah and besieged it, but David remained in Jerusalem. Joab attacked Rabbah and left it in ruins. '
  '2':
  - type: text
    content: David took the crown from the head of their king
  - type: note
    content: Or of Milkom, that is, Molek
  - type: text
    content: —its weight was found to be a talent
  - type: note
    content: That is, about 75 pounds or about 34 kilograms
  - type: text
    content: ' of gold, and it was set with precious stones—and it was placed on David’s head. He took a great quantity of plunder from the city '
  '3':
  - type: text
    content: and brought out the people who were there, consigning them to labor with saws and with iron picks and axes. David did this to all the Ammonite towns. Then David and his entire army returned to Jerusalem.
  - type: heading
    content: War With the Philistines
  '4':
  - type: text
    content: In the course of time, war broke out with the Philistines, at Gezer. At that time Sibbekai the Hushathite killed Sippai, one of the descendants of the Rephaites, and the Philistines were subjugated.
  '5':
  - type: text
    content: In another battle with the Philistines, Elhanan son of Jair killed Lahmi the brother of Goliath the Gittite, who had a spear with a shaft like a weaver’s rod.
  '6':
  - type: text
    content: 'In still another battle, which took place at Gath, there was a huge man with six fingers on each hand and six toes on each foot—twenty-four in all. He also was descended from Rapha. '
  '7':
  - type: text
    content: When he taunted Israel, Jonathan son of Shimea, David’s brother, killed him.
  '8':
  - type: text
    content: These were descendants of Rapha in Gath, and they fell at the hands of David and his men.
