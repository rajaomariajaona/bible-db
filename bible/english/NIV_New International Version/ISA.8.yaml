document_id: ISA.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaiah and His Children as Signs
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Take a large scroll and write on it with an ordinary pen: Maher-Shalal-Hash-Baz.”'
  - type: note
    content: Maher-Shalal-Hash-Baz means quick to the plunder, swift to the spoil; also in verse 3.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Devise your strategy, but it will be thwarted;
  - type: text
    content: propose your plan, but it will not stand,
  - type: text
    content: for God is with us.
  - type: note
    content: Hebrew Immanuel
  '11':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to me with his strong hand upon me, warning me not to follow the way of this people:'
  '12':
  - type: text
    content: “Do not call conspiracy
  - type: text
    content: everything this people calls a conspiracy;
  - type: text
    content: do not fear what they fear,
  - type: text
    content: and do not dread it.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is the one you are to regard as holy,'
  - type: text
    content: he is the one you are to fear,
  - type: text
    content: he is the one you are to dread.
  '14':
  - type: text
    content: He will be a holy place;
  - type: text
    content: for both Israel and Judah he will be
  - type: text
    content: a stone that causes people to stumble
  - type: text
    content: and a rock that makes them fall.
  - type: text
    content: And for the people of Jerusalem he will be
  - type: text
    content: a trap and a snare.
  '15':
  - type: text
    content: Many of them will stumble;
  - type: text
    content: they will fall and be broken,
  - type: text
    content: they will be snared and captured.”
  '16':
  - type: text
    content: Bind up this testimony of warning
  - type: text
    content: and seal up God’s instruction among my disciples.
  '17':
  - type: text
    content: 'I will wait for the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who is hiding his face from the descendants of Jacob.
  - type: text
    content: I will put my trust in him.
  '18':
  - type: text
    content: 'Here am I, and the children the '
  - type: text
    content: Lord
  - type: text
    content: ' has given me. We are signs and symbols in Israel from the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, who dwells on Mount Zion.'
  - type: heading
    content: The Darkness Turns to Light
  '19':
  - type: text
    content: 'When someone tells you to consult mediums and spiritists, who whisper and mutter, should not a people inquire of their God? Why consult the dead on behalf of the living? '
  '2':
  - type: text
    content: 'So I called in Uriah the priest and Zechariah son of Jeberekiah as reliable witnesses for me. '
  '20':
  - type: text
    content: 'Consult God’s instruction and the testimony of warning. If anyone does not speak according to this word, they have no light of dawn. '
  '21':
  - type: text
    content: 'Distressed and hungry, they will roam through the land; when they are famished, they will become enraged and, looking upward, will curse their king and their God. '
  '22':
  - type: text
    content: Then they will look toward the earth and see only distress and darkness and fearful gloom, and they will be thrust into utter darkness.
  '3':
  - type: text
    content: 'Then I made love to the prophetess, and she conceived and gave birth to a son. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Name him Maher-Shalal-Hash-Baz. '
  '4':
  - type: text
    content: For before the boy knows how to say ‘My father’ or ‘My mother,’ the wealth of Damascus and the plunder of Samaria will be carried off by the king of Assyria.”
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to me again:'
  '6':
  - type: text
    content: “Because this people has rejected
  - type: text
    content: the gently flowing waters of Shiloah
  - type: text
    content: and rejoices over Rezin
  - type: text
    content: and the son of Remaliah,
  '7':
  - type: text
    content: therefore the Lord is about to bring against them
  - type: text
    content: the mighty floodwaters of the Euphrates—
  - type: text
    content: the king of Assyria with all his pomp.
  - type: text
    content: It will overflow all its channels,
  - type: text
    content: run over all its banks
  '8':
  - type: text
    content: and sweep on into Judah, swirling over it,
  - type: text
    content: passing through it and reaching up to the neck.
  - type: text
    content: Its outspread wings will cover the breadth of your land,
  - type: text
    content: Immanuel
  - type: note
    content: Immanuel means God with us.
  - type: text
    content: '!”'
  '9':
  - type: text
    content: Raise the war cry,
  - type: note
    content: Or Do your worst
  - type: text
    content: ' you nations, and be shattered!'
  - type: text
    content: Listen, all you distant lands.
  - type: text
    content: Prepare for battle, and be shattered!
  - type: text
    content: Prepare for battle, and be shattered!
