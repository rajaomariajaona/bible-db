document_id: ISA.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaiah and His Children as Signs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Take a large scroll and write on it with an ordinary pen: Maher-Shalal-Hash-Baz.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Maher-Shalal-Hash-Baz '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quick to the plunder, swift to the spoil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 3.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devise your strategy, but it will be thwarted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: propose your plan, but it will not stand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for God is with us.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Immanuel
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to me with his strong hand upon me, warning me not to follow the way of this people:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not call conspiracy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everything this people calls a conspiracy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: do not fear what they fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not dread it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is the one you are to regard as holy,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is the one you are to fear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is the one you are to dread.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be a holy place;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for both Israel and Judah he will be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a stone that causes people to stumble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a rock that makes them fall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And for the people of Jerusalem he will be
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a trap and a snare.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many of them will stumble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will fall and be broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be snared and captured.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bind up this testimony of warning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and seal up God’s instruction among my disciples.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will wait for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who is hiding his face from the descendants of Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my trust in him.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here am I, and the children the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given me. We are signs and symbols in Israel from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, who dwells on Mount Zion.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Darkness Turns to Light
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When someone tells you to consult mediums and spiritists, who whisper and mutter, should not a people inquire of their God? Why consult the dead on behalf of the living? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I called in Uriah the priest and Zechariah son of Jeberekiah as reliable witnesses for me. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Consult God’s instruction and the testimony of warning. If anyone does not speak according to this word, they have no light of dawn. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Distressed and hungry, they will roam through the land; when they are famished, they will become enraged and, looking upward, will curse their king and their God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they will look toward the earth and see only distress and darkness and fearful gloom, and they will be thrust into utter darkness.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I made love to the prophetess, and she conceived and gave birth to a son. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Name him Maher-Shalal-Hash-Baz. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For before the boy knows how to say ‘My father’ or ‘My mother,’ the wealth of Damascus and the plunder of Samaria will be carried off by the king of Assyria.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to me again:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because this people has rejected
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the gently flowing waters of Shiloah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and rejoices over Rezin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the son of Remaliah,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: therefore the Lord is about to bring against them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mighty floodwaters of the Euphrates—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the king of Assyria with all his pomp.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will overflow all its channels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: run over all its banks
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and sweep on into Judah, swirling over it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: passing through it and reaching up to the neck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its outspread wings will cover the breadth of your land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Immanuel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Immanuel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God with us.
      marker-yv: yv-n
    - type: text
      text: '!”'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raise the war cry,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Do your worst
      marker-yv: yv-n
    - type: text
      text: ' you nations, and be shattered!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Listen, all you distant lands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare for battle, and be shattered!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Prepare for battle, and be shattered!
