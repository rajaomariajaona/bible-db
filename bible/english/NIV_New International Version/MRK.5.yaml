document_id: MRK.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Restores a Demon-Possessed Man
  - type: text
    content: They went across the lake to the region of the Gerasenes.
  - type: note
    content: Some manuscripts Gadarenes; other manuscripts Gergesenes
  - type: text
    content: ' '
  '10':
  - type: text
    content: And he begged Jesus again and again not to send them out of the area.
  '11':
  - type: text
    content: 'A large herd of pigs was feeding on the nearby hillside. '
  '12':
  - type: text
    content: 'The demons begged Jesus, “Send us among the pigs; allow us to go into them.” '
  '13':
  - type: text
    content: He gave them permission, and the impure spirits came out and went into the pigs. The herd, about two thousand in number, rushed down the steep bank into the lake and were drowned.
  '14':
  - type: text
    content: 'Those tending the pigs ran off and reported this in the town and countryside, and the people went out to see what had happened. '
  '15':
  - type: text
    content: 'When they came to Jesus, they saw the man who had been possessed by the legion of demons, sitting there, dressed and in his right mind; and they were afraid. '
  '16':
  - type: text
    content: 'Those who had seen it told the people what had happened to the demon-possessed man—and told about the pigs as well. '
  '17':
  - type: text
    content: Then the people began to plead with Jesus to leave their region.
  '18':
  - type: text
    content: 'As Jesus was getting into the boat, the man who had been demon-possessed begged to go with him. '
  '19':
  - type: text
    content: 'Jesus did not let him, but said, '
  - type: text
    content: “Go home to your own people and tell them how much the Lord has done for you, and how he has had mercy on you.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'When Jesus got out of the boat, a man with an impure spirit came from the tombs to meet him. '
  '20':
  - type: text
    content: So the man went away and began to tell in the Decapolis
  - type: note
    content: That is, the Ten Cities
  - type: text
    content: ' how much Jesus had done for him. And all the people were amazed.'
  - type: heading
    content: Jesus Raises a Dead Girl and Heals a Sick Woman
  '21':
  - type: text
    content: 'When Jesus had again crossed over by boat to the other side of the lake, a large crowd gathered around him while he was by the lake. '
  '22':
  - type: text
    content: 'Then one of the synagogue leaders, named Jairus, came, and when he saw Jesus, he fell at his feet. '
  '23':
  - type: text
    content: 'He pleaded earnestly with him, “My little daughter is dying. Please come and put your hands on her so that she will be healed and live.” '
  '24':
  - type: text
    content: So Jesus went with him.
  - type: text
    content: 'A large crowd followed and pressed around him. '
  '25':
  - type: text
    content: 'And a woman was there who had been subject to bleeding for twelve years. '
  '26':
  - type: text
    content: 'She had suffered a great deal under the care of many doctors and had spent all she had, yet instead of getting better she grew worse. '
  '27':
  - type: text
    content: 'When she heard about Jesus, she came up behind him in the crowd and touched his cloak, '
  '28':
  - type: text
    content: 'because she thought, “If I just touch his clothes, I will be healed.” '
  '29':
  - type: text
    content: Immediately her bleeding stopped and she felt in her body that she was freed from her suffering.
  '3':
  - type: text
    content: 'This man lived in the tombs, and no one could bind him anymore, not even with a chain. '
  '30':
  - type: text
    content: 'At once Jesus realized that power had gone out from him. He turned around in the crowd and asked, '
  - type: text
    content: “Who touched my clothes?”
  '31':
  - type: text
    content: '“You see the people crowding against you,” his disciples answered, “and yet you can ask, '
  - type: text
    content: ‘Who touched me?’
  - type: text
    content: ' ”'
  '32':
  - type: text
    content: 'But Jesus kept looking around to see who had done it. '
  '33':
  - type: text
    content: 'Then the woman, knowing what had happened to her, came and fell at his feet and, trembling with fear, told him the whole truth. '
  '34':
  - type: text
    content: 'He said to her, '
  - type: text
    content: “Daughter, your faith has healed you. Go in peace and be freed from your suffering.”
  '35':
  - type: text
    content: While Jesus was still speaking, some people came from the house of Jairus, the synagogue leader. “Your daughter is dead,” they said. “Why bother the teacher anymore?”
  '36':
  - type: text
    content: Overhearing
  - type: note
    content: Or Ignoring
  - type: text
    content: ' what they said, Jesus told him, '
  - type: text
    content: “Don’t be afraid; just believe.”
  '37':
  - type: text
    content: 'He did not let anyone follow him except Peter, James and John the brother of James. '
  '38':
  - type: text
    content: 'When they came to the home of the synagogue leader, Jesus saw a commotion, with people crying and wailing loudly. '
  '39':
  - type: text
    content: 'He went in and said to them, '
  - type: text
    content: “Why all this commotion and wailing? The child is not dead but asleep.”
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'For he had often been chained hand and foot, but he tore the chains apart and broke the irons on his feet. No one was strong enough to subdue him. '
  '40':
  - type: text
    content: But they laughed at him.
  - type: text
    content: 'After he put them all out, he took the child’s father and mother and the disciples who were with him, and went in where the child was. '
  '41':
  - type: text
    content: 'He took her by the hand and said to her, '
  - type: text
    content: “Talitha koum!”
  - type: text
    content: ' (which means '
  - type: text
    content: “Little girl, I say to you, get up!”
  - type: text
    content: '). '
  '42':
  - type: text
    content: 'Immediately the girl stood up and began to walk around (she was twelve years old). At this they were completely astonished. '
  '43':
  - type: text
    content: He gave strict orders not to let anyone know about this, and told them to give her something to eat.
  '5':
  - type: text
    content: Night and day among the tombs and in the hills he would cry out and cut himself with stones.
  '6':
  - type: text
    content: 'When he saw Jesus from a distance, he ran and fell on his knees in front of him. '
  '7':
  - type: text
    content: 'He shouted at the top of his voice, “What do you want with me, Jesus, Son of the Most High God? In God’s name don’t torture me!” '
  '8':
  - type: text
    content: 'For Jesus had said to him, '
  - type: text
    content: “Come out of this man, you impure spirit!”
  '9':
  - type: text
    content: 'Then Jesus asked him, '
  - type: text
    content: “What is your name?”
  - type: text
    content: '“My name is Legion,” he replied, “for we are many.” '
