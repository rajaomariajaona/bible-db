document_id: MRK.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Restores a Demon-Possessed Man
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: They went across the lake to the region of the Gerasenes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gadarenes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; other manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gergesenes
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When Jesus got out of the boat, a man with an impure spirit came from the tombs to meet him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This man lived in the tombs, and no one could bind him anymore, not even with a chain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For he had often been chained hand and foot, but he tore the chains apart and broke the irons on his feet. No one was strong enough to subdue him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Night and day among the tombs and in the hills he would cry out and cut himself with stones.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When he saw Jesus from a distance, he ran and fell on his knees in front of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He shouted at the top of his voice, “What do you want with me, Jesus, Son of the Most High God? In God’s name don’t torture me!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For Jesus had said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come out of this man, you impure spirit!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Jesus asked him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What is your name?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“My name is Legion,” he replied, “for we are many.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And he begged Jesus again and again not to send them out of the area.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'A large herd of pigs was feeding on the nearby hillside. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The demons begged Jesus, “Send us among the pigs; allow us to go into them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He gave them permission, and the impure spirits came out and went into the pigs. The herd, about two thousand in number, rushed down the steep bank into the lake and were drowned.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Those tending the pigs ran off and reported this in the town and countryside, and the people went out to see what had happened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When they came to Jesus, they saw the man who had been possessed by the legion of demons, sitting there, dressed and in his right mind; and they were afraid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Those who had seen it told the people what had happened to the demon-possessed man—and told about the pigs as well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then the people began to plead with Jesus to leave their region.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'As Jesus was getting into the boat, the man who had been demon-possessed begged to go with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus did not let him, but said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go home to your own people and tell them how much the Lord has done for you, and how he has had mercy on you.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So the man went away and began to tell in the Decapolis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the Ten Cities
    marker-yv: yv-n
  - type: text
    text: ' how much Jesus had done for him. And all the people were amazed.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Raises a Dead Girl and Heals a Sick Woman
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When Jesus had again crossed over by boat to the other side of the lake, a large crowd gathered around him while he was by the lake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then one of the synagogue leaders, named Jairus, came, and when he saw Jesus, he fell at his feet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He pleaded earnestly with him, “My little daughter is dying. Please come and put your hands on her so that she will be healed and live.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: So Jesus went with him.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'A large crowd followed and pressed around him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And a woman was there who had been subject to bleeding for twelve years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'She had suffered a great deal under the care of many doctors and had spent all she had, yet instead of getting better she grew worse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When she heard about Jesus, she came up behind him in the crowd and touched his cloak, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'because she thought, “If I just touch his clothes, I will be healed.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Immediately her bleeding stopped and she felt in her body that she was freed from her suffering.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'At once Jesus realized that power had gone out from him. He turned around in the crowd and asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who touched my clothes?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“You see the people crowding against you,” his disciples answered, “and yet you can ask, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Who touched me?’
  - type: text
    text: ' ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But Jesus kept looking around to see who had done it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then the woman, knowing what had happened to her, came and fell at his feet and, trembling with fear, told him the whole truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'He said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Daughter, your faith has healed you. Go in peace and be freed from your suffering.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: While Jesus was still speaking, some people came from the house of Jairus, the synagogue leader. “Your daughter is dead,” they said. “Why bother the teacher anymore?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Overhearing
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ignoring
    marker-yv: yv-n
  - type: text
    text: ' what they said, Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t be afraid; just believe.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'He did not let anyone follow him except Peter, James and John the brother of James. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'When they came to the home of the synagogue leader, Jesus saw a commotion, with people crying and wailing loudly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'He went in and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why all this commotion and wailing? The child is not dead but asleep.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: But they laughed at him.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'After he put them all out, he took the child’s father and mother and the disciples who were with him, and went in where the child was. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'He took her by the hand and said to her, '
  - type: usfm
    marker: tl
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Talitha koum!”
  - type: text
    text: ' (which means '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Little girl, I say to you, get up!”
  - type: text
    text: '). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Immediately the girl stood up and began to walk around (she was twelve years old). At this they were completely astonished. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: He gave strict orders not to let anyone know about this, and told them to give her something to eat.
