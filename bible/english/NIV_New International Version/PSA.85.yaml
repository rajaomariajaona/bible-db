document_id: PSA.85,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 85In Hebrew texts 85:1-13 is numbered 85:2-14.
  - type: text
    content: For the director of music. Of the Sons of Korah. A psalm.
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', showed favor to your land;'
  - type: text
    content: you restored the fortunes of Jacob.
  '10':
  - type: text
    content: Love and faithfulness meet together;
  - type: text
    content: righteousness and peace kiss each other.
  '11':
  - type: text
    content: Faithfulness springs forth from the earth,
  - type: text
    content: and righteousness looks down from heaven.
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will indeed give what is good,'
  - type: text
    content: and our land will yield its harvest.
  '13':
  - type: text
    content: Righteousness goes before him
  - type: text
    content: and prepares the way for his steps.
  '2':
  - type: text
    content: You forgave the iniquity of your people
  - type: text
    content: and covered all their sins.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '3':
  - type: text
    content: You set aside all your wrath
  - type: text
    content: and turned from your fierce anger.
  '4':
  - type: text
    content: Restore us again, God our Savior,
  - type: text
    content: and put away your displeasure toward us.
  '5':
  - type: text
    content: Will you be angry with us forever?
  - type: text
    content: Will you prolong your anger through all generations?
  '6':
  - type: text
    content: Will you not revive us again,
  - type: text
    content: that your people may rejoice in you?
  '7':
  - type: text
    content: 'Show us your unfailing love, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and grant us your salvation.
  '8':
  - type: text
    content: 'I will listen to what God the '
  - type: text
    content: Lord
  - type: text
    content: ' says;'
  - type: text
    content: he promises peace to his people, his faithful servants—
  - type: text
    content: but let them not turn to folly.
  '9':
  - type: text
    content: Surely his salvation is near those who fear him,
  - type: text
    content: that his glory may dwell in our land.
