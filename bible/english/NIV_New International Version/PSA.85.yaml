document_id: PSA.85,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 85
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 85:1-13 is numbered 85:2-14.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. Of the Sons of Korah. A psalm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', showed favor to your land;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you restored the fortunes of Jacob.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Love and faithfulness meet together;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: righteousness and peace kiss each other.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faithfulness springs forth from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and righteousness looks down from heaven.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will indeed give what is good,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and our land will yield its harvest.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness goes before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and prepares the way for his steps.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You forgave the iniquity of your people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and covered all their sins.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '85:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You set aside all your wrath
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turned from your fierce anger.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restore us again, God our Savior,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put away your displeasure toward us.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you be angry with us forever?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you prolong your anger through all generations?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you not revive us again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that your people may rejoice in you?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Show us your unfailing love, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and grant us your salvation.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will listen to what God the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he promises peace to his people, his faithful servants—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but let them not turn to folly.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely his salvation is near those who fear him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that his glory may dwell in our land.
