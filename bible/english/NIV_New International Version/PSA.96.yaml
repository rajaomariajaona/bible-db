document_id: PSA.96,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 96
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' a new song;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all the earth.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Say among the nations, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns.”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The world is firmly established, it cannot be moved;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will judge the peoples with equity.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the heavens rejoice, let the earth be glad;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the sea resound, and all that is in it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the fields be jubilant, and everything in them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let all the trees of the forest sing for joy.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all creation rejoice before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he comes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he comes to judge the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will judge the world in righteousness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the peoples in his faithfulness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', praise his name;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: proclaim his salvation day after day.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare his glory among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his marvelous deeds among all peoples.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and most worthy of praise;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is to be feared above all gods.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For all the gods of the nations are idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made the heavens.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Splendor and majesty are before him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strength and glory are in his sanctuary.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ascribe to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all you families of nations,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'ascribe to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' glory and strength.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ascribe to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the glory due his name;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring an offering and come into his courts.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the splendor of his'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '96:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' with the splendor of'
      marker-yv: yv-n
    - type: text
      text: ' holiness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tremble before him, all the earth.
