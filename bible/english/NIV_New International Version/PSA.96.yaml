document_id: PSA.96,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 96
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' a new song;'
  - type: text
    content: 'sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', all the earth.'
  '10':
  - type: text
    content: 'Say among the nations, “The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns.”'
  - type: text
    content: The world is firmly established, it cannot be moved;
  - type: text
    content: he will judge the peoples with equity.
  '11':
  - type: text
    content: Let the heavens rejoice, let the earth be glad;
  - type: text
    content: let the sea resound, and all that is in it.
  '12':
  - type: text
    content: Let the fields be jubilant, and everything in them;
  - type: text
    content: let all the trees of the forest sing for joy.
  '13':
  - type: text
    content: 'Let all creation rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ', for he comes,'
  - type: text
    content: he comes to judge the earth.
  - type: text
    content: He will judge the world in righteousness
  - type: text
    content: and the peoples in his faithfulness.
  '2':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', praise his name;'
  - type: text
    content: proclaim his salvation day after day.
  '3':
  - type: text
    content: Declare his glory among the nations,
  - type: text
    content: his marvelous deeds among all peoples.
  '4':
  - type: text
    content: 'For great is the '
  - type: text
    content: Lord
  - type: text
    content: ' and most worthy of praise;'
  - type: text
    content: he is to be feared above all gods.
  '5':
  - type: text
    content: For all the gods of the nations are idols,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' made the heavens.'
  '6':
  - type: text
    content: Splendor and majesty are before him;
  - type: text
    content: strength and glory are in his sanctuary.
  '7':
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ', all you families of nations,'
  - type: text
    content: 'ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' glory and strength.'
  '8':
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' the glory due his name;'
  - type: text
    content: bring an offering and come into his courts.
  '9':
  - type: text
    content: 'Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' in the splendor of his'
  - type: note
    content: Or Lord with the splendor of
  - type: text
    content: ' holiness;'
  - type: text
    content: tremble before him, all the earth.
