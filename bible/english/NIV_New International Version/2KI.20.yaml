document_id: 2KI.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah’s Illness
  - type: text
    content: 'In those days Hezekiah became ill and was at the point of death. The prophet Isaiah son of Amoz went to him and said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Put your house in order, because you are going to die; you will not recover.”'
  '10':
  - type: text
    content: “It is a simple matter for the shadow to go forward ten steps,” said Hezekiah. “Rather, have it go back ten steps.”
  '11':
  - type: text
    content: 'Then the prophet Isaiah called on the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' made the shadow go back the ten steps it had gone down on the stairway of Ahaz.'
  - type: heading
    content: Envoys From Babylon
  '12':
  - type: text
    content: 'At that time Marduk-Baladan son of Baladan king of Babylon sent Hezekiah letters and a gift, because he had heard of Hezekiah’s illness. '
  '13':
  - type: text
    content: Hezekiah received the envoys and showed them all that was in his storehouses—the silver, the gold, the spices and the fine olive oil—his armory and everything found among his treasures. There was nothing in his palace or in all his kingdom that Hezekiah did not show them.
  '14':
  - type: text
    content: Then Isaiah the prophet went to King Hezekiah and asked, “What did those men say, and where did they come from?”
  - type: text
    content: “From a distant land,” Hezekiah replied. “They came from Babylon.”
  '15':
  - type: text
    content: The prophet asked, “What did they see in your palace?”
  - type: text
    content: “They saw everything in my palace,” Hezekiah said. “There is nothing among my treasures that I did not show them.”
  '16':
  - type: text
    content: 'Then Isaiah said to Hezekiah, “Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '17':
  - type: text
    content: 'The time will surely come when everything in your palace, and all that your predecessors have stored up until this day, will be carried off to Babylon. Nothing will be left, says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: And some of your descendants, your own flesh and blood who will be born to you, will be taken away, and they will become eunuchs in the palace of the king of Babylon.”
  '19':
  - type: text
    content: '“The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' you have spoken is good,” Hezekiah replied. For he thought, “Will there not be peace and security in my lifetime?”'
  '2':
  - type: text
    content: 'Hezekiah turned his face to the wall and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'As for the other events of Hezekiah’s reign, all his achievements and how he made the pool and the tunnel by which he brought water into the city, are they not written in the book of the annals of the kings of Judah? '
  '21':
  - type: text
    content: Hezekiah rested with his ancestors. And Manasseh his son succeeded him as king.
  '3':
  - type: text
    content: '“Remember, '
  - type: text
    content: Lord
  - type: text
    content: ', how I have walked before you faithfully and with wholehearted devotion and have done what is good in your eyes.” And Hezekiah wept bitterly.'
  '4':
  - type: text
    content: 'Before Isaiah had left the middle court, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him: '
  '5':
  - type: text
    content: '“Go back and tell Hezekiah, the ruler of my people, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your father David, says: I have heard your prayer and seen your tears; I will heal you. On the third day from now you will go up to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: I will add fifteen years to your life. And I will deliver you and this city from the hand of the king of Assyria. I will defend this city for my sake and for the sake of my servant David.’ ”
  '7':
  - type: text
    content: Then Isaiah said, “Prepare a poultice of figs.” They did so and applied it to the boil, and he recovered.
  '8':
  - type: text
    content: 'Hezekiah had asked Isaiah, “What will be the sign that the '
  - type: text
    content: Lord
  - type: text
    content: ' will heal me and that I will go up to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' on the third day from now?”'
  '9':
  - type: text
    content: 'Isaiah answered, “This is the '
  - type: text
    content: Lord
  - type: text
    content: '’s sign to you that the '
  - type: text
    content: Lord
  - type: text
    content: ' will do what he has promised: Shall the shadow go forward ten steps, or shall it go back ten steps?”'
