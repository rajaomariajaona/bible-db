document_id: LUK.23,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the whole assembly rose and led him off to Pilate. '
  '10':
  - type: text
    content: 'The chief priests and the teachers of the law were standing there, vehemently accusing him. '
  '11':
  - type: text
    content: 'Then Herod and his soldiers ridiculed and mocked him. Dressing him in an elegant robe, they sent him back to Pilate. '
  '12':
  - type: text
    content: That day Herod and Pilate became friends—before this they had been enemies.
  '13':
  - type: text
    content: 'Pilate called together the chief priests, the rulers and the people, '
  '14':
  - type: text
    content: 'and said to them, “You brought me this man as one who was inciting the people to rebellion. I have examined him in your presence and have found no basis for your charges against him. '
  '15':
  - type: text
    content: 'Neither has Herod, for he sent him back to us; as you can see, he has done nothing to deserve death. '
  '16':
  - type: text
    content: 'Therefore, I will punish him and then release him.” '
  '17':
  - type: note
    content: Some manuscripts include here words similar to Matt. 27:15 and Mark 15:6.
  '18':
  - type: text
    content: 'But the whole crowd shouted, “Away with this man! Release Barabbas to us!” '
  '19':
  - type: text
    content: (Barabbas had been thrown into prison for an insurrection in the city, and for murder.)
  '2':
  - type: text
    content: And they began to accuse him, saying, “We have found this man subverting our nation. He opposes payment of taxes to Caesar and claims to be Messiah, a king.”
  '20':
  - type: text
    content: 'Wanting to release Jesus, Pilate appealed to them again. '
  '21':
  - type: text
    content: But they kept shouting, “Crucify him! Crucify him!”
  '22':
  - type: text
    content: 'For the third time he spoke to them: “Why? What crime has this man committed? I have found in him no grounds for the death penalty. Therefore I will have him punished and then release him.”'
  '23':
  - type: text
    content: 'But with loud shouts they insistently demanded that he be crucified, and their shouts prevailed. '
  '24':
  - type: text
    content: 'So Pilate decided to grant their demand. '
  '25':
  - type: text
    content: He released the man who had been thrown into prison for insurrection and murder, the one they asked for, and surrendered Jesus to their will.
  - type: heading
    content: The Crucifixion of Jesus
  '26':
  - type: text
    content: 'As the soldiers led him away, they seized Simon from Cyrene, who was on his way in from the country, and put the cross on him and made him carry it behind Jesus. '
  '27':
  - type: text
    content: 'A large number of people followed him, including women who mourned and wailed for him. '
  '28':
  - type: text
    content: 'Jesus turned and said to them, '
  - type: text
    content: “Daughters of Jerusalem, do not weep for me; weep for yourselves and for your children.
  - type: text
    content: ' '
  '29':
  - type: text
    content: For the time will come when you will say, ‘Blessed are the childless women, the wombs that never bore and the breasts that never nursed!’
  - type: text
    content: ' '
  '3':
  - type: text
    content: So Pilate asked Jesus, “Are you the king of the Jews?”
  - type: text
    content: “You have said so,”
  - type: text
    content: ' Jesus replied.'
  '30':
  - type: text
    content: Then
  - type: text
    content: “ ‘they will say to the mountains, “Fall on us!”
  - type: text
    content: and to the hills, “Cover us!” ’
  - type: note
    content: Hosea 10:8
  '31':
  - type: text
    content: ' '
  - type: text
    content: For if people do these things when the tree is green, what will happen when it is dry?”
  '32':
  - type: text
    content: 'Two other men, both criminals, were also led out with him to be executed. '
  '33':
  - type: text
    content: 'When they came to the place called the Skull, they crucified him there, along with the criminals—one on his right, the other on his left. '
  '34':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Father, forgive them, for they do not know what they are doing.”
  - type: note
    content: Some early manuscripts do not have this sentence.
  - type: text
    content: ' And they divided up his clothes by casting lots.'
  '35':
  - type: text
    content: The people stood watching, and the rulers even sneered at him. They said, “He saved others; let him save himself if he is God’s Messiah, the Chosen One.”
  '36':
  - type: text
    content: 'The soldiers also came up and mocked him. They offered him wine vinegar '
  '37':
  - type: text
    content: and said, “If you are the king of the Jews, save yourself.”
  '38':
  - type: text
    content: 'There was a written notice above him, which read: '
  - type: heading
    content: this is the king of the jews
  - type: text
    content: .
  '39':
  - type: text
    content: 'One of the criminals who hung there hurled insults at him: “Aren’t you the Messiah? Save yourself and us!”'
  '4':
  - type: text
    content: Then Pilate announced to the chief priests and the crowd, “I find no basis for a charge against this man.”
  '40':
  - type: text
    content: 'But the other criminal rebuked him. “Don’t you fear God,” he said, “since you are under the same sentence? '
  '41':
  - type: text
    content: We are punished justly, for we are getting what our deeds deserve. But this man has done nothing wrong.”
  '42':
  - type: text
    content: Then he said, “Jesus, remember me when you come into your kingdom.
  - type: note
    content: Some manuscripts come with your kingly power
  - type: text
    content: ”
  '43':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: “Truly I tell you, today you will be with me in paradise.”
  - type: heading
    content: The Death of Jesus
  '44':
  - type: text
    content: 'It was now about noon, and darkness came over the whole land until three in the afternoon, '
  '45':
  - type: text
    content: 'for the sun stopped shining. And the curtain of the temple was torn in two. '
  '46':
  - type: text
    content: 'Jesus called out with a loud voice, '
  - type: text
    content: “Father, into your hands I commit my spirit.”
  - type: note
    content: Psalm 31:5
  - type: text
    content: ' When he had said this, he breathed his last.'
  '47':
  - type: text
    content: 'The centurion, seeing what had happened, praised God and said, “Surely this was a righteous man.” '
  '48':
  - type: text
    content: 'When all the people who had gathered to witness this sight saw what took place, they beat their breasts and went away. '
  '49':
  - type: text
    content: But all those who knew him, including the women who had followed him from Galilee, stood at a distance, watching these things.
  - type: heading
    content: The Burial of Jesus
  '5':
  - type: text
    content: But they insisted, “He stirs up the people all over Judea by his teaching. He started in Galilee and has come all the way here.”
  '50':
  - type: text
    content: 'Now there was a man named Joseph, a member of the Council, a good and upright man, '
  '51':
  - type: text
    content: 'who had not consented to their decision and action. He came from the Judean town of Arimathea, and he himself was waiting for the kingdom of God. '
  '52':
  - type: text
    content: 'Going to Pilate, he asked for Jesus’ body. '
  '53':
  - type: text
    content: 'Then he took it down, wrapped it in linen cloth and placed it in a tomb cut in the rock, one in which no one had yet been laid. '
  '54':
  - type: text
    content: It was Preparation Day, and the Sabbath was about to begin.
  '55':
  - type: text
    content: 'The women who had come with Jesus from Galilee followed Joseph and saw the tomb and how his body was laid in it. '
  '56':
  - type: text
    content: Then they went home and prepared spices and perfumes. But they rested on the Sabbath in obedience to the commandment.
  '6':
  - type: text
    content: 'On hearing this, Pilate asked if the man was a Galilean. '
  '7':
  - type: text
    content: When he learned that Jesus was under Herod’s jurisdiction, he sent him to Herod, who was also in Jerusalem at that time.
  '8':
  - type: text
    content: 'When Herod saw Jesus, he was greatly pleased, because for a long time he had been wanting to see him. From what he had heard about him, he hoped to see him perform a sign of some sort. '
  '9':
  - type: text
    content: 'He plied him with many questions, but Jesus gave him no answer. '
