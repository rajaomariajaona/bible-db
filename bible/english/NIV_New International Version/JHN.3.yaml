document_id: JHN.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Teaches Nicodemus
  - type: text
    content: 'Now there was a Pharisee, a man named Nicodemus who was a member of the Jewish ruling council. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: “You are Israel’s teacher,”
  - type: text
    content: ' said Jesus, '
  - type: text
    content: “and do you not understand these things?
  - type: text
    content: ' '
  '11':
  - type: text
    content: Very truly I tell you, we speak of what we know, and we testify to what we have seen, but still you people do not accept our testimony.
  - type: text
    content: ' '
  '12':
  - type: text
    content: I have spoken to you of earthly things and you do not believe; how then will you believe if I speak of heavenly things?
  - type: text
    content: ' '
  '13':
  - type: text
    content: No one has ever gone into heaven except the one who came from heaven—the Son of Man.
  - type: note
    content: Some manuscripts Man, who is in heaven
  - type: text
    content: ' '
  '14':
  - type: text
    content: Just as Moses lifted up the snake in the wilderness, so the Son of Man must be lifted up,
  - type: note
    content: The Greek for lifted up also means exalted.
  - type: text
    content: ' '
  '15':
  - type: text
    content: that everyone who believes may have eternal life in him.”
  - type: note
    content: Some interpreters end the quotation with verse 21.
  '16':
  - type: text
    content: 'For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life. '
  '17':
  - type: text
    content: 'For God did not send his Son into the world to condemn the world, but to save the world through him. '
  '18':
  - type: text
    content: 'Whoever believes in him is not condemned, but whoever does not believe stands condemned already because they have not believed in the name of God’s one and only Son. '
  '19':
  - type: text
    content: 'This is the verdict: Light has come into the world, but people loved darkness instead of light because their deeds were evil. '
  '2':
  - type: text
    content: He came to Jesus at night and said, “Rabbi, we know that you are a teacher who has come from God. For no one could perform the signs you are doing if God were not with him.”
  '20':
  - type: text
    content: 'Everyone who does evil hates the light, and will not come into the light for fear that their deeds will be exposed. '
  '21':
  - type: text
    content: But whoever lives by the truth comes into the light, so that it may be seen plainly that what they have done has been done in the sight of God.
  - type: heading
    content: John Testifies Again About Jesus
  '22':
  - type: text
    content: 'After this, Jesus and his disciples went out into the Judean countryside, where he spent some time with them, and baptized. '
  '23':
  - type: text
    content: 'Now John also was baptizing at Aenon near Salim, because there was plenty of water, and people were coming and being baptized. '
  '24':
  - type: text
    content: '(This was before John was put in prison.) '
  '25':
  - type: text
    content: 'An argument developed between some of John’s disciples and a certain Jew over the matter of ceremonial washing. '
  '26':
  - type: text
    content: They came to John and said to him, “Rabbi, that man who was with you on the other side of the Jordan—the one you testified about—look, he is baptizing, and everyone is going to him.”
  '27':
  - type: text
    content: 'To this John replied, “A person can receive only what is given them from heaven. '
  '28':
  - type: text
    content: 'You yourselves can testify that I said, ‘I am not the Messiah but am sent ahead of him.’ '
  '29':
  - type: text
    content: 'The bride belongs to the bridegroom. The friend who attends the bridegroom waits and listens for him, and is full of joy when he hears the bridegroom’s voice. That joy is mine, and it is now complete. '
  '3':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Very truly I tell you, no one can see the kingdom of God unless they are born again.
  - type: note
    content: The Greek for again also means from above; also in verse 7.
  - type: text
    content: ”
  '30':
  - type: text
    content: He must become greater; I must become less.”
  - type: note
    content: Some interpreters end the quotation with verse 36.
  '31':
  - type: text
    content: 'The one who comes from above is above all; the one who is from the earth belongs to the earth, and speaks as one from the earth. The one who comes from heaven is above all. '
  '32':
  - type: text
    content: 'He testifies to what he has seen and heard, but no one accepts his testimony. '
  '33':
  - type: text
    content: 'Whoever has accepted it has certified that God is truthful. '
  '34':
  - type: text
    content: For the one whom God has sent speaks the words of God, for God
  - type: note
    content: Greek he
  - type: text
    content: ' gives the Spirit without limit. '
  '35':
  - type: text
    content: 'The Father loves the Son and has placed everything in his hands. '
  '36':
  - type: text
    content: Whoever believes in the Son has eternal life, but whoever rejects the Son will not see life, for God’s wrath remains on them.
  '4':
  - type: text
    content: “How can someone be born when they are old?” Nicodemus asked. “Surely they cannot enter a second time into their mother’s womb to be born!”
  '5':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Very truly I tell you, no one can enter the kingdom of God unless they are born of water and the Spirit.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Flesh gives birth to flesh, but the Spirit
  - type: note
    content: Or but spirit
  - type: text
    content: ' '
  - type: text
    content: gives birth to spirit.
  - type: text
    content: ' '
  '7':
  - type: text
    content: You should not be surprised at my saying, ‘You
  - type: note
    content: The Greek is plural.
  - type: text
    content: ' '
  - type: text
    content: must be born again.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: The wind blows wherever it pleases. You hear its sound, but you cannot tell where it comes from or where it is going. So it is with everyone born of the Spirit.”
  - type: note
    content: The Greek for Spirit is the same as that for wind.
  '9':
  - type: text
    content: “How can this be?” Nicodemus asked.
