verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Teaches Nicodemus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was a Pharisee, a man named Nicodemus who was a member of the Jewish ruling council. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are Israel’s teacher,”
    - type: text
      text: ' said Jesus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “and do you not understand these things?
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Very truly I tell you, we speak of what we know, and we testify to what we have seen, but still you people do not accept our testimony.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have spoken to you of earthly things and you do not believe; how then will you believe if I speak of heavenly things?
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: No one has ever gone into heaven except the one who came from heaven—the Son of Man.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Man, who is in heaven
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Just as Moses lifted up the snake in the wilderness, so the Son of Man must be lifted up,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lifted up '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'also means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exalted.
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that everyone who believes may have eternal life in him.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some interpreters end the quotation with verse 21.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God did not send his Son into the world to condemn the world, but to save the world through him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever believes in him is not condemned, but whoever does not believe stands condemned already because they have not believed in the name of God’s one and only Son. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the verdict: Light has come into the world, but people loved darkness instead of light because their deeds were evil. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He came to Jesus at night and said, “Rabbi, we know that you are a teacher who has come from God. For no one could perform the signs you are doing if God were not with him.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everyone who does evil hates the light, and will not come into the light for fear that their deeds will be exposed. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But whoever lives by the truth comes into the light, so that it may be seen plainly that what they have done has been done in the sight of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John Testifies Again About Jesus
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this, Jesus and his disciples went out into the Judean countryside, where he spent some time with them, and baptized. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now John also was baptizing at Aenon near Salim, because there was plenty of water, and people were coming and being baptized. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(This was before John was put in prison.) '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'An argument developed between some of John’s disciples and a certain Jew over the matter of ceremonial washing. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They came to John and said to him, “Rabbi, that man who was with you on the other side of the Jordan—the one you testified about—look, he is baptizing, and everyone is going to him.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To this John replied, “A person can receive only what is given them from heaven. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You yourselves can testify that I said, ‘I am not the Messiah but am sent ahead of him.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The bride belongs to the bridegroom. The friend who attends the bridegroom waits and listens for him, and is full of joy when he hears the bridegroom’s voice. That joy is mine, and it is now complete. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Very truly I tell you, no one can see the kingdom of God unless they are born again.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'again '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'also means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from above
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 7.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He must become greater; I must become less.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some interpreters end the quotation with verse 36.
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The one who comes from above is above all; the one who is from the earth belongs to the earth, and speaks as one from the earth. The one who comes from heaven is above all. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He testifies to what he has seen and heard, but no one accepts his testimony. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever has accepted it has certified that God is truthful. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the one whom God has sent speaks the words of God, for God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he
      marker-yv: yv-n
    - type: text
      text: ' gives the Spirit without limit. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Father loves the Son and has placed everything in his hands. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whoever believes in the Son has eternal life, but whoever rejects the Son will not see life, for God’s wrath remains on them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “How can someone be born when they are old?” Nicodemus asked. “Surely they cannot enter a second time into their mother’s womb to be born!”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Very truly I tell you, no one can enter the kingdom of God unless they are born of water and the Spirit.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Flesh gives birth to flesh, but the Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: but spirit
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: gives birth to spirit.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You should not be surprised at my saying, ‘You
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is plural.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: must be born again.’
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The wind blows wherever it pleases. You hear its sound, but you cannot tell where it comes from or where it is going. So it is with everyone born of the Spirit.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Spirit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is the same as that for '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wind.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “How can this be?” Nicodemus asked.
