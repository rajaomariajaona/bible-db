document_id: EXO.39,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Priestly Garments
  - type: text
    content: 'From the blue, purple and scarlet yarn they made woven garments for ministering in the sanctuary. They also made sacred garments for Aaron, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  - type: heading
    content: The Ephod
  '10':
  - type: text
    content: 'Then they mounted four rows of precious stones on it. The first row was carnelian, chrysolite and beryl; '
  '11':
  - type: text
    content: 'the second row was turquoise, lapis lazuli and emerald; '
  '12':
  - type: text
    content: 'the third row was jacinth, agate and amethyst; '
  '13':
  - type: text
    content: the fourth row was topaz, onyx and jasper.
  - type: note
    content: The precise identification of some of these precious stones is uncertain.
  - type: text
    content: ' They were mounted in gold filigree settings. '
  '14':
  - type: text
    content: There were twelve stones, one for each of the names of the sons of Israel, each engraved like a seal with the name of one of the twelve tribes.
  '15':
  - type: text
    content: 'For the breastpiece they made braided chains of pure gold, like a rope. '
  '16':
  - type: text
    content: 'They made two gold filigree settings and two gold rings, and fastened the rings to two of the corners of the breastpiece. '
  '17':
  - type: text
    content: 'They fastened the two gold chains to the rings at the corners of the breastpiece, '
  '18':
  - type: text
    content: 'and the other ends of the chains to the two settings, attaching them to the shoulder pieces of the ephod at the front. '
  '19':
  - type: text
    content: 'They made two gold rings and attached them to the other two corners of the breastpiece on the inside edge next to the ephod. '
  '2':
  - type: text
    content: They
  - type: note
    content: Or He; also in verses 7, 8 and 22
  - type: text
    content: ' made the ephod of gold, and of blue, purple and scarlet yarn, and of finely twisted linen. '
  '20':
  - type: text
    content: 'Then they made two more gold rings and attached them to the bottom of the shoulder pieces on the front of the ephod, close to the seam just above the waistband of the ephod. '
  '21':
  - type: text
    content: 'They tied the rings of the breastpiece to the rings of the ephod with blue cord, connecting it to the waistband so that the breastpiece would not swing out from the ephod—as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  - type: heading
    content: Other Priestly Garments
  '22':
  - type: text
    content: 'They made the robe of the ephod entirely of blue cloth—the work of a weaver— '
  '23':
  - type: text
    content: with an opening in the center of the robe like the opening of a collar,
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' and a band around this opening, so that it would not tear. '
  '24':
  - type: text
    content: 'They made pomegranates of blue, purple and scarlet yarn and finely twisted linen around the hem of the robe. '
  '25':
  - type: text
    content: 'And they made bells of pure gold and attached them around the hem between the pomegranates. '
  '26':
  - type: text
    content: 'The bells and pomegranates alternated around the hem of the robe to be worn for ministering, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '27':
  - type: text
    content: 'For Aaron and his sons, they made tunics of fine linen—the work of a weaver— '
  '28':
  - type: text
    content: 'and the turban of fine linen, the linen caps and the undergarments of finely twisted linen. '
  '29':
  - type: text
    content: 'The sash was made of finely twisted linen and blue, purple and scarlet yarn—the work of an embroiderer—as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '3':
  - type: text
    content: 'They hammered out thin sheets of gold and cut strands to be worked into the blue, purple and scarlet yarn and fine linen—the work of skilled hands. '
  '30':
  - type: text
    content: 'They made the plate, the sacred emblem, out of pure gold and engraved on it, like an inscription on a seal: '
  - type: heading
    content: Holy to the Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Then they fastened a blue cord to it to attach it to the turban, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  - type: heading
    content: Moses Inspects the Tabernacle
  '32':
  - type: text
    content: 'So all the work on the tabernacle, the tent of meeting, was completed. The Israelites did everything just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '33':
  - type: text
    content: 'Then they brought the tabernacle to Moses: the tent and all its furnishings, its clasps, frames, crossbars, posts and bases; '
  '34':
  - type: text
    content: the covering of ram skins dyed red and the covering of another durable leather
  - type: note
    content: Possibly the hides of large aquatic mammals
  - type: text
    content: ' and the shielding curtain; '
  '35':
  - type: text
    content: 'the ark of the covenant law with its poles and the atonement cover; '
  '36':
  - type: text
    content: 'the table with all its articles and the bread of the Presence; '
  '37':
  - type: text
    content: 'the pure gold lampstand with its row of lamps and all its accessories, and the olive oil for the light; '
  '38':
  - type: text
    content: 'the gold altar, the anointing oil, the fragrant incense, and the curtain for the entrance to the tent; '
  '39':
  - type: text
    content: 'the bronze altar with its bronze grating, its poles and all its utensils; the basin with its stand; '
  '4':
  - type: text
    content: 'They made shoulder pieces for the ephod, which were attached to two of its corners, so it could be fastened. '
  '40':
  - type: text
    content: 'the curtains of the courtyard with its posts and bases, and the curtain for the entrance to the courtyard; the ropes and tent pegs for the courtyard; all the furnishings for the tabernacle, the tent of meeting; '
  '41':
  - type: text
    content: and the woven garments worn for ministering in the sanctuary, both the sacred garments for Aaron the priest and the garments for his sons when serving as priests.
  '42':
  - type: text
    content: 'The Israelites had done all the work just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses. '
  '43':
  - type: text
    content: 'Moses inspected the work and saw that they had done it just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded. So Moses blessed them.'
  '5':
  - type: text
    content: 'Its skillfully woven waistband was like it—of one piece with the ephod and made with gold, and with blue, purple and scarlet yarn, and with finely twisted linen, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '6':
  - type: text
    content: 'They mounted the onyx stones in gold filigree settings and engraved them like a seal with the names of the sons of Israel. '
  '7':
  - type: text
    content: 'Then they fastened them on the shoulder pieces of the ephod as memorial stones for the sons of Israel, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  - type: heading
    content: The Breastpiece
  '8':
  - type: text
    content: 'They fashioned the breastpiece—the work of a skilled craftsman. They made it like the ephod: of gold, and of blue, purple and scarlet yarn, and of finely twisted linen. '
  '9':
  - type: text
    content: It was square—a span
  - type: note
    content: That is, about 9 inches or about 23 centimeters
  - type: text
    content: ' long and a span wide—and folded double. '
