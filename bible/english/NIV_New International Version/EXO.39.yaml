document_id: EXO.39
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Priestly Garments
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'From the blue, purple and scarlet yarn they made woven garments for ministering in the sanctuary. They also made sacred garments for Aaron, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ephod
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 7, 8 and 22
    marker-yv: yv-n
  - type: text
    text: ' made the ephod of gold, and of blue, purple and scarlet yarn, and of finely twisted linen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They hammered out thin sheets of gold and cut strands to be worked into the blue, purple and scarlet yarn and fine linen—the work of skilled hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They made shoulder pieces for the ephod, which were attached to two of its corners, so it could be fastened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Its skillfully woven waistband was like it—of one piece with the ephod and made with gold, and with blue, purple and scarlet yarn, and with finely twisted linen, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They mounted the onyx stones in gold filigree settings and engraved them like a seal with the names of the sons of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then they fastened them on the shoulder pieces of the ephod as memorial stones for the sons of Israel, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Breastpiece
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'They fashioned the breastpiece—the work of a skilled craftsman. They made it like the ephod: of gold, and of blue, purple and scarlet yarn, and of finely twisted linen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It was square—a span
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 9 inches or about 23 centimeters
    marker-yv: yv-n
  - type: text
    text: ' long and a span wide—and folded double. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then they mounted four rows of precious stones on it. The first row was carnelian, chrysolite and beryl; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'the second row was turquoise, lapis lazuli and emerald; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'the third row was jacinth, agate and amethyst; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: the fourth row was topaz, onyx and jasper.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The precise identification of some of these precious stones is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' They were mounted in gold filigree settings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: There were twelve stones, one for each of the names of the sons of Israel, each engraved like a seal with the name of one of the twelve tribes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For the breastpiece they made braided chains of pure gold, like a rope. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They made two gold filigree settings and two gold rings, and fastened the rings to two of the corners of the breastpiece. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They fastened the two gold chains to the rings at the corners of the breastpiece, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and the other ends of the chains to the two settings, attaching them to the shoulder pieces of the ephod at the front. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They made two gold rings and attached them to the other two corners of the breastpiece on the inside edge next to the ephod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then they made two more gold rings and attached them to the bottom of the shoulder pieces on the front of the ephod, close to the seam just above the waistband of the ephod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They tied the rings of the breastpiece to the rings of the ephod with blue cord, connecting it to the waistband so that the breastpiece would not swing out from the ephod—as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Other Priestly Garments
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'They made the robe of the ephod entirely of blue cloth—the work of a weaver— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: with an opening in the center of the robe like the opening of a collar,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and a band around this opening, so that it would not tear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'They made pomegranates of blue, purple and scarlet yarn and finely twisted linen around the hem of the robe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And they made bells of pure gold and attached them around the hem between the pomegranates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The bells and pomegranates alternated around the hem of the robe to be worn for ministering, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For Aaron and his sons, they made tunics of fine linen—the work of a weaver— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and the turban of fine linen, the linen caps and the undergarments of finely twisted linen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The sash was made of finely twisted linen and blue, purple and scarlet yarn—the work of an embroiderer—as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They made the plate, the sacred emblem, out of pure gold and engraved on it, like an inscription on a seal: '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: 'Holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then they fastened a blue cord to it to attach it to the turban, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moses Inspects the Tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So all the work on the tabernacle, the tent of meeting, was completed. The Israelites did everything just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then they brought the tabernacle to Moses: the tent and all its furnishings, its clasps, frames, crossbars, posts and bases; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: the covering of ram skins dyed red and the covering of another durable leather
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly the hides of large aquatic mammals
    marker-yv: yv-n
  - type: text
    text: ' and the shielding curtain; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'the ark of the covenant law with its poles and the atonement cover; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'the table with all its articles and the bread of the Presence; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'the pure gold lampstand with its row of lamps and all its accessories, and the olive oil for the light; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'the gold altar, the anointing oil, the fragrant incense, and the curtain for the entrance to the tent; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'the bronze altar with its bronze grating, its poles and all its utensils; the basin with its stand; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'the curtains of the courtyard with its posts and bases, and the curtain for the entrance to the courtyard; the ropes and tent pegs for the courtyard; all the furnishings for the tabernacle, the tent of meeting; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: and the woven garments worn for ministering in the sanctuary, both the sacred garments for Aaron the priest and the garments for his sons when serving as priests.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The Israelites had done all the work just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Moses inspected the work and saw that they had done it just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded. So Moses blessed them.'
