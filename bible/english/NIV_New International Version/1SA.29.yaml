document_id: 1SA.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Achish Sends David Back to Ziklag
  - type: text
    content: 'The Philistines gathered all their forces at Aphek, and Israel camped by the spring in Jezreel. '
  '10':
  - type: text
    content: Now get up early, along with your master’s servants who have come with you, and leave in the morning as soon as it is light.”
  '11':
  - type: text
    content: So David and his men got up early in the morning to go back to the land of the Philistines, and the Philistines went up to Jezreel.
  '2':
  - type: text
    content: 'As the Philistine rulers marched with their units of hundreds and thousands, David and his men were marching at the rear with Achish. '
  '3':
  - type: text
    content: The commanders of the Philistines asked, “What about these Hebrews?”
  - type: text
    content: Achish replied, “Is this not David, who was an officer of Saul king of Israel? He has already been with me for over a year, and from the day he left Saul until now, I have found no fault in him.”
  '4':
  - type: text
    content: 'But the Philistine commanders were angry with Achish and said, “Send the man back, that he may return to the place you assigned him. He must not go with us into battle, or he will turn against us during the fighting. How better could he regain his master’s favor than by taking the heads of our own men? '
  '5':
  - type: text
    content: 'Isn’t this the David they sang about in their dances:'
  - type: text
    content: “ ‘Saul has slain his thousands,
  - type: text
    content: and David his tens of thousands’?”
  '6':
  - type: text
    content: 'So Achish called David and said to him, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, you have been reliable, and I would be pleased to have you serve with me in the army. From the day you came to me until today, I have found no fault in you, but the rulers don’t approve of you. '
  '7':
  - type: text
    content: Now turn back and go in peace; do nothing to displease the Philistine rulers.”
  '8':
  - type: text
    content: “But what have I done?” asked David. “What have you found against your servant from the day I came to you until now? Why can’t I go and fight against the enemies of my lord the king?”
  '9':
  - type: text
    content: 'Achish answered, “I know that you have been as pleasing in my eyes as an angel of God; nevertheless, the Philistine commanders have said, ‘He must not go up with us into battle.’ '
