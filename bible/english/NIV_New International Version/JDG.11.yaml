document_id: JDG.11,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Jephthah the Gileadite was a mighty warrior. His father was Gilead; his mother was a prostitute. '
  '10':
  - type: text
    content: 'The elders of Gilead replied, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is our witness; we will certainly do as you say.” '
  '11':
  - type: text
    content: 'So Jephthah went with the elders of Gilead, and the people made him head and commander over them. And he repeated all his words before the '
  - type: text
    content: Lord
  - type: text
    content: ' in Mizpah.'
  '12':
  - type: text
    content: 'Then Jephthah sent messengers to the Ammonite king with the question: “What do you have against me that you have attacked my country?”'
  '13':
  - type: text
    content: The king of the Ammonites answered Jephthah’s messengers, “When Israel came up out of Egypt, they took away my land from the Arnon to the Jabbok, all the way to the Jordan. Now give it back peaceably.”
  '14':
  - type: text
    content: 'Jephthah sent back messengers to the Ammonite king, '
  '15':
  - type: text
    content: 'saying:'
  - type: text
    content: '“This is what Jephthah says: Israel did not take the land of Moab or the land of the Ammonites. '
  '16':
  - type: text
    content: But when they came up out of Egypt, Israel went through the wilderness to the Red Sea
  - type: note
    content: Or the Sea of Reeds
  - type: text
    content: ' and on to Kadesh. '
  '17':
  - type: text
    content: Then Israel sent messengers to the king of Edom, saying, ‘Give us permission to go through your country,’ but the king of Edom would not listen. They sent also to the king of Moab, and he refused. So Israel stayed at Kadesh.
  '18':
  - type: text
    content: “Next they traveled through the wilderness, skirted the lands of Edom and Moab, passed along the eastern side of the country of Moab, and camped on the other side of the Arnon. They did not enter the territory of Moab, for the Arnon was its border.
  '19':
  - type: text
    content: '“Then Israel sent messengers to Sihon king of the Amorites, who ruled in Heshbon, and said to him, ‘Let us pass through your country to our own place.’ '
  '2':
  - type: text
    content: 'Gilead’s wife also bore him sons, and when they were grown up, they drove Jephthah away. “You are not going to get any inheritance in our family,” they said, “because you are the son of another woman.” '
  '20':
  - type: text
    content: Sihon, however, did not trust Israel
  - type: note
    content: Or however, would not make an agreement for Israel
  - type: text
    content: ' to pass through his territory. He mustered all his troops and encamped at Jahaz and fought with Israel.'
  '21':
  - type: text
    content: '“Then the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, gave Sihon and his whole army into Israel’s hands, and they defeated them. Israel took over all the land of the Amorites who lived in that country, '
  '22':
  - type: text
    content: capturing all of it from the Arnon to the Jabbok and from the desert to the Jordan.
  '23':
  - type: text
    content: '“Now since the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has driven the Amorites out before his people Israel, what right have you to take it over? '
  '24':
  - type: text
    content: 'Will you not take what your god Chemosh gives you? Likewise, whatever the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has given us, we will possess. '
  '25':
  - type: text
    content: 'Are you any better than Balak son of Zippor, king of Moab? Did he ever quarrel with Israel or fight with them? '
  '26':
  - type: text
    content: 'For three hundred years Israel occupied Heshbon, Aroer, the surrounding settlements and all the towns along the Arnon. Why didn’t you retake them during that time? '
  '27':
  - type: text
    content: 'I have not wronged you, but you are doing me wrong by waging war against me. Let the '
  - type: text
    content: Lord
  - type: text
    content: ', the Judge, decide the dispute this day between the Israelites and the Ammonites.”'
  '28':
  - type: text
    content: The king of Ammon, however, paid no attention to the message Jephthah sent him.
  '29':
  - type: text
    content: 'Then the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came on Jephthah. He crossed Gilead and Manasseh, passed through Mizpah of Gilead, and from there he advanced against the Ammonites. '
  '3':
  - type: text
    content: So Jephthah fled from his brothers and settled in the land of Tob, where a gang of scoundrels gathered around him and followed him.
  '30':
  - type: text
    content: 'And Jephthah made a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ': “If you give the Ammonites into my hands, '
  '31':
  - type: text
    content: 'whatever comes out of the door of my house to meet me when I return in triumph from the Ammonites will be the '
  - type: text
    content: Lord
  - type: text
    content: ’s, and I will sacrifice it as a burnt offering.”
  '32':
  - type: text
    content: 'Then Jephthah went over to fight the Ammonites, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them into his hands. '
  '33':
  - type: text
    content: He devastated twenty towns from Aroer to the vicinity of Minnith, as far as Abel Keramim. Thus Israel subdued Ammon.
  '34':
  - type: text
    content: 'When Jephthah returned to his home in Mizpah, who should come out to meet him but his daughter, dancing to the sound of timbrels! She was an only child. Except for her he had neither son nor daughter. '
  '35':
  - type: text
    content: 'When he saw her, he tore his clothes and cried, “Oh no, my daughter! You have brought me down and I am devastated. I have made a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' that I cannot break.”'
  '36':
  - type: text
    content: '“My father,” she replied, “you have given your word to the '
  - type: text
    content: Lord
  - type: text
    content: '. Do to me just as you promised, now that the '
  - type: text
    content: Lord
  - type: text
    content: ' has avenged you of your enemies, the Ammonites. '
  '37':
  - type: text
    content: But grant me this one request,” she said. “Give me two months to roam the hills and weep with my friends, because I will never marry.”
  '38':
  - type: text
    content: '“You may go,” he said. And he let her go for two months. She and her friends went into the hills and wept because she would never marry. '
  '39':
  - type: text
    content: After the two months, she returned to her father, and he did to her as he had vowed. And she was a virgin.
  - type: text
    content: 'From this comes the Israelite tradition '
  '4':
  - type: text
    content: 'Some time later, when the Ammonites were fighting against Israel, '
  '40':
  - type: text
    content: that each year the young women of Israel go out for four days to commemorate the daughter of Jephthah the Gileadite.
  '5':
  - type: text
    content: 'the elders of Gilead went to get Jephthah from the land of Tob. '
  '6':
  - type: text
    content: “Come,” they said, “be our commander, so we can fight the Ammonites.”
  '7':
  - type: text
    content: Jephthah said to them, “Didn’t you hate me and drive me from my father’s house? Why do you come to me now, when you’re in trouble?”
  '8':
  - type: text
    content: The elders of Gilead said to him, “Nevertheless, we are turning to you now; come with us to fight the Ammonites, and you will be head over all of us who live in Gilead.”
  '9':
  - type: text
    content: 'Jephthah answered, “Suppose you take me back to fight the Ammonites and the '
  - type: text
    content: Lord
  - type: text
    content: ' gives them to me—will I really be your head?”'
