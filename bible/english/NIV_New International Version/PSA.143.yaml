document_id: PSA.143,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 143
  - type: text
    content: A psalm of David.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', hear my prayer,'
  - type: text
    content: listen to my cry for mercy;
  - type: text
    content: in your faithfulness and righteousness
  - type: text
    content: come to my relief.
  '10':
  - type: text
    content: Teach me to do your will,
  - type: text
    content: for you are my God;
  - type: text
    content: may your good Spirit
  - type: text
    content: lead me on level ground.
  '11':
  - type: text
    content: 'For your name’s sake, '
  - type: text
    content: Lord
  - type: text
    content: ', preserve my life;'
  - type: text
    content: in your righteousness, bring me out of trouble.
  '12':
  - type: text
    content: In your unfailing love, silence my enemies;
  - type: text
    content: destroy all my foes,
  - type: text
    content: for I am your servant.
  '2':
  - type: text
    content: Do not bring your servant into judgment,
  - type: text
    content: for no one living is righteous before you.
  '3':
  - type: text
    content: The enemy pursues me,
  - type: text
    content: he crushes me to the ground;
  - type: text
    content: he makes me dwell in the darkness
  - type: text
    content: like those long dead.
  '4':
  - type: text
    content: So my spirit grows faint within me;
  - type: text
    content: my heart within me is dismayed.
  '5':
  - type: text
    content: I remember the days of long ago;
  - type: text
    content: I meditate on all your works
  - type: text
    content: and consider what your hands have done.
  '6':
  - type: text
    content: I spread out my hands to you;
  - type: text
    content: I thirst for you like a parched land.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '7':
  - type: text
    content: 'Answer me quickly, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: my spirit fails.
  - type: text
    content: Do not hide your face from me
  - type: text
    content: or I will be like those who go down to the pit.
  '8':
  - type: text
    content: Let the morning bring me word of your unfailing love,
  - type: text
    content: for I have put my trust in you.
  - type: text
    content: Show me the way I should go,
  - type: text
    content: for to you I entrust my life.
  '9':
  - type: text
    content: 'Rescue me from my enemies, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for I hide myself in you.
