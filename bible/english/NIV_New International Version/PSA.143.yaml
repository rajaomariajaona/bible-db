document_id: PSA.143,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 143
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', hear my prayer,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to my cry for mercy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in your faithfulness and righteousness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come to my relief.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Teach me to do your will,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are my God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: may your good Spirit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lead me on level ground.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For your name’s sake, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', preserve my life;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your righteousness, bring me out of trouble.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: In your unfailing love, silence my enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroy all my foes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am your servant.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Do not bring your servant into judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for no one living is righteous before you.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The enemy pursues me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he crushes me to the ground;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he makes me dwell in the darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like those long dead.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So my spirit grows faint within me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart within me is dismayed.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I remember the days of long ago;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I meditate on all your works
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and consider what your hands have done.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I spread out my hands to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I thirst for you like a parched land.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '143:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Answer me quickly, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my spirit fails.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not hide your face from me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or I will be like those who go down to the pit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let the morning bring me word of your unfailing love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have put my trust in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Show me the way I should go,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for to you I entrust my life.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Rescue me from my enemies, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I hide myself in you.
