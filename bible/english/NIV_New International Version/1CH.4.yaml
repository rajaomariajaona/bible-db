document_id: 1CH.4
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Other Clans of Judah
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The descendants of Judah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Perez, Hezron, Karmi, Hur and Shobal.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Reaiah son of Shobal was the father of Jahath, and Jahath the father of Ahumai and Lahad. These were the clans of the Zorathites.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: These were the sons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts (see also Vulgate); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: father
    marker-yv: yv-n
  - type: text
    text: ' of Etam:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Jezreel, Ishma and Idbash. Their sister was named Hazzelelponi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Penuel was the father of Gedor, and Ezer the father of Hushah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: These were the descendants of Hur, the firstborn of Ephrathah and father
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Father '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'may mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'civic leader '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: military leader
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 12, 14, 17, 18 and possibly elsewhere.
    marker-yv: yv-n
  - type: text
    text: ' of Bethlehem.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ashhur the father of Tekoa had two wives, Helah and Naarah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Naarah bore him Ahuzzam, Hepher, Temeni and Haahashtari. These were the descendants of Naarah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The sons of Helah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Zereth, Zohar, Ethnan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and Koz, who was the father of Anub and Hazzobebah and of the clans of Aharhel son of Harum.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jabez was more honorable than his brothers. His mother had named him Jabez,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jabez '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pain
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' saying, “I gave birth to him in pain.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jabez cried out to the God of Israel, “Oh, that you would bless me and enlarge my territory! Let your hand be with me, and keep me from harm so that I will be free from pain.” And God granted his request.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kelub, Shuhah’s brother, was the father of Mehir, who was the father of Eshton. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eshton was the father of Beth Rapha, Paseah and Tehinnah the father of Ir Nahash.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of the city of Nahash
    marker-yv: yv-n
  - type: text
    text: ' These were the men of Rekah.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Kenaz:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Othniel and Seraiah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The sons of Othniel:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hathath and Meonothai.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts and Vulgate; Hebrew does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: and Meonothai
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Meonothai was the father of Ophrah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Seraiah was the father of Joab,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the father of Ge Harashim.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ge Harashim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: valley of skilled workers.
    marker-yv: yv-n
  - type: text
    text: ' It was called this because its people were skilled workers.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sons of Caleb son of Jephunneh:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Iru, Elah and Naam.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The son of Elah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Kenaz.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The sons of Jehallelel:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ziph, Ziphah, Tiria and Asarel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The sons of Ezrah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Jether, Mered, Epher and Jalon. One of Mered’s wives gave birth to Miriam, Shammai and Ishbah the father of Eshtemoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: (His wife from the tribe of Judah gave birth to Jered the father of Gedor, Heber the father of Soko, and Jekuthiel the father of Zanoah.) These were the children of Pharaoh’s daughter Bithiah, whom Mered had married.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Hodiah’s wife, the sister of Naham:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: the father of Keilah the Garmite, and Eshtemoa the Maakathite.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The sons of Shimon:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Amnon, Rinnah, Ben-Hanan and Tilon.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The descendants of Ishi:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zoheth and Ben-Zoheth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The sons of Shelah son of Judah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Er the father of Lekah, Laadah the father of Mareshah and the clans of the linen workers at Beth Ashbea, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jokim, the men of Kozeba, and Joash and Saraph, who ruled in Moab and Jashubi Lehem. (These records are from ancient times.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They were the potters who lived at Netaim and Gederah; they stayed there and worked for the king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Simeon
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The descendants of Simeon:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Nemuel, Jamin, Jarib, Zerah and Shaul;
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Shallum was Shaul’s son, Mibsam his son and Mishma his son.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The descendants of Mishma:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hammuel his son, Zakkur his son and Shimei his son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Shimei had sixteen sons and six daughters, but his brothers did not have many children; so their entire clan did not become as numerous as the people of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They lived in Beersheba, Moladah, Hazar Shual, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Bilhah, Ezem, Tolad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Bethuel, Hormah, Ziklag, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Beth Markaboth, Hazar Susim, Beth Biri and Shaaraim. These were their towns until the reign of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Their surrounding villages were Etam, Ain, Rimmon, Token and Ashan—five towns— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: and all the villages around these towns as far as Baalath.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts (see also Joshua 19:8); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Baal
    marker-yv: yv-n
  - type: text
    text: ' These were their settlements. And they kept a genealogical record.'
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Meshobab, Jamlech, Joshah son of Amaziah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Joel, Jehu son of Joshibiah, the son of Seraiah, the son of Asiel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'also Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, Benaiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: and Ziza son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The men listed above by name were leaders of their clans. Their families increased greatly, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'and they went to the outskirts of Gedor to the east of the valley in search of pasture for their flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: They found rich, good pasture, and the land was spacious, peaceful and quiet. Some Hamites had lived there formerly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: The men whose names were listed came in the days of Hezekiah king of Judah. They attacked the Hamites in their dwellings and also the Meunites who were there and completely destroyed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', often by totally destroying them.'
    marker-yv: yv-n
  - type: text
    text: ' them, as is evident to this day. Then they settled in their place, because there was pasture for their flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'And five hundred of these Simeonites, led by Pelatiah, Neariah, Rephaiah and Uzziel, the sons of Ishi, invaded the hill country of Seir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: They killed the remaining Amalekites who had escaped, and they have lived there to this day.
