document_id: 1CH.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Other Clans of Judah
  - type: text
    content: 'The descendants of Judah:'
  - type: text
    content: Perez, Hezron, Karmi, Hur and Shobal.
  '10':
  - type: text
    content: Jabez cried out to the God of Israel, “Oh, that you would bless me and enlarge my territory! Let your hand be with me, and keep me from harm so that I will be free from pain.” And God granted his request.
  '11':
  - type: text
    content: 'Kelub, Shuhah’s brother, was the father of Mehir, who was the father of Eshton. '
  '12':
  - type: text
    content: Eshton was the father of Beth Rapha, Paseah and Tehinnah the father of Ir Nahash.
  - type: note
    content: Or of the city of Nahash
  - type: text
    content: ' These were the men of Rekah.'
  '13':
  - type: text
    content: 'The sons of Kenaz:'
  - type: text
    content: Othniel and Seraiah.
  - type: text
    content: 'The sons of Othniel:'
  - type: text
    content: Hathath and Meonothai.
  - type: note
    content: Some Septuagint manuscripts and Vulgate; Hebrew does not have and Meonothai.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Meonothai was the father of Ophrah.
  - type: text
    content: Seraiah was the father of Joab,
  - type: text
    content: the father of Ge Harashim.
  - type: note
    content: Ge Harashim means valley of skilled workers.
  - type: text
    content: ' It was called this because its people were skilled workers.'
  '15':
  - type: text
    content: 'The sons of Caleb son of Jephunneh:'
  - type: text
    content: Iru, Elah and Naam.
  - type: text
    content: 'The son of Elah:'
  - type: text
    content: Kenaz.
  '16':
  - type: text
    content: 'The sons of Jehallelel:'
  - type: text
    content: Ziph, Ziphah, Tiria and Asarel.
  '17':
  - type: text
    content: 'The sons of Ezrah:'
  - type: text
    content: 'Jether, Mered, Epher and Jalon. One of Mered’s wives gave birth to Miriam, Shammai and Ishbah the father of Eshtemoa. '
  '18':
  - type: text
    content: (His wife from the tribe of Judah gave birth to Jered the father of Gedor, Heber the father of Soko, and Jekuthiel the father of Zanoah.) These were the children of Pharaoh’s daughter Bithiah, whom Mered had married.
  '19':
  - type: text
    content: 'The sons of Hodiah’s wife, the sister of Naham:'
  - type: text
    content: the father of Keilah the Garmite, and Eshtemoa the Maakathite.
  '2':
  - type: text
    content: Reaiah son of Shobal was the father of Jahath, and Jahath the father of Ahumai and Lahad. These were the clans of the Zorathites.
  '20':
  - type: text
    content: 'The sons of Shimon:'
  - type: text
    content: Amnon, Rinnah, Ben-Hanan and Tilon.
  - type: text
    content: 'The descendants of Ishi:'
  - type: text
    content: Zoheth and Ben-Zoheth.
  '21':
  - type: text
    content: 'The sons of Shelah son of Judah:'
  - type: text
    content: 'Er the father of Lekah, Laadah the father of Mareshah and the clans of the linen workers at Beth Ashbea, '
  '22':
  - type: text
    content: 'Jokim, the men of Kozeba, and Joash and Saraph, who ruled in Moab and Jashubi Lehem. (These records are from ancient times.) '
  '23':
  - type: text
    content: They were the potters who lived at Netaim and Gederah; they stayed there and worked for the king.
  - type: heading
    content: Simeon
  '24':
  - type: text
    content: 'The descendants of Simeon:'
  - type: text
    content: Nemuel, Jamin, Jarib, Zerah and Shaul;
  '25':
  - type: text
    content: Shallum was Shaul’s son, Mibsam his son and Mishma his son.
  '26':
  - type: text
    content: 'The descendants of Mishma:'
  - type: text
    content: Hammuel his son, Zakkur his son and Shimei his son.
  '27':
  - type: text
    content: 'Shimei had sixteen sons and six daughters, but his brothers did not have many children; so their entire clan did not become as numerous as the people of Judah. '
  '28':
  - type: text
    content: 'They lived in Beersheba, Moladah, Hazar Shual, '
  '29':
  - type: text
    content: 'Bilhah, Ezem, Tolad, '
  '3':
  - type: text
    content: These were the sons
  - type: note
    content: Some Septuagint manuscripts (see also Vulgate); Hebrew father
  - type: text
    content: ' of Etam:'
  - type: text
    content: 'Jezreel, Ishma and Idbash. Their sister was named Hazzelelponi. '
  '30':
  - type: text
    content: 'Bethuel, Hormah, Ziklag, '
  '31':
  - type: text
    content: 'Beth Markaboth, Hazar Susim, Beth Biri and Shaaraim. These were their towns until the reign of David. '
  '32':
  - type: text
    content: 'Their surrounding villages were Etam, Ain, Rimmon, Token and Ashan—five towns— '
  '33':
  - type: text
    content: and all the villages around these towns as far as Baalath.
  - type: note
    content: Some Septuagint manuscripts (see also Joshua 19:8); Hebrew Baal
  - type: text
    content: ' These were their settlements. And they kept a genealogical record.'
  '34':
  - type: text
    content: 'Meshobab, Jamlech, Joshah son of Amaziah, '
  '35':
  - type: text
    content: 'Joel, Jehu son of Joshibiah, the son of Seraiah, the son of Asiel, '
  '36':
  - type: text
    content: 'also Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, Benaiah, '
  '37':
  - type: text
    content: and Ziza son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah.
  '38':
  - type: text
    content: 'The men listed above by name were leaders of their clans. Their families increased greatly, '
  '39':
  - type: text
    content: 'and they went to the outskirts of Gedor to the east of the valley in search of pasture for their flocks. '
  '4':
  - type: text
    content: Penuel was the father of Gedor, and Ezer the father of Hushah.
  - type: text
    content: These were the descendants of Hur, the firstborn of Ephrathah and father
  - type: note
    content: Father may mean civic leader or military leader; also in verses 12, 14, 17, 18 and possibly elsewhere.
  - type: text
    content: ' of Bethlehem.'
  '40':
  - type: text
    content: They found rich, good pasture, and the land was spacious, peaceful and quiet. Some Hamites had lived there formerly.
  '41':
  - type: text
    content: The men whose names were listed came in the days of Hezekiah king of Judah. They attacked the Hamites in their dwellings and also the Meunites who were there and completely destroyed
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' them, as is evident to this day. Then they settled in their place, because there was pasture for their flocks. '
  '42':
  - type: text
    content: 'And five hundred of these Simeonites, led by Pelatiah, Neariah, Rephaiah and Uzziel, the sons of Ishi, invaded the hill country of Seir. '
  '43':
  - type: text
    content: They killed the remaining Amalekites who had escaped, and they have lived there to this day.
  '5':
  - type: text
    content: Ashhur the father of Tekoa had two wives, Helah and Naarah.
  '6':
  - type: text
    content: Naarah bore him Ahuzzam, Hepher, Temeni and Haahashtari. These were the descendants of Naarah.
  '7':
  - type: text
    content: 'The sons of Helah:'
  - type: text
    content: 'Zereth, Zohar, Ethnan, '
  '8':
  - type: text
    content: and Koz, who was the father of Anub and Hazzobebah and of the clans of Aharhel son of Harum.
  '9':
  - type: text
    content: Jabez was more honorable than his brothers. His mother had named him Jabez,
  - type: note
    content: Jabez sounds like the Hebrew for pain.
  - type: text
    content: ' saying, “I gave birth to him in pain.” '
