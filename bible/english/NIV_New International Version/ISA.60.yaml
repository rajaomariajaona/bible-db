document_id: ISA.60
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Glory of Zion
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Arise, shine, for your light has come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rises upon you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: See, darkness covers the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and thick darkness is over the peoples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rises upon you'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his glory appears over you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nations will come to your light,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and kings to the brightness of your dawn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Lift up your eyes and look about you:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All assemble and come to you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: your sons come from afar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your daughters are carried on the hip.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then you will look and be radiant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your heart will throb and swell with joy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the wealth on the seas will be brought to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to you the riches of the nations will come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Herds of camels will cover your land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: young camels of Midian and Ephah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And all from Sheba will come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bearing gold and incense
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and proclaiming the praise of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All Kedar’s flocks will be gathered to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rams of Nebaioth will serve you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will be accepted as offerings on my altar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will adorn my glorious temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Who are these that fly along like clouds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like doves to their nests?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Surely the islands look to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the lead are the ships of Tarshish,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the trading ships
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: bringing your children from afar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with their silver and gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'to the honor of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he has endowed you with splendor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Foreigners will rebuild your walls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their kings will serve you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though in anger I struck you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in favor I will show you compassion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Your gates will always stand open,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will never be shut, day or night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that people may bring you the wealth of the nations—
- type: usfm
  marker: q2
  children:
  - type: text
    text: their kings led in triumphal procession.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For the nation or kingdom that will not serve you will perish;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will be utterly ruined.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “The glory of Lebanon will come to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the juniper, the fir and the cypress together,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to adorn my sanctuary;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will glorify the place for my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The children of your oppressors will come bowing before you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who despise you will bow down at your feet
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and will call you the City of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: Zion of the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Although you have been forsaken and hated,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one traveling through,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make you the everlasting pride
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the joy of all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You will drink the milk of nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be nursed at royal breasts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then you will know that I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', am your Savior,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your Redeemer, the Mighty One of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Instead of bronze I will bring you gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and silver in place of iron.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instead of wood I will bring you bronze,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and iron in place of stones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make peace your governor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and well-being your ruler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: No longer will violence be heard in your land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor ruin or destruction within your borders,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but you will call your walls Salvation
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your gates Praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The sun will no more be your light by day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will the brightness of the moon shine on you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be your everlasting light,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your God will be your glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Your sun will never set again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your moon will wane no more;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be your everlasting light,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your days of sorrow will end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then all your people will be righteous
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will possess the land forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are the shoot I have planted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the work of my hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the display of my splendor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The least of you will become a thousand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the smallest a mighty nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in its time I will do this swiftly.”
