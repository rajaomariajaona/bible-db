document_id: ISA.60,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Glory of Zion
  - type: text
    content: “Arise, shine, for your light has come,
  - type: text
    content: 'and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' rises upon you.'
  '10':
  - type: text
    content: “Foreigners will rebuild your walls,
  - type: text
    content: and their kings will serve you.
  - type: text
    content: Though in anger I struck you,
  - type: text
    content: in favor I will show you compassion.
  '11':
  - type: text
    content: Your gates will always stand open,
  - type: text
    content: they will never be shut, day or night,
  - type: text
    content: so that people may bring you the wealth of the nations—
  - type: text
    content: their kings led in triumphal procession.
  '12':
  - type: text
    content: For the nation or kingdom that will not serve you will perish;
  - type: text
    content: it will be utterly ruined.
  '13':
  - type: text
    content: “The glory of Lebanon will come to you,
  - type: text
    content: the juniper, the fir and the cypress together,
  - type: text
    content: to adorn my sanctuary;
  - type: text
    content: and I will glorify the place for my feet.
  '14':
  - type: text
    content: The children of your oppressors will come bowing before you;
  - type: text
    content: all who despise you will bow down at your feet
  - type: text
    content: 'and will call you the City of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: Zion of the Holy One of Israel.
  '15':
  - type: text
    content: “Although you have been forsaken and hated,
  - type: text
    content: with no one traveling through,
  - type: text
    content: I will make you the everlasting pride
  - type: text
    content: and the joy of all generations.
  '16':
  - type: text
    content: You will drink the milk of nations
  - type: text
    content: and be nursed at royal breasts.
  - type: text
    content: 'Then you will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', am your Savior,'
  - type: text
    content: your Redeemer, the Mighty One of Jacob.
  '17':
  - type: text
    content: Instead of bronze I will bring you gold,
  - type: text
    content: and silver in place of iron.
  - type: text
    content: Instead of wood I will bring you bronze,
  - type: text
    content: and iron in place of stones.
  - type: text
    content: I will make peace your governor
  - type: text
    content: and well-being your ruler.
  '18':
  - type: text
    content: No longer will violence be heard in your land,
  - type: text
    content: nor ruin or destruction within your borders,
  - type: text
    content: but you will call your walls Salvation
  - type: text
    content: and your gates Praise.
  '19':
  - type: text
    content: The sun will no more be your light by day,
  - type: text
    content: nor will the brightness of the moon shine on you,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will be your everlasting light,'
  - type: text
    content: and your God will be your glory.
  '2':
  - type: text
    content: See, darkness covers the earth
  - type: text
    content: and thick darkness is over the peoples,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' rises upon you'
  - type: text
    content: and his glory appears over you.
  '20':
  - type: text
    content: Your sun will never set again,
  - type: text
    content: and your moon will wane no more;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will be your everlasting light,'
  - type: text
    content: and your days of sorrow will end.
  '21':
  - type: text
    content: Then all your people will be righteous
  - type: text
    content: and they will possess the land forever.
  - type: text
    content: They are the shoot I have planted,
  - type: text
    content: the work of my hands,
  - type: text
    content: for the display of my splendor.
  '22':
  - type: text
    content: The least of you will become a thousand,
  - type: text
    content: the smallest a mighty nation.
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: in its time I will do this swiftly.”
  '3':
  - type: text
    content: Nations will come to your light,
  - type: text
    content: and kings to the brightness of your dawn.
  '4':
  - type: text
    content: '“Lift up your eyes and look about you:'
  - type: text
    content: All assemble and come to you;
  - type: text
    content: your sons come from afar,
  - type: text
    content: and your daughters are carried on the hip.
  '5':
  - type: text
    content: Then you will look and be radiant,
  - type: text
    content: your heart will throb and swell with joy;
  - type: text
    content: the wealth on the seas will be brought to you,
  - type: text
    content: to you the riches of the nations will come.
  '6':
  - type: text
    content: Herds of camels will cover your land,
  - type: text
    content: young camels of Midian and Ephah.
  - type: text
    content: And all from Sheba will come,
  - type: text
    content: bearing gold and incense
  - type: text
    content: 'and proclaiming the praise of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: All Kedar’s flocks will be gathered to you,
  - type: text
    content: the rams of Nebaioth will serve you;
  - type: text
    content: they will be accepted as offerings on my altar,
  - type: text
    content: and I will adorn my glorious temple.
  '8':
  - type: text
    content: “Who are these that fly along like clouds,
  - type: text
    content: like doves to their nests?
  '9':
  - type: text
    content: Surely the islands look to me;
  - type: text
    content: in the lead are the ships of Tarshish,
  - type: note
    content: Or the trading ships
  - type: text
    content: bringing your children from afar,
  - type: text
    content: with their silver and gold,
  - type: text
    content: 'to the honor of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: the Holy One of Israel,
  - type: text
    content: for he has endowed you with splendor.
