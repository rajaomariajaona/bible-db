verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 67
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 67:1-7 is numbered 67:2-8.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. With stringed instruments. A psalm. A song.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: May God be gracious to us and bless us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make his face shine on us—
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '67:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verse 4.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: so that your ways may be known on earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your salvation among all nations.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: May the peoples praise you, God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may all the peoples praise you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: May the nations be glad and sing for joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you rule the peoples with equity
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and guide the nations of the earth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: May the peoples praise you, God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may all the peoples praise you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The land yields its harvest;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God, our God, blesses us.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: May God bless us still,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that all the ends of the earth will fear him.
