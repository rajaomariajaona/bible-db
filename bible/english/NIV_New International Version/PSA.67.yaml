document_id: PSA.67,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 67In Hebrew texts 67:1-7 is numbered 67:2-8.
  - type: text
    content: For the director of music. With stringed instruments. A psalm. A song.
  - type: text
    content: May God be gracious to us and bless us
  - type: text
    content: and make his face shine on us—
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 4.
  '2':
  - type: text
    content: so that your ways may be known on earth,
  - type: text
    content: your salvation among all nations.
  '3':
  - type: text
    content: May the peoples praise you, God;
  - type: text
    content: may all the peoples praise you.
  '4':
  - type: text
    content: May the nations be glad and sing for joy,
  - type: text
    content: for you rule the peoples with equity
  - type: text
    content: and guide the nations of the earth.
  '5':
  - type: text
    content: May the peoples praise you, God;
  - type: text
    content: may all the peoples praise you.
  '6':
  - type: text
    content: The land yields its harvest;
  - type: text
    content: God, our God, blesses us.
  '7':
  - type: text
    content: May God bless us still,
  - type: text
    content: so that all the ends of the earth will fear him.
