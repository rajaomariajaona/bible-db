document_id: PSA.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 21In Hebrew texts 21:1-13 is numbered 21:2-14.
  - type: text
    content: For the director of music. A psalm of David.
  - type: text
    content: 'The king rejoices in your strength, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: How great is his joy in the victories you give!
  '10':
  - type: text
    content: You will destroy their descendants from the earth,
  - type: text
    content: their posterity from mankind.
  '11':
  - type: text
    content: Though they plot evil against you
  - type: text
    content: and devise wicked schemes, they cannot succeed.
  '12':
  - type: text
    content: You will make them turn their backs
  - type: text
    content: when you aim at them with drawn bow.
  '13':
  - type: text
    content: 'Be exalted in your strength, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: we will sing and praise your might.
  '2':
  - type: text
    content: You have granted him his heart’s desire
  - type: text
    content: and have not withheld the request of his lips.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '3':
  - type: text
    content: You came to greet him with rich blessings
  - type: text
    content: and placed a crown of pure gold on his head.
  '4':
  - type: text
    content: He asked you for life, and you gave it to him—
  - type: text
    content: length of days, for ever and ever.
  '5':
  - type: text
    content: Through the victories you gave, his glory is great;
  - type: text
    content: you have bestowed on him splendor and majesty.
  '6':
  - type: text
    content: Surely you have granted him unending blessings
  - type: text
    content: and made him glad with the joy of your presence.
  '7':
  - type: text
    content: 'For the king trusts in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: through the unfailing love of the Most High
  - type: text
    content: he will not be shaken.
  '8':
  - type: text
    content: Your hand will lay hold on all your enemies;
  - type: text
    content: your right hand will seize your foes.
  '9':
  - type: text
    content: When you appear for battle,
  - type: text
    content: you will burn them up as in a blazing furnace.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will swallow them up in his wrath,'
  - type: text
    content: and his fire will consume them.
