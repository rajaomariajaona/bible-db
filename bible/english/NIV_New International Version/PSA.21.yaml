document_id: PSA.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 21
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 21:1-13 is numbered 21:2-14.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The king rejoices in your strength, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How great is his joy in the victories you give!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will destroy their descendants from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their posterity from mankind.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they plot evil against you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and devise wicked schemes, they cannot succeed.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will make them turn their backs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you aim at them with drawn bow.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Be exalted in your strength, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will sing and praise your might.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have granted him his heart’s desire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have not withheld the request of his lips.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You came to greet him with rich blessings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and placed a crown of pure gold on his head.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He asked you for life, and you gave it to him—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: length of days, for ever and ever.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through the victories you gave, his glory is great;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have bestowed on him splendor and majesty.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely you have granted him unending blessings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made him glad with the joy of your presence.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the king trusts in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through the unfailing love of the Most High
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will not be shaken.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your hand will lay hold on all your enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your right hand will seize your foes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you appear for battle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will burn them up as in a blazing furnace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will swallow them up in his wrath,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his fire will consume them.
