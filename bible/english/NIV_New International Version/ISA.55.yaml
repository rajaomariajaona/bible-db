document_id: ISA.55,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Invitation to the Thirsty
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Come, all you who are thirsty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come to the waters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you who have no money,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come, buy and eat!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, buy wine and milk
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without money and without cost.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: As the rain and the snow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come down from heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and do not return to it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without watering the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and making it bud and flourish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that it yields seed for the sower and bread for the eater,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'so is my word that goes out from my mouth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will not return to me empty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but will accomplish what I desire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and achieve the purpose for which I sent it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: You will go out in joy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be led forth in peace;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the mountains and hills
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will burst into song before you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all the trees of the field
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will clap their hands.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Instead of the thornbush will grow the juniper,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and instead of briers the myrtle will grow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This will be for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s renown,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for an everlasting sign,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will endure forever.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Why spend money on what is not bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your labor on what does not satisfy?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, listen to me, and eat what is good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will delight in the richest of fare.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Give ear and come to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen, that you may live.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make an everlasting covenant with you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my faithful love promised to David.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: See, I have made him a witness to the peoples,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a ruler and commander of the peoples.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Surely you will summon nations you know not,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nations you do not know will come running to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Holy One of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he has endowed you with splendor.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' while he may be found;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: call on him while he is near.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let the wicked forsake their ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the unrighteous their thoughts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them turn to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he will have mercy on them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to our God, for he will freely pardon.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “For my thoughts are not your thoughts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: neither are your ways my ways,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “As the heavens are higher than the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so are my ways higher than your ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my thoughts than your thoughts.
