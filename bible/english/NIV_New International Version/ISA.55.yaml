document_id: ISA.55,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Invitation to the Thirsty
  - type: text
    content: “Come, all you who are thirsty,
  - type: text
    content: come to the waters;
  - type: text
    content: and you who have no money,
  - type: text
    content: come, buy and eat!
  - type: text
    content: Come, buy wine and milk
  - type: text
    content: without money and without cost.
  '10':
  - type: text
    content: As the rain and the snow
  - type: text
    content: come down from heaven,
  - type: text
    content: and do not return to it
  - type: text
    content: without watering the earth
  - type: text
    content: and making it bud and flourish,
  - type: text
    content: so that it yields seed for the sower and bread for the eater,
  '11':
  - type: text
    content: 'so is my word that goes out from my mouth:'
  - type: text
    content: It will not return to me empty,
  - type: text
    content: but will accomplish what I desire
  - type: text
    content: and achieve the purpose for which I sent it.
  '12':
  - type: text
    content: You will go out in joy
  - type: text
    content: and be led forth in peace;
  - type: text
    content: the mountains and hills
  - type: text
    content: will burst into song before you,
  - type: text
    content: and all the trees of the field
  - type: text
    content: will clap their hands.
  '13':
  - type: text
    content: Instead of the thornbush will grow the juniper,
  - type: text
    content: and instead of briers the myrtle will grow.
  - type: text
    content: 'This will be for the '
  - type: text
    content: Lord
  - type: text
    content: ’s renown,
  - type: text
    content: for an everlasting sign,
  - type: text
    content: that will endure forever.”
  '2':
  - type: text
    content: Why spend money on what is not bread,
  - type: text
    content: and your labor on what does not satisfy?
  - type: text
    content: Listen, listen to me, and eat what is good,
  - type: text
    content: and you will delight in the richest of fare.
  '3':
  - type: text
    content: Give ear and come to me;
  - type: text
    content: listen, that you may live.
  - type: text
    content: I will make an everlasting covenant with you,
  - type: text
    content: my faithful love promised to David.
  '4':
  - type: text
    content: See, I have made him a witness to the peoples,
  - type: text
    content: a ruler and commander of the peoples.
  '5':
  - type: text
    content: Surely you will summon nations you know not,
  - type: text
    content: and nations you do not know will come running to you,
  - type: text
    content: 'because of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: the Holy One of Israel,
  - type: text
    content: for he has endowed you with splendor.”
  '6':
  - type: text
    content: 'Seek the '
  - type: text
    content: Lord
  - type: text
    content: ' while he may be found;'
  - type: text
    content: call on him while he is near.
  '7':
  - type: text
    content: Let the wicked forsake their ways
  - type: text
    content: and the unrighteous their thoughts.
  - type: text
    content: 'Let them turn to the '
  - type: text
    content: Lord
  - type: text
    content: ', and he will have mercy on them,'
  - type: text
    content: and to our God, for he will freely pardon.
  '8':
  - type: text
    content: “For my thoughts are not your thoughts,
  - type: text
    content: neither are your ways my ways,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: “As the heavens are higher than the earth,
  - type: text
    content: so are my ways higher than your ways
  - type: text
    content: and my thoughts than your thoughts.
