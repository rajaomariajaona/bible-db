document_id: 1TI.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, an apostle of Christ Jesus by the command of God our Savior and of Christ Jesus our hope,
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the sexually immoral, for those practicing homosexuality, for slave traders and liars and perjurers—and for whatever else is contrary to the sound doctrine '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that conforms to the gospel concerning the glory of the blessed God, which he entrusted to me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lord’s Grace to Paul
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I thank Christ Jesus our Lord, who has given me strength, that he considered me trustworthy, appointing me to his service. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even though I was once a blasphemer and a persecutor and a violent man, I was shown mercy because I acted in ignorance and unbelief. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The grace of our Lord was poured out on me abundantly, along with the faith and love that are in Christ Jesus.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is a trustworthy saying that deserves full acceptance: Christ Jesus came into the world to save sinners—of whom I am the worst. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But for that very reason I was shown mercy so that in me, the worst of sinners, Christ Jesus might display his immense patience as an example for those who would believe in him and receive eternal life. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now to the King eternal, immortal, invisible, the only God, be honor and glory for ever and ever. Amen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Charge to Timothy Renewed
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Timothy, my son, I am giving you this command in keeping with the prophecies once made about you, so that by recalling them you may fight the battle well, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'holding on to faith and a good conscience, which some have rejected and so have suffered shipwreck with regard to the faith. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To Timothy my true son in the faith:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace, mercy and peace from God the Father and Christ Jesus our Lord.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothy Charged to Oppose False Teachers
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Among them are Hymenaeus and Alexander, whom I have handed over to Satan to be taught not to blaspheme.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As I urged you when I went into Macedonia, stay there in Ephesus so that you may command certain people not to teach false doctrines any longer '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or to devote themselves to myths and endless genealogies. Such things promote controversial speculations rather than advancing God’s work—which is by faith. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The goal of this command is love, which comes from a pure heart and a good conscience and a sincere faith. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some have departed from these and have turned to meaningless talk. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They want to be teachers of the law, but they do not know what they are talking about or what they so confidently affirm.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that the law is good if one uses it properly. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We also know that the law is made not for the righteous but for lawbreakers and rebels, the ungodly and sinful, the unholy and irreligious, for those who kill their fathers or mothers, for murderers, '
