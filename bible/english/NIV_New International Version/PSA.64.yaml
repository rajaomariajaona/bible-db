document_id: PSA.64,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 64In Hebrew texts 64:1-10 is numbered 64:2-11.
  - type: text
    content: For the director of music. A psalm of David.
  - type: text
    content: Hear me, my God, as I voice my complaint;
  - type: text
    content: protect my life from the threat of the enemy.
  '10':
  - type: text
    content: 'The righteous will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: and take refuge in him;
  - type: text
    content: all the upright in heart will glory in him!
  '2':
  - type: text
    content: Hide me from the conspiracy of the wicked,
  - type: text
    content: from the plots of evildoers.
  '3':
  - type: text
    content: They sharpen their tongues like swords
  - type: text
    content: and aim cruel words like deadly arrows.
  '4':
  - type: text
    content: They shoot from ambush at the innocent;
  - type: text
    content: they shoot suddenly, without fear.
  '5':
  - type: text
    content: They encourage each other in evil plans,
  - type: text
    content: they talk about hiding their snares;
  - type: text
    content: they say, “Who will see it
  - type: note
    content: Or us
  - type: text
    content: ?”
  '6':
  - type: text
    content: They plot injustice and say,
  - type: text
    content: “We have devised a perfect plan!”
  - type: text
    content: Surely the human mind and heart are cunning.
  '7':
  - type: text
    content: But God will shoot them with his arrows;
  - type: text
    content: they will suddenly be struck down.
  '8':
  - type: text
    content: He will turn their own tongues against them
  - type: text
    content: and bring them to ruin;
  - type: text
    content: all who see them will shake their heads in scorn.
  '9':
  - type: text
    content: All people will fear;
  - type: text
    content: they will proclaim the works of God
  - type: text
    content: and ponder what he has done.
