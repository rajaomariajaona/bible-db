document_id: PSA.64
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 64
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 64:1-10 is numbered 64:2-11.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hear me, my God, as I voice my complaint;
- type: usfm
  marker: q2
  children:
  - type: text
    text: protect my life from the threat of the enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hide me from the conspiracy of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the plots of evildoers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They sharpen their tongues like swords
- type: usfm
  marker: q2
  children:
  - type: text
    text: and aim cruel words like deadly arrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They shoot from ambush at the innocent;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they shoot suddenly, without fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They encourage each other in evil plans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they talk about hiding their snares;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they say, “Who will see it
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '64:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: us
    marker-yv: yv-n
  - type: text
    text: ?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They plot injustice and say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “We have devised a perfect plan!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely the human mind and heart are cunning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But God will shoot them with his arrows;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will suddenly be struck down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He will turn their own tongues against them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring them to ruin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who see them will shake their heads in scorn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All people will fear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will proclaim the works of God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and ponder what he has done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The righteous will rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take refuge in him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the upright in heart will glory in him!
