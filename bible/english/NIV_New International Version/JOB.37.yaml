document_id: JOB.37,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “At this my heart pounds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and leaps from its place.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The breath of God produces ice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the broad waters become frozen.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He loads the clouds with moisture;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he scatters his lightning through them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At his direction they swirl around
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over the face of the whole earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to do whatever he commands them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He brings the clouds to punish people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or to water his earth and show his love.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to this, Job;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stop and consider God’s wonders.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you know how God controls the clouds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and makes his lightning flash?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you know how the clouds hang poised,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those wonders of him who has perfect knowledge?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who swelter in your clothes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the land lies hushed under the south wind,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: can you join him in spreading out the skies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hard as a mirror of cast bronze?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Tell us what we should say to him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we cannot draw up our case because of our darkness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen! Listen to the roar of his voice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the rumbling that comes from his mouth.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should he be told that I want to speak?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Would anyone ask to be swallowed up?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now no one can look at the sun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bright as it is in the skies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: after the wind has swept them clean.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of the north he comes in golden splendor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God comes in awesome majesty.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Almighty is beyond our reach and exalted in power;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in his justice and great righteousness, he does not oppress.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, people revere him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for does he not have regard for all the wise in heart?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for he does not have regard for any who think they are wise.
      marker-yv: yv-n
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He unleashes his lightning beneath the whole heaven
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sends it to the ends of the earth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After that comes the sound of his roar;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he thunders with his majestic voice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When his voice resounds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he holds nothing back.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s voice thunders in marvelous ways;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he does great things beyond our understanding.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He says to the snow, ‘Fall on the earth,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the rain shower, ‘Be a mighty downpour.’
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So that everyone he has made may know his work,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he stops all people from their labor.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: work, / he fills all people with fear by his power
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The animals take cover;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they remain in their dens.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The tempest comes out from its chamber,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the cold from the driving winds.
