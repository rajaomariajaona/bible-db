document_id: JOB.37
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “At this my heart pounds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leaps from its place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Listen! Listen to the roar of his voice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the rumbling that comes from his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He unleashes his lightning beneath the whole heaven
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sends it to the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: After that comes the sound of his roar;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he thunders with his majestic voice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When his voice resounds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he holds nothing back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: God’s voice thunders in marvelous ways;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he does great things beyond our understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He says to the snow, ‘Fall on the earth,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to the rain shower, ‘Be a mighty downpour.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So that everyone he has made may know his work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he stops all people from their labor.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: work, / he fills all people with fear by his power
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The animals take cover;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they remain in their dens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The tempest comes out from its chamber,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the cold from the driving winds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The breath of God produces ice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the broad waters become frozen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He loads the clouds with moisture;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he scatters his lightning through them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: At his direction they swirl around
- type: usfm
  marker: q2
  children:
  - type: text
    text: over the face of the whole earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: to do whatever he commands them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He brings the clouds to punish people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or to water his earth and show his love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Listen to this, Job;
- type: usfm
  marker: q2
  children:
  - type: text
    text: stop and consider God’s wonders.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Do you know how God controls the clouds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes his lightning flash?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Do you know how the clouds hang poised,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those wonders of him who has perfect knowledge?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You who swelter in your clothes
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the land lies hushed under the south wind,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: can you join him in spreading out the skies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hard as a mirror of cast bronze?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Tell us what we should say to him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we cannot draw up our case because of our darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Should he be told that I want to speak?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Would anyone ask to be swallowed up?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Now no one can look at the sun,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bright as it is in the skies
- type: usfm
  marker: q2
  children:
  - type: text
    text: after the wind has swept them clean.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Out of the north he comes in golden splendor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God comes in awesome majesty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The Almighty is beyond our reach and exalted in power;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in his justice and great righteousness, he does not oppress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Therefore, people revere him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for does he not have regard for all the wise in heart?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: for he does not have regard for any who think they are wise.
    marker-yv: yv-n
  - type: text
    text: ”
