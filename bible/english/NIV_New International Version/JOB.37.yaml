document_id: JOB.37,111
type_code: eng
verses:
  '1':
  - type: text
    content: “At this my heart pounds
  - type: text
    content: and leaps from its place.
  '10':
  - type: text
    content: The breath of God produces ice,
  - type: text
    content: and the broad waters become frozen.
  '11':
  - type: text
    content: He loads the clouds with moisture;
  - type: text
    content: he scatters his lightning through them.
  '12':
  - type: text
    content: At his direction they swirl around
  - type: text
    content: over the face of the whole earth
  - type: text
    content: to do whatever he commands them.
  '13':
  - type: text
    content: He brings the clouds to punish people,
  - type: text
    content: or to water his earth and show his love.
  '14':
  - type: text
    content: “Listen to this, Job;
  - type: text
    content: stop and consider God’s wonders.
  '15':
  - type: text
    content: Do you know how God controls the clouds
  - type: text
    content: and makes his lightning flash?
  '16':
  - type: text
    content: Do you know how the clouds hang poised,
  - type: text
    content: those wonders of him who has perfect knowledge?
  '17':
  - type: text
    content: You who swelter in your clothes
  - type: text
    content: when the land lies hushed under the south wind,
  '18':
  - type: text
    content: can you join him in spreading out the skies,
  - type: text
    content: hard as a mirror of cast bronze?
  '19':
  - type: text
    content: “Tell us what we should say to him;
  - type: text
    content: we cannot draw up our case because of our darkness.
  '2':
  - type: text
    content: Listen! Listen to the roar of his voice,
  - type: text
    content: to the rumbling that comes from his mouth.
  '20':
  - type: text
    content: Should he be told that I want to speak?
  - type: text
    content: Would anyone ask to be swallowed up?
  '21':
  - type: text
    content: Now no one can look at the sun,
  - type: text
    content: bright as it is in the skies
  - type: text
    content: after the wind has swept them clean.
  '22':
  - type: text
    content: Out of the north he comes in golden splendor;
  - type: text
    content: God comes in awesome majesty.
  '23':
  - type: text
    content: The Almighty is beyond our reach and exalted in power;
  - type: text
    content: in his justice and great righteousness, he does not oppress.
  '24':
  - type: text
    content: Therefore, people revere him,
  - type: text
    content: for does he not have regard for all the wise in heart?
  - type: note
    content: Or for he does not have regard for any who think they are wise.
  - type: text
    content: ”
  '3':
  - type: text
    content: He unleashes his lightning beneath the whole heaven
  - type: text
    content: and sends it to the ends of the earth.
  '4':
  - type: text
    content: After that comes the sound of his roar;
  - type: text
    content: he thunders with his majestic voice.
  - type: text
    content: When his voice resounds,
  - type: text
    content: he holds nothing back.
  '5':
  - type: text
    content: God’s voice thunders in marvelous ways;
  - type: text
    content: he does great things beyond our understanding.
  '6':
  - type: text
    content: He says to the snow, ‘Fall on the earth,’
  - type: text
    content: and to the rain shower, ‘Be a mighty downpour.’
  '7':
  - type: text
    content: So that everyone he has made may know his work,
  - type: text
    content: he stops all people from their labor.
  - type: note
    content: Or work, / he fills all people with fear by his power
  '8':
  - type: text
    content: The animals take cover;
  - type: text
    content: they remain in their dens.
  '9':
  - type: text
    content: The tempest comes out from its chamber,
  - type: text
    content: the cold from the driving winds.
