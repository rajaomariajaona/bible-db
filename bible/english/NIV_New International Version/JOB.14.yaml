document_id: JOB.14,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Mortals, born of woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are of few days and full of trouble.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But a man dies and is laid low;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he breathes his last and is no more.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: As the water of a lake dries up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or a riverbed becomes parched and dry,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: so he lies down and does not rise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till the heavens are no more, people will not awake
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or be roused from their sleep.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “If only you would hide me in the grave
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and conceal me till your anger has passed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only you would set me a time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then remember me!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: If someone dies, will they live again?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the days of my hard service
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will wait for my renewal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: release
      marker-yv: yv-n
    - type: text
      text: ' to come.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: You will call and I will answer you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will long for the creature your hands have made.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Surely then you will count my steps
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but not keep track of my sin.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: My offenses will be sealed up in a bag;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will cover over my sin.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “But as a mountain erodes and crumbles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and as a rock is moved from its place,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: as water wears away stones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and torrents wash away the soil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you destroy a person’s hope.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: They spring up like flowers and wither away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like fleeting shadows, they do not endure.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: You overpower them once for all, and they are gone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you change their countenance and send them away.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: If their children are honored, they do not know it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if their offspring are brought low, they do not see it.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: They feel but the pain of their own bodies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and mourn only for themselves.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Do you fix your eye on them?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you bring them
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Vulgate and Syriac; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me
      marker-yv: yv-n
    - type: text
      text: ' before you for judgment?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Who can bring what is pure from the impure?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No one!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A person’s days are determined;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have decreed the number of his months
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have set limits he cannot exceed.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So look away from him and let him alone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till he has put in his time like a hired laborer.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“At least there is hope for a tree:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If it is cut down, it will sprout again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its new shoots will not fail.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Its roots may grow old in the ground
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its stump die in the soil,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: yet at the scent of water it will bud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put forth shoots like a plant.
