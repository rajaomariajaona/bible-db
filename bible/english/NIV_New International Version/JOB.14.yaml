document_id: JOB.14,111
type_code: eng
verses:
  '1':
  - type: text
    content: “Mortals, born of woman,
  - type: text
    content: are of few days and full of trouble.
  '10':
  - type: text
    content: But a man dies and is laid low;
  - type: text
    content: he breathes his last and is no more.
  '11':
  - type: text
    content: As the water of a lake dries up
  - type: text
    content: or a riverbed becomes parched and dry,
  '12':
  - type: text
    content: so he lies down and does not rise;
  - type: text
    content: till the heavens are no more, people will not awake
  - type: text
    content: or be roused from their sleep.
  '13':
  - type: text
    content: “If only you would hide me in the grave
  - type: text
    content: and conceal me till your anger has passed!
  - type: text
    content: If only you would set me a time
  - type: text
    content: and then remember me!
  '14':
  - type: text
    content: If someone dies, will they live again?
  - type: text
    content: All the days of my hard service
  - type: text
    content: I will wait for my renewal
  - type: note
    content: Or release
  - type: text
    content: ' to come.'
  '15':
  - type: text
    content: You will call and I will answer you;
  - type: text
    content: you will long for the creature your hands have made.
  '16':
  - type: text
    content: Surely then you will count my steps
  - type: text
    content: but not keep track of my sin.
  '17':
  - type: text
    content: My offenses will be sealed up in a bag;
  - type: text
    content: you will cover over my sin.
  '18':
  - type: text
    content: “But as a mountain erodes and crumbles
  - type: text
    content: and as a rock is moved from its place,
  '19':
  - type: text
    content: as water wears away stones
  - type: text
    content: and torrents wash away the soil,
  - type: text
    content: so you destroy a person’s hope.
  '2':
  - type: text
    content: They spring up like flowers and wither away;
  - type: text
    content: like fleeting shadows, they do not endure.
  '20':
  - type: text
    content: You overpower them once for all, and they are gone;
  - type: text
    content: you change their countenance and send them away.
  '21':
  - type: text
    content: If their children are honored, they do not know it;
  - type: text
    content: if their offspring are brought low, they do not see it.
  '22':
  - type: text
    content: They feel but the pain of their own bodies
  - type: text
    content: and mourn only for themselves.”
  '3':
  - type: text
    content: Do you fix your eye on them?
  - type: text
    content: Will you bring them
  - type: note
    content: Septuagint, Vulgate and Syriac; Hebrew me
  - type: text
    content: ' before you for judgment?'
  '4':
  - type: text
    content: Who can bring what is pure from the impure?
  - type: text
    content: No one!
  '5':
  - type: text
    content: A person’s days are determined;
  - type: text
    content: you have decreed the number of his months
  - type: text
    content: and have set limits he cannot exceed.
  '6':
  - type: text
    content: So look away from him and let him alone,
  - type: text
    content: till he has put in his time like a hired laborer.
  '7':
  - type: text
    content: '“At least there is hope for a tree:'
  - type: text
    content: If it is cut down, it will sprout again,
  - type: text
    content: and its new shoots will not fail.
  '8':
  - type: text
    content: Its roots may grow old in the ground
  - type: text
    content: and its stump die in the soil,
  '9':
  - type: text
    content: yet at the scent of water it will bud
  - type: text
    content: and put forth shoots like a plant.
