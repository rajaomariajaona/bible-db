document_id: EZK.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezekiel’s Call to Be a Prophet
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: He said to me, “Son of man,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew phrase '
        - type: usfm
          marker: tl
          children:
          - type: text
            text: ben adam
        - type: text
          text: ' means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'human being. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The phrase '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son of man '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is retained as a form of address here and throughout Ezekiel because of its possible association with “Son of Man” in the New Testament.
      marker-yv: yv-n
    - type: text
      text: ' stand up on your feet and I will speak to you.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: which he unrolled before me. On both sides of it were written words of lament and mourning and woe.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: As he spoke, the Spirit came into me and raised me to my feet, and I heard him speaking to me.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He said: “Son of man, I am sending you to the Israelites, to a rebellious nation that has rebelled against me; they and their ancestors have been in revolt against me to this very day. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The people to whom I am sending you are obstinate and stubborn. Say to them, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says.’ '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And whether they listen or fail to listen—for they are a rebellious people—they will know that a prophet has been among them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And you, son of man, do not be afraid of them or their words. Do not be afraid, though briers and thorns are all around you and you live among scorpions. Do not be afraid of what they say or be terrified by them, though they are a rebellious people. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'You must speak my words to them, whether they listen or fail to listen, for they are rebellious. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But you, son of man, listen to what I say to you. Do not rebel like that rebellious people; open your mouth and eat what I give you.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then I looked, and I saw a hand stretched out to me. In it was a scroll, '
