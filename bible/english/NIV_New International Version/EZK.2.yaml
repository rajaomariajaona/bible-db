type_code: eng
verses:
  '1':
  - type: heading
    content: Ezekiel’s Call to Be a Prophet
  - type: text
    content: He said to me, “Son of man,
  - type: note
    content: The Hebrew phrase ben adam means human being. The phrase son of man is retained as a form of address here and throughout Ezekiel because of its possible association with “Son of Man” in the New Testament.
  - type: text
    content: ' stand up on your feet and I will speak to you.” '
  '10':
  - type: text
    content: which he unrolled before me. On both sides of it were written words of lament and mourning and woe.
  '2':
  - type: text
    content: As he spoke, the Spirit came into me and raised me to my feet, and I heard him speaking to me.
  '3':
  - type: text
    content: 'He said: “Son of man, I am sending you to the Israelites, to a rebellious nation that has rebelled against me; they and their ancestors have been in revolt against me to this very day. '
  '4':
  - type: text
    content: 'The people to whom I am sending you are obstinate and stubborn. Say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says.’ '
  '5':
  - type: text
    content: 'And whether they listen or fail to listen—for they are a rebellious people—they will know that a prophet has been among them. '
  '6':
  - type: text
    content: 'And you, son of man, do not be afraid of them or their words. Do not be afraid, though briers and thorns are all around you and you live among scorpions. Do not be afraid of what they say or be terrified by them, though they are a rebellious people. '
  '7':
  - type: text
    content: 'You must speak my words to them, whether they listen or fail to listen, for they are rebellious. '
  '8':
  - type: text
    content: But you, son of man, listen to what I say to you. Do not rebel like that rebellious people; open your mouth and eat what I give you.”
  '9':
  - type: text
    content: 'Then I looked, and I saw a hand stretched out to me. In it was a scroll, '
