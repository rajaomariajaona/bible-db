document_id: JHN.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Good Shepherd and His Sheep
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Very truly I tell you Pharisees, anyone who does not enter the sheep pen by the gate, but climbs in by some other way, is a thief and a robber.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The thief comes only to steal and kill and destroy; I have come that they may have life, and have it to the full.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am the good shepherd. The good shepherd lays down his life for the sheep.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The hired hand is not the shepherd and does not own the sheep. So when he sees the wolf coming, he abandons the sheep and runs away. Then the wolf attacks the flock and scatters it.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The man runs away because he is a hired hand and cares nothing for the sheep.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am the good shepherd; I know my sheep and my sheep know me—
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: just as the Father knows me and I know the Father—and I lay down my life for the sheep.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have other sheep that are not of this sheep pen. I must bring them also. They too will listen to my voice, and there shall be one flock and one shepherd.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The reason my Father loves me is that I lay down my life—only to take it up again.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: No one takes it from me, but I lay it down of my own accord. I have authority to lay it down and authority to take it up again. This command I received from my Father.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Jews who heard these words were again divided. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The one who enters by the gate is the shepherd of the sheep.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Many of them said, “He is demon-possessed and raving mad. Why listen to him?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But others said, “These are not the sayings of a man possessed by a demon. Can a demon open the eyes of the blind?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Further Conflict Over Jesus’ Claims
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then came the Festival of Dedication
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Hanukkah
      marker-yv: yv-n
    - type: text
      text: ' at Jerusalem. It was winter, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jesus was in the temple courts walking in Solomon’s Colonnade. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Jews who were there gathered around him, saying, “How long will you keep us in suspense? If you are the Messiah, tell us plainly.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I did tell you, but you do not believe. The works I do in my Father’s name testify about me,
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but you do not believe because you are not my sheep.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My sheep listen to my voice; I know them, and they follow me.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I give them eternal life, and they shall never perish; no one will snatch them out of my hand.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My Father, who has given them to me, is greater than all
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many early manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: What my Father has given me is greater than all
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ; no one can snatch them out of my Father’s hand.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The gatekeeper opens the gate for him, and the sheep listen to his voice. He calls his own sheep by name and leads them out.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I and the Father are one.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again his Jewish opponents picked up stones to stone him, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have shown you many good works from the Father. For which of these do you stone me?”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We are not stoning you for any good work,” they replied, “but for blasphemy, because you, a mere man, claim to be God.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Is it not written in your Law, ‘I have said you are “gods” ’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 82:6
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '?'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If he called them ‘gods,’ to whom the word of God came—and Scripture cannot be set aside—
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: what about the one whom the Father set apart as his very own and sent into the world? Why then do you accuse me of blasphemy because I said, ‘I am God’s Son’?
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do not believe me unless I do the works of my Father.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But if I do them, even though you do not believe me, believe the works, that you may know and understand that the Father is in me, and I in the Father.”
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again they tried to seize him, but he escaped their grasp.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When he has brought out all his own, he goes on ahead of them, and his sheep follow him because they know his voice.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus went back across the Jordan to the place where John had been baptizing in the early days. There he stayed, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and many people came to him. They said, “Though John never performed a sign, all that John said about this man was true.” '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And in that place many believed in Jesus.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But they will never follow a stranger; in fact, they will run away from him because they do not recognize a stranger’s voice.”
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus used this figure of speech, but the Pharisees did not understand what he was telling them.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore Jesus said again, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Very truly I tell you, I am the gate for the sheep.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All who have come before me are thieves and robbers, but the sheep have not listened to them.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am the gate; whoever enters through me will be saved.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: kept safe
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They will come in and go out, and find pasture.
    - type: text
      text: ' '
