document_id: JHN.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Good Shepherd and His Sheep
  - type: text
    content: ' '
  - type: text
    content: “Very truly I tell you Pharisees, anyone who does not enter the sheep pen by the gate, but climbs in by some other way, is a thief and a robber.
  - type: text
    content: ' '
  '10':
  - type: text
    content: The thief comes only to steal and kill and destroy; I have come that they may have life, and have it to the full.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “I am the good shepherd. The good shepherd lays down his life for the sheep.
  - type: text
    content: ' '
  '12':
  - type: text
    content: The hired hand is not the shepherd and does not own the sheep. So when he sees the wolf coming, he abandons the sheep and runs away. Then the wolf attacks the flock and scatters it.
  - type: text
    content: ' '
  '13':
  - type: text
    content: The man runs away because he is a hired hand and cares nothing for the sheep.
  '14':
  - type: text
    content: ' '
  - type: text
    content: “I am the good shepherd; I know my sheep and my sheep know me—
  - type: text
    content: ' '
  '15':
  - type: text
    content: just as the Father knows me and I know the Father—and I lay down my life for the sheep.
  - type: text
    content: ' '
  '16':
  - type: text
    content: I have other sheep that are not of this sheep pen. I must bring them also. They too will listen to my voice, and there shall be one flock and one shepherd.
  - type: text
    content: ' '
  '17':
  - type: text
    content: The reason my Father loves me is that I lay down my life—only to take it up again.
  - type: text
    content: ' '
  '18':
  - type: text
    content: No one takes it from me, but I lay it down of my own accord. I have authority to lay it down and authority to take it up again. This command I received from my Father.”
  '19':
  - type: text
    content: 'The Jews who heard these words were again divided. '
  '2':
  - type: text
    content: The one who enters by the gate is the shepherd of the sheep.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Many of them said, “He is demon-possessed and raving mad. Why listen to him?”
  '21':
  - type: text
    content: But others said, “These are not the sayings of a man possessed by a demon. Can a demon open the eyes of the blind?”
  - type: heading
    content: Further Conflict Over Jesus’ Claims
  '22':
  - type: text
    content: Then came the Festival of Dedication
  - type: note
    content: That is, Hanukkah
  - type: text
    content: ' at Jerusalem. It was winter, '
  '23':
  - type: text
    content: 'and Jesus was in the temple courts walking in Solomon’s Colonnade. '
  '24':
  - type: text
    content: The Jews who were there gathered around him, saying, “How long will you keep us in suspense? If you are the Messiah, tell us plainly.”
  '25':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “I did tell you, but you do not believe. The works I do in my Father’s name testify about me,
  - type: text
    content: ' '
  '26':
  - type: text
    content: but you do not believe because you are not my sheep.
  - type: text
    content: ' '
  '27':
  - type: text
    content: My sheep listen to my voice; I know them, and they follow me.
  - type: text
    content: ' '
  '28':
  - type: text
    content: I give them eternal life, and they shall never perish; no one will snatch them out of my hand.
  - type: text
    content: ' '
  '29':
  - type: text
    content: My Father, who has given them to me, is greater than all
  - type: note
    content: Many early manuscripts What my Father has given me is greater than all
  - type: text
    content: ; no one can snatch them out of my Father’s hand.
  - type: text
    content: ' '
  '3':
  - type: text
    content: The gatekeeper opens the gate for him, and the sheep listen to his voice. He calls his own sheep by name and leads them out.
  - type: text
    content: ' '
  '30':
  - type: text
    content: I and the Father are one.”
  '31':
  - type: text
    content: 'Again his Jewish opponents picked up stones to stone him, '
  '32':
  - type: text
    content: 'but Jesus said to them, '
  - type: text
    content: “I have shown you many good works from the Father. For which of these do you stone me?”
  '33':
  - type: text
    content: “We are not stoning you for any good work,” they replied, “but for blasphemy, because you, a mere man, claim to be God.”
  '34':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “Is it not written in your Law, ‘I have said you are “gods” ’
  - type: note
    content: Psalm 82:6
  - type: text
    content: '?'
  - type: text
    content: ' '
  '35':
  - type: text
    content: If he called them ‘gods,’ to whom the word of God came—and Scripture cannot be set aside—
  - type: text
    content: ' '
  '36':
  - type: text
    content: what about the one whom the Father set apart as his very own and sent into the world? Why then do you accuse me of blasphemy because I said, ‘I am God’s Son’?
  - type: text
    content: ' '
  '37':
  - type: text
    content: Do not believe me unless I do the works of my Father.
  - type: text
    content: ' '
  '38':
  - type: text
    content: But if I do them, even though you do not believe me, believe the works, that you may know and understand that the Father is in me, and I in the Father.”
  - type: text
    content: ' '
  '39':
  - type: text
    content: Again they tried to seize him, but he escaped their grasp.
  '4':
  - type: text
    content: When he has brought out all his own, he goes on ahead of them, and his sheep follow him because they know his voice.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Then Jesus went back across the Jordan to the place where John had been baptizing in the early days. There he stayed, '
  '41':
  - type: text
    content: 'and many people came to him. They said, “Though John never performed a sign, all that John said about this man was true.” '
  '42':
  - type: text
    content: And in that place many believed in Jesus.
  '5':
  - type: text
    content: But they will never follow a stranger; in fact, they will run away from him because they do not recognize a stranger’s voice.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: Jesus used this figure of speech, but the Pharisees did not understand what he was telling them.
  '7':
  - type: text
    content: 'Therefore Jesus said again, '
  - type: text
    content: “Very truly I tell you, I am the gate for the sheep.
  - type: text
    content: ' '
  '8':
  - type: text
    content: All who have come before me are thieves and robbers, but the sheep have not listened to them.
  - type: text
    content: ' '
  '9':
  - type: text
    content: I am the gate; whoever enters through me will be saved.
  - type: note
    content: Or kept safe
  - type: text
    content: ' '
  - type: text
    content: They will come in and go out, and find pasture.
  - type: text
    content: ' '
