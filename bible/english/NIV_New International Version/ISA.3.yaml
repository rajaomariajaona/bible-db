document_id: ISA.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment on Jerusalem and Judah
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See now, the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is about to take from Jerusalem and Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'both supply and support:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all supplies of food and all supplies of water,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell the righteous it will be well with them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they will enjoy the fruit of their deeds.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to the wicked!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Disaster is upon them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be paid back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for what their hands have done.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Youths oppress my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: women rule over them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My people, your guides lead you astray;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they turn you from the path.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes his place in court;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he rises to judge the people.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' enters into judgment'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'against the elders and leaders of his people:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “It is you who have ruined my vineyard;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the plunder from the poor is in your houses.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What do you mean by crushing my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and grinding the faces of the poor?”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “The women of Zion are haughty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: walking along with outstretched necks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flirting with their eyes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: strutting along with swaying hips,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with ornaments jingling on their ankles.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore the Lord will bring sores on the heads of the women of Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will make their scalps bald.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day the Lord will snatch away their finery: the bangles and headbands and crescent necklaces, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the earrings and bracelets and veils, '
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hero and the warrior,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the judge and the prophet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the diviner and the elder,
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the headdresses and anklets and sashes, the perfume bottles and charms, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the signet rings and nose rings, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the fine robes and the capes and cloaks, the purses '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and mirrors, and the linen garments and tiaras and shawls.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead of fragrance there will be a stench;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: instead of a sash, a rope;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: instead of well-dressed hair, baldness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: instead of fine clothing, sackcloth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: instead of beauty, branding.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your men will fall by the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your warriors in battle.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The gates of Zion will lament and mourn;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destitute, she will sit on the ground.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the captain of fifty and the man of rank,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the counselor, skilled craftsman and clever enchanter.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will make mere youths their officials;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: children will rule over them.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will oppress each other—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: man against man, neighbor against neighbor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young will rise up against the old,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the nobody against the honored.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man will seize one of his brothers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in his father’s house, and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have a cloak, you be our leader;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take charge of this heap of ruins!”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But in that day he will cry out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I have no remedy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have no food or clothing in my house;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not make me the leader of the people.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem staggers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah is falling;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'their words and deeds are against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: defying his glorious presence.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The look on their faces testifies against them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they parade their sin like Sodom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they do not hide it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to them!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They have brought disaster upon themselves.
