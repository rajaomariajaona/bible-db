document_id: ISA.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on Jerusalem and Judah
  - type: text
    content: See now, the Lord,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: is about to take from Jerusalem and Judah
  - type: text
    content: 'both supply and support:'
  - type: text
    content: all supplies of food and all supplies of water,
  '10':
  - type: text
    content: Tell the righteous it will be well with them,
  - type: text
    content: for they will enjoy the fruit of their deeds.
  '11':
  - type: text
    content: Woe to the wicked!
  - type: text
    content: Disaster is upon them!
  - type: text
    content: They will be paid back
  - type: text
    content: for what their hands have done.
  '12':
  - type: text
    content: Youths oppress my people,
  - type: text
    content: women rule over them.
  - type: text
    content: My people, your guides lead you astray;
  - type: text
    content: they turn you from the path.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' takes his place in court;'
  - type: text
    content: he rises to judge the people.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' enters into judgment'
  - type: text
    content: 'against the elders and leaders of his people:'
  - type: text
    content: “It is you who have ruined my vineyard;
  - type: text
    content: the plunder from the poor is in your houses.
  '15':
  - type: text
    content: What do you mean by crushing my people
  - type: text
    content: and grinding the faces of the poor?”
  - type: text
    content: 'declares the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: text
    content: “The women of Zion are haughty,
  - type: text
    content: walking along with outstretched necks,
  - type: text
    content: flirting with their eyes,
  - type: text
    content: strutting along with swaying hips,
  - type: text
    content: with ornaments jingling on their ankles.
  '17':
  - type: text
    content: Therefore the Lord will bring sores on the heads of the women of Zion;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will make their scalps bald.”'
  '18':
  - type: text
    content: 'In that day the Lord will snatch away their finery: the bangles and headbands and crescent necklaces, '
  '19':
  - type: text
    content: 'the earrings and bracelets and veils, '
  '2':
  - type: text
    content: the hero and the warrior,
  - type: text
    content: the judge and the prophet,
  - type: text
    content: the diviner and the elder,
  '20':
  - type: text
    content: 'the headdresses and anklets and sashes, the perfume bottles and charms, '
  '21':
  - type: text
    content: 'the signet rings and nose rings, '
  '22':
  - type: text
    content: 'the fine robes and the capes and cloaks, the purses '
  '23':
  - type: text
    content: and mirrors, and the linen garments and tiaras and shawls.
  '24':
  - type: text
    content: Instead of fragrance there will be a stench;
  - type: text
    content: instead of a sash, a rope;
  - type: text
    content: instead of well-dressed hair, baldness;
  - type: text
    content: instead of fine clothing, sackcloth;
  - type: text
    content: instead of beauty, branding.
  '25':
  - type: text
    content: Your men will fall by the sword,
  - type: text
    content: your warriors in battle.
  '26':
  - type: text
    content: The gates of Zion will lament and mourn;
  - type: text
    content: destitute, she will sit on the ground.
  '3':
  - type: text
    content: the captain of fifty and the man of rank,
  - type: text
    content: the counselor, skilled craftsman and clever enchanter.
  '4':
  - type: text
    content: “I will make mere youths their officials;
  - type: text
    content: children will rule over them.”
  '5':
  - type: text
    content: People will oppress each other—
  - type: text
    content: man against man, neighbor against neighbor.
  - type: text
    content: The young will rise up against the old,
  - type: text
    content: the nobody against the honored.
  '6':
  - type: text
    content: A man will seize one of his brothers
  - type: text
    content: in his father’s house, and say,
  - type: text
    content: “You have a cloak, you be our leader;
  - type: text
    content: take charge of this heap of ruins!”
  '7':
  - type: text
    content: But in that day he will cry out,
  - type: text
    content: “I have no remedy.
  - type: text
    content: I have no food or clothing in my house;
  - type: text
    content: do not make me the leader of the people.”
  '8':
  - type: text
    content: Jerusalem staggers,
  - type: text
    content: Judah is falling;
  - type: text
    content: 'their words and deeds are against the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: defying his glorious presence.
  '9':
  - type: text
    content: The look on their faces testifies against them;
  - type: text
    content: they parade their sin like Sodom;
  - type: text
    content: they do not hide it.
  - type: text
    content: Woe to them!
  - type: text
    content: They have brought disaster upon themselves.
