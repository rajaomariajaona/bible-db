document_id: NEH.8,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'all the people came together as one in the square before the Water Gate. They told Ezra the teacher of the Law to bring out the Book of the Law of Moses, which the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded for Israel.'
  '10':
  - type: text
    content: 'Nehemiah said, “Go and enjoy choice food and sweet drinks, and send some to those who have nothing prepared. This day is holy to our Lord. Do not grieve, for the joy of the '
  - type: text
    content: Lord
  - type: text
    content: ' is your strength.”'
  '11':
  - type: text
    content: The Levites calmed all the people, saying, “Be still, for this is a holy day. Do not grieve.”
  '12':
  - type: text
    content: Then all the people went away to eat and drink, to send portions of food and to celebrate with great joy, because they now understood the words that had been made known to them.
  '13':
  - type: text
    content: 'On the second day of the month, the heads of all the families, along with the priests and the Levites, gathered around Ezra the teacher to give attention to the words of the Law. '
  '14':
  - type: text
    content: 'They found written in the Law, which the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses, that the Israelites were to live in temporary shelters during the festival of the seventh month '
  '15':
  - type: text
    content: 'and that they should proclaim this word and spread it throughout their towns and in Jerusalem: “Go out into the hill country and bring back branches from olive and wild olive trees, and from myrtles, palms and shade trees, to make temporary shelters”—as it is written.'
  - type: note
    content: See Lev. 23:37-40.
  '16':
  - type: text
    content: 'So the people went out and brought back branches and built themselves temporary shelters on their own roofs, in their courtyards, in the courts of the house of God and in the square by the Water Gate and the one by the Gate of Ephraim. '
  '17':
  - type: text
    content: The whole company that had returned from exile built temporary shelters and lived in them. From the days of Joshua son of Nun until that day, the Israelites had not celebrated it like this. And their joy was very great.
  '18':
  - type: text
    content: Day after day, from the first day to the last, Ezra read from the Book of the Law of God. They celebrated the festival for seven days, and on the eighth day, in accordance with the regulation, there was an assembly.
  '2':
  - type: text
    content: 'So on the first day of the seventh month Ezra the priest brought the Law before the assembly, which was made up of men and women and all who were able to understand. '
  '3':
  - type: text
    content: He read it aloud from daybreak till noon as he faced the square before the Water Gate in the presence of the men, women and others who could understand. And all the people listened attentively to the Book of the Law.
  '4':
  - type: text
    content: Ezra the teacher of the Law stood on a high wooden platform built for the occasion. Beside him on his right stood Mattithiah, Shema, Anaiah, Uriah, Hilkiah and Maaseiah; and on his left were Pedaiah, Mishael, Malkijah, Hashum, Hashbaddanah, Zechariah and Meshullam.
  '5':
  - type: text
    content: 'Ezra opened the book. All the people could see him because he was standing above them; and as he opened it, the people all stood up. '
  '6':
  - type: text
    content: 'Ezra praised the '
  - type: text
    content: Lord
  - type: text
    content: ', the great God; and all the people lifted their hands and responded, “Amen! Amen!” Then they bowed down and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' with their faces to the ground.'
  '7':
  - type: text
    content: 'The Levites—Jeshua, Bani, Sherebiah, Jamin, Akkub, Shabbethai, Hodiah, Maaseiah, Kelita, Azariah, Jozabad, Hanan and Pelaiah—instructed the people in the Law while the people were standing there. '
  '8':
  - type: text
    content: They read from the Book of the Law of God, making it clear
  - type: note
    content: Or God, translating it
  - type: text
    content: ' and giving the meaning so that the people understood what was being read.'
  '9':
  - type: text
    content: 'Then Nehemiah the governor, Ezra the priest and teacher of the Law, and the Levites who were instructing the people said to them all, “This day is holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. Do not mourn or weep.” For all the people had been weeping as they listened to the words of the Law.'
