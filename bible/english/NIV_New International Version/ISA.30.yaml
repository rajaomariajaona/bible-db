document_id: ISA.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to the Obstinate Nation
  - type: text
    content: “Woe to the obstinate children,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “to those who carry out plans that are not mine,
  - type: text
    content: forming an alliance, but not by my Spirit,
  - type: text
    content: heaping sin upon sin;
  '10':
  - type: text
    content: They say to the seers,
  - type: text
    content: “See no more visions!”
  - type: text
    content: and to the prophets,
  - type: text
    content: “Give us no more visions of what is right!
  - type: text
    content: Tell us pleasant things,
  - type: text
    content: prophesy illusions.
  '11':
  - type: text
    content: Leave this way,
  - type: text
    content: get off this path,
  - type: text
    content: and stop confronting us
  - type: text
    content: with the Holy One of Israel!”
  '12':
  - type: text
    content: 'Therefore this is what the Holy One of Israel says:'
  - type: text
    content: “Because you have rejected this message,
  - type: text
    content: relied on oppression
  - type: text
    content: and depended on deceit,
  '13':
  - type: text
    content: this sin will become for you
  - type: text
    content: like a high wall, cracked and bulging,
  - type: text
    content: that collapses suddenly, in an instant.
  '14':
  - type: text
    content: It will break in pieces like pottery,
  - type: text
    content: shattered so mercilessly
  - type: text
    content: that among its pieces not a fragment will be found
  - type: text
    content: for taking coals from a hearth
  - type: text
    content: or scooping water out of a cistern.”
  '15':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', the Holy One of Israel, says:'
  - type: text
    content: “In repentance and rest is your salvation,
  - type: text
    content: in quietness and trust is your strength,
  - type: text
    content: but you would have none of it.
  '16':
  - type: text
    content: You said, ‘No, we will flee on horses.’
  - type: text
    content: Therefore you will flee!
  - type: text
    content: You said, ‘We will ride off on swift horses.’
  - type: text
    content: Therefore your pursuers will be swift!
  '17':
  - type: text
    content: A thousand will flee
  - type: text
    content: at the threat of one;
  - type: text
    content: at the threat of five
  - type: text
    content: you will all flee away,
  - type: text
    content: till you are left
  - type: text
    content: like a flagstaff on a mountaintop,
  - type: text
    content: like a banner on a hill.”
  '18':
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' longs to be gracious to you;'
  - type: text
    content: therefore he will rise up to show you compassion.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is a God of justice.'
  - type: text
    content: Blessed are all who wait for him!
  '19':
  - type: text
    content: 'People of Zion, who live in Jerusalem, you will weep no more. How gracious he will be when you cry for help! As soon as he hears, he will answer you. '
  '2':
  - type: text
    content: who go down to Egypt
  - type: text
    content: without consulting me;
  - type: text
    content: who look for help to Pharaoh’s protection,
  - type: text
    content: to Egypt’s shade for refuge.
  '20':
  - type: text
    content: 'Although the Lord gives you the bread of adversity and the water of affliction, your teachers will be hidden no more; with your own eyes you will see them. '
  '21':
  - type: text
    content: 'Whether you turn to the right or to the left, your ears will hear a voice behind you, saying, “This is the way; walk in it.” '
  '22':
  - type: text
    content: Then you will desecrate your idols overlaid with silver and your images covered with gold; you will throw them away like a menstrual cloth and say to them, “Away with you!”
  '23':
  - type: text
    content: 'He will also send you rain for the seed you sow in the ground, and the food that comes from the land will be rich and plentiful. In that day your cattle will graze in broad meadows. '
  '24':
  - type: text
    content: 'The oxen and donkeys that work the soil will eat fodder and mash, spread out with fork and shovel. '
  '25':
  - type: text
    content: 'In the day of great slaughter, when the towers fall, streams of water will flow on every high mountain and every lofty hill. '
  '26':
  - type: text
    content: 'The moon will shine like the sun, and the sunlight will be seven times brighter, like the light of seven full days, when the '
  - type: text
    content: Lord
  - type: text
    content: ' binds up the bruises of his people and heals the wounds he inflicted.'
  '27':
  - type: text
    content: 'See, the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ' comes from afar,'
  - type: text
    content: with burning anger and dense clouds of smoke;
  - type: text
    content: his lips are full of wrath,
  - type: text
    content: and his tongue is a consuming fire.
  '28':
  - type: text
    content: His breath is like a rushing torrent,
  - type: text
    content: rising up to the neck.
  - type: text
    content: He shakes the nations in the sieve of destruction;
  - type: text
    content: he places in the jaws of the peoples
  - type: text
    content: a bit that leads them astray.
  '29':
  - type: text
    content: And you will sing
  - type: text
    content: as on the night you celebrate a holy festival;
  - type: text
    content: your hearts will rejoice
  - type: text
    content: as when people playing pipes go up
  - type: text
    content: 'to the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: to the Rock of Israel.
  '3':
  - type: text
    content: But Pharaoh’s protection will be to your shame,
  - type: text
    content: Egypt’s shade will bring you disgrace.
  '30':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will cause people to hear his majestic voice'
  - type: text
    content: and will make them see his arm coming down
  - type: text
    content: with raging anger and consuming fire,
  - type: text
    content: with cloudburst, thunderstorm and hail.
  '31':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' will shatter Assyria;'
  - type: text
    content: with his rod he will strike them down.
  '32':
  - type: text
    content: 'Every stroke the '
  - type: text
    content: Lord
  - type: text
    content: ' lays on them'
  - type: text
    content: with his punishing club
  - type: text
    content: will be to the music of timbrels and harps,
  - type: text
    content: as he fights them in battle with the blows of his arm.
  '33':
  - type: text
    content: Topheth has long been prepared;
  - type: text
    content: it has been made ready for the king.
  - type: text
    content: Its fire pit has been made deep and wide,
  - type: text
    content: with an abundance of fire and wood;
  - type: text
    content: 'the breath of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: like a stream of burning sulfur,
  - type: text
    content: sets it ablaze.
  '4':
  - type: text
    content: Though they have officials in Zoan
  - type: text
    content: and their envoys have arrived in Hanes,
  '5':
  - type: text
    content: everyone will be put to shame
  - type: text
    content: because of a people useless to them,
  - type: text
    content: who bring neither help nor advantage,
  - type: text
    content: but only shame and disgrace.”
  '6':
  - type: text
    content: 'A prophecy concerning the animals of the Negev:'
  - type: text
    content: Through a land of hardship and distress,
  - type: text
    content: of lions and lionesses,
  - type: text
    content: of adders and darting snakes,
  - type: text
    content: the envoys carry their riches on donkeys’ backs,
  - type: text
    content: their treasures on the humps of camels,
  - type: text
    content: to that unprofitable nation,
  '7':
  - type: text
    content: to Egypt, whose help is utterly useless.
  - type: text
    content: Therefore I call her
  - type: text
    content: Rahab the Do-Nothing.
  '8':
  - type: text
    content: Go now, write it on a tablet for them,
  - type: text
    content: inscribe it on a scroll,
  - type: text
    content: that for the days to come
  - type: text
    content: it may be an everlasting witness.
  '9':
  - type: text
    content: For these are rebellious people, deceitful children,
  - type: text
    content: 'children unwilling to listen to the '
  - type: text
    content: Lord
  - type: text
    content: ’s instruction.
