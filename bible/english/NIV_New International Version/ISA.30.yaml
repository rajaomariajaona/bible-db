document_id: ISA.30,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Woe to the Obstinate Nation
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Woe to the obstinate children,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “to those who carry out plans that are not mine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forming an alliance, but not by my Spirit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: heaping sin upon sin;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They say to the seers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “See no more visions!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to the prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Give us no more visions of what is right!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell us pleasant things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prophesy illusions.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Leave this way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: get off this path,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and stop confronting us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the Holy One of Israel!”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore this is what the Holy One of Israel says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because you have rejected this message,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: relied on oppression
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and depended on deceit,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: this sin will become for you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a high wall, cracked and bulging,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that collapses suddenly, in an instant.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: It will break in pieces like pottery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shattered so mercilessly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that among its pieces not a fragment will be found
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for taking coals from a hearth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or scooping water out of a cistern.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the Holy One of Israel, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In repentance and rest is your salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in quietness and trust is your strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you would have none of it.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: You said, ‘No, we will flee on horses.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore you will flee!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You said, ‘We will ride off on swift horses.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore your pursuers will be swift!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: A thousand will flee
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the threat of one;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at the threat of five
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will all flee away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: till you are left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a flagstaff on a mountaintop,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a banner on a hill.”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Yet the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' longs to be gracious to you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore he will rise up to show you compassion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a God of justice.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Blessed are all who wait for him!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'People of Zion, who live in Jerusalem, you will weep no more. How gracious he will be when you cry for help! As soon as he hears, he will answer you. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: who go down to Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without consulting me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who look for help to Pharaoh’s protection,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to Egypt’s shade for refuge.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Although the Lord gives you the bread of adversity and the water of affliction, your teachers will be hidden no more; with your own eyes you will see them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Whether you turn to the right or to the left, your ears will hear a voice behind you, saying, “This is the way; walk in it.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Then you will desecrate your idols overlaid with silver and your images covered with gold; you will throw them away like a menstrual cloth and say to them, “Away with you!”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He will also send you rain for the seed you sow in the ground, and the food that comes from the land will be rich and plentiful. In that day your cattle will graze in broad meadows. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The oxen and donkeys that work the soil will eat fodder and mash, spread out with fork and shovel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'In the day of great slaughter, when the towers fall, streams of water will flow on every high mountain and every lofty hill. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The moon will shine like the sun, and the sunlight will be seven times brighter, like the light of seven full days, when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' binds up the bruises of his people and heals the wounds he inflicted.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'See, the Name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' comes from afar,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with burning anger and dense clouds of smoke;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his lips are full of wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his tongue is a consuming fire.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: His breath is like a rushing torrent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rising up to the neck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shakes the nations in the sieve of destruction;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he places in the jaws of the peoples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a bit that leads them astray.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: And you will sing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as on the night you celebrate a holy festival;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your hearts will rejoice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as when people playing pipes go up
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'to the mountain of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the Rock of Israel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But Pharaoh’s protection will be to your shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Egypt’s shade will bring you disgrace.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will cause people to hear his majestic voice'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will make them see his arm coming down
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with raging anger and consuming fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with cloudburst, thunderstorm and hail.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will shatter Assyria;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with his rod he will strike them down.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Every stroke the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lays on them'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with his punishing club
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be to the music of timbrels and harps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he fights them in battle with the blows of his arm.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Topheth has long been prepared;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it has been made ready for the king.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its fire pit has been made deep and wide,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with an abundance of fire and wood;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the breath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a stream of burning sulfur,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sets it ablaze.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Though they have officials in Zoan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their envoys have arrived in Hanes,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: everyone will be put to shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of a people useless to them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who bring neither help nor advantage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but only shame and disgrace.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'A prophecy concerning the animals of the Negev:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through a land of hardship and distress,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of lions and lionesses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of adders and darting snakes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the envoys carry their riches on donkeys’ backs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their treasures on the humps of camels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to that unprofitable nation,
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: to Egypt, whose help is utterly useless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I call her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rahab the Do-Nothing.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Go now, write it on a tablet for them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: inscribe it on a scroll,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that for the days to come
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it may be an everlasting witness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For these are rebellious people, deceitful children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'children unwilling to listen to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s instruction.
