document_id: PSA.87,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 87
  - type: text
    content: Of the Sons of Korah. A psalm. A song.
  - type: text
    content: He has founded his city on the holy mountain.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' loves the gates of Zion'
  - type: text
    content: more than all the other dwellings of Jacob.
  '3':
  - type: text
    content: Glorious things are said of you,
  - type: text
    content: 'city of God:'
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 6.
  '4':
  - type: text
    content: “I will record Rahab
  - type: note
    content: A poetic name for Egypt
  - type: text
    content: ' and Babylon'
  - type: text
    content: among those who acknowledge me—
  - type: text
    content: Philistia too, and Tyre, along with Cush
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: —
  - type: text
    content: and will say, ‘This one was born in Zion.’ ”
  - type: note
    content: 'Or “I will record concerning those who acknowledge me: / ‘This one was born in Zion.’ / Hear this, Rahab and Babylon, / and you too, Philistia, Tyre and Cush.”'
  '5':
  - type: text
    content: Indeed, of Zion it will be said,
  - type: text
    content: “This one and that one were born in her,
  - type: text
    content: and the Most High himself will establish her.”
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will write in the register of the peoples:'
  - type: text
    content: “This one was born in Zion.”
  '7':
  - type: text
    content: As they make music they will sing,
  - type: text
    content: “All my fountains are in you.”
