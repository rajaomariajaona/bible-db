document_id: ISA.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Cush
  - type: text
    content: Woe to the land of whirring wings
  - type: note
    content: Or of locusts
  - type: text
    content: along the rivers of Cush,
  - type: note
    content: That is, the upper Nile region
  '2':
  - type: text
    content: which sends envoys by sea
  - type: text
    content: in papyrus boats over the water.
  - type: text
    content: Go, swift messengers,
  - type: text
    content: to a people tall and smooth-skinned,
  - type: text
    content: to a people feared far and wide,
  - type: text
    content: an aggressive nation of strange speech,
  - type: text
    content: whose land is divided by rivers.
  '3':
  - type: text
    content: All you people of the world,
  - type: text
    content: you who live on the earth,
  - type: text
    content: when a banner is raised on the mountains,
  - type: text
    content: you will see it,
  - type: text
    content: and when a trumpet sounds,
  - type: text
    content: you will hear it.
  '4':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to me:'
  - type: text
    content: “I will remain quiet and will look on from my dwelling place,
  - type: text
    content: like shimmering heat in the sunshine,
  - type: text
    content: like a cloud of dew in the heat of harvest.”
  '5':
  - type: text
    content: For, before the harvest, when the blossom is gone
  - type: text
    content: and the flower becomes a ripening grape,
  - type: text
    content: he will cut off the shoots with pruning knives,
  - type: text
    content: and cut down and take away the spreading branches.
  '6':
  - type: text
    content: They will all be left to the mountain birds of prey
  - type: text
    content: and to the wild animals;
  - type: text
    content: the birds will feed on them all summer,
  - type: text
    content: the wild animals all winter.
  '7':
  - type: text
    content: 'At that time gifts will be brought to the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty'
  - type: text
    content: from a people tall and smooth-skinned,
  - type: text
    content: from a people feared far and wide,
  - type: text
    content: an aggressive nation of strange speech,
  - type: text
    content: whose land is divided by rivers—
  - type: text
    content: 'the gifts will be brought to Mount Zion, the place of the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
