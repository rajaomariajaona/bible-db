document_id: ISA.18,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Cush
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to the land of whirring wings
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of locusts
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along the rivers of Cush,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the upper Nile region
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: which sends envoys by sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in papyrus boats over the water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go, swift messengers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to a people tall and smooth-skinned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to a people feared far and wide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an aggressive nation of strange speech,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose land is divided by rivers.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All you people of the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who live on the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when a banner is raised on the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will see it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and when a trumpet sounds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will hear it.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will remain quiet and will look on from my dwelling place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like shimmering heat in the sunshine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a cloud of dew in the heat of harvest.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For, before the harvest, when the blossom is gone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the flower becomes a ripening grape,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will cut off the shoots with pruning knives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cut down and take away the spreading branches.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will all be left to the mountain birds of prey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the wild animals;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the birds will feed on them all summer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wild animals all winter.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time gifts will be brought to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from a people tall and smooth-skinned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from a people feared far and wide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an aggressive nation of strange speech,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose land is divided by rivers—
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'the gifts will be brought to Mount Zion, the place of the Name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
