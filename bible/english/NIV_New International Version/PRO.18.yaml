document_id: PRO.18,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: An unfriendly person pursues selfish ends
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and against all sound judgment starts quarrels.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a fortified tower;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the righteous run to it and are safe.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The wealth of the rich is their fortified city;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they imagine it a wall too high to scale.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Before a downfall the heart is haughty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but humility comes before honor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: To answer before listening—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that is folly and shame.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The human spirit can endure in sickness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a crushed spirit who can bear?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The heart of the discerning acquires knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the ears of the wise seek it out.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: A gift opens the way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ushers the giver into the presence of the great.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: In a lawsuit the first to speak seems right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until someone comes forward and cross-examines.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Casting the lot settles disputes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keeps strong opponents apart.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: A brother wronged is more unyielding than a fortified city;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: disputes are like the barred gates of a citadel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fools find no pleasure in understanding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but delight in airing their own opinions.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: From the fruit of their mouth a person’s stomach is filled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the harvest of their lips they are satisfied.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The tongue has the power of life and death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who love it will eat its fruit.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: He who finds a wife finds what is good
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and receives favor from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The poor plead for mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the rich answer harshly.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: One who has unreliable friends soon comes to ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but there is a friend who sticks closer than a brother.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When wickedness comes, so does contempt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with shame comes reproach.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The words of the mouth are deep waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the fountain of wisdom is a rushing stream.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: It is not good to be partial to the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so deprive the innocent of justice.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The lips of fools bring them strife,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their mouths invite a beating.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The mouths of fools are their undoing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their lips are a snare to their very lives.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The words of a gossip are like choice morsels;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they go down to the inmost parts.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: One who is slack in his work
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is brother to one who destroys.
