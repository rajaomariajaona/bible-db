document_id: PRO.18,111
type_code: eng
verses:
  '1':
  - type: text
    content: An unfriendly person pursues selfish ends
  - type: text
    content: and against all sound judgment starts quarrels.
  '10':
  - type: text
    content: 'The name of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a fortified tower;'
  - type: text
    content: the righteous run to it and are safe.
  '11':
  - type: text
    content: The wealth of the rich is their fortified city;
  - type: text
    content: they imagine it a wall too high to scale.
  '12':
  - type: text
    content: Before a downfall the heart is haughty,
  - type: text
    content: but humility comes before honor.
  '13':
  - type: text
    content: To answer before listening—
  - type: text
    content: that is folly and shame.
  '14':
  - type: text
    content: The human spirit can endure in sickness,
  - type: text
    content: but a crushed spirit who can bear?
  '15':
  - type: text
    content: The heart of the discerning acquires knowledge,
  - type: text
    content: for the ears of the wise seek it out.
  '16':
  - type: text
    content: A gift opens the way
  - type: text
    content: and ushers the giver into the presence of the great.
  '17':
  - type: text
    content: In a lawsuit the first to speak seems right,
  - type: text
    content: until someone comes forward and cross-examines.
  '18':
  - type: text
    content: Casting the lot settles disputes
  - type: text
    content: and keeps strong opponents apart.
  '19':
  - type: text
    content: A brother wronged is more unyielding than a fortified city;
  - type: text
    content: disputes are like the barred gates of a citadel.
  '2':
  - type: text
    content: Fools find no pleasure in understanding
  - type: text
    content: but delight in airing their own opinions.
  '20':
  - type: text
    content: From the fruit of their mouth a person’s stomach is filled;
  - type: text
    content: with the harvest of their lips they are satisfied.
  '21':
  - type: text
    content: The tongue has the power of life and death,
  - type: text
    content: and those who love it will eat its fruit.
  '22':
  - type: text
    content: He who finds a wife finds what is good
  - type: text
    content: 'and receives favor from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: The poor plead for mercy,
  - type: text
    content: but the rich answer harshly.
  '24':
  - type: text
    content: One who has unreliable friends soon comes to ruin,
  - type: text
    content: but there is a friend who sticks closer than a brother.
  '3':
  - type: text
    content: When wickedness comes, so does contempt,
  - type: text
    content: and with shame comes reproach.
  '4':
  - type: text
    content: The words of the mouth are deep waters,
  - type: text
    content: but the fountain of wisdom is a rushing stream.
  '5':
  - type: text
    content: It is not good to be partial to the wicked
  - type: text
    content: and so deprive the innocent of justice.
  '6':
  - type: text
    content: The lips of fools bring them strife,
  - type: text
    content: and their mouths invite a beating.
  '7':
  - type: text
    content: The mouths of fools are their undoing,
  - type: text
    content: and their lips are a snare to their very lives.
  '8':
  - type: text
    content: The words of a gossip are like choice morsels;
  - type: text
    content: they go down to the inmost parts.
  '9':
  - type: text
    content: One who is slack in his work
  - type: text
    content: is brother to one who destroys.
