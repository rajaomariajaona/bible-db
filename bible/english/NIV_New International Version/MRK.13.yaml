verses:
  '1':
  - type: heading
    content: The Destruction of the Temple and Signs of the End Times
  - type: text
    content: As Jesus was leaving the temple, one of his disciples said to him, “Look, Teacher! What massive stones! What magnificent buildings!”
  '10':
  - type: text
    content: And the gospel must first be preached to all nations.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Whenever you are arrested and brought to trial, do not worry beforehand about what to say. Just say whatever is given you at the time, for it is not you speaking, but the Holy Spirit.
  '12':
  - type: text
    content: ' '
  - type: text
    content: “Brother will betray brother to death, and a father his child. Children will rebel against their parents and have them put to death.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Everyone will hate you because of me, but the one who stands firm to the end will be saved.
  '14':
  - type: text
    content: ' '
  - type: text
    content: “When you see ‘the abomination that causes desolation’
  - type: text
    content: ' '
  - type: note
    content: Daniel 9:27; 11:31; 12:11
  - type: text
    content: standing where it
  - type: note
    content: Or he
  - type: text
    content: ' '
  - type: text
    content: does not belong—let the reader understand—then let those who are in Judea flee to the mountains.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Let no one on the housetop go down or enter the house to take anything out.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Let no one in the field go back to get their cloak.
  - type: text
    content: ' '
  '17':
  - type: text
    content: How dreadful it will be in those days for pregnant women and nursing mothers!
  - type: text
    content: ' '
  '18':
  - type: text
    content: Pray that this will not take place in winter,
  - type: text
    content: ' '
  '19':
  - type: text
    content: because those will be days of distress unequaled from the beginning, when God created the world, until now—and never to be equaled again.
  '2':
  - type: text
    content: ' '
  - type: text
    content: “Do you see all these great buildings?”
  - type: text
    content: ' replied Jesus. '
  - type: text
    content: “Not one stone here will be left on another; every one will be thrown down.”
  '20':
  - type: text
    content: ' '
  - type: text
    content: “If the Lord had not cut short those days, no one would survive. But for the sake of the elect, whom he has chosen, he has shortened them.
  - type: text
    content: ' '
  '21':
  - type: text
    content: At that time if anyone says to you, ‘Look, here is the Messiah!’ or, ‘Look, there he is!’ do not believe it.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For false messiahs and false prophets will appear and perform signs and wonders to deceive, if possible, even the elect.
  - type: text
    content: ' '
  '23':
  - type: text
    content: So be on your guard; I have told you everything ahead of time.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “But in those days, following that distress,
  - type: text
    content: “ ‘the sun will be darkened,
  - type: text
    content: and the moon will not give its light;
  '25':
  - type: text
    content: ' '
  - type: text
    content: the stars will fall from the sky,
  - type: text
    content: and the heavenly bodies will be shaken.’
  - type: note
    content: Isaiah 13:10; 34:4
  '26':
  - type: text
    content: ' '
  - type: text
    content: “At that time people will see the Son of Man coming in clouds with great power and glory.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And he will send his angels and gather his elect from the four winds, from the ends of the earth to the ends of the heavens.
  '28':
  - type: text
    content: ' '
  - type: text
    content: '“Now learn this lesson from the fig tree: As soon as its twigs get tender and its leaves come out, you know that summer is near.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: Even so, when you see these things happening, you know that it
  - type: note
    content: Or he
  - type: text
    content: ' '
  - type: text
    content: is near, right at the door.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'As Jesus was sitting on the Mount of Olives opposite the temple, Peter, James, John and Andrew asked him privately, '
  '30':
  - type: text
    content: Truly I tell you, this generation will certainly not pass away until all these things have happened.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Heaven and earth will pass away, but my words will never pass away.
  - type: heading
    content: The Day and Hour Unknown
  '32':
  - type: text
    content: ' '
  - type: text
    content: “But about that day or hour no one knows, not even the angels in heaven, nor the Son, but only the Father.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Be on guard! Be alert
  - type: note
    content: Some manuscripts alert and pray
  - type: text
    content: '! You do not know when that time will come.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'It’s like a man going away: He leaves his house and puts his servants in charge, each with their assigned task, and tells the one at the door to keep watch.'
  '35':
  - type: text
    content: ' '
  - type: text
    content: “Therefore keep watch because you do not know when the owner of the house will come back—whether in the evening, or at midnight, or when the rooster crows, or at dawn.
  - type: text
    content: ' '
  '36':
  - type: text
    content: If he comes suddenly, do not let him find you sleeping.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'What I say to you, I say to everyone: ‘Watch!’ ”'
  '4':
  - type: text
    content: “Tell us, when will these things happen? And what will be the sign that they are all about to be fulfilled?”
  '5':
  - type: text
    content: 'Jesus said to them: '
  - type: text
    content: “Watch out that no one deceives you.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Many will come in my name, claiming, ‘I am he,’ and will deceive many.
  - type: text
    content: ' '
  '7':
  - type: text
    content: When you hear of wars and rumors of wars, do not be alarmed. Such things must happen, but the end is still to come.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Nation will rise against nation, and kingdom against kingdom. There will be earthquakes in various places, and famines. These are the beginning of birth pains.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “You must be on your guard. You will be handed over to the local councils and flogged in the synagogues. On account of me you will stand before governors and kings as witnesses to them.
  - type: text
    content: ' '
