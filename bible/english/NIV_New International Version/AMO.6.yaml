document_id: AMO.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to the Complacent
  - type: text
    content: Woe to you who are complacent in Zion,
  - type: text
    content: and to you who feel secure on Mount Samaria,
  - type: text
    content: you notable men of the foremost nation,
  - type: text
    content: to whom the people of Israel come!
  '10':
  - type: text
    content: And if the relative who comes to carry the bodies out of the house to burn them
  - type: note
    content: Or to make a funeral fire in honor of the dead
  - type: text
    content: ' asks anyone who might be hiding there, “Is anyone else with you?” and he says, “No,” then he will go on to say, “Hush! We must not mention the name of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '11':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has given the command,'
  - type: text
    content: and he will smash the great house into pieces
  - type: text
    content: and the small house into bits.
  '12':
  - type: text
    content: Do horses run on the rocky crags?
  - type: text
    content: Does one plow the sea
  - type: note
    content: With a different word division of the Hebrew; Masoretic Text plow there
  - type: text
    content: ' with oxen?'
  - type: text
    content: But you have turned justice into poison
  - type: text
    content: and the fruit of righteousness into bitterness—
  '13':
  - type: text
    content: you who rejoice in the conquest of Lo Debar
  - type: note
    content: Lo Debar means nothing.
  - type: text
    content: and say, “Did we not take Karnaim
  - type: note
    content: Karnaim means horns; horn here symbolizes strength.
  - type: text
    content: ' by our own strength?”'
  '14':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty declares,'
  - type: text
    content: “I will stir up a nation against you, Israel,
  - type: text
    content: that will oppress you all the way
  - type: text
    content: from Lebo Hamath to the valley of the Arabah.”
  '2':
  - type: text
    content: Go to Kalneh and look at it;
  - type: text
    content: go from there to great Hamath,
  - type: text
    content: and then go down to Gath in Philistia.
  - type: text
    content: Are they better off than your two kingdoms?
  - type: text
    content: Is their land larger than yours?
  '3':
  - type: text
    content: You put off the day of disaster
  - type: text
    content: and bring near a reign of terror.
  '4':
  - type: text
    content: You lie on beds adorned with ivory
  - type: text
    content: and lounge on your couches.
  - type: text
    content: You dine on choice lambs
  - type: text
    content: and fattened calves.
  '5':
  - type: text
    content: You strum away on your harps like David
  - type: text
    content: and improvise on musical instruments.
  '6':
  - type: text
    content: You drink wine by the bowlful
  - type: text
    content: and use the finest lotions,
  - type: text
    content: but you do not grieve over the ruin of Joseph.
  '7':
  - type: text
    content: Therefore you will be among the first to go into exile;
  - type: text
    content: your feasting and lounging will end.
  - type: heading
    content: The Lord Abhors the Pride of Israel
  '8':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn by himself—the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty declares:'
  - type: text
    content: “I abhor the pride of Jacob
  - type: text
    content: and detest his fortresses;
  - type: text
    content: I will deliver up the city
  - type: text
    content: and everything in it.”
  '9':
  - type: text
    content: 'If ten people are left in one house, they too will die. '
