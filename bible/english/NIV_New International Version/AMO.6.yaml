document_id: AMO.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Woe to the Complacent
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe to you who are complacent in Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to you who feel secure on Mount Samaria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you notable men of the foremost nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to whom the people of Israel come!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Go to Kalneh and look at it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: go from there to great Hamath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and then go down to Gath in Philistia.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are they better off than your two kingdoms?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is their land larger than yours?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You put off the day of disaster
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring near a reign of terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You lie on beds adorned with ivory
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lounge on your couches.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You dine on choice lambs
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fattened calves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You strum away on your harps like David
- type: usfm
  marker: q2
  children:
  - type: text
    text: and improvise on musical instruments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You drink wine by the bowlful
- type: usfm
  marker: q2
  children:
  - type: text
    text: and use the finest lotions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you do not grieve over the ruin of Joseph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Therefore you will be among the first to go into exile;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your feasting and lounging will end.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Abhors the Pride of Israel'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has sworn by himself—the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God Almighty declares:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I abhor the pride of Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: and detest his fortresses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will deliver up the city
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everything in it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If ten people are left in one house, they too will die. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And if the relative who comes to carry the bodies out of the house to burn them
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to make a funeral fire in honor of the dead
    marker-yv: yv-n
  - type: text
    text: ' asks anyone who might be hiding there, “Is anyone else with you?” and he says, “No,” then he will go on to say, “Hush! We must not mention the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given the command,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will smash the great house into pieces
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the small house into bits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Do horses run on the rocky crags?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does one plow the sea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'With a different word division of the Hebrew; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: plow there
    marker-yv: yv-n
  - type: text
    text: ' with oxen?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you have turned justice into poison
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fruit of righteousness into bitterness—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: you who rejoice in the conquest of Lo Debar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lo Debar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nothing.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and say, “Did we not take Karnaim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Karnaim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: horns
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'horn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: here symbolizes strength.
    marker-yv: yv-n
  - type: text
    text: ' by our own strength?”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God Almighty declares,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I will stir up a nation against you, Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: that will oppress you all the way
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Lebo Hamath to the valley of the Arabah.”
