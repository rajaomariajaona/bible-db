document_id: LUK.13,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Repent or Perish
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there were some present at that time who told Jesus about the Galileans whose blood Pilate had mixed with their sacrifices. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On a Sabbath Jesus was teaching in one of the synagogues, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and a woman was there who had been crippled by a spirit for eighteen years. She was bent over and could not straighten up at all. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus saw her, he called her forward and said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Woman, you are set free from your infirmity.”
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he put his hands on her, and immediately she straightened up and praised God.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indignant because Jesus had healed on the Sabbath, the synagogue leader said to the people, “There are six days for work. So come and be healed on those days, not on the Sabbath.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Lord answered him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You hypocrites! Doesn’t each of you on the Sabbath untie your ox or donkey from the stall and lead it out to give it water?
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then should not this woman, a daughter of Abraham, whom Satan has kept bound for eighteen long years, be set free on the Sabbath day from what bound her?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he said this, all his opponents were humiliated, but the people were delighted with all the wonderful things he was doing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parables of the Mustard Seed and the Yeast
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What is the kingdom of God like? What shall I compare it to?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is like a mustard seed, which a man took and planted in his garden. It grew and became a tree, and the birds perched in its branches.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you think that these Galileans were worse sinners than all the other Galileans because they suffered this way?
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again he asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What shall I compare the kingdom of God to?
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is like yeast that a woman took and mixed into about sixty pounds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or about 27 kilograms
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: of flour until it worked all through the dough.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Narrow Door
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus went through the towns and villages, teaching as he made his way to Jerusalem. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Someone asked him, “Lord, are only a few people going to be saved?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Make every effort to enter through the narrow door, because many, I tell you, will try to enter and will not be able to.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Once the owner of the house gets up and closes the door, you will stand outside knocking and pleading, ‘Sir, open the door for us.’
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But he will answer, ‘I don’t know you or where you come from.’
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then you will say, ‘We ate and drank with you, and you taught in our streets.’
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But he will reply, ‘I don’t know you or where you come from. Away from me, all you evildoers!’
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There will be weeping there, and gnashing of teeth, when you see Abraham, Isaac and Jacob and all the prophets in the kingdom of God, but you yourselves thrown out.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: People will come from east and west and north and south, and will take their places at the feast in the kingdom of God.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, no! But unless you repent, you too will all perish.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Indeed there are those who are last who will be first, and first who will be last.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Sorrow for Jerusalem
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At that time some Pharisees came to Jesus and said to him, “Leave this place and go somewhere else. Herod wants to kill you.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go tell that fox, ‘I will keep on driving out demons and healing people today and tomorrow, and on the third day I will reach my goal.’
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In any case, I must press on today and tomorrow and the next day—for surely no prophet can die outside Jerusalem!
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Jerusalem, Jerusalem, you who kill the prophets and stone those sent to you, how often I have longed to gather your children together, as a hen gathers her chicks under her wings, and you were not willing.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Look, your house is left to you desolate. I tell you, you will not see me again until you say, ‘Blessed is he who comes in the name of the Lord.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 118:26
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or those eighteen who died when the tower in Siloam fell on them—do you think they were more guilty than all the others living in Jerusalem?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, no! But unless you repent, you too will all perish.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he told this parable: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A man had a fig tree growing in his vineyard, and he went to look for fruit on it but did not find any.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So he said to the man who took care of the vineyard, ‘For three years now I’ve been coming to look for fruit on this fig tree and haven’t found any. Cut it down! Why should it use up the soil?’
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “ ‘Sir,’ the man replied, ‘leave it alone for one more year, and I’ll dig around it and fertilize it.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If it bears fruit next year, fine! If not, then cut it down.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Crippled Woman on the Sabbath
    marker-yv: yv-h
