document_id: LUK.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Repent or Perish
  - type: text
    content: 'Now there were some present at that time who told Jesus about the Galileans whose blood Pilate had mixed with their sacrifices. '
  '10':
  - type: text
    content: 'On a Sabbath Jesus was teaching in one of the synagogues, '
  '11':
  - type: text
    content: 'and a woman was there who had been crippled by a spirit for eighteen years. She was bent over and could not straighten up at all. '
  '12':
  - type: text
    content: 'When Jesus saw her, he called her forward and said to her, '
  - type: text
    content: “Woman, you are set free from your infirmity.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: Then he put his hands on her, and immediately she straightened up and praised God.
  '14':
  - type: text
    content: Indignant because Jesus had healed on the Sabbath, the synagogue leader said to the people, “There are six days for work. So come and be healed on those days, not on the Sabbath.”
  '15':
  - type: text
    content: 'The Lord answered him, '
  - type: text
    content: “You hypocrites! Doesn’t each of you on the Sabbath untie your ox or donkey from the stall and lead it out to give it water?
  - type: text
    content: ' '
  '16':
  - type: text
    content: Then should not this woman, a daughter of Abraham, whom Satan has kept bound for eighteen long years, be set free on the Sabbath day from what bound her?”
  '17':
  - type: text
    content: When he said this, all his opponents were humiliated, but the people were delighted with all the wonderful things he was doing.
  - type: heading
    content: The Parables of the Mustard Seed and the Yeast
  '18':
  - type: text
    content: 'Then Jesus asked, '
  - type: text
    content: “What is the kingdom of God like? What shall I compare it to?
  - type: text
    content: ' '
  '19':
  - type: text
    content: It is like a mustard seed, which a man took and planted in his garden. It grew and became a tree, and the birds perched in its branches.”
  '2':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Do you think that these Galileans were worse sinners than all the other Galileans because they suffered this way?
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Again he asked, '
  - type: text
    content: “What shall I compare the kingdom of God to?
  - type: text
    content: ' '
  '21':
  - type: text
    content: It is like yeast that a woman took and mixed into about sixty pounds
  - type: note
    content: Or about 27 kilograms
  - type: text
    content: ' '
  - type: text
    content: of flour until it worked all through the dough.”
  - type: heading
    content: The Narrow Door
  '22':
  - type: text
    content: 'Then Jesus went through the towns and villages, teaching as he made his way to Jerusalem. '
  '23':
  - type: text
    content: Someone asked him, “Lord, are only a few people going to be saved?”
  - type: text
    content: 'He said to them, '
  '24':
  - type: text
    content: “Make every effort to enter through the narrow door, because many, I tell you, will try to enter and will not be able to.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Once the owner of the house gets up and closes the door, you will stand outside knocking and pleading, ‘Sir, open the door for us.’
  - type: text
    content: “But he will answer, ‘I don’t know you or where you come from.’
  '26':
  - type: text
    content: ' '
  - type: text
    content: “Then you will say, ‘We ate and drank with you, and you taught in our streets.’
  '27':
  - type: text
    content: ' '
  - type: text
    content: “But he will reply, ‘I don’t know you or where you come from. Away from me, all you evildoers!’
  '28':
  - type: text
    content: ' '
  - type: text
    content: “There will be weeping there, and gnashing of teeth, when you see Abraham, Isaac and Jacob and all the prophets in the kingdom of God, but you yourselves thrown out.
  - type: text
    content: ' '
  '29':
  - type: text
    content: People will come from east and west and north and south, and will take their places at the feast in the kingdom of God.
  - type: text
    content: ' '
  '3':
  - type: text
    content: I tell you, no! But unless you repent, you too will all perish.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Indeed there are those who are last who will be first, and first who will be last.”
  - type: heading
    content: Jesus’ Sorrow for Jerusalem
  '31':
  - type: text
    content: At that time some Pharisees came to Jesus and said to him, “Leave this place and go somewhere else. Herod wants to kill you.”
  '32':
  - type: text
    content: 'He replied, '
  - type: text
    content: “Go tell that fox, ‘I will keep on driving out demons and healing people today and tomorrow, and on the third day I will reach my goal.’
  - type: text
    content: ' '
  '33':
  - type: text
    content: In any case, I must press on today and tomorrow and the next day—for surely no prophet can die outside Jerusalem!
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Jerusalem, Jerusalem, you who kill the prophets and stone those sent to you, how often I have longed to gather your children together, as a hen gathers her chicks under her wings, and you were not willing.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Look, your house is left to you desolate. I tell you, you will not see me again until you say, ‘Blessed is he who comes in the name of the Lord.’
  - type: note
    content: Psalm 118:26
  - type: text
    content: ”
  '4':
  - type: text
    content: Or those eighteen who died when the tower in Siloam fell on them—do you think they were more guilty than all the others living in Jerusalem?
  - type: text
    content: ' '
  '5':
  - type: text
    content: I tell you, no! But unless you repent, you too will all perish.”
  '6':
  - type: text
    content: 'Then he told this parable: '
  - type: text
    content: “A man had a fig tree growing in his vineyard, and he went to look for fruit on it but did not find any.
  - type: text
    content: ' '
  '7':
  - type: text
    content: So he said to the man who took care of the vineyard, ‘For three years now I’ve been coming to look for fruit on this fig tree and haven’t found any. Cut it down! Why should it use up the soil?’
  '8':
  - type: text
    content: ' '
  - type: text
    content: “ ‘Sir,’ the man replied, ‘leave it alone for one more year, and I’ll dig around it and fertilize it.
  - type: text
    content: ' '
  '9':
  - type: text
    content: If it bears fruit next year, fine! If not, then cut it down.’ ”
  - type: heading
    content: Jesus Heals a Crippled Woman on the Sabbath
