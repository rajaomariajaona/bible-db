document_id: 1KI.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Appears to Solomon
  - type: text
    content: 'When Solomon had finished building the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the royal palace, and had achieved all he had desired to do, '
  '10':
  - type: text
    content: 'At the end of twenty years, during which Solomon built these two buildings—the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the royal palace— '
  '11':
  - type: text
    content: 'King Solomon gave twenty towns in Galilee to Hiram king of Tyre, because Hiram had supplied him with all the cedar and juniper and gold he wanted. '
  '12':
  - type: text
    content: 'But when Hiram went from Tyre to see the towns that Solomon had given him, he was not pleased with them. '
  '13':
  - type: text
    content: “What kind of towns are these you have given me, my brother?” he asked. And he called them the Land of Kabul,
  - type: note
    content: Kabul sounds like the Hebrew for good-for-nothing.
  - type: text
    content: ' a name they have to this day. '
  '14':
  - type: text
    content: Now Hiram had sent to the king 120 talents
  - type: note
    content: That is, about 4 1/2 tons or about 4 metric tons
  - type: text
    content: ' of gold.'
  '15':
  - type: text
    content: 'Here is the account of the forced labor King Solomon conscripted to build the '
  - type: text
    content: Lord
  - type: text
    content: ’s temple, his own palace, the terraces,
  - type: note
    content: Or the Millo; also in verse 24
  - type: text
    content: ' the wall of Jerusalem, and Hazor, Megiddo and Gezer. '
  '16':
  - type: text
    content: '(Pharaoh king of Egypt had attacked and captured Gezer. He had set it on fire. He killed its Canaanite inhabitants and then gave it as a wedding gift to his daughter, Solomon’s wife. '
  '17':
  - type: text
    content: 'And Solomon rebuilt Gezer.) He built up Lower Beth Horon, '
  '18':
  - type: text
    content: Baalath, and Tadmor
  - type: note
    content: The Hebrew may also be read Tamar.
  - type: text
    content: ' in the desert, within his land, '
  '19':
  - type: text
    content: as well as all his store cities and the towns for his chariots and for his horses
  - type: note
    content: Or charioteers
  - type: text
    content: —whatever he desired to build in Jerusalem, in Lebanon and throughout all the territory he ruled.
  '2':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him a second time, as he had appeared to him at Gibeon. '
  '20':
  - type: text
    content: 'There were still people left from the Amorites, Hittites, Perizzites, Hivites and Jebusites (these peoples were not Israelites). '
  '21':
  - type: text
    content: Solomon conscripted the descendants of all these peoples remaining in the land—whom the Israelites could not exterminate
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: '—to serve as slave labor, as it is to this day. '
  '22':
  - type: text
    content: 'But Solomon did not make slaves of any of the Israelites; they were his fighting men, his government officials, his officers, his captains, and the commanders of his chariots and charioteers. '
  '23':
  - type: text
    content: They were also the chief officials in charge of Solomon’s projects—550 officials supervising those who did the work.
  '24':
  - type: text
    content: After Pharaoh’s daughter had come up from the City of David to the palace Solomon had built for her, he constructed the terraces.
  '25':
  - type: text
    content: 'Three times a year Solomon sacrificed burnt offerings and fellowship offerings on the altar he had built for the '
  - type: text
    content: Lord
  - type: text
    content: ', burning incense before the '
  - type: text
    content: Lord
  - type: text
    content: ' along with them, and so fulfilled the temple obligations.'
  '26':
  - type: text
    content: King Solomon also built ships at Ezion Geber, which is near Elath in Edom, on the shore of the Red Sea.
  - type: note
    content: Or the Sea of Reeds
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'And Hiram sent his men—sailors who knew the sea—to serve in the fleet with Solomon’s men. '
  '28':
  - type: text
    content: They sailed to Ophir and brought back 420 talents
  - type: note
    content: That is, about 16 tons or about 14 metric tons
  - type: text
    content: ' of gold, which they delivered to King Solomon.'
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to him:'
  - type: text
    content: “I have heard the prayer and plea you have made before me; I have consecrated this temple, which you have built, by putting my Name there forever. My eyes and my heart will always be there.
  '4':
  - type: text
    content: '“As for you, if you walk before me faithfully with integrity of heart and uprightness, as David your father did, and do all I command and observe my decrees and laws, '
  '5':
  - type: text
    content: I will establish your royal throne over Israel forever, as I promised David your father when I said, ‘You shall never fail to have a successor on the throne of Israel.’
  '6':
  - type: text
    content: “But if you
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' or your descendants turn away from me and do not observe the commands and decrees I have given you'
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' and go off to serve other gods and worship them, '
  '7':
  - type: text
    content: 'then I will cut off Israel from the land I have given them and will reject this temple I have consecrated for my Name. Israel will then become a byword and an object of ridicule among all peoples. '
  '8':
  - type: text
    content: This temple will become a heap of rubble. All
  - type: note
    content: See some Septuagint manuscripts, Old Latin, Syriac, Arabic and Targum; Hebrew And though this temple is now imposing, all
  - type: text
    content: ' who pass by will be appalled and will scoff and say, ‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' done such a thing to this land and to this temple?’ '
  '9':
  - type: text
    content: 'People will answer, ‘Because they have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, who brought their ancestors out of Egypt, and have embraced other gods, worshiping and serving them—that is why the '
  - type: text
    content: Lord
  - type: text
    content: ' brought all this disaster on them.’ ”'
  - type: heading
    content: Solomon’s Other Activities
