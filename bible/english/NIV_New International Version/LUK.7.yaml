document_id: LUK.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Faith of the Centurion
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus had finished saying all this to the people who were listening, he entered Capernaum. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the men who had been sent returned to the house and found the servant well.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Raises a Widow’s Son
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soon afterward, Jesus went to a town called Nain, and his disciples and a large crowd went along with him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he approached the town gate, a dead person was being carried out—the only son of his mother, and she was a widow. And a large crowd from the town was with her. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Lord saw her, his heart went out to her and he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t cry.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he went up and touched the bier they were carrying him on, and the bearers stood still. He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Young man, I say to you, get up!”
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The dead man sat up and began to talk, and Jesus gave him back to his mother.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were all filled with awe and praised God. “A great prophet has appeared among us,” they said. “God has come to help his people.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This news about Jesus spread throughout Judea and the surrounding country.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and John the Baptist
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'John’s disciples told him about all these things. Calling two of them, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: he sent them to the Lord to ask, “Are you the one who is to come, or should we expect someone else?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There a centurion’s servant, whom his master valued highly, was sick and about to die. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the men came to Jesus, they said, “John the Baptist sent us to you to ask, ‘Are you the one who is to come, or should we expect someone else?’ ”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that very time Jesus cured many who had diseases, sicknesses and evil spirits, and gave sight to many who were blind. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he replied to the messengers, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Go back and report to John what you have seen and heard: The blind receive sight, the lame walk, those who have leprosy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word traditionally translated '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leprosy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was used for various diseases affecting the skin.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: are cleansed, the deaf hear, the dead are raised, and the good news is proclaimed to the poor.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Blessed is anyone who does not stumble on account of me.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After John’s messengers left, Jesus began to speak to the crowd about John: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What did you go out into the wilderness to see? A reed swayed by the wind?
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If not, what did you go out to see? A man dressed in fine clothes? No, those who wear expensive clothes and indulge in luxury are in palaces.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But what did you go out to see? A prophet? Yes, I tell you, and more than a prophet.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'This is the one about whom it is written:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “ ‘I will send my messenger ahead of you,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who will prepare your way before you.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mal. 3:1
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, among those born of women there is no one greater than John; yet the one who is least in the kingdom of God is greater than he.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(All the people, even the tax collectors, when they heard Jesus’ words, acknowledged that God’s way was right, because they had been baptized by John. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The centurion heard of Jesus and sent some elders of the Jews to him, asking him to come and heal his servant. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the Pharisees and the experts in the law rejected God’s purpose for themselves, because they had not been baptized by John.)
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus went on to say, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “To what, then, can I compare the people of this generation? What are they like?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'They are like children sitting in the marketplace and calling out to each other:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “ ‘We played the pipe for you,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and you did not dance;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: we sang a dirge,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and you did not cry.’
  '33':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For John the Baptist came neither eating bread nor drinking wine, and you say, ‘He has a demon.’
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Son of Man came eating and drinking, and you say, ‘Here is a glutton and a drunkard, a friend of tax collectors and sinners.’
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But wisdom is proved right by all her children.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Anointed by a Sinful Woman
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When one of the Pharisees invited Jesus to have dinner with him, he went to the Pharisee’s house and reclined at the table. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A woman in that town who lived a sinful life learned that Jesus was eating at the Pharisee’s house, so she came there with an alabaster jar of perfume. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As she stood behind him at his feet weeping, she began to wet his feet with her tears. Then she wiped them with her hair, kissed them and poured perfume on them.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the Pharisee who had invited him saw this, he said to himself, “If this man were a prophet, he would know who is touching him and what kind of woman she is—that she is a sinner.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they came to Jesus, they pleaded earnestly with him, “This man deserves to have you do this, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Simon, I have something to tell you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Tell me, teacher,” he said.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Two people owed money to a certain moneylender. One owed him five hundred denarii,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A denarius was the usual daily wage of a day laborer (see Matt. 20:2).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and the other fifty.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Neither of them had the money to pay him back, so he forgave the debts of both. Now which of them will love him more?”
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Simon replied, “I suppose the one who had the bigger debt forgiven.”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have judged correctly,”
    - type: text
      text: ' Jesus said.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he turned toward the woman and said to Simon, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you see this woman? I came into your house. You did not give me any water for my feet, but she wet my feet with her tears and wiped them with her hair.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You did not give me a kiss, but this woman, from the time I entered, has not stopped kissing my feet.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You did not put oil on my head, but she has poured perfume on my feet.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore, I tell you, her many sins have been forgiven—as her great love has shown. But whoever has been forgiven little loves little.”
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your sins are forgiven.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The other guests began to say among themselves, “Who is this who even forgives sins?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because he loves our nation and has built our synagogue.” '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to the woman, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your faith has saved you; go in peace.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jesus went with them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was not far from the house when the centurion sent friends to say to him: “Lord, don’t trouble yourself, for I do not deserve to have you come under my roof. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That is why I did not even consider myself worthy to come to you. But say the word, and my servant will be healed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For I myself am a man under authority, with soldiers under me. I tell this one, ‘Go,’ and he goes; and that one, ‘Come,’ and he comes. I say to my servant, ‘Do this,’ and he does it.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus heard this, he was amazed at him, and turning to the crowd following him, he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you, I have not found such great faith even in Israel.”
    - type: text
      text: ' '
