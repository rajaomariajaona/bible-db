document_id: LUK.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Faith of the Centurion
  - type: text
    content: 'When Jesus had finished saying all this to the people who were listening, he entered Capernaum. '
  '10':
  - type: text
    content: Then the men who had been sent returned to the house and found the servant well.
  - type: heading
    content: Jesus Raises a Widow’s Son
  '11':
  - type: text
    content: 'Soon afterward, Jesus went to a town called Nain, and his disciples and a large crowd went along with him. '
  '12':
  - type: text
    content: 'As he approached the town gate, a dead person was being carried out—the only son of his mother, and she was a widow. And a large crowd from the town was with her. '
  '13':
  - type: text
    content: 'When the Lord saw her, his heart went out to her and he said, '
  - type: text
    content: “Don’t cry.”
  '14':
  - type: text
    content: 'Then he went up and touched the bier they were carrying him on, and the bearers stood still. He said, '
  - type: text
    content: “Young man, I say to you, get up!”
  - type: text
    content: ' '
  '15':
  - type: text
    content: The dead man sat up and began to talk, and Jesus gave him back to his mother.
  '16':
  - type: text
    content: 'They were all filled with awe and praised God. “A great prophet has appeared among us,” they said. “God has come to help his people.” '
  '17':
  - type: text
    content: This news about Jesus spread throughout Judea and the surrounding country.
  - type: heading
    content: Jesus and John the Baptist
  '18':
  - type: text
    content: 'John’s disciples told him about all these things. Calling two of them, '
  '19':
  - type: text
    content: he sent them to the Lord to ask, “Are you the one who is to come, or should we expect someone else?”
  '2':
  - type: text
    content: 'There a centurion’s servant, whom his master valued highly, was sick and about to die. '
  '20':
  - type: text
    content: When the men came to Jesus, they said, “John the Baptist sent us to you to ask, ‘Are you the one who is to come, or should we expect someone else?’ ”
  '21':
  - type: text
    content: 'At that very time Jesus cured many who had diseases, sicknesses and evil spirits, and gave sight to many who were blind. '
  '22':
  - type: text
    content: 'So he replied to the messengers, '
  - type: text
    content: '“Go back and report to John what you have seen and heard: The blind receive sight, the lame walk, those who have leprosy'
  - type: note
    content: The Greek word traditionally translated leprosy was used for various diseases affecting the skin.
  - type: text
    content: ' '
  - type: text
    content: are cleansed, the deaf hear, the dead are raised, and the good news is proclaimed to the poor.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Blessed is anyone who does not stumble on account of me.”
  '24':
  - type: text
    content: 'After John’s messengers left, Jesus began to speak to the crowd about John: '
  - type: text
    content: “What did you go out into the wilderness to see? A reed swayed by the wind?
  - type: text
    content: ' '
  '25':
  - type: text
    content: If not, what did you go out to see? A man dressed in fine clothes? No, those who wear expensive clothes and indulge in luxury are in palaces.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But what did you go out to see? A prophet? Yes, I tell you, and more than a prophet.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'This is the one about whom it is written:'
  - type: text
    content: “ ‘I will send my messenger ahead of you,
  - type: text
    content: who will prepare your way before you.’
  - type: note
    content: Mal. 3:1
  '28':
  - type: text
    content: ' '
  - type: text
    content: I tell you, among those born of women there is no one greater than John; yet the one who is least in the kingdom of God is greater than he.”
  '29':
  - type: text
    content: '(All the people, even the tax collectors, when they heard Jesus’ words, acknowledged that God’s way was right, because they had been baptized by John. '
  '3':
  - type: text
    content: 'The centurion heard of Jesus and sent some elders of the Jews to him, asking him to come and heal his servant. '
  '30':
  - type: text
    content: But the Pharisees and the experts in the law rejected God’s purpose for themselves, because they had not been baptized by John.)
  '31':
  - type: text
    content: 'Jesus went on to say, '
  - type: text
    content: “To what, then, can I compare the people of this generation? What are they like?
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'They are like children sitting in the marketplace and calling out to each other:'
  - type: text
    content: “ ‘We played the pipe for you,
  - type: text
    content: and you did not dance;
  - type: text
    content: we sang a dirge,
  - type: text
    content: and you did not cry.’
  '33':
  - type: text
    content: ' '
  - type: text
    content: For John the Baptist came neither eating bread nor drinking wine, and you say, ‘He has a demon.’
  - type: text
    content: ' '
  '34':
  - type: text
    content: The Son of Man came eating and drinking, and you say, ‘Here is a glutton and a drunkard, a friend of tax collectors and sinners.’
  - type: text
    content: ' '
  '35':
  - type: text
    content: But wisdom is proved right by all her children.”
  - type: heading
    content: Jesus Anointed by a Sinful Woman
  '36':
  - type: text
    content: 'When one of the Pharisees invited Jesus to have dinner with him, he went to the Pharisee’s house and reclined at the table. '
  '37':
  - type: text
    content: 'A woman in that town who lived a sinful life learned that Jesus was eating at the Pharisee’s house, so she came there with an alabaster jar of perfume. '
  '38':
  - type: text
    content: As she stood behind him at his feet weeping, she began to wet his feet with her tears. Then she wiped them with her hair, kissed them and poured perfume on them.
  '39':
  - type: text
    content: When the Pharisee who had invited him saw this, he said to himself, “If this man were a prophet, he would know who is touching him and what kind of woman she is—that she is a sinner.”
  '4':
  - type: text
    content: 'When they came to Jesus, they pleaded earnestly with him, “This man deserves to have you do this, '
  '40':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: “Simon, I have something to tell you.”
  - type: text
    content: “Tell me, teacher,” he said.
  '41':
  - type: text
    content: ' '
  - type: text
    content: “Two people owed money to a certain moneylender. One owed him five hundred denarii,
  - type: text
    content: ' '
  - type: note
    content: A denarius was the usual daily wage of a day laborer (see Matt. 20:2).
  - type: text
    content: and the other fifty.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Neither of them had the money to pay him back, so he forgave the debts of both. Now which of them will love him more?”
  '43':
  - type: text
    content: Simon replied, “I suppose the one who had the bigger debt forgiven.”
  - type: text
    content: “You have judged correctly,”
  - type: text
    content: ' Jesus said.'
  '44':
  - type: text
    content: 'Then he turned toward the woman and said to Simon, '
  - type: text
    content: “Do you see this woman? I came into your house. You did not give me any water for my feet, but she wet my feet with her tears and wiped them with her hair.
  - type: text
    content: ' '
  '45':
  - type: text
    content: You did not give me a kiss, but this woman, from the time I entered, has not stopped kissing my feet.
  - type: text
    content: ' '
  '46':
  - type: text
    content: You did not put oil on my head, but she has poured perfume on my feet.
  - type: text
    content: ' '
  '47':
  - type: text
    content: Therefore, I tell you, her many sins have been forgiven—as her great love has shown. But whoever has been forgiven little loves little.”
  '48':
  - type: text
    content: 'Then Jesus said to her, '
  - type: text
    content: “Your sins are forgiven.”
  '49':
  - type: text
    content: The other guests began to say among themselves, “Who is this who even forgives sins?”
  '5':
  - type: text
    content: 'because he loves our nation and has built our synagogue.” '
  '50':
  - type: text
    content: 'Jesus said to the woman, '
  - type: text
    content: “Your faith has saved you; go in peace.”
  '6':
  - type: text
    content: So Jesus went with them.
  - type: text
    content: 'He was not far from the house when the centurion sent friends to say to him: “Lord, don’t trouble yourself, for I do not deserve to have you come under my roof. '
  '7':
  - type: text
    content: 'That is why I did not even consider myself worthy to come to you. But say the word, and my servant will be healed. '
  '8':
  - type: text
    content: For I myself am a man under authority, with soldiers under me. I tell this one, ‘Go,’ and he goes; and that one, ‘Come,’ and he comes. I say to my servant, ‘Do this,’ and he does it.”
  '9':
  - type: text
    content: 'When Jesus heard this, he was amazed at him, and turning to the crowd following him, he said, '
  - type: text
    content: “I tell you, I have not found such great faith even in Israel.”
  - type: text
    content: ' '
