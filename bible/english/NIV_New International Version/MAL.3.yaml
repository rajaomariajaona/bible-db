document_id: MAL.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: '“I will send my messenger, who will prepare the way before me. Then suddenly the Lord you are seeking will come to his temple; the messenger of the covenant, whom you desire, will come,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '10':
  - type: text
    content: 'Bring the whole tithe into the storehouse, that there may be food in my house. Test me in this,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, “and see if I will not throw open the floodgates of heaven and pour out so much blessing that there will not be room enough to store it. '
  '11':
  - type: text
    content: 'I will prevent pests from devouring your crops, and the vines in your fields will not drop their fruit before it is ripe,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. '
  '12':
  - type: text
    content: '“Then all the nations will call you blessed, for yours will be a delightful land,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: heading
    content: Israel Speaks Arrogantly Against God
  '13':
  - type: text
    content: '“You have spoken arrogantly against me,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Yet you ask, ‘What have we said against you?’
  '14':
  - type: text
    content: '“You have said, ‘It is futile to serve God. What do we gain by carrying out his requirements and going about like mourners before the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty? '
  '15':
  - type: text
    content: But now we call the arrogant blessed. Certainly evildoers prosper, and even when they put God to the test, they get away with it.’ ”
  - type: heading
    content: The Faithful Remnant
  '16':
  - type: text
    content: 'Then those who feared the '
  - type: text
    content: Lord
  - type: text
    content: ' talked with each other, and the '
  - type: text
    content: Lord
  - type: text
    content: ' listened and heard. A scroll of remembrance was written in his presence concerning those who feared the '
  - type: text
    content: Lord
  - type: text
    content: ' and honored his name.'
  '17':
  - type: text
    content: '“On the day when I act,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, “they will be my treasured possession. I will spare them, just as a father has compassion and spares his son who serves him. '
  '18':
  - type: text
    content: And you will again see the distinction between the righteous and the wicked, between those who serve God and those who do not.
  '2':
  - type: text
    content: 'But who can endure the day of his coming? Who can stand when he appears? For he will be like a refiner’s fire or a launderer’s soap. '
  '3':
  - type: text
    content: 'He will sit as a refiner and purifier of silver; he will purify the Levites and refine them like gold and silver. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will have men who will bring offerings in righteousness, '
  '4':
  - type: text
    content: 'and the offerings of Judah and Jerusalem will be acceptable to the '
  - type: text
    content: Lord
  - type: text
    content: ', as in days gone by, as in former years.'
  '5':
  - type: text
    content: '“So I will come to put you on trial. I will be quick to testify against sorcerers, adulterers and perjurers, against those who defraud laborers of their wages, who oppress the widows and the fatherless, and deprive the foreigners among you of justice, but do not fear me,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: heading
    content: Breaking Covenant by Withholding Tithes
  '6':
  - type: text
    content: '“I the '
  - type: text
    content: Lord
  - type: text
    content: ' do not change. So you, the descendants of Jacob, are not destroyed. '
  '7':
  - type: text
    content: 'Ever since the time of your ancestors you have turned away from my decrees and have not kept them. Return to me, and I will return to you,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: text
    content: “But you ask, ‘How are we to return?’
  '8':
  - type: text
    content: “Will a mere mortal rob God? Yet you rob me.
  - type: text
    content: “But you ask, ‘How are we robbing you?’
  - type: text
    content: '“In tithes and offerings. '
  '9':
  - type: text
    content: 'You are under a curse—your whole nation—because you are robbing me. '
