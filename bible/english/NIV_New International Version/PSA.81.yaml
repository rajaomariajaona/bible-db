segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 81
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 81:1-16 is numbered 81:2-17.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the director of music. According to '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: gittith.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a musical term'
    marker-yv: yv-n
  - type: text
    text: ' Of Asaph.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sing for joy to God our strength;
- type: usfm
  marker: q2
  children:
  - type: text
    text: shout aloud to the God of Jacob!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Begin the music, strike the timbrel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: play the melodious harp and lyre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sound the ram’s horn at the New Moon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and when the moon is full, on the day of our festival;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: this is a decree for Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an ordinance of the God of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When God went out against Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he established it as a statute for Joseph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I heard an unknown voice say:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I removed the burden from their shoulders;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their hands were set free from the basket.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In your distress you called and I rescued you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I answered you out of a thundercloud;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I tested you at the waters of Meribah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '81:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hear me, my people, and I will warn you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you would only listen to me, Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You shall have no foreign god among you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you shall not worship any god other than me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who brought you up out of Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Open wide your mouth and I will fill it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “But my people would not listen to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel would not submit to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So I gave them over to their stubborn hearts
- type: usfm
  marker: q2
  children:
  - type: text
    text: to follow their own devices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “If my people would only listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if Israel would only follow my ways,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: how quickly I would subdue their enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turn my hand against their foes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Those who hate the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' would cringe before him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their punishment would last forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But you would be fed with the finest of wheat;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with honey from the rock I would satisfy you.”
