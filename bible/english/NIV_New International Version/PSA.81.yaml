document_id: PSA.81,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 81In Hebrew texts 81:1-16 is numbered 81:2-17.
  - type: text
    content: 'For the director of music. According to '
  - type: text
    content: gittith.
  - type: note
    content: 'Title: Probably a musical term'
  - type: text
    content: ' Of Asaph.'
  - type: text
    content: Sing for joy to God our strength;
  - type: text
    content: shout aloud to the God of Jacob!
  '10':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who brought you up out of Egypt.
  - type: text
    content: Open wide your mouth and I will fill it.
  '11':
  - type: text
    content: “But my people would not listen to me;
  - type: text
    content: Israel would not submit to me.
  '12':
  - type: text
    content: So I gave them over to their stubborn hearts
  - type: text
    content: to follow their own devices.
  '13':
  - type: text
    content: “If my people would only listen to me,
  - type: text
    content: if Israel would only follow my ways,
  '14':
  - type: text
    content: how quickly I would subdue their enemies
  - type: text
    content: and turn my hand against their foes!
  '15':
  - type: text
    content: 'Those who hate the '
  - type: text
    content: Lord
  - type: text
    content: ' would cringe before him,'
  - type: text
    content: and their punishment would last forever.
  '16':
  - type: text
    content: But you would be fed with the finest of wheat;
  - type: text
    content: with honey from the rock I would satisfy you.”
  '2':
  - type: text
    content: Begin the music, strike the timbrel,
  - type: text
    content: play the melodious harp and lyre.
  '3':
  - type: text
    content: Sound the ram’s horn at the New Moon,
  - type: text
    content: and when the moon is full, on the day of our festival;
  '4':
  - type: text
    content: this is a decree for Israel,
  - type: text
    content: an ordinance of the God of Jacob.
  '5':
  - type: text
    content: When God went out against Egypt,
  - type: text
    content: he established it as a statute for Joseph.
  - type: text
    content: 'I heard an unknown voice say:'
  '6':
  - type: text
    content: “I removed the burden from their shoulders;
  - type: text
    content: their hands were set free from the basket.
  '7':
  - type: text
    content: In your distress you called and I rescued you,
  - type: text
    content: I answered you out of a thundercloud;
  - type: text
    content: I tested you at the waters of Meribah.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '8':
  - type: text
    content: Hear me, my people, and I will warn you—
  - type: text
    content: if you would only listen to me, Israel!
  '9':
  - type: text
    content: You shall have no foreign god among you;
  - type: text
    content: you shall not worship any god other than me.
