document_id: ISA.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 9:1 is numbered 8:23, and 9:2-21 is numbered 9:1-20.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nevertheless, there will be no more gloom for those who were in distress. In the past he humbled the land of Zebulun and the land of Naphtali, but in the future he will honor Galilee of the nations, by the Way of the Sea, beyond the Jordan—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The people walking in darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: have seen a great light;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on those living in the land of deep darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: a light has dawned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You have enlarged the nation
- type: usfm
  marker: q2
  children:
  - type: text
    text: and increased their joy;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they rejoice before you
- type: usfm
  marker: q2
  children:
  - type: text
    text: as people rejoice at the harvest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as warriors rejoice
- type: usfm
  marker: q2
  children:
  - type: text
    text: when dividing the plunder.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For as in the day of Midian’s defeat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have shattered
- type: usfm
  marker: q1
  children:
  - type: text
    text: the yoke that burdens them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the bar across their shoulders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rod of their oppressor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Every warrior’s boot used in battle
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every garment rolled in blood
- type: usfm
  marker: q1
  children:
  - type: text
    text: will be destined for burning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be fuel for the fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For to us a child is born,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to us a son is given,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the government will be on his shoulders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And he will be called
- type: usfm
  marker: q2
  children:
  - type: text
    text: Wonderful Counselor, Mighty God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everlasting Father, Prince of Peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Of the greatness of his government and peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: there will be no end.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will reign on David’s throne
- type: usfm
  marker: q2
  children:
  - type: text
    text: and over his kingdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: establishing and upholding it
- type: usfm
  marker: q2
  children:
  - type: text
    text: with justice and righteousness
- type: usfm
  marker: q2
  children:
  - type: text
    text: from that time on and forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The zeal of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will accomplish this.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Anger Against Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The Lord has sent a message against Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will fall on Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All the people will know it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim and the inhabitants of Samaria—
- type: usfm
  marker: q1
  children:
  - type: text
    text: who say with pride
- type: usfm
  marker: q2
  children:
  - type: text
    text: and arrogance of heart,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “The bricks have fallen down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but we will rebuild with dressed stone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the fig trees have been felled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but we will replace them with cedars.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has strengthened Rezin’s foes against them'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and has spurred their enemies on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Arameans from the east and Philistines from the west
- type: usfm
  marker: q2
  children:
  - type: text
    text: have devoured Israel with open mouth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet for all this, his anger is not turned away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hand is still upraised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But the people have not returned to him who struck them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'nor have they sought the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will cut off from Israel both head and tail,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: both palm branch and reed in a single day;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: the elders and dignitaries are the head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the prophets who teach lies are the tail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Those who guide this people mislead them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who are guided are led astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Therefore the Lord will take no pleasure in the young men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will he pity the fatherless and widows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for everyone is ungodly and wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: every mouth speaks folly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet for all this, his anger is not turned away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hand is still upraised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Surely wickedness burns like a fire;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it consumes briers and thorns,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it sets the forest thickets ablaze,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that it rolls upward in a column of smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'By the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the land will be scorched
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the people will be fuel for the fire;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will not spare one another.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: On the right they will devour,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but still be hungry;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on the left they will eat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but not be satisfied.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each will feed on the flesh of their own offspring
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: arm
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Manasseh will feed on Ephraim, and Ephraim on Manasseh;
- type: usfm
  marker: q2
  children:
  - type: text
    text: together they will turn against Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet for all this, his anger is not turned away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hand is still upraised.
