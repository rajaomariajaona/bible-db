document_id: ISA.9,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 9:1 is numbered 8:23, and 9:2-21 is numbered 9:1-20.
  - type: text
    content: Nevertheless, there will be no more gloom for those who were in distress. In the past he humbled the land of Zebulun and the land of Naphtali, but in the future he will honor Galilee of the nations, by the Way of the Sea, beyond the Jordan—
  '10':
  - type: text
    content: “The bricks have fallen down,
  - type: text
    content: but we will rebuild with dressed stone;
  - type: text
    content: the fig trees have been felled,
  - type: text
    content: but we will replace them with cedars.”
  '11':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' has strengthened Rezin’s foes against them'
  - type: text
    content: and has spurred their enemies on.
  '12':
  - type: text
    content: Arameans from the east and Philistines from the west
  - type: text
    content: have devoured Israel with open mouth.
  - type: text
    content: Yet for all this, his anger is not turned away,
  - type: text
    content: his hand is still upraised.
  '13':
  - type: text
    content: But the people have not returned to him who struck them,
  - type: text
    content: 'nor have they sought the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '14':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' will cut off from Israel both head and tail,'
  - type: text
    content: both palm branch and reed in a single day;
  '15':
  - type: text
    content: the elders and dignitaries are the head,
  - type: text
    content: the prophets who teach lies are the tail.
  '16':
  - type: text
    content: Those who guide this people mislead them,
  - type: text
    content: and those who are guided are led astray.
  '17':
  - type: text
    content: Therefore the Lord will take no pleasure in the young men,
  - type: text
    content: nor will he pity the fatherless and widows,
  - type: text
    content: for everyone is ungodly and wicked,
  - type: text
    content: every mouth speaks folly.
  - type: text
    content: Yet for all this, his anger is not turned away,
  - type: text
    content: his hand is still upraised.
  '18':
  - type: text
    content: Surely wickedness burns like a fire;
  - type: text
    content: it consumes briers and thorns,
  - type: text
    content: it sets the forest thickets ablaze,
  - type: text
    content: so that it rolls upward in a column of smoke.
  '19':
  - type: text
    content: 'By the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty'
  - type: text
    content: the land will be scorched
  - type: text
    content: and the people will be fuel for the fire;
  - type: text
    content: they will not spare one another.
  '2':
  - type: text
    content: The people walking in darkness
  - type: text
    content: have seen a great light;
  - type: text
    content: on those living in the land of deep darkness
  - type: text
    content: a light has dawned.
  '20':
  - type: text
    content: On the right they will devour,
  - type: text
    content: but still be hungry;
  - type: text
    content: on the left they will eat,
  - type: text
    content: but not be satisfied.
  - type: text
    content: Each will feed on the flesh of their own offspring
  - type: note
    content: Or arm
  - type: text
    content: ':'
  '21':
  - type: text
    content: Manasseh will feed on Ephraim, and Ephraim on Manasseh;
  - type: text
    content: together they will turn against Judah.
  - type: text
    content: Yet for all this, his anger is not turned away,
  - type: text
    content: his hand is still upraised.
  '3':
  - type: text
    content: You have enlarged the nation
  - type: text
    content: and increased their joy;
  - type: text
    content: they rejoice before you
  - type: text
    content: as people rejoice at the harvest,
  - type: text
    content: as warriors rejoice
  - type: text
    content: when dividing the plunder.
  '4':
  - type: text
    content: For as in the day of Midian’s defeat,
  - type: text
    content: you have shattered
  - type: text
    content: the yoke that burdens them,
  - type: text
    content: the bar across their shoulders,
  - type: text
    content: the rod of their oppressor.
  '5':
  - type: text
    content: Every warrior’s boot used in battle
  - type: text
    content: and every garment rolled in blood
  - type: text
    content: will be destined for burning,
  - type: text
    content: will be fuel for the fire.
  '6':
  - type: text
    content: For to us a child is born,
  - type: text
    content: to us a son is given,
  - type: text
    content: and the government will be on his shoulders.
  - type: text
    content: And he will be called
  - type: text
    content: Wonderful Counselor, Mighty God,
  - type: text
    content: Everlasting Father, Prince of Peace.
  '7':
  - type: text
    content: Of the greatness of his government and peace
  - type: text
    content: there will be no end.
  - type: text
    content: He will reign on David’s throne
  - type: text
    content: and over his kingdom,
  - type: text
    content: establishing and upholding it
  - type: text
    content: with justice and righteousness
  - type: text
    content: from that time on and forever.
  - type: text
    content: 'The zeal of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty'
  - type: text
    content: will accomplish this.
  - type: heading
    content: The Lord’s Anger Against Israel
  '8':
  - type: text
    content: The Lord has sent a message against Jacob;
  - type: text
    content: it will fall on Israel.
  '9':
  - type: text
    content: All the people will know it—
  - type: text
    content: Ephraim and the inhabitants of Samaria—
  - type: text
    content: who say with pride
  - type: text
    content: and arrogance of heart,
