document_id: PSA.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 11
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' I take refuge.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How then can you say to me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Flee like a bird to your mountain.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For look, the wicked bend their bows;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they set their arrows against the strings
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to shoot from the shadows
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the upright in heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the foundations are being destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what can the righteous do?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is in his holy temple;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is on his heavenly throne.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He observes everyone on earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his eyes examine them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' examines the righteous,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the wicked, those who love violence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he hates with a passion.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the wicked he will rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fiery coals and burning sulfur;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a scorching wind will be their lot.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is righteous,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he loves justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the upright will see his face.
