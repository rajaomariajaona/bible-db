  children:
  - type: text
    text: Psalm 11
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. Of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' I take refuge.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'How then can you say to me:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Flee like a bird to your mountain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For look, the wicked bend their bows;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they set their arrows against the strings
- type: usfm
  marker: q1
  children:
  - type: text
    text: to shoot from the shadows
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the upright in heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When the foundations are being destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what can the righteous do?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is in his holy temple;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is on his heavenly throne.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He observes everyone on earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his eyes examine them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' examines the righteous,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wicked, those who love violence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he hates with a passion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: On the wicked he will rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: fiery coals and burning sulfur;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a scorching wind will be their lot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is righteous,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he loves justice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the upright will see his face.
