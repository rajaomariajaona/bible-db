document_id: PSA.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 11
  - type: text
    content: For the director of music. Of David.
  - type: text
    content: 'In the '
  - type: text
    content: Lord
  - type: text
    content: ' I take refuge.'
  - type: text
    content: 'How then can you say to me:'
  - type: text
    content: “Flee like a bird to your mountain.
  '2':
  - type: text
    content: For look, the wicked bend their bows;
  - type: text
    content: they set their arrows against the strings
  - type: text
    content: to shoot from the shadows
  - type: text
    content: at the upright in heart.
  '3':
  - type: text
    content: When the foundations are being destroyed,
  - type: text
    content: what can the righteous do?”
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is in his holy temple;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is on his heavenly throne.'
  - type: text
    content: He observes everyone on earth;
  - type: text
    content: his eyes examine them.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' examines the righteous,'
  - type: text
    content: but the wicked, those who love violence,
  - type: text
    content: he hates with a passion.
  '6':
  - type: text
    content: On the wicked he will rain
  - type: text
    content: fiery coals and burning sulfur;
  - type: text
    content: a scorching wind will be their lot.
  '7':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is righteous,'
  - type: text
    content: he loves justice;
  - type: text
    content: the upright will see his face.
