document_id: JOB.18,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bildad
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Bildad the Shuhite replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A noose is hidden for him on the ground;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a trap lies in his path.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terrors startle him on every side
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dog his every step.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Calamity is hungry for him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: disaster is ready for him when he falls.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It eats away parts of his skin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: death’s firstborn devours his limbs.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is torn from the security of his tent
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and marched off to the king of terrors.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fire resides
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Nothing he had remains
      marker-yv: yv-n
    - type: text
      text: ' in his tent;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning sulfur is scattered over his dwelling.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His roots dry up below
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his branches wither above.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The memory of him perishes from the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has no name in the land.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is driven from light into the realm of darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and is banished from the world.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has no offspring or descendants among his people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no survivor where once he lived.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When will you end these speeches?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Be sensible, and then we can talk.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People of the west are appalled at his fate;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those of the east are seized with horror.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely such is the dwelling of an evil man;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: such is the place of one who does not know God.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why are we regarded as cattle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and considered stupid in your sight?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who tear yourself to pieces in your anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is the earth to be abandoned for your sake?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or must the rocks be moved from their place?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The lamp of a wicked man is snuffed out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the flame of his fire stops burning.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The light in his tent becomes dark;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the lamp beside him goes out.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The vigor of his step is weakened;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his own schemes throw him down.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His feet thrust him into a net;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he wanders into its mesh.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A trap seizes him by the heel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a snare holds him fast.
