document_id: JOB.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad
  - type: text
    content: 'Then Bildad the Shuhite replied:'
  '10':
  - type: text
    content: A noose is hidden for him on the ground;
  - type: text
    content: a trap lies in his path.
  '11':
  - type: text
    content: Terrors startle him on every side
  - type: text
    content: and dog his every step.
  '12':
  - type: text
    content: Calamity is hungry for him;
  - type: text
    content: disaster is ready for him when he falls.
  '13':
  - type: text
    content: It eats away parts of his skin;
  - type: text
    content: death’s firstborn devours his limbs.
  '14':
  - type: text
    content: He is torn from the security of his tent
  - type: text
    content: and marched off to the king of terrors.
  '15':
  - type: text
    content: Fire resides
  - type: note
    content: Or Nothing he had remains
  - type: text
    content: ' in his tent;'
  - type: text
    content: burning sulfur is scattered over his dwelling.
  '16':
  - type: text
    content: His roots dry up below
  - type: text
    content: and his branches wither above.
  '17':
  - type: text
    content: The memory of him perishes from the earth;
  - type: text
    content: he has no name in the land.
  '18':
  - type: text
    content: He is driven from light into the realm of darkness
  - type: text
    content: and is banished from the world.
  '19':
  - type: text
    content: He has no offspring or descendants among his people,
  - type: text
    content: no survivor where once he lived.
  '2':
  - type: text
    content: “When will you end these speeches?
  - type: text
    content: Be sensible, and then we can talk.
  '20':
  - type: text
    content: People of the west are appalled at his fate;
  - type: text
    content: those of the east are seized with horror.
  '21':
  - type: text
    content: Surely such is the dwelling of an evil man;
  - type: text
    content: such is the place of one who does not know God.”
  '3':
  - type: text
    content: Why are we regarded as cattle
  - type: text
    content: and considered stupid in your sight?
  '4':
  - type: text
    content: You who tear yourself to pieces in your anger,
  - type: text
    content: is the earth to be abandoned for your sake?
  - type: text
    content: Or must the rocks be moved from their place?
  '5':
  - type: text
    content: “The lamp of a wicked man is snuffed out;
  - type: text
    content: the flame of his fire stops burning.
  '6':
  - type: text
    content: The light in his tent becomes dark;
  - type: text
    content: the lamp beside him goes out.
  '7':
  - type: text
    content: The vigor of his step is weakened;
  - type: text
    content: his own schemes throw him down.
  '8':
  - type: text
    content: His feet thrust him into a net;
  - type: text
    content: he wanders into its mesh.
  '9':
  - type: text
    content: A trap seizes him by the heel;
  - type: text
    content: a snare holds him fast.
