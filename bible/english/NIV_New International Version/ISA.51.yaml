verses:
  '1':
  - type: heading
    content: Everlasting Salvation for Zion
  - type: text
    content: “Listen to me, you who pursue righteousness
  - type: text
    content: 'and who seek the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: Look to the rock from which you were cut
  - type: text
    content: and to the quarry from which you were hewn;
  '10':
  - type: text
    content: Was it not you who dried up the sea,
  - type: text
    content: the waters of the great deep,
  - type: text
    content: who made a road in the depths of the sea
  - type: text
    content: so that the redeemed might cross over?
  '11':
  - type: text
    content: 'Those the '
  - type: text
    content: Lord
  - type: text
    content: ' has rescued will return.'
  - type: text
    content: They will enter Zion with singing;
  - type: text
    content: everlasting joy will crown their heads.
  - type: text
    content: Gladness and joy will overtake them,
  - type: text
    content: and sorrow and sighing will flee away.
  '12':
  - type: text
    content: “I, even I, am he who comforts you.
  - type: text
    content: Who are you that you fear mere mortals,
  - type: text
    content: human beings who are but grass,
  '13':
  - type: text
    content: 'that you forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your Maker,'
  - type: text
    content: who stretches out the heavens
  - type: text
    content: and who lays the foundations of the earth,
  - type: text
    content: that you live in constant terror every day
  - type: text
    content: because of the wrath of the oppressor,
  - type: text
    content: who is bent on destruction?
  - type: text
    content: For where is the wrath of the oppressor?
  '14':
  - type: text
    content: The cowering prisoners will soon be set free;
  - type: text
    content: they will not die in their dungeon,
  - type: text
    content: nor will they lack bread.
  '15':
  - type: text
    content: 'For I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who stirs up the sea so that its waves roar—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is his name.'
  '16':
  - type: text
    content: I have put my words in your mouth
  - type: text
    content: and covered you with the shadow of my hand—
  - type: text
    content: I who set the heavens in place,
  - type: text
    content: who laid the foundations of the earth,
  - type: text
    content: and who say to Zion, ‘You are my people.’ ”
  - type: heading
    content: The Cup of the Lord’s Wrath
  '17':
  - type: text
    content: Awake, awake!
  - type: text
    content: Rise up, Jerusalem,
  - type: text
    content: 'you who have drunk from the hand of the '
  - type: text
    content: Lord
  - type: text
    content: the cup of his wrath,
  - type: text
    content: you who have drained to its dregs
  - type: text
    content: the goblet that makes people stagger.
  '18':
  - type: text
    content: Among all the children she bore
  - type: text
    content: there was none to guide her;
  - type: text
    content: among all the children she reared
  - type: text
    content: there was none to take her by the hand.
  '19':
  - type: text
    content: These double calamities have come upon you—
  - type: text
    content: who can comfort you?—
  - type: text
    content: ruin and destruction, famine and sword—
  - type: text
    content: who can
  - type: note
    content: Dead Sea Scrolls, Septuagint, Vulgate and Syriac; Masoretic Text / how can I
  - type: text
    content: ' console you?'
  '2':
  - type: text
    content: look to Abraham, your father,
  - type: text
    content: and to Sarah, who gave you birth.
  - type: text
    content: When I called him he was only one man,
  - type: text
    content: and I blessed him and made him many.
  '20':
  - type: text
    content: Your children have fainted;
  - type: text
    content: they lie at every street corner,
  - type: text
    content: like antelope caught in a net.
  - type: text
    content: 'They are filled with the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: with the rebuke of your God.
  '21':
  - type: text
    content: Therefore hear this, you afflicted one,
  - type: text
    content: made drunk, but not with wine.
  '22':
  - type: text
    content: 'This is what your Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: text
    content: 'your God, who defends his people:'
  - type: text
    content: “See, I have taken out of your hand
  - type: text
    content: the cup that made you stagger;
  - type: text
    content: from that cup, the goblet of my wrath,
  - type: text
    content: you will never drink again.
  '23':
  - type: text
    content: I will put it into the hands of your tormentors,
  - type: text
    content: who said to you,
  - type: text
    content: ‘Fall prostrate that we may walk on you.’
  - type: text
    content: And you made your back like the ground,
  - type: text
    content: like a street to be walked on.”
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will surely comfort Zion'
  - type: text
    content: and will look with compassion on all her ruins;
  - type: text
    content: he will make her deserts like Eden,
  - type: text
    content: 'her wastelands like the garden of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Joy and gladness will be found in her,
  - type: text
    content: thanksgiving and the sound of singing.
  '4':
  - type: text
    content: “Listen to me, my people;
  - type: text
    content: 'hear me, my nation:'
  - type: text
    content: Instruction will go out from me;
  - type: text
    content: my justice will become a light to the nations.
  '5':
  - type: text
    content: My righteousness draws near speedily,
  - type: text
    content: my salvation is on the way,
  - type: text
    content: and my arm will bring justice to the nations.
  - type: text
    content: The islands will look to me
  - type: text
    content: and wait in hope for my arm.
  '6':
  - type: text
    content: Lift up your eyes to the heavens,
  - type: text
    content: look at the earth beneath;
  - type: text
    content: the heavens will vanish like smoke,
  - type: text
    content: the earth will wear out like a garment
  - type: text
    content: and its inhabitants die like flies.
  - type: text
    content: But my salvation will last forever,
  - type: text
    content: my righteousness will never fail.
  '7':
  - type: text
    content: “Hear me, you who know what is right,
  - type: text
    content: 'you people who have taken my instruction to heart:'
  - type: text
    content: Do not fear the reproach of mere mortals
  - type: text
    content: or be terrified by their insults.
  '8':
  - type: text
    content: For the moth will eat them up like a garment;
  - type: text
    content: the worm will devour them like wool.
  - type: text
    content: But my righteousness will last forever,
  - type: text
    content: my salvation through all generations.”
  '9':
  - type: text
    content: 'Awake, awake, arm of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: clothe yourself with strength!
  - type: text
    content: Awake, as in days gone by,
  - type: text
    content: as in generations of old.
  - type: text
    content: Was it not you who cut Rahab to pieces,
  - type: text
    content: who pierced that monster through?
