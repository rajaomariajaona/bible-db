document_id: ISA.51
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Everlasting Salvation for Zion
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Listen to me, you who pursue righteousness
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and who seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look to the rock from which you were cut
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to the quarry from which you were hewn;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: look to Abraham, your father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to Sarah, who gave you birth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I called him he was only one man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I blessed him and made him many.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will surely comfort Zion'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will look with compassion on all her ruins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will make her deserts like Eden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'her wastelands like the garden of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Joy and gladness will be found in her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: thanksgiving and the sound of singing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Listen to me, my people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'hear me, my nation:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instruction will go out from me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my justice will become a light to the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My righteousness draws near speedily,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my salvation is on the way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my arm will bring justice to the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The islands will look to me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wait in hope for my arm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lift up your eyes to the heavens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: look at the earth beneath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the heavens will vanish like smoke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth will wear out like a garment
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its inhabitants die like flies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my salvation will last forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my righteousness will never fail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Hear me, you who know what is right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you people who have taken my instruction to heart:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not fear the reproach of mere mortals
- type: usfm
  marker: q2
  children:
  - type: text
    text: or be terrified by their insults.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For the moth will eat them up like a garment;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the worm will devour them like wool.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my righteousness will last forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my salvation through all generations.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Awake, awake, arm of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: clothe yourself with strength!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Awake, as in days gone by,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as in generations of old.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Was it not you who cut Rahab to pieces,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who pierced that monster through?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Was it not you who dried up the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the waters of the great deep,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who made a road in the depths of the sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that the redeemed might cross over?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Those the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rescued will return.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: They will enter Zion with singing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: everlasting joy will crown their heads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gladness and joy will overtake them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sorrow and sighing will flee away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “I, even I, am he who comforts you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who are you that you fear mere mortals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: human beings who are but grass,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'that you forget the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your Maker,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who stretches out the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who lays the foundations of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: that you live in constant terror every day
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the wrath of the oppressor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who is bent on destruction?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For where is the wrath of the oppressor?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The cowering prisoners will soon be set free;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will not die in their dungeon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will they lack bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who stirs up the sea so that its waves roar—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty is his name.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I have put my words in your mouth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and covered you with the shadow of my hand—
- type: usfm
  marker: q1
  children:
  - type: text
    text: I who set the heavens in place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who laid the foundations of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who say to Zion, ‘You are my people.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Cup of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Wrath
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Awake, awake!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rise up, Jerusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'you who have drunk from the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: the cup of his wrath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you who have drained to its dregs
- type: usfm
  marker: q2
  children:
  - type: text
    text: the goblet that makes people stagger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Among all the children she bore
- type: usfm
  marker: q2
  children:
  - type: text
    text: there was none to guide her;
- type: usfm
  marker: q1
  children:
  - type: text
    text: among all the children she reared
- type: usfm
  marker: q2
  children:
  - type: text
    text: there was none to take her by the hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: These double calamities have come upon you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: who can comfort you?—
- type: usfm
  marker: q1
  children:
  - type: text
    text: ruin and destruction, famine and sword—
- type: usfm
  marker: q2
  children:
  - type: text
    text: who can
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls, Septuagint, Vulgate and Syriac; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: / how can I
    marker-yv: yv-n
  - type: text
    text: ' console you?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Your children have fainted;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they lie at every street corner,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like antelope caught in a net.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They are filled with the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the rebuke of your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Therefore hear this, you afflicted one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made drunk, but not with wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This is what your Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'your God, who defends his people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “See, I have taken out of your hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: the cup that made you stagger;
- type: usfm
  marker: q1
  children:
  - type: text
    text: from that cup, the goblet of my wrath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will never drink again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I will put it into the hands of your tormentors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who said to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Fall prostrate that we may walk on you.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: And you made your back like the ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a street to be walked on.”
