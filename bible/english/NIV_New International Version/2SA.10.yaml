document_id: 2SA.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Defeats the Ammonites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the course of time, the king of the Ammonites died, and his son Hanun succeeded him as king. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He put the rest of the men under the command of Abishai his brother and deployed them against the Ammonites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab said, “If the Arameans are too strong for me, then you are to come to my rescue; but if the Ammonites are too strong for you, then I will come to rescue you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be strong, and let us fight bravely for our people and the cities of our God. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will do what is good in his sight.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joab and the troops with him advanced to fight the Arameans, and they fled before him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the Ammonites realized that the Arameans were fleeing, they fled before Abishai and went inside the city. So Joab returned from fighting the Ammonites and came to Jerusalem.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the Arameans saw that they had been routed by Israel, they regrouped. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hadadezer had Arameans brought from beyond the Euphrates River; they went to Helam, with Shobak the commander of Hadadezer’s army leading them.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David was told of this, he gathered all Israel, crossed the Jordan and went to Helam. The Arameans formed their battle lines to meet David and fought against him. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they fled before Israel, and David killed seven hundred of their charioteers and forty thousand of their foot soldiers.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also 1 Chron. 19:18); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: horsemen
      marker-yv: yv-n
    - type: text
      text: ' He also struck down Shobak the commander of their army, and he died there. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When all the kings who were vassals of Hadadezer saw that they had been routed by Israel, they made peace with the Israelites and became subject to them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the Arameans were afraid to help the Ammonites anymore.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David thought, “I will show kindness to Hanun son of Nahash, just as his father showed kindness to me.” So David sent a delegation to express his sympathy to Hanun concerning his father.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David’s men came to the land of the Ammonites, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Ammonite commanders said to Hanun their lord, “Do you think David is honoring your father by sending envoys to you to express sympathy? Hasn’t David sent them to you only to explore the city and spy it out and overthrow it?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Hanun seized David’s envoys, shaved off half of each man’s beard, cut off their garments at the buttocks, and sent them away.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When David was told about this, he sent messengers to meet the men, for they were greatly humiliated. The king said, “Stay at Jericho till your beards have grown, and then come back.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the Ammonites realized that they had become obnoxious to David, they hired twenty thousand Aramean foot soldiers from Beth Rehob and Zobah, as well as the king of Maakah with a thousand men, and also twelve thousand men from Tob.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On hearing this, David sent Joab out with the entire army of fighting men. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Ammonites came out and drew up in battle formation at the entrance of their city gate, while the Arameans of Zobah and Rehob and the men of Tob and Maakah were by themselves in the open country.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab saw that there were battle lines in front of him and behind him; so he selected some of the best troops in Israel and deployed them against the Arameans. '
