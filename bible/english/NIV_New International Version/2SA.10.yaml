document_id: 2SA.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Defeats the Ammonites
  - type: text
    content: 'In the course of time, the king of the Ammonites died, and his son Hanun succeeded him as king. '
  '10':
  - type: text
    content: 'He put the rest of the men under the command of Abishai his brother and deployed them against the Ammonites. '
  '11':
  - type: text
    content: 'Joab said, “If the Arameans are too strong for me, then you are to come to my rescue; but if the Ammonites are too strong for you, then I will come to rescue you. '
  '12':
  - type: text
    content: 'Be strong, and let us fight bravely for our people and the cities of our God. The '
  - type: text
    content: Lord
  - type: text
    content: ' will do what is good in his sight.”'
  '13':
  - type: text
    content: 'Then Joab and the troops with him advanced to fight the Arameans, and they fled before him. '
  '14':
  - type: text
    content: When the Ammonites realized that the Arameans were fleeing, they fled before Abishai and went inside the city. So Joab returned from fighting the Ammonites and came to Jerusalem.
  '15':
  - type: text
    content: 'After the Arameans saw that they had been routed by Israel, they regrouped. '
  '16':
  - type: text
    content: Hadadezer had Arameans brought from beyond the Euphrates River; they went to Helam, with Shobak the commander of Hadadezer’s army leading them.
  '17':
  - type: text
    content: 'When David was told of this, he gathered all Israel, crossed the Jordan and went to Helam. The Arameans formed their battle lines to meet David and fought against him. '
  '18':
  - type: text
    content: But they fled before Israel, and David killed seven hundred of their charioteers and forty thousand of their foot soldiers.
  - type: note
    content: Some Septuagint manuscripts (see also 1 Chron. 19:18); Hebrew horsemen
  - type: text
    content: ' He also struck down Shobak the commander of their army, and he died there. '
  '19':
  - type: text
    content: When all the kings who were vassals of Hadadezer saw that they had been routed by Israel, they made peace with the Israelites and became subject to them.
  - type: text
    content: So the Arameans were afraid to help the Ammonites anymore.
  '2':
  - type: text
    content: David thought, “I will show kindness to Hanun son of Nahash, just as his father showed kindness to me.” So David sent a delegation to express his sympathy to Hanun concerning his father.
  - type: text
    content: 'When David’s men came to the land of the Ammonites, '
  '3':
  - type: text
    content: 'the Ammonite commanders said to Hanun their lord, “Do you think David is honoring your father by sending envoys to you to express sympathy? Hasn’t David sent them to you only to explore the city and spy it out and overthrow it?” '
  '4':
  - type: text
    content: So Hanun seized David’s envoys, shaved off half of each man’s beard, cut off their garments at the buttocks, and sent them away.
  '5':
  - type: text
    content: When David was told about this, he sent messengers to meet the men, for they were greatly humiliated. The king said, “Stay at Jericho till your beards have grown, and then come back.”
  '6':
  - type: text
    content: When the Ammonites realized that they had become obnoxious to David, they hired twenty thousand Aramean foot soldiers from Beth Rehob and Zobah, as well as the king of Maakah with a thousand men, and also twelve thousand men from Tob.
  '7':
  - type: text
    content: 'On hearing this, David sent Joab out with the entire army of fighting men. '
  '8':
  - type: text
    content: The Ammonites came out and drew up in battle formation at the entrance of their city gate, while the Arameans of Zobah and Rehob and the men of Tob and Maakah were by themselves in the open country.
  '9':
  - type: text
    content: 'Joab saw that there were battle lines in front of him and behind him; so he selected some of the best troops in Israel and deployed them against the Arameans. '
