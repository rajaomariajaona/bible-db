document_id: PSA.86,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 86
  - type: text
    content: A prayer of David.
  - type: text
    content: 'Hear me, '
  - type: text
    content: Lord
  - type: text
    content: ', and answer me,'
  - type: text
    content: for I am poor and needy.
  '10':
  - type: text
    content: For you are great and do marvelous deeds;
  - type: text
    content: you alone are God.
  '11':
  - type: text
    content: 'Teach me your way, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: that I may rely on your faithfulness;
  - type: text
    content: give me an undivided heart,
  - type: text
    content: that I may fear your name.
  '12':
  - type: text
    content: I will praise you, Lord my God, with all my heart;
  - type: text
    content: I will glorify your name forever.
  '13':
  - type: text
    content: For great is your love toward me;
  - type: text
    content: you have delivered me from the depths,
  - type: text
    content: from the realm of the dead.
  '14':
  - type: text
    content: Arrogant foes are attacking me, O God;
  - type: text
    content: ruthless people are trying to kill me—
  - type: text
    content: they have no regard for you.
  '15':
  - type: text
    content: But you, Lord, are a compassionate and gracious God,
  - type: text
    content: slow to anger, abounding in love and faithfulness.
  '16':
  - type: text
    content: Turn to me and have mercy on me;
  - type: text
    content: show your strength in behalf of your servant;
  - type: text
    content: save me, because I serve you
  - type: text
    content: just as my mother did.
  '17':
  - type: text
    content: Give me a sign of your goodness,
  - type: text
    content: that my enemies may see it and be put to shame,
  - type: text
    content: 'for you, '
  - type: text
    content: Lord
  - type: text
    content: ', have helped me and comforted me.'
  '2':
  - type: text
    content: Guard my life, for I am faithful to you;
  - type: text
    content: save your servant who trusts in you.
  - type: text
    content: 'You are my God; '
  '3':
  - type: text
    content: have mercy on me, Lord,
  - type: text
    content: for I call to you all day long.
  '4':
  - type: text
    content: Bring joy to your servant, Lord,
  - type: text
    content: for I put my trust in you.
  '5':
  - type: text
    content: You, Lord, are forgiving and good,
  - type: text
    content: abounding in love to all who call to you.
  '6':
  - type: text
    content: 'Hear my prayer, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: listen to my cry for mercy.
  '7':
  - type: text
    content: When I am in distress, I call to you,
  - type: text
    content: because you answer me.
  '8':
  - type: text
    content: Among the gods there is none like you, Lord;
  - type: text
    content: no deeds can compare with yours.
  '9':
  - type: text
    content: All the nations you have made
  - type: text
    content: will come and worship before you, Lord;
  - type: text
    content: they will bring glory to your name.
