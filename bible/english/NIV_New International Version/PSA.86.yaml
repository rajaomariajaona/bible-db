document_id: PSA.86,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 86
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prayer of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and answer me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am poor and needy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you are great and do marvelous deeds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you alone are God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Teach me your way, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may rely on your faithfulness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: give me an undivided heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may fear your name.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will praise you, Lord my God, with all my heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will glorify your name forever.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For great is your love toward me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have delivered me from the depths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the realm of the dead.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arrogant foes are attacking me, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ruthless people are trying to kill me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have no regard for you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you, Lord, are a compassionate and gracious God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slow to anger, abounding in love and faithfulness.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn to me and have mercy on me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: show your strength in behalf of your servant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: save me, because I serve you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as my mother did.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give me a sign of your goodness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that my enemies may see it and be put to shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have helped me and comforted me.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guard my life, for I am faithful to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: save your servant who trusts in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You are my God; '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: have mercy on me, Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I call to you all day long.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring joy to your servant, Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I put my trust in you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, Lord, are forgiving and good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: abounding in love to all who call to you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear my prayer, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to my cry for mercy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I am in distress, I call to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you answer me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among the gods there is none like you, Lord;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no deeds can compare with yours.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the nations you have made
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come and worship before you, Lord;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will bring glory to your name.
