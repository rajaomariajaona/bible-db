document_id: JER.48,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message About Moab
  - type: text
    content: 'Concerning Moab:'
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says:'
  - type: text
    content: “Woe to Nebo, for it will be ruined.
  - type: text
    content: Kiriathaim will be disgraced and captured;
  - type: text
    content: the stronghold
  - type: note
    content: Or captured; / Misgab
  - type: text
    content: ' will be disgraced and shattered.'
  '10':
  - type: text
    content: '“A curse on anyone who is lax in doing the '
  - type: text
    content: Lord
  - type: text
    content: ’s work!
  - type: text
    content: A curse on anyone who keeps their sword from bloodshed!
  '11':
  - type: text
    content: “Moab has been at rest from youth,
  - type: text
    content: like wine left on its dregs,
  - type: text
    content: not poured from one jar to another—
  - type: text
    content: she has not gone into exile.
  - type: text
    content: So she tastes as she did,
  - type: text
    content: and her aroma is unchanged.
  '12':
  - type: text
    content: But days are coming,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I will send men who pour from pitchers,
  - type: text
    content: and they will pour her out;
  - type: text
    content: they will empty her pitchers
  - type: text
    content: and smash her jars.
  '13':
  - type: text
    content: Then Moab will be ashamed of Chemosh,
  - type: text
    content: as Israel was ashamed
  - type: text
    content: when they trusted in Bethel.
  '14':
  - type: text
    content: “How can you say, ‘We are warriors,
  - type: text
    content: men valiant in battle’?
  '15':
  - type: text
    content: Moab will be destroyed and her towns invaded;
  - type: text
    content: her finest young men will go down in the slaughter,”
  - type: text
    content: 'declares the King, whose name is the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '16':
  - type: text
    content: “The fall of Moab is at hand;
  - type: text
    content: her calamity will come quickly.
  '17':
  - type: text
    content: Mourn for her, all who live around her,
  - type: text
    content: all who know her fame;
  - type: text
    content: say, ‘How broken is the mighty scepter,
  - type: text
    content: how broken the glorious staff!’
  '18':
  - type: text
    content: “Come down from your glory
  - type: text
    content: and sit on the parched ground,
  - type: text
    content: you inhabitants of Daughter Dibon,
  - type: text
    content: for the one who destroys Moab
  - type: text
    content: will come up against you
  - type: text
    content: and ruin your fortified cities.
  '19':
  - type: text
    content: Stand by the road and watch,
  - type: text
    content: you who live in Aroer.
  - type: text
    content: Ask the man fleeing and the woman escaping,
  - type: text
    content: ask them, ‘What has happened?’
  '2':
  - type: text
    content: Moab will be praised no more;
  - type: text
    content: in Heshbon
  - type: note
    content: The Hebrew for Heshbon sounds like the Hebrew for plot.
  - type: text
    content: ' people will plot her downfall:'
  - type: text
    content: ‘Come, let us put an end to that nation.’
  - type: text
    content: You, the people of Madmen,
  - type: note
    content: The name of the Moabite town Madmen sounds like the Hebrew for be silenced.
  - type: text
    content: ' will also be silenced;'
  - type: text
    content: the sword will pursue you.
  '20':
  - type: text
    content: Moab is disgraced, for she is shattered.
  - type: text
    content: Wail and cry out!
  - type: text
    content: Announce by the Arnon
  - type: text
    content: that Moab is destroyed.
  '21':
  - type: text
    content: Judgment has come to the plateau—
  - type: text
    content: to Holon, Jahzah and Mephaath,
  '22':
  - type: text
    content: to Dibon, Nebo and Beth Diblathaim,
  '23':
  - type: text
    content: to Kiriathaim, Beth Gamul and Beth Meon,
  '24':
  - type: text
    content: to Kerioth and Bozrah—
  - type: text
    content: to all the towns of Moab, far and near.
  '25':
  - type: text
    content: Moab’s horn
  - type: note
    content: Horn here symbolizes strength.
  - type: text
    content: ' is cut off;'
  - type: text
    content: her arm is broken,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '26':
  - type: text
    content: “Make her drunk,
  - type: text
    content: 'for she has defied the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Let Moab wallow in her vomit;
  - type: text
    content: let her be an object of ridicule.
  '27':
  - type: text
    content: Was not Israel the object of your ridicule?
  - type: text
    content: Was she caught among thieves,
  - type: text
    content: that you shake your head in scorn
  - type: text
    content: whenever you speak of her?
  '28':
  - type: text
    content: Abandon your towns and dwell among the rocks,
  - type: text
    content: you who live in Moab.
  - type: text
    content: Be like a dove that makes its nest
  - type: text
    content: at the mouth of a cave.
  '29':
  - type: text
    content: “We have heard of Moab’s pride—
  - type: text
    content: how great is her arrogance!—
  - type: text
    content: of her insolence, her pride, her conceit
  - type: text
    content: and the haughtiness of her heart.
  '3':
  - type: text
    content: Cries of anguish arise from Horonaim,
  - type: text
    content: cries of great havoc and destruction.
  '30':
  - type: text
    content: I know her insolence but it is futile,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “and her boasts accomplish nothing.
  '31':
  - type: text
    content: Therefore I wail over Moab,
  - type: text
    content: for all Moab I cry out,
  - type: text
    content: I moan for the people of Kir Hareseth.
  '32':
  - type: text
    content: I weep for you, as Jazer weeps,
  - type: text
    content: you vines of Sibmah.
  - type: text
    content: Your branches spread as far as the sea
  - type: note
    content: Probably the Dead Sea
  - type: text
    content: ;
  - type: text
    content: they reached as far as
  - type: note
    content: Two Hebrew manuscripts and Septuagint; most Hebrew manuscripts as far as the Sea of
  - type: text
    content: ' Jazer.'
  - type: text
    content: The destroyer has fallen
  - type: text
    content: on your ripened fruit and grapes.
  '33':
  - type: text
    content: Joy and gladness are gone
  - type: text
    content: from the orchards and fields of Moab.
  - type: text
    content: I have stopped the flow of wine from the presses;
  - type: text
    content: no one treads them with shouts of joy.
  - type: text
    content: Although there are shouts,
  - type: text
    content: they are not shouts of joy.
  '34':
  - type: text
    content: “The sound of their cry rises
  - type: text
    content: from Heshbon to Elealeh and Jahaz,
  - type: text
    content: from Zoar as far as Horonaim and Eglath Shelishiyah,
  - type: text
    content: for even the waters of Nimrim are dried up.
  '35':
  - type: text
    content: In Moab I will put an end
  - type: text
    content: to those who make offerings on the high places
  - type: text
    content: and burn incense to their gods,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '36':
  - type: text
    content: “So my heart laments for Moab like the music of a pipe;
  - type: text
    content: it laments like a pipe for the people of Kir Hareseth.
  - type: text
    content: The wealth they acquired is gone.
  '37':
  - type: text
    content: Every head is shaved
  - type: text
    content: and every beard cut off;
  - type: text
    content: every hand is slashed
  - type: text
    content: and every waist is covered with sackcloth.
  '38':
  - type: text
    content: On all the roofs in Moab
  - type: text
    content: and in the public squares
  - type: text
    content: there is nothing but mourning,
  - type: text
    content: for I have broken Moab
  - type: text
    content: like a jar that no one wants,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '39':
  - type: text
    content: “How shattered she is! How they wail!
  - type: text
    content: How Moab turns her back in shame!
  - type: text
    content: Moab has become an object of ridicule,
  - type: text
    content: an object of horror to all those around her.”
  '4':
  - type: text
    content: Moab will be broken;
  - type: text
    content: her little ones will cry out.
  - type: note
    content: Hebrew; Septuagint / proclaim it to Zoar
  '40':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Look! An eagle is swooping down,
  - type: text
    content: spreading its wings over Moab.
  '41':
  - type: text
    content: Kerioth
  - type: note
    content: Or The cities
  - type: text
    content: ' will be captured'
  - type: text
    content: and the strongholds taken.
  - type: text
    content: In that day the hearts of Moab’s warriors
  - type: text
    content: will be like the heart of a woman in labor.
  '42':
  - type: text
    content: Moab will be destroyed as a nation
  - type: text
    content: 'because she defied the '
  - type: text
    content: Lord
  - type: text
    content: .
  '43':
  - type: text
    content: Terror and pit and snare await you,
  - type: text
    content: you people of Moab,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '44':
  - type: text
    content: “Whoever flees from the terror
  - type: text
    content: will fall into a pit,
  - type: text
    content: whoever climbs out of the pit
  - type: text
    content: will be caught in a snare;
  - type: text
    content: for I will bring on Moab
  - type: text
    content: the year of her punishment,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '45':
  - type: text
    content: “In the shadow of Heshbon
  - type: text
    content: the fugitives stand helpless,
  - type: text
    content: for a fire has gone out from Heshbon,
  - type: text
    content: a blaze from the midst of Sihon;
  - type: text
    content: it burns the foreheads of Moab,
  - type: text
    content: the skulls of the noisy boasters.
  '46':
  - type: text
    content: Woe to you, Moab!
  - type: text
    content: The people of Chemosh are destroyed;
  - type: text
    content: your sons are taken into exile
  - type: text
    content: and your daughters into captivity.
  '47':
  - type: text
    content: “Yet I will restore the fortunes of Moab
  - type: text
    content: in days to come,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Here ends the judgment on Moab.
  '5':
  - type: text
    content: They go up the hill to Luhith,
  - type: text
    content: weeping bitterly as they go;
  - type: text
    content: on the road down to Horonaim
  - type: text
    content: anguished cries over the destruction are heard.
  '6':
  - type: text
    content: Flee! Run for your lives;
  - type: text
    content: become like a bush
  - type: note
    content: Or like Aroer
  - type: text
    content: ' in the desert.'
  '7':
  - type: text
    content: Since you trust in your deeds and riches,
  - type: text
    content: you too will be taken captive,
  - type: text
    content: and Chemosh will go into exile,
  - type: text
    content: together with his priests and officials.
  '8':
  - type: text
    content: The destroyer will come against every town,
  - type: text
    content: and not a town will escape.
  - type: text
    content: The valley will be ruined
  - type: text
    content: and the plateau destroyed,
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '9':
  - type: text
    content: Put salt on Moab,
  - type: text
    content: for she will be laid waste
  - type: note
    content: Or Give wings to Moab, / for she will fly away
  - type: text
    content: ;
  - type: text
    content: her towns will become desolate,
  - type: text
    content: with no one to live in them.
