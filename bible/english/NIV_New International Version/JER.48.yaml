document_id: JER.48,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message About Moab
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Concerning Moab:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to Nebo, for it will be ruined.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Kiriathaim will be disgraced and captured;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the stronghold
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: captured; / Misgab
      marker-yv: yv-n
    - type: text
      text: ' will be disgraced and shattered.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“A curse on anyone who is lax in doing the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s work!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A curse on anyone who keeps their sword from bloodshed!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Moab has been at rest from youth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like wine left on its dregs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not poured from one jar to another—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she has not gone into exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So she tastes as she did,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her aroma is unchanged.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But days are coming,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “when I will send men who pour from pitchers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will pour her out;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will empty her pitchers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and smash her jars.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then Moab will be ashamed of Chemosh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as Israel was ashamed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they trusted in Bethel.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “How can you say, ‘We are warriors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: men valiant in battle’?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Moab will be destroyed and her towns invaded;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her finest young men will go down in the slaughter,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the King, whose name is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “The fall of Moab is at hand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her calamity will come quickly.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mourn for her, all who live around her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who know her fame;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: say, ‘How broken is the mighty scepter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how broken the glorious staff!’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Come down from your glory
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sit on the parched ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you inhabitants of Daughter Dibon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the one who destroys Moab
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come up against you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ruin your fortified cities.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Stand by the road and watch,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who live in Aroer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ask the man fleeing and the woman escaping,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ask them, ‘What has happened?’
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Moab will be praised no more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in Heshbon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Heshbon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' people will plot her downfall:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Come, let us put an end to that nation.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, the people of Madmen,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The name of the Moabite town Madmen sounds like the Hebrew for '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: be silenced.
      marker-yv: yv-n
    - type: text
      text: ' will also be silenced;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sword will pursue you.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Moab is disgraced, for she is shattered.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wail and cry out!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Announce by the Arnon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that Moab is destroyed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Judgment has come to the plateau—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to Holon, Jahzah and Mephaath,
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: to Dibon, Nebo and Beth Diblathaim,
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: to Kiriathaim, Beth Gamul and Beth Meon,
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: to Kerioth and Bozrah—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to all the towns of Moab, far and near.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Moab’s horn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes strength.
      marker-yv: yv-n
    - type: text
      text: ' is cut off;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her arm is broken,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “Make her drunk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for she has defied the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let Moab wallow in her vomit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let her be an object of ridicule.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Was not Israel the object of your ridicule?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Was she caught among thieves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you shake your head in scorn
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whenever you speak of her?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Abandon your towns and dwell among the rocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who live in Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be like a dove that makes its nest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the mouth of a cave.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “We have heard of Moab’s pride—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how great is her arrogance!—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of her insolence, her pride, her conceit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the haughtiness of her heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Cries of anguish arise from Horonaim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cries of great havoc and destruction.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: I know her insolence but it is futile,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “and her boasts accomplish nothing.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Therefore I wail over Moab,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all Moab I cry out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I moan for the people of Kir Hareseth.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: I weep for you, as Jazer weeps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you vines of Sibmah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your branches spread as far as the sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably the Dead Sea
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they reached as far as
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Two Hebrew manuscripts and Septuagint; most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: as far as the Sea of
      marker-yv: yv-n
    - type: text
      text: ' Jazer.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The destroyer has fallen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on your ripened fruit and grapes.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Joy and gladness are gone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the orchards and fields of Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have stopped the flow of wine from the presses;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one treads them with shouts of joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Although there are shouts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are not shouts of joy.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: “The sound of their cry rises
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from Heshbon to Elealeh and Jahaz,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from Zoar as far as Horonaim and Eglath Shelishiyah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for even the waters of Nimrim are dried up.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: In Moab I will put an end
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to those who make offerings on the high places
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burn incense to their gods,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: “So my heart laments for Moab like the music of a pipe;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it laments like a pipe for the people of Kir Hareseth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wealth they acquired is gone.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Every head is shaved
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every beard cut off;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: every hand is slashed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and every waist is covered with sackcloth.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: On all the roofs in Moab
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in the public squares
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there is nothing but mourning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have broken Moab
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a jar that no one wants,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: “How shattered she is! How they wail!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How Moab turns her back in shame!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab has become an object of ridicule,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an object of horror to all those around her.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moab will be broken;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her little ones will cry out.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: / proclaim it to Zoar
      marker-yv: yv-n
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
