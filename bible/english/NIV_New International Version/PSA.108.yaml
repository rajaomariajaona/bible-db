document_id: PSA.108,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 108In Hebrew texts 108:1-13 is numbered 108:2-14.
  - type: text
    content: A song. A psalm of David.
  - type: text
    content: My heart, O God, is steadfast;
  - type: text
    content: I will sing and make music with all my soul.
  '10':
  - type: text
    content: Who will bring me to the fortified city?
  - type: text
    content: Who will lead me to Edom?
  '11':
  - type: text
    content: Is it not you, God, you who have rejected us
  - type: text
    content: and no longer go out with our armies?
  '12':
  - type: text
    content: Give us aid against the enemy,
  - type: text
    content: for human help is worthless.
  '13':
  - type: text
    content: With God we will gain the victory,
  - type: text
    content: and he will trample down our enemies.
  '2':
  - type: text
    content: Awake, harp and lyre!
  - type: text
    content: I will awaken the dawn.
  '3':
  - type: text
    content: 'I will praise you, '
  - type: text
    content: Lord
  - type: text
    content: ', among the nations;'
  - type: text
    content: I will sing of you among the peoples.
  '4':
  - type: text
    content: For great is your love, higher than the heavens;
  - type: text
    content: your faithfulness reaches to the skies.
  '5':
  - type: text
    content: Be exalted, O God, above the heavens;
  - type: text
    content: let your glory be over all the earth.
  '6':
  - type: text
    content: Save us and help us with your right hand,
  - type: text
    content: that those you love may be delivered.
  '7':
  - type: text
    content: 'God has spoken from his sanctuary:'
  - type: text
    content: “In triumph I will parcel out Shechem
  - type: text
    content: and measure off the Valley of Sukkoth.
  '8':
  - type: text
    content: Gilead is mine, Manasseh is mine;
  - type: text
    content: Ephraim is my helmet,
  - type: text
    content: Judah is my scepter.
  '9':
  - type: text
    content: Moab is my washbasin,
  - type: text
    content: on Edom I toss my sandal;
  - type: text
    content: over Philistia I shout in triumph.”
