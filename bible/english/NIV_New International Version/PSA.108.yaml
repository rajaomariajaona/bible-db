document_id: PSA.108
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 108
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 108:1-13 is numbered 108:2-14.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A song. A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My heart, O God, is steadfast;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing and make music with all my soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Awake, harp and lyre!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will awaken the dawn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I will praise you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', among the nations;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing of you among the peoples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For great is your love, higher than the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your faithfulness reaches to the skies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Be exalted, O God, above the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let your glory be over all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Save us and help us with your right hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that those you love may be delivered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'God has spoken from his sanctuary:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “In triumph I will parcel out Shechem
- type: usfm
  marker: q2
  children:
  - type: text
    text: and measure off the Valley of Sukkoth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Gilead is mine, Manasseh is mine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim is my helmet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Judah is my scepter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Moab is my washbasin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: on Edom I toss my sandal;
- type: usfm
  marker: q2
  children:
  - type: text
    text: over Philistia I shout in triumph.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who will bring me to the fortified city?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will lead me to Edom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Is it not you, God, you who have rejected us
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no longer go out with our armies?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Give us aid against the enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for human help is worthless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: With God we will gain the victory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will trample down our enemies.
