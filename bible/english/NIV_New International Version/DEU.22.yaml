document_id: DEU.22,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'If you see your fellow Israelite’s ox or sheep straying, do not ignore it but be sure to take it back to its owner. '
  '10':
  - type: text
    content: Do not plow with an ox and a donkey yoked together.
  '11':
  - type: text
    content: Do not wear clothes of wool and linen woven together.
  '12':
  - type: text
    content: Make tassels on the four corners of the cloak you wear.
  - type: heading
    content: Marriage Violations
  '13':
  - type: text
    content: 'If a man takes a wife and, after sleeping with her, dislikes her '
  '14':
  - type: text
    content: 'and slanders her and gives her a bad name, saying, “I married this woman, but when I approached her, I did not find proof of her virginity,” '
  '15':
  - type: text
    content: 'then the young woman’s father and mother shall bring to the town elders at the gate proof that she was a virgin. '
  '16':
  - type: text
    content: 'Her father will say to the elders, “I gave my daughter in marriage to this man, but he dislikes her. '
  '17':
  - type: text
    content: 'Now he has slandered her and said, ‘I did not find your daughter to be a virgin.’ But here is the proof of my daughter’s virginity.” Then her parents shall display the cloth before the elders of the town, '
  '18':
  - type: text
    content: 'and the elders shall take the man and punish him. '
  '19':
  - type: text
    content: They shall fine him a hundred shekels
  - type: note
    content: That is, about 2 1/2 pounds or about 1.2 kilograms
  - type: text
    content: ' of silver and give them to the young woman’s father, because this man has given an Israelite virgin a bad name. She shall continue to be his wife; he must not divorce her as long as he lives.'
  '2':
  - type: text
    content: 'If they do not live near you or if you do not know who owns it, take it home with you and keep it until they come looking for it. Then give it back. '
  '20':
  - type: text
    content: 'If, however, the charge is true and no proof of the young woman’s virginity can be found, '
  '21':
  - type: text
    content: she shall be brought to the door of her father’s house and there the men of her town shall stone her to death. She has done an outrageous thing in Israel by being promiscuous while still in her father’s house. You must purge the evil from among you.
  '22':
  - type: text
    content: If a man is found sleeping with another man’s wife, both the man who slept with her and the woman must die. You must purge the evil from Israel.
  '23':
  - type: text
    content: 'If a man happens to meet in a town a virgin pledged to be married and he sleeps with her, '
  '24':
  - type: text
    content: you shall take both of them to the gate of that town and stone them to death—the young woman because she was in a town and did not scream for help, and the man because he violated another man’s wife. You must purge the evil from among you.
  '25':
  - type: text
    content: 'But if out in the country a man happens to meet a young woman pledged to be married and rapes her, only the man who has done this shall die. '
  '26':
  - type: text
    content: 'Do nothing to the woman; she has committed no sin deserving death. This case is like that of someone who attacks and murders a neighbor, '
  '27':
  - type: text
    content: for the man found the young woman out in the country, and though the betrothed woman screamed, there was no one to rescue her.
  '28':
  - type: text
    content: 'If a man happens to meet a virgin who is not pledged to be married and rapes her and they are discovered, '
  '29':
  - type: text
    content: he shall pay her father fifty shekels
  - type: note
    content: That is, about 1 1/4 pounds or about 575 grams
  - type: text
    content: ' of silver. He must marry the young woman, for he has violated her. He can never divorce her as long as he lives.'
  '3':
  - type: text
    content: Do the same if you find their donkey or cloak or anything else they have lost. Do not ignore it.
  '30':
  - type: text
    content: A man is not to marry his father’s wife; he must not dishonor his father’s bed.
  - type: note
    content: In Hebrew texts this verse (22:30) is numbered 23:1.
  '4':
  - type: text
    content: If you see your fellow Israelite’s donkey or ox fallen on the road, do not ignore it. Help the owner get it to its feet.
  '5':
  - type: text
    content: 'A woman must not wear men’s clothing, nor a man wear women’s clothing, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God detests anyone who does this.'
  '6':
  - type: text
    content: 'If you come across a bird’s nest beside the road, either in a tree or on the ground, and the mother is sitting on the young or on the eggs, do not take the mother with the young. '
  '7':
  - type: text
    content: You may take the young, but be sure to let the mother go, so that it may go well with you and you may have a long life.
  '8':
  - type: text
    content: When you build a new house, make a parapet around your roof so that you may not bring the guilt of bloodshed on your house if someone falls from the roof.
  '9':
  - type: text
    content: Do not plant two kinds of seed in your vineyard; if you do, not only the crops you plant but also the fruit of the vineyard will be defiled.
  - type: note
    content: Or be forfeited to the sanctuary
