document_id: JER.33,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Promise of Restoration
  - type: text
    content: 'While Jeremiah was still confined in the courtyard of the guard, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him a second time: '
  '10':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘You say about this place, “It is a desolate waste, without people or animals.” Yet in the towns of Judah and the streets of Jerusalem that are deserted, inhabited by neither people nor animals, there will be heard once more '
  '11':
  - type: text
    content: 'the sounds of joy and gladness, the voices of bride and bridegroom, and the voices of those who bring thank offerings to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying,'
  - type: text
    content: '“Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' is good;'
  - type: text
    content: his love endures forever.”
  - type: text
    content: 'For I will restore the fortunes of the land as they were before,’ says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘In this place, desolate and without people or animals—in all its towns there will again be pastures for shepherds to rest their flocks. '
  '13':
  - type: text
    content: 'In the towns of the hill country, of the western foothills and of the Negev, in the territory of Benjamin, in the villages around Jerusalem and in the towns of Judah, flocks will again pass under the hand of the one who counts them,’ says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: '“ ‘The days are coming,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘when I will fulfill the good promise I made to the people of Israel and Judah.'
  '15':
  - type: text
    content: “ ‘In those days and at that time
  - type: text
    content: I will make a righteous Branch sprout from David’s line;
  - type: text
    content: he will do what is just and right in the land.
  '16':
  - type: text
    content: In those days Judah will be saved
  - type: text
    content: and Jerusalem will live in safety.
  - type: text
    content: This is the name by which it
  - type: note
    content: Or he
  - type: text
    content: ' will be called:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Our Righteous Savior.’'
  '17':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘David will never fail to have a man to sit on the throne of Israel, '
  '18':
  - type: text
    content: nor will the Levitical priests ever fail to have a man to stand before me continually to offer burnt offerings, to burn grain offerings and to present sacrifices.’ ”
  '19':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '2':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says, he who made the earth, the '
  - type: text
    content: Lord
  - type: text
    content: ' who formed it and established it—the '
  - type: text
    content: Lord
  - type: text
    content: ' is his name: '
  '20':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘If you can break my covenant with the day and my covenant with the night, so that day and night no longer come at their appointed time, '
  '21':
  - type: text
    content: 'then my covenant with David my servant—and my covenant with the Levites who are priests ministering before me—can be broken and David will no longer have a descendant to reign on his throne. '
  '22':
  - type: text
    content: I will make the descendants of David my servant and the Levites who minister before me as countless as the stars in the sky and as measureless as the sand on the seashore.’ ”
  '23':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '24':
  - type: text
    content: '“Have you not noticed that these people are saying, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected the two kingdoms'
  - type: note
    content: Or families
  - type: text
    content: ' he chose’? So they despise my people and no longer regard them as a nation. '
  '25':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘If I have not made my covenant with day and night and established the laws of heaven and earth, '
  '26':
  - type: text
    content: then I will reject the descendants of Jacob and David my servant and will not choose one of his sons to rule over the descendants of Abraham, Isaac and Jacob. For I will restore their fortunes
  - type: note
    content: Or will bring them back from captivity
  - type: text
    content: ' and have compassion on them.’ ”'
  '3':
  - type: text
    content: '‘Call to me and I will answer you and tell you great and unsearchable things you do not know.’ '
  '4':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says about the houses in this city and the royal palaces of Judah that have been torn down to be used against the siege ramps and the sword '
  '5':
  - type: text
    content: in the fight with the Babylonians
  - type: note
    content: Or Chaldeans
  - type: text
    content: ': ‘They will be filled with the dead bodies of the people I will slay in my anger and wrath. I will hide my face from this city because of all its wickedness.'
  '6':
  - type: text
    content: '“ ‘Nevertheless, I will bring health and healing to it; I will heal my people and will let them enjoy abundant peace and security. '
  '7':
  - type: text
    content: I will bring Judah and Israel back from captivity
  - type: note
    content: Or will restore the fortunes of Judah and Israel
  - type: text
    content: ' and will rebuild them as they were before. '
  '8':
  - type: text
    content: 'I will cleanse them from all the sin they have committed against me and will forgive all their sins of rebellion against me. '
  '9':
  - type: text
    content: Then this city will bring me renown, joy, praise and honor before all nations on earth that hear of all the good things I do for it; and they will be in awe and will tremble at the abundant prosperity and peace I provide for it.’
