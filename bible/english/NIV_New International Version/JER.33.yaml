document_id: JER.33,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promise of Restoration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Jeremiah was still confined in the courtyard of the guard, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to him a second time: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: ‘You say about this place, “It is a desolate waste, without people or animals.” Yet in the towns of Judah and the streets of Jerusalem that are deserted, inhabited by neither people nor animals, there will be heard once more '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the sounds of joy and gladness, the voices of bride and bridegroom, and the voices of those who bring thank offerings to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his love endures forever.”
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For I will restore the fortunes of the land as they were before,’ says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: ‘In this place, desolate and without people or animals—in all its towns there will again be pastures for shepherds to rest their flocks. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the towns of the hill country, of the western foothills and of the Negev, in the territory of Benjamin, in the villages around Jerusalem and in the towns of Judah, flocks will again pass under the hand of the one who counts them,’ says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘The days are coming,’ declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', ‘when I will fulfill the good promise I made to the people of Israel and Judah.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘In those days and at that time
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make a righteous Branch sprout from David’s line;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will do what is just and right in the land.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In those days Judah will be saved
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Jerusalem will live in safety.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the name by which it
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he
      marker-yv: yv-n
    - type: text
      text: ' will be called:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Our Righteous Savior.’'
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: ‘David will never fail to have a man to sit on the throne of Israel, '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: nor will the Levitical priests ever fail to have a man to stand before me continually to offer burnt offerings, to burn grain offerings and to present sacrifices.’ ”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Jeremiah: '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says, he who made the earth, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who formed it and established it—the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is his name: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: ‘If you can break my covenant with the day and my covenant with the night, so that day and night no longer come at their appointed time, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then my covenant with David my servant—and my covenant with the Levites who are priests ministering before me—can be broken and David will no longer have a descendant to reign on his throne. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make the descendants of David my servant and the Levites who minister before me as countless as the stars in the sky and as measureless as the sand on the seashore.’ ”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Jeremiah: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Have you not noticed that these people are saying, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has rejected the two kingdoms'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: families
      marker-yv: yv-n
    - type: text
      text: ' he chose’? So they despise my people and no longer regard them as a nation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: ‘If I have not made my covenant with day and night and established the laws of heaven and earth, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then I will reject the descendants of Jacob and David my servant and will not choose one of his sons to rule over the descendants of Abraham, Isaac and Jacob. For I will restore their fortunes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will bring them back from captivity
      marker-yv: yv-n
    - type: text
      text: ' and have compassion on them.’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Call to me and I will answer you and tell you great and unsearchable things you do not know.’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says about the houses in this city and the royal palaces of Judah that have been torn down to be used against the siege ramps and the sword '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: in the fight with the Babylonians
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      marker-yv: yv-n
    - type: text
      text: ': ‘They will be filled with the dead bodies of the people I will slay in my anger and wrath. I will hide my face from this city because of all its wickedness.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Nevertheless, I will bring health and healing to it; I will heal my people and will let them enjoy abundant peace and security. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will bring Judah and Israel back from captivity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will restore the fortunes of Judah and Israel
      marker-yv: yv-n
    - type: text
      text: ' and will rebuild them as they were before. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will cleanse them from all the sin they have committed against me and will forgive all their sins of rebellion against me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then this city will bring me renown, joy, praise and honor before all nations on earth that hear of all the good things I do for it; and they will be in awe and will tremble at the abundant prosperity and peace I provide for it.’
