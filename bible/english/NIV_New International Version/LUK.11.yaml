document_id: LUK.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Teaching on Prayer
  - type: text
    content: One day Jesus was praying in a certain place. When he finished, one of his disciples said to him, “Lord, teach us to pray, just as John taught his disciples.”
  '10':
  - type: text
    content: For everyone who asks receives; the one who seeks finds; and to the one who knocks, the door will be opened.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “Which of you fathers, if your son asks for
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts for bread, will give him a stone? Or if he asks for
  - type: text
    content: a fish, will give him a snake instead?
  - type: text
    content: ' '
  '12':
  - type: text
    content: Or if he asks for an egg, will give him a scorpion?
  - type: text
    content: ' '
  '13':
  - type: text
    content: If you then, though you are evil, know how to give good gifts to your children, how much more will your Father in heaven give the Holy Spirit to those who ask him!”
  - type: heading
    content: Jesus and Beelzebul
  '14':
  - type: text
    content: 'Jesus was driving out a demon that was mute. When the demon left, the man who had been mute spoke, and the crowd was amazed. '
  '15':
  - type: text
    content: 'But some of them said, “By Beelzebul, the prince of demons, he is driving out demons.” '
  '16':
  - type: text
    content: Others tested him by asking for a sign from heaven.
  '17':
  - type: text
    content: 'Jesus knew their thoughts and said to them: '
  - type: text
    content: “Any kingdom divided against itself will be ruined, and a house divided against itself will fall.
  - type: text
    content: ' '
  '18':
  - type: text
    content: If Satan is divided against himself, how can his kingdom stand? I say this because you claim that I drive out demons by Beelzebul.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Now if I drive out demons by Beelzebul, by whom do your followers drive them out? So then, they will be your judges.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“When you pray, say:'
  - type: text
    content: “ ‘Father,
  - type: note
    content: Some manuscripts Our Father in heaven
  - type: text
    content: hallowed be your name,
  - type: text
    content: your kingdom come.
  - type: note
    content: Some manuscripts come. May your will be done on earth as it is in heaven.
  '20':
  - type: text
    content: But if I drive out demons by the finger of God, then the kingdom of God has come upon you.
  '21':
  - type: text
    content: ' '
  - type: text
    content: “When a strong man, fully armed, guards his own house, his possessions are safe.
  - type: text
    content: ' '
  '22':
  - type: text
    content: But when someone stronger attacks and overpowers him, he takes away the armor in which the man trusted and divides up his plunder.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “Whoever is not with me is against me, and whoever does not gather with me scatters.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “When an impure spirit comes out of a person, it goes through arid places seeking rest and does not find it. Then it says, ‘I will return to the house I left.’
  - type: text
    content: ' '
  '25':
  - type: text
    content: When it arrives, it finds the house swept clean and put in order.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Then it goes and takes seven other spirits more wicked than itself, and they go in and live there. And the final condition of that person is worse than the first.”
  '27':
  - type: text
    content: As Jesus was saying these things, a woman in the crowd called out, “Blessed is the mother who gave you birth and nursed you.”
  '28':
  - type: text
    content: 'He replied, '
  - type: text
    content: “Blessed rather are those who hear the word of God and obey it.”
  - type: heading
    content: The Sign of Jonah
  '29':
  - type: text
    content: 'As the crowds increased, Jesus said, '
  - type: text
    content: “This is a wicked generation. It asks for a sign, but none will be given it except the sign of Jonah.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: Give us each day our daily bread.
  '30':
  - type: text
    content: For as Jonah was a sign to the Ninevites, so also will the Son of Man be to this generation.
  - type: text
    content: ' '
  '31':
  - type: text
    content: The Queen of the South will rise at the judgment with the people of this generation and condemn them, for she came from the ends of the earth to listen to Solomon’s wisdom; and now something greater than Solomon is here.
  - type: text
    content: ' '
  '32':
  - type: text
    content: The men of Nineveh will stand up at the judgment with this generation and condemn it, for they repented at the preaching of Jonah; and now something greater than Jonah is here.
  - type: heading
    content: The Lamp of the Body
  '33':
  - type: text
    content: ' '
  - type: text
    content: “No one lights a lamp and puts it in a place where it will be hidden, or under a bowl. Instead they put it on its stand, so that those who come in may see the light.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Your eye is the lamp of your body. When your eyes are healthy,
  - type: note
    content: The Greek for healthy here implies generous.
  - type: text
    content: ' '
  - type: text
    content: your whole body also is full of light. But when they are unhealthy,
  - type: note
    content: The Greek for unhealthy here implies stingy.
  - type: text
    content: ' '
  - type: text
    content: your body also is full of darkness.
  - type: text
    content: ' '
  '35':
  - type: text
    content: See to it, then, that the light within you is not darkness.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Therefore, if your whole body is full of light, and no part of it dark, it will be just as full of light as when a lamp shines its light on you.”
  - type: heading
    content: Woes on the Pharisees and the Experts in the Law
  '37':
  - type: text
    content: 'When Jesus had finished speaking, a Pharisee invited him to eat with him; so he went in and reclined at the table. '
  '38':
  - type: text
    content: But the Pharisee was surprised when he noticed that Jesus did not first wash before the meal.
  '39':
  - type: text
    content: 'Then the Lord said to him, '
  - type: text
    content: “Now then, you Pharisees clean the outside of the cup and dish, but inside you are full of greed and wickedness.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: Forgive us our sins,
  - type: text
    content: for we also forgive everyone who sins against us.
  - type: note
    content: Greek everyone who is indebted to us
  - type: text
    content: And lead us not into temptation.
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts temptation, but deliver us from the evil one
  - type: text
    content: ’ ”
  '40':
  - type: text
    content: You foolish people! Did not the one who made the outside make the inside also?
  - type: text
    content: ' '
  '41':
  - type: text
    content: But now as for what is inside you—be generous to the poor, and everything will be clean for you.
  '42':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you Pharisees, because you give God a tenth of your mint, rue and all other kinds of garden herbs, but you neglect justice and the love of God. You should have practiced the latter without leaving the former undone.
  '43':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you Pharisees, because you love the most important seats in the synagogues and respectful greetings in the marketplaces.
  '44':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, because you are like unmarked graves, which people walk over without knowing it.”
  '45':
  - type: text
    content: One of the experts in the law answered him, “Teacher, when you say these things, you insult us also.”
  '46':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “And you experts in the law, woe to you, because you load people down with burdens they can hardly carry, and you yourselves will not lift one finger to help them.
  '47':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, because you build tombs for the prophets, and it was your ancestors who killed them.
  - type: text
    content: ' '
  '48':
  - type: text
    content: So you testify that you approve of what your ancestors did; they killed the prophets, and you build their tombs.
  - type: text
    content: ' '
  '49':
  - type: text
    content: Because of this, God in his wisdom said, ‘I will send them prophets and apostles, some of whom they will kill and others they will persecute.’
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “Suppose you have a friend, and you go to him at midnight and say, ‘Friend, lend me three loaves of bread;
  - type: text
    content: ' '
  '50':
  - type: text
    content: Therefore this generation will be held responsible for the blood of all the prophets that has been shed since the beginning of the world,
  - type: text
    content: ' '
  '51':
  - type: text
    content: from the blood of Abel to the blood of Zechariah, who was killed between the altar and the sanctuary. Yes, I tell you, this generation will be held responsible for it all.
  '52':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you experts in the law, because you have taken away the key to knowledge. You yourselves have not entered, and you have hindered those who were entering.”
  '53':
  - type: text
    content: 'When Jesus went outside, the Pharisees and the teachers of the law began to oppose him fiercely and to besiege him with questions, '
  '54':
  - type: text
    content: waiting to catch him in something he might say.
  '6':
  - type: text
    content: a friend of mine on a journey has come to me, and I have no food to offer him.’
  - type: text
    content: ' '
  '7':
  - type: text
    content: And suppose the one inside answers, ‘Don’t bother me. The door is already locked, and my children and I are in bed. I can’t get up and give you anything.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: I tell you, even though he will not get up and give you the bread because of friendship, yet because of your shameless audacity
  - type: note
    content: Or yet to preserve his good name
  - type: text
    content: ' '
  - type: text
    content: he will surely get up and give you as much as you need.
  '9':
  - type: text
    content: ' '
  - type: text
    content: '“So I say to you: Ask and it will be given to you; seek and you will find; knock and the door will be opened to you.'
  - type: text
    content: ' '
