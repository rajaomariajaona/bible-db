document_id: 2KI.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: An Axhead Floats
  - type: text
    content: 'The company of the prophets said to Elisha, “Look, the place where we meet with you is too small for us. '
  '10':
  - type: text
    content: So the king of Israel checked on the place indicated by the man of God. Time and again Elisha warned the king, so that he was on his guard in such places.
  '11':
  - type: text
    content: This enraged the king of Aram. He summoned his officers and demanded of them, “Tell me! Which of us is on the side of the king of Israel?”
  '12':
  - type: text
    content: “None of us, my lord the king,” said one of his officers, “but Elisha, the prophet who is in Israel, tells the king of Israel the very words you speak in your bedroom.”
  '13':
  - type: text
    content: '“Go, find out where he is,” the king ordered, “so I can send men and capture him.” The report came back: “He is in Dothan.” '
  '14':
  - type: text
    content: Then he sent horses and chariots and a strong force there. They went by night and surrounded the city.
  '15':
  - type: text
    content: When the servant of the man of God got up and went out early the next morning, an army with horses and chariots had surrounded the city. “Oh no, my lord! What shall we do?” the servant asked.
  '16':
  - type: text
    content: “Don’t be afraid,” the prophet answered. “Those who are with us are more than those who are with them.”
  '17':
  - type: text
    content: 'And Elisha prayed, “Open his eyes, '
  - type: text
    content: Lord
  - type: text
    content: ', so that he may see.” Then the '
  - type: text
    content: Lord
  - type: text
    content: ' opened the servant’s eyes, and he looked and saw the hills full of horses and chariots of fire all around Elisha.'
  '18':
  - type: text
    content: 'As the enemy came down toward him, Elisha prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Strike this army with blindness.” So he struck them with blindness, as Elisha had asked.'
  '19':
  - type: text
    content: Elisha told them, “This is not the road and this is not the city. Follow me, and I will lead you to the man you are looking for.” And he led them to Samaria.
  '2':
  - type: text
    content: Let us go to the Jordan, where each of us can get a pole; and let us build a place there for us to meet.”
  - type: text
    content: And he said, “Go.”
  '20':
  - type: text
    content: After they entered the city, Elisha said, “
  - type: text
    content: Lord
  - type: text
    content: ', open the eyes of these men so they can see.” Then the '
  - type: text
    content: Lord
  - type: text
    content: ' opened their eyes and they looked, and there they were, inside Samaria.'
  '21':
  - type: text
    content: When the king of Israel saw them, he asked Elisha, “Shall I kill them, my father? Shall I kill them?”
  '22':
  - type: text
    content: '“Do not kill them,” he answered. “Would you kill those you have captured with your own sword or bow? Set food and water before them so that they may eat and drink and then go back to their master.” '
  '23':
  - type: text
    content: So he prepared a great feast for them, and after they had finished eating and drinking, he sent them away, and they returned to their master. So the bands from Aram stopped raiding Israel’s territory.
  - type: heading
    content: Famine in Besieged Samaria
  '24':
  - type: text
    content: 'Some time later, Ben-Hadad king of Aram mobilized his entire army and marched up and laid siege to Samaria. '
  '25':
  - type: text
    content: There was a great famine in the city; the siege lasted so long that a donkey’s head sold for eighty shekels
  - type: note
    content: That is, about 2 pounds or about 920 grams
  - type: text
    content: ' of silver, and a quarter of a cab'
  - type: note
    content: That is, probably about 1/4 pound or about 100 grams
  - type: text
    content: ' of seed pods'
  - type: note
    content: Or of doves’ dung
  - type: text
    content: ' for five shekels.'
  - type: note
    content: That is, about 2 ounces or about 58 grams
  '26':
  - type: text
    content: As the king of Israel was passing by on the wall, a woman cried to him, “Help me, my lord the king!”
  '27':
  - type: text
    content: 'The king replied, “If the '
  - type: text
    content: Lord
  - type: text
    content: ' does not help you, where can I get help for you? From the threshing floor? From the winepress?” '
  '28':
  - type: text
    content: Then he asked her, “What’s the matter?”
  - type: text
    content: 'She answered, “This woman said to me, ‘Give up your son so we may eat him today, and tomorrow we’ll eat my son.’ '
  '29':
  - type: text
    content: So we cooked my son and ate him. The next day I said to her, ‘Give up your son so we may eat him,’ but she had hidden him.”
  '3':
  - type: text
    content: Then one of them said, “Won’t you please come with your servants?”
  - type: text
    content: '“I will,” Elisha replied. '
  '30':
  - type: text
    content: 'When the king heard the woman’s words, he tore his robes. As he went along the wall, the people looked, and they saw that, under his robes, he had sackcloth on his body. '
  '31':
  - type: text
    content: He said, “May God deal with me, be it ever so severely, if the head of Elisha son of Shaphat remains on his shoulders today!”
  '32':
  - type: text
    content: 'Now Elisha was sitting in his house, and the elders were sitting with him. The king sent a messenger ahead, but before he arrived, Elisha said to the elders, “Don’t you see how this murderer is sending someone to cut off my head? Look, when the messenger comes, shut the door and hold it shut against him. Is not the sound of his master’s footsteps behind him?” '
  '33':
  - type: text
    content: While he was still talking to them, the messenger came down to him.
  - type: text
    content: 'The king said, “This disaster is from the '
  - type: text
    content: Lord
  - type: text
    content: '. Why should I wait for the '
  - type: text
    content: Lord
  - type: text
    content: ' any longer?”'
  '4':
  - type: text
    content: And he went with them.
  - type: text
    content: 'They went to the Jordan and began to cut down trees. '
  '5':
  - type: text
    content: As one of them was cutting down a tree, the iron axhead fell into the water. “Oh no, my lord!” he cried out. “It was borrowed!”
  '6':
  - type: text
    content: 'The man of God asked, “Where did it fall?” When he showed him the place, Elisha cut a stick and threw it there, and made the iron float. '
  '7':
  - type: text
    content: “Lift it out,” he said. Then the man reached out his hand and took it.
  - type: heading
    content: Elisha Traps Blinded Arameans
  '8':
  - type: text
    content: Now the king of Aram was at war with Israel. After conferring with his officers, he said, “I will set up my camp in such and such a place.”
  '9':
  - type: text
    content: 'The man of God sent word to the king of Israel: “Beware of passing that place, because the Arameans are going down there.” '
