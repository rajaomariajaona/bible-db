verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Four Chariots
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I looked up again, and there before me were four chariots coming out from between two mountains—mountains of bronze. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take silver and gold from the exiles Heldai, Tobijah and Jedaiah, who have arrived from Babylon. Go the same day to the house of Josiah son of Zephaniah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Take the silver and gold and make a crown, and set it on the head of the high priest, Joshua son of Jozadak.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jehozadak
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jozadak
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tell him this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: ‘Here is the man whose name is the Branch, and he will branch out from his place and build the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is he who will build the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he will be clothed with majesty and will sit and rule on his throne. And he'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: there
      marker-yv: yv-n
    - type: text
      text: ' will be a priest on his throne. And there will be harmony between the two.’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The crown will be given to Heldai,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Syriac; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Helem
      marker-yv: yv-n
    - type: text
      text: ' Tobijah, Jedaiah and Hen'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and the gracious one, the
      marker-yv: yv-n
    - type: text
      text: ' son of Zephaniah as a memorial in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who are far away will come and help to build the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and you will know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty has sent me to you. This will happen if you diligently obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The first chariot had red horses, the second black, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the third white, and the fourth dappled—all of them powerful. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I asked the angel who was speaking to me, “What are these, my lord?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The angel answered me, “These are the four spirits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: winds
      marker-yv: yv-n
    - type: text
      text: ' of heaven, going out from standing in the presence of the Lord of the whole world. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The one with the black horses is going toward the north country, the one with the white horses toward the west,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: horses after them
      marker-yv: yv-n
    - type: text
      text: ' and the one with the dappled horses toward the south.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the powerful horses went out, they were straining to go throughout the earth. And he said, “Go throughout the earth!” So they went throughout the earth.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he called to me, “Look, those going toward the north country have given my Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: spirit
      marker-yv: yv-n
    - type: text
      text: ' rest in the land of the north.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Crown for Joshua
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
