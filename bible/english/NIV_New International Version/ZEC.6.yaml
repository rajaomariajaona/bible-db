document_id: ZEC.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Four Chariots
  - type: text
    content: 'I looked up again, and there before me were four chariots coming out from between two mountains—mountains of bronze. '
  '10':
  - type: text
    content: '“Take silver and gold from the exiles Heldai, Tobijah and Jedaiah, who have arrived from Babylon. Go the same day to the house of Josiah son of Zephaniah. '
  '11':
  - type: text
    content: Take the silver and gold and make a crown, and set it on the head of the high priest, Joshua son of Jozadak.
  - type: note
    content: Hebrew Jehozadak, a variant of Jozadak
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Tell him this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘Here is the man whose name is the Branch, and he will branch out from his place and build the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'It is he who will build the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he will be clothed with majesty and will sit and rule on his throne. And he'
  - type: note
    content: Or there
  - type: text
    content: ' will be a priest on his throne. And there will be harmony between the two.’ '
  '14':
  - type: text
    content: The crown will be given to Heldai,
  - type: note
    content: Syriac; Hebrew Helem
  - type: text
    content: ' Tobijah, Jedaiah and Hen'
  - type: note
    content: Or and the gracious one, the
  - type: text
    content: ' son of Zephaniah as a memorial in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Those who are far away will come and help to build the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has sent me to you. This will happen if you diligently obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  '2':
  - type: text
    content: 'The first chariot had red horses, the second black, '
  '3':
  - type: text
    content: 'the third white, and the fourth dappled—all of them powerful. '
  '4':
  - type: text
    content: I asked the angel who was speaking to me, “What are these, my lord?”
  '5':
  - type: text
    content: The angel answered me, “These are the four spirits
  - type: note
    content: Or winds
  - type: text
    content: ' of heaven, going out from standing in the presence of the Lord of the whole world. '
  '6':
  - type: text
    content: The one with the black horses is going toward the north country, the one with the white horses toward the west,
  - type: note
    content: Or horses after them
  - type: text
    content: ' and the one with the dappled horses toward the south.”'
  '7':
  - type: text
    content: When the powerful horses went out, they were straining to go throughout the earth. And he said, “Go throughout the earth!” So they went throughout the earth.
  '8':
  - type: text
    content: Then he called to me, “Look, those going toward the north country have given my Spirit
  - type: note
    content: Or spirit
  - type: text
    content: ' rest in the land of the north.”'
  - type: heading
    content: A Crown for Joshua
  '9':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
