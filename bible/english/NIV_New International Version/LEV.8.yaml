document_id: LEV.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ordination of Aaron and His Sons
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'Then Moses took the anointing oil and anointed the tabernacle and everything in it, and so consecrated them. '
  '11':
  - type: text
    content: 'He sprinkled some of the oil on the altar seven times, anointing the altar and all its utensils and the basin with its stand, to consecrate them. '
  '12':
  - type: text
    content: 'He poured some of the anointing oil on Aaron’s head and anointed him to consecrate him. '
  '13':
  - type: text
    content: 'Then he brought Aaron’s sons forward, put tunics on them, tied sashes around them and fastened caps on them, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '14':
  - type: text
    content: 'He then presented the bull for the sin offering, and Aaron and his sons laid their hands on its head. '
  '15':
  - type: text
    content: 'Moses slaughtered the bull and took some of the blood, and with his finger he put it on all the horns of the altar to purify the altar. He poured out the rest of the blood at the base of the altar. So he consecrated it to make atonement for it. '
  '16':
  - type: text
    content: 'Moses also took all the fat around the internal organs, the long lobe of the liver, and both kidneys and their fat, and burned it on the altar. '
  '17':
  - type: text
    content: 'But the bull with its hide and its flesh and its intestines he burned up outside the camp, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '18':
  - type: text
    content: 'He then presented the ram for the burnt offering, and Aaron and his sons laid their hands on its head. '
  '19':
  - type: text
    content: 'Then Moses slaughtered the ram and splashed the blood against the sides of the altar. '
  '2':
  - type: text
    content: “Bring Aaron and his sons, their garments, the anointing oil, the bull for the sin offering,
  - type: note
    content: Or purification offering; also in verse 14
  - type: text
    content: ' the two rams and the basket containing bread made without yeast, '
  '20':
  - type: text
    content: 'He cut the ram into pieces and burned the head, the pieces and the fat. '
  '21':
  - type: text
    content: 'He washed the internal organs and the legs with water and burned the whole ram on the altar. It was a burnt offering, a pleasing aroma, a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: ', as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '22':
  - type: text
    content: 'He then presented the other ram, the ram for the ordination, and Aaron and his sons laid their hands on its head. '
  '23':
  - type: text
    content: 'Moses slaughtered the ram and took some of its blood and put it on the lobe of Aaron’s right ear, on the thumb of his right hand and on the big toe of his right foot. '
  '24':
  - type: text
    content: 'Moses also brought Aaron’s sons forward and put some of the blood on the lobes of their right ears, on the thumbs of their right hands and on the big toes of their right feet. Then he splashed blood against the sides of the altar. '
  '25':
  - type: text
    content: 'After that, he took the fat, the fat tail, all the fat around the internal organs, the long lobe of the liver, both kidneys and their fat and the right thigh. '
  '26':
  - type: text
    content: 'And from the basket of bread made without yeast, which was before the '
  - type: text
    content: Lord
  - type: text
    content: ', he took one thick loaf, one thick loaf with olive oil mixed in, and one thin loaf, and he put these on the fat portions and on the right thigh. '
  '27':
  - type: text
    content: 'He put all these in the hands of Aaron and his sons, and they waved them before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering. '
  '28':
  - type: text
    content: 'Then Moses took them from their hands and burned them on the altar on top of the burnt offering as an ordination offering, a pleasing aroma, a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Moses also took the breast, which was his share of the ordination ram, and waved it before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '3':
  - type: text
    content: 'and gather the entire assembly at the entrance to the tent of meeting.” '
  '30':
  - type: text
    content: Then Moses took some of the anointing oil and some of the blood from the altar and sprinkled them on Aaron and his garments and on his sons and their garments. So he consecrated Aaron and his garments and his sons and their garments.
  '31':
  - type: text
    content: 'Moses then said to Aaron and his sons, “Cook the meat at the entrance to the tent of meeting and eat it there with the bread from the basket of ordination offerings, as I was commanded: ‘Aaron and his sons are to eat it.’ '
  '32':
  - type: text
    content: 'Then burn up the rest of the meat and the bread. '
  '33':
  - type: text
    content: 'Do not leave the entrance to the tent of meeting for seven days, until the days of your ordination are completed, for your ordination will last seven days. '
  '34':
  - type: text
    content: 'What has been done today was commanded by the '
  - type: text
    content: Lord
  - type: text
    content: ' to make atonement for you. '
  '35':
  - type: text
    content: 'You must stay at the entrance to the tent of meeting day and night for seven days and do what the '
  - type: text
    content: Lord
  - type: text
    content: ' requires, so you will not die; for that is what I have been commanded.”'
  '36':
  - type: text
    content: 'So Aaron and his sons did everything the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded through Moses.'
  '4':
  - type: text
    content: 'Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him, and the assembly gathered at the entrance to the tent of meeting.'
  '5':
  - type: text
    content: 'Moses said to the assembly, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded to be done.” '
  '6':
  - type: text
    content: 'Then Moses brought Aaron and his sons forward and washed them with water. '
  '7':
  - type: text
    content: 'He put the tunic on Aaron, tied the sash around him, clothed him with the robe and put the ephod on him. He also fastened the ephod with a decorative waistband, which he tied around him. '
  '8':
  - type: text
    content: 'He placed the breastpiece on him and put the Urim and Thummim in the breastpiece. '
  '9':
  - type: text
    content: 'Then he placed the turban on Aaron’s head and set the gold plate, the sacred emblem, on the front of it, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
