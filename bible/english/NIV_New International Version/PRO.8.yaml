document_id: PRO.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom’s Call
  - type: text
    content: Does not wisdom call out?
  - type: text
    content: Does not understanding raise her voice?
  '10':
  - type: text
    content: Choose my instruction instead of silver,
  - type: text
    content: knowledge rather than choice gold,
  '11':
  - type: text
    content: for wisdom is more precious than rubies,
  - type: text
    content: and nothing you desire can compare with her.
  '12':
  - type: text
    content: “I, wisdom, dwell together with prudence;
  - type: text
    content: I possess knowledge and discretion.
  '13':
  - type: text
    content: 'To fear the '
  - type: text
    content: Lord
  - type: text
    content: ' is to hate evil;'
  - type: text
    content: I hate pride and arrogance,
  - type: text
    content: evil behavior and perverse speech.
  '14':
  - type: text
    content: Counsel and sound judgment are mine;
  - type: text
    content: I have insight, I have power.
  '15':
  - type: text
    content: By me kings reign
  - type: text
    content: and rulers issue decrees that are just;
  '16':
  - type: text
    content: by me princes govern,
  - type: text
    content: and nobles—all who rule on earth.
  - type: note
    content: Some Hebrew manuscripts and Septuagint; other Hebrew manuscripts all righteous rulers
  '17':
  - type: text
    content: I love those who love me,
  - type: text
    content: and those who seek me find me.
  '18':
  - type: text
    content: With me are riches and honor,
  - type: text
    content: enduring wealth and prosperity.
  '19':
  - type: text
    content: My fruit is better than fine gold;
  - type: text
    content: what I yield surpasses choice silver.
  '2':
  - type: text
    content: At the highest point along the way,
  - type: text
    content: where the paths meet, she takes her stand;
  '20':
  - type: text
    content: I walk in the way of righteousness,
  - type: text
    content: along the paths of justice,
  '21':
  - type: text
    content: bestowing a rich inheritance on those who love me
  - type: text
    content: and making their treasuries full.
  '22':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' brought me forth as the first of his works,'
  - type: note
    content: Or way; or dominion
  - type: note
    content: Or The Lord possessed me at the beginning of his work; or The Lord brought me forth at the beginning of his work
  - type: text
    content: before his deeds of old;
  '23':
  - type: text
    content: I was formed long ages ago,
  - type: text
    content: at the very beginning, when the world came to be.
  '24':
  - type: text
    content: When there were no watery depths, I was given birth,
  - type: text
    content: when there were no springs overflowing with water;
  '25':
  - type: text
    content: before the mountains were settled in place,
  - type: text
    content: before the hills, I was given birth,
  '26':
  - type: text
    content: before he made the world or its fields
  - type: text
    content: or any of the dust of the earth.
  '27':
  - type: text
    content: I was there when he set the heavens in place,
  - type: text
    content: when he marked out the horizon on the face of the deep,
  '28':
  - type: text
    content: when he established the clouds above
  - type: text
    content: and fixed securely the fountains of the deep,
  '29':
  - type: text
    content: when he gave the sea its boundary
  - type: text
    content: so the waters would not overstep his command,
  - type: text
    content: and when he marked out the foundations of the earth.
  '3':
  - type: text
    content: beside the gate leading into the city,
  - type: text
    content: 'at the entrance, she cries aloud:'
  '30':
  - type: text
    content: Then I was constantly
  - type: note
    content: Or was the artisan; or was a little child
  - type: text
    content: ' at his side.'
  - type: text
    content: I was filled with delight day after day,
  - type: text
    content: rejoicing always in his presence,
  '31':
  - type: text
    content: rejoicing in his whole world
  - type: text
    content: and delighting in mankind.
  '32':
  - type: text
    content: “Now then, my children, listen to me;
  - type: text
    content: blessed are those who keep my ways.
  '33':
  - type: text
    content: Listen to my instruction and be wise;
  - type: text
    content: do not disregard it.
  '34':
  - type: text
    content: Blessed are those who listen to me,
  - type: text
    content: watching daily at my doors,
  - type: text
    content: waiting at my doorway.
  '35':
  - type: text
    content: For those who find me find life
  - type: text
    content: 'and receive favor from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '36':
  - type: text
    content: But those who fail to find me harm themselves;
  - type: text
    content: all who hate me love death.”
  '4':
  - type: text
    content: “To you, O people, I call out;
  - type: text
    content: I raise my voice to all mankind.
  '5':
  - type: text
    content: You who are simple, gain prudence;
  - type: text
    content: you who are foolish, set your hearts on it.
  - type: note
    content: Septuagint; Hebrew foolish, instruct your minds
  '6':
  - type: text
    content: Listen, for I have trustworthy things to say;
  - type: text
    content: I open my lips to speak what is right.
  '7':
  - type: text
    content: My mouth speaks what is true,
  - type: text
    content: for my lips detest wickedness.
  '8':
  - type: text
    content: All the words of my mouth are just;
  - type: text
    content: none of them is crooked or perverse.
  '9':
  - type: text
    content: To the discerning all of them are right;
  - type: text
    content: they are upright to those who have found knowledge.
