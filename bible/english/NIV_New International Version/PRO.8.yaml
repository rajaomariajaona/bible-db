document_id: PRO.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom’s Call
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Does not wisdom call out?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does not understanding raise her voice?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: At the highest point along the way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the paths meet, she takes her stand;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: beside the gate leading into the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'at the entrance, she cries aloud:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “To you, O people, I call out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I raise my voice to all mankind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You who are simple, gain prudence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who are foolish, set your hearts on it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: foolish, instruct your minds
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Listen, for I have trustworthy things to say;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I open my lips to speak what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My mouth speaks what is true,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my lips detest wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: All the words of my mouth are just;
- type: usfm
  marker: q2
  children:
  - type: text
    text: none of them is crooked or perverse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: To the discerning all of them are right;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are upright to those who have found knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Choose my instruction instead of silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: knowledge rather than choice gold,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: for wisdom is more precious than rubies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and nothing you desire can compare with her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “I, wisdom, dwell together with prudence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I possess knowledge and discretion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'To fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is to hate evil;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I hate pride and arrogance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: evil behavior and perverse speech.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Counsel and sound judgment are mine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have insight, I have power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: By me kings reign
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rulers issue decrees that are just;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: by me princes govern,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and nobles—all who rule on earth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts and Septuagint; other Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: all righteous rulers
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I love those who love me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who seek me find me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: With me are riches and honor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: enduring wealth and prosperity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: My fruit is better than fine gold;
- type: usfm
  marker: q2
  children:
  - type: text
    text: what I yield surpasses choice silver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I walk in the way of righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: along the paths of justice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: bestowing a rich inheritance on those who love me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and making their treasuries full.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' brought me forth as the first of his works,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: way
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dominion
    marker-yv: yv-n
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' possessed me at the beginning of his work'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' brought me forth at the beginning of his work'
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: before his deeds of old;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I was formed long ages ago,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the very beginning, when the world came to be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When there were no watery depths, I was given birth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when there were no springs overflowing with water;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: before the mountains were settled in place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: before the hills, I was given birth,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: before he made the world or its fields
- type: usfm
  marker: q2
  children:
  - type: text
    text: or any of the dust of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: I was there when he set the heavens in place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he marked out the horizon on the face of the deep,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: when he established the clouds above
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fixed securely the fountains of the deep,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: when he gave the sea its boundary
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the waters would not overstep his command,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and when he marked out the foundations of the earth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then I was constantly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: was the artisan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: was a little child
    marker-yv: yv-n
  - type: text
    text: ' at his side.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was filled with delight day after day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rejoicing always in his presence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: rejoicing in his whole world
- type: usfm
  marker: q2
  children:
  - type: text
    text: and delighting in mankind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “Now then, my children, listen to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: blessed are those who keep my ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Listen to my instruction and be wise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not disregard it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Blessed are those who listen to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: watching daily at my doors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting at my doorway.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: For those who find me find life
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and receive favor from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: But those who fail to find me harm themselves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who hate me love death.”
