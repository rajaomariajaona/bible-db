document_id: JOS.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Eastern Tribes Return Home
  - type: text
    content: 'Then Joshua summoned the Reubenites, the Gadites and the half-tribe of Manasseh '
  '10':
  - type: text
    content: 'When they came to Geliloth near the Jordan in the land of Canaan, the Reubenites, the Gadites and the half-tribe of Manasseh built an imposing altar there by the Jordan. '
  '11':
  - type: text
    content: 'And when the Israelites heard that they had built the altar on the border of Canaan at Geliloth near the Jordan on the Israelite side, '
  '12':
  - type: text
    content: the whole assembly of Israel gathered at Shiloh to go to war against them.
  '13':
  - type: text
    content: 'So the Israelites sent Phinehas son of Eleazar, the priest, to the land of Gilead—to Reuben, Gad and the half-tribe of Manasseh. '
  '14':
  - type: text
    content: With him they sent ten of the chief men, one from each of the tribes of Israel, each the head of a family division among the Israelite clans.
  '15':
  - type: text
    content: 'When they went to Gilead—to Reuben, Gad and the half-tribe of Manasseh—they said to them: '
  '16':
  - type: text
    content: '“The whole assembly of the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘How could you break faith with the God of Israel like this? How could you turn away from the '
  - type: text
    content: Lord
  - type: text
    content: ' and build yourselves an altar in rebellion against him now? '
  '17':
  - type: text
    content: 'Was not the sin of Peor enough for us? Up to this very day we have not cleansed ourselves from that sin, even though a plague fell on the community of the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '18':
  - type: text
    content: 'And are you now turning away from the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: '“ ‘If you rebel against the '
  - type: text
    content: Lord
  - type: text
    content: ' today, tomorrow he will be angry with the whole community of Israel. '
  '19':
  - type: text
    content: 'If the land you possess is defiled, come over to the '
  - type: text
    content: Lord
  - type: text
    content: '’s land, where the '
  - type: text
    content: Lord
  - type: text
    content: '’s tabernacle stands, and share the land with us. But do not rebel against the '
  - type: text
    content: Lord
  - type: text
    content: ' or against us by building an altar for yourselves, other than the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. '
  '2':
  - type: text
    content: 'and said to them, “You have done all that Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded, and you have obeyed me in everything I commanded. '
  '20':
  - type: text
    content: When Achan son of Zerah was unfaithful in regard to the devoted things,
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' did not wrath come on the whole community of Israel? He was not the only one who died for his sin.’ ”'
  '21':
  - type: text
    content: 'Then Reuben, Gad and the half-tribe of Manasseh replied to the heads of the clans of Israel: '
  '22':
  - type: text
    content: '“The Mighty One, God, the '
  - type: text
    content: Lord
  - type: text
    content: '! The Mighty One, God, the '
  - type: text
    content: Lord
  - type: text
    content: '! He knows! And let Israel know! If this has been in rebellion or disobedience to the '
  - type: text
    content: Lord
  - type: text
    content: ', do not spare us this day. '
  '23':
  - type: text
    content: 'If we have built our own altar to turn away from the '
  - type: text
    content: Lord
  - type: text
    content: ' and to offer burnt offerings and grain offerings, or to sacrifice fellowship offerings on it, may the '
  - type: text
    content: Lord
  - type: text
    content: ' himself call us to account.'
  '24':
  - type: text
    content: '“No! We did it for fear that some day your descendants might say to ours, ‘What do you have to do with the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel? '
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has made the Jordan a boundary between us and you—you Reubenites and Gadites! You have no share in the '
  - type: text
    content: Lord
  - type: text
    content: '.’ So your descendants might cause ours to stop fearing the '
  - type: text
    content: Lord
  - type: text
    content: .
  '26':
  - type: text
    content: '“That is why we said, ‘Let us get ready and build an altar—but not for burnt offerings or sacrifices.’ '
  '27':
  - type: text
    content: 'On the contrary, it is to be a witness between us and you and the generations that follow, that we will worship the '
  - type: text
    content: Lord
  - type: text
    content: ' at his sanctuary with our burnt offerings, sacrifices and fellowship offerings. Then in the future your descendants will not be able to say to ours, ‘You have no share in the '
  - type: text
    content: Lord
  - type: text
    content: .’
  '28':
  - type: text
    content: '“And we said, ‘If they ever say this to us, or to our descendants, we will answer: Look at the replica of the '
  - type: text
    content: Lord
  - type: text
    content: ’s altar, which our ancestors built, not for burnt offerings and sacrifices, but as a witness between us and you.’
  '29':
  - type: text
    content: '“Far be it from us to rebel against the '
  - type: text
    content: Lord
  - type: text
    content: ' and turn away from him today by building an altar for burnt offerings, grain offerings and sacrifices, other than the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God that stands before his tabernacle.”'
  '3':
  - type: text
    content: 'For a long time now—to this very day—you have not deserted your fellow Israelites but have carried out the mission the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gave you. '
  '30':
  - type: text
    content: 'When Phinehas the priest and the leaders of the community—the heads of the clans of the Israelites—heard what Reuben, Gad and Manasseh had to say, they were pleased. '
  '31':
  - type: text
    content: 'And Phinehas son of Eleazar, the priest, said to Reuben, Gad and Manasseh, “Today we know that the '
  - type: text
    content: Lord
  - type: text
    content: ' is with us, because you have not been unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' in this matter. Now you have rescued the Israelites from the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand.”
  '32':
  - type: text
    content: 'Then Phinehas son of Eleazar, the priest, and the leaders returned to Canaan from their meeting with the Reubenites and Gadites in Gilead and reported to the Israelites. '
  '33':
  - type: text
    content: They were glad to hear the report and praised God. And they talked no more about going to war against them to devastate the country where the Reubenites and the Gadites lived.
  '34':
  - type: text
    content: 'And the Reubenites and the Gadites gave the altar this name: A Witness Between Us—that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God.'
  '4':
  - type: text
    content: 'Now that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given them rest as he promised, return to your homes in the land that Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave you on the other side of the Jordan. '
  '5':
  - type: text
    content: 'But be very careful to keep the commandment and the law that Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave you: to love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, to walk in obedience to him, to keep his commands, to hold fast to him and to serve him with all your heart and with all your soul.”'
  '6':
  - type: text
    content: 'Then Joshua blessed them and sent them away, and they went to their homes. '
  '7':
  - type: text
    content: '(To the half-tribe of Manasseh Moses had given land in Bashan, and to the other half of the tribe Joshua gave land on the west side of the Jordan along with their fellow Israelites.) When Joshua sent them home, he blessed them, '
  '8':
  - type: text
    content: saying, “Return to your homes with your great wealth—with large herds of livestock, with silver, gold, bronze and iron, and a great quantity of clothing—and divide the plunder from your enemies with your fellow Israelites.”
  '9':
  - type: text
    content: 'So the Reubenites, the Gadites and the half-tribe of Manasseh left the Israelites at Shiloh in Canaan to return to Gilead, their own land, which they had acquired in accordance with the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' through Moses.'
