document_id: PHM.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, a prisoner of Christ Jesus, and Timothy our brother,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To Philemon our dear friend and fellow worker— '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that I appeal to you for my son Onesimus,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Onesimus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: useful.
      marker-yv: yv-n
    - type: text
      text: ' who became my son while I was in chains. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Formerly he was useless to you, but now he has become useful both to you and to me.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am sending him—who is my very heart—back to you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I would have liked to keep him with me so that he could take your place in helping me while I am in chains for the gospel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I did not want to do anything without your consent, so that any favor you do would not seem forced but would be voluntary. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Perhaps the reason he was separated from you for a little while was that you might have him back forever— '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: no longer as a slave, but better than a slave, as a dear brother. He is very dear to me but even dearer to you, both as a fellow man and as a brother in the Lord.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if you consider me a partner, welcome him as you would welcome me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he has done you any wrong or owes you anything, charge it to me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, Paul, am writing this with my own hand. I will pay it back—not to mention that you owe me your very self. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'also to Apphia our sister and Archippus our fellow soldier—and to the church that meets in your home:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I do wish, brother, that I may have some benefit from you in the Lord; refresh my heart in Christ. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Confident of your obedience, I write to you, knowing that you will do even more than I ask.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And one thing more: Prepare a guest room for me, because I hope to be restored to you in answer to your prayers.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Epaphras, my fellow prisoner in Christ Jesus, sends you greetings. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And so do Mark, Aristarchus, Demas and Luke, my fellow workers.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The grace of the Lord Jesus Christ be with your spirit.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace and peace to you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is plural; also in verses 22 and 25; elsewhere in this letter “you” is singular.
      marker-yv: yv-n
    - type: text
      text: ' from God our Father and the Lord Jesus Christ.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Thanksgiving and Prayer
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I always thank my God as I remember you in my prayers, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because I hear about your love for all his holy people and your faith in the Lord Jesus. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I pray that your partnership with us in the faith may be effective in deepening your understanding of every good thing we share for the sake of Christ. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Your love has given me great joy and encouragement, because you, brother, have refreshed the hearts of the Lord’s people.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Plea for Onesimus
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, although in Christ I could be bold and order you to do what you ought to do, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'yet I prefer to appeal to you on the basis of love. It is as none other than Paul—an old man and now also a prisoner of Christ Jesus— '
