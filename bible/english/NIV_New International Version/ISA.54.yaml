document_id: ISA.54,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Future Glory of Zion
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sing, barren woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who never bore a child;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: burst into song, shout for joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who were never in labor;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because more are the children of the desolate woman
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than of her who has a husband,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though the mountains be shaken
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the hills be removed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet my unfailing love for you will not be shaken
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor my covenant of peace be removed,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who has compassion on you.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Afflicted city, lashed by storms and not comforted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will rebuild you with stones of turquoise,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '54:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your foundations with lapis lazuli.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make your battlements of rubies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your gates of sparkling jewels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all your walls of precious stones.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All your children will be taught by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and great will be their peace.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In righteousness you will be established:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tyranny will be far from you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will have nothing to fear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terror will be far removed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will not come near you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If anyone does attack you, it will not be my doing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever attacks you will surrender to you.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, it is I who created the blacksmith
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who fans the coals into flame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and forges a weapon fit for its work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And it is I who have created the destroyer to wreak havoc;
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no weapon forged against you will prevail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will refute every tongue that accuses you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is the heritage of the servants of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and this is their vindication from me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Enlarge the place of your tent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stretch your tent curtains wide,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not hold back;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lengthen your cords,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strengthen your stakes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you will spread out to the right and to the left;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your descendants will dispossess nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and settle in their desolate cities.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not be afraid; you will not be put to shame.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not fear disgrace; you will not be humiliated.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will forget the shame of your youth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and remember no more the reproach of your widowhood.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your Maker is your husband—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is his name—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Holy One of Israel is your Redeemer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is called the God of all the earth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will call you back'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as if you were a wife deserted and distressed in spirit—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a wife who married young,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only to be rejected,” says your God.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For a brief moment I abandoned you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but with deep compassion I will bring you back.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a surge of anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hid my face from you for a moment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but with everlasting kindness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will have compassion on you,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your Redeemer.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “To me this is like the days of Noah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I swore that the waters of Noah would never again cover the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So now I have sworn not to be angry with you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to rebuke you again.
