document_id: ISA.54,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Future Glory of Zion
  - type: text
    content: “Sing, barren woman,
  - type: text
    content: you who never bore a child;
  - type: text
    content: burst into song, shout for joy,
  - type: text
    content: you who were never in labor;
  - type: text
    content: because more are the children of the desolate woman
  - type: text
    content: than of her who has a husband,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: Though the mountains be shaken
  - type: text
    content: and the hills be removed,
  - type: text
    content: yet my unfailing love for you will not be shaken
  - type: text
    content: nor my covenant of peace be removed,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ', who has compassion on you.'
  '11':
  - type: text
    content: “Afflicted city, lashed by storms and not comforted,
  - type: text
    content: I will rebuild you with stones of turquoise,
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: your foundations with lapis lazuli.
  '12':
  - type: text
    content: I will make your battlements of rubies,
  - type: text
    content: your gates of sparkling jewels,
  - type: text
    content: and all your walls of precious stones.
  '13':
  - type: text
    content: 'All your children will be taught by the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and great will be their peace.
  '14':
  - type: text
    content: 'In righteousness you will be established:'
  - type: text
    content: Tyranny will be far from you;
  - type: text
    content: you will have nothing to fear.
  - type: text
    content: Terror will be far removed;
  - type: text
    content: it will not come near you.
  '15':
  - type: text
    content: If anyone does attack you, it will not be my doing;
  - type: text
    content: whoever attacks you will surrender to you.
  '16':
  - type: text
    content: “See, it is I who created the blacksmith
  - type: text
    content: who fans the coals into flame
  - type: text
    content: and forges a weapon fit for its work.
  - type: text
    content: And it is I who have created the destroyer to wreak havoc;
  '17':
  - type: text
    content: no weapon forged against you will prevail,
  - type: text
    content: and you will refute every tongue that accuses you.
  - type: text
    content: 'This is the heritage of the servants of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and this is their vindication from me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: “Enlarge the place of your tent,
  - type: text
    content: stretch your tent curtains wide,
  - type: text
    content: do not hold back;
  - type: text
    content: lengthen your cords,
  - type: text
    content: strengthen your stakes.
  '3':
  - type: text
    content: For you will spread out to the right and to the left;
  - type: text
    content: your descendants will dispossess nations
  - type: text
    content: and settle in their desolate cities.
  '4':
  - type: text
    content: “Do not be afraid; you will not be put to shame.
  - type: text
    content: Do not fear disgrace; you will not be humiliated.
  - type: text
    content: You will forget the shame of your youth
  - type: text
    content: and remember no more the reproach of your widowhood.
  '5':
  - type: text
    content: For your Maker is your husband—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is his name—'
  - type: text
    content: the Holy One of Israel is your Redeemer;
  - type: text
    content: he is called the God of all the earth.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will call you back'
  - type: text
    content: as if you were a wife deserted and distressed in spirit—
  - type: text
    content: a wife who married young,
  - type: text
    content: only to be rejected,” says your God.
  '7':
  - type: text
    content: “For a brief moment I abandoned you,
  - type: text
    content: but with deep compassion I will bring you back.
  '8':
  - type: text
    content: In a surge of anger
  - type: text
    content: I hid my face from you for a moment,
  - type: text
    content: but with everlasting kindness
  - type: text
    content: I will have compassion on you,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' your Redeemer.'
  '9':
  - type: text
    content: “To me this is like the days of Noah,
  - type: text
    content: when I swore that the waters of Noah would never again cover the earth.
  - type: text
    content: So now I have sworn not to be angry with you,
  - type: text
    content: never to rebuke you again.
