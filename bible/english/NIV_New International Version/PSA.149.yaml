    children:
    - type: text
      text: 'Sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' a new song,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his praise in the assembly of his faithful people.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let Israel rejoice in their Maker;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the people of Zion be glad in their King.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them praise his name with dancing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make music to him with timbrel and harp.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes delight in his people;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he crowns the humble with victory.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let his faithful people rejoice in this honor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sing for joy on their beds.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the praise of God be in their mouths
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a double-edged sword in their hands,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to inflict vengeance on the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and punishment on the peoples,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to bind their kings with fetters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their nobles with shackles of iron,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to carry out the sentence written against them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this is the glory of all his faithful people.
