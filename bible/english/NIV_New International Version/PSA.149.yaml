  '5':
  - type: text
    content: Let his faithful people rejoice in this honor
  - type: text
    content: and sing for joy on their beds.
  '6':
  - type: text
    content: May the praise of God be in their mouths
  - type: text
    content: and a double-edged sword in their hands,
  '7':
  - type: text
    content: to inflict vengeance on the nations
  - type: text
    content: and punishment on the peoples,
  '8':
  - type: text
