  - type: text
    content: Let Israel rejoice in their Maker;
  - type: text
    content: let the people of Zion be glad in their King.
  '3':
  - type: text
    content: Let them praise his name with dancing
  - type: text
    content: and make music to him with timbrel and harp.
  '4':
  - type: text
    content: 'For the '
  - type: text
