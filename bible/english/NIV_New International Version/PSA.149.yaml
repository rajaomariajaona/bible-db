    children:
    - type: text
      text: '2'
  - type: text
    text: Let Israel rejoice in their Maker;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the people of Zion be glad in their King.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Let them praise his name with dancing
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make music to him with timbrel and harp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
