    text: and a double-edged sword in their hands,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: to inflict vengeance on the nations
- type: usfm
  marker: q2
  children:
