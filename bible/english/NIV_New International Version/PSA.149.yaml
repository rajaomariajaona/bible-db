    text: he crowns the humble with victory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let his faithful people rejoice in this honor
- type: usfm
  marker: q2
  children:
