document_id: MAT.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Warning Against Hypocrisy
  - type: text
    content: 'Then Jesus said to the crowds and to his disciples: '
  '10':
  - type: text
    content: Nor are you to be called instructors, for you have one Instructor, the Messiah.
  - type: text
    content: ' '
  '11':
  - type: text
    content: The greatest among you will be your servant.
  - type: text
    content: ' '
  '12':
  - type: text
    content: For those who exalt themselves will be humbled, and those who humble themselves will be exalted.
  - type: heading
    content: Seven Woes on the Teachers of the Law and the Pharisees
  '13':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, teachers of the law and Pharisees, you hypocrites! You shut the door of the kingdom of heaven in people’s faces. You yourselves do not enter, nor will you let those enter who are trying to.
  - type: text
    content: ' '
  '14':
  - type: note
    content: Some manuscripts include here words similar to Mark 12:40 and Luke 20:47.
  '15':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, teachers of the law and Pharisees, you hypocrites! You travel over land and sea to win a single convert, and when you have succeeded, you make them twice as much a child of hell as you are.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, blind guides! You say, ‘If anyone swears by the temple, it means nothing; but anyone who swears by the gold of the temple is bound by that oath.’
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'You blind fools! Which is greater: the gold, or the temple that makes the gold sacred?'
  - type: text
    content: ' '
  '18':
  - type: text
    content: You also say, ‘If anyone swears by the altar, it means nothing; but anyone who swears by the gift on the altar is bound by that oath.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'You blind men! Which is greater: the gift, or the altar that makes the gift sacred?'
  - type: text
    content: ' '
  '2':
  - type: text
    content: “The teachers of the law and the Pharisees sit in Moses’ seat.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Therefore, anyone who swears by the altar swears by it and by everything on it.
  - type: text
    content: ' '
  '21':
  - type: text
    content: And anyone who swears by the temple swears by it and by the one who dwells in it.
  - type: text
    content: ' '
  '22':
  - type: text
    content: And anyone who swears by heaven swears by God’s throne and by the one who sits on it.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, teachers of the law and Pharisees, you hypocrites! You give a tenth of your spices—mint, dill and cumin. But you have neglected the more important matters of the law—justice, mercy and faithfulness. You should have practiced the latter, without neglecting the former.
  - type: text
    content: ' '
  '24':
  - type: text
    content: You blind guides! You strain out a gnat but swallow a camel.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, teachers of the law and Pharisees, you hypocrites! You clean the outside of the cup and dish, but inside they are full of greed and self-indulgence.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Blind Pharisee! First clean the inside of the cup and dish, and then the outside also will be clean.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, teachers of the law and Pharisees, you hypocrites! You are like whitewashed tombs, which look beautiful on the outside but on the inside are full of the bones of the dead and everything unclean.
  - type: text
    content: ' '
  '28':
  - type: text
    content: In the same way, on the outside you appear to people as righteous but on the inside you are full of hypocrisy and wickedness.
  '29':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, teachers of the law and Pharisees, you hypocrites! You build tombs for the prophets and decorate the graves of the righteous.
  - type: text
    content: ' '
  '3':
  - type: text
    content: So you must be careful to do everything they tell you. But do not do what they do, for they do not practice what they preach.
  - type: text
    content: ' '
  '30':
  - type: text
    content: And you say, ‘If we had lived in the days of our ancestors, we would not have taken part with them in shedding the blood of the prophets.’
  - type: text
    content: ' '
  '31':
  - type: text
    content: So you testify against yourselves that you are the descendants of those who murdered the prophets.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Go ahead, then, and complete what your ancestors started!
  '33':
  - type: text
    content: ' '
  - type: text
    content: “You snakes! You brood of vipers! How will you escape being condemned to hell?
  - type: text
    content: ' '
  '34':
  - type: text
    content: Therefore I am sending you prophets and sages and teachers. Some of them you will kill and crucify; others you will flog in your synagogues and pursue from town to town.
  - type: text
    content: ' '
  '35':
  - type: text
    content: And so upon you will come all the righteous blood that has been shed on earth, from the blood of righteous Abel to the blood of Zechariah son of Berekiah, whom you murdered between the temple and the altar.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Truly I tell you, all this will come on this generation.
  '37':
  - type: text
    content: ' '
  - type: text
    content: “Jerusalem, Jerusalem, you who kill the prophets and stone those sent to you, how often I have longed to gather your children together, as a hen gathers her chicks under her wings, and you were not willing.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Look, your house is left to you desolate.
  - type: text
    content: ' '
  '39':
  - type: text
    content: For I tell you, you will not see me again until you say, ‘Blessed is he who comes in the name of the Lord.’
  - type: note
    content: Psalm 118:26
  - type: text
    content: ”
  '4':
  - type: text
    content: They tie up heavy, cumbersome loads and put them on other people’s shoulders, but they themselves are not willing to lift a finger to move them.
  '5':
  - type: text
    content: ' '
  - type: text
    content: '“Everything they do is done for people to see: They make their phylacteries'
  - type: text
    content: ' '
  - type: note
    content: That is, boxes containing Scripture verses, worn on forehead and arm
  - type: text
    content: wide and the tassels on their garments long;
  - type: text
    content: ' '
  '6':
  - type: text
    content: they love the place of honor at banquets and the most important seats in the synagogues;
  - type: text
    content: ' '
  '7':
  - type: text
    content: they love to be greeted with respect in the marketplaces and to be called ‘Rabbi’ by others.
  '8':
  - type: text
    content: ' '
  - type: text
    content: “But you are not to be called ‘Rabbi,’ for you have one Teacher, and you are all brothers.
  - type: text
    content: ' '
  '9':
  - type: text
    content: And do not call anyone on earth ‘father,’ for you have one Father, and he is in heaven.
  - type: text
    content: ' '
