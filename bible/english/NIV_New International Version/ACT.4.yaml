document_id: ACT.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter and John Before the Sanhedrin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The priests and the captain of the temple guard and the Sadducees came up to Peter and John while they were speaking to the people. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'then know this, you and all the people of Israel: It is by the name of Jesus Christ of Nazareth, whom you crucified but whom God raised from the dead, that this man stands before you healed. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Jesus is
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘the stone you builders rejected,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which has become the cornerstone.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 118:22
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Salvation is found in no one else, for there is no other name under heaven given to mankind by which we must be saved.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When they saw the courage of Peter and John and realized that they were unschooled, ordinary men, they were astonished and they took note that these men had been with Jesus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But since they could see the man who had been healed standing there with them, there was nothing they could say. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So they ordered them to withdraw from the Sanhedrin and then conferred together. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“What are we going to do with these men?” they asked. “Everyone living in Jerusalem knows they have performed a notable sign, and we cannot deny it. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: But to stop this thing from spreading any further among the people, we must warn them to speak no longer to anyone in this name.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then they called them in again and commanded them not to speak or teach at all in the name of Jesus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But Peter and John replied, “Which is right in God’s eyes: to listen to you, or to him? You be the judges! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'They were greatly disturbed because the apostles were teaching the people, proclaiming in Jesus the resurrection of the dead. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: As for us, we cannot help speaking about what we have seen and heard.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'After further threats they let them go. They could not decide how to punish them, because all the people were praising God for what had happened. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For the man who was miraculously healed was over forty years old.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Believers Pray
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'On their release, Peter and John went back to their own people and reported all that the chief priests and the elders had said to them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'When they heard this, they raised their voices together in prayer to God. “Sovereign Lord,” they said, “you made the heavens and the earth and the sea, and everything in them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'You spoke by the Holy Spirit through the mouth of your servant, our father David:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Why do the nations rage
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the peoples plot in vain?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The kings of the earth rise up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the rulers band together
  - type: usfm
    marker: q1
    children:
    - type: text
      text: against the Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and against his anointed one.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Messiah or Christ
      marker-yv: yv-n
    - type: text
      text: ’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 2:1,2
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Indeed Herod and Pontius Pilate met together with the Gentiles and the people of Israel in this city to conspire against your holy servant Jesus, whom you anointed. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'They did what your power and will had decided beforehand should happen. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Now, Lord, consider their threats and enable your servants to speak your word with great boldness. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'They seized Peter and John and, because it was evening, they put them in jail until the next day. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Stretch out your hand to heal and perform signs and wonders through the name of your holy servant Jesus.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: After they prayed, the place where they were meeting was shaken. And they were all filled with the Holy Spirit and spoke the word of God boldly.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Believers Share Their Possessions
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'All the believers were one in heart and mind. No one claimed that any of their possessions was their own, but they shared everything they had. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'With great power the apostles continued to testify to the resurrection of the Lord Jesus. And God’s grace was so powerfully at work in them all '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'that there were no needy persons among them. For from time to time those who owned land or houses sold them, brought the money from the sales '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: and put it at the apostles’ feet, and it was distributed to anyone who had need.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Joseph, a Levite from Cyprus, whom the apostles called Barnabas (which means “son of encouragement”), '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: sold a field he owned and brought the money and put it at the apostles’ feet.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But many who heard the message believed; so the number of men who believed grew to about five thousand.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The next day the rulers, the elders and the teachers of the law met in Jerusalem. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Annas the high priest was there, and so were Caiaphas, John, Alexander and others of the high priest’s family. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They had Peter and John brought before them and began to question them: “By what power or what name did you do this?”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Peter, filled with the Holy Spirit, said to them: “Rulers and elders of the people! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'If we are being called to account today for an act of kindness shown to a man who was lame and are being asked how he was healed, '
