document_id: ACT.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter and John Before the Sanhedrin
  - type: text
    content: 'The priests and the captain of the temple guard and the Sadducees came up to Peter and John while they were speaking to the people. '
  '10':
  - type: text
    content: 'then know this, you and all the people of Israel: It is by the name of Jesus Christ of Nazareth, whom you crucified but whom God raised from the dead, that this man stands before you healed. '
  '11':
  - type: text
    content: Jesus is
  - type: text
    content: “ ‘the stone you builders rejected,
  - type: text
    content: which has become the cornerstone.’
  - type: note
    content: Psalm 118:22
  '12':
  - type: text
    content: Salvation is found in no one else, for there is no other name under heaven given to mankind by which we must be saved.”
  '13':
  - type: text
    content: 'When they saw the courage of Peter and John and realized that they were unschooled, ordinary men, they were astonished and they took note that these men had been with Jesus. '
  '14':
  - type: text
    content: 'But since they could see the man who had been healed standing there with them, there was nothing they could say. '
  '15':
  - type: text
    content: 'So they ordered them to withdraw from the Sanhedrin and then conferred together. '
  '16':
  - type: text
    content: '“What are we going to do with these men?” they asked. “Everyone living in Jerusalem knows they have performed a notable sign, and we cannot deny it. '
  '17':
  - type: text
    content: But to stop this thing from spreading any further among the people, we must warn them to speak no longer to anyone in this name.”
  '18':
  - type: text
    content: 'Then they called them in again and commanded them not to speak or teach at all in the name of Jesus. '
  '19':
  - type: text
    content: 'But Peter and John replied, “Which is right in God’s eyes: to listen to you, or to him? You be the judges! '
  '2':
  - type: text
    content: 'They were greatly disturbed because the apostles were teaching the people, proclaiming in Jesus the resurrection of the dead. '
  '20':
  - type: text
    content: As for us, we cannot help speaking about what we have seen and heard.”
  '21':
  - type: text
    content: 'After further threats they let them go. They could not decide how to punish them, because all the people were praising God for what had happened. '
  '22':
  - type: text
    content: For the man who was miraculously healed was over forty years old.
  - type: heading
    content: The Believers Pray
  '23':
  - type: text
    content: 'On their release, Peter and John went back to their own people and reported all that the chief priests and the elders had said to them. '
  '24':
  - type: text
    content: 'When they heard this, they raised their voices together in prayer to God. “Sovereign Lord,” they said, “you made the heavens and the earth and the sea, and everything in them. '
  '25':
  - type: text
    content: 'You spoke by the Holy Spirit through the mouth of your servant, our father David:'
  - type: text
    content: “ ‘Why do the nations rage
  - type: text
    content: and the peoples plot in vain?
  '26':
  - type: text
    content: The kings of the earth rise up
  - type: text
    content: and the rulers band together
  - type: text
    content: against the Lord
  - type: text
    content: and against his anointed one.
  - type: note
    content: That is, Messiah or Christ
  - type: text
    content: ’
  - type: note
    content: Psalm 2:1,2
  '27':
  - type: text
    content: 'Indeed Herod and Pontius Pilate met together with the Gentiles and the people of Israel in this city to conspire against your holy servant Jesus, whom you anointed. '
  '28':
  - type: text
    content: 'They did what your power and will had decided beforehand should happen. '
  '29':
  - type: text
    content: 'Now, Lord, consider their threats and enable your servants to speak your word with great boldness. '
  '3':
  - type: text
    content: 'They seized Peter and John and, because it was evening, they put them in jail until the next day. '
  '30':
  - type: text
    content: Stretch out your hand to heal and perform signs and wonders through the name of your holy servant Jesus.”
  '31':
  - type: text
    content: After they prayed, the place where they were meeting was shaken. And they were all filled with the Holy Spirit and spoke the word of God boldly.
  - type: heading
    content: The Believers Share Their Possessions
  '32':
  - type: text
    content: 'All the believers were one in heart and mind. No one claimed that any of their possessions was their own, but they shared everything they had. '
  '33':
  - type: text
    content: 'With great power the apostles continued to testify to the resurrection of the Lord Jesus. And God’s grace was so powerfully at work in them all '
  '34':
  - type: text
    content: 'that there were no needy persons among them. For from time to time those who owned land or houses sold them, brought the money from the sales '
  '35':
  - type: text
    content: and put it at the apostles’ feet, and it was distributed to anyone who had need.
  '36':
  - type: text
    content: 'Joseph, a Levite from Cyprus, whom the apostles called Barnabas (which means “son of encouragement”), '
  '37':
  - type: text
    content: sold a field he owned and brought the money and put it at the apostles’ feet.
  '4':
  - type: text
    content: But many who heard the message believed; so the number of men who believed grew to about five thousand.
  '5':
  - type: text
    content: 'The next day the rulers, the elders and the teachers of the law met in Jerusalem. '
  '6':
  - type: text
    content: 'Annas the high priest was there, and so were Caiaphas, John, Alexander and others of the high priest’s family. '
  '7':
  - type: text
    content: 'They had Peter and John brought before them and began to question them: “By what power or what name did you do this?”'
  '8':
  - type: text
    content: 'Then Peter, filled with the Holy Spirit, said to them: “Rulers and elders of the people! '
  '9':
  - type: text
    content: 'If we are being called to account today for an act of kindness shown to a man who was lame and are being asked how he was healed, '
