document_id: 1CO.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Concerning Food Sacrificed to Idols
  - type: text
    content: 'Now about food sacrificed to idols: We know that “We all possess knowledge.” But knowledge puffs up while love builds up. '
  '10':
  - type: text
    content: 'For if someone with a weak conscience sees you, with all your knowledge, eating in an idol’s temple, won’t that person be emboldened to eat what is sacrificed to idols? '
  '11':
  - type: text
    content: 'So this weak brother or sister, for whom Christ died, is destroyed by your knowledge. '
  '12':
  - type: text
    content: 'When you sin against them in this way and wound their weak conscience, you sin against Christ. '
  '13':
  - type: text
    content: Therefore, if what I eat causes my brother or sister to fall into sin, I will never eat meat again, so that I will not cause them to fall.
  '2':
  - type: text
    content: 'Those who think they know something do not yet know as they ought to know. '
  '3':
  - type: text
    content: But whoever loves God is known by God.
  - type: note
    content: An early manuscript and another ancient witness think they have knowledge do not yet know as they ought to know. 3 But whoever loves truly knows.
  '4':
  - type: text
    content: 'So then, about eating food sacrificed to idols: We know that “An idol is nothing at all in the world” and that “There is no God but one.” '
  '5':
  - type: text
    content: 'For even if there are so-called gods, whether in heaven or on earth (as indeed there are many “gods” and many “lords”), '
  '6':
  - type: text
    content: yet for us there is but one God, the Father, from whom all things came and for whom we live; and there is but one Lord, Jesus Christ, through whom all things came and through whom we live.
  '7':
  - type: text
    content: 'But not everyone possesses this knowledge. Some people are still so accustomed to idols that when they eat sacrificial food they think of it as having been sacrificed to a god, and since their conscience is weak, it is defiled. '
  '8':
  - type: text
    content: But food does not bring us near to God; we are no worse if we do not eat, and no better if we do.
  '9':
  - type: text
    content: 'Be careful, however, that the exercise of your rights does not become a stumbling block to the weak. '
