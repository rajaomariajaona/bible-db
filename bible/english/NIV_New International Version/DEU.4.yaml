document_id: DEU.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Obedience Commanded
  - type: text
    content: 'Now, Israel, hear the decrees and laws I am about to teach you. Follow them so that you may live and may go in and take possession of the land the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, is giving you. '
  '10':
  - type: text
    content: 'Remember the day you stood before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at Horeb, when he said to me, “Assemble the people before me to hear my words so that they may learn to revere me as long as they live in the land and may teach them to their children.” '
  '11':
  - type: text
    content: 'You came near and stood at the foot of the mountain while it blazed with fire to the very heavens, with black clouds and deep darkness. '
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to you out of the fire. You heard the sound of words but saw no form; there was only a voice. '
  '13':
  - type: text
    content: 'He declared to you his covenant, the Ten Commandments, which he commanded you to follow and then wrote them on two stone tablets. '
  '14':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' directed me at that time to teach you the decrees and laws you are to follow in the land that you are crossing the Jordan to possess.'
  - type: heading
    content: Idolatry Forbidden
  '15':
  - type: text
    content: 'You saw no form of any kind the day the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to you at Horeb out of the fire. Therefore watch yourselves very carefully, '
  '16':
  - type: text
    content: 'so that you do not become corrupt and make for yourselves an idol, an image of any shape, whether formed like a man or a woman, '
  '17':
  - type: text
    content: 'or like any animal on earth or any bird that flies in the air, '
  '18':
  - type: text
    content: 'or like any creature that moves along the ground or any fish in the waters below. '
  '19':
  - type: text
    content: 'And when you look up to the sky and see the sun, the moon and the stars—all the heavenly array—do not be enticed into bowing down to them and worshiping things the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has apportioned to all the nations under heaven. '
  '2':
  - type: text
    content: 'Do not add to what I command you and do not subtract from it, but keep the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I give you.'
  '20':
  - type: text
    content: 'But as for you, the '
  - type: text
    content: Lord
  - type: text
    content: ' took you and brought you out of the iron-smelting furnace, out of Egypt, to be the people of his inheritance, as you now are.'
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with me because of you, and he solemnly swore that I would not cross the Jordan and enter the good land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as your inheritance. '
  '22':
  - type: text
    content: 'I will die in this land; I will not cross the Jordan; but you are about to cross over and take possession of that good land. '
  '23':
  - type: text
    content: 'Be careful not to forget the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that he made with you; do not make for yourselves an idol in the form of anything the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has forbidden. '
  '24':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is a consuming fire, a jealous God.'
  '25':
  - type: text
    content: 'After you have had children and grandchildren and have lived in the land a long time—if you then become corrupt and make any kind of idol, doing evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and arousing his anger, '
  '26':
  - type: text
    content: 'I call the heavens and the earth as witnesses against you this day that you will quickly perish from the land that you are crossing the Jordan to possess. You will not live there long but will certainly be destroyed. '
  '27':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will scatter you among the peoples, and only a few of you will survive among the nations to which the '
  - type: text
    content: Lord
  - type: text
    content: ' will drive you. '
  '28':
  - type: text
    content: 'There you will worship man-made gods of wood and stone, which cannot see or hear or eat or smell. '
  '29':
  - type: text
    content: 'But if from there you seek the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, you will find him if you seek him with all your heart and with all your soul. '
  '3':
  - type: text
    content: 'You saw with your own eyes what the '
  - type: text
    content: Lord
  - type: text
    content: ' did at Baal Peor. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God destroyed from among you everyone who followed the Baal of Peor, '
  '30':
  - type: text
    content: 'When you are in distress and all these things have happened to you, then in later days you will return to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and obey him. '
  '31':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is a merciful God; he will not abandon or destroy you or forget the covenant with your ancestors, which he confirmed to them by oath.'
  - type: heading
    content: The Lord Is God
  '32':
  - type: text
    content: 'Ask now about the former days, long before your time, from the day God created human beings on the earth; ask from one end of the heavens to the other. Has anything so great as this ever happened, or has anything like it ever been heard of? '
  '33':
  - type: text
    content: Has any other people heard the voice of God
  - type: note
    content: Or of a god
  - type: text
    content: ' speaking out of fire, as you have, and lived? '
  '34':
  - type: text
    content: 'Has any god ever tried to take for himself one nation out of another nation, by testings, by signs and wonders, by war, by a mighty hand and an outstretched arm, or by great and awesome deeds, like all the things the '
  - type: text
    content: Lord
  - type: text
    content: ' your God did for you in Egypt before your very eyes?'
  '35':
  - type: text
    content: 'You were shown these things so that you might know that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God; besides him there is no other. '
  '36':
  - type: text
    content: 'From heaven he made you hear his voice to discipline you. On earth he showed you his great fire, and you heard his words from out of the fire. '
  '37':
  - type: text
    content: 'Because he loved your ancestors and chose their descendants after them, he brought you out of Egypt by his Presence and his great strength, '
  '38':
  - type: text
    content: to drive out before you nations greater and stronger than you and to bring you into their land to give it to you for your inheritance, as it is today.
  '39':
  - type: text
    content: 'Acknowledge and take to heart this day that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God in heaven above and on the earth below. There is no other. '
  '4':
  - type: text
    content: 'but all of you who held fast to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God are still alive today.'
  '40':
  - type: text
    content: 'Keep his decrees and commands, which I am giving you today, so that it may go well with you and your children after you and that you may live long in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives you for all time.'
  - type: heading
    content: Cities of Refuge
  '41':
  - type: text
    content: 'Then Moses set aside three cities east of the Jordan, '
  '42':
  - type: text
    content: 'to which anyone who had killed a person could flee if they had unintentionally killed a neighbor without malice aforethought. They could flee into one of these cities and save their life. '
  '43':
  - type: text
    content: 'The cities were these: Bezer in the wilderness plateau, for the Reubenites; Ramoth in Gilead, for the Gadites; and Golan in Bashan, for the Manassites.'
  - type: heading
    content: Introduction to the Law
  '44':
  - type: text
    content: 'This is the law Moses set before the Israelites. '
  '45':
  - type: text
    content: 'These are the stipulations, decrees and laws Moses gave them when they came out of Egypt '
  '46':
  - type: text
    content: 'and were in the valley near Beth Peor east of the Jordan, in the land of Sihon king of the Amorites, who reigned in Heshbon and was defeated by Moses and the Israelites as they came out of Egypt. '
  '47':
  - type: text
    content: 'They took possession of his land and the land of Og king of Bashan, the two Amorite kings east of the Jordan. '
  '48':
  - type: text
    content: This land extended from Aroer on the rim of the Arnon Gorge to Mount Sirion
  - type: note
    content: Syriac (see also 3:9); Hebrew Siyon
  - type: text
    content: ' (that is, Hermon), '
  '49':
  - type: text
    content: and included all the Arabah east of the Jordan, as far as the Dead Sea,
  - type: note
    content: Hebrew the Sea of the Arabah
  - type: text
    content: ' below the slopes of Pisgah.'
  '5':
  - type: text
    content: 'See, I have taught you decrees and laws as the '
  - type: text
    content: Lord
  - type: text
    content: ' my God commanded me, so that you may follow them in the land you are entering to take possession of it. '
  '6':
  - type: text
    content: 'Observe them carefully, for this will show your wisdom and understanding to the nations, who will hear about all these decrees and say, “Surely this great nation is a wise and understanding people.” '
  '7':
  - type: text
    content: 'What other nation is so great as to have their gods near them the way the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is near us whenever we pray to him? '
  '8':
  - type: text
    content: And what other nation is so great as to have such righteous decrees and laws as this body of laws I am setting before you today?
  '9':
  - type: text
    content: 'Only be careful, and watch yourselves closely so that you do not forget the things your eyes have seen or let them fade from your heart as long as you live. Teach them to your children and to their children after them. '
