document_id: PSA.72
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 72
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Of Solomon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Endow the king with your justice, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the royal son with your righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May he judge your people in righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your afflicted ones with justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: May the mountains bring prosperity to the people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the hills the fruit of righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: May he defend the afflicted among the people
- type: usfm
  marker: q2
  children:
  - type: text
    text: and save the children of the needy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may he crush the oppressor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: May he endure
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: You will be feared
    marker-yv: yv-n
  - type: text
    text: ' as long as the sun,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: as long as the moon, through all generations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: May he be like rain falling on a mown field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like showers watering the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In his days may the righteous flourish
- type: usfm
  marker: q2
  children:
  - type: text
    text: and prosperity abound till the moon is no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: May he rule from sea to sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from the River
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the Euphrates
    marker-yv: yv-n
  - type: text
    text: ' to the ends of the earth.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: May the desert tribes bow before him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his enemies lick the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: May the kings of Tarshish and of distant shores
- type: usfm
  marker: q2
  children:
  - type: text
    text: bring tribute to him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May the kings of Sheba and Seba
- type: usfm
  marker: q2
  children:
  - type: text
    text: present him gifts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: May all kings bow down to him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all nations serve him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For he will deliver the needy who cry out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the afflicted who have no one to help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He will take pity on the weak and the needy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and save the needy from death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He will rescue them from oppression and violence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for precious is their blood in his sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Long may he live!
- type: usfm
  marker: q2
  children:
  - type: text
    text: May gold from Sheba be given him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May people ever pray for him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bless him all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: May grain abound throughout the land;
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the tops of the hills may it sway.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May the crops flourish like Lebanon
- type: usfm
  marker: q2
  children:
  - type: text
    text: and thrive
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probable reading of the original Hebrew text; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Lebanon, / from the city
    marker-yv: yv-n
  - type: text
    text: ' like the grass of the field.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: May his name endure forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may it continue as long as the sun.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then all nations will be blessed through him,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '72:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'will use his name in blessings '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (see Gen. 48:20)
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will call him blessed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Praise be to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God, the God of Israel,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who alone does marvelous deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Praise be to his glorious name forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may the whole earth be filled with his glory.
- type: usfm
  marker: qc
  children:
  - type: text
    text: Amen and Amen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: This concludes the prayers of David son of Jesse.
