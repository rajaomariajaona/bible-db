document_id: PSA.72,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 72
  - type: text
    content: Of Solomon.
  - type: text
    content: Endow the king with your justice, O God,
  - type: text
    content: the royal son with your righteousness.
  '10':
  - type: text
    content: May the kings of Tarshish and of distant shores
  - type: text
    content: bring tribute to him.
  - type: text
    content: May the kings of Sheba and Seba
  - type: text
    content: present him gifts.
  '11':
  - type: text
    content: May all kings bow down to him
  - type: text
    content: and all nations serve him.
  '12':
  - type: text
    content: For he will deliver the needy who cry out,
  - type: text
    content: the afflicted who have no one to help.
  '13':
  - type: text
    content: He will take pity on the weak and the needy
  - type: text
    content: and save the needy from death.
  '14':
  - type: text
    content: He will rescue them from oppression and violence,
  - type: text
    content: for precious is their blood in his sight.
  '15':
  - type: text
    content: Long may he live!
  - type: text
    content: May gold from Sheba be given him.
  - type: text
    content: May people ever pray for him
  - type: text
    content: and bless him all day long.
  '16':
  - type: text
    content: May grain abound throughout the land;
  - type: text
    content: on the tops of the hills may it sway.
  - type: text
    content: May the crops flourish like Lebanon
  - type: text
    content: and thrive
  - type: note
    content: Probable reading of the original Hebrew text; Masoretic Text Lebanon, / from the city
  - type: text
    content: ' like the grass of the field.'
  '17':
  - type: text
    content: May his name endure forever;
  - type: text
    content: may it continue as long as the sun.
  - type: text
    content: Then all nations will be blessed through him,
  - type: note
    content: Or will use his name in blessings (see Gen. 48:20)
  - type: text
    content: and they will call him blessed.
  '18':
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ' God, the God of Israel,'
  - type: text
    content: who alone does marvelous deeds.
  '19':
  - type: text
    content: Praise be to his glorious name forever;
  - type: text
    content: may the whole earth be filled with his glory.
  - type: text
    content: Amen and Amen.
  '2':
  - type: text
    content: May he judge your people in righteousness,
  - type: text
    content: your afflicted ones with justice.
  '20':
  - type: text
    content: This concludes the prayers of David son of Jesse.
  '3':
  - type: text
    content: May the mountains bring prosperity to the people,
  - type: text
    content: the hills the fruit of righteousness.
  '4':
  - type: text
    content: May he defend the afflicted among the people
  - type: text
    content: and save the children of the needy;
  - type: text
    content: may he crush the oppressor.
  '5':
  - type: text
    content: May he endure
  - type: note
    content: Septuagint; Hebrew You will be feared
  - type: text
    content: ' as long as the sun,'
  - type: text
    content: as long as the moon, through all generations.
  '6':
  - type: text
    content: May he be like rain falling on a mown field,
  - type: text
    content: like showers watering the earth.
  '7':
  - type: text
    content: In his days may the righteous flourish
  - type: text
    content: and prosperity abound till the moon is no more.
  '8':
  - type: text
    content: May he rule from sea to sea
  - type: text
    content: and from the River
  - type: note
    content: That is, the Euphrates
  - type: text
    content: ' to the ends of the earth.'
  '9':
  - type: text
    content: May the desert tribes bow before him
  - type: text
    content: and his enemies lick the dust.
