document_id: LEV.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “ ‘If anyone sins because they do not speak up when they hear a public charge to testify regarding something they have seen or learned about, they will be held responsible.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest shall then offer the other as a burnt offering in the prescribed way and make atonement for them for the sin they have committed, and they will be forgiven.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “ ‘If, however, they cannot afford two doves or two young pigeons, they are to bring as an offering for their sin a tenth of an ephah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 3 1/2 pounds or about 1.6 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of the finest flour for a sin offering. They must not put olive oil or incense on it, because it is a sin offering. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They are to bring it to the priest, who shall take a handful of it as a memorial
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: representative
      marker-yv: yv-n
    - type: text
      text: ' portion and burn it on the altar on top of the food offerings presented to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. It is a sin offering. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In this way the priest will make atonement for them for any of these sins they have committed, and they will be forgiven. The rest of the offering will belong to the priest, as in the case of the grain offering.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Guilt Offering
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When anyone is unfaithful to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by sinning unintentionally in regard to any of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s holy things, they are to bring to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a penalty a ram from the flock, one without defect and of the proper value in silver, according to the sanctuary shekel.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 2/5 ounce or about 12 grams
      marker-yv: yv-n
    - type: text
      text: ' It is a guilt offering. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They must make restitution for what they have failed to do in regard to the holy things, pay an additional penalty of a fifth of its value and give it all to the priest. The priest will make atonement for them with the ram as a guilt offering, and they will be forgiven.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If anyone sins and does what is forbidden in any of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s commands, even though they do not know it, they are guilty and will be held responsible. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are to bring to the priest as a guilt offering a ram from the flock, one without defect and of the proper value. In this way the priest will make atonement for them for the wrong they have committed unintentionally, and they will be forgiven. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It is a guilt offering; they have been guilty of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: offering; atonement has been made for their
      marker-yv: yv-n
    - type: text
      text: ' wrongdoing against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘If anyone becomes aware that they are guilty—if they unwittingly touch anything ceremonially unclean (whether the carcass of an unclean animal, wild or domestic, or of any unclean creature that moves along the ground) and they are unaware that they have become unclean, but then they come to realize their guilt; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or if they touch human uncleanness (anything that would make them unclean) even though they are unaware of it, but then they learn of it and realize their guilt; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or if anyone thoughtlessly takes an oath to do anything, whether good or evil (in any matter one might carelessly swear about) even though they are unaware of it, but then they learn of it and realize their guilt— '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'when anyone becomes aware that they are guilty in any of these matters, they must confess in what way they have sinned. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As a penalty for the sin they have committed, they must bring to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' a female lamb or goat from the flock as a sin offering'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: purification offering
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; here and throughout this chapter
      marker-yv: yv-n
    - type: text
      text: ; and the priest shall make atonement for them for their sin.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Anyone who cannot afford a lamb is to bring two doves or two young pigeons to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a penalty for their sin—one for a sin offering and the other for a burnt offering. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are to bring them to the priest, who shall first offer the one for the sin offering. He is to wring its head from its neck, not dividing it completely, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and is to splash some of the blood of the sin offering against the side of the altar; the rest of the blood must be drained out at the base of the altar. It is a sin offering. '
