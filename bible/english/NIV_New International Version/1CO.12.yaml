document_id: 1CO.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Concerning Spiritual Gifts
  - type: text
    content: 'Now about the gifts of the Spirit, brothers and sisters, I do not want you to be uninformed. '
  '10':
  - type: text
    content: to another miraculous powers, to another prophecy, to another distinguishing between spirits, to another speaking in different kinds of tongues,
  - type: note
    content: Or languages; also in verse 28
  - type: text
    content: ' and to still another the interpretation of tongues.'
  - type: note
    content: Or languages; also in verse 28
  - type: text
    content: ' '
  '11':
  - type: text
    content: All these are the work of one and the same Spirit, and he distributes them to each one, just as he determines.
  - type: heading
    content: Unity and Diversity in the Body
  '12':
  - type: text
    content: 'Just as a body, though one, has many parts, but all its many parts form one body, so it is with Christ. '
  '13':
  - type: text
    content: For we were all baptized by
  - type: note
    content: Or with; or in
  - type: text
    content: ' one Spirit so as to form one body—whether Jews or Gentiles, slave or free—and we were all given the one Spirit to drink. '
  '14':
  - type: text
    content: Even so the body is not made up of one part but of many.
  '15':
  - type: text
    content: 'Now if the foot should say, “Because I am not a hand, I do not belong to the body,” it would not for that reason stop being part of the body. '
  '16':
  - type: text
    content: 'And if the ear should say, “Because I am not an eye, I do not belong to the body,” it would not for that reason stop being part of the body. '
  '17':
  - type: text
    content: 'If the whole body were an eye, where would the sense of hearing be? If the whole body were an ear, where would the sense of smell be? '
  '18':
  - type: text
    content: 'But in fact God has placed the parts in the body, every one of them, just as he wanted them to be. '
  '19':
  - type: text
    content: 'If they were all one part, where would the body be? '
  '2':
  - type: text
    content: 'You know that when you were pagans, somehow or other you were influenced and led astray to mute idols. '
  '20':
  - type: text
    content: As it is, there are many parts, but one body.
  '21':
  - type: text
    content: 'The eye cannot say to the hand, “I don’t need you!” And the head cannot say to the feet, “I don’t need you!” '
  '22':
  - type: text
    content: 'On the contrary, those parts of the body that seem to be weaker are indispensable, '
  '23':
  - type: text
    content: 'and the parts that we think are less honorable we treat with special honor. And the parts that are unpresentable are treated with special modesty, '
  '24':
  - type: text
    content: 'while our presentable parts need no special treatment. But God has put the body together, giving greater honor to the parts that lacked it, '
  '25':
  - type: text
    content: 'so that there should be no division in the body, but that its parts should have equal concern for each other. '
  '26':
  - type: text
    content: If one part suffers, every part suffers with it; if one part is honored, every part rejoices with it.
  '27':
  - type: text
    content: 'Now you are the body of Christ, and each one of you is a part of it. '
  '28':
  - type: text
    content: 'And God has placed in the church first of all apostles, second prophets, third teachers, then miracles, then gifts of healing, of helping, of guidance, and of different kinds of tongues. '
  '29':
  - type: text
    content: 'Are all apostles? Are all prophets? Are all teachers? Do all work miracles? '
  '3':
  - type: text
    content: Therefore I want you to know that no one who is speaking by the Spirit of God says, “Jesus be cursed,” and no one can say, “Jesus is Lord,” except by the Holy Spirit.
  '30':
  - type: text
    content: Do all have gifts of healing? Do all speak in tongues
  - type: note
    content: Or other languages
  - type: text
    content: '? Do all interpret? '
  '31':
  - type: text
    content: Now eagerly desire the greater gifts.
  - type: heading
    content: Love Is Indispensable
  - type: text
    content: And yet I will show you the most excellent way.
  '4':
  - type: text
    content: 'There are different kinds of gifts, but the same Spirit distributes them. '
  '5':
  - type: text
    content: 'There are different kinds of service, but the same Lord. '
  '6':
  - type: text
    content: There are different kinds of working, but in all of them and in everyone it is the same God at work.
  '7':
  - type: text
    content: 'Now to each one the manifestation of the Spirit is given for the common good. '
  '8':
  - type: text
    content: 'To one there is given through the Spirit a message of wisdom, to another a message of knowledge by means of the same Spirit, '
  '9':
  - type: text
    content: 'to another faith by the same Spirit, to another gifts of healing by that one Spirit, '
