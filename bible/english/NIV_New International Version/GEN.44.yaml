document_id: GEN.44,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Silver Cup in a Sack
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joseph gave these instructions to the steward of his house: “Fill the men’s sacks with as much food as they can carry, and put each man’s silver in the mouth of his sack. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Very well, then,” he said, “let it be as you say. Whoever is found to have it will become my slave; the rest of you will be free from blame.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each of them quickly lowered his sack to the ground and opened it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the steward proceeded to search, beginning with the oldest and ending with the youngest. And the cup was found in Benjamin’s sack. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At this, they tore their clothes. Then they all loaded their donkeys and returned to the city.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph was still in the house when Judah and his brothers came in, and they threw themselves to the ground before him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joseph said to them, “What is this you have done? Don’t you know that a man like me can find things out by divination?”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What can we say to my lord?” Judah replied. “What can we say? How can we prove our innocence? God has uncovered your servants’ guilt. We are now my lord’s slaves—we ourselves and the one who was found to have the cup.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Joseph said, “Far be it from me to do such a thing! Only the man who was found to have the cup will become my slave. The rest of you, go back to your father in peace.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Judah went up to him and said: “Pardon your servant, my lord, let me speak a word to my lord. Do not be angry with your servant, though you are equal to Pharaoh himself. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My lord asked his servants, ‘Do you have a father or a brother?’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then put my cup, the silver one, in the mouth of the youngest one’s sack, along with the silver for his grain.” And he did as Joseph said.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And we answered, ‘We have an aged father, and there is a young son born to him in his old age. His brother is dead, and he is the only one of his mother’s sons left, and his father loves him.’
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then you said to your servants, ‘Bring him down to me so I can see him for myself.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we said to my lord, ‘The boy cannot leave his father; if he leaves him, his father will die.’ '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you told your servants, ‘Unless your youngest brother comes down with you, you will not see my face again.’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When we went back to your servant my father, we told him what my lord had said.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then our father said, ‘Go back and buy a little more food.’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But we said, ‘We cannot go down. Only if our youngest brother is with us will we go. We cannot see the man’s face unless our youngest brother is with us.’
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Your servant my father said to us, ‘You know that my wife bore me two sons. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of them went away from me, and I said, “He has surely been torn to pieces.” And I have not seen him since. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If you take this one from me too and harm comes to him, you will bring my gray head down to the grave in misery.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As morning dawned, the men were sent on their way with their donkeys. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So now, if the boy is not with us when I go back to your servant my father, and if my father, whose life is closely bound up with the boy’s life, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sees that the boy isn’t there, he will die. Your servants will bring the gray head of our father down to the grave in sorrow. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Your servant guaranteed the boy’s safety to my father. I said, ‘If I do not bring him back to you, I will bear the blame before you, my father, all my life!’
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now then, please let your servant remain here as my lord’s slave in place of the boy, and let the boy return with his brothers. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: How can I go back to my father if the boy is not with me? No! Do not let me see the misery that would come on my father.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They had not gone far from the city when Joseph said to his steward, “Go after those men at once, and when you catch up with them, say to them, ‘Why have you repaid good with evil? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isn’t this the cup my master drinks from and also uses for divination? This is a wicked thing you have done.’ ”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he caught up with them, he repeated these words to them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they said to him, “Why does my lord say such things? Far be it from your servants to do anything like that! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We even brought back to you from the land of Canaan the silver we found inside the mouths of our sacks. So why would we steal silver or gold from your master’s house? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If any of your servants is found to have it, he will die; and the rest of us will become my lord’s slaves.”
