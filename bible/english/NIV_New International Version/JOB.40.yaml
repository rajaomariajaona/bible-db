document_id: JOB.40,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Job:'
  '10':
  - type: text
    content: Then adorn yourself with glory and splendor,
  - type: text
    content: and clothe yourself in honor and majesty.
  '11':
  - type: text
    content: Unleash the fury of your wrath,
  - type: text
    content: look at all who are proud and bring them low,
  '12':
  - type: text
    content: look at all who are proud and humble them,
  - type: text
    content: crush the wicked where they stand.
  '13':
  - type: text
    content: Bury them all in the dust together;
  - type: text
    content: shroud their faces in the grave.
  '14':
  - type: text
    content: Then I myself will admit to you
  - type: text
    content: that your own right hand can save you.
  '15':
  - type: text
    content: “Look at Behemoth,
  - type: text
    content: which I made along with you
  - type: text
    content: and which feeds on grass like an ox.
  '16':
  - type: text
    content: What strength it has in its loins,
  - type: text
    content: what power in the muscles of its belly!
  '17':
  - type: text
    content: Its tail sways like a cedar;
  - type: text
    content: the sinews of its thighs are close-knit.
  '18':
  - type: text
    content: Its bones are tubes of bronze,
  - type: text
    content: its limbs like rods of iron.
  '19':
  - type: text
    content: It ranks first among the works of God,
  - type: text
    content: yet its Maker can approach it with his sword.
  '2':
  - type: text
    content: “Will the one who contends with the Almighty correct him?
  - type: text
    content: Let him who accuses God answer him!”
  '20':
  - type: text
    content: The hills bring it their produce,
  - type: text
    content: and all the wild animals play nearby.
  '21':
  - type: text
    content: Under the lotus plants it lies,
  - type: text
    content: hidden among the reeds in the marsh.
  '22':
  - type: text
    content: The lotuses conceal it in their shadow;
  - type: text
    content: the poplars by the stream surround it.
  '23':
  - type: text
    content: A raging river does not alarm it;
  - type: text
    content: it is secure, though the Jordan should surge against its mouth.
  '24':
  - type: text
    content: Can anyone capture it by the eyes,
  - type: text
    content: or trap it and pierce its nose?
  '3':
  - type: text
    content: 'Then Job answered the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  '4':
  - type: text
    content: “I am unworthy—how can I reply to you?
  - type: text
    content: I put my hand over my mouth.
  '5':
  - type: text
    content: I spoke once, but I have no answer—
  - type: text
    content: twice, but I will say no more.”
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Job out of the storm:'
  '7':
  - type: text
    content: “Brace yourself like a man;
  - type: text
    content: I will question you,
  - type: text
    content: and you shall answer me.
  '8':
  - type: text
    content: “Would you discredit my justice?
  - type: text
    content: Would you condemn me to justify yourself?
  '9':
  - type: text
    content: Do you have an arm like God’s,
  - type: text
    content: and can your voice thunder like his?
