document_id: JOB.40
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Job:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Will the one who contends with the Almighty correct him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let him who accuses God answer him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Job answered the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “I am unworthy—how can I reply to you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: I put my hand over my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I spoke once, but I have no answer—
- type: usfm
  marker: q2
  children:
  - type: text
    text: twice, but I will say no more.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Job out of the storm:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Brace yourself like a man;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will question you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you shall answer me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Would you discredit my justice?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Would you condemn me to justify yourself?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Do you have an arm like God’s,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and can your voice thunder like his?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then adorn yourself with glory and splendor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and clothe yourself in honor and majesty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Unleash the fury of your wrath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: look at all who are proud and bring them low,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: look at all who are proud and humble them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: crush the wicked where they stand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Bury them all in the dust together;
- type: usfm
  marker: q2
  children:
  - type: text
    text: shroud their faces in the grave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then I myself will admit to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: that your own right hand can save you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Look at Behemoth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which I made along with you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and which feeds on grass like an ox.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: What strength it has in its loins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what power in the muscles of its belly!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Its tail sways like a cedar;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sinews of its thighs are close-knit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Its bones are tubes of bronze,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its limbs like rods of iron.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: It ranks first among the works of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet its Maker can approach it with his sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The hills bring it their produce,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the wild animals play nearby.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Under the lotus plants it lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hidden among the reeds in the marsh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The lotuses conceal it in their shadow;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the poplars by the stream surround it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A raging river does not alarm it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is secure, though the Jordan should surge against its mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Can anyone capture it by the eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or trap it and pierce its nose?
