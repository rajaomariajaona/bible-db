document_id: MAT.27,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judas Hangs Himself
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Early in the morning, all the chief priests and the elders of the people made their plans how to have Jesus executed. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: and they used them to buy the potter’s field, as the Lord commanded me.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Zech. 11:12,13; Jer. 19:1-13; 32:6-9.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Before Pilate
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Meanwhile Jesus stood before the governor, and the governor asked him, “Are you the king of the Jews?”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have said so,”
    - type: text
      text: ' Jesus replied.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When he was accused by the chief priests and the elders, he gave no answer. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then Pilate asked him, “Don’t you hear the testimony they are bringing against you?” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But Jesus made no reply, not even to a single charge—to the great amazement of the governor.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now it was the governor’s custom at the festival to release a prisoner chosen by the crowd. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: At that time they had a well-known prisoner whose name was Jesus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many manuscripts do not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jesus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 17.
      marker-yv: yv-n
    - type: text
      text: ' Barabbas. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So when the crowd had gathered, Pilate asked them, “Which one do you want me to release to you: Jesus Barabbas, or Jesus who is called the Messiah?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: For he knew it was out of self-interest that they had handed Jesus over to him.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'While Pilate was sitting on the judge’s seat, his wife sent him this message: “Don’t have anything to do with that innocent man, for I have suffered a great deal today in a dream because of him.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: So they bound him, led him away and handed him over to Pilate the governor.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But the chief priests and the elders persuaded the crowd to ask for Barabbas and to have Jesus executed.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “Which of the two do you want me to release to you?” asked the governor.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Barabbas,” they answered.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “What shall I do, then, with Jesus who is called the Messiah?” Pilate asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: They all answered, “Crucify him!”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “Why? What crime has he committed?” asked Pilate.
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they shouted all the louder, “Crucify him!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: When Pilate saw that he was getting nowhere, but that instead an uproar was starting, he took water and washed his hands in front of the crowd. “I am innocent of this man’s blood,” he said. “It is your responsibility!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: All the people answered, “His blood is on us and on our children!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then he released Barabbas to them. But he had Jesus flogged, and handed him over to be crucified.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Soldiers Mock Jesus
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Then the governor’s soldiers took Jesus into the Praetorium and gathered the whole company of soldiers around him. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'They stripped him and put a scarlet robe on him, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'and then twisted together a crown of thorns and set it on his head. They put a staff in his right hand. Then they knelt in front of him and mocked him. “Hail, king of the Jews!” they said. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When Judas, who had betrayed him, saw that Jesus was condemned, he was seized with remorse and returned the thirty pieces of silver to the chief priests and the elders. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'They spit on him, and took the staff and struck him on the head again and again. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: After they had mocked him, they took off the robe and put his own clothes on him. Then they led him away to crucify him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Crucifixion of Jesus
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'As they were going out, they met a man from Cyrene, named Simon, and they forced him to carry the cross. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'They came to a place called Golgotha (which means “the place of the skull”). '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'There they offered Jesus wine to drink, mixed with gall; but after tasting it, he refused to drink it. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'When they had crucified him, they divided up his clothes by casting lots. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'And sitting down, they kept watch over him there. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Above his head they placed the written charge against him: '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: this is jesus, the king of the jews
    - type: text
      text: .
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Two rebels were crucified with him, one on his right and one on his left. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Those who passed by hurled insults at him, shaking their heads '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “I have sinned,” he said, “for I have betrayed innocent blood.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What is that to us?” they replied. “That’s your responsibility.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'and saying, “You who are going to destroy the temple and build it in three days, save yourself! Come down from the cross, if you are the Son of God!” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'In the same way the chief priests, the teachers of the law and the elders mocked him. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: '“He saved others,” they said, “but he can’t save himself! He’s the king of Israel! Let him come down now from the cross, and we will believe in him. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'He trusts in God. Let God rescue him now if he wants him, for he said, ‘I am the Son of God.’ ” '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: In the same way the rebels who were crucified with him also heaped insults on him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Jesus
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'From noon until three in the afternoon darkness came over all the land. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'About three in the afternoon Jesus cried out in a loud voice, '
    - type: usfm
      marker: tl
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: “Eli, Eli,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Eloi, Eloi
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: tl
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: lema sabachthani?”
    - type: text
      text: ' (which means '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My God, my God, why have you forsaken me?”
    - type: text
      text: ).
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 22:1
      marker-yv: yv-n
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: When some of those standing there heard this, they said, “He’s calling Elijah.”
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Immediately one of them ran and got a sponge. He filled it with wine vinegar, put it on a staff, and offered it to Jesus to drink. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: The rest said, “Now leave him alone. Let’s see if Elijah comes to save him.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So Judas threw the money into the temple and left. Then he went away and hanged himself.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: And when Jesus had cried out again in a loud voice, he gave up his spirit.
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'At that moment the curtain of the temple was torn in two from top to bottom. The earth shook, the rocks split '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'and the tombs broke open. The bodies of many holy people who had died were raised to life. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: They came out of the tombs after Jesus’ resurrection and
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:53 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tombs, and after Jesus’ resurrection they
      marker-yv: yv-n
    - type: text
      text: ' went into the holy city and appeared to many people.'
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: When the centurion and those with him who were guarding Jesus saw the earthquake and all that had happened, they were terrified, and exclaimed, “Surely he was the Son of God!”
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Many women were there, watching from a distance. They had followed Jesus from Galilee to care for his needs. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Among them were Mary Magdalene, Mary the mother of James and Joseph,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:56 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Joses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Joseph
      marker-yv: yv-n
    - type: text
      text: ' and the mother of Zebedee’s sons.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Burial of Jesus
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'As evening approached, there came a rich man from Arimathea, named Joseph, who had himself become a disciple of Jesus. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Going to Pilate, he asked for Jesus’ body, and Pilate ordered that it be given to him. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Joseph took the body, wrapped it in a clean linen cloth, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The chief priests picked up the coins and said, “It is against the law to put this into the treasury, since it is blood money.” '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'and placed it in his own new tomb that he had cut out of the rock. He rolled a big stone in front of the entrance to the tomb and went away. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Mary Magdalene and the other Mary were sitting there opposite the tomb.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Guard at the Tomb
    marker-yv: yv-h
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'The next day, the one after Preparation Day, the chief priests and the Pharisees went to Pilate. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: '“Sir,” they said, “we remember that while he was still alive that deceiver said, ‘After three days I will rise again.’ '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: So give the order for the tomb to be made secure until the third day. Otherwise, his disciples may come and steal the body and tell the people that he has been raised from the dead. This last deception will be worse than the first.”
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: '“Take a guard,” Pilate answered. “Go, make the tomb as secure as you know how.” '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: So they went and made the tomb secure by putting a seal on the stone and posting the guard.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So they decided to use the money to buy the potter’s field as a burial place for foreigners. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'That is why it has been called the Field of Blood to this day. '
  '9':
