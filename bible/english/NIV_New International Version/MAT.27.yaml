document_id: MAT.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judas Hangs Himself
  - type: text
    content: 'Early in the morning, all the chief priests and the elders of the people made their plans how to have Jesus executed. '
  '10':
  - type: text
    content: and they used them to buy the potter’s field, as the Lord commanded me.”
  - type: note
    content: See Zech. 11:12,13; Jer. 19:1-13; 32:6-9.
  - type: heading
    content: Jesus Before Pilate
  '11':
  - type: text
    content: Meanwhile Jesus stood before the governor, and the governor asked him, “Are you the king of the Jews?”
  - type: text
    content: “You have said so,”
  - type: text
    content: ' Jesus replied.'
  '12':
  - type: text
    content: 'When he was accused by the chief priests and the elders, he gave no answer. '
  '13':
  - type: text
    content: 'Then Pilate asked him, “Don’t you hear the testimony they are bringing against you?” '
  '14':
  - type: text
    content: But Jesus made no reply, not even to a single charge—to the great amazement of the governor.
  '15':
  - type: text
    content: 'Now it was the governor’s custom at the festival to release a prisoner chosen by the crowd. '
  '16':
  - type: text
    content: At that time they had a well-known prisoner whose name was Jesus
  - type: note
    content: Many manuscripts do not have Jesus; also in verse 17.
  - type: text
    content: ' Barabbas. '
  '17':
  - type: text
    content: 'So when the crowd had gathered, Pilate asked them, “Which one do you want me to release to you: Jesus Barabbas, or Jesus who is called the Messiah?” '
  '18':
  - type: text
    content: For he knew it was out of self-interest that they had handed Jesus over to him.
  '19':
  - type: text
    content: 'While Pilate was sitting on the judge’s seat, his wife sent him this message: “Don’t have anything to do with that innocent man, for I have suffered a great deal today in a dream because of him.”'
  '2':
  - type: text
    content: So they bound him, led him away and handed him over to Pilate the governor.
  '20':
  - type: text
    content: But the chief priests and the elders persuaded the crowd to ask for Barabbas and to have Jesus executed.
  '21':
  - type: text
    content: “Which of the two do you want me to release to you?” asked the governor.
  - type: text
    content: “Barabbas,” they answered.
  '22':
  - type: text
    content: “What shall I do, then, with Jesus who is called the Messiah?” Pilate asked.
  - type: text
    content: They all answered, “Crucify him!”
  '23':
  - type: text
    content: “Why? What crime has he committed?” asked Pilate.
  - type: text
    content: But they shouted all the louder, “Crucify him!”
  '24':
  - type: text
    content: When Pilate saw that he was getting nowhere, but that instead an uproar was starting, he took water and washed his hands in front of the crowd. “I am innocent of this man’s blood,” he said. “It is your responsibility!”
  '25':
  - type: text
    content: All the people answered, “His blood is on us and on our children!”
  '26':
  - type: text
    content: Then he released Barabbas to them. But he had Jesus flogged, and handed him over to be crucified.
  - type: heading
    content: The Soldiers Mock Jesus
  '27':
  - type: text
    content: 'Then the governor’s soldiers took Jesus into the Praetorium and gathered the whole company of soldiers around him. '
  '28':
  - type: text
    content: 'They stripped him and put a scarlet robe on him, '
  '29':
  - type: text
    content: 'and then twisted together a crown of thorns and set it on his head. They put a staff in his right hand. Then they knelt in front of him and mocked him. “Hail, king of the Jews!” they said. '
  '3':
  - type: text
    content: 'When Judas, who had betrayed him, saw that Jesus was condemned, he was seized with remorse and returned the thirty pieces of silver to the chief priests and the elders. '
  '30':
  - type: text
    content: 'They spit on him, and took the staff and struck him on the head again and again. '
  '31':
  - type: text
    content: After they had mocked him, they took off the robe and put his own clothes on him. Then they led him away to crucify him.
  - type: heading
    content: The Crucifixion of Jesus
  '32':
  - type: text
    content: 'As they were going out, they met a man from Cyrene, named Simon, and they forced him to carry the cross. '
  '33':
  - type: text
    content: 'They came to a place called Golgotha (which means “the place of the skull”). '
  '34':
  - type: text
    content: 'There they offered Jesus wine to drink, mixed with gall; but after tasting it, he refused to drink it. '
  '35':
  - type: text
    content: 'When they had crucified him, they divided up his clothes by casting lots. '
  '36':
  - type: text
    content: 'And sitting down, they kept watch over him there. '
  '37':
  - type: text
    content: 'Above his head they placed the written charge against him: '
  - type: heading
    content: this is jesus, the king of the jews
  - type: text
    content: .
  '38':
  - type: text
    content: 'Two rebels were crucified with him, one on his right and one on his left. '
  '39':
  - type: text
    content: 'Those who passed by hurled insults at him, shaking their heads '
  '4':
  - type: text
    content: “I have sinned,” he said, “for I have betrayed innocent blood.”
  - type: text
    content: “What is that to us?” they replied. “That’s your responsibility.”
  '40':
  - type: text
    content: 'and saying, “You who are going to destroy the temple and build it in three days, save yourself! Come down from the cross, if you are the Son of God!” '
  '41':
  - type: text
    content: 'In the same way the chief priests, the teachers of the law and the elders mocked him. '
  '42':
  - type: text
    content: '“He saved others,” they said, “but he can’t save himself! He’s the king of Israel! Let him come down now from the cross, and we will believe in him. '
  '43':
  - type: text
    content: 'He trusts in God. Let God rescue him now if he wants him, for he said, ‘I am the Son of God.’ ” '
  '44':
  - type: text
    content: In the same way the rebels who were crucified with him also heaped insults on him.
  - type: heading
    content: The Death of Jesus
  '45':
  - type: text
    content: 'From noon until three in the afternoon darkness came over all the land. '
  '46':
  - type: text
    content: 'About three in the afternoon Jesus cried out in a loud voice, '
  - type: text
    content: “Eli, Eli,
  - type: note
    content: Some manuscripts Eloi, Eloi
  - type: text
    content: ' '
  - type: text
    content: lema sabachthani?”
  - type: text
    content: ' (which means '
  - type: text
    content: “My God, my God, why have you forsaken me?”
  - type: text
    content: ).
  - type: note
    content: Psalm 22:1
  '47':
  - type: text
    content: When some of those standing there heard this, they said, “He’s calling Elijah.”
  '48':
  - type: text
    content: 'Immediately one of them ran and got a sponge. He filled it with wine vinegar, put it on a staff, and offered it to Jesus to drink. '
  '49':
  - type: text
    content: The rest said, “Now leave him alone. Let’s see if Elijah comes to save him.”
  '5':
  - type: text
    content: So Judas threw the money into the temple and left. Then he went away and hanged himself.
  '50':
  - type: text
    content: And when Jesus had cried out again in a loud voice, he gave up his spirit.
  '51':
  - type: text
    content: 'At that moment the curtain of the temple was torn in two from top to bottom. The earth shook, the rocks split '
  '52':
  - type: text
    content: 'and the tombs broke open. The bodies of many holy people who had died were raised to life. '
  '53':
  - type: text
    content: They came out of the tombs after Jesus’ resurrection and
  - type: note
    content: Or tombs, and after Jesus’ resurrection they
  - type: text
    content: ' went into the holy city and appeared to many people.'
  '54':
  - type: text
    content: When the centurion and those with him who were guarding Jesus saw the earthquake and all that had happened, they were terrified, and exclaimed, “Surely he was the Son of God!”
  '55':
  - type: text
    content: 'Many women were there, watching from a distance. They had followed Jesus from Galilee to care for his needs. '
  '56':
  - type: text
    content: Among them were Mary Magdalene, Mary the mother of James and Joseph,
  - type: note
    content: Greek Joses, a variant of Joseph
  - type: text
    content: ' and the mother of Zebedee’s sons.'
  - type: heading
    content: The Burial of Jesus
  '57':
  - type: text
    content: 'As evening approached, there came a rich man from Arimathea, named Joseph, who had himself become a disciple of Jesus. '
  '58':
  - type: text
    content: 'Going to Pilate, he asked for Jesus’ body, and Pilate ordered that it be given to him. '
  '59':
  - type: text
    content: 'Joseph took the body, wrapped it in a clean linen cloth, '
  '6':
  - type: text
    content: 'The chief priests picked up the coins and said, “It is against the law to put this into the treasury, since it is blood money.” '
  '60':
  - type: text
    content: 'and placed it in his own new tomb that he had cut out of the rock. He rolled a big stone in front of the entrance to the tomb and went away. '
  '61':
  - type: text
    content: Mary Magdalene and the other Mary were sitting there opposite the tomb.
  - type: heading
    content: The Guard at the Tomb
  '62':
  - type: text
    content: 'The next day, the one after Preparation Day, the chief priests and the Pharisees went to Pilate. '
  '63':
  - type: text
    content: '“Sir,” they said, “we remember that while he was still alive that deceiver said, ‘After three days I will rise again.’ '
  '64':
  - type: text
    content: So give the order for the tomb to be made secure until the third day. Otherwise, his disciples may come and steal the body and tell the people that he has been raised from the dead. This last deception will be worse than the first.”
  '65':
  - type: text
    content: '“Take a guard,” Pilate answered. “Go, make the tomb as secure as you know how.” '
  '66':
  - type: text
    content: So they went and made the tomb secure by putting a seal on the stone and posting the guard.
  '7':
  - type: text
    content: 'So they decided to use the money to buy the potter’s field as a burial place for foreigners. '
  '8':
  - type: text
    content: 'That is why it has been called the Field of Blood to this day. '
  '9':
  - type: text
    content: 'Then what was spoken by Jeremiah the prophet was fulfilled: “They took the thirty pieces of silver, the price set on him by the people of Israel, '
