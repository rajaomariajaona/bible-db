document_id: 2TI.4,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'In the presence of God and of Christ Jesus, who will judge the living and the dead, and in view of his appearing and his kingdom, I give you this charge: '
  '10':
  - type: text
    content: 'for Demas, because he loved this world, has deserted me and has gone to Thessalonica. Crescens has gone to Galatia, and Titus to Dalmatia. '
  '11':
  - type: text
    content: 'Only Luke is with me. Get Mark and bring him with you, because he is helpful to me in my ministry. '
  '12':
  - type: text
    content: 'I sent Tychicus to Ephesus. '
  '13':
  - type: text
    content: When you come, bring the cloak that I left with Carpus at Troas, and my scrolls, especially the parchments.
  '14':
  - type: text
    content: 'Alexander the metalworker did me a great deal of harm. The Lord will repay him for what he has done. '
  '15':
  - type: text
    content: You too should be on your guard against him, because he strongly opposed our message.
  '16':
  - type: text
    content: 'At my first defense, no one came to my support, but everyone deserted me. May it not be held against them. '
  '17':
  - type: text
    content: 'But the Lord stood at my side and gave me strength, so that through me the message might be fully proclaimed and all the Gentiles might hear it. And I was delivered from the lion’s mouth. '
  '18':
  - type: text
    content: The Lord will rescue me from every evil attack and will bring me safely to his heavenly kingdom. To him be glory for ever and ever. Amen.
  - type: heading
    content: Final Greetings
  '19':
  - type: text
    content: Greet Priscilla
  - type: note
    content: Greek Prisca, a variant of Priscilla
  - type: text
    content: ' and Aquila and the household of Onesiphorus. '
  '2':
  - type: text
    content: 'Preach the word; be prepared in season and out of season; correct, rebuke and encourage—with great patience and careful instruction. '
  '20':
  - type: text
    content: 'Erastus stayed in Corinth, and I left Trophimus sick in Miletus. '
  '21':
  - type: text
    content: Do your best to get here before winter. Eubulus greets you, and so do Pudens, Linus, Claudia and all the brothers and sisters.
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family.
  '22':
  - type: text
    content: The Lord be with your spirit. Grace be with you all.
  '3':
  - type: text
    content: 'For the time will come when people will not put up with sound doctrine. Instead, to suit their own desires, they will gather around them a great number of teachers to say what their itching ears want to hear. '
  '4':
  - type: text
    content: 'They will turn their ears away from the truth and turn aside to myths. '
  '5':
  - type: text
    content: But you, keep your head in all situations, endure hardship, do the work of an evangelist, discharge all the duties of your ministry.
  '6':
  - type: text
    content: 'For I am already being poured out like a drink offering, and the time for my departure is near. '
  '7':
  - type: text
    content: 'I have fought the good fight, I have finished the race, I have kept the faith. '
  '8':
  - type: text
    content: Now there is in store for me the crown of righteousness, which the Lord, the righteous Judge, will award to me on that day—and not only to me, but also to all who have longed for his appearing.
  - type: heading
    content: Personal Remarks
  '9':
  - type: text
    content: 'Do your best to come to me quickly, '
