document_id: 2TI.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the presence of God and of Christ Jesus, who will judge the living and the dead, and in view of his appearing and his kingdom, I give you this charge: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for Demas, because he loved this world, has deserted me and has gone to Thessalonica. Crescens has gone to Galatia, and Titus to Dalmatia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Only Luke is with me. Get Mark and bring him with you, because he is helpful to me in my ministry. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I sent Tychicus to Ephesus. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When you come, bring the cloak that I left with Carpus at Troas, and my scrolls, especially the parchments.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alexander the metalworker did me a great deal of harm. The Lord will repay him for what he has done. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You too should be on your guard against him, because he strongly opposed our message.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At my first defense, no one came to my support, but everyone deserted me. May it not be held against them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Lord stood at my side and gave me strength, so that through me the message might be fully proclaimed and all the Gentiles might hear it. And I was delivered from the lion’s mouth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Lord will rescue me from every evil attack and will bring me safely to his heavenly kingdom. To him be glory for ever and ever. Amen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Final Greetings
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Greet Priscilla
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Prisca
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Priscilla
      marker-yv: yv-n
    - type: text
      text: ' and Aquila and the household of Onesiphorus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Preach the word; be prepared in season and out of season; correct, rebuke and encourage—with great patience and careful instruction. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Erastus stayed in Corinth, and I left Trophimus sick in Miletus. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do your best to get here before winter. Eubulus greets you, and so do Pudens, Linus, Claudia and all the brothers and sisters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brothers and sisters '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: adelphoi
        - type: text
          text: ) refers here to believers, both men and women, as part of God’s family.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Lord be with your spirit. Grace be with you all.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the time will come when people will not put up with sound doctrine. Instead, to suit their own desires, they will gather around them a great number of teachers to say what their itching ears want to hear. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will turn their ears away from the truth and turn aside to myths. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you, keep your head in all situations, endure hardship, do the work of an evangelist, discharge all the duties of your ministry.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I am already being poured out like a drink offering, and the time for my departure is near. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have fought the good fight, I have finished the race, I have kept the faith. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now there is in store for me the crown of righteousness, which the Lord, the righteous Judge, will award to me on that day—and not only to me, but also to all who have longed for his appearing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Personal Remarks
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do your best to come to me quickly, '
