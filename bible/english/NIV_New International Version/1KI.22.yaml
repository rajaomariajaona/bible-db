document_id: 1KI.22,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Micaiah Prophesies Against Ahab
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For three years there was no war between Aram and Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dressed in their royal robes, the king of Israel and Jehoshaphat king of Judah were sitting on their thrones at the threshing floor by the entrance of the gate of Samaria, with all the prophets prophesying before them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Zedekiah son of Kenaanah had made iron horns and he declared, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: ‘With these you will gore the Arameans until they are destroyed.’ ”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the other prophets were prophesying the same thing. “Attack Ramoth Gilead and be victorious,” they said, “for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will give it into the king’s hand.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The messenger who had gone to summon Micaiah said to him, “Look, the other prophets without exception are predicting success for the king. Let your word agree with theirs, and speak favorably.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Micaiah said, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, I can tell him only what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tells me.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he arrived, the king asked him, “Micaiah, shall we go to war against Ramoth Gilead, or not?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Attack and be victorious,” he answered, “for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will give it into the king’s hand.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king said to him, “How many times must I make you swear to tell me nothing but the truth in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Micaiah answered, “I saw all Israel scattered on the hills like sheep without a shepherd, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, ‘These people have no master. Let each one go home in peace.’ ”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king of Israel said to Jehoshaphat, “Didn’t I tell you that he never prophesies anything good about me, but only bad?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Micaiah continued, “Therefore hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': I saw the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sitting on his throne with all the multitudes of heaven standing around him on his right and on his left. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But in the third year Jehoshaphat king of Judah went down to see the king of Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, ‘Who will entice Ahab into attacking Ramoth Gilead and going to his death there?’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“One suggested this, and another that. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, a spirit came forward, stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and said, ‘I will entice him.’'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘By what means?’ the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' asked.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “ ‘I will go out and be a deceiving spirit in the mouths of all his prophets,’ he said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘You will succeed in enticing him,’ said the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . ‘Go and do it.’
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has put a deceiving spirit in the mouths of all these prophets of yours. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has decreed disaster for you.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Zedekiah son of Kenaanah went up and slapped Micaiah in the face. “Which way did the spirit from
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Spirit of
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' go when he went from me to speak to you?” he asked.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Micaiah replied, “You will find out on the day you go to hide in an inner room.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king of Israel then ordered, “Take Micaiah and send him back to Amon the ruler of the city and to Joash the king’s son '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say, ‘This is what the king says: Put this fellow in prison and give him nothing but bread and water until I return safely.’ ”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Micaiah declared, “If you ever return safely, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not spoken through me.” Then he added, “Mark my words, all you people!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahab Killed at Ramoth Gilead
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king of Israel and Jehoshaphat king of Judah went up to Ramoth Gilead. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king of Israel had said to his officials, “Don’t you know that Ramoth Gilead belongs to us and yet we are doing nothing to retake it from the king of Aram?”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king of Israel said to Jehoshaphat, “I will enter the battle in disguise, but you wear your royal robes.” So the king of Israel disguised himself and went into battle.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the king of Aram had ordered his thirty-two chariot commanders, “Do not fight with anyone, small or great, except the king of Israel.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the chariot commanders saw Jehoshaphat, they thought, “Surely this is the king of Israel.” So they turned to attack him, but when Jehoshaphat cried out, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the chariot commanders saw that he was not the king of Israel and stopped pursuing him.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But someone drew his bow at random and hit the king of Israel between the sections of his armor. The king told his chariot driver, “Wheel around and get me out of the fighting. I’ve been wounded.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All day long the battle raged, and the king was propped up in his chariot facing the Arameans. The blood from his wound ran onto the floor of the chariot, and that evening he died. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the sun was setting, a cry spread through the army: “Every man to his town. Every man to his land!”'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the king died and was brought to Samaria, and they buried him there. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They washed the chariot at a pool in Samaria (where the prostitutes bathed),
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Samaria and cleaned the weapons
      marker-yv: yv-n
    - type: text
      text: ' and the dogs licked up his blood, as the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had declared.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the other events of Ahab’s reign, including all he did, the palace he built and adorned with ivory, and the cities he fortified, are they not written in the book of the annals of the kings of Israel? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he asked Jehoshaphat, “Will you go with me to fight against Ramoth Gilead?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat replied to the king of Israel, “I am as you are, my people as your people, my horses as your horses.” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahab rested with his ancestors. And Ahaziah his son succeeded him as king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat King of Judah
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat son of Asa became king of Judah in the fourth year of Ahab king of Israel. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat was thirty-five years old when he became king, and he reigned in Jerusalem twenty-five years. His mother’s name was Azubah daughter of Shilhi. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In everything he followed the ways of his father Asa and did not stray from them; he did what was right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . The high places, however, were not removed, and the people continued to offer sacrifices and burn incense there.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts this sentence (22:43b) is numbered 22:44, and 22:44-53 is numbered 22:45-54.
      marker-yv: yv-n
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoshaphat was also at peace with the king of Israel.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the other events of Jehoshaphat’s reign, the things he achieved and his military exploits, are they not written in the book of the annals of the kings of Judah? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He rid the land of the rest of the male shrine prostitutes who remained there even after the reign of his father Asa. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There was then no king in Edom; a provincial governor ruled.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Jehoshaphat built a fleet of trading ships
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of ships of Tarshish
      marker-yv: yv-n
    - type: text
      text: ' to go to Ophir for gold, but they never set sail—they were wrecked at Ezion Geber. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At that time Ahaziah son of Ahab said to Jehoshaphat, “Let my men sail with yours,” but Jehoshaphat refused.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehoshaphat also said to the king of Israel, “First seek the counsel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Jehoshaphat rested with his ancestors and was buried with them in the city of David his father. And Jehoram his son succeeded him as king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahaziah King of Israel
    marker-yv: yv-h
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaziah son of Ahab became king of Israel in Samaria in the seventeenth year of Jehoshaphat king of Judah, and he reigned over Israel two years. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', because he followed the ways of his father and mother and of Jeroboam son of Nebat, who caused Israel to sin. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He served and worshiped Baal and aroused the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, just as his father had done.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king of Israel brought together the prophets—about four hundred men—and asked them, “Shall I go to war against Ramoth Gilead, or shall I refrain?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go,” they answered, “for the Lord will give it into the king’s hand.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehoshaphat asked, “Is there no longer a prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' here whom we can inquire of?”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king of Israel answered Jehoshaphat, “There is still one prophet through whom we can inquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but I hate him because he never prophesies anything good about me, but always bad. He is Micaiah son of Imlah.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The king should not say such a thing,” Jehoshaphat replied.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king of Israel called one of his officials and said, “Bring Micaiah son of Imlah at once.”
