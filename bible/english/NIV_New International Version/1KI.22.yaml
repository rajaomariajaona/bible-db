document_id: 1KI.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Micaiah Prophesies Against Ahab
  - type: text
    content: 'For three years there was no war between Aram and Israel. '
  '10':
  - type: text
    content: 'Dressed in their royal robes, the king of Israel and Jehoshaphat king of Judah were sitting on their thrones at the threshing floor by the entrance of the gate of Samaria, with all the prophets prophesying before them. '
  '11':
  - type: text
    content: 'Now Zedekiah son of Kenaanah had made iron horns and he declared, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘With these you will gore the Arameans until they are destroyed.’ ”'
  '12':
  - type: text
    content: 'All the other prophets were prophesying the same thing. “Attack Ramoth Gilead and be victorious,” they said, “for the '
  - type: text
    content: Lord
  - type: text
    content: ' will give it into the king’s hand.”'
  '13':
  - type: text
    content: The messenger who had gone to summon Micaiah said to him, “Look, the other prophets without exception are predicting success for the king. Let your word agree with theirs, and speak favorably.”
  '14':
  - type: text
    content: 'But Micaiah said, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, I can tell him only what the '
  - type: text
    content: Lord
  - type: text
    content: ' tells me.”'
  '15':
  - type: text
    content: When he arrived, the king asked him, “Micaiah, shall we go to war against Ramoth Gilead, or not?”
  - type: text
    content: '“Attack and be victorious,” he answered, “for the '
  - type: text
    content: Lord
  - type: text
    content: ' will give it into the king’s hand.”'
  '16':
  - type: text
    content: 'The king said to him, “How many times must I make you swear to tell me nothing but the truth in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '17':
  - type: text
    content: 'Then Micaiah answered, “I saw all Israel scattered on the hills like sheep without a shepherd, and the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘These people have no master. Let each one go home in peace.’ ”'
  '18':
  - type: text
    content: The king of Israel said to Jehoshaphat, “Didn’t I tell you that he never prophesies anything good about me, but only bad?”
  '19':
  - type: text
    content: 'Micaiah continued, “Therefore hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': I saw the '
  - type: text
    content: Lord
  - type: text
    content: ' sitting on his throne with all the multitudes of heaven standing around him on his right and on his left. '
  '2':
  - type: text
    content: 'But in the third year Jehoshaphat king of Judah went down to see the king of Israel. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘Who will entice Ahab into attacking Ramoth Gilead and going to his death there?’'
  - type: text
    content: '“One suggested this, and another that. '
  '21':
  - type: text
    content: 'Finally, a spirit came forward, stood before the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, ‘I will entice him.’'
  '22':
  - type: text
    content: '“ ‘By what means?’ the '
  - type: text
    content: Lord
  - type: text
    content: ' asked.'
  - type: text
    content: “ ‘I will go out and be a deceiving spirit in the mouths of all his prophets,’ he said.
  - type: text
    content: '“ ‘You will succeed in enticing him,’ said the '
  - type: text
    content: Lord
  - type: text
    content: . ‘Go and do it.’
  '23':
  - type: text
    content: '“So now the '
  - type: text
    content: Lord
  - type: text
    content: ' has put a deceiving spirit in the mouths of all these prophets of yours. The '
  - type: text
    content: Lord
  - type: text
    content: ' has decreed disaster for you.”'
  '24':
  - type: text
    content: Then Zedekiah son of Kenaanah went up and slapped Micaiah in the face. “Which way did the spirit from
  - type: note
    content: Or Spirit of
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' go when he went from me to speak to you?” he asked.'
  '25':
  - type: text
    content: Micaiah replied, “You will find out on the day you go to hide in an inner room.”
  '26':
  - type: text
    content: 'The king of Israel then ordered, “Take Micaiah and send him back to Amon the ruler of the city and to Joash the king’s son '
  '27':
  - type: text
    content: 'and say, ‘This is what the king says: Put this fellow in prison and give him nothing but bread and water until I return safely.’ ”'
  '28':
  - type: text
    content: 'Micaiah declared, “If you ever return safely, the '
  - type: text
    content: Lord
  - type: text
    content: ' has not spoken through me.” Then he added, “Mark my words, all you people!”'
  - type: heading
    content: Ahab Killed at Ramoth Gilead
  '29':
  - type: text
    content: 'So the king of Israel and Jehoshaphat king of Judah went up to Ramoth Gilead. '
  '3':
  - type: text
    content: The king of Israel had said to his officials, “Don’t you know that Ramoth Gilead belongs to us and yet we are doing nothing to retake it from the king of Aram?”
  '30':
  - type: text
    content: The king of Israel said to Jehoshaphat, “I will enter the battle in disguise, but you wear your royal robes.” So the king of Israel disguised himself and went into battle.
  '31':
  - type: text
    content: 'Now the king of Aram had ordered his thirty-two chariot commanders, “Do not fight with anyone, small or great, except the king of Israel.” '
  '32':
  - type: text
    content: 'When the chariot commanders saw Jehoshaphat, they thought, “Surely this is the king of Israel.” So they turned to attack him, but when Jehoshaphat cried out, '
  '33':
  - type: text
    content: the chariot commanders saw that he was not the king of Israel and stopped pursuing him.
  '34':
  - type: text
    content: 'But someone drew his bow at random and hit the king of Israel between the sections of his armor. The king told his chariot driver, “Wheel around and get me out of the fighting. I’ve been wounded.” '
  '35':
  - type: text
    content: 'All day long the battle raged, and the king was propped up in his chariot facing the Arameans. The blood from his wound ran onto the floor of the chariot, and that evening he died. '
  '36':
  - type: text
    content: 'As the sun was setting, a cry spread through the army: “Every man to his town. Every man to his land!”'
  '37':
  - type: text
    content: 'So the king died and was brought to Samaria, and they buried him there. '
  '38':
  - type: text
    content: They washed the chariot at a pool in Samaria (where the prostitutes bathed),
  - type: note
    content: Or Samaria and cleaned the weapons
  - type: text
    content: ' and the dogs licked up his blood, as the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' had declared.'
  '39':
  - type: text
    content: 'As for the other events of Ahab’s reign, including all he did, the palace he built and adorned with ivory, and the cities he fortified, are they not written in the book of the annals of the kings of Israel? '
  '4':
  - type: text
    content: So he asked Jehoshaphat, “Will you go with me to fight against Ramoth Gilead?”
  - type: text
    content: 'Jehoshaphat replied to the king of Israel, “I am as you are, my people as your people, my horses as your horses.” '
  '40':
  - type: text
    content: Ahab rested with his ancestors. And Ahaziah his son succeeded him as king.
  - type: heading
    content: Jehoshaphat King of Judah
  '41':
  - type: text
    content: 'Jehoshaphat son of Asa became king of Judah in the fourth year of Ahab king of Israel. '
  '42':
  - type: text
    content: 'Jehoshaphat was thirty-five years old when he became king, and he reigned in Jerusalem twenty-five years. His mother’s name was Azubah daughter of Shilhi. '
  '43':
  - type: text
    content: 'In everything he followed the ways of his father Asa and did not stray from them; he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: . The high places, however, were not removed, and the people continued to offer sacrifices and burn incense there.
  - type: note
    content: In Hebrew texts this sentence (22:43b) is numbered 22:44, and 22:44-53 is numbered 22:45-54.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Jehoshaphat was also at peace with the king of Israel.
  '45':
  - type: text
    content: 'As for the other events of Jehoshaphat’s reign, the things he achieved and his military exploits, are they not written in the book of the annals of the kings of Judah? '
  '46':
  - type: text
    content: 'He rid the land of the rest of the male shrine prostitutes who remained there even after the reign of his father Asa. '
  '47':
  - type: text
    content: There was then no king in Edom; a provincial governor ruled.
  '48':
  - type: text
    content: Now Jehoshaphat built a fleet of trading ships
  - type: note
    content: Hebrew of ships of Tarshish
  - type: text
    content: ' to go to Ophir for gold, but they never set sail—they were wrecked at Ezion Geber. '
  '49':
  - type: text
    content: At that time Ahaziah son of Ahab said to Jehoshaphat, “Let my men sail with yours,” but Jehoshaphat refused.
  '5':
  - type: text
    content: 'But Jehoshaphat also said to the king of Israel, “First seek the counsel of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '50':
  - type: text
    content: Then Jehoshaphat rested with his ancestors and was buried with them in the city of David his father. And Jehoram his son succeeded him as king.
  - type: heading
    content: Ahaziah King of Israel
  '51':
  - type: text
    content: 'Ahaziah son of Ahab became king of Israel in Samaria in the seventeenth year of Jehoshaphat king of Judah, and he reigned over Israel two years. '
  '52':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', because he followed the ways of his father and mother and of Jeroboam son of Nebat, who caused Israel to sin. '
  '53':
  - type: text
    content: 'He served and worshiped Baal and aroused the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, just as his father had done.'
  '6':
  - type: text
    content: So the king of Israel brought together the prophets—about four hundred men—and asked them, “Shall I go to war against Ramoth Gilead, or shall I refrain?”
  - type: text
    content: “Go,” they answered, “for the Lord will give it into the king’s hand.”
  '7':
  - type: text
    content: 'But Jehoshaphat asked, “Is there no longer a prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ' here whom we can inquire of?”'
  '8':
  - type: text
    content: 'The king of Israel answered Jehoshaphat, “There is still one prophet through whom we can inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ', but I hate him because he never prophesies anything good about me, but always bad. He is Micaiah son of Imlah.”'
  - type: text
    content: “The king should not say such a thing,” Jehoshaphat replied.
  '9':
  - type: text
    content: So the king of Israel called one of his officials and said, “Bring Micaiah son of Imlah at once.”
