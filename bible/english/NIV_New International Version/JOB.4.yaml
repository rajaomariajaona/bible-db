document_id: JOB.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eliphaz
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Eliphaz the Temanite replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “If someone ventures a word with you, will you be impatient?
- type: usfm
  marker: q2
  children:
  - type: text
    text: But who can keep from speaking?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Think how you have instructed many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how you have strengthened feeble hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Your words have supported those who stumbled;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have strengthened faltering knees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But now trouble comes to you, and you are discouraged;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it strikes you, and you are dismayed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Should not your piety be your confidence
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your blameless ways your hope?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Consider now: Who, being innocent, has ever perished?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where were the upright ever destroyed?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: As I have observed, those who plow evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who sow trouble reap it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: At the breath of God they perish;
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the blast of his anger they are no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The lions may roar and growl,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet the teeth of the great lions are broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The lion perishes for lack of prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the cubs of the lioness are scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “A word was secretly brought to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my ears caught a whisper of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Amid disquieting dreams in the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when deep sleep falls on people,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: fear and trembling seized me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made all my bones shake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A spirit glided past my face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the hair on my body stood on end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: It stopped,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I could not tell what it was.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A form stood before my eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and I heard a hushed voice:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘Can a mortal be more righteous than God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can even a strong man be more pure than his Maker?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: If God places no trust in his servants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if he charges his angels with error,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: how much more those who live in houses of clay,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose foundations are in the dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are crushed more readily than a moth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Between dawn and dusk they are broken to pieces;
- type: usfm
  marker: q2
  children:
  - type: text
    text: unnoticed, they perish forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Are not the cords of their tent pulled up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that they die without wisdom?’
