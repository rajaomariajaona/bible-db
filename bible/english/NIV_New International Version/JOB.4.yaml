document_id: JOB.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz
  - type: text
    content: 'Then Eliphaz the Temanite replied:'
  '10':
  - type: text
    content: The lions may roar and growl,
  - type: text
    content: yet the teeth of the great lions are broken.
  '11':
  - type: text
    content: The lion perishes for lack of prey,
  - type: text
    content: and the cubs of the lioness are scattered.
  '12':
  - type: text
    content: “A word was secretly brought to me,
  - type: text
    content: my ears caught a whisper of it.
  '13':
  - type: text
    content: Amid disquieting dreams in the night,
  - type: text
    content: when deep sleep falls on people,
  '14':
  - type: text
    content: fear and trembling seized me
  - type: text
    content: and made all my bones shake.
  '15':
  - type: text
    content: A spirit glided past my face,
  - type: text
    content: and the hair on my body stood on end.
  '16':
  - type: text
    content: It stopped,
  - type: text
    content: but I could not tell what it was.
  - type: text
    content: A form stood before my eyes,
  - type: text
    content: 'and I heard a hushed voice:'
  '17':
  - type: text
    content: ‘Can a mortal be more righteous than God?
  - type: text
    content: Can even a strong man be more pure than his Maker?
  '18':
  - type: text
    content: If God places no trust in his servants,
  - type: text
    content: if he charges his angels with error,
  '19':
  - type: text
    content: how much more those who live in houses of clay,
  - type: text
    content: whose foundations are in the dust,
  - type: text
    content: who are crushed more readily than a moth!
  '2':
  - type: text
    content: “If someone ventures a word with you, will you be impatient?
  - type: text
    content: But who can keep from speaking?
  '20':
  - type: text
    content: Between dawn and dusk they are broken to pieces;
  - type: text
    content: unnoticed, they perish forever.
  '21':
  - type: text
    content: Are not the cords of their tent pulled up,
  - type: text
    content: so that they die without wisdom?’
  '3':
  - type: text
    content: Think how you have instructed many,
  - type: text
    content: how you have strengthened feeble hands.
  '4':
  - type: text
    content: Your words have supported those who stumbled;
  - type: text
    content: you have strengthened faltering knees.
  '5':
  - type: text
    content: But now trouble comes to you, and you are discouraged;
  - type: text
    content: it strikes you, and you are dismayed.
  '6':
  - type: text
    content: Should not your piety be your confidence
  - type: text
    content: and your blameless ways your hope?
  '7':
  - type: text
    content: '“Consider now: Who, being innocent, has ever perished?'
  - type: text
    content: Where were the upright ever destroyed?
  '8':
  - type: text
    content: As I have observed, those who plow evil
  - type: text
    content: and those who sow trouble reap it.
  '9':
  - type: text
    content: At the breath of God they perish;
  - type: text
    content: at the blast of his anger they are no more.
