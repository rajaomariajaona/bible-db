document_id: 1SA.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel’s Farewell Speech
  - type: text
    content: 'Samuel said to all Israel, “I have listened to everything you said to me and have set a king over you. '
  '10':
  - type: text
    content: 'They cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, ‘We have sinned; we have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ' and served the Baals and the Ashtoreths. But now deliver us from the hands of our enemies, and we will serve you.’ '
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' sent Jerub-Baal,'
  - type: note
    content: Also called Gideon
  - type: text
    content: ' Barak,'
  - type: note
    content: Some Septuagint manuscripts and Syriac; Hebrew Bedan
  - type: text
    content: ' Jephthah and Samuel,'
  - type: note
    content: Hebrew; some Septuagint manuscripts and Syriac Samson
  - type: text
    content: ' and he delivered you from the hands of your enemies all around you, so that you lived in safety.'
  '12':
  - type: text
    content: '“But when you saw that Nahash king of the Ammonites was moving against you, you said to me, ‘No, we want a king to rule over us’—even though the '
  - type: text
    content: Lord
  - type: text
    content: ' your God was your king. '
  '13':
  - type: text
    content: 'Now here is the king you have chosen, the one you asked for; see, the '
  - type: text
    content: Lord
  - type: text
    content: ' has set a king over you. '
  '14':
  - type: text
    content: 'If you fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve and obey him and do not rebel against his commands, and if both you and the king who reigns over you follow the '
  - type: text
    content: Lord
  - type: text
    content: ' your God—good! '
  '15':
  - type: text
    content: 'But if you do not obey the '
  - type: text
    content: Lord
  - type: text
    content: ', and if you rebel against his commands, his hand will be against you, as it was against your ancestors.'
  '16':
  - type: text
    content: '“Now then, stand still and see this great thing the '
  - type: text
    content: Lord
  - type: text
    content: ' is about to do before your eyes! '
  '17':
  - type: text
    content: 'Is it not wheat harvest now? I will call on the '
  - type: text
    content: Lord
  - type: text
    content: ' to send thunder and rain. And you will realize what an evil thing you did in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' when you asked for a king.”'
  '18':
  - type: text
    content: 'Then Samuel called on the '
  - type: text
    content: Lord
  - type: text
    content: ', and that same day the '
  - type: text
    content: Lord
  - type: text
    content: ' sent thunder and rain. So all the people stood in awe of the '
  - type: text
    content: Lord
  - type: text
    content: ' and of Samuel.'
  '19':
  - type: text
    content: 'The people all said to Samuel, “Pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for your servants so that we will not die, for we have added to all our other sins the evil of asking for a king.”'
  '2':
  - type: text
    content: 'Now you have a king as your leader. As for me, I am old and gray, and my sons are here with you. I have been your leader from my youth until this day. '
  '20':
  - type: text
    content: '“Do not be afraid,” Samuel replied. “You have done all this evil; yet do not turn away from the '
  - type: text
    content: Lord
  - type: text
    content: ', but serve the '
  - type: text
    content: Lord
  - type: text
    content: ' with all your heart. '
  '21':
  - type: text
    content: 'Do not turn away after useless idols. They can do you no good, nor can they rescue you, because they are useless. '
  '22':
  - type: text
    content: 'For the sake of his great name the '
  - type: text
    content: Lord
  - type: text
    content: ' will not reject his people, because the '
  - type: text
    content: Lord
  - type: text
    content: ' was pleased to make you his own. '
  '23':
  - type: text
    content: 'As for me, far be it from me that I should sin against the '
  - type: text
    content: Lord
  - type: text
    content: ' by failing to pray for you. And I will teach you the way that is good and right. '
  '24':
  - type: text
    content: 'But be sure to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve him faithfully with all your heart; consider what great things he has done for you. '
  '25':
  - type: text
    content: Yet if you persist in doing evil, both you and your king will perish.”
  '3':
  - type: text
    content: 'Here I stand. Testify against me in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' and his anointed. Whose ox have I taken? Whose donkey have I taken? Whom have I cheated? Whom have I oppressed? From whose hand have I accepted a bribe to make me shut my eyes? If I have done any of these things, I will make it right.”'
  '4':
  - type: text
    content: “You have not cheated or oppressed us,” they replied. “You have not taken anything from anyone’s hand.”
  '5':
  - type: text
    content: 'Samuel said to them, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is witness against you, and also his anointed is witness this day, that you have not found anything in my hand.”'
  - type: text
    content: “He is witness,” they said.
  '6':
  - type: text
    content: 'Then Samuel said to the people, “It is the '
  - type: text
    content: Lord
  - type: text
    content: ' who appointed Moses and Aaron and brought your ancestors up out of Egypt. '
  '7':
  - type: text
    content: 'Now then, stand here, because I am going to confront you with evidence before the '
  - type: text
    content: Lord
  - type: text
    content: ' as to all the righteous acts performed by the '
  - type: text
    content: Lord
  - type: text
    content: ' for you and your ancestors.'
  '8':
  - type: text
    content: '“After Jacob entered Egypt, they cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help, and the '
  - type: text
    content: Lord
  - type: text
    content: ' sent Moses and Aaron, who brought your ancestors out of Egypt and settled them in this place.'
  '9':
  - type: text
    content: '“But they forgot the '
  - type: text
    content: Lord
  - type: text
    content: ' their God; so he sold them into the hand of Sisera, the commander of the army of Hazor, and into the hands of the Philistines and the king of Moab, who fought against them. '
