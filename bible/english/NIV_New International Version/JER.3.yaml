document_id: JER.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “If a man divorces his wife
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she leaves him and marries another man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: should he return to her again?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Would not the land be completely defiled?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you have lived as a prostitute with many lovers—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: would you now return to me?”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'In spite of all this, her unfaithful sister Judah did not return to me with all her heart, but only in pretense,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Faithless Israel is more righteous than unfaithful Judah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Go, proclaim this message toward the north:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“ ‘Return, faithless Israel,’ declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘I will frown on you no longer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for I am faithful,’ declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘I will not be angry forever.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Only acknowledge your guilt—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you have rebelled against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have scattered your favors to foreign gods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: under every spreading tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have not obeyed me,’ ”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Return, faithless people,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “for I am your husband. I will choose you—one from a town and two from a clan—and bring you to Zion. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then I will give you shepherds after my own heart, who will lead you with knowledge and understanding. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'In those days, when your numbers have increased greatly in the land,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “people will no longer say, ‘The ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.’ It will never enter their minds or be remembered; it will not be missed, nor will another one be made. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'At that time they will call Jerusalem The Throne of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and all nations will gather in Jerusalem to honor the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. No longer will they follow the stubbornness of their evil hearts. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: In those days the people of Judah will join the people of Israel, and together they will come from a northern land to the land I gave your ancestors as an inheritance.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “I myself said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘How gladly would I treat you like my children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give you a pleasant land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the most beautiful inheritance of any nation.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thought you would call me ‘Father’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not turn away from following me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Look up to the barren heights and see.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is there any place where you have not been ravished?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By the roadside you sat waiting for lovers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sat like a nomad in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have defiled the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with your prostitution and wickedness.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But like a woman unfaithful to her husband,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you, Israel, have been unfaithful to me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: A cry is heard on the barren heights,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the weeping and pleading of the people of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they have perverted their ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and have forgotten the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Return, faithless people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will cure you of backsliding.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yes, we will come to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for you are the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Surely the idolatrous commotion on the hills
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and mountains is a deception;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'surely in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is the salvation of Israel.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: From our youth shameful gods have consumed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fruits of our ancestors’ labor—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their flocks and herds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their sons and daughters.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Let us lie down in our shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let our disgrace cover us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both we and our ancestors;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from our youth till this day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'we have not obeyed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Therefore the showers have been withheld,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no spring rains have fallen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you have the brazen look of a prostitute;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you refuse to blush with shame.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Have you not just called to me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘My Father, my friend from my youth,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: will you always be angry?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will your wrath continue forever?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is how you talk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you do all the evil you can.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Unfaithful Israel
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'During the reign of King Josiah, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Have you seen what faithless Israel has done? She has gone up on every high hill and under every spreading tree and has committed adultery there. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I thought that after she had done all this she would return to me but she did not, and her unfaithful sister Judah saw it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I gave faithless Israel her certificate of divorce and sent her away because of all her adulteries. Yet I saw that her unfaithful sister Judah had no fear; she also went out and committed adultery. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Because Israel’s immorality mattered so little to her, she defiled the land and committed adultery with stone and wood. '
