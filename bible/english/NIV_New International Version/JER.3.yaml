document_id: JER.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: “If a man divorces his wife
  - type: text
    content: and she leaves him and marries another man,
  - type: text
    content: should he return to her again?
  - type: text
    content: Would not the land be completely defiled?
  - type: text
    content: But you have lived as a prostitute with many lovers—
  - type: text
    content: would you now return to me?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: 'In spite of all this, her unfaithful sister Judah did not return to me with all her heart, but only in pretense,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Faithless Israel is more righteous than unfaithful Judah. '
  '12':
  - type: text
    content: 'Go, proclaim this message toward the north:'
  - type: text
    content: '“ ‘Return, faithless Israel,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: ‘I will frown on you no longer,
  - type: text
    content: 'for I am faithful,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: ‘I will not be angry forever.
  '13':
  - type: text
    content: Only acknowledge your guilt—
  - type: text
    content: 'you have rebelled against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: you have scattered your favors to foreign gods
  - type: text
    content: under every spreading tree,
  - type: text
    content: and have not obeyed me,’ ”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: '“Return, faithless people,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “for I am your husband. I will choose you—one from a town and two from a clan—and bring you to Zion. '
  '15':
  - type: text
    content: 'Then I will give you shepherds after my own heart, who will lead you with knowledge and understanding. '
  '16':
  - type: text
    content: 'In those days, when your numbers have increased greatly in the land,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “people will no longer say, ‘The ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: '.’ It will never enter their minds or be remembered; it will not be missed, nor will another one be made. '
  '17':
  - type: text
    content: 'At that time they will call Jerusalem The Throne of the '
  - type: text
    content: Lord
  - type: text
    content: ', and all nations will gather in Jerusalem to honor the name of the '
  - type: text
    content: Lord
  - type: text
    content: '. No longer will they follow the stubbornness of their evil hearts. '
  '18':
  - type: text
    content: In those days the people of Judah will join the people of Israel, and together they will come from a northern land to the land I gave your ancestors as an inheritance.
  '19':
  - type: text
    content: “I myself said,
  - type: text
    content: “ ‘How gladly would I treat you like my children
  - type: text
    content: and give you a pleasant land,
  - type: text
    content: the most beautiful inheritance of any nation.’
  - type: text
    content: I thought you would call me ‘Father’
  - type: text
    content: and not turn away from following me.
  '2':
  - type: text
    content: “Look up to the barren heights and see.
  - type: text
    content: Is there any place where you have not been ravished?
  - type: text
    content: By the roadside you sat waiting for lovers,
  - type: text
    content: sat like a nomad in the desert.
  - type: text
    content: You have defiled the land
  - type: text
    content: with your prostitution and wickedness.
  '20':
  - type: text
    content: But like a woman unfaithful to her husband,
  - type: text
    content: so you, Israel, have been unfaithful to me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: A cry is heard on the barren heights,
  - type: text
    content: the weeping and pleading of the people of Israel,
  - type: text
    content: because they have perverted their ways
  - type: text
    content: 'and have forgotten the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '22':
  - type: text
    content: “Return, faithless people;
  - type: text
    content: I will cure you of backsliding.”
  - type: text
    content: “Yes, we will come to you,
  - type: text
    content: 'for you are the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  '23':
  - type: text
    content: Surely the idolatrous commotion on the hills
  - type: text
    content: and mountains is a deception;
  - type: text
    content: 'surely in the '
  - type: text
    content: Lord
  - type: text
    content: ' our God'
  - type: text
    content: is the salvation of Israel.
  '24':
  - type: text
    content: From our youth shameful gods have consumed
  - type: text
    content: the fruits of our ancestors’ labor—
  - type: text
    content: their flocks and herds,
  - type: text
    content: their sons and daughters.
  '25':
  - type: text
    content: Let us lie down in our shame,
  - type: text
    content: and let our disgrace cover us.
  - type: text
    content: 'We have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: both we and our ancestors;
  - type: text
    content: from our youth till this day
  - type: text
    content: 'we have not obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.”'
  '3':
  - type: text
    content: Therefore the showers have been withheld,
  - type: text
    content: and no spring rains have fallen.
  - type: text
    content: Yet you have the brazen look of a prostitute;
  - type: text
    content: you refuse to blush with shame.
  '4':
  - type: text
    content: 'Have you not just called to me:'
  - type: text
    content: ‘My Father, my friend from my youth,
  '5':
  - type: text
    content: will you always be angry?
  - type: text
    content: Will your wrath continue forever?’
  - type: text
    content: This is how you talk,
  - type: text
    content: but you do all the evil you can.”
  - type: heading
    content: Unfaithful Israel
  '6':
  - type: text
    content: 'During the reign of King Josiah, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Have you seen what faithless Israel has done? She has gone up on every high hill and under every spreading tree and has committed adultery there. '
  '7':
  - type: text
    content: 'I thought that after she had done all this she would return to me but she did not, and her unfaithful sister Judah saw it. '
  '8':
  - type: text
    content: 'I gave faithless Israel her certificate of divorce and sent her away because of all her adulteries. Yet I saw that her unfaithful sister Judah had no fear; she also went out and committed adultery. '
  '9':
  - type: text
    content: 'Because Israel’s immorality mattered so little to her, she defiled the land and committed adultery with stone and wood. '
