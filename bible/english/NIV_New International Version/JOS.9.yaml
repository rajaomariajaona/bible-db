document_id: JOS.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gibeonite Deception
  - type: text
    content: 'Now when all the kings west of the Jordan heard about these things—the kings in the hill country, in the western foothills, and along the entire coast of the Mediterranean Sea as far as Lebanon (the kings of the Hittites, Amorites, Canaanites, Perizzites, Hivites and Jebusites)— '
  '10':
  - type: text
    content: 'and all that he did to the two kings of the Amorites east of the Jordan—Sihon king of Heshbon, and Og king of Bashan, who reigned in Ashtaroth. '
  '11':
  - type: text
    content: 'And our elders and all those living in our country said to us, ‘Take provisions for your journey; go and meet them and say to them, “We are your servants; make a treaty with us.” ’ '
  '12':
  - type: text
    content: 'This bread of ours was warm when we packed it at home on the day we left to come to you. But now see how dry and moldy it is. '
  '13':
  - type: text
    content: And these wineskins that we filled were new, but see how cracked they are. And our clothes and sandals are worn out by the very long journey.”
  '14':
  - type: text
    content: 'The Israelites sampled their provisions but did not inquire of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: Then Joshua made a treaty of peace with them to let them live, and the leaders of the assembly ratified it by oath.
  '16':
  - type: text
    content: 'Three days after they made the treaty with the Gibeonites, the Israelites heard that they were neighbors, living near them. '
  '17':
  - type: text
    content: 'So the Israelites set out and on the third day came to their cities: Gibeon, Kephirah, Beeroth and Kiriath Jearim. '
  '18':
  - type: text
    content: 'But the Israelites did not attack them, because the leaders of the assembly had sworn an oath to them by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  - type: text
    content: 'The whole assembly grumbled against the leaders, '
  '19':
  - type: text
    content: 'but all the leaders answered, “We have given them our oath by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, and we cannot touch them now. '
  '2':
  - type: text
    content: they came together to wage war against Joshua and Israel.
  '20':
  - type: text
    content: 'This is what we will do to them: We will let them live, so that God’s wrath will not fall on us for breaking the oath we swore to them.” '
  '21':
  - type: text
    content: They continued, “Let them live, but let them be woodcutters and water carriers in the service of the whole assembly.” So the leaders’ promise to them was kept.
  '22':
  - type: text
    content: 'Then Joshua summoned the Gibeonites and said, “Why did you deceive us by saying, ‘We live a long way from you,’ while actually you live near us? '
  '23':
  - type: text
    content: 'You are now under a curse: You will never be released from service as woodcutters and water carriers for the house of my God.”'
  '24':
  - type: text
    content: 'They answered Joshua, “Your servants were clearly told how the '
  - type: text
    content: Lord
  - type: text
    content: ' your God had commanded his servant Moses to give you the whole land and to wipe out all its inhabitants from before you. So we feared for our lives because of you, and that is why we did this. '
  '25':
  - type: text
    content: We are now in your hands. Do to us whatever seems good and right to you.”
  '26':
  - type: text
    content: 'So Joshua saved them from the Israelites, and they did not kill them. '
  '27':
  - type: text
    content: 'That day he made the Gibeonites woodcutters and water carriers for the assembly, to provide for the needs of the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' at the place the '
  - type: text
    content: Lord
  - type: text
    content: ' would choose. And that is what they are to this day.'
  '3':
  - type: text
    content: 'However, when the people of Gibeon heard what Joshua had done to Jericho and Ai, '
  '4':
  - type: text
    content: 'they resorted to a ruse: They went as a delegation whose donkeys were loaded'
  - type: note
    content: Most Hebrew manuscripts; some Hebrew manuscripts, Vulgate and Syriac (see also Septuagint) They prepared provisions and loaded their donkeys
  - type: text
    content: ' with worn-out sacks and old wineskins, cracked and mended. '
  '5':
  - type: text
    content: 'They put worn and patched sandals on their feet and wore old clothes. All the bread of their food supply was dry and moldy. '
  '6':
  - type: text
    content: Then they went to Joshua in the camp at Gilgal and said to him and the Israelites, “We have come from a distant country; make a treaty with us.”
  '7':
  - type: text
    content: The Israelites said to the Hivites, “But perhaps you live near us, so how can we make a treaty with you?”
  '8':
  - type: text
    content: “We are your servants,” they said to Joshua.
  - type: text
    content: But Joshua asked, “Who are you and where do you come from?”
  '9':
  - type: text
    content: 'They answered: “Your servants have come from a very distant country because of the fame of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. For we have heard reports of him: all that he did in Egypt, '
