document_id: ACT.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Taken Up Into Heaven
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In my former book, Theophilus, I wrote about all that Jesus began to do and to teach '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were looking intently up into the sky as he was going, when suddenly two men dressed in white stood beside them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Men of Galilee,” they said, “why do you stand here looking into the sky? This same Jesus, who has been taken from you into heaven, will come back in the same way you have seen him go into heaven.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Matthias Chosen to Replace Judas
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the apostles returned to Jerusalem from the hill called the Mount of Olives, a Sabbath day’s walk
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 5/8 mile or about 1 kilometer
      marker-yv: yv-n
    - type: text
      text: ' from the city. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they arrived, they went upstairs to the room where they were staying. Those present were Peter, John, James and Andrew; Philip and Thomas, Bartholomew and Matthew; James son of Alphaeus and Simon the Zealot, and Judas son of James. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They all joined together constantly in prayer, along with the women and Mary the mother of Jesus, and with his brothers.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days Peter stood up among the believers (a group numbering about a hundred and twenty) '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and said, “Brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brothers and sisters '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: adelphoi
        - type: text
          text: ) refers here to believers, both men and women, as part of God’s family; also in 6:3; 11:29; 12:17; 16:40; 18:18, 27; 21:7, 17; 28:14, 15.
      marker-yv: yv-n
    - type: text
      text: ' the Scripture had to be fulfilled in which the Holy Spirit spoke long ago through David concerning Judas, who served as guide for those who arrested Jesus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was one of our number and shared in our ministry.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(With the payment he received for his wickedness, Judas bought a field; there he fell headlong, his body burst open and all his intestines spilled out. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everyone in Jerusalem heard about this, so they called that field in their language Akeldama, that is, Field of Blood.)
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'until the day he was taken up to heaven, after giving instructions through the Holy Spirit to the apostles he had chosen. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For,” said Peter, “it is written in the Book of Psalms:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘May his place be deserted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let there be no one to dwell in it,’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 69:25
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: and,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘May another take his place of leadership.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 109:8
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Therefore it is necessary to choose one of the men who have been with us the whole time the Lord Jesus was living among us, '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: beginning from John’s baptism to the time when Jesus was taken up from us. For one of these must become a witness with us of his resurrection.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they nominated two men: Joseph called Barsabbas (also known as Justus) and Matthias. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they prayed, “Lord, you know everyone’s heart. Show us which of these two you have chosen '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to take over this apostolic ministry, which Judas left to go where he belongs.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they cast lots, and the lot fell to Matthias; so he was added to the eleven apostles.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After his suffering, he presented himself to them and gave many convincing proofs that he was alive. He appeared to them over a period of forty days and spoke about the kingdom of God. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On one occasion, while he was eating with them, he gave them this command: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not leave Jerusalem, but wait for the gift my Father promised, which you have heard me speak about.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For John baptized with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: water, but in a few days you will be baptized with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the Holy Spirit.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they gathered around him and asked him, “Lord, are you at this time going to restore the kingdom to Israel?”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is not for you to know the times or dates the Father has set by his own authority.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you will receive power when the Holy Spirit comes on you; and you will be my witnesses in Jerusalem, and in all Judea and Samaria, and to the ends of the earth.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After he said this, he was taken up before their very eyes, and a cloud hid him from their sight.
