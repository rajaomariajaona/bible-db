document_id: ACT.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Taken Up Into Heaven
  - type: text
    content: 'In my former book, Theophilus, I wrote about all that Jesus began to do and to teach '
  '10':
  - type: text
    content: 'They were looking intently up into the sky as he was going, when suddenly two men dressed in white stood beside them. '
  '11':
  - type: text
    content: “Men of Galilee,” they said, “why do you stand here looking into the sky? This same Jesus, who has been taken from you into heaven, will come back in the same way you have seen him go into heaven.”
  - type: heading
    content: Matthias Chosen to Replace Judas
  '12':
  - type: text
    content: Then the apostles returned to Jerusalem from the hill called the Mount of Olives, a Sabbath day’s walk
  - type: note
    content: That is, about 5/8 mile or about 1 kilometer
  - type: text
    content: ' from the city. '
  '13':
  - type: text
    content: 'When they arrived, they went upstairs to the room where they were staying. Those present were Peter, John, James and Andrew; Philip and Thomas, Bartholomew and Matthew; James son of Alphaeus and Simon the Zealot, and Judas son of James. '
  '14':
  - type: text
    content: They all joined together constantly in prayer, along with the women and Mary the mother of Jesus, and with his brothers.
  '15':
  - type: text
    content: 'In those days Peter stood up among the believers (a group numbering about a hundred and twenty) '
  '16':
  - type: text
    content: and said, “Brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in 6:3; 11:29; 12:17; 16:40; 18:18, 27; 21:7, 17; 28:14, 15.
  - type: text
    content: ' the Scripture had to be fulfilled in which the Holy Spirit spoke long ago through David concerning Judas, who served as guide for those who arrested Jesus. '
  '17':
  - type: text
    content: He was one of our number and shared in our ministry.”
  '18':
  - type: text
    content: '(With the payment he received for his wickedness, Judas bought a field; there he fell headlong, his body burst open and all his intestines spilled out. '
  '19':
  - type: text
    content: Everyone in Jerusalem heard about this, so they called that field in their language Akeldama, that is, Field of Blood.)
  '2':
  - type: text
    content: 'until the day he was taken up to heaven, after giving instructions through the Holy Spirit to the apostles he had chosen. '
  '20':
  - type: text
    content: '“For,” said Peter, “it is written in the Book of Psalms:'
  - type: text
    content: “ ‘May his place be deserted;
  - type: text
    content: let there be no one to dwell in it,’
  - type: note
    content: Psalm 69:25
  - type: text
    content: and,
  - type: text
    content: “ ‘May another take his place of leadership.’
  - type: note
    content: Psalm 109:8
  '21':
  - type: text
    content: 'Therefore it is necessary to choose one of the men who have been with us the whole time the Lord Jesus was living among us, '
  '22':
  - type: text
    content: beginning from John’s baptism to the time when Jesus was taken up from us. For one of these must become a witness with us of his resurrection.”
  '23':
  - type: text
    content: 'So they nominated two men: Joseph called Barsabbas (also known as Justus) and Matthias. '
  '24':
  - type: text
    content: 'Then they prayed, “Lord, you know everyone’s heart. Show us which of these two you have chosen '
  '25':
  - type: text
    content: 'to take over this apostolic ministry, which Judas left to go where he belongs.” '
  '26':
  - type: text
    content: Then they cast lots, and the lot fell to Matthias; so he was added to the eleven apostles.
  '3':
  - type: text
    content: 'After his suffering, he presented himself to them and gave many convincing proofs that he was alive. He appeared to them over a period of forty days and spoke about the kingdom of God. '
  '4':
  - type: text
    content: 'On one occasion, while he was eating with them, he gave them this command: '
  - type: text
    content: “Do not leave Jerusalem, but wait for the gift my Father promised, which you have heard me speak about.
  - type: text
    content: ' '
  '5':
  - type: text
    content: For John baptized with
  - type: note
    content: Or in
  - type: text
    content: ' '
  - type: text
    content: water, but in a few days you will be baptized with
  - type: note
    content: Or in
  - type: text
    content: ' '
  - type: text
    content: the Holy Spirit.”
  '6':
  - type: text
    content: Then they gathered around him and asked him, “Lord, are you at this time going to restore the kingdom to Israel?”
  '7':
  - type: text
    content: 'He said to them: '
  - type: text
    content: “It is not for you to know the times or dates the Father has set by his own authority.
  - type: text
    content: ' '
  '8':
  - type: text
    content: But you will receive power when the Holy Spirit comes on you; and you will be my witnesses in Jerusalem, and in all Judea and Samaria, and to the ends of the earth.”
  '9':
  - type: text
    content: After he said this, he was taken up before their very eyes, and a cloud hid him from their sight.
