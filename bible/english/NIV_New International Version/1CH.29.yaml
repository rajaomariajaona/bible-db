document_id: 1CH.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Gifts for Building the Temple
  - type: text
    content: 'Then King David said to the whole assembly: “My son Solomon, the one whom God has chosen, is young and inexperienced. The task is great, because this palatial structure is not for man but for the '
  - type: text
    content: Lord
  - type: text
    content: ' God. '
  '10':
  - type: text
    content: 'David praised the '
  - type: text
    content: Lord
  - type: text
    content: ' in the presence of the whole assembly, saying,'
  - type: text
    content: '“Praise be to you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the God of our father Israel,
  - type: text
    content: from everlasting to everlasting.
  '11':
  - type: text
    content: 'Yours, '
  - type: text
    content: Lord
  - type: text
    content: ', is the greatness and the power'
  - type: text
    content: and the glory and the majesty and the splendor,
  - type: text
    content: for everything in heaven and earth is yours.
  - type: text
    content: 'Yours, '
  - type: text
    content: Lord
  - type: text
    content: ', is the kingdom;'
  - type: text
    content: you are exalted as head over all.
  '12':
  - type: text
    content: Wealth and honor come from you;
  - type: text
    content: you are the ruler of all things.
  - type: text
    content: In your hands are strength and power
  - type: text
    content: to exalt and give strength to all.
  '13':
  - type: text
    content: Now, our God, we give you thanks,
  - type: text
    content: and praise your glorious name.
  '14':
  - type: text
    content: '“But who am I, and who are my people, that we should be able to give as generously as this? Everything comes from you, and we have given you only what comes from your hand. '
  '15':
  - type: text
    content: 'We are foreigners and strangers in your sight, as were all our ancestors. Our days on earth are like a shadow, without hope. '
  '16':
  - type: text
    content: Lord
  - type: text
    content: ' our God, all this abundance that we have provided for building you a temple for your Holy Name comes from your hand, and all of it belongs to you. '
  '17':
  - type: text
    content: 'I know, my God, that you test the heart and are pleased with integrity. All these things I have given willingly and with honest intent. And now I have seen with joy how willingly your people who are here have given to you. '
  '18':
  - type: text
    content: Lord
  - type: text
    content: ', the God of our fathers Abraham, Isaac and Israel, keep these desires and thoughts in the hearts of your people forever, and keep their hearts loyal to you. '
  '19':
  - type: text
    content: And give my son Solomon the wholehearted devotion to keep your commands, statutes and decrees and to do everything to build the palatial structure for which I have provided.”
  '2':
  - type: text
    content: With all my resources I have provided for the temple of my God—gold for the gold work, silver for the silver, bronze for the bronze, iron for the iron and wood for the wood, as well as onyx for the settings, turquoise,
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' stones of various colors, and all kinds of fine stone and marble—all of these in large quantities. '
  '20':
  - type: text
    content: 'Then David said to the whole assembly, “Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.” So they all praised the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers; they bowed down, prostrating themselves before the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king.'
  - type: heading
    content: Solomon Acknowledged as King
  '21':
  - type: text
    content: 'The next day they made sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ' and presented burnt offerings to him: a thousand bulls, a thousand rams and a thousand male lambs, together with their drink offerings, and other sacrifices in abundance for all Israel. '
  '22':
  - type: text
    content: 'They ate and drank with great joy in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' that day.'
  - type: text
    content: 'Then they acknowledged Solomon son of David as king a second time, anointing him before the '
  - type: text
    content: Lord
  - type: text
    content: ' to be ruler and Zadok to be priest. '
  '23':
  - type: text
    content: 'So Solomon sat on the throne of the '
  - type: text
    content: Lord
  - type: text
    content: ' as king in place of his father David. He prospered and all Israel obeyed him. '
  '24':
  - type: text
    content: All the officers and warriors, as well as all of King David’s sons, pledged their submission to King Solomon.
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' highly exalted Solomon in the sight of all Israel and bestowed on him royal splendor such as no king over Israel ever had before.'
  - type: heading
    content: The Death of David
  '26':
  - type: text
    content: 'David son of Jesse was king over all Israel. '
  '27':
  - type: text
    content: 'He ruled over Israel forty years—seven in Hebron and thirty-three in Jerusalem. '
  '28':
  - type: text
    content: He died at a good old age, having enjoyed long life, wealth and honor. His son Solomon succeeded him as king.
  '29':
  - type: text
    content: 'As for the events of King David’s reign, from beginning to end, they are written in the records of Samuel the seer, the records of Nathan the prophet and the records of Gad the seer, '
  '3':
  - type: text
    content: 'Besides, in my devotion to the temple of my God I now give my personal treasures of gold and silver for the temple of my God, over and above everything I have provided for this holy temple: '
  '30':
  - type: text
    content: together with the details of his reign and power, and the circumstances that surrounded him and Israel and the kingdoms of all the other lands.
  '4':
  - type: text
    content: three thousand talents
  - type: note
    content: That is, about 110 tons or about 100 metric tons
  - type: text
    content: ' of gold (gold of Ophir) and seven thousand talents'
  - type: note
    content: That is, about 260 tons or about 235 metric tons
  - type: text
    content: ' of refined silver, for the overlaying of the walls of the buildings, '
  '5':
  - type: text
    content: 'for the gold work and the silver work, and for all the work to be done by the craftsmen. Now, who is willing to consecrate themselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' today?”'
  '6':
  - type: text
    content: 'Then the leaders of families, the officers of the tribes of Israel, the commanders of thousands and commanders of hundreds, and the officials in charge of the king’s work gave willingly. '
  '7':
  - type: text
    content: They gave toward the work on the temple of God five thousand talents
  - type: note
    content: That is, about 190 tons or about 170 metric tons
  - type: text
    content: ' and ten thousand darics'
  - type: note
    content: That is, about 185 pounds or about 84 kilograms
  - type: text
    content: ' of gold, ten thousand talents'
  - type: note
    content: That is, about 380 tons or about 340 metric tons
  - type: text
    content: ' of silver, eighteen thousand talents'
  - type: note
    content: That is, about 675 tons or about 610 metric tons
  - type: text
    content: ' of bronze and a hundred thousand talents'
  - type: note
    content: That is, about 3,800 tons or about 3,400 metric tons
  - type: text
    content: ' of iron. '
  '8':
  - type: text
    content: 'Anyone who had precious stones gave them to the treasury of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in the custody of Jehiel the Gershonite. '
  '9':
  - type: text
    content: 'The people rejoiced at the willing response of their leaders, for they had given freely and wholeheartedly to the '
  - type: text
    content: Lord
  - type: text
    content: . David the king also rejoiced greatly.
  - type: heading
    content: David’s Prayer
