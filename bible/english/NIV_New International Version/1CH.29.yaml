document_id: 1CH.29,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gifts for Building the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King David said to the whole assembly: “My son Solomon, the one whom God has chosen, is young and inexperienced. The task is great, because this palatial structure is not for man but for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the presence of the whole assembly, saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Praise be to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of our father Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from everlasting to everlasting.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yours, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', is the greatness and the power'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the glory and the majesty and the splendor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for everything in heaven and earth is yours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yours, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', is the kingdom;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are exalted as head over all.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wealth and honor come from you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are the ruler of all things.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your hands are strength and power
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to exalt and give strength to all.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now, our God, we give you thanks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and praise your glorious name.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But who am I, and who are my people, that we should be able to give as generously as this? Everything comes from you, and we have given you only what comes from your hand. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We are foreigners and strangers in your sight, as were all our ancestors. Our days on earth are like a shadow, without hope. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, all this abundance that we have provided for building you a temple for your Holy Name comes from your hand, and all of it belongs to you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I know, my God, that you test the heart and are pleased with integrity. All these things I have given willingly and with honest intent. And now I have seen with joy how willingly your people who are here have given to you. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of our fathers Abraham, Isaac and Israel, keep these desires and thoughts in the hearts of your people forever, and keep their hearts loyal to you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And give my son Solomon the wholehearted devotion to keep your commands, statutes and decrees and to do everything to build the palatial structure for which I have provided.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: With all my resources I have provided for the temple of my God—gold for the gold work, silver for the silver, bronze for the bronze, iron for the iron and wood for the wood, as well as onyx for the settings, turquoise,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' stones of various colors, and all kinds of fine stone and marble—all of these in large quantities. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said to the whole assembly, “Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.” So they all praised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their fathers; they bowed down, prostrating themselves before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the king.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Acknowledged as King
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day they made sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and presented burnt offerings to him: a thousand bulls, a thousand rams and a thousand male lambs, together with their drink offerings, and other sacrifices in abundance for all Israel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They ate and drank with great joy in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that day.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they acknowledged Solomon son of David as king a second time, anointing him before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to be ruler and Zadok to be priest. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Solomon sat on the throne of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as king in place of his father David. He prospered and all Israel obeyed him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the officers and warriors, as well as all of King David’s sons, pledged their submission to King Solomon.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' highly exalted Solomon in the sight of all Israel and bestowed on him royal splendor such as no king over Israel ever had before.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of David
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David son of Jesse was king over all Israel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He ruled over Israel forty years—seven in Hebron and thirty-three in Jerusalem. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He died at a good old age, having enjoyed long life, wealth and honor. His son Solomon succeeded him as king.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the events of King David’s reign, from beginning to end, they are written in the records of Samuel the seer, the records of Nathan the prophet and the records of Gad the seer, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Besides, in my devotion to the temple of my God I now give my personal treasures of gold and silver for the temple of my God, over and above everything I have provided for this holy temple: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: together with the details of his reign and power, and the circumstances that surrounded him and Israel and the kingdoms of all the other lands.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: three thousand talents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 110 tons or about 100 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of gold (gold of Ophir) and seven thousand talents'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 260 tons or about 235 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of refined silver, for the overlaying of the walls of the buildings, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the gold work and the silver work, and for all the work to be done by the craftsmen. Now, who is willing to consecrate themselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' today?”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the leaders of families, the officers of the tribes of Israel, the commanders of thousands and commanders of hundreds, and the officials in charge of the king’s work gave willingly. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They gave toward the work on the temple of God five thousand talents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 190 tons or about 170 metric tons
      marker-yv: yv-n
    - type: text
      text: ' and ten thousand darics'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 185 pounds or about 84 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of gold, ten thousand talents'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 380 tons or about 340 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of silver, eighteen thousand talents'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 675 tons or about 610 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of bronze and a hundred thousand talents'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 3,800 tons or about 3,400 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of iron. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anyone who had precious stones gave them to the treasury of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the custody of Jehiel the Gershonite. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people rejoiced at the willing response of their leaders, for they had given freely and wholeheartedly to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . David the king also rejoiced greatly.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Prayer
    marker-yv: yv-h
