document_id: JOS.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Cities of Refuge
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua: '
  '2':
  - type: text
    content: '“Tell the Israelites to designate the cities of refuge, as I instructed you through Moses, '
  '3':
  - type: text
    content: 'so that anyone who kills a person accidentally and unintentionally may flee there and find protection from the avenger of blood. '
  '4':
  - type: text
    content: 'When they flee to one of these cities, they are to stand in the entrance of the city gate and state their case before the elders of that city. Then the elders are to admit the fugitive into their city and provide a place to live among them. '
  '5':
  - type: text
    content: 'If the avenger of blood comes in pursuit, the elders must not surrender the fugitive, because the fugitive killed their neighbor unintentionally and without malice aforethought. '
  '6':
  - type: text
    content: They are to stay in that city until they have stood trial before the assembly and until the death of the high priest who is serving at that time. Then they may go back to their own home in the town from which they fled.”
  '7':
  - type: text
    content: 'So they set apart Kedesh in Galilee in the hill country of Naphtali, Shechem in the hill country of Ephraim, and Kiriath Arba (that is, Hebron) in the hill country of Judah. '
  '8':
  - type: text
    content: 'East of the Jordan (on the other side from Jericho) they designated Bezer in the wilderness on the plateau in the tribe of Reuben, Ramoth in Gilead in the tribe of Gad, and Golan in Bashan in the tribe of Manasseh. '
  '9':
  - type: text
    content: Any of the Israelites or any foreigner residing among them who killed someone accidentally could flee to these designated cities and not be killed by the avenger of blood prior to standing trial before the assembly.
