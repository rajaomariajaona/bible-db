  '1':
  - type: heading
    content: The Song of Deborah
  - type: text
    content: 'On that day Deborah and Barak son of Abinoam sang this song:'
  '10':
  - type: text
    content: “You who ride on white donkeys,
  - type: text
    content: sitting on your saddle blankets,
  - type: text
    content: and you who walk along the road,
  - type: text
    content: 'consider '
  '11':
  - type: text
    content: the voice of the singers
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' at the watering places.'
  - type: text
    content: 'They recite the victories of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the victories of his villagers in Israel.
  - type: text
    content: '“Then the people of the '
  - type: text
    content: Lord
  - type: text
    content: went down to the city gates.
  '12':
  - type: text
    content: ‘Wake up, wake up, Deborah!
  - type: text
    content: Wake up, wake up, break out in song!
  - type: text
    content: Arise, Barak!
  - type: text
    content: Take captive your captives, son of Abinoam.’
  '13':
  - type: text
    content: “The remnant of the nobles came down;
  - type: text
    content: 'the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' came down to me against the mighty.'
  '14':
  - type: text
    content: Some came from Ephraim, whose roots were in Amalek;
  - type: text
    content: Benjamin was with the people who followed you.
  - type: text
    content: From Makir captains came down,
  - type: text
    content: from Zebulun those who bear a commander’s
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' staff.'
  '15':
  - type: text
    content: The princes of Issachar were with Deborah;
  - type: text
    content: yes, Issachar was with Barak,
  - type: text
    content: sent under his command into the valley.
  - type: text
    content: In the districts of Reuben
  - type: text
    content: there was much searching of heart.
  '16':
  - type: text
    content: Why did you stay among the sheep pens
  - type: note
    content: Or the campfires; or the saddlebags
  - type: text
    content: to hear the whistling for the flocks?
  - type: text
    content: In the districts of Reuben
  - type: text
    content: there was much searching of heart.
  '17':
  - type: text
    content: Gilead stayed beyond the Jordan.
  - type: text
    content: And Dan, why did he linger by the ships?
  - type: text
    content: Asher remained on the coast
  - type: text
    content: and stayed in his coves.
  '18':
  - type: text
    content: The people of Zebulun risked their very lives;
  - type: text
    content: so did Naphtali on the terraced fields.
  '19':
  - type: text
    content: “Kings came, they fought,
  - type: text
    content: the kings of Canaan fought.
  - type: text
    content: At Taanach, by the waters of Megiddo,
  - type: text
    content: they took no plunder of silver.
  '2':
  - type: text
    content: “When the princes in Israel take the lead,
  - type: text
    content: when the people willingly offer themselves—
  - type: text
    content: 'praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '20':
  - type: text
    content: From the heavens the stars fought,
  - type: text
    content: from their courses they fought against Sisera.
  '21':
  - type: text
    content: The river Kishon swept them away,
  - type: text
    content: the age-old river, the river Kishon.
  - type: text
    content: March on, my soul; be strong!
  '22':
  - type: text
    content: Then thundered the horses’ hooves—
  - type: text
    content: galloping, galloping go his mighty steeds.
  '23':
  - type: text
    content: '‘Curse Meroz,’ said the angel of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: ‘Curse its people bitterly,
  - type: text
    content: 'because they did not come to help the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'to help the '
  - type: text
    content: Lord
  - type: text
    content: ' against the mighty.’'
  '24':
  - type: text
    content: “Most blessed of women be Jael,
  - type: text
    content: the wife of Heber the Kenite,
  - type: text
    content: most blessed of tent-dwelling women.
  '25':
  - type: text
    content: He asked for water, and she gave him milk;
  - type: text
    content: in a bowl fit for nobles she brought him curdled milk.
  '26':
  - type: text
    content: Her hand reached for the tent peg,
  - type: text
    content: her right hand for the workman’s hammer.
  - type: text
    content: She struck Sisera, she crushed his head,
  - type: text
    content: she shattered and pierced his temple.
  '27':
  - type: text
    content: At her feet he sank,
  - type: text
    content: he fell; there he lay.
  - type: text
    content: At her feet he sank, he fell;
  - type: text
    content: where he sank, there he fell—dead.
  '28':
  - type: text
    content: “Through the window peered Sisera’s mother;
  - type: text
    content: behind the lattice she cried out,
  - type: text
    content: ‘Why is his chariot so long in coming?
  - type: text
    content: Why is the clatter of his chariots delayed?’
  '29':
  - type: text
    content: The wisest of her ladies answer her;
  - type: text
    content: indeed, she keeps saying to herself,
  '3':
  - type: text
    content: “Hear this, you kings! Listen, you rulers!
  - type: text
    content: I, even I, will sing to
  - type: note
    content: Or of
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'I will praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, in song.'
  '30':
  - type: text
    content: '‘Are they not finding and dividing the spoils:'
  - type: text
    content: a woman or two for each man,
  - type: text
    content: colorful garments as plunder for Sisera,
  - type: text
    content: colorful garments embroidered,
  - type: text
    content: highly embroidered garments for my neck—
  - type: text
    content: all this as plunder?’
  '31':
  - type: text
    content: '“So may all your enemies perish, '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: But may all who love you be like the sun
  - type: text
    content: when it rises in its strength.”
  - type: text
    content: Then the land had peace forty years.
  '4':
  - type: text
    content: '“When you, '
  - type: text
    content: Lord
  - type: text
    content: ', went out from Seir,'
  - type: text
    content: when you marched from the land of Edom,
  - type: text
    content: the earth shook, the heavens poured,
  - type: text
    content: the clouds poured down water.
  '5':
  - type: text
    content: 'The mountains quaked before the '
  - type: text
    content: Lord
  - type: text
    content: ', the One of Sinai,'
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  '6':
  - type: text
    content: “In the days of Shamgar son of Anath,
  - type: text
    content: in the days of Jael, the highways were abandoned;
  - type: text
    content: travelers took to winding paths.
  '7':
  - type: text
    content: Villagers in Israel would not fight;
  - type: text
    content: they held back until I, Deborah, arose,
  - type: text
    content: until I arose, a mother in Israel.
  '8':
  - type: text
    content: God chose new leaders
  - type: text
    content: when war came to the city gates,
  - type: text
    content: but not a shield or spear was seen
  - type: text
    content: among forty thousand in Israel.
  '9':
  - type: text
    content: My heart is with Israel’s princes,
  - type: text
    content: with the willing volunteers among the people.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: '!'
