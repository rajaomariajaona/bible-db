document_id: JDG.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Song of Deborah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'On that day Deborah and Barak son of Abinoam sang this song:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “You who ride on white donkeys,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sitting on your saddle blankets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you who walk along the road,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'consider '
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: the voice of the singers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' at the watering places.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They recite the victories of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the victories of his villagers in Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Then the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: went down to the city gates.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ‘Wake up, wake up, Deborah!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wake up, wake up, break out in song!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, Barak!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take captive your captives, son of Abinoam.’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “The remnant of the nobles came down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the people of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came down to me against the mighty.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Some came from Ephraim, whose roots were in Amalek;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Benjamin was with the people who followed you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From Makir captains came down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from Zebulun those who bear a commander’s
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' staff.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The princes of Issachar were with Deborah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, Issachar was with Barak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sent under his command into the valley.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the districts of Reuben
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there was much searching of heart.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Why did you stay among the sheep pens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the campfires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the saddlebags
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to hear the whistling for the flocks?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the districts of Reuben
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there was much searching of heart.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Gilead stayed beyond the Jordan.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Dan, why did he linger by the ships?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asher remained on the coast
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stayed in his coves.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The people of Zebulun risked their very lives;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so did Naphtali on the terraced fields.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “Kings came, they fought,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the kings of Canaan fought.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At Taanach, by the waters of Megiddo,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they took no plunder of silver.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “When the princes in Israel take the lead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the people willingly offer themselves—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: From the heavens the stars fought,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from their courses they fought against Sisera.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The river Kishon swept them away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the age-old river, the river Kishon.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: March on, my soul; be strong!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Then thundered the horses’ hooves—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: galloping, galloping go his mighty steeds.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '‘Curse Meroz,’ said the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Curse its people bitterly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'because they did not come to help the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to help the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' against the mighty.’'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Most blessed of women be Jael,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wife of Heber the Kenite,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: most blessed of tent-dwelling women.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: He asked for water, and she gave him milk;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in a bowl fit for nobles she brought him curdled milk.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Her hand reached for the tent peg,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her right hand for the workman’s hammer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She struck Sisera, she crushed his head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she shattered and pierced his temple.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: At her feet he sank,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he fell; there he lay.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At her feet he sank, he fell;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where he sank, there he fell—dead.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “Through the window peered Sisera’s mother;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: behind the lattice she cried out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Why is his chariot so long in coming?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why is the clatter of his chariots delayed?’
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The wisest of her ladies answer her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: indeed, she keeps saying to herself,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Hear this, you kings! Listen, you rulers!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I, even I, will sing to
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, in song.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '‘Are they not finding and dividing the spoils:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a woman or two for each man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: colorful garments as plunder for Sisera,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: colorful garments embroidered,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: highly embroidered garments for my neck—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all this as plunder?’
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“So may all your enemies perish, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But may all who love you be like the sun
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when it rises in its strength.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the land had peace forty years.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“When you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', went out from Seir,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you marched from the land of Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the earth shook, the heavens poured,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the clouds poured down water.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The mountains quaked before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the One of Sinai,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “In the days of Shamgar son of Anath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the days of Jael, the highways were abandoned;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: travelers took to winding paths.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Villagers in Israel would not fight;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they held back until I, Deborah, arose,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until I arose, a mother in Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: God chose new leaders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when war came to the city gates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but not a shield or spear was seen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among forty thousand in Israel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: My heart is with Israel’s princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the willing volunteers among the people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
