document_id: LEV.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Olive Oil and Bread Set Before the Lord
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'Now the son of an Israelite mother and an Egyptian father went out among the Israelites, and a fight broke out in the camp between him and an Israelite. '
  '11':
  - type: text
    content: 'The son of the Israelite woman blasphemed the Name with a curse; so they brought him to Moses. (His mother’s name was Shelomith, the daughter of Dibri the Danite.) '
  '12':
  - type: text
    content: 'They put him in custody until the will of the '
  - type: text
    content: Lord
  - type: text
    content: ' should be made clear to them.'
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses: '
  '14':
  - type: text
    content: '“Take the blasphemer outside the camp. All those who heard him are to lay their hands on his head, and the entire assembly is to stone him. '
  '15':
  - type: text
    content: 'Say to the Israelites: ‘Anyone who curses their God will be held responsible; '
  '16':
  - type: text
    content: 'anyone who blasphemes the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' is to be put to death. The entire assembly must stone them. Whether foreigner or native-born, when they blaspheme the Name they are to be put to death.'
  '17':
  - type: text
    content: '“ ‘Anyone who takes the life of a human being is to be put to death. '
  '18':
  - type: text
    content: 'Anyone who takes the life of someone’s animal must make restitution—life for life. '
  '19':
  - type: text
    content: 'Anyone who injures their neighbor is to be injured in the same manner: '
  '2':
  - type: text
    content: '“Command the Israelites to bring you clear oil of pressed olives for the light so that the lamps may be kept burning continually. '
  '20':
  - type: text
    content: 'fracture for fracture, eye for eye, tooth for tooth. The one who has inflicted the injury must suffer the same injury. '
  '21':
  - type: text
    content: 'Whoever kills an animal must make restitution, but whoever kills a human being is to be put to death. '
  '22':
  - type: text
    content: 'You are to have the same law for the foreigner and the native-born. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’ ”'
  '23':
  - type: text
    content: 'Then Moses spoke to the Israelites, and they took the blasphemer outside the camp and stoned him. The Israelites did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '3':
  - type: text
    content: 'Outside the curtain that shields the ark of the covenant law in the tent of meeting, Aaron is to tend the lamps before the '
  - type: text
    content: Lord
  - type: text
    content: ' from evening till morning, continually. This is to be a lasting ordinance for the generations to come. '
  '4':
  - type: text
    content: 'The lamps on the pure gold lampstand before the '
  - type: text
    content: Lord
  - type: text
    content: ' must be tended continually.'
  '5':
  - type: text
    content: “Take the finest flour and bake twelve loaves of bread, using two-tenths of an ephah
  - type: note
    content: That is, probably about 7 pounds or about 3.2 kilograms
  - type: text
    content: ' for each loaf. '
  '6':
  - type: text
    content: 'Arrange them in two stacks, six in each stack, on the table of pure gold before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: By each stack put some pure incense as a memorial
  - type: note
    content: Or representative
  - type: text
    content: ' portion to represent the bread and to be a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'This bread is to be set out before the '
  - type: text
    content: Lord
  - type: text
    content: ' regularly, Sabbath after Sabbath, on behalf of the Israelites, as a lasting covenant. '
  '9':
  - type: text
    content: 'It belongs to Aaron and his sons, who are to eat it in the sanctuary area, because it is a most holy part of their perpetual share of the food offerings presented to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: A Blasphemer Put to Death
