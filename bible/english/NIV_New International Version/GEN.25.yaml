document_id: GEN.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Abraham
  - type: text
    content: 'Abraham had taken another wife, whose name was Keturah. '
  '10':
  - type: text
    content: the field Abraham had bought from the Hittites.
  - type: note
    content: Or the descendants of Heth
  - type: text
    content: ' There Abraham was buried with his wife Sarah. '
  '11':
  - type: text
    content: After Abraham’s death, God blessed his son Isaac, who then lived near Beer Lahai Roi.
  - type: heading
    content: Ishmael’s Sons
  '12':
  - type: text
    content: This is the account of the family line of Abraham’s son Ishmael, whom Sarah’s slave, Hagar the Egyptian, bore to Abraham.
  '13':
  - type: text
    content: 'These are the names of the sons of Ishmael, listed in the order of their birth: Nebaioth the firstborn of Ishmael, Kedar, Adbeel, Mibsam, '
  '14':
  - type: text
    content: 'Mishma, Dumah, Massa, '
  '15':
  - type: text
    content: 'Hadad, Tema, Jetur, Naphish and Kedemah. '
  '16':
  - type: text
    content: 'These were the sons of Ishmael, and these are the names of the twelve tribal rulers according to their settlements and camps. '
  '17':
  - type: text
    content: 'Ishmael lived a hundred and thirty-seven years. He breathed his last and died, and he was gathered to his people. '
  '18':
  - type: text
    content: His descendants settled in the area from Havilah to Shur, near the eastern border of Egypt, as you go toward Ashur. And they lived in hostility toward
  - type: note
    content: Or lived to the east of
  - type: text
    content: ' all the tribes related to them.'
  - type: heading
    content: Jacob and Esau
  '19':
  - type: text
    content: This is the account of the family line of Abraham’s son Isaac.
  - type: text
    content: 'Abraham became the father of Isaac, '
  '2':
  - type: text
    content: 'She bore him Zimran, Jokshan, Medan, Midian, Ishbak and Shuah. '
  '20':
  - type: text
    content: and Isaac was forty years old when he married Rebekah daughter of Bethuel the Aramean from Paddan Aram
  - type: note
    content: That is, Northwest Mesopotamia
  - type: text
    content: ' and sister of Laban the Aramean.'
  '21':
  - type: text
    content: 'Isaac prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' on behalf of his wife, because she was childless. The '
  - type: text
    content: Lord
  - type: text
    content: ' answered his prayer, and his wife Rebekah became pregnant. '
  '22':
  - type: text
    content: 'The babies jostled each other within her, and she said, “Why is this happening to me?” So she went to inquire of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to her,'
  - type: text
    content: “Two nations are in your womb,
  - type: text
    content: and two peoples from within you will be separated;
  - type: text
    content: one people will be stronger than the other,
  - type: text
    content: and the older will serve the younger.”
  '24':
  - type: text
    content: 'When the time came for her to give birth, there were twin boys in her womb. '
  '25':
  - type: text
    content: The first to come out was red, and his whole body was like a hairy garment; so they named him Esau.
  - type: note
    content: Esau may mean hairy.
  - type: text
    content: ' '
  '26':
  - type: text
    content: After this, his brother came out, with his hand grasping Esau’s heel; so he was named Jacob.
  - type: note
    content: Jacob means he grasps the heel, a Hebrew idiom for he deceives.
  - type: text
    content: ' Isaac was sixty years old when Rebekah gave birth to them.'
  '27':
  - type: text
    content: 'The boys grew up, and Esau became a skillful hunter, a man of the open country, while Jacob was content to stay at home among the tents. '
  '28':
  - type: text
    content: Isaac, who had a taste for wild game, loved Esau, but Rebekah loved Jacob.
  '29':
  - type: text
    content: 'Once when Jacob was cooking some stew, Esau came in from the open country, famished. '
  '3':
  - type: text
    content: 'Jokshan was the father of Sheba and Dedan; the descendants of Dedan were the Ashurites, the Letushites and the Leummites. '
  '30':
  - type: text
    content: He said to Jacob, “Quick, let me have some of that red stew! I’m famished!” (That is why he was also called Edom.
  - type: note
    content: Edom means red.
  - type: text
    content: )
  '31':
  - type: text
    content: Jacob replied, “First sell me your birthright.”
  '32':
  - type: text
    content: “Look, I am about to die,” Esau said. “What good is the birthright to me?”
  '33':
  - type: text
    content: But Jacob said, “Swear to me first.” So he swore an oath to him, selling his birthright to Jacob.
  '34':
  - type: text
    content: Then Jacob gave Esau some bread and some lentil stew. He ate and drank, and then got up and left.
  - type: text
    content: So Esau despised his birthright.
  '4':
  - type: text
    content: The sons of Midian were Ephah, Epher, Hanok, Abida and Eldaah. All these were descendants of Keturah.
  '5':
  - type: text
    content: 'Abraham left everything he owned to Isaac. '
  '6':
  - type: text
    content: But while he was still living, he gave gifts to the sons of his concubines and sent them away from his son Isaac to the land of the east.
  '7':
  - type: text
    content: 'Abraham lived a hundred and seventy-five years. '
  '8':
  - type: text
    content: 'Then Abraham breathed his last and died at a good old age, an old man and full of years; and he was gathered to his people. '
  '9':
  - type: text
    content: 'His sons Isaac and Ishmael buried him in the cave of Machpelah near Mamre, in the field of Ephron son of Zohar the Hittite, '
