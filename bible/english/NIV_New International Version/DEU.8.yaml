document_id: DEU.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Do Not Forget the Lord
  - type: text
    content: 'Be careful to follow every command I am giving you today, so that you may live and increase and may enter and possess the land the '
  - type: text
    content: Lord
  - type: text
    content: ' promised on oath to your ancestors. '
  '10':
  - type: text
    content: 'When you have eaten and are satisfied, praise the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for the good land he has given you. '
  '11':
  - type: text
    content: 'Be careful that you do not forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, failing to observe his commands, his laws and his decrees that I am giving you this day. '
  '12':
  - type: text
    content: 'Otherwise, when you eat and are satisfied, when you build fine houses and settle down, '
  '13':
  - type: text
    content: 'and when your herds and flocks grow large and your silver and gold increase and all you have is multiplied, '
  '14':
  - type: text
    content: 'then your heart will become proud and you will forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of Egypt, out of the land of slavery. '
  '15':
  - type: text
    content: 'He led you through the vast and dreadful wilderness, that thirsty and waterless land, with its venomous snakes and scorpions. He brought you water out of hard rock. '
  '16':
  - type: text
    content: 'He gave you manna to eat in the wilderness, something your ancestors had never known, to humble and test you so that in the end it might go well with you. '
  '17':
  - type: text
    content: 'You may say to yourself, “My power and the strength of my hands have produced this wealth for me.” '
  '18':
  - type: text
    content: 'But remember the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, for it is he who gives you the ability to produce wealth, and so confirms his covenant, which he swore to your ancestors, as it is today.'
  '19':
  - type: text
    content: 'If you ever forget the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and follow other gods and worship and bow down to them, I testify against you today that you will surely be destroyed. '
  '2':
  - type: text
    content: 'Remember how the '
  - type: text
    content: Lord
  - type: text
    content: ' your God led you all the way in the wilderness these forty years, to humble and test you in order to know what was in your heart, whether or not you would keep his commands. '
  '20':
  - type: text
    content: 'Like the nations the '
  - type: text
    content: Lord
  - type: text
    content: ' destroyed before you, so you will be destroyed for not obeying the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '3':
  - type: text
    content: 'He humbled you, causing you to hunger and then feeding you with manna, which neither you nor your ancestors had known, to teach you that man does not live on bread alone but on every word that comes from the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Your clothes did not wear out and your feet did not swell during these forty years. '
  '5':
  - type: text
    content: 'Know then in your heart that as a man disciplines his son, so the '
  - type: text
    content: Lord
  - type: text
    content: ' your God disciplines you.'
  '6':
  - type: text
    content: 'Observe the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, walking in obedience to him and revering him. '
  '7':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is bringing you into a good land—a land with brooks, streams, and deep springs gushing out into the valleys and hills; '
  '8':
  - type: text
    content: 'a land with wheat and barley, vines and fig trees, pomegranates, olive oil and honey; '
  '9':
  - type: text
    content: a land where bread will not be scarce and you will lack nothing; a land where the rocks are iron and you can dig copper out of the hills.
