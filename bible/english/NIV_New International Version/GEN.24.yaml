document_id: GEN.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaac and Rebekah
  - type: text
    content: 'Abraham was now very old, and the '
  - type: text
    content: Lord
  - type: text
    content: ' had blessed him in every way. '
  '10':
  - type: text
    content: Then the servant left, taking with him ten of his master’s camels loaded with all kinds of good things from his master. He set out for Aram Naharaim
  - type: note
    content: That is, Northwest Mesopotamia
  - type: text
    content: ' and made his way to the town of Nahor. '
  '11':
  - type: text
    content: He had the camels kneel down near the well outside the town; it was toward evening, the time the women go out to draw water.
  '12':
  - type: text
    content: Then he prayed, “
  - type: text
    content: Lord
  - type: text
    content: ', God of my master Abraham, make me successful today, and show kindness to my master Abraham. '
  '13':
  - type: text
    content: 'See, I am standing beside this spring, and the daughters of the townspeople are coming out to draw water. '
  '14':
  - type: text
    content: May it be that when I say to a young woman, ‘Please let down your jar that I may have a drink,’ and she says, ‘Drink, and I’ll water your camels too’—let her be the one you have chosen for your servant Isaac. By this I will know that you have shown kindness to my master.”
  '15':
  - type: text
    content: 'Before he had finished praying, Rebekah came out with her jar on her shoulder. She was the daughter of Bethuel son of Milkah, who was the wife of Abraham’s brother Nahor. '
  '16':
  - type: text
    content: The woman was very beautiful, a virgin; no man had ever slept with her. She went down to the spring, filled her jar and came up again.
  '17':
  - type: text
    content: The servant hurried to meet her and said, “Please give me a little water from your jar.”
  '18':
  - type: text
    content: “Drink, my lord,” she said, and quickly lowered the jar to her hands and gave him a drink.
  '19':
  - type: text
    content: 'After she had given him a drink, she said, “I’ll draw water for your camels too, until they have had enough to drink.” '
  '2':
  - type: text
    content: 'He said to the senior servant in his household, the one in charge of all that he had, “Put your hand under my thigh. '
  '20':
  - type: text
    content: 'So she quickly emptied her jar into the trough, ran back to the well to draw more water, and drew enough for all his camels. '
  '21':
  - type: text
    content: 'Without saying a word, the man watched her closely to learn whether or not the '
  - type: text
    content: Lord
  - type: text
    content: ' had made his journey successful.'
  '22':
  - type: text
    content: When the camels had finished drinking, the man took out a gold nose ring weighing a beka
  - type: note
    content: That is, about 1/5 ounce or about 5.7 grams
  - type: text
    content: ' and two gold bracelets weighing ten shekels.'
  - type: note
    content: That is, about 4 ounces or about 115 grams
  - type: text
    content: ' '
  '23':
  - type: text
    content: Then he asked, “Whose daughter are you? Please tell me, is there room in your father’s house for us to spend the night?”
  '24':
  - type: text
    content: 'She answered him, “I am the daughter of Bethuel, the son that Milkah bore to Nahor.” '
  '25':
  - type: text
    content: And she added, “We have plenty of straw and fodder, as well as room for you to spend the night.”
  '26':
  - type: text
    content: 'Then the man bowed down and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '27':
  - type: text
    content: 'saying, “Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of my master Abraham, who has not abandoned his kindness and faithfulness to my master. As for me, the '
  - type: text
    content: Lord
  - type: text
    content: ' has led me on the journey to the house of my master’s relatives.”'
  '28':
  - type: text
    content: 'The young woman ran and told her mother’s household about these things. '
  '29':
  - type: text
    content: 'Now Rebekah had a brother named Laban, and he hurried out to the man at the spring. '
  '3':
  - type: text
    content: 'I want you to swear by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven and the God of earth, that you will not get a wife for my son from the daughters of the Canaanites, among whom I am living, '
  '30':
  - type: text
    content: 'As soon as he had seen the nose ring, and the bracelets on his sister’s arms, and had heard Rebekah tell what the man said to her, he went out to the man and found him standing by the camels near the spring. '
  '31':
  - type: text
    content: '“Come, you who are blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ',” he said. “Why are you standing out here? I have prepared the house and a place for the camels.”'
  '32':
  - type: text
    content: 'So the man went to the house, and the camels were unloaded. Straw and fodder were brought for the camels, and water for him and his men to wash their feet. '
  '33':
  - type: text
    content: Then food was set before him, but he said, “I will not eat until I have told you what I have to say.”
  - type: text
    content: “Then tell us,” Laban said.
  '34':
  - type: text
    content: 'So he said, “I am Abraham’s servant. '
  '35':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed my master abundantly, and he has become wealthy. He has given him sheep and cattle, silver and gold, male and female servants, and camels and donkeys. '
  '36':
  - type: text
    content: 'My master’s wife Sarah has borne him a son in her old age, and he has given him everything he owns. '
  '37':
  - type: text
    content: 'And my master made me swear an oath, and said, ‘You must not get a wife for my son from the daughters of the Canaanites, in whose land I live, '
  '38':
  - type: text
    content: but go to my father’s family and to my own clan, and get a wife for my son.’
  '39':
  - type: text
    content: “Then I asked my master, ‘What if the woman will not come back with me?’
  '4':
  - type: text
    content: but will go to my country and my own relatives and get a wife for my son Isaac.”
  '40':
  - type: text
    content: '“He replied, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', before whom I have walked faithfully, will send his angel with you and make your journey a success, so that you can get a wife for my son from my own clan and from my father’s family. '
  '41':
  - type: text
    content: You will be released from my oath if, when you go to my clan, they refuse to give her to you—then you will be released from my oath.’
  '42':
  - type: text
    content: “When I came to the spring today, I said, ‘
  - type: text
    content: Lord
  - type: text
    content: ', God of my master Abraham, if you will, please grant success to the journey on which I have come. '
  '43':
  - type: text
    content: 'See, I am standing beside this spring. If a young woman comes out to draw water and I say to her, “Please let me drink a little water from your jar,” '
  '44':
  - type: text
    content: 'and if she says to me, “Drink, and I’ll draw water for your camels too,” let her be the one the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen for my master’s son.’'
  '45':
  - type: text
    content: “Before I finished praying in my heart, Rebekah came out, with her jar on her shoulder. She went down to the spring and drew water, and I said to her, ‘Please give me a drink.’
  '46':
  - type: text
    content: “She quickly lowered her jar from her shoulder and said, ‘Drink, and I’ll water your camels too.’ So I drank, and she watered the camels also.
  '47':
  - type: text
    content: “I asked her, ‘Whose daughter are you?’
  - type: text
    content: “She said, ‘The daughter of Bethuel son of Nahor, whom Milkah bore to him.’
  - type: text
    content: '“Then I put the ring in her nose and the bracelets on her arms, '
  '48':
  - type: text
    content: 'and I bowed down and worshiped the '
  - type: text
    content: Lord
  - type: text
    content: '. I praised the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of my master Abraham, who had led me on the right road to get the granddaughter of my master’s brother for his son. '
  '49':
  - type: text
    content: Now if you will show kindness and faithfulness to my master, tell me; and if not, tell me, so I may know which way to turn.”
  '5':
  - type: text
    content: The servant asked him, “What if the woman is unwilling to come back with me to this land? Shall I then take your son back to the country you came from?”
  '50':
  - type: text
    content: 'Laban and Bethuel answered, “This is from the '
  - type: text
    content: Lord
  - type: text
    content: '; we can say nothing to you one way or the other. '
  '51':
  - type: text
    content: 'Here is Rebekah; take her and go, and let her become the wife of your master’s son, as the '
  - type: text
    content: Lord
  - type: text
    content: ' has directed.”'
  '52':
  - type: text
    content: 'When Abraham’s servant heard what they said, he bowed down to the ground before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'Then the servant brought out gold and silver jewelry and articles of clothing and gave them to Rebekah; he also gave costly gifts to her brother and to her mother. '
  '54':
  - type: text
    content: Then he and the men who were with him ate and drank and spent the night there.
  - type: text
    content: When they got up the next morning, he said, “Send me on my way to my master.”
  '55':
  - type: text
    content: But her brother and her mother replied, “Let the young woman remain with us ten days or so; then you
  - type: note
    content: Or she
  - type: text
    content: ' may go.”'
  '56':
  - type: text
    content: 'But he said to them, “Do not detain me, now that the '
  - type: text
    content: Lord
  - type: text
    content: ' has granted success to my journey. Send me on my way so I may go to my master.”'
  '57':
  - type: text
    content: 'Then they said, “Let’s call the young woman and ask her about it.” '
  '58':
  - type: text
    content: So they called Rebekah and asked her, “Will you go with this man?”
  - type: text
    content: “I will go,” she said.
  '59':
  - type: text
    content: 'So they sent their sister Rebekah on her way, along with her nurse and Abraham’s servant and his men. '
  '6':
  - type: text
    content: '“Make sure that you do not take my son back there,” Abraham said. '
  '60':
  - type: text
    content: And they blessed Rebekah and said to her,
  - type: text
    content: “Our sister, may you increase
  - type: text
    content: to thousands upon thousands;
  - type: text
    content: may your offspring possess
  - type: text
    content: the cities of their enemies.”
  '61':
  - type: text
    content: Then Rebekah and her attendants got ready and mounted the camels and went back with the man. So the servant took Rebekah and left.
  '62':
  - type: text
    content: 'Now Isaac had come from Beer Lahai Roi, for he was living in the Negev. '
  '63':
  - type: text
    content: He went out to the field one evening to meditate,
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' and as he looked up, he saw camels approaching. '
  '64':
  - type: text
    content: 'Rebekah also looked up and saw Isaac. She got down from her camel '
  '65':
  - type: text
    content: and asked the servant, “Who is that man in the field coming to meet us?”
  - type: text
    content: “He is my master,” the servant answered. So she took her veil and covered herself.
  '66':
  - type: text
    content: 'Then the servant told Isaac all he had done. '
  '67':
  - type: text
    content: Isaac brought her into the tent of his mother Sarah, and he married Rebekah. So she became his wife, and he loved her; and Isaac was comforted after his mother’s death.
  '7':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, who brought me out of my father’s household and my native land and who spoke to me and promised me on oath, saying, ‘To your offspring'
  - type: note
    content: Or seed
  - type: text
    content: ' I will give this land’—he will send his angel before you so that you can get a wife for my son from there. '
  '8':
  - type: text
    content: 'If the woman is unwilling to come back with you, then you will be released from this oath of mine. Only do not take my son back there.” '
  '9':
  - type: text
    content: So the servant put his hand under the thigh of his master Abraham and swore an oath to him concerning this matter.
