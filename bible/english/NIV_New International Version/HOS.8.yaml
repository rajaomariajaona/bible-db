document_id: HOS.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel to Reap the Whirlwind
  - type: text
    content: “Put the trumpet to your lips!
  - type: text
    content: 'An eagle is over the house of the '
  - type: text
    content: Lord
  - type: text
    content: because the people have broken my covenant
  - type: text
    content: and rebelled against my law.
  '10':
  - type: text
    content: Although they have sold themselves among the nations,
  - type: text
    content: I will now gather them together.
  - type: text
    content: They will begin to waste away
  - type: text
    content: under the oppression of the mighty king.
  '11':
  - type: text
    content: “Though Ephraim built many altars for sin offerings,
  - type: text
    content: these have become altars for sinning.
  '12':
  - type: text
    content: I wrote for them the many things of my law,
  - type: text
    content: but they regarded them as something foreign.
  '13':
  - type: text
    content: Though they offer sacrifices as gifts to me,
  - type: text
    content: and though they eat the meat,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is not pleased with them.'
  - type: text
    content: Now he will remember their wickedness
  - type: text
    content: 'and punish their sins:'
  - type: text
    content: They will return to Egypt.
  '14':
  - type: text
    content: Israel has forgotten their Maker
  - type: text
    content: and built palaces;
  - type: text
    content: Judah has fortified many towns.
  - type: text
    content: But I will send fire on their cities
  - type: text
    content: that will consume their fortresses.”
  '2':
  - type: text
    content: Israel cries out to me,
  - type: text
    content: ‘Our God, we acknowledge you!’
  '3':
  - type: text
    content: But Israel has rejected what is good;
  - type: text
    content: an enemy will pursue him.
  '4':
  - type: text
    content: They set up kings without my consent;
  - type: text
    content: they choose princes without my approval.
  - type: text
    content: With their silver and gold
  - type: text
    content: they make idols for themselves
  - type: text
    content: to their own destruction.
  '5':
  - type: text
    content: Samaria, throw out your calf-idol!
  - type: text
    content: My anger burns against them.
  - type: text
    content: How long will they be incapable of purity?
  '6':
  - type: text
    content: They are from Israel!
  - type: text
    content: This calf—a metalworker has made it;
  - type: text
    content: it is not God.
  - type: text
    content: It will be broken in pieces,
  - type: text
    content: that calf of Samaria.
  '7':
  - type: text
    content: “They sow the wind
  - type: text
    content: and reap the whirlwind.
  - type: text
    content: The stalk has no head;
  - type: text
    content: it will produce no flour.
  - type: text
    content: Were it to yield grain,
  - type: text
    content: foreigners would swallow it up.
  '8':
  - type: text
    content: Israel is swallowed up;
  - type: text
    content: now she is among the nations
  - type: text
    content: like something no one wants.
  '9':
  - type: text
    content: For they have gone up to Assyria
  - type: text
    content: like a wild donkey wandering alone.
  - type: text
    content: Ephraim has sold herself to lovers.
