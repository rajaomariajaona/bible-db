document_id: HOS.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel to Reap the Whirlwind
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Put the trumpet to your lips!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'An eagle is over the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because the people have broken my covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rebelled against my law.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Although they have sold themselves among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will now gather them together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will begin to waste away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: under the oppression of the mighty king.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Though Ephraim built many altars for sin offerings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: these have become altars for sinning.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I wrote for them the many things of my law,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they regarded them as something foreign.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Though they offer sacrifices as gifts to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and though they eat the meat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is not pleased with them.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now he will remember their wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and punish their sins:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will return to Egypt.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Israel has forgotten their Maker
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and built palaces;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah has fortified many towns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will send fire on their cities
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will consume their fortresses.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Israel cries out to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Our God, we acknowledge you!’
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But Israel has rejected what is good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an enemy will pursue him.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They set up kings without my consent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they choose princes without my approval.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With their silver and gold
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they make idols for themselves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to their own destruction.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Samaria, throw out your calf-idol!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My anger burns against them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long will they be incapable of purity?
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: They are from Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This calf—a metalworker has made it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is not God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be broken in pieces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that calf of Samaria.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “They sow the wind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and reap the whirlwind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The stalk has no head;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will produce no flour.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Were it to yield grain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: foreigners would swallow it up.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Israel is swallowed up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now she is among the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like something no one wants.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For they have gone up to Assyria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a wild donkey wandering alone.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ephraim has sold herself to lovers.
