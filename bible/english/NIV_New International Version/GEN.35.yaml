document_id: GEN.35,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Returns to Bethel
  - type: text
    content: Then God said to Jacob, “Go up to Bethel and settle there, and build an altar there to God, who appeared to you when you were fleeing from your brother Esau.”
  '10':
  - type: text
    content: God said to him, “Your name is Jacob,
  - type: note
    content: Jacob means he grasps the heel, a Hebrew idiom for he deceives.
  - type: text
    content: ' but you will no longer be called Jacob; your name will be Israel.'
  - type: note
    content: Israel probably means he struggles with God.
  - type: text
    content: ” So he named him Israel.
  '11':
  - type: text
    content: And God said to him, “I am God Almighty
  - type: note
    content: Hebrew El-Shaddai
  - type: text
    content: '; be fruitful and increase in number. A nation and a community of nations will come from you, and kings will be among your descendants. '
  '12':
  - type: text
    content: 'The land I gave to Abraham and Isaac I also give to you, and I will give this land to your descendants after you.” '
  '13':
  - type: text
    content: Then God went up from him at the place where he had talked with him.
  '14':
  - type: text
    content: 'Jacob set up a stone pillar at the place where God had talked with him, and he poured out a drink offering on it; he also poured oil on it. '
  '15':
  - type: text
    content: Jacob called the place where God had talked with him Bethel.
  - type: note
    content: Bethel means house of God.
  - type: heading
    content: The Deaths of Rachel and Isaac
  '16':
  - type: text
    content: 'Then they moved on from Bethel. While they were still some distance from Ephrath, Rachel began to give birth and had great difficulty. '
  '17':
  - type: text
    content: 'And as she was having great difficulty in childbirth, the midwife said to her, “Don’t despair, for you have another son.” '
  '18':
  - type: text
    content: As she breathed her last—for she was dying—she named her son Ben-Oni.
  - type: note
    content: Ben-Oni means son of my trouble.
  - type: text
    content: ' But his father named him Benjamin.'
  - type: note
    content: Benjamin means son of my right hand.
  '19':
  - type: text
    content: 'So Rachel died and was buried on the way to Ephrath (that is, Bethlehem). '
  '2':
  - type: text
    content: 'So Jacob said to his household and to all who were with him, “Get rid of the foreign gods you have with you, and purify yourselves and change your clothes. '
  '20':
  - type: text
    content: Over her tomb Jacob set up a pillar, and to this day that pillar marks Rachel’s tomb.
  '21':
  - type: text
    content: 'Israel moved on again and pitched his tent beyond Migdal Eder. '
  '22':
  - type: text
    content: While Israel was living in that region, Reuben went in and slept with his father’s concubine Bilhah, and Israel heard of it.
  - type: text
    content: 'Jacob had twelve sons:'
  '23':
  - type: text
    content: 'The sons of Leah:'
  - type: text
    content: Reuben the firstborn of Jacob,
  - type: text
    content: Simeon, Levi, Judah, Issachar and Zebulun.
  '24':
  - type: text
    content: 'The sons of Rachel:'
  - type: text
    content: Joseph and Benjamin.
  '25':
  - type: text
    content: 'The sons of Rachel’s servant Bilhah:'
  - type: text
    content: Dan and Naphtali.
  '26':
  - type: text
    content: 'The sons of Leah’s servant Zilpah:'
  - type: text
    content: Gad and Asher.
  - type: text
    content: These were the sons of Jacob, who were born to him in Paddan Aram.
  '27':
  - type: text
    content: 'Jacob came home to his father Isaac in Mamre, near Kiriath Arba (that is, Hebron), where Abraham and Isaac had stayed. '
  '28':
  - type: text
    content: 'Isaac lived a hundred and eighty years. '
  '29':
  - type: text
    content: Then he breathed his last and died and was gathered to his people, old and full of years. And his sons Esau and Jacob buried him.
  '3':
  - type: text
    content: 'Then come, let us go up to Bethel, where I will build an altar to God, who answered me in the day of my distress and who has been with me wherever I have gone.” '
  '4':
  - type: text
    content: 'So they gave Jacob all the foreign gods they had and the rings in their ears, and Jacob buried them under the oak at Shechem. '
  '5':
  - type: text
    content: Then they set out, and the terror of God fell on the towns all around them so that no one pursued them.
  '6':
  - type: text
    content: 'Jacob and all the people with him came to Luz (that is, Bethel) in the land of Canaan. '
  '7':
  - type: text
    content: There he built an altar, and he called the place El Bethel,
  - type: note
    content: El Bethel means God of Bethel.
  - type: text
    content: ' because it was there that God revealed himself to him when he was fleeing from his brother.'
  '8':
  - type: text
    content: Now Deborah, Rebekah’s nurse, died and was buried under the oak outside Bethel. So it was named Allon Bakuth.
  - type: note
    content: Allon Bakuth means oak of weeping.
  '9':
  - type: text
    content: After Jacob returned from Paddan Aram,
  - type: note
    content: That is, Northwest Mesopotamia; also in verse 26
  - type: text
    content: ' God appeared to him again and blessed him. '
