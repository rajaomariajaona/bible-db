document_id: GEN.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob Returns to Bethel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then God said to Jacob, “Go up to Bethel and settle there, and build an altar there to God, who appeared to you when you were fleeing from your brother Esau.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So Jacob said to his household and to all who were with him, “Get rid of the foreign gods you have with you, and purify yourselves and change your clothes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then come, let us go up to Bethel, where I will build an altar to God, who answered me in the day of my distress and who has been with me wherever I have gone.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So they gave Jacob all the foreign gods they had and the rings in their ears, and Jacob buried them under the oak at Shechem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then they set out, and the terror of God fell on the towns all around them so that no one pursued them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jacob and all the people with him came to Luz (that is, Bethel) in the land of Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: There he built an altar, and he called the place El Bethel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'El Bethel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: God of Bethel.
    marker-yv: yv-n
  - type: text
    text: ' because it was there that God revealed himself to him when he was fleeing from his brother.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Now Deborah, Rebekah’s nurse, died and was buried under the oak outside Bethel. So it was named Allon Bakuth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Allon Bakuth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: oak of weeping.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: After Jacob returned from Paddan Aram,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Northwest Mesopotamia; also in verse 26
    marker-yv: yv-n
  - type: text
    text: ' God appeared to him again and blessed him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: God said to him, “Your name is Jacob,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jacob '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'he grasps the heel, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a Hebrew idiom for '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he deceives.
    marker-yv: yv-n
  - type: text
    text: ' but you will no longer be called Jacob; your name will be Israel.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Israel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'probably means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he struggles with God.
    marker-yv: yv-n
  - type: text
    text: ” So he named him Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And God said to him, “I am God Almighty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
      - type: usfm
        marker: tl
        children:
        - type: text
          text: El-Shaddai
    marker-yv: yv-n
  - type: text
    text: '; be fruitful and increase in number. A nation and a community of nations will come from you, and kings will be among your descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The land I gave to Abraham and Isaac I also give to you, and I will give this land to your descendants after you.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then God went up from him at the place where he had talked with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jacob set up a stone pillar at the place where God had talked with him, and he poured out a drink offering on it; he also poured oil on it. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jacob called the place where God had talked with him Bethel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Bethel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: house of God.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Deaths of Rachel and Isaac
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then they moved on from Bethel. While they were still some distance from Ephrath, Rachel began to give birth and had great difficulty. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And as she was having great difficulty in childbirth, the midwife said to her, “Don’t despair, for you have another son.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: As she breathed her last—for she was dying—she named her son Ben-Oni.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ben-Oni '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son of my trouble.
    marker-yv: yv-n
  - type: text
    text: ' But his father named him Benjamin.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Benjamin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son of my right hand.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So Rachel died and was buried on the way to Ephrath (that is, Bethlehem). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Over her tomb Jacob set up a pillar, and to this day that pillar marks Rachel’s tomb.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Israel moved on again and pitched his tent beyond Migdal Eder. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: While Israel was living in that region, Reuben went in and slept with his father’s concubine Bilhah, and Israel heard of it.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Jacob had twelve sons:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sons of Leah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Reuben the firstborn of Jacob,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Simeon, Levi, Judah, Issachar and Zebulun.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The sons of Rachel:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Joseph and Benjamin.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The sons of Rachel’s servant Bilhah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Dan and Naphtali.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The sons of Leah’s servant Zilpah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Gad and Asher.
- type: usfm
  marker: p
  children:
  - type: text
    text: These were the sons of Jacob, who were born to him in Paddan Aram.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jacob came home to his father Isaac in Mamre, near Kiriath Arba (that is, Hebron), where Abraham and Isaac had stayed. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Isaac lived a hundred and eighty years. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Then he breathed his last and died and was gathered to his people, old and full of years. And his sons Esau and Jacob buried him.
