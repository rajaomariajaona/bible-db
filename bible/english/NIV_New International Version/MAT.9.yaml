document_id: MAT.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Forgives and Heals a Paralyzed Man
  - type: text
    content: 'Jesus stepped into a boat, crossed over and came to his own town. '
  '10':
  - type: text
    content: 'While Jesus was having dinner at Matthew’s house, many tax collectors and sinners came and ate with him and his disciples. '
  '11':
  - type: text
    content: When the Pharisees saw this, they asked his disciples, “Why does your teacher eat with tax collectors and sinners?”
  '12':
  - type: text
    content: 'On hearing this, Jesus said, '
  - type: text
    content: “It is not the healthy who need a doctor, but the sick.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But go and learn what this means: ‘I desire mercy, not sacrifice.’'
  - type: note
    content: Hosea 6:6
  - type: text
    content: ' '
  - type: text
    content: For I have not come to call the righteous, but sinners.”
  - type: heading
    content: Jesus Questioned About Fasting
  '14':
  - type: text
    content: Then John’s disciples came and asked him, “How is it that we and the Pharisees fast often, but your disciples do not fast?”
  '15':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “How can the guests of the bridegroom mourn while he is with them? The time will come when the bridegroom will be taken from them; then they will fast.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “No one sews a patch of unshrunk cloth on an old garment, for the patch will pull away from the garment, making the tear worse.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Neither do people pour new wine into old wineskins. If they do, the skins will burst; the wine will run out and the wineskins will be ruined. No, they pour new wine into new wineskins, and both are preserved.”
  - type: heading
    content: Jesus Raises a Dead Girl and Heals a Sick Woman
  '18':
  - type: text
    content: 'While he was saying this, a synagogue leader came and knelt before him and said, “My daughter has just died. But come and put your hand on her, and she will live.” '
  '19':
  - type: text
    content: Jesus got up and went with him, and so did his disciples.
  '2':
  - type: text
    content: 'Some men brought to him a paralyzed man, lying on a mat. When Jesus saw their faith, he said to the man, '
  - type: text
    content: “Take heart, son; your sins are forgiven.”
  '20':
  - type: text
    content: 'Just then a woman who had been subject to bleeding for twelve years came up behind him and touched the edge of his cloak. '
  '21':
  - type: text
    content: She said to herself, “If I only touch his cloak, I will be healed.”
  '22':
  - type: text
    content: 'Jesus turned and saw her. '
  - type: text
    content: “Take heart, daughter,”
  - type: text
    content: ' he said, '
  - type: text
    content: “your faith has healed you.”
  - type: text
    content: ' And the woman was healed at that moment.'
  '23':
  - type: text
    content: 'When Jesus entered the synagogue leader’s house and saw the noisy crowd and people playing pipes, '
  '24':
  - type: text
    content: 'he said, '
  - type: text
    content: “Go away. The girl is not dead but asleep.”
  - type: text
    content: ' But they laughed at him. '
  '25':
  - type: text
    content: 'After the crowd had been put outside, he went in and took the girl by the hand, and she got up. '
  '26':
  - type: text
    content: News of this spread through all that region.
  - type: heading
    content: Jesus Heals the Blind and the Mute
  '27':
  - type: text
    content: As Jesus went on from there, two blind men followed him, calling out, “Have mercy on us, Son of David!”
  '28':
  - type: text
    content: 'When he had gone indoors, the blind men came to him, and he asked them, '
  - type: text
    content: “Do you believe that I am able to do this?”
  - type: text
    content: “Yes, Lord,” they replied.
  '29':
  - type: text
    content: 'Then he touched their eyes and said, '
  - type: text
    content: “According to your faith let it be done to you”;
  - type: text
    content: ' '
  '3':
  - type: text
    content: At this, some of the teachers of the law said to themselves, “This fellow is blaspheming!”
  '30':
  - type: text
    content: 'and their sight was restored. Jesus warned them sternly, '
  - type: text
    content: “See that no one knows about this.”
  - type: text
    content: ' '
  '31':
  - type: text
    content: But they went out and spread the news about him all over that region.
  '32':
  - type: text
    content: 'While they were going out, a man who was demon-possessed and could not talk was brought to Jesus. '
  '33':
  - type: text
    content: And when the demon was driven out, the man who had been mute spoke. The crowd was amazed and said, “Nothing like this has ever been seen in Israel.”
  '34':
  - type: text
    content: But the Pharisees said, “It is by the prince of demons that he drives out demons.”
  - type: heading
    content: The Workers Are Few
  '35':
  - type: text
    content: 'Jesus went through all the towns and villages, teaching in their synagogues, proclaiming the good news of the kingdom and healing every disease and sickness. '
  '36':
  - type: text
    content: 'When he saw the crowds, he had compassion on them, because they were harassed and helpless, like sheep without a shepherd. '
  '37':
  - type: text
    content: 'Then he said to his disciples, '
  - type: text
    content: “The harvest is plentiful but the workers are few.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Ask the Lord of the harvest, therefore, to send out workers into his harvest field.”
  '4':
  - type: text
    content: 'Knowing their thoughts, Jesus said, '
  - type: text
    content: “Why do you entertain evil thoughts in your hearts?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Which is easier: to say, ‘Your sins are forgiven,’ or to say, ‘Get up and walk’?'
  - type: text
    content: ' '
  '6':
  - type: text
    content: But I want you to know that the Son of Man has authority on earth to forgive sins.”
  - type: text
    content: ' So he said to the paralyzed man, '
  - type: text
    content: “Get up, take your mat and go home.”
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Then the man got up and went home. '
  '8':
  - type: text
    content: When the crowd saw this, they were filled with awe; and they praised God, who had given such authority to man.
  - type: heading
    content: The Calling of Matthew
  '9':
  - type: text
    content: 'As Jesus went on from there, he saw a man named Matthew sitting at the tax collector’s booth. '
  - type: text
    content: “Follow me,”
  - type: text
    content: ' he told him, and Matthew got up and followed him.'
