document_id: MAT.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Forgives and Heals a Paralyzed Man
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jesus stepped into a boat, crossed over and came to his own town. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'While Jesus was having dinner at Matthew’s house, many tax collectors and sinners came and ate with him and his disciples. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When the Pharisees saw this, they asked his disciples, “Why does your teacher eat with tax collectors and sinners?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'On hearing this, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is not the healthy who need a doctor, but the sick.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But go and learn what this means: ‘I desire mercy, not sacrifice.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hosea 6:6
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I have not come to call the righteous, but sinners.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Questioned About Fasting
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then John’s disciples came and asked him, “How is it that we and the Pharisees fast often, but your disciples do not fast?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How can the guests of the bridegroom mourn while he is with them? The time will come when the bridegroom will be taken from them; then they will fast.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No one sews a patch of unshrunk cloth on an old garment, for the patch will pull away from the garment, making the tear worse.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Neither do people pour new wine into old wineskins. If they do, the skins will burst; the wine will run out and the wineskins will be ruined. No, they pour new wine into new wineskins, and both are preserved.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Raises a Dead Girl and Heals a Sick Woman
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'While he was saying this, a synagogue leader came and knelt before him and said, “My daughter has just died. But come and put your hand on her, and she will live.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Jesus got up and went with him, and so did his disciples.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Some men brought to him a paralyzed man, lying on a mat. When Jesus saw their faith, he said to the man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take heart, son; your sins are forgiven.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Just then a woman who had been subject to bleeding for twelve years came up behind him and touched the edge of his cloak. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: She said to herself, “If I only touch his cloak, I will be healed.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jesus turned and saw her. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take heart, daughter,”
    - type: text
      text: ' he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “your faith has healed you.”
    - type: text
      text: ' And the woman was healed at that moment.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When Jesus entered the synagogue leader’s house and saw the noisy crowd and people playing pipes, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go away. The girl is not dead but asleep.”
    - type: text
      text: ' But they laughed at him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'After the crowd had been put outside, he went in and took the girl by the hand, and she got up. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: News of this spread through all that region.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals the Blind and the Mute
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: As Jesus went on from there, two blind men followed him, calling out, “Have mercy on us, Son of David!”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'When he had gone indoors, the blind men came to him, and he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you believe that I am able to do this?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, Lord,” they replied.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then he touched their eyes and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “According to your faith let it be done to you”;
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: At this, some of the teachers of the law said to themselves, “This fellow is blaspheming!”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'and their sight was restored. Jesus warned them sternly, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “See that no one knows about this.”
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: But they went out and spread the news about him all over that region.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'While they were going out, a man who was demon-possessed and could not talk was brought to Jesus. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: And when the demon was driven out, the man who had been mute spoke. The crowd was amazed and said, “Nothing like this has ever been seen in Israel.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: But the Pharisees said, “It is by the prince of demons that he drives out demons.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Workers Are Few
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Jesus went through all the towns and villages, teaching in their synagogues, proclaiming the good news of the kingdom and healing every disease and sickness. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'When he saw the crowds, he had compassion on them, because they were harassed and helpless, like sheep without a shepherd. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Then he said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The harvest is plentiful but the workers are few.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ask the Lord of the harvest, therefore, to send out workers into his harvest field.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Knowing their thoughts, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you entertain evil thoughts in your hearts?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Which is easier: to say, ‘Your sins are forgiven,’ or to say, ‘Get up and walk’?'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I want you to know that the Son of Man has authority on earth to forgive sins.”
    - type: text
      text: ' So he said to the paralyzed man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get up, take your mat and go home.”
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then the man got up and went home. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: When the crowd saw this, they were filled with awe; and they praised God, who had given such authority to man.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Calling of Matthew
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'As Jesus went on from there, he saw a man named Matthew sitting at the tax collector’s booth. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Follow me,”
    - type: text
      text: ' he told him, and Matthew got up and followed him.'
