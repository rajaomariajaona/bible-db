document_id: 2CH.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Asa’s Reform
  - type: text
    content: 'The Spirit of God came on Azariah son of Oded. '
  '10':
  - type: text
    content: 'They assembled at Jerusalem in the third month of the fifteenth year of Asa’s reign. '
  '11':
  - type: text
    content: 'At that time they sacrificed to the '
  - type: text
    content: Lord
  - type: text
    content: ' seven hundred head of cattle and seven thousand sheep and goats from the plunder they had brought back. '
  '12':
  - type: text
    content: 'They entered into a covenant to seek the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, with all their heart and soul. '
  '13':
  - type: text
    content: 'All who would not seek the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, were to be put to death, whether small or great, man or woman. '
  '14':
  - type: text
    content: 'They took an oath to the '
  - type: text
    content: Lord
  - type: text
    content: ' with loud acclamation, with shouting and with trumpets and horns. '
  '15':
  - type: text
    content: 'All Judah rejoiced about the oath because they had sworn it wholeheartedly. They sought God eagerly, and he was found by them. So the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them rest on every side.'
  '16':
  - type: text
    content: 'King Asa also deposed his grandmother Maakah from her position as queen mother, because she had made a repulsive image for the worship of Asherah. Asa cut it down, broke it up and burned it in the Kidron Valley. '
  '17':
  - type: text
    content: 'Although he did not remove the high places from Israel, Asa’s heart was fully committed to the '
  - type: text
    content: Lord
  - type: text
    content: ' all his life. '
  '18':
  - type: text
    content: He brought into the temple of God the silver and gold and the articles that he and his father had dedicated.
  '19':
  - type: text
    content: There was no more war until the thirty-fifth year of Asa’s reign.
  '2':
  - type: text
    content: 'He went out to meet Asa and said to him, “Listen to me, Asa and all Judah and Benjamin. The '
  - type: text
    content: Lord
  - type: text
    content: ' is with you when you are with him. If you seek him, he will be found by you, but if you forsake him, he will forsake you. '
  '3':
  - type: text
    content: 'For a long time Israel was without the true God, without a priest to teach and without the law. '
  '4':
  - type: text
    content: 'But in their distress they turned to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, and sought him, and he was found by them. '
  '5':
  - type: text
    content: 'In those days it was not safe to travel about, for all the inhabitants of the lands were in great turmoil. '
  '6':
  - type: text
    content: 'One nation was being crushed by another and one city by another, because God was troubling them with every kind of distress. '
  '7':
  - type: text
    content: But as for you, be strong and do not give up, for your work will be rewarded.”
  '8':
  - type: text
    content: When Asa heard these words and the prophecy of Azariah son of
  - type: note
    content: Vulgate and Syriac (see also Septuagint and verse 1); Hebrew does not have Azariah son of.
  - type: text
    content: ' Oded the prophet, he took courage. He removed the detestable idols from the whole land of Judah and Benjamin and from the towns he had captured in the hills of Ephraim. He repaired the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' that was in front of the portico of the '
  - type: text
    content: Lord
  - type: text
    content: ’s temple.
  '9':
  - type: text
    content: 'Then he assembled all Judah and Benjamin and the people from Ephraim, Manasseh and Simeon who had settled among them, for large numbers had come over to him from Israel when they saw that the '
  - type: text
    content: Lord
  - type: text
    content: ' his God was with him.'
