document_id: HOS.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hosea’s Reconciliation With His Wife
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Go, show your love to your wife again, though she is loved by another man and is an adulteress. Love her as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' loves the Israelites, though they turn to other gods and love the sacred raisin cakes.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So I bought her for fifteen shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 6 ounces or about 170 grams
    marker-yv: yv-n
  - type: text
    text: ' of silver and about a homer and a lethek'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A homer and a lethek possibly weighed about 430 pounds or about 195 kilograms.
    marker-yv: yv-n
  - type: text
    text: ' of barley. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then I told her, “You are to live with me many days; you must not be a prostitute or be intimate with any man, and I will behave the same way toward you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the Israelites will live many days without king or prince, without sacrifice or sacred stones, without ephod or household gods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Afterward the Israelites will return and seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God and David their king. They will come trembling to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and to his blessings in the last days.'
