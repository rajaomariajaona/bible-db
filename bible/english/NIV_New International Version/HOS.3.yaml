document_id: HOS.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Hosea’s Reconciliation With His Wife
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Go, show your love to your wife again, though she is loved by another man and is an adulteress. Love her as the '
  - type: text
    content: Lord
  - type: text
    content: ' loves the Israelites, though they turn to other gods and love the sacred raisin cakes.”'
  '2':
  - type: text
    content: So I bought her for fifteen shekels
  - type: note
    content: That is, about 6 ounces or about 170 grams
  - type: text
    content: ' of silver and about a homer and a lethek'
  - type: note
    content: A homer and a lethek possibly weighed about 430 pounds or about 195 kilograms.
  - type: text
    content: ' of barley. '
  '3':
  - type: text
    content: Then I told her, “You are to live with me many days; you must not be a prostitute or be intimate with any man, and I will behave the same way toward you.”
  '4':
  - type: text
    content: 'For the Israelites will live many days without king or prince, without sacrifice or sacred stones, without ephod or household gods. '
  '5':
  - type: text
    content: 'Afterward the Israelites will return and seek the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and David their king. They will come trembling to the '
  - type: text
    content: Lord
  - type: text
    content: ' and to his blessings in the last days.'
