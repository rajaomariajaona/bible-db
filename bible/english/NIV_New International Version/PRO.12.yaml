document_id: PRO.12,111
type_code: eng
verses:
  '1':
  - type: text
    content: Whoever loves discipline loves knowledge,
  - type: text
    content: but whoever hates correction is stupid.
  '10':
  - type: text
    content: The righteous care for the needs of their animals,
  - type: text
    content: but the kindest acts of the wicked are cruel.
  '11':
  - type: text
    content: Those who work their land will have abundant food,
  - type: text
    content: but those who chase fantasies have no sense.
  '12':
  - type: text
    content: The wicked desire the stronghold of evildoers,
  - type: text
    content: but the root of the righteous endures.
  '13':
  - type: text
    content: Evildoers are trapped by their sinful talk,
  - type: text
    content: and so the innocent escape trouble.
  '14':
  - type: text
    content: From the fruit of their lips people are filled with good things,
  - type: text
    content: and the work of their hands brings them reward.
  '15':
  - type: text
    content: The way of fools seems right to them,
  - type: text
    content: but the wise listen to advice.
  '16':
  - type: text
    content: Fools show their annoyance at once,
  - type: text
    content: but the prudent overlook an insult.
  '17':
  - type: text
    content: An honest witness tells the truth,
  - type: text
    content: but a false witness tells lies.
  '18':
  - type: text
    content: The words of the reckless pierce like swords,
  - type: text
    content: but the tongue of the wise brings healing.
  '19':
  - type: text
    content: Truthful lips endure forever,
  - type: text
    content: but a lying tongue lasts only a moment.
  '2':
  - type: text
    content: 'Good people obtain favor from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but he condemns those who devise wicked schemes.
  '20':
  - type: text
    content: Deceit is in the hearts of those who plot evil,
  - type: text
    content: but those who promote peace have joy.
  '21':
  - type: text
    content: No harm overtakes the righteous,
  - type: text
    content: but the wicked have their fill of trouble.
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests lying lips,'
  - type: text
    content: but he delights in people who are trustworthy.
  '23':
  - type: text
    content: The prudent keep their knowledge to themselves,
  - type: text
    content: but a fool’s heart blurts out folly.
  '24':
  - type: text
    content: Diligent hands will rule,
  - type: text
    content: but laziness ends in forced labor.
  '25':
  - type: text
    content: Anxiety weighs down the heart,
  - type: text
    content: but a kind word cheers it up.
  '26':
  - type: text
    content: The righteous choose their friends carefully,
  - type: text
    content: but the way of the wicked leads them astray.
  '27':
  - type: text
    content: The lazy do not roast
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' any game,'
  - type: text
    content: but the diligent feed on the riches of the hunt.
  '28':
  - type: text
    content: In the way of righteousness there is life;
  - type: text
    content: along that path is immortality.
  '3':
  - type: text
    content: No one can be established through wickedness,
  - type: text
    content: but the righteous cannot be uprooted.
  '4':
  - type: text
    content: A wife of noble character is her husband’s crown,
  - type: text
    content: but a disgraceful wife is like decay in his bones.
  '5':
  - type: text
    content: The plans of the righteous are just,
  - type: text
    content: but the advice of the wicked is deceitful.
  '6':
  - type: text
    content: The words of the wicked lie in wait for blood,
  - type: text
    content: but the speech of the upright rescues them.
  '7':
  - type: text
    content: The wicked are overthrown and are no more,
  - type: text
    content: but the house of the righteous stands firm.
  '8':
  - type: text
    content: A person is praised according to their prudence,
  - type: text
    content: and one with a warped mind is despised.
  '9':
  - type: text
    content: Better to be a nobody and yet have a servant
  - type: text
    content: than pretend to be somebody and have no food.
