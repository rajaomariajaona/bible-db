document_id: PRO.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Whoever loves discipline loves knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but whoever hates correction is stupid.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The righteous care for the needs of their animals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the kindest acts of the wicked are cruel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Those who work their land will have abundant food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but those who chase fantasies have no sense.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The wicked desire the stronghold of evildoers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the root of the righteous endures.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Evildoers are trapped by their sinful talk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so the innocent escape trouble.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: From the fruit of their lips people are filled with good things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the work of their hands brings them reward.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The way of fools seems right to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the wise listen to advice.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fools show their annoyance at once,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the prudent overlook an insult.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: An honest witness tells the truth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a false witness tells lies.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The words of the reckless pierce like swords,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the tongue of the wise brings healing.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Truthful lips endure forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a lying tongue lasts only a moment.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Good people obtain favor from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he condemns those who devise wicked schemes.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Deceit is in the hearts of those who plot evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but those who promote peace have joy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: No harm overtakes the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the wicked have their fill of trouble.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' detests lying lips,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he delights in people who are trustworthy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The prudent keep their knowledge to themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a fool’s heart blurts out folly.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Diligent hands will rule,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but laziness ends in forced labor.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Anxiety weighs down the heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a kind word cheers it up.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The righteous choose their friends carefully,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the way of the wicked leads them astray.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The lazy do not roast
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' any game,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the diligent feed on the riches of the hunt.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: In the way of righteousness there is life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along that path is immortality.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: No one can be established through wickedness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the righteous cannot be uprooted.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A wife of noble character is her husband’s crown,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a disgraceful wife is like decay in his bones.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The plans of the righteous are just,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the advice of the wicked is deceitful.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The words of the wicked lie in wait for blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the speech of the upright rescues them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The wicked are overthrown and are no more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the house of the righteous stands firm.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: A person is praised according to their prudence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and one with a warped mind is despised.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Better to be a nobody and yet have a servant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than pretend to be somebody and have no food.
