document_id: EZK.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Siege of Jerusalem Symbolized
  - type: text
    content: '“Now, son of man, take a block of clay, put it in front of you and draw the city of Jerusalem on it. '
  '10':
  - type: text
    content: Weigh out twenty shekels
  - type: note
    content: That is, about 8 ounces or about 230 grams
  - type: text
    content: ' of food to eat each day and eat it at set times. '
  '11':
  - type: text
    content: Also measure out a sixth of a hin
  - type: note
    content: That is, about 2/3 quart or about 0.6 liter
  - type: text
    content: ' of water and drink it at set times. '
  '12':
  - type: text
    content: 'Eat the food as you would a loaf of barley bread; bake it in the sight of the people, using human excrement for fuel.” '
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “In this way the people of Israel will eat defiled food among the nations where I will drive them.”'
  '14':
  - type: text
    content: 'Then I said, “Not so, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '! I have never defiled myself. From my youth until now I have never eaten anything found dead or torn by wild animals. No impure meat has ever entered my mouth.”'
  '15':
  - type: text
    content: “Very well,” he said, “I will let you bake your bread over cow dung instead of human excrement.”
  '16':
  - type: text
    content: 'He then said to me: “Son of man, I am about to cut off the food supply in Jerusalem. The people will eat rationed food in anxiety and drink rationed water in despair, '
  '17':
  - type: text
    content: for food and water will be scarce. They will be appalled at the sight of each other and will waste away because of
  - type: note
    content: Or away in
  - type: text
    content: ' their sin.'
  '2':
  - type: text
    content: 'Then lay siege to it: Erect siege works against it, build a ramp up to it, set up camps against it and put battering rams around it. '
  '3':
  - type: text
    content: Then take an iron pan, place it as an iron wall between you and the city and turn your face toward it. It will be under siege, and you shall besiege it. This will be a sign to the people of Israel.
  '4':
  - type: text
    content: “Then lie on your left side and put the sin of the people of Israel upon yourself.
  - type: note
    content: Or upon your side
  - type: text
    content: ' You are to bear their sin for the number of days you lie on your side. '
  '5':
  - type: text
    content: I have assigned you the same number of days as the years of their sin. So for 390 days you will bear the sin of the people of Israel.
  '6':
  - type: text
    content: '“After you have finished this, lie down again, this time on your right side, and bear the sin of the people of Judah. I have assigned you 40 days, a day for each year. '
  '7':
  - type: text
    content: 'Turn your face toward the siege of Jerusalem and with bared arm prophesy against her. '
  '8':
  - type: text
    content: I will tie you up with ropes so that you cannot turn from one side to the other until you have finished the days of your siege.
  '9':
  - type: text
    content: '“Take wheat and barley, beans and lentils, millet and spelt; put them in a storage jar and use them to make bread for yourself. You are to eat it during the 390 days you lie on your side. '
