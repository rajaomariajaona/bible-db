document_id: 2CH.21,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Jehoshaphat rested with his ancestors and was buried with them in the City of David. And Jehoram his son succeeded him as king. '
  '10':
  - type: text
    content: To this day Edom has been in rebellion against Judah.
  - type: text
    content: 'Libnah revolted at the same time, because Jehoram had forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of his ancestors. '
  '11':
  - type: text
    content: He had also built high places on the hills of Judah and had caused the people of Jerusalem to prostitute themselves and had led Judah astray.
  '12':
  - type: text
    content: 'Jehoram received a letter from Elijah the prophet, which said:'
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your father David, says: ‘You have not followed the ways of your father Jehoshaphat or of Asa king of Judah. '
  '13':
  - type: text
    content: 'But you have followed the ways of the kings of Israel, and you have led Judah and the people of Jerusalem to prostitute themselves, just as the house of Ahab did. You have also murdered your own brothers, members of your own family, men who were better than you. '
  '14':
  - type: text
    content: 'So now the '
  - type: text
    content: Lord
  - type: text
    content: ' is about to strike your people, your sons, your wives and everything that is yours, with a heavy blow. '
  '15':
  - type: text
    content: You yourself will be very ill with a lingering disease of the bowels, until the disease causes your bowels to come out.’ ”
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' aroused against Jehoram the hostility of the Philistines and of the Arabs who lived near the Cushites. '
  '17':
  - type: text
    content: They attacked Judah, invaded it and carried off all the goods found in the king’s palace, together with his sons and wives. Not a son was left to him except Ahaziah,
  - type: note
    content: Hebrew Jehoahaz, a variant of Ahaziah
  - type: text
    content: ' the youngest.'
  '18':
  - type: text
    content: 'After all this, the '
  - type: text
    content: Lord
  - type: text
    content: ' afflicted Jehoram with an incurable disease of the bowels. '
  '19':
  - type: text
    content: In the course of time, at the end of the second year, his bowels came out because of the disease, and he died in great pain. His people made no funeral fire in his honor, as they had for his predecessors.
  '2':
  - type: text
    content: Jehoram’s brothers, the sons of Jehoshaphat, were Azariah, Jehiel, Zechariah, Azariahu, Michael and Shephatiah. All these were sons of Jehoshaphat king of Israel.
  - type: note
    content: That is, Judah, as frequently in 2 Chronicles
  - type: text
    content: ' '
  '20':
  - type: text
    content: Jehoram was thirty-two years old when he became king, and he reigned in Jerusalem eight years. He passed away, to no one’s regret, and was buried in the City of David, but not in the tombs of the kings.
  '3':
  - type: text
    content: Their father had given them many gifts of silver and gold and articles of value, as well as fortified cities in Judah, but he had given the kingdom to Jehoram because he was his firstborn son.
  - type: heading
    content: Jehoram King of Judah
  '4':
  - type: text
    content: 'When Jehoram established himself firmly over his father’s kingdom, he put all his brothers to the sword along with some of the officials of Israel. '
  '5':
  - type: text
    content: 'Jehoram was thirty-two years old when he became king, and he reigned in Jerusalem eight years. '
  '6':
  - type: text
    content: 'He followed the ways of the kings of Israel, as the house of Ahab had done, for he married a daughter of Ahab. He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Nevertheless, because of the covenant the '
  - type: text
    content: Lord
  - type: text
    content: ' had made with David, the '
  - type: text
    content: Lord
  - type: text
    content: ' was not willing to destroy the house of David. He had promised to maintain a lamp for him and his descendants forever.'
  '8':
  - type: text
    content: 'In the time of Jehoram, Edom rebelled against Judah and set up its own king. '
  '9':
  - type: text
    content: 'So Jehoram went there with his officers and all his chariots. The Edomites surrounded him and his chariot commanders, but he rose up and broke through by night. '
