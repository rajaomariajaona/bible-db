  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Speaks'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Job out of the storm. He said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Who is this that obscures my plans
- type: usfm
  marker: q2
  children:
  - type: text
    text: with words without knowledge?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Brace yourself like a man;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will question you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you shall answer me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Where were you when I laid the earth’s foundation?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell me, if you understand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Who marked off its dimensions? Surely you know!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who stretched a measuring line across it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: On what were its footings set,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or who laid its cornerstone—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: while the morning stars sang together
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the angels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the sons of God
    marker-yv: yv-n
  - type: text
    text: ' shouted for joy?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Who shut up the sea behind doors
- type: usfm
  marker: q2
  children:
  - type: text
    text: when it burst forth from the womb,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: when I made the clouds its garment
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wrapped it in thick darkness,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: when I fixed limits for it
- type: usfm
  marker: q2
  children:
  - type: text
    text: and set its doors and bars in place,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: when I said, ‘This far you may come and no farther;
- type: usfm
  marker: q2
  children:
  - type: text
    text: here is where your proud waves halt’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Have you ever given orders to the morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or shown the dawn its place,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: that it might take the earth by the edges
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shake the wicked out of it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The earth takes shape like clay under a seal;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its features stand out like those of a garment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The wicked are denied their light,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their upraised arm is broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Have you journeyed to the springs of the sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: or walked in the recesses of the deep?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Have the gates of death been shown to you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you seen the gates of the deepest darkness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Have you comprehended the vast expanses of the earth?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell me, if you know all this.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “What is the way to the abode of light?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And where does darkness reside?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Can you take them to their places?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you know the paths to their dwellings?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Surely you know, for you were already born!
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have lived so many years!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Have you entered the storehouses of the snow
- type: usfm
  marker: q2
  children:
  - type: text
    text: or seen the storehouses of the hail,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: which I reserve for times of trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for days of war and battle?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: What is the way to the place where the lightning is dispersed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the place where the east winds are scattered over the earth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Who cuts a channel for the torrents of rain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a path for the thunderstorm,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: to water a land where no one lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an uninhabited desert,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: to satisfy a desolate wasteland
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make it sprout with grass?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Does the rain have a father?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who fathers the drops of dew?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: From whose womb comes the ice?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who gives birth to the frost from the heavens
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: when the waters become hard as stone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the surface of the deep is frozen?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Can you bind the chains
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: beauty
    marker-yv: yv-n
  - type: text
    text: ' of the Pleiades?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you loosen Orion’s belt?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Can you bring forth the constellations in their seasons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the morning star in its season
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: or lead out the Bear
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: out Leo
    marker-yv: yv-n
  - type: text
    text: ' with its cubs?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Do you know the laws of the heavens?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you set up God’s
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: their
    marker-yv: yv-n
  - type: text
    text: ' dominion over the earth?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Can you raise your voice to the clouds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cover yourself with a flood of water?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Do you send the lightning bolts on their way?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do they report to you, ‘Here we are’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Who gives the ibis wisdom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, wisdom about the flooding of the Nile
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: or gives the rooster understanding?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, understanding of when to crow; the meaning of the Hebrew for this verse is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Who has the wisdom to count the clouds?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can tip over the water jars of the heavens
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: when the dust becomes hard
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the clods of earth stick together?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: “Do you hunt the prey for the lioness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and satisfy the hunger of the lions
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: when they crouch in their dens
- type: usfm
  marker: q2
  children:
  - type: text
    text: or lie in wait in a thicket?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Who provides food for the raven
- type: usfm
  marker: q2
  children:
  - type: text
    text: when its young cry out to God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wander about for lack of food?
