document_id: JOB.38,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Speaks'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Job out of the storm. He said:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: when I fixed limits for it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set its doors and bars in place,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: when I said, ‘This far you may come and no farther;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: here is where your proud waves halt’?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Have you ever given orders to the morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or shown the dawn its place,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: that it might take the earth by the edges
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shake the wicked out of it?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The earth takes shape like clay under a seal;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its features stand out like those of a garment.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The wicked are denied their light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their upraised arm is broken.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Have you journeyed to the springs of the sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or walked in the recesses of the deep?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Have the gates of death been shown to you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have you seen the gates of the deepest darkness?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Have you comprehended the vast expanses of the earth?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell me, if you know all this.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “What is the way to the abode of light?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And where does darkness reside?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Who is this that obscures my plans
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with words without knowledge?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Can you take them to their places?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you know the paths to their dwellings?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Surely you know, for you were already born!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have lived so many years!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Have you entered the storehouses of the snow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or seen the storehouses of the hail,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: which I reserve for times of trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for days of war and battle?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: What is the way to the place where the lightning is dispersed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the place where the east winds are scattered over the earth?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Who cuts a channel for the torrents of rain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a path for the thunderstorm,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: to water a land where no one lives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an uninhabited desert,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: to satisfy a desolate wasteland
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make it sprout with grass?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Does the rain have a father?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who fathers the drops of dew?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: From whose womb comes the ice?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who gives birth to the frost from the heavens
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Brace yourself like a man;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will question you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you shall answer me.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: when the waters become hard as stone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the surface of the deep is frozen?
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: “Can you bind the chains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: beauty
      marker-yv: yv-n
    - type: text
      text: ' of the Pleiades?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you loosen Orion’s belt?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Can you bring forth the constellations in their seasons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the morning star in its season
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or lead out the Bear
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: out Leo
      marker-yv: yv-n
    - type: text
      text: ' with its cubs?'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Do you know the laws of the heavens?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you set up God’s
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: their
      marker-yv: yv-n
    - type: text
      text: ' dominion over the earth?'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: “Can you raise your voice to the clouds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cover yourself with a flood of water?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Do you send the lightning bolts on their way?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do they report to you, ‘Here we are’?
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Who gives the ibis wisdom
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, wisdom about the flooding of the Nile
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or gives the rooster understanding?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, understanding of when to crow; the meaning of the Hebrew for this verse is uncertain.
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Who has the wisdom to count the clouds?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can tip over the water jars of the heavens
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: when the dust becomes hard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the clods of earth stick together?
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: “Do you hunt the prey for the lioness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and satisfy the hunger of the lions
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Where were you when I laid the earth’s foundation?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tell me, if you understand.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: when they crouch in their dens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or lie in wait in a thicket?
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Who provides food for the raven
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when its young cry out to God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wander about for lack of food?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Who marked off its dimensions? Surely you know!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who stretched a measuring line across it?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: On what were its footings set,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or who laid its cornerstone—
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: while the morning stars sang together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the angels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sons of God
      marker-yv: yv-n
    - type: text
      text: ' shouted for joy?'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Who shut up the sea behind doors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when it burst forth from the womb,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: when I made the clouds its garment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wrapped it in thick darkness,
