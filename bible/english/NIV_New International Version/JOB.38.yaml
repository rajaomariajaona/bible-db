type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Speaks
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Job out of the storm. He said:'
  '10':
  - type: text
    content: when I fixed limits for it
  - type: text
    content: and set its doors and bars in place,
  '11':
  - type: text
    content: when I said, ‘This far you may come and no farther;
  - type: text
    content: here is where your proud waves halt’?
  '12':
  - type: text
    content: “Have you ever given orders to the morning,
  - type: text
    content: or shown the dawn its place,
  '13':
  - type: text
    content: that it might take the earth by the edges
  - type: text
    content: and shake the wicked out of it?
  '14':
  - type: text
    content: The earth takes shape like clay under a seal;
  - type: text
    content: its features stand out like those of a garment.
  '15':
  - type: text
    content: The wicked are denied their light,
  - type: text
    content: and their upraised arm is broken.
  '16':
  - type: text
    content: “Have you journeyed to the springs of the sea
  - type: text
    content: or walked in the recesses of the deep?
  '17':
  - type: text
    content: Have the gates of death been shown to you?
  - type: text
    content: Have you seen the gates of the deepest darkness?
  '18':
  - type: text
    content: Have you comprehended the vast expanses of the earth?
  - type: text
    content: Tell me, if you know all this.
  '19':
  - type: text
    content: “What is the way to the abode of light?
  - type: text
    content: And where does darkness reside?
  '2':
  - type: text
    content: “Who is this that obscures my plans
  - type: text
    content: with words without knowledge?
  '20':
  - type: text
    content: Can you take them to their places?
  - type: text
    content: Do you know the paths to their dwellings?
  '21':
  - type: text
    content: Surely you know, for you were already born!
  - type: text
    content: You have lived so many years!
  '22':
  - type: text
    content: “Have you entered the storehouses of the snow
  - type: text
    content: or seen the storehouses of the hail,
  '23':
  - type: text
    content: which I reserve for times of trouble,
  - type: text
    content: for days of war and battle?
  '24':
  - type: text
    content: What is the way to the place where the lightning is dispersed,
  - type: text
    content: or the place where the east winds are scattered over the earth?
  '25':
  - type: text
    content: Who cuts a channel for the torrents of rain,
  - type: text
    content: and a path for the thunderstorm,
  '26':
  - type: text
    content: to water a land where no one lives,
  - type: text
    content: an uninhabited desert,
  '27':
  - type: text
    content: to satisfy a desolate wasteland
  - type: text
    content: and make it sprout with grass?
  '28':
  - type: text
    content: Does the rain have a father?
  - type: text
    content: Who fathers the drops of dew?
  '29':
  - type: text
    content: From whose womb comes the ice?
  - type: text
    content: Who gives birth to the frost from the heavens
  '3':
  - type: text
    content: Brace yourself like a man;
  - type: text
    content: I will question you,
  - type: text
    content: and you shall answer me.
  '30':
  - type: text
    content: when the waters become hard as stone,
  - type: text
    content: when the surface of the deep is frozen?
  '31':
  - type: text
    content: “Can you bind the chains
  - type: note
    content: Septuagint; Hebrew beauty
  - type: text
    content: ' of the Pleiades?'
  - type: text
    content: Can you loosen Orion’s belt?
  '32':
  - type: text
    content: Can you bring forth the constellations in their seasons
  - type: note
    content: Or the morning star in its season
  - type: text
    content: or lead out the Bear
  - type: note
    content: Or out Leo
  - type: text
    content: ' with its cubs?'
  '33':
  - type: text
    content: Do you know the laws of the heavens?
  - type: text
    content: Can you set up God’s
  - type: note
    content: Or their
  - type: text
    content: ' dominion over the earth?'
  '34':
  - type: text
    content: “Can you raise your voice to the clouds
  - type: text
    content: and cover yourself with a flood of water?
  '35':
  - type: text
    content: Do you send the lightning bolts on their way?
  - type: text
    content: Do they report to you, ‘Here we are’?
  '36':
  - type: text
    content: Who gives the ibis wisdom
  - type: note
    content: That is, wisdom about the flooding of the Nile
  - type: text
    content: or gives the rooster understanding?
  - type: note
    content: That is, understanding of when to crow; the meaning of the Hebrew for this verse is uncertain.
  '37':
  - type: text
    content: Who has the wisdom to count the clouds?
  - type: text
    content: Who can tip over the water jars of the heavens
  '38':
  - type: text
    content: when the dust becomes hard
  - type: text
    content: and the clods of earth stick together?
  '39':
  - type: text
    content: “Do you hunt the prey for the lioness
  - type: text
    content: and satisfy the hunger of the lions
  '4':
  - type: text
    content: “Where were you when I laid the earth’s foundation?
  - type: text
    content: Tell me, if you understand.
  '40':
  - type: text
    content: when they crouch in their dens
  - type: text
    content: or lie in wait in a thicket?
  '41':
  - type: text
    content: Who provides food for the raven
  - type: text
    content: when its young cry out to God
  - type: text
    content: and wander about for lack of food?
  '5':
  - type: text
    content: Who marked off its dimensions? Surely you know!
  - type: text
    content: Who stretched a measuring line across it?
  '6':
  - type: text
    content: On what were its footings set,
  - type: text
    content: or who laid its cornerstone—
  '7':
  - type: text
    content: while the morning stars sang together
  - type: text
    content: and all the angels
  - type: note
    content: Hebrew the sons of God
  - type: text
    content: ' shouted for joy?'
  '8':
  - type: text
    content: “Who shut up the sea behind doors
  - type: text
    content: when it burst forth from the womb,
  '9':
  - type: text
    content: when I made the clouds its garment
  - type: text
    content: and wrapped it in thick darkness,
