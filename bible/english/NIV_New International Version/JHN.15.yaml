document_id: JHN.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Vine and the Branches
  - type: text
    content: ' '
  - type: text
    content: “I am the true vine, and my Father is the gardener.
  - type: text
    content: ' '
  '10':
  - type: text
    content: If you keep my commands, you will remain in my love, just as I have kept my Father’s commands and remain in his love.
  - type: text
    content: ' '
  '11':
  - type: text
    content: I have told you this so that my joy may be in you and that your joy may be complete.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'My command is this: Love each other as I have loved you.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Greater love has no one than this: to lay down one’s life for one’s friends.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: You are my friends if you do what I command.
  - type: text
    content: ' '
  '15':
  - type: text
    content: I no longer call you servants, because a servant does not know his master’s business. Instead, I have called you friends, for everything that I learned from my Father I have made known to you.
  - type: text
    content: ' '
  '16':
  - type: text
    content: You did not choose me, but I chose you and appointed you so that you might go and bear fruit—fruit that will last—and so that whatever you ask in my name the Father will give you.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'This is my command: Love each other.'
  - type: heading
    content: The World Hates the Disciples
  '18':
  - type: text
    content: ' '
  - type: text
    content: “If the world hates you, keep in mind that it hated me first.
  - type: text
    content: ' '
  '19':
  - type: text
    content: If you belonged to the world, it would love you as its own. As it is, you do not belong to the world, but I have chosen you out of the world. That is why the world hates you.
  - type: text
    content: ' '
  '2':
  - type: text
    content: He cuts off every branch in me that bears no fruit, while every branch that does bear fruit he prunes
  - type: note
    content: The Greek for he prunes also means he cleans.
  - type: text
    content: ' '
  - type: text
    content: so that it will be even more fruitful.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Remember what I told you: ‘A servant is not greater than his master.’'
  - type: note
    content: John 13:16
  - type: text
    content: ' '
  - type: text
    content: If they persecuted me, they will persecute you also. If they obeyed my teaching, they will obey yours also.
  - type: text
    content: ' '
  '21':
  - type: text
    content: They will treat you this way because of my name, for they do not know the one who sent me.
  - type: text
    content: ' '
  '22':
  - type: text
    content: If I had not come and spoken to them, they would not be guilty of sin; but now they have no excuse for their sin.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Whoever hates me hates my Father as well.
  - type: text
    content: ' '
  '24':
  - type: text
    content: If I had not done among them the works no one else did, they would not be guilty of sin. As it is, they have seen, and yet they have hated both me and my Father.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'But this is to fulfill what is written in their Law: ‘They hated me without reason.’'
  - type: note
    content: Psalms 35:19; 69:4
  - type: heading
    content: The Work of the Holy Spirit
  '26':
  - type: text
    content: ' '
  - type: text
    content: “When the Advocate comes, whom I will send to you from the Father—the Spirit of truth who goes out from the Father—he will testify about me.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And you also must testify, for you have been with me from the beginning.
  '3':
  - type: text
    content: You are already clean because of the word I have spoken to you.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Remain in me, as I also remain in you. No branch can bear fruit by itself; it must remain in the vine. Neither can you bear fruit unless you remain in me.
  '5':
  - type: text
    content: ' '
  - type: text
    content: “I am the vine; you are the branches. If you remain in me and I in you, you will bear much fruit; apart from me you can do nothing.
  - type: text
    content: ' '
  '6':
  - type: text
    content: If you do not remain in me, you are like a branch that is thrown away and withers; such branches are picked up, thrown into the fire and burned.
  - type: text
    content: ' '
  '7':
  - type: text
    content: If you remain in me and my words remain in you, ask whatever you wish, and it will be done for you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: This is to my Father’s glory, that you bear much fruit, showing yourselves to be my disciples.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “As the Father has loved me, so have I loved you. Now remain in my love.
  - type: text
    content: ' '
