verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lawsuits Among Believers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If any of you has a dispute with another, do you dare to take it before the ungodly for judgment instead of before the Lord’s people? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nor thieves nor the greedy nor drunkards nor slanderers nor swindlers will inherit the kingdom of God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And that is what some of you were. But you were washed, you were sanctified, you were justified in the name of the Lord Jesus Christ and by the Spirit of our God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sexual Immorality
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I have the right to do anything,” you say—but not everything is beneficial. “I have the right to do anything”—but I will not be mastered by anything. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You say, “Food for the stomach and the stomach for food, and God will destroy them both.” The body, however, is not meant for sexual immorality but for the Lord, and the Lord for the body. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By his power God raised the Lord from the dead, and he will raise us also. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that your bodies are members of Christ himself? Shall I then take the members of Christ and unite them with a prostitute? Never! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do you not know that he who unites himself with a prostitute is one with her in body? For it is said, “The two will become one flesh.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 2:24
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But whoever is united with the Lord is one with him in spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the Spirit
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Flee from sexual immorality. All other sins a person commits are outside the body, but whoever sins sexually, sins against their own body. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that your bodies are temples of the Holy Spirit, who is in you, whom you have received from God? You are not your own; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or do you not know that the Lord’s people will judge the world? And if you are to judge the world, are you not competent to judge trivial cases? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: you were bought at a price. Therefore honor God with your bodies.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know that we will judge angels? How much more the things of this life! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, if you have disputes about such matters, do you ask for a ruling from those whose way of life is scorned in the church? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I say this to shame you. Is it possible that there is nobody among you wise enough to judge a dispute between believers? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But instead, one brother takes another to court—and this in front of unbelievers!
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The very fact that you have lawsuits among you means you have been completely defeated already. Why not rather be wronged? Why not rather be cheated? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead, you yourselves cheat and do wrong, and you do this to your brothers and sisters. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or do you not know that wrongdoers will not inherit the kingdom of God? Do not be deceived: Neither the sexually immoral nor idolaters nor adulterers nor men who have sex with men'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The words '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'men who have sex with men '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: translate two Greek words that refer to the passive and active participants in homosexual acts.
      marker-yv: yv-n
    - type: text
      text: ' '
