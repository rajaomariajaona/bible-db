document_id: 2SA.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David and Ziba
  - type: text
    content: When David had gone a short distance beyond the summit, there was Ziba, the steward of Mephibosheth, waiting to meet him. He had a string of donkeys saddled and loaded with two hundred loaves of bread, a hundred cakes of raisins, a hundred cakes of figs and a skin of wine.
  '10':
  - type: text
    content: 'But the king said, “What does this have to do with you, you sons of Zeruiah? If he is cursing because the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, ‘Curse David,’ who can ask, ‘Why do you do this?’ ”'
  '11':
  - type: text
    content: 'David then said to Abishai and all his officials, “My son, my own flesh and blood, is trying to kill me. How much more, then, this Benjamite! Leave him alone; let him curse, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has told him to. '
  '12':
  - type: text
    content: 'It may be that the '
  - type: text
    content: Lord
  - type: text
    content: ' will look upon my misery and restore to me his covenant blessing instead of his curse today.”'
  '13':
  - type: text
    content: 'So David and his men continued along the road while Shimei was going along the hillside opposite him, cursing as he went and throwing stones at him and showering him with dirt. '
  '14':
  - type: text
    content: The king and all the people with him arrived at their destination exhausted. And there he refreshed himself.
  - type: heading
    content: The Advice of Ahithophel and Hushai
  '15':
  - type: text
    content: 'Meanwhile, Absalom and all the men of Israel came to Jerusalem, and Ahithophel was with him. '
  '16':
  - type: text
    content: Then Hushai the Arkite, David’s confidant, went to Absalom and said to him, “Long live the king! Long live the king!”
  '17':
  - type: text
    content: Absalom said to Hushai, “So this is the love you show your friend? If he’s your friend, why didn’t you go with him?”
  '18':
  - type: text
    content: 'Hushai said to Absalom, “No, the one chosen by the '
  - type: text
    content: Lord
  - type: text
    content: ', by these people, and by all the men of Israel—his I will be, and I will remain with him. '
  '19':
  - type: text
    content: Furthermore, whom should I serve? Should I not serve the son? Just as I served your father, so I will serve you.”
  '2':
  - type: text
    content: The king asked Ziba, “Why have you brought these?”
  - type: text
    content: Ziba answered, “The donkeys are for the king’s household to ride on, the bread and fruit are for the men to eat, and the wine is to refresh those who become exhausted in the wilderness.”
  '20':
  - type: text
    content: Absalom said to Ahithophel, “Give us your advice. What should we do?”
  '21':
  - type: text
    content: 'Ahithophel answered, “Sleep with your father’s concubines whom he left to take care of the palace. Then all Israel will hear that you have made yourself obnoxious to your father, and the hands of everyone with you will be more resolute.” '
  '22':
  - type: text
    content: So they pitched a tent for Absalom on the roof, and he slept with his father’s concubines in the sight of all Israel.
  '23':
  - type: text
    content: Now in those days the advice Ahithophel gave was like that of one who inquires of God. That was how both David and Absalom regarded all of Ahithophel’s advice.
  '3':
  - type: text
    content: The king then asked, “Where is your master’s grandson?”
  - type: text
    content: Ziba said to him, “He is staying in Jerusalem, because he thinks, ‘Today the Israelites will restore to me my grandfather’s kingdom.’ ”
  '4':
  - type: text
    content: Then the king said to Ziba, “All that belonged to Mephibosheth is now yours.”
  - type: text
    content: “I humbly bow,” Ziba said. “May I find favor in your eyes, my lord the king.”
  - type: heading
    content: Shimei Curses David
  '5':
  - type: text
    content: 'As King David approached Bahurim, a man from the same clan as Saul’s family came out from there. His name was Shimei son of Gera, and he cursed as he came out. '
  '6':
  - type: text
    content: 'He pelted David and all the king’s officials with stones, though all the troops and the special guard were on David’s right and left. '
  '7':
  - type: text
    content: 'As he cursed, Shimei said, “Get out, get out, you murderer, you scoundrel! '
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has repaid you for all the blood you shed in the household of Saul, in whose place you have reigned. The '
  - type: text
    content: Lord
  - type: text
    content: ' has given the kingdom into the hands of your son Absalom. You have come to ruin because you are a murderer!”'
  '9':
  - type: text
    content: Then Abishai son of Zeruiah said to the king, “Why should this dead dog curse my lord the king? Let me go over and cut off his head.”
