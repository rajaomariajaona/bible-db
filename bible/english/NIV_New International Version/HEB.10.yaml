document_id: HEB.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ’s Sacrifice Once for All
  - type: text
    content: 'The law is only a shadow of the good things that are coming—not the realities themselves. For this reason it can never, by the same sacrifices repeated endlessly year after year, make perfect those who draw near to worship. '
  '10':
  - type: text
    content: And by that will, we have been made holy through the sacrifice of the body of Jesus Christ once for all.
  '11':
  - type: text
    content: 'Day after day every priest stands and performs his religious duties; again and again he offers the same sacrifices, which can never take away sins. '
  '12':
  - type: text
    content: 'But when this priest had offered for all time one sacrifice for sins, he sat down at the right hand of God, '
  '13':
  - type: text
    content: 'and since that time he waits for his enemies to be made his footstool. '
  '14':
  - type: text
    content: For by one sacrifice he has made perfect forever those who are being made holy.
  '15':
  - type: text
    content: 'The Holy Spirit also testifies to us about this. First he says:'
  '16':
  - type: text
    content: “This is the covenant I will make with them
  - type: text
    content: after that time, says the Lord.
  - type: text
    content: I will put my laws in their hearts,
  - type: text
    content: and I will write them on their minds.”
  - type: note
    content: Jer. 31:33
  '17':
  - type: text
    content: 'Then he adds:'
  - type: text
    content: “Their sins and lawless acts
  - type: text
    content: I will remember no more.”
  - type: note
    content: Jer. 31:34
  '18':
  - type: text
    content: And where these have been forgiven, sacrifice for sin is no longer necessary.
  - type: heading
    content: A Call to Persevere in Faith
  '19':
  - type: text
    content: 'Therefore, brothers and sisters, since we have confidence to enter the Most Holy Place by the blood of Jesus, '
  '2':
  - type: text
    content: 'Otherwise, would they not have stopped being offered? For the worshipers would have been cleansed once for all, and would no longer have felt guilty for their sins. '
  '20':
  - type: text
    content: 'by a new and living way opened for us through the curtain, that is, his body, '
  '21':
  - type: text
    content: 'and since we have a great priest over the house of God, '
  '22':
  - type: text
    content: 'let us draw near to God with a sincere heart and with the full assurance that faith brings, having our hearts sprinkled to cleanse us from a guilty conscience and having our bodies washed with pure water. '
  '23':
  - type: text
    content: 'Let us hold unswervingly to the hope we profess, for he who promised is faithful. '
  '24':
  - type: text
    content: 'And let us consider how we may spur one another on toward love and good deeds, '
  '25':
  - type: text
    content: not giving up meeting together, as some are in the habit of doing, but encouraging one another—and all the more as you see the Day approaching.
  '26':
  - type: text
    content: 'If we deliberately keep on sinning after we have received the knowledge of the truth, no sacrifice for sins is left, '
  '27':
  - type: text
    content: 'but only a fearful expectation of judgment and of raging fire that will consume the enemies of God. '
  '28':
  - type: text
    content: 'Anyone who rejected the law of Moses died without mercy on the testimony of two or three witnesses. '
  '29':
  - type: text
    content: 'How much more severely do you think someone deserves to be punished who has trampled the Son of God underfoot, who has treated as an unholy thing the blood of the covenant that sanctified them, and who has insulted the Spirit of grace? '
  '3':
  - type: text
    content: 'But those sacrifices are an annual reminder of sins. '
  '30':
  - type: text
    content: For we know him who said, “It is mine to avenge; I will repay,”
  - type: note
    content: Deut. 32:35
  - type: text
    content: ' and again, “The Lord will judge his people.”'
  - type: note
    content: Deut. 32:36; Psalm 135:14
  - type: text
    content: ' '
  '31':
  - type: text
    content: It is a dreadful thing to fall into the hands of the living God.
  '32':
  - type: text
    content: 'Remember those earlier days after you had received the light, when you endured in a great conflict full of suffering. '
  '33':
  - type: text
    content: 'Sometimes you were publicly exposed to insult and persecution; at other times you stood side by side with those who were so treated. '
  '34':
  - type: text
    content: 'You suffered along with those in prison and joyfully accepted the confiscation of your property, because you knew that you yourselves had better and lasting possessions. '
  '35':
  - type: text
    content: So do not throw away your confidence; it will be richly rewarded.
  '36':
  - type: text
    content: 'You need to persevere so that when you have done the will of God, you will receive what he has promised. '
  '37':
  - type: text
    content: For,
  - type: text
    content: “In just a little while,
  - type: text
    content: he who is coming will come
  - type: text
    content: and will not delay.”
  - type: note
    content: Isaiah 26:20; Hab. 2:3
  '38':
  - type: text
    content: And,
  - type: text
    content: “But my righteous
  - type: note
    content: Some manuscripts But the righteous
  - type: text
    content: ' one will live by faith.'
  - type: text
    content: And I take no pleasure
  - type: text
    content: in the one who shrinks back.”
  - type: note
    content: Hab. 2:4 (see Septuagint)
  '39':
  - type: text
    content: But we do not belong to those who shrink back and are destroyed, but to those who have faith and are saved.
  '4':
  - type: text
    content: It is impossible for the blood of bulls and goats to take away sins.
  '5':
  - type: text
    content: 'Therefore, when Christ came into the world, he said:'
  - type: text
    content: “Sacrifice and offering you did not desire,
  - type: text
    content: but a body you prepared for me;
  '6':
  - type: text
    content: with burnt offerings and sin offerings
  - type: text
    content: you were not pleased.
  '7':
  - type: text
    content: Then I said, ‘Here I am—it is written about me in the scroll—
  - type: text
    content: I have come to do your will, my God.’ ”
  - type: note
    content: Psalm 40:6-8 (see Septuagint)
  '8':
  - type: text
    content: 'First he said, “Sacrifices and offerings, burnt offerings and sin offerings you did not desire, nor were you pleased with them”—though they were offered in accordance with the law. '
  '9':
  - type: text
    content: 'Then he said, “Here I am, I have come to do your will.” He sets aside the first to establish the second. '
