document_id: HEB.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ’s Sacrifice Once for All
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The law is only a shadow of the good things that are coming—not the realities themselves. For this reason it can never, by the same sacrifices repeated endlessly year after year, make perfect those who draw near to worship. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And by that will, we have been made holy through the sacrifice of the body of Jesus Christ once for all.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Day after day every priest stands and performs his religious duties; again and again he offers the same sacrifices, which can never take away sins. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when this priest had offered for all time one sacrifice for sins, he sat down at the right hand of God, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and since that time he waits for his enemies to be made his footstool. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For by one sacrifice he has made perfect forever those who are being made holy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Holy Spirit also testifies to us about this. First he says:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This is the covenant I will make with them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: after that time, says the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my laws in their hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will write them on their minds.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer. 31:33
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then he adds:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Their sins and lawless acts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will remember no more.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer. 31:34
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And where these have been forgiven, sacrifice for sin is no longer necessary.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Call to Persevere in Faith
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, brothers and sisters, since we have confidence to enter the Most Holy Place by the blood of Jesus, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Otherwise, would they not have stopped being offered? For the worshipers would have been cleansed once for all, and would no longer have felt guilty for their sins. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'by a new and living way opened for us through the curtain, that is, his body, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and since we have a great priest over the house of God, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let us draw near to God with a sincere heart and with the full assurance that faith brings, having our hearts sprinkled to cleanse us from a guilty conscience and having our bodies washed with pure water. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let us hold unswervingly to the hope we profess, for he who promised is faithful. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And let us consider how we may spur one another on toward love and good deeds, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: not giving up meeting together, as some are in the habit of doing, but encouraging one another—and all the more as you see the Day approaching.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we deliberately keep on sinning after we have received the knowledge of the truth, no sacrifice for sins is left, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but only a fearful expectation of judgment and of raging fire that will consume the enemies of God. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anyone who rejected the law of Moses died without mercy on the testimony of two or three witnesses. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How much more severely do you think someone deserves to be punished who has trampled the Son of God underfoot, who has treated as an unholy thing the blood of the covenant that sanctified them, and who has insulted the Spirit of grace? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But those sacrifices are an annual reminder of sins. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For we know him who said, “It is mine to avenge; I will repay,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 32:35
      marker-yv: yv-n
    - type: text
      text: ' and again, “The Lord will judge his people.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 32:36; Psalm 135:14
      marker-yv: yv-n
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It is a dreadful thing to fall into the hands of the living God.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember those earlier days after you had received the light, when you endured in a great conflict full of suffering. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sometimes you were publicly exposed to insult and persecution; at other times you stood side by side with those who were so treated. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You suffered along with those in prison and joyfully accepted the confiscation of your property, because you knew that you yourselves had better and lasting possessions. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So do not throw away your confidence; it will be richly rewarded.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You need to persevere so that when you have done the will of God, you will receive what he has promised. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In just a little while,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he who is coming will come
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will not delay.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 26:20; Hab. 2:3
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But my righteous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: But the righteous
      marker-yv: yv-n
    - type: text
      text: ' one will live by faith.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I take no pleasure
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the one who shrinks back.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hab. 2:4 (see Septuagint)
      marker-yv: yv-n
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But we do not belong to those who shrink back and are destroyed, but to those who have faith and are saved.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It is impossible for the blood of bulls and goats to take away sins.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, when Christ came into the world, he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sacrifice and offering you did not desire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a body you prepared for me;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with burnt offerings and sin offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you were not pleased.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I said, ‘Here I am—it is written about me in the scroll—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have come to do your will, my God.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 40:6-8 (see Septuagint)
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'First he said, “Sacrifices and offerings, burnt offerings and sin offerings you did not desire, nor were you pleased with them”—though they were offered in accordance with the law. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then he said, “Here I am, I have come to do your will.” He sets aside the first to establish the second. '
