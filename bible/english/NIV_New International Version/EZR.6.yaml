document_id: EZR.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Decree of Darius
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Darius then issued an order, and they searched in the archives stored in the treasury at Babylon. '
  '10':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: so that they may offer sacrifices pleasing to the God of heaven and pray for the well-being of the king and his sons.
  '11':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Furthermore, I decree that if anyone defies this edict, a beam is to be pulled from their house and they are to be impaled on it. And for this crime their house is to be made a pile of rubble. '
  '12':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: May God, who has caused his Name to dwell there, overthrow any king or people who lifts a hand to change this decree or to destroy this temple in Jerusalem.
  - type: usfm
    marker: pm
    children:
    - type: text
      text: I Darius have decreed it. Let it be carried out with diligence.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Completion and Dedication of the Temple
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then, because of the decree King Darius had sent, Tattenai, governor of Trans-Euphrates, and Shethar-Bozenai and their associates carried it out with diligence. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the elders of the Jews continued to build and prosper under the preaching of Haggai the prophet and Zechariah, a descendant of Iddo. They finished building the temple according to the command of the God of Israel and the decrees of Cyrus, Darius and Artaxerxes, kings of Persia. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The temple was completed on the third day of the month Adar, in the sixth year of the reign of King Darius.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of Israel—the priests, the Levites and the rest of the exiles—celebrated the dedication of the house of God with joy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the dedication of this house of God they offered a hundred bulls, two hundred rams, four hundred male lambs and, as a sin offering
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: purification offering
      marker-yv: yv-n
    - type: text
      text: ' for all Israel, twelve male goats, one for each of the tribes of Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they installed the priests in their divisions and the Levites in their groups for the service of God at Jerusalem, according to what is written in the Book of Moses.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Passover
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the fourteenth day of the first month, the exiles celebrated the Passover. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A scroll was found in the citadel of Ecbatana in the province of Media, and this was written on it:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'Memorandum:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priests and Levites had purified themselves and were all ceremonially clean. The Levites slaughtered the Passover lamb for all the exiles, for their relatives the priests and for themselves. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Israelites who had returned from the exile ate it, together with all who had separated themselves from the unclean practices of their Gentile neighbors in order to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For seven days they celebrated with joy the Festival of Unleavened Bread, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had filled them with joy by changing the attitude of the king of Assyria so that he assisted them in the work on the house of God, the God of Israel.'
  '3':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'In the first year of King Cyrus, the king issued a decree concerning the temple of God in Jerusalem:'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Let the temple be rebuilt as a place to present sacrifices, and let its foundations be laid. It is to be sixty cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 90 feet or about 27 meters
      marker-yv: yv-n
    - type: text
      text: ' high and sixty cubits wide, '
  '4':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'with three courses of large stones and one of timbers. The costs are to be paid by the royal treasury. '
  '5':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Also, the gold and silver articles of the house of God, which Nebuchadnezzar took from the temple in Jerusalem and brought to Babylon, are to be returned to their places in the temple in Jerusalem; they are to be deposited in the house of God.
  '6':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Now then, Tattenai, governor of Trans-Euphrates, and Shethar-Bozenai and you other officials of that province, stay away from there. '
  '7':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Do not interfere with the work on this temple of God. Let the governor of the Jews and the Jewish elders rebuild this house of God on its site.
  '8':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Moreover, I hereby decree what you are to do for these elders of the Jews in the construction of this house of God:'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Their expenses are to be fully paid out of the royal treasury, from the revenues of Trans-Euphrates, so that the work will not stop. '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Whatever is needed—young bulls, rams, male lambs for burnt offerings to the God of heaven, and wheat, salt, wine and olive oil, as requested by the priests in Jerusalem—must be given them daily without fail, '
