document_id: EXO.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Plague on the Firstborn
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Moses, “I will bring one more plague on Pharaoh and on Egypt. After that, he will let you go from here, and when he does, he will drive you out completely. '
  '10':
  - type: text
    content: 'Moses and Aaron performed all these wonders before Pharaoh, but the '
  - type: text
    content: Lord
  - type: text
    content: ' hardened Pharaoh’s heart, and he would not let the Israelites go out of his country.'
  '2':
  - type: text
    content: 'Tell the people that men and women alike are to ask their neighbors for articles of silver and gold.” '
  '3':
  - type: text
    content: '(The '
  - type: text
    content: Lord
  - type: text
    content: ' made the Egyptians favorably disposed toward the people, and Moses himself was highly regarded in Egypt by Pharaoh’s officials and by the people.)'
  '4':
  - type: text
    content: 'So Moses said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘About midnight I will go throughout Egypt. '
  '5':
  - type: text
    content: 'Every firstborn son in Egypt will die, from the firstborn son of Pharaoh, who sits on the throne, to the firstborn son of the female slave, who is at her hand mill, and all the firstborn of the cattle as well. '
  '6':
  - type: text
    content: 'There will be loud wailing throughout Egypt—worse than there has ever been or ever will be again. '
  '7':
  - type: text
    content: 'But among the Israelites not a dog will bark at any person or animal.’ Then you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' makes a distinction between Egypt and Israel. '
  '8':
  - type: text
    content: All these officials of yours will come to me, bowing down before me and saying, ‘Go, you and all the people who follow you!’ After that I will leave.” Then Moses, hot with anger, left Pharaoh.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Moses, “Pharaoh will refuse to listen to you—so that my wonders may be multiplied in Egypt.” '
