document_id: JOB.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elihu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So these three men stopped answering Job, because he was righteous in his own eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But Elihu son of Barakel the Buzite, of the family of Ram, became very angry with Job for justifying himself rather than God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He was also angry with the three friends, because they had found no way to refute Job, and yet had condemned him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text; an ancient Hebrew scribal tradition '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Job, and so had condemned God
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now Elihu had waited before speaking to Job because they were older than he. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But when he saw that the three men had nothing more to say, his anger was aroused.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Elihu son of Barakel the Buzite said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am young in years,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you are old;
- type: usfm
  marker: q1
  children:
  - type: text
    text: that is why I was fearful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not daring to tell you what I know.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I thought, ‘Age should speak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: advanced years should teach wisdom.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But it is the spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Spirit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 18
    marker-yv: yv-n
  - type: text
    text: ' in a person,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the breath of the Almighty, that gives them understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It is not only the old
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: many
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: great
    marker-yv: yv-n
  - type: text
    text: ' who are wise,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: not only the aged who understand what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Therefore I say: Listen to me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I too will tell you what I know.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I waited while you spoke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I listened to your reasoning;
- type: usfm
  marker: q1
  children:
  - type: text
    text: while you were searching for words,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I gave you my full attention.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But not one of you has proved Job wrong;
- type: usfm
  marker: q2
  children:
  - type: text
    text: none of you has answered his arguments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Do not say, ‘We have found wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let God, not a man, refute him.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But Job has not marshaled his words against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will not answer him with your arguments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “They are dismayed and have no more to say;
- type: usfm
  marker: q2
  children:
  - type: text
    text: words have failed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Must I wait, now that they are silent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: now that they stand there with no reply?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I too will have my say;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I too will tell what I know.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For I am full of words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the spirit within me compels me;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: inside I am like bottled-up wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like new wineskins ready to burst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I must speak and find relief;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I must open my lips and reply.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I will show no partiality,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will I flatter anyone;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: for if I were skilled in flattery,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my Maker would soon take me away.
