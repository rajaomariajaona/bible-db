document_id: JOB.32,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Elihu
  - type: text
    content: 'So these three men stopped answering Job, because he was righteous in his own eyes. '
  '10':
  - type: text
    content: '“Therefore I say: Listen to me;'
  - type: text
    content: I too will tell you what I know.
  '11':
  - type: text
    content: I waited while you spoke,
  - type: text
    content: I listened to your reasoning;
  - type: text
    content: while you were searching for words,
  '12':
  - type: text
    content: I gave you my full attention.
  - type: text
    content: But not one of you has proved Job wrong;
  - type: text
    content: none of you has answered his arguments.
  '13':
  - type: text
    content: Do not say, ‘We have found wisdom;
  - type: text
    content: let God, not a man, refute him.’
  '14':
  - type: text
    content: But Job has not marshaled his words against me,
  - type: text
    content: and I will not answer him with your arguments.
  '15':
  - type: text
    content: “They are dismayed and have no more to say;
  - type: text
    content: words have failed them.
  '16':
  - type: text
    content: Must I wait, now that they are silent,
  - type: text
    content: now that they stand there with no reply?
  '17':
  - type: text
    content: I too will have my say;
  - type: text
    content: I too will tell what I know.
  '18':
  - type: text
    content: For I am full of words,
  - type: text
    content: and the spirit within me compels me;
  '19':
  - type: text
    content: inside I am like bottled-up wine,
  - type: text
    content: like new wineskins ready to burst.
  '2':
  - type: text
    content: 'But Elihu son of Barakel the Buzite, of the family of Ram, became very angry with Job for justifying himself rather than God. '
  '20':
  - type: text
    content: I must speak and find relief;
  - type: text
    content: I must open my lips and reply.
  '21':
  - type: text
    content: I will show no partiality,
  - type: text
    content: nor will I flatter anyone;
  '22':
  - type: text
    content: for if I were skilled in flattery,
  - type: text
    content: my Maker would soon take me away.
  '3':
  - type: text
    content: He was also angry with the three friends, because they had found no way to refute Job, and yet had condemned him.
  - type: note
    content: Masoretic Text; an ancient Hebrew scribal tradition Job, and so had condemned God
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Now Elihu had waited before speaking to Job because they were older than he. '
  '5':
  - type: text
    content: But when he saw that the three men had nothing more to say, his anger was aroused.
  '6':
  - type: text
    content: 'So Elihu son of Barakel the Buzite said:'
  - type: text
    content: “I am young in years,
  - type: text
    content: and you are old;
  - type: text
    content: that is why I was fearful,
  - type: text
    content: not daring to tell you what I know.
  '7':
  - type: text
    content: I thought, ‘Age should speak;
  - type: text
    content: advanced years should teach wisdom.’
  '8':
  - type: text
    content: But it is the spirit
  - type: note
    content: Or Spirit; also in verse 18
  - type: text
    content: ' in a person,'
  - type: text
    content: the breath of the Almighty, that gives them understanding.
  '9':
  - type: text
    content: It is not only the old
  - type: note
    content: Or many; or great
  - type: text
    content: ' who are wise,'
  - type: text
    content: not only the aged who understand what is right.
