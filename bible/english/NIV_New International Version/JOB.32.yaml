document_id: JOB.32,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elihu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So these three men stopped answering Job, because he was righteous in his own eyes. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Therefore I say: Listen to me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I too will tell you what I know.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I waited while you spoke,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I listened to your reasoning;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while you were searching for words,
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I gave you my full attention.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But not one of you has proved Job wrong;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: none of you has answered his arguments.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not say, ‘We have found wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let God, not a man, refute him.’
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Job has not marshaled his words against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not answer him with your arguments.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They are dismayed and have no more to say;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: words have failed them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Must I wait, now that they are silent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now that they stand there with no reply?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I too will have my say;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I too will tell what I know.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am full of words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the spirit within me compels me;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: inside I am like bottled-up wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like new wineskins ready to burst.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Elihu son of Barakel the Buzite, of the family of Ram, became very angry with Job for justifying himself rather than God. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I must speak and find relief;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I must open my lips and reply.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will show no partiality,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will I flatter anyone;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for if I were skilled in flattery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my Maker would soon take me away.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was also angry with the three friends, because they had found no way to refute Job, and yet had condemned him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text; an ancient Hebrew scribal tradition '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Job, and so had condemned God
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Elihu had waited before speaking to Job because they were older than he. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when he saw that the three men had nothing more to say, his anger was aroused.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Elihu son of Barakel the Buzite said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am young in years,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you are old;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that is why I was fearful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not daring to tell you what I know.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thought, ‘Age should speak;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: advanced years should teach wisdom.’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it is the spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Spirit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 18
      marker-yv: yv-n
    - type: text
      text: ' in a person,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the breath of the Almighty, that gives them understanding.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is not only the old
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: many
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: great
      marker-yv: yv-n
    - type: text
      text: ' who are wise,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not only the aged who understand what is right.
