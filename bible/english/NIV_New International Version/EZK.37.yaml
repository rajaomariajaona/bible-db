document_id: EZK.37,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Valley of Dry Bones
  - type: text
    content: 'The hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was on me, and he brought me out by the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' and set me in the middle of a valley; it was full of bones. '
  '10':
  - type: text
    content: So I prophesied as he commanded me, and breath entered them; they came to life and stood up on their feet—a vast army.
  '11':
  - type: text
    content: 'Then he said to me: “Son of man, these bones are the people of Israel. They say, ‘Our bones are dried up and our hope is gone; we are cut off.’ '
  '12':
  - type: text
    content: 'Therefore prophesy and say to them: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: My people, I am going to open your graves and bring you up from them; I will bring you back to the land of Israel. '
  '13':
  - type: text
    content: 'Then you, my people, will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I open your graves and bring you up from them. '
  '14':
  - type: text
    content: 'I will put my Spirit in you and you will live, and I will settle you in your own land. Then you will know that I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken, and I have done it, declares the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: One Nation Under One King
  '15':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '16':
  - type: text
    content: '“Son of man, take a stick of wood and write on it, ‘Belonging to Judah and the Israelites associated with him.’ Then take another stick of wood, and write on it, ‘Belonging to Joseph (that is, to Ephraim) and all the Israelites associated with him.’ '
  '17':
  - type: text
    content: Join them together into one stick so that they will become one in your hand.
  '18':
  - type: text
    content: '“When your people ask you, ‘Won’t you tell us what you mean by this?’ '
  '19':
  - type: text
    content: 'say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am going to take the stick of Joseph—which is in Ephraim’s hand—and of the Israelite tribes associated with him, and join it to Judah’s stick. I will make them into a single stick of wood, and they will become one in my hand.’ '
  '2':
  - type: text
    content: 'He led me back and forth among them, and I saw a great many bones on the floor of the valley, bones that were very dry. '
  '20':
  - type: text
    content: 'Hold before their eyes the sticks you have written on '
  '21':
  - type: text
    content: 'and say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will take the Israelites out of the nations where they have gone. I will gather them from all around and bring them back into their own land. '
  '22':
  - type: text
    content: 'I will make them one nation in the land, on the mountains of Israel. There will be one king over all of them and they will never again be two nations or be divided into two kingdoms. '
  '23':
  - type: text
    content: They will no longer defile themselves with their idols and vile images or with any of their offenses, for I will save them from all their sinful backsliding,
  - type: note
    content: Many Hebrew manuscripts (see also Septuagint); most Hebrew manuscripts all their dwelling places where they sinned
  - type: text
    content: ' and I will cleanse them. They will be my people, and I will be their God.'
  '24':
  - type: text
    content: '“ ‘My servant David will be king over them, and they will all have one shepherd. They will follow my laws and be careful to keep my decrees. '
  '25':
  - type: text
    content: 'They will live in the land I gave to my servant Jacob, the land where your ancestors lived. They and their children and their children’s children will live there forever, and David my servant will be their prince forever. '
  '26':
  - type: text
    content: 'I will make a covenant of peace with them; it will be an everlasting covenant. I will establish them and increase their numbers, and I will put my sanctuary among them forever. '
  '27':
  - type: text
    content: 'My dwelling place will be with them; I will be their God, and they will be my people. '
  '28':
  - type: text
    content: 'Then the nations will know that I the '
  - type: text
    content: Lord
  - type: text
    content: ' make Israel holy, when my sanctuary is among them forever.’ ”'
  '3':
  - type: text
    content: He asked me, “Son of man, can these bones live?”
  - type: text
    content: 'I said, “Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', you alone know.”'
  '4':
  - type: text
    content: 'Then he said to me, “Prophesy to these bones and say to them, ‘Dry bones, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '5':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to these bones: I will make breath'
  - type: note
    content: The Hebrew for this word can also mean wind or spirit (see verses 6-14).
  - type: text
    content: ' enter you, and you will come to life. '
  '6':
  - type: text
    content: 'I will attach tendons to you and make flesh come upon you and cover you with skin; I will put breath in you, and you will come to life. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '7':
  - type: text
    content: 'So I prophesied as I was commanded. And as I was prophesying, there was a noise, a rattling sound, and the bones came together, bone to bone. '
  '8':
  - type: text
    content: I looked, and tendons and flesh appeared on them and skin covered them, but there was no breath in them.
  '9':
  - type: text
    content: 'Then he said to me, “Prophesy to the breath; prophesy, son of man, and say to it, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Come, breath, from the four winds and breathe into these slain, that they may live.’ ” '
