document_id: EZK.37,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Valley of Dry Bones
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was on me, and he brought me out by the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and set me in the middle of a valley; it was full of bones. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I prophesied as he commanded me, and breath entered them; they came to life and stood up on their feet—a vast army.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to me: “Son of man, these bones are the people of Israel. They say, ‘Our bones are dried up and our hope is gone; we are cut off.’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore prophesy and say to them: ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: My people, I am going to open your graves and bring you up from them; I will bring you back to the land of Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you, my people, will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', when I open your graves and bring you up from them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will put my Spirit in you and you will live, and I will settle you in your own land. Then you will know that I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' have spoken, and I have done it, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: One Nation Under One King
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, take a stick of wood and write on it, ‘Belonging to Judah and the Israelites associated with him.’ Then take another stick of wood, and write on it, ‘Belonging to Joseph (that is, to Ephraim) and all the Israelites associated with him.’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Join them together into one stick so that they will become one in your hand.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When your people ask you, ‘Won’t you tell us what you mean by this?’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'say to them, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am going to take the stick of Joseph—which is in Ephraim’s hand—and of the Israelite tribes associated with him, and join it to Judah’s stick. I will make them into a single stick of wood, and they will become one in my hand.’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He led me back and forth among them, and I saw a great many bones on the floor of the valley, bones that were very dry. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hold before their eyes the sticks you have written on '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say to them, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I will take the Israelites out of the nations where they have gone. I will gather them from all around and bring them back into their own land. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make them one nation in the land, on the mountains of Israel. There will be one king over all of them and they will never again be two nations or be divided into two kingdoms. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will no longer defile themselves with their idols and vile images or with any of their offenses, for I will save them from all their sinful backsliding,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts (see also Septuagint); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: all their dwelling places where they sinned
      marker-yv: yv-n
    - type: text
      text: ' and I will cleanse them. They will be my people, and I will be their God.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘My servant David will be king over them, and they will all have one shepherd. They will follow my laws and be careful to keep my decrees. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will live in the land I gave to my servant Jacob, the land where your ancestors lived. They and their children and their children’s children will live there forever, and David my servant will be their prince forever. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make a covenant of peace with them; it will be an everlasting covenant. I will establish them and increase their numbers, and I will put my sanctuary among them forever. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My dwelling place will be with them; I will be their God, and they will be my people. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the nations will know that I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' make Israel holy, when my sanctuary is among them forever.’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He asked me, “Son of man, can these bones live?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I said, “Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you alone know.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to me, “Prophesy to these bones and say to them, ‘Dry bones, hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to these bones: I will make breath'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew for this word can also mean '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'wind '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'spirit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see verses 6-14).
      marker-yv: yv-n
    - type: text
      text: ' enter you, and you will come to life. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will attach tendons to you and make flesh come upon you and cover you with skin; I will put breath in you, and you will come to life. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I prophesied as I was commanded. And as I was prophesying, there was a noise, a rattling sound, and the bones came together, bone to bone. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I looked, and tendons and flesh appeared on them and skin covered them, but there was no breath in them.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to me, “Prophesy to the breath; prophesy, son of man, and say to it, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Come, breath, from the four winds and breathe into these slain, that they may live.’ ” '
