document_id: NUM.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Setting Up the Lamps
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'You are to bring the Levites before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the Israelites are to lay their hands on them. '
  '11':
  - type: text
    content: 'Aaron is to present the Levites before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering from the Israelites, so that they may be ready to do the work of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: '“Then the Levites are to lay their hands on the heads of the bulls, using one for a sin offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' and the other for a burnt offering, to make atonement for the Levites. '
  '13':
  - type: text
    content: 'Have the Levites stand in front of Aaron and his sons and then present them as a wave offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: In this way you are to set the Levites apart from the other Israelites, and the Levites will be mine.
  '15':
  - type: text
    content: '“After you have purified the Levites and presented them as a wave offering, they are to come to do their work at the tent of meeting. '
  '16':
  - type: text
    content: 'They are the Israelites who are to be given wholly to me. I have taken them as my own in place of the firstborn, the first male offspring from every Israelite woman. '
  '17':
  - type: text
    content: 'Every firstborn male in Israel, whether human or animal, is mine. When I struck down all the firstborn in Egypt, I set them apart for myself. '
  '18':
  - type: text
    content: 'And I have taken the Levites in place of all the firstborn sons in Israel. '
  '19':
  - type: text
    content: From among all the Israelites, I have given the Levites as gifts to Aaron and his sons to do the work at the tent of meeting on behalf of the Israelites and to make atonement for them so that no plague will strike the Israelites when they go near the sanctuary.”
  '2':
  - type: text
    content: “Speak to Aaron and say to him, ‘When you set up the lamps, see that all seven light up the area in front of the lampstand.’ ”
  '20':
  - type: text
    content: 'Moses, Aaron and the whole Israelite community did with the Levites just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '21':
  - type: text
    content: 'The Levites purified themselves and washed their clothes. Then Aaron presented them as a wave offering before the '
  - type: text
    content: Lord
  - type: text
    content: ' and made atonement for them to purify them. '
  '22':
  - type: text
    content: 'After that, the Levites came to do their work at the tent of meeting under the supervision of Aaron and his sons. They did with the Levites just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '24':
  - type: text
    content: '“This applies to the Levites: Men twenty-five years old or more shall come to take part in the work at the tent of meeting, '
  '25':
  - type: text
    content: 'but at the age of fifty, they must retire from their regular service and work no longer. '
  '26':
  - type: text
    content: They may assist their brothers in performing their duties at the tent of meeting, but they themselves must not do the work. This, then, is how you are to assign the responsibilities of the Levites.”
  '3':
  - type: text
    content: 'Aaron did so; he set up the lamps so that they faced forward on the lampstand, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '4':
  - type: text
    content: 'This is how the lampstand was made: It was made of hammered gold—from its base to its blossoms. The lampstand was made exactly like the pattern the '
  - type: text
    content: Lord
  - type: text
    content: ' had shown Moses.'
  - type: heading
    content: The Setting Apart of the Levites
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses: '
  '6':
  - type: text
    content: '“Take the Levites from among all the Israelites and make them ceremonially clean. '
  '7':
  - type: text
    content: 'To purify them, do this: Sprinkle the water of cleansing on them; then have them shave their whole bodies and wash their clothes. And so they will purify themselves. '
  '8':
  - type: text
    content: Have them take a young bull with its grain offering of the finest flour mixed with olive oil; then you are to take a second young bull for a sin offering.
  - type: note
    content: Or purification offering; also in verse 12
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Bring the Levites to the front of the tent of meeting and assemble the whole Israelite community. '
