document_id: 2CO.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As God’s co-workers we urge you not to receive God’s grace in vain. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sorrowful, yet always rejoicing; poor, yet making many rich; having nothing, and yet possessing everything.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have spoken freely to you, Corinthians, and opened wide our hearts to you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We are not withholding our affection from you, but you are withholding yours from us. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As a fair exchange—I speak as to my children—open wide your hearts also.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning Against Idolatry
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not be yoked together with unbelievers. For what do righteousness and wickedness have in common? Or what fellowship can light have with darkness? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What harmony is there between Christ and Belial
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Beliar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Belial
      marker-yv: yv-n
    - type: text
      text: '? Or what does a believer have in common with an unbeliever? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What agreement is there between the temple of God and idols? For we are the temple of the living God. As God has said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will live with them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and walk among them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will be their God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will be my people.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lev. 26:12; Jer. 32:38; Ezek. 37:27
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Therefore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come out from them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be separate,
  - type: usfm
    marker: q4
    children:
    - type: text
      text: says the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Touch no unclean thing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will receive you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 52:11; Ezek. 20:34,41
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will be a Father to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will be my sons and daughters,
  - type: usfm
    marker: q4
    children:
    - type: text
      text: says the Lord Almighty.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2 Samuel 7:14; 7:8
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For he says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In the time of my favor I heard you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in the day of salvation I helped you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 49:8
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: I tell you, now is the time of God’s favor, now is the day of salvation.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Hardships
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We put no stumbling block in anyone’s path, so that our ministry will not be discredited. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rather, as servants of God we commend ourselves in every way: in great endurance; in troubles, hardships and distresses; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in beatings, imprisonments and riots; in hard work, sleepless nights and hunger; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in purity, understanding, patience and kindness; in the Holy Spirit and in sincere love; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in truthful speech and in the power of God; with weapons of righteousness in the right hand and in the left; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'through glory and dishonor, bad report and good report; genuine, yet regarded as impostors; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'known, yet regarded as unknown; dying, and yet we live on; beaten, and yet not killed; '
