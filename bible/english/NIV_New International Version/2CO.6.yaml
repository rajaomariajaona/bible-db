document_id: 2CO.6,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'As God’s co-workers we urge you not to receive God’s grace in vain. '
  '10':
  - type: text
    content: sorrowful, yet always rejoicing; poor, yet making many rich; having nothing, and yet possessing everything.
  '11':
  - type: text
    content: 'We have spoken freely to you, Corinthians, and opened wide our hearts to you. '
  '12':
  - type: text
    content: 'We are not withholding our affection from you, but you are withholding yours from us. '
  '13':
  - type: text
    content: As a fair exchange—I speak as to my children—open wide your hearts also.
  - type: heading
    content: Warning Against Idolatry
  '14':
  - type: text
    content: 'Do not be yoked together with unbelievers. For what do righteousness and wickedness have in common? Or what fellowship can light have with darkness? '
  '15':
  - type: text
    content: What harmony is there between Christ and Belial
  - type: note
    content: Greek Beliar, a variant of Belial
  - type: text
    content: '? Or what does a believer have in common with an unbeliever? '
  '16':
  - type: text
    content: 'What agreement is there between the temple of God and idols? For we are the temple of the living God. As God has said:'
  - type: text
    content: “I will live with them
  - type: text
    content: and walk among them,
  - type: text
    content: and I will be their God,
  - type: text
    content: and they will be my people.”
  - type: note
    content: Lev. 26:12; Jer. 32:38; Ezek. 37:27
  '17':
  - type: text
    content: Therefore,
  - type: text
    content: “Come out from them
  - type: text
    content: and be separate,
  - type: text
    content: says the Lord.
  - type: text
    content: Touch no unclean thing,
  - type: text
    content: and I will receive you.”
  - type: note
    content: Isaiah 52:11; Ezek. 20:34,41
  '18':
  - type: text
    content: And,
  - type: text
    content: “I will be a Father to you,
  - type: text
    content: and you will be my sons and daughters,
  - type: text
    content: says the Lord Almighty.”
  - type: note
    content: 2 Samuel 7:14; 7:8
  '2':
  - type: text
    content: For he says,
  - type: text
    content: “In the time of my favor I heard you,
  - type: text
    content: and in the day of salvation I helped you.”
  - type: note
    content: Isaiah 49:8
  - type: text
    content: I tell you, now is the time of God’s favor, now is the day of salvation.
  - type: heading
    content: Paul’s Hardships
  '3':
  - type: text
    content: 'We put no stumbling block in anyone’s path, so that our ministry will not be discredited. '
  '4':
  - type: text
    content: 'Rather, as servants of God we commend ourselves in every way: in great endurance; in troubles, hardships and distresses; '
  '5':
  - type: text
    content: 'in beatings, imprisonments and riots; in hard work, sleepless nights and hunger; '
  '6':
  - type: text
    content: 'in purity, understanding, patience and kindness; in the Holy Spirit and in sincere love; '
  '7':
  - type: text
    content: 'in truthful speech and in the power of God; with weapons of righteousness in the right hand and in the left; '
  '8':
  - type: text
    content: 'through glory and dishonor, bad report and good report; genuine, yet regarded as impostors; '
  '9':
  - type: text
    content: 'known, yet regarded as unknown; dying, and yet we live on; beaten, and yet not killed; '
