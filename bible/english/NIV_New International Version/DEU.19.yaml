document_id: DEU.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Cities of Refuge
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has destroyed the nations whose land he is giving you, and when you have driven them out and settled in their towns and houses, '
  '10':
  - type: text
    content: 'Do this so that innocent blood will not be shed in your land, which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as your inheritance, and so that you will not be guilty of bloodshed.'
  '11':
  - type: text
    content: 'But if out of hate someone lies in wait, assaults and kills a neighbor, and then flees to one of these cities, '
  '12':
  - type: text
    content: 'the killer shall be sent for by the town elders, be brought back from the city, and be handed over to the avenger of blood to die. '
  '13':
  - type: text
    content: Show no pity. You must purge from Israel the guilt of shedding innocent blood, so that it may go well with you.
  '14':
  - type: text
    content: 'Do not move your neighbor’s boundary stone set up by your predecessors in the inheritance you receive in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to possess.'
  - type: heading
    content: Witnesses
  '15':
  - type: text
    content: One witness is not enough to convict anyone accused of any crime or offense they may have committed. A matter must be established by the testimony of two or three witnesses.
  '16':
  - type: text
    content: 'If a malicious witness takes the stand to accuse someone of a crime, '
  '17':
  - type: text
    content: 'the two people involved in the dispute must stand in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' before the priests and the judges who are in office at the time. '
  '18':
  - type: text
    content: 'The judges must make a thorough investigation, and if the witness proves to be a liar, giving false testimony against a fellow Israelite, '
  '19':
  - type: text
    content: 'then do to the false witness as that witness intended to do to the other party. You must purge the evil from among you. '
  '2':
  - type: text
    content: 'then set aside for yourselves three cities in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to possess. '
  '20':
  - type: text
    content: 'The rest of the people will hear of this and be afraid, and never again will such an evil thing be done among you. '
  '21':
  - type: text
    content: 'Show no pity: life for life, eye for eye, tooth for tooth, hand for hand, foot for foot.'
  '3':
  - type: text
    content: 'Determine the distances involved and divide into three parts the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as an inheritance, so that a person who kills someone may flee for refuge to one of these cities.'
  '4':
  - type: text
    content: 'This is the rule concerning anyone who kills a person and flees there for safety—anyone who kills a neighbor unintentionally, without malice aforethought. '
  '5':
  - type: text
    content: 'For instance, a man may go into the forest with his neighbor to cut wood, and as he swings his ax to fell a tree, the head may fly off and hit his neighbor and kill him. That man may flee to one of these cities and save his life. '
  '6':
  - type: text
    content: 'Otherwise, the avenger of blood might pursue him in a rage, overtake him if the distance is too great, and kill him even though he is not deserving of death, since he did it to his neighbor without malice aforethought. '
  '7':
  - type: text
    content: This is why I command you to set aside for yourselves three cities.
  '8':
  - type: text
    content: 'If the '
  - type: text
    content: Lord
  - type: text
    content: ' your God enlarges your territory, as he promised on oath to your ancestors, and gives you the whole land he promised them, '
  '9':
  - type: text
    content: 'because you carefully follow all these laws I command you today—to love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and to walk always in obedience to him—then you are to set aside three more cities. '
