document_id: 1KI.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Queen of Sheba Visits Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When the queen of Sheba heard about the fame of Solomon and his relationship to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', she came to test Solomon with hard questions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Arriving at Jerusalem with a very great caravan—with camels carrying spices, large quantities of gold, and precious stones—she came to Solomon and talked with him about all that she had on her mind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Solomon answered all her questions; nothing was too hard for the king to explain to her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the queen of Sheba saw all the wisdom of Solomon and the palace he had built, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: the food on his table, the seating of his officials, the attending servants in their robes, his cupbearers, and the burnt offerings he made at
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the ascent by which he went up to
    marker-yv: yv-n
  - type: text
    text: ' the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', she was overwhelmed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'She said to the king, “The report I heard in my own country about your achievements and your wisdom is true. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But I did not believe these things until I came and saw with my own eyes. Indeed, not even half was told me; in wisdom and wealth you have far exceeded the report I heard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'How happy your people must be! How happy your officials, who continually stand before you and hear your wisdom! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Praise be to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, who has delighted in you and placed you on the throne of Israel. Because of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s eternal love for Israel, he has made you king to maintain justice and righteousness.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And she gave the king 120 talents
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 4 1/2 tons or about 4 metric tons
    marker-yv: yv-n
  - type: text
    text: ' of gold, large quantities of spices, and precious stones. Never again were so many spices brought in as those the queen of Sheba gave to King Solomon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: (Hiram’s ships brought gold from Ophir; and from there they brought great cargoes of almugwood
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probably a variant of '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: algumwood
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 12
    marker-yv: yv-n
  - type: text
    text: ' and precious stones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The king used the almugwood to make supports
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' for the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and for the royal palace, and to make harps and lyres for the musicians. So much almugwood has never been imported or seen since that day.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: King Solomon gave the queen of Sheba all she desired and asked for, besides what he had given her out of his royal bounty. Then she left and returned with her retinue to her own country.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Splendor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The weight of the gold that Solomon received yearly was 666 talents,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 25 tons or about 23 metric tons
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: not including the revenues from merchants and traders and from all the Arabian kings and the governors of the territories.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: King Solomon made two hundred large shields of hammered gold; six hundred shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 15 pounds or about 6.9 kilograms; also in verse 29
    marker-yv: yv-n
  - type: text
    text: ' of gold went into each shield. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He also made three hundred small shields of hammered gold, with three minas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 3/4 pounds or about 1.7 kilograms; or perhaps reference is to double minas, that is, about 7 1/2 pounds or about 3.5 kilograms.
    marker-yv: yv-n
  - type: text
    text: ' of gold in each shield. The king put them in the Palace of the Forest of Lebanon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the king made a great throne covered with ivory and overlaid with fine gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The throne had six steps, and its back had a rounded top. On both sides of the seat were armrests, with a lion standing beside each of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Twelve lions stood on the six steps, one at either end of each step. Nothing like it had ever been made for any other kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'All King Solomon’s goblets were gold, and all the household articles in the Palace of the Forest of Lebanon were pure gold. Nothing was made of silver, because silver was considered of little value in Solomon’s days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The king had a fleet of trading ships
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of ships of Tarshish
    marker-yv: yv-n
  - type: text
    text: ' at sea along with the ships of Hiram. Once every three years it returned, carrying gold, silver and ivory, and apes and baboons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'King Solomon was greater in riches and wisdom than all the other kings of the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The whole world sought audience with Solomon to hear the wisdom God had put in his heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Year after year, everyone who came brought a gift—articles of silver and gold, robes, weapons and spices, and horses and mules.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Solomon accumulated chariots and horses; he had fourteen hundred chariots and twelve thousand horses,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: charioteers
    marker-yv: yv-n
  - type: text
    text: ' which he kept in the chariot cities and also with him in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The king made silver as common in Jerusalem as stones, and cedar as plentiful as sycamore-fig trees in the foothills. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Solomon’s horses were imported from Egypt and from Kue
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probably '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Cilicia
    marker-yv: yv-n
  - type: text
    text: '—the royal merchants purchased them from Kue at the current price. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: They imported a chariot from Egypt for six hundred shekels of silver, and a horse for a hundred and fifty.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 3/4 pounds or about 1.7 kilograms
    marker-yv: yv-n
  - type: text
    text: ' They also exported them to all the kings of the Hittites and of the Arameans.'
