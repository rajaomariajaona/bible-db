document_id: 1KI.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Queen of Sheba Visits Solomon
  - type: text
    content: 'When the queen of Sheba heard about the fame of Solomon and his relationship to the '
  - type: text
    content: Lord
  - type: text
    content: ', she came to test Solomon with hard questions. '
  '10':
  - type: text
    content: And she gave the king 120 talents
  - type: note
    content: That is, about 4 1/2 tons or about 4 metric tons
  - type: text
    content: ' of gold, large quantities of spices, and precious stones. Never again were so many spices brought in as those the queen of Sheba gave to King Solomon.'
  '11':
  - type: text
    content: (Hiram’s ships brought gold from Ophir; and from there they brought great cargoes of almugwood
  - type: note
    content: Probably a variant of algumwood; also in verse 12
  - type: text
    content: ' and precious stones. '
  '12':
  - type: text
    content: The king used the almugwood to make supports
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' for the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and for the royal palace, and to make harps and lyres for the musicians. So much almugwood has never been imported or seen since that day.)'
  '13':
  - type: text
    content: King Solomon gave the queen of Sheba all she desired and asked for, besides what he had given her out of his royal bounty. Then she left and returned with her retinue to her own country.
  - type: heading
    content: Solomon’s Splendor
  '14':
  - type: text
    content: The weight of the gold that Solomon received yearly was 666 talents,
  - type: note
    content: That is, about 25 tons or about 23 metric tons
  - type: text
    content: ' '
  '15':
  - type: text
    content: not including the revenues from merchants and traders and from all the Arabian kings and the governors of the territories.
  '16':
  - type: text
    content: King Solomon made two hundred large shields of hammered gold; six hundred shekels
  - type: note
    content: That is, about 15 pounds or about 6.9 kilograms; also in verse 29
  - type: text
    content: ' of gold went into each shield. '
  '17':
  - type: text
    content: He also made three hundred small shields of hammered gold, with three minas
  - type: note
    content: That is, about 3 3/4 pounds or about 1.7 kilograms; or perhaps reference is to double minas, that is, about 7 1/2 pounds or about 3.5 kilograms.
  - type: text
    content: ' of gold in each shield. The king put them in the Palace of the Forest of Lebanon.'
  '18':
  - type: text
    content: 'Then the king made a great throne covered with ivory and overlaid with fine gold. '
  '19':
  - type: text
    content: 'The throne had six steps, and its back had a rounded top. On both sides of the seat were armrests, with a lion standing beside each of them. '
  '2':
  - type: text
    content: 'Arriving at Jerusalem with a very great caravan—with camels carrying spices, large quantities of gold, and precious stones—she came to Solomon and talked with him about all that she had on her mind. '
  '20':
  - type: text
    content: 'Twelve lions stood on the six steps, one at either end of each step. Nothing like it had ever been made for any other kingdom. '
  '21':
  - type: text
    content: 'All King Solomon’s goblets were gold, and all the household articles in the Palace of the Forest of Lebanon were pure gold. Nothing was made of silver, because silver was considered of little value in Solomon’s days. '
  '22':
  - type: text
    content: The king had a fleet of trading ships
  - type: note
    content: Hebrew of ships of Tarshish
  - type: text
    content: ' at sea along with the ships of Hiram. Once every three years it returned, carrying gold, silver and ivory, and apes and baboons.'
  '23':
  - type: text
    content: 'King Solomon was greater in riches and wisdom than all the other kings of the earth. '
  '24':
  - type: text
    content: 'The whole world sought audience with Solomon to hear the wisdom God had put in his heart. '
  '25':
  - type: text
    content: Year after year, everyone who came brought a gift—articles of silver and gold, robes, weapons and spices, and horses and mules.
  '26':
  - type: text
    content: Solomon accumulated chariots and horses; he had fourteen hundred chariots and twelve thousand horses,
  - type: note
    content: Or charioteers
  - type: text
    content: ' which he kept in the chariot cities and also with him in Jerusalem. '
  '27':
  - type: text
    content: 'The king made silver as common in Jerusalem as stones, and cedar as plentiful as sycamore-fig trees in the foothills. '
  '28':
  - type: text
    content: Solomon’s horses were imported from Egypt and from Kue
  - type: note
    content: Probably Cilicia
  - type: text
    content: '—the royal merchants purchased them from Kue at the current price. '
  '29':
  - type: text
    content: They imported a chariot from Egypt for six hundred shekels of silver, and a horse for a hundred and fifty.
  - type: note
    content: That is, about 3 3/4 pounds or about 1.7 kilograms
  - type: text
    content: ' They also exported them to all the kings of the Hittites and of the Arameans.'
  '3':
  - type: text
    content: 'Solomon answered all her questions; nothing was too hard for the king to explain to her. '
  '4':
  - type: text
    content: 'When the queen of Sheba saw all the wisdom of Solomon and the palace he had built, '
  '5':
  - type: text
    content: the food on his table, the seating of his officials, the attending servants in their robes, his cupbearers, and the burnt offerings he made at
  - type: note
    content: Or the ascent by which he went up to
  - type: text
    content: ' the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', she was overwhelmed.'
  '6':
  - type: text
    content: 'She said to the king, “The report I heard in my own country about your achievements and your wisdom is true. '
  '7':
  - type: text
    content: 'But I did not believe these things until I came and saw with my own eyes. Indeed, not even half was told me; in wisdom and wealth you have far exceeded the report I heard. '
  '8':
  - type: text
    content: 'How happy your people must be! How happy your officials, who continually stand before you and hear your wisdom! '
  '9':
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who has delighted in you and placed you on the throne of Israel. Because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s eternal love for Israel, he has made you king to maintain justice and righteousness.”
