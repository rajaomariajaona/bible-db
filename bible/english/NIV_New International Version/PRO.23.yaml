document_id: PRO.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Saying 7
  - type: text
    content: When you sit to dine with a ruler,
  - type: text
    content: note well what
  - type: note
    content: Or who
  - type: text
    content: ' is before you,'
  '10':
  - type: text
    content: Do not move an ancient boundary stone
  - type: text
    content: or encroach on the fields of the fatherless,
  '11':
  - type: text
    content: for their Defender is strong;
  - type: text
    content: he will take up their case against you.
  - type: heading
    content: Saying 12
  '12':
  - type: text
    content: Apply your heart to instruction
  - type: text
    content: and your ears to words of knowledge.
  - type: heading
    content: Saying 13
  '13':
  - type: text
    content: Do not withhold discipline from a child;
  - type: text
    content: if you punish them with the rod, they will not die.
  '14':
  - type: text
    content: Punish them with the rod
  - type: text
    content: and save them from death.
  - type: heading
    content: Saying 14
  '15':
  - type: text
    content: My son, if your heart is wise,
  - type: text
    content: then my heart will be glad indeed;
  '16':
  - type: text
    content: my inmost being will rejoice
  - type: text
    content: when your lips speak what is right.
  - type: heading
    content: Saying 15
  '17':
  - type: text
    content: Do not let your heart envy sinners,
  - type: text
    content: 'but always be zealous for the fear of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: There is surely a future hope for you,
  - type: text
    content: and your hope will not be cut off.
  - type: heading
    content: Saying 16
  '19':
  - type: text
    content: Listen, my son, and be wise,
  - type: text
    content: 'and set your heart on the right path:'
  '2':
  - type: text
    content: and put a knife to your throat
  - type: text
    content: if you are given to gluttony.
  '20':
  - type: text
    content: Do not join those who drink too much wine
  - type: text
    content: or gorge themselves on meat,
  '21':
  - type: text
    content: for drunkards and gluttons become poor,
  - type: text
    content: and drowsiness clothes them in rags.
  - type: heading
    content: Saying 17
  '22':
  - type: text
    content: Listen to your father, who gave you life,
  - type: text
    content: and do not despise your mother when she is old.
  '23':
  - type: text
    content: Buy the truth and do not sell it—
  - type: text
    content: wisdom, instruction and insight as well.
  '24':
  - type: text
    content: The father of a righteous child has great joy;
  - type: text
    content: a man who fathers a wise son rejoices in him.
  '25':
  - type: text
    content: May your father and mother rejoice;
  - type: text
    content: may she who gave you birth be joyful!
  - type: heading
    content: Saying 18
  '26':
  - type: text
    content: My son, give me your heart
  - type: text
    content: and let your eyes delight in my ways,
  '27':
  - type: text
    content: for an adulterous woman is a deep pit,
  - type: text
    content: and a wayward wife is a narrow well.
  '28':
  - type: text
    content: Like a bandit she lies in wait
  - type: text
    content: and multiplies the unfaithful among men.
  - type: heading
    content: Saying 19
  '29':
  - type: text
    content: Who has woe? Who has sorrow?
  - type: text
    content: Who has strife? Who has complaints?
  - type: text
    content: Who has needless bruises? Who has bloodshot eyes?
  '3':
  - type: text
    content: Do not crave his delicacies,
  - type: text
    content: for that food is deceptive.
  - type: heading
    content: Saying 8
  '30':
  - type: text
    content: Those who linger over wine,
  - type: text
    content: who go to sample bowls of mixed wine.
  '31':
  - type: text
    content: Do not gaze at wine when it is red,
  - type: text
    content: when it sparkles in the cup,
  - type: text
    content: when it goes down smoothly!
  '32':
  - type: text
    content: In the end it bites like a snake
  - type: text
    content: and poisons like a viper.
  '33':
  - type: text
    content: Your eyes will see strange sights,
  - type: text
    content: and your mind will imagine confusing things.
  '34':
  - type: text
    content: You will be like one sleeping on the high seas,
  - type: text
    content: lying on top of the rigging.
  '35':
  - type: text
    content: “They hit me,” you will say, “but I’m not hurt!
  - type: text
    content: They beat me, but I don’t feel it!
  - type: text
    content: When will I wake up
  - type: text
    content: so I can find another drink?”
  '4':
  - type: text
    content: Do not wear yourself out to get rich;
  - type: text
    content: do not trust your own cleverness.
  '5':
  - type: text
    content: Cast but a glance at riches, and they are gone,
  - type: text
    content: for they will surely sprout wings
  - type: text
    content: and fly off to the sky like an eagle.
  - type: heading
    content: Saying 9
  '6':
  - type: text
    content: Do not eat the food of a begrudging host,
  - type: text
    content: do not crave his delicacies;
  '7':
  - type: text
    content: for he is the kind of person
  - type: text
    content: who is always thinking about the cost.
  - type: note
    content: Or for as he thinks within himself, / so he is; or for as he puts on a feast, / so he is
  - type: text
    content: “Eat and drink,” he says to you,
  - type: text
    content: but his heart is not with you.
  '8':
  - type: text
    content: You will vomit up the little you have eaten
  - type: text
    content: and will have wasted your compliments.
  - type: heading
    content: Saying 10
  '9':
  - type: text
    content: Do not speak to fools,
  - type: text
    content: for they will scorn your prudent words.
  - type: heading
    content: Saying 11
