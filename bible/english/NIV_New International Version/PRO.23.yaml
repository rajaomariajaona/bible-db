document_id: PRO.23
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 7
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When you sit to dine with a ruler,
- type: usfm
  marker: q2
  children:
  - type: text
    text: note well what
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who
    marker-yv: yv-n
  - type: text
    text: ' is before you,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and put a knife to your throat
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you are given to gluttony.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Do not crave his delicacies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for that food is deceptive.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 8
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Do not wear yourself out to get rich;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not trust your own cleverness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Cast but a glance at riches, and they are gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they will surely sprout wings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fly off to the sky like an eagle.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 9
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Do not eat the food of a begrudging host,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not crave his delicacies;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: for he is the kind of person
- type: usfm
  marker: q2
  children:
  - type: text
    text: who is always thinking about the cost.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: for as he thinks within himself, / so he is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: for as he puts on a feast, / so he is
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Eat and drink,” he says to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but his heart is not with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You will vomit up the little you have eaten
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will have wasted your compliments.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 10
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Do not speak to fools,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they will scorn your prudent words.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 11
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Do not move an ancient boundary stone
- type: usfm
  marker: q2
  children:
  - type: text
    text: or encroach on the fields of the fatherless,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: for their Defender is strong;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will take up their case against you.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 12
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Apply your heart to instruction
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your ears to words of knowledge.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 13
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Do not withhold discipline from a child;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you punish them with the rod, they will not die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Punish them with the rod
- type: usfm
  marker: q2
  children:
  - type: text
    text: and save them from death.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 14
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My son, if your heart is wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then my heart will be glad indeed;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: my inmost being will rejoice
- type: usfm
  marker: q2
  children:
  - type: text
    text: when your lips speak what is right.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 15
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Do not let your heart envy sinners,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but always be zealous for the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: There is surely a future hope for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your hope will not be cut off.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 16
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Listen, my son, and be wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and set your heart on the right path:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Do not join those who drink too much wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: or gorge themselves on meat,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: for drunkards and gluttons become poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drowsiness clothes them in rags.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 17
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Listen to your father, who gave you life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not despise your mother when she is old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Buy the truth and do not sell it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: wisdom, instruction and insight as well.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The father of a righteous child has great joy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a man who fathers a wise son rejoices in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: May your father and mother rejoice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may she who gave you birth be joyful!
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 18
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: My son, give me your heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let your eyes delight in my ways,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: for an adulterous woman is a deep pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a wayward wife is a narrow well.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Like a bandit she lies in wait
- type: usfm
  marker: q2
  children:
  - type: text
    text: and multiplies the unfaithful among men.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Saying 19
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Who has woe? Who has sorrow?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has strife? Who has complaints?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has needless bruises? Who has bloodshot eyes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Those who linger over wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who go to sample bowls of mixed wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Do not gaze at wine when it is red,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when it sparkles in the cup,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when it goes down smoothly!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: In the end it bites like a snake
- type: usfm
  marker: q2
  children:
  - type: text
    text: and poisons like a viper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Your eyes will see strange sights,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your mind will imagine confusing things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: You will be like one sleeping on the high seas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lying on top of the rigging.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “They hit me,” you will say, “but I’m not hurt!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They beat me, but I don’t feel it!
- type: usfm
  marker: q1
  children:
  - type: text
    text: When will I wake up
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I can find another drink?”
