document_id: PSA.109
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 109
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. Of David. A psalm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My God, whom I praise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not remain silent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: for people who are wicked and deceitful
- type: usfm
  marker: q2
  children:
  - type: text
    text: have opened their mouths against me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have spoken against me with lying tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: With words of hatred they surround me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they attack me without cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In return for my friendship they accuse me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I am a man of prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They repay me evil for good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hatred for my friendship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Appoint someone evil to oppose my enemy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let an accuser stand at his right hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When he is tried, let him be found guilty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and may his prayers condemn him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: May his days be few;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may another take his place of leadership.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: May his children be fatherless
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his wife a widow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: May his children be wandering beggars;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may they be driven
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '109:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sought
    marker-yv: yv-n
  - type: text
    text: ' from their ruined homes.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: May a creditor seize all he has;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may strangers plunder the fruits of his labor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: May no one extend kindness to him
- type: usfm
  marker: q2
  children:
  - type: text
    text: or take pity on his fatherless children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: May his descendants be cut off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their names blotted out from the next generation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'May the iniquity of his fathers be remembered before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may the sin of his mother never be blotted out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'May their sins always remain before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: that he may blot out their name from the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For he never thought of doing a kindness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but hounded to death the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the needy and the brokenhearted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He loved to pronounce a curse—
- type: usfm
  marker: q2
  children:
  - type: text
    text: may it come back on him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He found no pleasure in blessing—
- type: usfm
  marker: q2
  children:
  - type: text
    text: may it be far from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He wore cursing as his garment;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it entered into his body like water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: into his bones like oil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: May it be like a cloak wrapped about him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a belt tied forever around him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'May this be the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s payment to my accusers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who speak evil of me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But you, Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: help me for your name’s sake;
- type: usfm
  marker: q2
  children:
  - type: text
    text: out of the goodness of your love, deliver me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For I am poor and needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my heart is wounded within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I fade away like an evening shadow;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am shaken off like a locust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: My knees give way from fasting;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my body is thin and gaunt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I am an object of scorn to my accusers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they see me, they shake their heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Help me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: save me according to your unfailing love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Let them know that it is your hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have done it.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: While they curse, may you bless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may those who attack me be put to shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but may your servant rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: May my accusers be clothed with disgrace
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wrapped in shame as in a cloak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'With my mouth I will greatly extol the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the great throng of worshipers I will praise him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For he stands at the right hand of the needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to save their lives from those who would condemn them.
