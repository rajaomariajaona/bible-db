document_id: PSA.109,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 109
  - type: text
    content: For the director of music. Of David. A psalm.
  - type: text
    content: My God, whom I praise,
  - type: text
    content: do not remain silent,
  '10':
  - type: text
    content: May his children be wandering beggars;
  - type: text
    content: may they be driven
  - type: note
    content: Septuagint; Hebrew sought
  - type: text
    content: ' from their ruined homes.'
  '11':
  - type: text
    content: May a creditor seize all he has;
  - type: text
    content: may strangers plunder the fruits of his labor.
  '12':
  - type: text
    content: May no one extend kindness to him
  - type: text
    content: or take pity on his fatherless children.
  '13':
  - type: text
    content: May his descendants be cut off,
  - type: text
    content: their names blotted out from the next generation.
  '14':
  - type: text
    content: 'May the iniquity of his fathers be remembered before the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: may the sin of his mother never be blotted out.
  '15':
  - type: text
    content: 'May their sins always remain before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: that he may blot out their name from the earth.
  '16':
  - type: text
    content: For he never thought of doing a kindness,
  - type: text
    content: but hounded to death the poor
  - type: text
    content: and the needy and the brokenhearted.
  '17':
  - type: text
    content: He loved to pronounce a curse—
  - type: text
    content: may it come back on him.
  - type: text
    content: He found no pleasure in blessing—
  - type: text
    content: may it be far from him.
  '18':
  - type: text
    content: He wore cursing as his garment;
  - type: text
    content: it entered into his body like water,
  - type: text
    content: into his bones like oil.
  '19':
  - type: text
    content: May it be like a cloak wrapped about him,
  - type: text
    content: like a belt tied forever around him.
  '2':
  - type: text
    content: for people who are wicked and deceitful
  - type: text
    content: have opened their mouths against me;
  - type: text
    content: they have spoken against me with lying tongues.
  '20':
  - type: text
    content: 'May this be the '
  - type: text
    content: Lord
  - type: text
    content: ’s payment to my accusers,
  - type: text
    content: to those who speak evil of me.
  '21':
  - type: text
    content: 'But you, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: help me for your name’s sake;
  - type: text
    content: out of the goodness of your love, deliver me.
  '22':
  - type: text
    content: For I am poor and needy,
  - type: text
    content: and my heart is wounded within me.
  '23':
  - type: text
    content: I fade away like an evening shadow;
  - type: text
    content: I am shaken off like a locust.
  '24':
  - type: text
    content: My knees give way from fasting;
  - type: text
    content: my body is thin and gaunt.
  '25':
  - type: text
    content: I am an object of scorn to my accusers;
  - type: text
    content: when they see me, they shake their heads.
  '26':
  - type: text
    content: 'Help me, '
  - type: text
    content: Lord
  - type: text
    content: ' my God;'
  - type: text
    content: save me according to your unfailing love.
  '27':
  - type: text
    content: Let them know that it is your hand,
  - type: text
    content: 'that you, '
  - type: text
    content: Lord
  - type: text
    content: ', have done it.'
  '28':
  - type: text
    content: While they curse, may you bless;
  - type: text
    content: may those who attack me be put to shame,
  - type: text
    content: but may your servant rejoice.
  '29':
  - type: text
    content: May my accusers be clothed with disgrace
  - type: text
    content: and wrapped in shame as in a cloak.
  '3':
  - type: text
    content: With words of hatred they surround me;
  - type: text
    content: they attack me without cause.
  '30':
  - type: text
    content: 'With my mouth I will greatly extol the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: in the great throng of worshipers I will praise him.
  '31':
  - type: text
    content: For he stands at the right hand of the needy,
  - type: text
    content: to save their lives from those who would condemn them.
  '4':
  - type: text
    content: In return for my friendship they accuse me,
  - type: text
    content: but I am a man of prayer.
  '5':
  - type: text
    content: They repay me evil for good,
  - type: text
    content: and hatred for my friendship.
  '6':
  - type: text
    content: Appoint someone evil to oppose my enemy;
  - type: text
    content: let an accuser stand at his right hand.
  '7':
  - type: text
    content: When he is tried, let him be found guilty,
  - type: text
    content: and may his prayers condemn him.
  '8':
  - type: text
    content: May his days be few;
  - type: text
    content: may another take his place of leadership.
  '9':
  - type: text
    content: May his children be fatherless
  - type: text
    content: and his wife a widow.
