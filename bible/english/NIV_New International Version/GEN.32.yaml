document_id: GEN.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob Prepares to Meet Esau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 32:1-32 is numbered 32:2-33.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jacob also went on his way, and the angels of God met him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When Jacob saw them, he said, “This is the camp of God!” So he named that place Mahanaim.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mahanaim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: two camps.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jacob sent messengers ahead of him to his brother Esau in the land of Seir, the country of Edom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He instructed them: “This is what you are to say to my lord Esau: ‘Your servant Jacob says, I have been staying with Laban and have remained there till now. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I have cattle and donkeys, sheep and goats, male and female servants. Now I am sending this message to my lord, that I may find favor in your eyes.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When the messengers returned to Jacob, they said, “We went to your brother Esau, and now he is coming to meet you, and four hundred men are with him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In great fear and distress Jacob divided the people who were with him into two groups,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: camps
    marker-yv: yv-n
  - type: text
    text: ' and the flocks and herds and camels as well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He thought, “If Esau comes and attacks one group,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: camp
    marker-yv: yv-n
  - type: text
    text: ' the group'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: camp
    marker-yv: yv-n
  - type: text
    text: ' that is left may escape.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Jacob prayed, “O God of my father Abraham, God of my father Isaac, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you who said to me, ‘Go back to your country and your relatives, and I will make you prosper,’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'I am unworthy of all the kindness and faithfulness you have shown your servant. I had only my staff when I crossed this Jordan, but now I have become two camps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Save me, I pray, from the hand of my brother Esau, for I am afraid he will come and attack me, and also the mothers with their children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But you have said, ‘I will surely make you prosper and will make your descendants like the sand of the sea, which cannot be counted.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He spent the night there, and from what he had with him he selected a gift for his brother Esau: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'two hundred female goats and twenty male goats, two hundred ewes and twenty rams, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'thirty female camels with their young, forty cows and ten bulls, and twenty female donkeys and ten male donkeys. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He put them in the care of his servants, each herd by itself, and said to his servants, “Go ahead of me, and keep some space between the herds.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He instructed the one in the lead: “When my brother Esau meets you and asks, ‘Who do you belong to, and where are you going, and who owns all these animals in front of you?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: then you are to say, ‘They belong to your servant Jacob. They are a gift sent to my lord Esau, and he is coming behind us.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He also instructed the second, the third and all the others who followed the herds: “You are to say the same thing to Esau when you meet him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And be sure to say, ‘Your servant Jacob is coming behind us.’ ” For he thought, “I will pacify him with these gifts I am sending on ahead; later, when I see him, perhaps he will receive me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So Jacob’s gifts went on ahead of him, but he himself spent the night in the camp.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob Wrestles With God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'That night Jacob got up and took his two wives, his two female servants and his eleven sons and crossed the ford of the Jabbok. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After he had sent them across the stream, he sent over all his possessions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Jacob was left alone, and a man wrestled with him till daybreak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When the man saw that he could not overpower him, he touched the socket of Jacob’s hip so that his hip was wrenched as he wrestled with the man. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then the man said, “Let me go, for it is daybreak.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But Jacob replied, “I will not let you go unless you bless me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The man asked him, “What is your name?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Jacob,” he answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then the man said, “Your name will no longer be Jacob, but Israel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Israel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'probably means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he struggles with God.
    marker-yv: yv-n
  - type: text
    text: ' because you have struggled with God and with humans and have overcome.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Jacob said, “Please tell me your name.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But he replied, “Why do you ask my name?” Then he blessed him there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So Jacob called the place Peniel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Peniel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: face of God.
    marker-yv: yv-n
  - type: text
    text: ' saying, “It is because I saw God face to face, and yet my life was spared.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The sun rose above him as he passed Peniel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Penuel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Peniel
    marker-yv: yv-n
  - type: text
    text: ' and he was limping because of his hip. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Therefore to this day the Israelites do not eat the tendon attached to the socket of the hip, because the socket of Jacob’s hip was touched near the tendon.
