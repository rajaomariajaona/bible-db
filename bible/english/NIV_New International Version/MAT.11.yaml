document_id: MAT.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and John the Baptist
  - type: text
    content: After Jesus had finished instructing his twelve disciples, he went on from there to teach and preach in the towns of Galilee.
  - type: note
    content: Greek in their towns
  '10':
  - type: text
    content: 'This is the one about whom it is written:'
  - type: text
    content: “ ‘I will send my messenger ahead of you,
  - type: text
    content: who will prepare your way before you.’
  - type: note
    content: Mal. 3:1
  '11':
  - type: text
    content: ' '
  - type: text
    content: Truly I tell you, among those born of women there has not risen anyone greater than John the Baptist; yet whoever is least in the kingdom of heaven is greater than he.
  - type: text
    content: ' '
  '12':
  - type: text
    content: From the days of John the Baptist until now, the kingdom of heaven has been subjected to violence,
  - type: note
    content: Or been forcefully advancing
  - type: text
    content: ' '
  - type: text
    content: and violent people have been raiding it.
  - type: text
    content: ' '
  '13':
  - type: text
    content: For all the Prophets and the Law prophesied until John.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And if you are willing to accept it, he is the Elijah who was to come.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Whoever has ears, let them hear.
  '16':
  - type: text
    content: ' '
  - type: text
    content: '“To what can I compare this generation? They are like children sitting in the marketplaces and calling out to others:'
  '17':
  - type: text
    content: ' '
  - type: text
    content: “ ‘We played the pipe for you,
  - type: text
    content: and you did not dance;
  - type: text
    content: we sang a dirge,
  - type: text
    content: and you did not mourn.’
  '18':
  - type: text
    content: ' '
  - type: text
    content: For John came neither eating nor drinking, and they say, ‘He has a demon.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: The Son of Man came eating and drinking, and they say, ‘Here is a glutton and a drunkard, a friend of tax collectors and sinners.’ But wisdom is proved right by her deeds.”
  - type: heading
    content: Woe on Unrepentant Towns
  '2':
  - type: text
    content: 'When John, who was in prison, heard about the deeds of the Messiah, he sent his disciples '
  '20':
  - type: text
    content: 'Then Jesus began to denounce the towns in which most of his miracles had been performed, because they did not repent. '
  '21':
  - type: text
    content: “Woe to you, Chorazin! Woe to you, Bethsaida! For if the miracles that were performed in you had been performed in Tyre and Sidon, they would have repented long ago in sackcloth and ashes.
  - type: text
    content: ' '
  '22':
  - type: text
    content: But I tell you, it will be more bearable for Tyre and Sidon on the day of judgment than for you.
  - type: text
    content: ' '
  '23':
  - type: text
    content: And you, Capernaum, will you be lifted to the heavens? No, you will go down to Hades.
  - type: note
    content: That is, the realm of the dead
  - type: text
    content: ' '
  - type: text
    content: For if the miracles that were performed in you had been performed in Sodom, it would have remained to this day.
  - type: text
    content: ' '
  '24':
  - type: text
    content: But I tell you that it will be more bearable for Sodom on the day of judgment than for you.”
  - type: heading
    content: The Father Revealed in the Son
  '25':
  - type: text
    content: 'At that time Jesus said, '
  - type: text
    content: “I praise you, Father, Lord of heaven and earth, because you have hidden these things from the wise and learned, and revealed them to little children.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Yes, Father, for this is what you were pleased to do.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “All things have been committed to me by my Father. No one knows the Son except the Father, and no one knows the Father except the Son and those to whom the Son chooses to reveal him.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “Come to me, all you who are weary and burdened, and I will give you rest.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Take my yoke upon you and learn from me, for I am gentle and humble in heart, and you will find rest for your souls.
  - type: text
    content: ' '
  '3':
  - type: text
    content: to ask him, “Are you the one who is to come, or should we expect someone else?”
  '30':
  - type: text
    content: For my yoke is easy and my burden is light.”
  '4':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: '“Go back and report to John what you hear and see:'
  - type: text
    content: ' '
  '5':
  - type: text
    content: The blind receive sight, the lame walk, those who have leprosy
  - type: note
    content: The Greek word traditionally translated leprosy was used for various diseases affecting the skin.
  - type: text
    content: ' '
  - type: text
    content: are cleansed, the deaf hear, the dead are raised, and the good news is proclaimed to the poor.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Blessed is anyone who does not stumble on account of me.”
  '7':
  - type: text
    content: 'As John’s disciples were leaving, Jesus began to speak to the crowd about John: '
  - type: text
    content: “What did you go out into the wilderness to see? A reed swayed by the wind?
  - type: text
    content: ' '
  '8':
  - type: text
    content: If not, what did you go out to see? A man dressed in fine clothes? No, those who wear fine clothes are in kings’ palaces.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Then what did you go out to see? A prophet? Yes, I tell you, and more than a prophet.
  - type: text
    content: ' '
