document_id: GAL.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Doing Good to All
  - type: text
    content: 'Brothers and sisters, if someone is caught in a sin, you who live by the Spirit should restore that person gently. But watch yourselves, or you also may be tempted. '
  '10':
  - type: text
    content: Therefore, as we have opportunity, let us do good to all people, especially to those who belong to the family of believers.
  - type: heading
    content: Not Circumcision but the New Creation
  '11':
  - type: text
    content: See what large letters I use as I write to you with my own hand!
  '12':
  - type: text
    content: 'Those who want to impress people by means of the flesh are trying to compel you to be circumcised. The only reason they do this is to avoid being persecuted for the cross of Christ. '
  '13':
  - type: text
    content: 'Not even those who are circumcised keep the law, yet they want you to be circumcised that they may boast about your circumcision in the flesh. '
  '14':
  - type: text
    content: May I never boast except in the cross of our Lord Jesus Christ, through which
  - type: note
    content: Or whom
  - type: text
    content: ' the world has been crucified to me, and I to the world. '
  '15':
  - type: text
    content: 'Neither circumcision nor uncircumcision means anything; what counts is the new creation. '
  '16':
  - type: text
    content: Peace and mercy to all who follow this rule—to
  - type: note
    content: Or rule and to
  - type: text
    content: ' the Israel of God.'
  '17':
  - type: text
    content: From now on, let no one cause me trouble, for I bear on my body the marks of Jesus.
  '18':
  - type: text
    content: The grace of our Lord Jesus Christ be with your spirit, brothers and sisters. Amen.
  '2':
  - type: text
    content: 'Carry each other’s burdens, and in this way you will fulfill the law of Christ. '
  '3':
  - type: text
    content: 'If anyone thinks they are something when they are not, they deceive themselves. '
  '4':
  - type: text
    content: 'Each one should test their own actions. Then they can take pride in themselves alone, without comparing themselves to someone else, '
  '5':
  - type: text
    content: 'for each one should carry their own load. '
  '6':
  - type: text
    content: Nevertheless, the one who receives instruction in the word should share all good things with their instructor.
  '7':
  - type: text
    content: 'Do not be deceived: God cannot be mocked. A man reaps what he sows. '
  '8':
  - type: text
    content: 'Whoever sows to please their flesh, from the flesh will reap destruction; whoever sows to please the Spirit, from the Spirit will reap eternal life. '
  '9':
  - type: text
    content: 'Let us not become weary in doing good, for at the proper time we will reap a harvest if we do not give up. '
