document_id: PSA.19
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 19
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 19:1-14 is numbered 19:2-15.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The heavens declare the glory of God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the skies proclaim the work of his hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Day after day they pour forth speech;
- type: usfm
  marker: q2
  children:
  - type: text
    text: night after night they reveal knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They have no speech, they use no words;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no sound is heard from them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Yet their voice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint, Jerome and Syriac; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: measuring line
    marker-yv: yv-n
  - type: text
    text: ' goes out into all the earth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: their words to the ends of the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the heavens God has pitched a tent for the sun.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It is like a bridegroom coming out of his chamber,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a champion rejoicing to run his course.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: It rises at one end of the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes its circuit to the other;
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing is deprived of its warmth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is perfect,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: refreshing the soul.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The statutes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are trustworthy,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: making wise the simple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The precepts of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are right,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving joy to the heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The commands of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are radiant,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving light to the eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is pure,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: enduring forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The decrees of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are firm,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all of them are righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They are more precious than gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: than much pure gold;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they are sweeter than honey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: than honey from the honeycomb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: By them your servant is warned;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in keeping them there is great reward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But who can discern their own errors?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Forgive my hidden faults.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Keep your servant also from willful sins;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may they not rule over me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I will be blameless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: innocent of great transgression.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: May these words of my mouth and this meditation of my heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: be pleasing in your sight,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my Rock and my Redeemer.'
