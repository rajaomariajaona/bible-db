document_id: PSA.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 19In Hebrew texts 19:1-14 is numbered 19:2-15.
  - type: text
    content: For the director of music. A psalm of David.
  - type: text
    content: The heavens declare the glory of God;
  - type: text
    content: the skies proclaim the work of his hands.
  '10':
  - type: text
    content: They are more precious than gold,
  - type: text
    content: than much pure gold;
  - type: text
    content: they are sweeter than honey,
  - type: text
    content: than honey from the honeycomb.
  '11':
  - type: text
    content: By them your servant is warned;
  - type: text
    content: in keeping them there is great reward.
  '12':
  - type: text
    content: But who can discern their own errors?
  - type: text
    content: Forgive my hidden faults.
  '13':
  - type: text
    content: Keep your servant also from willful sins;
  - type: text
    content: may they not rule over me.
  - type: text
    content: Then I will be blameless,
  - type: text
    content: innocent of great transgression.
  '14':
  - type: text
    content: May these words of my mouth and this meditation of my heart
  - type: text
    content: be pleasing in your sight,
  - type: text
    content: Lord
  - type: text
    content: ', my Rock and my Redeemer.'
  '2':
  - type: text
    content: Day after day they pour forth speech;
  - type: text
    content: night after night they reveal knowledge.
  '3':
  - type: text
    content: They have no speech, they use no words;
  - type: text
    content: no sound is heard from them.
  '4':
  - type: text
    content: Yet their voice
  - type: note
    content: Septuagint, Jerome and Syriac; Hebrew measuring line
  - type: text
    content: ' goes out into all the earth,'
  - type: text
    content: their words to the ends of the world.
  - type: text
    content: In the heavens God has pitched a tent for the sun.
  '5':
  - type: text
    content: It is like a bridegroom coming out of his chamber,
  - type: text
    content: like a champion rejoicing to run his course.
  '6':
  - type: text
    content: It rises at one end of the heavens
  - type: text
    content: and makes its circuit to the other;
  - type: text
    content: nothing is deprived of its warmth.
  '7':
  - type: text
    content: 'The law of the '
  - type: text
    content: Lord
  - type: text
    content: ' is perfect,'
  - type: text
    content: refreshing the soul.
  - type: text
    content: 'The statutes of the '
  - type: text
    content: Lord
  - type: text
    content: ' are trustworthy,'
  - type: text
    content: making wise the simple.
  '8':
  - type: text
    content: 'The precepts of the '
  - type: text
    content: Lord
  - type: text
    content: ' are right,'
  - type: text
    content: giving joy to the heart.
  - type: text
    content: 'The commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' are radiant,'
  - type: text
    content: giving light to the eyes.
  '9':
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is pure,'
  - type: text
    content: enduring forever.
  - type: text
    content: 'The decrees of the '
  - type: text
    content: Lord
  - type: text
    content: ' are firm,'
  - type: text
    content: and all of them are righteous.
