document_id: ISA.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Woe to David’s City
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe to you, Ariel, Ariel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the city where David settled!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Add year to year
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let your cycle of festivals go on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Yet I will besiege Ariel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she will mourn and lament,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she will be to me like an altar hearth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'altar hearth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ariel
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I will encamp against you on all sides;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will encircle you with towers
- type: usfm
  marker: q2
  children:
  - type: text
    text: and set up my siege works against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Brought low, you will speak from the ground;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your speech will mumble out of the dust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your voice will come ghostlike from the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: out of the dust your speech will whisper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But your many enemies will become like fine dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ruthless hordes like blown chaff.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Suddenly, in an instant,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty will come'
- type: usfm
  marker: q1
  children:
  - type: text
    text: with thunder and earthquake and great noise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with windstorm and tempest and flames of a devouring fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then the hordes of all the nations that fight against Ariel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that attack her and her fortress and besiege her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: will be as it is with a dream,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a vision in the night—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: as when a hungry person dreams of eating,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but awakens hungry still;
- type: usfm
  marker: q1
  children:
  - type: text
    text: as when a thirsty person dreams of drinking,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but awakens faint and thirsty still.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So will it be with the hordes of all the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: that fight against Mount Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Be stunned and amazed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blind yourselves and be sightless;
- type: usfm
  marker: q1
  children:
  - type: text
    text: be drunk, but not from wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: stagger, but not from beer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has brought over you a deep sleep:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has sealed your eyes (the prophets);
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has covered your heads (the seers).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For you this whole vision is nothing but words sealed in a scroll. And if you give the scroll to someone who can read, and say, “Read this, please,” they will answer, “I can’t; it is sealed.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Or if you give the scroll to someone who cannot read, and say, “Read this, please,” they will answer, “I don’t know how to read.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The Lord says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “These people come near to me with their mouth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and honor me with their lips,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but their hearts are far from me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their worship of me
- type: usfm
  marker: q2
  children:
  - type: text
    text: is based on merely human rules they have been taught.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: They worship me in vain; / their teachings are merely human rules
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore once more I will astound these people
- type: usfm
  marker: q2
  children:
  - type: text
    text: with wonder upon wonder;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the wisdom of the wise will perish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the intelligence of the intelligent will vanish.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Woe to those who go to great depths
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to hide their plans from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: who do their work in darkness and think,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Who sees us? Who will know?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You turn things upside down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as if the potter were thought to be like the clay!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall what is formed say to the one who formed it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “You did not make me”?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can the pot say to the potter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “You know nothing”?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: In a very short time, will not Lebanon be turned into a fertile field
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fertile field seem like a forest?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: In that day the deaf will hear the words of the scroll,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and out of gloom and darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: the eyes of the blind will see.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Once more the humble will rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the needy will rejoice in the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The ruthless will vanish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mockers will disappear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all who have an eye for evil will be cut down—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: those who with a word make someone out to be guilty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who ensnare the defender in court
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with false testimony deprive the innocent of justice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Therefore this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who redeemed Abraham, says to the descendants of Jacob:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “No longer will Jacob be ashamed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no longer will their faces grow pale.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When they see among them their children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the work of my hands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will keep my name holy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will acknowledge the holiness of the Holy One of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will stand in awe of the God of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Those who are wayward in spirit will gain understanding;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who complain will accept instruction.”
