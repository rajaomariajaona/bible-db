document_id: ISA.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to David’s City
  - type: text
    content: Woe to you, Ariel, Ariel,
  - type: text
    content: the city where David settled!
  - type: text
    content: Add year to year
  - type: text
    content: and let your cycle of festivals go on.
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has brought over you a deep sleep:'
  - type: text
    content: He has sealed your eyes (the prophets);
  - type: text
    content: he has covered your heads (the seers).
  '11':
  - type: text
    content: 'For you this whole vision is nothing but words sealed in a scroll. And if you give the scroll to someone who can read, and say, “Read this, please,” they will answer, “I can’t; it is sealed.” '
  '12':
  - type: text
    content: Or if you give the scroll to someone who cannot read, and say, “Read this, please,” they will answer, “I don’t know how to read.”
  '13':
  - type: text
    content: 'The Lord says:'
  - type: text
    content: “These people come near to me with their mouth
  - type: text
    content: and honor me with their lips,
  - type: text
    content: but their hearts are far from me.
  - type: text
    content: Their worship of me
  - type: text
    content: is based on merely human rules they have been taught.
  - type: note
    content: Hebrew; Septuagint They worship me in vain; / their teachings are merely human rules
  '14':
  - type: text
    content: Therefore once more I will astound these people
  - type: text
    content: with wonder upon wonder;
  - type: text
    content: the wisdom of the wise will perish,
  - type: text
    content: the intelligence of the intelligent will vanish.”
  '15':
  - type: text
    content: Woe to those who go to great depths
  - type: text
    content: 'to hide their plans from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who do their work in darkness and think,
  - type: text
    content: “Who sees us? Who will know?”
  '16':
  - type: text
    content: You turn things upside down,
  - type: text
    content: as if the potter were thought to be like the clay!
  - type: text
    content: Shall what is formed say to the one who formed it,
  - type: text
    content: “You did not make me”?
  - type: text
    content: Can the pot say to the potter,
  - type: text
    content: “You know nothing”?
  '17':
  - type: text
    content: In a very short time, will not Lebanon be turned into a fertile field
  - type: text
    content: and the fertile field seem like a forest?
  '18':
  - type: text
    content: In that day the deaf will hear the words of the scroll,
  - type: text
    content: and out of gloom and darkness
  - type: text
    content: the eyes of the blind will see.
  '19':
  - type: text
    content: 'Once more the humble will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: the needy will rejoice in the Holy One of Israel.
  '2':
  - type: text
    content: Yet I will besiege Ariel;
  - type: text
    content: she will mourn and lament,
  - type: text
    content: she will be to me like an altar hearth.
  - type: note
    content: The Hebrew for altar hearth sounds like the Hebrew for Ariel.
  '20':
  - type: text
    content: The ruthless will vanish,
  - type: text
    content: the mockers will disappear,
  - type: text
    content: and all who have an eye for evil will be cut down—
  '21':
  - type: text
    content: those who with a word make someone out to be guilty,
  - type: text
    content: who ensnare the defender in court
  - type: text
    content: and with false testimony deprive the innocent of justice.
  '22':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', who redeemed Abraham, says to the descendants of Jacob:'
  - type: text
    content: “No longer will Jacob be ashamed;
  - type: text
    content: no longer will their faces grow pale.
  '23':
  - type: text
    content: When they see among them their children,
  - type: text
    content: the work of my hands,
  - type: text
    content: they will keep my name holy;
  - type: text
    content: they will acknowledge the holiness of the Holy One of Jacob,
  - type: text
    content: and will stand in awe of the God of Israel.
  '24':
  - type: text
    content: Those who are wayward in spirit will gain understanding;
  - type: text
    content: those who complain will accept instruction.”
  '3':
  - type: text
    content: I will encamp against you on all sides;
  - type: text
    content: I will encircle you with towers
  - type: text
    content: and set up my siege works against you.
  '4':
  - type: text
    content: Brought low, you will speak from the ground;
  - type: text
    content: your speech will mumble out of the dust.
  - type: text
    content: Your voice will come ghostlike from the earth;
  - type: text
    content: out of the dust your speech will whisper.
  '5':
  - type: text
    content: But your many enemies will become like fine dust,
  - type: text
    content: the ruthless hordes like blown chaff.
  - type: text
    content: Suddenly, in an instant,
  '6':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will come'
  - type: text
    content: with thunder and earthquake and great noise,
  - type: text
    content: with windstorm and tempest and flames of a devouring fire.
  '7':
  - type: text
    content: Then the hordes of all the nations that fight against Ariel,
  - type: text
    content: that attack her and her fortress and besiege her,
  - type: text
    content: will be as it is with a dream,
  - type: text
    content: with a vision in the night—
  '8':
  - type: text
    content: as when a hungry person dreams of eating,
  - type: text
    content: but awakens hungry still;
  - type: text
    content: as when a thirsty person dreams of drinking,
  - type: text
    content: but awakens faint and thirsty still.
  - type: text
    content: So will it be with the hordes of all the nations
  - type: text
    content: that fight against Mount Zion.
  '9':
  - type: text
    content: Be stunned and amazed,
  - type: text
    content: blind yourselves and be sightless;
  - type: text
    content: be drunk, but not from wine,
  - type: text
    content: stagger, but not from beer.
