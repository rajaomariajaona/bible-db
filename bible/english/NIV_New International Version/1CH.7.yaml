document_id: 1CH.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Issachar
  - type: text
    content: 'The sons of Issachar:'
  - type: text
    content: Tola, Puah, Jashub and Shimron—four in all.
  '10':
  - type: text
    content: 'The son of Jediael:'
  - type: text
    content: Bilhan.
  - type: text
    content: 'The sons of Bilhan:'
  - type: text
    content: 'Jeush, Benjamin, Ehud, Kenaanah, Zethan, Tarshish and Ahishahar. '
  '11':
  - type: text
    content: All these sons of Jediael were heads of families. There were 17,200 fighting men ready to go out to war.
  '12':
  - type: text
    content: The Shuppites and Huppites were the descendants of Ir, and the Hushites
  - type: note
    content: 'Or Ir. The sons of Dan: Hushim, (see Gen. 46:23); Hebrew does not have The sons of Dan.'
  - type: text
    content: ' the descendants of Aher.'
  - type: heading
    content: Naphtali
  '13':
  - type: text
    content: 'The sons of Naphtali:'
  - type: text
    content: Jahziel, Guni, Jezer and Shillem
  - type: note
    content: Some Hebrew and Septuagint manuscripts (see also Gen. 46:24 and Num. 26:49); most Hebrew manuscripts Shallum
  - type: text
    content: —the descendants of Bilhah.
  - type: heading
    content: Manasseh
  '14':
  - type: text
    content: 'The descendants of Manasseh:'
  - type: text
    content: 'Asriel was his descendant through his Aramean concubine. She gave birth to Makir the father of Gilead. '
  '15':
  - type: text
    content: Makir took a wife from among the Huppites and Shuppites. His sister’s name was Maakah.
  - type: text
    content: Another descendant was named Zelophehad, who had only daughters.
  '16':
  - type: text
    content: Makir’s wife Maakah gave birth to a son and named him Peresh. His brother was named Sheresh, and his sons were Ulam and Rakem.
  '17':
  - type: text
    content: 'The son of Ulam:'
  - type: text
    content: Bedan.
  - type: text
    content: 'These were the sons of Gilead son of Makir, the son of Manasseh. '
  '18':
  - type: text
    content: His sister Hammoleketh gave birth to Ishhod, Abiezer and Mahlah.
  '19':
  - type: text
    content: 'The sons of Shemida were:'
  - type: text
    content: Ahian, Shechem, Likhi and Aniam.
  - type: heading
    content: Ephraim
  '2':
  - type: text
    content: 'The sons of Tola:'
  - type: text
    content: Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam and Samuel—heads of their families. During the reign of David, the descendants of Tola listed as fighting men in their genealogy numbered 22,600.
  '20':
  - type: text
    content: 'The descendants of Ephraim:'
  - type: text
    content: Shuthelah, Bered his son,
  - type: text
    content: Tahath his son, Eleadah his son,
  - type: text
    content: 'Tahath his son, '
  '21':
  - type: text
    content: Zabad his son
  - type: text
    content: and Shuthelah his son.
  - type: text
    content: 'Ezer and Elead were killed by the native-born men of Gath, when they went down to seize their livestock. '
  '22':
  - type: text
    content: 'Their father Ephraim mourned for them many days, and his relatives came to comfort him. '
  '23':
  - type: text
    content: Then he made love to his wife again, and she became pregnant and gave birth to a son. He named him Beriah,
  - type: note
    content: Beriah sounds like the Hebrew for misfortune.
  - type: text
    content: ' because there had been misfortune in his family. '
  '24':
  - type: text
    content: His daughter was Sheerah, who built Lower and Upper Beth Horon as well as Uzzen Sheerah.
  '25':
  - type: text
    content: Rephah was his son, Resheph his son,
  - type: note
    content: Some Septuagint manuscripts; Hebrew does not have his son.
  - type: text
    content: Telah his son, Tahan his son,
  '26':
  - type: text
    content: Ladan his son, Ammihud his son,
  - type: text
    content: 'Elishama his son, '
  '27':
  - type: text
    content: Nun his son
  - type: text
    content: and Joshua his son.
  '28':
  - type: text
    content: 'Their lands and settlements included Bethel and its surrounding villages, Naaran to the east, Gezer and its villages to the west, and Shechem and its villages all the way to Ayyah and its villages. '
  '29':
  - type: text
    content: Along the borders of Manasseh were Beth Shan, Taanach, Megiddo and Dor, together with their villages. The descendants of Joseph son of Israel lived in these towns.
  - type: heading
    content: Asher
  '3':
  - type: text
    content: 'The son of Uzzi:'
  - type: text
    content: Izrahiah.
  - type: text
    content: 'The sons of Izrahiah:'
  - type: text
    content: 'Michael, Obadiah, Joel and Ishiah. All five of them were chiefs. '
  '30':
  - type: text
    content: 'The sons of Asher:'
  - type: text
    content: Imnah, Ishvah, Ishvi and Beriah. Their sister was Serah.
  '31':
  - type: text
    content: 'The sons of Beriah:'
  - type: text
    content: Heber and Malkiel, who was the father of Birzaith.
  '32':
  - type: text
    content: Heber was the father of Japhlet, Shomer and Hotham and of their sister Shua.
  '33':
  - type: text
    content: 'The sons of Japhlet:'
  - type: text
    content: Pasak, Bimhal and Ashvath.
  - type: text
    content: These were Japhlet’s sons.
  '34':
  - type: text
    content: 'The sons of Shomer:'
  - type: text
    content: Ahi, Rohgah,
  - type: note
    content: 'Or of his brother Shomer: Rohgah'
  - type: text
    content: ' Hubbah and Aram.'
  '35':
  - type: text
    content: 'The sons of his brother Helem:'
  - type: text
    content: Zophah, Imna, Shelesh and Amal.
  '36':
  - type: text
    content: 'The sons of Zophah:'
  - type: text
    content: 'Suah, Harnepher, Shual, Beri, Imrah, '
  '37':
  - type: text
    content: Bezer, Hod, Shamma, Shilshah, Ithran
  - type: note
    content: Possibly a variant of Jether
  - type: text
    content: ' and Beera.'
  '38':
  - type: text
    content: 'The sons of Jether:'
  - type: text
    content: Jephunneh, Pispah and Ara.
  '39':
  - type: text
    content: 'The sons of Ulla:'
  - type: text
    content: Arah, Hanniel and Rizia.
  '4':
  - type: text
    content: According to their family genealogy, they had 36,000 men ready for battle, for they had many wives and children.
  '40':
  - type: text
    content: All these were descendants of Asher—heads of families, choice men, brave warriors and outstanding leaders. The number of men ready for battle, as listed in their genealogy, was 26,000.
  '5':
  - type: text
    content: The relatives who were fighting men belonging to all the clans of Issachar, as listed in their genealogy, were 87,000 in all.
  - type: heading
    content: Benjamin
  '6':
  - type: text
    content: 'Three sons of Benjamin:'
  - type: text
    content: Bela, Beker and Jediael.
  '7':
  - type: text
    content: 'The sons of Bela:'
  - type: text
    content: Ezbon, Uzzi, Uzziel, Jerimoth and Iri, heads of families—five in all. Their genealogical record listed 22,034 fighting men.
  '8':
  - type: text
    content: 'The sons of Beker:'
  - type: text
    content: 'Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth, Abijah, Anathoth and Alemeth. All these were the sons of Beker. '
  '9':
  - type: text
    content: Their genealogical record listed the heads of families and 20,200 fighting men.
