document_id: 1CH.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Issachar
    marker-yv: yv-h
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Issachar:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Tola, Puah, Jashub and Shimron—four in all.
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The son of Jediael:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Bilhan.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Bilhan:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Jeush, Benjamin, Ehud, Kenaanah, Zethan, Tarshish and Ahishahar. '
  '11':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: All these sons of Jediael were heads of families. There were 17,200 fighting men ready to go out to war.
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The Shuppites and Huppites were the descendants of Ir, and the Hushites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ir. The sons of Dan: Hushim, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(see Gen. 46:23); Hebrew does not have '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The sons of Dan.
      marker-yv: yv-n
    - type: text
      text: ' the descendants of Aher.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naphtali
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Naphtali:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jahziel, Guni, Jezer and Shillem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew and Septuagint manuscripts (see also Gen. 46:24 and Num. 26:49); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shallum
      marker-yv: yv-n
    - type: text
      text: —the descendants of Bilhah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Manasseh
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Manasseh:'
  - type: usfm
    marker: pi2
    children:
    - type: text
      text: 'Asriel was his descendant through his Aramean concubine. She gave birth to Makir the father of Gilead. '
  '15':
  - type: usfm
    marker: pi2
    children:
    - type: text
      text: Makir took a wife from among the Huppites and Shuppites. His sister’s name was Maakah.
  - type: usfm
    marker: pi2
    children:
    - type: text
      text: Another descendant was named Zelophehad, who had only daughters.
  '16':
  - type: usfm
    marker: pi2
    children:
    - type: text
      text: Makir’s wife Maakah gave birth to a son and named him Peresh. His brother was named Sheresh, and his sons were Ulam and Rakem.
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The son of Ulam:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Bedan.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These were the sons of Gilead son of Makir, the son of Manasseh. '
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: His sister Hammoleketh gave birth to Ishhod, Abiezer and Mahlah.
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Shemida were:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ahian, Shechem, Likhi and Aniam.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ephraim
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Tola:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam and Samuel—heads of their families. During the reign of David, the descendants of Tola listed as fighting men in their genealogy numbered 22,600.
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Ephraim:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shuthelah, Bered his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Tahath his son, Eleadah his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Tahath his son, '
  '21':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zabad his son
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Shuthelah his son.
  - type: usfm
    marker: pi2
    children:
    - type: text
      text: 'Ezer and Elead were killed by the native-born men of Gath, when they went down to seize their livestock. '
  '22':
  - type: usfm
    marker: pi2
    children:
    - type: text
      text: 'Their father Ephraim mourned for them many days, and his relatives came to comfort him. '
  '23':
  - type: usfm
    marker: pi2
    children:
    - type: text
      text: Then he made love to his wife again, and she became pregnant and gave birth to a son. He named him Beriah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beriah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: misfortune
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' because there had been misfortune in his family. '
  '24':
  - type: usfm
    marker: pi2
    children:
    - type: text
      text: His daughter was Sheerah, who built Lower and Upper Beth Horon as well as Uzzen Sheerah.
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Rephah was his son, Resheph his son,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts; Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: his son
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Telah his son, Tahan his son,
  '26':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ladan his son, Ammihud his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Elishama his son, '
  '27':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Nun his son
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Joshua his son.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their lands and settlements included Bethel and its surrounding villages, Naaran to the east, Gezer and its villages to the west, and Shechem and its villages all the way to Ayyah and its villages. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Along the borders of Manasseh were Beth Shan, Taanach, Megiddo and Dor, together with their villages. The descendants of Joseph son of Israel lived in these towns.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Asher
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The son of Uzzi:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Izrahiah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Izrahiah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Michael, Obadiah, Joel and Ishiah. All five of them were chiefs. '
  '30':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Asher:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Imnah, Ishvah, Ishvi and Beriah. Their sister was Serah.
  '31':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Beriah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Heber and Malkiel, who was the father of Birzaith.
  '32':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Heber was the father of Japhlet, Shomer and Hotham and of their sister Shua.
  '33':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Japhlet:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Pasak, Bimhal and Ashvath.
  - type: usfm
    marker: li4
    children:
    - type: text
      text: These were Japhlet’s sons.
  '34':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Shomer:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ahi, Rohgah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'of his brother Shomer: Rohgah'
      marker-yv: yv-n
    - type: text
      text: ' Hubbah and Aram.'
  '35':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of his brother Helem:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zophah, Imna, Shelesh and Amal.
  '36':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Zophah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Suah, Harnepher, Shual, Beri, Imrah, '
  '37':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Bezer, Hod, Shamma, Shilshah, Ithran
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Possibly a variant of '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jether
      marker-yv: yv-n
    - type: text
      text: ' and Beera.'
  '38':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Jether:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jephunneh, Pispah and Ara.
  '39':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Ulla:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Arah, Hanniel and Rizia.
  '4':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: According to their family genealogy, they had 36,000 men ready for battle, for they had many wives and children.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All these were descendants of Asher—heads of families, choice men, brave warriors and outstanding leaders. The number of men ready for battle, as listed in their genealogy, was 26,000.
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The relatives who were fighting men belonging to all the clans of Issachar, as listed in their genealogy, were 87,000 in all.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Benjamin
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Three sons of Benjamin:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Bela, Beker and Jediael.
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Bela:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ezbon, Uzzi, Uzziel, Jerimoth and Iri, heads of families—five in all. Their genealogical record listed 22,034 fighting men.
  '8':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Beker:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth, Abijah, Anathoth and Alemeth. All these were the sons of Beker. '
  '9':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Their genealogical record listed the heads of families and 20,200 fighting men.
