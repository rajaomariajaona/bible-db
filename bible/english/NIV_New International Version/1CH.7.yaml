document_id: 1CH.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Issachar
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The sons of Issachar:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Tola, Puah, Jashub and Shimron—four in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The sons of Tola:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Uzzi, Rephaiah, Jeriel, Jahmai, Ibsam and Samuel—heads of their families. During the reign of David, the descendants of Tola listed as fighting men in their genealogy numbered 22,600.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The son of Uzzi:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Izrahiah.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The sons of Izrahiah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Michael, Obadiah, Joel and Ishiah. All five of them were chiefs. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: According to their family genealogy, they had 36,000 men ready for battle, for they had many wives and children.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The relatives who were fighting men belonging to all the clans of Issachar, as listed in their genealogy, were 87,000 in all.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Benjamin
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Three sons of Benjamin:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Bela, Beker and Jediael.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The sons of Bela:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ezbon, Uzzi, Uzziel, Jerimoth and Iri, heads of families—five in all. Their genealogical record listed 22,034 fighting men.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The sons of Beker:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Zemirah, Joash, Eliezer, Elioenai, Omri, Jeremoth, Abijah, Anathoth and Alemeth. All these were the sons of Beker. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Their genealogical record listed the heads of families and 20,200 fighting men.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The son of Jediael:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Bilhan.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The sons of Bilhan:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Jeush, Benjamin, Ehud, Kenaanah, Zethan, Tarshish and Ahishahar. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: All these sons of Jediael were heads of families. There were 17,200 fighting men ready to go out to war.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The Shuppites and Huppites were the descendants of Ir, and the Hushites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ir. The sons of Dan: Hushim, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(see Gen. 46:23); Hebrew does not have '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The sons of Dan.
    marker-yv: yv-n
  - type: text
    text: ' the descendants of Aher.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naphtali
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Naphtali:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jahziel, Guni, Jezer and Shillem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew and Septuagint manuscripts (see also Gen. 46:24 and Num. 26:49); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shallum
    marker-yv: yv-n
  - type: text
    text: —the descendants of Bilhah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manasseh
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The descendants of Manasseh:'
- type: usfm
  marker: pi2
  children:
  - type: text
    text: 'Asriel was his descendant through his Aramean concubine. She gave birth to Makir the father of Gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Makir took a wife from among the Huppites and Shuppites. His sister’s name was Maakah.
- type: usfm
  marker: pi2
  children:
  - type: text
    text: Another descendant was named Zelophehad, who had only daughters.
- type: usfm
  marker: pi2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Makir’s wife Maakah gave birth to a son and named him Peresh. His brother was named Sheresh, and his sons were Ulam and Rakem.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The son of Ulam:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Bedan.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'These were the sons of Gilead son of Makir, the son of Manasseh. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: His sister Hammoleketh gave birth to Ishhod, Abiezer and Mahlah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Shemida were:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ahian, Shechem, Likhi and Aniam.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ephraim
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The descendants of Ephraim:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shuthelah, Bered his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Tahath his son, Eleadah his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Tahath his son, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Zabad his son
- type: usfm
  marker: li2
  children:
  - type: text
    text: and Shuthelah his son.
- type: usfm
  marker: pi2
  children:
  - type: text
    text: 'Ezer and Elead were killed by the native-born men of Gath, when they went down to seize their livestock. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Their father Ephraim mourned for them many days, and his relatives came to comfort him. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then he made love to his wife again, and she became pregnant and gave birth to a son. He named him Beriah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beriah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: misfortune
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' because there had been misfortune in his family. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: His daughter was Sheerah, who built Lower and Upper Beth Horon as well as Uzzen Sheerah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Rephah was his son, Resheph his son,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts; Hebrew does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: his son
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: li2
  children:
  - type: text
    text: Telah his son, Tahan his son,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ladan his son, Ammihud his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Elishama his son, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nun his son
- type: usfm
  marker: li2
  children:
  - type: text
    text: and Joshua his son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Their lands and settlements included Bethel and its surrounding villages, Naaran to the east, Gezer and its villages to the west, and Shechem and its villages all the way to Ayyah and its villages. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Along the borders of Manasseh were Beth Shan, Taanach, Megiddo and Dor, together with their villages. The descendants of Joseph son of Israel lived in these towns.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Asher
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The sons of Asher:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Imnah, Ishvah, Ishvi and Beriah. Their sister was Serah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The sons of Beriah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Heber and Malkiel, who was the father of Birzaith.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Heber was the father of Japhlet, Shomer and Hotham and of their sister Shua.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The sons of Japhlet:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Pasak, Bimhal and Ashvath.
- type: usfm
  marker: li4
  children:
  - type: text
    text: These were Japhlet’s sons.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The sons of Shomer:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ahi, Rohgah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of his brother Shomer: Rohgah'
    marker-yv: yv-n
  - type: text
    text: ' Hubbah and Aram.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The sons of his brother Helem:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zophah, Imna, Shelesh and Amal.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The sons of Zophah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Suah, Harnepher, Shual, Beri, Imrah, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Bezer, Hod, Shamma, Shilshah, Ithran
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Possibly a variant of '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jether
    marker-yv: yv-n
  - type: text
    text: ' and Beera.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The sons of Jether:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jephunneh, Pispah and Ara.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'The sons of Ulla:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Arah, Hanniel and Rizia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: All these were descendants of Asher—heads of families, choice men, brave warriors and outstanding leaders. The number of men ready for battle, as listed in their genealogy, was 26,000.
