document_id: 1KI.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah and Obadiah
  - type: text
    content: 'After a long time, in the third year, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Elijah: “Go and present yourself to Ahab, and I will send rain on the land.” '
  '10':
  - type: text
    content: 'As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God lives, there is not a nation or kingdom where my master has not sent someone to look for you. And whenever a nation or kingdom claimed you were not there, he made them swear they could not find you. '
  '11':
  - type: text
    content: 'But now you tell me to go to my master and say, ‘Elijah is here.’ '
  '12':
  - type: text
    content: 'I don’t know where the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' may carry you when I leave you. If I go and tell Ahab and he doesn’t find you, he will kill me. Yet I your servant have worshiped the '
  - type: text
    content: Lord
  - type: text
    content: ' since my youth. '
  '13':
  - type: text
    content: 'Haven’t you heard, my lord, what I did while Jezebel was killing the prophets of the '
  - type: text
    content: Lord
  - type: text
    content: '? I hid a hundred of the '
  - type: text
    content: Lord
  - type: text
    content: '’s prophets in two caves, fifty in each, and supplied them with food and water. '
  '14':
  - type: text
    content: And now you tell me to go to my master and say, ‘Elijah is here.’ He will kill me!”
  '15':
  - type: text
    content: 'Elijah said, “As the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty lives, whom I serve, I will surely present myself to Ahab today.”'
  - type: heading
    content: Elijah on Mount Carmel
  '16':
  - type: text
    content: 'So Obadiah went to meet Ahab and told him, and Ahab went to meet Elijah. '
  '17':
  - type: text
    content: When he saw Elijah, he said to him, “Is that you, you troubler of Israel?”
  '18':
  - type: text
    content: '“I have not made trouble for Israel,” Elijah replied. “But you and your father’s family have. You have abandoned the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands and have followed the Baals. '
  '19':
  - type: text
    content: Now summon the people from all over Israel to meet me on Mount Carmel. And bring the four hundred and fifty prophets of Baal and the four hundred prophets of Asherah, who eat at Jezebel’s table.”
  '2':
  - type: text
    content: So Elijah went to present himself to Ahab.
  - type: text
    content: 'Now the famine was severe in Samaria, '
  '20':
  - type: text
    content: 'So Ahab sent word throughout all Israel and assembled the prophets on Mount Carmel. '
  '21':
  - type: text
    content: 'Elijah went before the people and said, “How long will you waver between two opinions? If the '
  - type: text
    content: Lord
  - type: text
    content: ' is God, follow him; but if Baal is God, follow him.”'
  - type: text
    content: But the people said nothing.
  '22':
  - type: text
    content: 'Then Elijah said to them, “I am the only one of the '
  - type: text
    content: Lord
  - type: text
    content: '’s prophets left, but Baal has four hundred and fifty prophets. '
  '23':
  - type: text
    content: 'Get two bulls for us. Let Baal’s prophets choose one for themselves, and let them cut it into pieces and put it on the wood but not set fire to it. I will prepare the other bull and put it on the wood but not set fire to it. '
  '24':
  - type: text
    content: 'Then you call on the name of your god, and I will call on the name of the '
  - type: text
    content: Lord
  - type: text
    content: . The god who answers by fire—he is God.”
  - type: text
    content: Then all the people said, “What you say is good.”
  '25':
  - type: text
    content: 'Elijah said to the prophets of Baal, “Choose one of the bulls and prepare it first, since there are so many of you. Call on the name of your god, but do not light the fire.” '
  '26':
  - type: text
    content: So they took the bull given them and prepared it.
  - type: text
    content: Then they called on the name of Baal from morning till noon. “Baal, answer us!” they shouted. But there was no response; no one answered. And they danced around the altar they had made.
  '27':
  - type: text
    content: 'At noon Elijah began to taunt them. “Shout louder!” he said. “Surely he is a god! Perhaps he is deep in thought, or busy, or traveling. Maybe he is sleeping and must be awakened.” '
  '28':
  - type: text
    content: 'So they shouted louder and slashed themselves with swords and spears, as was their custom, until their blood flowed. '
  '29':
  - type: text
    content: Midday passed, and they continued their frantic prophesying until the time for the evening sacrifice. But there was no response, no one answered, no one paid attention.
  '3':
  - type: text
    content: 'and Ahab had summoned Obadiah, his palace administrator. (Obadiah was a devout believer in the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Then Elijah said to all the people, “Come here to me.” They came to him, and he repaired the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ', which had been torn down. '
  '31':
  - type: text
    content: 'Elijah took twelve stones, one for each of the tribes descended from Jacob, to whom the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' had come, saying, “Your name shall be Israel.” '
  '32':
  - type: text
    content: 'With the stones he built an altar in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he dug a trench around it large enough to hold two seahs'
  - type: note
    content: That is, probably about 24 pounds or about 11 kilograms
  - type: text
    content: ' of seed. '
  '33':
  - type: text
    content: He arranged the wood, cut the bull into pieces and laid it on the wood. Then he said to them, “Fill four large jars with water and pour it on the offering and on the wood.”
  '34':
  - type: text
    content: “Do it again,” he said, and they did it again.
  - type: text
    content: '“Do it a third time,” he ordered, and they did it the third time. '
  '35':
  - type: text
    content: The water ran down around the altar and even filled the trench.
  '36':
  - type: text
    content: 'At the time of sacrifice, the prophet Elijah stepped forward and prayed: “'
  - type: text
    content: Lord
  - type: text
    content: ', the God of Abraham, Isaac and Israel, let it be known today that you are God in Israel and that I am your servant and have done all these things at your command. '
  '37':
  - type: text
    content: 'Answer me, '
  - type: text
    content: Lord
  - type: text
    content: ', answer me, so these people will know that you, '
  - type: text
    content: Lord
  - type: text
    content: ', are God, and that you are turning their hearts back again.”'
  '38':
  - type: text
    content: 'Then the fire of the '
  - type: text
    content: Lord
  - type: text
    content: ' fell and burned up the sacrifice, the wood, the stones and the soil, and also licked up the water in the trench.'
  '39':
  - type: text
    content: 'When all the people saw this, they fell prostrate and cried, “The '
  - type: text
    content: Lord
  - type: text
    content: '—he is God! The '
  - type: text
    content: Lord
  - type: text
    content: —he is God!”
  '4':
  - type: text
    content: 'While Jezebel was killing off the '
  - type: text
    content: Lord
  - type: text
    content: '’s prophets, Obadiah had taken a hundred prophets and hidden them in two caves, fifty in each, and had supplied them with food and water.) '
  '40':
  - type: text
    content: Then Elijah commanded them, “Seize the prophets of Baal. Don’t let anyone get away!” They seized them, and Elijah had them brought down to the Kishon Valley and slaughtered there.
  '41':
  - type: text
    content: 'And Elijah said to Ahab, “Go, eat and drink, for there is the sound of a heavy rain.” '
  '42':
  - type: text
    content: So Ahab went off to eat and drink, but Elijah climbed to the top of Carmel, bent down to the ground and put his face between his knees.
  '43':
  - type: text
    content: “Go and look toward the sea,” he told his servant. And he went up and looked.
  - type: text
    content: “There is nothing there,” he said.
  - type: text
    content: Seven times Elijah said, “Go back.”
  '44':
  - type: text
    content: The seventh time the servant reported, “A cloud as small as a man’s hand is rising from the sea.”
  - type: text
    content: So Elijah said, “Go and tell Ahab, ‘Hitch up your chariot and go down before the rain stops you.’ ”
  '45':
  - type: text
    content: 'Meanwhile, the sky grew black with clouds, the wind rose, a heavy rain started falling and Ahab rode off to Jezreel. '
  '46':
  - type: text
    content: 'The power of the '
  - type: text
    content: Lord
  - type: text
    content: ' came on Elijah and, tucking his cloak into his belt, he ran ahead of Ahab all the way to Jezreel.'
  '5':
  - type: text
    content: 'Ahab had said to Obadiah, “Go through the land to all the springs and valleys. Maybe we can find some grass to keep the horses and mules alive so we will not have to kill any of our animals.” '
  '6':
  - type: text
    content: So they divided the land they were to cover, Ahab going in one direction and Obadiah in another.
  '7':
  - type: text
    content: As Obadiah was walking along, Elijah met him. Obadiah recognized him, bowed down to the ground, and said, “Is it really you, my lord Elijah?”
  '8':
  - type: text
    content: “Yes,” he replied. “Go tell your master, ‘Elijah is here.’ ”
  '9':
  - type: text
    content: '“What have I done wrong,” asked Obadiah, “that you are handing your servant over to Ahab to be put to death? '
