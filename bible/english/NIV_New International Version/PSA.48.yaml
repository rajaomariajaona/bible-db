document_id: PSA.48,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 48
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 48:1-14 is numbered 48:2-15.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song. A psalm of the Sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and most worthy of praise,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the city of our God, his holy mountain.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like your name, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your praise reaches to the ends of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your right hand is filled with righteousness.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mount Zion rejoices,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the villages of Judah are glad
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of your judgments.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Walk about Zion, go around her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: count her towers,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: consider well her ramparts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: view her citadels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you may tell of them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the next generation.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For this God is our God for ever and ever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will be our guide even to the end.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beautiful in its loftiness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the joy of the whole earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the heights of Zaphon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zaphon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was the most sacred mountain of the Canaanites.
      marker-yv: yv-n
    - type: text
      text: ' is Mount Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the city of the Great King.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is in her citadels;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has shown himself to be her fortress.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the kings joined forces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they advanced together,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they saw her and were astounded;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they fled in terror.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trembling seized them there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pain like that of a woman in labor.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You destroyed them like ships of Tarshish
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shattered by an east wind.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As we have heard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so we have seen
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'in the city of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the city of our God:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God makes her secure
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forever.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Within your temple, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we meditate on your unfailing love.
