document_id: PSA.48,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 48In Hebrew texts 48:1-14 is numbered 48:2-15.
  - type: text
    content: A song. A psalm of the Sons of Korah.
  - type: text
    content: 'Great is the '
  - type: text
    content: Lord
  - type: text
    content: ', and most worthy of praise,'
  - type: text
    content: in the city of our God, his holy mountain.
  '10':
  - type: text
    content: Like your name, O God,
  - type: text
    content: your praise reaches to the ends of the earth;
  - type: text
    content: your right hand is filled with righteousness.
  '11':
  - type: text
    content: Mount Zion rejoices,
  - type: text
    content: the villages of Judah are glad
  - type: text
    content: because of your judgments.
  '12':
  - type: text
    content: Walk about Zion, go around her,
  - type: text
    content: count her towers,
  '13':
  - type: text
    content: consider well her ramparts,
  - type: text
    content: view her citadels,
  - type: text
    content: that you may tell of them
  - type: text
    content: to the next generation.
  '14':
  - type: text
    content: For this God is our God for ever and ever;
  - type: text
    content: he will be our guide even to the end.
  '2':
  - type: text
    content: Beautiful in its loftiness,
  - type: text
    content: the joy of the whole earth,
  - type: text
    content: like the heights of Zaphon
  - type: note
    content: Zaphon was the most sacred mountain of the Canaanites.
  - type: text
    content: ' is Mount Zion,'
  - type: text
    content: the city of the Great King.
  '3':
  - type: text
    content: God is in her citadels;
  - type: text
    content: he has shown himself to be her fortress.
  '4':
  - type: text
    content: When the kings joined forces,
  - type: text
    content: when they advanced together,
  '5':
  - type: text
    content: they saw her and were astounded;
  - type: text
    content: they fled in terror.
  '6':
  - type: text
    content: Trembling seized them there,
  - type: text
    content: pain like that of a woman in labor.
  '7':
  - type: text
    content: You destroyed them like ships of Tarshish
  - type: text
    content: shattered by an east wind.
  '8':
  - type: text
    content: As we have heard,
  - type: text
    content: so we have seen
  - type: text
    content: 'in the city of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: 'in the city of our God:'
  - type: text
    content: God makes her secure
  - type: text
    content: forever.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '9':
  - type: text
    content: Within your temple, O God,
  - type: text
    content: we meditate on your unfailing love.
