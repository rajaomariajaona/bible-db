document_id: 2KI.16,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahaz King of Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the seventeenth year of Pekah son of Remaliah, Ahaz son of Jotham king of Judah began to reign. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King Ahaz went to Damascus to meet Tiglath-Pileser king of Assyria. He saw an altar in Damascus and sent to Uriah the priest a sketch of the altar, with detailed plans for its construction. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Uriah the priest built an altar in accordance with all the plans that King Ahaz had sent from Damascus and finished it before King Ahaz returned. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the king came back from Damascus and saw the altar, he approached it and presented offerings
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and went up
      marker-yv: yv-n
    - type: text
      text: ' on it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He offered up his burnt offering and grain offering, poured out his drink offering, and splashed the blood of his fellowship offerings against the altar. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the bronze altar that stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he brought it from the front of the temple—from between the new altar and the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —and put it on the north side of the new altar.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Ahaz then gave these orders to Uriah the priest: “On the large new altar, offer the morning burnt offering and the evening grain offering, the king’s burnt offering and his grain offering, and the burnt offering of all the people of the land, and their grain offering and their drink offering. Splash against this altar the blood of all the burnt offerings and sacrifices. But I will use the bronze altar for seeking guidance.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Uriah the priest did just as King Ahaz had ordered.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Ahaz cut off the side panels and removed the basins from the movable stands. He removed the Sea from the bronze bulls that supported it and set it on a stone base. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He took away the Sabbath canopy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the dais of his throne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see Septuagint)
      marker-yv: yv-n
    - type: text
      text: ' that had been built at the temple and removed the royal entryway outside the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in deference to the king of Assyria.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the other events of the reign of Ahaz, and what he did, are they not written in the book of the annals of the kings of Judah? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz was twenty years old when he became king, and he reigned in Jerusalem sixteen years. Unlike David his father, he did not do what was right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahaz rested with his ancestors and was buried with them in the City of David. And Hezekiah his son succeeded him as king.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He followed the ways of the kings of Israel and even sacrificed his son in the fire, engaging in the detestable practices of the nations the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had driven out before the Israelites. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He offered sacrifices and burned incense at the high places, on the hilltops and under every spreading tree.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Rezin king of Aram and Pekah son of Remaliah king of Israel marched up to fight against Jerusalem and besieged Ahaz, but they could not overpower him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At that time, Rezin king of Aram recovered Elath for Aram by driving out the people of Judah. Edomites then moved into Elath and have lived there to this day.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz sent messengers to say to Tiglath-Pileser king of Assyria, “I am your servant and vassal. Come up and save me out of the hand of the king of Aram and of the king of Israel, who are attacking me.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahaz took the silver and gold found in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and in the treasuries of the royal palace and sent it as a gift to the king of Assyria. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king of Assyria complied by attacking Damascus and capturing it. He deported its inhabitants to Kir and put Rezin to death.
