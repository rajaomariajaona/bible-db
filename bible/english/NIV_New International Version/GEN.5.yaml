document_id: GEN.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: From Adam to Noah
  - type: text
    content: This is the written account of Adam’s family line.
  - type: text
    content: 'When God created mankind, he made them in the likeness of God. '
  '10':
  - type: text
    content: 'After he became the father of Kenan, Enosh lived 815 years and had other sons and daughters. '
  '11':
  - type: text
    content: Altogether, Enosh lived a total of 905 years, and then he died.
  '12':
  - type: text
    content: 'When Kenan had lived 70 years, he became the father of Mahalalel. '
  '13':
  - type: text
    content: 'After he became the father of Mahalalel, Kenan lived 840 years and had other sons and daughters. '
  '14':
  - type: text
    content: Altogether, Kenan lived a total of 910 years, and then he died.
  '15':
  - type: text
    content: 'When Mahalalel had lived 65 years, he became the father of Jared. '
  '16':
  - type: text
    content: 'After he became the father of Jared, Mahalalel lived 830 years and had other sons and daughters. '
  '17':
  - type: text
    content: Altogether, Mahalalel lived a total of 895 years, and then he died.
  '18':
  - type: text
    content: 'When Jared had lived 162 years, he became the father of Enoch. '
  '19':
  - type: text
    content: 'After he became the father of Enoch, Jared lived 800 years and had other sons and daughters. '
  '2':
  - type: text
    content: He created them male and female and blessed them. And he named them “Mankind”
  - type: note
    content: Hebrew adam
  - type: text
    content: ' when they were created.'
  '20':
  - type: text
    content: Altogether, Jared lived a total of 962 years, and then he died.
  '21':
  - type: text
    content: 'When Enoch had lived 65 years, he became the father of Methuselah. '
  '22':
  - type: text
    content: 'After he became the father of Methuselah, Enoch walked faithfully with God 300 years and had other sons and daughters. '
  '23':
  - type: text
    content: 'Altogether, Enoch lived a total of 365 years. '
  '24':
  - type: text
    content: Enoch walked faithfully with God; then he was no more, because God took him away.
  '25':
  - type: text
    content: 'When Methuselah had lived 187 years, he became the father of Lamech. '
  '26':
  - type: text
    content: 'After he became the father of Lamech, Methuselah lived 782 years and had other sons and daughters. '
  '27':
  - type: text
    content: Altogether, Methuselah lived a total of 969 years, and then he died.
  '28':
  - type: text
    content: 'When Lamech had lived 182 years, he had a son. '
  '29':
  - type: text
    content: He named him Noah
  - type: note
    content: Noah sounds like the Hebrew for comfort.
  - type: text
    content: ' and said, “He will comfort us in the labor and painful toil of our hands caused by the ground the '
  - type: text
    content: Lord
  - type: text
    content: ' has cursed.” '
  '3':
  - type: text
    content: 'When Adam had lived 130 years, he had a son in his own likeness, in his own image; and he named him Seth. '
  '30':
  - type: text
    content: 'After Noah was born, Lamech lived 595 years and had other sons and daughters. '
  '31':
  - type: text
    content: Altogether, Lamech lived a total of 777 years, and then he died.
  '32':
  - type: text
    content: After Noah was 500 years old, he became the father of Shem, Ham and Japheth.
  '4':
  - type: text
    content: 'After Seth was born, Adam lived 800 years and had other sons and daughters. '
  '5':
  - type: text
    content: Altogether, Adam lived a total of 930 years, and then he died.
  '6':
  - type: text
    content: When Seth had lived 105 years, he became the father
  - type: note
    content: Father may mean ancestor; also in verses 7-26.
  - type: text
    content: ' of Enosh. '
  '7':
  - type: text
    content: 'After he became the father of Enosh, Seth lived 807 years and had other sons and daughters. '
  '8':
  - type: text
    content: Altogether, Seth lived a total of 912 years, and then he died.
  '9':
  - type: text
    content: 'When Enosh had lived 90 years, he became the father of Kenan. '
