document_id: REV.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lament Over Fallen Babylon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this I saw another angel coming down from heaven. He had great authority, and the earth was illuminated by his splendor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'With a mighty voice he shouted:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Fallen! Fallen is Babylon the Great!’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 21:9
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: She has become a dwelling for demons
- type: usfm
  marker: q1
  children:
  - type: text
    text: and a haunt for every impure spirit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a haunt for every unclean bird,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a haunt for every unclean and detestable animal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For all the nations have drunk
- type: usfm
  marker: q2
  children:
  - type: text
    text: the maddening wine of her adulteries.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The kings of the earth committed adultery with her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the merchants of the earth grew rich from her excessive luxuries.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warning to Escape Babylon’s Judgment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then I heard another voice from heaven say:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Come out of her, my people,’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jer. 51:45
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that you will not share in her sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that you will not receive any of her plagues;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: for her sins are piled up to heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and God has remembered her crimes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Give back to her as she has given;
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay her back double for what she has done.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Pour her a double portion from her own cup.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Give her as much torment and grief
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the glory and luxury she gave herself.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In her heart she boasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I sit enthroned as queen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am not a widow;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Isaiah 47:7,8.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will never mourn.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore in one day her plagues will overtake her:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: death, mourning and famine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She will be consumed by fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for mighty is the Lord God who judges her.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Threefold Woe Over Babylon’s Fall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“When the kings of the earth who committed adultery with her and shared her luxury see the smoke of her burning, they will weep and mourn over her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Terrified at her torment, they will stand far off and cry:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Woe! Woe to you, great city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you mighty city of Babylon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: In one hour your doom has come!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“The merchants of the earth will weep and mourn over her because no one buys their cargoes anymore— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'cargoes of gold, silver, precious stones and pearls; fine linen, purple, silk and scarlet cloth; every sort of citron wood, and articles of every kind made of ivory, costly wood, bronze, iron and marble; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: cargoes of cinnamon and spice, of incense, myrrh and frankincense, of wine and olive oil, of fine flour and wheat; cattle and sheep; horses and carriages; and human beings sold as slaves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“They will say, ‘The fruit you longed for is gone from you. All your luxury and splendor have vanished, never to be recovered.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The merchants who sold these things and gained their wealth from her will stand far off, terrified at her torment. They will weep and mourn '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and cry out:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Woe! Woe to you, great city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dressed in fine linen, purple and scarlet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and glittering with gold, precious stones and pearls!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: In one hour such great wealth has been brought to ruin!’
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Every sea captain, and all who travel by ship, the sailors, and all who earn their living from the sea, will stand far off. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When they see the smoke of her burning, they will exclaim, ‘Was there ever a city like this great city?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They will throw dust on their heads, and with weeping and mourning cry out:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Woe! Woe to you, great city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where all who had ships on the sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: became rich through her wealth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: In one hour she has been brought to ruin!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Rejoice over her, you heavens!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rejoice, you people of God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rejoice, apostles and prophets!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For God has judged her
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the judgment she imposed on you.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Finality of Babylon’s Doom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then a mighty angel picked up a boulder the size of a large millstone and threw it into the sea, and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “With such violence
- type: usfm
  marker: q2
  children:
  - type: text
    text: the great city of Babylon will be thrown down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: never to be found again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The music of harpists and musicians, pipers and trumpeters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never be heard in you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No worker of any trade
- type: usfm
  marker: q2
  children:
  - type: text
    text: will ever be found in you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sound of a millstone
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never be heard in you again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The light of a lamp
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never shine in you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The voice of bridegroom and bride
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never be heard in you again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your merchants were the world’s important people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: By your magic spell all the nations were led astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: In her was found the blood of prophets and of God’s holy people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: of all who have been slaughtered on the earth.”
