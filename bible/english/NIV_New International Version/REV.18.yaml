document_id: REV.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Lament Over Fallen Babylon
  - type: text
    content: 'After this I saw another angel coming down from heaven. He had great authority, and the earth was illuminated by his splendor. '
  '10':
  - type: text
    content: 'Terrified at her torment, they will stand far off and cry:'
  - type: text
    content: “ ‘Woe! Woe to you, great city,
  - type: text
    content: you mighty city of Babylon!
  - type: text
    content: In one hour your doom has come!’
  '11':
  - type: text
    content: '“The merchants of the earth will weep and mourn over her because no one buys their cargoes anymore— '
  '12':
  - type: text
    content: 'cargoes of gold, silver, precious stones and pearls; fine linen, purple, silk and scarlet cloth; every sort of citron wood, and articles of every kind made of ivory, costly wood, bronze, iron and marble; '
  '13':
  - type: text
    content: cargoes of cinnamon and spice, of incense, myrrh and frankincense, of wine and olive oil, of fine flour and wheat; cattle and sheep; horses and carriages; and human beings sold as slaves.
  '14':
  - type: text
    content: '“They will say, ‘The fruit you longed for is gone from you. All your luxury and splendor have vanished, never to be recovered.’ '
  '15':
  - type: text
    content: 'The merchants who sold these things and gained their wealth from her will stand far off, terrified at her torment. They will weep and mourn '
  '16':
  - type: text
    content: 'and cry out:'
  - type: text
    content: “ ‘Woe! Woe to you, great city,
  - type: text
    content: dressed in fine linen, purple and scarlet,
  - type: text
    content: and glittering with gold, precious stones and pearls!
  '17':
  - type: text
    content: In one hour such great wealth has been brought to ruin!’
  - type: text
    content: '“Every sea captain, and all who travel by ship, the sailors, and all who earn their living from the sea, will stand far off. '
  '18':
  - type: text
    content: 'When they see the smoke of her burning, they will exclaim, ‘Was there ever a city like this great city?’ '
  '19':
  - type: text
    content: 'They will throw dust on their heads, and with weeping and mourning cry out:'
  - type: text
    content: “ ‘Woe! Woe to you, great city,
  - type: text
    content: where all who had ships on the sea
  - type: text
    content: became rich through her wealth!
  - type: text
    content: In one hour she has been brought to ruin!’
  '2':
  - type: text
    content: 'With a mighty voice he shouted:'
  - type: text
    content: “ ‘Fallen! Fallen is Babylon the Great!’
  - type: note
    content: Isaiah 21:9
  - type: text
    content: She has become a dwelling for demons
  - type: text
    content: and a haunt for every impure spirit,
  - type: text
    content: a haunt for every unclean bird,
  - type: text
    content: a haunt for every unclean and detestable animal.
  '20':
  - type: text
    content: “Rejoice over her, you heavens!
  - type: text
    content: Rejoice, you people of God!
  - type: text
    content: Rejoice, apostles and prophets!
  - type: text
    content: For God has judged her
  - type: text
    content: with the judgment she imposed on you.”
  - type: heading
    content: The Finality of Babylon’s Doom
  '21':
  - type: text
    content: 'Then a mighty angel picked up a boulder the size of a large millstone and threw it into the sea, and said:'
  - type: text
    content: “With such violence
  - type: text
    content: the great city of Babylon will be thrown down,
  - type: text
    content: never to be found again.
  '22':
  - type: text
    content: The music of harpists and musicians, pipers and trumpeters,
  - type: text
    content: will never be heard in you again.
  - type: text
    content: No worker of any trade
  - type: text
    content: will ever be found in you again.
  - type: text
    content: The sound of a millstone
  - type: text
    content: will never be heard in you again.
  '23':
  - type: text
    content: The light of a lamp
  - type: text
    content: will never shine in you again.
  - type: text
    content: The voice of bridegroom and bride
  - type: text
    content: will never be heard in you again.
  - type: text
    content: Your merchants were the world’s important people.
  - type: text
    content: By your magic spell all the nations were led astray.
  '24':
  - type: text
    content: In her was found the blood of prophets and of God’s holy people,
  - type: text
    content: of all who have been slaughtered on the earth.”
  '3':
  - type: text
    content: For all the nations have drunk
  - type: text
    content: the maddening wine of her adulteries.
  - type: text
    content: The kings of the earth committed adultery with her,
  - type: text
    content: and the merchants of the earth grew rich from her excessive luxuries.”
  - type: heading
    content: Warning to Escape Babylon’s Judgment
  '4':
  - type: text
    content: 'Then I heard another voice from heaven say:'
  - type: text
    content: “ ‘Come out of her, my people,’
  - type: note
    content: Jer. 51:45
  - type: text
    content: so that you will not share in her sins,
  - type: text
    content: so that you will not receive any of her plagues;
  '5':
  - type: text
    content: for her sins are piled up to heaven,
  - type: text
    content: and God has remembered her crimes.
  '6':
  - type: text
    content: Give back to her as she has given;
  - type: text
    content: pay her back double for what she has done.
  - type: text
    content: Pour her a double portion from her own cup.
  '7':
  - type: text
    content: Give her as much torment and grief
  - type: text
    content: as the glory and luxury she gave herself.
  - type: text
    content: In her heart she boasts,
  - type: text
    content: ‘I sit enthroned as queen.
  - type: text
    content: I am not a widow;
  - type: note
    content: See Isaiah 47:7,8.
  - type: text
    content: I will never mourn.’
  '8':
  - type: text
    content: 'Therefore in one day her plagues will overtake her:'
  - type: text
    content: death, mourning and famine.
  - type: text
    content: She will be consumed by fire,
  - type: text
    content: for mighty is the Lord God who judges her.
  - type: heading
    content: Threefold Woe Over Babylon’s Fall
  '9':
  - type: text
    content: '“When the kings of the earth who committed adultery with her and shared her luxury see the smoke of her burning, they will weep and mourn over her. '
