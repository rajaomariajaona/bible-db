document_id: MAT.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Demand for a Sign
  - type: text
    content: The Pharisees and Sadducees came to Jesus and tested him by asking him to show them a sign from heaven.
  '10':
  - type: text
    content: Or the seven loaves for the four thousand, and how many basketfuls you gathered?
  - type: text
    content: ' '
  '11':
  - type: text
    content: How is it you don’t understand that I was not talking to you about bread? But be on your guard against the yeast of the Pharisees and Sadducees.”
  - type: text
    content: ' '
  '12':
  - type: text
    content: Then they understood that he was not telling them to guard against the yeast used in bread, but against the teaching of the Pharisees and Sadducees.
  - type: heading
    content: Peter Declares That Jesus Is the Messiah
  '13':
  - type: text
    content: 'When Jesus came to the region of Caesarea Philippi, he asked his disciples, '
  - type: text
    content: “Who do people say the Son of Man is?”
  '14':
  - type: text
    content: They replied, “Some say John the Baptist; others say Elijah; and still others, Jeremiah or one of the prophets.”
  '15':
  - type: text
    content: ' '
  - type: text
    content: “But what about you?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “Who do you say I am?”
  '16':
  - type: text
    content: Simon Peter answered, “You are the Messiah, the Son of the living God.”
  '17':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Blessed are you, Simon son of Jonah, for this was not revealed to you by flesh and blood, but by my Father in heaven.
  - type: text
    content: ' '
  '18':
  - type: text
    content: And I tell you that you are Peter,
  - type: note
    content: The Greek word for Peter means rock.
  - type: text
    content: ' '
  - type: text
    content: and on this rock I will build my church, and the gates of Hades
  - type: note
    content: That is, the realm of the dead
  - type: text
    content: ' '
  - type: text
    content: will not overcome it.
  - type: text
    content: ' '
  '19':
  - type: text
    content: I will give you the keys of the kingdom of heaven; whatever you bind on earth will be
  - type: note
    content: Or will have been
  - type: text
    content: ' '
  - type: text
    content: bound in heaven, and whatever you loose on earth will be
  - type: note
    content: Or will have been
  - type: text
    content: ' '
  - type: text
    content: loosed in heaven.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He replied, '
  - type: text
    content: “When evening comes, you say, ‘It will be fair weather, for the sky is red,’
  - type: text
    content: ' '
  '20':
  - type: text
    content: Then he ordered his disciples not to tell anyone that he was the Messiah.
  - type: heading
    content: Jesus Predicts His Death
  '21':
  - type: text
    content: From that time on Jesus began to explain to his disciples that he must go to Jerusalem and suffer many things at the hands of the elders, the chief priests and the teachers of the law, and that he must be killed and on the third day be raised to life.
  '22':
  - type: text
    content: Peter took him aside and began to rebuke him. “Never, Lord!” he said. “This shall never happen to you!”
  '23':
  - type: text
    content: 'Jesus turned and said to Peter, '
  - type: text
    content: “Get behind me, Satan! You are a stumbling block to me; you do not have in mind the concerns of God, but merely human concerns.”
  '24':
  - type: text
    content: 'Then Jesus said to his disciples, '
  - type: text
    content: “Whoever wants to be my disciple must deny themselves and take up their cross and follow me.
  - type: text
    content: ' '
  '25':
  - type: text
    content: For whoever wants to save their life
  - type: note
    content: The Greek word means either life or soul; also in verse 26.
  - type: text
    content: ' '
  - type: text
    content: will lose it, but whoever loses their life for me will find it.
  - type: text
    content: ' '
  '26':
  - type: text
    content: What good will it be for someone to gain the whole world, yet forfeit their soul? Or what can anyone give in exchange for their soul?
  - type: text
    content: ' '
  '27':
  - type: text
    content: For the Son of Man is going to come in his Father’s glory with his angels, and then he will reward each person according to what they have done.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “Truly I tell you, some who are standing here will not taste death before they see the Son of Man coming in his kingdom.”
  '3':
  - type: text
    content: and in the morning, ‘Today it will be stormy, for the sky is red and overcast.’ You know how to interpret the appearance of the sky, but you cannot interpret the signs of the times.
  - type: note
    content: Some early manuscripts do not have When evening comes… of the times.
  - type: text
    content: ' '
  '4':
  - type: text
    content: A wicked and adulterous generation looks for a sign, but none will be given it except the sign of Jonah.”
  - type: text
    content: ' Jesus then left them and went away.'
  - type: heading
    content: The Yeast of the Pharisees and Sadducees
  '5':
  - type: text
    content: 'When they went across the lake, the disciples forgot to take bread. '
  '6':
  - type: text
    content: “Be careful,”
  - type: text
    content: ' Jesus said to them. '
  - type: text
    content: “Be on your guard against the yeast of the Pharisees and Sadducees.”
  '7':
  - type: text
    content: They discussed this among themselves and said, “It is because we didn’t bring any bread.”
  '8':
  - type: text
    content: 'Aware of their discussion, Jesus asked, '
  - type: text
    content: “You of little faith, why are you talking among yourselves about having no bread?
  - type: text
    content: ' '
  '9':
  - type: text
    content: Do you still not understand? Don’t you remember the five loaves for the five thousand, and how many basketfuls you gathered?
  - type: text
    content: ' '
