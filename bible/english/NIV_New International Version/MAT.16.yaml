document_id: MAT.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Demand for a Sign
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The Pharisees and Sadducees came to Jesus and tested him by asking him to show them a sign from heaven.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When evening comes, you say, ‘It will be fair weather, for the sky is red,’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and in the morning, ‘Today it will be stormy, for the sky is red and overcast.’ You know how to interpret the appearance of the sky, but you cannot interpret the signs of the times.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:2,3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts do not have '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: When evening comes… of the times.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A wicked and adulterous generation looks for a sign, but none will be given it except the sign of Jonah.”
  - type: text
    text: ' Jesus then left them and went away.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Yeast of the Pharisees and Sadducees
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When they went across the lake, the disciples forgot to take bread. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be careful,”
  - type: text
    text: ' Jesus said to them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be on your guard against the yeast of the Pharisees and Sadducees.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They discussed this among themselves and said, “It is because we didn’t bring any bread.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aware of their discussion, Jesus asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You of little faith, why are you talking among yourselves about having no bread?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do you still not understand? Don’t you remember the five loaves for the five thousand, and how many basketfuls you gathered?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or the seven loaves for the four thousand, and how many basketfuls you gathered?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How is it you don’t understand that I was not talking to you about bread? But be on your guard against the yeast of the Pharisees and Sadducees.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then they understood that he was not telling them to guard against the yeast used in bread, but against the teaching of the Pharisees and Sadducees.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Declares That Jesus Is the Messiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Jesus came to the region of Caesarea Philippi, he asked his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who do people say the Son of Man is?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They replied, “Some say John the Baptist; others say Elijah; and still others, Jeremiah or one of the prophets.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But what about you?”
  - type: text
    text: ' he asked. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who do you say I am?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Simon Peter answered, “You are the Messiah, the Son of the living God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Blessed are you, Simon son of Jonah, for this was not revealed to you by flesh and blood, but by my Father in heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I tell you that you are Peter,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Peter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rock
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and on this rock I will build my church, and the gates of Hades
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the realm of the dead
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will not overcome it.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I will give you the keys of the kingdom of heaven; whatever you bind on earth will be
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will have been
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: bound in heaven, and whatever you loose on earth will be
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will have been
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: loosed in heaven.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then he ordered his disciples not to tell anyone that he was the Messiah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts His Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: From that time on Jesus began to explain to his disciples that he must go to Jerusalem and suffer many things at the hands of the elders, the chief priests and the teachers of the law, and that he must be killed and on the third day be raised to life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Peter took him aside and began to rebuke him. “Never, Lord!” he said. “This shall never happen to you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus turned and said to Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Get behind me, Satan! You are a stumbling block to me; you do not have in mind the concerns of God, but merely human concerns.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Jesus said to his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Whoever wants to be my disciple must deny themselves and take up their cross and follow me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For whoever wants to save their life
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word means either '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'life '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soul
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 26.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will lose it, but whoever loses their life for me will find it.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What good will it be for someone to gain the whole world, yet forfeit their soul? Or what can anyone give in exchange for their soul?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Son of Man is going to come in his Father’s glory with his angels, and then he will reward each person according to what they have done.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you, some who are standing here will not taste death before they see the Son of Man coming in his kingdom.”
