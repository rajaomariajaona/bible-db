document_id: PSA.74
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 74
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: maskil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a literary or musical term'
    marker-yv: yv-n
  - type: text
    text: ' of Asaph.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, why have you rejected us forever?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why does your anger smolder against the sheep of your pasture?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Remember the nation you purchased long ago,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people of your inheritance, whom you redeemed—
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mount Zion, where you dwelt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Turn your steps toward these everlasting ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all this destruction the enemy has brought on the sanctuary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Your foes roared in the place where you met with us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they set up their standards as signs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They behaved like men wielding axes
- type: usfm
  marker: q2
  children:
  - type: text
    text: to cut through a thicket of trees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They smashed all the carved paneling
- type: usfm
  marker: q2
  children:
  - type: text
    text: with their axes and hatchets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They burned your sanctuary to the ground;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they defiled the dwelling place of your Name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They said in their hearts, “We will crush them completely!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: They burned every place where God was worshiped in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We are given no signs from God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no prophets are left,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and none of us knows how long this will be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: How long will the enemy mock you, God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will the foe revile your name forever?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Why do you hold back your hand, your right hand?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Take it from the folds of your garment and destroy them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But God is my King from long ago;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he brings salvation on the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: It was you who split open the sea by your power;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you broke the heads of the monster in the waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: It was you who crushed the heads of Leviathan
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gave it as food to the creatures of the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: It was you who opened up springs and streams;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you dried up the ever-flowing rivers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The day is yours, and yours also the night;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you established the sun and moon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: It was you who set all the boundaries of the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you made both summer and winter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Remember how the enemy has mocked you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: how foolish people have reviled your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Do not hand over the life of your dove to wild beasts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not forget the lives of your afflicted people forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Have regard for your covenant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because haunts of violence fill the dark places of the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Do not let the oppressed retreat in disgrace;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may the poor and needy praise your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Rise up, O God, and defend your cause;
- type: usfm
  marker: q2
  children:
  - type: text
    text: remember how fools mock you all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Do not ignore the clamor of your adversaries,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the uproar of your enemies, which rises continually.
