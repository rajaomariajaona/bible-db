document_id: PSA.74,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 74
  - type: text
    content: 'A '
  - type: text
    content: maskil
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of Asaph.'
  - type: text
    content: O God, why have you rejected us forever?
  - type: text
    content: Why does your anger smolder against the sheep of your pasture?
  '10':
  - type: text
    content: How long will the enemy mock you, God?
  - type: text
    content: Will the foe revile your name forever?
  '11':
  - type: text
    content: Why do you hold back your hand, your right hand?
  - type: text
    content: Take it from the folds of your garment and destroy them!
  '12':
  - type: text
    content: But God is my King from long ago;
  - type: text
    content: he brings salvation on the earth.
  '13':
  - type: text
    content: It was you who split open the sea by your power;
  - type: text
    content: you broke the heads of the monster in the waters.
  '14':
  - type: text
    content: It was you who crushed the heads of Leviathan
  - type: text
    content: and gave it as food to the creatures of the desert.
  '15':
  - type: text
    content: It was you who opened up springs and streams;
  - type: text
    content: you dried up the ever-flowing rivers.
  '16':
  - type: text
    content: The day is yours, and yours also the night;
  - type: text
    content: you established the sun and moon.
  '17':
  - type: text
    content: It was you who set all the boundaries of the earth;
  - type: text
    content: you made both summer and winter.
  '18':
  - type: text
    content: 'Remember how the enemy has mocked you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: how foolish people have reviled your name.
  '19':
  - type: text
    content: Do not hand over the life of your dove to wild beasts;
  - type: text
    content: do not forget the lives of your afflicted people forever.
  '2':
  - type: text
    content: Remember the nation you purchased long ago,
  - type: text
    content: the people of your inheritance, whom you redeemed—
  - type: text
    content: Mount Zion, where you dwelt.
  '20':
  - type: text
    content: Have regard for your covenant,
  - type: text
    content: because haunts of violence fill the dark places of the land.
  '21':
  - type: text
    content: Do not let the oppressed retreat in disgrace;
  - type: text
    content: may the poor and needy praise your name.
  '22':
  - type: text
    content: Rise up, O God, and defend your cause;
  - type: text
    content: remember how fools mock you all day long.
  '23':
  - type: text
    content: Do not ignore the clamor of your adversaries,
  - type: text
    content: the uproar of your enemies, which rises continually.
  '3':
  - type: text
    content: Turn your steps toward these everlasting ruins,
  - type: text
    content: all this destruction the enemy has brought on the sanctuary.
  '4':
  - type: text
    content: Your foes roared in the place where you met with us;
  - type: text
    content: they set up their standards as signs.
  '5':
  - type: text
    content: They behaved like men wielding axes
  - type: text
    content: to cut through a thicket of trees.
  '6':
  - type: text
    content: They smashed all the carved paneling
  - type: text
    content: with their axes and hatchets.
  '7':
  - type: text
    content: They burned your sanctuary to the ground;
  - type: text
    content: they defiled the dwelling place of your Name.
  '8':
  - type: text
    content: They said in their hearts, “We will crush them completely!”
  - type: text
    content: They burned every place where God was worshiped in the land.
  '9':
  - type: text
    content: We are given no signs from God;
  - type: text
    content: no prophets are left,
  - type: text
    content: and none of us knows how long this will be.
