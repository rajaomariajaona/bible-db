document_id: ISA.16,111
type_code: eng
verses:
  '1':
  - type: text
    content: Send lambs as tribute
  - type: text
    content: to the ruler of the land,
  - type: text
    content: from Sela, across the desert,
  - type: text
    content: to the mount of Daughter Zion.
  '10':
  - type: text
    content: Joy and gladness are taken away from the orchards;
  - type: text
    content: no one sings or shouts in the vineyards;
  - type: text
    content: no one treads out wine at the presses,
  - type: text
    content: for I have put an end to the shouting.
  '11':
  - type: text
    content: My heart laments for Moab like a harp,
  - type: text
    content: my inmost being for Kir Hareseth.
  '12':
  - type: text
    content: When Moab appears at her high place,
  - type: text
    content: she only wears herself out;
  - type: text
    content: when she goes to her shrine to pray,
  - type: text
    content: it is to no avail.
  '13':
  - type: text
    content: 'This is the word the '
  - type: text
    content: Lord
  - type: text
    content: ' has already spoken concerning Moab. '
  '14':
  - type: text
    content: 'But now the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “Within three years, as a servant bound by contract would count them, Moab’s splendor and all her many people will be despised, and her survivors will be very few and feeble.”'
  '2':
  - type: text
    content: Like fluttering birds
  - type: text
    content: pushed from the nest,
  - type: text
    content: so are the women of Moab
  - type: text
    content: at the fords of the Arnon.
  '3':
  - type: text
    content: “Make up your mind,” Moab says.
  - type: text
    content: “Render a decision.
  - type: text
    content: Make your shadow like night—
  - type: text
    content: at high noon.
  - type: text
    content: Hide the fugitives,
  - type: text
    content: do not betray the refugees.
  '4':
  - type: text
    content: Let the Moabite fugitives stay with you;
  - type: text
    content: be their shelter from the destroyer.”
  - type: text
    content: The oppressor will come to an end,
  - type: text
    content: and destruction will cease;
  - type: text
    content: the aggressor will vanish from the land.
  '5':
  - type: text
    content: In love a throne will be established;
  - type: text
    content: in faithfulness a man will sit on it—
  - type: text
    content: one from the house
  - type: note
    content: Hebrew tent
  - type: text
    content: ' of David—'
  - type: text
    content: one who in judging seeks justice
  - type: text
    content: and speeds the cause of righteousness.
  '6':
  - type: text
    content: We have heard of Moab’s pride—
  - type: text
    content: how great is her arrogance!—
  - type: text
    content: of her conceit, her pride and her insolence;
  - type: text
    content: but her boasts are empty.
  '7':
  - type: text
    content: Therefore the Moabites wail,
  - type: text
    content: they wail together for Moab.
  - type: text
    content: Lament and grieve
  - type: text
    content: for the raisin cakes of Kir Hareseth.
  '8':
  - type: text
    content: The fields of Heshbon wither,
  - type: text
    content: the vines of Sibmah also.
  - type: text
    content: The rulers of the nations
  - type: text
    content: have trampled down the choicest vines,
  - type: text
    content: which once reached Jazer
  - type: text
    content: and spread toward the desert.
  - type: text
    content: Their shoots spread out
  - type: text
    content: and went as far as the sea.
  - type: note
    content: Probably the Dead Sea
  '9':
  - type: text
    content: So I weep, as Jazer weeps,
  - type: text
    content: for the vines of Sibmah.
  - type: text
    content: Heshbon and Elealeh,
  - type: text
    content: I drench you with tears!
  - type: text
    content: The shouts of joy over your ripened fruit
  - type: text
    content: and over your harvests have been stilled.
