document_id: ISA.16
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Send lambs as tribute
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the ruler of the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: from Sela, across the desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the mount of Daughter Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Like fluttering birds
- type: usfm
  marker: q2
  children:
  - type: text
    text: pushed from the nest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so are the women of Moab
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the fords of the Arnon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Make up your mind,” Moab says.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Render a decision.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make your shadow like night—
- type: usfm
  marker: q2
  children:
  - type: text
    text: at high noon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hide the fugitives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not betray the refugees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let the Moabite fugitives stay with you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be their shelter from the destroyer.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: The oppressor will come to an end,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destruction will cease;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the aggressor will vanish from the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: In love a throne will be established;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in faithfulness a man will sit on it—
- type: usfm
  marker: q2
  children:
  - type: text
    text: one from the house
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tent
    marker-yv: yv-n
  - type: text
    text: ' of David—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: one who in judging seeks justice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and speeds the cause of righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We have heard of Moab’s pride—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how great is her arrogance!—
- type: usfm
  marker: q1
  children:
  - type: text
    text: of her conceit, her pride and her insolence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but her boasts are empty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Therefore the Moabites wail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they wail together for Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lament and grieve
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the raisin cakes of Kir Hareseth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The fields of Heshbon wither,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the vines of Sibmah also.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The rulers of the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: have trampled down the choicest vines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: which once reached Jazer
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spread toward the desert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their shoots spread out
- type: usfm
  marker: q2
  children:
  - type: text
    text: and went as far as the sea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably the Dead Sea
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So I weep, as Jazer weeps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the vines of Sibmah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heshbon and Elealeh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I drench you with tears!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The shouts of joy over your ripened fruit
- type: usfm
  marker: q2
  children:
  - type: text
    text: and over your harvests have been stilled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Joy and gladness are taken away from the orchards;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one sings or shouts in the vineyards;
- type: usfm
  marker: q1
  children:
  - type: text
    text: no one treads out wine at the presses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have put an end to the shouting.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My heart laments for Moab like a harp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my inmost being for Kir Hareseth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When Moab appears at her high place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she only wears herself out;
- type: usfm
  marker: q1
  children:
  - type: text
    text: when she goes to her shrine to pray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is to no avail.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This is the word the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has already spoken concerning Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: “Within three years, as a servant bound by contract would count them, Moab’s splendor and all her many people will be despised, and her survivors will be very few and feeble.”'
