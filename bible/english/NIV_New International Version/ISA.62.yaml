document_id: ISA.62
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zion’s New Name
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: For Zion’s sake I will not keep silent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for Jerusalem’s sake I will not remain quiet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: till her vindication shines out like the dawn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her salvation like a blazing torch.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The nations will see your vindication,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all kings your glory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will be called by a new name
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that the mouth of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will bestow.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You will be a crown of splendor in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a royal diadem in the hand of your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: No longer will they call you Deserted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or name your land Desolate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you will be called Hephzibah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '62:4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hephzibah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: my delight is in her.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your land Beulah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '62:4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beulah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: married
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will take delight in you,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your land will be married.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: As a young man marries a young woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so will your Builder marry you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: as a bridegroom rejoices over his bride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so will your God rejoice over you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I have posted watchmen on your walls, Jerusalem;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will never be silent day or night.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You who call on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: give yourselves no rest,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and give him no rest till he establishes Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes her the praise of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has sworn by his right hand'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and by his mighty arm:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Never again will I give your grain
- type: usfm
  marker: q2
  children:
  - type: text
    text: as food for your enemies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and never again will foreigners drink the new wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: for which you have toiled;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: but those who harvest it will eat it
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: and those who gather the grapes will drink it
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the courts of my sanctuary.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pass through, pass through the gates!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Prepare the way for the people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Build up, build up the highway!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remove the stones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raise a banner for the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has made proclamation'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to the ends of the earth:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Say to Daughter Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘See, your Savior comes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: See, his reward is with him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his recompense accompanies him.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They will be called the Holy People,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the Redeemed of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you will be called Sought After,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the City No Longer Deserted.
