document_id: ISA.62,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Zion’s New Name
  - type: text
    content: For Zion’s sake I will not keep silent,
  - type: text
    content: for Jerusalem’s sake I will not remain quiet,
  - type: text
    content: till her vindication shines out like the dawn,
  - type: text
    content: her salvation like a blazing torch.
  '10':
  - type: text
    content: Pass through, pass through the gates!
  - type: text
    content: Prepare the way for the people.
  - type: text
    content: Build up, build up the highway!
  - type: text
    content: Remove the stones.
  - type: text
    content: Raise a banner for the nations.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has made proclamation'
  - type: text
    content: 'to the ends of the earth:'
  - type: text
    content: “Say to Daughter Zion,
  - type: text
    content: ‘See, your Savior comes!
  - type: text
    content: See, his reward is with him,
  - type: text
    content: and his recompense accompanies him.’ ”
  '12':
  - type: text
    content: They will be called the Holy People,
  - type: text
    content: 'the Redeemed of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: and you will be called Sought After,
  - type: text
    content: the City No Longer Deserted.
  '2':
  - type: text
    content: The nations will see your vindication,
  - type: text
    content: and all kings your glory;
  - type: text
    content: you will be called by a new name
  - type: text
    content: 'that the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' will bestow.'
  '3':
  - type: text
    content: 'You will be a crown of splendor in the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand,
  - type: text
    content: a royal diadem in the hand of your God.
  '4':
  - type: text
    content: No longer will they call you Deserted,
  - type: text
    content: or name your land Desolate.
  - type: text
    content: But you will be called Hephzibah,
  - type: note
    content: Hephzibah means my delight is in her.
  - type: text
    content: and your land Beulah
  - type: note
    content: Beulah means married.
  - type: text
    content: ;
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will take delight in you,'
  - type: text
    content: and your land will be married.
  '5':
  - type: text
    content: As a young man marries a young woman,
  - type: text
    content: so will your Builder marry you;
  - type: text
    content: as a bridegroom rejoices over his bride,
  - type: text
    content: so will your God rejoice over you.
  '6':
  - type: text
    content: I have posted watchmen on your walls, Jerusalem;
  - type: text
    content: they will never be silent day or night.
  - type: text
    content: 'You who call on the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: give yourselves no rest,
  '7':
  - type: text
    content: and give him no rest till he establishes Jerusalem
  - type: text
    content: and makes her the praise of the earth.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn by his right hand'
  - type: text
    content: 'and by his mighty arm:'
  - type: text
    content: “Never again will I give your grain
  - type: text
    content: as food for your enemies,
  - type: text
    content: and never again will foreigners drink the new wine
  - type: text
    content: for which you have toiled;
  '9':
  - type: text
    content: but those who harvest it will eat it
  - type: text
    content: 'and praise the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and those who gather the grapes will drink it
  - type: text
    content: in the courts of my sanctuary.”
