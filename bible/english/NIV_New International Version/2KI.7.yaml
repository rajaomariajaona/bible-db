      children:
      - type: text
        text: '1'
    - type: text
      text: 'Elisha replied, “Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: About this time tomorrow, a seah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 12 pounds or about 5.5 kilograms of flour; also in verses 16 and 18
      marker-yv: yv-n
    - type: text
      text: ' of the finest flour will sell for a shekel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 2/5 ounce or about 12 grams; also in verses 16 and 18
      marker-yv: yv-n
    - type: text
      text: ' and two seahs'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 20 pounds or about 9 kilograms of barley; also in verses 16 and 18
      marker-yv: yv-n
    - type: text
      text: ' of barley for a shekel at the gate of Samaria.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So they went and called out to the city gatekeepers and told them, “We went into the Aramean camp and no one was there—not a sound of anyone—only tethered horses and donkeys, and the tents left just as they were.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The gatekeepers shouted the news, and it was reported within the palace.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The king got up in the night and said to his officers, “I will tell you what the Arameans have done to us. They know we are starving; so they have left the camp to hide in the countryside, thinking, ‘They will surely come out, and then we will take them alive and get into the city.’ ”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: One of his officers answered, “Have some men take five of the horses that are left in the city. Their plight will be like that of all the Israelites left here—yes, they will only be like all these Israelites who are doomed. So let us send them to find out what happened.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So they selected two chariots with their horses, and the king sent them after the Aramean army. He commanded the drivers, “Go and find out what has happened.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'They followed them as far as the Jordan, and they found the whole road strewn with the clothing and equipment the Arameans had thrown away in their headlong flight. So the messengers returned and reported to the king. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the people went out and plundered the camp of the Arameans. So a seah of the finest flour sold for a shekel, and two seahs of barley sold for a shekel, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Now the king had put the officer on whose arm he leaned in charge of the gate, and the people trampled him in the gateway, and he died, just as the man of God had foretold when the king came down to his house. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'It happened as the man of God had said to the king: “About this time tomorrow, a seah of the finest flour will sell for a shekel and two seahs of barley for a shekel at the gate of Samaria.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The officer had said to the man of God, “Look, even if the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' should open the floodgates of the heavens, could this happen?” The man of God had replied, “You will see it with your own eyes, but you will not eat any of it!” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The officer on whose arm the king was leaning said to the man of God, “Look, even if the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' should open the floodgates of the heavens, could this happen?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You will see it with your own eyes,” answered Elisha, “but you will not eat any of it!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Siege Lifted
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And that is exactly what happened to him, for the people trampled him in the gateway, and he died.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Now there were four men with leprosy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leprosy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was used for various diseases affecting the skin; also in verse 8.
      marker-yv: yv-n
    - type: text
      text: ' at the entrance of the city gate. They said to each other, “Why stay here until we die? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: If we say, ‘We’ll go into the city’—the famine is there, and we will die. And if we stay here, we will die. So let’s go over to the camp of the Arameans and surrender. If they spare us, we live; if they kill us, then we die.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'At dusk they got up and went to the camp of the Arameans. When they reached the edge of the camp, no one was there, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'for the Lord had caused the Arameans to hear the sound of chariots and horses and a great army, so that they said to one another, “Look, the king of Israel has hired the Hittite and Egyptian kings to attack us!” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So they got up and fled in the dusk and abandoned their tents and their horses and donkeys. They left the camp as it was and ran for their lives.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The men who had leprosy reached the edge of the camp, entered one of the tents and ate and drank. Then they took silver, gold and clothes, and went off and hid them. They returned and entered another tent and took some things from it and hid them also.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then they said to each other, “What we’re doing is not right. This is a day of good news and we are keeping it to ourselves. If we wait until daylight, punishment will overtake us. Let’s go at once and report this to the royal palace.”
