document_id: 2KI.7,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Elisha replied, “Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: About this time tomorrow, a seah'
  - type: note
    content: That is, probably about 12 pounds or about 5.5 kilograms of flour; also in verses 16 and 18
  - type: text
    content: ' of the finest flour will sell for a shekel'
  - type: note
    content: That is, about 2/5 ounce or about 12 grams; also in verses 16 and 18
  - type: text
    content: ' and two seahs'
  - type: note
    content: That is, probably about 20 pounds or about 9 kilograms of barley; also in verses 16 and 18
  - type: text
    content: ' of barley for a shekel at the gate of Samaria.”'
  '10':
  - type: text
    content: 'So they went and called out to the city gatekeepers and told them, “We went into the Aramean camp and no one was there—not a sound of anyone—only tethered horses and donkeys, and the tents left just as they were.” '
  '11':
  - type: text
    content: The gatekeepers shouted the news, and it was reported within the palace.
  '12':
  - type: text
    content: The king got up in the night and said to his officers, “I will tell you what the Arameans have done to us. They know we are starving; so they have left the camp to hide in the countryside, thinking, ‘They will surely come out, and then we will take them alive and get into the city.’ ”
  '13':
  - type: text
    content: One of his officers answered, “Have some men take five of the horses that are left in the city. Their plight will be like that of all the Israelites left here—yes, they will only be like all these Israelites who are doomed. So let us send them to find out what happened.”
  '14':
  - type: text
    content: 'So they selected two chariots with their horses, and the king sent them after the Aramean army. He commanded the drivers, “Go and find out what has happened.” '
  '15':
  - type: text
    content: 'They followed them as far as the Jordan, and they found the whole road strewn with the clothing and equipment the Arameans had thrown away in their headlong flight. So the messengers returned and reported to the king. '
  '16':
  - type: text
    content: 'Then the people went out and plundered the camp of the Arameans. So a seah of the finest flour sold for a shekel, and two seahs of barley sold for a shekel, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said.'
  '17':
  - type: text
    content: 'Now the king had put the officer on whose arm he leaned in charge of the gate, and the people trampled him in the gateway, and he died, just as the man of God had foretold when the king came down to his house. '
  '18':
  - type: text
    content: 'It happened as the man of God had said to the king: “About this time tomorrow, a seah of the finest flour will sell for a shekel and two seahs of barley for a shekel at the gate of Samaria.”'
  '19':
  - type: text
    content: 'The officer had said to the man of God, “Look, even if the '
  - type: text
    content: Lord
  - type: text
    content: ' should open the floodgates of the heavens, could this happen?” The man of God had replied, “You will see it with your own eyes, but you will not eat any of it!” '
  '2':
  - type: text
    content: 'The officer on whose arm the king was leaning said to the man of God, “Look, even if the '
  - type: text
    content: Lord
  - type: text
    content: ' should open the floodgates of the heavens, could this happen?”'
  - type: text
    content: “You will see it with your own eyes,” answered Elisha, “but you will not eat any of it!”
  - type: heading
    content: The Siege Lifted
  '20':
  - type: text
    content: And that is exactly what happened to him, for the people trampled him in the gateway, and he died.
  '3':
  - type: text
    content: Now there were four men with leprosy
  - type: note
    content: The Hebrew for leprosy was used for various diseases affecting the skin; also in verse 8.
  - type: text
    content: ' at the entrance of the city gate. They said to each other, “Why stay here until we die? '
  '4':
  - type: text
    content: If we say, ‘We’ll go into the city’—the famine is there, and we will die. And if we stay here, we will die. So let’s go over to the camp of the Arameans and surrender. If they spare us, we live; if they kill us, then we die.”
  '5':
  - type: text
    content: 'At dusk they got up and went to the camp of the Arameans. When they reached the edge of the camp, no one was there, '
  '6':
  - type: text
    content: 'for the Lord had caused the Arameans to hear the sound of chariots and horses and a great army, so that they said to one another, “Look, the king of Israel has hired the Hittite and Egyptian kings to attack us!” '
  '7':
  - type: text
    content: So they got up and fled in the dusk and abandoned their tents and their horses and donkeys. They left the camp as it was and ran for their lives.
  '8':
  - type: text
    content: The men who had leprosy reached the edge of the camp, entered one of the tents and ate and drank. Then they took silver, gold and clothes, and went off and hid them. They returned and entered another tent and took some things from it and hid them also.
  '9':
  - type: text
    content: Then they said to each other, “What we’re doing is not right. This is a day of good news and we are keeping it to ourselves. If we wait until daylight, punishment will overtake us. Let’s go at once and report this to the royal palace.”
