document_id: PSA.30
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 30
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 30:1-12 is numbered 30:2-13.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm. A song. For the dedication of the temple.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: palace
    marker-yv: yv-n
  - type: text
    text: ' Of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I will exalt you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you lifted me out of the depths
- type: usfm
  marker: q2
  children:
  - type: text
    text: and did not let my enemies gloat over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God, I called to you for help,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you healed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', brought me up from the realm of the dead;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you spared me from going down to the pit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sing the praises of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you his faithful people;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: praise his holy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For his anger lasts only a moment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but his favor lasts a lifetime;
- type: usfm
  marker: q1
  children:
  - type: text
    text: weeping may stay for the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but rejoicing comes in the morning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When I felt secure, I said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I will never be shaken.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', when you favored me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you made my royal mountain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Mount Zion
    marker-yv: yv-n
  - type: text
    text: ' stand firm;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: but when you hid your face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was dismayed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'To you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I called;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to the Lord I cried for mercy:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “What is gained if I am silenced,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I go down to the pit?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will the dust praise you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will it proclaim your faithfulness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hear, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and be merciful to me;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', be my help.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You turned my wailing into dancing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you removed my sackcloth and clothed me with joy,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: that my heart may sing your praises and not be silent.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God, I will praise you forever.'
