document_id: PSA.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 30In Hebrew texts 30:1-12 is numbered 30:2-13.
  - type: text
    content: A psalm. A song. For the dedication of the temple.
  - type: note
    content: 'Title: Or palace'
  - type: text
    content: ' Of David.'
  - type: text
    content: 'I will exalt you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for you lifted me out of the depths
  - type: text
    content: and did not let my enemies gloat over me.
  '10':
  - type: text
    content: 'Hear, '
  - type: text
    content: Lord
  - type: text
    content: ', and be merciful to me;'
  - type: text
    content: Lord
  - type: text
    content: ', be my help.”'
  '11':
  - type: text
    content: You turned my wailing into dancing;
  - type: text
    content: you removed my sackcloth and clothed me with joy,
  '12':
  - type: text
    content: that my heart may sing your praises and not be silent.
  - type: text
    content: Lord
  - type: text
    content: ' my God, I will praise you forever.'
  '2':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ' my God, I called to you for help,'
  - type: text
    content: and you healed me.
  '3':
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', brought me up from the realm of the dead;'
  - type: text
    content: you spared me from going down to the pit.
  '4':
  - type: text
    content: 'Sing the praises of the '
  - type: text
    content: Lord
  - type: text
    content: ', you his faithful people;'
  - type: text
    content: praise his holy name.
  '5':
  - type: text
    content: For his anger lasts only a moment,
  - type: text
    content: but his favor lasts a lifetime;
  - type: text
    content: weeping may stay for the night,
  - type: text
    content: but rejoicing comes in the morning.
  '6':
  - type: text
    content: When I felt secure, I said,
  - type: text
    content: “I will never be shaken.”
  '7':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', when you favored me,'
  - type: text
    content: you made my royal mountain
  - type: note
    content: That is, Mount Zion
  - type: text
    content: ' stand firm;'
  - type: text
    content: but when you hid your face,
  - type: text
    content: I was dismayed.
  '8':
  - type: text
    content: 'To you, '
  - type: text
    content: Lord
  - type: text
    content: ', I called;'
  - type: text
    content: 'to the Lord I cried for mercy:'
  '9':
  - type: text
    content: “What is gained if I am silenced,
  - type: text
    content: if I go down to the pit?
  - type: text
    content: Will the dust praise you?
  - type: text
    content: Will it proclaim your faithfulness?
