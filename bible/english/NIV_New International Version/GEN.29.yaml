document_id: GEN.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Arrives in Paddan Aram
  - type: text
    content: 'Then Jacob continued on his journey and came to the land of the eastern peoples. '
  '10':
  - type: text
    content: 'When Jacob saw Rachel daughter of his uncle Laban, and Laban’s sheep, he went over and rolled the stone away from the mouth of the well and watered his uncle’s sheep. '
  '11':
  - type: text
    content: 'Then Jacob kissed Rachel and began to weep aloud. '
  '12':
  - type: text
    content: He had told Rachel that he was a relative of her father and a son of Rebekah. So she ran and told her father.
  '13':
  - type: text
    content: 'As soon as Laban heard the news about Jacob, his sister’s son, he hurried to meet him. He embraced him and kissed him and brought him to his home, and there Jacob told him all these things. '
  '14':
  - type: text
    content: Then Laban said to him, “You are my own flesh and blood.”
  - type: heading
    content: Jacob Marries Leah and Rachel
  - type: text
    content: 'After Jacob had stayed with him for a whole month, '
  '15':
  - type: text
    content: Laban said to him, “Just because you are a relative of mine, should you work for me for nothing? Tell me what your wages should be.”
  '16':
  - type: text
    content: 'Now Laban had two daughters; the name of the older was Leah, and the name of the younger was Rachel. '
  '17':
  - type: text
    content: Leah had weak
  - type: note
    content: Or delicate
  - type: text
    content: ' eyes, but Rachel had a lovely figure and was beautiful. '
  '18':
  - type: text
    content: Jacob was in love with Rachel and said, “I’ll work for you seven years in return for your younger daughter Rachel.”
  '19':
  - type: text
    content: 'Laban said, “It’s better that I give her to you than to some other man. Stay here with me.” '
  '2':
  - type: text
    content: 'There he saw a well in the open country, with three flocks of sheep lying near it because the flocks were watered from that well. The stone over the mouth of the well was large. '
  '20':
  - type: text
    content: So Jacob served seven years to get Rachel, but they seemed like only a few days to him because of his love for her.
  '21':
  - type: text
    content: Then Jacob said to Laban, “Give me my wife. My time is completed, and I want to make love to her.”
  '22':
  - type: text
    content: 'So Laban brought together all the people of the place and gave a feast. '
  '23':
  - type: text
    content: 'But when evening came, he took his daughter Leah and brought her to Jacob, and Jacob made love to her. '
  '24':
  - type: text
    content: And Laban gave his servant Zilpah to his daughter as her attendant.
  '25':
  - type: text
    content: When morning came, there was Leah! So Jacob said to Laban, “What is this you have done to me? I served you for Rachel, didn’t I? Why have you deceived me?”
  '26':
  - type: text
    content: 'Laban replied, “It is not our custom here to give the younger daughter in marriage before the older one. '
  '27':
  - type: text
    content: Finish this daughter’s bridal week; then we will give you the younger one also, in return for another seven years of work.”
  '28':
  - type: text
    content: 'And Jacob did so. He finished the week with Leah, and then Laban gave him his daughter Rachel to be his wife. '
  '29':
  - type: text
    content: 'Laban gave his servant Bilhah to his daughter Rachel as her attendant. '
  '3':
  - type: text
    content: When all the flocks were gathered there, the shepherds would roll the stone away from the well’s mouth and water the sheep. Then they would return the stone to its place over the mouth of the well.
  '30':
  - type: text
    content: Jacob made love to Rachel also, and his love for Rachel was greater than his love for Leah. And he worked for Laban another seven years.
  - type: heading
    content: Jacob’s Children
  '31':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' saw that Leah was not loved, he enabled her to conceive, but Rachel remained childless. '
  '32':
  - type: text
    content: Leah became pregnant and gave birth to a son. She named him Reuben,
  - type: note
    content: Reuben sounds like the Hebrew for he has seen my misery; the name means see, a son.
  - type: text
    content: ' for she said, “It is because the '
  - type: text
    content: Lord
  - type: text
    content: ' has seen my misery. Surely my husband will love me now.”'
  '33':
  - type: text
    content: 'She conceived again, and when she gave birth to a son she said, “Because the '
  - type: text
    content: Lord
  - type: text
    content: ' heard that I am not loved, he gave me this one too.” So she named him Simeon.'
  - type: note
    content: Simeon probably means one who hears.
  '34':
  - type: text
    content: Again she conceived, and when she gave birth to a son she said, “Now at last my husband will become attached to me, because I have borne him three sons.” So he was named Levi.
  - type: note
    content: Levi sounds like and may be derived from the Hebrew for attached.
  '35':
  - type: text
    content: 'She conceived again, and when she gave birth to a son she said, “This time I will praise the '
  - type: text
    content: Lord
  - type: text
    content: .” So she named him Judah.
  - type: note
    content: Judah sounds like and may be derived from the Hebrew for praise.
  - type: text
    content: ' Then she stopped having children.'
  '4':
  - type: text
    content: Jacob asked the shepherds, “My brothers, where are you from?”
  - type: text
    content: “We’re from Harran,” they replied.
  '5':
  - type: text
    content: He said to them, “Do you know Laban, Nahor’s grandson?”
  - type: text
    content: “Yes, we know him,” they answered.
  '6':
  - type: text
    content: Then Jacob asked them, “Is he well?”
  - type: text
    content: “Yes, he is,” they said, “and here comes his daughter Rachel with the sheep.”
  '7':
  - type: text
    content: “Look,” he said, “the sun is still high; it is not time for the flocks to be gathered. Water the sheep and take them back to pasture.”
  '8':
  - type: text
    content: “We can’t,” they replied, “until all the flocks are gathered and the stone has been rolled away from the mouth of the well. Then we will water the sheep.”
  '9':
  - type: text
    content: 'While he was still talking with them, Rachel came with her father’s sheep, for she was a shepherd. '
