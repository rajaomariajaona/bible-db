document_id: GEN.29,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Arrives in Paddan Aram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Jacob continued on his journey and came to the land of the eastern peoples. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When Jacob saw Rachel daughter of his uncle Laban, and Laban’s sheep, he went over and rolled the stone away from the mouth of the well and watered his uncle’s sheep. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then Jacob kissed Rachel and began to weep aloud. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: He had told Rachel that he was a relative of her father and a son of Rebekah. So she ran and told her father.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'As soon as Laban heard the news about Jacob, his sister’s son, he hurried to meet him. He embraced him and kissed him and brought him to his home, and there Jacob told him all these things. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then Laban said to him, “You are my own flesh and blood.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Marries Leah and Rachel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Jacob had stayed with him for a whole month, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Laban said to him, “Just because you are a relative of mine, should you work for me for nothing? Tell me what your wages should be.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Now Laban had two daughters; the name of the older was Leah, and the name of the younger was Rachel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Leah had weak
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: delicate
      marker-yv: yv-n
    - type: text
      text: ' eyes, but Rachel had a lovely figure and was beautiful. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Jacob was in love with Rachel and said, “I’ll work for you seven years in return for your younger daughter Rachel.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Laban said, “It’s better that I give her to you than to some other man. Stay here with me.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'There he saw a well in the open country, with three flocks of sheep lying near it because the flocks were watered from that well. The stone over the mouth of the well was large. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So Jacob served seven years to get Rachel, but they seemed like only a few days to him because of his love for her.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then Jacob said to Laban, “Give me my wife. My time is completed, and I want to make love to her.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So Laban brought together all the people of the place and gave a feast. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But when evening came, he took his daughter Leah and brought her to Jacob, and Jacob made love to her. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: And Laban gave his servant Zilpah to his daughter as her attendant.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When morning came, there was Leah! So Jacob said to Laban, “What is this you have done to me? I served you for Rachel, didn’t I? Why have you deceived me?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Laban replied, “It is not our custom here to give the younger daughter in marriage before the older one. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Finish this daughter’s bridal week; then we will give you the younger one also, in return for another seven years of work.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And Jacob did so. He finished the week with Leah, and then Laban gave him his daughter Rachel to be his wife. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Laban gave his servant Bilhah to his daughter Rachel as her attendant. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When all the flocks were gathered there, the shepherds would roll the stone away from the well’s mouth and water the sheep. Then they would return the stone to its place over the mouth of the well.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Jacob made love to Rachel also, and his love for Rachel was greater than his love for Leah. And he worked for Laban another seven years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob’s Children
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saw that Leah was not loved, he enabled her to conceive, but Rachel remained childless. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Leah became pregnant and gave birth to a son. She named him Reuben,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Reuben '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'he '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: has seen my misery
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; the name means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: see, a son.
      marker-yv: yv-n
    - type: text
      text: ' for she said, “It is because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has seen my misery. Surely my husband will love me now.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'She conceived again, and when she gave birth to a son she said, “Because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' heard that I am not loved, he gave me this one too.” So she named him Simeon.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Simeon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probably means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: one who hears.
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Again she conceived, and when she gave birth to a son she said, “Now at last my husband will become attached to me, because I have borne him three sons.” So he was named Levi.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Levi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like and may be derived from the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: attached
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'She conceived again, and when she gave birth to a son she said, “This time I will praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .” So she named him Judah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Judah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like and may be derived from the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: praise
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Then she stopped having children.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jacob asked the shepherds, “My brothers, where are you from?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We’re from Harran,” they replied.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: He said to them, “Do you know Laban, Nahor’s grandson?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, we know him,” they answered.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then Jacob asked them, “Is he well?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, he is,” they said, “and here comes his daughter Rachel with the sheep.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Look,” he said, “the sun is still high; it is not time for the flocks to be gathered. Water the sheep and take them back to pasture.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “We can’t,” they replied, “until all the flocks are gathered and the stone has been rolled away from the mouth of the well. Then we will water the sheep.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'While he was still talking with them, Rachel came with her father’s sheep, for she was a shepherd. '
