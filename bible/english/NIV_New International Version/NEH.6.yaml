document_id: NEH.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Further Opposition to the Rebuilding
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When word came to Sanballat, Tobiah, Geshem the Arab and the rest of our enemies that I had rebuilt the wall and not a gap was left in it—though up to that time I had not set the doors in the gates— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sanballat and Geshem sent me this message: “Come, let us meet together in one of the villages'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in Kephirim
    marker-yv: yv-n
  - type: text
    text: ' on the plain of Ono.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But they were scheming to harm me; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'so I sent messengers to them with this reply: “I am carrying on a great project and cannot go down. Why should the work stop while I leave it and go down to you?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Four times they sent me the same message, and each time I gave them the same answer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then, the fifth time, Sanballat sent his aide to me with the same message, and in his hand was an unsealed letter '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'in which was written:'
- type: usfm
  marker: pm
  children:
  - type: text
    text: “It is reported among the nations—and Geshem
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gashmu, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Geshem
    marker-yv: yv-n
  - type: text
    text: ' says it is true—that you and the Jews are plotting to revolt, and therefore you are building the wall. Moreover, according to these reports you are about to become their king '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and have even appointed prophets to make this proclamation about you in Jerusalem: ‘There is a king in Judah!’ Now this report will get back to the king; so come, let us meet together.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I sent him this reply: “Nothing like what you are saying is happening; you are just making it up out of your head.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They were all trying to frighten us, thinking, “Their hands will get too weak for the work, and it will not be completed.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But I prayed, “Now strengthen my hands.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: One day I went to the house of Shemaiah son of Delaiah, the son of Mehetabel, who was shut in at his home. He said, “Let us meet in the house of God, inside the temple, and let us close the temple doors, because men are coming to kill you—by night they are coming to kill you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But I said, “Should a man like me run away? Or should someone like me go into the temple to save his life? I will not go!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I realized that God had not sent him, but that he had prophesied against me because Tobiah and Sanballat had hired him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He had been hired to intimidate me so that I would commit a sin by doing this, and then they would give me a bad name to discredit me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Remember Tobiah and Sanballat, my God, because of what they have done; remember also the prophet Noadiah and how she and the rest of the prophets have been trying to intimidate me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So the wall was completed on the twenty-fifth of Elul, in fifty-two days.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Opposition to the Completed Wall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When all our enemies heard about this, all the surrounding nations were afraid and lost their self-confidence, because they realized that this work had been done with the help of our God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Also, in those days the nobles of Judah were sending many letters to Tobiah, and replies from Tobiah kept coming to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For many in Judah were under oath to him, since he was son-in-law to Shekaniah son of Arah, and his son Jehohanan had married the daughter of Meshullam son of Berekiah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moreover, they kept reporting to me his good deeds and then telling him what I said. And Tobiah sent letters to intimidate me.
