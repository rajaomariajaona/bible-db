document_id: 2SA.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Enrolls the Fighting Men
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Again the anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' burned against Israel, and he incited David against them, saying, “Go and take a census of Israel and Judah.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So the king said to Joab and the army commanders
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint (see also verse 4 and 1 Chron. 21:2); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Joab the army commander
    marker-yv: yv-n
  - type: text
    text: ' with him, “Go throughout the tribes of Israel from Dan to Beersheba and enroll the fighting men, so that I may know how many there are.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But Joab replied to the king, “May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God multiply the troops a hundred times over, and may the eyes of my lord the king see it. But why does my lord the king want to do such a thing?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The king’s word, however, overruled Joab and the army commanders; so they left the presence of the king to enroll the fighting men of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'After crossing the Jordan, they camped near Aroer, south of the town in the gorge, and then went through Gad and on to Jazer. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They went to Gilead and the region of Tahtim Hodshi, and on to Dan Jaan and around toward Sidon. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then they went toward the fortress of Tyre and all the towns of the Hivites and Canaanites. Finally, they went on to Beersheba in the Negev of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: After they had gone through the entire land, they came back to Jerusalem at the end of nine months and twenty days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joab reported the number of the fighting men to the king: In Israel there were eight hundred thousand able-bodied men who could handle a sword, and in Judah five hundred thousand.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David was conscience-stricken after he had counted the fighting men, and he said to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “I have sinned greatly in what I have done. Now, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I beg you, take away the guilt of your servant. I have done a very foolish thing.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Before David got up the next morning, the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had come to Gad the prophet, David’s seer: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Go and tell David, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I am giving you three options. Choose one of them for me to carry out against you.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So Gad went to David and said to him, “Shall there come on you three
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint (see also 1 Chron. 21:12); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: seven
    marker-yv: yv-n
  - type: text
    text: ' years of famine in your land? Or three months of fleeing from your enemies while they pursue you? Or three days of plague in your land? Now then, think it over and decide how I should answer the one who sent me.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David said to Gad, “I am in deep distress. Let us fall into the hands of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for his mercy is great; but do not let me fall into human hands.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sent a plague on Israel from that morning until the end of the time designated, and seventy thousand of the people from Dan to Beersheba died. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the angel stretched out his hand to destroy Jerusalem, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' relented concerning the disaster and said to the angel who was afflicting the people, “Enough! Withdraw your hand.” The angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was then at the threshing floor of Araunah the Jebusite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When David saw the angel who was striking down the people, he said to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “I have sinned; I, the shepherd,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls and Septuagint; Masoretic Text does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: the shepherd
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' have done wrong. These are but sheep. What have they done? Let your hand fall on me and my family.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Builds an Altar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On that day Gad went to David and said to him, “Go up and build an altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on the threshing floor of Araunah the Jebusite.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So David went up, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded through Gad. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When Araunah looked and saw the king and his officials coming toward him, he went out and bowed down before the king with his face to the ground.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Araunah said, “Why has my lord the king come to his servant?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“To buy your threshing floor,” David answered, “so I can build an altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', that the plague on the people may be stopped.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Araunah said to David, “Let my lord the king take whatever he wishes and offer it up. Here are oxen for the burnt offering, and here are threshing sledges and ox yokes for the wood. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Your Majesty, Araunah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts and Septuagint; most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: King Araunah
    marker-yv: yv-n
  - type: text
    text: ' gives all this to the king.” Araunah also said to him, “May the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God accept you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But the king replied to Araunah, “No, I insist on paying you for it. I will not sacrifice to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God burnt offerings that cost me nothing.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: So David bought the threshing floor and the oxen and paid fifty shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1 1/4 pounds or about 575 grams
    marker-yv: yv-n
  - type: text
    text: ' of silver for them. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'David built an altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' there and sacrificed burnt offerings and fellowship offerings. Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' answered his prayer in behalf of the land, and the plague on Israel was stopped.'
