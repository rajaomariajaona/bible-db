document_id: 2SA.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Enrolls the Fighting Men
  - type: text
    content: 'Again the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' burned against Israel, and he incited David against them, saying, “Go and take a census of Israel and Judah.”'
  '10':
  - type: text
    content: 'David was conscience-stricken after he had counted the fighting men, and he said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “I have sinned greatly in what I have done. Now, '
  - type: text
    content: Lord
  - type: text
    content: ', I beg you, take away the guilt of your servant. I have done a very foolish thing.”'
  '11':
  - type: text
    content: 'Before David got up the next morning, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' had come to Gad the prophet, David’s seer: '
  '12':
  - type: text
    content: '“Go and tell David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am giving you three options. Choose one of them for me to carry out against you.’ ”'
  '13':
  - type: text
    content: So Gad went to David and said to him, “Shall there come on you three
  - type: note
    content: Septuagint (see also 1 Chron. 21:12); Hebrew seven
  - type: text
    content: ' years of famine in your land? Or three months of fleeing from your enemies while they pursue you? Or three days of plague in your land? Now then, think it over and decide how I should answer the one who sent me.”'
  '14':
  - type: text
    content: 'David said to Gad, “I am in deep distress. Let us fall into the hands of the '
  - type: text
    content: Lord
  - type: text
    content: ', for his mercy is great; but do not let me fall into human hands.”'
  '15':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a plague on Israel from that morning until the end of the time designated, and seventy thousand of the people from Dan to Beersheba died. '
  '16':
  - type: text
    content: 'When the angel stretched out his hand to destroy Jerusalem, the '
  - type: text
    content: Lord
  - type: text
    content: ' relented concerning the disaster and said to the angel who was afflicting the people, “Enough! Withdraw your hand.” The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' was then at the threshing floor of Araunah the Jebusite.'
  '17':
  - type: text
    content: 'When David saw the angel who was striking down the people, he said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “I have sinned; I, the shepherd,'
  - type: note
    content: Dead Sea Scrolls and Septuagint; Masoretic Text does not have the shepherd.
  - type: text
    content: ' have done wrong. These are but sheep. What have they done? Let your hand fall on me and my family.”'
  - type: heading
    content: David Builds an Altar
  '18':
  - type: text
    content: 'On that day Gad went to David and said to him, “Go up and build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the threshing floor of Araunah the Jebusite.” '
  '19':
  - type: text
    content: 'So David went up, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Gad. '
  '2':
  - type: text
    content: So the king said to Joab and the army commanders
  - type: note
    content: Septuagint (see also verse 4 and 1 Chron. 21:2); Hebrew Joab the army commander
  - type: text
    content: ' with him, “Go throughout the tribes of Israel from Dan to Beersheba and enroll the fighting men, so that I may know how many there are.”'
  '20':
  - type: text
    content: When Araunah looked and saw the king and his officials coming toward him, he went out and bowed down before the king with his face to the ground.
  '21':
  - type: text
    content: Araunah said, “Why has my lord the king come to his servant?”
  - type: text
    content: '“To buy your threshing floor,” David answered, “so I can build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ', that the plague on the people may be stopped.”'
  '22':
  - type: text
    content: 'Araunah said to David, “Let my lord the king take whatever he wishes and offer it up. Here are oxen for the burnt offering, and here are threshing sledges and ox yokes for the wood. '
  '23':
  - type: text
    content: Your Majesty, Araunah
  - type: note
    content: Some Hebrew manuscripts and Septuagint; most Hebrew manuscripts King Araunah
  - type: text
    content: ' gives all this to the king.” Araunah also said to him, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' your God accept you.”'
  '24':
  - type: text
    content: 'But the king replied to Araunah, “No, I insist on paying you for it. I will not sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' my God burnt offerings that cost me nothing.”'
  - type: text
    content: So David bought the threshing floor and the oxen and paid fifty shekels
  - type: note
    content: That is, about 1 1/4 pounds or about 575 grams
  - type: text
    content: ' of silver for them. '
  '25':
  - type: text
    content: 'David built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' there and sacrificed burnt offerings and fellowship offerings. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' answered his prayer in behalf of the land, and the plague on Israel was stopped.'
  '3':
  - type: text
    content: 'But Joab replied to the king, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' your God multiply the troops a hundred times over, and may the eyes of my lord the king see it. But why does my lord the king want to do such a thing?”'
  '4':
  - type: text
    content: The king’s word, however, overruled Joab and the army commanders; so they left the presence of the king to enroll the fighting men of Israel.
  '5':
  - type: text
    content: 'After crossing the Jordan, they camped near Aroer, south of the town in the gorge, and then went through Gad and on to Jazer. '
  '6':
  - type: text
    content: 'They went to Gilead and the region of Tahtim Hodshi, and on to Dan Jaan and around toward Sidon. '
  '7':
  - type: text
    content: Then they went toward the fortress of Tyre and all the towns of the Hivites and Canaanites. Finally, they went on to Beersheba in the Negev of Judah.
  '8':
  - type: text
    content: After they had gone through the entire land, they came back to Jerusalem at the end of nine months and twenty days.
  '9':
  - type: text
    content: 'Joab reported the number of the fighting men to the king: In Israel there were eight hundred thousand able-bodied men who could handle a sword, and in Judah five hundred thousand.'
