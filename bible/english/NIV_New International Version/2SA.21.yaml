document_id: 2SA.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gibeonites Avenged
  - type: text
    content: 'During the reign of David, there was a famine for three successive years; so David sought the face of the '
  - type: text
    content: Lord
  - type: text
    content: '. The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “It is on account of Saul and his blood-stained house; it is because he put the Gibeonites to death.”'
  '10':
  - type: text
    content: 'Rizpah daughter of Aiah took sackcloth and spread it out for herself on a rock. From the beginning of the harvest till the rain poured down from the heavens on the bodies, she did not let the birds touch them by day or the wild animals by night. '
  '11':
  - type: text
    content: 'When David was told what Aiah’s daughter Rizpah, Saul’s concubine, had done, '
  '12':
  - type: text
    content: 'he went and took the bones of Saul and his son Jonathan from the citizens of Jabesh Gilead. (They had stolen their bodies from the public square at Beth Shan, where the Philistines had hung them after they struck Saul down on Gilboa.) '
  '13':
  - type: text
    content: David brought the bones of Saul and his son Jonathan from there, and the bones of those who had been killed and exposed were gathered up.
  '14':
  - type: text
    content: They buried the bones of Saul and his son Jonathan in the tomb of Saul’s father Kish, at Zela in Benjamin, and did everything the king commanded. After that, God answered prayer in behalf of the land.
  - type: heading
    content: Wars Against the Philistines
  '15':
  - type: text
    content: 'Once again there was a battle between the Philistines and Israel. David went down with his men to fight against the Philistines, and he became exhausted. '
  '16':
  - type: text
    content: And Ishbi-Benob, one of the descendants of Rapha, whose bronze spearhead weighed three hundred shekels
  - type: note
    content: That is, about 7 1/2 pounds or about 3.5 kilograms
  - type: text
    content: ' and who was armed with a new sword, said he would kill David. '
  '17':
  - type: text
    content: But Abishai son of Zeruiah came to David’s rescue; he struck the Philistine down and killed him. Then David’s men swore to him, saying, “Never again will you go out with us to battle, so that the lamp of Israel will not be extinguished.”
  '18':
  - type: text
    content: In the course of time, there was another battle with the Philistines, at Gob. At that time Sibbekai the Hushathite killed Saph, one of the descendants of Rapha.
  '19':
  - type: text
    content: In another battle with the Philistines at Gob, Elhanan son of Jair
  - type: note
    content: See 1 Chron. 20:5; Hebrew Jaare-Oregim.
  - type: text
    content: ' the Bethlehemite killed the brother of'
  - type: note
    content: See 1 Chron. 20:5; Hebrew does not have the brother of.
  - type: text
    content: ' Goliath the Gittite, who had a spear with a shaft like a weaver’s rod.'
  '2':
  - type: text
    content: 'The king summoned the Gibeonites and spoke to them. (Now the Gibeonites were not a part of Israel but were survivors of the Amorites; the Israelites had sworn to spare them, but Saul in his zeal for Israel and Judah had tried to annihilate them.) '
  '20':
  - type: text
    content: 'In still another battle, which took place at Gath, there was a huge man with six fingers on each hand and six toes on each foot—twenty-four in all. He also was descended from Rapha. '
  '21':
  - type: text
    content: When he taunted Israel, Jonathan son of Shimeah, David’s brother, killed him.
  '22':
  - type: text
    content: These four were descendants of Rapha in Gath, and they fell at the hands of David and his men.
  '3':
  - type: text
    content: 'David asked the Gibeonites, “What shall I do for you? How shall I make atonement so that you will bless the '
  - type: text
    content: Lord
  - type: text
    content: ’s inheritance?”
  '4':
  - type: text
    content: The Gibeonites answered him, “We have no right to demand silver or gold from Saul or his family, nor do we have the right to put anyone in Israel to death.”
  - type: text
    content: “What do you want me to do for you?” David asked.
  '5':
  - type: text
    content: 'They answered the king, “As for the man who destroyed us and plotted against us so that we have been decimated and have no place anywhere in Israel, '
  '6':
  - type: text
    content: 'let seven of his male descendants be given to us to be killed and their bodies exposed before the '
  - type: text
    content: Lord
  - type: text
    content: ' at Gibeah of Saul—the '
  - type: text
    content: Lord
  - type: text
    content: ’s chosen one.”
  - type: text
    content: So the king said, “I will give them to you.”
  '7':
  - type: text
    content: 'The king spared Mephibosheth son of Jonathan, the son of Saul, because of the oath before the '
  - type: text
    content: Lord
  - type: text
    content: ' between David and Jonathan son of Saul. '
  '8':
  - type: text
    content: But the king took Armoni and Mephibosheth, the two sons of Aiah’s daughter Rizpah, whom she had borne to Saul, together with the five sons of Saul’s daughter Merab,
  - type: note
    content: Two Hebrew manuscripts, some Septuagint manuscripts and Syriac (see also 1 Samuel 18:19); most Hebrew and Septuagint manuscripts Michal
  - type: text
    content: ' whom she had borne to Adriel son of Barzillai the Meholathite. '
  '9':
  - type: text
    content: 'He handed them over to the Gibeonites, who killed them and exposed their bodies on a hill before the '
  - type: text
    content: Lord
  - type: text
    content: . All seven of them fell together; they were put to death during the first days of the harvest, just as the barley harvest was beginning.
