document_id: 2SA.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Gibeonites Avenged
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During the reign of David, there was a famine for three successive years; so David sought the face of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “It is on account of Saul and his blood-stained house; it is because he put the Gibeonites to death.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rizpah daughter of Aiah took sackcloth and spread it out for herself on a rock. From the beginning of the harvest till the rain poured down from the heavens on the bodies, she did not let the birds touch them by day or the wild animals by night. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David was told what Aiah’s daughter Rizpah, Saul’s concubine, had done, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he went and took the bones of Saul and his son Jonathan from the citizens of Jabesh Gilead. (They had stolen their bodies from the public square at Beth Shan, where the Philistines had hung them after they struck Saul down on Gilboa.) '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David brought the bones of Saul and his son Jonathan from there, and the bones of those who had been killed and exposed were gathered up.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They buried the bones of Saul and his son Jonathan in the tomb of Saul’s father Kish, at Zela in Benjamin, and did everything the king commanded. After that, God answered prayer in behalf of the land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wars Against the Philistines
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once again there was a battle between the Philistines and Israel. David went down with his men to fight against the Philistines, and he became exhausted. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Ishbi-Benob, one of the descendants of Rapha, whose bronze spearhead weighed three hundred shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 7 1/2 pounds or about 3.5 kilograms
      marker-yv: yv-n
    - type: text
      text: ' and who was armed with a new sword, said he would kill David. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Abishai son of Zeruiah came to David’s rescue; he struck the Philistine down and killed him. Then David’s men swore to him, saying, “Never again will you go out with us to battle, so that the lamp of Israel will not be extinguished.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the course of time, there was another battle with the Philistines, at Gob. At that time Sibbekai the Hushathite killed Saph, one of the descendants of Rapha.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In another battle with the Philistines at Gob, Elhanan son of Jair
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See 1 Chron. 20:5; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jaare-Oregim.
      marker-yv: yv-n
    - type: text
      text: ' the Bethlehemite killed the brother of'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See 1 Chron. 20:5; Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: the brother of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Goliath the Gittite, who had a spear with a shaft like a weaver’s rod.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king summoned the Gibeonites and spoke to them. (Now the Gibeonites were not a part of Israel but were survivors of the Amorites; the Israelites had sworn to spare them, but Saul in his zeal for Israel and Judah had tried to annihilate them.) '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In still another battle, which took place at Gath, there was a huge man with six fingers on each hand and six toes on each foot—twenty-four in all. He also was descended from Rapha. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he taunted Israel, Jonathan son of Shimeah, David’s brother, killed him.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These four were descendants of Rapha in Gath, and they fell at the hands of David and his men.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David asked the Gibeonites, “What shall I do for you? How shall I make atonement so that you will bless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s inheritance?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Gibeonites answered him, “We have no right to demand silver or gold from Saul or his family, nor do we have the right to put anyone in Israel to death.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What do you want me to do for you?” David asked.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They answered the king, “As for the man who destroyed us and plotted against us so that we have been decimated and have no place anywhere in Israel, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'let seven of his male descendants be given to us to be killed and their bodies exposed before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at Gibeah of Saul—the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s chosen one.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king said, “I will give them to you.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king spared Mephibosheth son of Jonathan, the son of Saul, because of the oath before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' between David and Jonathan son of Saul. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the king took Armoni and Mephibosheth, the two sons of Aiah’s daughter Rizpah, whom she had borne to Saul, together with the five sons of Saul’s daughter Merab,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Two Hebrew manuscripts, some Septuagint manuscripts and Syriac (see also 1 Samuel 18:19); most Hebrew and Septuagint manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Michal
      marker-yv: yv-n
    - type: text
      text: ' whom she had borne to Adriel son of Barzillai the Meholathite. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He handed them over to the Gibeonites, who killed them and exposed their bodies on a hill before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . All seven of them fell together; they were put to death during the first days of the harvest, just as the barley harvest was beginning.
