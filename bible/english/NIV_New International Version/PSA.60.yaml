document_id: PSA.60,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 60In Hebrew texts 60:1-12 is numbered 60:3-14.
  - type: text
    content: 'For the director of music. To the tune of “The Lily of the Covenant.” A '
  - type: text
    content: miktam
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of David. For teaching. When he fought Aram Naharaim'
  - type: note
    content: 'Title: That is, Arameans of Northwest Mesopotamia'
  - type: text
    content: ' and Aram Zobah,'
  - type: note
    content: 'Title: That is, Arameans of central Syria'
  - type: text
    content: ' and when Joab returned and struck down twelve thousand Edomites in the Valley of Salt.'
  - type: text
    content: You have rejected us, God, and burst upon us;
  - type: text
    content: you have been angry—now restore us!
  '10':
  - type: text
    content: Is it not you, God, you who have now rejected us
  - type: text
    content: and no longer go out with our armies?
  '11':
  - type: text
    content: Give us aid against the enemy,
  - type: text
    content: for human help is worthless.
  '12':
  - type: text
    content: With God we will gain the victory,
  - type: text
    content: and he will trample down our enemies.
  '2':
  - type: text
    content: You have shaken the land and torn it open;
  - type: text
    content: mend its fractures, for it is quaking.
  '3':
  - type: text
    content: You have shown your people desperate times;
  - type: text
    content: you have given us wine that makes us stagger.
  '4':
  - type: text
    content: But for those who fear you, you have raised a banner
  - type: text
    content: to be unfurled against the bow.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '5':
  - type: text
    content: Save us and help us with your right hand,
  - type: text
    content: that those you love may be delivered.
  '6':
  - type: text
    content: 'God has spoken from his sanctuary:'
  - type: text
    content: “In triumph I will parcel out Shechem
  - type: text
    content: and measure off the Valley of Sukkoth.
  '7':
  - type: text
    content: Gilead is mine, and Manasseh is mine;
  - type: text
    content: Ephraim is my helmet,
  - type: text
    content: Judah is my scepter.
  '8':
  - type: text
    content: Moab is my washbasin,
  - type: text
    content: on Edom I toss my sandal;
  - type: text
    content: over Philistia I shout in triumph.”
  '9':
  - type: text
    content: Who will bring me to the fortified city?
  - type: text
    content: Who will lead me to Edom?
