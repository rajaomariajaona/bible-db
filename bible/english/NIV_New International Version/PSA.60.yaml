document_id: PSA.60
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 60
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 60:1-12 is numbered 60:3-14.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the director of music. To the tune of “The Lily of the Covenant.” A '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: miktam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a literary or musical term'
    marker-yv: yv-n
  - type: text
    text: ' of David. For teaching. When he fought Aram Naharaim'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: That is, Arameans of Northwest Mesopotamia'
    marker-yv: yv-n
  - type: text
    text: ' and Aram Zobah,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: That is, Arameans of central Syria'
    marker-yv: yv-n
  - type: text
    text: ' and when Joab returned and struck down twelve thousand Edomites in the Valley of Salt.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: You have rejected us, God, and burst upon us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have been angry—now restore us!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You have shaken the land and torn it open;
- type: usfm
  marker: q2
  children:
  - type: text
    text: mend its fractures, for it is quaking.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You have shown your people desperate times;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have given us wine that makes us stagger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But for those who fear you, you have raised a banner
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be unfurled against the bow.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '60:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Save us and help us with your right hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that those you love may be delivered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'God has spoken from his sanctuary:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “In triumph I will parcel out Shechem
- type: usfm
  marker: q2
  children:
  - type: text
    text: and measure off the Valley of Sukkoth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Gilead is mine, and Manasseh is mine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim is my helmet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Judah is my scepter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Moab is my washbasin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: on Edom I toss my sandal;
- type: usfm
  marker: q2
  children:
  - type: text
    text: over Philistia I shout in triumph.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who will bring me to the fortified city?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will lead me to Edom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Is it not you, God, you who have now rejected us
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no longer go out with our armies?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Give us aid against the enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for human help is worthless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: With God we will gain the victory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will trample down our enemies.
