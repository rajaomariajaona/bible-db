document_id: EST.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Haman Impaled
  - type: text
    content: 'So the king and Haman went to Queen Esther’s banquet, '
  '10':
  - type: text
    content: So they impaled Haman on the pole he had set up for Mordecai. Then the king’s fury subsided.
  '2':
  - type: text
    content: and as they were drinking wine on the second day, the king again asked, “Queen Esther, what is your petition? It will be given you. What is your request? Even up to half the kingdom, it will be granted.”
  '3':
  - type: text
    content: 'Then Queen Esther answered, “If I have found favor with you, Your Majesty, and if it pleases you, grant me my life—this is my petition. And spare my people—this is my request. '
  '4':
  - type: text
    content: For I and my people have been sold to be destroyed, killed and annihilated. If we had merely been sold as male and female slaves, I would have kept quiet, because no such distress would justify disturbing the king.
  - type: note
    content: Or quiet, but the compensation our adversary offers cannot be compared with the loss the king would suffer
  - type: text
    content: ”
  '5':
  - type: text
    content: King Xerxes asked Queen Esther, “Who is he? Where is he—the man who has dared to do such a thing?”
  '6':
  - type: text
    content: Esther said, “An adversary and enemy! This vile Haman!”
  - type: text
    content: 'Then Haman was terrified before the king and queen. '
  '7':
  - type: text
    content: The king got up in a rage, left his wine and went out into the palace garden. But Haman, realizing that the king had already decided his fate, stayed behind to beg Queen Esther for his life.
  '8':
  - type: text
    content: Just as the king returned from the palace garden to the banquet hall, Haman was falling on the couch where Esther was reclining.
  - type: text
    content: The king exclaimed, “Will he even molest the queen while she is with me in the house?”
  - type: text
    content: 'As soon as the word left the king’s mouth, they covered Haman’s face. '
  '9':
  - type: text
    content: Then Harbona, one of the eunuchs attending the king, said, “A pole reaching to a height of fifty cubits
  - type: note
    content: That is, about 75 feet or about 23 meters
  - type: text
    content: ' stands by Haman’s house. He had it set up for Mordecai, who spoke up to help the king.”'
  - type: text
    content: 'The king said, “Impale him on it!” '
