document_id: EST.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Haman Impaled
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'So the king and Haman went to Queen Esther’s banquet, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: So they impaled Haman on the pole he had set up for Mordecai. Then the king’s fury subsided.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: and as they were drinking wine on the second day, the king again asked, “Queen Esther, what is your petition? It will be given you. What is your request? Even up to half the kingdom, it will be granted.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then Queen Esther answered, “If I have found favor with you, Your Majesty, and if it pleases you, grant me my life—this is my petition. And spare my people—this is my request. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For I and my people have been sold to be destroyed, killed and annihilated. If we had merely been sold as male and female slaves, I would have kept quiet, because no such distress would justify disturbing the king.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quiet, but the compensation our adversary offers cannot be compared with the loss the king would suffer
      marker-yv: yv-n
    - type: text
      text: ”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: King Xerxes asked Queen Esther, “Who is he? Where is he—the man who has dared to do such a thing?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Esther said, “An adversary and enemy! This vile Haman!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Haman was terrified before the king and queen. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The king got up in a rage, left his wine and went out into the palace garden. But Haman, realizing that the king had already decided his fate, stayed behind to beg Queen Esther for his life.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Just as the king returned from the palace garden to the banquet hall, Haman was falling on the couch where Esther was reclining.
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king exclaimed, “Will he even molest the queen while she is with me in the house?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as the word left the king’s mouth, they covered Haman’s face. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then Harbona, one of the eunuchs attending the king, said, “A pole reaching to a height of fifty cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 75 feet or about 23 meters
      marker-yv: yv-n
    - type: text
      text: ' stands by Haman’s house. He had it set up for Mordecai, who spoke up to help the king.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king said, “Impale him on it!” '
