document_id: ISA.45,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to his anointed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to Cyrus, whose right hand I take hold of
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to subdue nations before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to strip kings of their armor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to open doors before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'so that gates will not be shut:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to the one who says to a father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘What have you begotten?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or to a mother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘What have you brought to birth?’
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the Holy One of Israel, and its Maker:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Concerning things to come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do you question me about my children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or give me orders about the work of my hands?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is I who made the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and created mankind on it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My own hands stretched out the heavens;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I marshaled their starry hosts.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will raise up Cyrus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: him
      marker-yv: yv-n
    - type: text
      text: ' in my righteousness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make all his ways straight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will rebuild my city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set my exiles free,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but not for a price or reward,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The products of Egypt and the merchandise of Cush,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the upper Nile region
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those tall Sabeans—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will come over to you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will be yours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will trudge behind you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: coming over to you in chains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will bow down before you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plead with you, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Surely God is with you, and there is no other;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no other god.’ ”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Truly you are a God who has been hiding himself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God and Savior of Israel.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the makers of idols will be put to shame and disgraced;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will go off into disgrace together.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But Israel will be saved by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with an everlasting salvation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will never be put to shame or disgraced,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to ages everlasting.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he who created the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he who fashioned and made the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he founded it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he did not create it to be empty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but formed it to be inhabited—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'he says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is no other.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have not spoken in secret,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from somewhere in a land of darkness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have not said to Jacob’s descendants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Seek me in vain.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', speak the truth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I declare what is right.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will go before you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will level the mountains
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dead Sea Scrolls and Septuagint; the meaning of the word in the Masoretic Text is uncertain.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will break down gates of bronze
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cut through bars of iron.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Gather together and come;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: assemble, you fugitives from the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ignorant are those who carry about idols of wood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who pray to gods that cannot save.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare what is to be, present it—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them take counsel together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who foretold this long ago,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who declared it from the distant past?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Was it not I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there is no God apart from me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a righteous God and a Savior;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is none but me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Turn to me and be saved,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all you ends of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am God, and there is no other.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By myself I have sworn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my mouth has uttered in all integrity
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a word that will not be revoked:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before me every knee will bow;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by me every tongue will swear.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will say of me, ‘In the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' alone'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are deliverance and strength.’ ”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who have raged against him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come to him and be put to shame.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But all the descendants of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'will find deliverance in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will make their boast in him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give you hidden treasures,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: riches stored in secret places,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so that you may know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Israel, who summons you by name.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the sake of Jacob my servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of Israel my chosen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I summon you by name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bestow on you a title of honor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though you do not acknowledge me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and there is no other;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: apart from me there is no God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will strengthen you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though you have not acknowledged me,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that from the rising of the sun
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the place of its setting
  - type: usfm
    marker: q1
    children:
    - type: text
      text: people may know there is none besides me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and there is no other.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I form the light and create darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I bring prosperity and create disaster;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do all these things.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You heavens above, rain down my righteousness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the clouds shower it down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the earth open wide,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let salvation spring up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let righteousness flourish with it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have created it.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to those who quarrel with their Maker,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who are nothing but potsherds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among the potsherds on the ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does the clay say to the potter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘What are you making?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does your work say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘The potter has no hands’?
