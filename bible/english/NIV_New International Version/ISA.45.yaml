document_id: ISA.45,111
type_code: eng
verses:
  '1':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to his anointed,'
  - type: text
    content: to Cyrus, whose right hand I take hold of
  - type: text
    content: to subdue nations before him
  - type: text
    content: and to strip kings of their armor,
  - type: text
    content: to open doors before him
  - type: text
    content: 'so that gates will not be shut:'
  '10':
  - type: text
    content: Woe to the one who says to a father,
  - type: text
    content: ‘What have you begotten?’
  - type: text
    content: or to a mother,
  - type: text
    content: ‘What have you brought to birth?’
  '11':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: 'the Holy One of Israel, and its Maker:'
  - type: text
    content: Concerning things to come,
  - type: text
    content: do you question me about my children,
  - type: text
    content: or give me orders about the work of my hands?
  '12':
  - type: text
    content: It is I who made the earth
  - type: text
    content: and created mankind on it.
  - type: text
    content: My own hands stretched out the heavens;
  - type: text
    content: I marshaled their starry hosts.
  '13':
  - type: text
    content: I will raise up Cyrus
  - type: note
    content: Hebrew him
  - type: text
    content: ' in my righteousness:'
  - type: text
    content: I will make all his ways straight.
  - type: text
    content: He will rebuild my city
  - type: text
    content: and set my exiles free,
  - type: text
    content: but not for a price or reward,
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.”'
  '14':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The products of Egypt and the merchandise of Cush,
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: and those tall Sabeans—
  - type: text
    content: they will come over to you
  - type: text
    content: and will be yours;
  - type: text
    content: they will trudge behind you,
  - type: text
    content: coming over to you in chains.
  - type: text
    content: They will bow down before you
  - type: text
    content: and plead with you, saying,
  - type: text
    content: ‘Surely God is with you, and there is no other;
  - type: text
    content: there is no other god.’ ”
  '15':
  - type: text
    content: Truly you are a God who has been hiding himself,
  - type: text
    content: the God and Savior of Israel.
  '16':
  - type: text
    content: All the makers of idols will be put to shame and disgraced;
  - type: text
    content: they will go off into disgrace together.
  '17':
  - type: text
    content: 'But Israel will be saved by the '
  - type: text
    content: Lord
  - type: text
    content: with an everlasting salvation;
  - type: text
    content: you will never be put to shame or disgraced,
  - type: text
    content: to ages everlasting.
  '18':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: he who created the heavens,
  - type: text
    content: he is God;
  - type: text
    content: he who fashioned and made the earth,
  - type: text
    content: he founded it;
  - type: text
    content: he did not create it to be empty,
  - type: text
    content: but formed it to be inhabited—
  - type: text
    content: 'he says:'
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and there is no other.
  '19':
  - type: text
    content: I have not spoken in secret,
  - type: text
    content: from somewhere in a land of darkness;
  - type: text
    content: I have not said to Jacob’s descendants,
  - type: text
    content: ‘Seek me in vain.’
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', speak the truth;'
  - type: text
    content: I declare what is right.
  '2':
  - type: text
    content: I will go before you
  - type: text
    content: and will level the mountains
  - type: note
    content: Dead Sea Scrolls and Septuagint; the meaning of the word in the Masoretic Text is uncertain.
  - type: text
    content: ;
  - type: text
    content: I will break down gates of bronze
  - type: text
    content: and cut through bars of iron.
  '20':
  - type: text
    content: “Gather together and come;
  - type: text
    content: assemble, you fugitives from the nations.
  - type: text
    content: Ignorant are those who carry about idols of wood,
  - type: text
    content: who pray to gods that cannot save.
  '21':
  - type: text
    content: Declare what is to be, present it—
  - type: text
    content: let them take counsel together.
  - type: text
    content: Who foretold this long ago,
  - type: text
    content: who declared it from the distant past?
  - type: text
    content: 'Was it not I, the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: And there is no God apart from me,
  - type: text
    content: a righteous God and a Savior;
  - type: text
    content: there is none but me.
  '22':
  - type: text
    content: “Turn to me and be saved,
  - type: text
    content: all you ends of the earth;
  - type: text
    content: for I am God, and there is no other.
  '23':
  - type: text
    content: By myself I have sworn,
  - type: text
    content: my mouth has uttered in all integrity
  - type: text
    content: 'a word that will not be revoked:'
  - type: text
    content: Before me every knee will bow;
  - type: text
    content: by me every tongue will swear.
  '24':
  - type: text
    content: 'They will say of me, ‘In the '
  - type: text
    content: Lord
  - type: text
    content: ' alone'
  - type: text
    content: are deliverance and strength.’ ”
  - type: text
    content: All who have raged against him
  - type: text
    content: will come to him and be put to shame.
  '25':
  - type: text
    content: But all the descendants of Israel
  - type: text
    content: 'will find deliverance in the '
  - type: text
    content: Lord
  - type: text
    content: and will make their boast in him.
  '3':
  - type: text
    content: I will give you hidden treasures,
  - type: text
    content: riches stored in secret places,
  - type: text
    content: 'so that you may know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the God of Israel, who summons you by name.
  '4':
  - type: text
    content: For the sake of Jacob my servant,
  - type: text
    content: of Israel my chosen,
  - type: text
    content: I summon you by name
  - type: text
    content: and bestow on you a title of honor,
  - type: text
    content: though you do not acknowledge me.
  '5':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', and there is no other;'
  - type: text
    content: apart from me there is no God.
  - type: text
    content: I will strengthen you,
  - type: text
    content: though you have not acknowledged me,
  '6':
  - type: text
    content: so that from the rising of the sun
  - type: text
    content: to the place of its setting
  - type: text
    content: people may know there is none besides me.
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', and there is no other.'
  '7':
  - type: text
    content: I form the light and create darkness,
  - type: text
    content: I bring prosperity and create disaster;
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', do all these things.'
  '8':
  - type: text
    content: “You heavens above, rain down my righteousness;
  - type: text
    content: let the clouds shower it down.
  - type: text
    content: Let the earth open wide,
  - type: text
    content: let salvation spring up,
  - type: text
    content: let righteousness flourish with it;
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have created it.'
  '9':
  - type: text
    content: “Woe to those who quarrel with their Maker,
  - type: text
    content: those who are nothing but potsherds
  - type: text
    content: among the potsherds on the ground.
  - type: text
    content: Does the clay say to the potter,
  - type: text
    content: ‘What are you making?’
  - type: text
    content: Does your work say,
  - type: text
    content: ‘The potter has no hands’?
