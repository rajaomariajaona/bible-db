document_id: PSA.28,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 28
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I call;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are my Rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not turn a deaf ear to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For if you remain silent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be like those who go down to the pit.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear my cry for mercy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I call to you for help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as I lift up my hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: toward your Most Holy Place.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not drag me away with the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with those who do evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who speak cordially with their neighbors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but harbor malice in their hearts.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Repay them for their deeds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for their evil work;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: repay them for what their hands have done
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring back on them what they deserve.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because they have no regard for the deeds of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and what his hands have done,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will tear them down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and never build them up again.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he has heard my cry for mercy.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my strength and my shield;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart trusts in him, and he helps me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart leaps for joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with my song I praise him.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is the strength of his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a fortress of salvation for his anointed one.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save your people and bless your inheritance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be their shepherd and carry them forever.
