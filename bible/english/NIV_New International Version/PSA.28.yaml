document_id: PSA.28,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 28
  - type: text
    content: Of David.
  - type: text
    content: 'To you, '
  - type: text
    content: Lord
  - type: text
    content: ', I call;'
  - type: text
    content: you are my Rock,
  - type: text
    content: do not turn a deaf ear to me.
  - type: text
    content: For if you remain silent,
  - type: text
    content: I will be like those who go down to the pit.
  '2':
  - type: text
    content: Hear my cry for mercy
  - type: text
    content: as I call to you for help,
  - type: text
    content: as I lift up my hands
  - type: text
    content: toward your Most Holy Place.
  '3':
  - type: text
    content: Do not drag me away with the wicked,
  - type: text
    content: with those who do evil,
  - type: text
    content: who speak cordially with their neighbors
  - type: text
    content: but harbor malice in their hearts.
  '4':
  - type: text
    content: Repay them for their deeds
  - type: text
    content: and for their evil work;
  - type: text
    content: repay them for what their hands have done
  - type: text
    content: and bring back on them what they deserve.
  '5':
  - type: text
    content: 'Because they have no regard for the deeds of the '
  - type: text
    content: Lord
  - type: text
    content: and what his hands have done,
  - type: text
    content: he will tear them down
  - type: text
    content: and never build them up again.
  '6':
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he has heard my cry for mercy.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my strength and my shield;'
  - type: text
    content: my heart trusts in him, and he helps me.
  - type: text
    content: My heart leaps for joy,
  - type: text
    content: and with my song I praise him.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is the strength of his people,'
  - type: text
    content: a fortress of salvation for his anointed one.
  '9':
  - type: text
    content: Save your people and bless your inheritance;
  - type: text
    content: be their shepherd and carry them forever.
