document_id: PSA.88,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 88In Hebrew texts 88:1-18 is numbered 88:2-19.
  - type: text
    content: 'A song. A psalm of the Sons of Korah. For the director of music. According to '
  - type: text
    content: mahalath leannoth.
  - type: note
    content: 'Title: Possibly a tune, “The Suffering of Affliction”'
  - type: text
    content: ' A '
  - type: text
    content: maskil
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of Heman the Ezrahite.'
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you are the God who saves me;'
  - type: text
    content: day and night I cry out to you.
  '10':
  - type: text
    content: Do you show your wonders to the dead?
  - type: text
    content: Do their spirits rise up and praise you?
  '11':
  - type: text
    content: Is your love declared in the grave,
  - type: text
    content: your faithfulness in Destruction
  - type: note
    content: Hebrew Abaddon
  - type: text
    content: '?'
  '12':
  - type: text
    content: Are your wonders known in the place of darkness,
  - type: text
    content: or your righteous deeds in the land of oblivion?
  '13':
  - type: text
    content: 'But I cry to you for help, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: in the morning my prayer comes before you.
  '14':
  - type: text
    content: 'Why, '
  - type: text
    content: Lord
  - type: text
    content: ', do you reject me'
  - type: text
    content: and hide your face from me?
  '15':
  - type: text
    content: From my youth I have suffered and been close to death;
  - type: text
    content: I have borne your terrors and am in despair.
  '16':
  - type: text
    content: Your wrath has swept over me;
  - type: text
    content: your terrors have destroyed me.
  '17':
  - type: text
    content: All day long they surround me like a flood;
  - type: text
    content: they have completely engulfed me.
  '18':
  - type: text
    content: You have taken from me friend and neighbor—
  - type: text
    content: darkness is my closest friend.
  '2':
  - type: text
    content: May my prayer come before you;
  - type: text
    content: turn your ear to my cry.
  '3':
  - type: text
    content: I am overwhelmed with troubles
  - type: text
    content: and my life draws near to death.
  '4':
  - type: text
    content: I am counted among those who go down to the pit;
  - type: text
    content: I am like one without strength.
  '5':
  - type: text
    content: I am set apart with the dead,
  - type: text
    content: like the slain who lie in the grave,
  - type: text
    content: whom you remember no more,
  - type: text
    content: who are cut off from your care.
  '6':
  - type: text
    content: You have put me in the lowest pit,
  - type: text
    content: in the darkest depths.
  '7':
  - type: text
    content: Your wrath lies heavily on me;
  - type: text
    content: you have overwhelmed me with all your waves.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 10.
  '8':
  - type: text
    content: You have taken from me my closest friends
  - type: text
    content: and have made me repulsive to them.
  - type: text
    content: I am confined and cannot escape;
  '9':
  - type: text
    content: my eyes are dim with grief.
  - type: text
    content: 'I call to you, '
  - type: text
    content: Lord
  - type: text
    content: ', every day;'
  - type: text
    content: I spread out my hands to you.
