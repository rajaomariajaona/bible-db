    children:
    - type: text
      text: mahalath leannoth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Possibly a tune, “The Suffering of Affliction”'
    marker-yv: yv-n
  - type: text
    text: ' A '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: maskil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a literary or musical term'
    marker-yv: yv-n
  - type: text
    text: ' of Heman the Ezrahite.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you are the God who saves me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: day and night I cry out to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May my prayer come before you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: turn your ear to my cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I am overwhelmed with troubles
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my life draws near to death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I am counted among those who go down to the pit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am like one without strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I am set apart with the dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the slain who lie in the grave,
- type: usfm
  marker: q1
  children:
  - type: text
    text: whom you remember no more,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are cut off from your care.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You have put me in the lowest pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the darkest depths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Your wrath lies heavily on me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have overwhelmed me with all your waves.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '88:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here and at the end of verse 10.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You have taken from me my closest friends
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have made me repulsive to them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am confined and cannot escape;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: my eyes are dim with grief.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I call to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', every day;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I spread out my hands to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Do you show your wonders to the dead?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do their spirits rise up and praise you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Is your love declared in the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your faithfulness in Destruction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '88:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Abaddon
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Are your wonders known in the place of darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or your righteous deeds in the land of oblivion?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But I cry to you for help, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the morning my prayer comes before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Why, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do you reject me'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hide your face from me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: From my youth I have suffered and been close to death;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have borne your terrors and am in despair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Your wrath has swept over me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your terrors have destroyed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All day long they surround me like a flood;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have completely engulfed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You have taken from me friend and neighbor—
- type: usfm
  marker: q2
  children:
  - type: text
    text: darkness is my closest friend.
