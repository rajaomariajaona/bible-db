document_id: JAS.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Submit Yourselves to God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'What causes fights and quarrels among you? Don’t they come from your desires that battle within you? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Humble yourselves before the Lord, and he will lift you up.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Brothers and sisters, do not slander one another. Anyone who speaks against a brother or sister
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brother or sister '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: adelphos
        - type: text
          text: ) refers here to a believer, whether man or woman, as part of God’s family.
      marker-yv: yv-n
    - type: text
      text: ' or judges them speaks against the law and judges it. When you judge the law, you are not keeping it, but sitting in judgment on it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: There is only one Lawgiver and Judge, the one who is able to save and destroy. But you—who are you to judge your neighbor?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Boasting About Tomorrow
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now listen, you who say, “Today or tomorrow we will go to this or that city, spend a year there, carry on business and make money.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Why, you do not even know what will happen tomorrow. What is your life? You are a mist that appears for a little while and then vanishes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Instead, you ought to say, “If it is the Lord’s will, we will live and do this or that.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'As it is, you boast in your arrogant schemes. All such boasting is evil. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: If anyone, then, knows the good they ought to do and doesn’t do it, it is sin for them.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'You desire but do not have, so you kill. You covet but you cannot get what you want, so you quarrel and fight. You do not have because you do not ask God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When you ask, you do not receive, because you ask with wrong motives, that you may spend what you get on your pleasures.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You adulterous people,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An allusion to covenant unfaithfulness; see Hosea 3:1.
      marker-yv: yv-n
    - type: text
      text: ' don’t you know that friendship with the world means enmity against God? Therefore, anyone who chooses to be a friend of the world becomes an enemy of God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Or do you think Scripture says without reason that he jealously longs for the spirit he has caused to dwell in us
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'that the spirit he caused to dwell in us envies intensely; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: that the Spirit he caused to dwell in us longs jealously
      marker-yv: yv-n
    - type: text
      text: '? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But he gives us more grace. That is why Scripture says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God opposes the proud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but shows favor to the humble.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Prov. 3:34
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Submit yourselves, then, to God. Resist the devil, and he will flee from you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Come near to God and he will come near to you. Wash your hands, you sinners, and purify your hearts, you double-minded. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Grieve, mourn and wail. Change your laughter to mourning and your joy to gloom. '
