document_id: JHN.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Anointed at Bethany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six days before the Passover, Jesus came to Bethany, where Lazarus lived, whom Jesus had raised from the dead. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the chief priests made plans to kill Lazarus as well, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for on account of him many of the Jews were going over to Jesus and believing in him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Comes to Jerusalem as King
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day the great crowd that had come for the festival heard that Jesus was on his way to Jerusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They took palm branches and went out to meet him, shouting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hosanna!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Hebrew expression meaning “Save!” which became an exclamation of praise
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Blessed is he who comes in the name of the Lord!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 118:25,26
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Blessed is the king of Israel!”
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jesus found a young donkey and sat on it, as it is written:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not be afraid, Daughter Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: see, your king is coming,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: seated on a donkey’s colt.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zech. 9:9
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At first his disciples did not understand all this. Only after Jesus was glorified did they realize that these things had been written about him and that these things had been done to him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the crowd that was with him when he called Lazarus from the tomb and raised him from the dead continued to spread the word. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many people, because they had heard that he had performed this sign, went out to meet him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the Pharisees said to one another, “See, this is getting us nowhere. Look how the whole world has gone after him!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts His Death
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here a dinner was given in Jesus’ honor. Martha served, while Lazarus was among those reclining at the table with him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there were some Greeks among those who went up to worship at the festival. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They came to Philip, who was from Bethsaida in Galilee, with a request. “Sir,” they said, “we would like to see Jesus.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Philip went to tell Andrew; Andrew and Philip in turn told Jesus.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The hour has come for the Son of Man to be glorified.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Very truly I tell you, unless a kernel of wheat falls to the ground and dies, it remains only a single seed. But if it dies, it produces many seeds.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Anyone who loves their life will lose it, while anyone who hates their life in this world will keep it for eternal life.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever serves me must follow me; and where I am, my servant also will be. My Father will honor the one who serves me.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now my soul is troubled, and what shall I say? ‘Father, save me from this hour’? No, it was for this very reason I came to this hour.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Father, glorify your name!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a voice came from heaven, “I have glorified it, and will glorify it again.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The crowd that was there and heard it said it had thundered; others said an angel had spoken to him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Mary took about a pint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or about 0.5 liter
      marker-yv: yv-n
    - type: text
      text: ' of pure nard, an expensive perfume; she poured it on Jesus’ feet and wiped his feet with her hair. And the house was filled with the fragrance of the perfume.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This voice was for your benefit, not mine.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now is the time for judgment on this world; now the prince of this world will be driven out.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I, when I am lifted up
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lifted up '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'also means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exalted.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: from the earth, will draw all people to myself.”
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said this to show the kind of death he was going to die.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The crowd spoke up, “We have heard from the Law that the Messiah will remain forever, so how can you say, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘The Son of Man must be lifted up’
    - type: text
      text: '? Who is this ‘Son of Man’?”'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are going to have the light just a little while longer. Walk while you have the light, before darkness overtakes you. Whoever walks in the dark does not know where they are going.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Believe in the light while you have the light, so that you may become children of light.”
    - type: text
      text: ' When he had finished speaking, Jesus left and hid himself from them.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Belief and Unbelief Among the Jews
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even after Jesus had performed so many signs in their presence, they still would not believe in him. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This was to fulfill the word of Isaiah the prophet:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Lord, who has believed our message
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to whom has the arm of the Lord been revealed?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 53:1
      marker-yv: yv-n
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason they could not believe, because, as Isaiah says elsewhere:'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But one of his disciples, Judas Iscariot, who was later to betray him, objected, '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He has blinded their eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hardened their hearts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so they can neither see with their eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor understand with their hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor turn—and I would heal them.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 6:10
      marker-yv: yv-n
  '41':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Isaiah said this because he saw Jesus’ glory and spoke about him.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet at the same time many even among the leaders believed in him. But because of the Pharisees they would not openly acknowledge their faith for fear they would be put out of the synagogue; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for they loved human praise more than praise from God.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus cried out, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whoever believes in me does not believe in me only, but in the one who sent me.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The one who looks at me is seeing the one who sent me.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have come into the world as a light, so that no one who believes in me should stay in darkness.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If anyone hears my words but does not keep them, I do not judge that person. For I did not come to judge the world, but to save the world.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: There is a judge for the one who rejects me and does not accept my words; the very words I have spoken will condemn them at the last day.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I did not speak on my own, but the Father who sent me commanded me to say all that I have spoken.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why wasn’t this perfume sold and the money given to the poor? It was worth a year’s wages.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: three hundred denarii
      marker-yv: yv-n
    - type: text
      text: '” '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know that his command leads to eternal life. So whatever I say is just what the Father has told me to say.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did not say this because he cared about the poor but because he was a thief; as keeper of the money bag, he used to help himself to what was put into it.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Leave her alone,”
    - type: text
      text: ' Jesus replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It was intended that she should save this perfume for the day of my burial.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You will always have the poor among you,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Deut. 15:11.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but you will not always have me.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile a large crowd of Jews found out that Jesus was there and came, not only because of him but also to see Lazarus, whom he had raised from the dead. '
