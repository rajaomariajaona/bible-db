document_id: JHN.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Anointed at Bethany
  - type: text
    content: 'Six days before the Passover, Jesus came to Bethany, where Lazarus lived, whom Jesus had raised from the dead. '
  '10':
  - type: text
    content: 'So the chief priests made plans to kill Lazarus as well, '
  '11':
  - type: text
    content: for on account of him many of the Jews were going over to Jesus and believing in him.
  - type: heading
    content: Jesus Comes to Jerusalem as King
  '12':
  - type: text
    content: 'The next day the great crowd that had come for the festival heard that Jesus was on his way to Jerusalem. '
  '13':
  - type: text
    content: They took palm branches and went out to meet him, shouting,
  - type: text
    content: “Hosanna!
  - type: note
    content: A Hebrew expression meaning “Save!” which became an exclamation of praise
  - type: text
    content: ”
  - type: text
    content: “Blessed is he who comes in the name of the Lord!”
  - type: note
    content: Psalm 118:25,26
  - type: text
    content: “Blessed is the king of Israel!”
  '14':
  - type: text
    content: 'Jesus found a young donkey and sat on it, as it is written:'
  '15':
  - type: text
    content: “Do not be afraid, Daughter Zion;
  - type: text
    content: see, your king is coming,
  - type: text
    content: seated on a donkey’s colt.”
  - type: note
    content: Zech. 9:9
  '16':
  - type: text
    content: At first his disciples did not understand all this. Only after Jesus was glorified did they realize that these things had been written about him and that these things had been done to him.
  '17':
  - type: text
    content: 'Now the crowd that was with him when he called Lazarus from the tomb and raised him from the dead continued to spread the word. '
  '18':
  - type: text
    content: 'Many people, because they had heard that he had performed this sign, went out to meet him. '
  '19':
  - type: text
    content: So the Pharisees said to one another, “See, this is getting us nowhere. Look how the whole world has gone after him!”
  - type: heading
    content: Jesus Predicts His Death
  '2':
  - type: text
    content: 'Here a dinner was given in Jesus’ honor. Martha served, while Lazarus was among those reclining at the table with him. '
  '20':
  - type: text
    content: 'Now there were some Greeks among those who went up to worship at the festival. '
  '21':
  - type: text
    content: 'They came to Philip, who was from Bethsaida in Galilee, with a request. “Sir,” they said, “we would like to see Jesus.” '
  '22':
  - type: text
    content: Philip went to tell Andrew; Andrew and Philip in turn told Jesus.
  '23':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “The hour has come for the Son of Man to be glorified.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Very truly I tell you, unless a kernel of wheat falls to the ground and dies, it remains only a single seed. But if it dies, it produces many seeds.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Anyone who loves their life will lose it, while anyone who hates their life in this world will keep it for eternal life.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Whoever serves me must follow me; and where I am, my servant also will be. My Father will honor the one who serves me.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “Now my soul is troubled, and what shall I say? ‘Father, save me from this hour’? No, it was for this very reason I came to this hour.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Father, glorify your name!”
  - type: text
    content: 'Then a voice came from heaven, “I have glorified it, and will glorify it again.” '
  '29':
  - type: text
    content: The crowd that was there and heard it said it had thundered; others said an angel had spoken to him.
  '3':
  - type: text
    content: Then Mary took about a pint
  - type: note
    content: Or about 0.5 liter
  - type: text
    content: ' of pure nard, an expensive perfume; she poured it on Jesus’ feet and wiped his feet with her hair. And the house was filled with the fragrance of the perfume.'
  '30':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “This voice was for your benefit, not mine.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Now is the time for judgment on this world; now the prince of this world will be driven out.
  - type: text
    content: ' '
  '32':
  - type: text
    content: And I, when I am lifted up
  - type: note
    content: The Greek for lifted up also means exalted.
  - type: text
    content: ' '
  - type: text
    content: from the earth, will draw all people to myself.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: He said this to show the kind of death he was going to die.
  '34':
  - type: text
    content: 'The crowd spoke up, “We have heard from the Law that the Messiah will remain forever, so how can you say, '
  - type: text
    content: ‘The Son of Man must be lifted up’
  - type: text
    content: '? Who is this ‘Son of Man’?”'
  '35':
  - type: text
    content: 'Then Jesus told them, '
  - type: text
    content: “You are going to have the light just a little while longer. Walk while you have the light, before darkness overtakes you. Whoever walks in the dark does not know where they are going.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Believe in the light while you have the light, so that you may become children of light.”
  - type: text
    content: ' When he had finished speaking, Jesus left and hid himself from them.'
  - type: heading
    content: Belief and Unbelief Among the Jews
  '37':
  - type: text
    content: 'Even after Jesus had performed so many signs in their presence, they still would not believe in him. '
  '38':
  - type: text
    content: 'This was to fulfill the word of Isaiah the prophet:'
  - type: text
    content: “Lord, who has believed our message
  - type: text
    content: and to whom has the arm of the Lord been revealed?”
  - type: note
    content: Isaiah 53:1
  '39':
  - type: text
    content: 'For this reason they could not believe, because, as Isaiah says elsewhere:'
  '4':
  - type: text
    content: 'But one of his disciples, Judas Iscariot, who was later to betray him, objected, '
  '40':
  - type: text
    content: “He has blinded their eyes
  - type: text
    content: and hardened their hearts,
  - type: text
    content: so they can neither see with their eyes,
  - type: text
    content: nor understand with their hearts,
  - type: text
    content: nor turn—and I would heal them.”
  - type: note
    content: Isaiah 6:10
  '41':
  - type: text
    content: Isaiah said this because he saw Jesus’ glory and spoke about him.
  '42':
  - type: text
    content: 'Yet at the same time many even among the leaders believed in him. But because of the Pharisees they would not openly acknowledge their faith for fear they would be put out of the synagogue; '
  '43':
  - type: text
    content: for they loved human praise more than praise from God.
  '44':
  - type: text
    content: 'Then Jesus cried out, '
  - type: text
    content: “Whoever believes in me does not believe in me only, but in the one who sent me.
  - type: text
    content: ' '
  '45':
  - type: text
    content: The one who looks at me is seeing the one who sent me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: I have come into the world as a light, so that no one who believes in me should stay in darkness.
  '47':
  - type: text
    content: ' '
  - type: text
    content: “If anyone hears my words but does not keep them, I do not judge that person. For I did not come to judge the world, but to save the world.
  - type: text
    content: ' '
  '48':
  - type: text
    content: There is a judge for the one who rejects me and does not accept my words; the very words I have spoken will condemn them at the last day.
  - type: text
    content: ' '
  '49':
  - type: text
    content: For I did not speak on my own, but the Father who sent me commanded me to say all that I have spoken.
  - type: text
    content: ' '
  '5':
  - type: text
    content: “Why wasn’t this perfume sold and the money given to the poor? It was worth a year’s wages.
  - type: note
    content: Greek three hundred denarii
  - type: text
    content: '” '
  '50':
  - type: text
    content: I know that his command leads to eternal life. So whatever I say is just what the Father has told me to say.”
  '6':
  - type: text
    content: He did not say this because he cared about the poor but because he was a thief; as keeper of the money bag, he used to help himself to what was put into it.
  '7':
  - type: text
    content: ' '
  - type: text
    content: “Leave her alone,”
  - type: text
    content: ' Jesus replied. '
  - type: text
    content: “It was intended that she should save this perfume for the day of my burial.
  - type: text
    content: ' '
  '8':
  - type: text
    content: You will always have the poor among you,
  - type: note
    content: See Deut. 15:11.
  - type: text
    content: ' '
  - type: text
    content: but you will not always have me.”
  '9':
  - type: text
    content: 'Meanwhile a large crowd of Jews found out that Jesus was there and came, not only because of him but also to see Lazarus, whom he had raised from the dead. '
