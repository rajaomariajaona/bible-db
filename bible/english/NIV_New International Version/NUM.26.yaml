    text: 'The descendants of Gad by their clans were:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Zephon, the Zephonite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Haggi, the Haggite clan;
- type: usfm
  marker: li1
  children:
