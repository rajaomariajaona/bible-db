document_id: NUM.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Second Census
  - type: text
    content: 'After the plague the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Eleazar son of Aaron, the priest, '
  '10':
  - type: text
    content: 'The earth opened its mouth and swallowed them along with Korah, whose followers died when the fire devoured the 250 men. And they served as a warning sign. '
  '11':
  - type: text
    content: The line of Korah, however, did not die out.
  '12':
  - type: text
    content: 'The descendants of Simeon by their clans were:'
  - type: text
    content: through Nemuel, the Nemuelite clan;
  - type: text
    content: through Jamin, the Jaminite clan;
  - type: text
    content: through Jakin, the Jakinite clan;
  '13':
  - type: text
    content: through Zerah, the Zerahite clan;
  - type: text
    content: through Shaul, the Shaulite clan.
  '14':
  - type: text
    content: These were the clans of Simeon; those numbered were 22,200.
  '15':
  - type: text
    content: 'The descendants of Gad by their clans were:'
  - type: text
    content: through Zephon, the Zephonite clan;
  - type: text
    content: through Haggi, the Haggite clan;
  - type: text
    content: through Shuni, the Shunite clan;
  '16':
  - type: text
    content: through Ozni, the Oznite clan;
  - type: text
    content: through Eri, the Erite clan;
  '17':
  - type: text
    content: through Arodi,
  - type: note
    content: Samaritan Pentateuch and Syriac (see also Gen. 46:16); Masoretic Text Arod
  - type: text
    content: ' the Arodite clan;'
  - type: text
    content: through Areli, the Arelite clan.
  '18':
  - type: text
    content: These were the clans of Gad; those numbered were 40,500.
  '19':
  - type: text
    content: Er and Onan were sons of Judah, but they died in Canaan.
  '2':
  - type: text
    content: '“Take a census of the whole Israelite community by families—all those twenty years old or more who are able to serve in the army of Israel.” '
  '20':
  - type: text
    content: 'The descendants of Judah by their clans were:'
  - type: text
    content: through Shelah, the Shelanite clan;
  - type: text
    content: through Perez, the Perezite clan;
  - type: text
    content: through Zerah, the Zerahite clan.
  '21':
  - type: text
    content: 'The descendants of Perez were:'
  - type: text
    content: through Hezron, the Hezronite clan;
  - type: text
    content: through Hamul, the Hamulite clan.
  '22':
  - type: text
    content: These were the clans of Judah; those numbered were 76,500.
  '23':
  - type: text
    content: 'The descendants of Issachar by their clans were:'
  - type: text
    content: through Tola, the Tolaite clan;
  - type: text
    content: through Puah, the Puite
  - type: note
    content: Samaritan Pentateuch, Septuagint, Vulgate and Syriac (see also 1 Chron. 7:1); Masoretic Text through Puvah, the Punite
  - type: text
    content: ' clan;'
  '24':
  - type: text
    content: through Jashub, the Jashubite clan;
  - type: text
    content: through Shimron, the Shimronite clan.
  '25':
  - type: text
    content: These were the clans of Issachar; those numbered were 64,300.
  '26':
  - type: text
    content: 'The descendants of Zebulun by their clans were:'
  - type: text
    content: through Sered, the Seredite clan;
  - type: text
    content: through Elon, the Elonite clan;
  - type: text
    content: through Jahleel, the Jahleelite clan.
  '27':
  - type: text
    content: These were the clans of Zebulun; those numbered were 60,500.
  '28':
  - type: text
    content: 'The descendants of Joseph by their clans through Manasseh and Ephraim were:'
  '29':
  - type: text
    content: 'The descendants of Manasseh:'
  - type: text
    content: through Makir, the Makirite clan (Makir was the father of Gilead);
  - type: text
    content: through Gilead, the Gileadite clan.
  '3':
  - type: text
    content: 'So on the plains of Moab by the Jordan across from Jericho, Moses and Eleazar the priest spoke with them and said, '
  '30':
  - type: text
    content: 'These were the descendants of Gilead:'
  - type: text
    content: through Iezer, the Iezerite clan;
  - type: text
    content: through Helek, the Helekite clan;
  '31':
  - type: text
    content: through Asriel, the Asrielite clan;
  - type: text
    content: through Shechem, the Shechemite clan;
  '32':
  - type: text
    content: through Shemida, the Shemidaite clan;
  - type: text
    content: through Hepher, the Hepherite clan.
  '33':
  - type: text
    content: (Zelophehad son of Hepher had no sons; he had only daughters, whose names were Mahlah, Noah, Hoglah, Milkah and Tirzah.)
  '34':
  - type: text
    content: These were the clans of Manasseh; those numbered were 52,700.
  '35':
  - type: text
    content: 'These were the descendants of Ephraim by their clans:'
  - type: text
    content: through Shuthelah, the Shuthelahite clan;
  - type: text
    content: through Beker, the Bekerite clan;
  - type: text
    content: through Tahan, the Tahanite clan.
  '36':
  - type: text
    content: 'These were the descendants of Shuthelah:'
  - type: text
    content: through Eran, the Eranite clan.
  '37':
  - type: text
    content: These were the clans of Ephraim; those numbered were 32,500.
  - type: text
    content: These were the descendants of Joseph by their clans.
  '38':
  - type: text
    content: 'The descendants of Benjamin by their clans were:'
  - type: text
    content: through Bela, the Belaite clan;
  - type: text
    content: through Ashbel, the Ashbelite clan;
  - type: text
    content: through Ahiram, the Ahiramite clan;
  '39':
  - type: text
    content: through Shupham,
  - type: note
    content: A few manuscripts of the Masoretic Text, Samaritan Pentateuch, Vulgate and Syriac (see also Septuagint); most manuscripts of the Masoretic Text Shephupham
  - type: text
    content: ' the Shuphamite clan;'
  - type: text
    content: through Hupham, the Huphamite clan.
  '4':
  - type: text
    content: '“Take a census of the men twenty years old or more, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.”'
  - type: text
    content: 'These were the Israelites who came out of Egypt:'
  '40':
  - type: text
    content: 'The descendants of Bela through Ard and Naaman were:'
  - type: text
    content: through Ard,
  - type: note
    content: Samaritan Pentateuch and Vulgate (see also Septuagint); Masoretic Text does not have through Ard.
  - type: text
    content: ' the Ardite clan;'
  - type: text
    content: through Naaman, the Naamite clan.
  '41':
  - type: text
    content: These were the clans of Benjamin; those numbered were 45,600.
  '42':
  - type: text
    content: 'These were the descendants of Dan by their clans:'
  - type: text
    content: through Shuham, the Shuhamite clan.
  - type: text
    content: 'These were the clans of Dan: '
  '43':
  - type: text
    content: All of them were Shuhamite clans; and those numbered were 64,400.
  '44':
  - type: text
    content: 'The descendants of Asher by their clans were:'
  - type: text
    content: through Imnah, the Imnite clan;
  - type: text
    content: through Ishvi, the Ishvite clan;
  - type: text
    content: through Beriah, the Beriite clan;
  '45':
  - type: text
    content: 'and through the descendants of Beriah:'
  - type: text
    content: through Heber, the Heberite clan;
  - type: text
    content: through Malkiel, the Malkielite clan.
  '46':
  - type: text
    content: (Asher had a daughter named Serah.)
  '47':
  - type: text
    content: These were the clans of Asher; those numbered were 53,400.
  '48':
  - type: text
    content: 'The descendants of Naphtali by their clans were:'
  - type: text
    content: through Jahzeel, the Jahzeelite clan;
  - type: text
    content: through Guni, the Gunite clan;
  '49':
  - type: text
    content: through Jezer, the Jezerite clan;
  - type: text
    content: through Shillem, the Shillemite clan.
  '5':
  - type: text
    content: 'The descendants of Reuben, the firstborn son of Israel, were:'
  - type: text
    content: through Hanok, the Hanokite clan;
  - type: text
    content: through Pallu, the Palluite clan;
  '50':
  - type: text
    content: These were the clans of Naphtali; those numbered were 45,400.
  '51':
  - type: text
    content: The total number of the men of Israel was 601,730.
  '52':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '53':
  - type: text
    content: '“The land is to be allotted to them as an inheritance based on the number of names. '
  '54':
  - type: text
    content: 'To a larger group give a larger inheritance, and to a smaller group a smaller one; each is to receive its inheritance according to the number of those listed. '
  '55':
  - type: text
    content: 'Be sure that the land is distributed by lot. What each group inherits will be according to the names for its ancestral tribe. '
  '56':
  - type: text
    content: Each inheritance is to be distributed by lot among the larger and smaller groups.”
  '57':
  - type: text
    content: 'These were the Levites who were counted by their clans:'
  - type: text
    content: through Gershon, the Gershonite clan;
  - type: text
    content: through Kohath, the Kohathite clan;
  - type: text
    content: through Merari, the Merarite clan.
  '58':
  - type: text
    content: 'These also were Levite clans:'
  - type: text
    content: the Libnite clan,
  - type: text
    content: the Hebronite clan,
  - type: text
    content: the Mahlite clan,
  - type: text
    content: the Mushite clan,
  - type: text
    content: the Korahite clan.
  - type: text
    content: '(Kohath was the forefather of Amram; '
  '59':
  - type: text
    content: the name of Amram’s wife was Jochebed, a descendant of Levi, who was born to the Levites
  - type: note
    content: Or Jochebed, a daughter of Levi, who was born to Levi
  - type: text
    content: ' in Egypt. To Amram she bore Aaron, Moses and their sister Miriam. '
  '6':
  - type: text
    content: through Hezron, the Hezronite clan;
  - type: text
    content: through Karmi, the Karmite clan.
  '60':
  - type: text
    content: 'Aaron was the father of Nadab and Abihu, Eleazar and Ithamar. '
  '61':
  - type: text
    content: 'But Nadab and Abihu died when they made an offering before the '
  - type: text
    content: Lord
  - type: text
    content: ' with unauthorized fire.)'
  '62':
  - type: text
    content: All the male Levites a month old or more numbered 23,000. They were not counted along with the other Israelites because they received no inheritance among them.
  '63':
  - type: text
    content: 'These are the ones counted by Moses and Eleazar the priest when they counted the Israelites on the plains of Moab by the Jordan across from Jericho. '
  '64':
  - type: text
    content: 'Not one of them was among those counted by Moses and Aaron the priest when they counted the Israelites in the Desert of Sinai. '
  '65':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had told those Israelites they would surely die in the wilderness, and not one of them was left except Caleb son of Jephunneh and Joshua son of Nun.'
  '7':
  - type: text
    content: These were the clans of Reuben; those numbered were 43,730.
  '8':
  - type: text
    content: 'The son of Pallu was Eliab, '
  '9':
  - type: text
    content: 'and the sons of Eliab were Nemuel, Dathan and Abiram. The same Dathan and Abiram were the community officials who rebelled against Moses and Aaron and were among Korah’s followers when they rebelled against the '
  - type: text
    content: Lord
  - type: text
    content: '. '
