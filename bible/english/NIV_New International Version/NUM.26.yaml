  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: through Jezer, the Jezerite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Shillem, the Shillemite clan.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: These were the clans of Naphtali; those numbered were 45,400.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: The total number of the men of Israel was 601,730.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: '“The land is to be allotted to them as an inheritance based on the number of names. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'To a larger group give a larger inheritance, and to a smaller group a smaller one; each is to receive its inheritance according to the number of those listed. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Be sure that the land is distributed by lot. What each group inherits will be according to the names for its ancestral tribe. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Each inheritance is to be distributed by lot among the larger and smaller groups.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'These were the Levites who were counted by their clans:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Gershon, the Gershonite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Kohath, the Kohathite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Merari, the Merarite clan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'These also were Levite clans:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: the Libnite clan,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the Hebronite clan,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the Mahlite clan,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the Mushite clan,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the Korahite clan.
- type: usfm
  marker: li4
  children:
  - type: text
    text: '(Kohath was the forefather of Amram; '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: the name of Amram’s wife was Jochebed, a descendant of Levi, who was born to the Levites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:59 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jochebed, a daughter of Levi, who was born to Levi
    marker-yv: yv-n
  - type: text
    text: ' in Egypt. To Amram she bore Aaron, Moses and their sister Miriam. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Aaron was the father of Nadab and Abihu, Eleazar and Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'But Nadab and Abihu died when they made an offering before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with unauthorized fire.)'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: All the male Levites a month old or more numbered 23,000. They were not counted along with the other Israelites because they received no inheritance among them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'These are the ones counted by Moses and Eleazar the priest when they counted the Israelites on the plains of Moab by the Jordan across from Jericho. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Not one of them was among those counted by Moses and Aaron the priest when they counted the Israelites in the Desert of Sinai. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had told those Israelites they would surely die in the wilderness, and not one of them was left except Caleb son of Jephunneh and Joshua son of Nun.'
