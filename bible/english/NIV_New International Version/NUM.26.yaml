  - type: text
    text: through Shimron, the Shimronite clan.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: These were the clans of Issachar; those numbered were 64,300.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The descendants of Zebulun by their clans were:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Sered, the Seredite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Elon, the Elonite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Jahleel, the Jahleelite clan.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: These were the clans of Zebulun; those numbered were 60,500.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The descendants of Joseph by their clans through Manasseh and Ephraim were:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The descendants of Manasseh:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Makir, the Makirite clan (Makir was the father of Gilead);
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Gilead, the Gileadite clan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'These were the descendants of Gilead:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: through Iezer, the Iezerite clan;
- type: usfm
  marker: li2
  children:
  - type: text
    text: through Helek, the Helekite clan;
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
