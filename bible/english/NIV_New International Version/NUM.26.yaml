- type: usfm
  marker: li1
  children:
  - type: text
    text: through Beker, the Bekerite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Tahan, the Tahanite clan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'These were the descendants of Shuthelah:'
- type: usfm
