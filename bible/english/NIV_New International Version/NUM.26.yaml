- type: usfm
  marker: li2
  children:
  - type: text
    text: through Hepher, the Hepherite clan.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
