    text: through Shuni, the Shunite clan;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: through Ozni, the Oznite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Eri, the Erite clan;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: through Arodi,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Samaritan Pentateuch and Syriac (see also Gen. 46:16); Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Arod
    marker-yv: yv-n
  - type: text
    text: ' the Arodite clan;'
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Areli, the Arelite clan.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: These were the clans of Gad; those numbered were 40,500.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Er and Onan were sons of Judah, but they died in Canaan.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The descendants of Judah by their clans were:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Shelah, the Shelanite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Perez, the Perezite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Zerah, the Zerahite clan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The descendants of Perez were:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: through Hezron, the Hezronite clan;
- type: usfm
  marker: li2
  children:
  - type: text
    text: through Hamul, the Hamulite clan.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: These were the clans of Judah; those numbered were 76,500.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The descendants of Issachar by their clans were:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Tola, the Tolaite clan;
- type: usfm
  marker: li1
  children:
  - type: text
    text: through Puah, the Puite
  - type: usfm
    marker: f
    children:
    - type: usfm
