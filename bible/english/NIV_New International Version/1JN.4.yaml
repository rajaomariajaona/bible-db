document_id: 1JN.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: On Denying the Incarnation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, do not believe every spirit, but test the spirits to see whether they are from God, because many false prophets have gone out into the world. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is love: not that we loved God, but that he loved us and sent his Son as an atoning sacrifice for our sins. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, since God so loved us, we also ought to love one another. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No one has ever seen God; but if we love one another, God lives in us and his love is made complete in us.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how we know that we live in him and he in us: He has given us of his Spirit. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And we have seen and testify that the Father has sent his Son to be the Savior of the world. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anyone acknowledges that Jesus is the Son of God, God lives in them and they in God. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And so we know and rely on the love God has for us.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God is love. Whoever lives in love lives in God, and God in them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how love is made complete among us so that we will have confidence on the day of judgment: In this world we are like Jesus. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There is no fear in love. But perfect love drives out fear, because fear has to do with punishment. The one who fears is not made perfect in love.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We love because he first loved us. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how you can recognize the Spirit of God: Every spirit that acknowledges that Jesus Christ has come in the flesh is from God, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever claims to love God yet hates a brother or sister is a liar. For whoever does not love their brother and sister, whom they have seen, cannot love God, whom they have not seen. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he has given us this command: Anyone who loves God must also love their brother and sister.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but every spirit that does not acknowledge Jesus is not from God. This is the spirit of the antichrist, which you have heard is coming and even now is already in the world.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You, dear children, are from God and have overcome them, because the one who is in you is greater than the one who is in the world. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are from the world and therefore speak from the viewpoint of the world, and the world listens to them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We are from God, and whoever knows God listens to us; but whoever is not from God does not listen to us. This is how we recognize the Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: spirit
      marker-yv: yv-n
    - type: text
      text: ' of truth and the spirit of falsehood.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Love and Ours
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, let us love one another, for love comes from God. Everyone who loves has been born of God and knows God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever does not love does not know God, because God is love. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how God showed his love among us: He sent his one and only Son into the world that we might live through him. '
