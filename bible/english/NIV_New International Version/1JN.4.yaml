document_id: 1JN.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: On Denying the Incarnation
  - type: text
    content: 'Dear friends, do not believe every spirit, but test the spirits to see whether they are from God, because many false prophets have gone out into the world. '
  '10':
  - type: text
    content: 'This is love: not that we loved God, but that he loved us and sent his Son as an atoning sacrifice for our sins. '
  '11':
  - type: text
    content: 'Dear friends, since God so loved us, we also ought to love one another. '
  '12':
  - type: text
    content: No one has ever seen God; but if we love one another, God lives in us and his love is made complete in us.
  '13':
  - type: text
    content: 'This is how we know that we live in him and he in us: He has given us of his Spirit. '
  '14':
  - type: text
    content: 'And we have seen and testify that the Father has sent his Son to be the Savior of the world. '
  '15':
  - type: text
    content: 'If anyone acknowledges that Jesus is the Son of God, God lives in them and they in God. '
  '16':
  - type: text
    content: And so we know and rely on the love God has for us.
  - type: text
    content: 'God is love. Whoever lives in love lives in God, and God in them. '
  '17':
  - type: text
    content: 'This is how love is made complete among us so that we will have confidence on the day of judgment: In this world we are like Jesus. '
  '18':
  - type: text
    content: There is no fear in love. But perfect love drives out fear, because fear has to do with punishment. The one who fears is not made perfect in love.
  '19':
  - type: text
    content: 'We love because he first loved us. '
  '2':
  - type: text
    content: 'This is how you can recognize the Spirit of God: Every spirit that acknowledges that Jesus Christ has come in the flesh is from God, '
  '20':
  - type: text
    content: 'Whoever claims to love God yet hates a brother or sister is a liar. For whoever does not love their brother and sister, whom they have seen, cannot love God, whom they have not seen. '
  '21':
  - type: text
    content: 'And he has given us this command: Anyone who loves God must also love their brother and sister.'
  '3':
  - type: text
    content: but every spirit that does not acknowledge Jesus is not from God. This is the spirit of the antichrist, which you have heard is coming and even now is already in the world.
  '4':
  - type: text
    content: 'You, dear children, are from God and have overcome them, because the one who is in you is greater than the one who is in the world. '
  '5':
  - type: text
    content: 'They are from the world and therefore speak from the viewpoint of the world, and the world listens to them. '
  '6':
  - type: text
    content: We are from God, and whoever knows God listens to us; but whoever is not from God does not listen to us. This is how we recognize the Spirit
  - type: note
    content: Or spirit
  - type: text
    content: ' of truth and the spirit of falsehood.'
  - type: heading
    content: God’s Love and Ours
  '7':
  - type: text
    content: 'Dear friends, let us love one another, for love comes from God. Everyone who loves has been born of God and knows God. '
  '8':
  - type: text
    content: 'Whoever does not love does not know God, because God is love. '
  '9':
  - type: text
    content: 'This is how God showed his love among us: He sent his one and only Son into the world that we might live through him. '
