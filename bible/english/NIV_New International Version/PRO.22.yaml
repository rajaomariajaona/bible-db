document_id: PRO.22,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A good name is more desirable than great riches;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be esteemed is better than silver or gold.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Drive out the mocker, and out goes strife;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: quarrels and insults are ended.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: One who loves a pure heart and who speaks with grace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will have the king for a friend.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' keep watch over knowledge,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he frustrates the words of the unfaithful.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The sluggard says, “There’s a lion outside!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll be killed in the public square!”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The mouth of an adulterous woman is a deep pit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a man who is under the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s wrath falls into it.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Folly is bound up in the heart of a child,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the rod of discipline will drive it far away.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: One who oppresses the poor to increase his wealth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and one who gives gifts to the rich—both come to poverty.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Thirty Sayings of the Wise
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 1
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Pay attention and turn your ear to the sayings of the wise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: apply your heart to what I teach,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: for it is pleasing when you keep them in your heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have all of them ready on your lips.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So that your trust may be in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I teach you today, even you.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rich and poor have this in common:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is the Maker of them all.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Have I not written thirty sayings for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sayings of counsel and knowledge,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: teaching you to be honest and to speak the truth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that you bring back truthful reports
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to those you serve?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 2
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Do not exploit the poor because they are poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not crush the needy in court,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will take up their case'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will exact life for life.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 3
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Do not make friends with a hot-tempered person,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not associate with one easily angered,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: or you may learn their ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and get yourself ensnared.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 4
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Do not be one who shakes hands in pledge
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or puts up security for debts;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: if you lack the means to pay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your very bed will be snatched from under you.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 5
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Do not move an ancient boundary stone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: set up by your ancestors.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 6
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Do you see someone skilled in their work?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will serve before kings;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will not serve before officials of low rank.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The prudent see danger and take refuge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the simple keep going and pay the penalty.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Humility is the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its wages are riches and honor and life.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: In the paths of the wicked are snares and pitfalls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but those who would preserve their life stay far from them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Start children off on the way they should go,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and even when they are old they will not turn from it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The rich rule over the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the borrower is slave to the lender.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Whoever sows injustice reaps calamity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the rod they wield in fury will be broken.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The generous will themselves be blessed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they share their food with the poor.
