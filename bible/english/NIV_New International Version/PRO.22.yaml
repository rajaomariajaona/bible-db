document_id: PRO.22,111
type_code: eng
verses:
  '1':
  - type: text
    content: A good name is more desirable than great riches;
  - type: text
    content: to be esteemed is better than silver or gold.
  '10':
  - type: text
    content: Drive out the mocker, and out goes strife;
  - type: text
    content: quarrels and insults are ended.
  '11':
  - type: text
    content: One who loves a pure heart and who speaks with grace
  - type: text
    content: will have the king for a friend.
  '12':
  - type: text
    content: 'The eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' keep watch over knowledge,'
  - type: text
    content: but he frustrates the words of the unfaithful.
  '13':
  - type: text
    content: The sluggard says, “There’s a lion outside!
  - type: text
    content: I’ll be killed in the public square!”
  '14':
  - type: text
    content: The mouth of an adulterous woman is a deep pit;
  - type: text
    content: 'a man who is under the '
  - type: text
    content: Lord
  - type: text
    content: ’s wrath falls into it.
  '15':
  - type: text
    content: Folly is bound up in the heart of a child,
  - type: text
    content: but the rod of discipline will drive it far away.
  '16':
  - type: text
    content: One who oppresses the poor to increase his wealth
  - type: text
    content: and one who gives gifts to the rich—both come to poverty.
  - type: heading
    content: Thirty Sayings of the Wise
  - type: heading
    content: Saying 1
  '17':
  - type: text
    content: Pay attention and turn your ear to the sayings of the wise;
  - type: text
    content: apply your heart to what I teach,
  '18':
  - type: text
    content: for it is pleasing when you keep them in your heart
  - type: text
    content: and have all of them ready on your lips.
  '19':
  - type: text
    content: 'So that your trust may be in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: I teach you today, even you.
  '2':
  - type: text
    content: 'Rich and poor have this in common:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is the Maker of them all.'
  '20':
  - type: text
    content: Have I not written thirty sayings for you,
  - type: text
    content: sayings of counsel and knowledge,
  '21':
  - type: text
    content: teaching you to be honest and to speak the truth,
  - type: text
    content: so that you bring back truthful reports
  - type: text
    content: to those you serve?
  - type: heading
    content: Saying 2
  '22':
  - type: text
    content: Do not exploit the poor because they are poor
  - type: text
    content: and do not crush the needy in court,
  '23':
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will take up their case'
  - type: text
    content: and will exact life for life.
  - type: heading
    content: Saying 3
  '24':
  - type: text
    content: Do not make friends with a hot-tempered person,
  - type: text
    content: do not associate with one easily angered,
  '25':
  - type: text
    content: or you may learn their ways
  - type: text
    content: and get yourself ensnared.
  - type: heading
    content: Saying 4
  '26':
  - type: text
    content: Do not be one who shakes hands in pledge
  - type: text
    content: or puts up security for debts;
  '27':
  - type: text
    content: if you lack the means to pay,
  - type: text
    content: your very bed will be snatched from under you.
  - type: heading
    content: Saying 5
  '28':
  - type: text
    content: Do not move an ancient boundary stone
  - type: text
    content: set up by your ancestors.
  - type: heading
    content: Saying 6
  '29':
  - type: text
    content: Do you see someone skilled in their work?
  - type: text
    content: They will serve before kings;
  - type: text
    content: they will not serve before officials of low rank.
  '3':
  - type: text
    content: The prudent see danger and take refuge,
  - type: text
    content: but the simple keep going and pay the penalty.
  '4':
  - type: text
    content: 'Humility is the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: its wages are riches and honor and life.
  '5':
  - type: text
    content: In the paths of the wicked are snares and pitfalls,
  - type: text
    content: but those who would preserve their life stay far from them.
  '6':
  - type: text
    content: Start children off on the way they should go,
  - type: text
    content: and even when they are old they will not turn from it.
  '7':
  - type: text
    content: The rich rule over the poor,
  - type: text
    content: and the borrower is slave to the lender.
  '8':
  - type: text
    content: Whoever sows injustice reaps calamity,
  - type: text
    content: and the rod they wield in fury will be broken.
  '9':
  - type: text
    content: The generous will themselves be blessed,
  - type: text
    content: for they share their food with the poor.
