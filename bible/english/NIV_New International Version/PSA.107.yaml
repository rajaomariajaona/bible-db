document_id: PSA.107,111
type_code: eng
verses:
  '1':
  - type: heading
    content: BOOK V
  - type: heading
    content: Psalms 107–150
  - type: heading
    content: Psalm 107
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good;'
  - type: text
    content: his love endures forever.
  '10':
  - type: text
    content: Some sat in darkness, in utter darkness,
  - type: text
    content: prisoners suffering in iron chains,
  '11':
  - type: text
    content: because they rebelled against God’s commands
  - type: text
    content: and despised the plans of the Most High.
  '12':
  - type: text
    content: So he subjected them to bitter labor;
  - type: text
    content: they stumbled, and there was no one to help.
  '13':
  - type: text
    content: 'Then they cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' in their trouble,'
  - type: text
    content: and he saved them from their distress.
  '14':
  - type: text
    content: He brought them out of darkness, the utter darkness,
  - type: text
    content: and broke away their chains.
  '15':
  - type: text
    content: 'Let them give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' for his unfailing love'
  - type: text
    content: and his wonderful deeds for mankind,
  '16':
  - type: text
    content: for he breaks down gates of bronze
  - type: text
    content: and cuts through bars of iron.
  '17':
  - type: text
    content: Some became fools through their rebellious ways
  - type: text
    content: and suffered affliction because of their iniquities.
  '18':
  - type: text
    content: They loathed all food
  - type: text
    content: and drew near the gates of death.
  '19':
  - type: text
    content: 'Then they cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' in their trouble,'
  - type: text
    content: and he saved them from their distress.
  '2':
  - type: text
    content: 'Let the redeemed of the '
  - type: text
    content: Lord
  - type: text
    content: ' tell their story—'
  - type: text
    content: those he redeemed from the hand of the foe,
  '20':
  - type: text
    content: He sent out his word and healed them;
  - type: text
    content: he rescued them from the grave.
  '21':
  - type: text
    content: 'Let them give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' for his unfailing love'
  - type: text
    content: and his wonderful deeds for mankind.
  '22':
  - type: text
    content: Let them sacrifice thank offerings
  - type: text
    content: and tell of his works with songs of joy.
  '23':
  - type: text
    content: Some went out on the sea in ships;
  - type: text
    content: they were merchants on the mighty waters.
  '24':
  - type: text
    content: 'They saw the works of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: his wonderful deeds in the deep.
  '25':
  - type: text
    content: For he spoke and stirred up a tempest
  - type: text
    content: that lifted high the waves.
  '26':
  - type: text
    content: They mounted up to the heavens and went down to the depths;
  - type: text
    content: in their peril their courage melted away.
  '27':
  - type: text
    content: They reeled and staggered like drunkards;
  - type: text
    content: they were at their wits’ end.
  '28':
  - type: text
    content: 'Then they cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' in their trouble,'
  - type: text
    content: and he brought them out of their distress.
  '29':
  - type: text
    content: He stilled the storm to a whisper;
  - type: text
    content: the waves of the sea
  - type: note
    content: Dead Sea Scrolls; Masoretic Text / their waves
  - type: text
    content: ' were hushed.'
  '3':
  - type: text
    content: those he gathered from the lands,
  - type: text
    content: from east and west, from north and south.
  - type: note
    content: Hebrew north and the sea
  '30':
  - type: text
    content: They were glad when it grew calm,
  - type: text
    content: and he guided them to their desired haven.
  '31':
  - type: text
    content: 'Let them give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' for his unfailing love'
  - type: text
    content: and his wonderful deeds for mankind.
  '32':
  - type: text
    content: Let them exalt him in the assembly of the people
  - type: text
    content: and praise him in the council of the elders.
  '33':
  - type: text
    content: He turned rivers into a desert,
  - type: text
    content: flowing springs into thirsty ground,
  '34':
  - type: text
    content: and fruitful land into a salt waste,
  - type: text
    content: because of the wickedness of those who lived there.
  '35':
  - type: text
    content: He turned the desert into pools of water
  - type: text
    content: and the parched ground into flowing springs;
  '36':
  - type: text
    content: there he brought the hungry to live,
  - type: text
    content: and they founded a city where they could settle.
  '37':
  - type: text
    content: They sowed fields and planted vineyards
  - type: text
    content: that yielded a fruitful harvest;
  '38':
  - type: text
    content: he blessed them, and their numbers greatly increased,
  - type: text
    content: and he did not let their herds diminish.
  '39':
  - type: text
    content: Then their numbers decreased, and they were humbled
  - type: text
    content: by oppression, calamity and sorrow;
  '4':
  - type: text
    content: Some wandered in desert wastelands,
  - type: text
    content: finding no way to a city where they could settle.
  '40':
  - type: text
    content: he who pours contempt on nobles
  - type: text
    content: made them wander in a trackless waste.
  '41':
  - type: text
    content: But he lifted the needy out of their affliction
  - type: text
    content: and increased their families like flocks.
  '42':
  - type: text
    content: The upright see and rejoice,
  - type: text
    content: but all the wicked shut their mouths.
  '43':
  - type: text
    content: Let the one who is wise heed these things
  - type: text
    content: 'and ponder the loving deeds of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: They were hungry and thirsty,
  - type: text
    content: and their lives ebbed away.
  '6':
  - type: text
    content: 'Then they cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' in their trouble,'
  - type: text
    content: and he delivered them from their distress.
  '7':
  - type: text
    content: He led them by a straight way
  - type: text
    content: to a city where they could settle.
  '8':
  - type: text
    content: 'Let them give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' for his unfailing love'
  - type: text
    content: and his wonderful deeds for mankind,
  '9':
  - type: text
    content: for he satisfies the thirsty
  - type: text
    content: and fills the hungry with good things.
