document_id: PSA.107,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOOK V
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: Psalms 107–150
    marker-yv: yv-h
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 107
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he is good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his love endures forever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some sat in darkness, in utter darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prisoners suffering in iron chains,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they rebelled against God’s commands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and despised the plans of the Most High.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he subjected them to bitter labor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stumbled, and there was no one to help.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they cried to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he saved them from their distress.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He brought them out of darkness, the utter darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and broke away their chains.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his unfailing love'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his wonderful deeds for mankind,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he breaks down gates of bronze
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cuts through bars of iron.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some became fools through their rebellious ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and suffered affliction because of their iniquities.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They loathed all food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drew near the gates of death.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they cried to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he saved them from their distress.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let the redeemed of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tell their story—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those he redeemed from the hand of the foe,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sent out his word and healed them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he rescued them from the grave.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his unfailing love'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his wonderful deeds for mankind.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them sacrifice thank offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tell of his works with songs of joy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some went out on the sea in ships;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were merchants on the mighty waters.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They saw the works of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his wonderful deeds in the deep.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he spoke and stirred up a tempest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that lifted high the waves.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They mounted up to the heavens and went down to the depths;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in their peril their courage melted away.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They reeled and staggered like drunkards;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they were at their wits’ end.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he brought them out of their distress.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stilled the storm to a whisper;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the waves of the sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: / their waves
      marker-yv: yv-n
    - type: text
      text: ' were hushed.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those he gathered from the lands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from east and west, from north and south.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: north and the sea
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were glad when it grew calm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he guided them to their desired haven.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his unfailing love'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his wonderful deeds for mankind.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them exalt him in the assembly of the people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and praise him in the council of the elders.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turned rivers into a desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flowing springs into thirsty ground,
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and fruitful land into a salt waste,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the wickedness of those who lived there.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turned the desert into pools of water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the parched ground into flowing springs;
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there he brought the hungry to live,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they founded a city where they could settle.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sowed fields and planted vineyards
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that yielded a fruitful harvest;
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he blessed them, and their numbers greatly increased,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he did not let their herds diminish.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then their numbers decreased, and they were humbled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by oppression, calamity and sorrow;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some wandered in desert wastelands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: finding no way to a city where they could settle.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he who pours contempt on nobles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made them wander in a trackless waste.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he lifted the needy out of their affliction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and increased their families like flocks.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The upright see and rejoice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but all the wicked shut their mouths.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the one who is wise heed these things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and ponder the loving deeds of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were hungry and thirsty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their lives ebbed away.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in their trouble,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he delivered them from their distress.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He led them by a straight way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to a city where they could settle.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his unfailing love'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his wonderful deeds for mankind,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he satisfies the thirsty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fills the hungry with good things.
