document_id: PSA.139,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 139
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. Of David. A psalm.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'You have searched me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you know me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: even there your hand will guide me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your right hand will hold me fast.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If I say, “Surely the darkness will hide me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the light become night around me,”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: even the darkness will not be dark to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the night will shine like the day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for darkness is as light to you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For you created my inmost being;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you knit me together in my mother’s womb.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I praise you because I am fearfully and wonderfully made;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your works are wonderful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I know that full well.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: My frame was not hidden from you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I was made in the secret place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I was woven together in the depths of the earth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Your eyes saw my unformed body;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the days ordained for me were written in your book
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before one of them came to be.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: How precious to me are your thoughts,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '139:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: How amazing are your thoughts concerning me
      marker-yv: yv-n
    - type: text
      text: ' God!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How vast is the sum of them!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Were I to count them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they would outnumber the grains of sand—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I awake, I am still with you.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: If only you, God, would slay the wicked!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Away from me, you who are bloodthirsty!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You know when I sit and when I rise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you perceive my thoughts from afar.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: They speak of you with evil intent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your adversaries misuse your name.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Do I not hate those who hate you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and abhor those who are in rebellion against you?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I have nothing but hatred for them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I count them my enemies.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Search me, God, and know my heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: test me and know my anxious thoughts.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: See if there is any offensive way in me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lead me in the way everlasting.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You discern my going out and my lying down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are familiar with all my ways.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Before a word is on my tongue
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', know it completely.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You hem me in behind and before,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you lay your hand upon me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Such knowledge is too wonderful for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: too lofty for me to attain.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Where can I go from your Spirit?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where can I flee from your presence?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: If I go up to the heavens, you are there;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if I make my bed in the depths, you are there.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: If I rise on the wings of the dawn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if I settle on the far side of the sea,
