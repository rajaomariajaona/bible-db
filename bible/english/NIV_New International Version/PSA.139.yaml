document_id: PSA.139
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 139
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. Of David. A psalm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'You have searched me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you know me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You know when I sit and when I rise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you perceive my thoughts from afar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You discern my going out and my lying down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are familiar with all my ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Before a word is on my tongue
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', know it completely.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You hem me in behind and before,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you lay your hand upon me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Such knowledge is too wonderful for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: too lofty for me to attain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Where can I go from your Spirit?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where can I flee from your presence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: If I go up to the heavens, you are there;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I make my bed in the depths, you are there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If I rise on the wings of the dawn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I settle on the far side of the sea,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: even there your hand will guide me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your right hand will hold me fast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: If I say, “Surely the darkness will hide me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the light become night around me,”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: even the darkness will not be dark to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the night will shine like the day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for darkness is as light to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For you created my inmost being;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you knit me together in my mother’s womb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I praise you because I am fearfully and wonderfully made;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your works are wonderful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I know that full well.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My frame was not hidden from you
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I was made in the secret place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I was woven together in the depths of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Your eyes saw my unformed body;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the days ordained for me were written in your book
- type: usfm
  marker: q2
  children:
  - type: text
    text: before one of them came to be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: How precious to me are your thoughts,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '139:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: How amazing are your thoughts concerning me
    marker-yv: yv-n
  - type: text
    text: ' God!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How vast is the sum of them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Were I to count them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they would outnumber the grains of sand—
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I awake, I am still with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: If only you, God, would slay the wicked!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Away from me, you who are bloodthirsty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They speak of you with evil intent;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your adversaries misuse your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Do I not hate those who hate you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and abhor those who are in rebellion against you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I have nothing but hatred for them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I count them my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Search me, God, and know my heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: test me and know my anxious thoughts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: See if there is any offensive way in me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lead me in the way everlasting.
