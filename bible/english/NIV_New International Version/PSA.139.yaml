document_id: PSA.139,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 139
  - type: text
    content: For the director of music. Of David. A psalm.
  - type: text
    content: 'You have searched me, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and you know me.
  '10':
  - type: text
    content: even there your hand will guide me,
  - type: text
    content: your right hand will hold me fast.
  '11':
  - type: text
    content: If I say, “Surely the darkness will hide me
  - type: text
    content: and the light become night around me,”
  '12':
  - type: text
    content: even the darkness will not be dark to you;
  - type: text
    content: the night will shine like the day,
  - type: text
    content: for darkness is as light to you.
  '13':
  - type: text
    content: For you created my inmost being;
  - type: text
    content: you knit me together in my mother’s womb.
  '14':
  - type: text
    content: I praise you because I am fearfully and wonderfully made;
  - type: text
    content: your works are wonderful,
  - type: text
    content: I know that full well.
  '15':
  - type: text
    content: My frame was not hidden from you
  - type: text
    content: when I was made in the secret place,
  - type: text
    content: when I was woven together in the depths of the earth.
  '16':
  - type: text
    content: Your eyes saw my unformed body;
  - type: text
    content: all the days ordained for me were written in your book
  - type: text
    content: before one of them came to be.
  '17':
  - type: text
    content: How precious to me are your thoughts,
  - type: note
    content: Or How amazing are your thoughts concerning me
  - type: text
    content: ' God!'
  - type: text
    content: How vast is the sum of them!
  '18':
  - type: text
    content: Were I to count them,
  - type: text
    content: they would outnumber the grains of sand—
  - type: text
    content: when I awake, I am still with you.
  '19':
  - type: text
    content: If only you, God, would slay the wicked!
  - type: text
    content: Away from me, you who are bloodthirsty!
  '2':
  - type: text
    content: You know when I sit and when I rise;
  - type: text
    content: you perceive my thoughts from afar.
  '20':
  - type: text
    content: They speak of you with evil intent;
  - type: text
    content: your adversaries misuse your name.
  '21':
  - type: text
    content: 'Do I not hate those who hate you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and abhor those who are in rebellion against you?
  '22':
  - type: text
    content: I have nothing but hatred for them;
  - type: text
    content: I count them my enemies.
  '23':
  - type: text
    content: Search me, God, and know my heart;
  - type: text
    content: test me and know my anxious thoughts.
  '24':
  - type: text
    content: See if there is any offensive way in me,
  - type: text
    content: and lead me in the way everlasting.
  '3':
  - type: text
    content: You discern my going out and my lying down;
  - type: text
    content: you are familiar with all my ways.
  '4':
  - type: text
    content: Before a word is on my tongue
  - type: text
    content: 'you, '
  - type: text
    content: Lord
  - type: text
    content: ', know it completely.'
  '5':
  - type: text
    content: You hem me in behind and before,
  - type: text
    content: and you lay your hand upon me.
  '6':
  - type: text
    content: Such knowledge is too wonderful for me,
  - type: text
    content: too lofty for me to attain.
  '7':
  - type: text
    content: Where can I go from your Spirit?
  - type: text
    content: Where can I flee from your presence?
  '8':
  - type: text
    content: If I go up to the heavens, you are there;
  - type: text
    content: if I make my bed in the depths, you are there.
  '9':
  - type: text
    content: If I rise on the wings of the dawn,
  - type: text
    content: if I settle on the far side of the sea,
