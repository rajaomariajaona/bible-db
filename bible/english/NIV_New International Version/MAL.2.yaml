document_id: MAL.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Additional Warning to the Priests
  - type: text
    content: '“And now, you priests, this warning is for you. '
  '10':
  - type: text
    content: Do we not all have one Father
  - type: note
    content: Or father
  - type: text
    content: '? Did not one God create us? Why do we profane the covenant of our ancestors by being unfaithful to one another?'
  '11':
  - type: text
    content: 'Judah has been unfaithful. A detestable thing has been committed in Israel and in Jerusalem: Judah has desecrated the sanctuary the '
  - type: text
    content: Lord
  - type: text
    content: ' loves by marrying women who worship a foreign god. '
  '12':
  - type: text
    content: 'As for the man who does this, whoever he may be, may the '
  - type: text
    content: Lord
  - type: text
    content: ' remove him from the tents of Jacob'
  - type: note
    content: Or 12 May the Lord remove from the tents of Jacob anyone who gives testimony in behalf of the man who does this
  - type: text
    content: '—even though he brings an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '13':
  - type: text
    content: 'Another thing you do: You flood the '
  - type: text
    content: Lord
  - type: text
    content: '’s altar with tears. You weep and wail because he no longer looks with favor on your offerings or accepts them with pleasure from your hands. '
  '14':
  - type: text
    content: 'You ask, “Why?” It is because the '
  - type: text
    content: Lord
  - type: text
    content: ' is the witness between you and the wife of your youth. You have been unfaithful to her, though she is your partner, the wife of your marriage covenant.'
  '15':
  - type: text
    content: Has not the one God made you? You belong to him in body and spirit. And what does the one God seek? Godly offspring.
  - type: note
    content: The meaning of the Hebrew for the first part of this verse is uncertain.
  - type: text
    content: ' So be on your guard, and do not be unfaithful to the wife of your youth.'
  '16':
  - type: text
    content: '“The man who hates and divorces his wife,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, “does violence to the one he should protect,”'
  - type: note
    content: Or “I hate divorce,” says the Lord, the God of Israel, “because the man who divorces his wife covers his garment with violence,”
  - type: text
    content: ' says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: text
    content: So be on your guard, and do not be unfaithful.
  - type: heading
    content: Breaking Covenant Through Injustice
  '17':
  - type: text
    content: 'You have wearied the '
  - type: text
    content: Lord
  - type: text
    content: ' with your words.'
  - type: text
    content: “How have we wearied him?” you ask.
  - type: text
    content: 'By saying, “All who do evil are good in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he is pleased with them” or “Where is the God of justice?”'
  '2':
  - type: text
    content: 'If you do not listen, and if you do not resolve to honor my name,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, “I will send a curse on you, and I will curse your blessings. Yes, I have already cursed them, because you have not resolved to honor me.'
  '3':
  - type: text
    content: “Because of you I will rebuke your descendants
  - type: note
    content: Or will blight your grain
  - type: text
    content: '; I will smear on your faces the dung from your festival sacrifices, and you will be carried off with it. '
  '4':
  - type: text
    content: 'And you will know that I have sent you this warning so that my covenant with Levi may continue,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. '
  '5':
  - type: text
    content: '“My covenant was with him, a covenant of life and peace, and I gave them to him; this called for reverence and he revered me and stood in awe of my name. '
  '6':
  - type: text
    content: True instruction was in his mouth and nothing false was found on his lips. He walked with me in peace and uprightness, and turned many from sin.
  '7':
  - type: text
    content: '“For the lips of a priest ought to preserve knowledge, because he is the messenger of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty and people seek instruction from his mouth. '
  '8':
  - type: text
    content: 'But you have turned from the way and by your teaching have caused many to stumble; you have violated the covenant with Levi,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. '
  '9':
  - type: text
    content: “So I have caused you to be despised and humiliated before all the people, because you have not followed my ways but have shown partiality in matters of the law.”
  - type: heading
    content: Breaking Covenant Through Divorce
