document_id: LEV.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Clean and Unclean Food
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '10':
  - type: text
    content: 'But all creatures in the seas or streams that do not have fins and scales—whether among all the swarming things or among all the other living creatures in the water—you are to regard as unclean. '
  '11':
  - type: text
    content: 'And since you are to regard them as unclean, you must not eat their meat; you must regard their carcasses as unclean. '
  '12':
  - type: text
    content: Anything living in the water that does not have fins and scales is to be regarded as unclean by you.
  '13':
  - type: text
    content: '“ ‘These are the birds you are to regard as unclean and not eat because they are unclean: the eagle,'
  - type: note
    content: The precise identification of some of the birds, insects and animals in this chapter is uncertain.
  - type: text
    content: ' the vulture, the black vulture, '
  '14':
  - type: text
    content: 'the red kite, any kind of black kite, '
  '15':
  - type: text
    content: 'any kind of raven, '
  '16':
  - type: text
    content: 'the horned owl, the screech owl, the gull, any kind of hawk, '
  '17':
  - type: text
    content: 'the little owl, the cormorant, the great owl, '
  '18':
  - type: text
    content: 'the white owl, the desert owl, the osprey, '
  '19':
  - type: text
    content: the stork, any kind of heron, the hoopoe and the bat.
  '2':
  - type: text
    content: '“Say to the Israelites: ‘Of all the animals that live on land, these are the ones you may eat: '
  '20':
  - type: text
    content: '“ ‘All flying insects that walk on all fours are to be regarded as unclean by you. '
  '21':
  - type: text
    content: 'There are, however, some flying insects that walk on all fours that you may eat: those that have jointed legs for hopping on the ground. '
  '22':
  - type: text
    content: 'Of these you may eat any kind of locust, katydid, cricket or grasshopper. '
  '23':
  - type: text
    content: But all other flying insects that have four legs you are to regard as unclean.
  '24':
  - type: text
    content: '“ ‘You will make yourselves unclean by these; whoever touches their carcasses will be unclean till evening. '
  '25':
  - type: text
    content: Whoever picks up one of their carcasses must wash their clothes, and they will be unclean till evening.
  '26':
  - type: text
    content: '“ ‘Every animal that does not have a divided hoof or that does not chew the cud is unclean for you; whoever touches the carcass of any of them will be unclean. '
  '27':
  - type: text
    content: 'Of all the animals that walk on all fours, those that walk on their paws are unclean for you; whoever touches their carcasses will be unclean till evening. '
  '28':
  - type: text
    content: Anyone who picks up their carcasses must wash their clothes, and they will be unclean till evening. These animals are unclean for you.
  '29':
  - type: text
    content: '“ ‘Of the animals that move along the ground, these are unclean for you: the weasel, the rat, any kind of great lizard, '
  '3':
  - type: text
    content: You may eat any animal that has a divided hoof and that chews the cud.
  '30':
  - type: text
    content: 'the gecko, the monitor lizard, the wall lizard, the skink and the chameleon. '
  '31':
  - type: text
    content: 'Of all those that move along the ground, these are unclean for you. Whoever touches them when they are dead will be unclean till evening. '
  '32':
  - type: text
    content: 'When one of them dies and falls on something, that article, whatever its use, will be unclean, whether it is made of wood, cloth, hide or sackcloth. Put it in water; it will be unclean till evening, and then it will be clean. '
  '33':
  - type: text
    content: 'If one of them falls into a clay pot, everything in it will be unclean, and you must break the pot. '
  '34':
  - type: text
    content: 'Any food you are allowed to eat that has come into contact with water from any such pot is unclean, and any liquid that is drunk from such a pot is unclean. '
  '35':
  - type: text
    content: 'Anything that one of their carcasses falls on becomes unclean; an oven or cooking pot must be broken up. They are unclean, and you are to regard them as unclean. '
  '36':
  - type: text
    content: 'A spring, however, or a cistern for collecting water remains clean, but anyone who touches one of these carcasses is unclean. '
  '37':
  - type: text
    content: 'If a carcass falls on any seeds that are to be planted, they remain clean. '
  '38':
  - type: text
    content: But if water has been put on the seed and a carcass falls on it, it is unclean for you.
  '39':
  - type: text
    content: '“ ‘If an animal that you are allowed to eat dies, anyone who touches its carcass will be unclean till evening. '
  '4':
  - type: text
    content: '“ ‘There are some that only chew the cud or only have a divided hoof, but you must not eat them. The camel, though it chews the cud, does not have a divided hoof; it is ceremonially unclean for you. '
  '40':
  - type: text
    content: Anyone who eats some of its carcass must wash their clothes, and they will be unclean till evening. Anyone who picks up the carcass must wash their clothes, and they will be unclean till evening.
  '41':
  - type: text
    content: '“ ‘Every creature that moves along the ground is to be regarded as unclean; it is not to be eaten. '
  '42':
  - type: text
    content: 'You are not to eat any creature that moves along the ground, whether it moves on its belly or walks on all fours or on many feet; it is unclean. '
  '43':
  - type: text
    content: 'Do not defile yourselves by any of these creatures. Do not make yourselves unclean by means of them or be made unclean by them. '
  '44':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God; consecrate yourselves and be holy, because I am holy. Do not make yourselves unclean by any creature that moves along the ground. '
  '45':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who brought you up out of Egypt to be your God; therefore be holy, because I am holy.'
  '46':
  - type: text
    content: '“ ‘These are the regulations concerning animals, birds, every living thing that moves about in the water and every creature that moves along the ground. '
  '47':
  - type: text
    content: You must distinguish between the unclean and the clean, between living creatures that may be eaten and those that may not be eaten.’ ”
  '5':
  - type: text
    content: 'The hyrax, though it chews the cud, does not have a divided hoof; it is unclean for you. '
  '6':
  - type: text
    content: 'The rabbit, though it chews the cud, does not have a divided hoof; it is unclean for you. '
  '7':
  - type: text
    content: 'And the pig, though it has a divided hoof, does not chew the cud; it is unclean for you. '
  '8':
  - type: text
    content: You must not eat their meat or touch their carcasses; they are unclean for you.
  '9':
  - type: text
    content: '“ ‘Of all the creatures living in the water of the seas and the streams you may eat any that have fins and scales. '
