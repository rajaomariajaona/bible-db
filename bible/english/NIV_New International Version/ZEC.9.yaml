document_id: ZEC.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment on Israel’s Enemies
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A prophecy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is against the land of Hadrak'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will come to rest on Damascus—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the eyes of all people and all the tribes of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'are on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Damascus. / For the eye of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' is on all people, / as well as on the tribes of Israel,'
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I will take away the chariots from Ephraim
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the warhorses from Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the battle bow will be broken.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will proclaim peace to the nations.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His rule will extend from sea to sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the River
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the Euphrates
      marker-yv: yv-n
    - type: text
      text: ' to the ends of the earth.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: As for you, because of the blood of my covenant with you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will free your prisoners from the waterless pit.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Return to your fortress, you prisoners of hope;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even now I announce that I will restore twice as much to you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I will bend Judah as I bend my bow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill it with Ephraim.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will rouse your sons, Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against your sons, Greece,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make you like a warrior’s sword.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Will Appear'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will appear over them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his arrow will flash like lightning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will sound the trumpet;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will march in the storms of the south,
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty will shield them.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will destroy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and overcome with slingstones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will drink and roar as with wine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be full like a bowl
  - type: usfm
    marker: q2
    children:
    - type: text
      text: used for sprinkling
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bowl, / like
      marker-yv: yv-n
    - type: text
      text: ' the corners of the altar.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God will save his people on that day'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a shepherd saves his flock.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will sparkle in his land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like jewels in a crown.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: How attractive and beautiful they will be!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Grain will make the young men thrive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and new wine the young women.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: and on Hamath too, which borders on it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on Tyre and Sidon, though they are very skillful.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tyre has built herself a stronghold;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she has heaped up silver like dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gold like the dirt of the streets.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But the Lord will take away her possessions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy her power on the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she will be consumed by fire.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ashkelon will see it and fear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gaza will writhe in agony,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Ekron too, for her hope will wither.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaza will lose her king
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Ashkelon will be deserted.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: A mongrel people will occupy Ashdod,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will put an end to the pride of the Philistines.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I will take the blood from their mouths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the forbidden food from between their teeth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who are left will belong to our God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and become a clan in Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Ekron will be like the Jebusites.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But I will encamp at my temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to guard it against marauding forces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never again will an oppressor overrun my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for now I am keeping watch.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Coming of Zion’s King
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Rejoice greatly, Daughter Zion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shout, Daughter Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, your king comes to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: righteous and victorious,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lowly and riding on a donkey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on a colt, the foal of a donkey.
