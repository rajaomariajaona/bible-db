document_id: ZEC.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on Israel’s Enemies
  - type: text
    content: 'A prophecy:'
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' is against the land of Hadrak'
  - type: text
    content: and will come to rest on Damascus—
  - type: text
    content: for the eyes of all people and all the tribes of Israel
  - type: text
    content: 'are on the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: note
    content: Or Damascus. / For the eye of the Lord is on all people, / as well as on the tribes of Israel,
  '10':
  - type: text
    content: I will take away the chariots from Ephraim
  - type: text
    content: and the warhorses from Jerusalem,
  - type: text
    content: and the battle bow will be broken.
  - type: text
    content: He will proclaim peace to the nations.
  - type: text
    content: His rule will extend from sea to sea
  - type: text
    content: and from the River
  - type: note
    content: That is, the Euphrates
  - type: text
    content: ' to the ends of the earth.'
  '11':
  - type: text
    content: As for you, because of the blood of my covenant with you,
  - type: text
    content: I will free your prisoners from the waterless pit.
  '12':
  - type: text
    content: Return to your fortress, you prisoners of hope;
  - type: text
    content: even now I announce that I will restore twice as much to you.
  '13':
  - type: text
    content: I will bend Judah as I bend my bow
  - type: text
    content: and fill it with Ephraim.
  - type: text
    content: I will rouse your sons, Zion,
  - type: text
    content: against your sons, Greece,
  - type: text
    content: and make you like a warrior’s sword.
  - type: heading
    content: The Lord Will Appear
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will appear over them;'
  - type: text
    content: his arrow will flash like lightning.
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' will sound the trumpet;'
  - type: text
    content: he will march in the storms of the south,
  '15':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will shield them.'
  - type: text
    content: They will destroy
  - type: text
    content: and overcome with slingstones.
  - type: text
    content: They will drink and roar as with wine;
  - type: text
    content: they will be full like a bowl
  - type: text
    content: used for sprinkling
  - type: note
    content: Or bowl, / like
  - type: text
    content: ' the corners of the altar.'
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' their God will save his people on that day'
  - type: text
    content: as a shepherd saves his flock.
  - type: text
    content: They will sparkle in his land
  - type: text
    content: like jewels in a crown.
  '17':
  - type: text
    content: How attractive and beautiful they will be!
  - type: text
    content: Grain will make the young men thrive,
  - type: text
    content: and new wine the young women.
  '2':
  - type: text
    content: and on Hamath too, which borders on it,
  - type: text
    content: and on Tyre and Sidon, though they are very skillful.
  '3':
  - type: text
    content: Tyre has built herself a stronghold;
  - type: text
    content: she has heaped up silver like dust,
  - type: text
    content: and gold like the dirt of the streets.
  '4':
  - type: text
    content: But the Lord will take away her possessions
  - type: text
    content: and destroy her power on the sea,
  - type: text
    content: and she will be consumed by fire.
  '5':
  - type: text
    content: Ashkelon will see it and fear;
  - type: text
    content: Gaza will writhe in agony,
  - type: text
    content: and Ekron too, for her hope will wither.
  - type: text
    content: Gaza will lose her king
  - type: text
    content: and Ashkelon will be deserted.
  '6':
  - type: text
    content: A mongrel people will occupy Ashdod,
  - type: text
    content: and I will put an end to the pride of the Philistines.
  '7':
  - type: text
    content: I will take the blood from their mouths,
  - type: text
    content: the forbidden food from between their teeth.
  - type: text
    content: Those who are left will belong to our God
  - type: text
    content: and become a clan in Judah,
  - type: text
    content: and Ekron will be like the Jebusites.
  '8':
  - type: text
    content: But I will encamp at my temple
  - type: text
    content: to guard it against marauding forces.
  - type: text
    content: Never again will an oppressor overrun my people,
  - type: text
    content: for now I am keeping watch.
  - type: heading
    content: The Coming of Zion’s King
  '9':
  - type: text
    content: Rejoice greatly, Daughter Zion!
  - type: text
    content: Shout, Daughter Jerusalem!
  - type: text
    content: See, your king comes to you,
  - type: text
    content: righteous and victorious,
  - type: text
    content: lowly and riding on a donkey,
  - type: text
    content: on a colt, the foal of a donkey.
