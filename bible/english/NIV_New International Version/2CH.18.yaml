document_id: 2CH.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Micaiah Prophesies Against Ahab
  - type: text
    content: 'Now Jehoshaphat had great wealth and honor, and he allied himself with Ahab by marriage. '
  '10':
  - type: text
    content: 'Now Zedekiah son of Kenaanah had made iron horns, and he declared, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘With these you will gore the Arameans until they are destroyed.’ ”'
  '11':
  - type: text
    content: 'All the other prophets were prophesying the same thing. “Attack Ramoth Gilead and be victorious,” they said, “for the '
  - type: text
    content: Lord
  - type: text
    content: ' will give it into the king’s hand.”'
  '12':
  - type: text
    content: The messenger who had gone to summon Micaiah said to him, “Look, the other prophets without exception are predicting success for the king. Let your word agree with theirs, and speak favorably.”
  '13':
  - type: text
    content: 'But Micaiah said, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, I can tell him only what my God says.”'
  '14':
  - type: text
    content: When he arrived, the king asked him, “Micaiah, shall we go to war against Ramoth Gilead, or shall I not?”
  - type: text
    content: “Attack and be victorious,” he answered, “for they will be given into your hand.”
  '15':
  - type: text
    content: 'The king said to him, “How many times must I make you swear to tell me nothing but the truth in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '16':
  - type: text
    content: 'Then Micaiah answered, “I saw all Israel scattered on the hills like sheep without a shepherd, and the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘These people have no master. Let each one go home in peace.’ ”'
  '17':
  - type: text
    content: The king of Israel said to Jehoshaphat, “Didn’t I tell you that he never prophesies anything good about me, but only bad?”
  '18':
  - type: text
    content: 'Micaiah continued, “Therefore hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': I saw the '
  - type: text
    content: Lord
  - type: text
    content: ' sitting on his throne with all the multitudes of heaven standing on his right and on his left. '
  '19':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘Who will entice Ahab king of Israel into attacking Ramoth Gilead and going to his death there?’'
  - type: text
    content: '“One suggested this, and another that. '
  '2':
  - type: text
    content: 'Some years later he went down to see Ahab in Samaria. Ahab slaughtered many sheep and cattle for him and the people with him and urged him to attack Ramoth Gilead. '
  '20':
  - type: text
    content: 'Finally, a spirit came forward, stood before the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, ‘I will entice him.’'
  - type: text
    content: '“ ‘By what means?’ the '
  - type: text
    content: Lord
  - type: text
    content: ' asked.'
  '21':
  - type: text
    content: “ ‘I will go and be a deceiving spirit in the mouths of all his prophets,’ he said.
  - type: text
    content: '“ ‘You will succeed in enticing him,’ said the '
  - type: text
    content: Lord
  - type: text
    content: . ‘Go and do it.’
  '22':
  - type: text
    content: '“So now the '
  - type: text
    content: Lord
  - type: text
    content: ' has put a deceiving spirit in the mouths of these prophets of yours. The '
  - type: text
    content: Lord
  - type: text
    content: ' has decreed disaster for you.”'
  '23':
  - type: text
    content: Then Zedekiah son of Kenaanah went up and slapped Micaiah in the face. “Which way did the spirit from
  - type: note
    content: Or Spirit of
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' go when he went from me to speak to you?” he asked.'
  '24':
  - type: text
    content: Micaiah replied, “You will find out on the day you go to hide in an inner room.”
  '25':
  - type: text
    content: 'The king of Israel then ordered, “Take Micaiah and send him back to Amon the ruler of the city and to Joash the king’s son, '
  '26':
  - type: text
    content: 'and say, ‘This is what the king says: Put this fellow in prison and give him nothing but bread and water until I return safely.’ ”'
  '27':
  - type: text
    content: 'Micaiah declared, “If you ever return safely, the '
  - type: text
    content: Lord
  - type: text
    content: ' has not spoken through me.” Then he added, “Mark my words, all you people!”'
  - type: heading
    content: Ahab Killed at Ramoth Gilead
  '28':
  - type: text
    content: 'So the king of Israel and Jehoshaphat king of Judah went up to Ramoth Gilead. '
  '29':
  - type: text
    content: The king of Israel said to Jehoshaphat, “I will enter the battle in disguise, but you wear your royal robes.” So the king of Israel disguised himself and went into battle.
  '3':
  - type: text
    content: Ahab king of Israel asked Jehoshaphat king of Judah, “Will you go with me against Ramoth Gilead?”
  - type: text
    content: 'Jehoshaphat replied, “I am as you are, and my people as your people; we will join you in the war.” '
  '30':
  - type: text
    content: 'Now the king of Aram had ordered his chariot commanders, “Do not fight with anyone, small or great, except the king of Israel.” '
  '31':
  - type: text
    content: 'When the chariot commanders saw Jehoshaphat, they thought, “This is the king of Israel.” So they turned to attack him, but Jehoshaphat cried out, and the '
  - type: text
    content: Lord
  - type: text
    content: ' helped him. God drew them away from him, '
  '32':
  - type: text
    content: for when the chariot commanders saw that he was not the king of Israel, they stopped pursuing him.
  '33':
  - type: text
    content: 'But someone drew his bow at random and hit the king of Israel between the breastplate and the scale armor. The king told the chariot driver, “Wheel around and get me out of the fighting. I’ve been wounded.” '
  '34':
  - type: text
    content: All day long the battle raged, and the king of Israel propped himself up in his chariot facing the Arameans until evening. Then at sunset he died.
  '4':
  - type: text
    content: 'But Jehoshaphat also said to the king of Israel, “First seek the counsel of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '5':
  - type: text
    content: So the king of Israel brought together the prophets—four hundred men—and asked them, “Shall we go to war against Ramoth Gilead, or shall I not?”
  - type: text
    content: “Go,” they answered, “for God will give it into the king’s hand.”
  '6':
  - type: text
    content: 'But Jehoshaphat asked, “Is there no longer a prophet of the '
  - type: text
    content: Lord
  - type: text
    content: ' here whom we can inquire of?”'
  '7':
  - type: text
    content: 'The king of Israel answered Jehoshaphat, “There is still one prophet through whom we can inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ', but I hate him because he never prophesies anything good about me, but always bad. He is Micaiah son of Imlah.”'
  - type: text
    content: “The king should not say such a thing,” Jehoshaphat replied.
  '8':
  - type: text
    content: So the king of Israel called one of his officials and said, “Bring Micaiah son of Imlah at once.”
  '9':
  - type: text
    content: 'Dressed in their royal robes, the king of Israel and Jehoshaphat king of Judah were sitting on their thrones at the threshing floor by the entrance of the gate of Samaria, with all the prophets prophesying before them. '
