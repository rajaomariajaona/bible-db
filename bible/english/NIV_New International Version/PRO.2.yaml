document_id: PRO.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moral Benefits of Wisdom
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My son, if you accept my words
- type: usfm
  marker: q2
  children:
  - type: text
    text: and store up my commands within you,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: turning your ear to wisdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and applying your heart to understanding—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: indeed, if you call out for insight
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cry aloud for understanding,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and if you look for it as for silver
- type: usfm
  marker: q2
  children:
  - type: text
    text: and search for it as for hidden treasure,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'then you will understand the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and find the knowledge of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gives wisdom;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from his mouth come knowledge and understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He holds success in store for the upright,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is a shield to those whose walk is blameless,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: for he guards the course of the just
- type: usfm
  marker: q2
  children:
  - type: text
    text: and protects the way of his faithful ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then you will understand what is right and just
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fair—every good path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For wisdom will enter your heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and knowledge will be pleasant to your soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Discretion will protect you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and understanding will guard you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Wisdom will save you from the ways of wicked men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from men whose words are perverse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: who have left the straight paths
- type: usfm
  marker: q2
  children:
  - type: text
    text: to walk in dark ways,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: who delight in doing wrong
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rejoice in the perverseness of evil,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: whose paths are crooked
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who are devious in their ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Wisdom will save you also from the adulterous woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the wayward woman with her seductive words,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: who has left the partner of her youth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and ignored the covenant she made before God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: covenant of her God
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Surely her house leads down to death
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her paths to the spirits of the dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: None who go to her return
- type: usfm
  marker: q2
  children:
  - type: text
    text: or attain the paths of life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Thus you will walk in the ways of the good
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keep to the paths of the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For the upright will live in the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the blameless will remain in it;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: but the wicked will be cut off from the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the unfaithful will be torn from it.
