document_id: PRO.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Moral Benefits of Wisdom
  - type: text
    content: My son, if you accept my words
  - type: text
    content: and store up my commands within you,
  '10':
  - type: text
    content: For wisdom will enter your heart,
  - type: text
    content: and knowledge will be pleasant to your soul.
  '11':
  - type: text
    content: Discretion will protect you,
  - type: text
    content: and understanding will guard you.
  '12':
  - type: text
    content: Wisdom will save you from the ways of wicked men,
  - type: text
    content: from men whose words are perverse,
  '13':
  - type: text
    content: who have left the straight paths
  - type: text
    content: to walk in dark ways,
  '14':
  - type: text
    content: who delight in doing wrong
  - type: text
    content: and rejoice in the perverseness of evil,
  '15':
  - type: text
    content: whose paths are crooked
  - type: text
    content: and who are devious in their ways.
  '16':
  - type: text
    content: Wisdom will save you also from the adulterous woman,
  - type: text
    content: from the wayward woman with her seductive words,
  '17':
  - type: text
    content: who has left the partner of her youth
  - type: text
    content: and ignored the covenant she made before God.
  - type: note
    content: Or covenant of her God
  '18':
  - type: text
    content: Surely her house leads down to death
  - type: text
    content: and her paths to the spirits of the dead.
  '19':
  - type: text
    content: None who go to her return
  - type: text
    content: or attain the paths of life.
  '2':
  - type: text
    content: turning your ear to wisdom
  - type: text
    content: and applying your heart to understanding—
  '20':
  - type: text
    content: Thus you will walk in the ways of the good
  - type: text
    content: and keep to the paths of the righteous.
  '21':
  - type: text
    content: For the upright will live in the land,
  - type: text
    content: and the blameless will remain in it;
  '22':
  - type: text
    content: but the wicked will be cut off from the land,
  - type: text
    content: and the unfaithful will be torn from it.
  '3':
  - type: text
    content: indeed, if you call out for insight
  - type: text
    content: and cry aloud for understanding,
  '4':
  - type: text
    content: and if you look for it as for silver
  - type: text
    content: and search for it as for hidden treasure,
  '5':
  - type: text
    content: 'then you will understand the fear of the '
  - type: text
    content: Lord
  - type: text
    content: and find the knowledge of God.
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' gives wisdom;'
  - type: text
    content: from his mouth come knowledge and understanding.
  '7':
  - type: text
    content: He holds success in store for the upright,
  - type: text
    content: he is a shield to those whose walk is blameless,
  '8':
  - type: text
    content: for he guards the course of the just
  - type: text
    content: and protects the way of his faithful ones.
  '9':
  - type: text
    content: Then you will understand what is right and just
  - type: text
    content: and fair—every good path.
