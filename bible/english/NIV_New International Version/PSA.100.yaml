document_id: PSA.100,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 100
  - type: text
    content: A psalm. For giving grateful praise.
  - type: text
    content: 'Shout for joy to the '
  - type: text
    content: Lord
  - type: text
    content: ', all the earth.'
  '2':
  - type: text
    content: 'Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' with gladness;'
  - type: text
    content: come before him with joyful songs.
  '3':
  - type: text
    content: 'Know that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God.'
  - type: text
    content: It is he who made us, and we are his
  - type: note
    content: Or and not we ourselves
  - type: text
    content: ;
  - type: text
    content: we are his people, the sheep of his pasture.
  '4':
  - type: text
    content: Enter his gates with thanksgiving
  - type: text
    content: and his courts with praise;
  - type: text
    content: give thanks to him and praise his name.
  '5':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is good and his love endures forever;'
  - type: text
    content: his faithfulness continues through all generations.
