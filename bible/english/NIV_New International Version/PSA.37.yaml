document_id: PSA.37,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 37This psalm is an acrostic poem, the stanzas of which begin with the successive letters of the Hebrew alphabet.
  - type: text
    content: Of David.
  - type: text
    content: Do not fret because of those who are evil
  - type: text
    content: or be envious of those who do wrong;
  '10':
  - type: text
    content: A little while, and the wicked will be no more;
  - type: text
    content: though you look for them, they will not be found.
  '11':
  - type: text
    content: But the meek will inherit the land
  - type: text
    content: and enjoy peace and prosperity.
  '12':
  - type: text
    content: The wicked plot against the righteous
  - type: text
    content: and gnash their teeth at them;
  '13':
  - type: text
    content: but the Lord laughs at the wicked,
  - type: text
    content: for he knows their day is coming.
  '14':
  - type: text
    content: The wicked draw the sword
  - type: text
    content: and bend the bow
  - type: text
    content: to bring down the poor and needy,
  - type: text
    content: to slay those whose ways are upright.
  '15':
  - type: text
    content: But their swords will pierce their own hearts,
  - type: text
    content: and their bows will be broken.
  '16':
  - type: text
    content: Better the little that the righteous have
  - type: text
    content: than the wealth of many wicked;
  '17':
  - type: text
    content: for the power of the wicked will be broken,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' upholds the righteous.'
  '18':
  - type: text
    content: 'The blameless spend their days under the '
  - type: text
    content: Lord
  - type: text
    content: ’s care,
  - type: text
    content: and their inheritance will endure forever.
  '19':
  - type: text
    content: In times of disaster they will not wither;
  - type: text
    content: in days of famine they will enjoy plenty.
  '2':
  - type: text
    content: for like the grass they will soon wither,
  - type: text
    content: like green plants they will soon die away.
  '20':
  - type: text
    content: 'But the wicked will perish:'
  - type: text
    content: 'Though the '
  - type: text
    content: Lord
  - type: text
    content: ’s enemies are like the flowers of the field,
  - type: text
    content: they will be consumed, they will go up in smoke.
  '21':
  - type: text
    content: The wicked borrow and do not repay,
  - type: text
    content: but the righteous give generously;
  '22':
  - type: text
    content: 'those the '
  - type: text
    content: Lord
  - type: text
    content: ' blesses will inherit the land,'
  - type: text
    content: but those he curses will be destroyed.
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' makes firm the steps'
  - type: text
    content: of the one who delights in him;
  '24':
  - type: text
    content: though he may stumble, he will not fall,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' upholds him with his hand.'
  '25':
  - type: text
    content: I was young and now I am old,
  - type: text
    content: yet I have never seen the righteous forsaken
  - type: text
    content: or their children begging bread.
  '26':
  - type: text
    content: They are always generous and lend freely;
  - type: text
    content: their children will be a blessing.
  - type: note
    content: Or freely; / the names of their children will be used in blessings (see Gen. 48:20); or freely; / others will see that their children are blessed
  '27':
  - type: text
    content: Turn from evil and do good;
  - type: text
    content: then you will dwell in the land forever.
  '28':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' loves the just'
  - type: text
    content: and will not forsake his faithful ones.
  - type: text
    content: Wrongdoers will be completely destroyed
  - type: note
    content: See Septuagint; Hebrew They will be protected forever
  - type: text
    content: ;
  - type: text
    content: the offspring of the wicked will perish.
  '29':
  - type: text
    content: The righteous will inherit the land
  - type: text
    content: and dwell in it forever.
  '3':
  - type: text
    content: 'Trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' and do good;'
  - type: text
    content: dwell in the land and enjoy safe pasture.
  '30':
  - type: text
    content: The mouths of the righteous utter wisdom,
  - type: text
    content: and their tongues speak what is just.
  '31':
  - type: text
    content: The law of their God is in their hearts;
  - type: text
    content: their feet do not slip.
  '32':
  - type: text
    content: The wicked lie in wait for the righteous,
  - type: text
    content: intent on putting them to death;
  '33':
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' will not leave them in the power of the wicked'
  - type: text
    content: or let them be condemned when brought to trial.
  '34':
  - type: text
    content: 'Hope in the '
  - type: text
    content: Lord
  - type: text
    content: and keep his way.
  - type: text
    content: He will exalt you to inherit the land;
  - type: text
    content: when the wicked are destroyed, you will see it.
  '35':
  - type: text
    content: I have seen a wicked and ruthless man
  - type: text
    content: flourishing like a luxuriant native tree,
  '36':
  - type: text
    content: but he soon passed away and was no more;
  - type: text
    content: though I looked for him, he could not be found.
  '37':
  - type: text
    content: Consider the blameless, observe the upright;
  - type: text
    content: a future awaits those who seek peace.
  - type: note
    content: Or upright; / those who seek peace will have posterity
  '38':
  - type: text
    content: But all sinners will be destroyed;
  - type: text
    content: there will be no future
  - type: note
    content: Or posterity
  - type: text
    content: ' for the wicked.'
  '39':
  - type: text
    content: 'The salvation of the righteous comes from the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: he is their stronghold in time of trouble.
  '4':
  - type: text
    content: 'Take delight in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and he will give you the desires of your heart.
  '40':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' helps them and delivers them;'
  - type: text
    content: he delivers them from the wicked and saves them,
  - type: text
    content: because they take refuge in him.
  '5':
  - type: text
    content: 'Commit your way to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'trust in him and he will do this:'
  '6':
  - type: text
    content: He will make your righteous reward shine like the dawn,
  - type: text
    content: your vindication like the noonday sun.
  '7':
  - type: text
    content: 'Be still before the '
  - type: text
    content: Lord
  - type: text
    content: and wait patiently for him;
  - type: text
    content: do not fret when people succeed in their ways,
  - type: text
    content: when they carry out their wicked schemes.
  '8':
  - type: text
    content: Refrain from anger and turn from wrath;
  - type: text
    content: do not fret—it leads only to evil.
  '9':
  - type: text
    content: For those who are evil will be destroyed,
  - type: text
    content: 'but those who hope in the '
  - type: text
    content: Lord
  - type: text
    content: ' will inherit the land.'
