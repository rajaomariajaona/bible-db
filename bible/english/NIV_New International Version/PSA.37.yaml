document_id: PSA.37,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 37
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is an acrostic poem, the stanzas of which begin with the successive letters of the Hebrew alphabet.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Do not fret because of those who are evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or be envious of those who do wrong;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: A little while, and the wicked will be no more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though you look for them, they will not be found.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But the meek will inherit the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and enjoy peace and prosperity.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The wicked plot against the righteous
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gnash their teeth at them;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: but the Lord laughs at the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he knows their day is coming.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The wicked draw the sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bend the bow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to bring down the poor and needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to slay those whose ways are upright.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But their swords will pierce their own hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their bows will be broken.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Better the little that the righteous have
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the wealth of many wicked;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: for the power of the wicked will be broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' upholds the righteous.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The blameless spend their days under the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s care,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their inheritance will endure forever.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: In times of disaster they will not wither;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in days of famine they will enjoy plenty.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: for like the grass they will soon wither,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like green plants they will soon die away.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But the wicked will perish:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Though the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s enemies are like the flowers of the field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be consumed, they will go up in smoke.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The wicked borrow and do not repay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the righteous give generously;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'those the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blesses will inherit the land,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but those he curses will be destroyed.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' makes firm the steps'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of the one who delights in him;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: though he may stumble, he will not fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' upholds him with his hand.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I was young and now I am old,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet I have never seen the righteous forsaken
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or their children begging bread.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: They are always generous and lend freely;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their children will be a blessing.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'freely; / the names of their children will be used in blessings '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(see Gen. 48:20); or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: freely; / others will see that their children are blessed
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Turn from evil and do good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then you will dwell in the land forever.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loves the just'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will not forsake his faithful ones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wrongdoers will be completely destroyed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They will be protected forever
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the offspring of the wicked will perish.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The righteous will inherit the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dwell in it forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and do good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dwell in the land and enjoy safe pasture.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: The mouths of the righteous utter wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their tongues speak what is just.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The law of their God is in their hearts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their feet do not slip.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The wicked lie in wait for the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: intent on putting them to death;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not leave them in the power of the wicked'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or let them be condemned when brought to trial.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keep his way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will exalt you to inherit the land;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the wicked are destroyed, you will see it.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: I have seen a wicked and ruthless man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flourishing like a luxuriant native tree,
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: but he soon passed away and was no more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though I looked for him, he could not be found.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Consider the blameless, observe the upright;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a future awaits those who seek peace.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: upright; / those who seek peace will have posterity
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: But all sinners will be destroyed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there will be no future
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: posterity
      marker-yv: yv-n
    - type: text
      text: ' for the wicked.'
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'The salvation of the righteous comes from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is their stronghold in time of trouble.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Take delight in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will give you the desires of your heart.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' helps them and delivers them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he delivers them from the wicked and saves them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they take refuge in him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Commit your way to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'trust in him and he will do this:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He will make your righteous reward shine like the dawn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your vindication like the noonday sun.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Be still before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wait patiently for him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: do not fret when people succeed in their ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they carry out their wicked schemes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Refrain from anger and turn from wrath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not fret—it leads only to evil.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For those who are evil will be destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but those who hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will inherit the land.'
