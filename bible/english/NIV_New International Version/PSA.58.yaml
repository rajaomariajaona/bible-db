segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 58
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 58:1-11 is numbered 58:2-12.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the director of music. To the tune of “Do Not Destroy.” Of David. A '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: miktam.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a literary or musical term'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Do you rulers indeed speak justly?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you judge people with equity?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: No, in your heart you devise injustice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your hands mete out violence on the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Even from birth the wicked go astray;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the womb they are wayward, spreading lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Their venom is like the venom of a snake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like that of a cobra that has stopped its ears,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: that will not heed the tune of the charmer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: however skillful the enchanter may be.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Break the teeth in their mouths, O God;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', tear out the fangs of those lions!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let them vanish like water that flows away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they draw the bow, let their arrows fall short.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: May they be like a slug that melts away as it moves along,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a stillborn child that never sees the sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Before your pots can feel the heat of the thorns—
- type: usfm
  marker: q2
  children:
  - type: text
    text: whether they be green or dry—the wicked will be swept away.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '58:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this verse is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The righteous will be glad when they are avenged,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they dip their feet in the blood of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then people will say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Surely the righteous still are rewarded;
- type: usfm
  marker: q2
  children:
  - type: text
    text: surely there is a God who judges the earth.”
