document_id: PSA.58,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 58In Hebrew texts 58:1-11 is numbered 58:2-12.
  - type: text
    content: 'For the director of music. To the tune of “Do Not Destroy.” Of David. A '
  - type: text
    content: miktam.
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: Do you rulers indeed speak justly?
  - type: text
    content: Do you judge people with equity?
  '10':
  - type: text
    content: The righteous will be glad when they are avenged,
  - type: text
    content: when they dip their feet in the blood of the wicked.
  '11':
  - type: text
    content: Then people will say,
  - type: text
    content: “Surely the righteous still are rewarded;
  - type: text
    content: surely there is a God who judges the earth.”
  '2':
  - type: text
    content: No, in your heart you devise injustice,
  - type: text
    content: and your hands mete out violence on the earth.
  '3':
  - type: text
    content: Even from birth the wicked go astray;
  - type: text
    content: from the womb they are wayward, spreading lies.
  '4':
  - type: text
    content: Their venom is like the venom of a snake,
  - type: text
    content: like that of a cobra that has stopped its ears,
  '5':
  - type: text
    content: that will not heed the tune of the charmer,
  - type: text
    content: however skillful the enchanter may be.
  '6':
  - type: text
    content: Break the teeth in their mouths, O God;
  - type: text
    content: Lord
  - type: text
    content: ', tear out the fangs of those lions!'
  '7':
  - type: text
    content: Let them vanish like water that flows away;
  - type: text
    content: when they draw the bow, let their arrows fall short.
  '8':
  - type: text
    content: May they be like a slug that melts away as it moves along,
  - type: text
    content: like a stillborn child that never sees the sun.
  '9':
  - type: text
    content: Before your pots can feel the heat of the thorns—
  - type: text
    content: whether they be green or dry—the wicked will be swept away.
  - type: note
    content: The meaning of the Hebrew for this verse is uncertain.
