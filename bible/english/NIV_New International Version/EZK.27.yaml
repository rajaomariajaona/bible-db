document_id: EZK.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lament Over Tyre
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: “ ‘Men of Persia, Lydia and Put
  - type: text
    content: served as soldiers in your army.
  - type: text
    content: They hung their shields and helmets on your walls,
  - type: text
    content: bringing you splendor.
  '11':
  - type: text
    content: Men of Arvad and Helek
  - type: text
    content: guarded your walls on every side;
  - type: text
    content: men of Gammad
  - type: text
    content: were in your towers.
  - type: text
    content: They hung their shields around your walls;
  - type: text
    content: they brought your beauty to perfection.
  '12':
  - type: text
    content: “ ‘Tarshish did business with you because of your great wealth of goods; they exchanged silver, iron, tin and lead for your merchandise.
  '13':
  - type: text
    content: “ ‘Greece, Tubal and Meshek did business with you; they traded human beings and articles of bronze for your wares.
  '14':
  - type: text
    content: “ ‘Men of Beth Togarmah exchanged chariot horses, cavalry horses and mules for your merchandise.
  '15':
  - type: text
    content: “ ‘The men of Rhodes
  - type: note
    content: Septuagint; Hebrew Dedan
  - type: text
    content: ' traded with you, and many coastlands were your customers; they paid you with ivory tusks and ebony.'
  '16':
  - type: text
    content: “ ‘Aram
  - type: note
    content: Most Hebrew manuscripts; some Hebrew manuscripts and Syriac Edom
  - type: text
    content: ' did business with you because of your many products; they exchanged turquoise, purple fabric, embroidered work, fine linen, coral and rubies for your merchandise.'
  '17':
  - type: text
    content: “ ‘Judah and Israel traded with you; they exchanged wheat from Minnith and confections,
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' honey, olive oil and balm for your wares.'
  '18':
  - type: text
    content: '“ ‘Damascus did business with you because of your many products and great wealth of goods. They offered wine from Helbon, wool from Zahar '
  '19':
  - type: text
    content: 'and casks of wine from Izal in exchange for your wares: wrought iron, cassia and calamus.'
  '2':
  - type: text
    content: '“Son of man, take up a lament concerning Tyre. '
  '20':
  - type: text
    content: “ ‘Dedan traded in saddle blankets with you.
  '21':
  - type: text
    content: “ ‘Arabia and all the princes of Kedar were your customers; they did business with you in lambs, rams and goats.
  '22':
  - type: text
    content: “ ‘The merchants of Sheba and Raamah traded with you; for your merchandise they exchanged the finest of all kinds of spices and precious stones, and gold.
  '23':
  - type: text
    content: '“ ‘Harran, Kanneh and Eden and merchants of Sheba, Ashur and Kilmad traded with you. '
  '24':
  - type: text
    content: In your marketplace they traded with you beautiful garments, blue fabric, embroidered work and multicolored rugs with cords twisted and tightly knotted.
  '25':
  - type: text
    content: “ ‘The ships of Tarshish serve
  - type: text
    content: as carriers for your wares.
  - type: text
    content: You are filled with heavy cargo
  - type: text
    content: as you sail the sea.
  '26':
  - type: text
    content: Your oarsmen take you
  - type: text
    content: out to the high seas.
  - type: text
    content: But the east wind will break you to pieces
  - type: text
    content: far out at sea.
  '27':
  - type: text
    content: Your wealth, merchandise and wares,
  - type: text
    content: your mariners, sailors and shipwrights,
  - type: text
    content: your merchants and all your soldiers,
  - type: text
    content: and everyone else on board
  - type: text
    content: will sink into the heart of the sea
  - type: text
    content: on the day of your shipwreck.
  '28':
  - type: text
    content: The shorelands will quake
  - type: text
    content: when your sailors cry out.
  '29':
  - type: text
    content: All who handle the oars
  - type: text
    content: will abandon their ships;
  - type: text
    content: the mariners and all the sailors
  - type: text
    content: will stand on the shore.
  '3':
  - type: text
    content: 'Say to Tyre, situated at the gateway to the sea, merchant of peoples on many coasts, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘You say, Tyre,
  - type: text
    content: “I am perfect in beauty.”
  '30':
  - type: text
    content: They will raise their voice
  - type: text
    content: and cry bitterly over you;
  - type: text
    content: they will sprinkle dust on their heads
  - type: text
    content: and roll in ashes.
  '31':
  - type: text
    content: They will shave their heads because of you
  - type: text
    content: and will put on sackcloth.
  - type: text
    content: They will weep over you with anguish of soul
  - type: text
    content: and with bitter mourning.
  '32':
  - type: text
    content: As they wail and mourn over you,
  - type: text
    content: 'they will take up a lament concerning you:'
  - type: text
    content: “Who was ever silenced like Tyre,
  - type: text
    content: surrounded by the sea?”
  '33':
  - type: text
    content: When your merchandise went out on the seas,
  - type: text
    content: you satisfied many nations;
  - type: text
    content: with your great wealth and your wares
  - type: text
    content: you enriched the kings of the earth.
  '34':
  - type: text
    content: Now you are shattered by the sea
  - type: text
    content: in the depths of the waters;
  - type: text
    content: your wares and all your company
  - type: text
    content: have gone down with you.
  '35':
  - type: text
    content: All who live in the coastlands
  - type: text
    content: are appalled at you;
  - type: text
    content: their kings shudder with horror
  - type: text
    content: and their faces are distorted with fear.
  '36':
  - type: text
    content: The merchants among the nations scoff at you;
  - type: text
    content: you have come to a horrible end
  - type: text
    content: and will be no more.’ ”
  '4':
  - type: text
    content: Your domain was on the high seas;
  - type: text
    content: your builders brought your beauty to perfection.
  '5':
  - type: text
    content: They made all your timbers
  - type: text
    content: of juniper from Senir
  - type: note
    content: That is, Mount Hermon
  - type: text
    content: ;
  - type: text
    content: they took a cedar from Lebanon
  - type: text
    content: to make a mast for you.
  '6':
  - type: text
    content: Of oaks from Bashan
  - type: text
    content: they made your oars;
  - type: text
    content: of cypress wood
  - type: note
    content: Targum; the Masoretic Text has a different division of the consonants.
  - type: text
    content: ' from the coasts of Cyprus'
  - type: text
    content: they made your deck, adorned with ivory.
  '7':
  - type: text
    content: Fine embroidered linen from Egypt was your sail
  - type: text
    content: and served as your banner;
  - type: text
    content: your awnings were of blue and purple
  - type: text
    content: from the coasts of Elishah.
  '8':
  - type: text
    content: Men of Sidon and Arvad were your oarsmen;
  - type: text
    content: your skilled men, Tyre, were aboard as your sailors.
  '9':
  - type: text
    content: Veteran craftsmen of Byblos were on board
  - type: text
    content: as shipwrights to caulk your seams.
  - type: text
    content: All the ships of the sea and their sailors
  - type: text
    content: came alongside to trade for your wares.
