document_id: EZK.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Lament Over Tyre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, take up a lament concerning Tyre. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Say to Tyre, situated at the gateway to the sea, merchant of peoples on many coasts, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘You say, Tyre,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I am perfect in beauty.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Your domain was on the high seas;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your builders brought your beauty to perfection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They made all your timbers
- type: usfm
  marker: q2
  children:
  - type: text
    text: of juniper from Senir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Mount Hermon
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they took a cedar from Lebanon
- type: usfm
  marker: q2
  children:
  - type: text
    text: to make a mast for you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Of oaks from Bashan
- type: usfm
  marker: q2
  children:
  - type: text
    text: they made your oars;
- type: usfm
  marker: q1
  children:
  - type: text
    text: of cypress wood
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Targum; the Masoretic Text has a different division of the consonants.
    marker-yv: yv-n
  - type: text
    text: ' from the coasts of Cyprus'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they made your deck, adorned with ivory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fine embroidered linen from Egypt was your sail
- type: usfm
  marker: q2
  children:
  - type: text
    text: and served as your banner;
- type: usfm
  marker: q1
  children:
  - type: text
    text: your awnings were of blue and purple
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the coasts of Elishah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Men of Sidon and Arvad were your oarsmen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your skilled men, Tyre, were aboard as your sailors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Veteran craftsmen of Byblos were on board
- type: usfm
  marker: q2
  children:
  - type: text
    text: as shipwrights to caulk your seams.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the ships of the sea and their sailors
- type: usfm
  marker: q2
  children:
  - type: text
    text: came alongside to trade for your wares.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “ ‘Men of Persia, Lydia and Put
- type: usfm
  marker: q2
  children:
  - type: text
    text: served as soldiers in your army.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They hung their shields and helmets on your walls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bringing you splendor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Men of Arvad and Helek
- type: usfm
  marker: q2
  children:
  - type: text
    text: guarded your walls on every side;
- type: usfm
  marker: q1
  children:
  - type: text
    text: men of Gammad
- type: usfm
  marker: q2
  children:
  - type: text
    text: were in your towers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They hung their shields around your walls;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they brought your beauty to perfection.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “ ‘Tarshish did business with you because of your great wealth of goods; they exchanged silver, iron, tin and lead for your merchandise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “ ‘Greece, Tubal and Meshek did business with you; they traded human beings and articles of bronze for your wares.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “ ‘Men of Beth Togarmah exchanged chariot horses, cavalry horses and mules for your merchandise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “ ‘The men of Rhodes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dedan
    marker-yv: yv-n
  - type: text
    text: ' traded with you, and many coastlands were your customers; they paid you with ivory tusks and ebony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “ ‘Aram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Most Hebrew manuscripts; some Hebrew manuscripts and Syriac '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Edom
    marker-yv: yv-n
  - type: text
    text: ' did business with you because of your many products; they exchanged turquoise, purple fabric, embroidered work, fine linen, coral and rubies for your merchandise.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “ ‘Judah and Israel traded with you; they exchanged wheat from Minnith and confections,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' honey, olive oil and balm for your wares.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“ ‘Damascus did business with you because of your many products and great wealth of goods. They offered wine from Helbon, wool from Zahar '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and casks of wine from Izal in exchange for your wares: wrought iron, cassia and calamus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “ ‘Dedan traded in saddle blankets with you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “ ‘Arabia and all the princes of Kedar were your customers; they did business with you in lambs, rams and goats.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “ ‘The merchants of Sheba and Raamah traded with you; for your merchandise they exchanged the finest of all kinds of spices and precious stones, and gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“ ‘Harran, Kanneh and Eden and merchants of Sheba, Ashur and Kilmad traded with you. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: In your marketplace they traded with you beautiful garments, blue fabric, embroidered work and multicolored rugs with cords twisted and tightly knotted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “ ‘The ships of Tarshish serve
- type: usfm
  marker: q2
  children:
  - type: text
    text: as carriers for your wares.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are filled with heavy cargo
- type: usfm
  marker: q2
  children:
  - type: text
    text: as you sail the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Your oarsmen take you
- type: usfm
  marker: q2
  children:
  - type: text
    text: out to the high seas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the east wind will break you to pieces
- type: usfm
  marker: q2
  children:
  - type: text
    text: far out at sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Your wealth, merchandise and wares,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your mariners, sailors and shipwrights,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your merchants and all your soldiers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everyone else on board
- type: usfm
  marker: q1
  children:
  - type: text
    text: will sink into the heart of the sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the day of your shipwreck.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The shorelands will quake
- type: usfm
  marker: q2
  children:
  - type: text
    text: when your sailors cry out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: All who handle the oars
- type: usfm
  marker: q2
  children:
  - type: text
    text: will abandon their ships;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the mariners and all the sailors
- type: usfm
  marker: q2
  children:
  - type: text
    text: will stand on the shore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: They will raise their voice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cry bitterly over you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will sprinkle dust on their heads
- type: usfm
  marker: q2
  children:
  - type: text
    text: and roll in ashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: They will shave their heads because of you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will put on sackcloth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will weep over you with anguish of soul
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with bitter mourning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: As they wail and mourn over you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they will take up a lament concerning you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Who was ever silenced like Tyre,
- type: usfm
  marker: q2
  children:
  - type: text
    text: surrounded by the sea?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: When your merchandise went out on the seas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you satisfied many nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: with your great wealth and your wares
- type: usfm
  marker: q2
  children:
  - type: text
    text: you enriched the kings of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Now you are shattered by the sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the depths of the waters;
- type: usfm
  marker: q1
  children:
  - type: text
    text: your wares and all your company
- type: usfm
  marker: q2
  children:
  - type: text
    text: have gone down with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: All who live in the coastlands
- type: usfm
  marker: q2
  children:
  - type: text
    text: are appalled at you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: their kings shudder with horror
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their faces are distorted with fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The merchants among the nations scoff at you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have come to a horrible end
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will be no more.’ ”
