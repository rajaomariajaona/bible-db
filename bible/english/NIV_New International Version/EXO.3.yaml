document_id: EXO.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses and the Burning Bush
  - type: text
    content: 'Now Moses was tending the flock of Jethro his father-in-law, the priest of Midian, and he led the flock to the far side of the wilderness and came to Horeb, the mountain of God. '
  '10':
  - type: text
    content: So now, go. I am sending you to Pharaoh to bring my people the Israelites out of Egypt.”
  '11':
  - type: text
    content: But Moses said to God, “Who am I that I should go to Pharaoh and bring the Israelites out of Egypt?”
  '12':
  - type: text
    content: 'And God said, “I will be with you. And this will be the sign to you that it is I who have sent you: When you have brought the people out of Egypt, you'
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' will worship God on this mountain.”'
  '13':
  - type: text
    content: Moses said to God, “Suppose I go to the Israelites and say to them, ‘The God of your fathers has sent me to you,’ and they ask me, ‘What is his name?’ Then what shall I tell them?”
  '14':
  - type: text
    content: God said to Moses, “
  - type: text
    content: I am who I am
  - type: text
    content: .
  - type: note
    content: Or I will be what I will be
  - type: text
    content: ' This is what you are to say to the Israelites: ‘'
  - type: text
    content: I am
  - type: text
    content: ' has sent me to you.’ ”'
  '15':
  - type: text
    content: 'God also said to Moses, “Say to the Israelites, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: The Hebrew for Lord sounds like and may be related to the Hebrew for I am in verse 14.
  - type: text
    content: ' the God of your fathers—the God of Abraham, the God of Isaac and the God of Jacob—has sent me to you.’'
  - type: text
    content: “This is my name forever,
  - type: text
    content: the name you shall call me
  - type: text
    content: from generation to generation.
  '16':
  - type: text
    content: '“Go, assemble the elders of Israel and say to them, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your fathers—the God of Abraham, Isaac and Jacob—appeared to me and said: I have watched over you and have seen what has been done to you in Egypt. '
  '17':
  - type: text
    content: And I have promised to bring you up out of your misery in Egypt into the land of the Canaanites, Hittites, Amorites, Perizzites, Hivites and Jebusites—a land flowing with milk and honey.’
  '18':
  - type: text
    content: '“The elders of Israel will listen to you. Then you and the elders are to go to the king of Egypt and say to him, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, has met with us. Let us take a three-day journey into the wilderness to offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.’ '
  '19':
  - type: text
    content: 'But I know that the king of Egypt will not let you go unless a mighty hand compels him. '
  '2':
  - type: text
    content: 'There the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him in flames of fire from within a bush. Moses saw that though the bush was on fire it did not burn up. '
  '20':
  - type: text
    content: So I will stretch out my hand and strike the Egyptians with all the wonders that I will perform among them. After that, he will let you go.
  '21':
  - type: text
    content: '“And I will make the Egyptians favorably disposed toward this people, so that when you leave you will not go empty-handed. '
  '22':
  - type: text
    content: Every woman is to ask her neighbor and any woman living in her house for articles of silver and gold and for clothing, which you will put on your sons and daughters. And so you will plunder the Egyptians.”
  '3':
  - type: text
    content: So Moses thought, “I will go over and see this strange sight—why the bush does not burn up.”
  '4':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' saw that he had gone over to look, God called to him from within the bush, “Moses! Moses!”'
  - type: text
    content: And Moses said, “Here I am.”
  '5':
  - type: text
    content: '“Do not come any closer,” God said. “Take off your sandals, for the place where you are standing is holy ground.” '
  '6':
  - type: text
    content: Then he said, “I am the God of your father,
  - type: note
    content: Masoretic Text; Samaritan Pentateuch (see Acts 7:32) fathers
  - type: text
    content: ' the God of Abraham, the God of Isaac and the God of Jacob.” At this, Moses hid his face, because he was afraid to look at God.'
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I have indeed seen the misery of my people in Egypt. I have heard them crying out because of their slave drivers, and I am concerned about their suffering. '
  '8':
  - type: text
    content: 'So I have come down to rescue them from the hand of the Egyptians and to bring them up out of that land into a good and spacious land, a land flowing with milk and honey—the home of the Canaanites, Hittites, Amorites, Perizzites, Hivites and Jebusites. '
  '9':
  - type: text
    content: 'And now the cry of the Israelites has reached me, and I have seen the way the Egyptians are oppressing them. '
