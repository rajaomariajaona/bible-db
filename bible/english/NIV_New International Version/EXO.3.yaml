      text: Moses and the Burning Bush
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Moses was tending the flock of Jethro his father-in-law, the priest of Midian, and he led the flock to the far side of the wilderness and came to Horeb, the mountain of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So now, go. I am sending you to Pharaoh to bring my people the Israelites out of Egypt.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Moses said to God, “Who am I that I should go to Pharaoh and bring the Israelites out of Egypt?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God said, “I will be with you. And this will be the sign to you that it is I who have sent you: When you have brought the people out of Egypt, you'
