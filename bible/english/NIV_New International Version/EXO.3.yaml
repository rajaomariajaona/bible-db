  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go, assemble the elders of Israel and say to them, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your fathers—the God of Abraham, Isaac and Jacob—appeared to me and said: I have watched over you and have seen what has been done to you in Egypt. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I have promised to bring you up out of your misery in Egypt into the land of the Canaanites, Hittites, Amorites, Perizzites, Hivites and Jebusites—a land flowing with milk and honey.’
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The elders of Israel will listen to you. Then you and the elders are to go to the king of Egypt and say to him, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of the Hebrews, has met with us. Let us take a three-day journey into the wilderness to offer sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I know that the king of Egypt will not let you go unless a mighty hand compels him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to him in flames of fire from within a bush. Moses saw that though the bush was on fire it did not burn up. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I will stretch out my hand and strike the Egyptians with all the wonders that I will perform among them. After that, he will let you go.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And I will make the Egyptians favorably disposed toward this people, so that when you leave you will not go empty-handed. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every woman is to ask her neighbor and any woman living in her house for articles of silver and gold and for clothing, which you will put on your sons and daughters. And so you will plunder the Egyptians.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses thought, “I will go over and see this strange sight—why the bush does not burn up.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saw that he had gone over to look, God called to him from within the bush, “Moses! Moses!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Moses said, “Here I am.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Do not come any closer,” God said. “Take off your sandals, for the place where you are standing is holy ground.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he said, “I am the God of your father,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text; Samaritan Pentateuch (see Acts 7:32) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fathers
      marker-yv: yv-n
    - type: text
      text: ' the God of Abraham, the God of Isaac and the God of Jacob.” At this, Moses hid his face, because he was afraid to look at God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “I have indeed seen the misery of my people in Egypt. I have heard them crying out because of their slave drivers, and I am concerned about their suffering. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I have come down to rescue them from the hand of the Egyptians and to bring them up out of that land into a good and spacious land, a land flowing with milk and honey—the home of the Canaanites, Hittites, Amorites, Perizzites, Hivites and Jebusites. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now the cry of the Israelites has reached me, and I have seen the way the Egyptians are oppressing them. '
