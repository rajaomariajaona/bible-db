document_id: GAL.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, an apostle—sent not from men nor by a man, but by Jesus Christ and God the Father, who raised him from the dead— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and all the brothers and sisters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'brothers and sisters '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: tl
        children:
        - type: text
          text: adelphoi
      - type: text
        text: ) refers here to believers, both men and women, as part of God’s family; also in verse 11; and in 3:15; 4:12, 28, 31; 5:11, 13; 6:1, 18.
    marker-yv: yv-n
  - type: text
    text: ' with me,'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'To the churches in Galatia:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Grace and peace to you from God our Father and the Lord Jesus Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'who gave himself for our sins to rescue us from the present evil age, according to the will of our God and Father, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: to whom be glory for ever and ever. Amen.
- type: usfm
  marker: s1
  children:
  - type: text
    text: No Other Gospel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I am astonished that you are so quickly deserting the one who called you to live in the grace of Christ and are turning to a different gospel— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'which is really no gospel at all. Evidently some people are throwing you into confusion and are trying to pervert the gospel of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But even if we or an angel from heaven should preach a gospel other than the one we preached to you, let them be under God’s curse! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'As we have already said, so now I say again: If anybody is preaching to you a gospel other than what you accepted, let them be under God’s curse!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Am I now trying to win the approval of human beings, or of God? Or am I trying to please people? If I were still trying to please people, I would not be a servant of Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Called by God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I want you to know, brothers and sisters, that the gospel I preached is not of human origin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I did not receive it from any man, nor was I taught it; rather, I received it by revelation from Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For you have heard of my previous way of life in Judaism, how intensely I persecuted the church of God and tried to destroy it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I was advancing in Judaism beyond many of my own age among my people and was extremely zealous for the traditions of my fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But when God, who set me apart from my mother’s womb and called me by his grace, was pleased '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'to reveal his Son in me so that I might preach him among the Gentiles, my immediate response was not to consult any human being. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I did not go up to Jerusalem to see those who were apostles before I was, but I went into Arabia. Later I returned to Damascus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then after three years, I went up to Jerusalem to get acquainted with Cephas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Peter
    marker-yv: yv-n
  - type: text
    text: ' and stayed with him fifteen days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I saw none of the other apostles—only James, the Lord’s brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I assure you before God that what I am writing you is no lie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then I went to Syria and Cilicia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I was personally unknown to the churches of Judea that are in Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They only heard the report: “The man who formerly persecuted us is now preaching the faith he once tried to destroy.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And they praised God because of me.
