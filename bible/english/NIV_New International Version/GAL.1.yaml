document_id: GAL.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Paul, an apostle—sent not from men nor by a man, but by Jesus Christ and God the Father, who raised him from the dead— '
  '10':
  - type: text
    content: Am I now trying to win the approval of human beings, or of God? Or am I trying to please people? If I were still trying to please people, I would not be a servant of Christ.
  - type: heading
    content: Paul Called by God
  '11':
  - type: text
    content: 'I want you to know, brothers and sisters, that the gospel I preached is not of human origin. '
  '12':
  - type: text
    content: I did not receive it from any man, nor was I taught it; rather, I received it by revelation from Jesus Christ.
  '13':
  - type: text
    content: 'For you have heard of my previous way of life in Judaism, how intensely I persecuted the church of God and tried to destroy it. '
  '14':
  - type: text
    content: 'I was advancing in Judaism beyond many of my own age among my people and was extremely zealous for the traditions of my fathers. '
  '15':
  - type: text
    content: 'But when God, who set me apart from my mother’s womb and called me by his grace, was pleased '
  '16':
  - type: text
    content: 'to reveal his Son in me so that I might preach him among the Gentiles, my immediate response was not to consult any human being. '
  '17':
  - type: text
    content: I did not go up to Jerusalem to see those who were apostles before I was, but I went into Arabia. Later I returned to Damascus.
  '18':
  - type: text
    content: Then after three years, I went up to Jerusalem to get acquainted with Cephas
  - type: note
    content: That is, Peter
  - type: text
    content: ' and stayed with him fifteen days. '
  '19':
  - type: text
    content: 'I saw none of the other apostles—only James, the Lord’s brother. '
  '2':
  - type: text
    content: and all the brothers and sisters
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in verse 11; and in 3:15; 4:12, 28, 31; 5:11, 13; 6:1, 18.
  - type: text
    content: ' with me,'
  - type: text
    content: 'To the churches in Galatia:'
  '20':
  - type: text
    content: I assure you before God that what I am writing you is no lie.
  '21':
  - type: text
    content: 'Then I went to Syria and Cilicia. '
  '22':
  - type: text
    content: 'I was personally unknown to the churches of Judea that are in Christ. '
  '23':
  - type: text
    content: 'They only heard the report: “The man who formerly persecuted us is now preaching the faith he once tried to destroy.” '
  '24':
  - type: text
    content: And they praised God because of me.
  '3':
  - type: text
    content: 'Grace and peace to you from God our Father and the Lord Jesus Christ, '
  '4':
  - type: text
    content: 'who gave himself for our sins to rescue us from the present evil age, according to the will of our God and Father, '
  '5':
  - type: text
    content: to whom be glory for ever and ever. Amen.
  - type: heading
    content: No Other Gospel
  '6':
  - type: text
    content: 'I am astonished that you are so quickly deserting the one who called you to live in the grace of Christ and are turning to a different gospel— '
  '7':
  - type: text
    content: 'which is really no gospel at all. Evidently some people are throwing you into confusion and are trying to pervert the gospel of Christ. '
  '8':
  - type: text
    content: 'But even if we or an angel from heaven should preach a gospel other than the one we preached to you, let them be under God’s curse! '
  '9':
  - type: text
    content: 'As we have already said, so now I say again: If anybody is preaching to you a gospel other than what you accepted, let them be under God’s curse!'
