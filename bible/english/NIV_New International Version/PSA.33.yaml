document_id: PSA.33,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 33
  - type: text
    content: 'Sing joyfully to the '
  - type: text
    content: Lord
  - type: text
    content: ', you righteous;'
  - type: text
    content: it is fitting for the upright to praise him.
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' foils the plans of the nations;'
  - type: text
    content: he thwarts the purposes of the peoples.
  '11':
  - type: text
    content: 'But the plans of the '
  - type: text
    content: Lord
  - type: text
    content: ' stand firm forever,'
  - type: text
    content: the purposes of his heart through all generations.
  '12':
  - type: text
    content: 'Blessed is the nation whose God is the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the people he chose for his inheritance.
  '13':
  - type: text
    content: 'From heaven the '
  - type: text
    content: Lord
  - type: text
    content: ' looks down'
  - type: text
    content: and sees all mankind;
  '14':
  - type: text
    content: from his dwelling place he watches
  - type: text
    content: all who live on earth—
  '15':
  - type: text
    content: he who forms the hearts of all,
  - type: text
    content: who considers everything they do.
  '16':
  - type: text
    content: No king is saved by the size of his army;
  - type: text
    content: no warrior escapes by his great strength.
  '17':
  - type: text
    content: A horse is a vain hope for deliverance;
  - type: text
    content: despite all its great strength it cannot save.
  '18':
  - type: text
    content: 'But the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' are on those who fear him,'
  - type: text
    content: on those whose hope is in his unfailing love,
  '19':
  - type: text
    content: to deliver them from death
  - type: text
    content: and keep them alive in famine.
  '2':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' with the harp;'
  - type: text
    content: make music to him on the ten-stringed lyre.
  '20':
  - type: text
    content: 'We wait in hope for the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: he is our help and our shield.
  '21':
  - type: text
    content: In him our hearts rejoice,
  - type: text
    content: for we trust in his holy name.
  '22':
  - type: text
    content: 'May your unfailing love be with us, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: even as we put our hope in you.
  '3':
  - type: text
    content: Sing to him a new song;
  - type: text
    content: play skillfully, and shout for joy.
  '4':
  - type: text
    content: 'For the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' is right and true;'
  - type: text
    content: he is faithful in all he does.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' loves righteousness and justice;'
  - type: text
    content: the earth is full of his unfailing love.
  '6':
  - type: text
    content: 'By the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' the heavens were made,'
  - type: text
    content: their starry host by the breath of his mouth.
  '7':
  - type: text
    content: He gathers the waters of the sea into jars
  - type: note
    content: Or sea as into a heap
  - type: text
    content: ;
  - type: text
    content: he puts the deep into storehouses.
  '8':
  - type: text
    content: 'Let all the earth fear the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: let all the people of the world revere him.
  '9':
  - type: text
    content: For he spoke, and it came to be;
  - type: text
    content: he commanded, and it stood firm.
