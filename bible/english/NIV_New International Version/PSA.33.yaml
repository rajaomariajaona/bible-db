document_id: PSA.33,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 33
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing joyfully to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you righteous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is fitting for the upright to praise him.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' foils the plans of the nations;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he thwarts the purposes of the peoples.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the plans of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stand firm forever,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the purposes of his heart through all generations.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed is the nation whose God is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people he chose for his inheritance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From heaven the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looks down'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sees all mankind;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from his dwelling place he watches
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who live on earth—
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he who forms the hearts of all,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who considers everything they do.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No king is saved by the size of his army;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no warrior escapes by his great strength.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A horse is a vain hope for deliverance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: despite all its great strength it cannot save.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are on those who fear him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on those whose hope is in his unfailing love,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to deliver them from death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keep them alive in famine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with the harp;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make music to him on the ten-stringed lyre.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'We wait in hope for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is our help and our shield.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In him our hearts rejoice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for we trust in his holy name.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May your unfailing love be with us, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even as we put our hope in you.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing to him a new song;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: play skillfully, and shout for joy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is right and true;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is faithful in all he does.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loves righteousness and justice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the earth is full of his unfailing love.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the heavens were made,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their starry host by the breath of his mouth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gathers the waters of the sea into jars
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sea as into a heap
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he puts the deep into storehouses.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let all the earth fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let all the people of the world revere him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he spoke, and it came to be;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he commanded, and it stood firm.
