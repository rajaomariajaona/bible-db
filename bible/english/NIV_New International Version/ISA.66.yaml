document_id: ISA.66,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment and Hope
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Heaven is my throne,
  - type: text
    content: and the earth is my footstool.
  - type: text
    content: Where is the house you will build for me?
  - type: text
    content: Where will my resting place be?
  '10':
  - type: text
    content: “Rejoice with Jerusalem and be glad for her,
  - type: text
    content: all you who love her;
  - type: text
    content: rejoice greatly with her,
  - type: text
    content: all you who mourn over her.
  '11':
  - type: text
    content: For you will nurse and be satisfied
  - type: text
    content: at her comforting breasts;
  - type: text
    content: you will drink deeply
  - type: text
    content: and delight in her overflowing abundance.”
  '12':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I will extend peace to her like a river,
  - type: text
    content: and the wealth of nations like a flooding stream;
  - type: text
    content: you will nurse and be carried on her arm
  - type: text
    content: and dandled on her knees.
  '13':
  - type: text
    content: As a mother comforts her child,
  - type: text
    content: so will I comfort you;
  - type: text
    content: and you will be comforted over Jerusalem.”
  '14':
  - type: text
    content: When you see this, your heart will rejoice
  - type: text
    content: and you will flourish like grass;
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be made known to his servants,'
  - type: text
    content: but his fury will be shown to his foes.
  '15':
  - type: text
    content: 'See, the '
  - type: text
    content: Lord
  - type: text
    content: ' is coming with fire,'
  - type: text
    content: and his chariots are like a whirlwind;
  - type: text
    content: he will bring down his anger with fury,
  - type: text
    content: and his rebuke with flames of fire.
  '16':
  - type: text
    content: For with fire and with his sword
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will execute judgment on all people,'
  - type: text
    content: 'and many will be those slain by the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: '“Those who consecrate and purify themselves to go into the gardens, following one who is among those who eat the flesh of pigs, rats and other unclean things—they will meet their end together with the one they follow,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: “And I, because of what they have planned and done, am about to come
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  - type: text
    content: ' and gather the people of all nations and languages, and they will come and see my glory.'
  '19':
  - type: text
    content: “I will set a sign among them, and I will send some of those who survive to the nations—to Tarshish, to the Libyans
  - type: note
    content: Some Septuagint manuscripts Put (Libyans); Hebrew Pul
  - type: text
    content: ' and Lydians (famous as archers), to Tubal and Greece, and to the distant islands that have not heard of my fame or seen my glory. They will proclaim my glory among the nations. '
  '2':
  - type: text
    content: Has not my hand made all these things,
  - type: text
    content: and so they came into being?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: '“These are the ones I look on with favor:'
  - type: text
    content: those who are humble and contrite in spirit,
  - type: text
    content: and who tremble at my word.
  '20':
  - type: text
    content: 'And they will bring all your people, from all the nations, to my holy mountain in Jerusalem as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '—on horses, in chariots and wagons, and on mules and camels,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. “They will bring them, as the Israelites bring their grain offerings, to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in ceremonially clean vessels. '
  '21':
  - type: text
    content: 'And I will select some of them also to be priests and Levites,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '22':
  - type: text
    content: '“As the new heavens and the new earth that I make will endure before me,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “so will your name and descendants endure. '
  '23':
  - type: text
    content: 'From one New Moon to another and from one Sabbath to another, all mankind will come and bow down before me,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: text
    content: “And they will go out and look on the dead bodies of those who rebelled against me; the worms that eat them will not die, the fire that burns them will not be quenched, and they will be loathsome to all mankind.”
  '3':
  - type: text
    content: But whoever sacrifices a bull
  - type: text
    content: is like one who kills a person,
  - type: text
    content: and whoever offers a lamb
  - type: text
    content: is like one who breaks a dog’s neck;
  - type: text
    content: whoever makes a grain offering
  - type: text
    content: is like one who presents pig’s blood,
  - type: text
    content: and whoever burns memorial incense
  - type: text
    content: is like one who worships an idol.
  - type: text
    content: They have chosen their own ways,
  - type: text
    content: and they delight in their abominations;
  '4':
  - type: text
    content: so I also will choose harsh treatment for them
  - type: text
    content: and will bring on them what they dread.
  - type: text
    content: For when I called, no one answered,
  - type: text
    content: when I spoke, no one listened.
  - type: text
    content: They did evil in my sight
  - type: text
    content: and chose what displeases me.”
  '5':
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'you who tremble at his word:'
  - type: text
    content: “Your own people who hate you,
  - type: text
    content: and exclude you because of my name, have said,
  - type: text
    content: '‘Let the '
  - type: text
    content: Lord
  - type: text
    content: ' be glorified,'
  - type: text
    content: that we may see your joy!’
  - type: text
    content: Yet they will be put to shame.
  '6':
  - type: text
    content: Hear that uproar from the city,
  - type: text
    content: hear that noise from the temple!
  - type: text
    content: 'It is the sound of the '
  - type: text
    content: Lord
  - type: text
    content: repaying his enemies all they deserve.
  '7':
  - type: text
    content: “Before she goes into labor,
  - type: text
    content: she gives birth;
  - type: text
    content: before the pains come upon her,
  - type: text
    content: she delivers a son.
  '8':
  - type: text
    content: Who has ever heard of such things?
  - type: text
    content: Who has ever seen things like this?
  - type: text
    content: Can a country be born in a day
  - type: text
    content: or a nation be brought forth in a moment?
  - type: text
    content: Yet no sooner is Zion in labor
  - type: text
    content: than she gives birth to her children.
  '9':
  - type: text
    content: Do I bring to the moment of birth
  - type: text
    content: 'and not give delivery?” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Do I close up the womb
  - type: text
    content: when I bring to delivery?” says your God.
