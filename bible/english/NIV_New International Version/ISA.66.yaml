document_id: ISA.66
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment and Hope
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Heaven is my throne,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the earth is my footstool.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is the house you will build for me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where will my resting place be?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Has not my hand made all these things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and so they came into being?”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“These are the ones I look on with favor:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who are humble and contrite in spirit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who tremble at my word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But whoever sacrifices a bull
- type: usfm
  marker: q2
  children:
  - type: text
    text: is like one who kills a person,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and whoever offers a lamb
- type: usfm
  marker: q2
  children:
  - type: text
    text: is like one who breaks a dog’s neck;
- type: usfm
  marker: q1
  children:
  - type: text
    text: whoever makes a grain offering
- type: usfm
  marker: q2
  children:
  - type: text
    text: is like one who presents pig’s blood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and whoever burns memorial incense
- type: usfm
  marker: q2
  children:
  - type: text
    text: is like one who worships an idol.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have chosen their own ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they delight in their abominations;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: so I also will choose harsh treatment for them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will bring on them what they dread.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For when I called, no one answered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I spoke, no one listened.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They did evil in my sight
- type: usfm
  marker: q2
  children:
  - type: text
    text: and chose what displeases me.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'you who tremble at his word:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your own people who hate you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and exclude you because of my name, have said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘Let the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be glorified,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that we may see your joy!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yet they will be put to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hear that uproar from the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hear that noise from the temple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It is the sound of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: repaying his enemies all they deserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Before she goes into labor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she gives birth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: before the pains come upon her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she delivers a son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Who has ever heard of such things?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has ever seen things like this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can a country be born in a day
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a nation be brought forth in a moment?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet no sooner is Zion in labor
- type: usfm
  marker: q2
  children:
  - type: text
    text: than she gives birth to her children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Do I bring to the moment of birth
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and not give delivery?” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do I close up the womb
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I bring to delivery?” says your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Rejoice with Jerusalem and be glad for her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all you who love her;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rejoice greatly with her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all you who mourn over her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For you will nurse and be satisfied
- type: usfm
  marker: q2
  children:
  - type: text
    text: at her comforting breasts;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will drink deeply
- type: usfm
  marker: q2
  children:
  - type: text
    text: and delight in her overflowing abundance.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will extend peace to her like a river,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wealth of nations like a flooding stream;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will nurse and be carried on her arm
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dandled on her knees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: As a mother comforts her child,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so will I comfort you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will be comforted over Jerusalem.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When you see this, your heart will rejoice
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will flourish like grass;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be made known to his servants,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but his fury will be shown to his foes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'See, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is coming with fire,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his chariots are like a whirlwind;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will bring down his anger with fury,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his rebuke with flames of fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For with fire and with his sword
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will execute judgment on all people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and many will be those slain by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Those who consecrate and purify themselves to go into the gardens, following one who is among those who eat the flesh of pigs, rats and other unclean things—they will meet their end together with the one they follow,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “And I, because of what they have planned and done, am about to come
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this clause is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and gather the people of all nations and languages, and they will come and see my glory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “I will set a sign among them, and I will send some of those who survive to the nations—to Tarshish, to the Libyans
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Put '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Libyans); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Pul
    marker-yv: yv-n
  - type: text
    text: ' and Lydians (famous as archers), to Tubal and Greece, and to the distant islands that have not heard of my fame or seen my glory. They will proclaim my glory among the nations. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they will bring all your people, from all the nations, to my holy mountain in Jerusalem as an offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '—on horses, in chariots and wagons, and on mules and camels,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. “They will bring them, as the Israelites bring their grain offerings, to the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in ceremonially clean vessels. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And I will select some of them also to be priests and Levites,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“As the new heavens and the new earth that I make will endure before me,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “so will your name and descendants endure. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'From one New Moon to another and from one Sabbath to another, all mankind will come and bow down before me,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “And they will go out and look on the dead bodies of those who rebelled against me; the worms that eat them will not die, the fire that burns them will not be quenched, and they will be loathsome to all mankind.”
