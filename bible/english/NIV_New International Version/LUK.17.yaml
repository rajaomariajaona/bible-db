document_id: LUK.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Sin, Faith, Duty
  - type: text
    content: 'Jesus said to his disciples: '
  - type: text
    content: “Things that cause people to stumble are bound to come, but woe to anyone through whom they come.
  - type: text
    content: ' '
  '10':
  - type: text
    content: So you also, when you have done everything you were told to do, should say, ‘We are unworthy servants; we have only done our duty.’ ”
  - type: heading
    content: Jesus Heals Ten Men With Leprosy
  '11':
  - type: text
    content: 'Now on his way to Jerusalem, Jesus traveled along the border between Samaria and Galilee. '
  '12':
  - type: text
    content: As he was going into a village, ten men who had leprosy
  - type: note
    content: The Greek word traditionally translated leprosy was used for various diseases affecting the skin.
  - type: text
    content: ' met him. They stood at a distance '
  '13':
  - type: text
    content: and called out in a loud voice, “Jesus, Master, have pity on us!”
  '14':
  - type: text
    content: 'When he saw them, he said, '
  - type: text
    content: “Go, show yourselves to the priests.”
  - type: text
    content: ' And as they went, they were cleansed.'
  '15':
  - type: text
    content: 'One of them, when he saw he was healed, came back, praising God in a loud voice. '
  '16':
  - type: text
    content: He threw himself at Jesus’ feet and thanked him—and he was a Samaritan.
  '17':
  - type: text
    content: 'Jesus asked, '
  - type: text
    content: “Were not all ten cleansed? Where are the other nine?
  - type: text
    content: ' '
  '18':
  - type: text
    content: Has no one returned to give praise to God except this foreigner?”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Then he said to him, '
  - type: text
    content: “Rise and go; your faith has made you well.”
  - type: heading
    content: The Coming of the Kingdom of God
  '2':
  - type: text
    content: It would be better for them to be thrown into the sea with a millstone tied around their neck than to cause one of these little ones to stumble.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Once, on being asked by the Pharisees when the kingdom of God would come, Jesus replied, '
  - type: text
    content: “The coming of the kingdom of God is not something that can be observed,
  - type: text
    content: ' '
  '21':
  - type: text
    content: nor will people say, ‘Here it is,’ or ‘There it is,’ because the kingdom of God is in your midst.”
  - type: note
    content: Or is within you
  '22':
  - type: text
    content: 'Then he said to his disciples, '
  - type: text
    content: “The time is coming when you will long to see one of the days of the Son of Man, but you will not see it.
  - type: text
    content: ' '
  '23':
  - type: text
    content: People will tell you, ‘There he is!’ or ‘Here he is!’ Do not go running off after them.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For the Son of Man in his day
  - type: note
    content: Some manuscripts do not have in his day.
  - type: text
    content: ' '
  - type: text
    content: will be like the lightning, which flashes and lights up the sky from one end to the other.
  - type: text
    content: ' '
  '25':
  - type: text
    content: But first he must suffer many things and be rejected by this generation.
  '26':
  - type: text
    content: ' '
  - type: text
    content: “Just as it was in the days of Noah, so also will it be in the days of the Son of Man.
  - type: text
    content: ' '
  '27':
  - type: text
    content: People were eating, drinking, marrying and being given in marriage up to the day Noah entered the ark. Then the flood came and destroyed them all.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “It was the same in the days of Lot. People were eating and drinking, buying and selling, planting and building.
  - type: text
    content: ' '
  '29':
  - type: text
    content: But the day Lot left Sodom, fire and sulfur rained down from heaven and destroyed them all.
  '3':
  - type: text
    content: So watch yourselves.
  - type: text
    content: “If your brother or sister
  - type: text
    content: ' '
  - type: note
    content: The Greek word for brother or sister (adelphos) refers here to a fellow disciple, whether man or woman.
  - type: text
    content: sins against you, rebuke them; and if they repent, forgive them.
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: “It will be just like this on the day the Son of Man is revealed.
  - type: text
    content: ' '
  '31':
  - type: text
    content: On that day no one who is on the housetop, with possessions inside, should go down to get them. Likewise, no one in the field should go back for anything.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Remember Lot’s wife!
  - type: text
    content: ' '
  '33':
  - type: text
    content: Whoever tries to keep their life will lose it, and whoever loses their life will preserve it.
  - type: text
    content: ' '
  '34':
  - type: text
    content: I tell you, on that night two people will be in one bed; one will be taken and the other left.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Two women will be grinding grain together; one will be taken and the other left.”
  - type: text
    content: ' '
  '36':
  - type: note
    content: Some manuscripts include here words similar to Matt. 24:40.
  '37':
  - type: text
    content: “Where, Lord?” they asked.
  - type: text
    content: 'He replied, '
  - type: text
    content: “Where there is a dead body, there the vultures will gather.”
  '4':
  - type: text
    content: Even if they sin against you seven times in a day and seven times come back to you saying ‘I repent,’ you must forgive them.”
  '5':
  - type: text
    content: The apostles said to the Lord, “Increase our faith!”
  '6':
  - type: text
    content: 'He replied, '
  - type: text
    content: “If you have faith as small as a mustard seed, you can say to this mulberry tree, ‘Be uprooted and planted in the sea,’ and it will obey you.
  '7':
  - type: text
    content: ' '
  - type: text
    content: “Suppose one of you has a servant plowing or looking after the sheep. Will he say to the servant when he comes in from the field, ‘Come along now and sit down to eat’?
  - type: text
    content: ' '
  '8':
  - type: text
    content: Won’t he rather say, ‘Prepare my supper, get yourself ready and wait on me while I eat and drink; after that you may eat and drink’?
  - type: text
    content: ' '
  '9':
  - type: text
    content: Will he thank the servant because he did what he was told to do?
  - type: text
    content: ' '
