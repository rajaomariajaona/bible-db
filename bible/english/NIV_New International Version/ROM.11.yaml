document_id: ROM.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Remnant of Israel
  - type: text
    content: 'I ask then: Did God reject his people? By no means! I am an Israelite myself, a descendant of Abraham, from the tribe of Benjamin. '
  '10':
  - type: text
    content: May their eyes be darkened so they cannot see,
  - type: text
    content: and their backs be bent forever.”
  - type: note
    content: Psalm 69:22,23
  - type: heading
    content: Ingrafted Branches
  '11':
  - type: text
    content: 'Again I ask: Did they stumble so as to fall beyond recovery? Not at all! Rather, because of their transgression, salvation has come to the Gentiles to make Israel envious. '
  '12':
  - type: text
    content: But if their transgression means riches for the world, and their loss means riches for the Gentiles, how much greater riches will their full inclusion bring!
  '13':
  - type: text
    content: 'I am talking to you Gentiles. Inasmuch as I am the apostle to the Gentiles, I take pride in my ministry '
  '14':
  - type: text
    content: 'in the hope that I may somehow arouse my own people to envy and save some of them. '
  '15':
  - type: text
    content: 'For if their rejection brought reconciliation to the world, what will their acceptance be but life from the dead? '
  '16':
  - type: text
    content: If the part of the dough offered as firstfruits is holy, then the whole batch is holy; if the root is holy, so are the branches.
  '17':
  - type: text
    content: 'If some of the branches have been broken off, and you, though a wild olive shoot, have been grafted in among the others and now share in the nourishing sap from the olive root, '
  '18':
  - type: text
    content: 'do not consider yourself to be superior to those other branches. If you do, consider this: You do not support the root, but the root supports you. '
  '19':
  - type: text
    content: 'You will say then, “Branches were broken off so that I could be grafted in.” '
  '2':
  - type: text
    content: 'God did not reject his people, whom he foreknew. Don’t you know what Scripture says in the passage about Elijah—how he appealed to God against Israel: '
  '20':
  - type: text
    content: 'Granted. But they were broken off because of unbelief, and you stand by faith. Do not be arrogant, but tremble. '
  '21':
  - type: text
    content: For if God did not spare the natural branches, he will not spare you either.
  '22':
  - type: text
    content: 'Consider therefore the kindness and sternness of God: sternness to those who fell, but kindness to you, provided that you continue in his kindness. Otherwise, you also will be cut off. '
  '23':
  - type: text
    content: 'And if they do not persist in unbelief, they will be grafted in, for God is able to graft them in again. '
  '24':
  - type: text
    content: After all, if you were cut out of an olive tree that is wild by nature, and contrary to nature were grafted into a cultivated olive tree, how much more readily will these, the natural branches, be grafted into their own olive tree!
  - type: heading
    content: All Israel Will Be Saved
  '25':
  - type: text
    content: 'I do not want you to be ignorant of this mystery, brothers and sisters, so that you may not be conceited: Israel has experienced a hardening in part until the full number of the Gentiles has come in, '
  '26':
  - type: text
    content: and in this way
  - type: note
    content: Or and so
  - type: text
    content: ' all Israel will be saved. As it is written:'
  - type: text
    content: “The deliverer will come from Zion;
  - type: text
    content: he will turn godlessness away from Jacob.
  '27':
  - type: text
    content: And this is
  - type: note
    content: Or will be
  - type: text
    content: ' my covenant with them'
  - type: text
    content: when I take away their sins.”
  - type: note
    content: Isaiah 59:20,21; 27:9 (see Septuagint); Jer. 31:33,34
  '28':
  - type: text
    content: 'As far as the gospel is concerned, they are enemies for your sake; but as far as election is concerned, they are loved on account of the patriarchs, '
  '29':
  - type: text
    content: 'for God’s gifts and his call are irrevocable. '
  '3':
  - type: text
    content: “Lord, they have killed your prophets and torn down your altars; I am the only one left, and they are trying to kill me”
  - type: note
    content: 1 Kings 19:10,14
  - type: text
    content: '? '
  '30':
  - type: text
    content: 'Just as you who were at one time disobedient to God have now received mercy as a result of their disobedience, '
  '31':
  - type: text
    content: so they too have now become disobedient in order that they too may now
  - type: note
    content: Some manuscripts do not have now.
  - type: text
    content: ' receive mercy as a result of God’s mercy to you. '
  '32':
  - type: text
    content: For God has bound everyone over to disobedience so that he may have mercy on them all.
  - type: heading
    content: Doxology
  '33':
  - type: text
    content: Oh, the depth of the riches of the wisdom and
  - type: note
    content: Or riches and the wisdom and the
  - type: text
    content: ' knowledge of God!'
  - type: text
    content: How unsearchable his judgments,
  - type: text
    content: and his paths beyond tracing out!
  '34':
  - type: text
    content: “Who has known the mind of the Lord?
  - type: text
    content: Or who has been his counselor?”
  - type: note
    content: Isaiah 40:13
  '35':
  - type: text
    content: “Who has ever given to God,
  - type: text
    content: that God should repay them?”
  - type: note
    content: Job 41:11
  '36':
  - type: text
    content: For from him and through him and for him are all things.
  - type: text
    content: To him be the glory forever! Amen.
  '4':
  - type: text
    content: And what was God’s answer to him? “I have reserved for myself seven thousand who have not bowed the knee to Baal.”
  - type: note
    content: 1 Kings 19:18
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'So too, at the present time there is a remnant chosen by grace. '
  '6':
  - type: text
    content: And if by grace, then it cannot be based on works; if it were, grace would no longer be grace.
  '7':
  - type: text
    content: 'What then? What the people of Israel sought so earnestly they did not obtain. The elect among them did, but the others were hardened, '
  '8':
  - type: text
    content: 'as it is written:'
  - type: text
    content: “God gave them a spirit of stupor,
  - type: text
    content: eyes that could not see
  - type: text
    content: and ears that could not hear,
  - type: text
    content: to this very day.”
  - type: note
    content: Deut. 29:4; Isaiah 29:10
  '9':
  - type: text
    content: 'And David says:'
  - type: text
    content: “May their table become a snare and a trap,
  - type: text
    content: a stumbling block and a retribution for them.
