document_id: ROM.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Remnant of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I ask then: Did God reject his people? By no means! I am an Israelite myself, a descendant of Abraham, from the tribe of Benjamin. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May their eyes be darkened so they cannot see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their backs be bent forever.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 69:22,23
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ingrafted Branches
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again I ask: Did they stumble so as to fall beyond recovery? Not at all! Rather, because of their transgression, salvation has come to the Gentiles to make Israel envious. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if their transgression means riches for the world, and their loss means riches for the Gentiles, how much greater riches will their full inclusion bring!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am talking to you Gentiles. Inasmuch as I am the apostle to the Gentiles, I take pride in my ministry '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in the hope that I may somehow arouse my own people to envy and save some of them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if their rejection brought reconciliation to the world, what will their acceptance be but life from the dead? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If the part of the dough offered as firstfruits is holy, then the whole batch is holy; if the root is holy, so are the branches.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If some of the branches have been broken off, and you, though a wild olive shoot, have been grafted in among the others and now share in the nourishing sap from the olive root, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'do not consider yourself to be superior to those other branches. If you do, consider this: You do not support the root, but the root supports you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will say then, “Branches were broken off so that I could be grafted in.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God did not reject his people, whom he foreknew. Don’t you know what Scripture says in the passage about Elijah—how he appealed to God against Israel: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Granted. But they were broken off because of unbelief, and you stand by faith. Do not be arrogant, but tremble. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For if God did not spare the natural branches, he will not spare you either.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Consider therefore the kindness and sternness of God: sternness to those who fell, but kindness to you, provided that you continue in his kindness. Otherwise, you also will be cut off. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if they do not persist in unbelief, they will be grafted in, for God is able to graft them in again. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After all, if you were cut out of an olive tree that is wild by nature, and contrary to nature were grafted into a cultivated olive tree, how much more readily will these, the natural branches, be grafted into their own olive tree!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: All Israel Will Be Saved
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I do not want you to be ignorant of this mystery, brothers and sisters, so that you may not be conceited: Israel has experienced a hardening in part until the full number of the Gentiles has come in, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and in this way
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and so
      marker-yv: yv-n
    - type: text
      text: ' all Israel will be saved. As it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The deliverer will come from Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will turn godlessness away from Jacob.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And this is
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will be
      marker-yv: yv-n
    - type: text
      text: ' my covenant with them'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I take away their sins.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 59:20,21; 27:9 (see Septuagint); Jer. 31:33,34
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As far as the gospel is concerned, they are enemies for your sake; but as far as election is concerned, they are loved on account of the patriarchs, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for God’s gifts and his call are irrevocable. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Lord, they have killed your prophets and torn down your altars; I am the only one left, and they are trying to kill me”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1 Kings 19:10,14
      marker-yv: yv-n
    - type: text
      text: '? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as you who were at one time disobedient to God have now received mercy as a result of their disobedience, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so they too have now become disobedient in order that they too may now
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not have '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: now.
      marker-yv: yv-n
    - type: text
      text: ' receive mercy as a result of God’s mercy to you. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For God has bound everyone over to disobedience so that he may have mercy on them all.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Doxology
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, the depth of the riches of the wisdom and
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: riches and the wisdom and the
      marker-yv: yv-n
    - type: text
      text: ' knowledge of God!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How unsearchable his judgments,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his paths beyond tracing out!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who has known the mind of the Lord?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or who has been his counselor?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 40:13
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who has ever given to God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that God should repay them?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Job 41:11
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For from him and through him and for him are all things.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To him be the glory forever! Amen.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And what was God’s answer to him? “I have reserved for myself seven thousand who have not bowed the knee to Baal.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1 Kings 19:18
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So too, at the present time there is a remnant chosen by grace. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if by grace, then it cannot be based on works; if it were, grace would no longer be grace.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then? What the people of Israel sought so earnestly they did not obtain. The elect among them did, but the others were hardened, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God gave them a spirit of stupor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: eyes that could not see
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ears that could not hear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to this very day.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 29:4; Isaiah 29:10
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And David says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “May their table become a snare and a trap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a stumbling block and a retribution for them.
