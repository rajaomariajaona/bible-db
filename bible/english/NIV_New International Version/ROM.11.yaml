document_id: ROM.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Remnant of Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I ask then: Did God reject his people? By no means! I am an Israelite myself, a descendant of Abraham, from the tribe of Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'God did not reject his people, whom he foreknew. Don’t you know what Scripture says in the passage about Elijah—how he appealed to God against Israel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Lord, they have killed your prophets and torn down your altars; I am the only one left, and they are trying to kill me”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1 Kings 19:10,14
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And what was God’s answer to him? “I have reserved for myself seven thousand who have not bowed the knee to Baal.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1 Kings 19:18
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So too, at the present time there is a remnant chosen by grace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And if by grace, then it cannot be based on works; if it were, grace would no longer be grace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'What then? What the people of Israel sought so earnestly they did not obtain. The elect among them did, but the others were hardened, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'as it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “God gave them a spirit of stupor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: eyes that could not see
- type: usfm
  marker: q2
  children:
  - type: text
    text: and ears that could not hear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to this very day.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut. 29:4; Isaiah 29:10
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And David says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “May their table become a snare and a trap,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a stumbling block and a retribution for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: May their eyes be darkened so they cannot see,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their backs be bent forever.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 69:22,23
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ingrafted Branches
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Again I ask: Did they stumble so as to fall beyond recovery? Not at all! Rather, because of their transgression, salvation has come to the Gentiles to make Israel envious. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But if their transgression means riches for the world, and their loss means riches for the Gentiles, how much greater riches will their full inclusion bring!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I am talking to you Gentiles. Inasmuch as I am the apostle to the Gentiles, I take pride in my ministry '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'in the hope that I may somehow arouse my own people to envy and save some of them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For if their rejection brought reconciliation to the world, what will their acceptance be but life from the dead? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: If the part of the dough offered as firstfruits is holy, then the whole batch is holy; if the root is holy, so are the branches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'If some of the branches have been broken off, and you, though a wild olive shoot, have been grafted in among the others and now share in the nourishing sap from the olive root, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'do not consider yourself to be superior to those other branches. If you do, consider this: You do not support the root, but the root supports you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You will say then, “Branches were broken off so that I could be grafted in.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Granted. But they were broken off because of unbelief, and you stand by faith. Do not be arrogant, but tremble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For if God did not spare the natural branches, he will not spare you either.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Consider therefore the kindness and sternness of God: sternness to those who fell, but kindness to you, provided that you continue in his kindness. Otherwise, you also will be cut off. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And if they do not persist in unbelief, they will be grafted in, for God is able to graft them in again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: After all, if you were cut out of an olive tree that is wild by nature, and contrary to nature were grafted into a cultivated olive tree, how much more readily will these, the natural branches, be grafted into their own olive tree!
- type: usfm
  marker: s1
  children:
  - type: text
    text: All Israel Will Be Saved
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I do not want you to be ignorant of this mystery, brothers and sisters, so that you may not be conceited: Israel has experienced a hardening in part until the full number of the Gentiles has come in, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: and in this way
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and so
    marker-yv: yv-n
  - type: text
    text: ' all Israel will be saved. As it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The deliverer will come from Zion;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will turn godlessness away from Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And this is
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will be
    marker-yv: yv-n
  - type: text
    text: ' my covenant with them'
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I take away their sins.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 59:20,21; 27:9 (see Septuagint); Jer. 31:33,34
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'As far as the gospel is concerned, they are enemies for your sake; but as far as election is concerned, they are loved on account of the patriarchs, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'for God’s gifts and his call are irrevocable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Just as you who were at one time disobedient to God have now received mercy as a result of their disobedience, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: so they too have now become disobedient in order that they too may now
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts do not have '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: now.
    marker-yv: yv-n
  - type: text
    text: ' receive mercy as a result of God’s mercy to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: For God has bound everyone over to disobedience so that he may have mercy on them all.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Doxology
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Oh, the depth of the riches of the wisdom and
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: riches and the wisdom and the
    marker-yv: yv-n
  - type: text
    text: ' knowledge of God!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How unsearchable his judgments,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his paths beyond tracing out!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Who has known the mind of the Lord?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or who has been his counselor?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 40:13
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “Who has ever given to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that God should repay them?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Job 41:11
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: For from him and through him and for him are all things.
- type: usfm
  marker: q2
  children:
  - type: text
    text: To him be the glory forever! Amen.
