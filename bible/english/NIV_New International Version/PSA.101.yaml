document_id: PSA.101,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 101
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Of David. A psalm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing of your love and justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I will sing praise.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be careful to lead a blameless life—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when will you come to me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will conduct the affairs of my house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a blameless heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not look with approval
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on anything that is vile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate what faithless people do;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will have no part in it.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The perverse of heart shall be far from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will have nothing to do with what is evil.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever slanders their neighbor in secret,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will put to silence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whoever has haughty eyes and a proud heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not tolerate.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes will be on the faithful in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they may dwell with me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the one whose walk is blameless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will minister to me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one who practices deceit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will dwell in my house;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no one who speaks falsely
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will stand in my presence.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every morning I will put to silence
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the wicked in the land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cut off every evildoer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from the city of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
