document_id: PSA.101,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 101
  - type: text
    content: Of David. A psalm.
  - type: text
    content: I will sing of your love and justice;
  - type: text
    content: 'to you, '
  - type: text
    content: Lord
  - type: text
    content: ', I will sing praise.'
  '2':
  - type: text
    content: I will be careful to lead a blameless life—
  - type: text
    content: when will you come to me?
  - type: text
    content: I will conduct the affairs of my house
  - type: text
    content: with a blameless heart.
  '3':
  - type: text
    content: I will not look with approval
  - type: text
    content: on anything that is vile.
  - type: text
    content: I hate what faithless people do;
  - type: text
    content: I will have no part in it.
  '4':
  - type: text
    content: The perverse of heart shall be far from me;
  - type: text
    content: I will have nothing to do with what is evil.
  '5':
  - type: text
    content: Whoever slanders their neighbor in secret,
  - type: text
    content: I will put to silence;
  - type: text
    content: whoever has haughty eyes and a proud heart,
  - type: text
    content: I will not tolerate.
  '6':
  - type: text
    content: My eyes will be on the faithful in the land,
  - type: text
    content: that they may dwell with me;
  - type: text
    content: the one whose walk is blameless
  - type: text
    content: will minister to me.
  '7':
  - type: text
    content: No one who practices deceit
  - type: text
    content: will dwell in my house;
  - type: text
    content: no one who speaks falsely
  - type: text
    content: will stand in my presence.
  '8':
  - type: text
    content: Every morning I will put to silence
  - type: text
    content: all the wicked in the land;
  - type: text
    content: I will cut off every evildoer
  - type: text
    content: 'from the city of the '
  - type: text
    content: Lord
  - type: text
    content: .
