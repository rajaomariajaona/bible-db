document_id: EXO.36,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'So Bezalel, Oholiab and every skilled person to whom the '
  - type: text
    content: Lord
  - type: text
    content: ' has given skill and ability to know how to carry out all the work of constructing the sanctuary are to do the work just as the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.”'
  '10':
  - type: text
    content: 'They joined five of the curtains together and did the same with the other five. '
  '11':
  - type: text
    content: 'Then they made loops of blue material along the edge of the end curtain in one set, and the same was done with the end curtain in the other set. '
  '12':
  - type: text
    content: 'They also made fifty loops on one curtain and fifty loops on the end curtain of the other set, with the loops opposite each other. '
  '13':
  - type: text
    content: Then they made fifty gold clasps and used them to fasten the two sets of curtains together so that the tabernacle was a unit.
  '14':
  - type: text
    content: 'They made curtains of goat hair for the tent over the tabernacle—eleven altogether. '
  '15':
  - type: text
    content: All eleven curtains were the same size—thirty cubits long and four cubits wide.
  - type: note
    content: That is, about 45 feet long and 6 feet wide or about 14 meters long and 1.8 meters wide
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'They joined five of the curtains into one set and the other six into another set. '
  '17':
  - type: text
    content: 'Then they made fifty loops along the edge of the end curtain in one set and also along the edge of the end curtain in the other set. '
  '18':
  - type: text
    content: 'They made fifty bronze clasps to fasten the tent together as a unit. '
  '19':
  - type: text
    content: Then they made for the tent a covering of ram skins dyed red, and over that a covering of the other durable leather.
  - type: note
    content: Possibly the hides of large aquatic mammals (see 35:7)
  '2':
  - type: text
    content: 'Then Moses summoned Bezalel and Oholiab and every skilled person to whom the '
  - type: text
    content: Lord
  - type: text
    content: ' had given ability and who was willing to come and do the work. '
  '20':
  - type: text
    content: 'They made upright frames of acacia wood for the tabernacle. '
  '21':
  - type: text
    content: Each frame was ten cubits long and a cubit and a half wide,
  - type: note
    content: That is, about 15 feet long and 2 1/4 feet wide or about 4.5 meters long and 68 centimeters wide
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'with two projections set parallel to each other. They made all the frames of the tabernacle in this way. '
  '23':
  - type: text
    content: 'They made twenty frames for the south side of the tabernacle '
  '24':
  - type: text
    content: 'and made forty silver bases to go under them—two bases for each frame, one under each projection. '
  '25':
  - type: text
    content: 'For the other side, the north side of the tabernacle, they made twenty frames '
  '26':
  - type: text
    content: 'and forty silver bases—two under each frame. '
  '27':
  - type: text
    content: 'They made six frames for the far end, that is, the west end of the tabernacle, '
  '28':
  - type: text
    content: 'and two frames were made for the corners of the tabernacle at the far end. '
  '29':
  - type: text
    content: 'At these two corners the frames were double from the bottom all the way to the top and fitted into a single ring; both were made alike. '
  '3':
  - type: text
    content: 'They received from Moses all the offerings the Israelites had brought to carry out the work of constructing the sanctuary. And the people continued to bring freewill offerings morning after morning. '
  '30':
  - type: text
    content: So there were eight frames and sixteen silver bases—two under each frame.
  '31':
  - type: text
    content: 'They also made crossbars of acacia wood: five for the frames on one side of the tabernacle, '
  '32':
  - type: text
    content: 'five for those on the other side, and five for the frames on the west, at the far end of the tabernacle. '
  '33':
  - type: text
    content: 'They made the center crossbar so that it extended from end to end at the middle of the frames. '
  '34':
  - type: text
    content: They overlaid the frames with gold and made gold rings to hold the crossbars. They also overlaid the crossbars with gold.
  '35':
  - type: text
    content: 'They made the curtain of blue, purple and scarlet yarn and finely twisted linen, with cherubim woven into it by a skilled worker. '
  '36':
  - type: text
    content: 'They made four posts of acacia wood for it and overlaid them with gold. They made gold hooks for them and cast their four silver bases. '
  '37':
  - type: text
    content: 'For the entrance to the tent they made a curtain of blue, purple and scarlet yarn and finely twisted linen—the work of an embroiderer; '
  '38':
  - type: text
    content: and they made five posts with hooks for them. They overlaid the tops of the posts and their bands with gold and made their five bases of bronze.
  '4':
  - type: text
    content: 'So all the skilled workers who were doing all the work on the sanctuary left what they were doing '
  '5':
  - type: text
    content: 'and said to Moses, “The people are bringing more than enough for doing the work the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded to be done.”'
  '6':
  - type: text
    content: 'Then Moses gave an order and they sent this word throughout the camp: “No man or woman is to make anything else as an offering for the sanctuary.” And so the people were restrained from bringing more, '
  '7':
  - type: text
    content: because what they already had was more than enough to do all the work.
  - type: heading
    content: The Tabernacle
  '8':
  - type: text
    content: 'All those who were skilled among the workers made the tabernacle with ten curtains of finely twisted linen and blue, purple and scarlet yarn, with cherubim woven into them by expert hands. '
  '9':
  - type: text
    content: All the curtains were the same size—twenty-eight cubits long and four cubits wide.
  - type: note
    content: That is, about 42 feet long and 6 feet wide or about 13 meters long and 1.8 meters wide
  - type: text
    content: ' '
