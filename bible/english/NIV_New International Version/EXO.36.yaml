document_id: EXO.36
type_code: eng
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So Bezalel, Oholiab and every skilled person to whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given skill and ability to know how to carry out all the work of constructing the sanctuary are to do the work just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Moses summoned Bezalel and Oholiab and every skilled person to whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given ability and who was willing to come and do the work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They received from Moses all the offerings the Israelites had brought to carry out the work of constructing the sanctuary. And the people continued to bring freewill offerings morning after morning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So all the skilled workers who were doing all the work on the sanctuary left what they were doing '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and said to Moses, “The people are bringing more than enough for doing the work the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded to be done.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Moses gave an order and they sent this word throughout the camp: “No man or woman is to make anything else as an offering for the sanctuary.” And so the people were restrained from bringing more, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: because what they already had was more than enough to do all the work.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All those who were skilled among the workers made the tabernacle with ten curtains of finely twisted linen and blue, purple and scarlet yarn, with cherubim woven into them by expert hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All the curtains were the same size—twenty-eight cubits long and four cubits wide.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 42 feet long and 6 feet wide or about 13 meters long and 1.8 meters wide
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They joined five of the curtains together and did the same with the other five. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then they made loops of blue material along the edge of the end curtain in one set, and the same was done with the end curtain in the other set. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They also made fifty loops on one curtain and fifty loops on the end curtain of the other set, with the loops opposite each other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then they made fifty gold clasps and used them to fasten the two sets of curtains together so that the tabernacle was a unit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They made curtains of goat hair for the tent over the tabernacle—eleven altogether. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: All eleven curtains were the same size—thirty cubits long and four cubits wide.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 45 feet long and 6 feet wide or about 14 meters long and 1.8 meters wide
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'They joined five of the curtains into one set and the other six into another set. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then they made fifty loops along the edge of the end curtain in one set and also along the edge of the end curtain in the other set. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They made fifty bronze clasps to fasten the tent together as a unit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then they made for the tent a covering of ram skins dyed red, and over that a covering of the other durable leather.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly the hides of large aquatic mammals (see 35:7)
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They made upright frames of acacia wood for the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Each frame was ten cubits long and a cubit and a half wide,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 15 feet long and 2 1/4 feet wide or about 4.5 meters long and 68 centimeters wide
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'with two projections set parallel to each other. They made all the frames of the tabernacle in this way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They made twenty frames for the south side of the tabernacle '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and made forty silver bases to go under them—two bases for each frame, one under each projection. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For the other side, the north side of the tabernacle, they made twenty frames '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'and forty silver bases—two under each frame. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They made six frames for the far end, that is, the west end of the tabernacle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and two frames were made for the corners of the tabernacle at the far end. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'At these two corners the frames were double from the bottom all the way to the top and fitted into a single ring; both were made alike. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So there were eight frames and sixteen silver bases—two under each frame.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'They also made crossbars of acacia wood: five for the frames on one side of the tabernacle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'five for those on the other side, and five for the frames on the west, at the far end of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They made the center crossbar so that it extended from end to end at the middle of the frames. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: They overlaid the frames with gold and made gold rings to hold the crossbars. They also overlaid the crossbars with gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'They made the curtain of blue, purple and scarlet yarn and finely twisted linen, with cherubim woven into it by a skilled worker. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'They made four posts of acacia wood for it and overlaid them with gold. They made gold hooks for them and cast their four silver bases. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'For the entrance to the tent they made a curtain of blue, purple and scarlet yarn and finely twisted linen—the work of an embroiderer; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: and they made five posts with hooks for them. They overlaid the tops of the posts and their bands with gold and made their five bases of bronze.
