document_id: HAB.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Habakkuk’s Prayer
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A prayer of Habakkuk the prophet. On '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: shigionoth
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably a literary or musical term
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mountains saw you and writhed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Torrents of water swept by;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the deep roared
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lifted its waves on high.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sun and moon stood still in the heavens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the glint of your flying arrows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the lightning of your flashing spear.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In wrath you strode through the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in anger you threshed the nations.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You came out to deliver your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to save your anointed one.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You crushed the leader of the land of wickedness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you stripped him from head to foot.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With his own spear you pierced his head
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when his warriors stormed out to scatter us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gloating as though about to devour
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wretched who were in hiding.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You trampled the sea with your horses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: churning the great waters.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I heard and my heart pounded,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my lips quivered at the sound;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: decay crept into my bones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my legs trembled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I will wait patiently for the day of calamity
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to come on the nation invading us.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though the fig tree does not bud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there are no grapes on the vines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though the olive crop fails
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fields produce no food,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though there are no sheep in the pen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no cattle in the stalls,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'yet I will rejoice in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be joyful in God my Savior.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my strength;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes my feet like the feet of a deer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he enables me to tread on the heights.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the director of music. On my stringed instruments.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I have heard of your fame;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I stand in awe of your deeds, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Repeat them in our day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in our time make them known;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in wrath remember mercy.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God came from Teman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Holy One from Mount Paran.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the middle of verse 9 and at the end of verse 13.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His glory covered the heavens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his praise filled the earth.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His splendor was like the sunrise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rays flashed from his hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where his power was hidden.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plague went before him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pestilence followed his steps.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stood, and shook the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he looked, and made the nations tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ancient mountains crumbled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the age-old hills collapsed—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he marches on forever.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I saw the tents of Cushan in distress,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the dwellings of Midian in anguish.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Were you angry with the rivers, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Was your wrath against the streams?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did you rage against the sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you rode your horses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your chariots to victory?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You uncovered your bow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you called for many arrows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You split the earth with rivers;
