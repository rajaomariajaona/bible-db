document_id: HAB.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Habakkuk’s Prayer
  - type: text
    content: 'A prayer of Habakkuk the prophet. On '
  - type: text
    content: shigionoth
  - type: text
    content: .
  - type: note
    content: Probably a literary or musical term
  '10':
  - type: text
    content: the mountains saw you and writhed.
  - type: text
    content: Torrents of water swept by;
  - type: text
    content: the deep roared
  - type: text
    content: and lifted its waves on high.
  '11':
  - type: text
    content: Sun and moon stood still in the heavens
  - type: text
    content: at the glint of your flying arrows,
  - type: text
    content: at the lightning of your flashing spear.
  '12':
  - type: text
    content: In wrath you strode through the earth
  - type: text
    content: and in anger you threshed the nations.
  '13':
  - type: text
    content: You came out to deliver your people,
  - type: text
    content: to save your anointed one.
  - type: text
    content: You crushed the leader of the land of wickedness,
  - type: text
    content: you stripped him from head to foot.
  '14':
  - type: text
    content: With his own spear you pierced his head
  - type: text
    content: when his warriors stormed out to scatter us,
  - type: text
    content: gloating as though about to devour
  - type: text
    content: the wretched who were in hiding.
  '15':
  - type: text
    content: You trampled the sea with your horses,
  - type: text
    content: churning the great waters.
  '16':
  - type: text
    content: I heard and my heart pounded,
  - type: text
    content: my lips quivered at the sound;
  - type: text
    content: decay crept into my bones,
  - type: text
    content: and my legs trembled.
  - type: text
    content: Yet I will wait patiently for the day of calamity
  - type: text
    content: to come on the nation invading us.
  '17':
  - type: text
    content: Though the fig tree does not bud
  - type: text
    content: and there are no grapes on the vines,
  - type: text
    content: though the olive crop fails
  - type: text
    content: and the fields produce no food,
  - type: text
    content: though there are no sheep in the pen
  - type: text
    content: and no cattle in the stalls,
  '18':
  - type: text
    content: 'yet I will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: I will be joyful in God my Savior.
  '19':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' is my strength;'
  - type: text
    content: he makes my feet like the feet of a deer,
  - type: text
    content: he enables me to tread on the heights.
  - type: text
    content: For the director of music. On my stringed instruments.
  '2':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', I have heard of your fame;'
  - type: text
    content: 'I stand in awe of your deeds, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Repeat them in our day,
  - type: text
    content: in our time make them known;
  - type: text
    content: in wrath remember mercy.
  '3':
  - type: text
    content: God came from Teman,
  - type: text
    content: the Holy One from Mount Paran.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the middle of verse 9 and at the end of verse 13.
  - type: text
    content: His glory covered the heavens
  - type: text
    content: and his praise filled the earth.
  '4':
  - type: text
    content: His splendor was like the sunrise;
  - type: text
    content: rays flashed from his hand,
  - type: text
    content: where his power was hidden.
  '5':
  - type: text
    content: Plague went before him;
  - type: text
    content: pestilence followed his steps.
  '6':
  - type: text
    content: He stood, and shook the earth;
  - type: text
    content: he looked, and made the nations tremble.
  - type: text
    content: The ancient mountains crumbled
  - type: text
    content: and the age-old hills collapsed—
  - type: text
    content: but he marches on forever.
  '7':
  - type: text
    content: I saw the tents of Cushan in distress,
  - type: text
    content: the dwellings of Midian in anguish.
  '8':
  - type: text
    content: 'Were you angry with the rivers, '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Was your wrath against the streams?
  - type: text
    content: Did you rage against the sea
  - type: text
    content: when you rode your horses
  - type: text
    content: and your chariots to victory?
  '9':
  - type: text
    content: You uncovered your bow,
  - type: text
    content: you called for many arrows.
  - type: text
    content: You split the earth with rivers;
