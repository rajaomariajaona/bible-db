document_id: JOS.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Crossing the Jordan
  - type: text
    content: 'Early in the morning Joshua and all the Israelites set out from Shittim and went to the Jordan, where they camped before crossing over. '
  '10':
  - type: text
    content: 'This is how you will know that the living God is among you and that he will certainly drive out before you the Canaanites, Hittites, Hivites, Perizzites, Girgashites, Amorites and Jebusites. '
  '11':
  - type: text
    content: 'See, the ark of the covenant of the Lord of all the earth will go into the Jordan ahead of you. '
  '12':
  - type: text
    content: 'Now then, choose twelve men from the tribes of Israel, one from each tribe. '
  '13':
  - type: text
    content: 'And as soon as the priests who carry the ark of the '
  - type: text
    content: Lord
  - type: text
    content: —the Lord of all the earth—set foot in the Jordan, its waters flowing downstream will be cut off and stand up in a heap.”
  '14':
  - type: text
    content: 'So when the people broke camp to cross the Jordan, the priests carrying the ark of the covenant went ahead of them. '
  '15':
  - type: text
    content: 'Now the Jordan is at flood stage all during harvest. Yet as soon as the priests who carried the ark reached the Jordan and their feet touched the water’s edge, '
  '16':
  - type: text
    content: 'the water from upstream stopped flowing. It piled up in a heap a great distance away, at a town called Adam in the vicinity of Zarethan, while the water flowing down to the Sea of the Arabah (that is, the Dead Sea) was completely cut off. So the people crossed over opposite Jericho. '
  '17':
  - type: text
    content: 'The priests who carried the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' stopped in the middle of the Jordan and stood on dry ground, while all Israel passed by until the whole nation had completed the crossing on dry ground.'
  '2':
  - type: text
    content: 'After three days the officers went throughout the camp, '
  '3':
  - type: text
    content: 'giving orders to the people: “When you see the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, and the Levitical priests carrying it, you are to move out from your positions and follow it. '
  '4':
  - type: text
    content: Then you will know which way to go, since you have never been this way before. But keep a distance of about two thousand cubits
  - type: note
    content: That is, about 3,000 feet or about 900 meters
  - type: text
    content: ' between you and the ark; do not go near it.”'
  '5':
  - type: text
    content: 'Joshua told the people, “Consecrate yourselves, for tomorrow the '
  - type: text
    content: Lord
  - type: text
    content: ' will do amazing things among you.”'
  '6':
  - type: text
    content: Joshua said to the priests, “Take up the ark of the covenant and pass on ahead of the people.” So they took it up and went ahead of them.
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Today I will begin to exalt you in the eyes of all Israel, so they may know that I am with you as I was with Moses. '
  '8':
  - type: text
    content: 'Tell the priests who carry the ark of the covenant: ‘When you reach the edge of the Jordan’s waters, go and stand in the river.’ ”'
  '9':
  - type: text
    content: 'Joshua said to the Israelites, “Come here and listen to the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
