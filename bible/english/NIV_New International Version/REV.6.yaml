document_id: REV.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Seals
  - type: text
    content: 'I watched as the Lamb opened the first of the seven seals. Then I heard one of the four living creatures say in a voice like thunder, “Come!” '
  '10':
  - type: text
    content: 'They called out in a loud voice, “How long, Sovereign Lord, holy and true, until you judge the inhabitants of the earth and avenge our blood?” '
  '11':
  - type: text
    content: Then each of them was given a white robe, and they were told to wait a little longer, until the full number of their fellow servants, their brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in 12:10; 19:10.
  - type: text
    content: ' were killed just as they had been.'
  '12':
  - type: text
    content: 'I watched as he opened the sixth seal. There was a great earthquake. The sun turned black like sackcloth made of goat hair, the whole moon turned blood red, '
  '13':
  - type: text
    content: 'and the stars in the sky fell to earth, as figs drop from a fig tree when shaken by a strong wind. '
  '14':
  - type: text
    content: The heavens receded like a scroll being rolled up, and every mountain and island was removed from its place.
  '15':
  - type: text
    content: 'Then the kings of the earth, the princes, the generals, the rich, the mighty, and everyone else, both slave and free, hid in caves and among the rocks of the mountains. '
  '16':
  - type: text
    content: They called to the mountains and the rocks, “Fall on us and hide us
  - type: note
    content: See Hosea 10:8.
  - type: text
    content: ' from the face of him who sits on the throne and from the wrath of the Lamb! '
  '17':
  - type: text
    content: For the great day of their
  - type: note
    content: Some manuscripts his
  - type: text
    content: ' wrath has come, and who can withstand it?”'
  '2':
  - type: text
    content: I looked, and there before me was a white horse! Its rider held a bow, and he was given a crown, and he rode out as a conqueror bent on conquest.
  '3':
  - type: text
    content: 'When the Lamb opened the second seal, I heard the second living creature say, “Come!” '
  '4':
  - type: text
    content: Then another horse came out, a fiery red one. Its rider was given power to take peace from the earth and to make people kill each other. To him was given a large sword.
  '5':
  - type: text
    content: 'When the Lamb opened the third seal, I heard the third living creature say, “Come!” I looked, and there before me was a black horse! Its rider was holding a pair of scales in his hand. '
  '6':
  - type: text
    content: Then I heard what sounded like a voice among the four living creatures, saying, “Two pounds
  - type: note
    content: Or about 1 kilogram
  - type: text
    content: ' of wheat for a day’s wages,'
  - type: note
    content: Greek a denarius
  - type: text
    content: ' and six pounds'
  - type: note
    content: Or about 3 kilograms
  - type: text
    content: ' of barley for a day’s wages,'
  - type: note
    content: Greek a denarius
  - type: text
    content: ' and do not damage the oil and the wine!”'
  '7':
  - type: text
    content: 'When the Lamb opened the fourth seal, I heard the voice of the fourth living creature say, “Come!” '
  '8':
  - type: text
    content: I looked, and there before me was a pale horse! Its rider was named Death, and Hades was following close behind him. They were given power over a fourth of the earth to kill by sword, famine and plague, and by the wild beasts of the earth.
  '9':
  - type: text
    content: 'When he opened the fifth seal, I saw under the altar the souls of those who had been slain because of the word of God and the testimony they had maintained. '
