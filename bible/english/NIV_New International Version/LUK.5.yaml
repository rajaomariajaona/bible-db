document_id: LUK.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Calls His First Disciples
  - type: text
    content: One day as Jesus was standing by the Lake of Gennesaret,
  - type: note
    content: That is, the Sea of Galilee
  - type: text
    content: ' the people were crowding around him and listening to the word of God. '
  '10':
  - type: text
    content: and so were James and John, the sons of Zebedee, Simon’s partners.
  - type: text
    content: 'Then Jesus said to Simon, '
  - type: text
    content: “Don’t be afraid; from now on you will fish for people.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: So they pulled their boats up on shore, left everything and followed him.
  - type: heading
    content: Jesus Heals a Man With Leprosy
  '12':
  - type: text
    content: While Jesus was in one of the towns, a man came along who was covered with leprosy.
  - type: note
    content: The Greek word traditionally translated leprosy was used for various diseases affecting the skin.
  - type: text
    content: ' When he saw Jesus, he fell with his face to the ground and begged him, “Lord, if you are willing, you can make me clean.”'
  '13':
  - type: text
    content: 'Jesus reached out his hand and touched the man. '
  - type: text
    content: “I am willing,”
  - type: text
    content: ' he said. '
  - type: text
    content: “Be clean!”
  - type: text
    content: ' And immediately the leprosy left him.'
  '14':
  - type: text
    content: 'Then Jesus ordered him, '
  - type: text
    content: “Don’t tell anyone, but go, show yourself to the priest and offer the sacrifices that Moses commanded for your cleansing, as a testimony to them.”
  '15':
  - type: text
    content: 'Yet the news about him spread all the more, so that crowds of people came to hear him and to be healed of their sicknesses. '
  '16':
  - type: text
    content: But Jesus often withdrew to lonely places and prayed.
  - type: heading
    content: Jesus Forgives and Heals a Paralyzed Man
  '17':
  - type: text
    content: 'One day Jesus was teaching, and Pharisees and teachers of the law were sitting there. They had come from every village of Galilee and from Judea and Jerusalem. And the power of the Lord was with Jesus to heal the sick. '
  '18':
  - type: text
    content: 'Some men came carrying a paralyzed man on a mat and tried to take him into the house to lay him before Jesus. '
  '19':
  - type: text
    content: When they could not find a way to do this because of the crowd, they went up on the roof and lowered him on his mat through the tiles into the middle of the crowd, right in front of Jesus.
  '2':
  - type: text
    content: 'He saw at the water’s edge two boats, left there by the fishermen, who were washing their nets. '
  '20':
  - type: text
    content: 'When Jesus saw their faith, he said, '
  - type: text
    content: “Friend, your sins are forgiven.”
  '21':
  - type: text
    content: The Pharisees and the teachers of the law began thinking to themselves, “Who is this fellow who speaks blasphemy? Who can forgive sins but God alone?”
  '22':
  - type: text
    content: 'Jesus knew what they were thinking and asked, '
  - type: text
    content: “Why are you thinking these things in your hearts?
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Which is easier: to say, ‘Your sins are forgiven,’ or to say, ‘Get up and walk’?'
  - type: text
    content: ' '
  '24':
  - type: text
    content: But I want you to know that the Son of Man has authority on earth to forgive sins.”
  - type: text
    content: ' So he said to the paralyzed man, '
  - type: text
    content: “I tell you, get up, take your mat and go home.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Immediately he stood up in front of them, took what he had been lying on and went home praising God. '
  '26':
  - type: text
    content: Everyone was amazed and gave praise to God. They were filled with awe and said, “We have seen remarkable things today.”
  - type: heading
    content: Jesus Calls Levi and Eats With Sinners
  '27':
  - type: text
    content: 'After this, Jesus went out and saw a tax collector by the name of Levi sitting at his tax booth. '
  - type: text
    content: “Follow me,”
  - type: text
    content: ' Jesus said to him, '
  '28':
  - type: text
    content: and Levi got up, left everything and followed him.
  '29':
  - type: text
    content: 'Then Levi held a great banquet for Jesus at his house, and a large crowd of tax collectors and others were eating with them. '
  '3':
  - type: text
    content: He got into one of the boats, the one belonging to Simon, and asked him to put out a little from shore. Then he sat down and taught the people from the boat.
  '30':
  - type: text
    content: But the Pharisees and the teachers of the law who belonged to their sect complained to his disciples, “Why do you eat and drink with tax collectors and sinners?”
  '31':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “It is not the healthy who need a doctor, but the sick.
  - type: text
    content: ' '
  '32':
  - type: text
    content: I have not come to call the righteous, but sinners to repentance.”
  - type: heading
    content: Jesus Questioned About Fasting
  '33':
  - type: text
    content: They said to him, “John’s disciples often fast and pray, and so do the disciples of the Pharisees, but yours go on eating and drinking.”
  '34':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Can you make the friends of the bridegroom fast while he is with them?
  - type: text
    content: ' '
  '35':
  - type: text
    content: But the time will come when the bridegroom will be taken from them; in those days they will fast.”
  '36':
  - type: text
    content: 'He told them this parable: '
  - type: text
    content: “No one tears a piece out of a new garment to patch an old one. Otherwise, they will have torn the new garment, and the patch from the new will not match the old.
  - type: text
    content: ' '
  '37':
  - type: text
    content: And no one pours new wine into old wineskins. Otherwise, the new wine will burst the skins; the wine will run out and the wineskins will be ruined.
  - type: text
    content: ' '
  '38':
  - type: text
    content: No, new wine must be poured into new wineskins.
  - type: text
    content: ' '
  '39':
  - type: text
    content: And no one after drinking old wine wants the new, for they say, ‘The old is better.’ ”
  '4':
  - type: text
    content: 'When he had finished speaking, he said to Simon, '
  - type: text
    content: “Put out into deep water, and let down the nets for a catch.”
  '5':
  - type: text
    content: Simon answered, “Master, we’ve worked hard all night and haven’t caught anything. But because you say so, I will let down the nets.”
  '6':
  - type: text
    content: 'When they had done so, they caught such a large number of fish that their nets began to break. '
  '7':
  - type: text
    content: So they signaled their partners in the other boat to come and help them, and they came and filled both boats so full that they began to sink.
  '8':
  - type: text
    content: 'When Simon Peter saw this, he fell at Jesus’ knees and said, “Go away from me, Lord; I am a sinful man!” '
  '9':
  - type: text
    content: 'For he and all his companions were astonished at the catch of fish they had taken, '
