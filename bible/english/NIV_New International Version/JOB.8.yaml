document_id: JOB.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bildad
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Bildad the Shuhite replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Will they not instruct you and tell you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will they not bring forth words from their understanding?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Can papyrus grow tall where there is no marsh?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can reeds thrive without water?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: While still growing and uncut,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they wither more quickly than grass.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Such is the destiny of all who forget God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so perishes the hope of the godless.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: What they trust in is fragile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what they rely on is a spider’s web.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They lean on the web, but it gives way;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they cling to it, but it does not hold.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They are like a well-watered plant in the sunshine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: spreading its shoots over the garden;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: it entwines its roots around a pile of rocks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and looks for a place among the stones.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But when it is torn from its spot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that place disowns it and says, ‘I never saw you.’
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Surely its life withers away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Surely all the joy it has / is that
      marker-yv: yv-n
    - type: text
      text: ' from the soil other plants grow.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “How long will you say such things?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your words are a blustering wind.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Surely God does not reject one who is blameless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or strengthen the hands of evildoers.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He will yet fill your mouth with laughter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your lips with shouts of joy.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Your enemies will be clothed in shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the tents of the wicked will be no more.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Does God pervert justice?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does the Almighty pervert what is right?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: When your children sinned against him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he gave them over to the penalty of their sin.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But if you will seek God earnestly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plead with the Almighty,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: if you are pure and upright,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even now he will rouse himself on your behalf
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and restore you to your prosperous state.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Your beginnings will seem humble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so prosperous will your future be.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Ask the former generation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and find out what their ancestors learned,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: for we were born only yesterday and know nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and our days on earth are but a shadow.
