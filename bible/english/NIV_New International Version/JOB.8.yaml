document_id: JOB.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad
  - type: text
    content: 'Then Bildad the Shuhite replied:'
  '10':
  - type: text
    content: Will they not instruct you and tell you?
  - type: text
    content: Will they not bring forth words from their understanding?
  '11':
  - type: text
    content: Can papyrus grow tall where there is no marsh?
  - type: text
    content: Can reeds thrive without water?
  '12':
  - type: text
    content: While still growing and uncut,
  - type: text
    content: they wither more quickly than grass.
  '13':
  - type: text
    content: Such is the destiny of all who forget God;
  - type: text
    content: so perishes the hope of the godless.
  '14':
  - type: text
    content: What they trust in is fragile
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ;
  - type: text
    content: what they rely on is a spider’s web.
  '15':
  - type: text
    content: They lean on the web, but it gives way;
  - type: text
    content: they cling to it, but it does not hold.
  '16':
  - type: text
    content: They are like a well-watered plant in the sunshine,
  - type: text
    content: spreading its shoots over the garden;
  '17':
  - type: text
    content: it entwines its roots around a pile of rocks
  - type: text
    content: and looks for a place among the stones.
  '18':
  - type: text
    content: But when it is torn from its spot,
  - type: text
    content: that place disowns it and says, ‘I never saw you.’
  '19':
  - type: text
    content: Surely its life withers away,
  - type: text
    content: and
  - type: note
    content: Or Surely all the joy it has / is that
  - type: text
    content: ' from the soil other plants grow.'
  '2':
  - type: text
    content: “How long will you say such things?
  - type: text
    content: Your words are a blustering wind.
  '20':
  - type: text
    content: “Surely God does not reject one who is blameless
  - type: text
    content: or strengthen the hands of evildoers.
  '21':
  - type: text
    content: He will yet fill your mouth with laughter
  - type: text
    content: and your lips with shouts of joy.
  '22':
  - type: text
    content: Your enemies will be clothed in shame,
  - type: text
    content: and the tents of the wicked will be no more.”
  '3':
  - type: text
    content: Does God pervert justice?
  - type: text
    content: Does the Almighty pervert what is right?
  '4':
  - type: text
    content: When your children sinned against him,
  - type: text
    content: he gave them over to the penalty of their sin.
  '5':
  - type: text
    content: But if you will seek God earnestly
  - type: text
    content: and plead with the Almighty,
  '6':
  - type: text
    content: if you are pure and upright,
  - type: text
    content: even now he will rouse himself on your behalf
  - type: text
    content: and restore you to your prosperous state.
  '7':
  - type: text
    content: Your beginnings will seem humble,
  - type: text
    content: so prosperous will your future be.
  '8':
  - type: text
    content: “Ask the former generation
  - type: text
    content: and find out what their ancestors learned,
  '9':
  - type: text
    content: for we were born only yesterday and know nothing,
  - type: text
    content: and our days on earth are but a shadow.
