document_id: 2CH.29,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah Purifies the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother’s name was Abijah daughter of Zechariah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I intend to make a covenant with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, so that his fierce anger will turn away from us. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My sons, do not be negligent now, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen you to stand before him and serve him, to minister before him and to burn incense.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then these Levites set to work:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the Kohathites,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mahath son of Amasai and Joel son of Azariah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the Merarites,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Kish son of Abdi and Azariah son of Jehallelel;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the Gershonites,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Joah son of Zimmah and Eden son of Joah;
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the descendants of Elizaphan,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shimri and Jeiel;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the descendants of Asaph,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zechariah and Mattaniah;
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the descendants of Heman,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jehiel and Shimei;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the descendants of Jeduthun,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shemaiah and Uzziel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had assembled their fellow Levites and consecrated themselves, they went in to purify the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', as the king had ordered, following the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priests went into the sanctuary of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to purify it. They brought out to the courtyard of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s temple everything unclean that they found in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. The Levites took it and carried it out to the Kidron Valley. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They began the consecration on the first day of the first month, and by the eighth day of the month they reached the portico of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. For eight more days they consecrated the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' itself, finishing on the sixteenth day of the first month.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they went in to King Hezekiah and reported: “We have purified the entire temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the altar of burnt offering with all its utensils, and the table for setting out the consecrated bread, with all its articles. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have prepared and consecrated all the articles that King Ahaz removed in his unfaithfulness while he was king. They are now in front of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s altar.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did what was right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as his father David had done.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Early the next morning King Hezekiah gathered the city officials together and went up to the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They brought seven bulls, seven rams, seven male lambs and seven male goats as a sin offering
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: purification offering
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 23 and 24
      marker-yv: yv-n
    - type: text
      text: ' for the kingdom, for the sanctuary and for Judah. The king commanded the priests, the descendants of Aaron, to offer these on the altar of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they slaughtered the bulls, and the priests took the blood and splashed it against the altar; next they slaughtered the rams and splashed their blood against the altar; then they slaughtered the lambs and splashed their blood against the altar. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The goats for the sin offering were brought before the king and the assembly, and they laid their hands on them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priests then slaughtered the goats and presented their blood on the altar for a sin offering to atone for all Israel, because the king had ordered the burnt offering and the sin offering for all Israel.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He stationed the Levites in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with cymbals, harps and lyres in the way prescribed by David and Gad the king’s seer and Nathan the prophet; this was commanded by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' through his prophets. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the Levites stood ready with David’s instruments, and the priests with their trumpets.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah gave the order to sacrifice the burnt offering on the altar. As the offering began, singing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' began also, accompanied by trumpets and the instruments of David king of Israel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The whole assembly bowed in worship, while the musicians played and the trumpets sounded. All this continued until the sacrifice of the burnt offering was completed.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the offerings were finished, the king and everyone present with him knelt down and worshiped. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the first month of the first year of his reign, he opened the doors of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and repaired them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Hezekiah and his officials ordered the Levites to praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with the words of David and of Asaph the seer. So they sang praises with gladness and bowed down and worshiped.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Hezekiah said, “You have now dedicated yourselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Come and bring sacrifices and thank offerings to the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .” So the assembly brought sacrifices and thank offerings, and all whose hearts were willing brought burnt offerings.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The number of burnt offerings the assembly brought was seventy bulls, a hundred rams and two hundred male lambs—all of them for burnt offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The animals consecrated as sacrifices amounted to six hundred bulls and three thousand sheep and goats. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priests, however, were too few to skin all the burnt offerings; so their relatives the Levites helped them until the task was finished and until other priests had been consecrated, for the Levites had been more conscientious in consecrating themselves than the priests had been. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There were burnt offerings in abundance, together with the fat of the fellowship offerings and the drink offerings that accompanied the burnt offerings.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the service of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was reestablished. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hezekiah and all the people rejoiced at what God had brought about for his people, because it was done so quickly.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He brought in the priests and the Levites, assembled them in the square on the east side '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said: “Listen to me, Levites! Consecrate yourselves now and consecrate the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors. Remove all defilement from the sanctuary. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Our parents were unfaithful; they did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God and forsook him. They turned their faces away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s dwelling place and turned their backs on him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They also shut the doors of the portico and put out the lamps. They did not burn incense or present any burnt offerings at the sanctuary to the God of Israel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has fallen on Judah and Jerusalem; he has made them an object of dread and horror and scorn, as you can see with your own eyes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is why our fathers have fallen by the sword and why our sons and daughters and our wives are in captivity. '
