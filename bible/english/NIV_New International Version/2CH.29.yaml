document_id: 2CH.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Purifies the Temple
  - type: text
    content: 'Hezekiah was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother’s name was Abijah daughter of Zechariah. '
  '10':
  - type: text
    content: 'Now I intend to make a covenant with the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, so that his fierce anger will turn away from us. '
  '11':
  - type: text
    content: 'My sons, do not be negligent now, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen you to stand before him and serve him, to minister before him and to burn incense.”'
  '12':
  - type: text
    content: 'Then these Levites set to work:'
  - type: text
    content: from the Kohathites,
  - type: text
    content: Mahath son of Amasai and Joel son of Azariah;
  - type: text
    content: from the Merarites,
  - type: text
    content: Kish son of Abdi and Azariah son of Jehallelel;
  - type: text
    content: from the Gershonites,
  - type: text
    content: Joah son of Zimmah and Eden son of Joah;
  '13':
  - type: text
    content: from the descendants of Elizaphan,
  - type: text
    content: Shimri and Jeiel;
  - type: text
    content: from the descendants of Asaph,
  - type: text
    content: Zechariah and Mattaniah;
  '14':
  - type: text
    content: from the descendants of Heman,
  - type: text
    content: Jehiel and Shimei;
  - type: text
    content: from the descendants of Jeduthun,
  - type: text
    content: Shemaiah and Uzziel.
  '15':
  - type: text
    content: 'When they had assembled their fellow Levites and consecrated themselves, they went in to purify the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', as the king had ordered, following the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'The priests went into the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: ' to purify it. They brought out to the courtyard of the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple everything unclean that they found in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. The Levites took it and carried it out to the Kidron Valley. '
  '17':
  - type: text
    content: 'They began the consecration on the first day of the first month, and by the eighth day of the month they reached the portico of the '
  - type: text
    content: Lord
  - type: text
    content: '. For eight more days they consecrated the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' itself, finishing on the sixteenth day of the first month.'
  '18':
  - type: text
    content: 'Then they went in to King Hezekiah and reported: “We have purified the entire temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the altar of burnt offering with all its utensils, and the table for setting out the consecrated bread, with all its articles. '
  '19':
  - type: text
    content: 'We have prepared and consecrated all the articles that King Ahaz removed in his unfaithfulness while he was king. They are now in front of the '
  - type: text
    content: Lord
  - type: text
    content: ’s altar.”
  '2':
  - type: text
    content: 'He did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as his father David had done.'
  '20':
  - type: text
    content: 'Early the next morning King Hezekiah gathered the city officials together and went up to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: They brought seven bulls, seven rams, seven male lambs and seven male goats as a sin offering
  - type: note
    content: Or purification offering; also in verses 23 and 24
  - type: text
    content: ' for the kingdom, for the sanctuary and for Judah. The king commanded the priests, the descendants of Aaron, to offer these on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'So they slaughtered the bulls, and the priests took the blood and splashed it against the altar; next they slaughtered the rams and splashed their blood against the altar; then they slaughtered the lambs and splashed their blood against the altar. '
  '23':
  - type: text
    content: 'The goats for the sin offering were brought before the king and the assembly, and they laid their hands on them. '
  '24':
  - type: text
    content: The priests then slaughtered the goats and presented their blood on the altar for a sin offering to atone for all Israel, because the king had ordered the burnt offering and the sin offering for all Israel.
  '25':
  - type: text
    content: 'He stationed the Levites in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' with cymbals, harps and lyres in the way prescribed by David and Gad the king’s seer and Nathan the prophet; this was commanded by the '
  - type: text
    content: Lord
  - type: text
    content: ' through his prophets. '
  '26':
  - type: text
    content: So the Levites stood ready with David’s instruments, and the priests with their trumpets.
  '27':
  - type: text
    content: 'Hezekiah gave the order to sacrifice the burnt offering on the altar. As the offering began, singing to the '
  - type: text
    content: Lord
  - type: text
    content: ' began also, accompanied by trumpets and the instruments of David king of Israel. '
  '28':
  - type: text
    content: The whole assembly bowed in worship, while the musicians played and the trumpets sounded. All this continued until the sacrifice of the burnt offering was completed.
  '29':
  - type: text
    content: 'When the offerings were finished, the king and everyone present with him knelt down and worshiped. '
  '3':
  - type: text
    content: 'In the first month of the first year of his reign, he opened the doors of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and repaired them. '
  '30':
  - type: text
    content: 'King Hezekiah and his officials ordered the Levites to praise the '
  - type: text
    content: Lord
  - type: text
    content: ' with the words of David and of Asaph the seer. So they sang praises with gladness and bowed down and worshiped.'
  '31':
  - type: text
    content: 'Then Hezekiah said, “You have now dedicated yourselves to the '
  - type: text
    content: Lord
  - type: text
    content: '. Come and bring sacrifices and thank offerings to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .” So the assembly brought sacrifices and thank offerings, and all whose hearts were willing brought burnt offerings.
  '32':
  - type: text
    content: 'The number of burnt offerings the assembly brought was seventy bulls, a hundred rams and two hundred male lambs—all of them for burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'The animals consecrated as sacrifices amounted to six hundred bulls and three thousand sheep and goats. '
  '34':
  - type: text
    content: 'The priests, however, were too few to skin all the burnt offerings; so their relatives the Levites helped them until the task was finished and until other priests had been consecrated, for the Levites had been more conscientious in consecrating themselves than the priests had been. '
  '35':
  - type: text
    content: There were burnt offerings in abundance, together with the fat of the fellowship offerings and the drink offerings that accompanied the burnt offerings.
  - type: text
    content: 'So the service of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' was reestablished. '
  '36':
  - type: text
    content: Hezekiah and all the people rejoiced at what God had brought about for his people, because it was done so quickly.
  '4':
  - type: text
    content: 'He brought in the priests and the Levites, assembled them in the square on the east side '
  '5':
  - type: text
    content: 'and said: “Listen to me, Levites! Consecrate yourselves now and consecrate the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors. Remove all defilement from the sanctuary. '
  '6':
  - type: text
    content: 'Our parents were unfaithful; they did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God and forsook him. They turned their faces away from the '
  - type: text
    content: Lord
  - type: text
    content: '’s dwelling place and turned their backs on him. '
  '7':
  - type: text
    content: 'They also shut the doors of the portico and put out the lamps. They did not burn incense or present any burnt offerings at the sanctuary to the God of Israel. '
  '8':
  - type: text
    content: 'Therefore, the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' has fallen on Judah and Jerusalem; he has made them an object of dread and horror and scorn, as you can see with your own eyes. '
  '9':
  - type: text
    content: 'This is why our fathers have fallen by the sword and why our sons and daughters and our wives are in captivity. '
