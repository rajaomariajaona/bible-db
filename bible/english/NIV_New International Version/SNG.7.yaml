- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Your head crowns you like Mount Carmel.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your hair is like royal tapestry;
- type: usfm
  marker: q2
  children:
