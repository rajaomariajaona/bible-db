document_id: SNG.7,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 7:1-13 is numbered 7:2-14.
  - type: text
    content: How beautiful your sandaled feet,
  - type: text
    content: O prince’s daughter!
  - type: text
    content: Your graceful legs are like jewels,
  - type: text
    content: the work of an artist’s hands.
  '10':
  - type: text
    content: I belong to my beloved,
  - type: text
    content: and his desire is for me.
  '11':
  - type: text
    content: Come, my beloved, let us go to the countryside,
  - type: text
    content: let us spend the night in the villages.
  - type: note
    content: Or the henna bushes
  '12':
  - type: text
    content: Let us go early to the vineyards
  - type: text
    content: to see if the vines have budded,
  - type: text
    content: if their blossoms have opened,
  - type: text
    content: and if the pomegranates are in bloom—
  - type: text
    content: there I will give you my love.
  '13':
  - type: text
    content: The mandrakes send out their fragrance,
  - type: text
    content: and at our door is every delicacy,
  - type: text
    content: both new and old,
  - type: text
    content: that I have stored up for you, my beloved.
  '2':
  - type: text
    content: Your navel is a rounded goblet
  - type: text
    content: that never lacks blended wine.
  - type: text
    content: Your waist is a mound of wheat
  - type: text
    content: encircled by lilies.
  '3':
  - type: text
    content: Your breasts are like two fawns,
  - type: text
    content: like twin fawns of a gazelle.
  '4':
  - type: text
    content: Your neck is like an ivory tower.
  - type: text
    content: Your eyes are the pools of Heshbon
  - type: text
    content: by the gate of Bath Rabbim.
  - type: text
    content: Your nose is like the tower of Lebanon
  - type: text
    content: looking toward Damascus.
  '5':
  - type: text
    content: Your head crowns you like Mount Carmel.
  - type: text
    content: Your hair is like royal tapestry;
  - type: text
    content: the king is held captive by its tresses.
  '6':
  - type: text
    content: How beautiful you are and how pleasing,
  - type: text
    content: my love, with your delights!
  '7':
  - type: text
    content: Your stature is like that of the palm,
  - type: text
    content: and your breasts like clusters of fruit.
  '8':
  - type: text
    content: I said, “I will climb the palm tree;
  - type: text
    content: I will take hold of its fruit.”
  - type: text
    content: May your breasts be like clusters of grapes on the vine,
  - type: text
    content: the fragrance of your breath like apples,
  '9':
  - type: text
    content: and your mouth like the best wine.
  - type: heading
    content: She
  - type: text
    content: May the wine go straight to my beloved,
  - type: text
    content: flowing gently over lips and teeth.
  - type: note
    content: Septuagint, Aquila, Vulgate and Syriac; Hebrew lips of sleepers
