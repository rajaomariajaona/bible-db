document_id: 1CH.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Becomes King Over Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All Israel came together to David at Hebron and said, “We are your own flesh and blood. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the chiefs of David’s mighty warriors—they, together with all Israel, gave his kingship strong support to extend it over the whole land, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had promised— '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'this is the list of David’s mighty warriors:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jashobeam,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Possibly a variant of '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jashob-Baal
      marker-yv: yv-n
    - type: text
      text: ' a Hakmonite, was chief of the officers'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Thirty
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; some Septuagint manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Three '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see also 2 Samuel 23:8)
      marker-yv: yv-n
    - type: text
      text: ; he raised his spear against three hundred men, whom he killed in one encounter.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Next to him was Eleazar son of Dodai the Ahohite, one of the three mighty warriors. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was with David at Pas Dammim when the Philistines gathered there for battle. At a place where there was a field full of barley, the troops fled from the Philistines. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they took their stand in the middle of the field. They defended it and struck the Philistines down, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought about a great victory.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Three of the thirty chiefs came down to David to the rock at the cave of Adullam, while a band of Philistines was encamped in the Valley of Rephaim. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time David was in the stronghold, and the Philistine garrison was at Bethlehem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David longed for water and said, “Oh, that someone would get me a drink of water from the well near the gate of Bethlehem!” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Three broke through the Philistine lines, drew water from the well near the gate of Bethlehem and carried it back to David. But he refused to drink it; instead, he poured it out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “God forbid that I should do this!” he said. “Should I drink the blood of these men who went at the risk of their lives?” Because they risked their lives to bring it back, David would not drink it.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Such were the exploits of the three mighty warriors.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the past, even while Saul was king, you were the one who led Israel on their military campaigns. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God said to you, ‘You will shepherd my people Israel, and you will become their ruler.’ ”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abishai the brother of Joab was chief of the Three. He raised his spear against three hundred men, whom he killed, and so he became as famous as the Three. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was doubly honored above the Three and became their commander, even though he was not included among them.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaiah son of Jehoiada, a valiant fighter from Kabzeel, performed great exploits. He struck down Moab’s two mightiest warriors. He also went down into a pit on a snowy day and killed a lion. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he struck down an Egyptian who was five cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 7 feet 6 inches or about 2.3 meters
      marker-yv: yv-n
    - type: text
      text: ' tall. Although the Egyptian had a spear like a weaver’s rod in his hand, Benaiah went against him with a club. He snatched the spear from the Egyptian’s hand and killed him with his own spear. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Such were the exploits of Benaiah son of Jehoiada; he too was as famous as the three mighty warriors. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was held in greater honor than any of the Thirty, but he was not included among the Three. And David put him in charge of his bodyguard.
  '26':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The mighty warriors were:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Asahel the brother of Joab,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Elhanan son of Dodo from Bethlehem,
  '27':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shammoth the Harorite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Helez the Pelonite,
  '28':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ira son of Ikkesh from Tekoa,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Abiezer from Anathoth,
  '29':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Sibbekai the Hushathite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ilai the Ahohite,
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the elders of Israel had come to King David at Hebron, he made a covenant with them at Hebron before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and they anointed David king over Israel, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had promised through Samuel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Conquers Jerusalem
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Maharai the Netophathite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Heled son of Baanah the Netophathite,
  '31':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ithai son of Ribai from Gibeah in Benjamin,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Benaiah the Pirathonite,
  '32':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hurai from the ravines of Gaash,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Abiel the Arbathite,
  '33':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Azmaveth the Baharumite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliahba the Shaalbonite,
  '34':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the sons of Hashem the Gizonite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jonathan son of Shagee the Hararite,
  '35':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ahiam son of Sakar the Hararite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliphal son of Ur,
  '36':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hepher the Mekerathite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ahijah the Pelonite,
  '37':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hezro the Carmelite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Naarai son of Ezbai,
  '38':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Joel the brother of Nathan,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mibhar son of Hagri,
  '39':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zelek the Ammonite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Naharai the Berothite, the armor-bearer of Joab son of Zeruiah,
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David and all the Israelites marched to Jerusalem (that is, Jebus). The Jebusites who lived there '
  '40':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ira the Ithrite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Gareb the Ithrite,
  '41':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Uriah the Hittite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zabad son of Ahlai,
  '42':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Adina son of Shiza the Reubenite, who was chief of the Reubenites, and the thirty with him,
  '43':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hanan son of Maakah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Joshaphat the Mithnite,
  '44':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Uzzia the Ashterathite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shama and Jeiel the sons of Hotham the Aroerite,
  '45':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jediael son of Shimri,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: his brother Joha the Tizite,
  '46':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliel the Mahavite,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jeribai and Joshaviah the sons of Elnaam,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ithmah the Moabite,
  '47':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliel, Obed and Jaasiel the Mezobaite.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: said to David, “You will not get in here.” Nevertheless, David captured the fortress of Zion—which is the City of David.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David had said, “Whoever leads the attack on the Jebusites will become commander in chief.” Joab son of Zeruiah went up first, and so he received the command.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David then took up residence in the fortress, and so it was called the City of David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He built up the city around it, from the terraces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Millo
      marker-yv: yv-n
    - type: text
      text: ' to the surrounding wall, while Joab restored the rest of the city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David became more and more powerful, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty was with him.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Mighty Warriors
    marker-yv: yv-h
