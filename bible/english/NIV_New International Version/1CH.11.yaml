document_id: 1CH.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Becomes King Over Israel
  - type: text
    content: 'All Israel came together to David at Hebron and said, “We are your own flesh and blood. '
  '10':
  - type: text
    content: 'These were the chiefs of David’s mighty warriors—they, together with all Israel, gave his kingship strong support to extend it over the whole land, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised— '
  '11':
  - type: text
    content: 'this is the list of David’s mighty warriors:'
  - type: text
    content: Jashobeam,
  - type: note
    content: Possibly a variant of Jashob-Baal
  - type: text
    content: ' a Hakmonite, was chief of the officers'
  - type: note
    content: Or Thirty; some Septuagint manuscripts Three (see also 2 Samuel 23:8)
  - type: text
    content: ; he raised his spear against three hundred men, whom he killed in one encounter.
  '12':
  - type: text
    content: 'Next to him was Eleazar son of Dodai the Ahohite, one of the three mighty warriors. '
  '13':
  - type: text
    content: 'He was with David at Pas Dammim when the Philistines gathered there for battle. At a place where there was a field full of barley, the troops fled from the Philistines. '
  '14':
  - type: text
    content: 'But they took their stand in the middle of the field. They defended it and struck the Philistines down, and the '
  - type: text
    content: Lord
  - type: text
    content: ' brought about a great victory.'
  '15':
  - type: text
    content: 'Three of the thirty chiefs came down to David to the rock at the cave of Adullam, while a band of Philistines was encamped in the Valley of Rephaim. '
  '16':
  - type: text
    content: 'At that time David was in the stronghold, and the Philistine garrison was at Bethlehem. '
  '17':
  - type: text
    content: 'David longed for water and said, “Oh, that someone would get me a drink of water from the well near the gate of Bethlehem!” '
  '18':
  - type: text
    content: 'So the Three broke through the Philistine lines, drew water from the well near the gate of Bethlehem and carried it back to David. But he refused to drink it; instead, he poured it out to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: “God forbid that I should do this!” he said. “Should I drink the blood of these men who went at the risk of their lives?” Because they risked their lives to bring it back, David would not drink it.
  - type: text
    content: Such were the exploits of the three mighty warriors.
  '2':
  - type: text
    content: 'In the past, even while Saul was king, you were the one who led Israel on their military campaigns. And the '
  - type: text
    content: Lord
  - type: text
    content: ' your God said to you, ‘You will shepherd my people Israel, and you will become their ruler.’ ”'
  '20':
  - type: text
    content: 'Abishai the brother of Joab was chief of the Three. He raised his spear against three hundred men, whom he killed, and so he became as famous as the Three. '
  '21':
  - type: text
    content: He was doubly honored above the Three and became their commander, even though he was not included among them.
  '22':
  - type: text
    content: 'Benaiah son of Jehoiada, a valiant fighter from Kabzeel, performed great exploits. He struck down Moab’s two mightiest warriors. He also went down into a pit on a snowy day and killed a lion. '
  '23':
  - type: text
    content: And he struck down an Egyptian who was five cubits
  - type: note
    content: That is, about 7 feet 6 inches or about 2.3 meters
  - type: text
    content: ' tall. Although the Egyptian had a spear like a weaver’s rod in his hand, Benaiah went against him with a club. He snatched the spear from the Egyptian’s hand and killed him with his own spear. '
  '24':
  - type: text
    content: 'Such were the exploits of Benaiah son of Jehoiada; he too was as famous as the three mighty warriors. '
  '25':
  - type: text
    content: He was held in greater honor than any of the Thirty, but he was not included among the Three. And David put him in charge of his bodyguard.
  '26':
  - type: text
    content: 'The mighty warriors were:'
  - type: text
    content: Asahel the brother of Joab,
  - type: text
    content: Elhanan son of Dodo from Bethlehem,
  '27':
  - type: text
    content: Shammoth the Harorite,
  - type: text
    content: Helez the Pelonite,
  '28':
  - type: text
    content: Ira son of Ikkesh from Tekoa,
  - type: text
    content: Abiezer from Anathoth,
  '29':
  - type: text
    content: Sibbekai the Hushathite,
  - type: text
    content: Ilai the Ahohite,
  '3':
  - type: text
    content: 'When all the elders of Israel had come to King David at Hebron, he made a covenant with them at Hebron before the '
  - type: text
    content: Lord
  - type: text
    content: ', and they anointed David king over Israel, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised through Samuel.'
  - type: heading
    content: David Conquers Jerusalem
  '30':
  - type: text
    content: Maharai the Netophathite,
  - type: text
    content: Heled son of Baanah the Netophathite,
  '31':
  - type: text
    content: Ithai son of Ribai from Gibeah in Benjamin,
  - type: text
    content: Benaiah the Pirathonite,
  '32':
  - type: text
    content: Hurai from the ravines of Gaash,
  - type: text
    content: Abiel the Arbathite,
  '33':
  - type: text
    content: Azmaveth the Baharumite,
  - type: text
    content: Eliahba the Shaalbonite,
  '34':
  - type: text
    content: the sons of Hashem the Gizonite,
  - type: text
    content: Jonathan son of Shagee the Hararite,
  '35':
  - type: text
    content: Ahiam son of Sakar the Hararite,
  - type: text
    content: Eliphal son of Ur,
  '36':
  - type: text
    content: Hepher the Mekerathite,
  - type: text
    content: Ahijah the Pelonite,
  '37':
  - type: text
    content: Hezro the Carmelite,
  - type: text
    content: Naarai son of Ezbai,
  '38':
  - type: text
    content: Joel the brother of Nathan,
  - type: text
    content: Mibhar son of Hagri,
  '39':
  - type: text
    content: Zelek the Ammonite,
  - type: text
    content: Naharai the Berothite, the armor-bearer of Joab son of Zeruiah,
  '4':
  - type: text
    content: 'David and all the Israelites marched to Jerusalem (that is, Jebus). The Jebusites who lived there '
  '40':
  - type: text
    content: Ira the Ithrite,
  - type: text
    content: Gareb the Ithrite,
  '41':
  - type: text
    content: Uriah the Hittite,
  - type: text
    content: Zabad son of Ahlai,
  '42':
  - type: text
    content: Adina son of Shiza the Reubenite, who was chief of the Reubenites, and the thirty with him,
  '43':
  - type: text
    content: Hanan son of Maakah,
  - type: text
    content: Joshaphat the Mithnite,
  '44':
  - type: text
    content: Uzzia the Ashterathite,
  - type: text
    content: Shama and Jeiel the sons of Hotham the Aroerite,
  '45':
  - type: text
    content: Jediael son of Shimri,
  - type: text
    content: his brother Joha the Tizite,
  '46':
  - type: text
    content: Eliel the Mahavite,
  - type: text
    content: Jeribai and Joshaviah the sons of Elnaam,
  - type: text
    content: Ithmah the Moabite,
  '47':
  - type: text
    content: Eliel, Obed and Jaasiel the Mezobaite.
  '5':
  - type: text
    content: said to David, “You will not get in here.” Nevertheless, David captured the fortress of Zion—which is the City of David.
  '6':
  - type: text
    content: David had said, “Whoever leads the attack on the Jebusites will become commander in chief.” Joab son of Zeruiah went up first, and so he received the command.
  '7':
  - type: text
    content: 'David then took up residence in the fortress, and so it was called the City of David. '
  '8':
  - type: text
    content: He built up the city around it, from the terraces
  - type: note
    content: Or the Millo
  - type: text
    content: ' to the surrounding wall, while Joab restored the rest of the city. '
  '9':
  - type: text
    content: 'And David became more and more powerful, because the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty was with him.'
  - type: heading
    content: David’s Mighty Warriors
