  '3':
  - type: text
    content: 'As for Jeduthun, from his sons:'
  - type: text
    content: Gedaliah, Zeri, Jeshaiah, Shimei,
  - type: note
    content: One Hebrew manuscript and some Septuagint manuscripts (see also verse 17); most Hebrew manuscripts do not have Shimei.
  - type: text
    content: ' Hashabiah and Mattithiah, six in all, under the supervision of their father Jeduthun, who prophesied, using the harp in thanking and praising the '
  - type: text
    content: Lord
  - type: text
    content: .
  '30':
  - type: text
    content: the twenty-third to Mahazioth,
  - type: text
    content: his sons and relatives
  - type: text
    content: '12'
  '31':
  - type: text
    content: the twenty-fourth to Romamti-Ezer,
  - type: text
