  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'As for Heman, from his sons:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Bukkiah, Mattaniah, Uzziel, Shubael and Jerimoth; Hananiah, Hanani, Eliathah, Giddalti and Romamti-Ezer; Joshbekashah, Mallothi, Hothir and Mahazioth. '
  '5':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: (All these were sons of Heman the king’s seer. They were given him through the promises of God to exalt him. God gave Heman fourteen sons and three daughters.)
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these men were under the supervision of their father for the music of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', with cymbals, lyres and harps, for the ministry at the house of God.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asaph, Jeduthun and Heman were under the supervision of the king. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Along with their relatives—all of them trained and skilled in music for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—they numbered 288. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Young and old alike, teacher as well as student, cast lots for their duties.
  '9':
