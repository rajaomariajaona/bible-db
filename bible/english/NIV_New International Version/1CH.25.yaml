  '4':
  - type: text
    content: 'As for Heman, from his sons:'
  - type: text
    content: 'Bukkiah, Mattaniah, Uzziel, Shubael and Jerimoth; Hananiah, Hanani, Eliathah, Giddalti and Romamti-Ezer; Joshbekashah, Mallothi, Hothir and Mahazioth. '
  '5':
  - type: text
    content: (All these were sons of Heman the king’s seer. They were given him through the promises of God to exalt him. God gave Heman fourteen sons and three daughters.)
  '6':
  - type: text
    content: 'All these men were under the supervision of their father for the music of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', with cymbals, lyres and harps, for the ministry at the house of God.'
  - type: text
    content: 'Asaph, Jeduthun and Heman were under the supervision of the king. '
  '7':
  - type: text
    content: 'Along with their relatives—all of them trained and skilled in music for the '
  - type: text
    content: Lord
  - type: text
    content: '—they numbered 288. '
  '8':
  - type: text
    content: Young and old alike, teacher as well as student, cast lots for their duties.
  '9':
  - type: text
    content: The first lot, which was for Asaph, fell to Joseph,
  - type: text
    content: his sons and relatives
  - type: note
    content: See Septuagint; Hebrew does not have his sons and relatives.
  - type: text
    content: '12'
  - type: note
    content: See the total in verse 7; Hebrew does not have twelve.
  - type: text
    content: the second to Gedaliah,
  - type: text
    content: him and his relatives and sons
  - type: text
    content: '12'
