verses:
  '1':
  - type: heading
    content: The Musicians
  - type: text
    content: 'David, together with the commanders of the army, set apart some of the sons of Asaph, Heman and Jeduthun for the ministry of prophesying, accompanied by harps, lyres and cymbals. Here is the list of the men who performed this service:'
  '10':
  - type: text
    content: the third to Zakkur,
  - type: text
    content: his sons and relatives
  - type: text
    content: '12'
  '11':
  - type: text
    content: the fourth to Izri,
  - type: note
    content: A variant of Zeri
  - type: text
    content: his sons and relatives
  - type: text
    content: '12'
