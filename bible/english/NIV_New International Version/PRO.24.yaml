document_id: PRO.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Saying 20
  - type: text
    content: Do not envy the wicked,
  - type: text
    content: do not desire their company;
  '10':
  - type: text
    content: If you falter in a time of trouble,
  - type: text
    content: how small is your strength!
  '11':
  - type: text
    content: Rescue those being led away to death;
  - type: text
    content: hold back those staggering toward slaughter.
  '12':
  - type: text
    content: If you say, “But we knew nothing about this,”
  - type: text
    content: does not he who weighs the heart perceive it?
  - type: text
    content: Does not he who guards your life know it?
  - type: text
    content: Will he not repay everyone according to what they have done?
  - type: heading
    content: Saying 26
  '13':
  - type: text
    content: Eat honey, my son, for it is good;
  - type: text
    content: honey from the comb is sweet to your taste.
  '14':
  - type: text
    content: 'Know also that wisdom is like honey for you:'
  - type: text
    content: If you find it, there is a future hope for you,
  - type: text
    content: and your hope will not be cut off.
  - type: heading
    content: Saying 27
  '15':
  - type: text
    content: Do not lurk like a thief near the house of the righteous,
  - type: text
    content: do not plunder their dwelling place;
  '16':
  - type: text
    content: for though the righteous fall seven times, they rise again,
  - type: text
    content: but the wicked stumble when calamity strikes.
  - type: heading
    content: Saying 28
  '17':
  - type: text
    content: Do not gloat when your enemy falls;
  - type: text
    content: when they stumble, do not let your heart rejoice,
  '18':
  - type: text
    content: 'or the '
  - type: text
    content: Lord
  - type: text
    content: ' will see and disapprove'
  - type: text
    content: and turn his wrath away from them.
  - type: heading
    content: Saying 29
  '19':
  - type: text
    content: Do not fret because of evildoers
  - type: text
    content: or be envious of the wicked,
  '2':
  - type: text
    content: for their hearts plot violence,
  - type: text
    content: and their lips talk about making trouble.
  - type: heading
    content: Saying 21
  '20':
  - type: text
    content: for the evildoer has no future hope,
  - type: text
    content: and the lamp of the wicked will be snuffed out.
  - type: heading
    content: Saying 30
  '21':
  - type: text
    content: 'Fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king, my son,'
  - type: text
    content: and do not join with rebellious officials,
  '22':
  - type: text
    content: for those two will send sudden destruction on them,
  - type: text
    content: and who knows what calamities they can bring?
  - type: heading
    content: Further Sayings of the Wise
  '23':
  - type: text
    content: 'These also are sayings of the wise:'
  - type: text
    content: 'To show partiality in judging is not good:'
  '24':
  - type: text
    content: Whoever says to the guilty, “You are innocent,”
  - type: text
    content: will be cursed by peoples and denounced by nations.
  '25':
  - type: text
    content: But it will go well with those who convict the guilty,
  - type: text
    content: and rich blessing will come on them.
  '26':
  - type: text
    content: An honest answer
  - type: text
    content: is like a kiss on the lips.
  '27':
  - type: text
    content: Put your outdoor work in order
  - type: text
    content: and get your fields ready;
  - type: text
    content: after that, build your house.
  '28':
  - type: text
    content: Do not testify against your neighbor without cause—
  - type: text
    content: would you use your lips to mislead?
  '29':
  - type: text
    content: Do not say, “I’ll do to them as they have done to me;
  - type: text
    content: I’ll pay them back for what they did.”
  '3':
  - type: text
    content: By wisdom a house is built,
  - type: text
    content: and through understanding it is established;
  '30':
  - type: text
    content: I went past the field of a sluggard,
  - type: text
    content: past the vineyard of someone who has no sense;
  '31':
  - type: text
    content: thorns had come up everywhere,
  - type: text
    content: the ground was covered with weeds,
  - type: text
    content: and the stone wall was in ruins.
  '32':
  - type: text
    content: I applied my heart to what I observed
  - type: text
    content: 'and learned a lesson from what I saw:'
  '33':
  - type: text
    content: A little sleep, a little slumber,
  - type: text
    content: a little folding of the hands to rest—
  '34':
  - type: text
    content: and poverty will come on you like a thief
  - type: text
    content: and scarcity like an armed man.
  '4':
  - type: text
    content: through knowledge its rooms are filled
  - type: text
    content: with rare and beautiful treasures.
  - type: heading
    content: Saying 22
  '5':
  - type: text
    content: The wise prevail through great power,
  - type: text
    content: and those who have knowledge muster their strength.
  '6':
  - type: text
    content: Surely you need guidance to wage war,
  - type: text
    content: and victory is won through many advisers.
  - type: heading
    content: Saying 23
  '7':
  - type: text
    content: Wisdom is too high for fools;
  - type: text
    content: in the assembly at the gate they must not open their mouths.
  - type: heading
    content: Saying 24
  '8':
  - type: text
    content: Whoever plots evil
  - type: text
    content: will be known as a schemer.
  '9':
  - type: text
    content: The schemes of folly are sin,
  - type: text
    content: and people detest a mocker.
  - type: heading
    content: Saying 25
