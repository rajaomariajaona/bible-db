document_id: PRO.24,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 20
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Do not envy the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not desire their company;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: If you falter in a time of trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how small is your strength!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Rescue those being led away to death;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hold back those staggering toward slaughter.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If you say, “But we knew nothing about this,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: does not he who weighs the heart perceive it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does not he who guards your life know it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will he not repay everyone according to what they have done?
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 26
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eat honey, my son, for it is good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: honey from the comb is sweet to your taste.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Know also that wisdom is like honey for you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If you find it, there is a future hope for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your hope will not be cut off.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 27
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Do not lurk like a thief near the house of the righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not plunder their dwelling place;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: for though the righteous fall seven times, they rise again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the wicked stumble when calamity strikes.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 28
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Do not gloat when your enemy falls;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they stumble, do not let your heart rejoice,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'or the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will see and disapprove'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turn his wrath away from them.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 29
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Do not fret because of evildoers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or be envious of the wicked,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: for their hearts plot violence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their lips talk about making trouble.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 21
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: for the evildoer has no future hope,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the lamp of the wicked will be snuffed out.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 30
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the king, my son,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not join with rebellious officials,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: for those two will send sudden destruction on them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and who knows what calamities they can bring?
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Further Sayings of the Wise
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'These also are sayings of the wise:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To show partiality in judging is not good:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Whoever says to the guilty, “You are innocent,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be cursed by peoples and denounced by nations.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: But it will go well with those who convict the guilty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rich blessing will come on them.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: An honest answer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a kiss on the lips.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Put your outdoor work in order
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and get your fields ready;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: after that, build your house.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Do not testify against your neighbor without cause—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: would you use your lips to mislead?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Do not say, “I’ll do to them as they have done to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I’ll pay them back for what they did.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: By wisdom a house is built,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and through understanding it is established;
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: I went past the field of a sluggard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: past the vineyard of someone who has no sense;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: thorns had come up everywhere,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the ground was covered with weeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the stone wall was in ruins.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: I applied my heart to what I observed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and learned a lesson from what I saw:'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: A little sleep, a little slumber,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a little folding of the hands to rest—
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: and poverty will come on you like a thief
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and scarcity like an armed man.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: through knowledge its rooms are filled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with rare and beautiful treasures.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 22
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The wise prevail through great power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who have knowledge muster their strength.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Surely you need guidance to wage war,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and victory is won through many advisers.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 23
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Wisdom is too high for fools;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the assembly at the gate they must not open their mouths.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 24
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Whoever plots evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be known as a schemer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The schemes of folly are sin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and people detest a mocker.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Saying 25
    marker-yv: yv-h
