document_id: DEU.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Clean and Unclean Food
  - type: text
    content: 'You are the children of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. Do not cut yourselves or shave the front of your heads for the dead, '
  '10':
  - type: text
    content: But anything that does not have fins and scales you may not eat; for you it is unclean.
  '11':
  - type: text
    content: 'You may eat any clean bird. '
  '12':
  - type: text
    content: 'But these you may not eat: the eagle, the vulture, the black vulture, '
  '13':
  - type: text
    content: 'the red kite, the black kite, any kind of falcon, '
  '14':
  - type: text
    content: 'any kind of raven, '
  '15':
  - type: text
    content: 'the horned owl, the screech owl, the gull, any kind of hawk, '
  '16':
  - type: text
    content: 'the little owl, the great owl, the white owl, '
  '17':
  - type: text
    content: 'the desert owl, the osprey, the cormorant, '
  '18':
  - type: text
    content: the stork, any kind of heron, the hoopoe and the bat.
  '19':
  - type: text
    content: 'All flying insects are unclean to you; do not eat them. '
  '2':
  - type: text
    content: 'for you are a people holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. Out of all the peoples on the face of the earth, the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen you to be his treasured possession.'
  '20':
  - type: text
    content: But any winged creature that is clean you may eat.
  '21':
  - type: text
    content: 'Do not eat anything you find already dead. You may give it to the foreigner residing in any of your towns, and they may eat it, or you may sell it to any other foreigner. But you are a people holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  - type: text
    content: Do not cook a young goat in its mother’s milk.
  - type: heading
    content: Tithes
  '22':
  - type: text
    content: 'Be sure to set aside a tenth of all that your fields produce each year. '
  '23':
  - type: text
    content: 'Eat the tithe of your grain, new wine and olive oil, and the firstborn of your herds and flocks in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place he will choose as a dwelling for his Name, so that you may learn to revere the '
  - type: text
    content: Lord
  - type: text
    content: ' your God always. '
  '24':
  - type: text
    content: 'But if that place is too distant and you have been blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and cannot carry your tithe (because the place where the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose to put his Name is so far away), '
  '25':
  - type: text
    content: 'then exchange your tithe for silver, and take the silver with you and go to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose. '
  '26':
  - type: text
    content: 'Use the silver to buy whatever you like: cattle, sheep, wine or other fermented drink, or anything you wish. Then you and your household shall eat there in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and rejoice. '
  '27':
  - type: text
    content: And do not neglect the Levites living in your towns, for they have no allotment or inheritance of their own.
  '28':
  - type: text
    content: 'At the end of every three years, bring all the tithes of that year’s produce and store it in your towns, '
  '29':
  - type: text
    content: 'so that the Levites (who have no allotment or inheritance of their own) and the foreigners, the fatherless and the widows who live in your towns may come and eat and be satisfied, and so that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God may bless you in all the work of your hands.'
  '3':
  - type: text
    content: 'Do not eat any detestable thing. '
  '4':
  - type: text
    content: 'These are the animals you may eat: the ox, the sheep, the goat, '
  '5':
  - type: text
    content: the deer, the gazelle, the roe deer, the wild goat, the ibex, the antelope and the mountain sheep.
  - type: note
    content: The precise identification of some of the birds and animals in this chapter is uncertain.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'You may eat any animal that has a divided hoof and that chews the cud. '
  '7':
  - type: text
    content: 'However, of those that chew the cud or that have a divided hoof you may not eat the camel, the rabbit or the hyrax. Although they chew the cud, they do not have a divided hoof; they are ceremonially unclean for you. '
  '8':
  - type: text
    content: The pig is also unclean; although it has a divided hoof, it does not chew the cud. You are not to eat their meat or touch their carcasses.
  '9':
  - type: text
    content: 'Of all the creatures living in the water, you may eat any that has fins and scales. '
