document_id: NUM.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arad Destroyed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When the Canaanite king of Arad, who lived in the Negev, heard that Israel was coming along the road to Atharim, he attacked the Israelites and captured some of them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The Israelites moved on and camped at Oboth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then they set out from Oboth and camped in Iye Abarim, in the wilderness that faces Moab toward the sunrise. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'From there they moved on and camped in the Zered Valley. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'They set out from there and camped alongside the Arnon, which is in the wilderness extending into Amorite territory. The Arnon is the border of Moab, between Moab and the Amorites. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'That is why the Book of the Wars of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “…Zahab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Waheb
      marker-yv: yv-n
    - type: text
      text: ' in Suphah and the ravines,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the Arnon '
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: and
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:14,15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '“I have been given from Suphah and the ravines / of the Arnon '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '15 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to
      marker-yv: yv-n
    - type: text
      text: ' the slopes of the ravines'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that lead to the settlement of Ar
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lie along the border of Moab.”
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'From there they continued on to Beer, the well where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Gather the people together and I will give them water.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Israel sang this song:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Spring up, O well!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing about it,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: about the well that the princes dug,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the nobles of the people sank—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the nobles with scepters and staffs.”
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then they went from the wilderness to Mattanah, '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'from Mattanah to Nahaliel, from Nahaliel to Bamoth, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then Israel made this vow to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': “If you will deliver these people into our hands, we will totally destroy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them; also in verse 3.'
      marker-yv: yv-n
    - type: text
      text: ' their cities.” '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: and from Bamoth to the valley in Moab where the top of Pisgah overlooks the wasteland.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Defeat of Sihon and Og
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Israel sent messengers to say to Sihon king of the Amorites:'
  '22':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Let us pass through your country. We will not turn aside into any field or vineyard, or drink water from any well. We will travel along the King’s Highway until we have passed through your territory.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But Sihon would not let Israel pass through his territory. He mustered his entire army and marched out into the wilderness against Israel. When he reached Jahaz, he fought with Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Israel, however, put him to the sword and took over his land from the Arnon to the Jabbok, but only as far as the Ammonites, because their border was fortified. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Israel captured all the cities of the Amorites and occupied them, including Heshbon and all its surrounding settlements. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Heshbon was the city of Sihon king of the Amorites, who had fought against the former king of Moab and had taken from him all his land as far as the Arnon.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'That is why the poets say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come to Heshbon and let it be rebuilt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let Sihon’s city be restored.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “Fire went out from Heshbon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a blaze from the city of Sihon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It consumed Ar of Moab,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the citizens of Arnon’s heights.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Woe to you, Moab!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You are destroyed, people of Chemosh!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has given up his sons as fugitives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his daughters as captives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to Sihon king of the Amorites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' listened to Israel’s plea and gave the Canaanites over to them. They completely destroyed them and their towns; so the place was named Hormah.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hormah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: destruction.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Bronze Snake
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “But we have overthrown them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Heshbon’s dominion has been destroyed all the way to Dibon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have demolished them as far as Nophah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which extends to Medeba.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: So Israel settled in the land of the Amorites.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'After Moses had sent spies to Jazer, the Israelites captured its surrounding settlements and drove out the Amorites who were there. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Then they turned and went up along the road toward Bashan, and Og king of Bashan and his whole army marched out to meet them in battle at Edrei.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Do not be afraid of him, for I have delivered him into your hands, along with his whole army and his land. Do to him what you did to Sihon king of the Amorites, who reigned in Heshbon.”'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: So they struck him down, together with his sons and his whole army, leaving them no survivors. And they took possession of his land.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They traveled from Mount Hor along the route to the Red Sea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Sea of Reeds
      marker-yv: yv-n
    - type: text
      text: ' to go around Edom. But the people grew impatient on the way; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: they spoke against God and against Moses, and said, “Why have you brought us up out of Egypt to die in the wilderness? There is no bread! There is no water! And we detest this miserable food!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent venomous snakes among them; they bit the people and many Israelites died. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The people came to Moses and said, “We sinned when we spoke against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and against you. Pray that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will take the snakes away from us.” So Moses prayed for the people.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Make a snake and put it up on a pole; anyone who is bitten can look at it and live.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So Moses made a bronze snake and put it up on a pole. Then when anyone was bitten by a snake and looked at the bronze snake, they lived.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Journey to Moab
    marker-yv: yv-h
