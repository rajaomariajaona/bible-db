document_id: NUM.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Arad Destroyed
  - type: text
    content: 'When the Canaanite king of Arad, who lived in the Negev, heard that Israel was coming along the road to Atharim, he attacked the Israelites and captured some of them. '
  '10':
  - type: text
    content: 'The Israelites moved on and camped at Oboth. '
  '11':
  - type: text
    content: 'Then they set out from Oboth and camped in Iye Abarim, in the wilderness that faces Moab toward the sunrise. '
  '12':
  - type: text
    content: 'From there they moved on and camped in the Zered Valley. '
  '13':
  - type: text
    content: 'They set out from there and camped alongside the Arnon, which is in the wilderness extending into Amorite territory. The Arnon is the border of Moab, between Moab and the Amorites. '
  '14':
  - type: text
    content: 'That is why the Book of the Wars of the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “…Zahab
  - type: note
    content: Septuagint; Hebrew Waheb
  - type: text
    content: ' in Suphah and the ravines,'
  - type: text
    content: 'the Arnon '
  '15':
  - type: text
    content: and
  - type: note
    content: Or “I have been given from Suphah and the ravines / of the Arnon 15 to
  - type: text
    content: ' the slopes of the ravines'
  - type: text
    content: that lead to the settlement of Ar
  - type: text
    content: and lie along the border of Moab.”
  '16':
  - type: text
    content: 'From there they continued on to Beer, the well where the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Gather the people together and I will give them water.”'
  '17':
  - type: text
    content: 'Then Israel sang this song:'
  - type: text
    content: “Spring up, O well!
  - type: text
    content: Sing about it,
  '18':
  - type: text
    content: about the well that the princes dug,
  - type: text
    content: that the nobles of the people sank—
  - type: text
    content: the nobles with scepters and staffs.”
  - type: text
    content: 'Then they went from the wilderness to Mattanah, '
  '19':
  - type: text
    content: 'from Mattanah to Nahaliel, from Nahaliel to Bamoth, '
  '2':
  - type: text
    content: 'Then Israel made this vow to the '
  - type: text
    content: Lord
  - type: text
    content: ': “If you will deliver these people into our hands, we will totally destroy'
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them; also in verse 3.
  - type: text
    content: ' their cities.” '
  '20':
  - type: text
    content: and from Bamoth to the valley in Moab where the top of Pisgah overlooks the wasteland.
  - type: heading
    content: Defeat of Sihon and Og
  '21':
  - type: text
    content: 'Israel sent messengers to say to Sihon king of the Amorites:'
  '22':
  - type: text
    content: “Let us pass through your country. We will not turn aside into any field or vineyard, or drink water from any well. We will travel along the King’s Highway until we have passed through your territory.”
  '23':
  - type: text
    content: 'But Sihon would not let Israel pass through his territory. He mustered his entire army and marched out into the wilderness against Israel. When he reached Jahaz, he fought with Israel. '
  '24':
  - type: text
    content: 'Israel, however, put him to the sword and took over his land from the Arnon to the Jabbok, but only as far as the Ammonites, because their border was fortified. '
  '25':
  - type: text
    content: 'Israel captured all the cities of the Amorites and occupied them, including Heshbon and all its surrounding settlements. '
  '26':
  - type: text
    content: Heshbon was the city of Sihon king of the Amorites, who had fought against the former king of Moab and had taken from him all his land as far as the Arnon.
  '27':
  - type: text
    content: 'That is why the poets say:'
  - type: text
    content: “Come to Heshbon and let it be rebuilt;
  - type: text
    content: let Sihon’s city be restored.
  '28':
  - type: text
    content: “Fire went out from Heshbon,
  - type: text
    content: a blaze from the city of Sihon.
  - type: text
    content: It consumed Ar of Moab,
  - type: text
    content: the citizens of Arnon’s heights.
  '29':
  - type: text
    content: Woe to you, Moab!
  - type: text
    content: You are destroyed, people of Chemosh!
  - type: text
    content: He has given up his sons as fugitives
  - type: text
    content: and his daughters as captives
  - type: text
    content: to Sihon king of the Amorites.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' listened to Israel’s plea and gave the Canaanites over to them. They completely destroyed them and their towns; so the place was named Hormah.'
  - type: note
    content: Hormah means destruction.
  - type: heading
    content: The Bronze Snake
  '30':
  - type: text
    content: “But we have overthrown them;
  - type: text
    content: Heshbon’s dominion has been destroyed all the way to Dibon.
  - type: text
    content: We have demolished them as far as Nophah,
  - type: text
    content: which extends to Medeba.”
  '31':
  - type: text
    content: So Israel settled in the land of the Amorites.
  '32':
  - type: text
    content: 'After Moses had sent spies to Jazer, the Israelites captured its surrounding settlements and drove out the Amorites who were there. '
  '33':
  - type: text
    content: Then they turned and went up along the road toward Bashan, and Og king of Bashan and his whole army marched out to meet them in battle at Edrei.
  '34':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Do not be afraid of him, for I have delivered him into your hands, along with his whole army and his land. Do to him what you did to Sihon king of the Amorites, who reigned in Heshbon.”'
  '35':
  - type: text
    content: So they struck him down, together with his sons and his whole army, leaving them no survivors. And they took possession of his land.
  '4':
  - type: text
    content: They traveled from Mount Hor along the route to the Red Sea,
  - type: note
    content: Or the Sea of Reeds
  - type: text
    content: ' to go around Edom. But the people grew impatient on the way; '
  '5':
  - type: text
    content: they spoke against God and against Moses, and said, “Why have you brought us up out of Egypt to die in the wilderness? There is no bread! There is no water! And we detest this miserable food!”
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' sent venomous snakes among them; they bit the people and many Israelites died. '
  '7':
  - type: text
    content: 'The people came to Moses and said, “We sinned when we spoke against the '
  - type: text
    content: Lord
  - type: text
    content: ' and against you. Pray that the '
  - type: text
    content: Lord
  - type: text
    content: ' will take the snakes away from us.” So Moses prayed for the people.'
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Make a snake and put it up on a pole; anyone who is bitten can look at it and live.” '
  '9':
  - type: text
    content: So Moses made a bronze snake and put it up on a pole. Then when anyone was bitten by a snake and looked at the bronze snake, they lived.
  - type: heading
    content: The Journey to Moab
