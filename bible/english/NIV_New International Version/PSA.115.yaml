verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 115
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Not to us, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', not to us'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but to your name be the glory,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of your love and faithfulness.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'House of Aaron, trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is their help and shield.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You who fear him, trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is their help and shield.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' remembers us and will bless us:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will bless his people Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will bless the house of Aaron,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'he will bless those who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: small and great alike.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' cause you to flourish,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both you and your children.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May you be blessed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Maker of heaven and earth.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The highest heavens belong to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the earth he has given to mankind.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is not the dead who praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who go down to the place of silence;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'it is we who extol the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both now and forevermore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '115:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hallelu Yah
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do the nations say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where is their God?”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our God is in heaven;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he does whatever pleases him.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But their idols are silver and gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made by human hands.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have mouths, but cannot speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: eyes, but cannot see.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have ears, but cannot hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: noses, but cannot smell.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have hands, but cannot feel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: feet, but cannot walk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor can they utter a sound with their throats.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who make them will be like them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so will all who trust in them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All you Israelites, trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is their help and shield.
