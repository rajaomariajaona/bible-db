  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Why do the nations say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Where is their God?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Our God is in heaven;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he does whatever pleases him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But their idols are silver and gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made by human hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They have mouths, but cannot speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: eyes, but cannot see.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They have ears, but cannot hear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: noses, but cannot smell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They have hands, but cannot feel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: feet, but cannot walk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor can they utter a sound with their throats.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
