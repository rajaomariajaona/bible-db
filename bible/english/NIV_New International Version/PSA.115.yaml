document_id: PSA.115,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 115
  - type: text
    content: 'Not to us, '
  - type: text
    content: Lord
  - type: text
    content: ', not to us'
  - type: text
    content: but to your name be the glory,
  - type: text
    content: because of your love and faithfulness.
  '10':
  - type: text
    content: 'House of Aaron, trust in the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: he is their help and shield.
  '11':
  - type: text
    content: 'You who fear him, trust in the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: he is their help and shield.
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' remembers us and will bless us:'
  - type: text
    content: He will bless his people Israel,
  - type: text
    content: he will bless the house of Aaron,
  '13':
  - type: text
    content: 'he will bless those who fear the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: small and great alike.
  '14':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' cause you to flourish,'
  - type: text
    content: both you and your children.
  '15':
  - type: text
    content: 'May you be blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the Maker of heaven and earth.
  '16':
  - type: text
    content: 'The highest heavens belong to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but the earth he has given to mankind.
  '17':
  - type: text
    content: 'It is not the dead who praise the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: those who go down to the place of silence;
  '18':
  - type: text
    content: 'it is we who extol the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: both now and forevermore.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew Hallelu Yah
  '2':
  - type: text
    content: Why do the nations say,
  - type: text
    content: “Where is their God?”
  '3':
  - type: text
    content: Our God is in heaven;
  - type: text
    content: he does whatever pleases him.
  '4':
  - type: text
    content: But their idols are silver and gold,
  - type: text
    content: made by human hands.
  '5':
  - type: text
    content: They have mouths, but cannot speak,
  - type: text
    content: eyes, but cannot see.
  '6':
  - type: text
    content: They have ears, but cannot hear,
  - type: text
    content: noses, but cannot smell.
  '7':
  - type: text
    content: They have hands, but cannot feel,
  - type: text
    content: feet, but cannot walk,
  - type: text
    content: nor can they utter a sound with their throats.
  '8':
  - type: text
    content: Those who make them will be like them,
  - type: text
    content: and so will all who trust in them.
  '9':
  - type: text
    content: 'All you Israelites, trust in the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: he is their help and shield.
