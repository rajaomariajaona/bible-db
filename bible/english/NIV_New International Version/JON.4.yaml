document_id: JON.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Jonah’s Anger at the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Compassion
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But to Jonah this seemed very wrong, and he became angry. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “You have been concerned about this plant, though you did not tend it or make it grow. It sprang up overnight and died overnight. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And should I not have concern for the great city of Nineveh, in which there are more than a hundred and twenty thousand people who cannot tell their right hand from their left—and also many animals?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Isn’t this what I said, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', when I was still at home? That is what I tried to forestall by fleeing to Tarshish. I knew that you are a gracious and compassionate God, slow to anger and abounding in love, a God who relents from sending calamity. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', take away my life, for it is better for me to die than to live.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied, “Is it right for you to be angry?”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonah had gone out and sat down at a place east of the city. There he made himself a shelter, sat in its shade and waited to see what would happen to the city. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God provided a leafy plant'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The precise identification of this plant is uncertain; also in verses 7, 9 and 10.
      marker-yv: yv-n
    - type: text
      text: ' and made it grow up over Jonah to give shade for his head to ease his discomfort, and Jonah was very happy about the plant. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But at dawn the next day God provided a worm, which chewed the plant so that it withered. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the sun rose, God provided a scorching east wind, and the sun blazed on Jonah’s head so that he grew faint. He wanted to die, and said, “It would be better for me to die than to live.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But God said to Jonah, “Is it right for you to be angry about the plant?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “It is,” he said. “And I’m so angry I wish I were dead.”
