document_id: JON.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah’s Anger at the Lord’s Compassion
  - type: text
    content: 'But to Jonah this seemed very wrong, and he became angry. '
  '10':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “You have been concerned about this plant, though you did not tend it or make it grow. It sprang up overnight and died overnight. '
  '11':
  - type: text
    content: And should I not have concern for the great city of Nineveh, in which there are more than a hundred and twenty thousand people who cannot tell their right hand from their left—and also many animals?”
  '2':
  - type: text
    content: 'He prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Isn’t this what I said, '
  - type: text
    content: Lord
  - type: text
    content: ', when I was still at home? That is what I tried to forestall by fleeing to Tarshish. I knew that you are a gracious and compassionate God, slow to anger and abounding in love, a God who relents from sending calamity. '
  '3':
  - type: text
    content: 'Now, '
  - type: text
    content: Lord
  - type: text
    content: ', take away my life, for it is better for me to die than to live.”'
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Is it right for you to be angry?”'
  '5':
  - type: text
    content: 'Jonah had gone out and sat down at a place east of the city. There he made himself a shelter, sat in its shade and waited to see what would happen to the city. '
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God provided a leafy plant'
  - type: note
    content: The precise identification of this plant is uncertain; also in verses 7, 9 and 10.
  - type: text
    content: ' and made it grow up over Jonah to give shade for his head to ease his discomfort, and Jonah was very happy about the plant. '
  '7':
  - type: text
    content: 'But at dawn the next day God provided a worm, which chewed the plant so that it withered. '
  '8':
  - type: text
    content: When the sun rose, God provided a scorching east wind, and the sun blazed on Jonah’s head so that he grew faint. He wanted to die, and said, “It would be better for me to die than to live.”
  '9':
  - type: text
    content: But God said to Jonah, “Is it right for you to be angry about the plant?”
  - type: text
    content: “It is,” he said. “And I’m so angry I wish I were dead.”
