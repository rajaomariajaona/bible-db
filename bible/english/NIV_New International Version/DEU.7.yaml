document_id: DEU.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Driving Out the Nations
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God brings you into the land you are entering to possess and drives out before you many nations—the Hittites, Girgashites, Amorites, Canaanites, Perizzites, Hivites and Jebusites, seven nations larger and stronger than you— '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who hate him he will repay to their face by destruction;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will not be slow to repay to their face those who hate him.
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Therefore, take care to follow the commands, decrees and laws I give you today.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you pay attention to these laws and are careful to follow them, then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will keep his covenant of love with you, as he swore to your ancestors. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will love you and bless you and increase your numbers. He will bless the fruit of your womb, the crops of your land—your grain, new wine and olive oil—the calves of your herds and the lambs of your flocks in the land he swore to your ancestors to give you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will be blessed more than any other people; none of your men or women will be childless, nor will any of your livestock be without young. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will keep you free from every disease. He will not inflict on you the horrible diseases you knew in Egypt, but he will inflict them on all who hate you. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must destroy all the peoples the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God gives over to you. Do not look on them with pity and do not serve their gods, for that will be a snare to you.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You may say to yourselves, “These nations are stronger than we are. How can we drive them out?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But do not be afraid of them; remember well what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God did to Pharaoh and to all Egypt. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You saw with your own eyes the great trials, the signs and wonders, the mighty hand and outstretched arm, with which the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God brought you out. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will do the same to all the peoples you now fear. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has delivered them over to you and you have defeated them, then you must destroy them totally.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them; also in verse 26.'
      marker-yv: yv-n
    - type: text
      text: ' Make no treaty with them, and show them no mercy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will send the hornet among them until even the survivors who hide from you have perished. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not be terrified by them, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who is among you, is a great and awesome God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will drive out those nations before you, little by little. You will not be allowed to eliminate them all at once, or the wild animals will multiply around you. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will deliver them over to you, throwing them into great confusion until they are destroyed. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will give their kings into your hand, and you will wipe out their names from under heaven. No one will be able to stand up against you; you will destroy them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The images of their gods you are to burn in the fire. Do not covet the silver and gold on them, and do not take it for yourselves, or you will be ensnared by it, for it is detestable to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do not bring a detestable thing into your house or you, like it, will be set apart for destruction. Regard it as vile and utterly detest it, for it is set apart for destruction.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not intermarry with them. Do not give your daughters to their sons or take their daughters for your sons, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for they will turn your children away from following me to serve other gods, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anger will burn against you and will quickly destroy you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what you are to do to them: Break down their altars, smash their sacred stones, cut down their Asherah poles'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, wooden symbols of the goddess Asherah; here and elsewhere in Deuteronomy
      marker-yv: yv-n
    - type: text
      text: ' and burn their idols in the fire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you are a people holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has chosen you out of all the peoples on the face of the earth to be his people, his treasured possession.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did not set his affection on you and choose you because you were more numerous than other peoples, for you were the fewest of all peoples. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it was because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loved you and kept the oath he swore to your ancestors that he brought you out with a mighty hand and redeemed you from the land of slavery, from the power of Pharaoh king of Egypt. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Know therefore that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is God; he is the faithful God, keeping his covenant of love to a thousand generations of those who love him and keep his commandments. '
