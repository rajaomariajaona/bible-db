document_id: DEU.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Driving Out the Nations
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brings you into the land you are entering to possess and drives out before you many nations—the Hittites, Girgashites, Amorites, Canaanites, Perizzites, Hivites and Jebusites, seven nations larger and stronger than you— '
  '10':
  - type: text
    content: But
  - type: text
    content: those who hate him he will repay to their face by destruction;
  - type: text
    content: he will not be slow to repay to their face those who hate him.
  '11':
  - type: text
    content: Therefore, take care to follow the commands, decrees and laws I give you today.
  '12':
  - type: text
    content: 'If you pay attention to these laws and are careful to follow them, then the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will keep his covenant of love with you, as he swore to your ancestors. '
  '13':
  - type: text
    content: 'He will love you and bless you and increase your numbers. He will bless the fruit of your womb, the crops of your land—your grain, new wine and olive oil—the calves of your herds and the lambs of your flocks in the land he swore to your ancestors to give you. '
  '14':
  - type: text
    content: 'You will be blessed more than any other people; none of your men or women will be childless, nor will any of your livestock be without young. '
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will keep you free from every disease. He will not inflict on you the horrible diseases you knew in Egypt, but he will inflict them on all who hate you. '
  '16':
  - type: text
    content: 'You must destroy all the peoples the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives over to you. Do not look on them with pity and do not serve their gods, for that will be a snare to you.'
  '17':
  - type: text
    content: 'You may say to yourselves, “These nations are stronger than we are. How can we drive them out?” '
  '18':
  - type: text
    content: 'But do not be afraid of them; remember well what the '
  - type: text
    content: Lord
  - type: text
    content: ' your God did to Pharaoh and to all Egypt. '
  '19':
  - type: text
    content: 'You saw with your own eyes the great trials, the signs and wonders, the mighty hand and outstretched arm, with which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brought you out. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will do the same to all the peoples you now fear. '
  '2':
  - type: text
    content: 'and when the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has delivered them over to you and you have defeated them, then you must destroy them totally.'
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them; also in verse 26.
  - type: text
    content: ' Make no treaty with them, and show them no mercy. '
  '20':
  - type: text
    content: 'Moreover, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will send the hornet among them until even the survivors who hide from you have perished. '
  '21':
  - type: text
    content: 'Do not be terrified by them, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who is among you, is a great and awesome God. '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will drive out those nations before you, little by little. You will not be allowed to eliminate them all at once, or the wild animals will multiply around you. '
  '23':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will deliver them over to you, throwing them into great confusion until they are destroyed. '
  '24':
  - type: text
    content: 'He will give their kings into your hand, and you will wipe out their names from under heaven. No one will be able to stand up against you; you will destroy them. '
  '25':
  - type: text
    content: 'The images of their gods you are to burn in the fire. Do not covet the silver and gold on them, and do not take it for yourselves, or you will be ensnared by it, for it is detestable to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '26':
  - type: text
    content: Do not bring a detestable thing into your house or you, like it, will be set apart for destruction. Regard it as vile and utterly detest it, for it is set apart for destruction.
  '3':
  - type: text
    content: 'Do not intermarry with them. Do not give your daughters to their sons or take their daughters for your sons, '
  '4':
  - type: text
    content: 'for they will turn your children away from following me to serve other gods, and the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger will burn against you and will quickly destroy you. '
  '5':
  - type: text
    content: 'This is what you are to do to them: Break down their altars, smash their sacred stones, cut down their Asherah poles'
  - type: note
    content: That is, wooden symbols of the goddess Asherah; here and elsewhere in Deuteronomy
  - type: text
    content: ' and burn their idols in the fire. '
  '6':
  - type: text
    content: 'For you are a people holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God has chosen you out of all the peoples on the face of the earth to be his people, his treasured possession.'
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' did not set his affection on you and choose you because you were more numerous than other peoples, for you were the fewest of all peoples. '
  '8':
  - type: text
    content: 'But it was because the '
  - type: text
    content: Lord
  - type: text
    content: ' loved you and kept the oath he swore to your ancestors that he brought you out with a mighty hand and redeemed you from the land of slavery, from the power of Pharaoh king of Egypt. '
  '9':
  - type: text
    content: 'Know therefore that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is God; he is the faithful God, keeping his covenant of love to a thousand generations of those who love him and keep his commandments. '
