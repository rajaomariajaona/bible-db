document_id: MAT.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Magi Visit the Messiah
  - type: text
    content: After Jesus was born in Bethlehem in Judea, during the time of King Herod, Magi
  - type: note
    content: Traditionally wise men
  - type: text
    content: ' from the east came to Jerusalem '
  '10':
  - type: text
    content: 'When they saw the star, they were overjoyed. '
  '11':
  - type: text
    content: 'On coming to the house, they saw the child with his mother Mary, and they bowed down and worshiped him. Then they opened their treasures and presented him with gifts of gold, frankincense and myrrh. '
  '12':
  - type: text
    content: And having been warned in a dream not to go back to Herod, they returned to their country by another route.
  - type: heading
    content: The Escape to Egypt
  '13':
  - type: text
    content: When they had gone, an angel of the Lord appeared to Joseph in a dream. “Get up,” he said, “take the child and his mother and escape to Egypt. Stay there until I tell you, for Herod is going to search for the child to kill him.”
  '14':
  - type: text
    content: 'So he got up, took the child and his mother during the night and left for Egypt, '
  '15':
  - type: text
    content: 'where he stayed until the death of Herod. And so was fulfilled what the Lord had said through the prophet: “Out of Egypt I called my son.”'
  - type: note
    content: Hosea 11:1
  '16':
  - type: text
    content: 'When Herod realized that he had been outwitted by the Magi, he was furious, and he gave orders to kill all the boys in Bethlehem and its vicinity who were two years old and under, in accordance with the time he had learned from the Magi. '
  '17':
  - type: text
    content: 'Then what was said through the prophet Jeremiah was fulfilled:'
  '18':
  - type: text
    content: “A voice is heard in Ramah,
  - type: text
    content: weeping and great mourning,
  - type: text
    content: Rachel weeping for her children
  - type: text
    content: and refusing to be comforted,
  - type: text
    content: because they are no more.”
  - type: note
    content: Jer. 31:15
  - type: heading
    content: The Return to Nazareth
  '19':
  - type: text
    content: 'After Herod died, an angel of the Lord appeared in a dream to Joseph in Egypt '
  '2':
  - type: text
    content: and asked, “Where is the one who has been born king of the Jews? We saw his star when it rose and have come to worship him.”
  '20':
  - type: text
    content: and said, “Get up, take the child and his mother and go to the land of Israel, for those who were trying to take the child’s life are dead.”
  '21':
  - type: text
    content: 'So he got up, took the child and his mother and went to the land of Israel. '
  '22':
  - type: text
    content: 'But when he heard that Archelaus was reigning in Judea in place of his father Herod, he was afraid to go there. Having been warned in a dream, he withdrew to the district of Galilee, '
  '23':
  - type: text
    content: and he went and lived in a town called Nazareth. So was fulfilled what was said through the prophets, that he would be called a Nazarene.
  '3':
  - type: text
    content: 'When King Herod heard this he was disturbed, and all Jerusalem with him. '
  '4':
  - type: text
    content: 'When he had called together all the people’s chief priests and teachers of the law, he asked them where the Messiah was to be born. '
  '5':
  - type: text
    content: '“In Bethlehem in Judea,” they replied, “for this is what the prophet has written:'
  '6':
  - type: text
    content: “ ‘But you, Bethlehem, in the land of Judah,
  - type: text
    content: are by no means least among the rulers of Judah;
  - type: text
    content: for out of you will come a ruler
  - type: text
    content: who will shepherd my people Israel.’
  - type: note
    content: Micah 5:2,4
  - type: text
    content: ”
  '7':
  - type: text
    content: 'Then Herod called the Magi secretly and found out from them the exact time the star had appeared. '
  '8':
  - type: text
    content: He sent them to Bethlehem and said, “Go and search carefully for the child. As soon as you find him, report to me, so that I too may go and worship him.”
  '9':
  - type: text
    content: 'After they had heard the king, they went on their way, and the star they had seen when it rose went ahead of them until it stopped over the place where the child was. '
