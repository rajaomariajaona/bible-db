document_id: LEV.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Redeeming What Is the Lord’s
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'They must not exchange it or substitute a good one for a bad one, or a bad one for a good one; if they should substitute one animal for another, both it and the substitute become holy. '
  '11':
  - type: text
    content: 'If what they vowed is a ceremonially unclean animal—one that is not acceptable as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '—the animal must be presented to the priest, '
  '12':
  - type: text
    content: 'who will judge its quality as good or bad. Whatever value the priest then sets, that is what it will be. '
  '13':
  - type: text
    content: If the owner wishes to redeem the animal, a fifth must be added to its value.
  '14':
  - type: text
    content: '“ ‘If anyone dedicates their house as something holy to the '
  - type: text
    content: Lord
  - type: text
    content: ', the priest will judge its quality as good or bad. Whatever value the priest then sets, so it will remain. '
  '15':
  - type: text
    content: If the one who dedicates their house wishes to redeem it, they must add a fifth to its value, and the house will again become theirs.
  '16':
  - type: text
    content: '“ ‘If anyone dedicates to the '
  - type: text
    content: Lord
  - type: text
    content: ' part of their family land, its value is to be set according to the amount of seed required for it—fifty shekels of silver to a homer'
  - type: note
    content: That is, probably about 300 pounds or about 135 kilograms
  - type: text
    content: ' of barley seed. '
  '17':
  - type: text
    content: 'If they dedicate a field during the Year of Jubilee, the value that has been set remains. '
  '18':
  - type: text
    content: 'But if they dedicate a field after the Jubilee, the priest will determine the value according to the number of years that remain until the next Year of Jubilee, and its set value will be reduced. '
  '19':
  - type: text
    content: 'If the one who dedicates the field wishes to redeem it, they must add a fifth to its value, and the field will again become theirs. '
  '2':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘If anyone makes a special vow to dedicate a person to the '
  - type: text
    content: Lord
  - type: text
    content: ' by giving the equivalent value, '
  '20':
  - type: text
    content: 'If, however, they do not redeem the field, or if they have sold it to someone else, it can never be redeemed. '
  '21':
  - type: text
    content: 'When the field is released in the Jubilee, it will become holy, like a field devoted to the '
  - type: text
    content: Lord
  - type: text
    content: ; it will become priestly property.
  '22':
  - type: text
    content: '“ ‘If anyone dedicates to the '
  - type: text
    content: Lord
  - type: text
    content: ' a field they have bought, which is not part of their family land, '
  '23':
  - type: text
    content: 'the priest will determine its value up to the Year of Jubilee, and the owner must pay its value on that day as something holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'In the Year of Jubilee the field will revert to the person from whom it was bought, the one whose land it was. '
  '25':
  - type: text
    content: Every value is to be set according to the sanctuary shekel, twenty gerahs to the shekel.
  '26':
  - type: text
    content: '“ ‘No one, however, may dedicate the firstborn of an animal, since the firstborn already belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ; whether an ox
  - type: note
    content: The Hebrew word can refer to either male or female.
  - type: text
    content: ' or a sheep, it is the '
  - type: text
    content: Lord
  - type: text
    content: '’s. '
  '27':
  - type: text
    content: If it is one of the unclean animals, it may be bought back at its set value, adding a fifth of the value to it. If it is not redeemed, it is to be sold at its set value.
  '28':
  - type: text
    content: “ ‘But nothing that a person owns and devotes
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord.
  - type: text
    content: ' to the '
  - type: text
    content: Lord
  - type: text
    content: '—whether a human being or an animal or family land—may be sold or redeemed; everything so devoted is most holy to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '29':
  - type: text
    content: “ ‘No person devoted to destruction
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' may be ransomed; they are to be put to death.'
  '3':
  - type: text
    content: set the value of a male between the ages of twenty and sixty at fifty shekels
  - type: note
    content: That is, about 1 1/4 pounds or about 575 grams; also in verse 16
  - type: text
    content: ' of silver, according to the sanctuary shekel'
  - type: note
    content: That is, about 2/5 ounce or about 12 grams; also in verse 25
  - type: text
    content: '; '
  '30':
  - type: text
    content: '“ ‘A tithe of everything from the land, whether grain from the soil or fruit from the trees, belongs to the '
  - type: text
    content: Lord
  - type: text
    content: '; it is holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Whoever would redeem any of their tithe must add a fifth of the value to it. '
  '32':
  - type: text
    content: 'Every tithe of the herd and flock—every tenth animal that passes under the shepherd’s rod—will be holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '33':
  - type: text
    content: No one may pick out the good from the bad or make any substitution. If anyone does make a substitution, both the animal and its substitute become holy and cannot be redeemed.’ ”
  '34':
  - type: text
    content: 'These are the commands the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Moses at Mount Sinai for the Israelites.'
  '4':
  - type: text
    content: for a female, set her value at thirty shekels
  - type: note
    content: That is, about 12 ounces or about 345 grams
  - type: text
    content: '; '
  '5':
  - type: text
    content: for a person between the ages of five and twenty, set the value of a male at twenty shekels
  - type: note
    content: That is, about 8 ounces or about 230 grams
  - type: text
    content: ' and of a female at ten shekels'
  - type: note
    content: That is, about 4 ounces or about 115 grams; also in verse 7
  - type: text
    content: '; '
  '6':
  - type: text
    content: for a person between one month and five years, set the value of a male at five shekels
  - type: note
    content: That is, about 2 ounces or about 58 grams
  - type: text
    content: ' of silver and that of a female at three shekels'
  - type: note
    content: That is, about 1 1/4 ounces or about 35 grams
  - type: text
    content: ' of silver; '
  '7':
  - type: text
    content: for a person sixty years old or more, set the value of a male at fifteen shekels
  - type: note
    content: That is, about 6 ounces or about 175 grams
  - type: text
    content: ' and of a female at ten shekels. '
  '8':
  - type: text
    content: If anyone making the vow is too poor to pay the specified amount, the person being dedicated is to be presented to the priest, who will set the value according to what the one making the vow can afford.
  '9':
  - type: text
    content: '“ ‘If what they vowed is an animal that is acceptable as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', such an animal given to the '
  - type: text
    content: Lord
  - type: text
    content: ' becomes holy. '
