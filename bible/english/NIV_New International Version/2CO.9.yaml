document_id: 2CO.9,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'There is no need for me to write to you about this service to the Lord’s people. '
  '10':
  - type: text
    content: 'Now he who supplies seed to the sower and bread for food will also supply and increase your store of seed and will enlarge the harvest of your righteousness. '
  '11':
  - type: text
    content: You will be enriched in every way so that you can be generous on every occasion, and through us your generosity will result in thanksgiving to God.
  '12':
  - type: text
    content: 'This service that you perform is not only supplying the needs of the Lord’s people but is also overflowing in many expressions of thanks to God. '
  '13':
  - type: text
    content: 'Because of the service by which you have proved yourselves, others will praise God for the obedience that accompanies your confession of the gospel of Christ, and for your generosity in sharing with them and with everyone else. '
  '14':
  - type: text
    content: 'And in their prayers for you their hearts will go out to you, because of the surpassing grace God has given you. '
  '15':
  - type: text
    content: Thanks be to God for his indescribable gift!
  '2':
  - type: text
    content: 'For I know your eagerness to help, and I have been boasting about it to the Macedonians, telling them that since last year you in Achaia were ready to give; and your enthusiasm has stirred most of them to action. '
  '3':
  - type: text
    content: 'But I am sending the brothers in order that our boasting about you in this matter should not prove hollow, but that you may be ready, as I said you would be. '
  '4':
  - type: text
    content: 'For if any Macedonians come with me and find you unprepared, we—not to say anything about you—would be ashamed of having been so confident. '
  '5':
  - type: text
    content: So I thought it necessary to urge the brothers to visit you in advance and finish the arrangements for the generous gift you had promised. Then it will be ready as a generous gift, not as one grudgingly given.
  - type: heading
    content: Generosity Encouraged
  '6':
  - type: text
    content: 'Remember this: Whoever sows sparingly will also reap sparingly, and whoever sows generously will also reap generously. '
  '7':
  - type: text
    content: 'Each of you should give what you have decided in your heart to give, not reluctantly or under compulsion, for God loves a cheerful giver. '
  '8':
  - type: text
    content: 'And God is able to bless you abundantly, so that in all things at all times, having all that you need, you will abound in every good work. '
  '9':
  - type: text
    content: 'As it is written:'
  - type: text
    content: “They have freely scattered their gifts to the poor;
  - type: text
    content: their righteousness endures forever.”
  - type: note
    content: Psalm 112:9
