document_id: PSA.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 2
  - type: text
    content: Why do the nations conspire
  - type: note
    content: Hebrew; Septuagint rage
  - type: text
    content: and the peoples plot in vain?
  '10':
  - type: text
    content: Therefore, you kings, be wise;
  - type: text
    content: be warned, you rulers of the earth.
  '11':
  - type: text
    content: 'Serve the '
  - type: text
    content: Lord
  - type: text
    content: ' with fear'
  - type: text
    content: and celebrate his rule with trembling.
  '12':
  - type: text
    content: Kiss his son, or he will be angry
  - type: text
    content: and your way will lead to your destruction,
  - type: text
    content: for his wrath can flare up in a moment.
  - type: text
    content: Blessed are all who take refuge in him.
  '2':
  - type: text
    content: The kings of the earth rise up
  - type: text
    content: and the rulers band together
  - type: text
    content: 'against the '
  - type: text
    content: Lord
  - type: text
    content: ' and against his anointed, saying,'
  '3':
  - type: text
    content: “Let us break their chains
  - type: text
    content: and throw off their shackles.”
  '4':
  - type: text
    content: The One enthroned in heaven laughs;
  - type: text
    content: the Lord scoffs at them.
  '5':
  - type: text
    content: He rebukes them in his anger
  - type: text
    content: and terrifies them in his wrath, saying,
  '6':
  - type: text
    content: “I have installed my king
  - type: text
    content: on Zion, my holy mountain.”
  '7':
  - type: text
    content: 'I will proclaim the '
  - type: text
    content: Lord
  - type: text
    content: '’s decree:'
  - type: text
    content: He said to me, “You are my son;
  - type: text
    content: today I have become your father.
  '8':
  - type: text
    content: Ask me,
  - type: text
    content: and I will make the nations your inheritance,
  - type: text
    content: the ends of the earth your possession.
  '9':
  - type: text
    content: You will break them with a rod of iron
  - type: note
    content: Or will rule them with an iron scepter (see Septuagint and Syriac)
  - type: text
    content: ;
  - type: text
    content: you will dash them to pieces like pottery.”
