document_id: PSA.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 2
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do the nations conspire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rage
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the peoples plot in vain?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, you kings, be wise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be warned, you rulers of the earth.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with fear'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and celebrate his rule with trembling.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kiss his son, or he will be angry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your way will lead to your destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for his wrath can flare up in a moment.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Blessed are all who take refuge in him.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The kings of the earth rise up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the rulers band together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and against his anointed, saying,'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let us break their chains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and throw off their shackles.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The One enthroned in heaven laughs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Lord scoffs at them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rebukes them in his anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and terrifies them in his wrath, saying,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have installed my king
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on Zion, my holy mountain.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will proclaim the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s decree:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He said to me, “You are my son;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: today I have become your father.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ask me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will make the nations your inheritance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the ends of the earth your possession.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will break them with a rod of iron
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'will rule them with an iron scepter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see Septuagint and Syriac)
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will dash them to pieces like pottery.”
