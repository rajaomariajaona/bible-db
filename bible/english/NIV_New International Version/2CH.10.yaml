document_id: 2CH.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Rebels Against Rehoboam
  - type: text
    content: 'Rehoboam went to Shechem, for all Israel had gone there to make him king. '
  '10':
  - type: text
    content: 'The young men who had grown up with him replied, “The people have said to you, ‘Your father put a heavy yoke on us, but make our yoke lighter.’ Now tell them, ‘My little finger is thicker than my father’s waist. '
  '11':
  - type: text
    content: My father laid on you a heavy yoke; I will make it even heavier. My father scourged you with whips; I will scourge you with scorpions.’ ”
  '12':
  - type: text
    content: 'Three days later Jeroboam and all the people returned to Rehoboam, as the king had said, “Come back to me in three days.” '
  '13':
  - type: text
    content: 'The king answered them harshly. Rejecting the advice of the elders, '
  '14':
  - type: text
    content: 'he followed the advice of the young men and said, “My father made your yoke heavy; I will make it even heavier. My father scourged you with whips; I will scourge you with scorpions.” '
  '15':
  - type: text
    content: 'So the king did not listen to the people, for this turn of events was from God, to fulfill the word the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken to Jeroboam son of Nebat through Ahijah the Shilonite.'
  '16':
  - type: text
    content: 'When all Israel saw that the king refused to listen to them, they answered the king:'
  - type: text
    content: “What share do we have in David,
  - type: text
    content: what part in Jesse’s son?
  - type: text
    content: To your tents, Israel!
  - type: text
    content: Look after your own house, David!”
  - type: text
    content: 'So all the Israelites went home. '
  '17':
  - type: text
    content: But as for the Israelites who were living in the towns of Judah, Rehoboam still ruled over them.
  '18':
  - type: text
    content: King Rehoboam sent out Adoniram,
  - type: note
    content: Hebrew Hadoram, a variant of Adoniram
  - type: text
    content: ' who was in charge of forced labor, but the Israelites stoned him to death. King Rehoboam, however, managed to get into his chariot and escape to Jerusalem. '
  '19':
  - type: text
    content: So Israel has been in rebellion against the house of David to this day.
  '2':
  - type: text
    content: 'When Jeroboam son of Nebat heard this (he was in Egypt, where he had fled from King Solomon), he returned from Egypt. '
  '3':
  - type: text
    content: 'So they sent for Jeroboam, and he and all Israel went to Rehoboam and said to him: '
  '4':
  - type: text
    content: “Your father put a heavy yoke on us, but now lighten the harsh labor and the heavy yoke he put on us, and we will serve you.”
  '5':
  - type: text
    content: Rehoboam answered, “Come back to me in three days.” So the people went away.
  '6':
  - type: text
    content: Then King Rehoboam consulted the elders who had served his father Solomon during his lifetime. “How would you advise me to answer these people?” he asked.
  '7':
  - type: text
    content: They replied, “If you will be kind to these people and please them and give them a favorable answer, they will always be your servants.”
  '8':
  - type: text
    content: 'But Rehoboam rejected the advice the elders gave him and consulted the young men who had grown up with him and were serving him. '
  '9':
  - type: text
    content: He asked them, “What is your advice? How should we answer these people who say to me, ‘Lighten the yoke your father put on us’?”
