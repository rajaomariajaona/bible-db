document_id: PSA.105,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 105
  - type: text
    content: 'Give praise to the '
  - type: text
    content: Lord
  - type: text
    content: ', proclaim his name;'
  - type: text
    content: make known among the nations what he has done.
  '10':
  - type: text
    content: He confirmed it to Jacob as a decree,
  - type: text
    content: 'to Israel as an everlasting covenant:'
  '11':
  - type: text
    content: “To you I will give the land of Canaan
  - type: text
    content: as the portion you will inherit.”
  '12':
  - type: text
    content: When they were but few in number,
  - type: text
    content: few indeed, and strangers in it,
  '13':
  - type: text
    content: they wandered from nation to nation,
  - type: text
    content: from one kingdom to another.
  '14':
  - type: text
    content: He allowed no one to oppress them;
  - type: text
    content: 'for their sake he rebuked kings:'
  '15':
  - type: text
    content: “Do not touch my anointed ones;
  - type: text
    content: do my prophets no harm.”
  '16':
  - type: text
    content: He called down famine on the land
  - type: text
    content: and destroyed all their supplies of food;
  '17':
  - type: text
    content: and he sent a man before them—
  - type: text
    content: Joseph, sold as a slave.
  '18':
  - type: text
    content: They bruised his feet with shackles,
  - type: text
    content: his neck was put in irons,
  '19':
  - type: text
    content: till what he foretold came to pass,
  - type: text
    content: 'till the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' proved him true.'
  '2':
  - type: text
    content: Sing to him, sing praise to him;
  - type: text
    content: tell of all his wonderful acts.
  '20':
  - type: text
    content: The king sent and released him,
  - type: text
    content: the ruler of peoples set him free.
  '21':
  - type: text
    content: He made him master of his household,
  - type: text
    content: ruler over all he possessed,
  '22':
  - type: text
    content: to instruct his princes as he pleased
  - type: text
    content: and teach his elders wisdom.
  '23':
  - type: text
    content: Then Israel entered Egypt;
  - type: text
    content: Jacob resided as a foreigner in the land of Ham.
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' made his people very fruitful;'
  - type: text
    content: he made them too numerous for their foes,
  '25':
  - type: text
    content: whose hearts he turned to hate his people,
  - type: text
    content: to conspire against his servants.
  '26':
  - type: text
    content: He sent Moses his servant,
  - type: text
    content: and Aaron, whom he had chosen.
  '27':
  - type: text
    content: They performed his signs among them,
  - type: text
    content: his wonders in the land of Ham.
  '28':
  - type: text
    content: He sent darkness and made the land dark—
  - type: text
    content: for had they not rebelled against his words?
  '29':
  - type: text
    content: He turned their waters into blood,
  - type: text
    content: causing their fish to die.
  '3':
  - type: text
    content: Glory in his holy name;
  - type: text
    content: 'let the hearts of those who seek the '
  - type: text
    content: Lord
  - type: text
    content: ' rejoice.'
  '30':
  - type: text
    content: Their land teemed with frogs,
  - type: text
    content: which went up into the bedrooms of their rulers.
  '31':
  - type: text
    content: He spoke, and there came swarms of flies,
  - type: text
    content: and gnats throughout their country.
  '32':
  - type: text
    content: He turned their rain into hail,
  - type: text
    content: with lightning throughout their land;
  '33':
  - type: text
    content: he struck down their vines and fig trees
  - type: text
    content: and shattered the trees of their country.
  '34':
  - type: text
    content: He spoke, and the locusts came,
  - type: text
    content: grasshoppers without number;
  '35':
  - type: text
    content: they ate up every green thing in their land,
  - type: text
    content: ate up the produce of their soil.
  '36':
  - type: text
    content: Then he struck down all the firstborn in their land,
  - type: text
    content: the firstfruits of all their manhood.
  '37':
  - type: text
    content: He brought out Israel, laden with silver and gold,
  - type: text
    content: and from among their tribes no one faltered.
  '38':
  - type: text
    content: Egypt was glad when they left,
  - type: text
    content: because dread of Israel had fallen on them.
  '39':
  - type: text
    content: He spread out a cloud as a covering,
  - type: text
    content: and a fire to give light at night.
  '4':
  - type: text
    content: 'Look to the '
  - type: text
    content: Lord
  - type: text
    content: ' and his strength;'
  - type: text
    content: seek his face always.
  '40':
  - type: text
    content: They asked, and he brought them quail;
  - type: text
    content: he fed them well with the bread of heaven.
  '41':
  - type: text
    content: He opened the rock, and water gushed out;
  - type: text
    content: it flowed like a river in the desert.
  '42':
  - type: text
    content: For he remembered his holy promise
  - type: text
    content: given to his servant Abraham.
  '43':
  - type: text
    content: He brought out his people with rejoicing,
  - type: text
    content: his chosen ones with shouts of joy;
  '44':
  - type: text
    content: he gave them the lands of the nations,
  - type: text
    content: and they fell heir to what others had toiled for—
  '45':
  - type: text
    content: that they might keep his precepts
  - type: text
    content: and observe his laws.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew Hallelu Yah
  '5':
  - type: text
    content: Remember the wonders he has done,
  - type: text
    content: his miracles, and the judgments he pronounced,
  '6':
  - type: text
    content: you his servants, the descendants of Abraham,
  - type: text
    content: his chosen ones, the children of Jacob.
  '7':
  - type: text
    content: 'He is the '
  - type: text
    content: Lord
  - type: text
    content: ' our God;'
  - type: text
    content: his judgments are in all the earth.
  '8':
  - type: text
    content: He remembers his covenant forever,
  - type: text
    content: the promise he made, for a thousand generations,
  '9':
  - type: text
    content: the covenant he made with Abraham,
  - type: text
    content: the oath he swore to Isaac.
