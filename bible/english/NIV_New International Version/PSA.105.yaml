document_id: PSA.105
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 105
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Give praise to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', proclaim his name;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: make known among the nations what he has done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sing to him, sing praise to him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: tell of all his wonderful acts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Glory in his holy name;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'let the hearts of those who seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rejoice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Look to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and his strength;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: seek his face always.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Remember the wonders he has done,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his miracles, and the judgments he pronounced,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: you his servants, the descendants of Abraham,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his chosen ones, the children of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: his judgments are in all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He remembers his covenant forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the promise he made, for a thousand generations,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: the covenant he made with Abraham,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the oath he swore to Isaac.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He confirmed it to Jacob as a decree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to Israel as an everlasting covenant:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “To you I will give the land of Canaan
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the portion you will inherit.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When they were but few in number,
- type: usfm
  marker: q2
  children:
  - type: text
    text: few indeed, and strangers in it,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: they wandered from nation to nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from one kingdom to another.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He allowed no one to oppress them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for their sake he rebuked kings:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Do not touch my anointed ones;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do my prophets no harm.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He called down famine on the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroyed all their supplies of food;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: and he sent a man before them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: Joseph, sold as a slave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They bruised his feet with shackles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his neck was put in irons,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: till what he foretold came to pass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'till the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' proved him true.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The king sent and released him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ruler of peoples set him free.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: He made him master of his household,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ruler over all he possessed,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: to instruct his princes as he pleased
- type: usfm
  marker: q2
  children:
  - type: text
    text: and teach his elders wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Israel entered Egypt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jacob resided as a foreigner in the land of Ham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made his people very fruitful;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he made them too numerous for their foes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: whose hearts he turned to hate his people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to conspire against his servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He sent Moses his servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Aaron, whom he had chosen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They performed his signs among them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his wonders in the land of Ham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: He sent darkness and made the land dark—
- type: usfm
  marker: q2
  children:
  - type: text
    text: for had they not rebelled against his words?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He turned their waters into blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: causing their fish to die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Their land teemed with frogs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which went up into the bedrooms of their rulers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He spoke, and there came swarms of flies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gnats throughout their country.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: He turned their rain into hail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with lightning throughout their land;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: he struck down their vines and fig trees
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shattered the trees of their country.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He spoke, and the locusts came,
- type: usfm
  marker: q2
  children:
  - type: text
    text: grasshoppers without number;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: they ate up every green thing in their land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ate up the produce of their soil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Then he struck down all the firstborn in their land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the firstfruits of all their manhood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: He brought out Israel, laden with silver and gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from among their tribes no one faltered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Egypt was glad when they left,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because dread of Israel had fallen on them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: He spread out a cloud as a covering,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a fire to give light at night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: They asked, and he brought them quail;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he fed them well with the bread of heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: He opened the rock, and water gushed out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it flowed like a river in the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: For he remembered his holy promise
- type: usfm
  marker: q2
  children:
  - type: text
    text: given to his servant Abraham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: He brought out his people with rejoicing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his chosen ones with shouts of joy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: he gave them the lands of the nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they fell heir to what others had toiled for—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: that they might keep his precepts
- type: usfm
  marker: q2
  children:
  - type: text
    text: and observe his laws.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105:45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hallelu Yah
    marker-yv: yv-n
