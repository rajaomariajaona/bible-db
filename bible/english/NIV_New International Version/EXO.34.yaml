document_id: EXO.34,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The New Stone Tablets
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Chisel out two stone tablets like the first ones, and I will write on them the words that were on the first tablets, which you broke. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said: “I am making a covenant with you. Before all your people I will do wonders never before done in any nation in all the world. The people you live among will see how awesome is the work that I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will do for you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Obey what I command you today. I will drive out before you the Amorites, Canaanites, Hittites, Perizzites, Hivites and Jebusites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be careful not to make a treaty with those who live in the land where you are going, or they will be a snare among you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Break down their altars, smash their sacred stones and cut down their Asherah poles.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, wooden symbols of the goddess Asherah
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not worship any other god, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', whose name is Jealous, is a jealous God.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Be careful not to make a treaty with those who live in the land; for when they prostitute themselves to their gods and sacrifice to them, they will invite you and you will eat their sacrifices. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when you choose some of their daughters as wives for your sons and those daughters prostitute themselves to their gods, they will lead your sons to do the same.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not make any idols.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Celebrate the Festival of Unleavened Bread. For seven days eat bread made without yeast, as I commanded you. Do this at the appointed time in the month of Aviv, for in that month you came out of Egypt.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The first offspring of every womb belongs to me, including all the firstborn males of your livestock, whether from herd or flock. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be ready in the morning, and then come up on Mount Sinai. Present yourself to me there on top of the mountain. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Redeem the firstborn donkey with a lamb, but if you do not redeem it, break its neck. Redeem all your firstborn sons.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No one is to appear before me empty-handed.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Six days you shall labor, but on the seventh day you shall rest; even during the plowing season and harvest you must rest.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Celebrate the Festival of Weeks with the firstfruits of the wheat harvest, and the Festival of Ingathering at the turn of the year.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, in the autumn
      marker-yv: yv-n
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Three times a year all your men are to appear before the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will drive out nations before you and enlarge your territory, and no one will covet your land when you go up three times each year to appear before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not offer the blood of a sacrifice to me along with anything containing yeast, and do not let any of the sacrifice from the Passover Festival remain until morning.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Bring the best of the firstfruits of your soil to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not cook a young goat in its mother’s milk.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Write down these words, for in accordance with these words I have made a covenant with you and with Israel.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses was there with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forty days and forty nights without eating bread or drinking water. And he wrote on the tablets the words of the covenant—the Ten Commandments.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Radiant Face of Moses
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Moses came down from Mount Sinai with the two tablets of the covenant law in his hands, he was not aware that his face was radiant because he had spoken with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No one is to come with you or be seen anywhere on the mountain; not even the flocks and herds may graze in front of the mountain.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Aaron and all the Israelites saw Moses, his face was radiant, and they were afraid to come near him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Moses called to them; so Aaron and all the leaders of the community came back to him, and he spoke to them. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward all the Israelites came near him, and he gave them all the commands the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given him on Mount Sinai.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Moses finished speaking to them, he put a veil over his face. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But whenever he entered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s presence to speak with him, he removed the veil until he came out. And when he came out and told the Israelites what he had been commanded, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they saw that his face was radiant. Then Moses would put the veil back over his face until he went in to speak with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses chiseled out two stone tablets like the first ones and went up Mount Sinai early in the morning, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded him; and he carried the two stone tablets in his hands. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came down in the cloud and stood there with him and proclaimed his name, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he passed in front of Moses, proclaiming, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the compassionate and gracious God, slow to anger, abounding in love and faithfulness, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: maintaining love to thousands, and forgiving wickedness, rebellion and sin. Yet he does not leave the guilty unpunished; he punishes the children and their children for the sin of the parents to the third and fourth generation.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses bowed to the ground at once and worshiped. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Lord,” he said, “if I have found favor in your eyes, then let the Lord go with us. Although this is a stiff-necked people, forgive our wickedness and our sin, and take us as your inheritance.”
