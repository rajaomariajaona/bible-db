document_id: 1KI.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Abijah King of Judah
  - type: text
    content: In the eighteenth year of the reign of Jeroboam son of Nebat, Abijah
  - type: note
    content: Some Hebrew manuscripts and Septuagint (see also 2 Chron. 12:16); most Hebrew manuscripts Abijam; also in verses 7 and 8
  - type: text
    content: ' became king of Judah, '
  '10':
  - type: text
    content: and he reigned in Jerusalem forty-one years. His grandmother’s name was Maakah daughter of Abishalom.
  '11':
  - type: text
    content: 'Asa did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', as his father David had done. '
  '12':
  - type: text
    content: 'He expelled the male shrine prostitutes from the land and got rid of all the idols his ancestors had made. '
  '13':
  - type: text
    content: 'He even deposed his grandmother Maakah from her position as queen mother, because she had made a repulsive image for the worship of Asherah. Asa cut it down and burned it in the Kidron Valley. '
  '14':
  - type: text
    content: 'Although he did not remove the high places, Asa’s heart was fully committed to the '
  - type: text
    content: Lord
  - type: text
    content: ' all his life. '
  '15':
  - type: text
    content: 'He brought into the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' the silver and gold and the articles that he and his father had dedicated.'
  '16':
  - type: text
    content: 'There was war between Asa and Baasha king of Israel throughout their reigns. '
  '17':
  - type: text
    content: Baasha king of Israel went up against Judah and fortified Ramah to prevent anyone from leaving or entering the territory of Asa king of Judah.
  '18':
  - type: text
    content: 'Asa then took all the silver and gold that was left in the treasuries of the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple and of his own palace. He entrusted it to his officials and sent them to Ben-Hadad son of Tabrimmon, the son of Hezion, the king of Aram, who was ruling in Damascus. '
  '19':
  - type: text
    content: “Let there be a treaty between me and you,” he said, “as there was between my father and your father. See, I am sending you a gift of silver and gold. Now break your treaty with Baasha king of Israel so he will withdraw from me.”
  '2':
  - type: text
    content: and he reigned in Jerusalem three years. His mother’s name was Maakah daughter of Abishalom.
  - type: note
    content: A variant of Absalom; also in verse 10
  '20':
  - type: text
    content: 'Ben-Hadad agreed with King Asa and sent the commanders of his forces against the towns of Israel. He conquered Ijon, Dan, Abel Beth Maakah and all Kinnereth in addition to Naphtali. '
  '21':
  - type: text
    content: 'When Baasha heard this, he stopped building Ramah and withdrew to Tirzah. '
  '22':
  - type: text
    content: Then King Asa issued an order to all Judah—no one was exempt—and they carried away from Ramah the stones and timber Baasha had been using there. With them King Asa built up Geba in Benjamin, and also Mizpah.
  '23':
  - type: text
    content: 'As for all the other events of Asa’s reign, all his achievements, all he did and the cities he built, are they not written in the book of the annals of the kings of Judah? In his old age, however, his feet became diseased. '
  '24':
  - type: text
    content: Then Asa rested with his ancestors and was buried with them in the city of his father David. And Jehoshaphat his son succeeded him as king.
  - type: heading
    content: Nadab King of Israel
  '25':
  - type: text
    content: 'Nadab son of Jeroboam became king of Israel in the second year of Asa king of Judah, and he reigned over Israel two years. '
  '26':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', following the ways of his father and committing the same sin his father had caused Israel to commit.'
  '27':
  - type: text
    content: 'Baasha son of Ahijah from the tribe of Issachar plotted against him, and he struck him down at Gibbethon, a Philistine town, while Nadab and all Israel were besieging it. '
  '28':
  - type: text
    content: Baasha killed Nadab in the third year of Asa king of Judah and succeeded him as king.
  '29':
  - type: text
    content: 'As soon as he began to reign, he killed Jeroboam’s whole family. He did not leave Jeroboam anyone that breathed, but destroyed them all, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' given through his servant Ahijah the Shilonite. '
  '3':
  - type: text
    content: 'He committed all the sins his father had done before him; his heart was not fully devoted to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, as the heart of David his forefather had been. '
  '30':
  - type: text
    content: 'This happened because of the sins Jeroboam had committed and had caused Israel to commit, and because he aroused the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  '31':
  - type: text
    content: 'As for the other events of Nadab’s reign, and all he did, are they not written in the book of the annals of the kings of Israel? '
  '32':
  - type: text
    content: There was war between Asa and Baasha king of Israel throughout their reigns.
  - type: heading
    content: Baasha King of Israel
  '33':
  - type: text
    content: 'In the third year of Asa king of Judah, Baasha son of Ahijah became king of all Israel in Tirzah, and he reigned twenty-four years. '
  '34':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', following the ways of Jeroboam and committing the same sin Jeroboam had caused Israel to commit.'
  '4':
  - type: text
    content: 'Nevertheless, for David’s sake the '
  - type: text
    content: Lord
  - type: text
    content: ' his God gave him a lamp in Jerusalem by raising up a son to succeed him and by making Jerusalem strong. '
  '5':
  - type: text
    content: 'For David had done what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' and had not failed to keep any of the '
  - type: text
    content: Lord
  - type: text
    content: ’s commands all the days of his life—except in the case of Uriah the Hittite.
  '6':
  - type: text
    content: There was war between Abijah
  - type: note
    content: Some Hebrew manuscripts and Syriac Abijam (that is, Abijah); most Hebrew manuscripts Rehoboam
  - type: text
    content: ' and Jeroboam throughout Abijah’s lifetime. '
  '7':
  - type: text
    content: 'As for the other events of Abijah’s reign, and all he did, are they not written in the book of the annals of the kings of Judah? There was war between Abijah and Jeroboam. '
  '8':
  - type: text
    content: And Abijah rested with his ancestors and was buried in the City of David. And Asa his son succeeded him as king.
  - type: heading
    content: Asa King of Judah
  '9':
  - type: text
    content: 'In the twentieth year of Jeroboam king of Israel, Asa became king of Judah, '
