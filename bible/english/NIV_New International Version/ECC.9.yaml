document_id: ECC.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Common Destiny for All
  - type: text
    content: 'So I reflected on all this and concluded that the righteous and the wise and what they do are in God’s hands, but no one knows whether love or hate awaits them. '
  '10':
  - type: text
    content: Whatever your hand finds to do, do it with all your might, for in the realm of the dead, where you are going, there is neither working nor planning nor knowledge nor wisdom.
  '11':
  - type: text
    content: 'I have seen something else under the sun:'
  - type: text
    content: The race is not to the swift
  - type: text
    content: or the battle to the strong,
  - type: text
    content: nor does food come to the wise
  - type: text
    content: or wealth to the brilliant
  - type: text
    content: or favor to the learned;
  - type: text
    content: but time and chance happen to them all.
  '12':
  - type: text
    content: 'Moreover, no one knows when their hour will come:'
  - type: text
    content: As fish are caught in a cruel net,
  - type: text
    content: or birds are taken in a snare,
  - type: text
    content: so people are trapped by evil times
  - type: text
    content: that fall unexpectedly upon them.
  - type: heading
    content: Wisdom Better Than Folly
  '13':
  - type: text
    content: 'I also saw under the sun this example of wisdom that greatly impressed me: '
  '14':
  - type: text
    content: 'There was once a small city with only a few people in it. And a powerful king came against it, surrounded it and built huge siege works against it. '
  '15':
  - type: text
    content: 'Now there lived in that city a man poor but wise, and he saved the city by his wisdom. But nobody remembered that poor man. '
  '16':
  - type: text
    content: So I said, “Wisdom is better than strength.” But the poor man’s wisdom is despised, and his words are no longer heeded.
  '17':
  - type: text
    content: The quiet words of the wise are more to be heeded
  - type: text
    content: than the shouts of a ruler of fools.
  '18':
  - type: text
    content: Wisdom is better than weapons of war,
  - type: text
    content: but one sinner destroys much good.
  '2':
  - type: text
    content: All share a common destiny—the righteous and the wicked, the good and the bad,
  - type: note
    content: Septuagint (Aquila), Vulgate and Syriac; Hebrew does not have and the bad.
  - type: text
    content: ' the clean and the unclean, those who offer sacrifices and those who do not.'
  - type: text
    content: As it is with the good,
  - type: text
    content: so with the sinful;
  - type: text
    content: as it is with those who take oaths,
  - type: text
    content: so with those who are afraid to take them.
  '3':
  - type: text
    content: 'This is the evil in everything that happens under the sun: The same destiny overtakes all. The hearts of people, moreover, are full of evil and there is madness in their hearts while they live, and afterward they join the dead. '
  '4':
  - type: text
    content: Anyone who is among the living has hope
  - type: note
    content: Or What then is to be chosen? With all who live, there is hope
  - type: text
    content: —even a live dog is better off than a dead lion!
  '5':
  - type: text
    content: For the living know that they will die,
  - type: text
    content: but the dead know nothing;
  - type: text
    content: they have no further reward,
  - type: text
    content: and even their name is forgotten.
  '6':
  - type: text
    content: Their love, their hate
  - type: text
    content: and their jealousy have long since vanished;
  - type: text
    content: never again will they have a part
  - type: text
    content: in anything that happens under the sun.
  '7':
  - type: text
    content: 'Go, eat your food with gladness, and drink your wine with a joyful heart, for God has already approved what you do. '
  '8':
  - type: text
    content: 'Always be clothed in white, and always anoint your head with oil. '
  '9':
  - type: text
    content: 'Enjoy life with your wife, whom you love, all the days of this meaningless life that God has given you under the sun—all your meaningless days. For this is your lot in life and in your toilsome labor under the sun. '
