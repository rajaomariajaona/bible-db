document_id: ECC.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Common Destiny for All
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'So I reflected on all this and concluded that the righteous and the wise and what they do are in God’s hands, but no one knows whether love or hate awaits them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Whatever your hand finds to do, do it with all your might, for in the realm of the dead, where you are going, there is neither working nor planning nor knowledge nor wisdom.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I have seen something else under the sun:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The race is not to the swift
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the battle to the strong,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor does food come to the wise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or wealth to the brilliant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or favor to the learned;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but time and chance happen to them all.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Moreover, no one knows when their hour will come:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As fish are caught in a cruel net,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or birds are taken in a snare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so people are trapped by evil times
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that fall unexpectedly upon them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom Better Than Folly
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I also saw under the sun this example of wisdom that greatly impressed me: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'There was once a small city with only a few people in it. And a powerful king came against it, surrounded it and built huge siege works against it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Now there lived in that city a man poor but wise, and he saved the city by his wisdom. But nobody remembered that poor man. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So I said, “Wisdom is better than strength.” But the poor man’s wisdom is despised, and his words are no longer heeded.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The quiet words of the wise are more to be heeded
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the shouts of a ruler of fools.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Wisdom is better than weapons of war,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but one sinner destroys much good.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: All share a common destiny—the righteous and the wicked, the good and the bad,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint (Aquila), Vulgate and Syriac; Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: and the bad
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' the clean and the unclean, those who offer sacrifices and those who do not.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As it is with the good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so with the sinful;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as it is with those who take oaths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so with those who are afraid to take them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'This is the evil in everything that happens under the sun: The same destiny overtakes all. The hearts of people, moreover, are full of evil and there is madness in their hearts while they live, and afterward they join the dead. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Anyone who is among the living has hope
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: What then is to be chosen? With all who live, there is hope
      marker-yv: yv-n
    - type: text
      text: —even a live dog is better off than a dead lion!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For the living know that they will die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the dead know nothing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they have no further reward,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and even their name is forgotten.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Their love, their hate
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their jealousy have long since vanished;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: never again will they have a part
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in anything that happens under the sun.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Go, eat your food with gladness, and drink your wine with a joyful heart, for God has already approved what you do. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Always be clothed in white, and always anoint your head with oil. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Enjoy life with your wife, whom you love, all the days of this meaningless life that God has given you under the sun—all your meaningless days. For this is your lot in life and in your toilsome labor under the sun. '
