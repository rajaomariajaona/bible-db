document_id: EZK.18,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The One Who Sins Will Die
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Suppose he has a violent son, who sheds blood or does any of these other things
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: things to a brother
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(though the father has done none of them):'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He eats at the mountain shrines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He defiles his neighbor’s wife.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He oppresses the poor and needy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He commits robbery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not return what he took in pledge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He looks to the idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does detestable things.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lends at interest and takes a profit.
  - type: usfm
    marker: m
    children:
    - type: text
      text: Will such a man live? He will not! Because he has done all these detestable things, he is to be put to death; his blood will be on his own head.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But suppose this son has a son who sees all the sins his father commits, and though he sees them, he does not do such things:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He does not eat at the mountain shrines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or look to the idols of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not defile his neighbor’s wife.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not oppress anyone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or require a pledge for a loan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not commit robbery
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but gives his food to the hungry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and provides clothing for the naked.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He withholds his hand from mistreating the poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and takes no interest or profit from them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He keeps my laws and follows my decrees.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He will not die for his father’s sin; he will surely live. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But his father will die for his own sin, because he practiced extortion, robbed his brother and did what was wrong among his people.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yet you ask, ‘Why does the son not share the guilt of his father?’ Since the son has done what is just and right and has been careful to keep all my decrees, he will surely live. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What do you people mean by quoting this proverb about the land of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘The parents eat sour grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the children’s teeth are set on edge’?
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The one who sins is the one who will die. The child will not share the guilt of the parent, nor will the parent share the guilt of the child. The righteousness of the righteous will be credited to them, and the wickedness of the wicked will be charged against them.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if a wicked person turns away from all the sins they have committed and keeps all my decrees and does what is just and right, that person will surely live; they will not die. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'None of the offenses they have committed will be remembered against them. Because of the righteous things they have done, they will live. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do I take any pleasure in the death of the wicked? declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Rather, am I not pleased when they turn from their ways and live?
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But if a righteous person turns from their righteousness and commits sin and does the same detestable things the wicked person does, will they live? None of the righteous things that person has done will be remembered. Because of the unfaithfulness they are guilty of and because of the sins they have committed, they will die.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yet you say, ‘The way of the Lord is not just.’ Hear, you Israelites: Is my way unjust? Is it not your ways that are unjust? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If a righteous person turns from their righteousness and commits sin, they will die for it; because of the sin they have committed they will die. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if a wicked person turns away from the wickedness they have committed and does what is just and right, they will save their life. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because they consider all the offenses they have committed and turn away from them, that person will surely live; they will not die. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet the Israelites say, ‘The way of the Lord is not just.’ Are my ways unjust, people of Israel? Is it not your ways that are unjust?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As surely as I live, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you will no longer quote this proverb in Israel. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, you Israelites, I will judge each of you according to your own ways, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Repent! Turn away from all your offenses; then sin will not be your downfall. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rid yourselves of all the offenses you have committed, and get a new heart and a new spirit. Why will you die, people of Israel? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I take no pleasure in the death of anyone, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Repent and live!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For everyone belongs to me, the parent as well as the child—both alike belong to me. The one who sins is the one who will die.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Suppose there is a righteous man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who does what is just and right.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not eat at the mountain shrines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or look to the idols of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not defile his neighbor’s wife
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or have sexual relations with a woman during her period.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not oppress anyone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but returns what he took in pledge for a loan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not commit robbery
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but gives his food to the hungry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and provides clothing for the naked.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He does not lend to them at interest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or take a profit from them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He withholds his hand from doing wrong
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and judges fairly between two parties.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He follows my decrees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and faithfully keeps my laws.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That man is righteous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will surely live,
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
