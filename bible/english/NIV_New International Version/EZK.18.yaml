document_id: EZK.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The One Who Sins Will Die
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: “Suppose he has a violent son, who sheds blood or does any of these other things
  - type: note
    content: Or things to a brother
  - type: text
    content: ' '
  '11':
  - type: text
    content: '(though the father has done none of them):'
  - type: text
    content: “He eats at the mountain shrines.
  - type: text
    content: He defiles his neighbor’s wife.
  '12':
  - type: text
    content: He oppresses the poor and needy.
  - type: text
    content: He commits robbery.
  - type: text
    content: He does not return what he took in pledge.
  - type: text
    content: He looks to the idols.
  - type: text
    content: He does detestable things.
  '13':
  - type: text
    content: He lends at interest and takes a profit.
  - type: text
    content: Will such a man live? He will not! Because he has done all these detestable things, he is to be put to death; his blood will be on his own head.
  '14':
  - type: text
    content: '“But suppose this son has a son who sees all the sins his father commits, and though he sees them, he does not do such things:'
  '15':
  - type: text
    content: “He does not eat at the mountain shrines
  - type: text
    content: or look to the idols of Israel.
  - type: text
    content: He does not defile his neighbor’s wife.
  '16':
  - type: text
    content: He does not oppress anyone
  - type: text
    content: or require a pledge for a loan.
  - type: text
    content: He does not commit robbery
  - type: text
    content: but gives his food to the hungry
  - type: text
    content: and provides clothing for the naked.
  '17':
  - type: text
    content: He withholds his hand from mistreating the poor
  - type: text
    content: and takes no interest or profit from them.
  - type: text
    content: He keeps my laws and follows my decrees.
  - type: text
    content: 'He will not die for his father’s sin; he will surely live. '
  '18':
  - type: text
    content: But his father will die for his own sin, because he practiced extortion, robbed his brother and did what was wrong among his people.
  '19':
  - type: text
    content: '“Yet you ask, ‘Why does the son not share the guilt of his father?’ Since the son has done what is just and right and has been careful to keep all my decrees, he will surely live. '
  '2':
  - type: text
    content: '“What do you people mean by quoting this proverb about the land of Israel:'
  - type: text
    content: “ ‘The parents eat sour grapes,
  - type: text
    content: and the children’s teeth are set on edge’?
  '20':
  - type: text
    content: The one who sins is the one who will die. The child will not share the guilt of the parent, nor will the parent share the guilt of the child. The righteousness of the righteous will be credited to them, and the wickedness of the wicked will be charged against them.
  '21':
  - type: text
    content: '“But if a wicked person turns away from all the sins they have committed and keeps all my decrees and does what is just and right, that person will surely live; they will not die. '
  '22':
  - type: text
    content: 'None of the offenses they have committed will be remembered against them. Because of the righteous things they have done, they will live. '
  '23':
  - type: text
    content: 'Do I take any pleasure in the death of the wicked? declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: . Rather, am I not pleased when they turn from their ways and live?
  '24':
  - type: text
    content: “But if a righteous person turns from their righteousness and commits sin and does the same detestable things the wicked person does, will they live? None of the righteous things that person has done will be remembered. Because of the unfaithfulness they are guilty of and because of the sins they have committed, they will die.
  '25':
  - type: text
    content: '“Yet you say, ‘The way of the Lord is not just.’ Hear, you Israelites: Is my way unjust? Is it not your ways that are unjust? '
  '26':
  - type: text
    content: 'If a righteous person turns from their righteousness and commits sin, they will die for it; because of the sin they have committed they will die. '
  '27':
  - type: text
    content: 'But if a wicked person turns away from the wickedness they have committed and does what is just and right, they will save their life. '
  '28':
  - type: text
    content: 'Because they consider all the offenses they have committed and turn away from them, that person will surely live; they will not die. '
  '29':
  - type: text
    content: Yet the Israelites say, ‘The way of the Lord is not just.’ Are my ways unjust, people of Israel? Is it not your ways that are unjust?
  '3':
  - type: text
    content: '“As surely as I live, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', you will no longer quote this proverb in Israel. '
  '30':
  - type: text
    content: '“Therefore, you Israelites, I will judge each of you according to your own ways, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. Repent! Turn away from all your offenses; then sin will not be your downfall. '
  '31':
  - type: text
    content: 'Rid yourselves of all the offenses you have committed, and get a new heart and a new spirit. Why will you die, people of Israel? '
  '32':
  - type: text
    content: 'For I take no pleasure in the death of anyone, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: . Repent and live!
  '4':
  - type: text
    content: For everyone belongs to me, the parent as well as the child—both alike belong to me. The one who sins is the one who will die.
  '5':
  - type: text
    content: “Suppose there is a righteous man
  - type: text
    content: who does what is just and right.
  '6':
  - type: text
    content: He does not eat at the mountain shrines
  - type: text
    content: or look to the idols of Israel.
  - type: text
    content: He does not defile his neighbor’s wife
  - type: text
    content: or have sexual relations with a woman during her period.
  '7':
  - type: text
    content: He does not oppress anyone,
  - type: text
    content: but returns what he took in pledge for a loan.
  - type: text
    content: He does not commit robbery
  - type: text
    content: but gives his food to the hungry
  - type: text
    content: and provides clothing for the naked.
  '8':
  - type: text
    content: He does not lend to them at interest
  - type: text
    content: or take a profit from them.
  - type: text
    content: He withholds his hand from doing wrong
  - type: text
    content: and judges fairly between two parties.
  '9':
  - type: text
    content: He follows my decrees
  - type: text
    content: and faithfully keeps my laws.
  - type: text
    content: That man is righteous;
  - type: text
    content: he will surely live,
  - type: text
    content: 'declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
