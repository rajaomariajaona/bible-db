document_id: NUM.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Kohathites
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron: '
  '10':
  - type: text
    content: Then they are to wrap it and all its accessories in a covering of the durable leather and put it on a carrying frame.
  '11':
  - type: text
    content: “Over the gold altar they are to spread a blue cloth and cover that with the durable leather and put the poles in place.
  '12':
  - type: text
    content: “They are to take all the articles used for ministering in the sanctuary, wrap them in a blue cloth, cover that with the durable leather and put them on a carrying frame.
  '13':
  - type: text
    content: '“They are to remove the ashes from the bronze altar and spread a purple cloth over it. '
  '14':
  - type: text
    content: Then they are to place on it all the utensils used for ministering at the altar, including the firepans, meat forks, shovels and sprinkling bowls. Over it they are to spread a covering of the durable leather and put the poles in place.
  '15':
  - type: text
    content: “After Aaron and his sons have finished covering the holy furnishings and all the holy articles, and when the camp is ready to move, only then are the Kohathites to come and do the carrying. But they must not touch the holy things or they will die. The Kohathites are to carry those things that are in the tent of meeting.
  '16':
  - type: text
    content: “Eleazar son of Aaron, the priest, is to have charge of the oil for the light, the fragrant incense, the regular grain offering and the anointing oil. He is to be in charge of the entire tabernacle and everything in it, including its holy furnishings and articles.”
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '18':
  - type: text
    content: '“See that the Kohathite tribal clans are not destroyed from among the Levites. '
  '19':
  - type: text
    content: 'So that they may live and not die when they come near the most holy things, do this for them: Aaron and his sons are to go into the sanctuary and assign to each man his work and what he is to carry. '
  '2':
  - type: text
    content: '“Take a census of the Kohathite branch of the Levites by their clans and families. '
  '20':
  - type: text
    content: But the Kohathites must not go in to look at the holy things, even for a moment, or they will die.”
  - type: heading
    content: The Gershonites
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '22':
  - type: text
    content: '“Take a census also of the Gershonites by their families and clans. '
  '23':
  - type: text
    content: Count all the men from thirty to fifty years of age who come to serve in the work at the tent of meeting.
  '24':
  - type: text
    content: '“This is the service of the Gershonite clans in their carrying and their other work: '
  '25':
  - type: text
    content: 'They are to carry the curtains of the tabernacle, that is, the tent of meeting, its covering and its outer covering of durable leather, the curtains for the entrance to the tent of meeting, '
  '26':
  - type: text
    content: 'the curtains of the courtyard surrounding the tabernacle and altar, the curtain for the entrance to the courtyard, the ropes and all the equipment used in the service of the tent. The Gershonites are to do all that needs to be done with these things. '
  '27':
  - type: text
    content: 'All their service, whether carrying or doing other work, is to be done under the direction of Aaron and his sons. You shall assign to them as their responsibility all they are to carry. '
  '28':
  - type: text
    content: This is the service of the Gershonite clans at the tent of meeting. Their duties are to be under the direction of Ithamar son of Aaron, the priest.
  - type: heading
    content: The Merarites
  '29':
  - type: text
    content: '“Count the Merarites by their clans and families. '
  '3':
  - type: text
    content: Count all the men from thirty to fifty years of age who come to serve in the work at the tent of meeting.
  '30':
  - type: text
    content: 'Count all the men from thirty to fifty years of age who come to serve in the work at the tent of meeting. '
  '31':
  - type: text
    content: 'As part of all their service at the tent, they are to carry the frames of the tabernacle, its crossbars, posts and bases, '
  '32':
  - type: text
    content: 'as well as the posts of the surrounding courtyard with their bases, tent pegs, ropes, all their equipment and everything related to their use. Assign to each man the specific things he is to carry. '
  '33':
  - type: text
    content: This is the service of the Merarite clans as they work at the tent of meeting under the direction of Ithamar son of Aaron, the priest.”
  - type: heading
    content: The Numbering of the Levite Clans
  '34':
  - type: text
    content: 'Moses, Aaron and the leaders of the community counted the Kohathites by their clans and families. '
  '35':
  - type: text
    content: 'All the men from thirty to fifty years of age who came to serve in the work at the tent of meeting, '
  '36':
  - type: text
    content: 'counted by clans, were 2,750. '
  '37':
  - type: text
    content: 'This was the total of all those in the Kohathite clans who served at the tent of meeting. Moses and Aaron counted them according to the '
  - type: text
    content: Lord
  - type: text
    content: ’s command through Moses.
  '38':
  - type: text
    content: 'The Gershonites were counted by their clans and families. '
  '39':
  - type: text
    content: 'All the men from thirty to fifty years of age who came to serve in the work at the tent of meeting, '
  '4':
  - type: text
    content: '“This is the work of the Kohathites at the tent of meeting: the care of the most holy things. '
  '40':
  - type: text
    content: 'counted by their clans and families, were 2,630. '
  '41':
  - type: text
    content: 'This was the total of those in the Gershonite clans who served at the tent of meeting. Moses and Aaron counted them according to the '
  - type: text
    content: Lord
  - type: text
    content: ’s command.
  '42':
  - type: text
    content: 'The Merarites were counted by their clans and families. '
  '43':
  - type: text
    content: 'All the men from thirty to fifty years of age who came to serve in the work at the tent of meeting, '
  '44':
  - type: text
    content: 'counted by their clans, were 3,200. '
  '45':
  - type: text
    content: 'This was the total of those in the Merarite clans. Moses and Aaron counted them according to the '
  - type: text
    content: Lord
  - type: text
    content: ’s command through Moses.
  '46':
  - type: text
    content: 'So Moses, Aaron and the leaders of Israel counted all the Levites by their clans and families. '
  '47':
  - type: text
    content: 'All the men from thirty to fifty years of age who came to do the work of serving and carrying the tent of meeting '
  '48':
  - type: text
    content: 'numbered 8,580. '
  '49':
  - type: text
    content: 'At the '
  - type: text
    content: Lord
  - type: text
    content: ’s command through Moses, each was assigned his work and told what to carry.
  - type: text
    content: 'Thus they were counted, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '5':
  - type: text
    content: 'When the camp is to move, Aaron and his sons are to go in and take down the shielding curtain and put it over the ark of the covenant law. '
  '6':
  - type: text
    content: Then they are to cover the curtain with a durable leather,
  - type: note
    content: Possibly the hides of large aquatic mammals; also in verses 8, 10, 11, 12, 14 and 25
  - type: text
    content: ' spread a cloth of solid blue over that and put the poles in place.'
  '7':
  - type: text
    content: '“Over the table of the Presence they are to spread a blue cloth and put on it the plates, dishes and bowls, and the jars for drink offerings; the bread that is continually there is to remain on it. '
  '8':
  - type: text
    content: They are to spread a scarlet cloth over them, cover that with the durable leather and put the poles in place.
  '9':
  - type: text
    content: '“They are to take a blue cloth and cover the lampstand that is for light, together with its lamps, its wick trimmers and trays, and all its jars for the olive oil used to supply it. '
