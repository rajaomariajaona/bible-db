document_id: GEN.39,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph and Potiphar’s Wife
  - type: text
    content: Now Joseph had been taken down to Egypt. Potiphar, an Egyptian who was one of Pharaoh’s officials, the captain of the guard, bought him from the Ishmaelites who had taken him there.
  '10':
  - type: text
    content: And though she spoke to Joseph day after day, he refused to go to bed with her or even be with her.
  '11':
  - type: text
    content: 'One day he went into the house to attend to his duties, and none of the household servants was inside. '
  '12':
  - type: text
    content: She caught him by his cloak and said, “Come to bed with me!” But he left his cloak in her hand and ran out of the house.
  '13':
  - type: text
    content: 'When she saw that he had left his cloak in her hand and had run out of the house, '
  '14':
  - type: text
    content: 'she called her household servants. “Look,” she said to them, “this Hebrew has been brought to us to make sport of us! He came in here to sleep with me, but I screamed. '
  '15':
  - type: text
    content: When he heard me scream for help, he left his cloak beside me and ran out of the house.”
  '16':
  - type: text
    content: 'She kept his cloak beside her until his master came home. '
  '17':
  - type: text
    content: 'Then she told him this story: “That Hebrew slave you brought us came to me to make sport of me. '
  '18':
  - type: text
    content: But as soon as I screamed for help, he left his cloak beside me and ran out of the house.”
  '19':
  - type: text
    content: 'When his master heard the story his wife told him, saying, “This is how your slave treated me,” he burned with anger. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was with Joseph so that he prospered, and he lived in the house of his Egyptian master. '
  '20':
  - type: text
    content: Joseph’s master took him and put him in prison, the place where the king’s prisoners were confined.
  - type: text
    content: 'But while Joseph was there in the prison, '
  '21':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him; he showed him kindness and granted him favor in the eyes of the prison warden. '
  '22':
  - type: text
    content: 'So the warden put Joseph in charge of all those held in the prison, and he was made responsible for all that was done there. '
  '23':
  - type: text
    content: 'The warden paid no attention to anything under Joseph’s care, because the '
  - type: text
    content: Lord
  - type: text
    content: ' was with Joseph and gave him success in whatever he did.'
  '3':
  - type: text
    content: 'When his master saw that the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him and that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave him success in everything he did, '
  '4':
  - type: text
    content: 'Joseph found favor in his eyes and became his attendant. Potiphar put him in charge of his household, and he entrusted to his care everything he owned. '
  '5':
  - type: text
    content: 'From the time he put him in charge of his household and of all that he owned, the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed the household of the Egyptian because of Joseph. The blessing of the '
  - type: text
    content: Lord
  - type: text
    content: ' was on everything Potiphar had, both in the house and in the field. '
  '6':
  - type: text
    content: So Potiphar left everything he had in Joseph’s care; with Joseph in charge, he did not concern himself with anything except the food he ate.
  - type: text
    content: 'Now Joseph was well-built and handsome, '
  '7':
  - type: text
    content: and after a while his master’s wife took notice of Joseph and said, “Come to bed with me!”
  '8':
  - type: text
    content: 'But he refused. “With me in charge,” he told her, “my master does not concern himself with anything in the house; everything he owns he has entrusted to my care. '
  '9':
  - type: text
    content: 'No one is greater in this house than I am. My master has withheld nothing from me except you, because you are his wife. How then could I do such a wicked thing and sin against God?” '
