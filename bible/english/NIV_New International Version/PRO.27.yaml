document_id: PRO.27,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not boast about tomorrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you do not know what a day may bring.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not forsake your friend or a friend of your family,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not go to your relative’s house when disaster strikes you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: better a neighbor nearby than a relative far away.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be wise, my son, and bring joy to my heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then I can answer anyone who treats me with contempt.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prudent see danger and take refuge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the simple keep going and pay the penalty.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take the garment of one who puts up security for a stranger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hold it in pledge if it is done for an outsider.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If anyone loudly blesses their neighbor early in the morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will be taken as a curse.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A quarrelsome wife is like the dripping
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of a leaky roof in a rainstorm;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: restraining her is like restraining the wind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or grasping oil with the hand.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As iron sharpens iron,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so one person sharpens another.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The one who guards a fig tree will eat its fruit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whoever protects their master will be honored.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As water reflects the face,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so one’s life reflects the heart.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: so others reflect your heart back to you
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let someone else praise you, and not your own mouth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an outsider, and not your own lips.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Death and Destruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abaddon
      marker-yv: yv-n
    - type: text
      text: ' are never satisfied,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and neither are human eyes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The crucible for silver and the furnace for gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but people are tested by their praise.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you grind a fool in a mortar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grinding them like grain with a pestle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will not remove their folly from them.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be sure you know the condition of your flocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give careful attention to your herds;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for riches do not endure forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a crown is not secure for all generations.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the hay is removed and new growth appears
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the grass from the hills is gathered in,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the lambs will provide you with clothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the goats with the price of a field.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will have plenty of goats’ milk to feed your family
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to nourish your female servants.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stone is heavy and sand a burden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a fool’s provocation is heavier than both.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anger is cruel and fury overwhelming,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but who can stand before jealousy?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Better is open rebuke
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than hidden love.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wounds from a friend can be trusted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but an enemy multiplies kisses.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One who is full loathes honey from the comb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but to the hungry even what is bitter tastes sweet.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a bird that flees its nest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is anyone who flees from home.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Perfume and incense bring joy to the heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the pleasantness of a friend
  - type: usfm
    marker: q2
    children:
    - type: text
      text: springs from their heartfelt advice.
