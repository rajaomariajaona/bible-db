document_id: PRO.27,111
type_code: eng
verses:
  '1':
  - type: text
    content: Do not boast about tomorrow,
  - type: text
    content: for you do not know what a day may bring.
  '10':
  - type: text
    content: Do not forsake your friend or a friend of your family,
  - type: text
    content: and do not go to your relative’s house when disaster strikes you—
  - type: text
    content: better a neighbor nearby than a relative far away.
  '11':
  - type: text
    content: Be wise, my son, and bring joy to my heart;
  - type: text
    content: then I can answer anyone who treats me with contempt.
  '12':
  - type: text
    content: The prudent see danger and take refuge,
  - type: text
    content: but the simple keep going and pay the penalty.
  '13':
  - type: text
    content: Take the garment of one who puts up security for a stranger;
  - type: text
    content: hold it in pledge if it is done for an outsider.
  '14':
  - type: text
    content: If anyone loudly blesses their neighbor early in the morning,
  - type: text
    content: it will be taken as a curse.
  '15':
  - type: text
    content: A quarrelsome wife is like the dripping
  - type: text
    content: of a leaky roof in a rainstorm;
  '16':
  - type: text
    content: restraining her is like restraining the wind
  - type: text
    content: or grasping oil with the hand.
  '17':
  - type: text
    content: As iron sharpens iron,
  - type: text
    content: so one person sharpens another.
  '18':
  - type: text
    content: The one who guards a fig tree will eat its fruit,
  - type: text
    content: and whoever protects their master will be honored.
  '19':
  - type: text
    content: As water reflects the face,
  - type: text
    content: so one’s life reflects the heart.
  - type: note
    content: Or so others reflect your heart back to you
  '2':
  - type: text
    content: Let someone else praise you, and not your own mouth;
  - type: text
    content: an outsider, and not your own lips.
  '20':
  - type: text
    content: Death and Destruction
  - type: note
    content: Hebrew Abaddon
  - type: text
    content: ' are never satisfied,'
  - type: text
    content: and neither are human eyes.
  '21':
  - type: text
    content: The crucible for silver and the furnace for gold,
  - type: text
    content: but people are tested by their praise.
  '22':
  - type: text
    content: Though you grind a fool in a mortar,
  - type: text
    content: grinding them like grain with a pestle,
  - type: text
    content: you will not remove their folly from them.
  '23':
  - type: text
    content: Be sure you know the condition of your flocks,
  - type: text
    content: give careful attention to your herds;
  '24':
  - type: text
    content: for riches do not endure forever,
  - type: text
    content: and a crown is not secure for all generations.
  '25':
  - type: text
    content: When the hay is removed and new growth appears
  - type: text
    content: and the grass from the hills is gathered in,
  '26':
  - type: text
    content: the lambs will provide you with clothing,
  - type: text
    content: and the goats with the price of a field.
  '27':
  - type: text
    content: You will have plenty of goats’ milk to feed your family
  - type: text
    content: and to nourish your female servants.
  '3':
  - type: text
    content: Stone is heavy and sand a burden,
  - type: text
    content: but a fool’s provocation is heavier than both.
  '4':
  - type: text
    content: Anger is cruel and fury overwhelming,
  - type: text
    content: but who can stand before jealousy?
  '5':
  - type: text
    content: Better is open rebuke
  - type: text
    content: than hidden love.
  '6':
  - type: text
    content: Wounds from a friend can be trusted,
  - type: text
    content: but an enemy multiplies kisses.
  '7':
  - type: text
    content: One who is full loathes honey from the comb,
  - type: text
    content: but to the hungry even what is bitter tastes sweet.
  '8':
  - type: text
    content: Like a bird that flees its nest
  - type: text
    content: is anyone who flees from home.
  '9':
  - type: text
    content: Perfume and incense bring joy to the heart,
  - type: text
    content: and the pleasantness of a friend
  - type: text
    content: springs from their heartfelt advice.
