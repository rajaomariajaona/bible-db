document_id: DEU.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Worshiping Other Gods
  - type: note
    content: In Hebrew texts 13:1-18 is numbered 13:2-19.
  - type: text
    content: 'If a prophet, or one who foretells by dreams, appears among you and announces to you a sign or wonder, '
  '10':
  - type: text
    content: 'Stone them to death, because they tried to turn you away from the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of Egypt, out of the land of slavery. '
  '11':
  - type: text
    content: Then all Israel will hear and be afraid, and no one among you will do such an evil thing again.
  '12':
  - type: text
    content: 'If you hear it said about one of the towns the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to live in '
  '13':
  - type: text
    content: 'that troublemakers have arisen among you and have led the people of their town astray, saying, “Let us go and worship other gods” (gods you have not known), '
  '14':
  - type: text
    content: 'then you must inquire, probe and investigate it thoroughly. And if it is true and it has been proved that this detestable thing has been done among you, '
  '15':
  - type: text
    content: you must certainly put to the sword all who live in that town. You must destroy it completely,
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' both its people and its livestock. '
  '16':
  - type: text
    content: 'You are to gather all the plunder of the town into the middle of the public square and completely burn the town and all its plunder as a whole burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. That town is to remain a ruin forever, never to be rebuilt, '
  '17':
  - type: text
    content: and none of the condemned things
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' are to be found in your hands. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will turn from his fierce anger, will show you mercy, and will have compassion on you. He will increase your numbers, as he promised on oath to your ancestors— '
  '18':
  - type: text
    content: 'because you obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God by keeping all his commands that I am giving you today and doing what is right in his eyes.'
  '2':
  - type: text
    content: 'and if the sign or wonder spoken of takes place, and the prophet says, “Let us follow other gods” (gods you have not known) “and let us worship them,” '
  '3':
  - type: text
    content: 'you must not listen to the words of that prophet or dreamer. The '
  - type: text
    content: Lord
  - type: text
    content: ' your God is testing you to find out whether you love him with all your heart and with all your soul. '
  '4':
  - type: text
    content: 'It is the '
  - type: text
    content: Lord
  - type: text
    content: ' your God you must follow, and him you must revere. Keep his commands and obey him; serve him and hold fast to him. '
  '5':
  - type: text
    content: 'That prophet or dreamer must be put to death for inciting rebellion against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of Egypt and redeemed you from the land of slavery. That prophet or dreamer tried to turn you from the way the '
  - type: text
    content: Lord
  - type: text
    content: ' your God commanded you to follow. You must purge the evil from among you.'
  '6':
  - type: text
    content: 'If your very own brother, or your son or daughter, or the wife you love, or your closest friend secretly entices you, saying, “Let us go and worship other gods” (gods that neither you nor your ancestors have known, '
  '7':
  - type: text
    content: 'gods of the peoples around you, whether near or far, from one end of the land to the other), '
  '8':
  - type: text
    content: 'do not yield to them or listen to them. Show them no pity. Do not spare them or shield them. '
  '9':
  - type: text
    content: 'You must certainly put them to death. Your hand must be the first in putting them to death, and then the hands of all the people. '
