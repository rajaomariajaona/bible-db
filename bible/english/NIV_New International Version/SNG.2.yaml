    children:
    - type: text
      text: '1'
  - type: text
    text: I am a rose
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably a member of the crocus family
    marker-yv: yv-n
  - type: text
    text: ' of Sharon,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lily of the valleys.
- type: usfm
  marker: sp
  children:
  - type: text
    text: He
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Like a lily among thorns
- type: usfm
  marker: q2
  children:
  - type: text
    text: is my darling among the young women.
- type: usfm
  marker: sp
  children:
  - type: text
    text: She
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Like an apple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or possibly '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: apricot
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; here and elsewhere in Song of Songs
    marker-yv: yv-n
  - type: text
    text: ' tree among the trees of the forest'
- type: usfm
  marker: q2
  children:
  - type: text
    text: is my beloved among the young men.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I delight to sit in his shade,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his fruit is sweet to my taste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let him lead me to the banquet hall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let his banner over me be love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Strengthen me with raisins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: refresh me with apples,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I am faint with love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: His left arm is under my head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his right arm embraces me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Daughters of Jerusalem, I charge you
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'by the gazelles and by the does of the field:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not arouse or awaken love
- type: usfm
  marker: q2
  children:
  - type: text
    text: until it so desires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Listen! My beloved!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Look! Here he comes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leaping across the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bounding over the hills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: My beloved is like a gazelle or a young stag.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Look! There he stands behind our wall,
- type: usfm
  marker: q1
  children:
  - type: text
    text: gazing through the windows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: peering through the lattice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My beloved spoke and said to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Arise, my darling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my beautiful one, come with me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: See! The winter is past;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rains are over and gone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Flowers appear on the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the season of singing has come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the cooing of doves
- type: usfm
  marker: q2
  children:
  - type: text
    text: is heard in our land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The fig tree forms its early fruit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the blossoming vines spread their fragrance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arise, come, my darling;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my beautiful one, come with me.”
- type: usfm
  marker: sp
  children:
  - type: text
    text: He
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: My dove in the clefts of the rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the hiding places on the mountainside,
- type: usfm
  marker: q1
  children:
  - type: text
    text: show me your face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let me hear your voice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your voice is sweet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your face is lovely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Catch for us the foxes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the little foxes
- type: usfm
  marker: q1
  children:
  - type: text
    text: that ruin the vineyards,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our vineyards that are in bloom.
- type: usfm
  marker: sp
  children:
  - type: text
    text: She
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: My beloved is mine and I am his;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he browses among the lilies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Until the day breaks
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the shadows flee,
- type: usfm
  marker: q1
  children:
  - type: text
    text: turn, my beloved,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be like a gazelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: or like a young stag
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the rugged hills.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the hills of Bether
    marker-yv: yv-n
