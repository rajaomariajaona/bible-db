document_id: SNG.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: SheOr He
  - type: text
    content: I am a rose
  - type: note
    content: Probably a member of the crocus family
  - type: text
    content: ' of Sharon,'
  - type: text
    content: a lily of the valleys.
  - type: heading
    content: He
  '10':
  - type: text
    content: My beloved spoke and said to me,
  - type: text
    content: “Arise, my darling,
  - type: text
    content: my beautiful one, come with me.
  '11':
  - type: text
    content: See! The winter is past;
  - type: text
    content: the rains are over and gone.
  '12':
  - type: text
    content: Flowers appear on the earth;
  - type: text
    content: the season of singing has come,
  - type: text
    content: the cooing of doves
  - type: text
    content: is heard in our land.
  '13':
  - type: text
    content: The fig tree forms its early fruit;
  - type: text
    content: the blossoming vines spread their fragrance.
  - type: text
    content: Arise, come, my darling;
  - type: text
    content: my beautiful one, come with me.”
  - type: heading
    content: He
  '14':
  - type: text
    content: My dove in the clefts of the rock,
  - type: text
    content: in the hiding places on the mountainside,
  - type: text
    content: show me your face,
  - type: text
    content: let me hear your voice;
  - type: text
    content: for your voice is sweet,
  - type: text
    content: and your face is lovely.
  '15':
  - type: text
    content: Catch for us the foxes,
  - type: text
    content: the little foxes
  - type: text
    content: that ruin the vineyards,
  - type: text
    content: our vineyards that are in bloom.
  - type: heading
    content: She
  '16':
  - type: text
    content: My beloved is mine and I am his;
  - type: text
    content: he browses among the lilies.
  '17':
  - type: text
    content: Until the day breaks
  - type: text
    content: and the shadows flee,
  - type: text
    content: turn, my beloved,
  - type: text
    content: and be like a gazelle
  - type: text
    content: or like a young stag
  - type: text
    content: on the rugged hills.
  - type: note
    content: Or the hills of Bether
  '2':
  - type: text
    content: Like a lily among thorns
  - type: text
    content: is my darling among the young women.
  - type: heading
    content: She
  '3':
  - type: text
    content: Like an apple
  - type: note
    content: Or possibly apricot; here and elsewhere in Song of Songs
  - type: text
    content: ' tree among the trees of the forest'
  - type: text
    content: is my beloved among the young men.
  - type: text
    content: I delight to sit in his shade,
  - type: text
    content: and his fruit is sweet to my taste.
  '4':
  - type: text
    content: Let him lead me to the banquet hall,
  - type: text
    content: and let his banner over me be love.
  '5':
  - type: text
    content: Strengthen me with raisins,
  - type: text
    content: refresh me with apples,
  - type: text
    content: for I am faint with love.
  '6':
  - type: text
    content: His left arm is under my head,
  - type: text
    content: and his right arm embraces me.
  '7':
  - type: text
    content: Daughters of Jerusalem, I charge you
  - type: text
    content: 'by the gazelles and by the does of the field:'
  - type: text
    content: Do not arouse or awaken love
  - type: text
    content: until it so desires.
  '8':
  - type: text
    content: Listen! My beloved!
  - type: text
    content: Look! Here he comes,
  - type: text
    content: leaping across the mountains,
  - type: text
    content: bounding over the hills.
  '9':
  - type: text
    content: My beloved is like a gazelle or a young stag.
  - type: text
    content: Look! There he stands behind our wall,
  - type: text
    content: gazing through the windows,
  - type: text
    content: peering through the lattice.
