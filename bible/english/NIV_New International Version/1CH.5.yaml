document_id: 1CH.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Reuben
  - type: text
    content: 'The sons of Reuben the firstborn of Israel (he was the firstborn, but when he defiled his father’s marriage bed, his rights as firstborn were given to the sons of Joseph son of Israel; so he could not be listed in the genealogical record in accordance with his birthright, '
  '10':
  - type: text
    content: During Saul’s reign they waged war against the Hagrites, who were defeated at their hands; they occupied the dwellings of the Hagrites throughout the entire region east of Gilead.
  - type: heading
    content: Gad
  '11':
  - type: text
    content: 'The Gadites lived next to them in Bashan, as far as Salekah:'
  '12':
  - type: text
    content: Joel was the chief, Shapham the second, then Janai and Shaphat, in Bashan.
  '13':
  - type: text
    content: 'Their relatives, by families, were:'
  - type: text
    content: Michael, Meshullam, Sheba, Jorai, Jakan, Zia and Eber—seven in all.
  '14':
  - type: text
    content: These were the sons of Abihail son of Huri, the son of Jaroah, the son of Gilead, the son of Michael, the son of Jeshishai, the son of Jahdo, the son of Buz.
  '15':
  - type: text
    content: Ahi son of Abdiel, the son of Guni, was head of their family.
  '16':
  - type: text
    content: The Gadites lived in Gilead, in Bashan and its outlying villages, and on all the pasturelands of Sharon as far as they extended.
  '17':
  - type: text
    content: All these were entered in the genealogical records during the reigns of Jotham king of Judah and Jeroboam king of Israel.
  '18':
  - type: text
    content: 'The Reubenites, the Gadites and the half-tribe of Manasseh had 44,760 men ready for military service—able-bodied men who could handle shield and sword, who could use a bow, and who were trained for battle. '
  '19':
  - type: text
    content: 'They waged war against the Hagrites, Jetur, Naphish and Nodab. '
  '2':
  - type: text
    content: 'and though Judah was the strongest of his brothers and a ruler came from him, the rights of the firstborn belonged to Joseph)— '
  '20':
  - type: text
    content: 'They were helped in fighting them, and God delivered the Hagrites and all their allies into their hands, because they cried out to him during the battle. He answered their prayers, because they trusted in him. '
  '21':
  - type: text
    content: 'They seized the livestock of the Hagrites—fifty thousand camels, two hundred fifty thousand sheep and two thousand donkeys. They also took one hundred thousand people captive, '
  '22':
  - type: text
    content: and many others fell slain, because the battle was God’s. And they occupied the land until the exile.
  - type: heading
    content: The Half-Tribe of Manasseh
  '23':
  - type: text
    content: The people of the half-tribe of Manasseh were numerous; they settled in the land from Bashan to Baal Hermon, that is, to Senir (Mount Hermon).
  '24':
  - type: text
    content: 'These were the heads of their families: Epher, Ishi, Eliel, Azriel, Jeremiah, Hodaviah and Jahdiel. They were brave warriors, famous men, and heads of their families. '
  '25':
  - type: text
    content: 'But they were unfaithful to the God of their ancestors and prostituted themselves to the gods of the peoples of the land, whom God had destroyed before them. '
  '26':
  - type: text
    content: So the God of Israel stirred up the spirit of Pul king of Assyria (that is, Tiglath-Pileser king of Assyria), who took the Reubenites, the Gadites and the half-tribe of Manasseh into exile. He took them to Halah, Habor, Hara and the river of Gozan, where they are to this day.
  '3':
  - type: text
    content: 'the sons of Reuben the firstborn of Israel:'
  - type: text
    content: Hanok, Pallu, Hezron and Karmi.
  '4':
  - type: text
    content: 'The descendants of Joel:'
  - type: text
    content: Shemaiah his son, Gog his son,
  - type: text
    content: 'Shimei his son, '
  '5':
  - type: text
    content: Micah his son,
  - type: text
    content: Reaiah his son, Baal his son,
  '6':
  - type: text
    content: and Beerah his son, whom Tiglath-Pileser
  - type: note
    content: Hebrew Tilgath-Pilneser, a variant of Tiglath-Pileser; also in verse 26
  - type: text
    content: ' king of Assyria took into exile. Beerah was a leader of the Reubenites.'
  '7':
  - type: text
    content: 'Their relatives by clans, listed according to their genealogical records:'
  - type: text
    content: 'Jeiel the chief, Zechariah, '
  '8':
  - type: text
    content: 'and Bela son of Azaz, the son of Shema, the son of Joel. They settled in the area from Aroer to Nebo and Baal Meon. '
  '9':
  - type: text
    content: To the east they occupied the land up to the edge of the desert that extends to the Euphrates River, because their livestock had increased in Gilead.
