document_id: PSA.38,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 38In Hebrew texts 38:1-22 is numbered 38:2-23.
  - type: text
    content: A psalm of David. A petition.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', do not rebuke me in your anger'
  - type: text
    content: or discipline me in your wrath.
  '10':
  - type: text
    content: My heart pounds, my strength fails me;
  - type: text
    content: even the light has gone from my eyes.
  '11':
  - type: text
    content: My friends and companions avoid me because of my wounds;
  - type: text
    content: my neighbors stay far away.
  '12':
  - type: text
    content: Those who want to kill me set their traps,
  - type: text
    content: those who would harm me talk of my ruin;
  - type: text
    content: all day long they scheme and lie.
  '13':
  - type: text
    content: I am like the deaf, who cannot hear,
  - type: text
    content: like the mute, who cannot speak;
  '14':
  - type: text
    content: I have become like one who does not hear,
  - type: text
    content: whose mouth can offer no reply.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', I wait for you;'
  - type: text
    content: you will answer, Lord my God.
  '16':
  - type: text
    content: For I said, “Do not let them gloat
  - type: text
    content: or exalt themselves over me when my feet slip.”
  '17':
  - type: text
    content: For I am about to fall,
  - type: text
    content: and my pain is ever with me.
  '18':
  - type: text
    content: I confess my iniquity;
  - type: text
    content: I am troubled by my sin.
  '19':
  - type: text
    content: Many have become my enemies without cause
  - type: note
    content: One Dead Sea Scrolls manuscript; Masoretic Text my vigorous enemies
  - type: text
    content: ;
  - type: text
    content: those who hate me without reason are numerous.
  '2':
  - type: text
    content: Your arrows have pierced me,
  - type: text
    content: and your hand has come down on me.
  '20':
  - type: text
    content: Those who repay my good with evil
  - type: text
    content: lodge accusations against me,
  - type: text
    content: though I seek only to do what is good.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', do not forsake me;'
  - type: text
    content: do not be far from me, my God.
  '22':
  - type: text
    content: Come quickly to help me,
  - type: text
    content: my Lord and my Savior.
  '3':
  - type: text
    content: Because of your wrath there is no health in my body;
  - type: text
    content: there is no soundness in my bones because of my sin.
  '4':
  - type: text
    content: My guilt has overwhelmed me
  - type: text
    content: like a burden too heavy to bear.
  '5':
  - type: text
    content: My wounds fester and are loathsome
  - type: text
    content: because of my sinful folly.
  '6':
  - type: text
    content: I am bowed down and brought very low;
  - type: text
    content: all day long I go about mourning.
  '7':
  - type: text
    content: My back is filled with searing pain;
  - type: text
    content: there is no health in my body.
  '8':
  - type: text
    content: I am feeble and utterly crushed;
  - type: text
    content: I groan in anguish of heart.
  '9':
  - type: text
    content: All my longings lie open before you, Lord;
  - type: text
    content: my sighing is not hidden from you.
