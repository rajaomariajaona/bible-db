document_id: PSA.38
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 38
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 38:1-22 is numbered 38:2-23.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of David. A petition.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do not rebuke me in your anger'
- type: usfm
  marker: q2
  children:
  - type: text
    text: or discipline me in your wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Your arrows have pierced me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your hand has come down on me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Because of your wrath there is no health in my body;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no soundness in my bones because of my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My guilt has overwhelmed me
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a burden too heavy to bear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My wounds fester and are loathsome
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of my sinful folly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am bowed down and brought very low;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all day long I go about mourning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My back is filled with searing pain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no health in my body.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I am feeble and utterly crushed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I groan in anguish of heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All my longings lie open before you, Lord;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my sighing is not hidden from you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My heart pounds, my strength fails me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the light has gone from my eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My friends and companions avoid me because of my wounds;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my neighbors stay far away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Those who want to kill me set their traps,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who would harm me talk of my ruin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all day long they scheme and lie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I am like the deaf, who cannot hear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the mute, who cannot speak;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I have become like one who does not hear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose mouth can offer no reply.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I wait for you;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will answer, Lord my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For I said, “Do not let them gloat
- type: usfm
  marker: q2
  children:
  - type: text
    text: or exalt themselves over me when my feet slip.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For I am about to fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my pain is ever with me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I confess my iniquity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am troubled by my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Many have become my enemies without cause
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One Dead Sea Scrolls manuscript; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: my vigorous enemies
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who hate me without reason are numerous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Those who repay my good with evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: lodge accusations against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though I seek only to do what is good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do not forsake me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not be far from me, my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Come quickly to help me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my Lord and my Savior.
