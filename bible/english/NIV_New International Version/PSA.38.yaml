document_id: PSA.38,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 38
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 38:1-22 is numbered 38:2-23.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David. A petition.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not rebuke me in your anger'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or discipline me in your wrath.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My heart pounds, my strength fails me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even the light has gone from my eyes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: My friends and companions avoid me because of my wounds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my neighbors stay far away.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Those who want to kill me set their traps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who would harm me talk of my ruin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all day long they scheme and lie.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I am like the deaf, who cannot hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the mute, who cannot speak;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I have become like one who does not hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose mouth can offer no reply.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I wait for you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will answer, Lord my God.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For I said, “Do not let them gloat
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or exalt themselves over me when my feet slip.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For I am about to fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my pain is ever with me.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: I confess my iniquity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am troubled by my sin.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Many have become my enemies without cause
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '38:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'One Dead Sea Scrolls manuscript; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: my vigorous enemies
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who hate me without reason are numerous.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Your arrows have pierced me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your hand has come down on me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Those who repay my good with evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lodge accusations against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though I seek only to do what is good.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not forsake me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not be far from me, my God.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Come quickly to help me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my Lord and my Savior.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Because of your wrath there is no health in my body;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no soundness in my bones because of my sin.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: My guilt has overwhelmed me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a burden too heavy to bear.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: My wounds fester and are loathsome
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of my sinful folly.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I am bowed down and brought very low;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all day long I go about mourning.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: My back is filled with searing pain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no health in my body.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I am feeble and utterly crushed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I groan in anguish of heart.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: All my longings lie open before you, Lord;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my sighing is not hidden from you.
