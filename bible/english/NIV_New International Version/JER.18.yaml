document_id: JER.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: At the Potter’s House
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the word that came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Go down to the potter’s house, and there I will give you my message.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So I went down to the potter’s house, and I saw him working at the wheel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But the pot he was shaping from the clay was marred in his hands; so the potter formed it into another pot, shaping it as seemed best to him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He said, “Can I not do with you, Israel, as this potter does?” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. “Like clay in the hand of the potter, so are you in my hand, Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If at any time I announce that a nation or kingdom is to be uprooted, torn down and destroyed, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and if that nation I warned repents of its evil, then I will relent and not inflict on it the disaster I had planned. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And if at another time I announce that a nation or kingdom is to be built up and planted, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: and if it does evil in my sight and does not obey me, then I will reconsider the good I had intended to do for it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Now therefore say to the people of Judah and those living in Jerusalem, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Look! I am preparing a disaster for you and devising a plan against you. So turn from your evil ways, each one of you, and reform your ways and your actions.’ '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But they will reply, ‘It’s no use. We will continue with our own plans; we will all follow the stubbornness of our evil hearts.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Inquire among the nations:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has ever heard anything like this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A most horrible thing has been done
- type: usfm
  marker: q2
  children:
  - type: text
    text: by Virgin Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Does the snow of Lebanon
- type: usfm
  marker: q2
  children:
  - type: text
    text: ever vanish from its rocky slopes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do its cool waters from distant sources
- type: usfm
  marker: q2
  children:
  - type: text
    text: ever stop flowing?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this sentence is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Yet my people have forgotten me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they burn incense to worthless idols,
- type: usfm
  marker: q1
  children:
  - type: text
    text: which made them stumble in their ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the ancient paths.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They made them walk in byways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: on roads not built up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Their land will be an object of horror
- type: usfm
  marker: q2
  children:
  - type: text
    text: and of lasting scorn;
- type: usfm
  marker: q1
  children:
  - type: text
    text: all who pass by will be appalled
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will shake their heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Like a wind from the east,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will scatter them before their enemies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will show them my back and not my face
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the day of their disaster.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They said, “Come, let’s make plans against Jeremiah; for the teaching of the law by the priest will not cease, nor will counsel from the wise, nor the word from the prophets. So come, let’s attack him with our tongues and pay no attention to anything he says.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Listen to me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hear what my accusers are saying!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Should good be repaid with evil?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yet they have dug a pit for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember that I stood before you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spoke in their behalf
- type: usfm
  marker: q2
  children:
  - type: text
    text: to turn your wrath away from them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So give their children over to famine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hand them over to the power of the sword.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let their wives be made childless and widows;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let their men be put to death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their young men slain by the sword in battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Let a cry be heard from their houses
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you suddenly bring invaders against them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they have dug a pit to capture me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have hidden snares for my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', know'
- type: usfm
  marker: q2
  children:
  - type: text
    text: all their plots to kill me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not forgive their crimes
- type: usfm
  marker: q2
  children:
  - type: text
    text: or blot out their sins from your sight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be overthrown before you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: deal with them in the time of your anger.
