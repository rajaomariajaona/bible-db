document_id: JER.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: At the Potter’s House
  - type: text
    content: 'This is the word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: and if it does evil in my sight and does not obey me, then I will reconsider the good I had intended to do for it.
  '11':
  - type: text
    content: '“Now therefore say to the people of Judah and those living in Jerusalem, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Look! I am preparing a disaster for you and devising a plan against you. So turn from your evil ways, each one of you, and reform your ways and your actions.’ '
  '12':
  - type: text
    content: But they will reply, ‘It’s no use. We will continue with our own plans; we will all follow the stubbornness of our evil hearts.’ ”
  '13':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: '“Inquire among the nations:'
  - type: text
    content: Who has ever heard anything like this?
  - type: text
    content: A most horrible thing has been done
  - type: text
    content: by Virgin Israel.
  '14':
  - type: text
    content: Does the snow of Lebanon
  - type: text
    content: ever vanish from its rocky slopes?
  - type: text
    content: Do its cool waters from distant sources
  - type: text
    content: ever stop flowing?
  - type: note
    content: The meaning of the Hebrew for this sentence is uncertain.
  '15':
  - type: text
    content: Yet my people have forgotten me;
  - type: text
    content: they burn incense to worthless idols,
  - type: text
    content: which made them stumble in their ways,
  - type: text
    content: in the ancient paths.
  - type: text
    content: They made them walk in byways,
  - type: text
    content: on roads not built up.
  '16':
  - type: text
    content: Their land will be an object of horror
  - type: text
    content: and of lasting scorn;
  - type: text
    content: all who pass by will be appalled
  - type: text
    content: and will shake their heads.
  '17':
  - type: text
    content: Like a wind from the east,
  - type: text
    content: I will scatter them before their enemies;
  - type: text
    content: I will show them my back and not my face
  - type: text
    content: in the day of their disaster.”
  '18':
  - type: text
    content: They said, “Come, let’s make plans against Jeremiah; for the teaching of the law by the priest will not cease, nor will counsel from the wise, nor the word from the prophets. So come, let’s attack him with our tongues and pay no attention to anything he says.”
  '19':
  - type: text
    content: 'Listen to me, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: hear what my accusers are saying!
  '2':
  - type: text
    content: '“Go down to the potter’s house, and there I will give you my message.” '
  '20':
  - type: text
    content: Should good be repaid with evil?
  - type: text
    content: Yet they have dug a pit for me.
  - type: text
    content: Remember that I stood before you
  - type: text
    content: and spoke in their behalf
  - type: text
    content: to turn your wrath away from them.
  '21':
  - type: text
    content: So give their children over to famine;
  - type: text
    content: hand them over to the power of the sword.
  - type: text
    content: Let their wives be made childless and widows;
  - type: text
    content: let their men be put to death,
  - type: text
    content: their young men slain by the sword in battle.
  '22':
  - type: text
    content: Let a cry be heard from their houses
  - type: text
    content: when you suddenly bring invaders against them,
  - type: text
    content: for they have dug a pit to capture me
  - type: text
    content: and have hidden snares for my feet.
  '23':
  - type: text
    content: 'But you, '
  - type: text
    content: Lord
  - type: text
    content: ', know'
  - type: text
    content: all their plots to kill me.
  - type: text
    content: Do not forgive their crimes
  - type: text
    content: or blot out their sins from your sight.
  - type: text
    content: Let them be overthrown before you;
  - type: text
    content: deal with them in the time of your anger.
  '3':
  - type: text
    content: 'So I went down to the potter’s house, and I saw him working at the wheel. '
  '4':
  - type: text
    content: But the pot he was shaping from the clay was marred in his hands; so the potter formed it into another pot, shaping it as seemed best to him.
  '5':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me. '
  '6':
  - type: text
    content: 'He said, “Can I not do with you, Israel, as this potter does?” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. “Like clay in the hand of the potter, so are you in my hand, Israel. '
  '7':
  - type: text
    content: 'If at any time I announce that a nation or kingdom is to be uprooted, torn down and destroyed, '
  '8':
  - type: text
    content: 'and if that nation I warned repents of its evil, then I will relent and not inflict on it the disaster I had planned. '
  '9':
  - type: text
    content: 'And if at another time I announce that a nation or kingdom is to be built up and planted, '
