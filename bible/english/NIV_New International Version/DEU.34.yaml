document_id: DEU.34,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Moses
  - type: text
    content: 'Then Moses climbed Mount Nebo from the plains of Moab to the top of Pisgah, across from Jericho. There the '
  - type: text
    content: Lord
  - type: text
    content: ' showed him the whole land—from Gilead to Dan, '
  '10':
  - type: text
    content: 'Since then, no prophet has risen in Israel like Moses, whom the '
  - type: text
    content: Lord
  - type: text
    content: ' knew face to face, '
  '11':
  - type: text
    content: 'who did all those signs and wonders the '
  - type: text
    content: Lord
  - type: text
    content: ' sent him to do in Egypt—to Pharaoh and to all his officials and to his whole land. '
  '12':
  - type: text
    content: For no one has ever shown the mighty power or performed the awesome deeds that Moses did in the sight of all Israel.
  '2':
  - type: text
    content: 'all of Naphtali, the territory of Ephraim and Manasseh, all the land of Judah as far as the Mediterranean Sea, '
  '3':
  - type: text
    content: 'the Negev and the whole region from the Valley of Jericho, the City of Palms, as far as Zoar. '
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “This is the land I promised on oath to Abraham, Isaac and Jacob when I said, ‘I will give it to your descendants.’ I have let you see it with your eyes, but you will not cross over into it.”'
  '5':
  - type: text
    content: 'And Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' died there in Moab, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said. '
  '6':
  - type: text
    content: He buried him
  - type: note
    content: Or He was buried
  - type: text
    content: ' in Moab, in the valley opposite Beth Peor, but to this day no one knows where his grave is. '
  '7':
  - type: text
    content: 'Moses was a hundred and twenty years old when he died, yet his eyes were not weak nor his strength gone. '
  '8':
  - type: text
    content: The Israelites grieved for Moses in the plains of Moab thirty days, until the time of weeping and mourning was over.
  '9':
  - type: text
    content: Now Joshua son of Nun was filled with the spirit
  - type: note
    content: Or Spirit
  - type: text
    content: ' of wisdom because Moses had laid his hands on him. So the Israelites listened to him and did what the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
