document_id: DEU.34,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Moses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses climbed Mount Nebo from the plains of Moab to the top of Pisgah, across from Jericho. There the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' showed him the whole land—from Gilead to Dan, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since then, no prophet has risen in Israel like Moses, whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' knew face to face, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who did all those signs and wonders the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent him to do in Egypt—to Pharaoh and to all his officials and to his whole land. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For no one has ever shown the mighty power or performed the awesome deeds that Moses did in the sight of all Israel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'all of Naphtali, the territory of Ephraim and Manasseh, all the land of Judah as far as the Mediterranean Sea, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the Negev and the whole region from the Valley of Jericho, the City of Palms, as far as Zoar. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “This is the land I promised on oath to Abraham, Isaac and Jacob when I said, ‘I will give it to your descendants.’ I have let you see it with your eyes, but you will not cross over into it.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' died there in Moab, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He buried him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He was buried
      marker-yv: yv-n
    - type: text
      text: ' in Moab, in the valley opposite Beth Peor, but to this day no one knows where his grave is. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses was a hundred and twenty years old when he died, yet his eyes were not weak nor his strength gone. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Israelites grieved for Moses in the plains of Moab thirty days, until the time of weeping and mourning was over.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Joshua son of Nun was filled with the spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Spirit
      marker-yv: yv-n
    - type: text
      text: ' of wisdom because Moses had laid his hands on him. So the Israelites listened to him and did what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
