document_id: LUK.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judas Agrees to Betray Jesus
  - type: text
    content: 'Now the Festival of Unleavened Bread, called the Passover, was approaching, '
  '10':
  - type: text
    content: 'He replied, '
  - type: text
    content: “As you enter the city, a man carrying a jar of water will meet you. Follow him to the house that he enters,
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'and say to the owner of the house, ‘The Teacher asks: Where is the guest room, where I may eat the Passover with my disciples?’'
  - type: text
    content: ' '
  '12':
  - type: text
    content: He will show you a large room upstairs, all furnished. Make preparations there.”
  '13':
  - type: text
    content: They left and found things just as Jesus had told them. So they prepared the Passover.
  '14':
  - type: text
    content: 'When the hour came, Jesus and his apostles reclined at the table. '
  '15':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “I have eagerly desired to eat this Passover with you before I suffer.
  - type: text
    content: ' '
  '16':
  - type: text
    content: For I tell you, I will not eat it again until it finds fulfillment in the kingdom of God.”
  '17':
  - type: text
    content: 'After taking the cup, he gave thanks and said, '
  - type: text
    content: “Take this and divide it among you.
  - type: text
    content: ' '
  '18':
  - type: text
    content: For I tell you I will not drink again from the fruit of the vine until the kingdom of God comes.”
  '19':
  - type: text
    content: 'And he took bread, gave thanks and broke it, and gave it to them, saying, '
  - type: text
    content: “This is my body given for you; do this in remembrance of me.”
  '2':
  - type: text
    content: 'and the chief priests and the teachers of the law were looking for some way to get rid of Jesus, for they were afraid of the people. '
  '20':
  - type: text
    content: 'In the same way, after the supper he took the cup, saying, '
  - type: text
    content: “This cup is the new covenant in my blood, which is poured out for you.
  - type: note
    content: Some manuscripts do not have given for you… poured out for you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: But the hand of him who is going to betray me is with mine on the table.
  - type: text
    content: ' '
  '22':
  - type: text
    content: The Son of Man will go as it has been decreed. But woe to that man who betrays him!”
  - type: text
    content: ' '
  '23':
  - type: text
    content: They began to question among themselves which of them it might be who would do this.
  '24':
  - type: text
    content: 'A dispute also arose among them as to which of them was considered to be greatest. '
  '25':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “The kings of the Gentiles lord it over them; and those who exercise authority over them call themselves Benefactors.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But you are not to be like that. Instead, the greatest among you should be like the youngest, and the one who rules like the one who serves.
  - type: text
    content: ' '
  '27':
  - type: text
    content: For who is greater, the one who is at the table or the one who serves? Is it not the one who is at the table? But I am among you as one who serves.
  - type: text
    content: ' '
  '28':
  - type: text
    content: You are those who have stood by me in my trials.
  - type: text
    content: ' '
  '29':
  - type: text
    content: And I confer on you a kingdom, just as my Father conferred one on me,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then Satan entered Judas, called Iscariot, one of the Twelve. '
  '30':
  - type: text
    content: so that you may eat and drink at my table in my kingdom and sit on thrones, judging the twelve tribes of Israel.
  '31':
  - type: text
    content: ' '
  - type: text
    content: “Simon, Simon, Satan has asked to sift all of you as wheat.
  - type: text
    content: ' '
  '32':
  - type: text
    content: But I have prayed for you, Simon, that your faith may not fail. And when you have turned back, strengthen your brothers.”
  '33':
  - type: text
    content: But he replied, “Lord, I am ready to go with you to prison and to death.”
  '34':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “I tell you, Peter, before the rooster crows today, you will deny three times that you know me.”
  '35':
  - type: text
    content: 'Then Jesus asked them, '
  - type: text
    content: “When I sent you without purse, bag or sandals, did you lack anything?”
  - type: text
    content: “Nothing,” they answered.
  '36':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “But now if you have a purse, take it, and also a bag; and if you don’t have a sword, sell your cloak and buy one.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'It is written: ‘And he was numbered with the transgressors’'
  - type: note
    content: Isaiah 53:12
  - type: text
    content: ; and I tell you that this must be fulfilled in me. Yes, what is written about me is reaching its fulfillment.”
  '38':
  - type: text
    content: The disciples said, “See, Lord, here are two swords.”
  - type: text
    content: “That’s enough!”
  - type: text
    content: ' he replied.'
  - type: heading
    content: Jesus Prays on the Mount of Olives
  '39':
  - type: text
    content: 'Jesus went out as usual to the Mount of Olives, and his disciples followed him. '
  '4':
  - type: text
    content: 'And Judas went to the chief priests and the officers of the temple guard and discussed with them how he might betray Jesus. '
  '40':
  - type: text
    content: 'On reaching the place, he said to them, '
  - type: text
    content: “Pray that you will not fall into temptation.”
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'He withdrew about a stone’s throw beyond them, knelt down and prayed, '
  '42':
  - type: text
    content: “Father, if you are willing, take this cup from me; yet not my will, but yours be done.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'An angel from heaven appeared to him and strengthened him. '
  '44':
  - type: text
    content: And being in anguish, he prayed more earnestly, and his sweat was like drops of blood falling to the ground.
  - type: note
    content: Many early manuscripts do not have verses 43 and 44.
  '45':
  - type: text
    content: 'When he rose from prayer and went back to the disciples, he found them asleep, exhausted from sorrow. '
  '46':
  - type: text
    content: “Why are you sleeping?”
  - type: text
    content: ' he asked them. '
  - type: text
    content: “Get up and pray so that you will not fall into temptation.”
  - type: heading
    content: Jesus Arrested
  '47':
  - type: text
    content: 'While he was still speaking a crowd came up, and the man who was called Judas, one of the Twelve, was leading them. He approached Jesus to kiss him, '
  '48':
  - type: text
    content: 'but Jesus asked him, '
  - type: text
    content: “Judas, are you betraying the Son of Man with a kiss?”
  '49':
  - type: text
    content: 'When Jesus’ followers saw what was going to happen, they said, “Lord, should we strike with our swords?” '
  '5':
  - type: text
    content: 'They were delighted and agreed to give him money. '
  '50':
  - type: text
    content: And one of them struck the servant of the high priest, cutting off his right ear.
  '51':
  - type: text
    content: 'But Jesus answered, '
  - type: text
    content: “No more of this!”
  - type: text
    content: ' And he touched the man’s ear and healed him.'
  '52':
  - type: text
    content: 'Then Jesus said to the chief priests, the officers of the temple guard, and the elders, who had come for him, '
  - type: text
    content: “Am I leading a rebellion, that you have come with swords and clubs?
  - type: text
    content: ' '
  '53':
  - type: text
    content: Every day I was with you in the temple courts, and you did not lay a hand on me. But this is your hour—when darkness reigns.”
  - type: heading
    content: Peter Disowns Jesus
  '54':
  - type: text
    content: 'Then seizing him, they led him away and took him into the house of the high priest. Peter followed at a distance. '
  '55':
  - type: text
    content: 'And when some there had kindled a fire in the middle of the courtyard and had sat down together, Peter sat down with them. '
  '56':
  - type: text
    content: A servant girl saw him seated there in the firelight. She looked closely at him and said, “This man was with him.”
  '57':
  - type: text
    content: But he denied it. “Woman, I don’t know him,” he said.
  '58':
  - type: text
    content: A little later someone else saw him and said, “You also are one of them.”
  - type: text
    content: “Man, I am not!” Peter replied.
  '59':
  - type: text
    content: About an hour later another asserted, “Certainly this fellow was with him, for he is a Galilean.”
  '6':
  - type: text
    content: He consented, and watched for an opportunity to hand Jesus over to them when no crowd was present.
  - type: heading
    content: The Last Supper
  '60':
  - type: text
    content: 'Peter replied, “Man, I don’t know what you’re talking about!” Just as he was speaking, the rooster crowed. '
  '61':
  - type: text
    content: 'The Lord turned and looked straight at Peter. Then Peter remembered the word the Lord had spoken to him: '
  - type: text
    content: “Before the rooster crows today, you will disown me three times.”
  - type: text
    content: ' '
  '62':
  - type: text
    content: And he went outside and wept bitterly.
  - type: heading
    content: The Guards Mock Jesus
  '63':
  - type: text
    content: 'The men who were guarding Jesus began mocking and beating him. '
  '64':
  - type: text
    content: 'They blindfolded him and demanded, “Prophesy! Who hit you?” '
  '65':
  - type: text
    content: And they said many other insulting things to him.
  - type: heading
    content: Jesus Before Pilate and Herod
  '66':
  - type: text
    content: 'At daybreak the council of the elders of the people, both the chief priests and the teachers of the law, met together, and Jesus was led before them. '
  '67':
  - type: text
    content: “If you are the Messiah,” they said, “tell us.”
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “If I tell you, you will not believe me,
  - type: text
    content: ' '
  '68':
  - type: text
    content: and if I asked you, you would not answer.
  - type: text
    content: ' '
  '69':
  - type: text
    content: But from now on, the Son of Man will be seated at the right hand of the mighty God.”
  '7':
  - type: text
    content: 'Then came the day of Unleavened Bread on which the Passover lamb had to be sacrificed. '
  '70':
  - type: text
    content: They all asked, “Are you then the Son of God?”
  - type: text
    content: 'He replied, '
  - type: text
    content: “You say that I am.”
  '71':
  - type: text
    content: Then they said, “Why do we need any more testimony? We have heard it from his own lips.”
  '8':
  - type: text
    content: 'Jesus sent Peter and John, saying, '
  - type: text
    content: “Go and make preparations for us to eat the Passover.”
  '9':
  - type: text
    content: “Where do you want us to prepare for it?” they asked.
