document_id: LUK.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judas Agrees to Betray Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the Festival of Unleavened Bread, called the Passover, was approaching, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and the chief priests and the teachers of the law were looking for some way to get rid of Jesus, for they were afraid of the people. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Satan entered Judas, called Iscariot, one of the Twelve. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And Judas went to the chief priests and the officers of the temple guard and discussed with them how he might betray Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They were delighted and agreed to give him money. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He consented, and watched for an opportunity to hand Jesus over to them when no crowd was present.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Last Supper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then came the day of Unleavened Bread on which the Passover lamb had to be sacrificed. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus sent Peter and John, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go and make preparations for us to eat the Passover.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Where do you want us to prepare for it?” they asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “As you enter the city, a man carrying a jar of water will meet you. Follow him to the house that he enters,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'and say to the owner of the house, ‘The Teacher asks: Where is the guest room, where I may eat the Passover with my disciples?’'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He will show you a large room upstairs, all furnished. Make preparations there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They left and found things just as Jesus had told them. So they prepared the Passover.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the hour came, Jesus and his apostles reclined at the table. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have eagerly desired to eat this Passover with you before I suffer.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I tell you, I will not eat it again until it finds fulfillment in the kingdom of God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'After taking the cup, he gave thanks and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take this and divide it among you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I tell you I will not drink again from the fruit of the vine until the kingdom of God comes.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he took bread, gave thanks and broke it, and gave it to them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This is my body given for you; do this in remembrance of me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In the same way, after the supper he took the cup, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This cup is the new covenant in my blood, which is poured out for you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:19,20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts do not have '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: given for you… poured out for you.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the hand of him who is going to betray me is with mine on the table.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Son of Man will go as it has been decreed. But woe to that man who betrays him!”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They began to question among themselves which of them it might be who would do this.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A dispute also arose among them as to which of them was considered to be greatest. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The kings of the Gentiles lord it over them; and those who exercise authority over them call themselves Benefactors.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But you are not to be like that. Instead, the greatest among you should be like the youngest, and the one who rules like the one who serves.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For who is greater, the one who is at the table or the one who serves? Is it not the one who is at the table? But I am among you as one who serves.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are those who have stood by me in my trials.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I confer on you a kingdom, just as my Father conferred one on me,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: so that you may eat and drink at my table in my kingdom and sit on thrones, judging the twelve tribes of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Simon, Simon, Satan has asked to sift all of you as wheat.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I have prayed for you, Simon, that your faith may not fail. And when you have turned back, strengthen your brothers.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: But he replied, “Lord, I am ready to go with you to prison and to death.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you, Peter, before the rooster crows today, you will deny three times that you know me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then Jesus asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When I sent you without purse, bag or sandals, did you lack anything?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Nothing,” they answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But now if you have a purse, take it, and also a bag; and if you don’t have a sword, sell your cloak and buy one.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'It is written: ‘And he was numbered with the transgressors’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 53:12
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ; and I tell you that this must be fulfilled in me. Yes, what is written about me is reaching its fulfillment.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: The disciples said, “See, Lord, here are two swords.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “That’s enough!”
  - type: text
    text: ' he replied.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Prays on the Mount of Olives
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jesus went out as usual to the Mount of Olives, and his disciples followed him. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'On reaching the place, he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Pray that you will not fall into temptation.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'He withdrew about a stone’s throw beyond them, knelt down and prayed, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, if you are willing, take this cup from me; yet not my will, but yours be done.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'An angel from heaven appeared to him and strengthened him. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: And being in anguish, he prayed more earnestly, and his sweat was like drops of blood falling to the ground.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:43,44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many early manuscripts do not have verses 43 and 44.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'When he rose from prayer and went back to the disciples, he found them asleep, exhausted from sorrow. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you sleeping?”
  - type: text
    text: ' he asked them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Get up and pray so that you will not fall into temptation.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Arrested
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'While he was still speaking a crowd came up, and the man who was called Judas, one of the Twelve, was leading them. He approached Jesus to kiss him, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'but Jesus asked him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Judas, are you betraying the Son of Man with a kiss?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'When Jesus’ followers saw what was going to happen, they said, “Lord, should we strike with our swords?” '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: And one of them struck the servant of the high priest, cutting off his right ear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'But Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No more of this!”
  - type: text
    text: ' And he touched the man’s ear and healed him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Then Jesus said to the chief priests, the officers of the temple guard, and the elders, who had come for him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Am I leading a rebellion, that you have come with swords and clubs?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Every day I was with you in the temple courts, and you did not lay a hand on me. But this is your hour—when darkness reigns.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Disowns Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Then seizing him, they led him away and took him into the house of the high priest. Peter followed at a distance. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'And when some there had kindled a fire in the middle of the courtyard and had sat down together, Peter sat down with them. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: A servant girl saw him seated there in the firelight. She looked closely at him and said, “This man was with him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: But he denied it. “Woman, I don’t know him,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: A little later someone else saw him and said, “You also are one of them.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Man, I am not!” Peter replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: About an hour later another asserted, “Certainly this fellow was with him, for he is a Galilean.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Peter replied, “Man, I don’t know what you’re talking about!” Just as he was speaking, the rooster crowed. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'The Lord turned and looked straight at Peter. Then Peter remembered the word the Lord had spoken to him: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Before the rooster crows today, you will disown me three times.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: And he went outside and wept bitterly.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Guards Mock Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'The men who were guarding Jesus began mocking and beating him. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'They blindfolded him and demanded, “Prophesy! Who hit you?” '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: And they said many other insulting things to him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Before Pilate and Herod
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'At daybreak the council of the elders of the people, both the chief priests and the teachers of the law, met together, and Jesus was led before them. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: “If you are the Messiah,” they said, “tell us.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If I tell you, you will not believe me,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and if I asked you, you would not answer.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But from now on, the Son of Man will be seated at the right hand of the mighty God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: They all asked, “Are you then the Son of God?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You say that I am.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: Then they said, “Why do we need any more testimony? We have heard it from his own lips.”
