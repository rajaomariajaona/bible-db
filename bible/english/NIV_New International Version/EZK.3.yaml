document_id: EZK.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to me, “Son of man, eat what is before you, eat this scroll; then go and speak to the people of Israel.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to me, “Son of man, listen carefully and take to heart all the words I speak to you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go now to your people in exile and speak to them. Say to them, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says,’ whether they listen or fail to listen.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Spirit lifted me up, and I heard behind me a loud rumbling sound as the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rose from the place where it was standing.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Probable reading of the original Hebrew text; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sound—may the glory of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' be praised from his place'
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was the sound of the wings of the living creatures brushing against each other and the sound of the wheels beside them, a loud rumbling sound. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Spirit then lifted me up and took me away, and I went in bitterness and in the anger of my spirit, with the strong hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on me. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I came to the exiles who lived at Tel Aviv near the Kebar River. And there, where they were living, I sat among them for seven days—deeply distressed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezekiel’s Task as Watchman
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the end of seven days the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, I have made you a watchman for the people of Israel; so hear the word I speak and give them warning from me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When I say to a wicked person, ‘You will surely die,’ and you do not warn them or speak out to dissuade them from their evil ways in order to save their life, that wicked person will die for
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 19 and 20
      marker-yv: yv-n
    - type: text
      text: ' their sin, and I will hold you accountable for their blood. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you do warn the wicked person and they do not turn from their wickedness or from their evil ways, they will die for their sin; but you will have saved yourself.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I opened my mouth, and he gave me the scroll to eat.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Again, when a righteous person turns from their righteousness and does evil, and I put a stumbling block before them, they will die. Since you did not warn them, they will die for their sin. The righteous things that person did will not be remembered, and I will hold you accountable for their blood. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you do warn the righteous person not to sin and they do not sin, they will surely live because they took warning, and you will have saved yourself.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was on me there, and he said to me, “Get up and go out to the plain, and there I will speak to you.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I got up and went out to the plain. And the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was standing there, like the glory I had seen by the Kebar River, and I fell facedown.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Spirit came into me and raised me to my feet. He spoke to me and said: “Go, shut yourself inside your house. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you, son of man, they will tie with ropes; you will be bound so that you cannot go out among the people. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make your tongue stick to the roof of your mouth so that you will be silent and unable to rebuke them, for they are a rebellious people. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when I speak to you, I will open your mouth and you shall say to them, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says.’ Whoever will listen let them listen, and whoever will refuse let them refuse; for they are a rebellious people.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he said to me, “Son of man, eat this scroll I am giving you and fill your stomach with it.” So I ate it, and it tasted as sweet as honey in my mouth.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He then said to me: “Son of man, go now to the people of Israel and speak my words to them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are not being sent to a people of obscure speech and strange language, but to the people of Israel— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not to many peoples of obscure speech and strange language, whose words you cannot understand. Surely if I had sent you to them, they would have listened to you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people of Israel are not willing to listen to you because they are not willing to listen to me, for all the Israelites are hardened and obstinate. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will make you as unyielding and hardened as they are. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make your forehead like the hardest stone, harder than flint. Do not be afraid of them or terrified by them, though they are a rebellious people.”
