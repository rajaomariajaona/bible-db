document_id: EZK.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'And he said to me, “Son of man, eat what is before you, eat this scroll; then go and speak to the people of Israel.” '
  '10':
  - type: text
    content: 'And he said to me, “Son of man, listen carefully and take to heart all the words I speak to you. '
  '11':
  - type: text
    content: 'Go now to your people in exile and speak to them. Say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says,’ whether they listen or fail to listen.”'
  '12':
  - type: text
    content: 'Then the Spirit lifted me up, and I heard behind me a loud rumbling sound as the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' rose from the place where it was standing.'
  - type: note
    content: Probable reading of the original Hebrew text; Masoretic Text sound—may the glory of the Lord be praised from his place
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'It was the sound of the wings of the living creatures brushing against each other and the sound of the wheels beside them, a loud rumbling sound. '
  '14':
  - type: text
    content: 'The Spirit then lifted me up and took me away, and I went in bitterness and in the anger of my spirit, with the strong hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' on me. '
  '15':
  - type: text
    content: I came to the exiles who lived at Tel Aviv near the Kebar River. And there, where they were living, I sat among them for seven days—deeply distressed.
  - type: heading
    content: Ezekiel’s Task as Watchman
  '16':
  - type: text
    content: 'At the end of seven days the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '17':
  - type: text
    content: '“Son of man, I have made you a watchman for the people of Israel; so hear the word I speak and give them warning from me. '
  '18':
  - type: text
    content: When I say to a wicked person, ‘You will surely die,’ and you do not warn them or speak out to dissuade them from their evil ways in order to save their life, that wicked person will die for
  - type: note
    content: Or in; also in verses 19 and 20
  - type: text
    content: ' their sin, and I will hold you accountable for their blood. '
  '19':
  - type: text
    content: But if you do warn the wicked person and they do not turn from their wickedness or from their evil ways, they will die for their sin; but you will have saved yourself.
  '2':
  - type: text
    content: So I opened my mouth, and he gave me the scroll to eat.
  '20':
  - type: text
    content: '“Again, when a righteous person turns from their righteousness and does evil, and I put a stumbling block before them, they will die. Since you did not warn them, they will die for their sin. The righteous things that person did will not be remembered, and I will hold you accountable for their blood. '
  '21':
  - type: text
    content: But if you do warn the righteous person not to sin and they do not sin, they will surely live because they took warning, and you will have saved yourself.”
  '22':
  - type: text
    content: 'The hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was on me there, and he said to me, “Get up and go out to the plain, and there I will speak to you.” '
  '23':
  - type: text
    content: 'So I got up and went out to the plain. And the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' was standing there, like the glory I had seen by the Kebar River, and I fell facedown.'
  '24':
  - type: text
    content: 'Then the Spirit came into me and raised me to my feet. He spoke to me and said: “Go, shut yourself inside your house. '
  '25':
  - type: text
    content: 'And you, son of man, they will tie with ropes; you will be bound so that you cannot go out among the people. '
  '26':
  - type: text
    content: 'I will make your tongue stick to the roof of your mouth so that you will be silent and unable to rebuke them, for they are a rebellious people. '
  '27':
  - type: text
    content: 'But when I speak to you, I will open your mouth and you shall say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says.’ Whoever will listen let them listen, and whoever will refuse let them refuse; for they are a rebellious people.'
  '3':
  - type: text
    content: Then he said to me, “Son of man, eat this scroll I am giving you and fill your stomach with it.” So I ate it, and it tasted as sweet as honey in my mouth.
  '4':
  - type: text
    content: 'He then said to me: “Son of man, go now to the people of Israel and speak my words to them. '
  '5':
  - type: text
    content: 'You are not being sent to a people of obscure speech and strange language, but to the people of Israel— '
  '6':
  - type: text
    content: 'not to many peoples of obscure speech and strange language, whose words you cannot understand. Surely if I had sent you to them, they would have listened to you. '
  '7':
  - type: text
    content: 'But the people of Israel are not willing to listen to you because they are not willing to listen to me, for all the Israelites are hardened and obstinate. '
  '8':
  - type: text
    content: 'But I will make you as unyielding and hardened as they are. '
  '9':
  - type: text
    content: I will make your forehead like the hardest stone, harder than flint. Do not be afraid of them or terrified by them, though they are a rebellious people.”
