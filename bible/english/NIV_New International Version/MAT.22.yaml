document_id: MAT.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Wedding Banquet
  - type: text
    content: 'Jesus spoke to them again in parables, saying: '
  '10':
  - type: text
    content: So the servants went out into the streets and gathered all the people they could find, the bad as well as the good, and the wedding hall was filled with guests.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “But when the king came in to see the guests, he noticed a man there who was not wearing wedding clothes.
  - type: text
    content: ' '
  '12':
  - type: text
    content: He asked, ‘How did you get in here without wedding clothes, friend?’ The man was speechless.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “Then the king told the attendants, ‘Tie him hand and foot, and throw him outside, into the darkness, where there will be weeping and gnashing of teeth.’
  '14':
  - type: text
    content: ' '
  - type: text
    content: “For many are invited, but few are chosen.”
  - type: heading
    content: Paying the Imperial Tax to Caesar
  '15':
  - type: text
    content: 'Then the Pharisees went out and laid plans to trap him in his words. '
  '16':
  - type: text
    content: 'They sent their disciples to him along with the Herodians. “Teacher,” they said, “we know that you are a man of integrity and that you teach the way of God in accordance with the truth. You aren’t swayed by others, because you pay no attention to who they are. '
  '17':
  - type: text
    content: Tell us then, what is your opinion? Is it right to pay the imperial tax
  - type: note
    content: A special tax levied on subject peoples, not on Roman citizens
  - type: text
    content: ' to Caesar or not?”'
  '18':
  - type: text
    content: 'But Jesus, knowing their evil intent, said, '
  - type: text
    content: “You hypocrites, why are you trying to trap me?
  - type: text
    content: ' '
  '19':
  - type: text
    content: Show me the coin used for paying the tax.”
  - type: text
    content: ' They brought him a denarius, '
  '2':
  - type: text
    content: “The kingdom of heaven is like a king who prepared a wedding banquet for his son.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'and he asked them, '
  - type: text
    content: “Whose image is this? And whose inscription?”
  '21':
  - type: text
    content: “Caesar’s,” they replied.
  - type: text
    content: 'Then he said to them, '
  - type: text
    content: “So give back to Caesar what is Caesar’s, and to God what is God’s.”
  '22':
  - type: text
    content: When they heard this, they were amazed. So they left him and went away.
  - type: heading
    content: Marriage at the Resurrection
  '23':
  - type: text
    content: 'That same day the Sadducees, who say there is no resurrection, came to him with a question. '
  '24':
  - type: text
    content: '“Teacher,” they said, “Moses told us that if a man dies without having children, his brother must marry the widow and raise up offspring for him. '
  '25':
  - type: text
    content: 'Now there were seven brothers among us. The first one married and died, and since he had no children, he left his wife to his brother. '
  '26':
  - type: text
    content: 'The same thing happened to the second and third brother, right on down to the seventh. '
  '27':
  - type: text
    content: 'Finally, the woman died. '
  '28':
  - type: text
    content: Now then, at the resurrection, whose wife will she be of the seven, since all of them were married to her?”
  '29':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You are in error because you do not know the Scriptures or the power of God.
  - type: text
    content: ' '
  '3':
  - type: text
    content: He sent his servants to those who had been invited to the banquet to tell them to come, but they refused to come.
  '30':
  - type: text
    content: At the resurrection people will neither marry nor be given in marriage; they will be like the angels in heaven.
  - type: text
    content: ' '
  '31':
  - type: text
    content: But about the resurrection of the dead—have you not read what God said to you,
  - type: text
    content: ' '
  '32':
  - type: text
    content: ‘I am the God of Abraham, the God of Isaac, and the God of Jacob’
  - type: note
    content: Exodus 3:6
  - type: text
    content: '? He is not the God of the dead but of the living.”'
  '33':
  - type: text
    content: When the crowds heard this, they were astonished at his teaching.
  - type: heading
    content: The Greatest Commandment
  '34':
  - type: text
    content: 'Hearing that Jesus had silenced the Sadducees, the Pharisees got together. '
  '35':
  - type: text
    content: 'One of them, an expert in the law, tested him with this question: '
  '36':
  - type: text
    content: “Teacher, which is the greatest commandment in the Law?”
  '37':
  - type: text
    content: 'Jesus replied: '
  - type: text
    content: “ ‘Love the Lord your God with all your heart and with all your soul and with all your mind.’
  - type: note
    content: Deut. 6:5
  - type: text
    content: ' '
  '38':
  - type: text
    content: This is the first and greatest commandment.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And the second is like it: ‘Love your neighbor as yourself.’'
  - type: note
    content: Lev. 19:18
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: '“Then he sent some more servants and said, ‘Tell those who have been invited that I have prepared my dinner: My oxen and fattened cattle have been butchered, and everything is ready. Come to the wedding banquet.’'
  '40':
  - type: text
    content: All the Law and the Prophets hang on these two commandments.”
  - type: heading
    content: Whose Son Is the Messiah?
  '41':
  - type: text
    content: 'While the Pharisees were gathered together, Jesus asked them, '
  '42':
  - type: text
    content: “What do you think about the Messiah? Whose son is he?”
  - type: text
    content: “The son of David,” they replied.
  '43':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “How is it then that David, speaking by the Spirit, calls him ‘Lord’? For he says,
  '44':
  - type: text
    content: ' '
  - type: text
    content: '“ ‘The Lord said to my Lord:'
  - type: text
    content: “Sit at my right hand
  - type: text
    content: until I put your enemies
  - type: text
    content: under your feet.” ’
  - type: note
    content: Psalm 110:1
  '45':
  - type: text
    content: ' '
  - type: text
    content: If then David calls him ‘Lord,’ how can he be his son?”
  - type: text
    content: ' '
  '46':
  - type: text
    content: No one could say a word in reply, and from that day on no one dared to ask him any more questions.
  '5':
  - type: text
    content: ' '
  - type: text
    content: “But they paid no attention and went off—one to his field, another to his business.
  - type: text
    content: ' '
  '6':
  - type: text
    content: The rest seized his servants, mistreated them and killed them.
  - type: text
    content: ' '
  '7':
  - type: text
    content: The king was enraged. He sent his army and destroyed those murderers and burned their city.
  '8':
  - type: text
    content: ' '
  - type: text
    content: “Then he said to his servants, ‘The wedding banquet is ready, but those I invited did not deserve to come.
  - type: text
    content: ' '
  '9':
  - type: text
    content: So go to the street corners and invite to the banquet anyone you find.’
  - type: text
    content: ' '
