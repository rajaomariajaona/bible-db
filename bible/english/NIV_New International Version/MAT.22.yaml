document_id: MAT.22,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parable of the Wedding Banquet
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus spoke to them again in parables, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So the servants went out into the streets and gathered all the people they could find, the bad as well as the good, and the wedding hall was filled with guests.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But when the king came in to see the guests, he noticed a man there who was not wearing wedding clothes.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He asked, ‘How did you get in here without wedding clothes, friend?’ The man was speechless.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then the king told the attendants, ‘Tie him hand and foot, and throw him outside, into the darkness, where there will be weeping and gnashing of teeth.’
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “For many are invited, but few are chosen.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paying the Imperial Tax to Caesar
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Pharisees went out and laid plans to trap him in his words. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They sent their disciples to him along with the Herodians. “Teacher,” they said, “we know that you are a man of integrity and that you teach the way of God in accordance with the truth. You aren’t swayed by others, because you pay no attention to who they are. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tell us then, what is your opinion? Is it right to pay the imperial tax
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A special tax levied on subject peoples, not on Roman citizens
      marker-yv: yv-n
    - type: text
      text: ' to Caesar or not?”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus, knowing their evil intent, said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You hypocrites, why are you trying to trap me?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Show me the coin used for paying the tax.”
    - type: text
      text: ' They brought him a denarius, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The kingdom of heaven is like a king who prepared a wedding banquet for his son.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whose image is this? And whose inscription?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Caesar’s,” they replied.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So give back to Caesar what is Caesar’s, and to God what is God’s.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they heard this, they were amazed. So they left him and went away.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Marriage at the Resurrection
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That same day the Sadducees, who say there is no resurrection, came to him with a question. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Teacher,” they said, “Moses told us that if a man dies without having children, his brother must marry the widow and raise up offspring for him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there were seven brothers among us. The first one married and died, and since he had no children, he left his wife to his brother. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The same thing happened to the second and third brother, right on down to the seventh. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, the woman died. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now then, at the resurrection, whose wife will she be of the seven, since all of them were married to her?”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are in error because you do not know the Scriptures or the power of God.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He sent his servants to those who had been invited to the banquet to tell them to come, but they refused to come.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: At the resurrection people will neither marry nor be given in marriage; they will be like the angels in heaven.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But about the resurrection of the dead—have you not read what God said to you,
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘I am the God of Abraham, the God of Isaac, and the God of Jacob’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 3:6
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '? He is not the God of the dead but of the living.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the crowds heard this, they were astonished at his teaching.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Greatest Commandment
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hearing that Jesus had silenced the Sadducees, the Pharisees got together. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of them, an expert in the law, tested him with this question: '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Teacher, which is the greatest commandment in the Law?”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “ ‘Love the Lord your God with all your heart and with all your soul and with all your mind.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 6:5
      marker-yv: yv-n
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is the first and greatest commandment.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And the second is like it: ‘Love your neighbor as yourself.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lev. 19:18
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Then he sent some more servants and said, ‘Tell those who have been invited that I have prepared my dinner: My oxen and fattened cattle have been butchered, and everything is ready. Come to the wedding banquet.’'
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All the Law and the Prophets hang on these two commandments.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Whose Son Is the Messiah?
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While the Pharisees were gathered together, Jesus asked them, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you think about the Messiah? Whose son is he?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “The son of David,” they replied.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How is it then that David, speaking by the Spirit, calls him ‘Lord’? For he says,
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“ ‘The Lord said to my Lord:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Sit at my right hand
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: until I put your enemies
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: under your feet.” ’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 110:1
      marker-yv: yv-n
  '45':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If then David calls him ‘Lord,’ how can he be his son?”
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: m
    children:
    - type: text
      text: No one could say a word in reply, and from that day on no one dared to ask him any more questions.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But they paid no attention and went off—one to his field, another to his business.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The rest seized his servants, mistreated them and killed them.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The king was enraged. He sent his army and destroyed those murderers and burned their city.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then he said to his servants, ‘The wedding banquet is ready, but those I invited did not deserve to come.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So go to the street corners and invite to the banquet anyone you find.’
    - type: text
      text: ' '
