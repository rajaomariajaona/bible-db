  - type: text
    content: at the mountain where God chooses to reign,
  - type: text
    content: 'where the '
  - type: text
    content: Lord
  - type: text
    content: ' himself will dwell forever?'
  '17':
  - type: text
    content: The chariots of God are tens of thousands
  - type: text
    content: and thousands of thousands;
  - type: text
    content: the Lord has come from Sinai into his sanctuary.
  - type: note
