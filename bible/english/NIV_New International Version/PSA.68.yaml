document_id: PSA.68,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 68
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 68:1-35 is numbered 68:2-36.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. Of David. A psalm. A song.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May God arise, may his enemies be scattered;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may his foes flee before him.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your people settled in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from your bounty, God, you provided for the poor.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord announces the word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the women who proclaim it are a mighty throng:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Kings and armies flee in haste;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the women at home divide the plunder.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even while you sleep among the sheep pens,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the campfires; '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the saddlebags
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wings of my dove are sheathed with silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its feathers with shining gold.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the Almighty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shaddai
      marker-yv: yv-n
    - type: text
      text: ' scattered the kings in the land,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was like snow fallen on Mount Zalmon.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mount Bashan, majestic mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Mount Bashan, rugged mountain,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: why gaze in envy, you rugged mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the mountain where God chooses to reign,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'where the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' himself will dwell forever?'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The chariots of God are tens of thousands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thousands of thousands;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Lord has come from Sinai into his sanctuary.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Probable reading of the original Hebrew text; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Lord is among them at Sinai in holiness
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you ascended on high,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you took many captives;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you received gifts from people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even from
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gifts for people, / even
      marker-yv: yv-n
    - type: text
      text: ' the rebellious—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, might dwell there.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise be to the Lord, to God our Savior,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who daily bears our burdens.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May you blow them away like smoke—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as wax melts before the fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may the wicked perish before God.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our God is a God who saves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' comes escape from death.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely God will crush the heads of his enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hairy crowns of those who go on in their sins.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord says, “I will bring them from Bashan;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will bring them from the depths of the sea,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that your feet may wade in the blood of your foes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while the tongues of your dogs have their share.”
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your procession, God, has come into view,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the procession of my God and King into the sanctuary.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In front are the singers, after them the musicians;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with them are the young women playing the timbrels.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise God in the great congregation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the assembly of Israel.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is the little tribe of Benjamin, leading them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there the great throng of Judah’s princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there the princes of Zebulun and of Naphtali.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Summon your power, God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts, Septuagint and Syriac; most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Your God has summoned power for you
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: show us your strength, our God, as you have done before.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of your temple at Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: kings will bring you gifts.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But may the righteous be glad
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rejoice before God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may they be happy and joyful.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rebuke the beast among the reeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the herd of bulls among the calves of the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Humbled, may the beast bring bars of silver.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Scatter the nations who delight in war.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Envoys will come from Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cush
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the upper Nile region
      marker-yv: yv-n
    - type: text
      text: ' will submit herself to God.'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing to God, you kingdoms of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sing praise to the Lord,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to him who rides across the highest heavens, the ancient heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who thunders with mighty voice.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Proclaim the power of God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose majesty is over Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose power is in the heavens.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, God, are awesome in your sanctuary;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Israel gives power and strength to his people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise be to God!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing to God, sing in praise of his name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: extol him who rides on the clouds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: name, / prepare the way for him who rides through the deserts
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'rejoice before him—his name is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A father to the fatherless, a defender of widows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is God in his holy dwelling.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God sets the lonely in families,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the desolate in a homeland
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he leads out the prisoners with singing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the rebellious live in a sun-scorched land.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you, God, went out before your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you marched through the wilderness,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verses 19 and 32.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the earth shook, the heavens poured down rain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before God, the One of Sinai,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before God, the God of Israel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave abundant showers, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you refreshed your weary inheritance.
