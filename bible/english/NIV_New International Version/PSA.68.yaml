    content: Psalm 68In Hebrew texts 68:1-35 is numbered 68:2-36.
  - type: text
    content: For the director of music. Of David. A psalm. A song.
  - type: text
    content: May God arise, may his enemies be scattered;
  - type: text
    content: may his foes flee before him.
  '10':
  - type: text
    content: Your people settled in it,
  - type: text
    content: and from your bounty, God, you provided for the poor.
  '11':
  - type: text
    content: The Lord announces the word,
  - type: text
    content: 'and the women who proclaim it are a mighty throng:'
  '12':
  - type: text
    content: “Kings and armies flee in haste;
  - type: text
    content: the women at home divide the plunder.
  '13':
  - type: text
    content: Even while you sleep among the sheep pens,
  - type: note
    content: Or the campfires; or the saddlebags
  - type: text
    content: the wings of my dove are sheathed with silver,
  - type: text
    content: its feathers with shining gold.”
  '14':
  - type: text
    content: When the Almighty
  - type: note
