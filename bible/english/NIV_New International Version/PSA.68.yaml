  '19':
  - type: text
    content: Praise be to the Lord, to God our Savior,
  - type: text
    content: who daily bears our burdens.
  '2':
  - type: text
    content: May you blow them away like smoke—
  - type: text
    content: as wax melts before the fire,
  - type: text
    content: may the wicked perish before God.
  '20':
  - type: text
    content: Our God is a God who saves;
  - type: text
    content: 'from the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' comes escape from death.'
  '21':
  - type: text
    content: Surely God will crush the heads of his enemies,
  - type: text
    content: the hairy crowns of those who go on in their sins.
  '22':
  - type: text
    content: The Lord says, “I will bring them from Bashan;
  - type: text
    content: I will bring them from the depths of the sea,
  '23':
  - type: text
    content: that your feet may wade in the blood of your foes,
  - type: text
    content: while the tongues of your dogs have their share.”
  '24':
  - type: text
    content: Your procession, God, has come into view,
  - type: text
    content: the procession of my God and King into the sanctuary.
  '25':
  - type: text
    content: In front are the singers, after them the musicians;
  - type: text
    content: with them are the young women playing the timbrels.
  '26':
  - type: text
    content: Praise God in the great congregation;
  - type: text
    content: 'praise the '
  - type: text
    content: Lord
  - type: text
    content: ' in the assembly of Israel.'
  '27':
  - type: text
    content: There is the little tribe of Benjamin, leading them,
  - type: text
    content: there the great throng of Judah’s princes,
  - type: text
    content: and there the princes of Zebulun and of Naphtali.
  '28':
  - type: text
    content: Summon your power, God
  - type: note
    content: Many Hebrew manuscripts, Septuagint and Syriac; most Hebrew manuscripts Your God has summoned power for you
  - type: text
    content: ;
  - type: text
    content: show us your strength, our God, as you have done before.
  '29':
  - type: text
    content: Because of your temple at Jerusalem
  - type: text
    content: kings will bring you gifts.
  '3':
  - type: text
    content: But may the righteous be glad
  - type: text
    content: and rejoice before God;
  - type: text
    content: may they be happy and joyful.
  '30':
  - type: text
    content: Rebuke the beast among the reeds,
  - type: text
    content: the herd of bulls among the calves of the nations.
  - type: text
    content: Humbled, may the beast bring bars of silver.
  - type: text
    content: Scatter the nations who delight in war.
  '31':
  - type: text
    content: Envoys will come from Egypt;
  - type: text
    content: Cush
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: ' will submit herself to God.'
  '32':
  - type: text
    content: Sing to God, you kingdoms of the earth,
  - type: text
    content: sing praise to the Lord,
  '33':
  - type: text
    content: to him who rides across the highest heavens, the ancient heavens,
  - type: text
    content: who thunders with mighty voice.
  '34':
  - type: text
    content: Proclaim the power of God,
  - type: text
    content: whose majesty is over Israel,
  - type: text
    content: whose power is in the heavens.
  '35':
  - type: text
    content: You, God, are awesome in your sanctuary;
  - type: text
    content: the God of Israel gives power and strength to his people.
  - type: text
    content: Praise be to God!
  '4':
  - type: text
    content: Sing to God, sing in praise of his name,
  - type: text
    content: extol him who rides on the clouds
  - type: note
    content: Or name, / prepare the way for him who rides through the deserts
  - type: text
    content: ;
  - type: text
    content: 'rejoice before him—his name is the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: A father to the fatherless, a defender of widows,
  - type: text
    content: is God in his holy dwelling.
  '6':
  - type: text
    content: God sets the lonely in families,
  - type: note
    content: Or the desolate in a homeland
  - type: text
    content: he leads out the prisoners with singing;
  - type: text
    content: but the rebellious live in a sun-scorched land.
  '7':
  - type: text
    content: When you, God, went out before your people,
  - type: text
    content: when you marched through the wilderness,
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verses 19 and 32.
  '8':
  - type: text
    content: the earth shook, the heavens poured down rain,
  - type: text
    content: before God, the One of Sinai,
  - type: text
    content: before God, the God of Israel.
  '9':
  - type: text
    content: You gave abundant showers, O God;
  - type: text
    content: you refreshed your weary inheritance.
