document_id: EZK.38,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Great Victory Over the Nations
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: On that day thoughts will come into your mind and you will devise an evil scheme. '
  '11':
  - type: text
    content: 'You will say, “I will invade a land of unwalled villages; I will attack a peaceful and unsuspecting people—all of them living without walls and without gates and bars. '
  '12':
  - type: text
    content: I will plunder and loot and turn my hand against the resettled ruins and the people gathered from the nations, rich in livestock and goods, living at the center of the land.
  - type: note
    content: The Hebrew for this phrase means the navel of the earth.
  - type: text
    content: '” '
  '13':
  - type: text
    content: Sheba and Dedan and the merchants of Tarshish and all her villages
  - type: note
    content: Or her strong lions
  - type: text
    content: ' will say to you, “Have you come to plunder? Have you gathered your hordes to loot, to carry off silver and gold, to take away livestock and goods and to seize much plunder?” ’'
  '14':
  - type: text
    content: '“Therefore, son of man, prophesy and say to Gog: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: In that day, when my people Israel are living in safety, will you not take notice of it? '
  '15':
  - type: text
    content: 'You will come from your place in the far north, you and many nations with you, all of them riding on horses, a great horde, a mighty army. '
  '16':
  - type: text
    content: You will advance against my people Israel like a cloud that covers the land. In days to come, Gog, I will bring you against my land, so that the nations may know me when I am proved holy through you before their eyes.
  '17':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: You are the one I spoke of in former days by my servants the prophets of Israel. At that time they prophesied for years that I would bring you against them. '
  '18':
  - type: text
    content: 'This is what will happen in that day: When Gog attacks the land of Israel, my hot anger will be aroused, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'In my zeal and fiery wrath I declare that at that time there shall be a great earthquake in the land of Israel. '
  '2':
  - type: text
    content: “Son of man, set your face against Gog, of the land of Magog, the chief prince of
  - type: note
    content: Or the prince of Rosh,
  - type: text
    content: ' Meshek and Tubal; prophesy against him '
  '20':
  - type: text
    content: 'The fish in the sea, the birds in the sky, the beasts of the field, every creature that moves along the ground, and all the people on the face of the earth will tremble at my presence. The mountains will be overturned, the cliffs will crumble and every wall will fall to the ground. '
  '21':
  - type: text
    content: 'I will summon a sword against Gog on all my mountains, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. Every man’s sword will be against his brother. '
  '22':
  - type: text
    content: 'I will execute judgment on him with plague and bloodshed; I will pour down torrents of rain, hailstones and burning sulfur on him and on his troops and on the many nations with him. '
  '23':
  - type: text
    content: 'And so I will show my greatness and my holiness, and I will make myself known in the sight of many nations. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’
  '3':
  - type: text
    content: 'and say: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am against you, Gog, chief prince of'
  - type: note
    content: Or Gog, prince of Rosh,
  - type: text
    content: ' Meshek and Tubal. '
  '4':
  - type: text
    content: 'I will turn you around, put hooks in your jaws and bring you out with your whole army—your horses, your horsemen fully armed, and a great horde with large and small shields, all of them brandishing their swords. '
  '5':
  - type: text
    content: Persia, Cush
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: ' and Put will be with them, all with shields and helmets, '
  '6':
  - type: text
    content: also Gomer with all its troops, and Beth Togarmah from the far north with all its troops—the many nations with you.
  '7':
  - type: text
    content: '“ ‘Get ready; be prepared, you and all the hordes gathered about you, and take command of them. '
  '8':
  - type: text
    content: 'After many days you will be called to arms. In future years you will invade a land that has recovered from war, whose people were gathered from many nations to the mountains of Israel, which had long been desolate. They had been brought out from the nations, and now all of them live in safety. '
  '9':
  - type: text
    content: You and all your troops and the many nations with you will go up, advancing like a storm; you will be like a cloud covering the land.
