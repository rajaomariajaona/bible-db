document_id: JDG.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gideon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Israelites did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and for seven years he gave them into the hands of the Midianites. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I said to you, ‘I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God; do not worship the gods of the Amorites, in whose land you live.’ But you have not listened to me.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came and sat down under the oak in Ophrah that belonged to Joash the Abiezrite, where his son Gideon was threshing wheat in a winepress to keep it from the Midianites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to Gideon, he said, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is with you, mighty warrior.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Pardon me, my lord,” Gideon replied, “but if the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is with us, why has all this happened to us? Where are all his wonders that our ancestors told us about when they said, ‘Did not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bring us up out of Egypt?’ But now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has abandoned us and given us into the hand of Midian.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' turned to him and said, “Go in the strength you have and save Israel out of Midian’s hand. Am I not sending you?”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Pardon me, my lord,” Gideon replied, “but how can I save Israel? My clan is the weakest in Manasseh, and I am the least in my family.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered, “I will be with you, and you will strike down all the Midianites, leaving none alive.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gideon replied, “If now I have found favor in your eyes, give me a sign that it is really you talking to me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Please do not go away until I come back and bring my offering and set it before you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “I will wait until you return.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Gideon went inside, prepared a young goat, and from an ephah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 36 pounds or about 16 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of flour he made bread without yeast. Putting the meat in a basket and its broth in a pot, he brought them out and offered them to him under the oak.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because the power of Midian was so oppressive, the Israelites prepared shelters for themselves in mountain clefts, caves and strongholds. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel of God said to him, “Take the meat and the unleavened bread, place them on this rock, and pour out the broth.” And Gideon did so. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' touched the meat and the unleavened bread with the tip of the staff that was in his hand. Fire flared from the rock, consuming the meat and the bread. And the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' disappeared. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Gideon realized that it was the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he exclaimed, “Alas, Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! I have seen the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' face to face!”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Peace! Do not be afraid. You are not going to die.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Gideon built an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' there and called it The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Is Peace. To this day it stands in Ophrah of the Abiezrites.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That same night the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Take the second bull from your father’s herd, the one seven years old.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Take a full-grown, mature bull from your father’s herd
      marker-yv: yv-n
    - type: text
      text: ' Tear down your father’s altar to Baal and cut down the Asherah pole'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, a wooden symbol of the goddess Asherah; also in verses 26, 28 and 30
      marker-yv: yv-n
    - type: text
      text: ' beside it. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then build a proper kind of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: build with layers of stone an
      marker-yv: yv-n
    - type: text
      text: ' altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God on the top of this height. Using the wood of the Asherah pole that you cut down, offer the second'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: full-grown
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 28
      marker-yv: yv-n
    - type: text
      text: ' bull as a burnt offering.”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Gideon took ten of his servants and did as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him. But because he was afraid of his family and the townspeople, he did it at night rather than in the daytime.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the morning when the people of the town got up, there was Baal’s altar, demolished, with the Asherah pole beside it cut down and the second bull sacrificed on the newly built altar!
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They asked each other, “Who did this?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they carefully investigated, they were told, “Gideon son of Joash did it.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever the Israelites planted their crops, the Midianites, Amalekites and other eastern peoples invaded the country. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people of the town demanded of Joash, “Bring out your son. He must die, because he has broken down Baal’s altar and cut down the Asherah pole beside it.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Joash replied to the hostile crowd around him, “Are you going to plead Baal’s cause? Are you trying to save him? Whoever fights for him shall be put to death by morning! If Baal really is a god, he can defend himself when someone breaks down his altar.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So because Gideon broke down Baal’s altar, they gave him the name Jerub-Baal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jerub-Baal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probably means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: let Baal contend
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' that day, saying, “Let Baal contend with him.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now all the Midianites, Amalekites and other eastern peoples joined forces and crossed over the Jordan and camped in the Valley of Jezreel. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came on Gideon, and he blew a trumpet, summoning the Abiezrites to follow him. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He sent messengers throughout Manasseh, calling them to arms, and also into Asher, Zebulun and Naphtali, so that they too went up to meet them.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gideon said to God, “If you will save Israel by my hand as you have promised— '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'look, I will place a wool fleece on the threshing floor. If there is dew only on the fleece and all the ground is dry, then I will know that you will save Israel by my hand, as you said.” '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And that is what happened. Gideon rose early the next day; he squeezed the fleece and wrung out the dew—a bowlful of water.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Gideon said to God, “Do not be angry with me. Let me make just one more request. Allow me one more test with the fleece, but this time make the fleece dry and let the ground be covered with dew.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They camped on the land and ruined the crops all the way to Gaza and did not spare a living thing for Israel, neither sheep nor cattle nor donkeys. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That night God did so. Only the fleece was dry; all the ground was covered with dew.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They came up with their livestock and their tents like swarms of locusts. It was impossible to count them or their camels; they invaded the land to ravage it. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Midian so impoverished the Israelites that they cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for help.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Israelites cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' because of Midian, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he sent them a prophet, who said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: I brought you up out of Egypt, out of the land of slavery. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I rescued you from the hand of the Egyptians. And I delivered you from the hand of all your oppressors; I drove them out before you and gave you their land. '
