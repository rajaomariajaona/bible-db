document_id: DEU.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The One Place of Worship
  - type: text
    content: 'These are the decrees and laws you must be careful to follow in the land that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, has given you to possess—as long as you live in the land. '
  '10':
  - type: text
    content: 'But you will cross the Jordan and settle in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as an inheritance, and he will give you rest from all your enemies around you so that you will live in safety. '
  '11':
  - type: text
    content: 'Then to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose as a dwelling for his Name—there you are to bring everything I command you: your burnt offerings and sacrifices, your tithes and special gifts, and all the choice possessions you have vowed to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'And there rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God—you, your sons and daughters, your male and female servants, and the Levites from your towns who have no allotment or inheritance of their own. '
  '13':
  - type: text
    content: 'Be careful not to sacrifice your burnt offerings anywhere you please. '
  '14':
  - type: text
    content: 'Offer them only at the place the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose in one of your tribes, and there observe everything I command you.'
  '15':
  - type: text
    content: 'Nevertheless, you may slaughter your animals in any of your towns and eat as much of the meat as you want, as if it were gazelle or deer, according to the blessing the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives you. Both the ceremonially unclean and the clean may eat it. '
  '16':
  - type: text
    content: 'But you must not eat the blood; pour it out on the ground like water. '
  '17':
  - type: text
    content: 'You must not eat in your own towns the tithe of your grain and new wine and olive oil, or the firstborn of your herds and flocks, or whatever you have vowed to give, or your freewill offerings or special gifts. '
  '18':
  - type: text
    content: 'Instead, you are to eat them in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose—you, your sons and daughters, your male and female servants, and the Levites from your towns—and you are to rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in everything you put your hand to. '
  '19':
  - type: text
    content: Be careful not to neglect the Levites as long as you live in your land.
  '2':
  - type: text
    content: 'Destroy completely all the places on the high mountains, on the hills and under every spreading tree, where the nations you are dispossessing worship their gods. '
  '20':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has enlarged your territory as he promised you, and you crave meat and say, “I would like some meat,” then you may eat as much of it as you want. '
  '21':
  - type: text
    content: 'If the place where the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chooses to put his Name is too far away from you, you may slaughter animals from the herds and flocks the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you, as I have commanded you, and in your own towns you may eat as much of them as you want. '
  '22':
  - type: text
    content: 'Eat them as you would gazelle or deer. Both the ceremonially unclean and the clean may eat. '
  '23':
  - type: text
    content: 'But be sure you do not eat the blood, because the blood is the life, and you must not eat the life with the meat. '
  '24':
  - type: text
    content: 'You must not eat the blood; pour it out on the ground like water. '
  '25':
  - type: text
    content: 'Do not eat it, so that it may go well with you and your children after you, because you will be doing what is right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '26':
  - type: text
    content: 'But take your consecrated things and whatever you have vowed to give, and go to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose. '
  '27':
  - type: text
    content: 'Present your burnt offerings on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, both the meat and the blood. The blood of your sacrifices must be poured beside the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, but you may eat the meat. '
  '28':
  - type: text
    content: 'Be careful to obey all these regulations I am giving you, so that it may always go well with you and your children after you, because you will be doing what is good and right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '29':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will cut off before you the nations you are about to invade and dispossess. But when you have driven them out and settled in their land, '
  '3':
  - type: text
    content: Break down their altars, smash their sacred stones and burn their Asherah poles in the fire; cut down the idols of their gods and wipe out their names from those places.
  '30':
  - type: text
    content: 'and after they have been destroyed before you, be careful not to be ensnared by inquiring about their gods, saying, “How do these nations serve their gods? We will do the same.” '
  '31':
  - type: text
    content: 'You must not worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in their way, because in worshiping their gods, they do all kinds of detestable things the '
  - type: text
    content: Lord
  - type: text
    content: ' hates. They even burn their sons and daughters in the fire as sacrifices to their gods.'
  '32':
  - type: text
    content: See that you do all I command you; do not add to it or take away from it.
  - type: note
    content: In Hebrew texts this verse (12:32) is numbered 13:1.
  '4':
  - type: text
    content: 'You must not worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in their way. '
  '5':
  - type: text
    content: 'But you are to seek the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose from among all your tribes to put his Name there for his dwelling. To that place you must go; '
  '6':
  - type: text
    content: 'there bring your burnt offerings and sacrifices, your tithes and special gifts, what you have vowed to give and your freewill offerings, and the firstborn of your herds and flocks. '
  '7':
  - type: text
    content: 'There, in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, you and your families shall eat and shall rejoice in everything you have put your hand to, because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has blessed you.'
  '8':
  - type: text
    content: 'You are not to do as we do here today, everyone doing as they see fit, '
  '9':
  - type: text
    content: 'since you have not yet reached the resting place and the inheritance the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. '
