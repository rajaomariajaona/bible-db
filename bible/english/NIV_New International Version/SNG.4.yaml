document_id: SNG.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: He
  - type: text
    content: How beautiful you are, my darling!
  - type: text
    content: Oh, how beautiful!
  - type: text
    content: Your eyes behind your veil are doves.
  - type: text
    content: Your hair is like a flock of goats
  - type: text
    content: descending from the hills of Gilead.
  '10':
  - type: text
    content: How delightful is your love, my sister, my bride!
  - type: text
    content: How much more pleasing is your love than wine,
  - type: text
    content: and the fragrance of your perfume
  - type: text
    content: more than any spice!
  '11':
  - type: text
    content: Your lips drop sweetness as the honeycomb, my bride;
  - type: text
    content: milk and honey are under your tongue.
  - type: text
    content: The fragrance of your garments
  - type: text
    content: is like the fragrance of Lebanon.
  '12':
  - type: text
    content: You are a garden locked up, my sister, my bride;
  - type: text
    content: you are a spring enclosed, a sealed fountain.
  '13':
  - type: text
    content: Your plants are an orchard of pomegranates
  - type: text
    content: with choice fruits,
  - type: text
    content: with henna and nard,
  '14':
  - type: text
    content: nard and saffron,
  - type: text
    content: calamus and cinnamon,
  - type: text
    content: with every kind of incense tree,
  - type: text
    content: with myrrh and aloes
  - type: text
    content: and all the finest spices.
  '15':
  - type: text
    content: You are
  - type: note
    content: Or I am (spoken by She)
  - type: text
    content: ' a garden fountain,'
  - type: text
    content: a well of flowing water
  - type: text
    content: streaming down from Lebanon.
  - type: heading
    content: She
  '16':
  - type: text
    content: Awake, north wind,
  - type: text
    content: and come, south wind!
  - type: text
    content: Blow on my garden,
  - type: text
    content: that its fragrance may spread everywhere.
  - type: text
    content: Let my beloved come into his garden
  - type: text
    content: and taste its choice fruits.
  '2':
  - type: text
    content: Your teeth are like a flock of sheep just shorn,
  - type: text
    content: coming up from the washing.
  - type: text
    content: Each has its twin;
  - type: text
    content: not one of them is alone.
  '3':
  - type: text
    content: Your lips are like a scarlet ribbon;
  - type: text
    content: your mouth is lovely.
  - type: text
    content: Your temples behind your veil
  - type: text
    content: are like the halves of a pomegranate.
  '4':
  - type: text
    content: Your neck is like the tower of David,
  - type: text
    content: built with courses of stone
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ;
  - type: text
    content: on it hang a thousand shields,
  - type: text
    content: all of them shields of warriors.
  '5':
  - type: text
    content: Your breasts are like two fawns,
  - type: text
    content: like twin fawns of a gazelle
  - type: text
    content: that browse among the lilies.
  '6':
  - type: text
    content: Until the day breaks
  - type: text
    content: and the shadows flee,
  - type: text
    content: I will go to the mountain of myrrh
  - type: text
    content: and to the hill of incense.
  '7':
  - type: text
    content: You are altogether beautiful, my darling;
  - type: text
    content: there is no flaw in you.
  '8':
  - type: text
    content: Come with me from Lebanon, my bride,
  - type: text
    content: come with me from Lebanon.
  - type: text
    content: Descend from the crest of Amana,
  - type: text
    content: from the top of Senir, the summit of Hermon,
  - type: text
    content: from the lions’ dens
  - type: text
    content: and the mountain haunts of leopards.
  '9':
  - type: text
    content: You have stolen my heart, my sister, my bride;
  - type: text
    content: you have stolen my heart
  - type: text
    content: with one glance of your eyes,
  - type: text
    content: with one jewel of your necklace.
