document_id: SNG.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: sp
    children:
    - type: text
      text: He
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How beautiful you are, my darling!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, how beautiful!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your eyes behind your veil are doves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your hair is like a flock of goats
  - type: usfm
    marker: q2
    children:
    - type: text
      text: descending from the hills of Gilead.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How delightful is your love, my sister, my bride!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How much more pleasing is your love than wine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the fragrance of your perfume
  - type: usfm
    marker: q2
    children:
    - type: text
      text: more than any spice!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your lips drop sweetness as the honeycomb, my bride;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: milk and honey are under your tongue.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fragrance of your garments
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like the fragrance of Lebanon.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are a garden locked up, my sister, my bride;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are a spring enclosed, a sealed fountain.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your plants are an orchard of pomegranates
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with choice fruits,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with henna and nard,
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nard and saffron,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: calamus and cinnamon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with every kind of incense tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with myrrh and aloes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the finest spices.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'I am '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(spoken by '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: She
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )
      marker-yv: yv-n
    - type: text
      text: ' a garden fountain,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a well of flowing water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: streaming down from Lebanon.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: She
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Awake, north wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and come, south wind!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blow on my garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that its fragrance may spread everywhere.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let my beloved come into his garden
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and taste its choice fruits.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your teeth are like a flock of sheep just shorn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: coming up from the washing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each has its twin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one of them is alone.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your lips are like a scarlet ribbon;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your mouth is lovely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your temples behind your veil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are like the halves of a pomegranate.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your neck is like the tower of David,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: built with courses of stone
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on it hang a thousand shields,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all of them shields of warriors.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your breasts are like two fawns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like twin fawns of a gazelle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that browse among the lilies.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Until the day breaks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the shadows flee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will go to the mountain of myrrh
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the hill of incense.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are altogether beautiful, my darling;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no flaw in you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come with me from Lebanon, my bride,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come with me from Lebanon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Descend from the crest of Amana,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the top of Senir, the summit of Hermon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the lions’ dens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the mountain haunts of leopards.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have stolen my heart, my sister, my bride;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have stolen my heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with one glance of your eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with one jewel of your necklace.
