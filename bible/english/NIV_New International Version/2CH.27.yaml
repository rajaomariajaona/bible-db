document_id: 2CH.27,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jotham King of Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jotham was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. His mother’s name was Jerusha daughter of Zadok. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He did what was right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as his father Uzziah had done, but unlike him he did not enter the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. The people, however, continued their corrupt practices. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jotham rebuilt the Upper Gate of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and did extensive work on the wall at the hill of Ophel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He built towns in the hill country of Judah and forts and towers in the wooded areas.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Jotham waged war against the king of the Ammonites and conquered them. That year the Ammonites paid him a hundred talents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 3 3/4 tons or about 3.4 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of silver, ten thousand cors'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 1,800 tons or about 1,600 metric tons of wheat
      marker-yv: yv-n
    - type: text
      text: ' of wheat and ten thousand cors'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 1,500 tons or about 1,350 metric tons of barley
      marker-yv: yv-n
    - type: text
      text: ' of barley. The Ammonites brought him the same amount also in the second and third years.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jotham grew powerful because he walked steadfastly before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The other events in Jotham’s reign, including all his wars and the other things he did, are written in the book of the kings of Israel and Judah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Jotham rested with his ancestors and was buried in the City of David. And Ahaz his son succeeded him as king.
