document_id: 2CH.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jotham King of Judah
  - type: text
    content: 'Jotham was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. His mother’s name was Jerusha daughter of Zadok. '
  '2':
  - type: text
    content: 'He did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as his father Uzziah had done, but unlike him he did not enter the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. The people, however, continued their corrupt practices. '
  '3':
  - type: text
    content: 'Jotham rebuilt the Upper Gate of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and did extensive work on the wall at the hill of Ophel. '
  '4':
  - type: text
    content: He built towns in the hill country of Judah and forts and towers in the wooded areas.
  '5':
  - type: text
    content: Jotham waged war against the king of the Ammonites and conquered them. That year the Ammonites paid him a hundred talents
  - type: note
    content: That is, about 3 3/4 tons or about 3.4 metric tons
  - type: text
    content: ' of silver, ten thousand cors'
  - type: note
    content: That is, probably about 1,800 tons or about 1,600 metric tons of wheat
  - type: text
    content: ' of wheat and ten thousand cors'
  - type: note
    content: That is, probably about 1,500 tons or about 1,350 metric tons of barley
  - type: text
    content: ' of barley. The Ammonites brought him the same amount also in the second and third years.'
  '6':
  - type: text
    content: 'Jotham grew powerful because he walked steadfastly before the '
  - type: text
    content: Lord
  - type: text
    content: ' his God.'
  '7':
  - type: text
    content: 'The other events in Jotham’s reign, including all his wars and the other things he did, are written in the book of the kings of Israel and Judah. '
  '8':
  - type: text
    content: 'He was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. '
  '9':
  - type: text
    content: Jotham rested with his ancestors and was buried in the City of David. And Ahaz his son succeeded him as king.
