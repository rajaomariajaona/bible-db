document_id: NUM.35,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Towns for the Levites
  - type: text
    content: 'On the plains of Moab by the Jordan across from Jericho, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘When you cross the Jordan into Canaan, '
  '11':
  - type: text
    content: 'select some towns to be your cities of refuge, to which a person who has killed someone accidentally may flee. '
  '12':
  - type: text
    content: 'They will be places of refuge from the avenger, so that anyone accused of murder may not die before they stand trial before the assembly. '
  '13':
  - type: text
    content: 'These six towns you give will be your cities of refuge. '
  '14':
  - type: text
    content: 'Give three on this side of the Jordan and three in Canaan as cities of refuge. '
  '15':
  - type: text
    content: These six towns will be a place of refuge for Israelites and for foreigners residing among them, so that anyone who has killed another accidentally can flee there.
  '16':
  - type: text
    content: '“ ‘If anyone strikes someone a fatal blow with an iron object, that person is a murderer; the murderer is to be put to death. '
  '17':
  - type: text
    content: 'Or if anyone is holding a stone and strikes someone a fatal blow with it, that person is a murderer; the murderer is to be put to death. '
  '18':
  - type: text
    content: 'Or if anyone is holding a wooden object and strikes someone a fatal blow with it, that person is a murderer; the murderer is to be put to death. '
  '19':
  - type: text
    content: 'The avenger of blood shall put the murderer to death; when the avenger comes upon the murderer, the avenger shall put the murderer to death. '
  '2':
  - type: text
    content: '“Command the Israelites to give the Levites towns to live in from the inheritance the Israelites will possess. And give them pasturelands around the towns. '
  '20':
  - type: text
    content: 'If anyone with malice aforethought shoves another or throws something at them intentionally so that they die '
  '21':
  - type: text
    content: or if out of enmity one person hits another with their fist so that the other dies, that person is to be put to death; that person is a murderer. The avenger of blood shall put the murderer to death when they meet.
  '22':
  - type: text
    content: '“ ‘But if without enmity someone suddenly pushes another or throws something at them unintentionally '
  '23':
  - type: text
    content: 'or, without seeing them, drops on them a stone heavy enough to kill them, and they die, then since that other person was not an enemy and no harm was intended, '
  '24':
  - type: text
    content: 'the assembly must judge between the accused and the avenger of blood according to these regulations. '
  '25':
  - type: text
    content: The assembly must protect the one accused of murder from the avenger of blood and send the accused back to the city of refuge to which they fled. The accused must stay there until the death of the high priest, who was anointed with the holy oil.
  '26':
  - type: text
    content: '“ ‘But if the accused ever goes outside the limits of the city of refuge to which they fled '
  '27':
  - type: text
    content: 'and the avenger of blood finds them outside the city, the avenger of blood may kill the accused without being guilty of murder. '
  '28':
  - type: text
    content: The accused must stay in the city of refuge until the death of the high priest; only after the death of the high priest may they return to their own property.
  '29':
  - type: text
    content: “ ‘This is to have the force of law for you throughout the generations to come, wherever you live.
  '3':
  - type: text
    content: Then they will have towns to live in and pasturelands for the cattle they own and all their other animals.
  '30':
  - type: text
    content: “ ‘Anyone who kills a person is to be put to death as a murderer only on the testimony of witnesses. But no one is to be put to death on the testimony of only one witness.
  '31':
  - type: text
    content: “ ‘Do not accept a ransom for the life of a murderer, who deserves to die. They are to be put to death.
  '32':
  - type: text
    content: “ ‘Do not accept a ransom for anyone who has fled to a city of refuge and so allow them to go back and live on their own land before the death of the high priest.
  '33':
  - type: text
    content: '“ ‘Do not pollute the land where you are. Bloodshed pollutes the land, and atonement cannot be made for the land on which blood has been shed, except by the blood of the one who shed it. '
  '34':
  - type: text
    content: 'Do not defile the land where you live and where I dwell, for I, the '
  - type: text
    content: Lord
  - type: text
    content: ', dwell among the Israelites.’ ”'
  '4':
  - type: text
    content: “The pasturelands around the towns that you give the Levites will extend a thousand cubits
  - type: note
    content: That is, about 1,500 feet or about 450 meters
  - type: text
    content: ' from the town wall. '
  '5':
  - type: text
    content: Outside the town, measure two thousand cubits
  - type: note
    content: That is, about 3,000 feet or about 900 meters
  - type: text
    content: ' on the east side, two thousand on the south side, two thousand on the west and two thousand on the north, with the town in the center. They will have this area as pastureland for the towns.'
  - type: heading
    content: Cities of Refuge
  '6':
  - type: text
    content: '“Six of the towns you give the Levites will be cities of refuge, to which a person who has killed someone may flee. In addition, give them forty-two other towns. '
  '7':
  - type: text
    content: 'In all you must give the Levites forty-eight towns, together with their pasturelands. '
  '8':
  - type: text
    content: 'The towns you give the Levites from the land the Israelites possess are to be given in proportion to the inheritance of each tribe: Take many towns from a tribe that has many, but few from one that has few.”'
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses: '
