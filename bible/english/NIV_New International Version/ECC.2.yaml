document_id: ECC.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pleasures Are Meaningless
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I said to myself, “Come now, I will test you with pleasure to find out what is good.” But that also proved to be meaningless. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I denied myself nothing my eyes desired;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I refused my heart no pleasure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart took delight in all my labor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and this was the reward for all my toil.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Yet when I surveyed all that my hands had done
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and what I had toiled to achieve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: everything was meaningless, a chasing after the wind;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing was gained under the sun.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom and Folly Are Meaningless
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then I turned my thoughts to consider wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and also madness and folly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What more can the king’s successor do
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than what has already been done?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I saw that wisdom is better than folly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as light is better than darkness.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The wise have eyes in their heads,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while the fool walks in the darkness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I came to realize
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the same fate overtakes them both.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then I said to myself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The fate of the fool will overtake me also.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What then do I gain by being wise?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said to myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “This too is meaningless.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For the wise, like the fool, will not be long remembered;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the days have already come when both have been forgotten.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the fool, the wise too must die!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Toil Is Meaningless
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So I hated life, because the work that is done under the sun was grievous to me. All of it is meaningless, a chasing after the wind. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I hated all the things I had toiled for under the sun, because I must leave them to the one who comes after me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And who knows whether that person will be wise or foolish? Yet they will have control over all the fruit of my toil into which I have poured my effort and skill under the sun. This too is meaningless. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Laughter,” I said, “is madness. And what does pleasure accomplish?” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So my heart began to despair over all my toilsome labor under the sun. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For a person may labor with wisdom, knowledge and skill, and then they must leave all they own to another who has not toiled for it. This too is meaningless and a great misfortune. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'What do people get for all the toil and anxious striving with which they labor under the sun? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: All their days their work is grief and pain; even at night their minds do not rest. This too is meaningless.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'A person can do nothing better than to eat and drink and find satisfaction in their own toil. This too, I see, is from the hand of God, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'for without him, who can eat or find enjoyment? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: To the person who pleases him, God gives wisdom, knowledge and happiness, but to the sinner he gives the task of gathering and storing up wealth to hand it over to the one who pleases God. This too is meaningless, a chasing after the wind.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I tried cheering myself with wine, and embracing folly—my mind still guiding me with wisdom. I wanted to see what was good for people to do under the heavens during the few days of their lives.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I undertook great projects: I built houses for myself and planted vineyards. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I made gardens and parks and planted all kinds of fruit trees in them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I made reservoirs to water groves of flourishing trees. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I bought male and female slaves and had other slaves who were born in my house. I also owned more herds and flocks than anyone in Jerusalem before me. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I amassed silver and gold for myself, and the treasure of kings and provinces. I acquired male and female singers, and a harem
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' as well—the delights of a man’s heart. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I became greater by far than anyone in Jerusalem before me. In all this my wisdom stayed with me.
