document_id: ECC.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Pleasures Are Meaningless
  - type: text
    content: 'I said to myself, “Come now, I will test you with pleasure to find out what is good.” But that also proved to be meaningless. '
  '10':
  - type: text
    content: I denied myself nothing my eyes desired;
  - type: text
    content: I refused my heart no pleasure.
  - type: text
    content: My heart took delight in all my labor,
  - type: text
    content: and this was the reward for all my toil.
  '11':
  - type: text
    content: Yet when I surveyed all that my hands had done
  - type: text
    content: and what I had toiled to achieve,
  - type: text
    content: everything was meaningless, a chasing after the wind;
  - type: text
    content: nothing was gained under the sun.
  - type: heading
    content: Wisdom and Folly Are Meaningless
  '12':
  - type: text
    content: Then I turned my thoughts to consider wisdom,
  - type: text
    content: and also madness and folly.
  - type: text
    content: What more can the king’s successor do
  - type: text
    content: than what has already been done?
  '13':
  - type: text
    content: I saw that wisdom is better than folly,
  - type: text
    content: just as light is better than darkness.
  '14':
  - type: text
    content: The wise have eyes in their heads,
  - type: text
    content: while the fool walks in the darkness;
  - type: text
    content: but I came to realize
  - type: text
    content: that the same fate overtakes them both.
  '15':
  - type: text
    content: Then I said to myself,
  - type: text
    content: “The fate of the fool will overtake me also.
  - type: text
    content: What then do I gain by being wise?”
  - type: text
    content: I said to myself,
  - type: text
    content: “This too is meaningless.”
  '16':
  - type: text
    content: For the wise, like the fool, will not be long remembered;
  - type: text
    content: the days have already come when both have been forgotten.
  - type: text
    content: Like the fool, the wise too must die!
  - type: heading
    content: Toil Is Meaningless
  '17':
  - type: text
    content: 'So I hated life, because the work that is done under the sun was grievous to me. All of it is meaningless, a chasing after the wind. '
  '18':
  - type: text
    content: 'I hated all the things I had toiled for under the sun, because I must leave them to the one who comes after me. '
  '19':
  - type: text
    content: 'And who knows whether that person will be wise or foolish? Yet they will have control over all the fruit of my toil into which I have poured my effort and skill under the sun. This too is meaningless. '
  '2':
  - type: text
    content: '“Laughter,” I said, “is madness. And what does pleasure accomplish?” '
  '20':
  - type: text
    content: 'So my heart began to despair over all my toilsome labor under the sun. '
  '21':
  - type: text
    content: 'For a person may labor with wisdom, knowledge and skill, and then they must leave all they own to another who has not toiled for it. This too is meaningless and a great misfortune. '
  '22':
  - type: text
    content: 'What do people get for all the toil and anxious striving with which they labor under the sun? '
  '23':
  - type: text
    content: All their days their work is grief and pain; even at night their minds do not rest. This too is meaningless.
  '24':
  - type: text
    content: 'A person can do nothing better than to eat and drink and find satisfaction in their own toil. This too, I see, is from the hand of God, '
  '25':
  - type: text
    content: 'for without him, who can eat or find enjoyment? '
  '26':
  - type: text
    content: To the person who pleases him, God gives wisdom, knowledge and happiness, but to the sinner he gives the task of gathering and storing up wealth to hand it over to the one who pleases God. This too is meaningless, a chasing after the wind.
  '3':
  - type: text
    content: I tried cheering myself with wine, and embracing folly—my mind still guiding me with wisdom. I wanted to see what was good for people to do under the heavens during the few days of their lives.
  '4':
  - type: text
    content: 'I undertook great projects: I built houses for myself and planted vineyards. '
  '5':
  - type: text
    content: 'I made gardens and parks and planted all kinds of fruit trees in them. '
  '6':
  - type: text
    content: 'I made reservoirs to water groves of flourishing trees. '
  '7':
  - type: text
    content: 'I bought male and female slaves and had other slaves who were born in my house. I also owned more herds and flocks than anyone in Jerusalem before me. '
  '8':
  - type: text
    content: I amassed silver and gold for myself, and the treasure of kings and provinces. I acquired male and female singers, and a harem
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' as well—the delights of a man’s heart. '
  '9':
  - type: text
    content: I became greater by far than anyone in Jerusalem before me. In all this my wisdom stayed with me.
