document_id: ROM.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Anguish Over Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I speak the truth in Christ—I am not lying, my conscience confirms it through the Holy Spirit— '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not only that, but Rebekah’s children were conceived at the same time by our father Isaac. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet, before the twins were born or had done anything good or bad—in order that God’s purpose in election might stand: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: not by works but by him who calls—she was told, “The older will serve the younger.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 25:23
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as it is written: “Jacob I loved, but Esau I hated.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mal. 1:2,3
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then shall we say? Is God unjust? Not at all! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For he says to Moses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will have mercy on whom I have mercy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will have compassion on whom I have compassion.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 33:19
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'It does not, therefore, depend on human desire or effort, but on God’s mercy. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'For Scripture says to Pharaoh: “I raised you up for this very purpose, that I might display my power in you and that my name might be proclaimed in all the earth.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 9:16
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Therefore God has mercy on whom he wants to have mercy, and he hardens whom he wants to harden.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of you will say to me: “Then why does God still blame us? For who is able to resist his will?” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have great sorrow and unceasing anguish in my heart. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But who are you, a human being, to talk back to God? “Shall what is formed say to the one who formed it, ‘Why did you make me like this?’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 29:16; 45:9
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Does not the potter have the right to make out of the same lump of clay some pottery for special purposes and some for common use?
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What if God, although choosing to show his wrath and make his power known, bore with great patience the objects of his wrath—prepared for destruction? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What if he did this to make the riches of his glory known to the objects of his mercy, whom he prepared in advance for glory— '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'even us, whom he also called, not only from the Jews but also from the Gentiles? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he says in Hosea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will call them ‘my people’ who are not my people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will call her ‘my loved one’ who is not my loved one,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hosea 2:23
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: and,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In the very place where it was said to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘You are not my people,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there they will be called ‘children of the living God.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hosea 1:10
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Isaiah cries out concerning Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though the number of the Israelites be like the sand by the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only the remnant will be saved.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Lord will carry out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his sentence on earth with speed and finality.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 10:22,23 (see Septuagint)
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'It is just as Isaiah said previously:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Unless the Lord Almighty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: had left us descendants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we would have become like Sodom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we would have been like Gomorrah.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 1:9
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Unbelief
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I could wish that I myself were cursed and cut off from Christ for the sake of my people, those of my own race, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What then shall we say? That the Gentiles, who did not pursue righteousness, have obtained it, a righteousness that is by faith; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but the people of Israel, who pursued the law as the way of righteousness, have not attained their goal. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why not? Because they pursued it not by faith but as if it were by works. They stumbled over the stumbling stone. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, I lay in Zion a stone that causes people to stumble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a rock that makes them fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the one who believes in him will never be put to shame.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 8:14; 28:16
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the people of Israel. Theirs is the adoption to sonship; theirs the divine glory, the covenants, the receiving of the law, the temple worship and the promises. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Theirs are the patriarchs, and from them is traced the human ancestry of the Messiah, who is God over all, forever praised!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Messiah, who is over all. God be forever praised! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Messiah. God who is over all be forever praised!
      marker-yv: yv-n
    - type: text
      text: ' Amen.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Sovereign Choice
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is not as though God’s word had failed. For not all who are descended from Israel are Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nor because they are his descendants are they all Abraham’s children. On the contrary, “It is through Isaac that your offspring will be reckoned.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 21:12
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In other words, it is not the children by physical descent who are God’s children, but it is the children of the promise who are regarded as Abraham’s offspring. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this was how the promise was stated: “At the appointed time I will return, and Sarah will have a son.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 18:10,14
      marker-yv: yv-n
