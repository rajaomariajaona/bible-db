document_id: ROM.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Anguish Over Israel
  - type: text
    content: 'I speak the truth in Christ—I am not lying, my conscience confirms it through the Holy Spirit— '
  '10':
  - type: text
    content: 'Not only that, but Rebekah’s children were conceived at the same time by our father Isaac. '
  '11':
  - type: text
    content: 'Yet, before the twins were born or had done anything good or bad—in order that God’s purpose in election might stand: '
  '12':
  - type: text
    content: not by works but by him who calls—she was told, “The older will serve the younger.”
  - type: note
    content: Gen. 25:23
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Just as it is written: “Jacob I loved, but Esau I hated.”'
  - type: note
    content: Mal. 1:2,3
  '14':
  - type: text
    content: 'What then shall we say? Is God unjust? Not at all! '
  '15':
  - type: text
    content: For he says to Moses,
  - type: text
    content: “I will have mercy on whom I have mercy,
  - type: text
    content: and I will have compassion on whom I have compassion.”
  - type: note
    content: Exodus 33:19
  '16':
  - type: text
    content: 'It does not, therefore, depend on human desire or effort, but on God’s mercy. '
  '17':
  - type: text
    content: 'For Scripture says to Pharaoh: “I raised you up for this very purpose, that I might display my power in you and that my name might be proclaimed in all the earth.”'
  - type: note
    content: Exodus 9:16
  - type: text
    content: ' '
  '18':
  - type: text
    content: Therefore God has mercy on whom he wants to have mercy, and he hardens whom he wants to harden.
  '19':
  - type: text
    content: 'One of you will say to me: “Then why does God still blame us? For who is able to resist his will?” '
  '2':
  - type: text
    content: 'I have great sorrow and unceasing anguish in my heart. '
  '20':
  - type: text
    content: But who are you, a human being, to talk back to God? “Shall what is formed say to the one who formed it, ‘Why did you make me like this?’ ”
  - type: note
    content: Isaiah 29:16; 45:9
  - type: text
    content: ' '
  '21':
  - type: text
    content: Does not the potter have the right to make out of the same lump of clay some pottery for special purposes and some for common use?
  '22':
  - type: text
    content: 'What if God, although choosing to show his wrath and make his power known, bore with great patience the objects of his wrath—prepared for destruction? '
  '23':
  - type: text
    content: 'What if he did this to make the riches of his glory known to the objects of his mercy, whom he prepared in advance for glory— '
  '24':
  - type: text
    content: 'even us, whom he also called, not only from the Jews but also from the Gentiles? '
  '25':
  - type: text
    content: 'As he says in Hosea:'
  - type: text
    content: “I will call them ‘my people’ who are not my people;
  - type: text
    content: and I will call her ‘my loved one’ who is not my loved one,”
  - type: note
    content: Hosea 2:23
  '26':
  - type: text
    content: and,
  - type: text
    content: “In the very place where it was said to them,
  - type: text
    content: ‘You are not my people,’
  - type: text
    content: there they will be called ‘children of the living God.’ ”
  - type: note
    content: Hosea 1:10
  '27':
  - type: text
    content: 'Isaiah cries out concerning Israel:'
  - type: text
    content: “Though the number of the Israelites be like the sand by the sea,
  - type: text
    content: only the remnant will be saved.
  '28':
  - type: text
    content: For the Lord will carry out
  - type: text
    content: his sentence on earth with speed and finality.”
  - type: note
    content: Isaiah 10:22,23 (see Septuagint)
  '29':
  - type: text
    content: 'It is just as Isaiah said previously:'
  - type: text
    content: “Unless the Lord Almighty
  - type: text
    content: had left us descendants,
  - type: text
    content: we would have become like Sodom,
  - type: text
    content: we would have been like Gomorrah.”
  - type: note
    content: Isaiah 1:9
  - type: heading
    content: Israel’s Unbelief
  '3':
  - type: text
    content: 'For I could wish that I myself were cursed and cut off from Christ for the sake of my people, those of my own race, '
  '30':
  - type: text
    content: 'What then shall we say? That the Gentiles, who did not pursue righteousness, have obtained it, a righteousness that is by faith; '
  '31':
  - type: text
    content: 'but the people of Israel, who pursued the law as the way of righteousness, have not attained their goal. '
  '32':
  - type: text
    content: 'Why not? Because they pursued it not by faith but as if it were by works. They stumbled over the stumbling stone. '
  '33':
  - type: text
    content: 'As it is written:'
  - type: text
    content: “See, I lay in Zion a stone that causes people to stumble
  - type: text
    content: and a rock that makes them fall,
  - type: text
    content: and the one who believes in him will never be put to shame.”
  - type: note
    content: Isaiah 8:14; 28:16
  '4':
  - type: text
    content: 'the people of Israel. Theirs is the adoption to sonship; theirs the divine glory, the covenants, the receiving of the law, the temple worship and the promises. '
  '5':
  - type: text
    content: Theirs are the patriarchs, and from them is traced the human ancestry of the Messiah, who is God over all, forever praised!
  - type: note
    content: Or Messiah, who is over all. God be forever praised! Or Messiah. God who is over all be forever praised!
  - type: text
    content: ' Amen.'
  - type: heading
    content: God’s Sovereign Choice
  '6':
  - type: text
    content: 'It is not as though God’s word had failed. For not all who are descended from Israel are Israel. '
  '7':
  - type: text
    content: Nor because they are his descendants are they all Abraham’s children. On the contrary, “It is through Isaac that your offspring will be reckoned.”
  - type: note
    content: Gen. 21:12
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'In other words, it is not the children by physical descent who are God’s children, but it is the children of the promise who are regarded as Abraham’s offspring. '
  '9':
  - type: text
    content: 'For this was how the promise was stated: “At the appointed time I will return, and Sarah will have a son.”'
  - type: note
    content: Gen. 18:10,14
