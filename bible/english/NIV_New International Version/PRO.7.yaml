document_id: PRO.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning Against the Adulterous Woman
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, keep my words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and store up my commands within you.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then out came a woman to meet him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dressed like a prostitute and with crafty intent.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: (She is unruly and defiant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her feet never stay at home;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: now in the street, now in the squares,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at every corner she lurks.)
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: She took hold of him and kissed him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and with a brazen face she said:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Today I fulfilled my vows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I have food from my fellowship offering at home.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So I came out to meet you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I looked for you and have found you!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I have covered my bed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with colored linens from Egypt.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I have perfumed my bed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with myrrh, aloes and cinnamon.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Come, let’s drink deeply of love till morning;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let’s enjoy ourselves with love!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: My husband is not at home;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has gone on a long journey.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Keep my commands and you will live;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: guard my teachings as the apple of your eye.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: He took his purse filled with money
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will not be home till full moon.”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: With persuasive words she led him astray;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she seduced him with her smooth talk.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: All at once he followed her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like an ox going to the slaughter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a deer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Syriac (see also Septuagint); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fool
      marker-yv: yv-n
    - type: text
      text: ' stepping into a noose'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this line is uncertain.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: till an arrow pierces his liver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a bird darting into a snare,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: little knowing it will cost him his life.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Now then, my sons, listen to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay attention to what I say.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Do not let your heart turn to her ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or stray into her paths.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Many are the victims she has brought down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her slain are a mighty throng.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Her house is a highway to the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leading down to the chambers of death.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Bind them on your fingers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: write them on the tablet of your heart.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Say to wisdom, “You are my sister,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to insight, “You are my relative.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They will keep you from the adulterous woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the wayward woman with her seductive words.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: At the window of my house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I looked down through the lattice.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I saw among the simple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I noticed among the young men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a youth who had no sense.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He was going down the street near her corner,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: walking along in the direction of her house
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: at twilight, as the day was fading,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the dark of night set in.
