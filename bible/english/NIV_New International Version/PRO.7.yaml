document_id: PRO.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning Against the Adulterous Woman
  - type: text
    content: My son, keep my words
  - type: text
    content: and store up my commands within you.
  '10':
  - type: text
    content: Then out came a woman to meet him,
  - type: text
    content: dressed like a prostitute and with crafty intent.
  '11':
  - type: text
    content: (She is unruly and defiant,
  - type: text
    content: her feet never stay at home;
  '12':
  - type: text
    content: now in the street, now in the squares,
  - type: text
    content: at every corner she lurks.)
  '13':
  - type: text
    content: She took hold of him and kissed him
  - type: text
    content: 'and with a brazen face she said:'
  '14':
  - type: text
    content: “Today I fulfilled my vows,
  - type: text
    content: and I have food from my fellowship offering at home.
  '15':
  - type: text
    content: So I came out to meet you;
  - type: text
    content: I looked for you and have found you!
  '16':
  - type: text
    content: I have covered my bed
  - type: text
    content: with colored linens from Egypt.
  '17':
  - type: text
    content: I have perfumed my bed
  - type: text
    content: with myrrh, aloes and cinnamon.
  '18':
  - type: text
    content: Come, let’s drink deeply of love till morning;
  - type: text
    content: let’s enjoy ourselves with love!
  '19':
  - type: text
    content: My husband is not at home;
  - type: text
    content: he has gone on a long journey.
  '2':
  - type: text
    content: Keep my commands and you will live;
  - type: text
    content: guard my teachings as the apple of your eye.
  '20':
  - type: text
    content: He took his purse filled with money
  - type: text
    content: and will not be home till full moon.”
  '21':
  - type: text
    content: With persuasive words she led him astray;
  - type: text
    content: she seduced him with her smooth talk.
  '22':
  - type: text
    content: All at once he followed her
  - type: text
    content: like an ox going to the slaughter,
  - type: text
    content: like a deer
  - type: note
    content: Syriac (see also Septuagint); Hebrew fool
  - type: text
    content: ' stepping into a noose'
  - type: note
    content: The meaning of the Hebrew for this line is uncertain.
  '23':
  - type: text
    content: till an arrow pierces his liver,
  - type: text
    content: like a bird darting into a snare,
  - type: text
    content: little knowing it will cost him his life.
  '24':
  - type: text
    content: Now then, my sons, listen to me;
  - type: text
    content: pay attention to what I say.
  '25':
  - type: text
    content: Do not let your heart turn to her ways
  - type: text
    content: or stray into her paths.
  '26':
  - type: text
    content: Many are the victims she has brought down;
  - type: text
    content: her slain are a mighty throng.
  '27':
  - type: text
    content: Her house is a highway to the grave,
  - type: text
    content: leading down to the chambers of death.
  '3':
  - type: text
    content: Bind them on your fingers;
  - type: text
    content: write them on the tablet of your heart.
  '4':
  - type: text
    content: Say to wisdom, “You are my sister,”
  - type: text
    content: and to insight, “You are my relative.”
  '5':
  - type: text
    content: They will keep you from the adulterous woman,
  - type: text
    content: from the wayward woman with her seductive words.
  '6':
  - type: text
    content: At the window of my house
  - type: text
    content: I looked down through the lattice.
  '7':
  - type: text
    content: I saw among the simple,
  - type: text
    content: I noticed among the young men,
  - type: text
    content: a youth who had no sense.
  '8':
  - type: text
    content: He was going down the street near her corner,
  - type: text
    content: walking along in the direction of her house
  '9':
  - type: text
    content: at twilight, as the day was fading,
  - type: text
    content: as the dark of night set in.
