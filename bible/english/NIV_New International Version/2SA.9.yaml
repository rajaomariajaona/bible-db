type_code: eng
verses:
  '1':
  - type: heading
    content: David and Mephibosheth
  - type: text
    content: David asked, “Is there anyone still left of the house of Saul to whom I can show kindness for Jonathan’s sake?”
  '10':
  - type: text
    content: You and your sons and your servants are to farm the land for him and bring in the crops, so that your master’s grandson may be provided for. And Mephibosheth, grandson of your master, will always eat at my table.” (Now Ziba had fifteen sons and twenty servants.)
  '11':
  - type: text
    content: Then Ziba said to the king, “Your servant will do whatever my lord the king commands his servant to do.” So Mephibosheth ate at David’s
  - type: note
    content: Septuagint; Hebrew my
  - type: text
    content: ' table like one of the king’s sons.'
  '12':
  - type: text
    content: 'Mephibosheth had a young son named Mika, and all the members of Ziba’s household were servants of Mephibosheth. '
  '13':
  - type: text
    content: And Mephibosheth lived in Jerusalem, because he always ate at the king’s table; he was lame in both feet.
  '2':
  - type: text
    content: Now there was a servant of Saul’s household named Ziba. They summoned him to appear before David, and the king said to him, “Are you Ziba?”
  - type: text
    content: “At your service,” he replied.
  '3':
  - type: text
    content: The king asked, “Is there no one still alive from the house of Saul to whom I can show God’s kindness?”
  - type: text
    content: Ziba answered the king, “There is still a son of Jonathan; he is lame in both feet.”
  '4':
  - type: text
    content: “Where is he?” the king asked.
  - type: text
    content: Ziba answered, “He is at the house of Makir son of Ammiel in Lo Debar.”
  '5':
  - type: text
    content: So King David had him brought from Lo Debar, from the house of Makir son of Ammiel.
  '6':
  - type: text
    content: When Mephibosheth son of Jonathan, the son of Saul, came to David, he bowed down to pay him honor.
  - type: text
    content: David said, “Mephibosheth!”
  - type: text
    content: “At your service,” he replied.
  '7':
  - type: text
    content: “Don’t be afraid,” David said to him, “for I will surely show you kindness for the sake of your father Jonathan. I will restore to you all the land that belonged to your grandfather Saul, and you will always eat at my table.”
  '8':
  - type: text
    content: Mephibosheth bowed down and said, “What is your servant, that you should notice a dead dog like me?”
  '9':
  - type: text
    content: 'Then the king summoned Ziba, Saul’s steward, and said to him, “I have given your master’s grandson everything that belonged to Saul and his family. '
