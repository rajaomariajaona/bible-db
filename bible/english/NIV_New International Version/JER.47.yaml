document_id: JER.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message About the Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that came to Jeremiah the prophet concerning the Philistines before Pharaoh attacked Gaza:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “See how the waters are rising in the north;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will become an overflowing torrent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will overflow the land and everything in it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the towns and those who live in them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people will cry out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who dwell in the land will wail
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: at the sound of the hooves of galloping steeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the noise of enemy chariots
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the rumble of their wheels.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parents will not turn to help their children;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their hands will hang limp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the day has come
- type: usfm
  marker: q2
  children:
  - type: text
    text: to destroy all the Philistines
- type: usfm
  marker: q1
  children:
  - type: text
    text: and to remove all survivors
- type: usfm
  marker: q2
  children:
  - type: text
    text: who could help Tyre and Sidon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is about to destroy the Philistines,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the remnant from the coasts of Caphtor.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Crete
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Gaza will shave her head in mourning;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ashkelon will be silenced.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You remnant on the plain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how long will you cut yourselves?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“ ‘Alas, sword of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: how long till you rest?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Return to your sheath;
- type: usfm
  marker: q2
  children:
  - type: text
    text: cease and be still.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But how can it rest
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded it,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: when he has ordered it
- type: usfm
  marker: q2
  children:
  - type: text
    text: to attack Ashkelon and the coast?”
