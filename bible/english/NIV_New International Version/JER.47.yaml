document_id: JER.47,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message About the Philistines
  - type: text
    content: 'This is the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Jeremiah the prophet concerning the Philistines before Pharaoh attacked Gaza:'
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “See how the waters are rising in the north;
  - type: text
    content: they will become an overflowing torrent.
  - type: text
    content: They will overflow the land and everything in it,
  - type: text
    content: the towns and those who live in them.
  - type: text
    content: The people will cry out;
  - type: text
    content: all who dwell in the land will wail
  '3':
  - type: text
    content: at the sound of the hooves of galloping steeds,
  - type: text
    content: at the noise of enemy chariots
  - type: text
    content: and the rumble of their wheels.
  - type: text
    content: Parents will not turn to help their children;
  - type: text
    content: their hands will hang limp.
  '4':
  - type: text
    content: For the day has come
  - type: text
    content: to destroy all the Philistines
  - type: text
    content: and to remove all survivors
  - type: text
    content: who could help Tyre and Sidon.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is about to destroy the Philistines,'
  - type: text
    content: the remnant from the coasts of Caphtor.
  - type: note
    content: That is, Crete
  '5':
  - type: text
    content: Gaza will shave her head in mourning;
  - type: text
    content: Ashkelon will be silenced.
  - type: text
    content: You remnant on the plain,
  - type: text
    content: how long will you cut yourselves?
  '6':
  - type: text
    content: '“ ‘Alas, sword of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: how long till you rest?
  - type: text
    content: Return to your sheath;
  - type: text
    content: cease and be still.’
  '7':
  - type: text
    content: But how can it rest
  - type: text
    content: 'when the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded it,'
  - type: text
    content: when he has ordered it
  - type: text
    content: to attack Ashkelon and the coast?”
