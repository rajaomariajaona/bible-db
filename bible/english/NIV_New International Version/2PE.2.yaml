document_id: 2PE.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: False Teachers and Their Destruction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But there were also false prophets among the people, just as there will be false teachers among you. They will secretly introduce destructive heresies, even denying the sovereign Lord who bought them—bringing swift destruction on themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Many will follow their depraved conduct and will bring the way of truth into disrepute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: In their greed these teachers will exploit you with fabricated stories. Their condemnation has long been hanging over them, and their destruction has not been sleeping.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For if God did not spare angels when they sinned, but sent them to hell,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tartarus
    marker-yv: yv-n
  - type: text
    text: ' putting them in chains of darkness'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in gloomy dungeons
    marker-yv: yv-n
  - type: text
    text: ' to be held for judgment; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'if he did not spare the ancient world when he brought the flood on its ungodly people, but protected Noah, a preacher of righteousness, and seven others; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'if he condemned the cities of Sodom and Gomorrah by burning them to ashes, and made them an example of what is going to happen to the ungodly; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'and if he rescued Lot, a righteous man, who was distressed by the depraved conduct of the lawless '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '(for that righteous man, living among them day after day, was tormented in his righteous soul by the lawless deeds he saw and heard)— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'if this is so, then the Lord knows how to rescue the godly from trials and to hold the unrighteous for punishment on the day of judgment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: This is especially true of those who follow the corrupt desire of the flesh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In contexts like this, the Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'flesh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: tl
        children:
        - type: text
          text: sarx
      - type: text
        text: ) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit; also in verse 18.
    marker-yv: yv-n
  - type: text
    text: ' and despise authority.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Bold and arrogant, they are not afraid to heap abuse on celestial beings; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: yet even angels, although they are stronger and more powerful, do not heap abuse on such beings when bringing judgment on them from
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Many manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: beings in the presence of
    marker-yv: yv-n
  - type: text
    text: ' the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But these people blaspheme in matters they do not understand. They are like unreasoning animals, creatures of instinct, born only to be caught and destroyed, and like animals they too will perish.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They will be paid back with harm for the harm they have done. Their idea of pleasure is to carouse in broad daylight. They are blots and blemishes, reveling in their pleasures while they feast with you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in their love feasts
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'With eyes full of adultery, they never stop sinning; they seduce the unstable; they are experts in greed—an accursed brood! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They have left the straight way and wandered off to follow the way of Balaam son of Bezer,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Bosor
    marker-yv: yv-n
  - type: text
    text: ' who loved the wages of wickedness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But he was rebuked for his wrongdoing by a donkey—an animal without speech—who spoke with a human voice and restrained the prophet’s madness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'These people are springs without water and mists driven by a storm. Blackest darkness is reserved for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For they mouth empty, boastful words and, by appealing to the lustful desires of the flesh, they entice people who are just escaping from those who live in error. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They promise them freedom, while they themselves are slaves of depravity—for “people are slaves to whatever has mastered them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'If they have escaped the corruption of the world by knowing our Lord and Savior Jesus Christ and are again entangled in it and are overcome, they are worse off at the end than they were at the beginning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'It would have been better for them not to have known the way of righteousness, than to have known it and then to turn their backs on the sacred command that was passed on to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Of them the proverbs are true: “A dog returns to its vomit,”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Prov. 26:11
    marker-yv: yv-n
  - type: text
    text: ' and, “A sow that is washed returns to her wallowing in the mud.”'
