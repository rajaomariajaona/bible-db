document_id: 2PE.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: False Teachers and Their Destruction
  - type: text
    content: 'But there were also false prophets among the people, just as there will be false teachers among you. They will secretly introduce destructive heresies, even denying the sovereign Lord who bought them—bringing swift destruction on themselves. '
  '10':
  - type: text
    content: This is especially true of those who follow the corrupt desire of the flesh
  - type: note
    content: In contexts like this, the Greek word for flesh (sarx) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit; also in verse 18.
  - type: text
    content: ' and despise authority.'
  - type: text
    content: 'Bold and arrogant, they are not afraid to heap abuse on celestial beings; '
  '11':
  - type: text
    content: yet even angels, although they are stronger and more powerful, do not heap abuse on such beings when bringing judgment on them from
  - type: note
    content: Many manuscripts beings in the presence of
  - type: text
    content: ' the Lord. '
  '12':
  - type: text
    content: But these people blaspheme in matters they do not understand. They are like unreasoning animals, creatures of instinct, born only to be caught and destroyed, and like animals they too will perish.
  '13':
  - type: text
    content: They will be paid back with harm for the harm they have done. Their idea of pleasure is to carouse in broad daylight. They are blots and blemishes, reveling in their pleasures while they feast with you.
  - type: note
    content: Some manuscripts in their love feasts
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'With eyes full of adultery, they never stop sinning; they seduce the unstable; they are experts in greed—an accursed brood! '
  '15':
  - type: text
    content: They have left the straight way and wandered off to follow the way of Balaam son of Bezer,
  - type: note
    content: Greek Bosor
  - type: text
    content: ' who loved the wages of wickedness. '
  '16':
  - type: text
    content: But he was rebuked for his wrongdoing by a donkey—an animal without speech—who spoke with a human voice and restrained the prophet’s madness.
  '17':
  - type: text
    content: 'These people are springs without water and mists driven by a storm. Blackest darkness is reserved for them. '
  '18':
  - type: text
    content: 'For they mouth empty, boastful words and, by appealing to the lustful desires of the flesh, they entice people who are just escaping from those who live in error. '
  '19':
  - type: text
    content: 'They promise them freedom, while they themselves are slaves of depravity—for “people are slaves to whatever has mastered them.” '
  '2':
  - type: text
    content: 'Many will follow their depraved conduct and will bring the way of truth into disrepute. '
  '20':
  - type: text
    content: 'If they have escaped the corruption of the world by knowing our Lord and Savior Jesus Christ and are again entangled in it and are overcome, they are worse off at the end than they were at the beginning. '
  '21':
  - type: text
    content: 'It would have been better for them not to have known the way of righteousness, than to have known it and then to turn their backs on the sacred command that was passed on to them. '
  '22':
  - type: text
    content: 'Of them the proverbs are true: “A dog returns to its vomit,”'
  - type: note
    content: Prov. 26:11
  - type: text
    content: ' and, “A sow that is washed returns to her wallowing in the mud.”'
  '3':
  - type: text
    content: In their greed these teachers will exploit you with fabricated stories. Their condemnation has long been hanging over them, and their destruction has not been sleeping.
  '4':
  - type: text
    content: For if God did not spare angels when they sinned, but sent them to hell,
  - type: note
    content: Greek Tartarus
  - type: text
    content: ' putting them in chains of darkness'
  - type: note
    content: Some manuscripts in gloomy dungeons
  - type: text
    content: ' to be held for judgment; '
  '5':
  - type: text
    content: 'if he did not spare the ancient world when he brought the flood on its ungodly people, but protected Noah, a preacher of righteousness, and seven others; '
  '6':
  - type: text
    content: 'if he condemned the cities of Sodom and Gomorrah by burning them to ashes, and made them an example of what is going to happen to the ungodly; '
  '7':
  - type: text
    content: 'and if he rescued Lot, a righteous man, who was distressed by the depraved conduct of the lawless '
  '8':
  - type: text
    content: '(for that righteous man, living among them day after day, was tormented in his righteous soul by the lawless deeds he saw and heard)— '
  '9':
  - type: text
    content: 'if this is so, then the Lord knows how to rescue the godly from trials and to hold the unrighteous for punishment on the day of judgment. '
