document_id: 1SA.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Calls Samuel
  - type: text
    content: 'The boy Samuel ministered before the '
  - type: text
    content: Lord
  - type: text
    content: ' under Eli. In those days the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' was rare; there were not many visions.'
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' came and stood there, calling as at the other times, “Samuel! Samuel!”'
  - type: text
    content: Then Samuel said, “Speak, for your servant is listening.”
  '11':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel: “See, I am about to do something in Israel that will make the ears of everyone who hears about it tingle. '
  '12':
  - type: text
    content: 'At that time I will carry out against Eli everything I spoke against his family—from beginning to end. '
  '13':
  - type: text
    content: For I told him that I would judge his family forever because of the sin he knew about; his sons blasphemed God,
  - type: note
    content: An ancient Hebrew scribal tradition (see also Septuagint); Masoretic Text sons made themselves contemptible
  - type: text
    content: ' and he failed to restrain them. '
  '14':
  - type: text
    content: Therefore I swore to the house of Eli, ‘The guilt of Eli’s house will never be atoned for by sacrifice or offering.’ ”
  '15':
  - type: text
    content: 'Samuel lay down until morning and then opened the doors of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. He was afraid to tell Eli the vision, '
  '16':
  - type: text
    content: but Eli called him and said, “Samuel, my son.”
  - type: text
    content: Samuel answered, “Here I am.”
  '17':
  - type: text
    content: '“What was it he said to you?” Eli asked. “Do not hide it from me. May God deal with you, be it ever so severely, if you hide from me anything he told you.” '
  '18':
  - type: text
    content: 'So Samuel told him everything, hiding nothing from him. Then Eli said, “He is the '
  - type: text
    content: Lord
  - type: text
    content: ; let him do what is good in his eyes.”
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' was with Samuel as he grew up, and he let none of Samuel’s words fall to the ground. '
  '2':
  - type: text
    content: 'One night Eli, whose eyes were becoming so weak that he could barely see, was lying down in his usual place. '
  '20':
  - type: text
    content: 'And all Israel from Dan to Beersheba recognized that Samuel was attested as a prophet of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' continued to appear at Shiloh, and there he revealed himself to Samuel through his word.'
  '3':
  - type: text
    content: 'The lamp of God had not yet gone out, and Samuel was lying down in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', where the ark of God was. '
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' called Samuel.'
  - type: text
    content: 'Samuel answered, “Here I am.” '
  '5':
  - type: text
    content: And he ran to Eli and said, “Here I am; you called me.”
  - type: text
    content: But Eli said, “I did not call; go back and lie down.” So he went and lay down.
  '6':
  - type: text
    content: 'Again the '
  - type: text
    content: Lord
  - type: text
    content: ' called, “Samuel!” And Samuel got up and went to Eli and said, “Here I am; you called me.”'
  - type: text
    content: “My son,” Eli said, “I did not call; go back and lie down.”
  '7':
  - type: text
    content: 'Now Samuel did not yet know the '
  - type: text
    content: Lord
  - type: text
    content: ': The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' had not yet been revealed to him.'
  '8':
  - type: text
    content: 'A third time the '
  - type: text
    content: Lord
  - type: text
    content: ' called, “Samuel!” And Samuel got up and went to Eli and said, “Here I am; you called me.”'
  - type: text
    content: 'Then Eli realized that the '
  - type: text
    content: Lord
  - type: text
    content: ' was calling the boy. '
  '9':
  - type: text
    content: 'So Eli told Samuel, “Go and lie down, and if he calls you, say, ‘Speak, '
  - type: text
    content: Lord
  - type: text
    content: ', for your servant is listening.’ ” So Samuel went and lay down in his place.'
