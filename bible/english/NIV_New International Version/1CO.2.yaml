document_id: 1CO.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: And so it was with me, brothers and sisters. When I came to you, I did not come with eloquence or human wisdom as I proclaimed to you the testimony about God.
  - type: note
    content: Some manuscripts proclaimed to you God’s mystery
  - type: text
    content: ' '
  '10':
  - type: text
    content: these are the things God has revealed to us by his Spirit.
  - type: text
    content: 'The Spirit searches all things, even the deep things of God. '
  '11':
  - type: text
    content: 'For who knows a person’s thoughts except their own spirit within them? In the same way no one knows the thoughts of God except the Spirit of God. '
  '12':
  - type: text
    content: 'What we have received is not the spirit of the world, but the Spirit who is from God, so that we may understand what God has freely given us. '
  '13':
  - type: text
    content: This is what we speak, not in words taught us by human wisdom but in words taught by the Spirit, explaining spiritual realities with Spirit-taught words.
  - type: note
    content: Or Spirit, interpreting spiritual truths to those who are spiritual
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'The person without the Spirit does not accept the things that come from the Spirit of God but considers them foolishness, and cannot understand them because they are discerned only through the Spirit. '
  '15':
  - type: text
    content: 'The person with the Spirit makes judgments about all things, but such a person is not subject to merely human judgments, '
  '16':
  - type: text
    content: for,
  - type: text
    content: “Who has known the mind of the Lord
  - type: text
    content: so as to instruct him?”
  - type: note
    content: Isaiah 40:13
  - type: text
    content: But we have the mind of Christ.
  '2':
  - type: text
    content: 'For I resolved to know nothing while I was with you except Jesus Christ and him crucified. '
  '3':
  - type: text
    content: 'I came to you in weakness with great fear and trembling. '
  '4':
  - type: text
    content: 'My message and my preaching were not with wise and persuasive words, but with a demonstration of the Spirit’s power, '
  '5':
  - type: text
    content: so that your faith might not rest on human wisdom, but on God’s power.
  - type: heading
    content: God’s Wisdom Revealed by the Spirit
  '6':
  - type: text
    content: 'We do, however, speak a message of wisdom among the mature, but not the wisdom of this age or of the rulers of this age, who are coming to nothing. '
  '7':
  - type: text
    content: 'No, we declare God’s wisdom, a mystery that has been hidden and that God destined for our glory before time began. '
  '8':
  - type: text
    content: 'None of the rulers of this age understood it, for if they had, they would not have crucified the Lord of glory. '
  '9':
  - type: text
    content: 'However, as it is written:'
  - type: text
    content: “What no eye has seen,
  - type: text
    content: what no ear has heard,
  - type: text
    content: and what no human mind has conceived”
  - type: note
    content: Isaiah 64:4
  - type: text
    content: —
  - type: text
    content: the things God has prepared for those who love him—
