document_id: 1CO.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And so it was with me, brothers and sisters. When I came to you, I did not come with eloquence or human wisdom as I proclaimed to you the testimony about God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: proclaimed to you God’s mystery
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: these are the things God has revealed to us by his Spirit.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Spirit searches all things, even the deep things of God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For who knows a person’s thoughts except their own spirit within them? In the same way no one knows the thoughts of God except the Spirit of God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What we have received is not the spirit of the world, but the Spirit who is from God, so that we may understand what God has freely given us. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is what we speak, not in words taught us by human wisdom but in words taught by the Spirit, explaining spiritual realities with Spirit-taught words.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Spirit, interpreting spiritual truths to those who are spiritual
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The person without the Spirit does not accept the things that come from the Spirit of God but considers them foolishness, and cannot understand them because they are discerned only through the Spirit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The person with the Spirit makes judgments about all things, but such a person is not subject to merely human judgments, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who has known the mind of the Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so as to instruct him?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 40:13
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: But we have the mind of Christ.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I resolved to know nothing while I was with you except Jesus Christ and him crucified. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I came to you in weakness with great fear and trembling. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My message and my preaching were not with wise and persuasive words, but with a demonstration of the Spirit’s power, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so that your faith might not rest on human wisdom, but on God’s power.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Wisdom Revealed by the Spirit
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We do, however, speak a message of wisdom among the mature, but not the wisdom of this age or of the rulers of this age, who are coming to nothing. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No, we declare God’s wisdom, a mystery that has been hidden and that God destined for our glory before time began. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'None of the rulers of this age understood it, for if they had, they would not have crucified the Lord of glory. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, as it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What no eye has seen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what no ear has heard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and what no human mind has conceived”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 64:4
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the things God has prepared for those who love him—
