document_id: LUK.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Widow’s Offering
  - type: text
    content: 'As Jesus looked up, he saw the rich putting their gifts into the temple treasury. '
  '10':
  - type: text
    content: 'Then he said to them: '
  - type: text
    content: “Nation will rise against nation, and kingdom against kingdom.
  - type: text
    content: ' '
  '11':
  - type: text
    content: There will be great earthquakes, famines and pestilences in various places, and fearful events and great signs from heaven.
  '12':
  - type: text
    content: ' '
  - type: text
    content: “But before all this, they will seize you and persecute you. They will hand you over to synagogues and put you in prison, and you will be brought before kings and governors, and all on account of my name.
  - type: text
    content: ' '
  '13':
  - type: text
    content: And so you will bear testimony to me.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But make up your mind not to worry beforehand how you will defend yourselves.
  - type: text
    content: ' '
  '15':
  - type: text
    content: For I will give you words and wisdom that none of your adversaries will be able to resist or contradict.
  - type: text
    content: ' '
  '16':
  - type: text
    content: You will be betrayed even by parents, brothers and sisters, relatives and friends, and they will put some of you to death.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Everyone will hate you because of me.
  - type: text
    content: ' '
  '18':
  - type: text
    content: But not a hair of your head will perish.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Stand firm, and you will win life.
  '2':
  - type: text
    content: 'He also saw a poor widow put in two very small copper coins. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “When you see Jerusalem being surrounded by armies, you will know that its desolation is near.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Then let those who are in Judea flee to the mountains, let those in the city get out, and let those in the country not enter the city.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For this is the time of punishment in fulfillment of all that has been written.
  - type: text
    content: ' '
  '23':
  - type: text
    content: How dreadful it will be in those days for pregnant women and nursing mothers! There will be great distress in the land and wrath against this people.
  - type: text
    content: ' '
  '24':
  - type: text
    content: They will fall by the sword and will be taken as prisoners to all the nations. Jerusalem will be trampled on by the Gentiles until the times of the Gentiles are fulfilled.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “There will be signs in the sun, moon and stars. On the earth, nations will be in anguish and perplexity at the roaring and tossing of the sea.
  - type: text
    content: ' '
  '26':
  - type: text
    content: People will faint from terror, apprehensive of what is coming on the world, for the heavenly bodies will be shaken.
  - type: text
    content: ' '
  '27':
  - type: text
    content: At that time they will see the Son of Man coming in a cloud with power and great glory.
  - type: text
    content: ' '
  '28':
  - type: text
    content: When these things begin to take place, stand up and lift up your heads, because your redemption is drawing near.”
  '29':
  - type: text
    content: 'He told them this parable: '
  - type: text
    content: “Look at the fig tree and all the trees.
  - type: text
    content: ' '
  '3':
  - type: text
    content: “Truly I tell you,”
  - type: text
    content: ' he said, '
  - type: text
    content: “this poor widow has put in more than all the others.
  - type: text
    content: ' '
  '30':
  - type: text
    content: When they sprout leaves, you can see for yourselves and know that summer is near.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Even so, when you see these things happening, you know that the kingdom of God is near.
  '32':
  - type: text
    content: ' '
  - type: text
    content: “Truly I tell you, this generation will certainly not pass away until all these things have happened.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Heaven and earth will pass away, but my words will never pass away.
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Be careful, or your hearts will be weighed down with carousing, drunkenness and the anxieties of life, and that day will close on you suddenly like a trap.
  - type: text
    content: ' '
  '35':
  - type: text
    content: For it will come on all those who live on the face of the whole earth.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Be always on the watch, and pray that you may be able to escape all that is about to happen, and that you may be able to stand before the Son of Man.”
  '37':
  - type: text
    content: 'Each day Jesus was teaching at the temple, and each evening he went out to spend the night on the hill called the Mount of Olives, '
  '38':
  - type: text
    content: and all the people came early in the morning to hear him at the temple.
  '4':
  - type: text
    content: All these people gave their gifts out of their wealth; but she out of her poverty put in all she had to live on.”
  - type: heading
    content: The Destruction of the Temple and Signs of the End Times
  '5':
  - type: text
    content: 'Some of his disciples were remarking about how the temple was adorned with beautiful stones and with gifts dedicated to God. But Jesus said, '
  '6':
  - type: text
    content: “As for what you see here, the time will come when not one stone will be left on another; every one of them will be thrown down.”
  '7':
  - type: text
    content: “Teacher,” they asked, “when will these things happen? And what will be the sign that they are about to take place?”
  '8':
  - type: text
    content: 'He replied: '
  - type: text
    content: “Watch out that you are not deceived. For many will come in my name, claiming, ‘I am he,’ and, ‘The time is near.’ Do not follow them.
  - type: text
    content: ' '
  '9':
  - type: text
    content: When you hear of wars and uprisings, do not be frightened. These things must happen first, but the end will not come right away.”
