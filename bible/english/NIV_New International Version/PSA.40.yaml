document_id: PSA.40
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 40
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 40:1-17 is numbered 40:2-18.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. Of David. A psalm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I waited patiently for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he turned to me and heard my cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He lifted me out of the slimy pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: out of the mud and mire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he set my feet on a rock
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gave me a firm place to stand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He put a new song in my mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a hymn of praise to our God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Many will see and fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and put their trust in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Blessed is the one
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who trusts in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: who does not look to the proud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who turn aside to false gods.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to lies
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Many, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: are the wonders you have done,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the things you planned for us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: None can compare with you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: were I to speak and tell of your deeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they would be too many to declare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sacrifice and offering you did not desire—
- type: usfm
  marker: q2
  children:
  - type: text
    text: but my ears you have opened
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; some Septuagint manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: but a body you have prepared for me
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: burnt offerings and sin offerings
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: purification offerings
    marker-yv: yv-n
  - type: text
    text: ' you did not require.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then I said, “Here I am, I have come—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is written about me in the scroll.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: come / with the scroll written for me
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I desire to do your will, my God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your law is within my heart.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I proclaim your saving acts in the great assembly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I do not seal my lips, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: as you know.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I do not hide your righteousness in my heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I speak of your faithfulness and your saving help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I do not conceal your love and your faithfulness
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the great assembly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Do not withhold your mercy from me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may your love and faithfulness always protect me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For troubles without number surround me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my sins have overtaken me, and I cannot see.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are more than the hairs of my head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my heart fails within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Be pleased to save me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'come quickly, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', to help me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: May all who want to take my life
- type: usfm
  marker: q2
  children:
  - type: text
    text: be put to shame and confusion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: may all who desire my ruin
- type: usfm
  marker: q2
  children:
  - type: text
    text: be turned back in disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: May those who say to me, “Aha! Aha!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: be appalled at their own shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But may all who seek you
- type: usfm
  marker: q2
  children:
  - type: text
    text: rejoice and be glad in you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: may those who long for your saving help always say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is great!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But as for me, I am poor and needy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may the Lord think of me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are my help and my deliverer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are my God, do not delay.
