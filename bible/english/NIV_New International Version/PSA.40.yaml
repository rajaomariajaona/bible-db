verses:
  '1':
  - type: heading
    content: Psalm 40In Hebrew texts 40:1-17 is numbered 40:2-18.
  - type: text
    content: For the director of music. Of David. A psalm.
  - type: text
    content: 'I waited patiently for the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: he turned to me and heard my cry.
  '10':
  - type: text
    content: I do not hide your righteousness in my heart;
  - type: text
    content: I speak of your faithfulness and your saving help.
  - type: text
    content: I do not conceal your love and your faithfulness
  - type: text
    content: from the great assembly.
  '11':
  - type: text
    content: 'Do not withhold your mercy from me, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: may your love and faithfulness always protect me.
  '12':
  - type: text
    content: For troubles without number surround me;
  - type: text
    content: my sins have overtaken me, and I cannot see.
  - type: text
    content: They are more than the hairs of my head,
  - type: text
    content: and my heart fails within me.
  '13':
  - type: text
    content: 'Be pleased to save me, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'come quickly, '
  - type: text
    content: Lord
  - type: text
    content: ', to help me.'
  '14':
  - type: text
    content: May all who want to take my life
  - type: text
    content: be put to shame and confusion;
  - type: text
    content: may all who desire my ruin
  - type: text
    content: be turned back in disgrace.
  '15':
  - type: text
    content: May those who say to me, “Aha! Aha!”
  - type: text
    content: be appalled at their own shame.
  '16':
  - type: text
    content: But may all who seek you
  - type: text
    content: rejoice and be glad in you;
  - type: text
    content: may those who long for your saving help always say,
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is great!”'
  '17':
  - type: text
    content: But as for me, I am poor and needy;
  - type: text
    content: may the Lord think of me.
  - type: text
    content: You are my help and my deliverer;
  - type: text
    content: you are my God, do not delay.
  '2':
  - type: text
    content: He lifted me out of the slimy pit,
  - type: text
    content: out of the mud and mire;
  - type: text
    content: he set my feet on a rock
  - type: text
    content: and gave me a firm place to stand.
  '3':
  - type: text
    content: He put a new song in my mouth,
  - type: text
    content: a hymn of praise to our God.
  - type: text
    content: 'Many will see and fear the '
  - type: text
    content: Lord
  - type: text
    content: and put their trust in him.
  '4':
  - type: text
    content: Blessed is the one
  - type: text
    content: 'who trusts in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who does not look to the proud,
  - type: text
    content: to those who turn aside to false gods.
  - type: note
    content: Or to lies
  '5':
  - type: text
    content: 'Many, '
  - type: text
    content: Lord
  - type: text
    content: ' my God,'
  - type: text
    content: are the wonders you have done,
  - type: text
    content: the things you planned for us.
  - type: text
    content: None can compare with you;
  - type: text
    content: were I to speak and tell of your deeds,
  - type: text
    content: they would be too many to declare.
  '6':
  - type: text
    content: Sacrifice and offering you did not desire—
  - type: text
    content: but my ears you have opened
  - type: note
    content: Hebrew; some Septuagint manuscripts but a body you have prepared for me
  - type: text
    content: —
  - type: text
    content: burnt offerings and sin offerings
  - type: note
    content: Or purification offerings
  - type: text
    content: ' you did not require.'
  '7':
  - type: text
    content: Then I said, “Here I am, I have come—
  - type: text
    content: it is written about me in the scroll.
  - type: note
    content: Or come / with the scroll written for me
  '8':
  - type: text
    content: I desire to do your will, my God;
  - type: text
    content: your law is within my heart.”
  '9':
  - type: text
    content: I proclaim your saving acts in the great assembly;
  - type: text
    content: 'I do not seal my lips, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: as you know.
