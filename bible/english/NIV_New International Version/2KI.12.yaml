document_id: 2KI.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Joash Repairs the Temple
  - type: note
    content: In Hebrew texts 12:1-21 is numbered 12:2-22
  - type: text
    content: In the seventh year of Jehu, Joash
  - type: note
    content: Hebrew Jehoash, a variant of Joash; also in verses 2, 4, 6, 7 and 18
  - type: text
    content: ' became king, and he reigned in Jerusalem forty years. His mother’s name was Zibiah; she was from Beersheba. '
  '10':
  - type: text
    content: 'Whenever they saw that there was a large amount of money in the chest, the royal secretary and the high priest came, counted the money that had been brought into the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and put it into bags. '
  '11':
  - type: text
    content: 'When the amount had been determined, they gave the money to the men appointed to supervise the work on the temple. With it they paid those who worked on the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '—the carpenters and builders, '
  '12':
  - type: text
    content: 'the masons and stonecutters. They purchased timber and blocks of dressed stone for the repair of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and met all the other expenses of restoring the temple.'
  '13':
  - type: text
    content: 'The money brought into the temple was not spent for making silver basins, wick trimmers, sprinkling bowls, trumpets or any other articles of gold or silver for the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '; '
  '14':
  - type: text
    content: 'it was paid to the workers, who used it to repair the temple. '
  '15':
  - type: text
    content: 'They did not require an accounting from those to whom they gave the money to pay the workers, because they acted with complete honesty. '
  '16':
  - type: text
    content: The money from the guilt offerings and sin offerings
  - type: note
    content: Or purification offerings
  - type: text
    content: ' was not brought into the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ; it belonged to the priests.
  '17':
  - type: text
    content: 'About this time Hazael king of Aram went up and attacked Gath and captured it. Then he turned to attack Jerusalem. '
  '18':
  - type: text
    content: 'But Joash king of Judah took all the sacred objects dedicated by his predecessors—Jehoshaphat, Jehoram and Ahaziah, the kings of Judah—and the gifts he himself had dedicated and all the gold found in the treasuries of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and of the royal palace, and he sent them to Hazael king of Aram, who then withdrew from Jerusalem.'
  '19':
  - type: text
    content: 'As for the other events of the reign of Joash, and all he did, are they not written in the book of the annals of the kings of Judah? '
  '2':
  - type: text
    content: 'Joash did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' all the years Jehoiada the priest instructed him. '
  '20':
  - type: text
    content: 'His officials conspired against him and assassinated him at Beth Millo, on the road down to Silla. '
  '21':
  - type: text
    content: The officials who murdered him were Jozabad son of Shimeath and Jehozabad son of Shomer. He died and was buried with his ancestors in the City of David. And Amaziah his son succeeded him as king.
  '3':
  - type: text
    content: The high places, however, were not removed; the people continued to offer sacrifices and burn incense there.
  '4':
  - type: text
    content: 'Joash said to the priests, “Collect all the money that is brought as sacred offerings to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '—the money collected in the census, the money received from personal vows and the money brought voluntarily to the temple. '
  '5':
  - type: text
    content: Let every priest receive the money from one of the treasurers, then use it to repair whatever damage is found in the temple.”
  '6':
  - type: text
    content: 'But by the twenty-third year of King Joash the priests still had not repaired the temple. '
  '7':
  - type: text
    content: 'Therefore King Joash summoned Jehoiada the priest and the other priests and asked them, “Why aren’t you repairing the damage done to the temple? Take no more money from your treasurers, but hand it over for repairing the temple.” '
  '8':
  - type: text
    content: The priests agreed that they would not collect any more money from the people and that they would not repair the temple themselves.
  '9':
  - type: text
    content: 'Jehoiada the priest took a chest and bored a hole in its lid. He placed it beside the altar, on the right side as one enters the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. The priests who guarded the entrance put into the chest all the money that was brought to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
