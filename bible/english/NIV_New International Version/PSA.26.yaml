  - type: text
    content: .
  '2':
  - type: text
    content: 'Test me, '
  - type: text
    content: Lord
  - type: text
    content: ', and try me,'
  - type: text
    content: examine my heart and my mind;
  '3':
  - type: text
    content: for I have always been mindful of your unfailing love
  - type: text
    content: and have lived in reliance on your faithfulness.
  '4':
  - type: text
    content: I do not sit with the deceitful,
  - type: text
    content: nor do I associate with hypocrites.
  '5':
  - type: text
    content: I abhor the assembly of evildoers
  - type: text
    content: and refuse to sit with the wicked.
  '6':
  - type: text
    content: I wash my hands in innocence,
  - type: text
    content: 'and go about your altar, '
  - type: text
    content: Lord
  - type: text
    content: ','
  '7':
  - type: text
    content: proclaiming aloud your praise
  - type: text
    content: and telling of all your wonderful deeds.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', I love the house where you live,'
  - type: text
    content: the place where your glory dwells.
  '9':
  - type: text
    content: Do not take away my soul along with sinners,
  - type: text
