document_id: PSA.26,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 26
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vindicate me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have led a blameless life;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have trusted in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have not faltered.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in whose hands are wicked schemes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose right hands are full of bribes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I lead a blameless life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deliver me and be merciful to me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My feet stand on level ground;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the great congregation I will praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Test me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and try me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: examine my heart and my mind;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I have always been mindful of your unfailing love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have lived in reliance on your faithfulness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I do not sit with the deceitful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor do I associate with hypocrites.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I abhor the assembly of evildoers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and refuse to sit with the wicked.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I wash my hands in innocence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and go about your altar, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: proclaiming aloud your praise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and telling of all your wonderful deeds.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I love the house where you live,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the place where your glory dwells.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not take away my soul along with sinners,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my life with those who are bloodthirsty,
