document_id: JON.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jonah Goes to Nineveh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Jonah a second time: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When God saw what they did and how they turned from their evil ways, he relented and did not bring on them the destruction he had threatened.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go to the great city of Nineveh and proclaim to it the message I give you.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonah obeyed the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and went to Nineveh. Now Nineveh was a very large city; it took three days to go through it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonah began by going a day’s journey into the city, proclaiming, “Forty more days and Nineveh will be overthrown.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Ninevites believed God. A fast was proclaimed, and all of them, from the greatest to the least, put on sackcloth.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jonah’s warning reached the king of Nineveh, he rose from his throne, took off his royal robes, covered himself with sackcloth and sat down in the dust. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the proclamation he issued in Nineveh:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“By the decree of the king and his nobles:'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Do not let people or animals, herds or flocks, taste anything; do not let them eat or drink. '
  '8':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'But let people and animals be covered with sackcloth. Let everyone call urgently on God. Let them give up their evil ways and their violence. '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Who knows? God may yet relent and with compassion turn from his fierce anger so that we will not perish.”
