document_id: MAT.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Has Risen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: After the Sabbath, at dawn on the first day of the week, Mary Magdalene and the other Mary went to look at the tomb.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There was a violent earthquake, for an angel of the Lord came down from heaven and, going to the tomb, rolled back the stone and sat on it. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'His appearance was like lightning, and his clothes were white as snow. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The guards were so afraid of him that they shook and became like dead men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The angel said to the women, “Do not be afraid, for I know that you are looking for Jesus, who was crucified. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He is not here; he has risen, just as he said. Come and see the place where he lay. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then go quickly and tell his disciples: ‘He has risen from the dead and is going ahead of you into Galilee. There you will see him.’ Now I have told you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So the women hurried away from the tomb, afraid yet filled with joy, and ran to tell his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Suddenly Jesus met them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Greetings,”
  - type: text
    text: ' he said. They came to him, clasped his feet and worshiped him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do not be afraid. Go and tell my brothers to go to Galilee; there they will see me.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Guards’ Report
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'While the women were on their way, some of the guards went into the city and reported to the chief priests everything that had happened. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When the chief priests had met with the elders and devised a plan, they gave the soldiers a large sum of money, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'telling them, “You are to say, ‘His disciples came during the night and stole him away while we were asleep.’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'If this report gets to the governor, we will satisfy him and keep you out of trouble.” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So the soldiers took the money and did as they were instructed. And this story has been widely circulated among the Jews to this very day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Great Commission
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then the eleven disciples went to Galilee, to the mountain where Jesus had told them to go. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When they saw him, they worshiped him; but some doubted. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Jesus came to them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “All authority in heaven and on earth has been given to me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Therefore go and make disciples of all nations, baptizing them in the name of the Father and of the Son and of the Holy Spirit,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and teaching them to obey everything I have commanded you. And surely I am with you always, to the very end of the age.”
