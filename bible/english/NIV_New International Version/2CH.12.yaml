document_id: 2CH.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Shishak Attacks Jerusalem
  - type: text
    content: After Rehoboam’s position as king was established and he had become strong, he and all Israel
  - type: note
    content: That is, Judah, as frequently in 2 Chronicles
  - type: text
    content: ' with him abandoned the law of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'So King Rehoboam made bronze shields to replace them and assigned these to the commanders of the guard on duty at the entrance to the royal palace. '
  '11':
  - type: text
    content: 'Whenever the king went to the '
  - type: text
    content: Lord
  - type: text
    content: ’s temple, the guards went with him, bearing the shields, and afterward they returned them to the guardroom.
  '12':
  - type: text
    content: 'Because Rehoboam humbled himself, the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger turned from him, and he was not totally destroyed. Indeed, there was some good in Judah.
  '13':
  - type: text
    content: 'King Rehoboam established himself firmly in Jerusalem and continued as king. He was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city the '
  - type: text
    content: Lord
  - type: text
    content: ' had chosen out of all the tribes of Israel in which to put his Name. His mother’s name was Naamah; she was an Ammonite. '
  '14':
  - type: text
    content: 'He did evil because he had not set his heart on seeking the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: 'As for the events of Rehoboam’s reign, from beginning to end, are they not written in the records of Shemaiah the prophet and of Iddo the seer that deal with genealogies? There was continual warfare between Rehoboam and Jeroboam. '
  '16':
  - type: text
    content: Rehoboam rested with his ancestors and was buried in the City of David. And Abijah his son succeeded him as king.
  '2':
  - type: text
    content: 'Because they had been unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ', Shishak king of Egypt attacked Jerusalem in the fifth year of King Rehoboam. '
  '3':
  - type: text
    content: With twelve hundred chariots and sixty thousand horsemen and the innumerable troops of Libyans, Sukkites and Cushites
  - type: note
    content: That is, people from the upper Nile region
  - type: text
    content: ' that came with him from Egypt, '
  '4':
  - type: text
    content: he captured the fortified cities of Judah and came as far as Jerusalem.
  '5':
  - type: text
    content: 'Then the prophet Shemaiah came to Rehoboam and to the leaders of Judah who had assembled in Jerusalem for fear of Shishak, and he said to them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says, ‘You have abandoned me; therefore, I now abandon you to Shishak.’ ”'
  '6':
  - type: text
    content: 'The leaders of Israel and the king humbled themselves and said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is just.”'
  '7':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' saw that they humbled themselves, this word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Shemaiah: “Since they have humbled themselves, I will not destroy them but will soon give them deliverance. My wrath will not be poured out on Jerusalem through Shishak. '
  '8':
  - type: text
    content: They will, however, become subject to him, so that they may learn the difference between serving me and serving the kings of other lands.”
  '9':
  - type: text
    content: 'When Shishak king of Egypt attacked Jerusalem, he carried off the treasures of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the treasures of the royal palace. He took everything, including the gold shields Solomon had made. '
