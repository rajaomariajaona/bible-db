document_id: 2CH.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shishak Attacks Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: After Rehoboam’s position as king was established and he had become strong, he and all Israel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Judah, as frequently in 2 Chronicles
      marker-yv: yv-n
    - type: text
      text: ' with him abandoned the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So King Rehoboam made bronze shields to replace them and assigned these to the commanders of the guard on duty at the entrance to the royal palace. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever the king went to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s temple, the guards went with him, bearing the shields, and afterward they returned them to the guardroom.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because Rehoboam humbled himself, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger turned from him, and he was not totally destroyed. Indeed, there was some good in Judah.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Rehoboam established himself firmly in Jerusalem and continued as king. He was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had chosen out of all the tribes of Israel in which to put his Name. His mother’s name was Naamah; she was an Ammonite. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil because he had not set his heart on seeking the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the events of Rehoboam’s reign, from beginning to end, are they not written in the records of Shemaiah the prophet and of Iddo the seer that deal with genealogies? There was continual warfare between Rehoboam and Jeroboam. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehoboam rested with his ancestors and was buried in the City of David. And Abijah his son succeeded him as king.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because they had been unfaithful to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', Shishak king of Egypt attacked Jerusalem in the fifth year of King Rehoboam. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: With twelve hundred chariots and sixty thousand horsemen and the innumerable troops of Libyans, Sukkites and Cushites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, people from the upper Nile region
      marker-yv: yv-n
    - type: text
      text: ' that came with him from Egypt, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: he captured the fortified cities of Judah and came as far as Jerusalem.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the prophet Shemaiah came to Rehoboam and to the leaders of Judah who had assembled in Jerusalem for fear of Shishak, and he said to them, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says, ‘You have abandoned me; therefore, I now abandon you to Shishak.’ ”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leaders of Israel and the king humbled themselves and said, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is just.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saw that they humbled themselves, this word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Shemaiah: “Since they have humbled themselves, I will not destroy them but will soon give them deliverance. My wrath will not be poured out on Jerusalem through Shishak. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will, however, become subject to him, so that they may learn the difference between serving me and serving the kings of other lands.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Shishak king of Egypt attacked Jerusalem, he carried off the treasures of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the treasures of the royal palace. He took everything, including the gold shields Solomon had made. '
