document_id: JDG.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Zebah and Zalmunna
  - type: text
    content: Now the Ephraimites asked Gideon, “Why have you treated us like this? Why didn’t you call us when you went to fight Midian?” And they challenged him vigorously.
  '10':
  - type: text
    content: 'Now Zebah and Zalmunna were in Karkor with a force of about fifteen thousand men, all that were left of the armies of the eastern peoples; a hundred and twenty thousand swordsmen had fallen. '
  '11':
  - type: text
    content: 'Gideon went up by the route of the nomads east of Nobah and Jogbehah and attacked the unsuspecting army. '
  '12':
  - type: text
    content: Zebah and Zalmunna, the two kings of Midian, fled, but he pursued them and captured them, routing their entire army.
  '13':
  - type: text
    content: 'Gideon son of Joash then returned from the battle by the Pass of Heres. '
  '14':
  - type: text
    content: 'He caught a young man of Sukkoth and questioned him, and the young man wrote down for him the names of the seventy-seven officials of Sukkoth, the elders of the town. '
  '15':
  - type: text
    content: 'Then Gideon came and said to the men of Sukkoth, “Here are Zebah and Zalmunna, about whom you taunted me by saying, ‘Do you already have the hands of Zebah and Zalmunna in your possession? Why should we give bread to your exhausted men?’ ” '
  '16':
  - type: text
    content: 'He took the elders of the town and taught the men of Sukkoth a lesson by punishing them with desert thorns and briers. '
  '17':
  - type: text
    content: He also pulled down the tower of Peniel and killed the men of the town.
  '18':
  - type: text
    content: Then he asked Zebah and Zalmunna, “What kind of men did you kill at Tabor?”
  - type: text
    content: “Men like you,” they answered, “each one with the bearing of a prince.”
  '19':
  - type: text
    content: 'Gideon replied, “Those were my brothers, the sons of my own mother. As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, if you had spared their lives, I would not kill you.” '
  '2':
  - type: text
    content: 'But he answered them, “What have I accomplished compared to you? Aren’t the gleanings of Ephraim’s grapes better than the full grape harvest of Abiezer? '
  '20':
  - type: text
    content: Turning to Jether, his oldest son, he said, “Kill them!” But Jether did not draw his sword, because he was only a boy and was afraid.
  '21':
  - type: text
    content: Zebah and Zalmunna said, “Come, do it yourself. ‘As is the man, so is his strength.’ ” So Gideon stepped forward and killed them, and took the ornaments off their camels’ necks.
  - type: heading
    content: Gideon’s Ephod
  '22':
  - type: text
    content: The Israelites said to Gideon, “Rule over us—you, your son and your grandson—because you have saved us from the hand of Midian.”
  '23':
  - type: text
    content: 'But Gideon told them, “I will not rule over you, nor will my son rule over you. The '
  - type: text
    content: Lord
  - type: text
    content: ' will rule over you.” '
  '24':
  - type: text
    content: And he said, “I do have one request, that each of you give me an earring from your share of the plunder.” (It was the custom of the Ishmaelites to wear gold earrings.)
  '25':
  - type: text
    content: 'They answered, “We’ll be glad to give them.” So they spread out a garment, and each of them threw a ring from his plunder onto it. '
  '26':
  - type: text
    content: The weight of the gold rings he asked for came to seventeen hundred shekels,
  - type: note
    content: That is, about 43 pounds or about 20 kilograms
  - type: text
    content: ' not counting the ornaments, the pendants and the purple garments worn by the kings of Midian or the chains that were on their camels’ necks. '
  '27':
  - type: text
    content: Gideon made the gold into an ephod, which he placed in Ophrah, his town. All Israel prostituted themselves by worshiping it there, and it became a snare to Gideon and his family.
  - type: heading
    content: Gideon’s Death
  '28':
  - type: text
    content: Thus Midian was subdued before the Israelites and did not raise its head again. During Gideon’s lifetime, the land had peace forty years.
  '29':
  - type: text
    content: 'Jerub-Baal son of Joash went back home to live. '
  '3':
  - type: text
    content: God gave Oreb and Zeeb, the Midianite leaders, into your hands. What was I able to do compared to you?” At this, their resentment against him subsided.
  '30':
  - type: text
    content: 'He had seventy sons of his own, for he had many wives. '
  '31':
  - type: text
    content: 'His concubine, who lived in Shechem, also bore him a son, whom he named Abimelek. '
  '32':
  - type: text
    content: Gideon son of Joash died at a good old age and was buried in the tomb of his father Joash in Ophrah of the Abiezrites.
  '33':
  - type: text
    content: 'No sooner had Gideon died than the Israelites again prostituted themselves to the Baals. They set up Baal-Berith as their god '
  '34':
  - type: text
    content: 'and did not remember the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, who had rescued them from the hands of all their enemies on every side. '
  '35':
  - type: text
    content: They also failed to show any loyalty to the family of Jerub-Baal (that is, Gideon) in spite of all the good things he had done for them.
  '4':
  - type: text
    content: 'Gideon and his three hundred men, exhausted yet keeping up the pursuit, came to the Jordan and crossed it. '
  '5':
  - type: text
    content: He said to the men of Sukkoth, “Give my troops some bread; they are worn out, and I am still pursuing Zebah and Zalmunna, the kings of Midian.”
  '6':
  - type: text
    content: But the officials of Sukkoth said, “Do you already have the hands of Zebah and Zalmunna in your possession? Why should we give bread to your troops?”
  '7':
  - type: text
    content: 'Then Gideon replied, “Just for that, when the '
  - type: text
    content: Lord
  - type: text
    content: ' has given Zebah and Zalmunna into my hand, I will tear your flesh with desert thorns and briers.”'
  '8':
  - type: text
    content: From there he went up to Peniel
  - type: note
    content: Hebrew Penuel, a variant of Peniel; also in verses 9 and 17
  - type: text
    content: ' and made the same request of them, but they answered as the men of Sukkoth had. '
  '9':
  - type: text
    content: So he said to the men of Peniel, “When I return in triumph, I will tear down this tower.”
