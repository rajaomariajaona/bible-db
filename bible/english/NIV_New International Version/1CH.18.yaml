document_id: 1CH.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Victories
  - type: text
    content: In the course of time, David defeated the Philistines and subdued them, and he took Gath and its surrounding villages from the control of the Philistines.
  '10':
  - type: text
    content: he sent his son Hadoram to King David to greet him and congratulate him on his victory in battle over Hadadezer, who had been at war with Tou. Hadoram brought all kinds of articles of gold, of silver and of bronze.
  '11':
  - type: text
    content: 'King David dedicated these articles to the '
  - type: text
    content: Lord
  - type: text
    content: ', as he had done with the silver and gold he had taken from all these nations: Edom and Moab, the Ammonites and the Philistines, and Amalek.'
  '12':
  - type: text
    content: 'Abishai son of Zeruiah struck down eighteen thousand Edomites in the Valley of Salt. '
  '13':
  - type: text
    content: 'He put garrisons in Edom, and all the Edomites became subject to David. The '
  - type: text
    content: Lord
  - type: text
    content: ' gave David victory wherever he went.'
  - type: heading
    content: David’s Officials
  '14':
  - type: text
    content: 'David reigned over all Israel, doing what was just and right for all his people. '
  '15':
  - type: text
    content: 'Joab son of Zeruiah was over the army; Jehoshaphat son of Ahilud was recorder; '
  '16':
  - type: text
    content: Zadok son of Ahitub and Ahimelek
  - type: note
    content: Some Hebrew manuscripts, Vulgate and Syriac (see also 2 Samuel 8:17); most Hebrew manuscripts Abimelek
  - type: text
    content: ' son of Abiathar were priests; Shavsha was secretary; '
  '17':
  - type: text
    content: Benaiah son of Jehoiada was over the Kerethites and Pelethites; and David’s sons were chief officials at the king’s side.
  '2':
  - type: text
    content: David also defeated the Moabites, and they became subject to him and brought him tribute.
  '3':
  - type: text
    content: Moreover, David defeated Hadadezer king of Zobah, in the vicinity of Hamath, when he went to set up his monument at
  - type: note
    content: Or to restore his control over
  - type: text
    content: ' the Euphrates River. '
  '4':
  - type: text
    content: David captured a thousand of his chariots, seven thousand charioteers and twenty thousand foot soldiers. He hamstrung all but a hundred of the chariot horses.
  '5':
  - type: text
    content: 'When the Arameans of Damascus came to help Hadadezer king of Zobah, David struck down twenty-two thousand of them. '
  '6':
  - type: text
    content: 'He put garrisons in the Aramean kingdom of Damascus, and the Arameans became subject to him and brought him tribute. The '
  - type: text
    content: Lord
  - type: text
    content: ' gave David victory wherever he went.'
  '7':
  - type: text
    content: 'David took the gold shields carried by the officers of Hadadezer and brought them to Jerusalem. '
  '8':
  - type: text
    content: From Tebah
  - type: note
    content: Hebrew Tibhath, a variant of Tebah
  - type: text
    content: ' and Kun, towns that belonged to Hadadezer, David took a great quantity of bronze, which Solomon used to make the bronze Sea, the pillars and various bronze articles.'
  '9':
  - type: text
    content: 'When Tou king of Hamath heard that David had defeated the entire army of Hadadezer king of Zobah, '
