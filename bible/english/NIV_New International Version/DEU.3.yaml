document_id: DEU.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Defeat of Og King of Bashan
  - type: text
    content: 'Next we turned and went up along the road toward Bashan, and Og king of Bashan with his whole army marched out to meet us in battle at Edrei. '
  '10':
  - type: text
    content: 'We took all the towns on the plateau, and all Gilead, and all Bashan as far as Salekah and Edrei, towns of Og’s kingdom in Bashan. '
  '11':
  - type: text
    content: (Og king of Bashan was the last of the Rephaites. His bed was decorated with iron and was more than nine cubits long and four cubits wide.
  - type: note
    content: That is, about 14 feet long and 6 feet wide or about 4 meters long and 1.8 meters wide
  - type: text
    content: ' It is still in Rabbah of the Ammonites.)'
  - type: heading
    content: Division of the Land
  '12':
  - type: text
    content: 'Of the land that we took over at that time, I gave the Reubenites and the Gadites the territory north of Aroer by the Arnon Gorge, including half the hill country of Gilead, together with its towns. '
  '13':
  - type: text
    content: 'The rest of Gilead and also all of Bashan, the kingdom of Og, I gave to the half-tribe of Manasseh. (The whole region of Argob in Bashan used to be known as a land of the Rephaites. '
  '14':
  - type: text
    content: Jair, a descendant of Manasseh, took the whole region of Argob as far as the border of the Geshurites and the Maakathites; it was named after him, so that to this day Bashan is called Havvoth Jair.
  - type: note
    content: Or called the settlements of Jair
  - type: text
    content: ') '
  '15':
  - type: text
    content: 'And I gave Gilead to Makir. '
  '16':
  - type: text
    content: 'But to the Reubenites and the Gadites I gave the territory extending from Gilead down to the Arnon Gorge (the middle of the gorge being the border) and out to the Jabbok River, which is the border of the Ammonites. '
  '17':
  - type: text
    content: Its western border was the Jordan in the Arabah, from Kinnereth to the Sea of the Arabah (that is, the Dead Sea), below the slopes of Pisgah.
  '18':
  - type: text
    content: 'I commanded you at that time: “The '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you this land to take possession of it. But all your able-bodied men, armed for battle, must cross over ahead of the other Israelites. '
  '19':
  - type: text
    content: 'However, your wives, your children and your livestock (I know you have much livestock) may stay in the towns I have given you, '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Do not be afraid of him, for I have delivered him into your hands, along with his whole army and his land. Do to him what you did to Sihon king of the Amorites, who reigned in Heshbon.”'
  '20':
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' gives rest to your fellow Israelites as he has to you, and they too have taken over the land that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving them across the Jordan. After that, each of you may go back to the possession I have given you.”'
  - type: heading
    content: Moses Forbidden to Cross the Jordan
  '21':
  - type: text
    content: 'At that time I commanded Joshua: “You have seen with your own eyes all that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has done to these two kings. The '
  - type: text
    content: Lord
  - type: text
    content: ' will do the same to all the kingdoms over there where you are going. '
  '22':
  - type: text
    content: 'Do not be afraid of them; the '
  - type: text
    content: Lord
  - type: text
    content: ' your God himself will fight for you.”'
  '23':
  - type: text
    content: 'At that time I pleaded with the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '24':
  - type: text
    content: '“Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', you have begun to show to your servant your greatness and your strong hand. For what god is there in heaven or on earth who can do the deeds and mighty works you do? '
  '25':
  - type: text
    content: Let me go over and see the good land beyond the Jordan—that fine hill country and Lebanon.”
  '26':
  - type: text
    content: 'But because of you the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with me and would not listen to me. “That is enough,” the '
  - type: text
    content: Lord
  - type: text
    content: ' said. “Do not speak to me anymore about this matter. '
  '27':
  - type: text
    content: 'Go up to the top of Pisgah and look west and north and south and east. Look at the land with your own eyes, since you are not going to cross this Jordan. '
  '28':
  - type: text
    content: 'But commission Joshua, and encourage and strengthen him, for he will lead this people across and will cause them to inherit the land that you will see.” '
  '29':
  - type: text
    content: So we stayed in the valley near Beth Peor.
  '3':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' our God also gave into our hands Og king of Bashan and all his army. We struck them down, leaving no survivors. '
  '4':
  - type: text
    content: 'At that time we took all his cities. There was not one of the sixty cities that we did not take from them—the whole region of Argob, Og’s kingdom in Bashan. '
  '5':
  - type: text
    content: 'All these cities were fortified with high walls and with gates and bars, and there were also a great many unwalled villages. '
  '6':
  - type: text
    content: We completely destroyed
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' them, as we had done with Sihon king of Heshbon, destroying'
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' every city—men, women and children. '
  '7':
  - type: text
    content: But all the livestock and the plunder from their cities we carried off for ourselves.
  '8':
  - type: text
    content: 'So at that time we took from these two kings of the Amorites the territory east of the Jordan, from the Arnon Gorge as far as Mount Hermon. '
  '9':
  - type: text
    content: '(Hermon is called Sirion by the Sidonians; the Amorites call it Senir.) '
