document_id: 1SA.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Returned to Israel
  - type: text
    content: 'When the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' had been in Philistine territory seven months, '
  '10':
  - type: text
    content: 'So they did this. They took two such cows and hitched them to the cart and penned up their calves. '
  '11':
  - type: text
    content: 'They placed the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' on the cart and along with it the chest containing the gold rats and the models of the tumors. '
  '12':
  - type: text
    content: Then the cows went straight up toward Beth Shemesh, keeping on the road and lowing all the way; they did not turn to the right or to the left. The rulers of the Philistines followed them as far as the border of Beth Shemesh.
  '13':
  - type: text
    content: 'Now the people of Beth Shemesh were harvesting their wheat in the valley, and when they looked up and saw the ark, they rejoiced at the sight. '
  '14':
  - type: text
    content: 'The cart came to the field of Joshua of Beth Shemesh, and there it stopped beside a large rock. The people chopped up the wood of the cart and sacrificed the cows as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'The Levites took down the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', together with the chest containing the gold objects, and placed them on the large rock. On that day the people of Beth Shemesh offered burnt offerings and made sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: The five rulers of the Philistines saw all this and then returned that same day to Ekron.
  '17':
  - type: text
    content: 'These are the gold tumors the Philistines sent as a guilt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '—one each for Ashdod, Gaza, Ashkelon, Gath and Ekron. '
  '18':
  - type: text
    content: 'And the number of the gold rats was according to the number of Philistine towns belonging to the five rulers—the fortified towns with their country villages. The large rock on which the Levites set the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a witness to this day in the field of Joshua of Beth Shemesh.'
  '19':
  - type: text
    content: But God struck down some of the inhabitants of Beth Shemesh, putting seventy
  - type: note
    content: A few Hebrew manuscripts; most Hebrew manuscripts and Septuagint 50,070
  - type: text
    content: ' of them to death because they looked into the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. The people mourned because of the heavy blow the '
  - type: text
    content: Lord
  - type: text
    content: ' had dealt them. '
  '2':
  - type: text
    content: 'the Philistines called for the priests and the diviners and said, “What shall we do with the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '? Tell us how we should send it back to its place.”'
  '20':
  - type: text
    content: 'And the people of Beth Shemesh asked, “Who can stand in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ', this holy God? To whom will the ark go up from here?”'
  '21':
  - type: text
    content: 'Then they sent messengers to the people of Kiriath Jearim, saying, “The Philistines have returned the ark of the '
  - type: text
    content: Lord
  - type: text
    content: . Come down and take it up to your town.”
  '3':
  - type: text
    content: They answered, “If you return the ark of the god of Israel, do not send it back to him without a gift; by all means send a guilt offering to him. Then you will be healed, and you will know why his hand has not been lifted from you.”
  '4':
  - type: text
    content: The Philistines asked, “What guilt offering should we send to him?”
  - type: text
    content: 'They replied, “Five gold tumors and five gold rats, according to the number of the Philistine rulers, because the same plague has struck both you and your rulers. '
  '5':
  - type: text
    content: 'Make models of the tumors and of the rats that are destroying the country, and give glory to Israel’s god. Perhaps he will lift his hand from you and your gods and your land. '
  '6':
  - type: text
    content: Why do you harden your hearts as the Egyptians and Pharaoh did? When Israel’s god dealt harshly with them, did they not send the Israelites out so they could go on their way?
  '7':
  - type: text
    content: '“Now then, get a new cart ready, with two cows that have calved and have never been yoked. Hitch the cows to the cart, but take their calves away and pen them up. '
  '8':
  - type: text
    content: 'Take the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and put it on the cart, and in a chest beside it put the gold objects you are sending back to him as a guilt offering. Send it on its way, '
  '9':
  - type: text
    content: 'but keep watching it. If it goes up to its own territory, toward Beth Shemesh, then the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought this great disaster on us. But if it does not, then we will know that it was not his hand that struck us but that it happened to us by chance.”'
