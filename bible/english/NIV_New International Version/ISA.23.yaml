document_id: ISA.23,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Tyre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A prophecy against Tyre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, you ships of Tarshish!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For Tyre is destroyed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and left without house or harbor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the land of Cyprus
  - type: usfm
    marker: q2
    children:
    - type: text
      text: word has come to them.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Till
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls and some Septuagint manuscripts; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Go through
      marker-yv: yv-n
    - type: text
      text: ' your land as they do along the Nile,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Daughter Tarshish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you no longer have a harbor.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has stretched out his hand over the sea'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made its kingdoms tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has given an order concerning Phoenicia
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that her fortresses be destroyed.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He said, “No more of your reveling,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Virgin Daughter Sidon, now crushed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Up, cross over to Cyprus;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even there you will find no rest.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at the land of the Babylonians,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this people that is now of no account!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Assyrians have made it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a place for desert creatures;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they raised up their siege towers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stripped its fortresses bare
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turned it into a ruin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, you ships of Tarshish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your fortress is destroyed!
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Tyre will be forgotten for seventy years, the span of a king’s life. But at the end of these seventy years, it will happen to Tyre as in the song of the prostitute:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Take up a harp, walk through the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you forgotten prostitute;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: play the harp well, sing many a song,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that you will be remembered.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the end of seventy years, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will deal with Tyre. She will return to her lucrative prostitution and will ply her trade with all the kingdoms on the face of the earth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet her profit and her earnings will be set apart for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; they will not be stored up or hoarded. Her profits will go to those who live before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for abundant food and fine clothes.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be silent, you people of the island
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you merchants of Sidon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whom the seafarers have enriched.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the great waters
  - type: usfm
    marker: q2
    children:
    - type: text
      text: came the grain of the Shihor;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the harvest of the Nile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:2,3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text; Dead Sea Scrolls '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sidon, / who cross over the sea; / your envoys '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '3 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: are on the great waters. / The grain of the Shihor, / the harvest of the Nile,
      marker-yv: yv-n
    - type: text
      text: ' was the revenue of Tyre,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she became the marketplace of the nations.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be ashamed, Sidon, and you fortress of the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the sea has spoken:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have neither been in labor nor given birth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have neither reared sons nor brought up daughters.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When word comes to Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be in anguish at the report from Tyre.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cross over to Tarshish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wail, you people of the island.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is this your city of revelry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the old, old city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose feet have taken her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to settle in far-off lands?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who planned this against Tyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the bestower of crowns,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose merchants are princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose traders are renowned in the earth?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty planned it,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to bring down her pride in all her splendor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to humble all who are renowned on the earth.
