document_id: ISA.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Tyre
  - type: text
    content: 'A prophecy against Tyre:'
  - type: text
    content: Wail, you ships of Tarshish!
  - type: text
    content: For Tyre is destroyed
  - type: text
    content: and left without house or harbor.
  - type: text
    content: From the land of Cyprus
  - type: text
    content: word has come to them.
  '10':
  - type: text
    content: Till
  - type: note
    content: Dead Sea Scrolls and some Septuagint manuscripts; Masoretic Text Go through
  - type: text
    content: ' your land as they do along the Nile,'
  - type: text
    content: Daughter Tarshish,
  - type: text
    content: for you no longer have a harbor.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has stretched out his hand over the sea'
  - type: text
    content: and made its kingdoms tremble.
  - type: text
    content: He has given an order concerning Phoenicia
  - type: text
    content: that her fortresses be destroyed.
  '12':
  - type: text
    content: He said, “No more of your reveling,
  - type: text
    content: Virgin Daughter Sidon, now crushed!
  - type: text
    content: “Up, cross over to Cyprus;
  - type: text
    content: even there you will find no rest.”
  '13':
  - type: text
    content: Look at the land of the Babylonians,
  - type: note
    content: Or Chaldeans
  - type: text
    content: this people that is now of no account!
  - type: text
    content: The Assyrians have made it
  - type: text
    content: a place for desert creatures;
  - type: text
    content: they raised up their siege towers,
  - type: text
    content: they stripped its fortresses bare
  - type: text
    content: and turned it into a ruin.
  '14':
  - type: text
    content: Wail, you ships of Tarshish;
  - type: text
    content: your fortress is destroyed!
  '15':
  - type: text
    content: 'At that time Tyre will be forgotten for seventy years, the span of a king’s life. But at the end of these seventy years, it will happen to Tyre as in the song of the prostitute:'
  '16':
  - type: text
    content: “Take up a harp, walk through the city,
  - type: text
    content: you forgotten prostitute;
  - type: text
    content: play the harp well, sing many a song,
  - type: text
    content: so that you will be remembered.”
  '17':
  - type: text
    content: 'At the end of seventy years, the '
  - type: text
    content: Lord
  - type: text
    content: ' will deal with Tyre. She will return to her lucrative prostitution and will ply her trade with all the kingdoms on the face of the earth. '
  '18':
  - type: text
    content: 'Yet her profit and her earnings will be set apart for the '
  - type: text
    content: Lord
  - type: text
    content: '; they will not be stored up or hoarded. Her profits will go to those who live before the '
  - type: text
    content: Lord
  - type: text
    content: ', for abundant food and fine clothes.'
  '2':
  - type: text
    content: Be silent, you people of the island
  - type: text
    content: and you merchants of Sidon,
  - type: text
    content: whom the seafarers have enriched.
  '3':
  - type: text
    content: On the great waters
  - type: text
    content: came the grain of the Shihor;
  - type: text
    content: the harvest of the Nile
  - type: note
    content: Masoretic Text; Dead Sea Scrolls Sidon, / who cross over the sea; / your envoys 3 are on the great waters. / The grain of the Shihor, / the harvest of the Nile,
  - type: text
    content: ' was the revenue of Tyre,'
  - type: text
    content: and she became the marketplace of the nations.
  '4':
  - type: text
    content: Be ashamed, Sidon, and you fortress of the sea,
  - type: text
    content: 'for the sea has spoken:'
  - type: text
    content: “I have neither been in labor nor given birth;
  - type: text
    content: I have neither reared sons nor brought up daughters.”
  '5':
  - type: text
    content: When word comes to Egypt,
  - type: text
    content: they will be in anguish at the report from Tyre.
  '6':
  - type: text
    content: Cross over to Tarshish;
  - type: text
    content: wail, you people of the island.
  '7':
  - type: text
    content: Is this your city of revelry,
  - type: text
    content: the old, old city,
  - type: text
    content: whose feet have taken her
  - type: text
    content: to settle in far-off lands?
  '8':
  - type: text
    content: Who planned this against Tyre,
  - type: text
    content: the bestower of crowns,
  - type: text
    content: whose merchants are princes,
  - type: text
    content: whose traders are renowned in the earth?
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty planned it,'
  - type: text
    content: to bring down her pride in all her splendor
  - type: text
    content: and to humble all who are renowned on the earth.
