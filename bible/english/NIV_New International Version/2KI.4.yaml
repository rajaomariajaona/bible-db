document_id: 2KI.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Widow’s Olive Oil
  - type: text
    content: 'The wife of a man from the company of the prophets cried out to Elisha, “Your servant my husband is dead, and you know that he revered the '
  - type: text
    content: Lord
  - type: text
    content: . But now his creditor is coming to take my two boys as his slaves.”
  '10':
  - type: text
    content: Let’s make a small room on the roof and put in it a bed and a table, a chair and a lamp for him. Then he can stay there whenever he comes to us.”
  '11':
  - type: text
    content: 'One day when Elisha came, he went up to his room and lay down there. '
  '12':
  - type: text
    content: 'He said to his servant Gehazi, “Call the Shunammite.” So he called her, and she stood before him. '
  '13':
  - type: text
    content: Elisha said to him, “Tell her, ‘You have gone to all this trouble for us. Now what can be done for you? Can we speak on your behalf to the king or the commander of the army?’ ”
  - type: text
    content: She replied, “I have a home among my own people.”
  '14':
  - type: text
    content: “What can be done for her?” Elisha asked.
  - type: text
    content: Gehazi said, “She has no son, and her husband is old.”
  '15':
  - type: text
    content: 'Then Elisha said, “Call her.” So he called her, and she stood in the doorway. '
  '16':
  - type: text
    content: “About this time next year,” Elisha said, “you will hold a son in your arms.”
  - type: text
    content: “No, my lord!” she objected. “Please, man of God, don’t mislead your servant!”
  '17':
  - type: text
    content: But the woman became pregnant, and the next year about that same time she gave birth to a son, just as Elisha had told her.
  '18':
  - type: text
    content: 'The child grew, and one day he went out to his father, who was with the reapers. '
  '19':
  - type: text
    content: He said to his father, “My head! My head!”
  - type: text
    content: 'His father told a servant, “Carry him to his mother.” '
  '2':
  - type: text
    content: Elisha replied to her, “How can I help you? Tell me, what do you have in your house?”
  - type: text
    content: “Your servant has nothing there at all,” she said, “except a small jar of olive oil.”
  '20':
  - type: text
    content: 'After the servant had lifted him up and carried him to his mother, the boy sat on her lap until noon, and then he died. '
  '21':
  - type: text
    content: She went up and laid him on the bed of the man of God, then shut the door and went out.
  '22':
  - type: text
    content: She called her husband and said, “Please send me one of the servants and a donkey so I can go to the man of God quickly and return.”
  '23':
  - type: text
    content: “Why go to him today?” he asked. “It’s not the New Moon or the Sabbath.”
  - type: text
    content: “That’s all right,” she said.
  '24':
  - type: text
    content: 'She saddled the donkey and said to her servant, “Lead on; don’t slow down for me unless I tell you.” '
  '25':
  - type: text
    content: So she set out and came to the man of God at Mount Carmel.
  - type: text
    content: 'When he saw her in the distance, the man of God said to his servant Gehazi, “Look! There’s the Shunammite! '
  '26':
  - type: text
    content: Run to meet her and ask her, ‘Are you all right? Is your husband all right? Is your child all right?’ ”
  - type: text
    content: “Everything is all right,” she said.
  '27':
  - type: text
    content: 'When she reached the man of God at the mountain, she took hold of his feet. Gehazi came over to push her away, but the man of God said, “Leave her alone! She is in bitter distress, but the '
  - type: text
    content: Lord
  - type: text
    content: ' has hidden it from me and has not told me why.”'
  '28':
  - type: text
    content: “Did I ask you for a son, my lord?” she said. “Didn’t I tell you, ‘Don’t raise my hopes’?”
  '29':
  - type: text
    content: Elisha said to Gehazi, “Tuck your cloak into your belt, take my staff in your hand and run. Don’t greet anyone you meet, and if anyone greets you, do not answer. Lay my staff on the boy’s face.”
  '3':
  - type: text
    content: 'Elisha said, “Go around and ask all your neighbors for empty jars. Don’t ask for just a few. '
  '30':
  - type: text
    content: 'But the child’s mother said, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives and as you live, I will not leave you.” So he got up and followed her.'
  '31':
  - type: text
    content: Gehazi went on ahead and laid the staff on the boy’s face, but there was no sound or response. So Gehazi went back to meet Elisha and told him, “The boy has not awakened.”
  '32':
  - type: text
    content: 'When Elisha reached the house, there was the boy lying dead on his couch. '
  '33':
  - type: text
    content: 'He went in, shut the door on the two of them and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Then he got on the bed and lay on the boy, mouth to mouth, eyes to eyes, hands to hands. As he stretched himself out on him, the boy’s body grew warm. '
  '35':
  - type: text
    content: Elisha turned away and walked back and forth in the room and then got on the bed and stretched out on him once more. The boy sneezed seven times and opened his eyes.
  '36':
  - type: text
    content: 'Elisha summoned Gehazi and said, “Call the Shunammite.” And he did. When she came, he said, “Take your son.” '
  '37':
  - type: text
    content: She came in, fell at his feet and bowed to the ground. Then she took her son and went out.
  - type: heading
    content: Death in the Pot
  '38':
  - type: text
    content: Elisha returned to Gilgal and there was a famine in that region. While the company of the prophets was meeting with him, he said to his servant, “Put on the large pot and cook some stew for these prophets.”
  '39':
  - type: text
    content: 'One of them went out into the fields to gather herbs and found a wild vine and picked as many of its gourds as his garment could hold. When he returned, he cut them up into the pot of stew, though no one knew what they were. '
  '4':
  - type: text
    content: Then go inside and shut the door behind you and your sons. Pour oil into all the jars, and as each is filled, put it to one side.”
  '40':
  - type: text
    content: The stew was poured out for the men, but as they began to eat it, they cried out, “Man of God, there is death in the pot!” And they could not eat it.
  '41':
  - type: text
    content: Elisha said, “Get some flour.” He put it into the pot and said, “Serve it to the people to eat.” And there was nothing harmful in the pot.
  - type: heading
    content: Feeding of a Hundred
  '42':
  - type: text
    content: A man came from Baal Shalishah, bringing the man of God twenty loaves of barley bread baked from the first ripe grain, along with some heads of new grain. “Give it to the people to eat,” Elisha said.
  '43':
  - type: text
    content: “How can I set this before a hundred men?” his servant asked.
  - type: text
    content: 'But Elisha answered, “Give it to the people to eat. For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘They will eat and have some left over.’ ” '
  '44':
  - type: text
    content: 'Then he set it before them, and they ate and had some left over, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: 'She left him and shut the door behind her and her sons. They brought the jars to her and she kept pouring. '
  '6':
  - type: text
    content: When all the jars were full, she said to her son, “Bring me another one.”
  - type: text
    content: But he replied, “There is not a jar left.” Then the oil stopped flowing.
  '7':
  - type: text
    content: She went and told the man of God, and he said, “Go, sell the oil and pay your debts. You and your sons can live on what is left.”
  - type: heading
    content: The Shunammite’s Son Restored to Life
  '8':
  - type: text
    content: 'One day Elisha went to Shunem. And a well-to-do woman was there, who urged him to stay for a meal. So whenever he came by, he stopped there to eat. '
  '9':
  - type: text
    content: 'She said to her husband, “I know that this man who often comes our way is a holy man of God. '
