document_id: 2KI.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Widow’s Olive Oil
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The wife of a man from the company of the prophets cried out to Elisha, “Your servant my husband is dead, and you know that he revered the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . But now his creditor is coming to take my two boys as his slaves.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elisha replied to her, “How can I help you? Tell me, what do you have in your house?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Your servant has nothing there at all,” she said, “except a small jar of olive oil.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elisha said, “Go around and ask all your neighbors for empty jars. Don’t ask for just a few. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then go inside and shut the door behind you and your sons. Pour oil into all the jars, and as each is filled, put it to one side.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'She left him and shut the door behind her and her sons. They brought the jars to her and she kept pouring. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When all the jars were full, she said to her son, “Bring me another one.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But he replied, “There is not a jar left.” Then the oil stopped flowing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: She went and told the man of God, and he said, “Go, sell the oil and pay your debts. You and your sons can live on what is left.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shunammite’s Son Restored to Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'One day Elisha went to Shunem. And a well-to-do woman was there, who urged him to stay for a meal. So whenever he came by, he stopped there to eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'She said to her husband, “I know that this man who often comes our way is a holy man of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Let’s make a small room on the roof and put in it a bed and a table, a chair and a lamp for him. Then he can stay there whenever he comes to us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'One day when Elisha came, he went up to his room and lay down there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He said to his servant Gehazi, “Call the Shunammite.” So he called her, and she stood before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elisha said to him, “Tell her, ‘You have gone to all this trouble for us. Now what can be done for you? Can we speak on your behalf to the king or the commander of the army?’ ”
- type: usfm
  marker: p
  children:
  - type: text
    text: She replied, “I have a home among my own people.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “What can be done for her?” Elisha asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: Gehazi said, “She has no son, and her husband is old.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Elisha said, “Call her.” So he called her, and she stood in the doorway. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “About this time next year,” Elisha said, “you will hold a son in your arms.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “No, my lord!” she objected. “Please, man of God, don’t mislead your servant!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But the woman became pregnant, and the next year about that same time she gave birth to a son, just as Elisha had told her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The child grew, and one day he went out to his father, who was with the reapers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He said to his father, “My head! My head!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'His father told a servant, “Carry him to his mother.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'After the servant had lifted him up and carried him to his mother, the boy sat on her lap until noon, and then he died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: She went up and laid him on the bed of the man of God, then shut the door and went out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: She called her husband and said, “Please send me one of the servants and a donkey so I can go to the man of God quickly and return.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Why go to him today?” he asked. “It’s not the New Moon or the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “That’s all right,” she said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'She saddled the donkey and said to her servant, “Lead on; don’t slow down for me unless I tell you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So she set out and came to the man of God at Mount Carmel.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'When he saw her in the distance, the man of God said to his servant Gehazi, “Look! There’s the Shunammite! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Run to meet her and ask her, ‘Are you all right? Is your husband all right? Is your child all right?’ ”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Everything is all right,” she said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When she reached the man of God at the mountain, she took hold of his feet. Gehazi came over to push her away, but the man of God said, “Leave her alone! She is in bitter distress, but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has hidden it from me and has not told me why.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Did I ask you for a son, my lord?” she said. “Didn’t I tell you, ‘Don’t raise my hopes’?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Elisha said to Gehazi, “Tuck your cloak into your belt, take my staff in your hand and run. Don’t greet anyone you meet, and if anyone greets you, do not answer. Lay my staff on the boy’s face.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But the child’s mother said, “As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives and as you live, I will not leave you.” So he got up and followed her.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Gehazi went on ahead and laid the staff on the boy’s face, but there was no sound or response. So Gehazi went back to meet Elisha and told him, “The boy has not awakened.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'When Elisha reached the house, there was the boy lying dead on his couch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'He went in, shut the door on the two of them and prayed to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then he got on the bed and lay on the boy, mouth to mouth, eyes to eyes, hands to hands. As he stretched himself out on him, the boy’s body grew warm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Elisha turned away and walked back and forth in the room and then got on the bed and stretched out on him once more. The boy sneezed seven times and opened his eyes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Elisha summoned Gehazi and said, “Call the Shunammite.” And he did. When she came, he said, “Take your son.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: She came in, fell at his feet and bowed to the ground. Then she took her son and went out.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Death in the Pot
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Elisha returned to Gilgal and there was a famine in that region. While the company of the prophets was meeting with him, he said to his servant, “Put on the large pot and cook some stew for these prophets.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'One of them went out into the fields to gather herbs and found a wild vine and picked as many of its gourds as his garment could hold. When he returned, he cut them up into the pot of stew, though no one knew what they were. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: The stew was poured out for the men, but as they began to eat it, they cried out, “Man of God, there is death in the pot!” And they could not eat it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Elisha said, “Get some flour.” He put it into the pot and said, “Serve it to the people to eat.” And there was nothing harmful in the pot.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Feeding of a Hundred
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: A man came from Baal Shalishah, bringing the man of God twenty loaves of barley bread baked from the first ripe grain, along with some heads of new grain. “Give it to the people to eat,” Elisha said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: “How can I set this before a hundred men?” his servant asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But Elisha answered, “Give it to the people to eat. For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘They will eat and have some left over.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Then he set it before them, and they ate and had some left over, according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
