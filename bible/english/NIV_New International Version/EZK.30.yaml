document_id: EZK.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lament Over Egypt
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘I will put an end to the hordes of Egypt
  - type: text
    content: by the hand of Nebuchadnezzar king of Babylon.
  '11':
  - type: text
    content: He and his army—the most ruthless of nations—
  - type: text
    content: will be brought in to destroy the land.
  - type: text
    content: They will draw their swords against Egypt
  - type: text
    content: and fill the land with the slain.
  '12':
  - type: text
    content: I will dry up the waters of the Nile
  - type: text
    content: and sell the land to an evil nation;
  - type: text
    content: by the hand of foreigners
  - type: text
    content: I will lay waste the land and everything in it.
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken.'
  '13':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘I will destroy the idols
  - type: text
    content: and put an end to the images in Memphis.
  - type: text
    content: No longer will there be a prince in Egypt,
  - type: text
    content: and I will spread fear throughout the land.
  '14':
  - type: text
    content: I will lay waste Upper Egypt,
  - type: text
    content: set fire to Zoan
  - type: text
    content: and inflict punishment on Thebes.
  '15':
  - type: text
    content: I will pour out my wrath on Pelusium,
  - type: text
    content: the stronghold of Egypt,
  - type: text
    content: and wipe out the hordes of Thebes.
  '16':
  - type: text
    content: I will set fire to Egypt;
  - type: text
    content: Pelusium will writhe in agony.
  - type: text
    content: Thebes will be taken by storm;
  - type: text
    content: Memphis will be in constant distress.
  '17':
  - type: text
    content: The young men of Heliopolis and Bubastis
  - type: text
    content: will fall by the sword,
  - type: text
    content: and the cities themselves will go into captivity.
  '18':
  - type: text
    content: Dark will be the day at Tahpanhes
  - type: text
    content: when I break the yoke of Egypt;
  - type: text
    content: there her proud strength will come to an end.
  - type: text
    content: She will be covered with clouds,
  - type: text
    content: and her villages will go into captivity.
  '19':
  - type: text
    content: So I will inflict punishment on Egypt,
  - type: text
    content: 'and they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: Pharaoh’s Arms Are Broken
  '2':
  - type: text
    content: '“Son of man, prophesy and say: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Wail and say,
  - type: text
    content: “Alas for that day!”
  '20':
  - type: text
    content: 'In the eleventh year, in the first month on the seventh day, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '21':
  - type: text
    content: '“Son of man, I have broken the arm of Pharaoh king of Egypt. It has not been bound up to be healed or put in a splint so that it may become strong enough to hold a sword. '
  '22':
  - type: text
    content: 'Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am against Pharaoh king of Egypt. I will break both his arms, the good arm as well as the broken one, and make the sword fall from his hand. '
  '23':
  - type: text
    content: 'I will disperse the Egyptians among the nations and scatter them through the countries. '
  '24':
  - type: text
    content: 'I will strengthen the arms of the king of Babylon and put my sword in his hand, but I will break the arms of Pharaoh, and he will groan before him like a mortally wounded man. '
  '25':
  - type: text
    content: 'I will strengthen the arms of the king of Babylon, but the arms of Pharaoh will fall limp. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I put my sword into the hand of the king of Babylon and he brandishes it against Egypt. '
  '26':
  - type: text
    content: 'I will disperse the Egyptians among the nations and scatter them through the countries. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: For the day is near,
  - type: text
    content: 'the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near—'
  - type: text
    content: a day of clouds,
  - type: text
    content: a time of doom for the nations.
  '4':
  - type: text
    content: A sword will come against Egypt,
  - type: text
    content: and anguish will come upon Cush.
  - type: note
    content: That is, the upper Nile region; also in verses 5 and 9
  - type: text
    content: When the slain fall in Egypt,
  - type: text
    content: her wealth will be carried away
  - type: text
    content: and her foundations torn down.
  '5':
  - type: text
    content: Cush and Libya, Lydia and all Arabia, Kub and the people of the covenant land will fall by the sword along with Egypt.
  '6':
  - type: text
    content: '“ ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘The allies of Egypt will fall
  - type: text
    content: and her proud strength will fail.
  - type: text
    content: From Migdol to Aswan
  - type: text
    content: they will fall by the sword within her,
  - type: text
    content: 'declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: “ ‘They will be desolate
  - type: text
    content: among desolate lands,
  - type: text
    content: and their cities will lie
  - type: text
    content: among ruined cities.
  '8':
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: when I set fire to Egypt
  - type: text
    content: and all her helpers are crushed.
  '9':
  - type: text
    content: “ ‘On that day messengers will go out from me in ships to frighten Cush out of her complacency. Anguish will take hold of them on the day of Egypt’s doom, for it is sure to come.
