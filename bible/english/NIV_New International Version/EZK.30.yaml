document_id: EZK.30,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Lament Over Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“ ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘I will put an end to the hordes of Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the hand of Nebuchadnezzar king of Babylon.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He and his army—the most ruthless of nations—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be brought in to destroy the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will draw their swords against Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill the land with the slain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will dry up the waters of the Nile
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sell the land to an evil nation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by the hand of foreigners
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will lay waste the land and everything in it.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' have spoken.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“ ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘I will destroy the idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put an end to the images in Memphis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No longer will there be a prince in Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will spread fear throughout the land.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will lay waste Upper Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: set fire to Zoan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and inflict punishment on Thebes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I will pour out my wrath on Pelusium,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the stronghold of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wipe out the hordes of Thebes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I will set fire to Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Pelusium will writhe in agony.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thebes will be taken by storm;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Memphis will be in constant distress.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The young men of Heliopolis and Bubastis
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will fall by the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the cities themselves will go into captivity.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dark will be the day at Tahpanhes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I break the yoke of Egypt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there her proud strength will come to an end.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will be covered with clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her villages will go into captivity.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So I will inflict punishment on Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ”
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Pharaoh’s Arms Are Broken
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, prophesy and say: ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Wail and say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Alas for that day!”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'In the eleventh year, in the first month on the seventh day, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Son of man, I have broken the arm of Pharaoh king of Egypt. It has not been bound up to be healed or put in a splint so that it may become strong enough to hold a sword. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Therefore this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am against Pharaoh king of Egypt. I will break both his arms, the good arm as well as the broken one, and make the sword fall from his hand. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'I will disperse the Egyptians among the nations and scatter them through the countries. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'I will strengthen the arms of the king of Babylon and put my sword in his hand, but I will break the arms of Pharaoh, and he will groan before him like a mortally wounded man. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I will strengthen the arms of the king of Babylon, but the arms of Pharaoh will fall limp. Then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', when I put my sword into the hand of the king of Babylon and he brandishes it against Egypt. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'I will disperse the Egyptians among the nations and scatter them through the countries. Then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For the day is near,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is near—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a day of clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time of doom for the nations.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A sword will come against Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and anguish will come upon Cush.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the upper Nile region; also in verses 5 and 9
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the slain fall in Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her wealth will be carried away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her foundations torn down.
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Cush and Libya, Lydia and all Arabia, Kub and the people of the covenant land will fall by the sword along with Egypt.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“ ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘The allies of Egypt will fall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her proud strength will fail.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From Migdol to Aswan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will fall by the sword within her,
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “ ‘They will be desolate
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among desolate lands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their cities will lie
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among ruined cities.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I set fire to Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all her helpers are crushed.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “ ‘On that day messengers will go out from me in ships to frighten Cush out of her complacency. Anguish will take hold of them on the day of Egypt’s doom, for it is sure to come.
