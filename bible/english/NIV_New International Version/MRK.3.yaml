document_id: MRK.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals on the Sabbath
  - type: text
    content: 'Another time Jesus went into the synagogue, and a man with a shriveled hand was there. '
  '10':
  - type: text
    content: 'For he had healed many, so that those with diseases were pushing forward to touch him. '
  '11':
  - type: text
    content: 'Whenever the impure spirits saw him, they fell down before him and cried out, “You are the Son of God.” '
  '12':
  - type: text
    content: But he gave them strict orders not to tell others about him.
  - type: heading
    content: Jesus Appoints the Twelve
  '13':
  - type: text
    content: 'Jesus went up on a mountainside and called to him those he wanted, and they came to him. '
  '14':
  - type: text
    content: He appointed twelve
  - type: note
    content: Some manuscripts twelve—designating them apostles—
  - type: text
    content: ' that they might be with him and that he might send them out to preach '
  '15':
  - type: text
    content: 'and to have authority to drive out demons. '
  '16':
  - type: text
    content: 'These are the twelve he appointed: Simon (to whom he gave the name Peter), '
  '17':
  - type: text
    content: 'James son of Zebedee and his brother John (to them he gave the name '
  - type: text
    content: Boanerges
  - type: text
    content: ', which means “sons of thunder”), '
  '18':
  - type: text
    content: 'Andrew, Philip, Bartholomew, Matthew, Thomas, James son of Alphaeus, Thaddaeus, Simon the Zealot '
  '19':
  - type: text
    content: and Judas Iscariot, who betrayed him.
  - type: heading
    content: Jesus Accused by His Family and by Teachers of the Law
  '2':
  - type: text
    content: 'Some of them were looking for a reason to accuse Jesus, so they watched him closely to see if he would heal him on the Sabbath. '
  '20':
  - type: text
    content: 'Then Jesus entered a house, and again a crowd gathered, so that he and his disciples were not even able to eat. '
  '21':
  - type: text
    content: When his family
  - type: note
    content: Or his associates
  - type: text
    content: ' heard about this, they went to take charge of him, for they said, “He is out of his mind.”'
  '22':
  - type: text
    content: And the teachers of the law who came down from Jerusalem said, “He is possessed by Beelzebul! By the prince of demons he is driving out demons.”
  '23':
  - type: text
    content: 'So Jesus called them over to him and began to speak to them in parables: '
  - type: text
    content: “How can Satan drive out Satan?
  - type: text
    content: ' '
  '24':
  - type: text
    content: If a kingdom is divided against itself, that kingdom cannot stand.
  - type: text
    content: ' '
  '25':
  - type: text
    content: If a house is divided against itself, that house cannot stand.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And if Satan opposes himself and is divided, he cannot stand; his end has come.
  - type: text
    content: ' '
  '27':
  - type: text
    content: In fact, no one can enter a strong man’s house without first tying him up. Then he can plunder the strong man’s house.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Truly I tell you, people can be forgiven all their sins and every slander they utter,
  - type: text
    content: ' '
  '29':
  - type: text
    content: but whoever blasphemes against the Holy Spirit will never be forgiven; they are guilty of an eternal sin.”
  '3':
  - type: text
    content: 'Jesus said to the man with the shriveled hand, '
  - type: text
    content: “Stand up in front of everyone.”
  '30':
  - type: text
    content: He said this because they were saying, “He has an impure spirit.”
  '31':
  - type: text
    content: 'Then Jesus’ mother and brothers arrived. Standing outside, they sent someone in to call him. '
  '32':
  - type: text
    content: A crowd was sitting around him, and they told him, “Your mother and brothers are outside looking for you.”
  '33':
  - type: text
    content: ' '
  - type: text
    content: “Who are my mother and my brothers?”
  - type: text
    content: ' he asked.'
  '34':
  - type: text
    content: 'Then he looked at those seated in a circle around him and said, '
  - type: text
    content: “Here are my mother and my brothers!
  - type: text
    content: ' '
  '35':
  - type: text
    content: Whoever does God’s will is my brother and sister and mother.”
  '4':
  - type: text
    content: 'Then Jesus asked them, '
  - type: text
    content: '“Which is lawful on the Sabbath: to do good or to do evil, to save life or to kill?”'
  - type: text
    content: ' But they remained silent.'
  '5':
  - type: text
    content: 'He looked around at them in anger and, deeply distressed at their stubborn hearts, said to the man, '
  - type: text
    content: “Stretch out your hand.”
  - type: text
    content: ' He stretched it out, and his hand was completely restored. '
  '6':
  - type: text
    content: Then the Pharisees went out and began to plot with the Herodians how they might kill Jesus.
  - type: heading
    content: Crowds Follow Jesus
  '7':
  - type: text
    content: 'Jesus withdrew with his disciples to the lake, and a large crowd from Galilee followed. '
  '8':
  - type: text
    content: 'When they heard about all he was doing, many people came to him from Judea, Jerusalem, Idumea, and the regions across the Jordan and around Tyre and Sidon. '
  '9':
  - type: text
    content: 'Because of the crowd he told his disciples to have a small boat ready for him, to keep the people from crowding him. '
