document_id: MRK.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals on the Sabbath
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Another time Jesus went into the synagogue, and a man with a shriveled hand was there. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he had healed many, so that those with diseases were pushing forward to touch him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever the impure spirits saw him, they fell down before him and cried out, “You are the Son of God.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he gave them strict orders not to tell others about him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Appoints the Twelve
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus went up on a mountainside and called to him those he wanted, and they came to him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He appointed twelve
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: twelve—designating them apostles—
      marker-yv: yv-n
    - type: text
      text: ' that they might be with him and that he might send them out to preach '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to have authority to drive out demons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the twelve he appointed: Simon (to whom he gave the name Peter), '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'James son of Zebedee and his brother John (to them he gave the name '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: Boanerges
    - type: text
      text: ', which means “sons of thunder”), '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andrew, Philip, Bartholomew, Matthew, Thomas, James son of Alphaeus, Thaddaeus, Simon the Zealot '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Judas Iscariot, who betrayed him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Accused by His Family and by Teachers of the Law
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of them were looking for a reason to accuse Jesus, so they watched him closely to see if he would heal him on the Sabbath. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus entered a house, and again a crowd gathered, so that he and his disciples were not even able to eat. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When his family
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his associates
      marker-yv: yv-n
    - type: text
      text: ' heard about this, they went to take charge of him, for they said, “He is out of his mind.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the teachers of the law who came down from Jerusalem said, “He is possessed by Beelzebul! By the prince of demons he is driving out demons.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus called them over to him and began to speak to them in parables: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How can Satan drive out Satan?
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If a kingdom is divided against itself, that kingdom cannot stand.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If a house is divided against itself, that house cannot stand.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if Satan opposes himself and is divided, he cannot stand; his end has come.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In fact, no one can enter a strong man’s house without first tying him up. Then he can plunder the strong man’s house.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Truly I tell you, people can be forgiven all their sins and every slander they utter,
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but whoever blasphemes against the Holy Spirit will never be forgiven; they are guilty of an eternal sin.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to the man with the shriveled hand, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Stand up in front of everyone.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said this because they were saying, “He has an impure spirit.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus’ mother and brothers arrived. Standing outside, they sent someone in to call him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A crowd was sitting around him, and they told him, “Your mother and brothers are outside looking for you.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who are my mother and my brothers?”
    - type: text
      text: ' he asked.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he looked at those seated in a circle around him and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Here are my mother and my brothers!
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever does God’s will is my brother and sister and mother.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Which is lawful on the Sabbath: to do good or to do evil, to save life or to kill?”'
    - type: text
      text: ' But they remained silent.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He looked around at them in anger and, deeply distressed at their stubborn hearts, said to the man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Stretch out your hand.”
    - type: text
      text: ' He stretched it out, and his hand was completely restored. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the Pharisees went out and began to plot with the Herodians how they might kill Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Crowds Follow Jesus
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus withdrew with his disciples to the lake, and a large crowd from Galilee followed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they heard about all he was doing, many people came to him from Judea, Jerusalem, Idumea, and the regions across the Jordan and around Tyre and Sidon. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because of the crowd he told his disciples to have a small boat ready for him, to keep the people from crowding him. '
