document_id: PSA.50,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 50
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The Mighty One, God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: speaks and summons the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the rising of the sun to where it sets.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: for every animal of the forest is mine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the cattle on a thousand hills.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I know every bird in the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the insects in the fields are mine.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If I were hungry I would not tell you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the world is mine, and all that is in it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Do I eat the flesh of bulls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or drink the blood of goats?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “Sacrifice thank offerings to God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fulfill your vows to the Most High,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: and call on me in the day of trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will deliver you, and you will honor me.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But to the wicked person, God says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What right have you to recite my laws
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or take my covenant on your lips?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You hate my instruction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cast my words behind you.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: When you see a thief, you join with him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you throw in your lot with adulterers.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: You use your mouth for evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and harness your tongue to deceit.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: From Zion, perfect in beauty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God shines forth.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: You sit and testify against your brother
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and slander your own mother’s son.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: When you did these things and I kept silent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you thought I was exactly
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: thought the ‘
        - type: usfm
          marker: nd
          children:
          - type: text
            text: I am
        - type: text
          text: ’ was
      marker-yv: yv-n
    - type: text
      text: ' like you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I now arraign you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set my accusations before you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Consider this, you who forget God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'or I will tear you to pieces, with no one to rescue you:'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Those who sacrifice thank offerings honor me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the blameless
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probable reading of the original Hebrew text; the meaning of the Masoretic Text for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' I will show my salvation.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Our God comes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will not be silent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a fire devours before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and around him a tempest rages.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He summons the heavens above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the earth, that he may judge his people:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Gather to me this consecrated people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who made a covenant with me by sacrifice.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: And the heavens proclaim his righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he is a God of justice.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'With a different word division of the Hebrew; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for God himself is judge
      marker-yv: yv-n
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Listen, my people, and I will speak;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will testify against you, Israel:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am God, your God.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I bring no charges against you concerning your sacrifices
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or concerning your burnt offerings, which are ever before me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I have no need of a bull from your stall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or of goats from your pens,
