document_id: PSA.50,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 50
  - type: text
    content: A psalm of Asaph.
  - type: text
    content: 'The Mighty One, God, the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: speaks and summons the earth
  - type: text
    content: from the rising of the sun to where it sets.
  '10':
  - type: text
    content: for every animal of the forest is mine,
  - type: text
    content: and the cattle on a thousand hills.
  '11':
  - type: text
    content: I know every bird in the mountains,
  - type: text
    content: and the insects in the fields are mine.
  '12':
  - type: text
    content: If I were hungry I would not tell you,
  - type: text
    content: for the world is mine, and all that is in it.
  '13':
  - type: text
    content: Do I eat the flesh of bulls
  - type: text
    content: or drink the blood of goats?
  '14':
  - type: text
    content: “Sacrifice thank offerings to God,
  - type: text
    content: fulfill your vows to the Most High,
  '15':
  - type: text
    content: and call on me in the day of trouble;
  - type: text
    content: I will deliver you, and you will honor me.”
  '16':
  - type: text
    content: 'But to the wicked person, God says:'
  - type: text
    content: “What right have you to recite my laws
  - type: text
    content: or take my covenant on your lips?
  '17':
  - type: text
    content: You hate my instruction
  - type: text
    content: and cast my words behind you.
  '18':
  - type: text
    content: When you see a thief, you join with him;
  - type: text
    content: you throw in your lot with adulterers.
  '19':
  - type: text
    content: You use your mouth for evil
  - type: text
    content: and harness your tongue to deceit.
  '2':
  - type: text
    content: From Zion, perfect in beauty,
  - type: text
    content: God shines forth.
  '20':
  - type: text
    content: You sit and testify against your brother
  - type: text
    content: and slander your own mother’s son.
  '21':
  - type: text
    content: When you did these things and I kept silent,
  - type: text
    content: you thought I was exactly
  - type: note
    content: Or thought the ‘I am’ was
  - type: text
    content: ' like you.'
  - type: text
    content: But I now arraign you
  - type: text
    content: and set my accusations before you.
  '22':
  - type: text
    content: “Consider this, you who forget God,
  - type: text
    content: 'or I will tear you to pieces, with no one to rescue you:'
  '23':
  - type: text
    content: Those who sacrifice thank offerings honor me,
  - type: text
    content: and to the blameless
  - type: note
    content: Probable reading of the original Hebrew text; the meaning of the Masoretic Text for this phrase is uncertain.
  - type: text
    content: ' I will show my salvation.”'
  '3':
  - type: text
    content: Our God comes
  - type: text
    content: and will not be silent;
  - type: text
    content: a fire devours before him,
  - type: text
    content: and around him a tempest rages.
  '4':
  - type: text
    content: He summons the heavens above,
  - type: text
    content: 'and the earth, that he may judge his people:'
  '5':
  - type: text
    content: “Gather to me this consecrated people,
  - type: text
    content: who made a covenant with me by sacrifice.”
  '6':
  - type: text
    content: And the heavens proclaim his righteousness,
  - type: text
    content: for he is a God of justice.
  - type: note
    content: With a different word division of the Hebrew; Masoretic Text for God himself is judge
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '7':
  - type: text
    content: “Listen, my people, and I will speak;
  - type: text
    content: 'I will testify against you, Israel:'
  - type: text
    content: I am God, your God.
  '8':
  - type: text
    content: I bring no charges against you concerning your sacrifices
  - type: text
    content: or concerning your burnt offerings, which are ever before me.
  '9':
  - type: text
    content: I have no need of a bull from your stall
  - type: text
    content: or of goats from your pens,
