document_id: GEN.36
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esau’s Descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This is the account of the family line of Esau (that is, Edom).
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Esau took his wives from the women of Canaan: Adah daughter of Elon the Hittite, and Oholibamah daughter of Anah and granddaughter of Zibeon the Hivite— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: also Basemath daughter of Ishmael and sister of Nebaioth.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Adah bore Eliphaz to Esau, Basemath bore Reuel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: and Oholibamah bore Jeush, Jalam and Korah. These were the sons of Esau, who were born to him in Canaan.
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esau took his wives and sons and daughters and all the members of his household, as well as his livestock and all his other animals and all the goods he had acquired in Canaan, and moved to a land some distance from his brother Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Their possessions were too great for them to remain together; the land where they were staying could not support them both because of their livestock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So Esau (that is, Edom) settled in the hill country of Seir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: This is the account of the family line of Esau the father of the Edomites in the hill country of Seir.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'These are the names of Esau’s sons:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Eliphaz, the son of Esau’s wife Adah, and Reuel, the son of Esau’s wife Basemath.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The sons of Eliphaz:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Teman, Omar, Zepho, Gatam and Kenaz.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Esau’s son Eliphaz also had a concubine named Timna, who bore him Amalek. These were grandsons of Esau’s wife Adah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Reuel:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Nahath, Zerah, Shammah and Mizzah. These were grandsons of Esau’s wife Basemath.
- type: usfm
  marker: li4
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The sons of Esau’s wife Oholibamah daughter of Anah and granddaughter of Zibeon, whom she bore to Esau:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jeush, Jalam and Korah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'These were the chiefs among Esau’s descendants:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The sons of Eliphaz the firstborn of Esau:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Chiefs Teman, Omar, Zepho, Kenaz, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Korah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text; Samaritan Pentateuch (also verse 11 and 1 Chron. 1:36) does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Korah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Gatam and Amalek. These were the chiefs descended from Eliphaz in Edom; they were grandsons of Adah.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The sons of Esau’s son Reuel:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Chiefs Nahath, Zerah, Shammah and Mizzah. These were the chiefs descended from Reuel in Edom; they were grandsons of Esau’s wife Basemath.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The sons of Esau’s wife Oholibamah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Chiefs Jeush, Jalam and Korah. These were the chiefs descended from Esau’s wife Oholibamah daughter of Anah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: These were the sons of Esau (that is, Edom), and these were their chiefs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'These were the sons of Seir the Horite, who were living in the region:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Lotan, Shobal, Zibeon, Anah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dishon, Ezer and Dishan. These sons of Seir in Edom were Horite chiefs.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The sons of Lotan:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hori and Homam.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Hemam, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Homam '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (see 1 Chron. 1:39)
    marker-yv: yv-n
  - type: text
    text: ' Timna was Lotan’s sister.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sons of Shobal:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Alvan, Manahath, Ebal, Shepho and Onam.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The sons of Zibeon:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Aiah and Anah. This is the Anah who discovered the hot springs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Vulgate; Syriac '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'discovered water; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' in the desert while he was grazing the donkeys of his father Zibeon.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The children of Anah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Dishon and Oholibamah daughter of Anah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The sons of Dishon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dishan, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dishon
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hemdan, Eshban, Ithran and Keran.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The sons of Ezer:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Bilhan, Zaavan and Akan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The sons of Dishan:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Uz and Aran.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'These were the Horite chiefs:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Lotan, Shobal, Zibeon, Anah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dishon, Ezer and Dishan. These were the Horite chiefs, according to their divisions, in the land of Seir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rulers of Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'These were the kings who reigned in Edom before any Israelite king reigned:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Bela son of Beor became king of Edom. His city was named Dinhabah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: When Bela died, Jobab son of Zerah from Bozrah succeeded him as king.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: When Jobab died, Husham from the land of the Temanites succeeded him as king.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: When Husham died, Hadad son of Bedad, who defeated Midian in the country of Moab, succeeded him as king. His city was named Avith.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: When Hadad died, Samlah from Masrekah succeeded him as king.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: When Samlah died, Shaul from Rehoboth on the river succeeded him as king.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: When Shaul died, Baal-Hanan son of Akbor succeeded him as king.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: When Baal-Hanan son of Akbor died, Hadad
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Many manuscripts of the Masoretic Text, Samaritan Pentateuch and Syriac (see also 1 Chron. 1:50); most manuscripts of the Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hadar
    marker-yv: yv-n
  - type: text
    text: ' succeeded him as king. His city was named Pau, and his wife’s name was Mehetabel daughter of Matred, the daughter of Me-Zahab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'These were the chiefs descended from Esau, by name, according to their clans and regions:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Timna, Alvah, Jetheth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Oholibamah, Elah, Pinon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Kenaz, Teman, Mibzar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Magdiel and Iram. These were the chiefs of Edom, according to their settlements in the land they occupied.
- type: usfm
  marker: p
  children:
  - type: text
    text: This is the family line of Esau, the father of the Edomites.
