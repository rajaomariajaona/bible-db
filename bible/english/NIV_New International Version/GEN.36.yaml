document_id: GEN.36,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Esau’s Descendants
  - type: text
    content: This is the account of the family line of Esau (that is, Edom).
  '10':
  - type: text
    content: 'These are the names of Esau’s sons:'
  - type: text
    content: Eliphaz, the son of Esau’s wife Adah, and Reuel, the son of Esau’s wife Basemath.
  '11':
  - type: text
    content: 'The sons of Eliphaz:'
  - type: text
    content: Teman, Omar, Zepho, Gatam and Kenaz.
  '12':
  - type: text
    content: Esau’s son Eliphaz also had a concubine named Timna, who bore him Amalek. These were grandsons of Esau’s wife Adah.
  '13':
  - type: text
    content: 'The sons of Reuel:'
  - type: text
    content: Nahath, Zerah, Shammah and Mizzah. These were grandsons of Esau’s wife Basemath.
  '14':
  - type: text
    content: 'The sons of Esau’s wife Oholibamah daughter of Anah and granddaughter of Zibeon, whom she bore to Esau:'
  - type: text
    content: Jeush, Jalam and Korah.
  '15':
  - type: text
    content: 'These were the chiefs among Esau’s descendants:'
  - type: text
    content: 'The sons of Eliphaz the firstborn of Esau:'
  - type: text
    content: 'Chiefs Teman, Omar, Zepho, Kenaz, '
  '16':
  - type: text
    content: Korah,
  - type: note
    content: Masoretic Text; Samaritan Pentateuch (also verse 11 and 1 Chron. 1:36) does not have Korah.
  - type: text
    content: ' Gatam and Amalek. These were the chiefs descended from Eliphaz in Edom; they were grandsons of Adah.'
  '17':
  - type: text
    content: 'The sons of Esau’s son Reuel:'
  - type: text
    content: Chiefs Nahath, Zerah, Shammah and Mizzah. These were the chiefs descended from Reuel in Edom; they were grandsons of Esau’s wife Basemath.
  '18':
  - type: text
    content: 'The sons of Esau’s wife Oholibamah:'
  - type: text
    content: Chiefs Jeush, Jalam and Korah. These were the chiefs descended from Esau’s wife Oholibamah daughter of Anah.
  '19':
  - type: text
    content: These were the sons of Esau (that is, Edom), and these were their chiefs.
  '2':
  - type: text
    content: 'Esau took his wives from the women of Canaan: Adah daughter of Elon the Hittite, and Oholibamah daughter of Anah and granddaughter of Zibeon the Hivite— '
  '20':
  - type: text
    content: 'These were the sons of Seir the Horite, who were living in the region:'
  - type: text
    content: 'Lotan, Shobal, Zibeon, Anah, '
  '21':
  - type: text
    content: Dishon, Ezer and Dishan. These sons of Seir in Edom were Horite chiefs.
  '22':
  - type: text
    content: 'The sons of Lotan:'
  - type: text
    content: Hori and Homam.
  - type: note
    content: Hebrew Hemam, a variant of Homam (see 1 Chron. 1:39)
  - type: text
    content: ' Timna was Lotan’s sister.'
  '23':
  - type: text
    content: 'The sons of Shobal:'
  - type: text
    content: Alvan, Manahath, Ebal, Shepho and Onam.
  '24':
  - type: text
    content: 'The sons of Zibeon:'
  - type: text
    content: Aiah and Anah. This is the Anah who discovered the hot springs
  - type: note
    content: Vulgate; Syriac discovered water; the meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' in the desert while he was grazing the donkeys of his father Zibeon.'
  '25':
  - type: text
    content: 'The children of Anah:'
  - type: text
    content: Dishon and Oholibamah daughter of Anah.
  '26':
  - type: text
    content: The sons of Dishon
  - type: note
    content: Hebrew Dishan, a variant of Dishon
  - type: text
    content: ':'
  - type: text
    content: Hemdan, Eshban, Ithran and Keran.
  '27':
  - type: text
    content: 'The sons of Ezer:'
  - type: text
    content: Bilhan, Zaavan and Akan.
  '28':
  - type: text
    content: 'The sons of Dishan:'
  - type: text
    content: Uz and Aran.
  '29':
  - type: text
    content: 'These were the Horite chiefs:'
  - type: text
    content: 'Lotan, Shobal, Zibeon, Anah, '
  '3':
  - type: text
    content: also Basemath daughter of Ishmael and sister of Nebaioth.
  '30':
  - type: text
    content: Dishon, Ezer and Dishan. These were the Horite chiefs, according to their divisions, in the land of Seir.
  - type: heading
    content: The Rulers of Edom
  '31':
  - type: text
    content: 'These were the kings who reigned in Edom before any Israelite king reigned:'
  '32':
  - type: text
    content: Bela son of Beor became king of Edom. His city was named Dinhabah.
  '33':
  - type: text
    content: When Bela died, Jobab son of Zerah from Bozrah succeeded him as king.
  '34':
  - type: text
    content: When Jobab died, Husham from the land of the Temanites succeeded him as king.
  '35':
  - type: text
    content: When Husham died, Hadad son of Bedad, who defeated Midian in the country of Moab, succeeded him as king. His city was named Avith.
  '36':
  - type: text
    content: When Hadad died, Samlah from Masrekah succeeded him as king.
  '37':
  - type: text
    content: When Samlah died, Shaul from Rehoboth on the river succeeded him as king.
  '38':
  - type: text
    content: When Shaul died, Baal-Hanan son of Akbor succeeded him as king.
  '39':
  - type: text
    content: When Baal-Hanan son of Akbor died, Hadad
  - type: note
    content: Many manuscripts of the Masoretic Text, Samaritan Pentateuch and Syriac (see also 1 Chron. 1:50); most manuscripts of the Masoretic Text Hadar
  - type: text
    content: ' succeeded him as king. His city was named Pau, and his wife’s name was Mehetabel daughter of Matred, the daughter of Me-Zahab.'
  '4':
  - type: text
    content: 'Adah bore Eliphaz to Esau, Basemath bore Reuel, '
  '40':
  - type: text
    content: 'These were the chiefs descended from Esau, by name, according to their clans and regions:'
  - type: text
    content: 'Timna, Alvah, Jetheth, '
  '41':
  - type: text
    content: 'Oholibamah, Elah, Pinon, '
  '42':
  - type: text
    content: 'Kenaz, Teman, Mibzar, '
  '43':
  - type: text
    content: Magdiel and Iram. These were the chiefs of Edom, according to their settlements in the land they occupied.
  - type: text
    content: This is the family line of Esau, the father of the Edomites.
  '5':
  - type: text
    content: and Oholibamah bore Jeush, Jalam and Korah. These were the sons of Esau, who were born to him in Canaan.
  '6':
  - type: text
    content: 'Esau took his wives and sons and daughters and all the members of his household, as well as his livestock and all his other animals and all the goods he had acquired in Canaan, and moved to a land some distance from his brother Jacob. '
  '7':
  - type: text
    content: 'Their possessions were too great for them to remain together; the land where they were staying could not support them both because of their livestock. '
  '8':
  - type: text
    content: So Esau (that is, Edom) settled in the hill country of Seir.
  '9':
  - type: text
    content: This is the account of the family line of Esau the father of the Edomites in the hill country of Seir.
