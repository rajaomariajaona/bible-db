document_id: 2CH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon Builds the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Solomon began to build the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in Jerusalem on Mount Moriah, where the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had appeared to his father David. It was on the threshing floor of Araunah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ornan, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Araunah
    marker-yv: yv-n
  - type: text
    text: ' the Jebusite, the place provided by David. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He began building on the second day of the second month in the fourth year of his reign.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The foundation Solomon laid for building the temple of God was sixty cubits long and twenty cubits wide
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 90 feet long and 30 feet wide or about 27 meters long and 9 meters wide
    marker-yv: yv-n
  - type: text
    text: ' (using the cubit of the old standard). '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The portico at the front of the temple was twenty cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 30 feet or about 9 meters; also in verses 8, 11 and 13
    marker-yv: yv-n
  - type: text
    text: ' long across the width of the building and twenty'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint and Syriac manuscripts; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and a hundred and twenty
    marker-yv: yv-n
  - type: text
    text: ' cubits high.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He overlaid the inside with pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He paneled the main hall with juniper and covered it with fine gold and decorated it with palm tree and chain designs. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He adorned the temple with precious stones. And the gold he used was gold of Parvaim. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He overlaid the ceiling beams, doorframes, walls and doors of the temple with gold, and he carved cherubim on the walls.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He built the Most Holy Place, its length corresponding to the width of the temple—twenty cubits long and twenty cubits wide. He overlaid the inside with six hundred talents
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 23 tons or about 21 metric tons
    marker-yv: yv-n
  - type: text
    text: ' of fine gold. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The gold nails weighed fifty shekels.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1 1/4 pounds or about 575 grams
    marker-yv: yv-n
  - type: text
    text: ' He also overlaid the upper parts with gold.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For the Most Holy Place he made a pair of sculptured cherubim and overlaid them with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The total wingspan of the cherubim was twenty cubits. One wing of the first cherub was five cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 7 1/2 feet or about 2.3 meters; also in verse 15
    marker-yv: yv-n
  - type: text
    text: ' long and touched the temple wall, while its other wing, also five cubits long, touched the wing of the other cherub. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Similarly one wing of the second cherub was five cubits long and touched the other temple wall, and its other wing, also five cubits long, touched the wing of the first cherub. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The wings of these cherubim extended twenty cubits. They stood on their feet, facing the main hall.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: facing inward
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He made the curtain of blue, purple and crimson yarn and fine linen, with cherubim worked into it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For the front of the temple he made two pillars, which together were thirty-five cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 53 feet or about 16 meters
    marker-yv: yv-n
  - type: text
    text: ' long, each with a capital five cubits high. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He made interwoven chains
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or possibly '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: made chains in the inner sanctuary
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; the meaning of the Hebrew for this phrase is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and put them on top of the pillars. He also made a hundred pomegranates and attached them to the chains. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He erected the pillars in the front of the temple, one to the south and one to the north. The one to the south he named Jakin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jakin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'probably means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he establishes.
    marker-yv: yv-n
  - type: text
    text: ' and the one to the north Boaz.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Boaz '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'probably means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in him is strength.
    marker-yv: yv-n
