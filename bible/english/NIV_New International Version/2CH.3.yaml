document_id: 2CH.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Builds the Temple
  - type: text
    content: 'Then Solomon began to build the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem on Mount Moriah, where the '
  - type: text
    content: Lord
  - type: text
    content: ' had appeared to his father David. It was on the threshing floor of Araunah'
  - type: note
    content: Hebrew Ornan, a variant of Araunah
  - type: text
    content: ' the Jebusite, the place provided by David. '
  '10':
  - type: text
    content: 'For the Most Holy Place he made a pair of sculptured cherubim and overlaid them with gold. '
  '11':
  - type: text
    content: The total wingspan of the cherubim was twenty cubits. One wing of the first cherub was five cubits
  - type: note
    content: That is, about 7 1/2 feet or about 2.3 meters; also in verse 15
  - type: text
    content: ' long and touched the temple wall, while its other wing, also five cubits long, touched the wing of the other cherub. '
  '12':
  - type: text
    content: 'Similarly one wing of the second cherub was five cubits long and touched the other temple wall, and its other wing, also five cubits long, touched the wing of the first cherub. '
  '13':
  - type: text
    content: The wings of these cherubim extended twenty cubits. They stood on their feet, facing the main hall.
  - type: note
    content: Or facing inward
  '14':
  - type: text
    content: He made the curtain of blue, purple and crimson yarn and fine linen, with cherubim worked into it.
  '15':
  - type: text
    content: For the front of the temple he made two pillars, which together were thirty-five cubits
  - type: note
    content: That is, about 53 feet or about 16 meters
  - type: text
    content: ' long, each with a capital five cubits high. '
  '16':
  - type: text
    content: He made interwoven chains
  - type: note
    content: Or possibly made chains in the inner sanctuary; the meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' and put them on top of the pillars. He also made a hundred pomegranates and attached them to the chains. '
  '17':
  - type: text
    content: He erected the pillars in the front of the temple, one to the south and one to the north. The one to the south he named Jakin
  - type: note
    content: Jakin probably means he establishes.
  - type: text
    content: ' and the one to the north Boaz.'
  - type: note
    content: Boaz probably means in him is strength.
  '2':
  - type: text
    content: He began building on the second day of the second month in the fourth year of his reign.
  '3':
  - type: text
    content: The foundation Solomon laid for building the temple of God was sixty cubits long and twenty cubits wide
  - type: note
    content: That is, about 90 feet long and 30 feet wide or about 27 meters long and 9 meters wide
  - type: text
    content: ' (using the cubit of the old standard). '
  '4':
  - type: text
    content: The portico at the front of the temple was twenty cubits
  - type: note
    content: That is, about 30 feet or about 9 meters; also in verses 8, 11 and 13
  - type: text
    content: ' long across the width of the building and twenty'
  - type: note
    content: Some Septuagint and Syriac manuscripts; Hebrew and a hundred and twenty
  - type: text
    content: ' cubits high.'
  - type: text
    content: 'He overlaid the inside with pure gold. '
  '5':
  - type: text
    content: 'He paneled the main hall with juniper and covered it with fine gold and decorated it with palm tree and chain designs. '
  '6':
  - type: text
    content: 'He adorned the temple with precious stones. And the gold he used was gold of Parvaim. '
  '7':
  - type: text
    content: He overlaid the ceiling beams, doorframes, walls and doors of the temple with gold, and he carved cherubim on the walls.
  '8':
  - type: text
    content: He built the Most Holy Place, its length corresponding to the width of the temple—twenty cubits long and twenty cubits wide. He overlaid the inside with six hundred talents
  - type: note
    content: That is, about 23 tons or about 21 metric tons
  - type: text
    content: ' of fine gold. '
  '9':
  - type: text
    content: The gold nails weighed fifty shekels.
  - type: note
    content: That is, about 1 1/4 pounds or about 575 grams
  - type: text
    content: ' He also overlaid the upper parts with gold.'
