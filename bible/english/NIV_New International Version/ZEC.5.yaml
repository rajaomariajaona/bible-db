document_id: ZEC.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Flying Scroll
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: I looked again, and there before me was a flying scroll.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Where are they taking the basket?” I asked the angel who was speaking to me.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He replied, “To the country of Babylonia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shinar
      marker-yv: yv-n
    - type: text
      text: ' to build a house for it. When the house is ready, the basket will be set there in its place.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He asked me, “What do you see?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: I answered, “I see a flying scroll, twenty cubits long and ten cubits wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 30 feet long and 15 feet wide or about 9 meters long and 4.5 meters wide
      marker-yv: yv-n
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to me, “This is the curse that is going out over the whole land; for according to what it says on one side, every thief will be banished, and according to what it says on the other, everyone who swears falsely will be banished. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty declares, ‘I will send it out, and it will enter the house of the thief and the house of anyone who swears falsely by my name. It will remain in that house and destroy it completely, both its timbers and its stones.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Woman in a Basket
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the angel who was speaking to me came forward and said to me, “Look up and see what is appearing.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I asked, “What is it?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He replied, “It is a basket.” And he added, “This is the iniquity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: appearance
      marker-yv: yv-n
    - type: text
      text: ' of the people throughout the land.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the cover of lead was raised, and there in the basket sat a woman! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “This is wickedness,” and he pushed her back into the basket and pushed its lead cover down on it.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I looked up—and there before me were two women, with the wind in their wings! They had wings like those of a stork, and they lifted up the basket between heaven and earth.
