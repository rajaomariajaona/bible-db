document_id: ZEC.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Flying Scroll
  - type: text
    content: I looked again, and there before me was a flying scroll.
  '10':
  - type: text
    content: “Where are they taking the basket?” I asked the angel who was speaking to me.
  '11':
  - type: text
    content: He replied, “To the country of Babylonia
  - type: note
    content: Hebrew Shinar
  - type: text
    content: ' to build a house for it. When the house is ready, the basket will be set there in its place.”'
  '2':
  - type: text
    content: He asked me, “What do you see?”
  - type: text
    content: I answered, “I see a flying scroll, twenty cubits long and ten cubits wide.
  - type: note
    content: That is, about 30 feet long and 15 feet wide or about 9 meters long and 4.5 meters wide
  - type: text
    content: ”
  '3':
  - type: text
    content: 'And he said to me, “This is the curse that is going out over the whole land; for according to what it says on one side, every thief will be banished, and according to what it says on the other, everyone who swears falsely will be banished. '
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty declares, ‘I will send it out, and it will enter the house of the thief and the house of anyone who swears falsely by my name. It will remain in that house and destroy it completely, both its timbers and its stones.’ ”'
  - type: heading
    content: The Woman in a Basket
  '5':
  - type: text
    content: Then the angel who was speaking to me came forward and said to me, “Look up and see what is appearing.”
  '6':
  - type: text
    content: I asked, “What is it?”
  - type: text
    content: He replied, “It is a basket.” And he added, “This is the iniquity
  - type: note
    content: Or appearance
  - type: text
    content: ' of the people throughout the land.”'
  '7':
  - type: text
    content: 'Then the cover of lead was raised, and there in the basket sat a woman! '
  '8':
  - type: text
    content: He said, “This is wickedness,” and he pushed her back into the basket and pushed its lead cover down on it.
  '9':
  - type: text
    content: Then I looked up—and there before me were two women, with the wind in their wings! They had wings like those of a stork, and they lifted up the basket between heaven and earth.
