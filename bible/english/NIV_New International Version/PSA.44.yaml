document_id: PSA.44
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 44
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 44:1-26 is numbered 44:2-27.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the director of music. Of the Sons of Korah. A '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: maskil.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a literary or musical term'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: We have heard it with our ears, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: our ancestors have told us
- type: usfm
  marker: q1
  children:
  - type: text
    text: what you did in their days,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in days long ago.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: With your hand you drove out the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and planted our ancestors;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you crushed the peoples
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made our ancestors flourish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It was not by their sword that they won the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor did their arm bring them victory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it was your right hand, your arm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the light of your face, for you loved them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You are my King and my God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who decrees
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint, Aquila and Syriac; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: King, O God; / command
    marker-yv: yv-n
  - type: text
    text: ' victories for Jacob.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Through you we push back our enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: through your name we trample our foes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I put no trust in my bow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my sword does not bring me victory;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: but you give us victory over our enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you put our adversaries to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: In God we make our boast all day long,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we will praise your name forever.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But now you have rejected and humbled us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you no longer go out with our armies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You made us retreat before the enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our adversaries have plundered us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You gave us up to be devoured like sheep
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have scattered us among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You sold your people for a pittance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gaining nothing from their sale.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You have made us a reproach to our neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the scorn and derision of those around us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You have made us a byword among the nations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the peoples shake their heads at us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I live in disgrace all day long,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my face is covered with shame
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: at the taunts of those who reproach and revile me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the enemy, who is bent on revenge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All this came upon us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though we had not forgotten you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we had not been false to your covenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Our hearts had not turned back;
- type: usfm
  marker: q2
  children:
  - type: text
    text: our feet had not strayed from your path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But you crushed us and made us a haunt for jackals;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you covered us over with deep darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: If we had forgotten the name of our God
- type: usfm
  marker: q2
  children:
  - type: text
    text: or spread out our hands to a foreign god,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: would not God have discovered it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since he knows the secrets of the heart?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Yet for your sake we face death all day long;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we are considered as sheep to be slaughtered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Awake, Lord! Why do you sleep?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rouse yourself! Do not reject us forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Why do you hide your face
- type: usfm
  marker: q2
  children:
  - type: text
    text: and forget our misery and oppression?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: We are brought down to the dust;
- type: usfm
  marker: q2
  children:
  - type: text
    text: our bodies cling to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Rise up and help us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: rescue us because of your unfailing love.
