document_id: PSA.44,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 44In Hebrew texts 44:1-26 is numbered 44:2-27.
  - type: text
    content: 'For the director of music. Of the Sons of Korah. A '
  - type: text
    content: maskil.
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: We have heard it with our ears, O God;
  - type: text
    content: our ancestors have told us
  - type: text
    content: what you did in their days,
  - type: text
    content: in days long ago.
  '10':
  - type: text
    content: You made us retreat before the enemy,
  - type: text
    content: and our adversaries have plundered us.
  '11':
  - type: text
    content: You gave us up to be devoured like sheep
  - type: text
    content: and have scattered us among the nations.
  '12':
  - type: text
    content: You sold your people for a pittance,
  - type: text
    content: gaining nothing from their sale.
  '13':
  - type: text
    content: You have made us a reproach to our neighbors,
  - type: text
    content: the scorn and derision of those around us.
  '14':
  - type: text
    content: You have made us a byword among the nations;
  - type: text
    content: the peoples shake their heads at us.
  '15':
  - type: text
    content: I live in disgrace all day long,
  - type: text
    content: and my face is covered with shame
  '16':
  - type: text
    content: at the taunts of those who reproach and revile me,
  - type: text
    content: because of the enemy, who is bent on revenge.
  '17':
  - type: text
    content: All this came upon us,
  - type: text
    content: though we had not forgotten you;
  - type: text
    content: we had not been false to your covenant.
  '18':
  - type: text
    content: Our hearts had not turned back;
  - type: text
    content: our feet had not strayed from your path.
  '19':
  - type: text
    content: But you crushed us and made us a haunt for jackals;
  - type: text
    content: you covered us over with deep darkness.
  '2':
  - type: text
    content: With your hand you drove out the nations
  - type: text
    content: and planted our ancestors;
  - type: text
    content: you crushed the peoples
  - type: text
    content: and made our ancestors flourish.
  '20':
  - type: text
    content: If we had forgotten the name of our God
  - type: text
    content: or spread out our hands to a foreign god,
  '21':
  - type: text
    content: would not God have discovered it,
  - type: text
    content: since he knows the secrets of the heart?
  '22':
  - type: text
    content: Yet for your sake we face death all day long;
  - type: text
    content: we are considered as sheep to be slaughtered.
  '23':
  - type: text
    content: Awake, Lord! Why do you sleep?
  - type: text
    content: Rouse yourself! Do not reject us forever.
  '24':
  - type: text
    content: Why do you hide your face
  - type: text
    content: and forget our misery and oppression?
  '25':
  - type: text
    content: We are brought down to the dust;
  - type: text
    content: our bodies cling to the ground.
  '26':
  - type: text
    content: Rise up and help us;
  - type: text
    content: rescue us because of your unfailing love.
  '3':
  - type: text
    content: It was not by their sword that they won the land,
  - type: text
    content: nor did their arm bring them victory;
  - type: text
    content: it was your right hand, your arm,
  - type: text
    content: and the light of your face, for you loved them.
  '4':
  - type: text
    content: You are my King and my God,
  - type: text
    content: who decrees
  - type: note
    content: Septuagint, Aquila and Syriac; Hebrew King, O God; / command
  - type: text
    content: ' victories for Jacob.'
  '5':
  - type: text
    content: Through you we push back our enemies;
  - type: text
    content: through your name we trample our foes.
  '6':
  - type: text
    content: I put no trust in my bow,
  - type: text
    content: my sword does not bring me victory;
  '7':
  - type: text
    content: but you give us victory over our enemies,
  - type: text
    content: you put our adversaries to shame.
  '8':
  - type: text
    content: In God we make our boast all day long,
  - type: text
    content: and we will praise your name forever.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '9':
  - type: text
    content: But now you have rejected and humbled us;
  - type: text
    content: you no longer go out with our armies.
