document_id: PSA.44,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 44
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 44:1-26 is numbered 44:2-27.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. Of the Sons of Korah. A '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: maskil.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a literary or musical term'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have heard it with our ears, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our ancestors have told us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what you did in their days,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in days long ago.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made us retreat before the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and our adversaries have plundered us.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave us up to be devoured like sheep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have scattered us among the nations.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You sold your people for a pittance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gaining nothing from their sale.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have made us a reproach to our neighbors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the scorn and derision of those around us.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have made us a byword among the nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the peoples shake their heads at us.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I live in disgrace all day long,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my face is covered with shame
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at the taunts of those who reproach and revile me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the enemy, who is bent on revenge.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All this came upon us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though we had not forgotten you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we had not been false to your covenant.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our hearts had not turned back;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our feet had not strayed from your path.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you crushed us and made us a haunt for jackals;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you covered us over with deep darkness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your hand you drove out the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and planted our ancestors;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you crushed the peoples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made our ancestors flourish.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If we had forgotten the name of our God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or spread out our hands to a foreign god,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: would not God have discovered it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: since he knows the secrets of the heart?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet for your sake we face death all day long;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we are considered as sheep to be slaughtered.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Awake, Lord! Why do you sleep?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Rouse yourself! Do not reject us forever.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you hide your face
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and forget our misery and oppression?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are brought down to the dust;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our bodies cling to the ground.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rise up and help us;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rescue us because of your unfailing love.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was not by their sword that they won the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor did their arm bring them victory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it was your right hand, your arm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the light of your face, for you loved them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my King and my God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who decrees
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Aquila and Syriac; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: King, O God; / command
      marker-yv: yv-n
    - type: text
      text: ' victories for Jacob.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through you we push back our enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through your name we trample our foes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I put no trust in my bow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my sword does not bring me victory;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you give us victory over our enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you put our adversaries to shame.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In God we make our boast all day long,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we will praise your name forever.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now you have rejected and humbled us;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you no longer go out with our armies.
