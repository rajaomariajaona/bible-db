  '14':
  - type: text
    content: And he has raised up for his people a horn,
  - type: note
    content: Horn here symbolizes strength.
  - type: text
    content: the praise of all his faithful servants,
  - type: text
    content: of Israel, the people close to his heart.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: Praise him, all his angels;
  - type: text
    content: praise him, all his heavenly hosts.
  '3':
  - type: text
    content: Praise him, sun and moon;
  - type: text
    content: praise him, all you shining stars.
  '4':
  - type: text
    content: Praise him, you highest heavens
  - type: text
    content: and you waters above the skies.
  '5':
  - type: text
    content: 'Let them praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for at his command they were created,
  '6':
  - type: text
    content: and he established them for ever and ever—
  - type: text
    content: he issued a decree that will never pass away.
  '7':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ' from the earth,'
  - type: text
    content: you great sea creatures and all ocean depths,
  '8':
  - type: text
    content: lightning and hail, snow and clouds,
  - type: text
    content: stormy winds that do his bidding,
