document_id: 1CH.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Promise to David
  - type: text
    content: 'After David was settled in his palace, he said to Nathan the prophet, “Here I am, living in a house of cedar, while the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' is under a tent.”'
  '10':
  - type: text
    content: and have done ever since the time I appointed leaders over my people Israel. I will also subdue all your enemies.
  - type: text
    content: '“ ‘I declare to you that the '
  - type: text
    content: Lord
  - type: text
    content: ' will build a house for you: '
  '11':
  - type: text
    content: 'When your days are over and you go to be with your ancestors, I will raise up your offspring to succeed you, one of your own sons, and I will establish his kingdom. '
  '12':
  - type: text
    content: 'He is the one who will build a house for me, and I will establish his throne forever. '
  '13':
  - type: text
    content: 'I will be his father, and he will be my son. I will never take my love away from him, as I took it away from your predecessor. '
  '14':
  - type: text
    content: I will set him over my house and my kingdom forever; his throne will be established forever.’ ”
  '15':
  - type: text
    content: Nathan reported to David all the words of this entire revelation.
  - type: heading
    content: David’s Prayer
  '16':
  - type: text
    content: 'Then King David went in and sat before the '
  - type: text
    content: Lord
  - type: text
    content: ', and he said:'
  - type: text
    content: '“Who am I, '
  - type: text
    content: Lord
  - type: text
    content: ' God, and what is my family, that you have brought me this far? '
  '17':
  - type: text
    content: 'And as if this were not enough in your sight, my God, you have spoken about the future of the house of your servant. You, '
  - type: text
    content: Lord
  - type: text
    content: ' God, have looked on me as though I were the most exalted of men.'
  '18':
  - type: text
    content: '“What more can David say to you for honoring your servant? For you know your servant, '
  '19':
  - type: text
    content: Lord
  - type: text
    content: . For the sake of your servant and according to your will, you have done this great thing and made known all these great promises.
  '2':
  - type: text
    content: Nathan replied to David, “Whatever you have in mind, do it, for God is with you.”
  '20':
  - type: text
    content: '“There is no one like you, '
  - type: text
    content: Lord
  - type: text
    content: ', and there is no God but you, as we have heard with our own ears. '
  '21':
  - type: text
    content: 'And who is like your people Israel—the one nation on earth whose God went out to redeem a people for himself, and to make a name for yourself, and to perform great and awesome wonders by driving out nations from before your people, whom you redeemed from Egypt? '
  '22':
  - type: text
    content: 'You made your people Israel your very own forever, and you, '
  - type: text
    content: Lord
  - type: text
    content: ', have become their God.'
  '23':
  - type: text
    content: '“And now, '
  - type: text
    content: Lord
  - type: text
    content: ', let the promise you have made concerning your servant and his house be established forever. Do as you promised, '
  '24':
  - type: text
    content: 'so that it will be established and that your name will be great forever. Then people will say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God over Israel, is Israel’s God!’ And the house of your servant David will be established before you.'
  '25':
  - type: text
    content: '“You, my God, have revealed to your servant that you will build a house for him. So your servant has found courage to pray to you. '
  '26':
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', are God! You have promised these good things to your servant. '
  '27':
  - type: text
    content: 'Now you have been pleased to bless the house of your servant, that it may continue forever in your sight; for you, '
  - type: text
    content: Lord
  - type: text
    content: ', have blessed it, and it will be blessed forever.”'
  '3':
  - type: text
    content: 'But that night the word of God came to Nathan, saying:'
  '4':
  - type: text
    content: '“Go and tell my servant David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: You are not the one to build me a house to dwell in. '
  '5':
  - type: text
    content: 'I have not dwelt in a house from the day I brought Israel up out of Egypt to this day. I have moved from one tent site to another, from one dwelling place to another. '
  '6':
  - type: text
    content: Wherever I have moved with all the Israelites, did I ever say to any of their leaders
  - type: note
    content: Traditionally judges; also in verse 10
  - type: text
    content: ' whom I commanded to shepherd my people, “Why have you not built me a house of cedar?” ’'
  '7':
  - type: text
    content: '“Now then, tell my servant David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: I took you from the pasture, from tending the flock, and appointed you ruler over my people Israel. '
  '8':
  - type: text
    content: 'I have been with you wherever you have gone, and I have cut off all your enemies from before you. Now I will make your name like the names of the greatest men on earth. '
  '9':
  - type: text
    content: 'And I will provide a place for my people Israel and will plant them so that they can have a home of their own and no longer be disturbed. Wicked people will not oppress them anymore, as they did at the beginning '
