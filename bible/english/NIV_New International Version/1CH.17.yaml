document_id: 1CH.17,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Promise to David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After David was settled in his palace, he said to Nathan the prophet, “Here I am, living in a house of cedar, while the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is under a tent.”'
  '10':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: and have done ever since the time I appointed leaders over my people Israel. I will also subdue all your enemies.
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“ ‘I declare to you that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will build a house for you: '
  '11':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'When your days are over and you go to be with your ancestors, I will raise up your offspring to succeed you, one of your own sons, and I will establish his kingdom. '
  '12':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'He is the one who will build a house for me, and I will establish his throne forever. '
  '13':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'I will be his father, and he will be my son. I will never take my love away from him, as I took it away from your predecessor. '
  '14':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: I will set him over my house and my kingdom forever; his throne will be established forever.’ ”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nathan reported to David all the words of this entire revelation.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Prayer
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King David went in and sat before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he said:'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“Who am I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, and what is my family, that you have brought me this far? '
  '17':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'And as if this were not enough in your sight, my God, you have spoken about the future of the house of your servant. You, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, have looked on me as though I were the most exalted of men.'
  '18':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“What more can David say to you for honoring your servant? For you know your servant, '
  '19':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . For the sake of your servant and according to your will, you have done this great thing and made known all these great promises.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nathan replied to David, “Whatever you have in mind, do it, for God is with you.”
  '20':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“There is no one like you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and there is no God but you, as we have heard with our own ears. '
  '21':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'And who is like your people Israel—the one nation on earth whose God went out to redeem a people for himself, and to make a name for yourself, and to perform great and awesome wonders by driving out nations from before your people, whom you redeemed from Egypt? '
  '22':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'You made your people Israel your very own forever, and you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have become their God.'
  '23':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“And now, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', let the promise you have made concerning your servant and his house be established forever. Do as you promised, '
  '24':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'so that it will be established and that your name will be great forever. Then people will say, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God over Israel, is Israel’s God!’ And the house of your servant David will be established before you.'
  '25':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“You, my God, have revealed to your servant that you will build a house for him. So your servant has found courage to pray to you. '
  '26':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'You, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are God! You have promised these good things to your servant. '
  '27':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Now you have been pleased to bless the house of your servant, that it may continue forever in your sight; for you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have blessed it, and it will be blessed forever.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But that night the word of God came to Nathan, saying:'
  '4':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“Go and tell my servant David, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: You are not the one to build me a house to dwell in. '
  '5':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'I have not dwelt in a house from the day I brought Israel up out of Egypt to this day. I have moved from one tent site to another, from one dwelling place to another. '
  '6':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Wherever I have moved with all the Israelites, did I ever say to any of their leaders
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: judges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 10
      marker-yv: yv-n
    - type: text
      text: ' whom I commanded to shepherd my people, “Why have you not built me a house of cedar?” ’'
  '7':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“Now then, tell my servant David, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: I took you from the pasture, from tending the flock, and appointed you ruler over my people Israel. '
  '8':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'I have been with you wherever you have gone, and I have cut off all your enemies from before you. Now I will make your name like the names of the greatest men on earth. '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'And I will provide a place for my people Israel and will plant them so that they can have a home of their own and no longer be disturbed. Wicked people will not oppress them anymore, as they did at the beginning '
