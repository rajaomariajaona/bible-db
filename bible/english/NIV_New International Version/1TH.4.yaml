document_id: 1TH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Living to Please God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As for other matters, brothers and sisters, we instructed you how to live in order to please God, as in fact you are living. Now we ask you and urge you in the Lord Jesus to do this more and more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For you know what instructions we gave you by the authority of the Lord Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'It is God’s will that you should be sanctified: that you should avoid sexual immorality; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: that each of you should learn to control your own body
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: learn to live with your own wife
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: learn to acquire a wife
    marker-yv: yv-n
  - type: text
    text: ' in a way that is holy and honorable, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'not in passionate lust like the pagans, who do not know God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and that in this matter no one should wrong or take advantage of a brother or sister.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'brother or sister '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: tl
        children:
        - type: text
          text: adelphos
      - type: text
        text: ) refers here to a believer, whether man or woman, as part of God’s family.
    marker-yv: yv-n
  - type: text
    text: ' The Lord will punish all those who commit such sins, as we told you and warned you before. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For God did not call us to be impure, but to live a holy life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Therefore, anyone who rejects this instruction does not reject a human being but God, the very God who gives you his Holy Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now about your love for one another we do not need to write to you, for you yourselves have been taught by God to love each other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And in fact, you do love all of God’s family throughout Macedonia. Yet we urge you, brothers and sisters, to do so more and more, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and to make it your ambition to lead a quiet life: You should mind your own business and work with your hands, just as we told you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: so that your daily life may win the respect of outsiders and so that you will not be dependent on anybody.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Believers Who Have Died
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Brothers and sisters, we do not want you to be uninformed about those who sleep in death, so that you do not grieve like the rest of mankind, who have no hope. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For we believe that Jesus died and rose again, and so we believe that God will bring with Jesus those who have fallen asleep in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'According to the Lord’s word, we tell you that we who are still alive, who are left until the coming of the Lord, will certainly not precede those who have fallen asleep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For the Lord himself will come down from heaven, with a loud command, with the voice of the archangel and with the trumpet call of God, and the dead in Christ will rise first. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'After that, we who are still alive and are left will be caught up together with them in the clouds to meet the Lord in the air. And so we will be with the Lord forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Therefore encourage one another with these words.
