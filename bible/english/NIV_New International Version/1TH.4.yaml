document_id: 1TH.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Living to Please God
  - type: text
    content: 'As for other matters, brothers and sisters, we instructed you how to live in order to please God, as in fact you are living. Now we ask you and urge you in the Lord Jesus to do this more and more. '
  '10':
  - type: text
    content: 'And in fact, you do love all of God’s family throughout Macedonia. Yet we urge you, brothers and sisters, to do so more and more, '
  '11':
  - type: text
    content: 'and to make it your ambition to lead a quiet life: You should mind your own business and work with your hands, just as we told you, '
  '12':
  - type: text
    content: so that your daily life may win the respect of outsiders and so that you will not be dependent on anybody.
  - type: heading
    content: Believers Who Have Died
  '13':
  - type: text
    content: 'Brothers and sisters, we do not want you to be uninformed about those who sleep in death, so that you do not grieve like the rest of mankind, who have no hope. '
  '14':
  - type: text
    content: 'For we believe that Jesus died and rose again, and so we believe that God will bring with Jesus those who have fallen asleep in him. '
  '15':
  - type: text
    content: 'According to the Lord’s word, we tell you that we who are still alive, who are left until the coming of the Lord, will certainly not precede those who have fallen asleep. '
  '16':
  - type: text
    content: 'For the Lord himself will come down from heaven, with a loud command, with the voice of the archangel and with the trumpet call of God, and the dead in Christ will rise first. '
  '17':
  - type: text
    content: 'After that, we who are still alive and are left will be caught up together with them in the clouds to meet the Lord in the air. And so we will be with the Lord forever. '
  '18':
  - type: text
    content: Therefore encourage one another with these words.
  '2':
  - type: text
    content: For you know what instructions we gave you by the authority of the Lord Jesus.
  '3':
  - type: text
    content: 'It is God’s will that you should be sanctified: that you should avoid sexual immorality; '
  '4':
  - type: text
    content: that each of you should learn to control your own body
  - type: note
    content: Or learn to live with your own wife; or learn to acquire a wife
  - type: text
    content: ' in a way that is holy and honorable, '
  '5':
  - type: text
    content: 'not in passionate lust like the pagans, who do not know God; '
  '6':
  - type: text
    content: and that in this matter no one should wrong or take advantage of a brother or sister.
  - type: note
    content: The Greek word for brother or sister (adelphos) refers here to a believer, whether man or woman, as part of God’s family.
  - type: text
    content: ' The Lord will punish all those who commit such sins, as we told you and warned you before. '
  '7':
  - type: text
    content: 'For God did not call us to be impure, but to live a holy life. '
  '8':
  - type: text
    content: Therefore, anyone who rejects this instruction does not reject a human being but God, the very God who gives you his Holy Spirit.
  '9':
  - type: text
    content: 'Now about your love for one another we do not need to write to you, for you yourselves have been taught by God to love each other. '
