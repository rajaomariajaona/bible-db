document_id: MRK.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Divorce
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus then left that place and went into the region of Judea and across the Jordan. Again crowds of people came to him, and as was his custom, he taught them.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they were in the house again, the disciples asked Jesus about this. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Anyone who divorces his wife and marries another woman commits adultery against her.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if she divorces her husband and marries another man, she commits adultery.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Little Children and Jesus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'People were bringing little children to Jesus for him to place his hands on them, but the disciples rebuked them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus saw this, he was indignant. He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let the little children come to me, and do not hinder them, for the kingdom of God belongs to such as these.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Truly I tell you, anyone who will not receive the kingdom of God like a little child will never enter it.”
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he took the children in his arms, placed his hands on them and blessed them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Rich and the Kingdom of God
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As Jesus started on his way, a man ran up to him and fell on his knees before him. “Good teacher,” he asked, “what must I do to inherit eternal life?”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you call me good?”
    - type: text
      text: ' Jesus answered. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No one is good—except God alone.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'You know the commandments: ‘You shall not murder, you shall not commit adultery, you shall not steal, you shall not give false testimony, you shall not defraud, honor your father and mother.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 20:12-16; Deut. 5:16-20
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some Pharisees came and tested him by asking, “Is it lawful for a man to divorce his wife?”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Teacher,” he declared, “all these I have kept since I was a boy.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus looked at him and loved him. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “One thing you lack,”
    - type: text
      text: ' he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go, sell everything you have and give to the poor, and you will have treasure in heaven. Then come, follow me.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At this the man’s face fell. He went away sad, because he had great wealth.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus looked around and said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How hard it is for the rich to enter the kingdom of God!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The disciples were amazed at his words. But Jesus said again, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Children, how hard it is
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: is for those who trust in riches
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to enter the kingdom of God!
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is easier for a camel to go through the eye of a needle than for someone who is rich to enter the kingdom of God.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples were even more amazed, and said to each other, “Who then can be saved?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus looked at them and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “With man this is impossible, but not with God; all things are possible with God.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Peter spoke up, “We have left everything to follow you!”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Truly I tell you,”
    - type: text
      text: ' Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “no one who has left home or brothers or sisters or mother or father or children or fields for me and the gospel
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What did Moses command you?”
    - type: text
      text: ' he replied.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'will fail to receive a hundred times as much in this present age: homes, brothers, sisters, mothers, children and fields—along with persecutions—and in the age to come eternal life.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But many who are first will be last, and the last first.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts His Death a Third Time
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were on their way up to Jerusalem, with Jesus leading the way, and the disciples were astonished, while those who followed were afraid. Again he took the Twelve aside and told them what was going to happen to him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “We are going up to Jerusalem,”
    - type: text
      text: ' he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “and the Son of Man will be delivered over to the chief priests and the teachers of the law. They will condemn him to death and will hand him over to the Gentiles,
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who will mock him and spit on him, flog him and kill him. Three days later he will rise.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Request of James and John
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then James and John, the sons of Zebedee, came to him. “Teacher,” they said, “we want you to do for us whatever we ask.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you want me to do for you?”
    - type: text
      text: ' he asked.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They replied, “Let one of us sit at your right and the other at your left in your glory.”
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You don’t know what you are asking,”
    - type: text
      text: ' Jesus said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Can you drink the cup I drink or be baptized with the baptism I am baptized with?”
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We can,” they answered.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You will drink the cup I drink and be baptized with the baptism I am baptized with,
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said, “Moses permitted a man to write a certificate of divorce and send her away.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but to sit at my right or left is not for me to grant. These places belong to those for whom they have been prepared.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the ten heard about this, they became indignant with James and John. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus called them together and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You know that those who are regarded as rulers of the Gentiles lord it over them, and their high officials exercise authority over them.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Not so with you. Instead, whoever wants to become great among you must be your servant,
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and whoever wants to be first must be slave of all.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For even the Son of Man did not come to be served, but to serve, and to give his life as a ransom for many.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Blind Bartimaeus Receives His Sight
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they came to Jericho. As Jesus and his disciples, together with a large crowd, were leaving the city, a blind man, Bartimaeus (which means “son of Timaeus”), was sitting by the roadside begging. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he heard that it was Jesus of Nazareth, he began to shout, “Jesus, Son of David, have mercy on me!”
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Many rebuked him and told him to be quiet, but he shouted all the more, “Son of David, have mercy on me!”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus stopped and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Call him.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they called to the blind man, “Cheer up! On your feet! He’s calling you.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It was because your hearts were hard that Moses wrote you this law,”
    - type: text
      text: ' Jesus replied. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Throwing his cloak aside, he jumped to his feet and came to Jesus.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you want me to do for you?”
    - type: text
      text: ' Jesus asked him.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: The blind man said, “Rabbi, I want to see.”
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go,”
    - type: text
      text: ' said Jesus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “your faith has healed you.”
    - type: text
      text: ' Immediately he received his sight and followed Jesus along the road.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But at the beginning of creation God ‘made them male and female.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 1:27
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘For this reason a man will leave his father and mother and be united to his wife,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some early manuscripts do not have '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and be united to his wife.
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and the two will become one flesh.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 2:24
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So they are no longer two, but one flesh.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore what God has joined together, let no one separate.”
