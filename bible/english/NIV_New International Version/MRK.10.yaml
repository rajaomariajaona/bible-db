document_id: MRK.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Divorce
  - type: text
    content: Jesus then left that place and went into the region of Judea and across the Jordan. Again crowds of people came to him, and as was his custom, he taught them.
  '10':
  - type: text
    content: 'When they were in the house again, the disciples asked Jesus about this. '
  '11':
  - type: text
    content: 'He answered, '
  - type: text
    content: “Anyone who divorces his wife and marries another woman commits adultery against her.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And if she divorces her husband and marries another man, she commits adultery.”
  - type: heading
    content: The Little Children and Jesus
  '13':
  - type: text
    content: 'People were bringing little children to Jesus for him to place his hands on them, but the disciples rebuked them. '
  '14':
  - type: text
    content: 'When Jesus saw this, he was indignant. He said to them, '
  - type: text
    content: “Let the little children come to me, and do not hinder them, for the kingdom of God belongs to such as these.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Truly I tell you, anyone who will not receive the kingdom of God like a little child will never enter it.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: And he took the children in his arms, placed his hands on them and blessed them.
  - type: heading
    content: The Rich and the Kingdom of God
  '17':
  - type: text
    content: As Jesus started on his way, a man ran up to him and fell on his knees before him. “Good teacher,” he asked, “what must I do to inherit eternal life?”
  '18':
  - type: text
    content: ' '
  - type: text
    content: “Why do you call me good?”
  - type: text
    content: ' Jesus answered. '
  - type: text
    content: “No one is good—except God alone.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'You know the commandments: ‘You shall not murder, you shall not commit adultery, you shall not steal, you shall not give false testimony, you shall not defraud, honor your father and mother.’'
  - type: note
    content: Exodus 20:12-16; Deut. 5:16-20
  - type: text
    content: ”
  '2':
  - type: text
    content: Some Pharisees came and tested him by asking, “Is it lawful for a man to divorce his wife?”
  '20':
  - type: text
    content: “Teacher,” he declared, “all these I have kept since I was a boy.”
  '21':
  - type: text
    content: 'Jesus looked at him and loved him. '
  - type: text
    content: “One thing you lack,”
  - type: text
    content: ' he said. '
  - type: text
    content: “Go, sell everything you have and give to the poor, and you will have treasure in heaven. Then come, follow me.”
  '22':
  - type: text
    content: At this the man’s face fell. He went away sad, because he had great wealth.
  '23':
  - type: text
    content: 'Jesus looked around and said to his disciples, '
  - type: text
    content: “How hard it is for the rich to enter the kingdom of God!”
  '24':
  - type: text
    content: 'The disciples were amazed at his words. But Jesus said again, '
  - type: text
    content: “Children, how hard it is
  - type: note
    content: Some manuscripts is for those who trust in riches
  - type: text
    content: ' '
  - type: text
    content: to enter the kingdom of God!
  - type: text
    content: ' '
  '25':
  - type: text
    content: It is easier for a camel to go through the eye of a needle than for someone who is rich to enter the kingdom of God.”
  '26':
  - type: text
    content: The disciples were even more amazed, and said to each other, “Who then can be saved?”
  '27':
  - type: text
    content: 'Jesus looked at them and said, '
  - type: text
    content: “With man this is impossible, but not with God; all things are possible with God.”
  '28':
  - type: text
    content: Then Peter spoke up, “We have left everything to follow you!”
  '29':
  - type: text
    content: ' '
  - type: text
    content: “Truly I tell you,”
  - type: text
    content: ' Jesus replied, '
  - type: text
    content: “no one who has left home or brothers or sisters or mother or father or children or fields for me and the gospel
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: “What did Moses command you?”
  - type: text
    content: ' he replied.'
  '30':
  - type: text
    content: 'will fail to receive a hundred times as much in this present age: homes, brothers, sisters, mothers, children and fields—along with persecutions—and in the age to come eternal life.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: But many who are first will be last, and the last first.”
  - type: heading
    content: Jesus Predicts His Death a Third Time
  '32':
  - type: text
    content: 'They were on their way up to Jerusalem, with Jesus leading the way, and the disciples were astonished, while those who followed were afraid. Again he took the Twelve aside and told them what was going to happen to him. '
  '33':
  - type: text
    content: “We are going up to Jerusalem,”
  - type: text
    content: ' he said, '
  - type: text
    content: “and the Son of Man will be delivered over to the chief priests and the teachers of the law. They will condemn him to death and will hand him over to the Gentiles,
  - type: text
    content: ' '
  '34':
  - type: text
    content: who will mock him and spit on him, flog him and kill him. Three days later he will rise.”
  - type: heading
    content: The Request of James and John
  '35':
  - type: text
    content: Then James and John, the sons of Zebedee, came to him. “Teacher,” they said, “we want you to do for us whatever we ask.”
  '36':
  - type: text
    content: ' '
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: ' he asked.'
  '37':
  - type: text
    content: They replied, “Let one of us sit at your right and the other at your left in your glory.”
  '38':
  - type: text
    content: ' '
  - type: text
    content: “You don’t know what you are asking,”
  - type: text
    content: ' Jesus said. '
  - type: text
    content: “Can you drink the cup I drink or be baptized with the baptism I am baptized with?”
  '39':
  - type: text
    content: “We can,” they answered.
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “You will drink the cup I drink and be baptized with the baptism I am baptized with,
  - type: text
    content: ' '
  '4':
  - type: text
    content: They said, “Moses permitted a man to write a certificate of divorce and send her away.”
  '40':
  - type: text
    content: but to sit at my right or left is not for me to grant. These places belong to those for whom they have been prepared.”
  '41':
  - type: text
    content: 'When the ten heard about this, they became indignant with James and John. '
  '42':
  - type: text
    content: 'Jesus called them together and said, '
  - type: text
    content: “You know that those who are regarded as rulers of the Gentiles lord it over them, and their high officials exercise authority over them.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Not so with you. Instead, whoever wants to become great among you must be your servant,
  - type: text
    content: ' '
  '44':
  - type: text
    content: and whoever wants to be first must be slave of all.
  - type: text
    content: ' '
  '45':
  - type: text
    content: For even the Son of Man did not come to be served, but to serve, and to give his life as a ransom for many.”
  - type: heading
    content: Blind Bartimaeus Receives His Sight
  '46':
  - type: text
    content: 'Then they came to Jericho. As Jesus and his disciples, together with a large crowd, were leaving the city, a blind man, Bartimaeus (which means “son of Timaeus”), was sitting by the roadside begging. '
  '47':
  - type: text
    content: When he heard that it was Jesus of Nazareth, he began to shout, “Jesus, Son of David, have mercy on me!”
  '48':
  - type: text
    content: Many rebuked him and told him to be quiet, but he shouted all the more, “Son of David, have mercy on me!”
  '49':
  - type: text
    content: 'Jesus stopped and said, '
  - type: text
    content: “Call him.”
  - type: text
    content: 'So they called to the blind man, “Cheer up! On your feet! He’s calling you.” '
  '5':
  - type: text
    content: ' '
  - type: text
    content: “It was because your hearts were hard that Moses wrote you this law,”
  - type: text
    content: ' Jesus replied. '
  '50':
  - type: text
    content: Throwing his cloak aside, he jumped to his feet and came to Jesus.
  '51':
  - type: text
    content: ' '
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: ' Jesus asked him.'
  - type: text
    content: The blind man said, “Rabbi, I want to see.”
  '52':
  - type: text
    content: ' '
  - type: text
    content: “Go,”
  - type: text
    content: ' said Jesus, '
  - type: text
    content: “your faith has healed you.”
  - type: text
    content: ' Immediately he received his sight and followed Jesus along the road.'
  '6':
  - type: text
    content: “But at the beginning of creation God ‘made them male and female.’
  - type: note
    content: Gen. 1:27
  - type: text
    content: ' '
  '7':
  - type: text
    content: ‘For this reason a man will leave his father and mother and be united to his wife,
  - type: note
    content: Some early manuscripts do not have and be united to his wife.
  - type: text
    content: ' '
  '8':
  - type: text
    content: and the two will become one flesh.’
  - type: note
    content: Gen. 2:24
  - type: text
    content: ' '
  - type: text
    content: So they are no longer two, but one flesh.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Therefore what God has joined together, let no one separate.”
