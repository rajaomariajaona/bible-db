document_id: EZK.46,111
type_code: eng
verses:
  '1':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: The gate of the inner court facing east is to be shut on the six working days, but on the Sabbath day and on the day of the New Moon it is to be opened. '
  '10':
  - type: text
    content: 'The prince is to be among them, going in when they go in and going out when they go out. '
  '11':
  - type: text
    content: At the feasts and the appointed festivals, the grain offering is to be an ephah with a bull, an ephah with a ram, and with the lambs as much as he pleases, along with a hin of oil for each ephah.
  '12':
  - type: text
    content: '“ ‘When the prince provides a freewill offering to the '
  - type: text
    content: Lord
  - type: text
    content: —whether a burnt offering or fellowship offerings—the gate facing east is to be opened for him. He shall offer his burnt offering or his fellowship offerings as he does on the Sabbath day. Then he shall go out, and after he has gone out, the gate will be shut.
  '13':
  - type: text
    content: '“ ‘Every day you are to provide a year-old lamb without defect for a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '; morning by morning you shall provide it. '
  '14':
  - type: text
    content: You are also to provide with it morning by morning a grain offering, consisting of a sixth of an ephah
  - type: note
    content: That is, probably about 6 pounds or about 2.7 kilograms
  - type: text
    content: ' with a third of a hin'
  - type: note
    content: That is, about 1 1/2 quarts or about 1.3 liters
  - type: text
    content: ' of oil to moisten the flour. The presenting of this grain offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' is a lasting ordinance. '
  '15':
  - type: text
    content: So the lamb and the grain offering and the oil shall be provided morning by morning for a regular burnt offering.
  '16':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: If the prince makes a gift from his inheritance to one of his sons, it will also belong to his descendants; it is to be their property by inheritance. '
  '17':
  - type: text
    content: 'If, however, he makes a gift from his inheritance to one of his servants, the servant may keep it until the year of freedom; then it will revert to the prince. His inheritance belongs to his sons only; it is theirs. '
  '18':
  - type: text
    content: The prince must not take any of the inheritance of the people, driving them off their property. He is to give his sons their inheritance out of his own property, so that not one of my people will be separated from their property.’ ”
  '19':
  - type: text
    content: 'Then the man brought me through the entrance at the side of the gate to the sacred rooms facing north, which belonged to the priests, and showed me a place at the western end. '
  '2':
  - type: text
    content: 'The prince is to enter from the outside through the portico of the gateway and stand by the gatepost. The priests are to sacrifice his burnt offering and his fellowship offerings. He is to bow down in worship at the threshold of the gateway and then go out, but the gate will not be shut until evening. '
  '20':
  - type: text
    content: He said to me, “This is the place where the priests are to cook the guilt offering and the sin offering
  - type: note
    content: Or purification offering
  - type: text
    content: ' and bake the grain offering, to avoid bringing them into the outer court and consecrating the people.”'
  '21':
  - type: text
    content: 'He then brought me to the outer court and led me around to its four corners, and I saw in each corner another court. '
  '22':
  - type: text
    content: In the four corners of the outer court were enclosed
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' courts, forty cubits long and thirty cubits wide;'
  - type: note
    content: That is, about 70 feet long and 53 feet wide or about 21 meters long and 16 meters wide
  - type: text
    content: ' each of the courts in the four corners was the same size. '
  '23':
  - type: text
    content: 'Around the inside of each of the four courts was a ledge of stone, with places for fire built all around under the ledge. '
  '24':
  - type: text
    content: He said to me, “These are the kitchens where those who minister at the temple are to cook the sacrifices of the people.”
  '3':
  - type: text
    content: 'On the Sabbaths and New Moons the people of the land are to worship in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance of that gateway. '
  '4':
  - type: text
    content: 'The burnt offering the prince brings to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the Sabbath day is to be six male lambs and a ram, all without defect. '
  '5':
  - type: text
    content: The grain offering given with the ram is to be an ephah,
  - type: note
    content: That is, probably about 35 pounds or about 16 kilograms; also in verses 7 and 11
  - type: text
    content: ' and the grain offering with the lambs is to be as much as he pleases, along with a hin'
  - type: note
    content: That is, about 1 gallon or about 3.8 liters; also in verses 7 and 11
  - type: text
    content: ' of olive oil for each ephah. '
  '6':
  - type: text
    content: 'On the day of the New Moon he is to offer a young bull, six lambs and a ram, all without defect. '
  '7':
  - type: text
    content: 'He is to provide as a grain offering one ephah with the bull, one ephah with the ram, and with the lambs as much as he wants to give, along with a hin of oil for each ephah. '
  '8':
  - type: text
    content: When the prince enters, he is to go in through the portico of the gateway, and he is to come out the same way.
  '9':
  - type: text
    content: '“ ‘When the people of the land come before the '
  - type: text
    content: Lord
  - type: text
    content: ' at the appointed festivals, whoever enters by the north gate to worship is to go out the south gate; and whoever enters by the south gate is to go out the north gate. No one is to return through the gate by which they entered, but each is to go out the opposite gate. '
