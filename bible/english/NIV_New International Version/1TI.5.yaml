document_id: 1TI.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Widows, Elders and Slaves
  - type: text
    content: 'Do not rebuke an older man harshly, but exhort him as if he were your father. Treat younger men as brothers, '
  '10':
  - type: text
    content: and is well known for her good deeds, such as bringing up children, showing hospitality, washing the feet of the Lord’s people, helping those in trouble and devoting herself to all kinds of good deeds.
  '11':
  - type: text
    content: 'As for younger widows, do not put them on such a list. For when their sensual desires overcome their dedication to Christ, they want to marry. '
  '12':
  - type: text
    content: 'Thus they bring judgment on themselves, because they have broken their first pledge. '
  '13':
  - type: text
    content: 'Besides, they get into the habit of being idle and going about from house to house. And not only do they become idlers, but also busybodies who talk nonsense, saying things they ought not to. '
  '14':
  - type: text
    content: 'So I counsel younger widows to marry, to have children, to manage their homes and to give the enemy no opportunity for slander. '
  '15':
  - type: text
    content: Some have in fact already turned away to follow Satan.
  '16':
  - type: text
    content: If any woman who is a believer has widows in her care, she should continue to help them and not let the church be burdened with them, so that the church can help those widows who are really in need.
  '17':
  - type: text
    content: 'The elders who direct the affairs of the church well are worthy of double honor, especially those whose work is preaching and teaching. '
  '18':
  - type: text
    content: For Scripture says, “Do not muzzle an ox while it is treading out the grain,”
  - type: note
    content: Deut. 25:4
  - type: text
    content: ' and “The worker deserves his wages.”'
  - type: note
    content: Luke 10:7
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Do not entertain an accusation against an elder unless it is brought by two or three witnesses. '
  '2':
  - type: text
    content: older women as mothers, and younger women as sisters, with absolute purity.
  '20':
  - type: text
    content: 'But those elders who are sinning you are to reprove before everyone, so that the others may take warning. '
  '21':
  - type: text
    content: I charge you, in the sight of God and Christ Jesus and the elect angels, to keep these instructions without partiality, and to do nothing out of favoritism.
  '22':
  - type: text
    content: Do not be hasty in the laying on of hands, and do not share in the sins of others. Keep yourself pure.
  '23':
  - type: text
    content: Stop drinking only water, and use a little wine because of your stomach and your frequent illnesses.
  '24':
  - type: text
    content: 'The sins of some are obvious, reaching the place of judgment ahead of them; the sins of others trail behind them. '
  '25':
  - type: text
    content: In the same way, good deeds are obvious, and even those that are not obvious cannot remain hidden forever.
  '3':
  - type: text
    content: 'Give proper recognition to those widows who are really in need. '
  '4':
  - type: text
    content: 'But if a widow has children or grandchildren, these should learn first of all to put their religion into practice by caring for their own family and so repaying their parents and grandparents, for this is pleasing to God. '
  '5':
  - type: text
    content: 'The widow who is really in need and left all alone puts her hope in God and continues night and day to pray and to ask God for help. '
  '6':
  - type: text
    content: 'But the widow who lives for pleasure is dead even while she lives. '
  '7':
  - type: text
    content: 'Give the people these instructions, so that no one may be open to blame. '
  '8':
  - type: text
    content: Anyone who does not provide for their relatives, and especially for their own household, has denied the faith and is worse than an unbeliever.
  '9':
  - type: text
    content: 'No widow may be put on the list of widows unless she is over sixty, has been faithful to her husband, '
