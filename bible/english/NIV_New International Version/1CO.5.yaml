document_id: 1CO.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Dealing With a Case of Incest
  - type: text
    content: 'It is actually reported that there is sexual immorality among you, and of a kind that even pagans do not tolerate: A man is sleeping with his father’s wife. '
  '10':
  - type: text
    content: 'not at all meaning the people of this world who are immoral, or the greedy and swindlers, or idolaters. In that case you would have to leave this world. '
  '11':
  - type: text
    content: But now I am writing to you that you must not associate with anyone who claims to be a brother or sister
  - type: note
    content: The Greek word for brother or sister (adelphos) refers here to a believer, whether man or woman, as part of God’s family; also in 8:11, 13.
  - type: text
    content: ' but is sexually immoral or greedy, an idolater or slanderer, a drunkard or swindler. Do not even eat with such people.'
  '12':
  - type: text
    content: 'What business is it of mine to judge those outside the church? Are you not to judge those inside? '
  '13':
  - type: text
    content: God will judge those outside. “Expel the wicked person from among you.”
  - type: note
    content: Deut. 13:5; 17:7; 19:19; 21:21; 22:21,24; 24:7
  '2':
  - type: text
    content: 'And you are proud! Shouldn’t you rather have gone into mourning and have put out of your fellowship the man who has been doing this? '
  '3':
  - type: text
    content: 'For my part, even though I am not physically present, I am with you in spirit. As one who is present with you in this way, I have already passed judgment in the name of our Lord Jesus on the one who has been doing this. '
  '4':
  - type: text
    content: 'So when you are assembled and I am with you in spirit, and the power of our Lord Jesus is present, '
  '5':
  - type: text
    content: hand this man over to Satan for the destruction of the flesh,
  - type: note
    content: In contexts like this, the Greek word for flesh (sarx) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit.
  - type: note
    content: Or of his body
  - type: text
    content: ' so that his spirit may be saved on the day of the Lord.'
  '6':
  - type: text
    content: 'Your boasting is not good. Don’t you know that a little yeast leavens the whole batch of dough? '
  '7':
  - type: text
    content: 'Get rid of the old yeast, so that you may be a new unleavened batch—as you really are. For Christ, our Passover lamb, has been sacrificed. '
  '8':
  - type: text
    content: Therefore let us keep the Festival, not with the old bread leavened with malice and wickedness, but with the unleavened bread of sincerity and truth.
  '9':
  - type: text
    content: 'I wrote to you in my letter not to associate with sexually immoral people— '
