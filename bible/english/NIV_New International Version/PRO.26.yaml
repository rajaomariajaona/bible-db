document_id: PRO.26
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Like snow in summer or rain in harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: honor is not fitting for a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Like a fluttering sparrow or a darting swallow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an undeserved curse does not come to rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A whip for the horse, a bridle for the donkey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a rod for the backs of fools!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Do not answer a fool according to his folly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or you yourself will be just like him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Answer a fool according to his folly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or he will be wise in his own eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sending a message by the hands of a fool
- type: usfm
  marker: q2
  children:
  - type: text
    text: is like cutting off one’s feet or drinking poison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Like the useless legs of one who is lame
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a proverb in the mouth of a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Like tying a stone in a sling
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the giving of honor to a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Like a thornbush in a drunkard’s hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a proverb in the mouth of a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Like an archer who wounds at random
- type: usfm
  marker: q2
  children:
  - type: text
    text: is one who hires a fool or any passer-by.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: As a dog returns to its vomit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so fools repeat their folly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Do you see a person wise in their own eyes?
- type: usfm
  marker: q2
  children:
  - type: text
    text: There is more hope for a fool than for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A sluggard says, “There’s a lion in the road,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fierce lion roaming the streets!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: As a door turns on its hinges,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so a sluggard turns on his bed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A sluggard buries his hand in the dish;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is too lazy to bring it back to his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A sluggard is wiser in his own eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: than seven people who answer discreetly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Like one who grabs a stray dog by the ears
- type: usfm
  marker: q2
  children:
  - type: text
    text: is someone who rushes into a quarrel not their own.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Like a maniac shooting
- type: usfm
  marker: q2
  children:
  - type: text
    text: flaming arrows of death
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: is one who deceives their neighbor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and says, “I was only joking!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Without wood a fire goes out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: without a gossip a quarrel dies down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: As charcoal to embers and as wood to fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so is a quarrelsome person for kindling strife.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The words of a gossip are like choice morsels;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they go down to the inmost parts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Like a coating of silver dross on earthenware
- type: usfm
  marker: q2
  children:
  - type: text
    text: are fervent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: smooth
    marker-yv: yv-n
  - type: text
    text: ' lips with an evil heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Enemies disguise themselves with their lips,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but in their hearts they harbor deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Though their speech is charming, do not believe them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for seven abominations fill their hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Their malice may be concealed by deception,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but their wickedness will be exposed in the assembly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Whoever digs a pit will fall into it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if someone rolls a stone, it will roll back on them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A lying tongue hates those it hurts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a flattering mouth works ruin.
