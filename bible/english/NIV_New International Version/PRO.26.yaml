document_id: PRO.26,111
type_code: eng
verses:
  '1':
  - type: text
    content: Like snow in summer or rain in harvest,
  - type: text
    content: honor is not fitting for a fool.
  '10':
  - type: text
    content: Like an archer who wounds at random
  - type: text
    content: is one who hires a fool or any passer-by.
  '11':
  - type: text
    content: As a dog returns to its vomit,
  - type: text
    content: so fools repeat their folly.
  '12':
  - type: text
    content: Do you see a person wise in their own eyes?
  - type: text
    content: There is more hope for a fool than for them.
  '13':
  - type: text
    content: A sluggard says, “There’s a lion in the road,
  - type: text
    content: a fierce lion roaming the streets!”
  '14':
  - type: text
    content: As a door turns on its hinges,
  - type: text
    content: so a sluggard turns on his bed.
  '15':
  - type: text
    content: A sluggard buries his hand in the dish;
  - type: text
    content: he is too lazy to bring it back to his mouth.
  '16':
  - type: text
    content: A sluggard is wiser in his own eyes
  - type: text
    content: than seven people who answer discreetly.
  '17':
  - type: text
    content: Like one who grabs a stray dog by the ears
  - type: text
    content: is someone who rushes into a quarrel not their own.
  '18':
  - type: text
    content: Like a maniac shooting
  - type: text
    content: flaming arrows of death
  '19':
  - type: text
    content: is one who deceives their neighbor
  - type: text
    content: and says, “I was only joking!”
  '2':
  - type: text
    content: Like a fluttering sparrow or a darting swallow,
  - type: text
    content: an undeserved curse does not come to rest.
  '20':
  - type: text
    content: Without wood a fire goes out;
  - type: text
    content: without a gossip a quarrel dies down.
  '21':
  - type: text
    content: As charcoal to embers and as wood to fire,
  - type: text
    content: so is a quarrelsome person for kindling strife.
  '22':
  - type: text
    content: The words of a gossip are like choice morsels;
  - type: text
    content: they go down to the inmost parts.
  '23':
  - type: text
    content: Like a coating of silver dross on earthenware
  - type: text
    content: are fervent
  - type: note
    content: Hebrew; Septuagint smooth
  - type: text
    content: ' lips with an evil heart.'
  '24':
  - type: text
    content: Enemies disguise themselves with their lips,
  - type: text
    content: but in their hearts they harbor deceit.
  '25':
  - type: text
    content: Though their speech is charming, do not believe them,
  - type: text
    content: for seven abominations fill their hearts.
  '26':
  - type: text
    content: Their malice may be concealed by deception,
  - type: text
    content: but their wickedness will be exposed in the assembly.
  '27':
  - type: text
    content: Whoever digs a pit will fall into it;
  - type: text
    content: if someone rolls a stone, it will roll back on them.
  '28':
  - type: text
    content: A lying tongue hates those it hurts,
  - type: text
    content: and a flattering mouth works ruin.
  '3':
  - type: text
    content: A whip for the horse, a bridle for the donkey,
  - type: text
    content: and a rod for the backs of fools!
  '4':
  - type: text
    content: Do not answer a fool according to his folly,
  - type: text
    content: or you yourself will be just like him.
  '5':
  - type: text
    content: Answer a fool according to his folly,
  - type: text
    content: or he will be wise in his own eyes.
  '6':
  - type: text
    content: Sending a message by the hands of a fool
  - type: text
    content: is like cutting off one’s feet or drinking poison.
  '7':
  - type: text
    content: Like the useless legs of one who is lame
  - type: text
    content: is a proverb in the mouth of a fool.
  '8':
  - type: text
    content: Like tying a stone in a sling
  - type: text
    content: is the giving of honor to a fool.
  '9':
  - type: text
    content: Like a thornbush in a drunkard’s hand
  - type: text
    content: is a proverb in the mouth of a fool.
