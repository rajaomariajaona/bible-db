document_id: JHN.16,111
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: “All this I have told you so that you will not fall away.
  - type: text
    content: ' '
  '10':
  - type: text
    content: about righteousness, because I am going to the Father, where you can see me no longer;
  - type: text
    content: ' '
  '11':
  - type: text
    content: and about judgment, because the prince of this world now stands condemned.
  '12':
  - type: text
    content: ' '
  - type: text
    content: “I have much more to say to you, more than you can now bear.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But when he, the Spirit of truth, comes, he will guide you into all the truth. He will not speak on his own; he will speak only what he hears, and he will tell you what is yet to come.
  - type: text
    content: ' '
  '14':
  - type: text
    content: He will glorify me because it is from me that he will receive what he will make known to you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: All that belongs to the Father is mine. That is why I said the Spirit will receive from me what he will make known to you.”
  - type: heading
    content: The Disciples’ Grief Will Turn to Joy
  '16':
  - type: text
    content: 'Jesus went on to say, '
  - type: text
    content: “In a little while you will see me no more, and then after a little while you will see me.”
  '17':
  - type: text
    content: 'At this, some of his disciples said to one another, “What does he mean by saying, '
  - type: text
    content: ‘In a little while you will see me no more, and then after a little while you will see me,’
  - type: text
    content: ' and '
  - type: text
    content: ‘Because I am going to the Father’
  - type: text
    content: '?” '
  '18':
  - type: text
    content: 'They kept asking, “What does he mean by '
  - type: text
    content: ‘a little while’
  - type: text
    content: '? We don’t understand what he is saying.”'
  '19':
  - type: text
    content: 'Jesus saw that they wanted to ask him about this, so he said to them, '
  - type: text
    content: “Are you asking one another what I meant when I said, ‘In a little while you will see me no more, and then after a little while you will see me’?
  - type: text
    content: ' '
  '2':
  - type: text
    content: They will put you out of the synagogue; in fact, the time is coming when anyone who kills you will think they are offering a service to God.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Very truly I tell you, you will weep and mourn while the world rejoices. You will grieve, but your grief will turn to joy.
  - type: text
    content: ' '
  '21':
  - type: text
    content: A woman giving birth to a child has pain because her time has come; but when her baby is born she forgets the anguish because of her joy that a child is born into the world.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'So with you: Now is your time of grief, but I will see you again and you will rejoice, and no one will take away your joy.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: In that day you will no longer ask me anything. Very truly I tell you, my Father will give you whatever you ask in my name.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Until now you have not asked for anything in my name. Ask and you will receive, and your joy will be complete.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Though I have been speaking figuratively, a time is coming when I will no longer use this kind of language but will tell you plainly about my Father.
  - type: text
    content: ' '
  '26':
  - type: text
    content: In that day you will ask in my name. I am not saying that I will ask the Father on your behalf.
  - type: text
    content: ' '
  '27':
  - type: text
    content: No, the Father himself loves you because you have loved me and have believed that I came from God.
  - type: text
    content: ' '
  '28':
  - type: text
    content: I came from the Father and entered the world; now I am leaving the world and going back to the Father.”
  '29':
  - type: text
    content: 'Then Jesus’ disciples said, “Now you are speaking clearly and without figures of speech. '
  '3':
  - type: text
    content: They will do such things because they have not known the Father or me.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Now we can see that you know all things and that you do not even need to have anyone ask you questions. This makes us believe that you came from God.”
  '31':
  - type: text
    content: ' '
  - type: text
    content: “Do you now believe?”
  - type: text
    content: ' Jesus replied. '
  '32':
  - type: text
    content: “A time is coming and in fact has come when you will be scattered, each to your own home. You will leave me all alone. Yet I am not alone, for my Father is with me.
  '33':
  - type: text
    content: ' '
  - type: text
    content: “I have told you these things, so that in me you may have peace. In this world you will have trouble. But take heart! I have overcome the world.”
  '4':
  - type: text
    content: I have told you this, so that when their time comes you will remember that I warned you about them. I did not tell you this from the beginning because I was with you,
  - type: text
    content: ' '
  '5':
  - type: text
    content: but now I am going to him who sent me. None of you asks me, ‘Where are you going?’
  - type: text
    content: ' '
  '6':
  - type: text
    content: Rather, you are filled with grief because I have said these things.
  - type: text
    content: ' '
  '7':
  - type: text
    content: But very truly I tell you, it is for your good that I am going away. Unless I go away, the Advocate will not come to you; but if I go, I will send him to you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'When he comes, he will prove the world to be in the wrong about sin and righteousness and judgment:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: about sin, because people do not believe in me;
  - type: text
    content: ' '
