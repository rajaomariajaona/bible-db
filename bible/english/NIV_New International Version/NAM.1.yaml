document_id: NAM.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: A prophecy concerning Nineveh. The book of the vision of Nahum the Elkoshite.
  - type: heading
    content: The Lord’s Anger Against Nineveh
  '10':
  - type: text
    content: They will be entangled among thorns
  - type: text
    content: and drunk from their wine;
  - type: text
    content: they will be consumed like dry stubble.
  - type: note
    content: The meaning of the Hebrew for this verse is uncertain.
  '11':
  - type: text
    content: From you, Nineveh, has one come forth
  - type: text
    content: 'who plots evil against the '
  - type: text
    content: Lord
  - type: text
    content: and devises wicked plans.
  '12':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Although they have allies and are numerous,
  - type: text
    content: they will be destroyed and pass away.
  - type: text
    content: Although I have afflicted you, Judah,
  - type: text
    content: I will afflict you no more.
  '13':
  - type: text
    content: Now I will break their yoke from your neck
  - type: text
    content: and tear your shackles away.”
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has given a command concerning you, Nineveh:'
  - type: text
    content: “You will have no descendants to bear your name.
  - type: text
    content: I will destroy the images and idols
  - type: text
    content: that are in the temple of your gods.
  - type: text
    content: I will prepare your grave,
  - type: text
    content: for you are vile.”
  '15':
  - type: text
    content: Look, there on the mountains,
  - type: text
    content: the feet of one who brings good news,
  - type: text
    content: who proclaims peace!
  - type: text
    content: Celebrate your festivals, Judah,
  - type: text
    content: and fulfill your vows.
  - type: text
    content: No more will the wicked invade you;
  - type: text
    content: they will be completely destroyed.
  - type: note
    content: In Hebrew texts this verse (1:15) is numbered 2:1.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is a jealous and avenging God;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' takes vengeance and is filled with wrath.'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' takes vengeance on his foes'
  - type: text
    content: and vents his wrath against his enemies.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is slow to anger but great in power;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will not leave the guilty unpunished.'
  - type: text
    content: His way is in the whirlwind and the storm,
  - type: text
    content: and clouds are the dust of his feet.
  '4':
  - type: text
    content: He rebukes the sea and dries it up;
  - type: text
    content: he makes all the rivers run dry.
  - type: text
    content: Bashan and Carmel wither
  - type: text
    content: and the blossoms of Lebanon fade.
  '5':
  - type: text
    content: The mountains quake before him
  - type: text
    content: and the hills melt away.
  - type: text
    content: The earth trembles at his presence,
  - type: text
    content: the world and all who live in it.
  '6':
  - type: text
    content: Who can withstand his indignation?
  - type: text
    content: Who can endure his fierce anger?
  - type: text
    content: His wrath is poured out like fire;
  - type: text
    content: the rocks are shattered before him.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is good,'
  - type: text
    content: a refuge in times of trouble.
  - type: text
    content: He cares for those who trust in him,
  '8':
  - type: text
    content: but with an overwhelming flood
  - type: text
    content: he will make an end of Nineveh;
  - type: text
    content: he will pursue his foes into the realm of darkness.
  '9':
  - type: text
    content: 'Whatever they plot against the '
  - type: text
    content: Lord
  - type: text
    content: he will bring
  - type: note
    content: Or What do you foes plot against the Lord? / He will bring it
  - type: text
    content: ' to an end;'
  - type: text
    content: trouble will not come a second time.
