document_id: NAM.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A prophecy concerning Nineveh. The book of the vision of Nahum the Elkoshite.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Anger Against Nineveh
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They will be entangled among thorns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drunk from their wine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be consumed like dry stubble.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this verse is uncertain.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: From you, Nineveh, has one come forth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'who plots evil against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and devises wicked plans.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Although they have allies and are numerous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be destroyed and pass away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Although I have afflicted you, Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will afflict you no more.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Now I will break their yoke from your neck
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tear your shackles away.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given a command concerning you, Nineveh:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “You will have no descendants to bear your name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy the images and idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that are in the temple of your gods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will prepare your grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are vile.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Look, there on the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the feet of one who brings good news,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who proclaims peace!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celebrate your festivals, Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fulfill your vows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No more will the wicked invade you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be completely destroyed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts this verse (1:15) is numbered 2:1.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a jealous and avenging God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes vengeance and is filled with wrath.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' takes vengeance on his foes'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and vents his wrath against his enemies.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is slow to anger but great in power;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not leave the guilty unpunished.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His way is in the whirlwind and the storm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and clouds are the dust of his feet.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He rebukes the sea and dries it up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes all the rivers run dry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bashan and Carmel wither
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the blossoms of Lebanon fade.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The mountains quake before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the hills melt away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth trembles at his presence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the world and all who live in it.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Who can withstand his indignation?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can endure his fierce anger?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His wrath is poured out like fire;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rocks are shattered before him.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is good,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a refuge in times of trouble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He cares for those who trust in him,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: but with an overwhelming flood
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will make an end of Nineveh;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will pursue his foes into the realm of darkness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Whatever they plot against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will bring
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'What do you foes plot against the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: '? / He will bring it'
      marker-yv: yv-n
    - type: text
      text: ' to an end;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trouble will not come a second time.
