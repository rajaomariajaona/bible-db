type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 10Psalms 9 and 10 may originally have been a single acrostic poem in which alternating lines began with the successive letters of the Hebrew alphabet. In the Septuagint they constitute one psalm.
  - type: text
    content: 'Why, '
  - type: text
    content: Lord
  - type: text
    content: ', do you stand far off?'
  - type: text
    content: Why do you hide yourself in times of trouble?
  '10':
  - type: text
    content: His victims are crushed, they collapse;
  - type: text
    content: they fall under his strength.
  '11':
  - type: text
    content: He says to himself, “God will never notice;
  - type: text
    content: he covers his face and never sees.”
  '12':
  - type: text
    content: 'Arise, '
  - type: text
    content: Lord
  - type: text
    content: '! Lift up your hand, O God.'
  - type: text
    content: Do not forget the helpless.
  '13':
  - type: text
    content: Why does the wicked man revile God?
  - type: text
    content: Why does he say to himself,
  - type: text
    content: “He won’t call me to account”?
  '14':
  - type: text
    content: But you, God, see the trouble of the afflicted;
  - type: text
    content: you consider their grief and take it in hand.
  - type: text
    content: The victims commit themselves to you;
  - type: text
    content: you are the helper of the fatherless.
  '15':
  - type: text
    content: Break the arm of the wicked man;
  - type: text
    content: call the evildoer to account for his wickedness
  - type: text
    content: that would not otherwise be found out.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is King for ever and ever;'
  - type: text
    content: the nations will perish from his land.
  '17':
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', hear the desire of the afflicted;'
  - type: text
    content: you encourage them, and you listen to their cry,
  '18':
  - type: text
    content: defending the fatherless and the oppressed,
  - type: text
    content: so that mere earthly mortals
  - type: text
    content: will never again strike terror.
  '2':
  - type: text
    content: In his arrogance the wicked man hunts down the weak,
  - type: text
    content: who are caught in the schemes he devises.
  '3':
  - type: text
    content: He boasts about the cravings of his heart;
  - type: text
    content: 'he blesses the greedy and reviles the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: In his pride the wicked man does not seek him;
  - type: text
    content: in all his thoughts there is no room for God.
  '5':
  - type: text
    content: His ways are always prosperous;
  - type: text
    content: your laws are rejected by
  - type: note
    content: See Septuagint; Hebrew / they are haughty, and your laws are far from
  - type: text
    content: ' him;'
  - type: text
    content: he sneers at all his enemies.
  '6':
  - type: text
    content: He says to himself, “Nothing will ever shake me.”
  - type: text
    content: He swears, “No one will ever do me harm.”
  '7':
  - type: text
    content: His mouth is full of lies and threats;
  - type: text
    content: trouble and evil are under his tongue.
  '8':
  - type: text
    content: He lies in wait near the villages;
  - type: text
    content: from ambush he murders the innocent.
  - type: text
    content: His eyes watch in secret for his victims;
  '9':
  - type: text
    content: like a lion in cover he lies in wait.
  - type: text
    content: He lies in wait to catch the helpless;
  - type: text
    content: he catches the helpless and drags them off in his net.
