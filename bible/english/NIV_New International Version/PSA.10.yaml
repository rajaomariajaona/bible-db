document_id: PSA.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 10
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalms 9 and 10 may originally have been a single acrostic poem in which alternating lines began with the successive letters of the Hebrew alphabet. In the Septuagint they constitute one psalm.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Why, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do you stand far off?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you hide yourself in times of trouble?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: His victims are crushed, they collapse;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they fall under his strength.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He says to himself, “God will never notice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he covers his face and never sees.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Arise, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! Lift up your hand, O God.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not forget the helpless.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Why does the wicked man revile God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why does he say to himself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “He won’t call me to account”?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: But you, God, see the trouble of the afflicted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you consider their grief and take it in hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The victims commit themselves to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are the helper of the fatherless.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Break the arm of the wicked man;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: call the evildoer to account for his wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that would not otherwise be found out.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is King for ever and ever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the nations will perish from his land.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'You, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', hear the desire of the afflicted;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you encourage them, and you listen to their cry,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: defending the fatherless and the oppressed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that mere earthly mortals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never again strike terror.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: In his arrogance the wicked man hunts down the weak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who are caught in the schemes he devises.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He boasts about the cravings of his heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he blesses the greedy and reviles the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: In his pride the wicked man does not seek him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in all his thoughts there is no room for God.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: His ways are always prosperous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your laws are rejected by
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: / they are haughty, and your laws are far from
      marker-yv: yv-n
    - type: text
      text: ' him;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he sneers at all his enemies.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He says to himself, “Nothing will ever shake me.”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He swears, “No one will ever do me harm.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: His mouth is full of lies and threats;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trouble and evil are under his tongue.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He lies in wait near the villages;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from ambush he murders the innocent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His eyes watch in secret for his victims;
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: like a lion in cover he lies in wait.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lies in wait to catch the helpless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he catches the helpless and drags them off in his net.
