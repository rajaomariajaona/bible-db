document_id: PSA.125,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 125
  - type: text
    content: A song of ascents.
  - type: text
    content: 'Those who trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' are like Mount Zion,'
  - type: text
    content: which cannot be shaken but endures forever.
  '2':
  - type: text
    content: As the mountains surround Jerusalem,
  - type: text
    content: 'so the '
  - type: text
    content: Lord
  - type: text
    content: ' surrounds his people'
  - type: text
    content: both now and forevermore.
  '3':
  - type: text
    content: The scepter of the wicked will not remain
  - type: text
    content: over the land allotted to the righteous,
  - type: text
    content: for then the righteous might use
  - type: text
    content: their hands to do evil.
  '4':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', do good to those who are good,'
  - type: text
    content: to those who are upright in heart.
  '5':
  - type: text
    content: But those who turn to crooked ways
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will banish with the evildoers.'
  - type: text
    content: Peace be on Israel.
