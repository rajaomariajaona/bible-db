  - type: text
    text: Psalm 125
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of ascents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Those who trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are like Mount Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: which cannot be shaken but endures forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: As the mountains surround Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'so the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' surrounds his people'
- type: usfm
  marker: q2
  children:
  - type: text
    text: both now and forevermore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The scepter of the wicked will not remain
- type: usfm
  marker: q2
  children:
  - type: text
    text: over the land allotted to the righteous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for then the righteous might use
- type: usfm
  marker: q2
  children:
  - type: text
    text: their hands to do evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do good to those who are good,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who are upright in heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But those who turn to crooked ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will banish with the evildoers.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peace be on Israel.
