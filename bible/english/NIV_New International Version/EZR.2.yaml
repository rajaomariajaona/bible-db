  '59':
  - type: text
    content: 'The following came up from the towns of Tel Melah, Tel Harsha, Kerub, Addon and Immer, but they could not show that their families were descended from Israel:'
  '6':
  - type: text
    content: of Pahath-Moab (through the line of Jeshua and Joab)
  - type: text
    content: 2,812
  '60':
