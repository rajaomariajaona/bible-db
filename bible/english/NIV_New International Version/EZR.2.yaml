  - type: text
    content: Delaiah, Tobiah and Nekoda
  - type: text
    content: '652'
  '61':
  - type: text
    content: 'And from among the priests:'
  - type: text
    content: The descendants of
  - type: text
    content: Hobaiah, Hakkoz and Barzillai (a man who had married a daughter of Barzillai the Gileadite and was called by that name).
  '62':
  - type: text
    content: 'These searched for their family records, but they could not find them and so were excluded from the priesthood as unclean. '
  '63':
  - type: text
    content: The governor ordered them not to eat any of the most sacred food until there was a priest ministering with the Urim and Thummim.
  '64':
  - type: text
    content: 'The whole company numbered 42,360, '
  '65':
  - type: text
    content: 'besides their 7,337 male and female slaves; and they also had 200 male and female singers. '
  '66':
  - type: text
    content: 'They had 736 horses, 245 mules, '
  '67':
  - type: text
    content: 435 camels and 6,720 donkeys.
  '68':
  - type: text
    content: 'When they arrived at the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem, some of the heads of the families gave freewill offerings toward the rebuilding of the house of God on its site. '
  '69':
  - type: text
    content: According to their ability they gave to the treasury for this work 61,000 darics
  - type: note
    content: That is, about 1,100 pounds or about 500 kilograms
  - type: text
    content: ' of gold, 5,000 minas'
  - type: note
    content: That is, about 3 tons or about 2.8 metric tons
  - type: text
    content: ' of silver and 100 priestly garments.'
  '7':
  - type: text
    content: of Elam
  - type: text
    content: 1,254
  '70':
  - type: text
    content: The priests, the Levites, the musicians, the gatekeepers and the temple servants settled in their own towns, along with some of the other people, and the rest of the Israelites settled in their towns.
