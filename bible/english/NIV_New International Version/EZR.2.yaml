    text: of Pahath-Moab (through the line of Jeshua and Joab)2,812
  '60':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: The descendants ofDelaiah, Tobiah and Nekoda652
  '61':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'And from among the priests:'
  - type: text
    text: The descendants ofHobaiah, Hakkoz and Barzillai (a man who had married a daughter of Barzillai the Gileadite and was called by that name).
  '62':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'These searched for their family records, but they could not find them and so were excluded from the priesthood as unclean. '
  '63':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: The governor ordered them not to eat any of the most sacred food until there was a priest ministering with the Urim and Thummim.
  '64':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'The whole company numbered 42,360, '
  '65':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'besides their 7,337 male and female slaves; and they also had 200 male and female singers. '
  '66':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'They had 736 horses, 245 mules, '
  '67':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 435 camels and 6,720 donkeys.
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: 'When they arrived at the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in Jerusalem, some of the heads of the families gave freewill offerings toward the rebuilding of the house of God on its site. '
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: According to their ability they gave to the treasury for this work 61,000 darics
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:69 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 1,100 pounds or about 500 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of gold, 5,000 minas'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:69 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 3 tons or about 2.8 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of silver and 100 priestly garments.'
