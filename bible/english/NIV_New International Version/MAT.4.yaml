document_id: MAT.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Tested in the Wilderness
  - type: text
    content: Then Jesus was led by the Spirit into the wilderness to be tempted
  - type: note
    content: The Greek for tempted can also mean tested.
  - type: text
    content: ' by the devil. '
  '10':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“Away from me, Satan! For it is written: ‘Worship the Lord your God, and serve him only.’'
  - type: note
    content: Deut. 6:13
  - type: text
    content: ”
  '11':
  - type: text
    content: Then the devil left him, and angels came and attended him.
  - type: heading
    content: Jesus Begins to Preach
  '12':
  - type: text
    content: 'When Jesus heard that John had been put in prison, he withdrew to Galilee. '
  '13':
  - type: text
    content: 'Leaving Nazareth, he went and lived in Capernaum, which was by the lake in the area of Zebulun and Naphtali— '
  '14':
  - type: text
    content: 'to fulfill what was said through the prophet Isaiah:'
  '15':
  - type: text
    content: “Land of Zebulun and land of Naphtali,
  - type: text
    content: the Way of the Sea, beyond the Jordan,
  - type: text
    content: Galilee of the Gentiles—
  '16':
  - type: text
    content: the people living in darkness
  - type: text
    content: have seen a great light;
  - type: text
    content: on those living in the land of the shadow of death
  - type: text
    content: a light has dawned.”
  - type: note
    content: Isaiah 9:1,2
  '17':
  - type: text
    content: 'From that time on Jesus began to preach, '
  - type: text
    content: “Repent, for the kingdom of heaven has come near.”
  - type: heading
    content: Jesus Calls His First Disciples
  '18':
  - type: text
    content: 'As Jesus was walking beside the Sea of Galilee, he saw two brothers, Simon called Peter and his brother Andrew. They were casting a net into the lake, for they were fishermen. '
  '19':
  - type: text
    content: “Come, follow me,”
  - type: text
    content: ' Jesus said, '
  - type: text
    content: “and I will send you out to fish for people.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'After fasting forty days and forty nights, he was hungry. '
  '20':
  - type: text
    content: At once they left their nets and followed him.
  '21':
  - type: text
    content: 'Going on from there, he saw two other brothers, James son of Zebedee and his brother John. They were in a boat with their father Zebedee, preparing their nets. Jesus called them, '
  '22':
  - type: text
    content: and immediately they left the boat and their father and followed him.
  - type: heading
    content: Jesus Heals the Sick
  '23':
  - type: text
    content: 'Jesus went throughout Galilee, teaching in their synagogues, proclaiming the good news of the kingdom, and healing every disease and sickness among the people. '
  '24':
  - type: text
    content: 'News about him spread all over Syria, and people brought to him all who were ill with various diseases, those suffering severe pain, the demon-possessed, those having seizures, and the paralyzed; and he healed them. '
  '25':
  - type: text
    content: Large crowds from Galilee, the Decapolis,
  - type: note
    content: That is, the Ten Cities
  - type: text
    content: ' Jerusalem, Judea and the region across the Jordan followed him.'
  '3':
  - type: text
    content: The tempter came to him and said, “If you are the Son of God, tell these stones to become bread.”
  '4':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“It is written: ‘Man shall not live on bread alone, but on every word that comes from the mouth of God.’'
  - type: note
    content: Deut. 8:3
  - type: text
    content: ”
  '5':
  - type: text
    content: 'Then the devil took him to the holy city and had him stand on the highest point of the temple. '
  '6':
  - type: text
    content: '“If you are the Son of God,” he said, “throw yourself down. For it is written:'
  - type: text
    content: “ ‘He will command his angels concerning you,
  - type: text
    content: and they will lift you up in their hands,
  - type: text
    content: so that you will not strike your foot against a stone.’
  - type: note
    content: Psalm 91:11,12
  - type: text
    content: ”
  '7':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“It is also written: ‘Do not put the Lord your God to the test.’'
  - type: note
    content: Deut. 6:16
  - type: text
    content: ”
  '8':
  - type: text
    content: 'Again, the devil took him to a very high mountain and showed him all the kingdoms of the world and their splendor. '
  '9':
  - type: text
    content: “All this I will give you,” he said, “if you will bow down and worship me.”
