document_id: MAT.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Tested in the Wilderness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Jesus was led by the Spirit into the wilderness to be tempted
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tempted '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'can also mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tested.
      marker-yv: yv-n
    - type: text
      text: ' by the devil. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Away from me, Satan! For it is written: ‘Worship the Lord your God, and serve him only.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 6:13
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the devil left him, and angels came and attended him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Begins to Preach
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus heard that John had been put in prison, he withdrew to Galilee. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Leaving Nazareth, he went and lived in Capernaum, which was by the lake in the area of Zebulun and Naphtali— '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to fulfill what was said through the prophet Isaiah:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Land of Zebulun and land of Naphtali,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Way of the Sea, beyond the Jordan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Galilee of the Gentiles—
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the people living in darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have seen a great light;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on those living in the land of the shadow of death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a light has dawned.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 9:1,2
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From that time on Jesus began to preach, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Repent, for the kingdom of heaven has come near.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Calls His First Disciples
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus was walking beside the Sea of Galilee, he saw two brothers, Simon called Peter and his brother Andrew. They were casting a net into the lake, for they were fishermen. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come, follow me,”
    - type: text
      text: ' Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “and I will send you out to fish for people.”
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After fasting forty days and forty nights, he was hungry. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At once they left their nets and followed him.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Going on from there, he saw two other brothers, James son of Zebedee and his brother John. They were in a boat with their father Zebedee, preparing their nets. Jesus called them, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and immediately they left the boat and their father and followed him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals the Sick
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus went throughout Galilee, teaching in their synagogues, proclaiming the good news of the kingdom, and healing every disease and sickness among the people. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'News about him spread all over Syria, and people brought to him all who were ill with various diseases, those suffering severe pain, the demon-possessed, those having seizures, and the paralyzed; and he healed them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Large crowds from Galilee, the Decapolis,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the Ten Cities
      marker-yv: yv-n
    - type: text
      text: ' Jerusalem, Judea and the region across the Jordan followed him.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The tempter came to him and said, “If you are the Son of God, tell these stones to become bread.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“It is written: ‘Man shall not live on bread alone, but on every word that comes from the mouth of God.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 8:3
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the devil took him to the holy city and had him stand on the highest point of the temple. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If you are the Son of God,” he said, “throw yourself down. For it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘He will command his angels concerning you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will lift you up in their hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that you will not strike your foot against a stone.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 91:11,12
      marker-yv: yv-n
    - type: text
      text: ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“It is also written: ‘Do not put the Lord your God to the test.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 6:16
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again, the devil took him to a very high mountain and showed him all the kingdoms of the world and their splendor. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “All this I will give you,” he said, “if you will bow down and worship me.”
