document_id: GEN.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: Thus the heavens and the earth were completed in all their vast array.
  '10':
  - type: text
    content: 'A river watering the garden flowed from Eden; from there it was separated into four headwaters. '
  '11':
  - type: text
    content: 'The name of the first is the Pishon; it winds through the entire land of Havilah, where there is gold. '
  '12':
  - type: text
    content: (The gold of that land is good; aromatic resin
  - type: note
    content: Or good; pearls
  - type: text
    content: ' and onyx are also there.) '
  '13':
  - type: text
    content: The name of the second river is the Gihon; it winds through the entire land of Cush.
  - type: note
    content: Possibly southeast Mesopotamia
  - type: text
    content: ' '
  '14':
  - type: text
    content: The name of the third river is the Tigris; it runs along the east side of Ashur. And the fourth river is the Euphrates.
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' God took the man and put him in the Garden of Eden to work it and take care of it. '
  '16':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' God commanded the man, “You are free to eat from any tree in the garden; '
  '17':
  - type: text
    content: but you must not eat from the tree of the knowledge of good and evil, for when you eat from it you will certainly die.”
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' God said, “It is not good for the man to be alone. I will make a helper suitable for him.”'
  '19':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' God had formed out of the ground all the wild animals and all the birds in the sky. He brought them to the man to see what he would name them; and whatever the man called each living creature, that was its name. '
  '2':
  - type: text
    content: 'By the seventh day God had finished the work he had been doing; so on the seventh day he rested from all his work. '
  '20':
  - type: text
    content: So the man gave names to all the livestock, the birds in the sky and all the wild animals.
  - type: text
    content: But for Adam
  - type: note
    content: Or the man
  - type: text
    content: ' no suitable helper was found. '
  '21':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' God caused the man to fall into a deep sleep; and while he was sleeping, he took one of the man’s ribs'
  - type: note
    content: Or took part of the man’s side
  - type: text
    content: ' and then closed up the place with flesh. '
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God made a woman from the rib'
  - type: note
    content: Or part
  - type: text
    content: ' he had taken out of the man, and he brought her to the man.'
  '23':
  - type: text
    content: The man said,
  - type: text
    content: “This is now bone of my bones
  - type: text
    content: and flesh of my flesh;
  - type: text
    content: she shall be called ‘woman,’
  - type: text
    content: for she was taken out of man.”
  '24':
  - type: text
    content: That is why a man leaves his father and mother and is united to his wife, and they become one flesh.
  '25':
  - type: text
    content: Adam and his wife were both naked, and they felt no shame.
  '3':
  - type: text
    content: Then God blessed the seventh day and made it holy, because on it he rested from all the work of creating that he had done.
  - type: heading
    content: Adam and Eve
  '4':
  - type: text
    content: 'This is the account of the heavens and the earth when they were created, when the '
  - type: text
    content: Lord
  - type: text
    content: ' God made the earth and the heavens.'
  '5':
  - type: text
    content: Now no shrub had yet appeared on the earth
  - type: note
    content: Or land; also in verse 6
  - type: text
    content: ' and no plant had yet sprung up, for the '
  - type: text
    content: Lord
  - type: text
    content: ' God had not sent rain on the earth and there was no one to work the ground, '
  '6':
  - type: text
    content: but streams
  - type: note
    content: Or mist
  - type: text
    content: ' came up from the earth and watered the whole surface of the ground. '
  '7':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God formed a man'
  - type: note
    content: The Hebrew for man (adam) sounds like and may be related to the Hebrew for ground (adamah); it is also the name Adam (see verse 20).
  - type: text
    content: ' from the dust of the ground and breathed into his nostrils the breath of life, and the man became a living being.'
  '8':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' God had planted a garden in the east, in Eden; and there he put the man he had formed. '
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' God made all kinds of trees grow out of the ground—trees that were pleasing to the eye and good for food. In the middle of the garden were the tree of life and the tree of the knowledge of good and evil.'
