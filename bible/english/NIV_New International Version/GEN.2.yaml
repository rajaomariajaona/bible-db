document_id: GEN.2
type_code: eng
segments:
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Thus the heavens and the earth were completed in all their vast array.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'By the seventh day God had finished the work he had been doing; so on the seventh day he rested from all his work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then God blessed the seventh day and made it holy, because on it he rested from all the work of creating that he had done.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adam and Eve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This is the account of the heavens and the earth when they were created, when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God made the earth and the heavens.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Now no shrub had yet appeared on the earth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: land
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 6
    marker-yv: yv-n
  - type: text
    text: ' and no plant had yet sprung up, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God had not sent rain on the earth and there was no one to work the ground, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: but streams
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mist
    marker-yv: yv-n
  - type: text
    text: ' came up from the earth and watered the whole surface of the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God formed a man'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'man '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: tl
        children:
        - type: text
          text: (adam)
      - type: text
        text: ' sounds like and may be related to the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ground '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: tl
        children:
        - type: text
          text: (adamah)
      - type: text
        text: '; it is also the name '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Adam '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (see verse 20).
    marker-yv: yv-n
  - type: text
    text: ' from the dust of the ground and breathed into his nostrils the breath of life, and the man became a living being.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God had planted a garden in the east, in Eden; and there he put the man he had formed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God made all kinds of trees grow out of the ground—trees that were pleasing to the eye and good for food. In the middle of the garden were the tree of life and the tree of the knowledge of good and evil.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A river watering the garden flowed from Eden; from there it was separated into four headwaters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The name of the first is the Pishon; it winds through the entire land of Havilah, where there is gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: (The gold of that land is good; aromatic resin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: good; pearls
    marker-yv: yv-n
  - type: text
    text: ' and onyx are also there.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The name of the second river is the Gihon; it winds through the entire land of Cush.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly southeast Mesopotamia
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The name of the third river is the Tigris; it runs along the east side of Ashur. And the fourth river is the Euphrates.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God took the man and put him in the Garden of Eden to work it and take care of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God commanded the man, “You are free to eat from any tree in the garden; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: but you must not eat from the tree of the knowledge of good and evil, for when you eat from it you will certainly die.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God said, “It is not good for the man to be alone. I will make a helper suitable for him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God had formed out of the ground all the wild animals and all the birds in the sky. He brought them to the man to see what he would name them; and whatever the man called each living creature, that was its name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So the man gave names to all the livestock, the birds in the sky and all the wild animals.
- type: usfm
  marker: p
  children:
  - type: text
    text: But for Adam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the man
    marker-yv: yv-n
  - type: text
    text: ' no suitable helper was found. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God caused the man to fall into a deep sleep; and while he was sleeping, he took one of the man’s ribs'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: took part of the man’s side
    marker-yv: yv-n
  - type: text
    text: ' and then closed up the place with flesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God made a woman from the rib'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: part
    marker-yv: yv-n
  - type: text
    text: ' he had taken out of the man, and he brought her to the man.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The man said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “This is now bone of my bones
- type: usfm
  marker: q2
  children:
  - type: text
    text: and flesh of my flesh;
- type: usfm
  marker: q1
  children:
  - type: text
    text: she shall be called ‘woman,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: for she was taken out of man.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: That is why a man leaves his father and mother and is united to his wife, and they become one flesh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Adam and his wife were both naked, and they felt no shame.
