document_id: JOB.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Indeed, I know that this is true.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But how can mere mortals prove their innocence before God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Though they wished to dispute with him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they could not answer him one time out of a thousand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: His wisdom is profound, his power is vast.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has resisted him and come out unscathed?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He moves mountains without their knowing it
- type: usfm
  marker: q2
  children:
  - type: text
    text: and overturns them in his anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He shakes the earth from its place
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes its pillars tremble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He speaks to the sun and it does not shine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he seals off the light of the stars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He alone stretches out the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and treads on the waves of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He is the Maker of the Bear
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of Leo
    marker-yv: yv-n
  - type: text
    text: ' and Orion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Pleiades and the constellations of the south.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He performs wonders that cannot be fathomed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: miracles that cannot be counted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When he passes me, I cannot see him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he goes by, I cannot perceive him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If he snatches away, who can stop him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can say to him, ‘What are you doing?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: God does not restrain his anger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the cohorts of Rahab cowered at his feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “How then can I dispute with him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How can I find words to argue with him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Though I were innocent, I could not answer him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could only plead with my Judge for mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Even if I summoned him and he responded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I do not believe he would give me a hearing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He would crush me with a storm
- type: usfm
  marker: q2
  children:
  - type: text
    text: and multiply my wounds for no reason.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He would not let me catch my breath
- type: usfm
  marker: q2
  children:
  - type: text
    text: but would overwhelm me with misery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: If it is a matter of strength, he is mighty!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And if it is a matter of justice, who can challenge him
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Even if I were innocent, my mouth would condemn me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I were blameless, it would pronounce me guilty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Although I am blameless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have no concern for myself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I despise my own life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: It is all the same; that is why I say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘He destroys both the blameless and the wicked.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When a scourge brings sudden death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he mocks the despair of the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When a land falls into the hands of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he blindfolds its judges.
- type: usfm
  marker: q2
  children:
  - type: text
    text: If it is not he, then who is it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “My days are swifter than a runner;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they fly away without a glimpse of joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They skim past like boats of papyrus,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like eagles swooping down on their prey.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: If I say, ‘I will forget my complaint,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will change my expression, and smile,’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I still dread all my sufferings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I know you will not hold me innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Since I am already found guilty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: why should I struggle in vain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Even if I washed myself with soap
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my hands with cleansing powder,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: you would plunge me into a slime pit
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that even my clothes would detest me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “He is not a mere mortal like me that I might answer him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that we might confront each other in court.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: If only there were someone to mediate between us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: someone to bring us together,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: someone to remove God’s rod from me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that his terror would frighten me no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Then I would speak up without fear of him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but as it now stands with me, I cannot.
