document_id: JOB.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job
  - type: text
    content: 'Then Job replied:'
  '10':
  - type: text
    content: He performs wonders that cannot be fathomed,
  - type: text
    content: miracles that cannot be counted.
  '11':
  - type: text
    content: When he passes me, I cannot see him;
  - type: text
    content: when he goes by, I cannot perceive him.
  '12':
  - type: text
    content: If he snatches away, who can stop him?
  - type: text
    content: Who can say to him, ‘What are you doing?’
  '13':
  - type: text
    content: God does not restrain his anger;
  - type: text
    content: even the cohorts of Rahab cowered at his feet.
  '14':
  - type: text
    content: “How then can I dispute with him?
  - type: text
    content: How can I find words to argue with him?
  '15':
  - type: text
    content: Though I were innocent, I could not answer him;
  - type: text
    content: I could only plead with my Judge for mercy.
  '16':
  - type: text
    content: Even if I summoned him and he responded,
  - type: text
    content: I do not believe he would give me a hearing.
  '17':
  - type: text
    content: He would crush me with a storm
  - type: text
    content: and multiply my wounds for no reason.
  '18':
  - type: text
    content: He would not let me catch my breath
  - type: text
    content: but would overwhelm me with misery.
  '19':
  - type: text
    content: If it is a matter of strength, he is mighty!
  - type: text
    content: And if it is a matter of justice, who can challenge him
  - type: note
    content: See Septuagint; Hebrew me.
  - type: text
    content: '?'
  '2':
  - type: text
    content: “Indeed, I know that this is true.
  - type: text
    content: But how can mere mortals prove their innocence before God?
  '20':
  - type: text
    content: Even if I were innocent, my mouth would condemn me;
  - type: text
    content: if I were blameless, it would pronounce me guilty.
  '21':
  - type: text
    content: “Although I am blameless,
  - type: text
    content: I have no concern for myself;
  - type: text
    content: I despise my own life.
  '22':
  - type: text
    content: It is all the same; that is why I say,
  - type: text
    content: ‘He destroys both the blameless and the wicked.’
  '23':
  - type: text
    content: When a scourge brings sudden death,
  - type: text
    content: he mocks the despair of the innocent.
  '24':
  - type: text
    content: When a land falls into the hands of the wicked,
  - type: text
    content: he blindfolds its judges.
  - type: text
    content: If it is not he, then who is it?
  '25':
  - type: text
    content: “My days are swifter than a runner;
  - type: text
    content: they fly away without a glimpse of joy.
  '26':
  - type: text
    content: They skim past like boats of papyrus,
  - type: text
    content: like eagles swooping down on their prey.
  '27':
  - type: text
    content: If I say, ‘I will forget my complaint,
  - type: text
    content: I will change my expression, and smile,’
  '28':
  - type: text
    content: I still dread all my sufferings,
  - type: text
    content: for I know you will not hold me innocent.
  '29':
  - type: text
    content: Since I am already found guilty,
  - type: text
    content: why should I struggle in vain?
  '3':
  - type: text
    content: Though they wished to dispute with him,
  - type: text
    content: they could not answer him one time out of a thousand.
  '30':
  - type: text
    content: Even if I washed myself with soap
  - type: text
    content: and my hands with cleansing powder,
  '31':
  - type: text
    content: you would plunge me into a slime pit
  - type: text
    content: so that even my clothes would detest me.
  '32':
  - type: text
    content: “He is not a mere mortal like me that I might answer him,
  - type: text
    content: that we might confront each other in court.
  '33':
  - type: text
    content: If only there were someone to mediate between us,
  - type: text
    content: someone to bring us together,
  '34':
  - type: text
    content: someone to remove God’s rod from me,
  - type: text
    content: so that his terror would frighten me no more.
  '35':
  - type: text
    content: Then I would speak up without fear of him,
  - type: text
    content: but as it now stands with me, I cannot.
  '4':
  - type: text
    content: His wisdom is profound, his power is vast.
  - type: text
    content: Who has resisted him and come out unscathed?
  '5':
  - type: text
    content: He moves mountains without their knowing it
  - type: text
    content: and overturns them in his anger.
  '6':
  - type: text
    content: He shakes the earth from its place
  - type: text
    content: and makes its pillars tremble.
  '7':
  - type: text
    content: He speaks to the sun and it does not shine;
  - type: text
    content: he seals off the light of the stars.
  '8':
  - type: text
    content: He alone stretches out the heavens
  - type: text
    content: and treads on the waves of the sea.
  '9':
  - type: text
    content: He is the Maker of the Bear
  - type: note
    content: Or of Leo
  - type: text
    content: ' and Orion,'
  - type: text
    content: the Pleiades and the constellations of the south.
