document_id: 2CH.23,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'In the seventh year Jehoiada showed his strength. He made a covenant with the commanders of units of a hundred: Azariah son of Jeroham, Ishmael son of Jehohanan, Azariah son of Obed, Maaseiah son of Adaiah, and Elishaphat son of Zikri. '
  '10':
  - type: text
    content: He stationed all the men, each with his weapon in his hand, around the king—near the altar and the temple, from the south side to the north side of the temple.
  '11':
  - type: text
    content: Jehoiada and his sons brought out the king’s son and put the crown on him; they presented him with a copy of the covenant and proclaimed him king. They anointed him and shouted, “Long live the king!”
  '12':
  - type: text
    content: 'When Athaliah heard the noise of the people running and cheering the king, she went to them at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: She looked, and there was the king, standing by his pillar at the entrance. The officers and the trumpeters were beside the king, and all the people of the land were rejoicing and blowing trumpets, and musicians with their instruments were leading the praises. Then Athaliah tore her robes and shouted, “Treason! Treason!”
  '14':
  - type: text
    content: 'Jehoiada the priest sent out the commanders of units of a hundred, who were in charge of the troops, and said to them: “Bring her out between the ranks'
  - type: note
    content: Or out from the precincts
  - type: text
    content: ' and put to the sword anyone who follows her.” For the priest had said, “Do not put her to death at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '15':
  - type: text
    content: So they seized her as she reached the entrance of the Horse Gate on the palace grounds, and there they put her to death.
  '16':
  - type: text
    content: Jehoiada then made a covenant that he, the people and the king
  - type: note
    content: Or covenant between the Lord and the people and the king that they (see 2 Kings 11:17)
  - type: text
    content: ' would be the '
  - type: text
    content: Lord
  - type: text
    content: '’s people. '
  '17':
  - type: text
    content: All the people went to the temple of Baal and tore it down. They smashed the altars and idols and killed Mattan the priest of Baal in front of the altars.
  '18':
  - type: text
    content: 'Then Jehoiada placed the oversight of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in the hands of the Levitical priests, to whom David had made assignments in the temple, to present the burnt offerings of the '
  - type: text
    content: Lord
  - type: text
    content: ' as written in the Law of Moses, with rejoicing and singing, as David had ordered. '
  '19':
  - type: text
    content: 'He also stationed gatekeepers at the gates of the '
  - type: text
    content: Lord
  - type: text
    content: ’s temple so that no one who was in any way unclean might enter.
  '2':
  - type: text
    content: 'They went throughout Judah and gathered the Levites and the heads of Israelite families from all the towns. When they came to Jerusalem, '
  '20':
  - type: text
    content: 'He took with him the commanders of hundreds, the nobles, the rulers of the people and all the people of the land and brought the king down from the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. They went into the palace through the Upper Gate and seated the king on the royal throne. '
  '21':
  - type: text
    content: All the people of the land rejoiced, and the city was calm, because Athaliah had been slain with the sword.
  '3':
  - type: text
    content: the whole assembly made a covenant with the king at the temple of God.
  - type: text
    content: 'Jehoiada said to them, “The king’s son shall reign, as the '
  - type: text
    content: Lord
  - type: text
    content: ' promised concerning the descendants of David. '
  '4':
  - type: text
    content: 'Now this is what you are to do: A third of you priests and Levites who are going on duty on the Sabbath are to keep watch at the doors, '
  '5':
  - type: text
    content: 'a third of you at the royal palace and a third at the Foundation Gate, and all the others are to be in the courtyards of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'No one is to enter the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' except the priests and Levites on duty; they may enter because they are consecrated, but all the others are to observe the '
  - type: text
    content: Lord
  - type: text
    content: ’s command not to enter.
  - type: note
    content: Or are to stand guard where the Lord has assigned them
  - type: text
    content: ' '
  '7':
  - type: text
    content: The Levites are to station themselves around the king, each with weapon in hand. Anyone who enters the temple is to be put to death. Stay close to the king wherever he goes.”
  '8':
  - type: text
    content: 'The Levites and all the men of Judah did just as Jehoiada the priest ordered. Each one took his men—those who were going on duty on the Sabbath and those who were going off duty—for Jehoiada the priest had not released any of the divisions. '
  '9':
  - type: text
    content: 'Then he gave the commanders of units of a hundred the spears and the large and small shields that had belonged to King David and that were in the temple of God. '
