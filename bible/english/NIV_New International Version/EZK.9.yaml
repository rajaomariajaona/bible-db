document_id: EZK.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on the Idolaters
  - type: text
    content: 'Then I heard him call out in a loud voice, “Bring near those who are appointed to execute judgment on the city, each with a weapon in his hand.” '
  '10':
  - type: text
    content: So I will not look on them with pity or spare them, but I will bring down on their own heads what they have done.”
  '11':
  - type: text
    content: Then the man in linen with the writing kit at his side brought back word, saying, “I have done as you commanded.”
  '2':
  - type: text
    content: And I saw six men coming from the direction of the upper gate, which faces north, each with a deadly weapon in his hand. With them was a man clothed in linen who had a writing kit at his side. They came in and stood beside the bronze altar.
  '3':
  - type: text
    content: 'Now the glory of the God of Israel went up from above the cherubim, where it had been, and moved to the threshold of the temple. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' called to the man clothed in linen who had the writing kit at his side '
  '4':
  - type: text
    content: and said to him, “Go throughout the city of Jerusalem and put a mark on the foreheads of those who grieve and lament over all the detestable things that are done in it.”
  '5':
  - type: text
    content: 'As I listened, he said to the others, “Follow him through the city and kill, without showing pity or compassion. '
  '6':
  - type: text
    content: Slaughter the old men, the young men and women, the mothers and children, but do not touch anyone who has the mark. Begin at my sanctuary.” So they began with the old men who were in front of the temple.
  '7':
  - type: text
    content: 'Then he said to them, “Defile the temple and fill the courts with the slain. Go!” So they went out and began killing throughout the city. '
  '8':
  - type: text
    content: 'While they were killing and I was left alone, I fell facedown, crying out, “Alas, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '! Are you going to destroy the entire remnant of Israel in this outpouring of your wrath on Jerusalem?”'
  '9':
  - type: text
    content: 'He answered me, “The sin of the people of Israel and Judah is exceedingly great; the land is full of bloodshed and the city is full of injustice. They say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' has forsaken the land; the '
  - type: text
    content: Lord
  - type: text
    content: ' does not see.’ '
