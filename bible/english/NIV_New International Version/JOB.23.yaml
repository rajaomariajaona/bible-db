segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Even today my complaint is bitter;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hand
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint and Syriac; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: / the hand on me
    marker-yv: yv-n
  - type: text
    text: ' is heavy in spite of'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: heavy on me in
    marker-yv: yv-n
  - type: text
    text: ' my groaning.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: If only I knew where to find him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if only I could go to his dwelling!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I would state my case before him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fill my mouth with arguments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I would find out what he would answer me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and consider what he would say to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Would he vigorously oppose me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No, he would not press charges against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: There the upright can establish their innocence before him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there I would be delivered forever from my judge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But if I go to the east, he is not there;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I go to the west, I do not find him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When he is at work in the north, I do not see him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he turns to the south, I catch no glimpse of him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But he knows the way that I take;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he has tested me, I will come forth as gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My feet have closely followed his steps;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have kept to his way without turning aside.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I have not departed from the commands of his lips;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have treasured the words of his mouth more than my daily bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “But he stands alone, and who can oppose him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: He does whatever he pleases.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He carries out his decree against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and many such plans he still has in store.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: That is why I am terrified before him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I think of all this, I fear him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: God has made my heart faint;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Almighty has terrified me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Yet I am not silenced by the darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the thick darkness that covers my face.
