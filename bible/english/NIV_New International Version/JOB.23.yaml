document_id: JOB.23,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Job replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he knows the way that I take;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he has tested me, I will come forth as gold.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My feet have closely followed his steps;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have kept to his way without turning aside.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have not departed from the commands of his lips;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have treasured the words of his mouth more than my daily bread.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But he stands alone, and who can oppose him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He does whatever he pleases.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He carries out his decree against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and many such plans he still has in store.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That is why I am terrified before him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I think of all this, I fear him.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has made my heart faint;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Almighty has terrified me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I am not silenced by the darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the thick darkness that covers my face.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Even today my complaint is bitter;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his hand
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint and Syriac; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: / the hand on me
      marker-yv: yv-n
    - type: text
      text: ' is heavy in spite of'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: heavy on me in
      marker-yv: yv-n
    - type: text
      text: ' my groaning.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only I knew where to find him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if only I could go to his dwelling!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would state my case before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill my mouth with arguments.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would find out what he would answer me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and consider what he would say to me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Would he vigorously oppose me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No, he would not press charges against me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There the upright can establish their innocence before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there I would be delivered forever from my judge.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But if I go to the east, he is not there;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if I go to the west, I do not find him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he is at work in the north, I do not see him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he turns to the south, I catch no glimpse of him.
