document_id: JOB.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job
  - type: text
    content: 'Then Job replied:'
  '10':
  - type: text
    content: But he knows the way that I take;
  - type: text
    content: when he has tested me, I will come forth as gold.
  '11':
  - type: text
    content: My feet have closely followed his steps;
  - type: text
    content: I have kept to his way without turning aside.
  '12':
  - type: text
    content: I have not departed from the commands of his lips;
  - type: text
    content: I have treasured the words of his mouth more than my daily bread.
  '13':
  - type: text
    content: “But he stands alone, and who can oppose him?
  - type: text
    content: He does whatever he pleases.
  '14':
  - type: text
    content: He carries out his decree against me,
  - type: text
    content: and many such plans he still has in store.
  '15':
  - type: text
    content: That is why I am terrified before him;
  - type: text
    content: when I think of all this, I fear him.
  '16':
  - type: text
    content: God has made my heart faint;
  - type: text
    content: the Almighty has terrified me.
  '17':
  - type: text
    content: Yet I am not silenced by the darkness,
  - type: text
    content: by the thick darkness that covers my face.
  '2':
  - type: text
    content: “Even today my complaint is bitter;
  - type: text
    content: his hand
  - type: note
    content: Septuagint and Syriac; Hebrew / the hand on me
  - type: text
    content: ' is heavy in spite of'
  - type: note
    content: Or heavy on me in
  - type: text
    content: ' my groaning.'
  '3':
  - type: text
    content: If only I knew where to find him;
  - type: text
    content: if only I could go to his dwelling!
  '4':
  - type: text
    content: I would state my case before him
  - type: text
    content: and fill my mouth with arguments.
  '5':
  - type: text
    content: I would find out what he would answer me,
  - type: text
    content: and consider what he would say to me.
  '6':
  - type: text
    content: Would he vigorously oppose me?
  - type: text
    content: No, he would not press charges against me.
  '7':
  - type: text
    content: There the upright can establish their innocence before him,
  - type: text
    content: and there I would be delivered forever from my judge.
  '8':
  - type: text
    content: “But if I go to the east, he is not there;
  - type: text
    content: if I go to the west, I do not find him.
  '9':
  - type: text
    content: When he is at work in the north, I do not see him;
  - type: text
    content: when he turns to the south, I catch no glimpse of him.
