document_id: 1SA.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Destroys the Amalekites
  - type: text
    content: 'David and his men reached Ziklag on the third day. Now the Amalekites had raided the Negev and Ziklag. They had attacked Ziklag and burned it, '
  '10':
  - type: text
    content: Two hundred of them were too exhausted to cross the valley, but David and the other four hundred continued the pursuit.
  '11':
  - type: text
    content: 'They found an Egyptian in a field and brought him to David. They gave him water to drink and food to eat— '
  '12':
  - type: text
    content: part of a cake of pressed figs and two cakes of raisins. He ate and was revived, for he had not eaten any food or drunk any water for three days and three nights.
  '13':
  - type: text
    content: David asked him, “Who do you belong to? Where do you come from?”
  - type: text
    content: 'He said, “I am an Egyptian, the slave of an Amalekite. My master abandoned me when I became ill three days ago. '
  '14':
  - type: text
    content: We raided the Negev of the Kerethites, some territory belonging to Judah and the Negev of Caleb. And we burned Ziklag.”
  '15':
  - type: text
    content: David asked him, “Can you lead me down to this raiding party?”
  - type: text
    content: He answered, “Swear to me before God that you will not kill me or hand me over to my master, and I will take you down to them.”
  '16':
  - type: text
    content: 'He led David down, and there they were, scattered over the countryside, eating, drinking and reveling because of the great amount of plunder they had taken from the land of the Philistines and from Judah. '
  '17':
  - type: text
    content: 'David fought them from dusk until the evening of the next day, and none of them got away, except four hundred young men who rode off on camels and fled. '
  '18':
  - type: text
    content: 'David recovered everything the Amalekites had taken, including his two wives. '
  '19':
  - type: text
    content: 'Nothing was missing: young or old, boy or girl, plunder or anything else they had taken. David brought everything back. '
  '2':
  - type: text
    content: and had taken captive the women and everyone else in it, both young and old. They killed none of them, but carried them off as they went on their way.
  '20':
  - type: text
    content: He took all the flocks and herds, and his men drove them ahead of the other livestock, saying, “This is David’s plunder.”
  '21':
  - type: text
    content: 'Then David came to the two hundred men who had been too exhausted to follow him and who were left behind at the Besor Valley. They came out to meet David and the men with him. As David and his men approached, he asked them how they were. '
  '22':
  - type: text
    content: But all the evil men and troublemakers among David’s followers said, “Because they did not go out with us, we will not share with them the plunder we recovered. However, each man may take his wife and children and go.”
  '23':
  - type: text
    content: 'David replied, “No, my brothers, you must not do that with what the '
  - type: text
    content: Lord
  - type: text
    content: ' has given us. He has protected us and delivered into our hands the raiding party that came against us. '
  '24':
  - type: text
    content: 'Who will listen to what you say? The share of the man who stayed with the supplies is to be the same as that of him who went down to the battle. All will share alike.” '
  '25':
  - type: text
    content: David made this a statute and ordinance for Israel from that day to this.
  '26':
  - type: text
    content: 'When David reached Ziklag, he sent some of the plunder to the elders of Judah, who were his friends, saying, “Here is a gift for you from the plunder of the '
  - type: text
    content: Lord
  - type: text
    content: ’s enemies.”
  '27':
  - type: text
    content: 'David sent it to those who were in Bethel, Ramoth Negev and Jattir; '
  '28':
  - type: text
    content: 'to those in Aroer, Siphmoth, Eshtemoa '
  '29':
  - type: text
    content: 'and Rakal; to those in the towns of the Jerahmeelites and the Kenites; '
  '3':
  - type: text
    content: 'When David and his men reached Ziklag, they found it destroyed by fire and their wives and sons and daughters taken captive. '
  '30':
  - type: text
    content: 'to those in Hormah, Bor Ashan, Athak '
  '31':
  - type: text
    content: and Hebron; and to those in all the other places where he and his men had roamed.
  '4':
  - type: text
    content: 'So David and his men wept aloud until they had no strength left to weep. '
  '5':
  - type: text
    content: 'David’s two wives had been captured—Ahinoam of Jezreel and Abigail, the widow of Nabal of Carmel. '
  '6':
  - type: text
    content: 'David was greatly distressed because the men were talking of stoning him; each one was bitter in spirit because of his sons and daughters. But David found strength in the '
  - type: text
    content: Lord
  - type: text
    content: ' his God.'
  '7':
  - type: text
    content: 'Then David said to Abiathar the priest, the son of Ahimelek, “Bring me the ephod.” Abiathar brought it to him, '
  '8':
  - type: text
    content: 'and David inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Shall I pursue this raiding party? Will I overtake them?”'
  - type: text
    content: “Pursue them,” he answered. “You will certainly overtake them and succeed in the rescue.”
  '9':
  - type: text
    content: 'David and the six hundred men with him came to the Besor Valley, where some stayed behind. '
