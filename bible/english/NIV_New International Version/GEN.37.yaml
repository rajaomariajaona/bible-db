document_id: GEN.37,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph’s Dreams
  - type: text
    content: Jacob lived in the land where his father had stayed, the land of Canaan.
  '10':
  - type: text
    content: 'When he told his father as well as his brothers, his father rebuked him and said, “What is this dream you had? Will your mother and I and your brothers actually come and bow down to the ground before you?” '
  '11':
  - type: text
    content: His brothers were jealous of him, but his father kept the matter in mind.
  - type: heading
    content: Joseph Sold by His Brothers
  '12':
  - type: text
    content: 'Now his brothers had gone to graze their father’s flocks near Shechem, '
  '13':
  - type: text
    content: and Israel said to Joseph, “As you know, your brothers are grazing the flocks near Shechem. Come, I am going to send you to them.”
  - type: text
    content: “Very well,” he replied.
  '14':
  - type: text
    content: So he said to him, “Go and see if all is well with your brothers and with the flocks, and bring word back to me.” Then he sent him off from the Valley of Hebron.
  - type: text
    content: 'When Joseph arrived at Shechem, '
  '15':
  - type: text
    content: a man found him wandering around in the fields and asked him, “What are you looking for?”
  '16':
  - type: text
    content: He replied, “I’m looking for my brothers. Can you tell me where they are grazing their flocks?”
  '17':
  - type: text
    content: “They have moved on from here,” the man answered. “I heard them say, ‘Let’s go to Dothan.’ ”
  - type: text
    content: 'So Joseph went after his brothers and found them near Dothan. '
  '18':
  - type: text
    content: But they saw him in the distance, and before he reached them, they plotted to kill him.
  '19':
  - type: text
    content: '“Here comes that dreamer!” they said to each other. '
  '2':
  - type: text
    content: This is the account of Jacob’s family line.
  - type: text
    content: Joseph, a young man of seventeen, was tending the flocks with his brothers, the sons of Bilhah and the sons of Zilpah, his father’s wives, and he brought their father a bad report about them.
  '20':
  - type: text
    content: “Come now, let’s kill him and throw him into one of these cisterns and say that a ferocious animal devoured him. Then we’ll see what comes of his dreams.”
  '21':
  - type: text
    content: 'When Reuben heard this, he tried to rescue him from their hands. “Let’s not take his life,” he said. '
  '22':
  - type: text
    content: “Don’t shed any blood. Throw him into this cistern here in the wilderness, but don’t lay a hand on him.” Reuben said this to rescue him from them and take him back to his father.
  '23':
  - type: text
    content: 'So when Joseph came to his brothers, they stripped him of his robe—the ornate robe he was wearing— '
  '24':
  - type: text
    content: and they took him and threw him into the cistern. The cistern was empty; there was no water in it.
  '25':
  - type: text
    content: As they sat down to eat their meal, they looked up and saw a caravan of Ishmaelites coming from Gilead. Their camels were loaded with spices, balm and myrrh, and they were on their way to take them down to Egypt.
  '26':
  - type: text
    content: 'Judah said to his brothers, “What will we gain if we kill our brother and cover up his blood? '
  '27':
  - type: text
    content: Come, let’s sell him to the Ishmaelites and not lay our hands on him; after all, he is our brother, our own flesh and blood.” His brothers agreed.
  '28':
  - type: text
    content: So when the Midianite merchants came by, his brothers pulled Joseph up out of the cistern and sold him for twenty shekels
  - type: note
    content: That is, about 8 ounces or about 230 grams
  - type: text
    content: ' of silver to the Ishmaelites, who took him to Egypt.'
  '29':
  - type: text
    content: 'When Reuben returned to the cistern and saw that Joseph was not there, he tore his clothes. '
  '3':
  - type: text
    content: Now Israel loved Joseph more than any of his other sons, because he had been born to him in his old age; and he made an ornate
  - type: note
    content: The meaning of the Hebrew for this word is uncertain; also in verses 23 and 32.
  - type: text
    content: ' robe for him. '
  '30':
  - type: text
    content: He went back to his brothers and said, “The boy isn’t there! Where can I turn now?”
  '31':
  - type: text
    content: 'Then they got Joseph’s robe, slaughtered a goat and dipped the robe in the blood. '
  '32':
  - type: text
    content: They took the ornate robe back to their father and said, “We found this. Examine it to see whether it is your son’s robe.”
  '33':
  - type: text
    content: He recognized it and said, “It is my son’s robe! Some ferocious animal has devoured him. Joseph has surely been torn to pieces.”
  '34':
  - type: text
    content: 'Then Jacob tore his clothes, put on sackcloth and mourned for his son many days. '
  '35':
  - type: text
    content: All his sons and daughters came to comfort him, but he refused to be comforted. “No,” he said, “I will continue to mourn until I join my son in the grave.” So his father wept for him.
  '36':
  - type: text
    content: Meanwhile, the Midianites
  - type: note
    content: Samaritan Pentateuch, Septuagint, Vulgate and Syriac (see also verse 28); Masoretic Text Medanites
  - type: text
    content: ' sold Joseph in Egypt to Potiphar, one of Pharaoh’s officials, the captain of the guard.'
  '4':
  - type: text
    content: When his brothers saw that their father loved him more than any of them, they hated him and could not speak a kind word to him.
  '5':
  - type: text
    content: 'Joseph had a dream, and when he told it to his brothers, they hated him all the more. '
  '6':
  - type: text
    content: 'He said to them, “Listen to this dream I had: '
  '7':
  - type: text
    content: We were binding sheaves of grain out in the field when suddenly my sheaf rose and stood upright, while your sheaves gathered around mine and bowed down to it.”
  '8':
  - type: text
    content: His brothers said to him, “Do you intend to reign over us? Will you actually rule us?” And they hated him all the more because of his dream and what he had said.
  '9':
  - type: text
    content: Then he had another dream, and he told it to his brothers. “Listen,” he said, “I had another dream, and this time the sun and moon and eleven stars were bowing down to me.”
