document_id: JHN.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Word Became Flesh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the beginning was the Word, and the Word was with God, and the Word was God. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He was with God in the beginning. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Through him all things were made; without him nothing was made that has been made. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In him was life, and that life was the light of all mankind. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The light shines in the darkness, and the darkness has not overcome
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: understood
    marker-yv: yv-n
  - type: text
    text: ' it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'There was a man sent from God whose name was John. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He came as a witness to testify concerning that light, so that through him all might believe. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He himself was not the light; he came only as a witness to the light.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The true light that gives light to everyone was coming into the world. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He was in the world, and though the world was made through him, the world did not recognize him. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He came to that which was his own, but his own did not receive him. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Yet to all who did receive him, to those who believed in his name, he gave the right to become children of God— '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: children born not of natural descent, nor of human decision or a husband’s will, but born of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The Word became flesh and made his dwelling among us. We have seen his glory, the glory of the one and only Son, who came from the Father, full of grace and truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '(John testified concerning him. He cried out, saying, “This is the one I spoke about when I said, ‘He who comes after me has surpassed me because he was before me.’ ”) '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Out of his fullness we have all received grace in place of grace already given. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the law was given through Moses; grace and truth came through Jesus Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: No one has ever seen God, but the one and only Son, who is himself God and
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: but the only Son, who
    marker-yv: yv-n
  - type: text
    text: ' is in closest relationship with the Father, has made him known.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: John the Baptist Denies Being the Messiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Now this was John’s testimony when the Jewish leaders
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek term traditionally translated '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the Jews '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: tl
        children:
        - type: text
          text: hoi Ioudaioi
      - type: text
        text: ) refers here and elsewhere in John’s Gospel to those Jewish leaders who opposed Jesus; also in 5:10, 15,16; 7:1,11,13; 9:22; 18:14,28,36; 19:7,12,31,38; 20:19.
    marker-yv: yv-n
  - type: text
    text: ' in Jerusalem sent priests and Levites to ask him who he was. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He did not fail to confess, but confessed freely, “I am not the Messiah.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They asked him, “Then who are you? Are you Elijah?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “I am not.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Are you the Prophet?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He answered, “No.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Finally they said, “Who are you? Give us an answer to take back to those who sent us. What do you say about yourself?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: John replied in the words of Isaiah the prophet, “I am the voice of one calling in the wilderness, ‘Make straight the way for the Lord.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 40:3
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Now the Pharisees who had been sent '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: questioned him, “Why then do you baptize if you are not the Messiah, nor Elijah, nor the Prophet?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “I baptize with
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 31 and 33 (twice)
    marker-yv: yv-n
  - type: text
    text: ' water,” John replied, “but among you stands one you do not know. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He is the one who comes after me, the straps of whose sandals I am not worthy to untie.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: This all happened at Bethany on the other side of the Jordan, where John was baptizing.
- type: usfm
  marker: s1
  children:
  - type: text
    text: John Testifies About Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The next day John saw Jesus coming toward him and said, “Look, the Lamb of God, who takes away the sin of the world! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'This is the one I meant when I said, ‘A man who comes after me has surpassed me because he was before me.’ '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: I myself did not know him, but the reason I came baptizing with water was that he might be revealed to Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then John gave this testimony: “I saw the Spirit come down from heaven as a dove and remain on him. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And I myself did not know him, but the one who sent me to baptize with water told me, ‘The man on whom you see the Spirit come down and remain is the one who will baptize with the Holy Spirit.’ '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: I have seen and I testify that this is God’s Chosen One.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Isaiah 42:1; many manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: is the Son of God.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: John’s Disciples Follow Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The next day John was there again with two of his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: When he saw Jesus passing by, he said, “Look, the Lamb of God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'When the two disciples heard him say this, they followed Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Turning around, Jesus saw them following and asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What do you want?”
- type: usfm
  marker: p
  children:
  - type: text
    text: They said, “Rabbi” (which means “Teacher”), “where are you staying?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come,”
  - type: text
    text: ' he replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “and you will see.”
- type: usfm
  marker: p
  children:
  - type: text
    text: So they went and saw where he was staying, and they spent that day with him. It was about four in the afternoon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Andrew, Simon Peter’s brother, was one of the two who heard what John had said and who had followed Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'The first thing Andrew did was to find his brother Simon and tell him, “We have found the Messiah” (that is, the Christ). '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: And he brought him to Jesus.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus looked at him and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You are Simon son of John. You will be called Cephas”
  - type: text
    text: ' (which, when translated, is Peter'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:42 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cephas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Aramaic) and '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Peter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Greek) both mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rock.
    marker-yv: yv-n
  - type: text
    text: ).
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calls Philip and Nathanael
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'The next day Jesus decided to leave for Galilee. Finding Philip, he said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Follow me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Philip, like Andrew and Peter, was from the town of Bethsaida. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Philip found Nathanael and told him, “We have found the one Moses wrote about in the Law, and about whom the prophets also wrote—Jesus of Nazareth, the son of Joseph.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: “Nazareth! Can anything good come from there?” Nathanael asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: “Come and see,” said Philip.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'When Jesus saw Nathanael approaching, he said of him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Here truly is an Israelite in whom there is no deceit.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: “How do you know me?” Nathanael asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I saw you while you were still under the fig tree before Philip called you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Then Nathanael declared, “Rabbi, you are the Son of God; you are the king of Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You believe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:50 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Do you believe…?
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: because I told you I saw you under the fig tree. You will see greater things than that.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'He then added, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Very truly I tell you,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek is plural.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:51 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek is plural.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
