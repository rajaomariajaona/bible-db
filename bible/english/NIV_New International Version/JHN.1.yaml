document_id: JHN.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Word Became Flesh
  - type: text
    content: 'In the beginning was the Word, and the Word was with God, and the Word was God. '
  '10':
  - type: text
    content: 'He was in the world, and though the world was made through him, the world did not recognize him. '
  '11':
  - type: text
    content: 'He came to that which was his own, but his own did not receive him. '
  '12':
  - type: text
    content: 'Yet to all who did receive him, to those who believed in his name, he gave the right to become children of God— '
  '13':
  - type: text
    content: children born not of natural descent, nor of human decision or a husband’s will, but born of God.
  '14':
  - type: text
    content: The Word became flesh and made his dwelling among us. We have seen his glory, the glory of the one and only Son, who came from the Father, full of grace and truth.
  '15':
  - type: text
    content: '(John testified concerning him. He cried out, saying, “This is the one I spoke about when I said, ‘He who comes after me has surpassed me because he was before me.’ ”) '
  '16':
  - type: text
    content: 'Out of his fullness we have all received grace in place of grace already given. '
  '17':
  - type: text
    content: 'For the law was given through Moses; grace and truth came through Jesus Christ. '
  '18':
  - type: text
    content: No one has ever seen God, but the one and only Son, who is himself God and
  - type: note
    content: Some manuscripts but the only Son, who
  - type: text
    content: ' is in closest relationship with the Father, has made him known.'
  - type: heading
    content: John the Baptist Denies Being the Messiah
  '19':
  - type: text
    content: Now this was John’s testimony when the Jewish leaders
  - type: note
    content: The Greek term traditionally translated the Jews (hoi Ioudaioi) refers here and elsewhere in John’s Gospel to those Jewish leaders who opposed Jesus; also in 5:10, 15,16; 7:1,11,13; 9:22; 18:14,28,36; 19:7,12,31,38; 20:19.
  - type: text
    content: ' in Jerusalem sent priests and Levites to ask him who he was. '
  '2':
  - type: text
    content: 'He was with God in the beginning. '
  '20':
  - type: text
    content: He did not fail to confess, but confessed freely, “I am not the Messiah.”
  '21':
  - type: text
    content: They asked him, “Then who are you? Are you Elijah?”
  - type: text
    content: He said, “I am not.”
  - type: text
    content: “Are you the Prophet?”
  - type: text
    content: He answered, “No.”
  '22':
  - type: text
    content: Finally they said, “Who are you? Give us an answer to take back to those who sent us. What do you say about yourself?”
  '23':
  - type: text
    content: John replied in the words of Isaiah the prophet, “I am the voice of one calling in the wilderness, ‘Make straight the way for the Lord.’ ”
  - type: note
    content: Isaiah 40:3
  '24':
  - type: text
    content: 'Now the Pharisees who had been sent '
  '25':
  - type: text
    content: questioned him, “Why then do you baptize if you are not the Messiah, nor Elijah, nor the Prophet?”
  '26':
  - type: text
    content: “I baptize with
  - type: note
    content: Or in; also in verses 31 and 33 (twice)
  - type: text
    content: ' water,” John replied, “but among you stands one you do not know. '
  '27':
  - type: text
    content: He is the one who comes after me, the straps of whose sandals I am not worthy to untie.”
  '28':
  - type: text
    content: This all happened at Bethany on the other side of the Jordan, where John was baptizing.
  - type: heading
    content: John Testifies About Jesus
  '29':
  - type: text
    content: 'The next day John saw Jesus coming toward him and said, “Look, the Lamb of God, who takes away the sin of the world! '
  '3':
  - type: text
    content: 'Through him all things were made; without him nothing was made that has been made. '
  '30':
  - type: text
    content: 'This is the one I meant when I said, ‘A man who comes after me has surpassed me because he was before me.’ '
  '31':
  - type: text
    content: I myself did not know him, but the reason I came baptizing with water was that he might be revealed to Israel.”
  '32':
  - type: text
    content: 'Then John gave this testimony: “I saw the Spirit come down from heaven as a dove and remain on him. '
  '33':
  - type: text
    content: 'And I myself did not know him, but the one who sent me to baptize with water told me, ‘The man on whom you see the Spirit come down and remain is the one who will baptize with the Holy Spirit.’ '
  '34':
  - type: text
    content: I have seen and I testify that this is God’s Chosen One.”
  - type: note
    content: See Isaiah 42:1; many manuscripts is the Son of God.
  - type: heading
    content: John’s Disciples Follow Jesus
  '35':
  - type: text
    content: 'The next day John was there again with two of his disciples. '
  '36':
  - type: text
    content: When he saw Jesus passing by, he said, “Look, the Lamb of God!”
  '37':
  - type: text
    content: 'When the two disciples heard him say this, they followed Jesus. '
  '38':
  - type: text
    content: 'Turning around, Jesus saw them following and asked, '
  - type: text
    content: “What do you want?”
  - type: text
    content: They said, “Rabbi” (which means “Teacher”), “where are you staying?”
  '39':
  - type: text
    content: ' '
  - type: text
    content: “Come,”
  - type: text
    content: ' he replied, '
  - type: text
    content: “and you will see.”
  - type: text
    content: So they went and saw where he was staying, and they spent that day with him. It was about four in the afternoon.
  '4':
  - type: text
    content: 'In him was life, and that life was the light of all mankind. '
  '40':
  - type: text
    content: 'Andrew, Simon Peter’s brother, was one of the two who heard what John had said and who had followed Jesus. '
  '41':
  - type: text
    content: 'The first thing Andrew did was to find his brother Simon and tell him, “We have found the Messiah” (that is, the Christ). '
  '42':
  - type: text
    content: And he brought him to Jesus.
  - type: text
    content: 'Jesus looked at him and said, '
  - type: text
    content: “You are Simon son of John. You will be called Cephas”
  - type: text
    content: ' (which, when translated, is Peter'
  - type: note
    content: Cephas (Aramaic) and Peter (Greek) both mean rock.
  - type: text
    content: ).
  - type: heading
    content: Jesus Calls Philip and Nathanael
  '43':
  - type: text
    content: 'The next day Jesus decided to leave for Galilee. Finding Philip, he said to him, '
  - type: text
    content: “Follow me.”
  '44':
  - type: text
    content: 'Philip, like Andrew and Peter, was from the town of Bethsaida. '
  '45':
  - type: text
    content: Philip found Nathanael and told him, “We have found the one Moses wrote about in the Law, and about whom the prophets also wrote—Jesus of Nazareth, the son of Joseph.”
  '46':
  - type: text
    content: “Nazareth! Can anything good come from there?” Nathanael asked.
  - type: text
    content: “Come and see,” said Philip.
  '47':
  - type: text
    content: 'When Jesus saw Nathanael approaching, he said of him, '
  - type: text
    content: “Here truly is an Israelite in whom there is no deceit.”
  '48':
  - type: text
    content: “How do you know me?” Nathanael asked.
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “I saw you while you were still under the fig tree before Philip called you.”
  '49':
  - type: text
    content: Then Nathanael declared, “Rabbi, you are the Son of God; you are the king of Israel.”
  '5':
  - type: text
    content: The light shines in the darkness, and the darkness has not overcome
  - type: note
    content: Or understood
  - type: text
    content: ' it.'
  '50':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “You believe
  - type: note
    content: Or Do you believe…?
  - type: text
    content: ' '
  - type: text
    content: because I told you I saw you under the fig tree. You will see greater things than that.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'He then added, '
  - type: text
    content: “Very truly I tell you,
  - type: note
    content: The Greek is plural.
  - type: text
    content: ' '
  - type: text
    content: you
  - type: note
    content: The Greek is plural.
  - type: text
    content: ' '
  - type: text
    content: will see ‘heaven open, and the angels of God ascending and descending on’
  - type: note
    content: Gen. 28:12
  - type: text
    content: ' '
  - type: text
    content: the Son of Man.”
  '6':
  - type: text
    content: 'There was a man sent from God whose name was John. '
  '7':
  - type: text
    content: 'He came as a witness to testify concerning that light, so that through him all might believe. '
  '8':
  - type: text
    content: He himself was not the light; he came only as a witness to the light.
  '9':
  - type: text
    content: 'The true light that gives light to everyone was coming into the world. '
