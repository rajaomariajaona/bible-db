document_id: LEV.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sin Offering
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: just as the fat is removed from the ox
  - type: note
    content: The Hebrew word can refer to either male or female.
  - type: text
    content: ' sacrificed as a fellowship offering. Then the priest shall burn them on the altar of burnt offering. '
  '11':
  - type: text
    content: 'But the hide of the bull and all its flesh, as well as the head and legs, the internal organs and the intestines— '
  '12':
  - type: text
    content: that is, all the rest of the bull—he must take outside the camp to a place ceremonially clean, where the ashes are thrown, and burn it there in a wood fire on the ash heap.
  '13':
  - type: text
    content: '“ ‘If the whole Israelite community sins unintentionally and does what is forbidden in any of the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands, even though the community is unaware of the matter, when they realize their guilt '
  '14':
  - type: text
    content: 'and the sin they committed becomes known, the assembly must bring a young bull as a sin offering and present it before the tent of meeting. '
  '15':
  - type: text
    content: 'The elders of the community are to lay their hands on the bull’s head before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the bull shall be slaughtered before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Then the anointed priest is to take some of the bull’s blood into the tent of meeting. '
  '17':
  - type: text
    content: 'He shall dip his finger into the blood and sprinkle it before the '
  - type: text
    content: Lord
  - type: text
    content: ' seven times in front of the curtain. '
  '18':
  - type: text
    content: 'He is to put some of the blood on the horns of the altar that is before the '
  - type: text
    content: Lord
  - type: text
    content: ' in the tent of meeting. The rest of the blood he shall pour out at the base of the altar of burnt offering at the entrance to the tent of meeting. '
  '19':
  - type: text
    content: 'He shall remove all the fat from it and burn it on the altar, '
  '2':
  - type: text
    content: '“Say to the Israelites: ‘When anyone sins unintentionally and does what is forbidden in any of the '
  - type: text
    content: Lord
  - type: text
    content: ’s commands—
  '20':
  - type: text
    content: 'and do with this bull just as he did with the bull for the sin offering. In this way the priest will make atonement for the community, and they will be forgiven. '
  '21':
  - type: text
    content: Then he shall take the bull outside the camp and burn it as he burned the first bull. This is the sin offering for the community.
  '22':
  - type: text
    content: '“ ‘When a leader sins unintentionally and does what is forbidden in any of the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, when he realizes his guilt '
  '23':
  - type: text
    content: 'and the sin he has committed becomes known, he must bring as his offering a male goat without defect. '
  '24':
  - type: text
    content: 'He is to lay his hand on the goat’s head and slaughter it at the place where the burnt offering is slaughtered before the '
  - type: text
    content: Lord
  - type: text
    content: '. It is a sin offering. '
  '25':
  - type: text
    content: 'Then the priest shall take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering and pour out the rest of the blood at the base of the altar. '
  '26':
  - type: text
    content: He shall burn all the fat on the altar as he burned the fat of the fellowship offering. In this way the priest will make atonement for the leader’s sin, and he will be forgiven.
  '27':
  - type: text
    content: '“ ‘If any member of the community sins unintentionally and does what is forbidden in any of the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands, when they realize their guilt '
  '28':
  - type: text
    content: 'and the sin they have committed becomes known, they must bring as their offering for the sin they committed a female goat without defect. '
  '29':
  - type: text
    content: 'They are to lay their hand on the head of the sin offering and slaughter it at the place of the burnt offering. '
  '3':
  - type: text
    content: '“ ‘If the anointed priest sins, bringing guilt on the people, he must bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' a young bull without defect as a sin offering'
  - type: note
    content: Or purification offering; here and throughout this chapter
  - type: text
    content: ' for the sin he has committed. '
  '30':
  - type: text
    content: 'Then the priest is to take some of the blood with his finger and put it on the horns of the altar of burnt offering and pour out the rest of the blood at the base of the altar. '
  '31':
  - type: text
    content: 'They shall remove all the fat, just as the fat is removed from the fellowship offering, and the priest shall burn it on the altar as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: . In this way the priest will make atonement for them, and they will be forgiven.
  '32':
  - type: text
    content: '“ ‘If someone brings a lamb as their sin offering, they are to bring a female without defect. '
  '33':
  - type: text
    content: 'They are to lay their hand on its head and slaughter it for a sin offering at the place where the burnt offering is slaughtered. '
  '34':
  - type: text
    content: 'Then the priest shall take some of the blood of the sin offering with his finger and put it on the horns of the altar of burnt offering and pour out the rest of the blood at the base of the altar. '
  '35':
  - type: text
    content: 'They shall remove all the fat, just as the fat is removed from the lamb of the fellowship offering, and the priest shall burn it on the altar on top of the food offerings presented to the '
  - type: text
    content: Lord
  - type: text
    content: . In this way the priest will make atonement for them for the sin they have committed, and they will be forgiven.
  '4':
  - type: text
    content: 'He is to present the bull at the entrance to the tent of meeting before the '
  - type: text
    content: Lord
  - type: text
    content: '. He is to lay his hand on its head and slaughter it there before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Then the anointed priest shall take some of the bull’s blood and carry it into the tent of meeting. '
  '6':
  - type: text
    content: 'He is to dip his finger into the blood and sprinkle some of it seven times before the '
  - type: text
    content: Lord
  - type: text
    content: ', in front of the curtain of the sanctuary. '
  '7':
  - type: text
    content: 'The priest shall then put some of the blood on the horns of the altar of fragrant incense that is before the '
  - type: text
    content: Lord
  - type: text
    content: ' in the tent of meeting. The rest of the bull’s blood he shall pour out at the base of the altar of burnt offering at the entrance to the tent of meeting. '
  '8':
  - type: text
    content: 'He shall remove all the fat from the bull of the sin offering—all the fat that is connected to the internal organs, '
  '9':
  - type: text
    content: 'both kidneys with the fat on them near the loins, and the long lobe of the liver, which he will remove with the kidneys— '
