document_id: MRK.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Before Pilate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Very early in the morning, the chief priests, with the elders, the teachers of the law and the whole Sanhedrin, made their plans. So they bound Jesus, led him away and handed him over to Pilate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Are you the king of the Jews?” asked Pilate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have said so,”
  - type: text
    text: ' Jesus replied.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The chief priests accused him of many things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So again Pilate asked him, “Aren’t you going to answer? See how many things they are accusing you of.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But Jesus still made no reply, and Pilate was amazed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now it was the custom at the festival to release a prisoner whom the people requested. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A man called Barabbas was in prison with the insurrectionists who had committed murder in the uprising. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The crowd came up and asked Pilate to do for them what he usually did.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Do you want me to release to you the king of the Jews?” asked Pilate, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'knowing it was out of self-interest that the chief priests had handed Jesus over to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the chief priests stirred up the crowd to have Pilate release Barabbas instead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “What shall I do, then, with the one you call the king of the Jews?” Pilate asked them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Crucify him!” they shouted.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Why? What crime has he committed?” asked Pilate.
- type: usfm
  marker: p
  children:
  - type: text
    text: But they shouted all the louder, “Crucify him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Wanting to satisfy the crowd, Pilate released Barabbas to them. He had Jesus flogged, and handed him over to be crucified.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Soldiers Mock Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The soldiers led Jesus away into the palace (that is, the Praetorium) and called together the whole company of soldiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They put a purple robe on him, then twisted together a crown of thorns and set it on him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And they began to call out to him, “Hail, king of the Jews!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Again and again they struck him on the head with a staff and spit on him. Falling on their knees, they paid homage to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And when they had mocked him, they took off the purple robe and put his own clothes on him. Then they led him out to crucify him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Crucifixion of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'A certain man from Cyrene, Simon, the father of Alexander and Rufus, was passing by on his way in from the country, and they forced him to carry the cross. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'They brought Jesus to the place called Golgotha (which means “the place of the skull”). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then they offered him wine mixed with myrrh, but he did not take it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And they crucified him. Dividing up his clothes, they cast lots to see what each would get.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'It was nine in the morning when they crucified him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The written notice of the charge against him read: '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: the king of the jews
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They crucified two rebels with him, one on his right and one on his left. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '[28]'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts include here words similar to Luke 22:37.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Those who passed by hurled insults at him, shaking their heads and saying, “So! You who are going to destroy the temple and build it in three days, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'come down from the cross and save yourself!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'In the same way the chief priests and the teachers of the law mocked him among themselves. “He saved others,” they said, “but he can’t save himself! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Let this Messiah, this king of Israel, come down now from the cross, that we may see and believe.” Those crucified with him also heaped insults on him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'At noon, darkness came over the whole land until three in the afternoon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And at three in the afternoon Jesus cried out in a loud voice, '
  - type: usfm
    marker: tl
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Eloi, Eloi, lema sabachthani?”
  - type: text
    text: ' (which means '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My God, my God, why have you forsaken me?”
  - type: text
    text: ).
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 22:1
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: When some of those standing near heard this, they said, “Listen, he’s calling Elijah.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Someone ran, filled a sponge with wine vinegar, put it on a staff, and offered it to Jesus to drink. “Now leave him alone. Let’s see if Elijah comes to take him down,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: With a loud cry, Jesus breathed his last.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The curtain of the temple was torn in two from top to bottom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: And when the centurion, who stood there in front of Jesus, saw how he died,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: saw that he died with such a cry
    marker-yv: yv-n
  - type: text
    text: ' he said, “Surely this man was the Son of God!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Some women were watching from a distance. Among them were Mary Magdalene, Mary the mother of James the younger and of Joseph,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:40 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joses, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joseph
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '; '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also in verse 47
    marker-yv: yv-n
  - type: text
    text: ' and Salome. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: In Galilee these women had followed him and cared for his needs. Many other women who had come up with him to Jerusalem were also there.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Burial of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'It was Preparation Day (that is, the day before the Sabbath). So as evening approached, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Joseph of Arimathea, a prominent member of the Council, who was himself waiting for the kingdom of God, went boldly to Pilate and asked for Jesus’ body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Pilate was surprised to hear that he was already dead. Summoning the centurion, he asked him if Jesus had already died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'When he learned from the centurion that it was so, he gave the body to Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'So Joseph bought some linen cloth, took down the body, wrapped it in the linen, and placed it in a tomb cut out of rock. Then he rolled a stone against the entrance of the tomb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Mary Magdalene and Mary the mother of Joseph saw where he was laid.
