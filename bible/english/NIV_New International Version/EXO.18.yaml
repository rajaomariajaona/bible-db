document_id: EXO.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jethro Visits Moses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Jethro, the priest of Midian and father-in-law of Moses, heard of everything God had done for Moses and for his people Israel, and how the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had brought Israel out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'After Moses had sent away his wife Zipporah, his father-in-law Jethro received her '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and her two sons. One son was named Gershom,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gershom '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'a foreigner '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: there.
    marker-yv: yv-n
  - type: text
    text: ' for Moses said, “I have become a foreigner in a foreign land”; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and the other was named Eliezer,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eliezer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'my God is '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: helper
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' for he said, “My father’s God was my helper; he saved me from the sword of Pharaoh.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jethro, Moses’ father-in-law, together with Moses’ sons and wife, came to him in the wilderness, where he was camped near the mountain of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Jethro had sent word to him, “I, your father-in-law Jethro, am coming to you with your wife and her two sons.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Moses went out to meet his father-in-law and bowed down and kissed him. They greeted each other and then went into the tent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moses told his father-in-law about everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had done to Pharaoh and the Egyptians for Israel’s sake and about all the hardships they had met along the way and how the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had saved them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jethro was delighted to hear about all the good things the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had done for Israel in rescuing them from the hand of the Egyptians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He said, “Praise be to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who rescued you from the hand of the Egyptians and of Pharaoh, and who rescued the people from the hand of the Egyptians. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now I know that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is greater than all other gods, for he did this to those who had treated Israel arrogantly.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Jethro, Moses’ father-in-law, brought a burnt offering and other sacrifices to God, and Aaron came with all the elders of Israel to eat a meal with Moses’ father-in-law in the presence of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The next day Moses took his seat to serve as judge for the people, and they stood around him from morning till evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When his father-in-law saw all that Moses was doing for the people, he said, “What is this you are doing for the people? Why do you alone sit as judge, while all these people stand around you from morning till evening?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moses answered him, “Because the people come to me to seek God’s will. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Whenever they have a dispute, it is brought to me, and I decide between the parties and inform them of God’s decrees and instructions.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moses’ father-in-law replied, “What you are doing is not good. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'You and these people who come to you will only wear yourselves out. The work is too heavy for you; you cannot handle it alone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Listen now to me and I will give you some advice, and may God be with you. You must be the people’s representative before God and bring their disputes to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Teach them his decrees and instructions, and show them the way they are to live and how they are to behave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But select capable men from all the people—men who fear God, trustworthy men who hate dishonest gain—and appoint them as officials over thousands, hundreds, fifties and tens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Have them serve as judges for the people at all times, but have them bring every difficult case to you; the simple cases they can decide themselves. That will make your load lighter, because they will share it with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: If you do this and God so commands, you will be able to stand the strain, and all these people will go home satisfied.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moses listened to his father-in-law and did everything he said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He chose capable men from all Israel and made them leaders of the people, officials over thousands, hundreds, fifties and tens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They served as judges for the people at all times. The difficult cases they brought to Moses, but the simple ones they decided themselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then Moses sent his father-in-law on his way, and Jethro returned to his own country.
