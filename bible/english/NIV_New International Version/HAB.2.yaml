document_id: HAB.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: I will stand at my watch
  - type: text
    content: and station myself on the ramparts;
  - type: text
    content: I will look to see what he will say to me,
  - type: text
    content: and what answer I am to give to this complaint.
  - type: note
    content: Or and what to answer when I am rebuked
  - type: heading
    content: The Lord’s Answer
  '10':
  - type: text
    content: You have plotted the ruin of many peoples,
  - type: text
    content: shaming your own house and forfeiting your life.
  '11':
  - type: text
    content: The stones of the wall will cry out,
  - type: text
    content: and the beams of the woodwork will echo it.
  '12':
  - type: text
    content: “Woe to him who builds a city with bloodshed
  - type: text
    content: and establishes a town by injustice!
  '13':
  - type: text
    content: 'Has not the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty determined'
  - type: text
    content: that the people’s labor is only fuel for the fire,
  - type: text
    content: that the nations exhaust themselves for nothing?
  '14':
  - type: text
    content: 'For the earth will be filled with the knowledge of the glory of the '
  - type: text
    content: Lord
  - type: text
    content: as the waters cover the sea.
  '15':
  - type: text
    content: “Woe to him who gives drink to his neighbors,
  - type: text
    content: pouring it from the wineskin till they are drunk,
  - type: text
    content: so that he can gaze on their naked bodies!
  '16':
  - type: text
    content: You will be filled with shame instead of glory.
  - type: text
    content: Now it is your turn! Drink and let your nakedness be exposed
  - type: note
    content: Masoretic Text; Dead Sea Scrolls, Aquila, Vulgate and Syriac (see also Septuagint) and stagger
  - type: text
    content: '!'
  - type: text
    content: 'The cup from the '
  - type: text
    content: Lord
  - type: text
    content: ’s right hand is coming around to you,
  - type: text
    content: and disgrace will cover your glory.
  '17':
  - type: text
    content: The violence you have done to Lebanon will overwhelm you,
  - type: text
    content: and your destruction of animals will terrify you.
  - type: text
    content: For you have shed human blood;
  - type: text
    content: you have destroyed lands and cities and everyone in them.
  '18':
  - type: text
    content: “Of what value is an idol carved by a craftsman?
  - type: text
    content: Or an image that teaches lies?
  - type: text
    content: For the one who makes it trusts in his own creation;
  - type: text
    content: he makes idols that cannot speak.
  '19':
  - type: text
    content: Woe to him who says to wood, ‘Come to life!’
  - type: text
    content: Or to lifeless stone, ‘Wake up!’
  - type: text
    content: Can it give guidance?
  - type: text
    content: It is covered with gold and silver;
  - type: text
    content: there is no breath in it.”
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' replied:'
  - type: text
    content: “Write down the revelation
  - type: text
    content: and make it plain on tablets
  - type: text
    content: so that a herald
  - type: note
    content: Or so that whoever reads it
  - type: text
    content: ' may run with it.'
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is in his holy temple;'
  - type: text
    content: let all the earth be silent before him.
  '3':
  - type: text
    content: For the revelation awaits an appointed time;
  - type: text
    content: it speaks of the end
  - type: text
    content: and will not prove false.
  - type: text
    content: Though it linger, wait for it;
  - type: text
    content: it
  - type: note
    content: Or Though he linger, wait for him; / he
  - type: text
    content: ' will certainly come'
  - type: text
    content: and will not delay.
  '4':
  - type: text
    content: “See, the enemy is puffed up;
  - type: text
    content: his desires are not upright—
  - type: text
    content: but the righteous person will live by his faithfulness
  - type: note
    content: Or faith
  - type: text
    content: —
  '5':
  - type: text
    content: indeed, wine betrays him;
  - type: text
    content: he is arrogant and never at rest.
  - type: text
    content: Because he is as greedy as the grave
  - type: text
    content: and like death is never satisfied,
  - type: text
    content: he gathers to himself all the nations
  - type: text
    content: and takes captive all the peoples.
  '6':
  - type: text
    content: “Will not all of them taunt him with ridicule and scorn, saying,
  - type: text
    content: “ ‘Woe to him who piles up stolen goods
  - type: text
    content: and makes himself wealthy by extortion!
  - type: text
    content: How long must this go on?’
  '7':
  - type: text
    content: Will not your creditors suddenly arise?
  - type: text
    content: Will they not wake up and make you tremble?
  - type: text
    content: Then you will become their prey.
  '8':
  - type: text
    content: Because you have plundered many nations,
  - type: text
    content: the peoples who are left will plunder you.
  - type: text
    content: For you have shed human blood;
  - type: text
    content: you have destroyed lands and cities and everyone in them.
  '9':
  - type: text
    content: “Woe to him who builds his house by unjust gain,
  - type: text
    content: setting his nest on high
  - type: text
    content: to escape the clutches of ruin!
