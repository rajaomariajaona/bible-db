document_id: HAB.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will stand at my watch
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and station myself on the ramparts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will look to see what he will say to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and what answer I am to give to this complaint.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and what to answer when I am rebuked
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Answer
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have plotted the ruin of many peoples,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shaming your own house and forfeiting your life.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The stones of the wall will cry out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the beams of the woodwork will echo it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to him who builds a city with bloodshed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and establishes a town by injustice!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Has not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty determined'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the people’s labor is only fuel for the fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the nations exhaust themselves for nothing?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the earth will be filled with the knowledge of the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the waters cover the sea.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to him who gives drink to his neighbors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pouring it from the wineskin till they are drunk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that he can gaze on their naked bodies!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be filled with shame instead of glory.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Now it is your turn! Drink and let your nakedness be exposed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text; Dead Sea Scrolls, Aquila, Vulgate and Syriac (see also Septuagint) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and stagger
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The cup from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s right hand is coming around to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and disgrace will cover your glory.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The violence you have done to Lebanon will overwhelm you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your destruction of animals will terrify you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have shed human blood;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have destroyed lands and cities and everyone in them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Of what value is an idol carved by a craftsman?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or an image that teaches lies?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the one who makes it trusts in his own creation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes idols that cannot speak.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to him who says to wood, ‘Come to life!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or to lifeless stone, ‘Wake up!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can it give guidance?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It is covered with gold and silver;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no breath in it.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' replied:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Write down the revelation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make it plain on tablets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that a herald
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: so that whoever reads it
      marker-yv: yv-n
    - type: text
      text: ' may run with it.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is in his holy temple;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let all the earth be silent before him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the revelation awaits an appointed time;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it speaks of the end
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will not prove false.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though it linger, wait for it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Though he linger, wait for him; / he
      marker-yv: yv-n
    - type: text
      text: ' will certainly come'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will not delay.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, the enemy is puffed up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his desires are not upright—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the righteous person will live by his faithfulness
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faith
      marker-yv: yv-n
    - type: text
      text: —
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indeed, wine betrays him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is arrogant and never at rest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because he is as greedy as the grave
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and like death is never satisfied,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he gathers to himself all the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and takes captive all the peoples.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Will not all of them taunt him with ridicule and scorn, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Woe to him who piles up stolen goods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and makes himself wealthy by extortion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long must this go on?’
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will not your creditors suddenly arise?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will they not wake up and make you tremble?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then you will become their prey.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you have plundered many nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the peoples who are left will plunder you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have shed human blood;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have destroyed lands and cities and everyone in them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to him who builds his house by unjust gain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: setting his nest on high
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to escape the clutches of ruin!
