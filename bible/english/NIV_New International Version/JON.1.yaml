document_id: JON.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah Flees From the Lord
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jonah son of Amittai: '
  '10':
  - type: text
    content: 'This terrified them and they asked, “What have you done?” (They knew he was running away from the '
  - type: text
    content: Lord
  - type: text
    content: ', because he had already told them so.)'
  '11':
  - type: text
    content: The sea was getting rougher and rougher. So they asked him, “What should we do to you to make the sea calm down for us?”
  '12':
  - type: text
    content: “Pick me up and throw me into the sea,” he replied, “and it will become calm. I know that it is my fault that this great storm has come upon you.”
  '13':
  - type: text
    content: 'Instead, the men did their best to row back to land. But they could not, for the sea grew even wilder than before. '
  '14':
  - type: text
    content: 'Then they cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Please, '
  - type: text
    content: Lord
  - type: text
    content: ', do not let us die for taking this man’s life. Do not hold us accountable for killing an innocent man, for you, '
  - type: text
    content: Lord
  - type: text
    content: ', have done as you pleased.” '
  '15':
  - type: text
    content: 'Then they took Jonah and threw him overboard, and the raging sea grew calm. '
  '16':
  - type: text
    content: 'At this the men greatly feared the '
  - type: text
    content: Lord
  - type: text
    content: ', and they offered a sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' and made vows to him.'
  - type: heading
    content: Jonah’s Prayer
  '17':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' provided a huge fish to swallow Jonah, and Jonah was in the belly of the fish three days and three nights.'
  '2':
  - type: text
    content: “Go to the great city of Nineveh and preach against it, because its wickedness has come up before me.”
  '3':
  - type: text
    content: 'But Jonah ran away from the '
  - type: text
    content: Lord
  - type: text
    content: ' and headed for Tarshish. He went down to Joppa, where he found a ship bound for that port. After paying the fare, he went aboard and sailed for Tarshish to flee from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a great wind on the sea, and such a violent storm arose that the ship threatened to break up. '
  '5':
  - type: text
    content: All the sailors were afraid and each cried out to his own god. And they threw the cargo into the sea to lighten the ship.
  - type: text
    content: 'But Jonah had gone below deck, where he lay down and fell into a deep sleep. '
  '6':
  - type: text
    content: The captain went to him and said, “How can you sleep? Get up and call on your god! Maybe he will take notice of us so that we will not perish.”
  '7':
  - type: text
    content: 'Then the sailors said to each other, “Come, let us cast lots to find out who is responsible for this calamity.” They cast lots and the lot fell on Jonah. '
  '8':
  - type: text
    content: So they asked him, “Tell us, who is responsible for making all this trouble for us? What kind of work do you do? Where do you come from? What is your country? From what people are you?”
  '9':
  - type: text
    content: 'He answered, “I am a Hebrew and I worship the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, who made the sea and the dry land.”'
