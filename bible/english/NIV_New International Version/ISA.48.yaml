document_id: ISA.48,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Stubborn Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to this, you descendants of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who are called by the name of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and come from the line of Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'you who take oaths in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and invoke the God of Israel—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but not in truth or righteousness—
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, I have refined you, though not as silver;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have tested you in the furnace of affliction.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my own sake, for my own sake, I do this.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How can I let myself be defamed?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not yield my glory to another.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Freed
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to me, Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Israel, whom I have called:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am he;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am the first and I am the last.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My own hand laid the foundations of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my right hand spread out the heavens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I summon them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they all stand up together.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Come together, all of you, and listen:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Which of the idols has foretold these things?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s chosen ally
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will carry out his purpose against Babylon;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his arm will be against the Babylonians.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 20
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, even I, have spoken;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, I have called him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will succeed in his mission.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Come near me and listen to this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “From the first announcement I have not spoken in secret;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the time it happens, I am there.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And now the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sent me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: endowed with his Spirit.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'your Redeemer, the Holy One of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who teaches you what is best for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who directs you in the way you should go.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only you had paid attention to my commands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your peace would have been like a river,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your well-being like the waves of the sea.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your descendants would have been like the sand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your children like its numberless grains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their name would never be blotted out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor destroyed from before me.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you who call yourselves citizens of the holy city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and claim to rely on the God of Israel—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is his name:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leave Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flee from the Babylonians!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Announce this with shouts of joy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and proclaim it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send it out to the ends of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'say, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has redeemed his servant Jacob.”'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They did not thirst when he led them through the deserts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he made water flow for them from the rock;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he split the rock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and water gushed out.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“There is no peace,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “for the wicked.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I foretold the former things long ago,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my mouth announced them and I made them known;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then suddenly I acted, and they came to pass.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I knew how stubborn you were;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your neck muscles were iron,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your forehead was bronze.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I told you these things long ago;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before they happened I announced them to you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that you could not say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘My images brought them about;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my wooden image and metal god ordained them.’
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have heard these things; look at them all.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you not admit them?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “From now on I will tell you of new things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of hidden things unknown to you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are created now, and not long ago;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have not heard of them before today.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So you cannot say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Yes, I knew of them.’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have neither heard nor understood;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from of old your ears have not been open.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Well do I know how treacherous you are;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you were called a rebel from birth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my own name’s sake I delay my wrath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the sake of my praise I hold it back from you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so as not to destroy you completely.
