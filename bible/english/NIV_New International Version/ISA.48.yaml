document_id: ISA.48,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Stubborn Israel
  - type: text
    content: “Listen to this, you descendants of Jacob,
  - type: text
    content: you who are called by the name of Israel
  - type: text
    content: and come from the line of Judah,
  - type: text
    content: 'you who take oaths in the name of the '
  - type: text
    content: Lord
  - type: text
    content: and invoke the God of Israel—
  - type: text
    content: but not in truth or righteousness—
  '10':
  - type: text
    content: See, I have refined you, though not as silver;
  - type: text
    content: I have tested you in the furnace of affliction.
  '11':
  - type: text
    content: For my own sake, for my own sake, I do this.
  - type: text
    content: How can I let myself be defamed?
  - type: text
    content: I will not yield my glory to another.
  - type: heading
    content: Israel Freed
  '12':
  - type: text
    content: “Listen to me, Jacob,
  - type: text
    content: 'Israel, whom I have called:'
  - type: text
    content: I am he;
  - type: text
    content: I am the first and I am the last.
  '13':
  - type: text
    content: My own hand laid the foundations of the earth,
  - type: text
    content: and my right hand spread out the heavens;
  - type: text
    content: when I summon them,
  - type: text
    content: they all stand up together.
  '14':
  - type: text
    content: '“Come together, all of you, and listen:'
  - type: text
    content: Which of the idols has foretold these things?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s chosen ally
  - type: text
    content: will carry out his purpose against Babylon;
  - type: text
    content: his arm will be against the Babylonians.
  - type: note
    content: Or Chaldeans; also in verse 20
  '15':
  - type: text
    content: I, even I, have spoken;
  - type: text
    content: yes, I have called him.
  - type: text
    content: I will bring him,
  - type: text
    content: and he will succeed in his mission.
  '16':
  - type: text
    content: '“Come near me and listen to this:'
  - type: text
    content: “From the first announcement I have not spoken in secret;
  - type: text
    content: at the time it happens, I am there.”
  - type: text
    content: 'And now the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me,'
  - type: text
    content: endowed with his Spirit.
  '17':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: 'your Redeemer, the Holy One of Israel:'
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who teaches you what is best for you,
  - type: text
    content: who directs you in the way you should go.
  '18':
  - type: text
    content: If only you had paid attention to my commands,
  - type: text
    content: your peace would have been like a river,
  - type: text
    content: your well-being like the waves of the sea.
  '19':
  - type: text
    content: Your descendants would have been like the sand,
  - type: text
    content: your children like its numberless grains;
  - type: text
    content: their name would never be blotted out
  - type: text
    content: nor destroyed from before me.”
  '2':
  - type: text
    content: you who call yourselves citizens of the holy city
  - type: text
    content: and claim to rely on the God of Israel—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is his name:'
  '20':
  - type: text
    content: Leave Babylon,
  - type: text
    content: flee from the Babylonians!
  - type: text
    content: Announce this with shouts of joy
  - type: text
    content: and proclaim it.
  - type: text
    content: Send it out to the ends of the earth;
  - type: text
    content: 'say, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has redeemed his servant Jacob.”'
  '21':
  - type: text
    content: They did not thirst when he led them through the deserts;
  - type: text
    content: he made water flow for them from the rock;
  - type: text
    content: he split the rock
  - type: text
    content: and water gushed out.
  '22':
  - type: text
    content: '“There is no peace,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “for the wicked.”'
  '3':
  - type: text
    content: I foretold the former things long ago,
  - type: text
    content: my mouth announced them and I made them known;
  - type: text
    content: then suddenly I acted, and they came to pass.
  '4':
  - type: text
    content: For I knew how stubborn you were;
  - type: text
    content: your neck muscles were iron,
  - type: text
    content: your forehead was bronze.
  '5':
  - type: text
    content: Therefore I told you these things long ago;
  - type: text
    content: before they happened I announced them to you
  - type: text
    content: so that you could not say,
  - type: text
    content: ‘My images brought them about;
  - type: text
    content: my wooden image and metal god ordained them.’
  '6':
  - type: text
    content: You have heard these things; look at them all.
  - type: text
    content: Will you not admit them?
  - type: text
    content: “From now on I will tell you of new things,
  - type: text
    content: of hidden things unknown to you.
  '7':
  - type: text
    content: They are created now, and not long ago;
  - type: text
    content: you have not heard of them before today.
  - type: text
    content: So you cannot say,
  - type: text
    content: ‘Yes, I knew of them.’
  '8':
  - type: text
    content: You have neither heard nor understood;
  - type: text
    content: from of old your ears have not been open.
  - type: text
    content: Well do I know how treacherous you are;
  - type: text
    content: you were called a rebel from birth.
  '9':
  - type: text
    content: For my own name’s sake I delay my wrath;
  - type: text
    content: for the sake of my praise I hold it back from you,
  - type: text
    content: so as not to destroy you completely.
