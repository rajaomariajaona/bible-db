document_id: EZK.39,111
type_code: eng
verses:
  '1':
  - type: text
    content: '“Son of man, prophesy against Gog and say: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am against you, Gog, chief prince of'
  - type: note
    content: Or Gog, prince of Rosh,
  - type: text
    content: ' Meshek and Tubal. '
  '10':
  - type: text
    content: 'They will not need to gather wood from the fields or cut it from the forests, because they will use the weapons for fuel. And they will plunder those who plundered them and loot those who looted them, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: “ ‘On that day I will give Gog a burial place in Israel, in the valley of those who travel east of the Sea. It will block the way of travelers, because Gog and all his hordes will be buried there. So it will be called the Valley of Hamon Gog.
  - type: note
    content: Hamon Gog means hordes of Gog.
  '12':
  - type: text
    content: '“ ‘For seven months the Israelites will be burying them in order to cleanse the land. '
  '13':
  - type: text
    content: 'All the people of the land will bury them, and the day I display my glory will be a memorable day for them, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: People will be continually employed in cleansing the land. They will spread out across the land and, along with others, they will bury any bodies that are lying on the ground.
  - type: text
    content: '“ ‘After the seven months they will carry out a more detailed search. '
  '15':
  - type: text
    content: 'As they go through the land, anyone who sees a human bone will leave a marker beside it until the gravediggers bury it in the Valley of Hamon Gog, '
  '16':
  - type: text
    content: near a town called Hamonah.
  - type: note
    content: Hamonah means horde.
  - type: text
    content: ' And so they will cleanse the land.’'
  '17':
  - type: text
    content: '“Son of man, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Call out to every kind of bird and all the wild animals: ‘Assemble and come together from all around to the sacrifice I am preparing for you, the great sacrifice on the mountains of Israel. There you will eat flesh and drink blood. '
  '18':
  - type: text
    content: 'You will eat the flesh of mighty men and drink the blood of the princes of the earth as if they were rams and lambs, goats and bulls—all of them fattened animals from Bashan. '
  '19':
  - type: text
    content: 'At the sacrifice I am preparing for you, you will eat fat till you are glutted and drink blood till you are drunk. '
  '2':
  - type: text
    content: 'I will turn you around and drag you along. I will bring you from the far north and send you against the mountains of Israel. '
  '20':
  - type: text
    content: 'At my table you will eat your fill of horses and riders, mighty men and soldiers of every kind,’ declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: '“I will display my glory among the nations, and all the nations will see the punishment I inflict and the hand I lay on them. '
  '22':
  - type: text
    content: 'From that day forward the people of Israel will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. '
  '23':
  - type: text
    content: 'And the nations will know that the people of Israel went into exile for their sin, because they were unfaithful to me. So I hid my face from them and handed them over to their enemies, and they all fell by the sword. '
  '24':
  - type: text
    content: I dealt with them according to their uncleanness and their offenses, and I hid my face from them.
  '25':
  - type: text
    content: '“Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will now restore the fortunes of Jacob'
  - type: note
    content: Or now bring Jacob back from captivity
  - type: text
    content: ' and will have compassion on all the people of Israel, and I will be zealous for my holy name. '
  '26':
  - type: text
    content: 'They will forget their shame and all the unfaithfulness they showed toward me when they lived in safety in their land with no one to make them afraid. '
  '27':
  - type: text
    content: 'When I have brought them back from the nations and have gathered them from the countries of their enemies, I will be proved holy through them in the sight of many nations. '
  '28':
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, for though I sent them into exile among the nations, I will gather them to their own land, not leaving any behind. '
  '29':
  - type: text
    content: 'I will no longer hide my face from them, for I will pour out my Spirit on the people of Israel, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Then I will strike your bow from your left hand and make your arrows drop from your right hand. '
  '4':
  - type: text
    content: 'On the mountains of Israel you will fall, you and all your troops and the nations with you. I will give you as food to all kinds of carrion birds and to the wild animals. '
  '5':
  - type: text
    content: 'You will fall in the open field, for I have spoken, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'I will send fire on Magog and on those who live in safety in the coastlands, and they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: '“ ‘I will make known my holy name among my people Israel. I will no longer let my holy name be profaned, and the nations will know that I the '
  - type: text
    content: Lord
  - type: text
    content: ' am the Holy One in Israel. '
  '8':
  - type: text
    content: 'It is coming! It will surely take place, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: . This is the day I have spoken of.
  '9':
  - type: text
    content: '“ ‘Then those who live in the towns of Israel will go out and use the weapons for fuel and burn them up—the small and large shields, the bows and arrows, the war clubs and spears. For seven years they will use them for fuel. '
