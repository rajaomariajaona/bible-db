document_id: ACT.13,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now in the church at Antioch there were prophets and teachers: Barnabas, Simeon called Niger, Lucius of Cyrene, Manaen (who had been brought up with Herod the tetrarch) and Saul. '
  '10':
  - type: text
    content: '“You are a child of the devil and an enemy of everything that is right! You are full of all kinds of deceit and trickery. Will you never stop perverting the right ways of the Lord? '
  '11':
  - type: text
    content: Now the hand of the Lord is against you. You are going to be blind for a time, not even able to see the light of the sun.”
  - type: text
    content: 'Immediately mist and darkness came over him, and he groped about, seeking someone to lead him by the hand. '
  '12':
  - type: text
    content: When the proconsul saw what had happened, he believed, for he was amazed at the teaching about the Lord.
  - type: heading
    content: In Pisidian Antioch
  '13':
  - type: text
    content: 'From Paphos, Paul and his companions sailed to Perga in Pamphylia, where John left them to return to Jerusalem. '
  '14':
  - type: text
    content: 'From Perga they went on to Pisidian Antioch. On the Sabbath they entered the synagogue and sat down. '
  '15':
  - type: text
    content: After the reading from the Law and the Prophets, the leaders of the synagogue sent word to them, saying, “Brothers, if you have a word of exhortation for the people, please speak.”
  '16':
  - type: text
    content: 'Standing up, Paul motioned with his hand and said: “Fellow Israelites and you Gentiles who worship God, listen to me! '
  '17':
  - type: text
    content: 'The God of the people of Israel chose our ancestors; he made the people prosper during their stay in Egypt; with mighty power he led them out of that country; '
  '18':
  - type: text
    content: for about forty years he endured their conduct
  - type: note
    content: Some manuscripts he cared for them
  - type: text
    content: ' in the wilderness; '
  '19':
  - type: text
    content: 'and he overthrew seven nations in Canaan, giving their land to his people as their inheritance. '
  '2':
  - type: text
    content: 'While they were worshiping the Lord and fasting, the Holy Spirit said, “Set apart for me Barnabas and Saul for the work to which I have called them.” '
  '20':
  - type: text
    content: All this took about 450 years.
  - type: text
    content: '“After this, God gave them judges until the time of Samuel the prophet. '
  '21':
  - type: text
    content: 'Then the people asked for a king, and he gave them Saul son of Kish, of the tribe of Benjamin, who ruled forty years. '
  '22':
  - type: text
    content: 'After removing Saul, he made David their king. God testified concerning him: ‘I have found David son of Jesse, a man after my own heart; he will do everything I want him to do.’'
  '23':
  - type: text
    content: '“From this man’s descendants God has brought to Israel the Savior Jesus, as he promised. '
  '24':
  - type: text
    content: 'Before the coming of Jesus, John preached repentance and baptism to all the people of Israel. '
  '25':
  - type: text
    content: 'As John was completing his work, he said: ‘Who do you suppose I am? I am not the one you are looking for. But there is one coming after me whose sandals I am not worthy to untie.’'
  '26':
  - type: text
    content: '“Fellow children of Abraham and you God-fearing Gentiles, it is to us that this message of salvation has been sent. '
  '27':
  - type: text
    content: 'The people of Jerusalem and their rulers did not recognize Jesus, yet in condemning him they fulfilled the words of the prophets that are read every Sabbath. '
  '28':
  - type: text
    content: 'Though they found no proper ground for a death sentence, they asked Pilate to have him executed. '
  '29':
  - type: text
    content: 'When they had carried out all that was written about him, they took him down from the cross and laid him in a tomb. '
  '3':
  - type: text
    content: So after they had fasted and prayed, they placed their hands on them and sent them off.
  - type: heading
    content: On Cyprus
  '30':
  - type: text
    content: 'But God raised him from the dead, '
  '31':
  - type: text
    content: and for many days he was seen by those who had traveled with him from Galilee to Jerusalem. They are now his witnesses to our people.
  '32':
  - type: text
    content: '“We tell you the good news: What God promised our ancestors '
  '33':
  - type: text
    content: 'he has fulfilled for us, their children, by raising up Jesus. As it is written in the second Psalm:'
  - type: text
    content: “ ‘You are my son;
  - type: text
    content: today I have become your father.’
  - type: note
    content: Psalm 2:7
  '34':
  - type: text
    content: God raised him from the dead so that he will never be subject to decay. As God has said,
  - type: text
    content: “ ‘I will give you the holy and sure blessings promised to David.’
  - type: note
    content: Isaiah 55:3
  '35':
  - type: text
    content: 'So it is also stated elsewhere:'
  - type: text
    content: “ ‘You will not let your holy one see decay.’
  - type: note
    content: Psalm 16:10 (see Septuagint)
  '36':
  - type: text
    content: '“Now when David had served God’s purpose in his own generation, he fell asleep; he was buried with his ancestors and his body decayed. '
  '37':
  - type: text
    content: But the one whom God raised from the dead did not see decay.
  '38':
  - type: text
    content: '“Therefore, my friends, I want you to know that through Jesus the forgiveness of sins is proclaimed to you. '
  '39':
  - type: text
    content: 'Through him everyone who believes is set free from every sin, a justification you were not able to obtain under the law of Moses. '
  '4':
  - type: text
    content: 'The two of them, sent on their way by the Holy Spirit, went down to Seleucia and sailed from there to Cyprus. '
  '40':
  - type: text
    content: 'Take care that what the prophets have said does not happen to you:'
  '41':
  - type: text
    content: “ ‘Look, you scoffers,
  - type: text
    content: wonder and perish,
  - type: text
    content: for I am going to do something in your days
  - type: text
    content: that you would never believe,
  - type: text
    content: even if someone told you.’
  - type: note
    content: Hab. 1:5
  - type: text
    content: ”
  '42':
  - type: text
    content: 'As Paul and Barnabas were leaving the synagogue, the people invited them to speak further about these things on the next Sabbath. '
  '43':
  - type: text
    content: When the congregation was dismissed, many of the Jews and devout converts to Judaism followed Paul and Barnabas, who talked with them and urged them to continue in the grace of God.
  '44':
  - type: text
    content: 'On the next Sabbath almost the whole city gathered to hear the word of the Lord. '
  '45':
  - type: text
    content: When the Jews saw the crowds, they were filled with jealousy. They began to contradict what Paul was saying and heaped abuse on him.
  '46':
  - type: text
    content: 'Then Paul and Barnabas answered them boldly: “We had to speak the word of God to you first. Since you reject it and do not consider yourselves worthy of eternal life, we now turn to the Gentiles. '
  '47':
  - type: text
    content: 'For this is what the Lord has commanded us:'
  - type: text
    content: “ ‘I have made you
  - type: note
    content: The Greek is singular.
  - type: text
    content: ' a light for the Gentiles,'
  - type: text
    content: that you
  - type: note
    content: The Greek is singular.
  - type: text
    content: ' may bring salvation to the ends of the earth.’'
  - type: note
    content: Isaiah 49:6
  - type: text
    content: ”
  '48':
  - type: text
    content: When the Gentiles heard this, they were glad and honored the word of the Lord; and all who were appointed for eternal life believed.
  '49':
  - type: text
    content: 'The word of the Lord spread through the whole region. '
  '5':
  - type: text
    content: When they arrived at Salamis, they proclaimed the word of God in the Jewish synagogues. John was with them as their helper.
  '50':
  - type: text
    content: 'But the Jewish leaders incited the God-fearing women of high standing and the leading men of the city. They stirred up persecution against Paul and Barnabas, and expelled them from their region. '
  '51':
  - type: text
    content: 'So they shook the dust off their feet as a warning to them and went to Iconium. '
  '52':
  - type: text
    content: And the disciples were filled with joy and with the Holy Spirit.
  '6':
  - type: text
    content: 'They traveled through the whole island until they came to Paphos. There they met a Jewish sorcerer and false prophet named Bar-Jesus, '
  '7':
  - type: text
    content: 'who was an attendant of the proconsul, Sergius Paulus. The proconsul, an intelligent man, sent for Barnabas and Saul because he wanted to hear the word of God. '
  '8':
  - type: text
    content: 'But Elymas the sorcerer (for that is what his name means) opposed them and tried to turn the proconsul from the faith. '
  '9':
  - type: text
    content: 'Then Saul, who was also called Paul, filled with the Holy Spirit, looked straight at Elymas and said, '
