  '2':
  - type: text
    content: Sihon king of the Amorites, who reigned in Heshbon.
  - type: text
    content: 'He ruled from Aroer on the rim of the Arnon Gorge—from the middle of the gorge—to the Jabbok River, which is the border of the Ammonites. This included half of Gilead. '
