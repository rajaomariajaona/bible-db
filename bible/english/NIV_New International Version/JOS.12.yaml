  '1':
  - type: heading
    content: List of Defeated Kings
  - type: text
    content: 'These are the kings of the land whom the Israelites had defeated and whose territory they took over east of the Jordan, from the Arnon Gorge to Mount Hermon, including all the eastern side of the Arabah:'
