  '3':
  - type: text
    content: He also ruled over the eastern Arabah from the Sea of Galilee
  - type: note
    content: Hebrew Kinnereth
  - type: text
    content: ' to the Sea of the Arabah (that is, the Dead Sea), to Beth Jeshimoth, and then southward below the slopes of Pisgah.'
  '4':
  - type: text
    content: And the territory of Og king of Bashan, one of the last of the Rephaites, who reigned in Ashtaroth and Edrei.
  '5':
  - type: text
    content: He ruled over Mount Hermon, Salekah, all of Bashan to the border of the people of Geshur and Maakah, and half of Gilead to the border of Sihon king of Heshbon.
  '6':
  - type: text
    content: 'Moses, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the Israelites conquered them. And Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave their land to the Reubenites, the Gadites and the half-tribe of Manasseh to be their possession.'
  '7':
  - type: text
    content: 'Here is a list of the kings of the land that Joshua and the Israelites conquered on the west side of the Jordan, from Baal Gad in the Valley of Lebanon to Mount Halak, which rises toward Seir. Joshua gave their lands as an inheritance to the tribes of Israel according to their tribal divisions. '
  '8':
  - type: text
    content: 'The lands included the hill country, the western foothills, the Arabah, the mountain slopes, the wilderness and the Negev. These were the lands of the Hittites, Amorites, Canaanites, Perizzites, Hivites and Jebusites. These were the kings:'
  '9':
  - type: text
    content: the king of Jericho
  - type: text
    content: one
  - type: text
    content: the king of Ai (near Bethel)
  - type: text
    content: one
