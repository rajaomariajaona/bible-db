document_id: JOS.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: List of Defeated Kings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the kings of the land whom the Israelites had defeated and whose territory they took over east of the Jordan, from the Arnon Gorge to Mount Hermon, including all the eastern side of the Arabah:'
  '10':
  - type: text
    text: the king of Jerusalemonethe king of Hebronone
  '11':
  - type: text
    text: the king of Jarmuthonethe king of Lachishone
  '12':
  - type: text
    text: the king of Eglononethe king of Gezerone
  '13':
  - type: text
    text: the king of Debironethe king of Gederone
  '14':
  - type: text
    text: the king of Hormahonethe king of Aradone
  '15':
  - type: text
    text: the king of Libnahonethe king of Adullamone
  '16':
  - type: text
    text: the king of Makkedahonethe king of Bethelone
  '17':
  - type: text
    text: the king of Tappuahonethe king of Hepherone
  '18':
  - type: text
    text: the king of Aphekonethe king of Lasharonone
  '19':
  - type: text
    text: the king of Madononethe king of Hazorone
  '2':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Sihon king of the Amorites, who reigned in Heshbon.
  - type: usfm
    marker: mi
    children:
    - type: text
      text: 'He ruled from Aroer on the rim of the Arnon Gorge—from the middle of the gorge—to the Jabbok River, which is the border of the Ammonites. This included half of Gilead. '
  '20':
  - type: text
    text: the king of Shimron Merononethe king of Akshaphone
  '21':
  - type: text
    text: the king of Taanachonethe king of Megiddoone
  '22':
  - type: text
    text: the king of Kedeshonethe king of Jokneam in Carmelone
  '23':
  - type: text
    text: the king of Dor (in Naphoth Dor)onethe king of Goyim in Gilgalone
  '24':
  - type: text
    text: the king of Tirzahonethirty-one kings in all.
  '3':
  - type: usfm
    marker: mi
    children:
    - type: text
      text: He also ruled over the eastern Arabah from the Sea of Galilee
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Kinnereth
      marker-yv: yv-n
    - type: text
      text: ' to the Sea of the Arabah (that is, the Dead Sea), to Beth Jeshimoth, and then southward below the slopes of Pisgah.'
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: And the territory of Og king of Bashan, one of the last of the Rephaites, who reigned in Ashtaroth and Edrei.
  '5':
  - type: usfm
    marker: mi
    children:
    - type: text
      text: He ruled over Mount Hermon, Salekah, all of Bashan to the border of the people of Geshur and Maakah, and half of Gilead to the border of Sihon king of Heshbon.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the Israelites conquered them. And Moses the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave their land to the Reubenites, the Gadites and the half-tribe of Manasseh to be their possession.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is a list of the kings of the land that Joshua and the Israelites conquered on the west side of the Jordan, from Baal Gad in the Valley of Lebanon to Mount Halak, which rises toward Seir. Joshua gave their lands as an inheritance to the tribes of Israel according to their tribal divisions. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The lands included the hill country, the western foothills, the Arabah, the mountain slopes, the wilderness and the Negev. These were the lands of the Hittites, Amorites, Canaanites, Perizzites, Hivites and Jebusites. These were the kings:'
  '9':
  - type: text
    text: the king of Jerichoonethe king of Ai (near Bethel)one
