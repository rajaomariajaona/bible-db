document_id: LUK.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Lost Sheep
  - type: text
    content: 'Now the tax collectors and sinners were all gathering around to hear Jesus. '
  '10':
  - type: text
    content: In the same way, I tell you, there is rejoicing in the presence of the angels of God over one sinner who repents.”
  - type: heading
    content: The Parable of the Lost Son
  '11':
  - type: text
    content: 'Jesus continued: '
  - type: text
    content: “There was a man who had two sons.
  - type: text
    content: ' '
  '12':
  - type: text
    content: The younger one said to his father, ‘Father, give me my share of the estate.’ So he divided his property between them.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “Not long after that, the younger son got together all he had, set off for a distant country and there squandered his wealth in wild living.
  - type: text
    content: ' '
  '14':
  - type: text
    content: After he had spent everything, there was a severe famine in that whole country, and he began to be in need.
  - type: text
    content: ' '
  '15':
  - type: text
    content: So he went and hired himself out to a citizen of that country, who sent him to his fields to feed pigs.
  - type: text
    content: ' '
  '16':
  - type: text
    content: He longed to fill his stomach with the pods that the pigs were eating, but no one gave him anything.
  '17':
  - type: text
    content: ' '
  - type: text
    content: “When he came to his senses, he said, ‘How many of my father’s hired servants have food to spare, and here I am starving to death!
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'I will set out and go back to my father and say to him: Father, I have sinned against heaven and against you.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: I am no longer worthy to be called your son; make me like one of your hired servants.’
  - type: text
    content: ' '
  '2':
  - type: text
    content: But the Pharisees and the teachers of the law muttered, “This man welcomes sinners and eats with them.”
  '20':
  - type: text
    content: So he got up and went to his father.
  - type: text
    content: “But while he was still a long way off, his father saw him and was filled with compassion for him; he ran to his son, threw his arms around him and kissed him.
  '21':
  - type: text
    content: ' '
  - type: text
    content: “The son said to him, ‘Father, I have sinned against heaven and against you. I am no longer worthy to be called your son.’
  '22':
  - type: text
    content: ' '
  - type: text
    content: “But the father said to his servants, ‘Quick! Bring the best robe and put it on him. Put a ring on his finger and sandals on his feet.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Bring the fattened calf and kill it. Let’s have a feast and celebrate.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For this son of mine was dead and is alive again; he was lost and is found.’ So they began to celebrate.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Meanwhile, the older son was in the field. When he came near the house, he heard music and dancing.
  - type: text
    content: ' '
  '26':
  - type: text
    content: So he called one of the servants and asked him what was going on.
  - type: text
    content: ' '
  '27':
  - type: text
    content: ‘Your brother has come,’ he replied, ‘and your father has killed the fattened calf because he has him back safe and sound.’
  '28':
  - type: text
    content: ' '
  - type: text
    content: “The older brother became angry and refused to go in. So his father went out and pleaded with him.
  - type: text
    content: ' '
  '29':
  - type: text
    content: But he answered his father, ‘Look! All these years I’ve been slaving for you and never disobeyed your orders. Yet you never gave me even a young goat so I could celebrate with my friends.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then Jesus told them this parable: '
  '30':
  - type: text
    content: But when this son of yours who has squandered your property with prostitutes comes home, you kill the fattened calf for him!’
  '31':
  - type: text
    content: ' '
  - type: text
    content: “ ‘My son,’ the father said, ‘you are always with me, and everything I have is yours.
  - type: text
    content: ' '
  '32':
  - type: text
    content: But we had to celebrate and be glad, because this brother of yours was dead and is alive again; he was lost and is found.’ ”
  '4':
  - type: text
    content: “Suppose one of you has a hundred sheep and loses one of them. Doesn’t he leave the ninety-nine in the open country and go after the lost sheep until he finds it?
  - type: text
    content: ' '
  '5':
  - type: text
    content: And when he finds it, he joyfully puts it on his shoulders
  - type: text
    content: ' '
  '6':
  - type: text
    content: and goes home. Then he calls his friends and neighbors together and says, ‘Rejoice with me; I have found my lost sheep.’
  - type: text
    content: ' '
  '7':
  - type: text
    content: I tell you that in the same way there will be more rejoicing in heaven over one sinner who repents than over ninety-nine righteous persons who do not need to repent.
  - type: heading
    content: The Parable of the Lost Coin
  '8':
  - type: text
    content: ' '
  - type: text
    content: “Or suppose a woman has ten silver coins
  - type: text
    content: ' '
  - type: note
    content: Greek ten drachmas, each worth about a day’s wages
  - type: text
    content: and loses one. Doesn’t she light a lamp, sweep the house and search carefully until she finds it?
  - type: text
    content: ' '
  '9':
  - type: text
    content: And when she finds it, she calls her friends and neighbors together and says, ‘Rejoice with me; I have found my lost coin.’
  - type: text
    content: ' '
