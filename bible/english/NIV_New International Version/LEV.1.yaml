document_id: LEV.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Burnt Offering
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' called to Moses and spoke to him from the tent of meeting. He said, '
  '10':
  - type: text
    content: '“ ‘If the offering is a burnt offering from the flock, from either the sheep or the goats, you are to offer a male without defect. '
  '11':
  - type: text
    content: 'You are to slaughter it at the north side of the altar before the '
  - type: text
    content: Lord
  - type: text
    content: ', and Aaron’s sons the priests shall splash its blood against the sides of the altar. '
  '12':
  - type: text
    content: 'You are to cut it into pieces, and the priest shall arrange them, including the head and the fat, on the wood that is burning on the altar. '
  '13':
  - type: text
    content: 'You are to wash the internal organs and the legs with water, and the priest is to bring all of them and burn them on the altar. It is a burnt offering, a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: '“ ‘If the offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' is a burnt offering of birds, you are to offer a dove or a young pigeon. '
  '15':
  - type: text
    content: 'The priest shall bring it to the altar, wring off the head and burn it on the altar; its blood shall be drained out on the side of the altar. '
  '16':
  - type: text
    content: He is to remove the crop and the feathers
  - type: note
    content: Or crop with its contents; the meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' and throw them down east of the altar where the ashes are. '
  '17':
  - type: text
    content: 'He shall tear it open by the wings, not dividing it completely, and then the priest shall burn it on the wood that is burning on the altar. It is a burnt offering, a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘When anyone among you brings an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', bring as your offering an animal from either the herd or the flock.'
  '3':
  - type: text
    content: '“ ‘If the offering is a burnt offering from the herd, you are to offer a male without defect. You must present it at the entrance to the tent of meeting so that it will be acceptable to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'You are to lay your hand on the head of the burnt offering, and it will be accepted on your behalf to make atonement for you. '
  '5':
  - type: text
    content: 'You are to slaughter the young bull before the '
  - type: text
    content: Lord
  - type: text
    content: ', and then Aaron’s sons the priests shall bring the blood and splash it against the sides of the altar at the entrance to the tent of meeting. '
  '6':
  - type: text
    content: 'You are to skin the burnt offering and cut it into pieces. '
  '7':
  - type: text
    content: 'The sons of Aaron the priest are to put fire on the altar and arrange wood on the fire. '
  '8':
  - type: text
    content: 'Then Aaron’s sons the priests shall arrange the pieces, including the head and the fat, on the wood that is burning on the altar. '
  '9':
  - type: text
    content: 'You are to wash the internal organs and the legs with water, and the priest is to burn all of it on the altar. It is a burnt offering, a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: .
