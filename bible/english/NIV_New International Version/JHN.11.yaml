document_id: JHN.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Lazarus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now a man named Lazarus was sick. He was from Bethany, the village of Mary and her sister Martha. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is when a person walks at night that they stumble, for they have no light.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'After he had said this, he went on to tell them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Our friend Lazarus has fallen asleep; but I am going there to wake him up.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'His disciples replied, “Lord, if he sleeps, he will get better.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Jesus had been speaking of his death, but his disciples thought he meant natural sleep.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So then he told them plainly, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Lazarus is dead,
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and for your sake I am glad I was not there, so that you may believe. But let us go to him.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then Thomas (also known as Didymus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Thomas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Aramaic) and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Didymus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Greek) both mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: twin.
      marker-yv: yv-n
    - type: text
      text: ) said to the rest of the disciples, “Let us also go, that we may die with him.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Comforts the Sisters of Lazarus
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On his arrival, Jesus found that Lazarus had already been in the tomb for four days. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Now Bethany was less than two miles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or about 3 kilometers
      marker-yv: yv-n
    - type: text
      text: ' from Jerusalem, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'and many Jews had come to Martha and Mary to comfort them in the loss of their brother. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '(This Mary, whose brother Lazarus now lay sick, was the same one who poured perfume on the Lord and wiped his feet with her hair.) '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: When Martha heard that Jesus was coming, she went out to meet him, but Mary stayed at home.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Lord,” Martha said to Jesus, “if you had been here, my brother would not have died. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: But I know that even now God will give you whatever you ask.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Your brother will rise again.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Martha answered, “I know he will rise again in the resurrection at the last day.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am the resurrection and the life. The one who believes in me will live, even though they die;
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and whoever lives by believing in me will never die. Do you believe this?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “Yes, Lord,” she replied, “I believe that you are the Messiah, the Son of God, who is to come into the world.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'After she had said this, she went back and called her sister Mary aside. “The Teacher is here,” she said, “and is asking for you.” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'When Mary heard this, she got up quickly and went to him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So the sisters sent word to Jesus, “Lord, the one you love is sick.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Now Jesus had not yet entered the village, but was still at the place where Martha had met him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: When the Jews who had been with Mary in the house, comforting her, noticed how quickly she got up and went out, they followed her, supposing she was going to the tomb to mourn there.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: When Mary reached the place where Jesus was and saw him, she fell at his feet and said, “Lord, if you had been here, my brother would not have died.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'When Jesus saw her weeping, and the Jews who had come along with her also weeping, he was deeply moved in spirit and troubled. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Where have you laid him?”
    - type: text
      text: ' he asked.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Come and see, Lord,” they replied.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Jesus wept.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Then the Jews said, “See how he loved him!”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: But some of them said, “Could not he who opened the eyes of the blind man have kept this man from dying?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Raises Lazarus From the Dead
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jesus, once more deeply moved, came to the tomb. It was a cave with a stone laid across the entrance. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take away the stone,”
    - type: text
      text: ' he said.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But, Lord,” said Martha, the sister of the dead man, “by this time there is a bad odor, for he has been there four days.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'When he heard this, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This sickness will not end in death. No, it is for God’s glory so that God’s Son may be glorified through it.”
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Then Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Did I not tell you that if you believe, you will see the glory of God?”
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'So they took away the stone. Then Jesus looked up and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Father, I thank you that you have heard me.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I knew that you always hear me, but I said this for the benefit of the people standing here, that they may believe that you sent me.”
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'When he had said this, Jesus called in a loud voice, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Lazarus, come out!”
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: The dead man came out, his hands and feet wrapped with strips of linen, and a cloth around his face.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take off the grave clothes and let him go.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Plot to Kill Jesus
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Therefore many of the Jews who had come to visit Mary, and had seen what Jesus did, believed in him. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'But some of them went to the Pharisees and told them what Jesus had done. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Then the chief priests and the Pharisees called a meeting of the Sanhedrin.
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What are we accomplishing?” they asked. “Here is this man performing many signs. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: If we let him go on like this, everyone will believe in him, and then the Romans will come and take away both our temple and our nation.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Then one of them, named Caiaphas, who was high priest that year, spoke up, “You know nothing at all! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now Jesus loved Martha and her sister and Lazarus. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: You do not realize that it is better for you that one man die for the people than that the whole nation perish.”
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'He did not say this on his own, but as high priest that year he prophesied that Jesus would die for the Jewish nation, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'and not only for that nation but also for the scattered children of God, to bring them together and make them one. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: So from that day on they plotted to take his life.
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Therefore Jesus no longer moved about publicly among the people of Judea. Instead he withdrew to a region near the wilderness, to a village called Ephraim, where he stayed with his disciples.
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'When it was almost time for the Jewish Passover, many went up from the country to Jerusalem for their ceremonial cleansing before the Passover. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'They kept looking for Jesus, and as they stood in the temple courts they asked one another, “What do you think? Isn’t he coming to the festival at all?” '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: But the chief priests and the Pharisees had given orders that anyone who found out where Jesus was should report it so that they might arrest him.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So when he heard that Lazarus was sick, he stayed where he was two more days, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and then he said to his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let us go back to Judea.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “But Rabbi,” they said, “a short while ago the Jews there tried to stone you, and yet you are going back?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Are there not twelve hours of daylight? Anyone who walks in the daytime will not stumble, for they see by this world’s light.
    - type: text
      text: ' '
