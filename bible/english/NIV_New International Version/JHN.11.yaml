document_id: JHN.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Lazarus
  - type: text
    content: 'Now a man named Lazarus was sick. He was from Bethany, the village of Mary and her sister Martha. '
  '10':
  - type: text
    content: It is when a person walks at night that they stumble, for they have no light.”
  '11':
  - type: text
    content: 'After he had said this, he went on to tell them, '
  - type: text
    content: “Our friend Lazarus has fallen asleep; but I am going there to wake him up.”
  '12':
  - type: text
    content: 'His disciples replied, “Lord, if he sleeps, he will get better.” '
  '13':
  - type: text
    content: Jesus had been speaking of his death, but his disciples thought he meant natural sleep.
  '14':
  - type: text
    content: 'So then he told them plainly, '
  - type: text
    content: “Lazarus is dead,
  - type: text
    content: ' '
  '15':
  - type: text
    content: and for your sake I am glad I was not there, so that you may believe. But let us go to him.”
  '16':
  - type: text
    content: Then Thomas (also known as Didymus
  - type: note
    content: Thomas (Aramaic) and Didymus (Greek) both mean twin.
  - type: text
    content: ) said to the rest of the disciples, “Let us also go, that we may die with him.”
  - type: heading
    content: Jesus Comforts the Sisters of Lazarus
  '17':
  - type: text
    content: 'On his arrival, Jesus found that Lazarus had already been in the tomb for four days. '
  '18':
  - type: text
    content: Now Bethany was less than two miles
  - type: note
    content: Or about 3 kilometers
  - type: text
    content: ' from Jerusalem, '
  '19':
  - type: text
    content: 'and many Jews had come to Martha and Mary to comfort them in the loss of their brother. '
  '2':
  - type: text
    content: '(This Mary, whose brother Lazarus now lay sick, was the same one who poured perfume on the Lord and wiped his feet with her hair.) '
  '20':
  - type: text
    content: When Martha heard that Jesus was coming, she went out to meet him, but Mary stayed at home.
  '21':
  - type: text
    content: '“Lord,” Martha said to Jesus, “if you had been here, my brother would not have died. '
  '22':
  - type: text
    content: But I know that even now God will give you whatever you ask.”
  '23':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “Your brother will rise again.”
  '24':
  - type: text
    content: Martha answered, “I know he will rise again in the resurrection at the last day.”
  '25':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “I am the resurrection and the life. The one who believes in me will live, even though they die;
  - type: text
    content: ' '
  '26':
  - type: text
    content: and whoever lives by believing in me will never die. Do you believe this?”
  '27':
  - type: text
    content: “Yes, Lord,” she replied, “I believe that you are the Messiah, the Son of God, who is to come into the world.”
  '28':
  - type: text
    content: 'After she had said this, she went back and called her sister Mary aside. “The Teacher is here,” she said, “and is asking for you.” '
  '29':
  - type: text
    content: 'When Mary heard this, she got up quickly and went to him. '
  '3':
  - type: text
    content: So the sisters sent word to Jesus, “Lord, the one you love is sick.”
  '30':
  - type: text
    content: 'Now Jesus had not yet entered the village, but was still at the place where Martha had met him. '
  '31':
  - type: text
    content: When the Jews who had been with Mary in the house, comforting her, noticed how quickly she got up and went out, they followed her, supposing she was going to the tomb to mourn there.
  '32':
  - type: text
    content: When Mary reached the place where Jesus was and saw him, she fell at his feet and said, “Lord, if you had been here, my brother would not have died.”
  '33':
  - type: text
    content: 'When Jesus saw her weeping, and the Jews who had come along with her also weeping, he was deeply moved in spirit and troubled. '
  '34':
  - type: text
    content: “Where have you laid him?”
  - type: text
    content: ' he asked.'
  - type: text
    content: “Come and see, Lord,” they replied.
  '35':
  - type: text
    content: Jesus wept.
  '36':
  - type: text
    content: Then the Jews said, “See how he loved him!”
  '37':
  - type: text
    content: But some of them said, “Could not he who opened the eyes of the blind man have kept this man from dying?”
  - type: heading
    content: Jesus Raises Lazarus From the Dead
  '38':
  - type: text
    content: 'Jesus, once more deeply moved, came to the tomb. It was a cave with a stone laid across the entrance. '
  '39':
  - type: text
    content: “Take away the stone,”
  - type: text
    content: ' he said.'
  - type: text
    content: “But, Lord,” said Martha, the sister of the dead man, “by this time there is a bad odor, for he has been there four days.”
  '4':
  - type: text
    content: 'When he heard this, Jesus said, '
  - type: text
    content: “This sickness will not end in death. No, it is for God’s glory so that God’s Son may be glorified through it.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “Did I not tell you that if you believe, you will see the glory of God?”
  '41':
  - type: text
    content: 'So they took away the stone. Then Jesus looked up and said, '
  - type: text
    content: “Father, I thank you that you have heard me.
  - type: text
    content: ' '
  '42':
  - type: text
    content: I knew that you always hear me, but I said this for the benefit of the people standing here, that they may believe that you sent me.”
  '43':
  - type: text
    content: 'When he had said this, Jesus called in a loud voice, '
  - type: text
    content: “Lazarus, come out!”
  - type: text
    content: ' '
  '44':
  - type: text
    content: The dead man came out, his hands and feet wrapped with strips of linen, and a cloth around his face.
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Take off the grave clothes and let him go.”
  - type: heading
    content: The Plot to Kill Jesus
  '45':
  - type: text
    content: 'Therefore many of the Jews who had come to visit Mary, and had seen what Jesus did, believed in him. '
  '46':
  - type: text
    content: 'But some of them went to the Pharisees and told them what Jesus had done. '
  '47':
  - type: text
    content: Then the chief priests and the Pharisees called a meeting of the Sanhedrin.
  - type: text
    content: '“What are we accomplishing?” they asked. “Here is this man performing many signs. '
  '48':
  - type: text
    content: If we let him go on like this, everyone will believe in him, and then the Romans will come and take away both our temple and our nation.”
  '49':
  - type: text
    content: 'Then one of them, named Caiaphas, who was high priest that year, spoke up, “You know nothing at all! '
  '5':
  - type: text
    content: 'Now Jesus loved Martha and her sister and Lazarus. '
  '50':
  - type: text
    content: You do not realize that it is better for you that one man die for the people than that the whole nation perish.”
  '51':
  - type: text
    content: 'He did not say this on his own, but as high priest that year he prophesied that Jesus would die for the Jewish nation, '
  '52':
  - type: text
    content: 'and not only for that nation but also for the scattered children of God, to bring them together and make them one. '
  '53':
  - type: text
    content: So from that day on they plotted to take his life.
  '54':
  - type: text
    content: Therefore Jesus no longer moved about publicly among the people of Judea. Instead he withdrew to a region near the wilderness, to a village called Ephraim, where he stayed with his disciples.
  '55':
  - type: text
    content: 'When it was almost time for the Jewish Passover, many went up from the country to Jerusalem for their ceremonial cleansing before the Passover. '
  '56':
  - type: text
    content: 'They kept looking for Jesus, and as they stood in the temple courts they asked one another, “What do you think? Isn’t he coming to the festival at all?” '
  '57':
  - type: text
    content: But the chief priests and the Pharisees had given orders that anyone who found out where Jesus was should report it so that they might arrest him.
  '6':
  - type: text
    content: 'So when he heard that Lazarus was sick, he stayed where he was two more days, '
  '7':
  - type: text
    content: 'and then he said to his disciples, '
  - type: text
    content: “Let us go back to Judea.”
  '8':
  - type: text
    content: “But Rabbi,” they said, “a short while ago the Jews there tried to stone you, and yet you are going back?”
  '9':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Are there not twelve hours of daylight? Anyone who walks in the daytime will not stumble, for they see by this world’s light.
  - type: text
    content: ' '
