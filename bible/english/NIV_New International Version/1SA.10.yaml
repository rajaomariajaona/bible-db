document_id: 1SA.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel took a flask of olive oil and poured it on Saul’s head and kissed him, saying, “Has not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' anointed you ruler over his inheritance?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint and Vulgate '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'over his people Israel? You will reign over the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: '’s people and save them from the power of their enemies round about. And this will be a sign to you that the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' has anointed you ruler over his inheritance:'
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he and his servant arrived at Gibeah, a procession of prophets met him; the Spirit of God came powerfully upon him, and he joined in their prophesying. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When all those who had formerly known him saw him prophesying with the prophets, they asked each other, “What is this that has happened to the son of Kish? Is Saul also among the prophets?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A man who lived there answered, “And who is their father?” So it became a saying: “Is Saul also among the prophets?” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After Saul stopped prophesying, he went to the high place.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Saul’s uncle asked him and his servant, “Where have you been?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Looking for the donkeys,” he said. “But when we saw they were not to be found, we went to Samuel.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul’s uncle said, “Tell me what Samuel said to you.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul replied, “He assured us that the donkeys had been found.” But he did not tell his uncle what Samuel had said about the kingship.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel summoned the people of Israel to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at Mizpah '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to them, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: ‘I brought Israel up out of Egypt, and I delivered you from the power of Egypt and all the kingdoms that oppressed you.’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you have now rejected your God, who saves you out of all your disasters and calamities. And you have said, ‘No, appoint a king over us.’ So now present yourselves before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by your tribes and clans.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When you leave me today, you will meet two men near Rachel’s tomb, at Zelzah on the border of Benjamin. They will say to you, ‘The donkeys you set out to look for have been found. And now your father has stopped thinking about them and is worried about you. He is asking, “What shall I do about my son?” ’
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Samuel had all Israel come forward by tribes, the tribe of Benjamin was taken by lot. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he brought forward the tribe of Benjamin, clan by clan, and Matri’s clan was taken. Finally Saul son of Kish was taken. But when they looked for him, he was not to be found. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they inquired further of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Has the man come here yet?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Yes, he has hidden himself among the supplies.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They ran and brought him out, and as he stood among the people he was a head taller than any of the others. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel said to all the people, “Do you see the man the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen? There is no one like him among all the people.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the people shouted, “Long live the king!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel explained to the people the rights and duties of kingship. He wrote them down on a scroll and deposited it before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Then Samuel dismissed the people to go to their own homes.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul also went to his home in Gibeah, accompanied by valiant men whose hearts God had touched. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But some scoundrels said, “How can this fellow save us?” They despised him and brought him no gifts. But Saul kept silent.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then you will go on from there until you reach the great tree of Tabor. Three men going up to worship God at Bethel will meet you there. One will be carrying three young goats, another three loaves of bread, and another a skin of wine. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will greet you and offer you two loaves of bread, which you will accept from them.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“After that you will go to Gibeah of God, where there is a Philistine outpost. As you approach the town, you will meet a procession of prophets coming down from the high place with lyres, timbrels, pipes and harps being played before them, and they will be prophesying. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will come powerfully upon you, and you will prophesy with them; and you will be changed into a different person. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Once these signs are fulfilled, do whatever your hand finds to do, for God is with you.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go down ahead of me to Gilgal. I will surely come down to you to sacrifice burnt offerings and fellowship offerings, but you must wait seven days until I come to you and tell you what you are to do.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul Made King
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Saul turned to leave Samuel, God changed Saul’s heart, and all these signs were fulfilled that day. '
