document_id: 2CO.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'So I made up my mind that I would not make another painful visit to you. '
  '10':
  - type: text
    content: 'Anyone you forgive, I also forgive. And what I have forgiven—if there was anything to forgive—I have forgiven in the sight of Christ for your sake, '
  '11':
  - type: text
    content: in order that Satan might not outwit us. For we are not unaware of his schemes.
  - type: heading
    content: Ministers of the New Covenant
  '12':
  - type: text
    content: 'Now when I went to Troas to preach the gospel of Christ and found that the Lord had opened a door for me, '
  '13':
  - type: text
    content: I still had no peace of mind, because I did not find my brother Titus there. So I said goodbye to them and went on to Macedonia.
  '14':
  - type: text
    content: 'But thanks be to God, who always leads us as captives in Christ’s triumphal procession and uses us to spread the aroma of the knowledge of him everywhere. '
  '15':
  - type: text
    content: 'For we are to God the pleasing aroma of Christ among those who are being saved and those who are perishing. '
  '16':
  - type: text
    content: 'To the one we are an aroma that brings death; to the other, an aroma that brings life. And who is equal to such a task? '
  '17':
  - type: text
    content: Unlike so many, we do not peddle the word of God for profit. On the contrary, in Christ we speak before God with sincerity, as those sent from God.
  '2':
  - type: text
    content: 'For if I grieve you, who is left to make me glad but you whom I have grieved? '
  '3':
  - type: text
    content: 'I wrote as I did, so that when I came I would not be distressed by those who should have made me rejoice. I had confidence in all of you, that you would all share my joy. '
  '4':
  - type: text
    content: For I wrote you out of great distress and anguish of heart and with many tears, not to grieve you but to let you know the depth of my love for you.
  - type: heading
    content: Forgiveness for the Offender
  '5':
  - type: text
    content: 'If anyone has caused grief, he has not so much grieved me as he has grieved all of you to some extent—not to put it too severely. '
  '6':
  - type: text
    content: 'The punishment inflicted on him by the majority is sufficient. '
  '7':
  - type: text
    content: 'Now instead, you ought to forgive and comfort him, so that he will not be overwhelmed by excessive sorrow. '
  '8':
  - type: text
    content: 'I urge you, therefore, to reaffirm your love for him. '
  '9':
  - type: text
    content: 'Another reason I wrote you was to see if you would stand the test and be obedient in everything. '
