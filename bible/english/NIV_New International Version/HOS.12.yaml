document_id: HOS.12,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 12:1-14 is numbered 12:2-15.
  - type: text
    content: Ephraim feeds on the wind;
  - type: text
    content: he pursues the east wind all day
  - type: text
    content: and multiplies lies and violence.
  - type: text
    content: He makes a treaty with Assyria
  - type: text
    content: and sends olive oil to Egypt.
  '10':
  - type: text
    content: I spoke to the prophets,
  - type: text
    content: gave them many visions
  - type: text
    content: and told parables through them.”
  '11':
  - type: text
    content: Is Gilead wicked?
  - type: text
    content: Its people are worthless!
  - type: text
    content: Do they sacrifice bulls in Gilgal?
  - type: text
    content: Their altars will be like piles of stones
  - type: text
    content: on a plowed field.
  '12':
  - type: text
    content: Jacob fled to the country of Aram
  - type: note
    content: That is, Northwest Mesopotamia
  - type: text
    content: ;
  - type: text
    content: Israel served to get a wife,
  - type: text
    content: and to pay for her he tended sheep.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' used a prophet to bring Israel up from Egypt,'
  - type: text
    content: by a prophet he cared for him.
  '14':
  - type: text
    content: But Ephraim has aroused his bitter anger;
  - type: text
    content: his Lord will leave on him the guilt of his bloodshed
  - type: text
    content: and will repay him for his contempt.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has a charge to bring against Judah;'
  - type: text
    content: he will punish Jacob
  - type: note
    content: Jacob means he grasps the heel, a Hebrew idiom for he takes advantage of or he deceives.
  - type: text
    content: ' according to his ways'
  - type: text
    content: and repay him according to his deeds.
  '3':
  - type: text
    content: In the womb he grasped his brother’s heel;
  - type: text
    content: as a man he struggled with God.
  '4':
  - type: text
    content: He struggled with the angel and overcame him;
  - type: text
    content: he wept and begged for his favor.
  - type: text
    content: He found him at Bethel
  - type: text
    content: and talked with him there—
  '5':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty,'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is his name!'
  '6':
  - type: text
    content: But you must return to your God;
  - type: text
    content: maintain love and justice,
  - type: text
    content: and wait for your God always.
  '7':
  - type: text
    content: The merchant uses dishonest scales
  - type: text
    content: and loves to defraud.
  '8':
  - type: text
    content: Ephraim boasts,
  - type: text
    content: “I am very rich; I have become wealthy.
  - type: text
    content: With all my wealth they will not find in me
  - type: text
    content: any iniquity or sin.”
  '9':
  - type: text
    content: '“I have been the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: ever since you came out of Egypt;
  - type: text
    content: I will make you live in tents again,
  - type: text
    content: as in the days of your appointed festivals.
