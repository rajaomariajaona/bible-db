document_id: HOS.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 12:1-14 is numbered 12:2-15.
      marker-yv: yv-n
    - type: text
      text: Ephraim feeds on the wind;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he pursues the east wind all day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and multiplies lies and violence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes a treaty with Assyria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sends olive oil to Egypt.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I spoke to the prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gave them many visions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and told parables through them.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is Gilead wicked?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Its people are worthless!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do they sacrifice bulls in Gilgal?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their altars will be like piles of stones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on a plowed field.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob fled to the country of Aram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Northwest Mesopotamia
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel served to get a wife,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to pay for her he tended sheep.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' used a prophet to bring Israel up from Egypt,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by a prophet he cared for him.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Ephraim has aroused his bitter anger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his Lord will leave on him the guilt of his bloodshed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will repay him for his contempt.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has a charge to bring against Judah;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will punish Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'he grasps the heel, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a Hebrew idiom for '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'he takes advantage of '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he deceives.
      marker-yv: yv-n
    - type: text
      text: ' according to his ways'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and repay him according to his deeds.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the womb he grasped his brother’s heel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a man he struggled with God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He struggled with the angel and overcame him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he wept and begged for his favor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He found him at Bethel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and talked with him there—
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is his name!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you must return to your God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: maintain love and justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wait for your God always.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The merchant uses dishonest scales
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and loves to defraud.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim boasts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I am very rich; I have become wealthy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With all my wealth they will not find in me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: any iniquity or sin.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I have been the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever since you came out of Egypt;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make you live in tents again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as in the days of your appointed festivals.
