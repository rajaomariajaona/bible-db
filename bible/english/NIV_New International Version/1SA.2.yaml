  '1':
  - type: heading
    content: Hannah’s Prayer
  - type: text
    content: 'Then Hannah prayed and said:'
  - type: text
    content: '“My heart rejoices in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'in the '
  - type: text
    content: Lord
  - type: text
    content: ' my horn'
  - type: note
    content: Horn here symbolizes strength; also in verse 10.
  - type: text
    content: ' is lifted high.'
  - type: text
    content: My mouth boasts over my enemies,
  - type: text
    content: for I delight in your deliverance.
  '10':
  - type: text
    content: 'those who oppose the '
  - type: text
    content: Lord
  - type: text
    content: ' will be broken.'
  - type: text
    content: The Most High will thunder from heaven;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will judge the ends of the earth.'
  - type: text
    content: “He will give strength to his king
  - type: text
    content: and exalt the horn of his anointed.”
  '11':
  - type: text
    content: 'Then Elkanah went home to Ramah, but the boy ministered before the '
  - type: text
    content: Lord
  - type: text
    content: ' under Eli the priest.'
  - type: heading
    content: Eli’s Wicked Sons
  '12':
  - type: text
    content: 'Eli’s sons were scoundrels; they had no regard for the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Now it was the practice of the priests that, whenever any of the people offered a sacrifice, the priest’s servant would come with a three-pronged fork in his hand while the meat was being boiled '
  '14':
  - type: text
    content: 'and would plunge the fork into the pan or kettle or caldron or pot. Whatever the fork brought up the priest would take for himself. This is how they treated all the Israelites who came to Shiloh. '
  '15':
  - type: text
    content: But even before the fat was burned, the priest’s servant would come and say to the person who was sacrificing, “Give the priest some meat to roast; he won’t accept boiled meat from you, but only raw.”
  '16':
  - type: text
    content: If the person said to him, “Let the fat be burned first, and then take whatever you want,” the servant would answer, “No, hand it over now; if you don’t, I’ll take it by force.”
  '17':
  - type: text
    content: 'This sin of the young men was very great in the '
  - type: text
    content: Lord
  - type: text
    content: ’s sight, for they
  - type: note
    content: Dead Sea Scrolls and Septuagint; Masoretic Text people
  - type: text
    content: ' were treating the '
  - type: text
    content: Lord
  - type: text
    content: ’s offering with contempt.
  '18':
  - type: text
    content: 'But Samuel was ministering before the '
  - type: text
    content: Lord
  - type: text
    content: '—a boy wearing a linen ephod. '
  '19':
  - type: text
    content: 'Each year his mother made him a little robe and took it to him when she went up with her husband to offer the annual sacrifice. '
  '2':
  - type: text
    content: '“There is no one holy like the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: there is no one besides you;
  - type: text
    content: there is no Rock like our God.
  '20':
  - type: text
    content: 'Eli would bless Elkanah and his wife, saying, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' give you children by this woman to take the place of the one she prayed for and gave to'
  - type: note
    content: Dead Sea Scrolls; Masoretic Text and asked from
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: '.” Then they would go home. '
  '21':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' was gracious to Hannah; she gave birth to three sons and two daughters. Meanwhile, the boy Samuel grew up in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '22':
  - type: text
    content: 'Now Eli, who was very old, heard about everything his sons were doing to all Israel and how they slept with the women who served at the entrance to the tent of meeting. '
  '23':
  - type: text
    content: 'So he said to them, “Why do you do such things? I hear from all the people about these wicked deeds of yours. '
  '24':
  - type: text
    content: 'No, my sons; the report I hear spreading among the '
  - type: text
    content: Lord
  - type: text
    content: '’s people is not good. '
  '25':
  - type: text
    content: If one person sins against another, God
  - type: note
    content: Or the judges
  - type: text
    content: ' may mediate for the offender; but if anyone sins against the '
  - type: text
    content: Lord
  - type: text
    content: ', who will intercede for them?” His sons, however, did not listen to their father’s rebuke, for it was the '
  - type: text
    content: Lord
  - type: text
    content: ’s will to put them to death.
  '26':
  - type: text
    content: 'And the boy Samuel continued to grow in stature and in favor with the '
  - type: text
    content: Lord
  - type: text
    content: ' and with people.'
  - type: heading
    content: Prophecy Against the House of Eli
  '27':
  - type: text
    content: 'Now a man of God came to Eli and said to him, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Did I not clearly reveal myself to your ancestor’s family when they were in Egypt under Pharaoh? '
  '28':
  - type: text
    content: 'I chose your ancestor out of all the tribes of Israel to be my priest, to go up to my altar, to burn incense, and to wear an ephod in my presence. I also gave your ancestor’s family all the food offerings presented by the Israelites. '
  '29':
  - type: text
    content: Why do you
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' scorn my sacrifice and offering that I prescribed for my dwelling? Why do you honor your sons more than me by fattening yourselves on the choice parts of every offering made by my people Israel?’'
  '3':
  - type: text
    content: “Do not keep talking so proudly
  - type: text
    content: or let your mouth speak such arrogance,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' is a God who knows,'
  - type: text
    content: and by him deeds are weighed.
  '30':
  - type: text
    content: '“Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, declares: ‘I promised that members of your family would minister before me forever.’ But now the '
  - type: text
    content: Lord
  - type: text
    content: ' declares: ‘Far be it from me! Those who honor me I will honor, but those who despise me will be disdained. '
  '31':
  - type: text
    content: 'The time is coming when I will cut short your strength and the strength of your priestly house, so that no one in it will reach old age, '
  '32':
  - type: text
    content: 'and you will see distress in my dwelling. Although good will be done to Israel, no one in your family line will ever reach old age. '
  '33':
  - type: text
    content: Every one of you that I do not cut off from serving at my altar I will spare only to destroy your sight and sap your strength, and all your descendants will die in the prime of life.
  '34':
  - type: text
    content: '“ ‘And what happens to your two sons, Hophni and Phinehas, will be a sign to you—they will both die on the same day. '
  '35':
  - type: text
    content: 'I will raise up for myself a faithful priest, who will do according to what is in my heart and mind. I will firmly establish his priestly house, and they will minister before my anointed one always. '
  '36':
  - type: text
    content: Then everyone left in your family line will come and bow down before him for a piece of silver and a loaf of bread and plead, “Appoint me to some priestly office so I can have food to eat.” ’ ”
  '4':
  - type: text
    content: “The bows of the warriors are broken,
  - type: text
    content: but those who stumbled are armed with strength.
  '5':
  - type: text
    content: Those who were full hire themselves out for food,
  - type: text
    content: but those who were hungry are hungry no more.
  - type: text
    content: She who was barren has borne seven children,
  - type: text
    content: but she who has had many sons pines away.
  '6':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' brings death and makes alive;'
  - type: text
    content: he brings down to the grave and raises up.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' sends poverty and wealth;'
  - type: text
    content: he humbles and he exalts.
  '8':
  - type: text
    content: He raises the poor from the dust
  - type: text
    content: and lifts the needy from the ash heap;
  - type: text
    content: he seats them with princes
  - type: text
    content: and has them inherit a throne of honor.
  - type: text
    content: '“For the foundations of the earth are the '
  - type: text
    content: Lord
  - type: text
    content: ’s;
  - type: text
    content: on them he has set the world.
  '9':
  - type: text
    content: He will guard the feet of his faithful servants,
  - type: text
    content: but the wicked will be silenced in the place of darkness.
  - type: text
    content: “It is not by strength that one prevails;
