    - type: text
      text: Hannah’s Prayer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Hannah prayed and said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“My heart rejoices in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my horn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes strength; also in verse 10.
      marker-yv: yv-n
    - type: text
      text: ' is lifted high.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My mouth boasts over my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I delight in your deliverance.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'those who oppose the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be broken.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Most High will thunder from heaven;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will judge the ends of the earth.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He will give strength to his king
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and exalt the horn of his anointed.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Elkanah went home to Ramah, but the boy ministered before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' under Eli the priest.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eli’s Wicked Sons
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eli’s sons were scoundrels; they had no regard for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it was the practice of the priests that, whenever any of the people offered a sacrifice, the priest’s servant would come with a three-pronged fork in his hand while the meat was being boiled '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and would plunge the fork into the pan or kettle or caldron or pot. Whatever the fork brought up the priest would take for himself. This is how they treated all the Israelites who came to Shiloh. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But even before the fat was burned, the priest’s servant would come and say to the person who was sacrificing, “Give the priest some meat to roast; he won’t accept boiled meat from you, but only raw.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If the person said to him, “Let the fat be burned first, and then take whatever you want,” the servant would answer, “No, hand it over now; if you don’t, I’ll take it by force.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This sin of the young men was very great in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sight, for they
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls and Septuagint; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: people
      marker-yv: yv-n
    - type: text
      text: ' were treating the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s offering with contempt.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Samuel was ministering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—a boy wearing a linen ephod. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each year his mother made him a little robe and took it to him when she went up with her husband to offer the annual sacrifice. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“There is no one holy like the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no one besides you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no Rock like our God.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eli would bless Elkanah and his wife, saying, “May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' give you children by this woman to take the place of the one she prayed for and gave to'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and asked from
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” Then they would go home. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was gracious to Hannah; she gave birth to three sons and two daughters. Meanwhile, the boy Samuel grew up in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Eli, who was very old, heard about everything his sons were doing to all Israel and how they slept with the women who served at the entrance to the tent of meeting. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said to them, “Why do you do such things? I hear from all the people about these wicked deeds of yours. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No, my sons; the report I hear spreading among the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s people is not good. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If one person sins against another, God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the judges
      marker-yv: yv-n
    - type: text
      text: ' may mediate for the offender; but if anyone sins against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who will intercede for them?” His sons, however, did not listen to their father’s rebuke, for it was the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s will to put them to death.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the boy Samuel continued to grow in stature and in favor with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and with people.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy Against the House of Eli
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now a man of God came to Eli and said to him, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: ‘Did I not clearly reveal myself to your ancestor’s family when they were in Egypt under Pharaoh? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I chose your ancestor out of all the tribes of Israel to be my priest, to go up to my altar, to burn incense, and to wear an ephod in my presence. I also gave your ancestor’s family all the food offerings presented by the Israelites. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Why do you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is plural.
      marker-yv: yv-n
    - type: text
      text: ' scorn my sacrifice and offering that I prescribed for my dwelling? Why do you honor your sons more than me by fattening yourselves on the choice parts of every offering made by my people Israel?’'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not keep talking so proudly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or let your mouth speak such arrogance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a God who knows,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and by him deeds are weighed.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, declares: ‘I promised that members of your family would minister before me forever.’ But now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' declares: ‘Far be it from me! Those who honor me I will honor, but those who despise me will be disdained. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The time is coming when I will cut short your strength and the strength of your priestly house, so that no one in it will reach old age, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you will see distress in my dwelling. Although good will be done to Israel, no one in your family line will ever reach old age. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every one of you that I do not cut off from serving at my altar I will spare only to destroy your sight and sap your strength, and all your descendants will die in the prime of life.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘And what happens to your two sons, Hophni and Phinehas, will be a sign to you—they will both die on the same day. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will raise up for myself a faithful priest, who will do according to what is in my heart and mind. I will firmly establish his priestly house, and they will minister before my anointed one always. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then everyone left in your family line will come and bow down before him for a piece of silver and a loaf of bread and plead, “Appoint me to some priestly office so I can have food to eat.” ’ ”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The bows of the warriors are broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but those who stumbled are armed with strength.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who were full hire themselves out for food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but those who were hungry are hungry no more.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She who was barren has borne seven children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but she who has had many sons pines away.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brings death and makes alive;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he brings down to the grave and raises up.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sends poverty and wealth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he humbles and he exalts.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He raises the poor from the dust
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lifts the needy from the ash heap;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he seats them with princes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and has them inherit a throne of honor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“For the foundations of the earth are the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on them he has set the world.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will guard the feet of his faithful servants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the wicked will be silenced in the place of darkness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “It is not by strength that one prevails;
