document_id: JOB.10,111
type_code: eng
verses:
  '1':
  - type: text
    content: “I loathe my very life;
  - type: text
    content: therefore I will give free rein to my complaint
  - type: text
    content: and speak out in the bitterness of my soul.
  '10':
  - type: text
    content: Did you not pour me out like milk
  - type: text
    content: and curdle me like cheese,
  '11':
  - type: text
    content: clothe me with skin and flesh
  - type: text
    content: and knit me together with bones and sinews?
  '12':
  - type: text
    content: You gave me life and showed me kindness,
  - type: text
    content: and in your providence watched over my spirit.
  '13':
  - type: text
    content: “But this is what you concealed in your heart,
  - type: text
    content: 'and I know that this was in your mind:'
  '14':
  - type: text
    content: If I sinned, you would be watching me
  - type: text
    content: and would not let my offense go unpunished.
  '15':
  - type: text
    content: If I am guilty—woe to me!
  - type: text
    content: Even if I am innocent, I cannot lift my head,
  - type: text
    content: for I am full of shame
  - type: text
    content: and drowned in
  - type: note
    content: Or and aware of
  - type: text
    content: ' my affliction.'
  '16':
  - type: text
    content: If I hold my head high, you stalk me like a lion
  - type: text
    content: and again display your awesome power against me.
  '17':
  - type: text
    content: You bring new witnesses against me
  - type: text
    content: and increase your anger toward me;
  - type: text
    content: your forces come against me wave upon wave.
  '18':
  - type: text
    content: “Why then did you bring me out of the womb?
  - type: text
    content: I wish I had died before any eye saw me.
  '19':
  - type: text
    content: If only I had never come into being,
  - type: text
    content: or had been carried straight from the womb to the grave!
  '2':
  - type: text
    content: 'I say to God: Do not declare me guilty,'
  - type: text
    content: but tell me what charges you have against me.
  '20':
  - type: text
    content: Are not my few days almost over?
  - type: text
    content: Turn away from me so I can have a moment’s joy
  '21':
  - type: text
    content: before I go to the place of no return,
  - type: text
    content: to the land of gloom and utter darkness,
  '22':
  - type: text
    content: to the land of deepest night,
  - type: text
    content: of utter darkness and disorder,
  - type: text
    content: where even the light is like darkness.”
  '3':
  - type: text
    content: Does it please you to oppress me,
  - type: text
    content: to spurn the work of your hands,
  - type: text
    content: while you smile on the plans of the wicked?
  '4':
  - type: text
    content: Do you have eyes of flesh?
  - type: text
    content: Do you see as a mortal sees?
  '5':
  - type: text
    content: Are your days like those of a mortal
  - type: text
    content: or your years like those of a strong man,
  '6':
  - type: text
    content: that you must search out my faults
  - type: text
    content: and probe after my sin—
  '7':
  - type: text
    content: though you know that I am not guilty
  - type: text
    content: and that no one can rescue me from your hand?
  '8':
  - type: text
    content: “Your hands shaped me and made me.
  - type: text
    content: Will you now turn and destroy me?
  '9':
  - type: text
    content: Remember that you molded me like clay.
  - type: text
    content: Will you now turn me to dust again?
