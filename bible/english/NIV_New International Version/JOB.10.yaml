document_id: JOB.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I loathe my very life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore I will give free rein to my complaint
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and speak out in the bitterness of my soul.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did you not pour me out like milk
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and curdle me like cheese,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: clothe me with skin and flesh
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and knit me together with bones and sinews?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave me life and showed me kindness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in your providence watched over my spirit.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But this is what you concealed in your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and I know that this was in your mind:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I sinned, you would be watching me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and would not let my offense go unpunished.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I am guilty—woe to me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even if I am innocent, I cannot lift my head,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am full of shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drowned in
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and aware of
      marker-yv: yv-n
    - type: text
      text: ' my affliction.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I hold my head high, you stalk me like a lion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and again display your awesome power against me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You bring new witnesses against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and increase your anger toward me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your forces come against me wave upon wave.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why then did you bring me out of the womb?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I wish I had died before any eye saw me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only I had never come into being,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or had been carried straight from the womb to the grave!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I say to God: Do not declare me guilty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but tell me what charges you have against me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are not my few days almost over?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Turn away from me so I can have a moment’s joy
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before I go to the place of no return,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the land of gloom and utter darkness,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the land of deepest night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of utter darkness and disorder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where even the light is like darkness.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does it please you to oppress me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to spurn the work of your hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while you smile on the plans of the wicked?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you have eyes of flesh?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do you see as a mortal sees?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are your days like those of a mortal
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or your years like those of a strong man,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you must search out my faults
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and probe after my sin—
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though you know that I am not guilty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and that no one can rescue me from your hand?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your hands shaped me and made me.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you now turn and destroy me?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember that you molded me like clay.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you now turn me to dust again?
