document_id: REV.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Scroll and the Lamb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I saw in the right hand of him who sat on the throne a scroll with writing on both sides and sealed with seven seals. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I saw a mighty angel proclaiming in a loud voice, “Who is worthy to break the seals and open the scroll?” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But no one in heaven or on earth or under the earth could open the scroll or even look inside it. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I wept and wept because no one was found who was worthy to open the scroll or look inside. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then one of the elders said to me, “Do not weep! See, the Lion of the tribe of Judah, the Root of David, has triumphed. He is able to open the scroll and its seven seals.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then I saw a Lamb, looking as if it had been slain, standing at the center of the throne, encircled by the four living creatures and the elders. The Lamb had seven horns and seven eyes, which are the seven spirits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the sevenfold Spirit
    marker-yv: yv-n
  - type: text
    text: ' of God sent out into all the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He went and took the scroll from the right hand of him who sat on the throne. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And when he had taken it, the four living creatures and the twenty-four elders fell down before the Lamb. Each one had a harp and they were holding golden bowls full of incense, which are the prayers of God’s people. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And they sang a new song, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are worthy to take the scroll
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to open its seals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because you were slain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with your blood you purchased for God
- type: usfm
  marker: q2
  children:
  - type: text
    text: persons from every tribe and language and people and nation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You have made them to be a kingdom and priests to serve our God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will reign
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: they reign
    marker-yv: yv-n
  - type: text
    text: ' on the earth.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then I looked and heard the voice of many angels, numbering thousands upon thousands, and ten thousand times ten thousand. They encircled the throne and the living creatures and the elders. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In a loud voice they were saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Worthy is the Lamb, who was slain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to receive power and wealth and wisdom and strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: and honor and glory and praise!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then I heard every creature in heaven and on earth and under the earth and on the sea, and all that is in them, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “To him who sits on the throne and to the Lamb
- type: usfm
  marker: q2
  children:
  - type: text
    text: be praise and honor and glory and power,
- type: usfm
  marker: qc
  children:
  - type: text
    text: for ever and ever!”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The four living creatures said, “Amen,” and the elders fell down and worshiped.
