document_id: ISA.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Devastation of the Earth
  - type: text
    content: 'See, the '
  - type: text
    content: Lord
  - type: text
    content: ' is going to lay waste the earth'
  - type: text
    content: and devastate it;
  - type: text
    content: he will ruin its face
  - type: text
    content: and scatter its inhabitants—
  '10':
  - type: text
    content: The ruined city lies desolate;
  - type: text
    content: the entrance to every house is barred.
  '11':
  - type: text
    content: In the streets they cry out for wine;
  - type: text
    content: all joy turns to gloom,
  - type: text
    content: all joyful sounds are banished from the earth.
  '12':
  - type: text
    content: The city is left in ruins,
  - type: text
    content: its gate is battered to pieces.
  '13':
  - type: text
    content: So will it be on the earth
  - type: text
    content: and among the nations,
  - type: text
    content: as when an olive tree is beaten,
  - type: text
    content: or as when gleanings are left after the grape harvest.
  '14':
  - type: text
    content: They raise their voices, they shout for joy;
  - type: text
    content: 'from the west they acclaim the '
  - type: text
    content: Lord
  - type: text
    content: ’s majesty.
  '15':
  - type: text
    content: 'Therefore in the east give glory to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'exalt the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: in the islands of the sea.
  '16':
  - type: text
    content: 'From the ends of the earth we hear singing:'
  - type: text
    content: “Glory to the Righteous One.”
  - type: text
    content: But I said, “I waste away, I waste away!
  - type: text
    content: Woe to me!
  - type: text
    content: The treacherous betray!
  - type: text
    content: With treachery the treacherous betray!”
  '17':
  - type: text
    content: Terror and pit and snare await you,
  - type: text
    content: people of the earth.
  '18':
  - type: text
    content: Whoever flees at the sound of terror
  - type: text
    content: will fall into a pit;
  - type: text
    content: whoever climbs out of the pit
  - type: text
    content: will be caught in a snare.
  - type: text
    content: The floodgates of the heavens are opened,
  - type: text
    content: the foundations of the earth shake.
  '19':
  - type: text
    content: The earth is broken up,
  - type: text
    content: the earth is split asunder,
  - type: text
    content: the earth is violently shaken.
  '2':
  - type: text
    content: it will be the same
  - type: text
    content: for priest as for people,
  - type: text
    content: for the master as for his servant,
  - type: text
    content: for the mistress as for her servant,
  - type: text
    content: for seller as for buyer,
  - type: text
    content: for borrower as for lender,
  - type: text
    content: for debtor as for creditor.
  '20':
  - type: text
    content: The earth reels like a drunkard,
  - type: text
    content: it sways like a hut in the wind;
  - type: text
    content: so heavy upon it is the guilt of its rebellion
  - type: text
    content: that it falls—never to rise again.
  '21':
  - type: text
    content: 'In that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will punish'
  - type: text
    content: the powers in the heavens above
  - type: text
    content: and the kings on the earth below.
  '22':
  - type: text
    content: They will be herded together
  - type: text
    content: like prisoners bound in a dungeon;
  - type: text
    content: they will be shut up in prison
  - type: text
    content: and be punished
  - type: note
    content: Or released
  - type: text
    content: ' after many days.'
  '23':
  - type: text
    content: The moon will be dismayed,
  - type: text
    content: the sun ashamed;
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will reign'
  - type: text
    content: on Mount Zion and in Jerusalem,
  - type: text
    content: and before its elders—with great glory.
  '3':
  - type: text
    content: The earth will be completely laid waste
  - type: text
    content: and totally plundered.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken this word.'
  '4':
  - type: text
    content: The earth dries up and withers,
  - type: text
    content: the world languishes and withers,
  - type: text
    content: the heavens languish with the earth.
  '5':
  - type: text
    content: The earth is defiled by its people;
  - type: text
    content: they have disobeyed the laws,
  - type: text
    content: violated the statutes
  - type: text
    content: and broken the everlasting covenant.
  '6':
  - type: text
    content: Therefore a curse consumes the earth;
  - type: text
    content: its people must bear their guilt.
  - type: text
    content: Therefore earth’s inhabitants are burned up,
  - type: text
    content: and very few are left.
  '7':
  - type: text
    content: The new wine dries up and the vine withers;
  - type: text
    content: all the merrymakers groan.
  '8':
  - type: text
    content: The joyful timbrels are stilled,
  - type: text
    content: the noise of the revelers has stopped,
  - type: text
    content: the joyful harp is silent.
  '9':
  - type: text
    content: No longer do they drink wine with a song;
  - type: text
    content: the beer is bitter to its drinkers.
