document_id: ISA.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Devastation of the Earth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'See, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is going to lay waste the earth'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and devastate it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will ruin its face
- type: usfm
  marker: q2
  children:
  - type: text
    text: and scatter its inhabitants—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: it will be the same
- type: usfm
  marker: q2
  children:
  - type: text
    text: for priest as for people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the master as for his servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the mistress as for her servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for seller as for buyer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for borrower as for lender,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for debtor as for creditor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The earth will be completely laid waste
- type: usfm
  marker: q2
  children:
  - type: text
    text: and totally plundered.
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken this word.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The earth dries up and withers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the world languishes and withers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the heavens languish with the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The earth is defiled by its people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have disobeyed the laws,
- type: usfm
  marker: q1
  children:
  - type: text
    text: violated the statutes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and broken the everlasting covenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore a curse consumes the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its people must bear their guilt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore earth’s inhabitants are burned up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and very few are left.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The new wine dries up and the vine withers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the merrymakers groan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The joyful timbrels are stilled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the noise of the revelers has stopped,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the joyful harp is silent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: No longer do they drink wine with a song;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the beer is bitter to its drinkers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The ruined city lies desolate;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the entrance to every house is barred.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: In the streets they cry out for wine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all joy turns to gloom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all joyful sounds are banished from the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The city is left in ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its gate is battered to pieces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So will it be on the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and among the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as when an olive tree is beaten,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or as when gleanings are left after the grape harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They raise their voices, they shout for joy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'from the west they acclaim the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s majesty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore in the east give glory to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'exalt the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the islands of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'From the ends of the earth we hear singing:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Glory to the Righteous One.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I said, “I waste away, I waste away!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Woe to me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The treacherous betray!
- type: usfm
  marker: q2
  children:
  - type: text
    text: With treachery the treacherous betray!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Terror and pit and snare await you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: people of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Whoever flees at the sound of terror
- type: usfm
  marker: q2
  children:
  - type: text
    text: will fall into a pit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: whoever climbs out of the pit
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be caught in a snare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The floodgates of the heavens are opened,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the foundations of the earth shake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The earth is broken up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth is split asunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth is violently shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The earth reels like a drunkard,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it sways like a hut in the wind;
- type: usfm
  marker: q1
  children:
  - type: text
    text: so heavy upon it is the guilt of its rebellion
- type: usfm
  marker: q2
  children:
  - type: text
    text: that it falls—never to rise again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In that day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will punish'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the powers in the heavens above
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the kings on the earth below.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They will be herded together
- type: usfm
  marker: q2
  children:
  - type: text
    text: like prisoners bound in a dungeon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will be shut up in prison
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be punished
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: released
    marker-yv: yv-n
  - type: text
    text: ' after many days.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The moon will be dismayed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sun ashamed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty will reign'
- type: usfm
  marker: q2
  children:
  - type: text
    text: on Mount Zion and in Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and before its elders—with great glory.
