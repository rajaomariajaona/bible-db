document_id: JER.52,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jerusalem
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. His mother’s name was Hamutal daughter of Jeremiah; she was from Libnah. '
  '10':
  - type: text
    content: 'There at Riblah the king of Babylon killed the sons of Zedekiah before his eyes; he also killed all the officials of Judah. '
  '11':
  - type: text
    content: Then he put out Zedekiah’s eyes, bound him with bronze shackles and took him to Babylon, where he put him in prison till the day of his death.
  '12':
  - type: text
    content: 'On the tenth day of the fifth month, in the nineteenth year of Nebuchadnezzar king of Babylon, Nebuzaradan commander of the imperial guard, who served the king of Babylon, came to Jerusalem. '
  '13':
  - type: text
    content: 'He set fire to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the royal palace and all the houses of Jerusalem. Every important building he burned down. '
  '14':
  - type: text
    content: 'The whole Babylonian army, under the commander of the imperial guard, broke down all the walls around Jerusalem. '
  '15':
  - type: text
    content: Nebuzaradan the commander of the guard carried into exile some of the poorest people and those who remained in the city, along with the rest of the craftsmen
  - type: note
    content: Or the populace
  - type: text
    content: ' and those who had deserted to the king of Babylon. '
  '16':
  - type: text
    content: But Nebuzaradan left behind the rest of the poorest people of the land to work the vineyards and fields.
  '17':
  - type: text
    content: 'The Babylonians broke up the bronze pillars, the movable stands and the bronze Sea that were at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and they carried all the bronze to Babylon. '
  '18':
  - type: text
    content: 'They also took away the pots, shovels, wick trimmers, sprinkling bowls, dishes and all the bronze articles used in the temple service. '
  '19':
  - type: text
    content: The commander of the imperial guard took away the basins, censers, sprinkling bowls, pots, lampstands, dishes and bowls used for drink offerings—all that were made of pure gold or silver.
  '2':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as Jehoiakim had done. '
  '20':
  - type: text
    content: 'The bronze from the two pillars, the Sea and the twelve bronze bulls under it, and the movable stands, which King Solomon had made for the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', was more than could be weighed. '
  '21':
  - type: text
    content: Each pillar was eighteen cubits high and twelve cubits in circumference
  - type: note
    content: That is, about 27 feet high and 18 feet in circumference or about 8.1 meters high and 5.4 meters in circumference
  - type: text
    content: '; each was four fingers thick, and hollow. '
  '22':
  - type: text
    content: The bronze capital on top of one pillar was five cubits
  - type: note
    content: That is, about 7 1/2 feet or about 2.3 meters
  - type: text
    content: ' high and was decorated with a network and pomegranates of bronze all around. The other pillar, with its pomegranates, was similar. '
  '23':
  - type: text
    content: There were ninety-six pomegranates on the sides; the total number of pomegranates above the surrounding network was a hundred.
  '24':
  - type: text
    content: 'The commander of the guard took as prisoners Seraiah the chief priest, Zephaniah the priest next in rank and the three doorkeepers. '
  '25':
  - type: text
    content: 'Of those still in the city, he took the officer in charge of the fighting men, and seven royal advisers. He also took the secretary who was chief officer in charge of conscripting the people of the land, sixty of whom were found in the city. '
  '26':
  - type: text
    content: 'Nebuzaradan the commander took them all and brought them to the king of Babylon at Riblah. '
  '27':
  - type: text
    content: There at Riblah, in the land of Hamath, the king had them executed.
  - type: text
    content: 'So Judah went into captivity, away from her land. '
  '28':
  - type: text
    content: 'This is the number of the people Nebuchadnezzar carried into exile:'
  - type: text
    content: in the seventh year,
  - type: text
    content: 3,023 Jews;
  '29':
  - type: text
    content: in Nebuchadnezzar’s eighteenth year,
  - type: text
    content: 832 people from Jerusalem;
  '3':
  - type: text
    content: 'It was because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger that all this happened to Jerusalem and Judah, and in the end he thrust them from his presence.
  - type: text
    content: Now Zedekiah rebelled against the king of Babylon.
  '30':
  - type: text
    content: in his twenty-third year,
  - type: text
    content: 745 Jews taken into exile by Nebuzaradan the commander of the imperial guard.
  - type: text
    content: There were 4,600 people in all.
  - type: heading
    content: Jehoiachin Released
  '31':
  - type: text
    content: 'In the thirty-seventh year of the exile of Jehoiachin king of Judah, in the year Awel-Marduk became king of Babylon, on the twenty-fifth day of the twelfth month, he released Jehoiachin king of Judah and freed him from prison. '
  '32':
  - type: text
    content: 'He spoke kindly to him and gave him a seat of honor higher than those of the other kings who were with him in Babylon. '
  '33':
  - type: text
    content: 'So Jehoiachin put aside his prison clothes and for the rest of his life ate regularly at the king’s table. '
  '34':
  - type: text
    content: Day by day the king of Babylon gave Jehoiachin a regular allowance as long as he lived, till the day of his death.
  '4':
  - type: text
    content: 'So in the ninth year of Zedekiah’s reign, on the tenth day of the tenth month, Nebuchadnezzar king of Babylon marched against Jerusalem with his whole army. They encamped outside the city and built siege works all around it. '
  '5':
  - type: text
    content: The city was kept under siege until the eleventh year of King Zedekiah.
  '6':
  - type: text
    content: 'By the ninth day of the fourth month the famine in the city had become so severe that there was no food for the people to eat. '
  '7':
  - type: text
    content: Then the city wall was broken through, and the whole army fled. They left the city at night through the gate between the two walls near the king’s garden, though the Babylonians
  - type: note
    content: Or Chaldeans; also in verse 17
  - type: text
    content: ' were surrounding the city. They fled toward the Arabah,'
  - type: note
    content: Or the Jordan Valley
  - type: text
    content: ' '
  '8':
  - type: text
    content: but the Babylonian
  - type: note
    content: Or Chaldean; also in verse 14
  - type: text
    content: ' army pursued King Zedekiah and overtook him in the plains of Jericho. All his soldiers were separated from him and scattered, '
  '9':
  - type: text
    content: and he was captured.
  - type: text
    content: 'He was taken to the king of Babylon at Riblah in the land of Hamath, where he pronounced sentence on him. '
