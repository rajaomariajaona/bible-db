document_id: 1CH.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Divisions of Priests
  - type: text
    content: 'These were the divisions of the descendants of Aaron:'
  - type: text
    content: 'The sons of Aaron were Nadab, Abihu, Eleazar and Ithamar. '
  '10':
  - type: text
    content: the seventh to Hakkoz,
  - type: text
    content: the eighth to Abijah,
  '11':
  - type: text
    content: the ninth to Jeshua,
  - type: text
    content: the tenth to Shekaniah,
  '12':
  - type: text
    content: the eleventh to Eliashib,
  - type: text
    content: the twelfth to Jakim,
  '13':
  - type: text
    content: the thirteenth to Huppah,
  - type: text
    content: the fourteenth to Jeshebeab,
  '14':
  - type: text
    content: the fifteenth to Bilgah,
  - type: text
    content: the sixteenth to Immer,
  '15':
  - type: text
    content: the seventeenth to Hezir,
  - type: text
    content: the eighteenth to Happizzez,
  '16':
  - type: text
    content: the nineteenth to Pethahiah,
  - type: text
    content: the twentieth to Jehezkel,
  '17':
  - type: text
    content: the twenty-first to Jakin,
  - type: text
    content: the twenty-second to Gamul,
  '18':
  - type: text
    content: the twenty-third to Delaiah
  - type: text
    content: and the twenty-fourth to Maaziah.
  '19':
  - type: text
    content: 'This was their appointed order of ministering when they entered the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', according to the regulations prescribed for them by their ancestor Aaron, as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, had commanded him.'
  - type: heading
    content: The Rest of the Levites
  '2':
  - type: text
    content: 'But Nadab and Abihu died before their father did, and they had no sons; so Eleazar and Ithamar served as the priests. '
  '20':
  - type: text
    content: 'As for the rest of the descendants of Levi:'
  - type: text
    content: 'from the sons of Amram: Shubael;'
  - type: text
    content: 'from the sons of Shubael: Jehdeiah.'
  '21':
  - type: text
    content: 'As for Rehabiah, from his sons:'
  - type: text
    content: Ishiah was the first.
  '22':
  - type: text
    content: 'From the Izharites: Shelomoth;'
  - type: text
    content: 'from the sons of Shelomoth: Jahath.'
  '23':
  - type: text
    content: 'The sons of Hebron: Jeriah the first,'
  - type: note
    content: 'Two Hebrew manuscripts and some Septuagint manuscripts (see also 23:19); most Hebrew manuscripts The sons of Jeriah:'
  - type: text
    content: ' Amariah the second, Jahaziel the third and Jekameam the fourth.'
  '24':
  - type: text
    content: 'The son of Uzziel: Micah;'
  - type: text
    content: 'from the sons of Micah: Shamir.'
  '25':
  - type: text
    content: 'The brother of Micah: Ishiah;'
  - type: text
    content: 'from the sons of Ishiah: Zechariah.'
  '26':
  - type: text
    content: 'The sons of Merari: Mahli and Mushi.'
  - type: text
    content: 'The son of Jaaziah: Beno.'
  '27':
  - type: text
    content: 'The sons of Merari:'
  - type: text
    content: 'from Jaaziah: Beno, Shoham, Zakkur and Ibri.'
  '28':
  - type: text
    content: 'From Mahli: Eleazar, who had no sons.'
  '29':
  - type: text
    content: 'From Kish: the son of Kish:'
  - type: text
    content: Jerahmeel.
  '3':
  - type: text
    content: 'With the help of Zadok a descendant of Eleazar and Ahimelek a descendant of Ithamar, David separated them into divisions for their appointed order of ministering. '
  '30':
  - type: text
    content: 'And the sons of Mushi: Mahli, Eder and Jerimoth.'
  - type: text
    content: 'These were the Levites, according to their families. '
  '31':
  - type: text
    content: They also cast lots, just as their relatives the descendants of Aaron did, in the presence of King David and of Zadok, Ahimelek, and the heads of families of the priests and of the Levites. The families of the oldest brother were treated the same as those of the youngest.
  '4':
  - type: text
    content: 'A larger number of leaders were found among Eleazar’s descendants than among Ithamar’s, and they were divided accordingly: sixteen heads of families from Eleazar’s descendants and eight heads of families from Ithamar’s descendants. '
  '5':
  - type: text
    content: They divided them impartially by casting lots, for there were officials of the sanctuary and officials of God among the descendants of both Eleazar and Ithamar.
  '6':
  - type: text
    content: 'The scribe Shemaiah son of Nethanel, a Levite, recorded their names in the presence of the king and of the officials: Zadok the priest, Ahimelek son of Abiathar and the heads of families of the priests and of the Levites—one family being taken from Eleazar and then one from Ithamar.'
  '7':
  - type: text
    content: The first lot fell to Jehoiarib,
  - type: text
    content: the second to Jedaiah,
  '8':
  - type: text
    content: the third to Harim,
  - type: text
    content: the fourth to Seorim,
  '9':
  - type: text
    content: the fifth to Malkijah,
  - type: text
    content: the sixth to Mijamin,
