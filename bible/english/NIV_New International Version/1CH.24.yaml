document_id: 1CH.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Divisions of Priests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These were the divisions of the descendants of Aaron:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The sons of Aaron were Nadab, Abihu, Eleazar and Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But Nadab and Abihu died before their father did, and they had no sons; so Eleazar and Ithamar served as the priests. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'With the help of Zadok a descendant of Eleazar and Ahimelek a descendant of Ithamar, David separated them into divisions for their appointed order of ministering. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A larger number of leaders were found among Eleazar’s descendants than among Ithamar’s, and they were divided accordingly: sixteen heads of families from Eleazar’s descendants and eight heads of families from Ithamar’s descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They divided them impartially by casting lots, for there were officials of the sanctuary and officials of God among the descendants of both Eleazar and Ithamar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The scribe Shemaiah son of Nethanel, a Levite, recorded their names in the presence of the king and of the officials: Zadok the priest, Ahimelek son of Abiathar and the heads of families of the priests and of the Levites—one family being taken from Eleazar and then one from Ithamar.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The first lot fell to Jehoiarib,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the second to Jedaiah,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: the third to Harim,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the fourth to Seorim,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: the fifth to Malkijah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the sixth to Mijamin,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: the seventh to Hakkoz,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the eighth to Abijah,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: the ninth to Jeshua,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the tenth to Shekaniah,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: the eleventh to Eliashib,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the twelfth to Jakim,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: the thirteenth to Huppah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the fourteenth to Jeshebeab,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: the fifteenth to Bilgah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the sixteenth to Immer,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: the seventeenth to Hezir,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the eighteenth to Happizzez,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: the nineteenth to Pethahiah,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the twentieth to Jehezkel,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: the twenty-first to Jakin,
- type: usfm
  marker: li1
  children:
  - type: text
    text: the twenty-second to Gamul,
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: the twenty-third to Delaiah
- type: usfm
  marker: li1
  children:
  - type: text
    text: and the twenty-fourth to Maaziah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'This was their appointed order of ministering when they entered the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', according to the regulations prescribed for them by their ancestor Aaron, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, had commanded him.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rest of the Levites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As for the rest of the descendants of Levi:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'from the sons of Amram: Shubael;'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from the sons of Shubael: Jehdeiah.'
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'As for Rehabiah, from his sons:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ishiah was the first.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'From the Izharites: Shelomoth;'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from the sons of Shelomoth: Jahath.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sons of Hebron: Jeriah the first,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Two Hebrew manuscripts and some Septuagint manuscripts (see also 23:19); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The sons of Jeriah:'
    marker-yv: yv-n
  - type: text
    text: ' Amariah the second, Jahaziel the third and Jekameam the fourth.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The son of Uzziel: Micah;'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from the sons of Micah: Shamir.'
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The brother of Micah: Ishiah;'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from the sons of Ishiah: Zechariah.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The sons of Merari: Mahli and Mushi.'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'The son of Jaaziah: Beno.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The sons of Merari:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'from Jaaziah: Beno, Shoham, Zakkur and Ibri.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'From Mahli: Eleazar, who had no sons.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'From Kish: the son of Kish:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jerahmeel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And the sons of Mushi: Mahli, Eder and Jerimoth.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'These were the Levites, according to their families. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: They also cast lots, just as their relatives the descendants of Aaron did, in the presence of King David and of Zadok, Ahimelek, and the heads of families of the priests and of the Levites. The families of the oldest brother were treated the same as those of the youngest.
