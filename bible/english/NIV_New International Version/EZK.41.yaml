document_id: EZK.41,111
type_code: eng
verses:
  '1':
  - type: text
    content: Then the man brought me to the main hall and measured the jambs; the width of the jambs was six cubits
  - type: note
    content: That is, about 11 feet or about 3.2 meters; also in verses 3, 5 and 8
  - type: text
    content: ' on each side.'
  - type: note
    content: One Hebrew manuscript and Septuagint; most Hebrew manuscripts side, the width of the tent
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'and the priests’ rooms was twenty cubits wide all around the temple. '
  '11':
  - type: text
    content: There were entrances to the side rooms from the open area, one on the north and another on the south; and the base adjoining the open area was five cubits wide all around.
  '12':
  - type: text
    content: The building facing the temple courtyard on the west side was seventy cubits
  - type: note
    content: That is, about 123 feet or about 37 meters
  - type: text
    content: ' wide. The wall of the building was five cubits thick all around, and its length was ninety cubits.'
  - type: note
    content: That is, about 158 feet or about 48 meters
  '13':
  - type: text
    content: Then he measured the temple; it was a hundred cubits
  - type: note
    content: That is, about 175 feet or about 53 meters; also in verses 14 and 15
  - type: text
    content: ' long, and the temple courtyard and the building with its walls were also a hundred cubits long. '
  '14':
  - type: text
    content: The width of the temple courtyard on the east, including the front of the temple, was a hundred cubits.
  '15':
  - type: text
    content: Then he measured the length of the building facing the courtyard at the rear of the temple, including its galleries on each side; it was a hundred cubits.
  - type: text
    content: 'The main hall, the inner sanctuary and the portico facing the court, '
  '16':
  - type: text
    content: 'as well as the thresholds and the narrow windows and galleries around the three of them—everything beyond and including the threshold was covered with wood. The floor, the wall up to the windows, and the windows were covered. '
  '17':
  - type: text
    content: 'In the space above the outside of the entrance to the inner sanctuary and on the walls at regular intervals all around the inner and outer sanctuary '
  '18':
  - type: text
    content: 'were carved cherubim and palm trees. Palm trees alternated with cherubim. Each cherub had two faces: '
  '19':
  - type: text
    content: 'the face of a human being toward the palm tree on one side and the face of a lion toward the palm tree on the other. They were carved all around the whole temple. '
  '2':
  - type: text
    content: The entrance was ten cubits
  - type: note
    content: That is, about 18 feet or about 5.3 meters
  - type: text
    content: ' wide, and the projecting walls on each side of it were five cubits'
  - type: note
    content: That is, about 8 3/4 feet or about 2.7 meters; also in verses 9, 11 and 12
  - type: text
    content: ' wide. He also measured the main hall; it was forty cubits long and twenty cubits wide.'
  - type: note
    content: That is, about 70 feet long and 35 feet wide or about 21 meters long and 11 meters wide
  '20':
  - type: text
    content: From the floor to the area above the entrance, cherubim and palm trees were carved on the wall of the main hall.
  '21':
  - type: text
    content: 'The main hall had a rectangular doorframe, and the one at the front of the Most Holy Place was similar. '
  '22':
  - type: text
    content: There was a wooden altar three cubits
  - type: note
    content: That is, about 5 1/4 feet or about 1.5 meters
  - type: text
    content: ' high and two cubits square'
  - type: note
    content: Septuagint; Hebrew long
  - type: text
    content: ; its corners, its base
  - type: note
    content: Septuagint; Hebrew length
  - type: text
    content: ' and its sides were of wood. The man said to me, “This is the table that is before the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '23':
  - type: text
    content: 'Both the main hall and the Most Holy Place had double doors. '
  '24':
  - type: text
    content: 'Each door had two leaves—two hinged leaves for each door. '
  '25':
  - type: text
    content: 'And on the doors of the main hall were carved cherubim and palm trees like those carved on the walls, and there was a wooden overhang on the front of the portico. '
  '26':
  - type: text
    content: On the sidewalls of the portico were narrow windows with palm trees carved on each side. The side rooms of the temple also had overhangs.
  '3':
  - type: text
    content: Then he went into the inner sanctuary and measured the jambs of the entrance; each was two cubits
  - type: note
    content: That is, about 3 1/2 feet or about 1.1 meters; also in verse 22
  - type: text
    content: ' wide. The entrance was six cubits wide, and the projecting walls on each side of it were seven cubits'
  - type: note
    content: That is, about 12 feet or about 3.7 meters
  - type: text
    content: ' wide. '
  '4':
  - type: text
    content: And he measured the length of the inner sanctuary; it was twenty cubits, and its width was twenty cubits across the end of the main hall. He said to me, “This is the Most Holy Place.”
  '5':
  - type: text
    content: Then he measured the wall of the temple; it was six cubits thick, and each side room around the temple was four cubits
  - type: note
    content: That is, about 7 feet or about 2.1 meters
  - type: text
    content: ' wide. '
  '6':
  - type: text
    content: 'The side rooms were on three levels, one above another, thirty on each level. There were ledges all around the wall of the temple to serve as supports for the side rooms, so that the supports were not inserted into the wall of the temple. '
  '7':
  - type: text
    content: The side rooms all around the temple were wider at each successive level. The structure surrounding the temple was built in ascending stages, so that the rooms widened as one went upward. A stairway went up from the lowest floor to the top floor through the middle floor.
  '8':
  - type: text
    content: 'I saw that the temple had a raised base all around it, forming the foundation of the side rooms. It was the length of the rod, six long cubits. '
  '9':
  - type: text
    content: 'The outer wall of the side rooms was five cubits thick. The open area between the side rooms of the temple '
