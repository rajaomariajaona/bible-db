document_id: EZK.41
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Then the man brought me to the main hall and measured the jambs; the width of the jambs was six cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 11 feet or about 3.2 meters; also in verses 3, 5 and 8
    marker-yv: yv-n
  - type: text
    text: ' on each side.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One Hebrew manuscript and Septuagint; most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: side, the width of the tent
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The entrance was ten cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 18 feet or about 5.3 meters
    marker-yv: yv-n
  - type: text
    text: ' wide, and the projecting walls on each side of it were five cubits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 8 3/4 feet or about 2.7 meters; also in verses 9, 11 and 12
    marker-yv: yv-n
  - type: text
    text: ' wide. He also measured the main hall; it was forty cubits long and twenty cubits wide.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 70 feet long and 35 feet wide or about 21 meters long and 11 meters wide
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then he went into the inner sanctuary and measured the jambs of the entrance; each was two cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 1/2 feet or about 1.1 meters; also in verse 22
    marker-yv: yv-n
  - type: text
    text: ' wide. The entrance was six cubits wide, and the projecting walls on each side of it were seven cubits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 12 feet or about 3.7 meters
    marker-yv: yv-n
  - type: text
    text: ' wide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And he measured the length of the inner sanctuary; it was twenty cubits, and its width was twenty cubits across the end of the main hall. He said to me, “This is the Most Holy Place.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then he measured the wall of the temple; it was six cubits thick, and each side room around the temple was four cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 7 feet or about 2.1 meters
    marker-yv: yv-n
  - type: text
    text: ' wide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The side rooms were on three levels, one above another, thirty on each level. There were ledges all around the wall of the temple to serve as supports for the side rooms, so that the supports were not inserted into the wall of the temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The side rooms all around the temple were wider at each successive level. The structure surrounding the temple was built in ascending stages, so that the rooms widened as one went upward. A stairway went up from the lowest floor to the top floor through the middle floor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I saw that the temple had a raised base all around it, forming the foundation of the side rooms. It was the length of the rod, six long cubits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The outer wall of the side rooms was five cubits thick. The open area between the side rooms of the temple '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and the priests’ rooms was twenty cubits wide all around the temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: There were entrances to the side rooms from the open area, one on the north and another on the south; and the base adjoining the open area was five cubits wide all around.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The building facing the temple courtyard on the west side was seventy cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 123 feet or about 37 meters
    marker-yv: yv-n
  - type: text
    text: ' wide. The wall of the building was five cubits thick all around, and its length was ninety cubits.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 158 feet or about 48 meters
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then he measured the temple; it was a hundred cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 175 feet or about 53 meters; also in verses 14 and 15
    marker-yv: yv-n
  - type: text
    text: ' long, and the temple courtyard and the building with its walls were also a hundred cubits long. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The width of the temple courtyard on the east, including the front of the temple, was a hundred cubits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then he measured the length of the building facing the courtyard at the rear of the temple, including its galleries on each side; it was a hundred cubits.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The main hall, the inner sanctuary and the portico facing the court, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'as well as the thresholds and the narrow windows and galleries around the three of them—everything beyond and including the threshold was covered with wood. The floor, the wall up to the windows, and the windows were covered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'In the space above the outside of the entrance to the inner sanctuary and on the walls at regular intervals all around the inner and outer sanctuary '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'were carved cherubim and palm trees. Palm trees alternated with cherubim. Each cherub had two faces: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'the face of a human being toward the palm tree on one side and the face of a lion toward the palm tree on the other. They were carved all around the whole temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: From the floor to the area above the entrance, cherubim and palm trees were carved on the wall of the main hall.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The main hall had a rectangular doorframe, and the one at the front of the Most Holy Place was similar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: There was a wooden altar three cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 5 1/4 feet or about 1.5 meters
    marker-yv: yv-n
  - type: text
    text: ' high and two cubits square'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: long
    marker-yv: yv-n
  - type: text
    text: ; its corners, its base
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: length
    marker-yv: yv-n
  - type: text
    text: ' and its sides were of wood. The man said to me, “This is the table that is before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Both the main hall and the Most Holy Place had double doors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Each door had two leaves—two hinged leaves for each door. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'And on the doors of the main hall were carved cherubim and palm trees like those carved on the walls, and there was a wooden overhang on the front of the portico. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: On the sidewalls of the portico were narrow windows with palm trees carved on each side. The side rooms of the temple also had overhangs.
