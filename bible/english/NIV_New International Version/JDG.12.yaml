document_id: JDG.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jephthah and Ephraim
  - type: text
    content: The Ephraimite forces were called out, and they crossed over to Zaphon. They said to Jephthah, “Why did you go to fight the Ammonites without calling us to go with you? We’re going to burn down your house over your head.”
  '10':
  - type: text
    content: Then Ibzan died and was buried in Bethlehem.
  '11':
  - type: text
    content: 'After him, Elon the Zebulunite led Israel ten years. '
  '12':
  - type: text
    content: Then Elon died and was buried in Aijalon in the land of Zebulun.
  '13':
  - type: text
    content: 'After him, Abdon son of Hillel, from Pirathon, led Israel. '
  '14':
  - type: text
    content: 'He had forty sons and thirty grandsons, who rode on seventy donkeys. He led Israel eight years. '
  '15':
  - type: text
    content: Then Abdon son of Hillel died and was buried at Pirathon in Ephraim, in the hill country of the Amalekites.
  '2':
  - type: text
    content: 'Jephthah answered, “I and my people were engaged in a great struggle with the Ammonites, and although I called, you didn’t save me out of their hands. '
  '3':
  - type: text
    content: 'When I saw that you wouldn’t help, I took my life in my hands and crossed over to fight the Ammonites, and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me the victory over them. Now why have you come up today to fight me?”'
  '4':
  - type: text
    content: 'Jephthah then called together the men of Gilead and fought against Ephraim. The Gileadites struck them down because the Ephraimites had said, “You Gileadites are renegades from Ephraim and Manasseh.” '
  '5':
  - type: text
    content: 'The Gileadites captured the fords of the Jordan leading to Ephraim, and whenever a survivor of Ephraim said, “Let me cross over,” the men of Gilead asked him, “Are you an Ephraimite?” If he replied, “No,” '
  '6':
  - type: text
    content: they said, “All right, say ‘Shibboleth.’ ” If he said, “Sibboleth,” because he could not pronounce the word correctly, they seized him and killed him at the fords of the Jordan. Forty-two thousand Ephraimites were killed at that time.
  '7':
  - type: text
    content: Jephthah led
  - type: note
    content: Traditionally judged; also in verses 8-14
  - type: text
    content: ' Israel six years. Then Jephthah the Gileadite died and was buried in a town in Gilead.'
  - type: heading
    content: Ibzan, Elon and Abdon
  '8':
  - type: text
    content: 'After him, Ibzan of Bethlehem led Israel. '
  '9':
  - type: text
    content: 'He had thirty sons and thirty daughters. He gave his daughters away in marriage to those outside his clan, and for his sons he brought in thirty young women as wives from outside his clan. Ibzan led Israel seven years. '
