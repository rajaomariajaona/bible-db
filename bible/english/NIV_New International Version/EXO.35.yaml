document_id: EXO.35,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Sabbath Regulations
  - type: text
    content: 'Moses assembled the whole Israelite community and said to them, “These are the things the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded you to do: '
  '10':
  - type: text
    content: '“All who are skilled among you are to come and make everything the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: '
  '11':
  - type: text
    content: 'the tabernacle with its tent and its covering, clasps, frames, crossbars, posts and bases; '
  '12':
  - type: text
    content: 'the ark with its poles and the atonement cover and the curtain that shields it; '
  '13':
  - type: text
    content: 'the table with its poles and all its articles and the bread of the Presence; '
  '14':
  - type: text
    content: 'the lampstand that is for light with its accessories, lamps and oil for the light; '
  '15':
  - type: text
    content: 'the altar of incense with its poles, the anointing oil and the fragrant incense; the curtain for the doorway at the entrance to the tabernacle; '
  '16':
  - type: text
    content: 'the altar of burnt offering with its bronze grating, its poles and all its utensils; the bronze basin with its stand; '
  '17':
  - type: text
    content: 'the curtains of the courtyard with its posts and bases, and the curtain for the entrance to the courtyard; '
  '18':
  - type: text
    content: 'the tent pegs for the tabernacle and for the courtyard, and their ropes; '
  '19':
  - type: text
    content: the woven garments worn for ministering in the sanctuary—both the sacred garments for Aaron the priest and the garments for his sons when they serve as priests.”
  '2':
  - type: text
    content: 'For six days, work is to be done, but the seventh day shall be your holy day, a day of sabbath rest to the '
  - type: text
    content: Lord
  - type: text
    content: '. Whoever does any work on it is to be put to death. '
  '20':
  - type: text
    content: 'Then the whole Israelite community withdrew from Moses’ presence, '
  '21':
  - type: text
    content: 'and everyone who was willing and whose heart moved them came and brought an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' for the work on the tent of meeting, for all its service, and for the sacred garments. '
  '22':
  - type: text
    content: 'All who were willing, men and women alike, came and brought gold jewelry of all kinds: brooches, earrings, rings and ornaments. They all presented their gold as a wave offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Everyone who had blue, purple or scarlet yarn or fine linen, or goat hair, ram skins dyed red or the other durable leather brought them. '
  '24':
  - type: text
    content: 'Those presenting an offering of silver or bronze brought it as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', and everyone who had acacia wood for any part of the work brought it. '
  '25':
  - type: text
    content: 'Every skilled woman spun with her hands and brought what she had spun—blue, purple or scarlet yarn or fine linen. '
  '26':
  - type: text
    content: 'And all the women who were willing and had the skill spun the goat hair. '
  '27':
  - type: text
    content: 'The leaders brought onyx stones and other gems to be mounted on the ephod and breastpiece. '
  '28':
  - type: text
    content: 'They also brought spices and olive oil for the light and for the anointing oil and for the fragrant incense. '
  '29':
  - type: text
    content: 'All the Israelite men and women who were willing brought to the '
  - type: text
    content: Lord
  - type: text
    content: ' freewill offerings for all the work the '
  - type: text
    content: Lord
  - type: text
    content: ' through Moses had commanded them to do.'
  - type: heading
    content: Bezalel and Oholiab
  '3':
  - type: text
    content: Do not light a fire in any of your dwellings on the Sabbath day.”
  - type: heading
    content: Materials for the Tabernacle
  '30':
  - type: text
    content: 'Then Moses said to the Israelites, “See, the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen Bezalel son of Uri, the son of Hur, of the tribe of Judah, '
  '31':
  - type: text
    content: 'and he has filled him with the Spirit of God, with wisdom, with understanding, with knowledge and with all kinds of skills— '
  '32':
  - type: text
    content: 'to make artistic designs for work in gold, silver and bronze, '
  '33':
  - type: text
    content: 'to cut and set stones, to work in wood and to engage in all kinds of artistic crafts. '
  '34':
  - type: text
    content: 'And he has given both him and Oholiab son of Ahisamak, of the tribe of Dan, the ability to teach others. '
  '35':
  - type: text
    content: He has filled them with skill to do all kinds of work as engravers, designers, embroiderers in blue, purple and scarlet yarn and fine linen, and weavers—all of them skilled workers and designers.
  '4':
  - type: text
    content: 'Moses said to the whole Israelite community, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: '
  '5':
  - type: text
    content: 'From what you have, take an offering for the '
  - type: text
    content: Lord
  - type: text
    content: '. Everyone who is willing is to bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' an offering of gold, silver and bronze; '
  '6':
  - type: text
    content: 'blue, purple and scarlet yarn and fine linen; goat hair; '
  '7':
  - type: text
    content: ram skins dyed red and another type of durable leather
  - type: note
    content: Possibly the hides of large aquatic mammals; also in verse 23
  - type: text
    content: '; acacia wood; '
  '8':
  - type: text
    content: 'olive oil for the light; spices for the anointing oil and for the fragrant incense; '
  '9':
  - type: text
    content: and onyx stones and other gems to be mounted on the ephod and breastpiece.
