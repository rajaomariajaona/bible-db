document_id: 2CH.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Asa’s Last Years
  - type: text
    content: In the thirty-sixth year of Asa’s reign Baasha king of Israel went up against Judah and fortified Ramah to prevent anyone from leaving or entering the territory of Asa king of Judah.
  '10':
  - type: text
    content: Asa was angry with the seer because of this; he was so enraged that he put him in prison. At the same time Asa brutally oppressed some of the people.
  '11':
  - type: text
    content: 'The events of Asa’s reign, from beginning to end, are written in the book of the kings of Judah and Israel. '
  '12':
  - type: text
    content: 'In the thirty-ninth year of his reign Asa was afflicted with a disease in his feet. Though his disease was severe, even in his illness he did not seek help from the '
  - type: text
    content: Lord
  - type: text
    content: ', but only from the physicians. '
  '13':
  - type: text
    content: 'Then in the forty-first year of his reign Asa died and rested with his ancestors. '
  '14':
  - type: text
    content: They buried him in the tomb that he had cut out for himself in the City of David. They laid him on a bier covered with spices and various blended perfumes, and they made a huge fire in his honor.
  '2':
  - type: text
    content: 'Asa then took the silver and gold out of the treasuries of the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple and of his own palace and sent it to Ben-Hadad king of Aram, who was ruling in Damascus. '
  '3':
  - type: text
    content: “Let there be a treaty between me and you,” he said, “as there was between my father and your father. See, I am sending you silver and gold. Now break your treaty with Baasha king of Israel so he will withdraw from me.”
  '4':
  - type: text
    content: Ben-Hadad agreed with King Asa and sent the commanders of his forces against the towns of Israel. They conquered Ijon, Dan, Abel Maim
  - type: note
    content: Also known as Abel Beth Maakah
  - type: text
    content: ' and all the store cities of Naphtali. '
  '5':
  - type: text
    content: 'When Baasha heard this, he stopped building Ramah and abandoned his work. '
  '6':
  - type: text
    content: Then King Asa brought all the men of Judah, and they carried away from Ramah the stones and timber Baasha had been using. With them he built up Geba and Mizpah.
  '7':
  - type: text
    content: 'At that time Hanani the seer came to Asa king of Judah and said to him: “Because you relied on the king of Aram and not on the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, the army of the king of Aram has escaped from your hand. '
  '8':
  - type: text
    content: Were not the Cushites
  - type: note
    content: That is, people from the upper Nile region
  - type: text
    content: ' and Libyans a mighty army with great numbers of chariots and horsemen'
  - type: note
    content: Or charioteers
  - type: text
    content: '? Yet when you relied on the '
  - type: text
    content: Lord
  - type: text
    content: ', he delivered them into your hand. '
  '9':
  - type: text
    content: 'For the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' range throughout the earth to strengthen those whose hearts are fully committed to him. You have done a foolish thing, and from now on you will be at war.”'
