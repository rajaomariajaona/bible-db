document_id: 2CH.16,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Asa’s Last Years
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the thirty-sixth year of Asa’s reign Baasha king of Israel went up against Judah and fortified Ramah to prevent anyone from leaving or entering the territory of Asa king of Judah.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Asa was angry with the seer because of this; he was so enraged that he put him in prison. At the same time Asa brutally oppressed some of the people.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The events of Asa’s reign, from beginning to end, are written in the book of the kings of Judah and Israel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the thirty-ninth year of his reign Asa was afflicted with a disease in his feet. Though his disease was severe, even in his illness he did not seek help from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but only from the physicians. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then in the forty-first year of his reign Asa died and rested with his ancestors. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They buried him in the tomb that he had cut out for himself in the City of David. They laid him on a bier covered with spices and various blended perfumes, and they made a huge fire in his honor.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asa then took the silver and gold out of the treasuries of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s temple and of his own palace and sent it to Ben-Hadad king of Aram, who was ruling in Damascus. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Let there be a treaty between me and you,” he said, “as there was between my father and your father. See, I am sending you silver and gold. Now break your treaty with Baasha king of Israel so he will withdraw from me.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ben-Hadad agreed with King Asa and sent the commanders of his forces against the towns of Israel. They conquered Ijon, Dan, Abel Maim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also known as '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abel Beth Maakah
      marker-yv: yv-n
    - type: text
      text: ' and all the store cities of Naphtali. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Baasha heard this, he stopped building Ramah and abandoned his work. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then King Asa brought all the men of Judah, and they carried away from Ramah the stones and timber Baasha had been using. With them he built up Geba and Mizpah.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Hanani the seer came to Asa king of Judah and said to him: “Because you relied on the king of Aram and not on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, the army of the king of Aram has escaped from your hand. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Were not the Cushites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, people from the upper Nile region
      marker-yv: yv-n
    - type: text
      text: ' and Libyans a mighty army with great numbers of chariots and horsemen'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: charioteers
      marker-yv: yv-n
    - type: text
      text: '? Yet when you relied on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he delivered them into your hand. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' range throughout the earth to strengthen those whose hearts are fully committed to him. You have done a foolish thing, and from now on you will be at war.”'
