document_id: PSA.97,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 97
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns, let the earth be glad;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the distant shores rejoice.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Let those who love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hate evil,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he guards the lives of his faithful ones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and delivers them from the hand of the wicked.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Light shines
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '97:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'One Hebrew manuscript and ancient versions (see also 112:4); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Light is sown
      marker-yv: yv-n
    - type: text
      text: ' on the righteous'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and joy on the upright in heart.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Rejoice in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you who are righteous,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and praise his holy name.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Clouds and thick darkness surround him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: righteousness and justice are the foundation of his throne.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fire goes before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and consumes his foes on every side.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: His lightning lights up the world;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the earth sees and trembles.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The mountains melt like wax before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before the Lord of all the earth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The heavens proclaim his righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all peoples see his glory.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: All who worship images are put to shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who boast in idols—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: worship him, all you gods!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Zion hears and rejoices
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the villages of Judah are glad
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because of your judgments, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are the Most High over all the earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are exalted far above all gods.
