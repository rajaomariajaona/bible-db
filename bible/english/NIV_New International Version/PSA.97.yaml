document_id: PSA.97,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 97
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns, let the earth be glad;'
  - type: text
    content: let the distant shores rejoice.
  '10':
  - type: text
    content: 'Let those who love the '
  - type: text
    content: Lord
  - type: text
    content: ' hate evil,'
  - type: text
    content: for he guards the lives of his faithful ones
  - type: text
    content: and delivers them from the hand of the wicked.
  '11':
  - type: text
    content: Light shines
  - type: note
    content: One Hebrew manuscript and ancient versions (see also 112:4); most Hebrew manuscripts Light is sown
  - type: text
    content: ' on the righteous'
  - type: text
    content: and joy on the upright in heart.
  '12':
  - type: text
    content: 'Rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: ', you who are righteous,'
  - type: text
    content: and praise his holy name.
  '2':
  - type: text
    content: Clouds and thick darkness surround him;
  - type: text
    content: righteousness and justice are the foundation of his throne.
  '3':
  - type: text
    content: Fire goes before him
  - type: text
    content: and consumes his foes on every side.
  '4':
  - type: text
    content: His lightning lights up the world;
  - type: text
    content: the earth sees and trembles.
  '5':
  - type: text
    content: 'The mountains melt like wax before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: before the Lord of all the earth.
  '6':
  - type: text
    content: The heavens proclaim his righteousness,
  - type: text
    content: and all peoples see his glory.
  '7':
  - type: text
    content: All who worship images are put to shame,
  - type: text
    content: those who boast in idols—
  - type: text
    content: worship him, all you gods!
  '8':
  - type: text
    content: Zion hears and rejoices
  - type: text
    content: and the villages of Judah are glad
  - type: text
    content: 'because of your judgments, '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: 'For you, '
  - type: text
    content: Lord
  - type: text
    content: ', are the Most High over all the earth;'
  - type: text
    content: you are exalted far above all gods.
