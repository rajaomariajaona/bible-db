document_id: EXO.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Plague of Locusts
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go to Pharaoh, for I have hardened his heart and the hearts of his officials so that I may perform these signs of mine among them '
  '10':
  - type: text
    content: 'Pharaoh said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' be with you—if I let you go, along with your women and children! Clearly you are bent on evil.'
  - type: note
    content: Or Be careful, trouble is in store for you!
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'No! Have only the men go and worship the '
  - type: text
    content: Lord
  - type: text
    content: ', since that’s what you have been asking for.” Then Moses and Aaron were driven out of Pharaoh’s presence.'
  '12':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Stretch out your hand over Egypt so that locusts swarm over the land and devour everything growing in the fields, everything left by the hail.”'
  '13':
  - type: text
    content: 'So Moses stretched out his staff over Egypt, and the '
  - type: text
    content: Lord
  - type: text
    content: ' made an east wind blow across the land all that day and all that night. By morning the wind had brought the locusts; '
  '14':
  - type: text
    content: 'they invaded all Egypt and settled down in every area of the country in great numbers. Never before had there been such a plague of locusts, nor will there ever be again. '
  '15':
  - type: text
    content: They covered all the ground until it was black. They devoured all that was left after the hail—everything growing in the fields and the fruit on the trees. Nothing green remained on tree or plant in all the land of Egypt.
  '16':
  - type: text
    content: 'Pharaoh quickly summoned Moses and Aaron and said, “I have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and against you. '
  '17':
  - type: text
    content: 'Now forgive my sin once more and pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God to take this deadly plague away from me.”'
  '18':
  - type: text
    content: 'Moses then left Pharaoh and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' changed the wind to a very strong west wind, which caught up the locusts and carried them into the Red Sea.'
  - type: note
    content: Or the Sea of Reeds
  - type: text
    content: ' Not a locust was left anywhere in Egypt. '
  '2':
  - type: text
    content: 'that you may tell your children and grandchildren how I dealt harshly with the Egyptians and how I performed my signs among them, and that you may know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '20':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' hardened Pharaoh’s heart, and he would not let the Israelites go.'
  - type: heading
    content: The Plague of Darkness
  '21':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Stretch out your hand toward the sky so that darkness spreads over Egypt—darkness that can be felt.” '
  '22':
  - type: text
    content: 'So Moses stretched out his hand toward the sky, and total darkness covered all Egypt for three days. '
  '23':
  - type: text
    content: No one could see anyone else or move about for three days. Yet all the Israelites had light in the places where they lived.
  '24':
  - type: text
    content: 'Then Pharaoh summoned Moses and said, “Go, worship the '
  - type: text
    content: Lord
  - type: text
    content: . Even your women and children may go with you; only leave your flocks and herds behind.”
  '25':
  - type: text
    content: 'But Moses said, “You must allow us to have sacrifices and burnt offerings to present to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. '
  '26':
  - type: text
    content: 'Our livestock too must go with us; not a hoof is to be left behind. We have to use some of them in worshiping the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, and until we get there we will not know what we are to use to worship the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '27':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' hardened Pharaoh’s heart, and he was not willing to let them go. '
  '28':
  - type: text
    content: Pharaoh said to Moses, “Get out of my sight! Make sure you do not appear before me again! The day you see my face you will die.”
  '29':
  - type: text
    content: “Just as you say,” Moses replied. “I will never appear before you again.”
  '3':
  - type: text
    content: 'So Moses and Aaron went to Pharaoh and said to him, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, says: ‘How long will you refuse to humble yourself before me? Let my people go, so that they may worship me. '
  '4':
  - type: text
    content: 'If you refuse to let them go, I will bring locusts into your country tomorrow. '
  '5':
  - type: text
    content: 'They will cover the face of the ground so that it cannot be seen. They will devour what little you have left after the hail, including every tree that is growing in your fields. '
  '6':
  - type: text
    content: They will fill your houses and those of all your officials and all the Egyptians—something neither your parents nor your ancestors have ever seen from the day they settled in this land till now.’ ” Then Moses turned and left Pharaoh.
  '7':
  - type: text
    content: 'Pharaoh’s officials said to him, “How long will this man be a snare to us? Let the people go, so that they may worship the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. Do you not yet realize that Egypt is ruined?”'
  '8':
  - type: text
    content: 'Then Moses and Aaron were brought back to Pharaoh. “Go, worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,” he said. “But tell me who will be going.”'
  '9':
  - type: text
    content: 'Moses answered, “We will go with our young and our old, with our sons and our daughters, and with our flocks and herds, because we are to celebrate a festival to the '
  - type: text
    content: Lord
  - type: text
    content: .”
