document_id: EPH.6,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Children, obey your parents in the Lord, for this is right. '
  '10':
  - type: text
    content: 'Finally, be strong in the Lord and in his mighty power. '
  '11':
  - type: text
    content: 'Put on the full armor of God, so that you can take your stand against the devil’s schemes. '
  '12':
  - type: text
    content: 'For our struggle is not against flesh and blood, but against the rulers, against the authorities, against the powers of this dark world and against the spiritual forces of evil in the heavenly realms. '
  '13':
  - type: text
    content: 'Therefore put on the full armor of God, so that when the day of evil comes, you may be able to stand your ground, and after you have done everything, to stand. '
  '14':
  - type: text
    content: 'Stand firm then, with the belt of truth buckled around your waist, with the breastplate of righteousness in place, '
  '15':
  - type: text
    content: 'and with your feet fitted with the readiness that comes from the gospel of peace. '
  '16':
  - type: text
    content: 'In addition to all this, take up the shield of faith, with which you can extinguish all the flaming arrows of the evil one. '
  '17':
  - type: text
    content: Take the helmet of salvation and the sword of the Spirit, which is the word of God.
  '18':
  - type: text
    content: 'And pray in the Spirit on all occasions with all kinds of prayers and requests. With this in mind, be alert and always keep on praying for all the Lord’s people. '
  '19':
  - type: text
    content: 'Pray also for me, that whenever I speak, words may be given me so that I will fearlessly make known the mystery of the gospel, '
  '2':
  - type: text
    content: '“Honor your father and mother”—which is the first commandment with a promise— '
  '20':
  - type: text
    content: for which I am an ambassador in chains. Pray that I may declare it fearlessly, as I should.
  - type: heading
    content: Final Greetings
  '21':
  - type: text
    content: 'Tychicus, the dear brother and faithful servant in the Lord, will tell you everything, so that you also may know how I am and what I am doing. '
  '22':
  - type: text
    content: I am sending him to you for this very purpose, that you may know how we are, and that he may encourage you.
  '23':
  - type: text
    content: Peace to the brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family.
  - type: text
    content: ' and love with faith from God the Father and the Lord Jesus Christ. '
  '24':
  - type: text
    content: Grace to all who love our Lord Jesus Christ with an undying love.
  - type: note
    content: Or Grace and immortality to all who love our Lord Jesus Christ.
  '3':
  - type: text
    content: “so that it may go well with you and that you may enjoy long life on the earth.”
  - type: note
    content: Deut. 5:16
  '4':
  - type: text
    content: Fathers,
  - type: note
    content: Or Parents
  - type: text
    content: ' do not exasperate your children; instead, bring them up in the training and instruction of the Lord.'
  '5':
  - type: text
    content: 'Slaves, obey your earthly masters with respect and fear, and with sincerity of heart, just as you would obey Christ. '
  '6':
  - type: text
    content: 'Obey them not only to win their favor when their eye is on you, but as slaves of Christ, doing the will of God from your heart. '
  '7':
  - type: text
    content: 'Serve wholeheartedly, as if you were serving the Lord, not people, '
  '8':
  - type: text
    content: because you know that the Lord will reward each one for whatever good they do, whether they are slave or free.
  '9':
  - type: text
    content: And masters, treat your slaves in the same way. Do not threaten them, since you know that he who is both their Master and yours is in heaven, and there is no favoritism with him.
  - type: heading
    content: The Armor of God
