document_id: ZEC.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Promises to Bless Jerusalem'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty came to me.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Before that time there were no wages for people or hire for animals. No one could go about their business safely because of their enemies, since I had turned everyone against their neighbor. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now I will not deal with the remnant of this people as I did in the past,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The seed will grow well, the vine will yield its fruit, the ground will produce its crops, and the heavens will drop their dew. I will give all these things as an inheritance to the remnant of this people. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Just as you, Judah and Israel, have been a curse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, your name has been used in cursing (see Jer. 29:22); or, you have been regarded as under a curse.
      marker-yv: yv-n
    - type: text
      text: ' among the nations, so I will save you, and you will be a blessing.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and your name will be used in blessings '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(see Gen. 48:20); or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and you will be seen as blessed
      marker-yv: yv-n
    - type: text
      text: ' Do not be afraid, but let your hands be strong.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “Just as I had determined to bring disaster on you and showed no pity when your ancestors angered me,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“so now I have determined to do good again to Jerusalem and Judah. Do not be afraid. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the things you are to do: Speak the truth to each other, and render true and sound judgment in your courts; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'do not plot evil against each other, and do not love to swear falsely. I hate all this,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty came to me.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “The fasts of the fourth, fifth, seventh and tenth months will become joyful and glad occasions and happy festivals for Judah. Therefore love truth and peace.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “I am very jealous for Zion; I am burning with jealousy for her.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “Many peoples and the inhabitants of many cities will yet come, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the inhabitants of one city will go to another and say, ‘Let us go at once to entreat the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty. I myself am going.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And many peoples and powerful nations will come to Jerusalem to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty and to entreat him.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “In those days ten people from all languages and nations will take firm hold of one Jew by the hem of his robe and say, ‘Let us go with you, because we have heard that God is with you.’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: “I will return to Zion and dwell in Jerusalem. Then Jerusalem will be called the Faithful City, and the mountain of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty will be called the Holy Mountain.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “Once again men and women of ripe old age will sit in the streets of Jerusalem, each of them with cane in hand because of their age. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The city streets will be filled with boys and girls playing there.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “It may seem marvelous to the remnant of this people at that time, but will it seem marvelous to me?” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “I will save my people from the countries of the east and the west. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will bring them back to live in Jerusalem; they will be my people, and I will be faithful and righteous to them as their God.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “Now hear these words, ‘Let your hands be strong so that the temple may be built.’ This is also what the prophets said who were present when the foundation was laid for the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty. '
