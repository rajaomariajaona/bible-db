document_id: EZK.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: False Prophets Condemned
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“ ‘Because they lead my people astray, saying, “Peace,” when there is no peace, and because, when a flimsy wall is built, they cover it with whitewash, '
  '11':
  - type: text
    content: 'therefore tell those who cover it with whitewash that it is going to fall. Rain will come in torrents, and I will send hailstones hurtling down, and violent winds will burst forth. '
  '12':
  - type: text
    content: When the wall collapses, will people not ask you, “Where is the whitewash you covered it with?”
  '13':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: In my wrath I will unleash a violent wind, and in my anger hailstones and torrents of rain will fall with destructive fury. '
  '14':
  - type: text
    content: I will tear down the wall you have covered with whitewash and will level it to the ground so that its foundation will be laid bare. When it
  - type: note
    content: Or the city
  - type: text
    content: ' falls, you will be destroyed in it; and you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'So I will pour out my wrath against the wall and against those who covered it with whitewash. I will say to you, “The wall is gone and so are those who whitewashed it, '
  '16':
  - type: text
    content: 'those prophets of Israel who prophesied to Jerusalem and saw visions of peace for her when there was no peace, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .” ’
  '17':
  - type: text
    content: '“Now, son of man, set your face against the daughters of your people who prophesy out of their own imagination. Prophesy against them '
  '18':
  - type: text
    content: 'and say, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Woe to the women who sew magic charms on all their wrists and make veils of various lengths for their heads in order to ensnare people. Will you ensnare the lives of my people but preserve your own? '
  '19':
  - type: text
    content: You have profaned me among my people for a few handfuls of barley and scraps of bread. By lying to my people, who listen to lies, you have killed those who should not have died and have spared those who should not live.
  '2':
  - type: text
    content: '“Son of man, prophesy against the prophets of Israel who are now prophesying. Say to those who prophesy out of their own imagination: ‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '20':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am against your magic charms with which you ensnare people like birds and I will tear them from your arms; I will set free the people that you ensnare like birds. '
  '21':
  - type: text
    content: 'I will tear off your veils and save my people from your hands, and they will no longer fall prey to your power. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Because you disheartened the righteous with your lies, when I had brought them no grief, and because you encouraged the wicked not to turn from their evil ways and so save their lives, '
  '23':
  - type: text
    content: 'therefore you will no longer see false visions or practice divination. I will save my people from your hands. And then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '3':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Woe to the foolish'
  - type: note
    content: Or wicked
  - type: text
    content: ' prophets who follow their own spirit and have seen nothing! '
  '4':
  - type: text
    content: 'Your prophets, Israel, are like jackals among ruins. '
  '5':
  - type: text
    content: 'You have not gone up to the breaches in the wall to repair it for the people of Israel so that it will stand firm in the battle on the day of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Their visions are false and their divinations a lie. Even though the '
  - type: text
    content: Lord
  - type: text
    content: ' has not sent them, they say, “The '
  - type: text
    content: Lord
  - type: text
    content: ' declares,” and expect him to fulfill their words. '
  '7':
  - type: text
    content: 'Have you not seen false visions and uttered lying divinations when you say, “The '
  - type: text
    content: Lord
  - type: text
    content: ' declares,” though I have not spoken?'
  '8':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because of your false words and lying visions, I am against you, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'My hand will be against the prophets who see false visions and utter lying divinations. They will not belong to the council of my people or be listed in the records of Israel, nor will they enter the land of Israel. Then you will know that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
