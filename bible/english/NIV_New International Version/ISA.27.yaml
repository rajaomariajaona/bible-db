document_id: ISA.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Deliverance of Israel
  - type: text
    content: In that day,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will punish with his sword—'
  - type: text
    content: his fierce, great and powerful sword—
  - type: text
    content: Leviathan the gliding serpent,
  - type: text
    content: Leviathan the coiling serpent;
  - type: text
    content: he will slay the monster of the sea.
  '10':
  - type: text
    content: The fortified city stands desolate,
  - type: text
    content: an abandoned settlement, forsaken like the wilderness;
  - type: text
    content: there the calves graze,
  - type: text
    content: there they lie down;
  - type: text
    content: they strip its branches bare.
  '11':
  - type: text
    content: When its twigs are dry, they are broken off
  - type: text
    content: and women come and make fires with them.
  - type: text
    content: For this is a people without understanding;
  - type: text
    content: so their Maker has no compassion on them,
  - type: text
    content: and their Creator shows them no favor.
  '12':
  - type: text
    content: 'In that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will thresh from the flowing Euphrates to the Wadi of Egypt, and you, Israel, will be gathered up one by one. '
  '13':
  - type: text
    content: 'And in that day a great trumpet will sound. Those who were perishing in Assyria and those who were exiled in Egypt will come and worship the '
  - type: text
    content: Lord
  - type: text
    content: ' on the holy mountain in Jerusalem.'
  '2':
  - type: text
    content: In that day—
  - type: text
    content: '“Sing about a fruitful vineyard:'
  '3':
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', watch over it;'
  - type: text
    content: I water it continually.
  - type: text
    content: I guard it day and night
  - type: text
    content: so that no one may harm it.
  '4':
  - type: text
    content: I am not angry.
  - type: text
    content: If only there were briers and thorns confronting me!
  - type: text
    content: I would march against them in battle;
  - type: text
    content: I would set them all on fire.
  '5':
  - type: text
    content: Or else let them come to me for refuge;
  - type: text
    content: let them make peace with me,
  - type: text
    content: yes, let them make peace with me.”
  '6':
  - type: text
    content: In days to come Jacob will take root,
  - type: text
    content: Israel will bud and blossom
  - type: text
    content: and fill all the world with fruit.
  '7':
  - type: text
    content: 'Has the '
  - type: text
    content: Lord
  - type: text
    content: ' struck her'
  - type: text
    content: as he struck down those who struck her?
  - type: text
    content: Has she been killed
  - type: text
    content: as those were killed who killed her?
  '8':
  - type: text
    content: By warfare
  - type: note
    content: See Septuagint; the meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' and exile you contend with her—'
  - type: text
    content: with his fierce blast he drives her out,
  - type: text
    content: as on a day the east wind blows.
  '9':
  - type: text
    content: By this, then, will Jacob’s guilt be atoned for,
  - type: text
    content: 'and this will be the full fruit of the removal of his sin:'
  - type: text
    content: When he makes all the altar stones
  - type: text
    content: to be like limestone crushed to pieces,
  - type: text
    content: no Asherah poles
  - type: note
    content: That is, wooden symbols of the goddess Asherah
  - type: text
    content: ' or incense altars'
  - type: text
    content: will be left standing.
