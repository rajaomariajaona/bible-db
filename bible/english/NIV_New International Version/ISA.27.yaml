document_id: ISA.27,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deliverance of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In that day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will punish with his sword—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his fierce, great and powerful sword—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leviathan the gliding serpent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Leviathan the coiling serpent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will slay the monster of the sea.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The fortified city stands desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an abandoned settlement, forsaken like the wilderness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there the calves graze,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there they lie down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they strip its branches bare.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When its twigs are dry, they are broken off
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and women come and make fires with them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For this is a people without understanding;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so their Maker has no compassion on them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their Creator shows them no favor.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'In that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will thresh from the flowing Euphrates to the Wadi of Egypt, and you, Israel, will be gathered up one by one. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And in that day a great trumpet will sound. Those who were perishing in Assyria and those who were exiled in Egypt will come and worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the holy mountain in Jerusalem.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: In that day—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Sing about a fruitful vineyard:'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', watch over it;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I water it continually.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I guard it day and night
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that no one may harm it.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I am not angry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only there were briers and thorns confronting me!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would march against them in battle;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would set them all on fire.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Or else let them come to me for refuge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them make peace with me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, let them make peace with me.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: In days to come Jacob will take root,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel will bud and blossom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill all the world with fruit.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' struck her'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he struck down those who struck her?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has she been killed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as those were killed who killed her?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: By warfare
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Septuagint; the meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' and exile you contend with her—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with his fierce blast he drives her out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as on a day the east wind blows.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: By this, then, will Jacob’s guilt be atoned for,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and this will be the full fruit of the removal of his sin:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he makes all the altar stones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be like limestone crushed to pieces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no Asherah poles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, wooden symbols of the goddess Asherah
      marker-yv: yv-n
    - type: text
      text: ' or incense altars'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be left standing.
