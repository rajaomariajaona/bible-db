document_id: ISA.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Mountain of the Lord
  - type: text
    content: 'This is what Isaiah son of Amoz saw concerning Judah and Jerusalem:'
  '10':
  - type: text
    content: Go into the rocks, hide in the ground
  - type: text
    content: 'from the fearful presence of the '
  - type: text
    content: Lord
  - type: text
    content: and the splendor of his majesty!
  '11':
  - type: text
    content: The eyes of the arrogant will be humbled
  - type: text
    content: and human pride brought low;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' alone will be exalted in that day.'
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has a day in store'
  - type: text
    content: for all the proud and lofty,
  - type: text
    content: for all that is exalted
  - type: text
    content: (and they will be humbled),
  '13':
  - type: text
    content: for all the cedars of Lebanon, tall and lofty,
  - type: text
    content: and all the oaks of Bashan,
  '14':
  - type: text
    content: for all the towering mountains
  - type: text
    content: and all the high hills,
  '15':
  - type: text
    content: for every lofty tower
  - type: text
    content: and every fortified wall,
  '16':
  - type: text
    content: for every trading ship
  - type: note
    content: Hebrew every ship of Tarshish
  - type: text
    content: and every stately vessel.
  '17':
  - type: text
    content: The arrogance of man will be brought low
  - type: text
    content: and human pride humbled;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' alone will be exalted in that day,'
  '18':
  - type: text
    content: and the idols will totally disappear.
  '19':
  - type: text
    content: People will flee to caves in the rocks
  - type: text
    content: and to holes in the ground
  - type: text
    content: 'from the fearful presence of the '
  - type: text
    content: Lord
  - type: text
    content: and the splendor of his majesty,
  - type: text
    content: when he rises to shake the earth.
  '2':
  - type: text
    content: In the last days
  - type: text
    content: 'the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ’s temple will be established
  - type: text
    content: as the highest of the mountains;
  - type: text
    content: it will be exalted above the hills,
  - type: text
    content: and all nations will stream to it.
  '20':
  - type: text
    content: In that day people will throw away
  - type: text
    content: to the moles and bats
  - type: text
    content: their idols of silver and idols of gold,
  - type: text
    content: which they made to worship.
  '21':
  - type: text
    content: They will flee to caverns in the rocks
  - type: text
    content: and to the overhanging crags
  - type: text
    content: 'from the fearful presence of the '
  - type: text
    content: Lord
  - type: text
    content: and the splendor of his majesty,
  - type: text
    content: when he rises to shake the earth.
  '22':
  - type: text
    content: Stop trusting in mere humans,
  - type: text
    content: who have but a breath in their nostrils.
  - type: text
    content: Why hold them in esteem?
  '3':
  - type: text
    content: Many peoples will come and say,
  - type: text
    content: '“Come, let us go up to the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: to the temple of the God of Jacob.
  - type: text
    content: He will teach us his ways,
  - type: text
    content: so that we may walk in his paths.”
  - type: text
    content: The law will go out from Zion,
  - type: text
    content: 'the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' from Jerusalem.'
  '4':
  - type: text
    content: He will judge between the nations
  - type: text
    content: and will settle disputes for many peoples.
  - type: text
    content: They will beat their swords into plowshares
  - type: text
    content: and their spears into pruning hooks.
  - type: text
    content: Nation will not take up sword against nation,
  - type: text
    content: nor will they train for war anymore.
  '5':
  - type: text
    content: Come, descendants of Jacob,
  - type: text
    content: 'let us walk in the light of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: The Day of the Lord
  '6':
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', have abandoned your people,'
  - type: text
    content: the descendants of Jacob.
  - type: text
    content: They are full of superstitions from the East;
  - type: text
    content: they practice divination like the Philistines
  - type: text
    content: and embrace pagan customs.
  '7':
  - type: text
    content: Their land is full of silver and gold;
  - type: text
    content: there is no end to their treasures.
  - type: text
    content: Their land is full of horses;
  - type: text
    content: there is no end to their chariots.
  '8':
  - type: text
    content: Their land is full of idols;
  - type: text
    content: they bow down to the work of their hands,
  - type: text
    content: to what their fingers have made.
  '9':
  - type: text
    content: So people will be brought low
  - type: text
    content: and everyone humbled—
  - type: text
    content: do not forgive them.
  - type: note
    content: Or not raise them up
