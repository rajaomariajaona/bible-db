document_id: ISA.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is what Isaiah son of Amoz saw concerning Judah and Jerusalem:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In the last days
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s temple will be established
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the highest of the mountains;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it will be exalted above the hills,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all nations will stream to it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Many peoples will come and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Come, let us go up to the mountain of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the temple of the God of Jacob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will teach us his ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that we may walk in his paths.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: The law will go out from Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' from Jerusalem.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He will judge between the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will settle disputes for many peoples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will beat their swords into plowshares
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their spears into pruning hooks.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nation will not take up sword against nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will they train for war anymore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Come, descendants of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'let us walk in the light of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have abandoned your people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the descendants of Jacob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are full of superstitions from the East;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they practice divination like the Philistines
- type: usfm
  marker: q2
  children:
  - type: text
    text: and embrace pagan customs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Their land is full of silver and gold;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no end to their treasures.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their land is full of horses;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no end to their chariots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Their land is full of idols;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they bow down to the work of their hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to what their fingers have made.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So people will be brought low
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everyone humbled—
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not forgive them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: not raise them up
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Go into the rocks, hide in the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'from the fearful presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the splendor of his majesty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The eyes of the arrogant will be humbled
- type: usfm
  marker: q2
  children:
  - type: text
    text: and human pride brought low;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' alone will be exalted in that day.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty has a day in store'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all the proud and lofty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for all that is exalted
- type: usfm
  marker: q2
  children:
  - type: text
    text: (and they will be humbled),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: for all the cedars of Lebanon, tall and lofty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the oaks of Bashan,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: for all the towering mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the high hills,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: for every lofty tower
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every fortified wall,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: for every trading ship
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: every ship of Tarshish
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every stately vessel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The arrogance of man will be brought low
- type: usfm
  marker: q2
  children:
  - type: text
    text: and human pride humbled;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' alone will be exalted in that day,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: and the idols will totally disappear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: People will flee to caves in the rocks
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to holes in the ground
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'from the fearful presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the splendor of his majesty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he rises to shake the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: In that day people will throw away
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the moles and bats
- type: usfm
  marker: q1
  children:
  - type: text
    text: their idols of silver and idols of gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which they made to worship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They will flee to caverns in the rocks
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to the overhanging crags
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'from the fearful presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the splendor of his majesty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he rises to shake the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Stop trusting in mere humans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who have but a breath in their nostrils.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why hold them in esteem?
