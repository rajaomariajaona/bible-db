document_id: DEU.25,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'When people have a dispute, they are to take it to court and the judges will decide the case, acquitting the innocent and condemning the guilty. '
  '10':
  - type: text
    content: That man’s line shall be known in Israel as The Family of the Unsandaled.
  '11':
  - type: text
    content: 'If two men are fighting and the wife of one of them comes to rescue her husband from his assailant, and she reaches out and seizes him by his private parts, '
  '12':
  - type: text
    content: you shall cut off her hand. Show her no pity.
  '13':
  - type: text
    content: 'Do not have two differing weights in your bag—one heavy, one light. '
  '14':
  - type: text
    content: 'Do not have two differing measures in your house—one large, one small. '
  '15':
  - type: text
    content: 'You must have accurate and honest weights and measures, so that you may live long in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you. '
  '16':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God detests anyone who does these things, anyone who deals dishonestly.'
  '17':
  - type: text
    content: 'Remember what the Amalekites did to you along the way when you came out of Egypt. '
  '18':
  - type: text
    content: 'When you were weary and worn out, they met you on your journey and attacked all who were lagging behind; they had no fear of God. '
  '19':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives you rest from all the enemies around you in the land he is giving you to possess as an inheritance, you shall blot out the name of Amalek from under heaven. Do not forget!'
  '2':
  - type: text
    content: 'If the guilty person deserves to be beaten, the judge shall make them lie down and have them flogged in his presence with the number of lashes the crime deserves, '
  '3':
  - type: text
    content: but the judge must not impose more than forty lashes. If the guilty party is flogged more than that, your fellow Israelite will be degraded in your eyes.
  '4':
  - type: text
    content: Do not muzzle an ox while it is treading out the grain.
  '5':
  - type: text
    content: 'If brothers are living together and one of them dies without a son, his widow must not marry outside the family. Her husband’s brother shall take her and marry her and fulfill the duty of a brother-in-law to her. '
  '6':
  - type: text
    content: The first son she bears shall carry on the name of the dead brother so that his name will not be blotted out from Israel.
  '7':
  - type: text
    content: 'However, if a man does not want to marry his brother’s wife, she shall go to the elders at the town gate and say, “My husband’s brother refuses to carry on his brother’s name in Israel. He will not fulfill the duty of a brother-in-law to me.” '
  '8':
  - type: text
    content: 'Then the elders of his town shall summon him and talk to him. If he persists in saying, “I do not want to marry her,” '
  '9':
  - type: text
    content: 'his brother’s widow shall go up to him in the presence of the elders, take off one of his sandals, spit in his face and say, “This is what is done to the man who will not build up his brother’s family line.” '
