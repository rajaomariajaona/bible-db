document_id: ISA.61,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Year of the Lord’s Favor
  - type: text
    content: 'The Spirit of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' is on me,'
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ' has anointed me'
  - type: text
    content: to proclaim good news to the poor.
  - type: text
    content: He has sent me to bind up the brokenhearted,
  - type: text
    content: to proclaim freedom for the captives
  - type: text
    content: and release from darkness for the prisoners,
  - type: note
    content: Hebrew; Septuagint the blind
  '10':
  - type: text
    content: 'I delight greatly in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: my soul rejoices in my God.
  - type: text
    content: For he has clothed me with garments of salvation
  - type: text
    content: and arrayed me in a robe of his righteousness,
  - type: text
    content: as a bridegroom adorns his head like a priest,
  - type: text
    content: and as a bride adorns herself with her jewels.
  '11':
  - type: text
    content: For as the soil makes the sprout come up
  - type: text
    content: and a garden causes seeds to grow,
  - type: text
    content: 'so the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' will make righteousness'
  - type: text
    content: and praise spring up before all nations.
  '2':
  - type: text
    content: 'to proclaim the year of the '
  - type: text
    content: Lord
  - type: text
    content: ’s favor
  - type: text
    content: and the day of vengeance of our God,
  - type: text
    content: to comfort all who mourn,
  '3':
  - type: text
    content: and provide for those who grieve in Zion—
  - type: text
    content: to bestow on them a crown of beauty
  - type: text
    content: instead of ashes,
  - type: text
    content: the oil of joy
  - type: text
    content: instead of mourning,
  - type: text
    content: and a garment of praise
  - type: text
    content: instead of a spirit of despair.
  - type: text
    content: They will be called oaks of righteousness,
  - type: text
    content: 'a planting of the '
  - type: text
    content: Lord
  - type: text
    content: for the display of his splendor.
  '4':
  - type: text
    content: They will rebuild the ancient ruins
  - type: text
    content: and restore the places long devastated;
  - type: text
    content: they will renew the ruined cities
  - type: text
    content: that have been devastated for generations.
  '5':
  - type: text
    content: Strangers will shepherd your flocks;
  - type: text
    content: foreigners will work your fields and vineyards.
  '6':
  - type: text
    content: 'And you will be called priests of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: you will be named ministers of our God.
  - type: text
    content: You will feed on the wealth of nations,
  - type: text
    content: and in their riches you will boast.
  '7':
  - type: text
    content: Instead of your shame
  - type: text
    content: you will receive a double portion,
  - type: text
    content: and instead of disgrace
  - type: text
    content: you will rejoice in your inheritance.
  - type: text
    content: And so you will inherit a double portion in your land,
  - type: text
    content: and everlasting joy will be yours.
  '8':
  - type: text
    content: '“For I, the '
  - type: text
    content: Lord
  - type: text
    content: ', love justice;'
  - type: text
    content: I hate robbery and wrongdoing.
  - type: text
    content: In my faithfulness I will reward my people
  - type: text
    content: and make an everlasting covenant with them.
  '9':
  - type: text
    content: Their descendants will be known among the nations
  - type: text
    content: and their offspring among the peoples.
  - type: text
    content: All who see them will acknowledge
  - type: text
    content: 'that they are a people the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed.”'
