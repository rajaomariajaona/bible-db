document_id: ISA.61,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Year of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Favor
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The Spirit of the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is on me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has anointed me'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to proclaim good news to the poor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has sent me to bind up the brokenhearted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to proclaim freedom for the captives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and release from darkness for the prisoners,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the blind
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I delight greatly in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my soul rejoices in my God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he has clothed me with garments of salvation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and arrayed me in a robe of his righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as a bridegroom adorns his head like a priest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and as a bride adorns herself with her jewels.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For as the soil makes the sprout come up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a garden causes seeds to grow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will make righteousness'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and praise spring up before all nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'to proclaim the year of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s favor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the day of vengeance of our God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to comfort all who mourn,
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: and provide for those who grieve in Zion—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to bestow on them a crown of beauty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: instead of ashes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the oil of joy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: instead of mourning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a garment of praise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: instead of a spirit of despair.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be called oaks of righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a planting of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the display of his splendor.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They will rebuild the ancient ruins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and restore the places long devastated;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will renew the ruined cities
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that have been devastated for generations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Strangers will shepherd your flocks;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: foreigners will work your fields and vineyards.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And you will be called priests of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be named ministers of our God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will feed on the wealth of nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in their riches you will boast.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Instead of your shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will receive a double portion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and instead of disgrace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will rejoice in your inheritance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And so you will inherit a double portion in your land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everlasting joy will be yours.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“For I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', love justice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hate robbery and wrongdoing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In my faithfulness I will reward my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make an everlasting covenant with them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Their descendants will be known among the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their offspring among the peoples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who see them will acknowledge
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that they are a people the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has blessed.”'
