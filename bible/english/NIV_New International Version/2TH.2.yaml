document_id: 2TH.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Man of Lawlessness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Concerning the coming of our Lord Jesus Christ and our being gathered to him, we ask you, brothers and sisters, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and all the ways that wickedness deceives those who are perishing. They perish because they refused to love the truth and so be saved. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason God sends them a powerful delusion so that they will believe the lie '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and so that all will be condemned who have not believed the truth but have delighted in wickedness.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Stand Firm
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But we ought always to thank God for you, brothers and sisters loved by the Lord, because God chose you as firstfruits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: because from the beginning God chose you
      marker-yv: yv-n
    - type: text
      text: ' to be saved through the sanctifying work of the Spirit and through belief in the truth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He called you to this through our gospel, that you might share in the glory of our Lord Jesus Christ.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, brothers and sisters, stand firm and hold fast to the teachings
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: traditions
      marker-yv: yv-n
    - type: text
      text: ' we passed on to you, whether by word of mouth or by letter.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May our Lord Jesus Christ himself and God our Father, who loved us and by his grace gave us eternal encouragement and good hope, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: encourage your hearts and strengthen you in every good deed and word.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not to become easily unsettled or alarmed by the teaching allegedly from us—whether by a prophecy or by word of mouth or by letter—asserting that the day of the Lord has already come. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Don’t let anyone deceive you in any way, for that day will not come until the rebellion occurs and the man of lawlessness
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sin
      marker-yv: yv-n
    - type: text
      text: ' is revealed, the man doomed to destruction. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will oppose and will exalt himself over everything that is called God or is worshiped, so that he sets himself up in God’s temple, proclaiming himself to be God.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t you remember that when I was with you I used to tell you these things? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now you know what is holding him back, so that he may be revealed at the proper time. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the secret power of lawlessness is already at work; but the one who now holds it back will continue to do so till he is taken out of the way. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And then the lawless one will be revealed, whom the Lord Jesus will overthrow with the breath of his mouth and destroy by the splendor of his coming. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The coming of the lawless one will be in accordance with how Satan works. He will use all sorts of displays of power through signs and wonders that serve the lie, '
