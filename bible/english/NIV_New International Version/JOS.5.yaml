document_id: JOS.5,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now when all the Amorite kings west of the Jordan and all the Canaanite kings along the coast heard how the '
  - type: text
    content: Lord
  - type: text
    content: ' had dried up the Jordan before the Israelites until they'
  - type: note
    content: Another textual tradition we
  - type: text
    content: ' had crossed over, their hearts melted in fear and they no longer had the courage to face the Israelites.'
  - type: heading
    content: Circumcision and Passover at Gilgal
  '10':
  - type: text
    content: 'On the evening of the fourteenth day of the month, while camped at Gilgal on the plains of Jericho, the Israelites celebrated the Passover. '
  '11':
  - type: text
    content: 'The day after the Passover, that very day, they ate some of the produce of the land: unleavened bread and roasted grain. '
  '12':
  - type: text
    content: The manna stopped the day after
  - type: note
    content: Or the day
  - type: text
    content: ' they ate this food from the land; there was no longer any manna for the Israelites, but that year they ate the produce of Canaan.'
  - type: heading
    content: The Fall of Jericho
  '13':
  - type: text
    content: Now when Joshua was near Jericho, he looked up and saw a man standing in front of him with a drawn sword in his hand. Joshua went up to him and asked, “Are you for us or for our enemies?”
  '14':
  - type: text
    content: '“Neither,” he replied, “but as commander of the army of the '
  - type: text
    content: Lord
  - type: text
    content: ' I have now come.” Then Joshua fell facedown to the ground in reverence, and asked him, “What message does my Lord'
  - type: note
    content: Or lord
  - type: text
    content: ' have for his servant?”'
  '15':
  - type: text
    content: 'The commander of the '
  - type: text
    content: Lord
  - type: text
    content: ’s army replied, “Take off your sandals, for the place where you are standing is holy.” And Joshua did so.
  '2':
  - type: text
    content: 'At that time the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Make flint knives and circumcise the Israelites again.” '
  '3':
  - type: text
    content: So Joshua made flint knives and circumcised the Israelites at Gibeath Haaraloth.
  - type: note
    content: Gibeath Haaraloth means the hill of foreskins.
  '4':
  - type: text
    content: 'Now this is why he did so: All those who came out of Egypt—all the men of military age—died in the wilderness on the way after leaving Egypt. '
  '5':
  - type: text
    content: 'All the people that came out had been circumcised, but all the people born in the wilderness during the journey from Egypt had not. '
  '6':
  - type: text
    content: 'The Israelites had moved about in the wilderness forty years until all the men who were of military age when they left Egypt had died, since they had not obeyed the '
  - type: text
    content: Lord
  - type: text
    content: '. For the '
  - type: text
    content: Lord
  - type: text
    content: ' had sworn to them that they would not see the land he had solemnly promised their ancestors to give us, a land flowing with milk and honey. '
  '7':
  - type: text
    content: 'So he raised up their sons in their place, and these were the ones Joshua circumcised. They were still uncircumcised because they had not been circumcised on the way. '
  '8':
  - type: text
    content: And after the whole nation had been circumcised, they remained where they were in camp until they were healed.
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Today I have rolled away the reproach of Egypt from you.” So the place has been called Gilgal'
  - type: note
    content: Gilgal sounds like the Hebrew for roll.
  - type: text
    content: ' to this day.'
