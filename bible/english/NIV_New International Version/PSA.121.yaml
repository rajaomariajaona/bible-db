document_id: PSA.121,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 121
  - type: text
    content: A song of ascents.
  - type: text
    content: I lift up my eyes to the mountains—
  - type: text
    content: where does my help come from?
  '2':
  - type: text
    content: 'My help comes from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the Maker of heaven and earth.
  '3':
  - type: text
    content: He will not let your foot slip—
  - type: text
    content: he who watches over you will not slumber;
  '4':
  - type: text
    content: indeed, he who watches over Israel
  - type: text
    content: will neither slumber nor sleep.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' watches over you—'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is your shade at your right hand;'
  '6':
  - type: text
    content: the sun will not harm you by day,
  - type: text
    content: nor the moon by night.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will keep you from all harm—'
  - type: text
    content: he will watch over your life;
  '8':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will watch over your coming and going'
  - type: text
    content: both now and forevermore.
