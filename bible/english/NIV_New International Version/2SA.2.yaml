document_id: 2SA.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Anointed King Over Judah
  - type: text
    content: 'In the course of time, David inquired of the '
  - type: text
    content: Lord
  - type: text
    content: . “Shall I go up to one of the towns of Judah?” he asked.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Go up.”'
  - type: text
    content: David asked, “Where shall I go?”
  - type: text
    content: '“To Hebron,” the '
  - type: text
    content: Lord
  - type: text
    content: ' answered.'
  '10':
  - type: text
    content: 'Ish-Bosheth son of Saul was forty years old when he became king over Israel, and he reigned two years. The tribe of Judah, however, remained loyal to David. '
  '11':
  - type: text
    content: The length of time David was king in Hebron over Judah was seven years and six months.
  '12':
  - type: text
    content: 'Abner son of Ner, together with the men of Ish-Bosheth son of Saul, left Mahanaim and went to Gibeon. '
  '13':
  - type: text
    content: Joab son of Zeruiah and David’s men went out and met them at the pool of Gibeon. One group sat down on one side of the pool and one group on the other side.
  '14':
  - type: text
    content: Then Abner said to Joab, “Let’s have some of the young men get up and fight hand to hand in front of us.”
  - type: text
    content: “All right, let them do it,” Joab said.
  '15':
  - type: text
    content: 'So they stood up and were counted off—twelve men for Benjamin and Ish-Bosheth son of Saul, and twelve for David. '
  '16':
  - type: text
    content: Then each man grabbed his opponent by the head and thrust his dagger into his opponent’s side, and they fell down together. So that place in Gibeon was called Helkath Hazzurim.
  - type: note
    content: Helkath Hazzurim means field of daggers or field of hostilities.
  '17':
  - type: text
    content: The battle that day was very fierce, and Abner and the Israelites were defeated by David’s men.
  '18':
  - type: text
    content: 'The three sons of Zeruiah were there: Joab, Abishai and Asahel. Now Asahel was as fleet-footed as a wild gazelle. '
  '19':
  - type: text
    content: 'He chased Abner, turning neither to the right nor to the left as he pursued him. '
  '2':
  - type: text
    content: 'So David went up there with his two wives, Ahinoam of Jezreel and Abigail, the widow of Nabal of Carmel. '
  '20':
  - type: text
    content: Abner looked behind him and asked, “Is that you, Asahel?”
  - type: text
    content: “It is,” he answered.
  '21':
  - type: text
    content: Then Abner said to him, “Turn aside to the right or to the left; take on one of the young men and strip him of his weapons.” But Asahel would not stop chasing him.
  '22':
  - type: text
    content: Again Abner warned Asahel, “Stop chasing me! Why should I strike you down? How could I look your brother Joab in the face?”
  '23':
  - type: text
    content: But Asahel refused to give up the pursuit; so Abner thrust the butt of his spear into Asahel’s stomach, and the spear came out through his back. He fell there and died on the spot. And every man stopped when he came to the place where Asahel had fallen and died.
  '24':
  - type: text
    content: 'But Joab and Abishai pursued Abner, and as the sun was setting, they came to the hill of Ammah, near Giah on the way to the wasteland of Gibeon. '
  '25':
  - type: text
    content: Then the men of Benjamin rallied behind Abner. They formed themselves into a group and took their stand on top of a hill.
  '26':
  - type: text
    content: Abner called out to Joab, “Must the sword devour forever? Don’t you realize that this will end in bitterness? How long before you order your men to stop pursuing their fellow Israelites?”
  '27':
  - type: text
    content: Joab answered, “As surely as God lives, if you had not spoken, the men would have continued pursuing them until morning.”
  '28':
  - type: text
    content: So Joab blew the trumpet, and all the troops came to a halt; they no longer pursued Israel, nor did they fight anymore.
  '29':
  - type: text
    content: All that night Abner and his men marched through the Arabah. They crossed the Jordan, continued through the morning hours
  - type: note
    content: See Septuagint; the meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' and came to Mahanaim.'
  '3':
  - type: text
    content: 'David also took the men who were with him, each with his family, and they settled in Hebron and its towns. '
  '30':
  - type: text
    content: 'Then Joab stopped pursuing Abner and assembled the whole army. Besides Asahel, nineteen of David’s men were found missing. '
  '31':
  - type: text
    content: 'But David’s men had killed three hundred and sixty Benjamites who were with Abner. '
  '32':
  - type: text
    content: They took Asahel and buried him in his father’s tomb at Bethlehem. Then Joab and his men marched all night and arrived at Hebron by daybreak.
  '4':
  - type: text
    content: Then the men of Judah came to Hebron, and there they anointed David king over the tribe of Judah.
  - type: text
    content: 'When David was told that it was the men from Jabesh Gilead who had buried Saul, '
  '5':
  - type: text
    content: 'he sent messengers to them to say to them, “The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you for showing this kindness to Saul your master by burying him. '
  '6':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' now show you kindness and faithfulness, and I too will show you the same favor because you have done this. '
  '7':
  - type: text
    content: Now then, be strong and brave, for Saul your master is dead, and the people of Judah have anointed me king over them.”
  - type: heading
    content: War Between the Houses of David and Saul
  '8':
  - type: text
    content: 'Meanwhile, Abner son of Ner, the commander of Saul’s army, had taken Ish-Bosheth son of Saul and brought him over to Mahanaim. '
  '9':
  - type: text
    content: He made him king over Gilead, Ashuri and Jezreel, and also over Ephraim, Benjamin and all Israel.
