document_id: ZEC.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Will Care for Judah
  - type: text
    content: 'Ask the '
  - type: text
    content: Lord
  - type: text
    content: ' for rain in the springtime;'
  - type: text
    content: 'it is the '
  - type: text
    content: Lord
  - type: text
    content: ' who sends the thunderstorms.'
  - type: text
    content: He gives showers of rain to all people,
  - type: text
    content: and plants of the field to everyone.
  '10':
  - type: text
    content: I will bring them back from Egypt
  - type: text
    content: and gather them from Assyria.
  - type: text
    content: I will bring them to Gilead and Lebanon,
  - type: text
    content: and there will not be room enough for them.
  '11':
  - type: text
    content: They will pass through the sea of trouble;
  - type: text
    content: the surging sea will be subdued
  - type: text
    content: and all the depths of the Nile will dry up.
  - type: text
    content: Assyria’s pride will be brought down
  - type: text
    content: and Egypt’s scepter will pass away.
  '12':
  - type: text
    content: 'I will strengthen them in the '
  - type: text
    content: Lord
  - type: text
    content: and in his name they will live securely,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: The idols speak deceitfully,
  - type: text
    content: diviners see visions that lie;
  - type: text
    content: they tell dreams that are false,
  - type: text
    content: they give comfort in vain.
  - type: text
    content: Therefore the people wander like sheep
  - type: text
    content: oppressed for lack of a shepherd.
  '3':
  - type: text
    content: “My anger burns against the shepherds,
  - type: text
    content: and I will punish the leaders;
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will care'
  - type: text
    content: for his flock, the people of Judah,
  - type: text
    content: and make them like a proud horse in battle.
  '4':
  - type: text
    content: From Judah will come the cornerstone,
  - type: text
    content: from him the tent peg,
  - type: text
    content: from him the battle bow,
  - type: text
    content: from him every ruler.
  '5':
  - type: text
    content: Together they
  - type: note
    content: Or ruler, all of them together. / 5 They
  - type: text
    content: ' will be like warriors in battle'
  - type: text
    content: trampling their enemy into the mud of the streets.
  - type: text
    content: 'They will fight because the '
  - type: text
    content: Lord
  - type: text
    content: ' is with them,'
  - type: text
    content: and they will put the enemy horsemen to shame.
  '6':
  - type: text
    content: “I will strengthen Judah
  - type: text
    content: and save the tribes of Joseph.
  - type: text
    content: I will restore them
  - type: text
    content: because I have compassion on them.
  - type: text
    content: They will be as though
  - type: text
    content: I had not rejected them,
  - type: text
    content: 'for I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God'
  - type: text
    content: and I will answer them.
  '7':
  - type: text
    content: The Ephraimites will become like warriors,
  - type: text
    content: and their hearts will be glad as with wine.
  - type: text
    content: Their children will see it and be joyful;
  - type: text
    content: 'their hearts will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: I will signal for them
  - type: text
    content: and gather them in.
  - type: text
    content: Surely I will redeem them;
  - type: text
    content: they will be as numerous as before.
  '9':
  - type: text
    content: Though I scatter them among the peoples,
  - type: text
    content: yet in distant lands they will remember me.
  - type: text
    content: They and their children will survive,
  - type: text
    content: and they will return.
