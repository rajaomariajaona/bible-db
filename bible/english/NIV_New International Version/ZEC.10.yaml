document_id: ZEC.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Will Care for Judah'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ask the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for rain in the springtime;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'it is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who sends the thunderstorms.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives showers of rain to all people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plants of the field to everyone.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I will bring them back from Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gather them from Assyria.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring them to Gilead and Lebanon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there will not be room enough for them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They will pass through the sea of trouble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the surging sea will be subdued
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the depths of the Nile will dry up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assyria’s pride will be brought down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Egypt’s scepter will pass away.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I will strengthen them in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in his name they will live securely,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The idols speak deceitfully,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: diviners see visions that lie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they tell dreams that are false,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they give comfort in vain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore the people wander like sheep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oppressed for lack of a shepherd.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “My anger burns against the shepherds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will punish the leaders;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty will care'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for his flock, the people of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make them like a proud horse in battle.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: From Judah will come the cornerstone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from him the tent peg,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from him the battle bow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from him every ruler.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Together they
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:4,5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ruler, all of them together. / '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '5 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They
      marker-yv: yv-n
    - type: text
      text: ' will be like warriors in battle'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trampling their enemy into the mud of the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will fight because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is with them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will put the enemy horsemen to shame.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “I will strengthen Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and save the tribes of Joseph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will restore them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because I have compassion on them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be as though
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I had not rejected them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will answer them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The Ephraimites will become like warriors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their hearts will be glad as with wine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their children will see it and be joyful;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'their hearts will rejoice in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I will signal for them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gather them in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely I will redeem them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be as numerous as before.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Though I scatter them among the peoples,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet in distant lands they will remember me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They and their children will survive,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will return.
