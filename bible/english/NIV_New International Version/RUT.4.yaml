document_id: RUT.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Boaz Marries Ruth
  - type: text
    content: Meanwhile Boaz went up to the town gate and sat down there just as the guardian-redeemer
  - type: note
    content: The Hebrew word for guardian-redeemer is a legal term for one who has the obligation to redeem a relative in serious difficulty (see Lev. 25:25-55); also in verses 3, 6, 8 and 14.
  - type: text
    content: ' he had mentioned came along. Boaz said, “Come over here, my friend, and sit down.” So he went over and sat down.'
  '10':
  - type: text
    content: I have also acquired Ruth the Moabite, Mahlon’s widow, as my wife, in order to maintain the name of the dead with his property, so that his name will not disappear from among his family or from his hometown. Today you are witnesses!”
  '11':
  - type: text
    content: 'Then the elders and all the people at the gate said, “We are witnesses. May the '
  - type: text
    content: Lord
  - type: text
    content: ' make the woman who is coming into your home like Rachel and Leah, who together built up the family of Israel. May you have standing in Ephrathah and be famous in Bethlehem. '
  '12':
  - type: text
    content: 'Through the offspring the '
  - type: text
    content: Lord
  - type: text
    content: ' gives you by this young woman, may your family be like that of Perez, whom Tamar bore to Judah.”'
  - type: heading
    content: Naomi Gains a Son
  '13':
  - type: text
    content: 'So Boaz took Ruth and she became his wife. When he made love to her, the '
  - type: text
    content: Lord
  - type: text
    content: ' enabled her to conceive, and she gave birth to a son. '
  '14':
  - type: text
    content: 'The women said to Naomi: “Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ', who this day has not left you without a guardian-redeemer. May he become famous throughout Israel! '
  '15':
  - type: text
    content: He will renew your life and sustain you in your old age. For your daughter-in-law, who loves you and who is better to you than seven sons, has given him birth.”
  '16':
  - type: text
    content: 'Then Naomi took the child in her arms and cared for him. '
  '17':
  - type: text
    content: The women living there said, “Naomi has a son!” And they named him Obed. He was the father of Jesse, the father of David.
  - type: heading
    content: The Genealogy of David
  '18':
  - type: text
    content: 'This, then, is the family line of Perez:'
  - type: text
    content: Perez was the father of Hezron,
  '19':
  - type: text
    content: Hezron the father of Ram,
  - type: text
    content: Ram the father of Amminadab,
  '2':
  - type: text
    content: 'Boaz took ten of the elders of the town and said, “Sit here,” and they did so. '
  '20':
  - type: text
    content: Amminadab the father of Nahshon,
  - type: text
    content: Nahshon the father of Salmon,
  - type: note
    content: A few Hebrew manuscripts, some Septuagint manuscripts and Vulgate (see also verse 21 and Septuagint of 1 Chron. 2:11); most Hebrew manuscripts Salma
  '21':
  - type: text
    content: Salmon the father of Boaz,
  - type: text
    content: Boaz the father of Obed,
  '22':
  - type: text
    content: Obed the father of Jesse,
  - type: text
    content: and Jesse the father of David.
  '3':
  - type: text
    content: 'Then he said to the guardian-redeemer, “Naomi, who has come back from Moab, is selling the piece of land that belonged to our relative Elimelek. '
  '4':
  - type: text
    content: I thought I should bring the matter to your attention and suggest that you buy it in the presence of these seated here and in the presence of the elders of my people. If you will redeem it, do so. But if you
  - type: note
    content: Many Hebrew manuscripts, Septuagint, Vulgate and Syriac; most Hebrew manuscripts he
  - type: text
    content: ' will not, tell me, so I will know. For no one has the right to do it except you, and I am next in line.”'
  - type: text
    content: “I will redeem it,” he said.
  '5':
  - type: text
    content: Then Boaz said, “On the day you buy the land from Naomi, you also acquire Ruth the Moabite, the
  - type: note
    content: Vulgate and Syriac; Hebrew (see also Septuagint) Naomi and from Ruth the Moabite, you acquire the
  - type: text
    content: ' dead man’s widow, in order to maintain the name of the dead with his property.”'
  '6':
  - type: text
    content: At this, the guardian-redeemer said, “Then I cannot redeem it because I might endanger my own estate. You redeem it yourself. I cannot do it.”
  '7':
  - type: text
    content: (Now in earlier times in Israel, for the redemption and transfer of property to become final, one party took off his sandal and gave it to the other. This was the method of legalizing transactions in Israel.)
  '8':
  - type: text
    content: So the guardian-redeemer said to Boaz, “Buy it yourself.” And he removed his sandal.
  '9':
  - type: text
    content: 'Then Boaz announced to the elders and all the people, “Today you are witnesses that I have bought from Naomi all the property of Elimelek, Kilion and Mahlon. '
