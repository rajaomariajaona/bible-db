document_id: RUT.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Boaz Marries Ruth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile Boaz went up to the town gate and sat down there just as the guardian-redeemer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'guardian-redeemer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a legal term for one who has the obligation to redeem a relative in serious difficulty (see Lev. 25:25-55); also in verses 3, 6, 8 and 14.
      marker-yv: yv-n
    - type: text
      text: ' he had mentioned came along. Boaz said, “Come over here, my friend, and sit down.” So he went over and sat down.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I have also acquired Ruth the Moabite, Mahlon’s widow, as my wife, in order to maintain the name of the dead with his property, so that his name will not disappear from among his family or from his hometown. Today you are witnesses!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the elders and all the people at the gate said, “We are witnesses. May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' make the woman who is coming into your home like Rachel and Leah, who together built up the family of Israel. May you have standing in Ephrathah and be famous in Bethlehem. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Through the offspring the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives you by this young woman, may your family be like that of Perez, whom Tamar bore to Judah.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naomi Gains a Son
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Boaz took Ruth and she became his wife. When he made love to her, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' enabled her to conceive, and she gave birth to a son. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The women said to Naomi: “Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who this day has not left you without a guardian-redeemer. May he become famous throughout Israel! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will renew your life and sustain you in your old age. For your daughter-in-law, who loves you and who is better to you than seven sons, has given him birth.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Naomi took the child in her arms and cared for him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The women living there said, “Naomi has a son!” And they named him Obed. He was the father of Jesse, the father of David.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Genealogy of David
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This, then, is the family line of Perez:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Perez was the father of Hezron,
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hezron the father of Ram,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ram the father of Amminadab,
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Boaz took ten of the elders of the town and said, “Sit here,” and they did so. '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Amminadab the father of Nahshon,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Nahshon the father of Salmon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A few Hebrew manuscripts, some Septuagint manuscripts and Vulgate (see also verse 21 and Septuagint of 1 Chron. 2:11); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Salma
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Salmon the father of Boaz,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Boaz the father of Obed,
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Obed the father of Jesse,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: and Jesse the father of David.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to the guardian-redeemer, “Naomi, who has come back from Moab, is selling the piece of land that belonged to our relative Elimelek. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I thought I should bring the matter to your attention and suggest that you buy it in the presence of these seated here and in the presence of the elders of my people. If you will redeem it, do so. But if you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts, Septuagint, Vulgate and Syriac; most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he
      marker-yv: yv-n
    - type: text
      text: ' will not, tell me, so I will know. For no one has the right to do it except you, and I am next in line.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I will redeem it,” he said.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Boaz said, “On the day you buy the land from Naomi, you also acquire Ruth the Moabite, the
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Vulgate and Syriac; Hebrew (see also Septuagint) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Naomi and from Ruth the Moabite, you acquire the
      marker-yv: yv-n
    - type: text
      text: ' dead man’s widow, in order to maintain the name of the dead with his property.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At this, the guardian-redeemer said, “Then I cannot redeem it because I might endanger my own estate. You redeem it yourself. I cannot do it.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (Now in earlier times in Israel, for the redemption and transfer of property to become final, one party took off his sandal and gave it to the other. This was the method of legalizing transactions in Israel.)
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the guardian-redeemer said to Boaz, “Buy it yourself.” And he removed his sandal.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Boaz announced to the elders and all the people, “Today you are witnesses that I have bought from Naomi all the property of Elimelek, Kilion and Mahlon. '
