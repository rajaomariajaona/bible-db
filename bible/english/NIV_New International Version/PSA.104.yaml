document_id: PSA.104
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 104
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my soul.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God, you are very great;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are clothed with splendor and majesty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' wraps himself in light as with a garment;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he stretches out the heavens like a tent
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: and lays the beams of his upper chambers on their waters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He makes the clouds his chariot
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rides on the wings of the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He makes winds his messengers,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '104:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: angels
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: flames of fire his servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He set the earth on its foundations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it can never be moved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You covered it with the watery depths as with a garment;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the waters stood above the mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But at your rebuke the waters fled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the sound of your thunder they took to flight;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: they flowed over the mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they went down into the valleys,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the place you assigned for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You set a boundary they cannot cross;
- type: usfm
  marker: q2
  children:
  - type: text
    text: never again will they cover the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He makes springs pour water into the ravines;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it flows between the mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They give water to all the beasts of the field;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wild donkeys quench their thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The birds of the sky nest by the waters;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they sing among the branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He waters the mountains from his upper chambers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the land is satisfied by the fruit of his work.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He makes grass grow for the cattle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and plants for people to cultivate—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'bringing forth food from the earth:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: wine that gladdens human hearts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: oil to make their faces shine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bread that sustains their hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The trees of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' are well watered,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the cedars of Lebanon that he planted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: There the birds make their nests;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the stork has its home in the junipers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The high mountains belong to the wild goats;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the crags are a refuge for the hyrax.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He made the moon to mark the seasons,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the sun knows when to go down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You bring darkness, it becomes night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the beasts of the forest prowl.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The lions roar for their prey
- type: usfm
  marker: q2
  children:
  - type: text
    text: and seek their food from God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The sun rises, and they steal away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they return and lie down in their dens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then people go out to their work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to their labor until evening.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'How many are your works, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: In wisdom you made them all;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth is full of your creatures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: There is the sea, vast and spacious,
- type: usfm
  marker: q2
  children:
  - type: text
    text: teeming with creatures beyond number—
- type: usfm
  marker: q2
  children:
  - type: text
    text: living things both large and small.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: There the ships go to and fro,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Leviathan, which you formed to frolic there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: All creatures look to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: to give them their food at the proper time.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When you give it to them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they gather it up;
- type: usfm
  marker: q1
  children:
  - type: text
    text: when you open your hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are satisfied with good things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: When you hide your face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are terrified;
- type: usfm
  marker: q1
  children:
  - type: text
    text: when you take away their breath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they die and return to the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: When you send your Spirit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are created,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you renew the face of the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'May the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' endure forever;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'may the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rejoice in his works—'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: he who looks at the earth, and it trembles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who touches the mountains, and they smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'I will sing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' all my life;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing praise to my God as long as I live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: May my meditation be pleasing to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'as I rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: But may sinners vanish from the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wicked be no more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my soul.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '104:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hallelu Yah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; in the Septuagint this line stands at the beginning of Psalm 105.
    marker-yv: yv-n
