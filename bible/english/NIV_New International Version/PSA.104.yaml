document_id: PSA.104,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 104
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', my soul.'
  - type: text
    content: Lord
  - type: text
    content: ' my God, you are very great;'
  - type: text
    content: you are clothed with splendor and majesty.
  '10':
  - type: text
    content: He makes springs pour water into the ravines;
  - type: text
    content: it flows between the mountains.
  '11':
  - type: text
    content: They give water to all the beasts of the field;
  - type: text
    content: the wild donkeys quench their thirst.
  '12':
  - type: text
    content: The birds of the sky nest by the waters;
  - type: text
    content: they sing among the branches.
  '13':
  - type: text
    content: He waters the mountains from his upper chambers;
  - type: text
    content: the land is satisfied by the fruit of his work.
  '14':
  - type: text
    content: He makes grass grow for the cattle,
  - type: text
    content: and plants for people to cultivate—
  - type: text
    content: 'bringing forth food from the earth:'
  '15':
  - type: text
    content: wine that gladdens human hearts,
  - type: text
    content: oil to make their faces shine,
  - type: text
    content: and bread that sustains their hearts.
  '16':
  - type: text
    content: 'The trees of the '
  - type: text
    content: Lord
  - type: text
    content: ' are well watered,'
  - type: text
    content: the cedars of Lebanon that he planted.
  '17':
  - type: text
    content: There the birds make their nests;
  - type: text
    content: the stork has its home in the junipers.
  '18':
  - type: text
    content: The high mountains belong to the wild goats;
  - type: text
    content: the crags are a refuge for the hyrax.
  '19':
  - type: text
    content: He made the moon to mark the seasons,
  - type: text
    content: and the sun knows when to go down.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' wraps himself in light as with a garment;'
  - type: text
    content: he stretches out the heavens like a tent
  '20':
  - type: text
    content: You bring darkness, it becomes night,
  - type: text
    content: and all the beasts of the forest prowl.
  '21':
  - type: text
    content: The lions roar for their prey
  - type: text
    content: and seek their food from God.
  '22':
  - type: text
    content: The sun rises, and they steal away;
  - type: text
    content: they return and lie down in their dens.
  '23':
  - type: text
    content: Then people go out to their work,
  - type: text
    content: to their labor until evening.
  '24':
  - type: text
    content: 'How many are your works, '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: In wisdom you made them all;
  - type: text
    content: the earth is full of your creatures.
  '25':
  - type: text
    content: There is the sea, vast and spacious,
  - type: text
    content: teeming with creatures beyond number—
  - type: text
    content: living things both large and small.
  '26':
  - type: text
    content: There the ships go to and fro,
  - type: text
    content: and Leviathan, which you formed to frolic there.
  '27':
  - type: text
    content: All creatures look to you
  - type: text
    content: to give them their food at the proper time.
  '28':
  - type: text
    content: When you give it to them,
  - type: text
    content: they gather it up;
  - type: text
    content: when you open your hand,
  - type: text
    content: they are satisfied with good things.
  '29':
  - type: text
    content: When you hide your face,
  - type: text
    content: they are terrified;
  - type: text
    content: when you take away their breath,
  - type: text
    content: they die and return to the dust.
  '3':
  - type: text
    content: and lays the beams of his upper chambers on their waters.
  - type: text
    content: He makes the clouds his chariot
  - type: text
    content: and rides on the wings of the wind.
  '30':
  - type: text
    content: When you send your Spirit,
  - type: text
    content: they are created,
  - type: text
    content: and you renew the face of the ground.
  '31':
  - type: text
    content: 'May the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' endure forever;'
  - type: text
    content: 'may the '
  - type: text
    content: Lord
  - type: text
    content: ' rejoice in his works—'
  '32':
  - type: text
    content: he who looks at the earth, and it trembles,
  - type: text
    content: who touches the mountains, and they smoke.
  '33':
  - type: text
    content: 'I will sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' all my life;'
  - type: text
    content: I will sing praise to my God as long as I live.
  '34':
  - type: text
    content: May my meditation be pleasing to him,
  - type: text
    content: 'as I rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '35':
  - type: text
    content: But may sinners vanish from the earth
  - type: text
    content: and the wicked be no more.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', my soul.'
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew Hallelu Yah; in the Septuagint this line stands at the beginning of Psalm 105.
  '4':
  - type: text
    content: He makes winds his messengers,
  - type: note
    content: Or angels
  - type: text
    content: flames of fire his servants.
  '5':
  - type: text
    content: He set the earth on its foundations;
  - type: text
    content: it can never be moved.
  '6':
  - type: text
    content: You covered it with the watery depths as with a garment;
  - type: text
    content: the waters stood above the mountains.
  '7':
  - type: text
    content: But at your rebuke the waters fled,
  - type: text
    content: at the sound of your thunder they took to flight;
  '8':
  - type: text
    content: they flowed over the mountains,
  - type: text
    content: they went down into the valleys,
  - type: text
    content: to the place you assigned for them.
  '9':
  - type: text
    content: You set a boundary they cannot cross;
  - type: text
    content: never again will they cover the earth.
