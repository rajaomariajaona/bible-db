document_id: ISA.57,111
type_code: eng
verses:
  '1':
  - type: text
    content: The righteous perish,
  - type: text
    content: and no one takes it to heart;
  - type: text
    content: the devout are taken away,
  - type: text
    content: and no one understands
  - type: text
    content: that the righteous are taken away
  - type: text
    content: to be spared from evil.
  '10':
  - type: text
    content: You wearied yourself by such going about,
  - type: text
    content: but you would not say, ‘It is hopeless.’
  - type: text
    content: You found renewal of your strength,
  - type: text
    content: and so you did not faint.
  '11':
  - type: text
    content: “Whom have you so dreaded and feared
  - type: text
    content: that you have not been true to me,
  - type: text
    content: and have neither remembered me
  - type: text
    content: nor taken this to heart?
  - type: text
    content: Is it not because I have long been silent
  - type: text
    content: that you do not fear me?
  '12':
  - type: text
    content: I will expose your righteousness and your works,
  - type: text
    content: and they will not benefit you.
  '13':
  - type: text
    content: When you cry out for help,
  - type: text
    content: let your collection of idols save you!
  - type: text
    content: The wind will carry all of them off,
  - type: text
    content: a mere breath will blow them away.
  - type: text
    content: But whoever takes refuge in me
  - type: text
    content: will inherit the land
  - type: text
    content: and possess my holy mountain.”
  - type: heading
    content: Comfort for the Contrite
  '14':
  - type: text
    content: 'And it will be said:'
  - type: text
    content: “Build up, build up, prepare the road!
  - type: text
    content: Remove the obstacles out of the way of my people.”
  '15':
  - type: text
    content: For this is what the high and exalted One says—
  - type: text
    content: 'he who lives forever, whose name is holy:'
  - type: text
    content: “I live in a high and holy place,
  - type: text
    content: but also with the one who is contrite and lowly in spirit,
  - type: text
    content: to revive the spirit of the lowly
  - type: text
    content: and to revive the heart of the contrite.
  '16':
  - type: text
    content: I will not accuse them forever,
  - type: text
    content: nor will I always be angry,
  - type: text
    content: for then they would faint away because of me—
  - type: text
    content: the very people I have created.
  '17':
  - type: text
    content: I was enraged by their sinful greed;
  - type: text
    content: I punished them, and hid my face in anger,
  - type: text
    content: yet they kept on in their willful ways.
  '18':
  - type: text
    content: I have seen their ways, but I will heal them;
  - type: text
    content: I will guide them and restore comfort to Israel’s mourners,
  '19':
  - type: text
    content: creating praise on their lips.
  - type: text
    content: Peace, peace, to those far and near,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: . “And I will heal them.”
  '2':
  - type: text
    content: Those who walk uprightly
  - type: text
    content: enter into peace;
  - type: text
    content: they find rest as they lie in death.
  '20':
  - type: text
    content: But the wicked are like the tossing sea,
  - type: text
    content: which cannot rest,
  - type: text
    content: whose waves cast up mire and mud.
  '21':
  - type: text
    content: “There is no peace,” says my God, “for the wicked.”
  '3':
  - type: text
    content: “But you—come here, you children of a sorceress,
  - type: text
    content: you offspring of adulterers and prostitutes!
  '4':
  - type: text
    content: Who are you mocking?
  - type: text
    content: At whom do you sneer
  - type: text
    content: and stick out your tongue?
  - type: text
    content: Are you not a brood of rebels,
  - type: text
    content: the offspring of liars?
  '5':
  - type: text
    content: You burn with lust among the oaks
  - type: text
    content: and under every spreading tree;
  - type: text
    content: you sacrifice your children in the ravines
  - type: text
    content: and under the overhanging crags.
  '6':
  - type: text
    content: The idols among the smooth stones of the ravines are your portion;
  - type: text
    content: indeed, they are your lot.
  - type: text
    content: Yes, to them you have poured out drink offerings
  - type: text
    content: and offered grain offerings.
  - type: text
    content: In view of all this, should I relent?
  '7':
  - type: text
    content: You have made your bed on a high and lofty hill;
  - type: text
    content: there you went up to offer your sacrifices.
  '8':
  - type: text
    content: Behind your doors and your doorposts
  - type: text
    content: you have put your pagan symbols.
  - type: text
    content: Forsaking me, you uncovered your bed,
  - type: text
    content: you climbed into it and opened it wide;
  - type: text
    content: you made a pact with those whose beds you love,
  - type: text
    content: and you looked with lust on their naked bodies.
  '9':
  - type: text
    content: You went to Molek
  - type: note
    content: Or to the king
  - type: text
    content: ' with olive oil'
  - type: text
    content: and increased your perfumes.
  - type: text
    content: You sent your ambassadors
  - type: note
    content: Or idols
  - type: text
    content: ' far away;'
  - type: text
    content: you descended to the very realm of the dead!
