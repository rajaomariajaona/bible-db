document_id: ISA.57,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The righteous perish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one takes it to heart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the devout are taken away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one understands
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that the righteous are taken away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be spared from evil.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You wearied yourself by such going about,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you would not say, ‘It is hopeless.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You found renewal of your strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so you did not faint.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Whom have you so dreaded and feared
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you have not been true to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and have neither remembered me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor taken this to heart?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is it not because I have long been silent
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you do not fear me?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will expose your righteousness and your works,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will not benefit you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: When you cry out for help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let your collection of idols save you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wind will carry all of them off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a mere breath will blow them away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But whoever takes refuge in me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will inherit the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and possess my holy mountain.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comfort for the Contrite
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And it will be said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Build up, build up, prepare the road!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Remove the obstacles out of the way of my people.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: For this is what the high and exalted One says—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he who lives forever, whose name is holy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I live in a high and holy place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but also with the one who is contrite and lowly in spirit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to revive the spirit of the lowly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to revive the heart of the contrite.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I will not accuse them forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will I always be angry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for then they would faint away because of me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the very people I have created.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I was enraged by their sinful greed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I punished them, and hid my face in anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet they kept on in their willful ways.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: I have seen their ways, but I will heal them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will guide them and restore comfort to Israel’s mourners,
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: creating praise on their lips.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peace, peace, to those far and near,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . “And I will heal them.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Those who walk uprightly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: enter into peace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they find rest as they lie in death.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: But the wicked are like the tossing sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which cannot rest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose waves cast up mire and mud.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “There is no peace,” says my God, “for the wicked.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “But you—come here, you children of a sorceress,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you offspring of adulterers and prostitutes!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Who are you mocking?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: At whom do you sneer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stick out your tongue?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you not a brood of rebels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the offspring of liars?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You burn with lust among the oaks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and under every spreading tree;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you sacrifice your children in the ravines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and under the overhanging crags.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The idols among the smooth stones of the ravines are your portion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: indeed, they are your lot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, to them you have poured out drink offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and offered grain offerings.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In view of all this, should I relent?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You have made your bed on a high and lofty hill;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there you went up to offer your sacrifices.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Behind your doors and your doorposts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have put your pagan symbols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Forsaking me, you uncovered your bed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you climbed into it and opened it wide;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you made a pact with those whose beds you love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you looked with lust on their naked bodies.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You went to Molek
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to the king
      marker-yv: yv-n
    - type: text
      text: ' with olive oil'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and increased your perfumes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You sent your ambassadors
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: idols
      marker-yv: yv-n
    - type: text
      text: ' far away;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you descended to the very realm of the dead!
