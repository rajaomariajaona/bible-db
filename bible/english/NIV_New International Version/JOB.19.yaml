  '3':
  - type: text
    content: Ten times now you have reproached me;
  - type: text
    content: shamelessly you attack me.
  '4':
  - type: text
    content: If it is true that I have gone astray,
  - type: text
    content: my error remains my concern alone.
  '5':
  - type: text
    content: If indeed you would exalt yourselves above me
  - type: text
    content: and use my humiliation against me,
  '6':
  - type: text
    content: then know that God has wronged me
  - type: text
    content: and drawn his net around me.
  '7':
  - type: text
    content: “Though I cry, ‘Violence!’ I get no response;
  - type: text
    content: though I call for help, there is no justice.
  '8':
  - type: text
    content: He has blocked my way so I cannot pass;
  - type: text
    content: he has shrouded my paths in darkness.
  '9':
  - type: text
    content: He has stripped me of my honor
  - type: text
    content: and removed the crown from my head.
