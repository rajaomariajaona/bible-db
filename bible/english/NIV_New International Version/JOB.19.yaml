document_id: JOB.19,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Job replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He tears me down on every side till I am gone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he uproots my hope like a tree.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His anger burns against me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he counts me among his enemies.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His troops advance in force;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they build a siege ramp against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and encamp around my tent.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He has alienated my family from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my acquaintances are completely estranged from me.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My relatives have gone away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my closest friends have forgotten me.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My guests and my female servants count me a foreigner;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they look on me as on a stranger.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I summon my servant, but he does not answer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though I beg him with my own mouth.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My breath is offensive to my wife;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am loathsome to my own family.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the little boys scorn me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I appear, they ridicule me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my intimate friends detest me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those I love have turned against me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How long will you torment me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and crush me with words?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am nothing but skin and bones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have escaped only by the skin of my teeth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: only by my gums
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Have pity on me, my friends, have pity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the hand of God has struck me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you pursue me as God does?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you never get enough of my flesh?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Oh, that my words were recorded,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they were written on a scroll,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that they were inscribed with an iron tool on
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and
      marker-yv: yv-n
    - type: text
      text: ' lead,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or engraved in rock forever!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know that my redeemer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vindicator
      marker-yv: yv-n
    - type: text
      text: ' lives,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and that in the end he will stand on the earth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on my grave
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And after my skin has been destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: And after I awake, / though this body has been destroyed, / then
      marker-yv: yv-n
    - type: text
      text: ' in'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: destroyed, / apart from
      marker-yv: yv-n
    - type: text
      text: ' my flesh I will see God;'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I myself will see him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with my own eyes—I, and not another.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How my heart yearns within me!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you say, ‘How we will hound him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: since the root of the trouble lies in him,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts, Septuagint and Vulgate; most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me
      marker-yv: yv-n
    - type: text
      text: ’
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you should fear the sword yourselves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for wrath will bring punishment by the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then you will know that there is judgment.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sword, / that you may come to know the Almighty
      marker-yv: yv-n
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ten times now you have reproached me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shamelessly you attack me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If it is true that I have gone astray,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my error remains my concern alone.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If indeed you would exalt yourselves above me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and use my humiliation against me,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then know that God has wronged me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drawn his net around me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though I cry, ‘Violence!’ I get no response;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though I call for help, there is no justice.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has blocked my way so I cannot pass;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has shrouded my paths in darkness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has stripped me of my honor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and removed the crown from my head.
