    content: Job
  - type: text
    content: 'Then Job replied:'
  '10':
  - type: text
    content: He tears me down on every side till I am gone;
  - type: text
    content: he uproots my hope like a tree.
  '11':
  - type: text
    content: His anger burns against me;
  - type: text
    content: he counts me among his enemies.
  '12':
  - type: text
    content: His troops advance in force;
  - type: text
    content: they build a siege ramp against me
  - type: text
    content: and encamp around my tent.
  '13':
  - type: text
    content: “He has alienated my family from me;
  - type: text
    content: my acquaintances are completely estranged from me.
  '14':
  - type: text
    content: My relatives have gone away;
  - type: text
    content: my closest friends have forgotten me.
  '15':
  - type: text
    content: My guests and my female servants count me a foreigner;
  - type: text
    content: they look on me as on a stranger.
  '16':
  - type: text
    content: I summon my servant, but he does not answer,
  - type: text
    content: though I beg him with my own mouth.
  '17':
  - type: text
    content: My breath is offensive to my wife;
  - type: text
    content: I am loathsome to my own family.
  '18':
  - type: text
    content: Even the little boys scorn me;
  - type: text
    content: when I appear, they ridicule me.
  '19':
  - type: text
    content: All my intimate friends detest me;
  - type: text
    content: those I love have turned against me.
  '2':
  - type: text
    content: “How long will you torment me
  - type: text
    content: and crush me with words?
  '20':
  - type: text
    content: I am nothing but skin and bones;
  - type: text
    content: I have escaped only by the skin of my teeth.
  - type: note
    content: Or only by my gums
  '21':
  - type: text
    content: “Have pity on me, my friends, have pity,
  - type: text
    content: for the hand of God has struck me.
  '22':
  - type: text
    content: Why do you pursue me as God does?
  - type: text
    content: Will you never get enough of my flesh?
  '23':
  - type: text
    content: “Oh, that my words were recorded,
  - type: text
