document_id: 1CO.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Rights as an Apostle
  - type: text
    content: 'Am I not free? Am I not an apostle? Have I not seen Jesus our Lord? Are you not the result of my work in the Lord? '
  '10':
  - type: text
    content: 'Surely he says this for us, doesn’t he? Yes, this was written for us, because whoever plows and threshes should be able to do so in the hope of sharing in the harvest. '
  '11':
  - type: text
    content: 'If we have sown spiritual seed among you, is it too much if we reap a material harvest from you? '
  '12':
  - type: text
    content: If others have this right of support from you, shouldn’t we have it all the more?
  - type: text
    content: But we did not use this right. On the contrary, we put up with anything rather than hinder the gospel of Christ.
  '13':
  - type: text
    content: 'Don’t you know that those who serve in the temple get their food from the temple, and that those who serve at the altar share in what is offered on the altar? '
  '14':
  - type: text
    content: In the same way, the Lord has commanded that those who preach the gospel should receive their living from the gospel.
  '15':
  - type: text
    content: 'But I have not used any of these rights. And I am not writing this in the hope that you will do such things for me, for I would rather die than allow anyone to deprive me of this boast. '
  '16':
  - type: text
    content: 'For when I preach the gospel, I cannot boast, since I am compelled to preach. Woe to me if I do not preach the gospel! '
  '17':
  - type: text
    content: 'If I preach voluntarily, I have a reward; if not voluntarily, I am simply discharging the trust committed to me. '
  '18':
  - type: text
    content: 'What then is my reward? Just this: that in preaching the gospel I may offer it free of charge, and so not make full use of my rights as a preacher of the gospel.'
  - type: heading
    content: Paul’s Use of His Freedom
  '19':
  - type: text
    content: 'Though I am free and belong to no one, I have made myself a slave to everyone, to win as many as possible. '
  '2':
  - type: text
    content: Even though I may not be an apostle to others, surely I am to you! For you are the seal of my apostleship in the Lord.
  '20':
  - type: text
    content: 'To the Jews I became like a Jew, to win the Jews. To those under the law I became like one under the law (though I myself am not under the law), so as to win those under the law. '
  '21':
  - type: text
    content: 'To those not having the law I became like one not having the law (though I am not free from God’s law but am under Christ’s law), so as to win those not having the law. '
  '22':
  - type: text
    content: 'To the weak I became weak, to win the weak. I have become all things to all people so that by all possible means I might save some. '
  '23':
  - type: text
    content: I do all this for the sake of the gospel, that I may share in its blessings.
  - type: heading
    content: The Need for Self-Discipline
  '24':
  - type: text
    content: 'Do you not know that in a race all the runners run, but only one gets the prize? Run in such a way as to get the prize. '
  '25':
  - type: text
    content: 'Everyone who competes in the games goes into strict training. They do it to get a crown that will not last, but we do it to get a crown that will last forever. '
  '26':
  - type: text
    content: 'Therefore I do not run like someone running aimlessly; I do not fight like a boxer beating the air. '
  '27':
  - type: text
    content: No, I strike a blow to my body and make it my slave so that after I have preached to others, I myself will not be disqualified for the prize.
  '3':
  - type: text
    content: 'This is my defense to those who sit in judgment on me. '
  '4':
  - type: text
    content: 'Don’t we have the right to food and drink? '
  '5':
  - type: text
    content: Don’t we have the right to take a believing wife along with us, as do the other apostles and the Lord’s brothers and Cephas
  - type: note
    content: That is, Peter
  - type: text
    content: '? '
  '6':
  - type: text
    content: Or is it only I and Barnabas who lack the right to not work for a living?
  '7':
  - type: text
    content: 'Who serves as a soldier at his own expense? Who plants a vineyard and does not eat its grapes? Who tends a flock and does not drink the milk? '
  '8':
  - type: text
    content: 'Do I say this merely on human authority? Doesn’t the Law say the same thing? '
  '9':
  - type: text
    content: 'For it is written in the Law of Moses: “Do not muzzle an ox while it is treading out the grain.”'
  - type: note
    content: Deut. 25:4
  - type: text
    content: ' Is it about oxen that God is concerned? '
