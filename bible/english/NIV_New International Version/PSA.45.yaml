document_id: PSA.45,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 45In Hebrew texts 45:1-17 is numbered 45:2-18.
  - type: text
    content: 'For the director of music. To the tune of “Lilies.” Of the Sons of Korah. A '
  - type: text
    content: maskil.
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' A wedding song.'
  - type: text
    content: My heart is stirred by a noble theme
  - type: text
    content: as I recite my verses for the king;
  - type: text
    content: my tongue is the pen of a skillful writer.
  '10':
  - type: text
    content: 'Listen, daughter, and pay careful attention:'
  - type: text
    content: Forget your people and your father’s house.
  '11':
  - type: text
    content: Let the king be enthralled by your beauty;
  - type: text
    content: honor him, for he is your lord.
  '12':
  - type: text
    content: The city of Tyre will come with a gift,
  - type: note
    content: Or A Tyrian robe is among the gifts
  - type: text
    content: people of wealth will seek your favor.
  '13':
  - type: text
    content: All glorious is the princess within her chamber;
  - type: text
    content: her gown is interwoven with gold.
  '14':
  - type: text
    content: In embroidered garments she is led to the king;
  - type: text
    content: her virgin companions follow her—
  - type: text
    content: those brought to be with her.
  '15':
  - type: text
    content: Led in with joy and gladness,
  - type: text
    content: they enter the palace of the king.
  '16':
  - type: text
    content: Your sons will take the place of your fathers;
  - type: text
    content: you will make them princes throughout the land.
  '17':
  - type: text
    content: I will perpetuate your memory through all generations;
  - type: text
    content: therefore the nations will praise you for ever and ever.
  '2':
  - type: text
    content: You are the most excellent of men
  - type: text
    content: and your lips have been anointed with grace,
  - type: text
    content: since God has blessed you forever.
  '3':
  - type: text
    content: Gird your sword on your side, you mighty one;
  - type: text
    content: clothe yourself with splendor and majesty.
  '4':
  - type: text
    content: In your majesty ride forth victoriously
  - type: text
    content: in the cause of truth, humility and justice;
  - type: text
    content: let your right hand achieve awesome deeds.
  '5':
  - type: text
    content: Let your sharp arrows pierce the hearts of the king’s enemies;
  - type: text
    content: let the nations fall beneath your feet.
  '6':
  - type: text
    content: Your throne, O God,
  - type: note
    content: Here the king is addressed as God’s representative.
  - type: text
    content: ' will last for ever and ever;'
  - type: text
    content: a scepter of justice will be the scepter of your kingdom.
  '7':
  - type: text
    content: You love righteousness and hate wickedness;
  - type: text
    content: therefore God, your God, has set you above your companions
  - type: text
    content: by anointing you with the oil of joy.
  '8':
  - type: text
    content: All your robes are fragrant with myrrh and aloes and cassia;
  - type: text
    content: from palaces adorned with ivory
  - type: text
    content: the music of the strings makes you glad.
  '9':
  - type: text
    content: Daughters of kings are among your honored women;
  - type: text
    content: at your right hand is the royal bride in gold of Ophir.
