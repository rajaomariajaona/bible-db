document_id: PSA.45,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 45
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 45:1-17 is numbered 45:2-18.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. To the tune of “Lilies.” Of the Sons of Korah. A '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: maskil.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a literary or musical term'
      marker-yv: yv-n
    - type: text
      text: ' A wedding song.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is stirred by a noble theme
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I recite my verses for the king;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my tongue is the pen of a skillful writer.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen, daughter, and pay careful attention:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Forget your people and your father’s house.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the king be enthralled by your beauty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: honor him, for he is your lord.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The city of Tyre will come with a gift,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A Tyrian robe is among the gifts
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people of wealth will seek your favor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All glorious is the princess within her chamber;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her gown is interwoven with gold.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In embroidered garments she is led to the king;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her virgin companions follow her—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those brought to be with her.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Led in with joy and gladness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they enter the palace of the king.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your sons will take the place of your fathers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will make them princes throughout the land.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will perpetuate your memory through all generations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore the nations will praise you for ever and ever.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are the most excellent of men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your lips have been anointed with grace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: since God has blessed you forever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gird your sword on your side, you mighty one;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clothe yourself with splendor and majesty.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your majesty ride forth victoriously
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the cause of truth, humility and justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let your right hand achieve awesome deeds.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your sharp arrows pierce the hearts of the king’s enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the nations fall beneath your feet.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your throne, O God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Here the king is addressed as God’s representative.
      marker-yv: yv-n
    - type: text
      text: ' will last for ever and ever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a scepter of justice will be the scepter of your kingdom.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You love righteousness and hate wickedness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore God, your God, has set you above your companions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by anointing you with the oil of joy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your robes are fragrant with myrrh and aloes and cassia;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from palaces adorned with ivory
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the music of the strings makes you glad.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Daughters of kings are among your honored women;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at your right hand is the royal bride in gold of Ophir.
