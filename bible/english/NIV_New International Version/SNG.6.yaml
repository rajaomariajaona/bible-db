document_id: SNG.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Friends
  - type: text
    content: Where has your beloved gone,
  - type: text
    content: most beautiful of women?
  - type: text
    content: Which way did your beloved turn,
  - type: text
    content: that we may look for him with you?
  - type: heading
    content: She
  '10':
  - type: text
    content: Who is this that appears like the dawn,
  - type: text
    content: fair as the moon, bright as the sun,
  - type: text
    content: majestic as the stars in procession?
  - type: heading
    content: He
  '11':
  - type: text
    content: I went down to the grove of nut trees
  - type: text
    content: to look at the new growth in the valley,
  - type: text
    content: to see if the vines had budded
  - type: text
    content: or the pomegranates were in bloom.
  '12':
  - type: text
    content: Before I realized it,
  - type: text
    content: my desire set me among the royal chariots of my people.
  - type: note
    content: Or among the chariots of Amminadab; or among the chariots of the people of the prince
  - type: heading
    content: Friends
  '13':
  - type: text
    content: Come back, come back, O Shulammite;
  - type: text
    content: come back, come back, that we may gaze on you!
  - type: heading
    content: He
  - type: text
    content: Why would you gaze on the Shulammite
  - type: text
    content: as on the dance of Mahanaim?
  - type: note
    content: In Hebrew texts this verse (6:13) is numbered 7:1.
  '2':
  - type: text
    content: My beloved has gone down to his garden,
  - type: text
    content: to the beds of spices,
  - type: text
    content: to browse in the gardens
  - type: text
    content: and to gather lilies.
  '3':
  - type: text
    content: I am my beloved’s and my beloved is mine;
  - type: text
    content: he browses among the lilies.
  - type: heading
    content: He
  '4':
  - type: text
    content: You are as beautiful as Tirzah, my darling,
  - type: text
    content: as lovely as Jerusalem,
  - type: text
    content: as majestic as troops with banners.
  '5':
  - type: text
    content: Turn your eyes from me;
  - type: text
    content: they overwhelm me.
  - type: text
    content: Your hair is like a flock of goats
  - type: text
    content: descending from Gilead.
  '6':
  - type: text
    content: Your teeth are like a flock of sheep
  - type: text
    content: coming up from the washing.
  - type: text
    content: Each has its twin,
  - type: text
    content: not one of them is missing.
  '7':
  - type: text
    content: Your temples behind your veil
  - type: text
    content: are like the halves of a pomegranate.
  '8':
  - type: text
    content: Sixty queens there may be,
  - type: text
    content: and eighty concubines,
  - type: text
    content: and virgins beyond number;
  '9':
  - type: text
    content: but my dove, my perfect one, is unique,
  - type: text
    content: the only daughter of her mother,
  - type: text
    content: the favorite of the one who bore her.
  - type: text
    content: The young women saw her and called her blessed;
  - type: text
    content: the queens and concubines praised her.
  - type: heading
    content: Friends
