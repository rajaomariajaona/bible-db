document_id: SNG.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Friends
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Where has your beloved gone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: most beautiful of women?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which way did your beloved turn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that we may look for him with you?
  - type: usfm
    marker: sp
    children:
    - type: text
      text: She
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Who is this that appears like the dawn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fair as the moon, bright as the sun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: majestic as the stars in procession?
  - type: usfm
    marker: sp
    children:
    - type: text
      text: He
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I went down to the grove of nut trees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to look at the new growth in the valley,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to see if the vines had budded
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the pomegranates were in bloom.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Before I realized it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my desire set me among the royal chariots of my people.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: among the chariots of Amminadab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: among the chariots of the people of the prince
      marker-yv: yv-n
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Friends
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Come back, come back, O Shulammite;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come back, come back, that we may gaze on you!
  - type: usfm
    marker: sp
    children:
    - type: text
      text: He
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why would you gaze on the Shulammite
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as on the dance of Mahanaim?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts this verse (6:13) is numbered 7:1.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: My beloved has gone down to his garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the beds of spices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to browse in the gardens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to gather lilies.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I am my beloved’s and my beloved is mine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he browses among the lilies.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: He
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You are as beautiful as Tirzah, my darling,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as lovely as Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as majestic as troops with banners.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Turn your eyes from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they overwhelm me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your hair is like a flock of goats
  - type: usfm
    marker: q2
    children:
    - type: text
      text: descending from Gilead.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Your teeth are like a flock of sheep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: coming up from the washing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each has its twin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one of them is missing.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Your temples behind your veil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are like the halves of a pomegranate.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Sixty queens there may be,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and eighty concubines,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and virgins beyond number;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: but my dove, my perfect one, is unique,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the only daughter of her mother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the favorite of the one who bore her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young women saw her and called her blessed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the queens and concubines praised her.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Friends
    marker-yv: yv-h
