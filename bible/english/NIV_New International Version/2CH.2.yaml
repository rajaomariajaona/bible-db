document_id: 2CH.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparations for Building the Temple
  - type: note
    content: In Hebrew texts 2:1 is numbered 1:18, and 2:2-18 is numbered 2:1-17.
  - type: text
    content: 'Solomon gave orders to build a temple for the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ' and a royal palace for himself. '
  '10':
  - type: text
    content: I will give your servants, the woodsmen who cut the timber, twenty thousand cors
  - type: note
    content: That is, probably about 3,600 tons or about 3,200 metric tons of wheat
  - type: text
    content: ' of ground wheat, twenty thousand cors'
  - type: note
    content: That is, probably about 3,000 tons or about 2,700 metric tons of barley
  - type: text
    content: ' of barley, twenty thousand baths'
  - type: note
    content: That is, about 120,000 gallons or about 440,000 liters
  - type: text
    content: ' of wine and twenty thousand baths of olive oil.”'
  '11':
  - type: text
    content: 'Hiram king of Tyre replied by letter to Solomon:'
  - type: text
    content: '“Because the '
  - type: text
    content: Lord
  - type: text
    content: ' loves his people, he has made you their king.”'
  '12':
  - type: text
    content: 'And Hiram added:'
  - type: text
    content: '“Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who made heaven and earth! He has given King David a wise son, endowed with intelligence and discernment, who will build a temple for the '
  - type: text
    content: Lord
  - type: text
    content: ' and a palace for himself.'
  '13':
  - type: text
    content: '“I am sending you Huram-Abi, a man of great skill, '
  '14':
  - type: text
    content: whose mother was from Dan and whose father was from Tyre. He is trained to work in gold and silver, bronze and iron, stone and wood, and with purple and blue and crimson yarn and fine linen. He is experienced in all kinds of engraving and can execute any design given to him. He will work with your skilled workers and with those of my lord, David your father.
  '15':
  - type: text
    content: '“Now let my lord send his servants the wheat and barley and the olive oil and wine he promised, '
  '16':
  - type: text
    content: and we will cut all the logs from Lebanon that you need and will float them as rafts by sea down to Joppa. You can then take them up to Jerusalem.”
  '17':
  - type: text
    content: 'Solomon took a census of all the foreigners residing in Israel, after the census his father David had taken; and they were found to be 153,600. '
  '18':
  - type: text
    content: He assigned 70,000 of them to be carriers and 80,000 to be stonecutters in the hills, with 3,600 foremen over them to keep the people working.
  '2':
  - type: text
    content: He conscripted 70,000 men as carriers and 80,000 as stonecutters in the hills and 3,600 as foremen over them.
  '3':
  - type: text
    content: Solomon sent this message to Hiram
  - type: note
    content: Hebrew Huram, a variant of Hiram also in verses 11 and 12
  - type: text
    content: ' king of Tyre:'
  - type: text
    content: '“Send me cedar logs as you did for my father David when you sent him cedar to build a palace to live in. '
  '4':
  - type: text
    content: 'Now I am about to build a temple for the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God and to dedicate it to him for burning fragrant incense before him, for setting out the consecrated bread regularly, and for making burnt offerings every morning and evening and on the Sabbaths, at the New Moons and at the appointed festivals of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God. This is a lasting ordinance for Israel.'
  '5':
  - type: text
    content: '“The temple I am going to build will be great, because our God is greater than all other gods. '
  '6':
  - type: text
    content: But who is able to build a temple for him, since the heavens, even the highest heavens, cannot contain him? Who then am I to build a temple for him, except as a place to burn sacrifices before him?
  '7':
  - type: text
    content: “Send me, therefore, a man skilled to work in gold and silver, bronze and iron, and in purple, crimson and blue yarn, and experienced in the art of engraving, to work in Judah and Jerusalem with my skilled workers, whom my father David provided.
  '8':
  - type: text
    content: “Send me also cedar, juniper and algum
  - type: note
    content: Probably a variant of almug
  - type: text
    content: ' logs from Lebanon, for I know that your servants are skilled in cutting timber there. My servants will work with yours '
  '9':
  - type: text
    content: 'to provide me with plenty of lumber, because the temple I build must be large and magnificent. '
