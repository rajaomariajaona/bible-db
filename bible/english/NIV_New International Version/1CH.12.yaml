document_id: 1CH.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Warriors Join David
  - type: text
    content: 'These were the men who came to David at Ziklag, while he was banished from the presence of Saul son of Kish (they were among the warriors who helped him in battle; '
  '10':
  - type: text
    content: Mishmannah the fourth, Jeremiah the fifth,
  '11':
  - type: text
    content: Attai the sixth, Eliel the seventh,
  '12':
  - type: text
    content: Johanan the eighth, Elzabad the ninth,
  '13':
  - type: text
    content: Jeremiah the tenth and Makbannai the eleventh.
  '14':
  - type: text
    content: 'These Gadites were army commanders; the least was a match for a hundred, and the greatest for a thousand. '
  '15':
  - type: text
    content: It was they who crossed the Jordan in the first month when it was overflowing all its banks, and they put to flight everyone living in the valleys, to the east and to the west.
  '16':
  - type: text
    content: 'Other Benjamites and some men from Judah also came to David in his stronghold. '
  '17':
  - type: text
    content: David went out to meet them and said to them, “If you have come to me in peace to help me, I am ready for you to join me. But if you have come to betray me to my enemies when my hands are free from violence, may the God of our ancestors see it and judge you.”
  '18':
  - type: text
    content: 'Then the Spirit came on Amasai, chief of the Thirty, and he said:'
  - type: text
    content: “We are yours, David!
  - type: text
    content: We are with you, son of Jesse!
  - type: text
    content: Success, success to you,
  - type: text
    content: and success to those who help you,
  - type: text
    content: for your God will help you.”
  - type: text
    content: So David received them and made them leaders of his raiding bands.
  '19':
  - type: text
    content: 'Some of the tribe of Manasseh defected to David when he went with the Philistines to fight against Saul. (He and his men did not help the Philistines because, after consultation, their rulers sent him away. They said, “It will cost us our heads if he deserts to his master Saul.”) '
  '2':
  - type: text
    content: 'they were armed with bows and were able to shoot arrows or to sling stones right-handed or left-handed; they were relatives of Saul from the tribe of Benjamin):'
  '20':
  - type: text
    content: 'When David went to Ziklag, these were the men of Manasseh who defected to him: Adnah, Jozabad, Jediael, Michael, Jozabad, Elihu and Zillethai, leaders of units of a thousand in Manasseh. '
  '21':
  - type: text
    content: 'They helped David against raiding bands, for all of them were brave warriors, and they were commanders in his army. '
  '22':
  - type: text
    content: Day after day men came to help David, until he had a great army, like the army of God.
  - type: note
    content: Or a great and mighty army
  - type: heading
    content: Others Join David at Hebron
  '23':
  - type: text
    content: 'These are the numbers of the men armed for battle who came to David at Hebron to turn Saul’s kingdom over to him, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said:'
  '24':
  - type: text
    content: from Judah, carrying shield and spear—6,800 armed for battle;
  '25':
  - type: text
    content: from Simeon, warriors ready for battle—7,100;
  '26':
  - type: text
    content: 'from Levi—4,600, '
  '27':
  - type: text
    content: 'including Jehoiada, leader of the family of Aaron, with 3,700 men, '
  '28':
  - type: text
    content: and Zadok, a brave young warrior, with 22 officers from his family;
  '29':
  - type: text
    content: from Benjamin, Saul’s tribe—3,000, most of whom had remained loyal to Saul’s house until then;
  '3':
  - type: text
    content: 'Ahiezer their chief and Joash the sons of Shemaah the Gibeathite; Jeziel and Pelet the sons of Azmaveth; Berakah, Jehu the Anathothite, '
  '30':
  - type: text
    content: from Ephraim, brave warriors, famous in their own clans—20,800;
  '31':
  - type: text
    content: from half the tribe of Manasseh, designated by name to come and make David king—18,000;
  '32':
  - type: text
    content: from Issachar, men who understood the times and knew what Israel should do—200 chiefs, with all their relatives under their command;
  '33':
  - type: text
    content: from Zebulun, experienced soldiers prepared for battle with every type of weapon, to help David with undivided loyalty—50,000;
  '34':
  - type: text
    content: from Naphtali—1,000 officers, together with 37,000 men carrying shields and spears;
  '35':
  - type: text
    content: from Dan, ready for battle—28,600;
  '36':
  - type: text
    content: from Asher, experienced soldiers prepared for battle—40,000;
  '37':
  - type: text
    content: and from east of the Jordan, from Reuben, Gad and the half-tribe of Manasseh, armed with every type of weapon—120,000.
  '38':
  - type: text
    content: 'All these were fighting men who volunteered to serve in the ranks. They came to Hebron fully determined to make David king over all Israel. All the rest of the Israelites were also of one mind to make David king. '
  '39':
  - type: text
    content: 'The men spent three days there with David, eating and drinking, for their families had supplied provisions for them. '
  '4':
  - type: text
    content: and Ishmaiah the Gibeonite, a mighty warrior among the Thirty, who was a leader of the Thirty; Jeremiah, Jahaziel, Johanan, Jozabad the Gederathite,
  - type: note
    content: In Hebrew texts the second half of this verse (Jeremiah… Gederathite) is numbered 12:5, and 12:5-40 is numbered 12:6-41.
  - type: text
    content: ' '
  '40':
  - type: text
    content: Also, their neighbors from as far away as Issachar, Zebulun and Naphtali came bringing food on donkeys, camels, mules and oxen. There were plentiful supplies of flour, fig cakes, raisin cakes, wine, olive oil, cattle and sheep, for there was joy in Israel.
  '5':
  - type: text
    content: 'Eluzai, Jerimoth, Bealiah, Shemariah and Shephatiah the Haruphite; '
  '6':
  - type: text
    content: 'Elkanah, Ishiah, Azarel, Joezer and Jashobeam the Korahites; '
  '7':
  - type: text
    content: and Joelah and Zebadiah the sons of Jeroham from Gedor.
  '8':
  - type: text
    content: Some Gadites defected to David at his stronghold in the wilderness. They were brave warriors, ready for battle and able to handle the shield and spear. Their faces were the faces of lions, and they were as swift as gazelles in the mountains.
  '9':
  - type: text
    content: Ezer was the chief,
  - type: text
    content: Obadiah the second in command, Eliab the third,
