document_id: PSA.93,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 93
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns, he is robed in majesty;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is robed in majesty and armed with strength;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: indeed, the world is established, firm and secure.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Your throne was established long ago;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are from all eternity.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The seas have lifted up, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the seas have lifted up their voice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the seas have lifted up their pounding waves.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mightier than the thunder of the great waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mightier than the breakers of the sea—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on high is mighty.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Your statutes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', stand firm;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: holiness adorns your house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for endless days.
