verses:
  '1':
  - type: heading
    content: Psalm 93
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns, he is robed in majesty;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is robed in majesty and armed with strength;'
  - type: text
    content: indeed, the world is established, firm and secure.
  '2':
  - type: text
    content: Your throne was established long ago;
  - type: text
    content: you are from all eternity.
  '3':
  - type: text
    content: 'The seas have lifted up, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the seas have lifted up their voice;
  - type: text
    content: the seas have lifted up their pounding waves.
  '4':
  - type: text
    content: Mightier than the thunder of the great waters,
  - type: text
    content: mightier than the breakers of the sea—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' on high is mighty.'
  '5':
  - type: text
    content: 'Your statutes, '
  - type: text
    content: Lord
  - type: text
    content: ', stand firm;'
  - type: text
    content: holiness adorns your house
  - type: text
    content: for endless days.
