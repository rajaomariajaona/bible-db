document_id: PSA.123,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 123
  - type: text
    content: A song of ascents.
  - type: text
    content: I lift up my eyes to you,
  - type: text
    content: to you who sit enthroned in heaven.
  '2':
  - type: text
    content: As the eyes of slaves look to the hand of their master,
  - type: text
    content: as the eyes of a female slave look to the hand of her mistress,
  - type: text
    content: 'so our eyes look to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: till he shows us his mercy.
  '3':
  - type: text
    content: 'Have mercy on us, '
  - type: text
    content: Lord
  - type: text
    content: ', have mercy on us,'
  - type: text
    content: for we have endured no end of contempt.
  '4':
  - type: text
    content: We have endured no end
  - type: text
    content: of ridicule from the arrogant,
  - type: text
    content: of contempt from the proud.
