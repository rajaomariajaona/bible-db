document_id: 2CO.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Final Warnings
  - type: text
    content: This will be my third visit to you. “Every matter must be established by the testimony of two or three witnesses.”
  - type: note
    content: Deut. 19:15
  - type: text
    content: ' '
  '10':
  - type: text
    content: This is why I write these things when I am absent, that when I come I may not have to be harsh in my use of authority—the authority the Lord gave me for building you up, not for tearing you down.
  - type: heading
    content: Final Greetings
  '11':
  - type: text
    content: Finally, brothers and sisters, rejoice! Strive for full restoration, encourage one another, be of one mind, live in peace. And the God of love and peace will be with you.
  '12':
  - type: text
    content: 'Greet one another with a holy kiss. '
  '13':
  - type: text
    content: All God’s people here send their greetings.
  '14':
  - type: text
    content: May the grace of the Lord Jesus Christ, and the love of God, and the fellowship of the Holy Spirit be with you all.
  '2':
  - type: text
    content: 'I already gave you a warning when I was with you the second time. I now repeat it while absent: On my return I will not spare those who sinned earlier or any of the others, '
  '3':
  - type: text
    content: 'since you are demanding proof that Christ is speaking through me. He is not weak in dealing with you, but is powerful among you. '
  '4':
  - type: text
    content: For to be sure, he was crucified in weakness, yet he lives by God’s power. Likewise, we are weak in him, yet by God’s power we will live with him in our dealing with you.
  '5':
  - type: text
    content: 'Examine yourselves to see whether you are in the faith; test yourselves. Do you not realize that Christ Jesus is in you—unless, of course, you fail the test? '
  '6':
  - type: text
    content: 'And I trust that you will discover that we have not failed the test. '
  '7':
  - type: text
    content: 'Now we pray to God that you will not do anything wrong—not so that people will see that we have stood the test but so that you will do what is right even though we may seem to have failed. '
  '8':
  - type: text
    content: 'For we cannot do anything against the truth, but only for the truth. '
  '9':
  - type: text
    content: 'We are glad whenever we are weak but you are strong; and our prayer is that you may be fully restored. '
