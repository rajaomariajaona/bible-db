document_id: JER.35,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Rekabites
  - type: text
    content: 'This is the word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' during the reign of Jehoiakim son of Josiah king of Judah: '
  '10':
  - type: text
    content: 'We have lived in tents and have fully obeyed everything our forefather Jehonadab commanded us. '
  '11':
  - type: text
    content: But when Nebuchadnezzar king of Babylon invaded this land, we said, ‘Come, we must go to Jerusalem to escape the Babylonian
  - type: note
    content: Or Chaldean
  - type: text
    content: ' and Aramean armies.’ So we have remained in Jerusalem.”'
  '12':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah, saying: '
  '13':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: Go and tell the people of Judah and those living in Jerusalem, ‘Will you not learn a lesson and obey my words?’ declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: '‘Jehonadab son of Rekab ordered his descendants not to drink wine and this command has been kept. To this day they do not drink wine, because they obey their forefather’s command. But I have spoken to you again and again, yet you have not obeyed me. '
  '15':
  - type: text
    content: 'Again and again I sent all my servants the prophets to you. They said, “Each of you must turn from your wicked ways and reform your actions; do not follow other gods to serve them. Then you will live in the land I have given to you and your ancestors.” But you have not paid attention or listened to me. '
  '16':
  - type: text
    content: The descendants of Jehonadab son of Rekab have carried out the command their forefather gave them, but these people have not obeyed me.’
  '17':
  - type: text
    content: '“Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty, the God of Israel, says: ‘Listen! I am going to bring on Judah and on everyone living in Jerusalem every disaster I pronounced against them. I spoke to them, but they did not listen; I called to them, but they did not answer.’ ”'
  '18':
  - type: text
    content: 'Then Jeremiah said to the family of the Rekabites, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: ‘You have obeyed the command of your forefather Jehonadab and have followed all his instructions and have done everything he ordered.’ '
  '19':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: ‘Jehonadab son of Rekab will never fail to have a descendant to serve me.’ ”'
  '2':
  - type: text
    content: '“Go to the Rekabite family and invite them to come to one of the side rooms of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and give them wine to drink.”'
  '3':
  - type: text
    content: 'So I went to get Jaazaniah son of Jeremiah, the son of Habazziniah, and his brothers and all his sons—the whole family of the Rekabites. '
  '4':
  - type: text
    content: 'I brought them into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', into the room of the sons of Hanan son of Igdaliah the man of God. It was next to the room of the officials, which was over that of Maaseiah son of Shallum the doorkeeper. '
  '5':
  - type: text
    content: Then I set bowls full of wine and some cups before the Rekabites and said to them, “Drink some wine.”
  '6':
  - type: text
    content: But they replied, “We do not drink wine, because our forefather Jehonadab
  - type: note
    content: Hebrew Jonadab, a variant of Jehonadab; here and often in this chapter
  - type: text
    content: ' son of Rekab gave us this command: ‘Neither you nor your descendants must ever drink wine. '
  '7':
  - type: text
    content: 'Also you must never build houses, sow seed or plant vineyards; you must never have any of these things, but must always live in tents. Then you will live a long time in the land where you are nomads.’ '
  '8':
  - type: text
    content: 'We have obeyed everything our forefather Jehonadab son of Rekab commanded us. Neither we nor our wives nor our sons and daughters have ever drunk wine '
  '9':
  - type: text
    content: 'or built houses to live in or had vineyards, fields or crops. '
