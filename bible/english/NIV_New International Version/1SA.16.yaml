document_id: 1SA.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Samuel Anoints David
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, “How long will you mourn for Saul, since I have rejected him as king over Israel? Fill your horn with oil and be on your way; I am sending you to Jesse of Bethlehem. I have chosen one of his sons to be king.”'
  '10':
  - type: text
    content: 'Jesse had seven of his sons pass before Samuel, but Samuel said to him, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has not chosen these.” '
  '11':
  - type: text
    content: So he asked Jesse, “Are these all the sons you have?”
  - type: text
    content: “There is still the youngest,” Jesse answered. “He is tending the sheep.”
  - type: text
    content: Samuel said, “Send for him; we will not sit down until he arrives.”
  '12':
  - type: text
    content: So he sent for him and had him brought in. He was glowing with health and had a fine appearance and handsome features.
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Rise and anoint him; this is the one.”'
  '13':
  - type: text
    content: 'So Samuel took the horn of oil and anointed him in the presence of his brothers, and from that day on the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came powerfully upon David. Samuel then went to Ramah.'
  - type: heading
    content: David in Saul’s Service
  '14':
  - type: text
    content: 'Now the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' had departed from Saul, and an evil'
  - type: note
    content: Or and a harmful; similarly in verses 15, 16 and 23
  - type: text
    content: ' spirit from the '
  - type: text
    content: Lord
  - type: text
    content: ' tormented him.'
  '15':
  - type: text
    content: 'Saul’s attendants said to him, “See, an evil spirit from God is tormenting you. '
  '16':
  - type: text
    content: Let our lord command his servants here to search for someone who can play the lyre. He will play when the evil spirit from God comes on you, and you will feel better.”
  '17':
  - type: text
    content: So Saul said to his attendants, “Find someone who plays well and bring him to me.”
  '18':
  - type: text
    content: 'One of the servants answered, “I have seen a son of Jesse of Bethlehem who knows how to play the lyre. He is a brave man and a warrior. He speaks well and is a fine-looking man. And the '
  - type: text
    content: Lord
  - type: text
    content: ' is with him.”'
  '19':
  - type: text
    content: 'Then Saul sent messengers to Jesse and said, “Send me your son David, who is with the sheep.” '
  '2':
  - type: text
    content: But Samuel said, “How can I go? If Saul hears about it, he will kill me.”
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Take a heifer with you and say, ‘I have come to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '20':
  - type: text
    content: So Jesse took a donkey loaded with bread, a skin of wine and a young goat and sent them with his son David to Saul.
  '21':
  - type: text
    content: 'David came to Saul and entered his service. Saul liked him very much, and David became one of his armor-bearers. '
  '22':
  - type: text
    content: Then Saul sent word to Jesse, saying, “Allow David to remain in my service, for I am pleased with him.”
  '23':
  - type: text
    content: Whenever the spirit from God came on Saul, David would take up his lyre and play. Then relief would come to Saul; he would feel better, and the evil spirit would leave him.
  '3':
  - type: text
    content: Invite Jesse to the sacrifice, and I will show you what to do. You are to anoint for me the one I indicate.”
  '4':
  - type: text
    content: 'Samuel did what the '
  - type: text
    content: Lord
  - type: text
    content: ' said. When he arrived at Bethlehem, the elders of the town trembled when they met him. They asked, “Do you come in peace?”'
  '5':
  - type: text
    content: 'Samuel replied, “Yes, in peace; I have come to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: . Consecrate yourselves and come to the sacrifice with me.” Then he consecrated Jesse and his sons and invited them to the sacrifice.
  '6':
  - type: text
    content: 'When they arrived, Samuel saw Eliab and thought, “Surely the '
  - type: text
    content: Lord
  - type: text
    content: '’s anointed stands here before the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '7':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Samuel, “Do not consider his appearance or his height, for I have rejected him. The '
  - type: text
    content: Lord
  - type: text
    content: ' does not look at the things people look at. People look at the outward appearance, but the '
  - type: text
    content: Lord
  - type: text
    content: ' looks at the heart.”'
  '8':
  - type: text
    content: 'Then Jesse called Abinadab and had him pass in front of Samuel. But Samuel said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has not chosen this one either.” '
  '9':
  - type: text
    content: 'Jesse then had Shammah pass by, but Samuel said, “Nor has the '
  - type: text
    content: Lord
  - type: text
    content: ' chosen this one.” '
