  '1':
  - type: heading
    content: Jeremiah’s Complaint
  - type: text
    content: 'You are always righteous, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: when I bring a case before you.
  - type: text
    content: 'Yet I would speak with you about your justice:'
  - type: text
    content: Why does the way of the wicked prosper?
  - type: text
    content: Why do all the faithless live at ease?
  '10':
  - type: text
    content: Many shepherds will ruin my vineyard
  - type: text
    content: and trample down my field;
  - type: text
    content: they will turn my pleasant field
  - type: text
    content: into a desolate wasteland.
  '11':
  - type: text
    content: It will be made a wasteland,
  - type: text
    content: parched and desolate before me;
  - type: text
    content: the whole land will be laid waste
  - type: text
    content: because there is no one who cares.
  '12':
  - type: text
    content: Over all the barren heights in the desert
  - type: text
    content: destroyers will swarm,
  - type: text
    content: 'for the sword of the '
  - type: text
    content: Lord
  - type: text
    content: ' will devour'
  - type: text
    content: from one end of the land to the other;
  - type: text
    content: no one will be safe.
  '13':
  - type: text
    content: They will sow wheat but reap thorns;
  - type: text
    content: they will wear themselves out but gain nothing.
  - type: text
    content: They will bear the shame of their harvest
  - type: text
    content: 'because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger.”
  '14':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “As for all my wicked neighbors who seize the inheritance I gave my people Israel, I will uproot them from their lands and I will uproot the people of Judah from among them. '
  '15':
  - type: text
    content: 'But after I uproot them, I will again have compassion and will bring each of them back to their own inheritance and their own country. '
  '16':
  - type: text
    content: 'And if they learn well the ways of my people and swear by my name, saying, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives’—even as they once taught my people to swear by Baal—then they will be established among my people. '
  '17':
  - type: text
    content: 'But if any nation does not listen, I will completely uproot and destroy it,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: You have planted them, and they have taken root;
  - type: text
    content: they grow and bear fruit.
  - type: text
    content: You are always on their lips
  - type: text
    content: but far from their hearts.
  '3':
  - type: text
    content: 'Yet you know me, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: you see me and test my thoughts about you.
  - type: text
    content: Drag them off like sheep to be butchered!
  - type: text
    content: Set them apart for the day of slaughter!
  '4':
  - type: text
    content: How long will the land lie parched
  - type: text
    content: and the grass in every field be withered?
  - type: text
    content: Because those who live in it are wicked,
  - type: text
    content: the animals and birds have perished.
  - type: text
    content: Moreover, the people are saying,
  - type: text
    content: “He will not see what happens to us.”
  - type: heading
    content: God’s Answer
  '5':
  - type: text
    content: “If you have raced with men on foot
  - type: text
    content: and they have worn you out,
  - type: text
    content: how can you compete with horses?
  - type: text
    content: If you stumble
  - type: note
    content: Or you feel secure only
  - type: text
    content: ' in safe country,'
  - type: text
    content: how will you manage in the thickets by
  - type: note
    content: Or the flooding of
  - type: text
    content: ' the Jordan?'
  '6':
  - type: text
    content: Your relatives, members of your own family—
  - type: text
    content: even they have betrayed you;
  - type: text
    content: they have raised a loud cry against you.
  - type: text
    content: Do not trust them,
  - type: text
    content: though they speak well of you.
  '7':
  - type: text
    content: “I will forsake my house,
  - type: text
    content: abandon my inheritance;
  - type: text
    content: I will give the one I love
  - type: text
    content: into the hands of her enemies.
  '8':
  - type: text
    content: My inheritance has become to me
  - type: text
    content: like a lion in the forest.
  - type: text
    content: She roars at me;
  - type: text
    content: therefore I hate her.
  '9':
  - type: text
    content: Has not my inheritance become to me
  - type: text
    content: like a speckled bird of prey
  - type: text
    content: that other birds of prey surround and attack?
  - type: text
    content: Go and gather all the wild beasts;
  - type: text
    content: bring them to devour.
