document_id: JER.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah’s Complaint
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'You are always righteous, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I bring a case before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet I would speak with you about your justice:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why does the way of the wicked prosper?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do all the faithless live at ease?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Many shepherds will ruin my vineyard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and trample down my field;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will turn my pleasant field
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into a desolate wasteland.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: It will be made a wasteland,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: parched and desolate before me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the whole land will be laid waste
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because there is no one who cares.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Over all the barren heights in the desert
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroyers will swarm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the sword of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will devour'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from one end of the land to the other;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one will be safe.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They will sow wheat but reap thorns;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will wear themselves out but gain nothing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will bear the shame of their harvest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s fierce anger.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: “As for all my wicked neighbors who seize the inheritance I gave my people Israel, I will uproot them from their lands and I will uproot the people of Judah from among them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But after I uproot them, I will again have compassion and will bring each of them back to their own inheritance and their own country. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And if they learn well the ways of my people and swear by my name, saying, ‘As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives’—even as they once taught my people to swear by Baal—then they will be established among my people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But if any nation does not listen, I will completely uproot and destroy it,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You have planted them, and they have taken root;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they grow and bear fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are always on their lips
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but far from their hearts.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Yet you know me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you see me and test my thoughts about you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Drag them off like sheep to be butchered!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Set them apart for the day of slaughter!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: How long will the land lie parched
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the grass in every field be withered?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because those who live in it are wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the animals and birds have perished.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moreover, the people are saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “He will not see what happens to us.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Answer
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “If you have raced with men on foot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they have worn you out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how can you compete with horses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you stumble
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: you feel secure only
      marker-yv: yv-n
    - type: text
      text: ' in safe country,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how will you manage in the thickets by
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the flooding of
      marker-yv: yv-n
    - type: text
      text: ' the Jordan?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Your relatives, members of your own family—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even they have betrayed you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have raised a loud cry against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not trust them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though they speak well of you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “I will forsake my house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: abandon my inheritance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give the one I love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the hands of her enemies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: My inheritance has become to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a lion in the forest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She roars at me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore I hate her.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Has not my inheritance become to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a speckled bird of prey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that other birds of prey surround and attack?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go and gather all the wild beasts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring them to devour.
