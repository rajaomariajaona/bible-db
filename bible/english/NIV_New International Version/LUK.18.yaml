document_id: LUK.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Persistent Widow
  - type: text
    content: 'Then Jesus told his disciples a parable to show them that they should always pray and not give up. '
  '10':
  - type: text
    content: “Two men went up to the temple to pray, one a Pharisee and the other a tax collector.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'The Pharisee stood by himself and prayed: ‘God, I thank you that I am not like other people—robbers, evildoers, adulterers—or even like this tax collector.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: I fast twice a week and give a tenth of all I get.’
  '13':
  - type: text
    content: ' '
  - type: text
    content: “But the tax collector stood at a distance. He would not even look up to heaven, but beat his breast and said, ‘God, have mercy on me, a sinner.’
  '14':
  - type: text
    content: ' '
  - type: text
    content: “I tell you that this man, rather than the other, went home justified before God. For all those who exalt themselves will be humbled, and those who humble themselves will be exalted.”
  - type: heading
    content: The Little Children and Jesus
  '15':
  - type: text
    content: 'People were also bringing babies to Jesus for him to place his hands on them. When the disciples saw this, they rebuked them. '
  '16':
  - type: text
    content: 'But Jesus called the children to him and said, '
  - type: text
    content: “Let the little children come to me, and do not hinder them, for the kingdom of God belongs to such as these.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Truly I tell you, anyone who will not receive the kingdom of God like a little child will never enter it.”
  - type: heading
    content: The Rich and the Kingdom of God
  '18':
  - type: text
    content: A certain ruler asked him, “Good teacher, what must I do to inherit eternal life?”
  '19':
  - type: text
    content: ' '
  - type: text
    content: “Why do you call me good?”
  - type: text
    content: ' Jesus answered. '
  - type: text
    content: “No one is good—except God alone.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He said: '
  - type: text
    content: “In a certain town there was a judge who neither feared God nor cared what people thought.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'You know the commandments: ‘You shall not commit adultery, you shall not murder, you shall not steal, you shall not give false testimony, honor your father and mother.’'
  - type: note
    content: Exodus 20:12-16; Deut. 5:16-20
  - type: text
    content: ”
  '21':
  - type: text
    content: “All these I have kept since I was a boy,” he said.
  '22':
  - type: text
    content: 'When Jesus heard this, he said to him, '
  - type: text
    content: “You still lack one thing. Sell everything you have and give to the poor, and you will have treasure in heaven. Then come, follow me.”
  '23':
  - type: text
    content: 'When he heard this, he became very sad, because he was very wealthy. '
  '24':
  - type: text
    content: 'Jesus looked at him and said, '
  - type: text
    content: “How hard it is for the rich to enter the kingdom of God!
  - type: text
    content: ' '
  '25':
  - type: text
    content: Indeed, it is easier for a camel to go through the eye of a needle than for someone who is rich to enter the kingdom of God.”
  '26':
  - type: text
    content: Those who heard this asked, “Who then can be saved?”
  '27':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “What is impossible with man is possible with God.”
  '28':
  - type: text
    content: Peter said to him, “We have left all we had to follow you!”
  '29':
  - type: text
    content: ' '
  - type: text
    content: “Truly I tell you,”
  - type: text
    content: ' Jesus said to them, '
  - type: text
    content: “no one who has left home or wife or brothers or sisters or parents or children for the sake of the kingdom of God
  - type: text
    content: ' '
  '3':
  - type: text
    content: And there was a widow in that town who kept coming to him with the plea, ‘Grant me justice against my adversary.’
  '30':
  - type: text
    content: will fail to receive many times as much in this age, and in the age to come eternal life.”
  - type: heading
    content: Jesus Predicts His Death a Third Time
  '31':
  - type: text
    content: 'Jesus took the Twelve aside and told them, '
  - type: text
    content: “We are going up to Jerusalem, and everything that is written by the prophets about the Son of Man will be fulfilled.
  - type: text
    content: ' '
  '32':
  - type: text
    content: He will be delivered over to the Gentiles. They will mock him, insult him and spit on him;
  - type: text
    content: ' '
  '33':
  - type: text
    content: they will flog him and kill him. On the third day he will rise again.”
  '34':
  - type: text
    content: The disciples did not understand any of this. Its meaning was hidden from them, and they did not know what he was talking about.
  - type: heading
    content: A Blind Beggar Receives His Sight
  '35':
  - type: text
    content: 'As Jesus approached Jericho, a blind man was sitting by the roadside begging. '
  '36':
  - type: text
    content: 'When he heard the crowd going by, he asked what was happening. '
  '37':
  - type: text
    content: They told him, “Jesus of Nazareth is passing by.”
  '38':
  - type: text
    content: He called out, “Jesus, Son of David, have mercy on me!”
  '39':
  - type: text
    content: Those who led the way rebuked him and told him to be quiet, but he shouted all the more, “Son of David, have mercy on me!”
  '4':
  - type: text
    content: ' '
  - type: text
    content: “For some time he refused. But finally he said to himself, ‘Even though I don’t fear God or care what people think,
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Jesus stopped and ordered the man to be brought to him. When he came near, Jesus asked him, '
  '41':
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: “Lord, I want to see,” he replied.
  '42':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Receive your sight; your faith has healed you.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: Immediately he received his sight and followed Jesus, praising God. When all the people saw it, they also praised God.
  '5':
  - type: text
    content: yet because this widow keeps bothering me, I will see that she gets justice, so that she won’t eventually come and attack me!’ ”
  '6':
  - type: text
    content: 'And the Lord said, '
  - type: text
    content: “Listen to what the unjust judge says.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And will not God bring about justice for his chosen ones, who cry out to him day and night? Will he keep putting them off?
  - type: text
    content: ' '
  '8':
  - type: text
    content: I tell you, he will see that they get justice, and quickly. However, when the Son of Man comes, will he find faith on the earth?”
  - type: heading
    content: The Parable of the Pharisee and the Tax Collector
  '9':
  - type: text
    content: 'To some who were confident of their own righteousness and looked down on everyone else, Jesus told this parable: '
