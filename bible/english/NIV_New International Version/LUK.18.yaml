document_id: LUK.18,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parable of the Persistent Widow
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Jesus told his disciples a parable to show them that they should always pray and not give up. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Two men went up to the temple to pray, one a Pharisee and the other a tax collector.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The Pharisee stood by himself and prayed: ‘God, I thank you that I am not like other people—robbers, evildoers, adulterers—or even like this tax collector.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I fast twice a week and give a tenth of all I get.’
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But the tax collector stood at a distance. He would not even look up to heaven, but beat his breast and said, ‘God, have mercy on me, a sinner.’
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I tell you that this man, rather than the other, went home justified before God. For all those who exalt themselves will be humbled, and those who humble themselves will be exalted.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Little Children and Jesus
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'People were also bringing babies to Jesus for him to place his hands on them. When the disciples saw this, they rebuked them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But Jesus called the children to him and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let the little children come to me, and do not hinder them, for the kingdom of God belongs to such as these.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Truly I tell you, anyone who will not receive the kingdom of God like a little child will never enter it.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Rich and the Kingdom of God
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: A certain ruler asked him, “Good teacher, what must I do to inherit eternal life?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you call me good?”
    - type: text
      text: ' Jesus answered. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No one is good—except God alone.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He said: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “In a certain town there was a judge who neither feared God nor cared what people thought.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'You know the commandments: ‘You shall not commit adultery, you shall not murder, you shall not steal, you shall not give false testimony, honor your father and mother.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 20:12-16; Deut. 5:16-20
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “All these I have kept since I was a boy,” he said.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'When Jesus heard this, he said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You still lack one thing. Sell everything you have and give to the poor, and you will have treasure in heaven. Then come, follow me.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When he heard this, he became very sad, because he was very wealthy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Jesus looked at him and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How hard it is for the rich to enter the kingdom of God!
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Indeed, it is easier for a camel to go through the eye of a needle than for someone who is rich to enter the kingdom of God.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Those who heard this asked, “Who then can be saved?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What is impossible with man is possible with God.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Peter said to him, “We have left all we had to follow you!”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Truly I tell you,”
    - type: text
      text: ' Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “no one who has left home or wife or brothers or sisters or parents or children for the sake of the kingdom of God
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And there was a widow in that town who kept coming to him with the plea, ‘Grant me justice against my adversary.’
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will fail to receive many times as much in this age, and in the age to come eternal life.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts His Death a Third Time
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jesus took the Twelve aside and told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “We are going up to Jerusalem, and everything that is written by the prophets about the Son of Man will be fulfilled.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He will be delivered over to the Gentiles. They will mock him, insult him and spit on him;
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: they will flog him and kill him. On the third day he will rise again.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: The disciples did not understand any of this. Its meaning was hidden from them, and they did not know what he was talking about.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Blind Beggar Receives His Sight
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'As Jesus approached Jericho, a blind man was sitting by the roadside begging. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'When he heard the crowd going by, he asked what was happening. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: They told him, “Jesus of Nazareth is passing by.”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: He called out, “Jesus, Son of David, have mercy on me!”
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Those who led the way rebuked him and told him to be quiet, but he shouted all the more, “Son of David, have mercy on me!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “For some time he refused. But finally he said to himself, ‘Even though I don’t fear God or care what people think,
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Jesus stopped and ordered the man to be brought to him. When he came near, Jesus asked him, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you want me to do for you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Lord, I want to see,” he replied.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Receive your sight; your faith has healed you.”
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Immediately he received his sight and followed Jesus, praising God. When all the people saw it, they also praised God.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: yet because this widow keeps bothering me, I will see that she gets justice, so that she won’t eventually come and attack me!’ ”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the Lord said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Listen to what the unjust judge says.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And will not God bring about justice for his chosen ones, who cry out to him day and night? Will he keep putting them off?
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, he will see that they get justice, and quickly. However, when the Son of Man comes, will he find faith on the earth?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parable of the Pharisee and the Tax Collector
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'To some who were confident of their own righteousness and looked down on everyone else, Jesus told this parable: '
