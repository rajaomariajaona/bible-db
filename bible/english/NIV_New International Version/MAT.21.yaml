document_id: MAT.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Comes to Jerusalem as King
  - type: text
    content: 'As they approached Jerusalem and came to Bethphage on the Mount of Olives, Jesus sent two disciples, '
  '10':
  - type: text
    content: When Jesus entered Jerusalem, the whole city was stirred and asked, “Who is this?”
  '11':
  - type: text
    content: The crowds answered, “This is Jesus, the prophet from Nazareth in Galilee.”
  - type: heading
    content: Jesus at the Temple
  '12':
  - type: text
    content: 'Jesus entered the temple courts and drove out all who were buying and selling there. He overturned the tables of the money changers and the benches of those selling doves. '
  '13':
  - type: text
    content: “It is written,”
  - type: text
    content: ' he said to them, '
  - type: text
    content: “ ‘My house will be called a house of prayer,’
  - type: note
    content: Isaiah 56:7
  - type: text
    content: ' '
  - type: text
    content: but you are making it ‘a den of robbers.’
  - type: note
    content: Jer. 7:11
  - type: text
    content: ”
  '14':
  - type: text
    content: 'The blind and the lame came to him at the temple, and he healed them. '
  '15':
  - type: text
    content: But when the chief priests and the teachers of the law saw the wonderful things he did and the children shouting in the temple courts, “Hosanna to the Son of David,” they were indignant.
  '16':
  - type: text
    content: “Do you hear what these children are saying?” they asked him.
  - type: text
    content: “Yes,”
  - type: text
    content: ' replied Jesus, '
  - type: text
    content: “have you never read,
  - type: text
    content: “ ‘From the lips of children and infants
  - type: text
    content: you, Lord, have called forth your praise’
  - type: text
    content: ' '
  - type: note
    content: Psalm 8:2 (see Septuagint)
  - type: text
    content: ?”
  '17':
  - type: text
    content: And he left them and went out of the city to Bethany, where he spent the night.
  - type: heading
    content: Jesus Curses a Fig Tree
  '18':
  - type: text
    content: 'Early in the morning, as Jesus was on his way back to the city, he was hungry. '
  '19':
  - type: text
    content: 'Seeing a fig tree by the road, he went up to it but found nothing on it except leaves. Then he said to it, '
  - type: text
    content: “May you never bear fruit again!”
  - type: text
    content: ' Immediately the tree withered.'
  '2':
  - type: text
    content: 'saying to them, '
  - type: text
    content: “Go to the village ahead of you, and at once you will find a donkey tied there, with her colt by her. Untie them and bring them to me.
  - type: text
    content: ' '
  '20':
  - type: text
    content: When the disciples saw this, they were amazed. “How did the fig tree wither so quickly?” they asked.
  '21':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Truly I tell you, if you have faith and do not doubt, not only can you do what was done to the fig tree, but also you can say to this mountain, ‘Go, throw yourself into the sea,’ and it will be done.
  - type: text
    content: ' '
  '22':
  - type: text
    content: If you believe, you will receive whatever you ask for in prayer.”
  - type: heading
    content: The Authority of Jesus Questioned
  '23':
  - type: text
    content: Jesus entered the temple courts, and, while he was teaching, the chief priests and the elders of the people came to him. “By what authority are you doing these things?” they asked. “And who gave you this authority?”
  '24':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I will also ask you one question. If you answer me, I will tell you by what authority I am doing these things.
  - type: text
    content: ' '
  '25':
  - type: text
    content: John’s baptism—where did it come from? Was it from heaven, or of human origin?”
  - type: text
    content: 'They discussed it among themselves and said, “If we say, ‘From heaven,’ he will ask, ‘Then why didn’t you believe him?’ '
  '26':
  - type: text
    content: But if we say, ‘Of human origin’—we are afraid of the people, for they all hold that John was a prophet.”
  '27':
  - type: text
    content: So they answered Jesus, “We don’t know.”
  - type: text
    content: 'Then he said, '
  - type: text
    content: “Neither will I tell you by what authority I am doing these things.
  - type: heading
    content: The Parable of the Two Sons
  '28':
  - type: text
    content: ' '
  - type: text
    content: “What do you think? There was a man who had two sons. He went to the first and said, ‘Son, go and work today in the vineyard.’
  '29':
  - type: text
    content: ' '
  - type: text
    content: “ ‘I will not,’ he answered, but later he changed his mind and went.
  '3':
  - type: text
    content: If anyone says anything to you, say that the Lord needs them, and he will send them right away.”
  '30':
  - type: text
    content: ' '
  - type: text
    content: “Then the father went to the other son and said the same thing. He answered, ‘I will, sir,’ but he did not go.
  '31':
  - type: text
    content: ' '
  - type: text
    content: “Which of the two did what his father wanted?”
  - type: text
    content: “The first,” they answered.
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Truly I tell you, the tax collectors and the prostitutes are entering the kingdom of God ahead of you.
  - type: text
    content: ' '
  '32':
  - type: text
    content: For John came to you to show you the way of righteousness, and you did not believe him, but the tax collectors and the prostitutes did. And even after you saw this, you did not repent and believe him.
  - type: heading
    content: The Parable of the Tenants
  '33':
  - type: text
    content: ' '
  - type: text
    content: '“Listen to another parable: There was a landowner who planted a vineyard. He put a wall around it, dug a winepress in it and built a watchtower. Then he rented the vineyard to some farmers and moved to another place.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: When the harvest time approached, he sent his servants to the tenants to collect his fruit.
  '35':
  - type: text
    content: ' '
  - type: text
    content: “The tenants seized his servants; they beat one, killed another, and stoned a third.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Then he sent other servants to them, more than the first time, and the tenants treated them the same way.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Last of all, he sent his son to them. ‘They will respect my son,’ he said.
  '38':
  - type: text
    content: ' '
  - type: text
    content: “But when the tenants saw the son, they said to each other, ‘This is the heir. Come, let’s kill him and take his inheritance.’
  - type: text
    content: ' '
  '39':
  - type: text
    content: So they took him and threw him out of the vineyard and killed him.
  '4':
  - type: text
    content: 'This took place to fulfill what was spoken through the prophet:'
  '40':
  - type: text
    content: ' '
  - type: text
    content: “Therefore, when the owner of the vineyard comes, what will he do to those tenants?”
  '41':
  - type: text
    content: “He will bring those wretches to a wretched end,” they replied, “and he will rent the vineyard to other tenants, who will give him his share of the crop at harvest time.”
  '42':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“Have you never read in the Scriptures:'
  - type: text
    content: “ ‘The stone the builders rejected
  - type: text
    content: has become the cornerstone;
  - type: text
    content: the Lord has done this,
  - type: text
    content: and it is marvelous in our eyes’
  - type: text
    content: ' '
  - type: note
    content: Psalm 118:22,23
  - type: text
    content: '?'
  '43':
  - type: text
    content: ' '
  - type: text
    content: “Therefore I tell you that the kingdom of God will be taken away from you and given to a people who will produce its fruit.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Anyone who falls on this stone will be broken to pieces; anyone on whom it falls will be crushed.”
  - type: note
    content: Some manuscripts do not have verse 44.
  '45':
  - type: text
    content: 'When the chief priests and the Pharisees heard Jesus’ parables, they knew he was talking about them. '
  '46':
  - type: text
    content: They looked for a way to arrest him, but they were afraid of the crowd because the people held that he was a prophet.
  '5':
  - type: text
    content: “Say to Daughter Zion,
  - type: text
    content: ‘See, your king comes to you,
  - type: text
    content: gentle and riding on a donkey,
  - type: text
    content: and on a colt, the foal of a donkey.’ ”
  - type: note
    content: Zech. 9:9
  '6':
  - type: text
    content: 'The disciples went and did as Jesus had instructed them. '
  '7':
  - type: text
    content: 'They brought the donkey and the colt and placed their cloaks on them for Jesus to sit on. '
  '8':
  - type: text
    content: 'A very large crowd spread their cloaks on the road, while others cut branches from the trees and spread them on the road. '
  '9':
  - type: text
    content: The crowds that went ahead of him and those that followed shouted,
  - type: text
    content: “Hosanna
  - type: note
    content: A Hebrew expression meaning “Save!” which became an exclamation of praise; also in verse 15
  - type: text
    content: ' to the Son of David!”'
  - type: text
    content: “Blessed is he who comes in the name of the Lord!”
  - type: note
    content: Psalm 118:25,26
  - type: text
    content: “Hosanna
  - type: note
    content: A Hebrew expression meaning “Save!” which became an exclamation of praise; also in verse 15
  - type: text
    content: ' in the highest heaven!”'
