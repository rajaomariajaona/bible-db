document_id: MAT.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Comes to Jerusalem as King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As they approached Jerusalem and came to Bethphage on the Mount of Olives, Jesus sent two disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'saying to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go to the village ahead of you, and at once you will find a donkey tied there, with her colt by her. Untie them and bring them to me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If anyone says anything to you, say that the Lord needs them, and he will send them right away.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This took place to fulfill what was spoken through the prophet:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Say to Daughter Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘See, your king comes to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: gentle and riding on a donkey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and on a colt, the foal of a donkey.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zech. 9:9
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The disciples went and did as Jesus had instructed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They brought the donkey and the colt and placed their cloaks on them for Jesus to sit on. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A very large crowd spread their cloaks on the road, while others cut branches from the trees and spread them on the road. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The crowds that went ahead of him and those that followed shouted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Hosanna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A Hebrew expression meaning “Save!” which became an exclamation of praise; also in verse 15
    marker-yv: yv-n
  - type: text
    text: ' to the Son of David!”'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Blessed is he who comes in the name of the Lord!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 118:25,26
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Hosanna
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A Hebrew expression meaning “Save!” which became an exclamation of praise; also in verse 15
    marker-yv: yv-n
  - type: text
    text: ' in the highest heaven!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When Jesus entered Jerusalem, the whole city was stirred and asked, “Who is this?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The crowds answered, “This is Jesus, the prophet from Nazareth in Galilee.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus at the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jesus entered the temple courts and drove out all who were buying and selling there. He overturned the tables of the money changers and the benches of those selling doves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is written,”
  - type: text
    text: ' he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘My house will be called a house of prayer,’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 56:7
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but you are making it ‘a den of robbers.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jer. 7:11
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The blind and the lame came to him at the temple, and he healed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But when the chief priests and the teachers of the law saw the wonderful things he did and the children shouting in the temple courts, “Hosanna to the Son of David,” they were indignant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Do you hear what these children are saying?” they asked him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Yes,”
  - type: text
    text: ' replied Jesus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “have you never read,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘From the lips of children and infants
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you, Lord, have called forth your praise’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 8:2 (see Septuagint)
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And he left them and went out of the city to Bethany, where he spent the night.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Curses a Fig Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Early in the morning, as Jesus was on his way back to the city, he was hungry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Seeing a fig tree by the road, he went up to it but found nothing on it except leaves. Then he said to it, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “May you never bear fruit again!”
  - type: text
    text: ' Immediately the tree withered.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When the disciples saw this, they were amazed. “How did the fig tree wither so quickly?” they asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you, if you have faith and do not doubt, not only can you do what was done to the fig tree, but also you can say to this mountain, ‘Go, throw yourself into the sea,’ and it will be done.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you believe, you will receive whatever you ask for in prayer.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Authority of Jesus Questioned
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Jesus entered the temple courts, and, while he was teaching, the chief priests and the elders of the people came to him. “By what authority are you doing these things?” they asked. “And who gave you this authority?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I will also ask you one question. If you answer me, I will tell you by what authority I am doing these things.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: John’s baptism—where did it come from? Was it from heaven, or of human origin?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They discussed it among themselves and said, “If we say, ‘From heaven,’ he will ask, ‘Then why didn’t you believe him?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But if we say, ‘Of human origin’—we are afraid of the people, for they all hold that John was a prophet.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So they answered Jesus, “We don’t know.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Neither will I tell you by what authority I am doing these things.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Parable of the Two Sons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What do you think? There was a man who had two sons. He went to the first and said, ‘Son, go and work today in the vineyard.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘I will not,’ he answered, but later he changed his mind and went.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the father went to the other son and said the same thing. He answered, ‘I will, sir,’ but he did not go.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Which of the two did what his father wanted?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “The first,” they answered.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you, the tax collectors and the prostitutes are entering the kingdom of God ahead of you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For John came to you to show you the way of righteousness, and you did not believe him, but the tax collectors and the prostitutes did. And even after you saw this, you did not repent and believe him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Parable of the Tenants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Listen to another parable: There was a landowner who planted a vineyard. He put a wall around it, dug a winepress in it and built a watchtower. Then he rented the vineyard to some farmers and moved to another place.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When the harvest time approached, he sent his servants to the tenants to collect his fruit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The tenants seized his servants; they beat one, killed another, and stoned a third.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then he sent other servants to them, more than the first time, and the tenants treated them the same way.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Last of all, he sent his son to them. ‘They will respect my son,’ he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But when the tenants saw the son, they said to each other, ‘This is the heir. Come, let’s kill him and take his inheritance.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So they took him and threw him out of the vineyard and killed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Therefore, when the owner of the vineyard comes, what will he do to those tenants?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: “He will bring those wretches to a wretched end,” they replied, “and he will rent the vineyard to other tenants, who will give him his share of the crop at harvest time.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Have you never read in the Scriptures:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘The stone the builders rejected
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has become the cornerstone;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the Lord has done this,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and it is marvelous in our eyes’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 118:22,23
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Therefore I tell you that the kingdom of God will be taken away from you and given to a people who will produce its fruit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Anyone who falls on this stone will be broken to pieces; anyone on whom it falls will be crushed.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts do not have verse 44.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'When the chief priests and the Pharisees heard Jesus’ parables, they knew he was talking about them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: They looked for a way to arrest him, but they were afraid of the crowd because the people held that he was a prophet.
