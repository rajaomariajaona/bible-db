document_id: 2KI.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Judgment on Ahaziah
  - type: text
    content: 'After Ahab’s death, Moab rebelled against Israel. '
  '10':
  - type: text
    content: Elijah answered the captain, “If I am a man of God, may fire come down from heaven and consume you and your fifty men!” Then fire fell from heaven and consumed the captain and his men.
  '11':
  - type: text
    content: At this the king sent to Elijah another captain with his fifty men. The captain said to him, “Man of God, this is what the king says, ‘Come down at once!’ ”
  '12':
  - type: text
    content: “If I am a man of God,” Elijah replied, “may fire come down from heaven and consume you and your fifty men!” Then the fire of God fell from heaven and consumed him and his fifty men.
  '13':
  - type: text
    content: 'So the king sent a third captain with his fifty men. This third captain went up and fell on his knees before Elijah. “Man of God,” he begged, “please have respect for my life and the lives of these fifty men, your servants! '
  '14':
  - type: text
    content: See, fire has fallen from heaven and consumed the first two captains and all their men. But now have respect for my life!”
  '15':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Elijah, “Go down with him; do not be afraid of him.” So Elijah got up and went down with him to the king.'
  '16':
  - type: text
    content: 'He told the king, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Is it because there is no God in Israel for you to consult that you have sent messengers to consult Baal-Zebub, the god of Ekron? Because you have done this, you will never leave the bed you are lying on. You will certainly die!” '
  '17':
  - type: text
    content: 'So he died, according to the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that Elijah had spoken.'
  - type: text
    content: Because Ahaziah had no son, Joram
  - type: note
    content: Hebrew Jehoram, a variant of Joram
  - type: text
    content: ' succeeded him as king in the second year of Jehoram son of Jehoshaphat king of Judah. '
  '18':
  - type: text
    content: As for all the other events of Ahaziah’s reign, and what he did, are they not written in the book of the annals of the kings of Israel?
  '2':
  - type: text
    content: Now Ahaziah had fallen through the lattice of his upper room in Samaria and injured himself. So he sent messengers, saying to them, “Go and consult Baal-Zebub, the god of Ekron, to see if I will recover from this injury.”
  '3':
  - type: text
    content: 'But the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Elijah the Tishbite, “Go up and meet the messengers of the king of Samaria and ask them, ‘Is it because there is no God in Israel that you are going off to consult Baal-Zebub, the god of Ekron?’ '
  '4':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘You will not leave the bed you are lying on. You will certainly die!’ ” So Elijah went.'
  '5':
  - type: text
    content: When the messengers returned to the king, he asked them, “Why have you come back?”
  '6':
  - type: text
    content: '“A man came to meet us,” they replied. “And he said to us, ‘Go back to the king who sent you and tell him, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Is it because there is no God in Israel that you are sending messengers to consult Baal-Zebub, the god of Ekron? Therefore you will not leave the bed you are lying on. You will certainly die!” ’ ”'
  '7':
  - type: text
    content: The king asked them, “What kind of man was it who came to meet you and told you this?”
  '8':
  - type: text
    content: They replied, “He had a garment of hair
  - type: note
    content: Or He was a hairy man
  - type: text
    content: ' and had a leather belt around his waist.”'
  - type: text
    content: The king said, “That was Elijah the Tishbite.”
  '9':
  - type: text
    content: Then he sent to Elijah a captain with his company of fifty men. The captain went up to Elijah, who was sitting on the top of a hill, and said to him, “Man of God, the king says, ‘Come down!’ ”
