document_id: NUM.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s First Message
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Balaam said, “Build me seven altars here, and prepare seven bulls and seven rams for me.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Balak did as Balaam said, and the two of them offered a bull and a ram on each altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Balaam said to Balak, “Stay here beside your offering while I go aside. Perhaps the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will come to meet with me. Whatever he reveals to me I will tell you.” Then he went off to a barren height.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: God met with him, and Balaam said, “I have prepared seven altars, and on each altar I have offered a bull and a ram.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' put a word in Balaam’s mouth and said, “Go back to Balak and give him this word.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So he went back to him and found him standing beside his offering, with all the Moabite officials. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Balaam spoke his message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Balak brought me from Aram,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the king of Moab from the eastern mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Come,’ he said, ‘curse Jacob for me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: come, denounce Israel.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: How can I curse
- type: usfm
  marker: q2
  children:
  - type: text
    text: those whom God has not cursed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How can I denounce
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'those whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has not denounced?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: From the rocky peaks I see them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the heights I view them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I see a people who live apart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not consider themselves one of the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who can count the dust of Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: or number even a fourth of Israel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me die the death of the righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and may my final end be like theirs!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Balak said to Balaam, “What have you done to me? I brought you to curse my enemies, but you have done nothing but bless them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He answered, “Must I not speak what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' puts in my mouth?”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s Second Message
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Balak said to him, “Come with me to another place where you can see them; you will not see them all but only the outskirts of their camp. And from there, curse them for me.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So he took him to the field of Zophim on the top of Pisgah, and there he built seven altars and offered a bull and a ram on each altar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Balaam said to Balak, “Stay here beside your offering while I meet with him over there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' met with Balaam and put a word in his mouth and said, “Go back to Balak and give him this word.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So he went to him and found him standing beside his offering, with the Moabite officials. Balak asked him, “What did the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' say?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then he spoke his message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Arise, Balak, and listen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hear me, son of Zippor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: God is not human, that he should lie,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not a human being, that he should change his mind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does he speak and then not act?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does he promise and not fulfill?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I have received a command to bless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has blessed, and I cannot change it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “No misfortune is seen in Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no misery observed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He has not looked on Jacob’s offenses / or on the wrongs found
    marker-yv: yv-n
  - type: text
    text: ' in Israel.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God is with them;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the shout of the King is among them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: God brought them out of Egypt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have the strength of a wild ox.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: There is no divination against
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in
    marker-yv: yv-n
  - type: text
    text: ' Jacob,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: no evil omens against
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in
    marker-yv: yv-n
  - type: text
    text: ' Israel.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will now be said of Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: and of Israel, ‘See what God has done!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The people rise like a lioness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they rouse themselves like a lion
- type: usfm
  marker: q1
  children:
  - type: text
    text: that does not rest till it devours its prey
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drinks the blood of its victims.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Balak said to Balaam, “Neither curse them at all nor bless them at all!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Balaam answered, “Did I not tell you I must do whatever the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says?”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s Third Message
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Balak said to Balaam, “Come, let me take you to another place. Perhaps it will please God to let you curse them for me from there.” '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And Balak took Balaam to the top of Peor, overlooking the wasteland.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Balaam said, “Build me seven altars here, and prepare seven bulls and seven rams for me.” '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Balak did as Balaam had said, and offered a bull and a ram on each altar.
