document_id: NUM.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Balaam’s First Message
  - type: text
    content: 'Balaam said, “Build me seven altars here, and prepare seven bulls and seven rams for me.” '
  '10':
  - type: text
    content: Who can count the dust of Jacob
  - type: text
    content: or number even a fourth of Israel?
  - type: text
    content: Let me die the death of the righteous,
  - type: text
    content: and may my final end be like theirs!”
  '11':
  - type: text
    content: Balak said to Balaam, “What have you done to me? I brought you to curse my enemies, but you have done nothing but bless them!”
  '12':
  - type: text
    content: 'He answered, “Must I not speak what the '
  - type: text
    content: Lord
  - type: text
    content: ' puts in my mouth?”'
  - type: heading
    content: Balaam’s Second Message
  '13':
  - type: text
    content: 'Then Balak said to him, “Come with me to another place where you can see them; you will not see them all but only the outskirts of their camp. And from there, curse them for me.” '
  '14':
  - type: text
    content: So he took him to the field of Zophim on the top of Pisgah, and there he built seven altars and offered a bull and a ram on each altar.
  '15':
  - type: text
    content: Balaam said to Balak, “Stay here beside your offering while I meet with him over there.”
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' met with Balaam and put a word in his mouth and said, “Go back to Balak and give him this word.”'
  '17':
  - type: text
    content: 'So he went to him and found him standing beside his offering, with the Moabite officials. Balak asked him, “What did the '
  - type: text
    content: Lord
  - type: text
    content: ' say?”'
  '18':
  - type: text
    content: 'Then he spoke his message:'
  - type: text
    content: “Arise, Balak, and listen;
  - type: text
    content: hear me, son of Zippor.
  '19':
  - type: text
    content: God is not human, that he should lie,
  - type: text
    content: not a human being, that he should change his mind.
  - type: text
    content: Does he speak and then not act?
  - type: text
    content: Does he promise and not fulfill?
  '2':
  - type: text
    content: Balak did as Balaam said, and the two of them offered a bull and a ram on each altar.
  '20':
  - type: text
    content: I have received a command to bless;
  - type: text
    content: he has blessed, and I cannot change it.
  '21':
  - type: text
    content: “No misfortune is seen in Jacob,
  - type: text
    content: no misery observed
  - type: note
    content: Or He has not looked on Jacob’s offenses / or on the wrongs found
  - type: text
    content: ' in Israel.'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' their God is with them;'
  - type: text
    content: the shout of the King is among them.
  '22':
  - type: text
    content: God brought them out of Egypt;
  - type: text
    content: they have the strength of a wild ox.
  '23':
  - type: text
    content: There is no divination against
  - type: note
    content: Or in
  - type: text
    content: ' Jacob,'
  - type: text
    content: no evil omens against
  - type: note
    content: Or in
  - type: text
    content: ' Israel.'
  - type: text
    content: It will now be said of Jacob
  - type: text
    content: and of Israel, ‘See what God has done!’
  '24':
  - type: text
    content: The people rise like a lioness;
  - type: text
    content: they rouse themselves like a lion
  - type: text
    content: that does not rest till it devours its prey
  - type: text
    content: and drinks the blood of its victims.”
  '25':
  - type: text
    content: Then Balak said to Balaam, “Neither curse them at all nor bless them at all!”
  '26':
  - type: text
    content: 'Balaam answered, “Did I not tell you I must do whatever the '
  - type: text
    content: Lord
  - type: text
    content: ' says?”'
  - type: heading
    content: Balaam’s Third Message
  '27':
  - type: text
    content: 'Then Balak said to Balaam, “Come, let me take you to another place. Perhaps it will please God to let you curse them for me from there.” '
  '28':
  - type: text
    content: And Balak took Balaam to the top of Peor, overlooking the wasteland.
  '29':
  - type: text
    content: 'Balaam said, “Build me seven altars here, and prepare seven bulls and seven rams for me.” '
  '3':
  - type: text
    content: 'Then Balaam said to Balak, “Stay here beside your offering while I go aside. Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will come to meet with me. Whatever he reveals to me I will tell you.” Then he went off to a barren height.'
  '30':
  - type: text
    content: Balak did as Balaam had said, and offered a bull and a ram on each altar.
  '4':
  - type: text
    content: God met with him, and Balaam said, “I have prepared seven altars, and on each altar I have offered a bull and a ram.”
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' put a word in Balaam’s mouth and said, “Go back to Balak and give him this word.”'
  '6':
  - type: text
    content: 'So he went back to him and found him standing beside his offering, with all the Moabite officials. '
  '7':
  - type: text
    content: 'Then Balaam spoke his message:'
  - type: text
    content: “Balak brought me from Aram,
  - type: text
    content: the king of Moab from the eastern mountains.
  - type: text
    content: ‘Come,’ he said, ‘curse Jacob for me;
  - type: text
    content: come, denounce Israel.’
  '8':
  - type: text
    content: How can I curse
  - type: text
    content: those whom God has not cursed?
  - type: text
    content: How can I denounce
  - type: text
    content: 'those whom the '
  - type: text
    content: Lord
  - type: text
    content: ' has not denounced?'
  '9':
  - type: text
    content: From the rocky peaks I see them,
  - type: text
    content: from the heights I view them.
  - type: text
    content: I see a people who live apart
  - type: text
    content: and do not consider themselves one of the nations.
