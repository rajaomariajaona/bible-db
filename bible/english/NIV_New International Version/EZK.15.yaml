document_id: EZK.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem as a Useless Vine
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '2':
  - type: text
    content: '“Son of man, how is the wood of a vine different from that of a branch from any of the trees in the forest? '
  '3':
  - type: text
    content: 'Is wood ever taken from it to make anything useful? Do they make pegs from it to hang things on? '
  '4':
  - type: text
    content: 'And after it is thrown on the fire as fuel and the fire burns both ends and chars the middle, is it then useful for anything? '
  '5':
  - type: text
    content: If it was not useful for anything when it was whole, how much less can it be made into something useful when the fire has burned it and it is charred?
  '6':
  - type: text
    content: '“Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: As I have given the wood of the vine among the trees of the forest as fuel for the fire, so will I treat the people living in Jerusalem. '
  '7':
  - type: text
    content: 'I will set my face against them. Although they have come out of the fire, the fire will yet consume them. And when I set my face against them, you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'I will make the land desolate because they have been unfaithful, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
