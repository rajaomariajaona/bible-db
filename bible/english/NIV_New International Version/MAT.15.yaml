document_id: MAT.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: That Which Defiles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then some Pharisees and teachers of the law came to Jesus from Jerusalem and asked, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jesus called the crowd to him and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Listen and understand.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What goes into someone’s mouth does not defile them, but what comes out of their mouth, that is what defiles them.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then the disciples came to him and asked, “Do you know that the Pharisees were offended when they heard this?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Every plant that my heavenly Father has not planted will be pulled up by the roots.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Leave them; they are blind guides.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: blind guides of the blind
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If the blind lead the blind, both will fall into a pit.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Peter said, “Explain the parable to us.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Are you still so dull?”
    - type: text
      text: ' Jesus asked them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t you see that whatever enters the mouth goes into the stomach and then out of the body?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the things that come out of a person’s mouth come from the heart, and these defile them.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For out of the heart come evil thoughts—murder, adultery, sexual immorality, theft, false testimony, slander.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Why do your disciples break the tradition of the elders? They don’t wash their hands before they eat!”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These are what defile a person; but eating with unwashed hands does not defile them.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Faith of a Canaanite Woman
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Leaving that place, Jesus withdrew to the region of Tyre and Sidon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: A Canaanite woman from that vicinity came to him, crying out, “Lord, Son of David, have mercy on me! My daughter is demon-possessed and suffering terribly.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Jesus did not answer a word. So his disciples came to him and urged him, “Send her away, for she keeps crying out after us.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'He answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I was sent only to the lost sheep of Israel.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The woman came and knelt before him. “Lord, help me!” she said.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is not right to take the children’s bread and toss it to the dogs.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “Yes it is, Lord,” she said. “Even the dogs eat the crumbs that fall from their master’s table.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Woman, you have great faith! Your request is granted.”
    - type: text
      text: ' And her daughter was healed at that moment.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds the Four Thousand
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jesus left there and went along the Sea of Galilee. Then he went up on a mountainside and sat down. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And why do you break the command of God for the sake of your tradition?
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Great crowds came to him, bringing the lame, the blind, the crippled, the mute and many others, and laid them at his feet; and he healed them. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The people were amazed when they saw the mute speaking, the crippled made well, the lame walking and the blind seeing. And they praised the God of Israel.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jesus called his disciples to him and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have compassion for these people; they have already been with me three days and have nothing to eat. I do not want to send them away hungry, or they may collapse on the way.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: His disciples answered, “Where could we get enough bread in this remote place to feed such a crowd?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How many loaves do you have?”
    - type: text
      text: ' Jesus asked.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Seven,” they replied, “and a few small fish.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'He told the crowd to sit down on the ground. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Then he took the seven loaves and the fish, and when he had given thanks, he broke them and gave them to the disciples, and they in turn to the people. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'They all ate and were satisfied. Afterward the disciples picked up seven basketfuls of broken pieces that were left over. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'The number of those who ate was four thousand men, besides women and children. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: After Jesus had sent the crowd away, he got into the boat and went to the vicinity of Magadan.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For God said, ‘Honor your father and mother’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 20:12; Deut. 5:16
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and ‘Anyone who curses their father or mother is to be put to death.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 21:17; Lev. 20:9
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you say that if anyone declares that what might have been used to help their father or mother is ‘devoted to God,’
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: they are not to ‘honor their father or mother’ with it. Thus you nullify the word of God for the sake of your tradition.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'You hypocrites! Isaiah was right when he prophesied about you:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “ ‘These people honor me with their lips,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but their hearts are far from me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They worship me in vain;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: their teachings are merely human rules.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 29:13
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
