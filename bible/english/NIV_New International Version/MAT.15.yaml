document_id: MAT.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: That Which Defiles
  - type: text
    content: 'Then some Pharisees and teachers of the law came to Jesus from Jerusalem and asked, '
  '10':
  - type: text
    content: 'Jesus called the crowd to him and said, '
  - type: text
    content: “Listen and understand.
  - type: text
    content: ' '
  '11':
  - type: text
    content: What goes into someone’s mouth does not defile them, but what comes out of their mouth, that is what defiles them.”
  '12':
  - type: text
    content: Then the disciples came to him and asked, “Do you know that the Pharisees were offended when they heard this?”
  '13':
  - type: text
    content: 'He replied, '
  - type: text
    content: “Every plant that my heavenly Father has not planted will be pulled up by the roots.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Leave them; they are blind guides.
  - type: note
    content: Some manuscripts blind guides of the blind
  - type: text
    content: ' '
  - type: text
    content: If the blind lead the blind, both will fall into a pit.”
  '15':
  - type: text
    content: Peter said, “Explain the parable to us.”
  '16':
  - type: text
    content: ' '
  - type: text
    content: “Are you still so dull?”
  - type: text
    content: ' Jesus asked them. '
  '17':
  - type: text
    content: “Don’t you see that whatever enters the mouth goes into the stomach and then out of the body?
  - type: text
    content: ' '
  '18':
  - type: text
    content: But the things that come out of a person’s mouth come from the heart, and these defile them.
  - type: text
    content: ' '
  '19':
  - type: text
    content: For out of the heart come evil thoughts—murder, adultery, sexual immorality, theft, false testimony, slander.
  - type: text
    content: ' '
  '2':
  - type: text
    content: “Why do your disciples break the tradition of the elders? They don’t wash their hands before they eat!”
  '20':
  - type: text
    content: These are what defile a person; but eating with unwashed hands does not defile them.”
  - type: heading
    content: The Faith of a Canaanite Woman
  '21':
  - type: text
    content: 'Leaving that place, Jesus withdrew to the region of Tyre and Sidon. '
  '22':
  - type: text
    content: A Canaanite woman from that vicinity came to him, crying out, “Lord, Son of David, have mercy on me! My daughter is demon-possessed and suffering terribly.”
  '23':
  - type: text
    content: Jesus did not answer a word. So his disciples came to him and urged him, “Send her away, for she keeps crying out after us.”
  '24':
  - type: text
    content: 'He answered, '
  - type: text
    content: “I was sent only to the lost sheep of Israel.”
  '25':
  - type: text
    content: The woman came and knelt before him. “Lord, help me!” she said.
  '26':
  - type: text
    content: 'He replied, '
  - type: text
    content: “It is not right to take the children’s bread and toss it to the dogs.”
  '27':
  - type: text
    content: “Yes it is, Lord,” she said. “Even the dogs eat the crumbs that fall from their master’s table.”
  '28':
  - type: text
    content: 'Then Jesus said to her, '
  - type: text
    content: “Woman, you have great faith! Your request is granted.”
  - type: text
    content: ' And her daughter was healed at that moment.'
  - type: heading
    content: Jesus Feeds the Four Thousand
  '29':
  - type: text
    content: 'Jesus left there and went along the Sea of Galilee. Then he went up on a mountainside and sat down. '
  '3':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “And why do you break the command of God for the sake of your tradition?
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Great crowds came to him, bringing the lame, the blind, the crippled, the mute and many others, and laid them at his feet; and he healed them. '
  '31':
  - type: text
    content: The people were amazed when they saw the mute speaking, the crippled made well, the lame walking and the blind seeing. And they praised the God of Israel.
  '32':
  - type: text
    content: 'Jesus called his disciples to him and said, '
  - type: text
    content: “I have compassion for these people; they have already been with me three days and have nothing to eat. I do not want to send them away hungry, or they may collapse on the way.”
  '33':
  - type: text
    content: His disciples answered, “Where could we get enough bread in this remote place to feed such a crowd?”
  '34':
  - type: text
    content: ' '
  - type: text
    content: “How many loaves do you have?”
  - type: text
    content: ' Jesus asked.'
  - type: text
    content: “Seven,” they replied, “and a few small fish.”
  '35':
  - type: text
    content: 'He told the crowd to sit down on the ground. '
  '36':
  - type: text
    content: 'Then he took the seven loaves and the fish, and when he had given thanks, he broke them and gave them to the disciples, and they in turn to the people. '
  '37':
  - type: text
    content: 'They all ate and were satisfied. Afterward the disciples picked up seven basketfuls of broken pieces that were left over. '
  '38':
  - type: text
    content: 'The number of those who ate was four thousand men, besides women and children. '
  '39':
  - type: text
    content: After Jesus had sent the crowd away, he got into the boat and went to the vicinity of Magadan.
  '4':
  - type: text
    content: For God said, ‘Honor your father and mother’
  - type: note
    content: Exodus 20:12; Deut. 5:16
  - type: text
    content: ' '
  - type: text
    content: and ‘Anyone who curses their father or mother is to be put to death.’
  - type: note
    content: Exodus 21:17; Lev. 20:9
  - type: text
    content: ' '
  '5':
  - type: text
    content: But you say that if anyone declares that what might have been used to help their father or mother is ‘devoted to God,’
  - type: text
    content: ' '
  '6':
  - type: text
    content: they are not to ‘honor their father or mother’ with it. Thus you nullify the word of God for the sake of your tradition.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'You hypocrites! Isaiah was right when he prophesied about you:'
  '8':
  - type: text
    content: ' '
  - type: text
    content: “ ‘These people honor me with their lips,
  - type: text
    content: but their hearts are far from me.
  '9':
  - type: text
    content: ' '
  - type: text
    content: They worship me in vain;
  - type: text
    content: their teachings are merely human rules.’
  - type: text
    content: ' '
  - type: note
    content: Isaiah 29:13
  - type: text
    content: ”
