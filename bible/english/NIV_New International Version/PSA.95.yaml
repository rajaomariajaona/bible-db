    - type: text
      text: '1'
  - type: text
    text: 'Come, let us sing for joy to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let us shout aloud to the Rock of our salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let us come before him with thanksgiving
- type: usfm
  marker: q2
  children:
  - type: text
    text: and extol him with music and song.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is the great God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the great King above all gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In his hand are the depths of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the mountain peaks belong to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The sea is his, for he made it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his hands formed the dry land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Come, let us bow down in worship,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'let us kneel before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our Maker;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: for he is our God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we are the people of his pasture,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the flock under his care.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Today, if only you would hear his voice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Do not harden your hearts as you did at Meribah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95:8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Meribah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quarreling.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: as you did that day at Massah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '95:8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Massah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: testing.
    marker-yv: yv-n
  - type: text
    text: ' in the wilderness,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: where your ancestors tested me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they tried me, though they had seen what I did.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For forty years I was angry with that generation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I said, ‘They are a people whose hearts go astray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they have not known my ways.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So I declared on oath in my anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘They shall never enter my rest.’ ”
