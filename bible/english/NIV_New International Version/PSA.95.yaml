document_id: PSA.95,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 95
  - type: text
    content: 'Come, let us sing for joy to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: let us shout aloud to the Rock of our salvation.
  '10':
  - type: text
    content: For forty years I was angry with that generation;
  - type: text
    content: I said, ‘They are a people whose hearts go astray,
  - type: text
    content: and they have not known my ways.’
  '11':
  - type: text
    content: So I declared on oath in my anger,
  - type: text
    content: ‘They shall never enter my rest.’ ”
  '2':
  - type: text
    content: Let us come before him with thanksgiving
  - type: text
    content: and extol him with music and song.
  '3':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is the great God,'
  - type: text
    content: the great King above all gods.
  '4':
  - type: text
    content: In his hand are the depths of the earth,
  - type: text
    content: and the mountain peaks belong to him.
  '5':
  - type: text
    content: The sea is his, for he made it,
  - type: text
    content: and his hands formed the dry land.
  '6':
  - type: text
    content: Come, let us bow down in worship,
  - type: text
    content: 'let us kneel before the '
  - type: text
    content: Lord
  - type: text
    content: ' our Maker;'
  '7':
  - type: text
    content: for he is our God
  - type: text
    content: and we are the people of his pasture,
  - type: text
    content: the flock under his care.
  - type: text
    content: Today, if only you would hear his voice,
  '8':
  - type: text
    content: “Do not harden your hearts as you did at Meribah,
  - type: note
    content: Meribah means quarreling.
  - type: text
    content: as you did that day at Massah
  - type: note
    content: Massah means testing.
  - type: text
    content: ' in the wilderness,'
  '9':
  - type: text
    content: where your ancestors tested me;
  - type: text
    content: they tried me, though they had seen what I did.
