document_id: REV.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: 144,000 Sealed
  - type: text
    content: 'After this I saw four angels standing at the four corners of the earth, holding back the four winds of the earth to prevent any wind from blowing on the land or on the sea or on any tree. '
  '10':
  - type: text
    content: 'And they cried out in a loud voice:'
  - type: text
    content: “Salvation belongs to our God,
  - type: text
    content: who sits on the throne,
  - type: text
    content: and to the Lamb.”
  '11':
  - type: text
    content: 'All the angels were standing around the throne and around the elders and the four living creatures. They fell down on their faces before the throne and worshiped God, '
  '12':
  - type: text
    content: 'saying:'
  - type: text
    content: “Amen!
  - type: text
    content: Praise and glory
  - type: text
    content: and wisdom and thanks and honor
  - type: text
    content: and power and strength
  - type: text
    content: be to our God for ever and ever.
  - type: text
    content: Amen!”
  '13':
  - type: text
    content: Then one of the elders asked me, “These in white robes—who are they, and where did they come from?”
  '14':
  - type: text
    content: I answered, “Sir, you know.”
  - type: text
    content: 'And he said, “These are they who have come out of the great tribulation; they have washed their robes and made them white in the blood of the Lamb. '
  '15':
  - type: text
    content: Therefore,
  - type: text
    content: “they are before the throne of God
  - type: text
    content: and serve him day and night in his temple;
  - type: text
    content: and he who sits on the throne
  - type: text
    content: will shelter them with his presence.
  '16':
  - type: text
    content: ‘Never again will they hunger;
  - type: text
    content: never again will they thirst.
  - type: text
    content: The sun will not beat down on them,’
  - type: note
    content: Isaiah 49:10
  - type: text
    content: nor any scorching heat.
  '17':
  - type: text
    content: For the Lamb at the center of the throne
  - type: text
    content: will be their shepherd;
  - type: text
    content: ‘he will lead them to springs of living water.’
  - type: note
    content: Isaiah 49:10
  - type: text
    content: ‘And God will wipe away every tear from their eyes.’
  - type: note
    content: Isaiah 25:8
  - type: text
    content: ”
  '2':
  - type: text
    content: 'Then I saw another angel coming up from the east, having the seal of the living God. He called out in a loud voice to the four angels who had been given power to harm the land and the sea: '
  '3':
  - type: text
    content: '“Do not harm the land or the sea or the trees until we put a seal on the foreheads of the servants of our God.” '
  '4':
  - type: text
    content: 'Then I heard the number of those who were sealed: 144,000 from all the tribes of Israel.'
  '5':
  - type: text
    content: From the tribe of Judah 12,000 were sealed,
  - type: text
    content: from the tribe of Reuben 12,000,
  - type: text
    content: from the tribe of Gad 12,000,
  '6':
  - type: text
    content: from the tribe of Asher 12,000,
  - type: text
    content: from the tribe of Naphtali 12,000,
  - type: text
    content: from the tribe of Manasseh 12,000,
  '7':
  - type: text
    content: from the tribe of Simeon 12,000,
  - type: text
    content: from the tribe of Levi 12,000,
  - type: text
    content: from the tribe of Issachar 12,000,
  '8':
  - type: text
    content: from the tribe of Zebulun 12,000,
  - type: text
    content: from the tribe of Joseph 12,000,
  - type: text
    content: from the tribe of Benjamin 12,000.
  - type: heading
    content: The Great Multitude in White Robes
  '9':
  - type: text
    content: 'After this I looked, and there before me was a great multitude that no one could count, from every nation, tribe, people and language, standing before the throne and before the Lamb. They were wearing white robes and were holding palm branches in their hands. '
