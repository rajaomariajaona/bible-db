document_id: REV.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 144,000 Sealed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After this I saw four angels standing at the four corners of the earth, holding back the four winds of the earth to prevent any wind from blowing on the land or on the sea or on any tree. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And they cried out in a loud voice:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Salvation belongs to our God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who sits on the throne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to the Lamb.”
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'All the angels were standing around the throne and around the elders and the four living creatures. They fell down on their faces before the throne and worshiped God, '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Amen!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise and glory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and wisdom and thanks and honor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and power and strength
  - type: usfm
    marker: q1
    children:
    - type: text
      text: be to our God for ever and ever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then one of the elders asked me, “These in white robes—who are they, and where did they come from?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I answered, “Sir, you know.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “These are they who have come out of the great tribulation; they have washed their robes and made them white in the blood of the Lamb. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Therefore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “they are before the throne of God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and serve him day and night in his temple;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he who sits on the throne
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will shelter them with his presence.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ‘Never again will they hunger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never again will they thirst.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun will not beat down on them,’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 49:10
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor any scorching heat.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For the Lamb at the center of the throne
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be their shepherd;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘he will lead them to springs of living water.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 49:10
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘And God will wipe away every tear from their eyes.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 25:8
      marker-yv: yv-n
    - type: text
      text: ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then I saw another angel coming up from the east, having the seal of the living God. He called out in a loud voice to the four angels who had been given power to harm the land and the sea: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Do not harm the land or the sea or the trees until we put a seal on the foreheads of the servants of our God.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then I heard the number of those who were sealed: 144,000 from all the tribes of Israel.'
  '5':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: From the tribe of Judah 12,000 were sealed,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the tribe of Reuben 12,000,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the tribe of Gad 12,000,
  '6':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: from the tribe of Asher 12,000,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the tribe of Naphtali 12,000,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the tribe of Manasseh 12,000,
  '7':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: from the tribe of Simeon 12,000,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the tribe of Levi 12,000,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the tribe of Issachar 12,000,
  '8':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: from the tribe of Zebulun 12,000,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the tribe of Joseph 12,000,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the tribe of Benjamin 12,000.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Great Multitude in White Robes
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'After this I looked, and there before me was a great multitude that no one could count, from every nation, tribe, people and language, standing before the throne and before the Lamb. They were wearing white robes and were holding palm branches in their hands. '
