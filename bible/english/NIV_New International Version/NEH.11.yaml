document_id: NEH.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The New Residents of Jerusalem
  - type: text
    content: 'Now the leaders of the people settled in Jerusalem. The rest of the people cast lots to bring one out of every ten of them to live in Jerusalem, the holy city, while the remaining nine were to stay in their own towns. '
  '10':
  - type: text
    content: 'From the priests:'
  - type: text
    content: 'Jedaiah; the son of Joiarib; Jakin; '
  '11':
  - type: text
    content: 'Seraiah son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the official in charge of the house of God, '
  '12':
  - type: text
    content: 'and their associates, who carried on work for the temple—822 men; Adaiah son of Jeroham, the son of Pelaliah, the son of Amzi, the son of Zechariah, the son of Pashhur, the son of Malkijah, '
  '13':
  - type: text
    content: 'and his associates, who were heads of families—242 men; Amashsai son of Azarel, the son of Ahzai, the son of Meshillemoth, the son of Immer, '
  '14':
  - type: text
    content: and his
  - type: note
    content: Most Septuagint manuscripts; Hebrew their
  - type: text
    content: ' associates, who were men of standing—128. Their chief officer was Zabdiel son of Haggedolim.'
  '15':
  - type: text
    content: 'From the Levites:'
  - type: text
    content: 'Shemaiah son of Hasshub, the son of Azrikam, the son of Hashabiah, the son of Bunni; '
  '16':
  - type: text
    content: 'Shabbethai and Jozabad, two of the heads of the Levites, who had charge of the outside work of the house of God; '
  '17':
  - type: text
    content: 'Mattaniah son of Mika, the son of Zabdi, the son of Asaph, the director who led in thanksgiving and prayer; Bakbukiah, second among his associates; and Abda son of Shammua, the son of Galal, the son of Jeduthun. '
  '18':
  - type: text
    content: The Levites in the holy city totaled 284.
  '19':
  - type: text
    content: 'The gatekeepers:'
  - type: text
    content: Akkub, Talmon and their associates, who kept watch at the gates—172 men.
  '2':
  - type: text
    content: The people commended all who volunteered to live in Jerusalem.
  '20':
  - type: text
    content: The rest of the Israelites, with the priests and Levites, were in all the towns of Judah, each on their ancestral property.
  '21':
  - type: text
    content: The temple servants lived on the hill of Ophel, and Ziha and Gishpa were in charge of them.
  '22':
  - type: text
    content: 'The chief officer of the Levites in Jerusalem was Uzzi son of Bani, the son of Hashabiah, the son of Mattaniah, the son of Mika. Uzzi was one of Asaph’s descendants, who were the musicians responsible for the service of the house of God. '
  '23':
  - type: text
    content: The musicians were under the king’s orders, which regulated their daily activity.
  '24':
  - type: text
    content: Pethahiah son of Meshezabel, one of the descendants of Zerah son of Judah, was the king’s agent in all affairs relating to the people.
  '25':
  - type: text
    content: 'As for the villages with their fields, some of the people of Judah lived in Kiriath Arba and its surrounding settlements, in Dibon and its settlements, in Jekabzeel and its villages, '
  '26':
  - type: text
    content: 'in Jeshua, in Moladah, in Beth Pelet, '
  '27':
  - type: text
    content: 'in Hazar Shual, in Beersheba and its settlements, '
  '28':
  - type: text
    content: 'in Ziklag, in Mekonah and its settlements, '
  '29':
  - type: text
    content: 'in En Rimmon, in Zorah, in Jarmuth, '
  '3':
  - type: text
    content: 'These are the provincial leaders who settled in Jerusalem (now some Israelites, priests, Levites, temple servants and descendants of Solomon’s servants lived in the towns of Judah, each on their own property in the various towns, '
  '30':
  - type: text
    content: Zanoah, Adullam and their villages, in Lachish and its fields, and in Azekah and its settlements. So they were living all the way from Beersheba to the Valley of Hinnom.
  '31':
  - type: text
    content: 'The descendants of the Benjamites from Geba lived in Mikmash, Aija, Bethel and its settlements, '
  '32':
  - type: text
    content: 'in Anathoth, Nob and Ananiah, '
  '33':
  - type: text
    content: 'in Hazor, Ramah and Gittaim, '
  '34':
  - type: text
    content: 'in Hadid, Zeboim and Neballat, '
  '35':
  - type: text
    content: in Lod and Ono, and in Ge Harashim.
  '36':
  - type: text
    content: Some of the divisions of the Levites of Judah settled in Benjamin.
  '4':
  - type: text
    content: 'while other people from both Judah and Benjamin lived in Jerusalem):'
  - type: text
    content: 'From the descendants of Judah:'
  - type: text
    content: 'Athaiah son of Uzziah, the son of Zechariah, the son of Amariah, the son of Shephatiah, the son of Mahalalel, a descendant of Perez; '
  '5':
  - type: text
    content: 'and Maaseiah son of Baruch, the son of Kol-Hozeh, the son of Hazaiah, the son of Adaiah, the son of Joiarib, the son of Zechariah, a descendant of Shelah. '
  '6':
  - type: text
    content: The descendants of Perez who lived in Jerusalem totaled 468 men of standing.
  '7':
  - type: text
    content: 'From the descendants of Benjamin:'
  - type: text
    content: 'Sallu son of Meshullam, the son of Joed, the son of Pedaiah, the son of Kolaiah, the son of Maaseiah, the son of Ithiel, the son of Jeshaiah, '
  '8':
  - type: text
    content: 'and his followers, Gabbai and Sallai—928 men. '
  '9':
  - type: text
    content: Joel son of Zikri was their chief officer, and Judah son of Hassenuah was over the New Quarter of the city.
