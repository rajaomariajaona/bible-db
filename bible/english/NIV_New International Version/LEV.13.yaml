document_id: LEV.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Regulations About Defiling Skin Diseases
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '10':
  - type: text
    content: 'The priest is to examine them, and if there is a white swelling in the skin that has turned the hair white and if there is raw flesh in the swelling, '
  '11':
  - type: text
    content: it is a chronic skin disease and the priest shall pronounce them unclean. He is not to isolate them, because they are already unclean.
  '12':
  - type: text
    content: '“If the disease breaks out all over their skin and, so far as the priest can see, it covers all the skin of the affected person from head to foot, '
  '13':
  - type: text
    content: 'the priest is to examine them, and if the disease has covered their whole body, he shall pronounce them clean. Since it has all turned white, they are clean. '
  '14':
  - type: text
    content: 'But whenever raw flesh appears on them, they will be unclean. '
  '15':
  - type: text
    content: 'When the priest sees the raw flesh, he shall pronounce them unclean. The raw flesh is unclean; they have a defiling disease. '
  '16':
  - type: text
    content: 'If the raw flesh changes and turns white, they must go to the priest. '
  '17':
  - type: text
    content: The priest is to examine them, and if the sores have turned white, the priest shall pronounce the affected person clean; then they will be clean.
  '18':
  - type: text
    content: '“When someone has a boil on their skin and it heals, '
  '19':
  - type: text
    content: 'and in the place where the boil was, a white swelling or reddish-white spot appears, they must present themselves to the priest. '
  '2':
  - type: text
    content: “When anyone has a swelling or a rash or a shiny spot on their skin that may be a defiling skin disease,
  - type: note
    content: The Hebrew word for defiling skin disease, traditionally translated “leprosy,” was used for various diseases affecting the skin; here and throughout verses 3-46.
  - type: text
    content: ' they must be brought to Aaron the priest or to one of his sons'
  - type: note
    content: Or descendants
  - type: text
    content: ' who is a priest. '
  '20':
  - type: text
    content: 'The priest is to examine it, and if it appears to be more than skin deep and the hair in it has turned white, the priest shall pronounce that person unclean. It is a defiling skin disease that has broken out where the boil was. '
  '21':
  - type: text
    content: 'But if, when the priest examines it, there is no white hair in it and it is not more than skin deep and has faded, then the priest is to isolate them for seven days. '
  '22':
  - type: text
    content: 'If it is spreading in the skin, the priest shall pronounce them unclean; it is a defiling disease. '
  '23':
  - type: text
    content: But if the spot is unchanged and has not spread, it is only a scar from the boil, and the priest shall pronounce them clean.
  '24':
  - type: text
    content: '“When someone has a burn on their skin and a reddish-white or white spot appears in the raw flesh of the burn, '
  '25':
  - type: text
    content: 'the priest is to examine the spot, and if the hair in it has turned white, and it appears to be more than skin deep, it is a defiling disease that has broken out in the burn. The priest shall pronounce them unclean; it is a defiling skin disease. '
  '26':
  - type: text
    content: 'But if the priest examines it and there is no white hair in the spot and if it is not more than skin deep and has faded, then the priest is to isolate them for seven days. '
  '27':
  - type: text
    content: 'On the seventh day the priest is to examine that person, and if it is spreading in the skin, the priest shall pronounce them unclean; it is a defiling skin disease. '
  '28':
  - type: text
    content: If, however, the spot is unchanged and has not spread in the skin but has faded, it is a swelling from the burn, and the priest shall pronounce them clean; it is only a scar from the burn.
  '29':
  - type: text
    content: '“If a man or woman has a sore on their head or chin, '
  '3':
  - type: text
    content: 'The priest is to examine the sore on the skin, and if the hair in the sore has turned white and the sore appears to be more than skin deep, it is a defiling skin disease. When the priest examines that person, he shall pronounce them ceremonially unclean. '
  '30':
  - type: text
    content: 'the priest is to examine the sore, and if it appears to be more than skin deep and the hair in it is yellow and thin, the priest shall pronounce them unclean; it is a defiling skin disease on the head or chin. '
  '31':
  - type: text
    content: 'But if, when the priest examines the sore, it does not seem to be more than skin deep and there is no black hair in it, then the priest is to isolate the affected person for seven days. '
  '32':
  - type: text
    content: 'On the seventh day the priest is to examine the sore, and if it has not spread and there is no yellow hair in it and it does not appear to be more than skin deep, '
  '33':
  - type: text
    content: 'then the man or woman must shave themselves, except for the affected area, and the priest is to keep them isolated another seven days. '
  '34':
  - type: text
    content: 'On the seventh day the priest is to examine the sore, and if it has not spread in the skin and appears to be no more than skin deep, the priest shall pronounce them clean. They must wash their clothes, and they will be clean. '
  '35':
  - type: text
    content: 'But if the sore does spread in the skin after they are pronounced clean, '
  '36':
  - type: text
    content: 'the priest is to examine them, and if he finds that the sore has spread in the skin, he does not need to look for yellow hair; they are unclean. '
  '37':
  - type: text
    content: If, however, the sore is unchanged so far as the priest can see, and if black hair has grown in it, the affected person is healed. They are clean, and the priest shall pronounce them clean.
  '38':
  - type: text
    content: '“When a man or woman has white spots on the skin, '
  '39':
  - type: text
    content: the priest is to examine them, and if the spots are dull white, it is a harmless rash that has broken out on the skin; they are clean.
  '4':
  - type: text
    content: 'If the shiny spot on the skin is white but does not appear to be more than skin deep and the hair in it has not turned white, the priest is to isolate the affected person for seven days. '
  '40':
  - type: text
    content: '“A man who has lost his hair and is bald is clean. '
  '41':
  - type: text
    content: 'If he has lost his hair from the front of his scalp and has a bald forehead, he is clean. '
  '42':
  - type: text
    content: 'But if he has a reddish-white sore on his bald head or forehead, it is a defiling disease breaking out on his head or forehead. '
  '43':
  - type: text
    content: 'The priest is to examine him, and if the swollen sore on his head or forehead is reddish-white like a defiling skin disease, '
  '44':
  - type: text
    content: the man is diseased and is unclean. The priest shall pronounce him unclean because of the sore on his head.
  '45':
  - type: text
    content: “Anyone with such a defiling disease must wear torn clothes, let their hair be unkempt,
  - type: note
    content: Or clothes, uncover their head
  - type: text
    content: ' cover the lower part of their face and cry out, ‘Unclean! Unclean!’ '
  '46':
  - type: text
    content: As long as they have the disease they remain unclean. They must live alone; they must live outside the camp.
  - type: heading
    content: Regulations About Defiling Molds
  '47':
  - type: text
    content: '“As for any fabric that is spoiled with a defiling mold—any woolen or linen clothing, '
  '48':
  - type: text
    content: 'any woven or knitted material of linen or wool, any leather or anything made of leather— '
  '49':
  - type: text
    content: 'if the affected area in the fabric, the leather, the woven or knitted material, or any leather article, is greenish or reddish, it is a defiling mold and must be shown to the priest. '
  '5':
  - type: text
    content: 'On the seventh day the priest is to examine them, and if he sees that the sore is unchanged and has not spread in the skin, he is to isolate them for another seven days. '
  '50':
  - type: text
    content: 'The priest is to examine the affected area and isolate the article for seven days. '
  '51':
  - type: text
    content: 'On the seventh day he is to examine it, and if the mold has spread in the fabric, the woven or knitted material, or the leather, whatever its use, it is a persistent defiling mold; the article is unclean. '
  '52':
  - type: text
    content: He must burn the fabric, the woven or knitted material of wool or linen, or any leather article that has been spoiled; because the defiling mold is persistent, the article must be burned.
  '53':
  - type: text
    content: '“But if, when the priest examines it, the mold has not spread in the fabric, the woven or knitted material, or the leather article, '
  '54':
  - type: text
    content: 'he shall order that the spoiled article be washed. Then he is to isolate it for another seven days. '
  '55':
  - type: text
    content: 'After the article has been washed, the priest is to examine it again, and if the mold has not changed its appearance, even though it has not spread, it is unclean. Burn it, no matter which side of the fabric has been spoiled. '
  '56':
  - type: text
    content: 'If, when the priest examines it, the mold has faded after the article has been washed, he is to tear the spoiled part out of the fabric, the leather, or the woven or knitted material. '
  '57':
  - type: text
    content: 'But if it reappears in the fabric, in the woven or knitted material, or in the leather article, it is a spreading mold; whatever has the mold must be burned. '
  '58':
  - type: text
    content: Any fabric, woven or knitted material, or any leather article that has been washed and is rid of the mold, must be washed again. Then it will be clean.”
  '59':
  - type: text
    content: These are the regulations concerning defiling molds in woolen or linen clothing, woven or knitted material, or any leather article, for pronouncing them clean or unclean.
  '6':
  - type: text
    content: 'On the seventh day the priest is to examine them again, and if the sore has faded and has not spread in the skin, the priest shall pronounce them clean; it is only a rash. They must wash their clothes, and they will be clean. '
  '7':
  - type: text
    content: 'But if the rash does spread in their skin after they have shown themselves to the priest to be pronounced clean, they must appear before the priest again. '
  '8':
  - type: text
    content: The priest is to examine that person, and if the rash has spread in the skin, he shall pronounce them unclean; it is a defiling skin disease.
  '9':
  - type: text
    content: '“When anyone has a defiling skin disease, they must be brought to the priest. '
