  '1':
  - type: heading
    content: Psalm 112This psalm is an acrostic poem, the lines of which begin with the successive letters of the Hebrew alphabet.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew Hallelu Yah
  - type: text
    content: 'Blessed are those who fear the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who find great delight in his commands.
  '10':
  - type: text
    content: The wicked will see and be vexed,
  - type: text
    content: they will gnash their teeth and waste away;
  - type: text
    content: the longings of the wicked will come to nothing.
  '2':
  - type: text
    content: Their children will be mighty in the land;
  - type: text
    content: the generation of the upright will be blessed.
  '3':
  - type: text
    content: Wealth and riches are in their houses,
  - type: text
    content: and their righteousness endures forever.
  '4':
  - type: text
    content: Even in darkness light dawns for the upright,
  - type: text
    content: for those who are gracious and compassionate and righteous.
  '5':
  - type: text
    content: Good will come to those who are generous and lend freely,
  - type: text
    content: who conduct their affairs with justice.
  '6':
  - type: text
    content: Surely the righteous will never be shaken;
  - type: text
    content: they will be remembered forever.
  '7':
  - type: text
    content: They will have no fear of bad news;
  - type: text
    content: 'their hearts are steadfast, trusting in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: Their hearts are secure, they will have no fear;
  - type: text
    content: in the end they will look in triumph on their foes.
  '9':
  - type: text
    content: They have freely scattered their gifts to the poor,
  - type: text
    content: their righteousness endures forever;
  - type: text
    content: their horn
  - type: note
    content: Horn here symbolizes dignity.
  - type: text
    content: ' will be lifted high in honor.'
