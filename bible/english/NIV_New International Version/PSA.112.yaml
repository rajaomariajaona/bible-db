    children:
    - type: text
      text: Psalm 112
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is an acrostic poem, the lines of which begin with the successive letters of the Hebrew alphabet.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '112:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hallelu Yah
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed are those who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who find great delight in his commands.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked will see and be vexed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will gnash their teeth and waste away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the longings of the wicked will come to nothing.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their children will be mighty in the land;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the generation of the upright will be blessed.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wealth and riches are in their houses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their righteousness endures forever.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even in darkness light dawns for the upright,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for those who are gracious and compassionate and righteous.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good will come to those who are generous and lend freely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who conduct their affairs with justice.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely the righteous will never be shaken;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be remembered forever.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will have no fear of bad news;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'their hearts are steadfast, trusting in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their hearts are secure, they will have no fear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the end they will look in triumph on their foes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have freely scattered their gifts to the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their righteousness endures forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their horn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '112:9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes dignity.
      marker-yv: yv-n
    - type: text
      text: ' will be lifted high in honor.'
