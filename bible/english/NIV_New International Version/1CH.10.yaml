document_id: 1CH.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Takes His Life
  - type: text
    content: 'Now the Philistines fought against Israel; the Israelites fled before them, and many fell dead on Mount Gilboa. '
  '10':
  - type: text
    content: They put his armor in the temple of their gods and hung up his head in the temple of Dagon.
  '11':
  - type: text
    content: 'When all the inhabitants of Jabesh Gilead heard what the Philistines had done to Saul, '
  '12':
  - type: text
    content: all their valiant men went and took the bodies of Saul and his sons and brought them to Jabesh. Then they buried their bones under the great tree in Jabesh, and they fasted seven days.
  '13':
  - type: text
    content: 'Saul died because he was unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: '; he did not keep the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' and even consulted a medium for guidance, '
  '14':
  - type: text
    content: 'and did not inquire of the '
  - type: text
    content: Lord
  - type: text
    content: '. So the '
  - type: text
    content: Lord
  - type: text
    content: ' put him to death and turned the kingdom over to David son of Jesse.'
  '2':
  - type: text
    content: 'The Philistines were in hot pursuit of Saul and his sons, and they killed his sons Jonathan, Abinadab and Malki-Shua. '
  '3':
  - type: text
    content: The fighting grew fierce around Saul, and when the archers overtook him, they wounded him.
  '4':
  - type: text
    content: Saul said to his armor-bearer, “Draw your sword and run me through, or these uncircumcised fellows will come and abuse me.”
  - type: text
    content: 'But his armor-bearer was terrified and would not do it; so Saul took his own sword and fell on it. '
  '5':
  - type: text
    content: 'When the armor-bearer saw that Saul was dead, he too fell on his sword and died. '
  '6':
  - type: text
    content: So Saul and his three sons died, and all his house died together.
  '7':
  - type: text
    content: When all the Israelites in the valley saw that the army had fled and that Saul and his sons had died, they abandoned their towns and fled. And the Philistines came and occupied them.
  '8':
  - type: text
    content: 'The next day, when the Philistines came to strip the dead, they found Saul and his sons fallen on Mount Gilboa. '
  '9':
  - type: text
    content: 'They stripped him and took his head and his armor, and sent messengers throughout the land of the Philistines to proclaim the news among their idols and their people. '
