document_id: LEV.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Eating Blood Forbidden
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: '“ ‘I will set my face against any Israelite or any foreigner residing among them who eats blood, and I will cut them off from the people. '
  '11':
  - type: text
    content: For the life of a creature is in the blood, and I have given it to you to make atonement for yourselves on the altar; it is the blood that makes atonement for one’s life.
  - type: note
    content: Or atonement by the life in the blood
  - type: text
    content: ' '
  '12':
  - type: text
    content: Therefore I say to the Israelites, “None of you may eat blood, nor may any foreigner residing among you eat blood.”
  '13':
  - type: text
    content: '“ ‘Any Israelite or any foreigner residing among you who hunts any animal or bird that may be eaten must drain out the blood and cover it with earth, '
  '14':
  - type: text
    content: because the life of every creature is its blood. That is why I have said to the Israelites, “You must not eat the blood of any creature, because the life of every creature is its blood; anyone who eats it must be cut off.”
  '15':
  - type: text
    content: '“ ‘Anyone, whether native-born or foreigner, who eats anything found dead or torn by wild animals must wash their clothes and bathe with water, and they will be ceremonially unclean till evening; then they will be clean. '
  '16':
  - type: text
    content: But if they do not wash their clothes and bathe themselves, they will be held responsible.’ ”
  '2':
  - type: text
    content: '“Speak to Aaron and his sons and to all the Israelites and say to them: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: '
  '3':
  - type: text
    content: Any Israelite who sacrifices an ox,
  - type: note
    content: The Hebrew word can refer to either male or female.
  - type: text
    content: ' a lamb or a goat in the camp or outside of it '
  '4':
  - type: text
    content: 'instead of bringing it to the entrance to the tent of meeting to present it as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: '—that person shall be considered guilty of bloodshed; they have shed blood and must be cut off from their people. '
  '5':
  - type: text
    content: 'This is so the Israelites will bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' the sacrifices they are now making in the open fields. They must bring them to the priest, that is, to the '
  - type: text
    content: Lord
  - type: text
    content: ', at the entrance to the tent of meeting and sacrifice them as fellowship offerings. '
  '6':
  - type: text
    content: 'The priest is to splash the blood against the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance to the tent of meeting and burn the fat as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: They must no longer offer any of their sacrifices to the goat idols
  - type: note
    content: Or the demons
  - type: text
    content: ' to whom they prostitute themselves. This is to be a lasting ordinance for them and for the generations to come.’'
  '8':
  - type: text
    content: '“Say to them: ‘Any Israelite or any foreigner residing among them who offers a burnt offering or sacrifice '
  '9':
  - type: text
    content: 'and does not bring it to the entrance to the tent of meeting to sacrifice it to the '
  - type: text
    content: Lord
  - type: text
    content: ' must be cut off from the people of Israel.'
