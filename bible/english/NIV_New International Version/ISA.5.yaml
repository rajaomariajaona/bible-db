document_id: ISA.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Song of the Vineyard
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I will sing for the one I love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a song about his vineyard:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My loved one had a vineyard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on a fertile hillside.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: A ten-acre vineyard will produce only a bath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 6 gallons or about 22 liters
      marker-yv: yv-n
    - type: text
      text: ' of wine;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a homer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 360 pounds or about 160 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of seed will yield only an ephah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 36 pounds or about 16 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of grain.”'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Woe to those who rise early in the morning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to run after their drinks,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who stay up late at night
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till they are inflamed with wine.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They have harps and lyres at their banquets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pipes and timbrels and wine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but they have no regard for the deeds of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no respect for the work of his hands.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Therefore my people will go into exile
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for lack of understanding;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those of high rank will die of hunger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the common people will be parched with thirst.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Therefore Death expands its jaws,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: opening wide its mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: into it will descend their nobles and masses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with all their brawlers and revelers.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So people will be brought low
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everyone humbled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the eyes of the arrogant humbled.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty will be exalted by his justice,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the holy God will be proved holy by his righteous acts.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then sheep will graze as in their own pasture;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lambs will feed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: / strangers will eat
      marker-yv: yv-n
    - type: text
      text: ' among the ruins of the rich.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Woe to those who draw sin along with cords of deceit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wickedness as with cart ropes,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: to those who say, “Let God hurry;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let him hasten his work
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so we may see it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The plan of the Holy One of Israel—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let it approach, let it come into view,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so we may know it.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He dug it up and cleared it of stones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and planted it with the choicest vines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He built a watchtower in it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cut out a winepress as well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he looked for a crop of good grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but it yielded only bad fruit.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Woe to those who call evil good
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and good evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who put darkness for light
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and light for darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who put bitter for sweet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sweet for bitter.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Woe to those who are wise in their own eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and clever in their own sight.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Woe to those who are heroes at drinking wine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and champions at mixing drinks,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: who acquit the guilty for a bribe,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but deny justice to the innocent.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Therefore, as tongues of fire lick up straw
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and as dry grass sinks down in the flames,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so their roots will decay
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their flowers blow away like dust;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for they have rejected the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and spurned the word of the Holy One of Israel.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger burns against his people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his hand is raised and he strikes them down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mountains shake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the dead bodies are like refuse in the streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet for all this, his anger is not turned away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his hand is still upraised.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He lifts up a banner for the distant nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he whistles for those at the ends of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here they come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: swiftly and speedily!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Not one of them grows tired or stumbles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one slumbers or sleeps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not a belt is loosened at the waist,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not a sandal strap is broken.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Their arrows are sharp,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all their bows are strung;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their horses’ hooves seem like flint,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their chariot wheels like a whirlwind.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Their roar is like that of the lion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they roar like young lions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they growl as they seize their prey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and carry it off with no one to rescue.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Now you dwellers in Jerusalem and people of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: judge between me and my vineyard.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: In that day they will roar over it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the roaring of the sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And if one looks at the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is only darkness and distress;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even the sun will be darkened by clouds.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: What more could have been done for my vineyard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than I have done for it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I looked for good grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: why did it yield only bad?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Now I will tell you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'what I am going to do to my vineyard:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will take away its hedge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it will be destroyed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will break down its wall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it will be trampled.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I will make it a wasteland,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: neither pruned nor cultivated,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and briers and thorns will grow there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will command the clouds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not to rain on it.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The vineyard of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is the nation of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the people of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are the vines he delighted in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he looked for justice, but saw bloodshed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for righteousness, but heard cries of distress.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Woes and Judgments
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Woe to you who add house to house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and join field to field
  - type: usfm
    marker: q1
    children:
    - type: text
      text: till no space is left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you live alone in the land.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty has declared in my hearing:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Surely the great houses will become desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fine mansions left without occupants.
