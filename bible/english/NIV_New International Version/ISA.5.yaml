document_id: ISA.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Song of the Vineyard
  - type: text
    content: I will sing for the one I love
  - type: text
    content: 'a song about his vineyard:'
  - type: text
    content: My loved one had a vineyard
  - type: text
    content: on a fertile hillside.
  '10':
  - type: text
    content: A ten-acre vineyard will produce only a bath
  - type: note
    content: That is, about 6 gallons or about 22 liters
  - type: text
    content: ' of wine;'
  - type: text
    content: a homer
  - type: note
    content: That is, probably about 360 pounds or about 160 kilograms
  - type: text
    content: ' of seed will yield only an ephah'
  - type: note
    content: That is, probably about 36 pounds or about 16 kilograms
  - type: text
    content: ' of grain.”'
  '11':
  - type: text
    content: Woe to those who rise early in the morning
  - type: text
    content: to run after their drinks,
  - type: text
    content: who stay up late at night
  - type: text
    content: till they are inflamed with wine.
  '12':
  - type: text
    content: They have harps and lyres at their banquets,
  - type: text
    content: pipes and timbrels and wine,
  - type: text
    content: 'but they have no regard for the deeds of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: no respect for the work of his hands.
  '13':
  - type: text
    content: Therefore my people will go into exile
  - type: text
    content: for lack of understanding;
  - type: text
    content: those of high rank will die of hunger
  - type: text
    content: and the common people will be parched with thirst.
  '14':
  - type: text
    content: Therefore Death expands its jaws,
  - type: text
    content: opening wide its mouth;
  - type: text
    content: into it will descend their nobles and masses
  - type: text
    content: with all their brawlers and revelers.
  '15':
  - type: text
    content: So people will be brought low
  - type: text
    content: and everyone humbled,
  - type: text
    content: the eyes of the arrogant humbled.
  '16':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will be exalted by his justice,'
  - type: text
    content: and the holy God will be proved holy by his righteous acts.
  '17':
  - type: text
    content: Then sheep will graze as in their own pasture;
  - type: text
    content: lambs will feed
  - type: note
    content: Septuagint; Hebrew / strangers will eat
  - type: text
    content: ' among the ruins of the rich.'
  '18':
  - type: text
    content: Woe to those who draw sin along with cords of deceit,
  - type: text
    content: and wickedness as with cart ropes,
  '19':
  - type: text
    content: to those who say, “Let God hurry;
  - type: text
    content: let him hasten his work
  - type: text
    content: so we may see it.
  - type: text
    content: The plan of the Holy One of Israel—
  - type: text
    content: let it approach, let it come into view,
  - type: text
    content: so we may know it.”
  '2':
  - type: text
    content: He dug it up and cleared it of stones
  - type: text
    content: and planted it with the choicest vines.
  - type: text
    content: He built a watchtower in it
  - type: text
    content: and cut out a winepress as well.
  - type: text
    content: Then he looked for a crop of good grapes,
  - type: text
    content: but it yielded only bad fruit.
  '20':
  - type: text
    content: Woe to those who call evil good
  - type: text
    content: and good evil,
  - type: text
    content: who put darkness for light
  - type: text
    content: and light for darkness,
  - type: text
    content: who put bitter for sweet
  - type: text
    content: and sweet for bitter.
  '21':
  - type: text
    content: Woe to those who are wise in their own eyes
  - type: text
    content: and clever in their own sight.
  '22':
  - type: text
    content: Woe to those who are heroes at drinking wine
  - type: text
    content: and champions at mixing drinks,
  '23':
  - type: text
    content: who acquit the guilty for a bribe,
  - type: text
    content: but deny justice to the innocent.
  '24':
  - type: text
    content: Therefore, as tongues of fire lick up straw
  - type: text
    content: and as dry grass sinks down in the flames,
  - type: text
    content: so their roots will decay
  - type: text
    content: and their flowers blow away like dust;
  - type: text
    content: 'for they have rejected the law of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty'
  - type: text
    content: and spurned the word of the Holy One of Israel.
  '25':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger burns against his people;
  - type: text
    content: his hand is raised and he strikes them down.
  - type: text
    content: The mountains shake,
  - type: text
    content: and the dead bodies are like refuse in the streets.
  - type: text
    content: Yet for all this, his anger is not turned away,
  - type: text
    content: his hand is still upraised.
  '26':
  - type: text
    content: He lifts up a banner for the distant nations,
  - type: text
    content: he whistles for those at the ends of the earth.
  - type: text
    content: Here they come,
  - type: text
    content: swiftly and speedily!
  '27':
  - type: text
    content: Not one of them grows tired or stumbles,
  - type: text
    content: not one slumbers or sleeps;
  - type: text
    content: not a belt is loosened at the waist,
  - type: text
    content: not a sandal strap is broken.
  '28':
  - type: text
    content: Their arrows are sharp,
  - type: text
    content: all their bows are strung;
  - type: text
    content: their horses’ hooves seem like flint,
  - type: text
    content: their chariot wheels like a whirlwind.
  '29':
  - type: text
    content: Their roar is like that of the lion,
  - type: text
    content: they roar like young lions;
  - type: text
    content: they growl as they seize their prey
  - type: text
    content: and carry it off with no one to rescue.
  '3':
  - type: text
    content: “Now you dwellers in Jerusalem and people of Judah,
  - type: text
    content: judge between me and my vineyard.
  '30':
  - type: text
    content: In that day they will roar over it
  - type: text
    content: like the roaring of the sea.
  - type: text
    content: And if one looks at the land,
  - type: text
    content: there is only darkness and distress;
  - type: text
    content: even the sun will be darkened by clouds.
  '4':
  - type: text
    content: What more could have been done for my vineyard
  - type: text
    content: than I have done for it?
  - type: text
    content: When I looked for good grapes,
  - type: text
    content: why did it yield only bad?
  '5':
  - type: text
    content: Now I will tell you
  - type: text
    content: 'what I am going to do to my vineyard:'
  - type: text
    content: I will take away its hedge,
  - type: text
    content: and it will be destroyed;
  - type: text
    content: I will break down its wall,
  - type: text
    content: and it will be trampled.
  '6':
  - type: text
    content: I will make it a wasteland,
  - type: text
    content: neither pruned nor cultivated,
  - type: text
    content: and briers and thorns will grow there.
  - type: text
    content: I will command the clouds
  - type: text
    content: not to rain on it.”
  '7':
  - type: text
    content: 'The vineyard of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty'
  - type: text
    content: is the nation of Israel,
  - type: text
    content: and the people of Judah
  - type: text
    content: are the vines he delighted in.
  - type: text
    content: And he looked for justice, but saw bloodshed;
  - type: text
    content: for righteousness, but heard cries of distress.
  - type: heading
    content: Woes and Judgments
  '8':
  - type: text
    content: Woe to you who add house to house
  - type: text
    content: and join field to field
  - type: text
    content: till no space is left
  - type: text
    content: and you live alone in the land.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has declared in my hearing:'
  - type: text
    content: “Surely the great houses will become desolate,
  - type: text
    content: the fine mansions left without occupants.
