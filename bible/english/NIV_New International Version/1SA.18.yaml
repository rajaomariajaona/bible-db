document_id: 1SA.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul’s Growing Fear of David
  - type: text
    content: 'After David had finished talking with Saul, Jonathan became one in spirit with David, and he loved him as himself. '
  '10':
  - type: text
    content: The next day an evil
  - type: note
    content: Or a harmful
  - type: text
    content: ' spirit from God came forcefully on Saul. He was prophesying in his house, while David was playing the lyre, as he usually did. Saul had a spear in his hand '
  '11':
  - type: text
    content: and he hurled it, saying to himself, “I’ll pin David to the wall.” But David eluded him twice.
  '12':
  - type: text
    content: 'Saul was afraid of David, because the '
  - type: text
    content: Lord
  - type: text
    content: ' was with David but had departed from Saul. '
  '13':
  - type: text
    content: 'So he sent David away from him and gave him command over a thousand men, and David led the troops in their campaigns. '
  '14':
  - type: text
    content: 'In everything he did he had great success, because the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him. '
  '15':
  - type: text
    content: 'When Saul saw how successful he was, he was afraid of him. '
  '16':
  - type: text
    content: But all Israel and Judah loved David, because he led them in their campaigns.
  '17':
  - type: text
    content: 'Saul said to David, “Here is my older daughter Merab. I will give her to you in marriage; only serve me bravely and fight the battles of the '
  - type: text
    content: Lord
  - type: text
    content: .” For Saul said to himself, “I will not raise a hand against him. Let the Philistines do that!”
  '18':
  - type: text
    content: 'But David said to Saul, “Who am I, and what is my family or my clan in Israel, that I should become the king’s son-in-law?” '
  '19':
  - type: text
    content: So
  - type: note
    content: Or However,
  - type: text
    content: ' when the time came for Merab, Saul’s daughter, to be given to David, she was given in marriage to Adriel of Meholah.'
  '2':
  - type: text
    content: 'From that day Saul kept David with him and did not let him return home to his family. '
  '20':
  - type: text
    content: 'Now Saul’s daughter Michal was in love with David, and when they told Saul about it, he was pleased. '
  '21':
  - type: text
    content: “I will give her to him,” he thought, “so that she may be a snare to him and so that the hand of the Philistines may be against him.” So Saul said to David, “Now you have a second opportunity to become my son-in-law.”
  '22':
  - type: text
    content: 'Then Saul ordered his attendants: “Speak to David privately and say, ‘Look, the king likes you, and his attendants all love you; now become his son-in-law.’ ”'
  '23':
  - type: text
    content: They repeated these words to David. But David said, “Do you think it is a small matter to become the king’s son-in-law? I’m only a poor man and little known.”
  '24':
  - type: text
    content: 'When Saul’s servants told him what David had said, '
  '25':
  - type: text
    content: Saul replied, “Say to David, ‘The king wants no other price for the bride than a hundred Philistine foreskins, to take revenge on his enemies.’ ” Saul’s plan was to have David fall by the hands of the Philistines.
  '26':
  - type: text
    content: 'When the attendants told David these things, he was pleased to become the king’s son-in-law. So before the allotted time elapsed, '
  '27':
  - type: text
    content: David took his men with him and went out and killed two hundred Philistines and brought back their foreskins. They counted out the full number to the king so that David might become the king’s son-in-law. Then Saul gave him his daughter Michal in marriage.
  '28':
  - type: text
    content: 'When Saul realized that the '
  - type: text
    content: Lord
  - type: text
    content: ' was with David and that his daughter Michal loved David, '
  '29':
  - type: text
    content: Saul became still more afraid of him, and he remained his enemy the rest of his days.
  '3':
  - type: text
    content: 'And Jonathan made a covenant with David because he loved him as himself. '
  '30':
  - type: text
    content: The Philistine commanders continued to go out to battle, and as often as they did, David met with more success than the rest of Saul’s officers, and his name became well known.
  '4':
  - type: text
    content: Jonathan took off the robe he was wearing and gave it to David, along with his tunic, and even his sword, his bow and his belt.
  '5':
  - type: text
    content: Whatever mission Saul sent him on, David was so successful that Saul gave him a high rank in the army. This pleased all the troops, and Saul’s officers as well.
  '6':
  - type: text
    content: 'When the men were returning home after David had killed the Philistine, the women came out from all the towns of Israel to meet King Saul with singing and dancing, with joyful songs and with timbrels and lyres. '
  '7':
  - type: text
    content: 'As they danced, they sang:'
  - type: text
    content: “Saul has slain his thousands,
  - type: text
    content: and David his tens of thousands.”
  '8':
  - type: text
    content: 'Saul was very angry; this refrain displeased him greatly. “They have credited David with tens of thousands,” he thought, “but me with only thousands. What more can he get but the kingdom?” '
  '9':
  - type: text
    content: And from that time on Saul kept a close eye on David.
