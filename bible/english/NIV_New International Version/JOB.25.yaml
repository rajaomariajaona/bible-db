document_id: JOB.25,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bildad
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Bildad the Shuhite replied:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Dominion and awe belong to God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he establishes order in the heights of heaven.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can his forces be numbered?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On whom does his light not rise?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How then can a mortal be righteous before God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How can one born of woman be pure?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If even the moon is not bright
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the stars are not pure in his eyes,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how much less a mortal, who is but a maggot—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a human being, who is only a worm!”
