segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bildad
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Bildad the Shuhite replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Dominion and awe belong to God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he establishes order in the heights of heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Can his forces be numbered?
- type: usfm
  marker: q2
  children:
  - type: text
    text: On whom does his light not rise?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: How then can a mortal be righteous before God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How can one born of woman be pure?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If even the moon is not bright
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the stars are not pure in his eyes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: how much less a mortal, who is but a maggot—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a human being, who is only a worm!”
