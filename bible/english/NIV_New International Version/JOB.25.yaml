document_id: JOB.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Bildad
  - type: text
    content: 'Then Bildad the Shuhite replied:'
  '2':
  - type: text
    content: “Dominion and awe belong to God;
  - type: text
    content: he establishes order in the heights of heaven.
  '3':
  - type: text
    content: Can his forces be numbered?
  - type: text
    content: On whom does his light not rise?
  '4':
  - type: text
    content: How then can a mortal be righteous before God?
  - type: text
    content: How can one born of woman be pure?
  '5':
  - type: text
    content: If even the moon is not bright
  - type: text
    content: and the stars are not pure in his eyes,
  '6':
  - type: text
    content: how much less a mortal, who is but a maggot—
  - type: text
    content: a human being, who is only a worm!”
