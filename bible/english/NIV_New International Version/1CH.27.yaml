document_id: 1CH.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Army Divisions
  - type: text
    content: This is the list of the Israelites—heads of families, commanders of thousands and commanders of hundreds, and their officers, who served the king in all that concerned the army divisions that were on duty month by month throughout the year. Each division consisted of 24,000 men.
  '10':
  - type: text
    content: The seventh, for the seventh month, was Helez the Pelonite, an Ephraimite. There were 24,000 men in his division.
  '11':
  - type: text
    content: The eighth, for the eighth month, was Sibbekai the Hushathite, a Zerahite. There were 24,000 men in his division.
  '12':
  - type: text
    content: The ninth, for the ninth month, was Abiezer the Anathothite, a Benjamite. There were 24,000 men in his division.
  '13':
  - type: text
    content: The tenth, for the tenth month, was Maharai the Netophathite, a Zerahite. There were 24,000 men in his division.
  '14':
  - type: text
    content: The eleventh, for the eleventh month, was Benaiah the Pirathonite, an Ephraimite. There were 24,000 men in his division.
  '15':
  - type: text
    content: The twelfth, for the twelfth month, was Heldai the Netophathite, from the family of Othniel. There were 24,000 men in his division.
  - type: heading
    content: Leaders of the Tribes
  '16':
  - type: text
    content: 'The leaders of the tribes of Israel:'
  - type: text
    content: 'over the Reubenites: Eliezer son of Zikri;'
  - type: text
    content: 'over the Simeonites: Shephatiah son of Maakah;'
  '17':
  - type: text
    content: 'over Levi: Hashabiah son of Kemuel;'
  - type: text
    content: 'over Aaron: Zadok;'
  '18':
  - type: text
    content: 'over Judah: Elihu, a brother of David;'
  - type: text
    content: 'over Issachar: Omri son of Michael;'
  '19':
  - type: text
    content: 'over Zebulun: Ishmaiah son of Obadiah;'
  - type: text
    content: 'over Naphtali: Jerimoth son of Azriel;'
  '2':
  - type: text
    content: 'In charge of the first division, for the first month, was Jashobeam son of Zabdiel. There were 24,000 men in his division. '
  '20':
  - type: text
    content: 'over the Ephraimites: Hoshea son of Azaziah;'
  - type: text
    content: 'over half the tribe of Manasseh: Joel son of Pedaiah;'
  '21':
  - type: text
    content: 'over the half-tribe of Manasseh in Gilead: Iddo son of Zechariah;'
  - type: text
    content: 'over Benjamin: Jaasiel son of Abner;'
  '22':
  - type: text
    content: 'over Dan: Azarel son of Jeroham.'
  - type: text
    content: These were the leaders of the tribes of Israel.
  '23':
  - type: text
    content: 'David did not take the number of the men twenty years old or less, because the '
  - type: text
    content: Lord
  - type: text
    content: ' had promised to make Israel as numerous as the stars in the sky. '
  '24':
  - type: text
    content: Joab son of Zeruiah began to count the men but did not finish. God’s wrath came on Israel on account of this numbering, and the number was not entered in the book
  - type: note
    content: Septuagint; Hebrew number
  - type: text
    content: ' of the annals of King David.'
  - type: heading
    content: The King’s Overseers
  '25':
  - type: text
    content: Azmaveth son of Adiel was in charge of the royal storehouses.
  - type: text
    content: Jonathan son of Uzziah was in charge of the storehouses in the outlying districts, in the towns, the villages and the watchtowers.
  '26':
  - type: text
    content: Ezri son of Kelub was in charge of the workers who farmed the land.
  '27':
  - type: text
    content: Shimei the Ramathite was in charge of the vineyards.
  - type: text
    content: Zabdi the Shiphmite was in charge of the produce of the vineyards for the wine vats.
  '28':
  - type: text
    content: Baal-Hanan the Gederite was in charge of the olive and sycamore-fig trees in the western foothills.
  - type: text
    content: Joash was in charge of the supplies of olive oil.
  '29':
  - type: text
    content: Shitrai the Sharonite was in charge of the herds grazing in Sharon.
  - type: text
    content: Shaphat son of Adlai was in charge of the herds in the valleys.
  '3':
  - type: text
    content: He was a descendant of Perez and chief of all the army officers for the first month.
  '30':
  - type: text
    content: Obil the Ishmaelite was in charge of the camels.
  - type: text
    content: Jehdeiah the Meronothite was in charge of the donkeys.
  '31':
  - type: text
    content: Jaziz the Hagrite was in charge of the flocks.
  - type: text
    content: All these were the officials in charge of King David’s property.
  '32':
  - type: text
    content: Jonathan, David’s uncle, was a counselor, a man of insight and a scribe. Jehiel son of Hakmoni took care of the king’s sons.
  '33':
  - type: text
    content: Ahithophel was the king’s counselor.
  - type: text
    content: 'Hushai the Arkite was the king’s confidant. '
  '34':
  - type: text
    content: Ahithophel was succeeded by Jehoiada son of Benaiah and by Abiathar.
  - type: text
    content: Joab was the commander of the royal army.
  '4':
  - type: text
    content: In charge of the division for the second month was Dodai the Ahohite; Mikloth was the leader of his division. There were 24,000 men in his division.
  '5':
  - type: text
    content: 'The third army commander, for the third month, was Benaiah son of Jehoiada the priest. He was chief and there were 24,000 men in his division. '
  '6':
  - type: text
    content: This was the Benaiah who was a mighty warrior among the Thirty and was over the Thirty. His son Ammizabad was in charge of his division.
  '7':
  - type: text
    content: The fourth, for the fourth month, was Asahel the brother of Joab; his son Zebadiah was his successor. There were 24,000 men in his division.
  '8':
  - type: text
    content: The fifth, for the fifth month, was the commander Shamhuth the Izrahite. There were 24,000 men in his division.
  '9':
  - type: text
    content: The sixth, for the sixth month, was Ira the son of Ikkesh the Tekoite. There were 24,000 men in his division.
