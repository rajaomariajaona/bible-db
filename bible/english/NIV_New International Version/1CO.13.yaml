document_id: 1CO.13,111
type_code: eng
verses:
  '1':
  - type: text
    content: If I speak in the tongues
  - type: note
    content: Or languages
  - type: text
    content: ' of men or of angels, but do not have love, I am only a resounding gong or a clanging cymbal. '
  '10':
  - type: text
    content: 'but when completeness comes, what is in part disappears. '
  '11':
  - type: text
    content: 'When I was a child, I talked like a child, I thought like a child, I reasoned like a child. When I became a man, I put the ways of childhood behind me. '
  '12':
  - type: text
    content: For now we see only a reflection as in a mirror; then we shall see face to face. Now I know in part; then I shall know fully, even as I am fully known.
  '13':
  - type: text
    content: 'And now these three remain: faith, hope and love. But the greatest of these is love.'
  '2':
  - type: text
    content: 'If I have the gift of prophecy and can fathom all mysteries and all knowledge, and if I have a faith that can move mountains, but do not have love, I am nothing. '
  '3':
  - type: text
    content: If I give all I possess to the poor and give over my body to hardship that I may boast,
  - type: note
    content: Some manuscripts body to the flames
  - type: text
    content: ' but do not have love, I gain nothing.'
  '4':
  - type: text
    content: 'Love is patient, love is kind. It does not envy, it does not boast, it is not proud. '
  '5':
  - type: text
    content: 'It does not dishonor others, it is not self-seeking, it is not easily angered, it keeps no record of wrongs. '
  '6':
  - type: text
    content: 'Love does not delight in evil but rejoices with the truth. '
  '7':
  - type: text
    content: It always protects, always trusts, always hopes, always perseveres.
  '8':
  - type: text
    content: 'Love never fails. But where there are prophecies, they will cease; where there are tongues, they will be stilled; where there is knowledge, it will pass away. '
  '9':
  - type: text
    content: 'For we know in part and we prophesy in part, '
