document_id: 1JN.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'My dear children, I write this to you so that you will not sin. But if anybody does sin, we have an advocate with the Father—Jesus Christ, the Righteous One. '
  '10':
  - type: text
    content: Anyone who loves their brother and sister
  - type: note
    content: The Greek word for brother and sister (adelphos) refers here to a believer, whether man or woman, as part of God’s family; also in 3:10; 4:20, 21.
  - type: text
    content: ' lives in the light, and there is nothing in them to make them stumble. '
  '11':
  - type: text
    content: But anyone who hates a brother or sister is in the darkness and walks around in the darkness. They do not know where they are going, because the darkness has blinded them.
  - type: heading
    content: Reasons for Writing
  '12':
  - type: text
    content: I am writing to you, dear children,
  - type: text
    content: because your sins have been forgiven on account of his name.
  '13':
  - type: text
    content: I am writing to you, fathers,
  - type: text
    content: because you know him who is from the beginning.
  - type: text
    content: I am writing to you, young men,
  - type: text
    content: because you have overcome the evil one.
  '14':
  - type: text
    content: I write to you, dear children,
  - type: text
    content: because you know the Father.
  - type: text
    content: I write to you, fathers,
  - type: text
    content: because you know him who is from the beginning.
  - type: text
    content: I write to you, young men,
  - type: text
    content: because you are strong,
  - type: text
    content: and the word of God lives in you,
  - type: text
    content: and you have overcome the evil one.
  - type: heading
    content: On Not Loving the World
  '15':
  - type: text
    content: Do not love the world or anything in the world. If anyone loves the world, love for the Father
  - type: note
    content: Or world, the Father’s love
  - type: text
    content: ' is not in them. '
  '16':
  - type: text
    content: 'For everything in the world—the lust of the flesh, the lust of the eyes, and the pride of life—comes not from the Father but from the world. '
  '17':
  - type: text
    content: The world and its desires pass away, but whoever does the will of God lives forever.
  - type: heading
    content: Warnings Against Denying the Son
  '18':
  - type: text
    content: 'Dear children, this is the last hour; and as you have heard that the antichrist is coming, even now many antichrists have come. This is how we know it is the last hour. '
  '19':
  - type: text
    content: They went out from us, but they did not really belong to us. For if they had belonged to us, they would have remained with us; but their going showed that none of them belonged to us.
  '2':
  - type: text
    content: He is the atoning sacrifice for our sins, and not only for ours but also for the sins of the whole world.
  - type: heading
    content: Love and Hatred for Fellow Believers
  '20':
  - type: text
    content: But you have an anointing from the Holy One, and all of you know the truth.
  - type: note
    content: Some manuscripts and you know all things
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'I do not write to you because you do not know the truth, but because you do know it and because no lie comes from the truth. '
  '22':
  - type: text
    content: 'Who is the liar? It is whoever denies that Jesus is the Christ. Such a person is the antichrist—denying the Father and the Son. '
  '23':
  - type: text
    content: No one who denies the Son has the Father; whoever acknowledges the Son has the Father also.
  '24':
  - type: text
    content: 'As for you, see that what you have heard from the beginning remains in you. If it does, you also will remain in the Son and in the Father. '
  '25':
  - type: text
    content: And this is what he promised us—eternal life.
  '26':
  - type: text
    content: 'I am writing these things to you about those who are trying to lead you astray. '
  '27':
  - type: text
    content: As for you, the anointing you received from him remains in you, and you do not need anyone to teach you. But as his anointing teaches you about all things and as that anointing is real, not counterfeit—just as it has taught you, remain in him.
  - type: heading
    content: God’s Children and Sin
  '28':
  - type: text
    content: And now, dear children, continue in him, so that when he appears we may be confident and unashamed before him at his coming.
  '29':
  - type: text
    content: If you know that he is righteous, you know that everyone who does what is right has been born of him.
  '3':
  - type: text
    content: 'We know that we have come to know him if we keep his commands. '
  '4':
  - type: text
    content: 'Whoever says, “I know him,” but does not do what he commands is a liar, and the truth is not in that person. '
  '5':
  - type: text
    content: But if anyone obeys his word, love for God
  - type: note
    content: Or word, God’s love
  - type: text
    content: ' is truly made complete in them. This is how we know we are in him: '
  '6':
  - type: text
    content: Whoever claims to live in him must live as Jesus did.
  '7':
  - type: text
    content: 'Dear friends, I am not writing you a new command but an old one, which you have had since the beginning. This old command is the message you have heard. '
  '8':
  - type: text
    content: Yet I am writing you a new command; its truth is seen in him and in you, because the darkness is passing and the true light is already shining.
  '9':
  - type: text
    content: Anyone who claims to be in the light but hates a brother or sister
  - type: note
    content: The Greek word for brother or sister (adelphos) refers here to a believer, whether man or woman, as part of God’s family; also in verse 11; and in 3:15, 17; 4:20; 5:16.
  - type: text
    content: ' is still in the darkness. '
