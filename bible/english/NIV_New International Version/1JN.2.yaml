document_id: 1JN.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My dear children, I write this to you so that you will not sin. But if anybody does sin, we have an advocate with the Father—Jesus Christ, the Righteous One. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anyone who loves their brother and sister
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brother and sister '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: adelphos
        - type: text
          text: ) refers here to a believer, whether man or woman, as part of God’s family; also in 3:10; 4:20, 21.
      marker-yv: yv-n
    - type: text
      text: ' lives in the light, and there is nothing in them to make them stumble. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But anyone who hates a brother or sister is in the darkness and walks around in the darkness. They do not know where they are going, because the darkness has blinded them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reasons for Writing
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am writing to you, dear children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because your sins have been forgiven on account of his name.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am writing to you, fathers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you know him who is from the beginning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am writing to you, young men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you have overcome the evil one.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I write to you, dear children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you know the Father.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I write to you, fathers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you know him who is from the beginning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I write to you, young men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you are strong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the word of God lives in you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you have overcome the evil one.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: On Not Loving the World
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do not love the world or anything in the world. If anyone loves the world, love for the Father
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: world, the Father’s love
      marker-yv: yv-n
    - type: text
      text: ' is not in them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For everything in the world—the lust of the flesh, the lust of the eyes, and the pride of life—comes not from the Father but from the world. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The world and its desires pass away, but whoever does the will of God lives forever.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warnings Against Denying the Son
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear children, this is the last hour; and as you have heard that the antichrist is coming, even now many antichrists have come. This is how we know it is the last hour. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They went out from us, but they did not really belong to us. For if they had belonged to us, they would have remained with us; but their going showed that none of them belonged to us.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He is the atoning sacrifice for our sins, and not only for ours but also for the sins of the whole world.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Love and Hatred for Fellow Believers
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you have an anointing from the Holy One, and all of you know the truth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and you know all things
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I do not write to you because you do not know the truth, but because you do know it and because no lie comes from the truth. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who is the liar? It is whoever denies that Jesus is the Christ. Such a person is the antichrist—denying the Father and the Son. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No one who denies the Son has the Father; whoever acknowledges the Son has the Father also.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for you, see that what you have heard from the beginning remains in you. If it does, you also will remain in the Son and in the Father. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And this is what he promised us—eternal life.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am writing these things to you about those who are trying to lead you astray. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As for you, the anointing you received from him remains in you, and you do not need anyone to teach you. But as his anointing teaches you about all things and as that anointing is real, not counterfeit—just as it has taught you, remain in him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Children and Sin
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And now, dear children, continue in him, so that when he appears we may be confident and unashamed before him at his coming.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If you know that he is righteous, you know that everyone who does what is right has been born of him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that we have come to know him if we keep his commands. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever says, “I know him,” but does not do what he commands is a liar, and the truth is not in that person. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if anyone obeys his word, love for God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: word, God’s love
      marker-yv: yv-n
    - type: text
      text: ' is truly made complete in them. This is how we know we are in him: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whoever claims to live in him must live as Jesus did.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, I am not writing you a new command but an old one, which you have had since the beginning. This old command is the message you have heard. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet I am writing you a new command; its truth is seen in him and in you, because the darkness is passing and the true light is already shining.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anyone who claims to be in the light but hates a brother or sister
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brother or sister '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: adelphos
        - type: text
          text: ) refers here to a believer, whether man or woman, as part of God’s family; also in verse 11; and in 3:15, 17; 4:20; 5:16.
      marker-yv: yv-n
    - type: text
      text: ' is still in the darkness. '
