document_id: ISA.63,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Day of Vengeance and Redemption
  - type: text
    content: Who is this coming from Edom,
  - type: text
    content: from Bozrah, with his garments stained crimson?
  - type: text
    content: Who is this, robed in splendor,
  - type: text
    content: striding forward in the greatness of his strength?
  - type: text
    content: “It is I, proclaiming victory,
  - type: text
    content: mighty to save.”
  '10':
  - type: text
    content: Yet they rebelled
  - type: text
    content: and grieved his Holy Spirit.
  - type: text
    content: So he turned and became their enemy
  - type: text
    content: and he himself fought against them.
  '11':
  - type: text
    content: Then his people recalled
  - type: note
    content: Or But may he recall
  - type: text
    content: ' the days of old,'
  - type: text
    content: the days of Moses and his people—
  - type: text
    content: where is he who brought them through the sea,
  - type: text
    content: with the shepherd of his flock?
  - type: text
    content: Where is he who set
  - type: text
    content: his Holy Spirit among them,
  '12':
  - type: text
    content: who sent his glorious arm of power
  - type: text
    content: to be at Moses’ right hand,
  - type: text
    content: who divided the waters before them,
  - type: text
    content: to gain for himself everlasting renown,
  '13':
  - type: text
    content: who led them through the depths?
  - type: text
    content: Like a horse in open country,
  - type: text
    content: they did not stumble;
  '14':
  - type: text
    content: like cattle that go down to the plain,
  - type: text
    content: 'they were given rest by the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: This is how you guided your people
  - type: text
    content: to make for yourself a glorious name.
  '15':
  - type: text
    content: Look down from heaven and see,
  - type: text
    content: from your lofty throne, holy and glorious.
  - type: text
    content: Where are your zeal and your might?
  - type: text
    content: Your tenderness and compassion are withheld from us.
  '16':
  - type: text
    content: But you are our Father,
  - type: text
    content: though Abraham does not know us
  - type: text
    content: or Israel acknowledge us;
  - type: text
    content: 'you, '
  - type: text
    content: Lord
  - type: text
    content: ', are our Father,'
  - type: text
    content: our Redeemer from of old is your name.
  '17':
  - type: text
    content: 'Why, '
  - type: text
    content: Lord
  - type: text
    content: ', do you make us wander from your ways'
  - type: text
    content: and harden our hearts so we do not revere you?
  - type: text
    content: Return for the sake of your servants,
  - type: text
    content: the tribes that are your inheritance.
  '18':
  - type: text
    content: For a little while your people possessed your holy place,
  - type: text
    content: but now our enemies have trampled down your sanctuary.
  '19':
  - type: text
    content: We are yours from of old;
  - type: text
    content: but you have not ruled over them,
  - type: text
    content: they have not been called
  - type: note
    content: Or We are like those you have never ruled, / like those never called
  - type: text
    content: ' by your name.'
  '2':
  - type: text
    content: Why are your garments red,
  - type: text
    content: like those of one treading the winepress?
  '3':
  - type: text
    content: “I have trodden the winepress alone;
  - type: text
    content: from the nations no one was with me.
  - type: text
    content: I trampled them in my anger
  - type: text
    content: and trod them down in my wrath;
  - type: text
    content: their blood spattered my garments,
  - type: text
    content: and I stained all my clothing.
  '4':
  - type: text
    content: It was for me the day of vengeance;
  - type: text
    content: the year for me to redeem had come.
  '5':
  - type: text
    content: I looked, but there was no one to help,
  - type: text
    content: I was appalled that no one gave support;
  - type: text
    content: so my own arm achieved salvation for me,
  - type: text
    content: and my own wrath sustained me.
  '6':
  - type: text
    content: I trampled the nations in my anger;
  - type: text
    content: in my wrath I made them drunk
  - type: text
    content: and poured their blood on the ground.”
  - type: heading
    content: Praise and Prayer
  '7':
  - type: text
    content: 'I will tell of the kindnesses of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the deeds for which he is to be praised,
  - type: text
    content: 'according to all the '
  - type: text
    content: Lord
  - type: text
    content: ' has done for us—'
  - type: text
    content: yes, the many good things
  - type: text
    content: he has done for Israel,
  - type: text
    content: according to his compassion and many kindnesses.
  '8':
  - type: text
    content: He said, “Surely they are my people,
  - type: text
    content: children who will be true to me”;
  - type: text
    content: and so he became their Savior.
  '9':
  - type: text
    content: In all their distress he too was distressed,
  - type: text
    content: and the angel of his presence saved them.
  - type: note
    content: Or Savior 9 in their distress. / It was no envoy or angel / but his own presence that saved them
  - type: text
    content: In his love and mercy he redeemed them;
  - type: text
    content: he lifted them up and carried them
  - type: text
    content: all the days of old.
