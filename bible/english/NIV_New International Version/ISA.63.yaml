document_id: ISA.63
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Day of Vengeance and Redemption
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Who is this coming from Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Bozrah, with his garments stained crimson?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is this, robed in splendor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: striding forward in the greatness of his strength?
- type: usfm
  marker: q1
  children:
  - type: text
    text: “It is I, proclaiming victory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: mighty to save.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Why are your garments red,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like those of one treading the winepress?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “I have trodden the winepress alone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the nations no one was with me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I trampled them in my anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and trod them down in my wrath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: their blood spattered my garments,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I stained all my clothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: It was for me the day of vengeance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the year for me to redeem had come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I looked, but there was no one to help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was appalled that no one gave support;
- type: usfm
  marker: q1
  children:
  - type: text
    text: so my own arm achieved salvation for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my own wrath sustained me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I trampled the nations in my anger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in my wrath I made them drunk
- type: usfm
  marker: q2
  children:
  - type: text
    text: and poured their blood on the ground.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Praise and Prayer
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will tell of the kindnesses of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the deeds for which he is to be praised,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'according to all the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has done for us—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: yes, the many good things
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has done for Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to his compassion and many kindnesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He said, “Surely they are my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: children who will be true to me”;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and so he became their Savior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: In all their distress he too was distressed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the angel of his presence saved them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Savior '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '9 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in their distress. / It was no envoy or angel / but his own presence that saved them
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: In his love and mercy he redeemed them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he lifted them up and carried them
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the days of old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yet they rebelled
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grieved his Holy Spirit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So he turned and became their enemy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he himself fought against them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then his people recalled
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: But may he recall
    marker-yv: yv-n
  - type: text
    text: ' the days of old,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the days of Moses and his people—
- type: usfm
  marker: q1
  children:
  - type: text
    text: where is he who brought them through the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the shepherd of his flock?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is he who set
- type: usfm
  marker: q2
  children:
  - type: text
    text: his Holy Spirit among them,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: who sent his glorious arm of power
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be at Moses’ right hand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who divided the waters before them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to gain for himself everlasting renown,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: who led them through the depths?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a horse in open country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they did not stumble;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: like cattle that go down to the plain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they were given rest by the Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is how you guided your people
- type: usfm
  marker: q2
  children:
  - type: text
    text: to make for yourself a glorious name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Look down from heaven and see,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from your lofty throne, holy and glorious.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where are your zeal and your might?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your tenderness and compassion are withheld from us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But you are our Father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though Abraham does not know us
- type: usfm
  marker: q2
  children:
  - type: text
    text: or Israel acknowledge us;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', are our Father,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: our Redeemer from of old is your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Why, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do you make us wander from your ways'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and harden our hearts so we do not revere you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Return for the sake of your servants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the tribes that are your inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For a little while your people possessed your holy place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but now our enemies have trampled down your sanctuary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: We are yours from of old;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you have not ruled over them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have not been called
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '63:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: We are like those you have never ruled, / like those never called
    marker-yv: yv-n
  - type: text
    text: ' by your name.'
