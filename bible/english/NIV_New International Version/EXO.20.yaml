document_id: EXO.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ten Commandments
  - type: text
    content: 'And God spoke all these words:'
  '10':
  - type: text
    content: 'but the seventh day is a sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. On it you shall not do any work, neither you, nor your son or daughter, nor your male or female servant, nor your animals, nor any foreigner residing in your towns. '
  '11':
  - type: text
    content: 'For in six days the '
  - type: text
    content: Lord
  - type: text
    content: ' made the heavens and the earth, the sea, and all that is in them, but he rested on the seventh day. Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed the Sabbath day and made it holy.'
  '12':
  - type: text
    content: '“Honor your father and your mother, so that you may live long in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you.'
  '13':
  - type: text
    content: “You shall not murder.
  '14':
  - type: text
    content: “You shall not commit adultery.
  '15':
  - type: text
    content: “You shall not steal.
  '16':
  - type: text
    content: “You shall not give false testimony against your neighbor.
  '17':
  - type: text
    content: “You shall not covet your neighbor’s house. You shall not covet your neighbor’s wife, or his male or female servant, his ox or donkey, or anything that belongs to your neighbor.”
  '18':
  - type: text
    content: 'When the people saw the thunder and lightning and heard the trumpet and saw the mountain in smoke, they trembled with fear. They stayed at a distance '
  '19':
  - type: text
    content: and said to Moses, “Speak to us yourself and we will listen. But do not have God speak to us or we will die.”
  '2':
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of Egypt, out of the land of slavery.'
  '20':
  - type: text
    content: Moses said to the people, “Do not be afraid. God has come to test you, so that the fear of God will be with you to keep you from sinning.”
  '21':
  - type: text
    content: The people remained at a distance, while Moses approached the thick darkness where God was.
  - type: heading
    content: Idols and Altars
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Tell the Israelites this: ‘You have seen for yourselves that I have spoken to you from heaven: '
  '23':
  - type: text
    content: Do not make any gods to be alongside me; do not make for yourselves gods of silver or gods of gold.
  '24':
  - type: text
    content: '“ ‘Make an altar of earth for me and sacrifice on it your burnt offerings and fellowship offerings, your sheep and goats and your cattle. Wherever I cause my name to be honored, I will come to you and bless you. '
  '25':
  - type: text
    content: 'If you make an altar of stones for me, do not build it with dressed stones, for you will defile it if you use a tool on it. '
  '26':
  - type: text
    content: And do not go up to my altar on steps, or your private parts may be exposed.’
  '3':
  - type: text
    content: “You shall have no other gods before
  - type: note
    content: Or besides
  - type: text
    content: ' me.'
  '4':
  - type: text
    content: '“You shall not make for yourself an image in the form of anything in heaven above or on the earth beneath or in the waters below. '
  '5':
  - type: text
    content: 'You shall not bow down to them or worship them; for I, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, am a jealous God, punishing the children for the sin of the parents to the third and fourth generation of those who hate me, '
  '6':
  - type: text
    content: but showing love to a thousand generations of those who love me and keep my commandments.
  '7':
  - type: text
    content: '“You shall not misuse the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, for the '
  - type: text
    content: Lord
  - type: text
    content: ' will not hold anyone guiltless who misuses his name.'
  '8':
  - type: text
    content: '“Remember the Sabbath day by keeping it holy. '
  '9':
  - type: text
    content: 'Six days you shall labor and do all your work, '
