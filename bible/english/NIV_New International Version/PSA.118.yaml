  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' I cut them down.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They swarmed around me like bees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they were consumed as quickly as burning thorns;
- type: usfm
  marker: q2
  children:
  - type: text
