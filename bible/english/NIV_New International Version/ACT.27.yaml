document_id: ACT.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Sails for Rome
  - type: text
    content: 'When it was decided that we would sail for Italy, Paul and some other prisoners were handed over to a centurion named Julius, who belonged to the Imperial Regiment. '
  '10':
  - type: text
    content: '“Men, I can see that our voyage is going to be disastrous and bring great loss to ship and cargo, and to our own lives also.” '
  '11':
  - type: text
    content: 'But the centurion, instead of listening to what Paul said, followed the advice of the pilot and of the owner of the ship. '
  '12':
  - type: text
    content: Since the harbor was unsuitable to winter in, the majority decided that we should sail on, hoping to reach Phoenix and winter there. This was a harbor in Crete, facing both southwest and northwest.
  - type: heading
    content: The Storm
  '13':
  - type: text
    content: 'When a gentle south wind began to blow, they saw their opportunity; so they weighed anchor and sailed along the shore of Crete. '
  '14':
  - type: text
    content: 'Before very long, a wind of hurricane force, called the Northeaster, swept down from the island. '
  '15':
  - type: text
    content: 'The ship was caught by the storm and could not head into the wind; so we gave way to it and were driven along. '
  '16':
  - type: text
    content: 'As we passed to the lee of a small island called Cauda, we were hardly able to make the lifeboat secure, '
  '17':
  - type: text
    content: so the men hoisted it aboard. Then they passed ropes under the ship itself to hold it together. Because they were afraid they would run aground on the sandbars of Syrtis, they lowered the sea anchor
  - type: note
    content: Or the sails
  - type: text
    content: ' and let the ship be driven along. '
  '18':
  - type: text
    content: 'We took such a violent battering from the storm that the next day they began to throw the cargo overboard. '
  '19':
  - type: text
    content: 'On the third day, they threw the ship’s tackle overboard with their own hands. '
  '2':
  - type: text
    content: We boarded a ship from Adramyttium about to sail for ports along the coast of the province of Asia, and we put out to sea. Aristarchus, a Macedonian from Thessalonica, was with us.
  '20':
  - type: text
    content: When neither sun nor stars appeared for many days and the storm continued raging, we finally gave up all hope of being saved.
  '21':
  - type: text
    content: 'After they had gone a long time without food, Paul stood up before them and said: “Men, you should have taken my advice not to sail from Crete; then you would have spared yourselves this damage and loss. '
  '22':
  - type: text
    content: 'But now I urge you to keep up your courage, because not one of you will be lost; only the ship will be destroyed. '
  '23':
  - type: text
    content: 'Last night an angel of the God to whom I belong and whom I serve stood beside me '
  '24':
  - type: text
    content: 'and said, ‘Do not be afraid, Paul. You must stand trial before Caesar; and God has graciously given you the lives of all who sail with you.’ '
  '25':
  - type: text
    content: 'So keep up your courage, men, for I have faith in God that it will happen just as he told me. '
  '26':
  - type: text
    content: Nevertheless, we must run aground on some island.”
  - type: heading
    content: The Shipwreck
  '27':
  - type: text
    content: On the fourteenth night we were still being driven across the Adriatic
  - type: note
    content: In ancient times the name referred to an area extending well south of Italy.
  - type: text
    content: ' Sea, when about midnight the sailors sensed they were approaching land. '
  '28':
  - type: text
    content: They took soundings and found that the water was a hundred and twenty feet
  - type: note
    content: Or about 37 meters
  - type: text
    content: ' deep. A short time later they took soundings again and found it was ninety feet'
  - type: note
    content: Or about 27 meters
  - type: text
    content: ' deep. '
  '29':
  - type: text
    content: 'Fearing that we would be dashed against the rocks, they dropped four anchors from the stern and prayed for daylight. '
  '3':
  - type: text
    content: 'The next day we landed at Sidon; and Julius, in kindness to Paul, allowed him to go to his friends so they might provide for his needs. '
  '30':
  - type: text
    content: 'In an attempt to escape from the ship, the sailors let the lifeboat down into the sea, pretending they were going to lower some anchors from the bow. '
  '31':
  - type: text
    content: 'Then Paul said to the centurion and the soldiers, “Unless these men stay with the ship, you cannot be saved.” '
  '32':
  - type: text
    content: So the soldiers cut the ropes that held the lifeboat and let it drift away.
  '33':
  - type: text
    content: 'Just before dawn Paul urged them all to eat. “For the last fourteen days,” he said, “you have been in constant suspense and have gone without food—you haven’t eaten anything. '
  '34':
  - type: text
    content: 'Now I urge you to take some food. You need it to survive. Not one of you will lose a single hair from his head.” '
  '35':
  - type: text
    content: 'After he said this, he took some bread and gave thanks to God in front of them all. Then he broke it and began to eat. '
  '36':
  - type: text
    content: 'They were all encouraged and ate some food themselves. '
  '37':
  - type: text
    content: 'Altogether there were 276 of us on board. '
  '38':
  - type: text
    content: When they had eaten as much as they wanted, they lightened the ship by throwing the grain into the sea.
  '39':
  - type: text
    content: 'When daylight came, they did not recognize the land, but they saw a bay with a sandy beach, where they decided to run the ship aground if they could. '
  '4':
  - type: text
    content: 'From there we put out to sea again and passed to the lee of Cyprus because the winds were against us. '
  '40':
  - type: text
    content: 'Cutting loose the anchors, they left them in the sea and at the same time untied the ropes that held the rudders. Then they hoisted the foresail to the wind and made for the beach. '
  '41':
  - type: text
    content: But the ship struck a sandbar and ran aground. The bow stuck fast and would not move, and the stern was broken to pieces by the pounding of the surf.
  '42':
  - type: text
    content: 'The soldiers planned to kill the prisoners to prevent any of them from swimming away and escaping. '
  '43':
  - type: text
    content: 'But the centurion wanted to spare Paul’s life and kept them from carrying out their plan. He ordered those who could swim to jump overboard first and get to land. '
  '44':
  - type: text
    content: The rest were to get there on planks or on other pieces of the ship. In this way everyone reached land safely.
  '5':
  - type: text
    content: 'When we had sailed across the open sea off the coast of Cilicia and Pamphylia, we landed at Myra in Lycia. '
  '6':
  - type: text
    content: 'There the centurion found an Alexandrian ship sailing for Italy and put us on board. '
  '7':
  - type: text
    content: 'We made slow headway for many days and had difficulty arriving off Cnidus. When the wind did not allow us to hold our course, we sailed to the lee of Crete, opposite Salmone. '
  '8':
  - type: text
    content: We moved along the coast with difficulty and came to a place called Fair Havens, near the town of Lasea.
  '9':
  - type: text
    content: Much time had been lost, and sailing had already become dangerous because by now it was after the Day of Atonement.
  - type: note
    content: That is, Yom Kippur
  - type: text
    content: ' So Paul warned them, '
