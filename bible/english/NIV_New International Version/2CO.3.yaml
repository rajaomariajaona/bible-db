document_id: 2CO.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Are we beginning to commend ourselves again? Or do we need, like some people, letters of recommendation to you or from you? '
  '10':
  - type: text
    content: 'For what was glorious has no glory now in comparison with the surpassing glory. '
  '11':
  - type: text
    content: And if what was transitory came with glory, how much greater is the glory of that which lasts!
  '12':
  - type: text
    content: 'Therefore, since we have such a hope, we are very bold. '
  '13':
  - type: text
    content: 'We are not like Moses, who would put a veil over his face to prevent the Israelites from seeing the end of what was passing away. '
  '14':
  - type: text
    content: 'But their minds were made dull, for to this day the same veil remains when the old covenant is read. It has not been removed, because only in Christ is it taken away. '
  '15':
  - type: text
    content: 'Even to this day when Moses is read, a veil covers their hearts. '
  '16':
  - type: text
    content: 'But whenever anyone turns to the Lord, the veil is taken away. '
  '17':
  - type: text
    content: 'Now the Lord is the Spirit, and where the Spirit of the Lord is, there is freedom. '
  '18':
  - type: text
    content: And we all, who with unveiled faces contemplate
  - type: note
    content: Or reflect
  - type: text
    content: ' the Lord’s glory, are being transformed into his image with ever-increasing glory, which comes from the Lord, who is the Spirit.'
  '2':
  - type: text
    content: 'You yourselves are our letter, written on our hearts, known and read by everyone. '
  '3':
  - type: text
    content: You show that you are a letter from Christ, the result of our ministry, written not with ink but with the Spirit of the living God, not on tablets of stone but on tablets of human hearts.
  '4':
  - type: text
    content: 'Such confidence we have through Christ before God. '
  '5':
  - type: text
    content: 'Not that we are competent in ourselves to claim anything for ourselves, but our competence comes from God. '
  '6':
  - type: text
    content: He has made us competent as ministers of a new covenant—not of the letter but of the Spirit; for the letter kills, but the Spirit gives life.
  - type: heading
    content: The Greater Glory of the New Covenant
  '7':
  - type: text
    content: 'Now if the ministry that brought death, which was engraved in letters on stone, came with glory, so that the Israelites could not look steadily at the face of Moses because of its glory, transitory though it was, '
  '8':
  - type: text
    content: 'will not the ministry of the Spirit be even more glorious? '
  '9':
  - type: text
    content: 'If the ministry that brought condemnation was glorious, how much more glorious is the ministry that brings righteousness! '
