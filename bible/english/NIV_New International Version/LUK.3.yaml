document_id: LUK.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John the Baptist Prepares the Way
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the fifteenth year of the reign of Tiberius Caesar—when Pontius Pilate was governor of Judea, Herod tetrarch of Galilee, his brother Philip tetrarch of Iturea and Traconitis, and Lysanias tetrarch of Abilene— '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What should we do then?” the crowd asked.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: John answered, “Anyone who has two shirts should share with the one who has none, and anyone who has food should do the same.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even tax collectors came to be baptized. “Teacher,” they asked, “what should we do?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Don’t collect any more than you are required to,” he told them.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then some soldiers asked him, “And what should we do?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He replied, “Don’t extort money and don’t accuse people falsely—be content with your pay.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people were waiting expectantly and were all wondering in their hearts if John might possibly be the Messiah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: John answered them all, “I baptize you with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' water. But one who is more powerful than I will come, the straps of whose sandals I am not worthy to untie. He will baptize you with'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' the Holy Spirit and fire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His winnowing fork is in his hand to clear his threshing floor and to gather the wheat into his barn, but he will burn up the chaff with unquenchable fire.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And with many other words John exhorted the people and proclaimed the good news to them.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when John rebuked Herod the tetrarch because of his marriage to Herodias, his brother’s wife, and all the other evil things he had done, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'during the high-priesthood of Annas and Caiaphas, the word of God came to John son of Zechariah in the wilderness. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Herod added this to them all: He locked John up in prison.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Baptism and Genealogy of Jesus
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the people were being baptized, Jesus was baptized too. And as he was praying, heaven was opened '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the Holy Spirit descended on him in bodily form like a dove. And a voice came from heaven: “You are my Son, whom I love; with you I am well pleased.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Jesus himself was about thirty years old when he began his ministry. He was the son, so it was thought, of Joseph,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'the son of Heli, '
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Matthat,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Levi, the son of Melki,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Jannai, the son of Joseph,
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Mattathias, the son of Amos,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Nahum, the son of Esli,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'the son of Naggai, '
  '26':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Maath,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Mattathias, the son of Semein,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Josek, the son of Joda,
  '27':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Joanan, the son of Rhesa,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Zerubbabel, the son of Shealtiel,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'the son of Neri, '
  '28':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Melki,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Addi, the son of Cosam,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Elmadam, the son of Er,
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Joshua, the son of Eliezer,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Jorim, the son of Matthat,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'the son of Levi, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He went into all the country around the Jordan, preaching a baptism of repentance for the forgiveness of sins. '
  '30':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Simeon,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Judah, the son of Joseph,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Jonam, the son of Eliakim,
  '31':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Melea, the son of Menna,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Mattatha, the son of Nathan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'the son of David, '
  '32':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Jesse,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Obed, the son of Boaz,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Salmon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some early manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sala
      marker-yv: yv-n
    - type: text
      text: ' the son of Nahshon,'
  '33':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Amminadab, the son of Ram,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Amminadab, the son of Admin, the son of Arni
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; other manuscripts vary widely.
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Hezron, the son of Perez,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'the son of Judah, '
  '34':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Jacob,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Isaac, the son of Abraham,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Terah, the son of Nahor,
  '35':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Serug, the son of Reu,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Peleg, the son of Eber,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'the son of Shelah, '
  '36':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Cainan,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Arphaxad, the son of Shem,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Noah, the son of Lamech,
  '37':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Methuselah, the son of Enoch,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Jared, the son of Mahalalel,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'the son of Kenan, '
  '38':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Enosh,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of Seth, the son of Adam,
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the son of God.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is written in the book of the words of Isaiah the prophet:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A voice of one calling in the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Prepare the way for the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make straight paths for him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every valley shall be filled in,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every mountain and hill made low.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The crooked roads shall become straight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rough ways smooth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all people will see God’s salvation.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 40:3-5
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'John said to the crowds coming out to be baptized by him, “You brood of vipers! Who warned you to flee from the coming wrath? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Produce fruit in keeping with repentance. And do not begin to say to yourselves, ‘We have Abraham as our father.’ For I tell you that out of these stones God can raise up children for Abraham. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The ax is already at the root of the trees, and every tree that does not produce good fruit will be cut down and thrown into the fire.”
