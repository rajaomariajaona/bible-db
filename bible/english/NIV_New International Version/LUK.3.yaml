document_id: LUK.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: 'In the fifteenth year of the reign of Tiberius Caesar—when Pontius Pilate was governor of Judea, Herod tetrarch of Galilee, his brother Philip tetrarch of Iturea and Traconitis, and Lysanias tetrarch of Abilene— '
  '10':
  - type: text
    content: “What should we do then?” the crowd asked.
  '11':
  - type: text
    content: John answered, “Anyone who has two shirts should share with the one who has none, and anyone who has food should do the same.”
  '12':
  - type: text
    content: Even tax collectors came to be baptized. “Teacher,” they asked, “what should we do?”
  '13':
  - type: text
    content: “Don’t collect any more than you are required to,” he told them.
  '14':
  - type: text
    content: Then some soldiers asked him, “And what should we do?”
  - type: text
    content: He replied, “Don’t extort money and don’t accuse people falsely—be content with your pay.”
  '15':
  - type: text
    content: 'The people were waiting expectantly and were all wondering in their hearts if John might possibly be the Messiah. '
  '16':
  - type: text
    content: John answered them all, “I baptize you with
  - type: note
    content: Or in
  - type: text
    content: ' water. But one who is more powerful than I will come, the straps of whose sandals I am not worthy to untie. He will baptize you with'
  - type: note
    content: Or in
  - type: text
    content: ' the Holy Spirit and fire. '
  '17':
  - type: text
    content: 'His winnowing fork is in his hand to clear his threshing floor and to gather the wheat into his barn, but he will burn up the chaff with unquenchable fire.” '
  '18':
  - type: text
    content: And with many other words John exhorted the people and proclaimed the good news to them.
  '19':
  - type: text
    content: 'But when John rebuked Herod the tetrarch because of his marriage to Herodias, his brother’s wife, and all the other evil things he had done, '
  '2':
  - type: text
    content: 'during the high-priesthood of Annas and Caiaphas, the word of God came to John son of Zechariah in the wilderness. '
  '20':
  - type: text
    content: 'Herod added this to them all: He locked John up in prison.'
  - type: heading
    content: The Baptism and Genealogy of Jesus
  '21':
  - type: text
    content: 'When all the people were being baptized, Jesus was baptized too. And as he was praying, heaven was opened '
  '22':
  - type: text
    content: 'and the Holy Spirit descended on him in bodily form like a dove. And a voice came from heaven: “You are my Son, whom I love; with you I am well pleased.”'
  '23':
  - type: text
    content: Now Jesus himself was about thirty years old when he began his ministry. He was the son, so it was thought, of Joseph,
  - type: text
    content: 'the son of Heli, '
  '24':
  - type: text
    content: the son of Matthat,
  - type: text
    content: the son of Levi, the son of Melki,
  - type: text
    content: the son of Jannai, the son of Joseph,
  '25':
  - type: text
    content: the son of Mattathias, the son of Amos,
  - type: text
    content: the son of Nahum, the son of Esli,
  - type: text
    content: 'the son of Naggai, '
  '26':
  - type: text
    content: the son of Maath,
  - type: text
    content: the son of Mattathias, the son of Semein,
  - type: text
    content: the son of Josek, the son of Joda,
  '27':
  - type: text
    content: the son of Joanan, the son of Rhesa,
  - type: text
    content: the son of Zerubbabel, the son of Shealtiel,
  - type: text
    content: 'the son of Neri, '
  '28':
  - type: text
    content: the son of Melki,
  - type: text
    content: the son of Addi, the son of Cosam,
  - type: text
    content: the son of Elmadam, the son of Er,
  '29':
  - type: text
    content: the son of Joshua, the son of Eliezer,
  - type: text
    content: the son of Jorim, the son of Matthat,
  - type: text
    content: 'the son of Levi, '
  '3':
  - type: text
    content: 'He went into all the country around the Jordan, preaching a baptism of repentance for the forgiveness of sins. '
  '30':
  - type: text
    content: the son of Simeon,
  - type: text
    content: the son of Judah, the son of Joseph,
  - type: text
    content: the son of Jonam, the son of Eliakim,
  '31':
  - type: text
    content: the son of Melea, the son of Menna,
  - type: text
    content: the son of Mattatha, the son of Nathan,
  - type: text
    content: 'the son of David, '
  '32':
  - type: text
    content: the son of Jesse,
  - type: text
    content: the son of Obed, the son of Boaz,
  - type: text
    content: the son of Salmon,
  - type: note
    content: Some early manuscripts Sala
  - type: text
    content: ' the son of Nahshon,'
  '33':
  - type: text
    content: the son of Amminadab, the son of Ram,
  - type: note
    content: Some manuscripts Amminadab, the son of Admin, the son of Arni; other manuscripts vary widely.
  - type: text
    content: the son of Hezron, the son of Perez,
  - type: text
    content: 'the son of Judah, '
  '34':
  - type: text
    content: the son of Jacob,
  - type: text
    content: the son of Isaac, the son of Abraham,
  - type: text
    content: the son of Terah, the son of Nahor,
  '35':
  - type: text
    content: the son of Serug, the son of Reu,
  - type: text
    content: the son of Peleg, the son of Eber,
  - type: text
    content: 'the son of Shelah, '
  '36':
  - type: text
    content: the son of Cainan,
  - type: text
    content: the son of Arphaxad, the son of Shem,
  - type: text
    content: the son of Noah, the son of Lamech,
  '37':
  - type: text
    content: the son of Methuselah, the son of Enoch,
  - type: text
    content: the son of Jared, the son of Mahalalel,
  - type: text
    content: 'the son of Kenan, '
  '38':
  - type: text
    content: the son of Enosh,
  - type: text
    content: the son of Seth, the son of Adam,
  - type: text
    content: the son of God.
  '4':
  - type: text
    content: 'As it is written in the book of the words of Isaiah the prophet:'
  - type: text
    content: “A voice of one calling in the wilderness,
  - type: text
    content: ‘Prepare the way for the Lord,
  - type: text
    content: make straight paths for him.
  '5':
  - type: text
    content: Every valley shall be filled in,
  - type: text
    content: every mountain and hill made low.
  - type: text
    content: The crooked roads shall become straight,
  - type: text
    content: the rough ways smooth.
  '6':
  - type: text
    content: And all people will see God’s salvation.’ ”
  - type: note
    content: Isaiah 40:3-5
  '7':
  - type: text
    content: 'John said to the crowds coming out to be baptized by him, “You brood of vipers! Who warned you to flee from the coming wrath? '
  '8':
  - type: text
    content: 'Produce fruit in keeping with repentance. And do not begin to say to yourselves, ‘We have Abraham as our father.’ For I tell you that out of these stones God can raise up children for Abraham. '
  '9':
  - type: text
    content: The ax is already at the root of the trees, and every tree that does not produce good fruit will be cut down and thrown into the fire.”
