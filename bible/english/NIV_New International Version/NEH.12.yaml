document_id: NEH.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Priests and Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the priests and Levites who returned with Zerubbabel son of Shealtiel and with Joshua:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Seraiah, Jeremiah, Ezra,
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua was the father of Joiakim, Joiakim the father of Eliashib, Eliashib the father of Joiada, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joiada the father of Jonathan, and Jonathan the father of Jaddua.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the days of Joiakim, these were the heads of the priestly families:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Seraiah’s family, Meraiah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Jeremiah’s, Hananiah;
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Ezra’s, Meshullam;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Amariah’s, Jehohanan;
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Malluk’s, Jonathan;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Shekaniah’s,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Very many Hebrew manuscripts, some Septuagint manuscripts and Syriac (see also verse 3); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shebaniah’s
      marker-yv: yv-n
    - type: text
      text: ' Joseph;'
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Harim’s, Adna;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Meremoth’s,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also verse 3); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Meraioth’s
      marker-yv: yv-n
    - type: text
      text: ' Helkai;'
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Iddo’s, Zechariah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Ginnethon’s, Meshullam;
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Abijah’s, Zikri;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Miniamin’s and of Moadiah’s, Piltai;
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Bilgah’s, Shammua;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Shemaiah’s, Jehonathan;
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Joiarib’s, Mattenai;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Jedaiah’s, Uzzi;
  '2':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Amariah, Malluk, Hattush,
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Sallu’s, Kallai;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Amok’s, Eber;
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Hilkiah’s, Hashabiah;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: of Jedaiah’s, Nethanel.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The family heads of the Levites in the days of Eliashib, Joiada, Johanan and Jaddua, as well as those of the priests, were recorded in the reign of Darius the Persian. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The family heads among the descendants of Levi up to the time of Johanan son of Eliashib were recorded in the book of the annals. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the leaders of the Levites were Hashabiah, Sherebiah, Jeshua son of Kadmiel, and their associates, who stood opposite them to give praise and thanksgiving, one section responding to the other, as prescribed by David the man of God.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mattaniah, Bakbukiah, Obadiah, Meshullam, Talmon and Akkub were gatekeepers who guarded the storerooms at the gates. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They served in the days of Joiakim son of Joshua, the son of Jozadak, and in the days of Nehemiah the governor and of Ezra the priest, the teacher of the Law.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dedication of the Wall of Jerusalem
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the dedication of the wall of Jerusalem, the Levites were sought out from where they lived and were brought to Jerusalem to celebrate joyfully the dedication with songs of thanksgiving and with the music of cymbals, harps and lyres. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The musicians also were brought together from the region around Jerusalem—from the villages of the Netophathites, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from Beth Gilgal, and from the area of Geba and Azmaveth, for the musicians had built villages for themselves around Jerusalem. '
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shekaniah, Rehum, Meremoth,
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the priests and Levites had purified themselves ceremonially, they purified the people, the gates and the wall.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I had the leaders of Judah go up on top of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: go alongside
      marker-yv: yv-n
    - type: text
      text: ' the wall. I also assigned two large choirs to give thanks. One was to proceed on top of'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: proceed alongside
      marker-yv: yv-n
    - type: text
      text: ' the wall to the right, toward the Dung Gate. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoshaiah and half the leaders of Judah followed them, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'along with Azariah, Ezra, Meshullam, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judah, Benjamin, Shemaiah, Jeremiah, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as well as some priests with trumpets, and also Zechariah son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Micaiah, the son of Zakkur, the son of Asaph, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and his associates—Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah and Hanani—with musical instruments prescribed by David the man of God. Ezra the teacher of the Law led the procession. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At the Fountain Gate they continued directly up the steps of the City of David on the ascent to the wall and passed above the site of David’s palace to the Water Gate on the east.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The second choir proceeded in the opposite direction. I followed them on top of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: them alongside
      marker-yv: yv-n
    - type: text
      text: ' the wall, together with half the people—past the Tower of the Ovens to the Broad Wall, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: over the Gate of Ephraim, the Jeshanah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Old
      marker-yv: yv-n
    - type: text
      text: ' Gate, the Fish Gate, the Tower of Hananel and the Tower of the Hundred, as far as the Sheep Gate. At the Gate of the Guard they stopped.'
  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Iddo, Ginnethon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts and Vulgate (see also verse 16); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ginnethoi
      marker-yv: yv-n
    - type: text
      text: ' Abijah,'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two choirs that gave thanks then took their places in the house of God; so did I, together with half the officials, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as well as the priests—Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah and Hananiah with their trumpets— '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and also Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malkijah, Elam and Ezer. The choirs sang under the direction of Jezrahiah. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And on that day they offered great sacrifices, rejoicing because God had given them great joy. The women and children also rejoiced. The sound of rejoicing in Jerusalem could be heard far away.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time men were appointed to be in charge of the storerooms for the contributions, firstfruits and tithes. From the fields around the towns they were to bring into the storerooms the portions required by the Law for the priests and the Levites, for Judah was pleased with the ministering priests and Levites. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They performed the service of their God and the service of purification, as did also the musicians and gatekeepers, according to the commands of David and his son Solomon. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For long ago, in the days of David and Asaph, there had been directors for the musicians and for the songs of praise and thanksgiving to God. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So in the days of Zerubbabel and of Nehemiah, all Israel contributed the daily portions for the musicians and the gatekeepers. They also set aside the portion for the other Levites, and the Levites set aside the portion for the descendants of Aaron.
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Mijamin,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A variant of '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Miniamin
      marker-yv: yv-n
    - type: text
      text: ' Moadiah, Bilgah,'
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shemaiah, Joiarib, Jedaiah,
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Sallu, Amok, Hilkiah and Jedaiah.
  - type: usfm
    marker: m
    children:
    - type: text
      text: These were the leaders of the priests and their associates in the days of Joshua.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Levites were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and also Mattaniah, who, together with his associates, was in charge of the songs of thanksgiving. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Bakbukiah and Unni, their associates, stood opposite them in the services.
