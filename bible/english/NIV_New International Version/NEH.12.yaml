document_id: NEH.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Priests and Levites
  - type: text
    content: 'These were the priests and Levites who returned with Zerubbabel son of Shealtiel and with Joshua:'
  - type: text
    content: Seraiah, Jeremiah, Ezra,
  '10':
  - type: text
    content: 'Joshua was the father of Joiakim, Joiakim the father of Eliashib, Eliashib the father of Joiada, '
  '11':
  - type: text
    content: Joiada the father of Jonathan, and Jonathan the father of Jaddua.
  '12':
  - type: text
    content: 'In the days of Joiakim, these were the heads of the priestly families:'
  - type: text
    content: of Seraiah’s family, Meraiah;
  - type: text
    content: of Jeremiah’s, Hananiah;
  '13':
  - type: text
    content: of Ezra’s, Meshullam;
  - type: text
    content: of Amariah’s, Jehohanan;
  '14':
  - type: text
    content: of Malluk’s, Jonathan;
  - type: text
    content: of Shekaniah’s,
  - type: note
    content: Very many Hebrew manuscripts, some Septuagint manuscripts and Syriac (see also verse 3); most Hebrew manuscripts Shebaniah’s
  - type: text
    content: ' Joseph;'
  '15':
  - type: text
    content: of Harim’s, Adna;
  - type: text
    content: of Meremoth’s,
  - type: note
    content: Some Septuagint manuscripts (see also verse 3); Hebrew Meraioth’s
  - type: text
    content: ' Helkai;'
  '16':
  - type: text
    content: of Iddo’s, Zechariah;
  - type: text
    content: of Ginnethon’s, Meshullam;
  '17':
  - type: text
    content: of Abijah’s, Zikri;
  - type: text
    content: of Miniamin’s and of Moadiah’s, Piltai;
  '18':
  - type: text
    content: of Bilgah’s, Shammua;
  - type: text
    content: of Shemaiah’s, Jehonathan;
  '19':
  - type: text
    content: of Joiarib’s, Mattenai;
  - type: text
    content: of Jedaiah’s, Uzzi;
  '2':
  - type: text
    content: Amariah, Malluk, Hattush,
  '20':
  - type: text
    content: of Sallu’s, Kallai;
  - type: text
    content: of Amok’s, Eber;
  '21':
  - type: text
    content: of Hilkiah’s, Hashabiah;
  - type: text
    content: of Jedaiah’s, Nethanel.
  '22':
  - type: text
    content: 'The family heads of the Levites in the days of Eliashib, Joiada, Johanan and Jaddua, as well as those of the priests, were recorded in the reign of Darius the Persian. '
  '23':
  - type: text
    content: 'The family heads among the descendants of Levi up to the time of Johanan son of Eliashib were recorded in the book of the annals. '
  '24':
  - type: text
    content: And the leaders of the Levites were Hashabiah, Sherebiah, Jeshua son of Kadmiel, and their associates, who stood opposite them to give praise and thanksgiving, one section responding to the other, as prescribed by David the man of God.
  '25':
  - type: text
    content: 'Mattaniah, Bakbukiah, Obadiah, Meshullam, Talmon and Akkub were gatekeepers who guarded the storerooms at the gates. '
  '26':
  - type: text
    content: They served in the days of Joiakim son of Joshua, the son of Jozadak, and in the days of Nehemiah the governor and of Ezra the priest, the teacher of the Law.
  - type: heading
    content: Dedication of the Wall of Jerusalem
  '27':
  - type: text
    content: 'At the dedication of the wall of Jerusalem, the Levites were sought out from where they lived and were brought to Jerusalem to celebrate joyfully the dedication with songs of thanksgiving and with the music of cymbals, harps and lyres. '
  '28':
  - type: text
    content: 'The musicians also were brought together from the region around Jerusalem—from the villages of the Netophathites, '
  '29':
  - type: text
    content: 'from Beth Gilgal, and from the area of Geba and Azmaveth, for the musicians had built villages for themselves around Jerusalem. '
  '3':
  - type: text
    content: Shekaniah, Rehum, Meremoth,
  '30':
  - type: text
    content: When the priests and Levites had purified themselves ceremonially, they purified the people, the gates and the wall.
  '31':
  - type: text
    content: I had the leaders of Judah go up on top of
  - type: note
    content: Or go alongside
  - type: text
    content: ' the wall. I also assigned two large choirs to give thanks. One was to proceed on top of'
  - type: note
    content: Or proceed alongside
  - type: text
    content: ' the wall to the right, toward the Dung Gate. '
  '32':
  - type: text
    content: 'Hoshaiah and half the leaders of Judah followed them, '
  '33':
  - type: text
    content: 'along with Azariah, Ezra, Meshullam, '
  '34':
  - type: text
    content: 'Judah, Benjamin, Shemaiah, Jeremiah, '
  '35':
  - type: text
    content: 'as well as some priests with trumpets, and also Zechariah son of Jonathan, the son of Shemaiah, the son of Mattaniah, the son of Micaiah, the son of Zakkur, the son of Asaph, '
  '36':
  - type: text
    content: 'and his associates—Shemaiah, Azarel, Milalai, Gilalai, Maai, Nethanel, Judah and Hanani—with musical instruments prescribed by David the man of God. Ezra the teacher of the Law led the procession. '
  '37':
  - type: text
    content: At the Fountain Gate they continued directly up the steps of the City of David on the ascent to the wall and passed above the site of David’s palace to the Water Gate on the east.
  '38':
  - type: text
    content: The second choir proceeded in the opposite direction. I followed them on top of
  - type: note
    content: Or them alongside
  - type: text
    content: ' the wall, together with half the people—past the Tower of the Ovens to the Broad Wall, '
  '39':
  - type: text
    content: over the Gate of Ephraim, the Jeshanah
  - type: note
    content: Or Old
  - type: text
    content: ' Gate, the Fish Gate, the Tower of Hananel and the Tower of the Hundred, as far as the Sheep Gate. At the Gate of the Guard they stopped.'
  '4':
  - type: text
    content: Iddo, Ginnethon,
  - type: note
    content: Many Hebrew manuscripts and Vulgate (see also verse 16); most Hebrew manuscripts Ginnethoi
  - type: text
    content: ' Abijah,'
  '40':
  - type: text
    content: 'The two choirs that gave thanks then took their places in the house of God; so did I, together with half the officials, '
  '41':
  - type: text
    content: 'as well as the priests—Eliakim, Maaseiah, Miniamin, Micaiah, Elioenai, Zechariah and Hananiah with their trumpets— '
  '42':
  - type: text
    content: 'and also Maaseiah, Shemaiah, Eleazar, Uzzi, Jehohanan, Malkijah, Elam and Ezer. The choirs sang under the direction of Jezrahiah. '
  '43':
  - type: text
    content: And on that day they offered great sacrifices, rejoicing because God had given them great joy. The women and children also rejoiced. The sound of rejoicing in Jerusalem could be heard far away.
  '44':
  - type: text
    content: 'At that time men were appointed to be in charge of the storerooms for the contributions, firstfruits and tithes. From the fields around the towns they were to bring into the storerooms the portions required by the Law for the priests and the Levites, for Judah was pleased with the ministering priests and Levites. '
  '45':
  - type: text
    content: 'They performed the service of their God and the service of purification, as did also the musicians and gatekeepers, according to the commands of David and his son Solomon. '
  '46':
  - type: text
    content: 'For long ago, in the days of David and Asaph, there had been directors for the musicians and for the songs of praise and thanksgiving to God. '
  '47':
  - type: text
    content: So in the days of Zerubbabel and of Nehemiah, all Israel contributed the daily portions for the musicians and the gatekeepers. They also set aside the portion for the other Levites, and the Levites set aside the portion for the descendants of Aaron.
  '5':
  - type: text
    content: Mijamin,
  - type: note
    content: A variant of Miniamin
  - type: text
    content: ' Moadiah, Bilgah,'
  '6':
  - type: text
    content: Shemaiah, Joiarib, Jedaiah,
  '7':
  - type: text
    content: Sallu, Amok, Hilkiah and Jedaiah.
  - type: text
    content: These were the leaders of the priests and their associates in the days of Joshua.
  '8':
  - type: text
    content: 'The Levites were Jeshua, Binnui, Kadmiel, Sherebiah, Judah, and also Mattaniah, who, together with his associates, was in charge of the songs of thanksgiving. '
  '9':
  - type: text
    content: Bakbukiah and Unni, their associates, stood opposite them in the services.
