document_id: DAN.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Vision of a Ram and a Goat
  - type: text
    content: 'In the third year of King Belshazzar’s reign, I, Daniel, had a vision, after the one that had already appeared to me. '
  '10':
  - type: text
    content: 'It grew until it reached the host of the heavens, and it threw some of the starry host down to the earth and trampled on them. '
  '11':
  - type: text
    content: 'It set itself up to be as great as the commander of the army of the '
  - type: text
    content: Lord
  - type: text
    content: '; it took away the daily sacrifice from the '
  - type: text
    content: Lord
  - type: text
    content: ', and his sanctuary was thrown down. '
  '12':
  - type: text
    content: 'Because of rebellion, the '
  - type: text
    content: Lord
  - type: text
    content: ’s people
  - type: note
    content: Or rebellion, the armies
  - type: text
    content: ' and the daily sacrifice were given over to it. It prospered in everything it did, and truth was thrown to the ground.'
  '13':
  - type: text
    content: 'Then I heard a holy one speaking, and another holy one said to him, “How long will it take for the vision to be fulfilled—the vision concerning the daily sacrifice, the rebellion that causes desolation, the surrender of the sanctuary and the trampling underfoot of the '
  - type: text
    content: Lord
  - type: text
    content: ’s people?”
  '14':
  - type: text
    content: He said to me, “It will take 2,300 evenings and mornings; then the sanctuary will be reconsecrated.”
  - type: heading
    content: The Interpretation of the Vision
  '15':
  - type: text
    content: 'While I, Daniel, was watching the vision and trying to understand it, there before me stood one who looked like a man. '
  '16':
  - type: text
    content: And I heard a man’s voice from the Ulai calling, “Gabriel, tell this man the meaning of the vision.”
  '17':
  - type: text
    content: As he came near the place where I was standing, I was terrified and fell prostrate. “Son of man,”
  - type: note
    content: The Hebrew phrase ben adam means human being. The phrase son of man is retained as a form of address here because of its possible association with “Son of Man” in the New Testament.
  - type: text
    content: ' he said to me, “understand that the vision concerns the time of the end.”'
  '18':
  - type: text
    content: While he was speaking to me, I was in a deep sleep, with my face to the ground. Then he touched me and raised me to my feet.
  '19':
  - type: text
    content: 'He said: “I am going to tell you what will happen later in the time of wrath, because the vision concerns the appointed time of the end.'
  - type: note
    content: Or because the end will be at the appointed time
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'In my vision I saw myself in the citadel of Susa in the province of Elam; in the vision I was beside the Ulai Canal. '
  '20':
  - type: text
    content: 'The two-horned ram that you saw represents the kings of Media and Persia. '
  '21':
  - type: text
    content: 'The shaggy goat is the king of Greece, and the large horn between its eyes is the first king. '
  '22':
  - type: text
    content: The four horns that replaced the one that was broken off represent four kingdoms that will emerge from his nation but will not have the same power.
  '23':
  - type: text
    content: '“In the latter part of their reign, when rebels have become completely wicked, a fierce-looking king, a master of intrigue, will arise. '
  '24':
  - type: text
    content: 'He will become very strong, but not by his own power. He will cause astounding devastation and will succeed in whatever he does. He will destroy those who are mighty, the holy people. '
  '25':
  - type: text
    content: He will cause deceit to prosper, and he will consider himself superior. When they feel secure, he will destroy many and take his stand against the Prince of princes. Yet he will be destroyed, but not by human power.
  '26':
  - type: text
    content: “The vision of the evenings and mornings that has been given you is true, but seal up the vision, for it concerns the distant future.”
  '27':
  - type: text
    content: I, Daniel, was worn out. I lay exhausted for several days. Then I got up and went about the king’s business. I was appalled by the vision; it was beyond understanding.
  '3':
  - type: text
    content: 'I looked up, and there before me was a ram with two horns, standing beside the canal, and the horns were long. One of the horns was longer than the other but grew up later. '
  '4':
  - type: text
    content: I watched the ram as it charged toward the west and the north and the south. No animal could stand against it, and none could rescue from its power. It did as it pleased and became great.
  '5':
  - type: text
    content: 'As I was thinking about this, suddenly a goat with a prominent horn between its eyes came from the west, crossing the whole earth without touching the ground. '
  '6':
  - type: text
    content: 'It came toward the two-horned ram I had seen standing beside the canal and charged at it in great rage. '
  '7':
  - type: text
    content: 'I saw it attack the ram furiously, striking the ram and shattering its two horns. The ram was powerless to stand against it; the goat knocked it to the ground and trampled on it, and none could rescue the ram from its power. '
  '8':
  - type: text
    content: The goat became very great, but at the height of its power the large horn was broken off, and in its place four prominent horns grew up toward the four winds of heaven.
  '9':
  - type: text
    content: 'Out of one of them came another horn, which started small but grew in power to the south and to the east and toward the Beautiful Land. '
