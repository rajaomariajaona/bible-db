document_id: JER.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Drought, Famine, Sword
  - type: text
    content: 'This is the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Jeremiah concerning the drought:'
  '10':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about this people:'
  - type: text
    content: “They greatly love to wander;
  - type: text
    content: they do not restrain their feet.
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' does not accept them;'
  - type: text
    content: he will now remember their wickedness
  - type: text
    content: and punish them for their sins.”
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Do not pray for the well-being of this people. '
  '12':
  - type: text
    content: Although they fast, I will not listen to their cry; though they offer burnt offerings and grain offerings, I will not accept them. Instead, I will destroy them with the sword, famine and plague.”
  '13':
  - type: text
    content: 'But I said, “Alas, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '! The prophets keep telling them, ‘You will not see the sword or suffer famine. Indeed, I will give you lasting peace in this place.’ ”'
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “The prophets are prophesying lies in my name. I have not sent them or appointed them or spoken to them. They are prophesying to you false visions, divinations, idolatries'
  - type: note
    content: Or visions, worthless divinations
  - type: text
    content: ' and the delusions of their own minds. '
  '15':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about the prophets who are prophesying in my name: I did not send them, yet they are saying, ‘No sword or famine will touch this land.’ Those same prophets will perish by sword and famine. '
  '16':
  - type: text
    content: And the people they are prophesying to will be thrown out into the streets of Jerusalem because of the famine and sword. There will be no one to bury them, their wives, their sons and their daughters. I will pour out on them the calamity they deserve.
  '17':
  - type: text
    content: '“Speak this word to them:'
  - type: text
    content: “ ‘Let my eyes overflow with tears
  - type: text
    content: night and day without ceasing;
  - type: text
    content: for the Virgin Daughter, my people,
  - type: text
    content: has suffered a grievous wound,
  - type: text
    content: a crushing blow.
  '18':
  - type: text
    content: If I go into the country,
  - type: text
    content: I see those slain by the sword;
  - type: text
    content: if I go into the city,
  - type: text
    content: I see the ravages of famine.
  - type: text
    content: Both prophet and priest
  - type: text
    content: have gone to a land they know not.’ ”
  '19':
  - type: text
    content: Have you rejected Judah completely?
  - type: text
    content: Do you despise Zion?
  - type: text
    content: Why have you afflicted us
  - type: text
    content: so that we cannot be healed?
  - type: text
    content: We hoped for peace
  - type: text
    content: but no good has come,
  - type: text
    content: for a time of healing
  - type: text
    content: but there is only terror.
  '2':
  - type: text
    content: “Judah mourns,
  - type: text
    content: her cities languish;
  - type: text
    content: they wail for the land,
  - type: text
    content: and a cry goes up from Jerusalem.
  '20':
  - type: text
    content: 'We acknowledge our wickedness, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and the guilt of our ancestors;
  - type: text
    content: we have indeed sinned against you.
  '21':
  - type: text
    content: For the sake of your name do not despise us;
  - type: text
    content: do not dishonor your glorious throne.
  - type: text
    content: Remember your covenant with us
  - type: text
    content: and do not break it.
  '22':
  - type: text
    content: Do any of the worthless idols of the nations bring rain?
  - type: text
    content: Do the skies themselves send down showers?
  - type: text
    content: 'No, it is you, '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  - type: text
    content: Therefore our hope is in you,
  - type: text
    content: for you are the one who does all this.
  '3':
  - type: text
    content: The nobles send their servants for water;
  - type: text
    content: they go to the cisterns
  - type: text
    content: but find no water.
  - type: text
    content: They return with their jars unfilled;
  - type: text
    content: dismayed and despairing,
  - type: text
    content: they cover their heads.
  '4':
  - type: text
    content: The ground is cracked
  - type: text
    content: because there is no rain in the land;
  - type: text
    content: the farmers are dismayed
  - type: text
    content: and cover their heads.
  '5':
  - type: text
    content: Even the doe in the field
  - type: text
    content: deserts her newborn fawn
  - type: text
    content: because there is no grass.
  '6':
  - type: text
    content: Wild donkeys stand on the barren heights
  - type: text
    content: and pant like jackals;
  - type: text
    content: their eyes fail
  - type: text
    content: for lack of food.”
  '7':
  - type: text
    content: Although our sins testify against us,
  - type: text
    content: 'do something, '
  - type: text
    content: Lord
  - type: text
    content: ', for the sake of your name.'
  - type: text
    content: For we have often rebelled;
  - type: text
    content: we have sinned against you.
  '8':
  - type: text
    content: You who are the hope of Israel,
  - type: text
    content: its Savior in times of distress,
  - type: text
    content: why are you like a stranger in the land,
  - type: text
    content: like a traveler who stays only a night?
  '9':
  - type: text
    content: Why are you like a man taken by surprise,
  - type: text
    content: like a warrior powerless to save?
  - type: text
    content: 'You are among us, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and we bear your name;
  - type: text
    content: do not forsake us!
