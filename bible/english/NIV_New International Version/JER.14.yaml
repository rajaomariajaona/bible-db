document_id: JER.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Drought, Famine, Sword
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that came to Jeremiah concerning the drought:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Judah mourns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her cities languish;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they wail for the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a cry goes up from Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The nobles send their servants for water;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they go to the cisterns
- type: usfm
  marker: q2
  children:
  - type: text
    text: but find no water.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They return with their jars unfilled;
- type: usfm
  marker: q2
  children:
  - type: text
    text: dismayed and despairing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they cover their heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The ground is cracked
- type: usfm
  marker: q2
  children:
  - type: text
    text: because there is no rain in the land;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the farmers are dismayed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cover their heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Even the doe in the field
- type: usfm
  marker: q2
  children:
  - type: text
    text: deserts her newborn fawn
- type: usfm
  marker: q2
  children:
  - type: text
    text: because there is no grass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Wild donkeys stand on the barren heights
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pant like jackals;
- type: usfm
  marker: q1
  children:
  - type: text
    text: their eyes fail
- type: usfm
  marker: q2
  children:
  - type: text
    text: for lack of food.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Although our sins testify against us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'do something, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', for the sake of your name.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For we have often rebelled;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we have sinned against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You who are the hope of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its Savior in times of distress,
- type: usfm
  marker: q1
  children:
  - type: text
    text: why are you like a stranger in the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a traveler who stays only a night?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Why are you like a man taken by surprise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a warrior powerless to save?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You are among us, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we bear your name;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not forsake us!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about this people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “They greatly love to wander;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not restrain their feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' does not accept them;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will now remember their wickedness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and punish them for their sins.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Do not pray for the well-being of this people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Although they fast, I will not listen to their cry; though they offer burnt offerings and grain offerings, I will not accept them. Instead, I will destroy them with the sword, famine and plague.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But I said, “Alas, Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '! The prophets keep telling them, ‘You will not see the sword or suffer famine. Indeed, I will give you lasting peace in this place.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “The prophets are prophesying lies in my name. I have not sent them or appointed them or spoken to them. They are prophesying to you false visions, divinations, idolatries'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: visions, worthless divinations
    marker-yv: yv-n
  - type: text
    text: ' and the delusions of their own minds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about the prophets who are prophesying in my name: I did not send them, yet they are saying, ‘No sword or famine will touch this land.’ Those same prophets will perish by sword and famine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And the people they are prophesying to will be thrown out into the streets of Jerusalem because of the famine and sword. There will be no one to bury them, their wives, their sons and their daughters. I will pour out on them the calamity they deserve.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Speak this word to them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Let my eyes overflow with tears
- type: usfm
  marker: q2
  children:
  - type: text
    text: night and day without ceasing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the Virgin Daughter, my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: has suffered a grievous wound,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a crushing blow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: If I go into the country,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I see those slain by the sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: if I go into the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I see the ravages of famine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Both prophet and priest
- type: usfm
  marker: q2
  children:
  - type: text
    text: have gone to a land they know not.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Have you rejected Judah completely?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you despise Zion?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why have you afflicted us
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that we cannot be healed?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We hoped for peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no good has come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for a time of healing
- type: usfm
  marker: q2
  children:
  - type: text
    text: but there is only terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'We acknowledge our wickedness, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the guilt of our ancestors;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we have indeed sinned against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For the sake of your name do not despise us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not dishonor your glorious throne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember your covenant with us
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not break it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Do any of the worthless idols of the nations bring rain?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do the skies themselves send down showers?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No, it is you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Therefore our hope is in you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you are the one who does all this.
