  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moab Revolts
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoram, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Joram
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 6
      marker-yv: yv-n
    - type: text
      text: ' son of Ahab became king of Israel in Samaria in the eighteenth year of Jehoshaphat king of Judah, and he reigned twelve years. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What!” exclaimed the king of Israel. “Has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called us three kings together only to deliver us into the hands of Moab?”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jehoshaphat asked, “Is there no prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' here, through whom we may inquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: An officer of the king of Israel answered, “Elisha son of Shaphat is here. He used to pour water on the hands of Elijah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, he was Elijah’s personal servant.
      marker-yv: yv-n
    - type: text
      text: ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat said, “The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is with him.” So the king of Israel and Jehoshaphat and the king of Edom went down to him.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha said to the king of Israel, “Why do you want to involve me? Go to the prophets of your father and the prophets of your mother.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“No,” the king of Israel answered, “because it was the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who called us three kings together to deliver us into the hands of Moab.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisha said, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty lives, whom I serve, if I did not have respect for the presence of Jehoshaphat king of Judah, I would not pay any attention to you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But now bring me a harpist.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While the harpist was playing, the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came on Elisha '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I will fill this valley with pools of water. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: You will see neither wind nor rain, yet this valley will be filled with water, and you, your cattle and your other animals will drink. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is an easy thing in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; he will also deliver Moab into your hands. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You will overthrow every fortified city and every major town. You will cut down every good tree, stop up all the springs, and ruin every good field with stones.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but not as his father and mother had done. He got rid of the sacred stone of Baal that his father had made. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The next morning, about the time for offering the sacrifice, there it was—water flowing from the direction of Edom! And the land was filled with water.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now all the Moabites had heard that the kings had come to fight against them; so every man, young and old, who could bear arms was called up and stationed on the border. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they got up early in the morning, the sun was shining on the water. To the Moabites across the way, the water looked red—like blood. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “That’s blood!” they said. “Those kings must have fought and slaughtered each other. Now to the plunder, Moab!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the Moabites came to the camp of Israel, the Israelites rose up and fought them until they fled. And the Israelites invaded the land and slaughtered the Moabites. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They destroyed the towns, and each man threw a stone on every good field until it was covered. They stopped up all the springs and cut down every good tree. Only Kir Hareseth was left with its stones in place, but men armed with slings surrounded it and attacked it.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the king of Moab saw that the battle had gone against him, he took with him seven hundred swordsmen to break through to the king of Edom, but they failed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he took his firstborn son, who was to succeed him as king, and offered him as a sacrifice on the city wall. The fury against Israel was great; they withdrew and returned to their own land.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nevertheless he clung to the sins of Jeroboam son of Nebat, which he had caused Israel to commit; he did not turn away from them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Mesha king of Moab raised sheep, and he had to pay the king of Israel a tribute of a hundred thousand lambs and the wool of a hundred thousand rams. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But after Ahab died, the king of Moab rebelled against the king of Israel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So at that time King Joram set out from Samaria and mobilized all Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also sent this message to Jehoshaphat king of Judah: “The king of Moab has rebelled against me. Will you go with me to fight against Moab?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I will go with you,” he replied. “I am as you are, my people as your people, my horses as your horses.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “By what route shall we attack?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Through the Desert of Edom,” he answered.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the king of Israel set out with the king of Judah and the king of Edom. After a roundabout march of seven days, the army had no more water for themselves or for the animals with them.
