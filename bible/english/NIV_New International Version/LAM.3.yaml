document_id: LAM.3,111
type_code: eng
verses:
  '1':
  - type: note
    content: This chapter is an acrostic poem; the verses of each stanza begin with the successive letters of the Hebrew alphabet, and the verses within each stanza begin with the same letter.
  - type: text
    content: I am the man who has seen affliction
  - type: text
    content: 'by the rod of the '
  - type: text
    content: Lord
  - type: text
    content: ’s wrath.
  '10':
  - type: text
    content: Like a bear lying in wait,
  - type: text
    content: like a lion in hiding,
  '11':
  - type: text
    content: he dragged me from the path and mangled me
  - type: text
    content: and left me without help.
  '12':
  - type: text
    content: He drew his bow
  - type: text
    content: and made me the target for his arrows.
  '13':
  - type: text
    content: He pierced my heart
  - type: text
    content: with arrows from his quiver.
  '14':
  - type: text
    content: I became the laughingstock of all my people;
  - type: text
    content: they mock me in song all day long.
  '15':
  - type: text
    content: He has filled me with bitter herbs
  - type: text
    content: and given me gall to drink.
  '16':
  - type: text
    content: He has broken my teeth with gravel;
  - type: text
    content: he has trampled me in the dust.
  '17':
  - type: text
    content: I have been deprived of peace;
  - type: text
    content: I have forgotten what prosperity is.
  '18':
  - type: text
    content: So I say, “My splendor is gone
  - type: text
    content: 'and all that I had hoped from the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '19':
  - type: text
    content: I remember my affliction and my wandering,
  - type: text
    content: the bitterness and the gall.
  '2':
  - type: text
    content: He has driven me away and made me walk
  - type: text
    content: in darkness rather than light;
  '20':
  - type: text
    content: I well remember them,
  - type: text
    content: and my soul is downcast within me.
  '21':
  - type: text
    content: Yet this I call to mind
  - type: text
    content: 'and therefore I have hope:'
  '22':
  - type: text
    content: 'Because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s great love we are not consumed,
  - type: text
    content: for his compassions never fail.
  '23':
  - type: text
    content: They are new every morning;
  - type: text
    content: great is your faithfulness.
  '24':
  - type: text
    content: 'I say to myself, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is my portion;'
  - type: text
    content: therefore I will wait for him.”
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is good to those whose hope is in him,'
  - type: text
    content: to the one who seeks him;
  '26':
  - type: text
    content: it is good to wait quietly
  - type: text
    content: 'for the salvation of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: It is good for a man to bear the yoke
  - type: text
    content: while he is young.
  '28':
  - type: text
    content: Let him sit alone in silence,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has laid it on him.'
  '29':
  - type: text
    content: Let him bury his face in the dust—
  - type: text
    content: there may yet be hope.
  '3':
  - type: text
    content: indeed, he has turned his hand against me
  - type: text
    content: again and again, all day long.
  '30':
  - type: text
    content: Let him offer his cheek to one who would strike him,
  - type: text
    content: and let him be filled with disgrace.
  '31':
  - type: text
    content: For no one is cast off
  - type: text
    content: by the Lord forever.
  '32':
  - type: text
    content: Though he brings grief, he will show compassion,
  - type: text
    content: so great is his unfailing love.
  '33':
  - type: text
    content: For he does not willingly bring affliction
  - type: text
    content: or grief to anyone.
  '34':
  - type: text
    content: To crush underfoot
  - type: text
    content: all prisoners in the land,
  '35':
  - type: text
    content: to deny people their rights
  - type: text
    content: before the Most High,
  '36':
  - type: text
    content: to deprive them of justice—
  - type: text
    content: would not the Lord see such things?
  '37':
  - type: text
    content: Who can speak and have it happen
  - type: text
    content: if the Lord has not decreed it?
  '38':
  - type: text
    content: Is it not from the mouth of the Most High
  - type: text
    content: that both calamities and good things come?
  '39':
  - type: text
    content: Why should the living complain
  - type: text
    content: when punished for their sins?
  '4':
  - type: text
    content: He has made my skin and my flesh grow old
  - type: text
    content: and has broken my bones.
  '40':
  - type: text
    content: Let us examine our ways and test them,
  - type: text
    content: 'and let us return to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '41':
  - type: text
    content: Let us lift up our hearts and our hands
  - type: text
    content: 'to God in heaven, and say:'
  '42':
  - type: text
    content: “We have sinned and rebelled
  - type: text
    content: and you have not forgiven.
  '43':
  - type: text
    content: “You have covered yourself with anger and pursued us;
  - type: text
    content: you have slain without pity.
  '44':
  - type: text
    content: You have covered yourself with a cloud
  - type: text
    content: so that no prayer can get through.
  '45':
  - type: text
    content: You have made us scum and refuse
  - type: text
    content: among the nations.
  '46':
  - type: text
    content: “All our enemies have opened their mouths
  - type: text
    content: wide against us.
  '47':
  - type: text
    content: We have suffered terror and pitfalls,
  - type: text
    content: ruin and destruction.”
  '48':
  - type: text
    content: Streams of tears flow from my eyes
  - type: text
    content: because my people are destroyed.
  '49':
  - type: text
    content: My eyes will flow unceasingly,
  - type: text
    content: without relief,
  '5':
  - type: text
    content: He has besieged me and surrounded me
  - type: text
    content: with bitterness and hardship.
  '50':
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' looks down'
  - type: text
    content: from heaven and sees.
  '51':
  - type: text
    content: What I see brings grief to my soul
  - type: text
    content: because of all the women of my city.
  '52':
  - type: text
    content: Those who were my enemies without cause
  - type: text
    content: hunted me like a bird.
  '53':
  - type: text
    content: They tried to end my life in a pit
  - type: text
    content: and threw stones at me;
  '54':
  - type: text
    content: the waters closed over my head,
  - type: text
    content: and I thought I was about to perish.
  '55':
  - type: text
    content: 'I called on your name, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: from the depths of the pit.
  '56':
  - type: text
    content: 'You heard my plea: “Do not close your ears'
  - type: text
    content: to my cry for relief.”
  '57':
  - type: text
    content: You came near when I called you,
  - type: text
    content: and you said, “Do not fear.”
  '58':
  - type: text
    content: You, Lord, took up my case;
  - type: text
    content: you redeemed my life.
  '59':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you have seen the wrong done to me.'
  - type: text
    content: Uphold my cause!
  '6':
  - type: text
    content: He has made me dwell in darkness
  - type: text
    content: like those long dead.
  '60':
  - type: text
    content: You have seen the depth of their vengeance,
  - type: text
    content: all their plots against me.
  '61':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you have heard their insults,'
  - type: text
    content: all their plots against me—
  '62':
  - type: text
    content: what my enemies whisper and mutter
  - type: text
    content: against me all day long.
  '63':
  - type: text
    content: Look at them! Sitting or standing,
  - type: text
    content: they mock me in their songs.
  '64':
  - type: text
    content: 'Pay them back what they deserve, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for what their hands have done.
  '65':
  - type: text
    content: Put a veil over their hearts,
  - type: text
    content: and may your curse be on them!
  '66':
  - type: text
    content: Pursue them in anger and destroy them
  - type: text
    content: 'from under the heavens of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: He has walled me in so I cannot escape;
  - type: text
    content: he has weighed me down with chains.
  '8':
  - type: text
    content: Even when I call out or cry for help,
  - type: text
    content: he shuts out my prayer.
  '9':
  - type: text
    content: He has barred my way with blocks of stone;
  - type: text
    content: he has made my paths crooked.
