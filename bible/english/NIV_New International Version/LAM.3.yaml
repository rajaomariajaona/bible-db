document_id: LAM.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This chapter is an acrostic poem; the verses of each stanza begin with the successive letters of the Hebrew alphabet, and the verses within each stanza begin with the same letter.
      marker-yv: yv-n
    - type: text
      text: I am the man who has seen affliction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by the rod of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s wrath.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a bear lying in wait,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a lion in hiding,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he dragged me from the path and mangled me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and left me without help.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He drew his bow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made me the target for his arrows.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He pierced my heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with arrows from his quiver.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I became the laughingstock of all my people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they mock me in song all day long.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has filled me with bitter herbs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and given me gall to drink.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has broken my teeth with gravel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has trampled me in the dust.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have been deprived of peace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have forgotten what prosperity is.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I say, “My splendor is gone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and all that I had hoped from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I remember my affliction and my wandering,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the bitterness and the gall.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has driven me away and made me walk
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in darkness rather than light;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I well remember them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my soul is downcast within me.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet this I call to mind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and therefore I have hope:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s great love we are not consumed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for his compassions never fail.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are new every morning;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: great is your faithfulness.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I say to myself, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my portion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore I will wait for him.”
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is good to those whose hope is in him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the one who seeks him;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it is good to wait quietly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the salvation of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is good for a man to bear the yoke
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while he is young.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him sit alone in silence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has laid it on him.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him bury his face in the dust—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there may yet be hope.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: indeed, he has turned his hand against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: again and again, all day long.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let him offer his cheek to one who would strike him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let him be filled with disgrace.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For no one is cast off
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the Lord forever.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though he brings grief, he will show compassion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so great is his unfailing love.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he does not willingly bring affliction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or grief to anyone.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To crush underfoot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all prisoners in the land,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to deny people their rights
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before the Most High,
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to deprive them of justice—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: would not the Lord see such things?
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can speak and have it happen
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if the Lord has not decreed it?
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is it not from the mouth of the Most High
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that both calamities and good things come?
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should the living complain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when punished for their sins?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has made my skin and my flesh grow old
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and has broken my bones.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us examine our ways and test them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and let us return to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us lift up our hearts and our hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to God in heaven, and say:'
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We have sinned and rebelled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you have not forgiven.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have covered yourself with anger and pursued us;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have slain without pity.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have covered yourself with a cloud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that no prayer can get through.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have made us scum and refuse
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among the nations.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All our enemies have opened their mouths
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wide against us.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have suffered terror and pitfalls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ruin and destruction.”
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Streams of tears flow from my eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because my people are destroyed.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes will flow unceasingly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without relief,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has besieged me and surrounded me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with bitterness and hardship.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'until the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looks down'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from heaven and sees.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What I see brings grief to my soul
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of all the women of my city.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who were my enemies without cause
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hunted me like a bird.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They tried to end my life in a pit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and threw stones at me;
  '54':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the waters closed over my head,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I thought I was about to perish.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I called on your name, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the depths of the pit.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You heard my plea: “Do not close your ears'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to my cry for relief.”
  '57':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You came near when I called you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you said, “Do not fear.”
  '58':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, Lord, took up my case;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you redeemed my life.
  '59':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you have seen the wrong done to me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Uphold my cause!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has made me dwell in darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like those long dead.
  '60':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have seen the depth of their vengeance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all their plots against me.
  '61':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you have heard their insults,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all their plots against me—
  '62':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what my enemies whisper and mutter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against me all day long.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at them! Sitting or standing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they mock me in their songs.
  '64':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pay them back what they deserve, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for what their hands have done.
  '65':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put a veil over their hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may your curse be on them!
  '66':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pursue them in anger and destroy them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'from under the heavens of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has walled me in so I cannot escape;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has weighed me down with chains.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even when I call out or cry for help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he shuts out my prayer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has barred my way with blocks of stone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has made my paths crooked.
