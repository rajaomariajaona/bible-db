document_id: LAM.3
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This chapter is an acrostic poem; the verses of each stanza begin with the successive letters of the Hebrew alphabet, and the verses within each stanza begin with the same letter.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I am the man who has seen affliction
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'by the rod of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He has driven me away and made me walk
- type: usfm
  marker: q2
  children:
  - type: text
    text: in darkness rather than light;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: indeed, he has turned his hand against me
- type: usfm
  marker: q2
  children:
  - type: text
    text: again and again, all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He has made my skin and my flesh grow old
- type: usfm
  marker: q2
  children:
  - type: text
    text: and has broken my bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He has besieged me and surrounded me
- type: usfm
  marker: q2
  children:
  - type: text
    text: with bitterness and hardship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He has made me dwell in darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: like those long dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He has walled me in so I cannot escape;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has weighed me down with chains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Even when I call out or cry for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he shuts out my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He has barred my way with blocks of stone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has made my paths crooked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Like a bear lying in wait,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a lion in hiding,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: he dragged me from the path and mangled me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and left me without help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He drew his bow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made me the target for his arrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He pierced my heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: with arrows from his quiver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I became the laughingstock of all my people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they mock me in song all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He has filled me with bitter herbs
- type: usfm
  marker: q2
  children:
  - type: text
    text: and given me gall to drink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He has broken my teeth with gravel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has trampled me in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I have been deprived of peace;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have forgotten what prosperity is.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So I say, “My splendor is gone
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and all that I had hoped from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I remember my affliction and my wandering,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the bitterness and the gall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I well remember them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my soul is downcast within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Yet this I call to mind
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and therefore I have hope:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Because of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s great love we are not consumed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for his compassions never fail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They are new every morning;
- type: usfm
  marker: q2
  children:
  - type: text
    text: great is your faithfulness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'I say to myself, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is my portion;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: therefore I will wait for him.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is good to those whose hope is in him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the one who seeks him;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: it is good to wait quietly
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the salvation of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: It is good for a man to bear the yoke
- type: usfm
  marker: q2
  children:
  - type: text
    text: while he is young.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Let him sit alone in silence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has laid it on him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Let him bury his face in the dust—
- type: usfm
  marker: q2
  children:
  - type: text
    text: there may yet be hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Let him offer his cheek to one who would strike him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let him be filled with disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For no one is cast off
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the Lord forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Though he brings grief, he will show compassion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so great is his unfailing love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: For he does not willingly bring affliction
- type: usfm
  marker: q2
  children:
  - type: text
    text: or grief to anyone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: To crush underfoot
- type: usfm
  marker: q2
  children:
  - type: text
    text: all prisoners in the land,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: to deny people their rights
- type: usfm
  marker: q2
  children:
  - type: text
    text: before the Most High,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: to deprive them of justice—
- type: usfm
  marker: q2
  children:
  - type: text
    text: would not the Lord see such things?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Who can speak and have it happen
- type: usfm
  marker: q2
  children:
  - type: text
    text: if the Lord has not decreed it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Is it not from the mouth of the Most High
- type: usfm
  marker: q2
  children:
  - type: text
    text: that both calamities and good things come?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Why should the living complain
- type: usfm
  marker: q2
  children:
  - type: text
    text: when punished for their sins?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Let us examine our ways and test them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and let us return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Let us lift up our hearts and our hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to God in heaven, and say:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: “We have sinned and rebelled
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you have not forgiven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: “You have covered yourself with anger and pursued us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have slain without pity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: You have covered yourself with a cloud
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that no prayer can get through.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: You have made us scum and refuse
- type: usfm
  marker: q2
  children:
  - type: text
    text: among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: “All our enemies have opened their mouths
- type: usfm
  marker: q2
  children:
  - type: text
    text: wide against us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: We have suffered terror and pitfalls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ruin and destruction.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Streams of tears flow from my eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: because my people are destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: My eyes will flow unceasingly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: without relief,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'until the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' looks down'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from heaven and sees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: What I see brings grief to my soul
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of all the women of my city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Those who were my enemies without cause
- type: usfm
  marker: q2
  children:
  - type: text
    text: hunted me like a bird.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: They tried to end my life in a pit
- type: usfm
  marker: q2
  children:
  - type: text
    text: and threw stones at me;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: the waters closed over my head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I thought I was about to perish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
