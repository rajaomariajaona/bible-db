document_id: JOB.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Final Defense
  - type: text
    content: 'Job continued his discourse:'
  '10':
  - type: text
    content: the voices of the nobles were hushed,
  - type: text
    content: and their tongues stuck to the roof of their mouths.
  '11':
  - type: text
    content: Whoever heard me spoke well of me,
  - type: text
    content: and those who saw me commended me,
  '12':
  - type: text
    content: because I rescued the poor who cried for help,
  - type: text
    content: and the fatherless who had none to assist them.
  '13':
  - type: text
    content: The one who was dying blessed me;
  - type: text
    content: I made the widow’s heart sing.
  '14':
  - type: text
    content: I put on righteousness as my clothing;
  - type: text
    content: justice was my robe and my turban.
  '15':
  - type: text
    content: I was eyes to the blind
  - type: text
    content: and feet to the lame.
  '16':
  - type: text
    content: I was a father to the needy;
  - type: text
    content: I took up the case of the stranger.
  '17':
  - type: text
    content: I broke the fangs of the wicked
  - type: text
    content: and snatched the victims from their teeth.
  '18':
  - type: text
    content: “I thought, ‘I will die in my own house,
  - type: text
    content: my days as numerous as the grains of sand.
  '19':
  - type: text
    content: My roots will reach to the water,
  - type: text
    content: and the dew will lie all night on my branches.
  '2':
  - type: text
    content: “How I long for the months gone by,
  - type: text
    content: for the days when God watched over me,
  '20':
  - type: text
    content: My glory will not fade;
  - type: text
    content: the bow will be ever new in my hand.’
  '21':
  - type: text
    content: “People listened to me expectantly,
  - type: text
    content: waiting in silence for my counsel.
  '22':
  - type: text
    content: After I had spoken, they spoke no more;
  - type: text
    content: my words fell gently on their ears.
  '23':
  - type: text
    content: They waited for me as for showers
  - type: text
    content: and drank in my words as the spring rain.
  '24':
  - type: text
    content: When I smiled at them, they scarcely believed it;
  - type: text
    content: the light of my face was precious to them.
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  '25':
  - type: text
    content: I chose the way for them and sat as their chief;
  - type: text
    content: I dwelt as a king among his troops;
  - type: text
    content: I was like one who comforts mourners.
  '3':
  - type: text
    content: when his lamp shone on my head
  - type: text
    content: and by his light I walked through darkness!
  '4':
  - type: text
    content: Oh, for the days when I was in my prime,
  - type: text
    content: when God’s intimate friendship blessed my house,
  '5':
  - type: text
    content: when the Almighty was still with me
  - type: text
    content: and my children were around me,
  '6':
  - type: text
    content: when my path was drenched with cream
  - type: text
    content: and the rock poured out for me streams of olive oil.
  '7':
  - type: text
    content: “When I went to the gate of the city
  - type: text
    content: and took my seat in the public square,
  '8':
  - type: text
    content: the young men saw me and stepped aside
  - type: text
    content: and the old men rose to their feet;
  '9':
  - type: text
    content: the chief men refrained from speaking
  - type: text
    content: and covered their mouths with their hands;
