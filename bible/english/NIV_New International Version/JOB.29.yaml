document_id: JOB.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job’s Final Defense
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job continued his discourse:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “How I long for the months gone by,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the days when God watched over me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: when his lamp shone on my head
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by his light I walked through darkness!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oh, for the days when I was in my prime,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when God’s intimate friendship blessed my house,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: when the Almighty was still with me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my children were around me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: when my path was drenched with cream
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the rock poured out for me streams of olive oil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “When I went to the gate of the city
- type: usfm
  marker: q2
  children:
  - type: text
    text: and took my seat in the public square,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: the young men saw me and stepped aside
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the old men rose to their feet;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: the chief men refrained from speaking
- type: usfm
  marker: q2
  children:
  - type: text
    text: and covered their mouths with their hands;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: the voices of the nobles were hushed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their tongues stuck to the roof of their mouths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Whoever heard me spoke well of me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who saw me commended me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: because I rescued the poor who cried for help,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fatherless who had none to assist them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The one who was dying blessed me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I made the widow’s heart sing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I put on righteousness as my clothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: justice was my robe and my turban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I was eyes to the blind
- type: usfm
  marker: q2
  children:
  - type: text
    text: and feet to the lame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I was a father to the needy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I took up the case of the stranger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I broke the fangs of the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: and snatched the victims from their teeth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “I thought, ‘I will die in my own house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my days as numerous as the grains of sand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: My roots will reach to the water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the dew will lie all night on my branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My glory will not fade;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the bow will be ever new in my hand.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “People listened to me expectantly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting in silence for my counsel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: After I had spoken, they spoke no more;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my words fell gently on their ears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They waited for me as for showers
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drank in my words as the spring rain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When I smiled at them, they scarcely believed it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the light of my face was precious to them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this clause is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I chose the way for them and sat as their chief;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I dwelt as a king among his troops;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was like one who comforts mourners.
