document_id: REV.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Two Witnesses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I was given a reed like a measuring rod and was told, “Go and measure the temple of God and the altar, with its worshipers. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The inhabitants of the earth will gloat over them and will celebrate by sending each other gifts, because these two prophets had tormented those who live on the earth.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But after the three and a half days the breath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Spirit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see Ezek. 37:5,14)
      marker-yv: yv-n
    - type: text
      text: ' of life from God entered them, and they stood on their feet, and terror struck those who saw them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then they heard a loud voice from heaven saying to them, “Come up here.” And they went up to heaven in a cloud, while their enemies looked on.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: At that very hour there was a severe earthquake and a tenth of the city collapsed. Seven thousand people were killed in the earthquake, and the survivors were terrified and gave glory to the God of heaven.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The second woe has passed; the third woe is coming soon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Seventh Trumpet
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The seventh angel sounded his trumpet, and there were loud voices in heaven, which said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The kingdom of the world has become
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the kingdom of our Lord and of his Messiah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will reign for ever and ever.”
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And the twenty-four elders, who were seated on their thrones before God, fell on their faces and worshiped God, '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “We give thanks to you, Lord God Almighty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the One who is and who was,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because you have taken your great power
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have begun to reign.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The nations were angry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your wrath has come.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The time has come for judging the dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for rewarding your servants the prophets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your people who revere your name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both great and small—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for destroying those who destroy the earth.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then God’s temple in heaven was opened, and within his temple was seen the ark of his covenant. And there came flashes of lightning, rumblings, peals of thunder, an earthquake and a severe hailstorm.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But exclude the outer court; do not measure it, because it has been given to the Gentiles. They will trample on the holy city for 42 months. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And I will appoint my two witnesses, and they will prophesy for 1,260 days, clothed in sackcloth.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They are “the two olive trees” and the two lampstands, and “they stand before the Lord of the earth.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Zech. 4:3,11,14.
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'If anyone tries to harm them, fire comes from their mouths and devours their enemies. This is how anyone who wants to harm them must die. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: They have power to shut up the heavens so that it will not rain during the time they are prophesying; and they have power to turn the waters into blood and to strike the earth with every kind of plague as often as they want.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now when they have finished their testimony, the beast that comes up from the Abyss will attack them, and overpower and kill them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Their bodies will lie in the public square of the great city—which is figuratively called Sodom and Egypt—where also their Lord was crucified. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For three and a half days some from every people, tribe, language and nation will gaze on their bodies and refuse them burial. '
