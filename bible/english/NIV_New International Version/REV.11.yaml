document_id: REV.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Two Witnesses
  - type: text
    content: 'I was given a reed like a measuring rod and was told, “Go and measure the temple of God and the altar, with its worshipers. '
  '10':
  - type: text
    content: The inhabitants of the earth will gloat over them and will celebrate by sending each other gifts, because these two prophets had tormented those who live on the earth.
  '11':
  - type: text
    content: But after the three and a half days the breath
  - type: note
    content: Or Spirit (see Ezek. 37:5,14)
  - type: text
    content: ' of life from God entered them, and they stood on their feet, and terror struck those who saw them. '
  '12':
  - type: text
    content: Then they heard a loud voice from heaven saying to them, “Come up here.” And they went up to heaven in a cloud, while their enemies looked on.
  '13':
  - type: text
    content: At that very hour there was a severe earthquake and a tenth of the city collapsed. Seven thousand people were killed in the earthquake, and the survivors were terrified and gave glory to the God of heaven.
  '14':
  - type: text
    content: The second woe has passed; the third woe is coming soon.
  - type: heading
    content: The Seventh Trumpet
  '15':
  - type: text
    content: 'The seventh angel sounded his trumpet, and there were loud voices in heaven, which said:'
  - type: text
    content: “The kingdom of the world has become
  - type: text
    content: the kingdom of our Lord and of his Messiah,
  - type: text
    content: and he will reign for ever and ever.”
  '16':
  - type: text
    content: 'And the twenty-four elders, who were seated on their thrones before God, fell on their faces and worshiped God, '
  '17':
  - type: text
    content: 'saying:'
  - type: text
    content: “We give thanks to you, Lord God Almighty,
  - type: text
    content: the One who is and who was,
  - type: text
    content: because you have taken your great power
  - type: text
    content: and have begun to reign.
  '18':
  - type: text
    content: The nations were angry,
  - type: text
    content: and your wrath has come.
  - type: text
    content: The time has come for judging the dead,
  - type: text
    content: and for rewarding your servants the prophets
  - type: text
    content: and your people who revere your name,
  - type: text
    content: both great and small—
  - type: text
    content: and for destroying those who destroy the earth.”
  '19':
  - type: text
    content: Then God’s temple in heaven was opened, and within his temple was seen the ark of his covenant. And there came flashes of lightning, rumblings, peals of thunder, an earthquake and a severe hailstorm.
  '2':
  - type: text
    content: 'But exclude the outer court; do not measure it, because it has been given to the Gentiles. They will trample on the holy city for 42 months. '
  '3':
  - type: text
    content: 'And I will appoint my two witnesses, and they will prophesy for 1,260 days, clothed in sackcloth.” '
  '4':
  - type: text
    content: They are “the two olive trees” and the two lampstands, and “they stand before the Lord of the earth.”
  - type: note
    content: See Zech. 4:3,11,14.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'If anyone tries to harm them, fire comes from their mouths and devours their enemies. This is how anyone who wants to harm them must die. '
  '6':
  - type: text
    content: They have power to shut up the heavens so that it will not rain during the time they are prophesying; and they have power to turn the waters into blood and to strike the earth with every kind of plague as often as they want.
  '7':
  - type: text
    content: 'Now when they have finished their testimony, the beast that comes up from the Abyss will attack them, and overpower and kill them. '
  '8':
  - type: text
    content: 'Their bodies will lie in the public square of the great city—which is figuratively called Sodom and Egypt—where also their Lord was crucified. '
  '9':
  - type: text
    content: 'For three and a half days some from every people, tribe, language and nation will gaze on their bodies and refuse them burial. '
