document_id: PSA.129,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 129
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of ascents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They have greatly oppressed me from my youth,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let Israel say;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “they have greatly oppressed me from my youth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they have not gained the victory over me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plowmen have plowed my back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made their furrows long.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is righteous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has cut me free from the cords of the wicked.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all who hate Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be turned back in shame.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they be like grass on the roof,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which withers before it can grow;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a reaper cannot fill his hands with it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor one who gathers fill his arms.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who pass by not say to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“The blessing of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be on you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'we bless you in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
