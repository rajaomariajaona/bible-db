document_id: PSA.129,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 129
  - type: text
    content: A song of ascents.
  - type: text
    content: “They have greatly oppressed me from my youth,”
  - type: text
    content: let Israel say;
  '2':
  - type: text
    content: “they have greatly oppressed me from my youth,
  - type: text
    content: but they have not gained the victory over me.
  '3':
  - type: text
    content: Plowmen have plowed my back
  - type: text
    content: and made their furrows long.
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is righteous;'
  - type: text
    content: he has cut me free from the cords of the wicked.”
  '5':
  - type: text
    content: May all who hate Zion
  - type: text
    content: be turned back in shame.
  '6':
  - type: text
    content: May they be like grass on the roof,
  - type: text
    content: which withers before it can grow;
  '7':
  - type: text
    content: a reaper cannot fill his hands with it,
  - type: text
    content: nor one who gathers fill his arms.
  '8':
  - type: text
    content: May those who pass by not say to them,
  - type: text
    content: '“The blessing of the '
  - type: text
    content: Lord
  - type: text
    content: ' be on you;'
  - type: text
    content: 'we bless you in the name of the '
  - type: text
    content: Lord
  - type: text
    content: .”
