document_id: LEV.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Purification After Childbirth
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '2':
  - type: text
    content: '“Say to the Israelites: ‘A woman who becomes pregnant and gives birth to a son will be ceremonially unclean for seven days, just as she is unclean during her monthly period. '
  '3':
  - type: text
    content: 'On the eighth day the boy is to be circumcised. '
  '4':
  - type: text
    content: 'Then the woman must wait thirty-three days to be purified from her bleeding. She must not touch anything sacred or go to the sanctuary until the days of her purification are over. '
  '5':
  - type: text
    content: If she gives birth to a daughter, for two weeks the woman will be unclean, as during her period. Then she must wait sixty-six days to be purified from her bleeding.
  '6':
  - type: text
    content: “ ‘When the days of her purification for a son or daughter are over, she is to bring to the priest at the entrance to the tent of meeting a year-old lamb for a burnt offering and a young pigeon or a dove for a sin offering.
  - type: note
    content: Or purification offering; also in verse 8
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'He shall offer them before the '
  - type: text
    content: Lord
  - type: text
    content: ' to make atonement for her, and then she will be ceremonially clean from her flow of blood.'
  - type: text
    content: '“ ‘These are the regulations for the woman who gives birth to a boy or a girl. '
  '8':
  - type: text
    content: But if she cannot afford a lamb, she is to bring two doves or two young pigeons, one for a burnt offering and the other for a sin offering. In this way the priest will make atonement for her, and she will be clean.’ ”
