document_id: ISA.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Branch From Jesse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A shoot will come up from the stump of Jesse;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from his roots a Branch will bear fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The Spirit of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will rest on him—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Spirit of wisdom and of understanding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Spirit of counsel and of might,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the Spirit of the knowledge and fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and he will delight in the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will not judge by what he sees with his eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or decide by what he hears with his ears;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: but with righteousness he will judge the needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with justice he will give decisions for the poor of the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will strike the earth with the rod of his mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the breath of his lips he will slay the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Righteousness will be his belt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and faithfulness the sash around his waist.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The wolf will live with the lamb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the leopard will lie down with the goat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the calf and the lion and the yearling
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lion will feed
    marker-yv: yv-n
  - type: text
    text: ' together;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a little child will lead them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The cow will feed with the bear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their young will lie down together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the lion will eat straw like the ox.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The infant will play near the cobra’s den,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the young child will put its hand into the viper’s nest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They will neither harm nor destroy
- type: usfm
  marker: q2
  children:
  - type: text
    text: on all my holy mountain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the earth will be filled with the knowledge of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the waters cover the sea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In that day the Root of Jesse will stand as a banner for the peoples; the nations will rally to him, and his resting place will be glorious. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: In that day the Lord will reach out his hand a second time to reclaim the surviving remnant of his people from Assyria, from Lower Egypt, from Upper Egypt, from Cush,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the upper Nile region
    marker-yv: yv-n
  - type: text
    text: ' from Elam, from Babylonia,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shinar
    marker-yv: yv-n
  - type: text
    text: ' from Hamath and from the islands of the Mediterranean.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He will raise a banner for the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gather the exiles of Israel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will assemble the scattered people of Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the four quarters of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ephraim’s jealousy will vanish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Judah’s enemies
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hostility
    marker-yv: yv-n
  - type: text
    text: ' will be destroyed;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim will not be jealous of Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor Judah hostile toward Ephraim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They will swoop down on the slopes of Philistia to the west;
- type: usfm
  marker: q2
  children:
  - type: text
    text: together they will plunder the people to the east.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will subdue Edom and Moab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the Ammonites will be subject to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will dry up'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the gulf of the Egyptian sea;
- type: usfm
  marker: q1
  children:
  - type: text
    text: with a scorching wind he will sweep his hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: over the Euphrates River.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will break it up into seven streams
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that anyone can cross over in sandals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: There will be a highway for the remnant of his people
- type: usfm
  marker: q2
  children:
  - type: text
    text: that is left from Assyria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as there was for Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they came up from Egypt.
