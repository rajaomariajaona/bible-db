document_id: ISA.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Branch From Jesse
  - type: text
    content: A shoot will come up from the stump of Jesse;
  - type: text
    content: from his roots a Branch will bear fruit.
  '10':
  - type: text
    content: 'In that day the Root of Jesse will stand as a banner for the peoples; the nations will rally to him, and his resting place will be glorious. '
  '11':
  - type: text
    content: In that day the Lord will reach out his hand a second time to reclaim the surviving remnant of his people from Assyria, from Lower Egypt, from Upper Egypt, from Cush,
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: ' from Elam, from Babylonia,'
  - type: note
    content: Hebrew Shinar
  - type: text
    content: ' from Hamath and from the islands of the Mediterranean.'
  '12':
  - type: text
    content: He will raise a banner for the nations
  - type: text
    content: and gather the exiles of Israel;
  - type: text
    content: he will assemble the scattered people of Judah
  - type: text
    content: from the four quarters of the earth.
  '13':
  - type: text
    content: Ephraim’s jealousy will vanish,
  - type: text
    content: and Judah’s enemies
  - type: note
    content: Or hostility
  - type: text
    content: ' will be destroyed;'
  - type: text
    content: Ephraim will not be jealous of Judah,
  - type: text
    content: nor Judah hostile toward Ephraim.
  '14':
  - type: text
    content: They will swoop down on the slopes of Philistia to the west;
  - type: text
    content: together they will plunder the people to the east.
  - type: text
    content: They will subdue Edom and Moab,
  - type: text
    content: and the Ammonites will be subject to them.
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will dry up'
  - type: text
    content: the gulf of the Egyptian sea;
  - type: text
    content: with a scorching wind he will sweep his hand
  - type: text
    content: over the Euphrates River.
  - type: text
    content: He will break it up into seven streams
  - type: text
    content: so that anyone can cross over in sandals.
  '16':
  - type: text
    content: There will be a highway for the remnant of his people
  - type: text
    content: that is left from Assyria,
  - type: text
    content: as there was for Israel
  - type: text
    content: when they came up from Egypt.
  '2':
  - type: text
    content: 'The Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' will rest on him—'
  - type: text
    content: the Spirit of wisdom and of understanding,
  - type: text
    content: the Spirit of counsel and of might,
  - type: text
    content: 'the Spirit of the knowledge and fear of the '
  - type: text
    content: Lord
  - type: text
    content: —
  '3':
  - type: text
    content: 'and he will delight in the fear of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: He will not judge by what he sees with his eyes,
  - type: text
    content: or decide by what he hears with his ears;
  '4':
  - type: text
    content: but with righteousness he will judge the needy,
  - type: text
    content: with justice he will give decisions for the poor of the earth.
  - type: text
    content: He will strike the earth with the rod of his mouth;
  - type: text
    content: with the breath of his lips he will slay the wicked.
  '5':
  - type: text
    content: Righteousness will be his belt
  - type: text
    content: and faithfulness the sash around his waist.
  '6':
  - type: text
    content: The wolf will live with the lamb,
  - type: text
    content: the leopard will lie down with the goat,
  - type: text
    content: the calf and the lion and the yearling
  - type: note
    content: Hebrew; Septuagint lion will feed
  - type: text
    content: ' together;'
  - type: text
    content: and a little child will lead them.
  '7':
  - type: text
    content: The cow will feed with the bear,
  - type: text
    content: their young will lie down together,
  - type: text
    content: and the lion will eat straw like the ox.
  '8':
  - type: text
    content: The infant will play near the cobra’s den,
  - type: text
    content: and the young child will put its hand into the viper’s nest.
  '9':
  - type: text
    content: They will neither harm nor destroy
  - type: text
    content: on all my holy mountain,
  - type: text
    content: 'for the earth will be filled with the knowledge of the '
  - type: text
    content: Lord
  - type: text
    content: as the waters cover the sea.
