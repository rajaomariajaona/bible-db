document_id: LEV.6,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 6:1-7 is numbered 5:20-26, and 6:8-30 is numbered 6:1-23.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses: '
  '10':
  - type: text
    content: 'The priest shall then put on his linen clothes, with linen undergarments next to his body, and shall remove the ashes of the burnt offering that the fire has consumed on the altar and place them beside the altar. '
  '11':
  - type: text
    content: 'Then he is to take off these clothes and put on others, and carry the ashes outside the camp to a place that is ceremonially clean. '
  '12':
  - type: text
    content: 'The fire on the altar must be kept burning; it must not go out. Every morning the priest is to add firewood and arrange the burnt offering on the fire and burn the fat of the fellowship offerings on it. '
  '13':
  - type: text
    content: The fire must be kept burning on the altar continuously; it must not go out.
  - type: heading
    content: The Grain Offering
  '14':
  - type: text
    content: '“ ‘These are the regulations for the grain offering: Aaron’s sons are to bring it before the '
  - type: text
    content: Lord
  - type: text
    content: ', in front of the altar. '
  '15':
  - type: text
    content: The priest is to take a handful of the finest flour and some olive oil, together with all the incense on the grain offering, and burn the memorial
  - type: note
    content: Or representative
  - type: text
    content: ' portion on the altar as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Aaron and his sons shall eat the rest of it, but it is to be eaten without yeast in the sanctuary area; they are to eat it in the courtyard of the tent of meeting. '
  '17':
  - type: text
    content: It must not be baked with yeast; I have given it as their share of the food offerings presented to me. Like the sin offering
  - type: note
    content: Or purification offering; also in verses 25 and 30
  - type: text
    content: ' and the guilt offering, it is most holy. '
  '18':
  - type: text
    content: 'Any male descendant of Aaron may eat it. For all generations to come it is his perpetual share of the food offerings presented to the '
  - type: text
    content: Lord
  - type: text
    content: . Whatever touches them will become holy.
  - type: note
    content: Or Whoever touches them must be holy; similarly in verse 27
  - type: text
    content: ’ ”
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' also said to Moses, '
  '2':
  - type: text
    content: '“If anyone sins and is unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' by deceiving a neighbor about something entrusted to them or left in their care or about something stolen, or if they cheat their neighbor, '
  '20':
  - type: text
    content: '“This is the offering Aaron and his sons are to bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the day he'
  - type: note
    content: Or each
  - type: text
    content: ' is anointed: a tenth of an ephah'
  - type: note
    content: That is, probably about 3 1/2 pounds or about 1.6 kilograms
  - type: text
    content: ' of the finest flour as a regular grain offering, half of it in the morning and half in the evening. '
  '21':
  - type: text
    content: It must be prepared with oil on a griddle; bring it well-mixed and present the grain offering broken
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' in pieces as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'The son who is to succeed him as anointed priest shall prepare it. It is the '
  - type: text
    content: Lord
  - type: text
    content: '’s perpetual share and is to be burned completely. '
  '23':
  - type: text
    content: Every grain offering of a priest shall be burned completely; it must not be eaten.”
  - type: heading
    content: The Sin Offering
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '25':
  - type: text
    content: '“Say to Aaron and his sons: ‘These are the regulations for the sin offering: The sin offering is to be slaughtered before the '
  - type: text
    content: Lord
  - type: text
    content: ' in the place the burnt offering is slaughtered; it is most holy. '
  '26':
  - type: text
    content: 'The priest who offers it shall eat it; it is to be eaten in the sanctuary area, in the courtyard of the tent of meeting. '
  '27':
  - type: text
    content: 'Whatever touches any of the flesh will become holy, and if any of the blood is spattered on a garment, you must wash it in the sanctuary area. '
  '28':
  - type: text
    content: 'The clay pot the meat is cooked in must be broken; but if it is cooked in a bronze pot, the pot is to be scoured and rinsed with water. '
  '29':
  - type: text
    content: 'Any male in a priest’s family may eat it; it is most holy. '
  '3':
  - type: text
    content: 'or if they find lost property and lie about it, or if they swear falsely about any such sin that people may commit— '
  '30':
  - type: text
    content: But any sin offering whose blood is brought into the tent of meeting to make atonement in the Holy Place must not be eaten; it must be burned up.
  '4':
  - type: text
    content: 'when they sin in any of these ways and realize their guilt, they must return what they have stolen or taken by extortion, or what was entrusted to them, or the lost property they found, '
  '5':
  - type: text
    content: 'or whatever it was they swore falsely about. They must make restitution in full, add a fifth of the value to it and give it all to the owner on the day they present their guilt offering. '
  '6':
  - type: text
    content: 'And as a penalty they must bring to the priest, that is, to the '
  - type: text
    content: Lord
  - type: text
    content: ', their guilt offering, a ram from the flock, one without defect and of the proper value. '
  '7':
  - type: text
    content: 'In this way the priest will make atonement for them before the '
  - type: text
    content: Lord
  - type: text
    content: ', and they will be forgiven for any of the things they did that made them guilty.”'
  - type: heading
    content: The Burnt Offering
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses: '
  '9':
  - type: text
    content: '“Give Aaron and his sons this command: ‘These are the regulations for the burnt offering: The burnt offering is to remain on the altar hearth throughout the night, till morning, and the fire must be kept burning on the altar. '
