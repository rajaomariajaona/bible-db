document_id: HOS.10,111
type_code: eng
verses:
  '1':
  - type: text
    content: Israel was a spreading vine;
  - type: text
    content: he brought forth fruit for himself.
  - type: text
    content: As his fruit increased,
  - type: text
    content: he built more altars;
  - type: text
    content: as his land prospered,
  - type: text
    content: he adorned his sacred stones.
  '10':
  - type: text
    content: When I please, I will punish them;
  - type: text
    content: nations will be gathered against them
  - type: text
    content: to put them in bonds for their double sin.
  '11':
  - type: text
    content: Ephraim is a trained heifer
  - type: text
    content: that loves to thresh;
  - type: text
    content: so I will put a yoke
  - type: text
    content: on her fair neck.
  - type: text
    content: I will drive Ephraim,
  - type: text
    content: Judah must plow,
  - type: text
    content: and Jacob must break up the ground.
  '12':
  - type: text
    content: Sow righteousness for yourselves,
  - type: text
    content: reap the fruit of unfailing love,
  - type: text
    content: and break up your unplowed ground;
  - type: text
    content: 'for it is time to seek the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: until he comes
  - type: text
    content: and showers his righteousness on you.
  '13':
  - type: text
    content: But you have planted wickedness,
  - type: text
    content: you have reaped evil,
  - type: text
    content: you have eaten the fruit of deception.
  - type: text
    content: Because you have depended on your own strength
  - type: text
    content: and on your many warriors,
  '14':
  - type: text
    content: the roar of battle will rise against your people,
  - type: text
    content: so that all your fortresses will be devastated—
  - type: text
    content: as Shalman devastated Beth Arbel on the day of battle,
  - type: text
    content: when mothers were dashed to the ground with their children.
  '15':
  - type: text
    content: So will it happen to you, Bethel,
  - type: text
    content: because your wickedness is great.
  - type: text
    content: When that day dawns,
  - type: text
    content: the king of Israel will be completely destroyed.
  '2':
  - type: text
    content: Their heart is deceitful,
  - type: text
    content: and now they must bear their guilt.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will demolish their altars'
  - type: text
    content: and destroy their sacred stones.
  '3':
  - type: text
    content: Then they will say, “We have no king
  - type: text
    content: 'because we did not revere the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: But even if we had a king,
  - type: text
    content: what could he do for us?”
  '4':
  - type: text
    content: They make many promises,
  - type: text
    content: take false oaths
  - type: text
    content: and make agreements;
  - type: text
    content: therefore lawsuits spring up
  - type: text
    content: like poisonous weeds in a plowed field.
  '5':
  - type: text
    content: The people who live in Samaria fear
  - type: text
    content: for the calf-idol of Beth Aven.
  - type: note
    content: Beth Aven means house of wickedness (a derogatory name for Bethel, which means house of God).
  - type: text
    content: Its people will mourn over it,
  - type: text
    content: and so will its idolatrous priests,
  - type: text
    content: those who had rejoiced over its splendor,
  - type: text
    content: because it is taken from them into exile.
  '6':
  - type: text
    content: It will be carried to Assyria
  - type: text
    content: as tribute for the great king.
  - type: text
    content: Ephraim will be disgraced;
  - type: text
    content: Israel will be ashamed of its foreign alliances.
  '7':
  - type: text
    content: Samaria’s king will be destroyed,
  - type: text
    content: swept away like a twig on the surface of the waters.
  '8':
  - type: text
    content: The high places of wickedness
  - type: note
    content: Hebrew aven, a reference to Beth Aven (a derogatory name for Bethel); see verse 5.
  - type: text
    content: ' will be destroyed—'
  - type: text
    content: it is the sin of Israel.
  - type: text
    content: Thorns and thistles will grow up
  - type: text
    content: and cover their altars.
  - type: text
    content: Then they will say to the mountains, “Cover us!”
  - type: text
    content: and to the hills, “Fall on us!”
  '9':
  - type: text
    content: “Since the days of Gibeah, you have sinned, Israel,
  - type: text
    content: and there you have remained.
  - type: note
    content: Or there a stand was taken
  - type: text
    content: Will not war again overtake
  - type: text
    content: the evildoers in Gibeah?
