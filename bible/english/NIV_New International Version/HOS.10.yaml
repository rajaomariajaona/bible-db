document_id: HOS.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Israel was a spreading vine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he brought forth fruit for himself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As his fruit increased,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he built more altars;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as his land prospered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he adorned his sacred stones.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: When I please, I will punish them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nations will be gathered against them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to put them in bonds for their double sin.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ephraim is a trained heifer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that loves to thresh;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so I will put a yoke
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on her fair neck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will drive Ephraim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah must plow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Jacob must break up the ground.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Sow righteousness for yourselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: reap the fruit of unfailing love,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and break up your unplowed ground;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for it is time to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until he comes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and showers his righteousness on you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But you have planted wickedness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have reaped evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have eaten the fruit of deception.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you have depended on your own strength
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on your many warriors,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: the roar of battle will rise against your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that all your fortresses will be devastated—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as Shalman devastated Beth Arbel on the day of battle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when mothers were dashed to the ground with their children.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So will it happen to you, Bethel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because your wickedness is great.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When that day dawns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the king of Israel will be completely destroyed.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Their heart is deceitful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and now they must bear their guilt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will demolish their altars'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy their sacred stones.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Then they will say, “We have no king
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because we did not revere the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But even if we had a king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what could he do for us?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They make many promises,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take false oaths
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make agreements;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: therefore lawsuits spring up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like poisonous weeds in a plowed field.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The people who live in Samaria fear
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the calf-idol of Beth Aven.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beth Aven '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'house of wickedness '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(a derogatory name for Bethel, which means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: house of God
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its people will mourn over it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so will its idolatrous priests,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who had rejoiced over its splendor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because it is taken from them into exile.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: It will be carried to Assyria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as tribute for the great king.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim will be disgraced;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel will be ashamed of its foreign alliances.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Samaria’s king will be destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: swept away like a twig on the surface of the waters.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The high places of wickedness
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aven, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a reference to Beth Aven (a derogatory name for Bethel); see verse 5.
      marker-yv: yv-n
    - type: text
      text: ' will be destroyed—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is the sin of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thorns and thistles will grow up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cover their altars.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they will say to the mountains, “Cover us!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the hills, “Fall on us!”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Since the days of Gibeah, you have sinned, Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there you have remained.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: there a stand was taken
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will not war again overtake
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the evildoers in Gibeah?
