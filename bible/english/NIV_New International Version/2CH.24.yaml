document_id: 2CH.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Joash Repairs the Temple
  - type: text
    content: 'Joash was seven years old when he became king, and he reigned in Jerusalem forty years. His mother’s name was Zibiah; she was from Beersheba. '
  '10':
  - type: text
    content: 'All the officials and all the people brought their contributions gladly, dropping them into the chest until it was full. '
  '11':
  - type: text
    content: 'Whenever the chest was brought in by the Levites to the king’s officials and they saw that there was a large amount of money, the royal secretary and the officer of the chief priest would come and empty the chest and carry it back to its place. They did this regularly and collected a great amount of money. '
  '12':
  - type: text
    content: 'The king and Jehoiada gave it to those who carried out the work required for the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. They hired masons and carpenters to restore the '
  - type: text
    content: Lord
  - type: text
    content: ’s temple, and also workers in iron and bronze to repair the temple.
  '13':
  - type: text
    content: 'The men in charge of the work were diligent, and the repairs progressed under them. They rebuilt the temple of God according to its original design and reinforced it. '
  '14':
  - type: text
    content: 'When they had finished, they brought the rest of the money to the king and Jehoiada, and with it were made articles for the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple: articles for the service and for the burnt offerings, and also dishes and other objects of gold and silver. As long as Jehoiada lived, burnt offerings were presented continually in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: 'Now Jehoiada was old and full of years, and he died at the age of a hundred and thirty. '
  '16':
  - type: text
    content: He was buried with the kings in the City of David, because of the good he had done in Israel for God and his temple.
  - type: heading
    content: The Wickedness of Joash
  '17':
  - type: text
    content: 'After the death of Jehoiada, the officials of Judah came and paid homage to the king, and he listened to them. '
  '18':
  - type: text
    content: 'They abandoned the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, and worshiped Asherah poles and idols. Because of their guilt, God’s anger came on Judah and Jerusalem. '
  '19':
  - type: text
    content: 'Although the '
  - type: text
    content: Lord
  - type: text
    content: ' sent prophets to the people to bring them back to him, and though they testified against them, they would not listen.'
  '2':
  - type: text
    content: 'Joash did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' all the years of Jehoiada the priest. '
  '20':
  - type: text
    content: 'Then the Spirit of God came on Zechariah son of Jehoiada the priest. He stood before the people and said, “This is what God says: ‘Why do you disobey the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands? You will not prosper. Because you have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ', he has forsaken you.’ ”'
  '21':
  - type: text
    content: 'But they plotted against him, and by order of the king they stoned him to death in the courtyard of the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple. '
  '22':
  - type: text
    content: 'King Joash did not remember the kindness Zechariah’s father Jehoiada had shown him but killed his son, who said as he lay dying, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' see this and call you to account.”'
  '23':
  - type: text
    content: At the turn of the year,
  - type: note
    content: Probably in the spring
  - type: text
    content: ' the army of Aram marched against Joash; it invaded Judah and Jerusalem and killed all the leaders of the people. They sent all the plunder to their king in Damascus. '
  '24':
  - type: text
    content: 'Although the Aramean army had come with only a few men, the '
  - type: text
    content: Lord
  - type: text
    content: ' delivered into their hands a much larger army. Because Judah had forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, judgment was executed on Joash. '
  '25':
  - type: text
    content: When the Arameans withdrew, they left Joash severely wounded. His officials conspired against him for murdering the son of Jehoiada the priest, and they killed him in his bed. So he died and was buried in the City of David, but not in the tombs of the kings.
  '26':
  - type: text
    content: Those who conspired against him were Zabad,
  - type: note
    content: A variant of Jozabad
  - type: text
    content: ' son of Shimeath an Ammonite woman, and Jehozabad, son of Shimrith'
  - type: note
    content: A variant of Shomer
  - type: text
    content: ' a Moabite woman. '
  '27':
  - type: text
    content: The account of his sons, the many prophecies about him, and the record of the restoration of the temple of God are written in the annotations on the book of the kings. And Amaziah his son succeeded him as king.
  '3':
  - type: text
    content: Jehoiada chose two wives for him, and he had sons and daughters.
  '4':
  - type: text
    content: 'Some time later Joash decided to restore the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: He called together the priests and Levites and said to them, “Go to the towns of Judah and collect the money due annually from all Israel, to repair the temple of your God. Do it now.” But the Levites did not act at once.
  '6':
  - type: text
    content: 'Therefore the king summoned Jehoiada the chief priest and said to him, “Why haven’t you required the Levites to bring in from Judah and Jerusalem the tax imposed by Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' and by the assembly of Israel for the tent of the covenant law?”'
  '7':
  - type: text
    content: Now the sons of that wicked woman Athaliah had broken into the temple of God and had used even its sacred objects for the Baals.
  '8':
  - type: text
    content: 'At the king’s command, a chest was made and placed outside, at the gate of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'A proclamation was then issued in Judah and Jerusalem that they should bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' the tax that Moses the servant of God had required of Israel in the wilderness. '
