document_id: NEH.10,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 10:1-39 is numbered 10:2-40.
  - type: text
    content: 'Those who sealed it were:'
  - type: text
    content: Nehemiah the governor, the son of Hacaliah.
  - type: text
    content: 'Zedekiah, '
  '10':
  - type: text
    content: 'and their associates: Shebaniah,'
  - type: text
    content: Hodiah, Kelita, Pelaiah, Hanan,
  '11':
  - type: text
    content: Mika, Rehob, Hashabiah,
  '12':
  - type: text
    content: Zakkur, Sherebiah, Shebaniah,
  '13':
  - type: text
    content: Hodiah, Bani and Beninu.
  '14':
  - type: text
    content: 'The leaders of the people:'
  - type: text
    content: Parosh, Pahath-Moab, Elam, Zattu, Bani,
  '15':
  - type: text
    content: Bunni, Azgad, Bebai,
  '16':
  - type: text
    content: Adonijah, Bigvai, Adin,
  '17':
  - type: text
    content: Ater, Hezekiah, Azzur,
  '18':
  - type: text
    content: Hodiah, Hashum, Bezai,
  '19':
  - type: text
    content: Hariph, Anathoth, Nebai,
  '2':
  - type: text
    content: Seraiah, Azariah, Jeremiah,
  '20':
  - type: text
    content: Magpiash, Meshullam, Hezir,
  '21':
  - type: text
    content: Meshezabel, Zadok, Jaddua,
  '22':
  - type: text
    content: Pelatiah, Hanan, Anaiah,
  '23':
  - type: text
    content: Hoshea, Hananiah, Hasshub,
  '24':
  - type: text
    content: Hallohesh, Pilha, Shobek,
  '25':
  - type: text
    content: Rehum, Hashabnah, Maaseiah,
  '26':
  - type: text
    content: Ahiah, Hanan, Anan,
  '27':
  - type: text
    content: Malluk, Harim and Baanah.
  '28':
  - type: text
    content: '“The rest of the people—priests, Levites, gatekeepers, musicians, temple servants and all who separated themselves from the neighboring peoples for the sake of the Law of God, together with their wives and all their sons and daughters who are able to understand— '
  '29':
  - type: text
    content: 'all these now join their fellow Israelites the nobles, and bind themselves with a curse and an oath to follow the Law of God given through Moses the servant of God and to obey carefully all the commands, regulations and decrees of the '
  - type: text
    content: Lord
  - type: text
    content: ' our Lord.'
  '3':
  - type: text
    content: Pashhur, Amariah, Malkijah,
  '30':
  - type: text
    content: “We promise not to give our daughters in marriage to the peoples around us or take their daughters for our sons.
  '31':
  - type: text
    content: “When the neighboring peoples bring merchandise or grain to sell on the Sabbath, we will not buy from them on the Sabbath or on any holy day. Every seventh year we will forgo working the land and will cancel all debts.
  '32':
  - type: text
    content: “We assume the responsibility for carrying out the commands to give a third of a shekel
  - type: note
    content: That is, about 1/8 ounce or about 4 grams
  - type: text
    content: ' each year for the service of the house of our God: '
  '33':
  - type: text
    content: for the bread set out on the table; for the regular grain offerings and burnt offerings; for the offerings on the Sabbaths, at the New Moon feasts and at the appointed festivals; for the holy offerings; for sin offerings
  - type: note
    content: Or purification offerings
  - type: text
    content: ' to make atonement for Israel; and for all the duties of the house of our God.'
  '34':
  - type: text
    content: '“We—the priests, the Levites and the people—have cast lots to determine when each of our families is to bring to the house of our God at set times each year a contribution of wood to burn on the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, as it is written in the Law.'
  '35':
  - type: text
    content: '“We also assume responsibility for bringing to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' each year the firstfruits of our crops and of every fruit tree.'
  '36':
  - type: text
    content: “As it is also written in the Law, we will bring the firstborn of our sons and of our cattle, of our herds and of our flocks to the house of our God, to the priests ministering there.
  '37':
  - type: text
    content: '“Moreover, we will bring to the storerooms of the house of our God, to the priests, the first of our ground meal, of our grain offerings, of the fruit of all our trees and of our new wine and olive oil. And we will bring a tithe of our crops to the Levites, for it is the Levites who collect the tithes in all the towns where we work. '
  '38':
  - type: text
    content: 'A priest descended from Aaron is to accompany the Levites when they receive the tithes, and the Levites are to bring a tenth of the tithes up to the house of our God, to the storerooms of the treasury. '
  '39':
  - type: text
    content: The people of Israel, including the Levites, are to bring their contributions of grain, new wine and olive oil to the storerooms, where the articles for the sanctuary and for the ministering priests, the gatekeepers and the musicians are also kept.
  - type: text
    content: “We will not neglect the house of our God.”
  '4':
  - type: text
    content: Hattush, Shebaniah, Malluk,
  '5':
  - type: text
    content: Harim, Meremoth, Obadiah,
  '6':
  - type: text
    content: Daniel, Ginnethon, Baruch,
  '7':
  - type: text
    content: Meshullam, Abijah, Mijamin,
  '8':
  - type: text
    content: Maaziah, Bilgai and Shemaiah.
  - type: text
    content: These were the priests.
  '9':
  - type: text
    content: 'The Levites:'
  - type: text
    content: Jeshua son of Azaniah, Binnui of the sons of Henadad, Kadmiel,
