document_id: 2SA.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amnon and Tamar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In the course of time, Amnon son of David fell in love with Tamar, the beautiful sister of Absalom son of David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Amnon became so obsessed with his sister Tamar that he made himself ill. She was a virgin, and it seemed impossible for him to do anything to her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now Amnon had an adviser named Jonadab son of Shimeah, David’s brother. Jonadab was a very shrewd man. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He asked Amnon, “Why do you, the king’s son, look so haggard morning after morning? Won’t you tell me?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Amnon said to him, “I’m in love with Tamar, my brother Absalom’s sister.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Go to bed and pretend to be ill,” Jonadab said. “When your father comes to see you, say to him, ‘I would like my sister Tamar to come and give me something to eat. Let her prepare the food in my sight so I may watch her and then eat it from her hand.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Amnon lay down and pretended to be ill. When the king came to see him, Amnon said to him, “I would like my sister Tamar to come and make some special bread in my sight, so I may eat from her hand.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David sent word to Tamar at the palace: “Go to the house of your brother Amnon and prepare some food for him.” '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So Tamar went to the house of her brother Amnon, who was lying down. She took some dough, kneaded it, made the bread in his sight and baked it. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then she took the pan and served him the bread, but he refused to eat.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Send everyone out of here,” Amnon said. So everyone left him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Amnon said to Tamar, “Bring the food here into my bedroom so I may eat from your hand.” And Tamar took the bread she had prepared and brought it to her brother Amnon in his bedroom. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But when she took it to him to eat, he grabbed her and said, “Come to bed with me, my sister.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“No, my brother!” she said to him. “Don’t force me! Such a thing should not be done in Israel! Don’t do this wicked thing. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'What about me? Where could I get rid of my disgrace? And what about you? You would be like one of the wicked fools in Israel. Please speak to the king; he will not keep me from being married to you.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But he refused to listen to her, and since he was stronger than she, he raped her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then Amnon hated her with intense hatred. In fact, he hated her more than he had loved her. Amnon said to her, “Get up and get out!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “No!” she said to him. “Sending me away would be a greater wrong than what you have already done to me.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But he refused to listen to her. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He called his personal servant and said, “Get this woman out of my sight and bolt the door after her.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So his servant put her out and bolted the door after her. She was wearing an ornate
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain; also in verse 19.
    marker-yv: yv-n
  - type: text
    text: ' robe, for this was the kind of garment the virgin daughters of the king wore. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tamar put ashes on her head and tore the ornate robe she was wearing. She put her hands on her head and went away, weeping aloud as she went.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Her brother Absalom said to her, “Has that Amnon, your brother, been with you? Be quiet for now, my sister; he is your brother. Don’t take this thing to heart.” And Tamar lived in her brother Absalom’s house, a desolate woman.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When King David heard all this, he was furious. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And Absalom never said a word to Amnon, either good or bad; he hated Amnon because he had disgraced his sister Tamar.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Absalom Kills Amnon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Two years later, when Absalom’s sheepshearers were at Baal Hazor near the border of Ephraim, he invited all the king’s sons to come there. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Absalom went to the king and said, “Your servant has had shearers come. Will the king and his attendants please join me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “No, my son,” the king replied. “All of us should not go; we would only be a burden to you.” Although Absalom urged him, he still refused to go but gave him his blessing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then Absalom said, “If not, please let my brother Amnon come with us.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The king asked him, “Why should he go with you?” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But Absalom urged him, so he sent with him Amnon and the rest of the king’s sons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Absalom ordered his men, “Listen! When Amnon is in high spirits from drinking wine and I say to you, ‘Strike Amnon down,’ then kill him. Don’t be afraid. Haven’t I given you this order? Be strong and brave.” '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: So Absalom’s men did to Amnon what Absalom had ordered. Then all the king’s sons got up, mounted their mules and fled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'While they were on their way, the report came to David: “Absalom has struck down all the king’s sons; not one of them is left.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The king stood up, tore his clothes and lay down on the ground; and all his attendants stood by with their clothes torn.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But Jonadab son of Shimeah, David’s brother, said, “My lord should not think that they killed all the princes; only Amnon is dead. This has been Absalom’s express intention ever since the day Amnon raped his sister Tamar. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: My lord the king should not be concerned about the report that all the king’s sons are dead. Only Amnon is dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Meanwhile, Absalom had fled.
- type: usfm
  marker: p
  children:
  - type: text
    text: Now the man standing watch looked up and saw many people on the road west of him, coming down the side of the hill. The watchman went and told the king, “I see men in the direction of Horonaim, on the side of the hill.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Septuagint; Hebrew does not have this sentence.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Jonadab said to the king, “See, the king’s sons have come; it has happened just as your servant said.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: As he finished speaking, the king’s sons came in, wailing loudly. The king, too, and all his attendants wept very bitterly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Absalom fled and went to Talmai son of Ammihud, the king of Geshur. But King David mourned many days for his son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'After Absalom fled and went to Geshur, he stayed there three years. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: And King David longed to go to Absalom, for he was consoled concerning Amnon’s death.
