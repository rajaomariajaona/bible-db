document_id: 1PE.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: To the Elders and the Flock
  - type: text
    content: 'To the elders among you, I appeal as a fellow elder and a witness of Christ’s sufferings who also will share in the glory to be revealed: '
  '10':
  - type: text
    content: 'And the God of all grace, who called you to his eternal glory in Christ, after you have suffered a little while, will himself restore you and make you strong, firm and steadfast. '
  '11':
  - type: text
    content: To him be the power for ever and ever. Amen.
  - type: heading
    content: Final Greetings
  '12':
  - type: text
    content: With the help of Silas,
  - type: note
    content: Greek Silvanus, a variant of Silas
  - type: text
    content: ' whom I regard as a faithful brother, I have written to you briefly, encouraging you and testifying that this is the true grace of God. Stand fast in it.'
  '13':
  - type: text
    content: 'She who is in Babylon, chosen together with you, sends you her greetings, and so does my son Mark. '
  '14':
  - type: text
    content: Greet one another with a kiss of love.
  - type: text
    content: Peace to all of you who are in Christ.
  '2':
  - type: text
    content: 'Be shepherds of God’s flock that is under your care, watching over them—not because you must, but because you are willing, as God wants you to be; not pursuing dishonest gain, but eager to serve; '
  '3':
  - type: text
    content: 'not lording it over those entrusted to you, but being examples to the flock. '
  '4':
  - type: text
    content: And when the Chief Shepherd appears, you will receive the crown of glory that will never fade away.
  '5':
  - type: text
    content: In the same way, you who are younger, submit yourselves to your elders. All of you, clothe yourselves with humility toward one another, because,
  - type: text
    content: “God opposes the proud
  - type: text
    content: but shows favor to the humble.”
  - type: note
    content: Prov. 3:34
  '6':
  - type: text
    content: 'Humble yourselves, therefore, under God’s mighty hand, that he may lift you up in due time. '
  '7':
  - type: text
    content: Cast all your anxiety on him because he cares for you.
  '8':
  - type: text
    content: 'Be alert and of sober mind. Your enemy the devil prowls around like a roaring lion looking for someone to devour. '
  '9':
  - type: text
    content: Resist him, standing firm in the faith, because you know that the family of believers throughout the world is undergoing the same kind of sufferings.
