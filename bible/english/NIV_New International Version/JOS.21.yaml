document_id: JOS.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Towns for the Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the family heads of the Levites approached Eleazar the priest, Joshua son of Nun, and the heads of the other tribal families of Israel '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '(these towns were assigned to the descendants of Aaron who were from the Kohathite clans of the Levites, because the first lot fell to them):'
  '11':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'They gave them Kiriath Arba (that is, Hebron), with its surrounding pastureland, in the hill country of Judah. (Arba was the forefather of Anak.) '
  '12':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But the fields and villages around the city they had given to Caleb son of Jephunneh as his possession.
  '13':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So to the descendants of Aaron the priest they gave Hebron (a city of refuge for one accused of murder), Libnah, '
  '14':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jattir, Eshtemoa, '
  '15':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Holon, Debir, '
  '16':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ain, Juttah and Beth Shemesh, together with their pasturelands—nine towns from these two tribes.
  '17':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And from the tribe of Benjamin they gave them: Gibeon, Geba, '
  '18':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Anathoth and Almon, together with their pasturelands—four towns.
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The total number of towns for the priests, the descendants of Aaron, came to thirteen, together with their pasturelands.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'at Shiloh in Canaan and said to them, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded through Moses that you give us towns to live in, with pasturelands for our livestock.” '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The rest of the Kohathite clans of the Levites were allotted towns from the tribe of Ephraim:'
  '21':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'In the hill country of Ephraim they were given Shechem (a city of refuge for one accused of murder) and Gezer, '
  '22':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Kibzaim and Beth Horon, together with their pasturelands—four towns.
  '23':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Also from the tribe of Dan they received: Eltekeh, Gibbethon, '
  '24':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Aijalon and Gath Rimmon, together with their pasturelands—four towns.
  '25':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'From half the tribe of Manasseh they received: Taanach and Gath Rimmon, together with their pasturelands—two towns.'
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: All these ten towns and their pasturelands were given to the rest of the Kohathite clans.
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The Levite clans of the Gershonites were given:'
  - type: usfm
    marker: li4
    children:
    - type: text
      text: from the half-tribe of Manasseh,
  - type: usfm
    marker: li4
    children:
    - type: text
      text: Golan in Bashan (a city of refuge for one accused of murder) and Be Eshterah, together with their pasturelands—two towns;
  '28':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: from the tribe of Issachar,
  - type: usfm
    marker: li4
    children:
    - type: text
      text: 'Kishion, Daberath, '
  '29':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Jarmuth and En Gannim, together with their pasturelands—four towns;
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded, the Israelites gave the Levites the following towns and pasturelands out of their own inheritance:'
  '30':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: from the tribe of Asher,
  - type: usfm
    marker: li4
    children:
    - type: text
      text: 'Mishal, Abdon, '
  '31':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Helkath and Rehob, together with their pasturelands—four towns;
  '32':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: from the tribe of Naphtali,
  - type: usfm
    marker: li4
    children:
    - type: text
      text: Kedesh in Galilee (a city of refuge for one accused of murder), Hammoth Dor and Kartan, together with their pasturelands—three towns.
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: The total number of towns of the Gershonite clans came to thirteen, together with their pasturelands.
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'The Merarite clans (the rest of the Levites) were given:'
  - type: usfm
    marker: li4
    children:
    - type: text
      text: from the tribe of Zebulun,
  - type: usfm
    marker: li4
    children:
    - type: text
      text: 'Jokneam, Kartah, '
  '35':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Dimnah and Nahalal, together with their pasturelands—four towns;
  '36':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: from the tribe of Reuben,
  - type: usfm
    marker: li4
    children:
    - type: text
      text: 'Bezer, Jahaz, '
  '37':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Kedemoth and Mephaath, together with their pasturelands—four towns;
  '38':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: from the tribe of Gad,
  - type: usfm
    marker: li4
    children:
    - type: text
      text: 'Ramoth in Gilead (a city of refuge for one accused of murder), Mahanaim, '
  '39':
  - type: usfm
    marker: li4
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Heshbon and Jazer, together with their pasturelands—four towns in all.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The first lot came out for the Kohathites, according to their clans. The Levites who were descendants of Aaron the priest were allotted thirteen towns from the tribes of Judah, Simeon and Benjamin. '
  '40':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: The total number of towns allotted to the Merarite clans, who were the rest of the Levites, came to twelve.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'The towns of the Levites in the territory held by the Israelites were forty-eight in all, together with their pasturelands. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Each of these towns had pasturelands surrounding it; this was true for all these towns.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Israel all the land he had sworn to give their ancestors, and they took possession of it and settled there. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave them rest on every side, just as he had sworn to their ancestors. Not one of their enemies withstood them; the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave all their enemies into their hands. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Not one of all the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s good promises to Israel failed; every one was fulfilled.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The rest of Kohath’s descendants were allotted ten towns from the clans of the tribes of Ephraim, Dan and half of Manasseh.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The descendants of Gershon were allotted thirteen towns from the clans of the tribes of Issachar, Asher, Naphtali and the half-tribe of Manasseh in Bashan.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The descendants of Merari, according to their clans, received twelve towns from the tribes of Reuben, Gad and Zebulun.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So the Israelites allotted to the Levites these towns and their pasturelands, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded through Moses.'
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'From the tribes of Judah and Simeon they allotted the following towns by name '
