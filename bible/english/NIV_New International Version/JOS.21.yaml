document_id: JOS.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Towns for the Levites
  - type: text
    content: 'Now the family heads of the Levites approached Eleazar the priest, Joshua son of Nun, and the heads of the other tribal families of Israel '
  '10':
  - type: text
    content: '(these towns were assigned to the descendants of Aaron who were from the Kohathite clans of the Levites, because the first lot fell to them):'
  '11':
  - type: text
    content: 'They gave them Kiriath Arba (that is, Hebron), with its surrounding pastureland, in the hill country of Judah. (Arba was the forefather of Anak.) '
  '12':
  - type: text
    content: But the fields and villages around the city they had given to Caleb son of Jephunneh as his possession.
  '13':
  - type: text
    content: 'So to the descendants of Aaron the priest they gave Hebron (a city of refuge for one accused of murder), Libnah, '
  '14':
  - type: text
    content: 'Jattir, Eshtemoa, '
  '15':
  - type: text
    content: 'Holon, Debir, '
  '16':
  - type: text
    content: Ain, Juttah and Beth Shemesh, together with their pasturelands—nine towns from these two tribes.
  '17':
  - type: text
    content: 'And from the tribe of Benjamin they gave them: Gibeon, Geba, '
  '18':
  - type: text
    content: Anathoth and Almon, together with their pasturelands—four towns.
  '19':
  - type: text
    content: The total number of towns for the priests, the descendants of Aaron, came to thirteen, together with their pasturelands.
  '2':
  - type: text
    content: 'at Shiloh in Canaan and said to them, “The '
  - type: text
    content: Lord
  - type: text
    content: ' commanded through Moses that you give us towns to live in, with pasturelands for our livestock.” '
  '20':
  - type: text
    content: 'The rest of the Kohathite clans of the Levites were allotted towns from the tribe of Ephraim:'
  '21':
  - type: text
    content: 'In the hill country of Ephraim they were given Shechem (a city of refuge for one accused of murder) and Gezer, '
  '22':
  - type: text
    content: Kibzaim and Beth Horon, together with their pasturelands—four towns.
  '23':
  - type: text
    content: 'Also from the tribe of Dan they received: Eltekeh, Gibbethon, '
  '24':
  - type: text
    content: Aijalon and Gath Rimmon, together with their pasturelands—four towns.
  '25':
  - type: text
    content: 'From half the tribe of Manasseh they received: Taanach and Gath Rimmon, together with their pasturelands—two towns.'
  '26':
  - type: text
    content: All these ten towns and their pasturelands were given to the rest of the Kohathite clans.
  '27':
  - type: text
    content: 'The Levite clans of the Gershonites were given:'
  - type: text
    content: from the half-tribe of Manasseh,
  - type: text
    content: Golan in Bashan (a city of refuge for one accused of murder) and Be Eshterah, together with their pasturelands—two towns;
  '28':
  - type: text
    content: from the tribe of Issachar,
  - type: text
    content: 'Kishion, Daberath, '
  '29':
  - type: text
    content: Jarmuth and En Gannim, together with their pasturelands—four towns;
  '3':
  - type: text
    content: 'So, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded, the Israelites gave the Levites the following towns and pasturelands out of their own inheritance:'
  '30':
  - type: text
    content: from the tribe of Asher,
  - type: text
    content: 'Mishal, Abdon, '
  '31':
  - type: text
    content: Helkath and Rehob, together with their pasturelands—four towns;
  '32':
  - type: text
    content: from the tribe of Naphtali,
  - type: text
    content: Kedesh in Galilee (a city of refuge for one accused of murder), Hammoth Dor and Kartan, together with their pasturelands—three towns.
  '33':
  - type: text
    content: The total number of towns of the Gershonite clans came to thirteen, together with their pasturelands.
  '34':
  - type: text
    content: 'The Merarite clans (the rest of the Levites) were given:'
  - type: text
    content: from the tribe of Zebulun,
  - type: text
    content: 'Jokneam, Kartah, '
  '35':
  - type: text
    content: Dimnah and Nahalal, together with their pasturelands—four towns;
  '36':
  - type: text
    content: from the tribe of Reuben,
  - type: text
    content: 'Bezer, Jahaz, '
  '37':
  - type: text
    content: Kedemoth and Mephaath, together with their pasturelands—four towns;
  '38':
  - type: text
    content: from the tribe of Gad,
  - type: text
    content: 'Ramoth in Gilead (a city of refuge for one accused of murder), Mahanaim, '
  '39':
  - type: text
    content: Heshbon and Jazer, together with their pasturelands—four towns in all.
  '4':
  - type: text
    content: 'The first lot came out for the Kohathites, according to their clans. The Levites who were descendants of Aaron the priest were allotted thirteen towns from the tribes of Judah, Simeon and Benjamin. '
  '40':
  - type: text
    content: The total number of towns allotted to the Merarite clans, who were the rest of the Levites, came to twelve.
  '41':
  - type: text
    content: 'The towns of the Levites in the territory held by the Israelites were forty-eight in all, together with their pasturelands. '
  '42':
  - type: text
    content: Each of these towns had pasturelands surrounding it; this was true for all these towns.
  '43':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Israel all the land he had sworn to give their ancestors, and they took possession of it and settled there. '
  '44':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave them rest on every side, just as he had sworn to their ancestors. Not one of their enemies withstood them; the '
  - type: text
    content: Lord
  - type: text
    content: ' gave all their enemies into their hands. '
  '45':
  - type: text
    content: 'Not one of all the '
  - type: text
    content: Lord
  - type: text
    content: ’s good promises to Israel failed; every one was fulfilled.
  '5':
  - type: text
    content: The rest of Kohath’s descendants were allotted ten towns from the clans of the tribes of Ephraim, Dan and half of Manasseh.
  '6':
  - type: text
    content: The descendants of Gershon were allotted thirteen towns from the clans of the tribes of Issachar, Asher, Naphtali and the half-tribe of Manasseh in Bashan.
  '7':
  - type: text
    content: The descendants of Merari, according to their clans, received twelve towns from the tribes of Reuben, Gad and Zebulun.
  '8':
  - type: text
    content: 'So the Israelites allotted to the Levites these towns and their pasturelands, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded through Moses.'
  '9':
  - type: text
    content: 'From the tribes of Judah and Simeon they allotted the following towns by name '
