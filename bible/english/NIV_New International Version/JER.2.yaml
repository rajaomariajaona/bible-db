document_id: JER.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Forsakes God
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: Cross over to the coasts of Cyprus and look,
  - type: text
    content: send to Kedar
  - type: note
    content: In the Syro-Arabian desert
  - type: text
    content: ' and observe closely;'
  - type: text
    content: 'see if there has ever been anything like this:'
  '11':
  - type: text
    content: Has a nation ever changed its gods?
  - type: text
    content: (Yet they are not gods at all.)
  - type: text
    content: But my people have exchanged their glorious God
  - type: text
    content: for worthless idols.
  '12':
  - type: text
    content: Be appalled at this, you heavens,
  - type: text
    content: and shudder with great horror,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: '“My people have committed two sins:'
  - type: text
    content: They have forsaken me,
  - type: text
    content: the spring of living water,
  - type: text
    content: and have dug their own cisterns,
  - type: text
    content: broken cisterns that cannot hold water.
  '14':
  - type: text
    content: Is Israel a servant, a slave by birth?
  - type: text
    content: Why then has he become plunder?
  '15':
  - type: text
    content: Lions have roared;
  - type: text
    content: they have growled at him.
  - type: text
    content: They have laid waste his land;
  - type: text
    content: his towns are burned and deserted.
  '16':
  - type: text
    content: Also, the men of Memphis and Tahpanhes
  - type: text
    content: have cracked your skull.
  '17':
  - type: text
    content: Have you not brought this on yourselves
  - type: text
    content: 'by forsaking the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: when he led you in the way?
  '18':
  - type: text
    content: Now why go to Egypt
  - type: text
    content: to drink water from the Nile
  - type: note
    content: Hebrew Shihor; that is, a branch of the Nile
  - type: text
    content: '?'
  - type: text
    content: And why go to Assyria
  - type: text
    content: to drink water from the Euphrates?
  '19':
  - type: text
    content: Your wickedness will punish you;
  - type: text
    content: your backsliding will rebuke you.
  - type: text
    content: Consider then and realize
  - type: text
    content: how evil and bitter it is for you
  - type: text
    content: 'when you forsake the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: and have no awe of me,”
  - type: text
    content: 'declares the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '2':
  - type: text
    content: '“Go and proclaim in the hearing of Jerusalem:'
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘I remember the devotion of your youth,
  - type: text
    content: how as a bride you loved me
  - type: text
    content: and followed me through the wilderness,
  - type: text
    content: through a land not sown.
  '20':
  - type: text
    content: “Long ago you broke off your yoke
  - type: text
    content: and tore off your bonds;
  - type: text
    content: you said, ‘I will not serve you!’
  - type: text
    content: Indeed, on every high hill
  - type: text
    content: and under every spreading tree
  - type: text
    content: you lay down as a prostitute.
  '21':
  - type: text
    content: I had planted you like a choice vine
  - type: text
    content: of sound and reliable stock.
  - type: text
    content: How then did you turn against me
  - type: text
    content: into a corrupt, wild vine?
  '22':
  - type: text
    content: Although you wash yourself with soap
  - type: text
    content: and use an abundance of cleansing powder,
  - type: text
    content: the stain of your guilt is still before me,”
  - type: text
    content: 'declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: “How can you say, ‘I am not defiled;
  - type: text
    content: I have not run after the Baals’?
  - type: text
    content: See how you behaved in the valley;
  - type: text
    content: consider what you have done.
  - type: text
    content: You are a swift she-camel
  - type: text
    content: running here and there,
  '24':
  - type: text
    content: a wild donkey accustomed to the desert,
  - type: text
    content: sniffing the wind in her craving—
  - type: text
    content: in her heat who can restrain her?
  - type: text
    content: Any males that pursue her need not tire themselves;
  - type: text
    content: at mating time they will find her.
  '25':
  - type: text
    content: Do not run until your feet are bare
  - type: text
    content: and your throat is dry.
  - type: text
    content: But you said, ‘It’s no use!
  - type: text
    content: I love foreign gods,
  - type: text
    content: and I must go after them.’
  '26':
  - type: text
    content: “As a thief is disgraced when he is caught,
  - type: text
    content: so the people of Israel are disgraced—
  - type: text
    content: they, their kings and their officials,
  - type: text
    content: their priests and their prophets.
  '27':
  - type: text
    content: They say to wood, ‘You are my father,’
  - type: text
    content: and to stone, ‘You gave me birth.’
  - type: text
    content: They have turned their backs to me
  - type: text
    content: and not their faces;
  - type: text
    content: yet when they are in trouble, they say,
  - type: text
    content: ‘Come and save us!’
  '28':
  - type: text
    content: Where then are the gods you made for yourselves?
  - type: text
    content: Let them come if they can save you
  - type: text
    content: when you are in trouble!
  - type: text
    content: For you, Judah, have as many gods
  - type: text
    content: as you have towns.
  '29':
  - type: text
    content: “Why do you bring charges against me?
  - type: text
    content: You have all rebelled against me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'Israel was holy to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the firstfruits of his harvest;
  - type: text
    content: all who devoured her were held guilty,
  - type: text
    content: and disaster overtook them,’ ”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '30':
  - type: text
    content: “In vain I punished your people;
  - type: text
    content: they did not respond to correction.
  - type: text
    content: Your sword has devoured your prophets
  - type: text
    content: like a ravenous lion.
  '31':
  - type: text
    content: '“You of this generation, consider the word of the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “Have I been a desert to Israel
  - type: text
    content: or a land of great darkness?
  - type: text
    content: Why do my people say, ‘We are free to roam;
  - type: text
    content: we will come to you no more’?
  '32':
  - type: text
    content: Does a young woman forget her jewelry,
  - type: text
    content: a bride her wedding ornaments?
  - type: text
    content: Yet my people have forgotten me,
  - type: text
    content: days without number.
  '33':
  - type: text
    content: How skilled you are at pursuing love!
  - type: text
    content: Even the worst of women can learn from your ways.
  '34':
  - type: text
    content: On your clothes is found
  - type: text
    content: the lifeblood of the innocent poor,
  - type: text
    content: though you did not catch them breaking in.
  - type: text
    content: Yet in spite of all this
  '35':
  - type: text
    content: you say, ‘I am innocent;
  - type: text
    content: he is not angry with me.’
  - type: text
    content: But I will pass judgment on you
  - type: text
    content: because you say, ‘I have not sinned.’
  '36':
  - type: text
    content: Why do you go about so much,
  - type: text
    content: changing your ways?
  - type: text
    content: You will be disappointed by Egypt
  - type: text
    content: as you were by Assyria.
  '37':
  - type: text
    content: You will also leave that place
  - type: text
    content: with your hands on your head,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected those you trust;'
  - type: text
    content: you will not be helped by them.
  '4':
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', you descendants of Jacob,'
  - type: text
    content: all you clans of Israel.
  '5':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “What fault did your ancestors find in me,
  - type: text
    content: that they strayed so far from me?
  - type: text
    content: They followed worthless idols
  - type: text
    content: and became worthless themselves.
  '6':
  - type: text
    content: 'They did not ask, ‘Where is the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who brought us up out of Egypt
  - type: text
    content: and led us through the barren wilderness,
  - type: text
    content: through a land of deserts and ravines,
  - type: text
    content: a land of drought and utter darkness,
  - type: text
    content: a land where no one travels and no one lives?’
  '7':
  - type: text
    content: I brought you into a fertile land
  - type: text
    content: to eat its fruit and rich produce.
  - type: text
    content: But you came and defiled my land
  - type: text
    content: and made my inheritance detestable.
  '8':
  - type: text
    content: The priests did not ask,
  - type: text
    content: '‘Where is the '
  - type: text
    content: Lord
  - type: text
    content: ?’
  - type: text
    content: Those who deal with the law did not know me;
  - type: text
    content: the leaders rebelled against me.
  - type: text
    content: The prophets prophesied by Baal,
  - type: text
    content: following worthless idols.
  '9':
  - type: text
    content: “Therefore I bring charges against you again,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “And I will bring charges against your children’s children.
