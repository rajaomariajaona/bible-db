document_id: JER.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Forsakes God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Cross over to the coasts of Cyprus and look,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: send to Kedar
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Syro-Arabian desert
      marker-yv: yv-n
    - type: text
      text: ' and observe closely;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'see if there has ever been anything like this:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Has a nation ever changed its gods?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: (Yet they are not gods at all.)
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my people have exchanged their glorious God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for worthless idols.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Be appalled at this, you heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shudder with great horror,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“My people have committed two sins:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have forsaken me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the spring of living water,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and have dug their own cisterns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: broken cisterns that cannot hold water.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Is Israel a servant, a slave by birth?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why then has he become plunder?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Lions have roared;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have growled at him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have laid waste his land;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his towns are burned and deserted.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Also, the men of Memphis and Tahpanhes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have cracked your skull.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Have you not brought this on yourselves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by forsaking the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he led you in the way?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Now why go to Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to drink water from the Nile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
        - type: usfm
          marker: tl
          children:
          - type: text
            text: Shihor
        - type: text
          text: ; that is, a branch of the Nile
      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And why go to Assyria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to drink water from the Euphrates?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Your wickedness will punish you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your backsliding will rebuke you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Consider then and realize
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how evil and bitter it is for you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'when you forsake the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have no awe of me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Go and proclaim in the hearing of Jerusalem:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘I remember the devotion of your youth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how as a bride you loved me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and followed me through the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through a land not sown.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Long ago you broke off your yoke
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tore off your bonds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you said, ‘I will not serve you!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, on every high hill
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and under every spreading tree
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you lay down as a prostitute.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I had planted you like a choice vine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of sound and reliable stock.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How then did you turn against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into a corrupt, wild vine?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Although you wash yourself with soap
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and use an abundance of cleansing powder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the stain of your guilt is still before me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “How can you say, ‘I am not defiled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not run after the Baals’?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how you behaved in the valley;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: consider what you have done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are a swift she-camel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: running here and there,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: a wild donkey accustomed to the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sniffing the wind in her craving—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in her heat who can restrain her?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Any males that pursue her need not tire themselves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at mating time they will find her.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Do not run until your feet are bare
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your throat is dry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you said, ‘It’s no use!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I love foreign gods,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I must go after them.’
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “As a thief is disgraced when he is caught,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so the people of Israel are disgraced—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they, their kings and their officials,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their priests and their prophets.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: They say to wood, ‘You are my father,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to stone, ‘You gave me birth.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have turned their backs to me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not their faces;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet when they are in trouble, they say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Come and save us!’
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Where then are the gods you made for yourselves?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them come if they can save you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you are in trouble!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you, Judah, have as many gods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you have towns.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “Why do you bring charges against me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have all rebelled against me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Israel was holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the firstfruits of his harvest;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all who devoured her were held guilty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and disaster overtook them,’ ”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “In vain I punished your people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they did not respond to correction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your sword has devoured your prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a ravenous lion.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“You of this generation, consider the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Have I been a desert to Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or a land of great darkness?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do my people say, ‘We are free to roam;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will come to you no more’?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Does a young woman forget her jewelry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a bride her wedding ornaments?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet my people have forgotten me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: days without number.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: How skilled you are at pursuing love!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even the worst of women can learn from your ways.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: On your clothes is found
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the lifeblood of the innocent poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though you did not catch them breaking in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet in spite of all this
  '35':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: you say, ‘I am innocent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is not angry with me.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will pass judgment on you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you say, ‘I have not sinned.’
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Why do you go about so much,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: changing your ways?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be disappointed by Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you were by Assyria.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: You will also leave that place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with your hands on your head,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has rejected those you trust;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will not be helped by them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you descendants of Jacob,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all you clans of Israel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What fault did your ancestors find in me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they strayed so far from me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They followed worthless idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and became worthless themselves.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They did not ask, ‘Where is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who brought us up out of Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and led us through the barren wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through a land of deserts and ravines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a land of drought and utter darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a land where no one travels and no one lives?’
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I brought you into a fertile land
  - type: usfm
