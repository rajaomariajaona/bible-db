document_id: 1KI.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Flees to Horeb
  - type: text
    content: 'Now Ahab told Jezebel everything Elijah had done and how he had killed all the prophets with the sword. '
  '10':
  - type: text
    content: 'He replied, “I have been very zealous for the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty. The Israelites have rejected your covenant, torn down your altars, and put your prophets to death with the sword. I am the only one left, and now they are trying to kill me too.”'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Go out and stand on the mountain in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ', for the '
  - type: text
    content: Lord
  - type: text
    content: ' is about to pass by.”'
  - type: text
    content: 'Then a great and powerful wind tore the mountains apart and shattered the rocks before the '
  - type: text
    content: Lord
  - type: text
    content: ', but the '
  - type: text
    content: Lord
  - type: text
    content: ' was not in the wind. After the wind there was an earthquake, but the '
  - type: text
    content: Lord
  - type: text
    content: ' was not in the earthquake. '
  '12':
  - type: text
    content: 'After the earthquake came a fire, but the '
  - type: text
    content: Lord
  - type: text
    content: ' was not in the fire. And after the fire came a gentle whisper. '
  '13':
  - type: text
    content: When Elijah heard it, he pulled his cloak over his face and went out and stood at the mouth of the cave.
  - type: text
    content: Then a voice said to him, “What are you doing here, Elijah?”
  '14':
  - type: text
    content: 'He replied, “I have been very zealous for the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty. The Israelites have rejected your covenant, torn down your altars, and put your prophets to death with the sword. I am the only one left, and now they are trying to kill me too.”'
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Go back the way you came, and go to the Desert of Damascus. When you get there, anoint Hazael king over Aram. '
  '16':
  - type: text
    content: 'Also, anoint Jehu son of Nimshi king over Israel, and anoint Elisha son of Shaphat from Abel Meholah to succeed you as prophet. '
  '17':
  - type: text
    content: 'Jehu will put to death any who escape the sword of Hazael, and Elisha will put to death any who escape the sword of Jehu. '
  '18':
  - type: text
    content: Yet I reserve seven thousand in Israel—all whose knees have not bowed down to Baal and whose mouths have not kissed him.”
  - type: heading
    content: The Call of Elisha
  '19':
  - type: text
    content: 'So Elijah went from there and found Elisha son of Shaphat. He was plowing with twelve yoke of oxen, and he himself was driving the twelfth pair. Elijah went up to him and threw his cloak around him. '
  '2':
  - type: text
    content: So Jezebel sent a messenger to Elijah to say, “May the gods deal with me, be it ever so severely, if by this time tomorrow I do not make your life like that of one of them.”
  '20':
  - type: text
    content: Elisha then left his oxen and ran after Elijah. “Let me kiss my father and mother goodbye,” he said, “and then I will come with you.”
  - type: text
    content: “Go back,” Elijah replied. “What have I done to you?”
  '21':
  - type: text
    content: So Elisha left him and went back. He took his yoke of oxen and slaughtered them. He burned the plowing equipment to cook the meat and gave it to the people, and they ate. Then he set out to follow Elijah and became his servant.
  '3':
  - type: text
    content: Elijah was afraid
  - type: note
    content: Or Elijah saw
  - type: text
    content: ' and ran for his life. When he came to Beersheba in Judah, he left his servant there, '
  '4':
  - type: text
    content: 'while he himself went a day’s journey into the wilderness. He came to a broom bush, sat down under it and prayed that he might die. “I have had enough, '
  - type: text
    content: Lord
  - type: text
    content: ',” he said. “Take my life; I am no better than my ancestors.” '
  '5':
  - type: text
    content: Then he lay down under the bush and fell asleep.
  - type: text
    content: 'All at once an angel touched him and said, “Get up and eat.” '
  '6':
  - type: text
    content: He looked around, and there by his head was some bread baked over hot coals, and a jar of water. He ate and drank and then lay down again.
  '7':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' came back a second time and touched him and said, “Get up and eat, for the journey is too much for you.” '
  '8':
  - type: text
    content: 'So he got up and ate and drank. Strengthened by that food, he traveled forty days and forty nights until he reached Horeb, the mountain of God. '
  '9':
  - type: text
    content: There he went into a cave and spent the night.
  - type: heading
    content: The Lord Appears to Elijah
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him: “What are you doing here, Elijah?”'
