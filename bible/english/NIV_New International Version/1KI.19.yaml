document_id: 1KI.19,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elijah Flees to Horeb
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Ahab told Jezebel everything Elijah had done and how he had killed all the prophets with the sword. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, “I have been very zealous for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty. The Israelites have rejected your covenant, torn down your altars, and put your prophets to death with the sword. I am the only one left, and now they are trying to kill me too.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Go out and stand on the mountain in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is about to pass by.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a great and powerful wind tore the mountains apart and shattered the rocks before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was not in the wind. After the wind there was an earthquake, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was not in the earthquake. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the earthquake came a fire, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was not in the fire. And after the fire came a gentle whisper. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Elijah heard it, he pulled his cloak over his face and went out and stood at the mouth of the cave.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then a voice said to him, “What are you doing here, Elijah?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, “I have been very zealous for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty. The Israelites have rejected your covenant, torn down your altars, and put your prophets to death with the sword. I am the only one left, and now they are trying to kill me too.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Go back the way you came, and go to the Desert of Damascus. When you get there, anoint Hazael king over Aram. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also, anoint Jehu son of Nimshi king over Israel, and anoint Elisha son of Shaphat from Abel Meholah to succeed you as prophet. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehu will put to death any who escape the sword of Hazael, and Elisha will put to death any who escape the sword of Jehu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet I reserve seven thousand in Israel—all whose knees have not bowed down to Baal and whose mouths have not kissed him.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Call of Elisha
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Elijah went from there and found Elisha son of Shaphat. He was plowing with twelve yoke of oxen, and he himself was driving the twelfth pair. Elijah went up to him and threw his cloak around him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jezebel sent a messenger to Elijah to say, “May the gods deal with me, be it ever so severely, if by this time tomorrow I do not make your life like that of one of them.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha then left his oxen and ran after Elijah. “Let me kiss my father and mother goodbye,” he said, “and then I will come with you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go back,” Elijah replied. “What have I done to you?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Elisha left him and went back. He took his yoke of oxen and slaughtered them. He burned the plowing equipment to cook the meat and gave it to the people, and they ate. Then he set out to follow Elijah and became his servant.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elijah was afraid
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Elijah saw
      marker-yv: yv-n
    - type: text
      text: ' and ran for his life. When he came to Beersheba in Judah, he left his servant there, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'while he himself went a day’s journey into the wilderness. He came to a broom bush, sat down under it and prayed that he might die. “I have had enough, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',” he said. “Take my life; I am no better than my ancestors.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he lay down under the bush and fell asleep.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All at once an angel touched him and said, “Get up and eat.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He looked around, and there by his head was some bread baked over hot coals, and a jar of water. He ate and drank and then lay down again.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came back a second time and touched him and said, “Get up and eat, for the journey is too much for you.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he got up and ate and drank. Strengthened by that food, he traveled forty days and forty nights until he reached Horeb, the mountain of God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There he went into a cave and spent the night.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Appears to Elijah'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to him: “What are you doing here, Elijah?”'
