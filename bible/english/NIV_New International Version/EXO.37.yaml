document_id: EXO.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ark
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Bezalel made the ark of acacia wood—two and a half cubits long, a cubit and a half wide, and a cubit and a half high.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 3/4 feet long and 2 1/4 feet wide and high or about 1.1 meters long and 68 centimeters wide and high; similarly in verse 6
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He overlaid it with pure gold, both inside and out, and made a gold molding around it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He cast four gold rings for it and fastened them to its four feet, with two rings on one side and two rings on the other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then he made poles of acacia wood and overlaid them with gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And he inserted the poles into the rings on the sides of the ark to carry it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He made the atonement cover of pure gold—two and a half cubits long and a cubit and a half wide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he made two cherubim out of hammered gold at the ends of the cover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He made one cherub on one end and the second cherub on the other; at the two ends he made them of one piece with the cover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The cherubim had their wings spread upward, overshadowing the cover with them. The cherubim faced each other, looking toward the cover.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Table
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 11-29
    marker-yv: yv-n
  - type: text
    text: ' made the table of acacia wood—two cubits long, a cubit wide and a cubit and a half high.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 feet long, 1 1/2 feet wide and 2 1/4 feet high or about 90 centimeters long, 45 centimeters wide and 68 centimeters high
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then they overlaid it with pure gold and made a gold molding around it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They also made around it a rim a handbreadth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 inches or about 7.5 centimeters
    marker-yv: yv-n
  - type: text
    text: ' wide and put a gold molding on the rim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They cast four gold rings for the table and fastened them to the four corners, where the four legs were. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The rings were put close to the rim to hold the poles used in carrying the table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The poles for carrying the table were made of acacia wood and were overlaid with gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And they made from pure gold the articles for the table—its plates and dishes and bowls and its pitchers for the pouring out of drink offerings.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lampstand
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They made the lampstand of pure gold. They hammered out its base and shaft, and made its flowerlike cups, buds and blossoms of one piece with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Six branches extended from the sides of the lampstand—three on one side and three on the other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Three cups shaped like almond flowers with buds and blossoms were on one branch, three on the next branch and the same for all six branches extending from the lampstand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And on the lampstand were four cups shaped like almond flowers with buds and blossoms. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'One bud was under the first pair of branches extending from the lampstand, a second bud under the second pair, and a third bud under the third pair—six branches in all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The buds and the branches were all of one piece with the lampstand, hammered out of pure gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They made its seven lamps, as well as its wick trimmers and trays, of pure gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: They made the lampstand and all its accessories from one talent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 75 pounds or about 34 kilograms
    marker-yv: yv-n
  - type: text
    text: ' of pure gold.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Altar of Incense
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: They made the altar of incense out of acacia wood. It was square, a cubit long and a cubit wide and two cubits high
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1 1/2 feet long and wide and 3 feet high or about 45 centimeters long and wide and 90 centimeters high
    marker-yv: yv-n
  - type: text
    text: '—its horns of one piece with it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They overlaid the top and all the sides and the horns with pure gold, and made a gold molding around it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They made two gold rings below the molding—two on each of the opposite sides—to hold the poles used to carry it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They made the poles of acacia wood and overlaid them with gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: They also made the sacred anointing oil and the pure, fragrant incense—the work of a perfumer.
