document_id: EXO.37,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark
  - type: text
    content: Bezalel made the ark of acacia wood—two and a half cubits long, a cubit and a half wide, and a cubit and a half high.
  - type: note
    content: That is, about 3 3/4 feet long and 2 1/4 feet wide and high or about 1.1 meters long and 68 centimeters wide and high; similarly in verse 6
  - type: text
    content: ' '
  '10':
  - type: text
    content: They
  - type: note
    content: Or He; also in verses 11-29
  - type: text
    content: ' made the table of acacia wood—two cubits long, a cubit wide and a cubit and a half high.'
  - type: note
    content: That is, about 3 feet long, 1 1/2 feet wide and 2 1/4 feet high or about 90 centimeters long, 45 centimeters wide and 68 centimeters high
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Then they overlaid it with pure gold and made a gold molding around it. '
  '12':
  - type: text
    content: They also made around it a rim a handbreadth
  - type: note
    content: That is, about 3 inches or about 7.5 centimeters
  - type: text
    content: ' wide and put a gold molding on the rim. '
  '13':
  - type: text
    content: 'They cast four gold rings for the table and fastened them to the four corners, where the four legs were. '
  '14':
  - type: text
    content: 'The rings were put close to the rim to hold the poles used in carrying the table. '
  '15':
  - type: text
    content: 'The poles for carrying the table were made of acacia wood and were overlaid with gold. '
  '16':
  - type: text
    content: And they made from pure gold the articles for the table—its plates and dishes and bowls and its pitchers for the pouring out of drink offerings.
  - type: heading
    content: The Lampstand
  '17':
  - type: text
    content: 'They made the lampstand of pure gold. They hammered out its base and shaft, and made its flowerlike cups, buds and blossoms of one piece with them. '
  '18':
  - type: text
    content: 'Six branches extended from the sides of the lampstand—three on one side and three on the other. '
  '19':
  - type: text
    content: 'Three cups shaped like almond flowers with buds and blossoms were on one branch, three on the next branch and the same for all six branches extending from the lampstand. '
  '2':
  - type: text
    content: 'He overlaid it with pure gold, both inside and out, and made a gold molding around it. '
  '20':
  - type: text
    content: 'And on the lampstand were four cups shaped like almond flowers with buds and blossoms. '
  '21':
  - type: text
    content: 'One bud was under the first pair of branches extending from the lampstand, a second bud under the second pair, and a third bud under the third pair—six branches in all. '
  '22':
  - type: text
    content: The buds and the branches were all of one piece with the lampstand, hammered out of pure gold.
  '23':
  - type: text
    content: 'They made its seven lamps, as well as its wick trimmers and trays, of pure gold. '
  '24':
  - type: text
    content: They made the lampstand and all its accessories from one talent
  - type: note
    content: That is, about 75 pounds or about 34 kilograms
  - type: text
    content: ' of pure gold.'
  - type: heading
    content: The Altar of Incense
  '25':
  - type: text
    content: They made the altar of incense out of acacia wood. It was square, a cubit long and a cubit wide and two cubits high
  - type: note
    content: That is, about 1 1/2 feet long and wide and 3 feet high or about 45 centimeters long and wide and 90 centimeters high
  - type: text
    content: '—its horns of one piece with it. '
  '26':
  - type: text
    content: 'They overlaid the top and all the sides and the horns with pure gold, and made a gold molding around it. '
  '27':
  - type: text
    content: 'They made two gold rings below the molding—two on each of the opposite sides—to hold the poles used to carry it. '
  '28':
  - type: text
    content: They made the poles of acacia wood and overlaid them with gold.
  '29':
  - type: text
    content: They also made the sacred anointing oil and the pure, fragrant incense—the work of a perfumer.
  '3':
  - type: text
    content: 'He cast four gold rings for it and fastened them to its four feet, with two rings on one side and two rings on the other. '
  '4':
  - type: text
    content: 'Then he made poles of acacia wood and overlaid them with gold. '
  '5':
  - type: text
    content: And he inserted the poles into the rings on the sides of the ark to carry it.
  '6':
  - type: text
    content: 'He made the atonement cover of pure gold—two and a half cubits long and a cubit and a half wide. '
  '7':
  - type: text
    content: 'Then he made two cherubim out of hammered gold at the ends of the cover. '
  '8':
  - type: text
    content: 'He made one cherub on one end and the second cherub on the other; at the two ends he made them of one piece with the cover. '
  '9':
  - type: text
    content: The cherubim had their wings spread upward, overshadowing the cover with them. The cherubim faced each other, looking toward the cover.
  - type: heading
    content: The Table
