document_id: ROM.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Faithfulness
  - type: text
    content: 'What advantage, then, is there in being a Jew, or what value is there in circumcision? '
  '10':
  - type: text
    content: 'As it is written:'
  - type: text
    content: “There is no one righteous, not even one;
  '11':
  - type: text
    content: there is no one who understands;
  - type: text
    content: there is no one who seeks God.
  '12':
  - type: text
    content: All have turned away,
  - type: text
    content: they have together become worthless;
  - type: text
    content: there is no one who does good,
  - type: text
    content: not even one.”
  - type: note
    content: Psalms 14:1-3; 53:1-3; Eccles. 7:20
  '13':
  - type: text
    content: “Their throats are open graves;
  - type: text
    content: their tongues practice deceit.”
  - type: note
    content: Psalm 5:9
  - type: text
    content: “The poison of vipers is on their lips.”
  - type: note
    content: Psalm 140:3
  '14':
  - type: text
    content: “Their mouths are full of cursing and bitterness.”
  - type: note
    content: Psalm 10:7 (see Septuagint)
  '15':
  - type: text
    content: “Their feet are swift to shed blood;
  '16':
  - type: text
    content: ruin and misery mark their ways,
  '17':
  - type: text
    content: and the way of peace they do not know.”
  - type: note
    content: Isaiah 59:7,8
  '18':
  - type: text
    content: “There is no fear of God before their eyes.”
  - type: note
    content: Psalm 36:1
  '19':
  - type: text
    content: 'Now we know that whatever the law says, it says to those who are under the law, so that every mouth may be silenced and the whole world held accountable to God. '
  '2':
  - type: text
    content: Much in every way! First of all, the Jews have been entrusted with the very words of God.
  '20':
  - type: text
    content: Therefore no one will be declared righteous in God’s sight by the works of the law; rather, through the law we become conscious of our sin.
  - type: heading
    content: Righteousness Through Faith
  '21':
  - type: text
    content: 'But now apart from the law the righteousness of God has been made known, to which the Law and the Prophets testify. '
  '22':
  - type: text
    content: This righteousness is given through faith in
  - type: note
    content: Or through the faithfulness of
  - type: text
    content: ' Jesus Christ to all who believe. There is no difference between Jew and Gentile, '
  '23':
  - type: text
    content: 'for all have sinned and fall short of the glory of God, '
  '24':
  - type: text
    content: 'and all are justified freely by his grace through the redemption that came by Christ Jesus. '
  '25':
  - type: text
    content: God presented Christ as a sacrifice of atonement,
  - type: note
    content: The Greek for sacrifice of atonement refers to the atonement cover on the ark of the covenant (see Lev. 16:15,16).
  - type: text
    content: ' through the shedding of his blood—to be received by faith. He did this to demonstrate his righteousness, because in his forbearance he had left the sins committed beforehand unpunished— '
  '26':
  - type: text
    content: he did it to demonstrate his righteousness at the present time, so as to be just and the one who justifies those who have faith in Jesus.
  '27':
  - type: text
    content: 'Where, then, is boasting? It is excluded. Because of what law? The law that requires works? No, because of the law that requires faith. '
  '28':
  - type: text
    content: 'For we maintain that a person is justified by faith apart from the works of the law. '
  '29':
  - type: text
    content: 'Or is God the God of Jews only? Is he not the God of Gentiles too? Yes, of Gentiles too, '
  '3':
  - type: text
    content: 'What if some were unfaithful? Will their unfaithfulness nullify God’s faithfulness? '
  '30':
  - type: text
    content: 'since there is only one God, who will justify the circumcised by faith and the uncircumcised through that same faith. '
  '31':
  - type: text
    content: Do we, then, nullify the law by this faith? Not at all! Rather, we uphold the law.
  '4':
  - type: text
    content: 'Not at all! Let God be true, and every human being a liar. As it is written:'
  - type: text
    content: “So that you may be proved right when you speak
  - type: text
    content: and prevail when you judge.”
  - type: note
    content: Psalm 51:4
  '5':
  - type: text
    content: 'But if our unrighteousness brings out God’s righteousness more clearly, what shall we say? That God is unjust in bringing his wrath on us? (I am using a human argument.) '
  '6':
  - type: text
    content: 'Certainly not! If that were so, how could God judge the world? '
  '7':
  - type: text
    content: 'Someone might argue, “If my falsehood enhances God’s truthfulness and so increases his glory, why am I still condemned as a sinner?” '
  '8':
  - type: text
    content: Why not say—as some slanderously claim that we say—“Let us do evil that good may result”? Their condemnation is just!
  - type: heading
    content: No One Is Righteous
  '9':
  - type: text
    content: 'What shall we conclude then? Do we have any advantage? Not at all! For we have already made the charge that Jews and Gentiles alike are all under the power of sin. '
