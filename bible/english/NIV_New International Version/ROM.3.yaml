document_id: ROM.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Faithfulness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'What advantage, then, is there in being a Jew, or what value is there in circumcision? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Much in every way! First of all, the Jews have been entrusted with the very words of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'What if some were unfaithful? Will their unfaithfulness nullify God’s faithfulness? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Not at all! Let God be true, and every human being a liar. As it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “So that you may be proved right when you speak
- type: usfm
  marker: q2
  children:
  - type: text
    text: and prevail when you judge.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 51:4
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But if our unrighteousness brings out God’s righteousness more clearly, what shall we say? That God is unjust in bringing his wrath on us? (I am using a human argument.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Certainly not! If that were so, how could God judge the world? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Someone might argue, “If my falsehood enhances God’s truthfulness and so increases his glory, why am I still condemned as a sinner?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Why not say—as some slanderously claim that we say—“Let us do evil that good may result”? Their condemnation is just!
- type: usfm
  marker: s1
  children:
  - type: text
    text: No One Is Righteous
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'What shall we conclude then? Do we have any advantage? Not at all! For we have already made the charge that Jews and Gentiles alike are all under the power of sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “There is no one righteous, not even one;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: there is no one who understands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no one who seeks God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: All have turned away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have together become worthless;
- type: usfm
  marker: q1
  children:
  - type: text
    text: there is no one who does good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not even one.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalms 14:1-3; 53:1-3; Eccles. 7:20
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Their throats are open graves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their tongues practice deceit.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 5:9
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The poison of vipers is on their lips.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 140:3
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Their mouths are full of cursing and bitterness.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 10:7 (see Septuagint)
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Their feet are swift to shed blood;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ruin and misery mark their ways,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: and the way of peace they do not know.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 59:7,8
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “There is no fear of God before their eyes.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 36:1
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now we know that whatever the law says, it says to those who are under the law, so that every mouth may be silenced and the whole world held accountable to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Therefore no one will be declared righteous in God’s sight by the works of the law; rather, through the law we become conscious of our sin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Righteousness Through Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But now apart from the law the righteousness of God has been made known, to which the Law and the Prophets testify. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: This righteousness is given through faith in
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: through the faithfulness of
    marker-yv: yv-n
  - type: text
    text: ' Jesus Christ to all who believe. There is no difference between Jew and Gentile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'for all have sinned and fall short of the glory of God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and all are justified freely by his grace through the redemption that came by Christ Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: God presented Christ as a sacrifice of atonement,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sacrifice of atonement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: refers to the atonement cover on the ark of the covenant (see Lev. 16:15,16).
    marker-yv: yv-n
  - type: text
    text: ' through the shedding of his blood—to be received by faith. He did this to demonstrate his righteousness, because in his forbearance he had left the sins committed beforehand unpunished— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: he did it to demonstrate his righteousness at the present time, so as to be just and the one who justifies those who have faith in Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Where, then, is boasting? It is excluded. Because of what law? The law that requires works? No, because of the law that requires faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'For we maintain that a person is justified by faith apart from the works of the law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Or is God the God of Jews only? Is he not the God of Gentiles too? Yes, of Gentiles too, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'since there is only one God, who will justify the circumcised by faith and the uncircumcised through that same faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Do we, then, nullify the law by this faith? Not at all! Rather, we uphold the law.
