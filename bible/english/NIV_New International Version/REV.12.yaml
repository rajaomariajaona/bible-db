document_id: REV.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Woman and the Dragon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A great sign appeared in heaven: a woman clothed with the sun, with the moon under her feet and a crown of twelve stars on her head. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'She was pregnant and cried out in pain as she was about to give birth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then another sign appeared in heaven: an enormous red dragon with seven heads and ten horns and seven crowns on its heads. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Its tail swept a third of the stars out of the sky and flung them to the earth. The dragon stood in front of the woman who was about to give birth, so that it might devour her child the moment he was born. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: She gave birth to a son, a male child, who “will rule all the nations with an iron scepter.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 2:9
    marker-yv: yv-n
  - type: text
    text: ' And her child was snatched up to God and to his throne. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The woman fled into the wilderness to a place prepared for her by God, where she might be taken care of for 1,260 days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then war broke out in heaven. Michael and his angels fought against the dragon, and the dragon and his angels fought back. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But he was not strong enough, and they lost their place in heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The great dragon was hurled down—that ancient serpent called the devil, or Satan, who leads the whole world astray. He was hurled to the earth, and his angels with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then I heard a loud voice in heaven say:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Now have come the salvation and the power
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the kingdom of our God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the authority of his Messiah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the accuser of our brothers and sisters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who accuses them before our God day and night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: has been hurled down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They triumphed over him
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the blood of the Lamb
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by the word of their testimony;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they did not love their lives so much
- type: usfm
  marker: q2
  children:
  - type: text
    text: as to shrink from death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Therefore rejoice, you heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you who dwell in them!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But woe to the earth and the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because the devil has gone down to you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He is filled with fury,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because he knows that his time is short.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When the dragon saw that he had been hurled to the earth, he pursued the woman who had given birth to the male child. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The woman was given the two wings of a great eagle, so that she might fly to the place prepared for her in the wilderness, where she would be taken care of for a time, times and half a time, out of the serpent’s reach. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then from his mouth the serpent spewed water like a river, to overtake the woman and sweep her away with the torrent. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But the earth helped the woman by opening its mouth and swallowing the river that the dragon had spewed out of his mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then the dragon was enraged at the woman and went off to wage war against the rest of her offspring—those who keep God’s commands and hold fast their testimony about Jesus.
