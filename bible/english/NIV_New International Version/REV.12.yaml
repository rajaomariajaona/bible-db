document_id: REV.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Woman and the Dragon
  - type: text
    content: 'A great sign appeared in heaven: a woman clothed with the sun, with the moon under her feet and a crown of twelve stars on her head. '
  '10':
  - type: text
    content: 'Then I heard a loud voice in heaven say:'
  - type: text
    content: “Now have come the salvation and the power
  - type: text
    content: and the kingdom of our God,
  - type: text
    content: and the authority of his Messiah.
  - type: text
    content: For the accuser of our brothers and sisters,
  - type: text
    content: who accuses them before our God day and night,
  - type: text
    content: has been hurled down.
  '11':
  - type: text
    content: They triumphed over him
  - type: text
    content: by the blood of the Lamb
  - type: text
    content: and by the word of their testimony;
  - type: text
    content: they did not love their lives so much
  - type: text
    content: as to shrink from death.
  '12':
  - type: text
    content: Therefore rejoice, you heavens
  - type: text
    content: and you who dwell in them!
  - type: text
    content: But woe to the earth and the sea,
  - type: text
    content: because the devil has gone down to you!
  - type: text
    content: He is filled with fury,
  - type: text
    content: because he knows that his time is short.”
  '13':
  - type: text
    content: 'When the dragon saw that he had been hurled to the earth, he pursued the woman who had given birth to the male child. '
  '14':
  - type: text
    content: 'The woman was given the two wings of a great eagle, so that she might fly to the place prepared for her in the wilderness, where she would be taken care of for a time, times and half a time, out of the serpent’s reach. '
  '15':
  - type: text
    content: 'Then from his mouth the serpent spewed water like a river, to overtake the woman and sweep her away with the torrent. '
  '16':
  - type: text
    content: 'But the earth helped the woman by opening its mouth and swallowing the river that the dragon had spewed out of his mouth. '
  '17':
  - type: text
    content: Then the dragon was enraged at the woman and went off to wage war against the rest of her offspring—those who keep God’s commands and hold fast their testimony about Jesus.
  '2':
  - type: text
    content: 'She was pregnant and cried out in pain as she was about to give birth. '
  '3':
  - type: text
    content: 'Then another sign appeared in heaven: an enormous red dragon with seven heads and ten horns and seven crowns on its heads. '
  '4':
  - type: text
    content: 'Its tail swept a third of the stars out of the sky and flung them to the earth. The dragon stood in front of the woman who was about to give birth, so that it might devour her child the moment he was born. '
  '5':
  - type: text
    content: She gave birth to a son, a male child, who “will rule all the nations with an iron scepter.”
  - type: note
    content: Psalm 2:9
  - type: text
    content: ' And her child was snatched up to God and to his throne. '
  '6':
  - type: text
    content: The woman fled into the wilderness to a place prepared for her by God, where she might be taken care of for 1,260 days.
  '7':
  - type: text
    content: 'Then war broke out in heaven. Michael and his angels fought against the dragon, and the dragon and his angels fought back. '
  '8':
  - type: text
    content: 'But he was not strong enough, and they lost their place in heaven. '
  '9':
  - type: text
    content: The great dragon was hurled down—that ancient serpent called the devil, or Satan, who leads the whole world astray. He was hurled to the earth, and his angels with him.
