document_id: JOB.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “I have heard many things like these;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are miserable comforters, all of you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Will your long-winded speeches never end?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What ails you that you keep on arguing?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I also could speak like you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you were in my place;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I could make fine speeches against you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shake my head at you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But my mouth would encourage you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: comfort from my lips would bring you relief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Yet if I speak, my pain is not relieved;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and if I refrain, it does not go away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Surely, God, you have worn me out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have devastated my entire household.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You have shriveled me up—and it has become a witness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my gauntness rises up and testifies against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: God assails me and tears me in his anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gnashes his teeth at me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my opponent fastens on me his piercing eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: People open their mouths to jeer at me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they strike my cheek in scorn
- type: usfm
  marker: q2
  children:
  - type: text
    text: and unite together against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: God has turned me over to the ungodly
- type: usfm
  marker: q2
  children:
  - type: text
    text: and thrown me into the clutches of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: All was well with me, but he shattered me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he seized me by the neck and crushed me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has made me his target;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: his archers surround me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Without pity, he pierces my kidneys
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spills my gall on the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Again and again he bursts upon me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he rushes at me like a warrior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “I have sewed sackcloth over my skin
- type: usfm
  marker: q2
  children:
  - type: text
    text: and buried my brow in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: My face is red with weeping,
- type: usfm
  marker: q2
  children:
  - type: text
    text: dark shadows ring my eyes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: yet my hands have been free of violence
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my prayer is pure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Earth, do not cover my blood;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may my cry never be laid to rest!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Even now my witness is in heaven;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my advocate is on high.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My intercessor is my friend
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: My friends treat me with scorn
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: as my eyes pour out tears to God;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: on behalf of a man he pleads with God
- type: usfm
  marker: q2
  children:
  - type: text
    text: as one pleads for a friend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Only a few years will pass
- type: usfm
  marker: q2
  children:
  - type: text
    text: before I take the path of no return.
