document_id: JOB.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job
  - type: text
    content: 'Then Job replied:'
  '10':
  - type: text
    content: People open their mouths to jeer at me;
  - type: text
    content: they strike my cheek in scorn
  - type: text
    content: and unite together against me.
  '11':
  - type: text
    content: God has turned me over to the ungodly
  - type: text
    content: and thrown me into the clutches of the wicked.
  '12':
  - type: text
    content: All was well with me, but he shattered me;
  - type: text
    content: he seized me by the neck and crushed me.
  - type: text
    content: He has made me his target;
  '13':
  - type: text
    content: his archers surround me.
  - type: text
    content: Without pity, he pierces my kidneys
  - type: text
    content: and spills my gall on the ground.
  '14':
  - type: text
    content: Again and again he bursts upon me;
  - type: text
    content: he rushes at me like a warrior.
  '15':
  - type: text
    content: “I have sewed sackcloth over my skin
  - type: text
    content: and buried my brow in the dust.
  '16':
  - type: text
    content: My face is red with weeping,
  - type: text
    content: dark shadows ring my eyes;
  '17':
  - type: text
    content: yet my hands have been free of violence
  - type: text
    content: and my prayer is pure.
  '18':
  - type: text
    content: “Earth, do not cover my blood;
  - type: text
    content: may my cry never be laid to rest!
  '19':
  - type: text
    content: Even now my witness is in heaven;
  - type: text
    content: my advocate is on high.
  '2':
  - type: text
    content: “I have heard many things like these;
  - type: text
    content: you are miserable comforters, all of you!
  '20':
  - type: text
    content: My intercessor is my friend
  - type: note
    content: Or My friends treat me with scorn
  - type: text
    content: as my eyes pour out tears to God;
  '21':
  - type: text
    content: on behalf of a man he pleads with God
  - type: text
    content: as one pleads for a friend.
  '22':
  - type: text
    content: “Only a few years will pass
  - type: text
    content: before I take the path of no return.
  '3':
  - type: text
    content: Will your long-winded speeches never end?
  - type: text
    content: What ails you that you keep on arguing?
  '4':
  - type: text
    content: I also could speak like you,
  - type: text
    content: if you were in my place;
  - type: text
    content: I could make fine speeches against you
  - type: text
    content: and shake my head at you.
  '5':
  - type: text
    content: But my mouth would encourage you;
  - type: text
    content: comfort from my lips would bring you relief.
  '6':
  - type: text
    content: “Yet if I speak, my pain is not relieved;
  - type: text
    content: and if I refrain, it does not go away.
  '7':
  - type: text
    content: Surely, God, you have worn me out;
  - type: text
    content: you have devastated my entire household.
  '8':
  - type: text
    content: You have shriveled me up—and it has become a witness;
  - type: text
    content: my gauntness rises up and testifies against me.
  '9':
  - type: text
    content: God assails me and tears me in his anger
  - type: text
    content: and gnashes his teeth at me;
  - type: text
    content: my opponent fastens on me his piercing eyes.
