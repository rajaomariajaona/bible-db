document_id: MAT.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction to the Sermon on the Mount
  - type: text
    content: 'Now when Jesus saw the crowds, he went up on a mountainside and sat down. His disciples came to him, '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Blessed are those who are persecuted because of righteousness,
  - type: text
    content: for theirs is the kingdom of heaven.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “Blessed are you when people insult you, persecute you and falsely say all kinds of evil against you because of me.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Rejoice and be glad, because great is your reward in heaven, for in the same way they persecuted the prophets who were before you.
  - type: heading
    content: Salt and Light
  '13':
  - type: text
    content: ' '
  - type: text
    content: “You are the salt of the earth. But if the salt loses its saltiness, how can it be made salty again? It is no longer good for anything, except to be thrown out and trampled underfoot.
  '14':
  - type: text
    content: ' '
  - type: text
    content: “You are the light of the world. A town built on a hill cannot be hidden.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Neither do people light a lamp and put it under a bowl. Instead they put it on its stand, and it gives light to everyone in the house.
  - type: text
    content: ' '
  '16':
  - type: text
    content: In the same way, let your light shine before others, that they may see your good deeds and glorify your Father in heaven.
  - type: heading
    content: The Fulfillment of the Law
  '17':
  - type: text
    content: ' '
  - type: text
    content: “Do not think that I have come to abolish the Law or the Prophets; I have not come to abolish them but to fulfill them.
  - type: text
    content: ' '
  '18':
  - type: text
    content: For truly I tell you, until heaven and earth disappear, not the smallest letter, not the least stroke of a pen, will by any means disappear from the Law until everything is accomplished.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Therefore anyone who sets aside one of the least of these commands and teaches others accordingly will be called least in the kingdom of heaven, but whoever practices and teaches these commands will be called great in the kingdom of heaven.
  - type: text
    content: ' '
  '2':
  - type: text
    content: and he began to teach them.
  - type: heading
    content: The Beatitudes
  - type: text
    content: 'He said:'
  '20':
  - type: text
    content: For I tell you that unless your righteousness surpasses that of the Pharisees and the teachers of the law, you will certainly not enter the kingdom of heaven.
  - type: heading
    content: Murder
  '21':
  - type: text
    content: ' '
  - type: text
    content: “You have heard that it was said to the people long ago, ‘You shall not murder,
  - type: text
    content: ' '
  - type: note
    content: Exodus 20:13
  - type: text
    content: and anyone who murders will be subject to judgment.’
  - type: text
    content: ' '
  '22':
  - type: text
    content: But I tell you that anyone who is angry with a brother or sister
  - type: note
    content: The Greek word for brother or sister (adelphos) refers here to a fellow disciple, whether man or woman; also in verse 23.
  - type: note
    content: Some manuscripts brother or sister without cause
  - type: text
    content: ' '
  - type: text
    content: will be subject to judgment. Again, anyone who says to a brother or sister, ‘
  - type: text
    content: Raca
  - type: text
    content: ',’'
  - type: note
    content: An Aramaic term of contempt
  - type: text
    content: ' '
  - type: text
    content: is answerable to the court. And anyone who says, ‘You fool!’ will be in danger of the fire of hell.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “Therefore, if you are offering your gift at the altar and there remember that your brother or sister has something against you,
  - type: text
    content: ' '
  '24':
  - type: text
    content: leave your gift there in front of the altar. First go and be reconciled to them; then come and offer your gift.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Settle matters quickly with your adversary who is taking you to court. Do it while you are still together on the way, or your adversary may hand you over to the judge, and the judge may hand you over to the officer, and you may be thrown into prison.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Truly I tell you, you will not get out until you have paid the last penny.
  - type: heading
    content: Adultery
  '27':
  - type: text
    content: ' '
  - type: text
    content: “You have heard that it was said, ‘You shall not commit adultery.’
  - type: text
    content: ' '
  - type: note
    content: Exodus 20:14
  '28':
  - type: text
    content: But I tell you that anyone who looks at a woman lustfully has already committed adultery with her in his heart.
  - type: text
    content: ' '
  '29':
  - type: text
    content: If your right eye causes you to stumble, gouge it out and throw it away. It is better for you to lose one part of your body than for your whole body to be thrown into hell.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: text
    content: “Blessed are the poor in spirit,
  - type: text
    content: for theirs is the kingdom of heaven.
  '30':
  - type: text
    content: And if your right hand causes you to stumble, cut it off and throw it away. It is better for you to lose one part of your body than for your whole body to go into hell.
  - type: heading
    content: Divorce
  '31':
  - type: text
    content: ' '
  - type: text
    content: “It has been said, ‘Anyone who divorces his wife must give her a certificate of divorce.’
  - type: text
    content: ' '
  - type: note
    content: Deut. 24:1
  '32':
  - type: text
    content: But I tell you that anyone who divorces his wife, except for sexual immorality, makes her the victim of adultery, and anyone who marries a divorced woman commits adultery.
  - type: heading
    content: Oaths
  '33':
  - type: text
    content: ' '
  - type: text
    content: “Again, you have heard that it was said to the people long ago, ‘Do not break your oath, but fulfill to the Lord the vows you have made.’
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'But I tell you, do not swear an oath at all: either by heaven, for it is God’s throne;'
  - type: text
    content: ' '
  '35':
  - type: text
    content: or by the earth, for it is his footstool; or by Jerusalem, for it is the city of the Great King.
  - type: text
    content: ' '
  '36':
  - type: text
    content: And do not swear by your head, for you cannot make even one hair white or black.
  - type: text
    content: ' '
  '37':
  - type: text
    content: All you need to say is simply ‘Yes’ or ‘No’; anything beyond this comes from the evil one.
  - type: note
    content: Or from evil
  - type: heading
    content: Eye for Eye
  '38':
  - type: text
    content: ' '
  - type: text
    content: “You have heard that it was said, ‘Eye for eye, and tooth for tooth.’
  - type: text
    content: ' '
  - type: note
    content: Exodus 21:24 ; Lev. 24:20; Deut. 19:21
  '39':
  - type: text
    content: But I tell you, do not resist an evil person. If anyone slaps you on the right cheek, turn to them the other cheek also.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: Blessed are those who mourn,
  - type: text
    content: for they will be comforted.
  '40':
  - type: text
    content: And if anyone wants to sue you and take your shirt, hand over your coat as well.
  - type: text
    content: ' '
  '41':
  - type: text
    content: If anyone forces you to go one mile, go with them two miles.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Give to the one who asks you, and do not turn away from the one who wants to borrow from you.
  - type: heading
    content: Love for Enemies
  '43':
  - type: text
    content: ' '
  - type: text
    content: “You have heard that it was said, ‘Love your neighbor
  - type: text
    content: ' '
  - type: note
    content: Lev. 19:18
  - type: text
    content: and hate your enemy.’
  - type: text
    content: ' '
  '44':
  - type: text
    content: But I tell you, love your enemies and pray for those who persecute you,
  - type: text
    content: ' '
  '45':
  - type: text
    content: that you may be children of your Father in heaven. He causes his sun to rise on the evil and the good, and sends rain on the righteous and the unrighteous.
  - type: text
    content: ' '
  '46':
  - type: text
    content: If you love those who love you, what reward will you get? Are not even the tax collectors doing that?
  - type: text
    content: ' '
  '47':
  - type: text
    content: And if you greet only your own people, what are you doing more than others? Do not even pagans do that?
  - type: text
    content: ' '
  '48':
  - type: text
    content: Be perfect, therefore, as your heavenly Father is perfect.
  '5':
  - type: text
    content: ' '
  - type: text
    content: Blessed are the meek,
  - type: text
    content: for they will inherit the earth.
  '6':
  - type: text
    content: ' '
  - type: text
    content: Blessed are those who hunger and thirst for righteousness,
  - type: text
    content: for they will be filled.
  '7':
  - type: text
    content: ' '
  - type: text
    content: Blessed are the merciful,
  - type: text
    content: for they will be shown mercy.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Blessed are the pure in heart,
  - type: text
    content: for they will see God.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Blessed are the peacemakers,
  - type: text
    content: for they will be called children of God.
