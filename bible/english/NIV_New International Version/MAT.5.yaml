document_id: MAT.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction to the Sermon on the Mount
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now when Jesus saw the crowds, he went up on a mountainside and sat down. His disciples came to him, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Blessed are those who are persecuted because of righteousness,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for theirs is the kingdom of heaven.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Blessed are you when people insult you, persecute you and falsely say all kinds of evil against you because of me.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rejoice and be glad, because great is your reward in heaven, for in the same way they persecuted the prophets who were before you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salt and Light
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are the salt of the earth. But if the salt loses its saltiness, how can it be made salty again? It is no longer good for anything, except to be thrown out and trampled underfoot.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are the light of the world. A town built on a hill cannot be hidden.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Neither do people light a lamp and put it under a bowl. Instead they put it on its stand, and it gives light to everyone in the house.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In the same way, let your light shine before others, that they may see your good deeds and glorify your Father in heaven.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fulfillment of the Law
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not think that I have come to abolish the Law or the Prophets; I have not come to abolish them but to fulfill them.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For truly I tell you, until heaven and earth disappear, not the smallest letter, not the least stroke of a pen, will by any means disappear from the Law until everything is accomplished.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore anyone who sets aside one of the least of these commands and teaches others accordingly will be called least in the kingdom of heaven, but whoever practices and teaches these commands will be called great in the kingdom of heaven.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: and he began to teach them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Beatitudes
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'He said:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I tell you that unless your righteousness surpasses that of the Pharisees and the teachers of the law, you will certainly not enter the kingdom of heaven.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Murder
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have heard that it was said to the people long ago, ‘You shall not murder,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 20:13
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and anyone who murders will be subject to judgment.’
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I tell you that anyone who is angry with a brother or sister
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brother or sister '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: adelphos
        - type: text
          text: ) refers here to a fellow disciple, whether man or woman; also in verse 23.
      marker-yv: yv-n
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brother or sister without cause
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will be subject to judgment. Again, anyone who says to a brother or sister, ‘
      - type: usfm
        marker: tl
        children:
        - type: text
          text: Raca
      - type: text
        text: ',’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An Aramaic term of contempt
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is answerable to the court. And anyone who says, ‘You fool!’ will be in danger of the fire of hell.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Therefore, if you are offering your gift at the altar and there remember that your brother or sister has something against you,
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: leave your gift there in front of the altar. First go and be reconciled to them; then come and offer your gift.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Settle matters quickly with your adversary who is taking you to court. Do it while you are still together on the way, or your adversary may hand you over to the judge, and the judge may hand you over to the officer, and you may be thrown into prison.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Truly I tell you, you will not get out until you have paid the last penny.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adultery
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have heard that it was said, ‘You shall not commit adultery.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 20:14
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I tell you that anyone who looks at a woman lustfully has already committed adultery with her in his heart.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If your right eye causes you to stumble, gouge it out and throw it away. It is better for you to lose one part of your body than for your whole body to be thrown into hell.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Blessed are the poor in spirit,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for theirs is the kingdom of heaven.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if your right hand causes you to stumble, cut it off and throw it away. It is better for you to lose one part of your body than for your whole body to go into hell.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Divorce
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It has been said, ‘Anyone who divorces his wife must give her a certificate of divorce.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 24:1
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I tell you that anyone who divorces his wife, except for sexual immorality, makes her the victim of adultery, and anyone who marries a divorced woman commits adultery.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Oaths
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Again, you have heard that it was said to the people long ago, ‘Do not break your oath, but fulfill to the Lord the vows you have made.’
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But I tell you, do not swear an oath at all: either by heaven, for it is God’s throne;'
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: or by the earth, for it is his footstool; or by Jerusalem, for it is the city of the Great King.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And do not swear by your head, for you cannot make even one hair white or black.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All you need to say is simply ‘Yes’ or ‘No’; anything beyond this comes from the evil one.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from evil
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eye for Eye
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have heard that it was said, ‘Eye for eye, and tooth for tooth.’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 21:24 ; Lev. 24:20; Deut. 19:21
      marker-yv: yv-n
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I tell you, do not resist an evil person. If anyone slaps you on the right cheek, turn to them the other cheek also.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Blessed are those who mourn,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for they will be comforted.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if anyone wants to sue you and take your shirt, hand over your coat as well.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If anyone forces you to go one mile, go with them two miles.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Give to the one who asks you, and do not turn away from the one who wants to borrow from you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Love for Enemies
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have heard that it was said, ‘Love your neighbor
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lev. 19:18
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and hate your enemy.’
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I tell you, love your enemies and pray for those who persecute you,
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that you may be children of your Father in heaven. He causes his sun to rise on the evil and the good, and sends rain on the righteous and the unrighteous.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you love those who love you, what reward will you get? Are not even the tax collectors doing that?
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if you greet only your own people, what are you doing more than others? Do not even pagans do that?
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Be perfect, therefore, as your heavenly Father is perfect.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Blessed are the meek,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for they will inherit the earth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Blessed are those who hunger and thirst for righteousness,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for they will be filled.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
