  children:
  - type: text
    text: and Israel will live in safety.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'This is the name by which he will be called:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
