document_id: JER.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Righteous Branch
  - type: text
    content: '“Woe to the shepherds who are destroying and scattering the sheep of my pasture!” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: The land is full of adulterers;
  - type: text
    content: because of the curse
  - type: note
    content: Or because of these things
  - type: text
    content: ' the land lies parched'
  - type: text
    content: and the pastures in the wilderness are withered.
  - type: text
    content: The prophets follow an evil course
  - type: text
    content: and use their power unjustly.
  '11':
  - type: text
    content: “Both prophet and priest are godless;
  - type: text
    content: even in my temple I find their wickedness,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: “Therefore their path will become slippery;
  - type: text
    content: they will be banished to darkness
  - type: text
    content: and there they will fall.
  - type: text
    content: I will bring disaster on them
  - type: text
    content: in the year they are punished,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: “Among the prophets of Samaria
  - type: text
    content: 'I saw this repulsive thing:'
  - type: text
    content: They prophesied by Baal
  - type: text
    content: and led my people Israel astray.
  '14':
  - type: text
    content: And among the prophets of Jerusalem
  - type: text
    content: 'I have seen something horrible:'
  - type: text
    content: They commit adultery and live a lie.
  - type: text
    content: They strengthen the hands of evildoers,
  - type: text
    content: so that not one of them turns from their wickedness.
  - type: text
    content: They are all like Sodom to me;
  - type: text
    content: the people of Jerusalem are like Gomorrah.”
  '15':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says concerning the prophets:'
  - type: text
    content: “I will make them eat bitter food
  - type: text
    content: and drink poisoned water,
  - type: text
    content: because from the prophets of Jerusalem
  - type: text
    content: ungodliness has spread throughout the land.”
  '16':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “Do not listen to what the prophets are prophesying to you;
  - type: text
    content: they fill you with false hopes.
  - type: text
    content: They speak visions from their own minds,
  - type: text
    content: 'not from the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: They keep saying to those who despise me,
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' says: You will have peace.’'
  - type: text
    content: And to all who follow the stubbornness of their hearts
  - type: text
    content: they say, ‘No harm will come to you.’
  '18':
  - type: text
    content: 'But which of them has stood in the council of the '
  - type: text
    content: Lord
  - type: text
    content: to see or to hear his word?
  - type: text
    content: Who has listened and heard his word?
  '19':
  - type: text
    content: 'See, the storm of the '
  - type: text
    content: Lord
  - type: text
    content: will burst out in wrath,
  - type: text
    content: a whirlwind swirling down
  - type: text
    content: on the heads of the wicked.
  '2':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says to the shepherds who tend my people: “Because you have scattered my flock and driven them away and have not bestowed care on them, I will bestow punishment on you for the evil you have done,” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'The anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' will not turn back'
  - type: text
    content: until he fully accomplishes
  - type: text
    content: the purposes of his heart.
  - type: text
    content: In days to come
  - type: text
    content: you will understand it clearly.
  '21':
  - type: text
    content: I did not send these prophets,
  - type: text
    content: yet they have run with their message;
  - type: text
    content: I did not speak to them,
  - type: text
    content: yet they have prophesied.
  '22':
  - type: text
    content: But if they had stood in my council,
  - type: text
    content: they would have proclaimed my words to my people
  - type: text
    content: and would have turned them from their evil ways
  - type: text
    content: and from their evil deeds.
  '23':
  - type: text
    content: “Am I only a God nearby,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “and not a God far away?
  '24':
  - type: text
    content: Who can hide in secret places
  - type: text
    content: so that I cannot see them?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Do not I fill heaven and earth?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: '“I have heard what the prophets say who prophesy lies in my name. They say, ‘I had a dream! I had a dream!’ '
  '26':
  - type: text
    content: 'How long will this continue in the hearts of these lying prophets, who prophesy the delusions of their own minds? '
  '27':
  - type: text
    content: 'They think the dreams they tell one another will make my people forget my name, just as their ancestors forgot my name through Baal worship. '
  '28':
  - type: text
    content: 'Let the prophet who has a dream recount the dream, but let the one who has my word speak it faithfully. For what has straw to do with grain?” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '29':
  - type: text
    content: '“Is not my word like fire,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “and like a hammer that breaks a rock in pieces?'
  '3':
  - type: text
    content: '“I myself will gather the remnant of my flock out of all the countries where I have driven them and will bring them back to their pasture, where they will be fruitful and increase in number. '
  '30':
  - type: text
    content: '“Therefore,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “I am against the prophets who steal from one another words supposedly from me. '
  '31':
  - type: text
    content: 'Yes,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “I am against the prophets who wag their own tongues and yet declare, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' declares.’ '
  '32':
  - type: text
    content: 'Indeed, I am against those who prophesy false dreams,” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. “They tell them and lead my people astray with their reckless lies, yet I did not send or appoint them. They do not benefit these people in the least,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: False Prophecy
  '33':
  - type: text
    content: '“When these people, or a prophet or a priest, ask you, ‘What is the message from the '
  - type: text
    content: Lord
  - type: text
    content: '?’ say to them, ‘What message? I will forsake you, declares the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '34':
  - type: text
    content: 'If a prophet or a priest or anyone else claims, ‘This is a message from the '
  - type: text
    content: Lord
  - type: text
    content: ',’ I will punish them and their household. '
  '35':
  - type: text
    content: 'This is what each of you keeps saying to your friends and other Israelites: ‘What is the '
  - type: text
    content: Lord
  - type: text
    content: '’s answer?’ or ‘What has the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken?’ '
  '36':
  - type: text
    content: 'But you must not mention ‘a message from the '
  - type: text
    content: Lord
  - type: text
    content: '’ again, because each one’s word becomes their own message. So you distort the words of the living God, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, our God. '
  '37':
  - type: text
    content: 'This is what you keep saying to a prophet: ‘What is the '
  - type: text
    content: Lord
  - type: text
    content: '’s answer to you?’ or ‘What has the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken?’ '
  '38':
  - type: text
    content: 'Although you claim, ‘This is a message from the '
  - type: text
    content: Lord
  - type: text
    content: ',’ this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: You used the words, ‘This is a message from the '
  - type: text
    content: Lord
  - type: text
    content: ',’ even though I told you that you must not claim, ‘This is a message from the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '39':
  - type: text
    content: 'Therefore, I will surely forget you and cast you out of my presence along with the city I gave to you and your ancestors. '
  '4':
  - type: text
    content: 'I will place shepherds over them who will tend them, and they will no longer be afraid or terrified, nor will any be missing,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '40':
  - type: text
    content: I will bring on you everlasting disgrace—everlasting shame that will not be forgotten.”
  '5':
  - type: text
    content: '“The days are coming,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I will raise up for David
  - type: note
    content: Or up from David’s line
  - type: text
    content: ' a righteous Branch,'
  - type: text
    content: a King who will reign wisely
  - type: text
    content: and do what is just and right in the land.
  '6':
  - type: text
    content: In his days Judah will be saved
  - type: text
    content: and Israel will live in safety.
  - type: text
    content: 'This is the name by which he will be called:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Our Righteous Savior.'
  '7':
  - type: text
    content: '“So then, the days are coming,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “when people will no longer say, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who brought the Israelites up out of Egypt,’ '
  '8':
  - type: text
    content: 'but they will say, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who brought the descendants of Israel up out of the land of the north and out of all the countries where he had banished them.’ Then they will live in their own land.”'
  - type: heading
    content: Lying Prophets
  '9':
  - type: text
    content: 'Concerning the prophets:'
  - type: text
    content: My heart is broken within me;
  - type: text
    content: all my bones tremble.
  - type: text
    content: I am like a drunken man,
  - type: text
    content: like a strong man overcome by wine,
  - type: text
    content: 'because of the '
  - type: text
    content: Lord
  - type: text
    content: and his holy words.
