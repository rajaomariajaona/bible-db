document_id: JER.23,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Righteous Branch
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Woe to the shepherds who are destroying and scattering the sheep of my pasture!” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The land is full of adulterers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the curse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: because of these things
      marker-yv: yv-n
    - type: text
      text: ' the land lies parched'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the pastures in the wilderness are withered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prophets follow an evil course
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and use their power unjustly.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Both prophet and priest are godless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even in my temple I find their wickedness,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore their path will become slippery;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be banished to darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there they will fall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring disaster on them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the year they are punished,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Among the prophets of Samaria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I saw this repulsive thing:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They prophesied by Baal
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and led my people Israel astray.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And among the prophets of Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I have seen something horrible:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They commit adultery and live a lie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They strengthen the hands of evildoers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that not one of them turns from their wickedness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are all like Sodom to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people of Jerusalem are like Gomorrah.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says concerning the prophets:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will make them eat bitter food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drink poisoned water,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because from the prophets of Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ungodliness has spread throughout the land.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not listen to what the prophets are prophesying to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they fill you with false hopes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They speak visions from their own minds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'not from the mouth of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They keep saying to those who despise me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: You will have peace.’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to all who follow the stubbornness of their hearts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they say, ‘No harm will come to you.’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But which of them has stood in the council of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to see or to hear his word?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who has listened and heard his word?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'See, the storm of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will burst out in wrath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a whirlwind swirling down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the heads of the wicked.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says to the shepherds who tend my people: “Because you have scattered my flock and driven them away and have not bestowed care on them, I will bestow punishment on you for the evil you have done,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not turn back'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until he fully accomplishes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the purposes of his heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In days to come
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will understand it clearly.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I did not send these prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet they have run with their message;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I did not speak to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet they have prophesied.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if they had stood in my council,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they would have proclaimed my words to my people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and would have turned them from their evil ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from their evil deeds.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Am I only a God nearby,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “and not a God far away?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can hide in secret places
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that I cannot see them?”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Do not I fill heaven and earth?”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I have heard what the prophets say who prophesy lies in my name. They say, ‘I had a dream! I had a dream!’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How long will this continue in the hearts of these lying prophets, who prophesy the delusions of their own minds? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They think the dreams they tell one another will make my people forget my name, just as their ancestors forgot my name through Baal worship. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the prophet who has a dream recount the dream, but let the one who has my word speak it faithfully. For what has straw to do with grain?” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Is not my word like fire,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “and like a hammer that breaks a rock in pieces?'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I myself will gather the remnant of my flock out of all the countries where I have driven them and will bring them back to their pasture, where they will be fruitful and increase in number. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I am against the prophets who steal from one another words supposedly from me. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I am against the prophets who wag their own tongues and yet declare, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' declares.’ '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indeed, I am against those who prophesy false dreams,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. “They tell them and lead my people astray with their reckless lies, yet I did not send or appoint them. They do not benefit these people in the least,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: False Prophecy
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When these people, or a prophet or a priest, ask you, ‘What is the message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?’ say to them, ‘What message? I will forsake you, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.’ '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If a prophet or a priest or anyone else claims, ‘This is a message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',’ I will punish them and their household. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what each of you keeps saying to your friends and other Israelites: ‘What is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s answer?’ or ‘What has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoken?’ '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you must not mention ‘a message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’ again, because each one’s word becomes their own message. So you distort the words of the living God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, our God. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what you keep saying to a prophet: ‘What is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s answer to you?’ or ‘What has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoken?’ '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Although you claim, ‘This is a message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',’ this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: You used the words, ‘This is a message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',’ even though I told you that you must not claim, ‘This is a message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.’ '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, I will surely forget you and cast you out of my presence along with the city I gave to you and your ancestors. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will place shepherds over them who will tend them, and they will no longer be afraid or terrified, nor will any be missing,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will bring on you everlasting disgrace—everlasting shame that will not be forgotten.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The days are coming,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “when I will raise up for David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: up from David’s line
      marker-yv: yv-n
    - type: text
      text: ' a righteous Branch,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a King who will reign wisely
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do what is just and right in the land.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In his days Judah will be saved
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Israel will live in safety.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is the name by which he will be called:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Our Righteous Savior.'
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“So then, the days are coming,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “when people will no longer say, ‘As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, who brought the Israelites up out of Egypt,’ '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'but they will say, ‘As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, who brought the descendants of Israel up out of the land of the north and out of all the countries where he had banished them.’ Then they will live in their own land.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lying Prophets
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Concerning the prophets:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is broken within me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all my bones tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am like a drunken man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a strong man overcome by wine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his holy words.
