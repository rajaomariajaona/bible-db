  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“So then, the days are coming,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “when people will no longer say, ‘As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
