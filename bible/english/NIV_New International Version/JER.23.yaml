    children:
    - type: text
      text: '9'
  - type: text
    text: 'Concerning the prophets:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart is broken within me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all my bones tremble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am like a drunken man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a strong man overcome by wine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'because of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his holy words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The land is full of adulterers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the curse
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:10 '
    - type: usfm
