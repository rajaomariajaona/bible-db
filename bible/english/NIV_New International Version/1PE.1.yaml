document_id: 1PE.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: Peter, an apostle of Jesus Christ,
  - type: text
    content: 'To God’s elect, exiles scattered throughout the provinces of Pontus, Galatia, Cappadocia, Asia and Bithynia, '
  '10':
  - type: text
    content: 'Concerning this salvation, the prophets, who spoke of the grace that was to come to you, searched intently and with the greatest care, '
  '11':
  - type: text
    content: 'trying to find out the time and circumstances to which the Spirit of Christ in them was pointing when he predicted the sufferings of the Messiah and the glories that would follow. '
  '12':
  - type: text
    content: It was revealed to them that they were not serving themselves but you, when they spoke of the things that have now been told you by those who have preached the gospel to you by the Holy Spirit sent from heaven. Even angels long to look into these things.
  - type: heading
    content: Be Holy
  '13':
  - type: text
    content: 'Therefore, with minds that are alert and fully sober, set your hope on the grace to be brought to you when Jesus Christ is revealed at his coming. '
  '14':
  - type: text
    content: 'As obedient children, do not conform to the evil desires you had when you lived in ignorance. '
  '15':
  - type: text
    content: 'But just as he who called you is holy, so be holy in all you do; '
  '16':
  - type: text
    content: 'for it is written: “Be holy, because I am holy.”'
  - type: note
    content: Lev. 11:44,45; 19:2
  '17':
  - type: text
    content: 'Since you call on a Father who judges each person’s work impartially, live out your time as foreigners here in reverent fear. '
  '18':
  - type: text
    content: 'For you know that it was not with perishable things such as silver or gold that you were redeemed from the empty way of life handed down to you from your ancestors, '
  '19':
  - type: text
    content: 'but with the precious blood of Christ, a lamb without blemish or defect. '
  '2':
  - type: text
    content: 'who have been chosen according to the foreknowledge of God the Father, through the sanctifying work of the Spirit, to be obedient to Jesus Christ and sprinkled with his blood:'
  - type: text
    content: Grace and peace be yours in abundance.
  - type: heading
    content: Praise to God for a Living Hope
  '20':
  - type: text
    content: 'He was chosen before the creation of the world, but was revealed in these last times for your sake. '
  '21':
  - type: text
    content: Through him you believe in God, who raised him from the dead and glorified him, and so your faith and hope are in God.
  '22':
  - type: text
    content: Now that you have purified yourselves by obeying the truth so that you have sincere love for each other, love one another deeply, from the heart.
  - type: note
    content: Some early manuscripts from a pure heart
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'For you have been born again, not of perishable seed, but of imperishable, through the living and enduring word of God. '
  '24':
  - type: text
    content: For,
  - type: text
    content: “All people are like grass,
  - type: text
    content: and all their glory is like the flowers of the field;
  - type: text
    content: the grass withers and the flowers fall,
  '25':
  - type: text
    content: but the word of the Lord endures forever.”
  - type: note
    content: Isaiah 40:6-8 (see Septuagint)
  - type: text
    content: And this is the word that was preached to you.
  '3':
  - type: text
    content: 'Praise be to the God and Father of our Lord Jesus Christ! In his great mercy he has given us new birth into a living hope through the resurrection of Jesus Christ from the dead, '
  '4':
  - type: text
    content: 'and into an inheritance that can never perish, spoil or fade. This inheritance is kept in heaven for you, '
  '5':
  - type: text
    content: 'who through faith are shielded by God’s power until the coming of the salvation that is ready to be revealed in the last time. '
  '6':
  - type: text
    content: 'In all this you greatly rejoice, though now for a little while you may have had to suffer grief in all kinds of trials. '
  '7':
  - type: text
    content: 'These have come so that the proven genuineness of your faith—of greater worth than gold, which perishes even though refined by fire—may result in praise, glory and honor when Jesus Christ is revealed. '
  '8':
  - type: text
    content: 'Though you have not seen him, you love him; and even though you do not see him now, you believe in him and are filled with an inexpressible and glorious joy, '
  '9':
  - type: text
    content: for you are receiving the end result of your faith, the salvation of your souls.
