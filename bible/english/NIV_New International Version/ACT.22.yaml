document_id: ACT.22
type_code: eng
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Brothers and fathers, listen now to my defense.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When they heard him speak to them in Aramaic, they became very quiet.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then Paul said: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“I am a Jew, born in Tarsus of Cilicia, but brought up in this city. I studied under Gamaliel and was thoroughly trained in the law of our ancestors. I was just as zealous for God as any of you are today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I persecuted the followers of this Way to their death, arresting both men and women and throwing them into prison, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: as the high priest and all the Council can themselves testify. I even obtained letters from them to their associates in Damascus, and went there to bring these people as prisoners to Jerusalem to be punished.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“About noon as I came near Damascus, suddenly a bright light from heaven flashed around me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I fell to the ground and heard a voice say to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Saul! Saul! Why do you persecute me?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “ ‘Who are you, Lord?’ I asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“ '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘I am Jesus of Nazareth, whom you are persecuting,’
  - type: text
    text: ' he replied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: My companions saw the light, but they did not understand the voice of him who was speaking to me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “ ‘What shall I do, Lord?’ I asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“ '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Get up,’
  - type: text
    text: ' the Lord said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘and go into Damascus. There you will be told all that you have been assigned to do.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My companions led me by the hand into Damascus, because the brilliance of the light had blinded me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“A man named Ananias came to see me. He was a devout observer of the law and highly respected by all the Jews living there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He stood beside me and said, ‘Brother Saul, receive your sight!’ And at that very moment I was able to see him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Then he said: ‘The God of our ancestors has chosen you to know his will and to see the Righteous One and to hear words from his mouth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You will be his witness to all people of what you have seen and heard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And now what are you waiting for? Get up, be baptized and wash your sins away, calling on his name.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“When I returned to Jerusalem and was praying at the temple, I fell into a trance '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and saw the Lord speaking to me. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Quick!’
  - type: text
    text: ' he said. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Leave Jerusalem immediately, because the people here will not accept your testimony about me.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“ ‘Lord,’ I replied, ‘these people know that I went from one synagogue to another to imprison and beat those who believe in you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And when the blood of your martyr
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: witness
    marker-yv: yv-n
  - type: text
    text: ' Stephen was shed, I stood there giving my approval and guarding the clothes of those who were killing him.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Then the Lord said to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '‘Go; I will send you far away to the Gentiles.’ '
  - type: text
    text: ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul the Roman Citizen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The crowd listened to Paul until he said this. Then they raised their voices and shouted, “Rid the earth of him! He’s not fit to live!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'As they were shouting and throwing off their cloaks and flinging dust into the air, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'the commander ordered that Paul be taken into the barracks. He directed that he be flogged and interrogated in order to find out why the people were shouting at him like this. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: As they stretched him out to flog him, Paul said to the centurion standing there, “Is it legal for you to flog a Roman citizen who hasn’t even been found guilty?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When the centurion heard this, he went to the commander and reported it. “What are you going to do?” he asked. “This man is a Roman citizen.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The commander went to Paul and asked, “Tell me, are you a Roman citizen?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes, I am,” he answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then the commander said, “I had to pay a lot of money for my citizenship.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “But I was born a citizen,” Paul replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Those who were about to interrogate him withdrew immediately. The commander himself was alarmed when he realized that he had put Paul, a Roman citizen, in chains.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Before the Sanhedrin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The commander wanted to find out exactly why Paul was being accused by the Jews. So the next day he released him and ordered the chief priests and all the members of the Sanhedrin to assemble. Then he brought Paul and had him stand before them.
