document_id: SNG.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: He
  - type: text
    content: I have come into my garden, my sister, my bride;
  - type: text
    content: I have gathered my myrrh with my spice.
  - type: text
    content: I have eaten my honeycomb and my honey;
  - type: text
    content: I have drunk my wine and my milk.
  - type: heading
    content: Friends
  - type: text
    content: Eat, friends, and drink;
  - type: text
    content: drink your fill of love.
  - type: heading
    content: She
  '10':
  - type: text
    content: My beloved is radiant and ruddy,
  - type: text
    content: outstanding among ten thousand.
  '11':
  - type: text
    content: His head is purest gold;
  - type: text
    content: his hair is wavy
  - type: text
    content: and black as a raven.
  '12':
  - type: text
    content: His eyes are like doves
  - type: text
    content: by the water streams,
  - type: text
    content: washed in milk,
  - type: text
    content: mounted like jewels.
  '13':
  - type: text
    content: His cheeks are like beds of spice
  - type: text
    content: yielding perfume.
  - type: text
    content: His lips are like lilies
  - type: text
    content: dripping with myrrh.
  '14':
  - type: text
    content: His arms are rods of gold
  - type: text
    content: set with topaz.
  - type: text
    content: His body is like polished ivory
  - type: text
    content: decorated with lapis lazuli.
  '15':
  - type: text
    content: His legs are pillars of marble
  - type: text
    content: set on bases of pure gold.
  - type: text
    content: His appearance is like Lebanon,
  - type: text
    content: choice as its cedars.
  '16':
  - type: text
    content: His mouth is sweetness itself;
  - type: text
    content: he is altogether lovely.
  - type: text
    content: This is my beloved, this is my friend,
  - type: text
    content: daughters of Jerusalem.
  '2':
  - type: text
    content: I slept but my heart was awake.
  - type: text
    content: 'Listen! My beloved is knocking:'
  - type: text
    content: “Open to me, my sister, my darling,
  - type: text
    content: my dove, my flawless one.
  - type: text
    content: My head is drenched with dew,
  - type: text
    content: my hair with the dampness of the night.”
  '3':
  - type: text
    content: I have taken off my robe—
  - type: text
    content: must I put it on again?
  - type: text
    content: I have washed my feet—
  - type: text
    content: must I soil them again?
  '4':
  - type: text
    content: My beloved thrust his hand through the latch-opening;
  - type: text
    content: my heart began to pound for him.
  '5':
  - type: text
    content: I arose to open for my beloved,
  - type: text
    content: and my hands dripped with myrrh,
  - type: text
    content: my fingers with flowing myrrh,
  - type: text
    content: on the handles of the bolt.
  '6':
  - type: text
    content: I opened for my beloved,
  - type: text
    content: but my beloved had left; he was gone.
  - type: text
    content: My heart sank at his departure.
  - type: note
    content: Or heart had gone out to him when he spoke
  - type: text
    content: I looked for him but did not find him.
  - type: text
    content: I called him but he did not answer.
  '7':
  - type: text
    content: The watchmen found me
  - type: text
    content: as they made their rounds in the city.
  - type: text
    content: They beat me, they bruised me;
  - type: text
    content: they took away my cloak,
  - type: text
    content: those watchmen of the walls!
  '8':
  - type: text
    content: Daughters of Jerusalem, I charge you—
  - type: text
    content: if you find my beloved,
  - type: text
    content: what will you tell him?
  - type: text
    content: Tell him I am faint with love.
  - type: heading
    content: Friends
  '9':
  - type: text
    content: How is your beloved better than others,
  - type: text
    content: most beautiful of women?
  - type: text
    content: How is your beloved better than others,
  - type: text
    content: that you so charge us?
  - type: heading
    content: She
