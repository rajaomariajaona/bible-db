document_id: SNG.5
type_code: eng
segments:
- type: usfm
  marker: sp
  children:
  - type: text
    text: He
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I have come into my garden, my sister, my bride;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have gathered my myrrh with my spice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have eaten my honeycomb and my honey;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have drunk my wine and my milk.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Friends
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eat, friends, and drink;
- type: usfm
  marker: q2
  children:
  - type: text
    text: drink your fill of love.
- type: usfm
  marker: sp
  children:
  - type: text
    text: She
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I slept but my heart was awake.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Listen! My beloved is knocking:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Open to me, my sister, my darling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my dove, my flawless one.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My head is drenched with dew,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my hair with the dampness of the night.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I have taken off my robe—
- type: usfm
  marker: q2
  children:
  - type: text
    text: must I put it on again?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have washed my feet—
- type: usfm
  marker: q2
  children:
  - type: text
    text: must I soil them again?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My beloved thrust his hand through the latch-opening;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my heart began to pound for him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I arose to open for my beloved,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my hands dripped with myrrh,
- type: usfm
  marker: q1
  children:
  - type: text
    text: my fingers with flowing myrrh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the handles of the bolt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I opened for my beloved,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but my beloved had left; he was gone.
- type: usfm
  marker: q2
  children:
  - type: text
    text: My heart sank at his departure.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: heart had gone out to him when he spoke
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I looked for him but did not find him.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I called him but he did not answer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The watchmen found me
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they made their rounds in the city.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They beat me, they bruised me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they took away my cloak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those watchmen of the walls!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Daughters of Jerusalem, I charge you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you find my beloved,
- type: usfm
  marker: q1
  children:
  - type: text
    text: what will you tell him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Tell him I am faint with love.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Friends
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: How is your beloved better than others,
- type: usfm
  marker: q2
  children:
  - type: text
    text: most beautiful of women?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How is your beloved better than others,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you so charge us?
- type: usfm
  marker: sp
  children:
  - type: text
    text: She
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My beloved is radiant and ruddy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: outstanding among ten thousand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: His head is purest gold;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hair is wavy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and black as a raven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: His eyes are like doves
- type: usfm
  marker: q2
  children:
  - type: text
    text: by the water streams,
- type: usfm
  marker: q1
  children:
  - type: text
    text: washed in milk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: mounted like jewels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: His cheeks are like beds of spice
- type: usfm
  marker: q2
  children:
  - type: text
    text: yielding perfume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His lips are like lilies
- type: usfm
  marker: q2
  children:
  - type: text
    text: dripping with myrrh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: His arms are rods of gold
- type: usfm
  marker: q2
  children:
  - type: text
    text: set with topaz.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His body is like polished ivory
- type: usfm
  marker: q2
  children:
  - type: text
    text: decorated with lapis lazuli.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: His legs are pillars of marble
- type: usfm
  marker: q2
  children:
  - type: text
    text: set on bases of pure gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His appearance is like Lebanon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: choice as its cedars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: His mouth is sweetness itself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is altogether lovely.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is my beloved, this is my friend,
- type: usfm
  marker: q2
  children:
  - type: text
    text: daughters of Jerusalem.
