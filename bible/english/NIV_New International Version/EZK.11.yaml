document_id: EZK.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Sure Judgment on Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Spirit lifted me up and brought me to the gate of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that faces east. There at the entrance of the gate were twenty-five men, and I saw among them Jaazaniah son of Azzur and Pelatiah son of Benaiah, leaders of the people. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will fall by the sword, and I will execute judgment on you at the borders of Israel. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This city will not be a pot for you, nor will you be the meat in it; I will execute judgment on you at the borders of Israel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for you have not followed my decrees or kept my laws but have conformed to the standards of the nations around you.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now as I was prophesying, Pelatiah son of Benaiah died. Then I fell facedown and cried out in a loud voice, “Alas, Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! Will you completely destroy the remnant of Israel?”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Promise of Israel’s Return
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, the people of Jerusalem have said of your fellow exiles and all the other Israelites, ‘They are far away from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ; this land was given to us as our possession.’
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore say: ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Although I sent them far away among the nations and scattered them among the countries, yet for a little while I have been a sanctuary for them in the countries where they have gone.’'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore say: ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I will gather you from the nations and bring you back from the countries where you have been scattered, and I will give you back the land of Israel again.’'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“They will return to it and remove all its vile images and detestable idols. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will give them an undivided heart and put a new spirit in them; I will remove from them their heart of stone and give them a heart of flesh. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Son of man, these are the men who are plotting evil and giving wicked advice in this city. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they will follow my decrees and be careful to keep my laws. They will be my people, and I will be their God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for those whose hearts are devoted to their vile images and detestable idols, I will bring down on their own heads what they have done, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the cherubim, with the wheels beside them, spread their wings, and the glory of the God of Israel was above them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' went up from within the city and stopped above the mountain east of it. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Spirit lifted me up and brought me to the exiles in Babylonia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldea
      marker-yv: yv-n
    - type: text
      text: ' in the vision given by the Spirit of God.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the vision I had seen went up from me, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and I told the exiles everything the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had shown me.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They say, ‘Haven’t our houses been recently rebuilt? This city is a pot, and we are the meat in it.’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore prophesy against them; prophesy, son of man.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came on me, and he told me to say: “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: That is what you are saying, you leaders in Israel, but I know what is going through your mind. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You have killed many people in this city and filled its streets with the dead.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: The bodies you have thrown there are the meat and this city is the pot, but I will drive you out of it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You fear the sword, and the sword is what I will bring against you, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will drive you out of the city and deliver you into the hands of foreigners and inflict punishment on you. '
