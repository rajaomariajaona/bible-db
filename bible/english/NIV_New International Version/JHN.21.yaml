document_id: JHN.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and the Miraculous Catch of Fish
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Afterward Jesus appeared again to his disciples, by the Sea of Galilee.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tiberias
    marker-yv: yv-n
  - type: text
    text: ' It happened this way: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Simon Peter, Thomas (also known as Didymus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Thomas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Aramaic) and '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Didymus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Greek) both mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: twin.
    marker-yv: yv-n
  - type: text
    text: '), Nathanael from Cana in Galilee, the sons of Zebedee, and two other disciples were together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “I’m going out to fish,” Simon Peter told them, and they said, “We’ll go with you.” So they went out and got into the boat, but that night they caught nothing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Early in the morning, Jesus stood on the shore, but the disciples did not realize that it was Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He called out to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Friends, haven’t you any fish?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “No,” they answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Throw your net on the right side of the boat and you will find some.”
  - type: text
    text: ' When they did, they were unable to haul the net in because of the large number of fish.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then the disciple whom Jesus loved said to Peter, “It is the Lord!” As soon as Simon Peter heard him say, “It is the Lord,” he wrapped his outer garment around him (for he had taken it off) and jumped into the water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The other disciples followed in the boat, towing the net full of fish, for they were not far from shore, about a hundred yards.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or about 90 meters
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When they landed, they saw a fire of burning coals there with fish on it, and some bread.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Bring some of the fish you have just caught.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So Simon Peter climbed back into the boat and dragged the net ashore. It was full of large fish, 153, but even with so many the net was not torn. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come and have breakfast.”
  - type: text
    text: ' None of the disciples dared ask him, “Who are you?” They knew it was the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jesus came, took the bread and gave it to them, and did the same with the fish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: This was now the third time Jesus appeared to his disciples after he was raised from the dead.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Reinstates Peter
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When they had finished eating, Jesus said to Simon Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Simon son of John, do you love me more than these?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes, Lord,” he said, “you know that I love you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Feed my lambs.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Again Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Simon son of John, do you love me?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He answered, “Yes, Lord, you know that I love you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take care of my sheep.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The third time he said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Simon son of John, do you love me?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Peter was hurt because Jesus asked him the third time, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you love me?”
  - type: text
    text: ' He said, “Lord, you know all things; you know that I love you.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Feed my sheep.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Very truly I tell you, when you were younger you dressed yourself and went where you wanted; but when you are old you will stretch out your hands, and someone else will dress you and lead you where you do not want to go.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus said this to indicate the kind of death by which Peter would glorify God. Then he said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Follow me!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Peter turned and saw that the disciple whom Jesus loved was following them. (This was the one who had leaned back against Jesus at the supper and had said, “Lord, who is going to betray you?”) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When Peter saw him, he asked, “Lord, what about him?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If I want him to remain alive until I return, what is that to you? You must follow me.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Because of this, the rumor spread among the believers that this disciple would not die. But Jesus did not say that he would not die; he only said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If I want him to remain alive until I return, what is that to you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: This is the disciple who testifies to these things and who wrote them down. We know that his testimony is true.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Jesus did many other things as well. If every one of them were written down, I suppose that even the whole world would not have room for the books that would be written.
