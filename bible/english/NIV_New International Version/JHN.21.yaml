document_id: JHN.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus and the Miraculous Catch of Fish
  - type: text
    content: Afterward Jesus appeared again to his disciples, by the Sea of Galilee.
  - type: note
    content: Greek Tiberias
  - type: text
    content: ' It happened this way: '
  '10':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Bring some of the fish you have just caught.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'So Simon Peter climbed back into the boat and dragged the net ashore. It was full of large fish, 153, but even with so many the net was not torn. '
  '12':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Come and have breakfast.”
  - type: text
    content: ' None of the disciples dared ask him, “Who are you?” They knew it was the Lord. '
  '13':
  - type: text
    content: 'Jesus came, took the bread and gave it to them, and did the same with the fish. '
  '14':
  - type: text
    content: This was now the third time Jesus appeared to his disciples after he was raised from the dead.
  - type: heading
    content: Jesus Reinstates Peter
  '15':
  - type: text
    content: 'When they had finished eating, Jesus said to Simon Peter, '
  - type: text
    content: “Simon son of John, do you love me more than these?”
  - type: text
    content: “Yes, Lord,” he said, “you know that I love you.”
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Feed my lambs.”
  '16':
  - type: text
    content: 'Again Jesus said, '
  - type: text
    content: “Simon son of John, do you love me?”
  - type: text
    content: He answered, “Yes, Lord, you know that I love you.”
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Take care of my sheep.”
  '17':
  - type: text
    content: 'The third time he said to him, '
  - type: text
    content: “Simon son of John, do you love me?”
  - type: text
    content: 'Peter was hurt because Jesus asked him the third time, '
  - type: text
    content: “Do you love me?”
  - type: text
    content: ' He said, “Lord, you know all things; you know that I love you.”'
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Feed my sheep.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Very truly I tell you, when you were younger you dressed yourself and went where you wanted; but when you are old you will stretch out your hands, and someone else will dress you and lead you where you do not want to go.”
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Jesus said this to indicate the kind of death by which Peter would glorify God. Then he said to him, '
  - type: text
    content: “Follow me!”
  '2':
  - type: text
    content: Simon Peter, Thomas (also known as Didymus
  - type: note
    content: Thomas (Aramaic) and Didymus (Greek) both mean twin.
  - type: text
    content: '), Nathanael from Cana in Galilee, the sons of Zebedee, and two other disciples were together. '
  '20':
  - type: text
    content: 'Peter turned and saw that the disciple whom Jesus loved was following them. (This was the one who had leaned back against Jesus at the supper and had said, “Lord, who is going to betray you?”) '
  '21':
  - type: text
    content: When Peter saw him, he asked, “Lord, what about him?”
  '22':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “If I want him to remain alive until I return, what is that to you? You must follow me.”
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Because of this, the rumor spread among the believers that this disciple would not die. But Jesus did not say that he would not die; he only said, '
  - type: text
    content: “If I want him to remain alive until I return, what is that to you?”
  '24':
  - type: text
    content: This is the disciple who testifies to these things and who wrote them down. We know that his testimony is true.
  '25':
  - type: text
    content: Jesus did many other things as well. If every one of them were written down, I suppose that even the whole world would not have room for the books that would be written.
  '3':
  - type: text
    content: “I’m going out to fish,” Simon Peter told them, and they said, “We’ll go with you.” So they went out and got into the boat, but that night they caught nothing.
  '4':
  - type: text
    content: Early in the morning, Jesus stood on the shore, but the disciples did not realize that it was Jesus.
  '5':
  - type: text
    content: 'He called out to them, '
  - type: text
    content: “Friends, haven’t you any fish?”
  - type: text
    content: “No,” they answered.
  '6':
  - type: text
    content: 'He said, '
  - type: text
    content: “Throw your net on the right side of the boat and you will find some.”
  - type: text
    content: ' When they did, they were unable to haul the net in because of the large number of fish.'
  '7':
  - type: text
    content: 'Then the disciple whom Jesus loved said to Peter, “It is the Lord!” As soon as Simon Peter heard him say, “It is the Lord,” he wrapped his outer garment around him (for he had taken it off) and jumped into the water. '
  '8':
  - type: text
    content: The other disciples followed in the boat, towing the net full of fish, for they were not far from shore, about a hundred yards.
  - type: note
    content: Or about 90 meters
  - type: text
    content: ' '
  '9':
  - type: text
    content: When they landed, they saw a fire of burning coals there with fish on it, and some bread.
