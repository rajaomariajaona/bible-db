document_id: NUM.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The People Rebel
  - type: text
    content: 'That night all the members of the community raised their voices and wept aloud. '
  '10':
  - type: text
    content: 'But the whole assembly talked about stoning them. Then the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared at the tent of meeting to all the Israelites. '
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “How long will these people treat me with contempt? How long will they refuse to believe in me, in spite of all the signs I have performed among them? '
  '12':
  - type: text
    content: I will strike them down with a plague and destroy them, but I will make you into a nation greater and stronger than they.”
  '13':
  - type: text
    content: 'Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Then the Egyptians will hear about it! By your power you brought these people up from among them. '
  '14':
  - type: text
    content: 'And they will tell the inhabitants of this land about it. They have already heard that you, '
  - type: text
    content: Lord
  - type: text
    content: ', are with these people and that you, '
  - type: text
    content: Lord
  - type: text
    content: ', have been seen face to face, that your cloud stays over them, and that you go before them in a pillar of cloud by day and a pillar of fire by night. '
  '15':
  - type: text
    content: 'If you put all these people to death, leaving none alive, the nations who have heard this report about you will say, '
  '16':
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' was not able to bring these people into the land he promised them on oath, so he slaughtered them in the wilderness.’'
  '17':
  - type: text
    content: '“Now may the Lord’s strength be displayed, just as you have declared: '
  '18':
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' is slow to anger, abounding in love and forgiving sin and rebellion. Yet he does not leave the guilty unpunished; he punishes the children for the sin of the parents to the third and fourth generation.’ '
  '19':
  - type: text
    content: In accordance with your great love, forgive the sin of these people, just as you have pardoned them from the time they left Egypt until now.”
  '2':
  - type: text
    content: 'All the Israelites grumbled against Moses and Aaron, and the whole assembly said to them, “If only we had died in Egypt! Or in this wilderness! '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “I have forgiven them, as you asked. '
  '21':
  - type: text
    content: 'Nevertheless, as surely as I live and as surely as the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' fills the whole earth, '
  '22':
  - type: text
    content: 'not one of those who saw my glory and the signs I performed in Egypt and in the wilderness but who disobeyed me and tested me ten times— '
  '23':
  - type: text
    content: 'not one of them will ever see the land I promised on oath to their ancestors. No one who has treated me with contempt will ever see it. '
  '24':
  - type: text
    content: 'But because my servant Caleb has a different spirit and follows me wholeheartedly, I will bring him into the land he went to, and his descendants will inherit it. '
  '25':
  - type: text
    content: Since the Amalekites and the Canaanites are living in the valleys, turn back tomorrow and set out toward the desert along the route to the Red Sea.
  - type: note
    content: Or the Sea of Reeds
  - type: text
    content: ”
  '26':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron: '
  '27':
  - type: text
    content: '“How long will this wicked community grumble against me? I have heard the complaints of these grumbling Israelites. '
  '28':
  - type: text
    content: 'So tell them, ‘As surely as I live, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', I will do to you the very thing I heard you say: '
  '29':
  - type: text
    content: 'In this wilderness your bodies will fall—every one of you twenty years old or more who was counted in the census and who has grumbled against me. '
  '3':
  - type: text
    content: 'Why is the '
  - type: text
    content: Lord
  - type: text
    content: ' bringing us to this land only to let us fall by the sword? Our wives and children will be taken as plunder. Wouldn’t it be better for us to go back to Egypt?” '
  '30':
  - type: text
    content: 'Not one of you will enter the land I swore with uplifted hand to make your home, except Caleb son of Jephunneh and Joshua son of Nun. '
  '31':
  - type: text
    content: 'As for your children that you said would be taken as plunder, I will bring them in to enjoy the land you have rejected. '
  '32':
  - type: text
    content: 'But as for you, your bodies will fall in this wilderness. '
  '33':
  - type: text
    content: 'Your children will be shepherds here for forty years, suffering for your unfaithfulness, until the last of your bodies lies in the wilderness. '
  '34':
  - type: text
    content: 'For forty years—one year for each of the forty days you explored the land—you will suffer for your sins and know what it is like to have me against you.’ '
  '35':
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken, and I will surely do these things to this whole wicked community, which has banded together against me. They will meet their end in this wilderness; here they will die.”'
  '36':
  - type: text
    content: 'So the men Moses had sent to explore the land, who returned and made the whole community grumble against him by spreading a bad report about it— '
  '37':
  - type: text
    content: 'these men who were responsible for spreading the bad report about the land were struck down and died of a plague before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '38':
  - type: text
    content: Of the men who went to explore the land, only Joshua son of Nun and Caleb son of Jephunneh survived.
  '39':
  - type: text
    content: 'When Moses reported this to all the Israelites, they mourned bitterly. '
  '4':
  - type: text
    content: And they said to each other, “We should choose a leader and go back to Egypt.”
  '40':
  - type: text
    content: 'Early the next morning they set out for the highest point in the hill country, saying, “Now we are ready to go up to the land the '
  - type: text
    content: Lord
  - type: text
    content: ' promised. Surely we have sinned!”'
  '41':
  - type: text
    content: 'But Moses said, “Why are you disobeying the '
  - type: text
    content: Lord
  - type: text
    content: '’s command? This will not succeed! '
  '42':
  - type: text
    content: 'Do not go up, because the '
  - type: text
    content: Lord
  - type: text
    content: ' is not with you. You will be defeated by your enemies, '
  '43':
  - type: text
    content: 'for the Amalekites and the Canaanites will face you there. Because you have turned away from the '
  - type: text
    content: Lord
  - type: text
    content: ', he will not be with you and you will fall by the sword.”'
  '44':
  - type: text
    content: 'Nevertheless, in their presumption they went up toward the highest point in the hill country, though neither Moses nor the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s covenant moved from the camp. '
  '45':
  - type: text
    content: Then the Amalekites and the Canaanites who lived in that hill country came down and attacked them and beat them down all the way to Hormah.
  '5':
  - type: text
    content: 'Then Moses and Aaron fell facedown in front of the whole Israelite assembly gathered there. '
  '6':
  - type: text
    content: 'Joshua son of Nun and Caleb son of Jephunneh, who were among those who had explored the land, tore their clothes '
  '7':
  - type: text
    content: 'and said to the entire Israelite assembly, “The land we passed through and explored is exceedingly good. '
  '8':
  - type: text
    content: 'If the '
  - type: text
    content: Lord
  - type: text
    content: ' is pleased with us, he will lead us into that land, a land flowing with milk and honey, and will give it to us. '
  '9':
  - type: text
    content: 'Only do not rebel against the '
  - type: text
    content: Lord
  - type: text
    content: '. And do not be afraid of the people of the land, because we will devour them. Their protection is gone, but the '
  - type: text
    content: Lord
  - type: text
    content: ' is with us. Do not be afraid of them.”'
