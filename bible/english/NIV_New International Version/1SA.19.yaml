    children:
    - type: text
      text: Saul Tries to Kill David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul told his son Jonathan and all the attendants to kill David. But Jonathan had taken a great liking to David '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul tried to pin him to the wall with his spear, but David eluded him as Saul drove the spear into the wall. That night David made good his escape.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul sent men to David’s house to watch it and to kill him in the morning. But Michal, David’s wife, warned him, “If you don’t run for your life tonight, tomorrow you’ll be killed.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Michal let David down through a window, and he fled and escaped. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Michal took an idol and laid it on the bed, covering it with a garment and putting some goats’ hair at the head.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Saul sent the men to capture David, Michal said, “He is ill.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul sent the men back to see David and told them, “Bring him up to me in his bed so that I may kill him.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when the men entered, there was the idol in the bed, and at the head was some goats’ hair.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said to Michal, “Why did you deceive me like this and send my enemy away so that he escaped?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Michal told him, “He said to me, ‘Let me get away. Why should I kill you?’ ”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David had fled and made his escape, he went to Samuel at Ramah and told him all that Saul had done to him. Then he and Samuel went to Naioth and stayed there. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Word came to Saul: “David is in Naioth at Ramah”; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and warned him, “My father Saul is looking for a chance to kill you. Be on your guard tomorrow morning; go into hiding and stay there. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so he sent men to capture him. But when they saw a group of prophets prophesying, with Samuel standing there as their leader, the Spirit of God came on Saul’s men, and they also prophesied. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul was told about it, and he sent more men, and they prophesied too. Saul sent men a third time, and they also prophesied. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finally, he himself left for Ramah and went to the great cistern at Seku. And he asked, “Where are Samuel and David?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Over in Naioth at Ramah,” they said.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Saul went to Naioth at Ramah. But the Spirit of God came even on him, and he walked along prophesying until he came to Naioth. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He stripped off his garments, and he too prophesied in Samuel’s presence. He lay naked all that day and all that night. This is why people say, “Is Saul also among the prophets?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will go out and stand with my father in the field where you are. I’ll speak to him about you and will tell you what I find out.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan spoke well of David to Saul his father and said to him, “Let not the king do wrong to his servant David; he has not wronged you, and what he has done has benefited you greatly. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took his life in his hands when he killed the Philistine. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' won a great victory for all Israel, and you saw it and were glad. Why then would you do wrong to an innocent man like David by killing him for no reason?”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul listened to Jonathan and took this oath: “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, David will not be put to death.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jonathan called David and told him the whole conversation. He brought him to Saul, and David was with Saul as before.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Once more war broke out, and David went out and fought the Philistines. He struck them with such force that they fled before him.
