document_id: EZK.47,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The River From the Temple
  - type: text
    content: 'The man brought me back to the entrance to the temple, and I saw water coming out from under the threshold of the temple toward the east (for the temple faced east). The water was coming down from under the south side of the temple, south of the altar. '
  '10':
  - type: text
    content: 'Fishermen will stand along the shore; from En Gedi to En Eglaim there will be places for spreading nets. The fish will be of many kinds—like the fish of the Mediterranean Sea. '
  '11':
  - type: text
    content: 'But the swamps and marshes will not become fresh; they will be left for salt. '
  '12':
  - type: text
    content: Fruit trees of all kinds will grow on both banks of the river. Their leaves will not wither, nor will their fruit fail. Every month they will bear fruit, because the water from the sanctuary flows to them. Their fruit will serve for food and their leaves for healing.”
  - type: heading
    content: The Boundaries of the Land
  '13':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: “These are the boundaries of the land that you will divide among the twelve tribes of Israel as their inheritance, with two portions for Joseph. '
  '14':
  - type: text
    content: You are to divide it equally among them. Because I swore with uplifted hand to give it to your ancestors, this land will become your inheritance.
  '15':
  - type: text
    content: '“This is to be the boundary of the land:'
  - type: text
    content: '“On the north side it will run from the Mediterranean Sea by the Hethlon road past Lebo Hamath to Zedad, '
  '16':
  - type: text
    content: Berothah
  - type: note
    content: See Septuagint and 48:1; Hebrew road to go into Zedad, 16 Hamath, Berothah.
  - type: text
    content: ' and Sibraim (which lies on the border between Damascus and Hamath), as far as Hazer Hattikon, which is on the border of Hauran. '
  '17':
  - type: text
    content: The boundary will extend from the sea to Hazar Enan,
  - type: note
    content: Hebrew Enon, a variant of Enan
  - type: text
    content: ' along the northern border of Damascus, with the border of Hamath to the north. This will be the northern boundary.'
  '18':
  - type: text
    content: “On the east side the boundary will run between Hauran and Damascus, along the Jordan between Gilead and the land of Israel, to the Dead Sea and as far as Tamar.
  - type: note
    content: See Syriac; Hebrew Israel. You will measure to the Dead Sea.
  - type: text
    content: ' This will be the eastern boundary.'
  '19':
  - type: text
    content: “On the south side it will run from Tamar as far as the waters of Meribah Kadesh, then along the Wadi of Egypt to the Mediterranean Sea. This will be the southern boundary.
  '2':
  - type: text
    content: He then brought me out through the north gate and led me around the outside to the outer gate facing east, and the water was trickling from the south side.
  '20':
  - type: text
    content: “On the west side, the Mediterranean Sea will be the boundary to a point opposite Lebo Hamath. This will be the western boundary.
  '21':
  - type: text
    content: '“You are to distribute this land among yourselves according to the tribes of Israel. '
  '22':
  - type: text
    content: 'You are to allot it as an inheritance for yourselves and for the foreigners residing among you and who have children. You are to consider them as native-born Israelites; along with you they are to be allotted an inheritance among the tribes of Israel. '
  '23':
  - type: text
    content: 'In whatever tribe a foreigner resides, there you are to give them their inheritance,” declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: As the man went eastward with a measuring line in his hand, he measured off a thousand cubits
  - type: note
    content: That is, about 1,700 feet or about 530 meters
  - type: text
    content: ' and then led me through water that was ankle-deep. '
  '4':
  - type: text
    content: 'He measured off another thousand cubits and led me through water that was knee-deep. He measured off another thousand and led me through water that was up to the waist. '
  '5':
  - type: text
    content: 'He measured off another thousand, but now it was a river that I could not cross, because the water had risen and was deep enough to swim in—a river that no one could cross. '
  '6':
  - type: text
    content: He asked me, “Son of man, do you see this?”
  - type: text
    content: 'Then he led me back to the bank of the river. '
  '7':
  - type: text
    content: 'When I arrived there, I saw a great number of trees on each side of the river. '
  '8':
  - type: text
    content: He said to me, “This water flows toward the eastern region and goes down into the Arabah,
  - type: note
    content: Or the Jordan Valley
  - type: text
    content: ' where it enters the Dead Sea. When it empties into the sea, the salty water there becomes fresh. '
  '9':
  - type: text
    content: 'Swarms of living creatures will live wherever the river flows. There will be large numbers of fish, because this water flows there and makes the salt water fresh; so where the river flows everything will live. '
