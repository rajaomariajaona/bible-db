document_id: EZK.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The River From the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The man brought me back to the entrance to the temple, and I saw water coming out from under the threshold of the temple toward the east (for the temple faced east). The water was coming down from under the south side of the temple, south of the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He then brought me out through the north gate and led me around the outside to the outer gate facing east, and the water was trickling from the south side.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As the man went eastward with a measuring line in his hand, he measured off a thousand cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1,700 feet or about 530 meters
    marker-yv: yv-n
  - type: text
    text: ' and then led me through water that was ankle-deep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He measured off another thousand cubits and led me through water that was knee-deep. He measured off another thousand and led me through water that was up to the waist. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He measured off another thousand, but now it was a river that I could not cross, because the water had risen and was deep enough to swim in—a river that no one could cross. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He asked me, “Son of man, do you see this?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then he led me back to the bank of the river. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When I arrived there, I saw a great number of trees on each side of the river. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He said to me, “This water flows toward the eastern region and goes down into the Arabah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Jordan Valley
    marker-yv: yv-n
  - type: text
    text: ' where it enters the Dead Sea. When it empties into the sea, the salty water there becomes fresh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Swarms of living creatures will live wherever the river flows. There will be large numbers of fish, because this water flows there and makes the salt water fresh; so where the river flows everything will live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fishermen will stand along the shore; from En Gedi to En Eglaim there will be places for spreading nets. The fish will be of many kinds—like the fish of the Mediterranean Sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the swamps and marshes will not become fresh; they will be left for salt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fruit trees of all kinds will grow on both banks of the river. Their leaves will not wither, nor will their fruit fail. Every month they will bear fruit, because the water from the sanctuary flows to them. Their fruit will serve for food and their leaves for healing.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Boundaries of the Land
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: “These are the boundaries of the land that you will divide among the twelve tribes of Israel as their inheritance, with two portions for Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You are to divide it equally among them. Because I swore with uplifted hand to give it to your ancestors, this land will become your inheritance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“This is to be the boundary of the land:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: '“On the north side it will run from the Mediterranean Sea by the Hethlon road past Lebo Hamath to Zedad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Berothah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:15,16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Septuagint and 48:1; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'road to go into Zedad, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '16 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hamath, Berothah.
    marker-yv: yv-n
  - type: text
    text: ' and Sibraim (which lies on the border between Damascus and Hamath), as far as Hazer Hattikon, which is on the border of Hauran. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The boundary will extend from the sea to Hazar Enan,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Enon, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Enan
    marker-yv: yv-n
  - type: text
    text: ' along the northern border of Damascus, with the border of Hamath to the north. This will be the northern boundary.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “On the east side the boundary will run between Hauran and Damascus, along the Jordan between Gilead and the land of Israel, to the Dead Sea and as far as Tamar.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Syriac; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Israel. You will measure to the Dead Sea.
    marker-yv: yv-n
  - type: text
    text: ' This will be the eastern boundary.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “On the south side it will run from Tamar as far as the waters of Meribah Kadesh, then along the Wadi of Egypt to the Mediterranean Sea. This will be the southern boundary.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “On the west side, the Mediterranean Sea will be the boundary to a point opposite Lebo Hamath. This will be the western boundary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“You are to distribute this land among yourselves according to the tribes of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You are to allot it as an inheritance for yourselves and for the foreigners residing among you and who have children. You are to consider them as native-born Israelites; along with you they are to be allotted an inheritance among the tribes of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'In whatever tribe a foreigner resides, there you are to give them their inheritance,” declares the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
