document_id: JHN.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Comforts His Disciples
  - type: text
    content: ' '
  - type: text
    content: “Do not let your hearts be troubled. You believe in God
  - type: text
    content: ' '
  - type: note
    content: Or Believe in God
  - type: text
    content: ; believe also in me.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Don’t you believe that I am in the Father, and that the Father is in me? The words I say to you I do not speak on my own authority. Rather, it is the Father, living in me, who is doing his work.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Believe me when I say that I am in the Father and the Father is in me; or at least believe on the evidence of the works themselves.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Very truly I tell you, whoever believes in me will do the works I have been doing, and they will do even greater things than these, because I am going to the Father.
  - type: text
    content: ' '
  '13':
  - type: text
    content: And I will do whatever you ask in my name, so that the Father may be glorified in the Son.
  - type: text
    content: ' '
  '14':
  - type: text
    content: You may ask me for anything in my name, and I will do it.
  - type: heading
    content: Jesus Promises the Holy Spirit
  '15':
  - type: text
    content: ' '
  - type: text
    content: “If you love me, keep my commands.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And I will ask the Father, and he will give you another advocate to help you and be with you forever—
  - type: text
    content: ' '
  '17':
  - type: text
    content: the Spirit of truth. The world cannot accept him, because it neither sees him nor knows him. But you know him, for he lives with you and will be
  - type: note
    content: Some early manuscripts and is
  - type: text
    content: ' '
  - type: text
    content: in you.
  - type: text
    content: ' '
  '18':
  - type: text
    content: I will not leave you as orphans; I will come to you.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Before long, the world will not see me anymore, but you will see me. Because I live, you also will live.
  - type: text
    content: ' '
  '2':
  - type: text
    content: My Father’s house has many rooms; if that were not so, would I have told you that I am going there to prepare a place for you?
  - type: text
    content: ' '
  '20':
  - type: text
    content: On that day you will realize that I am in my Father, and you are in me, and I am in you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Whoever has my commands and keeps them is the one who loves me. The one who loves me will be loved by my Father, and I too will love them and show myself to them.”
  '22':
  - type: text
    content: Then Judas (not Judas Iscariot) said, “But, Lord, why do you intend to show yourself to us and not to the world?”
  '23':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Anyone who loves me will obey my teaching. My Father will love them, and we will come to them and make our home with them.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Anyone who does not love me will not obey my teaching. These words you hear are not my own; they belong to the Father who sent me.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “All this I have spoken while still with you.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But the Advocate, the Holy Spirit, whom the Father will send in my name, will teach you all things and will remind you of everything I have said to you.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Peace I leave with you; my peace I give you. I do not give to you as the world gives. Do not let your hearts be troubled and do not be afraid.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “You heard me say, ‘I am going away and I am coming back to you.’ If you loved me, you would be glad that I am going to the Father, for the Father is greater than I.
  - type: text
    content: ' '
  '29':
  - type: text
    content: I have told you now before it happens, so that when it does happen you will believe.
  - type: text
    content: ' '
  '3':
  - type: text
    content: And if I go and prepare a place for you, I will come back and take you to be with me that you also may be where I am.
  - type: text
    content: ' '
  '30':
  - type: text
    content: I will not say much more to you, for the prince of this world is coming. He has no hold over me,
  - type: text
    content: ' '
  '31':
  - type: text
    content: but he comes so that the world may learn that I love the Father and do exactly what my Father has commanded me.
  - type: text
    content: “Come now; let us leave.
  '4':
  - type: text
    content: You know the way to the place where I am going.”
  - type: heading
    content: Jesus the Way to the Father
  '5':
  - type: text
    content: Thomas said to him, “Lord, we don’t know where you are going, so how can we know the way?”
  '6':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “I am the way and the truth and the life. No one comes to the Father except through me.
  - type: text
    content: ' '
  '7':
  - type: text
    content: If you really know me, you will know
  - type: note
    content: Some manuscripts If you really knew me, you would know
  - type: text
    content: ' '
  - type: text
    content: my Father as well. From now on, you do know him and have seen him.”
  '8':
  - type: text
    content: Philip said, “Lord, show us the Father and that will be enough for us.”
  '9':
  - type: text
    content: 'Jesus answered: '
  - type: text
    content: “Don’t you know me, Philip, even after I have been among you such a long time? Anyone who has seen me has seen the Father. How can you say, ‘Show us the Father’?
  - type: text
    content: ' '
