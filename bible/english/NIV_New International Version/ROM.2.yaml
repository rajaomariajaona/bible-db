document_id: ROM.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Righteous Judgment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'You, therefore, have no excuse, you who pass judgment on someone else, for at whatever point you judge another, you are condemning yourself, because you who pass judgment do the same things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now we know that God’s judgment against those who do such things is based on truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So when you, a mere human being, pass judgment on them and yet do the same things, do you think you will escape God’s judgment? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Or do you show contempt for the riches of his kindness, forbearance and patience, not realizing that God’s kindness is intended to lead you to repentance?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But because of your stubbornness and your unrepentant heart, you are storing up wrath against yourself for the day of God’s wrath, when his righteous judgment will be revealed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: God “will repay each person according to what they have done.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 62:12; Prov. 24:12
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'To those who by persistence in doing good seek glory, honor and immortality, he will give eternal life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But for those who are self-seeking and who reject the truth and follow evil, there will be wrath and anger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'There will be trouble and distress for every human being who does evil: first for the Jew, then for the Gentile; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'but glory, honor and peace for everyone who does good: first for the Jew, then for the Gentile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For God does not show favoritism.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'All who sin apart from the law will also perish apart from the law, and all who sin under the law will be judged by the law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For it is not those who hear the law who are righteous in God’s sight, but it is those who obey the law who will be declared righteous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '(Indeed, when Gentiles, who do not have the law, do by nature things required by the law, they are a law for themselves, even though they do not have the law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They show that the requirements of the law are written on their hearts, their consciences also bearing witness, and their thoughts sometimes accusing them and at other times even defending them.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: This will take place on the day when God judges people’s secrets through Jesus Christ, as my gospel declares.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Jews and the Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now you, if you call yourself a Jew; if you rely on the law and boast in God; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'if you know his will and approve of what is superior because you are instructed by the law; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'if you are convinced that you are a guide for the blind, a light for those who are in the dark, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'an instructor of the foolish, a teacher of little children, because you have in the law the embodiment of knowledge and truth— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'you, then, who teach others, do you not teach yourself? You who preach against stealing, do you steal? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You who say that people should not commit adultery, do you commit adultery? You who abhor idols, do you rob temples? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'You who boast in the law, do you dishonor God by breaking the law? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'As it is written: “God’s name is blasphemed among the Gentiles because of you.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 52:5 (see Septuagint); Ezek. 36:20,22
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Circumcision has value if you observe the law, but if you break the law, you have become as though you had not been circumcised. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So then, if those who are not circumcised keep the law’s requirements, will they not be regarded as though they were circumcised? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The one who is not circumcised physically and yet obeys the law will condemn you who, even though you have the
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who, by means of a
    marker-yv: yv-n
  - type: text
    text: ' written code and circumcision, are a lawbreaker.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A person is not a Jew who is one only outwardly, nor is circumcision merely outward and physical. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: No, a person is a Jew who is one inwardly; and circumcision is circumcision of the heart, by the Spirit, not by the written code. Such a person’s praise is not from other people, but from God.
