document_id: ROM.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Righteous Judgment
  - type: text
    content: 'You, therefore, have no excuse, you who pass judgment on someone else, for at whatever point you judge another, you are condemning yourself, because you who pass judgment do the same things. '
  '10':
  - type: text
    content: 'but glory, honor and peace for everyone who does good: first for the Jew, then for the Gentile. '
  '11':
  - type: text
    content: For God does not show favoritism.
  '12':
  - type: text
    content: 'All who sin apart from the law will also perish apart from the law, and all who sin under the law will be judged by the law. '
  '13':
  - type: text
    content: 'For it is not those who hear the law who are righteous in God’s sight, but it is those who obey the law who will be declared righteous. '
  '14':
  - type: text
    content: '(Indeed, when Gentiles, who do not have the law, do by nature things required by the law, they are a law for themselves, even though they do not have the law. '
  '15':
  - type: text
    content: 'They show that the requirements of the law are written on their hearts, their consciences also bearing witness, and their thoughts sometimes accusing them and at other times even defending them.) '
  '16':
  - type: text
    content: This will take place on the day when God judges people’s secrets through Jesus Christ, as my gospel declares.
  - type: heading
    content: The Jews and the Law
  '17':
  - type: text
    content: 'Now you, if you call yourself a Jew; if you rely on the law and boast in God; '
  '18':
  - type: text
    content: 'if you know his will and approve of what is superior because you are instructed by the law; '
  '19':
  - type: text
    content: 'if you are convinced that you are a guide for the blind, a light for those who are in the dark, '
  '2':
  - type: text
    content: 'Now we know that God’s judgment against those who do such things is based on truth. '
  '20':
  - type: text
    content: 'an instructor of the foolish, a teacher of little children, because you have in the law the embodiment of knowledge and truth— '
  '21':
  - type: text
    content: 'you, then, who teach others, do you not teach yourself? You who preach against stealing, do you steal? '
  '22':
  - type: text
    content: 'You who say that people should not commit adultery, do you commit adultery? You who abhor idols, do you rob temples? '
  '23':
  - type: text
    content: 'You who boast in the law, do you dishonor God by breaking the law? '
  '24':
  - type: text
    content: 'As it is written: “God’s name is blasphemed among the Gentiles because of you.”'
  - type: note
    content: Isaiah 52:5 (see Septuagint); Ezek. 36:20,22
  '25':
  - type: text
    content: 'Circumcision has value if you observe the law, but if you break the law, you have become as though you had not been circumcised. '
  '26':
  - type: text
    content: 'So then, if those who are not circumcised keep the law’s requirements, will they not be regarded as though they were circumcised? '
  '27':
  - type: text
    content: The one who is not circumcised physically and yet obeys the law will condemn you who, even though you have the
  - type: note
    content: Or who, by means of a
  - type: text
    content: ' written code and circumcision, are a lawbreaker.'
  '28':
  - type: text
    content: 'A person is not a Jew who is one only outwardly, nor is circumcision merely outward and physical. '
  '29':
  - type: text
    content: No, a person is a Jew who is one inwardly; and circumcision is circumcision of the heart, by the Spirit, not by the written code. Such a person’s praise is not from other people, but from God.
  '3':
  - type: text
    content: 'So when you, a mere human being, pass judgment on them and yet do the same things, do you think you will escape God’s judgment? '
  '4':
  - type: text
    content: Or do you show contempt for the riches of his kindness, forbearance and patience, not realizing that God’s kindness is intended to lead you to repentance?
  '5':
  - type: text
    content: 'But because of your stubbornness and your unrepentant heart, you are storing up wrath against yourself for the day of God’s wrath, when his righteous judgment will be revealed. '
  '6':
  - type: text
    content: God “will repay each person according to what they have done.”
  - type: note
    content: Psalm 62:12; Prov. 24:12
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'To those who by persistence in doing good seek glory, honor and immortality, he will give eternal life. '
  '8':
  - type: text
    content: 'But for those who are self-seeking and who reject the truth and follow evil, there will be wrath and anger. '
  '9':
  - type: text
    content: 'There will be trouble and distress for every human being who does evil: first for the Jew, then for the Gentile; '
