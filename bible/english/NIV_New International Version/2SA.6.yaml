document_id: 2SA.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Brought to Jerusalem
  - type: text
    content: 'David again brought together all the able young men of Israel—thirty thousand. '
  '10':
  - type: text
    content: 'He was not willing to take the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' to be with him in the City of David. Instead, he took it to the house of Obed-Edom the Gittite. '
  '11':
  - type: text
    content: 'The ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' remained in the house of Obed-Edom the Gittite for three months, and the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed him and his entire household.'
  '12':
  - type: text
    content: 'Now King David was told, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed the household of Obed-Edom and everything he has, because of the ark of God.” So David went to bring up the ark of God from the house of Obed-Edom to the City of David with rejoicing. '
  '13':
  - type: text
    content: 'When those who were carrying the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' had taken six steps, he sacrificed a bull and a fattened calf. '
  '14':
  - type: text
    content: 'Wearing a linen ephod, David was dancing before the '
  - type: text
    content: Lord
  - type: text
    content: ' with all his might, '
  '15':
  - type: text
    content: 'while he and all Israel were bringing up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' with shouts and the sound of trumpets.'
  '16':
  - type: text
    content: 'As the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' was entering the City of David, Michal daughter of Saul watched from a window. And when she saw King David leaping and dancing before the '
  - type: text
    content: Lord
  - type: text
    content: ', she despised him in her heart.'
  '17':
  - type: text
    content: 'They brought the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and set it in its place inside the tent that David had pitched for it, and David sacrificed burnt offerings and fellowship offerings before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'After he had finished sacrificing the burnt offerings and fellowship offerings, he blessed the people in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. '
  '19':
  - type: text
    content: Then he gave a loaf of bread, a cake of dates and a cake of raisins to each person in the whole crowd of Israelites, both men and women. And all the people went to their homes.
  '2':
  - type: text
    content: He and all his men went to Baalah
  - type: note
    content: That is, Kiriath Jearim (see 1 Chron. 13:6)
  - type: text
    content: ' in Judah to bring up from there the ark of God, which is called by the Name,'
  - type: note
    content: Hebrew; Septuagint and Vulgate do not have the Name.
  - type: text
    content: ' the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, who is enthroned between the cherubim on the ark. '
  '20':
  - type: text
    content: When David returned home to bless his household, Michal daughter of Saul came out to meet him and said, “How the king of Israel has distinguished himself today, going around half-naked in full view of the slave girls of his servants as any vulgar fellow would!”
  '21':
  - type: text
    content: 'David said to Michal, “It was before the '
  - type: text
    content: Lord
  - type: text
    content: ', who chose me rather than your father or anyone from his house when he appointed me ruler over the '
  - type: text
    content: Lord
  - type: text
    content: '’s people Israel—I will celebrate before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: I will become even more undignified than this, and I will be humiliated in my own eyes. But by these slave girls you spoke of, I will be held in honor.”
  '23':
  - type: text
    content: And Michal daughter of Saul had no children to the day of her death.
  '3':
  - type: text
    content: 'They set the ark of God on a new cart and brought it from the house of Abinadab, which was on the hill. Uzzah and Ahio, sons of Abinadab, were guiding the new cart '
  '4':
  - type: text
    content: with the ark of God on it,
  - type: note
    content: Dead Sea Scrolls and some Septuagint manuscripts; Masoretic Text cart 4 and they brought it with the ark of God from the house of Abinadab, which was on the hill
  - type: text
    content: ' and Ahio was walking in front of it. '
  '5':
  - type: text
    content: 'David and all Israel were celebrating with all their might before the '
  - type: text
    content: Lord
  - type: text
    content: ', with castanets,'
  - type: note
    content: Masoretic Text; Dead Sea Scrolls and Septuagint (see also 1 Chron. 13:8) songs
  - type: text
    content: ' harps, lyres, timbrels, sistrums and cymbals.'
  '6':
  - type: text
    content: 'When they came to the threshing floor of Nakon, Uzzah reached out and took hold of the ark of God, because the oxen stumbled. '
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s anger burned against Uzzah because of his irreverent act; therefore God struck him down, and he died there beside the ark of God.
  '8':
  - type: text
    content: 'Then David was angry because the '
  - type: text
    content: Lord
  - type: text
    content: ’s wrath had broken out against Uzzah, and to this day that place is called Perez Uzzah.
  - type: note
    content: Perez Uzzah means outbreak against Uzzah.
  '9':
  - type: text
    content: 'David was afraid of the '
  - type: text
    content: Lord
  - type: text
    content: ' that day and said, “How can the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' ever come to me?” '
