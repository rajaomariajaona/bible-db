document_id: EPH.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Follow God’s example, therefore, as dearly loved children '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and find out what pleases the Lord. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have nothing to do with the fruitless deeds of darkness, but rather expose them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is shameful even to mention what the disobedient do in secret. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But everything exposed by the light becomes visible—and everything that is illuminated becomes a light. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is why it is said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Wake up, sleeper,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rise from the dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Christ will shine on you.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be very careful, then, how you live—not as unwise but as wise, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'making the most of every opportunity, because the days are evil. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore do not be foolish, but understand what the Lord’s will is. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not get drunk on wine, which leads to debauchery. Instead, be filled with the Spirit, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'speaking to one another with psalms, hymns, and songs from the Spirit. Sing and make music from your heart to the Lord, '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: and walk in the way of love, just as Christ loved us and gave himself up for us as a fragrant offering and sacrifice to God.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: always giving thanks to God the Father for everything, in the name of our Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions for Christian Households
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Submit to one another out of reverence for Christ.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Wives, submit yourselves to your own husbands as you do to the Lord. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the husband is the head of the wife as Christ is the head of the church, his body, of which he is the Savior. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now as the church submits to Christ, so also wives should submit to their husbands in everything.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Husbands, love your wives, just as Christ loved the church and gave himself up for her '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: to make her holy, cleansing
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: having cleansed
      marker-yv: yv-n
    - type: text
      text: ' her by the washing with water through the word, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to present her to himself as a radiant church, without stain or wrinkle or any other blemish, but holy and blameless. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In this same way, husbands ought to love their wives as their own bodies. He who loves his wife loves himself. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After all, no one ever hated their own body, but they feed and care for their body, just as Christ does the church— '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But among you there must not be even a hint of sexual immorality, or of any kind of impurity, or of greed, because these are improper for God’s holy people. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for we are members of his body. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For this reason a man will leave his father and mother and be united to his wife, and the two will become one flesh.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 2:24
      marker-yv: yv-n
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is a profound mystery—but I am talking about Christ and the church. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, each one of you also must love his wife as he loves himself, and the wife must respect her husband.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nor should there be obscenity, foolish talk or coarse joking, which are out of place, but rather thanksgiving. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For of this you can be sure: No immoral, impure or greedy person—such a person is an idolater—has any inheritance in the kingdom of Christ and of God.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: kingdom of the Messiah and God
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let no one deceive you with empty words, for because of such things God’s wrath comes on those who are disobedient. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore do not be partners with them.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you were once darkness, but now you are light in the Lord. Live as children of light '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(for the fruit of the light consists in all goodness, righteousness and truth) '
