document_id: JOL.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Nations Judged
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 3:1-21 is numbered 4:1-21.
      marker-yv: yv-n
    - type: text
      text: “In those days and at that time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I restore the fortunes of Judah and Jerusalem,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beat your plowshares into swords
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your pruning hooks into spears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the weakling say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I am strong!”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come quickly, all you nations from every side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and assemble there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bring down your warriors, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let the nations be roused;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them advance into the Valley of Jehoshaphat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for there I will sit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to judge all the nations on every side.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swing the sickle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the harvest is ripe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, trample the grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the winepress is full
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the vats overflow—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so great is their wickedness!”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Multitudes, multitudes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the valley of decision!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is near'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the valley of decision.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun and moon will be darkened,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the stars no longer shine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will roar from Zion'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thunder from Jerusalem;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the earth and the heavens will tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be a refuge for his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a stronghold for the people of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Blessings for God’s People
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Then you will know that I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dwell in Zion, my holy hill.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem will be holy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never again will foreigners invade her.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In that day the mountains will drip new wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the hills will flow with milk;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the ravines of Judah will run with water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A fountain will flow out of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will water the valley of acacias.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Valley of Shittim
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Egypt will be desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Edom a desert waste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of violence done to the people of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in whose land they shed innocent blood.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will gather all nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring them down to the Valley of Jehoshaphat.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jehoshaphat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' judges'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 12.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There I will put them on trial
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for what they did to my inheritance, my people Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they scattered my people among the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and divided up my land.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judah will be inhabited forever
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Jerusalem through all generations.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shall I leave their innocent blood unavenged?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No, I will not.”
  - type: usfm
    marker: qc
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' dwells in Zion!'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cast lots for my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and traded boys for prostitutes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they sold girls for wine to drink.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now what have you against me, Tyre and Sidon and all you regions of Philistia? Are you repaying me for something I have done? If you are paying me back, I will swiftly and speedily return on your own heads what you have done. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For you took my silver and my gold and carried off my finest treasures to your temples.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: palaces
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You sold the people of Judah and Jerusalem to the Greeks, that you might send them far from their homeland.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“See, I am going to rouse them out of the places to which you sold them, and I will return on your own heads what you have done. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will sell your sons and daughters to the people of Judah, and they will sell them to the Sabeans, a nation far away.” The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Proclaim this among the nations:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Prepare for war!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rouse the warriors!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let all the fighting men draw near and attack.
