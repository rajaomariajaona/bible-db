document_id: JOL.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Nations Judged
  - type: note
    content: In Hebrew texts 3:1-21 is numbered 4:1-21.
  - type: text
    content: “In those days and at that time,
  - type: text
    content: when I restore the fortunes of Judah and Jerusalem,
  '10':
  - type: text
    content: Beat your plowshares into swords
  - type: text
    content: and your pruning hooks into spears.
  - type: text
    content: Let the weakling say,
  - type: text
    content: “I am strong!”
  '11':
  - type: text
    content: Come quickly, all you nations from every side,
  - type: text
    content: and assemble there.
  - type: text
    content: 'Bring down your warriors, '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '12':
  - type: text
    content: “Let the nations be roused;
  - type: text
    content: let them advance into the Valley of Jehoshaphat,
  - type: text
    content: for there I will sit
  - type: text
    content: to judge all the nations on every side.
  '13':
  - type: text
    content: Swing the sickle,
  - type: text
    content: for the harvest is ripe.
  - type: text
    content: Come, trample the grapes,
  - type: text
    content: for the winepress is full
  - type: text
    content: and the vats overflow—
  - type: text
    content: so great is their wickedness!”
  '14':
  - type: text
    content: Multitudes, multitudes
  - type: text
    content: in the valley of decision!
  - type: text
    content: 'For the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near'
  - type: text
    content: in the valley of decision.
  '15':
  - type: text
    content: The sun and moon will be darkened,
  - type: text
    content: and the stars no longer shine.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will roar from Zion'
  - type: text
    content: and thunder from Jerusalem;
  - type: text
    content: the earth and the heavens will tremble.
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will be a refuge for his people,'
  - type: text
    content: a stronghold for the people of Israel.
  - type: heading
    content: Blessings for God’s People
  '17':
  - type: text
    content: '“Then you will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: dwell in Zion, my holy hill.
  - type: text
    content: Jerusalem will be holy;
  - type: text
    content: never again will foreigners invade her.
  '18':
  - type: text
    content: “In that day the mountains will drip new wine,
  - type: text
    content: and the hills will flow with milk;
  - type: text
    content: all the ravines of Judah will run with water.
  - type: text
    content: 'A fountain will flow out of the '
  - type: text
    content: Lord
  - type: text
    content: ’s house
  - type: text
    content: and will water the valley of acacias.
  - type: note
    content: Or Valley of Shittim
  '19':
  - type: text
    content: But Egypt will be desolate,
  - type: text
    content: Edom a desert waste,
  - type: text
    content: because of violence done to the people of Judah,
  - type: text
    content: in whose land they shed innocent blood.
  '2':
  - type: text
    content: I will gather all nations
  - type: text
    content: and bring them down to the Valley of Jehoshaphat.
  - type: note
    content: Jehoshaphat means the Lord judges; also in verse 12.
  - type: text
    content: There I will put them on trial
  - type: text
    content: for what they did to my inheritance, my people Israel,
  - type: text
    content: because they scattered my people among the nations
  - type: text
    content: and divided up my land.
  '20':
  - type: text
    content: Judah will be inhabited forever
  - type: text
    content: and Jerusalem through all generations.
  '21':
  - type: text
    content: Shall I leave their innocent blood unavenged?
  - type: text
    content: No, I will not.”
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' dwells in Zion!'
  '3':
  - type: text
    content: They cast lots for my people
  - type: text
    content: and traded boys for prostitutes;
  - type: text
    content: they sold girls for wine to drink.
  '4':
  - type: text
    content: '“Now what have you against me, Tyre and Sidon and all you regions of Philistia? Are you repaying me for something I have done? If you are paying me back, I will swiftly and speedily return on your own heads what you have done. '
  '5':
  - type: text
    content: For you took my silver and my gold and carried off my finest treasures to your temples.
  - type: note
    content: Or palaces
  - type: text
    content: ' '
  '6':
  - type: text
    content: You sold the people of Judah and Jerusalem to the Greeks, that you might send them far from their homeland.
  '7':
  - type: text
    content: '“See, I am going to rouse them out of the places to which you sold them, and I will return on your own heads what you have done. '
  '8':
  - type: text
    content: 'I will sell your sons and daughters to the people of Judah, and they will sell them to the Sabeans, a nation far away.” The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '9':
  - type: text
    content: 'Proclaim this among the nations:'
  - type: text
    content: Prepare for war!
  - type: text
    content: Rouse the warriors!
  - type: text
    content: Let all the fighting men draw near and attack.
