document_id: JOL.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: An Army of Locusts
  - type: text
    content: Blow the trumpet in Zion;
  - type: text
    content: sound the alarm on my holy hill.
  - type: text
    content: Let all who live in the land tremble,
  - type: text
    content: 'for the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is coming.'
  - type: text
    content: It is close at hand—
  '10':
  - type: text
    content: Before them the earth shakes,
  - type: text
    content: the heavens tremble,
  - type: text
    content: the sun and moon are darkened,
  - type: text
    content: and the stars no longer shine.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' thunders'
  - type: text
    content: at the head of his army;
  - type: text
    content: his forces are beyond number,
  - type: text
    content: and mighty is the army that obeys his command.
  - type: text
    content: 'The day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is great;'
  - type: text
    content: it is dreadful.
  - type: text
    content: Who can endure it?
  - type: heading
    content: Rend Your Heart
  '12':
  - type: text
    content: '“Even now,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “return to me with all your heart,
  - type: text
    content: with fasting and weeping and mourning.”
  '13':
  - type: text
    content: Rend your heart
  - type: text
    content: and not your garments.
  - type: text
    content: 'Return to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: for he is gracious and compassionate,
  - type: text
    content: slow to anger and abounding in love,
  - type: text
    content: and he relents from sending calamity.
  '14':
  - type: text
    content: Who knows? He may turn and relent
  - type: text
    content: and leave behind a blessing—
  - type: text
    content: grain offerings and drink offerings
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '15':
  - type: text
    content: Blow the trumpet in Zion,
  - type: text
    content: declare a holy fast,
  - type: text
    content: call a sacred assembly.
  '16':
  - type: text
    content: Gather the people,
  - type: text
    content: consecrate the assembly;
  - type: text
    content: bring together the elders,
  - type: text
    content: gather the children,
  - type: text
    content: those nursing at the breast.
  - type: text
    content: Let the bridegroom leave his room
  - type: text
    content: and the bride her chamber.
  '17':
  - type: text
    content: 'Let the priests, who minister before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: weep between the portico and the altar.
  - type: text
    content: 'Let them say, “Spare your people, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Do not make your inheritance an object of scorn,
  - type: text
    content: a byword among the nations.
  - type: text
    content: Why should they say among the peoples,
  - type: text
    content: ‘Where is their God?’ ”
  - type: heading
    content: The Lord’s Answer
  '18':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' was jealous for his land'
  - type: text
    content: and took pity on his people.
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied'
  - type: note
    content: Or Lord will be jealous… / and take pity… / 19 The Lord will reply
  - type: text
    content: ' to them:'
  - type: text
    content: “I am sending you grain, new wine and olive oil,
  - type: text
    content: enough to satisfy you fully;
  - type: text
    content: never again will I make you
  - type: text
    content: an object of scorn to the nations.
  '2':
  - type: text
    content: a day of darkness and gloom,
  - type: text
    content: a day of clouds and blackness.
  - type: text
    content: Like dawn spreading across the mountains
  - type: text
    content: a large and mighty army comes,
  - type: text
    content: such as never was in ancient times
  - type: text
    content: nor ever will be in ages to come.
  '20':
  - type: text
    content: “I will drive the northern horde far from you,
  - type: text
    content: pushing it into a parched and barren land;
  - type: text
    content: its eastern ranks will drown in the Dead Sea
  - type: text
    content: and its western ranks in the Mediterranean Sea.
  - type: text
    content: And its stench will go up;
  - type: text
    content: its smell will rise.”
  - type: text
    content: Surely he has done great things!
  '21':
  - type: text
    content: Do not be afraid, land of Judah;
  - type: text
    content: be glad and rejoice.
  - type: text
    content: 'Surely the '
  - type: text
    content: Lord
  - type: text
    content: ' has done great things!'
  '22':
  - type: text
    content: Do not be afraid, you wild animals,
  - type: text
    content: for the pastures in the wilderness are becoming green.
  - type: text
    content: The trees are bearing their fruit;
  - type: text
    content: the fig tree and the vine yield their riches.
  '23':
  - type: text
    content: Be glad, people of Zion,
  - type: text
    content: 'rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: for he has given you the autumn rains
  - type: text
    content: because he is faithful.
  - type: text
    content: He sends you abundant showers,
  - type: text
    content: both autumn and spring rains, as before.
  '24':
  - type: text
    content: The threshing floors will be filled with grain;
  - type: text
    content: the vats will overflow with new wine and oil.
  '25':
  - type: text
    content: “I will repay you for the years the locusts have eaten—
  - type: text
    content: the great locust and the young locust,
  - type: text
    content: the other locusts and the locust swarm
  - type: note
    content: The precise meaning of the four Hebrew words used here for locusts is uncertain.
  - type: text
    content: —
  - type: text
    content: my great army that I sent among you.
  '26':
  - type: text
    content: You will have plenty to eat, until you are full,
  - type: text
    content: 'and you will praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: who has worked wonders for you;
  - type: text
    content: never again will my people be shamed.
  '27':
  - type: text
    content: Then you will know that I am in Israel,
  - type: text
    content: 'that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: and that there is no other;
  - type: text
    content: never again will my people be shamed.
  - type: heading
    content: The Day of the Lord
  '28':
  - type: text
    content: “And afterward,
  - type: text
    content: I will pour out my Spirit on all people.
  - type: text
    content: Your sons and daughters will prophesy,
  - type: text
    content: your old men will dream dreams,
  - type: text
    content: your young men will see visions.
  '29':
  - type: text
    content: Even on my servants, both men and women,
  - type: text
    content: I will pour out my Spirit in those days.
  '3':
  - type: text
    content: Before them fire devours,
  - type: text
    content: behind them a flame blazes.
  - type: text
    content: Before them the land is like the garden of Eden,
  - type: text
    content: behind them, a desert waste—
  - type: text
    content: nothing escapes them.
  '30':
  - type: text
    content: I will show wonders in the heavens
  - type: text
    content: and on the earth,
  - type: text
    content: blood and fire and billows of smoke.
  '31':
  - type: text
    content: The sun will be turned to darkness
  - type: text
    content: and the moon to blood
  - type: text
    content: 'before the coming of the great and dreadful day of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '32':
  - type: text
    content: And everyone who calls
  - type: text
    content: 'on the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be saved;'
  - type: text
    content: for on Mount Zion and in Jerusalem
  - type: text
    content: there will be deliverance,
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' has said,'
  - type: text
    content: even among the survivors
  - type: text
    content: 'whom the '
  - type: text
    content: Lord
  - type: text
    content: ' calls.'
  - type: note
    content: In Hebrew texts 2:28-32 is numbered 3:1-5.
  '4':
  - type: text
    content: They have the appearance of horses;
  - type: text
    content: they gallop along like cavalry.
  '5':
  - type: text
    content: With a noise like that of chariots
  - type: text
    content: they leap over the mountaintops,
  - type: text
    content: like a crackling fire consuming stubble,
  - type: text
    content: like a mighty army drawn up for battle.
  '6':
  - type: text
    content: At the sight of them, nations are in anguish;
  - type: text
    content: every face turns pale.
  '7':
  - type: text
    content: They charge like warriors;
  - type: text
    content: they scale walls like soldiers.
  - type: text
    content: They all march in line,
  - type: text
    content: not swerving from their course.
  '8':
  - type: text
    content: They do not jostle each other;
  - type: text
    content: each marches straight ahead.
  - type: text
    content: They plunge through defenses
  - type: text
    content: without breaking ranks.
  '9':
  - type: text
    content: They rush upon the city;
  - type: text
    content: they run along the wall.
  - type: text
    content: They climb into the houses;
  - type: text
    content: like thieves they enter through the windows.
