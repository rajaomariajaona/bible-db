document_id: JOL.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Army of Locusts
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Blow the trumpet in Zion;
- type: usfm
  marker: q2
  children:
  - type: text
    text: sound the alarm on my holy hill.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all who live in the land tremble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is coming.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is close at hand—
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: a day of darkness and gloom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a day of clouds and blackness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like dawn spreading across the mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: a large and mighty army comes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: such as never was in ancient times
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor ever will be in ages to come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Before them fire devours,
- type: usfm
  marker: q2
  children:
  - type: text
    text: behind them a flame blazes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before them the land is like the garden of Eden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: behind them, a desert waste—
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing escapes them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They have the appearance of horses;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they gallop along like cavalry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: With a noise like that of chariots
- type: usfm
  marker: q2
  children:
  - type: text
    text: they leap over the mountaintops,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a crackling fire consuming stubble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a mighty army drawn up for battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: At the sight of them, nations are in anguish;
- type: usfm
  marker: q2
  children:
  - type: text
    text: every face turns pale.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They charge like warriors;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they scale walls like soldiers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They all march in line,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not swerving from their course.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They do not jostle each other;
- type: usfm
  marker: q2
  children:
  - type: text
    text: each marches straight ahead.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They plunge through defenses
- type: usfm
  marker: q2
  children:
  - type: text
    text: without breaking ranks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: They rush upon the city;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they run along the wall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They climb into the houses;
- type: usfm
  marker: q2
  children:
  - type: text
    text: like thieves they enter through the windows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Before them the earth shakes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the heavens tremble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the sun and moon are darkened,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the stars no longer shine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' thunders'
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the head of his army;
- type: usfm
  marker: q1
  children:
  - type: text
    text: his forces are beyond number,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and mighty is the army that obeys his command.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is great;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is dreadful.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can endure it?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rend Your Heart
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Even now,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “return to me with all your heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with fasting and weeping and mourning.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Rend your heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not your garments.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Return to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he is gracious and compassionate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: slow to anger and abounding in love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he relents from sending calamity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Who knows? He may turn and relent
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leave behind a blessing—
- type: usfm
  marker: q1
  children:
  - type: text
    text: grain offerings and drink offerings
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Blow the trumpet in Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: declare a holy fast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: call a sacred assembly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Gather the people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: consecrate the assembly;
- type: usfm
  marker: q1
  children:
  - type: text
    text: bring together the elders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gather the children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those nursing at the breast.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the bridegroom leave his room
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the bride her chamber.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Let the priests, who minister before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: weep between the portico and the altar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Let them say, “Spare your people, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not make your inheritance an object of scorn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a byword among the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why should they say among the peoples,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Where is their God?’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Answer
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was jealous for his land'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and took pity on his people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:18,19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' will be jealous… / and take pity… / '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '19 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'The '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' will reply'
    marker-yv: yv-n
  - type: text
    text: ' to them:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am sending you grain, new wine and olive oil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: enough to satisfy you fully;
- type: usfm
  marker: q1
  children:
  - type: text
    text: never again will I make you
- type: usfm
  marker: q2
  children:
  - type: text
    text: an object of scorn to the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “I will drive the northern horde far from you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pushing it into a parched and barren land;
- type: usfm
  marker: q1
  children:
  - type: text
    text: its eastern ranks will drown in the Dead Sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its western ranks in the Mediterranean Sea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And its stench will go up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its smell will rise.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surely he has done great things!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Do not be afraid, land of Judah;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be glad and rejoice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Surely the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has done great things!'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Do not be afraid, you wild animals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the pastures in the wilderness are becoming green.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The trees are bearing their fruit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fig tree and the vine yield their riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Be glad, people of Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he has given you the autumn rains
- type: usfm
  marker: q2
  children:
  - type: text
    text: because he is faithful.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He sends you abundant showers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: both autumn and spring rains, as before.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The threshing floors will be filled with grain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the vats will overflow with new wine and oil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “I will repay you for the years the locusts have eaten—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the great locust and the young locust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the other locusts and the locust swarm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The precise meaning of the four Hebrew words used here for locusts is uncertain.
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: text
    text: my great army that I sent among you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: You will have plenty to eat, until you are full,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and you will praise the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who has worked wonders for you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: never again will my people be shamed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Then you will know that I am in Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and that there is no other;
- type: usfm
  marker: q1
  children:
  - type: text
    text: never again will my people be shamed.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “And afterward,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will pour out my Spirit on all people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sons and daughters will prophesy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your old men will dream dreams,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your young men will see visions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Even on my servants, both men and women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will pour out my Spirit in those days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I will show wonders in the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and on the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blood and fire and billows of smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The sun will be turned to darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the moon to blood
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'before the coming of the great and dreadful day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And everyone who calls
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'on the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be saved;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: for on Mount Zion and in Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: there will be deliverance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has said,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: even among the survivors
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' calls.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 2:28-32 is numbered 3:1-5.
    marker-yv: yv-n
