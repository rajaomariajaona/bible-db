document_id: 2SA.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sheba Rebels Against David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now a troublemaker named Sheba son of Bikri, a Benjamite, happened to be there. He sounded the trumpet and shouted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “We have no share in David,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no part in Jesse’s son!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every man to his tent, Israel!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So all the men of Israel deserted David to follow Sheba son of Bikri. But the men of Judah stayed by their king all the way from the Jordan to Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When David returned to his palace in Jerusalem, he took the ten concubines he had left to take care of the palace and put them in a house under guard. He provided for them but had no sexual relations with them. They were kept in confinement till the day of their death, living as widows.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the king said to Amasa, “Summon the men of Judah to come to me within three days, and be here yourself.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But when Amasa went to summon Judah, he took longer than the time the king had set for him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: David said to Abishai, “Now Sheba son of Bikri will do us more harm than Absalom did. Take your master’s men and pursue him, or he will find fortified cities and escape from us.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and do us serious injury
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So Joab’s men and the Kerethites and Pelethites and all the mighty warriors went out under the command of Abishai. They marched out from Jerusalem to pursue Sheba son of Bikri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: While they were at the great rock in Gibeon, Amasa came to meet them. Joab was wearing his military tunic, and strapped over it at his waist was a belt with a dagger in its sheath. As he stepped forward, it dropped out of its sheath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joab said to Amasa, “How are you, my brother?” Then Joab took Amasa by the beard with his right hand to kiss him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Amasa was not on his guard against the dagger in Joab’s hand, and Joab plunged it into his belly, and his intestines spilled out on the ground. Without being stabbed again, Amasa died. Then Joab and his brother Abishai pursued Sheba son of Bikri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'One of Joab’s men stood beside Amasa and said, “Whoever favors Joab, and whoever is for David, let him follow Joab!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amasa lay wallowing in his blood in the middle of the road, and the man saw that all the troops came to a halt there. When he realized that everyone who came up to Amasa stopped, he dragged him from the road into a field and threw a garment over him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: After Amasa had been removed from the road, everyone went on with Joab to pursue Sheba son of Bikri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Sheba passed through all the tribes of Israel to Abel Beth Maakah and through the entire region of the Bikrites,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Septuagint and Vulgate; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Berites.
    marker-yv: yv-n
  - type: text
    text: ' who gathered together and followed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'All the troops with Joab came and besieged Sheba in Abel Beth Maakah. They built a siege ramp up to the city, and it stood against the outer fortifications. While they were battering the wall to bring it down, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'a wise woman called from the city, “Listen! Listen! Tell Joab to come here so I can speak to him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He went toward her, and she asked, “Are you Joab?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “I am,” he answered.
- type: usfm
  marker: p
  children:
  - type: text
    text: She said, “Listen to what your servant has to say.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “I’m listening,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'She continued, “Long ago they used to say, ‘Get your answer at Abel,’ and that settled it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'We are the peaceful and faithful in Israel. You are trying to destroy a city that is a mother in Israel. Why do you want to swallow up the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s inheritance?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“Far be it from me!” Joab replied, “Far be it from me to swallow up or destroy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: That is not the case. A man named Sheba son of Bikri, from the hill country of Ephraim, has lifted up his hand against the king, against David. Hand over this one man, and I’ll withdraw from the city.”
- type: usfm
  marker: p
  children:
  - type: text
    text: The woman said to Joab, “His head will be thrown to you from the wall.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then the woman went to all the people with her wise advice, and they cut off the head of Sheba son of Bikri and threw it to Joab. So he sounded the trumpet, and his men dispersed from the city, each returning to his home. And Joab went back to the king in Jerusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Officials
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Joab was over Israel’s entire army; Benaiah son of Jehoiada was over the Kerethites and Pelethites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Adoniram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts (see also 1 Kings 4:6 and 5:14); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Adoram
    marker-yv: yv-n
  - type: text
    text: ' was in charge of forced labor; Jehoshaphat son of Ahilud was recorder; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sheva was secretary; Zadok and Abiathar were priests; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: and Ira the Jairite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; some Septuagint manuscripts and Syriac (see also 23:38) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ithrite
    marker-yv: yv-n
  - type: text
    text: ' was David’s priest.'
