document_id: 2CH.14,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 14:1 is numbered 13:23, and 14:2-15 is numbered 14:1-14.
  - type: text
    content: And Abijah rested with his ancestors and was buried in the City of David. Asa his son succeeded him as king, and in his days the country was at peace for ten years.
  - type: heading
    content: Asa King of Judah
  '10':
  - type: text
    content: Asa went out to meet him, and they took up battle positions in the Valley of Zephathah near Mareshah.
  '11':
  - type: text
    content: 'Then Asa called to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God and said, “'
  - type: text
    content: Lord
  - type: text
    content: ', there is no one like you to help the powerless against the mighty. Help us, '
  - type: text
    content: Lord
  - type: text
    content: ' our God, for we rely on you, and in your name we have come against this vast army. '
  - type: text
    content: Lord
  - type: text
    content: ', you are our God; do not let mere mortals prevail against you.”'
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' struck down the Cushites before Asa and Judah. The Cushites fled, '
  '13':
  - type: text
    content: 'and Asa and his army pursued them as far as Gerar. Such a great number of Cushites fell that they could not recover; they were crushed before the '
  - type: text
    content: Lord
  - type: text
    content: ' and his forces. The men of Judah carried off a large amount of plunder. '
  '14':
  - type: text
    content: 'They destroyed all the villages around Gerar, for the terror of the '
  - type: text
    content: Lord
  - type: text
    content: ' had fallen on them. They looted all these villages, since there was much plunder there. '
  '15':
  - type: text
    content: They also attacked the camps of the herders and carried off droves of sheep and goats and camels. Then they returned to Jerusalem.
  '2':
  - type: text
    content: 'Asa did what was good and right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '3':
  - type: text
    content: He removed the foreign altars and the high places, smashed the sacred stones and cut down the Asherah poles.
  - type: note
    content: That is, wooden symbols of the goddess Asherah; here and elsewhere in 2 Chronicles
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'He commanded Judah to seek the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, and to obey his laws and commands. '
  '5':
  - type: text
    content: 'He removed the high places and incense altars in every town in Judah, and the kingdom was at peace under him. '
  '6':
  - type: text
    content: 'He built up the fortified cities of Judah, since the land was at peace. No one was at war with him during those years, for the '
  - type: text
    content: Lord
  - type: text
    content: ' gave him rest.'
  '7':
  - type: text
    content: '“Let us build up these towns,” he said to Judah, “and put walls around them, with towers, gates and bars. The land is still ours, because we have sought the '
  - type: text
    content: Lord
  - type: text
    content: ' our God; we sought him and he has given us rest on every side.” So they built and prospered.'
  '8':
  - type: text
    content: Asa had an army of three hundred thousand men from Judah, equipped with large shields and with spears, and two hundred and eighty thousand from Benjamin, armed with small shields and with bows. All these were brave fighting men.
  '9':
  - type: text
    content: 'Zerah the Cushite marched out against them with an army of thousands upon thousands and three hundred chariots, and came as far as Mareshah. '
