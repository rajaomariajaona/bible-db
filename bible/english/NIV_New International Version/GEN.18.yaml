document_id: GEN.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Three Visitors
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Abraham near the great trees of Mamre while he was sitting at the entrance to his tent in the heat of the day. '
  '10':
  - type: text
    content: Then one of them said, “I will surely return to you about this time next year, and Sarah your wife will have a son.”
  - type: text
    content: 'Now Sarah was listening at the entrance to the tent, which was behind him. '
  '11':
  - type: text
    content: 'Abraham and Sarah were already very old, and Sarah was past the age of childbearing. '
  '12':
  - type: text
    content: So Sarah laughed to herself as she thought, “After I am worn out and my lord is old, will I now have this pleasure?”
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Abraham, “Why did Sarah laugh and say, ‘Will I really have a child, now that I am old?’ '
  '14':
  - type: text
    content: 'Is anything too hard for the '
  - type: text
    content: Lord
  - type: text
    content: '? I will return to you at the appointed time next year, and Sarah will have a son.”'
  '15':
  - type: text
    content: Sarah was afraid, so she lied and said, “I did not laugh.”
  - type: text
    content: But he said, “Yes, you did laugh.”
  - type: heading
    content: Abraham Pleads for Sodom
  '16':
  - type: text
    content: 'When the men got up to leave, they looked down toward Sodom, and Abraham walked along with them to see them on their way. '
  '17':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Shall I hide from Abraham what I am about to do? '
  '18':
  - type: text
    content: Abraham will surely become a great and powerful nation, and all nations on earth will be blessed through him.
  - type: note
    content: Or will use his name in blessings (see 48:20)
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'For I have chosen him, so that he will direct his children and his household after him to keep the way of the '
  - type: text
    content: Lord
  - type: text
    content: ' by doing what is right and just, so that the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring about for Abraham what he has promised him.”'
  '2':
  - type: text
    content: Abraham looked up and saw three men standing nearby. When he saw them, he hurried from the entrance of his tent to meet them and bowed low to the ground.
  '20':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “The outcry against Sodom and Gomorrah is so great and their sin so grievous '
  '21':
  - type: text
    content: that I will go down and see if what they have done is as bad as the outcry that has reached me. If not, I will know.”
  '22':
  - type: text
    content: 'The men turned away and went toward Sodom, but Abraham remained standing before the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Masoretic Text; an ancient Hebrew scribal tradition but the Lord remained standing before Abraham
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Then Abraham approached him and said: “Will you sweep away the righteous with the wicked? '
  '24':
  - type: text
    content: What if there are fifty righteous people in the city? Will you really sweep it away and not spare
  - type: note
    content: Or forgive; also in verse 26
  - type: text
    content: ' the place for the sake of the fifty righteous people in it? '
  '25':
  - type: text
    content: Far be it from you to do such a thing—to kill the righteous with the wicked, treating the righteous and the wicked alike. Far be it from you! Will not the Judge of all the earth do right?”
  '26':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “If I find fifty righteous people in the city of Sodom, I will spare the whole place for their sake.”'
  '27':
  - type: text
    content: 'Then Abraham spoke up again: “Now that I have been so bold as to speak to the Lord, though I am nothing but dust and ashes, '
  '28':
  - type: text
    content: what if the number of the righteous is five less than fifty? Will you destroy the whole city for lack of five people?”
  - type: text
    content: “If I find forty-five there,” he said, “I will not destroy it.”
  '29':
  - type: text
    content: Once again he spoke to him, “What if only forty are found there?”
  - type: text
    content: He said, “For the sake of forty, I will not do it.”
  '3':
  - type: text
    content: He said, “If I have found favor in your eyes, my lord,
  - type: note
    content: Or eyes, Lord
  - type: text
    content: ' do not pass your servant by. '
  '30':
  - type: text
    content: Then he said, “May the Lord not be angry, but let me speak. What if only thirty can be found there?”
  - type: text
    content: He answered, “I will not do it if I find thirty there.”
  '31':
  - type: text
    content: Abraham said, “Now that I have been so bold as to speak to the Lord, what if only twenty can be found there?”
  - type: text
    content: He said, “For the sake of twenty, I will not destroy it.”
  '32':
  - type: text
    content: Then he said, “May the Lord not be angry, but let me speak just once more. What if only ten can be found there?”
  - type: text
    content: He answered, “For the sake of ten, I will not destroy it.”
  '33':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' had finished speaking with Abraham, he left, and Abraham returned home.'
  '4':
  - type: text
    content: 'Let a little water be brought, and then you may all wash your feet and rest under this tree. '
  '5':
  - type: text
    content: Let me get you something to eat, so you can be refreshed and then go on your way—now that you have come to your servant.”
  - type: text
    content: “Very well,” they answered, “do as you say.”
  '6':
  - type: text
    content: So Abraham hurried into the tent to Sarah. “Quick,” he said, “get three seahs
  - type: note
    content: That is, probably about 36 pounds or about 16 kilograms
  - type: text
    content: ' of the finest flour and knead it and bake some bread.”'
  '7':
  - type: text
    content: 'Then he ran to the herd and selected a choice, tender calf and gave it to a servant, who hurried to prepare it. '
  '8':
  - type: text
    content: He then brought some curds and milk and the calf that had been prepared, and set these before them. While they ate, he stood near them under a tree.
  '9':
  - type: text
    content: “Where is your wife Sarah?” they asked him.
  - type: text
    content: “There, in the tent,” he said.
