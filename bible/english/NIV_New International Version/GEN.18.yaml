document_id: GEN.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Three Visitors
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' appeared to Abraham near the great trees of Mamre while he was sitting at the entrance to his tent in the heat of the day. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Abraham looked up and saw three men standing nearby. When he saw them, he hurried from the entrance of his tent to meet them and bowed low to the ground.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He said, “If I have found favor in your eyes, my lord,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: eyes, Lord
    marker-yv: yv-n
  - type: text
    text: ' do not pass your servant by. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Let a little water be brought, and then you may all wash your feet and rest under this tree. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let me get you something to eat, so you can be refreshed and then go on your way—now that you have come to your servant.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Very well,” they answered, “do as you say.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Abraham hurried into the tent to Sarah. “Quick,” he said, “get three seahs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, probably about 36 pounds or about 16 kilograms
    marker-yv: yv-n
  - type: text
    text: ' of the finest flour and knead it and bake some bread.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then he ran to the herd and selected a choice, tender calf and gave it to a servant, who hurried to prepare it. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He then brought some curds and milk and the calf that had been prepared, and set these before them. While they ate, he stood near them under a tree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Where is your wife Sarah?” they asked him.
- type: usfm
  marker: p
  children:
  - type: text
    text: “There, in the tent,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then one of them said, “I will surely return to you about this time next year, and Sarah your wife will have a son.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Now Sarah was listening at the entrance to the tent, which was behind him. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Abraham and Sarah were already very old, and Sarah was past the age of childbearing. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So Sarah laughed to herself as she thought, “After I am worn out and my lord is old, will I now have this pleasure?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Abraham, “Why did Sarah laugh and say, ‘Will I really have a child, now that I am old?’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Is anything too hard for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '? I will return to you at the appointed time next year, and Sarah will have a son.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sarah was afraid, so she lied and said, “I did not laugh.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But he said, “Yes, you did laugh.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abraham Pleads for Sodom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When the men got up to leave, they looked down toward Sodom, and Abraham walked along with them to see them on their way. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “Shall I hide from Abraham what I am about to do? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Abraham will surely become a great and powerful nation, and all nations on earth will be blessed through him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'will use his name in blessings '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (see 48:20)
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For I have chosen him, so that he will direct his children and his household after him to keep the way of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' by doing what is right and just, so that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will bring about for Abraham what he has promised him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “The outcry against Sodom and Gomorrah is so great and their sin so grievous '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: that I will go down and see if what they have done is as bad as the outcry that has reached me. If not, I will know.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The men turned away and went toward Sodom, but Abraham remained standing before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text; an ancient Hebrew scribal tradition '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'but the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' remained standing before Abraham'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Abraham approached him and said: “Will you sweep away the righteous with the wicked? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: What if there are fifty righteous people in the city? Will you really sweep it away and not spare
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: forgive
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 26
    marker-yv: yv-n
  - type: text
    text: ' the place for the sake of the fifty righteous people in it? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Far be it from you to do such a thing—to kill the righteous with the wicked, treating the righteous and the wicked alike. Far be it from you! Will not the Judge of all the earth do right?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “If I find fifty righteous people in the city of Sodom, I will spare the whole place for their sake.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Abraham spoke up again: “Now that I have been so bold as to speak to the Lord, though I am nothing but dust and ashes, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: what if the number of the righteous is five less than fifty? Will you destroy the whole city for lack of five people?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “If I find forty-five there,” he said, “I will not destroy it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Once again he spoke to him, “What if only forty are found there?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “For the sake of forty, I will not do it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Then he said, “May the Lord not be angry, but let me speak. What if only thirty can be found there?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He answered, “I will not do it if I find thirty there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Abraham said, “Now that I have been so bold as to speak to the Lord, what if only twenty can be found there?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He said, “For the sake of twenty, I will not destroy it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Then he said, “May the Lord not be angry, but let me speak just once more. What if only ten can be found there?”
- type: usfm
  marker: p
  children:
  - type: text
    text: He answered, “For the sake of ten, I will not destroy it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had finished speaking with Abraham, he left, and Abraham returned home.'
