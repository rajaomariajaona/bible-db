document_id: GAL.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Faith or Works of the Law
  - type: text
    content: 'You foolish Galatians! Who has bewitched you? Before your very eyes Jesus Christ was clearly portrayed as crucified. '
  '10':
  - type: text
    content: 'For all who rely on the works of the law are under a curse, as it is written: “Cursed is everyone who does not continue to do everything written in the Book of the Law.”'
  - type: note
    content: Deut. 27:26
  - type: text
    content: ' '
  '11':
  - type: text
    content: Clearly no one who relies on the law is justified before God, because “the righteous will live by faith.”
  - type: note
    content: Hab. 2:4
  - type: text
    content: ' '
  '12':
  - type: text
    content: The law is not based on faith; on the contrary, it says, “The person who does these things will live by them.”
  - type: note
    content: Lev. 18:5
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Christ redeemed us from the curse of the law by becoming a curse for us, for it is written: “Cursed is everyone who is hung on a pole.”'
  - type: note
    content: Deut. 21:23
  - type: text
    content: ' '
  '14':
  - type: text
    content: He redeemed us in order that the blessing given to Abraham might come to the Gentiles through Christ Jesus, so that by faith we might receive the promise of the Spirit.
  - type: heading
    content: The Law and the Promise
  '15':
  - type: text
    content: 'Brothers and sisters, let me take an example from everyday life. Just as no one can set aside or add to a human covenant that has been duly established, so it is in this case. '
  '16':
  - type: text
    content: The promises were spoken to Abraham and to his seed. Scripture does not say “and to seeds,” meaning many people, but “and to your seed,”
  - type: note
    content: Gen. 12:7; 13:15; 24:7
  - type: text
    content: ' meaning one person, who is Christ. '
  '17':
  - type: text
    content: 'What I mean is this: The law, introduced 430 years later, does not set aside the covenant previously established by God and thus do away with the promise. '
  '18':
  - type: text
    content: For if the inheritance depends on the law, then it no longer depends on the promise; but God in his grace gave it to Abraham through a promise.
  '19':
  - type: text
    content: 'Why, then, was the law given at all? It was added because of transgressions until the Seed to whom the promise referred had come. The law was given through angels and entrusted to a mediator. '
  '2':
  - type: text
    content: 'I would like to learn just one thing from you: Did you receive the Spirit by the works of the law, or by believing what you heard? '
  '20':
  - type: text
    content: A mediator, however, implies more than one party; but God is one.
  '21':
  - type: text
    content: 'Is the law, therefore, opposed to the promises of God? Absolutely not! For if a law had been given that could impart life, then righteousness would certainly have come by the law. '
  '22':
  - type: text
    content: But Scripture has locked up everything under the control of sin, so that what was promised, being given through faith in Jesus Christ, might be given to those who believe.
  - type: heading
    content: Children of God
  '23':
  - type: text
    content: Before the coming of this faith,
  - type: note
    content: Or through the faithfulness of Jesus… 23 Before faith came
  - type: text
    content: ' we were held in custody under the law, locked up until the faith that was to come would be revealed. '
  '24':
  - type: text
    content: 'So the law was our guardian until Christ came that we might be justified by faith. '
  '25':
  - type: text
    content: Now that this faith has come, we are no longer under a guardian.
  '26':
  - type: text
    content: 'So in Christ Jesus you are all children of God through faith, '
  '27':
  - type: text
    content: 'for all of you who were baptized into Christ have clothed yourselves with Christ. '
  '28':
  - type: text
    content: 'There is neither Jew nor Gentile, neither slave nor free, nor is there male and female, for you are all one in Christ Jesus. '
  '29':
  - type: text
    content: If you belong to Christ, then you are Abraham’s seed, and heirs according to the promise.
  '3':
  - type: text
    content: Are you so foolish? After beginning by means of the Spirit, are you now trying to finish by means of the flesh?
  - type: note
    content: In contexts like this, the Greek word for flesh (sarx) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Have you experienced
  - type: note
    content: Or suffered
  - type: text
    content: ' so much in vain—if it really was in vain? '
  '5':
  - type: text
    content: 'So again I ask, does God give you his Spirit and work miracles among you by the works of the law, or by your believing what you heard? '
  '6':
  - type: text
    content: So also Abraham “believed God, and it was credited to him as righteousness.”
  - type: note
    content: Gen. 15:6
  '7':
  - type: text
    content: 'Understand, then, that those who have faith are children of Abraham. '
  '8':
  - type: text
    content: 'Scripture foresaw that God would justify the Gentiles by faith, and announced the gospel in advance to Abraham: “All nations will be blessed through you.”'
  - type: note
    content: Gen. 12:3; 18:18; 22:18
  - type: text
    content: ' '
  '9':
  - type: text
    content: So those who rely on faith are blessed along with Abraham, the man of faith.
