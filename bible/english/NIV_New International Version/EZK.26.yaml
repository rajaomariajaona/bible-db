document_id: EZK.26,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Tyre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the eleventh month of the twelfth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Probable reading of the original Hebrew text; Masoretic Text does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: month of the twelfth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' year, on the first day of the month, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His horses will be so many that they will cover you with dust. Your walls will tremble at the noise of the warhorses, wagons and chariots when he enters your gates as men enter a city whose walls have been broken through. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The hooves of his horses will trample all your streets; he will kill your people with the sword, and your strong pillars will fall to the ground. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will plunder your wealth and loot your merchandise; they will break down your walls and demolish your fine houses and throw your stones, timber and rubble into the sea. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will put an end to your noisy songs, and the music of your harps will be heard no more. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make you a bare rock, and you will become a place to spread fishnets. You will never be rebuilt, for I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' have spoken, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to Tyre: Will not the coastlands tremble at the sound of your fall, when the wounded groan and the slaughter takes place in you? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the princes of the coast will step down from their thrones and lay aside their robes and take off their embroidered garments. Clothed with terror, they will sit on the ground, trembling every moment, appalled at you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they will take up a lament concerning you and say to you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘How you are destroyed, city of renown,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: peopled by men of the sea!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were a power on the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you and your citizens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you put your terror
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on all who lived there.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now the coastlands tremble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the day of your fall;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the islands in the sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are terrified at your collapse.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: When I make you a desolate city, like cities no longer inhabited, and when I bring the ocean depths over you and its vast waters cover you, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, because Tyre has said of Jerusalem, ‘Aha! The gate to the nations is broken, and its doors have swung open to me; now that she lies in ruins I will prosper,’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: then I will bring you down with those who go down to the pit, to the people of long ago. I will make you dwell in the earth below, as in ancient ruins, with those who go down to the pit, and you will not return or take your place
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: return, and I will give glory
      marker-yv: yv-n
    - type: text
      text: ' in the land of the living. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will bring you to a horrible end and you will be no more. You will be sought, but you will never again be found, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am against you, Tyre, and I will bring many nations against you, like the sea casting up its waves. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will destroy the walls of Tyre and pull down her towers; I will scrape away her rubble and make her a bare rock. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Out in the sea she will become a place to spread fishnets, for I have spoken, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. She will become plunder for the nations, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and her settlements on the mainland will be ravaged by the sword. Then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: From the north I am going to bring against Tyre Nebuchadnezzar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadrezzar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of which '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadnezzar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a variant; here and often in Ezekiel and Jeremiah
      marker-yv: yv-n
    - type: text
      text: ' king of Babylon, king of kings, with horses and chariots, with horsemen and a great army. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will ravage your settlements on the mainland with the sword; he will set up siege works against you, build a ramp up to your walls and raise his shields against you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will direct the blows of his battering rams against your walls and demolish your towers with his weapons. '
