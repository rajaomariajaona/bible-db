document_id: EZK.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Tyre
  - type: text
    content: In the eleventh month of the twelfth
  - type: note
    content: Probable reading of the original Hebrew text; Masoretic Text does not have month of the twelfth.
  - type: text
    content: ' year, on the first day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'His horses will be so many that they will cover you with dust. Your walls will tremble at the noise of the warhorses, wagons and chariots when he enters your gates as men enter a city whose walls have been broken through. '
  '11':
  - type: text
    content: 'The hooves of his horses will trample all your streets; he will kill your people with the sword, and your strong pillars will fall to the ground. '
  '12':
  - type: text
    content: 'They will plunder your wealth and loot your merchandise; they will break down your walls and demolish your fine houses and throw your stones, timber and rubble into the sea. '
  '13':
  - type: text
    content: 'I will put an end to your noisy songs, and the music of your harps will be heard no more. '
  '14':
  - type: text
    content: 'I will make you a bare rock, and you will become a place to spread fishnets. You will never be rebuilt, for I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to Tyre: Will not the coastlands tremble at the sound of your fall, when the wounded groan and the slaughter takes place in you? '
  '16':
  - type: text
    content: 'Then all the princes of the coast will step down from their thrones and lay aside their robes and take off their embroidered garments. Clothed with terror, they will sit on the ground, trembling every moment, appalled at you. '
  '17':
  - type: text
    content: 'Then they will take up a lament concerning you and say to you:'
  - type: text
    content: “ ‘How you are destroyed, city of renown,
  - type: text
    content: peopled by men of the sea!
  - type: text
    content: You were a power on the seas,
  - type: text
    content: you and your citizens;
  - type: text
    content: you put your terror
  - type: text
    content: on all who lived there.
  '18':
  - type: text
    content: Now the coastlands tremble
  - type: text
    content: on the day of your fall;
  - type: text
    content: the islands in the sea
  - type: text
    content: are terrified at your collapse.’
  '19':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: When I make you a desolate city, like cities no longer inhabited, and when I bring the ocean depths over you and its vast waters cover you, '
  '2':
  - type: text
    content: '“Son of man, because Tyre has said of Jerusalem, ‘Aha! The gate to the nations is broken, and its doors have swung open to me; now that she lies in ruins I will prosper,’ '
  '20':
  - type: text
    content: then I will bring you down with those who go down to the pit, to the people of long ago. I will make you dwell in the earth below, as in ancient ruins, with those who go down to the pit, and you will not return or take your place
  - type: note
    content: Septuagint; Hebrew return, and I will give glory
  - type: text
    content: ' in the land of the living. '
  '21':
  - type: text
    content: 'I will bring you to a horrible end and you will be no more. You will be sought, but you will never again be found, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am against you, Tyre, and I will bring many nations against you, like the sea casting up its waves. '
  '4':
  - type: text
    content: 'They will destroy the walls of Tyre and pull down her towers; I will scrape away her rubble and make her a bare rock. '
  '5':
  - type: text
    content: 'Out in the sea she will become a place to spread fishnets, for I have spoken, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. She will become plunder for the nations, '
  '6':
  - type: text
    content: 'and her settlements on the mainland will be ravaged by the sword. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: '“For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: From the north I am going to bring against Tyre Nebuchadnezzar'
  - type: note
    content: Hebrew Nebuchadrezzar, of which Nebuchadnezzar is a variant; here and often in Ezekiel and Jeremiah
  - type: text
    content: ' king of Babylon, king of kings, with horses and chariots, with horsemen and a great army. '
  '8':
  - type: text
    content: 'He will ravage your settlements on the mainland with the sword; he will set up siege works against you, build a ramp up to your walls and raise his shields against you. '
  '9':
  - type: text
    content: 'He will direct the blows of his battering rams against your walls and demolish your towers with his weapons. '
