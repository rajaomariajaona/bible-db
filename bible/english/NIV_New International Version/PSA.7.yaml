type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 7In Hebrew texts 7:1-17 is numbered 7:2-18.
  - type: text
    content: 'A '
  - type: text
    content: shiggaion
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of David, which he sang to the '
  - type: text
    content: Lord
  - type: text
    content: ' concerning Cush, a Benjamite.'
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ' my God, I take refuge in you;'
  - type: text
    content: save and deliver me from all who pursue me,
  '10':
  - type: text
    content: My shield
  - type: note
    content: Or sovereign
  - type: text
    content: ' is God Most High,'
  - type: text
    content: who saves the upright in heart.
  '11':
  - type: text
    content: God is a righteous judge,
  - type: text
    content: a God who displays his wrath every day.
  '12':
  - type: text
    content: If he does not relent,
  - type: text
    content: he
  - type: note
    content: Or If anyone does not repent, / God
  - type: text
    content: ' will sharpen his sword;'
  - type: text
    content: he will bend and string his bow.
  '13':
  - type: text
    content: He has prepared his deadly weapons;
  - type: text
    content: he makes ready his flaming arrows.
  '14':
  - type: text
    content: Whoever is pregnant with evil
  - type: text
    content: conceives trouble and gives birth to disillusionment.
  '15':
  - type: text
    content: Whoever digs a hole and scoops it out
  - type: text
    content: falls into the pit they have made.
  '16':
  - type: text
    content: The trouble they cause recoils on them;
  - type: text
    content: their violence comes down on their own heads.
  '17':
  - type: text
    content: 'I will give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ' because of his righteousness;'
  - type: text
    content: 'I will sing the praises of the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' Most High.'
  '2':
  - type: text
    content: or they will tear me apart like a lion
  - type: text
    content: and rip me to pieces with no one to rescue me.
  '3':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ' my God, if I have done this'
  - type: text
    content: and there is guilt on my hands—
  '4':
  - type: text
    content: if I have repaid my ally with evil
  - type: text
    content: or without cause have robbed my foe—
  '5':
  - type: text
    content: then let my enemy pursue and overtake me;
  - type: text
    content: let him trample my life to the ground
  - type: text
    content: and make me sleep in the dust.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '6':
  - type: text
    content: 'Arise, '
  - type: text
    content: Lord
  - type: text
    content: ', in your anger;'
  - type: text
    content: rise up against the rage of my enemies.
  - type: text
    content: Awake, my God; decree justice.
  '7':
  - type: text
    content: Let the assembled peoples gather around you,
  - type: text
    content: while you sit enthroned over them on high.
  '8':
  - type: text
    content: 'Let the '
  - type: text
    content: Lord
  - type: text
    content: ' judge the peoples.'
  - type: text
    content: 'Vindicate me, '
  - type: text
    content: Lord
  - type: text
    content: ', according to my righteousness,'
  - type: text
    content: according to my integrity, O Most High.
  '9':
  - type: text
    content: Bring to an end the violence of the wicked
  - type: text
    content: and make the righteous secure—
  - type: text
    content: you, the righteous God
  - type: text
    content: who probes minds and hearts.
