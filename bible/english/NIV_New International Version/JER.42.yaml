document_id: JER.42,111
type_code: eng
verses:
  '1':
  - type: text
    content: Then all the army officers, including Johanan son of Kareah and Jezaniah
  - type: note
    content: Hebrew; Septuagint (see also 43:2) Azariah
  - type: text
    content: ' son of Hoshaiah, and all the people from the least to the greatest approached '
  '10':
  - type: text
    content: '‘If you stay in this land, I will build you up and not tear you down; I will plant you and not uproot you, for I have relented concerning the disaster I have inflicted on you. '
  '11':
  - type: text
    content: 'Do not be afraid of the king of Babylon, whom you now fear. Do not be afraid of him, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', for I am with you and will save you and deliver you from his hands. '
  '12':
  - type: text
    content: I will show you compassion so that he will have compassion on you and restore you to your land.’
  '13':
  - type: text
    content: '“However, if you say, ‘We will not stay in this land,’ and so disobey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  '14':
  - type: text
    content: 'and if you say, ‘No, we will go and live in Egypt, where we will not see war or hear the trumpet or be hungry for bread,’ '
  '15':
  - type: text
    content: 'then hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', you remnant of Judah. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: ‘If you are determined to go to Egypt and you do go to settle there, '
  '16':
  - type: text
    content: 'then the sword you fear will overtake you there, and the famine you dread will follow you into Egypt, and there you will die. '
  '17':
  - type: text
    content: 'Indeed, all who are determined to go to Egypt to settle there will die by the sword, famine and plague; not one of them will survive or escape the disaster I will bring on them.’ '
  '18':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: ‘As my anger and wrath have been poured out on those who lived in Jerusalem, so will my wrath be poured out on you when you go to Egypt. You will be a curse'
  - type: note
    content: That is, your name will be used in cursing (see 29:22); or, others will see that you are cursed.
  - type: text
    content: ' and an object of horror, a curse'
  - type: note
    content: That is, your name will be used in cursing (see 29:22); or, others will see that you are cursed.
  - type: text
    content: ' and an object of reproach; you will never see this place again.’'
  '19':
  - type: text
    content: '“Remnant of Judah, the '
  - type: text
    content: Lord
  - type: text
    content: ' has told you, ‘Do not go to Egypt.’ Be sure of this: I warn you today '
  '2':
  - type: text
    content: 'Jeremiah the prophet and said to him, “Please hear our petition and pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for this entire remnant. For as you now see, though we were once many, now only a few are left. '
  '20':
  - type: text
    content: 'that you made a fatal mistake when you sent me to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and said, ‘Pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God for us; tell us everything he says and we will do it.’ '
  '21':
  - type: text
    content: 'I have told you today, but you still have not obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in all he sent me to tell you. '
  '22':
  - type: text
    content: 'So now, be sure of this: You will die by the sword, famine and plague in the place where you want to go to settle.”'
  '3':
  - type: text
    content: 'Pray that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will tell us where we should go and what we should do.”'
  '4':
  - type: text
    content: '“I have heard you,” replied Jeremiah the prophet. “I will certainly pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God as you have requested; I will tell you everything the '
  - type: text
    content: Lord
  - type: text
    content: ' says and will keep nothing back from you.”'
  '5':
  - type: text
    content: 'Then they said to Jeremiah, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' be a true and faithful witness against us if we do not act in accordance with everything the '
  - type: text
    content: Lord
  - type: text
    content: ' your God sends you to tell us. '
  '6':
  - type: text
    content: 'Whether it is favorable or unfavorable, we will obey the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, to whom we are sending you, so that it will go well with us, for we will obey the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.”'
  '7':
  - type: text
    content: 'Ten days later the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah. '
  '8':
  - type: text
    content: 'So he called together Johanan son of Kareah and all the army officers who were with him and all the people from the least to the greatest. '
  '9':
  - type: text
    content: 'He said to them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, to whom you sent me to present your petition, says: '
