document_id: ISA.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaiah’s Commission
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the year that King Uzziah died, I saw the Lord, high and exalted, seated on a throne; and the train of his robe filled the temple. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Above him were seraphim, each with six wings: With two wings they covered their faces, with two they covered their feet, and with two they were flying. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they were calling to one another:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Holy, holy, holy is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the whole earth is full of his glory.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: At the sound of their voices the doorposts and thresholds shook and the temple was filled with smoke.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Woe to me!” I cried. “I am ruined! For I am a man of unclean lips, and I live among a people of unclean lips, and my eyes have seen the King, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then one of the seraphim flew to me with a live coal in his hand, which he had taken with tongs from the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: With it he touched my mouth and said, “See, this has touched your lips; your guilt is taken away and your sin atoned for.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then I heard the voice of the Lord saying, “Whom shall I send? And who will go for us?”
- type: usfm
  marker: p
  children:
  - type: text
    text: And I said, “Here am I. Send me!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He said, “Go and tell this people:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Be ever hearing, but never understanding;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be ever seeing, but never perceiving.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Make the heart of this people calloused;
- type: usfm
  marker: q2
  children:
  - type: text
    text: make their ears dull
- type: usfm
  marker: q2
  children:
  - type: text
    text: and close their eyes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:9,10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '‘You will be ever hearing, but never understanding; / you will be ever seeing, but never perceiving.’ / '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '10 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: This people’s heart has become calloused; / they hardly hear with their ears, / and they have closed their eyes
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Otherwise they might see with their eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hear with their ears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: understand with their hearts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and turn and be healed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then I said, “For how long, Lord?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And he answered:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Until the cities lie ruined
- type: usfm
  marker: q2
  children:
  - type: text
    text: and without inhabitant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: until the houses are left deserted
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fields ruined and ravaged,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'until the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has sent everyone far away'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the land is utterly forsaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And though a tenth remains in the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will again be laid waste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But as the terebinth and oak
- type: usfm
  marker: q2
  children:
  - type: text
    text: leave stumps when they are cut down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the holy seed will be the stump in the land.”
