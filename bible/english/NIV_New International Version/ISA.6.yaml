document_id: ISA.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaiah’s Commission
  - type: text
    content: 'In the year that King Uzziah died, I saw the Lord, high and exalted, seated on a throne; and the train of his robe filled the temple. '
  '10':
  - type: text
    content: Make the heart of this people calloused;
  - type: text
    content: make their ears dull
  - type: text
    content: and close their eyes.
  - type: note
    content: Hebrew; Septuagint ‘You will be ever hearing, but never understanding; / you will be ever seeing, but never perceiving.’ / 10 This people’s heart has become calloused; / they hardly hear with their ears, / and they have closed their eyes
  - type: text
    content: Otherwise they might see with their eyes,
  - type: text
    content: hear with their ears,
  - type: text
    content: understand with their hearts,
  - type: text
    content: and turn and be healed.”
  '11':
  - type: text
    content: Then I said, “For how long, Lord?”
  - type: text
    content: 'And he answered:'
  - type: text
    content: “Until the cities lie ruined
  - type: text
    content: and without inhabitant,
  - type: text
    content: until the houses are left deserted
  - type: text
    content: and the fields ruined and ravaged,
  '12':
  - type: text
    content: 'until the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent everyone far away'
  - type: text
    content: and the land is utterly forsaken.
  '13':
  - type: text
    content: And though a tenth remains in the land,
  - type: text
    content: it will again be laid waste.
  - type: text
    content: But as the terebinth and oak
  - type: text
    content: leave stumps when they are cut down,
  - type: text
    content: so the holy seed will be the stump in the land.”
  '2':
  - type: text
    content: 'Above him were seraphim, each with six wings: With two wings they covered their faces, with two they covered their feet, and with two they were flying. '
  '3':
  - type: text
    content: 'And they were calling to one another:'
  - type: text
    content: '“Holy, holy, holy is the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty;'
  - type: text
    content: the whole earth is full of his glory.”
  '4':
  - type: text
    content: At the sound of their voices the doorposts and thresholds shook and the temple was filled with smoke.
  '5':
  - type: text
    content: '“Woe to me!” I cried. “I am ruined! For I am a man of unclean lips, and I live among a people of unclean lips, and my eyes have seen the King, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.”'
  '6':
  - type: text
    content: 'Then one of the seraphim flew to me with a live coal in his hand, which he had taken with tongs from the altar. '
  '7':
  - type: text
    content: With it he touched my mouth and said, “See, this has touched your lips; your guilt is taken away and your sin atoned for.”
  '8':
  - type: text
    content: Then I heard the voice of the Lord saying, “Whom shall I send? And who will go for us?”
  - type: text
    content: And I said, “Here am I. Send me!”
  '9':
  - type: text
    content: 'He said, “Go and tell this people:'
  - type: text
    content: “ ‘Be ever hearing, but never understanding;
  - type: text
    content: be ever seeing, but never perceiving.’
