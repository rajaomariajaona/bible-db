document_id: DEU.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Going to War
  - type: text
    content: 'When you go to war against your enemies and see horses and chariots and an army greater than yours, do not be afraid of them, because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you up out of Egypt, will be with you. '
  '10':
  - type: text
    content: 'When you march up to attack a city, make its people an offer of peace. '
  '11':
  - type: text
    content: 'If they accept and open their gates, all the people in it shall be subject to forced labor and shall work for you. '
  '12':
  - type: text
    content: 'If they refuse to make peace and they engage you in battle, lay siege to that city. '
  '13':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God delivers it into your hand, put to the sword all the men in it. '
  '14':
  - type: text
    content: 'As for the women, the children, the livestock and everything else in the city, you may take these as plunder for yourselves. And you may use the plunder the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives you from your enemies. '
  '15':
  - type: text
    content: This is how you are to treat all the cities that are at a distance from you and do not belong to the nations nearby.
  '16':
  - type: text
    content: 'However, in the cities of the nations the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as an inheritance, do not leave alive anything that breathes. '
  '17':
  - type: text
    content: Completely destroy
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' them—the Hittites, Amorites, Canaanites, Perizzites, Hivites and Jebusites—as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has commanded you. '
  '18':
  - type: text
    content: 'Otherwise, they will teach you to follow all the detestable things they do in worshiping their gods, and you will sin against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '19':
  - type: text
    content: When you lay siege to a city for a long time, fighting against it to capture it, do not destroy its trees by putting an ax to them, because you can eat their fruit. Do not cut them down. Are the trees people, that you should besiege them?
  - type: note
    content: Or down to use in the siege, for the fruit trees are for the benefit of people.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'When you are about to go into battle, the priest shall come forward and address the army. '
  '20':
  - type: text
    content: However, you may cut down trees that you know are not fruit trees and use them to build siege works until the city at war with you falls.
  '3':
  - type: text
    content: 'He shall say: “Hear, Israel: Today you are going into battle against your enemies. Do not be fainthearted or afraid; do not panic or be terrified by them. '
  '4':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is the one who goes with you to fight for you against your enemies to give you victory.”'
  '5':
  - type: text
    content: 'The officers shall say to the army: “Has anyone built a new house and not yet begun to live in it? Let him go home, or he may die in battle and someone else may begin to live in it. '
  '6':
  - type: text
    content: 'Has anyone planted a vineyard and not begun to enjoy it? Let him go home, or he may die in battle and someone else enjoy it. '
  '7':
  - type: text
    content: 'Has anyone become pledged to a woman and not married her? Let him go home, or he may die in battle and someone else marry her.” '
  '8':
  - type: text
    content: 'Then the officers shall add, “Is anyone afraid or fainthearted? Let him go home so that his fellow soldiers will not become disheartened too.” '
  '9':
  - type: text
    content: When the officers have finished speaking to the army, they shall appoint commanders over it.
