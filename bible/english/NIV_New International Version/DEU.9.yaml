document_id: DEU.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Not Because of Israel’s Righteousness
  - type: text
    content: 'Hear, Israel: You are now about to cross the Jordan to go in and dispossess nations greater and stronger than you, with large cities that have walls up to the sky. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave me two stone tablets inscribed by the finger of God. On them were all the commandments the '
  - type: text
    content: Lord
  - type: text
    content: ' proclaimed to you on the mountain out of the fire, on the day of the assembly.'
  '11':
  - type: text
    content: 'At the end of the forty days and forty nights, the '
  - type: text
    content: Lord
  - type: text
    content: ' gave me the two stone tablets, the tablets of the covenant. '
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' told me, “Go down from here at once, because your people whom you brought out of Egypt have become corrupt. They have turned away quickly from what I commanded them and have made an idol for themselves.”'
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “I have seen this people, and they are a stiff-necked people indeed! '
  '14':
  - type: text
    content: Let me alone, so that I may destroy them and blot out their name from under heaven. And I will make you into a nation stronger and more numerous than they.”
  '15':
  - type: text
    content: 'So I turned and went down from the mountain while it was ablaze with fire. And the two tablets of the covenant were in my hands. '
  '16':
  - type: text
    content: 'When I looked, I saw that you had sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ' your God; you had made for yourselves an idol cast in the shape of a calf. You had turned aside quickly from the way that the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded you. '
  '17':
  - type: text
    content: So I took the two tablets and threw them out of my hands, breaking them to pieces before your eyes.
  '18':
  - type: text
    content: 'Then once again I fell prostrate before the '
  - type: text
    content: Lord
  - type: text
    content: ' for forty days and forty nights; I ate no bread and drank no water, because of all the sin you had committed, doing what was evil in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight and so arousing his anger. '
  '19':
  - type: text
    content: 'I feared the anger and wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ', for he was angry enough with you to destroy you. But again the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to me. '
  '2':
  - type: text
    content: 'The people are strong and tall—Anakites! You know about them and have heard it said: “Who can stand up against the Anakites?” '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry enough with Aaron to destroy him, but at that time I prayed for Aaron too. '
  '21':
  - type: text
    content: Also I took that sinful thing of yours, the calf you had made, and burned it in the fire. Then I crushed it and ground it to powder as fine as dust and threw the dust into a stream that flowed down the mountain.
  '22':
  - type: text
    content: 'You also made the '
  - type: text
    content: Lord
  - type: text
    content: ' angry at Taberah, at Massah and at Kibroth Hattaavah.'
  '23':
  - type: text
    content: 'And when the '
  - type: text
    content: Lord
  - type: text
    content: ' sent you out from Kadesh Barnea, he said, “Go up and take possession of the land I have given you.” But you rebelled against the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. You did not trust him or obey him. '
  '24':
  - type: text
    content: 'You have been rebellious against the '
  - type: text
    content: Lord
  - type: text
    content: ' ever since I have known you.'
  '25':
  - type: text
    content: 'I lay prostrate before the '
  - type: text
    content: Lord
  - type: text
    content: ' those forty days and forty nights because the '
  - type: text
    content: Lord
  - type: text
    content: ' had said he would destroy you. '
  '26':
  - type: text
    content: 'I prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' and said, “Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', do not destroy your people, your own inheritance that you redeemed by your great power and brought out of Egypt with a mighty hand. '
  '27':
  - type: text
    content: 'Remember your servants Abraham, Isaac and Jacob. Overlook the stubbornness of this people, their wickedness and their sin. '
  '28':
  - type: text
    content: 'Otherwise, the country from which you brought us will say, ‘Because the '
  - type: text
    content: Lord
  - type: text
    content: ' was not able to take them into the land he had promised them, and because he hated them, he brought them out to put them to death in the wilderness.’ '
  '29':
  - type: text
    content: But they are your people, your inheritance that you brought out by your great power and your outstretched arm.”
  '3':
  - type: text
    content: 'But be assured today that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is the one who goes across ahead of you like a devouring fire. He will destroy them; he will subdue them before you. And you will drive them out and annihilate them quickly, as the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised you.'
  '4':
  - type: text
    content: 'After the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has driven them out before you, do not say to yourself, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has brought me here to take possession of this land because of my righteousness.” No, it is on account of the wickedness of these nations that the '
  - type: text
    content: Lord
  - type: text
    content: ' is going to drive them out before you. '
  '5':
  - type: text
    content: 'It is not because of your righteousness or your integrity that you are going in to take possession of their land; but on account of the wickedness of these nations, the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will drive them out before you, to accomplish what he swore to your fathers, to Abraham, Isaac and Jacob. '
  '6':
  - type: text
    content: 'Understand, then, that it is not because of your righteousness that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you this good land to possess, for you are a stiff-necked people.'
  - type: heading
    content: The Golden Calf
  '7':
  - type: text
    content: 'Remember this and never forget how you aroused the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in the wilderness. From the day you left Egypt until you arrived here, you have been rebellious against the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'At Horeb you aroused the '
  - type: text
    content: Lord
  - type: text
    content: '’s wrath so that he was angry enough to destroy you. '
  '9':
  - type: text
    content: 'When I went up on the mountain to receive the tablets of stone, the tablets of the covenant that the '
  - type: text
    content: Lord
  - type: text
    content: ' had made with you, I stayed on the mountain forty days and forty nights; I ate no bread and drank no water. '
