document_id: PSA.80,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 80In Hebrew texts 80:1-19 is numbered 80:2-20.
  - type: text
    content: For the director of music. To the tune of “The Lilies of the Covenant.” Of Asaph. A psalm.
  - type: text
    content: Hear us, Shepherd of Israel,
  - type: text
    content: you who lead Joseph like a flock.
  - type: text
    content: You who sit enthroned between the cherubim,
  - type: text
    content: 'shine forth '
  '10':
  - type: text
    content: The mountains were covered with its shade,
  - type: text
    content: the mighty cedars with its branches.
  '11':
  - type: text
    content: Its branches reached as far as the Sea,
  - type: note
    content: Probably the Mediterranean
  - type: text
    content: its shoots as far as the River.
  - type: note
    content: That is, the Euphrates
  '12':
  - type: text
    content: Why have you broken down its walls
  - type: text
    content: so that all who pass by pick its grapes?
  '13':
  - type: text
    content: Boars from the forest ravage it,
  - type: text
    content: and insects from the fields feed on it.
  '14':
  - type: text
    content: Return to us, God Almighty!
  - type: text
    content: Look down from heaven and see!
  - type: text
    content: Watch over this vine,
  '15':
  - type: text
    content: the root your right hand has planted,
  - type: text
    content: the son
  - type: note
    content: Or branch
  - type: text
    content: ' you have raised up for yourself.'
  '16':
  - type: text
    content: Your vine is cut down, it is burned with fire;
  - type: text
    content: at your rebuke your people perish.
  '17':
  - type: text
    content: Let your hand rest on the man at your right hand,
  - type: text
    content: the son of man you have raised up for yourself.
  '18':
  - type: text
    content: Then we will not turn away from you;
  - type: text
    content: revive us, and we will call on your name.
  '19':
  - type: text
    content: 'Restore us, '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty;'
  - type: text
    content: make your face shine on us,
  - type: text
    content: that we may be saved.
  '2':
  - type: text
    content: before Ephraim, Benjamin and Manasseh.
  - type: text
    content: Awaken your might;
  - type: text
    content: come and save us.
  '3':
  - type: text
    content: Restore us, O God;
  - type: text
    content: make your face shine on us,
  - type: text
    content: that we may be saved.
  '4':
  - type: text
    content: 'How long, '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty,'
  - type: text
    content: will your anger smolder
  - type: text
    content: against the prayers of your people?
  '5':
  - type: text
    content: You have fed them with the bread of tears;
  - type: text
    content: you have made them drink tears by the bowlful.
  '6':
  - type: text
    content: You have made us an object of derision
  - type: note
    content: Probable reading of the original Hebrew text; Masoretic Text contention
  - type: text
    content: ' to our neighbors,'
  - type: text
    content: and our enemies mock us.
  '7':
  - type: text
    content: Restore us, God Almighty;
  - type: text
    content: make your face shine on us,
  - type: text
    content: that we may be saved.
  '8':
  - type: text
    content: You transplanted a vine from Egypt;
  - type: text
    content: you drove out the nations and planted it.
  '9':
  - type: text
    content: You cleared the ground for it,
  - type: text
    content: and it took root and filled the land.
