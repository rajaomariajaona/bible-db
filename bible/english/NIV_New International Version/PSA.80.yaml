document_id: PSA.80
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 80
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 80:1-19 is numbered 80:2-20.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. To the tune of “The Lilies of the Covenant.” Of Asaph. A psalm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hear us, Shepherd of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who lead Joseph like a flock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who sit enthroned between the cherubim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'shine forth '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: before Ephraim, Benjamin and Manasseh.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Awaken your might;
- type: usfm
  marker: q2
  children:
  - type: text
    text: come and save us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Restore us, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: make your face shine on us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that we may be saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'How long, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God Almighty,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will your anger smolder
- type: usfm
  marker: q2
  children:
  - type: text
    text: against the prayers of your people?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You have fed them with the bread of tears;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have made them drink tears by the bowlful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You have made us an object of derision
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probable reading of the original Hebrew text; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: contention
    marker-yv: yv-n
  - type: text
    text: ' to our neighbors,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our enemies mock us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Restore us, God Almighty;
- type: usfm
  marker: q2
  children:
  - type: text
    text: make your face shine on us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that we may be saved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You transplanted a vine from Egypt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you drove out the nations and planted it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You cleared the ground for it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it took root and filled the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The mountains were covered with its shade,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mighty cedars with its branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Its branches reached as far as the Sea,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably the Mediterranean
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: its shoots as far as the River.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the Euphrates
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Why have you broken down its walls
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that all who pass by pick its grapes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Boars from the forest ravage it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and insects from the fields feed on it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Return to us, God Almighty!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Look down from heaven and see!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Watch over this vine,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: the root your right hand has planted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the son
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '80:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: branch
    marker-yv: yv-n
  - type: text
    text: ' you have raised up for yourself.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Your vine is cut down, it is burned with fire;
- type: usfm
  marker: q2
  children:
  - type: text
    text: at your rebuke your people perish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Let your hand rest on the man at your right hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the son of man you have raised up for yourself.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then we will not turn away from you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: revive us, and we will call on your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Restore us, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God Almighty;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: make your face shine on us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that we may be saved.
