document_id: ISA.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Songs of Praise
  - type: text
    content: 'In that day you will say:'
  - type: text
    content: '“I will praise you, '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Although you were angry with me,
  - type: text
    content: your anger has turned away
  - type: text
    content: and you have comforted me.
  '2':
  - type: text
    content: Surely God is my salvation;
  - type: text
    content: I will trust and not be afraid.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the '
  - type: text
    content: Lord
  - type: text
    content: ' himself, is my strength and my defense'
  - type: note
    content: Or song
  - type: text
    content: ;
  - type: text
    content: he has become my salvation.”
  '3':
  - type: text
    content: With joy you will draw water
  - type: text
    content: from the wells of salvation.
  '4':
  - type: text
    content: 'In that day you will say:'
  - type: text
    content: '“Give praise to the '
  - type: text
    content: Lord
  - type: text
    content: ', proclaim his name;'
  - type: text
    content: make known among the nations what he has done,
  - type: text
    content: and proclaim that his name is exalted.
  '5':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he has done glorious things;'
  - type: text
    content: let this be known to all the world.
  '6':
  - type: text
    content: Shout aloud and sing for joy, people of Zion,
  - type: text
    content: for great is the Holy One of Israel among you.”
