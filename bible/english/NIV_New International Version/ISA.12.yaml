document_id: ISA.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Songs of Praise
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In that day you will say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I will praise you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Although you were angry with me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your anger has turned away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you have comforted me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Surely God is my salvation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will trust and not be afraid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' himself, is my strength and my defense'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: song
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has become my salvation.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: With joy you will draw water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the wells of salvation.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'In that day you will say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Give praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', proclaim his name;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make known among the nations what he has done,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and proclaim that his name is exalted.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he has done glorious things;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let this be known to all the world.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Shout aloud and sing for joy, people of Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for great is the Holy One of Israel among you.”
