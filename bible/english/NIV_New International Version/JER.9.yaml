      - type: text
        text: In Hebrew texts 9:1 is numbered 8:23, and 9:2-26 is numbered 9:1-25.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oh, that my head were a spring of water
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my eyes a fountain of tears!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I would weep day and night
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the slain of my people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oh, that I had in the desert
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lodging place for travelers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that I might leave my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: and go away from them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they are all adulterers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a crowd of unfaithful people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “They make ready their tongue
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a bow, to shoot lies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it is not by truth
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they triumph
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lies; / they are not valiant for truth
    marker-yv: yv-n
  - type: text
    text: ' in the land.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They go from one sin to another;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not acknowledge me,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Beware of your friends;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not trust anyone in your clan.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For every one of them is a deceiver,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a deceiving Jacob
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every friend a slanderer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Friend deceives friend,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one speaks the truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have taught their tongues to lie;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they weary themselves with sinning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Jeremiah (the Hebrew is singular)
    marker-yv: yv-n
  - type: text
    text: ' live in the midst of deception;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: in their deceit they refuse to acknowledge me,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “See, I will refine and test them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for what else can I do
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the sin of my people?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Their tongue is a deadly arrow;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it speaks deceitfully.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With their mouths they all speak cordially to their neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but in their hearts they set traps for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Should I not punish them for this?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Should I not avenge myself
- type: usfm
  marker: q2
  children:
  - type: text
    text: on such a nation as this?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I will weep and wail for the mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take up a lament concerning the wilderness grasslands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are desolate and untraveled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the lowing of cattle is not heard.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The birds have all fled
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the animals are gone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I will make Jerusalem a heap of ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a haunt of jackals;
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will lay waste the towns of Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: so no one can live there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Who is wise enough to understand this? Who has been instructed by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and can explain it? Why has the land been ruined and laid waste like a desert that no one can cross?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said, “It is because they have forsaken my law, which I set before them; they have not obeyed me or followed my law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Instead, they have followed the stubbornness of their hearts; they have followed the Baals, as their ancestors taught them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty, the God of Israel, says: “See, I will make this people eat bitter food and drink poisoned water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I will scatter them among nations that neither they nor their ancestors have known, and I will pursue them with the sword until I have made an end of them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Consider now! Call for the wailing women to come;
- type: usfm
  marker: q2
  children:
  - type: text
    text: send for the most skillful of them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Let them come quickly
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wail over us
- type: usfm
  marker: q1
  children:
  - type: text
    text: till our eyes overflow with tears
- type: usfm
  marker: q2
  children:
  - type: text
    text: and water streams from our eyelids.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sound of wailing is heard from Zion:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘How ruined we are!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How great is our shame!
- type: usfm
  marker: q1
  children:
  - type: text
    text: We must leave our land
- type: usfm
  marker: q2
  children:
  - type: text
    text: because our houses are in ruins.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now, you women, hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: open your ears to the words of his mouth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Teach your daughters how to wail;
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach one another a lament.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Death has climbed in through our windows
- type: usfm
  marker: q2
  children:
  - type: text
    text: and has entered our fortresses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it has removed the children from the streets
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the young men from the public squares.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Say, “This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' declares:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Dead bodies will lie
- type: usfm
  marker: q2
  children:
  - type: text
    text: like dung on the open field,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like cut grain behind the reaper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one to gather them.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let not the wise boast of their wisdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the strong boast of their strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the rich boast of their riches,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but let the one who boasts boast about this:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they have the understanding to know me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who exercises kindness,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: justice and righteousness on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for in these I delight,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“The days are coming,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “when I will punish all who are circumcised only in the flesh— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Egypt, Judah, Edom, Ammon, Moab and all who live in the wilderness in distant places.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wilderness and who clip the hair by their foreheads
    marker-yv: yv-n
  - type: text
    text: ' For all these nations are really uncircumcised, and even the whole house of Israel is uncircumcised in heart.”'
