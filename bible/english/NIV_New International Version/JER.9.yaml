document_id: JER.9,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 9:1 is numbered 8:23, and 9:2-26 is numbered 9:1-25.
  - type: text
    content: Oh, that my head were a spring of water
  - type: text
    content: and my eyes a fountain of tears!
  - type: text
    content: I would weep day and night
  - type: text
    content: for the slain of my people.
  '10':
  - type: text
    content: I will weep and wail for the mountains
  - type: text
    content: and take up a lament concerning the wilderness grasslands.
  - type: text
    content: They are desolate and untraveled,
  - type: text
    content: and the lowing of cattle is not heard.
  - type: text
    content: The birds have all fled
  - type: text
    content: and the animals are gone.
  '11':
  - type: text
    content: “I will make Jerusalem a heap of ruins,
  - type: text
    content: a haunt of jackals;
  - type: text
    content: and I will lay waste the towns of Judah
  - type: text
    content: so no one can live there.”
  '12':
  - type: text
    content: 'Who is wise enough to understand this? Who has been instructed by the '
  - type: text
    content: Lord
  - type: text
    content: ' and can explain it? Why has the land been ruined and laid waste like a desert that no one can cross?'
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “It is because they have forsaken my law, which I set before them; they have not obeyed me or followed my law. '
  '14':
  - type: text
    content: 'Instead, they have followed the stubbornness of their hearts; they have followed the Baals, as their ancestors taught them.” '
  '15':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: “See, I will make this people eat bitter food and drink poisoned water. '
  '16':
  - type: text
    content: I will scatter them among nations that neither they nor their ancestors have known, and I will pursue them with the sword until I have made an end of them.”
  '17':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “Consider now! Call for the wailing women to come;
  - type: text
    content: send for the most skillful of them.
  '18':
  - type: text
    content: Let them come quickly
  - type: text
    content: and wail over us
  - type: text
    content: till our eyes overflow with tears
  - type: text
    content: and water streams from our eyelids.
  '19':
  - type: text
    content: 'The sound of wailing is heard from Zion:'
  - type: text
    content: ‘How ruined we are!
  - type: text
    content: How great is our shame!
  - type: text
    content: We must leave our land
  - type: text
    content: because our houses are in ruins.’ ”
  '2':
  - type: text
    content: Oh, that I had in the desert
  - type: text
    content: a lodging place for travelers,
  - type: text
    content: so that I might leave my people
  - type: text
    content: and go away from them;
  - type: text
    content: for they are all adulterers,
  - type: text
    content: a crowd of unfaithful people.
  '20':
  - type: text
    content: 'Now, you women, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: open your ears to the words of his mouth.
  - type: text
    content: Teach your daughters how to wail;
  - type: text
    content: teach one another a lament.
  '21':
  - type: text
    content: Death has climbed in through our windows
  - type: text
    content: and has entered our fortresses;
  - type: text
    content: it has removed the children from the streets
  - type: text
    content: and the young men from the public squares.
  '22':
  - type: text
    content: 'Say, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' declares:'
  - type: text
    content: “ ‘Dead bodies will lie
  - type: text
    content: like dung on the open field,
  - type: text
    content: like cut grain behind the reaper,
  - type: text
    content: with no one to gather them.’ ”
  '23':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Let not the wise boast of their wisdom
  - type: text
    content: or the strong boast of their strength
  - type: text
    content: or the rich boast of their riches,
  '24':
  - type: text
    content: 'but let the one who boasts boast about this:'
  - type: text
    content: that they have the understanding to know me,
  - type: text
    content: 'that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who exercises kindness,'
  - type: text
    content: justice and righteousness on earth,
  - type: text
    content: for in these I delight,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: '“The days are coming,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “when I will punish all who are circumcised only in the flesh— '
  '26':
  - type: text
    content: Egypt, Judah, Edom, Ammon, Moab and all who live in the wilderness in distant places.
  - type: note
    content: Or wilderness and who clip the hair by their foreheads
  - type: text
    content: ' For all these nations are really uncircumcised, and even the whole house of Israel is uncircumcised in heart.”'
  '3':
  - type: text
    content: “They make ready their tongue
  - type: text
    content: like a bow, to shoot lies;
  - type: text
    content: it is not by truth
  - type: text
    content: that they triumph
  - type: note
    content: Or lies; / they are not valiant for truth
  - type: text
    content: ' in the land.'
  - type: text
    content: They go from one sin to another;
  - type: text
    content: they do not acknowledge me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: “Beware of your friends;
  - type: text
    content: do not trust anyone in your clan.
  - type: text
    content: For every one of them is a deceiver,
  - type: note
    content: Or a deceiving Jacob
  - type: text
    content: and every friend a slanderer.
  '5':
  - type: text
    content: Friend deceives friend,
  - type: text
    content: and no one speaks the truth.
  - type: text
    content: They have taught their tongues to lie;
  - type: text
    content: they weary themselves with sinning.
  '6':
  - type: text
    content: You
  - type: note
    content: That is, Jeremiah (the Hebrew is singular)
  - type: text
    content: ' live in the midst of deception;'
  - type: text
    content: in their deceit they refuse to acknowledge me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “See, I will refine and test them,
  - type: text
    content: for what else can I do
  - type: text
    content: because of the sin of my people?
  '8':
  - type: text
    content: Their tongue is a deadly arrow;
  - type: text
    content: it speaks deceitfully.
  - type: text
    content: With their mouths they all speak cordially to their neighbors,
  - type: text
    content: but in their hearts they set traps for them.
  '9':
  - type: text
    content: Should I not punish them for this?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Should I not avenge myself
  - type: text
    content: on such a nation as this?”
