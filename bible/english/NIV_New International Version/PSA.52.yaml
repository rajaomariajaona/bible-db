document_id: PSA.52,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 52In Hebrew texts 52:1-9 is numbered 52:3-11.
  - type: text
    content: 'For the director of music. A '
  - type: text
    content: maskil
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of David. When Doeg the Edomite had gone to Saul and told him: “David has gone to the house of Ahimelek.”'
  - type: text
    content: Why do you boast of evil, you mighty hero?
  - type: text
    content: Why do you boast all day long,
  - type: text
    content: you who are a disgrace in the eyes of God?
  '2':
  - type: text
    content: You who practice deceit,
  - type: text
    content: your tongue plots destruction;
  - type: text
    content: it is like a sharpened razor.
  '3':
  - type: text
    content: You love evil rather than good,
  - type: text
    content: falsehood rather than speaking the truth.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 5.
  '4':
  - type: text
    content: You love every harmful word,
  - type: text
    content: you deceitful tongue!
  '5':
  - type: text
    content: 'Surely God will bring you down to everlasting ruin:'
  - type: text
    content: He will snatch you up and pluck you from your tent;
  - type: text
    content: he will uproot you from the land of the living.
  '6':
  - type: text
    content: The righteous will see and fear;
  - type: text
    content: they will laugh at you, saying,
  '7':
  - type: text
    content: “Here now is the man
  - type: text
    content: who did not make God his stronghold
  - type: text
    content: but trusted in his great wealth
  - type: text
    content: and grew strong by destroying others!”
  '8':
  - type: text
    content: But I am like an olive tree
  - type: text
    content: flourishing in the house of God;
  - type: text
    content: I trust in God’s unfailing love
  - type: text
    content: for ever and ever.
  '9':
  - type: text
    content: For what you have done I will always praise you
  - type: text
    content: in the presence of your faithful people.
  - type: text
    content: And I will hope in your name,
  - type: text
    content: for your name is good.
