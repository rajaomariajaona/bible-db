verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 52
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 52:1-9 is numbered 52:3-11.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. A '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: maskil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a literary or musical term'
      marker-yv: yv-n
    - type: text
      text: ' of David. When Doeg the Edomite had gone to Saul and told him: “David has gone to the house of Ahimelek.”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you boast of evil, you mighty hero?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you boast all day long,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who are a disgrace in the eyes of God?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who practice deceit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your tongue plots destruction;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is like a sharpened razor.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You love evil rather than good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: falsehood rather than speaking the truth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verse 5.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You love every harmful word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you deceitful tongue!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely God will bring you down to everlasting ruin:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will snatch you up and pluck you from your tent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will uproot you from the land of the living.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous will see and fear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will laugh at you, saying,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Here now is the man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who did not make God his stronghold
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but trusted in his great wealth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and grew strong by destroying others!”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I am like an olive tree
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flourishing in the house of God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I trust in God’s unfailing love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for ever and ever.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For what you have done I will always praise you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the presence of your faithful people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will hope in your name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your name is good.
