document_id: EZR.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Opposition to the Rebuilding
  - type: text
    content: 'When the enemies of Judah and Benjamin heard that the exiles were building a temple for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, '
  '10':
  - type: text
    content: and the other people whom the great and honorable Ashurbanipal deported and settled in the city of Samaria and elsewhere in Trans-Euphrates.
  '11':
  - type: text
    content: (This is a copy of the letter they sent him.)
  - type: text
    content: To King Artaxerxes,
  - type: text
    content: 'From your servants in Trans-Euphrates:'
  '12':
  - type: text
    content: The king should know that the people who came up to us from you have gone to Jerusalem and are rebuilding that rebellious and wicked city. They are restoring the walls and repairing the foundations.
  '13':
  - type: text
    content: Furthermore, the king should know that if this city is built and its walls are restored, no more taxes, tribute or duty will be paid, and eventually the royal revenues will suffer.
  - type: note
    content: The meaning of the Aramaic for this clause is uncertain.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Now since we are under obligation to the palace and it is not proper for us to see the king dishonored, we are sending this message to inform the king, '
  '15':
  - type: text
    content: 'so that a search may be made in the archives of your predecessors. In these records you will find that this city is a rebellious city, troublesome to kings and provinces, a place with a long history of sedition. That is why this city was destroyed. '
  '16':
  - type: text
    content: We inform the king that if this city is built and its walls are restored, you will be left with nothing in Trans-Euphrates.
  '17':
  - type: text
    content: 'The king sent this reply:'
  - type: text
    content: 'To Rehum the commanding officer, Shimshai the secretary and the rest of their associates living in Samaria and elsewhere in Trans-Euphrates:'
  - type: text
    content: Greetings.
  '18':
  - type: text
    content: 'The letter you sent us has been read and translated in my presence. '
  '19':
  - type: text
    content: 'I issued an order and a search was made, and it was found that this city has a long history of revolt against kings and has been a place of rebellion and sedition. '
  '2':
  - type: text
    content: they came to Zerubbabel and to the heads of the families and said, “Let us help you build because, like you, we seek your God and have been sacrificing to him since the time of Esarhaddon king of Assyria, who brought us here.”
  '20':
  - type: text
    content: 'Jerusalem has had powerful kings ruling over the whole of Trans-Euphrates, and taxes, tribute and duty were paid to them. '
  '21':
  - type: text
    content: 'Now issue an order to these men to stop work, so that this city will not be rebuilt until I so order. '
  '22':
  - type: text
    content: Be careful not to neglect this matter. Why let this threat grow, to the detriment of the royal interests?
  '23':
  - type: text
    content: As soon as the copy of the letter of King Artaxerxes was read to Rehum and Shimshai the secretary and their associates, they went immediately to the Jews in Jerusalem and compelled them by force to stop.
  '24':
  - type: text
    content: Thus the work on the house of God in Jerusalem came to a standstill until the second year of the reign of Darius king of Persia.
  '3':
  - type: text
    content: 'But Zerubbabel, Joshua and the rest of the heads of the families of Israel answered, “You have no part with us in building a temple to our God. We alone will build it for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, as King Cyrus, the king of Persia, commanded us.”'
  '4':
  - type: text
    content: Then the peoples around them set out to discourage the people of Judah and make them afraid to go on building.
  - type: note
    content: Or and troubled them as they built
  - type: text
    content: ' '
  '5':
  - type: text
    content: They bribed officials to work against them and frustrate their plans during the entire reign of Cyrus king of Persia and down to the reign of Darius king of Persia.
  - type: heading
    content: Later Opposition Under Xerxes and Artaxerxes
  '6':
  - type: text
    content: At the beginning of the reign of Xerxes,
  - type: note
    content: Hebrew Ahasuerus
  - type: text
    content: ' they lodged an accusation against the people of Judah and Jerusalem.'
  '7':
  - type: text
    content: And in the days of Artaxerxes king of Persia, Bishlam, Mithredath, Tabeel and the rest of his associates wrote a letter to Artaxerxes. The letter was written in Aramaic script and in the Aramaic language.
  - type: note
    content: Or written in Aramaic and translated
  - type: note
    content: The text of 4:8–6:18 is in Aramaic.
  '8':
  - type: text
    content: 'Rehum the commanding officer and Shimshai the secretary wrote a letter against Jerusalem to Artaxerxes the king as follows:'
  '9':
  - type: text
    content: 'Rehum the commanding officer and Shimshai the secretary, together with the rest of their associates—the judges, officials and administrators over the people from Persia, Uruk and Babylon, the Elamites of Susa, '
