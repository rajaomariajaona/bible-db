document_id: JER.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah to Serve Nebuchadnezzar
  - type: text
    content: Early in the reign of Zedekiah
  - type: note
    content: A few Hebrew manuscripts and Syriac (see also 27:3,12 and 28:1); most Hebrew manuscripts Jehoiakim (Most Septuagint manuscripts do not have this verse.)
  - type: text
    content: ' son of Josiah king of Judah, this word came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'They prophesy lies to you that will only serve to remove you far from your lands; I will banish you and you will perish. '
  '11':
  - type: text
    content: 'But if any nation will bow its neck under the yoke of the king of Babylon and serve him, I will let that nation remain in its own land to till it and to live there, declares the '
  - type: text
    content: Lord
  - type: text
    content: .” ’ ”
  '12':
  - type: text
    content: 'I gave the same message to Zedekiah king of Judah. I said, “Bow your neck under the yoke of the king of Babylon; serve him and his people, and you will live. '
  '13':
  - type: text
    content: 'Why will you and your people die by the sword, famine and plague with which the '
  - type: text
    content: Lord
  - type: text
    content: ' has threatened any nation that will not serve the king of Babylon? '
  '14':
  - type: text
    content: 'Do not listen to the words of the prophets who say to you, ‘You will not serve the king of Babylon,’ for they are prophesying lies to you. '
  '15':
  - type: text
    content: '‘I have not sent them,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: . ‘They are prophesying lies in my name. Therefore, I will banish you and you will perish, both you and the prophets who prophesy to you.’ ”
  '16':
  - type: text
    content: 'Then I said to the priests and all these people, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do not listen to the prophets who say, ‘Very soon now the articles from the '
  - type: text
    content: Lord
  - type: text
    content: '’s house will be brought back from Babylon.’ They are prophesying lies to you. '
  '17':
  - type: text
    content: 'Do not listen to them. Serve the king of Babylon, and you will live. Why should this city become a ruin? '
  '18':
  - type: text
    content: 'If they are prophets and have the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', let them plead with the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty that the articles remaining in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in the palace of the king of Judah and in Jerusalem not be taken to Babylon. '
  '19':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says about the pillars, the bronze Sea, the movable stands and the other articles that are left in this city, '
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Make a yoke out of straps and crossbars and put it on your neck. '
  '20':
  - type: text
    content: which Nebuchadnezzar king of Babylon did not take away when he carried Jehoiachin
  - type: note
    content: Hebrew Jeconiah, a variant of Jehoiachin
  - type: text
    content: ' son of Jehoiakim king of Judah into exile from Jerusalem to Babylon, along with all the nobles of Judah and Jerusalem— '
  '21':
  - type: text
    content: 'yes, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says about the things that are left in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in the palace of the king of Judah and in Jerusalem: '
  '22':
  - type: text
    content: '‘They will be taken to Babylon and there they will remain until the day I come for them,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: . ‘Then I will bring them back and restore them to this place.’ ”
  '3':
  - type: text
    content: 'Then send word to the kings of Edom, Moab, Ammon, Tyre and Sidon through the envoys who have come to Jerusalem to Zedekiah king of Judah. '
  '4':
  - type: text
    content: 'Give them a message for their masters and say, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: “Tell this to your masters: '
  '5':
  - type: text
    content: 'With my great power and outstretched arm I made the earth and its people and the animals that are on it, and I give it to anyone I please. '
  '6':
  - type: text
    content: 'Now I will give all your countries into the hands of my servant Nebuchadnezzar king of Babylon; I will make even the wild animals subject to him. '
  '7':
  - type: text
    content: All nations will serve him and his son and his grandson until the time for his land comes; then many nations and great kings will subjugate him.
  '8':
  - type: text
    content: '“ ‘ “If, however, any nation or kingdom will not serve Nebuchadnezzar king of Babylon or bow its neck under his yoke, I will punish that nation with the sword, famine and plague, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', until I destroy it by his hand. '
  '9':
  - type: text
    content: 'So do not listen to your prophets, your diviners, your interpreters of dreams, your mediums or your sorcerers who tell you, ‘You will not serve the king of Babylon.’ '
