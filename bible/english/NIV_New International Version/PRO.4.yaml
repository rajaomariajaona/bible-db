document_id: PRO.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Get Wisdom at Any Cost
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, my sons, to a father’s instruction;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay attention and gain understanding.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, my son, accept what I say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the years of your life will be many.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I instruct you in the way of wisdom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lead you along straight paths.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you walk, your steps will not be hampered;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you run, you will not stumble.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hold on to instruction, do not let it go;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: guard it well, for it is your life.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not set foot on the path of the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or walk in the way of evildoers.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avoid it, do not travel on it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn from it and go on your way.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they cannot rest until they do evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are robbed of sleep till they make someone stumble.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They eat the bread of wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drink the wine of violence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The path of the righteous is like the morning sun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shining ever brighter till the full light of day.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the way of the wicked is like deep darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they do not know what makes them stumble.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I give you sound learning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so do not forsake my teaching.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, pay attention to what I say;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn your ear to my words.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not let them out of your sight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep them within your heart;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they are life to those who find them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and health to one’s whole body.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Above all else, guard your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for everything you do flows from it.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep your mouth free of perversity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep corrupt talk far from your lips.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your eyes look straight ahead;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fix your gaze directly before you.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give careful thought to the
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Make level
      marker-yv: yv-n
    - type: text
      text: ' paths for your feet'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be steadfast in all your ways.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not turn to the right or the left;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep your foot from evil.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I too was a son to my father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: still tender, and cherished by my mother.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then he taught me, and he said to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Take hold of my words with all your heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep my commands, and you will live.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get wisdom, get understanding;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not forget my words or turn away from them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not forsake wisdom, and she will protect you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: love her, and she will watch over you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The beginning of wisdom is this: Get'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Wisdom is supreme; therefore get
      marker-yv: yv-n
    - type: text
      text: ' wisdom.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though it cost all you have,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wisdom. / Whatever else you get
      marker-yv: yv-n
    - type: text
      text: ' get understanding.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cherish her, and she will exalt you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: embrace her, and she will honor you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will give you a garland to grace your head
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and present you with a glorious crown.”
