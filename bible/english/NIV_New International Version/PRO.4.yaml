document_id: PRO.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Get Wisdom at Any Cost
  - type: text
    content: Listen, my sons, to a father’s instruction;
  - type: text
    content: pay attention and gain understanding.
  '10':
  - type: text
    content: Listen, my son, accept what I say,
  - type: text
    content: and the years of your life will be many.
  '11':
  - type: text
    content: I instruct you in the way of wisdom
  - type: text
    content: and lead you along straight paths.
  '12':
  - type: text
    content: When you walk, your steps will not be hampered;
  - type: text
    content: when you run, you will not stumble.
  '13':
  - type: text
    content: Hold on to instruction, do not let it go;
  - type: text
    content: guard it well, for it is your life.
  '14':
  - type: text
    content: Do not set foot on the path of the wicked
  - type: text
    content: or walk in the way of evildoers.
  '15':
  - type: text
    content: Avoid it, do not travel on it;
  - type: text
    content: turn from it and go on your way.
  '16':
  - type: text
    content: For they cannot rest until they do evil;
  - type: text
    content: they are robbed of sleep till they make someone stumble.
  '17':
  - type: text
    content: They eat the bread of wickedness
  - type: text
    content: and drink the wine of violence.
  '18':
  - type: text
    content: The path of the righteous is like the morning sun,
  - type: text
    content: shining ever brighter till the full light of day.
  '19':
  - type: text
    content: But the way of the wicked is like deep darkness;
  - type: text
    content: they do not know what makes them stumble.
  '2':
  - type: text
    content: I give you sound learning,
  - type: text
    content: so do not forsake my teaching.
  '20':
  - type: text
    content: My son, pay attention to what I say;
  - type: text
    content: turn your ear to my words.
  '21':
  - type: text
    content: Do not let them out of your sight,
  - type: text
    content: keep them within your heart;
  '22':
  - type: text
    content: for they are life to those who find them
  - type: text
    content: and health to one’s whole body.
  '23':
  - type: text
    content: Above all else, guard your heart,
  - type: text
    content: for everything you do flows from it.
  '24':
  - type: text
    content: Keep your mouth free of perversity;
  - type: text
    content: keep corrupt talk far from your lips.
  '25':
  - type: text
    content: Let your eyes look straight ahead;
  - type: text
    content: fix your gaze directly before you.
  '26':
  - type: text
    content: Give careful thought to the
  - type: note
    content: Or Make level
  - type: text
    content: ' paths for your feet'
  - type: text
    content: and be steadfast in all your ways.
  '27':
  - type: text
    content: Do not turn to the right or the left;
  - type: text
    content: keep your foot from evil.
  '3':
  - type: text
    content: For I too was a son to my father,
  - type: text
    content: still tender, and cherished by my mother.
  '4':
  - type: text
    content: Then he taught me, and he said to me,
  - type: text
    content: “Take hold of my words with all your heart;
  - type: text
    content: keep my commands, and you will live.
  '5':
  - type: text
    content: Get wisdom, get understanding;
  - type: text
    content: do not forget my words or turn away from them.
  '6':
  - type: text
    content: Do not forsake wisdom, and she will protect you;
  - type: text
    content: love her, and she will watch over you.
  '7':
  - type: text
    content: 'The beginning of wisdom is this: Get'
  - type: note
    content: Or Wisdom is supreme; therefore get
  - type: text
    content: ' wisdom.'
  - type: text
    content: Though it cost all you have,
  - type: note
    content: Or wisdom. / Whatever else you get
  - type: text
    content: ' get understanding.'
  '8':
  - type: text
    content: Cherish her, and she will exalt you;
  - type: text
    content: embrace her, and she will honor you.
  '9':
  - type: text
    content: She will give you a garland to grace your head
  - type: text
    content: and present you with a glorious crown.”
