document_id: EXO.38
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Altar of Burnt Offering
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: They
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 2-9
    marker-yv: yv-n
  - type: text
    text: ' built the altar of burnt offering of acacia wood, three cubits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 4 1/2 feet or about 1.4 meters
    marker-yv: yv-n
  - type: text
    text: ' high; it was square, five cubits long and five cubits wide.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 7 1/2 feet or about 2.3 meters long and wide
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They made a horn at each of the four corners, so that the horns and the altar were of one piece, and they overlaid the altar with bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They made all its utensils of bronze—its pots, shovels, sprinkling bowls, meat forks and firepans. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They made a grating for the altar, a bronze network, to be under its ledge, halfway up the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They cast bronze rings to hold the poles for the four corners of the bronze grating. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They made the poles of acacia wood and overlaid them with bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They inserted the poles into the rings so they would be on the sides of the altar for carrying it. They made it hollow, out of boards.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Basin for Washing
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They made the bronze basin and its bronze stand from the mirrors of the women who served at the entrance to the tent of meeting.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Courtyard
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Next they made the courtyard. The south side was a hundred cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 150 feet or about 45 meters
    marker-yv: yv-n
  - type: text
    text: ' long and had curtains of finely twisted linen, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'with twenty posts and twenty bronze bases, and with silver hooks and bands on the posts. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The north side was also a hundred cubits long and had twenty posts and twenty bronze bases, with silver hooks and bands on the posts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The west end was fifty cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 75 feet or about 23 meters
    marker-yv: yv-n
  - type: text
    text: ' wide and had curtains, with ten posts and ten bases, with silver hooks and bands on the posts. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The east end, toward the sunrise, was also fifty cubits wide. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Curtains fifteen cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 22 feet or about 6.8 meters
    marker-yv: yv-n
  - type: text
    text: ' long were on one side of the entrance, with three posts and three bases, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and curtains fifteen cubits long were on the other side of the entrance to the courtyard, with three posts and three bases. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'All the curtains around the courtyard were of finely twisted linen. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The bases for the posts were bronze. The hooks and bands on the posts were silver, and their tops were overlaid with silver; so all the posts of the courtyard had silver bands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The curtain for the entrance to the courtyard was made of blue, purple and scarlet yarn and finely twisted linen—the work of an embroiderer. It was twenty cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 30 feet or about 9 meters
    marker-yv: yv-n
  - type: text
    text: ' long and, like the curtains of the courtyard, five cubits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 7 1/2 feet or about 2.3 meters
    marker-yv: yv-n
  - type: text
    text: ' high, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'with four posts and four bronze bases. Their hooks and bands were silver, and their tops were overlaid with silver. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: All the tent pegs of the tabernacle and of the surrounding courtyard were bronze.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Materials Used
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'These are the amounts of the materials used for the tabernacle, the tabernacle of the covenant law, which were recorded at Moses’ command by the Levites under the direction of Ithamar son of Aaron, the priest. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '(Bezalel son of Uri, the son of Hur, of the tribe of Judah, made everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'with him was Oholiab son of Ahisamak, of the tribe of Dan—an engraver and designer, and an embroiderer in blue, purple and scarlet yarn and fine linen.) '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The total amount of the gold from the wave offering used for all the work on the sanctuary was 29 talents and 730 shekels,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The weight of the gold was a little over a ton or about 1 metric ton.
    marker-yv: yv-n
  - type: text
    text: ' according to the sanctuary shekel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The silver obtained from those of the community who were counted in the census was 100 talents
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 3/4 tons or about 3.4 metric tons; also in verse 27
    marker-yv: yv-n
  - type: text
    text: ' and 1,775 shekels,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 44 pounds or about 20 kilograms; also in verse 28
    marker-yv: yv-n
  - type: text
    text: ' according to the sanctuary shekel— '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: one beka per person, that is, half a shekel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1/5 ounce or about 5.7 grams
    marker-yv: yv-n
  - type: text
    text: ' according to the sanctuary shekel, from everyone who had crossed over to those counted, twenty years old or more, a total of 603,550 men. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The 100 talents of silver were used to cast the bases for the sanctuary and for the curtain—100 bases from the 100 talents, one talent for each base. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They used the 1,775 shekels to make the hooks for the posts, to overlay the tops of the posts, and to make their bands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The bronze from the wave offering was 70 talents and 2,400 shekels.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '38:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The weight of the bronze was about 2 1/2 tons or about 2.4 metric tons.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They used it to make the bases for the entrance to the tent of meeting, the bronze altar with its bronze grating and all its utensils, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: the bases for the surrounding courtyard and those for its entrance and all the tent pegs for the tabernacle and those for the surrounding courtyard.
