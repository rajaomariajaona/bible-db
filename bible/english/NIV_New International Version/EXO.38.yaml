document_id: EXO.38,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar of Burnt Offering
  - type: text
    content: They
  - type: note
    content: Or He; also in verses 2-9
  - type: text
    content: ' built the altar of burnt offering of acacia wood, three cubits'
  - type: note
    content: That is, about 4 1/2 feet or about 1.4 meters
  - type: text
    content: ' high; it was square, five cubits long and five cubits wide.'
  - type: note
    content: That is, about 7 1/2 feet or about 2.3 meters long and wide
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'with twenty posts and twenty bronze bases, and with silver hooks and bands on the posts. '
  '11':
  - type: text
    content: The north side was also a hundred cubits long and had twenty posts and twenty bronze bases, with silver hooks and bands on the posts.
  '12':
  - type: text
    content: The west end was fifty cubits
  - type: note
    content: That is, about 75 feet or about 23 meters
  - type: text
    content: ' wide and had curtains, with ten posts and ten bases, with silver hooks and bands on the posts. '
  '13':
  - type: text
    content: 'The east end, toward the sunrise, was also fifty cubits wide. '
  '14':
  - type: text
    content: Curtains fifteen cubits
  - type: note
    content: That is, about 22 feet or about 6.8 meters
  - type: text
    content: ' long were on one side of the entrance, with three posts and three bases, '
  '15':
  - type: text
    content: 'and curtains fifteen cubits long were on the other side of the entrance to the courtyard, with three posts and three bases. '
  '16':
  - type: text
    content: 'All the curtains around the courtyard were of finely twisted linen. '
  '17':
  - type: text
    content: The bases for the posts were bronze. The hooks and bands on the posts were silver, and their tops were overlaid with silver; so all the posts of the courtyard had silver bands.
  '18':
  - type: text
    content: The curtain for the entrance to the courtyard was made of blue, purple and scarlet yarn and finely twisted linen—the work of an embroiderer. It was twenty cubits
  - type: note
    content: That is, about 30 feet or about 9 meters
  - type: text
    content: ' long and, like the curtains of the courtyard, five cubits'
  - type: note
    content: That is, about 7 1/2 feet or about 2.3 meters
  - type: text
    content: ' high, '
  '19':
  - type: text
    content: 'with four posts and four bronze bases. Their hooks and bands were silver, and their tops were overlaid with silver. '
  '2':
  - type: text
    content: 'They made a horn at each of the four corners, so that the horns and the altar were of one piece, and they overlaid the altar with bronze. '
  '20':
  - type: text
    content: All the tent pegs of the tabernacle and of the surrounding courtyard were bronze.
  - type: heading
    content: The Materials Used
  '21':
  - type: text
    content: 'These are the amounts of the materials used for the tabernacle, the tabernacle of the covenant law, which were recorded at Moses’ command by the Levites under the direction of Ithamar son of Aaron, the priest. '
  '22':
  - type: text
    content: '(Bezalel son of Uri, the son of Hur, of the tribe of Judah, made everything the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses; '
  '23':
  - type: text
    content: 'with him was Oholiab son of Ahisamak, of the tribe of Dan—an engraver and designer, and an embroiderer in blue, purple and scarlet yarn and fine linen.) '
  '24':
  - type: text
    content: The total amount of the gold from the wave offering used for all the work on the sanctuary was 29 talents and 730 shekels,
  - type: note
    content: The weight of the gold was a little over a ton or about 1 metric ton.
  - type: text
    content: ' according to the sanctuary shekel.'
  '25':
  - type: text
    content: The silver obtained from those of the community who were counted in the census was 100 talents
  - type: note
    content: That is, about 3 3/4 tons or about 3.4 metric tons; also in verse 27
  - type: text
    content: ' and 1,775 shekels,'
  - type: note
    content: That is, about 44 pounds or about 20 kilograms; also in verse 28
  - type: text
    content: ' according to the sanctuary shekel— '
  '26':
  - type: text
    content: one beka per person, that is, half a shekel,
  - type: note
    content: That is, about 1/5 ounce or about 5.7 grams
  - type: text
    content: ' according to the sanctuary shekel, from everyone who had crossed over to those counted, twenty years old or more, a total of 603,550 men. '
  '27':
  - type: text
    content: 'The 100 talents of silver were used to cast the bases for the sanctuary and for the curtain—100 bases from the 100 talents, one talent for each base. '
  '28':
  - type: text
    content: They used the 1,775 shekels to make the hooks for the posts, to overlay the tops of the posts, and to make their bands.
  '29':
  - type: text
    content: The bronze from the wave offering was 70 talents and 2,400 shekels.
  - type: note
    content: The weight of the bronze was about 2 1/2 tons or about 2.4 metric tons.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'They made all its utensils of bronze—its pots, shovels, sprinkling bowls, meat forks and firepans. '
  '30':
  - type: text
    content: 'They used it to make the bases for the entrance to the tent of meeting, the bronze altar with its bronze grating and all its utensils, '
  '31':
  - type: text
    content: the bases for the surrounding courtyard and those for its entrance and all the tent pegs for the tabernacle and those for the surrounding courtyard.
  '4':
  - type: text
    content: 'They made a grating for the altar, a bronze network, to be under its ledge, halfway up the altar. '
  '5':
  - type: text
    content: 'They cast bronze rings to hold the poles for the four corners of the bronze grating. '
  '6':
  - type: text
    content: 'They made the poles of acacia wood and overlaid them with bronze. '
  '7':
  - type: text
    content: They inserted the poles into the rings so they would be on the sides of the altar for carrying it. They made it hollow, out of boards.
  - type: heading
    content: The Basin for Washing
  '8':
  - type: text
    content: They made the bronze basin and its bronze stand from the mirrors of the women who served at the entrance to the tent of meeting.
  - type: heading
    content: The Courtyard
  '9':
  - type: text
    content: Next they made the courtyard. The south side was a hundred cubits
  - type: note
    content: That is, about 150 feet or about 45 meters
  - type: text
    content: ' long and had curtains of finely twisted linen, '
