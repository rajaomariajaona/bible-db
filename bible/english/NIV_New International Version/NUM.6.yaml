document_id: NUM.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Nazirite
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'Then on the eighth day they must bring two doves or two young pigeons to the priest at the entrance to the tent of meeting. '
  '11':
  - type: text
    content: The priest is to offer one as a sin offering
  - type: note
    content: Or purification offering; also in verses 14 and 16
  - type: text
    content: ' and the other as a burnt offering to make atonement for the Nazirite because they sinned by being in the presence of the dead body. That same day they are to consecrate their head again. '
  '12':
  - type: text
    content: 'They must rededicate themselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' for the same period of dedication and must bring a year-old male lamb as a guilt offering. The previous days do not count, because they became defiled during their period of dedication.'
  '13':
  - type: text
    content: '“ ‘Now this is the law of the Nazirite when the period of their dedication is over. They are to be brought to the entrance to the tent of meeting. '
  '14':
  - type: text
    content: 'There they are to present their offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ': a year-old male lamb without defect for a burnt offering, a year-old ewe lamb without defect for a sin offering, a ram without defect for a fellowship offering, '
  '15':
  - type: text
    content: together with their grain offerings and drink offerings, and a basket of bread made with the finest flour and without yeast—thick loaves with olive oil mixed in, and thin loaves brushed with olive oil.
  '16':
  - type: text
    content: '“ ‘The priest is to present all these before the '
  - type: text
    content: Lord
  - type: text
    content: ' and make the sin offering and the burnt offering. '
  '17':
  - type: text
    content: 'He is to present the basket of unleavened bread and is to sacrifice the ram as a fellowship offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', together with its grain offering and drink offering.'
  '18':
  - type: text
    content: “ ‘Then at the entrance to the tent of meeting, the Nazirite must shave off the hair that symbolizes their dedication. They are to take the hair and put it in the fire that is under the sacrifice of the fellowship offering.
  '19':
  - type: text
    content: '“ ‘After the Nazirite has shaved off the hair that symbolizes their dedication, the priest is to place in their hands a boiled shoulder of the ram, and one thick loaf and one thin loaf from the basket, both made without yeast. '
  '2':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘If a man or woman wants to make a special vow, a vow of dedication to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a Nazirite, '
  '20':
  - type: text
    content: 'The priest shall then wave these before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering; they are holy and belong to the priest, together with the breast that was waved and the thigh that was presented. After that, the Nazirite may drink wine.'
  '21':
  - type: text
    content: '“ ‘This is the law of the Nazirite who vows offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' in accordance with their dedication, in addition to whatever else they can afford. They must fulfill the vows they have made, according to the law of the Nazirite.’ ”'
  - type: heading
    content: The Priestly Blessing
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '23':
  - type: text
    content: '“Tell Aaron and his sons, ‘This is how you are to bless the Israelites. Say to them:'
  '24':
  - type: text
    content: '“ ‘ “The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you'
  - type: text
    content: and keep you;
  '25':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' make his face shine on you'
  - type: text
    content: and be gracious to you;
  '26':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' turn his face toward you'
  - type: text
    content: and give you peace.” ’
  '27':
  - type: text
    content: “So they will put my name on the Israelites, and I will bless them.”
  '3':
  - type: text
    content: 'they must abstain from wine and other fermented drink and must not drink vinegar made from wine or other fermented drink. They must not drink grape juice or eat grapes or raisins. '
  '4':
  - type: text
    content: As long as they remain under their Nazirite vow, they must not eat anything that comes from the grapevine, not even the seeds or skins.
  '5':
  - type: text
    content: '“ ‘During the entire period of their Nazirite vow, no razor may be used on their head. They must be holy until the period of their dedication to the '
  - type: text
    content: Lord
  - type: text
    content: ' is over; they must let their hair grow long.'
  '6':
  - type: text
    content: '“ ‘Throughout the period of their dedication to the '
  - type: text
    content: Lord
  - type: text
    content: ', the Nazirite must not go near a dead body. '
  '7':
  - type: text
    content: 'Even if their own father or mother or brother or sister dies, they must not make themselves ceremonially unclean on account of them, because the symbol of their dedication to God is on their head. '
  '8':
  - type: text
    content: 'Throughout the period of their dedication, they are consecrated to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: '“ ‘If someone dies suddenly in the Nazirite’s presence, thus defiling the hair that symbolizes their dedication, they must shave their head on the seventh day—the day of their cleansing. '
