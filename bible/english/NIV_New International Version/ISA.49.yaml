document_id: ISA.49,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Servant of the Lord
  - type: text
    content: Listen to me, you islands;
  - type: text
    content: 'hear this, you distant nations:'
  - type: text
    content: 'Before I was born the '
  - type: text
    content: Lord
  - type: text
    content: ' called me;'
  - type: text
    content: from my mother’s womb he has spoken my name.
  '10':
  - type: text
    content: They will neither hunger nor thirst,
  - type: text
    content: nor will the desert heat or the sun beat down on them.
  - type: text
    content: He who has compassion on them will guide them
  - type: text
    content: and lead them beside springs of water.
  '11':
  - type: text
    content: I will turn all my mountains into roads,
  - type: text
    content: and my highways will be raised up.
  '12':
  - type: text
    content: See, they will come from afar—
  - type: text
    content: some from the north, some from the west,
  - type: text
    content: some from the region of Aswan.
  - type: note
    content: Dead Sea Scrolls; Masoretic Text Sinim
  - type: text
    content: ”
  '13':
  - type: text
    content: Shout for joy, you heavens;
  - type: text
    content: rejoice, you earth;
  - type: text
    content: burst into song, you mountains!
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' comforts his people'
  - type: text
    content: and will have compassion on his afflicted ones.
  '14':
  - type: text
    content: 'But Zion said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has forsaken me,'
  - type: text
    content: the Lord has forgotten me.”
  '15':
  - type: text
    content: “Can a mother forget the baby at her breast
  - type: text
    content: and have no compassion on the child she has borne?
  - type: text
    content: Though she may forget,
  - type: text
    content: I will not forget you!
  '16':
  - type: text
    content: See, I have engraved you on the palms of my hands;
  - type: text
    content: your walls are ever before me.
  '17':
  - type: text
    content: Your children hasten back,
  - type: text
    content: and those who laid you waste depart from you.
  '18':
  - type: text
    content: Lift up your eyes and look around;
  - type: text
    content: all your children gather and come to you.
  - type: text
    content: 'As surely as I live,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “you will wear them all as ornaments;
  - type: text
    content: you will put them on, like a bride.
  '19':
  - type: text
    content: “Though you were ruined and made desolate
  - type: text
    content: and your land laid waste,
  - type: text
    content: now you will be too small for your people,
  - type: text
    content: and those who devoured you will be far away.
  '2':
  - type: text
    content: He made my mouth like a sharpened sword,
  - type: text
    content: in the shadow of his hand he hid me;
  - type: text
    content: he made me into a polished arrow
  - type: text
    content: and concealed me in his quiver.
  '20':
  - type: text
    content: The children born during your bereavement
  - type: text
    content: will yet say in your hearing,
  - type: text
    content: ‘This place is too small for us;
  - type: text
    content: give us more space to live in.’
  '21':
  - type: text
    content: Then you will say in your heart,
  - type: text
    content: ‘Who bore me these?
  - type: text
    content: I was bereaved and barren;
  - type: text
    content: I was exiled and rejected.
  - type: text
    content: Who brought these up?
  - type: text
    content: I was left all alone,
  - type: text
    content: but these—where have they come from?’ ”
  '22':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “See, I will beckon to the nations,
  - type: text
    content: I will lift up my banner to the peoples;
  - type: text
    content: they will bring your sons in their arms
  - type: text
    content: and carry your daughters on their hips.
  '23':
  - type: text
    content: Kings will be your foster fathers,
  - type: text
    content: and their queens your nursing mothers.
  - type: text
    content: They will bow down before you with their faces to the ground;
  - type: text
    content: they will lick the dust at your feet.
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: those who hope in me will not be disappointed.”
  '24':
  - type: text
    content: Can plunder be taken from warriors,
  - type: text
    content: or captives be rescued from the fierce
  - type: note
    content: Dead Sea Scrolls, Vulgate and Syriac (see also Septuagint and verse 25); Masoretic Text righteous
  - type: text
    content: '?'
  '25':
  - type: text
    content: 'But this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Yes, captives will be taken from warriors,
  - type: text
    content: and plunder retrieved from the fierce;
  - type: text
    content: I will contend with those who contend with you,
  - type: text
    content: and your children I will save.
  '26':
  - type: text
    content: I will make your oppressors eat their own flesh;
  - type: text
    content: they will be drunk on their own blood, as with wine.
  - type: text
    content: Then all mankind will know
  - type: text
    content: 'that I, the '
  - type: text
    content: Lord
  - type: text
    content: ', am your Savior,'
  - type: text
    content: your Redeemer, the Mighty One of Jacob.”
  '3':
  - type: text
    content: He said to me, “You are my servant,
  - type: text
    content: Israel, in whom I will display my splendor.”
  '4':
  - type: text
    content: But I said, “I have labored in vain;
  - type: text
    content: I have spent my strength for nothing at all.
  - type: text
    content: 'Yet what is due me is in the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand,
  - type: text
    content: and my reward is with my God.”
  '5':
  - type: text
    content: 'And now the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: he who formed me in the womb to be his servant
  - type: text
    content: to bring Jacob back to him
  - type: text
    content: and gather Israel to himself,
  - type: text
    content: for I am
  - type: note
    content: Or him, / but Israel would not be gathered; / yet I will be
  - type: text
    content: ' honored in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: and my God has been my strength—
  '6':
  - type: text
    content: 'he says:'
  - type: text
    content: “It is too small a thing for you to be my servant
  - type: text
    content: to restore the tribes of Jacob
  - type: text
    content: and bring back those of Israel I have kept.
  - type: text
    content: I will also make you a light for the Gentiles,
  - type: text
    content: that my salvation may reach to the ends of the earth.”
  '7':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: the Redeemer and Holy One of Israel—
  - type: text
    content: to him who was despised and abhorred by the nation,
  - type: text
    content: 'to the servant of rulers:'
  - type: text
    content: “Kings will see you and stand up,
  - type: text
    content: princes will see and bow down,
  - type: text
    content: 'because of the '
  - type: text
    content: Lord
  - type: text
    content: ', who is faithful,'
  - type: text
    content: the Holy One of Israel, who has chosen you.”
  - type: heading
    content: Restoration of Israel
  '8':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “In the time of my favor I will answer you,
  - type: text
    content: and in the day of salvation I will help you;
  - type: text
    content: I will keep you and will make you
  - type: text
    content: to be a covenant for the people,
  - type: text
    content: to restore the land
  - type: text
    content: and to reassign its desolate inheritances,
  '9':
  - type: text
    content: to say to the captives, ‘Come out,’
  - type: text
    content: and to those in darkness, ‘Be free!’
  - type: text
    content: “They will feed beside the roads
  - type: text
    content: and find pasture on every barren hill.
