document_id: ISA.49
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen to me, you islands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'hear this, you distant nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Before I was born the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' called me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: from my mother’s womb he has spoken my name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He made my mouth like a sharpened sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the shadow of his hand he hid me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he made me into a polished arrow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and concealed me in his quiver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He said to me, “You are my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel, in whom I will display my splendor.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But I said, “I have labored in vain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have spent my strength for nothing at all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Yet what is due me is in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my reward is with my God.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And now the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he who formed me in the womb to be his servant
- type: usfm
  marker: q1
  children:
  - type: text
    text: to bring Jacob back to him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gather Israel to himself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I am
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: him, / but Israel would not be gathered; / yet I will be
    marker-yv: yv-n
  - type: text
    text: ' honored in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my God has been my strength—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'he says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “It is too small a thing for you to be my servant
- type: usfm
  marker: q2
  children:
  - type: text
    text: to restore the tribes of Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring back those of Israel I have kept.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will also make you a light for the Gentiles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that my salvation may reach to the ends of the earth.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Redeemer and Holy One of Israel—
- type: usfm
  marker: q1
  children:
  - type: text
    text: to him who was despised and abhorred by the nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to the servant of rulers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Kings will see you and stand up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: princes will see and bow down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'because of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who is faithful,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel, who has chosen you.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Restoration of Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In the time of my favor I will answer you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in the day of salvation I will help you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will keep you and will make you
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be a covenant for the people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to restore the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to reassign its desolate inheritances,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: to say to the captives, ‘Come out,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to those in darkness, ‘Be free!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: “They will feed beside the roads
- type: usfm
  marker: q2
  children:
  - type: text
    text: and find pasture on every barren hill.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They will neither hunger nor thirst,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will the desert heat or the sun beat down on them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who has compassion on them will guide them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lead them beside springs of water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I will turn all my mountains into roads,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my highways will be raised up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: See, they will come from afar—
- type: usfm
  marker: q2
  children:
  - type: text
    text: some from the north, some from the west,
- type: usfm
  marker: q2
  children:
  - type: text
    text: some from the region of Aswan.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sinim
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Shout for joy, you heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: rejoice, you earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: burst into song, you mountains!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' comforts his people'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will have compassion on his afflicted ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But Zion said, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has forsaken me,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Lord has forgotten me.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Can a mother forget the baby at her breast
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have no compassion on the child she has borne?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though she may forget,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not forget you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: See, I have engraved you on the palms of my hands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your walls are ever before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Your children hasten back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who laid you waste depart from you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lift up your eyes and look around;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all your children gather and come to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'As surely as I live,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “you will wear them all as ornaments;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will put them on, like a bride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Though you were ruined and made desolate
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your land laid waste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: now you will be too small for your people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who devoured you will be far away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The children born during your bereavement
- type: usfm
  marker: q2
  children:
  - type: text
    text: will yet say in your hearing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘This place is too small for us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: give us more space to live in.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then you will say in your heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Who bore me these?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was bereaved and barren;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was exiled and rejected.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who brought these up?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was left all alone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but these—where have they come from?’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “See, I will beckon to the nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will lift up my banner to the peoples;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will bring your sons in their arms
- type: usfm
  marker: q2
  children:
  - type: text
    text: and carry your daughters on their hips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Kings will be your foster fathers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their queens your nursing mothers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will bow down before you with their faces to the ground;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will lick the dust at your feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who hope in me will not be disappointed.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Can plunder be taken from warriors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or captives be rescued from the fierce
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls, Vulgate and Syriac (see also Septuagint and verse 25); Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: righteous
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Yes, captives will be taken from warriors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and plunder retrieved from the fierce;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will contend with those who contend with you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your children I will save.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I will make your oppressors eat their own flesh;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be drunk on their own blood, as with wine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then all mankind will know
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', am your Savior,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your Redeemer, the Mighty One of Jacob.”
