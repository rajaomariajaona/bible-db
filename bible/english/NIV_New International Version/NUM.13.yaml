document_id: NUM.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Exploring Canaan
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: from the tribe of Zebulun, Gaddiel son of Sodi;
  '11':
  - type: text
    content: from the tribe of Manasseh (a tribe of Joseph), Gaddi son of Susi;
  '12':
  - type: text
    content: from the tribe of Dan, Ammiel son of Gemalli;
  '13':
  - type: text
    content: from the tribe of Asher, Sethur son of Michael;
  '14':
  - type: text
    content: from the tribe of Naphtali, Nahbi son of Vophsi;
  '15':
  - type: text
    content: from the tribe of Gad, Geuel son of Maki.
  '16':
  - type: text
    content: These are the names of the men Moses sent to explore the land. (Moses gave Hoshea son of Nun the name Joshua.)
  '17':
  - type: text
    content: 'When Moses sent them to explore Canaan, he said, “Go up through the Negev and on into the hill country. '
  '18':
  - type: text
    content: 'See what the land is like and whether the people who live there are strong or weak, few or many. '
  '19':
  - type: text
    content: 'What kind of land do they live in? Is it good or bad? What kind of towns do they live in? Are they unwalled or fortified? '
  '2':
  - type: text
    content: “Send some men to explore the land of Canaan, which I am giving to the Israelites. From each ancestral tribe send one of its leaders.”
  '20':
  - type: text
    content: How is the soil? Is it fertile or poor? Are there trees in it or not? Do your best to bring back some of the fruit of the land.” (It was the season for the first ripe grapes.)
  '21':
  - type: text
    content: 'So they went up and explored the land from the Desert of Zin as far as Rehob, toward Lebo Hamath. '
  '22':
  - type: text
    content: 'They went up through the Negev and came to Hebron, where Ahiman, Sheshai and Talmai, the descendants of Anak, lived. (Hebron had been built seven years before Zoan in Egypt.) '
  '23':
  - type: text
    content: When they reached the Valley of Eshkol,
  - type: note
    content: Eshkol means cluster; also in verse 24.
  - type: text
    content: ' they cut off a branch bearing a single cluster of grapes. Two of them carried it on a pole between them, along with some pomegranates and figs. '
  '24':
  - type: text
    content: 'That place was called the Valley of Eshkol because of the cluster of grapes the Israelites cut off there. '
  '25':
  - type: text
    content: At the end of forty days they returned from exploring the land.
  - type: heading
    content: Report on the Exploration
  '26':
  - type: text
    content: 'They came back to Moses and Aaron and the whole Israelite community at Kadesh in the Desert of Paran. There they reported to them and to the whole assembly and showed them the fruit of the land. '
  '27':
  - type: text
    content: 'They gave Moses this account: “We went into the land to which you sent us, and it does flow with milk and honey! Here is its fruit. '
  '28':
  - type: text
    content: 'But the people who live there are powerful, and the cities are fortified and very large. We even saw descendants of Anak there. '
  '29':
  - type: text
    content: The Amalekites live in the Negev; the Hittites, Jebusites and Amorites live in the hill country; and the Canaanites live near the sea and along the Jordan.”
  '3':
  - type: text
    content: 'So at the '
  - type: text
    content: Lord
  - type: text
    content: '’s command Moses sent them out from the Desert of Paran. All of them were leaders of the Israelites. '
  '30':
  - type: text
    content: Then Caleb silenced the people before Moses and said, “We should go up and take possession of the land, for we can certainly do it.”
  '31':
  - type: text
    content: 'But the men who had gone up with him said, “We can’t attack those people; they are stronger than we are.” '
  '32':
  - type: text
    content: 'And they spread among the Israelites a bad report about the land they had explored. They said, “The land we explored devours those living in it. All the people we saw there are of great size. '
  '33':
  - type: text
    content: We saw the Nephilim there (the descendants of Anak come from the Nephilim). We seemed like grasshoppers in our own eyes, and we looked the same to them.”
  '4':
  - type: text
    content: 'These are their names:'
  - type: text
    content: from the tribe of Reuben, Shammua son of Zakkur;
  '5':
  - type: text
    content: from the tribe of Simeon, Shaphat son of Hori;
  '6':
  - type: text
    content: from the tribe of Judah, Caleb son of Jephunneh;
  '7':
  - type: text
    content: from the tribe of Issachar, Igal son of Joseph;
  '8':
  - type: text
    content: from the tribe of Ephraim, Hoshea son of Nun;
  '9':
  - type: text
    content: from the tribe of Benjamin, Palti son of Raphu;
