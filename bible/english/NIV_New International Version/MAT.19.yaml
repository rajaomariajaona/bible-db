document_id: MAT.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Divorce
  - type: text
    content: 'When Jesus had finished saying these things, he left Galilee and went into the region of Judea to the other side of the Jordan. '
  '10':
  - type: text
    content: The disciples said to him, “If this is the situation between a husband and wife, it is better not to marry.”
  '11':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Not everyone can accept this word, but only those to whom it has been given.
  - type: text
    content: ' '
  '12':
  - type: text
    content: For there are eunuchs who were born that way, and there are eunuchs who have been made eunuchs by others—and there are those who choose to live like eunuchs for the sake of the kingdom of heaven. The one who can accept this should accept it.”
  - type: heading
    content: The Little Children and Jesus
  '13':
  - type: text
    content: Then people brought little children to Jesus for him to place his hands on them and pray for them. But the disciples rebuked them.
  '14':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Let the little children come to me, and do not hinder them, for the kingdom of heaven belongs to such as these.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: When he had placed his hands on them, he went on from there.
  - type: heading
    content: The Rich and the Kingdom of God
  '16':
  - type: text
    content: Just then a man came up to Jesus and asked, “Teacher, what good thing must I do to get eternal life?”
  '17':
  - type: text
    content: ' '
  - type: text
    content: “Why do you ask me about what is good?”
  - type: text
    content: ' Jesus replied. '
  - type: text
    content: “There is only One who is good. If you want to enter life, keep the commandments.”
  '18':
  - type: text
    content: “Which ones?” he inquired.
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “ ‘You shall not murder, you shall not commit adultery, you shall not steal, you shall not give false testimony,
  - type: text
    content: ' '
  '19':
  - type: text
    content: honor your father and mother,’
  - type: note
    content: Exodus 20:12-16; Deut. 5:16-20
  - type: text
    content: ' '
  - type: text
    content: and ‘love your neighbor as yourself.’
  - type: note
    content: Lev. 19:18
  - type: text
    content: ”
  '2':
  - type: text
    content: Large crowds followed him, and he healed them there.
  '20':
  - type: text
    content: “All these I have kept,” the young man said. “What do I still lack?”
  '21':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “If you want to be perfect, go, sell your possessions and give to the poor, and you will have treasure in heaven. Then come, follow me.”
  '22':
  - type: text
    content: When the young man heard this, he went away sad, because he had great wealth.
  '23':
  - type: text
    content: 'Then Jesus said to his disciples, '
  - type: text
    content: “Truly I tell you, it is hard for someone who is rich to enter the kingdom of heaven.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Again I tell you, it is easier for a camel to go through the eye of a needle than for someone who is rich to enter the kingdom of God.”
  '25':
  - type: text
    content: When the disciples heard this, they were greatly astonished and asked, “Who then can be saved?”
  '26':
  - type: text
    content: 'Jesus looked at them and said, '
  - type: text
    content: “With man this is impossible, but with God all things are possible.”
  '27':
  - type: text
    content: Peter answered him, “We have left everything to follow you! What then will there be for us?”
  '28':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Truly I tell you, at the renewal of all things, when the Son of Man sits on his glorious throne, you who have followed me will also sit on twelve thrones, judging the twelve tribes of Israel.
  - type: text
    content: ' '
  '29':
  - type: text
    content: And everyone who has left houses or brothers or sisters or father or mother or wife
  - type: note
    content: Some manuscripts do not have or wife.
  - type: text
    content: ' '
  - type: text
    content: or children or fields for my sake will receive a hundred times as much and will inherit eternal life.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Some Pharisees came to him to test him. They asked, “Is it lawful for a man to divorce his wife for any and every reason?”
  '30':
  - type: text
    content: But many who are first will be last, and many who are last will be first.
  '4':
  - type: text
    content: ' '
  - type: text
    content: “Haven’t you read,”
  - type: text
    content: ' he replied, '
  - type: text
    content: “that at the beginning the Creator ‘made them male and female,’
  - type: note
    content: Gen. 1:27
  - type: text
    content: ' '
  '5':
  - type: text
    content: and said, ‘For this reason a man will leave his father and mother and be united to his wife, and the two will become one flesh’
  - type: note
    content: Gen. 2:24
  - type: text
    content: '?'
  - type: text
    content: ' '
  '6':
  - type: text
    content: So they are no longer two, but one flesh. Therefore what God has joined together, let no one separate.”
  '7':
  - type: text
    content: “Why then,” they asked, “did Moses command that a man give his wife a certificate of divorce and send her away?”
  '8':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Moses permitted you to divorce your wives because your hearts were hard. But it was not this way from the beginning.
  - type: text
    content: ' '
  '9':
  - type: text
    content: I tell you that anyone who divorces his wife, except for sexual immorality, and marries another woman commits adultery.”
