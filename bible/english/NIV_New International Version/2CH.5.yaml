document_id: 2CH.5,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'When all the work Solomon had done for the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' was finished, he brought in the things his father David had dedicated—the silver and gold and all the furnishings—and he placed them in the treasuries of God’s temple.'
  - type: heading
    content: The Ark Brought to the Temple
  '10':
  - type: text
    content: 'There was nothing in the ark except the two tablets that Moses had placed in it at Horeb, where the '
  - type: text
    content: Lord
  - type: text
    content: ' made a covenant with the Israelites after they came out of Egypt.'
  '11':
  - type: text
    content: 'The priests then withdrew from the Holy Place. All the priests who were there had consecrated themselves, regardless of their divisions. '
  '12':
  - type: text
    content: 'All the Levites who were musicians—Asaph, Heman, Jeduthun and their sons and relatives—stood on the east side of the altar, dressed in fine linen and playing cymbals, harps and lyres. They were accompanied by 120 priests sounding trumpets. '
  '13':
  - type: text
    content: 'The trumpeters and musicians joined in unison to give praise and thanks to the '
  - type: text
    content: Lord
  - type: text
    content: '. Accompanied by trumpets, cymbals and other instruments, the singers raised their voices in praise to the '
  - type: text
    content: Lord
  - type: text
    content: ' and sang:'
  - type: text
    content: “He is good;
  - type: text
    content: his love endures forever.”
  - type: text
    content: 'Then the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' was filled with the cloud, '
  '14':
  - type: text
    content: 'and the priests could not perform their service because of the cloud, for the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the temple of God.'
  '2':
  - type: text
    content: 'Then Solomon summoned to Jerusalem the elders of Israel, all the heads of the tribes and the chiefs of the Israelite families, to bring up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s covenant from Zion, the City of David. '
  '3':
  - type: text
    content: And all the Israelites came together to the king at the time of the festival in the seventh month.
  '4':
  - type: text
    content: 'When all the elders of Israel had arrived, the Levites took up the ark, '
  '5':
  - type: text
    content: 'and they brought up the ark and the tent of meeting and all the sacred furnishings in it. The Levitical priests carried them up; '
  '6':
  - type: text
    content: and King Solomon and the entire assembly of Israel that had gathered about him were before the ark, sacrificing so many sheep and cattle that they could not be recorded or counted.
  '7':
  - type: text
    content: 'The priests then brought the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s covenant to its place in the inner sanctuary of the temple, the Most Holy Place, and put it beneath the wings of the cherubim. '
  '8':
  - type: text
    content: 'The cherubim spread their wings over the place of the ark and covered the ark and its carrying poles. '
  '9':
  - type: text
    content: 'These poles were so long that their ends, extending from the ark, could be seen from in front of the inner sanctuary, but not from outside the Holy Place; and they are still there today. '
