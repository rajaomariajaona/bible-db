document_id: MAT.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: John the Baptist Beheaded
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'At that time Herod the tetrarch heard the reports about Jesus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and he said to his attendants, “This is John the Baptist; he has risen from the dead! That is why miraculous powers are at work in him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now Herod had arrested John and bound him and put him in prison because of Herodias, his brother Philip’s wife, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'for John had been saying to him: “It is not lawful for you to have her.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Herod wanted to kill John, but he was afraid of the people, because they considered John a prophet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On Herod’s birthday the daughter of Herodias danced for the guests and pleased Herod so much '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'that he promised with an oath to give her whatever she asked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Prompted by her mother, she said, “Give me here on a platter the head of John the Baptist.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The king was distressed, but because of his oaths and his dinner guests, he ordered that her request be granted '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and had John beheaded in the prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'His head was brought in on a platter and given to the girl, who carried it to her mother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: John’s disciples came and took his body and buried it. Then they went and told Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Feeds the Five Thousand
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When Jesus heard what had happened, he withdrew by boat privately to a solitary place. Hearing of this, the crowds followed him on foot from the towns. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When Jesus landed and saw a large crowd, he had compassion on them and healed their sick.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: As evening approached, the disciples came to him and said, “This is a remote place, and it’s already getting late. Send the crowds away, so they can go to the villages and buy themselves some food.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “They do not need to go away. You give them something to eat.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “We have here only five loaves of bread and two fish,” they answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Bring them here to me,”
  - type: text
    text: ' he said. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And he directed the people to sit down on the grass. Taking the five loaves and the two fish and looking up to heaven, he gave thanks and broke the loaves. Then he gave them to the disciples, and the disciples gave them to the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They all ate and were satisfied, and the disciples picked up twelve basketfuls of broken pieces that were left over. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The number of those who ate was about five thousand men, besides women and children.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Walks on the Water
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Immediately Jesus made the disciples get into the boat and go on ahead of him to the other side, while he dismissed the crowd. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After he had dismissed them, he went up on a mountainside by himself to pray. Later that night, he was there alone, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: and the boat was already a considerable distance from land, buffeted by the waves because the wind was against it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Shortly before dawn Jesus went out to them, walking on the lake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When the disciples saw him walking on the lake, they were terrified. “It’s a ghost,” they said, and cried out in fear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But Jesus immediately said to them: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take courage! It is I. Don’t be afraid.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Lord, if it’s you,” Peter replied, “tell me to come to you on the water.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come,”
  - type: text
    text: ' he said.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then Peter got down out of the boat, walked on the water and came toward Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But when he saw the wind, he was afraid and, beginning to sink, cried out, “Lord, save me!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Immediately Jesus reached out his hand and caught him. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You of little faith,”
  - type: text
    text: ' he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “why did you doubt?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And when they climbed into the boat, the wind died down. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Then those who were in the boat worshiped him, saying, “Truly you are the Son of God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When they had crossed over, they landed at Gennesaret. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'And when the men of that place recognized Jesus, they sent word to all the surrounding country. People brought all their sick to him '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: and begged him to let the sick just touch the edge of his cloak, and all who touched it were healed.
