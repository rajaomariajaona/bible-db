document_id: 2CH.11,111
type_code: eng
verses:
  '1':
  - type: text
    content: When Rehoboam arrived in Jerusalem, he mustered Judah and Benjamin—a hundred and eighty thousand able young men—to go to war against Israel and to regain the kingdom for Rehoboam.
  '10':
  - type: text
    content: 'Zorah, Aijalon and Hebron. These were fortified cities in Judah and Benjamin. '
  '11':
  - type: text
    content: 'He strengthened their defenses and put commanders in them, with supplies of food, olive oil and wine. '
  '12':
  - type: text
    content: He put shields and spears in all the cities, and made them very strong. So Judah and Benjamin were his.
  '13':
  - type: text
    content: 'The priests and Levites from all their districts throughout Israel sided with him. '
  '14':
  - type: text
    content: 'The Levites even abandoned their pasturelands and property and came to Judah and Jerusalem, because Jeroboam and his sons had rejected them as priests of the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'when he appointed his own priests for the high places and for the goat and calf idols he had made. '
  '16':
  - type: text
    content: 'Those from every tribe of Israel who set their hearts on seeking the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, followed the Levites to Jerusalem to offer sacrifices to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors. '
  '17':
  - type: text
    content: They strengthened the kingdom of Judah and supported Rehoboam son of Solomon three years, following the ways of David and Solomon during this time.
  - type: heading
    content: Rehoboam’s Family
  '18':
  - type: text
    content: 'Rehoboam married Mahalath, who was the daughter of David’s son Jerimoth and of Abihail, the daughter of Jesse’s son Eliab. '
  '19':
  - type: text
    content: 'She bore him sons: Jeush, Shemariah and Zaham. '
  '2':
  - type: text
    content: 'But this word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Shemaiah the man of God: '
  '20':
  - type: text
    content: 'Then he married Maakah daughter of Absalom, who bore him Abijah, Attai, Ziza and Shelomith. '
  '21':
  - type: text
    content: Rehoboam loved Maakah daughter of Absalom more than any of his other wives and concubines. In all, he had eighteen wives and sixty concubines, twenty-eight sons and sixty daughters.
  '22':
  - type: text
    content: 'Rehoboam appointed Abijah son of Maakah as crown prince among his brothers, in order to make him king. '
  '23':
  - type: text
    content: He acted wisely, dispersing some of his sons throughout the districts of Judah and Benjamin, and to all the fortified cities. He gave them abundant provisions and took many wives for them.
  '3':
  - type: text
    content: '“Say to Rehoboam son of Solomon king of Judah and to all Israel in Judah and Benjamin, '
  '4':
  - type: text
    content: '‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do not go up to fight against your fellow Israelites. Go home, every one of you, for this is my doing.’ ” So they obeyed the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' and turned back from marching against Jeroboam.'
  - type: heading
    content: Rehoboam Fortifies Judah
  '5':
  - type: text
    content: 'Rehoboam lived in Jerusalem and built up towns for defense in Judah: '
  '6':
  - type: text
    content: 'Bethlehem, Etam, Tekoa, '
  '7':
  - type: text
    content: 'Beth Zur, Soko, Adullam, '
  '8':
  - type: text
    content: 'Gath, Mareshah, Ziph, '
  '9':
  - type: text
    content: 'Adoraim, Lachish, Azekah, '
