document_id: 2CH.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Rehoboam arrived in Jerusalem, he mustered Judah and Benjamin—a hundred and eighty thousand able young men—to go to war against Israel and to regain the kingdom for Rehoboam.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zorah, Aijalon and Hebron. These were fortified cities in Judah and Benjamin. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He strengthened their defenses and put commanders in them, with supplies of food, olive oil and wine. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He put shields and spears in all the cities, and made them very strong. So Judah and Benjamin were his.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priests and Levites from all their districts throughout Israel sided with him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Levites even abandoned their pasturelands and property and came to Judah and Jerusalem, because Jeroboam and his sons had rejected them as priests of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'when he appointed his own priests for the high places and for the goat and calf idols he had made. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those from every tribe of Israel who set their hearts on seeking the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, followed the Levites to Jerusalem to offer sacrifices to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They strengthened the kingdom of Judah and supported Rehoboam son of Solomon three years, following the ways of David and Solomon during this time.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rehoboam’s Family
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoboam married Mahalath, who was the daughter of David’s son Jerimoth and of Abihail, the daughter of Jesse’s son Eliab. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She bore him sons: Jeush, Shemariah and Zaham. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But this word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Shemaiah the man of God: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he married Maakah daughter of Absalom, who bore him Abijah, Attai, Ziza and Shelomith. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rehoboam loved Maakah daughter of Absalom more than any of his other wives and concubines. In all, he had eighteen wives and sixty concubines, twenty-eight sons and sixty daughters.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoboam appointed Abijah son of Maakah as crown prince among his brothers, in order to make him king. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He acted wisely, dispersing some of his sons throughout the districts of Judah and Benjamin, and to all the fortified cities. He gave them abundant provisions and took many wives for them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Say to Rehoboam son of Solomon king of Judah and to all Israel in Judah and Benjamin, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Do not go up to fight against your fellow Israelites. Go home, every one of you, for this is my doing.’ ” So they obeyed the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and turned back from marching against Jeroboam.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rehoboam Fortifies Judah
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehoboam lived in Jerusalem and built up towns for defense in Judah: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bethlehem, Etam, Tekoa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beth Zur, Soko, Adullam, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gath, Mareshah, Ziph, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adoraim, Lachish, Azekah, '
