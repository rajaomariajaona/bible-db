    content: Psalm 16
  - type: text
    content: 'A '
  - type: text
    content: miktam
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of David.'
  - type: text
    content: Keep me safe, my God,
  - type: text
    content: for in you I take refuge.
  '10':
  - type: text
    content: because you will not abandon me to the realm of the dead,
  - type: text
    content: nor will you let your faithful
  - type: note
    content: Or holy
  - type: text
    content: ' one see decay.'
  '11':
  - type: text
    content: You make known to me the path of life;
  - type: text
    content: you will fill me with joy in your presence,
  - type: text
    content: with eternal pleasures at your right hand.
  '2':
  - type: text
    content: 'I say to the '
  - type: text
    content: Lord
  - type: text
    content: ', “You are my Lord;'
  - type: text
    content: apart from you I have no good thing.”
  '3':
  - type: text
    content: I say of the holy people who are in the land,
  - type: text
    content: “They are the noble ones in whom is all my delight.”
  '4':
  - type: text
    content: Those who run after other gods will suffer more and more.
  - type: text
    content: I will not pour out libations of blood to such gods
  - type: text
    content: or take up their names on my lips.
  '5':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you alone are my portion and my cup;'
  - type: text
    content: you make my lot secure.
  '6':
  - type: text
    content: The boundary lines have fallen for me in pleasant places;
  - type: text
    content: surely I have a delightful inheritance.
  '7':
  - type: text
    content: 'I will praise the '
  - type: text
    content: Lord
  - type: text
    content: ', who counsels me;'
  - type: text
    content: even at night my heart instructs me.
  '8':
  - type: text
    content: 'I keep my eyes always on the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: With him at my right hand, I will not be shaken.
  '9':
  - type: text
    content: Therefore my heart is glad and my tongue rejoices;
  - type: text
    content: my body also will rest secure,
