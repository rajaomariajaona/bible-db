  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: miktam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a literary or musical term'
    marker-yv: yv-n
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Keep me safe, my God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for in you I take refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I say to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “You are my Lord;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: apart from you I have no good thing.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I say of the holy people who are in the land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “They are the noble ones in whom is all my delight.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Those who run after other gods will suffer more and more.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not pour out libations of blood to such gods
- type: usfm
  marker: q2
  children:
  - type: text
    text: or take up their names on my lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you alone are my portion and my cup;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you make my lot secure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The boundary lines have fallen for me in pleasant places;
- type: usfm
  marker: q2
  children:
  - type: text
    text: surely I have a delightful inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who counsels me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: even at night my heart instructs me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I keep my eyes always on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: With him at my right hand, I will not be shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Therefore my heart is glad and my tongue rejoices;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my body also will rest secure,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: because you will not abandon me to the realm of the dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will you let your faithful
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: holy
    marker-yv: yv-n
  - type: text
    text: ' one see decay.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You make known to me the path of life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will fill me with joy in your presence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with eternal pleasures at your right hand.
