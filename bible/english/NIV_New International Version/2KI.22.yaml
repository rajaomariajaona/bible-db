document_id: 2KI.22,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Book of the Law Found
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josiah was eight years old when he became king, and he reigned in Jerusalem thirty-one years. His mother’s name was Jedidah daughter of Adaiah; she was from Bozkath. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Shaphan the secretary informed the king, “Hilkiah the priest has given me a book.” And Shaphan read from it in the presence of the king.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the king heard the words of the Book of the Law, he tore his robes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He gave these orders to Hilkiah the priest, Ahikam son of Shaphan, Akbor son of Micaiah, Shaphan the secretary and Asaiah the king’s attendant: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go and inquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for me and for the people and for all Judah about what is written in this book that has been found. Great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger that burns against us because those who have gone before us have not obeyed the words of this book; they have not acted in accordance with all that is written there concerning us.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hilkiah the priest, Ahikam, Akbor, Shaphan and Asaiah went to speak to the prophet Huldah, who was the wife of Shallum son of Tikvah, the son of Harhas, keeper of the wardrobe. She lived in Jerusalem, in the New Quarter.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She said to them, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: Tell the man who sent you to me, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am going to bring disaster on this place and its people, according to everything written in the book the king of Judah has read. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because they have forsaken me and burned incense to other gods and aroused my anger by all the idols their hands have made,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by everything they have done
      marker-yv: yv-n
    - type: text
      text: ' my anger will burn against this place and will not be quenched.’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tell the king of Judah, who sent you to inquire of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says concerning the words you heard: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because your heart was responsive and you humbled yourself before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' when you heard what I have spoken against this place and its people—that they would become a curse'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, their names would be used in cursing (see Jer. 29:22); or, others would see that they are cursed.
      marker-yv: yv-n
    - type: text
      text: ' and be laid waste—and because you tore your robes and wept in my presence, I also have heard you, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did what was right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and followed completely the ways of his father David, not turning aside to the right or to the left.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore I will gather you to your ancestors, and you will be buried in peace. Your eyes will not see all the disaster I am going to bring on this place.’ ”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they took her answer back to the king.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the eighteenth year of his reign, King Josiah sent the secretary, Shaphan son of Azaliah, the son of Meshullam, to the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He said: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go up to Hilkiah the high priest and have him get ready the money that has been brought into the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which the doorkeepers have collected from the people. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have them entrust it to the men appointed to supervise the work on the temple. And have these men pay the workers who repair the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the carpenters, the builders and the masons. Also have them purchase timber and dressed stone to repair the temple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they need not account for the money entrusted to them, because they are honest in their dealings.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hilkiah the high priest said to Shaphan the secretary, “I have found the Book of the Law in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” He gave it to Shaphan, who read it. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Shaphan the secretary went to the king and reported to him: “Your officials have paid out the money that was in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and have entrusted it to the workers and supervisors at the temple.” '
