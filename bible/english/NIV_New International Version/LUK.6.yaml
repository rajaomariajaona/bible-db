document_id: LUK.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Lord of the Sabbath
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One Sabbath Jesus was going through the grainfields, and his disciples began to pick some heads of grain, rub them in their hands and eat the kernels. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He looked around at them all, and then said to the man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Stretch out your hand.”
    - type: text
      text: ' He did so, and his hand was completely restored. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the Pharisees and the teachers of the law were furious and began to discuss with one another what they might do to Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Twelve Apostles
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of those days Jesus went out to a mountainside to pray, and spent the night praying to God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When morning came, he called his disciples to him and chose twelve of them, whom he also designated apostles: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon (whom he named Peter), his brother Andrew, James, John, Philip, Bartholomew, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Matthew, Thomas, James son of Alphaeus, Simon who was called the Zealot, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Judas son of James, and Judas Iscariot, who became a traitor.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Blessings and Woes
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He went down with them and stood on a level place. A large crowd of his disciples was there and a great number of people from all over Judea, from Jerusalem, and from the coastal region around Tyre and Sidon, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who had come to hear him and to be healed of their diseases. Those troubled by impure spirits were cured, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the people all tried to touch him, because power was coming from him and healing them all.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some of the Pharisees asked, “Why are you doing what is unlawful on the Sabbath?”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Looking at his disciples, he said:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Blessed are you who are poor,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for yours is the kingdom of God.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Blessed are you who hunger now,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for you will be satisfied.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Blessed are you who weep now,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for you will laugh.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Blessed are you when people hate you,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: when they exclude you and insult you
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and reject your name as evil,
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because of the Son of Man.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Rejoice in that day and leap for joy, because great is your reward in heaven. For that is how their ancestors treated the prophets.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But woe to you who are rich,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for you have already received your comfort.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Woe to you who are well fed now,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for you will go hungry.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Woe to you who laugh now,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for you will mourn and weep.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Woe to you when everyone speaks well of you,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for that is how their ancestors treated the false prophets.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Love for Enemies
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“But to you who are listening I say: Love your enemies, do good to those who hate you,'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: bless those who curse you, pray for those who mistreat you.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If someone slaps you on one cheek, turn to them the other also. If someone takes your coat, do not withhold your shirt from them.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Have you never read what David did when he and his companions were hungry?
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Give to everyone who asks you, and if anyone takes what belongs to you, do not demand it back.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do to others as you would have them do to you.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you love those who love you, what credit is that to you? Even sinners love those who love them.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if you do good to those who are good to you, what credit is that to you? Even sinners do that.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if you lend to those from whom you expect repayment, what credit is that to you? Even sinners lend to sinners, expecting to be repaid in full.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But love your enemies, do good to them, and lend to them without expecting to get anything back. Then your reward will be great, and you will be children of the Most High, because he is kind to the ungrateful and wicked.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Be merciful, just as your Father is merciful.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judging Others
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not judge, and you will not be judged. Do not condemn, and you will not be condemned. Forgive, and you will be forgiven.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Give, and it will be given to you. A good measure, pressed down, shaken together and running over, will be poured into your lap. For with the measure you use, it will be measured to you.”
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also told them this parable: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Can the blind lead the blind? Will they not both fall into a pit?
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He entered the house of God, and taking the consecrated bread, he ate what is lawful only for priests to eat. And he also gave some to his companions.”
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The student is not above the teacher, but everyone who is fully trained will be like their teacher.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you look at the speck of sawdust in your brother’s eye and pay no attention to the plank in your own eye?
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How can you say to your brother, ‘Brother, let me take the speck out of your eye,’ when you yourself fail to see the plank in your own eye? You hypocrite, first take the plank out of your eye, and then you will see clearly to remove the speck from your brother’s eye.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Tree and Its Fruit
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No good tree bears bad fruit, nor does a bad tree bear good fruit.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Each tree is recognized by its own fruit. People do not pick figs from thornbushes, or grapes from briers.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A good man brings good things out of the good stored up in his heart, and an evil man brings evil things out of the evil stored up in his heart. For the mouth speaks what the heart is full of.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Wise and Foolish Builders
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you call me, ‘Lord, Lord,’ and do not do what I say?
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: As for everyone who comes to me and hears my words and puts them into practice, I will show you what they are like.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They are like a man building a house, who dug down deep and laid the foundation on rock. When a flood came, the torrent struck that house but could not shake it, because it was well built.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the one who hears my words and does not put them into practice is like a man who built a house on the ground without a foundation. The moment the torrent struck that house, it collapsed and its destruction was complete.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Son of Man is Lord of the Sabbath.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On another Sabbath he went into the synagogue and was teaching, and a man was there whose right hand was shriveled. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Pharisees and the teachers of the law were looking for a reason to accuse Jesus, so they watched him closely to see if he would heal on the Sabbath. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus knew what they were thinking and said to the man with the shriveled hand, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get up and stand in front of everyone.”
    - type: text
      text: ' So he got up and stood there.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I ask you, which is lawful on the Sabbath: to do good or to do evil, to save life or to destroy it?”'
