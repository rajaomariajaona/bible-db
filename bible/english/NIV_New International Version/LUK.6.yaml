document_id: LUK.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Lord of the Sabbath
  - type: text
    content: 'One Sabbath Jesus was going through the grainfields, and his disciples began to pick some heads of grain, rub them in their hands and eat the kernels. '
  '10':
  - type: text
    content: 'He looked around at them all, and then said to the man, '
  - type: text
    content: “Stretch out your hand.”
  - type: text
    content: ' He did so, and his hand was completely restored. '
  '11':
  - type: text
    content: But the Pharisees and the teachers of the law were furious and began to discuss with one another what they might do to Jesus.
  - type: heading
    content: The Twelve Apostles
  '12':
  - type: text
    content: 'One of those days Jesus went out to a mountainside to pray, and spent the night praying to God. '
  '13':
  - type: text
    content: 'When morning came, he called his disciples to him and chose twelve of them, whom he also designated apostles: '
  '14':
  - type: text
    content: 'Simon (whom he named Peter), his brother Andrew, James, John, Philip, Bartholomew, '
  '15':
  - type: text
    content: 'Matthew, Thomas, James son of Alphaeus, Simon who was called the Zealot, '
  '16':
  - type: text
    content: Judas son of James, and Judas Iscariot, who became a traitor.
  - type: heading
    content: Blessings and Woes
  '17':
  - type: text
    content: 'He went down with them and stood on a level place. A large crowd of his disciples was there and a great number of people from all over Judea, from Jerusalem, and from the coastal region around Tyre and Sidon, '
  '18':
  - type: text
    content: 'who had come to hear him and to be healed of their diseases. Those troubled by impure spirits were cured, '
  '19':
  - type: text
    content: and the people all tried to touch him, because power was coming from him and healing them all.
  '2':
  - type: text
    content: Some of the Pharisees asked, “Why are you doing what is unlawful on the Sabbath?”
  '20':
  - type: text
    content: 'Looking at his disciples, he said:'
  - type: text
    content: “Blessed are you who are poor,
  - type: text
    content: for yours is the kingdom of God.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Blessed are you who hunger now,
  - type: text
    content: for you will be satisfied.
  - type: text
    content: Blessed are you who weep now,
  - type: text
    content: for you will laugh.
  '22':
  - type: text
    content: ' '
  - type: text
    content: Blessed are you when people hate you,
  - type: text
    content: when they exclude you and insult you
  - type: text
    content: and reject your name as evil,
  - type: text
    content: because of the Son of Man.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “Rejoice in that day and leap for joy, because great is your reward in heaven. For that is how their ancestors treated the prophets.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “But woe to you who are rich,
  - type: text
    content: for you have already received your comfort.
  '25':
  - type: text
    content: ' '
  - type: text
    content: Woe to you who are well fed now,
  - type: text
    content: for you will go hungry.
  - type: text
    content: Woe to you who laugh now,
  - type: text
    content: for you will mourn and weep.
  '26':
  - type: text
    content: ' '
  - type: text
    content: Woe to you when everyone speaks well of you,
  - type: text
    content: for that is how their ancestors treated the false prophets.
  - type: heading
    content: Love for Enemies
  '27':
  - type: text
    content: ' '
  - type: text
    content: '“But to you who are listening I say: Love your enemies, do good to those who hate you,'
  - type: text
    content: ' '
  '28':
  - type: text
    content: bless those who curse you, pray for those who mistreat you.
  - type: text
    content: ' '
  '29':
  - type: text
    content: If someone slaps you on one cheek, turn to them the other also. If someone takes your coat, do not withhold your shirt from them.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “Have you never read what David did when he and his companions were hungry?
  - type: text
    content: ' '
  '30':
  - type: text
    content: Give to everyone who asks you, and if anyone takes what belongs to you, do not demand it back.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Do to others as you would have them do to you.
  '32':
  - type: text
    content: ' '
  - type: text
    content: “If you love those who love you, what credit is that to you? Even sinners love those who love them.
  - type: text
    content: ' '
  '33':
  - type: text
    content: And if you do good to those who are good to you, what credit is that to you? Even sinners do that.
  - type: text
    content: ' '
  '34':
  - type: text
    content: And if you lend to those from whom you expect repayment, what credit is that to you? Even sinners lend to sinners, expecting to be repaid in full.
  - type: text
    content: ' '
  '35':
  - type: text
    content: But love your enemies, do good to them, and lend to them without expecting to get anything back. Then your reward will be great, and you will be children of the Most High, because he is kind to the ungrateful and wicked.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Be merciful, just as your Father is merciful.
  - type: heading
    content: Judging Others
  '37':
  - type: text
    content: ' '
  - type: text
    content: “Do not judge, and you will not be judged. Do not condemn, and you will not be condemned. Forgive, and you will be forgiven.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Give, and it will be given to you. A good measure, pressed down, shaken together and running over, will be poured into your lap. For with the measure you use, it will be measured to you.”
  '39':
  - type: text
    content: 'He also told them this parable: '
  - type: text
    content: “Can the blind lead the blind? Will they not both fall into a pit?
  - type: text
    content: ' '
  '4':
  - type: text
    content: He entered the house of God, and taking the consecrated bread, he ate what is lawful only for priests to eat. And he also gave some to his companions.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: The student is not above the teacher, but everyone who is fully trained will be like their teacher.
  '41':
  - type: text
    content: ' '
  - type: text
    content: “Why do you look at the speck of sawdust in your brother’s eye and pay no attention to the plank in your own eye?
  - type: text
    content: ' '
  '42':
  - type: text
    content: How can you say to your brother, ‘Brother, let me take the speck out of your eye,’ when you yourself fail to see the plank in your own eye? You hypocrite, first take the plank out of your eye, and then you will see clearly to remove the speck from your brother’s eye.
  - type: heading
    content: A Tree and Its Fruit
  '43':
  - type: text
    content: ' '
  - type: text
    content: “No good tree bears bad fruit, nor does a bad tree bear good fruit.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Each tree is recognized by its own fruit. People do not pick figs from thornbushes, or grapes from briers.
  - type: text
    content: ' '
  '45':
  - type: text
    content: A good man brings good things out of the good stored up in his heart, and an evil man brings evil things out of the evil stored up in his heart. For the mouth speaks what the heart is full of.
  - type: heading
    content: The Wise and Foolish Builders
  '46':
  - type: text
    content: ' '
  - type: text
    content: “Why do you call me, ‘Lord, Lord,’ and do not do what I say?
  - type: text
    content: ' '
  '47':
  - type: text
    content: As for everyone who comes to me and hears my words and puts them into practice, I will show you what they are like.
  - type: text
    content: ' '
  '48':
  - type: text
    content: They are like a man building a house, who dug down deep and laid the foundation on rock. When a flood came, the torrent struck that house but could not shake it, because it was well built.
  - type: text
    content: ' '
  '49':
  - type: text
    content: But the one who hears my words and does not put them into practice is like a man who built a house on the ground without a foundation. The moment the torrent struck that house, it collapsed and its destruction was complete.”
  '5':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “The Son of Man is Lord of the Sabbath.”
  '6':
  - type: text
    content: 'On another Sabbath he went into the synagogue and was teaching, and a man was there whose right hand was shriveled. '
  '7':
  - type: text
    content: 'The Pharisees and the teachers of the law were looking for a reason to accuse Jesus, so they watched him closely to see if he would heal on the Sabbath. '
  '8':
  - type: text
    content: 'But Jesus knew what they were thinking and said to the man with the shriveled hand, '
  - type: text
    content: “Get up and stand in front of everyone.”
  - type: text
    content: ' So he got up and stood there.'
  '9':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“I ask you, which is lawful on the Sabbath: to do good or to do evil, to save life or to destroy it?”'
