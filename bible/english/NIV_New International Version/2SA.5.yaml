document_id: 2SA.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Becomes King Over Israel
  - type: text
    content: 'All the tribes of Israel came to David at Hebron and said, “We are your own flesh and blood. '
  '10':
  - type: text
    content: 'And he became more and more powerful, because the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty was with him.'
  '11':
  - type: text
    content: 'Now Hiram king of Tyre sent envoys to David, along with cedar logs and carpenters and stonemasons, and they built a palace for David. '
  '12':
  - type: text
    content: 'Then David knew that the '
  - type: text
    content: Lord
  - type: text
    content: ' had established him as king over Israel and had exalted his kingdom for the sake of his people Israel.'
  '13':
  - type: text
    content: 'After he left Hebron, David took more concubines and wives in Jerusalem, and more sons and daughters were born to him. '
  '14':
  - type: text
    content: 'These are the names of the children born to him there: Shammua, Shobab, Nathan, Solomon, '
  '15':
  - type: text
    content: 'Ibhar, Elishua, Nepheg, Japhia, '
  '16':
  - type: text
    content: Elishama, Eliada and Eliphelet.
  - type: heading
    content: David Defeats the Philistines
  '17':
  - type: text
    content: 'When the Philistines heard that David had been anointed king over Israel, they went up in full force to search for him, but David heard about it and went down to the stronghold. '
  '18':
  - type: text
    content: 'Now the Philistines had come and spread out in the Valley of Rephaim; '
  '19':
  - type: text
    content: 'so David inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', “Shall I go and attack the Philistines? Will you deliver them into my hands?”'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered him, “Go, for I will surely deliver the Philistines into your hands.”'
  '2':
  - type: text
    content: 'In the past, while Saul was king over us, you were the one who led Israel on their military campaigns. And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to you, ‘You will shepherd my people Israel, and you will become their ruler.’ ”'
  '20':
  - type: text
    content: 'So David went to Baal Perazim, and there he defeated them. He said, “As waters break out, the '
  - type: text
    content: Lord
  - type: text
    content: ' has broken out against my enemies before me.” So that place was called Baal Perazim.'
  - type: note
    content: Baal Perazim means the lord who breaks out.
  - type: text
    content: ' '
  '21':
  - type: text
    content: The Philistines abandoned their idols there, and David and his men carried them off.
  '22':
  - type: text
    content: 'Once more the Philistines came up and spread out in the Valley of Rephaim; '
  '23':
  - type: text
    content: 'so David inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he answered, “Do not go straight up, but circle around behind them and attack them in front of the poplar trees. '
  '24':
  - type: text
    content: 'As soon as you hear the sound of marching in the tops of the poplar trees, move quickly, because that will mean the '
  - type: text
    content: Lord
  - type: text
    content: ' has gone out in front of you to strike the Philistine army.” '
  '25':
  - type: text
    content: 'So David did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him, and he struck down the Philistines all the way from Gibeon'
  - type: note
    content: Septuagint (see also 1 Chron. 14:16); Hebrew Geba
  - type: text
    content: ' to Gezer.'
  '3':
  - type: text
    content: 'When all the elders of Israel had come to King David at Hebron, the king made a covenant with them at Hebron before the '
  - type: text
    content: Lord
  - type: text
    content: ', and they anointed David king over Israel.'
  '4':
  - type: text
    content: 'David was thirty years old when he became king, and he reigned forty years. '
  '5':
  - type: text
    content: In Hebron he reigned over Judah seven years and six months, and in Jerusalem he reigned over all Israel and Judah thirty-three years.
  - type: heading
    content: David Conquers Jerusalem
  '6':
  - type: text
    content: 'The king and his men marched to Jerusalem to attack the Jebusites, who lived there. The Jebusites said to David, “You will not get in here; even the blind and the lame can ward you off.” They thought, “David cannot get in here.” '
  '7':
  - type: text
    content: Nevertheless, David captured the fortress of Zion—which is the City of David.
  '8':
  - type: text
    content: On that day David had said, “Anyone who conquers the Jebusites will have to use the water shaft to reach those ‘lame and blind’ who are David’s enemies.
  - type: note
    content: Or are hated by David
  - type: text
    content: ” That is why they say, “The ‘blind and lame’ will not enter the palace.”
  '9':
  - type: text
    content: David then took up residence in the fortress and called it the City of David. He built up the area around it, from the terraces
  - type: note
    content: Or the Millo
  - type: text
    content: ' inward. '
