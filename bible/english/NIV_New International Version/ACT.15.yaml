document_id: ACT.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Council at Jerusalem
  - type: text
    content: 'Certain people came down from Judea to Antioch and were teaching the believers: “Unless you are circumcised, according to the custom taught by Moses, you cannot be saved.” '
  '10':
  - type: text
    content: 'Now then, why do you try to test God by putting on the necks of Gentiles a yoke that neither we nor our ancestors have been able to bear? '
  '11':
  - type: text
    content: No! We believe it is through the grace of our Lord Jesus that we are saved, just as they are.”
  '12':
  - type: text
    content: 'The whole assembly became silent as they listened to Barnabas and Paul telling about the signs and wonders God had done among the Gentiles through them. '
  '13':
  - type: text
    content: 'When they finished, James spoke up. “Brothers,” he said, “listen to me. '
  '14':
  - type: text
    content: Simon
  - type: note
    content: Greek Simeon, a variant of Simon; that is, Peter
  - type: text
    content: ' has described to us how God first intervened to choose a people for his name from the Gentiles. '
  '15':
  - type: text
    content: 'The words of the prophets are in agreement with this, as it is written:'
  '16':
  - type: text
    content: “ ‘After this I will return
  - type: text
    content: and rebuild David’s fallen tent.
  - type: text
    content: Its ruins I will rebuild,
  - type: text
    content: and I will restore it,
  '17':
  - type: text
    content: that the rest of mankind may seek the Lord,
  - type: text
    content: even all the Gentiles who bear my name,
  - type: text
    content: says the Lord, who does these things’
  - type: note
    content: Amos 9:11,12 (see Septuagint)
  - type: text
    content: —
  '18':
  - type: text
    content: things known from long ago.
  - type: note
    content: Some manuscripts things’— / 18 the Lord’s work is known to him from long ago
  '19':
  - type: text
    content: '“It is my judgment, therefore, that we should not make it difficult for the Gentiles who are turning to God. '
  '2':
  - type: text
    content: 'This brought Paul and Barnabas into sharp dispute and debate with them. So Paul and Barnabas were appointed, along with some other believers, to go up to Jerusalem to see the apostles and elders about this question. '
  '20':
  - type: text
    content: 'Instead we should write to them, telling them to abstain from food polluted by idols, from sexual immorality, from the meat of strangled animals and from blood. '
  '21':
  - type: text
    content: For the law of Moses has been preached in every city from the earliest times and is read in the synagogues on every Sabbath.”
  - type: heading
    content: The Council’s Letter to Gentile Believers
  '22':
  - type: text
    content: 'Then the apostles and elders, with the whole church, decided to choose some of their own men and send them to Antioch with Paul and Barnabas. They chose Judas (called Barsabbas) and Silas, men who were leaders among the believers. '
  '23':
  - type: text
    content: 'With them they sent the following letter:'
  - type: text
    content: The apostles and elders, your brothers,
  - type: text
    content: 'To the Gentile believers in Antioch, Syria and Cilicia:'
  - type: text
    content: Greetings.
  '24':
  - type: text
    content: 'We have heard that some went out from us without our authorization and disturbed you, troubling your minds by what they said. '
  '25':
  - type: text
    content: 'So we all agreed to choose some men and send them to you with our dear friends Barnabas and Paul— '
  '26':
  - type: text
    content: 'men who have risked their lives for the name of our Lord Jesus Christ. '
  '27':
  - type: text
    content: 'Therefore we are sending Judas and Silas to confirm by word of mouth what we are writing. '
  '28':
  - type: text
    content: 'It seemed good to the Holy Spirit and to us not to burden you with anything beyond the following requirements: '
  '29':
  - type: text
    content: You are to abstain from food sacrificed to idols, from blood, from the meat of strangled animals and from sexual immorality. You will do well to avoid these things.
  - type: text
    content: Farewell.
  '3':
  - type: text
    content: 'The church sent them on their way, and as they traveled through Phoenicia and Samaria, they told how the Gentiles had been converted. This news made all the believers very glad. '
  '30':
  - type: text
    content: 'So the men were sent off and went down to Antioch, where they gathered the church together and delivered the letter. '
  '31':
  - type: text
    content: 'The people read it and were glad for its encouraging message. '
  '32':
  - type: text
    content: 'Judas and Silas, who themselves were prophets, said much to encourage and strengthen the believers. '
  '33':
  - type: text
    content: 'After spending some time there, they were sent off by the believers with the blessing of peace to return to those who had sent them. '
  '34':
  - type: note
    content: Some manuscripts include here But Silas decided to remain there.
  - type: text
    content: ' '
  '35':
  - type: text
    content: But Paul and Barnabas remained in Antioch, where they and many others taught and preached the word of the Lord.
  - type: heading
    content: Disagreement Between Paul and Barnabas
  '36':
  - type: text
    content: 'Some time later Paul said to Barnabas, “Let us go back and visit the believers in all the towns where we preached the word of the Lord and see how they are doing.” '
  '37':
  - type: text
    content: 'Barnabas wanted to take John, also called Mark, with them, '
  '38':
  - type: text
    content: 'but Paul did not think it wise to take him, because he had deserted them in Pamphylia and had not continued with them in the work. '
  '39':
  - type: text
    content: 'They had such a sharp disagreement that they parted company. Barnabas took Mark and sailed for Cyprus, '
  '4':
  - type: text
    content: When they came to Jerusalem, they were welcomed by the church and the apostles and elders, to whom they reported everything God had done through them.
  '40':
  - type: text
    content: 'but Paul chose Silas and left, commended by the believers to the grace of the Lord. '
  '41':
  - type: text
    content: He went through Syria and Cilicia, strengthening the churches.
  '5':
  - type: text
    content: Then some of the believers who belonged to the party of the Pharisees stood up and said, “The Gentiles must be circumcised and required to keep the law of Moses.”
  '6':
  - type: text
    content: 'The apostles and elders met to consider this question. '
  '7':
  - type: text
    content: 'After much discussion, Peter got up and addressed them: “Brothers, you know that some time ago God made a choice among you that the Gentiles might hear from my lips the message of the gospel and believe. '
  '8':
  - type: text
    content: 'God, who knows the heart, showed that he accepted them by giving the Holy Spirit to them, just as he did to us. '
  '9':
  - type: text
    content: 'He did not discriminate between us and them, for he purified their hearts by faith. '
