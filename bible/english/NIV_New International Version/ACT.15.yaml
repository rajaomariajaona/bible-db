document_id: ACT.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Council at Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certain people came down from Judea to Antioch and were teaching the believers: “Unless you are circumcised, according to the custom taught by Moses, you cannot be saved.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now then, why do you try to test God by putting on the necks of Gentiles a yoke that neither we nor our ancestors have been able to bear? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No! We believe it is through the grace of our Lord Jesus that we are saved, just as they are.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The whole assembly became silent as they listened to Barnabas and Paul telling about the signs and wonders God had done among the Gentiles through them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they finished, James spoke up. “Brothers,” he said, “listen to me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Simon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Simeon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Simon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; that is, Peter
      marker-yv: yv-n
    - type: text
      text: ' has described to us how God first intervened to choose a people for his name from the Gentiles. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The words of the prophets are in agreement with this, as it is written:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘After this I will return
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rebuild David’s fallen tent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its ruins I will rebuild,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will restore it,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that the rest of mankind may seek the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even all the Gentiles who bear my name,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: says the Lord, who does these things’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amos 9:11,12 (see Septuagint)
      marker-yv: yv-n
    - type: text
      text: —
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: things known from long ago.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:17,18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'things’— / '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '18 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Lord’s work is known to him from long ago
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“It is my judgment, therefore, that we should not make it difficult for the Gentiles who are turning to God. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This brought Paul and Barnabas into sharp dispute and debate with them. So Paul and Barnabas were appointed, along with some other believers, to go up to Jerusalem to see the apostles and elders about this question. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead we should write to them, telling them to abstain from food polluted by idols, from sexual immorality, from the meat of strangled animals and from blood. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the law of Moses has been preached in every city from the earliest times and is read in the synagogues on every Sabbath.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Council’s Letter to Gentile Believers
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the apostles and elders, with the whole church, decided to choose some of their own men and send them to Antioch with Paul and Barnabas. They chose Judas (called Barsabbas) and Silas, men who were leaders among the believers. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'With them they sent the following letter:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: The apostles and elders, your brothers,
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'To the Gentile believers in Antioch, Syria and Cilicia:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: Greetings.
  '24':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'We have heard that some went out from us without our authorization and disturbed you, troubling your minds by what they said. '
  '25':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'So we all agreed to choose some men and send them to you with our dear friends Barnabas and Paul— '
  '26':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'men who have risked their lives for the name of our Lord Jesus Christ. '
  '27':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Therefore we are sending Judas and Silas to confirm by word of mouth what we are writing. '
  '28':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'It seemed good to the Holy Spirit and to us not to burden you with anything beyond the following requirements: '
  '29':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: You are to abstain from food sacrificed to idols, from blood, from the meat of strangled animals and from sexual immorality. You will do well to avoid these things.
  - type: usfm
    marker: pmc
    children:
    - type: text
      text: Farewell.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The church sent them on their way, and as they traveled through Phoenicia and Samaria, they told how the Gentiles had been converted. This news made all the believers very glad. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the men were sent off and went down to Antioch, where they gathered the church together and delivered the letter. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people read it and were glad for its encouraging message. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judas and Silas, who themselves were prophets, said much to encourage and strengthen the believers. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After spending some time there, they were sent off by the believers with the blessing of peace to return to those who had sent them. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts include here '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: But Silas decided to remain there.
      marker-yv: yv-n
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Paul and Barnabas remained in Antioch, where they and many others taught and preached the word of the Lord.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Disagreement Between Paul and Barnabas
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some time later Paul said to Barnabas, “Let us go back and visit the believers in all the towns where we preached the word of the Lord and see how they are doing.” '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Barnabas wanted to take John, also called Mark, with them, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but Paul did not think it wise to take him, because he had deserted them in Pamphylia and had not continued with them in the work. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They had such a sharp disagreement that they parted company. Barnabas took Mark and sailed for Cyprus, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they came to Jerusalem, they were welcomed by the church and the apostles and elders, to whom they reported everything God had done through them.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but Paul chose Silas and left, commended by the believers to the grace of the Lord. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He went through Syria and Cilicia, strengthening the churches.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then some of the believers who belonged to the party of the Pharisees stood up and said, “The Gentiles must be circumcised and required to keep the law of Moses.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The apostles and elders met to consider this question. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After much discussion, Peter got up and addressed them: “Brothers, you know that some time ago God made a choice among you that the Gentiles might hear from my lips the message of the gospel and believe. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God, who knows the heart, showed that he accepted them by giving the Holy Spirit to them, just as he did to us. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did not discriminate between us and them, for he purified their hearts by faith. '
