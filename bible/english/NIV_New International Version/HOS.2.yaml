verses:
  '1':
  - type: note
    content: In Hebrew texts 2:1-23 is numbered 2:3-25.
  - type: text
    content: “Say of your brothers, ‘My people,’ and of your sisters, ‘My loved one.’
  - type: heading
    content: Israel Punished and Restored
  '10':
  - type: text
    content: So now I will expose her lewdness
  - type: text
    content: before the eyes of her lovers;
  - type: text
    content: no one will take her out of my hands.
  '11':
  - type: text
    content: 'I will stop all her celebrations:'
  - type: text
    content: her yearly festivals, her New Moons,
  - type: text
    content: her Sabbath days—all her appointed festivals.
  '12':
  - type: text
    content: I will ruin her vines and her fig trees,
  - type: text
    content: which she said were her pay from her lovers;
  - type: text
    content: I will make them a thicket,
  - type: text
    content: and wild animals will devour them.
  '13':
  - type: text
    content: I will punish her for the days
  - type: text
    content: she burned incense to the Baals;
  - type: text
    content: she decked herself with rings and jewelry,
  - type: text
    content: and went after her lovers,
  - type: text
    content: but me she forgot,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: “Therefore I am now going to allure her;
  - type: text
    content: I will lead her into the wilderness
  - type: text
    content: and speak tenderly to her.
  '15':
  - type: text
    content: There I will give her back her vineyards,
  - type: text
    content: and will make the Valley of Achor
  - type: note
    content: Achor means trouble.
  - type: text
    content: ' a door of hope.'
  - type: text
    content: There she will respond
  - type: note
