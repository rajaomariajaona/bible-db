  - type: text
    content: ' as in the days of her youth,'
  - type: text
    content: as in the day she came up out of Egypt.
  '16':
  - type: text
    content: '“In that day,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “you will call me ‘my husband’;
  - type: text
    content: you will no longer call me ‘my master.
  - type: note
    content: Hebrew baal
  - type: text
    content: ’
  '17':
  - type: text
    content: I will remove the names of the Baals from her lips;
  - type: text
    content: no longer will their names be invoked.
  '18':
  - type: text
    content: In that day I will make a covenant for them
  - type: text
    content: with the beasts of the field, the birds in the sky
  - type: text
    content: and the creatures that move along the ground.
  - type: text
    content: Bow and sword and battle
  - type: text
    content: I will abolish from the land,
  - type: text
    content: so that all may lie down in safety.
  '19':
  - type: text
    content: I will betroth you to me forever;
  - type: text
    content: I will betroth you in
  - type: note
    content: Or with; also in verse 20
  - type: text
    content: ' righteousness and justice,'
  - type: text
    content: in
  - type: note
    content: Or with
  - type: text
    content: ' love and compassion.'
  '2':
  - type: text
    content: “Rebuke your mother, rebuke her,
  - type: text
    content: for she is not my wife,
  - type: text
    content: and I am not her husband.
  - type: text
    content: Let her remove the adulterous look from her face
  - type: text
    content: and the unfaithfulness from between her breasts.
  '20':
  - type: text
    content: I will betroth you in faithfulness,
  - type: text
    content: 'and you will acknowledge the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: “In that day I will respond,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: “I will respond to the skies,
  - type: text
    content: and they will respond to the earth;
  '22':
  - type: text
    content: and the earth will respond to the grain,
  - type: text
    content: the new wine and the olive oil,
  - type: text
    content: and they will respond to Jezreel.
  - type: note
    content: Jezreel means God plants.
  '23':
  - type: text
    content: I will plant her for myself in the land;
  - type: text
    content: I will show my love to the one I called ‘Not my loved one.
  - type: note
    content: Hebrew Lo-Ruhamah (see 1:6)
  - type: text
    content: ’
  - type: text
    content: I will say to those called ‘Not my people,
  - type: note
    content: Hebrew Lo-Ammi (see 1:9)
  - type: text
    content: ’ ‘You are my people’;
  - type: text
    content: and they will say, ‘You are my God.’ ”
  '3':
  - type: text
    content: Otherwise I will strip her naked
  - type: text
    content: and make her as bare as on the day she was born;
  - type: text
    content: I will make her like a desert,
  - type: text
    content: turn her into a parched land,
  - type: text
    content: and slay her with thirst.
  '4':
  - type: text
    content: I will not show my love to her children,
  - type: text
    content: because they are the children of adultery.
  '5':
  - type: text
    content: Their mother has been unfaithful
  - type: text
    content: and has conceived them in disgrace.
  - type: text
    content: She said, ‘I will go after my lovers,
  - type: text
    content: who give me my food and my water,
  - type: text
    content: my wool and my linen, my olive oil and my drink.’
  '6':
  - type: text
    content: Therefore I will block her path with thornbushes;
  - type: text
    content: I will wall her in so that she cannot find her way.
  '7':
  - type: text
    content: She will chase after her lovers but not catch them;
  - type: text
    content: she will look for them but not find them.
  - type: text
    content: Then she will say,
  - type: text
    content: ‘I will go back to my husband as at first,
  - type: text
    content: for then I was better off than now.’
  '8':
  - type: text
    content: She has not acknowledged that I was the one
  - type: text
    content: who gave her the grain, the new wine and oil,
  - type: text
    content: who lavished on her the silver and gold—
  - type: text
    content: which they used for Baal.
  '9':
  - type: text
    content: “Therefore I will take away my grain when it ripens,
  - type: text
    content: and my new wine when it is ready.
  - type: text
    content: I will take back my wool and my linen,
  - type: text
    content: intended to cover her naked body.
