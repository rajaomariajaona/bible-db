document_id: ISA.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Babylon
  - type: text
    content: 'A prophecy against the Desert by the Sea:'
  - type: text
    content: Like whirlwinds sweeping through the southland,
  - type: text
    content: an invader comes from the desert,
  - type: text
    content: from a land of terror.
  '10':
  - type: text
    content: My people who are crushed on the threshing floor,
  - type: text
    content: I tell you what I have heard
  - type: text
    content: 'from the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: from the God of Israel.
  - type: heading
    content: A Prophecy Against Edom
  '11':
  - type: text
    content: A prophecy against Dumah
  - type: note
    content: Dumah, a wordplay on Edom, means silence or stillness.
  - type: text
    content: ':'
  - type: text
    content: Someone calls to me from Seir,
  - type: text
    content: “Watchman, what is left of the night?
  - type: text
    content: Watchman, what is left of the night?”
  '12':
  - type: text
    content: The watchman replies,
  - type: text
    content: “Morning is coming, but also the night.
  - type: text
    content: If you would ask, then ask;
  - type: text
    content: and come back yet again.”
  - type: heading
    content: A Prophecy Against Arabia
  '13':
  - type: text
    content: 'A prophecy against Arabia:'
  - type: text
    content: You caravans of Dedanites,
  - type: text
    content: who camp in the thickets of Arabia,
  '14':
  - type: text
    content: bring water for the thirsty;
  - type: text
    content: you who live in Tema,
  - type: text
    content: bring food for the fugitives.
  '15':
  - type: text
    content: They flee from the sword,
  - type: text
    content: from the drawn sword,
  - type: text
    content: from the bent bow
  - type: text
    content: and from the heat of battle.
  '16':
  - type: text
    content: 'This is what the Lord says to me: “Within one year, as a servant bound by contract would count it, all the splendor of Kedar will come to an end. '
  '17':
  - type: text
    content: 'The survivors of the archers, the warriors of Kedar, will be few.” The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has spoken.'
  '2':
  - type: text
    content: 'A dire vision has been shown to me:'
  - type: text
    content: The traitor betrays, the looter takes loot.
  - type: text
    content: Elam, attack! Media, lay siege!
  - type: text
    content: I will bring to an end all the groaning she caused.
  '3':
  - type: text
    content: At this my body is racked with pain,
  - type: text
    content: pangs seize me, like those of a woman in labor;
  - type: text
    content: I am staggered by what I hear,
  - type: text
    content: I am bewildered by what I see.
  '4':
  - type: text
    content: My heart falters,
  - type: text
    content: fear makes me tremble;
  - type: text
    content: the twilight I longed for
  - type: text
    content: has become a horror to me.
  '5':
  - type: text
    content: They set the tables,
  - type: text
    content: they spread the rugs,
  - type: text
    content: they eat, they drink!
  - type: text
    content: Get up, you officers,
  - type: text
    content: oil the shields!
  '6':
  - type: text
    content: 'This is what the Lord says to me:'
  - type: text
    content: “Go, post a lookout
  - type: text
    content: and have him report what he sees.
  '7':
  - type: text
    content: When he sees chariots
  - type: text
    content: with teams of horses,
  - type: text
    content: riders on donkeys
  - type: text
    content: or riders on camels,
  - type: text
    content: let him be alert,
  - type: text
    content: fully alert.”
  '8':
  - type: text
    content: And the lookout
  - type: note
    content: Dead Sea Scrolls and Syriac; Masoretic Text A lion
  - type: text
    content: ' shouted,'
  - type: text
    content: “Day after day, my lord, I stand on the watchtower;
  - type: text
    content: every night I stay at my post.
  '9':
  - type: text
    content: Look, here comes a man in a chariot
  - type: text
    content: with a team of horses.
  - type: text
    content: 'And he gives back the answer:'
  - type: text
    content: ‘Babylon has fallen, has fallen!
  - type: text
    content: All the images of its gods
  - type: text
    content: lie shattered on the ground!’ ”
