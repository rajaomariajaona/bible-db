document_id: ISA.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Babylon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A prophecy against the Desert by the Sea:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like whirlwinds sweeping through the southland,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an invader comes from the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from a land of terror.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My people who are crushed on the threshing floor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I tell you what I have heard
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the God of Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Edom
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: A prophecy against Dumah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dumah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a wordplay on '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Edom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', means silence or stillness.'
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Someone calls to me from Seir,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Watchman, what is left of the night?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Watchman, what is left of the night?”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The watchman replies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Morning is coming, but also the night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you would ask, then ask;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and come back yet again.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Arabia
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'A prophecy against Arabia:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You caravans of Dedanites,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who camp in the thickets of Arabia,
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: bring water for the thirsty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you who live in Tema,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring food for the fugitives.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: They flee from the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the drawn sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the bent bow
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the heat of battle.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'This is what the Lord says to me: “Within one year, as a servant bound by contract would count it, all the splendor of Kedar will come to an end. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The survivors of the archers, the warriors of Kedar, will be few.” The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, has spoken.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'A dire vision has been shown to me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The traitor betrays, the looter takes loot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elam, attack! Media, lay siege!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will bring to an end all the groaning she caused.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: At this my body is racked with pain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pangs seize me, like those of a woman in labor;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am staggered by what I hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am bewildered by what I see.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: My heart falters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fear makes me tremble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the twilight I longed for
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has become a horror to me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They set the tables,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they spread the rugs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they eat, they drink!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get up, you officers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oil the shields!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This is what the Lord says to me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go, post a lookout
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have him report what he sees.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When he sees chariots
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with teams of horses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: riders on donkeys
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or riders on camels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let him be alert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fully alert.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And the lookout
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls and Syriac; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A lion
      marker-yv: yv-n
    - type: text
      text: ' shouted,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Day after day, my lord, I stand on the watchtower;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every night I stay at my post.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Look, here comes a man in a chariot
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with a team of horses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And he gives back the answer:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Babylon has fallen, has fallen!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the images of its gods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lie shattered on the ground!’ ”
