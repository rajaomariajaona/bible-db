document_id: 2CO.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Collection for the Lord’s People
  - type: text
    content: 'And now, brothers and sisters, we want you to know about the grace that God has given the Macedonian churches. '
  '10':
  - type: text
    content: 'And here is my judgment about what is best for you in this matter. Last year you were the first not only to give but also to have the desire to do so. '
  '11':
  - type: text
    content: 'Now finish the work, so that your eager willingness to do it may be matched by your completion of it, according to your means. '
  '12':
  - type: text
    content: For if the willingness is there, the gift is acceptable according to what one has, not according to what one does not have.
  '13':
  - type: text
    content: 'Our desire is not that others might be relieved while you are hard pressed, but that there might be equality. '
  '14':
  - type: text
    content: 'At the present time your plenty will supply what they need, so that in turn their plenty will supply what you need. The goal is equality, '
  '15':
  - type: text
    content: 'as it is written: “The one who gathered much did not have too much, and the one who gathered little did not have too little.”'
  - type: note
    content: Exodus 16:18
  - type: heading
    content: Titus Sent to Receive the Collection
  '16':
  - type: text
    content: 'Thanks be to God, who put into the heart of Titus the same concern I have for you. '
  '17':
  - type: text
    content: 'For Titus not only welcomed our appeal, but he is coming to you with much enthusiasm and on his own initiative. '
  '18':
  - type: text
    content: 'And we are sending along with him the brother who is praised by all the churches for his service to the gospel. '
  '19':
  - type: text
    content: 'What is more, he was chosen by the churches to accompany us as we carry the offering, which we administer in order to honor the Lord himself and to show our eagerness to help. '
  '2':
  - type: text
    content: 'In the midst of a very severe trial, their overflowing joy and their extreme poverty welled up in rich generosity. '
  '20':
  - type: text
    content: 'We want to avoid any criticism of the way we administer this liberal gift. '
  '21':
  - type: text
    content: For we are taking pains to do what is right, not only in the eyes of the Lord but also in the eyes of man.
  '22':
  - type: text
    content: 'In addition, we are sending with them our brother who has often proved to us in many ways that he is zealous, and now even more so because of his great confidence in you. '
  '23':
  - type: text
    content: 'As for Titus, he is my partner and co-worker among you; as for our brothers, they are representatives of the churches and an honor to Christ. '
  '24':
  - type: text
    content: Therefore show these men the proof of your love and the reason for our pride in you, so that the churches can see it.
  '3':
  - type: text
    content: 'For I testify that they gave as much as they were able, and even beyond their ability. Entirely on their own, '
  '4':
  - type: text
    content: 'they urgently pleaded with us for the privilege of sharing in this service to the Lord’s people. '
  '5':
  - type: text
    content: 'And they exceeded our expectations: They gave themselves first of all to the Lord, and then by the will of God also to us. '
  '6':
  - type: text
    content: 'So we urged Titus, just as he had earlier made a beginning, to bring also to completion this act of grace on your part. '
  '7':
  - type: text
    content: But since you excel in everything—in faith, in speech, in knowledge, in complete earnestness and in the love we have kindled in you
  - type: note
    content: Some manuscripts and in your love for us
  - type: text
    content: —see that you also excel in this grace of giving.
  '8':
  - type: text
    content: 'I am not commanding you, but I want to test the sincerity of your love by comparing it with the earnestness of others. '
  '9':
  - type: text
    content: For you know the grace of our Lord Jesus Christ, that though he was rich, yet for your sake he became poor, so that you through his poverty might become rich.
