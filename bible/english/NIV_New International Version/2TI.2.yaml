document_id: 2TI.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Appeal Renewed
  - type: text
    content: 'You then, my son, be strong in the grace that is in Christ Jesus. '
  '10':
  - type: text
    content: Therefore I endure everything for the sake of the elect, that they too may obtain the salvation that is in Christ Jesus, with eternal glory.
  '11':
  - type: text
    content: 'Here is a trustworthy saying:'
  - type: text
    content: If we died with him,
  - type: text
    content: we will also live with him;
  '12':
  - type: text
    content: if we endure,
  - type: text
    content: we will also reign with him.
  - type: text
    content: If we disown him,
  - type: text
    content: he will also disown us;
  '13':
  - type: text
    content: if we are faithless,
  - type: text
    content: he remains faithful,
  - type: text
    content: for he cannot disown himself.
  - type: heading
    content: Dealing With False Teachers
  '14':
  - type: text
    content: 'Keep reminding God’s people of these things. Warn them before God against quarreling about words; it is of no value, and only ruins those who listen. '
  '15':
  - type: text
    content: 'Do your best to present yourself to God as one approved, a worker who does not need to be ashamed and who correctly handles the word of truth. '
  '16':
  - type: text
    content: 'Avoid godless chatter, because those who indulge in it will become more and more ungodly. '
  '17':
  - type: text
    content: 'Their teaching will spread like gangrene. Among them are Hymenaeus and Philetus, '
  '18':
  - type: text
    content: 'who have departed from the truth. They say that the resurrection has already taken place, and they destroy the faith of some. '
  '19':
  - type: text
    content: 'Nevertheless, God’s solid foundation stands firm, sealed with this inscription: “The Lord knows those who are his,” and, “Everyone who confesses the name of the Lord must turn away from wickedness.”'
  '2':
  - type: text
    content: 'And the things you have heard me say in the presence of many witnesses entrust to reliable people who will also be qualified to teach others. '
  '20':
  - type: text
    content: 'In a large house there are articles not only of gold and silver, but also of wood and clay; some are for special purposes and some for common use. '
  '21':
  - type: text
    content: Those who cleanse themselves from the latter will be instruments for special purposes, made holy, useful to the Master and prepared to do any good work.
  '22':
  - type: text
    content: 'Flee the evil desires of youth and pursue righteousness, faith, love and peace, along with those who call on the Lord out of a pure heart. '
  '23':
  - type: text
    content: 'Don’t have anything to do with foolish and stupid arguments, because you know they produce quarrels. '
  '24':
  - type: text
    content: 'And the Lord’s servant must not be quarrelsome but must be kind to everyone, able to teach, not resentful. '
  '25':
  - type: text
    content: 'Opponents must be gently instructed, in the hope that God will grant them repentance leading them to a knowledge of the truth, '
  '26':
  - type: text
    content: and that they will come to their senses and escape from the trap of the devil, who has taken them captive to do his will.
  '3':
  - type: text
    content: 'Join with me in suffering, like a good soldier of Christ Jesus. '
  '4':
  - type: text
    content: 'No one serving as a soldier gets entangled in civilian affairs, but rather tries to please his commanding officer. '
  '5':
  - type: text
    content: 'Similarly, anyone who competes as an athlete does not receive the victor’s crown except by competing according to the rules. '
  '6':
  - type: text
    content: 'The hardworking farmer should be the first to receive a share of the crops. '
  '7':
  - type: text
    content: Reflect on what I am saying, for the Lord will give you insight into all this.
  '8':
  - type: text
    content: 'Remember Jesus Christ, raised from the dead, descended from David. This is my gospel, '
  '9':
  - type: text
    content: 'for which I am suffering even to the point of being chained like a criminal. But God’s word is not chained. '
