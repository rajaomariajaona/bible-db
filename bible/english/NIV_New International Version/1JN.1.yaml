document_id: 1JN.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Incarnation of the Word of Life
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That which was from the beginning, which we have heard, which we have seen with our eyes, which we have looked at and our hands have touched—this we proclaim concerning the Word of life. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If we claim we have not sinned, we make him out to be a liar and his word is not in us.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The life appeared; we have seen it and testify to it, and we proclaim to you the eternal life, which was with the Father and has appeared to us. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We proclaim to you what we have seen and heard, so that you also may have fellowship with us. And our fellowship is with the Father and with his Son, Jesus Christ. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We write this to make our
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your
      marker-yv: yv-n
    - type: text
      text: ' joy complete.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Light and Darkness, Sin and Forgiveness
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the message we have heard from him and declare to you: God is light; in him there is no darkness at all. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we claim to have fellowship with him and yet walk in the darkness, we lie and do not live out the truth. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if we walk in the light, as he is in the light, we have fellowship with one another, and the blood of Jesus, his Son, purifies us from all
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: every
      marker-yv: yv-n
    - type: text
      text: ' sin.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we claim to be without sin, we deceive ourselves and the truth is not in us. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we confess our sins, he is faithful and just and will forgive us our sins and purify us from all unrighteousness. '
