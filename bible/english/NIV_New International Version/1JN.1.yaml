document_id: 1JN.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Incarnation of the Word of Life
  - type: text
    content: 'That which was from the beginning, which we have heard, which we have seen with our eyes, which we have looked at and our hands have touched—this we proclaim concerning the Word of life. '
  '10':
  - type: text
    content: If we claim we have not sinned, we make him out to be a liar and his word is not in us.
  '2':
  - type: text
    content: 'The life appeared; we have seen it and testify to it, and we proclaim to you the eternal life, which was with the Father and has appeared to us. '
  '3':
  - type: text
    content: 'We proclaim to you what we have seen and heard, so that you also may have fellowship with us. And our fellowship is with the Father and with his Son, Jesus Christ. '
  '4':
  - type: text
    content: We write this to make our
  - type: note
    content: Some manuscripts your
  - type: text
    content: ' joy complete.'
  - type: heading
    content: Light and Darkness, Sin and Forgiveness
  '5':
  - type: text
    content: 'This is the message we have heard from him and declare to you: God is light; in him there is no darkness at all. '
  '6':
  - type: text
    content: 'If we claim to have fellowship with him and yet walk in the darkness, we lie and do not live out the truth. '
  '7':
  - type: text
    content: But if we walk in the light, as he is in the light, we have fellowship with one another, and the blood of Jesus, his Son, purifies us from all
  - type: note
    content: Or every
  - type: text
    content: ' sin.'
  '8':
  - type: text
    content: 'If we claim to be without sin, we deceive ourselves and the truth is not in us. '
  '9':
  - type: text
    content: 'If we confess our sins, he is faithful and just and will forgive us our sins and purify us from all unrighteousness. '
