document_id: NUM.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Miriam and Aaron Oppose Moses
  - type: text
    content: 'Miriam and Aaron began to talk against Moses because of his Cushite wife, for he had married a Cushite. '
  '10':
  - type: text
    content: When the cloud lifted from above the tent, Miriam’s skin was leprous
  - type: note
    content: The Hebrew for leprous was used for various diseases affecting the skin.
  - type: text
    content: '—it became as white as snow. Aaron turned toward her and saw that she had a defiling skin disease, '
  '11':
  - type: text
    content: 'and he said to Moses, “Please, my lord, I ask you not to hold against us the sin we have so foolishly committed. '
  '12':
  - type: text
    content: Do not let her be like a stillborn infant coming from its mother’s womb with its flesh half eaten away.”
  '13':
  - type: text
    content: 'So Moses cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Please, God, heal her!”'
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied to Moses, “If her father had spit in her face, would she not have been in disgrace for seven days? Confine her outside the camp for seven days; after that she can be brought back.” '
  '15':
  - type: text
    content: So Miriam was confined outside the camp for seven days, and the people did not move on till she was brought back.
  '16':
  - type: text
    content: After that, the people left Hazeroth and encamped in the Desert of Paran.
  '2':
  - type: text
    content: '“Has the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken only through Moses?” they asked. “Hasn’t he also spoken through us?” And the '
  - type: text
    content: Lord
  - type: text
    content: ' heard this.'
  '3':
  - type: text
    content: (Now Moses was a very humble man, more humble than anyone else on the face of the earth.)
  '4':
  - type: text
    content: 'At once the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, Aaron and Miriam, “Come out to the tent of meeting, all three of you.” So the three of them went out. '
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' came down in a pillar of cloud; he stood at the entrance to the tent and summoned Aaron and Miriam. When the two of them stepped forward, '
  '6':
  - type: text
    content: 'he said, “Listen to my words:'
  - type: text
    content: “When there is a prophet among you,
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: ', reveal myself to them in visions,'
  - type: text
    content: I speak to them in dreams.
  '7':
  - type: text
    content: But this is not true of my servant Moses;
  - type: text
    content: he is faithful in all my house.
  '8':
  - type: text
    content: With him I speak face to face,
  - type: text
    content: clearly and not in riddles;
  - type: text
    content: 'he sees the form of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Why then were you not afraid
  - type: text
    content: to speak against my servant Moses?”
  '9':
  - type: text
    content: 'The anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' burned against them, and he left them.'
