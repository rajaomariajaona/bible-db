document_id: NUM.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miriam and Aaron Oppose Moses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Miriam and Aaron began to talk against Moses because of his Cushite wife, for he had married a Cushite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Has the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoken only through Moses?” they asked. “Hasn’t he also spoken through us?” And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' heard this.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: (Now Moses was a very humble man, more humble than anyone else on the face of the earth.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'At once the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, Aaron and Miriam, “Come out to the tent of meeting, all three of you.” So the three of them went out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came down in a pillar of cloud; he stood at the entrance to the tent and summoned Aaron and Miriam. When the two of them stepped forward, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'he said, “Listen to my words:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When there is a prophet among you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', reveal myself to them in visions,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I speak to them in dreams.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But this is not true of my servant Moses;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is faithful in all my house.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: With him I speak face to face,
- type: usfm
  marker: q2
  children:
  - type: text
    text: clearly and not in riddles;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'he sees the form of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why then were you not afraid
- type: usfm
  marker: q2
  children:
  - type: text
    text: to speak against my servant Moses?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' burned against them, and he left them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When the cloud lifted from above the tent, Miriam’s skin was leprous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leprous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was used for various diseases affecting the skin.
    marker-yv: yv-n
  - type: text
    text: '—it became as white as snow. Aaron turned toward her and saw that she had a defiling skin disease, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'and he said to Moses, “Please, my lord, I ask you not to hold against us the sin we have so foolishly committed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Do not let her be like a stillborn infant coming from its mother’s womb with its flesh half eaten away.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Moses cried out to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “Please, God, heal her!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied to Moses, “If her father had spit in her face, would she not have been in disgrace for seven days? Confine her outside the camp for seven days; after that she can be brought back.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So Miriam was confined outside the camp for seven days, and the people did not move on till she was brought back.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: After that, the people left Hazeroth and encamped in the Desert of Paran.
