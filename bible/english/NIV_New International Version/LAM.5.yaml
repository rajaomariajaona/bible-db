document_id: LAM.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Remember, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', what has happened to us;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look, and see our disgrace.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Our skin is hot as an oven,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: feverish from hunger.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Women have been violated in Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and virgins in the towns of Judah.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Princes have been hung up by their hands;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: elders are shown no respect.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Young men toil at the millstones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: boys stagger under loads of wood.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The elders are gone from the city gate;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the young men have stopped their music.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Joy is gone from our hearts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our dancing has turned to mourning.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The crown has fallen from our head.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Woe to us, for we have sinned!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Because of this our hearts are faint,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of these things our eyes grow dim
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: for Mount Zion, which lies desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with jackals prowling over it.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'You, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', reign forever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your throne endures from generation to generation.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Our inheritance has been turned over to strangers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our homes to foreigners.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Why do you always forget us?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you forsake us so long?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Restore us to yourself, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that we may return;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: renew our days as of old
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: unless you have utterly rejected us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and are angry with us beyond measure.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: We have become fatherless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our mothers are widows.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: We must buy the water we drink;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our wood can be had only at a price.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Those who pursue us are at our heels;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we are weary and find no rest.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: We submitted to Egypt and Assyria
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to get enough bread.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Our ancestors sinned and are no more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we bear their punishment.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Slaves rule over us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is no one to free us from their hands.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: We get our bread at the risk of our lives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the sword in the desert.
