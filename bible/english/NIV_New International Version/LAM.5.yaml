document_id: LAM.5,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Remember, '
  - type: text
    content: Lord
  - type: text
    content: ', what has happened to us;'
  - type: text
    content: look, and see our disgrace.
  '10':
  - type: text
    content: Our skin is hot as an oven,
  - type: text
    content: feverish from hunger.
  '11':
  - type: text
    content: Women have been violated in Zion,
  - type: text
    content: and virgins in the towns of Judah.
  '12':
  - type: text
    content: Princes have been hung up by their hands;
  - type: text
    content: elders are shown no respect.
  '13':
  - type: text
    content: Young men toil at the millstones;
  - type: text
    content: boys stagger under loads of wood.
  '14':
  - type: text
    content: The elders are gone from the city gate;
  - type: text
    content: the young men have stopped their music.
  '15':
  - type: text
    content: Joy is gone from our hearts;
  - type: text
    content: our dancing has turned to mourning.
  '16':
  - type: text
    content: The crown has fallen from our head.
  - type: text
    content: Woe to us, for we have sinned!
  '17':
  - type: text
    content: Because of this our hearts are faint,
  - type: text
    content: because of these things our eyes grow dim
  '18':
  - type: text
    content: for Mount Zion, which lies desolate,
  - type: text
    content: with jackals prowling over it.
  '19':
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', reign forever;'
  - type: text
    content: your throne endures from generation to generation.
  '2':
  - type: text
    content: Our inheritance has been turned over to strangers,
  - type: text
    content: our homes to foreigners.
  '20':
  - type: text
    content: Why do you always forget us?
  - type: text
    content: Why do you forsake us so long?
  '21':
  - type: text
    content: 'Restore us to yourself, '
  - type: text
    content: Lord
  - type: text
    content: ', that we may return;'
  - type: text
    content: renew our days as of old
  '22':
  - type: text
    content: unless you have utterly rejected us
  - type: text
    content: and are angry with us beyond measure.
  '3':
  - type: text
    content: We have become fatherless,
  - type: text
    content: our mothers are widows.
  '4':
  - type: text
    content: We must buy the water we drink;
  - type: text
    content: our wood can be had only at a price.
  '5':
  - type: text
    content: Those who pursue us are at our heels;
  - type: text
    content: we are weary and find no rest.
  '6':
  - type: text
    content: We submitted to Egypt and Assyria
  - type: text
    content: to get enough bread.
  '7':
  - type: text
    content: Our ancestors sinned and are no more,
  - type: text
    content: and we bear their punishment.
  '8':
  - type: text
    content: Slaves rule over us,
  - type: text
    content: and there is no one to free us from their hands.
  '9':
  - type: text
    content: We get our bread at the risk of our lives
  - type: text
    content: because of the sword in the desert.
