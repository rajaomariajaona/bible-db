document_id: ISA.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Moab
  - type: text
    content: 'A prophecy against Moab:'
  - type: text
    content: Ar in Moab is ruined,
  - type: text
    content: destroyed in a night!
  - type: text
    content: Kir in Moab is ruined,
  - type: text
    content: destroyed in a night!
  '2':
  - type: text
    content: Dibon goes up to its temple,
  - type: text
    content: to its high places to weep;
  - type: text
    content: Moab wails over Nebo and Medeba.
  - type: text
    content: Every head is shaved
  - type: text
    content: and every beard cut off.
  '3':
  - type: text
    content: In the streets they wear sackcloth;
  - type: text
    content: on the roofs and in the public squares
  - type: text
    content: they all wail,
  - type: text
    content: prostrate with weeping.
  '4':
  - type: text
    content: Heshbon and Elealeh cry out,
  - type: text
    content: their voices are heard all the way to Jahaz.
  - type: text
    content: Therefore the armed men of Moab cry out,
  - type: text
    content: and their hearts are faint.
  '5':
  - type: text
    content: My heart cries out over Moab;
  - type: text
    content: her fugitives flee as far as Zoar,
  - type: text
    content: as far as Eglath Shelishiyah.
  - type: text
    content: They go up the hill to Luhith,
  - type: text
    content: weeping as they go;
  - type: text
    content: on the road to Horonaim
  - type: text
    content: they lament their destruction.
  '6':
  - type: text
    content: The waters of Nimrim are dried up
  - type: text
    content: and the grass is withered;
  - type: text
    content: the vegetation is gone
  - type: text
    content: and nothing green is left.
  '7':
  - type: text
    content: So the wealth they have acquired and stored up
  - type: text
    content: they carry away over the Ravine of the Poplars.
  '8':
  - type: text
    content: Their outcry echoes along the border of Moab;
  - type: text
    content: their wailing reaches as far as Eglaim,
  - type: text
    content: their lamentation as far as Beer Elim.
  '9':
  - type: text
    content: The waters of Dimon
  - type: note
    content: Dimon, a wordplay on Dibon (see verse 2), sounds like the Hebrew for blood.
  - type: text
    content: ' are full of blood,'
  - type: text
    content: but I will bring still more upon Dimon
  - type: note
    content: Dimon, a wordplay on Dibon (see verse 2), sounds like the Hebrew for blood.
  - type: text
    content: —
  - type: text
    content: a lion upon the fugitives of Moab
  - type: text
    content: and upon those who remain in the land.
