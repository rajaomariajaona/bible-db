document_id: ISA.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prophecy Against Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A prophecy against Moab:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ar in Moab is ruined,
- type: usfm
  marker: q2
  children:
  - type: text
    text: destroyed in a night!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kir in Moab is ruined,
- type: usfm
  marker: q2
  children:
  - type: text
    text: destroyed in a night!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dibon goes up to its temple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to its high places to weep;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Moab wails over Nebo and Medeba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every head is shaved
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every beard cut off.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: In the streets they wear sackcloth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the roofs and in the public squares
- type: usfm
  marker: q1
  children:
  - type: text
    text: they all wail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: prostrate with weeping.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Heshbon and Elealeh cry out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their voices are heard all the way to Jahaz.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore the armed men of Moab cry out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their hearts are faint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My heart cries out over Moab;
- type: usfm
  marker: q2
  children:
  - type: text
    text: her fugitives flee as far as Zoar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as far as Eglath Shelishiyah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They go up the hill to Luhith,
- type: usfm
  marker: q2
  children:
  - type: text
    text: weeping as they go;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on the road to Horonaim
- type: usfm
  marker: q2
  children:
  - type: text
    text: they lament their destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The waters of Nimrim are dried up
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the grass is withered;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the vegetation is gone
- type: usfm
  marker: q2
  children:
  - type: text
    text: and nothing green is left.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So the wealth they have acquired and stored up
- type: usfm
  marker: q2
  children:
  - type: text
    text: they carry away over the Ravine of the Poplars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Their outcry echoes along the border of Moab;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their wailing reaches as far as Eglaim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their lamentation as far as Beer Elim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The waters of Dimon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dimon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a wordplay on '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dibon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(see verse 2), sounds like the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: blood
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' are full of blood,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will bring still more upon Dimon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dimon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a wordplay on '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dibon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(see verse 2), sounds like the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: blood
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: text
    text: a lion upon the fugitives of Moab
- type: usfm
  marker: q2
  children:
  - type: text
    text: and upon those who remain in the land.
