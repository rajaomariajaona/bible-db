document_id: DAN.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel’s Training in Babylon
  - type: text
    content: 'In the third year of the reign of Jehoiakim king of Judah, Nebuchadnezzar king of Babylon came to Jerusalem and besieged it. '
  '10':
  - type: text
    content: but the official told Daniel, “I am afraid of my lord the king, who has assigned your
  - type: note
    content: The Hebrew for your and you in this verse is plural.
  - type: text
    content: ' food and drink. Why should he see you looking worse than the other young men your age? The king would then have my head because of you.”'
  '11':
  - type: text
    content: 'Daniel then said to the guard whom the chief official had appointed over Daniel, Hananiah, Mishael and Azariah, '
  '12':
  - type: text
    content: '“Please test your servants for ten days: Give us nothing but vegetables to eat and water to drink. '
  '13':
  - type: text
    content: 'Then compare our appearance with that of the young men who eat the royal food, and treat your servants in accordance with what you see.” '
  '14':
  - type: text
    content: So he agreed to this and tested them for ten days.
  '15':
  - type: text
    content: 'At the end of the ten days they looked healthier and better nourished than any of the young men who ate the royal food. '
  '16':
  - type: text
    content: So the guard took away their choice food and the wine they were to drink and gave them vegetables instead.
  '17':
  - type: text
    content: To these four young men God gave knowledge and understanding of all kinds of literature and learning. And Daniel could understand visions and dreams of all kinds.
  '18':
  - type: text
    content: 'At the end of the time set by the king to bring them into his service, the chief official presented them to Nebuchadnezzar. '
  '19':
  - type: text
    content: 'The king talked with them, and he found none equal to Daniel, Hananiah, Mishael and Azariah; so they entered the king’s service. '
  '2':
  - type: text
    content: And the Lord delivered Jehoiakim king of Judah into his hand, along with some of the articles from the temple of God. These he carried off to the temple of his god in Babylonia
  - type: note
    content: Hebrew Shinar
  - type: text
    content: ' and put in the treasure house of his god.'
  '20':
  - type: text
    content: In every matter of wisdom and understanding about which the king questioned them, he found them ten times better than all the magicians and enchanters in his whole kingdom.
  '21':
  - type: text
    content: And Daniel remained there until the first year of King Cyrus.
  '3':
  - type: text
    content: 'Then the king ordered Ashpenaz, chief of his court officials, to bring into the king’s service some of the Israelites from the royal family and the nobility— '
  '4':
  - type: text
    content: young men without any physical defect, handsome, showing aptitude for every kind of learning, well informed, quick to understand, and qualified to serve in the king’s palace. He was to teach them the language and literature of the Babylonians.
  - type: note
    content: Or Chaldeans
  - type: text
    content: ' '
  '5':
  - type: text
    content: The king assigned them a daily amount of food and wine from the king’s table. They were to be trained for three years, and after that they were to enter the king’s service.
  '6':
  - type: text
    content: 'Among those who were chosen were some from Judah: Daniel, Hananiah, Mishael and Azariah. '
  '7':
  - type: text
    content: 'The chief official gave them new names: to Daniel, the name Belteshazzar; to Hananiah, Shadrach; to Mishael, Meshach; and to Azariah, Abednego.'
  '8':
  - type: text
    content: 'But Daniel resolved not to defile himself with the royal food and wine, and he asked the chief official for permission not to defile himself this way. '
  '9':
  - type: text
    content: 'Now God had caused the official to show favor and compassion to Daniel, '
