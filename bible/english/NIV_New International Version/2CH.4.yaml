document_id: 2CH.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple’s Furnishings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: He made a bronze altar twenty cubits long, twenty cubits wide and ten cubits high.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 30 feet long and wide and 15 feet high or about 9 meters long and wide and 4.5 meters high
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He placed the Sea on the south side, at the southeast corner.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And Huram also made the pots and shovels and sprinkling bowls.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Huram finished the work he had undertaken for King Solomon in the temple of God:'
  '12':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: the two pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two bowl-shaped capitals on top of the pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two sets of network decorating the two bowl-shaped capitals on top of the pillars;
  '13':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: the four hundred pomegranates for the two sets of network (two rows of pomegranates for each network, decorating the bowl-shaped capitals on top of the pillars);
  '14':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: the stands with their basins;
  '15':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: the Sea and the twelve bulls under it;
  '16':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: the pots, shovels, meat forks and all related articles.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the objects that Huram-Abi made for King Solomon for the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' were of polished bronze. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The king had them cast in clay molds in the plain of the Jordan between Sukkoth and Zarethan.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Zeredatha, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Zarethan
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: All these things that Solomon made amounted to so much that the weight of the bronze could not be calculated.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Solomon also made all the furnishings that were in God’s temple:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the golden altar;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the tables on which was the bread of the Presence;
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He made the Sea of cast metal, circular in shape, measuring ten cubits from rim to rim and five cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 7 1/2 feet or about 2.3 meters
      marker-yv: yv-n
    - type: text
      text: ' high. It took a line of thirty cubits'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 45 feet or about 14 meters
      marker-yv: yv-n
    - type: text
      text: ' to measure around it. '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: the lampstands of pure gold with their lamps, to burn in front of the inner sanctuary as prescribed;
  '21':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: the gold floral work and lamps and tongs (they were solid gold);
  '22':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'the pure gold wick trimmers, sprinkling bowls, dishes and censers; and the gold doors of the temple: the inner doors to the Most Holy Place and the doors of the main hall.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Below the rim, figures of bulls encircled it—ten to a cubit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 18 inches or about 45 centimeters
      marker-yv: yv-n
    - type: text
      text: ' The bulls were cast in two rows in one piece with the Sea.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The Sea stood on twelve bulls, three facing north, three facing west, three facing south and three facing east. The Sea rested on top of them, and their hindquarters were toward the center. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: It was a handbreadth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 3 inches or about 7.5 centimeters
      marker-yv: yv-n
    - type: text
      text: ' in thickness, and its rim was like the rim of a cup, like a lily blossom. It held three thousand baths.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 18,000 gallons or about 66,000 liters
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He then made ten basins for washing and placed five on the south side and five on the north. In them the things to be used for the burnt offerings were rinsed, but the Sea was to be used by the priests for washing.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He made ten gold lampstands according to the specifications for them and placed them in the temple, five on the south side and five on the north.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He made ten tables and placed them in the temple, five on the south side and five on the north. He also made a hundred gold sprinkling bowls.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He made the courtyard of the priests, and the large court and the doors for the court, and overlaid the doors with bronze. '
