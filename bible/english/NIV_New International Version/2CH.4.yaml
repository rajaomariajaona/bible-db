document_id: 2CH.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Temple’s Furnishings
  - type: text
    content: He made a bronze altar twenty cubits long, twenty cubits wide and ten cubits high.
  - type: note
    content: That is, about 30 feet long and wide and 15 feet high or about 9 meters long and wide and 4.5 meters high
  - type: text
    content: ' '
  '10':
  - type: text
    content: He placed the Sea on the south side, at the southeast corner.
  '11':
  - type: text
    content: And Huram also made the pots and shovels and sprinkling bowls.
  - type: text
    content: 'So Huram finished the work he had undertaken for King Solomon in the temple of God:'
  '12':
  - type: text
    content: the two pillars;
  - type: text
    content: the two bowl-shaped capitals on top of the pillars;
  - type: text
    content: the two sets of network decorating the two bowl-shaped capitals on top of the pillars;
  '13':
  - type: text
    content: the four hundred pomegranates for the two sets of network (two rows of pomegranates for each network, decorating the bowl-shaped capitals on top of the pillars);
  '14':
  - type: text
    content: the stands with their basins;
  '15':
  - type: text
    content: the Sea and the twelve bulls under it;
  '16':
  - type: text
    content: the pots, shovels, meat forks and all related articles.
  - type: text
    content: 'All the objects that Huram-Abi made for King Solomon for the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' were of polished bronze. '
  '17':
  - type: text
    content: The king had them cast in clay molds in the plain of the Jordan between Sukkoth and Zarethan.
  - type: note
    content: Hebrew Zeredatha, a variant of Zarethan
  - type: text
    content: ' '
  '18':
  - type: text
    content: All these things that Solomon made amounted to so much that the weight of the bronze could not be calculated.
  '19':
  - type: text
    content: 'Solomon also made all the furnishings that were in God’s temple:'
  - type: text
    content: the golden altar;
  - type: text
    content: the tables on which was the bread of the Presence;
  '2':
  - type: text
    content: He made the Sea of cast metal, circular in shape, measuring ten cubits from rim to rim and five cubits
  - type: note
    content: That is, about 7 1/2 feet or about 2.3 meters
  - type: text
    content: ' high. It took a line of thirty cubits'
  - type: note
    content: That is, about 45 feet or about 14 meters
  - type: text
    content: ' to measure around it. '
  '20':
  - type: text
    content: the lampstands of pure gold with their lamps, to burn in front of the inner sanctuary as prescribed;
  '21':
  - type: text
    content: the gold floral work and lamps and tongs (they were solid gold);
  '22':
  - type: text
    content: 'the pure gold wick trimmers, sprinkling bowls, dishes and censers; and the gold doors of the temple: the inner doors to the Most Holy Place and the doors of the main hall.'
  '3':
  - type: text
    content: Below the rim, figures of bulls encircled it—ten to a cubit.
  - type: note
    content: That is, about 18 inches or about 45 centimeters
  - type: text
    content: ' The bulls were cast in two rows in one piece with the Sea.'
  '4':
  - type: text
    content: 'The Sea stood on twelve bulls, three facing north, three facing west, three facing south and three facing east. The Sea rested on top of them, and their hindquarters were toward the center. '
  '5':
  - type: text
    content: It was a handbreadth
  - type: note
    content: That is, about 3 inches or about 7.5 centimeters
  - type: text
    content: ' in thickness, and its rim was like the rim of a cup, like a lily blossom. It held three thousand baths.'
  - type: note
    content: That is, about 18,000 gallons or about 66,000 liters
  '6':
  - type: text
    content: He then made ten basins for washing and placed five on the south side and five on the north. In them the things to be used for the burnt offerings were rinsed, but the Sea was to be used by the priests for washing.
  '7':
  - type: text
    content: He made ten gold lampstands according to the specifications for them and placed them in the temple, five on the south side and five on the north.
  '8':
  - type: text
    content: He made ten tables and placed them in the temple, five on the south side and five on the north. He also made a hundred gold sprinkling bowls.
  '9':
  - type: text
    content: 'He made the courtyard of the priests, and the large court and the doors for the court, and overlaid the doors with bronze. '
