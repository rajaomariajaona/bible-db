document_id: 1SA.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David, Nabal and Abigail
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Now Samuel died, and all Israel assembled and mourned for him; and they buried him at his home in Ramah. Then David moved down into the Desert of Paran.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew and some Septuagint manuscripts; other Septuagint manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Maon
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A certain man in Maon, who had property there at Carmel, was very wealthy. He had a thousand goats and three thousand sheep, which he was shearing in Carmel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: His name was Nabal and his wife’s name was Abigail. She was an intelligent and beautiful woman, but her husband was surly and mean in his dealings—he was a Calebite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'While David was in the wilderness, he heard that Nabal was shearing sheep. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So he sent ten young men and said to them, “Go up to Nabal at Carmel and greet him in my name. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Say to him: ‘Long life to you! Good health to you and your household! And good health to all that is yours!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“ ‘Now I hear that it is sheep-shearing time. When your shepherds were with us, we did not mistreat them, and the whole time they were at Carmel nothing of theirs was missing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ask your own servants and they will tell you. Therefore be favorable toward my men, since we come at a festive time. Please give your servants and your son David whatever you can find for them.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When David’s men arrived, they gave Nabal this message in David’s name. Then they waited.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nabal answered David’s servants, “Who is this David? Who is this son of Jesse? Many servants are breaking away from their masters these days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Why should I take my bread and water, and the meat I have slaughtered for my shearers, and give it to men coming from who knows where?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David’s men turned around and went back. When they arrived, they reported every word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: David said to his men, “Each of you strap on your sword!” So they did, and David strapped his on as well. About four hundred men went up with David, while two hundred stayed with the supplies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'One of the servants told Abigail, Nabal’s wife, “David sent messengers from the wilderness to give our master his greetings, but he hurled insults at them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Yet these men were very good to us. They did not mistreat us, and the whole time we were out in the fields near them nothing was missing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Night and day they were a wall around us the whole time we were herding our sheep near them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Now think it over and see what you can do, because disaster is hanging over our master and his whole household. He is such a wicked man that no one can talk to him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Abigail acted quickly. She took two hundred loaves of bread, two skins of wine, five dressed sheep, five seahs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, probably about 60 pounds or about 27 kilograms
    marker-yv: yv-n
  - type: text
    text: ' of roasted grain, a hundred cakes of raisins and two hundred cakes of pressed figs, and loaded them on donkeys. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then she told her servants, “Go on ahead; I’ll follow you.” But she did not tell her husband Nabal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'As she came riding her donkey into a mountain ravine, there were David and his men descending toward her, and she met them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'David had just said, “It’s been useless—all my watching over this fellow’s property in the wilderness so that nothing of his was missing. He has paid me back evil for good. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: May God deal with David,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: with David’s enemies
    marker-yv: yv-n
  - type: text
    text: ' be it ever so severely, if by morning I leave alive one male of all who belong to him!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When Abigail saw David, she quickly got off her donkey and bowed down before David with her face to the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'She fell at his feet and said: “Pardon your servant, my lord, and let me speak to you; hear what your servant has to say. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Please pay no attention, my lord, to that wicked man Nabal. He is just like his name—his name means Fool, and folly goes with him. And as for me, your servant, I did not see the men my lord sent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And now, my lord, as surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God lives and as you live, since the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has kept you from bloodshed and from avenging yourself with your own hands, may your enemies and all who are intent on harming my lord be like Nabal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And let this gift, which your servant has brought to my lord, be given to the men who follow you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“Please forgive your servant’s presumption. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will certainly make a lasting dynasty for my lord, because you fight the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s battles, and no wrongdoing will be found in you as long as you live. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Even though someone is pursuing you to take your life, the life of my lord will be bound securely in the bundle of the living by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, but the lives of your enemies he will hurl away as from the pocket of a sling. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has fulfilled for my lord every good thing he promised concerning him and has appointed him ruler over Israel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'my lord will not have on his conscience the staggering burden of needless bloodshed or of having avenged himself. And when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God has brought my lord success, remember your servant.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'David said to Abigail, “Praise be to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, who has sent you today to meet me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'May you be blessed for your good judgment and for keeping me from bloodshed this day and from avenging myself with my own hands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Otherwise, as surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, lives, who has kept me from harming you, if you had not come quickly to meet me, not one male belonging to Nabal would have been left alive by daybreak.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Then David accepted from her hand what she had brought him and said, “Go home in peace. I have heard your words and granted your request.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'When Abigail went to Nabal, he was in the house holding a banquet like that of a king. He was in high spirits and very drunk. So she told him nothing at all until daybreak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then in the morning, when Nabal was sober, his wife told him all these things, and his heart failed him and he became like a stone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'About ten days later, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' struck Nabal and he died.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'When David heard that Nabal was dead, he said, “Praise be to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who has upheld my cause against Nabal for treating me with contempt. He has kept his servant from doing wrong and has brought Nabal’s wrongdoing down on his own head.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then David sent word to Abigail, asking her to become his wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: His servants went to Carmel and said to Abigail, “David has sent us to you to take you to become his wife.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'She bowed down with her face to the ground and said, “I am your servant and am ready to serve you and wash the feet of my lord’s servants.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Abigail quickly got on a donkey and, attended by her five female servants, went with David’s messengers and became his wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'David had also married Ahinoam of Jezreel, and they both were his wives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: But Saul had given his daughter Michal, David’s wife, to Paltiel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Palti
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Paltiel
    marker-yv: yv-n
  - type: text
    text: ' son of Laish, who was from Gallim.'
