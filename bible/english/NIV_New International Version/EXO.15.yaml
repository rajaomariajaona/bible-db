      text: '22'
  - type: text
    text: 'Then Moses led Israel from the Red Sea and they went into the Desert of Shur. For three days they traveled in the desert without finding water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When they came to Marah, they could not drink its water because it was bitter. (That is why the place is called Marah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Marah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bitter
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
