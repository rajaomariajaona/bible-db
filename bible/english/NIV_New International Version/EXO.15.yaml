document_id: EXO.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Song of Moses and Miriam
  - type: text
    content: 'Then Moses and the Israelites sang this song to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: '“I will sing to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he is highly exalted.
  - type: text
    content: Both horse and driver
  - type: text
    content: he has hurled into the sea.
  '10':
  - type: text
    content: But you blew with your breath,
  - type: text
    content: and the sea covered them.
  - type: text
    content: They sank like lead
  - type: text
    content: in the mighty waters.
  '11':
  - type: text
    content: Who among the gods
  - type: text
    content: 'is like you, '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Who is like you—
  - type: text
    content: majestic in holiness,
  - type: text
    content: awesome in glory,
  - type: text
    content: working wonders?
  '12':
  - type: text
    content: “You stretch out your right hand,
  - type: text
    content: and the earth swallows your enemies.
  '13':
  - type: text
    content: In your unfailing love you will lead
  - type: text
    content: the people you have redeemed.
  - type: text
    content: In your strength you will guide them
  - type: text
    content: to your holy dwelling.
  '14':
  - type: text
    content: The nations will hear and tremble;
  - type: text
    content: anguish will grip the people of Philistia.
  '15':
  - type: text
    content: The chiefs of Edom will be terrified,
  - type: text
    content: the leaders of Moab will be seized with trembling,
  - type: text
    content: the people
  - type: note
    content: Or rulers
  - type: text
    content: ' of Canaan will melt away;'
  '16':
  - type: text
    content: terror and dread will fall on them.
  - type: text
    content: By the power of your arm
  - type: text
    content: they will be as still as a stone—
  - type: text
    content: 'until your people pass by, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: until the people you bought
  - type: note
    content: Or created
  - type: text
    content: ' pass by.'
  '17':
  - type: text
    content: You will bring them in and plant them
  - type: text
    content: on the mountain of your inheritance—
  - type: text
    content: 'the place, '
  - type: text
    content: Lord
  - type: text
    content: ', you made for your dwelling,'
  - type: text
    content: the sanctuary, Lord, your hands established.
  '18':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns'
  - type: text
    content: for ever and ever.”
  '19':
  - type: text
    content: When Pharaoh’s horses, chariots and horsemen
  - type: note
    content: Or charioteers
  - type: text
    content: ' went into the sea, the '
  - type: text
    content: Lord
  - type: text
    content: ' brought the waters of the sea back over them, but the Israelites walked through the sea on dry ground. '
  '2':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is my strength and my defense'
  - type: note
    content: Or song
  - type: text
    content: ;
  - type: text
    content: he has become my salvation.
  - type: text
    content: He is my God, and I will praise him,
  - type: text
    content: my father’s God, and I will exalt him.
  '20':
  - type: text
    content: 'Then Miriam the prophet, Aaron’s sister, took a timbrel in her hand, and all the women followed her, with timbrels and dancing. '
  '21':
  - type: text
    content: 'Miriam sang to them:'
  - type: text
    content: '“Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he is highly exalted.
  - type: text
    content: Both horse and driver
  - type: text
    content: he has hurled into the sea.”
  - type: heading
    content: The Waters of Marah and Elim
  '22':
  - type: text
    content: 'Then Moses led Israel from the Red Sea and they went into the Desert of Shur. For three days they traveled in the desert without finding water. '
  '23':
  - type: text
    content: When they came to Marah, they could not drink its water because it was bitter. (That is why the place is called Marah.
  - type: note
    content: Marah means bitter.
  - type: text
    content: ') '
  '24':
  - type: text
    content: So the people grumbled against Moses, saying, “What are we to drink?”
  '25':
  - type: text
    content: 'Then Moses cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' showed him a piece of wood. He threw it into the water, and the water became fit to drink.'
  - type: text
    content: 'There the '
  - type: text
    content: Lord
  - type: text
    content: ' issued a ruling and instruction for them and put them to the test. '
  '26':
  - type: text
    content: 'He said, “If you listen carefully to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and do what is right in his eyes, if you pay attention to his commands and keep all his decrees, I will not bring on you any of the diseases I brought on the Egyptians, for I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who heals you.”'
  '27':
  - type: text
    content: Then they came to Elim, where there were twelve springs and seventy palm trees, and they camped there near the water.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is a warrior;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is his name.'
  '4':
  - type: text
    content: Pharaoh’s chariots and his army
  - type: text
    content: he has hurled into the sea.
  - type: text
    content: The best of Pharaoh’s officers
  - type: text
    content: are drowned in the Red Sea.
  - type: note
    content: Or the Sea of Reeds; also in verse 22
  '5':
  - type: text
    content: The deep waters have covered them;
  - type: text
    content: they sank to the depths like a stone.
  '6':
  - type: text
    content: 'Your right hand, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: was majestic in power.
  - type: text
    content: 'Your right hand, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: shattered the enemy.
  '7':
  - type: text
    content: “In the greatness of your majesty
  - type: text
    content: you threw down those who opposed you.
  - type: text
    content: You unleashed your burning anger;
  - type: text
    content: it consumed them like stubble.
  '8':
  - type: text
    content: By the blast of your nostrils
  - type: text
    content: the waters piled up.
  - type: text
    content: The surging waters stood up like a wall;
  - type: text
    content: the deep waters congealed in the heart of the sea.
  '9':
  - type: text
    content: The enemy boasted,
  - type: text
    content: ‘I will pursue, I will overtake them.
  - type: text
    content: I will divide the spoils;
  - type: text
    content: I will gorge myself on them.
  - type: text
    content: I will draw my sword
  - type: text
    content: and my hand will destroy them.’
