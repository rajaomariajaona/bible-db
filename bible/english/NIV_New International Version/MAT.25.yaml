document_id: MAT.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Ten Virgins
  - type: text
    content: ' '
  - type: text
    content: “At that time the kingdom of heaven will be like ten virgins who took their lamps and went out to meet the bridegroom.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: text
    content: “But while they were on their way to buy the oil, the bridegroom arrived. The virgins who were ready went in with him to the wedding banquet. And the door was shut.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “Later the others also came. ‘Lord, Lord,’ they said, ‘open the door for us!’
  '12':
  - type: text
    content: ' '
  - type: text
    content: “But he replied, ‘Truly I tell you, I don’t know you.’
  '13':
  - type: text
    content: ' '
  - type: text
    content: “Therefore keep watch, because you do not know the day or the hour.
  - type: heading
    content: The Parable of the Bags of Gold
  '14':
  - type: text
    content: ' '
  - type: text
    content: “Again, it will be like a man going on a journey, who called his servants and entrusted his wealth to them.
  - type: text
    content: ' '
  '15':
  - type: text
    content: To one he gave five bags of gold, to another two bags, and to another one bag,
  - type: note
    content: Greek five talents… two talents… one talent; also throughout this parable; a talent was worth about 20 years of a day laborer’s wage.
  - type: text
    content: ' '
  - type: text
    content: each according to his ability. Then he went on his journey.
  - type: text
    content: ' '
  '16':
  - type: text
    content: The man who had received five bags of gold went at once and put his money to work and gained five bags more.
  - type: text
    content: ' '
  '17':
  - type: text
    content: So also, the one with two bags of gold gained two more.
  - type: text
    content: ' '
  '18':
  - type: text
    content: But the man who had received one bag went off, dug a hole in the ground and hid his master’s money.
  '19':
  - type: text
    content: ' '
  - type: text
    content: “After a long time the master of those servants returned and settled accounts with them.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Five of them were foolish and five were wise.
  - type: text
    content: ' '
  '20':
  - type: text
    content: The man who had received five bags of gold brought the other five. ‘Master,’ he said, ‘you entrusted me with five bags of gold. See, I have gained five more.’
  '21':
  - type: text
    content: ' '
  - type: text
    content: “His master replied, ‘Well done, good and faithful servant! You have been faithful with a few things; I will put you in charge of many things. Come and share your master’s happiness!’
  '22':
  - type: text
    content: ' '
  - type: text
    content: “The man with two bags of gold also came. ‘Master,’ he said, ‘you entrusted me with two bags of gold; see, I have gained two more.’
  '23':
  - type: text
    content: ' '
  - type: text
    content: “His master replied, ‘Well done, good and faithful servant! You have been faithful with a few things; I will put you in charge of many things. Come and share your master’s happiness!’
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Then the man who had received one bag of gold came. ‘Master,’ he said, ‘I knew that you are a hard man, harvesting where you have not sown and gathering where you have not scattered seed.
  - type: text
    content: ' '
  '25':
  - type: text
    content: So I was afraid and went out and hid your gold in the ground. See, here is what belongs to you.’
  '26':
  - type: text
    content: ' '
  - type: text
    content: “His master replied, ‘You wicked, lazy servant! So you knew that I harvest where I have not sown and gather where I have not scattered seed?
  - type: text
    content: ' '
  '27':
  - type: text
    content: Well then, you should have put my money on deposit with the bankers, so that when I returned I would have received it back with interest.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “ ‘So take the bag of gold from him and give it to the one who has ten bags.
  - type: text
    content: ' '
  '29':
  - type: text
    content: For whoever has will be given more, and they will have an abundance. Whoever does not have, even what they have will be taken from them.
  - type: text
    content: ' '
  '3':
  - type: text
    content: The foolish ones took their lamps but did not take any oil with them.
  - type: text
    content: ' '
  '30':
  - type: text
    content: And throw that worthless servant outside, into the darkness, where there will be weeping and gnashing of teeth.’
  - type: heading
    content: The Sheep and the Goats
  '31':
  - type: text
    content: ' '
  - type: text
    content: “When the Son of Man comes in his glory, and all the angels with him, he will sit on his glorious throne.
  - type: text
    content: ' '
  '32':
  - type: text
    content: All the nations will be gathered before him, and he will separate the people one from another as a shepherd separates the sheep from the goats.
  - type: text
    content: ' '
  '33':
  - type: text
    content: He will put the sheep on his right and the goats on his left.
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Then the King will say to those on his right, ‘Come, you who are blessed by my Father; take your inheritance, the kingdom prepared for you since the creation of the world.
  - type: text
    content: ' '
  '35':
  - type: text
    content: For I was hungry and you gave me something to eat, I was thirsty and you gave me something to drink, I was a stranger and you invited me in,
  - type: text
    content: ' '
  '36':
  - type: text
    content: I needed clothes and you clothed me, I was sick and you looked after me, I was in prison and you came to visit me.’
  '37':
  - type: text
    content: ' '
  - type: text
    content: “Then the righteous will answer him, ‘Lord, when did we see you hungry and feed you, or thirsty and give you something to drink?
  - type: text
    content: ' '
  '38':
  - type: text
    content: When did we see you a stranger and invite you in, or needing clothes and clothe you?
  - type: text
    content: ' '
  '39':
  - type: text
    content: When did we see you sick or in prison and go to visit you?’
  '4':
  - type: text
    content: The wise ones, however, took oil in jars along with their lamps.
  - type: text
    content: ' '
  '40':
  - type: text
    content: ' '
  - type: text
    content: “The King will reply, ‘Truly I tell you, whatever you did for one of the least of these brothers and sisters of mine, you did for me.’
  '41':
  - type: text
    content: ' '
  - type: text
    content: “Then he will say to those on his left, ‘Depart from me, you who are cursed, into the eternal fire prepared for the devil and his angels.
  - type: text
    content: ' '
  '42':
  - type: text
    content: For I was hungry and you gave me nothing to eat, I was thirsty and you gave me nothing to drink,
  - type: text
    content: ' '
  '43':
  - type: text
    content: I was a stranger and you did not invite me in, I needed clothes and you did not clothe me, I was sick and in prison and you did not look after me.’
  '44':
  - type: text
    content: ' '
  - type: text
    content: “They also will answer, ‘Lord, when did we see you hungry or thirsty or a stranger or needing clothes or sick or in prison, and did not help you?’
  '45':
  - type: text
    content: ' '
  - type: text
    content: “He will reply, ‘Truly I tell you, whatever you did not do for one of the least of these, you did not do for me.’
  '46':
  - type: text
    content: ' '
  - type: text
    content: “Then they will go away to eternal punishment, but the righteous to eternal life.”
  '5':
  - type: text
    content: The bridegroom was a long time in coming, and they all became drowsy and fell asleep.
  '6':
  - type: text
    content: ' '
  - type: text
    content: '“At midnight the cry rang out: ‘Here’s the bridegroom! Come out to meet him!’'
  '7':
  - type: text
    content: ' '
  - type: text
    content: “Then all the virgins woke up and trimmed their lamps.
  - type: text
    content: ' '
  '8':
  - type: text
    content: The foolish ones said to the wise, ‘Give us some of your oil; our lamps are going out.’
  '9':
  - type: text
    content: ' '
  - type: text
    content: “ ‘No,’ they replied, ‘there may not be enough for both us and you. Instead, go to those who sell oil and buy some for yourselves.’
