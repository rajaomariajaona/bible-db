document_id: 2CH.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon Asks for Wisdom
  - type: text
    content: 'Solomon son of David established himself firmly over his kingdom, for the '
  - type: text
    content: Lord
  - type: text
    content: ' his God was with him and made him exceedingly great.'
  '10':
  - type: text
    content: Give me wisdom and knowledge, that I may lead this people, for who is able to govern this great people of yours?”
  '11':
  - type: text
    content: 'God said to Solomon, “Since this is your heart’s desire and you have not asked for wealth, possessions or honor, nor for the death of your enemies, and since you have not asked for a long life but for wisdom and knowledge to govern my people over whom I have made you king, '
  '12':
  - type: text
    content: therefore wisdom and knowledge will be given you. And I will also give you wealth, possessions and honor, such as no king who was before you ever had and none after you will have.”
  '13':
  - type: text
    content: Then Solomon went to Jerusalem from the high place at Gibeon, from before the tent of meeting. And he reigned over Israel.
  '14':
  - type: text
    content: Solomon accumulated chariots and horses; he had fourteen hundred chariots and twelve thousand horses,
  - type: note
    content: Or charioteers
  - type: text
    content: ' which he kept in the chariot cities and also with him in Jerusalem. '
  '15':
  - type: text
    content: 'The king made silver and gold as common in Jerusalem as stones, and cedar as plentiful as sycamore-fig trees in the foothills. '
  '16':
  - type: text
    content: Solomon’s horses were imported from Egypt and from Kue
  - type: note
    content: Probably Cilicia
  - type: text
    content: '—the royal merchants purchased them from Kue at the current price. '
  '17':
  - type: text
    content: They imported a chariot from Egypt for six hundred shekels
  - type: note
    content: That is, about 15 pounds or about 6.9 kilograms
  - type: text
    content: ' of silver, and a horse for a hundred and fifty.'
  - type: note
    content: That is, about 3 3/4 pounds or about 1.7 kilograms
  - type: text
    content: ' They also exported them to all the kings of the Hittites and of the Arameans.'
  '2':
  - type: text
    content: 'Then Solomon spoke to all Israel—to the commanders of thousands and commanders of hundreds, to the judges and to all the leaders in Israel, the heads of families— '
  '3':
  - type: text
    content: 'and Solomon and the whole assembly went to the high place at Gibeon, for God’s tent of meeting was there, which Moses the '
  - type: text
    content: Lord
  - type: text
    content: '’s servant had made in the wilderness. '
  '4':
  - type: text
    content: 'Now David had brought up the ark of God from Kiriath Jearim to the place he had prepared for it, because he had pitched a tent for it in Jerusalem. '
  '5':
  - type: text
    content: 'But the bronze altar that Bezalel son of Uri, the son of Hur, had made was in Gibeon in front of the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: '; so Solomon and the assembly inquired of him there. '
  '6':
  - type: text
    content: 'Solomon went up to the bronze altar before the '
  - type: text
    content: Lord
  - type: text
    content: ' in the tent of meeting and offered a thousand burnt offerings on it.'
  '7':
  - type: text
    content: That night God appeared to Solomon and said to him, “Ask for whatever you want me to give you.”
  '8':
  - type: text
    content: 'Solomon answered God, “You have shown great kindness to David my father and have made me king in his place. '
  '9':
  - type: text
    content: 'Now, '
  - type: text
    content: Lord
  - type: text
    content: ' God, let your promise to my father David be confirmed, for you have made me king over a people who are as numerous as the dust of the earth. '
