document_id: ISA.65,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment and Salvation
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “I revealed myself to those who did not ask for me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was found by those who did not seek me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To a nation that did not call on my name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I said, ‘Here am I, here am I.’
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Sharon will become a pasture for flocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the Valley of Achor a resting place for herds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my people who seek me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“But as for you who forsake the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and forget my holy mountain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who spread a table for Fortune
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill bowls of mixed wine for Destiny,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will destine you for the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all of you will fall in the slaughter;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I called but you did not answer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I spoke but you did not listen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You did evil in my sight
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and chose what displeases me.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Therefore this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My servants will eat,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you will go hungry;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my servants will drink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you will go thirsty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my servants will rejoice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you will be put to shame.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: My servants will sing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out of the joy of their hearts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you will cry out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from anguish of heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wail in brokenness of spirit.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: You will leave your name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my chosen ones to use in their curses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will put you to death,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but to his servants he will give another name.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Whoever invokes a blessing in the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will do so by the one true God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whoever takes an oath in the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will swear by the one true God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the past troubles will be forgotten
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hidden from my eyes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: New Heavens and a New Earth
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “See, I will create
  - type: usfm
    marker: q2
    children:
    - type: text
      text: new heavens and a new earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The former things will not be remembered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will they come to mind.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But be glad and rejoice forever
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in what I will create,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I will create Jerusalem to be a delight
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its people a joy.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: I will rejoice over Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take delight in my people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the sound of weeping and of crying
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be heard in it no more.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: All day long I have held out my hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to an obstinate people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who walk in ways not good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pursuing their own imaginations—
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Never again will there be in it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an infant who lives but a few days,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or an old man who does not live out his years;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the one who dies at a hundred
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be thought a mere child;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the one who fails to reach
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sinner who reaches
      marker-yv: yv-n
    - type: text
      text: ' a hundred'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be considered accursed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: They will build houses and dwell in them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will plant vineyards and eat their fruit.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: No longer will they build houses and others live in them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or plant and others eat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For as the days of a tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so will be the days of my people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my chosen ones will long enjoy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the work of their hands.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: They will not labor in vain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will they bear children doomed to misfortune;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for they will be a people blessed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they and their descendants with them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Before they call I will answer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while they are still speaking I will hear.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The wolf and the lamb will feed together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the lion will eat straw like the ox,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dust will be the serpent’s food.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will neither harm nor destroy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on all my holy mountain,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: a people who continually provoke me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to my very face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: offering sacrifices in gardens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and burning incense on altars of brick;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: who sit among the graves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and spend their nights keeping secret vigil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who eat the flesh of pigs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whose pots hold broth of impure meat;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: who say, ‘Keep away; don’t come near me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am too sacred for you!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such people are smoke in my nostrils,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a fire that keeps burning all day.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“See, it stands written before me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not keep silent but will pay back in full;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will pay it back into their laps—
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: both your sins and the sins of your ancestors,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because they burned sacrifices on the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and defied me on the hills,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will measure into their laps
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the full payment for their former deeds.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As when juice is still found in a cluster of grapes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and people say, ‘Don’t destroy it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is still a blessing in it,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so will I do in behalf of my servants;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not destroy them all.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I will bring forth descendants from Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from Judah those who will possess my mountains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my chosen people will inherit them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there will my servants live.
