document_id: ISA.65,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment and Salvation
  - type: text
    content: “I revealed myself to those who did not ask for me;
  - type: text
    content: I was found by those who did not seek me.
  - type: text
    content: To a nation that did not call on my name,
  - type: text
    content: I said, ‘Here am I, here am I.’
  '10':
  - type: text
    content: Sharon will become a pasture for flocks,
  - type: text
    content: and the Valley of Achor a resting place for herds,
  - type: text
    content: for my people who seek me.
  '11':
  - type: text
    content: '“But as for you who forsake the '
  - type: text
    content: Lord
  - type: text
    content: and forget my holy mountain,
  - type: text
    content: who spread a table for Fortune
  - type: text
    content: and fill bowls of mixed wine for Destiny,
  '12':
  - type: text
    content: I will destine you for the sword,
  - type: text
    content: and all of you will fall in the slaughter;
  - type: text
    content: for I called but you did not answer,
  - type: text
    content: I spoke but you did not listen.
  - type: text
    content: You did evil in my sight
  - type: text
    content: and chose what displeases me.”
  '13':
  - type: text
    content: 'Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “My servants will eat,
  - type: text
    content: but you will go hungry;
  - type: text
    content: my servants will drink,
  - type: text
    content: but you will go thirsty;
  - type: text
    content: my servants will rejoice,
  - type: text
    content: but you will be put to shame.
  '14':
  - type: text
    content: My servants will sing
  - type: text
    content: out of the joy of their hearts,
  - type: text
    content: but you will cry out
  - type: text
    content: from anguish of heart
  - type: text
    content: and wail in brokenness of spirit.
  '15':
  - type: text
    content: You will leave your name
  - type: text
    content: for my chosen ones to use in their curses;
  - type: text
    content: 'the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' will put you to death,'
  - type: text
    content: but to his servants he will give another name.
  '16':
  - type: text
    content: Whoever invokes a blessing in the land
  - type: text
    content: will do so by the one true God;
  - type: text
    content: whoever takes an oath in the land
  - type: text
    content: will swear by the one true God.
  - type: text
    content: For the past troubles will be forgotten
  - type: text
    content: and hidden from my eyes.
  - type: heading
    content: New Heavens and a New Earth
  '17':
  - type: text
    content: “See, I will create
  - type: text
    content: new heavens and a new earth.
  - type: text
    content: The former things will not be remembered,
  - type: text
    content: nor will they come to mind.
  '18':
  - type: text
    content: But be glad and rejoice forever
  - type: text
    content: in what I will create,
  - type: text
    content: for I will create Jerusalem to be a delight
  - type: text
    content: and its people a joy.
  '19':
  - type: text
    content: I will rejoice over Jerusalem
  - type: text
    content: and take delight in my people;
  - type: text
    content: the sound of weeping and of crying
  - type: text
    content: will be heard in it no more.
  '2':
  - type: text
    content: All day long I have held out my hands
  - type: text
    content: to an obstinate people,
  - type: text
    content: who walk in ways not good,
  - type: text
    content: pursuing their own imaginations—
  '20':
  - type: text
    content: “Never again will there be in it
  - type: text
    content: an infant who lives but a few days,
  - type: text
    content: or an old man who does not live out his years;
  - type: text
    content: the one who dies at a hundred
  - type: text
    content: will be thought a mere child;
  - type: text
    content: the one who fails to reach
  - type: note
    content: Or the sinner who reaches
  - type: text
    content: ' a hundred'
  - type: text
    content: will be considered accursed.
  '21':
  - type: text
    content: They will build houses and dwell in them;
  - type: text
    content: they will plant vineyards and eat their fruit.
  '22':
  - type: text
    content: No longer will they build houses and others live in them,
  - type: text
    content: or plant and others eat.
  - type: text
    content: For as the days of a tree,
  - type: text
    content: so will be the days of my people;
  - type: text
    content: my chosen ones will long enjoy
  - type: text
    content: the work of their hands.
  '23':
  - type: text
    content: They will not labor in vain,
  - type: text
    content: nor will they bear children doomed to misfortune;
  - type: text
    content: 'for they will be a people blessed by the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: they and their descendants with them.
  '24':
  - type: text
    content: Before they call I will answer;
  - type: text
    content: while they are still speaking I will hear.
  '25':
  - type: text
    content: The wolf and the lamb will feed together,
  - type: text
    content: and the lion will eat straw like the ox,
  - type: text
    content: and dust will be the serpent’s food.
  - type: text
    content: They will neither harm nor destroy
  - type: text
    content: on all my holy mountain,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: a people who continually provoke me
  - type: text
    content: to my very face,
  - type: text
    content: offering sacrifices in gardens
  - type: text
    content: and burning incense on altars of brick;
  '4':
  - type: text
    content: who sit among the graves
  - type: text
    content: and spend their nights keeping secret vigil;
  - type: text
    content: who eat the flesh of pigs,
  - type: text
    content: and whose pots hold broth of impure meat;
  '5':
  - type: text
    content: who say, ‘Keep away; don’t come near me,
  - type: text
    content: for I am too sacred for you!’
  - type: text
    content: Such people are smoke in my nostrils,
  - type: text
    content: a fire that keeps burning all day.
  '6':
  - type: text
    content: '“See, it stands written before me:'
  - type: text
    content: I will not keep silent but will pay back in full;
  - type: text
    content: I will pay it back into their laps—
  '7':
  - type: text
    content: both your sins and the sins of your ancestors,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Because they burned sacrifices on the mountains
  - type: text
    content: and defied me on the hills,
  - type: text
    content: I will measure into their laps
  - type: text
    content: the full payment for their former deeds.”
  '8':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “As when juice is still found in a cluster of grapes
  - type: text
    content: and people say, ‘Don’t destroy it,
  - type: text
    content: there is still a blessing in it,’
  - type: text
    content: so will I do in behalf of my servants;
  - type: text
    content: I will not destroy them all.
  '9':
  - type: text
    content: I will bring forth descendants from Jacob,
  - type: text
    content: and from Judah those who will possess my mountains;
  - type: text
    content: my chosen people will inherit them,
  - type: text
    content: and there will my servants live.
