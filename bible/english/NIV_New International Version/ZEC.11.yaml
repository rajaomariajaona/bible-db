document_id: ZEC.11,111
type_code: eng
verses:
  '1':
  - type: text
    content: Open your doors, Lebanon,
  - type: text
    content: so that fire may devour your cedars!
  '10':
  - type: text
    content: 'Then I took my staff called Favor and broke it, revoking the covenant I had made with all the nations. '
  '11':
  - type: text
    content: 'It was revoked on that day, and so the oppressed of the flock who were watching me knew it was the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: I told them, “If you think it best, give me my pay; but if not, keep it.” So they paid me thirty pieces of silver.
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Throw it to the potter”—the handsome price at which they valued me! So I took the thirty pieces of silver and threw them to the potter at the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: Then I broke my second staff called Union, breaking the family bond between Judah and Israel.
  '15':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Take again the equipment of a foolish shepherd. '
  '16':
  - type: text
    content: For I am going to raise up a shepherd over the land who will not care for the lost, or seek the young, or heal the injured, or feed the healthy, but will eat the meat of the choice sheep, tearing off their hooves.
  '17':
  - type: text
    content: “Woe to the worthless shepherd,
  - type: text
    content: who deserts the flock!
  - type: text
    content: May the sword strike his arm and his right eye!
  - type: text
    content: May his arm be completely withered,
  - type: text
    content: his right eye totally blinded!”
  '2':
  - type: text
    content: Wail, you juniper, for the cedar has fallen;
  - type: text
    content: the stately trees are ruined!
  - type: text
    content: Wail, oaks of Bashan;
  - type: text
    content: the dense forest has been cut down!
  '3':
  - type: text
    content: Listen to the wail of the shepherds;
  - type: text
    content: their rich pastures are destroyed!
  - type: text
    content: Listen to the roar of the lions;
  - type: text
    content: the lush thicket of the Jordan is ruined!
  - type: heading
    content: Two Shepherds
  '4':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' my God says: “Shepherd the flock marked for slaughter. '
  '5':
  - type: text
    content: 'Their buyers slaughter them and go unpunished. Those who sell them say, ‘Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', I am rich!’ Their own shepherds do not spare them. '
  '6':
  - type: text
    content: 'For I will no longer have pity on the people of the land,” declares the '
  - type: text
    content: Lord
  - type: text
    content: . “I will give everyone into the hands of their neighbors and their king. They will devastate the land, and I will not rescue anyone from their hands.”
  '7':
  - type: text
    content: 'So I shepherded the flock marked for slaughter, particularly the oppressed of the flock. Then I took two staffs and called one Favor and the other Union, and I shepherded the flock. '
  '8':
  - type: text
    content: In one month I got rid of the three shepherds.
  - type: text
    content: 'The flock detested me, and I grew weary of them '
  '9':
  - type: text
    content: and said, “I will not be your shepherd. Let the dying die, and the perishing perish. Let those who are left eat one another’s flesh.”
