document_id: ZEC.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open your doors, Lebanon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that fire may devour your cedars!
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I took my staff called Favor and broke it, revoking the covenant I had made with all the nations. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was revoked on that day, and so the oppressed of the flock who were watching me knew it was the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I told them, “If you think it best, give me my pay; but if not, keep it.” So they paid me thirty pieces of silver.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Throw it to the potter”—the handsome price at which they valued me! So I took the thirty pieces of silver and threw them to the potter at the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I broke my second staff called Union, breaking the family bond between Judah and Israel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Take again the equipment of a foolish shepherd. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For I am going to raise up a shepherd over the land who will not care for the lost, or seek the young, or heal the injured, or feed the healthy, but will eat the meat of the choice sheep, tearing off their hooves.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to the worthless shepherd,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who deserts the flock!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the sword strike his arm and his right eye!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May his arm be completely withered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his right eye totally blinded!”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, you juniper, for the cedar has fallen;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the stately trees are ruined!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wail, oaks of Bashan;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the dense forest has been cut down!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to the wail of the shepherds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their rich pastures are destroyed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to the roar of the lions;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the lush thicket of the Jordan is ruined!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Two Shepherds
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God says: “Shepherd the flock marked for slaughter. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their buyers slaughter them and go unpunished. Those who sell them say, ‘Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I am rich!’ Their own shepherds do not spare them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I will no longer have pity on the people of the land,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . “I will give everyone into the hands of their neighbors and their king. They will devastate the land, and I will not rescue anyone from their hands.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I shepherded the flock marked for slaughter, particularly the oppressed of the flock. Then I took two staffs and called one Favor and the other Union, and I shepherded the flock. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In one month I got rid of the three shepherds.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The flock detested me, and I grew weary of them '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and said, “I will not be your shepherd. Let the dying die, and the perishing perish. Let those who are left eat one another’s flesh.”
