document_id: NUM.24
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when Balaam saw that it pleased the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to bless Israel, he did not resort to divination as at other times, but turned his face toward the wilderness. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When Balaam looked out and saw Israel encamped tribe by tribe, the Spirit of God came on him '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and he spoke his message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The prophecy of Balaam son of Beor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the prophecy of one whose eye sees clearly,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: the prophecy of one who hears the words of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who sees a vision from the Almighty,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shaddai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 16
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who falls prostrate, and whose eyes are opened:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “How beautiful are your tents, Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your dwelling places, Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Like valleys they spread out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like gardens beside a river,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'like aloes planted by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: like cedars beside the waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Water will flow from their buckets;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their seed will have abundant water.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Their king will be greater than Agag;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their kingdom will be exalted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “God brought them out of Egypt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have the strength of a wild ox.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They devour hostile nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: and break their bones in pieces;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with their arrows they pierce them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Like a lion they crouch and lie down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a lioness—who dares to rouse them?
- type: usfm
  marker: q1
  children:
  - type: text
    text: “May those who bless you be blessed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who curse you be cursed!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Balak’s anger burned against Balaam. He struck his hands together and said to him, “I summoned you to curse my enemies, but you have blessed them these three times. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now leave at once and go home! I said I would reward you handsomely, but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has kept you from being rewarded.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Balaam answered Balak, “Did I not tell the messengers you sent me, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '‘Even if Balak gave me all the silver and gold in his palace, I could not do anything of my own accord, good or bad, to go beyond the command of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '—and I must say only what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says’? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Now I am going back to my people, but come, let me warn you of what this people will do to your people in days to come.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s Fourth Message
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then he spoke his message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The prophecy of Balaam son of Beor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the prophecy of one whose eye sees clearly,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: the prophecy of one who hears the words of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who has knowledge from the Most High,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who sees a vision from the Almighty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who falls prostrate, and whose eyes are opened:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “I see him, but not now;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I behold him, but not near.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A star will come out of Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a scepter will rise out of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will crush the foreheads of Moab,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the skulls
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Samaritan Pentateuch (see also Jer. 48:45); the meaning of the word in the Masoretic Text is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' of'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or possibly '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Moab, / batter
    marker-yv: yv-n
  - type: text
    text: ' all the people of Sheth.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: all the noisy boasters
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Edom will be conquered;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Seir, his enemy, will be conquered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but Israel will grow strong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A ruler will come out of Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy the survivors of the city.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s Fifth Message
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Then Balaam saw Amalek and spoke his message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Amalek was first among the nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but their end will be utter destruction.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s Sixth Message
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then he saw the Kenites and spoke his message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your dwelling place is secure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your nest is set in a rock;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: yet you Kenites will be destroyed
- type: usfm
  marker: q2
  children:
  - type: text
    text: when Ashur takes you captive.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Balaam’s Seventh Message
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then he spoke his message:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Alas! Who can live when God does this?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text; with a different word division of the Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The people from the islands will gather from the north.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ships will come from the shores of Cyprus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will subdue Ashur and Eber,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they too will come to ruin.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Balaam got up and returned home, and Balak went his own way.
