document_id: NUM.24,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now when Balaam saw that it pleased the '
  - type: text
    content: Lord
  - type: text
    content: ' to bless Israel, he did not resort to divination as at other times, but turned his face toward the wilderness. '
  '10':
  - type: text
    content: 'Then Balak’s anger burned against Balaam. He struck his hands together and said to him, “I summoned you to curse my enemies, but you have blessed them these three times. '
  '11':
  - type: text
    content: 'Now leave at once and go home! I said I would reward you handsomely, but the '
  - type: text
    content: Lord
  - type: text
    content: ' has kept you from being rewarded.”'
  '12':
  - type: text
    content: 'Balaam answered Balak, “Did I not tell the messengers you sent me, '
  '13':
  - type: text
    content: '‘Even if Balak gave me all the silver and gold in his palace, I could not do anything of my own accord, good or bad, to go beyond the command of the '
  - type: text
    content: Lord
  - type: text
    content: '—and I must say only what the '
  - type: text
    content: Lord
  - type: text
    content: ' says’? '
  '14':
  - type: text
    content: Now I am going back to my people, but come, let me warn you of what this people will do to your people in days to come.”
  - type: heading
    content: Balaam’s Fourth Message
  '15':
  - type: text
    content: 'Then he spoke his message:'
  - type: text
    content: “The prophecy of Balaam son of Beor,
  - type: text
    content: the prophecy of one whose eye sees clearly,
  '16':
  - type: text
    content: the prophecy of one who hears the words of God,
  - type: text
    content: who has knowledge from the Most High,
  - type: text
    content: who sees a vision from the Almighty,
  - type: text
    content: 'who falls prostrate, and whose eyes are opened:'
  '17':
  - type: text
    content: “I see him, but not now;
  - type: text
    content: I behold him, but not near.
  - type: text
    content: A star will come out of Jacob;
  - type: text
    content: a scepter will rise out of Israel.
  - type: text
    content: He will crush the foreheads of Moab,
  - type: text
    content: the skulls
  - type: note
    content: Samaritan Pentateuch (see also Jer. 48:45); the meaning of the word in the Masoretic Text is uncertain.
  - type: text
    content: ' of'
  - type: note
    content: Or possibly Moab, / batter
  - type: text
    content: ' all the people of Sheth.'
  - type: note
    content: Or all the noisy boasters
  '18':
  - type: text
    content: Edom will be conquered;
  - type: text
    content: Seir, his enemy, will be conquered,
  - type: text
    content: but Israel will grow strong.
  '19':
  - type: text
    content: A ruler will come out of Jacob
  - type: text
    content: and destroy the survivors of the city.”
  - type: heading
    content: Balaam’s Fifth Message
  '2':
  - type: text
    content: 'When Balaam looked out and saw Israel encamped tribe by tribe, the Spirit of God came on him '
  '20':
  - type: text
    content: 'Then Balaam saw Amalek and spoke his message:'
  - type: text
    content: “Amalek was first among the nations,
  - type: text
    content: but their end will be utter destruction.”
  - type: heading
    content: Balaam’s Sixth Message
  '21':
  - type: text
    content: 'Then he saw the Kenites and spoke his message:'
  - type: text
    content: “Your dwelling place is secure,
  - type: text
    content: your nest is set in a rock;
  '22':
  - type: text
    content: yet you Kenites will be destroyed
  - type: text
    content: when Ashur takes you captive.”
  - type: heading
    content: Balaam’s Seventh Message
  '23':
  - type: text
    content: 'Then he spoke his message:'
  - type: text
    content: “Alas! Who can live when God does this?
  - type: note
    content: Masoretic Text; with a different word division of the Hebrew The people from the islands will gather from the north.
  '24':
  - type: text
    content: Ships will come from the shores of Cyprus;
  - type: text
    content: they will subdue Ashur and Eber,
  - type: text
    content: but they too will come to ruin.”
  '25':
  - type: text
    content: Then Balaam got up and returned home, and Balak went his own way.
  '3':
  - type: text
    content: 'and he spoke his message:'
  - type: text
    content: “The prophecy of Balaam son of Beor,
  - type: text
    content: the prophecy of one whose eye sees clearly,
  '4':
  - type: text
    content: the prophecy of one who hears the words of God,
  - type: text
    content: who sees a vision from the Almighty,
  - type: note
    content: Hebrew Shaddai; also in verse 16
  - type: text
    content: 'who falls prostrate, and whose eyes are opened:'
  '5':
  - type: text
    content: “How beautiful are your tents, Jacob,
  - type: text
    content: your dwelling places, Israel!
  '6':
  - type: text
    content: “Like valleys they spread out,
  - type: text
    content: like gardens beside a river,
  - type: text
    content: 'like aloes planted by the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: like cedars beside the waters.
  '7':
  - type: text
    content: Water will flow from their buckets;
  - type: text
    content: their seed will have abundant water.
  - type: text
    content: “Their king will be greater than Agag;
  - type: text
    content: their kingdom will be exalted.
  '8':
  - type: text
    content: “God brought them out of Egypt;
  - type: text
    content: they have the strength of a wild ox.
  - type: text
    content: They devour hostile nations
  - type: text
    content: and break their bones in pieces;
  - type: text
    content: with their arrows they pierce them.
  '9':
  - type: text
    content: Like a lion they crouch and lie down,
  - type: text
    content: like a lioness—who dares to rouse them?
  - type: text
    content: “May those who bless you be blessed
  - type: text
    content: and those who curse you be cursed!”
