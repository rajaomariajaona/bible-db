document_id: 1PE.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Wives, in the same way submit yourselves to your own husbands so that, if any of them do not believe the word, they may be won over without words by the behavior of their wives, '
  '10':
  - type: text
    content: For,
  - type: text
    content: “Whoever would love life
  - type: text
    content: and see good days
  - type: text
    content: must keep their tongue from evil
  - type: text
    content: and their lips from deceitful speech.
  '11':
  - type: text
    content: They must turn from evil and do good;
  - type: text
    content: they must seek peace and pursue it.
  '12':
  - type: text
    content: For the eyes of the Lord are on the righteous
  - type: text
    content: and his ears are attentive to their prayer,
  - type: text
    content: but the face of the Lord is against those who do evil.”
  - type: note
    content: Psalm 34:12-16
  '13':
  - type: text
    content: 'Who is going to harm you if you are eager to do good? '
  '14':
  - type: text
    content: But even if you should suffer for what is right, you are blessed. “Do not fear their threats
  - type: note
    content: Or fear what they fear
  - type: text
    content: ; do not be frightened.”
  - type: note
    content: Isaiah 8:12
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'But in your hearts revere Christ as Lord. Always be prepared to give an answer to everyone who asks you to give the reason for the hope that you have. But do this with gentleness and respect, '
  '16':
  - type: text
    content: 'keeping a clear conscience, so that those who speak maliciously against your good behavior in Christ may be ashamed of their slander. '
  '17':
  - type: text
    content: 'For it is better, if it is God’s will, to suffer for doing good than for doing evil. '
  '18':
  - type: text
    content: 'For Christ also suffered once for sins, the righteous for the unrighteous, to bring you to God. He was put to death in the body but made alive in the Spirit. '
  '19':
  - type: text
    content: After being made alive,
  - type: note
    content: Or but made alive in the spirit, 19 in which also
  - type: text
    content: ' he went and made proclamation to the imprisoned spirits— '
  '2':
  - type: text
    content: 'when they see the purity and reverence of your lives. '
  '20':
  - type: text
    content: 'to those who were disobedient long ago when God waited patiently in the days of Noah while the ark was being built. In it only a few people, eight in all, were saved through water, '
  '21':
  - type: text
    content: and this water symbolizes baptism that now saves you also—not the removal of dirt from the body but the pledge of a clear conscience toward God.
  - type: note
    content: Or but an appeal to God for a clear conscience
  - type: text
    content: ' It saves you by the resurrection of Jesus Christ, '
  '22':
  - type: text
    content: who has gone into heaven and is at God’s right hand—with angels, authorities and powers in submission to him.
  '3':
  - type: text
    content: 'Your beauty should not come from outward adornment, such as elaborate hairstyles and the wearing of gold jewelry or fine clothes. '
  '4':
  - type: text
    content: 'Rather, it should be that of your inner self, the unfading beauty of a gentle and quiet spirit, which is of great worth in God’s sight. '
  '5':
  - type: text
    content: 'For this is the way the holy women of the past who put their hope in God used to adorn themselves. They submitted themselves to their own husbands, '
  '6':
  - type: text
    content: like Sarah, who obeyed Abraham and called him her lord. You are her daughters if you do what is right and do not give way to fear.
  '7':
  - type: text
    content: Husbands, in the same way be considerate as you live with your wives, and treat them with respect as the weaker partner and as heirs with you of the gracious gift of life, so that nothing will hinder your prayers.
  - type: heading
    content: Suffering for Doing Good
  '8':
  - type: text
    content: 'Finally, all of you, be like-minded, be sympathetic, love one another, be compassionate and humble. '
  '9':
  - type: text
    content: 'Do not repay evil with evil or insult with insult. On the contrary, repay evil with blessing, because to this you were called so that you may inherit a blessing. '
