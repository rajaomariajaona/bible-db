document_id: 1SA.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David and Goliath
  - type: text
    content: 'Now the Philistines gathered their forces for war and assembled at Sokoh in Judah. They pitched camp at Ephes Dammim, between Sokoh and Azekah. '
  '10':
  - type: text
    content: 'Then the Philistine said, “This day I defy the armies of Israel! Give me a man and let us fight each other.” '
  '11':
  - type: text
    content: On hearing the Philistine’s words, Saul and all the Israelites were dismayed and terrified.
  '12':
  - type: text
    content: 'Now David was the son of an Ephrathite named Jesse, who was from Bethlehem in Judah. Jesse had eight sons, and in Saul’s time he was very old. '
  '13':
  - type: text
    content: 'Jesse’s three oldest sons had followed Saul to the war: The firstborn was Eliab; the second, Abinadab; and the third, Shammah. '
  '14':
  - type: text
    content: 'David was the youngest. The three oldest followed Saul, '
  '15':
  - type: text
    content: but David went back and forth from Saul to tend his father’s sheep at Bethlehem.
  '16':
  - type: text
    content: For forty days the Philistine came forward every morning and evening and took his stand.
  '17':
  - type: text
    content: Now Jesse said to his son David, “Take this ephah
  - type: note
    content: That is, probably about 36 pounds or about 16 kilograms
  - type: text
    content: ' of roasted grain and these ten loaves of bread for your brothers and hurry to their camp. '
  '18':
  - type: text
    content: Take along these ten cheeses to the commander of their unit. See how your brothers are and bring back some assurance
  - type: note
    content: Or some token; or some pledge of spoils
  - type: text
    content: ' from them. '
  '19':
  - type: text
    content: They are with Saul and all the men of Israel in the Valley of Elah, fighting against the Philistines.”
  '2':
  - type: text
    content: 'Saul and the Israelites assembled and camped in the Valley of Elah and drew up their battle line to meet the Philistines. '
  '20':
  - type: text
    content: 'Early in the morning David left the flock in the care of a shepherd, loaded up and set out, as Jesse had directed. He reached the camp as the army was going out to its battle positions, shouting the war cry. '
  '21':
  - type: text
    content: 'Israel and the Philistines were drawing up their lines facing each other. '
  '22':
  - type: text
    content: 'David left his things with the keeper of supplies, ran to the battle lines and asked his brothers how they were. '
  '23':
  - type: text
    content: 'As he was talking with them, Goliath, the Philistine champion from Gath, stepped out from his lines and shouted his usual defiance, and David heard it. '
  '24':
  - type: text
    content: Whenever the Israelites saw the man, they all fled from him in great fear.
  '25':
  - type: text
    content: Now the Israelites had been saying, “Do you see how this man keeps coming out? He comes out to defy Israel. The king will give great wealth to the man who kills him. He will also give him his daughter in marriage and will exempt his family from taxes in Israel.”
  '26':
  - type: text
    content: David asked the men standing near him, “What will be done for the man who kills this Philistine and removes this disgrace from Israel? Who is this uncircumcised Philistine that he should defy the armies of the living God?”
  '27':
  - type: text
    content: They repeated to him what they had been saying and told him, “This is what will be done for the man who kills him.”
  '28':
  - type: text
    content: When Eliab, David’s oldest brother, heard him speaking with the men, he burned with anger at him and asked, “Why have you come down here? And with whom did you leave those few sheep in the wilderness? I know how conceited you are and how wicked your heart is; you came down only to watch the battle.”
  '29':
  - type: text
    content: '“Now what have I done?” said David. “Can’t I even speak?” '
  '3':
  - type: text
    content: The Philistines occupied one hill and the Israelites another, with the valley between them.
  '30':
  - type: text
    content: 'He then turned away to someone else and brought up the same matter, and the men answered him as before. '
  '31':
  - type: text
    content: What David said was overheard and reported to Saul, and Saul sent for him.
  '32':
  - type: text
    content: David said to Saul, “Let no one lose heart on account of this Philistine; your servant will go and fight him.”
  '33':
  - type: text
    content: Saul replied, “You are not able to go out against this Philistine and fight him; you are only a young man, and he has been a warrior from his youth.”
  '34':
  - type: text
    content: 'But David said to Saul, “Your servant has been keeping his father’s sheep. When a lion or a bear came and carried off a sheep from the flock, '
  '35':
  - type: text
    content: 'I went after it, struck it and rescued the sheep from its mouth. When it turned on me, I seized it by its hair, struck it and killed it. '
  '36':
  - type: text
    content: 'Your servant has killed both the lion and the bear; this uncircumcised Philistine will be like one of them, because he has defied the armies of the living God. '
  '37':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' who rescued me from the paw of the lion and the paw of the bear will rescue me from the hand of this Philistine.”'
  - type: text
    content: 'Saul said to David, “Go, and the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you.”'
  '38':
  - type: text
    content: 'Then Saul dressed David in his own tunic. He put a coat of armor on him and a bronze helmet on his head. '
  '39':
  - type: text
    content: David fastened on his sword over the tunic and tried walking around, because he was not used to them.
  - type: text
    content: '“I cannot go in these,” he said to Saul, “because I am not used to them.” So he took them off. '
  '4':
  - type: text
    content: A champion named Goliath, who was from Gath, came out of the Philistine camp. His height was six cubits and a span.
  - type: note
    content: That is, about 9 feet 9 inches or about 3 meters
  - type: text
    content: ' '
  '40':
  - type: text
    content: Then he took his staff in his hand, chose five smooth stones from the stream, put them in the pouch of his shepherd’s bag and, with his sling in his hand, approached the Philistine.
  '41':
  - type: text
    content: 'Meanwhile, the Philistine, with his shield bearer in front of him, kept coming closer to David. '
  '42':
  - type: text
    content: 'He looked David over and saw that he was little more than a boy, glowing with health and handsome, and he despised him. '
  '43':
  - type: text
    content: 'He said to David, “Am I a dog, that you come at me with sticks?” And the Philistine cursed David by his gods. '
  '44':
  - type: text
    content: “Come here,” he said, “and I’ll give your flesh to the birds and the wild animals!”
  '45':
  - type: text
    content: 'David said to the Philistine, “You come against me with sword and spear and javelin, but I come against you in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of the armies of Israel, whom you have defied. '
  '46':
  - type: text
    content: 'This day the '
  - type: text
    content: Lord
  - type: text
    content: ' will deliver you into my hands, and I’ll strike you down and cut off your head. This very day I will give the carcasses of the Philistine army to the birds and the wild animals, and the whole world will know that there is a God in Israel. '
  '47':
  - type: text
    content: 'All those gathered here will know that it is not by sword or spear that the '
  - type: text
    content: Lord
  - type: text
    content: ' saves; for the battle is the '
  - type: text
    content: Lord
  - type: text
    content: ’s, and he will give all of you into our hands.”
  '48':
  - type: text
    content: 'As the Philistine moved closer to attack him, David ran quickly toward the battle line to meet him. '
  '49':
  - type: text
    content: Reaching into his bag and taking out a stone, he slung it and struck the Philistine on the forehead. The stone sank into his forehead, and he fell facedown on the ground.
  '5':
  - type: text
    content: He had a bronze helmet on his head and wore a coat of scale armor of bronze weighing five thousand shekels
  - type: note
    content: That is, about 125 pounds or about 58 kilograms
  - type: text
    content: '; '
  '50':
  - type: text
    content: So David triumphed over the Philistine with a sling and a stone; without a sword in his hand he struck down the Philistine and killed him.
  '51':
  - type: text
    content: David ran and stood over him. He took hold of the Philistine’s sword and drew it from the sheath. After he killed him, he cut off his head with the sword.
  - type: text
    content: 'When the Philistines saw that their hero was dead, they turned and ran. '
  '52':
  - type: text
    content: Then the men of Israel and Judah surged forward with a shout and pursued the Philistines to the entrance of Gath
  - type: note
    content: Some Septuagint manuscripts; Hebrew of a valley
  - type: text
    content: ' and to the gates of Ekron. Their dead were strewn along the Shaaraim road to Gath and Ekron. '
  '53':
  - type: text
    content: When the Israelites returned from chasing the Philistines, they plundered their camp.
  '54':
  - type: text
    content: David took the Philistine’s head and brought it to Jerusalem; he put the Philistine’s weapons in his own tent.
  '55':
  - type: text
    content: As Saul watched David going out to meet the Philistine, he said to Abner, commander of the army, “Abner, whose son is that young man?”
  - type: text
    content: Abner replied, “As surely as you live, Your Majesty, I don’t know.”
  '56':
  - type: text
    content: The king said, “Find out whose son this young man is.”
  '57':
  - type: text
    content: As soon as David returned from killing the Philistine, Abner took him and brought him before Saul, with David still holding the Philistine’s head.
  '58':
  - type: text
    content: “Whose son are you, young man?” Saul asked him.
  - type: text
    content: David said, “I am the son of your servant Jesse of Bethlehem.”
  '6':
  - type: text
    content: 'on his legs he wore bronze greaves, and a bronze javelin was slung on his back. '
  '7':
  - type: text
    content: His spear shaft was like a weaver’s rod, and its iron point weighed six hundred shekels.
  - type: note
    content: That is, about 15 pounds or about 6.9 kilograms
  - type: text
    content: ' His shield bearer went ahead of him.'
  '8':
  - type: text
    content: 'Goliath stood and shouted to the ranks of Israel, “Why do you come out and line up for battle? Am I not a Philistine, and are you not the servants of Saul? Choose a man and have him come down to me. '
  '9':
  - type: text
    content: 'If he is able to fight and kill me, we will become your subjects; but if I overcome him and kill him, you will become our subjects and serve us.” '
