document_id: NUM.16,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Korah, Dathan and Abiram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Korah son of Izhar, the son of Kohath, the son of Levi, and certain Reubenites—Dathan and Abiram, sons of Eliab, and On son of Peleth—became insolent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Peleth—took men
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He has brought you and all your fellow Levites near himself, but now you are trying to get the priesthood too. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that you and all your followers have banded together. Who is Aaron that you should grumble against him?”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses summoned Dathan and Abiram, the sons of Eliab. But they said, “We will not come! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isn’t it enough that you have brought us up out of a land flowing with milk and honey to kill us in the wilderness? And now you also want to lord it over us! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moreover, you haven’t brought us into a land flowing with milk and honey or given us an inheritance of fields and vineyards. Do you want to treat these men like slaves
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to deceive these men
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Will you gouge out the eyes of these men
      marker-yv: yv-n
    - type: text
      text: '? No, we will not come!”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses became very angry and said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Do not accept their offering. I have not taken so much as a donkey from them, nor have I wronged any of them.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses said to Korah, “You and all your followers are to appear before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tomorrow—you and they and Aaron. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each man is to take his censer and put incense in it—250 censers in all—and present it before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. You and Aaron are to present your censers also.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So each of them took his censer, put burning coals and incense in it, and stood with Moses and Aaron at the entrance to the tent of meeting. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Korah had gathered all his followers in opposition to them at the entrance to the tent of meeting, the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to the entire assembly. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and rose up against Moses. With them were 250 Israelite men, well-known community leaders who had been appointed members of the council. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses and Aaron, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Separate yourselves from this assembly so I can put an end to them at once.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Moses and Aaron fell facedown and cried out, “O God, the God who gives breath to all living things, will you be angry with the entire assembly when only one man sins?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Say to the assembly, ‘Move away from the tents of Korah, Dathan and Abiram.’ ”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses got up and went to Dathan and Abiram, and the elders of Israel followed him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He warned the assembly, “Move back from the tents of these wicked men! Do not touch anything belonging to them, or you will be swept away because of all their sins.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they moved away from the tents of Korah, Dathan and Abiram. Dathan and Abiram had come out and were standing with their wives, children and little ones at the entrances to their tents.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said, “This is how you will know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sent me to do all these things and that it was not my idea: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If these men die a natural death and suffer the fate of all mankind, then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not sent me. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They came as a group to oppose Moses and Aaron and said to them, “You have gone too far! The whole community is holy, every one of them, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is with them. Why then do you set yourselves above the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s assembly?”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brings about something totally new, and the earth opens its mouth and swallows them, with everything that belongs to them, and they go down alive into the realm of the dead, then you will know that these men have treated the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with contempt.”'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as he finished saying all this, the ground under them split apart '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the earth opened its mouth and swallowed them and their households, and all those associated with Korah, together with their possessions. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went down alive into the realm of the dead, with everything they owned; the earth closed over them, and they perished and were gone from the community. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At their cries, all the Israelites around them fled, shouting, “The earth is going to swallow us too!”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And fire came out from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and consumed the 250 men who were offering the incense.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Tell Eleazar son of Aaron, the priest, to remove the censers from the charred remains and scatter the coals some distance away, for the censers are holy— '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the censers of the men who sinned at the cost of their lives. Hammer the censers into sheets to overlay the altar, for they were presented before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and have become holy. Let them be a sign to the Israelites.”'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Eleazar the priest collected the bronze censers brought by those who had been burned to death, and he had them hammered out to overlay the altar, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Moses heard this, he fell facedown. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' directed him through Moses. This was to remind the Israelites that no one except a descendant of Aaron should come to burn incense before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', or he would become like Korah and his followers.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day the whole Israelite community grumbled against Moses and Aaron. “You have killed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s people,” they said.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the assembly gathered in opposition to Moses and Aaron and turned toward the tent of meeting, suddenly the cloud covered it and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses and Aaron went to the front of the tent of meeting, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Get away from this assembly so I can put an end to them at once.” And they fell facedown.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to Aaron, “Take your censer and put incense in it, along with burning coals from the altar, and hurry to the assembly to make atonement for them. Wrath has come out from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; the plague has started.” '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Aaron did as Moses said, and ran into the midst of the assembly. The plague had already started among the people, but Aaron offered the incense and made atonement for them. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He stood between the living and the dead, and the plague stopped. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But 14,700 people died from the plague, in addition to those who had died because of Korah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to Korah and all his followers: “In the morning the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will show who belongs to him and who is holy, and he will have that person come near him. The man he chooses he will cause to come near him. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Aaron returned to Moses at the entrance to the tent of meeting, for the plague had stopped.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 16:36-50 is numbered 17:1-15.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You, Korah, and all your followers are to do this: Take censers '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and tomorrow put burning coals and incense in them before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. The man the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' chooses will be the one who is holy. You Levites have gone too far!”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses also said to Korah, “Now listen, you Levites! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isn’t it enough for you that the God of Israel has separated you from the rest of the Israelite community and brought you near himself to do the work at the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s tabernacle and to stand before the community and minister to them? '
