document_id: 1KI.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Preparations for Building the Temple
  - type: note
    content: In Hebrew texts 5:1-18 is numbered 5:15-32.
  - type: text
    content: 'When Hiram king of Tyre heard that Solomon had been anointed king to succeed his father David, he sent his envoys to Solomon, because he had always been on friendly terms with David. '
  '10':
  - type: text
    content: 'In this way Hiram kept Solomon supplied with all the cedar and juniper logs he wanted, '
  '11':
  - type: text
    content: and Solomon gave Hiram twenty thousand cors
  - type: note
    content: That is, probably about 3,600 tons or about 3,250 metric tons
  - type: text
    content: ' of wheat as food for his household, in addition to twenty thousand baths'
  - type: note
    content: Septuagint (see also 2 Chron. 2:10); Hebrew twenty cors
  - type: note
    content: That is, about 120,000 gallons or about 440,000 liters
  - type: text
    content: ' of pressed olive oil. Solomon continued to do this for Hiram year after year. '
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gave Solomon wisdom, just as he had promised him. There were peaceful relations between Hiram and Solomon, and the two of them made a treaty.'
  '13':
  - type: text
    content: 'King Solomon conscripted laborers from all Israel—thirty thousand men. '
  '14':
  - type: text
    content: 'He sent them off to Lebanon in shifts of ten thousand a month, so that they spent one month in Lebanon and two months at home. Adoniram was in charge of the forced labor. '
  '15':
  - type: text
    content: 'Solomon had seventy thousand carriers and eighty thousand stonecutters in the hills, '
  '16':
  - type: text
    content: as well as thirty-three hundred
  - type: note
    content: Hebrew; some Septuagint manuscripts (see also 2 Chron. 2:2,18) thirty-six hundred
  - type: text
    content: ' foremen who supervised the project and directed the workers. '
  '17':
  - type: text
    content: 'At the king’s command they removed from the quarry large blocks of high-grade stone to provide a foundation of dressed stone for the temple. '
  '18':
  - type: text
    content: The craftsmen of Solomon and Hiram and workers from Byblos cut and prepared the timber and stone for the building of the temple.
  '2':
  - type: text
    content: 'Solomon sent back this message to Hiram:'
  '3':
  - type: text
    content: '“You know that because of the wars waged against my father David from all sides, he could not build a temple for the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God until the '
  - type: text
    content: Lord
  - type: text
    content: ' put his enemies under his feet. '
  '4':
  - type: text
    content: 'But now the '
  - type: text
    content: Lord
  - type: text
    content: ' my God has given me rest on every side, and there is no adversary or disaster. '
  '5':
  - type: text
    content: 'I intend, therefore, to build a temple for the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God, as the '
  - type: text
    content: Lord
  - type: text
    content: ' told my father David, when he said, ‘Your son whom I will put on the throne in your place will build the temple for my Name.’'
  '6':
  - type: text
    content: “So give orders that cedars of Lebanon be cut for me. My men will work with yours, and I will pay you for your men whatever wages you set. You know that we have no one so skilled in felling timber as the Sidonians.”
  '7':
  - type: text
    content: 'When Hiram heard Solomon’s message, he was greatly pleased and said, “Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ' today, for he has given David a wise son to rule over this great nation.”'
  '8':
  - type: text
    content: 'So Hiram sent word to Solomon:'
  - type: text
    content: '“I have received the message you sent me and will do all you want in providing the cedar and juniper logs. '
  '9':
  - type: text
    content: My men will haul them down from Lebanon to the Mediterranean Sea, and I will float them as rafts by sea to the place you specify. There I will separate them and you can take them away. And you are to grant my wish by providing food for my royal household.”
