document_id: PSA.43,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 43In many Hebrew manuscripts Psalms 42 and 43 constitute one psalm.
  - type: text
    content: Vindicate me, my God,
  - type: text
    content: and plead my cause
  - type: text
    content: against an unfaithful nation.
  - type: text
    content: Rescue me from those who are
  - type: text
    content: deceitful and wicked.
  '2':
  - type: text
    content: You are God my stronghold.
  - type: text
    content: Why have you rejected me?
  - type: text
    content: Why must I go about mourning,
  - type: text
    content: oppressed by the enemy?
  '3':
  - type: text
    content: Send me your light and your faithful care,
  - type: text
    content: let them lead me;
  - type: text
    content: let them bring me to your holy mountain,
  - type: text
    content: to the place where you dwell.
  '4':
  - type: text
    content: Then I will go to the altar of God,
  - type: text
    content: to God, my joy and my delight.
  - type: text
    content: I will praise you with the lyre,
  - type: text
    content: O God, my God.
  '5':
  - type: text
    content: Why, my soul, are you downcast?
  - type: text
    content: Why so disturbed within me?
  - type: text
    content: Put your hope in God,
  - type: text
    content: for I will yet praise him,
  - type: text
    content: my Savior and my God.
