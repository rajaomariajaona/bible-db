document_id: PSA.43
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 43
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In many Hebrew manuscripts Psalms 42 and 43 constitute one psalm.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Vindicate me, my God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and plead my cause
- type: usfm
  marker: q2
  children:
  - type: text
    text: against an unfaithful nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rescue me from those who are
- type: usfm
  marker: q2
  children:
  - type: text
    text: deceitful and wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You are God my stronghold.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why have you rejected me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why must I go about mourning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: oppressed by the enemy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Send me your light and your faithful care,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them lead me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: let them bring me to your holy mountain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the place where you dwell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then I will go to the altar of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to God, my joy and my delight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will praise you with the lyre,
- type: usfm
  marker: q2
  children:
  - type: text
    text: O God, my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Why, my soul, are you downcast?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why so disturbed within me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put your hope in God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I will yet praise him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my Savior and my God.
