document_id: JAS.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Favoritism Forbidden
  - type: text
    content: 'My brothers and sisters, believers in our glorious Lord Jesus Christ must not show favoritism. '
  '10':
  - type: text
    content: 'For whoever keeps the whole law and yet stumbles at just one point is guilty of breaking all of it. '
  '11':
  - type: text
    content: For he who said, “You shall not commit adultery,”
  - type: note
    content: Exodus 20:14; Deut. 5:18
  - type: text
    content: ' also said, “You shall not murder.”'
  - type: note
    content: Exodus 20:13; Deut. 5:17
  - type: text
    content: ' If you do not commit adultery but do commit murder, you have become a lawbreaker.'
  '12':
  - type: text
    content: 'Speak and act as those who are going to be judged by the law that gives freedom, '
  '13':
  - type: text
    content: because judgment without mercy will be shown to anyone who has not been merciful. Mercy triumphs over judgment.
  - type: heading
    content: Faith and Deeds
  '14':
  - type: text
    content: 'What good is it, my brothers and sisters, if someone claims to have faith but has no deeds? Can such faith save them? '
  '15':
  - type: text
    content: 'Suppose a brother or a sister is without clothes and daily food. '
  '16':
  - type: text
    content: 'If one of you says to them, “Go in peace; keep warm and well fed,” but does nothing about their physical needs, what good is it? '
  '17':
  - type: text
    content: In the same way, faith by itself, if it is not accompanied by action, is dead.
  '18':
  - type: text
    content: But someone will say, “You have faith; I have deeds.”
  - type: text
    content: 'Show me your faith without deeds, and I will show you my faith by my deeds. '
  '19':
  - type: text
    content: You believe that there is one God. Good! Even the demons believe that—and shudder.
  '2':
  - type: text
    content: 'Suppose a man comes into your meeting wearing a gold ring and fine clothes, and a poor man in filthy old clothes also comes in. '
  '20':
  - type: text
    content: You foolish person, do you want evidence that faith without deeds is useless
  - type: note
    content: Some early manuscripts dead
  - type: text
    content: '? '
  '21':
  - type: text
    content: 'Was not our father Abraham considered righteous for what he did when he offered his son Isaac on the altar? '
  '22':
  - type: text
    content: 'You see that his faith and his actions were working together, and his faith was made complete by what he did. '
  '23':
  - type: text
    content: And the scripture was fulfilled that says, “Abraham believed God, and it was credited to him as righteousness,”
  - type: note
    content: Gen. 15:6
  - type: text
    content: ' and he was called God’s friend. '
  '24':
  - type: text
    content: You see that a person is considered righteous by what they do and not by faith alone.
  '25':
  - type: text
    content: 'In the same way, was not even Rahab the prostitute considered righteous for what she did when she gave lodging to the spies and sent them off in a different direction? '
  '26':
  - type: text
    content: As the body without the spirit is dead, so faith without deeds is dead.
  '3':
  - type: text
    content: 'If you show special attention to the man wearing fine clothes and say, “Here’s a good seat for you,” but say to the poor man, “You stand there” or “Sit on the floor by my feet,” '
  '4':
  - type: text
    content: have you not discriminated among yourselves and become judges with evil thoughts?
  '5':
  - type: text
    content: 'Listen, my dear brothers and sisters: Has not God chosen those who are poor in the eyes of the world to be rich in faith and to inherit the kingdom he promised those who love him? '
  '6':
  - type: text
    content: 'But you have dishonored the poor. Is it not the rich who are exploiting you? Are they not the ones who are dragging you into court? '
  '7':
  - type: text
    content: Are they not the ones who are blaspheming the noble name of him to whom you belong?
  '8':
  - type: text
    content: If you really keep the royal law found in Scripture, “Love your neighbor as yourself,”
  - type: note
    content: Lev. 19:18
  - type: text
    content: ' you are doing right. '
  '9':
  - type: text
    content: 'But if you show favoritism, you sin and are convicted by the law as lawbreakers. '
