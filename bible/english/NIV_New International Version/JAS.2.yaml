document_id: JAS.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Favoritism Forbidden
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My brothers and sisters, believers in our glorious Lord Jesus Christ must not show favoritism. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For whoever keeps the whole law and yet stumbles at just one point is guilty of breaking all of it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For he who said, “You shall not commit adultery,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 20:14; Deut. 5:18
      marker-yv: yv-n
    - type: text
      text: ' also said, “You shall not murder.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 20:13; Deut. 5:17
      marker-yv: yv-n
    - type: text
      text: ' If you do not commit adultery but do commit murder, you have become a lawbreaker.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Speak and act as those who are going to be judged by the law that gives freedom, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: because judgment without mercy will be shown to anyone who has not been merciful. Mercy triumphs over judgment.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faith and Deeds
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What good is it, my brothers and sisters, if someone claims to have faith but has no deeds? Can such faith save them? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Suppose a brother or a sister is without clothes and daily food. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If one of you says to them, “Go in peace; keep warm and well fed,” but does nothing about their physical needs, what good is it? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the same way, faith by itself, if it is not accompanied by action, is dead.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But someone will say, “You have faith; I have deeds.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Show me your faith without deeds, and I will show you my faith by my deeds. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You believe that there is one God. Good! Even the demons believe that—and shudder.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Suppose a man comes into your meeting wearing a gold ring and fine clothes, and a poor man in filthy old clothes also comes in. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You foolish person, do you want evidence that faith without deeds is useless
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some early manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dead
      marker-yv: yv-n
    - type: text
      text: '? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Was not our father Abraham considered righteous for what he did when he offered his son Isaac on the altar? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You see that his faith and his actions were working together, and his faith was made complete by what he did. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the scripture was fulfilled that says, “Abraham believed God, and it was credited to him as righteousness,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 15:6
      marker-yv: yv-n
    - type: text
      text: ' and he was called God’s friend. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You see that a person is considered righteous by what they do and not by faith alone.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same way, was not even Rahab the prostitute considered righteous for what she did when she gave lodging to the spies and sent them off in a different direction? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As the body without the spirit is dead, so faith without deeds is dead.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you show special attention to the man wearing fine clothes and say, “Here’s a good seat for you,” but say to the poor man, “You stand there” or “Sit on the floor by my feet,” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: have you not discriminated among yourselves and become judges with evil thoughts?
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Listen, my dear brothers and sisters: Has not God chosen those who are poor in the eyes of the world to be rich in faith and to inherit the kingdom he promised those who love him? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you have dishonored the poor. Is it not the rich who are exploiting you? Are they not the ones who are dragging you into court? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Are they not the ones who are blaspheming the noble name of him to whom you belong?
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If you really keep the royal law found in Scripture, “Love your neighbor as yourself,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lev. 19:18
      marker-yv: yv-n
    - type: text
      text: ' you are doing right. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you show favoritism, you sin and are convicted by the law as lawbreakers. '
