document_id: MRK.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: That Which Defiles
  - type: text
    content: 'The Pharisees and some of the teachers of the law who had come from Jerusalem gathered around Jesus '
  '10':
  - type: text
    content: For Moses said, ‘Honor your father and mother,’
  - type: note
    content: Exodus 20:12; Deut. 5:16
  - type: text
    content: ' '
  - type: text
    content: and, ‘Anyone who curses their father or mother is to be put to death.’
  - type: note
    content: Exodus 21:17; Lev. 20:9
  - type: text
    content: ' '
  '11':
  - type: text
    content: But you say that if anyone declares that what might have been used to help their father or mother is Corban (that is, devoted to God)—
  - type: text
    content: ' '
  '12':
  - type: text
    content: then you no longer let them do anything for their father or mother.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Thus you nullify the word of God by your tradition that you have handed down. And you do many things like that.”
  '14':
  - type: text
    content: 'Again Jesus called the crowd to him and said, '
  - type: text
    content: “Listen to me, everyone, and understand this.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Nothing outside a person can defile them by going into them. Rather, it is what comes out of a person that defiles them.”
  - type: text
    content: ' '
  '16':
  - type: note
    content: Some manuscripts include here the words of 4:23.
  '17':
  - type: text
    content: 'After he had left the crowd and entered the house, his disciples asked him about this parable. '
  '18':
  - type: text
    content: “Are you so dull?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “Don’t you see that nothing that enters a person from the outside can defile them?
  - type: text
    content: ' '
  '19':
  - type: text
    content: For it doesn’t go into their heart but into their stomach, and then out of the body.”
  - type: text
    content: ' (In saying this, Jesus declared all foods clean.)'
  '2':
  - type: text
    content: 'and saw some of his disciples eating food with hands that were defiled, that is, unwashed. '
  '20':
  - type: text
    content: 'He went on: '
  - type: text
    content: “What comes out of a person is what defiles them.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For it is from within, out of a person’s heart, that evil thoughts come—sexual immorality, theft, murder,
  - type: text
    content: ' '
  '22':
  - type: text
    content: adultery, greed, malice, deceit, lewdness, envy, slander, arrogance and folly.
  - type: text
    content: ' '
  '23':
  - type: text
    content: All these evils come from inside and defile a person.”
  - type: heading
    content: Jesus Honors a Syrophoenician Woman’s Faith
  '24':
  - type: text
    content: Jesus left that place and went to the vicinity of Tyre.
  - type: note
    content: Many early manuscripts Tyre and Sidon
  - type: text
    content: ' He entered a house and did not want anyone to know it; yet he could not keep his presence secret. '
  '25':
  - type: text
    content: 'In fact, as soon as she heard about him, a woman whose little daughter was possessed by an impure spirit came and fell at his feet. '
  '26':
  - type: text
    content: The woman was a Greek, born in Syrian Phoenicia. She begged Jesus to drive the demon out of her daughter.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “First let the children eat all they want,”
  - type: text
    content: ' he told her, '
  - type: text
    content: “for it is not right to take the children’s bread and toss it to the dogs.”
  '28':
  - type: text
    content: “Lord,” she replied, “even the dogs under the table eat the children’s crumbs.”
  '29':
  - type: text
    content: 'Then he told her, '
  - type: text
    content: “For such a reply, you may go; the demon has left your daughter.”
  '3':
  - type: text
    content: '(The Pharisees and all the Jews do not eat unless they give their hands a ceremonial washing, holding to the tradition of the elders. '
  '30':
  - type: text
    content: She went home and found her child lying on the bed, and the demon gone.
  - type: heading
    content: Jesus Heals a Deaf and Mute Man
  '31':
  - type: text
    content: Then Jesus left the vicinity of Tyre and went through Sidon, down to the Sea of Galilee and into the region of the Decapolis.
  - type: note
    content: That is, the Ten Cities
  - type: text
    content: ' '
  '32':
  - type: text
    content: There some people brought to him a man who was deaf and could hardly talk, and they begged Jesus to place his hand on him.
  '33':
  - type: text
    content: 'After he took him aside, away from the crowd, Jesus put his fingers into the man’s ears. Then he spit and touched the man’s tongue. '
  '34':
  - type: text
    content: 'He looked up to heaven and with a deep sigh said to him, '
  - type: text
    content: “Ephphatha!”
  - type: text
    content: ' (which means '
  - type: text
    content: “Be opened!”
  - type: text
    content: '). '
  '35':
  - type: text
    content: At this, the man’s ears were opened, his tongue was loosened and he began to speak plainly.
  '36':
  - type: text
    content: 'Jesus commanded them not to tell anyone. But the more he did so, the more they kept talking about it. '
  '37':
  - type: text
    content: People were overwhelmed with amazement. “He has done everything well,” they said. “He even makes the deaf hear and the mute speak.”
  '4':
  - type: text
    content: When they come from the marketplace they do not eat unless they wash. And they observe many other traditions, such as the washing of cups, pitchers and kettles.
  - type: note
    content: Some early manuscripts pitchers, kettles and dining couches
  - type: text
    content: )
  '5':
  - type: text
    content: So the Pharisees and teachers of the law asked Jesus, “Why don’t your disciples live according to the tradition of the elders instead of eating their food with defiled hands?”
  '6':
  - type: text
    content: 'He replied, '
  - type: text
    content: '“Isaiah was right when he prophesied about you hypocrites; as it is written:'
  - type: text
    content: “ ‘These people honor me with their lips,
  - type: text
    content: but their hearts are far from me.
  '7':
  - type: text
    content: ' '
  - type: text
    content: They worship me in vain;
  - type: text
    content: their teachings are merely human rules.’
  - type: note
    content: Isaiah 29:13
  '8':
  - type: text
    content: ' '
  - type: text
    content: You have let go of the commands of God and are holding on to human traditions.”
  '9':
  - type: text
    content: 'And he continued, '
  - type: text
    content: “You have a fine way of setting aside the commands of God in order to observe
  - type: note
    content: Some manuscripts set up
  - type: text
    content: ' '
  - type: text
    content: your own traditions!
  - type: text
    content: ' '
