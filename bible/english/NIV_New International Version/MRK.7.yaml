document_id: MRK.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: That Which Defiles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Pharisees and some of the teachers of the law who had come from Jerusalem gathered around Jesus '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and saw some of his disciples eating food with hands that were defiled, that is, unwashed. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '(The Pharisees and all the Jews do not eat unless they give their hands a ceremonial washing, holding to the tradition of the elders. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When they come from the marketplace they do not eat unless they wash. And they observe many other traditions, such as the washing of cups, pitchers and kettles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pitchers, kettles and dining couches
    marker-yv: yv-n
  - type: text
    text: )
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So the Pharisees and teachers of the law asked Jesus, “Why don’t your disciples live according to the tradition of the elders instead of eating their food with defiled hands?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Isaiah was right when he prophesied about you hypocrites; as it is written:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘These people honor me with their lips,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but their hearts are far from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They worship me in vain;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: their teachings are merely human rules.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 29:13
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You have let go of the commands of God and are holding on to human traditions.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he continued, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have a fine way of setting aside the commands of God in order to observe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: set up
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: your own traditions!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For Moses said, ‘Honor your father and mother,’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exodus 20:12; Deut. 5:16
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and, ‘Anyone who curses their father or mother is to be put to death.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exodus 21:17; Lev. 20:9
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But you say that if anyone declares that what might have been used to help their father or mother is Corban (that is, devoted to God)—
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: then you no longer let them do anything for their father or mother.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Thus you nullify the word of God by your tradition that you have handed down. And you do many things like that.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Again Jesus called the crowd to him and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Listen to me, everyone, and understand this.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Nothing outside a person can defile them by going into them. Rather, it is what comes out of a person that defiles them.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '[16]'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts include here the words of 4:23.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'After he had left the crowd and entered the house, his disciples asked him about this parable. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Are you so dull?”
  - type: text
    text: ' he asked. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t you see that nothing that enters a person from the outside can defile them?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For it doesn’t go into their heart but into their stomach, and then out of the body.”
  - type: text
    text: ' (In saying this, Jesus declared all foods clean.)'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He went on: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What comes out of a person is what defiles them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For it is from within, out of a person’s heart, that evil thoughts come—sexual immorality, theft, murder,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: adultery, greed, malice, deceit, lewdness, envy, slander, arrogance and folly.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All these evils come from inside and defile a person.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Honors a Syrophoenician Woman’s Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Jesus left that place and went to the vicinity of Tyre.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Many early manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tyre and Sidon
    marker-yv: yv-n
  - type: text
    text: ' He entered a house and did not want anyone to know it; yet he could not keep his presence secret. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'In fact, as soon as she heard about him, a woman whose little daughter was possessed by an impure spirit came and fell at his feet. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The woman was a Greek, born in Syrian Phoenicia. She begged Jesus to drive the demon out of her daughter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “First let the children eat all they want,”
  - type: text
    text: ' he told her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “for it is not right to take the children’s bread and toss it to the dogs.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “Lord,” she replied, “even the dogs under the table eat the children’s crumbs.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then he told her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “For such a reply, you may go; the demon has left your daughter.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: She went home and found her child lying on the bed, and the demon gone.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Deaf and Mute Man
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then Jesus left the vicinity of Tyre and went through Sidon, down to the Sea of Galilee and into the region of the Decapolis.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the Ten Cities
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: There some people brought to him a man who was deaf and could hardly talk, and they begged Jesus to place his hand on him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'After he took him aside, away from the crowd, Jesus put his fingers into the man’s ears. Then he spit and touched the man’s tongue. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'He looked up to heaven and with a deep sigh said to him, '
  - type: usfm
    marker: tl
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Ephphatha!”
  - type: text
    text: ' (which means '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be opened!”
  - type: text
    text: '). '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: At this, the man’s ears were opened, his tongue was loosened and he began to speak plainly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jesus commanded them not to tell anyone. But the more he did so, the more they kept talking about it. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: People were overwhelmed with amazement. “He has done everything well,” they said. “He even makes the deaf hear and the mute speak.”
