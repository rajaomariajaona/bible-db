document_id: JOB.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz
  - type: text
    content: 'Then Eliphaz the Temanite replied:'
  '10':
  - type: text
    content: The gray-haired and the aged are on our side,
  - type: text
    content: men even older than your father.
  '11':
  - type: text
    content: Are God’s consolations not enough for you,
  - type: text
    content: words spoken gently to you?
  '12':
  - type: text
    content: Why has your heart carried you away,
  - type: text
    content: and why do your eyes flash,
  '13':
  - type: text
    content: so that you vent your rage against God
  - type: text
    content: and pour out such words from your mouth?
  '14':
  - type: text
    content: “What are mortals, that they could be pure,
  - type: text
    content: or those born of woman, that they could be righteous?
  '15':
  - type: text
    content: If God places no trust in his holy ones,
  - type: text
    content: if even the heavens are not pure in his eyes,
  '16':
  - type: text
    content: how much less mortals, who are vile and corrupt,
  - type: text
    content: who drink up evil like water!
  '17':
  - type: text
    content: “Listen to me and I will explain to you;
  - type: text
    content: let me tell you what I have seen,
  '18':
  - type: text
    content: what the wise have declared,
  - type: text
    content: hiding nothing received from their ancestors
  '19':
  - type: text
    content: (to whom alone the land was given
  - type: text
    content: 'when no foreigners moved among them):'
  '2':
  - type: text
    content: “Would a wise person answer with empty notions
  - type: text
    content: or fill their belly with the hot east wind?
  '20':
  - type: text
    content: All his days the wicked man suffers torment,
  - type: text
    content: the ruthless man through all the years stored up for him.
  '21':
  - type: text
    content: Terrifying sounds fill his ears;
  - type: text
    content: when all seems well, marauders attack him.
  '22':
  - type: text
    content: He despairs of escaping the realm of darkness;
  - type: text
    content: he is marked for the sword.
  '23':
  - type: text
    content: He wanders about for food like a vulture;
  - type: text
    content: he knows the day of darkness is at hand.
  '24':
  - type: text
    content: Distress and anguish fill him with terror;
  - type: text
    content: troubles overwhelm him, like a king poised to attack,
  '25':
  - type: text
    content: because he shakes his fist at God
  - type: text
    content: and vaunts himself against the Almighty,
  '26':
  - type: text
    content: defiantly charging against him
  - type: text
    content: with a thick, strong shield.
  '27':
  - type: text
    content: “Though his face is covered with fat
  - type: text
    content: and his waist bulges with flesh,
  '28':
  - type: text
    content: he will inhabit ruined towns
  - type: text
    content: and houses where no one lives,
  - type: text
    content: houses crumbling to rubble.
  '29':
  - type: text
    content: He will no longer be rich and his wealth will not endure,
  - type: text
    content: nor will his possessions spread over the land.
  '3':
  - type: text
    content: Would they argue with useless words,
  - type: text
    content: with speeches that have no value?
  '30':
  - type: text
    content: He will not escape the darkness;
  - type: text
    content: a flame will wither his shoots,
  - type: text
    content: and the breath of God’s mouth will carry him away.
  '31':
  - type: text
    content: Let him not deceive himself by trusting what is worthless,
  - type: text
    content: for he will get nothing in return.
  '32':
  - type: text
    content: Before his time he will wither,
  - type: text
    content: and his branches will not flourish.
  '33':
  - type: text
    content: He will be like a vine stripped of its unripe grapes,
  - type: text
    content: like an olive tree shedding its blossoms.
  '34':
  - type: text
    content: For the company of the godless will be barren,
  - type: text
    content: and fire will consume the tents of those who love bribes.
  '35':
  - type: text
    content: They conceive trouble and give birth to evil;
  - type: text
    content: their womb fashions deceit.”
  '4':
  - type: text
    content: But you even undermine piety
  - type: text
    content: and hinder devotion to God.
  '5':
  - type: text
    content: Your sin prompts your mouth;
  - type: text
    content: you adopt the tongue of the crafty.
  '6':
  - type: text
    content: Your own mouth condemns you, not mine;
  - type: text
    content: your own lips testify against you.
  '7':
  - type: text
    content: “Are you the first man ever born?
  - type: text
    content: Were you brought forth before the hills?
  '8':
  - type: text
    content: Do you listen in on God’s council?
  - type: text
    content: Do you have a monopoly on wisdom?
  '9':
  - type: text
    content: What do you know that we do not know?
  - type: text
    content: What insights do you have that we do not have?
