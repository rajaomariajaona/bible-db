document_id: JOB.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Eliphaz
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Eliphaz the Temanite replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Would a wise person answer with empty notions
- type: usfm
  marker: q2
  children:
  - type: text
    text: or fill their belly with the hot east wind?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Would they argue with useless words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with speeches that have no value?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But you even undermine piety
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hinder devotion to God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Your sin prompts your mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you adopt the tongue of the crafty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Your own mouth condemns you, not mine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your own lips testify against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Are you the first man ever born?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Were you brought forth before the hills?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Do you listen in on God’s council?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you have a monopoly on wisdom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: What do you know that we do not know?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What insights do you have that we do not have?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The gray-haired and the aged are on our side,
- type: usfm
  marker: q2
  children:
  - type: text
    text: men even older than your father.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Are God’s consolations not enough for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: words spoken gently to you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Why has your heart carried you away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and why do your eyes flash,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: so that you vent your rage against God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pour out such words from your mouth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “What are mortals, that they could be pure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or those born of woman, that they could be righteous?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: If God places no trust in his holy ones,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if even the heavens are not pure in his eyes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: how much less mortals, who are vile and corrupt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who drink up evil like water!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Listen to me and I will explain to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let me tell you what I have seen,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: what the wise have declared,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hiding nothing received from their ancestors
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: (to whom alone the land was given
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'when no foreigners moved among them):'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: All his days the wicked man suffers torment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ruthless man through all the years stored up for him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Terrifying sounds fill his ears;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when all seems well, marauders attack him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He despairs of escaping the realm of darkness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is marked for the sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He wanders about for food like a vulture;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he knows the day of darkness is at hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Distress and anguish fill him with terror;
- type: usfm
  marker: q2
  children:
  - type: text
    text: troubles overwhelm him, like a king poised to attack,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: because he shakes his fist at God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and vaunts himself against the Almighty,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: defiantly charging against him
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a thick, strong shield.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “Though his face is covered with fat
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his waist bulges with flesh,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: he will inhabit ruined towns
- type: usfm
  marker: q2
  children:
  - type: text
    text: and houses where no one lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: houses crumbling to rubble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He will no longer be rich and his wealth will not endure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will his possessions spread over the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: He will not escape the darkness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a flame will wither his shoots,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the breath of God’s mouth will carry him away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Let him not deceive himself by trusting what is worthless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he will get nothing in return.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Before his time he will wither,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his branches will not flourish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: He will be like a vine stripped of its unripe grapes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like an olive tree shedding its blossoms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: For the company of the godless will be barren,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fire will consume the tents of those who love bribes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: They conceive trouble and give birth to evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their womb fashions deceit.”
