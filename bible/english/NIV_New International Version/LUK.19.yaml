document_id: LUK.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Zacchaeus the Tax Collector
  - type: text
    content: 'Jesus entered Jericho and was passing through. '
  '10':
  - type: text
    content: For the Son of Man came to seek and to save the lost.”
  - type: heading
    content: The Parable of the Ten Minas
  '11':
  - type: text
    content: 'While they were listening to this, he went on to tell them a parable, because he was near Jerusalem and the people thought that the kingdom of God was going to appear at once. '
  '12':
  - type: text
    content: 'He said: '
  - type: text
    content: “A man of noble birth went to a distant country to have himself appointed king and then to return.
  - type: text
    content: ' '
  '13':
  - type: text
    content: So he called ten of his servants and gave them ten minas.
  - type: note
    content: A mina was about three months’ wages.
  - type: text
    content: ' '
  - type: text
    content: ‘Put this money to work,’ he said, ‘until I come back.’
  '14':
  - type: text
    content: ' '
  - type: text
    content: “But his subjects hated him and sent a delegation after him to say, ‘We don’t want this man to be our king.’
  '15':
  - type: text
    content: ' '
  - type: text
    content: “He was made king, however, and returned home. Then he sent for the servants to whom he had given the money, in order to find out what they had gained with it.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “The first one came and said, ‘Sir, your mina has earned ten more.’
  '17':
  - type: text
    content: ' '
  - type: text
    content: “ ‘Well done, my good servant!’ his master replied. ‘Because you have been trustworthy in a very small matter, take charge of ten cities.’
  '18':
  - type: text
    content: ' '
  - type: text
    content: “The second came and said, ‘Sir, your mina has earned five more.’
  '19':
  - type: text
    content: ' '
  - type: text
    content: “His master answered, ‘You take charge of five cities.’
  '2':
  - type: text
    content: 'A man was there by the name of Zacchaeus; he was a chief tax collector and was wealthy. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “Then another servant came and said, ‘Sir, here is your mina; I have kept it laid away in a piece of cloth.
  - type: text
    content: ' '
  '21':
  - type: text
    content: I was afraid of you, because you are a hard man. You take out what you did not put in and reap what you did not sow.’
  '22':
  - type: text
    content: ' '
  - type: text
    content: “His master replied, ‘I will judge you by your own words, you wicked servant! You knew, did you, that I am a hard man, taking out what I did not put in, and reaping what I did not sow?
  - type: text
    content: ' '
  '23':
  - type: text
    content: Why then didn’t you put my money on deposit, so that when I came back, I could have collected it with interest?’
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Then he said to those standing by, ‘Take his mina away from him and give it to the one who has ten minas.’
  '25':
  - type: text
    content: ' '
  - type: text
    content: “ ‘Sir,’ they said, ‘he already has ten!’
  '26':
  - type: text
    content: ' '
  - type: text
    content: “He replied, ‘I tell you that to everyone who has, more will be given, but as for the one who has nothing, even what they have will be taken away.
  - type: text
    content: ' '
  '27':
  - type: text
    content: But those enemies of mine who did not want me to be king over them—bring them here and kill them in front of me.’ ”
  - type: heading
    content: Jesus Comes to Jerusalem as King
  '28':
  - type: text
    content: 'After Jesus had said this, he went on ahead, going up to Jerusalem. '
  '29':
  - type: text
    content: 'As he approached Bethphage and Bethany at the hill called the Mount of Olives, he sent two of his disciples, saying to them, '
  '3':
  - type: text
    content: 'He wanted to see who Jesus was, but because he was short he could not see over the crowd. '
  '30':
  - type: text
    content: “Go to the village ahead of you, and as you enter it, you will find a colt tied there, which no one has ever ridden. Untie it and bring it here.
  - type: text
    content: ' '
  '31':
  - type: text
    content: If anyone asks you, ‘Why are you untying it?’ say, ‘The Lord needs it.’ ”
  '32':
  - type: text
    content: 'Those who were sent ahead went and found it just as he had told them. '
  '33':
  - type: text
    content: As they were untying the colt, its owners asked them, “Why are you untying the colt?”
  '34':
  - type: text
    content: They replied, “The Lord needs it.”
  '35':
  - type: text
    content: 'They brought it to Jesus, threw their cloaks on the colt and put Jesus on it. '
  '36':
  - type: text
    content: As he went along, people spread their cloaks on the road.
  '37':
  - type: text
    content: 'When he came near the place where the road goes down the Mount of Olives, the whole crowd of disciples began joyfully to praise God in loud voices for all the miracles they had seen:'
  '38':
  - type: text
    content: “Blessed is the king who comes in the name of the Lord!”
  - type: note
    content: Psalm 118:26
  - type: text
    content: “Peace in heaven and glory in the highest!”
  '39':
  - type: text
    content: Some of the Pharisees in the crowd said to Jesus, “Teacher, rebuke your disciples!”
  '4':
  - type: text
    content: So he ran ahead and climbed a sycamore-fig tree to see him, since Jesus was coming that way.
  '40':
  - type: text
    content: ' '
  - type: text
    content: “I tell you,”
  - type: text
    content: ' he replied, '
  - type: text
    content: “if they keep quiet, the stones will cry out.”
  '41':
  - type: text
    content: 'As he approached Jerusalem and saw the city, he wept over it '
  '42':
  - type: text
    content: 'and said, '
  - type: text
    content: “If you, even you, had only known on this day what would bring you peace—but now it is hidden from your eyes.
  - type: text
    content: ' '
  '43':
  - type: text
    content: The days will come upon you when your enemies will build an embankment against you and encircle you and hem you in on every side.
  - type: text
    content: ' '
  '44':
  - type: text
    content: They will dash you to the ground, you and the children within your walls. They will not leave one stone on another, because you did not recognize the time of God’s coming to you.”
  - type: heading
    content: Jesus at the Temple
  '45':
  - type: text
    content: 'When Jesus entered the temple courts, he began to drive out those who were selling. '
  '46':
  - type: text
    content: “It is written,”
  - type: text
    content: ' he said to them, '
  - type: text
    content: “ ‘My house will be a house of prayer’
  - type: note
    content: Isaiah 56:7
  - type: text
    content: ; but you have made it ‘a den of robbers.’
  - type: note
    content: Jer. 7:11
  - type: text
    content: ”
  '47':
  - type: text
    content: 'Every day he was teaching at the temple. But the chief priests, the teachers of the law and the leaders among the people were trying to kill him. '
  '48':
  - type: text
    content: Yet they could not find any way to do it, because all the people hung on his words.
  '5':
  - type: text
    content: 'When Jesus reached the spot, he looked up and said to him, '
  - type: text
    content: “Zacchaeus, come down immediately. I must stay at your house today.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: So he came down at once and welcomed him gladly.
  '7':
  - type: text
    content: All the people saw this and began to mutter, “He has gone to be the guest of a sinner.”
  '8':
  - type: text
    content: But Zacchaeus stood up and said to the Lord, “Look, Lord! Here and now I give half of my possessions to the poor, and if I have cheated anybody out of anything, I will pay back four times the amount.”
  '9':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Today salvation has come to this house, because this man, too, is a son of Abraham.
  - type: text
    content: ' '
