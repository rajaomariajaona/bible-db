document_id: JOB.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Job replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Their bulls never fail to breed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their cows calve and do not miscarry.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They send forth their children as a flock;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their little ones dance about.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They sing to the music of timbrel and lyre;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they make merry to the sound of the pipe.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They spend their years in prosperity
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and go down to the grave in peace.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in an instant
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Yet they say to God, ‘Leave us alone!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We have no desire to know your ways.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Who is the Almighty, that we should serve him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What would we gain by praying to him?’
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But their prosperity is not in their own hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I stand aloof from the plans of the wicked.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Yet how often is the lamp of the wicked snuffed out?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How often does calamity come upon them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fate God allots in his anger?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: How often are they like straw before the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like chaff swept away by a gale?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: It is said, ‘God stores up the punishment of the wicked for their children.’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let him repay the wicked, so that they themselves will experience it!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Listen carefully to my words;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let this be the consolation you give me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Let their own eyes see their destruction;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them drink the cup of the wrath of the Almighty.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For what do they care about the families they leave behind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when their allotted months come to an end?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Can anyone teach knowledge to God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: since he judges even the highest?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: One person dies in full vigor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: completely secure and at ease,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: well nourished in body,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bones rich with marrow.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Another dies in bitterness of soul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never having enjoyed anything good.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Side by side they lie in the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worms cover them both.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “I know full well what you are thinking,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the schemes by which you would wrong me.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: You say, ‘Where now is the house of the great,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the tents where the wicked lived?’
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Have you never questioned those who travel?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have you paid no regard to their accounts—
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Bear with me while I speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and after I have spoken, mock on.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: that the wicked are spared from the day of calamity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they are delivered from
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wicked are reserved for the day of calamity, / that they are brought forth to
      marker-yv: yv-n
    - type: text
      text: ' the day of wrath?'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Who denounces their conduct to their face?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who repays them for what they have done?
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: They are carried to the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and watch is kept over their tombs.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: The soil in the valley is sweet to them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everyone follows after them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a countless throng goes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: them, / as a countless throng went
      marker-yv: yv-n
    - type: text
      text: ' before them.'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: “So how can you console me with your nonsense?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nothing is left of your answers but falsehood!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “Is my complaint directed to a human being?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why should I not be impatient?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Look at me and be appalled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clap your hand over your mouth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When I think about this, I am terrified;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: trembling seizes my body.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Why do the wicked live on,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: growing old and increasing in power?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They see their children established around them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their offspring before their eyes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Their homes are safe and free from fear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rod of God is not on them.
