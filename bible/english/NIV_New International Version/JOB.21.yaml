document_id: JOB.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job
  - type: text
    content: 'Then Job replied:'
  '10':
  - type: text
    content: Their bulls never fail to breed;
  - type: text
    content: their cows calve and do not miscarry.
  '11':
  - type: text
    content: They send forth their children as a flock;
  - type: text
    content: their little ones dance about.
  '12':
  - type: text
    content: They sing to the music of timbrel and lyre;
  - type: text
    content: they make merry to the sound of the pipe.
  '13':
  - type: text
    content: They spend their years in prosperity
  - type: text
    content: and go down to the grave in peace.
  - type: note
    content: Or in an instant
  '14':
  - type: text
    content: Yet they say to God, ‘Leave us alone!
  - type: text
    content: We have no desire to know your ways.
  '15':
  - type: text
    content: Who is the Almighty, that we should serve him?
  - type: text
    content: What would we gain by praying to him?’
  '16':
  - type: text
    content: But their prosperity is not in their own hands,
  - type: text
    content: so I stand aloof from the plans of the wicked.
  '17':
  - type: text
    content: “Yet how often is the lamp of the wicked snuffed out?
  - type: text
    content: How often does calamity come upon them,
  - type: text
    content: the fate God allots in his anger?
  '18':
  - type: text
    content: How often are they like straw before the wind,
  - type: text
    content: like chaff swept away by a gale?
  '19':
  - type: text
    content: It is said, ‘God stores up the punishment of the wicked for their children.’
  - type: text
    content: Let him repay the wicked, so that they themselves will experience it!
  '2':
  - type: text
    content: “Listen carefully to my words;
  - type: text
    content: let this be the consolation you give me.
  '20':
  - type: text
    content: Let their own eyes see their destruction;
  - type: text
    content: let them drink the cup of the wrath of the Almighty.
  '21':
  - type: text
    content: For what do they care about the families they leave behind
  - type: text
    content: when their allotted months come to an end?
  '22':
  - type: text
    content: “Can anyone teach knowledge to God,
  - type: text
    content: since he judges even the highest?
  '23':
  - type: text
    content: One person dies in full vigor,
  - type: text
    content: completely secure and at ease,
  '24':
  - type: text
    content: well nourished in body,
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: bones rich with marrow.
  '25':
  - type: text
    content: Another dies in bitterness of soul,
  - type: text
    content: never having enjoyed anything good.
  '26':
  - type: text
    content: Side by side they lie in the dust,
  - type: text
    content: and worms cover them both.
  '27':
  - type: text
    content: “I know full well what you are thinking,
  - type: text
    content: the schemes by which you would wrong me.
  '28':
  - type: text
    content: You say, ‘Where now is the house of the great,
  - type: text
    content: the tents where the wicked lived?’
  '29':
  - type: text
    content: Have you never questioned those who travel?
  - type: text
    content: Have you paid no regard to their accounts—
  '3':
  - type: text
    content: Bear with me while I speak,
  - type: text
    content: and after I have spoken, mock on.
  '30':
  - type: text
    content: that the wicked are spared from the day of calamity,
  - type: text
    content: that they are delivered from
  - type: note
    content: Or wicked are reserved for the day of calamity, / that they are brought forth to
  - type: text
    content: ' the day of wrath?'
  '31':
  - type: text
    content: Who denounces their conduct to their face?
  - type: text
    content: Who repays them for what they have done?
  '32':
  - type: text
    content: They are carried to the grave,
  - type: text
    content: and watch is kept over their tombs.
  '33':
  - type: text
    content: The soil in the valley is sweet to them;
  - type: text
    content: everyone follows after them,
  - type: text
    content: and a countless throng goes
  - type: note
    content: Or them, / as a countless throng went
  - type: text
    content: ' before them.'
  '34':
  - type: text
    content: “So how can you console me with your nonsense?
  - type: text
    content: Nothing is left of your answers but falsehood!”
  '4':
  - type: text
    content: “Is my complaint directed to a human being?
  - type: text
    content: Why should I not be impatient?
  '5':
  - type: text
    content: Look at me and be appalled;
  - type: text
    content: clap your hand over your mouth.
  '6':
  - type: text
    content: When I think about this, I am terrified;
  - type: text
    content: trembling seizes my body.
  '7':
  - type: text
    content: Why do the wicked live on,
  - type: text
    content: growing old and increasing in power?
  '8':
  - type: text
    content: They see their children established around them,
  - type: text
    content: their offspring before their eyes.
  '9':
  - type: text
    content: Their homes are safe and free from fear;
  - type: text
    content: the rod of God is not on them.
