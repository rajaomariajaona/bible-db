document_id: REV.20,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Thousand Years
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I saw an angel coming down out of heaven, having the key to the Abyss and holding in his hand a great chain. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the devil, who deceived them, was thrown into the lake of burning sulfur, where the beast and the false prophet had been thrown. They will be tormented day and night for ever and ever.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Judgment of the Dead
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw a great white throne and him who was seated on it. The earth and the heavens fled from his presence, and there was no place for them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I saw the dead, great and small, standing before the throne, and books were opened. Another book was opened, which is the book of life. The dead were judged according to what they had done as recorded in the books. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sea gave up the dead that were in it, and death and Hades gave up the dead that were in them, and each person was judged according to what they had done. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then death and Hades were thrown into the lake of fire. The lake of fire is the second death. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anyone whose name was not found written in the book of life was thrown into the lake of fire.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He seized the dragon, that ancient serpent, who is the devil, or Satan, and bound him for a thousand years. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He threw him into the Abyss, and locked and sealed it over him, to keep him from deceiving the nations anymore until the thousand years were ended. After that, he must be set free for a short time.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I saw thrones on which were seated those who had been given authority to judge. And I saw the souls of those who had been beheaded because of their testimony about Jesus and because of the word of God. They
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God; I also saw those who
      marker-yv: yv-n
    - type: text
      text: ' had not worshiped the beast or its image and had not received its mark on their foreheads or their hands. They came to life and reigned with Christ a thousand years. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(The rest of the dead did not come to life until the thousand years were ended.) This is the first resurrection. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Blessed and holy are those who share in the first resurrection. The second death has no power over them, but they will be priests of God and of Christ and will reign with him for a thousand years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Judgment of Satan
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the thousand years are over, Satan will be released from his prison '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and will go out to deceive the nations in the four corners of the earth—Gog and Magog—and to gather them for battle. In number they are like the sand on the seashore. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They marched across the breadth of the earth and surrounded the camp of God’s people, the city he loves. But fire came down from heaven and devoured them. '
