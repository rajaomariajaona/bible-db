document_id: PSA.63,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 63
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 63:1-11 is numbered 63:2-12.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David. When he was in the Desert of Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, God, are my God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: earnestly I seek you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thirst for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my whole being longs for you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in a dry and parched land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where there is no water.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be given over to the sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and become food for jackals.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the king will rejoice in God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who swear by God will glory in him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while the mouths of liars will be silenced.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have seen you in the sanctuary
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and beheld your power and your glory.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because your love is better than life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my lips will glorify you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will praise you as long as I live,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in your name I will lift up my hands.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be fully satisfied as with the richest of foods;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with singing lips my mouth will praise you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On my bed I remember you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I think of you through the watches of the night.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you are my help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I sing in the shadow of your wings.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cling to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your right hand upholds me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who want to kill me will be destroyed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will go down to the depths of the earth.
