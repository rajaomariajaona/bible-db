document_id: PSA.63,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 63In Hebrew texts 63:1-11 is numbered 63:2-12.
  - type: text
    content: A psalm of David. When he was in the Desert of Judah.
  - type: text
    content: You, God, are my God,
  - type: text
    content: earnestly I seek you;
  - type: text
    content: I thirst for you,
  - type: text
    content: my whole being longs for you,
  - type: text
    content: in a dry and parched land
  - type: text
    content: where there is no water.
  '10':
  - type: text
    content: They will be given over to the sword
  - type: text
    content: and become food for jackals.
  '11':
  - type: text
    content: But the king will rejoice in God;
  - type: text
    content: all who swear by God will glory in him,
  - type: text
    content: while the mouths of liars will be silenced.
  '2':
  - type: text
    content: I have seen you in the sanctuary
  - type: text
    content: and beheld your power and your glory.
  '3':
  - type: text
    content: Because your love is better than life,
  - type: text
    content: my lips will glorify you.
  '4':
  - type: text
    content: I will praise you as long as I live,
  - type: text
    content: and in your name I will lift up my hands.
  '5':
  - type: text
    content: I will be fully satisfied as with the richest of foods;
  - type: text
    content: with singing lips my mouth will praise you.
  '6':
  - type: text
    content: On my bed I remember you;
  - type: text
    content: I think of you through the watches of the night.
  '7':
  - type: text
    content: Because you are my help,
  - type: text
    content: I sing in the shadow of your wings.
  '8':
  - type: text
    content: I cling to you;
  - type: text
    content: your right hand upholds me.
  '9':
  - type: text
    content: Those who want to kill me will be destroyed;
  - type: text
    content: they will go down to the depths of the earth.
