document_id: 1CH.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ark Brought to Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After David had constructed buildings for himself in the City of David, he prepared a place for the ark of God and pitched a tent for it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then David said, “No one but the Levites may carry the ark of God, because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' chose them to carry the ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and to minister before him forever.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David assembled all Israel in Jerusalem to bring up the ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to the place he had prepared for it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He called together the descendants of Aaron and the Levites:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: From the descendants of Kohath,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Uriel the leader and 120 relatives;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: from the descendants of Merari,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Asaiah the leader and 220 relatives;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: from the descendants of Gershon,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gershom, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gershon
    marker-yv: yv-n
- type: usfm
  marker: li2
  children:
  - type: text
    text: Joel the leader and 130 relatives;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: from the descendants of Elizaphan,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shemaiah the leader and 200 relatives;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: from the descendants of Hebron,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Eliel the leader and 80 relatives;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: from the descendants of Uzziel,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Amminadab the leader and 112 relatives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then David summoned Zadok and Abiathar the priests, and Uriel, Asaiah, Joel, Shemaiah, Eliel and Amminadab the Levites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He said to them, “You are the heads of the Levitical families; you and your fellow Levites are to consecrate yourselves and bring up the ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, to the place I have prepared for it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'It was because you, the Levites, did not bring it up the first time that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God broke out in anger against us. We did not inquire of him about how to do it in the prescribed way.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the priests and Levites consecrated themselves in order to bring up the ark of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the Levites carried the ark of God with the poles on their shoulders, as Moses had commanded in accordance with the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'David told the leaders of the Levites to appoint their fellow Levites as musicians to make a joyful sound with musical instruments: lyres, harps and cymbals.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So the Levites appointed Heman son of Joel; from his relatives, Asaph son of Berekiah; and from their relatives the Merarites, Ethan son of Kushaiah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and with them their relatives next in rank: Zechariah,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Three Hebrew manuscripts and most Septuagint manuscripts (see also verse 20 and 16:5); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Zechariah son and '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zechariah, Ben and
    marker-yv: yv-n
  - type: text
    text: ' Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Eliphelehu, Mikneiah, Obed-Edom and Jeiel,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint (see also verse 21) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jeiel and Azaziah
    marker-yv: yv-n
  - type: text
    text: ' the gatekeepers.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The musicians Heman, Asaph and Ethan were to sound the bronze cymbals; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Zechariah, Jaaziel,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See verse 18; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Aziel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jaaziel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Shemiramoth, Jehiel, Unni, Eliab, Maaseiah and Benaiah were to play the lyres according to '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: alamoth,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably a musical term
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and Mattithiah, Eliphelehu, Mikneiah, Obed-Edom, Jeiel and Azaziah were to play the harps, directing according to '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: sheminith.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably a musical term
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Kenaniah the head Levite was in charge of the singing; that was his responsibility because he was skillful at it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Berekiah and Elkanah were to be doorkeepers for the ark. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah and Eliezer the priests were to blow trumpets before the ark of God. Obed-Edom and Jehiah were also to be doorkeepers for the ark.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So David and the elders of Israel and the commanders of units of a thousand went to bring up the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' from the house of Obed-Edom, with rejoicing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Because God had helped the Levites who were carrying the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', seven bulls and seven rams were sacrificed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Now David was clothed in a robe of fine linen, as were all the Levites who were carrying the ark, and as were the musicians, and Kenaniah, who was in charge of the singing of the choirs. David also wore a linen ephod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So all Israel brought up the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with shouts, with the sounding of rams’ horns and trumpets, and of cymbals, and the playing of lyres and harps.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'As the ark of the covenant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was entering the City of David, Michal daughter of Saul watched from a window. And when she saw King David dancing and celebrating, she despised him in her heart.'
