document_id: 1CH.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ark Brought to Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After David had constructed buildings for himself in the City of David, he prepared a place for the ark of God and pitched a tent for it. '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the descendants of Uzziel,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Amminadab the leader and 112 relatives.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David summoned Zadok and Abiathar the priests, and Uriel, Asaiah, Joel, Shemaiah, Eliel and Amminadab the Levites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, “You are the heads of the Levitical families; you and your fellow Levites are to consecrate yourselves and bring up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, to the place I have prepared for it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was because you, the Levites, did not bring it up the first time that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God broke out in anger against us. We did not inquire of him about how to do it in the prescribed way.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the priests and Levites consecrated themselves in order to bring up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Levites carried the ark of God with the poles on their shoulders, as Moses had commanded in accordance with the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David told the leaders of the Levites to appoint their fellow Levites as musicians to make a joyful sound with musical instruments: lyres, harps and cymbals.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Levites appointed Heman son of Joel; from his relatives, Asaph son of Berekiah; and from their relatives the Merarites, Ethan son of Kushaiah; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and with them their relatives next in rank: Zechariah,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Three Hebrew manuscripts and most Septuagint manuscripts (see also verse 20 and 16:5); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Zechariah son and '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zechariah, Ben and
      marker-yv: yv-n
    - type: text
      text: ' Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Eliphelehu, Mikneiah, Obed-Edom and Jeiel,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint (see also verse 21) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jeiel and Azaziah
      marker-yv: yv-n
    - type: text
      text: ' the gatekeepers.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The musicians Heman, Asaph and Ethan were to sound the bronze cymbals; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said, “No one but the Levites may carry the ark of God, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' chose them to carry the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and to minister before him forever.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zechariah, Jaaziel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See verse 18; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aziel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jaaziel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Shemiramoth, Jehiel, Unni, Eliab, Maaseiah and Benaiah were to play the lyres according to '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: alamoth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably a musical term
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Mattithiah, Eliphelehu, Mikneiah, Obed-Edom, Jeiel and Azaziah were to play the harps, directing according to '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: sheminith.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Probably a musical term
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kenaniah the head Levite was in charge of the singing; that was his responsibility because he was skillful at it.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Berekiah and Elkanah were to be doorkeepers for the ark. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah and Eliezer the priests were to blow trumpets before the ark of God. Obed-Edom and Jehiah were also to be doorkeepers for the ark.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David and the elders of Israel and the commanders of units of a thousand went to bring up the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from the house of Obed-Edom, with rejoicing. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because God had helped the Levites who were carrying the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', seven bulls and seven rams were sacrificed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now David was clothed in a robe of fine linen, as were all the Levites who were carrying the ark, and as were the musicians, and Kenaniah, who was in charge of the singing of the choirs. David also wore a linen ephod. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all Israel brought up the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with shouts, with the sounding of rams’ horns and trumpets, and of cymbals, and the playing of lyres and harps.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was entering the City of David, Michal daughter of Saul watched from a window. And when she saw King David dancing and celebrating, she despised him in her heart.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David assembled all Israel in Jerusalem to bring up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to the place he had prepared for it. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He called together the descendants of Aaron and the Levites:'
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: From the descendants of Kohath,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Uriel the leader and 120 relatives;
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the descendants of Merari,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Asaiah the leader and 220 relatives;
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the descendants of Gershon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Gershom, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gershon
      marker-yv: yv-n
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Joel the leader and 130 relatives;
  '8':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the descendants of Elizaphan,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shemaiah the leader and 200 relatives;
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: from the descendants of Hebron,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliel the leader and 80 relatives;
