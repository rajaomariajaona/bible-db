document_id: 1CH.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Brought to Jerusalem
  - type: text
    content: 'After David had constructed buildings for himself in the City of David, he prepared a place for the ark of God and pitched a tent for it. '
  '10':
  - type: text
    content: from the descendants of Uzziel,
  - type: text
    content: Amminadab the leader and 112 relatives.
  '11':
  - type: text
    content: 'Then David summoned Zadok and Abiathar the priests, and Uriel, Asaiah, Joel, Shemaiah, Eliel and Amminadab the Levites. '
  '12':
  - type: text
    content: 'He said to them, “You are the heads of the Levitical families; you and your fellow Levites are to consecrate yourselves and bring up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, to the place I have prepared for it. '
  '13':
  - type: text
    content: 'It was because you, the Levites, did not bring it up the first time that the '
  - type: text
    content: Lord
  - type: text
    content: ' our God broke out in anger against us. We did not inquire of him about how to do it in the prescribed way.” '
  '14':
  - type: text
    content: 'So the priests and Levites consecrated themselves in order to bring up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '15':
  - type: text
    content: 'And the Levites carried the ark of God with the poles on their shoulders, as Moses had commanded in accordance with the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: 'David told the leaders of the Levites to appoint their fellow Levites as musicians to make a joyful sound with musical instruments: lyres, harps and cymbals.'
  '17':
  - type: text
    content: 'So the Levites appointed Heman son of Joel; from his relatives, Asaph son of Berekiah; and from their relatives the Merarites, Ethan son of Kushaiah; '
  '18':
  - type: text
    content: 'and with them their relatives next in rank: Zechariah,'
  - type: note
    content: Three Hebrew manuscripts and most Septuagint manuscripts (see also verse 20 and 16:5); most Hebrew manuscripts Zechariah son and or Zechariah, Ben and
  - type: text
    content: ' Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaiah, Maaseiah, Mattithiah, Eliphelehu, Mikneiah, Obed-Edom and Jeiel,'
  - type: note
    content: Hebrew; Septuagint (see also verse 21) Jeiel and Azaziah
  - type: text
    content: ' the gatekeepers.'
  '19':
  - type: text
    content: 'The musicians Heman, Asaph and Ethan were to sound the bronze cymbals; '
  '2':
  - type: text
    content: 'Then David said, “No one but the Levites may carry the ark of God, because the '
  - type: text
    content: Lord
  - type: text
    content: ' chose them to carry the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and to minister before him forever.”'
  '20':
  - type: text
    content: Zechariah, Jaaziel,
  - type: note
    content: See verse 18; Hebrew Aziel, a variant of Jaaziel.
  - type: text
    content: ' Shemiramoth, Jehiel, Unni, Eliab, Maaseiah and Benaiah were to play the lyres according to '
  - type: text
    content: alamoth,
  - type: note
    content: Probably a musical term
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'and Mattithiah, Eliphelehu, Mikneiah, Obed-Edom, Jeiel and Azaziah were to play the harps, directing according to '
  - type: text
    content: sheminith.
  - type: note
    content: Probably a musical term
  - type: text
    content: ' '
  '22':
  - type: text
    content: Kenaniah the head Levite was in charge of the singing; that was his responsibility because he was skillful at it.
  '23':
  - type: text
    content: 'Berekiah and Elkanah were to be doorkeepers for the ark. '
  '24':
  - type: text
    content: Shebaniah, Joshaphat, Nethanel, Amasai, Zechariah, Benaiah and Eliezer the priests were to blow trumpets before the ark of God. Obed-Edom and Jehiah were also to be doorkeepers for the ark.
  '25':
  - type: text
    content: 'So David and the elders of Israel and the commanders of units of a thousand went to bring up the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' from the house of Obed-Edom, with rejoicing. '
  '26':
  - type: text
    content: 'Because God had helped the Levites who were carrying the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', seven bulls and seven rams were sacrificed. '
  '27':
  - type: text
    content: 'Now David was clothed in a robe of fine linen, as were all the Levites who were carrying the ark, and as were the musicians, and Kenaniah, who was in charge of the singing of the choirs. David also wore a linen ephod. '
  '28':
  - type: text
    content: 'So all Israel brought up the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' with shouts, with the sounding of rams’ horns and trumpets, and of cymbals, and the playing of lyres and harps.'
  '29':
  - type: text
    content: 'As the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' was entering the City of David, Michal daughter of Saul watched from a window. And when she saw King David dancing and celebrating, she despised him in her heart.'
  '3':
  - type: text
    content: 'David assembled all Israel in Jerusalem to bring up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' to the place he had prepared for it. '
  '4':
  - type: text
    content: 'He called together the descendants of Aaron and the Levites:'
  '5':
  - type: text
    content: From the descendants of Kohath,
  - type: text
    content: Uriel the leader and 120 relatives;
  '6':
  - type: text
    content: from the descendants of Merari,
  - type: text
    content: Asaiah the leader and 220 relatives;
  '7':
  - type: text
    content: from the descendants of Gershon,
  - type: note
    content: Hebrew Gershom, a variant of Gershon
  - type: text
    content: Joel the leader and 130 relatives;
  '8':
  - type: text
    content: from the descendants of Elizaphan,
  - type: text
    content: Shemaiah the leader and 200 relatives;
  '9':
  - type: text
    content: from the descendants of Hebron,
  - type: text
    content: Eliel the leader and 80 relatives;
