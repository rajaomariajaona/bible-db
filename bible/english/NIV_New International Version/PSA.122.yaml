document_id: PSA.122,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 122
  - type: text
    content: A song of ascents. Of David.
  - type: text
    content: I rejoiced with those who said to me,
  - type: text
    content: '“Let us go to the house of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: Our feet are standing
  - type: text
    content: in your gates, Jerusalem.
  '3':
  - type: text
    content: Jerusalem is built like a city
  - type: text
    content: that is closely compacted together.
  '4':
  - type: text
    content: That is where the tribes go up—
  - type: text
    content: 'the tribes of the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: 'to praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: according to the statute given to Israel.
  '5':
  - type: text
    content: There stand the thrones for judgment,
  - type: text
    content: the thrones of the house of David.
  '6':
  - type: text
    content: 'Pray for the peace of Jerusalem:'
  - type: text
    content: “May those who love you be secure.
  '7':
  - type: text
    content: May there be peace within your walls
  - type: text
    content: and security within your citadels.”
  '8':
  - type: text
    content: For the sake of my family and friends,
  - type: text
    content: I will say, “Peace be within you.”
  '9':
  - type: text
    content: 'For the sake of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: I will seek your prosperity.
