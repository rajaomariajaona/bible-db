verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 122
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of ascents. Of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I rejoiced with those who said to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Let us go to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Our feet are standing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your gates, Jerusalem.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jerusalem is built like a city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that is closely compacted together.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: That is where the tribes go up—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the tribes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'to praise the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: according to the statute given to Israel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: There stand the thrones for judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the thrones of the house of David.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Pray for the peace of Jerusalem:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “May those who love you be secure.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: May there be peace within your walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and security within your citadels.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: For the sake of my family and friends,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will say, “Peace be within you.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For the sake of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will seek your prosperity.
