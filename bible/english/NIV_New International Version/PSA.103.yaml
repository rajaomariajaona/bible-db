document_id: PSA.103
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 103
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my soul;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: all my inmost being, praise his holy name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my soul,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and forget not all his benefits—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: who forgives all your sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: and heals all your diseases,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: who redeems your life from the pit
- type: usfm
  marker: q2
  children:
  - type: text
    text: and crowns you with love and compassion,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: who satisfies your desires with good things
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that your youth is renewed like the eagle’s.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' works righteousness'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and justice for all the oppressed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He made known his ways to Moses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'his deeds to the people of Israel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is compassionate and gracious,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: slow to anger, abounding in love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He will not always accuse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will he harbor his anger forever;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: he does not treat us as our sins deserve
- type: usfm
  marker: q2
  children:
  - type: text
    text: or repay us according to our iniquities.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For as high as the heavens are above the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so great is his love for those who fear him;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: as far as the east is from the west,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so far has he removed our transgressions from us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: As a father has compassion on his children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'so the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has compassion on those who fear him;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: for he knows how we are formed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he remembers that we are dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The life of mortals is like grass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they flourish like a flower of the field;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: the wind blows over it and it is gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its place remembers it no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But from everlasting to everlasting
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s love is with those who fear him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his righteousness with their children’s children—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: with those who keep his covenant
- type: usfm
  marker: q2
  children:
  - type: text
    text: and remember to obey his precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has established his throne in heaven,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his kingdom rules over all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you his angels,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you mighty ones who do his bidding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who obey his word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', all his heavenly hosts,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you his servants who do his will.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', all his works'
- type: usfm
  marker: q2
  children:
  - type: text
    text: everywhere in his dominion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my soul.'
