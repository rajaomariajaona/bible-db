document_id: PSA.103,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 103
  - type: text
    content: Of David.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', my soul;'
  - type: text
    content: all my inmost being, praise his holy name.
  '10':
  - type: text
    content: he does not treat us as our sins deserve
  - type: text
    content: or repay us according to our iniquities.
  '11':
  - type: text
    content: For as high as the heavens are above the earth,
  - type: text
    content: so great is his love for those who fear him;
  '12':
  - type: text
    content: as far as the east is from the west,
  - type: text
    content: so far has he removed our transgressions from us.
  '13':
  - type: text
    content: As a father has compassion on his children,
  - type: text
    content: 'so the '
  - type: text
    content: Lord
  - type: text
    content: ' has compassion on those who fear him;'
  '14':
  - type: text
    content: for he knows how we are formed,
  - type: text
    content: he remembers that we are dust.
  '15':
  - type: text
    content: The life of mortals is like grass,
  - type: text
    content: they flourish like a flower of the field;
  '16':
  - type: text
    content: the wind blows over it and it is gone,
  - type: text
    content: and its place remembers it no more.
  '17':
  - type: text
    content: But from everlasting to everlasting
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ’s love is with those who fear him,
  - type: text
    content: and his righteousness with their children’s children—
  '18':
  - type: text
    content: with those who keep his covenant
  - type: text
    content: and remember to obey his precepts.
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has established his throne in heaven,'
  - type: text
    content: and his kingdom rules over all.
  '2':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', my soul,'
  - type: text
    content: and forget not all his benefits—
  '20':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', you his angels,'
  - type: text
    content: you mighty ones who do his bidding,
  - type: text
    content: who obey his word.
  '21':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', all his heavenly hosts,'
  - type: text
    content: you his servants who do his will.
  '22':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', all his works'
  - type: text
    content: everywhere in his dominion.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', my soul.'
  '3':
  - type: text
    content: who forgives all your sins
  - type: text
    content: and heals all your diseases,
  '4':
  - type: text
    content: who redeems your life from the pit
  - type: text
    content: and crowns you with love and compassion,
  '5':
  - type: text
    content: who satisfies your desires with good things
  - type: text
    content: so that your youth is renewed like the eagle’s.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' works righteousness'
  - type: text
    content: and justice for all the oppressed.
  '7':
  - type: text
    content: He made known his ways to Moses,
  - type: text
    content: 'his deeds to the people of Israel:'
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is compassionate and gracious,'
  - type: text
    content: slow to anger, abounding in love.
  '9':
  - type: text
    content: He will not always accuse,
  - type: text
    content: nor will he harbor his anger forever;
