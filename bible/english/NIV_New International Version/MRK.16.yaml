document_id: MRK.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Has Risen
  - type: text
    content: 'When the Sabbath was over, Mary Magdalene, Mary the mother of James, and Salome bought spices so that they might go to anoint Jesus’ body. '
  '10':
  - type: text
    content: She went and told those who had been with him and who were mourning and weeping.
  - type: text
    content: ' '
  '11':
  - type: text
    content: When they heard that Jesus was alive and that she had seen him, they did not believe it.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Afterward Jesus appeared in a different form to two of them while they were walking in the country.
  - type: text
    content: ' '
  '13':
  - type: text
    content: These returned and reported it to the rest; but they did not believe them either.
  '14':
  - type: text
    content: ' '
  - type: text
    content: Later Jesus appeared to the Eleven as they were eating; he rebuked them for their lack of faith and their stubborn refusal to believe those who had seen him after he had risen.
  '15':
  - type: text
    content: ' '
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Go into all the world and preach the gospel to all creation.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Whoever believes and is baptized will be saved, but whoever does not believe will be condemned.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And these signs will accompany those who believe: In my name they will drive out demons; they will speak in new tongues;'
  - type: text
    content: ' '
  '18':
  - type: text
    content: they will pick up snakes with their hands; and when they drink deadly poison, it will not hurt them at all; they will place their hands on sick people, and they will get well.”
  '19':
  - type: text
    content: ' '
  - type: text
    content: After the Lord Jesus had spoken to them, he was taken up into heaven and he sat at the right hand of God.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Very early on the first day of the week, just after sunrise, they were on their way to the tomb '
  '20':
  - type: text
    content: Then the disciples went out and preached everywhere, and the Lord worked with them and confirmed his word by the signs that accompanied it.
  '3':
  - type: text
    content: and they asked each other, “Who will roll the stone away from the entrance of the tomb?”
  '4':
  - type: text
    content: 'But when they looked up, they saw that the stone, which was very large, had been rolled away. '
  '5':
  - type: text
    content: As they entered the tomb, they saw a young man dressed in a white robe sitting on the right side, and they were alarmed.
  '6':
  - type: text
    content: '“Don’t be alarmed,” he said. “You are looking for Jesus the Nazarene, who was crucified. He has risen! He is not here. See the place where they laid him. '
  '7':
  - type: text
    content: But go, tell his disciples and Peter, ‘He is going ahead of you into Galilee. There you will see him, just as he told you.’ ”
  '8':
  - type: text
    content: Trembling and bewildered, the women went out and fled from the tomb. They said nothing to anyone, because they were afraid.
  - type: note
    content: 'Some manuscripts have the following ending between verses 8 and 9, and one manuscript has it after verse 8 (omitting verses 9-20): Then they quickly reported all these instructions to those around Peter. After this, Jesus himself also sent out through them from east to west the sacred and imperishable proclamation of eternal salvation. Amen.'
  - type: text
    content: '[The earliest manuscripts and some other ancient witnesses do not have verses 9–20.]'
  '9':
  - type: text
    content: ' '
  - type: text
    content: When Jesus rose early on the first day of the week, he appeared first to Mary Magdalene, out of whom he had driven seven demons.
  - type: text
    content: ' '
