document_id: MRK.16,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Has Risen
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Sabbath was over, Mary Magdalene, Mary the mother of James, and Salome bought spices so that they might go to anoint Jesus’ body. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: She went and told those who had been with him and who were mourning and weeping.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When they heard that Jesus was alive and that she had seen him, they did not believe it.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Afterward Jesus appeared in a different form to two of them while they were walking in the country.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: These returned and reported it to the rest; but they did not believe them either.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Later Jesus appeared to the Eleven as they were eating; he rebuked them for their lack of faith and their stubborn refusal to believe those who had seen him after he had risen.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'He said to them, '
      - type: usfm
        marker: wj
        children:
        - type: text
          text: “Go into all the world and preach the gospel to all creation.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: Whoever believes and is baptized will be saved, but whoever does not believe will be condemned.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: 'And these signs will accompany those who believe: In my name they will drive out demons; they will speak in new tongues;'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: they will pick up snakes with their hands; and when they drink deadly poison, it will not hurt them at all; they will place their hands on sick people, and they will get well.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: After the Lord Jesus had spoken to them, he was taken up into heaven and he sat at the right hand of God.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Very early on the first day of the week, just after sunrise, they were on their way to the tomb '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then the disciples went out and preached everywhere, and the Lord worked with them and confirmed his word by the signs that accompanied it.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and they asked each other, “Who will roll the stone away from the entrance of the tomb?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they looked up, they saw that the stone, which was very large, had been rolled away. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As they entered the tomb, they saw a young man dressed in a white robe sitting on the right side, and they were alarmed.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Don’t be alarmed,” he said. “You are looking for Jesus the Nazarene, who was crucified. He has risen! He is not here. See the place where they laid him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But go, tell his disciples and Peter, ‘He is going ahead of you into Galilee. There you will see him, just as he told you.’ ”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Trembling and bewildered, the women went out and fled from the tomb. They said nothing to anyone, because they were afraid.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts have the following ending between verses 8 and 9, and one manuscript has it after verse 8 (omitting verses 9-20): '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Then they quickly reported all these instructions to those around Peter. After this, Jesus himself also sent out through them from east to west the sacred and imperishable proclamation of eternal salvation. Amen.
      marker-yv: yv-n
  - type: usfm
    marker: iex
    children:
    - type: text
      text: '[The earliest manuscripts and some other ancient witnesses do not have verses 9–20.]'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: When Jesus rose early on the first day of the week, he appeared first to Mary Magdalene, out of whom he had driven seven demons.
    - type: text
      text: ' '
