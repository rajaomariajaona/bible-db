document_id: JAS.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning to Rich Oppressors
  - type: text
    content: 'Now listen, you rich people, weep and wail because of the misery that is coming on you. '
  '10':
  - type: text
    content: 'Brothers and sisters, as an example of patience in the face of suffering, take the prophets who spoke in the name of the Lord. '
  '11':
  - type: text
    content: As you know, we count as blessed those who have persevered. You have heard of Job’s perseverance and have seen what the Lord finally brought about. The Lord is full of compassion and mercy.
  '12':
  - type: text
    content: Above all, my brothers and sisters, do not swear—not by heaven or by earth or by anything else. All you need to say is a simple “Yes” or “No.” Otherwise you will be condemned.
  - type: heading
    content: The Prayer of Faith
  '13':
  - type: text
    content: 'Is anyone among you in trouble? Let them pray. Is anyone happy? Let them sing songs of praise. '
  '14':
  - type: text
    content: 'Is anyone among you sick? Let them call the elders of the church to pray over them and anoint them with oil in the name of the Lord. '
  '15':
  - type: text
    content: 'And the prayer offered in faith will make the sick person well; the Lord will raise them up. If they have sinned, they will be forgiven. '
  '16':
  - type: text
    content: Therefore confess your sins to each other and pray for each other so that you may be healed. The prayer of a righteous person is powerful and effective.
  '17':
  - type: text
    content: 'Elijah was a human being, even as we are. He prayed earnestly that it would not rain, and it did not rain on the land for three and a half years. '
  '18':
  - type: text
    content: Again he prayed, and the heavens gave rain, and the earth produced its crops.
  '19':
  - type: text
    content: 'My brothers and sisters, if one of you should wander from the truth and someone should bring that person back, '
  '2':
  - type: text
    content: 'Your wealth has rotted, and moths have eaten your clothes. '
  '20':
  - type: text
    content: 'remember this: Whoever turns a sinner from the error of their way will save them from death and cover over a multitude of sins.'
  '3':
  - type: text
    content: 'Your gold and silver are corroded. Their corrosion will testify against you and eat your flesh like fire. You have hoarded wealth in the last days. '
  '4':
  - type: text
    content: 'Look! The wages you failed to pay the workers who mowed your fields are crying out against you. The cries of the harvesters have reached the ears of the Lord Almighty. '
  '5':
  - type: text
    content: You have lived on earth in luxury and self-indulgence. You have fattened yourselves in the day of slaughter.
  - type: note
    content: Or yourselves as in a day of feasting
  - type: text
    content: ' '
  '6':
  - type: text
    content: You have condemned and murdered the innocent one, who was not opposing you.
  - type: heading
    content: Patience in Suffering
  '7':
  - type: text
    content: 'Be patient, then, brothers and sisters, until the Lord’s coming. See how the farmer waits for the land to yield its valuable crop, patiently waiting for the autumn and spring rains. '
  '8':
  - type: text
    content: 'You too, be patient and stand firm, because the Lord’s coming is near. '
  '9':
  - type: text
    content: Don’t grumble against one another, brothers and sisters, or you will be judged. The Judge is standing at the door!
