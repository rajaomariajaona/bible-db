document_id: LUK.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Warnings and Encouragements
  - type: text
    content: 'Meanwhile, when a crowd of many thousands had gathered, so that they were trampling on one another, Jesus began to speak first to his disciples, saying: '
  - type: text
    content: “Be
  - type: note
    content: 'Or speak to his disciples, saying: “First of all, be'
  - type: text
    content: ' '
  - type: text
    content: on your guard against the yeast of the Pharisees, which is hypocrisy.
  - type: text
    content: ' '
  '10':
  - type: text
    content: And everyone who speaks a word against the Son of Man will be forgiven, but anyone who blasphemes against the Holy Spirit will not be forgiven.
  '11':
  - type: text
    content: ' '
  - type: text
    content: “When you are brought before synagogues, rulers and authorities, do not worry about how you will defend yourselves or what you will say,
  - type: text
    content: ' '
  '12':
  - type: text
    content: for the Holy Spirit will teach you at that time what you should say.”
  - type: heading
    content: The Parable of the Rich Fool
  '13':
  - type: text
    content: Someone in the crowd said to him, “Teacher, tell my brother to divide the inheritance with me.”
  '14':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Man, who appointed me a judge or an arbiter between you?”
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Then he said to them, '
  - type: text
    content: “Watch out! Be on your guard against all kinds of greed; life does not consist in an abundance of possessions.”
  '16':
  - type: text
    content: 'And he told them this parable: '
  - type: text
    content: “The ground of a certain rich man yielded an abundant harvest.
  - type: text
    content: ' '
  '17':
  - type: text
    content: He thought to himself, ‘What shall I do? I have no place to store my crops.’
  '18':
  - type: text
    content: ' '
  - type: text
    content: “Then he said, ‘This is what I’ll do. I will tear down my barns and build bigger ones, and there I will store my surplus grain.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And I’ll say to myself, “You have plenty of grain laid up for many years. Take life easy; eat, drink and be merry.” ’
  '2':
  - type: text
    content: There is nothing concealed that will not be disclosed, or hidden that will not be made known.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “But God said to him, ‘You fool! This very night your life will be demanded from you. Then who will get what you have prepared for yourself?’
  '21':
  - type: text
    content: ' '
  - type: text
    content: “This is how it will be with whoever stores up things for themselves but is not rich toward God.”
  - type: heading
    content: Do Not Worry
  '22':
  - type: text
    content: 'Then Jesus said to his disciples: '
  - type: text
    content: “Therefore I tell you, do not worry about your life, what you will eat; or about your body, what you will wear.
  - type: text
    content: ' '
  '23':
  - type: text
    content: For life is more than food, and the body more than clothes.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Consider the ravens: They do not sow or reap, they have no storeroom or barn; yet God feeds them. And how much more valuable you are than birds!'
  - type: text
    content: ' '
  '25':
  - type: text
    content: Who of you by worrying can add a single hour to your life
  - type: note
    content: Or single cubit to your height
  - type: text
    content: '?'
  - type: text
    content: ' '
  '26':
  - type: text
    content: Since you cannot do this very little thing, why do you worry about the rest?
  '27':
  - type: text
    content: ' '
  - type: text
    content: “Consider how the wild flowers grow. They do not labor or spin. Yet I tell you, not even Solomon in all his splendor was dressed like one of these.
  - type: text
    content: ' '
  '28':
  - type: text
    content: If that is how God clothes the grass of the field, which is here today, and tomorrow is thrown into the fire, how much more will he clothe you—you of little faith!
  - type: text
    content: ' '
  '29':
  - type: text
    content: And do not set your heart on what you will eat or drink; do not worry about it.
  - type: text
    content: ' '
  '3':
  - type: text
    content: What you have said in the dark will be heard in the daylight, and what you have whispered in the ear in the inner rooms will be proclaimed from the roofs.
  '30':
  - type: text
    content: For the pagan world runs after all such things, and your Father knows that you need them.
  - type: text
    content: ' '
  '31':
  - type: text
    content: But seek his kingdom, and these things will be given to you as well.
  '32':
  - type: text
    content: ' '
  - type: text
    content: “Do not be afraid, little flock, for your Father has been pleased to give you the kingdom.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Sell your possessions and give to the poor. Provide purses for yourselves that will not wear out, a treasure in heaven that will never fail, where no thief comes near and no moth destroys.
  - type: text
    content: ' '
  '34':
  - type: text
    content: For where your treasure is, there your heart will be also.
  - type: heading
    content: Watchfulness
  '35':
  - type: text
    content: ' '
  - type: text
    content: “Be dressed ready for service and keep your lamps burning,
  - type: text
    content: ' '
  '36':
  - type: text
    content: like servants waiting for their master to return from a wedding banquet, so that when he comes and knocks they can immediately open the door for him.
  - type: text
    content: ' '
  '37':
  - type: text
    content: It will be good for those servants whose master finds them watching when he comes. Truly I tell you, he will dress himself to serve, will have them recline at the table and will come and wait on them.
  - type: text
    content: ' '
  '38':
  - type: text
    content: It will be good for those servants whose master finds them ready, even if he comes in the middle of the night or toward daybreak.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'But understand this: If the owner of the house had known at what hour the thief was coming, he would not have let his house be broken into.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: “I tell you, my friends, do not be afraid of those who kill the body and after that can do no more.
  - type: text
    content: ' '
  '40':
  - type: text
    content: You also must be ready, because the Son of Man will come at an hour when you do not expect him.”
  '41':
  - type: text
    content: Peter asked, “Lord, are you telling this parable to us, or to everyone?”
  '42':
  - type: text
    content: 'The Lord answered, '
  - type: text
    content: “Who then is the faithful and wise manager, whom the master puts in charge of his servants to give them their food allowance at the proper time?
  - type: text
    content: ' '
  '43':
  - type: text
    content: It will be good for that servant whom the master finds doing so when he returns.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Truly I tell you, he will put him in charge of all his possessions.
  - type: text
    content: ' '
  '45':
  - type: text
    content: But suppose the servant says to himself, ‘My master is taking a long time in coming,’ and he then begins to beat the other servants, both men and women, and to eat and drink and get drunk.
  - type: text
    content: ' '
  '46':
  - type: text
    content: The master of that servant will come on a day when he does not expect him and at an hour he is not aware of. He will cut him to pieces and assign him a place with the unbelievers.
  '47':
  - type: text
    content: ' '
  - type: text
    content: “The servant who knows the master’s will and does not get ready or does not do what the master wants will be beaten with many blows.
  - type: text
    content: ' '
  '48':
  - type: text
    content: But the one who does not know and does things deserving punishment will be beaten with few blows. From everyone who has been given much, much will be demanded; and from the one who has been entrusted with much, much more will be asked.
  - type: heading
    content: Not Peace but Division
  '49':
  - type: text
    content: ' '
  - type: text
    content: “I have come to bring fire on the earth, and how I wish it were already kindled!
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'But I will show you whom you should fear: Fear him who, after your body has been killed, has authority to throw you into hell. Yes, I tell you, fear him.'
  - type: text
    content: ' '
  '50':
  - type: text
    content: But I have a baptism to undergo, and what constraint I am under until it is completed!
  - type: text
    content: ' '
  '51':
  - type: text
    content: Do you think I came to bring peace on earth? No, I tell you, but division.
  - type: text
    content: ' '
  '52':
  - type: text
    content: From now on there will be five in one family divided against each other, three against two and two against three.
  - type: text
    content: ' '
  '53':
  - type: text
    content: They will be divided, father against son and son against father, mother against daughter and daughter against mother, mother-in-law against daughter-in-law and daughter-in-law against mother-in-law.”
  - type: heading
    content: Interpreting the Times
  '54':
  - type: text
    content: 'He said to the crowd: '
  - type: text
    content: “When you see a cloud rising in the west, immediately you say, ‘It’s going to rain,’ and it does.
  - type: text
    content: ' '
  '55':
  - type: text
    content: And when the south wind blows, you say, ‘It’s going to be hot,’ and it is.
  - type: text
    content: ' '
  '56':
  - type: text
    content: Hypocrites! You know how to interpret the appearance of the earth and the sky. How is it that you don’t know how to interpret this present time?
  '57':
  - type: text
    content: ' '
  - type: text
    content: “Why don’t you judge for yourselves what is right?
  - type: text
    content: ' '
  '58':
  - type: text
    content: As you are going with your adversary to the magistrate, try hard to be reconciled on the way, or your adversary may drag you off to the judge, and the judge turn you over to the officer, and the officer throw you into prison.
  - type: text
    content: ' '
  '59':
  - type: text
    content: I tell you, you will not get out until you have paid the last penny.”
  '6':
  - type: text
    content: Are not five sparrows sold for two pennies? Yet not one of them is forgotten by God.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Indeed, the very hairs of your head are all numbered. Don’t be afraid; you are worth more than many sparrows.
  '8':
  - type: text
    content: ' '
  - type: text
    content: “I tell you, whoever publicly acknowledges me before others, the Son of Man will also acknowledge before the angels of God.
  - type: text
    content: ' '
  '9':
  - type: text
    content: But whoever disowns me before others will be disowned before the angels of God.
  - type: text
    content: ' '
