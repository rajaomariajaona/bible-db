    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It is as if the dew of Hermon
- type: usfm
  marker: q2
  children:
  - type: text
    text: were falling on Mount Zion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For there the '
