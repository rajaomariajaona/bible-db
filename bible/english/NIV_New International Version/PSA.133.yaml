    children:
    - type: text
      text: '2'
  - type: text
    text: It is like precious oil poured on the head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: running down on the beard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: running down on Aaron’s beard,
- type: usfm
  marker: q2
  children:
