document_id: PSA.133,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 133
  - type: text
    content: A song of ascents. Of David.
  - type: text
    content: How good and pleasant it is
  - type: text
    content: when God’s people live together in unity!
  '2':
  - type: text
    content: It is like precious oil poured on the head,
  - type: text
    content: running down on the beard,
  - type: text
    content: running down on Aaron’s beard,
  - type: text
    content: down on the collar of his robe.
  '3':
  - type: text
    content: It is as if the dew of Hermon
  - type: text
    content: were falling on Mount Zion.
  - type: text
    content: 'For there the '
  - type: text
    content: Lord
  - type: text
    content: ' bestows his blessing,'
  - type: text
    content: even life forevermore.
