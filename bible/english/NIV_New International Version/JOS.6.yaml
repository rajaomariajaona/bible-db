document_id: JOS.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the gates of Jericho were securely barred because of the Israelites. No one went out and no one came in.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Joshua had commanded the army, “Do not give a war cry, do not raise your voices, do not say a word until the day I tell you to shout. Then shout!” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he had the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' carried around the city, circling it once. Then the army returned to camp and spent the night there.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua got up early the next morning and the priests took up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The seven priests carrying the seven trumpets went forward, marching before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and blowing the trumpets. The armed men went ahead of them and the rear guard followed the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', while the trumpets kept sounding. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So on the second day they marched around the city once and returned to the camp. They did this for six days.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day, they got up at daybreak and marched around the city seven times in the same manner, except that on that day they circled the city seven times. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The seventh time around, when the priests sounded the trumpet blast, Joshua commanded the army, “Shout! For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given you the city! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The city and all that is in it are to be devoted
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them; also in verses 18 and 21.'
      marker-yv: yv-n
    - type: text
      text: ' to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Only Rahab the prostitute and all who are with her in her house shall be spared, because she hid the spies we sent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But keep away from the devoted things, so that you will not bring about your own destruction by taking any of them. Otherwise you will make the camp of Israel liable to destruction and bring trouble on it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the silver and gold and the articles of bronze and iron are sacred to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and must go into his treasury.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, “See, I have delivered Jericho into your hands, along with its king and its fighting men. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the trumpets sounded, the army shouted, and at the sound of the trumpet, when the men gave a loud shout, the wall collapsed; so everyone charged straight in, and they took the city. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They devoted the city to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and destroyed with the sword every living thing in it—men and women, young and old, cattle, sheep and donkeys.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua said to the two men who had spied out the land, “Go into the prostitute’s house and bring her out and all who belong to her, in accordance with your oath to her.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the young men who had done the spying went in and brought out Rahab, her father and mother, her brothers and sisters and all who belonged to her. They brought out her entire family and put them in a place outside the camp of Israel.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they burned the whole city and everything in it, but they put the silver and gold and the articles of bronze and iron into the treasury of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Joshua spared Rahab the prostitute, with her family and all who belonged to her, because she hid the men Joshua had sent as spies to Jericho—and she lives among the Israelites to this day.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Joshua pronounced this solemn oath: “Cursed before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is the one who undertakes to rebuild this city, Jericho:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “At the cost of his firstborn son
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will lay its foundations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at the cost of his youngest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will set up its gates.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with Joshua, and his fame spread throughout the land.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'March around the city once with all the armed men. Do this for six days. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have seven priests carry trumpets of rams’ horns in front of the ark. On the seventh day, march around the city seven times, with the priests blowing the trumpets. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When you hear them sound a long blast on the trumpets, have the whole army give a loud shout; then the wall of the city will collapse and the army will go up, everyone straight in.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua son of Nun called the priests and said to them, “Take up the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and have seven priests carry trumpets in front of it.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he ordered the army, “Advance! March around the city, with an armed guard going ahead of the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joshua had spoken to the people, the seven priests carrying the seven trumpets before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' went forward, blowing their trumpets, and the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s covenant followed them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The armed guard marched ahead of the priests who blew the trumpets, and the rear guard followed the ark. All this time the trumpets were sounding. '
