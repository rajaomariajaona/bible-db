document_id: ISA.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Praise to the Lord
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you are my God;'
  - type: text
    content: I will exalt you and praise your name,
  - type: text
    content: for in perfect faithfulness
  - type: text
    content: you have done wonderful things,
  - type: text
    content: things planned long ago.
  '10':
  - type: text
    content: 'The hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' will rest on this mountain;'
  - type: text
    content: but Moab will be trampled in their land
  - type: text
    content: as straw is trampled down in the manure.
  '11':
  - type: text
    content: They will stretch out their hands in it,
  - type: text
    content: as swimmers stretch out their hands to swim.
  - type: text
    content: God will bring down their pride
  - type: text
    content: despite the cleverness
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' of their hands.'
  '12':
  - type: text
    content: He will bring down your high fortified walls
  - type: text
    content: and lay them low;
  - type: text
    content: he will bring them down to the ground,
  - type: text
    content: to the very dust.
  '2':
  - type: text
    content: You have made the city a heap of rubble,
  - type: text
    content: the fortified town a ruin,
  - type: text
    content: the foreigners’ stronghold a city no more;
  - type: text
    content: it will never be rebuilt.
  '3':
  - type: text
    content: Therefore strong peoples will honor you;
  - type: text
    content: cities of ruthless nations will revere you.
  '4':
  - type: text
    content: You have been a refuge for the poor,
  - type: text
    content: a refuge for the needy in their distress,
  - type: text
    content: a shelter from the storm
  - type: text
    content: and a shade from the heat.
  - type: text
    content: For the breath of the ruthless
  - type: text
    content: is like a storm driving against a wall
  '5':
  - type: text
    content: and like the heat of the desert.
  - type: text
    content: You silence the uproar of foreigners;
  - type: text
    content: as heat is reduced by the shadow of a cloud,
  - type: text
    content: so the song of the ruthless is stilled.
  '6':
  - type: text
    content: 'On this mountain the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will prepare'
  - type: text
    content: a feast of rich food for all peoples,
  - type: text
    content: a banquet of aged wine—
  - type: text
    content: the best of meats and the finest of wines.
  '7':
  - type: text
    content: On this mountain he will destroy
  - type: text
    content: the shroud that enfolds all peoples,
  - type: text
    content: the sheet that covers all nations;
  '8':
  - type: text
    content: he will swallow up death forever.
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' will wipe away the tears'
  - type: text
    content: from all faces;
  - type: text
    content: he will remove his people’s disgrace
  - type: text
    content: from all the earth.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '9':
  - type: text
    content: In that day they will say,
  - type: text
    content: “Surely this is our God;
  - type: text
    content: we trusted in him, and he saved us.
  - type: text
    content: 'This is the '
  - type: text
    content: Lord
  - type: text
    content: ', we trusted in him;'
  - type: text
    content: let us rejoice and be glad in his salvation.”
