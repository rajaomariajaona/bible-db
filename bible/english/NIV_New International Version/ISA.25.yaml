document_id: ISA.25,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you are my God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will exalt you and praise your name,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for in perfect faithfulness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have done wonderful things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: things planned long ago.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will rest on this mountain;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but Moab will be trampled in their land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as straw is trampled down in the manure.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will stretch out their hands in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as swimmers stretch out their hands to swim.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will bring down their pride
  - type: usfm
    marker: q2
    children:
    - type: text
      text: despite the cleverness
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' of their hands.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will bring down your high fortified walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lay them low;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will bring them down to the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the very dust.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have made the city a heap of rubble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fortified town a ruin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the foreigners’ stronghold a city no more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will never be rebuilt.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore strong peoples will honor you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cities of ruthless nations will revere you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have been a refuge for the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a refuge for the needy in their distress,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a shelter from the storm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a shade from the heat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the breath of the ruthless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like a storm driving against a wall
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and like the heat of the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You silence the uproar of foreigners;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as heat is reduced by the shadow of a cloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so the song of the ruthless is stilled.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On this mountain the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty will prepare'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a feast of rich food for all peoples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a banquet of aged wine—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the best of meats and the finest of wines.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On this mountain he will destroy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the shroud that enfolds all peoples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the sheet that covers all nations;
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will swallow up death forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will wipe away the tears'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from all faces;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will remove his people’s disgrace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from all the earth.
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In that day they will say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Surely this is our God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we trusted in him, and he saved us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', we trusted in him;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let us rejoice and be glad in his salvation.”
