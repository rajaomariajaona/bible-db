document_id: 2KI.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Athaliah and Joash
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Athaliah the mother of Ahaziah saw that her son was dead, she proceeded to destroy the whole royal family. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he gave the commanders the spears and shields that had belonged to King David and that were in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The guards, each with weapon in hand, stationed themselves around the king—near the altar and the temple, from the south side to the north side of the temple.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoiada brought out the king’s son and put the crown on him; he presented him with a copy of the covenant and proclaimed him king. They anointed him, and the people clapped their hands and shouted, “Long live the king!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Athaliah heard the noise made by the guards and the people, she went to the people at the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She looked and there was the king, standing by the pillar, as the custom was. The officers and the trumpeters were beside the king, and all the people of the land were rejoicing and blowing trumpets. Then Athaliah tore her robes and called out, “Treason! Treason!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoiada the priest ordered the commanders of units of a hundred, who were in charge of the troops: “Bring her out between the ranks'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: out from the precincts
      marker-yv: yv-n
    - type: text
      text: ' and put to the sword anyone who follows her.” For the priest had said, “She must not be put to death in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they seized her as she reached the place where the horses enter the palace grounds, and there she was put to death.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoiada then made a covenant between the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the king and people that they would be the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s people. He also made a covenant between the king and the people. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the people of the land went to the temple of Baal and tore it down. They smashed the altars and idols to pieces and killed Mattan the priest of Baal in front of the altars.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jehoiada the priest posted guards at the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took with him the commanders of hundreds, the Carites, the guards and all the people of the land, and together they brought the king down from the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and went into the palace, entering by way of the gate of the guards. The king then took his place on the royal throne. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jehosheba, the daughter of King Jehoram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Joram, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jehoram
      marker-yv: yv-n
    - type: text
      text: ' and sister of Ahaziah, took Joash son of Ahaziah and stole him away from among the royal princes, who were about to be murdered. She put him and his nurse in a bedroom to hide him from Athaliah; so he was not killed. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the people of the land rejoiced, and the city was calm, because Athaliah had been slain with the sword at the palace.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joash
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoash, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Joash
      marker-yv: yv-n
    - type: text
      text: ' was seven years old when he began to reign.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts this verse (11:21) is numbered 12:1.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He remained hidden with his nurse at the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for six years while Athaliah ruled the land.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the seventh year Jehoiada sent for the commanders of units of a hundred, the Carites and the guards and had them brought to him at the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He made a covenant with them and put them under oath at the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Then he showed them the king’s son. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He commanded them, saying, “This is what you are to do: You who are in the three companies that are going on duty on the Sabbath—a third of you guarding the royal palace, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a third at the Sur Gate, and a third at the gate behind the guard, who take turns guarding the temple— '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you who are in the other two companies that normally go off Sabbath duty are all to guard the temple for the king. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Station yourselves around the king, each of you with weapon in hand. Anyone who approaches your ranks
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: approaches the precincts
      marker-yv: yv-n
    - type: text
      text: ' is to be put to death. Stay close to the king wherever he goes.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The commanders of units of a hundred did just as Jehoiada the priest ordered. Each one took his men—those who were going on duty on the Sabbath and those who were going off duty—and came to Jehoiada the priest. '
