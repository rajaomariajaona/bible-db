document_id: 2KI.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Athaliah and Joash
  - type: text
    content: 'When Athaliah the mother of Ahaziah saw that her son was dead, she proceeded to destroy the whole royal family. '
  '10':
  - type: text
    content: 'Then he gave the commanders the spears and shields that had belonged to King David and that were in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: The guards, each with weapon in hand, stationed themselves around the king—near the altar and the temple, from the south side to the north side of the temple.
  '12':
  - type: text
    content: Jehoiada brought out the king’s son and put the crown on him; he presented him with a copy of the covenant and proclaimed him king. They anointed him, and the people clapped their hands and shouted, “Long live the king!”
  '13':
  - type: text
    content: 'When Athaliah heard the noise made by the guards and the people, she went to the people at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: She looked and there was the king, standing by the pillar, as the custom was. The officers and the trumpeters were beside the king, and all the people of the land were rejoicing and blowing trumpets. Then Athaliah tore her robes and called out, “Treason! Treason!”
  '15':
  - type: text
    content: 'Jehoiada the priest ordered the commanders of units of a hundred, who were in charge of the troops: “Bring her out between the ranks'
  - type: note
    content: Or out from the precincts
  - type: text
    content: ' and put to the sword anyone who follows her.” For the priest had said, “She must not be put to death in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '16':
  - type: text
    content: So they seized her as she reached the place where the horses enter the palace grounds, and there she was put to death.
  '17':
  - type: text
    content: 'Jehoiada then made a covenant between the '
  - type: text
    content: Lord
  - type: text
    content: ' and the king and people that they would be the '
  - type: text
    content: Lord
  - type: text
    content: '’s people. He also made a covenant between the king and the people. '
  '18':
  - type: text
    content: All the people of the land went to the temple of Baal and tore it down. They smashed the altars and idols to pieces and killed Mattan the priest of Baal in front of the altars.
  - type: text
    content: 'Then Jehoiada the priest posted guards at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'He took with him the commanders of hundreds, the Carites, the guards and all the people of the land, and together they brought the king down from the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and went into the palace, entering by way of the gate of the guards. The king then took his place on the royal throne. '
  '2':
  - type: text
    content: But Jehosheba, the daughter of King Jehoram
  - type: note
    content: Hebrew Joram, a variant of Jehoram
  - type: text
    content: ' and sister of Ahaziah, took Joash son of Ahaziah and stole him away from among the royal princes, who were about to be murdered. She put him and his nurse in a bedroom to hide him from Athaliah; so he was not killed. '
  '20':
  - type: text
    content: All the people of the land rejoiced, and the city was calm, because Athaliah had been slain with the sword at the palace.
  '21':
  - type: text
    content: Joash
  - type: note
    content: Hebrew Jehoash, a variant of Joash
  - type: text
    content: ' was seven years old when he began to reign.'
  - type: note
    content: In Hebrew texts this verse (11:21) is numbered 12:1.
  '3':
  - type: text
    content: 'He remained hidden with his nurse at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' for six years while Athaliah ruled the land.'
  '4':
  - type: text
    content: 'In the seventh year Jehoiada sent for the commanders of units of a hundred, the Carites and the guards and had them brought to him at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. He made a covenant with them and put them under oath at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. Then he showed them the king’s son. '
  '5':
  - type: text
    content: 'He commanded them, saying, “This is what you are to do: You who are in the three companies that are going on duty on the Sabbath—a third of you guarding the royal palace, '
  '6':
  - type: text
    content: 'a third at the Sur Gate, and a third at the gate behind the guard, who take turns guarding the temple— '
  '7':
  - type: text
    content: 'and you who are in the other two companies that normally go off Sabbath duty are all to guard the temple for the king. '
  '8':
  - type: text
    content: Station yourselves around the king, each of you with weapon in hand. Anyone who approaches your ranks
  - type: note
    content: Or approaches the precincts
  - type: text
    content: ' is to be put to death. Stay close to the king wherever he goes.”'
  '9':
  - type: text
    content: 'The commanders of units of a hundred did just as Jehoiada the priest ordered. Each one took his men—those who were going on duty on the Sabbath and those who were going off duty—and came to Jehoiada the priest. '
