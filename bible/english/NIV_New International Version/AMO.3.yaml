segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Witnesses Summoned Against Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear this word, people of Israel, the word the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken against you—against the whole family I brought up out of Egypt:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “You only have I chosen
- type: usfm
  marker: q2
  children:
  - type: text
    text: of all the families of the earth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: therefore I will punish you
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all your sins.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Do two walk together
- type: usfm
  marker: q2
  children:
  - type: text
    text: unless they have agreed to do so?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Does a lion roar in the thicket
- type: usfm
  marker: q2
  children:
  - type: text
    text: when it has no prey?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does it growl in its den
- type: usfm
  marker: q2
  children:
  - type: text
    text: when it has caught nothing?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Does a bird swoop down to a trap on the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: when no bait is there?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Does a trap spring up from the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: if it has not caught anything?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When a trumpet sounds in a city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not the people tremble?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When disaster comes to a city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'has not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' caused it?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Surely the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' does nothing'
- type: usfm
  marker: q2
  children:
  - type: text
    text: without revealing his plan
- type: usfm
  marker: q2
  children:
  - type: text
    text: to his servants the prophets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The lion has roared—
- type: usfm
  marker: q2
  children:
  - type: text
    text: who will not fear?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who can but prophesy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Proclaim to the fortresses of Ashdod
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and to the fortresses of Egypt:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Assemble yourselves on the mountains of Samaria;
- type: usfm
  marker: q2
  children:
  - type: text
    text: see the great unrest within her
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the oppression among her people.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“They do not know how to do right,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “who store up in their fortresses
- type: usfm
  marker: q2
  children:
  - type: text
    text: what they have plundered and looted.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “An enemy will overrun your land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pull down your strongholds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and plunder your fortresses.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “As a shepherd rescues from the lion’s mouth
- type: usfm
  marker: q2
  children:
  - type: text
    text: only two leg bones or a piece of an ear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so will the Israelites living in Samaria be rescued,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with only the head of a bed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a piece of fabric
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this phrase is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' from a couch.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Israelites be rescued, / those who sit in Samaria / on the edge of their beds / and in Damascus on their couches.
    marker-yv: yv-n
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Hear this and testify against the descendants of Jacob,” declares the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God Almighty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “On the day I punish Israel for her sins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will destroy the altars of Bethel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the horns of the altar will be cut off
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fall to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will tear down the winter house
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with the summer house;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the houses adorned with ivory will be destroyed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the mansions will be demolished,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
