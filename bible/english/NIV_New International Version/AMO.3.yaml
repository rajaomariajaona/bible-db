document_id: AMO.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Witnesses Summoned Against Israel
  - type: text
    content: 'Hear this word, people of Israel, the word the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken against you—against the whole family I brought up out of Egypt:'
  '10':
  - type: text
    content: '“They do not know how to do right,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “who store up in their fortresses
  - type: text
    content: what they have plundered and looted.”
  '11':
  - type: text
    content: 'Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “An enemy will overrun your land,
  - type: text
    content: pull down your strongholds
  - type: text
    content: and plunder your fortresses.”
  '12':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “As a shepherd rescues from the lion’s mouth
  - type: text
    content: only two leg bones or a piece of an ear,
  - type: text
    content: so will the Israelites living in Samaria be rescued,
  - type: text
    content: with only the head of a bed
  - type: text
    content: and a piece of fabric
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' from a couch.'
  - type: note
    content: Or Israelites be rescued, / those who sit in Samaria / on the edge of their beds / and in Damascus on their couches.
  - type: text
    content: ”
  '13':
  - type: text
    content: '“Hear this and testify against the descendants of Jacob,” declares the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty.'
  '14':
  - type: text
    content: “On the day I punish Israel for her sins,
  - type: text
    content: I will destroy the altars of Bethel;
  - type: text
    content: the horns of the altar will be cut off
  - type: text
    content: and fall to the ground.
  '15':
  - type: text
    content: I will tear down the winter house
  - type: text
    content: along with the summer house;
  - type: text
    content: the houses adorned with ivory will be destroyed
  - type: text
    content: and the mansions will be demolished,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: “You only have I chosen
  - type: text
    content: of all the families of the earth;
  - type: text
    content: therefore I will punish you
  - type: text
    content: for all your sins.”
  '3':
  - type: text
    content: Do two walk together
  - type: text
    content: unless they have agreed to do so?
  '4':
  - type: text
    content: Does a lion roar in the thicket
  - type: text
    content: when it has no prey?
  - type: text
    content: Does it growl in its den
  - type: text
    content: when it has caught nothing?
  '5':
  - type: text
    content: Does a bird swoop down to a trap on the ground
  - type: text
    content: when no bait is there?
  - type: text
    content: Does a trap spring up from the ground
  - type: text
    content: if it has not caught anything?
  '6':
  - type: text
    content: When a trumpet sounds in a city,
  - type: text
    content: do not the people tremble?
  - type: text
    content: When disaster comes to a city,
  - type: text
    content: 'has not the '
  - type: text
    content: Lord
  - type: text
    content: ' caused it?'
  '7':
  - type: text
    content: 'Surely the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' does nothing'
  - type: text
    content: without revealing his plan
  - type: text
    content: to his servants the prophets.
  '8':
  - type: text
    content: The lion has roared—
  - type: text
    content: who will not fear?
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken—'
  - type: text
    content: who can but prophesy?
  '9':
  - type: text
    content: Proclaim to the fortresses of Ashdod
  - type: text
    content: 'and to the fortresses of Egypt:'
  - type: text
    content: “Assemble yourselves on the mountains of Samaria;
  - type: text
    content: see the great unrest within her
  - type: text
    content: and the oppression among her people.”
