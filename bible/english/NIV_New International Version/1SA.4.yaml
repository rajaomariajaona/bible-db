document_id: 1SA.4,111
type_code: eng
verses:
  '1':
  - type: text
    content: And Samuel’s word came to all Israel.
  - type: heading
    content: The Philistines Capture the Ark
  - type: text
    content: 'Now the Israelites went out to fight against the Philistines. The Israelites camped at Ebenezer, and the Philistines at Aphek. '
  '10':
  - type: text
    content: 'So the Philistines fought, and the Israelites were defeated and every man fled to his tent. The slaughter was very great; Israel lost thirty thousand foot soldiers. '
  '11':
  - type: text
    content: The ark of God was captured, and Eli’s two sons, Hophni and Phinehas, died.
  - type: heading
    content: Death of Eli
  '12':
  - type: text
    content: 'That same day a Benjamite ran from the battle line and went to Shiloh with his clothes torn and dust on his head. '
  '13':
  - type: text
    content: When he arrived, there was Eli sitting on his chair by the side of the road, watching, because his heart feared for the ark of God. When the man entered the town and told what had happened, the whole town sent up a cry.
  '14':
  - type: text
    content: Eli heard the outcry and asked, “What is the meaning of this uproar?”
  - type: text
    content: 'The man hurried over to Eli, '
  '15':
  - type: text
    content: 'who was ninety-eight years old and whose eyes had failed so that he could not see. '
  '16':
  - type: text
    content: He told Eli, “I have just come from the battle line; I fled from it this very day.”
  - type: text
    content: Eli asked, “What happened, my son?”
  '17':
  - type: text
    content: The man who brought the news replied, “Israel fled before the Philistines, and the army has suffered heavy losses. Also your two sons, Hophni and Phinehas, are dead, and the ark of God has been captured.”
  '18':
  - type: text
    content: When he mentioned the ark of God, Eli fell backward off his chair by the side of the gate. His neck was broken and he died, for he was an old man, and he was heavy. He had led
  - type: note
    content: Traditionally judged
  - type: text
    content: ' Israel forty years.'
  '19':
  - type: text
    content: 'His daughter-in-law, the wife of Phinehas, was pregnant and near the time of delivery. When she heard the news that the ark of God had been captured and that her father-in-law and her husband were dead, she went into labor and gave birth, but was overcome by her labor pains. '
  '2':
  - type: text
    content: 'The Philistines deployed their forces to meet Israel, and as the battle spread, Israel was defeated by the Philistines, who killed about four thousand of them on the battlefield. '
  '20':
  - type: text
    content: As she was dying, the women attending her said, “Don’t despair; you have given birth to a son.” But she did not respond or pay any attention.
  '21':
  - type: text
    content: She named the boy Ichabod,
  - type: note
    content: Ichabod means no glory.
  - type: text
    content: ' saying, “The Glory has departed from Israel”—because of the capture of the ark of God and the deaths of her father-in-law and her husband. '
  '22':
  - type: text
    content: She said, “The Glory has departed from Israel, for the ark of God has been captured.”
  '3':
  - type: text
    content: 'When the soldiers returned to camp, the elders of Israel asked, “Why did the '
  - type: text
    content: Lord
  - type: text
    content: ' bring defeat on us today before the Philistines? Let us bring the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ’s covenant from Shiloh, so that he may go with us and save us from the hand of our enemies.”
  '4':
  - type: text
    content: 'So the people sent men to Shiloh, and they brought back the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, who is enthroned between the cherubim. And Eli’s two sons, Hophni and Phinehas, were there with the ark of the covenant of God.'
  '5':
  - type: text
    content: 'When the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s covenant came into the camp, all Israel raised such a great shout that the ground shook. '
  '6':
  - type: text
    content: Hearing the uproar, the Philistines asked, “What’s all this shouting in the Hebrew camp?”
  - type: text
    content: 'When they learned that the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' had come into the camp, '
  '7':
  - type: text
    content: the Philistines were afraid. “A god has
  - type: note
    content: Or “Gods have (see Septuagint)
  - type: text
    content: ' come into the camp,” they said. “Oh no! Nothing like this has happened before. '
  '8':
  - type: text
    content: 'We’re doomed! Who will deliver us from the hand of these mighty gods? They are the gods who struck the Egyptians with all kinds of plagues in the wilderness. '
  '9':
  - type: text
    content: Be strong, Philistines! Be men, or you will be subject to the Hebrews, as they have been to you. Be men, and fight!”
