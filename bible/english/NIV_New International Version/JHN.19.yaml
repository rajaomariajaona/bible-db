document_id: JHN.19,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Sentenced to Be Crucified
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Pilate took Jesus and had him flogged. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do you refuse to speak to me?” Pilate said. “Don’t you realize I have power either to free you or to crucify you?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You would have no power over me if it were not given to you from above. Therefore the one who handed me over to you is guilty of a greater sin.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From then on, Pilate tried to set Jesus free, but the Jewish leaders kept shouting, “If you let this man go, you are no friend of Caesar. Anyone who claims to be a king opposes Caesar.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Pilate heard this, he brought Jesus out and sat down on the judge’s seat at a place known as the Stone Pavement (which in Aramaic is Gabbatha). '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It was the day of Preparation of the Passover; it was about noon.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Here is your king,” Pilate said to the Jews.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they shouted, “Take him away! Take him away! Crucify him!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Shall I crucify your king?” Pilate asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We have no king but Caesar,” the chief priests answered.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finally Pilate handed him over to them to be crucified.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Crucifixion of Jesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the soldiers took charge of Jesus. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Carrying his own cross, he went out to the place of the Skull (which in Aramaic is called Golgotha). '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There they crucified him, and with him two others—one on each side and Jesus in the middle.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate had a notice prepared and fastened to the cross. It read: '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: jesus of nazareth, the king of the jews
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The soldiers twisted together a crown of thorns and put it on his head. They clothed him in a purple robe '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many of the Jews read this sign, for the place where Jesus was crucified was near the city, and the sign was written in Aramaic, Latin and Greek. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The chief priests of the Jews protested to Pilate, “Do not write ‘The King of the Jews,’ but that this man claimed to be king of the Jews.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pilate answered, “What I have written, I have written.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the soldiers crucified Jesus, they took his clothes, dividing them into four shares, one for each of them, with the undergarment remaining. This garment was seamless, woven in one piece from top to bottom.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Let’s not tear it,” they said to one another. “Let’s decide by lot who will get it.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: This happened that the scripture might be fulfilled that said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They divided my clothes among them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cast lots for my garment.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 22:18
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: So this is what the soldiers did.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Near the cross of Jesus stood his mother, his mother’s sister, Mary the wife of Clopas, and Mary Magdalene. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus saw his mother there, and the disciple whom he loved standing nearby, he said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Woman,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Woman '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: does not denote any disrespect.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: here is your son,”
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to the disciple, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Here is your mother.”
    - type: text
      text: ' From that time on, this disciple took her into his home.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Jesus
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later, knowing that everything had now been finished, and so that Scripture would be fulfilled, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am thirsty.”
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A jar of wine vinegar was there, so they soaked a sponge in it, put the sponge on a stalk of the hyssop plant, and lifted it to Jesus’ lips. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and went up to him again and again, saying, “Hail, king of the Jews!” And they slapped him in the face.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he had received the drink, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is finished.”
    - type: text
      text: ' With that, he bowed his head and gave up his spirit.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it was the day of Preparation, and the next day was to be a special Sabbath. Because the Jewish leaders did not want the bodies left on the crosses during the Sabbath, they asked Pilate to have the legs broken and the bodies taken down. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The soldiers therefore came and broke the legs of the first man who had been crucified with Jesus, and then those of the other. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they came to Jesus and found that he was already dead, they did not break his legs. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead, one of the soldiers pierced Jesus’ side with a spear, bringing a sudden flow of blood and water. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man who saw it has given testimony, and his testimony is true. He knows that he tells the truth, and he testifies so that you also may believe. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These things happened so that the scripture would be fulfilled: “Not one of his bones will be broken,”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 12:46; Num. 9:12; Psalm 34:20
      marker-yv: yv-n
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and, as another scripture says, “They will look on the one they have pierced.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zech. 12:10
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Burial of Jesus
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later, Joseph of Arimathea asked Pilate for the body of Jesus. Now Joseph was a disciple of Jesus, but secretly because he feared the Jewish leaders. With Pilate’s permission, he came and took the body away. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was accompanied by Nicodemus, the man who earlier had visited Jesus at night. Nicodemus brought a mixture of myrrh and aloes, about seventy-five pounds.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or about 34 kilograms
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once more Pilate came out and said to the Jews gathered there, “Look, I am bringing him out to you to let you know that I find no basis for a charge against him.” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Taking Jesus’ body, the two of them wrapped it, with the spices, in strips of linen. This was in accordance with Jewish burial customs. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the place where Jesus was crucified, there was a garden, and in the garden a new tomb, in which no one had ever been laid. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because it was the Jewish day of Preparation and since the tomb was nearby, they laid Jesus there.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Jesus came out wearing the crown of thorns and the purple robe, Pilate said to them, “Here is the man!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As soon as the chief priests and their officials saw him, they shouted, “Crucify! Crucify!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Pilate answered, “You take him and crucify him. As for me, I find no basis for a charge against him.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Jewish leaders insisted, “We have a law, and according to that law he must die, because he claimed to be the Son of God.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Pilate heard this, he was even more afraid, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he went back inside the palace. “Where do you come from?” he asked Jesus, but Jesus gave him no answer. '
