document_id: JHN.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Sentenced to Be Crucified
  - type: text
    content: 'Then Pilate took Jesus and had him flogged. '
  '10':
  - type: text
    content: “Do you refuse to speak to me?” Pilate said. “Don’t you realize I have power either to free you or to crucify you?”
  '11':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “You would have no power over me if it were not given to you from above. Therefore the one who handed me over to you is guilty of a greater sin.”
  '12':
  - type: text
    content: From then on, Pilate tried to set Jesus free, but the Jewish leaders kept shouting, “If you let this man go, you are no friend of Caesar. Anyone who claims to be a king opposes Caesar.”
  '13':
  - type: text
    content: 'When Pilate heard this, he brought Jesus out and sat down on the judge’s seat at a place known as the Stone Pavement (which in Aramaic is Gabbatha). '
  '14':
  - type: text
    content: It was the day of Preparation of the Passover; it was about noon.
  - type: text
    content: “Here is your king,” Pilate said to the Jews.
  '15':
  - type: text
    content: But they shouted, “Take him away! Take him away! Crucify him!”
  - type: text
    content: “Shall I crucify your king?” Pilate asked.
  - type: text
    content: “We have no king but Caesar,” the chief priests answered.
  '16':
  - type: text
    content: Finally Pilate handed him over to them to be crucified.
  - type: heading
    content: The Crucifixion of Jesus
  - type: text
    content: 'So the soldiers took charge of Jesus. '
  '17':
  - type: text
    content: 'Carrying his own cross, he went out to the place of the Skull (which in Aramaic is called Golgotha). '
  '18':
  - type: text
    content: There they crucified him, and with him two others—one on each side and Jesus in the middle.
  '19':
  - type: text
    content: 'Pilate had a notice prepared and fastened to the cross. It read: '
  - type: heading
    content: jesus of nazareth, the king of the jews
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'The soldiers twisted together a crown of thorns and put it on his head. They clothed him in a purple robe '
  '20':
  - type: text
    content: 'Many of the Jews read this sign, for the place where Jesus was crucified was near the city, and the sign was written in Aramaic, Latin and Greek. '
  '21':
  - type: text
    content: The chief priests of the Jews protested to Pilate, “Do not write ‘The King of the Jews,’ but that this man claimed to be king of the Jews.”
  '22':
  - type: text
    content: Pilate answered, “What I have written, I have written.”
  '23':
  - type: text
    content: When the soldiers crucified Jesus, they took his clothes, dividing them into four shares, one for each of them, with the undergarment remaining. This garment was seamless, woven in one piece from top to bottom.
  '24':
  - type: text
    content: “Let’s not tear it,” they said to one another. “Let’s decide by lot who will get it.”
  - type: text
    content: This happened that the scripture might be fulfilled that said,
  - type: text
    content: “They divided my clothes among them
  - type: text
    content: and cast lots for my garment.”
  - type: note
    content: Psalm 22:18
  - type: text
    content: So this is what the soldiers did.
  '25':
  - type: text
    content: 'Near the cross of Jesus stood his mother, his mother’s sister, Mary the wife of Clopas, and Mary Magdalene. '
  '26':
  - type: text
    content: 'When Jesus saw his mother there, and the disciple whom he loved standing nearby, he said to her, '
  - type: text
    content: “Woman,
  - type: note
    content: The Greek for Woman does not denote any disrespect.
  - type: text
    content: ' '
  - type: text
    content: here is your son,”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'and to the disciple, '
  - type: text
    content: “Here is your mother.”
  - type: text
    content: ' From that time on, this disciple took her into his home.'
  - type: heading
    content: The Death of Jesus
  '28':
  - type: text
    content: 'Later, knowing that everything had now been finished, and so that Scripture would be fulfilled, Jesus said, '
  - type: text
    content: “I am thirsty.”
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'A jar of wine vinegar was there, so they soaked a sponge in it, put the sponge on a stalk of the hyssop plant, and lifted it to Jesus’ lips. '
  '3':
  - type: text
    content: and went up to him again and again, saying, “Hail, king of the Jews!” And they slapped him in the face.
  '30':
  - type: text
    content: 'When he had received the drink, Jesus said, '
  - type: text
    content: “It is finished.”
  - type: text
    content: ' With that, he bowed his head and gave up his spirit.'
  '31':
  - type: text
    content: 'Now it was the day of Preparation, and the next day was to be a special Sabbath. Because the Jewish leaders did not want the bodies left on the crosses during the Sabbath, they asked Pilate to have the legs broken and the bodies taken down. '
  '32':
  - type: text
    content: 'The soldiers therefore came and broke the legs of the first man who had been crucified with Jesus, and then those of the other. '
  '33':
  - type: text
    content: 'But when they came to Jesus and found that he was already dead, they did not break his legs. '
  '34':
  - type: text
    content: 'Instead, one of the soldiers pierced Jesus’ side with a spear, bringing a sudden flow of blood and water. '
  '35':
  - type: text
    content: 'The man who saw it has given testimony, and his testimony is true. He knows that he tells the truth, and he testifies so that you also may believe. '
  '36':
  - type: text
    content: 'These things happened so that the scripture would be fulfilled: “Not one of his bones will be broken,”'
  - type: note
    content: Exodus 12:46; Num. 9:12; Psalm 34:20
  - type: text
    content: ' '
  '37':
  - type: text
    content: and, as another scripture says, “They will look on the one they have pierced.”
  - type: note
    content: Zech. 12:10
  - type: heading
    content: The Burial of Jesus
  '38':
  - type: text
    content: 'Later, Joseph of Arimathea asked Pilate for the body of Jesus. Now Joseph was a disciple of Jesus, but secretly because he feared the Jewish leaders. With Pilate’s permission, he came and took the body away. '
  '39':
  - type: text
    content: He was accompanied by Nicodemus, the man who earlier had visited Jesus at night. Nicodemus brought a mixture of myrrh and aloes, about seventy-five pounds.
  - type: note
    content: Or about 34 kilograms
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Once more Pilate came out and said to the Jews gathered there, “Look, I am bringing him out to you to let you know that I find no basis for a charge against him.” '
  '40':
  - type: text
    content: 'Taking Jesus’ body, the two of them wrapped it, with the spices, in strips of linen. This was in accordance with Jewish burial customs. '
  '41':
  - type: text
    content: 'At the place where Jesus was crucified, there was a garden, and in the garden a new tomb, in which no one had ever been laid. '
  '42':
  - type: text
    content: Because it was the Jewish day of Preparation and since the tomb was nearby, they laid Jesus there.
  '5':
  - type: text
    content: When Jesus came out wearing the crown of thorns and the purple robe, Pilate said to them, “Here is the man!”
  '6':
  - type: text
    content: As soon as the chief priests and their officials saw him, they shouted, “Crucify! Crucify!”
  - type: text
    content: But Pilate answered, “You take him and crucify him. As for me, I find no basis for a charge against him.”
  '7':
  - type: text
    content: The Jewish leaders insisted, “We have a law, and according to that law he must die, because he claimed to be the Son of God.”
  '8':
  - type: text
    content: 'When Pilate heard this, he was even more afraid, '
  '9':
  - type: text
    content: 'and he went back inside the palace. “Where do you come from?” he asked Jesus, but Jesus gave him no answer. '
