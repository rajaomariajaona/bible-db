document_id: ISA.47
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall of Babylon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Go down, sit in the dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Virgin Daughter Babylon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sit on the ground without a throne,
- type: usfm
  marker: q2
  children:
  - type: text
    text: queen city of the Babylonians.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldeans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 5
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: No more will you be called
- type: usfm
  marker: q2
  children:
  - type: text
    text: tender or delicate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Take millstones and grind flour;
- type: usfm
  marker: q2
  children:
  - type: text
    text: take off your veil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lift up your skirts, bare your legs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wade through the streams.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Your nakedness will be exposed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your shame uncovered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will take vengeance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will spare no one.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Our Redeemer—the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty is his name—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Sit in silence, go into darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: queen city of the Babylonians;
- type: usfm
  marker: q1
  children:
  - type: text
    text: no more will you be called
- type: usfm
  marker: q2
  children:
  - type: text
    text: queen of kingdoms.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I was angry with my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: and desecrated my inheritance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I gave them into your hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you showed them no mercy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even on the aged
- type: usfm
  marker: q2
  children:
  - type: text
    text: you laid a very heavy yoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You said, ‘I am forever—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the eternal queen!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you did not consider these things
- type: usfm
  marker: q2
  children:
  - type: text
    text: or reflect on what might happen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Now then, listen, you lover of pleasure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lounging in your security
- type: usfm
  marker: q1
  children:
  - type: text
    text: and saying to yourself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I am, and there is none besides me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will never be a widow
- type: usfm
  marker: q2
  children:
  - type: text
    text: or suffer the loss of children.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Both of these will overtake you
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'in a moment, on a single day:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: loss of children and widowhood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will come upon you in full measure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in spite of your many sorceries
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all your potent spells.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You have trusted in your wickedness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have said, ‘No one sees me.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your wisdom and knowledge mislead you
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you say to yourself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I am, and there is none besides me.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Disaster will come upon you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will not know how to conjure it away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A calamity will fall upon you
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you cannot ward off with a ransom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: a catastrophe you cannot foresee
- type: usfm
  marker: q2
  children:
  - type: text
    text: will suddenly come upon you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Keep on, then, with your magic spells
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with your many sorceries,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which you have labored at since childhood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Perhaps you will succeed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: perhaps you will cause terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: All the counsel you have received has only worn you out!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let your astrologers come forward,
- type: usfm
  marker: q1
  children:
  - type: text
    text: those stargazers who make predictions month by month,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them save you from what is coming upon you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Surely they are like stubble;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fire will burn them up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cannot even save themselves
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the power of the flame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: These are not coals for warmth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: this is not a fire to sit by.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: That is all they are to you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: these you have dealt with
- type: usfm
  marker: q2
  children:
  - type: text
    text: and labored with since childhood.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All of them go on in their error;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is not one that can save you.
