document_id: ISA.47,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Babylon
  - type: text
    content: “Go down, sit in the dust,
  - type: text
    content: Virgin Daughter Babylon;
  - type: text
    content: sit on the ground without a throne,
  - type: text
    content: queen city of the Babylonians.
  - type: note
    content: Or Chaldeans; also in verse 5
  - type: text
    content: No more will you be called
  - type: text
    content: tender or delicate.
  '10':
  - type: text
    content: You have trusted in your wickedness
  - type: text
    content: and have said, ‘No one sees me.’
  - type: text
    content: Your wisdom and knowledge mislead you
  - type: text
    content: when you say to yourself,
  - type: text
    content: ‘I am, and there is none besides me.’
  '11':
  - type: text
    content: Disaster will come upon you,
  - type: text
    content: and you will not know how to conjure it away.
  - type: text
    content: A calamity will fall upon you
  - type: text
    content: that you cannot ward off with a ransom;
  - type: text
    content: a catastrophe you cannot foresee
  - type: text
    content: will suddenly come upon you.
  '12':
  - type: text
    content: “Keep on, then, with your magic spells
  - type: text
    content: and with your many sorceries,
  - type: text
    content: which you have labored at since childhood.
  - type: text
    content: Perhaps you will succeed,
  - type: text
    content: perhaps you will cause terror.
  '13':
  - type: text
    content: All the counsel you have received has only worn you out!
  - type: text
    content: Let your astrologers come forward,
  - type: text
    content: those stargazers who make predictions month by month,
  - type: text
    content: let them save you from what is coming upon you.
  '14':
  - type: text
    content: Surely they are like stubble;
  - type: text
    content: the fire will burn them up.
  - type: text
    content: They cannot even save themselves
  - type: text
    content: from the power of the flame.
  - type: text
    content: These are not coals for warmth;
  - type: text
    content: this is not a fire to sit by.
  '15':
  - type: text
    content: That is all they are to you—
  - type: text
    content: these you have dealt with
  - type: text
    content: and labored with since childhood.
  - type: text
    content: All of them go on in their error;
  - type: text
    content: there is not one that can save you.
  '2':
  - type: text
    content: Take millstones and grind flour;
  - type: text
    content: take off your veil.
  - type: text
    content: Lift up your skirts, bare your legs,
  - type: text
    content: and wade through the streams.
  '3':
  - type: text
    content: Your nakedness will be exposed
  - type: text
    content: and your shame uncovered.
  - type: text
    content: I will take vengeance;
  - type: text
    content: I will spare no one.”
  '4':
  - type: text
    content: 'Our Redeemer—the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is his name—'
  - type: text
    content: is the Holy One of Israel.
  '5':
  - type: text
    content: “Sit in silence, go into darkness,
  - type: text
    content: queen city of the Babylonians;
  - type: text
    content: no more will you be called
  - type: text
    content: queen of kingdoms.
  '6':
  - type: text
    content: I was angry with my people
  - type: text
    content: and desecrated my inheritance;
  - type: text
    content: I gave them into your hand,
  - type: text
    content: and you showed them no mercy.
  - type: text
    content: Even on the aged
  - type: text
    content: you laid a very heavy yoke.
  '7':
  - type: text
    content: You said, ‘I am forever—
  - type: text
    content: the eternal queen!’
  - type: text
    content: But you did not consider these things
  - type: text
    content: or reflect on what might happen.
  '8':
  - type: text
    content: “Now then, listen, you lover of pleasure,
  - type: text
    content: lounging in your security
  - type: text
    content: and saying to yourself,
  - type: text
    content: ‘I am, and there is none besides me.
  - type: text
    content: I will never be a widow
  - type: text
    content: or suffer the loss of children.’
  '9':
  - type: text
    content: Both of these will overtake you
  - type: text
    content: 'in a moment, on a single day:'
  - type: text
    content: loss of children and widowhood.
  - type: text
    content: They will come upon you in full measure,
  - type: text
    content: in spite of your many sorceries
  - type: text
    content: and all your potent spells.
