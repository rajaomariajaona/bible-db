document_id: LAM.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This chapter is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
      marker-yv: yv-n
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: How deserted lies the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: once so full of people!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How like a widow is she,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who once was great among the nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She who was queen among the provinces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has now become a slave.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The enemy laid hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on all her treasures;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: she saw pagan nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: enter her sanctuary—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those you had forbidden
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to enter your assembly.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: All her people groan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they search for bread;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they barter their treasures for food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to keep themselves alive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Look, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and consider,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am despised.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Is it nothing to you, all you who pass by?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look around and see.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is any suffering like my suffering
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that was inflicted on me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought on me'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the day of his fierce anger?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “From on high he sent fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sent it down into my bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He spread a net for my feet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turned me back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made me desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: faint all the day long.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “My sins have been bound into a yoke
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Most Hebrew manuscripts; many Hebrew manuscripts and Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He kept watch over my sins
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by his hands they were woven together.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have been hung on my neck,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the Lord has sapped my strength.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has given me into the hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of those I cannot withstand.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “The Lord has rejected
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the warriors in my midst;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he has summoned an army against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: has set a time for me / when he will
      marker-yv: yv-n
    - type: text
      text: ' crush my young men.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In his winepress the Lord has trampled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Virgin Daughter Judah.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “This is why I weep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my eyes overflow with tears.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one is near to comfort me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one to restore my spirit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My children are destitute
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because the enemy has prevailed.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Zion stretches out her hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but there is no one to comfort her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has decreed for Jacob'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that his neighbors become his foes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem has become
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an unclean thing among them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is righteous,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet I rebelled against his command.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, all you peoples;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look on my suffering.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My young men and young women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have gone into exile.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: “I called to my allies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they betrayed me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My priests and my elders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: perished in the city
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while they searched for food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to keep themselves alive.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Bitterly she weeps at night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tears are on her cheeks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among all her lovers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no one to comfort her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her friends have betrayed her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have become her enemies.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“See, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how distressed I am!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am in torment within,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and in my heart I am disturbed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have been most rebellious.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Outside, the sword bereaves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: inside, there is only death.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “People have heard my groaning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but there is no one to comfort me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my enemies have heard of my distress;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they rejoice at what you have done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May you bring the day you have announced
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they may become like me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Let all their wickedness come before you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deal with them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as you have dealt with me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of all my sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My groans are many
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my heart is faint.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: After affliction and harsh labor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Judah has gone into exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She dwells among the nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she finds no resting place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who pursue her have overtaken her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the midst of her distress.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The roads to Zion mourn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for no one comes to her appointed festivals.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All her gateways are desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her priests groan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: her young women grieve,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and she is in bitter anguish.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Her foes have become her masters;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her enemies are at ease.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has brought her grief'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of her many sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her children have gone into exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: captive before the foe.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: All the splendor has departed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from Daughter Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her princes are like deer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that find no pasture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in weakness they have fled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before the pursuer.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: In the days of her affliction and wandering
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jerusalem remembers all the treasures
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that were hers in days of old.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When her people fell into enemy hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there was no one to help her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her enemies looked at her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and laughed at her destruction.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jerusalem has sinned greatly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so has become unclean.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who honored her despise her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they have all seen her naked;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: she herself groans
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turns away.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Her filthiness clung to her skirts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she did not consider her future.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her fall was astounding;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there was none to comfort her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Look, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', on my affliction,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the enemy has triumphed.”
