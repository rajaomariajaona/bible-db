document_id: LAM.1,111
type_code: eng
verses:
  '1':
  - type: note
    content: This chapter is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
  - type: text
    content: How deserted lies the city,
  - type: text
    content: once so full of people!
  - type: text
    content: How like a widow is she,
  - type: text
    content: who once was great among the nations!
  - type: text
    content: She who was queen among the provinces
  - type: text
    content: has now become a slave.
  '10':
  - type: text
    content: The enemy laid hands
  - type: text
    content: on all her treasures;
  - type: text
    content: she saw pagan nations
  - type: text
    content: enter her sanctuary—
  - type: text
    content: those you had forbidden
  - type: text
    content: to enter your assembly.
  '11':
  - type: text
    content: All her people groan
  - type: text
    content: as they search for bread;
  - type: text
    content: they barter their treasures for food
  - type: text
    content: to keep themselves alive.
  - type: text
    content: '“Look, '
  - type: text
    content: Lord
  - type: text
    content: ', and consider,'
  - type: text
    content: for I am despised.”
  '12':
  - type: text
    content: “Is it nothing to you, all you who pass by?
  - type: text
    content: Look around and see.
  - type: text
    content: Is any suffering like my suffering
  - type: text
    content: that was inflicted on me,
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' brought on me'
  - type: text
    content: in the day of his fierce anger?
  '13':
  - type: text
    content: “From on high he sent fire,
  - type: text
    content: sent it down into my bones.
  - type: text
    content: He spread a net for my feet
  - type: text
    content: and turned me back.
  - type: text
    content: He made me desolate,
  - type: text
    content: faint all the day long.
  '14':
  - type: text
    content: “My sins have been bound into a yoke
  - type: note
    content: Most Hebrew manuscripts; many Hebrew manuscripts and Septuagint He kept watch over my sins
  - type: text
    content: ;
  - type: text
    content: by his hands they were woven together.
  - type: text
    content: They have been hung on my neck,
  - type: text
    content: and the Lord has sapped my strength.
  - type: text
    content: He has given me into the hands
  - type: text
    content: of those I cannot withstand.
  '15':
  - type: text
    content: “The Lord has rejected
  - type: text
    content: all the warriors in my midst;
  - type: text
    content: he has summoned an army against me
  - type: text
    content: to
  - type: note
    content: Or has set a time for me / when he will
  - type: text
    content: ' crush my young men.'
  - type: text
    content: In his winepress the Lord has trampled
  - type: text
    content: Virgin Daughter Judah.
  '16':
  - type: text
    content: “This is why I weep
  - type: text
    content: and my eyes overflow with tears.
  - type: text
    content: No one is near to comfort me,
  - type: text
    content: no one to restore my spirit.
  - type: text
    content: My children are destitute
  - type: text
    content: because the enemy has prevailed.”
  '17':
  - type: text
    content: Zion stretches out her hands,
  - type: text
    content: but there is no one to comfort her.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has decreed for Jacob'
  - type: text
    content: that his neighbors become his foes;
  - type: text
    content: Jerusalem has become
  - type: text
    content: an unclean thing among them.
  '18':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is righteous,'
  - type: text
    content: yet I rebelled against his command.
  - type: text
    content: Listen, all you peoples;
  - type: text
    content: look on my suffering.
  - type: text
    content: My young men and young women
  - type: text
    content: have gone into exile.
  '19':
  - type: text
    content: “I called to my allies
  - type: text
    content: but they betrayed me.
  - type: text
    content: My priests and my elders
  - type: text
    content: perished in the city
  - type: text
    content: while they searched for food
  - type: text
    content: to keep themselves alive.
  '2':
  - type: text
    content: Bitterly she weeps at night,
  - type: text
    content: tears are on her cheeks.
  - type: text
    content: Among all her lovers
  - type: text
    content: there is no one to comfort her.
  - type: text
    content: All her friends have betrayed her;
  - type: text
    content: they have become her enemies.
  '20':
  - type: text
    content: '“See, '
  - type: text
    content: Lord
  - type: text
    content: ', how distressed I am!'
  - type: text
    content: I am in torment within,
  - type: text
    content: and in my heart I am disturbed,
  - type: text
    content: for I have been most rebellious.
  - type: text
    content: Outside, the sword bereaves;
  - type: text
    content: inside, there is only death.
  '21':
  - type: text
    content: “People have heard my groaning,
  - type: text
    content: but there is no one to comfort me.
  - type: text
    content: All my enemies have heard of my distress;
  - type: text
    content: they rejoice at what you have done.
  - type: text
    content: May you bring the day you have announced
  - type: text
    content: so they may become like me.
  '22':
  - type: text
    content: “Let all their wickedness come before you;
  - type: text
    content: deal with them
  - type: text
    content: as you have dealt with me
  - type: text
    content: because of all my sins.
  - type: text
    content: My groans are many
  - type: text
    content: and my heart is faint.”
  '3':
  - type: text
    content: After affliction and harsh labor,
  - type: text
    content: Judah has gone into exile.
  - type: text
    content: She dwells among the nations;
  - type: text
    content: she finds no resting place.
  - type: text
    content: All who pursue her have overtaken her
  - type: text
    content: in the midst of her distress.
  '4':
  - type: text
    content: The roads to Zion mourn,
  - type: text
    content: for no one comes to her appointed festivals.
  - type: text
    content: All her gateways are desolate,
  - type: text
    content: her priests groan,
  - type: text
    content: her young women grieve,
  - type: text
    content: and she is in bitter anguish.
  '5':
  - type: text
    content: Her foes have become her masters;
  - type: text
    content: her enemies are at ease.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has brought her grief'
  - type: text
    content: because of her many sins.
  - type: text
    content: Her children have gone into exile,
  - type: text
    content: captive before the foe.
  '6':
  - type: text
    content: All the splendor has departed
  - type: text
    content: from Daughter Zion.
  - type: text
    content: Her princes are like deer
  - type: text
    content: that find no pasture;
  - type: text
    content: in weakness they have fled
  - type: text
    content: before the pursuer.
  '7':
  - type: text
    content: In the days of her affliction and wandering
  - type: text
    content: Jerusalem remembers all the treasures
  - type: text
    content: that were hers in days of old.
  - type: text
    content: When her people fell into enemy hands,
  - type: text
    content: there was no one to help her.
  - type: text
    content: Her enemies looked at her
  - type: text
    content: and laughed at her destruction.
  '8':
  - type: text
    content: Jerusalem has sinned greatly
  - type: text
    content: and so has become unclean.
  - type: text
    content: All who honored her despise her,
  - type: text
    content: for they have all seen her naked;
  - type: text
    content: she herself groans
  - type: text
    content: and turns away.
  '9':
  - type: text
    content: Her filthiness clung to her skirts;
  - type: text
    content: she did not consider her future.
  - type: text
    content: Her fall was astounding;
  - type: text
    content: there was none to comfort her.
  - type: text
    content: '“Look, '
  - type: text
    content: Lord
  - type: text
    content: ', on my affliction,'
  - type: text
    content: for the enemy has triumphed.”
