document_id: JER.46,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message About Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that came to Jeremiah the prophet concerning the nations:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But that day belongs to the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day of vengeance, for vengeance on his foes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sword will devour till it is satisfied,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till it has quenched its thirst with blood.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, will offer sacrifice'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the land of the north by the River Euphrates.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go up to Gilead and get balm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Virgin Daughter Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you try many medicines in vain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no healing for you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations will hear of your shame;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your cries will fill the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One warrior will stumble over another;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both will fall down together.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the message the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Jeremiah the prophet about the coming of Nebuchadnezzar king of Babylon to attack Egypt:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Announce this in Egypt, and proclaim it in Migdol;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'proclaim it also in Memphis and Tahpanhes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Take your positions and get ready,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the sword devours those around you.’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why will your warriors be laid low?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They cannot stand, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will push them down.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will stumble repeatedly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will fall over each other.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will say, ‘Get up, let us go back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to our own people and our native lands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: away from the sword of the oppressor.’
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There they will exclaim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Pharaoh king of Egypt is only a loud noise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has missed his opportunity.’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As surely as I live,” declares the King,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'whose name is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “one will come who is like Tabor among the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like Carmel by the sea.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pack your belongings for exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who live in Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for Memphis will be laid waste
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lie in ruins without inhabitant.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Concerning Egypt:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the message against the army of Pharaoh Necho king of Egypt, which was defeated at Carchemish on the Euphrates River by Nebuchadnezzar king of Babylon in the fourth year of Jehoiakim son of Josiah king of Judah:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Egypt is a beautiful heifer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a gadfly is coming
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against her from the north.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mercenaries in her ranks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are like fattened calves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They too will turn and flee together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will not stand their ground,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the day of disaster is coming upon them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the time for them to be punished.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt will hiss like a fleeing serpent
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the enemy advances in force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will come against her with axes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like men who cut down trees.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will chop down her forest,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “dense though it be.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are more numerous than locusts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they cannot be counted.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Daughter Egypt will be put to shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: given into the hands of the people of the north.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says: “I am about to bring punishment on Amon god of Thebes, on Pharaoh, on Egypt and her gods and her kings, and on those who rely on Pharaoh. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will give them into the hands of those who want to kill them—Nebuchadnezzar king of Babylon and his officers. Later, however, Egypt will be inhabited as in times past,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not be afraid, Jacob my servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not be dismayed, Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will surely save you out of a distant place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your descendants from the land of their exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob will again have peace and security,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will make him afraid.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be afraid, Jacob my servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for I am with you,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though I completely destroy all the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among which I scatter you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not completely destroy you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will discipline you but only in due measure;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not let you go entirely unpunished.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Prepare your shields, both large and small,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and march out for battle!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Harness the horses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mount the steeds!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take your positions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with helmets on!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Polish your spears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: put on your armor!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What do I see?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are terrified,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they are retreating,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their warriors are defeated.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They flee in haste
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without looking back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is terror on every side,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The swift cannot flee
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor the strong escape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the north by the River Euphrates
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stumble and fall.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who is this that rises like the Nile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like rivers of surging waters?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Egypt rises like the Nile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like rivers of surging waters.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She says, ‘I will rise and cover the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will destroy cities and their people.’
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Charge, you horses!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Drive furiously, you charioteers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: March on, you warriors—men of Cush
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the upper Nile region
      marker-yv: yv-n
    - type: text
      text: ' and Put who carry shields,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: men of Lydia who draw the bow.
