document_id: JER.46,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message About Egypt
  - type: text
    content: 'This is the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Jeremiah the prophet concerning the nations:'
  '10':
  - type: text
    content: 'But that day belongs to the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty—'
  - type: text
    content: a day of vengeance, for vengeance on his foes.
  - type: text
    content: The sword will devour till it is satisfied,
  - type: text
    content: till it has quenched its thirst with blood.
  - type: text
    content: 'For the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, will offer sacrifice'
  - type: text
    content: in the land of the north by the River Euphrates.
  '11':
  - type: text
    content: “Go up to Gilead and get balm,
  - type: text
    content: Virgin Daughter Egypt.
  - type: text
    content: But you try many medicines in vain;
  - type: text
    content: there is no healing for you.
  '12':
  - type: text
    content: The nations will hear of your shame;
  - type: text
    content: your cries will fill the earth.
  - type: text
    content: One warrior will stumble over another;
  - type: text
    content: both will fall down together.”
  '13':
  - type: text
    content: 'This is the message the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Jeremiah the prophet about the coming of Nebuchadnezzar king of Babylon to attack Egypt:'
  '14':
  - type: text
    content: “Announce this in Egypt, and proclaim it in Migdol;
  - type: text
    content: 'proclaim it also in Memphis and Tahpanhes:'
  - type: text
    content: ‘Take your positions and get ready,
  - type: text
    content: for the sword devours those around you.’
  '15':
  - type: text
    content: Why will your warriors be laid low?
  - type: text
    content: 'They cannot stand, for the '
  - type: text
    content: Lord
  - type: text
    content: ' will push them down.'
  '16':
  - type: text
    content: They will stumble repeatedly;
  - type: text
    content: they will fall over each other.
  - type: text
    content: They will say, ‘Get up, let us go back
  - type: text
    content: to our own people and our native lands,
  - type: text
    content: away from the sword of the oppressor.’
  '17':
  - type: text
    content: There they will exclaim,
  - type: text
    content: ‘Pharaoh king of Egypt is only a loud noise;
  - type: text
    content: he has missed his opportunity.’
  '18':
  - type: text
    content: “As surely as I live,” declares the King,
  - type: text
    content: 'whose name is the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: “one will come who is like Tabor among the mountains,
  - type: text
    content: like Carmel by the sea.
  '19':
  - type: text
    content: Pack your belongings for exile,
  - type: text
    content: you who live in Egypt,
  - type: text
    content: for Memphis will be laid waste
  - type: text
    content: and lie in ruins without inhabitant.
  '2':
  - type: text
    content: 'Concerning Egypt:'
  - type: text
    content: 'This is the message against the army of Pharaoh Necho king of Egypt, which was defeated at Carchemish on the Euphrates River by Nebuchadnezzar king of Babylon in the fourth year of Jehoiakim son of Josiah king of Judah:'
  '20':
  - type: text
    content: “Egypt is a beautiful heifer,
  - type: text
    content: but a gadfly is coming
  - type: text
    content: against her from the north.
  '21':
  - type: text
    content: The mercenaries in her ranks
  - type: text
    content: are like fattened calves.
  - type: text
    content: They too will turn and flee together,
  - type: text
    content: they will not stand their ground,
  - type: text
    content: for the day of disaster is coming upon them,
  - type: text
    content: the time for them to be punished.
  '22':
  - type: text
    content: Egypt will hiss like a fleeing serpent
  - type: text
    content: as the enemy advances in force;
  - type: text
    content: they will come against her with axes,
  - type: text
    content: like men who cut down trees.
  '23':
  - type: text
    content: They will chop down her forest,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “dense though it be.
  - type: text
    content: They are more numerous than locusts,
  - type: text
    content: they cannot be counted.
  '24':
  - type: text
    content: Daughter Egypt will be put to shame,
  - type: text
    content: given into the hands of the people of the north.”
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: “I am about to bring punishment on Amon god of Thebes, on Pharaoh, on Egypt and her gods and her kings, and on those who rely on Pharaoh. '
  '26':
  - type: text
    content: 'I will give them into the hands of those who want to kill them—Nebuchadnezzar king of Babylon and his officers. Later, however, Egypt will be inhabited as in times past,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: “Do not be afraid, Jacob my servant;
  - type: text
    content: do not be dismayed, Israel.
  - type: text
    content: I will surely save you out of a distant place,
  - type: text
    content: your descendants from the land of their exile.
  - type: text
    content: Jacob will again have peace and security,
  - type: text
    content: and no one will make him afraid.
  '28':
  - type: text
    content: Do not be afraid, Jacob my servant,
  - type: text
    content: 'for I am with you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Though I completely destroy all the nations
  - type: text
    content: among which I scatter you,
  - type: text
    content: I will not completely destroy you.
  - type: text
    content: I will discipline you but only in due measure;
  - type: text
    content: I will not let you go entirely unpunished.”
  '3':
  - type: text
    content: “Prepare your shields, both large and small,
  - type: text
    content: and march out for battle!
  '4':
  - type: text
    content: Harness the horses,
  - type: text
    content: mount the steeds!
  - type: text
    content: Take your positions
  - type: text
    content: with helmets on!
  - type: text
    content: Polish your spears,
  - type: text
    content: put on your armor!
  '5':
  - type: text
    content: What do I see?
  - type: text
    content: They are terrified,
  - type: text
    content: they are retreating,
  - type: text
    content: their warriors are defeated.
  - type: text
    content: They flee in haste
  - type: text
    content: without looking back,
  - type: text
    content: and there is terror on every side,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: “The swift cannot flee
  - type: text
    content: nor the strong escape.
  - type: text
    content: In the north by the River Euphrates
  - type: text
    content: they stumble and fall.
  '7':
  - type: text
    content: “Who is this that rises like the Nile,
  - type: text
    content: like rivers of surging waters?
  '8':
  - type: text
    content: Egypt rises like the Nile,
  - type: text
    content: like rivers of surging waters.
  - type: text
    content: She says, ‘I will rise and cover the earth;
  - type: text
    content: I will destroy cities and their people.’
  '9':
  - type: text
    content: Charge, you horses!
  - type: text
    content: Drive furiously, you charioteers!
  - type: text
    content: March on, you warriors—men of Cush
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: ' and Put who carry shields,'
  - type: text
    content: men of Lydia who draw the bow.
