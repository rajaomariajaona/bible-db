document_id: 1KI.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahijah’s Prophecy Against Jeroboam
  - type: text
    content: 'At that time Abijah son of Jeroboam became ill, '
  '10':
  - type: text
    content: “ ‘Because of this, I am going to bring disaster on the house of Jeroboam. I will cut off from Jeroboam every last male in Israel—slave or free.
  - type: note
    content: Or Israel—every ruler or leader
  - type: text
    content: ' I will burn up the house of Jeroboam as one burns dung, until it is all gone. '
  '11':
  - type: text
    content: 'Dogs will eat those belonging to Jeroboam who die in the city, and the birds will feed on those who die in the country. The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken!’'
  '12':
  - type: text
    content: '“As for you, go back home. When you set foot in your city, the boy will die. '
  '13':
  - type: text
    content: 'All Israel will mourn for him and bury him. He is the only one belonging to Jeroboam who will be buried, because he is the only one in the house of Jeroboam in whom the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has found anything good.'
  '14':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will raise up for himself a king over Israel who will cut off the family of Jeroboam. Even now this is beginning to happen.'
  - type: note
    content: The meaning of the Hebrew for this sentence is uncertain.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' will strike Israel, so that it will be like a reed swaying in the water. He will uproot Israel from this good land that he gave to their ancestors and scatter them beyond the Euphrates River, because they aroused the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger by making Asherah poles.
  - type: note
    content: That is, wooden symbols of the goddess Asherah; here and elsewhere in 1 Kings
  - type: text
    content: ' '
  '16':
  - type: text
    content: And he will give Israel up because of the sins Jeroboam has committed and has caused Israel to commit.”
  '17':
  - type: text
    content: 'Then Jeroboam’s wife got up and left and went to Tirzah. As soon as she stepped over the threshold of the house, the boy died. '
  '18':
  - type: text
    content: 'They buried him, and all Israel mourned for him, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said through his servant the prophet Ahijah.'
  '19':
  - type: text
    content: 'The other events of Jeroboam’s reign, his wars and how he ruled, are written in the book of the annals of the kings of Israel. '
  '2':
  - type: text
    content: 'and Jeroboam said to his wife, “Go, disguise yourself, so you won’t be recognized as the wife of Jeroboam. Then go to Shiloh. Ahijah the prophet is there—the one who told me I would be king over this people. '
  '20':
  - type: text
    content: He reigned for twenty-two years and then rested with his ancestors. And Nadab his son succeeded him as king.
  - type: heading
    content: Rehoboam King of Judah
  '21':
  - type: text
    content: 'Rehoboam son of Solomon was king in Judah. He was forty-one years old when he became king, and he reigned seventeen years in Jerusalem, the city the '
  - type: text
    content: Lord
  - type: text
    content: ' had chosen out of all the tribes of Israel in which to put his Name. His mother’s name was Naamah; she was an Ammonite.'
  '22':
  - type: text
    content: 'Judah did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: '. By the sins they committed they stirred up his jealous anger more than those who were before them had done. '
  '23':
  - type: text
    content: 'They also set up for themselves high places, sacred stones and Asherah poles on every high hill and under every spreading tree. '
  '24':
  - type: text
    content: 'There were even male shrine prostitutes in the land; the people engaged in all the detestable practices of the nations the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven out before the Israelites.'
  '25':
  - type: text
    content: 'In the fifth year of King Rehoboam, Shishak king of Egypt attacked Jerusalem. '
  '26':
  - type: text
    content: 'He carried off the treasures of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the treasures of the royal palace. He took everything, including all the gold shields Solomon had made. '
  '27':
  - type: text
    content: 'So King Rehoboam made bronze shields to replace them and assigned these to the commanders of the guard on duty at the entrance to the royal palace. '
  '28':
  - type: text
    content: 'Whenever the king went to the '
  - type: text
    content: Lord
  - type: text
    content: ’s temple, the guards bore the shields, and afterward they returned them to the guardroom.
  '29':
  - type: text
    content: 'As for the other events of Rehoboam’s reign, and all he did, are they not written in the book of the annals of the kings of Judah? '
  '3':
  - type: text
    content: 'Take ten loaves of bread with you, some cakes and a jar of honey, and go to him. He will tell you what will happen to the boy.” '
  '30':
  - type: text
    content: 'There was continual warfare between Rehoboam and Jeroboam. '
  '31':
  - type: text
    content: And Rehoboam rested with his ancestors and was buried with them in the City of David. His mother’s name was Naamah; she was an Ammonite. And Abijah
  - type: note
    content: Some Hebrew manuscripts and Septuagint (see also 2 Chron. 12:16); most Hebrew manuscripts Abijam
  - type: text
    content: ' his son succeeded him as king.'
  '4':
  - type: text
    content: So Jeroboam’s wife did what he said and went to Ahijah’s house in Shiloh.
  - type: text
    content: 'Now Ahijah could not see; his sight was gone because of his age. '
  '5':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' had told Ahijah, “Jeroboam’s wife is coming to ask you about her son, for he is ill, and you are to give her such and such an answer. When she arrives, she will pretend to be someone else.”'
  '6':
  - type: text
    content: 'So when Ahijah heard the sound of her footsteps at the door, he said, “Come in, wife of Jeroboam. Why this pretense? I have been sent to you with bad news. '
  '7':
  - type: text
    content: 'Go, tell Jeroboam that this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: ‘I raised you up from among the people and appointed you ruler over my people Israel. '
  '8':
  - type: text
    content: 'I tore the kingdom away from the house of David and gave it to you, but you have not been like my servant David, who kept my commands and followed me with all his heart, doing only what was right in my eyes. '
  '9':
  - type: text
    content: You have done more evil than all who lived before you. You have made for yourself other gods, idols made of metal; you have aroused my anger and turned your back on me.
