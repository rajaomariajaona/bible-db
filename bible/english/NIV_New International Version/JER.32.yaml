document_id: JER.32,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Buys a Field
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the word that came to Jeremiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the tenth year of Zedekiah king of Judah, which was the eighteenth year of Nebuchadnezzar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I signed and sealed the deed, had it witnessed, and weighed out the silver on the scales. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I took the deed of purchase—the sealed copy containing the terms and conditions, as well as the unsealed copy— '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and I gave this deed to Baruch son of Neriah, the son of Mahseiah, in the presence of my cousin Hanamel and of the witnesses who had signed the deed and of all the Jews sitting in the courtyard of the guard.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In their presence I gave Baruch these instructions: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says: Take these documents, both the sealed and unsealed copies of the deed of purchase, and put them in a clay jar so they will last a long time. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says: Houses, fields and vineyards will again be bought in this land.’'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“After I had given the deed of purchase to Baruch son of Neriah, I prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  '17':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: '“Ah, Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you have made the heavens and the earth by your great power and outstretched arm. Nothing is too hard for you. '
  '18':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'You show love to thousands but bring the punishment for the parents’ sins into the laps of their children after them. Great and mighty God, whose name is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, '
  '19':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'great are your purposes and mighty are your deeds. Your eyes are open to the ways of all mankind; you reward each person according to their conduct and as their deeds deserve. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The army of the king of Babylon was then besieging Jerusalem, and Jeremiah the prophet was confined in the courtyard of the guard in the royal palace of Judah.
  '20':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'You performed signs and wonders in Egypt and have continued them to this day, in Israel and among all mankind, and have gained the renown that is still yours. '
  '21':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'You brought your people Israel out of Egypt with signs and wonders, by a mighty hand and an outstretched arm and with great terror. '
  '22':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'You gave them this land you had sworn to give their ancestors, a land flowing with milk and honey. '
  '23':
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: They came in and took possession of it, but they did not obey you or follow your law; they did not do what you commanded them to do. So you brought all this disaster on them.
  '24':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“See how the siege ramps are built up to take the city. Because of the sword, famine and plague, the city will be given into the hands of the Babylonians who are attacking it. What you said has happened, as you now see. '
  '25':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'And though the city will be given into the hands of the Babylonians, you, Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', say to me, ‘Buy the field with silver and have the transaction witnessed.’ ”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Jeremiah: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of all mankind. Is anything too hard for me? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am about to give this city into the hands of the Babylonians and to Nebuchadnezzar king of Babylon, who will capture it. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Babylonians who are attacking this city will come in and set it on fire; they will burn it down, along with the houses where the people aroused my anger by burning incense on the roofs to Baal and by pouring out drink offerings to other gods.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Zedekiah king of Judah had imprisoned him there, saying, “Why do you prophesy as you do? You say, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am about to give this city into the hands of the king of Babylon, and he will capture it. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The people of Israel and Judah have done nothing but evil in my sight from their youth; indeed, the people of Israel have done nothing but arouse my anger with what their hands have made, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the day it was built until now, this city has so aroused my anger and wrath that I must remove it from my sight. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people of Israel and Judah have provoked me by all the evil they have done—they, their kings and officials, their priests and prophets, the people of Judah and those living in Jerusalem. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They turned their backs to me and not their faces; though I taught them again and again, they would not listen or respond to discipline. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They set up their vile images in the house that bears my Name and defiled it. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They built high places for Baal in the Valley of Ben Hinnom to sacrifice their sons and daughters to Molek, though I never commanded—nor did it enter my mind—that they should do such a detestable thing and so make Judah sin.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You are saying about this city, ‘By the sword, famine and plague it will be given into the hands of the king of Babylon’; but this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will surely gather them from all the lands where I banish them in my furious anger and great wrath; I will bring them back to this place and let them live in safety. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will be my people, and I will be their God. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will give them singleness of heart and action, so that they will always fear me and that all will then go well for them and for their children after them. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zedekiah king of Judah will not escape the Babylonians
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 5, 24, 25, 28, 29 and 43
      marker-yv: yv-n
    - type: text
      text: ' but will certainly be given into the hands of the king of Babylon, and will speak with him face to face and see him with his own eyes. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make an everlasting covenant with them: I will never stop doing good to them, and I will inspire them to fear me, so that they will never turn away from me. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will rejoice in doing them good and will assuredly plant them in this land with all my heart and soul.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: As I have brought all this great calamity on this people, so I will give them all the prosperity I have promised them. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once more fields will be bought in this land of which you say, ‘It is a desolate waste, without people or animals, for it has been given into the hands of the Babylonians.’ '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fields will be bought for silver, and deeds will be signed, sealed and witnessed in the territory of Benjamin, in the villages around Jerusalem, in the towns of Judah and in the towns of the hill country, of the western foothills and of the Negev, because I will restore their fortunes,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will bring them back from captivity
      marker-yv: yv-n
    - type: text
      text: ' declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will take Zedekiah to Babylon, where he will remain until I deal with him, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . If you fight against the Babylonians, you will not succeed.’ ”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeremiah said, “The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hanamel son of Shallum your uncle is going to come to you and say, ‘Buy my field at Anathoth, because as nearest relative it is your right and duty to buy it.’
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Then, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said, my cousin Hanamel came to me in the courtyard of the guard and said, ‘Buy my field at Anathoth in the territory of Benjamin. Since it is your right to redeem it and possess it, buy it for yourself.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I knew that this was the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so I bought the field at Anathoth from my cousin Hanamel and weighed out for him seventeen shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 7 ounces or about 200 grams
      marker-yv: yv-n
    - type: text
      text: ' of silver. '
