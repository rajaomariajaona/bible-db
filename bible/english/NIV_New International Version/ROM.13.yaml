document_id: ROM.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Submission to Governing Authorities
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let everyone be subject to the governing authorities, for there is no authority except that which God has established. The authorities that exist have been established by God. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Consequently, whoever rebels against the authority is rebelling against what God has instituted, and those who do so will bring judgment on themselves. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For rulers hold no terror for those who do right, but for those who do wrong. Do you want to be free from fear of the one in authority? Then do what is right and you will be commended. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the one in authority is God’s servant for your good. But if you do wrong, be afraid, for rulers do not bear the sword for no reason. They are God’s servants, agents of wrath to bring punishment on the wrongdoer. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Therefore, it is necessary to submit to the authorities, not only because of possible punishment but also as a matter of conscience.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This is also why you pay taxes, for the authorities are God’s servants, who give their full time to governing. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Give to everyone what you owe them: If you owe taxes, pay taxes; if revenue, then revenue; if respect, then respect; if honor, then honor.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Love Fulfills the Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Let no debt remain outstanding, except the continuing debt to love one another, for whoever loves others has fulfilled the law. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The commandments, “You shall not commit adultery,” “You shall not murder,” “You shall not steal,” “You shall not covet,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exodus 20:13-15,17; Deut. 5:17-19,21
    marker-yv: yv-n
  - type: text
    text: ' and whatever other command there may be, are summed up in this one command: “Love your neighbor as yourself.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lev. 19:18
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Love does no harm to a neighbor. Therefore love is the fulfillment of the law.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Day Is Near
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And do this, understanding the present time: The hour has already come for you to wake up from your slumber, because our salvation is nearer now than when we first believed. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The night is nearly over; the day is almost here. So let us put aside the deeds of darkness and put on the armor of light. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Let us behave decently, as in the daytime, not in carousing and drunkenness, not in sexual immorality and debauchery, not in dissension and jealousy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rather, clothe yourselves with the Lord Jesus Christ, and do not think about how to gratify the desires of the flesh.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In contexts like this, the Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'flesh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: tl
        children:
        - type: text
          text: sarx
      - type: text
        text: ) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit.
    marker-yv: yv-n
