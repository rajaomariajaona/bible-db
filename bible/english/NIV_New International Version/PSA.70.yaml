document_id: PSA.70,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 70In Hebrew texts 70:1-5 is numbered 70:2-6.
  - type: text
    content: For the director of music. Of David. A petition.
  - type: text
    content: Hasten, O God, to save me;
  - type: text
    content: 'come quickly, '
  - type: text
    content: Lord
  - type: text
    content: ', to help me.'
  '2':
  - type: text
    content: May those who want to take my life
  - type: text
    content: be put to shame and confusion;
  - type: text
    content: may all who desire my ruin
  - type: text
    content: be turned back in disgrace.
  '3':
  - type: text
    content: May those who say to me, “Aha! Aha!”
  - type: text
    content: turn back because of their shame.
  '4':
  - type: text
    content: But may all who seek you
  - type: text
    content: rejoice and be glad in you;
  - type: text
    content: may those who long for your saving help always say,
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is great!”'
  '5':
  - type: text
    content: But as for me, I am poor and needy;
  - type: text
    content: come quickly to me, O God.
  - type: text
    content: You are my help and my deliverer;
  - type: text
    content: Lord
  - type: text
    content: ', do not delay.'
