document_id: PSA.70,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 70
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 70:1-5 is numbered 70:2-6.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. Of David. A petition.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hasten, O God, to save me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'come quickly, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to help me.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who want to take my life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be put to shame and confusion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: may all who desire my ruin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be turned back in disgrace.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who say to me, “Aha! Aha!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn back because of their shame.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But may all who seek you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rejoice and be glad in you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: may those who long for your saving help always say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is great!”'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as for me, I am poor and needy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come quickly to me, O God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my help and my deliverer;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not delay.'
