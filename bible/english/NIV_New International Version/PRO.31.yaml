document_id: PRO.31
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Sayings of King Lemuel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The sayings of King Lemuel—an inspired utterance his mother taught him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Listen, my son! Listen, son of my womb!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen, my son, the answer to my prayers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Do not spend your strength
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wealth
    marker-yv: yv-n
  - type: text
    text: ' on women,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your vigor on those who ruin kings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: It is not for kings, Lemuel—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is not for kings to drink wine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not for rulers to crave beer,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: lest they drink and forget what has been decreed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and deprive all the oppressed of their rights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Let beer be for those who are perishing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wine for those who are in anguish!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let them drink and forget their poverty
- type: usfm
  marker: q2
  children:
  - type: text
    text: and remember their misery no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Speak up for those who cannot speak for themselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the rights of all who are destitute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Speak up and judge fairly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: defend the rights of the poor and needy.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: 'Epilogue: The Wife of Noble Character'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses 10-31 are an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
    marker-yv: yv-n
  - type: text
    text: A wife of noble character who can find?
- type: usfm
  marker: q2
  children:
  - type: text
    text: She is worth far more than rubies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Her husband has full confidence in her
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lacks nothing of value.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: She brings him good, not harm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the days of her life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: She selects wool and flax
- type: usfm
  marker: q2
  children:
  - type: text
    text: and works with eager hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: She is like the merchant ships,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bringing her food from afar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She gets up while it is still night;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she provides food for her family
- type: usfm
  marker: q2
  children:
  - type: text
    text: and portions for her female servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: She considers a field and buys it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: out of her earnings she plants a vineyard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: She sets about her work vigorously;
- type: usfm
  marker: q2
  children:
  - type: text
    text: her arms are strong for her tasks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: She sees that her trading is profitable,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her lamp does not go out at night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: In her hand she holds the distaff
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grasps the spindle with her fingers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: She opens her arms to the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and extends her hands to the needy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When it snows, she has no fear for her household;
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all of them are clothed in scarlet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: She makes coverings for her bed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she is clothed in fine linen and purple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Her husband is respected at the city gate,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where he takes his seat among the elders of the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: She makes linen garments and sells them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and supplies the merchants with sashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: She is clothed with strength and dignity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she can laugh at the days to come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: She speaks with wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and faithful instruction is on her tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: She watches over the affairs of her household
- type: usfm
  marker: q2
  children:
  - type: text
    text: and does not eat the bread of idleness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Her children arise and call her blessed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'her husband also, and he praises her:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Many women do noble things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you surpass them all.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Charm is deceptive, and beauty is fleeting;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but a woman who fears the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is to be praised.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Honor her for all that her hands have done,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let her works bring her praise at the city gate.
