document_id: PRO.31,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Sayings of King Lemuel
  - type: text
    content: The sayings of King Lemuel—an inspired utterance his mother taught him.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Verses 10-31 are an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
  - type: text
    content: A wife of noble character who can find?
  - type: text
    content: She is worth far more than rubies.
  '11':
  - type: text
    content: Her husband has full confidence in her
  - type: text
    content: and lacks nothing of value.
  '12':
  - type: text
    content: She brings him good, not harm,
  - type: text
    content: all the days of her life.
  '13':
  - type: text
    content: She selects wool and flax
  - type: text
    content: and works with eager hands.
  '14':
  - type: text
    content: She is like the merchant ships,
  - type: text
    content: bringing her food from afar.
  '15':
  - type: text
    content: She gets up while it is still night;
  - type: text
    content: she provides food for her family
  - type: text
    content: and portions for her female servants.
  '16':
  - type: text
    content: She considers a field and buys it;
  - type: text
    content: out of her earnings she plants a vineyard.
  '17':
  - type: text
    content: She sets about her work vigorously;
  - type: text
    content: her arms are strong for her tasks.
  '18':
  - type: text
    content: She sees that her trading is profitable,
  - type: text
    content: and her lamp does not go out at night.
  '19':
  - type: text
    content: In her hand she holds the distaff
  - type: text
    content: and grasps the spindle with her fingers.
  '2':
  - type: text
    content: Listen, my son! Listen, son of my womb!
  - type: text
    content: Listen, my son, the answer to my prayers!
  '20':
  - type: text
    content: She opens her arms to the poor
  - type: text
    content: and extends her hands to the needy.
  '21':
  - type: text
    content: When it snows, she has no fear for her household;
  - type: text
    content: for all of them are clothed in scarlet.
  '22':
  - type: text
    content: She makes coverings for her bed;
  - type: text
    content: she is clothed in fine linen and purple.
  '23':
  - type: text
    content: Her husband is respected at the city gate,
  - type: text
    content: where he takes his seat among the elders of the land.
  '24':
  - type: text
    content: She makes linen garments and sells them,
  - type: text
    content: and supplies the merchants with sashes.
  '25':
  - type: text
    content: She is clothed with strength and dignity;
  - type: text
    content: she can laugh at the days to come.
  '26':
  - type: text
    content: She speaks with wisdom,
  - type: text
    content: and faithful instruction is on her tongue.
  '27':
  - type: text
    content: She watches over the affairs of her household
  - type: text
    content: and does not eat the bread of idleness.
  '28':
  - type: text
    content: Her children arise and call her blessed;
  - type: text
    content: 'her husband also, and he praises her:'
  '29':
  - type: text
    content: “Many women do noble things,
  - type: text
    content: but you surpass them all.”
  '3':
  - type: text
    content: Do not spend your strength
  - type: note
    content: Or wealth
  - type: text
    content: ' on women,'
  - type: text
    content: your vigor on those who ruin kings.
  '30':
  - type: text
    content: Charm is deceptive, and beauty is fleeting;
  - type: text
    content: 'but a woman who fears the '
  - type: text
    content: Lord
  - type: text
    content: ' is to be praised.'
  '31':
  - type: text
    content: Honor her for all that her hands have done,
  - type: text
    content: and let her works bring her praise at the city gate.
  '4':
  - type: text
    content: It is not for kings, Lemuel—
  - type: text
    content: it is not for kings to drink wine,
  - type: text
    content: not for rulers to crave beer,
  '5':
  - type: text
    content: lest they drink and forget what has been decreed,
  - type: text
    content: and deprive all the oppressed of their rights.
  '6':
  - type: text
    content: Let beer be for those who are perishing,
  - type: text
    content: wine for those who are in anguish!
  '7':
  - type: text
    content: Let them drink and forget their poverty
  - type: text
    content: and remember their misery no more.
  '8':
  - type: text
    content: Speak up for those who cannot speak for themselves,
  - type: text
    content: for the rights of all who are destitute.
  '9':
  - type: text
    content: Speak up and judge fairly;
  - type: text
    content: defend the rights of the poor and needy.
  - type: heading
    content: 'Epilogue: The Wife of Noble Character'
