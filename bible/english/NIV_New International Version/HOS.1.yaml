document_id: HOS.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Hosea son of Beeri during the reigns of Uzziah, Jotham, Ahaz and Hezekiah, kings of Judah, and during the reign of Jeroboam son of Jehoash'
  - type: note
    content: Hebrew Joash, a variant of Jehoash
  - type: text
    content: ' king of Israel:'
  - type: heading
    content: Hosea’s Wife and Children
  '10':
  - type: text
    content: '“Yet the Israelites will be like the sand on the seashore, which cannot be measured or counted. In the place where it was said to them, ‘You are not my people,’ they will be called ‘children of the living God.’ '
  '11':
  - type: text
    content: The people of Judah and the people of Israel will come together; they will appoint one leader and will come up out of the land, for great will be the day of Jezreel.
  - type: note
    content: In Hebrew texts 1:10,11 is numbered 2:1,2.
  '2':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' began to speak through Hosea, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Go, marry a promiscuous woman and have children with her, for like an adulterous wife this land is guilty of unfaithfulness to the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
  '3':
  - type: text
    content: So he married Gomer daughter of Diblaim, and she conceived and bore him a son.
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Hosea, “Call him Jezreel, because I will soon punish the house of Jehu for the massacre at Jezreel, and I will put an end to the kingdom of Israel. '
  '5':
  - type: text
    content: In that day I will break Israel’s bow in the Valley of Jezreel.”
  '6':
  - type: text
    content: 'Gomer conceived again and gave birth to a daughter. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Hosea, “Call her Lo-Ruhamah (which means “not loved”), for I will no longer show love to Israel, that I should at all forgive them. '
  '7':
  - type: text
    content: 'Yet I will show love to Judah; and I will save them—not by bow, sword or battle, or by horses and horsemen, but I, the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, will save them.”'
  '8':
  - type: text
    content: 'After she had weaned Lo-Ruhamah, Gomer had another son. '
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Call him Lo-Ammi (which means “not my people”), for you are not my people, and I am not your God.'
  - type: note
    content: Or your I am
