document_id: DEU.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar on Mount Ebal
  - type: text
    content: 'Moses and the elders of Israel commanded the people: “Keep all these commands that I give you today. '
  '10':
  - type: text
    content: 'Obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and follow his commands and decrees that I give you today.”'
  '11':
  - type: text
    content: 'On the same day Moses commanded the people:'
  '12':
  - type: text
    content: 'When you have crossed the Jordan, these tribes shall stand on Mount Gerizim to bless the people: Simeon, Levi, Judah, Issachar, Joseph and Benjamin. '
  '13':
  - type: text
    content: 'And these tribes shall stand on Mount Ebal to pronounce curses: Reuben, Gad, Asher, Zebulun, Dan and Naphtali.'
  '14':
  - type: text
    content: 'The Levites shall recite to all the people of Israel in a loud voice:'
  '15':
  - type: text
    content: '“Cursed is anyone who makes an idol—a thing detestable to the '
  - type: text
    content: Lord
  - type: text
    content: ', the work of skilled hands—and sets it up in secret.”'
  - type: text
    content: Then all the people shall say, “Amen!”
  '16':
  - type: text
    content: “Cursed is anyone who dishonors their father or mother.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '17':
  - type: text
    content: “Cursed is anyone who moves their neighbor’s boundary stone.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '18':
  - type: text
    content: “Cursed is anyone who leads the blind astray on the road.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '19':
  - type: text
    content: “Cursed is anyone who withholds justice from the foreigner, the fatherless or the widow.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '2':
  - type: text
    content: 'When you have crossed the Jordan into the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, set up some large stones and coat them with plaster. '
  '20':
  - type: text
    content: “Cursed is anyone who sleeps with his father’s wife, for he dishonors his father’s bed.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '21':
  - type: text
    content: “Cursed is anyone who has sexual relations with any animal.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '22':
  - type: text
    content: “Cursed is anyone who sleeps with his sister, the daughter of his father or the daughter of his mother.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '23':
  - type: text
    content: “Cursed is anyone who sleeps with his mother-in-law.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '24':
  - type: text
    content: “Cursed is anyone who kills their neighbor secretly.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '25':
  - type: text
    content: “Cursed is anyone who accepts a bribe to kill an innocent person.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '26':
  - type: text
    content: “Cursed is anyone who does not uphold the words of this law by carrying them out.”
  - type: text
    content: Then all the people shall say, “Amen!”
  '3':
  - type: text
    content: 'Write on them all the words of this law when you have crossed over to enter the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, a land flowing with milk and honey, just as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, promised you. '
  '4':
  - type: text
    content: 'And when you have crossed the Jordan, set up these stones on Mount Ebal, as I command you today, and coat them with plaster. '
  '5':
  - type: text
    content: 'Build there an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, an altar of stones. Do not use any iron tool on them. '
  '6':
  - type: text
    content: 'Build the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with fieldstones and offer burnt offerings on it to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '7':
  - type: text
    content: 'Sacrifice fellowship offerings there, eating them and rejoicing in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '8':
  - type: text
    content: And you shall write very clearly all the words of this law on these stones you have set up.”
  - type: heading
    content: Curses From Mount Ebal
  '9':
  - type: text
    content: 'Then Moses and the Levitical priests said to all Israel, “Be silent, Israel, and listen! You have now become the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
