document_id: DEU.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Altar on Mount Ebal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moses and the elders of Israel commanded the people: “Keep all these commands that I give you today. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'When you have crossed the Jordan into the land the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving you, set up some large stones and coat them with plaster. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Write on them all the words of this law when you have crossed over to enter the land the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God is giving you, a land flowing with milk and honey, just as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of your ancestors, promised you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And when you have crossed the Jordan, set up these stones on Mount Ebal, as I command you today, and coat them with plaster. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Build there an altar to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, an altar of stones. Do not use any iron tool on them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Build the altar of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God with fieldstones and offer burnt offerings on it to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sacrifice fellowship offerings there, eating them and rejoicing in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And you shall write very clearly all the words of this law on these stones you have set up.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Curses From Mount Ebal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Moses and the Levitical priests said to all Israel, “Be silent, Israel, and listen! You have now become the people of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Obey the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God and follow his commands and decrees that I give you today.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On the same day Moses commanded the people:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When you have crossed the Jordan, these tribes shall stand on Mount Gerizim to bless the people: Simeon, Levi, Judah, Issachar, Joseph and Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And these tribes shall stand on Mount Ebal to pronounce curses: Reuben, Gad, Asher, Zebulun, Dan and Naphtali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The Levites shall recite to all the people of Israel in a loud voice:'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Cursed is anyone who makes an idol—a thing detestable to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the work of skilled hands—and sets it up in secret.”'
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Cursed is anyone who dishonors their father or mother.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Cursed is anyone who moves their neighbor’s boundary stone.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Cursed is anyone who leads the blind astray on the road.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Cursed is anyone who withholds justice from the foreigner, the fatherless or the widow.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Cursed is anyone who sleeps with his father’s wife, for he dishonors his father’s bed.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Cursed is anyone who has sexual relations with any animal.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Cursed is anyone who sleeps with his sister, the daughter of his father or the daughter of his mother.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Cursed is anyone who sleeps with his mother-in-law.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Cursed is anyone who kills their neighbor secretly.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Cursed is anyone who accepts a bribe to kill an innocent person.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Cursed is anyone who does not uphold the words of this law by carrying them out.”
- type: usfm
  marker: pmr
  children:
  - type: text
    text: Then all the people shall say, “Amen!”
