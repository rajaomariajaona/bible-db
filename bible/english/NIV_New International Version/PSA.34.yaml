  '1':
  - type: heading
    content: Psalm 34This psalm is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.In Hebrew texts 34:1-22 is numbered 34:2-23.
  - type: text
    content: Of David. When he pretended to be insane before Abimelek, who drove him away, and he left.
  - type: text
    content: 'I will extol the '
  - type: text
    content: Lord
  - type: text
    content: ' at all times;'
  - type: text
    content: his praise will always be on my lips.
  '10':
  - type: text
    content: The lions may grow weak and hungry,
  - type: text
    content: 'but those who seek the '
  - type: text
    content: Lord
  - type: text
    content: ' lack no good thing.'
  '11':
  - type: text
    content: Come, my children, listen to me;
  - type: text
    content: 'I will teach you the fear of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: Whoever of you loves life
  - type: text
    content: and desires to see many good days,
  '13':
  - type: text
    content: keep your tongue from evil
  - type: text
    content: and your lips from telling lies.
  '14':
  - type: text
    content: Turn from evil and do good;
  - type: text
    content: seek peace and pursue it.
  '15':
  - type: text
    content: 'The eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' are on the righteous,'
  - type: text
    content: and his ears are attentive to their cry;
  '16':
  - type: text
    content: 'but the face of the '
  - type: text
    content: Lord
  - type: text
    content: ' is against those who do evil,'
  - type: text
    content: to blot out their name from the earth.
  '17':
  - type: text
    content: 'The righteous cry out, and the '
  - type: text
    content: Lord
  - type: text
    content: ' hears them;'
  - type: text
    content: he delivers them from all their troubles.
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is close to the brokenhearted'
  - type: text
    content: and saves those who are crushed in spirit.
  '19':
  - type: text
    content: The righteous person may have many troubles,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' delivers him from them all;'
  '2':
  - type: text
    content: 'I will glory in the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: let the afflicted hear and rejoice.
  '20':
  - type: text
    content: he protects all his bones,
  - type: text
    content: not one of them will be broken.
  '21':
  - type: text
    content: Evil will slay the wicked;
  - type: text
    content: the foes of the righteous will be condemned.
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will rescue his servants;'
  - type: text
    content: no one who takes refuge in him will be condemned.
  '3':
  - type: text
    content: 'Glorify the '
  - type: text
    content: Lord
  - type: text
    content: ' with me;'
  - type: text
    content: let us exalt his name together.
  '4':
  - type: text
    content: 'I sought the '
  - type: text
    content: Lord
  - type: text
    content: ', and he answered me;'
  - type: text
    content: he delivered me from all my fears.
  '5':
  - type: text
    content: Those who look to him are radiant;
  - type: text
    content: their faces are never covered with shame.
  '6':
  - type: text
    content: 'This poor man called, and the '
  - type: text
    content: Lord
  - type: text
    content: ' heard him;'
  - type: text
    content: he saved him out of all his troubles.
  '7':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' encamps around those who fear him,'
  - type: text
    content: and he delivers them.
  '8':
  - type: text
    content: 'Taste and see that the '
  - type: text
    content: Lord
  - type: text
    content: ' is good;'
  - type: text
    content: blessed is the one who takes refuge in him.
  '9':
  - type: text
    content: 'Fear the '
  - type: text
    content: Lord
  - type: text
    content: ', you his holy people,'
  - type: text
    content: for those who fear him lack nothing.
