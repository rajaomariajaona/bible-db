document_id: PSA.34,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 34
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
      marker-yv: yv-n
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 34:1-22 is numbered 34:2-23.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Of David. When he pretended to be insane before Abimelek, who drove him away, and he left.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I will extol the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at all times;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his praise will always be on my lips.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The lions may grow weak and hungry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but those who seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lack no good thing.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Come, my children, listen to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will teach you the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Whoever of you loves life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and desires to see many good days,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: keep your tongue from evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your lips from telling lies.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Turn from evil and do good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: seek peace and pursue it.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are on the righteous,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his ears are attentive to their cry;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'but the face of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is against those who do evil,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to blot out their name from the earth.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The righteous cry out, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hears them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he delivers them from all their troubles.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is close to the brokenhearted'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and saves those who are crushed in spirit.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The righteous person may have many troubles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivers him from them all;'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I will glory in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the afflicted hear and rejoice.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: he protects all his bones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one of them will be broken.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Evil will slay the wicked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the foes of the righteous will be condemned.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will rescue his servants;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one who takes refuge in him will be condemned.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Glorify the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let us exalt his name together.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I sought the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he answered me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he delivered me from all my fears.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Those who look to him are radiant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their faces are never covered with shame.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'This poor man called, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' heard him;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he saved him out of all his troubles.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' encamps around those who fear him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he delivers them.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Taste and see that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blessed is the one who takes refuge in him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you his holy people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for those who fear him lack nothing.
