document_id: 1SA.23,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Saves Keilah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David was told, “Look, the Philistines are fighting against Keilah and are looting the threshing floors,” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David said, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, your servant has heard definitely that Saul plans to come to Keilah and destroy the town on account of me. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Will the citizens of Keilah surrender me to him? Will Saul come down, as your servant has heard? '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', God of Israel, tell your servant.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “He will.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again David asked, “Will the citizens of Keilah surrender me and my men to Saul?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “They will.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David and his men, about six hundred in number, left Keilah and kept moving from place to place. When Saul was told that David had escaped from Keilah, he did not go there.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David stayed in the wilderness strongholds and in the hills of the Desert of Ziph. Day after day Saul searched for him, but God did not give David into his hands.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While David was at Horesh in the Desert of Ziph, he learned that
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he was afraid because
      marker-yv: yv-n
    - type: text
      text: ' Saul had come out to take his life. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Saul’s son Jonathan went to David at Horesh and helped him find strength in God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Don’t be afraid,” he said. “My father Saul will not lay a hand on you. You will be king over Israel, and I will be second to you. Even my father Saul knows this.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two of them made a covenant before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Then Jonathan went home, but David remained at Horesh.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Ziphites went up to Saul at Gibeah and said, “Is not David hiding among us in the strongholds at Horesh, on the hill of Hakilah, south of Jeshimon? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he inquired of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “Shall I go and attack these Philistines?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered him, “Go, attack the Philistines and save Keilah.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now, Your Majesty, come down whenever it pleases you to do so, and we will be responsible for giving him into your hands.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul replied, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you for your concern for me. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go and get more information. Find out where David usually goes and who has seen him there. They tell me he is very crafty. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Find out about all the hiding places he uses and come back to me with definite information. Then I will go with you; if he is in the area, I will track him down among all the clans of Judah.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they set out and went to Ziph ahead of Saul. Now David and his men were in the Desert of Maon, in the Arabah south of Jeshimon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul and his men began the search, and when David was told about it, he went down to the rock and stayed in the Desert of Maon. When Saul heard this, he went into the Desert of Maon in pursuit of David.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul was going along one side of the mountain, and David and his men were on the other side, hurrying to get away from Saul. As Saul and his forces were closing in on David and his men to capture them, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a messenger came to Saul, saying, “Come quickly! The Philistines are raiding the land.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul broke off his pursuit of David and went to meet the Philistines. That is why they call this place Sela Hammahlekoth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sela Hammahlekoth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rock of parting.
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And David went up from there and lived in the strongholds of En Gedi.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts this verse (23:29) is numbered 24:1.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But David’s men said to him, “Here in Judah we are afraid. How much more, then, if we go to Keilah against the Philistine forces!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once again David inquired of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered him, “Go down to Keilah, for I am going to give the Philistines into your hand.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David and his men went to Keilah, fought the Philistines and carried off their livestock. He inflicted heavy losses on the Philistines and saved the people of Keilah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (Now Abiathar son of Ahimelek had brought the ephod down with him when he fled to David at Keilah.)
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul Pursues David
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul was told that David had gone to Keilah, and he said, “God has delivered him into my hands, for David has imprisoned himself by entering a town with gates and bars.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Saul called up all his forces for battle, to go down to Keilah to besiege David and his men.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When David learned that Saul was plotting against him, he said to Abiathar the priest, “Bring the ephod.” '
