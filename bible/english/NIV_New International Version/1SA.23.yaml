document_id: 1SA.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Saves Keilah
  - type: text
    content: 'When David was told, “Look, the Philistines are fighting against Keilah and are looting the threshing floors,” '
  '10':
  - type: text
    content: David said, “
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, your servant has heard definitely that Saul plans to come to Keilah and destroy the town on account of me. '
  '11':
  - type: text
    content: 'Will the citizens of Keilah surrender me to him? Will Saul come down, as your servant has heard? '
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel, tell your servant.”'
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “He will.”'
  '12':
  - type: text
    content: Again David asked, “Will the citizens of Keilah surrender me and my men to Saul?”
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “They will.”'
  '13':
  - type: text
    content: So David and his men, about six hundred in number, left Keilah and kept moving from place to place. When Saul was told that David had escaped from Keilah, he did not go there.
  '14':
  - type: text
    content: David stayed in the wilderness strongholds and in the hills of the Desert of Ziph. Day after day Saul searched for him, but God did not give David into his hands.
  '15':
  - type: text
    content: While David was at Horesh in the Desert of Ziph, he learned that
  - type: note
    content: Or he was afraid because
  - type: text
    content: ' Saul had come out to take his life. '
  '16':
  - type: text
    content: 'And Saul’s son Jonathan went to David at Horesh and helped him find strength in God. '
  '17':
  - type: text
    content: '“Don’t be afraid,” he said. “My father Saul will not lay a hand on you. You will be king over Israel, and I will be second to you. Even my father Saul knows this.” '
  '18':
  - type: text
    content: 'The two of them made a covenant before the '
  - type: text
    content: Lord
  - type: text
    content: . Then Jonathan went home, but David remained at Horesh.
  '19':
  - type: text
    content: 'The Ziphites went up to Saul at Gibeah and said, “Is not David hiding among us in the strongholds at Horesh, on the hill of Hakilah, south of Jeshimon? '
  '2':
  - type: text
    content: 'he inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', saying, “Shall I go and attack these Philistines?”'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered him, “Go, attack the Philistines and save Keilah.”'
  '20':
  - type: text
    content: Now, Your Majesty, come down whenever it pleases you to do so, and we will be responsible for giving him into your hands.”
  '21':
  - type: text
    content: 'Saul replied, “The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you for your concern for me. '
  '22':
  - type: text
    content: 'Go and get more information. Find out where David usually goes and who has seen him there. They tell me he is very crafty. '
  '23':
  - type: text
    content: Find out about all the hiding places he uses and come back to me with definite information. Then I will go with you; if he is in the area, I will track him down among all the clans of Judah.”
  '24':
  - type: text
    content: 'So they set out and went to Ziph ahead of Saul. Now David and his men were in the Desert of Maon, in the Arabah south of Jeshimon. '
  '25':
  - type: text
    content: Saul and his men began the search, and when David was told about it, he went down to the rock and stayed in the Desert of Maon. When Saul heard this, he went into the Desert of Maon in pursuit of David.
  '26':
  - type: text
    content: 'Saul was going along one side of the mountain, and David and his men were on the other side, hurrying to get away from Saul. As Saul and his forces were closing in on David and his men to capture them, '
  '27':
  - type: text
    content: 'a messenger came to Saul, saying, “Come quickly! The Philistines are raiding the land.” '
  '28':
  - type: text
    content: Then Saul broke off his pursuit of David and went to meet the Philistines. That is why they call this place Sela Hammahlekoth.
  - type: note
    content: Sela Hammahlekoth means rock of parting.
  - type: text
    content: ' '
  '29':
  - type: text
    content: And David went up from there and lived in the strongholds of En Gedi.
  - type: note
    content: In Hebrew texts this verse (23:29) is numbered 24:1.
  '3':
  - type: text
    content: But David’s men said to him, “Here in Judah we are afraid. How much more, then, if we go to Keilah against the Philistine forces!”
  '4':
  - type: text
    content: 'Once again David inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' answered him, “Go down to Keilah, for I am going to give the Philistines into your hand.” '
  '5':
  - type: text
    content: 'So David and his men went to Keilah, fought the Philistines and carried off their livestock. He inflicted heavy losses on the Philistines and saved the people of Keilah. '
  '6':
  - type: text
    content: (Now Abiathar son of Ahimelek had brought the ephod down with him when he fled to David at Keilah.)
  - type: heading
    content: Saul Pursues David
  '7':
  - type: text
    content: 'Saul was told that David had gone to Keilah, and he said, “God has delivered him into my hands, for David has imprisoned himself by entering a town with gates and bars.” '
  '8':
  - type: text
    content: And Saul called up all his forces for battle, to go down to Keilah to besiege David and his men.
  '9':
  - type: text
    content: 'When David learned that Saul was plotting against him, he said to Abiathar the priest, “Bring the ephod.” '
