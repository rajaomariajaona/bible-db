document_id: 2CH.36
type_code: eng
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: And the people of the land took Jehoahaz son of Josiah and made him king in Jerusalem in place of his father.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoahaz King of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jehoahaz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joahaz, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jehoahaz
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 4
    marker-yv: yv-n
  - type: text
    text: ' was twenty-three years old when he became king, and he reigned in Jerusalem three months. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The king of Egypt dethroned him in Jerusalem and imposed on Judah a levy of a hundred talents
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 3/4 tons or about 3.4 metric tons
    marker-yv: yv-n
  - type: text
    text: ' of silver and a talent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 75 pounds or about 34 kilograms
    marker-yv: yv-n
  - type: text
    text: ' of gold. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The king of Egypt made Eliakim, a brother of Jehoahaz, king over Judah and Jerusalem and changed Eliakim’s name to Jehoiakim. But Necho took Eliakim’s brother Jehoahaz and carried him off to Egypt.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoiakim King of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jehoiakim was twenty-five years old when he became king, and he reigned in Jerusalem eleven years. He did evil in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nebuchadnezzar king of Babylon attacked him and bound him with bronze shackles to take him to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nebuchadnezzar also took to Babylon articles from the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and put them in his temple'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: palace
    marker-yv: yv-n
  - type: text
    text: ' there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The other events of Jehoiakim’s reign, the detestable things he did and all that was found against him, are written in the book of the kings of Israel and Judah. And Jehoiachin his son succeeded him as king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoiachin King of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehoiachin was eighteen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One Hebrew manuscript, some Septuagint manuscripts and Syriac (see also 2 Kings 24:8); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: eight
    marker-yv: yv-n
  - type: text
    text: ' years old when he became king, and he reigned in Jerusalem three months and ten days. He did evil in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In the spring, King Nebuchadnezzar sent for him and brought him to Babylon, together with articles of value from the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and he made Jehoiachin’s uncle,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brother, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that is, relative (see 2 Kings 24:17)
    marker-yv: yv-n
  - type: text
    text: ' Zedekiah, king over Judah and Jerusalem.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zedekiah King of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He did evil in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' his God and did not humble himself before Jeremiah the prophet, who spoke the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He also rebelled against King Nebuchadnezzar, who had made him take an oath in God’s name. He became stiff-necked and hardened his heart and would not turn to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Furthermore, all the leaders of the priests and the people became more and more unfaithful, following all the detestable practices of the nations and defiling the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', which he had consecrated in Jerusalem.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of their ancestors, sent word to them through his messengers again and again, because he had pity on his people and on his dwelling place. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But they mocked God’s messengers, despised his words and scoffed at his prophets until the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was aroused against his people and there was no remedy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He brought up against them the king of the Babylonians,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldeans
    marker-yv: yv-n
  - type: text
    text: ' who killed their young men with the sword in the sanctuary, and did not spare young men or young women, the elderly or the infirm. God gave them all into the hands of Nebuchadnezzar. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He carried to Babylon all the articles from the temple of God, both large and small, and the treasures of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s temple and the treasures of the king and his officials. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They set fire to God’s temple and broke down the wall of Jerusalem; they burned all the palaces and destroyed everything of value there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He carried into exile to Babylon the remnant, who escaped from the sword, and they became servants to him and his successors until the kingdom of Persia came to power. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The land enjoyed its sabbath rests; all the time of its desolation it rested, until the seventy years were completed in fulfillment of the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoken by Jeremiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'In the first year of Cyrus king of Persia, in order to fulfill the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoken by Jeremiah, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' moved the heart of Cyrus king of Persia to make a proclamation throughout his realm and also to put it in writing:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“This is what Cyrus king of Persia says:'
- type: usfm
  marker: pi1
  children:
  - type: text
    text: '“ ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of heaven, has given me all the kingdoms of the earth and he has appointed me to build a temple for him at Jerusalem in Judah. Any of his people among you may go up, and may the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God be with them.’ ”'
