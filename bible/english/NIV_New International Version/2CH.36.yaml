document_id: 2CH.36,111
type_code: eng
verses:
  '1':
  - type: text
    content: And the people of the land took Jehoahaz son of Josiah and made him king in Jerusalem in place of his father.
  - type: heading
    content: Jehoahaz King of Judah
  '10':
  - type: text
    content: 'In the spring, King Nebuchadnezzar sent for him and brought him to Babylon, together with articles of value from the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he made Jehoiachin’s uncle,'
  - type: note
    content: Hebrew brother, that is, relative (see 2 Kings 24:17)
  - type: text
    content: ' Zedekiah, king over Judah and Jerusalem.'
  - type: heading
    content: Zedekiah King of Judah
  '11':
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. '
  '12':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God and did not humble himself before Jeremiah the prophet, who spoke the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'He also rebelled against King Nebuchadnezzar, who had made him take an oath in God’s name. He became stiff-necked and hardened his heart and would not turn to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '14':
  - type: text
    content: 'Furthermore, all the leaders of the priests and the people became more and more unfaithful, following all the detestable practices of the nations and defiling the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', which he had consecrated in Jerusalem.'
  - type: heading
    content: The Fall of Jerusalem
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, sent word to them through his messengers again and again, because he had pity on his people and on his dwelling place. '
  '16':
  - type: text
    content: 'But they mocked God’s messengers, despised his words and scoffed at his prophets until the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' was aroused against his people and there was no remedy. '
  '17':
  - type: text
    content: He brought up against them the king of the Babylonians,
  - type: note
    content: Or Chaldeans
  - type: text
    content: ' who killed their young men with the sword in the sanctuary, and did not spare young men or young women, the elderly or the infirm. God gave them all into the hands of Nebuchadnezzar. '
  '18':
  - type: text
    content: 'He carried to Babylon all the articles from the temple of God, both large and small, and the treasures of the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple and the treasures of the king and his officials. '
  '19':
  - type: text
    content: They set fire to God’s temple and broke down the wall of Jerusalem; they burned all the palaces and destroyed everything of value there.
  '2':
  - type: text
    content: Jehoahaz
  - type: note
    content: Hebrew Joahaz, a variant of Jehoahaz; also in verse 4
  - type: text
    content: ' was twenty-three years old when he became king, and he reigned in Jerusalem three months. '
  '20':
  - type: text
    content: 'He carried into exile to Babylon the remnant, who escaped from the sword, and they became servants to him and his successors until the kingdom of Persia came to power. '
  '21':
  - type: text
    content: 'The land enjoyed its sabbath rests; all the time of its desolation it rested, until the seventy years were completed in fulfillment of the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken by Jeremiah.'
  '22':
  - type: text
    content: 'In the first year of Cyrus king of Persia, in order to fulfill the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken by Jeremiah, the '
  - type: text
    content: Lord
  - type: text
    content: ' moved the heart of Cyrus king of Persia to make a proclamation throughout his realm and also to put it in writing:'
  '23':
  - type: text
    content: '“This is what Cyrus king of Persia says:'
  - type: text
    content: '“ ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, has given me all the kingdoms of the earth and he has appointed me to build a temple for him at Jerusalem in Judah. Any of his people among you may go up, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' their God be with them.’ ”'
  '3':
  - type: text
    content: The king of Egypt dethroned him in Jerusalem and imposed on Judah a levy of a hundred talents
  - type: note
    content: That is, about 3 3/4 tons or about 3.4 metric tons
  - type: text
    content: ' of silver and a talent'
  - type: note
    content: That is, about 75 pounds or about 34 kilograms
  - type: text
    content: ' of gold. '
  '4':
  - type: text
    content: The king of Egypt made Eliakim, a brother of Jehoahaz, king over Judah and Jerusalem and changed Eliakim’s name to Jehoiakim. But Necho took Eliakim’s brother Jehoahaz and carried him off to Egypt.
  - type: heading
    content: Jehoiakim King of Judah
  '5':
  - type: text
    content: 'Jehoiakim was twenty-five years old when he became king, and he reigned in Jerusalem eleven years. He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '6':
  - type: text
    content: 'Nebuchadnezzar king of Babylon attacked him and bound him with bronze shackles to take him to Babylon. '
  '7':
  - type: text
    content: 'Nebuchadnezzar also took to Babylon articles from the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and put them in his temple'
  - type: note
    content: Or palace
  - type: text
    content: ' there.'
  '8':
  - type: text
    content: The other events of Jehoiakim’s reign, the detestable things he did and all that was found against him, are written in the book of the kings of Israel and Judah. And Jehoiachin his son succeeded him as king.
  - type: heading
    content: Jehoiachin King of Judah
  '9':
  - type: text
    content: Jehoiachin was eighteen
  - type: note
    content: One Hebrew manuscript, some Septuagint manuscripts and Syriac (see also 2 Kings 24:8); most Hebrew manuscripts eight
  - type: text
    content: ' years old when he became king, and he reigned in Jerusalem three months and ten days. He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
