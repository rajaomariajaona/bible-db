  '1':
  - type: heading
    content: Psalm 27
  - type: text
    content: Of David.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my light and my salvation—'
  - type: text
    content: whom shall I fear?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is the stronghold of my life—'
  - type: text
    content: of whom shall I be afraid?
  '10':
  - type: text
    content: Though my father and mother forsake me,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' will receive me.'
  '11':
  - type: text
    content: 'Teach me your way, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: lead me in a straight path
  - type: text
    content: because of my oppressors.
  '12':
  - type: text
    content: Do not turn me over to the desire of my foes,
  - type: text
    content: for false witnesses rise up against me,
  - type: text
    content: spouting malicious accusations.
  '13':
  - type: text
    content: 'I remain confident of this:'
  - type: text
    content: 'I will see the goodness of the '
  - type: text
    content: Lord
  - type: text
    content: in the land of the living.
  '14':
  - type: text
    content: 'Wait for the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: be strong and take heart
  - type: text
    content: 'and wait for the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: When the wicked advance against me
  - type: text
    content: to devour
  - type: note
    content: Or slander
  - type: text
    content: ' me,'
  - type: text
    content: it is my enemies and my foes
  - type: text
    content: who will stumble and fall.
  '3':
  - type: text
    content: Though an army besiege me,
  - type: text
    content: my heart will not fear;
  - type: text
    content: though war break out against me,
  - type: text
    content: even then I will be confident.
  '4':
  - type: text
    content: 'One thing I ask from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'this only do I seek:'
  - type: text
    content: 'that I may dwell in the house of the '
  - type: text
    content: Lord
  - type: text
    content: all the days of my life,
  - type: text
    content: 'to gaze on the beauty of the '
  - type: text
    content: Lord
  - type: text
    content: and to seek him in his temple.
  '5':
  - type: text
    content: For in the day of trouble
  - type: text
    content: he will keep me safe in his dwelling;
  - type: text
    content: he will hide me in the shelter of his sacred tent
  - type: text
    content: and set me high upon a rock.
  '6':
  - type: text
    content: Then my head will be exalted
  - type: text
    content: above the enemies who surround me;
  - type: text
    content: at his sacred tent I will sacrifice with shouts of joy;
  - type: text
    content: 'I will sing and make music to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: 'Hear my voice when I call, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: be merciful to me and answer me.
  '8':
  - type: text
    content: My heart says of you, “Seek his face!”
  - type: text
    content: 'Your face, '
  - type: text
    content: Lord
  - type: text
    content: ', I will seek.'
  '9':
  - type: text
    content: Do not hide your face from me,
  - type: text
    content: do not turn your servant away in anger;
  - type: text
    content: you have been my helper.
  - type: text
    content: Do not reject me or forsake me,
  - type: text
    content: God my Savior.
