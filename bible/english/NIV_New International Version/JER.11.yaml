document_id: JER.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Covenant Is Broken
  - type: text
    content: 'This is the word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'They have returned to the sins of their ancestors, who refused to listen to my words. They have followed other gods to serve them. Both Israel and Judah have broken the covenant I made with their ancestors. '
  '11':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘I will bring on them a disaster they cannot escape. Although they cry out to me, I will not listen to them. '
  '12':
  - type: text
    content: 'The towns of Judah and the people of Jerusalem will go and cry out to the gods to whom they burn incense, but they will not help them at all when disaster strikes. '
  '13':
  - type: text
    content: You, Judah, have as many gods as you have towns; and the altars you have set up to burn incense to that shameful god Baal are as many as the streets of Jerusalem.’
  '14':
  - type: text
    content: “Do not pray for this people or offer any plea or petition for them, because I will not listen when they call to me in the time of their distress.
  '15':
  - type: text
    content: “What is my beloved doing in my temple
  - type: text
    content: as she, with many others, works out her evil schemes?
  - type: text
    content: Can consecrated meat avert your punishment?
  - type: text
    content: When you engage in your wickedness,
  - type: text
    content: then you rejoice.
  - type: note
    content: Or Could consecrated meat avert your punishment? / Then you would rejoice
  - type: text
    content: ”
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' called you a thriving olive tree'
  - type: text
    content: with fruit beautiful in form.
  - type: text
    content: But with the roar of a mighty storm
  - type: text
    content: he will set it on fire,
  - type: text
    content: and its branches will be broken.
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, who planted you, has decreed disaster for you, because the people of both Israel and Judah have done evil and aroused my anger by burning incense to Baal.'
  - type: heading
    content: Plot Against Jeremiah
  '18':
  - type: text
    content: 'Because the '
  - type: text
    content: Lord
  - type: text
    content: ' revealed their plot to me, I knew it, for at that time he showed me what they were doing. '
  '19':
  - type: text
    content: I had been like a gentle lamb led to the slaughter; I did not realize that they had plotted against me, saying,
  - type: text
    content: “Let us destroy the tree and its fruit;
  - type: text
    content: let us cut him off from the land of the living,
  - type: text
    content: that his name be remembered no more.”
  '2':
  - type: text
    content: '“Listen to the terms of this covenant and tell them to the people of Judah and to those who live in Jerusalem. '
  '20':
  - type: text
    content: 'But you, '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, who judge righteously'
  - type: text
    content: and test the heart and mind,
  - type: text
    content: let me see your vengeance on them,
  - type: text
    content: for to you I have committed my cause.
  '21':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about the people of Anathoth who are threatening to kill you, saying, “Do not prophesy in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' or you will die by our hands”— '
  '22':
  - type: text
    content: 'therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: “I will punish them. Their young men will die by the sword, their sons and daughters by famine. '
  '23':
  - type: text
    content: Not even a remnant will be left to them, because I will bring disaster on the people of Anathoth in the year of their punishment.”
  '3':
  - type: text
    content: 'Tell them that this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: ‘Cursed is the one who does not obey the terms of this covenant— '
  '4':
  - type: text
    content: 'the terms I commanded your ancestors when I brought them out of Egypt, out of the iron-smelting furnace.’ I said, ‘Obey me and do everything I command you, and you will be my people, and I will be your God. '
  '5':
  - type: text
    content: Then I will fulfill the oath I swore to your ancestors, to give them a land flowing with milk and honey’—the land you possess today.”
  - type: text
    content: 'I answered, “Amen, '
  - type: text
    content: Lord
  - type: text
    content: .”
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Proclaim all these words in the towns of Judah and in the streets of Jerusalem: ‘Listen to the terms of this covenant and follow them. '
  '7':
  - type: text
    content: 'From the time I brought your ancestors up from Egypt until today, I warned them again and again, saying, “Obey me.” '
  '8':
  - type: text
    content: But they did not listen or pay attention; instead, they followed the stubbornness of their evil hearts. So I brought on them all the curses of the covenant I had commanded them to follow but that they did not keep.’ ”
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “There is a conspiracy among the people of Judah and those who live in Jerusalem. '
