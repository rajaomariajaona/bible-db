document_id: JER.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Covenant Is Broken
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the word that came to Jeremiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They have returned to the sins of their ancestors, who refused to listen to my words. They have followed other gods to serve them. Both Israel and Judah have broken the covenant I made with their ancestors. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: ‘I will bring on them a disaster they cannot escape. Although they cry out to me, I will not listen to them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The towns of Judah and the people of Jerusalem will go and cry out to the gods to whom they burn incense, but they will not help them at all when disaster strikes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You, Judah, have as many gods as you have towns; and the altars you have set up to burn incense to that shameful god Baal are as many as the streets of Jerusalem.’
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not pray for this people or offer any plea or petition for them, because I will not listen when they call to me in the time of their distress.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What is my beloved doing in my temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as she, with many others, works out her evil schemes?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can consecrated meat avert your punishment?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you engage in your wickedness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then you rejoice.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Could consecrated meat avert your punishment? / Then you would rejoice
      marker-yv: yv-n
    - type: text
      text: ”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' called you a thriving olive tree'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with fruit beautiful in form.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But with the roar of a mighty storm
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will set it on fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its branches will be broken.
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, who planted you, has decreed disaster for you, because the people of both Israel and Judah have done evil and aroused my anger by burning incense to Baal.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plot Against Jeremiah
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' revealed their plot to me, I knew it, for at that time he showed me what they were doing. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I had been like a gentle lamb led to the slaughter; I did not realize that they had plotted against me, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let us destroy the tree and its fruit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let us cut him off from the land of the living,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that his name be remembered no more.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Listen to the terms of this covenant and tell them to the people of Judah and to those who live in Jerusalem. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, who judge righteously'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and test the heart and mind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let me see your vengeance on them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for to you I have committed my cause.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says about the people of Anathoth who are threatening to kill you, saying, “Do not prophesy in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' or you will die by our hands”— '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: “I will punish them. Their young men will die by the sword, their sons and daughters by famine. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Not even a remnant will be left to them, because I will bring disaster on the people of Anathoth in the year of their punishment.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tell them that this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: ‘Cursed is the one who does not obey the terms of this covenant— '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the terms I commanded your ancestors when I brought them out of Egypt, out of the iron-smelting furnace.’ I said, ‘Obey me and do everything I command you, and you will be my people, and I will be your God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I will fulfill the oath I swore to your ancestors, to give them a land flowing with milk and honey’—the land you possess today.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I answered, “Amen, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “Proclaim all these words in the towns of Judah and in the streets of Jerusalem: ‘Listen to the terms of this covenant and follow them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the time I brought your ancestors up from Egypt until today, I warned them again and again, saying, “Obey me.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they did not listen or pay attention; instead, they followed the stubbornness of their evil hearts. So I brought on them all the curses of the covenant I had commanded them to follow but that they did not keep.’ ”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “There is a conspiracy among the people of Judah and those who live in Jerusalem. '
