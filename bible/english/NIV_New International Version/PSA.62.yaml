segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 62
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 62:1-12 is numbered 62:2-13.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. For Jeduthun. A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Truly my soul finds rest in God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my salvation comes from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Truly he is my rock and my salvation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is my fortress, I will never be shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: How long will you assault me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Would all of you throw me down—
- type: usfm
  marker: q2
  children:
  - type: text
    text: this leaning wall, this tottering fence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Surely they intend to topple me
- type: usfm
  marker: q2
  children:
  - type: text
    text: from my lofty place;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they take delight in lies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With their mouths they bless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but in their hearts they curse.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '62:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here and at the end of verse 8.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yes, my soul, find rest in God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my hope comes from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Truly he is my rock and my salvation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is my fortress, I will not be shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My salvation and my honor depend on God
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '62:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: / God Most High is my salvation and my honor
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is my mighty rock, my refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Trust in him at all times, you people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: pour out your hearts to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for God is our refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Surely the lowborn are but a breath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the highborn are but a lie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If weighed on a balance, they are nothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: together they are only a breath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Do not trust in extortion
- type: usfm
  marker: q2
  children:
  - type: text
    text: or put vain hope in stolen goods;
- type: usfm
  marker: q1
  children:
  - type: text
    text: though your riches increase,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not set your heart on them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: One thing God has spoken,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'two things I have heard:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Power belongs to you, God,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: and with you, Lord, is unfailing love”;
- type: usfm
  marker: q1
  children:
  - type: text
    text: and, “You reward everyone
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to what they have done.”
