document_id: PSA.62,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 62In Hebrew texts 62:1-12 is numbered 62:2-13.
  - type: text
    content: For the director of music. For Jeduthun. A psalm of David.
  - type: text
    content: Truly my soul finds rest in God;
  - type: text
    content: my salvation comes from him.
  '10':
  - type: text
    content: Do not trust in extortion
  - type: text
    content: or put vain hope in stolen goods;
  - type: text
    content: though your riches increase,
  - type: text
    content: do not set your heart on them.
  '11':
  - type: text
    content: One thing God has spoken,
  - type: text
    content: 'two things I have heard:'
  - type: text
    content: “Power belongs to you, God,
  '12':
  - type: text
    content: and with you, Lord, is unfailing love”;
  - type: text
    content: and, “You reward everyone
  - type: text
    content: according to what they have done.”
  '2':
  - type: text
    content: Truly he is my rock and my salvation;
  - type: text
    content: he is my fortress, I will never be shaken.
  '3':
  - type: text
    content: How long will you assault me?
  - type: text
    content: Would all of you throw me down—
  - type: text
    content: this leaning wall, this tottering fence?
  '4':
  - type: text
    content: Surely they intend to topple me
  - type: text
    content: from my lofty place;
  - type: text
    content: they take delight in lies.
  - type: text
    content: With their mouths they bless,
  - type: text
    content: but in their hearts they curse.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 8.
  '5':
  - type: text
    content: Yes, my soul, find rest in God;
  - type: text
    content: my hope comes from him.
  '6':
  - type: text
    content: Truly he is my rock and my salvation;
  - type: text
    content: he is my fortress, I will not be shaken.
  '7':
  - type: text
    content: My salvation and my honor depend on God
  - type: note
    content: Or / God Most High is my salvation and my honor
  - type: text
    content: ;
  - type: text
    content: he is my mighty rock, my refuge.
  '8':
  - type: text
    content: Trust in him at all times, you people;
  - type: text
    content: pour out your hearts to him,
  - type: text
    content: for God is our refuge.
  '9':
  - type: text
    content: Surely the lowborn are but a breath,
  - type: text
    content: the highborn are but a lie.
  - type: text
    content: If weighed on a balance, they are nothing;
  - type: text
    content: together they are only a breath.
