document_id: EZK.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Idolaters Condemned
  - type: text
    content: 'Some of the elders of Israel came to me and sat down in front of me. '
  '10':
  - type: text
    content: 'They will bear their guilt—the prophet will be as guilty as the one who consults him. '
  '11':
  - type: text
    content: 'Then the people of Israel will no longer stray from me, nor will they defile themselves anymore with all their sins. They will be my people, and I will be their God, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: Jerusalem’s Judgment Inescapable
  '12':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '13':
  - type: text
    content: '“Son of man, if a country sins against me by being unfaithful and I stretch out my hand against it to cut off its food supply and send famine upon it and kill its people and their animals, '
  '14':
  - type: text
    content: even if these three men—Noah, Daniel
  - type: note
    content: Or Danel, a man of renown in ancient literature; also in verse 20
  - type: text
    content: ' and Job—were in it, they could save only themselves by their righteousness, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: '“Or if I send wild beasts through that country and they leave it childless and it becomes desolate so that no one can pass through it because of the beasts, '
  '16':
  - type: text
    content: 'as surely as I live, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', even if these three men were in it, they could not save their own sons or daughters. They alone would be saved, but the land would be desolate.'
  '17':
  - type: text
    content: '“Or if I bring a sword against that country and say, ‘Let the sword pass throughout the land,’ and I kill its people and their animals, '
  '18':
  - type: text
    content: 'as surely as I live, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', even if these three men were in it, they could not save their own sons or daughters. They alone would be saved.'
  '19':
  - type: text
    content: '“Or if I send a plague into that land and pour out my wrath on it through bloodshed, killing its people and their animals, '
  '2':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '20':
  - type: text
    content: 'as surely as I live, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', even if Noah, Daniel and Job were in it, they could save neither son nor daughter. They would save only themselves by their righteousness.'
  '21':
  - type: text
    content: '“For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: How much worse will it be when I send against Jerusalem my four dreadful judgments—sword and famine and wild beasts and plague—to kill its men and their animals! '
  '22':
  - type: text
    content: 'Yet there will be some survivors—sons and daughters who will be brought out of it. They will come to you, and when you see their conduct and their actions, you will be consoled regarding the disaster I have brought on Jerusalem—every disaster I have brought on it. '
  '23':
  - type: text
    content: 'You will be consoled when you see their conduct and their actions, for you will know that I have done nothing in it without cause, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: '“Son of man, these men have set up idols in their hearts and put wicked stumbling blocks before their faces. Should I let them inquire of me at all? '
  '4':
  - type: text
    content: 'Therefore speak to them and tell them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: When any of the Israelites set up idols in their hearts and put a wicked stumbling block before their faces and then go to a prophet, I the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer them myself in keeping with their great idolatry. '
  '5':
  - type: text
    content: I will do this to recapture the hearts of the people of Israel, who have all deserted me for their idols.’
  '6':
  - type: text
    content: '“Therefore say to the people of Israel, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Repent! Turn from your idols and renounce all your detestable practices!'
  '7':
  - type: text
    content: '“ ‘When any of the Israelites or any foreigner residing in Israel separate themselves from me and set up idols in their hearts and put a wicked stumbling block before their faces and then go to a prophet to inquire of me, I the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer them myself. '
  '8':
  - type: text
    content: 'I will set my face against them and make them an example and a byword. I will remove them from my people. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: '“ ‘And if the prophet is enticed to utter a prophecy, I the '
  - type: text
    content: Lord
  - type: text
    content: ' have enticed that prophet, and I will stretch out my hand against him and destroy him from among my people Israel. '
