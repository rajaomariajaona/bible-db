document_id: EZK.14,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Idolaters Condemned
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of the elders of Israel came to me and sat down in front of me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will bear their guilt—the prophet will be as guilty as the one who consults him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people of Israel will no longer stray from me, nor will they defile themselves anymore with all their sins. They will be my people, and I will be their God, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerusalem’s Judgment Inescapable
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, if a country sins against me by being unfaithful and I stretch out my hand against it to cut off its food supply and send famine upon it and kill its people and their animals, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: even if these three men—Noah, Daniel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Danel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a man of renown in ancient literature; also in verse 20'
      marker-yv: yv-n
    - type: text
      text: ' and Job—were in it, they could save only themselves by their righteousness, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Or if I send wild beasts through that country and they leave it childless and it becomes desolate so that no one can pass through it because of the beasts, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as surely as I live, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', even if these three men were in it, they could not save their own sons or daughters. They alone would be saved, but the land would be desolate.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Or if I bring a sword against that country and say, ‘Let the sword pass throughout the land,’ and I kill its people and their animals, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as surely as I live, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', even if these three men were in it, they could not save their own sons or daughters. They alone would be saved.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Or if I send a plague into that land and pour out my wrath on it through bloodshed, killing its people and their animals, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as surely as I live, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', even if Noah, Daniel and Job were in it, they could save neither son nor daughter. They would save only themselves by their righteousness.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: How much worse will it be when I send against Jerusalem my four dreadful judgments—sword and famine and wild beasts and plague—to kill its men and their animals! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet there will be some survivors—sons and daughters who will be brought out of it. They will come to you, and when you see their conduct and their actions, you will be consoled regarding the disaster I have brought on Jerusalem—every disaster I have brought on it. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will be consoled when you see their conduct and their actions, for you will know that I have done nothing in it without cause, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, these men have set up idols in their hearts and put wicked stumbling blocks before their faces. Should I let them inquire of me at all? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore speak to them and tell them, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: When any of the Israelites set up idols in their hearts and put a wicked stumbling block before their faces and then go to a prophet, I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will answer them myself in keeping with their great idolatry. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will do this to recapture the hearts of the people of Israel, who have all deserted me for their idols.’
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore say to the people of Israel, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Repent! Turn from your idols and renounce all your detestable practices!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘When any of the Israelites or any foreigner residing in Israel separate themselves from me and set up idols in their hearts and put a wicked stumbling block before their faces and then go to a prophet to inquire of me, I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will answer them myself. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will set my face against them and make them an example and a byword. I will remove them from my people. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘And if the prophet is enticed to utter a prophecy, I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' have enticed that prophet, and I will stretch out my hand against him and destroy him from among my people Israel. '
