document_id: PRO.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warnings Against Folly
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, if you have put up security for your neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if you have shaken hands in pledge for a stranger,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: A little sleep, a little slumber,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a little folding of the hands to rest—
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: and poverty will come on you like a thief
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and scarcity like an armed man.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: A troublemaker and a villain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who goes about with a corrupt mouth,
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: who winks maliciously with his eye,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: signals with his feet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and motions with his fingers,
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: who plots evil with deceit in his heart—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he always stirs up conflict.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Therefore disaster will overtake him in an instant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will suddenly be destroyed—without remedy.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'There are six things the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hates,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'seven that are detestable to him:'
  '17':
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: haughty eyes,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: a lying tongue,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: hands that shed innocent blood,
  '18':
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: a heart that devises wicked schemes,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: feet that are quick to rush into evil,
  '19':
  - type: usfm
    marker: q3
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: a false witness who pours out lies
  - type: usfm
    marker: q3
    children:
    - type: text
      text: and a person who stirs up conflict in the community.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning Against Adultery
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: you have been trapped by what you said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ensnared by the words of your mouth.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: My son, keep your father’s command
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not forsake your mother’s teaching.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Bind them always on your heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fasten them around your neck.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: When you walk, they will guide you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you sleep, they will watch over you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you awake, they will speak to you.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: For this command is a lamp,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this teaching is a light,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and correction and instruction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are the way to life,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: keeping you from your neighbor’s wife,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the smooth talk of a wayward woman.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Do not lust in your heart after her beauty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or let her captivate you with her eyes.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: For a prostitute can be had for a loaf of bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but another man’s wife preys on your very life.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Can a man scoop fire into his lap
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without his clothes being burned?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Can a man walk on hot coals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without his feet being scorched?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: So is he who sleeps with another man’s wife;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one who touches her will go unpunished.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So do this, my son, to free yourself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'since you have fallen into your neighbor’s hands:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go—to the point of exhaustion—
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Go and humble yourself,
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give your neighbor no rest!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: People do not despise a thief if he steals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to satisfy his hunger when he is starving.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Yet if he is caught, he must pay sevenfold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though it costs him all the wealth of his house.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: But a man who commits adultery has no sense;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever does so destroys himself.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Blows and disgrace are his lot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his shame will never be wiped away.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: For jealousy arouses a husband’s fury,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will show no mercy when he takes revenge.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: He will not accept any compensation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will refuse a bribe, however great it is.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Allow no sleep to your eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no slumber to your eyelids.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Free yourself, like a gazelle from the hand of the hunter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a bird from the snare of the fowler.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Go to the ant, you sluggard;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: consider its ways and be wise!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: It has no commander,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no overseer or ruler,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: yet it stores its provisions in summer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gathers its food at harvest.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: How long will you lie there, you sluggard?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When will you get up from your sleep?
