document_id: PRO.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Warnings Against Folly
  - type: text
    content: My son, if you have put up security for your neighbor,
  - type: text
    content: if you have shaken hands in pledge for a stranger,
  '10':
  - type: text
    content: A little sleep, a little slumber,
  - type: text
    content: a little folding of the hands to rest—
  '11':
  - type: text
    content: and poverty will come on you like a thief
  - type: text
    content: and scarcity like an armed man.
  '12':
  - type: text
    content: A troublemaker and a villain,
  - type: text
    content: who goes about with a corrupt mouth,
  '13':
  - type: text
    content: who winks maliciously with his eye,
  - type: text
    content: signals with his feet
  - type: text
    content: and motions with his fingers,
  '14':
  - type: text
    content: who plots evil with deceit in his heart—
  - type: text
    content: he always stirs up conflict.
  '15':
  - type: text
    content: Therefore disaster will overtake him in an instant;
  - type: text
    content: he will suddenly be destroyed—without remedy.
  '16':
  - type: text
    content: 'There are six things the '
  - type: text
    content: Lord
  - type: text
    content: ' hates,'
  - type: text
    content: 'seven that are detestable to him:'
  '17':
  - type: text
    content: haughty eyes,
  - type: text
    content: a lying tongue,
  - type: text
    content: hands that shed innocent blood,
  '18':
  - type: text
    content: a heart that devises wicked schemes,
  - type: text
    content: feet that are quick to rush into evil,
  '19':
  - type: text
    content: a false witness who pours out lies
  - type: text
    content: and a person who stirs up conflict in the community.
  - type: heading
    content: Warning Against Adultery
  '2':
  - type: text
    content: you have been trapped by what you said,
  - type: text
    content: ensnared by the words of your mouth.
  '20':
  - type: text
    content: My son, keep your father’s command
  - type: text
    content: and do not forsake your mother’s teaching.
  '21':
  - type: text
    content: Bind them always on your heart;
  - type: text
    content: fasten them around your neck.
  '22':
  - type: text
    content: When you walk, they will guide you;
  - type: text
    content: when you sleep, they will watch over you;
  - type: text
    content: when you awake, they will speak to you.
  '23':
  - type: text
    content: For this command is a lamp,
  - type: text
    content: this teaching is a light,
  - type: text
    content: and correction and instruction
  - type: text
    content: are the way to life,
  '24':
  - type: text
    content: keeping you from your neighbor’s wife,
  - type: text
    content: from the smooth talk of a wayward woman.
  '25':
  - type: text
    content: Do not lust in your heart after her beauty
  - type: text
    content: or let her captivate you with her eyes.
  '26':
  - type: text
    content: For a prostitute can be had for a loaf of bread,
  - type: text
    content: but another man’s wife preys on your very life.
  '27':
  - type: text
    content: Can a man scoop fire into his lap
  - type: text
    content: without his clothes being burned?
  '28':
  - type: text
    content: Can a man walk on hot coals
  - type: text
    content: without his feet being scorched?
  '29':
  - type: text
    content: So is he who sleeps with another man’s wife;
  - type: text
    content: no one who touches her will go unpunished.
  '3':
  - type: text
    content: So do this, my son, to free yourself,
  - type: text
    content: 'since you have fallen into your neighbor’s hands:'
  - type: text
    content: Go—to the point of exhaustion—
  - type: note
    content: Or Go and humble yourself,
  - type: text
    content: and give your neighbor no rest!
  '30':
  - type: text
    content: People do not despise a thief if he steals
  - type: text
    content: to satisfy his hunger when he is starving.
  '31':
  - type: text
    content: Yet if he is caught, he must pay sevenfold,
  - type: text
    content: though it costs him all the wealth of his house.
  '32':
  - type: text
    content: But a man who commits adultery has no sense;
  - type: text
    content: whoever does so destroys himself.
  '33':
  - type: text
    content: Blows and disgrace are his lot,
  - type: text
    content: and his shame will never be wiped away.
  '34':
  - type: text
    content: For jealousy arouses a husband’s fury,
  - type: text
    content: and he will show no mercy when he takes revenge.
  '35':
  - type: text
    content: He will not accept any compensation;
  - type: text
    content: he will refuse a bribe, however great it is.
  '4':
  - type: text
    content: Allow no sleep to your eyes,
  - type: text
    content: no slumber to your eyelids.
  '5':
  - type: text
    content: Free yourself, like a gazelle from the hand of the hunter,
  - type: text
    content: like a bird from the snare of the fowler.
  '6':
  - type: text
    content: Go to the ant, you sluggard;
  - type: text
    content: consider its ways and be wise!
  '7':
  - type: text
    content: It has no commander,
  - type: text
    content: no overseer or ruler,
  '8':
  - type: text
    content: yet it stores its provisions in summer
  - type: text
    content: and gathers its food at harvest.
  '9':
  - type: text
    content: How long will you lie there, you sluggard?
  - type: text
    content: When will you get up from your sleep?
