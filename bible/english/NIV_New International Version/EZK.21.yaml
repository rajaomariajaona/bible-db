document_id: EZK.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Babylon as God’s Sword of Judgment
  - type: note
    content: In Hebrew texts 21:1-32 is numbered 21:6-37.
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: sharpened for the slaughter,
  - type: text
    content: polished to flash like lightning!
  - type: text
    content: “ ‘Shall we rejoice in the scepter of my royal son? The sword despises every such stick.
  '11':
  - type: text
    content: “ ‘The sword is appointed to be polished,
  - type: text
    content: to be grasped with the hand;
  - type: text
    content: it is sharpened and polished,
  - type: text
    content: made ready for the hand of the slayer.
  '12':
  - type: text
    content: Cry out and wail, son of man,
  - type: text
    content: for it is against my people;
  - type: text
    content: it is against all the princes of Israel.
  - type: text
    content: They are thrown to the sword
  - type: text
    content: along with my people.
  - type: text
    content: Therefore beat your breast.
  '13':
  - type: text
    content: '“ ‘Testing will surely come. And what if even the scepter, which the sword despises, does not continue? declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’
  '14':
  - type: text
    content: “So then, son of man, prophesy
  - type: text
    content: and strike your hands together.
  - type: text
    content: Let the sword strike twice,
  - type: text
    content: even three times.
  - type: text
    content: It is a sword for slaughter—
  - type: text
    content: a sword for great slaughter,
  - type: text
    content: closing in on them from every side.
  '15':
  - type: text
    content: So that hearts may melt with fear
  - type: text
    content: and the fallen be many,
  - type: text
    content: I have stationed the sword for slaughter
  - type: note
    content: Septuagint; the meaning of the Hebrew for this word is uncertain.
  - type: text
    content: at all their gates.
  - type: text
    content: Look! It is forged to strike like lightning,
  - type: text
    content: it is grasped for slaughter.
  '16':
  - type: text
    content: Slash to the right, you sword,
  - type: text
    content: then to the left,
  - type: text
    content: wherever your blade is turned.
  '17':
  - type: text
    content: I too will strike my hands together,
  - type: text
    content: and my wrath will subside.
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken.”'
  '18':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '19':
  - type: text
    content: '“Son of man, mark out two roads for the sword of the king of Babylon to take, both starting from the same country. Make a signpost where the road branches off to the city. '
  '2':
  - type: text
    content: '“Son of man, set your face against Jerusalem and preach against the sanctuary. Prophesy against the land of Israel '
  '20':
  - type: text
    content: 'Mark out one road for the sword to come against Rabbah of the Ammonites and another against Judah and fortified Jerusalem. '
  '21':
  - type: text
    content: 'For the king of Babylon will stop at the fork in the road, at the junction of the two roads, to seek an omen: He will cast lots with arrows, he will consult his idols, he will examine the liver. '
  '22':
  - type: text
    content: 'Into his right hand will come the lot for Jerusalem, where he is to set up battering rams, to give the command to slaughter, to sound the battle cry, to set battering rams against the gates, to build a ramp and to erect siege works. '
  '23':
  - type: text
    content: It will seem like a false omen to those who have sworn allegiance to him, but he will remind them of their guilt and take them captive.
  '24':
  - type: text
    content: '“Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Because you people have brought to mind your guilt by your open rebellion, revealing your sins in all that you do—because you have done this, you will be taken captive.'
  '25':
  - type: text
    content: '“ ‘You profane and wicked prince of Israel, whose day has come, whose time of punishment has reached its climax, '
  '26':
  - type: text
    content: 'this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Take off the turban, remove the crown. It will not be as it was: The lowly will be exalted and the exalted will be brought low. '
  '27':
  - type: text
    content: A ruin! A ruin! I will make it a ruin! The crown will not be restored until he to whom it rightfully belongs shall come; to him I will give it.’
  '28':
  - type: text
    content: '“And you, son of man, prophesy and say, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says about the Ammonites and their insults:'
  - type: text
    content: “ ‘A sword, a sword,
  - type: text
    content: drawn for the slaughter,
  - type: text
    content: polished to consume
  - type: text
    content: and to flash like lightning!
  '29':
  - type: text
    content: Despite false visions concerning you
  - type: text
    content: and lying divinations about you,
  - type: text
    content: it will be laid on the necks
  - type: text
    content: of the wicked who are to be slain,
  - type: text
    content: whose day has come,
  - type: text
    content: whose time of punishment has reached its climax.
  '3':
  - type: text
    content: 'and say to her: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am against you. I will draw my sword from its sheath and cut off from you both the righteous and the wicked. '
  '30':
  - type: text
    content: “ ‘Let the sword return to its sheath.
  - type: text
    content: In the place where you were created,
  - type: text
    content: in the land of your ancestry,
  - type: text
    content: I will judge you.
  '31':
  - type: text
    content: I will pour out my wrath on you
  - type: text
    content: and breathe out my fiery anger against you;
  - type: text
    content: I will deliver you into the hands of brutal men,
  - type: text
    content: men skilled in destruction.
  '32':
  - type: text
    content: You will be fuel for the fire,
  - type: text
    content: your blood will be shed in your land,
  - type: text
    content: you will be remembered no more;
  - type: text
    content: 'for I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken.’ ”'
  '4':
  - type: text
    content: 'Because I am going to cut off the righteous and the wicked, my sword will be unsheathed against everyone from south to north. '
  '5':
  - type: text
    content: 'Then all people will know that I the '
  - type: text
    content: Lord
  - type: text
    content: ' have drawn my sword from its sheath; it will not return again.’'
  '6':
  - type: text
    content: '“Therefore groan, son of man! Groan before them with broken heart and bitter grief. '
  '7':
  - type: text
    content: 'And when they ask you, ‘Why are you groaning?’ you shall say, ‘Because of the news that is coming. Every heart will melt with fear and every hand go limp; every spirit will become faint and every leg will be wet with urine.’ It is coming! It will surely take place, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '8':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '9':
  - type: text
    content: '“Son of man, prophesy and say, ‘This is what the Lord says:'
  - type: text
    content: “ ‘A sword, a sword,
  - type: text
    content: sharpened and polished—
