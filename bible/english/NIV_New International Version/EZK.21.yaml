document_id: EZK.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Babylon as God’s Sword of Judgment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 21:1-32 is numbered 21:6-37.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, set your face against Jerusalem and preach against the sanctuary. Prophesy against the land of Israel '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and say to her: ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I am against you. I will draw my sword from its sheath and cut off from you both the righteous and the wicked. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Because I am going to cut off the righteous and the wicked, my sword will be unsheathed against everyone from south to north. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then all people will know that I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' have drawn my sword from its sheath; it will not return again.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Therefore groan, son of man! Groan before them with broken heart and bitter grief. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when they ask you, ‘Why are you groaning?’ you shall say, ‘Because of the news that is coming. Every heart will melt with fear and every hand go limp; every spirit will become faint and every leg will be wet with urine.’ It is coming! It will surely take place, declares the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Son of man, prophesy and say, ‘This is what the Lord says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘A sword, a sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sharpened and polished—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: sharpened for the slaughter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: polished to flash like lightning!
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘Shall we rejoice in the scepter of my royal son? The sword despises every such stick.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “ ‘The sword is appointed to be polished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be grasped with the hand;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it is sharpened and polished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: made ready for the hand of the slayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Cry out and wail, son of man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for it is against my people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is against all the princes of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are thrown to the sword
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with my people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore beat your breast.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“ ‘Testing will surely come. And what if even the scepter, which the sword despises, does not continue? declares the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “So then, son of man, prophesy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strike your hands together.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the sword strike twice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even three times.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is a sword for slaughter—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a sword for great slaughter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: closing in on them from every side.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So that hearts may melt with fear
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fallen be many,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have stationed the sword for slaughter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Septuagint; the meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: at all their gates.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look! It is forged to strike like lightning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is grasped for slaughter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Slash to the right, you sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: then to the left,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wherever your blade is turned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I too will strike my hands together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my wrath will subside.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' have spoken.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Son of man, mark out two roads for the sword of the king of Babylon to take, both starting from the same country. Make a signpost where the road branches off to the city. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mark out one road for the sword to come against Rabbah of the Ammonites and another against Judah and fortified Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the king of Babylon will stop at the fork in the road, at the junction of the two roads, to seek an omen: He will cast lots with arrows, he will consult his idols, he will examine the liver. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Into his right hand will come the lot for Jerusalem, where he is to set up battering rams, to give the command to slaughter, to sound the battle cry, to set battering rams against the gates, to build a ramp and to erect siege works. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: It will seem like a false omen to those who have sworn allegiance to him, but he will remind them of their guilt and take them captive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Therefore this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘Because you people have brought to mind your guilt by your open rebellion, revealing your sins in all that you do—because you have done this, you will be taken captive.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“ ‘You profane and wicked prince of Israel, whose day has come, whose time of punishment has reached its climax, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Take off the turban, remove the crown. It will not be as it was: The lowly will be exalted and the exalted will be brought low. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A ruin! A ruin! I will make it a ruin! The crown will not be restored until he to whom it rightfully belongs shall come; to him I will give it.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“And you, son of man, prophesy and say, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about the Ammonites and their insults:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘A sword, a sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: drawn for the slaughter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: polished to consume
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to flash like lightning!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Despite false visions concerning you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lying divinations about you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it will be laid on the necks
- type: usfm
  marker: q2
  children:
  - type: text
    text: of the wicked who are to be slain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: whose day has come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose time of punishment has reached its climax.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “ ‘Let the sword return to its sheath.
- type: usfm
  marker: q2
  children:
  - type: text
    text: In the place where you were created,
- type: usfm
  marker: q1
  children:
  - type: text
    text: in the land of your ancestry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will judge you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: I will pour out my wrath on you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and breathe out my fiery anger against you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will deliver you into the hands of brutal men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: men skilled in destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: You will be fuel for the fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your blood will be shed in your land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will be remembered no more;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' have spoken.’ ”'
