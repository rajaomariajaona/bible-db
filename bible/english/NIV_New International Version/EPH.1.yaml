document_id: EPH.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: Paul, an apostle of Christ Jesus by the will of God,
  - type: text
    content: To God’s holy people in Ephesus,
  - type: note
    content: Some early manuscripts do not have in Ephesus.
  - type: text
    content: ' the faithful in Christ Jesus:'
  '10':
  - type: text
    content: to be put into effect when the times reach their fulfillment—to bring unity to all things in heaven and on earth under Christ.
  '11':
  - type: text
    content: In him we were also chosen,
  - type: note
    content: Or were made heirs
  - type: text
    content: ' having been predestined according to the plan of him who works out everything in conformity with the purpose of his will, '
  '12':
  - type: text
    content: 'in order that we, who were the first to put our hope in Christ, might be for the praise of his glory. '
  '13':
  - type: text
    content: 'And you also were included in Christ when you heard the message of truth, the gospel of your salvation. When you believed, you were marked in him with a seal, the promised Holy Spirit, '
  '14':
  - type: text
    content: who is a deposit guaranteeing our inheritance until the redemption of those who are God’s possession—to the praise of his glory.
  - type: heading
    content: Thanksgiving and Prayer
  '15':
  - type: text
    content: 'For this reason, ever since I heard about your faith in the Lord Jesus and your love for all God’s people, '
  '16':
  - type: text
    content: 'I have not stopped giving thanks for you, remembering you in my prayers. '
  '17':
  - type: text
    content: I keep asking that the God of our Lord Jesus Christ, the glorious Father, may give you the Spirit
  - type: note
    content: Or a spirit
  - type: text
    content: ' of wisdom and revelation, so that you may know him better. '
  '18':
  - type: text
    content: 'I pray that the eyes of your heart may be enlightened in order that you may know the hope to which he has called you, the riches of his glorious inheritance in his holy people, '
  '19':
  - type: text
    content: 'and his incomparably great power for us who believe. That power is the same as the mighty strength '
  '2':
  - type: text
    content: Grace and peace to you from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Praise for Spiritual Blessings in Christ
  '20':
  - type: text
    content: 'he exerted when he raised Christ from the dead and seated him at his right hand in the heavenly realms, '
  '21':
  - type: text
    content: 'far above all rule and authority, power and dominion, and every name that is invoked, not only in the present age but also in the one to come. '
  '22':
  - type: text
    content: 'And God placed all things under his feet and appointed him to be head over everything for the church, '
  '23':
  - type: text
    content: which is his body, the fullness of him who fills everything in every way.
  '3':
  - type: text
    content: 'Praise be to the God and Father of our Lord Jesus Christ, who has blessed us in the heavenly realms with every spiritual blessing in Christ. '
  '4':
  - type: text
    content: 'For he chose us in him before the creation of the world to be holy and blameless in his sight. In love '
  '5':
  - type: text
    content: he
  - type: note
    content: Or sight in love. 5 He
  - type: text
    content: ' predestined us for adoption to sonship'
  - type: note
    content: The Greek word for adoption to sonship is a legal term referring to the full legal standing of an adopted male heir in Roman culture.
  - type: text
    content: ' through Jesus Christ, in accordance with his pleasure and will— '
  '6':
  - type: text
    content: 'to the praise of his glorious grace, which he has freely given us in the One he loves. '
  '7':
  - type: text
    content: 'In him we have redemption through his blood, the forgiveness of sins, in accordance with the riches of God’s grace '
  '8':
  - type: text
    content: 'that he lavished on us. With all wisdom and understanding, '
  '9':
  - type: text
    content: he
  - type: note
    content: Or us with all wisdom and understanding. 9 And he
  - type: text
    content: ' made known to us the mystery of his will according to his good pleasure, which he purposed in Christ, '
