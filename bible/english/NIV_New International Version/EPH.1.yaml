document_id: EPH.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, an apostle of Christ Jesus by the will of God,
  - type: usfm
    marker: p
    children:
    - type: text
      text: To God’s holy people in Ephesus,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some early manuscripts do not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: in Ephesus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' the faithful in Christ Jesus:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: to be put into effect when the times reach their fulfillment—to bring unity to all things in heaven and on earth under Christ.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In him we were also chosen,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: were made heirs
      marker-yv: yv-n
    - type: text
      text: ' having been predestined according to the plan of him who works out everything in conformity with the purpose of his will, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in order that we, who were the first to put our hope in Christ, might be for the praise of his glory. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you also were included in Christ when you heard the message of truth, the gospel of your salvation. When you believed, you were marked in him with a seal, the promised Holy Spirit, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: who is a deposit guaranteeing our inheritance until the redemption of those who are God’s possession—to the praise of his glory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Thanksgiving and Prayer
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this reason, ever since I heard about your faith in the Lord Jesus and your love for all God’s people, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have not stopped giving thanks for you, remembering you in my prayers. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I keep asking that the God of our Lord Jesus Christ, the glorious Father, may give you the Spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a spirit
      marker-yv: yv-n
    - type: text
      text: ' of wisdom and revelation, so that you may know him better. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I pray that the eyes of your heart may be enlightened in order that you may know the hope to which he has called you, the riches of his glorious inheritance in his holy people, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and his incomparably great power for us who believe. That power is the same as the mighty strength '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace and peace to you from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Praise for Spiritual Blessings in Christ
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he exerted when he raised Christ from the dead and seated him at his right hand in the heavenly realms, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'far above all rule and authority, power and dominion, and every name that is invoked, not only in the present age but also in the one to come. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God placed all things under his feet and appointed him to be head over everything for the church, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: which is his body, the fullness of him who fills everything in every way.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Praise be to the God and Father of our Lord Jesus Christ, who has blessed us in the heavenly realms with every spiritual blessing in Christ. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he chose us in him before the creation of the world to be holy and blameless in his sight. In love '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: he
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4,5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sight in love. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '5 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He
      marker-yv: yv-n
    - type: text
      text: ' predestined us for adoption to sonship'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adoption to sonship '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a legal term referring to the full legal standing of an adopted male heir in Roman culture.
      marker-yv: yv-n
    - type: text
      text: ' through Jesus Christ, in accordance with his pleasure and will— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to the praise of his glorious grace, which he has freely given us in the One he loves. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In him we have redemption through his blood, the forgiveness of sins, in accordance with the riches of God’s grace '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that he lavished on us. With all wisdom and understanding, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: he
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8,9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'us with all wisdom and understanding. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '9 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: And he
      marker-yv: yv-n
    - type: text
      text: ' made known to us the mystery of his will according to his good pleasure, which he purposed in Christ, '
