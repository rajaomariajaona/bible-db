document_id: EPH.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paul, an apostle of Christ Jesus by the will of God,
- type: usfm
  marker: p
  children:
  - type: text
    text: To God’s holy people in Ephesus,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts do not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: in Ephesus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' the faithful in Christ Jesus:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Grace and peace to you from God our Father and the Lord Jesus Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Praise for Spiritual Blessings in Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Praise be to the God and Father of our Lord Jesus Christ, who has blessed us in the heavenly realms with every spiritual blessing in Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For he chose us in him before the creation of the world to be holy and blameless in his sight. In love '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: he
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4,5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sight in love. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '5 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He
    marker-yv: yv-n
  - type: text
    text: ' predestined us for adoption to sonship'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'adoption to sonship '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a legal term referring to the full legal standing of an adopted male heir in Roman culture.
    marker-yv: yv-n
  - type: text
    text: ' through Jesus Christ, in accordance with his pleasure and will— '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'to the praise of his glorious grace, which he has freely given us in the One he loves. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'In him we have redemption through his blood, the forgiveness of sins, in accordance with the riches of God’s grace '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'that he lavished on us. With all wisdom and understanding, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: he
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:8,9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'us with all wisdom and understanding. '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '9 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: And he
    marker-yv: yv-n
  - type: text
    text: ' made known to us the mystery of his will according to his good pleasure, which he purposed in Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: to be put into effect when the times reach their fulfillment—to bring unity to all things in heaven and on earth under Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: In him we were also chosen,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: were made heirs
    marker-yv: yv-n
  - type: text
    text: ' having been predestined according to the plan of him who works out everything in conformity with the purpose of his will, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'in order that we, who were the first to put our hope in Christ, might be for the praise of his glory. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And you also were included in Christ when you heard the message of truth, the gospel of your salvation. When you believed, you were marked in him with a seal, the promised Holy Spirit, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: who is a deposit guaranteeing our inheritance until the redemption of those who are God’s possession—to the praise of his glory.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Thanksgiving and Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For this reason, ever since I heard about your faith in the Lord Jesus and your love for all God’s people, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I have not stopped giving thanks for you, remembering you in my prayers. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I keep asking that the God of our Lord Jesus Christ, the glorious Father, may give you the Spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a spirit
    marker-yv: yv-n
  - type: text
    text: ' of wisdom and revelation, so that you may know him better. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I pray that the eyes of your heart may be enlightened in order that you may know the hope to which he has called you, the riches of his glorious inheritance in his holy people, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'and his incomparably great power for us who believe. That power is the same as the mighty strength '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'he exerted when he raised Christ from the dead and seated him at his right hand in the heavenly realms, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'far above all rule and authority, power and dominion, and every name that is invoked, not only in the present age but also in the one to come. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And God placed all things under his feet and appointed him to be head over everything for the church, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: which is his body, the fullness of him who fills everything in every way.
