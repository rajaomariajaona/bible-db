document_id: NUM.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Supplementary Offerings
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'and also bring half a hin of wine as a drink offering. This will be a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Each bull or ram, each lamb or young goat, is to be prepared in this manner. '
  '12':
  - type: text
    content: Do this for each one, for as many as you prepare.
  '13':
  - type: text
    content: '“ ‘Everyone who is native-born must do these things in this way when they present a food offering as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'For the generations to come, whenever a foreigner or anyone else living among you presents a food offering as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ', they must do exactly as you do. '
  '15':
  - type: text
    content: 'The community is to have the same rules for you and for the foreigner residing among you; this is a lasting ordinance for the generations to come. You and the foreigner shall be the same before the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '16':
  - type: text
    content: The same laws and regulations will apply both to you and to the foreigner residing among you.’ ”
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '18':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘When you enter the land to which I am taking you '
  '19':
  - type: text
    content: 'and you eat the food of the land, present a portion as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘After you enter the land I am giving you as a home '
  '20':
  - type: text
    content: 'Present a loaf from the first of your ground meal and present it as an offering from the threshing floor. '
  '21':
  - type: text
    content: 'Throughout the generations to come you are to give this offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' from the first of your ground meal.'
  - type: heading
    content: Offerings for Unintentional Sins
  '22':
  - type: text
    content: '“ ‘Now if you as a community unintentionally fail to keep any of these commands the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Moses— '
  '23':
  - type: text
    content: 'any of the '
  - type: text
    content: Lord
  - type: text
    content: '’s commands to you through him, from the day the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them and continuing through the generations to come— '
  '24':
  - type: text
    content: 'and if this is done unintentionally without the community being aware of it, then the whole community is to offer a young bull for a burnt offering as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ', along with its prescribed grain offering and drink offering, and a male goat for a sin offering.'
  - type: note
    content: Or purification offering; also in verses 25 and 27
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'The priest is to make atonement for the whole Israelite community, and they will be forgiven, for it was not intentional and they have presented to the '
  - type: text
    content: Lord
  - type: text
    content: ' for their wrong a food offering and a sin offering. '
  '26':
  - type: text
    content: The whole Israelite community and the foreigners residing among them will be forgiven, because all the people were involved in the unintentional wrong.
  '27':
  - type: text
    content: '“ ‘But if just one person sins unintentionally, that person must bring a year-old female goat for a sin offering. '
  '28':
  - type: text
    content: 'The priest is to make atonement before the '
  - type: text
    content: Lord
  - type: text
    content: ' for the one who erred by sinning unintentionally, and when atonement has been made, that person will be forgiven. '
  '29':
  - type: text
    content: One and the same law applies to everyone who sins unintentionally, whether a native-born Israelite or a foreigner residing among you.
  '3':
  - type: text
    content: 'and you present to the '
  - type: text
    content: Lord
  - type: text
    content: ' food offerings from the herd or the flock, as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '—whether burnt offerings or sacrifices, for special vows or freewill offerings or festival offerings— '
  '30':
  - type: text
    content: '“ ‘But anyone who sins defiantly, whether native-born or foreigner, blasphemes the '
  - type: text
    content: Lord
  - type: text
    content: ' and must be cut off from the people of Israel. '
  '31':
  - type: text
    content: 'Because they have despised the '
  - type: text
    content: Lord
  - type: text
    content: ’s word and broken his commands, they must surely be cut off; their guilt remains on them.’ ”
  - type: heading
    content: The Sabbath-Breaker Put to Death
  '32':
  - type: text
    content: 'While the Israelites were in the wilderness, a man was found gathering wood on the Sabbath day. '
  '33':
  - type: text
    content: 'Those who found him gathering wood brought him to Moses and Aaron and the whole assembly, '
  '34':
  - type: text
    content: 'and they kept him in custody, because it was not clear what should be done to him. '
  '35':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “The man must die. The whole assembly must stone him outside the camp.” '
  '36':
  - type: text
    content: 'So the assembly took him outside the camp and stoned him to death, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  - type: heading
    content: Tassels on Garments
  '37':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '38':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘Throughout the generations to come you are to make tassels on the corners of your garments, with a blue cord on each tassel. '
  '39':
  - type: text
    content: 'You will have these tassels to look at and so you will remember all the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ', that you may obey them and not prostitute yourselves by chasing after the lusts of your own hearts and eyes. '
  '4':
  - type: text
    content: 'then the person who brings an offering shall present to the '
  - type: text
    content: Lord
  - type: text
    content: ' a grain offering of a tenth of an ephah'
  - type: note
    content: That is, probably about 3 1/2 pounds or about 1.6 kilograms
  - type: text
    content: ' of the finest flour mixed with a quarter of a hin'
  - type: note
    content: That is, about 1 quart or about 1 liter; also in verse 5
  - type: text
    content: ' of olive oil. '
  '40':
  - type: text
    content: 'Then you will remember to obey all my commands and will be consecrated to your God. '
  '41':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out of Egypt to be your God. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’ ”'
  '5':
  - type: text
    content: With each lamb for the burnt offering or the sacrifice, prepare a quarter of a hin of wine as a drink offering.
  '6':
  - type: text
    content: “ ‘With a ram prepare a grain offering of two-tenths of an ephah
  - type: note
    content: That is, probably about 7 pounds or about 3.2 kilograms
  - type: text
    content: ' of the finest flour mixed with a third of a hin'
  - type: note
    content: That is, about 1 1/3 quarts or about 1.3 liters; also in verse 7
  - type: text
    content: ' of olive oil, '
  '7':
  - type: text
    content: 'and a third of a hin of wine as a drink offering. Offer it as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: '“ ‘When you prepare a young bull as a burnt offering or sacrifice, for a special vow or a fellowship offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '9':
  - type: text
    content: bring with the bull a grain offering of three-tenths of an ephah
  - type: note
    content: That is, probably about 11 pounds or about 5 kilograms
  - type: text
    content: ' of the finest flour mixed with half a hin'
  - type: note
    content: That is, about 2 quarts or about 1.9 liters; also in verse 10
  - type: text
    content: ' of olive oil, '
