document_id: NUM.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Supplementary Offerings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and also bring half a hin of wine as a drink offering. This will be a food offering, an aroma pleasing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each bull or ram, each lamb or young goat, is to be prepared in this manner. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do this for each one, for as many as you prepare.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Everyone who is native-born must do these things in this way when they present a food offering as an aroma pleasing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the generations to come, whenever a foreigner or anyone else living among you presents a food offering as an aroma pleasing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', they must do exactly as you do. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The community is to have the same rules for you and for the foreigner residing among you; this is a lasting ordinance for the generations to come. You and the foreigner shall be the same before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The same laws and regulations will apply both to you and to the foreigner residing among you.’ ”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the Israelites and say to them: ‘When you enter the land to which I am taking you '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you eat the food of the land, present a portion as an offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the Israelites and say to them: ‘After you enter the land I am giving you as a home '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Present a loaf from the first of your ground meal and present it as an offering from the threshing floor. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Throughout the generations to come you are to give this offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from the first of your ground meal.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offerings for Unintentional Sins
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Now if you as a community unintentionally fail to keep any of these commands the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Moses— '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'any of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s commands to you through him, from the day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave them and continuing through the generations to come— '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and if this is done unintentionally without the community being aware of it, then the whole community is to offer a young bull for a burnt offering as an aroma pleasing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', along with its prescribed grain offering and drink offering, and a male goat for a sin offering.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: purification offering
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 25 and 27
      marker-yv: yv-n
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest is to make atonement for the whole Israelite community, and they will be forgiven, for it was not intentional and they have presented to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for their wrong a food offering and a sin offering. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The whole Israelite community and the foreigners residing among them will be forgiven, because all the people were involved in the unintentional wrong.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘But if just one person sins unintentionally, that person must bring a year-old female goat for a sin offering. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priest is to make atonement before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for the one who erred by sinning unintentionally, and when atonement has been made, that person will be forgiven. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One and the same law applies to everyone who sins unintentionally, whether a native-born Israelite or a foreigner residing among you.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you present to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' food offerings from the herd or the flock, as an aroma pleasing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—whether burnt offerings or sacrifices, for special vows or freewill offerings or festival offerings— '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘But anyone who sins defiantly, whether native-born or foreigner, blasphemes the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and must be cut off from the people of Israel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because they have despised the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s word and broken his commands, they must surely be cut off; their guilt remains on them.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sabbath-Breaker Put to Death
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While the Israelites were in the wilderness, a man was found gathering wood on the Sabbath day. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who found him gathering wood brought him to Moses and Aaron and the whole assembly, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they kept him in custody, because it was not clear what should be done to him. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “The man must die. The whole assembly must stone him outside the camp.” '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the assembly took him outside the camp and stoned him to death, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tassels on Garments
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the Israelites and say to them: ‘Throughout the generations to come you are to make tassels on the corners of your garments, with a blue cord on each tassel. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will have these tassels to look at and so you will remember all the commands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that you may obey them and not prostitute yourselves by chasing after the lusts of your own hearts and eyes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then the person who brings an offering shall present to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' a grain offering of a tenth of an ephah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 3 1/2 pounds or about 1.6 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of the finest flour mixed with a quarter of a hin'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 1 quart or about 1 liter; also in verse 5
      marker-yv: yv-n
    - type: text
      text: ' of olive oil. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you will remember to obey all my commands and will be consecrated to your God. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who brought you out of Egypt to be your God. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.’ ”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: With each lamb for the burnt offering or the sacrifice, prepare a quarter of a hin of wine as a drink offering.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “ ‘With a ram prepare a grain offering of two-tenths of an ephah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 7 pounds or about 3.2 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of the finest flour mixed with a third of a hin'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 1 1/3 quarts or about 1.3 liters; also in verse 7
      marker-yv: yv-n
    - type: text
      text: ' of olive oil, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and a third of a hin of wine as a drink offering. Offer it as an aroma pleasing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘When you prepare a young bull as a burnt offering or sacrifice, for a special vow or a fellowship offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: bring with the bull a grain offering of three-tenths of an ephah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 11 pounds or about 5 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of the finest flour mixed with half a hin'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 2 quarts or about 1.9 liters; also in verse 10
      marker-yv: yv-n
    - type: text
      text: ' of olive oil, '
