document_id: TIT.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Doing Good for the Sake of the Gospel
  - type: text
    content: 'You, however, must teach what is appropriate to sound doctrine. '
  '10':
  - type: text
    content: and not to steal from them, but to show that they can be fully trusted, so that in every way they will make the teaching about God our Savior attractive.
  '11':
  - type: text
    content: 'For the grace of God has appeared that offers salvation to all people. '
  '12':
  - type: text
    content: 'It teaches us to say “No” to ungodliness and worldly passions, and to live self-controlled, upright and godly lives in this present age, '
  '13':
  - type: text
    content: 'while we wait for the blessed hope—the appearing of the glory of our great God and Savior, Jesus Christ, '
  '14':
  - type: text
    content: who gave himself for us to redeem us from all wickedness and to purify for himself a people that are his very own, eager to do what is good.
  '15':
  - type: text
    content: These, then, are the things you should teach. Encourage and rebuke with all authority. Do not let anyone despise you.
  '2':
  - type: text
    content: Teach the older men to be temperate, worthy of respect, self-controlled, and sound in faith, in love and in endurance.
  '3':
  - type: text
    content: 'Likewise, teach the older women to be reverent in the way they live, not to be slanderers or addicted to much wine, but to teach what is good. '
  '4':
  - type: text
    content: 'Then they can urge the younger women to love their husbands and children, '
  '5':
  - type: text
    content: to be self-controlled and pure, to be busy at home, to be kind, and to be subject to their husbands, so that no one will malign the word of God.
  '6':
  - type: text
    content: 'Similarly, encourage the young men to be self-controlled. '
  '7':
  - type: text
    content: 'In everything set them an example by doing what is good. In your teaching show integrity, seriousness '
  '8':
  - type: text
    content: and soundness of speech that cannot be condemned, so that those who oppose you may be ashamed because they have nothing bad to say about us.
  '9':
  - type: text
    content: 'Teach slaves to be subject to their masters in everything, to try to please them, not to talk back to them, '
