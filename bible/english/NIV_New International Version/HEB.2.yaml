document_id: HEB.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warning to Pay Attention
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'We must pay the most careful attention, therefore, to what we have heard, so that we do not drift away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For since the message spoken through angels was binding, and every violation and disobedience received its just punishment, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'how shall we escape if we ignore so great a salvation? This salvation, which was first announced by the Lord, was confirmed to us by those who heard him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: God also testified to it by signs, wonders and various miracles, and by gifts of the Holy Spirit distributed according to his will.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Made Fully Human
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'It is not to angels that he has subjected the world to come, about which we are speaking. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But there is a place where someone has testified:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “What is mankind that you are mindful of them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a son of man that you care for him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You made them a little
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: them for a little while
    marker-yv: yv-n
  - type: text
    text: ' lower than the angels;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you crowned them with glory and honor
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and put everything under their feet.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6-8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 8:4-6
    marker-yv: yv-n
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7,8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '7 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'You made him a little lower than the angels; / you crowned him with glory and honor / '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '8 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and put everything under his feet.”
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: text
    text: In putting everything under them,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: him
    marker-yv: yv-n
  - type: text
    text: ' God left nothing that is not subject to them.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: him
    marker-yv: yv-n
  - type: text
    text: ' Yet at present we do not see everything subject to them.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: him
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But we do see Jesus, who was made lower than the angels for a little while, now crowned with glory and honor because he suffered death, so that by the grace of God he might taste death for everyone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In bringing many sons and daughters to glory, it was fitting that God, for whom and through whom everything exists, should make the pioneer of their salvation perfect through what he suffered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Both the one who makes people holy and those who are made holy are of the same family. So Jesus is not ashamed to call them brothers and sisters.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'brothers and sisters '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: tl
        children:
        - type: text
          text: adelphoi
      - type: text
        text: ) refers here to believers, both men and women, as part of God’s family; also in verse 12; and in 3:1, 12; 10:19; 13:22.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will declare your name to my brothers and sisters;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the assembly I will sing your praises.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 22:22
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will put my trust in him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 8:17
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: text
    text: And again he says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Here am I, and the children God has given me.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 8:18
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Since the children have flesh and blood, he too shared in their humanity so that by his death he might break the power of him who holds the power of death—that is, the devil— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and free those who all their lives were held in slavery by their fear of death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For surely it is not angels he helps, but Abraham’s descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For this reason he had to be made like them,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: like his brothers
    marker-yv: yv-n
  - type: text
    text: ' fully human in every way, in order that he might become a merciful and faithful high priest in service to God, and that he might make atonement for the sins of the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Because he himself suffered when he was tempted, he is able to help those who are being tempted.
