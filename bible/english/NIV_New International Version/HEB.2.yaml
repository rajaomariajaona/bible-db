document_id: HEB.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning to Pay Attention
  - type: text
    content: 'We must pay the most careful attention, therefore, to what we have heard, so that we do not drift away. '
  '10':
  - type: text
    content: 'In bringing many sons and daughters to glory, it was fitting that God, for whom and through whom everything exists, should make the pioneer of their salvation perfect through what he suffered. '
  '11':
  - type: text
    content: Both the one who makes people holy and those who are made holy are of the same family. So Jesus is not ashamed to call them brothers and sisters.
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in verse 12; and in 3:1, 12; 10:19; 13:22.
  - type: text
    content: ' '
  '12':
  - type: text
    content: He says,
  - type: text
    content: “I will declare your name to my brothers and sisters;
  - type: text
    content: in the assembly I will sing your praises.”
  - type: note
    content: Psalm 22:22
  '13':
  - type: text
    content: And again,
  - type: text
    content: “I will put my trust in him.”
  - type: note
    content: Isaiah 8:17
  - type: text
    content: And again he says,
  - type: text
    content: “Here am I, and the children God has given me.”
  - type: note
    content: Isaiah 8:18
  '14':
  - type: text
    content: 'Since the children have flesh and blood, he too shared in their humanity so that by his death he might break the power of him who holds the power of death—that is, the devil— '
  '15':
  - type: text
    content: 'and free those who all their lives were held in slavery by their fear of death. '
  '16':
  - type: text
    content: 'For surely it is not angels he helps, but Abraham’s descendants. '
  '17':
  - type: text
    content: For this reason he had to be made like them,
  - type: note
    content: Or like his brothers
  - type: text
    content: ' fully human in every way, in order that he might become a merciful and faithful high priest in service to God, and that he might make atonement for the sins of the people. '
  '18':
  - type: text
    content: Because he himself suffered when he was tempted, he is able to help those who are being tempted.
  '2':
  - type: text
    content: 'For since the message spoken through angels was binding, and every violation and disobedience received its just punishment, '
  '3':
  - type: text
    content: 'how shall we escape if we ignore so great a salvation? This salvation, which was first announced by the Lord, was confirmed to us by those who heard him. '
  '4':
  - type: text
    content: God also testified to it by signs, wonders and various miracles, and by gifts of the Holy Spirit distributed according to his will.
  - type: heading
    content: Jesus Made Fully Human
  '5':
  - type: text
    content: 'It is not to angels that he has subjected the world to come, about which we are speaking. '
  '6':
  - type: text
    content: 'But there is a place where someone has testified:'
  - type: text
    content: “What is mankind that you are mindful of them,
  - type: text
    content: a son of man that you care for him?
  '7':
  - type: text
    content: You made them a little
  - type: note
    content: Or them for a little while
  - type: text
    content: ' lower than the angels;'
  - type: text
    content: you crowned them with glory and honor
  '8':
  - type: text
    content: and put everything under their feet.”
  - type: note
    content: Psalm 8:4-6
  - type: note
    content: Or 7 You made him a little lower than the angels; / you crowned him with glory and honor / 8 and put everything under his feet.”
  - type: text
    content: In putting everything under them,
  - type: note
    content: Or him
  - type: text
    content: ' God left nothing that is not subject to them.'
  - type: note
    content: Or him
  - type: text
    content: ' Yet at present we do not see everything subject to them.'
  - type: note
    content: Or him
  - type: text
    content: ' '
  '9':
  - type: text
    content: But we do see Jesus, who was made lower than the angels for a little while, now crowned with glory and honor because he suffered death, so that by the grace of God he might taste death for everyone.
