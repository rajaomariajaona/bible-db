document_id: GEN.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Sarah
  - type: text
    content: 'Sarah lived to be a hundred and twenty-seven years old. '
  '10':
  - type: text
    content: 'Ephron the Hittite was sitting among his people and he replied to Abraham in the hearing of all the Hittites who had come to the gate of his city. '
  '11':
  - type: text
    content: “No, my lord,” he said. “Listen to me; I give
  - type: note
    content: Or sell
  - type: text
    content: ' you the field, and I give'
  - type: note
    content: Or sell
  - type: text
    content: ' you the cave that is in it. I give'
  - type: note
    content: Or sell
  - type: text
    content: ' it to you in the presence of my people. Bury your dead.”'
  '12':
  - type: text
    content: 'Again Abraham bowed down before the people of the land '
  '13':
  - type: text
    content: and he said to Ephron in their hearing, “Listen to me, if you will. I will pay the price of the field. Accept it from me so I can bury my dead there.”
  '14':
  - type: text
    content: 'Ephron answered Abraham, '
  '15':
  - type: text
    content: “Listen to me, my lord; the land is worth four hundred shekels
  - type: note
    content: That is, about 10 pounds or about 4.6 kilograms
  - type: text
    content: ' of silver, but what is that between you and me? Bury your dead.”'
  '16':
  - type: text
    content: 'Abraham agreed to Ephron’s terms and weighed out for him the price he had named in the hearing of the Hittites: four hundred shekels of silver, according to the weight current among the merchants.'
  '17':
  - type: text
    content: 'So Ephron’s field in Machpelah near Mamre—both the field and the cave in it, and all the trees within the borders of the field—was deeded '
  '18':
  - type: text
    content: 'to Abraham as his property in the presence of all the Hittites who had come to the gate of the city. '
  '19':
  - type: text
    content: 'Afterward Abraham buried his wife Sarah in the cave in the field of Machpelah near Mamre (which is at Hebron) in the land of Canaan. '
  '2':
  - type: text
    content: She died at Kiriath Arba (that is, Hebron) in the land of Canaan, and Abraham went to mourn for Sarah and to weep over her.
  '20':
  - type: text
    content: So the field and the cave in it were deeded to Abraham by the Hittites as a burial site.
  '3':
  - type: text
    content: Then Abraham rose from beside his dead wife and spoke to the Hittites.
  - type: note
    content: Or the descendants of Heth; also in verses 5, 7, 10, 16, 18 and 20
  - type: text
    content: ' He said, '
  '4':
  - type: text
    content: “I am a foreigner and stranger among you. Sell me some property for a burial site here so I can bury my dead.”
  '5':
  - type: text
    content: 'The Hittites replied to Abraham, '
  '6':
  - type: text
    content: “Sir, listen to us. You are a mighty prince among us. Bury your dead in the choicest of our tombs. None of us will refuse you his tomb for burying your dead.”
  '7':
  - type: text
    content: 'Then Abraham rose and bowed down before the people of the land, the Hittites. '
  '8':
  - type: text
    content: 'He said to them, “If you are willing to let me bury my dead, then listen to me and intercede with Ephron son of Zohar on my behalf '
  '9':
  - type: text
    content: so he will sell me the cave of Machpelah, which belongs to him and is at the end of his field. Ask him to sell it to me for the full price as a burial site among you.”
