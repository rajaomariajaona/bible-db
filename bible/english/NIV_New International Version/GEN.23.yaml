document_id: GEN.23,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Sarah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sarah lived to be a hundred and twenty-seven years old. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ephron the Hittite was sitting among his people and he replied to Abraham in the hearing of all the Hittites who had come to the gate of his city. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No, my lord,” he said. “Listen to me; I give
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sell
      marker-yv: yv-n
    - type: text
      text: ' you the field, and I give'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sell
      marker-yv: yv-n
    - type: text
      text: ' you the cave that is in it. I give'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sell
      marker-yv: yv-n
    - type: text
      text: ' it to you in the presence of my people. Bury your dead.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again Abraham bowed down before the people of the land '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he said to Ephron in their hearing, “Listen to me, if you will. I will pay the price of the field. Accept it from me so I can bury my dead there.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ephron answered Abraham, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Listen to me, my lord; the land is worth four hundred shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 10 pounds or about 4.6 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver, but what is that between you and me? Bury your dead.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham agreed to Ephron’s terms and weighed out for him the price he had named in the hearing of the Hittites: four hundred shekels of silver, according to the weight current among the merchants.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ephron’s field in Machpelah near Mamre—both the field and the cave in it, and all the trees within the borders of the field—was deeded '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to Abraham as his property in the presence of all the Hittites who had come to the gate of the city. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward Abraham buried his wife Sarah in the cave in the field of Machpelah near Mamre (which is at Hebron) in the land of Canaan. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She died at Kiriath Arba (that is, Hebron) in the land of Canaan, and Abraham went to mourn for Sarah and to weep over her.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the field and the cave in it were deeded to Abraham by the Hittites as a burial site.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Abraham rose from beside his dead wife and spoke to the Hittites.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the descendants of Heth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 5, 7, 10, 16, 18 and 20
      marker-yv: yv-n
    - type: text
      text: ' He said, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I am a foreigner and stranger among you. Sell me some property for a burial site here so I can bury my dead.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Hittites replied to Abraham, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Sir, listen to us. You are a mighty prince among us. Bury your dead in the choicest of our tombs. None of us will refuse you his tomb for burying your dead.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abraham rose and bowed down before the people of the land, the Hittites. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, “If you are willing to let me bury my dead, then listen to me and intercede with Ephron son of Zohar on my behalf '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so he will sell me the cave of Machpelah, which belongs to him and is at the end of his field. Ask him to sell it to me for the full price as a burial site among you.”
