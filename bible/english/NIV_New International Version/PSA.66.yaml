document_id: PSA.66,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 66
  - type: text
    content: For the director of music. A song. A psalm.
  - type: text
    content: Shout for joy to God, all the earth!
  '10':
  - type: text
    content: For you, God, tested us;
  - type: text
    content: you refined us like silver.
  '11':
  - type: text
    content: You brought us into prison
  - type: text
    content: and laid burdens on our backs.
  '12':
  - type: text
    content: You let people ride over our heads;
  - type: text
    content: we went through fire and water,
  - type: text
    content: but you brought us to a place of abundance.
  '13':
  - type: text
    content: I will come to your temple with burnt offerings
  - type: text
    content: and fulfill my vows to you—
  '14':
  - type: text
    content: vows my lips promised and my mouth spoke
  - type: text
    content: when I was in trouble.
  '15':
  - type: text
    content: I will sacrifice fat animals to you
  - type: text
    content: and an offering of rams;
  - type: text
    content: I will offer bulls and goats.
  '16':
  - type: text
    content: Come and hear, all you who fear God;
  - type: text
    content: let me tell you what he has done for me.
  '17':
  - type: text
    content: I cried out to him with my mouth;
  - type: text
    content: his praise was on my tongue.
  '18':
  - type: text
    content: If I had cherished sin in my heart,
  - type: text
    content: the Lord would not have listened;
  '19':
  - type: text
    content: but God has surely listened
  - type: text
    content: and has heard my prayer.
  '2':
  - type: text
    content: Sing the glory of his name;
  - type: text
    content: make his praise glorious.
  '20':
  - type: text
    content: Praise be to God,
  - type: text
    content: who has not rejected my prayer
  - type: text
    content: or withheld his love from me!
  '3':
  - type: text
    content: Say to God, “How awesome are your deeds!
  - type: text
    content: So great is your power
  - type: text
    content: that your enemies cringe before you.
  '4':
  - type: text
    content: All the earth bows down to you;
  - type: text
    content: they sing praise to you,
  - type: text
    content: they sing the praises of your name.”
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verses 7 and 15.
  '5':
  - type: text
    content: Come and see what God has done,
  - type: text
    content: his awesome deeds for mankind!
  '6':
  - type: text
    content: He turned the sea into dry land,
  - type: text
    content: they passed through the waters on foot—
  - type: text
    content: come, let us rejoice in him.
  '7':
  - type: text
    content: He rules forever by his power,
  - type: text
    content: his eyes watch the nations—
  - type: text
    content: let not the rebellious rise up against him.
  '8':
  - type: text
    content: Praise our God, all peoples,
  - type: text
    content: let the sound of his praise be heard;
  '9':
  - type: text
    content: he has preserved our lives
  - type: text
    content: and kept our feet from slipping.
