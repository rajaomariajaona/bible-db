document_id: PSA.66
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 66
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. A song. A psalm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Shout for joy to God, all the earth!
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sing the glory of his name;
- type: usfm
  marker: q2
  children:
  - type: text
    text: make his praise glorious.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Say to God, “How awesome are your deeds!
- type: usfm
  marker: q2
  children:
  - type: text
    text: So great is your power
- type: usfm
  marker: q2
  children:
  - type: text
    text: that your enemies cringe before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All the earth bows down to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they sing praise to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they sing the praises of your name.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here and at the end of verses 7 and 15.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Come and see what God has done,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his awesome deeds for mankind!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He turned the sea into dry land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they passed through the waters on foot—
- type: usfm
  marker: q2
  children:
  - type: text
    text: come, let us rejoice in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He rules forever by his power,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his eyes watch the nations—
- type: usfm
  marker: q2
  children:
  - type: text
    text: let not the rebellious rise up against him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Praise our God, all peoples,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the sound of his praise be heard;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: he has preserved our lives
- type: usfm
  marker: q2
  children:
  - type: text
    text: and kept our feet from slipping.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For you, God, tested us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you refined us like silver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You brought us into prison
- type: usfm
  marker: q2
  children:
  - type: text
    text: and laid burdens on our backs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You let people ride over our heads;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we went through fire and water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you brought us to a place of abundance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I will come to your temple with burnt offerings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fulfill my vows to you—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: vows my lips promised and my mouth spoke
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I was in trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will sacrifice fat animals to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and an offering of rams;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will offer bulls and goats.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Come and hear, all you who fear God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let me tell you what he has done for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I cried out to him with my mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his praise was on my tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: If I had cherished sin in my heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Lord would not have listened;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: but God has surely listened
- type: usfm
  marker: q2
  children:
  - type: text
    text: and has heard my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Praise be to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who has not rejected my prayer
- type: usfm
  marker: q2
  children:
  - type: text
    text: or withheld his love from me!
