document_id: JHN.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Washes His Disciples’ Feet
  - type: text
    content: It was just before the Passover Festival. Jesus knew that the hour had come for him to leave this world and go to the Father. Having loved his own who were in the world, he loved them to the end.
  '10':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Those who have had a bath need only to wash their feet; their whole body is clean. And you are clean, though not every one of you.”
  - type: text
    content: ' '
  '11':
  - type: text
    content: For he knew who was going to betray him, and that was why he said not every one was clean.
  '12':
  - type: text
    content: 'When he had finished washing their feet, he put on his clothes and returned to his place. '
  - type: text
    content: “Do you understand what I have done for you?”
  - type: text
    content: ' he asked them. '
  '13':
  - type: text
    content: “You call me ‘Teacher’ and ‘Lord,’ and rightly so, for that is what I am.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Now that I, your Lord and Teacher, have washed your feet, you also should wash one another’s feet.
  - type: text
    content: ' '
  '15':
  - type: text
    content: I have set you an example that you should do as I have done for you.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Very truly I tell you, no servant is greater than his master, nor is a messenger greater than the one who sent him.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Now that you know these things, you will be blessed if you do them.
  - type: heading
    content: Jesus Predicts His Betrayal
  '18':
  - type: text
    content: ' '
  - type: text
    content: '“I am not referring to all of you; I know those I have chosen. But this is to fulfill this passage of Scripture: ‘He who shared my bread has turned'
  - type: text
    content: ' '
  - type: note
    content: Greek has lifted up his heel
  - type: text
    content: against me.’
  - type: note
    content: Psalm 41:9
  '19':
  - type: text
    content: ' '
  - type: text
    content: “I am telling you now before it happens, so that when it does happen you will believe that I am who I am.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'The evening meal was in progress, and the devil had already prompted Judas, the son of Simon Iscariot, to betray Jesus. '
  '20':
  - type: text
    content: Very truly I tell you, whoever accepts anyone I send accepts me; and whoever accepts me accepts the one who sent me.”
  '21':
  - type: text
    content: 'After he had said this, Jesus was troubled in spirit and testified, '
  - type: text
    content: “Very truly I tell you, one of you is going to betray me.”
  '22':
  - type: text
    content: 'His disciples stared at one another, at a loss to know which of them he meant. '
  '23':
  - type: text
    content: 'One of them, the disciple whom Jesus loved, was reclining next to him. '
  '24':
  - type: text
    content: Simon Peter motioned to this disciple and said, “Ask him which one he means.”
  '25':
  - type: text
    content: Leaning back against Jesus, he asked him, “Lord, who is it?”
  '26':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “It is the one to whom I will give this piece of bread when I have dipped it in the dish.”
  - type: text
    content: ' Then, dipping the piece of bread, he gave it to Judas, the son of Simon Iscariot. '
  '27':
  - type: text
    content: As soon as Judas took the bread, Satan entered into him.
  - type: text
    content: 'So Jesus told him, '
  - type: text
    content: “What you are about to do, do quickly.”
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'But no one at the meal understood why Jesus said this to him. '
  '29':
  - type: text
    content: 'Since Judas had charge of the money, some thought Jesus was telling him to buy what was needed for the festival, or to give something to the poor. '
  '3':
  - type: text
    content: 'Jesus knew that the Father had put all things under his power, and that he had come from God and was returning to God; '
  '30':
  - type: text
    content: As soon as Judas had taken the bread, he went out. And it was night.
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '31':
  - type: text
    content: 'When he was gone, Jesus said, '
  - type: text
    content: “Now the Son of Man is glorified and God is glorified in him.
  - type: text
    content: ' '
  '32':
  - type: text
    content: If God is glorified in him,
  - type: note
    content: Many early manuscripts do not have If God is glorified in him.
  - type: text
    content: ' '
  - type: text
    content: God will glorify the Son in himself, and will glorify him at once.
  '33':
  - type: text
    content: ' '
  - type: text
    content: '“My children, I will be with you only a little longer. You will look for me, and just as I told the Jews, so I tell you now: Where I am going, you cannot come.'
  '34':
  - type: text
    content: ' '
  - type: text
    content: '“A new command I give you: Love one another. As I have loved you, so you must love one another.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: By this everyone will know that you are my disciples, if you love one another.”
  '36':
  - type: text
    content: Simon Peter asked him, “Lord, where are you going?”
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Where I am going, you cannot follow now, but you will follow later.”
  '37':
  - type: text
    content: Peter asked, “Lord, why can’t I follow you now? I will lay down my life for you.”
  '38':
  - type: text
    content: 'Then Jesus answered, '
  - type: text
    content: “Will you really lay down your life for me? Very truly I tell you, before the rooster crows, you will disown me three times!
  '4':
  - type: text
    content: 'so he got up from the meal, took off his outer clothing, and wrapped a towel around his waist. '
  '5':
  - type: text
    content: After that, he poured water into a basin and began to wash his disciples’ feet, drying them with the towel that was wrapped around him.
  '6':
  - type: text
    content: He came to Simon Peter, who said to him, “Lord, are you going to wash my feet?”
  '7':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You do not realize now what I am doing, but later you will understand.”
  '8':
  - type: text
    content: “No,” said Peter, “you shall never wash my feet.”
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Unless I wash you, you have no part with me.”
  '9':
  - type: text
    content: “Then, Lord,” Simon Peter replied, “not just my feet but my hands and my head as well!”
