document_id: NUM.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Moab Seduces Israel
  - type: text
    content: 'While Israel was staying in Shittim, the men began to indulge in sexual immorality with Moabite women, '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '11':
  - type: text
    content: '“Phinehas son of Eleazar, the son of Aaron, the priest, has turned my anger away from the Israelites. Since he was as zealous for my honor among them as I am, I did not put an end to them in my zeal. '
  '12':
  - type: text
    content: 'Therefore tell him I am making my covenant of peace with him. '
  '13':
  - type: text
    content: He and his descendants will have a covenant of a lasting priesthood, because he was zealous for the honor of his God and made atonement for the Israelites.”
  '14':
  - type: text
    content: 'The name of the Israelite who was killed with the Midianite woman was Zimri son of Salu, the leader of a Simeonite family. '
  '15':
  - type: text
    content: And the name of the Midianite woman who was put to death was Kozbi daughter of Zur, a tribal chief of a Midianite family.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '17':
  - type: text
    content: '“Treat the Midianites as enemies and kill them. '
  '18':
  - type: text
    content: They treated you as enemies when they deceived you in the Peor incident involving their sister Kozbi, the daughter of a Midianite leader, the woman who was killed when the plague came as a result of that incident.”
  '2':
  - type: text
    content: 'who invited them to the sacrifices to their gods. The people ate the sacrificial meal and bowed down before these gods. '
  '3':
  - type: text
    content: 'So Israel yoked themselves to the Baal of Peor. And the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger burned against them.
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Take all the leaders of these people, kill them and expose them in broad daylight before the '
  - type: text
    content: Lord
  - type: text
    content: ', so that the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger may turn away from Israel.”
  '5':
  - type: text
    content: So Moses said to Israel’s judges, “Each of you must put to death those of your people who have yoked themselves to the Baal of Peor.”
  '6':
  - type: text
    content: 'Then an Israelite man brought into the camp a Midianite woman right before the eyes of Moses and the whole assembly of Israel while they were weeping at the entrance to the tent of meeting. '
  '7':
  - type: text
    content: 'When Phinehas son of Eleazar, the son of Aaron, the priest, saw this, he left the assembly, took a spear in his hand '
  '8':
  - type: text
    content: 'and followed the Israelite into the tent. He drove the spear into both of them, right through the Israelite man and into the woman’s stomach. Then the plague against the Israelites was stopped; '
  '9':
  - type: text
    content: but those who died in the plague numbered 24,000.
