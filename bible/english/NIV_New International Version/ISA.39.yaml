document_id: ISA.39,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Envoys From Babylon
  - type: text
    content: 'At that time Marduk-Baladan son of Baladan king of Babylon sent Hezekiah letters and a gift, because he had heard of his illness and recovery. '
  '2':
  - type: text
    content: Hezekiah received the envoys gladly and showed them what was in his storehouses—the silver, the gold, the spices, the fine olive oil—his entire armory and everything found among his treasures. There was nothing in his palace or in all his kingdom that Hezekiah did not show them.
  '3':
  - type: text
    content: Then Isaiah the prophet went to King Hezekiah and asked, “What did those men say, and where did they come from?”
  - type: text
    content: “From a distant land,” Hezekiah replied. “They came to me from Babylon.”
  '4':
  - type: text
    content: The prophet asked, “What did they see in your palace?”
  - type: text
    content: “They saw everything in my palace,” Hezekiah said. “There is nothing among my treasures that I did not show them.”
  '5':
  - type: text
    content: 'Then Isaiah said to Hezekiah, “Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty: '
  '6':
  - type: text
    content: 'The time will surely come when everything in your palace, and all that your predecessors have stored up until this day, will be carried off to Babylon. Nothing will be left, says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: And some of your descendants, your own flesh and blood who will be born to you, will be taken away, and they will become eunuchs in the palace of the king of Babylon.”
  '8':
  - type: text
    content: '“The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' you have spoken is good,” Hezekiah replied. For he thought, “There will be peace and security in my lifetime.”'
