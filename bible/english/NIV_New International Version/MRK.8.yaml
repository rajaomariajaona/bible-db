type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Feeds the Four Thousand
  - type: text
    content: 'During those days another large crowd gathered. Since they had nothing to eat, Jesus called his disciples to him and said, '
  '10':
  - type: text
    content: he got into the boat with his disciples and went to the region of Dalmanutha.
  '11':
  - type: text
    content: 'The Pharisees came and began to question Jesus. To test him, they asked him for a sign from heaven. '
  '12':
  - type: text
    content: 'He sighed deeply and said, '
  - type: text
    content: “Why does this generation ask for a sign? Truly I tell you, no sign will be given to it.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: Then he left them, got back into the boat and crossed to the other side.
  - type: heading
    content: The Yeast of the Pharisees and Herod
  '14':
  - type: text
    content: 'The disciples had forgotten to bring bread, except for one loaf they had with them in the boat. '
  '15':
  - type: text
    content: “Be careful,”
  - type: text
    content: ' Jesus warned them. '
  - type: text
    content: “Watch out for the yeast of the Pharisees and that of Herod.”
  '16':
  - type: text
    content: They discussed this with one another and said, “It is because we have no bread.”
  '17':
  - type: text
    content: 'Aware of their discussion, Jesus asked them: '
  - type: text
    content: “Why are you talking about having no bread? Do you still not see or understand? Are your hearts hardened?
  - type: text
    content: ' '
  '18':
  - type: text
    content: Do you have eyes but fail to see, and ears but fail to hear? And don’t you remember?
  - type: text
    content: ' '
  '19':
  - type: text
    content: When I broke the five loaves for the five thousand, how many basketfuls of pieces did you pick up?”
  - type: text
    content: “Twelve,” they replied.
  '2':
  - type: text
    content: “I have compassion for these people; they have already been with me three days and have nothing to eat.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “And when I broke the seven loaves for the four thousand, how many basketfuls of pieces did you pick up?”
  - type: text
    content: They answered, “Seven.”
  '21':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Do you still not understand?”
  - type: heading
    content: Jesus Heals a Blind Man at Bethsaida
  '22':
  - type: text
    content: 'They came to Bethsaida, and some people brought a blind man and begged Jesus to touch him. '
  '23':
  - type: text
    content: 'He took the blind man by the hand and led him outside the village. When he had spit on the man’s eyes and put his hands on him, Jesus asked, '
  - type: text
    content: “Do you see anything?”
  '24':
  - type: text
    content: He looked up and said, “I see people; they look like trees walking around.”
  '25':
  - type: text
    content: 'Once more Jesus put his hands on the man’s eyes. Then his eyes were opened, his sight was restored, and he saw everything clearly. '
  '26':
  - type: text
    content: 'Jesus sent him home, saying, '
  - type: text
    content: “Don’t even go into
  - type: note
    content: Some manuscripts go and tell anyone in
  - type: text
    content: ' '
  - type: text
    content: the village.”
  - type: heading
    content: Peter Declares That Jesus Is the Messiah
  '27':
  - type: text
    content: 'Jesus and his disciples went on to the villages around Caesarea Philippi. On the way he asked them, '
  - type: text
    content: “Who do people say I am?”
  '28':
  - type: text
    content: They replied, “Some say John the Baptist; others say Elijah; and still others, one of the prophets.”
  '29':
  - type: text
    content: ' '
  - type: text
    content: “But what about you?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “Who do you say I am?”
  - type: text
    content: Peter answered, “You are the Messiah.”
  '3':
  - type: text
    content: If I send them home hungry, they will collapse on the way, because some of them have come a long distance.”
  '30':
  - type: text
    content: Jesus warned them not to tell anyone about him.
  - type: heading
    content: Jesus Predicts His Death
  '31':
  - type: text
    content: 'He then began to teach them that the Son of Man must suffer many things and be rejected by the elders, the chief priests and the teachers of the law, and that he must be killed and after three days rise again. '
  '32':
  - type: text
    content: He spoke plainly about this, and Peter took him aside and began to rebuke him.
  '33':
  - type: text
    content: 'But when Jesus turned and looked at his disciples, he rebuked Peter. '
  - type: text
    content: “Get behind me, Satan!”
  - type: text
    content: ' he said. '
  - type: text
    content: “You do not have in mind the concerns of God, but merely human concerns.”
  - type: heading
    content: The Way of the Cross
  '34':
  - type: text
    content: 'Then he called the crowd to him along with his disciples and said: '
  - type: text
    content: “Whoever wants to be my disciple must deny themselves and take up their cross and follow me.
  - type: text
    content: ' '
  '35':
  - type: text
    content: For whoever wants to save their life
  - type: note
    content: The Greek word means either life or soul; also in verses 36 and 37.
  - type: text
    content: ' '
  - type: text
    content: will lose it, but whoever loses their life for me and for the gospel will save it.
  - type: text
    content: ' '
  '36':
  - type: text
    content: What good is it for someone to gain the whole world, yet forfeit their soul?
  - type: text
    content: ' '
  '37':
  - type: text
    content: Or what can anyone give in exchange for their soul?
  - type: text
    content: ' '
  '38':
  - type: text
    content: If anyone is ashamed of me and my words in this adulterous and sinful generation, the Son of Man will be ashamed of them when he comes in his Father’s glory with the holy angels.”
  '4':
  - type: text
    content: His disciples answered, “But where in this remote place can anyone get enough bread to feed them?”
  '5':
  - type: text
    content: ' '
  - type: text
    content: “How many loaves do you have?”
  - type: text
    content: ' Jesus asked.'
  - type: text
    content: “Seven,” they replied.
  '6':
  - type: text
    content: 'He told the crowd to sit down on the ground. When he had taken the seven loaves and given thanks, he broke them and gave them to his disciples to distribute to the people, and they did so. '
  '7':
  - type: text
    content: 'They had a few small fish as well; he gave thanks for them also and told the disciples to distribute them. '
  '8':
  - type: text
    content: 'The people ate and were satisfied. Afterward the disciples picked up seven basketfuls of broken pieces that were left over. '
  '9':
  - type: text
    content: 'About four thousand were present. After he had sent them away, '
