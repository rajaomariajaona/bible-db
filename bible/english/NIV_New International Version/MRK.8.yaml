document_id: MRK.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds the Four Thousand
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'During those days another large crowd gathered. Since they had nothing to eat, Jesus called his disciples to him and said, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: he got into the boat with his disciples and went to the region of Dalmanutha.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The Pharisees came and began to question Jesus. To test him, they asked him for a sign from heaven. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He sighed deeply and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why does this generation ask for a sign? Truly I tell you, no sign will be given to it.”
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then he left them, got back into the boat and crossed to the other side.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Yeast of the Pharisees and Herod
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The disciples had forgotten to bring bread, except for one loaf they had with them in the boat. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be careful,”
    - type: text
      text: ' Jesus warned them. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Watch out for the yeast of the Pharisees and that of Herod.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They discussed this with one another and said, “It is because we have no bread.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Aware of their discussion, Jesus asked them: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you talking about having no bread? Do you still not see or understand? Are your hearts hardened?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do you have eyes but fail to see, and ears but fail to hear? And don’t you remember?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When I broke the five loaves for the five thousand, how many basketfuls of pieces did you pick up?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Twelve,” they replied.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have compassion for these people; they have already been with me three days and have nothing to eat.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And when I broke the seven loaves for the four thousand, how many basketfuls of pieces did you pick up?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They answered, “Seven.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you still not understand?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Blind Man at Bethsaida
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'They came to Bethsaida, and some people brought a blind man and begged Jesus to touch him. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He took the blind man by the hand and led him outside the village. When he had spit on the man’s eyes and put his hands on him, Jesus asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you see anything?”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: He looked up and said, “I see people; they look like trees walking around.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Once more Jesus put his hands on the man’s eyes. Then his eyes were opened, his sight was restored, and he saw everything clearly. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jesus sent him home, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t even go into
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: go and tell anyone in
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the village.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter Declares That Jesus Is the Messiah
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jesus and his disciples went on to the villages around Caesarea Philippi. On the way he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who do people say I am?”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: They replied, “Some say John the Baptist; others say Elijah; and still others, one of the prophets.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But what about you?”
    - type: text
      text: ' he asked. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who do you say I am?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter answered, “You are the Messiah.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If I send them home hungry, they will collapse on the way, because some of them have come a long distance.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Jesus warned them not to tell anyone about him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Predicts His Death
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'He then began to teach them that the Son of Man must suffer many things and be rejected by the elders, the chief priests and the teachers of the law, and that he must be killed and after three days rise again. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: He spoke plainly about this, and Peter took him aside and began to rebuke him.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'But when Jesus turned and looked at his disciples, he rebuked Peter. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get behind me, Satan!”
    - type: text
      text: ' he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You do not have in mind the concerns of God, but merely human concerns.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Way of the Cross
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Then he called the crowd to him along with his disciples and said: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whoever wants to be my disciple must deny themselves and take up their cross and follow me.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For whoever wants to save their life
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word means either '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'life '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soul
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 36 and 37.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will lose it, but whoever loses their life for me and for the gospel will save it.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What good is it for someone to gain the whole world, yet forfeit their soul?
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or what can anyone give in exchange for their soul?
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If anyone is ashamed of me and my words in this adulterous and sinful generation, the Son of Man will be ashamed of them when he comes in his Father’s glory with the holy angels.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: His disciples answered, “But where in this remote place can anyone get enough bread to feed them?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How many loaves do you have?”
    - type: text
      text: ' Jesus asked.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Seven,” they replied.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'He told the crowd to sit down on the ground. When he had taken the seven loaves and given thanks, he broke them and gave them to his disciples to distribute to the people, and they did so. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They had a few small fish as well; he gave thanks for them also and told the disciples to distribute them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The people ate and were satisfied. Afterward the disciples picked up seven basketfuls of broken pieces that were left over. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'About four thousand were present. After he had sent them away, '
