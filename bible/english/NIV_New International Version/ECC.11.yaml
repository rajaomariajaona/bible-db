document_id: ECC.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Invest in Many Ventures
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ship your grain across the sea;
- type: usfm
  marker: q2
  children:
  - type: text
    text: after many days you may receive a return.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Invest in seven ventures, yes, in eight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you do not know what disaster may come upon the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: If clouds are full of water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they pour rain on the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whether a tree falls to the south or to the north,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the place where it falls, there it will lie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Whoever watches the wind will not plant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever looks at the clouds will not reap.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: As you do not know the path of the wind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or how the body is formed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'know how life '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the spirit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') / '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: enters the body being formed
    marker-yv: yv-n
  - type: text
    text: ' in a mother’s womb,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: so you cannot understand the work of God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Maker of all things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sow your seed in the morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and at evening let your hands not be idle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you do not know which will succeed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whether this or that,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or whether both will do equally well.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Remember Your Creator While Young
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Light is sweet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it pleases the eyes to see the sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: However many years anyone may live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them enjoy them all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But let them remember the days of darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for there will be many.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everything to come is meaningless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You who are young, be happy while you are young,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let your heart give you joy in the days of your youth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Follow the ways of your heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and whatever your eyes see,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but know that for all these things
- type: usfm
  marker: q2
  children:
  - type: text
    text: God will bring you into judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So then, banish anxiety from your heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cast off the troubles of your body,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for youth and vigor are meaningless.
