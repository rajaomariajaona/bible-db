document_id: ECC.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Invest in Many Ventures
  - type: text
    content: Ship your grain across the sea;
  - type: text
    content: after many days you may receive a return.
  '10':
  - type: text
    content: So then, banish anxiety from your heart
  - type: text
    content: and cast off the troubles of your body,
  - type: text
    content: for youth and vigor are meaningless.
  '2':
  - type: text
    content: Invest in seven ventures, yes, in eight;
  - type: text
    content: you do not know what disaster may come upon the land.
  '3':
  - type: text
    content: If clouds are full of water,
  - type: text
    content: they pour rain on the earth.
  - type: text
    content: Whether a tree falls to the south or to the north,
  - type: text
    content: in the place where it falls, there it will lie.
  '4':
  - type: text
    content: Whoever watches the wind will not plant;
  - type: text
    content: whoever looks at the clouds will not reap.
  '5':
  - type: text
    content: As you do not know the path of the wind,
  - type: text
    content: or how the body is formed
  - type: note
    content: Or know how life (or the spirit) / enters the body being formed
  - type: text
    content: ' in a mother’s womb,'
  - type: text
    content: so you cannot understand the work of God,
  - type: text
    content: the Maker of all things.
  '6':
  - type: text
    content: Sow your seed in the morning,
  - type: text
    content: and at evening let your hands not be idle,
  - type: text
    content: for you do not know which will succeed,
  - type: text
    content: whether this or that,
  - type: text
    content: or whether both will do equally well.
  - type: heading
    content: Remember Your Creator While Young
  '7':
  - type: text
    content: Light is sweet,
  - type: text
    content: and it pleases the eyes to see the sun.
  '8':
  - type: text
    content: However many years anyone may live,
  - type: text
    content: let them enjoy them all.
  - type: text
    content: But let them remember the days of darkness,
  - type: text
    content: for there will be many.
  - type: text
    content: Everything to come is meaningless.
  '9':
  - type: text
    content: You who are young, be happy while you are young,
  - type: text
    content: and let your heart give you joy in the days of your youth.
  - type: text
    content: Follow the ways of your heart
  - type: text
    content: and whatever your eyes see,
  - type: text
    content: but know that for all these things
  - type: text
    content: God will bring you into judgment.
