    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dishan
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Uz and Aran.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Rulers of Edom
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'These were the kings who reigned in Edom before any Israelite king reigned:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Bela son of Beor, whose city was named Dinhabah.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: When Bela died, Jobab son of Zerah from Bozrah succeeded him as king.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: When Jobab died, Husham from the land of the Temanites succeeded him as king.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: When Husham died, Hadad son of Bedad, who defeated Midian in the country of Moab, succeeded him as king. His city was named Avith.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: When Hadad died, Samlah from Masrekah succeeded him as king.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: When Samlah died, Shaul from Rehoboth on the river
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly the Euphrates
    marker-yv: yv-n
  - type: text
    text: ' succeeded him as king.'
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: When Shaul died, Baal-Hanan son of Akbor succeeded him as king.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: When Baal-Hanan died, Hadad succeeded him as king. His city was named Pau,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:50 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Many Hebrew manuscripts, some Septuagint manuscripts, Vulgate and Syriac (see also Gen. 36:39); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Pai
    marker-yv: yv-n
  - type: text
    text: ' and his wife’s name was Mehetabel daughter of Matred, the daughter of Me-Zahab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Hadad also died.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The chiefs of Edom were:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Timna, Alvah, Jetheth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Oholibamah, Elah, Pinon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Kenaz, Teman, Mibzar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Magdiel and Iram. These were the chiefs of Edom.
