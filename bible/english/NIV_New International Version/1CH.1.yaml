      text: Pathrusites, Kasluhites (from whom the Philistines came) and Caphtorites.
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Canaan was the father of
  - type: usfm
    marker: li2
    children:
    - type: text
