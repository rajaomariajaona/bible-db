document_id: 1CH.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Historical Records From Adam to Abraham
  - type: heading
    content: To Noah’s Sons
  - type: text
    content: 'Adam, Seth, Enosh, '
  '10':
  - type: text
    content: Cush was the father
  - type: note
    content: Father may mean ancestor or predecessor or founder; also in verses 11, 13, 18 and 20.
  - type: text
    content: ' of'
  - type: text
    content: Nimrod, who became a mighty warrior on earth.
  '11':
  - type: text
    content: Egypt was the father of
  - type: text
    content: 'the Ludites, Anamites, Lehabites, Naphtuhites, '
  '12':
  - type: text
    content: Pathrusites, Kasluhites (from whom the Philistines came) and Caphtorites.
  '13':
  - type: text
    content: Canaan was the father of
  - type: text
    content: Sidon his firstborn,
  - type: note
    content: Or of the Sidonians, the foremost
  - type: text
    content: ' and of the Hittites, '
  '14':
  - type: text
    content: 'Jebusites, Amorites, Girgashites, '
  '15':
  - type: text
    content: 'Hivites, Arkites, Sinites, '
  '16':
  - type: text
    content: Arvadites, Zemarites and Hamathites.
  - type: heading
    content: The Semites
  '17':
  - type: text
    content: 'The sons of Shem:'
  - type: text
    content: Elam, Ashur, Arphaxad, Lud and Aram.
  - type: text
    content: 'The sons of Aram:'
  - type: note
    content: One Hebrew manuscript and some Septuagint manuscripts (see also Gen. 10:23); most Hebrew manuscripts do not have this line.
  - type: text
    content: Uz, Hul, Gether and Meshek.
  '18':
  - type: text
    content: Arphaxad was the father of Shelah,
  - type: text
    content: and Shelah the father of Eber.
  '19':
  - type: text
    content: 'Two sons were born to Eber:'
  - type: text
    content: One was named Peleg,
  - type: note
    content: Peleg means division.
  - type: text
    content: ' because in his time the earth was divided; his brother was named Joktan.'
  '2':
  - type: text
    content: 'Kenan, Mahalalel, Jared, '
  '20':
  - type: text
    content: Joktan was the father of
  - type: text
    content: 'Almodad, Sheleph, Hazarmaveth, Jerah, '
  '21':
  - type: text
    content: 'Hadoram, Uzal, Diklah, '
  '22':
  - type: text
    content: Obal,
  - type: note
    content: Some Hebrew manuscripts and Syriac (see also Gen. 10:28); most Hebrew manuscripts Ebal
  - type: text
    content: ' Abimael, Sheba, '
  '23':
  - type: text
    content: Ophir, Havilah and Jobab. All these were sons of Joktan.
  '24':
  - type: text
    content: Shem, Arphaxad,
  - type: note
    content: Hebrew; some Septuagint manuscripts Arphaxad, Cainan (see also note at Gen. 11:10)
  - type: text
    content: ' Shelah,'
  '25':
  - type: text
    content: Eber, Peleg, Reu,
  '26':
  - type: text
    content: Serug, Nahor, Terah
  '27':
  - type: text
    content: and Abram (that is, Abraham).
  - type: heading
    content: The Family of Abraham
  '28':
  - type: text
    content: 'The sons of Abraham:'
  - type: text
    content: Isaac and Ishmael.
  - type: heading
    content: Descendants of Hagar
  '29':
  - type: text
    content: 'These were their descendants:'
  - type: text
    content: 'Nebaioth the firstborn of Ishmael, Kedar, Adbeel, Mibsam, '
  '3':
  - type: text
    content: Enoch, Methuselah, Lamech, Noah.
  '30':
  - type: text
    content: 'Mishma, Dumah, Massa, Hadad, Tema, '
  '31':
  - type: text
    content: Jetur, Naphish and Kedemah. These were the sons of Ishmael.
  - type: heading
    content: Descendants of Keturah
  '32':
  - type: text
    content: 'The sons born to Keturah, Abraham’s concubine:'
  - type: text
    content: Zimran, Jokshan, Medan, Midian, Ishbak and Shuah.
  - type: text
    content: 'The sons of Jokshan:'
  - type: text
    content: Sheba and Dedan.
  '33':
  - type: text
    content: 'The sons of Midian:'
  - type: text
    content: Ephah, Epher, Hanok, Abida and Eldaah.
  - type: text
    content: All these were descendants of Keturah.
  - type: heading
    content: Descendants of Sarah
  '34':
  - type: text
    content: Abraham was the father of Isaac.
  - type: text
    content: 'The sons of Isaac:'
  - type: text
    content: Esau and Israel.
  - type: heading
    content: Esau’s Sons
  '35':
  - type: text
    content: 'The sons of Esau:'
  - type: text
    content: Eliphaz, Reuel, Jeush, Jalam and Korah.
  '36':
  - type: text
    content: 'The sons of Eliphaz:'
  - type: text
    content: Teman, Omar, Zepho,
  - type: note
    content: Many Hebrew manuscripts, some Septuagint manuscripts and Syriac (see also Gen. 36:11); most Hebrew manuscripts Zephi
  - type: text
    content: ' Gatam and Kenaz;'
  - type: text
    content: 'by Timna: Amalek.'
  - type: note
    content: Some Septuagint manuscripts (see also Gen. 36:12); Hebrew Gatam, Kenaz, Timna and Amalek
  '37':
  - type: text
    content: 'The sons of Reuel:'
  - type: text
    content: Nahath, Zerah, Shammah and Mizzah.
  - type: heading
    content: The People of Seir in Edom
  '38':
  - type: text
    content: 'The sons of Seir:'
  - type: text
    content: Lotan, Shobal, Zibeon, Anah, Dishon, Ezer and Dishan.
  '39':
  - type: text
    content: 'The sons of Lotan:'
  - type: text
    content: Hori and Homam. Timna was Lotan’s sister.
  '4':
  - type: text
    content: 'The sons of Noah:'
  - type: note
    content: Septuagint; Hebrew does not have this line.
  - type: text
    content: Shem, Ham and Japheth.
  - type: heading
    content: The Japhethites
  '40':
  - type: text
    content: 'The sons of Shobal:'
  - type: text
    content: Alvan,
  - type: note
    content: Many Hebrew manuscripts and some Septuagint manuscripts (see also Gen. 36:23); most Hebrew manuscripts Alian
  - type: text
    content: ' Manahath, Ebal, Shepho and Onam.'
  - type: text
    content: 'The sons of Zibeon:'
  - type: text
    content: Aiah and Anah.
  '41':
  - type: text
    content: 'The son of Anah:'
  - type: text
    content: Dishon.
  - type: text
    content: 'The sons of Dishon:'
  - type: text
    content: Hemdan,
  - type: note
    content: Many Hebrew manuscripts and some Septuagint manuscripts (see also Gen. 36:26); most Hebrew manuscripts Hamran
  - type: text
    content: ' Eshban, Ithran and Keran.'
  '42':
  - type: text
    content: 'The sons of Ezer:'
  - type: text
    content: Bilhan, Zaavan and Akan.
  - type: note
    content: Many Hebrew and Septuagint manuscripts (see also Gen. 36:27); most Hebrew manuscripts Zaavan, Jaakan
  - type: text
    content: The sons of Dishan
  - type: note
    content: See Gen. 36:28; Hebrew Dishon, a variant of Dishan
  - type: text
    content: ':'
  - type: text
    content: Uz and Aran.
  - type: heading
    content: The Rulers of Edom
  '43':
  - type: text
    content: 'These were the kings who reigned in Edom before any Israelite king reigned:'
  - type: text
    content: Bela son of Beor, whose city was named Dinhabah.
  '44':
  - type: text
    content: When Bela died, Jobab son of Zerah from Bozrah succeeded him as king.
  '45':
  - type: text
    content: When Jobab died, Husham from the land of the Temanites succeeded him as king.
  '46':
  - type: text
    content: When Husham died, Hadad son of Bedad, who defeated Midian in the country of Moab, succeeded him as king. His city was named Avith.
  '47':
  - type: text
    content: When Hadad died, Samlah from Masrekah succeeded him as king.
  '48':
  - type: text
    content: When Samlah died, Shaul from Rehoboth on the river
  - type: note
    content: Possibly the Euphrates
  - type: text
    content: ' succeeded him as king.'
  '49':
  - type: text
    content: When Shaul died, Baal-Hanan son of Akbor succeeded him as king.
  '5':
  - type: text
    content: The sons
  - type: note
    content: Sons may mean descendants or successors or nations; also in verses 6-9, 17 and 23.
  - type: text
    content: ' of Japheth:'
  - type: text
    content: Gomer, Magog, Madai, Javan, Tubal, Meshek and Tiras.
  '50':
  - type: text
    content: When Baal-Hanan died, Hadad succeeded him as king. His city was named Pau,
  - type: note
    content: Many Hebrew manuscripts, some Septuagint manuscripts, Vulgate and Syriac (see also Gen. 36:39); most Hebrew manuscripts Pai
  - type: text
    content: ' and his wife’s name was Mehetabel daughter of Matred, the daughter of Me-Zahab. '
  '51':
  - type: text
    content: Hadad also died.
  - type: text
    content: 'The chiefs of Edom were:'
  - type: text
    content: 'Timna, Alvah, Jetheth, '
  '52':
  - type: text
    content: 'Oholibamah, Elah, Pinon, '
  '53':
  - type: text
    content: 'Kenaz, Teman, Mibzar, '
  '54':
  - type: text
    content: Magdiel and Iram. These were the chiefs of Edom.
  '6':
  - type: text
    content: 'The sons of Gomer:'
  - type: text
    content: Ashkenaz, Riphath
  - type: note
    content: Many Hebrew manuscripts and Vulgate (see also Septuagint and Gen. 10:3); most Hebrew manuscripts Diphath
  - type: text
    content: ' and Togarmah.'
  '7':
  - type: text
    content: 'The sons of Javan:'
  - type: text
    content: Elishah, Tarshish, the Kittites and the Rodanites.
  - type: heading
    content: The Hamites
  '8':
  - type: text
    content: 'The sons of Ham:'
  - type: text
    content: Cush, Egypt, Put and Canaan.
  '9':
  - type: text
    content: 'The sons of Cush:'
  - type: text
    content: Seba, Havilah, Sabta, Raamah and Sabteka.
  - type: text
    content: 'The sons of Raamah:'
  - type: text
    content: Sheba and Dedan.
