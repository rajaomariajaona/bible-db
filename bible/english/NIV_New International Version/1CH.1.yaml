        children:
        - type: text
          text: of the Sidonians, the foremost
      marker-yv: yv-n
    - type: text
      text: ' and of the Hittites, '
  '14':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Jebusites, Amorites, Girgashites, '
  '15':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Hivites, Arkites, Sinites, '
  '16':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Arvadites, Zemarites and Hamathites.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Semites
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Shem:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Elam, Ashur, Arphaxad, Lud and Aram.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Aram:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One Hebrew manuscript and some Septuagint manuscripts (see also Gen. 10:23); most Hebrew manuscripts do not have this line.
      marker-yv: yv-n
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Uz, Hul, Gether and Meshek.
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Arphaxad was the father of Shelah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Shelah the father of Eber.
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Two sons were born to Eber:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: One was named Peleg,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Peleg '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: division.
      marker-yv: yv-n
    - type: text
      text: ' because in his time the earth was divided; his brother was named Joktan.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kenan, Mahalalel, Jared, '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Joktan was the father of
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Almodad, Sheleph, Hazarmaveth, Jerah, '
  '21':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Hadoram, Uzal, Diklah, '
  '22':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Obal,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew manuscripts and Syriac (see also Gen. 10:28); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ebal
      marker-yv: yv-n
    - type: text
      text: ' Abimael, Sheba, '
  '23':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ophir, Havilah and Jobab. All these were sons of Joktan.
  '24':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shem, Arphaxad,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; some Septuagint manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Arphaxad, Cainan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see also note at Gen. 11:10)
      marker-yv: yv-n
    - type: text
      text: ' Shelah,'
  '25':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eber, Peleg, Reu,
  '26':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Serug, Nahor, Terah
  '27':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Abram (that is, Abraham).
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Family of Abraham
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Abraham:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Isaac and Ishmael.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Descendants of Hagar
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These were their descendants:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Nebaioth the firstborn of Ishmael, Kedar, Adbeel, Mibsam, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enoch, Methuselah, Lamech, Noah.
  '30':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Mishma, Dumah, Massa, Hadad, Tema, '
  '31':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jetur, Naphish and Kedemah. These were the sons of Ishmael.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Descendants of Keturah
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons born to Keturah, Abraham’s concubine:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zimran, Jokshan, Medan, Midian, Ishbak and Shuah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Jokshan:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Sheba and Dedan.
  '33':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Midian:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ephah, Epher, Hanok, Abida and Eldaah.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: All these were descendants of Keturah.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Descendants of Sarah
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Abraham was the father of Isaac.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Isaac:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Esau and Israel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esau’s Sons
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Esau:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliphaz, Reuel, Jeush, Jalam and Korah.
  '36':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Eliphaz:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Teman, Omar, Zepho,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts, some Septuagint manuscripts and Syriac (see also Gen. 36:11); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zephi
      marker-yv: yv-n
    - type: text
      text: ' Gatam and Kenaz;'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'by Timna: Amalek.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also Gen. 36:12); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gatam, Kenaz, Timna and Amalek
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Reuel:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Nahath, Zerah, Shammah and Mizzah.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The People of Seir in Edom
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Seir:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Lotan, Shobal, Zibeon, Anah, Dishon, Ezer and Dishan.
  '39':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Lotan:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hori and Homam. Timna was Lotan’s sister.
  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Noah:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Septuagint; Hebrew does not have this line.
      marker-yv: yv-n
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shem, Ham and Japheth.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Japhethites
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Shobal:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Alvan,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts and some Septuagint manuscripts (see also Gen. 36:23); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Alian
      marker-yv: yv-n
    - type: text
      text: ' Manahath, Ebal, Shepho and Onam.'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Zibeon:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Aiah and Anah.
  '41':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The son of Anah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Dishon.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Dishon:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hemdan,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts and some Septuagint manuscripts (see also Gen. 36:26); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hamran
      marker-yv: yv-n
    - type: text
      text: ' Eshban, Ithran and Keran.'
  '42':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Ezer:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Bilhan, Zaavan and Akan.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew and Septuagint manuscripts (see also Gen. 36:27); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zaavan, Jaakan
      marker-yv: yv-n
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons of Dishan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Gen. 36:28; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dishon, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dishan
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Uz and Aran.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Rulers of Edom
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These were the kings who reigned in Edom before any Israelite king reigned:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Bela son of Beor, whose city was named Dinhabah.
  '44':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: When Bela died, Jobab son of Zerah from Bozrah succeeded him as king.
  '45':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: When Jobab died, Husham from the land of the Temanites succeeded him as king.
  '46':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: When Husham died, Hadad son of Bedad, who defeated Midian in the country of Moab, succeeded him as king. His city was named Avith.
  '47':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: When Hadad died, Samlah from Masrekah succeeded him as king.
  '48':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: When Samlah died, Shaul from Rehoboth on the river
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possibly the Euphrates
      marker-yv: yv-n
    - type: text
      text: ' succeeded him as king.'
  '49':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: When Shaul died, Baal-Hanan son of Akbor succeeded him as king.
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: The sons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'may mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'descendants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'successors '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 6-9, 17 and 23.
      marker-yv: yv-n
    - type: text
      text: ' of Japheth:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Gomer, Magog, Madai, Javan, Tubal, Meshek and Tiras.
  '50':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: When Baal-Hanan died, Hadad succeeded him as king. His city was named Pau,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts, some Septuagint manuscripts, Vulgate and Syriac (see also Gen. 36:39); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Pai
      marker-yv: yv-n
    - type: text
      text: ' and his wife’s name was Mehetabel daughter of Matred, the daughter of Me-Zahab. '
  '51':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hadad also died.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The chiefs of Edom were:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Timna, Alvah, Jetheth, '
  '52':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Oholibamah, Elah, Pinon, '
  '53':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Kenaz, Teman, Mibzar, '
  '54':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Magdiel and Iram. These were the chiefs of Edom.
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Gomer:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ashkenaz, Riphath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts and Vulgate (see also Septuagint and Gen. 10:3); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Diphath
      marker-yv: yv-n
    - type: text
      text: ' and Togarmah.'
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Javan:'
  - type: usfm
    marker: li2
    children:
