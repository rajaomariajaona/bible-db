document_id: ACT.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Through Macedonia and Greece
  - type: text
    content: 'When the uproar had ended, Paul sent for the disciples and, after encouraging them, said goodbye and set out for Macedonia. '
  '10':
  - type: text
    content: 'Paul went down, threw himself on the young man and put his arms around him. “Don’t be alarmed,” he said. “He’s alive!” '
  '11':
  - type: text
    content: 'Then he went upstairs again and broke bread and ate. After talking until daylight, he left. '
  '12':
  - type: text
    content: The people took the young man home alive and were greatly comforted.
  - type: heading
    content: Paul’s Farewell to the Ephesian Elders
  '13':
  - type: text
    content: 'We went on ahead to the ship and sailed for Assos, where we were going to take Paul aboard. He had made this arrangement because he was going there on foot. '
  '14':
  - type: text
    content: 'When he met us at Assos, we took him aboard and went on to Mitylene. '
  '15':
  - type: text
    content: 'The next day we set sail from there and arrived off Chios. The day after that we crossed over to Samos, and on the following day arrived at Miletus. '
  '16':
  - type: text
    content: Paul had decided to sail past Ephesus to avoid spending time in the province of Asia, for he was in a hurry to reach Jerusalem, if possible, by the day of Pentecost.
  '17':
  - type: text
    content: 'From Miletus, Paul sent to Ephesus for the elders of the church. '
  '18':
  - type: text
    content: 'When they arrived, he said to them: “You know how I lived the whole time I was with you, from the first day I came into the province of Asia. '
  '19':
  - type: text
    content: 'I served the Lord with great humility and with tears and in the midst of severe testing by the plots of my Jewish opponents. '
  '2':
  - type: text
    content: 'He traveled through that area, speaking many words of encouragement to the people, and finally arrived in Greece, '
  '20':
  - type: text
    content: 'You know that I have not hesitated to preach anything that would be helpful to you but have taught you publicly and from house to house. '
  '21':
  - type: text
    content: I have declared to both Jews and Greeks that they must turn to God in repentance and have faith in our Lord Jesus.
  '22':
  - type: text
    content: '“And now, compelled by the Spirit, I am going to Jerusalem, not knowing what will happen to me there. '
  '23':
  - type: text
    content: 'I only know that in every city the Holy Spirit warns me that prison and hardships are facing me. '
  '24':
  - type: text
    content: However, I consider my life worth nothing to me; my only aim is to finish the race and complete the task the Lord Jesus has given me—the task of testifying to the good news of God’s grace.
  '25':
  - type: text
    content: '“Now I know that none of you among whom I have gone about preaching the kingdom will ever see me again. '
  '26':
  - type: text
    content: 'Therefore, I declare to you today that I am innocent of the blood of any of you. '
  '27':
  - type: text
    content: 'For I have not hesitated to proclaim to you the whole will of God. '
  '28':
  - type: text
    content: Keep watch over yourselves and all the flock of which the Holy Spirit has made you overseers. Be shepherds of the church of God,
  - type: note
    content: Many manuscripts of the Lord
  - type: text
    content: ' which he bought with his own blood.'
  - type: note
    content: Or with the blood of his own Son.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'I know that after I leave, savage wolves will come in among you and will not spare the flock. '
  '3':
  - type: text
    content: 'where he stayed three months. Because some Jews had plotted against him just as he was about to sail for Syria, he decided to go back through Macedonia. '
  '30':
  - type: text
    content: 'Even from your own number men will arise and distort the truth in order to draw away disciples after them. '
  '31':
  - type: text
    content: So be on your guard! Remember that for three years I never stopped warning each of you night and day with tears.
  '32':
  - type: text
    content: '“Now I commit you to God and to the word of his grace, which can build you up and give you an inheritance among all those who are sanctified. '
  '33':
  - type: text
    content: 'I have not coveted anyone’s silver or gold or clothing. '
  '34':
  - type: text
    content: 'You yourselves know that these hands of mine have supplied my own needs and the needs of my companions. '
  '35':
  - type: text
    content: 'In everything I did, I showed you that by this kind of hard work we must help the weak, remembering the words the Lord Jesus himself said: '
  - type: text
    content: ‘It is more blessed to give than to receive.’
  - type: text
    content: ' ”'
  '36':
  - type: text
    content: 'When Paul had finished speaking, he knelt down with all of them and prayed. '
  '37':
  - type: text
    content: 'They all wept as they embraced him and kissed him. '
  '38':
  - type: text
    content: What grieved them most was his statement that they would never see his face again. Then they accompanied him to the ship.
  '4':
  - type: text
    content: 'He was accompanied by Sopater son of Pyrrhus from Berea, Aristarchus and Secundus from Thessalonica, Gaius from Derbe, Timothy also, and Tychicus and Trophimus from the province of Asia. '
  '5':
  - type: text
    content: 'These men went on ahead and waited for us at Troas. '
  '6':
  - type: text
    content: But we sailed from Philippi after the Festival of Unleavened Bread, and five days later joined the others at Troas, where we stayed seven days.
  - type: heading
    content: Eutychus Raised From the Dead at Troas
  '7':
  - type: text
    content: 'On the first day of the week we came together to break bread. Paul spoke to the people and, because he intended to leave the next day, kept on talking until midnight. '
  '8':
  - type: text
    content: 'There were many lamps in the upstairs room where we were meeting. '
  '9':
  - type: text
    content: 'Seated in a window was a young man named Eutychus, who was sinking into a deep sleep as Paul talked on and on. When he was sound asleep, he fell to the ground from the third story and was picked up dead. '
