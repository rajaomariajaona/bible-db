document_id: ACT.20,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Through Macedonia and Greece
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the uproar had ended, Paul sent for the disciples and, after encouraging them, said goodbye and set out for Macedonia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul went down, threw himself on the young man and put his arms around him. “Don’t be alarmed,” he said. “He’s alive!” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he went upstairs again and broke bread and ate. After talking until daylight, he left. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people took the young man home alive and were greatly comforted.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Farewell to the Ephesian Elders
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We went on ahead to the ship and sailed for Assos, where we were going to take Paul aboard. He had made this arrangement because he was going there on foot. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he met us at Assos, we took him aboard and went on to Mitylene. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day we set sail from there and arrived off Chios. The day after that we crossed over to Samos, and on the following day arrived at Miletus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul had decided to sail past Ephesus to avoid spending time in the province of Asia, for he was in a hurry to reach Jerusalem, if possible, by the day of Pentecost.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From Miletus, Paul sent to Ephesus for the elders of the church. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they arrived, he said to them: “You know how I lived the whole time I was with you, from the first day I came into the province of Asia. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I served the Lord with great humility and with tears and in the midst of severe testing by the plots of my Jewish opponents. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He traveled through that area, speaking many words of encouragement to the people, and finally arrived in Greece, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You know that I have not hesitated to preach anything that would be helpful to you but have taught you publicly and from house to house. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I have declared to both Jews and Greeks that they must turn to God in repentance and have faith in our Lord Jesus.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And now, compelled by the Spirit, I am going to Jerusalem, not knowing what will happen to me there. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I only know that in every city the Holy Spirit warns me that prison and hardships are facing me. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, I consider my life worth nothing to me; my only aim is to finish the race and complete the task the Lord Jesus has given me—the task of testifying to the good news of God’s grace.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now I know that none of you among whom I have gone about preaching the kingdom will ever see me again. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, I declare to you today that I am innocent of the blood of any of you. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have not hesitated to proclaim to you the whole will of God. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Keep watch over yourselves and all the flock of which the Holy Spirit has made you overseers. Be shepherds of the church of God,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of the Lord
      marker-yv: yv-n
    - type: text
      text: ' which he bought with his own blood.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: with the blood of his own Son.
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I know that after I leave, savage wolves will come in among you and will not spare the flock. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'where he stayed three months. Because some Jews had plotted against him just as he was about to sail for Syria, he decided to go back through Macedonia. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even from your own number men will arise and distort the truth in order to draw away disciples after them. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So be on your guard! Remember that for three years I never stopped warning each of you night and day with tears.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now I commit you to God and to the word of his grace, which can build you up and give you an inheritance among all those who are sanctified. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have not coveted anyone’s silver or gold or clothing. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You yourselves know that these hands of mine have supplied my own needs and the needs of my companions. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In everything I did, I showed you that by this kind of hard work we must help the weak, remembering the words the Lord Jesus himself said: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘It is more blessed to give than to receive.’
    - type: text
      text: ' ”'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Paul had finished speaking, he knelt down with all of them and prayed. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They all wept as they embraced him and kissed him. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What grieved them most was his statement that they would never see his face again. Then they accompanied him to the ship.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was accompanied by Sopater son of Pyrrhus from Berea, Aristarchus and Secundus from Thessalonica, Gaius from Derbe, Timothy also, and Tychicus and Trophimus from the province of Asia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These men went on ahead and waited for us at Troas. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But we sailed from Philippi after the Festival of Unleavened Bread, and five days later joined the others at Troas, where we stayed seven days.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eutychus Raised From the Dead at Troas
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the first day of the week we came together to break bread. Paul spoke to the people and, because he intended to leave the next day, kept on talking until midnight. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were many lamps in the upstairs room where we were meeting. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seated in a window was a young man named Eutychus, who was sinking into a deep sleep as Paul talked on and on. When he was sound asleep, he fell to the ground from the third story and was picked up dead. '
