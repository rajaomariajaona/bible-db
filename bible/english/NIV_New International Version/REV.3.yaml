verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Church in Sardis
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “To the angel
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: messenger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 7 and 14
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'of the church in Sardis write:'
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These are the words of him who holds the seven spirits
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the sevenfold Spirit
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: of God and the seven stars. I know your deeds; you have a reputation of being alive, but you are dead.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Since you have kept my command to endure patiently, I will also keep you from the hour of trial that is going to come on the whole world to test the inhabitants of the earth.
  '11':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I am coming soon. Hold on to what you have, so that no one will take your crown.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The one who is victorious I will make a pillar in the temple of my God. Never again will they leave it. I will write on them the name of my God and the name of the city of my God, the new Jerusalem, which is coming down out of heaven from my God; and I will also write on them my new name.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever has ears, let them hear what the Spirit says to the churches.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Church in Laodicea
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“To the angel of the church in Laodicea write:'
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These are the words of the Amen, the faithful and true witness, the ruler of God’s creation.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know your deeds, that you are neither cold nor hot. I wish you were either one or the other!
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So, because you are lukewarm—neither hot nor cold—I am about to spit you out of my mouth.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You say, ‘I am rich; I have acquired wealth and do not need a thing.’ But you do not realize that you are wretched, pitiful, poor, blind and naked.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I counsel you to buy from me gold refined in the fire, so you can become rich; and white clothes to wear, so you can cover your shameful nakedness; and salve to put on your eyes, so you can see.
  '19':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Those whom I love I rebuke and discipline. So be earnest and repent.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Wake up! Strengthen what remains and is about to die, for I have found your deeds unfinished in the sight of my God.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Here I am! I stand at the door and knock. If anyone hears my voice and opens the door, I will come in and eat with that person, and they with me.
  '21':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: To the one who is victorious, I will give the right to sit with me on my throne, just as I was victorious and sat down with my Father on his throne.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever has ears, let them hear what the Spirit says to the churches.”
  '3':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Remember, therefore, what you have received and heard; hold it fast, and repent. But if you do not wake up, I will come like a thief, and you will not know at what time I will come to you.
  '4':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yet you have a few people in Sardis who have not soiled their clothes. They will walk with me, dressed in white, for they are worthy.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The one who is victorious will, like them, be dressed in white. I will never blot out the name of that person from the book of life, but will acknowledge that name before my Father and his angels.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever has ears, let them hear what the Spirit says to the churches.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Church in Philadelphia
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“To the angel of the church in Philadelphia write:'
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These are the words of him who is holy and true, who holds the key of David. What he opens no one can shut, and what he shuts no one can open.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know your deeds. See, I have placed before you an open door that no one can shut. I know that you have little strength, yet you have kept my word and have not denied my name.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will make those who are of the synagogue of Satan, who claim to be Jews though they are not, but are liars—I will make them come and fall down at your feet and acknowledge that I have loved you.
    - type: text
      text: ' '
