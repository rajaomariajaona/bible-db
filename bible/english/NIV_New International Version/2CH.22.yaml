document_id: 2CH.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Ahaziah King of Judah
  - type: text
    content: The people of Jerusalem made Ahaziah, Jehoram’s youngest son, king in his place, since the raiders, who came with the Arabs into the camp, had killed all the older sons. So Ahaziah son of Jehoram king of Judah began to reign.
  '10':
  - type: text
    content: 'When Athaliah the mother of Ahaziah saw that her son was dead, she proceeded to destroy the whole royal family of the house of Judah. '
  '11':
  - type: text
    content: But Jehosheba,
  - type: note
    content: Hebrew Jehoshabeath, a variant of Jehosheba
  - type: text
    content: ' the daughter of King Jehoram, took Joash son of Ahaziah and stole him away from among the royal princes who were about to be murdered and put him and his nurse in a bedroom. Because Jehosheba,'
  - type: note
    content: Hebrew Jehoshabeath, a variant of Jehosheba
  - type: text
    content: ' the daughter of King Jehoram and wife of the priest Jehoiada, was Ahaziah’s sister, she hid the child from Athaliah so she could not kill him. '
  '12':
  - type: text
    content: He remained hidden with them at the temple of God for six years while Athaliah ruled the land.
  '2':
  - type: text
    content: Ahaziah was twenty-two
  - type: note
    content: Some Septuagint manuscripts and Syriac (see also 2 Kings 8:26); Hebrew forty-two
  - type: text
    content: ' years old when he became king, and he reigned in Jerusalem one year. His mother’s name was Athaliah, a granddaughter of Omri.'
  '3':
  - type: text
    content: 'He too followed the ways of the house of Ahab, for his mother encouraged him to act wickedly. '
  '4':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', as the house of Ahab had done, for after his father’s death they became his advisers, to his undoing. '
  '5':
  - type: text
    content: He also followed their counsel when he went with Joram
  - type: note
    content: Hebrew Jehoram, a variant of Joram; also in verses 6 and 7
  - type: text
    content: ' son of Ahab king of Israel to wage war against Hazael king of Aram at Ramoth Gilead. The Arameans wounded Joram; '
  '6':
  - type: text
    content: so he returned to Jezreel to recover from the wounds they had inflicted on him at Ramoth
  - type: note
    content: Hebrew Ramah, a variant of Ramoth
  - type: text
    content: ' in his battle with Hazael king of Aram.'
  - type: text
    content: Then Ahaziah
  - type: note
    content: Some Hebrew manuscripts, Septuagint, Vulgate and Syriac (see also 2 Kings 8:29); most Hebrew manuscripts Azariah
  - type: text
    content: ' son of Jehoram king of Judah went down to Jezreel to see Joram son of Ahab because he had been wounded.'
  '7':
  - type: text
    content: 'Through Ahaziah’s visit to Joram, God brought about Ahaziah’s downfall. When Ahaziah arrived, he went out with Joram to meet Jehu son of Nimshi, whom the '
  - type: text
    content: Lord
  - type: text
    content: ' had anointed to destroy the house of Ahab. '
  '8':
  - type: text
    content: 'While Jehu was executing judgment on the house of Ahab, he found the officials of Judah and the sons of Ahaziah’s relatives, who had been attending Ahaziah, and he killed them. '
  '9':
  - type: text
    content: 'He then went in search of Ahaziah, and his men captured him while he was hiding in Samaria. He was brought to Jehu and put to death. They buried him, for they said, “He was a son of Jehoshaphat, who sought the '
  - type: text
    content: Lord
  - type: text
    content: ' with all his heart.” So there was no one in the house of Ahaziah powerful enough to retain the kingdom.'
  - type: heading
    content: Athaliah and Joash
