document_id: 2CH.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahaziah King of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The people of Jerusalem made Ahaziah, Jehoram’s youngest son, king in his place, since the raiders, who came with the Arabs into the camp, had killed all the older sons. So Ahaziah son of Jehoram king of Judah began to reign.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ahaziah was twenty-two
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts and Syriac (see also 2 Kings 8:26); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: forty-two
    marker-yv: yv-n
  - type: text
    text: ' years old when he became king, and he reigned in Jerusalem one year. His mother’s name was Athaliah, a granddaughter of Omri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He too followed the ways of the house of Ahab, for his mother encouraged him to act wickedly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He did evil in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as the house of Ahab had done, for after his father’s death they became his advisers, to his undoing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He also followed their counsel when he went with Joram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jehoram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 6 and 7
    marker-yv: yv-n
  - type: text
    text: ' son of Ahab king of Israel to wage war against Hazael king of Aram at Ramoth Gilead. The Arameans wounded Joram; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: so he returned to Jezreel to recover from the wounds they had inflicted on him at Ramoth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ramah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ramoth
    marker-yv: yv-n
  - type: text
    text: ' in his battle with Hazael king of Aram.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Then Ahaziah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts, Septuagint, Vulgate and Syriac (see also 2 Kings 8:29); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Azariah
    marker-yv: yv-n
  - type: text
    text: ' son of Jehoram king of Judah went down to Jezreel to see Joram son of Ahab because he had been wounded.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Through Ahaziah’s visit to Joram, God brought about Ahaziah’s downfall. When Ahaziah arrived, he went out with Joram to meet Jehu son of Nimshi, whom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had anointed to destroy the house of Ahab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'While Jehu was executing judgment on the house of Ahab, he found the officials of Judah and the sons of Ahaziah’s relatives, who had been attending Ahaziah, and he killed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He then went in search of Ahaziah, and his men captured him while he was hiding in Samaria. He was brought to Jehu and put to death. They buried him, for they said, “He was a son of Jehoshaphat, who sought the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with all his heart.” So there was no one in the house of Ahaziah powerful enough to retain the kingdom.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Athaliah and Joash
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When Athaliah the mother of Ahaziah saw that her son was dead, she proceeded to destroy the whole royal family of the house of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But Jehosheba,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jehoshabeath, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jehosheba
    marker-yv: yv-n
  - type: text
    text: ' the daughter of King Jehoram, took Joash son of Ahaziah and stole him away from among the royal princes who were about to be murdered and put him and his nurse in a bedroom. Because Jehosheba,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jehoshabeath, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jehosheba
    marker-yv: yv-n
  - type: text
    text: ' the daughter of King Jehoram and wife of the priest Jehoiada, was Ahaziah’s sister, she hid the child from Athaliah so she could not kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He remained hidden with them at the temple of God for six years while Athaliah ruled the land.
