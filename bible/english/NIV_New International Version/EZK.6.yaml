document_id: EZK.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Doom for the Mountains of Israel
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'And they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ; I did not threaten in vain to bring this calamity on them.
  '11':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Strike your hands together and stamp your feet and cry out “Alas!” because of all the wicked and detestable practices of the people of Israel, for they will fall by the sword, famine and plague. '
  '12':
  - type: text
    content: 'One who is far away will die of the plague, and one who is near will fall by the sword, and anyone who survives and is spared will die of famine. So will I pour out my wrath on them. '
  '13':
  - type: text
    content: 'And they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when their people lie slain among their idols around their altars, on every high hill and on all the mountaintops, under every spreading tree and every leafy oak—places where they offered fragrant incense to all their idols. '
  '14':
  - type: text
    content: And I will stretch out my hand against them and make the land a desolate waste from the desert to Diblah
  - type: note
    content: Most Hebrew manuscripts; a few Hebrew manuscripts Riblah
  - type: text
    content: '—wherever they live. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '2':
  - type: text
    content: '“Son of man, set your face against the mountains of Israel; prophesy against them '
  '3':
  - type: text
    content: 'and say: ‘You mountains of Israel, hear the word of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to the mountains and hills, to the ravines and valleys: I am about to bring a sword against you, and I will destroy your high places. '
  '4':
  - type: text
    content: 'Your altars will be demolished and your incense altars will be smashed; and I will slay your people in front of your idols. '
  '5':
  - type: text
    content: 'I will lay the dead bodies of the Israelites in front of their idols, and I will scatter your bones around your altars. '
  '6':
  - type: text
    content: 'Wherever you live, the towns will be laid waste and the high places demolished, so that your altars will be laid waste and devastated, your idols smashed and ruined, your incense altars broken down, and what you have made wiped out. '
  '7':
  - type: text
    content: 'Your people will fall slain among you, and you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: '“ ‘But I will spare some, for some of you will escape the sword when you are scattered among the lands and nations. '
  '9':
  - type: text
    content: 'Then in the nations where they have been carried captive, those who escape will remember me—how I have been grieved by their adulterous hearts, which have turned away from me, and by their eyes, which have lusted after their idols. They will loathe themselves for the evil they have done and for all their detestable practices. '
