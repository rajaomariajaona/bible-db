document_id: EZK.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Doom for the Mountains of Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, set your face against the mountains of Israel; prophesy against them '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and say: ‘You mountains of Israel, hear the word of the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says to the mountains and hills, to the ravines and valleys: I am about to bring a sword against you, and I will destroy your high places. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Your altars will be demolished and your incense altars will be smashed; and I will slay your people in front of your idols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I will lay the dead bodies of the Israelites in front of their idols, and I will scatter your bones around your altars. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Wherever you live, the towns will be laid waste and the high places demolished, so that your altars will be laid waste and devastated, your idols smashed and ruined, your incense altars broken down, and what you have made wiped out. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Your people will fall slain among you, and you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“ ‘But I will spare some, for some of you will escape the sword when you are scattered among the lands and nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then in the nations where they have been carried captive, those who escape will remember me—how I have been grieved by their adulterous hearts, which have turned away from me, and by their eyes, which have lusted after their idols. They will loathe themselves for the evil they have done and for all their detestable practices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ; I did not threaten in vain to bring this calamity on them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“ ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Strike your hands together and stamp your feet and cry out “Alas!” because of all the wicked and detestable practices of the people of Israel, for they will fall by the sword, famine and plague. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'One who is far away will die of the plague, and one who is near will fall by the sword, and anyone who survives and is spared will die of famine. So will I pour out my wrath on them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', when their people lie slain among their idols around their altars, on every high hill and on all the mountaintops, under every spreading tree and every leafy oak—places where they offered fragrant incense to all their idols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And I will stretch out my hand against them and make the land a desolate waste from the desert to Diblah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Most Hebrew manuscripts; a few Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Riblah
    marker-yv: yv-n
  - type: text
    text: '—wherever they live. Then they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’ ”
