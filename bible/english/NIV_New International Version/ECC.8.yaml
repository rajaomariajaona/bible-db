document_id: ECC.8,111
type_code: eng
verses:
  '1':
  - type: text
    content: Who is like the wise?
  - type: text
    content: Who knows the explanation of things?
  - type: text
    content: A person’s wisdom brightens their face
  - type: text
    content: and changes its hard appearance.
  - type: heading
    content: Obey the King
  '10':
  - type: text
    content: Then too, I saw the wicked buried—those who used to come and go from the holy place and receive praise
  - type: note
    content: Some Hebrew manuscripts and Septuagint (Aquila); most Hebrew manuscripts and are forgotten
  - type: text
    content: ' in the city where they did this. This too is meaningless.'
  '11':
  - type: text
    content: 'When the sentence for a crime is not quickly carried out, people’s hearts are filled with schemes to do wrong. '
  '12':
  - type: text
    content: 'Although a wicked person who commits a hundred crimes may live a long time, I know that it will go better with those who fear God, who are reverent before him. '
  '13':
  - type: text
    content: Yet because the wicked do not fear God, it will not go well with them, and their days will not lengthen like a shadow.
  '14':
  - type: text
    content: 'There is something else meaningless that occurs on earth: the righteous who get what the wicked deserve, and the wicked who get what the righteous deserve. This too, I say, is meaningless. '
  '15':
  - type: text
    content: So I commend the enjoyment of life, because there is nothing better for a person under the sun than to eat and drink and be glad. Then joy will accompany them in their toil all the days of the life God has given them under the sun.
  '16':
  - type: text
    content: 'When I applied my mind to know wisdom and to observe the labor that is done on earth—people getting no sleep day or night— '
  '17':
  - type: text
    content: then I saw all that God has done. No one can comprehend what goes on under the sun. Despite all their efforts to search it out, no one can discover its meaning. Even if the wise claim they know, they cannot really comprehend it.
  '2':
  - type: text
    content: 'Obey the king’s command, I say, because you took an oath before God. '
  '3':
  - type: text
    content: 'Do not be in a hurry to leave the king’s presence. Do not stand up for a bad cause, for he will do whatever he pleases. '
  '4':
  - type: text
    content: Since a king’s word is supreme, who can say to him, “What are you doing?”
  '5':
  - type: text
    content: Whoever obeys his command will come to no harm,
  - type: text
    content: and the wise heart will know the proper time and procedure.
  '6':
  - type: text
    content: For there is a proper time and procedure for every matter,
  - type: text
    content: though a person may be weighed down by misery.
  '7':
  - type: text
    content: Since no one knows the future,
  - type: text
    content: who can tell someone else what is to come?
  '8':
  - type: text
    content: As no one has power over the wind to contain it,
  - type: text
    content: so
  - type: note
    content: Or over the human spirit to retain it, / and so
  - type: text
    content: ' no one has power over the time of their death.'
  - type: text
    content: As no one is discharged in time of war,
  - type: text
    content: so wickedness will not release those who practice it.
  '9':
  - type: text
    content: All this I saw, as I applied my mind to everything done under the sun. There is a time when a man lords it over others to his own
  - type: note
    content: Or to their
  - type: text
    content: ' hurt. '
