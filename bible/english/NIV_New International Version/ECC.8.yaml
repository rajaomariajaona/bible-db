document_id: ECC.8
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Who is like the wise?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who knows the explanation of things?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A person’s wisdom brightens their face
- type: usfm
  marker: q2
  children:
  - type: text
    text: and changes its hard appearance.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Obey the King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Obey the king’s command, I say, because you took an oath before God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Do not be in a hurry to leave the king’s presence. Do not stand up for a bad cause, for he will do whatever he pleases. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Since a king’s word is supreme, who can say to him, “What are you doing?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Whoever obeys his command will come to no harm,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wise heart will know the proper time and procedure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For there is a proper time and procedure for every matter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though a person may be weighed down by misery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Since no one knows the future,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who can tell someone else what is to come?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: As no one has power over the wind to contain it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: over the human spirit to retain it, / and so
    marker-yv: yv-n
  - type: text
    text: ' no one has power over the time of their death.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As no one is discharged in time of war,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so wickedness will not release those who practice it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All this I saw, as I applied my mind to everything done under the sun. There is a time when a man lords it over others to his own
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to their
    marker-yv: yv-n
  - type: text
    text: ' hurt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then too, I saw the wicked buried—those who used to come and go from the holy place and receive praise
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts and Septuagint (Aquila); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and are forgotten
    marker-yv: yv-n
  - type: text
    text: ' in the city where they did this. This too is meaningless.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When the sentence for a crime is not quickly carried out, people’s hearts are filled with schemes to do wrong. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Although a wicked person who commits a hundred crimes may live a long time, I know that it will go better with those who fear God, who are reverent before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Yet because the wicked do not fear God, it will not go well with them, and their days will not lengthen like a shadow.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'There is something else meaningless that occurs on earth: the righteous who get what the wicked deserve, and the wicked who get what the righteous deserve. This too, I say, is meaningless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So I commend the enjoyment of life, because there is nothing better for a person under the sun than to eat and drink and be glad. Then joy will accompany them in their toil all the days of the life God has given them under the sun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When I applied my mind to know wisdom and to observe the labor that is done on earth—people getting no sleep day or night— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: then I saw all that God has done. No one can comprehend what goes on under the sun. Despite all their efforts to search it out, no one can discover its meaning. Even if the wise claim they know, they cannot really comprehend it.
