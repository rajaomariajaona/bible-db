document_id: ISA.38,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah’s Illness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days Hezekiah became ill and was at the point of death. The prophet Isaiah son of Amoz went to him and said, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Put your house in order, because you are going to die; you will not recover.”'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said, “In the prime of my life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: must I go through the gates of death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be robbed of the rest of my years?”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I said, “I will not again see the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' himself'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the land of the living;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no longer will I look on my fellow man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or be with those who now dwell in this world.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a shepherd’s tent my house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has been pulled down and taken from me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a weaver I have rolled up my life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he has cut me off from the loom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: day and night you made an end of me.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I waited patiently till dawn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but like a lion he broke all my bones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: day and night you made an end of me.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cried like a swift or thrush,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I moaned like a mourning dove.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes grew weak as I looked to the heavens.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am being threatened; Lord, come to my aid!”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But what can I say?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He has spoken to me, and he himself has done this.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will walk humbly all my years
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of this anguish of my soul.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, by such things people live;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my spirit finds life in them too.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You restored me to health
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let me live.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely it was for my benefit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I suffered such anguish.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your love you kept me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the pit of destruction;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have put all my sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: behind your back.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the grave cannot praise you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: death cannot sing your praise;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who go down to the pit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cannot hope for your faithfulness.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The living, the living—they praise you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I am doing today;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parents tell their children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: about your faithfulness.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah turned his face to the wall and prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will save me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we will sing with stringed instruments
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all the days of our lives
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaiah had said, “Prepare a poultice of figs and apply it to the boil, and he will recover.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hezekiah had asked, “What will be the sign that I will go up to the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Remember, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how I have walked before you faithfully and with wholehearted devotion and have done what is good in your eyes.” And Hezekiah wept bitterly.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Isaiah: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go and tell Hezekiah, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your father David, says: I have heard your prayer and seen your tears; I will add fifteen years to your life. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will deliver you and this city from the hand of the king of Assyria. I will defend this city.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘This is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sign to you that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will do what he has promised: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make the shadow cast by the sun go back the ten steps it has gone down on the stairway of Ahaz.’ ” So the sunlight went back the ten steps it had gone down.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A writing of Hezekiah king of Judah after his illness and recovery:'
