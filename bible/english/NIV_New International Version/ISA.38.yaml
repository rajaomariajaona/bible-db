document_id: ISA.38,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah’s Illness
  - type: text
    content: 'In those days Hezekiah became ill and was at the point of death. The prophet Isaiah son of Amoz went to him and said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Put your house in order, because you are going to die; you will not recover.”'
  '10':
  - type: text
    content: I said, “In the prime of my life
  - type: text
    content: must I go through the gates of death
  - type: text
    content: and be robbed of the rest of my years?”
  '11':
  - type: text
    content: 'I said, “I will not again see the '
  - type: text
    content: Lord
  - type: text
    content: ' himself'
  - type: text
    content: in the land of the living;
  - type: text
    content: no longer will I look on my fellow man,
  - type: text
    content: or be with those who now dwell in this world.
  '12':
  - type: text
    content: Like a shepherd’s tent my house
  - type: text
    content: has been pulled down and taken from me.
  - type: text
    content: Like a weaver I have rolled up my life,
  - type: text
    content: and he has cut me off from the loom;
  - type: text
    content: day and night you made an end of me.
  '13':
  - type: text
    content: I waited patiently till dawn,
  - type: text
    content: but like a lion he broke all my bones;
  - type: text
    content: day and night you made an end of me.
  '14':
  - type: text
    content: I cried like a swift or thrush,
  - type: text
    content: I moaned like a mourning dove.
  - type: text
    content: My eyes grew weak as I looked to the heavens.
  - type: text
    content: I am being threatened; Lord, come to my aid!”
  '15':
  - type: text
    content: But what can I say?
  - type: text
    content: He has spoken to me, and he himself has done this.
  - type: text
    content: I will walk humbly all my years
  - type: text
    content: because of this anguish of my soul.
  '16':
  - type: text
    content: Lord, by such things people live;
  - type: text
    content: and my spirit finds life in them too.
  - type: text
    content: You restored me to health
  - type: text
    content: and let me live.
  '17':
  - type: text
    content: Surely it was for my benefit
  - type: text
    content: that I suffered such anguish.
  - type: text
    content: In your love you kept me
  - type: text
    content: from the pit of destruction;
  - type: text
    content: you have put all my sins
  - type: text
    content: behind your back.
  '18':
  - type: text
    content: For the grave cannot praise you,
  - type: text
    content: death cannot sing your praise;
  - type: text
    content: those who go down to the pit
  - type: text
    content: cannot hope for your faithfulness.
  '19':
  - type: text
    content: The living, the living—they praise you,
  - type: text
    content: as I am doing today;
  - type: text
    content: parents tell their children
  - type: text
    content: about your faithfulness.
  '2':
  - type: text
    content: 'Hezekiah turned his face to the wall and prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will save me,'
  - type: text
    content: and we will sing with stringed instruments
  - type: text
    content: all the days of our lives
  - type: text
    content: 'in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: Isaiah had said, “Prepare a poultice of figs and apply it to the boil, and he will recover.”
  '22':
  - type: text
    content: 'Hezekiah had asked, “What will be the sign that I will go up to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '3':
  - type: text
    content: '“Remember, '
  - type: text
    content: Lord
  - type: text
    content: ', how I have walked before you faithfully and with wholehearted devotion and have done what is good in your eyes.” And Hezekiah wept bitterly.'
  '4':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Isaiah: '
  '5':
  - type: text
    content: '“Go and tell Hezekiah, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your father David, says: I have heard your prayer and seen your tears; I will add fifteen years to your life. '
  '6':
  - type: text
    content: And I will deliver you and this city from the hand of the king of Assyria. I will defend this city.
  '7':
  - type: text
    content: '“ ‘This is the '
  - type: text
    content: Lord
  - type: text
    content: '’s sign to you that the '
  - type: text
    content: Lord
  - type: text
    content: ' will do what he has promised: '
  '8':
  - type: text
    content: I will make the shadow cast by the sun go back the ten steps it has gone down on the stairway of Ahaz.’ ” So the sunlight went back the ten steps it had gone down.
  '9':
  - type: text
    content: 'A writing of Hezekiah king of Judah after his illness and recovery:'
