document_id: JOB.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job Speaks
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this, Job opened his mouth and cursed the day of his birth. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for it did not shut the doors of the womb on me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to hide trouble from my eyes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why did I not perish at birth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and die as I came from the womb?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why were there knees to receive me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and breasts that I might be nursed?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For now I would be lying down in peace;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would be asleep and at rest
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with kings and rulers of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who built for themselves places now lying in ruins,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with princes who had gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who filled their houses with silver.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or why was I not hidden away in the ground like a stillborn child,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like an infant who never saw the light of day?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There the wicked cease from turmoil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there the weary are at rest.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Captives also enjoy their ease;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they no longer hear the slave driver’s shout.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The small and the great are there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the slaves are freed from their owners.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why is light given to those in misery,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and life to the bitter of soul,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to those who long for death that does not come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who search for it more than for hidden treasure,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who are filled with gladness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rejoice when they reach the grave?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why is life given to a man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose way is hidden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whom God has hedged in?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For sighing has become my daily food;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my groans pour out like water.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What I feared has come upon me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what I dreaded has happened to me.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have no peace, no quietness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have no rest, but only turmoil.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “May the day of my birth perish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the night that said, ‘A boy is conceived!’
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That day—may it turn to darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may God above not care about it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may no light shine on it.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May gloom and utter darkness claim it once more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may a cloud settle over it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may blackness overwhelm it.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That night—may thick darkness seize it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may it not be included among the days of the year
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor be entered in any of the months.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May that night be barren;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may no shout of joy be heard in it.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who curse days
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: curse the sea
      marker-yv: yv-n
    - type: text
      text: ' curse that day,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who are ready to rouse Leviathan.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May its morning stars become dark;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may it wait for daylight in vain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not see the first rays of dawn,
