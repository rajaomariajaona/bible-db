document_id: JOB.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job Speaks
  - type: text
    content: 'After this, Job opened his mouth and cursed the day of his birth. '
  '10':
  - type: text
    content: for it did not shut the doors of the womb on me
  - type: text
    content: to hide trouble from my eyes.
  '11':
  - type: text
    content: “Why did I not perish at birth,
  - type: text
    content: and die as I came from the womb?
  '12':
  - type: text
    content: Why were there knees to receive me
  - type: text
    content: and breasts that I might be nursed?
  '13':
  - type: text
    content: For now I would be lying down in peace;
  - type: text
    content: I would be asleep and at rest
  '14':
  - type: text
    content: with kings and rulers of the earth,
  - type: text
    content: who built for themselves places now lying in ruins,
  '15':
  - type: text
    content: with princes who had gold,
  - type: text
    content: who filled their houses with silver.
  '16':
  - type: text
    content: Or why was I not hidden away in the ground like a stillborn child,
  - type: text
    content: like an infant who never saw the light of day?
  '17':
  - type: text
    content: There the wicked cease from turmoil,
  - type: text
    content: and there the weary are at rest.
  '18':
  - type: text
    content: Captives also enjoy their ease;
  - type: text
    content: they no longer hear the slave driver’s shout.
  '19':
  - type: text
    content: The small and the great are there,
  - type: text
    content: and the slaves are freed from their owners.
  '2':
  - type: text
    content: 'He said:'
  '20':
  - type: text
    content: “Why is light given to those in misery,
  - type: text
    content: and life to the bitter of soul,
  '21':
  - type: text
    content: to those who long for death that does not come,
  - type: text
    content: who search for it more than for hidden treasure,
  '22':
  - type: text
    content: who are filled with gladness
  - type: text
    content: and rejoice when they reach the grave?
  '23':
  - type: text
    content: Why is life given to a man
  - type: text
    content: whose way is hidden,
  - type: text
    content: whom God has hedged in?
  '24':
  - type: text
    content: For sighing has become my daily food;
  - type: text
    content: my groans pour out like water.
  '25':
  - type: text
    content: What I feared has come upon me;
  - type: text
    content: what I dreaded has happened to me.
  '26':
  - type: text
    content: I have no peace, no quietness;
  - type: text
    content: I have no rest, but only turmoil.”
  '3':
  - type: text
    content: “May the day of my birth perish,
  - type: text
    content: and the night that said, ‘A boy is conceived!’
  '4':
  - type: text
    content: That day—may it turn to darkness;
  - type: text
    content: may God above not care about it;
  - type: text
    content: may no light shine on it.
  '5':
  - type: text
    content: May gloom and utter darkness claim it once more;
  - type: text
    content: may a cloud settle over it;
  - type: text
    content: may blackness overwhelm it.
  '6':
  - type: text
    content: That night—may thick darkness seize it;
  - type: text
    content: may it not be included among the days of the year
  - type: text
    content: nor be entered in any of the months.
  '7':
  - type: text
    content: May that night be barren;
  - type: text
    content: may no shout of joy be heard in it.
  '8':
  - type: text
    content: May those who curse days
  - type: note
    content: Or curse the sea
  - type: text
    content: ' curse that day,'
  - type: text
    content: those who are ready to rouse Leviathan.
  '9':
  - type: text
    content: May its morning stars become dark;
  - type: text
    content: may it wait for daylight in vain
  - type: text
    content: and not see the first rays of dawn,
