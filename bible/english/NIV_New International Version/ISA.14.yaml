document_id: ISA.14,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will have compassion on Jacob;'
  - type: text
    content: once again he will choose Israel
  - type: text
    content: and will settle them in their own land.
  - type: text
    content: Foreigners will join them
  - type: text
    content: and unite with the descendants of Jacob.
  '10':
  - type: text
    content: They will all respond,
  - type: text
    content: they will say to you,
  - type: text
    content: “You also have become weak, as we are;
  - type: text
    content: you have become like us.”
  '11':
  - type: text
    content: All your pomp has been brought down to the grave,
  - type: text
    content: along with the noise of your harps;
  - type: text
    content: maggots are spread out beneath you
  - type: text
    content: and worms cover you.
  '12':
  - type: text
    content: How you have fallen from heaven,
  - type: text
    content: morning star, son of the dawn!
  - type: text
    content: You have been cast down to the earth,
  - type: text
    content: you who once laid low the nations!
  '13':
  - type: text
    content: You said in your heart,
  - type: text
    content: “I will ascend to the heavens;
  - type: text
    content: I will raise my throne
  - type: text
    content: above the stars of God;
  - type: text
    content: I will sit enthroned on the mount of assembly,
  - type: text
    content: on the utmost heights of Mount Zaphon.
  - type: note
    content: Or of the north; Zaphon was the most sacred mountain of the Canaanites.
  '14':
  - type: text
    content: I will ascend above the tops of the clouds;
  - type: text
    content: I will make myself like the Most High.”
  '15':
  - type: text
    content: But you are brought down to the realm of the dead,
  - type: text
    content: to the depths of the pit.
  '16':
  - type: text
    content: Those who see you stare at you,
  - type: text
    content: 'they ponder your fate:'
  - type: text
    content: “Is this the man who shook the earth
  - type: text
    content: and made kingdoms tremble,
  '17':
  - type: text
    content: the man who made the world a wilderness,
  - type: text
    content: who overthrew its cities
  - type: text
    content: and would not let his captives go home?”
  '18':
  - type: text
    content: All the kings of the nations lie in state,
  - type: text
    content: each in his own tomb.
  '19':
  - type: text
    content: But you are cast out of your tomb
  - type: text
    content: like a rejected branch;
  - type: text
    content: you are covered with the slain,
  - type: text
    content: with those pierced by the sword,
  - type: text
    content: those who descend to the stones of the pit.
  - type: text
    content: Like a corpse trampled underfoot,
  '2':
  - type: text
    content: Nations will take them
  - type: text
    content: and bring them to their own place.
  - type: text
    content: And Israel will take possession of the nations
  - type: text
    content: 'and make them male and female servants in the '
  - type: text
    content: Lord
  - type: text
    content: ’s land.
  - type: text
    content: They will make captives of their captors
  - type: text
    content: and rule over their oppressors.
  '20':
  - type: text
    content: you will not join them in burial,
  - type: text
    content: for you have destroyed your land
  - type: text
    content: and killed your people.
  - type: text
    content: Let the offspring of the wicked
  - type: text
    content: never be mentioned again.
  '21':
  - type: text
    content: Prepare a place to slaughter his children
  - type: text
    content: for the sins of their ancestors;
  - type: text
    content: they are not to rise to inherit the land
  - type: text
    content: and cover the earth with their cities.
  '22':
  - type: text
    content: “I will rise up against them,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: text
    content: “I will wipe out Babylon’s name and survivors,
  - type: text
    content: her offspring and descendants,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: “I will turn her into a place for owls
  - type: text
    content: and into swampland;
  - type: text
    content: I will sweep her with the broom of destruction,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has sworn,'
  - type: text
    content: “Surely, as I have planned, so it will be,
  - type: text
    content: and as I have purposed, so it will happen.
  '25':
  - type: text
    content: I will crush the Assyrian in my land;
  - type: text
    content: on my mountains I will trample him down.
  - type: text
    content: His yoke will be taken from my people,
  - type: text
    content: and his burden removed from their shoulders.”
  '26':
  - type: text
    content: This is the plan determined for the whole world;
  - type: text
    content: this is the hand stretched out over all nations.
  '27':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has purposed, and who can thwart him?'
  - type: text
    content: His hand is stretched out, and who can turn it back?
  - type: heading
    content: A Prophecy Against the Philistines
  '28':
  - type: text
    content: 'This prophecy came in the year King Ahaz died:'
  '29':
  - type: text
    content: Do not rejoice, all you Philistines,
  - type: text
    content: that the rod that struck you is broken;
  - type: text
    content: from the root of that snake will spring up a viper,
  - type: text
    content: its fruit will be a darting, venomous serpent.
  '3':
  - type: text
    content: 'On the day the '
  - type: text
    content: Lord
  - type: text
    content: ' gives you relief from your suffering and turmoil and from the harsh labor forced on you, '
  '30':
  - type: text
    content: The poorest of the poor will find pasture,
  - type: text
    content: and the needy will lie down in safety.
  - type: text
    content: But your root I will destroy by famine;
  - type: text
    content: it will slay your survivors.
  '31':
  - type: text
    content: Wail, you gate! Howl, you city!
  - type: text
    content: Melt away, all you Philistines!
  - type: text
    content: A cloud of smoke comes from the north,
  - type: text
    content: and there is not a straggler in its ranks.
  '32':
  - type: text
    content: What answer shall be given
  - type: text
    content: to the envoys of that nation?
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has established Zion,'
  - type: text
    content: and in her his afflicted people will find refuge.”
  '4':
  - type: text
    content: 'you will take up this taunt against the king of Babylon:'
  - type: text
    content: How the oppressor has come to an end!
  - type: text
    content: How his fury
  - type: note
    content: Dead Sea Scrolls, Septuagint and Syriac; the meaning of the word in the Masoretic Text is uncertain.
  - type: text
    content: ' has ended!'
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has broken the rod of the wicked,'
  - type: text
    content: the scepter of the rulers,
  '6':
  - type: text
    content: which in anger struck down peoples
  - type: text
    content: with unceasing blows,
  - type: text
    content: and in fury subdued nations
  - type: text
    content: with relentless aggression.
  '7':
  - type: text
    content: All the lands are at rest and at peace;
  - type: text
    content: they break into singing.
  '8':
  - type: text
    content: Even the junipers and the cedars of Lebanon
  - type: text
    content: gloat over you and say,
  - type: text
    content: “Now that you have been laid low,
  - type: text
    content: no one comes to cut us down.”
  '9':
  - type: text
    content: The realm of the dead below is all astir
  - type: text
    content: to meet you at your coming;
  - type: text
    content: it rouses the spirits of the departed to greet you—
  - type: text
    content: all those who were leaders in the world;
  - type: text
    content: it makes them rise from their thrones—
  - type: text
    content: all those who were kings over the nations.
