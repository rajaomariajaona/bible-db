document_id: ISA.14
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will have compassion on Jacob;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: once again he will choose Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will settle them in their own land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Foreigners will join them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and unite with the descendants of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nations will take them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring them to their own place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Israel will take possession of the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and make them male and female servants in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will make captives of their captors
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rule over their oppressors.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On the day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gives you relief from your suffering and turmoil and from the harsh labor forced on you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'you will take up this taunt against the king of Babylon:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: How the oppressor has come to an end!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How his fury
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dead Sea Scrolls, Septuagint and Syriac; the meaning of the word in the Masoretic Text is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' has ended!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has broken the rod of the wicked,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the scepter of the rulers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: which in anger struck down peoples
- type: usfm
  marker: q2
  children:
  - type: text
    text: with unceasing blows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and in fury subdued nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: with relentless aggression.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All the lands are at rest and at peace;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they break into singing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Even the junipers and the cedars of Lebanon
- type: usfm
  marker: q2
  children:
  - type: text
    text: gloat over you and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Now that you have been laid low,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one comes to cut us down.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The realm of the dead below is all astir
- type: usfm
  marker: q2
  children:
  - type: text
    text: to meet you at your coming;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it rouses the spirits of the departed to greet you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all those who were leaders in the world;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it makes them rise from their thrones—
- type: usfm
  marker: q2
  children:
  - type: text
    text: all those who were kings over the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They will all respond,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will say to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You also have become weak, as we are;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have become like us.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: All your pomp has been brought down to the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with the noise of your harps;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maggots are spread out beneath you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and worms cover you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: How you have fallen from heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: morning star, son of the dawn!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have been cast down to the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who once laid low the nations!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You said in your heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I will ascend to the heavens;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will raise my throne
- type: usfm
  marker: q2
  children:
  - type: text
    text: above the stars of God;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sit enthroned on the mount of assembly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the utmost heights of Mount Zaphon.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of the north
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; Zaphon was the most sacred mountain of the Canaanites.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I will ascend above the tops of the clouds;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will make myself like the Most High.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But you are brought down to the realm of the dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the depths of the pit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Those who see you stare at you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they ponder your fate:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Is this the man who shook the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made kingdoms tremble,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: the man who made the world a wilderness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who overthrew its cities
- type: usfm
  marker: q2
  children:
  - type: text
    text: and would not let his captives go home?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: All the kings of the nations lie in state,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each in his own tomb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But you are cast out of your tomb
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a rejected branch;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you are covered with the slain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with those pierced by the sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who descend to the stones of the pit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a corpse trampled underfoot,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: you will not join them in burial,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you have destroyed your land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and killed your people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the offspring of the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: never be mentioned again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Prepare a place to slaughter his children
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the sins of their ancestors;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they are not to rise to inherit the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cover the earth with their cities.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “I will rise up against them,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will wipe out Babylon’s name and survivors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her offspring and descendants,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “I will turn her into a place for owls
- type: usfm
  marker: q2
  children:
  - type: text
    text: and into swampland;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sweep her with the broom of destruction,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty has sworn,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Surely, as I have planned, so it will be,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and as I have purposed, so it will happen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I will crush the Assyrian in my land;
- type: usfm
  marker: q2
  children:
  - type: text
    text: on my mountains I will trample him down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His yoke will be taken from my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his burden removed from their shoulders.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: This is the plan determined for the whole world;
- type: usfm
  marker: q2
  children:
  - type: text
    text: this is the hand stretched out over all nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty has purposed, and who can thwart him?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: His hand is stretched out, and who can turn it back?
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prophecy Against the Philistines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'This prophecy came in the year King Ahaz died:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Do not rejoice, all you Philistines,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the rod that struck you is broken;
- type: usfm
  marker: q1
  children:
  - type: text
    text: from the root of that snake will spring up a viper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its fruit will be a darting, venomous serpent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The poorest of the poor will find pasture,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the needy will lie down in safety.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But your root I will destroy by famine;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will slay your survivors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Wail, you gate! Howl, you city!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Melt away, all you Philistines!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cloud of smoke comes from the north,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there is not a straggler in its ranks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: What answer shall be given
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the envoys of that nation?
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has established Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in her his afflicted people will find refuge.”
