  '6':
  - type: text
    content: Therefore let all the faithful pray to you
  - type: text
    content: while you may be found;
  - type: text
    content: surely the rising of the mighty waters
  - type: text
    content: will not reach them.
  '7':
  - type: text
    content: You are my hiding place;
  - type: text
    content: you will protect me from trouble
  - type: text
    content: and surround me with songs of deliverance.
  '8':
  - type: text
    content: I will instruct you and teach you in the way you should go;
  - type: text
    content: I will counsel you with my loving eye on you.
  '9':
  - type: text
    content: Do not be like the horse or the mule,
  - type: text
    content: which have no understanding
  - type: text
    content: but must be controlled by bit and bridle
  - type: text
    content: or they will not come to you.
