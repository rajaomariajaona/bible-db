  '3':
  - type: text
    content: When I kept silent,
  - type: text
    content: my bones wasted away
  - type: text
    content: through my groaning all day long.
  '4':
  - type: text
    content: For day and night
  - type: text
    content: your hand was heavy on me;
  - type: text
    content: my strength was sapped
  - type: text
    content: as in the heat of summer.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verses 5 and 7.
  '5':
  - type: text
    content: Then I acknowledged my sin to you
  - type: text
    content: and did not cover up my iniquity.
  - type: text
    content: I said, “I will confess
  - type: text
