document_id: 2CH.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah Celebrates the Passover
  - type: text
    content: 'Hezekiah sent word to all Israel and Judah and also wrote letters to Ephraim and Manasseh, inviting them to come to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem and celebrate the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '10':
  - type: text
    content: 'The couriers went from town to town in Ephraim and Manasseh, as far as Zebulun, but people scorned and ridiculed them. '
  '11':
  - type: text
    content: 'Nevertheless, some from Asher, Manasseh and Zebulun humbled themselves and went to Jerusalem. '
  '12':
  - type: text
    content: 'Also in Judah the hand of God was on the people to give them unity of mind to carry out what the king and his officials had ordered, following the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: 'A very large crowd of people assembled in Jerusalem to celebrate the Festival of Unleavened Bread in the second month. '
  '14':
  - type: text
    content: They removed the altars in Jerusalem and cleared away the incense altars and threw them into the Kidron Valley.
  '15':
  - type: text
    content: 'They slaughtered the Passover lamb on the fourteenth day of the second month. The priests and the Levites were ashamed and consecrated themselves and brought burnt offerings to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Then they took up their regular positions as prescribed in the Law of Moses the man of God. The priests splashed against the altar the blood handed to them by the Levites. '
  '17':
  - type: text
    content: Since many in the crowd had not consecrated themselves, the Levites had to kill the Passover lambs for all those who were not ceremonially clean and could not consecrate their lambs
  - type: note
    content: Or consecrate themselves
  - type: text
    content: ' to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Although most of the many people who came from Ephraim, Manasseh, Issachar and Zebulun had not purified themselves, yet they ate the Passover, contrary to what was written. But Hezekiah prayed for them, saying, “May the '
  - type: text
    content: Lord
  - type: text
    content: ', who is good, pardon everyone '
  '19':
  - type: text
    content: 'who sets their heart on seeking God—the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors—even if they are not clean according to the rules of the sanctuary.” '
  '2':
  - type: text
    content: 'The king and his officials and the whole assembly in Jerusalem decided to celebrate the Passover in the second month. '
  '20':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' heard Hezekiah and healed the people.'
  '21':
  - type: text
    content: 'The Israelites who were present in Jerusalem celebrated the Festival of Unleavened Bread for seven days with great rejoicing, while the Levites and priests praised the '
  - type: text
    content: Lord
  - type: text
    content: ' every day with resounding instruments dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Or priests sang to the Lord every day, accompanied by the Lord’s instruments of praise
  '22':
  - type: text
    content: 'Hezekiah spoke encouragingly to all the Levites, who showed good understanding of the service of the '
  - type: text
    content: Lord
  - type: text
    content: . For the seven days they ate their assigned portion and offered fellowship offerings and praised
  - type: note
    content: Or and confessed their sins to
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors.'
  '23':
  - type: text
    content: 'The whole assembly then agreed to celebrate the festival seven more days; so for another seven days they celebrated joyfully. '
  '24':
  - type: text
    content: 'Hezekiah king of Judah provided a thousand bulls and seven thousand sheep and goats for the assembly, and the officials provided them with a thousand bulls and ten thousand sheep and goats. A great number of priests consecrated themselves. '
  '25':
  - type: text
    content: 'The entire assembly of Judah rejoiced, along with the priests and Levites and all who had assembled from Israel, including the foreigners who had come from Israel and also those who resided in Judah. '
  '26':
  - type: text
    content: 'There was great joy in Jerusalem, for since the days of Solomon son of David king of Israel there had been nothing like this in Jerusalem. '
  '27':
  - type: text
    content: The priests and the Levites stood to bless the people, and God heard them, for their prayer reached heaven, his holy dwelling place.
  '3':
  - type: text
    content: 'They had not been able to celebrate it at the regular time because not enough priests had consecrated themselves and the people had not assembled in Jerusalem. '
  '4':
  - type: text
    content: 'The plan seemed right both to the king and to the whole assembly. '
  '5':
  - type: text
    content: 'They decided to send a proclamation throughout Israel, from Beersheba to Dan, calling the people to come to Jerusalem and celebrate the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. It had not been celebrated in large numbers according to what was written.'
  '6':
  - type: text
    content: 'At the king’s command, couriers went throughout Israel and Judah with letters from the king and from his officials, which read:'
  - type: text
    content: '“People of Israel, return to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Abraham, Isaac and Israel, that he may return to you who are left, who have escaped from the hand of the kings of Assyria. '
  '7':
  - type: text
    content: 'Do not be like your parents and your fellow Israelites, who were unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, so that he made them an object of horror, as you see. '
  '8':
  - type: text
    content: 'Do not be stiff-necked, as your ancestors were; submit to the '
  - type: text
    content: Lord
  - type: text
    content: '. Come to his sanctuary, which he has consecrated forever. Serve the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, so that his fierce anger will turn away from you. '
  '9':
  - type: text
    content: 'If you return to the '
  - type: text
    content: Lord
  - type: text
    content: ', then your fellow Israelites and your children will be shown compassion by their captors and will return to this land, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is gracious and compassionate. He will not turn his face from you if you return to him.”'
