document_id: JOB.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Zophar
  - type: text
    content: 'Then Zophar the Naamathite replied:'
  '10':
  - type: text
    content: “If he comes along and confines you in prison
  - type: text
    content: and convenes a court, who can oppose him?
  '11':
  - type: text
    content: Surely he recognizes deceivers;
  - type: text
    content: and when he sees evil, does he not take note?
  '12':
  - type: text
    content: But the witless can no more become wise
  - type: text
    content: than a wild donkey’s colt can be born human.
  - type: note
    content: Or wild donkey can be born tame
  '13':
  - type: text
    content: “Yet if you devote your heart to him
  - type: text
    content: and stretch out your hands to him,
  '14':
  - type: text
    content: if you put away the sin that is in your hand
  - type: text
    content: and allow no evil to dwell in your tent,
  '15':
  - type: text
    content: then, free of fault, you will lift up your face;
  - type: text
    content: you will stand firm and without fear.
  '16':
  - type: text
    content: You will surely forget your trouble,
  - type: text
    content: recalling it only as waters gone by.
  '17':
  - type: text
    content: Life will be brighter than noonday,
  - type: text
    content: and darkness will become like morning.
  '18':
  - type: text
    content: You will be secure, because there is hope;
  - type: text
    content: you will look about you and take your rest in safety.
  '19':
  - type: text
    content: You will lie down, with no one to make you afraid,
  - type: text
    content: and many will court your favor.
  '2':
  - type: text
    content: “Are all these words to go unanswered?
  - type: text
    content: Is this talker to be vindicated?
  '20':
  - type: text
    content: But the eyes of the wicked will fail,
  - type: text
    content: and escape will elude them;
  - type: text
    content: their hope will become a dying gasp.”
  '3':
  - type: text
    content: Will your idle talk reduce others to silence?
  - type: text
    content: Will no one rebuke you when you mock?
  '4':
  - type: text
    content: You say to God, ‘My beliefs are flawless
  - type: text
    content: and I am pure in your sight.’
  '5':
  - type: text
    content: Oh, how I wish that God would speak,
  - type: text
    content: that he would open his lips against you
  '6':
  - type: text
    content: and disclose to you the secrets of wisdom,
  - type: text
    content: for true wisdom has two sides.
  - type: text
    content: 'Know this: God has even forgotten some of your sin.'
  '7':
  - type: text
    content: “Can you fathom the mysteries of God?
  - type: text
    content: Can you probe the limits of the Almighty?
  '8':
  - type: text
    content: They are higher than the heavens above—what can you do?
  - type: text
    content: They are deeper than the depths below—what can you know?
  '9':
  - type: text
    content: Their measure is longer than the earth
  - type: text
    content: and wider than the sea.
