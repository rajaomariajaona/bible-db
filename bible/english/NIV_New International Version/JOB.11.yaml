document_id: JOB.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zophar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Zophar the Naamathite replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Are all these words to go unanswered?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is this talker to be vindicated?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Will your idle talk reduce others to silence?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will no one rebuke you when you mock?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You say to God, ‘My beliefs are flawless
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I am pure in your sight.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oh, how I wish that God would speak,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that he would open his lips against you
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and disclose to you the secrets of wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for true wisdom has two sides.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Know this: God has even forgotten some of your sin.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Can you fathom the mysteries of God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can you probe the limits of the Almighty?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They are higher than the heavens above—what can you do?
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are deeper than the depths below—what can you know?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Their measure is longer than the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wider than the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “If he comes along and confines you in prison
- type: usfm
  marker: q2
  children:
  - type: text
    text: and convenes a court, who can oppose him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Surely he recognizes deceivers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and when he sees evil, does he not take note?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But the witless can no more become wise
- type: usfm
  marker: q2
  children:
  - type: text
    text: than a wild donkey’s colt can be born human.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wild donkey can be born tame
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Yet if you devote your heart to him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stretch out your hands to him,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: if you put away the sin that is in your hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: and allow no evil to dwell in your tent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: then, free of fault, you will lift up your face;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will stand firm and without fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You will surely forget your trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: recalling it only as waters gone by.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Life will be brighter than noonday,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and darkness will become like morning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You will be secure, because there is hope;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will look about you and take your rest in safety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You will lie down, with no one to make you afraid,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and many will court your favor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But the eyes of the wicked will fail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and escape will elude them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their hope will become a dying gasp.”
