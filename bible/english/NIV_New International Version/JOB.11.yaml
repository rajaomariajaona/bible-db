document_id: JOB.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zophar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Zophar the Naamathite replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If he comes along and confines you in prison
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and convenes a court, who can oppose him?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely he recognizes deceivers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and when he sees evil, does he not take note?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the witless can no more become wise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a wild donkey’s colt can be born human.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wild donkey can be born tame
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yet if you devote your heart to him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stretch out your hands to him,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: if you put away the sin that is in your hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and allow no evil to dwell in your tent,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then, free of fault, you will lift up your face;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will stand firm and without fear.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will surely forget your trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: recalling it only as waters gone by.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Life will be brighter than noonday,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and darkness will become like morning.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be secure, because there is hope;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will look about you and take your rest in safety.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will lie down, with no one to make you afraid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and many will court your favor.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Are all these words to go unanswered?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is this talker to be vindicated?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the eyes of the wicked will fail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and escape will elude them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their hope will become a dying gasp.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will your idle talk reduce others to silence?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will no one rebuke you when you mock?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You say to God, ‘My beliefs are flawless
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I am pure in your sight.’
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, how I wish that God would speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that he would open his lips against you
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and disclose to you the secrets of wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for true wisdom has two sides.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Know this: God has even forgotten some of your sin.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can you fathom the mysteries of God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can you probe the limits of the Almighty?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are higher than the heavens above—what can you do?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They are deeper than the depths below—what can you know?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their measure is longer than the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wider than the sea.
