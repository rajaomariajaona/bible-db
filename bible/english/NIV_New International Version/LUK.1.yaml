document_id: LUK.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Introduction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Many have undertaken to draw up an account of the things that have been fulfilled
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: been surely believed
    marker-yv: yv-n
  - type: text
    text: ' among us, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'just as they were handed down to us by those who from the first were eyewitnesses and servants of the word. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'With this in mind, since I myself have carefully investigated everything from the beginning, I too decided to write an orderly account for you, most excellent Theophilus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: so that you may know the certainty of the things you have been taught.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Birth of John the Baptist Foretold
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In the time of Herod king of Judea there was a priest named Zechariah, who belonged to the priestly division of Abijah; his wife Elizabeth was also a descendant of Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Both of them were righteous in the sight of God, observing all the Lord’s commands and decrees blamelessly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But they were childless because Elizabeth was not able to conceive, and they were both very old.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Once when Zechariah’s division was on duty and he was serving as priest before God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'he was chosen by lot, according to the custom of the priesthood, to go into the temple of the Lord and burn incense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And when the time for the burning of incense came, all the assembled worshipers were praying outside.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then an angel of the Lord appeared to him, standing at the right side of the altar of incense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Zechariah saw him, he was startled and was gripped with fear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But the angel said to him: “Do not be afraid, Zechariah; your prayer has been heard. Your wife Elizabeth will bear you a son, and you are to call him John. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He will be a joy and delight to you, and many will rejoice because of his birth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'for he will be great in the sight of the Lord. He is never to take wine or other fermented drink, and he will be filled with the Holy Spirit even before he is born. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He will bring back many of the people of Israel to the Lord their God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And he will go on before the Lord, in the spirit and power of Elijah, to turn the hearts of the parents to their children and the disobedient to the wisdom of the righteous—to make ready a people prepared for the Lord.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Zechariah asked the angel, “How can I be sure of this? I am an old man and my wife is well along in years.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The angel said to him, “I am Gabriel. I stand in the presence of God, and I have been sent to speak to you and to tell you this good news. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And now you will be silent and not able to speak until the day this happens, because you did not believe my words, which will come true at their appointed time.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Meanwhile, the people were waiting for Zechariah and wondering why he stayed so long in the temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When he came out, he could not speak to them. They realized he had seen a vision in the temple, for he kept making signs to them but remained unable to speak.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When his time of service was completed, he returned home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'After this his wife Elizabeth became pregnant and for five months remained in seclusion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “The Lord has done this for me,” she said. “In these days he has shown his favor and taken away my disgrace among the people.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Birth of Jesus Foretold
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'In the sixth month of Elizabeth’s pregnancy, God sent the angel Gabriel to Nazareth, a town in Galilee, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'to a virgin pledged to be married to a man named Joseph, a descendant of David. The virgin’s name was Mary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The angel went to her and said, “Greetings, you who are highly favored! The Lord is with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mary was greatly troubled at his words and wondered what kind of greeting this might be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But the angel said to her, “Do not be afraid, Mary; you have found favor with God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'You will conceive and give birth to a son, and you are to call him Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He will be great and will be called the Son of the Most High. The Lord God will give him the throne of his father David, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: and he will reign over Jacob’s descendants forever; his kingdom will never end.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “How will this be,” Mary asked the angel, “since I am a virgin?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The angel answered, “The Holy Spirit will come on you, and the power of the Most High will overshadow you. So the holy one to be born will be called
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: So the child to be born will be called holy,
    marker-yv: yv-n
  - type: text
    text: ' the Son of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Even Elizabeth your relative is going to have a child in her old age, and she who was said to be unable to conceive is in her sixth month. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: For no word from God will ever fail.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “I am the Lord’s servant,” Mary answered. “May your word to me be fulfilled.” Then the angel left her.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mary Visits Elizabeth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'At that time Mary got ready and hurried to a town in the hill country of Judea, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'where she entered Zechariah’s home and greeted Elizabeth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'When Elizabeth heard Mary’s greeting, the baby leaped in her womb, and Elizabeth was filled with the Holy Spirit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'In a loud voice she exclaimed: “Blessed are you among women, and blessed is the child you will bear! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'But why am I so favored, that the mother of my Lord should come to me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'As soon as the sound of your greeting reached my ears, the baby in my womb leaped for joy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Blessed is she who has believed that the Lord would fulfill his promises to her!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mary’s Song
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And Mary said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “My soul glorifies the Lord
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: and my spirit rejoices in God my Savior,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: for he has been mindful
- type: usfm
  marker: q2
  children:
  - type: text
    text: of the humble state of his servant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From now on all generations will call me blessed,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: for the Mighty One has done great things for me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: holy is his name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: His mercy extends to those who fear him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from generation to generation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: He has performed mighty deeds with his arm;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has scattered those who are proud in their inmost thoughts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: He has brought down rulers from their thrones
- type: usfm
  marker: q2
  children:
  - type: text
    text: but has lifted up the humble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: He has filled the hungry with good things
- type: usfm
  marker: q2
  children:
  - type: text
    text: but has sent the rich away empty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: He has helped his servant Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: remembering to be merciful
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: to Abraham and his descendants forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: just as he promised our ancestors.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Mary stayed with Elizabeth for about three months and then returned home.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Birth of John the Baptist
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'When it was time for Elizabeth to have her baby, she gave birth to a son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Her neighbors and relatives heard that the Lord had shown her great mercy, and they shared her joy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'On the eighth day they came to circumcise the child, and they were going to name him after his father Zechariah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: but his mother spoke up and said, “No! He is to be called John.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: They said to her, “There is no one among your relatives who has that name.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Then they made signs to his father, to find out what he would like to name the child. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'He asked for a writing tablet, and to everyone’s astonishment he wrote, “His name is John.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Immediately his mouth was opened and his tongue set free, and he began to speak, praising God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'All the neighbors were filled with awe, and throughout the hill country of Judea people were talking about all these things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Everyone who heard this wondered about it, asking, “What then is this child going to be?” For the Lord’s hand was with him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zechariah’s Song
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'His father Zechariah was filled with the Holy Spirit and prophesied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: “Praise be to the Lord, the God of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because he has come to his people and redeemed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: He has raised up a horn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:69 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Horn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: here symbolizes a strong king.
    marker-yv: yv-n
  - type: text
    text: ' of salvation for us'
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the house of his servant David
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: (as he said through his holy prophets of long ago),
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: salvation from our enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from the hand of all who hate us—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: to show mercy to our ancestors
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to remember his holy covenant,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'the oath he swore to our father Abraham:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: to rescue us from the hand of our enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to enable us to serve him without fear
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: in holiness and righteousness before him all our days.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: And you, my child, will be called a prophet of the Most High;
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you will go on before the Lord to prepare the way for him,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: to give his people the knowledge of salvation
- type: usfm
  marker: q2
  children:
  - type: text
    text: through the forgiveness of their sins,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: because of the tender mercy of our God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: by which the rising sun will come to us from heaven
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: to shine on those living in darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in the shadow of death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to guide our feet into the path of peace.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: And the child grew and became strong in spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:80 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in the Spirit
    marker-yv: yv-n
  - type: text
    text: ; and he lived in the wilderness until he appeared publicly to Israel.
