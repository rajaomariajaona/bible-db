document_id: LUK.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: Many have undertaken to draw up an account of the things that have been fulfilled
  - type: note
    content: Or been surely believed
  - type: text
    content: ' among us, '
  '10':
  - type: text
    content: And when the time for the burning of incense came, all the assembled worshipers were praying outside.
  '11':
  - type: text
    content: 'Then an angel of the Lord appeared to him, standing at the right side of the altar of incense. '
  '12':
  - type: text
    content: 'When Zechariah saw him, he was startled and was gripped with fear. '
  '13':
  - type: text
    content: 'But the angel said to him: “Do not be afraid, Zechariah; your prayer has been heard. Your wife Elizabeth will bear you a son, and you are to call him John. '
  '14':
  - type: text
    content: 'He will be a joy and delight to you, and many will rejoice because of his birth, '
  '15':
  - type: text
    content: 'for he will be great in the sight of the Lord. He is never to take wine or other fermented drink, and he will be filled with the Holy Spirit even before he is born. '
  '16':
  - type: text
    content: 'He will bring back many of the people of Israel to the Lord their God. '
  '17':
  - type: text
    content: And he will go on before the Lord, in the spirit and power of Elijah, to turn the hearts of the parents to their children and the disobedient to the wisdom of the righteous—to make ready a people prepared for the Lord.”
  '18':
  - type: text
    content: Zechariah asked the angel, “How can I be sure of this? I am an old man and my wife is well along in years.”
  '19':
  - type: text
    content: 'The angel said to him, “I am Gabriel. I stand in the presence of God, and I have been sent to speak to you and to tell you this good news. '
  '2':
  - type: text
    content: 'just as they were handed down to us by those who from the first were eyewitnesses and servants of the word. '
  '20':
  - type: text
    content: And now you will be silent and not able to speak until the day this happens, because you did not believe my words, which will come true at their appointed time.”
  '21':
  - type: text
    content: 'Meanwhile, the people were waiting for Zechariah and wondering why he stayed so long in the temple. '
  '22':
  - type: text
    content: When he came out, he could not speak to them. They realized he had seen a vision in the temple, for he kept making signs to them but remained unable to speak.
  '23':
  - type: text
    content: 'When his time of service was completed, he returned home. '
  '24':
  - type: text
    content: 'After this his wife Elizabeth became pregnant and for five months remained in seclusion. '
  '25':
  - type: text
    content: “The Lord has done this for me,” she said. “In these days he has shown his favor and taken away my disgrace among the people.”
  - type: heading
    content: The Birth of Jesus Foretold
  '26':
  - type: text
    content: 'In the sixth month of Elizabeth’s pregnancy, God sent the angel Gabriel to Nazareth, a town in Galilee, '
  '27':
  - type: text
    content: 'to a virgin pledged to be married to a man named Joseph, a descendant of David. The virgin’s name was Mary. '
  '28':
  - type: text
    content: The angel went to her and said, “Greetings, you who are highly favored! The Lord is with you.”
  '29':
  - type: text
    content: 'Mary was greatly troubled at his words and wondered what kind of greeting this might be. '
  '3':
  - type: text
    content: 'With this in mind, since I myself have carefully investigated everything from the beginning, I too decided to write an orderly account for you, most excellent Theophilus, '
  '30':
  - type: text
    content: 'But the angel said to her, “Do not be afraid, Mary; you have found favor with God. '
  '31':
  - type: text
    content: 'You will conceive and give birth to a son, and you are to call him Jesus. '
  '32':
  - type: text
    content: 'He will be great and will be called the Son of the Most High. The Lord God will give him the throne of his father David, '
  '33':
  - type: text
    content: and he will reign over Jacob’s descendants forever; his kingdom will never end.”
  '34':
  - type: text
    content: “How will this be,” Mary asked the angel, “since I am a virgin?”
  '35':
  - type: text
    content: The angel answered, “The Holy Spirit will come on you, and the power of the Most High will overshadow you. So the holy one to be born will be called
  - type: note
    content: Or So the child to be born will be called holy,
  - type: text
    content: ' the Son of God. '
  '36':
  - type: text
    content: 'Even Elizabeth your relative is going to have a child in her old age, and she who was said to be unable to conceive is in her sixth month. '
  '37':
  - type: text
    content: For no word from God will ever fail.”
  '38':
  - type: text
    content: “I am the Lord’s servant,” Mary answered. “May your word to me be fulfilled.” Then the angel left her.
  - type: heading
    content: Mary Visits Elizabeth
  '39':
  - type: text
    content: 'At that time Mary got ready and hurried to a town in the hill country of Judea, '
  '4':
  - type: text
    content: so that you may know the certainty of the things you have been taught.
  - type: heading
    content: The Birth of John the Baptist Foretold
  '40':
  - type: text
    content: 'where she entered Zechariah’s home and greeted Elizabeth. '
  '41':
  - type: text
    content: 'When Elizabeth heard Mary’s greeting, the baby leaped in her womb, and Elizabeth was filled with the Holy Spirit. '
  '42':
  - type: text
    content: 'In a loud voice she exclaimed: “Blessed are you among women, and blessed is the child you will bear! '
  '43':
  - type: text
    content: 'But why am I so favored, that the mother of my Lord should come to me? '
  '44':
  - type: text
    content: 'As soon as the sound of your greeting reached my ears, the baby in my womb leaped for joy. '
  '45':
  - type: text
    content: Blessed is she who has believed that the Lord would fulfill his promises to her!”
  - type: heading
    content: Mary’s Song
  '46':
  - type: text
    content: 'And Mary said:'
  - type: text
    content: “My soul glorifies the Lord
  '47':
  - type: text
    content: and my spirit rejoices in God my Savior,
  '48':
  - type: text
    content: for he has been mindful
  - type: text
    content: of the humble state of his servant.
  - type: text
    content: From now on all generations will call me blessed,
  '49':
  - type: text
    content: for the Mighty One has done great things for me—
  - type: text
    content: holy is his name.
  '5':
  - type: text
    content: 'In the time of Herod king of Judea there was a priest named Zechariah, who belonged to the priestly division of Abijah; his wife Elizabeth was also a descendant of Aaron. '
  '50':
  - type: text
    content: His mercy extends to those who fear him,
  - type: text
    content: from generation to generation.
  '51':
  - type: text
    content: He has performed mighty deeds with his arm;
  - type: text
    content: he has scattered those who are proud in their inmost thoughts.
  '52':
  - type: text
    content: He has brought down rulers from their thrones
  - type: text
    content: but has lifted up the humble.
  '53':
  - type: text
    content: He has filled the hungry with good things
  - type: text
    content: but has sent the rich away empty.
  '54':
  - type: text
    content: He has helped his servant Israel,
  - type: text
    content: remembering to be merciful
  '55':
  - type: text
    content: to Abraham and his descendants forever,
  - type: text
    content: just as he promised our ancestors.”
  '56':
  - type: text
    content: Mary stayed with Elizabeth for about three months and then returned home.
  - type: heading
    content: The Birth of John the Baptist
  '57':
  - type: text
    content: 'When it was time for Elizabeth to have her baby, she gave birth to a son. '
  '58':
  - type: text
    content: Her neighbors and relatives heard that the Lord had shown her great mercy, and they shared her joy.
  '59':
  - type: text
    content: 'On the eighth day they came to circumcise the child, and they were going to name him after his father Zechariah, '
  '6':
  - type: text
    content: 'Both of them were righteous in the sight of God, observing all the Lord’s commands and decrees blamelessly. '
  '60':
  - type: text
    content: but his mother spoke up and said, “No! He is to be called John.”
  '61':
  - type: text
    content: They said to her, “There is no one among your relatives who has that name.”
  '62':
  - type: text
    content: 'Then they made signs to his father, to find out what he would like to name the child. '
  '63':
  - type: text
    content: 'He asked for a writing tablet, and to everyone’s astonishment he wrote, “His name is John.” '
  '64':
  - type: text
    content: 'Immediately his mouth was opened and his tongue set free, and he began to speak, praising God. '
  '65':
  - type: text
    content: 'All the neighbors were filled with awe, and throughout the hill country of Judea people were talking about all these things. '
  '66':
  - type: text
    content: Everyone who heard this wondered about it, asking, “What then is this child going to be?” For the Lord’s hand was with him.
  - type: heading
    content: Zechariah’s Song
  '67':
  - type: text
    content: 'His father Zechariah was filled with the Holy Spirit and prophesied:'
  '68':
  - type: text
    content: “Praise be to the Lord, the God of Israel,
  - type: text
    content: because he has come to his people and redeemed them.
  '69':
  - type: text
    content: He has raised up a horn
  - type: note
    content: Horn here symbolizes a strong king.
  - type: text
    content: ' of salvation for us'
  - type: text
    content: in the house of his servant David
  '7':
  - type: text
    content: But they were childless because Elizabeth was not able to conceive, and they were both very old.
  '70':
  - type: text
    content: (as he said through his holy prophets of long ago),
  '71':
  - type: text
    content: salvation from our enemies
  - type: text
    content: and from the hand of all who hate us—
  '72':
  - type: text
    content: to show mercy to our ancestors
  - type: text
    content: and to remember his holy covenant,
  '73':
  - type: text
    content: 'the oath he swore to our father Abraham:'
  '74':
  - type: text
    content: to rescue us from the hand of our enemies,
  - type: text
    content: and to enable us to serve him without fear
  '75':
  - type: text
    content: in holiness and righteousness before him all our days.
  '76':
  - type: text
    content: And you, my child, will be called a prophet of the Most High;
  - type: text
    content: for you will go on before the Lord to prepare the way for him,
  '77':
  - type: text
    content: to give his people the knowledge of salvation
  - type: text
    content: through the forgiveness of their sins,
  '78':
  - type: text
    content: because of the tender mercy of our God,
  - type: text
    content: by which the rising sun will come to us from heaven
  '79':
  - type: text
    content: to shine on those living in darkness
  - type: text
    content: and in the shadow of death,
  - type: text
    content: to guide our feet into the path of peace.”
  '8':
  - type: text
    content: 'Once when Zechariah’s division was on duty and he was serving as priest before God, '
  '80':
  - type: text
    content: And the child grew and became strong in spirit
  - type: note
    content: Or in the Spirit
  - type: text
    content: ; and he lived in the wilderness until he appeared publicly to Israel.
  '9':
  - type: text
    content: 'he was chosen by lot, according to the custom of the priesthood, to go into the temple of the Lord and burn incense. '
