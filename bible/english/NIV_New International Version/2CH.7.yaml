document_id: 2CH.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Dedication of the Temple
  - type: text
    content: 'When Solomon finished praying, fire came down from heaven and consumed the burnt offering and the sacrifices, and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the temple. '
  '10':
  - type: text
    content: 'On the twenty-third day of the seventh month he sent the people to their homes, joyful and glad in heart for the good things the '
  - type: text
    content: Lord
  - type: text
    content: ' had done for David and Solomon and for his people Israel.'
  - type: heading
    content: The Lord Appears to Solomon
  '11':
  - type: text
    content: 'When Solomon had finished the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the royal palace, and had succeeded in carrying out all he had in mind to do in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in his own palace, '
  '12':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him at night and said:'
  - type: text
    content: “I have heard your prayer and have chosen this place for myself as a temple for sacrifices.
  '13':
  - type: text
    content: '“When I shut up the heavens so that there is no rain, or command locusts to devour the land or send a plague among my people, '
  '14':
  - type: text
    content: 'if my people, who are called by my name, will humble themselves and pray and seek my face and turn from their wicked ways, then I will hear from heaven, and I will forgive their sin and will heal their land. '
  '15':
  - type: text
    content: 'Now my eyes will be open and my ears attentive to the prayers offered in this place. '
  '16':
  - type: text
    content: I have chosen and consecrated this temple so that my Name may be there forever. My eyes and my heart will always be there.
  '17':
  - type: text
    content: '“As for you, if you walk before me faithfully as David your father did, and do all I command, and observe my decrees and laws, '
  '18':
  - type: text
    content: I will establish your royal throne, as I covenanted with David your father when I said, ‘You shall never fail to have a successor to rule over Israel.’
  '19':
  - type: text
    content: “But if you
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' turn away and forsake the decrees and commands I have given you'
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' and go off to serve other gods and worship them, '
  '2':
  - type: text
    content: 'The priests could not enter the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' because the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled it. '
  '20':
  - type: text
    content: 'then I will uproot Israel from my land, which I have given them, and will reject this temple I have consecrated for my Name. I will make it a byword and an object of ridicule among all peoples. '
  '21':
  - type: text
    content: This temple will become a heap of rubble. All
  - type: note
    content: See some Septuagint manuscripts, Old Latin, Syriac, Arabic and Targum; Hebrew And though this temple is now so imposing, all
  - type: text
    content: ' who pass by will be appalled and say, ‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' done such a thing to this land and to this temple?’ '
  '22':
  - type: text
    content: 'People will answer, ‘Because they have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, who brought them out of Egypt, and have embraced other gods, worshiping and serving them—that is why he brought all this disaster on them.’ ”'
  '3':
  - type: text
    content: 'When all the Israelites saw the fire coming down and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' above the temple, they knelt on the pavement with their faces to the ground, and they worshiped and gave thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', saying,'
  - type: text
    content: “He is good;
  - type: text
    content: his love endures forever.”
  '4':
  - type: text
    content: 'Then the king and all the people offered sacrifices before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'And King Solomon offered a sacrifice of twenty-two thousand head of cattle and a hundred and twenty thousand sheep and goats. So the king and all the people dedicated the temple of God. '
  '6':
  - type: text
    content: 'The priests took their positions, as did the Levites with the '
  - type: text
    content: Lord
  - type: text
    content: '’s musical instruments, which King David had made for praising the '
  - type: text
    content: Lord
  - type: text
    content: ' and which were used when he gave thanks, saying, “His love endures forever.” Opposite the Levites, the priests blew their trumpets, and all the Israelites were standing.'
  '7':
  - type: text
    content: 'Solomon consecrated the middle part of the courtyard in front of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and there he offered burnt offerings and the fat of the fellowship offerings, because the bronze altar he had made could not hold the burnt offerings, the grain offerings and the fat portions.'
  '8':
  - type: text
    content: 'So Solomon observed the festival at that time for seven days, and all Israel with him—a vast assembly, people from Lebo Hamath to the Wadi of Egypt. '
  '9':
  - type: text
    content: 'On the eighth day they held an assembly, for they had celebrated the dedication of the altar for seven days and the festival for seven days more. '
