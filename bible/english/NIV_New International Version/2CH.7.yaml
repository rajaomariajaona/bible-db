document_id: 2CH.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Dedication of the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Solomon finished praying, fire came down from heaven and consumed the burnt offering and the sacrifices, and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled the temple. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the twenty-third day of the seventh month he sent the people to their homes, joyful and glad in heart for the good things the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had done for David and Solomon and for his people Israel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Appears to Solomon'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Solomon had finished the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the royal palace, and had succeeded in carrying out all he had in mind to do in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and in his own palace, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to him at night and said:'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: “I have heard your prayer and have chosen this place for myself as a temple for sacrifices.
  '13':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“When I shut up the heavens so that there is no rain, or command locusts to devour the land or send a plague among my people, '
  '14':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'if my people, who are called by my name, will humble themselves and pray and seek my face and turn from their wicked ways, then I will hear from heaven, and I will forgive their sin and will heal their land. '
  '15':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'Now my eyes will be open and my ears attentive to the prayers offered in this place. '
  '16':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: I have chosen and consecrated this temple so that my Name may be there forever. My eyes and my heart will always be there.
  '17':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“As for you, if you walk before me faithfully as David your father did, and do all I command, and observe my decrees and laws, '
  '18':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: I will establish your royal throne, as I covenanted with David your father when I said, ‘You shall never fail to have a successor to rule over Israel.’
  '19':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: “But if you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is plural.
      marker-yv: yv-n
    - type: text
      text: ' turn away and forsake the decrees and commands I have given you'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is plural.
      marker-yv: yv-n
    - type: text
      text: ' and go off to serve other gods and worship them, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The priests could not enter the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' because the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' filled it. '
  '20':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'then I will uproot Israel from my land, which I have given them, and will reject this temple I have consecrated for my Name. I will make it a byword and an object of ridicule among all peoples. '
  '21':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: This temple will become a heap of rubble. All
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See some Septuagint manuscripts, Old Latin, Syriac, Arabic and Targum; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: And though this temple is now so imposing, all
      marker-yv: yv-n
    - type: text
      text: ' who pass by will be appalled and say, ‘Why has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' done such a thing to this land and to this temple?’ '
  '22':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'People will answer, ‘Because they have forsaken the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors, who brought them out of Egypt, and have embraced other gods, worshiping and serving them—that is why he brought all this disaster on them.’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the Israelites saw the fire coming down and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' above the temple, they knelt on the pavement with their faces to the ground, and they worshiped and gave thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He is good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his love endures forever.”
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then the king and all the people offered sacrifices before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And King Solomon offered a sacrifice of twenty-two thousand head of cattle and a hundred and twenty thousand sheep and goats. So the king and all the people dedicated the temple of God. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The priests took their positions, as did the Levites with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s musical instruments, which King David had made for praising the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and which were used when he gave thanks, saying, “His love endures forever.” Opposite the Levites, the priests blew their trumpets, and all the Israelites were standing.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon consecrated the middle part of the courtyard in front of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and there he offered burnt offerings and the fat of the fellowship offerings, because the bronze altar he had made could not hold the burnt offerings, the grain offerings and the fat portions.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Solomon observed the festival at that time for seven days, and all Israel with him—a vast assembly, people from Lebo Hamath to the Wadi of Egypt. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the eighth day they held an assembly, for they had celebrated the dedication of the altar for seven days and the festival for seven days more. '
