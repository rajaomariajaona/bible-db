document_id: PRO.30
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Sayings of Agur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The sayings of Agur son of Jakeh—an inspired utterance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'This man’s utterance to Ithiel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am weary, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I can prevail.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'With a different word division of the Hebrew; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'utterance to Ithiel, / to Ithiel and Ukal:'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Surely I am only a brute, not a man;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I do not have human understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I have not learned wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor have I attained to the knowledge of the Holy One.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who has gone up to heaven and come down?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whose hands have gathered up the wind?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has wrapped up the waters in a cloak?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who has established all the ends of the earth?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What is his name, and what is the name of his son?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely you know!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Every word of God is flawless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is a shield to those who take refuge in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Do not add to his words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or he will rebuke you and prove you a liar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Two things I ask of you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'do not refuse me before I die:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Keep falsehood and lies far from me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: give me neither poverty nor riches,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but give me only my daily bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Otherwise, I may have too much and disown you
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and say, ‘Who is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or I may become poor and steal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and so dishonor the name of my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Do not slander a servant to their master,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or they will curse you, and you will pay for it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “There are those who curse their fathers
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not bless their mothers;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: those who are pure in their own eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and yet are not cleansed of their filth;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: those whose eyes are ever so haughty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose glances are so disdainful;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: those whose teeth are swords
- type: usfm
  marker: q2
  children:
  - type: text
    text: and whose jaws are set with knives
- type: usfm
  marker: q1
  children:
  - type: text
    text: to devour the poor from the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the needy from among mankind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “The leech has two daughters.
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Give! Give!’ they cry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “There are three things that are never satisfied,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'four that never say, ‘Enough!’:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: the grave, the barren womb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: land, which is never satisfied with water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fire, which never says, ‘Enough!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “The eye that mocks a father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that scorns an aged mother,
- type: usfm
  marker: q1
  children:
  - type: text
    text: will be pecked out by the ravens of the valley,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be eaten by the vultures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “There are three things that are too amazing for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'four that I do not understand:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: the way of an eagle in the sky,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the way of a snake on a rock,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the way of a ship on the high seas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the way of a man with a young woman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“This is the way of an adulterous woman:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: She eats and wipes her mouth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and says, ‘I’ve done nothing wrong.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Under three things the earth trembles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'under four it cannot bear up:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: a servant who becomes king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a godless fool who gets plenty to eat,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: a contemptible woman who gets married,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a servant who displaces her mistress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Four things on earth are small,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'yet they are extremely wise:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ants are creatures of little strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet they store up their food in the summer;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: hyraxes are creatures of little power,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet they make their home in the crags;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: locusts have no king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet they advance together in ranks;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: a lizard can be caught with the hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet it is found in kings’ palaces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “There are three things that are stately in their stride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'four that move with stately bearing:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: a lion, mighty among beasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who retreats before nothing;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: a strutting rooster, a he-goat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a king secure against revolt.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this phrase is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: “If you play the fool and exalt yourself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or if you plan evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: clap your hand over your mouth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: For as churning cream produces butter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and as twisting the nose produces blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so stirring up anger produces strife.”
