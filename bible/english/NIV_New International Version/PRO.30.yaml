document_id: PRO.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Sayings of Agur
  - type: text
    content: The sayings of Agur son of Jakeh—an inspired utterance.
  - type: text
    content: 'This man’s utterance to Ithiel:'
  - type: text
    content: “I am weary, God,
  - type: text
    content: but I can prevail.
  - type: note
    content: 'With a different word division of the Hebrew; Masoretic Text utterance to Ithiel, / to Ithiel and Ukal:'
  '10':
  - type: text
    content: “Do not slander a servant to their master,
  - type: text
    content: or they will curse you, and you will pay for it.
  '11':
  - type: text
    content: “There are those who curse their fathers
  - type: text
    content: and do not bless their mothers;
  '12':
  - type: text
    content: those who are pure in their own eyes
  - type: text
    content: and yet are not cleansed of their filth;
  '13':
  - type: text
    content: those whose eyes are ever so haughty,
  - type: text
    content: whose glances are so disdainful;
  '14':
  - type: text
    content: those whose teeth are swords
  - type: text
    content: and whose jaws are set with knives
  - type: text
    content: to devour the poor from the earth
  - type: text
    content: and the needy from among mankind.
  '15':
  - type: text
    content: “The leech has two daughters.
  - type: text
    content: ‘Give! Give!’ they cry.
  - type: text
    content: “There are three things that are never satisfied,
  - type: text
    content: 'four that never say, ‘Enough!’:'
  '16':
  - type: text
    content: the grave, the barren womb,
  - type: text
    content: land, which is never satisfied with water,
  - type: text
    content: and fire, which never says, ‘Enough!’
  '17':
  - type: text
    content: “The eye that mocks a father,
  - type: text
    content: that scorns an aged mother,
  - type: text
    content: will be pecked out by the ravens of the valley,
  - type: text
    content: will be eaten by the vultures.
  '18':
  - type: text
    content: “There are three things that are too amazing for me,
  - type: text
    content: 'four that I do not understand:'
  '19':
  - type: text
    content: the way of an eagle in the sky,
  - type: text
    content: the way of a snake on a rock,
  - type: text
    content: the way of a ship on the high seas,
  - type: text
    content: and the way of a man with a young woman.
  '2':
  - type: text
    content: Surely I am only a brute, not a man;
  - type: text
    content: I do not have human understanding.
  '20':
  - type: text
    content: '“This is the way of an adulterous woman:'
  - type: text
    content: She eats and wipes her mouth
  - type: text
    content: and says, ‘I’ve done nothing wrong.’
  '21':
  - type: text
    content: “Under three things the earth trembles,
  - type: text
    content: 'under four it cannot bear up:'
  '22':
  - type: text
    content: a servant who becomes king,
  - type: text
    content: a godless fool who gets plenty to eat,
  '23':
  - type: text
    content: a contemptible woman who gets married,
  - type: text
    content: and a servant who displaces her mistress.
  '24':
  - type: text
    content: “Four things on earth are small,
  - type: text
    content: 'yet they are extremely wise:'
  '25':
  - type: text
    content: Ants are creatures of little strength,
  - type: text
    content: yet they store up their food in the summer;
  '26':
  - type: text
    content: hyraxes are creatures of little power,
  - type: text
    content: yet they make their home in the crags;
  '27':
  - type: text
    content: locusts have no king,
  - type: text
    content: yet they advance together in ranks;
  '28':
  - type: text
    content: a lizard can be caught with the hand,
  - type: text
    content: yet it is found in kings’ palaces.
  '29':
  - type: text
    content: “There are three things that are stately in their stride,
  - type: text
    content: 'four that move with stately bearing:'
  '3':
  - type: text
    content: I have not learned wisdom,
  - type: text
    content: nor have I attained to the knowledge of the Holy One.
  '30':
  - type: text
    content: a lion, mighty among beasts,
  - type: text
    content: who retreats before nothing;
  '31':
  - type: text
    content: a strutting rooster, a he-goat,
  - type: text
    content: and a king secure against revolt.
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  '32':
  - type: text
    content: “If you play the fool and exalt yourself,
  - type: text
    content: or if you plan evil,
  - type: text
    content: clap your hand over your mouth!
  '33':
  - type: text
    content: For as churning cream produces butter,
  - type: text
    content: and as twisting the nose produces blood,
  - type: text
    content: so stirring up anger produces strife.”
  '4':
  - type: text
    content: Who has gone up to heaven and come down?
  - type: text
    content: Whose hands have gathered up the wind?
  - type: text
    content: Who has wrapped up the waters in a cloak?
  - type: text
    content: Who has established all the ends of the earth?
  - type: text
    content: What is his name, and what is the name of his son?
  - type: text
    content: Surely you know!
  '5':
  - type: text
    content: “Every word of God is flawless;
  - type: text
    content: he is a shield to those who take refuge in him.
  '6':
  - type: text
    content: Do not add to his words,
  - type: text
    content: or he will rebuke you and prove you a liar.
  '7':
  - type: text
    content: '“Two things I ask of you, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'do not refuse me before I die:'
  '8':
  - type: text
    content: Keep falsehood and lies far from me;
  - type: text
    content: give me neither poverty nor riches,
  - type: text
    content: but give me only my daily bread.
  '9':
  - type: text
    content: Otherwise, I may have too much and disown you
  - type: text
    content: 'and say, ‘Who is the '
  - type: text
    content: Lord
  - type: text
    content: ?’
  - type: text
    content: Or I may become poor and steal,
  - type: text
    content: and so dishonor the name of my God.
