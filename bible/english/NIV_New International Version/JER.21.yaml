document_id: JER.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God Rejects Zedekiah’s Request
  - type: text
    content: 'The word came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ' when King Zedekiah sent to him Pashhur son of Malkijah and the priest Zephaniah son of Maaseiah. They said: '
  '10':
  - type: text
    content: 'I have determined to do this city harm and not good, declares the '
  - type: text
    content: Lord
  - type: text
    content: . It will be given into the hands of the king of Babylon, and he will destroy it with fire.’
  '11':
  - type: text
    content: '“Moreover, say to the royal house of Judah, ‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to you, house of David:'
  - type: text
    content: “ ‘Administer justice every morning;
  - type: text
    content: rescue from the hand of the oppressor
  - type: text
    content: the one who has been robbed,
  - type: text
    content: or my wrath will break out and burn like fire
  - type: text
    content: because of the evil you have done—
  - type: text
    content: burn with no one to quench it.
  '13':
  - type: text
    content: I am against you, Jerusalem,
  - type: text
    content: you who live above this valley
  - type: text
    content: 'on the rocky plateau, declares the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: you who say, “Who can come against us?
  - type: text
    content: Who can enter our refuge?”
  '14':
  - type: text
    content: I will punish you as your deeds deserve,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I will kindle a fire in your forests
  - type: text
    content: that will consume everything around you.’ ”
  '2':
  - type: text
    content: '“Inquire now of the '
  - type: text
    content: Lord
  - type: text
    content: ' for us because Nebuchadnezzar'
  - type: note
    content: Hebrew Nebuchadrezzar, of which Nebuchadnezzar is a variant; here and often in Jeremiah and Ezekiel
  - type: text
    content: ' king of Babylon is attacking us. Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will perform wonders for us as in times past so that he will withdraw from us.”'
  '3':
  - type: text
    content: 'But Jeremiah answered them, “Tell Zedekiah, '
  '4':
  - type: text
    content: '‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: I am about to turn against you the weapons of war that are in your hands, which you are using to fight the king of Babylon and the Babylonians'
  - type: note
    content: Or Chaldeans; also in verse 9
  - type: text
    content: ' who are outside the wall besieging you. And I will gather them inside this city. '
  '5':
  - type: text
    content: 'I myself will fight against you with an outstretched hand and a mighty arm in furious anger and in great wrath. '
  '6':
  - type: text
    content: 'I will strike down those who live in this city—both man and beast—and they will die of a terrible plague. '
  '7':
  - type: text
    content: 'After that, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', I will give Zedekiah king of Judah, his officials and the people in this city who survive the plague, sword and famine, into the hands of Nebuchadnezzar king of Babylon and to their enemies who want to kill them. He will put them to the sword; he will show them no mercy or pity or compassion.’'
  '8':
  - type: text
    content: '“Furthermore, tell the people, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: See, I am setting before you the way of life and the way of death. '
  '9':
  - type: text
    content: 'Whoever stays in this city will die by the sword, famine or plague. But whoever goes out and surrenders to the Babylonians who are besieging you will live; they will escape with their lives. '
