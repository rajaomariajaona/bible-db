document_id: JER.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Rejects Zedekiah’s Request
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word came to Jeremiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' when King Zedekiah sent to him Pashhur son of Malkijah and the priest Zephaniah son of Maaseiah. They said: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I have determined to do this city harm and not good, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . It will be given into the hands of the king of Babylon, and he will destroy it with fire.’
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Moreover, say to the royal house of Judah, ‘Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to you, house of David:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Administer justice every morning;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rescue from the hand of the oppressor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one who has been robbed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or my wrath will break out and burn like fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the evil you have done—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burn with no one to quench it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I am against you, Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who live above this valley
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'on the rocky plateau, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you who say, “Who can come against us?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can enter our refuge?”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will punish you as your deeds deserve,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will kindle a fire in your forests
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will consume everything around you.’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Inquire now of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for us because Nebuchadnezzar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadrezzar, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'of which '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Nebuchadnezzar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a variant; here and often in Jeremiah and Ezekiel
      marker-yv: yv-n
    - type: text
      text: ' king of Babylon is attacking us. Perhaps the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will perform wonders for us as in times past so that he will withdraw from us.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But Jeremiah answered them, “Tell Zedekiah, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: I am about to turn against you the weapons of war that are in your hands, which you are using to fight the king of Babylon and the Babylonians'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 9
      marker-yv: yv-n
    - type: text
      text: ' who are outside the wall besieging you. And I will gather them inside this city. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I myself will fight against you with an outstretched hand and a mighty arm in furious anger and in great wrath. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I will strike down those who live in this city—both man and beast—and they will die of a terrible plague. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'After that, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I will give Zedekiah king of Judah, his officials and the people in this city who survive the plague, sword and famine, into the hands of Nebuchadnezzar king of Babylon and to their enemies who want to kill them. He will put them to the sword; he will show them no mercy or pity or compassion.’'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Furthermore, tell the people, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: See, I am setting before you the way of life and the way of death. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Whoever stays in this city will die by the sword, famine or plague. But whoever goes out and surrenders to the Babylonians who are besieging you will live; they will escape with their lives. '
