document_id: PSA.124,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 124
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of ascents. Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had not been on our side—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let Israel say—
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'if the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had not been on our side'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when people attacked us,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they would have swallowed us alive
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when their anger flared against us;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the flood would have engulfed us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the torrent would have swept over us,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the raging waters
  - type: usfm
    marker: q2
    children:
    - type: text
      text: would have swept us away.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who has not let us be torn by their teeth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have escaped like a bird
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the fowler’s snare;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the snare has been broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and we have escaped.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Our help is in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Maker of heaven and earth.
