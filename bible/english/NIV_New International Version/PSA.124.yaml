document_id: PSA.124,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 124
  - type: text
    content: A song of ascents. Of David.
  - type: text
    content: 'If the '
  - type: text
    content: Lord
  - type: text
    content: ' had not been on our side—'
  - type: text
    content: let Israel say—
  '2':
  - type: text
    content: 'if the '
  - type: text
    content: Lord
  - type: text
    content: ' had not been on our side'
  - type: text
    content: when people attacked us,
  '3':
  - type: text
    content: they would have swallowed us alive
  - type: text
    content: when their anger flared against us;
  '4':
  - type: text
    content: the flood would have engulfed us,
  - type: text
    content: the torrent would have swept over us,
  '5':
  - type: text
    content: the raging waters
  - type: text
    content: would have swept us away.
  '6':
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who has not let us be torn by their teeth.
  '7':
  - type: text
    content: We have escaped like a bird
  - type: text
    content: from the fowler’s snare;
  - type: text
    content: the snare has been broken,
  - type: text
    content: and we have escaped.
  '8':
  - type: text
    content: 'Our help is in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the Maker of heaven and earth.
