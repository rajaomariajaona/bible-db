document_id: PRO.20,111
type_code: eng
verses:
  '1':
  - type: text
    content: Wine is a mocker and beer a brawler;
  - type: text
    content: whoever is led astray by them is not wise.
  '10':
  - type: text
    content: Differing weights and differing measures—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' detests them both.'
  '11':
  - type: text
    content: Even small children are known by their actions,
  - type: text
    content: so is their conduct really pure and upright?
  '12':
  - type: text
    content: Ears that hear and eyes that see—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has made them both.'
  '13':
  - type: text
    content: Do not love sleep or you will grow poor;
  - type: text
    content: stay awake and you will have food to spare.
  '14':
  - type: text
    content: “It’s no good, it’s no good!” says the buyer—
  - type: text
    content: then goes off and boasts about the purchase.
  '15':
  - type: text
    content: Gold there is, and rubies in abundance,
  - type: text
    content: but lips that speak knowledge are a rare jewel.
  '16':
  - type: text
    content: Take the garment of one who puts up security for a stranger;
  - type: text
    content: hold it in pledge if it is done for an outsider.
  '17':
  - type: text
    content: Food gained by fraud tastes sweet,
  - type: text
    content: but one ends up with a mouth full of gravel.
  '18':
  - type: text
    content: Plans are established by seeking advice;
  - type: text
    content: so if you wage war, obtain guidance.
  '19':
  - type: text
    content: A gossip betrays a confidence;
  - type: text
    content: so avoid anyone who talks too much.
  '2':
  - type: text
    content: A king’s wrath strikes terror like the roar of a lion;
  - type: text
    content: those who anger him forfeit their lives.
  '20':
  - type: text
    content: If someone curses their father or mother,
  - type: text
    content: their lamp will be snuffed out in pitch darkness.
  '21':
  - type: text
    content: An inheritance claimed too soon
  - type: text
    content: will not be blessed at the end.
  '22':
  - type: text
    content: Do not say, “I’ll pay you back for this wrong!”
  - type: text
    content: 'Wait for the '
  - type: text
    content: Lord
  - type: text
    content: ', and he will avenge you.'
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests differing weights,'
  - type: text
    content: and dishonest scales do not please him.
  '24':
  - type: text
    content: 'A person’s steps are directed by the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: How then can anyone understand their own way?
  '25':
  - type: text
    content: It is a trap to dedicate something rashly
  - type: text
    content: and only later to consider one’s vows.
  '26':
  - type: text
    content: A wise king winnows out the wicked;
  - type: text
    content: he drives the threshing wheel over them.
  '27':
  - type: text
    content: The human spirit is
  - type: note
    content: Or A person’s words are
  - type: text
    content: ' the lamp of the '
  - type: text
    content: Lord
  - type: text
    content: that sheds light on one’s inmost being.
  '28':
  - type: text
    content: Love and faithfulness keep a king safe;
  - type: text
    content: through love his throne is made secure.
  '29':
  - type: text
    content: The glory of young men is their strength,
  - type: text
    content: gray hair the splendor of the old.
  '3':
  - type: text
    content: It is to one’s honor to avoid strife,
  - type: text
    content: but every fool is quick to quarrel.
  '30':
  - type: text
    content: Blows and wounds scrub away evil,
  - type: text
    content: and beatings purge the inmost being.
  '4':
  - type: text
    content: Sluggards do not plow in season;
  - type: text
    content: so at harvest time they look but find nothing.
  '5':
  - type: text
    content: The purposes of a person’s heart are deep waters,
  - type: text
    content: but one who has insight draws them out.
  '6':
  - type: text
    content: Many claim to have unfailing love,
  - type: text
    content: but a faithful person who can find?
  '7':
  - type: text
    content: The righteous lead blameless lives;
  - type: text
    content: blessed are their children after them.
  '8':
  - type: text
    content: When a king sits on his throne to judge,
  - type: text
    content: he winnows out all evil with his eyes.
  '9':
  - type: text
    content: Who can say, “I have kept my heart pure;
  - type: text
    content: I am clean and without sin”?
