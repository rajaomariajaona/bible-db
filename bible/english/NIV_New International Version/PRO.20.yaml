document_id: PRO.20,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wine is a mocker and beer a brawler;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever is led astray by them is not wise.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Differing weights and differing measures—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' detests them both.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even small children are known by their actions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so is their conduct really pure and upright?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ears that hear and eyes that see—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has made them both.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not love sleep or you will grow poor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stay awake and you will have food to spare.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “It’s no good, it’s no good!” says the buyer—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then goes off and boasts about the purchase.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gold there is, and rubies in abundance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but lips that speak knowledge are a rare jewel.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take the garment of one who puts up security for a stranger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hold it in pledge if it is done for an outsider.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Food gained by fraud tastes sweet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but one ends up with a mouth full of gravel.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plans are established by seeking advice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so if you wage war, obtain guidance.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A gossip betrays a confidence;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so avoid anyone who talks too much.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A king’s wrath strikes terror like the roar of a lion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who anger him forfeit their lives.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If someone curses their father or mother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their lamp will be snuffed out in pitch darkness.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An inheritance claimed too soon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will not be blessed at the end.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not say, “I’ll pay you back for this wrong!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Wait for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he will avenge you.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' detests differing weights,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dishonest scales do not please him.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A person’s steps are directed by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How then can anyone understand their own way?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is a trap to dedicate something rashly
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and only later to consider one’s vows.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise king winnows out the wicked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he drives the threshing wheel over them.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The human spirit is
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A person’s words are
      marker-yv: yv-n
    - type: text
      text: ' the lamp of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that sheds light on one’s inmost being.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Love and faithfulness keep a king safe;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through love his throne is made secure.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The glory of young men is their strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gray hair the splendor of the old.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is to one’s honor to avoid strife,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but every fool is quick to quarrel.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blows and wounds scrub away evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and beatings purge the inmost being.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sluggards do not plow in season;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so at harvest time they look but find nothing.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The purposes of a person’s heart are deep waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but one who has insight draws them out.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many claim to have unfailing love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a faithful person who can find?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous lead blameless lives;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blessed are their children after them.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When a king sits on his throne to judge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he winnows out all evil with his eyes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can say, “I have kept my heart pure;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am clean and without sin”?
