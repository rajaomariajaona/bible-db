document_id: PRO.20
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Wine is a mocker and beer a brawler;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever is led astray by them is not wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A king’s wrath strikes terror like the roar of a lion;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who anger him forfeit their lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It is to one’s honor to avoid strife,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but every fool is quick to quarrel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sluggards do not plow in season;
- type: usfm
  marker: q2
  children:
  - type: text
    text: so at harvest time they look but find nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The purposes of a person’s heart are deep waters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but one who has insight draws them out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Many claim to have unfailing love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a faithful person who can find?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The righteous lead blameless lives;
- type: usfm
  marker: q2
  children:
  - type: text
    text: blessed are their children after them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When a king sits on his throne to judge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he winnows out all evil with his eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Who can say, “I have kept my heart pure;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am clean and without sin”?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Differing weights and differing measures—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests them both.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Even small children are known by their actions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so is their conduct really pure and upright?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ears that hear and eyes that see—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has made them both.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Do not love sleep or you will grow poor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: stay awake and you will have food to spare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “It’s no good, it’s no good!” says the buyer—
- type: usfm
  marker: q2
  children:
  - type: text
    text: then goes off and boasts about the purchase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Gold there is, and rubies in abundance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but lips that speak knowledge are a rare jewel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Take the garment of one who puts up security for a stranger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hold it in pledge if it is done for an outsider.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Food gained by fraud tastes sweet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but one ends up with a mouth full of gravel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Plans are established by seeking advice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: so if you wage war, obtain guidance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A gossip betrays a confidence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: so avoid anyone who talks too much.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: If someone curses their father or mother,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their lamp will be snuffed out in pitch darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: An inheritance claimed too soon
- type: usfm
  marker: q2
  children:
  - type: text
    text: will not be blessed at the end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Do not say, “I’ll pay you back for this wrong!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Wait for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and he will avenge you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests differing weights,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dishonest scales do not please him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A person’s steps are directed by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: How then can anyone understand their own way?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: It is a trap to dedicate something rashly
- type: usfm
  marker: q2
  children:
  - type: text
    text: and only later to consider one’s vows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A wise king winnows out the wicked;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he drives the threshing wheel over them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The human spirit is
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: A person’s words are
    marker-yv: yv-n
  - type: text
    text: ' the lamp of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: that sheds light on one’s inmost being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Love and faithfulness keep a king safe;
- type: usfm
  marker: q2
  children:
  - type: text
    text: through love his throne is made secure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The glory of young men is their strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gray hair the splendor of the old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Blows and wounds scrub away evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and beatings purge the inmost being.
