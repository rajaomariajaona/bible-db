document_id: JOB.39,111
type_code: eng
verses:
  '1':
  - type: text
    content: “Do you know when the mountain goats give birth?
  - type: text
    content: Do you watch when the doe bears her fawn?
  '10':
  - type: text
    content: Can you hold it to the furrow with a harness?
  - type: text
    content: Will it till the valleys behind you?
  '11':
  - type: text
    content: Will you rely on it for its great strength?
  - type: text
    content: Will you leave your heavy work to it?
  '12':
  - type: text
    content: Can you trust it to haul in your grain
  - type: text
    content: and bring it to your threshing floor?
  '13':
  - type: text
    content: “The wings of the ostrich flap joyfully,
  - type: text
    content: though they cannot compare
  - type: text
    content: with the wings and feathers of the stork.
  '14':
  - type: text
    content: She lays her eggs on the ground
  - type: text
    content: and lets them warm in the sand,
  '15':
  - type: text
    content: unmindful that a foot may crush them,
  - type: text
    content: that some wild animal may trample them.
  '16':
  - type: text
    content: She treats her young harshly, as if they were not hers;
  - type: text
    content: she cares not that her labor was in vain,
  '17':
  - type: text
    content: for God did not endow her with wisdom
  - type: text
    content: or give her a share of good sense.
  '18':
  - type: text
    content: Yet when she spreads her feathers to run,
  - type: text
    content: she laughs at horse and rider.
  '19':
  - type: text
    content: “Do you give the horse its strength
  - type: text
    content: or clothe its neck with a flowing mane?
  '2':
  - type: text
    content: Do you count the months till they bear?
  - type: text
    content: Do you know the time they give birth?
  '20':
  - type: text
    content: Do you make it leap like a locust,
  - type: text
    content: striking terror with its proud snorting?
  '21':
  - type: text
    content: It paws fiercely, rejoicing in its strength,
  - type: text
    content: and charges into the fray.
  '22':
  - type: text
    content: It laughs at fear, afraid of nothing;
  - type: text
    content: it does not shy away from the sword.
  '23':
  - type: text
    content: The quiver rattles against its side,
  - type: text
    content: along with the flashing spear and lance.
  '24':
  - type: text
    content: In frenzied excitement it eats up the ground;
  - type: text
    content: it cannot stand still when the trumpet sounds.
  '25':
  - type: text
    content: At the blast of the trumpet it snorts, ‘Aha!’
  - type: text
    content: It catches the scent of battle from afar,
  - type: text
    content: the shout of commanders and the battle cry.
  '26':
  - type: text
    content: “Does the hawk take flight by your wisdom
  - type: text
    content: and spread its wings toward the south?
  '27':
  - type: text
    content: Does the eagle soar at your command
  - type: text
    content: and build its nest on high?
  '28':
  - type: text
    content: It dwells on a cliff and stays there at night;
  - type: text
    content: a rocky crag is its stronghold.
  '29':
  - type: text
    content: From there it looks for food;
  - type: text
    content: its eyes detect it from afar.
  '3':
  - type: text
    content: They crouch down and bring forth their young;
  - type: text
    content: their labor pains are ended.
  '30':
  - type: text
    content: Its young ones feast on blood,
  - type: text
    content: and where the slain are, there it is.”
  '4':
  - type: text
    content: Their young thrive and grow strong in the wilds;
  - type: text
    content: they leave and do not return.
  '5':
  - type: text
    content: “Who let the wild donkey go free?
  - type: text
    content: Who untied its ropes?
  '6':
  - type: text
    content: I gave it the wasteland as its home,
  - type: text
    content: the salt flats as its habitat.
  '7':
  - type: text
    content: It laughs at the commotion in the town;
  - type: text
    content: it does not hear a driver’s shout.
  '8':
  - type: text
    content: It ranges the hills for its pasture
  - type: text
    content: and searches for any green thing.
  '9':
  - type: text
    content: “Will the wild ox consent to serve you?
  - type: text
    content: Will it stay by your manger at night?
