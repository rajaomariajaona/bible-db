document_id: JOB.39
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Do you know when the mountain goats give birth?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you watch when the doe bears her fawn?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Do you count the months till they bear?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do you know the time they give birth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They crouch down and bring forth their young;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their labor pains are ended.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Their young thrive and grow strong in the wilds;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they leave and do not return.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Who let the wild donkey go free?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who untied its ropes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I gave it the wasteland as its home,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the salt flats as its habitat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It laughs at the commotion in the town;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it does not hear a driver’s shout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: It ranges the hills for its pasture
- type: usfm
  marker: q2
  children:
  - type: text
    text: and searches for any green thing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Will the wild ox consent to serve you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will it stay by your manger at night?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Can you hold it to the furrow with a harness?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will it till the valleys behind you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Will you rely on it for its great strength?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you leave your heavy work to it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Can you trust it to haul in your grain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring it to your threshing floor?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “The wings of the ostrich flap joyfully,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though they cannot compare
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the wings and feathers of the stork.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: She lays her eggs on the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lets them warm in the sand,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: unmindful that a foot may crush them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that some wild animal may trample them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: She treats her young harshly, as if they were not hers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: she cares not that her labor was in vain,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: for God did not endow her with wisdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: or give her a share of good sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Yet when she spreads her feathers to run,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she laughs at horse and rider.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Do you give the horse its strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: or clothe its neck with a flowing mane?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Do you make it leap like a locust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: striking terror with its proud snorting?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It paws fiercely, rejoicing in its strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and charges into the fray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: It laughs at fear, afraid of nothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it does not shy away from the sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The quiver rattles against its side,
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with the flashing spear and lance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: In frenzied excitement it eats up the ground;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it cannot stand still when the trumpet sounds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: At the blast of the trumpet it snorts, ‘Aha!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: It catches the scent of battle from afar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the shout of commanders and the battle cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Does the hawk take flight by your wisdom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spread its wings toward the south?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Does the eagle soar at your command
- type: usfm
  marker: q2
  children:
  - type: text
    text: and build its nest on high?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: It dwells on a cliff and stays there at night;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a rocky crag is its stronghold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: From there it looks for food;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its eyes detect it from afar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Its young ones feast on blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and where the slain are, there it is.”
