document_id: JHN.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Goes to the Festival of Tabernacles
  - type: text
    content: After this, Jesus went around in Galilee. He did not want
  - type: note
    content: Some manuscripts not have authority
  - type: text
    content: ' to go about in Judea because the Jewish leaders there were looking for a way to kill him. '
  '10':
  - type: text
    content: 'However, after his brothers had left for the festival, he went also, not publicly, but in secret. '
  '11':
  - type: text
    content: Now at the festival the Jewish leaders were watching for Jesus and asking, “Where is he?”
  '12':
  - type: text
    content: Among the crowds there was widespread whispering about him. Some said, “He is a good man.”
  - type: text
    content: 'Others replied, “No, he deceives the people.” '
  '13':
  - type: text
    content: But no one would say anything publicly about him for fear of the leaders.
  - type: heading
    content: Jesus Teaches at the Festival
  '14':
  - type: text
    content: 'Not until halfway through the festival did Jesus go up to the temple courts and begin to teach. '
  '15':
  - type: text
    content: The Jews there were amazed and asked, “How did this man get such learning without having been taught?”
  '16':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “My teaching is not my own. It comes from the one who sent me.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Anyone who chooses to do the will of God will find out whether my teaching comes from God or whether I speak on my own.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Whoever speaks on their own does so to gain personal glory, but he who seeks the glory of the one who sent him is a man of truth; there is nothing false about him.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Has not Moses given you the law? Yet not one of you keeps the law. Why are you trying to kill me?”
  '2':
  - type: text
    content: 'But when the Jewish Festival of Tabernacles was near, '
  '20':
  - type: text
    content: “You are demon-possessed,” the crowd answered. “Who is trying to kill you?”
  '21':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “I did one miracle, and you are all amazed.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Yet, because Moses gave you circumcision (though actually it did not come from Moses, but from the patriarchs), you circumcise a boy on the Sabbath.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Now if a boy can be circumcised on the Sabbath so that the law of Moses may not be broken, why are you angry with me for healing a man’s whole body on the Sabbath?
  - type: text
    content: ' '
  '24':
  - type: text
    content: Stop judging by mere appearances, but instead judge correctly.”
  - type: heading
    content: Division Over Who Jesus Is
  '25':
  - type: text
    content: 'At that point some of the people of Jerusalem began to ask, “Isn’t this the man they are trying to kill? '
  '26':
  - type: text
    content: 'Here he is, speaking publicly, and they are not saying a word to him. Have the authorities really concluded that he is the Messiah? '
  '27':
  - type: text
    content: But we know where this man is from; when the Messiah comes, no one will know where he is from.”
  '28':
  - type: text
    content: 'Then Jesus, still teaching in the temple courts, cried out, '
  - type: text
    content: “Yes, you know me, and you know where I am from. I am not here on my own authority, but he who sent me is true. You do not know him,
  - type: text
    content: ' '
  '29':
  - type: text
    content: but I know him because I am from him and he sent me.”
  '3':
  - type: text
    content: 'Jesus’ brothers said to him, “Leave Galilee and go to Judea, so that your disciples there may see the works you do. '
  '30':
  - type: text
    content: 'At this they tried to seize him, but no one laid a hand on him, because his hour had not yet come. '
  '31':
  - type: text
    content: Still, many in the crowd believed in him. They said, “When the Messiah comes, will he perform more signs than this man?”
  '32':
  - type: text
    content: The Pharisees heard the crowd whispering such things about him. Then the chief priests and the Pharisees sent temple guards to arrest him.
  '33':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “I am with you for only a short time, and then I am going to the one who sent me.
  - type: text
    content: ' '
  '34':
  - type: text
    content: You will look for me, but you will not find me; and where I am, you cannot come.”
  '35':
  - type: text
    content: 'The Jews said to one another, “Where does this man intend to go that we cannot find him? Will he go where our people live scattered among the Greeks, and teach the Greeks? '
  '36':
  - type: text
    content: 'What did he mean when he said, '
  - type: text
    content: ‘You will look for me, but you will not find me,’
  - type: text
    content: ' and '
  - type: text
    content: ‘Where I am, you cannot come’
  - type: text
    content: ?”
  '37':
  - type: text
    content: 'On the last and greatest day of the festival, Jesus stood and said in a loud voice, '
  - type: text
    content: “Let anyone who is thirsty come to me and drink.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Whoever believes in me, as Scripture has said, rivers of living water will flow from within them.”
  - type: note
    content: Or me. And let anyone drink 38 who believes in me.” As Scripture has said, “Out of him (or them) will flow rivers of living water.”
  - type: text
    content: ' '
  '39':
  - type: text
    content: By this he meant the Spirit, whom those who believed in him were later to receive. Up to that time the Spirit had not been given, since Jesus had not yet been glorified.
  '4':
  - type: text
    content: 'No one who wants to become a public figure acts in secret. Since you are doing these things, show yourself to the world.” '
  '40':
  - type: text
    content: On hearing his words, some of the people said, “Surely this man is the Prophet.”
  '41':
  - type: text
    content: Others said, “He is the Messiah.”
  - type: text
    content: 'Still others asked, “How can the Messiah come from Galilee? '
  '42':
  - type: text
    content: 'Does not Scripture say that the Messiah will come from David’s descendants and from Bethlehem, the town where David lived?” '
  '43':
  - type: text
    content: 'Thus the people were divided because of Jesus. '
  '44':
  - type: text
    content: Some wanted to seize him, but no one laid a hand on him.
  - type: heading
    content: Unbelief of the Jewish Leaders
  '45':
  - type: text
    content: Finally the temple guards went back to the chief priests and the Pharisees, who asked them, “Why didn’t you bring him in?”
  '46':
  - type: text
    content: “No one ever spoke the way this man does,” the guards replied.
  '47':
  - type: text
    content: '“You mean he has deceived you also?” the Pharisees retorted. '
  '48':
  - type: text
    content: '“Have any of the rulers or of the Pharisees believed in him? '
  '49':
  - type: text
    content: No! But this mob that knows nothing of the law—there is a curse on them.”
  '5':
  - type: text
    content: For even his own brothers did not believe in him.
  '50':
  - type: text
    content: 'Nicodemus, who had gone to Jesus earlier and who was one of their own number, asked, '
  '51':
  - type: text
    content: “Does our law condemn a man without first hearing him to find out what he has been doing?”
  '52':
  - type: text
    content: They replied, “Are you from Galilee, too? Look into it, and you will find that a prophet does not come out of Galilee.”
  - type: text
    content: '[The earliest manuscripts and many other ancient witnesses do not have John 7:53—8:11. A few manuscripts include these verses, wholly or in part, after John 7:36, John 21:25, Luke 21:38 or Luke 24:53.]'
  '53':
  - type: text
    content: ' '
  - type: text
    content: Then they all went home,
  '6':
  - type: text
    content: 'Therefore Jesus told them, '
  - type: text
    content: “My time is not yet here; for you any time will do.
  - type: text
    content: ' '
  '7':
  - type: text
    content: The world cannot hate you, but it hates me because I testify that its works are evil.
  - type: text
    content: ' '
  '8':
  - type: text
    content: You go to the festival. I am not
  - type: note
    content: Some manuscripts not yet
  - type: text
    content: ' '
  - type: text
    content: going up to this festival, because my time has not yet fully come.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: After he had said this, he stayed in Galilee.
