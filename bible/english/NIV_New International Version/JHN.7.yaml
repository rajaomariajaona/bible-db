document_id: JHN.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Goes to the Festival of Tabernacles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: After this, Jesus went around in Galilee. He did not want
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: not have authority
      marker-yv: yv-n
    - type: text
      text: ' to go about in Judea because the Jewish leaders there were looking for a way to kill him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'However, after his brothers had left for the festival, he went also, not publicly, but in secret. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Now at the festival the Jewish leaders were watching for Jesus and asking, “Where is he?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Among the crowds there was widespread whispering about him. Some said, “He is a good man.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Others replied, “No, he deceives the people.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But no one would say anything publicly about him for fear of the leaders.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Teaches at the Festival
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Not until halfway through the festival did Jesus go up to the temple courts and begin to teach. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The Jews there were amazed and asked, “How did this man get such learning without having been taught?”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My teaching is not my own. It comes from the one who sent me.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Anyone who chooses to do the will of God will find out whether my teaching comes from God or whether I speak on my own.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever speaks on their own does so to gain personal glory, but he who seeks the glory of the one who sent him is a man of truth; there is nothing false about him.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Has not Moses given you the law? Yet not one of you keeps the law. Why are you trying to kill me?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'But when the Jewish Festival of Tabernacles was near, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “You are demon-possessed,” the crowd answered. “Who is trying to kill you?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I did one miracle, and you are all amazed.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yet, because Moses gave you circumcision (though actually it did not come from Moses, but from the patriarchs), you circumcise a boy on the Sabbath.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now if a boy can be circumcised on the Sabbath so that the law of Moses may not be broken, why are you angry with me for healing a man’s whole body on the Sabbath?
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Stop judging by mere appearances, but instead judge correctly.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Division Over Who Jesus Is
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'At that point some of the people of Jerusalem began to ask, “Isn’t this the man they are trying to kill? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Here he is, speaking publicly, and they are not saying a word to him. Have the authorities really concluded that he is the Messiah? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: But we know where this man is from; when the Messiah comes, no one will know where he is from.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then Jesus, still teaching in the temple courts, cried out, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Yes, you know me, and you know where I am from. I am not here on my own authority, but he who sent me is true. You do not know him,
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but I know him because I am from him and he sent me.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jesus’ brothers said to him, “Leave Galilee and go to Judea, so that your disciples there may see the works you do. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'At this they tried to seize him, but no one laid a hand on him, because his hour had not yet come. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Still, many in the crowd believed in him. They said, “When the Messiah comes, will he perform more signs than this man?”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: The Pharisees heard the crowd whispering such things about him. Then the chief priests and the Pharisees sent temple guards to arrest him.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am with you for only a short time, and then I am going to the one who sent me.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You will look for me, but you will not find me; and where I am, you cannot come.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'The Jews said to one another, “Where does this man intend to go that we cannot find him? Will he go where our people live scattered among the Greeks, and teach the Greeks? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'What did he mean when he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘You will look for me, but you will not find me,’
    - type: text
      text: ' and '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Where I am, you cannot come’
    - type: text
      text: ?”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'On the last and greatest day of the festival, Jesus stood and said in a loud voice, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let anyone who is thirsty come to me and drink.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever believes in me, as Scripture has said, rivers of living water will flow from within them.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:37,38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'me. And let anyone drink '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '38 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'who believes in me.” As Scripture has said, “Out of him '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: them
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will flow rivers of living water.”
      marker-yv: yv-n
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: By this he meant the Spirit, whom those who believed in him were later to receive. Up to that time the Spirit had not been given, since Jesus had not yet been glorified.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'No one who wants to become a public figure acts in secret. Since you are doing these things, show yourself to the world.” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: On hearing his words, some of the people said, “Surely this man is the Prophet.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Others said, “He is the Messiah.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Still others asked, “How can the Messiah come from Galilee? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Does not Scripture say that the Messiah will come from David’s descendants and from Bethlehem, the town where David lived?” '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Thus the people were divided because of Jesus. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Some wanted to seize him, but no one laid a hand on him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Unbelief of the Jewish Leaders
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Finally the temple guards went back to the chief priests and the Pharisees, who asked them, “Why didn’t you bring him in?”
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: “No one ever spoke the way this man does,” the guards replied.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: '“You mean he has deceived you also?” the Pharisees retorted. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: '“Have any of the rulers or of the Pharisees believed in him? '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: No! But this mob that knows nothing of the law—there is a curse on them.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For even his own brothers did not believe in him.
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Nicodemus, who had gone to Jesus earlier and who was one of their own number, asked, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: “Does our law condemn a man without first hearing him to find out what he has been doing?”
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: They replied, “Are you from Galilee, too? Look into it, and you will find that a prophet does not come out of Galilee.”
  - type: usfm
    marker: iex
    children:
    - type: text
      text: '[The earliest manuscripts and many other ancient witnesses do not have John 7:53—8:11. A few manuscripts include these verses, wholly or in part, after John 7:36, John 21:25, Luke 21:38 or Luke 24:53.]'
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then they all went home,
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Therefore Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My time is not yet here; for you any time will do.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The world cannot hate you, but it hates me because I testify that its works are evil.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You go to the festival. I am not
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: not yet
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: going up to this festival, because my time has not yet fully come.”
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: After he had said this, he stayed in Galilee.
