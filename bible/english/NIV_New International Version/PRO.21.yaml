document_id: PRO.21,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'In the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand the king’s heart is a stream of water
  - type: text
    content: that he channels toward all who please him.
  '10':
  - type: text
    content: The wicked crave evil;
  - type: text
    content: their neighbors get no mercy from them.
  '11':
  - type: text
    content: When a mocker is punished, the simple gain wisdom;
  - type: text
    content: by paying attention to the wise they get knowledge.
  '12':
  - type: text
    content: The Righteous One
  - type: note
    content: Or The righteous person
  - type: text
    content: ' takes note of the house of the wicked'
  - type: text
    content: and brings the wicked to ruin.
  '13':
  - type: text
    content: Whoever shuts their ears to the cry of the poor
  - type: text
    content: will also cry out and not be answered.
  '14':
  - type: text
    content: A gift given in secret soothes anger,
  - type: text
    content: and a bribe concealed in the cloak pacifies great wrath.
  '15':
  - type: text
    content: When justice is done, it brings joy to the righteous
  - type: text
    content: but terror to evildoers.
  '16':
  - type: text
    content: Whoever strays from the path of prudence
  - type: text
    content: comes to rest in the company of the dead.
  '17':
  - type: text
    content: Whoever loves pleasure will become poor;
  - type: text
    content: whoever loves wine and olive oil will never be rich.
  '18':
  - type: text
    content: The wicked become a ransom for the righteous,
  - type: text
    content: and the unfaithful for the upright.
  '19':
  - type: text
    content: Better to live in a desert
  - type: text
    content: than with a quarrelsome and nagging wife.
  '2':
  - type: text
    content: A person may think their own ways are right,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' weighs the heart.'
  '20':
  - type: text
    content: The wise store up choice food and olive oil,
  - type: text
    content: but fools gulp theirs down.
  '21':
  - type: text
    content: Whoever pursues righteousness and love
  - type: text
    content: finds life, prosperity
  - type: note
    content: Or righteousness
  - type: text
    content: ' and honor.'
  '22':
  - type: text
    content: One who is wise can go up against the city of the mighty
  - type: text
    content: and pull down the stronghold in which they trust.
  '23':
  - type: text
    content: Those who guard their mouths and their tongues
  - type: text
    content: keep themselves from calamity.
  '24':
  - type: text
    content: The proud and arrogant person—“Mocker” is his name—
  - type: text
    content: behaves with insolent fury.
  '25':
  - type: text
    content: The craving of a sluggard will be the death of him,
  - type: text
    content: because his hands refuse to work.
  '26':
  - type: text
    content: All day long he craves for more,
  - type: text
    content: but the righteous give without sparing.
  '27':
  - type: text
    content: The sacrifice of the wicked is detestable—
  - type: text
    content: how much more so when brought with evil intent!
  '28':
  - type: text
    content: A false witness will perish,
  - type: text
    content: but a careful listener will testify successfully.
  '29':
  - type: text
    content: The wicked put up a bold front,
  - type: text
    content: but the upright give thought to their ways.
  '3':
  - type: text
    content: To do what is right and just
  - type: text
    content: 'is more acceptable to the '
  - type: text
    content: Lord
  - type: text
    content: ' than sacrifice.'
  '30':
  - type: text
    content: There is no wisdom, no insight, no plan
  - type: text
    content: 'that can succeed against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: The horse is made ready for the day of battle,
  - type: text
    content: 'but victory rests with the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: Haughty eyes and a proud heart—
  - type: text
    content: the unplowed field of the wicked—produce sin.
  '5':
  - type: text
    content: The plans of the diligent lead to profit
  - type: text
    content: as surely as haste leads to poverty.
  '6':
  - type: text
    content: A fortune made by a lying tongue
  - type: text
    content: is a fleeting vapor and a deadly snare.
  - type: note
    content: Some Hebrew manuscripts, Septuagint and Vulgate; most Hebrew manuscripts vapor for those who seek death
  '7':
  - type: text
    content: The violence of the wicked will drag them away,
  - type: text
    content: for they refuse to do what is right.
  '8':
  - type: text
    content: The way of the guilty is devious,
  - type: text
    content: but the conduct of the innocent is upright.
  '9':
  - type: text
    content: Better to live on a corner of the roof
  - type: text
    content: than share a house with a quarrelsome wife.
