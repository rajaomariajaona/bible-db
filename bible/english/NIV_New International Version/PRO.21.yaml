document_id: PRO.21
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s hand the king’s heart is a stream of water
- type: usfm
  marker: q2
  children:
  - type: text
    text: that he channels toward all who please him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A person may think their own ways are right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' weighs the heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: To do what is right and just
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'is more acceptable to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' than sacrifice.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Haughty eyes and a proud heart—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the unplowed field of the wicked—produce sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The plans of the diligent lead to profit
- type: usfm
  marker: q2
  children:
  - type: text
    text: as surely as haste leads to poverty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A fortune made by a lying tongue
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a fleeting vapor and a deadly snare.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts, Septuagint and Vulgate; most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vapor for those who seek death
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The violence of the wicked will drag them away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they refuse to do what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The way of the guilty is devious,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the conduct of the innocent is upright.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Better to live on a corner of the roof
- type: usfm
  marker: q2
  children:
  - type: text
    text: than share a house with a quarrelsome wife.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The wicked crave evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their neighbors get no mercy from them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When a mocker is punished, the simple gain wisdom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: by paying attention to the wise they get knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The Righteous One
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The righteous person
    marker-yv: yv-n
  - type: text
    text: ' takes note of the house of the wicked'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and brings the wicked to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Whoever shuts their ears to the cry of the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: will also cry out and not be answered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A gift given in secret soothes anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a bribe concealed in the cloak pacifies great wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When justice is done, it brings joy to the righteous
- type: usfm
  marker: q2
  children:
  - type: text
    text: but terror to evildoers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Whoever strays from the path of prudence
- type: usfm
  marker: q2
  children:
  - type: text
    text: comes to rest in the company of the dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Whoever loves pleasure will become poor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever loves wine and olive oil will never be rich.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The wicked become a ransom for the righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the unfaithful for the upright.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Better to live in a desert
- type: usfm
  marker: q2
  children:
  - type: text
    text: than with a quarrelsome and nagging wife.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The wise store up choice food and olive oil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools gulp theirs down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Whoever pursues righteousness and love
- type: usfm
  marker: q2
  children:
  - type: text
    text: finds life, prosperity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: righteousness
    marker-yv: yv-n
  - type: text
    text: ' and honor.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: One who is wise can go up against the city of the mighty
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pull down the stronghold in which they trust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Those who guard their mouths and their tongues
- type: usfm
  marker: q2
  children:
  - type: text
    text: keep themselves from calamity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The proud and arrogant person—“Mocker” is his name—
- type: usfm
  marker: q2
  children:
  - type: text
    text: behaves with insolent fury.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The craving of a sluggard will be the death of him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because his hands refuse to work.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: All day long he craves for more,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the righteous give without sparing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The sacrifice of the wicked is detestable—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how much more so when brought with evil intent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A false witness will perish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a careful listener will testify successfully.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The wicked put up a bold front,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the upright give thought to their ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: There is no wisdom, no insight, no plan
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that can succeed against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The horse is made ready for the day of battle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but victory rests with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
