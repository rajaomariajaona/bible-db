document_id: ISA.58,111
type_code: eng
verses:
  '1':
  - type: heading
    content: True Fasting
  - type: text
    content: “Shout it aloud, do not hold back.
  - type: text
    content: Raise your voice like a trumpet.
  - type: text
    content: Declare to my people their rebellion
  - type: text
    content: and to the descendants of Jacob their sins.
  '10':
  - type: text
    content: and if you spend yourselves in behalf of the hungry
  - type: text
    content: and satisfy the needs of the oppressed,
  - type: text
    content: then your light will rise in the darkness,
  - type: text
    content: and your night will become like the noonday.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will guide you always;'
  - type: text
    content: he will satisfy your needs in a sun-scorched land
  - type: text
    content: and will strengthen your frame.
  - type: text
    content: You will be like a well-watered garden,
  - type: text
    content: like a spring whose waters never fail.
  '12':
  - type: text
    content: Your people will rebuild the ancient ruins
  - type: text
    content: and will raise up the age-old foundations;
  - type: text
    content: you will be called Repairer of Broken Walls,
  - type: text
    content: Restorer of Streets with Dwellings.
  '13':
  - type: text
    content: “If you keep your feet from breaking the Sabbath
  - type: text
    content: and from doing as you please on my holy day,
  - type: text
    content: if you call the Sabbath a delight
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ’s holy day honorable,
  - type: text
    content: and if you honor it by not going your own way
  - type: text
    content: and not doing as you please or speaking idle words,
  '14':
  - type: text
    content: 'then you will find your joy in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and I will cause you to ride in triumph on the heights of the land
  - type: text
    content: and to feast on the inheritance of your father Jacob.”
  - type: text
    content: 'The mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '2':
  - type: text
    content: For day after day they seek me out;
  - type: text
    content: they seem eager to know my ways,
  - type: text
    content: as if they were a nation that does what is right
  - type: text
    content: and has not forsaken the commands of its God.
  - type: text
    content: They ask me for just decisions
  - type: text
    content: and seem eager for God to come near them.
  '3':
  - type: text
    content: ‘Why have we fasted,’ they say,
  - type: text
    content: ‘and you have not seen it?
  - type: text
    content: Why have we humbled ourselves,
  - type: text
    content: and you have not noticed?’
  - type: text
    content: “Yet on the day of your fasting, you do as you please
  - type: text
    content: and exploit all your workers.
  '4':
  - type: text
    content: Your fasting ends in quarreling and strife,
  - type: text
    content: and in striking each other with wicked fists.
  - type: text
    content: You cannot fast as you do today
  - type: text
    content: and expect your voice to be heard on high.
  '5':
  - type: text
    content: Is this the kind of fast I have chosen,
  - type: text
    content: only a day for people to humble themselves?
  - type: text
    content: Is it only for bowing one’s head like a reed
  - type: text
    content: and for lying in sackcloth and ashes?
  - type: text
    content: Is that what you call a fast,
  - type: text
    content: 'a day acceptable to the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '6':
  - type: text
    content: '“Is not this the kind of fasting I have chosen:'
  - type: text
    content: to loose the chains of injustice
  - type: text
    content: and untie the cords of the yoke,
  - type: text
    content: to set the oppressed free
  - type: text
    content: and break every yoke?
  '7':
  - type: text
    content: Is it not to share your food with the hungry
  - type: text
    content: and to provide the poor wanderer with shelter—
  - type: text
    content: when you see the naked, to clothe them,
  - type: text
    content: and not to turn away from your own flesh and blood?
  '8':
  - type: text
    content: Then your light will break forth like the dawn,
  - type: text
    content: and your healing will quickly appear;
  - type: text
    content: then your righteousness
  - type: note
    content: Or your righteous One
  - type: text
    content: ' will go before you,'
  - type: text
    content: 'and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be your rear guard.'
  '9':
  - type: text
    content: 'Then you will call, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer;'
  - type: text
    content: 'you will cry for help, and he will say: Here am I.'
  - type: text
    content: “If you do away with the yoke of oppression,
  - type: text
    content: with the pointing finger and malicious talk,
