document_id: ISA.58,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: True Fasting
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Shout it aloud, do not hold back.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Raise your voice like a trumpet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare to my people their rebellion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the descendants of Jacob their sins.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and if you spend yourselves in behalf of the hungry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and satisfy the needs of the oppressed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then your light will rise in the darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your night will become like the noonday.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will guide you always;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will satisfy your needs in a sun-scorched land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will strengthen your frame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be like a well-watered garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a spring whose waters never fail.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your people will rebuild the ancient ruins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will raise up the age-old foundations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will be called Repairer of Broken Walls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Restorer of Streets with Dwellings.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you keep your feet from breaking the Sabbath
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from doing as you please on my holy day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: if you call the Sabbath a delight
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s holy day honorable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and if you honor it by not going your own way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not doing as you please or speaking idle words,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'then you will find your joy in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will cause you to ride in triumph on the heights of the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to feast on the inheritance of your father Jacob.”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'The mouth of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For day after day they seek me out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they seem eager to know my ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as if they were a nation that does what is right
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and has not forsaken the commands of its God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They ask me for just decisions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and seem eager for God to come near them.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Why have we fasted,’ they say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘and you have not seen it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why have we humbled ourselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you have not noticed?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yet on the day of your fasting, you do as you please
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and exploit all your workers.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your fasting ends in quarreling and strife,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in striking each other with wicked fists.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You cannot fast as you do today
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and expect your voice to be heard on high.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is this the kind of fast I have chosen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only a day for people to humble themselves?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is it only for bowing one’s head like a reed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for lying in sackcloth and ashes?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is that what you call a fast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a day acceptable to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Is not this the kind of fasting I have chosen:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to loose the chains of injustice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and untie the cords of the yoke,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to set the oppressed free
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and break every yoke?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is it not to share your food with the hungry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to provide the poor wanderer with shelter—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you see the naked, to clothe them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not to turn away from your own flesh and blood?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then your light will break forth like the dawn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your healing will quickly appear;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then your righteousness
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '58:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your righteous One
      marker-yv: yv-n
    - type: text
      text: ' will go before you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be your rear guard.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then you will call, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will answer;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you will cry for help, and he will say: Here am I.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you do away with the yoke of oppression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the pointing finger and malicious talk,
