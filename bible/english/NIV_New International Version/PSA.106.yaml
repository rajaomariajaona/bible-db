document_id: PSA.106,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 106
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hallelu Yah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 48
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he is good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his love endures forever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He saved them from the hand of the foe;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the hand of the enemy he redeemed them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The waters covered their adversaries;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not one of them survived.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they believed his promises
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sang his praise.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But they soon forgot what he had done
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and did not wait for his plan to unfold.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the desert they gave in to their craving;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the wilderness they put God to the test.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he gave them what they asked for,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but sent a wasting disease among them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the camp they grew envious of Moses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and of Aaron, who was consecrated to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth opened up and swallowed Dathan;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it buried the company of Abiram.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fire blazed among their followers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a flame consumed the wicked.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At Horeb they made a calf
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worshiped an idol cast from metal.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who can proclaim the mighty acts of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or fully declare his praise?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They exchanged their glorious God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for an image of a bull, which eats grass.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They forgot the God who saved them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who had done great things in Egypt,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: miracles in the land of Ham
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and awesome deeds by the Red Sea.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he said he would destroy them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: had not Moses, his chosen one,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: stood in the breach before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to keep his wrath from destroying them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they despised the pleasant land;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they did not believe his promise.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They grumbled in their tents
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and did not obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he swore to them with uplifted hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that he would make them fall in the wilderness,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: make their descendants fall among the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and scatter them throughout the lands.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They yoked themselves to the Baal of Peor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ate sacrifices offered to lifeless gods;
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'they aroused the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger by their wicked deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a plague broke out among them.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed are those who act justly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who always do what is right.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Phinehas stood up and intervened,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the plague was checked.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This was credited to him as righteousness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for endless generations to come.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By the waters of Meribah they angered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and trouble came to Moses because of them;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they rebelled against the Spirit of God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rash words came from Moses’ lips.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: against his spirit, / and rash words came from his lips
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They did not destroy the peoples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded them,'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they mingled with the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and adopted their customs.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They worshiped their idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which became a snare to them.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sacrificed their sons
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their daughters to false gods.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They shed innocent blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the blood of their sons and daughters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whom they sacrificed to the idols of Canaan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the land was desecrated by their blood.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They defiled themselves by what they did;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by their deeds they prostituted themselves.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Remember me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', when you show favor to your people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come to my aid when you save them,
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was angry with his people'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and abhorred his inheritance.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave them into the hands of the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their foes ruled over them.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their enemies oppressed them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and subjected them to their power.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many times he delivered them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they were bent on rebellion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they wasted away in their sin.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he took note of their distress
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he heard their cry;
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for their sake he remembered his covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and out of his great love he relented.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He caused all who held them captive
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to show them mercy.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Save us, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gather us from the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that we may give thanks to your holy name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and glory in your praise.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from everlasting to everlasting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the people say, “Amen!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that I may enjoy the prosperity of your chosen ones,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may share in the joy of your nation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and join your inheritance in giving praise.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have sinned, even as our ancestors did;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we have done wrong and acted wickedly.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When our ancestors were in Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they gave no thought to your miracles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they did not remember your many kindnesses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they rebelled by the sea, the Red Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Sea of Reeds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 9 and 22
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he saved them for his name’s sake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to make his mighty power known.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rebuked the Red Sea, and it dried up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he led them through the depths as through a desert.
