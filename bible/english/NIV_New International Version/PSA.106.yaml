document_id: PSA.106,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 106
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew Hallelu Yah; also in verse 48
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good;'
  - type: text
    content: his love endures forever.
  '10':
  - type: text
    content: He saved them from the hand of the foe;
  - type: text
    content: from the hand of the enemy he redeemed them.
  '11':
  - type: text
    content: The waters covered their adversaries;
  - type: text
    content: not one of them survived.
  '12':
  - type: text
    content: Then they believed his promises
  - type: text
    content: and sang his praise.
  '13':
  - type: text
    content: But they soon forgot what he had done
  - type: text
    content: and did not wait for his plan to unfold.
  '14':
  - type: text
    content: In the desert they gave in to their craving;
  - type: text
    content: in the wilderness they put God to the test.
  '15':
  - type: text
    content: So he gave them what they asked for,
  - type: text
    content: but sent a wasting disease among them.
  '16':
  - type: text
    content: In the camp they grew envious of Moses
  - type: text
    content: 'and of Aaron, who was consecrated to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: The earth opened up and swallowed Dathan;
  - type: text
    content: it buried the company of Abiram.
  '18':
  - type: text
    content: Fire blazed among their followers;
  - type: text
    content: a flame consumed the wicked.
  '19':
  - type: text
    content: At Horeb they made a calf
  - type: text
    content: and worshiped an idol cast from metal.
  '2':
  - type: text
    content: 'Who can proclaim the mighty acts of the '
  - type: text
    content: Lord
  - type: text
    content: or fully declare his praise?
  '20':
  - type: text
    content: They exchanged their glorious God
  - type: text
    content: for an image of a bull, which eats grass.
  '21':
  - type: text
    content: They forgot the God who saved them,
  - type: text
    content: who had done great things in Egypt,
  '22':
  - type: text
    content: miracles in the land of Ham
  - type: text
    content: and awesome deeds by the Red Sea.
  '23':
  - type: text
    content: So he said he would destroy them—
  - type: text
    content: had not Moses, his chosen one,
  - type: text
    content: stood in the breach before him
  - type: text
    content: to keep his wrath from destroying them.
  '24':
  - type: text
    content: Then they despised the pleasant land;
  - type: text
    content: they did not believe his promise.
  '25':
  - type: text
    content: They grumbled in their tents
  - type: text
    content: 'and did not obey the '
  - type: text
    content: Lord
  - type: text
    content: .
  '26':
  - type: text
    content: So he swore to them with uplifted hand
  - type: text
    content: that he would make them fall in the wilderness,
  '27':
  - type: text
    content: make their descendants fall among the nations
  - type: text
    content: and scatter them throughout the lands.
  '28':
  - type: text
    content: They yoked themselves to the Baal of Peor
  - type: text
    content: and ate sacrifices offered to lifeless gods;
  '29':
  - type: text
    content: 'they aroused the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger by their wicked deeds,
  - type: text
    content: and a plague broke out among them.
  '3':
  - type: text
    content: Blessed are those who act justly,
  - type: text
    content: who always do what is right.
  '30':
  - type: text
    content: But Phinehas stood up and intervened,
  - type: text
    content: and the plague was checked.
  '31':
  - type: text
    content: This was credited to him as righteousness
  - type: text
    content: for endless generations to come.
  '32':
  - type: text
    content: 'By the waters of Meribah they angered the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and trouble came to Moses because of them;
  '33':
  - type: text
    content: for they rebelled against the Spirit of God,
  - type: text
    content: and rash words came from Moses’ lips.
  - type: note
    content: Or against his spirit, / and rash words came from his lips
  '34':
  - type: text
    content: They did not destroy the peoples
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded them,'
  '35':
  - type: text
    content: but they mingled with the nations
  - type: text
    content: and adopted their customs.
  '36':
  - type: text
    content: They worshiped their idols,
  - type: text
    content: which became a snare to them.
  '37':
  - type: text
    content: They sacrificed their sons
  - type: text
    content: and their daughters to false gods.
  '38':
  - type: text
    content: They shed innocent blood,
  - type: text
    content: the blood of their sons and daughters,
  - type: text
    content: whom they sacrificed to the idols of Canaan,
  - type: text
    content: and the land was desecrated by their blood.
  '39':
  - type: text
    content: They defiled themselves by what they did;
  - type: text
    content: by their deeds they prostituted themselves.
  '4':
  - type: text
    content: 'Remember me, '
  - type: text
    content: Lord
  - type: text
    content: ', when you show favor to your people,'
  - type: text
    content: come to my aid when you save them,
  '40':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' was angry with his people'
  - type: text
    content: and abhorred his inheritance.
  '41':
  - type: text
    content: He gave them into the hands of the nations,
  - type: text
    content: and their foes ruled over them.
  '42':
  - type: text
    content: Their enemies oppressed them
  - type: text
    content: and subjected them to their power.
  '43':
  - type: text
    content: Many times he delivered them,
  - type: text
    content: but they were bent on rebellion
  - type: text
    content: and they wasted away in their sin.
  '44':
  - type: text
    content: Yet he took note of their distress
  - type: text
    content: when he heard their cry;
  '45':
  - type: text
    content: for their sake he remembered his covenant
  - type: text
    content: and out of his great love he relented.
  '46':
  - type: text
    content: He caused all who held them captive
  - type: text
    content: to show them mercy.
  '47':
  - type: text
    content: 'Save us, '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: and gather us from the nations,
  - type: text
    content: that we may give thanks to your holy name
  - type: text
    content: and glory in your praise.
  '48':
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: from everlasting to everlasting.
  - type: text
    content: Let all the people say, “Amen!”
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: that I may enjoy the prosperity of your chosen ones,
  - type: text
    content: that I may share in the joy of your nation
  - type: text
    content: and join your inheritance in giving praise.
  '6':
  - type: text
    content: We have sinned, even as our ancestors did;
  - type: text
    content: we have done wrong and acted wickedly.
  '7':
  - type: text
    content: When our ancestors were in Egypt,
  - type: text
    content: they gave no thought to your miracles;
  - type: text
    content: they did not remember your many kindnesses,
  - type: text
    content: and they rebelled by the sea, the Red Sea.
  - type: note
    content: Or the Sea of Reeds; also in verses 9 and 22
  '8':
  - type: text
    content: Yet he saved them for his name’s sake,
  - type: text
    content: to make his mighty power known.
  '9':
  - type: text
    content: He rebuked the Red Sea, and it dried up;
  - type: text
    content: he led them through the depths as through a desert.
