document_id: PRO.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom Bestows Well-Being
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, do not forget my teaching,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but keep my commands in your heart,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then your barns will be filled to overflowing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your vats will brim over with new wine.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My son, do not despise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s discipline,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not resent his rebuke,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' disciplines those he loves,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a father the son he delights in.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: loves, / and he chastens everyone he accepts as his child
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed are those who find wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who gain understanding,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for she is more profitable than silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and yields better returns than gold.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She is more precious than rubies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing you desire can compare with her.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long life is in her right hand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in her left hand are riches and honor.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her ways are pleasant ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all her paths are peace.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She is a tree of life to those who take hold of her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who hold her fast will be blessed.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By wisdom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' laid the earth’s foundations,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by understanding he set the heavens in place;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they will prolong your life many years
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring you peace and prosperity.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by his knowledge the watery depths were divided,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the clouds let drop the dew.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, do not let wisdom and understanding out of your sight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: preserve sound judgment and discretion;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will be life for you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an ornament to grace your neck.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will go on your way in safety,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your foot will not stumble.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you lie down, you will not be afraid;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you lie down, your sleep will be sweet.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have no fear of sudden disaster
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or of the ruin that overtakes the wicked,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be at your side'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will keep your foot from being snared.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not withhold good from those to whom it is due,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when it is in your power to act.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not say to your neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Come back tomorrow and I’ll give it to you”—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you already have it with you.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not plot harm against your neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who lives trustfully near you.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let love and faithfulness never leave you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bind them around your neck,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: write them on the tablet of your heart.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not accuse anyone for no reason—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they have done you no harm.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not envy the violent
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or choose any of their ways.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' detests the perverse'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but takes the upright into his confidence.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s curse is on the house of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he blesses the home of the righteous.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He mocks proud mockers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but shows favor to the humble and oppressed.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wise inherit honor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but fools get only shame.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will win favor and a good name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the sight of God and man.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all your heart'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lean not on your own understanding;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in all your ways submit to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will make your paths straight.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will direct your paths
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be wise in your own eyes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and shun evil.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This will bring health to your body
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nourishment to your bones.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Honor the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with your wealth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the firstfruits of all your crops;
