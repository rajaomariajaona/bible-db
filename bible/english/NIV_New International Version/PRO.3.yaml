document_id: PRO.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom Bestows Well-Being
  - type: text
    content: My son, do not forget my teaching,
  - type: text
    content: but keep my commands in your heart,
  '10':
  - type: text
    content: then your barns will be filled to overflowing,
  - type: text
    content: and your vats will brim over with new wine.
  '11':
  - type: text
    content: 'My son, do not despise the '
  - type: text
    content: Lord
  - type: text
    content: ’s discipline,
  - type: text
    content: and do not resent his rebuke,
  '12':
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ' disciplines those he loves,'
  - type: text
    content: as a father the son he delights in.
  - type: note
    content: Hebrew; Septuagint loves, / and he chastens everyone he accepts as his child
  '13':
  - type: text
    content: Blessed are those who find wisdom,
  - type: text
    content: those who gain understanding,
  '14':
  - type: text
    content: for she is more profitable than silver
  - type: text
    content: and yields better returns than gold.
  '15':
  - type: text
    content: She is more precious than rubies;
  - type: text
    content: nothing you desire can compare with her.
  '16':
  - type: text
    content: Long life is in her right hand;
  - type: text
    content: in her left hand are riches and honor.
  '17':
  - type: text
    content: Her ways are pleasant ways,
  - type: text
    content: and all her paths are peace.
  '18':
  - type: text
    content: She is a tree of life to those who take hold of her;
  - type: text
    content: those who hold her fast will be blessed.
  '19':
  - type: text
    content: 'By wisdom the '
  - type: text
    content: Lord
  - type: text
    content: ' laid the earth’s foundations,'
  - type: text
    content: by understanding he set the heavens in place;
  '2':
  - type: text
    content: for they will prolong your life many years
  - type: text
    content: and bring you peace and prosperity.
  '20':
  - type: text
    content: by his knowledge the watery depths were divided,
  - type: text
    content: and the clouds let drop the dew.
  '21':
  - type: text
    content: My son, do not let wisdom and understanding out of your sight,
  - type: text
    content: preserve sound judgment and discretion;
  '22':
  - type: text
    content: they will be life for you,
  - type: text
    content: an ornament to grace your neck.
  '23':
  - type: text
    content: Then you will go on your way in safety,
  - type: text
    content: and your foot will not stumble.
  '24':
  - type: text
    content: When you lie down, you will not be afraid;
  - type: text
    content: when you lie down, your sleep will be sweet.
  '25':
  - type: text
    content: Have no fear of sudden disaster
  - type: text
    content: or of the ruin that overtakes the wicked,
  '26':
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will be at your side'
  - type: text
    content: and will keep your foot from being snared.
  '27':
  - type: text
    content: Do not withhold good from those to whom it is due,
  - type: text
    content: when it is in your power to act.
  '28':
  - type: text
    content: Do not say to your neighbor,
  - type: text
    content: “Come back tomorrow and I’ll give it to you”—
  - type: text
    content: when you already have it with you.
  '29':
  - type: text
    content: Do not plot harm against your neighbor,
  - type: text
    content: who lives trustfully near you.
  '3':
  - type: text
    content: Let love and faithfulness never leave you;
  - type: text
    content: bind them around your neck,
  - type: text
    content: write them on the tablet of your heart.
  '30':
  - type: text
    content: Do not accuse anyone for no reason—
  - type: text
    content: when they have done you no harm.
  '31':
  - type: text
    content: Do not envy the violent
  - type: text
    content: or choose any of their ways.
  '32':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' detests the perverse'
  - type: text
    content: but takes the upright into his confidence.
  '33':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s curse is on the house of the wicked,
  - type: text
    content: but he blesses the home of the righteous.
  '34':
  - type: text
    content: He mocks proud mockers
  - type: text
    content: but shows favor to the humble and oppressed.
  '35':
  - type: text
    content: The wise inherit honor,
  - type: text
    content: but fools get only shame.
  '4':
  - type: text
    content: Then you will win favor and a good name
  - type: text
    content: in the sight of God and man.
  '5':
  - type: text
    content: 'Trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' with all your heart'
  - type: text
    content: and lean not on your own understanding;
  '6':
  - type: text
    content: in all your ways submit to him,
  - type: text
    content: and he will make your paths straight.
  - type: note
    content: Or will direct your paths
  '7':
  - type: text
    content: Do not be wise in your own eyes;
  - type: text
    content: 'fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and shun evil.'
  '8':
  - type: text
    content: This will bring health to your body
  - type: text
    content: and nourishment to your bones.
  '9':
  - type: text
    content: 'Honor the '
  - type: text
    content: Lord
  - type: text
    content: ' with your wealth,'
  - type: text
    content: with the firstfruits of all your crops;
