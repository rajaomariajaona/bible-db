document_id: PRO.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Bestows Well-Being
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My son, do not forget my teaching,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but keep my commands in your heart,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: for they will prolong your life many years
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring you peace and prosperity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Let love and faithfulness never leave you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: bind them around your neck,
- type: usfm
  marker: q2
  children:
  - type: text
    text: write them on the tablet of your heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then you will win favor and a good name
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the sight of God and man.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with all your heart'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lean not on your own understanding;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: in all your ways submit to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will make your paths straight.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will direct your paths
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Do not be wise in your own eyes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and shun evil.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: This will bring health to your body
- type: usfm
  marker: q2
  children:
  - type: text
    text: and nourishment to your bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Honor the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with your wealth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the firstfruits of all your crops;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: then your barns will be filled to overflowing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your vats will brim over with new wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'My son, do not despise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s discipline,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not resent his rebuke,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' disciplines those he loves,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a father the son he delights in.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: loves, / and he chastens everyone he accepts as his child
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Blessed are those who find wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who gain understanding,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: for she is more profitable than silver
- type: usfm
  marker: q2
  children:
  - type: text
    text: and yields better returns than gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She is more precious than rubies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing you desire can compare with her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Long life is in her right hand;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in her left hand are riches and honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Her ways are pleasant ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all her paths are peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: She is a tree of life to those who take hold of her;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who hold her fast will be blessed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'By wisdom the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' laid the earth’s foundations,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: by understanding he set the heavens in place;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: by his knowledge the watery depths were divided,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the clouds let drop the dew.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: My son, do not let wisdom and understanding out of your sight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: preserve sound judgment and discretion;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: they will be life for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an ornament to grace your neck.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then you will go on your way in safety,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your foot will not stumble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When you lie down, you will not be afraid;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you lie down, your sleep will be sweet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Have no fear of sudden disaster
- type: usfm
  marker: q2
  children:
  - type: text
    text: or of the ruin that overtakes the wicked,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be at your side'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will keep your foot from being snared.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Do not withhold good from those to whom it is due,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when it is in your power to act.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Do not say to your neighbor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Come back tomorrow and I’ll give it to you”—
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you already have it with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Do not plot harm against your neighbor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who lives trustfully near you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Do not accuse anyone for no reason—
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they have done you no harm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Do not envy the violent
- type: usfm
  marker: q2
  children:
  - type: text
    text: or choose any of their ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests the perverse'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but takes the upright into his confidence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s curse is on the house of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he blesses the home of the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He mocks proud mockers
- type: usfm
  marker: q2
  children:
  - type: text
    text: but shows favor to the humble and oppressed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: The wise inherit honor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools get only shame.
