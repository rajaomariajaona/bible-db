document_id: NUM.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Arrangement of the Tribal Camps
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron: '
  '10':
  - type: text
    content: 'On the south will be the divisions of the camp of Reuben under their standard. The leader of the people of Reuben is Elizur son of Shedeur. '
  '11':
  - type: text
    content: His division numbers 46,500.
  '12':
  - type: text
    content: 'The tribe of Simeon will camp next to them. The leader of the people of Simeon is Shelumiel son of Zurishaddai. '
  '13':
  - type: text
    content: His division numbers 59,300.
  '14':
  - type: text
    content: The tribe of Gad will be next. The leader of the people of Gad is Eliasaph son of Deuel.
  - type: note
    content: Many manuscripts of the Masoretic Text, Samaritan Pentateuch and Vulgate (see also 1:14); most manuscripts of the Masoretic Text Reuel
  - type: text
    content: ' '
  '15':
  - type: text
    content: His division numbers 45,650.
  '16':
  - type: text
    content: All the men assigned to the camp of Reuben, according to their divisions, number 151,450. They will set out second.
  '17':
  - type: text
    content: Then the tent of meeting and the camp of the Levites will set out in the middle of the camps. They will set out in the same order as they encamp, each in their own place under their standard.
  '18':
  - type: text
    content: 'On the west will be the divisions of the camp of Ephraim under their standard. The leader of the people of Ephraim is Elishama son of Ammihud. '
  '19':
  - type: text
    content: His division numbers 40,500.
  '2':
  - type: text
    content: “The Israelites are to camp around the tent of meeting some distance from it, each of them under their standard and holding the banners of their family.”
  '20':
  - type: text
    content: 'The tribe of Manasseh will be next to them. The leader of the people of Manasseh is Gamaliel son of Pedahzur. '
  '21':
  - type: text
    content: His division numbers 32,200.
  '22':
  - type: text
    content: 'The tribe of Benjamin will be next. The leader of the people of Benjamin is Abidan son of Gideoni. '
  '23':
  - type: text
    content: His division numbers 35,400.
  '24':
  - type: text
    content: All the men assigned to the camp of Ephraim, according to their divisions, number 108,100. They will set out third.
  '25':
  - type: text
    content: 'On the north will be the divisions of the camp of Dan under their standard. The leader of the people of Dan is Ahiezer son of Ammishaddai. '
  '26':
  - type: text
    content: His division numbers 62,700.
  '27':
  - type: text
    content: 'The tribe of Asher will camp next to them. The leader of the people of Asher is Pagiel son of Okran. '
  '28':
  - type: text
    content: His division numbers 41,500.
  '29':
  - type: text
    content: 'The tribe of Naphtali will be next. The leader of the people of Naphtali is Ahira son of Enan. '
  '3':
  - type: text
    content: 'On the east, toward the sunrise, the divisions of the camp of Judah are to encamp under their standard. The leader of the people of Judah is Nahshon son of Amminadab. '
  '30':
  - type: text
    content: His division numbers 53,400.
  '31':
  - type: text
    content: All the men assigned to the camp of Dan number 157,600. They will set out last, under their standards.
  '32':
  - type: text
    content: 'These are the Israelites, counted according to their families. All the men in the camps, by their divisions, number 603,550. '
  '33':
  - type: text
    content: 'The Levites, however, were not counted along with the other Israelites, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '34':
  - type: text
    content: 'So the Israelites did everything the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses; that is the way they encamped under their standards, and that is the way they set out, each of them with their clan and family.'
  '4':
  - type: text
    content: His division numbers 74,600.
  '5':
  - type: text
    content: 'The tribe of Issachar will camp next to them. The leader of the people of Issachar is Nethanel son of Zuar. '
  '6':
  - type: text
    content: His division numbers 54,400.
  '7':
  - type: text
    content: 'The tribe of Zebulun will be next. The leader of the people of Zebulun is Eliab son of Helon. '
  '8':
  - type: text
    content: His division numbers 57,400.
  '9':
  - type: text
    content: All the men assigned to the camp of Judah, according to their divisions, number 186,400. They will set out first.
