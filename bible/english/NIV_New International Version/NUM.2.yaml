document_id: NUM.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Arrangement of the Tribal Camps
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses and Aaron: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “The Israelites are to camp around the tent of meeting some distance from it, each of them under their standard and holding the banners of their family.”
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On the east, toward the sunrise, the divisions of the camp of Judah are to encamp under their standard. The leader of the people of Judah is Nahshon son of Amminadab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: His division numbers 74,600.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The tribe of Issachar will camp next to them. The leader of the people of Issachar is Nethanel son of Zuar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: His division numbers 54,400.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The tribe of Zebulun will be next. The leader of the people of Zebulun is Eliab son of Helon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: His division numbers 57,400.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All the men assigned to the camp of Judah, according to their divisions, number 186,400. They will set out first.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On the south will be the divisions of the camp of Reuben under their standard. The leader of the people of Reuben is Elizur son of Shedeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: His division numbers 46,500.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The tribe of Simeon will camp next to them. The leader of the people of Simeon is Shelumiel son of Zurishaddai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: His division numbers 59,300.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The tribe of Gad will be next. The leader of the people of Gad is Eliasaph son of Deuel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Many manuscripts of the Masoretic Text, Samaritan Pentateuch and Vulgate (see also 1:14); most manuscripts of the Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Reuel
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: His division numbers 45,650.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: All the men assigned to the camp of Reuben, according to their divisions, number 151,450. They will set out second.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then the tent of meeting and the camp of the Levites will set out in the middle of the camps. They will set out in the same order as they encamp, each in their own place under their standard.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On the west will be the divisions of the camp of Ephraim under their standard. The leader of the people of Ephraim is Elishama son of Ammihud. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: His division numbers 40,500.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The tribe of Manasseh will be next to them. The leader of the people of Manasseh is Gamaliel son of Pedahzur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: His division numbers 32,200.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The tribe of Benjamin will be next. The leader of the people of Benjamin is Abidan son of Gideoni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: His division numbers 35,400.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: All the men assigned to the camp of Ephraim, according to their divisions, number 108,100. They will set out third.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'On the north will be the divisions of the camp of Dan under their standard. The leader of the people of Dan is Ahiezer son of Ammishaddai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: His division numbers 62,700.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The tribe of Asher will camp next to them. The leader of the people of Asher is Pagiel son of Okran. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: His division numbers 41,500.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The tribe of Naphtali will be next. The leader of the people of Naphtali is Ahira son of Enan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: His division numbers 53,400.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: All the men assigned to the camp of Dan number 157,600. They will set out last, under their standards.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'These are the Israelites, counted according to their families. All the men in the camps, by their divisions, number 603,550. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The Levites, however, were not counted along with the other Israelites, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So the Israelites did everything the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded Moses; that is the way they encamped under their standards, and that is the way they set out, each of them with their clan and family.'
