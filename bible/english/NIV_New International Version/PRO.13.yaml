document_id: PRO.13
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A wise son heeds his father’s instruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a mocker does not respond to rebukes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: From the fruit of their lips people enjoy good things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the unfaithful have an appetite for violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Those who guard their lips preserve their lives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who speak rashly will come to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A sluggard’s appetite is never filled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the desires of the diligent are fully satisfied.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The righteous hate what is false,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wicked make themselves a stench
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring shame on themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Righteousness guards the person of integrity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but wickedness overthrows the sinner.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: One person pretends to be rich, yet has nothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: another pretends to be poor, yet has great wealth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A person’s riches may ransom their life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the poor cannot respond to threatening rebukes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The light of the righteous shines brightly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the lamp of the wicked is snuffed out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Where there is strife, there is pride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but wisdom is found in those who take advice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dishonest money dwindles away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever gathers money little by little makes it grow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hope deferred makes the heart sick,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a longing fulfilled is a tree of life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Whoever scorns instruction will pay for it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever respects a command is rewarded.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The teaching of the wise is a fountain of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: turning a person from the snares of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Good judgment wins favor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the way of the unfaithful leads to their destruction.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Septuagint and Syriac; the meaning of the Hebrew for this phrase is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: All who are prudent act with
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prudent protect themselves through
    marker-yv: yv-n
  - type: text
    text: ' knowledge,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools expose their folly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A wicked messenger falls into trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a trustworthy envoy brings healing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Whoever disregards discipline comes to poverty and shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever heeds correction is honored.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A longing fulfilled is sweet to the soul,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools detest turning from evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Walk with the wise and become wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a companion of fools suffers harm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Trouble pursues the sinner,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the righteous are rewarded with good things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A good person leaves an inheritance for their children’s children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a sinner’s wealth is stored up for the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: An unplowed field produces food for the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but injustice sweeps it away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Whoever spares the rod hates their children,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the one who loves their children is careful to discipline them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The righteous eat to their hearts’ content,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the stomach of the wicked goes hungry.
