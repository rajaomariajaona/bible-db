document_id: PRO.13,111
type_code: eng
verses:
  '1':
  - type: text
    content: A wise son heeds his father’s instruction,
  - type: text
    content: but a mocker does not respond to rebukes.
  '10':
  - type: text
    content: Where there is strife, there is pride,
  - type: text
    content: but wisdom is found in those who take advice.
  '11':
  - type: text
    content: Dishonest money dwindles away,
  - type: text
    content: but whoever gathers money little by little makes it grow.
  '12':
  - type: text
    content: Hope deferred makes the heart sick,
  - type: text
    content: but a longing fulfilled is a tree of life.
  '13':
  - type: text
    content: Whoever scorns instruction will pay for it,
  - type: text
    content: but whoever respects a command is rewarded.
  '14':
  - type: text
    content: The teaching of the wise is a fountain of life,
  - type: text
    content: turning a person from the snares of death.
  '15':
  - type: text
    content: Good judgment wins favor,
  - type: text
    content: but the way of the unfaithful leads to their destruction.
  - type: note
    content: Septuagint and Syriac; the meaning of the Hebrew for this phrase is uncertain.
  '16':
  - type: text
    content: All who are prudent act with
  - type: note
    content: Or prudent protect themselves through
  - type: text
    content: ' knowledge,'
  - type: text
    content: but fools expose their folly.
  '17':
  - type: text
    content: A wicked messenger falls into trouble,
  - type: text
    content: but a trustworthy envoy brings healing.
  '18':
  - type: text
    content: Whoever disregards discipline comes to poverty and shame,
  - type: text
    content: but whoever heeds correction is honored.
  '19':
  - type: text
    content: A longing fulfilled is sweet to the soul,
  - type: text
    content: but fools detest turning from evil.
  '2':
  - type: text
    content: From the fruit of their lips people enjoy good things,
  - type: text
    content: but the unfaithful have an appetite for violence.
  '20':
  - type: text
    content: Walk with the wise and become wise,
  - type: text
    content: for a companion of fools suffers harm.
  '21':
  - type: text
    content: Trouble pursues the sinner,
  - type: text
    content: but the righteous are rewarded with good things.
  '22':
  - type: text
    content: A good person leaves an inheritance for their children’s children,
  - type: text
    content: but a sinner’s wealth is stored up for the righteous.
  '23':
  - type: text
    content: An unplowed field produces food for the poor,
  - type: text
    content: but injustice sweeps it away.
  '24':
  - type: text
    content: Whoever spares the rod hates their children,
  - type: text
    content: but the one who loves their children is careful to discipline them.
  '25':
  - type: text
    content: The righteous eat to their hearts’ content,
  - type: text
    content: but the stomach of the wicked goes hungry.
  '3':
  - type: text
    content: Those who guard their lips preserve their lives,
  - type: text
    content: but those who speak rashly will come to ruin.
  '4':
  - type: text
    content: A sluggard’s appetite is never filled,
  - type: text
    content: but the desires of the diligent are fully satisfied.
  '5':
  - type: text
    content: The righteous hate what is false,
  - type: text
    content: but the wicked make themselves a stench
  - type: text
    content: and bring shame on themselves.
  '6':
  - type: text
    content: Righteousness guards the person of integrity,
  - type: text
    content: but wickedness overthrows the sinner.
  '7':
  - type: text
    content: One person pretends to be rich, yet has nothing;
  - type: text
    content: another pretends to be poor, yet has great wealth.
  '8':
  - type: text
    content: A person’s riches may ransom their life,
  - type: text
    content: but the poor cannot respond to threatening rebukes.
  '9':
  - type: text
    content: The light of the righteous shines brightly,
  - type: text
    content: but the lamp of the wicked is snuffed out.
