document_id: 1CH.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gatekeepers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The divisions of the gatekeepers:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'From the Korahites: Meshelemiah son of Kore, one of the sons of Asaph.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Meshelemiah had sons:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zechariah the firstborn,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jediael the second,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zebadiah the third,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jathniel the fourth,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elam the fifth,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jehohanan the sixth
- type: usfm
  marker: li2
  children:
  - type: text
    text: and Eliehoenai the seventh.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Obed-Edom also had sons:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shemaiah the firstborn,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jehozabad the second,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Joah the third,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Sakar the fourth,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Nethanel the fifth,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ammiel the sixth,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Issachar the seventh
- type: usfm
  marker: li2
  children:
  - type: text
    text: and Peullethai the eighth.
- type: usfm
  marker: li2
  children:
  - type: text
    text: (For God had blessed Obed-Edom.)
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Obed-Edom’s son Shemaiah also had sons, who were leaders in their father’s family because they were very capable men. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The sons of Shemaiah: Othni, Rephael, Obed and Elzabad; his relatives Elihu and Semakiah were also able men. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: All these were descendants of Obed-Edom; they and their sons and their relatives were capable men with the strength to do the work—descendants of Obed-Edom, 62 in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Meshelemiah had sons and relatives, who were able men—18 in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hosah the Merarite had sons: Shimri the first (although he was not the firstborn, his father had appointed him the first), '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hilkiah the second, Tabaliah the third and Zechariah the fourth. The sons and relatives of Hosah were 13 in all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'These divisions of the gatekeepers, through their leaders, had duties for ministering in the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', just as their relatives had. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lots were cast for each gate, according to their families, young and old alike.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The lot for the East Gate fell to Shelemiah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A variant of '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Meshelemiah
    marker-yv: yv-n
  - type: text
    text: ' Then lots were cast for his son Zechariah, a wise counselor, and the lot for the North Gate fell to him. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The lot for the South Gate fell to Obed-Edom, and the lot for the storehouse fell to his sons. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The lots for the West Gate and the Shalleketh Gate on the upper road fell to Shuppim and Hosah.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Guard was alongside of guard: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'There were six Levites a day on the east, four a day on the north, four a day on the south and two at a time at the storehouse. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: As for the court
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' to the west, there were four at the road and two at the court'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' itself.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: These were the divisions of the gatekeepers who were descendants of Korah and Merari.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Treasurers and Other Officials
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Their fellow Levites were
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: As for the Levites, Ahijah was
    marker-yv: yv-n
  - type: text
    text: ' in charge of the treasuries of the house of God and the treasuries for the dedicated things.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The descendants of Ladan, who were Gershonites through Ladan and who were heads of families belonging to Ladan the Gershonite, were Jehieli, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'the sons of Jehieli, Zetham and his brother Joel. They were in charge of the treasuries of the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'From the Amramites, the Izharites, the Hebronites and the Uzzielites:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Shubael, a descendant of Gershom son of Moses, was the official in charge of the treasuries. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'His relatives through Eliezer: Rehabiah his son, Jeshaiah his son, Joram his son, Zikri his son and Shelomith his son. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Shelomith and his relatives were in charge of all the treasuries for the things dedicated by King David, by the heads of families who were the commanders of thousands and commanders of hundreds, and by the other army commanders. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Some of the plunder taken in battle they dedicated for the repair of the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: And everything dedicated by Samuel the seer and by Saul son of Kish, Abner son of Ner and Joab son of Zeruiah, and all the other dedicated things were in the care of Shelomith and his relatives.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'From the Izharites: Kenaniah and his sons were assigned duties away from the temple, as officials and judges over Israel.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'From the Hebronites: Hashabiah and his relatives—seventeen hundred able men—were responsible in Israel west of the Jordan for all the work of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and for the king’s service. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'As for the Hebronites, Jeriah was their chief according to the genealogical records of their families. In the fortieth year of David’s reign a search was made in the records, and capable men among the Hebronites were found at Jazer in Gilead. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Jeriah had twenty-seven hundred relatives, who were able men and heads of families, and King David put them in charge of the Reubenites, the Gadites and the half-tribe of Manasseh for every matter pertaining to God and for the affairs of the king.
