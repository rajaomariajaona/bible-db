document_id: 1CH.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Gatekeepers
  - type: text
    content: 'The divisions of the gatekeepers:'
  - type: text
    content: 'From the Korahites: Meshelemiah son of Kore, one of the sons of Asaph.'
  '10':
  - type: text
    content: 'Hosah the Merarite had sons: Shimri the first (although he was not the firstborn, his father had appointed him the first), '
  '11':
  - type: text
    content: Hilkiah the second, Tabaliah the third and Zechariah the fourth. The sons and relatives of Hosah were 13 in all.
  '12':
  - type: text
    content: 'These divisions of the gatekeepers, through their leaders, had duties for ministering in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as their relatives had. '
  '13':
  - type: text
    content: Lots were cast for each gate, according to their families, young and old alike.
  '14':
  - type: text
    content: The lot for the East Gate fell to Shelemiah.
  - type: note
    content: A variant of Meshelemiah
  - type: text
    content: ' Then lots were cast for his son Zechariah, a wise counselor, and the lot for the North Gate fell to him. '
  '15':
  - type: text
    content: 'The lot for the South Gate fell to Obed-Edom, and the lot for the storehouse fell to his sons. '
  '16':
  - type: text
    content: The lots for the West Gate and the Shalleketh Gate on the upper road fell to Shuppim and Hosah.
  - type: text
    content: 'Guard was alongside of guard: '
  '17':
  - type: text
    content: 'There were six Levites a day on the east, four a day on the north, four a day on the south and two at a time at the storehouse. '
  '18':
  - type: text
    content: As for the court
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' to the west, there were four at the road and two at the court'
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' itself.'
  '19':
  - type: text
    content: These were the divisions of the gatekeepers who were descendants of Korah and Merari.
  - type: heading
    content: The Treasurers and Other Officials
  '2':
  - type: text
    content: 'Meshelemiah had sons:'
  - type: text
    content: Zechariah the firstborn,
  - type: text
    content: Jediael the second,
  - type: text
    content: Zebadiah the third,
  - type: text
    content: Jathniel the fourth,
  '20':
  - type: text
    content: Their fellow Levites were
  - type: note
    content: Septuagint; Hebrew As for the Levites, Ahijah was
  - type: text
    content: ' in charge of the treasuries of the house of God and the treasuries for the dedicated things.'
  '21':
  - type: text
    content: 'The descendants of Ladan, who were Gershonites through Ladan and who were heads of families belonging to Ladan the Gershonite, were Jehieli, '
  '22':
  - type: text
    content: 'the sons of Jehieli, Zetham and his brother Joel. They were in charge of the treasuries of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: 'From the Amramites, the Izharites, the Hebronites and the Uzzielites:'
  '24':
  - type: text
    content: 'Shubael, a descendant of Gershom son of Moses, was the official in charge of the treasuries. '
  '25':
  - type: text
    content: 'His relatives through Eliezer: Rehabiah his son, Jeshaiah his son, Joram his son, Zikri his son and Shelomith his son. '
  '26':
  - type: text
    content: 'Shelomith and his relatives were in charge of all the treasuries for the things dedicated by King David, by the heads of families who were the commanders of thousands and commanders of hundreds, and by the other army commanders. '
  '27':
  - type: text
    content: 'Some of the plunder taken in battle they dedicated for the repair of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: And everything dedicated by Samuel the seer and by Saul son of Kish, Abner son of Ner and Joab son of Zeruiah, and all the other dedicated things were in the care of Shelomith and his relatives.
  '29':
  - type: text
    content: 'From the Izharites: Kenaniah and his sons were assigned duties away from the temple, as officials and judges over Israel.'
  '3':
  - type: text
    content: Elam the fifth,
  - type: text
    content: Jehohanan the sixth
  - type: text
    content: and Eliehoenai the seventh.
  '30':
  - type: text
    content: 'From the Hebronites: Hashabiah and his relatives—seventeen hundred able men—were responsible in Israel west of the Jordan for all the work of the '
  - type: text
    content: Lord
  - type: text
    content: ' and for the king’s service. '
  '31':
  - type: text
    content: 'As for the Hebronites, Jeriah was their chief according to the genealogical records of their families. In the fortieth year of David’s reign a search was made in the records, and capable men among the Hebronites were found at Jazer in Gilead. '
  '32':
  - type: text
    content: Jeriah had twenty-seven hundred relatives, who were able men and heads of families, and King David put them in charge of the Reubenites, the Gadites and the half-tribe of Manasseh for every matter pertaining to God and for the affairs of the king.
  '4':
  - type: text
    content: 'Obed-Edom also had sons:'
  - type: text
    content: Shemaiah the firstborn,
  - type: text
    content: Jehozabad the second,
  - type: text
    content: Joah the third,
  - type: text
    content: Sakar the fourth,
  - type: text
    content: Nethanel the fifth,
  '5':
  - type: text
    content: Ammiel the sixth,
  - type: text
    content: Issachar the seventh
  - type: text
    content: and Peullethai the eighth.
  - type: text
    content: (For God had blessed Obed-Edom.)
  '6':
  - type: text
    content: 'Obed-Edom’s son Shemaiah also had sons, who were leaders in their father’s family because they were very capable men. '
  '7':
  - type: text
    content: 'The sons of Shemaiah: Othni, Rephael, Obed and Elzabad; his relatives Elihu and Semakiah were also able men. '
  '8':
  - type: text
    content: All these were descendants of Obed-Edom; they and their sons and their relatives were capable men with the strength to do the work—descendants of Obed-Edom, 62 in all.
  '9':
  - type: text
    content: Meshelemiah had sons and relatives, who were able men—18 in all.
