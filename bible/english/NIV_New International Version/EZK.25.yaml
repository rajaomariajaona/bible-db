document_id: EZK.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Ammon
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'I will give Moab along with the Ammonites to the people of the East as a possession, so that the Ammonites will not be remembered among the nations; '
  '11':
  - type: text
    content: 'and I will inflict punishment on Moab. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: A Prophecy Against Edom
  '12':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Because Edom took revenge on Judah and became very guilty by doing so, '
  '13':
  - type: text
    content: 'therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will stretch out my hand against Edom and kill both man and beast. I will lay it waste, and from Teman to Dedan they will fall by the sword. '
  '14':
  - type: text
    content: 'I will take vengeance on Edom by the hand of my people Israel, and they will deal with Edom in accordance with my anger and my wrath; they will know my vengeance, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: A Prophecy Against Philistia
  '15':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Because the Philistines acted in vengeance and took revenge with malice in their hearts, and with ancient hostility sought to destroy Judah, '
  '16':
  - type: text
    content: 'therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am about to stretch out my hand against the Philistines, and I will wipe out the Kerethites and destroy those remaining along the coast. '
  '17':
  - type: text
    content: 'I will carry out great vengeance on them and punish them in my wrath. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I take vengeance on them.’ ”'
  '2':
  - type: text
    content: '“Son of man, set your face against the Ammonites and prophesy against them. '
  '3':
  - type: text
    content: 'Say to them, ‘Hear the word of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because you said “Aha!” over my sanctuary when it was desecrated and over the land of Israel when it was laid waste and over the people of Judah when they went into exile, '
  '4':
  - type: text
    content: 'therefore I am going to give you to the people of the East as a possession. They will set up their camps and pitch their tents among you; they will eat your fruit and drink your milk. '
  '5':
  - type: text
    content: 'I will turn Rabbah into a pasture for camels and Ammon into a resting place for sheep. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because you have clapped your hands and stamped your feet, rejoicing with all the malice of your heart against the land of Israel, '
  '7':
  - type: text
    content: 'therefore I will stretch out my hand against you and give you as plunder to the nations. I will wipe you out from among the nations and exterminate you from the countries. I will destroy you, and you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: A Prophecy Against Moab
  '8':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Because Moab and Seir said, “Look, Judah has become like all the other nations,” '
  '9':
  - type: text
    content: 'therefore I will expose the flank of Moab, beginning at its frontier towns—Beth Jeshimoth, Baal Meon and Kiriathaim—the glory of that land. '
