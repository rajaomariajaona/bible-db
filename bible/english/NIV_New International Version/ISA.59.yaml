document_id: ISA.59,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sin, Confession and Redemption
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Surely the arm of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is not too short to save,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor his ear too dull to hear.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Like the blind we grope along the wall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: feeling our way like people without eyes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At midday we stumble as if it were twilight;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among the strong, we are like the dead.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: We all growl like bears;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we moan mournfully like doves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We look for justice, but find none;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for deliverance, but it is far away.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For our offenses are many in your sight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and our sins testify against us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our offenses are ever with us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and we acknowledge our iniquities:'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'rebellion and treachery against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turning our backs on our God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: inciting revolt and oppression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: uttering lies our hearts have conceived.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So justice is driven back,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and righteousness stands at a distance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: truth has stumbled in the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: honesty cannot enter.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Truth is nowhere to be found,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whoever shuns evil becomes a prey.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looked and was displeased'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that there was no justice.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He saw that there was no one,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he was appalled that there was no one to intervene;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so his own arm achieved salvation for him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his own righteousness sustained him.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He put on righteousness as his breastplate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the helmet of salvation on his head;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he put on the garments of vengeance
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wrapped himself in zeal as in a cloak.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: According to what they have done,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so will he repay
  - type: usfm
    marker: q1
    children:
    - type: text
      text: wrath to his enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and retribution to his foes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will repay the islands their due.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'From the west, people will fear the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the rising of the sun, they will revere his glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he will come like a pent-up flood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that the breath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' drives along.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '59:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'When enemies come in like a flood, / the Spirit of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' will put them to flight'
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: But your iniquities have separated
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you from your God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your sins have hidden his face from you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that he will not hear.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “The Redeemer will come to Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to those in Jacob who repent of their sins,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“As for me, this is my covenant with them,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. “My Spirit, who is on you, will not depart from you, and my words that I have put in your mouth will always be on your lips, on the lips of your children and on the lips of their descendants—from this time on and forever,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For your hands are stained with blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your fingers with guilt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your lips have spoken falsely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your tongue mutters wicked things.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: No one calls for justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one pleads a case with integrity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They rely on empty arguments, they utter lies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they conceive trouble and give birth to evil.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They hatch the eggs of vipers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and spin a spider’s web.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever eats their eggs will die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and when one is broken, an adder is hatched.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Their cobwebs are useless for clothing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they cannot cover themselves with what they make.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their deeds are evil deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and acts of violence are in their hands.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Their feet rush into sin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are swift to shed innocent blood.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They pursue evil schemes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: acts of violence mark their ways.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The way of peace they do not know;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no justice in their paths.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have turned them into crooked roads;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one who walks along them will know peace.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So justice is far from us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and righteousness does not reach us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We look for light, but all is darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for brightness, but we walk in deep shadows.
