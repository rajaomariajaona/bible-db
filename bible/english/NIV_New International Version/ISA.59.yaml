document_id: ISA.59,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Sin, Confession and Redemption
  - type: text
    content: 'Surely the arm of the '
  - type: text
    content: Lord
  - type: text
    content: ' is not too short to save,'
  - type: text
    content: nor his ear too dull to hear.
  '10':
  - type: text
    content: Like the blind we grope along the wall,
  - type: text
    content: feeling our way like people without eyes.
  - type: text
    content: At midday we stumble as if it were twilight;
  - type: text
    content: among the strong, we are like the dead.
  '11':
  - type: text
    content: We all growl like bears;
  - type: text
    content: we moan mournfully like doves.
  - type: text
    content: We look for justice, but find none;
  - type: text
    content: for deliverance, but it is far away.
  '12':
  - type: text
    content: For our offenses are many in your sight,
  - type: text
    content: and our sins testify against us.
  - type: text
    content: Our offenses are ever with us,
  - type: text
    content: 'and we acknowledge our iniquities:'
  '13':
  - type: text
    content: 'rebellion and treachery against the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: turning our backs on our God,
  - type: text
    content: inciting revolt and oppression,
  - type: text
    content: uttering lies our hearts have conceived.
  '14':
  - type: text
    content: So justice is driven back,
  - type: text
    content: and righteousness stands at a distance;
  - type: text
    content: truth has stumbled in the streets,
  - type: text
    content: honesty cannot enter.
  '15':
  - type: text
    content: Truth is nowhere to be found,
  - type: text
    content: and whoever shuns evil becomes a prey.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' looked and was displeased'
  - type: text
    content: that there was no justice.
  '16':
  - type: text
    content: He saw that there was no one,
  - type: text
    content: he was appalled that there was no one to intervene;
  - type: text
    content: so his own arm achieved salvation for him,
  - type: text
    content: and his own righteousness sustained him.
  '17':
  - type: text
    content: He put on righteousness as his breastplate,
  - type: text
    content: and the helmet of salvation on his head;
  - type: text
    content: he put on the garments of vengeance
  - type: text
    content: and wrapped himself in zeal as in a cloak.
  '18':
  - type: text
    content: According to what they have done,
  - type: text
    content: so will he repay
  - type: text
    content: wrath to his enemies
  - type: text
    content: and retribution to his foes;
  - type: text
    content: he will repay the islands their due.
  '19':
  - type: text
    content: 'From the west, people will fear the name of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and from the rising of the sun, they will revere his glory.
  - type: text
    content: For he will come like a pent-up flood
  - type: text
    content: 'that the breath of the '
  - type: text
    content: Lord
  - type: text
    content: ' drives along.'
  - type: note
    content: Or When enemies come in like a flood, / the Spirit of the Lord will put them to flight
  '2':
  - type: text
    content: But your iniquities have separated
  - type: text
    content: you from your God;
  - type: text
    content: your sins have hidden his face from you,
  - type: text
    content: so that he will not hear.
  '20':
  - type: text
    content: “The Redeemer will come to Zion,
  - type: text
    content: to those in Jacob who repent of their sins,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: '“As for me, this is my covenant with them,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. “My Spirit, who is on you, will not depart from you, and my words that I have put in your mouth will always be on your lips, on the lips of your children and on the lips of their descendants—from this time on and forever,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: For your hands are stained with blood,
  - type: text
    content: your fingers with guilt.
  - type: text
    content: Your lips have spoken falsely,
  - type: text
    content: and your tongue mutters wicked things.
  '4':
  - type: text
    content: No one calls for justice;
  - type: text
    content: no one pleads a case with integrity.
  - type: text
    content: They rely on empty arguments, they utter lies;
  - type: text
    content: they conceive trouble and give birth to evil.
  '5':
  - type: text
    content: They hatch the eggs of vipers
  - type: text
    content: and spin a spider’s web.
  - type: text
    content: Whoever eats their eggs will die,
  - type: text
    content: and when one is broken, an adder is hatched.
  '6':
  - type: text
    content: Their cobwebs are useless for clothing;
  - type: text
    content: they cannot cover themselves with what they make.
  - type: text
    content: Their deeds are evil deeds,
  - type: text
    content: and acts of violence are in their hands.
  '7':
  - type: text
    content: Their feet rush into sin;
  - type: text
    content: they are swift to shed innocent blood.
  - type: text
    content: They pursue evil schemes;
  - type: text
    content: acts of violence mark their ways.
  '8':
  - type: text
    content: The way of peace they do not know;
  - type: text
    content: there is no justice in their paths.
  - type: text
    content: They have turned them into crooked roads;
  - type: text
    content: no one who walks along them will know peace.
  '9':
  - type: text
    content: So justice is far from us,
  - type: text
    content: and righteousness does not reach us.
  - type: text
    content: We look for light, but all is darkness;
  - type: text
    content: for brightness, but we walk in deep shadows.
