verses:
  '1':
  - type: heading
    content: Psalm 4In Hebrew texts 4:1-8 is numbered 4:2-9.
  - type: text
    content: For the director of music. With stringed instruments. A psalm of David.
  - type: text
    content: Answer me when I call to you,
  - type: text
    content: my righteous God.
  - type: text
    content: Give me relief from my distress;
  - type: text
    content: have mercy on me and hear my prayer.
  '2':
  - type: text
    content: How long will you people turn my glory into shame?
  - type: text
    content: How long will you love delusions and seek false gods
  - type: note
    content: Or seek lies
  - type: text
    content: '?'
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 4.
  '3':
  - type: text
    content: 'Know that the '
  - type: text
    content: Lord
  - type: text
    content: ' has set apart his faithful servant for himself;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' hears when I call to him.'
  '4':
  - type: text
    content: Tremble and
  - type: note
    content: Or In your anger (see Septuagint)
  - type: text
    content: ' do not sin;'
  - type: text
    content: when you are on your beds,
  - type: text
    content: search your hearts and be silent.
  '5':
  - type: text
    content: Offer the sacrifices of the righteous
  - type: text
    content: 'and trust in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: 'Many, '
  - type: text
    content: Lord
  - type: text
    content: ', are asking, “Who will bring us prosperity?”'
  - type: text
    content: Let the light of your face shine on us.
  '7':
  - type: text
    content: Fill my heart with joy
  - type: text
    content: when their grain and new wine abound.
  '8':
  - type: text
    content: In peace I will lie down and sleep,
  - type: text
    content: 'for you alone, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: make me dwell in safety.
