document_id: JOB.28,111
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Interlude: Where Wisdom Is Found'
  - type: text
    content: There is a mine for silver
  - type: text
    content: and a place where gold is refined.
  '10':
  - type: text
    content: They tunnel through the rock;
  - type: text
    content: their eyes see all its treasures.
  '11':
  - type: text
    content: They search
  - type: note
    content: Septuagint, Aquila and Vulgate; Hebrew They dam up
  - type: text
    content: ' the sources of the rivers'
  - type: text
    content: and bring hidden things to light.
  '12':
  - type: text
    content: But where can wisdom be found?
  - type: text
    content: Where does understanding dwell?
  '13':
  - type: text
    content: No mortal comprehends its worth;
  - type: text
    content: it cannot be found in the land of the living.
  '14':
  - type: text
    content: The deep says, “It is not in me”;
  - type: text
    content: the sea says, “It is not with me.”
  '15':
  - type: text
    content: It cannot be bought with the finest gold,
  - type: text
    content: nor can its price be weighed out in silver.
  '16':
  - type: text
    content: It cannot be bought with the gold of Ophir,
  - type: text
    content: with precious onyx or lapis lazuli.
  '17':
  - type: text
    content: Neither gold nor crystal can compare with it,
  - type: text
    content: nor can it be had for jewels of gold.
  '18':
  - type: text
    content: Coral and jasper are not worthy of mention;
  - type: text
    content: the price of wisdom is beyond rubies.
  '19':
  - type: text
    content: The topaz of Cush cannot compare with it;
  - type: text
    content: it cannot be bought with pure gold.
  '2':
  - type: text
    content: Iron is taken from the earth,
  - type: text
    content: and copper is smelted from ore.
  '20':
  - type: text
    content: Where then does wisdom come from?
  - type: text
    content: Where does understanding dwell?
  '21':
  - type: text
    content: It is hidden from the eyes of every living thing,
  - type: text
    content: concealed even from the birds in the sky.
  '22':
  - type: text
    content: Destruction
  - type: note
    content: Hebrew Abaddon
  - type: text
    content: ' and Death say,'
  - type: text
    content: “Only a rumor of it has reached our ears.”
  '23':
  - type: text
    content: God understands the way to it
  - type: text
    content: and he alone knows where it dwells,
  '24':
  - type: text
    content: for he views the ends of the earth
  - type: text
    content: and sees everything under the heavens.
  '25':
  - type: text
    content: When he established the force of the wind
  - type: text
    content: and measured out the waters,
  '26':
  - type: text
    content: when he made a decree for the rain
  - type: text
    content: and a path for the thunderstorm,
  '27':
  - type: text
    content: then he looked at wisdom and appraised it;
  - type: text
    content: he confirmed it and tested it.
  '28':
  - type: text
    content: And he said to the human race,
  - type: text
    content: “The fear of the Lord—that is wisdom,
  - type: text
    content: and to shun evil is understanding.”
  '3':
  - type: text
    content: Mortals put an end to the darkness;
  - type: text
    content: they search out the farthest recesses
  - type: text
    content: for ore in the blackest darkness.
  '4':
  - type: text
    content: Far from human dwellings they cut a shaft,
  - type: text
    content: in places untouched by human feet;
  - type: text
    content: far from other people they dangle and sway.
  '5':
  - type: text
    content: The earth, from which food comes,
  - type: text
    content: is transformed below as by fire;
  '6':
  - type: text
    content: lapis lazuli comes from its rocks,
  - type: text
    content: and its dust contains nuggets of gold.
  '7':
  - type: text
    content: No bird of prey knows that hidden path,
  - type: text
    content: no falcon’s eye has seen it.
  '8':
  - type: text
    content: Proud beasts do not set foot on it,
  - type: text
    content: and no lion prowls there.
  '9':
  - type: text
    content: People assault the flinty rock with their hands
  - type: text
    content: and lay bare the roots of the mountains.
