document_id: JOB.28,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Interlude: Where Wisdom Is Found'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: There is a mine for silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a place where gold is refined.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They tunnel through the rock;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their eyes see all its treasures.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They search
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Aquila and Vulgate; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They dam up
      marker-yv: yv-n
    - type: text
      text: ' the sources of the rivers'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring hidden things to light.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But where can wisdom be found?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where does understanding dwell?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: No mortal comprehends its worth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it cannot be found in the land of the living.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The deep says, “It is not in me”;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sea says, “It is not with me.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: It cannot be bought with the finest gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor can its price be weighed out in silver.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: It cannot be bought with the gold of Ophir,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with precious onyx or lapis lazuli.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Neither gold nor crystal can compare with it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor can it be had for jewels of gold.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Coral and jasper are not worthy of mention;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the price of wisdom is beyond rubies.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The topaz of Cush cannot compare with it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it cannot be bought with pure gold.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Iron is taken from the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and copper is smelted from ore.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Where then does wisdom come from?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where does understanding dwell?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: It is hidden from the eyes of every living thing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: concealed even from the birds in the sky.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Destruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abaddon
      marker-yv: yv-n
    - type: text
      text: ' and Death say,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Only a rumor of it has reached our ears.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: God understands the way to it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he alone knows where it dwells,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: for he views the ends of the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sees everything under the heavens.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When he established the force of the wind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and measured out the waters,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: when he made a decree for the rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a path for the thunderstorm,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: then he looked at wisdom and appraised it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he confirmed it and tested it.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: And he said to the human race,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “The fear of the Lord—that is wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to shun evil is understanding.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mortals put an end to the darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they search out the farthest recesses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for ore in the blackest darkness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Far from human dwellings they cut a shaft,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in places untouched by human feet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far from other people they dangle and sway.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The earth, from which food comes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is transformed below as by fire;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: lapis lazuli comes from its rocks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its dust contains nuggets of gold.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: No bird of prey knows that hidden path,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no falcon’s eye has seen it.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Proud beasts do not set foot on it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no lion prowls there.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: People assault the flinty rock with their hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lay bare the roots of the mountains.
