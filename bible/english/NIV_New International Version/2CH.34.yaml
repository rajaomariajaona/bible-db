document_id: 2CH.34,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah’s Reforms
  - type: text
    content: 'Josiah was eight years old when he became king, and he reigned in Jerusalem thirty-one years. '
  '10':
  - type: text
    content: 'Then they entrusted it to the men appointed to supervise the work on the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple. These men paid the workers who repaired and restored the temple. '
  '11':
  - type: text
    content: They also gave money to the carpenters and builders to purchase dressed stone, and timber for joists and beams for the buildings that the kings of Judah had allowed to fall into ruin.
  '12':
  - type: text
    content: 'The workers labored faithfully. Over them to direct them were Jahath and Obadiah, Levites descended from Merari, and Zechariah and Meshullam, descended from Kohath. The Levites—all who were skilled in playing musical instruments— '
  '13':
  - type: text
    content: had charge of the laborers and supervised all the workers from job to job. Some of the Levites were secretaries, scribes and gatekeepers.
  - type: heading
    content: The Book of the Law Found
  '14':
  - type: text
    content: 'While they were bringing out the money that had been taken into the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', Hilkiah the priest found the Book of the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ' that had been given through Moses. '
  '15':
  - type: text
    content: 'Hilkiah said to Shaphan the secretary, “I have found the Book of the Law in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .” He gave it to Shaphan.
  '16':
  - type: text
    content: 'Then Shaphan took the book to the king and reported to him: “Your officials are doing everything that has been committed to them. '
  '17':
  - type: text
    content: 'They have paid out the money that was in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and have entrusted it to the supervisors and workers.” '
  '18':
  - type: text
    content: Then Shaphan the secretary informed the king, “Hilkiah the priest has given me a book.” And Shaphan read from it in the presence of the king.
  '19':
  - type: text
    content: 'When the king heard the words of the Law, he tore his robes. '
  '2':
  - type: text
    content: 'He did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' and followed the ways of his father David, not turning aside to the right or to the left.'
  '20':
  - type: text
    content: He gave these orders to Hilkiah, Ahikam son of Shaphan, Abdon son of Micah,
  - type: note
    content: Also called Akbor son of Micaiah
  - type: text
    content: ' Shaphan the secretary and Asaiah the king’s attendant: '
  '21':
  - type: text
    content: '“Go and inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ' for me and for the remnant in Israel and Judah about what is written in this book that has been found. Great is the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger that is poured out on us because those who have gone before us have not kept the word of the '
  - type: text
    content: Lord
  - type: text
    content: ; they have not acted in accordance with all that is written in this book.”
  '22':
  - type: text
    content: Hilkiah and those the king had sent with him
  - type: note
    content: One Hebrew manuscript, Vulgate and Syriac; most Hebrew manuscripts do not have had sent with him.
  - type: text
    content: ' went to speak to the prophet Huldah, who was the wife of Shallum son of Tokhath,'
  - type: note
    content: Also called Tikvah
  - type: text
    content: ' the son of Hasrah,'
  - type: note
    content: Also called Harhas
  - type: text
    content: ' keeper of the wardrobe. She lived in Jerusalem, in the New Quarter.'
  '23':
  - type: text
    content: 'She said to them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Tell the man who sent you to me, '
  '24':
  - type: text
    content: '‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am going to bring disaster on this place and its people—all the curses written in the book that has been read in the presence of the king of Judah. '
  '25':
  - type: text
    content: Because they have forsaken me and burned incense to other gods and aroused my anger by all that their hands have made,
  - type: note
    content: Or by everything they have done
  - type: text
    content: ' my anger will be poured out on this place and will not be quenched.’ '
  '26':
  - type: text
    content: 'Tell the king of Judah, who sent you to inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says concerning the words you heard: '
  '27':
  - type: text
    content: 'Because your heart was responsive and you humbled yourself before God when you heard what he spoke against this place and its people, and because you humbled yourself before me and tore your robes and wept in my presence, I have heard you, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: Now I will gather you to your ancestors, and you will be buried in peace. Your eyes will not see all the disaster I am going to bring on this place and on those who live here.’ ”
  - type: text
    content: So they took her answer back to the king.
  '29':
  - type: text
    content: 'Then the king called together all the elders of Judah and Jerusalem. '
  '3':
  - type: text
    content: 'In the eighth year of his reign, while he was still young, he began to seek the God of his father David. In his twelfth year he began to purge Judah and Jerusalem of high places, Asherah poles and idols. '
  '30':
  - type: text
    content: 'He went up to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' with the people of Judah, the inhabitants of Jerusalem, the priests and the Levites—all the people from the least to the greatest. He read in their hearing all the words of the Book of the Covenant, which had been found in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'The king stood by his pillar and renewed the covenant in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: '—to follow the '
  - type: text
    content: Lord
  - type: text
    content: ' and keep his commands, statutes and decrees with all his heart and all his soul, and to obey the words of the covenant written in this book.'
  '32':
  - type: text
    content: Then he had everyone in Jerusalem and Benjamin pledge themselves to it; the people of Jerusalem did this in accordance with the covenant of God, the God of their ancestors.
  '33':
  - type: text
    content: 'Josiah removed all the detestable idols from all the territory belonging to the Israelites, and he had all who were present in Israel serve the '
  - type: text
    content: Lord
  - type: text
    content: ' their God. As long as he lived, they did not fail to follow the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors.'
  '4':
  - type: text
    content: 'Under his direction the altars of the Baals were torn down; he cut to pieces the incense altars that were above them, and smashed the Asherah poles and the idols. These he broke to pieces and scattered over the graves of those who had sacrificed to them. '
  '5':
  - type: text
    content: 'He burned the bones of the priests on their altars, and so he purged Judah and Jerusalem. '
  '6':
  - type: text
    content: 'In the towns of Manasseh, Ephraim and Simeon, as far as Naphtali, and in the ruins around them, '
  '7':
  - type: text
    content: he tore down the altars and the Asherah poles and crushed the idols to powder and cut to pieces all the incense altars throughout Israel. Then he went back to Jerusalem.
  '8':
  - type: text
    content: 'In the eighteenth year of Josiah’s reign, to purify the land and the temple, he sent Shaphan son of Azaliah and Maaseiah the ruler of the city, with Joah son of Joahaz, the recorder, to repair the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God.'
  '9':
  - type: text
    content: 'They went to Hilkiah the high priest and gave him the money that had been brought into the temple of God, which the Levites who were the gatekeepers had collected from the people of Manasseh, Ephraim and the entire remnant of Israel and from all the people of Judah and Benjamin and the inhabitants of Jerusalem. '
