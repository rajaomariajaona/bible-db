document_id: RUT.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ruth Meets Boaz in the Grain Field
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Naomi had a relative on her husband’s side, a man of standing from the clan of Elimelek, whose name was Boaz.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At this, she bowed down with her face to the ground. She asked him, “Why have I found such favor in your eyes that you notice me—a foreigner?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Boaz replied, “I’ve been told all about what you have done for your mother-in-law since the death of your husband—how you left your father and mother and your homeland and came to live with a people you did not know before. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' repay you for what you have done. May you be richly rewarded by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, under whose wings you have come to take refuge.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “May I continue to find favor in your eyes, my lord,” she said. “You have put me at ease by speaking kindly to your servant—though I do not have the standing of one of your servants.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At mealtime Boaz said to her, “Come over here. Have some bread and dip it in the wine vinegar.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When she sat down with the harvesters, he offered her some roasted grain. She ate all she wanted and had some left over. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As she got up to glean, Boaz gave orders to his men, “Let her gather among the sheaves and don’t reprimand her. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even pull out some stalks for her from the bundles and leave them for her to pick up, and don’t rebuke her.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Ruth gleaned in the field until evening. Then she threshed the barley she had gathered, and it amounted to about an ephah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 30 pounds or about 13 kilograms
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She carried it back to town, and her mother-in-law saw how much she had gathered. Ruth also brought out and gave her what she had left over after she had eaten enough.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Her mother-in-law asked her, “Where did you glean today? Where did you work? Blessed be the man who took notice of you!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Ruth told her mother-in-law about the one at whose place she had been working. “The name of the man I worked with today is Boaz,” she said.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Ruth the Moabite said to Naomi, “Let me go to the fields and pick up the leftover grain behind anyone in whose eyes I find favor.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naomi said to her, “Go ahead, my daughter.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless him!” Naomi said to her daughter-in-law. “He has not stopped showing his kindness to the living and the dead.” She added, “That man is our close relative; he is one of our guardian-redeemers.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'guardian-redeemer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a legal term for one who has the obligation to redeem a relative in serious difficulty (see Lev. 25:25-55).
      marker-yv: yv-n
    - type: text
      text: ”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Ruth the Moabite said, “He even said to me, ‘Stay with my workers until they finish harvesting all my grain.’ ”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naomi said to Ruth her daughter-in-law, “It will be good for you, my daughter, to go with the women who work for him, because in someone else’s field you might be harmed.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Ruth stayed close to the women of Boaz to glean until the barley and wheat harvests were finished. And she lived with her mother-in-law.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So she went out, entered a field and began to glean behind the harvesters. As it turned out, she was working in a field belonging to Boaz, who was from the clan of Elimelek.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then Boaz arrived from Bethlehem and greeted the harvesters, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be with you!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you!” they answered.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Boaz asked the overseer of his harvesters, “Who does that young woman belong to?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The overseer replied, “She is the Moabite who came back from Moab with Naomi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She said, ‘Please let me glean and gather among the sheaves behind the harvesters.’ She came into the field and has remained here from morning till now, except for a short rest in the shelter.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Boaz said to Ruth, “My daughter, listen to me. Don’t go and glean in another field and don’t go away from here. Stay here with the women who work for me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Watch the field where the men are harvesting, and follow along after the women. I have told the men not to lay a hand on you. And whenever you are thirsty, go and get a drink from the water jars the men have filled.”
