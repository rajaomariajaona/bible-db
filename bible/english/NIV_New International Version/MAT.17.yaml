document_id: MAT.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Transfiguration
  - type: text
    content: 'After six days Jesus took with him Peter, James and John the brother of James, and led them up a high mountain by themselves. '
  '10':
  - type: text
    content: The disciples asked him, “Why then do the teachers of the law say that Elijah must come first?”
  '11':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “To be sure, Elijah comes and will restore all things.
  - type: text
    content: ' '
  '12':
  - type: text
    content: But I tell you, Elijah has already come, and they did not recognize him, but have done to him everything they wished. In the same way the Son of Man is going to suffer at their hands.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: Then the disciples understood that he was talking to them about John the Baptist.
  - type: heading
    content: Jesus Heals a Demon-Possessed Boy
  '14':
  - type: text
    content: 'When they came to the crowd, a man approached Jesus and knelt before him. '
  '15':
  - type: text
    content: '“Lord, have mercy on my son,” he said. “He has seizures and is suffering greatly. He often falls into the fire or into the water. '
  '16':
  - type: text
    content: I brought him to your disciples, but they could not heal him.”
  '17':
  - type: text
    content: ' '
  - type: text
    content: “You unbelieving and perverse generation,”
  - type: text
    content: ' Jesus replied, '
  - type: text
    content: “how long shall I stay with you? How long shall I put up with you? Bring the boy here to me.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: Jesus rebuked the demon, and it came out of the boy, and he was healed at that moment.
  '19':
  - type: text
    content: Then the disciples came to Jesus in private and asked, “Why couldn’t we drive it out?”
  '2':
  - type: text
    content: 'There he was transfigured before them. His face shone like the sun, and his clothes became as white as the light. '
  '20':
  - type: text
    content: 'He replied, '
  - type: text
    content: “Because you have so little faith. Truly I tell you, if you have faith as small as a mustard seed, you can say to this mountain, ‘Move from here to there,’ and it will move. Nothing will be impossible for you.”
  - type: text
    content: ' '
  '21':
  - type: note
    content: Some manuscripts include here words similar to Mark 9:29.
  - type: heading
    content: Jesus Predicts His Death a Second Time
  '22':
  - type: text
    content: 'When they came together in Galilee, he said to them, '
  - type: text
    content: “The Son of Man is going to be delivered into the hands of men.
  - type: text
    content: ' '
  '23':
  - type: text
    content: They will kill him, and on the third day he will be raised to life.”
  - type: text
    content: ' And the disciples were filled with grief.'
  - type: heading
    content: The Temple Tax
  '24':
  - type: text
    content: After Jesus and his disciples arrived in Capernaum, the collectors of the two-drachma temple tax came to Peter and asked, “Doesn’t your teacher pay the temple tax?”
  '25':
  - type: text
    content: “Yes, he does,” he replied.
  - type: text
    content: 'When Peter came into the house, Jesus was the first to speak. '
  - type: text
    content: “What do you think, Simon?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “From whom do the kings of the earth collect duty and taxes—from their own children or from others?”
  '26':
  - type: text
    content: “From others,” Peter answered.
  - type: text
    content: “Then the children are exempt,”
  - type: text
    content: ' Jesus said to him. '
  '27':
  - type: text
    content: “But so that we may not cause offense, go to the lake and throw out your line. Take the first fish you catch; open its mouth and you will find a four-drachma coin. Take it and give it to them for my tax and yours.”
  '3':
  - type: text
    content: Just then there appeared before them Moses and Elijah, talking with Jesus.
  '4':
  - type: text
    content: Peter said to Jesus, “Lord, it is good for us to be here. If you wish, I will put up three shelters—one for you, one for Moses and one for Elijah.”
  '5':
  - type: text
    content: While he was still speaking, a bright cloud covered them, and a voice from the cloud said, “This is my Son, whom I love; with him I am well pleased. Listen to him!”
  '6':
  - type: text
    content: 'When the disciples heard this, they fell facedown to the ground, terrified. '
  '7':
  - type: text
    content: 'But Jesus came and touched them. '
  - type: text
    content: “Get up,”
  - type: text
    content: ' he said. '
  - type: text
    content: “Don’t be afraid.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: When they looked up, they saw no one except Jesus.
  '9':
  - type: text
    content: 'As they were coming down the mountain, Jesus instructed them, '
  - type: text
    content: “Don’t tell anyone what you have seen, until the Son of Man has been raised from the dead.”
