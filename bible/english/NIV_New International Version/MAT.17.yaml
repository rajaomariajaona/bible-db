document_id: MAT.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Transfiguration
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After six days Jesus took with him Peter, James and John the brother of James, and led them up a high mountain by themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'There he was transfigured before them. His face shone like the sun, and his clothes became as white as the light. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Just then there appeared before them Moses and Elijah, talking with Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Peter said to Jesus, “Lord, it is good for us to be here. If you wish, I will put up three shelters—one for you, one for Moses and one for Elijah.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: While he was still speaking, a bright cloud covered them, and a voice from the cloud said, “This is my Son, whom I love; with him I am well pleased. Listen to him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When the disciples heard this, they fell facedown to the ground, terrified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But Jesus came and touched them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Get up,”
  - type: text
    text: ' he said. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t be afraid.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When they looked up, they saw no one except Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'As they were coming down the mountain, Jesus instructed them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t tell anyone what you have seen, until the Son of Man has been raised from the dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The disciples asked him, “Why then do the teachers of the law say that Elijah must come first?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “To be sure, Elijah comes and will restore all things.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I tell you, Elijah has already come, and they did not recognize him, but have done to him everything they wished. In the same way the Son of Man is going to suffer at their hands.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then the disciples understood that he was talking to them about John the Baptist.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Demon-Possessed Boy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When they came to the crowd, a man approached Jesus and knelt before him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Lord, have mercy on my son,” he said. “He has seizures and is suffering greatly. He often falls into the fire or into the water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I brought him to your disciples, but they could not heal him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You unbelieving and perverse generation,”
  - type: text
    text: ' Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “how long shall I stay with you? How long shall I put up with you? Bring the boy here to me.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Jesus rebuked the demon, and it came out of the boy, and he was healed at that moment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then the disciples came to Jesus in private and asked, “Why couldn’t we drive it out?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Because you have so little faith. Truly I tell you, if you have faith as small as a mustard seed, you can say to this mountain, ‘Move from here to there,’ and it will move. Nothing will be impossible for you.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '[21]'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts include here words similar to Mark 9:29.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts His Death a Second Time
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When they came together in Galilee, he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Son of Man is going to be delivered into the hands of men.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They will kill him, and on the third day he will be raised to life.”
  - type: text
    text: ' And the disciples were filled with grief.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Temple Tax
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: After Jesus and his disciples arrived in Capernaum, the collectors of the two-drachma temple tax came to Peter and asked, “Doesn’t your teacher pay the temple tax?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Yes, he does,” he replied.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'When Peter came into the house, Jesus was the first to speak. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What do you think, Simon?”
  - type: text
    text: ' he asked. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “From whom do the kings of the earth collect duty and taxes—from their own children or from others?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “From others,” Peter answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the children are exempt,”
  - type: text
    text: ' Jesus said to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But so that we may not cause offense, go to the lake and throw out your line. Take the first fish you catch; open its mouth and you will find a four-drachma coin. Take it and give it to them for my tax and yours.”
