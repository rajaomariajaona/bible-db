document_id: JDG.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Tola
  - type: text
    content: 'After the time of Abimelek, a man of Issachar named Tola son of Puah, the son of Dodo, rose to save Israel. He lived in Shamir, in the hill country of Ephraim. '
  '10':
  - type: text
    content: 'Then the Israelites cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “We have sinned against you, forsaking our God and serving the Baals.”'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “When the Egyptians, the Amorites, the Ammonites, the Philistines, '
  '12':
  - type: text
    content: the Sidonians, the Amalekites and the Maonites
  - type: note
    content: Hebrew; some Septuagint manuscripts Midianites
  - type: text
    content: ' oppressed you and you cried to me for help, did I not save you from their hands? '
  '13':
  - type: text
    content: 'But you have forsaken me and served other gods, so I will no longer save you. '
  '14':
  - type: text
    content: Go and cry out to the gods you have chosen. Let them save you when you are in trouble!”
  '15':
  - type: text
    content: 'But the Israelites said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “We have sinned. Do with us whatever you think best, but please rescue us now.” '
  '16':
  - type: text
    content: 'Then they got rid of the foreign gods among them and served the '
  - type: text
    content: Lord
  - type: text
    content: . And he could bear Israel’s misery no longer.
  '17':
  - type: text
    content: 'When the Ammonites were called to arms and camped in Gilead, the Israelites assembled and camped at Mizpah. '
  '18':
  - type: text
    content: The leaders of the people of Gilead said to each other, “Whoever will take the lead in attacking the Ammonites will be head over all who live in Gilead.”
  '2':
  - type: text
    content: He led
  - type: note
    content: Traditionally judged; also in verse 3
  - type: text
    content: ' Israel twenty-three years; then he died, and was buried in Shamir.'
  - type: heading
    content: Jair
  '3':
  - type: text
    content: 'He was followed by Jair of Gilead, who led Israel twenty-two years. '
  '4':
  - type: text
    content: He had thirty sons, who rode thirty donkeys. They controlled thirty towns in Gilead, which to this day are called Havvoth Jair.
  - type: note
    content: Or called the settlements of Jair
  - type: text
    content: ' '
  '5':
  - type: text
    content: When Jair died, he was buried in Kamon.
  - type: heading
    content: Jephthah
  '6':
  - type: text
    content: 'Again the Israelites did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: '. They served the Baals and the Ashtoreths, and the gods of Aram, the gods of Sidon, the gods of Moab, the gods of the Ammonites and the gods of the Philistines. And because the Israelites forsook the '
  - type: text
    content: Lord
  - type: text
    content: ' and no longer served him, '
  '7':
  - type: text
    content: 'he became angry with them. He sold them into the hands of the Philistines and the Ammonites, '
  '8':
  - type: text
    content: 'who that year shattered and crushed them. For eighteen years they oppressed all the Israelites on the east side of the Jordan in Gilead, the land of the Amorites. '
  '9':
  - type: text
    content: 'The Ammonites also crossed the Jordan to fight against Judah, Benjamin and Ephraim; Israel was in great distress. '
