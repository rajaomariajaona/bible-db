document_id: ROM.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham Justified by Faith
  - type: text
    content: 'What then shall we say that Abraham, our forefather according to the flesh, discovered in this matter? '
  '10':
  - type: text
    content: 'Under what circumstances was it credited? Was it after he was circumcised, or before? It was not after, but before! '
  '11':
  - type: text
    content: 'And he received circumcision as a sign, a seal of the righteousness that he had by faith while he was still uncircumcised. So then, he is the father of all who believe but have not been circumcised, in order that righteousness might be credited to them. '
  '12':
  - type: text
    content: And he is then also the father of the circumcised who not only are circumcised but who also follow in the footsteps of the faith that our father Abraham had before he was circumcised.
  '13':
  - type: text
    content: 'It was not through the law that Abraham and his offspring received the promise that he would be heir of the world, but through the righteousness that comes by faith. '
  '14':
  - type: text
    content: 'For if those who depend on the law are heirs, faith means nothing and the promise is worthless, '
  '15':
  - type: text
    content: because the law brings wrath. And where there is no law there is no transgression.
  '16':
  - type: text
    content: 'Therefore, the promise comes by faith, so that it may be by grace and may be guaranteed to all Abraham’s offspring—not only to those who are of the law but also to those who have the faith of Abraham. He is the father of us all. '
  '17':
  - type: text
    content: 'As it is written: “I have made you a father of many nations.”'
  - type: note
    content: Gen. 17:5
  - type: text
    content: ' He is our father in the sight of God, in whom he believed—the God who gives life to the dead and calls into being things that were not.'
  '18':
  - type: text
    content: Against all hope, Abraham in hope believed and so became the father of many nations, just as it had been said to him, “So shall your offspring be.”
  - type: note
    content: Gen. 15:5
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Without weakening in his faith, he faced the fact that his body was as good as dead—since he was about a hundred years old—and that Sarah’s womb was also dead. '
  '2':
  - type: text
    content: 'If, in fact, Abraham was justified by works, he had something to boast about—but not before God. '
  '20':
  - type: text
    content: 'Yet he did not waver through unbelief regarding the promise of God, but was strengthened in his faith and gave glory to God, '
  '21':
  - type: text
    content: 'being fully persuaded that God had power to do what he had promised. '
  '22':
  - type: text
    content: 'This is why “it was credited to him as righteousness.” '
  '23':
  - type: text
    content: 'The words “it was credited to him” were written not for him alone, '
  '24':
  - type: text
    content: 'but also for us, to whom God will credit righteousness—for us who believe in him who raised Jesus our Lord from the dead. '
  '25':
  - type: text
    content: He was delivered over to death for our sins and was raised to life for our justification.
  '3':
  - type: text
    content: What does Scripture say? “Abraham believed God, and it was credited to him as righteousness.”
  - type: note
    content: Gen. 15:6; also in verse 22
  '4':
  - type: text
    content: 'Now to the one who works, wages are not credited as a gift but as an obligation. '
  '5':
  - type: text
    content: 'However, to the one who does not work but trusts God who justifies the ungodly, their faith is credited as righteousness. '
  '6':
  - type: text
    content: 'David says the same thing when he speaks of the blessedness of the one to whom God credits righteousness apart from works:'
  '7':
  - type: text
    content: “Blessed are those
  - type: text
    content: whose transgressions are forgiven,
  - type: text
    content: whose sins are covered.
  '8':
  - type: text
    content: Blessed is the one
  - type: text
    content: whose sin the Lord will never count against them.”
  - type: note
    content: Psalm 32:1,2
  '9':
  - type: text
    content: 'Is this blessedness only for the circumcised, or also for the uncircumcised? We have been saying that Abraham’s faith was credited to him as righteousness. '
