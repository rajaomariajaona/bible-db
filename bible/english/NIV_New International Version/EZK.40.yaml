document_id: EZK.40,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple Area Restored
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the twenty-fifth year of our exile, at the beginning of the year, on the tenth of the month, in the fourteenth year after the fall of the city—on that very day the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was on me and he took me there. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Inside the east gate were three alcoves on each side; the three had the same measurements, and the faces of the projecting walls on each side had the same measurements. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then he measured the width of the entrance of the gateway; it was ten cubits and its length was thirteen cubits.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 18 feet wide and 23 feet long or about 5.3 meters wide and 6.9 meters long
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'In front of each alcove was a wall one cubit high, and the alcoves were six cubits square. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then he measured the gateway from the top of the rear wall of one alcove to the top of the opposite one; the distance was twenty-five cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 44 feet or about 13 meters; also in verses 21, 25, 29, 30, 33 and 36
      marker-yv: yv-n
    - type: text
      text: ' from one parapet opening to the opposite one. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He measured along the faces of the projecting walls all around the inside of the gateway—sixty cubits.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 105 feet or about 32 meters
      marker-yv: yv-n
    - type: text
      text: ' The measurement was up to the portico'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: projecting wall
      marker-yv: yv-n
    - type: text
      text: ' facing the courtyard.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this verse is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The distance from the entrance of the gateway to the far end of its portico was fifty cubits.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 88 feet or about 27 meters; also in verses 21, 25, 29, 33 and 36
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The alcoves and the projecting walls inside the gateway were surmounted by narrow parapet openings all around, as was the portico; the openings all around faced inward. The faces of the projecting walls were decorated with palm trees.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Outer Court
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then he brought me into the outer court. There I saw some rooms and a pavement that had been constructed all around the court; there were thirty rooms along the pavement. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'It abutted the sides of the gateways and was as wide as they were long; this was the lower pavement. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then he measured the distance from the inside of the lower gateway to the outside of the inner court; it was a hundred cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 175 feet or about 53 meters; also in verses 23, 27 and 47
      marker-yv: yv-n
    - type: text
      text: ' on the east side as well as on the north.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The North Gate
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'In visions of God he took me to the land of Israel and set me on a very high mountain, on whose south side were some buildings that looked like a city. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then he measured the length and width of the north gate, leading into the outer court. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Its alcoves—three on each side—its projecting walls and its portico had the same measurements as those of the first gateway. It was fifty cubits long and twenty-five cubits wide. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Its openings, its portico and its palm tree decorations had the same measurements as those of the gate facing east. Seven steps led up to it, with its portico opposite them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: There was a gate to the inner court facing the north gate, just as there was on the east. He measured from one gate to the opposite one; it was a hundred cubits.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The South Gate
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then he led me to the south side and I saw the south gate. He measured its jambs and its portico, and they had the same measurements as the others. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The gateway and its portico had narrow openings all around, like the openings of the others. It was fifty cubits long and twenty-five cubits wide. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Seven steps led up to it, with its portico opposite them; it had palm tree decorations on the faces of the projecting walls on each side. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The inner court also had a gate facing south, and he measured from this gate to the outer gate on the south side; it was a hundred cubits.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Gates to the Inner Court
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Then he brought me into the inner court through the south gate, and he measured the south gate; it had the same measurements as the others. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Its alcoves, its projecting walls and its portico had the same measurements as the others. The gateway and its portico had openings all around. It was fifty cubits long and twenty-five cubits wide. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'He took me there, and I saw a man whose appearance was like bronze; he was standing in the gateway with a linen cord and a measuring rod in his hand. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '(The porticoes of the gateways around the inner court were twenty-five cubits wide and five cubits deep.) '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Its portico faced the outer court; palm trees decorated its jambs, and eight steps led up to it.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Then he brought me to the inner court on the east side, and he measured the gateway; it had the same measurements as the others. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Its alcoves, its projecting walls and its portico had the same measurements as the others. The gateway and its portico had openings all around. It was fifty cubits long and twenty-five cubits wide. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Its portico faced the outer court; palm trees decorated the jambs on either side, and eight steps led up to it.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Then he brought me to the north gate and measured it. It had the same measurements as the others, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'as did its alcoves, its projecting walls and its portico, and it had openings all around. It was fifty cubits long and twenty-five cubits wide. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Its portico
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint (see also verses 31 and 34); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jambs
      marker-yv: yv-n
    - type: text
      text: ' faced the outer court; palm trees decorated the jambs on either side, and eight steps led up to it.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Rooms for Preparing Sacrifices
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'A room with a doorway was by the portico in each of the inner gateways, where the burnt offerings were washed. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: In the portico of the gateway were two tables on each side, on which the burnt offerings, sin offerings
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: purification offerings
      marker-yv: yv-n
    - type: text
      text: ' and guilt offerings were slaughtered. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The man said to me, “Son of man, look carefully and listen closely and pay attention to everything I am going to show you, for that is why you have been brought here. Tell the people of Israel everything you see.”
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The East Gate to the Outer Court
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'By the outside wall of the portico of the gateway, near the steps at the entrance of the north gateway were two tables, and on the other side of the steps were two tables. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'So there were four tables on one side of the gateway and four on the other—eight tables in all—on which the sacrifices were slaughtered. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: There were also four tables of dressed stone for the burnt offerings, each a cubit and a half long, a cubit and a half wide and a cubit high.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 2 2/3 feet long and wide and 21 inches high or about 80 centimeters long and wide and 53 centimeters high
      marker-yv: yv-n
    - type: text
      text: ' On them were placed the utensils for slaughtering the burnt offerings and the other sacrifices. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: And double-pronged hooks, each a handbreadth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 3 1/2 inches or about 9 centimeters
      marker-yv: yv-n
    - type: text
      text: ' long, were attached to the wall all around. The tables were for the flesh of the offerings.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Rooms for the Priests
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Outside the inner gate, within the inner court, were two rooms, one
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: were rooms for singers, which were
      marker-yv: yv-n
    - type: text
      text: ' at the side of the north gate and facing south, and another at the side of the south'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: east
      marker-yv: yv-n
    - type: text
      text: ' gate and facing north. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'He said to me, “The room facing south is for the priests who guard the temple, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'and the room facing north is for the priests who guard the altar. These are the sons of Zadok, who are the only Levites who may draw near to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to minister before him.”'
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Then he measured the court: It was square—a hundred cubits long and a hundred cubits wide. And the altar was in front of the temple.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The New Temple
    marker-yv: yv-h
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: He brought me to the portico of the temple and measured the jambs of the portico; they were five cubits wide on either side. The width of the entrance was fourteen cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 25 feet or about 7.4 meters
      marker-yv: yv-n
    - type: text
      text: ' and its projecting walls were'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entrance was
      marker-yv: yv-n
    - type: text
      text: ' three cubits'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:48 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 5 1/4 feet or about 1.6 meters
      marker-yv: yv-n
    - type: text
      text: ' wide on either side. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: The portico was twenty cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 35 feet or about 11 meters
      marker-yv: yv-n
    - type: text
      text: ' wide, and twelve'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: eleven
      marker-yv: yv-n
    - type: text
      text: ' cubits'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 21 feet or about 6.4 meters
      marker-yv: yv-n
    - type: text
      text: ' from front to back. It was reached by a flight of stairs,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:49 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ten steps led up to it
      marker-yv: yv-n
    - type: text
      text: ' and there were pillars on each side of the jambs.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
