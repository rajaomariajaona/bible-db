document_id: EZK.40,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Temple Area Restored
  - type: text
    content: 'In the twenty-fifth year of our exile, at the beginning of the year, on the tenth of the month, in the fourteenth year after the fall of the city—on that very day the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was on me and he took me there. '
  '10':
  - type: text
    content: 'Inside the east gate were three alcoves on each side; the three had the same measurements, and the faces of the projecting walls on each side had the same measurements. '
  '11':
  - type: text
    content: Then he measured the width of the entrance of the gateway; it was ten cubits and its length was thirteen cubits.
  - type: note
    content: That is, about 18 feet wide and 23 feet long or about 5.3 meters wide and 6.9 meters long
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'In front of each alcove was a wall one cubit high, and the alcoves were six cubits square. '
  '13':
  - type: text
    content: Then he measured the gateway from the top of the rear wall of one alcove to the top of the opposite one; the distance was twenty-five cubits
  - type: note
    content: That is, about 44 feet or about 13 meters; also in verses 21, 25, 29, 30, 33 and 36
  - type: text
    content: ' from one parapet opening to the opposite one. '
  '14':
  - type: text
    content: He measured along the faces of the projecting walls all around the inside of the gateway—sixty cubits.
  - type: note
    content: That is, about 105 feet or about 32 meters
  - type: text
    content: ' The measurement was up to the portico'
  - type: note
    content: Septuagint; Hebrew projecting wall
  - type: text
    content: ' facing the courtyard.'
  - type: note
    content: The meaning of the Hebrew for this verse is uncertain.
  - type: text
    content: ' '
  '15':
  - type: text
    content: The distance from the entrance of the gateway to the far end of its portico was fifty cubits.
  - type: note
    content: That is, about 88 feet or about 27 meters; also in verses 21, 25, 29, 33 and 36
  - type: text
    content: ' '
  '16':
  - type: text
    content: The alcoves and the projecting walls inside the gateway were surmounted by narrow parapet openings all around, as was the portico; the openings all around faced inward. The faces of the projecting walls were decorated with palm trees.
  - type: heading
    content: The Outer Court
  '17':
  - type: text
    content: 'Then he brought me into the outer court. There I saw some rooms and a pavement that had been constructed all around the court; there were thirty rooms along the pavement. '
  '18':
  - type: text
    content: 'It abutted the sides of the gateways and was as wide as they were long; this was the lower pavement. '
  '19':
  - type: text
    content: Then he measured the distance from the inside of the lower gateway to the outside of the inner court; it was a hundred cubits
  - type: note
    content: That is, about 175 feet or about 53 meters; also in verses 23, 27 and 47
  - type: text
    content: ' on the east side as well as on the north.'
  - type: heading
    content: The North Gate
  '2':
  - type: text
    content: 'In visions of God he took me to the land of Israel and set me on a very high mountain, on whose south side were some buildings that looked like a city. '
  '20':
  - type: text
    content: 'Then he measured the length and width of the north gate, leading into the outer court. '
  '21':
  - type: text
    content: 'Its alcoves—three on each side—its projecting walls and its portico had the same measurements as those of the first gateway. It was fifty cubits long and twenty-five cubits wide. '
  '22':
  - type: text
    content: 'Its openings, its portico and its palm tree decorations had the same measurements as those of the gate facing east. Seven steps led up to it, with its portico opposite them. '
  '23':
  - type: text
    content: There was a gate to the inner court facing the north gate, just as there was on the east. He measured from one gate to the opposite one; it was a hundred cubits.
  - type: heading
    content: The South Gate
  '24':
  - type: text
    content: 'Then he led me to the south side and I saw the south gate. He measured its jambs and its portico, and they had the same measurements as the others. '
  '25':
  - type: text
    content: 'The gateway and its portico had narrow openings all around, like the openings of the others. It was fifty cubits long and twenty-five cubits wide. '
  '26':
  - type: text
    content: 'Seven steps led up to it, with its portico opposite them; it had palm tree decorations on the faces of the projecting walls on each side. '
  '27':
  - type: text
    content: The inner court also had a gate facing south, and he measured from this gate to the outer gate on the south side; it was a hundred cubits.
  - type: heading
    content: The Gates to the Inner Court
  '28':
  - type: text
    content: 'Then he brought me into the inner court through the south gate, and he measured the south gate; it had the same measurements as the others. '
  '29':
  - type: text
    content: 'Its alcoves, its projecting walls and its portico had the same measurements as the others. The gateway and its portico had openings all around. It was fifty cubits long and twenty-five cubits wide. '
  '3':
  - type: text
    content: 'He took me there, and I saw a man whose appearance was like bronze; he was standing in the gateway with a linen cord and a measuring rod in his hand. '
  '30':
  - type: text
    content: '(The porticoes of the gateways around the inner court were twenty-five cubits wide and five cubits deep.) '
  '31':
  - type: text
    content: Its portico faced the outer court; palm trees decorated its jambs, and eight steps led up to it.
  '32':
  - type: text
    content: 'Then he brought me to the inner court on the east side, and he measured the gateway; it had the same measurements as the others. '
  '33':
  - type: text
    content: 'Its alcoves, its projecting walls and its portico had the same measurements as the others. The gateway and its portico had openings all around. It was fifty cubits long and twenty-five cubits wide. '
  '34':
  - type: text
    content: Its portico faced the outer court; palm trees decorated the jambs on either side, and eight steps led up to it.
  '35':
  - type: text
    content: 'Then he brought me to the north gate and measured it. It had the same measurements as the others, '
  '36':
  - type: text
    content: 'as did its alcoves, its projecting walls and its portico, and it had openings all around. It was fifty cubits long and twenty-five cubits wide. '
  '37':
  - type: text
    content: Its portico
  - type: note
    content: Septuagint (see also verses 31 and 34); Hebrew jambs
  - type: text
    content: ' faced the outer court; palm trees decorated the jambs on either side, and eight steps led up to it.'
  - type: heading
    content: The Rooms for Preparing Sacrifices
  '38':
  - type: text
    content: 'A room with a doorway was by the portico in each of the inner gateways, where the burnt offerings were washed. '
  '39':
  - type: text
    content: In the portico of the gateway were two tables on each side, on which the burnt offerings, sin offerings
  - type: note
    content: Or purification offerings
  - type: text
    content: ' and guilt offerings were slaughtered. '
  '4':
  - type: text
    content: The man said to me, “Son of man, look carefully and listen closely and pay attention to everything I am going to show you, for that is why you have been brought here. Tell the people of Israel everything you see.”
  - type: heading
    content: The East Gate to the Outer Court
  '40':
  - type: text
    content: 'By the outside wall of the portico of the gateway, near the steps at the entrance of the north gateway were two tables, and on the other side of the steps were two tables. '
  '41':
  - type: text
    content: 'So there were four tables on one side of the gateway and four on the other—eight tables in all—on which the sacrifices were slaughtered. '
  '42':
  - type: text
    content: There were also four tables of dressed stone for the burnt offerings, each a cubit and a half long, a cubit and a half wide and a cubit high.
  - type: note
    content: That is, about 2 2/3 feet long and wide and 21 inches high or about 80 centimeters long and wide and 53 centimeters high
  - type: text
    content: ' On them were placed the utensils for slaughtering the burnt offerings and the other sacrifices. '
  '43':
  - type: text
    content: And double-pronged hooks, each a handbreadth
  - type: note
    content: That is, about 3 1/2 inches or about 9 centimeters
  - type: text
    content: ' long, were attached to the wall all around. The tables were for the flesh of the offerings.'
  - type: heading
    content: The Rooms for the Priests
  '44':
  - type: text
    content: Outside the inner gate, within the inner court, were two rooms, one
  - type: note
    content: Septuagint; Hebrew were rooms for singers, which were
  - type: text
    content: ' at the side of the north gate and facing south, and another at the side of the south'
  - type: note
    content: Septuagint; Hebrew east
  - type: text
    content: ' gate and facing north. '
  '45':
  - type: text
    content: 'He said to me, “The room facing south is for the priests who guard the temple, '
  '46':
  - type: text
    content: 'and the room facing north is for the priests who guard the altar. These are the sons of Zadok, who are the only Levites who may draw near to the '
  - type: text
    content: Lord
  - type: text
    content: ' to minister before him.”'
  '47':
  - type: text
    content: 'Then he measured the court: It was square—a hundred cubits long and a hundred cubits wide. And the altar was in front of the temple.'
  - type: heading
    content: The New Temple
  '48':
  - type: text
    content: He brought me to the portico of the temple and measured the jambs of the portico; they were five cubits wide on either side. The width of the entrance was fourteen cubits
  - type: note
    content: That is, about 25 feet or about 7.4 meters
  - type: text
    content: ' and its projecting walls were'
  - type: note
    content: Septuagint; Hebrew entrance was
  - type: text
    content: ' three cubits'
  - type: note
    content: That is, about 5 1/4 feet or about 1.6 meters
  - type: text
    content: ' wide on either side. '
  '49':
  - type: text
    content: The portico was twenty cubits
  - type: note
    content: That is, about 35 feet or about 11 meters
  - type: text
    content: ' wide, and twelve'
  - type: note
    content: Septuagint; Hebrew eleven
  - type: text
    content: ' cubits'
  - type: note
    content: That is, about 21 feet or about 6.4 meters
  - type: text
    content: ' from front to back. It was reached by a flight of stairs,'
  - type: note
    content: Hebrew; Septuagint Ten steps led up to it
  - type: text
    content: ' and there were pillars on each side of the jambs.'
  '5':
  - type: text
    content: I saw a wall completely surrounding the temple area. The length of the measuring rod in the man’s hand was six long cubits,
  - type: note
    content: That is, about 11 feet or about 3.2 meters; also in verse 12. The long cubit of about 21 inches or about 53 centimeters is the basic unit of measurement of length throughout chapters 40–48.
  - type: text
    content: ' each of which was a cubit and a handbreadth. He measured the wall; it was one measuring rod thick and one rod high.'
  '6':
  - type: text
    content: 'Then he went to the east gate. He climbed its steps and measured the threshold of the gate; it was one rod deep. '
  '7':
  - type: text
    content: The alcoves for the guards were one rod long and one rod wide, and the projecting walls between the alcoves were five cubits
  - type: note
    content: That is, about 8 3/4 feet or about 2.7 meters; also in verse 48
  - type: text
    content: ' thick. And the threshold of the gate next to the portico facing the temple was one rod deep.'
  '8':
  - type: text
    content: 'Then he measured the portico of the gateway; '
  '9':
  - type: text
    content: it
  - type: note
    content: Many Hebrew manuscripts, Septuagint, Vulgate and Syriac; most Hebrew manuscripts gateway facing the temple; it was one rod deep. 9 Then he measured the portico of the gateway; it
  - type: text
    content: ' was eight cubits'
  - type: note
    content: That is, about 14 feet or about 4.2 meters
  - type: text
    content: ' deep and its jambs were two cubits'
  - type: note
    content: That is, about 3 1/2 feet or about 1 meter
  - type: text
    content: ' thick. The portico of the gateway faced the temple.'
