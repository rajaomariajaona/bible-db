document_id: HEB.5
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Every high priest is selected from among the people and is appointed to represent the people in matters related to God, to offer gifts and sacrifices for sins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He is able to deal gently with those who are ignorant and are going astray, since he himself is subject to weakness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'This is why he has to offer sacrifices for his own sins, as well as for the sins of the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And no one takes this honor on himself, but he receives it when called by God, just as Aaron was.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: In the same way, Christ did not take on himself the glory of becoming a high priest. But God said to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are my Son;
- type: usfm
  marker: q2
  children:
  - type: text
    text: today I have become your Father.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 2:7
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And he says in another place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are a priest forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the order of Melchizedek.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 110:4
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'During the days of Jesus’ life on earth, he offered up prayers and petitions with fervent cries and tears to the one who could save him from death, and he was heard because of his reverent submission. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Son though he was, he learned obedience from what he suffered '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and, once made perfect, he became the source of eternal salvation for all who obey him '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: and was designated by God to be high priest in the order of Melchizedek.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warning Against Falling Away
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'We have much to say about this, but it is hard to make it clear to you because you no longer try to understand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In fact, though by this time you ought to be teachers, you need someone to teach you the elementary truths of God’s word all over again. You need milk, not solid food! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Anyone who lives on milk, being still an infant, is not acquainted with the teaching about righteousness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But solid food is for the mature, who by constant use have trained themselves to distinguish good from evil.
