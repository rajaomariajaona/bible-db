document_id: HEB.5,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Every high priest is selected from among the people and is appointed to represent the people in matters related to God, to offer gifts and sacrifices for sins. '
  '10':
  - type: text
    content: and was designated by God to be high priest in the order of Melchizedek.
  - type: heading
    content: Warning Against Falling Away
  '11':
  - type: text
    content: 'We have much to say about this, but it is hard to make it clear to you because you no longer try to understand. '
  '12':
  - type: text
    content: 'In fact, though by this time you ought to be teachers, you need someone to teach you the elementary truths of God’s word all over again. You need milk, not solid food! '
  '13':
  - type: text
    content: 'Anyone who lives on milk, being still an infant, is not acquainted with the teaching about righteousness. '
  '14':
  - type: text
    content: But solid food is for the mature, who by constant use have trained themselves to distinguish good from evil.
  '2':
  - type: text
    content: 'He is able to deal gently with those who are ignorant and are going astray, since he himself is subject to weakness. '
  '3':
  - type: text
    content: 'This is why he has to offer sacrifices for his own sins, as well as for the sins of the people. '
  '4':
  - type: text
    content: And no one takes this honor on himself, but he receives it when called by God, just as Aaron was.
  '5':
  - type: text
    content: In the same way, Christ did not take on himself the glory of becoming a high priest. But God said to him,
  - type: text
    content: “You are my Son;
  - type: text
    content: today I have become your Father.”
  - type: note
    content: Psalm 2:7
  '6':
  - type: text
    content: And he says in another place,
  - type: text
    content: “You are a priest forever,
  - type: text
    content: in the order of Melchizedek.”
  - type: note
    content: Psalm 110:4
  '7':
  - type: text
    content: 'During the days of Jesus’ life on earth, he offered up prayers and petitions with fervent cries and tears to the one who could save him from death, and he was heard because of his reverent submission. '
  '8':
  - type: text
    content: 'Son though he was, he learned obedience from what he suffered '
  '9':
  - type: text
    content: 'and, once made perfect, he became the source of eternal salvation for all who obey him '
