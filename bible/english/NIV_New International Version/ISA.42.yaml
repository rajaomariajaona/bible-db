document_id: ISA.42,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Here is my servant, whom I uphold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my chosen one in whom I delight;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my Spirit on him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will bring justice to the nations.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' a new song,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his praise from the ends of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you who go down to the sea, and all that is in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you islands, and all who live in them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the wilderness and its towns raise their voices;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the settlements where Kedar lives rejoice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the people of Sela sing for joy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them shout from the mountaintops.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Let them give glory to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and proclaim his praise in the islands.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will march out like a champion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a warrior he will stir up his zeal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with a shout he will raise the battle cry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will triumph over his enemies.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For a long time I have kept silent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have been quiet and held myself back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now, like a woman in childbirth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cry out, I gasp and pant.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will lay waste the mountains and hills
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dry up all their vegetation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will turn rivers into islands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dry up the pools.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will lead the blind by ways they have not known,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along unfamiliar paths I will guide them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will turn the darkness into light before them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make the rough places smooth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These are the things I will do;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not forsake them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who trust in idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who say to images, ‘You are our gods,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be turned back in utter shame.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Blind and Deaf
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hear, you deaf;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look, you blind, and see!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is blind but my servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and deaf like the messenger I send?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is blind like the one in covenant with me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'blind like the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will not shout or cry out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or raise his voice in the streets.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have seen many things, but you pay no attention;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your ears are open, but you do not listen.”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It pleased the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the sake of his righteousness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to make his law great and glorious.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But this is a people plundered and looted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all of them trapped in pits
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or hidden away in prisons.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have become plunder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to rescue them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they have been made loot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to say, “Send them back.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Which of you will listen to this
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or pay close attention in time to come?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who handed Jacob over to become loot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Israel to the plunderers?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Was it not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against whom we have sinned?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they would not follow his ways;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they did not obey his law.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he poured out on them his burning anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the violence of war.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It enveloped them in flames, yet they did not understand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it consumed them, but they did not take it to heart.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A bruised reed he will not break,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a smoldering wick he will not snuff out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In faithfulness he will bring forth justice;
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will not falter or be discouraged
  - type: usfm
    marker: q1
    children:
    - type: text
      text: till he establishes justice on earth.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In his teaching the islands will put their hope.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what God the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Creator of the heavens, who stretches them out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who spreads out the earth with all that springs from it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who gives breath to its people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and life to those who walk on it:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have called you in righteousness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will take hold of your hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will keep you and will make you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to be a covenant for the people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a light for the Gentiles,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to open eyes that are blind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to free captives from prison
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to release from the dungeon those who sit in darkness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ; that is my name!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not yield my glory to another
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or my praise to idols.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, the former things have taken place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and new things I declare;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before they spring into being
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I announce them to you.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Song of Praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
