document_id: ISA.42,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Servant of the Lord
  - type: text
    content: “Here is my servant, whom I uphold,
  - type: text
    content: my chosen one in whom I delight;
  - type: text
    content: I will put my Spirit on him,
  - type: text
    content: and he will bring justice to the nations.
  '10':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' a new song,'
  - type: text
    content: his praise from the ends of the earth,
  - type: text
    content: you who go down to the sea, and all that is in it,
  - type: text
    content: you islands, and all who live in them.
  '11':
  - type: text
    content: Let the wilderness and its towns raise their voices;
  - type: text
    content: let the settlements where Kedar lives rejoice.
  - type: text
    content: Let the people of Sela sing for joy;
  - type: text
    content: let them shout from the mountaintops.
  '12':
  - type: text
    content: 'Let them give glory to the '
  - type: text
    content: Lord
  - type: text
    content: and proclaim his praise in the islands.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will march out like a champion,'
  - type: text
    content: like a warrior he will stir up his zeal;
  - type: text
    content: with a shout he will raise the battle cry
  - type: text
    content: and will triumph over his enemies.
  '14':
  - type: text
    content: “For a long time I have kept silent,
  - type: text
    content: I have been quiet and held myself back.
  - type: text
    content: But now, like a woman in childbirth,
  - type: text
    content: I cry out, I gasp and pant.
  '15':
  - type: text
    content: I will lay waste the mountains and hills
  - type: text
    content: and dry up all their vegetation;
  - type: text
    content: I will turn rivers into islands
  - type: text
    content: and dry up the pools.
  '16':
  - type: text
    content: I will lead the blind by ways they have not known,
  - type: text
    content: along unfamiliar paths I will guide them;
  - type: text
    content: I will turn the darkness into light before them
  - type: text
    content: and make the rough places smooth.
  - type: text
    content: These are the things I will do;
  - type: text
    content: I will not forsake them.
  '17':
  - type: text
    content: But those who trust in idols,
  - type: text
    content: who say to images, ‘You are our gods,’
  - type: text
    content: will be turned back in utter shame.
  - type: heading
    content: Israel Blind and Deaf
  '18':
  - type: text
    content: “Hear, you deaf;
  - type: text
    content: look, you blind, and see!
  '19':
  - type: text
    content: Who is blind but my servant,
  - type: text
    content: and deaf like the messenger I send?
  - type: text
    content: Who is blind like the one in covenant with me,
  - type: text
    content: 'blind like the servant of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '2':
  - type: text
    content: He will not shout or cry out,
  - type: text
    content: or raise his voice in the streets.
  '20':
  - type: text
    content: You have seen many things, but you pay no attention;
  - type: text
    content: your ears are open, but you do not listen.”
  '21':
  - type: text
    content: 'It pleased the '
  - type: text
    content: Lord
  - type: text
    content: for the sake of his righteousness
  - type: text
    content: to make his law great and glorious.
  '22':
  - type: text
    content: But this is a people plundered and looted,
  - type: text
    content: all of them trapped in pits
  - type: text
    content: or hidden away in prisons.
  - type: text
    content: They have become plunder,
  - type: text
    content: with no one to rescue them;
  - type: text
    content: they have been made loot,
  - type: text
    content: with no one to say, “Send them back.”
  '23':
  - type: text
    content: Which of you will listen to this
  - type: text
    content: or pay close attention in time to come?
  '24':
  - type: text
    content: Who handed Jacob over to become loot,
  - type: text
    content: and Israel to the plunderers?
  - type: text
    content: 'Was it not the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: against whom we have sinned?
  - type: text
    content: For they would not follow his ways;
  - type: text
    content: they did not obey his law.
  '25':
  - type: text
    content: So he poured out on them his burning anger,
  - type: text
    content: the violence of war.
  - type: text
    content: It enveloped them in flames, yet they did not understand;
  - type: text
    content: it consumed them, but they did not take it to heart.
  '3':
  - type: text
    content: A bruised reed he will not break,
  - type: text
    content: and a smoldering wick he will not snuff out.
  - type: text
    content: In faithfulness he will bring forth justice;
  '4':
  - type: text
    content: he will not falter or be discouraged
  - type: text
    content: till he establishes justice on earth.
  - type: text
    content: In his teaching the islands will put their hope.”
  '5':
  - type: text
    content: 'This is what God the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: the Creator of the heavens, who stretches them out,
  - type: text
    content: who spreads out the earth with all that springs from it,
  - type: text
    content: who gives breath to its people,
  - type: text
    content: 'and life to those who walk on it:'
  '6':
  - type: text
    content: '“I, the '
  - type: text
    content: Lord
  - type: text
    content: ', have called you in righteousness;'
  - type: text
    content: I will take hold of your hand.
  - type: text
    content: I will keep you and will make you
  - type: text
    content: to be a covenant for the people
  - type: text
    content: and a light for the Gentiles,
  '7':
  - type: text
    content: to open eyes that are blind,
  - type: text
    content: to free captives from prison
  - type: text
    content: and to release from the dungeon those who sit in darkness.
  '8':
  - type: text
    content: '“I am the '
  - type: text
    content: Lord
  - type: text
    content: ; that is my name!
  - type: text
    content: I will not yield my glory to another
  - type: text
    content: or my praise to idols.
  '9':
  - type: text
    content: See, the former things have taken place,
  - type: text
    content: and new things I declare;
  - type: text
    content: before they spring into being
  - type: text
    content: I announce them to you.”
  - type: heading
    content: Song of Praise to the Lord
