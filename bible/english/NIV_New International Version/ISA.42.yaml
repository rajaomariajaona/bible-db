document_id: ISA.42
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Here is my servant, whom I uphold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my chosen one in whom I delight;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put my Spirit on him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will bring justice to the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He will not shout or cry out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or raise his voice in the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A bruised reed he will not break,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a smoldering wick he will not snuff out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In faithfulness he will bring forth justice;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: he will not falter or be discouraged
- type: usfm
  marker: q1
  children:
  - type: text
    text: till he establishes justice on earth.
- type: usfm
  marker: q2
  children:
  - type: text
    text: In his teaching the islands will put their hope.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is what God the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: the Creator of the heavens, who stretches them out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who spreads out the earth with all that springs from it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who gives breath to its people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and life to those who walk on it:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have called you in righteousness;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will take hold of your hand.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will keep you and will make you
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be a covenant for the people
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a light for the Gentiles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: to open eyes that are blind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to free captives from prison
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to release from the dungeon those who sit in darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ; that is my name!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not yield my glory to another
- type: usfm
  marker: q2
  children:
  - type: text
    text: or my praise to idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: See, the former things have taken place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and new things I declare;
- type: usfm
  marker: q1
  children:
  - type: text
    text: before they spring into being
- type: usfm
  marker: q2
  children:
  - type: text
    text: I announce them to you.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Song of Praise to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Sing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' a new song,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: his praise from the ends of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you who go down to the sea, and all that is in it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you islands, and all who live in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Let the wilderness and its towns raise their voices;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the settlements where Kedar lives rejoice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the people of Sela sing for joy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them shout from the mountaintops.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Let them give glory to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and proclaim his praise in the islands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will march out like a champion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a warrior he will stir up his zeal;
- type: usfm
  marker: q1
  children:
  - type: text
    text: with a shout he will raise the battle cry
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will triumph over his enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “For a long time I have kept silent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have been quiet and held myself back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But now, like a woman in childbirth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cry out, I gasp and pant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will lay waste the mountains and hills
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dry up all their vegetation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will turn rivers into islands
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dry up the pools.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I will lead the blind by ways they have not known,
- type: usfm
  marker: q2
  children:
  - type: text
    text: along unfamiliar paths I will guide them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will turn the darkness into light before them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make the rough places smooth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: These are the things I will do;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not forsake them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But those who trust in idols,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who say to images, ‘You are our gods,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be turned back in utter shame.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Blind and Deaf
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Hear, you deaf;
- type: usfm
  marker: q2
  children:
  - type: text
    text: look, you blind, and see!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Who is blind but my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and deaf like the messenger I send?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is blind like the one in covenant with me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'blind like the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You have seen many things, but you pay no attention;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your ears are open, but you do not listen.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'It pleased the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the sake of his righteousness
- type: usfm
  marker: q2
  children:
  - type: text
    text: to make his law great and glorious.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But this is a people plundered and looted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all of them trapped in pits
- type: usfm
  marker: q2
  children:
  - type: text
    text: or hidden away in prisons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have become plunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one to rescue them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they have been made loot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with no one to say, “Send them back.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Which of you will listen to this
- type: usfm
  marker: q2
  children:
  - type: text
    text: or pay close attention in time to come?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Who handed Jacob over to become loot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Israel to the plunderers?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Was it not the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: against whom we have sinned?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they would not follow his ways;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they did not obey his law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So he poured out on them his burning anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the violence of war.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It enveloped them in flames, yet they did not understand;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it consumed them, but they did not take it to heart.
