document_id: DEU.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Prosperity After Turning to the Lord
  - type: text
    content: 'When all these blessings and curses I have set before you come on you and you take them to heart wherever the '
  - type: text
    content: Lord
  - type: text
    content: ' your God disperses you among the nations, '
  '10':
  - type: text
    content: 'if you obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and keep his commands and decrees that are written in this Book of the Law and turn to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and with all your soul.'
  - type: heading
    content: The Offer of Life or Death
  '11':
  - type: text
    content: 'Now what I am commanding you today is not too difficult for you or beyond your reach. '
  '12':
  - type: text
    content: 'It is not up in heaven, so that you have to ask, “Who will ascend into heaven to get it and proclaim it to us so we may obey it?” '
  '13':
  - type: text
    content: 'Nor is it beyond the sea, so that you have to ask, “Who will cross the sea to get it and proclaim it to us so we may obey it?” '
  '14':
  - type: text
    content: No, the word is very near you; it is in your mouth and in your heart so you may obey it.
  '15':
  - type: text
    content: 'See, I set before you today life and prosperity, death and destruction. '
  '16':
  - type: text
    content: 'For I command you today to love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, to walk in obedience to him, and to keep his commands, decrees and laws; then you will live and increase, and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in the land you are entering to possess.'
  '17':
  - type: text
    content: 'But if your heart turns away and you are not obedient, and if you are drawn away to bow down to other gods and worship them, '
  '18':
  - type: text
    content: I declare to you this day that you will certainly be destroyed. You will not live long in the land you are crossing the Jordan to enter and possess.
  '19':
  - type: text
    content: 'This day I call the heavens and the earth as witnesses against you that I have set before you life and death, blessings and curses. Now choose life, so that you and your children may live '
  '2':
  - type: text
    content: 'and when you and your children return to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and obey him with all your heart and with all your soul according to everything I command you today, '
  '20':
  - type: text
    content: 'and that you may love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, listen to his voice, and hold fast to him. For the '
  - type: text
    content: Lord
  - type: text
    content: ' is your life, and he will give you many years in the land he swore to give to your fathers, Abraham, Isaac and Jacob.'
  '3':
  - type: text
    content: 'then the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will restore your fortunes'
  - type: note
    content: Or will bring you back from captivity
  - type: text
    content: ' and have compassion on you and gather you again from all the nations where he scattered you. '
  '4':
  - type: text
    content: 'Even if you have been banished to the most distant land under the heavens, from there the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will gather you and bring you back. '
  '5':
  - type: text
    content: 'He will bring you to the land that belonged to your ancestors, and you will take possession of it. He will make you more prosperous and numerous than your ancestors. '
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will circumcise your hearts and the hearts of your descendants, so that you may love him with all your heart and with all your soul, and live. '
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God will put all these curses on your enemies who hate and persecute you. '
  '8':
  - type: text
    content: 'You will again obey the '
  - type: text
    content: Lord
  - type: text
    content: ' and follow all his commands I am giving you today. '
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will make you most prosperous in all the work of your hands and in the fruit of your womb, the young of your livestock and the crops of your land. The '
  - type: text
    content: Lord
  - type: text
    content: ' will again delight in you and make you prosperous, just as he delighted in your ancestors, '
