document_id: JOB.5,111
type_code: eng
verses:
  '1':
  - type: text
    content: “Call if you will, but who will answer you?
  - type: text
    content: To which of the holy ones will you turn?
  '10':
  - type: text
    content: He provides rain for the earth;
  - type: text
    content: he sends water on the countryside.
  '11':
  - type: text
    content: The lowly he sets on high,
  - type: text
    content: and those who mourn are lifted to safety.
  '12':
  - type: text
    content: He thwarts the plans of the crafty,
  - type: text
    content: so that their hands achieve no success.
  '13':
  - type: text
    content: He catches the wise in their craftiness,
  - type: text
    content: and the schemes of the wily are swept away.
  '14':
  - type: text
    content: Darkness comes upon them in the daytime;
  - type: text
    content: at noon they grope as in the night.
  '15':
  - type: text
    content: He saves the needy from the sword in their mouth;
  - type: text
    content: he saves them from the clutches of the powerful.
  '16':
  - type: text
    content: So the poor have hope,
  - type: text
    content: and injustice shuts its mouth.
  '17':
  - type: text
    content: “Blessed is the one whom God corrects;
  - type: text
    content: so do not despise the discipline of the Almighty.
  - type: note
    content: Hebrew Shaddai; here and throughout Job
  '18':
  - type: text
    content: For he wounds, but he also binds up;
  - type: text
    content: he injures, but his hands also heal.
  '19':
  - type: text
    content: From six calamities he will rescue you;
  - type: text
    content: in seven no harm will touch you.
  '2':
  - type: text
    content: Resentment kills a fool,
  - type: text
    content: and envy slays the simple.
  '20':
  - type: text
    content: In famine he will deliver you from death,
  - type: text
    content: and in battle from the stroke of the sword.
  '21':
  - type: text
    content: You will be protected from the lash of the tongue,
  - type: text
    content: and need not fear when destruction comes.
  '22':
  - type: text
    content: You will laugh at destruction and famine,
  - type: text
    content: and need not fear the wild animals.
  '23':
  - type: text
    content: For you will have a covenant with the stones of the field,
  - type: text
    content: and the wild animals will be at peace with you.
  '24':
  - type: text
    content: You will know that your tent is secure;
  - type: text
    content: you will take stock of your property and find nothing missing.
  '25':
  - type: text
    content: You will know that your children will be many,
  - type: text
    content: and your descendants like the grass of the earth.
  '26':
  - type: text
    content: You will come to the grave in full vigor,
  - type: text
    content: like sheaves gathered in season.
  '27':
  - type: text
    content: “We have examined this, and it is true.
  - type: text
    content: So hear it and apply it to yourself.”
  '3':
  - type: text
    content: I myself have seen a fool taking root,
  - type: text
    content: but suddenly his house was cursed.
  '4':
  - type: text
    content: His children are far from safety,
  - type: text
    content: crushed in court without a defender.
  '5':
  - type: text
    content: The hungry consume his harvest,
  - type: text
    content: taking it even from among thorns,
  - type: text
    content: and the thirsty pant after his wealth.
  '6':
  - type: text
    content: For hardship does not spring from the soil,
  - type: text
    content: nor does trouble sprout from the ground.
  '7':
  - type: text
    content: Yet man is born to trouble
  - type: text
    content: as surely as sparks fly upward.
  '8':
  - type: text
    content: “But if I were you, I would appeal to God;
  - type: text
    content: I would lay my cause before him.
  '9':
  - type: text
    content: He performs wonders that cannot be fathomed,
  - type: text
    content: miracles that cannot be counted.
