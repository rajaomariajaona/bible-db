document_id: JOB.5
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Call if you will, but who will answer you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: To which of the holy ones will you turn?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Resentment kills a fool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and envy slays the simple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I myself have seen a fool taking root,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but suddenly his house was cursed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: His children are far from safety,
- type: usfm
  marker: q2
  children:
  - type: text
    text: crushed in court without a defender.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The hungry consume his harvest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taking it even from among thorns,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the thirsty pant after his wealth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For hardship does not spring from the soil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor does trouble sprout from the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Yet man is born to trouble
- type: usfm
  marker: q2
  children:
  - type: text
    text: as surely as sparks fly upward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But if I were you, I would appeal to God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would lay my cause before him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He performs wonders that cannot be fathomed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: miracles that cannot be counted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He provides rain for the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he sends water on the countryside.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The lowly he sets on high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who mourn are lifted to safety.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He thwarts the plans of the crafty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that their hands achieve no success.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He catches the wise in their craftiness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the schemes of the wily are swept away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Darkness comes upon them in the daytime;
- type: usfm
  marker: q2
  children:
  - type: text
    text: at noon they grope as in the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He saves the needy from the sword in their mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he saves them from the clutches of the powerful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So the poor have hope,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and injustice shuts its mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Blessed is the one whom God corrects;
- type: usfm
  marker: q2
  children:
  - type: text
    text: so do not despise the discipline of the Almighty.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shaddai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; here and throughout Job
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For he wounds, but he also binds up;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he injures, but his hands also heal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: From six calamities he will rescue you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in seven no harm will touch you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: In famine he will deliver you from death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in battle from the stroke of the sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: You will be protected from the lash of the tongue,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and need not fear when destruction comes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You will laugh at destruction and famine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and need not fear the wild animals.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For you will have a covenant with the stones of the field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wild animals will be at peace with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You will know that your tent is secure;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will take stock of your property and find nothing missing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: You will know that your children will be many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your descendants like the grass of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: You will come to the grave in full vigor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like sheaves gathered in season.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “We have examined this, and it is true.
- type: usfm
  marker: q2
  children:
  - type: text
    text: So hear it and apply it to yourself.”
