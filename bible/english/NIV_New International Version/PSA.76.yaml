document_id: PSA.76,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 76
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 76:1-12 is numbered 76:2-13.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. With stringed instruments. A psalm of Asaph. A song.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is renowned in Judah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in Israel his name is great.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely your wrath against mankind brings you praise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the survivors of your wrath are restrained.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '76:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Surely the wrath of mankind brings you praise, / and with the remainder of wrath you arm yourself
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Make vows to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and fulfill them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let all the neighboring lands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring gifts to the One to be feared.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He breaks the spirit of rulers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is feared by the kings of the earth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His tent is in Salem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his dwelling place in Zion.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There he broke the flashing arrows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the shields and the swords, the weapons of war.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '76:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verse 9.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are radiant with light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: more majestic than mountains rich with game.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The valiant lie plundered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they sleep their last sleep;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not one of the warriors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: can lift his hands.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At your rebuke, God of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both horse and chariot lie still.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is you alone who are to be feared.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can stand before you when you are angry?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From heaven you pronounced judgment,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the land feared and was quiet—
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you, God, rose up to judge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to save all the afflicted of the land.
