document_id: PSA.76,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 76In Hebrew texts 76:1-12 is numbered 76:2-13.
  - type: text
    content: For the director of music. With stringed instruments. A psalm of Asaph. A song.
  - type: text
    content: God is renowned in Judah;
  - type: text
    content: in Israel his name is great.
  '10':
  - type: text
    content: Surely your wrath against mankind brings you praise,
  - type: text
    content: and the survivors of your wrath are restrained.
  - type: note
    content: Or Surely the wrath of mankind brings you praise, / and with the remainder of wrath you arm yourself
  '11':
  - type: text
    content: 'Make vows to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and fulfill them;'
  - type: text
    content: let all the neighboring lands
  - type: text
    content: bring gifts to the One to be feared.
  '12':
  - type: text
    content: He breaks the spirit of rulers;
  - type: text
    content: he is feared by the kings of the earth.
  '2':
  - type: text
    content: His tent is in Salem,
  - type: text
    content: his dwelling place in Zion.
  '3':
  - type: text
    content: There he broke the flashing arrows,
  - type: text
    content: the shields and the swords, the weapons of war.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 9.
  '4':
  - type: text
    content: You are radiant with light,
  - type: text
    content: more majestic than mountains rich with game.
  '5':
  - type: text
    content: The valiant lie plundered,
  - type: text
    content: they sleep their last sleep;
  - type: text
    content: not one of the warriors
  - type: text
    content: can lift his hands.
  '6':
  - type: text
    content: At your rebuke, God of Jacob,
  - type: text
    content: both horse and chariot lie still.
  '7':
  - type: text
    content: It is you alone who are to be feared.
  - type: text
    content: Who can stand before you when you are angry?
  '8':
  - type: text
    content: From heaven you pronounced judgment,
  - type: text
    content: and the land feared and was quiet—
  '9':
  - type: text
    content: when you, God, rose up to judge,
  - type: text
    content: to save all the afflicted of the land.
