document_id: EPH.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Made Alive in Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As for you, you were dead in your transgressions and sins, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'in which you used to live when you followed the ways of this world and of the ruler of the kingdom of the air, the spirit who is now at work in those who are disobedient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: All of us also lived among them at one time, gratifying the cravings of our flesh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In contexts like this, the Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'flesh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: tl
        children:
        - type: text
          text: sarx
      - type: text
        text: ) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit.
    marker-yv: yv-n
  - type: text
    text: ' and following its desires and thoughts. Like the rest, we were by nature deserving of wrath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But because of his great love for us, God, who is rich in mercy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'made us alive with Christ even when we were dead in transgressions—it is by grace you have been saved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And God raised us up with Christ and seated us with him in the heavenly realms in Christ Jesus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'in order that in the coming ages he might show the incomparable riches of his grace, expressed in his kindness to us in Christ Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For it is by grace you have been saved, through faith—and this is not from yourselves, it is the gift of God— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'not by works, so that no one can boast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For we are God’s handiwork, created in Christ Jesus to do good works, which God prepared in advance for us to do.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jew and Gentile Reconciled Through Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore, remember that formerly you who are Gentiles by birth and called “uncircumcised” by those who call themselves “the circumcision” (which is done in the body by human hands)— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'remember that at that time you were separate from Christ, excluded from citizenship in Israel and foreigners to the covenants of the promise, without hope and without God in the world. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But now in Christ Jesus you who once were far away have been brought near by the blood of Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For he himself is our peace, who has made the two groups one and has destroyed the barrier, the dividing wall of hostility, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'by setting aside in his flesh the law with its commands and regulations. His purpose was to create in himself one new humanity out of the two, thus making peace, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and in one body to reconcile both of them to God through the cross, by which he put to death their hostility. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He came and preached peace to you who were far away and peace to those who were near. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For through him we both have access to the Father by one Spirit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Consequently, you are no longer foreigners and strangers, but fellow citizens with God’s people and also members of his household, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'built on the foundation of the apostles and prophets, with Christ Jesus himself as the chief cornerstone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In him the whole building is joined together and rises to become a holy temple in the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And in him you too are being built together to become a dwelling in which God lives by his Spirit.
