  '1':
  - type: heading
    content: Psalm 146
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew Hallelu Yah; also in verse 10
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', my soul.'
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns forever,'
  - type: text
    content: your God, O Zion, for all generations.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'I will praise the '
  - type: text
    content: Lord
  - type: text
    content: ' all my life;'
  - type: text
    content: I will sing praise to my God as long as I live.
  '3':
  - type: text
    content: Do not put your trust in princes,
  - type: text
    content: in human beings, who cannot save.
  '4':
  - type: text
    content: When their spirit departs, they return to the ground;
  - type: text
    content: on that very day their plans come to nothing.
  '5':
  - type: text
    content: Blessed are those whose help is the God of Jacob,
  - type: text
    content: 'whose hope is in the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '6':
  - type: text
    content: He is the Maker of heaven and earth,
  - type: text
    content: the sea, and everything in them—
  - type: text
    content: he remains faithful forever.
  '7':
  - type: text
    content: He upholds the cause of the oppressed
  - type: text
    content: and gives food to the hungry.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' sets prisoners free,'
  '8':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' gives sight to the blind,'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' lifts up those who are bowed down,'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' loves the righteous.'
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' watches over the foreigner'
  - type: text
    content: and sustains the fatherless and the widow,
  - type: text
    content: but he frustrates the ways of the wicked.
