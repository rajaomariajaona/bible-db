  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns forever,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your God, O Zion, for all generations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' all my life;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing praise to my God as long as I live.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not put your trust in princes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in human beings, who cannot save.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When their spirit departs, they return to the ground;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on that very day their plans come to nothing.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed are those whose help is the God of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'whose hope is in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is the Maker of heaven and earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sea, and everything in them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he remains faithful forever.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He upholds the cause of the oppressed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gives food to the hungry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sets prisoners free,'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives sight to the blind,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lifts up those who are bowed down,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loves the righteous.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' watches over the foreigner'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sustains the fatherless and the widow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he frustrates the ways of the wicked.
