document_id: ISA.44
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel the Chosen
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “But now listen, Jacob, my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel, whom I have chosen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he who made you, who formed you in the womb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and who will help you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not be afraid, Jacob, my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jeshurun,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44:2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jeshurun '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the upright one, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that is, Israel.
    marker-yv: yv-n
  - type: text
    text: ' whom I have chosen.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For I will pour water on the thirsty land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and streams on the dry ground;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will pour out my Spirit on your offspring,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my blessing on your descendants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They will spring up like grass in a meadow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like poplar trees by flowing streams.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Some will say, ‘I belong to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’;
- type: usfm
  marker: q2
  children:
  - type: text
    text: others will call themselves by the name of Jacob;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'still others will write on their hand, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will take the name Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', Not Idols'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Israel’s King and Redeemer, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am the first and I am the last;
- type: usfm
  marker: q2
  children:
  - type: text
    text: apart from me there is no God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Who then is like me? Let him proclaim it.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let him declare and lay out before me
- type: usfm
  marker: q1
  children:
  - type: text
    text: what has happened since I established my ancient people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and what is yet to come—
- type: usfm
  marker: q2
  children:
  - type: text
    text: yes, let them foretell what will come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Do not tremble, do not be afraid.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Did I not proclaim this and foretell it long ago?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are my witnesses. Is there any God besides me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No, there is no other Rock; I know not one.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All who make idols are nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the things they treasure are worthless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who would speak up for them are blind;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are ignorant, to their own shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Who shapes a god and casts an idol,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which can profit nothing?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: People who do that will be put to shame;
- type: usfm
  marker: q2
  children:
  - type: text
    text: such craftsmen are only human beings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them all come together and take their stand;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be brought down to terror and shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The blacksmith takes a tool
- type: usfm
  marker: q2
  children:
  - type: text
    text: and works with it in the coals;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he shapes an idol with hammers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he forges it with the might of his arm.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gets hungry and loses his strength;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he drinks no water and grows faint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The carpenter measures with a line
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes an outline with a marker;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he roughs it out with chisels
- type: usfm
  marker: q2
  children:
  - type: text
    text: and marks it with compasses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shapes it in human form,
- type: usfm
  marker: q2
  children:
  - type: text
    text: human form in all its glory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that it may dwell in a shrine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He cut down cedars,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or perhaps took a cypress or oak.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He let it grow among the trees of the forest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or planted a pine, and the rain made it grow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: It is used as fuel for burning;
- type: usfm
  marker: q2
  children:
  - type: text
    text: some of it he takes and warms himself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he kindles a fire and bakes bread.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he also fashions a god and worships it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he makes an idol and bows down to it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Half of the wood he burns in the fire;
- type: usfm
  marker: q2
  children:
  - type: text
    text: over it he prepares his meal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he roasts his meat and eats his fill.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He also warms himself and says,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Ah! I am warm; I see the fire.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: From the rest he makes a god, his idol;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he bows down to it and worships.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He prays to it and says,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Save me! You are my god!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They know nothing, they understand nothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their eyes are plastered over so they cannot see,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their minds closed so they cannot understand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: No one stops to think,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one has the knowledge or understanding to say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Half of it I used for fuel;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I even baked bread over its coals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I roasted meat and I ate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall I make a detestable thing from what is left?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Shall I bow down to a block of wood?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Such a person feeds on ashes; a deluded heart misleads him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he cannot save himself, or say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Is not this thing in my right hand a lie?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Remember these things, Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you, Israel, are my servant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have made you, you are my servant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel, I will not forget you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I have swept away your offenses like a cloud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your sins like the morning mist.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Return to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have redeemed you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sing for joy, you heavens, for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has done this;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: shout aloud, you earth beneath.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Burst into song, you mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you forests and all your trees,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has redeemed Jacob,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he displays his glory in Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jerusalem to Be Inhabited
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'your Redeemer, who formed you in the womb:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Maker of all things,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who stretches out the heavens,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who spreads out the earth by myself,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: who foils the signs of false prophets
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes fools of diviners,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who overthrows the learning of the wise
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turns it into nonsense,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: who carries out the words of his servants
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fulfills the predictions of his messengers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who says of Jerusalem, ‘It shall be inhabited,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: of the towns of Judah, ‘They shall be rebuilt,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and of their ruins, ‘I will restore them,’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: who says to the watery deep, ‘Be dry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will dry up your streams,’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: who says of Cyrus, ‘He is my shepherd
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will accomplish all that I please;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will say of Jerusalem, “Let it be rebuilt,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: and of the temple, “Let its foundations be laid.” ’
