document_id: ISA.44,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel the Chosen
  - type: text
    content: “But now listen, Jacob, my servant,
  - type: text
    content: Israel, whom I have chosen.
  '10':
  - type: text
    content: Who shapes a god and casts an idol,
  - type: text
    content: which can profit nothing?
  '11':
  - type: text
    content: People who do that will be put to shame;
  - type: text
    content: such craftsmen are only human beings.
  - type: text
    content: Let them all come together and take their stand;
  - type: text
    content: they will be brought down to terror and shame.
  '12':
  - type: text
    content: The blacksmith takes a tool
  - type: text
    content: and works with it in the coals;
  - type: text
    content: he shapes an idol with hammers,
  - type: text
    content: he forges it with the might of his arm.
  - type: text
    content: He gets hungry and loses his strength;
  - type: text
    content: he drinks no water and grows faint.
  '13':
  - type: text
    content: The carpenter measures with a line
  - type: text
    content: and makes an outline with a marker;
  - type: text
    content: he roughs it out with chisels
  - type: text
    content: and marks it with compasses.
  - type: text
    content: He shapes it in human form,
  - type: text
    content: human form in all its glory,
  - type: text
    content: that it may dwell in a shrine.
  '14':
  - type: text
    content: He cut down cedars,
  - type: text
    content: or perhaps took a cypress or oak.
  - type: text
    content: He let it grow among the trees of the forest,
  - type: text
    content: or planted a pine, and the rain made it grow.
  '15':
  - type: text
    content: It is used as fuel for burning;
  - type: text
    content: some of it he takes and warms himself,
  - type: text
    content: he kindles a fire and bakes bread.
  - type: text
    content: But he also fashions a god and worships it;
  - type: text
    content: he makes an idol and bows down to it.
  '16':
  - type: text
    content: Half of the wood he burns in the fire;
  - type: text
    content: over it he prepares his meal,
  - type: text
    content: he roasts his meat and eats his fill.
  - type: text
    content: He also warms himself and says,
  - type: text
    content: “Ah! I am warm; I see the fire.”
  '17':
  - type: text
    content: From the rest he makes a god, his idol;
  - type: text
    content: he bows down to it and worships.
  - type: text
    content: He prays to it and says,
  - type: text
    content: “Save me! You are my god!”
  '18':
  - type: text
    content: They know nothing, they understand nothing;
  - type: text
    content: their eyes are plastered over so they cannot see,
  - type: text
    content: and their minds closed so they cannot understand.
  '19':
  - type: text
    content: No one stops to think,
  - type: text
    content: no one has the knowledge or understanding to say,
  - type: text
    content: “Half of it I used for fuel;
  - type: text
    content: I even baked bread over its coals,
  - type: text
    content: I roasted meat and I ate.
  - type: text
    content: Shall I make a detestable thing from what is left?
  - type: text
    content: Shall I bow down to a block of wood?”
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: he who made you, who formed you in the womb,
  - type: text
    content: 'and who will help you:'
  - type: text
    content: Do not be afraid, Jacob, my servant,
  - type: text
    content: Jeshurun,
  - type: note
    content: Jeshurun means the upright one, that is, Israel.
  - type: text
    content: ' whom I have chosen.'
  '20':
  - type: text
    content: Such a person feeds on ashes; a deluded heart misleads him;
  - type: text
    content: he cannot save himself, or say,
  - type: text
    content: “Is not this thing in my right hand a lie?”
  '21':
  - type: text
    content: “Remember these things, Jacob,
  - type: text
    content: for you, Israel, are my servant.
  - type: text
    content: I have made you, you are my servant;
  - type: text
    content: Israel, I will not forget you.
  '22':
  - type: text
    content: I have swept away your offenses like a cloud,
  - type: text
    content: your sins like the morning mist.
  - type: text
    content: Return to me,
  - type: text
    content: for I have redeemed you.”
  '23':
  - type: text
    content: 'Sing for joy, you heavens, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has done this;'
  - type: text
    content: shout aloud, you earth beneath.
  - type: text
    content: Burst into song, you mountains,
  - type: text
    content: you forests and all your trees,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has redeemed Jacob,'
  - type: text
    content: he displays his glory in Israel.
  - type: heading
    content: Jerusalem to Be Inhabited
  '24':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: 'your Redeemer, who formed you in the womb:'
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the Maker of all things,
  - type: text
    content: who stretches out the heavens,
  - type: text
    content: who spreads out the earth by myself,
  '25':
  - type: text
    content: who foils the signs of false prophets
  - type: text
    content: and makes fools of diviners,
  - type: text
    content: who overthrows the learning of the wise
  - type: text
    content: and turns it into nonsense,
  '26':
  - type: text
    content: who carries out the words of his servants
  - type: text
    content: and fulfills the predictions of his messengers,
  - type: text
    content: who says of Jerusalem, ‘It shall be inhabited,’
  - type: text
    content: of the towns of Judah, ‘They shall be rebuilt,’
  - type: text
    content: and of their ruins, ‘I will restore them,’
  '27':
  - type: text
    content: who says to the watery deep, ‘Be dry,
  - type: text
    content: and I will dry up your streams,’
  '28':
  - type: text
    content: who says of Cyrus, ‘He is my shepherd
  - type: text
    content: and will accomplish all that I please;
  - type: text
    content: he will say of Jerusalem, “Let it be rebuilt,”
  - type: text
    content: and of the temple, “Let its foundations be laid.” ’
  '3':
  - type: text
    content: For I will pour water on the thirsty land,
  - type: text
    content: and streams on the dry ground;
  - type: text
    content: I will pour out my Spirit on your offspring,
  - type: text
    content: and my blessing on your descendants.
  '4':
  - type: text
    content: They will spring up like grass in a meadow,
  - type: text
    content: like poplar trees by flowing streams.
  '5':
  - type: text
    content: 'Some will say, ‘I belong to the '
  - type: text
    content: Lord
  - type: text
    content: ’;
  - type: text
    content: others will call themselves by the name of Jacob;
  - type: text
    content: 'still others will write on their hand, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ’s,’
  - type: text
    content: and will take the name Israel.
  - type: heading
    content: The Lord, Not Idols
  '6':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: 'Israel’s King and Redeemer, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty:'
  - type: text
    content: I am the first and I am the last;
  - type: text
    content: apart from me there is no God.
  '7':
  - type: text
    content: Who then is like me? Let him proclaim it.
  - type: text
    content: Let him declare and lay out before me
  - type: text
    content: what has happened since I established my ancient people,
  - type: text
    content: and what is yet to come—
  - type: text
    content: yes, let them foretell what will come.
  '8':
  - type: text
    content: Do not tremble, do not be afraid.
  - type: text
    content: Did I not proclaim this and foretell it long ago?
  - type: text
    content: You are my witnesses. Is there any God besides me?
  - type: text
    content: No, there is no other Rock; I know not one.”
  '9':
  - type: text
    content: All who make idols are nothing,
  - type: text
    content: and the things they treasure are worthless.
  - type: text
    content: Those who would speak up for them are blind;
  - type: text
    content: they are ignorant, to their own shame.
