document_id: PSA.25,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 25
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I put my trust.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are loving and faithful'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: toward those who keep the demands of his covenant.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the sake of your name, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forgive my iniquity, though it is great.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who, then, are those who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He will instruct them in the ways they should choose.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ways he chooses
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will spend their days in prosperity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their descendants will inherit the land.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' confides in those who fear him;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes his covenant known to them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My eyes are ever on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for only he will release my feet from the snare.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn to me and be gracious to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I am lonely and afflicted.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Relieve the troubles of my heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and free me from my anguish.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look on my affliction and my distress
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take away all my sins.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how numerous are my enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how fiercely they hate me!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I trust in you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let me be put to shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor let my enemies triumph over me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guard my life and rescue me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let me be put to shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I take refuge in you.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May integrity and uprightness protect me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because my hope, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' is in you.'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deliver Israel, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from all their troubles!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one who hopes in you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will ever be put to shame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but shame will come on those
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who are treacherous without cause.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Show me your ways, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach me your paths.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guide me in your truth and teach me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are God my Savior,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my hope is in you all day long.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Remember, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', your great mercy and love,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they are from of old.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not remember the sins of my youth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my rebellious ways;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: according to your love remember me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are good.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Good and upright is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore he instructs sinners in his ways.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He guides the humble in what is right
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and teaches them his way.
