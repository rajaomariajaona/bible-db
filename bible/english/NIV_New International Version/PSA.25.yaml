document_id: PSA.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 25This psalm is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
  - type: text
    content: Of David.
  - type: text
    content: 'In you, '
  - type: text
    content: Lord
  - type: text
    content: ' my God,'
  - type: text
    content: I put my trust.
  '10':
  - type: text
    content: 'All the ways of the '
  - type: text
    content: Lord
  - type: text
    content: ' are loving and faithful'
  - type: text
    content: toward those who keep the demands of his covenant.
  '11':
  - type: text
    content: 'For the sake of your name, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: forgive my iniquity, though it is great.
  '12':
  - type: text
    content: 'Who, then, are those who fear the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: He will instruct them in the ways they should choose.
  - type: note
    content: Or ways he chooses
  '13':
  - type: text
    content: They will spend their days in prosperity,
  - type: text
    content: and their descendants will inherit the land.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' confides in those who fear him;'
  - type: text
    content: he makes his covenant known to them.
  '15':
  - type: text
    content: 'My eyes are ever on the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for only he will release my feet from the snare.
  '16':
  - type: text
    content: Turn to me and be gracious to me,
  - type: text
    content: for I am lonely and afflicted.
  '17':
  - type: text
    content: Relieve the troubles of my heart
  - type: text
    content: and free me from my anguish.
  '18':
  - type: text
    content: Look on my affliction and my distress
  - type: text
    content: and take away all my sins.
  '19':
  - type: text
    content: See how numerous are my enemies
  - type: text
    content: and how fiercely they hate me!
  '2':
  - type: text
    content: I trust in you;
  - type: text
    content: do not let me be put to shame,
  - type: text
    content: nor let my enemies triumph over me.
  '20':
  - type: text
    content: Guard my life and rescue me;
  - type: text
    content: do not let me be put to shame,
  - type: text
    content: for I take refuge in you.
  '21':
  - type: text
    content: May integrity and uprightness protect me,
  - type: text
    content: 'because my hope, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: Septuagint; Hebrew does not have Lord.
  - type: text
    content: ' is in you.'
  '22':
  - type: text
    content: Deliver Israel, O God,
  - type: text
    content: from all their troubles!
  '3':
  - type: text
    content: No one who hopes in you
  - type: text
    content: will ever be put to shame,
  - type: text
    content: but shame will come on those
  - type: text
    content: who are treacherous without cause.
  '4':
  - type: text
    content: 'Show me your ways, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: teach me your paths.
  '5':
  - type: text
    content: Guide me in your truth and teach me,
  - type: text
    content: for you are God my Savior,
  - type: text
    content: and my hope is in you all day long.
  '6':
  - type: text
    content: 'Remember, '
  - type: text
    content: Lord
  - type: text
    content: ', your great mercy and love,'
  - type: text
    content: for they are from of old.
  '7':
  - type: text
    content: Do not remember the sins of my youth
  - type: text
    content: and my rebellious ways;
  - type: text
    content: according to your love remember me,
  - type: text
    content: 'for you, '
  - type: text
    content: Lord
  - type: text
    content: ', are good.'
  '8':
  - type: text
    content: 'Good and upright is the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: therefore he instructs sinners in his ways.
  '9':
  - type: text
    content: He guides the humble in what is right
  - type: text
    content: and teaches them his way.
