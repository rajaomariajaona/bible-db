document_id: 1CH.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Genealogy of Saul the Benjamite
  - type: text
    content: Benjamin was the father of Bela his firstborn,
  - type: text
    content: Ashbel the second son, Aharah the third,
  '10':
  - type: text
    content: 'Jeuz, Sakia and Mirmah. These were his sons, heads of families. '
  '11':
  - type: text
    content: By Hushim he had Abitub and Elpaal.
  '12':
  - type: text
    content: 'The sons of Elpaal:'
  - type: text
    content: 'Eber, Misham, Shemed (who built Ono and Lod with its surrounding villages), '
  '13':
  - type: text
    content: and Beriah and Shema, who were heads of families of those living in Aijalon and who drove out the inhabitants of Gath.
  '14':
  - type: text
    content: 'Ahio, Shashak, Jeremoth, '
  '15':
  - type: text
    content: 'Zebadiah, Arad, Eder, '
  '16':
  - type: text
    content: Michael, Ishpah and Joha were the sons of Beriah.
  '17':
  - type: text
    content: 'Zebadiah, Meshullam, Hizki, Heber, '
  '18':
  - type: text
    content: Ishmerai, Izliah and Jobab were the sons of Elpaal.
  '19':
  - type: text
    content: 'Jakim, Zikri, Zabdi, '
  '2':
  - type: text
    content: Nohah the fourth and Rapha the fifth.
  '20':
  - type: text
    content: 'Elienai, Zillethai, Eliel, '
  '21':
  - type: text
    content: Adaiah, Beraiah and Shimrath were the sons of Shimei.
  '22':
  - type: text
    content: 'Ishpan, Eber, Eliel, '
  '23':
  - type: text
    content: 'Abdon, Zikri, Hanan, '
  '24':
  - type: text
    content: 'Hananiah, Elam, Anthothijah, '
  '25':
  - type: text
    content: Iphdeiah and Penuel were the sons of Shashak.
  '26':
  - type: text
    content: 'Shamsherai, Shehariah, Athaliah, '
  '27':
  - type: text
    content: Jaareshiah, Elijah and Zikri were the sons of Jeroham.
  '28':
  - type: text
    content: All these were heads of families, chiefs as listed in their genealogy, and they lived in Jerusalem.
  '29':
  - type: text
    content: Jeiel
  - type: note
    content: Some Septuagint manuscripts (see also 9:35); Hebrew does not have Jeiel.
  - type: text
    content: ' the father'
  - type: note
    content: Father may mean civic leader or military leader.
  - type: text
    content: ' of Gibeon lived in Gibeon.'
  - type: text
    content: 'His wife’s name was Maakah, '
  '3':
  - type: text
    content: 'The sons of Bela were:'
  - type: text
    content: Addar, Gera, Abihud,
  - type: note
    content: Or Gera the father of Ehud
  - type: text
    content: ' '
  '30':
  - type: text
    content: and his firstborn son was Abdon, followed by Zur, Kish, Baal, Ner,
  - type: note
    content: Some Septuagint manuscripts (see also 9:36); Hebrew does not have Ner.
  - type: text
    content: ' Nadab, '
  '31':
  - type: text
    content: 'Gedor, Ahio, Zeker '
  '32':
  - type: text
    content: and Mikloth, who was the father of Shimeah. They too lived near their relatives in Jerusalem.
  '33':
  - type: text
    content: Ner was the father of Kish, Kish the father of Saul, and Saul the father of Jonathan, Malki-Shua, Abinadab and Esh-Baal.
  - type: note
    content: Also known as Ish-Bosheth
  '34':
  - type: text
    content: 'The son of Jonathan:'
  - type: text
    content: Merib-Baal,
  - type: note
    content: Also known as Mephibosheth
  - type: text
    content: ' who was the father of Micah.'
  '35':
  - type: text
    content: 'The sons of Micah:'
  - type: text
    content: Pithon, Melek, Tarea and Ahaz.
  '36':
  - type: text
    content: 'Ahaz was the father of Jehoaddah, Jehoaddah was the father of Alemeth, Azmaveth and Zimri, and Zimri was the father of Moza. '
  '37':
  - type: text
    content: Moza was the father of Binea; Raphah was his son, Eleasah his son and Azel his son.
  '38':
  - type: text
    content: 'Azel had six sons, and these were their names:'
  - type: text
    content: Azrikam, Bokeru, Ishmael, Sheariah, Obadiah and Hanan. All these were the sons of Azel.
  '39':
  - type: text
    content: 'The sons of his brother Eshek:'
  - type: text
    content: 'Ulam his firstborn, Jeush the second son and Eliphelet the third. '
  '4':
  - type: text
    content: 'Abishua, Naaman, Ahoah, '
  '40':
  - type: text
    content: The sons of Ulam were brave warriors who could handle the bow. They had many sons and grandsons—150 in all.
  - type: text
    content: All these were the descendants of Benjamin.
  '5':
  - type: text
    content: Gera, Shephuphan and Huram.
  '6':
  - type: text
    content: 'These were the descendants of Ehud, who were heads of families of those living in Geba and were deported to Manahath:'
  '7':
  - type: text
    content: Naaman, Ahijah, and Gera, who deported them and who was the father of Uzza and Ahihud.
  '8':
  - type: text
    content: 'Sons were born to Shaharaim in Moab after he had divorced his wives Hushim and Baara. '
  '9':
  - type: text
    content: 'By his wife Hodesh he had Jobab, Zibia, Mesha, Malkam, '
