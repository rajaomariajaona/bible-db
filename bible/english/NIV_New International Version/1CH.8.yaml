document_id: 1CH.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Genealogy of Saul the Benjamite
    marker-yv: yv-h
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Benjamin was the father of Bela his firstborn,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ashbel the second son, Aharah the third,
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Jeuz, Sakia and Mirmah. These were his sons, heads of families. '
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: By Hushim he had Abitub and Elpaal.
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Elpaal:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Eber, Misham, Shemed (who built Ono and Lod with its surrounding villages), '
  '13':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Beriah and Shema, who were heads of families of those living in Aijalon and who drove out the inhabitants of Gath.
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Ahio, Shashak, Jeremoth, '
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Zebadiah, Arad, Eder, '
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Michael, Ishpah and Joha were the sons of Beriah.
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Zebadiah, Meshullam, Hizki, Heber, '
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ishmerai, Izliah and Jobab were the sons of Elpaal.
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Jakim, Zikri, Zabdi, '
  '2':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Nohah the fourth and Rapha the fifth.
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Elienai, Zillethai, Eliel, '
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Adaiah, Beraiah and Shimrath were the sons of Shimei.
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Ishpan, Eber, Eliel, '
  '23':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Abdon, Zikri, Hanan, '
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Hananiah, Elam, Anthothijah, '
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Iphdeiah and Penuel were the sons of Shashak.
  '26':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Shamsherai, Shehariah, Athaliah, '
  '27':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jaareshiah, Elijah and Zikri were the sons of Jeroham.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All these were heads of families, chiefs as listed in their genealogy, and they lived in Jerusalem.
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jeiel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also 9:35); Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jeiel
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' the father'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Father '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'may mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'civic leader '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: military leader.
      marker-yv: yv-n
    - type: text
      text: ' of Gibeon lived in Gibeon.'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'His wife’s name was Maakah, '
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Bela were:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Addar, Gera, Abihud,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gera the father of Ehud
      marker-yv: yv-n
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and his firstborn son was Abdon, followed by Zur, Kish, Baal, Ner,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also 9:36); Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ner
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Nadab, '
  '31':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Gedor, Ahio, Zeker '
  '32':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Mikloth, who was the father of Shimeah. They too lived near their relatives in Jerusalem.
  '33':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ner was the father of Kish, Kish the father of Saul, and Saul the father of Jonathan, Malki-Shua, Abinadab and Esh-Baal.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also known as '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ish-Bosheth
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The son of Jonathan:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Merib-Baal,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also known as '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mephibosheth
      marker-yv: yv-n
    - type: text
      text: ' who was the father of Micah.'
  '35':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Micah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Pithon, Melek, Tarea and Ahaz.
  '36':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Ahaz was the father of Jehoaddah, Jehoaddah was the father of Alemeth, Azmaveth and Zimri, and Zimri was the father of Moza. '
  '37':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Moza was the father of Binea; Raphah was his son, Eleasah his son and Azel his son.
  '38':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Azel had six sons, and these were their names:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Azrikam, Bokeru, Ishmael, Sheariah, Obadiah and Hanan. All these were the sons of Azel.
  '39':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of his brother Eshek:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Ulam his firstborn, Jeush the second son and Eliphelet the third. '
  '4':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Abishua, Naaman, Ahoah, '
  '40':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: The sons of Ulam were brave warriors who could handle the bow. They had many sons and grandsons—150 in all.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: All these were the descendants of Benjamin.
  '5':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Gera, Shephuphan and Huram.
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These were the descendants of Ehud, who were heads of families of those living in Geba and were deported to Manahath:'
  '7':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Naaman, Ahijah, and Gera, who deported them and who was the father of Uzza and Ahihud.
  '8':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Sons were born to Shaharaim in Moab after he had divorced his wives Hushim and Baara. '
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'By his wife Hodesh he had Jobab, Zibia, Mesha, Malkam, '
