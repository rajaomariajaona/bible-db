document_id: 1CH.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Genealogy of Saul the Benjamite
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Benjamin was the father of Bela his firstborn,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ashbel the second son, Aharah the third,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nohah the fourth and Rapha the fifth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The sons of Bela were:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Addar, Gera, Abihud,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gera the father of Ehud
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Abishua, Naaman, Ahoah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Gera, Shephuphan and Huram.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'These were the descendants of Ehud, who were heads of families of those living in Geba and were deported to Manahath:'
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Naaman, Ahijah, and Gera, who deported them and who was the father of Uzza and Ahihud.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Sons were born to Shaharaim in Moab after he had divorced his wives Hushim and Baara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'By his wife Hodesh he had Jobab, Zibia, Mesha, Malkam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jeuz, Sakia and Mirmah. These were his sons, heads of families. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: By Hushim he had Abitub and Elpaal.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The sons of Elpaal:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Eber, Misham, Shemed (who built Ono and Lod with its surrounding villages), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: and Beriah and Shema, who were heads of families of those living in Aijalon and who drove out the inhabitants of Gath.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ahio, Shashak, Jeremoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Zebadiah, Arad, Eder, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Michael, Ishpah and Joha were the sons of Beriah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Zebadiah, Meshullam, Hizki, Heber, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ishmerai, Izliah and Jobab were the sons of Elpaal.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jakim, Zikri, Zabdi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elienai, Zillethai, Eliel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Adaiah, Beraiah and Shimrath were the sons of Shimei.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ishpan, Eber, Eliel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Abdon, Zikri, Hanan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hananiah, Elam, Anthothijah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Iphdeiah and Penuel were the sons of Shashak.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Shamsherai, Shehariah, Athaliah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Jaareshiah, Elijah and Zikri were the sons of Jeroham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: All these were heads of families, chiefs as listed in their genealogy, and they lived in Jerusalem.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Jeiel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts (see also 9:35); Hebrew does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jeiel
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' the father'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Father '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'may mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'civic leader '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: military leader.
    marker-yv: yv-n
  - type: text
    text: ' of Gibeon lived in Gibeon.'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'His wife’s name was Maakah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: and his firstborn son was Abdon, followed by Zur, Kish, Baal, Ner,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts (see also 9:36); Hebrew does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ner
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Nadab, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Gedor, Ahio, Zeker '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: and Mikloth, who was the father of Shimeah. They too lived near their relatives in Jerusalem.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ner was the father of Kish, Kish the father of Saul, and Saul the father of Jonathan, Malki-Shua, Abinadab and Esh-Baal.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Also known as '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ish-Bosheth
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The son of Jonathan:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Merib-Baal,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Also known as '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mephibosheth
    marker-yv: yv-n
  - type: text
    text: ' who was the father of Micah.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The sons of Micah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Pithon, Melek, Tarea and Ahaz.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ahaz was the father of Jehoaddah, Jehoaddah was the father of Alemeth, Azmaveth and Zimri, and Zimri was the father of Moza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Moza was the father of Binea; Raphah was his son, Eleasah his son and Azel his son.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Azel had six sons, and these were their names:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Azrikam, Bokeru, Ishmael, Sheariah, Obadiah and Hanan. All these were the sons of Azel.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'The sons of his brother Eshek:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Ulam his firstborn, Jeush the second son and Eliphelet the third. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: The sons of Ulam were brave warriors who could handle the bow. They had many sons and grandsons—150 in all.
- type: usfm
  marker: li1
  children:
  - type: text
    text: All these were the descendants of Benjamin.
