document_id: PSA.82,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 82
  - type: text
    content: A psalm of Asaph.
  - type: text
    content: God presides in the great assembly;
  - type: text
    content: 'he renders judgment among the “gods”:'
  '2':
  - type: text
    content: “How long will you
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' defend the unjust'
  - type: text
    content: and show partiality to the wicked?
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '3':
  - type: text
    content: Defend the weak and the fatherless;
  - type: text
    content: uphold the cause of the poor and the oppressed.
  '4':
  - type: text
    content: Rescue the weak and the needy;
  - type: text
    content: deliver them from the hand of the wicked.
  '5':
  - type: text
    content: “The ‘gods’ know nothing, they understand nothing.
  - type: text
    content: They walk about in darkness;
  - type: text
    content: all the foundations of the earth are shaken.
  '6':
  - type: text
    content: “I said, ‘You are “gods”;
  - type: text
    content: you are all sons of the Most High.’
  '7':
  - type: text
    content: But you will die like mere mortals;
  - type: text
    content: you will fall like every other ruler.”
  '8':
  - type: text
    content: Rise up, O God, judge the earth,
  - type: text
    content: for all the nations are your inheritance.
