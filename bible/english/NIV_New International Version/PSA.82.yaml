  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Defend the weak and the fatherless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: uphold the cause of the poor and the oppressed.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Rescue the weak and the needy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deliver them from the hand of the wicked.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “The ‘gods’ know nothing, they understand nothing.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They walk about in darkness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the foundations of the earth are shaken.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “I said, ‘You are “gods”;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are all sons of the Most High.’
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But you will die like mere mortals;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will fall like every other ruler.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Rise up, O God, judge the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all the nations are your inheritance.
