document_id: HOS.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Love for Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “When Israel was a child, I loved him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and out of Egypt I called my son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But the more they were called,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the more they went away from me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: them
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sacrificed to the Baals
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they burned incense to images.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It was I who taught Ephraim to walk,
- type: usfm
  marker: q2
  children:
  - type: text
    text: taking them by the arms;
- type: usfm
  marker: q1
  children:
  - type: text
    text: but they did not realize
- type: usfm
  marker: q2
  children:
  - type: text
    text: it was I who healed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I led them with cords of human kindness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with ties of love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: To them I was like one who lifts
- type: usfm
  marker: q2
  children:
  - type: text
    text: a little child to the cheek,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I bent down to feed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Will they not return to Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will not Assyria rule over them
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they refuse to repent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A sword will flash in their cities;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will devour their false prophets
- type: usfm
  marker: q2
  children:
  - type: text
    text: and put an end to their plans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My people are determined to turn from me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Even though they call me God Most High,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will by no means exalt them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “How can I give you up, Ephraim?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How can I hand you over, Israel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How can I treat you like Admah?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How can I make you like Zeboyim?
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart is changed within me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all my compassion is aroused.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will not carry out my fierce anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will I devastate Ephraim again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am God, and not a man—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One among you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not come against their cities.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They will follow the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will roar like a lion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When he roars,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his children will come trembling from the west.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They will come from Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trembling like sparrows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Assyria, fluttering like doves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will settle them in their homes,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Sin
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ephraim has surrounded me with lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel with deceit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And Judah is unruly against God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even against the faithful Holy One.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts this verse (11:12) is numbered 12:1.
    marker-yv: yv-n
