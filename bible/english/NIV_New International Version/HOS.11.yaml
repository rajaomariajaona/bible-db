document_id: HOS.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Love for Israel
  - type: text
    content: “When Israel was a child, I loved him,
  - type: text
    content: and out of Egypt I called my son.
  '10':
  - type: text
    content: 'They will follow the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: he will roar like a lion.
  - type: text
    content: When he roars,
  - type: text
    content: his children will come trembling from the west.
  '11':
  - type: text
    content: They will come from Egypt,
  - type: text
    content: trembling like sparrows,
  - type: text
    content: from Assyria, fluttering like doves.
  - type: text
    content: I will settle them in their homes,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Israel’s Sin
  '12':
  - type: text
    content: Ephraim has surrounded me with lies,
  - type: text
    content: Israel with deceit.
  - type: text
    content: And Judah is unruly against God,
  - type: text
    content: even against the faithful Holy One.
  - type: note
    content: In Hebrew texts this verse (11:12) is numbered 12:1.
  '2':
  - type: text
    content: But the more they were called,
  - type: text
    content: the more they went away from me.
  - type: note
    content: Septuagint; Hebrew them
  - type: text
    content: They sacrificed to the Baals
  - type: text
    content: and they burned incense to images.
  '3':
  - type: text
    content: It was I who taught Ephraim to walk,
  - type: text
    content: taking them by the arms;
  - type: text
    content: but they did not realize
  - type: text
    content: it was I who healed them.
  '4':
  - type: text
    content: I led them with cords of human kindness,
  - type: text
    content: with ties of love.
  - type: text
    content: To them I was like one who lifts
  - type: text
    content: a little child to the cheek,
  - type: text
    content: and I bent down to feed them.
  '5':
  - type: text
    content: “Will they not return to Egypt
  - type: text
    content: and will not Assyria rule over them
  - type: text
    content: because they refuse to repent?
  '6':
  - type: text
    content: A sword will flash in their cities;
  - type: text
    content: it will devour their false prophets
  - type: text
    content: and put an end to their plans.
  '7':
  - type: text
    content: My people are determined to turn from me.
  - type: text
    content: Even though they call me God Most High,
  - type: text
    content: I will by no means exalt them.
  '8':
  - type: text
    content: “How can I give you up, Ephraim?
  - type: text
    content: How can I hand you over, Israel?
  - type: text
    content: How can I treat you like Admah?
  - type: text
    content: How can I make you like Zeboyim?
  - type: text
    content: My heart is changed within me;
  - type: text
    content: all my compassion is aroused.
  '9':
  - type: text
    content: I will not carry out my fierce anger,
  - type: text
    content: nor will I devastate Ephraim again.
  - type: text
    content: For I am God, and not a man—
  - type: text
    content: the Holy One among you.
  - type: text
    content: I will not come against their cities.
