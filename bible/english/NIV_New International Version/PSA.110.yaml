document_id: PSA.110,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 110
  - type: text
    content: Of David. A psalm.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' says to my lord:'
  - type: note
    content: Or Lord
  - type: text
    content: “Sit at my right hand
  - type: text
    content: until I make your enemies
  - type: text
    content: a footstool for your feet.”
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will extend your mighty scepter from Zion, saying,'
  - type: text
    content: “Rule in the midst of your enemies!”
  '3':
  - type: text
    content: Your troops will be willing
  - type: text
    content: on your day of battle.
  - type: text
    content: Arrayed in holy splendor,
  - type: text
    content: your young men will come to you
  - type: text
    content: like dew from the morning’s womb.
  - type: note
    content: The meaning of the Hebrew for this sentence is uncertain.
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn'
  - type: text
    content: 'and will not change his mind:'
  - type: text
    content: “You are a priest forever,
  - type: text
    content: in the order of Melchizedek.”
  '5':
  - type: text
    content: The Lord is at your right hand
  - type: note
    content: Or My lord is at your right hand, Lord
  - type: text
    content: ;
  - type: text
    content: he will crush kings on the day of his wrath.
  '6':
  - type: text
    content: He will judge the nations, heaping up the dead
  - type: text
    content: and crushing the rulers of the whole earth.
  '7':
  - type: text
    content: He will drink from a brook along the way,
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  - type: text
    content: and so he will lift his head high.
