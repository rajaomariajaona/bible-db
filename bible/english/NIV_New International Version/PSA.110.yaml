document_id: PSA.110,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 110
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Of David. A psalm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to my lord:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '110:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Lord
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sit at my right hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until I make your enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a footstool for your feet.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will extend your mighty scepter from Zion, saying,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Rule in the midst of your enemies!”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your troops will be willing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on your day of battle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arrayed in holy splendor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your young men will come to you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like dew from the morning’s womb.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '110:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this sentence is uncertain.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sworn'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and will not change his mind:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are a priest forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the order of Melchizedek.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord is at your right hand
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '110:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'My lord is at your right hand, '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will crush kings on the day of his wrath.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will judge the nations, heaping up the dead
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and crushing the rulers of the whole earth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will drink from a brook along the way,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '110:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this clause is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so he will lift his head high.
