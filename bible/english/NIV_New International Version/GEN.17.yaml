document_id: GEN.17,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Covenant of Circumcision
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Abram was ninety-nine years old, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to him and said, “I am God Almighty'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: El-Shaddai
      marker-yv: yv-n
    - type: text
      text: '; walk before me faithfully and be blameless. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is my covenant with you and your descendants after you, the covenant you are to keep: Every male among you shall be circumcised. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are to undergo circumcision, and it will be the sign of the covenant between me and you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the generations to come every male among you who is eight days old must be circumcised, including those born in your household or bought with money from a foreigner—those who are not your offspring. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whether born in your household or bought with your money, they must be circumcised. My covenant in your flesh is to be an everlasting covenant. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Any uncircumcised male, who has not been circumcised in the flesh, will be cut off from his people; he has broken my covenant.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God also said to Abraham, “As for Sarai your wife, you are no longer to call her Sarai; her name will be Sarah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will bless her and will surely give you a son by her. I will bless her so that she will be the mother of nations; kings of peoples will come from her.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham fell facedown; he laughed and said to himself, “Will a son be born to a man a hundred years old? Will Sarah bear a child at the age of ninety?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Abraham said to God, “If only Ishmael might live under your blessing!”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then God said, “Yes, but your wife Sarah will bear you a son, and you will call him Isaac.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Isaac '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he laughs.
      marker-yv: yv-n
    - type: text
      text: ' I will establish my covenant with him as an everlasting covenant for his descendants after him. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I will make my covenant between me and you and will greatly increase your numbers.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as for Ishmael, I have heard you: I will surely bless him; I will make him fruitful and will greatly increase his numbers. He will be the father of twelve rulers, and I will make him into a great nation. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But my covenant I will establish with Isaac, whom Sarah will bear to you by this time next year.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he had finished speaking with Abraham, God went up from him.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that very day Abraham took his son Ishmael and all those born in his household or bought with his money, every male in his household, and circumcised them, as God told him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham was ninety-nine years old when he was circumcised, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and his son Ishmael was thirteen; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham and his son Ishmael were both circumcised on that very day. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And every male in Abraham’s household, including those born in his household or bought from a foreigner, was circumcised with him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram fell facedown, and God said to him, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As for me, this is my covenant with you: You will be the father of many nations. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No longer will you be called Abram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abram '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exalted father.
      marker-yv: yv-n
    - type: text
      text: ; your name will be Abraham,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abraham '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probably means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: father of many
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' for I have made you a father of many nations. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make you very fruitful; I will make nations of you, and kings will come from you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will establish my covenant as an everlasting covenant between me and you and your descendants after you for the generations to come, to be your God and the God of your descendants after you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The whole land of Canaan, where you now reside as a foreigner, I will give as an everlasting possession to you and your descendants after you; and I will be their God.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God said to Abraham, “As for you, you must keep my covenant, you and your descendants after you for the generations to come. '
