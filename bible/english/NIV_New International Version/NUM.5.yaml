document_id: NUM.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Purity of the Camp
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: Sacred things belong to their owners, but what they give to the priest will belong to the priest.’ ”
  - type: heading
    content: The Test for an Unfaithful Wife
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘If a man’s wife goes astray and is unfaithful to him '
  '13':
  - type: text
    content: 'so that another man has sexual relations with her, and this is hidden from her husband and her impurity is undetected (since there is no witness against her and she has not been caught in the act), '
  '14':
  - type: text
    content: 'and if feelings of jealousy come over her husband and he suspects his wife and she is impure—or if he is jealous and suspects her even though she is not impure— '
  '15':
  - type: text
    content: then he is to take his wife to the priest. He must also take an offering of a tenth of an ephah
  - type: note
    content: That is, probably about 3 1/2 pounds or about 1.6 kilograms
  - type: text
    content: ' of barley flour on her behalf. He must not pour olive oil on it or put incense on it, because it is a grain offering for jealousy, a reminder-offering to draw attention to wrongdoing.'
  '16':
  - type: text
    content: '“ ‘The priest shall bring her and have her stand before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Then he shall take some holy water in a clay jar and put some dust from the tabernacle floor into the water. '
  '18':
  - type: text
    content: 'After the priest has had the woman stand before the '
  - type: text
    content: Lord
  - type: text
    content: ', he shall loosen her hair and place in her hands the reminder-offering, the grain offering for jealousy, while he himself holds the bitter water that brings a curse. '
  '19':
  - type: text
    content: 'Then the priest shall put the woman under oath and say to her, “If no other man has had sexual relations with you and you have not gone astray and become impure while married to your husband, may this bitter water that brings a curse not harm you. '
  '2':
  - type: text
    content: “Command the Israelites to send away from the camp anyone who has a defiling skin disease
  - type: note
    content: The Hebrew word for defiling skin disease, traditionally translated “leprosy,” was used for various diseases affecting the skin.
  - type: text
    content: ' or a discharge of any kind, or who is ceremonially unclean because of a dead body. '
  '20':
  - type: text
    content: 'But if you have gone astray while married to your husband and you have made yourself impure by having sexual relations with a man other than your husband”— '
  '21':
  - type: text
    content: 'here the priest is to put the woman under this curse—“may the '
  - type: text
    content: Lord
  - type: text
    content: ' cause you to become a curse'
  - type: note
    content: That is, may he cause your name to be used in cursing (see Jer. 29:22); or, may others see that you are cursed; similarly in verse 27.
  - type: text
    content: ' among your people when he makes your womb miscarry and your abdomen swell. '
  '22':
  - type: text
    content: May this water that brings a curse enter your body so that your abdomen swells or your womb miscarries.”
  - type: text
    content: “ ‘Then the woman is to say, “Amen. So be it.”
  '23':
  - type: text
    content: '“ ‘The priest is to write these curses on a scroll and then wash them off into the bitter water. '
  '24':
  - type: text
    content: 'He shall make the woman drink the bitter water that brings a curse, and this water that brings a curse and causes bitter suffering will enter her. '
  '25':
  - type: text
    content: 'The priest is to take from her hands the grain offering for jealousy, wave it before the '
  - type: text
    content: Lord
  - type: text
    content: ' and bring it to the altar. '
  '26':
  - type: text
    content: The priest is then to take a handful of the grain offering as a memorial
  - type: note
    content: Or representative
  - type: text
    content: ' offering and burn it on the altar; after that, he is to have the woman drink the water. '
  '27':
  - type: text
    content: 'If she has made herself impure and been unfaithful to her husband, this will be the result: When she is made to drink the water that brings a curse and causes bitter suffering, it will enter her, her abdomen will swell and her womb will miscarry, and she will become a curse. '
  '28':
  - type: text
    content: If, however, the woman has not made herself impure, but is clean, she will be cleared of guilt and will be able to have children.
  '29':
  - type: text
    content: '“ ‘This, then, is the law of jealousy when a woman goes astray and makes herself impure while married to her husband, '
  '3':
  - type: text
    content: 'Send away male and female alike; send them outside the camp so they will not defile their camp, where I dwell among them.” '
  '30':
  - type: text
    content: 'or when feelings of jealousy come over a man because he suspects his wife. The priest is to have her stand before the '
  - type: text
    content: Lord
  - type: text
    content: ' and is to apply this entire law to her. '
  '31':
  - type: text
    content: The husband will be innocent of any wrongdoing, but the woman will bear the consequences of her sin.’ ”
  '4':
  - type: text
    content: 'The Israelites did so; they sent them outside the camp. They did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had instructed Moses.'
  - type: heading
    content: Restitution for Wrongs
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '6':
  - type: text
    content: '“Say to the Israelites: ‘Any man or woman who wrongs another in any way'
  - type: note
    content: Or woman who commits any wrong common to mankind
  - type: text
    content: ' and so is unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' is guilty '
  '7':
  - type: text
    content: 'and must confess the sin they have committed. They must make full restitution for the wrong they have done, add a fifth of the value to it and give it all to the person they have wronged. '
  '8':
  - type: text
    content: 'But if that person has no close relative to whom restitution can be made for the wrong, the restitution belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ' and must be given to the priest, along with the ram with which atonement is made for the wrongdoer. '
  '9':
  - type: text
    content: 'All the sacred contributions the Israelites bring to a priest will belong to him. '
