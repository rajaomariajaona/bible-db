document_id: PSA.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 14
  - type: text
    content: For the director of music. Of David.
  - type: text
    content: The fool
  - type: note
    content: The Hebrew words rendered fool in Psalms denote one who is morally deficient.
  - type: text
    content: ' says in his heart,'
  - type: text
    content: “There is no God.”
  - type: text
    content: They are corrupt, their deeds are vile;
  - type: text
    content: there is no one who does good.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' looks down from heaven'
  - type: text
    content: on all mankind
  - type: text
    content: to see if there are any who understand,
  - type: text
    content: any who seek God.
  '3':
  - type: text
    content: All have turned away, all have become corrupt;
  - type: text
    content: there is no one who does good,
  - type: text
    content: not even one.
  '4':
  - type: text
    content: Do all these evildoers know nothing?
  - type: text
    content: They devour my people as though eating bread;
  - type: text
    content: 'they never call on the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: But there they are, overwhelmed with dread,
  - type: text
    content: for God is present in the company of the righteous.
  '6':
  - type: text
    content: You evildoers frustrate the plans of the poor,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' is their refuge.'
  '7':
  - type: text
    content: Oh, that salvation for Israel would come out of Zion!
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' restores his people,'
  - type: text
    content: let Jacob rejoice and Israel be glad!
