document_id: PSA.14,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 14
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. Of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The fool
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew words rendered '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fool '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in Psalms denote one who is morally deficient.
      marker-yv: yv-n
    - type: text
      text: ' says in his heart,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “There is no God.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are corrupt, their deeds are vile;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no one who does good.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looks down from heaven'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on all mankind
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to see if there are any who understand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: any who seek God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: All have turned away, all have become corrupt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no one who does good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not even one.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Do all these evildoers know nothing?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They devour my people as though eating bread;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they never call on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But there they are, overwhelmed with dread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for God is present in the company of the righteous.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You evildoers frustrate the plans of the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is their refuge.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Oh, that salvation for Israel would come out of Zion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' restores his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let Jacob rejoice and Israel be glad!
