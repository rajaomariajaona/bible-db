document_id: LEV.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Death of Nadab and Abihu
  - type: text
    content: 'Aaron’s sons Nadab and Abihu took their censers, put fire in them and added incense; and they offered unauthorized fire before the '
  - type: text
    content: Lord
  - type: text
    content: ', contrary to his command. '
  '10':
  - type: text
    content: 'so that you can distinguish between the holy and the common, between the unclean and the clean, '
  '11':
  - type: text
    content: 'and so you can teach the Israelites all the decrees the '
  - type: text
    content: Lord
  - type: text
    content: ' has given them through Moses.”'
  '12':
  - type: text
    content: 'Moses said to Aaron and his remaining sons, Eleazar and Ithamar, “Take the grain offering left over from the food offerings prepared without yeast and presented to the '
  - type: text
    content: Lord
  - type: text
    content: ' and eat it beside the altar, for it is most holy. '
  '13':
  - type: text
    content: 'Eat it in the sanctuary area, because it is your share and your sons’ share of the food offerings presented to the '
  - type: text
    content: Lord
  - type: text
    content: '; for so I have been commanded. '
  '14':
  - type: text
    content: 'But you and your sons and your daughters may eat the breast that was waved and the thigh that was presented. Eat them in a ceremonially clean place; they have been given to you and your children as your share of the Israelites’ fellowship offerings. '
  '15':
  - type: text
    content: 'The thigh that was presented and the breast that was waved must be brought with the fat portions of the food offerings, to be waved before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering. This will be the perpetual share for you and your children, as the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded.”'
  '16':
  - type: text
    content: When Moses inquired about the goat of the sin offering
  - type: note
    content: Or purification offering; also in verses 17 and 19
  - type: text
    content: ' and found that it had been burned up, he was angry with Eleazar and Ithamar, Aaron’s remaining sons, and asked, '
  '17':
  - type: text
    content: '“Why didn’t you eat the sin offering in the sanctuary area? It is most holy; it was given to you to take away the guilt of the community by making atonement for them before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: Since its blood was not taken into the Holy Place, you should have eaten the goat in the sanctuary area, as I commanded.”
  '19':
  - type: text
    content: 'Aaron replied to Moses, “Today they sacrificed their sin offering and their burnt offering before the '
  - type: text
    content: Lord
  - type: text
    content: ', but such things as this have happened to me. Would the '
  - type: text
    content: Lord
  - type: text
    content: ' have been pleased if I had eaten the sin offering today?” '
  '2':
  - type: text
    content: 'So fire came out from the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' and consumed them, and they died before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: When Moses heard this, he was satisfied.
  '3':
  - type: text
    content: 'Moses then said to Aaron, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke of when he said:'
  - type: text
    content: “ ‘Among those who approach me
  - type: text
    content: I will be proved holy;
  - type: text
    content: in the sight of all the people
  - type: text
    content: I will be honored.’ ”
  - type: text
    content: Aaron remained silent.
  '4':
  - type: text
    content: 'Moses summoned Mishael and Elzaphan, sons of Aaron’s uncle Uzziel, and said to them, “Come here; carry your cousins outside the camp, away from the front of the sanctuary.” '
  '5':
  - type: text
    content: So they came and carried them, still in their tunics, outside the camp, as Moses ordered.
  '6':
  - type: text
    content: Then Moses said to Aaron and his sons Eleazar and Ithamar, “Do not let your hair become unkempt
  - type: note
    content: Or Do not uncover your heads
  - type: text
    content: ' and do not tear your clothes, or you will die and the '
  - type: text
    content: Lord
  - type: text
    content: ' will be angry with the whole community. But your relatives, all the Israelites, may mourn for those the '
  - type: text
    content: Lord
  - type: text
    content: ' has destroyed by fire. '
  '7':
  - type: text
    content: 'Do not leave the entrance to the tent of meeting or you will die, because the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointing oil is on you.” So they did as Moses said.
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, '
  '9':
  - type: text
    content: '“You and your sons are not to drink wine or other fermented drink whenever you go into the tent of meeting, or you will die. This is a lasting ordinance for the generations to come, '
