document_id: LEV.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Nadab and Abihu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron’s sons Nadab and Abihu took their censers, put fire in them and added incense; and they offered unauthorized fire before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', contrary to his command. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that you can distinguish between the holy and the common, between the unclean and the clean, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and so you can teach the Israelites all the decrees the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given them through Moses.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses said to Aaron and his remaining sons, Eleazar and Ithamar, “Take the grain offering left over from the food offerings prepared without yeast and presented to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and eat it beside the altar, for it is most holy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eat it in the sanctuary area, because it is your share and your sons’ share of the food offerings presented to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; for so I have been commanded. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you and your sons and your daughters may eat the breast that was waved and the thigh that was presented. Eat them in a ceremonially clean place; they have been given to you and your children as your share of the Israelites’ fellowship offerings. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The thigh that was presented and the breast that was waved must be brought with the fat portions of the food offerings, to be waved before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as a wave offering. This will be the perpetual share for you and your children, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Moses inquired about the goat of the sin offering
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: purification offering
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 17 and 19
      marker-yv: yv-n
    - type: text
      text: ' and found that it had been burned up, he was angry with Eleazar and Ithamar, Aaron’s remaining sons, and asked, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Why didn’t you eat the sin offering in the sanctuary area? It is most holy; it was given to you to take away the guilt of the community by making atonement for them before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Since its blood was not taken into the Holy Place, you should have eaten the goat in the sanctuary area, as I commanded.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron replied to Moses, “Today they sacrificed their sin offering and their burnt offering before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but such things as this have happened to me. Would the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' have been pleased if I had eaten the sin offering today?” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So fire came out from the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and consumed them, and they died before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Moses heard this, he was satisfied.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses then said to Aaron, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke of when he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Among those who approach me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be proved holy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the sight of all the people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be honored.’ ”
  - type: usfm
    marker: m
    children:
    - type: text
      text: Aaron remained silent.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses summoned Mishael and Elzaphan, sons of Aaron’s uncle Uzziel, and said to them, “Come here; carry your cousins outside the camp, away from the front of the sanctuary.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they came and carried them, still in their tunics, outside the camp, as Moses ordered.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Moses said to Aaron and his sons Eleazar and Ithamar, “Do not let your hair become unkempt
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Do not uncover your heads
      marker-yv: yv-n
    - type: text
      text: ' and do not tear your clothes, or you will die and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be angry with the whole community. But your relatives, all the Israelites, may mourn for those the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has destroyed by fire. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not leave the entrance to the tent of meeting or you will die, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anointing oil is on you.” So they did as Moses said.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Aaron, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You and your sons are not to drink wine or other fermented drink whenever you go into the tent of meeting, or you will die. This is a lasting ordinance for the generations to come, '
