document_id: GEN.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tower of Babel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the whole world had one language and a common speech. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is the account of Shem’s family line.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Two years after the flood, when Shem was 100 years old, he became the father
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Father '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'may mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ancestor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 11-25.
      marker-yv: yv-n
    - type: text
      text: ' of Arphaxad. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after he became the father of Arphaxad, Shem lived 500 years and had other sons and daughters.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Arphaxad had lived 35 years, he became the father of Shelah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after he became the father of Shelah, Arphaxad lived 403 years and had other sons and daughters.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint (see also Luke 3:35,36 and note at Gen. 10:24) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '35 years, he became the father of Cainan. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: And after he became the father of Cainan, Arphaxad lived 430 years and had other sons and daughters, and then he died. When Cainan had lived 130 years, he became the father of Shelah. And after he became the father of Shelah, Cainan lived 330 years and had other sons and daughters
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Shelah had lived 30 years, he became the father of Eber. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after he became the father of Eber, Shelah lived 403 years and had other sons and daughters.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Eber had lived 34 years, he became the father of Peleg. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after he became the father of Peleg, Eber lived 430 years and had other sons and daughters.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Peleg had lived 30 years, he became the father of Reu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after he became the father of Reu, Peleg lived 209 years and had other sons and daughters.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As people moved eastward,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from the east
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the east
      marker-yv: yv-n
    - type: text
      text: ' they found a plain in Shinar'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Babylonia
      marker-yv: yv-n
    - type: text
      text: ' and settled there.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Reu had lived 32 years, he became the father of Serug. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after he became the father of Serug, Reu lived 207 years and had other sons and daughters.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Serug had lived 30 years, he became the father of Nahor. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after he became the father of Nahor, Serug lived 200 years and had other sons and daughters.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Nahor had lived 29 years, he became the father of Terah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And after he became the father of Terah, Nahor lived 119 years and had other sons and daughters.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After Terah had lived 70 years, he became the father of Abram, Nahor and Haran.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abram’s Family
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is the account of Terah’s family line.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Terah became the father of Abram, Nahor and Haran. And Haran became the father of Lot. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While his father Terah was still alive, Haran died in Ur of the Chaldeans, in the land of his birth. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram and Nahor both married. The name of Abram’s wife was Sarai, and the name of Nahor’s wife was Milkah; she was the daughter of Haran, the father of both Milkah and Iskah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to each other, “Come, let’s make bricks and bake them thoroughly.” They used brick instead of stone, and tar for mortar. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Sarai was childless because she was not able to conceive.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Terah took his son Abram, his grandson Lot son of Haran, and his daughter-in-law Sarai, the wife of his son Abram, and together they set out from Ur of the Chaldeans to go to Canaan. But when they came to Harran, they settled there.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Terah lived 205 years, and he died in Harran.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they said, “Come, let us build ourselves a city, with a tower that reaches to the heavens, so that we may make a name for ourselves; otherwise we will be scattered over the face of the whole earth.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came down to see the city and the tower the people were building. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “If as one people speaking the same language they have begun to do this, then nothing they plan to do will be impossible for them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Come, let us go down and confuse their language so they will not understand each other.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' scattered them from there over all the earth, and they stopped building the city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why it was called Babel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'That is, Babylon; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Babel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: confused
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '—because there the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' confused the language of the whole world. From there the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' scattered them over the face of the whole earth.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: From Shem to Abram
    marker-yv: yv-h
