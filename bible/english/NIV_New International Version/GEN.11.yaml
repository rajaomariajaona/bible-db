document_id: GEN.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tower of Babel
  - type: text
    content: 'Now the whole world had one language and a common speech. '
  '10':
  - type: text
    content: This is the account of Shem’s family line.
  - type: text
    content: Two years after the flood, when Shem was 100 years old, he became the father
  - type: note
    content: Father may mean ancestor; also in verses 11-25.
  - type: text
    content: ' of Arphaxad. '
  '11':
  - type: text
    content: And after he became the father of Arphaxad, Shem lived 500 years and had other sons and daughters.
  '12':
  - type: text
    content: 'When Arphaxad had lived 35 years, he became the father of Shelah. '
  '13':
  - type: text
    content: And after he became the father of Shelah, Arphaxad lived 403 years and had other sons and daughters.
  - type: note
    content: Hebrew; Septuagint (see also Luke 3:35,36 and note at Gen. 10:24) 35 years, he became the father of Cainan. 13 And after he became the father of Cainan, Arphaxad lived 430 years and had other sons and daughters, and then he died. When Cainan had lived 130 years, he became the father of Shelah. And after he became the father of Shelah, Cainan lived 330 years and had other sons and daughters
  '14':
  - type: text
    content: 'When Shelah had lived 30 years, he became the father of Eber. '
  '15':
  - type: text
    content: And after he became the father of Eber, Shelah lived 403 years and had other sons and daughters.
  '16':
  - type: text
    content: 'When Eber had lived 34 years, he became the father of Peleg. '
  '17':
  - type: text
    content: And after he became the father of Peleg, Eber lived 430 years and had other sons and daughters.
  '18':
  - type: text
    content: 'When Peleg had lived 30 years, he became the father of Reu. '
  '19':
  - type: text
    content: And after he became the father of Reu, Peleg lived 209 years and had other sons and daughters.
  '2':
  - type: text
    content: As people moved eastward,
  - type: note
    content: Or from the east; or in the east
  - type: text
    content: ' they found a plain in Shinar'
  - type: note
    content: That is, Babylonia
  - type: text
    content: ' and settled there.'
  '20':
  - type: text
    content: 'When Reu had lived 32 years, he became the father of Serug. '
  '21':
  - type: text
    content: And after he became the father of Serug, Reu lived 207 years and had other sons and daughters.
  '22':
  - type: text
    content: 'When Serug had lived 30 years, he became the father of Nahor. '
  '23':
  - type: text
    content: And after he became the father of Nahor, Serug lived 200 years and had other sons and daughters.
  '24':
  - type: text
    content: 'When Nahor had lived 29 years, he became the father of Terah. '
  '25':
  - type: text
    content: And after he became the father of Terah, Nahor lived 119 years and had other sons and daughters.
  '26':
  - type: text
    content: After Terah had lived 70 years, he became the father of Abram, Nahor and Haran.
  - type: heading
    content: Abram’s Family
  '27':
  - type: text
    content: This is the account of Terah’s family line.
  - type: text
    content: 'Terah became the father of Abram, Nahor and Haran. And Haran became the father of Lot. '
  '28':
  - type: text
    content: 'While his father Terah was still alive, Haran died in Ur of the Chaldeans, in the land of his birth. '
  '29':
  - type: text
    content: 'Abram and Nahor both married. The name of Abram’s wife was Sarai, and the name of Nahor’s wife was Milkah; she was the daughter of Haran, the father of both Milkah and Iskah. '
  '3':
  - type: text
    content: 'They said to each other, “Come, let’s make bricks and bake them thoroughly.” They used brick instead of stone, and tar for mortar. '
  '30':
  - type: text
    content: Now Sarai was childless because she was not able to conceive.
  '31':
  - type: text
    content: Terah took his son Abram, his grandson Lot son of Haran, and his daughter-in-law Sarai, the wife of his son Abram, and together they set out from Ur of the Chaldeans to go to Canaan. But when they came to Harran, they settled there.
  '32':
  - type: text
    content: Terah lived 205 years, and he died in Harran.
  '4':
  - type: text
    content: Then they said, “Come, let us build ourselves a city, with a tower that reaches to the heavens, so that we may make a name for ourselves; otherwise we will be scattered over the face of the whole earth.”
  '5':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' came down to see the city and the tower the people were building. '
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “If as one people speaking the same language they have begun to do this, then nothing they plan to do will be impossible for them. '
  '7':
  - type: text
    content: Come, let us go down and confuse their language so they will not understand each other.”
  '8':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' scattered them from there over all the earth, and they stopped building the city. '
  '9':
  - type: text
    content: That is why it was called Babel
  - type: note
    content: That is, Babylon; Babel sounds like the Hebrew for confused.
  - type: text
    content: '—because there the '
  - type: text
    content: Lord
  - type: text
    content: ' confused the language of the whole world. From there the '
  - type: text
    content: Lord
  - type: text
    content: ' scattered them over the face of the whole earth.'
  - type: heading
    content: From Shem to Abram
