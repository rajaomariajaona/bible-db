- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the serpent was more crafty than any of the wild animals the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God had made. He said to the woman, “Did God really say, ‘You must not eat from any tree in the garden’?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The woman said to the serpent, “We may eat fruit from the trees in the garden, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: but God did say, ‘You must not eat fruit from the tree that is in the middle of the garden, and you must not touch it, or you will die.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“You will not certainly die,” the serpent said to the woman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “For God knows that when you eat from it your eyes will be opened, and you will be like God, knowing good and evil.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When the woman saw that the fruit of the tree was good for food and pleasing to the eye, and also desirable for gaining wisdom, she took some and ate it. She also gave some to her husband, who was with her, and he ate it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then the eyes of both of them were opened, and they realized they were naked; so they sewed fig leaves together and made coverings for themselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the man and his wife heard the sound of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God as he was walking in the garden in the cool of the day, and they hid from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God among the trees of the garden. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God called to the man, “Where are you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He answered, “I heard you in the garden, and I was afraid because I was naked; so I hid.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And he said, “Who told you that you were naked? Have you eaten from the tree that I commanded you not to eat from?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The man said, “The woman you put here with me—she gave me some fruit from the tree, and I ate it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God said to the woman, “What is this you have done?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: The woman said, “The serpent deceived me, and I ate.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God said to the serpent, “Because you have done this,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Cursed are you above all livestock
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all wild animals!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will crawl on your belly
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will eat dust
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the days of your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And I will put enmity
- type: usfm
  marker: q2
  children:
  - type: text
    text: between you and the woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and between your offspring
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: seed
    marker-yv: yv-n
  - type: text
    text: ' and hers;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will crush
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: strike
    marker-yv: yv-n
  - type: text
    text: ' your head,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will strike his heel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: To the woman he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will make your pains in childbearing very severe;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with painful labor you will give birth to children.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your desire will be for your husband,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will rule over you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: To Adam he said, “Because you listened to your wife and ate fruit from the tree about which I commanded you, ‘You must not eat from it,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Cursed is the ground because of you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: through painful toil you will eat food from it
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the days of your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: It will produce thorns and thistles for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will eat the plants of the field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: By the sweat of your brow
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will eat your food
- type: usfm
  marker: q1
  children:
  - type: text
    text: until you return to the ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since from it you were taken;
- type: usfm
  marker: q1
  children:
  - type: text
    text: for dust you are
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to dust you will return.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Adam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The man
    marker-yv: yv-n
  - type: text
    text: ' named his wife Eve,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'probably means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: living.
    marker-yv: yv-n
  - type: text
    text: ' because she would become the mother of all the living.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God made garments of skin for Adam and his wife and clothed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God said, “The man has now become like one of us, knowing good and evil. He must not be allowed to reach out his hand and take also from the tree of life and eat, and live forever.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God banished him from the Garden of Eden to work the ground from which he had been taken. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: After he drove the man out, he placed on the east side
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: placed in front
    marker-yv: yv-n
  - type: text
    text: ' of the Garden of Eden cherubim and a flaming sword flashing back and forth to guard the way to the tree of life.'
