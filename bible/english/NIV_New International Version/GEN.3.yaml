type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall
  - type: text
    content: 'Now the serpent was more crafty than any of the wild animals the '
  - type: text
    content: Lord
  - type: text
    content: ' God had made. He said to the woman, “Did God really say, ‘You must not eat from any tree in the garden’?”'
  '10':
  - type: text
    content: He answered, “I heard you in the garden, and I was afraid because I was naked; so I hid.”
  '11':
  - type: text
    content: And he said, “Who told you that you were naked? Have you eaten from the tree that I commanded you not to eat from?”
  '12':
  - type: text
    content: The man said, “The woman you put here with me—she gave me some fruit from the tree, and I ate it.”
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God said to the woman, “What is this you have done?”'
  - type: text
    content: The woman said, “The serpent deceived me, and I ate.”
  '14':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' God said to the serpent, “Because you have done this,'
  - type: text
    content: “Cursed are you above all livestock
  - type: text
    content: and all wild animals!
  - type: text
    content: You will crawl on your belly
  - type: text
    content: and you will eat dust
  - type: text
    content: all the days of your life.
  '15':
  - type: text
    content: And I will put enmity
  - type: text
    content: between you and the woman,
  - type: text
    content: and between your offspring
  - type: note
    content: Or seed
  - type: text
    content: ' and hers;'
  - type: text
    content: he will crush
  - type: note
    content: Or strike
  - type: text
    content: ' your head,'
  - type: text
    content: and you will strike his heel.”
  '16':
  - type: text
    content: To the woman he said,
  - type: text
    content: “I will make your pains in childbearing very severe;
  - type: text
    content: with painful labor you will give birth to children.
  - type: text
    content: Your desire will be for your husband,
  - type: text
    content: and he will rule over you.”
  '17':
  - type: text
    content: To Adam he said, “Because you listened to your wife and ate fruit from the tree about which I commanded you, ‘You must not eat from it,’
  - type: text
    content: “Cursed is the ground because of you;
  - type: text
    content: through painful toil you will eat food from it
  - type: text
    content: all the days of your life.
  '18':
  - type: text
    content: It will produce thorns and thistles for you,
  - type: text
    content: and you will eat the plants of the field.
  '19':
  - type: text
    content: By the sweat of your brow
  - type: text
    content: you will eat your food
  - type: text
    content: until you return to the ground,
  - type: text
    content: since from it you were taken;
  - type: text
    content: for dust you are
  - type: text
    content: and to dust you will return.”
  '2':
  - type: text
    content: 'The woman said to the serpent, “We may eat fruit from the trees in the garden, '
  '20':
  - type: text
    content: Adam
  - type: note
    content: Or The man
  - type: text
    content: ' named his wife Eve,'
  - type: note
    content: Eve probably means living.
  - type: text
    content: ' because she would become the mother of all the living.'
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' God made garments of skin for Adam and his wife and clothed them. '
  '22':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' God said, “The man has now become like one of us, knowing good and evil. He must not be allowed to reach out his hand and take also from the tree of life and eat, and live forever.” '
  '23':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' God banished him from the Garden of Eden to work the ground from which he had been taken. '
  '24':
  - type: text
    content: After he drove the man out, he placed on the east side
  - type: note
    content: Or placed in front
  - type: text
    content: ' of the Garden of Eden cherubim and a flaming sword flashing back and forth to guard the way to the tree of life.'
  '3':
  - type: text
    content: but God did say, ‘You must not eat fruit from the tree that is in the middle of the garden, and you must not touch it, or you will die.’ ”
  '4':
  - type: text
    content: '“You will not certainly die,” the serpent said to the woman. '
  '5':
  - type: text
    content: “For God knows that when you eat from it your eyes will be opened, and you will be like God, knowing good and evil.”
  '6':
  - type: text
    content: 'When the woman saw that the fruit of the tree was good for food and pleasing to the eye, and also desirable for gaining wisdom, she took some and ate it. She also gave some to her husband, who was with her, and he ate it. '
  '7':
  - type: text
    content: Then the eyes of both of them were opened, and they realized they were naked; so they sewed fig leaves together and made coverings for themselves.
  '8':
  - type: text
    content: 'Then the man and his wife heard the sound of the '
  - type: text
    content: Lord
  - type: text
    content: ' God as he was walking in the garden in the cool of the day, and they hid from the '
  - type: text
    content: Lord
  - type: text
    content: ' God among the trees of the garden. '
  '9':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' God called to the man, “Where are you?”'
