  - type: usfm
    marker: s1
    children:
    - type: text
      text: Family Record of Moses and Aaron
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron about the Israelites and Pharaoh king of Egypt, and he commanded them to bring the Israelites out of Egypt.'
  '14':
  - type: usfm
    marker: mi
    children:
    - type: text
      text: These were the heads of their families
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'families '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here and in verse 25 refers to units larger than clans.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: The sons of Reuben the firstborn son of Israel were Hanok and Pallu, Hezron and Karmi. These were the clans of Reuben.
  '15':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: The sons of Simeon were Jemuel, Jamin, Ohad, Jakin, Zohar and Shaul the son of a Canaanite woman. These were the clans of Simeon.
  '16':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'These were the names of the sons of Levi according to their records: Gershon, Kohath and Merari. Levi lived 137 years.'
  '17':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: The sons of Gershon, by clans, were Libni and Shimei.
  '18':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: The sons of Kohath were Amram, Izhar, Hebron and Uzziel. Kohath lived 133 years.
  '19':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: The sons of Merari were Mahli and Mushi.
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: These were the clans of Levi according to their records.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God also said to Moses, “I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: Amram married his father’s sister Jochebed, who bore him Aaron and Moses. Amram lived 137 years.
  '21':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: The sons of Izhar were Korah, Nepheg and Zikri.
  '22':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: The sons of Uzziel were Mishael, Elzaphan and Sithri.
  '23':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: Aaron married Elisheba, daughter of Amminadab and sister of Nahshon, and she bore him Nadab and Abihu, Eleazar and Ithamar.
  '24':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'The sons of Korah were: Assir, Elkanah and Abiasaph. These were the Korahite clans.'
  '25':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: Eleazar son of Aaron married one of the daughters of Putiel, and she bore him Phinehas.
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: These were the heads of the Levite families, clan by clan.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was this Aaron and Moses to whom the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Bring the Israelites out of Egypt by their divisions.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were the ones who spoke to Pharaoh king of Egypt about bringing the Israelites out of Egypt—this same Moses and Aaron.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Aaron to Speak for Moses
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses in Egypt, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he said to him, “I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Tell Pharaoh king of Egypt everything I tell you.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I appeared to Abraham, to Isaac and to Jacob as God Almighty,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: El-Shaddai
      marker-yv: yv-n
    - type: text
      text: ' but by my name the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See note at 3:15.
      marker-yv: yv-n
    - type: text
      text: ' I did not make myself fully known to them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Moses said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “Since I speak with faltering lips, why would Pharaoh listen to me?”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I also established my covenant with them to give them the land of Canaan, where they resided as foreigners. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moreover, I have heard the groaning of the Israelites, whom the Egyptians are enslaving, and I have remembered my covenant.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore, say to the Israelites: ‘I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and I will bring you out from under the yoke of the Egyptians. I will free you from being slaves to them, and I will redeem you with an outstretched arm and with mighty acts of judgment. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will take you as my own people, and I will be your God. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, who brought you out from under the yoke of the Egyptians. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will bring you to the land I swore with uplifted hand to give to Abraham, to Isaac and to Jacob. I will give it to you as a possession. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses reported this to the Israelites, but they did not listen to him because of their discouragement and harsh labor.
