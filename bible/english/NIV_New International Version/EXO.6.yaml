    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Now you will see what I will do to Pharaoh: Because of my mighty hand he will let them go; because of my mighty hand he will drive them out of his country.”'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go, tell Pharaoh king of Egypt to let the Israelites go out of his country.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Moses said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “If the Israelites will not listen to me, why would Pharaoh listen to me, since I speak with faltering lips'
