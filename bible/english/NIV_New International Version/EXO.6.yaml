document_id: EXO.6,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Now you will see what I will do to Pharaoh: Because of my mighty hand he will let them go; because of my mighty hand he will drive them out of his country.”'
  '10':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '11':
  - type: text
    content: “Go, tell Pharaoh king of Egypt to let the Israelites go out of his country.”
  '12':
  - type: text
    content: 'But Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “If the Israelites will not listen to me, why would Pharaoh listen to me, since I speak with faltering lips'
  - type: note
    content: Hebrew I am uncircumcised of lips; also in verse 30
  - type: text
    content: ?”
  - type: heading
    content: Family Record of Moses and Aaron
  '13':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses and Aaron about the Israelites and Pharaoh king of Egypt, and he commanded them to bring the Israelites out of Egypt.'
  '14':
  - type: text
    content: These were the heads of their families
  - type: note
    content: The Hebrew for families here and in verse 25 refers to units larger than clans.
  - type: text
    content: ':'
  - type: text
    content: The sons of Reuben the firstborn son of Israel were Hanok and Pallu, Hezron and Karmi. These were the clans of Reuben.
  '15':
  - type: text
    content: The sons of Simeon were Jemuel, Jamin, Ohad, Jakin, Zohar and Shaul the son of a Canaanite woman. These were the clans of Simeon.
  '16':
  - type: text
    content: 'These were the names of the sons of Levi according to their records: Gershon, Kohath and Merari. Levi lived 137 years.'
  '17':
  - type: text
    content: The sons of Gershon, by clans, were Libni and Shimei.
  '18':
  - type: text
    content: The sons of Kohath were Amram, Izhar, Hebron and Uzziel. Kohath lived 133 years.
  '19':
  - type: text
    content: The sons of Merari were Mahli and Mushi.
  - type: text
    content: These were the clans of Levi according to their records.
  '2':
  - type: text
    content: 'God also said to Moses, “I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: Amram married his father’s sister Jochebed, who bore him Aaron and Moses. Amram lived 137 years.
  '21':
  - type: text
    content: The sons of Izhar were Korah, Nepheg and Zikri.
  '22':
  - type: text
    content: The sons of Uzziel were Mishael, Elzaphan and Sithri.
  '23':
  - type: text
    content: Aaron married Elisheba, daughter of Amminadab and sister of Nahshon, and she bore him Nadab and Abihu, Eleazar and Ithamar.
  '24':
  - type: text
    content: 'The sons of Korah were: Assir, Elkanah and Abiasaph. These were the Korahite clans.'
  '25':
  - type: text
    content: Eleazar son of Aaron married one of the daughters of Putiel, and she bore him Phinehas.
  - type: text
    content: These were the heads of the Levite families, clan by clan.
  '26':
  - type: text
    content: 'It was this Aaron and Moses to whom the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Bring the Israelites out of Egypt by their divisions.” '
  '27':
  - type: text
    content: They were the ones who spoke to Pharaoh king of Egypt about bringing the Israelites out of Egypt—this same Moses and Aaron.
  - type: heading
    content: Aaron to Speak for Moses
  '28':
  - type: text
    content: 'Now when the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in Egypt, '
  '29':
  - type: text
    content: 'he said to him, “I am the '
  - type: text
    content: Lord
  - type: text
    content: . Tell Pharaoh king of Egypt everything I tell you.”
  '3':
  - type: text
    content: I appeared to Abraham, to Isaac and to Jacob as God Almighty,
  - type: note
    content: Hebrew El-Shaddai
  - type: text
    content: ' but by my name the '
  - type: text
    content: Lord
  - type: note
    content: See note at 3:15.
  - type: text
    content: ' I did not make myself fully known to them. '
  '30':
  - type: text
    content: 'But Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Since I speak with faltering lips, why would Pharaoh listen to me?”'
  '4':
  - type: text
    content: 'I also established my covenant with them to give them the land of Canaan, where they resided as foreigners. '
  '5':
  - type: text
    content: Moreover, I have heard the groaning of the Israelites, whom the Egyptians are enslaving, and I have remembered my covenant.
  '6':
  - type: text
    content: '“Therefore, say to the Israelites: ‘I am the '
  - type: text
    content: Lord
  - type: text
    content: ', and I will bring you out from under the yoke of the Egyptians. I will free you from being slaves to them, and I will redeem you with an outstretched arm and with mighty acts of judgment. '
  '7':
  - type: text
    content: 'I will take you as my own people, and I will be your God. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who brought you out from under the yoke of the Egyptians. '
  '8':
  - type: text
    content: 'And I will bring you to the land I swore with uplifted hand to give to Abraham, to Isaac and to Jacob. I will give it to you as a possession. I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '9':
  - type: text
    content: Moses reported this to the Israelites, but they did not listen to him because of their discouragement and harsh labor.
