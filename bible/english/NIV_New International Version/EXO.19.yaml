document_id: EXO.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: At Mount Sinai
  - type: text
    content: 'On the first day of the third month after the Israelites left Egypt—on that very day—they came to the Desert of Sinai. '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go to the people and consecrate them today and tomorrow. Have them wash their clothes '
  '11':
  - type: text
    content: 'and be ready by the third day, because on that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will come down on Mount Sinai in the sight of all the people. '
  '12':
  - type: text
    content: 'Put limits for the people around the mountain and tell them, ‘Be careful that you do not approach the mountain or touch the foot of it. Whoever touches the mountain is to be put to death. '
  '13':
  - type: text
    content: They are to be stoned or shot with arrows; not a hand is to be laid on them. No person or animal shall be permitted to live.’ Only when the ram’s horn sounds a long blast may they approach the mountain.”
  '14':
  - type: text
    content: 'After Moses had gone down the mountain to the people, he consecrated them, and they washed their clothes. '
  '15':
  - type: text
    content: Then he said to the people, “Prepare yourselves for the third day. Abstain from sexual relations.”
  '16':
  - type: text
    content: 'On the morning of the third day there was thunder and lightning, with a thick cloud over the mountain, and a very loud trumpet blast. Everyone in the camp trembled. '
  '17':
  - type: text
    content: 'Then Moses led the people out of the camp to meet with God, and they stood at the foot of the mountain. '
  '18':
  - type: text
    content: 'Mount Sinai was covered with smoke, because the '
  - type: text
    content: Lord
  - type: text
    content: ' descended on it in fire. The smoke billowed up from it like smoke from a furnace, and the whole mountain'
  - type: note
    content: Most Hebrew manuscripts; a few Hebrew manuscripts and Septuagint and all the people
  - type: text
    content: ' trembled violently. '
  '19':
  - type: text
    content: As the sound of the trumpet grew louder and louder, Moses spoke and the voice of God answered him.
  - type: note
    content: Or and God answered him with thunder
  '2':
  - type: text
    content: After they set out from Rephidim, they entered the Desert of Sinai, and Israel camped there in the desert in front of the mountain.
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' descended to the top of Mount Sinai and called Moses to the top of the mountain. So Moses went up '
  '21':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Go down and warn the people so they do not force their way through to see the '
  - type: text
    content: Lord
  - type: text
    content: ' and many of them perish. '
  '22':
  - type: text
    content: 'Even the priests, who approach the '
  - type: text
    content: Lord
  - type: text
    content: ', must consecrate themselves, or the '
  - type: text
    content: Lord
  - type: text
    content: ' will break out against them.”'
  '23':
  - type: text
    content: 'Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “The people cannot come up Mount Sinai, because you yourself warned us, ‘Put limits around the mountain and set it apart as holy.’ ”'
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Go down and bring Aaron up with you. But the priests and the people must not force their way through to come up to the '
  - type: text
    content: Lord
  - type: text
    content: ', or he will break out against them.”'
  '25':
  - type: text
    content: So Moses went down to the people and told them.
  '3':
  - type: text
    content: 'Then Moses went up to God, and the '
  - type: text
    content: Lord
  - type: text
    content: ' called to him from the mountain and said, “This is what you are to say to the descendants of Jacob and what you are to tell the people of Israel: '
  '4':
  - type: text
    content: '‘You yourselves have seen what I did to Egypt, and how I carried you on eagles’ wings and brought you to myself. '
  '5':
  - type: text
    content: 'Now if you obey me fully and keep my covenant, then out of all nations you will be my treasured possession. Although the whole earth is mine, '
  '6':
  - type: text
    content: you
  - type: note
    content: Or possession, for the whole earth is mine. 6 You
  - type: text
    content: ' will be for me a kingdom of priests and a holy nation.’ These are the words you are to speak to the Israelites.”'
  '7':
  - type: text
    content: 'So Moses went back and summoned the elders of the people and set before them all the words the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him to speak. '
  '8':
  - type: text
    content: 'The people all responded together, “We will do everything the '
  - type: text
    content: Lord
  - type: text
    content: ' has said.” So Moses brought their answer back to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “I am going to come to you in a dense cloud, so that the people will hear me speaking with you and will always put their trust in you.” Then Moses told the '
  - type: text
    content: Lord
  - type: text
    content: ' what the people had said.'
