document_id: JOB.42,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job
  - type: text
    content: 'Then Job replied to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  '10':
  - type: text
    content: 'After Job had prayed for his friends, the '
  - type: text
    content: Lord
  - type: text
    content: ' restored his fortunes and gave him twice as much as he had before. '
  '11':
  - type: text
    content: 'All his brothers and sisters and everyone who had known him before came and ate with him in his house. They comforted and consoled him over all the trouble the '
  - type: text
    content: Lord
  - type: text
    content: ' had brought on him, and each one gave him a piece of silver'
  - type: note
    content: Hebrew him a kesitah; a kesitah was a unit of money of unknown weight and value.
  - type: text
    content: ' and a gold ring.'
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' blessed the latter part of Job’s life more than the former part. He had fourteen thousand sheep, six thousand camels, a thousand yoke of oxen and a thousand donkeys. '
  '13':
  - type: text
    content: 'And he also had seven sons and three daughters. '
  '14':
  - type: text
    content: 'The first daughter he named Jemimah, the second Keziah and the third Keren-Happuch. '
  '15':
  - type: text
    content: Nowhere in all the land were there found women as beautiful as Job’s daughters, and their father granted them an inheritance along with their brothers.
  '16':
  - type: text
    content: 'After this, Job lived a hundred and forty years; he saw his children and their children to the fourth generation. '
  '17':
  - type: text
    content: And so Job died, an old man and full of years.
  '2':
  - type: text
    content: “I know that you can do all things;
  - type: text
    content: no purpose of yours can be thwarted.
  '3':
  - type: text
    content: You asked, ‘Who is this that obscures my plans without knowledge?’
  - type: text
    content: Surely I spoke of things I did not understand,
  - type: text
    content: things too wonderful for me to know.
  '4':
  - type: text
    content: “You said, ‘Listen now, and I will speak;
  - type: text
    content: I will question you,
  - type: text
    content: and you shall answer me.’
  '5':
  - type: text
    content: My ears had heard of you
  - type: text
    content: but now my eyes have seen you.
  '6':
  - type: text
    content: Therefore I despise myself
  - type: text
    content: and repent in dust and ashes.”
  - type: heading
    content: Epilogue
  '7':
  - type: text
    content: 'After the '
  - type: text
    content: Lord
  - type: text
    content: ' had said these things to Job, he said to Eliphaz the Temanite, “I am angry with you and your two friends, because you have not spoken the truth about me, as my servant Job has. '
  '8':
  - type: text
    content: 'So now take seven bulls and seven rams and go to my servant Job and sacrifice a burnt offering for yourselves. My servant Job will pray for you, and I will accept his prayer and not deal with you according to your folly. You have not spoken the truth about me, as my servant Job has.” '
  '9':
  - type: text
    content: 'So Eliphaz the Temanite, Bildad the Shuhite and Zophar the Naamathite did what the '
  - type: text
    content: Lord
  - type: text
    content: ' told them; and the '
  - type: text
    content: Lord
  - type: text
    content: ' accepted Job’s prayer.'
