document_id: PSA.136,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 136
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good.'
  - type: text
    content: His love endures forever.
  '10':
  - type: text
    content: to him who struck down the firstborn of Egypt
  - type: text
    content: His love endures forever.
  '11':
  - type: text
    content: and brought Israel out from among them
  - type: text
    content: His love endures forever.
  '12':
  - type: text
    content: with a mighty hand and outstretched arm;
  - type: text
    content: His love endures forever.
  '13':
  - type: text
    content: to him who divided the Red Sea
  - type: note
    content: Or the Sea of Reeds; also in verse 15
  - type: text
    content: ' asunder'
  - type: text
    content: His love endures forever.
  '14':
  - type: text
    content: and brought Israel through the midst of it,
  - type: text
    content: His love endures forever.
  '15':
  - type: text
    content: but swept Pharaoh and his army into the Red Sea;
  - type: text
    content: His love endures forever.
  '16':
  - type: text
    content: to him who led his people through the wilderness;
  - type: text
    content: His love endures forever.
  '17':
  - type: text
    content: to him who struck down great kings,
  - type: text
    content: His love endures forever.
  '18':
  - type: text
    content: and killed mighty kings—
  - type: text
    content: His love endures forever.
  '19':
  - type: text
    content: Sihon king of the Amorites
  - type: text
    content: His love endures forever.
  '2':
  - type: text
    content: Give thanks to the God of gods.
  - type: text
    content: His love endures forever.
  '20':
  - type: text
    content: and Og king of Bashan—
  - type: text
    content: His love endures forever.
  '21':
  - type: text
    content: and gave their land as an inheritance,
  - type: text
    content: His love endures forever.
  '22':
  - type: text
    content: an inheritance to his servant Israel.
  - type: text
    content: His love endures forever.
  '23':
  - type: text
    content: He remembered us in our low estate
  - type: text
    content: His love endures forever.
  '24':
  - type: text
    content: and freed us from our enemies.
  - type: text
    content: His love endures forever.
  '25':
  - type: text
    content: He gives food to every creature.
  - type: text
    content: His love endures forever.
  '26':
  - type: text
    content: Give thanks to the God of heaven.
  - type: text
    content: His love endures forever.
  '3':
  - type: text
    content: 'Give thanks to the Lord of lords:'
  - type: text
    content: His love endures forever.
  '4':
  - type: text
    content: to him who alone does great wonders,
  - type: text
    content: His love endures forever.
  '5':
  - type: text
    content: who by his understanding made the heavens,
  - type: text
    content: His love endures forever.
  '6':
  - type: text
    content: who spread out the earth upon the waters,
  - type: text
    content: His love endures forever.
  '7':
  - type: text
    content: who made the great lights—
  - type: text
    content: His love endures forever.
  '8':
  - type: text
    content: the sun to govern the day,
  - type: text
    content: His love endures forever.
  '9':
  - type: text
    content: the moon and stars to govern the night;
  - type: text
    content: His love endures forever.
