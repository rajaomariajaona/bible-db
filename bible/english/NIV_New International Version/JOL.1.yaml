document_id: JOL.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that came to Joel son of Pethuel.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An Invasion of Locusts
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The fields are ruined,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the ground is dried up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the grain is destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the new wine is dried up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the olive oil fails.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Despair, you farmers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wail, you vine growers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: grieve for the wheat and the barley,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because the harvest of the field is destroyed.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The vine is dried up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fig tree is withered;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the pomegranate, the palm and the apple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or possibly '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: apricot
      marker-yv: yv-n
    - type: text
      text: ' tree—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the trees of the field—are dried up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely the people’s joy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is withered away.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Call to Lamentation
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Put on sackcloth, you priests, and mourn;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wail, you who minister before the altar.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come, spend the night in sackcloth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who minister before my God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the grain offerings and drink offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are withheld from the house of your God.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Declare a holy fast;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: call a sacred assembly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Summon the elders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all who live in the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'to the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and cry out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Alas for that day!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is near;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will come like destruction from the Almighty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shaddai
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Has not the food been cut off
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before our very eyes—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: joy and gladness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the house of our God?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The seeds are shriveled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: beneath the clods.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The storehouses are in ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the granaries have been broken down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the grain has dried up.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: How the cattle moan!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The herds mill about
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they have no pasture;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even the flocks of sheep are suffering.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'To you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I call,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for fire has devoured the pastures in the wilderness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and flames have burned up all the trees of the field.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hear this, you elders;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen, all who live in the land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has anything like this ever happened in your days
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or in the days of your ancestors?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Even the wild animals pant for you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the streams of water have dried up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fire has devoured the pastures in the wilderness.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tell it to your children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let your children tell it to their children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their children to the next generation.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: What the locust swarm has left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the great locusts have eaten;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what the great locusts have left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the young locusts have eaten;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what the young locusts have left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: other locusts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The precise meaning of the four Hebrew words used here for locusts is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' have eaten.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Wake up, you drunkards, and weep!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wail, all you drinkers of wine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: wail because of the new wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it has been snatched from your lips.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: A nation has invaded my land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a mighty army without number;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it has the teeth of a lion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fangs of a lioness.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: It has laid waste my vines
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ruined my fig trees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It has stripped off their bark
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thrown it away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving their branches white.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mourn like a virgin in sackcloth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grieving for the betrothed of her youth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Grain offerings and drink offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'are cut off from the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The priests are in mourning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'those who minister before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
