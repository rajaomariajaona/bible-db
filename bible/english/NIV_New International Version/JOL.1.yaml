document_id: JOL.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Joel son of Pethuel.'
  - type: heading
    content: An Invasion of Locusts
  '10':
  - type: text
    content: The fields are ruined,
  - type: text
    content: the ground is dried up;
  - type: text
    content: the grain is destroyed,
  - type: text
    content: the new wine is dried up,
  - type: text
    content: the olive oil fails.
  '11':
  - type: text
    content: Despair, you farmers,
  - type: text
    content: wail, you vine growers;
  - type: text
    content: grieve for the wheat and the barley,
  - type: text
    content: because the harvest of the field is destroyed.
  '12':
  - type: text
    content: The vine is dried up
  - type: text
    content: and the fig tree is withered;
  - type: text
    content: the pomegranate, the palm and the apple
  - type: note
    content: Or possibly apricot
  - type: text
    content: ' tree—'
  - type: text
    content: all the trees of the field—are dried up.
  - type: text
    content: Surely the people’s joy
  - type: text
    content: is withered away.
  - type: heading
    content: A Call to Lamentation
  '13':
  - type: text
    content: Put on sackcloth, you priests, and mourn;
  - type: text
    content: wail, you who minister before the altar.
  - type: text
    content: Come, spend the night in sackcloth,
  - type: text
    content: you who minister before my God;
  - type: text
    content: for the grain offerings and drink offerings
  - type: text
    content: are withheld from the house of your God.
  '14':
  - type: text
    content: Declare a holy fast;
  - type: text
    content: call a sacred assembly.
  - type: text
    content: Summon the elders
  - type: text
    content: and all who live in the land
  - type: text
    content: 'to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: 'and cry out to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: Alas for that day!
  - type: text
    content: 'For the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near;'
  - type: text
    content: it will come like destruction from the Almighty.
  - type: note
    content: Hebrew Shaddai
  '16':
  - type: text
    content: Has not the food been cut off
  - type: text
    content: before our very eyes—
  - type: text
    content: joy and gladness
  - type: text
    content: from the house of our God?
  '17':
  - type: text
    content: The seeds are shriveled
  - type: text
    content: beneath the clods.
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: The storehouses are in ruins,
  - type: text
    content: the granaries have been broken down,
  - type: text
    content: for the grain has dried up.
  '18':
  - type: text
    content: How the cattle moan!
  - type: text
    content: The herds mill about
  - type: text
    content: because they have no pasture;
  - type: text
    content: even the flocks of sheep are suffering.
  '19':
  - type: text
    content: 'To you, '
  - type: text
    content: Lord
  - type: text
    content: ', I call,'
  - type: text
    content: for fire has devoured the pastures in the wilderness
  - type: text
    content: and flames have burned up all the trees of the field.
  '2':
  - type: text
    content: Hear this, you elders;
  - type: text
    content: listen, all who live in the land.
  - type: text
    content: Has anything like this ever happened in your days
  - type: text
    content: or in the days of your ancestors?
  '20':
  - type: text
    content: Even the wild animals pant for you;
  - type: text
    content: the streams of water have dried up
  - type: text
    content: and fire has devoured the pastures in the wilderness.
  '3':
  - type: text
    content: Tell it to your children,
  - type: text
    content: and let your children tell it to their children,
  - type: text
    content: and their children to the next generation.
  '4':
  - type: text
    content: What the locust swarm has left
  - type: text
    content: the great locusts have eaten;
  - type: text
    content: what the great locusts have left
  - type: text
    content: the young locusts have eaten;
  - type: text
    content: what the young locusts have left
  - type: text
    content: other locusts
  - type: note
    content: The precise meaning of the four Hebrew words used here for locusts is uncertain.
  - type: text
    content: ' have eaten.'
  '5':
  - type: text
    content: Wake up, you drunkards, and weep!
  - type: text
    content: Wail, all you drinkers of wine;
  - type: text
    content: wail because of the new wine,
  - type: text
    content: for it has been snatched from your lips.
  '6':
  - type: text
    content: A nation has invaded my land,
  - type: text
    content: a mighty army without number;
  - type: text
    content: it has the teeth of a lion,
  - type: text
    content: the fangs of a lioness.
  '7':
  - type: text
    content: It has laid waste my vines
  - type: text
    content: and ruined my fig trees.
  - type: text
    content: It has stripped off their bark
  - type: text
    content: and thrown it away,
  - type: text
    content: leaving their branches white.
  '8':
  - type: text
    content: Mourn like a virgin in sackcloth
  - type: text
    content: grieving for the betrothed of her youth.
  '9':
  - type: text
    content: Grain offerings and drink offerings
  - type: text
    content: 'are cut off from the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: The priests are in mourning,
  - type: text
    content: 'those who minister before the '
  - type: text
    content: Lord
  - type: text
    content: .
