document_id: LUK.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Sends Out the Seventy-Two
  - type: text
    content: After this the Lord appointed seventy-two
  - type: note
    content: Some manuscripts seventy; also in verse 17
  - type: text
    content: ' others and sent them two by two ahead of him to every town and place where he was about to go. '
  '10':
  - type: text
    content: But when you enter a town and are not welcomed, go into its streets and say,
  - type: text
    content: ' '
  '11':
  - type: text
    content: '‘Even the dust of your town we wipe from our feet as a warning to you. Yet be sure of this: The kingdom of God has come near.’'
  - type: text
    content: ' '
  '12':
  - type: text
    content: I tell you, it will be more bearable on that day for Sodom than for that town.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “Woe to you, Chorazin! Woe to you, Bethsaida! For if the miracles that were performed in you had been performed in Tyre and Sidon, they would have repented long ago, sitting in sackcloth and ashes.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But it will be more bearable for Tyre and Sidon at the judgment than for you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And you, Capernaum, will you be lifted to the heavens? No, you will go down to Hades.
  - type: note
    content: That is, the realm of the dead
  '16':
  - type: text
    content: ' '
  - type: text
    content: “Whoever listens to you listens to me; whoever rejects you rejects me; but whoever rejects me rejects him who sent me.”
  '17':
  - type: text
    content: The seventy-two returned with joy and said, “Lord, even the demons submit to us in your name.”
  '18':
  - type: text
    content: 'He replied, '
  - type: text
    content: “I saw Satan fall like lightning from heaven.
  - type: text
    content: ' '
  '19':
  - type: text
    content: I have given you authority to trample on snakes and scorpions and to overcome all the power of the enemy; nothing will harm you.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He told them, '
  - type: text
    content: “The harvest is plentiful, but the workers are few. Ask the Lord of the harvest, therefore, to send out workers into his harvest field.
  - type: text
    content: ' '
  '20':
  - type: text
    content: However, do not rejoice that the spirits submit to you, but rejoice that your names are written in heaven.”
  '21':
  - type: text
    content: 'At that time Jesus, full of joy through the Holy Spirit, said, '
  - type: text
    content: “I praise you, Father, Lord of heaven and earth, because you have hidden these things from the wise and learned, and revealed them to little children. Yes, Father, for this is what you were pleased to do.
  '22':
  - type: text
    content: ' '
  - type: text
    content: “All things have been committed to me by my Father. No one knows who the Son is except the Father, and no one knows who the Father is except the Son and those to whom the Son chooses to reveal him.”
  '23':
  - type: text
    content: 'Then he turned to his disciples and said privately, '
  - type: text
    content: “Blessed are the eyes that see what you see.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For I tell you that many prophets and kings wanted to see what you see but did not see it, and to hear what you hear but did not hear it.”
  - type: heading
    content: The Parable of the Good Samaritan
  '25':
  - type: text
    content: On one occasion an expert in the law stood up to test Jesus. “Teacher,” he asked, “what must I do to inherit eternal life?”
  '26':
  - type: text
    content: ' '
  - type: text
    content: “What is written in the Law?”
  - type: text
    content: ' he replied. '
  - type: text
    content: “How do you read it?”
  '27':
  - type: text
    content: He answered, “ ‘Love the Lord your God with all your heart and with all your soul and with all your strength and with all your mind’
  - type: note
    content: Deut. 6:5
  - type: text
    content: ; and, ‘Love your neighbor as yourself.’
  - type: note
    content: Lev. 19:18
  - type: text
    content: ”
  '28':
  - type: text
    content: ' '
  - type: text
    content: “You have answered correctly,”
  - type: text
    content: ' Jesus replied. '
  - type: text
    content: “Do this and you will live.”
  '29':
  - type: text
    content: But he wanted to justify himself, so he asked Jesus, “And who is my neighbor?”
  '3':
  - type: text
    content: Go! I am sending you out like lambs among wolves.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'In reply Jesus said: '
  - type: text
    content: “A man was going down from Jerusalem to Jericho, when he was attacked by robbers. They stripped him of his clothes, beat him and went away, leaving him half dead.
  - type: text
    content: ' '
  '31':
  - type: text
    content: A priest happened to be going down the same road, and when he saw the man, he passed by on the other side.
  - type: text
    content: ' '
  '32':
  - type: text
    content: So too, a Levite, when he came to the place and saw him, passed by on the other side.
  - type: text
    content: ' '
  '33':
  - type: text
    content: But a Samaritan, as he traveled, came where the man was; and when he saw him, he took pity on him.
  - type: text
    content: ' '
  '34':
  - type: text
    content: He went to him and bandaged his wounds, pouring on oil and wine. Then he put the man on his own donkey, brought him to an inn and took care of him.
  - type: text
    content: ' '
  '35':
  - type: text
    content: The next day he took out two denarii
  - type: note
    content: A denarius was the usual daily wage of a day laborer (see Matt. 20:2).
  - type: text
    content: ' '
  - type: text
    content: and gave them to the innkeeper. ‘Look after him,’ he said, ‘and when I return, I will reimburse you for any extra expense you may have.’
  '36':
  - type: text
    content: ' '
  - type: text
    content: “Which of these three do you think was a neighbor to the man who fell into the hands of robbers?”
  '37':
  - type: text
    content: The expert in the law replied, “The one who had mercy on him.”
  - type: text
    content: 'Jesus told him, '
  - type: text
    content: “Go and do likewise.”
  - type: heading
    content: At the Home of Martha and Mary
  '38':
  - type: text
    content: 'As Jesus and his disciples were on their way, he came to a village where a woman named Martha opened her home to him. '
  '39':
  - type: text
    content: 'She had a sister called Mary, who sat at the Lord’s feet listening to what he said. '
  '4':
  - type: text
    content: Do not take a purse or bag or sandals; and do not greet anyone on the road.
  '40':
  - type: text
    content: But Martha was distracted by all the preparations that had to be made. She came to him and asked, “Lord, don’t you care that my sister has left me to do the work by myself? Tell her to help me!”
  '41':
  - type: text
    content: ' '
  - type: text
    content: “Martha, Martha,”
  - type: text
    content: ' the Lord answered, '
  - type: text
    content: “you are worried and upset about many things,
  - type: text
    content: ' '
  '42':
  - type: text
    content: but few things are needed—or indeed only one.
  - type: note
    content: Some manuscripts but only one thing is needed
  - type: text
    content: ' '
  - type: text
    content: Mary has chosen what is better, and it will not be taken away from her.”
  '5':
  - type: text
    content: ' '
  - type: text
    content: “When you enter a house, first say, ‘Peace to this house.’
  - type: text
    content: ' '
  '6':
  - type: text
    content: If someone who promotes peace is there, your peace will rest on them; if not, it will return to you.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Stay there, eating and drinking whatever they give you, for the worker deserves his wages. Do not move around from house to house.
  '8':
  - type: text
    content: ' '
  - type: text
    content: “When you enter a town and are welcomed, eat what is offered to you.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Heal the sick who are there and tell them, ‘The kingdom of God has come near to you.’
  - type: text
    content: ' '
