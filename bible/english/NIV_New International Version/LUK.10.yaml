document_id: LUK.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Sends Out the Seventy-Two
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: After this the Lord appointed seventy-two
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seventy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 17
      marker-yv: yv-n
    - type: text
      text: ' others and sent them two by two ahead of him to every town and place where he was about to go. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when you enter a town and are not welcomed, go into its streets and say,
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '‘Even the dust of your town we wipe from our feet as a warning to you. Yet be sure of this: The kingdom of God has come near.’'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, it will be more bearable on that day for Sodom than for that town.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Woe to you, Chorazin! Woe to you, Bethsaida! For if the miracles that were performed in you had been performed in Tyre and Sidon, they would have repented long ago, sitting in sackcloth and ashes.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But it will be more bearable for Tyre and Sidon at the judgment than for you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And you, Capernaum, will you be lifted to the heavens? No, you will go down to Hades.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the realm of the dead
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whoever listens to you listens to me; whoever rejects you rejects me; but whoever rejects me rejects him who sent me.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The seventy-two returned with joy and said, “Lord, even the demons submit to us in your name.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I saw Satan fall like lightning from heaven.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have given you authority to trample on snakes and scorpions and to overcome all the power of the enemy; nothing will harm you.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The harvest is plentiful, but the workers are few. Ask the Lord of the harvest, therefore, to send out workers into his harvest field.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: However, do not rejoice that the spirits submit to you, but rejoice that your names are written in heaven.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Jesus, full of joy through the Holy Spirit, said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I praise you, Father, Lord of heaven and earth, because you have hidden these things from the wise and learned, and revealed them to little children. Yes, Father, for this is what you were pleased to do.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “All things have been committed to me by my Father. No one knows who the Son is except the Father, and no one knows who the Father is except the Son and those to whom the Son chooses to reveal him.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he turned to his disciples and said privately, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Blessed are the eyes that see what you see.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I tell you that many prophets and kings wanted to see what you see but did not see it, and to hear what you hear but did not hear it.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parable of the Good Samaritan
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On one occasion an expert in the law stood up to test Jesus. “Teacher,” he asked, “what must I do to inherit eternal life?”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What is written in the Law?”
    - type: text
      text: ' he replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How do you read it?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He answered, “ ‘Love the Lord your God with all your heart and with all your soul and with all your strength and with all your mind’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 6:5
      marker-yv: yv-n
    - type: text
      text: ; and, ‘Love your neighbor as yourself.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lev. 19:18
      marker-yv: yv-n
    - type: text
      text: ”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have answered correctly,”
    - type: text
      text: ' Jesus replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do this and you will live.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he wanted to justify himself, so he asked Jesus, “And who is my neighbor?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Go! I am sending you out like lambs among wolves.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In reply Jesus said: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A man was going down from Jerusalem to Jericho, when he was attacked by robbers. They stripped him of his clothes, beat him and went away, leaving him half dead.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A priest happened to be going down the same road, and when he saw the man, he passed by on the other side.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So too, a Levite, when he came to the place and saw him, passed by on the other side.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But a Samaritan, as he traveled, came where the man was; and when he saw him, he took pity on him.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He went to him and bandaged his wounds, pouring on oil and wine. Then he put the man on his own donkey, brought him to an inn and took care of him.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The next day he took out two denarii
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A denarius was the usual daily wage of a day laborer (see Matt. 20:2).
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and gave them to the innkeeper. ‘Look after him,’ he said, ‘and when I return, I will reimburse you for any extra expense you may have.’
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Which of these three do you think was a neighbor to the man who fell into the hands of robbers?”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The expert in the law replied, “The one who had mercy on him.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go and do likewise.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: At the Home of Martha and Mary
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus and his disciples were on their way, he came to a village where a woman named Martha opened her home to him. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She had a sister called Mary, who sat at the Lord’s feet listening to what he said. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do not take a purse or bag or sandals; and do not greet anyone on the road.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Martha was distracted by all the preparations that had to be made. She came to him and asked, “Lord, don’t you care that my sister has left me to do the work by myself? Tell her to help me!”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Martha, Martha,”
    - type: text
      text: ' the Lord answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “you are worried and upset about many things,
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but few things are needed—or indeed only one.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: but only one thing is needed
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mary has chosen what is better, and it will not be taken away from her.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you enter a house, first say, ‘Peace to this house.’
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If someone who promotes peace is there, your peace will rest on them; if not, it will return to you.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Stay there, eating and drinking whatever they give you, for the worker deserves his wages. Do not move around from house to house.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you enter a town and are welcomed, eat what is offered to you.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heal the sick who are there and tell them, ‘The kingdom of God has come near to you.’
    - type: text
      text: ' '
