document_id: MAT.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Workers in the Vineyard
  - type: text
    content: ' '
  - type: text
    content: “For the kingdom of heaven is like a landowner who went out early in the morning to hire workers for his vineyard.
  - type: text
    content: ' '
  '10':
  - type: text
    content: So when those came who were hired first, they expected to receive more. But each one of them also received a denarius.
  - type: text
    content: ' '
  '11':
  - type: text
    content: When they received it, they began to grumble against the landowner.
  - type: text
    content: ' '
  '12':
  - type: text
    content: ‘These who were hired last worked only one hour,’ they said, ‘and you have made them equal to us who have borne the burden of the work and the heat of the day.’
  '13':
  - type: text
    content: ' '
  - type: text
    content: “But he answered one of them, ‘I am not being unfair to you, friend. Didn’t you agree to work for a denarius?
  - type: text
    content: ' '
  '14':
  - type: text
    content: Take your pay and go. I want to give the one who was hired last the same as I gave you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Don’t I have the right to do what I want with my own money? Or are you envious because I am generous?’
  '16':
  - type: text
    content: ' '
  - type: text
    content: “So the last will be first, and the first will be last.”
  - type: heading
    content: Jesus Predicts His Death a Third Time
  '17':
  - type: text
    content: 'Now Jesus was going up to Jerusalem. On the way, he took the Twelve aside and said to them, '
  '18':
  - type: text
    content: “We are going up to Jerusalem, and the Son of Man will be delivered over to the chief priests and the teachers of the law. They will condemn him to death
  - type: text
    content: ' '
  '19':
  - type: text
    content: and will hand him over to the Gentiles to be mocked and flogged and crucified. On the third day he will be raised to life!”
  - type: heading
    content: A Mother’s Request
  '2':
  - type: text
    content: He agreed to pay them a denarius
  - type: note
    content: A denarius was the usual daily wage of a day laborer.
  - type: text
    content: ' '
  - type: text
    content: for the day and sent them into his vineyard.
  '20':
  - type: text
    content: Then the mother of Zebedee’s sons came to Jesus with her sons and, kneeling down, asked a favor of him.
  '21':
  - type: text
    content: ' '
  - type: text
    content: “What is it you want?”
  - type: text
    content: ' he asked.'
  - type: text
    content: She said, “Grant that one of these two sons of mine may sit at your right and the other at your left in your kingdom.”
  '22':
  - type: text
    content: ' '
  - type: text
    content: “You don’t know what you are asking,”
  - type: text
    content: ' Jesus said to them. '
  - type: text
    content: “Can you drink the cup I am going to drink?”
  - type: text
    content: “We can,” they answered.
  '23':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “You will indeed drink from my cup, but to sit at my right or left is not for me to grant. These places belong to those for whom they have been prepared by my Father.”
  '24':
  - type: text
    content: 'When the ten heard about this, they were indignant with the two brothers. '
  '25':
  - type: text
    content: 'Jesus called them together and said, '
  - type: text
    content: “You know that the rulers of the Gentiles lord it over them, and their high officials exercise authority over them.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Not so with you. Instead, whoever wants to become great among you must be your servant,
  - type: text
    content: ' '
  '27':
  - type: text
    content: and whoever wants to be first must be your slave—
  - type: text
    content: ' '
  '28':
  - type: text
    content: just as the Son of Man did not come to be served, but to serve, and to give his life as a ransom for many.”
  - type: heading
    content: Two Blind Men Receive Sight
  '29':
  - type: text
    content: 'As Jesus and his disciples were leaving Jericho, a large crowd followed him. '
  '3':
  - type: text
    content: ' '
  - type: text
    content: “About nine in the morning he went out and saw others standing in the marketplace doing nothing.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Two blind men were sitting by the roadside, and when they heard that Jesus was going by, they shouted, “Lord, Son of David, have mercy on us!”
  '31':
  - type: text
    content: The crowd rebuked them and told them to be quiet, but they shouted all the louder, “Lord, Son of David, have mercy on us!”
  '32':
  - type: text
    content: 'Jesus stopped and called them. '
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: ' he asked.'
  '33':
  - type: text
    content: “Lord,” they answered, “we want our sight.”
  '34':
  - type: text
    content: Jesus had compassion on them and touched their eyes. Immediately they received their sight and followed him.
  '4':
  - type: text
    content: He told them, ‘You also go and work in my vineyard, and I will pay you whatever is right.’
  - type: text
    content: ' '
  '5':
  - type: text
    content: So they went.
  - type: text
    content: “He went out again about noon and about three in the afternoon and did the same thing.
  - type: text
    content: ' '
  '6':
  - type: text
    content: About five in the afternoon he went out and found still others standing around. He asked them, ‘Why have you been standing here all day long doing nothing?’
  '7':
  - type: text
    content: ' '
  - type: text
    content: “ ‘Because no one has hired us,’ they answered.
  - type: text
    content: “He said to them, ‘You also go and work in my vineyard.’
  '8':
  - type: text
    content: ' '
  - type: text
    content: “When evening came, the owner of the vineyard said to his foreman, ‘Call the workers and pay them their wages, beginning with the last ones hired and going on to the first.’
  '9':
  - type: text
    content: ' '
  - type: text
    content: “The workers who were hired about five in the afternoon came and each received a denarius.
  - type: text
    content: ' '
