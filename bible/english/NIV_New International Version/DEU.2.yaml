document_id: DEU.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Wanderings in the Wilderness
  - type: text
    content: Then we turned back and set out toward the wilderness along the route to the Red Sea,
  - type: note
    content: Or the Sea of Reeds
  - type: text
    content: ' as the '
  - type: text
    content: Lord
  - type: text
    content: ' had directed me. For a long time we made our way around the hill country of Seir.'
  '10':
  - type: text
    content: '(The Emites used to live there—a people strong and numerous, and as tall as the Anakites. '
  '11':
  - type: text
    content: 'Like the Anakites, they too were considered Rephaites, but the Moabites called them Emites. '
  '12':
  - type: text
    content: 'Horites used to live in Seir, but the descendants of Esau drove them out. They destroyed the Horites from before them and settled in their place, just as Israel did in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them as their possession.)'
  '13':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Now get up and cross the Zered Valley.” So we crossed the valley.'
  '14':
  - type: text
    content: 'Thirty-eight years passed from the time we left Kadesh Barnea until we crossed the Zered Valley. By then, that entire generation of fighting men had perished from the camp, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had sworn to them. '
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s hand was against them until he had completely eliminated them from the camp.
  '16':
  - type: text
    content: 'Now when the last of these fighting men among the people had died, '
  '17':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  '18':
  - type: text
    content: '“Today you are to pass by the region of Moab at Ar. '
  '19':
  - type: text
    content: When you come to the Ammonites, do not harass them or provoke them to war, for I will not give you possession of any land belonging to the Ammonites. I have given it as a possession to the descendants of Lot.”
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, '
  '20':
  - type: text
    content: '(That too was considered a land of the Rephaites, who used to live there; but the Ammonites called them Zamzummites. '
  '21':
  - type: text
    content: 'They were a people strong and numerous, and as tall as the Anakites. The '
  - type: text
    content: Lord
  - type: text
    content: ' destroyed them from before the Ammonites, who drove them out and settled in their place. '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had done the same for the descendants of Esau, who lived in Seir, when he destroyed the Horites from before them. They drove them out and have lived in their place to this day. '
  '23':
  - type: text
    content: And as for the Avvites who lived in villages as far as Gaza, the Caphtorites coming out from Caphtor
  - type: note
    content: That is, Crete
  - type: text
    content: ' destroyed them and settled in their place.)'
  - type: heading
    content: Defeat of Sihon King of Heshbon
  '24':
  - type: text
    content: '“Set out now and cross the Arnon Gorge. See, I have given into your hand Sihon the Amorite, king of Heshbon, and his country. Begin to take possession of it and engage him in battle. '
  '25':
  - type: text
    content: This very day I will begin to put the terror and fear of you on all the nations under heaven. They will hear reports of you and will tremble and be in anguish because of you.”
  '26':
  - type: text
    content: 'From the Desert of Kedemoth I sent messengers to Sihon king of Heshbon offering peace and saying, '
  '27':
  - type: text
    content: '“Let us pass through your country. We will stay on the main road; we will not turn aside to the right or to the left. '
  '28':
  - type: text
    content: 'Sell us food to eat and water to drink for their price in silver. Only let us pass through on foot— '
  '29':
  - type: text
    content: 'as the descendants of Esau, who live in Seir, and the Moabites, who live in Ar, did for us—until we cross the Jordan into the land the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is giving us.” '
  '3':
  - type: text
    content: '“You have made your way around this hill country long enough; now turn north. '
  '30':
  - type: text
    content: 'But Sihon king of Heshbon refused to let us pass through. For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God had made his spirit stubborn and his heart obstinate in order to give him into your hands, as he has now done.'
  '31':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “See, I have begun to deliver Sihon and his country over to you. Now begin to conquer and possess his land.”'
  '32':
  - type: text
    content: 'When Sihon and all his army came out to meet us in battle at Jahaz, '
  '33':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' our God delivered him over to us and we struck him down, together with his sons and his whole army. '
  '34':
  - type: text
    content: At that time we took all his towns and completely destroyed
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' them—men, women and children. We left no survivors. '
  '35':
  - type: text
    content: 'But the livestock and the plunder from the towns we had captured we carried off for ourselves. '
  '36':
  - type: text
    content: 'From Aroer on the rim of the Arnon Gorge, and from the town in the gorge, even as far as Gilead, not one town was too strong for us. The '
  - type: text
    content: Lord
  - type: text
    content: ' our God gave us all of them. '
  '37':
  - type: text
    content: 'But in accordance with the command of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, you did not encroach on any of the land of the Ammonites, neither the land along the course of the Jabbok nor that around the towns in the hills.'
  '4':
  - type: text
    content: 'Give the people these orders: ‘You are about to pass through the territory of your relatives the descendants of Esau, who live in Seir. They will be afraid of you, but be very careful. '
  '5':
  - type: text
    content: 'Do not provoke them to war, for I will not give you any of their land, not even enough to put your foot on. I have given Esau the hill country of Seir as his own. '
  '6':
  - type: text
    content: You are to pay them in silver for the food you eat and the water you drink.’ ”
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God has blessed you in all the work of your hands. He has watched over your journey through this vast wilderness. These forty years the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has been with you, and you have not lacked anything.'
  '8':
  - type: text
    content: So we went on past our relatives the descendants of Esau, who live in Seir. We turned from the Arabah road, which comes up from Elath and Ezion Geber, and traveled along the desert road of Moab.
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Do not harass the Moabites or provoke them to war, for I will not give you any part of their land. I have given Ar to the descendants of Lot as a possession.”'
