document_id: NUM.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Water From the Rock
  - type: text
    content: In the first month the whole Israelite community arrived at the Desert of Zin, and they stayed at Kadesh. There Miriam died and was buried.
  '10':
  - type: text
    content: 'He and Aaron gathered the assembly together in front of the rock and Moses said to them, “Listen, you rebels, must we bring you water out of this rock?” '
  '11':
  - type: text
    content: Then Moses raised his arm and struck the rock twice with his staff. Water gushed out, and the community and their livestock drank.
  '12':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, “Because you did not trust in me enough to honor me as holy in the sight of the Israelites, you will not bring this community into the land I give them.”'
  '13':
  - type: text
    content: These were the waters of Meribah,
  - type: note
    content: Meribah means quarreling.
  - type: text
    content: ' where the Israelites quarreled with the '
  - type: text
    content: Lord
  - type: text
    content: ' and where he was proved holy among them.'
  - type: heading
    content: Edom Denies Israel Passage
  '14':
  - type: text
    content: 'Moses sent messengers from Kadesh to the king of Edom, saying:'
  - type: text
    content: '“This is what your brother Israel says: You know about all the hardships that have come on us. '
  '15':
  - type: text
    content: 'Our ancestors went down into Egypt, and we lived there many years. The Egyptians mistreated us and our ancestors, '
  '16':
  - type: text
    content: 'but when we cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', he heard our cry and sent an angel and brought us out of Egypt.'
  - type: text
    content: '“Now we are here at Kadesh, a town on the edge of your territory. '
  '17':
  - type: text
    content: Please let us pass through your country. We will not go through any field or vineyard, or drink water from any well. We will travel along the King’s Highway and not turn to the right or to the left until we have passed through your territory.”
  '18':
  - type: text
    content: 'But Edom answered:'
  - type: text
    content: “You may not pass through here; if you try, we will march out and attack you with the sword.”
  '19':
  - type: text
    content: 'The Israelites replied:'
  - type: text
    content: “We will go along the main road, and if we or our livestock drink any of your water, we will pay for it. We only want to pass through on foot—nothing else.”
  '2':
  - type: text
    content: 'Now there was no water for the community, and the people gathered in opposition to Moses and Aaron. '
  '20':
  - type: text
    content: 'Again they answered:'
  - type: text
    content: “You may not pass through.”
  - type: text
    content: 'Then Edom came out against them with a large and powerful army. '
  '21':
  - type: text
    content: Since Edom refused to let them go through their territory, Israel turned away from them.
  - type: heading
    content: The Death of Aaron
  '22':
  - type: text
    content: 'The whole Israelite community set out from Kadesh and came to Mount Hor. '
  '23':
  - type: text
    content: 'At Mount Hor, near the border of Edom, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '24':
  - type: text
    content: '“Aaron will be gathered to his people. He will not enter the land I give the Israelites, because both of you rebelled against my command at the waters of Meribah. '
  '25':
  - type: text
    content: 'Get Aaron and his son Eleazar and take them up Mount Hor. '
  '26':
  - type: text
    content: Remove Aaron’s garments and put them on his son Eleazar, for Aaron will be gathered to his people; he will die there.”
  '27':
  - type: text
    content: 'Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded: They went up Mount Hor in the sight of the whole community. '
  '28':
  - type: text
    content: 'Moses removed Aaron’s garments and put them on his son Eleazar. And Aaron died there on top of the mountain. Then Moses and Eleazar came down from the mountain, '
  '29':
  - type: text
    content: and when the whole community learned that Aaron had died, all the Israelites mourned for him thirty days.
  '3':
  - type: text
    content: 'They quarreled with Moses and said, “If only we had died when our brothers fell dead before the '
  - type: text
    content: Lord
  - type: text
    content: '! '
  '4':
  - type: text
    content: 'Why did you bring the '
  - type: text
    content: Lord
  - type: text
    content: '’s community into this wilderness, that we and our livestock should die here? '
  '5':
  - type: text
    content: Why did you bring us up out of Egypt to this terrible place? It has no grain or figs, grapevines or pomegranates. And there is no water to drink!”
  '6':
  - type: text
    content: 'Moses and Aaron went from the assembly to the entrance to the tent of meeting and fell facedown, and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to them. '
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '8':
  - type: text
    content: “Take the staff, and you and your brother Aaron gather the assembly together. Speak to that rock before their eyes and it will pour out its water. You will bring water out of the rock for the community so they and their livestock can drink.”
  '9':
  - type: text
    content: 'So Moses took the staff from the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence, just as he commanded him. '
