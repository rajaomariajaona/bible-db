document_id: PSA.94,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 94
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is a God who avenges.'
  - type: text
    content: O God who avenges, shine forth.
  '10':
  - type: text
    content: Does he who disciplines nations not punish?
  - type: text
    content: Does he who teaches mankind lack knowledge?
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' knows all human plans;'
  - type: text
    content: he knows that they are futile.
  '12':
  - type: text
    content: 'Blessed is the one you discipline, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the one you teach from your law;
  '13':
  - type: text
    content: you grant them relief from days of trouble,
  - type: text
    content: till a pit is dug for the wicked.
  '14':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will not reject his people;'
  - type: text
    content: he will never forsake his inheritance.
  '15':
  - type: text
    content: Judgment will again be founded on righteousness,
  - type: text
    content: and all the upright in heart will follow it.
  '16':
  - type: text
    content: Who will rise up for me against the wicked?
  - type: text
    content: Who will take a stand for me against evildoers?
  '17':
  - type: text
    content: 'Unless the '
  - type: text
    content: Lord
  - type: text
    content: ' had given me help,'
  - type: text
    content: I would soon have dwelt in the silence of death.
  '18':
  - type: text
    content: When I said, “My foot is slipping,”
  - type: text
    content: 'your unfailing love, '
  - type: text
    content: Lord
  - type: text
    content: ', supported me.'
  '19':
  - type: text
    content: When anxiety was great within me,
  - type: text
    content: your consolation brought me joy.
  '2':
  - type: text
    content: Rise up, Judge of the earth;
  - type: text
    content: pay back to the proud what they deserve.
  '20':
  - type: text
    content: Can a corrupt throne be allied with you—
  - type: text
    content: a throne that brings on misery by its decrees?
  '21':
  - type: text
    content: The wicked band together against the righteous
  - type: text
    content: and condemn the innocent to death.
  '22':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' has become my fortress,'
  - type: text
    content: and my God the rock in whom I take refuge.
  '23':
  - type: text
    content: He will repay them for their sins
  - type: text
    content: and destroy them for their wickedness;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' our God will destroy them.'
  '3':
  - type: text
    content: 'How long, '
  - type: text
    content: Lord
  - type: text
    content: ', will the wicked,'
  - type: text
    content: how long will the wicked be jubilant?
  '4':
  - type: text
    content: They pour out arrogant words;
  - type: text
    content: all the evildoers are full of boasting.
  '5':
  - type: text
    content: 'They crush your people, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: they oppress your inheritance.
  '6':
  - type: text
    content: They slay the widow and the foreigner;
  - type: text
    content: they murder the fatherless.
  '7':
  - type: text
    content: 'They say, “The '
  - type: text
    content: Lord
  - type: text
    content: ' does not see;'
  - type: text
    content: the God of Jacob takes no notice.”
  '8':
  - type: text
    content: Take notice, you senseless ones among the people;
  - type: text
    content: you fools, when will you become wise?
  '9':
  - type: text
    content: Does he who fashioned the ear not hear?
  - type: text
    content: Does he who formed the eye not see?
