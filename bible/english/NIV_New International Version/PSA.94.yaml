document_id: PSA.94
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 94
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a God who avenges.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: O God who avenges, shine forth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rise up, Judge of the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay back to the proud what they deserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'How long, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', will the wicked,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: how long will the wicked be jubilant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They pour out arrogant words;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the evildoers are full of boasting.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They crush your people, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they oppress your inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They slay the widow and the foreigner;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they murder the fatherless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They say, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' does not see;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God of Jacob takes no notice.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Take notice, you senseless ones among the people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you fools, when will you become wise?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Does he who fashioned the ear not hear?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does he who formed the eye not see?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Does he who disciplines nations not punish?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does he who teaches mankind lack knowledge?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' knows all human plans;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he knows that they are futile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Blessed is the one you discipline, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the one you teach from your law;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: you grant them relief from days of trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: till a pit is dug for the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will not reject his people;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will never forsake his inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Judgment will again be founded on righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the upright in heart will follow it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Who will rise up for me against the wicked?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will take a stand for me against evildoers?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Unless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given me help,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would soon have dwelt in the silence of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When I said, “My foot is slipping,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'your unfailing love, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', supported me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: When anxiety was great within me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your consolation brought me joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Can a corrupt throne be allied with you—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a throne that brings on misery by its decrees?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The wicked band together against the righteous
- type: usfm
  marker: q2
  children:
  - type: text
    text: and condemn the innocent to death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has become my fortress,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my God the rock in whom I take refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He will repay them for their sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy them for their wickedness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God will destroy them.'
