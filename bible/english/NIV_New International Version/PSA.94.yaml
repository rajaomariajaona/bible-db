document_id: PSA.94,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 94
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a God who avenges.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O God who avenges, shine forth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does he who disciplines nations not punish?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does he who teaches mankind lack knowledge?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' knows all human plans;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he knows that they are futile.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Blessed is the one you discipline, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one you teach from your law;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you grant them relief from days of trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till a pit is dug for the wicked.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not reject his people;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will never forsake his inheritance.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judgment will again be founded on righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the upright in heart will follow it.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will rise up for me against the wicked?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will take a stand for me against evildoers?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given me help,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would soon have dwelt in the silence of death.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I said, “My foot is slipping,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'your unfailing love, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', supported me.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When anxiety was great within me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your consolation brought me joy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rise up, Judge of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pay back to the proud what they deserve.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can a corrupt throne be allied with you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a throne that brings on misery by its decrees?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked band together against the righteous
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and condemn the innocent to death.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has become my fortress,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my God the rock in whom I take refuge.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will repay them for their sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy them for their wickedness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God will destroy them.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How long, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how long will the wicked be jubilant?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They pour out arrogant words;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the evildoers are full of boasting.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They crush your people, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they oppress your inheritance.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They slay the widow and the foreigner;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they murder the fatherless.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They say, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' does not see;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Jacob takes no notice.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take notice, you senseless ones among the people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you fools, when will you become wise?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does he who fashioned the ear not hear?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does he who formed the eye not see?
