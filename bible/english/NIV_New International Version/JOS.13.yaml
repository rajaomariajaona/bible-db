document_id: JOS.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Land Still to Be Taken
  - type: text
    content: 'When Joshua had grown old, the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “You are now very old, and there are still very large areas of land to be taken over.'
  '10':
  - type: text
    content: 'and all the towns of Sihon king of the Amorites, who ruled in Heshbon, out to the border of the Ammonites. '
  '11':
  - type: text
    content: 'It also included Gilead, the territory of the people of Geshur and Maakah, all of Mount Hermon and all Bashan as far as Salekah— '
  '12':
  - type: text
    content: 'that is, the whole kingdom of Og in Bashan, who had reigned in Ashtaroth and Edrei. (He was the last of the Rephaites.) Moses had defeated them and taken over their land. '
  '13':
  - type: text
    content: But the Israelites did not drive out the people of Geshur and Maakah, so they continue to live among the Israelites to this day.
  '14':
  - type: text
    content: 'But to the tribe of Levi he gave no inheritance, since the food offerings presented to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, are their inheritance, as he promised them.'
  '15':
  - type: text
    content: 'This is what Moses had given to the tribe of Reuben, according to its clans:'
  '16':
  - type: text
    content: 'The territory from Aroer on the rim of the Arnon Gorge, and from the town in the middle of the gorge, and the whole plateau past Medeba '
  '17':
  - type: text
    content: 'to Heshbon and all its towns on the plateau, including Dibon, Bamoth Baal, Beth Baal Meon, '
  '18':
  - type: text
    content: 'Jahaz, Kedemoth, Mephaath, '
  '19':
  - type: text
    content: 'Kiriathaim, Sibmah, Zereth Shahar on the hill in the valley, '
  '2':
  - type: text
    content: '“This is the land that remains: All the regions of the Philistines and Geshurites, '
  '20':
  - type: text
    content: 'Beth Peor, the slopes of Pisgah, and Beth Jeshimoth— '
  '21':
  - type: text
    content: 'all the towns on the plateau and the entire realm of Sihon king of the Amorites, who ruled at Heshbon. Moses had defeated him and the Midianite chiefs, Evi, Rekem, Zur, Hur and Reba—princes allied with Sihon—who lived in that country. '
  '22':
  - type: text
    content: 'In addition to those slain in battle, the Israelites had put to the sword Balaam son of Beor, who practiced divination. '
  '23':
  - type: text
    content: The boundary of the Reubenites was the bank of the Jordan. These towns and their villages were the inheritance of the Reubenites, according to their clans.
  '24':
  - type: text
    content: 'This is what Moses had given to the tribe of Gad, according to its clans:'
  '25':
  - type: text
    content: 'The territory of Jazer, all the towns of Gilead and half the Ammonite country as far as Aroer, near Rabbah; '
  '26':
  - type: text
    content: 'and from Heshbon to Ramath Mizpah and Betonim, and from Mahanaim to the territory of Debir; '
  '27':
  - type: text
    content: and in the valley, Beth Haram, Beth Nimrah, Sukkoth and Zaphon with the rest of the realm of Sihon king of Heshbon (the east side of the Jordan, the territory up to the end of the Sea of Galilee
  - type: note
    content: Hebrew Kinnereth
  - type: text
    content: '). '
  '28':
  - type: text
    content: These towns and their villages were the inheritance of the Gadites, according to their clans.
  '29':
  - type: text
    content: 'This is what Moses had given to the half-tribe of Manasseh, that is, to half the family of the descendants of Manasseh, according to its clans:'
  '3':
  - type: text
    content: 'from the Shihor River on the east of Egypt to the territory of Ekron on the north, all of it counted as Canaanite though held by the five Philistine rulers in Gaza, Ashdod, Ashkelon, Gath and Ekron; the territory of the Avvites '
  '30':
  - type: text
    content: 'The territory extending from Mahanaim and including all of Bashan, the entire realm of Og king of Bashan—all the settlements of Jair in Bashan, sixty towns, '
  '31':
  - type: text
    content: half of Gilead, and Ashtaroth and Edrei (the royal cities of Og in Bashan). This was for the descendants of Makir son of Manasseh—for half of the sons of Makir, according to their clans.
  '32':
  - type: text
    content: 'This is the inheritance Moses had given when he was in the plains of Moab across the Jordan east of Jericho. '
  '33':
  - type: text
    content: 'But to the tribe of Levi, Moses had given no inheritance; the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, is their inheritance, as he promised them.'
  '4':
  - type: text
    content: 'on the south; all the land of the Canaanites, from Arah of the Sidonians as far as Aphek and the border of the Amorites; '
  '5':
  - type: text
    content: the area of Byblos; and all Lebanon to the east, from Baal Gad below Mount Hermon to Lebo Hamath.
  '6':
  - type: text
    content: '“As for all the inhabitants of the mountain regions from Lebanon to Misrephoth Maim, that is, all the Sidonians, I myself will drive them out before the Israelites. Be sure to allocate this land to Israel for an inheritance, as I have instructed you, '
  '7':
  - type: text
    content: and divide it as an inheritance among the nine tribes and half of the tribe of Manasseh.”
  - type: heading
    content: Division of the Land East of the Jordan
  '8':
  - type: text
    content: The other half of Manasseh,
  - type: note
    content: Hebrew With it (that is, with the other half of Manasseh)
  - type: text
    content: ' the Reubenites and the Gadites had received the inheritance that Moses had given them east of the Jordan, as he, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', had assigned it to them.'
  '9':
  - type: text
    content: 'It extended from Aroer on the rim of the Arnon Gorge, and from the town in the middle of the gorge, and included the whole plateau of Medeba as far as Dibon, '
