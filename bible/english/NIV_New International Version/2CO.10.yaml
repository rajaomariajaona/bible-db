document_id: 2CO.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Defense of His Ministry
  - type: text
    content: 'By the humility and gentleness of Christ, I appeal to you—I, Paul, who am “timid” when face to face with you, but “bold” toward you when away! '
  '10':
  - type: text
    content: 'For some say, “His letters are weighty and forceful, but in person he is unimpressive and his speaking amounts to nothing.” '
  '11':
  - type: text
    content: Such people should realize that what we are in our letters when we are absent, we will be in our actions when we are present.
  '12':
  - type: text
    content: 'We do not dare to classify or compare ourselves with some who commend themselves. When they measure themselves by themselves and compare themselves with themselves, they are not wise. '
  '13':
  - type: text
    content: 'We, however, will not boast beyond proper limits, but will confine our boasting to the sphere of service God himself has assigned to us, a sphere that also includes you. '
  '14':
  - type: text
    content: 'We are not going too far in our boasting, as would be the case if we had not come to you, for we did get as far as you with the gospel of Christ. '
  '15':
  - type: text
    content: 'Neither do we go beyond our limits by boasting of work done by others. Our hope is that, as your faith continues to grow, our sphere of activity among you will greatly expand, '
  '16':
  - type: text
    content: 'so that we can preach the gospel in the regions beyond you. For we do not want to boast about work already done in someone else’s territory. '
  '17':
  - type: text
    content: But, “Let the one who boasts boast in the Lord.”
  - type: note
    content: Jer. 9:24
  - type: text
    content: ' '
  '18':
  - type: text
    content: For it is not the one who commends himself who is approved, but the one whom the Lord commends.
  '2':
  - type: text
    content: 'I beg you that when I come I may not have to be as bold as I expect to be toward some people who think that we live by the standards of this world. '
  '3':
  - type: text
    content: 'For though we live in the world, we do not wage war as the world does. '
  '4':
  - type: text
    content: 'The weapons we fight with are not the weapons of the world. On the contrary, they have divine power to demolish strongholds. '
  '5':
  - type: text
    content: 'We demolish arguments and every pretension that sets itself up against the knowledge of God, and we take captive every thought to make it obedient to Christ. '
  '6':
  - type: text
    content: And we will be ready to punish every act of disobedience, once your obedience is complete.
  '7':
  - type: text
    content: You are judging by appearances.
  - type: note
    content: Or Look at the obvious facts
  - type: text
    content: ' If anyone is confident that they belong to Christ, they should consider again that we belong to Christ just as much as they do. '
  '8':
  - type: text
    content: 'So even if I boast somewhat freely about the authority the Lord gave us for building you up rather than tearing you down, I will not be ashamed of it. '
  '9':
  - type: text
    content: 'I do not want to seem to be trying to frighten you with my letters. '
