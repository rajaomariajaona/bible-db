document_id: EZK.34,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Will Be Israel’s Shepherd
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am against the shepherds and will hold them accountable for my flock. I will remove them from tending the flock so that the shepherds can no longer feed themselves. I will rescue my flock from their mouths, and it will no longer be food for them.'
  '11':
  - type: text
    content: '“ ‘For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I myself will search for my sheep and look after them. '
  '12':
  - type: text
    content: 'As a shepherd looks after his scattered flock when he is with them, so will I look after my sheep. I will rescue them from all the places where they were scattered on a day of clouds and darkness. '
  '13':
  - type: text
    content: 'I will bring them out from the nations and gather them from the countries, and I will bring them into their own land. I will pasture them on the mountains of Israel, in the ravines and in all the settlements in the land. '
  '14':
  - type: text
    content: 'I will tend them in a good pasture, and the mountain heights of Israel will be their grazing land. There they will lie down in good grazing land, and there they will feed in a rich pasture on the mountains of Israel. '
  '15':
  - type: text
    content: 'I myself will tend my sheep and have them lie down, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: I will search for the lost and bring back the strays. I will bind up the injured and strengthen the weak, but the sleek and the strong I will destroy. I will shepherd the flock with justice.
  '17':
  - type: text
    content: '“ ‘As for you, my flock, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will judge between one sheep and another, and between rams and goats. '
  '18':
  - type: text
    content: 'Is it not enough for you to feed on the good pasture? Must you also trample the rest of your pasture with your feet? Is it not enough for you to drink clear water? Must you also muddy the rest with your feet? '
  '19':
  - type: text
    content: Must my flock feed on what you have trampled and drink what you have muddied with your feet?
  '2':
  - type: text
    content: '“Son of man, prophesy against the shepherds of Israel; prophesy and say to them: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Woe to you shepherds of Israel who only take care of yourselves! Should not shepherds take care of the flock? '
  '20':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to them: See, I myself will judge between the fat sheep and the lean sheep. '
  '21':
  - type: text
    content: 'Because you shove with flank and shoulder, butting all the weak sheep with your horns until you have driven them away, '
  '22':
  - type: text
    content: 'I will save my flock, and they will no longer be plundered. I will judge between one sheep and another. '
  '23':
  - type: text
    content: 'I will place over them one shepherd, my servant David, and he will tend them; he will tend them and be their shepherd. '
  '24':
  - type: text
    content: 'I the '
  - type: text
    content: Lord
  - type: text
    content: ' will be their God, and my servant David will be prince among them. I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken.'
  '25':
  - type: text
    content: '“ ‘I will make a covenant of peace with them and rid the land of savage beasts so that they may live in the wilderness and sleep in the forests in safety. '
  '26':
  - type: text
    content: I will make them and the places surrounding my hill a blessing.
  - type: note
    content: Or I will cause them and the places surrounding my hill to be named in blessings (see Gen. 48:20); or I will cause them and the places surrounding my hill to be seen as blessed
  - type: text
    content: ' I will send down showers in season; there will be showers of blessing. '
  '27':
  - type: text
    content: 'The trees will yield their fruit and the ground will yield its crops; the people will be secure in their land. They will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I break the bars of their yoke and rescue them from the hands of those who enslaved them. '
  '28':
  - type: text
    content: 'They will no longer be plundered by the nations, nor will wild animals devour them. They will live in safety, and no one will make them afraid. '
  '29':
  - type: text
    content: 'I will provide for them a land renowned for its crops, and they will no longer be victims of famine in the land or bear the scorn of the nations. '
  '3':
  - type: text
    content: 'You eat the curds, clothe yourselves with the wool and slaughter the choice animals, but you do not take care of the flock. '
  '30':
  - type: text
    content: 'Then they will know that I, the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, am with them and that they, the Israelites, are my people, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'You are my sheep, the sheep of my pasture, and I am your God, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '4':
  - type: text
    content: 'You have not strengthened the weak or healed the sick or bound up the injured. You have not brought back the strays or searched for the lost. You have ruled them harshly and brutally. '
  '5':
  - type: text
    content: 'So they were scattered because there was no shepherd, and when they were scattered they became food for all the wild animals. '
  '6':
  - type: text
    content: My sheep wandered over all the mountains and on every high hill. They were scattered over the whole earth, and no one searched or looked for them.
  '7':
  - type: text
    content: '“ ‘Therefore, you shepherds, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '8':
  - type: text
    content: 'As surely as I live, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', because my flock lacks a shepherd and so has been plundered and has become food for all the wild animals, and because my shepherds did not search for my flock but cared for themselves rather than for my flock, '
  '9':
  - type: text
    content: 'therefore, you shepherds, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ': '
