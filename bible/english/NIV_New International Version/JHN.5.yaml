document_id: JHN.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Healing at the Pool
  - type: text
    content: 'Some time later, Jesus went up to Jerusalem for one of the Jewish festivals. '
  '10':
  - type: text
    content: and so the Jewish leaders said to the man who had been healed, “It is the Sabbath; the law forbids you to carry your mat.”
  '11':
  - type: text
    content: 'But he replied, “The man who made me well said to me, '
  - type: text
    content: ‘Pick up your mat and walk.’
  - type: text
    content: ' ”'
  '12':
  - type: text
    content: So they asked him, “Who is this fellow who told you to pick it up and walk?”
  '13':
  - type: text
    content: The man who was healed had no idea who it was, for Jesus had slipped away into the crowd that was there.
  '14':
  - type: text
    content: 'Later Jesus found him at the temple and said to him, '
  - type: text
    content: “See, you are well again. Stop sinning or something worse may happen to you.”
  - type: text
    content: ' '
  '15':
  - type: text
    content: The man went away and told the Jewish leaders that it was Jesus who had made him well.
  - type: heading
    content: The Authority of the Son
  '16':
  - type: text
    content: 'So, because Jesus was doing these things on the Sabbath, the Jewish leaders began to persecute him. '
  '17':
  - type: text
    content: 'In his defense Jesus said to them, '
  - type: text
    content: “My Father is always at his work to this very day, and I too am working.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: For this reason they tried all the more to kill him; not only was he breaking the Sabbath, but he was even calling God his own Father, making himself equal with God.
  '19':
  - type: text
    content: 'Jesus gave them this answer: '
  - type: text
    content: “Very truly I tell you, the Son can do nothing by himself; he can do only what he sees his Father doing, because whatever the Father does the Son also does.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Now there is in Jerusalem near the Sheep Gate a pool, which in Aramaic is called Bethesda
  - type: note
    content: Some manuscripts Bethzatha; other manuscripts Bethsaida
  - type: text
    content: ' and which is surrounded by five covered colonnades. '
  '20':
  - type: text
    content: For the Father loves the Son and shows him all he does. Yes, and he will show him even greater works than these, so that you will be amazed.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For just as the Father raises the dead and gives them life, even so the Son gives life to whom he is pleased to give it.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Moreover, the Father judges no one, but has entrusted all judgment to the Son,
  - type: text
    content: ' '
  '23':
  - type: text
    content: that all may honor the Son just as they honor the Father. Whoever does not honor the Son does not honor the Father, who sent him.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Very truly I tell you, whoever hears my word and believes him who sent me has eternal life and will not be judged but has crossed over from death to life.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Very truly I tell you, a time is coming and has now come when the dead will hear the voice of the Son of God and those who hear will live.
  - type: text
    content: ' '
  '26':
  - type: text
    content: For as the Father has life in himself, so he has granted the Son also to have life in himself.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And he has given him authority to judge because he is the Son of Man.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “Do not be amazed at this, for a time is coming when all who are in their graves will hear his voice
  - type: text
    content: ' '
  '29':
  - type: text
    content: and come out—those who have done what is good will rise to live, and those who have done what is evil will rise to be condemned.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Here a great number of disabled people used to lie—the blind, the lame, the paralyzed. '
  '30':
  - type: text
    content: By myself I can do nothing; I judge only as I hear, and my judgment is just, for I seek not to please myself but him who sent me.
  - type: heading
    content: Testimonies About Jesus
  '31':
  - type: text
    content: ' '
  - type: text
    content: “If I testify about myself, my testimony is not true.
  - type: text
    content: ' '
  '32':
  - type: text
    content: There is another who testifies in my favor, and I know that his testimony about me is true.
  '33':
  - type: text
    content: ' '
  - type: text
    content: “You have sent to John and he has testified to the truth.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Not that I accept human testimony; but I mention it that you may be saved.
  - type: text
    content: ' '
  '35':
  - type: text
    content: John was a lamp that burned and gave light, and you chose for a time to enjoy his light.
  '36':
  - type: text
    content: ' '
  - type: text
    content: “I have testimony weightier than that of John. For the works that the Father has given me to finish—the very works that I am doing—testify that the Father has sent me.
  - type: text
    content: ' '
  '37':
  - type: text
    content: And the Father who sent me has himself testified concerning me. You have never heard his voice nor seen his form,
  - type: text
    content: ' '
  '38':
  - type: text
    content: nor does his word dwell in you, for you do not believe the one he sent.
  - type: text
    content: ' '
  '39':
  - type: text
    content: You study
  - type: note
    content: Or 39 Study
  - type: text
    content: ' '
  - type: text
    content: the Scriptures diligently because you think that in them you have eternal life. These are the very Scriptures that testify about me,
  - type: text
    content: ' '
  '4':
  - type: note
    content: Some manuscripts include here, wholly or in part, paralyzed—and they waited for the moving of the waters. 4 From time to time an angel of the Lord would come down and stir up the waters. The first one into the pool after each such disturbance would be cured of whatever disease they had.
  - type: text
    content: ' '
  '40':
  - type: text
    content: yet you refuse to come to me to have life.
  '41':
  - type: text
    content: ' '
  - type: text
    content: “I do not accept glory from human beings,
  - type: text
    content: ' '
  '42':
  - type: text
    content: but I know you. I know that you do not have the love of God in your hearts.
  - type: text
    content: ' '
  '43':
  - type: text
    content: I have come in my Father’s name, and you do not accept me; but if someone else comes in his own name, you will accept him.
  - type: text
    content: ' '
  '44':
  - type: text
    content: How can you believe since you accept glory from one another but do not seek the glory that comes from the only God
  - type: note
    content: Some early manuscripts the Only One
  - type: text
    content: '?'
  '45':
  - type: text
    content: ' '
  - type: text
    content: “But do not think I will accuse you before the Father. Your accuser is Moses, on whom your hopes are set.
  - type: text
    content: ' '
  '46':
  - type: text
    content: If you believed Moses, you would believe me, for he wrote about me.
  - type: text
    content: ' '
  '47':
  - type: text
    content: But since you do not believe what he wrote, how are you going to believe what I say?”
  '5':
  - type: text
    content: 'One who was there had been an invalid for thirty-eight years. '
  '6':
  - type: text
    content: 'When Jesus saw him lying there and learned that he had been in this condition for a long time, he asked him, '
  - type: text
    content: “Do you want to get well?”
  '7':
  - type: text
    content: “Sir,” the invalid replied, “I have no one to help me into the pool when the water is stirred. While I am trying to get in, someone else goes down ahead of me.”
  '8':
  - type: text
    content: 'Then Jesus said to him, '
  - type: text
    content: “Get up! Pick up your mat and walk.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: At once the man was cured; he picked up his mat and walked.
  - type: text
    content: 'The day on which this took place was a Sabbath, '
