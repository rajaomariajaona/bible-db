document_id: JHN.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Healing at the Pool
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some time later, Jesus went up to Jerusalem for one of the Jewish festivals. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and so the Jewish leaders said to the man who had been healed, “It is the Sabbath; the law forbids you to carry your mat.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he replied, “The man who made me well said to me, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Pick up your mat and walk.’
    - type: text
      text: ' ”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they asked him, “Who is this fellow who told you to pick it up and walk?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man who was healed had no idea who it was, for Jesus had slipped away into the crowd that was there.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later Jesus found him at the temple and said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “See, you are well again. Stop sinning or something worse may happen to you.”
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man went away and told the Jewish leaders that it was Jesus who had made him well.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Authority of the Son
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, because Jesus was doing these things on the Sabbath, the Jewish leaders began to persecute him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In his defense Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My Father is always at his work to this very day, and I too am working.”
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For this reason they tried all the more to kill him; not only was he breaking the Sabbath, but he was even calling God his own Father, making himself equal with God.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus gave them this answer: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Very truly I tell you, the Son can do nothing by himself; he can do only what he sees his Father doing, because whatever the Father does the Son also does.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now there is in Jerusalem near the Sheep Gate a pool, which in Aramaic is called Bethesda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bethzatha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; other manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bethsaida
      marker-yv: yv-n
    - type: text
      text: ' and which is surrounded by five covered colonnades. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the Father loves the Son and shows him all he does. Yes, and he will show him even greater works than these, so that you will be amazed.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For just as the Father raises the dead and gives them life, even so the Son gives life to whom he is pleased to give it.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Moreover, the Father judges no one, but has entrusted all judgment to the Son,
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that all may honor the Son just as they honor the Father. Whoever does not honor the Son does not honor the Father, who sent him.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Very truly I tell you, whoever hears my word and believes him who sent me has eternal life and will not be judged but has crossed over from death to life.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Very truly I tell you, a time is coming and has now come when the dead will hear the voice of the Son of God and those who hear will live.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For as the Father has life in himself, so he has granted the Son also to have life in himself.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he has given him authority to judge because he is the Son of Man.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not be amazed at this, for a time is coming when all who are in their graves will hear his voice
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and come out—those who have done what is good will rise to live, and those who have done what is evil will rise to be condemned.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here a great number of disabled people used to lie—the blind, the lame, the paralyzed. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: By myself I can do nothing; I judge only as I hear, and my judgment is just, for I seek not to please myself but him who sent me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Testimonies About Jesus
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If I testify about myself, my testimony is not true.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: There is another who testifies in my favor, and I know that his testimony about me is true.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have sent to John and he has testified to the truth.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Not that I accept human testimony; but I mention it that you may be saved.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: John was a lamp that burned and gave light, and you chose for a time to enjoy his light.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have testimony weightier than that of John. For the works that the Father has given me to finish—the very works that I am doing—testify that the Father has sent me.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the Father who sent me has himself testified concerning me. You have never heard his voice nor seen his form,
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: nor does his word dwell in you, for you do not believe the one he sent.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You study
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '39 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Study
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the Scriptures diligently because you think that in them you have eternal life. These are the very Scriptures that testify about me,
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:3,4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts include here, wholly or in part, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'paralyzed—and they waited for the moving of the waters. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '4 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: From time to time an angel of the Lord would come down and stir up the waters. The first one into the pool after each such disturbance would be cured of whatever disease they had.
      marker-yv: yv-n
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: yet you refuse to come to me to have life.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I do not accept glory from human beings,
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but I know you. I know that you do not have the love of God in your hearts.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have come in my Father’s name, and you do not accept me; but if someone else comes in his own name, you will accept him.
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How can you believe since you accept glory from one another but do not seek the glory that comes from the only God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some early manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Only One
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '?'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But do not think I will accuse you before the Father. Your accuser is Moses, on whom your hopes are set.
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you believed Moses, you would believe me, for he wrote about me.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But since you do not believe what he wrote, how are you going to believe what I say?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One who was there had been an invalid for thirty-eight years. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus saw him lying there and learned that he had been in this condition for a long time, he asked him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you want to get well?”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Sir,” the invalid replied, “I have no one to help me into the pool when the water is stirred. While I am trying to get in, someone else goes down ahead of me.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get up! Pick up your mat and walk.”
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At once the man was cured; he picked up his mat and walked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The day on which this took place was a Sabbath, '
