document_id: PSA.39,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 39
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 39:1-13 is numbered 39:2-14.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. For Jeduthun. A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I said, “I will watch my ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keep my tongue from sin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put a muzzle on my mouth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while in the presence of the wicked.”
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Remove your scourge from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am overcome by the blow of your hand.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When you rebuke and discipline anyone for their sin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you consume their wealth like a moth—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: surely everyone is but a breath.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Hear my prayer, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to my cry for help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not be deaf to my weeping.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I dwell with you as a foreigner,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a stranger, as all my ancestors were.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Look away from me, that I may enjoy life again
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before I depart and am no more.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: So I remained utterly silent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not even saying anything good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my anguish increased;
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: my heart grew hot within me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While I meditated, the fire burned;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'then I spoke with my tongue:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Show me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', my life’s end'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the number of my days;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me know how fleeting my life is.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You have made my days a mere handbreadth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the span of my years is as nothing before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone is but a breath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even those who seem secure.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verse 11.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Surely everyone goes around like a mere phantom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in vain they rush about, heaping up wealth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without knowing whose it will finally be.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “But now, Lord, what do I look for?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My hope is in you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Save me from all my transgressions;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not make me the scorn of fools.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I was silent; I would not open my mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are the one who has done this.
