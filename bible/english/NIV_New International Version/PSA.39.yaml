document_id: PSA.39,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 39In Hebrew texts 39:1-13 is numbered 39:2-14.
  - type: text
    content: For the director of music. For Jeduthun. A psalm of David.
  - type: text
    content: I said, “I will watch my ways
  - type: text
    content: and keep my tongue from sin;
  - type: text
    content: I will put a muzzle on my mouth
  - type: text
    content: while in the presence of the wicked.”
  '10':
  - type: text
    content: Remove your scourge from me;
  - type: text
    content: I am overcome by the blow of your hand.
  '11':
  - type: text
    content: When you rebuke and discipline anyone for their sin,
  - type: text
    content: you consume their wealth like a moth—
  - type: text
    content: surely everyone is but a breath.
  '12':
  - type: text
    content: '“Hear my prayer, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: listen to my cry for help;
  - type: text
    content: do not be deaf to my weeping.
  - type: text
    content: I dwell with you as a foreigner,
  - type: text
    content: a stranger, as all my ancestors were.
  '13':
  - type: text
    content: Look away from me, that I may enjoy life again
  - type: text
    content: before I depart and am no more.”
  '2':
  - type: text
    content: So I remained utterly silent,
  - type: text
    content: not even saying anything good.
  - type: text
    content: But my anguish increased;
  '3':
  - type: text
    content: my heart grew hot within me.
  - type: text
    content: While I meditated, the fire burned;
  - type: text
    content: 'then I spoke with my tongue:'
  '4':
  - type: text
    content: '“Show me, '
  - type: text
    content: Lord
  - type: text
    content: ', my life’s end'
  - type: text
    content: and the number of my days;
  - type: text
    content: let me know how fleeting my life is.
  '5':
  - type: text
    content: You have made my days a mere handbreadth;
  - type: text
    content: the span of my years is as nothing before you.
  - type: text
    content: Everyone is but a breath,
  - type: text
    content: even those who seem secure.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 11.
  '6':
  - type: text
    content: “Surely everyone goes around like a mere phantom;
  - type: text
    content: in vain they rush about, heaping up wealth
  - type: text
    content: without knowing whose it will finally be.
  '7':
  - type: text
    content: “But now, Lord, what do I look for?
  - type: text
    content: My hope is in you.
  '8':
  - type: text
    content: Save me from all my transgressions;
  - type: text
    content: do not make me the scorn of fools.
  '9':
  - type: text
    content: I was silent; I would not open my mouth,
  - type: text
    content: for you are the one who has done this.
