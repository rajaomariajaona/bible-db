verses:
  '1':
  - type: text
    content: Intro
  - type: text
    content: 'The same person who wrote 1 John to encourage believers also found it necessary to write to other churches where the false teachers might go to spread their ideas and practices. The letter of 2 John addresses one such gathering, referring to the church as a '
  - type: text
    content: lady
  - type: text
    content: ' and its members as her '
  - type: text
    content: children
  - type: text
    content: '. The author describes the members of his own community as the '
  - type: text
    content: children of your sister
  - type: text
    content: '. (This was apparently typical of early followers of Jesus; there is a similar greeting at the end of 1 Peter.) He identifies himself as a church leader by using the title '
  - type: text
    content: elder
  - type: text
    content: .
  - type: text
    content: Apparently some people from this church had just come to visit him and he was pleased to learn that they were walking in the truth. He warns the church not to support the false teachers in any way. Despite its brevity, this letter expresses all of the themes that receive deeper development in 1 John.
