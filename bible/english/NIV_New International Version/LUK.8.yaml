document_id: LUK.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Sower
  - type: text
    content: 'After this, Jesus traveled about from one town and village to another, proclaiming the good news of the kingdom of God. The Twelve were with him, '
  '10':
  - type: text
    content: 'He said, '
  - type: text
    content: “The knowledge of the secrets of the kingdom of God has been given to you, but to others I speak in parables, so that,
  - type: text
    content: “ ‘though seeing, they may not see;
  - type: text
    content: though hearing, they may not understand.’
  - type: note
    content: Isaiah 6:9
  '11':
  - type: text
    content: ' '
  - type: text
    content: '“This is the meaning of the parable: The seed is the word of God.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Those along the path are the ones who hear, and then the devil comes and takes away the word from their hearts, so that they may not believe and be saved.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Those on the rocky ground are the ones who receive the word with joy when they hear it, but they have no root. They believe for a while, but in the time of testing they fall away.
  - type: text
    content: ' '
  '14':
  - type: text
    content: The seed that fell among thorns stands for those who hear, but as they go on their way they are choked by life’s worries, riches and pleasures, and they do not mature.
  - type: text
    content: ' '
  '15':
  - type: text
    content: But the seed on good soil stands for those with a noble and good heart, who hear the word, retain it, and by persevering produce a crop.
  - type: heading
    content: A Lamp on a Stand
  '16':
  - type: text
    content: ' '
  - type: text
    content: “No one lights a lamp and hides it in a clay jar or puts it under a bed. Instead, they put it on a stand, so that those who come in can see the light.
  - type: text
    content: ' '
  '17':
  - type: text
    content: For there is nothing hidden that will not be disclosed, and nothing concealed that will not be known or brought out into the open.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Therefore consider carefully how you listen. Whoever has will be given more; whoever does not have, even what they think they have will be taken from them.”
  - type: heading
    content: Jesus’ Mother and Brothers
  '19':
  - type: text
    content: 'Now Jesus’ mother and brothers came to see him, but they were not able to get near him because of the crowd. '
  '2':
  - type: text
    content: 'and also some women who had been cured of evil spirits and diseases: Mary (called Magdalene) from whom seven demons had come out; '
  '20':
  - type: text
    content: Someone told him, “Your mother and brothers are standing outside, wanting to see you.”
  '21':
  - type: text
    content: 'He replied, '
  - type: text
    content: “My mother and brothers are those who hear God’s word and put it into practice.”
  - type: heading
    content: Jesus Calms the Storm
  '22':
  - type: text
    content: 'One day Jesus said to his disciples, '
  - type: text
    content: “Let us go over to the other side of the lake.”
  - type: text
    content: ' So they got into a boat and set out. '
  '23':
  - type: text
    content: As they sailed, he fell asleep. A squall came down on the lake, so that the boat was being swamped, and they were in great danger.
  '24':
  - type: text
    content: The disciples went and woke him, saying, “Master, Master, we’re going to drown!”
  - type: text
    content: 'He got up and rebuked the wind and the raging waters; the storm subsided, and all was calm. '
  '25':
  - type: text
    content: “Where is your faith?”
  - type: text
    content: ' he asked his disciples.'
  - type: text
    content: In fear and amazement they asked one another, “Who is this? He commands even the winds and the water, and they obey him.”
  - type: heading
    content: Jesus Restores a Demon-Possessed Man
  '26':
  - type: text
    content: They sailed to the region of the Gerasenes,
  - type: note
    content: Some manuscripts Gadarenes; other manuscripts Gergesenes; also in verse 37
  - type: text
    content: ' which is across the lake from Galilee. '
  '27':
  - type: text
    content: 'When Jesus stepped ashore, he was met by a demon-possessed man from the town. For a long time this man had not worn clothes or lived in a house, but had lived in the tombs. '
  '28':
  - type: text
    content: 'When he saw Jesus, he cried out and fell at his feet, shouting at the top of his voice, “What do you want with me, Jesus, Son of the Most High God? I beg you, don’t torture me!” '
  '29':
  - type: text
    content: For Jesus had commanded the impure spirit to come out of the man. Many times it had seized him, and though he was chained hand and foot and kept under guard, he had broken his chains and had been driven by the demon into solitary places.
  '3':
  - type: text
    content: Joanna the wife of Chuza, the manager of Herod’s household; Susanna; and many others. These women were helping to support them out of their own means.
  '30':
  - type: text
    content: 'Jesus asked him, '
  - type: text
    content: “What is your name?”
  - type: text
    content: '“Legion,” he replied, because many demons had gone into him. '
  '31':
  - type: text
    content: And they begged Jesus repeatedly not to order them to go into the Abyss.
  '32':
  - type: text
    content: 'A large herd of pigs was feeding there on the hillside. The demons begged Jesus to let them go into the pigs, and he gave them permission. '
  '33':
  - type: text
    content: When the demons came out of the man, they went into the pigs, and the herd rushed down the steep bank into the lake and was drowned.
  '34':
  - type: text
    content: 'When those tending the pigs saw what had happened, they ran off and reported this in the town and countryside, '
  '35':
  - type: text
    content: 'and the people went out to see what had happened. When they came to Jesus, they found the man from whom the demons had gone out, sitting at Jesus’ feet, dressed and in his right mind; and they were afraid. '
  '36':
  - type: text
    content: 'Those who had seen it told the people how the demon-possessed man had been cured. '
  '37':
  - type: text
    content: Then all the people of the region of the Gerasenes asked Jesus to leave them, because they were overcome with fear. So he got into the boat and left.
  '38':
  - type: text
    content: 'The man from whom the demons had gone out begged to go with him, but Jesus sent him away, saying, '
  '39':
  - type: text
    content: “Return home and tell how much God has done for you.”
  - type: text
    content: ' So the man went away and told all over town how much Jesus had done for him.'
  - type: heading
    content: Jesus Raises a Dead Girl and Heals a Sick Woman
  '4':
  - type: text
    content: 'While a large crowd was gathering and people were coming to Jesus from town after town, he told this parable: '
  '40':
  - type: text
    content: 'Now when Jesus returned, a crowd welcomed him, for they were all expecting him. '
  '41':
  - type: text
    content: 'Then a man named Jairus, a synagogue leader, came and fell at Jesus’ feet, pleading with him to come to his house '
  '42':
  - type: text
    content: because his only daughter, a girl of about twelve, was dying.
  - type: text
    content: 'As Jesus was on his way, the crowds almost crushed him. '
  '43':
  - type: text
    content: And a woman was there who had been subject to bleeding for twelve years,
  - type: note
    content: Many manuscripts years, and she had spent all she had on doctors
  - type: text
    content: ' but no one could heal her. '
  '44':
  - type: text
    content: She came up behind him and touched the edge of his cloak, and immediately her bleeding stopped.
  '45':
  - type: text
    content: ' '
  - type: text
    content: “Who touched me?”
  - type: text
    content: ' Jesus asked.'
  - type: text
    content: When they all denied it, Peter said, “Master, the people are crowding and pressing against you.”
  '46':
  - type: text
    content: 'But Jesus said, '
  - type: text
    content: “Someone touched me; I know that power has gone out from me.”
  '47':
  - type: text
    content: 'Then the woman, seeing that she could not go unnoticed, came trembling and fell at his feet. In the presence of all the people, she told why she had touched him and how she had been instantly healed. '
  '48':
  - type: text
    content: 'Then he said to her, '
  - type: text
    content: “Daughter, your faith has healed you. Go in peace.”
  '49':
  - type: text
    content: While Jesus was still speaking, someone came from the house of Jairus, the synagogue leader. “Your daughter is dead,” he said. “Don’t bother the teacher anymore.”
  '5':
  - type: text
    content: “A farmer went out to sow his seed. As he was scattering the seed, some fell along the path; it was trampled on, and the birds ate it up.
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'Hearing this, Jesus said to Jairus, '
  - type: text
    content: “Don’t be afraid; just believe, and she will be healed.”
  '51':
  - type: text
    content: 'When he arrived at the house of Jairus, he did not let anyone go in with him except Peter, John and James, and the child’s father and mother. '
  '52':
  - type: text
    content: 'Meanwhile, all the people were wailing and mourning for her. '
  - type: text
    content: “Stop wailing,”
  - type: text
    content: ' Jesus said. '
  - type: text
    content: “She is not dead but asleep.”
  '53':
  - type: text
    content: 'They laughed at him, knowing that she was dead. '
  '54':
  - type: text
    content: 'But he took her by the hand and said, '
  - type: text
    content: “My child, get up!”
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'Her spirit returned, and at once she stood up. Then Jesus told them to give her something to eat. '
  '56':
  - type: text
    content: Her parents were astonished, but he ordered them not to tell anyone what had happened.
  '6':
  - type: text
    content: Some fell on rocky ground, and when it came up, the plants withered because they had no moisture.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Other seed fell among thorns, which grew up with it and choked the plants.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Still other seed fell on good soil. It came up and yielded a crop, a hundred times more than was sown.”
  - type: text
    content: 'When he said this, he called out, '
  - type: text
    content: “Whoever has ears to hear, let them hear.”
  '9':
  - type: text
    content: 'His disciples asked him what this parable meant. '
