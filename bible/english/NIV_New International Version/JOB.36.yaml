document_id: JOB.36,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Elihu continued:'
  '10':
  - type: text
    content: He makes them listen to correction
  - type: text
    content: and commands them to repent of their evil.
  '11':
  - type: text
    content: If they obey and serve him,
  - type: text
    content: they will spend the rest of their days in prosperity
  - type: text
    content: and their years in contentment.
  '12':
  - type: text
    content: But if they do not listen,
  - type: text
    content: they will perish by the sword
  - type: note
    content: Or will cross the river
  - type: text
    content: and die without knowledge.
  '13':
  - type: text
    content: “The godless in heart harbor resentment;
  - type: text
    content: even when he fetters them, they do not cry for help.
  '14':
  - type: text
    content: They die in their youth,
  - type: text
    content: among male prostitutes of the shrines.
  '15':
  - type: text
    content: But those who suffer he delivers in their suffering;
  - type: text
    content: he speaks to them in their affliction.
  '16':
  - type: text
    content: “He is wooing you from the jaws of distress
  - type: text
    content: to a spacious place free from restriction,
  - type: text
    content: to the comfort of your table laden with choice food.
  '17':
  - type: text
    content: But now you are laden with the judgment due the wicked;
  - type: text
    content: judgment and justice have taken hold of you.
  '18':
  - type: text
    content: Be careful that no one entices you by riches;
  - type: text
    content: do not let a large bribe turn you aside.
  '19':
  - type: text
    content: Would your wealth or even all your mighty efforts
  - type: text
    content: sustain you so you would not be in distress?
  '2':
  - type: text
    content: “Bear with me a little longer and I will show you
  - type: text
    content: that there is more to be said in God’s behalf.
  '20':
  - type: text
    content: Do not long for the night,
  - type: text
    content: to drag people away from their homes.
  - type: note
    content: The meaning of the Hebrew for verses 18-20 is uncertain.
  '21':
  - type: text
    content: Beware of turning to evil,
  - type: text
    content: which you seem to prefer to affliction.
  '22':
  - type: text
    content: “God is exalted in his power.
  - type: text
    content: Who is a teacher like him?
  '23':
  - type: text
    content: Who has prescribed his ways for him,
  - type: text
    content: or said to him, ‘You have done wrong’?
  '24':
  - type: text
    content: Remember to extol his work,
  - type: text
    content: which people have praised in song.
  '25':
  - type: text
    content: All humanity has seen it;
  - type: text
    content: mortals gaze on it from afar.
  '26':
  - type: text
    content: How great is God—beyond our understanding!
  - type: text
    content: The number of his years is past finding out.
  '27':
  - type: text
    content: “He draws up the drops of water,
  - type: text
    content: which distill as rain to the streams
  - type: note
    content: Or distill from the mist as rain
  - type: text
    content: ;
  '28':
  - type: text
    content: the clouds pour down their moisture
  - type: text
    content: and abundant showers fall on mankind.
  '29':
  - type: text
    content: Who can understand how he spreads out the clouds,
  - type: text
    content: how he thunders from his pavilion?
  '3':
  - type: text
    content: I get my knowledge from afar;
  - type: text
    content: I will ascribe justice to my Maker.
  '30':
  - type: text
    content: See how he scatters his lightning about him,
  - type: text
    content: bathing the depths of the sea.
  '31':
  - type: text
    content: This is the way he governs
  - type: note
    content: Or nourishes
  - type: text
    content: ' the nations'
  - type: text
    content: and provides food in abundance.
  '32':
  - type: text
    content: He fills his hands with lightning
  - type: text
    content: and commands it to strike its mark.
  '33':
  - type: text
    content: His thunder announces the coming storm;
  - type: text
    content: even the cattle make known its approach.
  - type: note
    content: Or announces his coming— / the One zealous against evil
  '4':
  - type: text
    content: Be assured that my words are not false;
  - type: text
    content: one who has perfect knowledge is with you.
  '5':
  - type: text
    content: “God is mighty, but despises no one;
  - type: text
    content: he is mighty, and firm in his purpose.
  '6':
  - type: text
    content: He does not keep the wicked alive
  - type: text
    content: but gives the afflicted their rights.
  '7':
  - type: text
    content: He does not take his eyes off the righteous;
  - type: text
    content: he enthrones them with kings
  - type: text
    content: and exalts them forever.
  '8':
  - type: text
    content: But if people are bound in chains,
  - type: text
    content: held fast by cords of affliction,
  '9':
  - type: text
    content: he tells them what they have done—
  - type: text
    content: that they have sinned arrogantly.
