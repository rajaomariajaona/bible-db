document_id: JOB.36
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Elihu continued:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Bear with me a little longer and I will show you
- type: usfm
  marker: q2
  children:
  - type: text
    text: that there is more to be said in God’s behalf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I get my knowledge from afar;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will ascribe justice to my Maker.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Be assured that my words are not false;
- type: usfm
  marker: q2
  children:
  - type: text
    text: one who has perfect knowledge is with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “God is mighty, but despises no one;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is mighty, and firm in his purpose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He does not keep the wicked alive
- type: usfm
  marker: q2
  children:
  - type: text
    text: but gives the afflicted their rights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He does not take his eyes off the righteous;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he enthrones them with kings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and exalts them forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But if people are bound in chains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: held fast by cords of affliction,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: he tells them what they have done—
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they have sinned arrogantly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He makes them listen to correction
- type: usfm
  marker: q2
  children:
  - type: text
    text: and commands them to repent of their evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: If they obey and serve him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will spend the rest of their days in prosperity
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their years in contentment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But if they do not listen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will perish by the sword
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will cross the river
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and die without knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “The godless in heart harbor resentment;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even when he fetters them, they do not cry for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They die in their youth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: among male prostitutes of the shrines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But those who suffer he delivers in their suffering;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he speaks to them in their affliction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “He is wooing you from the jaws of distress
- type: usfm
  marker: q2
  children:
  - type: text
    text: to a spacious place free from restriction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the comfort of your table laden with choice food.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But now you are laden with the judgment due the wicked;
- type: usfm
  marker: q2
  children:
  - type: text
    text: judgment and justice have taken hold of you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Be careful that no one entices you by riches;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let a large bribe turn you aside.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Would your wealth or even all your mighty efforts
- type: usfm
  marker: q2
  children:
  - type: text
    text: sustain you so you would not be in distress?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Do not long for the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to drag people away from their homes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for verses 18-20 is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Beware of turning to evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which you seem to prefer to affliction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “God is exalted in his power.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who is a teacher like him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Who has prescribed his ways for him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or said to him, ‘You have done wrong’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Remember to extol his work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which people have praised in song.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: All humanity has seen it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: mortals gaze on it from afar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: How great is God—beyond our understanding!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The number of his years is past finding out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “He draws up the drops of water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which distill as rain to the streams
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: distill from the mist as rain
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: the clouds pour down their moisture
- type: usfm
  marker: q2
  children:
  - type: text
    text: and abundant showers fall on mankind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Who can understand how he spreads out the clouds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how he thunders from his pavilion?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: See how he scatters his lightning about him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bathing the depths of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: This is the way he governs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nourishes
    marker-yv: yv-n
  - type: text
    text: ' the nations'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and provides food in abundance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: He fills his hands with lightning
- type: usfm
  marker: q2
  children:
  - type: text
    text: and commands it to strike its mark.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: His thunder announces the coming storm;
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the cattle make known its approach.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: announces his coming— / the One zealous against evil
    marker-yv: yv-n
