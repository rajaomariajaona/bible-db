document_id: JER.25,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Seventy Years of Captivity
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word came to Jeremiah concerning all the people of Judah in the fourth year of Jehoiakim son of Josiah king of Judah, which was the first year of Nebuchadnezzar king of Babylon. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I will banish from them the sounds of joy and gladness, the voices of bride and bridegroom, the sound of millstones and the light of the lamp. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: This whole country will become a desolate wasteland, and these nations will serve the king of Babylon seventy years.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “But when the seventy years are fulfilled, I will punish the king of Babylon and his nation, the land of the Babylonians,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      marker-yv: yv-n
    - type: text
      text: ' for their guilt,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “and will make it desolate forever. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I will bring on that land all the things I have spoken against it, all that are written in this book and prophesied by Jeremiah against all the nations. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They themselves will be enslaved by many nations and great kings; I will repay them according to their deeds and the work of their hands.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cup of God’s Wrath
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, said to me: “Take from my hand this cup filled with the wine of my wrath and make all the nations to whom I send you drink it. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When they drink it, they will stagger and go mad because of the sword I will send among them.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So I took the cup from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s hand and made all the nations to whom he sent me drink it: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Jerusalem and the towns of Judah, its kings and officials, to make them a ruin and an object of horror and scorn, a curse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, their names to be used in cursing (see 29:22); or, to be seen by others as cursed
      marker-yv: yv-n
    - type: text
      text: '—as they are today; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Pharaoh king of Egypt, his attendants, his officials and all his people, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So Jeremiah the prophet said to all the people of Judah and to all those living in Jerusalem: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'and all the foreign people there; all the kings of Uz; all the kings of the Philistines (those of Ashkelon, Gaza, Ekron, and the people left at Ashdod); '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Edom, Moab and Ammon; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'all the kings of Tyre and Sidon; the kings of the coastlands across the sea; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Dedan, Tema, Buz and all who are in distant places
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who clip the hair by their foreheads
      marker-yv: yv-n
    - type: text
      text: '; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'all the kings of Arabia and all the kings of the foreign people who live in the wilderness; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'all the kings of Zimri, Elam and Media; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: and all the kings of the north, near and far, one after the other—all the kingdoms on the face of the earth. And after all of them, the king of Sheshak
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sheshak '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a cryptogram for Babylon.
      marker-yv: yv-n
    - type: text
      text: ' will drink it too.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“Then tell them, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says: Drink, get drunk and vomit, and fall to rise no more because of the sword I will send among you.’ '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But if they refuse to take the cup from your hand and drink, tell them, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: You must drink it! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'See, I am beginning to bring disaster on the city that bears my Name, and will you indeed go unpunished? You will not go unpunished, for I am calling down a sword on all who live on the earth, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.’'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For twenty-three years—from the thirteenth year of Josiah son of Amon king of Judah until this very day—the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has come to me and I have spoken to you again and again, but you have not listened.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“Now prophesy all these words against them and say to them:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“ ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will roar from on high;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will thunder from his holy dwelling
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and roar mightily against his land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will shout like those who tread the grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shout against all who live on the earth.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The tumult will resound to the ends of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will bring charges against the nations;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will bring judgment on all mankind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put the wicked to the sword,’ ”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! Disaster is spreading
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from nation to nation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a mighty storm is rising
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the ends of the earth.”
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'At that time those slain by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be everywhere—from one end of the earth to the other. They will not be mourned or gathered up or buried, but will be like dung lying on the ground.'
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Weep and wail, you shepherds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roll in the dust, you leaders of the flock.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your time to be slaughtered has come;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will fall like the best of the rams.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fall and be shattered like fine pottery
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: The shepherds will have nowhere to flee,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the leaders of the flock no place to escape.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Hear the cry of the shepherds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wailing of the leaders of the flock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is destroying their pasture.'
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: The peaceful meadows will be laid waste
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because of the fierce anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Like a lion he will leave his lair,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their land will become desolate
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of the sword
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew manuscripts and Septuagint (see also 46:16 and 50:16); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: anger
      marker-yv: yv-n
    - type: text
      text: ' of the oppressor'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s fierce anger.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And though the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sent all his servants the prophets to you again and again, you have not listened or paid any attention. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They said, “Turn now, each of you, from your evil ways and your evil practices, and you can stay in the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave to you and your ancestors for ever and ever. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Do not follow other gods to serve and worship them; do not arouse my anger with what your hands have made. Then I will not harm you.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“But you did not listen to me,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “and you have aroused my anger with what your hands have made, and you have brought harm to yourselves.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says this: “Because you have not listened to my words, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I will summon all the peoples of the north and my servant Nebuchadnezzar king of Babylon,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “and I will bring them against this land and its inhabitants and against all the surrounding nations. I will completely destroy'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them.'
      marker-yv: yv-n
    - type: text
      text: ' them and make them an object of horror and scorn, and an everlasting ruin. '
