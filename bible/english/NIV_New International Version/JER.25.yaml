document_id: JER.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Seventy Years of Captivity
  - type: text
    content: 'The word came to Jeremiah concerning all the people of Judah in the fourth year of Jehoiakim son of Josiah king of Judah, which was the first year of Nebuchadnezzar king of Babylon. '
  '10':
  - type: text
    content: 'I will banish from them the sounds of joy and gladness, the voices of bride and bridegroom, the sound of millstones and the light of the lamp. '
  '11':
  - type: text
    content: This whole country will become a desolate wasteland, and these nations will serve the king of Babylon seventy years.
  '12':
  - type: text
    content: “But when the seventy years are fulfilled, I will punish the king of Babylon and his nation, the land of the Babylonians,
  - type: note
    content: Or Chaldeans
  - type: text
    content: ' for their guilt,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “and will make it desolate forever. '
  '13':
  - type: text
    content: 'I will bring on that land all the things I have spoken against it, all that are written in this book and prophesied by Jeremiah against all the nations. '
  '14':
  - type: text
    content: They themselves will be enslaved by many nations and great kings; I will repay them according to their deeds and the work of their hands.”
  - type: heading
    content: The Cup of God’s Wrath
  '15':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, said to me: “Take from my hand this cup filled with the wine of my wrath and make all the nations to whom I send you drink it. '
  '16':
  - type: text
    content: When they drink it, they will stagger and go mad because of the sword I will send among them.”
  '17':
  - type: text
    content: 'So I took the cup from the '
  - type: text
    content: Lord
  - type: text
    content: '’s hand and made all the nations to whom he sent me drink it: '
  '18':
  - type: text
    content: Jerusalem and the towns of Judah, its kings and officials, to make them a ruin and an object of horror and scorn, a curse
  - type: note
    content: That is, their names to be used in cursing (see 29:22); or, to be seen by others as cursed
  - type: text
    content: '—as they are today; '
  '19':
  - type: text
    content: 'Pharaoh king of Egypt, his attendants, his officials and all his people, '
  '2':
  - type: text
    content: 'So Jeremiah the prophet said to all the people of Judah and to all those living in Jerusalem: '
  '20':
  - type: text
    content: 'and all the foreign people there; all the kings of Uz; all the kings of the Philistines (those of Ashkelon, Gaza, Ekron, and the people left at Ashdod); '
  '21':
  - type: text
    content: 'Edom, Moab and Ammon; '
  '22':
  - type: text
    content: 'all the kings of Tyre and Sidon; the kings of the coastlands across the sea; '
  '23':
  - type: text
    content: Dedan, Tema, Buz and all who are in distant places
  - type: note
    content: Or who clip the hair by their foreheads
  - type: text
    content: '; '
  '24':
  - type: text
    content: 'all the kings of Arabia and all the kings of the foreign people who live in the wilderness; '
  '25':
  - type: text
    content: 'all the kings of Zimri, Elam and Media; '
  '26':
  - type: text
    content: and all the kings of the north, near and far, one after the other—all the kingdoms on the face of the earth. And after all of them, the king of Sheshak
  - type: note
    content: Sheshak is a cryptogram for Babylon.
  - type: text
    content: ' will drink it too.'
  '27':
  - type: text
    content: '“Then tell them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: Drink, get drunk and vomit, and fall to rise no more because of the sword I will send among you.’ '
  '28':
  - type: text
    content: 'But if they refuse to take the cup from your hand and drink, tell them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: You must drink it! '
  '29':
  - type: text
    content: 'See, I am beginning to bring disaster on the city that bears my Name, and will you indeed go unpunished? You will not go unpunished, for I am calling down a sword on all who live on the earth, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.’'
  '3':
  - type: text
    content: 'For twenty-three years—from the thirteenth year of Josiah son of Amon king of Judah until this very day—the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' has come to me and I have spoken to you again and again, but you have not listened.'
  '30':
  - type: text
    content: '“Now prophesy all these words against them and say to them:'
  - type: text
    content: '“ ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' will roar from on high;'
  - type: text
    content: he will thunder from his holy dwelling
  - type: text
    content: and roar mightily against his land.
  - type: text
    content: He will shout like those who tread the grapes,
  - type: text
    content: shout against all who live on the earth.
  '31':
  - type: text
    content: The tumult will resound to the ends of the earth,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring charges against the nations;'
  - type: text
    content: he will bring judgment on all mankind
  - type: text
    content: and put the wicked to the sword,’ ”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '32':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “Look! Disaster is spreading
  - type: text
    content: from nation to nation;
  - type: text
    content: a mighty storm is rising
  - type: text
    content: from the ends of the earth.”
  '33':
  - type: text
    content: 'At that time those slain by the '
  - type: text
    content: Lord
  - type: text
    content: ' will be everywhere—from one end of the earth to the other. They will not be mourned or gathered up or buried, but will be like dung lying on the ground.'
  '34':
  - type: text
    content: Weep and wail, you shepherds;
  - type: text
    content: roll in the dust, you leaders of the flock.
  - type: text
    content: For your time to be slaughtered has come;
  - type: text
    content: you will fall like the best of the rams.
  - type: note
    content: Septuagint; Hebrew fall and be shattered like fine pottery
  '35':
  - type: text
    content: The shepherds will have nowhere to flee,
  - type: text
    content: the leaders of the flock no place to escape.
  '36':
  - type: text
    content: Hear the cry of the shepherds,
  - type: text
    content: the wailing of the leaders of the flock,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' is destroying their pasture.'
  '37':
  - type: text
    content: The peaceful meadows will be laid waste
  - type: text
    content: 'because of the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '38':
  - type: text
    content: Like a lion he will leave his lair,
  - type: text
    content: and their land will become desolate
  - type: text
    content: because of the sword
  - type: note
    content: Some Hebrew manuscripts and Septuagint (see also 46:16 and 50:16); most Hebrew manuscripts anger
  - type: text
    content: ' of the oppressor'
  - type: text
    content: 'and because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger.
  '4':
  - type: text
    content: 'And though the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent all his servants the prophets to you again and again, you have not listened or paid any attention. '
  '5':
  - type: text
    content: 'They said, “Turn now, each of you, from your evil ways and your evil practices, and you can stay in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' gave to you and your ancestors for ever and ever. '
  '6':
  - type: text
    content: Do not follow other gods to serve and worship them; do not arouse my anger with what your hands have made. Then I will not harm you.”
  '7':
  - type: text
    content: '“But you did not listen to me,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “and you have aroused my anger with what your hands have made, and you have brought harm to yourselves.”'
  '8':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says this: “Because you have not listened to my words, '
  '9':
  - type: text
    content: 'I will summon all the peoples of the north and my servant Nebuchadnezzar king of Babylon,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “and I will bring them against this land and its inhabitants and against all the surrounding nations. I will completely destroy'
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' them and make them an object of horror and scorn, and an everlasting ruin. '
