      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '135:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hallelu Yah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 3 and 21
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'praise him, you servants of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He struck down many nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and killed mighty kings—
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Sihon king of the Amorites,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Og king of Bashan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the kings of Canaan—
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: and he gave their land as an inheritance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an inheritance to his people Israel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Your name, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', endures forever,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'your renown, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', through all generations.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will vindicate his people'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have compassion on his servants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The idols of the nations are silver and gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: made by human hands.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They have mouths, but cannot speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: eyes, but cannot see.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They have ears, but cannot hear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor is there breath in their mouths.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Those who make them will be like them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so will all who trust in them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'All you Israelites, praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'house of Aaron, praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'you who minister in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the courts of the house of our God.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'house of Levi, praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you who fear him, praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to him who dwells in Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sing praise to his name, for that is pleasant.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen Jacob to be his own,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel to be his treasured possession.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is great,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that our Lord is greater than all gods.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' does whatever pleases him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the heavens and on the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the seas and all their depths.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He makes clouds rise from the ends of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he sends lightning with the rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brings out the wind from his storehouses.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He struck down the firstborn of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the firstborn of people and animals.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He sent his signs and wonders into your midst, Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against Pharaoh and all his servants.
