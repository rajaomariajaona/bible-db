document_id: PSA.135,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 135
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew Hallelu Yah; also in verses 3 and 21
  - type: text
    content: 'Praise the name of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'praise him, you servants of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  '10':
  - type: text
    content: He struck down many nations
  - type: text
    content: and killed mighty kings—
  '11':
  - type: text
    content: Sihon king of the Amorites,
  - type: text
    content: Og king of Bashan,
  - type: text
    content: and all the kings of Canaan—
  '12':
  - type: text
    content: and he gave their land as an inheritance,
  - type: text
    content: an inheritance to his people Israel.
  '13':
  - type: text
    content: 'Your name, '
  - type: text
    content: Lord
  - type: text
    content: ', endures forever,'
  - type: text
    content: 'your renown, '
  - type: text
    content: Lord
  - type: text
    content: ', through all generations.'
  '14':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will vindicate his people'
  - type: text
    content: and have compassion on his servants.
  '15':
  - type: text
    content: The idols of the nations are silver and gold,
  - type: text
    content: made by human hands.
  '16':
  - type: text
    content: They have mouths, but cannot speak,
  - type: text
    content: eyes, but cannot see.
  '17':
  - type: text
    content: They have ears, but cannot hear,
  - type: text
    content: nor is there breath in their mouths.
  '18':
  - type: text
    content: Those who make them will be like them,
  - type: text
    content: and so will all who trust in them.
  '19':
  - type: text
    content: 'All you Israelites, praise the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'house of Aaron, praise the '
  - type: text
    content: Lord
  - type: text
    content: ;
  '2':
  - type: text
    content: 'you who minister in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: in the courts of the house of our God.
  '20':
  - type: text
    content: 'house of Levi, praise the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: 'you who fear him, praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ' from Zion,'
  - type: text
    content: to him who dwells in Jerusalem.
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: ', for the '
  - type: text
    content: Lord
  - type: text
    content: ' is good;'
  - type: text
    content: sing praise to his name, for that is pleasant.
  '4':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen Jacob to be his own,'
  - type: text
    content: Israel to be his treasured possession.
  '5':
  - type: text
    content: 'I know that the '
  - type: text
    content: Lord
  - type: text
    content: ' is great,'
  - type: text
    content: that our Lord is greater than all gods.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' does whatever pleases him,'
  - type: text
    content: in the heavens and on the earth,
  - type: text
    content: in the seas and all their depths.
  '7':
  - type: text
    content: He makes clouds rise from the ends of the earth;
  - type: text
    content: he sends lightning with the rain
  - type: text
    content: and brings out the wind from his storehouses.
  '8':
  - type: text
    content: He struck down the firstborn of Egypt,
  - type: text
    content: the firstborn of people and animals.
  '9':
  - type: text
    content: He sent his signs and wonders into your midst, Egypt,
  - type: text
    content: against Pharaoh and all his servants.
