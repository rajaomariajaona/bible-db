document_id: JER.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Linen Belt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me: “Go and buy a linen belt and put it around your waist, but do not let it touch water.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So I bought a belt, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' directed, and put it around my waist.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me a second time: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Take the belt you bought and are wearing around your waist, and go now to Perath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or possibly '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to the Euphrates
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; similarly in verses 5-7
    marker-yv: yv-n
  - type: text
    text: ' and hide it there in a crevice in the rocks.” '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So I went and hid it at Perath, as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' told me.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Many days later the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me, “Go now to Perath and get the belt I told you to hide there.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So I went to Perath and dug up the belt and took it from the place where I had hidden it, but now it was ruined and completely useless.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘In the same way I will ruin the pride of Judah and the great pride of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'These wicked people, who refuse to listen to my words, who follow the stubbornness of their hearts and go after other gods to serve and worship them, will be like this belt—completely useless! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For as a belt is bound around the waist, so I bound all the people of Israel and all the people of Judah to me,’ declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', ‘to be my people for my renown and praise and honor. But they have not listened.’'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wineskins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Say to them: ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: Every wineskin should be filled with wine.’ And if they say to you, ‘Don’t we know that every wineskin should be filled with wine?’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'then tell them, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I am going to fill with drunkenness all who live in this land, including the kings who sit on David’s throne, the priests, the prophets and all those living in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will smash them one against the other, parents and children alike, declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . I will allow no pity or mercy or compassion to keep me from destroying them.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Threat of Captivity
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hear and pay attention,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not be arrogant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Give glory to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God'
- type: usfm
  marker: q2
  children:
  - type: text
    text: before he brings the darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: before your feet stumble
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the darkening hills.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You hope for light,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he will turn it to utter darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and change it to deep gloom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: If you do not listen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will weep in secret
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of your pride;
- type: usfm
  marker: q1
  children:
  - type: text
    text: my eyes will weep bitterly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: overflowing with tears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s flock will be taken captive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Say to the king and to the queen mother,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Come down from your thrones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your glorious crowns
- type: usfm
  marker: q2
  children:
  - type: text
    text: will fall from your heads.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The cities in the Negev will be shut up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there will be no one to open them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All Judah will be carried into exile,
- type: usfm
  marker: q2
  children:
  - type: text
    text: carried completely away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Look up and see
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who are coming from the north.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where is the flock that was entrusted to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sheep of which you boasted?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'What will you say when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sets over you'
- type: usfm
  marker: q2
  children:
  - type: text
    text: those you cultivated as your special allies?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will not pain grip you
- type: usfm
  marker: q2
  children:
  - type: text
    text: like that of a woman in labor?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And if you ask yourself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Why has this happened to me?”—
- type: usfm
  marker: q1
  children:
  - type: text
    text: it is because of your many sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: that your skirts have been torn off
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your body mistreated.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Can an Ethiopian
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Cushite '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (probably a person from the upper Nile region)
    marker-yv: yv-n
  - type: text
    text: ' change his skin'
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a leopard its spots?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neither can you do good
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are accustomed to doing evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “I will scatter you like chaff
- type: usfm
  marker: q2
  children:
  - type: text
    text: driven by the desert wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: This is your lot,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the portion I have decreed for you,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “because you have forgotten me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and trusted in false gods.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I will pull up your skirts over your face
- type: usfm
  marker: q2
  children:
  - type: text
    text: that your shame may be seen—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: your adulteries and lustful neighings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your shameless prostitution!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have seen your detestable acts
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the hills and in the fields.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Woe to you, Jerusalem!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will you be unclean?”
