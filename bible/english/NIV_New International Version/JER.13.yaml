document_id: JER.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Linen Belt
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Go and buy a linen belt and put it around your waist, but do not let it touch water.” '
  '10':
  - type: text
    content: 'These wicked people, who refuse to listen to my words, who follow the stubbornness of their hearts and go after other gods to serve and worship them, will be like this belt—completely useless! '
  '11':
  - type: text
    content: 'For as a belt is bound around the waist, so I bound all the people of Israel and all the people of Judah to me,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘to be my people for my renown and praise and honor. But they have not listened.’'
  - type: heading
    content: Wineskins
  '12':
  - type: text
    content: '“Say to them: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Every wineskin should be filled with wine.’ And if they say to you, ‘Don’t we know that every wineskin should be filled with wine?’ '
  '13':
  - type: text
    content: 'then tell them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am going to fill with drunkenness all who live in this land, including the kings who sit on David’s throne, the priests, the prophets and all those living in Jerusalem. '
  '14':
  - type: text
    content: 'I will smash them one against the other, parents and children alike, declares the '
  - type: text
    content: Lord
  - type: text
    content: . I will allow no pity or mercy or compassion to keep me from destroying them.’ ”
  - type: heading
    content: Threat of Captivity
  '15':
  - type: text
    content: Hear and pay attention,
  - type: text
    content: do not be arrogant,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '16':
  - type: text
    content: 'Give glory to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: before he brings the darkness,
  - type: text
    content: before your feet stumble
  - type: text
    content: on the darkening hills.
  - type: text
    content: You hope for light,
  - type: text
    content: but he will turn it to utter darkness
  - type: text
    content: and change it to deep gloom.
  '17':
  - type: text
    content: If you do not listen,
  - type: text
    content: I will weep in secret
  - type: text
    content: because of your pride;
  - type: text
    content: my eyes will weep bitterly,
  - type: text
    content: overflowing with tears,
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ’s flock will be taken captive.
  '18':
  - type: text
    content: Say to the king and to the queen mother,
  - type: text
    content: “Come down from your thrones,
  - type: text
    content: for your glorious crowns
  - type: text
    content: will fall from your heads.”
  '19':
  - type: text
    content: The cities in the Negev will be shut up,
  - type: text
    content: and there will be no one to open them.
  - type: text
    content: All Judah will be carried into exile,
  - type: text
    content: carried completely away.
  '2':
  - type: text
    content: 'So I bought a belt, as the '
  - type: text
    content: Lord
  - type: text
    content: ' directed, and put it around my waist.'
  '20':
  - type: text
    content: Look up and see
  - type: text
    content: those who are coming from the north.
  - type: text
    content: Where is the flock that was entrusted to you,
  - type: text
    content: the sheep of which you boasted?
  '21':
  - type: text
    content: 'What will you say when the '
  - type: text
    content: Lord
  - type: text
    content: ' sets over you'
  - type: text
    content: those you cultivated as your special allies?
  - type: text
    content: Will not pain grip you
  - type: text
    content: like that of a woman in labor?
  '22':
  - type: text
    content: And if you ask yourself,
  - type: text
    content: “Why has this happened to me?”—
  - type: text
    content: it is because of your many sins
  - type: text
    content: that your skirts have been torn off
  - type: text
    content: and your body mistreated.
  '23':
  - type: text
    content: Can an Ethiopian
  - type: note
    content: Hebrew Cushite (probably a person from the upper Nile region)
  - type: text
    content: ' change his skin'
  - type: text
    content: or a leopard its spots?
  - type: text
    content: Neither can you do good
  - type: text
    content: who are accustomed to doing evil.
  '24':
  - type: text
    content: “I will scatter you like chaff
  - type: text
    content: driven by the desert wind.
  '25':
  - type: text
    content: This is your lot,
  - type: text
    content: the portion I have decreed for you,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “because you have forgotten me
  - type: text
    content: and trusted in false gods.
  '26':
  - type: text
    content: I will pull up your skirts over your face
  - type: text
    content: that your shame may be seen—
  '27':
  - type: text
    content: your adulteries and lustful neighings,
  - type: text
    content: your shameless prostitution!
  - type: text
    content: I have seen your detestable acts
  - type: text
    content: on the hills and in the fields.
  - type: text
    content: Woe to you, Jerusalem!
  - type: text
    content: How long will you be unclean?”
  '3':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me a second time: '
  '4':
  - type: text
    content: “Take the belt you bought and are wearing around your waist, and go now to Perath
  - type: note
    content: Or possibly to the Euphrates; similarly in verses 5-7
  - type: text
    content: ' and hide it there in a crevice in the rocks.” '
  '5':
  - type: text
    content: 'So I went and hid it at Perath, as the '
  - type: text
    content: Lord
  - type: text
    content: ' told me.'
  '6':
  - type: text
    content: 'Many days later the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Go now to Perath and get the belt I told you to hide there.” '
  '7':
  - type: text
    content: So I went to Perath and dug up the belt and took it from the place where I had hidden it, but now it was ruined and completely useless.
  '8':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '9':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘In the same way I will ruin the pride of Judah and the great pride of Jerusalem. '
