document_id: JOB.41,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 41:1-8 is numbered 40:25-32, and 41:9-34 is numbered 41:1-26.
      marker-yv: yv-n
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Can you pull in Leviathan with a fishhook
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or tie down its tongue with a rope?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: No one is fierce enough to rouse it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who then is able to stand against me?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Who has a claim against me that I must pay?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Everything under heaven belongs to me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “I will not fail to speak of Leviathan’s limbs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its strength and its graceful form.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Who can strip off its outer coat?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can penetrate its double coat of armor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: double bridle
      marker-yv: yv-n
    - type: text
      text: '?'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Who dares open the doors of its mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ringed about with fearsome teeth?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Its back has
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Its pride is its
      marker-yv: yv-n
    - type: text
      text: ' rows of shields'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tightly sealed together;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: each is so close to the next
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that no air can pass between.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They are joined fast to one another;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they cling together and cannot be parted.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Its snorting throws out flashes of light;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its eyes are like the rays of dawn.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Flames stream from its mouth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sparks of fire shoot out.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Can you put a cord through its nose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or pierce its jaw with a hook?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Smoke pours from its nostrils
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as from a boiling pot over burning reeds.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Its breath sets coals ablaze,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and flames dart from its mouth.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Strength resides in its neck;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dismay goes before it.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The folds of its flesh are tightly joined;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are firm and immovable.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Its chest is hard as rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hard as a lower millstone.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: When it rises up, the mighty are terrified;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they retreat before its thrashing.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The sword that reaches it has no effect,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor does the spear or the dart or the javelin.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Iron it treats like straw
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bronze like rotten wood.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Arrows do not make it flee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slingstones are like chaff to it.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: A club seems to it but a piece of straw;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it laughs at the rattling of the lance.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Will it keep begging you for mercy?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will it speak to you with gentle words?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Its undersides are jagged potsherds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving a trail in the mud like a threshing sledge.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: It makes the depths churn like a boiling caldron
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stirs up the sea like a pot of ointment.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: It leaves a glistening wake behind it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one would think the deep had white hair.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Nothing on earth is its equal—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a creature without fear.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: It looks down on all that are haughty;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is king over all that are proud.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Will it make an agreement with you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you to take it as your slave for life?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Can you make a pet of it like a bird
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or put it on a leash for the young women in your house?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Will traders barter for it?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will they divide it up among the merchants?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Can you fill its hide with harpoons
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or its head with fishing spears?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: If you lay a hand on it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will remember the struggle and never do it again!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Any hope of subduing it is false;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mere sight of it is overpowering.
