document_id: JOB.41,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 41:1-8 is numbered 40:25-32, and 41:9-34 is numbered 41:1-26.
  - type: text
    content: “Can you pull in Leviathan with a fishhook
  - type: text
    content: or tie down its tongue with a rope?
  '10':
  - type: text
    content: No one is fierce enough to rouse it.
  - type: text
    content: Who then is able to stand against me?
  '11':
  - type: text
    content: Who has a claim against me that I must pay?
  - type: text
    content: Everything under heaven belongs to me.
  '12':
  - type: text
    content: “I will not fail to speak of Leviathan’s limbs,
  - type: text
    content: its strength and its graceful form.
  '13':
  - type: text
    content: Who can strip off its outer coat?
  - type: text
    content: Who can penetrate its double coat of armor
  - type: note
    content: Septuagint; Hebrew double bridle
  - type: text
    content: '?'
  '14':
  - type: text
    content: Who dares open the doors of its mouth,
  - type: text
    content: ringed about with fearsome teeth?
  '15':
  - type: text
    content: Its back has
  - type: note
    content: Or Its pride is its
  - type: text
    content: ' rows of shields'
  - type: text
    content: tightly sealed together;
  '16':
  - type: text
    content: each is so close to the next
  - type: text
    content: that no air can pass between.
  '17':
  - type: text
    content: They are joined fast to one another;
  - type: text
    content: they cling together and cannot be parted.
  '18':
  - type: text
    content: Its snorting throws out flashes of light;
  - type: text
    content: its eyes are like the rays of dawn.
  '19':
  - type: text
    content: Flames stream from its mouth;
  - type: text
    content: sparks of fire shoot out.
  '2':
  - type: text
    content: Can you put a cord through its nose
  - type: text
    content: or pierce its jaw with a hook?
  '20':
  - type: text
    content: Smoke pours from its nostrils
  - type: text
    content: as from a boiling pot over burning reeds.
  '21':
  - type: text
    content: Its breath sets coals ablaze,
  - type: text
    content: and flames dart from its mouth.
  '22':
  - type: text
    content: Strength resides in its neck;
  - type: text
    content: dismay goes before it.
  '23':
  - type: text
    content: The folds of its flesh are tightly joined;
  - type: text
    content: they are firm and immovable.
  '24':
  - type: text
    content: Its chest is hard as rock,
  - type: text
    content: hard as a lower millstone.
  '25':
  - type: text
    content: When it rises up, the mighty are terrified;
  - type: text
    content: they retreat before its thrashing.
  '26':
  - type: text
    content: The sword that reaches it has no effect,
  - type: text
    content: nor does the spear or the dart or the javelin.
  '27':
  - type: text
    content: Iron it treats like straw
  - type: text
    content: and bronze like rotten wood.
  '28':
  - type: text
    content: Arrows do not make it flee;
  - type: text
    content: slingstones are like chaff to it.
  '29':
  - type: text
    content: A club seems to it but a piece of straw;
  - type: text
    content: it laughs at the rattling of the lance.
  '3':
  - type: text
    content: Will it keep begging you for mercy?
  - type: text
    content: Will it speak to you with gentle words?
  '30':
  - type: text
    content: Its undersides are jagged potsherds,
  - type: text
    content: leaving a trail in the mud like a threshing sledge.
  '31':
  - type: text
    content: It makes the depths churn like a boiling caldron
  - type: text
    content: and stirs up the sea like a pot of ointment.
  '32':
  - type: text
    content: It leaves a glistening wake behind it;
  - type: text
    content: one would think the deep had white hair.
  '33':
  - type: text
    content: Nothing on earth is its equal—
  - type: text
    content: a creature without fear.
  '34':
  - type: text
    content: It looks down on all that are haughty;
  - type: text
    content: it is king over all that are proud.”
  '4':
  - type: text
    content: Will it make an agreement with you
  - type: text
    content: for you to take it as your slave for life?
  '5':
  - type: text
    content: Can you make a pet of it like a bird
  - type: text
    content: or put it on a leash for the young women in your house?
  '6':
  - type: text
    content: Will traders barter for it?
  - type: text
    content: Will they divide it up among the merchants?
  '7':
  - type: text
    content: Can you fill its hide with harpoons
  - type: text
    content: or its head with fishing spears?
  '8':
  - type: text
    content: If you lay a hand on it,
  - type: text
    content: you will remember the struggle and never do it again!
  '9':
  - type: text
    content: Any hope of subduing it is false;
  - type: text
    content: the mere sight of it is overpowering.
