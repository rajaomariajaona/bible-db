document_id: PSA.127,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 127
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of ascents. Of Solomon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' builds the house,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the builders labor in vain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' watches over the city,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the guards stand watch in vain.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In vain you rise early
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stay up late,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toiling for food to eat—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he grants sleep to
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '127:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: eat— / for while they sleep he provides for
      marker-yv: yv-n
    - type: text
      text: ' those he loves.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Children are a heritage from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: offspring a reward from him.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like arrows in the hands of a warrior
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are children born in one’s youth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed is the man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose quiver is full of them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will not be put to shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they contend with their opponents in court.
