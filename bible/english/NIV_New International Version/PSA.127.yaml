document_id: PSA.127,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 127
  - type: text
    content: A song of ascents. Of Solomon.
  - type: text
    content: 'Unless the '
  - type: text
    content: Lord
  - type: text
    content: ' builds the house,'
  - type: text
    content: the builders labor in vain.
  - type: text
    content: 'Unless the '
  - type: text
    content: Lord
  - type: text
    content: ' watches over the city,'
  - type: text
    content: the guards stand watch in vain.
  '2':
  - type: text
    content: In vain you rise early
  - type: text
    content: and stay up late,
  - type: text
    content: toiling for food to eat—
  - type: text
    content: for he grants sleep to
  - type: note
    content: Or eat— / for while they sleep he provides for
  - type: text
    content: ' those he loves.'
  '3':
  - type: text
    content: 'Children are a heritage from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: offspring a reward from him.
  '4':
  - type: text
    content: Like arrows in the hands of a warrior
  - type: text
    content: are children born in one’s youth.
  '5':
  - type: text
    content: Blessed is the man
  - type: text
    content: whose quiver is full of them.
  - type: text
    content: They will not be put to shame
  - type: text
    content: when they contend with their opponents in court.
