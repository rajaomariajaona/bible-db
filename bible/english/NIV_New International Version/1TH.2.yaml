document_id: 1TH.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Ministry in Thessalonica
  - type: text
    content: 'You know, brothers and sisters, that our visit to you was not without results. '
  '10':
  - type: text
    content: 'You are witnesses, and so is God, of how holy, righteous and blameless we were among you who believed. '
  '11':
  - type: text
    content: 'For you know that we dealt with each of you as a father deals with his own children, '
  '12':
  - type: text
    content: encouraging, comforting and urging you to live lives worthy of God, who calls you into his kingdom and glory.
  '13':
  - type: text
    content: 'And we also thank God continually because, when you received the word of God, which you heard from us, you accepted it not as a human word, but as it actually is, the word of God, which is indeed at work in you who believe. '
  '14':
  - type: text
    content: 'For you, brothers and sisters, became imitators of God’s churches in Judea, which are in Christ Jesus: You suffered from your own people the same things those churches suffered from the Jews '
  '15':
  - type: text
    content: 'who killed the Lord Jesus and the prophets and also drove us out. They displease God and are hostile to everyone '
  '16':
  - type: text
    content: in their effort to keep us from speaking to the Gentiles so that they may be saved. In this way they always heap up their sins to the limit. The wrath of God has come upon them at last.
  - type: note
    content: Or them fully
  - type: heading
    content: Paul’s Longing to See the Thessalonians
  '17':
  - type: text
    content: 'But, brothers and sisters, when we were orphaned by being separated from you for a short time (in person, not in thought), out of our intense longing we made every effort to see you. '
  '18':
  - type: text
    content: 'For we wanted to come to you—certainly I, Paul, did, again and again—but Satan blocked our way. '
  '19':
  - type: text
    content: 'For what is our hope, our joy, or the crown in which we will glory in the presence of our Lord Jesus when he comes? Is it not you? '
  '2':
  - type: text
    content: 'We had previously suffered and been treated outrageously in Philippi, as you know, but with the help of our God we dared to tell you his gospel in the face of strong opposition. '
  '20':
  - type: text
    content: Indeed, you are our glory and joy.
  '3':
  - type: text
    content: 'For the appeal we make does not spring from error or impure motives, nor are we trying to trick you. '
  '4':
  - type: text
    content: 'On the contrary, we speak as those approved by God to be entrusted with the gospel. We are not trying to please people but God, who tests our hearts. '
  '5':
  - type: text
    content: 'You know we never used flattery, nor did we put on a mask to cover up greed—God is our witness. '
  '6':
  - type: text
    content: 'We were not looking for praise from people, not from you or anyone else, even though as apostles of Christ we could have asserted our authority. '
  '7':
  - type: text
    content: Instead, we were like young children
  - type: note
    content: Some manuscripts were gentle
  - type: text
    content: ' among you.'
  - type: text
    content: 'Just as a nursing mother cares for her children, '
  '8':
  - type: text
    content: 'so we cared for you. Because we loved you so much, we were delighted to share with you not only the gospel of God but our lives as well. '
  '9':
  - type: text
    content: 'Surely you remember, brothers and sisters, our toil and hardship; we worked night and day in order not to be a burden to anyone while we preached the gospel of God to you. '
