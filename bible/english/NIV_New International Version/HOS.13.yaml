document_id: HOS.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Anger Against Israel
  - type: text
    content: When Ephraim spoke, people trembled;
  - type: text
    content: he was exalted in Israel.
  - type: text
    content: But he became guilty of Baal worship and died.
  '10':
  - type: text
    content: Where is your king, that he may save you?
  - type: text
    content: Where are your rulers in all your towns,
  - type: text
    content: of whom you said,
  - type: text
    content: ‘Give me a king and princes’?
  '11':
  - type: text
    content: So in my anger I gave you a king,
  - type: text
    content: and in my wrath I took him away.
  '12':
  - type: text
    content: The guilt of Ephraim is stored up,
  - type: text
    content: his sins are kept on record.
  '13':
  - type: text
    content: Pains as of a woman in childbirth come to him,
  - type: text
    content: but he is a child without wisdom;
  - type: text
    content: when the time arrives,
  - type: text
    content: he doesn’t have the sense to come out of the womb.
  '14':
  - type: text
    content: “I will deliver this people from the power of the grave;
  - type: text
    content: I will redeem them from death.
  - type: text
    content: Where, O death, are your plagues?
  - type: text
    content: Where, O grave, is your destruction?
  - type: text
    content: “I will have no compassion,
  '15':
  - type: text
    content: even though he thrives among his brothers.
  - type: text
    content: 'An east wind from the '
  - type: text
    content: Lord
  - type: text
    content: ' will come,'
  - type: text
    content: blowing in from the desert;
  - type: text
    content: his spring will fail
  - type: text
    content: and his well dry up.
  - type: text
    content: His storehouse will be plundered
  - type: text
    content: of all its treasures.
  '16':
  - type: text
    content: The people of Samaria must bear their guilt,
  - type: text
    content: because they have rebelled against their God.
  - type: text
    content: They will fall by the sword;
  - type: text
    content: their little ones will be dashed to the ground,
  - type: text
    content: their pregnant women ripped open.”
  - type: note
    content: In Hebrew texts this verse (13:16) is numbered 14:1.
  '2':
  - type: text
    content: Now they sin more and more;
  - type: text
    content: they make idols for themselves from their silver,
  - type: text
    content: cleverly fashioned images,
  - type: text
    content: all of them the work of craftsmen.
  - type: text
    content: It is said of these people,
  - type: text
    content: “They offer human sacrifices!
  - type: text
    content: They kiss
  - type: note
    content: Or “Men who sacrifice / kiss
  - type: text
    content: ' calf-idols!”'
  '3':
  - type: text
    content: Therefore they will be like the morning mist,
  - type: text
    content: like the early dew that disappears,
  - type: text
    content: like chaff swirling from a threshing floor,
  - type: text
    content: like smoke escaping through a window.
  '4':
  - type: text
    content: '“But I have been the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: ever since you came out of Egypt.
  - type: text
    content: You shall acknowledge no God but me,
  - type: text
    content: no Savior except me.
  '5':
  - type: text
    content: I cared for you in the wilderness,
  - type: text
    content: in the land of burning heat.
  '6':
  - type: text
    content: When I fed them, they were satisfied;
  - type: text
    content: when they were satisfied, they became proud;
  - type: text
    content: then they forgot me.
  '7':
  - type: text
    content: So I will be like a lion to them,
  - type: text
    content: like a leopard I will lurk by the path.
  '8':
  - type: text
    content: Like a bear robbed of her cubs,
  - type: text
    content: I will attack them and rip them open;
  - type: text
    content: like a lion I will devour them—
  - type: text
    content: a wild animal will tear them apart.
  '9':
  - type: text
    content: “You are destroyed, Israel,
  - type: text
    content: because you are against me, against your helper.
