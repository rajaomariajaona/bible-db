document_id: HOS.13,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Anger Against Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When Ephraim spoke, people trembled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he was exalted in Israel.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But he became guilty of Baal worship and died.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is your king, that he may save you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where are your rulers in all your towns,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of whom you said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Give me a king and princes’?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So in my anger I gave you a king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in my wrath I took him away.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The guilt of Ephraim is stored up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his sins are kept on record.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pains as of a woman in childbirth come to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he is a child without wisdom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when the time arrives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he doesn’t have the sense to come out of the womb.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will deliver this people from the power of the grave;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will redeem them from death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where, O death, are your plagues?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where, O grave, is your destruction?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will have no compassion,
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even though he thrives among his brothers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'An east wind from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will come,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blowing in from the desert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his spring will fail
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his well dry up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His storehouse will be plundered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of all its treasures.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Samaria must bear their guilt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they have rebelled against their God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will fall by the sword;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their little ones will be dashed to the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their pregnant women ripped open.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts this verse (13:16) is numbered 14:1.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now they sin more and more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they make idols for themselves from their silver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cleverly fashioned images,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all of them the work of craftsmen.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is said of these people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “They offer human sacrifices!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They kiss
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “Men who sacrifice / kiss
      marker-yv: yv-n
    - type: text
      text: ' calf-idols!”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore they will be like the morning mist,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the early dew that disappears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like chaff swirling from a threshing floor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like smoke escaping through a window.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“But I have been the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ever since you came out of Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shall acknowledge no God but me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no Savior except me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cared for you in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the land of burning heat.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I fed them, they were satisfied;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they were satisfied, they became proud;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then they forgot me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will be like a lion to them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a leopard I will lurk by the path.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a bear robbed of her cubs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will attack them and rip them open;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a lion I will devour them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wild animal will tear them apart.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are destroyed, Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because you are against me, against your helper.
