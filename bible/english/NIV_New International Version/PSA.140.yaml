document_id: PSA.140
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 140
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 140:1-13 is numbered 140:2-14.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rescue me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', from evildoers;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: protect me from the violent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: who devise evil plans in their hearts
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stir up war every day.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They make their tongues as sharp as a serpent’s;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the poison of vipers is on their lips.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '140:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here and at the end of verses 5 and 8.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Keep me safe, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', from the hands of the wicked;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: protect me from the violent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who devise ways to trip my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The arrogant have hidden a snare for me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have spread out the cords of their net
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have set traps for me along my path.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I say to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “You are my God.”'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Hear, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my cry for mercy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my strong deliverer,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you shield my head in the day of battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Do not grant the wicked their desires, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let their plans succeed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Those who surround me proudly rear their heads;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may the mischief of their lips engulf them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: May burning coals fall on them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may they be thrown into the fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: into miry pits, never to rise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: May slanderers not be established in the land;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may disaster hunt down the violent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I know that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' secures justice for the poor'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and upholds the cause of the needy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Surely the righteous will praise your name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the upright will live in your presence.
