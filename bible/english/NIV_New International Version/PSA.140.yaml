document_id: PSA.140,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 140In Hebrew texts 140:1-13 is numbered 140:2-14.
  - type: text
    content: For the director of music. A psalm of David.
  - type: text
    content: 'Rescue me, '
  - type: text
    content: Lord
  - type: text
    content: ', from evildoers;'
  - type: text
    content: protect me from the violent,
  '10':
  - type: text
    content: May burning coals fall on them;
  - type: text
    content: may they be thrown into the fire,
  - type: text
    content: into miry pits, never to rise.
  '11':
  - type: text
    content: May slanderers not be established in the land;
  - type: text
    content: may disaster hunt down the violent.
  '12':
  - type: text
    content: 'I know that the '
  - type: text
    content: Lord
  - type: text
    content: ' secures justice for the poor'
  - type: text
    content: and upholds the cause of the needy.
  '13':
  - type: text
    content: Surely the righteous will praise your name,
  - type: text
    content: and the upright will live in your presence.
  '2':
  - type: text
    content: who devise evil plans in their hearts
  - type: text
    content: and stir up war every day.
  '3':
  - type: text
    content: They make their tongues as sharp as a serpent’s;
  - type: text
    content: the poison of vipers is on their lips.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verses 5 and 8.
  '4':
  - type: text
    content: 'Keep me safe, '
  - type: text
    content: Lord
  - type: text
    content: ', from the hands of the wicked;'
  - type: text
    content: protect me from the violent,
  - type: text
    content: who devise ways to trip my feet.
  '5':
  - type: text
    content: The arrogant have hidden a snare for me;
  - type: text
    content: they have spread out the cords of their net
  - type: text
    content: and have set traps for me along my path.
  '6':
  - type: text
    content: 'I say to the '
  - type: text
    content: Lord
  - type: text
    content: ', “You are my God.”'
  - type: text
    content: 'Hear, '
  - type: text
    content: Lord
  - type: text
    content: ', my cry for mercy.'
  '7':
  - type: text
    content: 'Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', my strong deliverer,'
  - type: text
    content: you shield my head in the day of battle.
  '8':
  - type: text
    content: 'Do not grant the wicked their desires, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: do not let their plans succeed.
  '9':
  - type: text
    content: Those who surround me proudly rear their heads;
  - type: text
    content: may the mischief of their lips engulf them.
