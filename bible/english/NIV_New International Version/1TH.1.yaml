document_id: 1TH.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: Paul, Silas
  - type: note
    content: Greek Silvanus, a variant of Silas
  - type: text
    content: ' and Timothy,'
  - type: text
    content: 'To the church of the Thessalonians in God the Father and the Lord Jesus Christ:'
  - type: text
    content: Grace and peace to you.
  - type: heading
    content: Thanksgiving for the Thessalonians’ Faith
  '10':
  - type: text
    content: and to wait for his Son from heaven, whom he raised from the dead—Jesus, who rescues us from the coming wrath.
  '2':
  - type: text
    content: 'We always thank God for all of you and continually mention you in our prayers. '
  '3':
  - type: text
    content: We remember before our God and Father your work produced by faith, your labor prompted by love, and your endurance inspired by hope in our Lord Jesus Christ.
  '4':
  - type: text
    content: For we know, brothers and sisters
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in 2:1, 9, 14, 17; 3:7; 4:1, 10, 13; 5:1, 4, 12, 14, 25, 27.
  - type: text
    content: ' loved by God, that he has chosen you, '
  '5':
  - type: text
    content: 'because our gospel came to you not simply with words but also with power, with the Holy Spirit and deep conviction. You know how we lived among you for your sake. '
  '6':
  - type: text
    content: 'You became imitators of us and of the Lord, for you welcomed the message in the midst of severe suffering with the joy given by the Holy Spirit. '
  '7':
  - type: text
    content: 'And so you became a model to all the believers in Macedonia and Achaia. '
  '8':
  - type: text
    content: 'The Lord’s message rang out from you not only in Macedonia and Achaia—your faith in God has become known everywhere. Therefore we do not need to say anything about it, '
  '9':
  - type: text
    content: 'for they themselves report what kind of reception you gave us. They tell how you turned to God from idols to serve the living and true God, '
