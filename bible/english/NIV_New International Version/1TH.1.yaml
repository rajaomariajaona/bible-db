        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Silvanus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Silas
      marker-yv: yv-n
    - type: text
      text: ' and Timothy,'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the church of the Thessalonians in God the Father and the Lord Jesus Christ:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace and peace to you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Thanksgiving for the Thessalonians’ Faith
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and to wait for his Son from heaven, whom he raised from the dead—Jesus, who rescues us from the coming wrath.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We always thank God for all of you and continually mention you in our prayers. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We remember before our God and Father your work produced by faith, your labor prompted by love, and your endurance inspired by hope in our Lord Jesus Christ.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For we know, brothers and sisters
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brothers and sisters '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: adelphoi
        - type: text
          text: ) refers here to believers, both men and women, as part of God’s family; also in 2:1, 9, 14, 17; 3:7; 4:1, 10, 13; 5:1, 4, 12, 14, 25, 27.
      marker-yv: yv-n
    - type: text
      text: ' loved by God, that he has chosen you, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because our gospel came to you not simply with words but also with power, with the Holy Spirit and deep conviction. You know how we lived among you for your sake. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You became imitators of us and of the Lord, for you welcomed the message in the midst of severe suffering with the joy given by the Holy Spirit. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so you became a model to all the believers in Macedonia and Achaia. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Lord’s message rang out from you not only in Macedonia and Achaia—your faith in God has become known everywhere. Therefore we do not need to say anything about it, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for they themselves report what kind of reception you gave us. They tell how you turned to God from idols to serve the living and true God, '
