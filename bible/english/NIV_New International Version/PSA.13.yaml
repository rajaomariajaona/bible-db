document_id: PSA.13,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 13
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 13:1-6 is numbered 13:2-6.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How long, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '? Will you forget me forever?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will you hide your face from me?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How long must I wrestle with my thoughts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and day after day have sorrow in my heart?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will my enemy triumph over me?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look on me and answer, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give light to my eyes, or I will sleep in death,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my enemy will say, “I have overcome him,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my foes will rejoice when I fall.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I trust in your unfailing love;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my heart rejoices in your salvation.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s praise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he has been good to me.
