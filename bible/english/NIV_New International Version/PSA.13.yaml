  children:
  - type: text
    text: For the director of music. A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'How long, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '? Will you forget me forever?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will you hide your face from me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: How long must I wrestle with my thoughts
- type: usfm
  marker: q2
  children:
  - type: text
    text: and day after day have sorrow in my heart?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will my enemy triumph over me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Look on me and answer, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Give light to my eyes, or I will sleep in death,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and my enemy will say, “I have overcome him,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my foes will rejoice when I fall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But I trust in your unfailing love;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my heart rejoices in your salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will sing the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s praise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he has been good to me.
