  '1':
  - type: heading
    content: Psalm 13In Hebrew texts 13:1-6 is numbered 13:2-6.
  - type: text
    content: For the director of music. A psalm of David.
  - type: text
    content: 'How long, '
  - type: text
    content: Lord
  - type: text
    content: '? Will you forget me forever?'
  - type: text
    content: How long will you hide your face from me?
  '2':
  - type: text
    content: How long must I wrestle with my thoughts
  - type: text
    content: and day after day have sorrow in my heart?
  - type: text
    content: How long will my enemy triumph over me?
  '3':
  - type: text
    content: 'Look on me and answer, '
  - type: text
    content: Lord
  - type: text
    content: ' my God.'
  - type: text
    content: Give light to my eyes, or I will sleep in death,
  '4':
  - type: text
    content: and my enemy will say, “I have overcome him,”
  - type: text
    content: and my foes will rejoice when I fall.
  '5':
  - type: text
    content: But I trust in your unfailing love;
  - type: text
    content: my heart rejoices in your salvation.
  '6':
  - type: text
    content: 'I will sing the '
  - type: text
    content: Lord
  - type: text
    content: ’s praise,
  - type: text
    content: for he has been good to me.
