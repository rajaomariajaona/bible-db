document_id: 2CH.31,111
type_code: eng
verses:
  '1':
  - type: text
    content: When all this had ended, the Israelites who were there went out to the towns of Judah, smashed the sacred stones and cut down the Asherah poles. They destroyed the high places and the altars throughout Judah and Benjamin and in Ephraim and Manasseh. After they had destroyed all of them, the Israelites returned to their own towns and to their own property.
  - type: heading
    content: Contributions for Worship
  '10':
  - type: text
    content: 'and Azariah the chief priest, from the family of Zadok, answered, “Since the people began to bring their contributions to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', we have had enough to eat and plenty to spare, because the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed his people, and this great amount is left over.”'
  '11':
  - type: text
    content: 'Hezekiah gave orders to prepare storerooms in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and this was done. '
  '12':
  - type: text
    content: 'Then they faithfully brought in the contributions, tithes and dedicated gifts. Konaniah, a Levite, was the overseer in charge of these things, and his brother Shimei was next in rank. '
  '13':
  - type: text
    content: Jehiel, Azaziah, Nahath, Asahel, Jerimoth, Jozabad, Eliel, Ismakiah, Mahath and Benaiah were assistants of Konaniah and Shimei his brother. All these served by appointment of King Hezekiah and Azariah the official in charge of the temple of God.
  '14':
  - type: text
    content: 'Kore son of Imnah the Levite, keeper of the East Gate, was in charge of the freewill offerings given to God, distributing the contributions made to the '
  - type: text
    content: Lord
  - type: text
    content: ' and also the consecrated gifts. '
  '15':
  - type: text
    content: Eden, Miniamin, Jeshua, Shemaiah, Amariah and Shekaniah assisted him faithfully in the towns of the priests, distributing to their fellow priests according to their divisions, old and young alike.
  '16':
  - type: text
    content: 'In addition, they distributed to the males three years old or more whose names were in the genealogical records—all who would enter the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' to perform the daily duties of their various tasks, according to their responsibilities and their divisions. '
  '17':
  - type: text
    content: 'And they distributed to the priests enrolled by their families in the genealogical records and likewise to the Levites twenty years old or more, according to their responsibilities and their divisions. '
  '18':
  - type: text
    content: They included all the little ones, the wives, and the sons and daughters of the whole community listed in these genealogical records. For they were faithful in consecrating themselves.
  '19':
  - type: text
    content: As for the priests, the descendants of Aaron, who lived on the farm lands around their towns or in any other towns, men were designated by name to distribute portions to every male among them and to all who were recorded in the genealogies of the Levites.
  '2':
  - type: text
    content: 'Hezekiah assigned the priests and Levites to divisions—each of them according to their duties as priests or Levites—to offer burnt offerings and fellowship offerings, to minister, to give thanks and to sing praises at the gates of the '
  - type: text
    content: Lord
  - type: text
    content: '’s dwelling. '
  '20':
  - type: text
    content: 'This is what Hezekiah did throughout Judah, doing what was good and right and faithful before the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '21':
  - type: text
    content: In everything that he undertook in the service of God’s temple and in obedience to the law and the commands, he sought his God and worked wholeheartedly. And so he prospered.
  '3':
  - type: text
    content: 'The king contributed from his own possessions for the morning and evening burnt offerings and for the burnt offerings on the Sabbaths, at the New Moons and at the appointed festivals as written in the Law of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'He ordered the people living in Jerusalem to give the portion due the priests and Levites so they could devote themselves to the Law of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'As soon as the order went out, the Israelites generously gave the firstfruits of their grain, new wine, olive oil and honey and all that the fields produced. They brought a great amount, a tithe of everything. '
  '6':
  - type: text
    content: 'The people of Israel and Judah who lived in the towns of Judah also brought a tithe of their herds and flocks and a tithe of the holy things dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, and they piled them in heaps. '
  '7':
  - type: text
    content: 'They began doing this in the third month and finished in the seventh month. '
  '8':
  - type: text
    content: 'When Hezekiah and his officials came and saw the heaps, they praised the '
  - type: text
    content: Lord
  - type: text
    content: ' and blessed his people Israel.'
  '9':
  - type: text
    content: 'Hezekiah asked the priests and Levites about the heaps; '
