document_id: PSA.61,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 61
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 61:1-8 is numbered 61:2-9.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. With stringed instruments. Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear my cry, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to my prayer.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the ends of the earth I call to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I call as my heart grows faint;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lead me to the rock that is higher than I.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have been my refuge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a strong tower against the foe.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I long to dwell in your tent forever
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take refuge in the shelter of your wings.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you, God, have heard my vows;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have given me the heritage of those who fear your name.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Increase the days of the king’s life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his years for many generations.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May he be enthroned in God’s presence forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: appoint your love and faithfulness to protect him.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will ever sing in praise of your name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fulfill my vows day after day.
