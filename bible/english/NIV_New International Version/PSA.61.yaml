document_id: PSA.61,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 61In Hebrew texts 61:1-8 is numbered 61:2-9.
  - type: text
    content: For the director of music. With stringed instruments. Of David.
  - type: text
    content: Hear my cry, O God;
  - type: text
    content: listen to my prayer.
  '2':
  - type: text
    content: From the ends of the earth I call to you,
  - type: text
    content: I call as my heart grows faint;
  - type: text
    content: lead me to the rock that is higher than I.
  '3':
  - type: text
    content: For you have been my refuge,
  - type: text
    content: a strong tower against the foe.
  '4':
  - type: text
    content: I long to dwell in your tent forever
  - type: text
    content: and take refuge in the shelter of your wings.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '5':
  - type: text
    content: For you, God, have heard my vows;
  - type: text
    content: you have given me the heritage of those who fear your name.
  '6':
  - type: text
    content: Increase the days of the king’s life,
  - type: text
    content: his years for many generations.
  '7':
  - type: text
    content: May he be enthroned in God’s presence forever;
  - type: text
    content: appoint your love and faithfulness to protect him.
  '8':
  - type: text
    content: Then I will ever sing in praise of your name
  - type: text
    content: and fulfill my vows day after day.
