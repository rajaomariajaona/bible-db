document_id: ECC.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A good name is better than fine perfume,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the day of death better than the day of birth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not say, “Why were the old days better than these?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For it is not wise to ask such questions.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom, like an inheritance, is a good thing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and benefits those who see the sun.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom is a shelter
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as money is a shelter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but the advantage of knowledge is this:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wisdom preserves those who have it.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Consider what God has done:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can straighten
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what he has made crooked?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When times are good, be happy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but when times are bad, consider this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has made the one
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as well as the other.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, no one can discover
  - type: usfm
    marker: q2
    children:
    - type: text
      text: anything about their future.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In this meaningless life of mine I have seen both of these:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the righteous perishing in their righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the wicked living long in their wickedness.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be overrighteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: neither be overwise—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: why destroy yourself?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be overwicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not be a fool—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: why die before your time?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is good to grasp the one
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not let go of the other.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whoever fears God will avoid all extremes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will follow them both
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom makes one wise person more powerful
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than ten rulers in a city.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is better to go to a house of mourning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to go to a house of feasting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for death is the destiny of everyone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the living should take this to heart.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indeed, there is no one on earth who is righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one who does what is right and never sins.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not pay attention to every word people say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or you may hear your servant cursing you—
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you know in your heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that many times you yourself have cursed others.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All this I tested by wisdom and I said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am determined to be wise”—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but this was beyond me.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whatever exists is far off and most profound—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who can discover it?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I turned my mind to understand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to investigate and to search out wisdom and the scheme of things
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to understand the stupidity of wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the madness of folly.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I find more bitter than death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the woman who is a snare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose heart is a trap
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whose hands are chains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The man who pleases God will escape her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the sinner she will ensnare.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Look,” says the Teacher,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the leader of the assembly
      marker-yv: yv-n
    - type: text
      text: ' “this is what I have discovered:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Adding one thing to another to discover the scheme of things—
  '28':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while I was still searching
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but not finding—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I found one upright man among a thousand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but not one upright woman among them all.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This only have I found:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God created mankind upright,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they have gone in search of many schemes.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frustration is better than laughter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because a sad face is good for the heart.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The heart of the wise is in the house of mourning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the heart of fools is in the house of pleasure.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is better to heed the rebuke of a wise person
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than to listen to the song of fools.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like the crackling of thorns under the pot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so is the laughter of fools.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: This too is meaningless.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Extortion turns a wise person into a fool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a bribe corrupts the heart.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The end of a matter is better than its beginning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and patience is better than pride.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not be quickly provoked in your spirit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for anger resides in the lap of fools.
