document_id: ECC.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom
  - type: text
    content: A good name is better than fine perfume,
  - type: text
    content: and the day of death better than the day of birth.
  '10':
  - type: text
    content: Do not say, “Why were the old days better than these?”
  - type: text
    content: For it is not wise to ask such questions.
  '11':
  - type: text
    content: Wisdom, like an inheritance, is a good thing
  - type: text
    content: and benefits those who see the sun.
  '12':
  - type: text
    content: Wisdom is a shelter
  - type: text
    content: as money is a shelter,
  - type: text
    content: 'but the advantage of knowledge is this:'
  - type: text
    content: Wisdom preserves those who have it.
  '13':
  - type: text
    content: 'Consider what God has done:'
  - type: text
    content: Who can straighten
  - type: text
    content: what he has made crooked?
  '14':
  - type: text
    content: When times are good, be happy;
  - type: text
    content: 'but when times are bad, consider this:'
  - type: text
    content: God has made the one
  - type: text
    content: as well as the other.
  - type: text
    content: Therefore, no one can discover
  - type: text
    content: anything about their future.
  '15':
  - type: text
    content: 'In this meaningless life of mine I have seen both of these:'
  - type: text
    content: the righteous perishing in their righteousness,
  - type: text
    content: and the wicked living long in their wickedness.
  '16':
  - type: text
    content: Do not be overrighteous,
  - type: text
    content: neither be overwise—
  - type: text
    content: why destroy yourself?
  '17':
  - type: text
    content: Do not be overwicked,
  - type: text
    content: and do not be a fool—
  - type: text
    content: why die before your time?
  '18':
  - type: text
    content: It is good to grasp the one
  - type: text
    content: and not let go of the other.
  - type: text
    content: Whoever fears God will avoid all extremes.
  - type: note
    content: Or will follow them both
  '19':
  - type: text
    content: Wisdom makes one wise person more powerful
  - type: text
    content: than ten rulers in a city.
  '2':
  - type: text
    content: It is better to go to a house of mourning
  - type: text
    content: than to go to a house of feasting,
  - type: text
    content: for death is the destiny of everyone;
  - type: text
    content: the living should take this to heart.
  '20':
  - type: text
    content: Indeed, there is no one on earth who is righteous,
  - type: text
    content: no one who does what is right and never sins.
  '21':
  - type: text
    content: Do not pay attention to every word people say,
  - type: text
    content: or you may hear your servant cursing you—
  '22':
  - type: text
    content: for you know in your heart
  - type: text
    content: that many times you yourself have cursed others.
  '23':
  - type: text
    content: All this I tested by wisdom and I said,
  - type: text
    content: “I am determined to be wise”—
  - type: text
    content: but this was beyond me.
  '24':
  - type: text
    content: Whatever exists is far off and most profound—
  - type: text
    content: who can discover it?
  '25':
  - type: text
    content: So I turned my mind to understand,
  - type: text
    content: to investigate and to search out wisdom and the scheme of things
  - type: text
    content: and to understand the stupidity of wickedness
  - type: text
    content: and the madness of folly.
  '26':
  - type: text
    content: I find more bitter than death
  - type: text
    content: the woman who is a snare,
  - type: text
    content: whose heart is a trap
  - type: text
    content: and whose hands are chains.
  - type: text
    content: The man who pleases God will escape her,
  - type: text
    content: but the sinner she will ensnare.
  '27':
  - type: text
    content: “Look,” says the Teacher,
  - type: note
    content: Or the leader of the assembly
  - type: text
    content: ' “this is what I have discovered:'
  - type: text
    content: “Adding one thing to another to discover the scheme of things—
  '28':
  - type: text
    content: while I was still searching
  - type: text
    content: but not finding—
  - type: text
    content: I found one upright man among a thousand,
  - type: text
    content: but not one upright woman among them all.
  '29':
  - type: text
    content: 'This only have I found:'
  - type: text
    content: God created mankind upright,
  - type: text
    content: but they have gone in search of many schemes.”
  '3':
  - type: text
    content: Frustration is better than laughter,
  - type: text
    content: because a sad face is good for the heart.
  '4':
  - type: text
    content: The heart of the wise is in the house of mourning,
  - type: text
    content: but the heart of fools is in the house of pleasure.
  '5':
  - type: text
    content: It is better to heed the rebuke of a wise person
  - type: text
    content: than to listen to the song of fools.
  '6':
  - type: text
    content: Like the crackling of thorns under the pot,
  - type: text
    content: so is the laughter of fools.
  - type: text
    content: This too is meaningless.
  '7':
  - type: text
    content: Extortion turns a wise person into a fool,
  - type: text
    content: and a bribe corrupts the heart.
  '8':
  - type: text
    content: The end of a matter is better than its beginning,
  - type: text
    content: and patience is better than pride.
  '9':
  - type: text
    content: Do not be quickly provoked in your spirit,
  - type: text
    content: for anger resides in the lap of fools.
