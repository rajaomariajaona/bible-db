document_id: ECC.6,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'I have seen another evil under the sun, and it weighs heavily on mankind: '
  '10':
  - type: text
    content: Whatever exists has already been named,
  - type: text
    content: and what humanity is has been known;
  - type: text
    content: no one can contend
  - type: text
    content: with someone who is stronger.
  '11':
  - type: text
    content: The more the words,
  - type: text
    content: the less the meaning,
  - type: text
    content: and how does that profit anyone?
  '12':
  - type: text
    content: For who knows what is good for a person in life, during the few and meaningless days they pass through like a shadow? Who can tell them what will happen under the sun after they are gone?
  '2':
  - type: text
    content: God gives some people wealth, possessions and honor, so that they lack nothing their hearts desire, but God does not grant them the ability to enjoy them, and strangers enjoy them instead. This is meaningless, a grievous evil.
  '3':
  - type: text
    content: 'A man may have a hundred children and live many years; yet no matter how long he lives, if he cannot enjoy his prosperity and does not receive proper burial, I say that a stillborn child is better off than he. '
  '4':
  - type: text
    content: 'It comes without meaning, it departs in darkness, and in darkness its name is shrouded. '
  '5':
  - type: text
    content: 'Though it never saw the sun or knew anything, it has more rest than does that man— '
  '6':
  - type: text
    content: even if he lives a thousand years twice over but fails to enjoy his prosperity. Do not all go to the same place?
  '7':
  - type: text
    content: Everyone’s toil is for their mouth,
  - type: text
    content: yet their appetite is never satisfied.
  '8':
  - type: text
    content: What advantage have the wise over fools?
  - type: text
    content: What do the poor gain
  - type: text
    content: by knowing how to conduct themselves before others?
  '9':
  - type: text
    content: Better what the eye sees
  - type: text
    content: than the roving of the appetite.
  - type: text
    content: This too is meaningless,
  - type: text
    content: a chasing after the wind.
