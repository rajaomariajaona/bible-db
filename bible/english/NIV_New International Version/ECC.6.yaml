document_id: ECC.6
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I have seen another evil under the sun, and it weighs heavily on mankind: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: God gives some people wealth, possessions and honor, so that they lack nothing their hearts desire, but God does not grant them the ability to enjoy them, and strangers enjoy them instead. This is meaningless, a grievous evil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A man may have a hundred children and live many years; yet no matter how long he lives, if he cannot enjoy his prosperity and does not receive proper burial, I say that a stillborn child is better off than he. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'It comes without meaning, it departs in darkness, and in darkness its name is shrouded. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Though it never saw the sun or knew anything, it has more rest than does that man— '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: even if he lives a thousand years twice over but fails to enjoy his prosperity. Do not all go to the same place?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Everyone’s toil is for their mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet their appetite is never satisfied.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: What advantage have the wise over fools?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What do the poor gain
- type: usfm
  marker: q2
  children:
  - type: text
    text: by knowing how to conduct themselves before others?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Better what the eye sees
- type: usfm
  marker: q2
  children:
  - type: text
    text: than the roving of the appetite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This too is meaningless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a chasing after the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Whatever exists has already been named,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and what humanity is has been known;
- type: usfm
  marker: q1
  children:
  - type: text
    text: no one can contend
- type: usfm
  marker: q2
  children:
  - type: text
    text: with someone who is stronger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The more the words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the less the meaning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and how does that profit anyone?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For who knows what is good for a person in life, during the few and meaningless days they pass through like a shadow? Who can tell them what will happen under the sun after they are gone?
