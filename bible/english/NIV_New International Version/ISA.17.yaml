document_id: ISA.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Damascus
  - type: text
    content: 'A prophecy against Damascus:'
  - type: text
    content: “See, Damascus will no longer be a city
  - type: text
    content: but will become a heap of ruins.
  '10':
  - type: text
    content: You have forgotten God your Savior;
  - type: text
    content: you have not remembered the Rock, your fortress.
  - type: text
    content: Therefore, though you set out the finest plants
  - type: text
    content: and plant imported vines,
  '11':
  - type: text
    content: though on the day you set them out, you make them grow,
  - type: text
    content: and on the morning when you plant them, you bring them to bud,
  - type: text
    content: yet the harvest will be as nothing
  - type: text
    content: in the day of disease and incurable pain.
  '12':
  - type: text
    content: Woe to the many nations that rage—
  - type: text
    content: they rage like the raging sea!
  - type: text
    content: Woe to the peoples who roar—
  - type: text
    content: they roar like the roaring of great waters!
  '13':
  - type: text
    content: Although the peoples roar like the roar of surging waters,
  - type: text
    content: when he rebukes them they flee far away,
  - type: text
    content: driven before the wind like chaff on the hills,
  - type: text
    content: like tumbleweed before a gale.
  '14':
  - type: text
    content: In the evening, sudden terror!
  - type: text
    content: Before the morning, they are gone!
  - type: text
    content: This is the portion of those who loot us,
  - type: text
    content: the lot of those who plunder us.
  '2':
  - type: text
    content: The cities of Aroer will be deserted
  - type: text
    content: and left to flocks, which will lie down,
  - type: text
    content: with no one to make them afraid.
  '3':
  - type: text
    content: The fortified city will disappear from Ephraim,
  - type: text
    content: and royal power from Damascus;
  - type: text
    content: the remnant of Aram will be
  - type: text
    content: like the glory of the Israelites,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '4':
  - type: text
    content: “In that day the glory of Jacob will fade;
  - type: text
    content: the fat of his body will waste away.
  '5':
  - type: text
    content: It will be as when reapers harvest the standing grain,
  - type: text
    content: gathering the grain in their arms—
  - type: text
    content: as when someone gleans heads of grain
  - type: text
    content: in the Valley of Rephaim.
  '6':
  - type: text
    content: Yet some gleanings will remain,
  - type: text
    content: as when an olive tree is beaten,
  - type: text
    content: leaving two or three olives on the topmost branches,
  - type: text
    content: four or five on the fruitful boughs,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.'
  '7':
  - type: text
    content: In that day people will look to their Maker
  - type: text
    content: and turn their eyes to the Holy One of Israel.
  '8':
  - type: text
    content: They will not look to the altars,
  - type: text
    content: the work of their hands,
  - type: text
    content: and they will have no regard for the Asherah poles
  - type: note
    content: That is, wooden symbols of the goddess Asherah
  - type: text
    content: and the incense altars their fingers have made.
  '9':
  - type: text
    content: In that day their strong cities, which they left because of the Israelites, will be like places abandoned to thickets and undergrowth. And all will be desolation.
