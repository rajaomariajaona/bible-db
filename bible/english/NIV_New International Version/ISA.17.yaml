document_id: ISA.17,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Damascus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A prophecy against Damascus:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, Damascus will no longer be a city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but will become a heap of ruins.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You have forgotten God your Savior;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have not remembered the Rock, your fortress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, though you set out the finest plants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plant imported vines,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: though on the day you set them out, you make them grow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on the morning when you plant them, you bring them to bud,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet the harvest will be as nothing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the day of disease and incurable pain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Woe to the many nations that rage—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they rage like the raging sea!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to the peoples who roar—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they roar like the roaring of great waters!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Although the peoples roar like the roar of surging waters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he rebukes them they flee far away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: driven before the wind like chaff on the hills,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like tumbleweed before a gale.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: In the evening, sudden terror!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Before the morning, they are gone!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the portion of those who loot us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the lot of those who plunder us.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The cities of Aroer will be deserted
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and left to flocks, which will lie down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to make them afraid.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The fortified city will disappear from Ephraim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and royal power from Damascus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the remnant of Aram will be
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the glory of the Israelites,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “In that day the glory of Jacob will fade;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fat of his body will waste away.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: It will be as when reapers harvest the standing grain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gathering the grain in their arms—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as when someone gleans heads of grain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the Valley of Rephaim.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Yet some gleanings will remain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as when an olive tree is beaten,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leaving two or three olives on the topmost branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: four or five on the fruitful boughs,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: In that day people will look to their Maker
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turn their eyes to the Holy One of Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They will not look to the altars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the work of their hands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they will have no regard for the Asherah poles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, wooden symbols of the goddess Asherah
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the incense altars their fingers have made.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: In that day their strong cities, which they left because of the Israelites, will be like places abandoned to thickets and undergrowth. And all will be desolation.
