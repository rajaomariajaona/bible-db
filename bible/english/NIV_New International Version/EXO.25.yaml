document_id: EXO.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Offerings for the Tabernacle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Tell the Israelites to bring me an offering. You are to receive the offering for me from everyone whose heart prompts them to give. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'These are the offerings you are to receive from them: gold, silver and bronze; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'blue, purple and scarlet yarn and fine linen; goat hair; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ram skins dyed red and another type of durable leather
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly the hides of large aquatic mammals
    marker-yv: yv-n
  - type: text
    text: '; acacia wood; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'olive oil for the light; spices for the anointing oil and for the fragrant incense; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and onyx stones and other gems to be mounted on the ephod and breastpiece.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Then have them make a sanctuary for me, and I will dwell among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Make this tabernacle and all its furnishings exactly like the pattern I will show you.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ark
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Have them make an ark
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, a chest
    marker-yv: yv-n
  - type: text
    text: ' of acacia wood—two and a half cubits long, a cubit and a half wide, and a cubit and a half high.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 3/4 feet long and 2 1/4 feet wide and high or about 1.1 meters long and 68 centimeters wide and high; similarly in verse 17
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Overlay it with pure gold, both inside and out, and make a gold molding around it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cast four gold rings for it and fasten them to its four feet, with two rings on one side and two rings on the other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then make poles of acacia wood and overlay them with gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Insert the poles into the rings on the sides of the ark to carry it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The poles are to remain in the rings of this ark; they are not to be removed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Then put in the ark the tablets of the covenant law, which I will give you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Make an atonement cover of pure gold—two and a half cubits long and a cubit and a half wide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And make two cherubim out of hammered gold at the ends of the cover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Make one cherub on one end and the second cherub on the other; make the cherubim of one piece with the cover, at the two ends. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The cherubim are to have their wings spread upward, overshadowing the cover with them. The cherubim are to face each other, looking toward the cover. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Place the cover on top of the ark and put in the ark the tablets of the covenant law that I will give you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: There, above the cover between the two cherubim that are over the ark of the covenant law, I will meet with you and give you all my commands for the Israelites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Table
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “Make a table of acacia wood—two cubits long, a cubit wide and a cubit and a half high.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 feet long, 1 1/2 feet wide and 2 1/4 feet high or about 90 centimeters long, 45 centimeters wide and 68 centimeters high
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Overlay it with pure gold and make a gold molding around it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Also make around it a rim a handbreadth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 inches or about 7.5 centimeters
    marker-yv: yv-n
  - type: text
    text: ' wide and put a gold molding on the rim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Make four gold rings for the table and fasten them to the four corners, where the four legs are. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The rings are to be close to the rim to hold the poles used in carrying the table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Make the poles of acacia wood, overlay them with gold and carry the table with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And make its plates and dishes of pure gold, as well as its pitchers and bowls for the pouring out of offerings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Put the bread of the Presence on this table to be before me at all times.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lampstand
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Make a lampstand of pure gold. Hammer out its base and shaft, and make its flowerlike cups, buds and blossoms of one piece with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Six branches are to extend from the sides of the lampstand—three on one side and three on the other. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Three cups shaped like almond flowers with buds and blossoms are to be on one branch, three on the next branch, and the same for all six branches extending from the lampstand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And on the lampstand there are to be four cups shaped like almond flowers with buds and blossoms. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'One bud shall be under the first pair of branches extending from the lampstand, a second bud under the second pair, and a third bud under the third pair—six branches in all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The buds and branches shall all be of one piece with the lampstand, hammered out of pure gold.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '“Then make its seven lamps and set them up on it so that they light the space in front of it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Its wick trimmers and trays are to be of pure gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: A talent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 75 pounds or about 34 kilograms
    marker-yv: yv-n
  - type: text
    text: ' of pure gold is to be used for the lampstand and all these accessories. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: See that you make them according to the pattern shown you on the mountain.
