document_id: EXO.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Offerings for the Tabernacle
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: “Have them make an ark
  - type: note
    content: That is, a chest
  - type: text
    content: ' of acacia wood—two and a half cubits long, a cubit and a half wide, and a cubit and a half high.'
  - type: note
    content: That is, about 3 3/4 feet long and 2 1/4 feet wide and high or about 1.1 meters long and 68 centimeters wide and high; similarly in verse 17
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Overlay it with pure gold, both inside and out, and make a gold molding around it. '
  '12':
  - type: text
    content: 'Cast four gold rings for it and fasten them to its four feet, with two rings on one side and two rings on the other. '
  '13':
  - type: text
    content: 'Then make poles of acacia wood and overlay them with gold. '
  '14':
  - type: text
    content: 'Insert the poles into the rings on the sides of the ark to carry it. '
  '15':
  - type: text
    content: 'The poles are to remain in the rings of this ark; they are not to be removed. '
  '16':
  - type: text
    content: Then put in the ark the tablets of the covenant law, which I will give you.
  '17':
  - type: text
    content: '“Make an atonement cover of pure gold—two and a half cubits long and a cubit and a half wide. '
  '18':
  - type: text
    content: 'And make two cherubim out of hammered gold at the ends of the cover. '
  '19':
  - type: text
    content: 'Make one cherub on one end and the second cherub on the other; make the cherubim of one piece with the cover, at the two ends. '
  '2':
  - type: text
    content: '“Tell the Israelites to bring me an offering. You are to receive the offering for me from everyone whose heart prompts them to give. '
  '20':
  - type: text
    content: 'The cherubim are to have their wings spread upward, overshadowing the cover with them. The cherubim are to face each other, looking toward the cover. '
  '21':
  - type: text
    content: 'Place the cover on top of the ark and put in the ark the tablets of the covenant law that I will give you. '
  '22':
  - type: text
    content: There, above the cover between the two cherubim that are over the ark of the covenant law, I will meet with you and give you all my commands for the Israelites.
  - type: heading
    content: The Table
  '23':
  - type: text
    content: “Make a table of acacia wood—two cubits long, a cubit wide and a cubit and a half high.
  - type: note
    content: That is, about 3 feet long, 1 1/2 feet wide and 2 1/4 feet high or about 90 centimeters long, 45 centimeters wide and 68 centimeters high
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Overlay it with pure gold and make a gold molding around it. '
  '25':
  - type: text
    content: Also make around it a rim a handbreadth
  - type: note
    content: That is, about 3 inches or about 7.5 centimeters
  - type: text
    content: ' wide and put a gold molding on the rim. '
  '26':
  - type: text
    content: 'Make four gold rings for the table and fasten them to the four corners, where the four legs are. '
  '27':
  - type: text
    content: 'The rings are to be close to the rim to hold the poles used in carrying the table. '
  '28':
  - type: text
    content: 'Make the poles of acacia wood, overlay them with gold and carry the table with them. '
  '29':
  - type: text
    content: 'And make its plates and dishes of pure gold, as well as its pitchers and bowls for the pouring out of offerings. '
  '3':
  - type: text
    content: 'These are the offerings you are to receive from them: gold, silver and bronze; '
  '30':
  - type: text
    content: Put the bread of the Presence on this table to be before me at all times.
  - type: heading
    content: The Lampstand
  '31':
  - type: text
    content: '“Make a lampstand of pure gold. Hammer out its base and shaft, and make its flowerlike cups, buds and blossoms of one piece with them. '
  '32':
  - type: text
    content: 'Six branches are to extend from the sides of the lampstand—three on one side and three on the other. '
  '33':
  - type: text
    content: 'Three cups shaped like almond flowers with buds and blossoms are to be on one branch, three on the next branch, and the same for all six branches extending from the lampstand. '
  '34':
  - type: text
    content: 'And on the lampstand there are to be four cups shaped like almond flowers with buds and blossoms. '
  '35':
  - type: text
    content: 'One bud shall be under the first pair of branches extending from the lampstand, a second bud under the second pair, and a third bud under the third pair—six branches in all. '
  '36':
  - type: text
    content: The buds and branches shall all be of one piece with the lampstand, hammered out of pure gold.
  '37':
  - type: text
    content: '“Then make its seven lamps and set them up on it so that they light the space in front of it. '
  '38':
  - type: text
    content: 'Its wick trimmers and trays are to be of pure gold. '
  '39':
  - type: text
    content: A talent
  - type: note
    content: That is, about 75 pounds or about 34 kilograms
  - type: text
    content: ' of pure gold is to be used for the lampstand and all these accessories. '
  '4':
  - type: text
    content: 'blue, purple and scarlet yarn and fine linen; goat hair; '
  '40':
  - type: text
    content: See that you make them according to the pattern shown you on the mountain.
  '5':
  - type: text
    content: ram skins dyed red and another type of durable leather
  - type: note
    content: Possibly the hides of large aquatic mammals
  - type: text
    content: '; acacia wood; '
  '6':
  - type: text
    content: 'olive oil for the light; spices for the anointing oil and for the fragrant incense; '
  '7':
  - type: text
    content: and onyx stones and other gems to be mounted on the ephod and breastpiece.
  '8':
  - type: text
    content: '“Then have them make a sanctuary for me, and I will dwell among them. '
  '9':
  - type: text
    content: Make this tabernacle and all its furnishings exactly like the pattern I will show you.
  - type: heading
    content: The Ark
