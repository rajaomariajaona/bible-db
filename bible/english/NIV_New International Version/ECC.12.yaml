document_id: ECC.12
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Remember your Creator
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the days of your youth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: before the days of trouble come
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the years approach when you will say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I find no pleasure in them”—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: before the sun and the light
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the moon and the stars grow dark,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the clouds return after the rain;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: when the keepers of the house tremble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the strong men stoop,
- type: usfm
  marker: q1
  children:
  - type: text
    text: when the grinders cease because they are few,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those looking through the windows grow dim;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: when the doors to the street are closed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the sound of grinding fades;
- type: usfm
  marker: q1
  children:
  - type: text
    text: when people rise up at the sound of birds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but all their songs grow faint;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: when people are afraid of heights
- type: usfm
  marker: q2
  children:
  - type: text
    text: and of dangers in the streets;
- type: usfm
  marker: q1
  children:
  - type: text
    text: when the almond tree blossoms
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the grasshopper drags itself along
- type: usfm
  marker: q2
  children:
  - type: text
    text: and desire no longer is stirred.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then people go to their eternal home
- type: usfm
  marker: q2
  children:
  - type: text
    text: and mourners go about the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Remember him—before the silver cord is severed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the golden bowl is broken;
- type: usfm
  marker: q1
  children:
  - type: text
    text: before the pitcher is shattered at the spring,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the wheel broken at the well,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: and the dust returns to the ground it came from,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the spirit returns to God who gave it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Meaningless! Meaningless!” says the Teacher.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the leader of the assembly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 9 and 10
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Everything is meaningless!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Conclusion of the Matter
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Not only was the Teacher wise, but he also imparted knowledge to the people. He pondered and searched out and set in order many proverbs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The Teacher searched to find just the right words, and what he wrote was upright and true.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The words of the wise are like goads, their collected sayings like firmly embedded nails—given by one shepherd.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shepherd
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Be warned, my son, of anything in addition to them.
- type: usfm
  marker: p
  children:
  - type: text
    text: Of making many books there is no end, and much study wearies the body.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now all has been heard;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'here is the conclusion of the matter:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fear God and keep his commandments,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for this is the duty of all mankind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For God will bring every deed into judgment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: including every hidden thing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whether it is good or evil.
