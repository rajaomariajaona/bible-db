document_id: ECC.12,111
type_code: eng
verses:
  '1':
  - type: text
    content: Remember your Creator
  - type: text
    content: in the days of your youth,
  - type: text
    content: before the days of trouble come
  - type: text
    content: and the years approach when you will say,
  - type: text
    content: “I find no pleasure in them”—
  '10':
  - type: text
    content: The Teacher searched to find just the right words, and what he wrote was upright and true.
  '11':
  - type: text
    content: The words of the wise are like goads, their collected sayings like firmly embedded nails—given by one shepherd.
  - type: note
    content: Or Shepherd
  - type: text
    content: ' '
  '12':
  - type: text
    content: Be warned, my son, of anything in addition to them.
  - type: text
    content: Of making many books there is no end, and much study wearies the body.
  '13':
  - type: text
    content: Now all has been heard;
  - type: text
    content: 'here is the conclusion of the matter:'
  - type: text
    content: Fear God and keep his commandments,
  - type: text
    content: for this is the duty of all mankind.
  '14':
  - type: text
    content: For God will bring every deed into judgment,
  - type: text
    content: including every hidden thing,
  - type: text
    content: whether it is good or evil.
  '2':
  - type: text
    content: before the sun and the light
  - type: text
    content: and the moon and the stars grow dark,
  - type: text
    content: and the clouds return after the rain;
  '3':
  - type: text
    content: when the keepers of the house tremble,
  - type: text
    content: and the strong men stoop,
  - type: text
    content: when the grinders cease because they are few,
  - type: text
    content: and those looking through the windows grow dim;
  '4':
  - type: text
    content: when the doors to the street are closed
  - type: text
    content: and the sound of grinding fades;
  - type: text
    content: when people rise up at the sound of birds,
  - type: text
    content: but all their songs grow faint;
  '5':
  - type: text
    content: when people are afraid of heights
  - type: text
    content: and of dangers in the streets;
  - type: text
    content: when the almond tree blossoms
  - type: text
    content: and the grasshopper drags itself along
  - type: text
    content: and desire no longer is stirred.
  - type: text
    content: Then people go to their eternal home
  - type: text
    content: and mourners go about the streets.
  '6':
  - type: text
    content: Remember him—before the silver cord is severed,
  - type: text
    content: and the golden bowl is broken;
  - type: text
    content: before the pitcher is shattered at the spring,
  - type: text
    content: and the wheel broken at the well,
  '7':
  - type: text
    content: and the dust returns to the ground it came from,
  - type: text
    content: and the spirit returns to God who gave it.
  '8':
  - type: text
    content: “Meaningless! Meaningless!” says the Teacher.
  - type: note
    content: Or the leader of the assembly; also in verses 9 and 10
  - type: text
    content: “Everything is meaningless!”
  - type: heading
    content: The Conclusion of the Matter
  '9':
  - type: text
    content: 'Not only was the Teacher wise, but he also imparted knowledge to the people. He pondered and searched out and set in order many proverbs. '
