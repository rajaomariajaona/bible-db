type_code: eng
verses:
  '1':
  - type: heading
    content: The Covenant Confirmed
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Come up to the '
  - type: text
    content: Lord
  - type: text
    content: ', you and Aaron, Nadab and Abihu, and seventy of the elders of Israel. You are to worship at a distance, '
  '10':
  - type: text
    content: 'and saw the God of Israel. Under his feet was something like a pavement made of lapis lazuli, as bright blue as the sky. '
  '11':
  - type: text
    content: But God did not raise his hand against these leaders of the Israelites; they saw God, and they ate and drank.
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Come up to me on the mountain and stay here, and I will give you the tablets of stone with the law and commandments I have written for their instruction.”'
  '13':
  - type: text
    content: 'Then Moses set out with Joshua his aide, and Moses went up on the mountain of God. '
  '14':
  - type: text
    content: He said to the elders, “Wait here for us until we come back to you. Aaron and Hur are with you, and anyone involved in a dispute can go to them.”
  '15':
  - type: text
    content: 'When Moses went up on the mountain, the cloud covered it, '
  '16':
  - type: text
    content: 'and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' settled on Mount Sinai. For six days the cloud covered the mountain, and on the seventh day the '
  - type: text
    content: Lord
  - type: text
    content: ' called to Moses from within the cloud. '
  '17':
  - type: text
    content: 'To the Israelites the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' looked like a consuming fire on top of the mountain. '
  '18':
  - type: text
    content: Then Moses entered the cloud as he went on up the mountain. And he stayed on the mountain forty days and forty nights.
  '2':
  - type: text
    content: 'but Moses alone is to approach the '
  - type: text
    content: Lord
  - type: text
    content: ; the others must not come near. And the people may not come up with him.”
  '3':
  - type: text
    content: 'When Moses went and told the people all the '
  - type: text
    content: Lord
  - type: text
    content: '’s words and laws, they responded with one voice, “Everything the '
  - type: text
    content: Lord
  - type: text
    content: ' has said we will do.” '
  '4':
  - type: text
    content: 'Moses then wrote down everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had said.'
  - type: text
    content: 'He got up early the next morning and built an altar at the foot of the mountain and set up twelve stone pillars representing the twelve tribes of Israel. '
  '5':
  - type: text
    content: 'Then he sent young Israelite men, and they offered burnt offerings and sacrificed young bulls as fellowship offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Moses took half of the blood and put it in bowls, and the other half he splashed against the altar. '
  '7':
  - type: text
    content: 'Then he took the Book of the Covenant and read it to the people. They responded, “We will do everything the '
  - type: text
    content: Lord
  - type: text
    content: ' has said; we will obey.”'
  '8':
  - type: text
    content: 'Moses then took the blood, sprinkled it on the people and said, “This is the blood of the covenant that the '
  - type: text
    content: Lord
  - type: text
    content: ' has made with you in accordance with all these words.”'
  '9':
  - type: text
    content: 'Moses and Aaron, Nadab and Abihu, and the seventy elders of Israel went up '
