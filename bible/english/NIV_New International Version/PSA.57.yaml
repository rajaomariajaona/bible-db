  - type: text
    text: ' When he had fled from Saul into the cave.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Have mercy on me, my God, have mercy on me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for in you I take refuge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will take refuge in the shadow of your wings
- type: usfm
  marker: q2
  children:
  - type: text
    text: until the disaster has passed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I cry out to God Most High,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to God, who vindicates me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He sends from heaven and saves me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rebuking those who hotly pursue me—
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here and at the end of verse 6.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: God sends forth his love and his faithfulness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I am in the midst of lions;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am forced to dwell among ravenous beasts—
- type: usfm
  marker: q1
  children:
  - type: text
    text: men whose teeth are spears and arrows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose tongues are sharp swords.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Be exalted, O God, above the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let your glory be over all the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They spread a net for my feet—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was bowed down in distress.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They dug a pit in my path—
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they have fallen into it themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My heart, O God, is steadfast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my heart is steadfast;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing and make music.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Awake, my soul!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Awake, harp and lyre!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will awaken the dawn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will praise you, Lord, among the nations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing of you among the peoples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For great is your love, reaching to the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your faithfulness reaches to the skies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Be exalted, O God, above the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let your glory be over all the earth.
