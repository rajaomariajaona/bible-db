document_id: PSA.57,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 57In Hebrew texts 57:1-11 is numbered 57:2-12.
  - type: text
    content: 'For the director of music. To the tune of “Do Not Destroy.” Of David. A '
  - type: text
    content: miktam.
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' When he had fled from Saul into the cave.'
  - type: text
    content: Have mercy on me, my God, have mercy on me,
  - type: text
    content: for in you I take refuge.
  - type: text
    content: I will take refuge in the shadow of your wings
  - type: text
    content: until the disaster has passed.
  '10':
  - type: text
    content: For great is your love, reaching to the heavens;
  - type: text
    content: your faithfulness reaches to the skies.
  '11':
  - type: text
    content: Be exalted, O God, above the heavens;
  - type: text
    content: let your glory be over all the earth.
  '2':
  - type: text
    content: I cry out to God Most High,
  - type: text
    content: to God, who vindicates me.
  '3':
  - type: text
    content: He sends from heaven and saves me,
  - type: text
    content: rebuking those who hotly pursue me—
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 6.
  - type: text
    content: God sends forth his love and his faithfulness.
  '4':
  - type: text
    content: I am in the midst of lions;
  - type: text
    content: I am forced to dwell among ravenous beasts—
  - type: text
    content: men whose teeth are spears and arrows,
  - type: text
    content: whose tongues are sharp swords.
  '5':
  - type: text
    content: Be exalted, O God, above the heavens;
  - type: text
    content: let your glory be over all the earth.
  '6':
  - type: text
    content: They spread a net for my feet—
  - type: text
    content: I was bowed down in distress.
  - type: text
    content: They dug a pit in my path—
  - type: text
    content: but they have fallen into it themselves.
  '7':
  - type: text
    content: My heart, O God, is steadfast,
  - type: text
    content: my heart is steadfast;
  - type: text
    content: I will sing and make music.
  '8':
  - type: text
    content: Awake, my soul!
  - type: text
    content: Awake, harp and lyre!
  - type: text
    content: I will awaken the dawn.
  '9':
  - type: text
    content: I will praise you, Lord, among the nations;
  - type: text
    content: I will sing of you among the peoples.
