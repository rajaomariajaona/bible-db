  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 128
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of ascents.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Blessed are all who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who walk in obedience to him.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You will eat the fruit of your labor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blessings and prosperity will be yours.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Your wife will be like a fruitful vine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: within your house;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your children will be like olive shoots
  - type: usfm
    marker: q2
    children:
    - type: text
      text: around your table.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Yes, this will be the blessing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the man who fears the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you from Zion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may you see the prosperity of Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the days of your life.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: May you live to see your children’s children—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: peace be on Israel.
