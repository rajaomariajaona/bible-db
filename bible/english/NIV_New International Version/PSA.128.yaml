document_id: PSA.128,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 128
  - type: text
    content: A song of ascents.
  - type: text
    content: 'Blessed are all who fear the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: who walk in obedience to him.
  '2':
  - type: text
    content: You will eat the fruit of your labor;
  - type: text
    content: blessings and prosperity will be yours.
  '3':
  - type: text
    content: Your wife will be like a fruitful vine
  - type: text
    content: within your house;
  - type: text
    content: your children will be like olive shoots
  - type: text
    content: around your table.
  '4':
  - type: text
    content: Yes, this will be the blessing
  - type: text
    content: 'for the man who fears the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' bless you from Zion;'
  - type: text
    content: may you see the prosperity of Jerusalem
  - type: text
    content: all the days of your life.
  '6':
  - type: text
    content: May you live to see your children’s children—
  - type: text
    content: peace be on Israel.
