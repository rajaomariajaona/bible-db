document_id: EST.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Queen Vashti Deposed
  - type: text
    content: This is what happened during the time of Xerxes,
  - type: note
    content: Hebrew Ahasuerus; here and throughout Esther
  - type: text
    content: ' the Xerxes who ruled over 127 provinces stretching from India to Cush'
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'On the seventh day, when King Xerxes was in high spirits from wine, he commanded the seven eunuchs who served him—Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zethar and Karkas— '
  '11':
  - type: text
    content: 'to bring before him Queen Vashti, wearing her royal crown, in order to display her beauty to the people and nobles, for she was lovely to look at. '
  '12':
  - type: text
    content: But when the attendants delivered the king’s command, Queen Vashti refused to come. Then the king became furious and burned with anger.
  '13':
  - type: text
    content: 'Since it was customary for the king to consult experts in matters of law and justice, he spoke with the wise men who understood the times '
  '14':
  - type: text
    content: and were closest to the king—Karshena, Shethar, Admatha, Tarshish, Meres, Marsena and Memukan, the seven nobles of Persia and Media who had special access to the king and were highest in the kingdom.
  '15':
  - type: text
    content: “According to law, what must be done to Queen Vashti?” he asked. “She has not obeyed the command of King Xerxes that the eunuchs have taken to her.”
  '16':
  - type: text
    content: 'Then Memukan replied in the presence of the king and the nobles, “Queen Vashti has done wrong, not only against the king but also against all the nobles and the peoples of all the provinces of King Xerxes. '
  '17':
  - type: text
    content: 'For the queen’s conduct will become known to all the women, and so they will despise their husbands and say, ‘King Xerxes commanded Queen Vashti to be brought before him, but she would not come.’ '
  '18':
  - type: text
    content: This very day the Persian and Median women of the nobility who have heard about the queen’s conduct will respond to all the king’s nobles in the same way. There will be no end of disrespect and discord.
  '19':
  - type: text
    content: '“Therefore, if it pleases the king, let him issue a royal decree and let it be written in the laws of Persia and Media, which cannot be repealed, that Vashti is never again to enter the presence of King Xerxes. Also let the king give her royal position to someone else who is better than she. '
  '2':
  - type: text
    content: 'At that time King Xerxes reigned from his royal throne in the citadel of Susa, '
  '20':
  - type: text
    content: Then when the king’s edict is proclaimed throughout all his vast realm, all the women will respect their husbands, from the least to the greatest.”
  '21':
  - type: text
    content: 'The king and his nobles were pleased with this advice, so the king did as Memukan proposed. '
  '22':
  - type: text
    content: He sent dispatches to all parts of the kingdom, to each province in its own script and to each people in their own language, proclaiming that every man should be ruler over his own household, using his native tongue.
  '3':
  - type: text
    content: and in the third year of his reign he gave a banquet for all his nobles and officials. The military leaders of Persia and Media, the princes, and the nobles of the provinces were present.
  '4':
  - type: text
    content: 'For a full 180 days he displayed the vast wealth of his kingdom and the splendor and glory of his majesty. '
  '5':
  - type: text
    content: 'When these days were over, the king gave a banquet, lasting seven days, in the enclosed garden of the king’s palace, for all the people from the least to the greatest who were in the citadel of Susa. '
  '6':
  - type: text
    content: 'The garden had hangings of white and blue linen, fastened with cords of white linen and purple material to silver rings on marble pillars. There were couches of gold and silver on a mosaic pavement of porphyry, marble, mother-of-pearl and other costly stones. '
  '7':
  - type: text
    content: 'Wine was served in goblets of gold, each one different from the other, and the royal wine was abundant, in keeping with the king’s liberality. '
  '8':
  - type: text
    content: By the king’s command each guest was allowed to drink with no restrictions, for the king instructed all the wine stewards to serve each man what he wished.
  '9':
  - type: text
    content: Queen Vashti also gave a banquet for the women in the royal palace of King Xerxes.
