document_id: HAB.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The prophecy that Habakkuk the prophet received.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Habakkuk’s Complaint
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'How long, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', must I call for help,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you do not listen?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or cry out to you, “Violence!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you do not save?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Why do you make me look at injustice?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why do you tolerate wrongdoing?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Destruction and violence are before me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is strife, and conflict abounds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Therefore the law is paralyzed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and justice never prevails.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wicked hem in the righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that justice is perverted.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Answer
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Look at the nations and watch—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be utterly amazed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I am going to do something in your days
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you would not believe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even if you were told.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am raising up the Babylonians,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldeans
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: that ruthless and impetuous people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who sweep across the whole earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: to seize dwellings not their own.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They are a feared and dreaded people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are a law to themselves
- type: usfm
  marker: q2
  children:
  - type: text
    text: and promote their own honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Their horses are swifter than leopards,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fiercer than wolves at dusk.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their cavalry gallops headlong;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their horsemen come from afar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They fly like an eagle swooping to devour;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: they all come intent on violence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their hordes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' advance like a desert wind'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gather prisoners like sand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They mock kings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and scoff at rulers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They laugh at all fortified cities;
- type: usfm
  marker: q2
  children:
  - type: text
    text: by building earthen ramps they capture them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then they sweep past like the wind and go on—
- type: usfm
  marker: q2
  children:
  - type: text
    text: guilty people, whose own strength is their god.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Habakkuk’s Second Complaint
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', are you not from everlasting?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: My God, my Holy One, you
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'An ancient Hebrew scribal tradition; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: we
    marker-yv: yv-n
  - type: text
    text: ' will never die.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', have appointed them to execute judgment;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you, my Rock, have ordained them to punish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Your eyes are too pure to look on evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you cannot tolerate wrongdoing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why then do you tolerate the treacherous?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why are you silent while the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: swallow up those more righteous than themselves?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You have made people like the fish in the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the sea creatures that have no ruler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The wicked foe pulls all of them up with hooks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he catches them in his net,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he gathers them up in his dragnet;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and so he rejoices and is glad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Therefore he sacrifices to his net
- type: usfm
  marker: q2
  children:
  - type: text
    text: and burns incense to his dragnet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for by his net he lives in luxury
- type: usfm
  marker: q2
  children:
  - type: text
    text: and enjoys the choicest food.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Is he to keep on emptying his net,
- type: usfm
  marker: q2
  children:
  - type: text
    text: destroying nations without mercy?
