document_id: HAB.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: The prophecy that Habakkuk the prophet received.
  - type: heading
    content: Habakkuk’s Complaint
  '10':
  - type: text
    content: They mock kings
  - type: text
    content: and scoff at rulers.
  - type: text
    content: They laugh at all fortified cities;
  - type: text
    content: by building earthen ramps they capture them.
  '11':
  - type: text
    content: Then they sweep past like the wind and go on—
  - type: text
    content: guilty people, whose own strength is their god.”
  - type: heading
    content: Habakkuk’s Second Complaint
  '12':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', are you not from everlasting?'
  - type: text
    content: My God, my Holy One, you
  - type: note
    content: An ancient Hebrew scribal tradition; Masoretic Text we
  - type: text
    content: ' will never die.'
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', have appointed them to execute judgment;'
  - type: text
    content: you, my Rock, have ordained them to punish.
  '13':
  - type: text
    content: Your eyes are too pure to look on evil;
  - type: text
    content: you cannot tolerate wrongdoing.
  - type: text
    content: Why then do you tolerate the treacherous?
  - type: text
    content: Why are you silent while the wicked
  - type: text
    content: swallow up those more righteous than themselves?
  '14':
  - type: text
    content: You have made people like the fish in the sea,
  - type: text
    content: like the sea creatures that have no ruler.
  '15':
  - type: text
    content: The wicked foe pulls all of them up with hooks,
  - type: text
    content: he catches them in his net,
  - type: text
    content: he gathers them up in his dragnet;
  - type: text
    content: and so he rejoices and is glad.
  '16':
  - type: text
    content: Therefore he sacrifices to his net
  - type: text
    content: and burns incense to his dragnet,
  - type: text
    content: for by his net he lives in luxury
  - type: text
    content: and enjoys the choicest food.
  '17':
  - type: text
    content: Is he to keep on emptying his net,
  - type: text
    content: destroying nations without mercy?
  '2':
  - type: text
    content: 'How long, '
  - type: text
    content: Lord
  - type: text
    content: ', must I call for help,'
  - type: text
    content: but you do not listen?
  - type: text
    content: Or cry out to you, “Violence!”
  - type: text
    content: but you do not save?
  '3':
  - type: text
    content: Why do you make me look at injustice?
  - type: text
    content: Why do you tolerate wrongdoing?
  - type: text
    content: Destruction and violence are before me;
  - type: text
    content: there is strife, and conflict abounds.
  '4':
  - type: text
    content: Therefore the law is paralyzed,
  - type: text
    content: and justice never prevails.
  - type: text
    content: The wicked hem in the righteous,
  - type: text
    content: so that justice is perverted.
  - type: heading
    content: The Lord’s Answer
  '5':
  - type: text
    content: “Look at the nations and watch—
  - type: text
    content: and be utterly amazed.
  - type: text
    content: For I am going to do something in your days
  - type: text
    content: that you would not believe,
  - type: text
    content: even if you were told.
  '6':
  - type: text
    content: I am raising up the Babylonians,
  - type: note
    content: Or Chaldeans
  - type: text
    content: that ruthless and impetuous people,
  - type: text
    content: who sweep across the whole earth
  - type: text
    content: to seize dwellings not their own.
  '7':
  - type: text
    content: They are a feared and dreaded people;
  - type: text
    content: they are a law to themselves
  - type: text
    content: and promote their own honor.
  '8':
  - type: text
    content: Their horses are swifter than leopards,
  - type: text
    content: fiercer than wolves at dusk.
  - type: text
    content: Their cavalry gallops headlong;
  - type: text
    content: their horsemen come from afar.
  - type: text
    content: They fly like an eagle swooping to devour;
  '9':
  - type: text
    content: they all come intent on violence.
  - type: text
    content: Their hordes
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' advance like a desert wind'
  - type: text
    content: and gather prisoners like sand.
