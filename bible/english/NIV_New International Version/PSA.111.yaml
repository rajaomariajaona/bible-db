- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will extol the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with all my heart'
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the council of the upright and in the assembly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Great are the works of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are pondered by all who delight in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Glorious and majestic are his deeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his righteousness endures forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He has caused his wonders to be remembered;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is gracious and compassionate.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He provides food for those who fear him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he remembers his covenant forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He has shown his people the power of his works,
- type: usfm
  marker: q2
  children:
  - type: text
    text: giving them the lands of other nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The works of his hands are faithful and just;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all his precepts are trustworthy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They are established for ever and ever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: enacted in faithfulness and uprightness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He provided redemption for his people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he ordained his covenant forever—
- type: usfm
  marker: q2
  children:
  - type: text
    text: holy and awesome is his name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is the beginning of wisdom;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who follow his precepts have good understanding.
- type: usfm
  marker: q2
  children:
  - type: text
    text: To him belongs eternal praise.
