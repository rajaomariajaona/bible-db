document_id: JER.43,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'When Jeremiah had finished telling the people all the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God—everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had sent him to tell them— '
  '10':
  - type: text
    content: 'Then say to them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: I will send for my servant Nebuchadnezzar king of Babylon, and I will set his throne over these stones I have buried here; he will spread his royal canopy above them. '
  '11':
  - type: text
    content: 'He will come and attack Egypt, bringing death to those destined for death, captivity to those destined for captivity, and the sword to those destined for the sword. '
  '12':
  - type: text
    content: 'He will set fire to the temples of the gods of Egypt; he will burn their temples and take their gods captive. As a shepherd picks his garment clean of lice, so he will pick Egypt clean and depart. '
  '13':
  - type: text
    content: There in the temple of the sun
  - type: note
    content: Or in Heliopolis
  - type: text
    content: ' in Egypt he will demolish the sacred pillars and will burn down the temples of the gods of Egypt.’ ”'
  '2':
  - type: text
    content: 'Azariah son of Hoshaiah and Johanan son of Kareah and all the arrogant men said to Jeremiah, “You are lying! The '
  - type: text
    content: Lord
  - type: text
    content: ' our God has not sent you to say, ‘You must not go to Egypt to settle there.’ '
  '3':
  - type: text
    content: But Baruch son of Neriah is inciting you against us to hand us over to the Babylonians,
  - type: note
    content: Or Chaldeans
  - type: text
    content: ' so they may kill us or carry us into exile to Babylon.”'
  '4':
  - type: text
    content: 'So Johanan son of Kareah and all the army officers and all the people disobeyed the '
  - type: text
    content: Lord
  - type: text
    content: '’s command to stay in the land of Judah. '
  '5':
  - type: text
    content: 'Instead, Johanan son of Kareah and all the army officers led away all the remnant of Judah who had come back to live in the land of Judah from all the nations where they had been scattered. '
  '6':
  - type: text
    content: 'They also led away all those whom Nebuzaradan commander of the imperial guard had left with Gedaliah son of Ahikam, the son of Shaphan—the men, the women, the children and the king’s daughters. And they took Jeremiah the prophet and Baruch son of Neriah along with them. '
  '7':
  - type: text
    content: 'So they entered Egypt in disobedience to the '
  - type: text
    content: Lord
  - type: text
    content: ' and went as far as Tahpanhes.'
  '8':
  - type: text
    content: 'In Tahpanhes the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '9':
  - type: text
    content: '“While the Jews are watching, take some large stones with you and bury them in clay in the brick pavement at the entrance to Pharaoh’s palace in Tahpanhes. '
