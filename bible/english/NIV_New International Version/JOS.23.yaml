document_id: JOS.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Joshua’s Farewell to the Leaders
  - type: text
    content: 'After a long time had passed and the '
  - type: text
    content: Lord
  - type: text
    content: ' had given Israel rest from all their enemies around them, Joshua, by then a very old man, '
  '10':
  - type: text
    content: 'One of you routs a thousand, because the '
  - type: text
    content: Lord
  - type: text
    content: ' your God fights for you, just as he promised. '
  '11':
  - type: text
    content: 'So be very careful to love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '12':
  - type: text
    content: '“But if you turn away and ally yourselves with the survivors of these nations that remain among you and if you intermarry with them and associate with them, '
  '13':
  - type: text
    content: 'then you may be sure that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will no longer drive out these nations before you. Instead, they will become snares and traps for you, whips on your backs and thorns in your eyes, until you perish from this good land, which the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you.'
  '14':
  - type: text
    content: '“Now I am about to go the way of all the earth. You know with all your heart and soul that not one of all the good promises the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gave you has failed. Every promise has been fulfilled; not one has failed. '
  '15':
  - type: text
    content: 'But just as all the good things the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has promised you have come to you, so he will bring on you all the evil things he has threatened, until the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has destroyed you from this good land he has given you. '
  '16':
  - type: text
    content: 'If you violate the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, which he commanded you, and go and serve other gods and bow down to them, the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger will burn against you, and you will quickly perish from the good land he has given you.”
  '2':
  - type: text
    content: 'summoned all Israel—their elders, leaders, judges and officials—and said to them: “I am very old. '
  '3':
  - type: text
    content: 'You yourselves have seen everything the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has done to all these nations for your sake; it was the '
  - type: text
    content: Lord
  - type: text
    content: ' your God who fought for you. '
  '4':
  - type: text
    content: 'Remember how I have allotted as an inheritance for your tribes all the land of the nations that remain—the nations I conquered—between the Jordan and the Mediterranean Sea in the west. '
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God himself will push them out for your sake. He will drive them out before you, and you will take possession of their land, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God promised you.'
  '6':
  - type: text
    content: '“Be very strong; be careful to obey all that is written in the Book of the Law of Moses, without turning aside to the right or to the left. '
  '7':
  - type: text
    content: 'Do not associate with these nations that remain among you; do not invoke the names of their gods or swear by them. You must not serve them or bow down to them. '
  '8':
  - type: text
    content: 'But you are to hold fast to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, as you have until now.'
  '9':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has driven out before you great and powerful nations; to this day no one has been able to withstand you. '
