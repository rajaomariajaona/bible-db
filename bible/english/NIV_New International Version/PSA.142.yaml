  '3':
  - type: text
    content: When my spirit grows faint within me,
  - type: text
    content: it is you who watch over my way.
  - type: text
    content: In the path where I walk
  - type: text
    content: people have hidden a snare for me.
  '4':
  - type: text
    content: Look and see, there is no one at my right hand;
  - type: text
    content: no one is concerned for me.
  - type: text
    content: I have no refuge;
  - type: text
    content: no one cares for my life.
  '5':
  - type: text
    content: 'I cry to you, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I say, “You are my refuge,
  - type: text
