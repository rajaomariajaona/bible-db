  '6':
  - type: text
    content: Listen to my cry,
  - type: text
    content: for I am in desperate need;
  - type: text
    content: rescue me from those who pursue me,
  - type: text
    content: for they are too strong for me.
  '7':
  - type: text
    content: Set me free from my prison,
  - type: text
