  - type: text
    text: ' of David. When he was in the cave. A prayer.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I cry aloud to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I lift up my voice to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for mercy.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I pour out before him my complaint;
- type: usfm
  marker: q2
  children:
  - type: text
    text: before him I tell my trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When my spirit grows faint within me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is you who watch over my way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the path where I walk
- type: usfm
  marker: q2
  children:
  - type: text
    text: people have hidden a snare for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Look and see, there is no one at my right hand;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one is concerned for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have no refuge;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one cares for my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I cry to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I say, “You are my refuge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my portion in the land of the living.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Listen to my cry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I am in desperate need;
- type: usfm
  marker: q1
  children:
  - type: text
    text: rescue me from those who pursue me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they are too strong for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Set me free from my prison,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may praise your name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then the righteous will gather about me
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of your goodness to me.
