document_id: MRK.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John the Baptist Prepares the Way
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The beginning of the good news about Jesus the Messiah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jesus Christ. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Messiah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Hebrew) and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Greek) both mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Anointed One.
      marker-yv: yv-n
    - type: text
      text: ' the Son of God,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not have '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Son of God.
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as Jesus was coming up out of the water, he saw heaven being torn open and the Spirit descending on him like a dove. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a voice came from heaven: “You are my Son, whom I love; with you I am well pleased.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At once the Spirit sent him out into the wilderness, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he was in the wilderness forty days, being tempted
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tempted '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'can also mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tested.
      marker-yv: yv-n
    - type: text
      text: ' by Satan. He was with the wild animals, and angels attended him.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Announces the Good News
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After John was put in prison, Jesus went into Galilee, proclaiming the good news of God. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The time has come,”
    - type: text
      text: ' he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The kingdom of God has come near. Repent and believe the good news!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Calls His First Disciples
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus walked beside the Sea of Galilee, he saw Simon and his brother Andrew casting a net into the lake, for they were fishermen. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come, follow me,”
    - type: text
      text: ' Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “and I will send you out to fish for people.”
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At once they left their nets and followed him.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he had gone a little farther, he saw James son of Zebedee and his brother John in a boat, preparing their nets. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as it is written in Isaiah the prophet:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will send my messenger ahead of you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who will prepare your way”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mal. 3:1
      marker-yv: yv-n
    - type: text
      text: —
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Without delay he called them, and they left their father Zebedee in the boat with the hired men and followed him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Drives Out an Impure Spirit
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went to Capernaum, and when the Sabbath came, Jesus went into the synagogue and began to teach. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people were amazed at his teaching, because he taught them as one who had authority, not as the teachers of the law. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then a man in their synagogue who was possessed by an impure spirit cried out, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What do you want with us, Jesus of Nazareth? Have you come to destroy us? I know who you are—the Holy One of God!”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be quiet!”
    - type: text
      text: ' said Jesus sternly. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come out of him!”
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The impure spirit shook the man violently and came out of him with a shriek.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people were all so amazed that they asked each other, “What is this? A new teaching—and with authority! He even gives orders to impure spirits and they obey him.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: News about him spread quickly over the whole region of Galilee.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals Many
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as they left the synagogue, they went with James and John to the home of Simon and Andrew. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “a voice of one calling in the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Prepare the way for the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make straight paths for him.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 40:3
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon’s mother-in-law was in bed with a fever, and they immediately told Jesus about her. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he went to her, took her hand and helped her up. The fever left her and she began to wait on them.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That evening after sunset the people brought to Jesus all the sick and demon-possessed. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The whole town gathered at the door, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Jesus healed many who had various diseases. He also drove out many demons, but he would not let the demons speak because they knew who he was.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prays in a Solitary Place
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Very early in the morning, while it was still dark, Jesus got up, left the house and went off to a solitary place, where he prayed. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon and his companions went to look for him, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and when they found him, they exclaimed: “Everyone is looking for you!”'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let us go somewhere else—to the nearby villages—so I can preach there also. That is why I have come.”
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he traveled throughout Galilee, preaching in their synagogues and driving out demons.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals a Man With Leprosy
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And so John the Baptist appeared in the wilderness, preaching a baptism of repentance for the forgiveness of sins. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A man with leprosy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word traditionally translated '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leprosy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was used for various diseases affecting the skin.
      marker-yv: yv-n
    - type: text
      text: ' came to him and begged him on his knees, “If you are willing, you can make me clean.”'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus was indignant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jesus was filled with compassion
      marker-yv: yv-n
    - type: text
      text: ' He reached out his hand and touched the man. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am willing,”
    - type: text
      text: ' he said. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be clean!”
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Immediately the leprosy left him and he was cleansed.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus sent him away at once with a strong warning: '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “See that you don’t tell this to anyone. But go, show yourself to the priest and offer the sacrifices that Moses commanded for your cleansing, as a testimony to them.”
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Instead he went out and began to talk freely, spreading the news. As a result, Jesus could no longer enter a town openly but stayed outside in lonely places. Yet the people still came to him from everywhere.
  '5':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'The whole Judean countryside and all the people of Jerusalem went out to him. Confessing their sins, they were baptized by him in the Jordan River. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'John wore clothing made of camel’s hair, with a leather belt around his waist, and he ate locusts and wild honey. '
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And this was his message: “After me comes the one more powerful than I, the straps of whose sandals I am not worthy to stoop down and untie. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: I baptize you with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' water, but he will baptize you with'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' the Holy Spirit.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Baptism and Testing of Jesus
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Jesus came from Nazareth in Galilee and was baptized by John in the Jordan. '
