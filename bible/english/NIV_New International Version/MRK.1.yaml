document_id: MRK.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: The beginning of the good news about Jesus the Messiah,
  - type: note
    content: Or Jesus Christ. Messiah (Hebrew) and Christ (Greek) both mean Anointed One.
  - type: text
    content: ' the Son of God,'
  - type: note
    content: Some manuscripts do not have the Son of God.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Just as Jesus was coming up out of the water, he saw heaven being torn open and the Spirit descending on him like a dove. '
  '11':
  - type: text
    content: 'And a voice came from heaven: “You are my Son, whom I love; with you I am well pleased.”'
  '12':
  - type: text
    content: 'At once the Spirit sent him out into the wilderness, '
  '13':
  - type: text
    content: and he was in the wilderness forty days, being tempted
  - type: note
    content: The Greek for tempted can also mean tested.
  - type: text
    content: ' by Satan. He was with the wild animals, and angels attended him.'
  - type: heading
    content: Jesus Announces the Good News
  '14':
  - type: text
    content: 'After John was put in prison, Jesus went into Galilee, proclaiming the good news of God. '
  '15':
  - type: text
    content: “The time has come,”
  - type: text
    content: ' he said. '
  - type: text
    content: “The kingdom of God has come near. Repent and believe the good news!”
  - type: heading
    content: Jesus Calls His First Disciples
  '16':
  - type: text
    content: 'As Jesus walked beside the Sea of Galilee, he saw Simon and his brother Andrew casting a net into the lake, for they were fishermen. '
  '17':
  - type: text
    content: “Come, follow me,”
  - type: text
    content: ' Jesus said, '
  - type: text
    content: “and I will send you out to fish for people.”
  - type: text
    content: ' '
  '18':
  - type: text
    content: At once they left their nets and followed him.
  '19':
  - type: text
    content: 'When he had gone a little farther, he saw James son of Zebedee and his brother John in a boat, preparing their nets. '
  '2':
  - type: text
    content: 'as it is written in Isaiah the prophet:'
  - type: text
    content: “I will send my messenger ahead of you,
  - type: text
    content: who will prepare your way”
  - type: note
    content: Mal. 3:1
  - type: text
    content: —
  '20':
  - type: text
    content: Without delay he called them, and they left their father Zebedee in the boat with the hired men and followed him.
  - type: heading
    content: Jesus Drives Out an Impure Spirit
  '21':
  - type: text
    content: 'They went to Capernaum, and when the Sabbath came, Jesus went into the synagogue and began to teach. '
  '22':
  - type: text
    content: 'The people were amazed at his teaching, because he taught them as one who had authority, not as the teachers of the law. '
  '23':
  - type: text
    content: 'Just then a man in their synagogue who was possessed by an impure spirit cried out, '
  '24':
  - type: text
    content: “What do you want with us, Jesus of Nazareth? Have you come to destroy us? I know who you are—the Holy One of God!”
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Be quiet!”
  - type: text
    content: ' said Jesus sternly. '
  - type: text
    content: “Come out of him!”
  - type: text
    content: ' '
  '26':
  - type: text
    content: The impure spirit shook the man violently and came out of him with a shriek.
  '27':
  - type: text
    content: 'The people were all so amazed that they asked each other, “What is this? A new teaching—and with authority! He even gives orders to impure spirits and they obey him.” '
  '28':
  - type: text
    content: News about him spread quickly over the whole region of Galilee.
  - type: heading
    content: Jesus Heals Many
  '29':
  - type: text
    content: 'As soon as they left the synagogue, they went with James and John to the home of Simon and Andrew. '
  '3':
  - type: text
    content: “a voice of one calling in the wilderness,
  - type: text
    content: ‘Prepare the way for the Lord,
  - type: text
    content: make straight paths for him.’ ”
  - type: note
    content: Isaiah 40:3
  '30':
  - type: text
    content: 'Simon’s mother-in-law was in bed with a fever, and they immediately told Jesus about her. '
  '31':
  - type: text
    content: So he went to her, took her hand and helped her up. The fever left her and she began to wait on them.
  '32':
  - type: text
    content: 'That evening after sunset the people brought to Jesus all the sick and demon-possessed. '
  '33':
  - type: text
    content: 'The whole town gathered at the door, '
  '34':
  - type: text
    content: and Jesus healed many who had various diseases. He also drove out many demons, but he would not let the demons speak because they knew who he was.
  - type: heading
    content: Jesus Prays in a Solitary Place
  '35':
  - type: text
    content: 'Very early in the morning, while it was still dark, Jesus got up, left the house and went off to a solitary place, where he prayed. '
  '36':
  - type: text
    content: 'Simon and his companions went to look for him, '
  '37':
  - type: text
    content: 'and when they found him, they exclaimed: “Everyone is looking for you!”'
  '38':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Let us go somewhere else—to the nearby villages—so I can preach there also. That is why I have come.”
  - type: text
    content: ' '
  '39':
  - type: text
    content: So he traveled throughout Galilee, preaching in their synagogues and driving out demons.
  - type: heading
    content: Jesus Heals a Man With Leprosy
  '4':
  - type: text
    content: 'And so John the Baptist appeared in the wilderness, preaching a baptism of repentance for the forgiveness of sins. '
  '40':
  - type: text
    content: A man with leprosy
  - type: note
    content: The Greek word traditionally translated leprosy was used for various diseases affecting the skin.
  - type: text
    content: ' came to him and begged him on his knees, “If you are willing, you can make me clean.”'
  '41':
  - type: text
    content: Jesus was indignant.
  - type: note
    content: Many manuscripts Jesus was filled with compassion
  - type: text
    content: ' He reached out his hand and touched the man. '
  - type: text
    content: “I am willing,”
  - type: text
    content: ' he said. '
  - type: text
    content: “Be clean!”
  - type: text
    content: ' '
  '42':
  - type: text
    content: Immediately the leprosy left him and he was cleansed.
  '43':
  - type: text
    content: 'Jesus sent him away at once with a strong warning: '
  '44':
  - type: text
    content: “See that you don’t tell this to anyone. But go, show yourself to the priest and offer the sacrifices that Moses commanded for your cleansing, as a testimony to them.”
  - type: text
    content: ' '
  '45':
  - type: text
    content: Instead he went out and began to talk freely, spreading the news. As a result, Jesus could no longer enter a town openly but stayed outside in lonely places. Yet the people still came to him from everywhere.
  '5':
  - type: text
    content: 'The whole Judean countryside and all the people of Jerusalem went out to him. Confessing their sins, they were baptized by him in the Jordan River. '
  '6':
  - type: text
    content: 'John wore clothing made of camel’s hair, with a leather belt around his waist, and he ate locusts and wild honey. '
  '7':
  - type: text
    content: 'And this was his message: “After me comes the one more powerful than I, the straps of whose sandals I am not worthy to stoop down and untie. '
  '8':
  - type: text
    content: I baptize you with
  - type: note
    content: Or in
  - type: text
    content: ' water, but he will baptize you with'
  - type: note
    content: Or in
  - type: text
    content: ' the Holy Spirit.”'
  - type: heading
    content: The Baptism and Testing of Jesus
  '9':
  - type: text
    content: 'At that time Jesus came from Nazareth in Galilee and was baptized by John in the Jordan. '
