  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See what they spew from their mouths—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the words from their lips are sharp as swords,
  - type: usfm
    marker: q2
    children:
