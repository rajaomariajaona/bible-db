      children:
      - type: text
        text: In Hebrew texts 59:1-17 is numbered 59:2-18.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the director of music. To the tune of “Do Not Destroy.” Of David. A '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: miktam.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a literary or musical term'
    marker-yv: yv-n
  - type: text
    text: ' When Saul had sent men to watch David’s house in order to kill him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Deliver me from my enemies, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be my fortress against those who are attacking me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Deliver me from evildoers
- type: usfm
  marker: q2
  children:
  - type: text
    text: and save me from those who are after my blood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: See how they lie in wait for me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Fierce men conspire against me
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for no offense or sin of mine, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I have done no wrong, yet they are ready to attack me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Arise to help me; look on my plight!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God Almighty,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who are the God of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rouse yourself to punish all the nations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: show no mercy to wicked traitors.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here and at the end of verse 13.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They return at evening,
- type: usfm
  marker: q2
  children:
  - type: text
    text: snarling like dogs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and prowl about the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: See what they spew from their mouths—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the words from their lips are sharp as swords,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they think, “Who can hear us?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But you laugh at them, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you scoff at all those nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You are my strength, I watch for you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you, God, are my fortress,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: my God on whom I can rely.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God will go before me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will let me gloat over those who slander me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But do not kill them, Lord our shield,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sovereign
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: or my people will forget.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In your might uproot them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring them down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: For the sins of their mouths,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the words of their lips,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them be caught in their pride.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the curses and lies they utter,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: consume them in your wrath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: consume them till they are no more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then it will be known to the ends of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: that God rules over Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They return at evening,
- type: usfm
  marker: q2
  children:
  - type: text
    text: snarling like dogs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and prowl about the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They wander about for food
- type: usfm
  marker: q2
  children:
  - type: text
    text: and howl if not satisfied.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But I will sing of your strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the morning I will sing of your love;
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are my fortress,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my refuge in times of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You are my strength, I sing praise to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you, God, are my fortress,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my God on whom I can rely.
