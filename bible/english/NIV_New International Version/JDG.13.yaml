document_id: JDG.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Samson
  - type: text
    content: 'Again the Israelites did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', so the '
  - type: text
    content: Lord
  - type: text
    content: ' delivered them into the hands of the Philistines for forty years.'
  '10':
  - type: text
    content: The woman hurried to tell her husband, “He’s here! The man who appeared to me the other day!”
  '11':
  - type: text
    content: Manoah got up and followed his wife. When he came to the man, he said, “Are you the man who talked to my wife?”
  - type: text
    content: “I am,” he said.
  '12':
  - type: text
    content: So Manoah asked him, “When your words are fulfilled, what is to be the rule that governs the boy’s life and work?”
  '13':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' answered, “Your wife must do all that I have told her. '
  '14':
  - type: text
    content: She must not eat anything that comes from the grapevine, nor drink any wine or other fermented drink nor eat anything unclean. She must do everything I have commanded her.”
  '15':
  - type: text
    content: 'Manoah said to the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', “We would like you to stay until we prepare a young goat for you.”'
  '16':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Even though you detain me, I will not eat any of your food. But if you prepare a burnt offering, offer it to the '
  - type: text
    content: Lord
  - type: text
    content: '.” (Manoah did not realize that it was the angel of the '
  - type: text
    content: Lord
  - type: text
    content: .)
  '17':
  - type: text
    content: 'Then Manoah inquired of the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', “What is your name, so that we may honor you when your word comes true?”'
  '18':
  - type: text
    content: He replied, “Why do you ask my name? It is beyond understanding.
  - type: note
    content: Or is wonderful
  - type: text
    content: '” '
  '19':
  - type: text
    content: 'Then Manoah took a young goat, together with the grain offering, and sacrificed it on a rock to the '
  - type: text
    content: Lord
  - type: text
    content: '. And the '
  - type: text
    content: Lord
  - type: text
    content: ' did an amazing thing while Manoah and his wife watched: '
  '2':
  - type: text
    content: 'A certain man of Zorah, named Manoah, from the clan of the Danites, had a wife who was childless, unable to give birth. '
  '20':
  - type: text
    content: 'As the flame blazed up from the altar toward heaven, the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' ascended in the flame. Seeing this, Manoah and his wife fell with their faces to the ground. '
  '21':
  - type: text
    content: 'When the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' did not show himself again to Manoah and his wife, Manoah realized that it was the angel of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '22':
  - type: text
    content: “We are doomed to die!” he said to his wife. “We have seen God!”
  '23':
  - type: text
    content: 'But his wife answered, “If the '
  - type: text
    content: Lord
  - type: text
    content: ' had meant to kill us, he would not have accepted a burnt offering and grain offering from our hands, nor shown us all these things or now told us this.”'
  '24':
  - type: text
    content: 'The woman gave birth to a boy and named him Samson. He grew and the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed him, '
  '25':
  - type: text
    content: 'and the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' began to stir him while he was in Mahaneh Dan, between Zorah and Eshtaol.'
  '3':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to her and said, “You are barren and childless, but you are going to become pregnant and give birth to a son. '
  '4':
  - type: text
    content: 'Now see to it that you drink no wine or other fermented drink and that you do not eat anything unclean. '
  '5':
  - type: text
    content: You will become pregnant and have a son whose head is never to be touched by a razor because the boy is to be a Nazirite, dedicated to God from the womb. He will take the lead in delivering Israel from the hands of the Philistines.”
  '6':
  - type: text
    content: 'Then the woman went to her husband and told him, “A man of God came to me. He looked like an angel of God, very awesome. I didn’t ask him where he came from, and he didn’t tell me his name. '
  '7':
  - type: text
    content: But he said to me, ‘You will become pregnant and have a son. Now then, drink no wine or other fermented drink and do not eat anything unclean, because the boy will be a Nazirite of God from the womb until the day of his death.’ ”
  '8':
  - type: text
    content: 'Then Manoah prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ': “Pardon your servant, Lord. I beg you to let the man of God you sent to us come again to teach us how to bring up the boy who is to be born.”'
  '9':
  - type: text
    content: 'God heard Manoah, and the angel of God came again to the woman while she was out in the field; but her husband Manoah was not with her. '
