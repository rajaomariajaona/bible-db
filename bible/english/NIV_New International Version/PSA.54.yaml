    children:
    - type: text
      text: Psalm 54
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 54:1-7 is numbered 54:3-9.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. With stringed instruments. A '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: maskil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a literary or musical term'
      marker-yv: yv-n
    - type: text
      text: ' of David. When the Ziphites had gone to Saul and said, “Is not David hiding among us?”'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Save me, O God, by your name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: vindicate me by your might.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hear my prayer, O God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to the words of my mouth.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Arrogant foes are attacking me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ruthless people are trying to kill me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people without regard for God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '54:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Surely God is my help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Lord is the one who sustains me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Let evil recoil on those who slander me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your faithfulness destroy them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I will sacrifice a freewill offering to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will praise your name, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for it is good.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: You have delivered me from all my troubles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my eyes have looked in triumph on my foes.
