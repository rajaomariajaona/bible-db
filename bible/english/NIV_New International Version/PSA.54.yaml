document_id: PSA.54,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 54In Hebrew texts 54:1-7 is numbered 54:3-9.
  - type: text
    content: 'For the director of music. With stringed instruments. A '
  - type: text
    content: maskil
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of David. When the Ziphites had gone to Saul and said, “Is not David hiding among us?”'
  - type: text
    content: Save me, O God, by your name;
  - type: text
    content: vindicate me by your might.
  '2':
  - type: text
    content: Hear my prayer, O God;
  - type: text
    content: listen to the words of my mouth.
  '3':
  - type: text
    content: Arrogant foes are attacking me;
  - type: text
    content: ruthless people are trying to kill me—
  - type: text
    content: people without regard for God.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '4':
  - type: text
    content: Surely God is my help;
  - type: text
    content: the Lord is the one who sustains me.
  '5':
  - type: text
    content: Let evil recoil on those who slander me;
  - type: text
    content: in your faithfulness destroy them.
  '6':
  - type: text
    content: I will sacrifice a freewill offering to you;
  - type: text
    content: 'I will praise your name, '
  - type: text
    content: Lord
  - type: text
    content: ', for it is good.'
  '7':
  - type: text
    content: You have delivered me from all my troubles,
  - type: text
    content: and my eyes have looked in triumph on my foes.
