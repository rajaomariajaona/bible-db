document_id: GEN.49,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Blesses His Sons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jacob called for his sons and said: “Gather around so I can tell you what will happen to you in days to come.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The scepter will not depart from Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor the ruler’s staff from between his feet,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from his descendants
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until he to whom it belongs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to whom tribute belongs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; the meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' shall come'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the obedience of the nations shall be his.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will tether his donkey to a vine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his colt to the choicest branch;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will wash his garments in wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his robes in the blood of grapes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His eyes will be darker than wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his teeth whiter than milk.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will be dull from wine, / his teeth white from milk
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Zebulun will live by the seashore
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and become a haven for ships;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his border will extend toward Sidon.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Issachar is a rawboned
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: strong
      marker-yv: yv-n
    - type: text
      text: ' donkey'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lying down among the sheep pens.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the campfires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the saddlebags
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When he sees how good is his resting place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how pleasant is his land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will bend his shoulder to the burden
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and submit to forced labor.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Dan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'here means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'he provides '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: justice
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' will provide justice for his people'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as one of the tribes of Israel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dan will be a snake by the roadside,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a viper along the path,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that bites the horse’s heels
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that its rider tumbles backward.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I look for your deliverance, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Gad
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gad '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'attack '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and also for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: band of raiders
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' will be attacked by a band of raiders,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he will attack them at their heels.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Assemble and listen, sons of Jacob;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to your father Israel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Asher’s food will be rich;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will provide delicacies fit for a king.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Naphtali is a doe set free
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that bears beautiful fawns.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: free; / he utters beautiful words
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Joseph is a fruitful vine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a fruitful vine near a spring,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose branches climb over a wall.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Joseph is a wild colt, / a wild colt near a spring, / a wild donkey on a terraced hill
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With bitterness archers attacked him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they shot at him with hostility.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But his bow remained steady,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his strong arms stayed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:23,24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: archers will attack… will shoot… will remain… will stay
      marker-yv: yv-n
    - type: text
      text: ' limber,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of the hand of the Mighty One of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the Shepherd, the Rock of Israel,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of your father’s God, who helps you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the Almighty,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shaddai
      marker-yv: yv-n
    - type: text
      text: ' who blesses you'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with blessings of the skies above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blessings of the deep springs below,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blessings of the breast and womb.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your father’s blessings are greater
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than the blessings of the ancient mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of my progenitors, / as great as
      marker-yv: yv-n
    - type: text
      text: ' the bounty of the age-old hills.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all these rest on the head of Joseph,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the brow of the prince among
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of the one separated from
      marker-yv: yv-n
    - type: text
      text: ' his brothers.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Benjamin is a ravenous wolf;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the morning he devours the prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the evening he divides the plunder.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All these are the twelve tribes of Israel, and this is what their father said to them when he blessed them, giving each the blessing appropriate to him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Jacob
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he gave them these instructions: “I am about to be gathered to my people. Bury me with my fathers in the cave in the field of Ephron the Hittite, '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Reuben, you are my firstborn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my might, the first sign of my strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: excelling in honor, excelling in power.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the cave in the field of Machpelah, near Mamre in Canaan, which Abraham bought along with the field as a burial place from Ephron the Hittite. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There Abraham and his wife Sarah were buried, there Isaac and his wife Rebekah were buried, and there I buried Leah. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The field and the cave in it were bought from the Hittites.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the descendants of Heth
      marker-yv: yv-n
    - type: text
      text: ”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Jacob had finished giving instructions to his sons, he drew his feet up into the bed, breathed his last and was gathered to his people.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turbulent as the waters, you will no longer excel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you went up onto your father’s bed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: onto my couch and defiled it.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Simeon and Levi are brothers—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their swords
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' are weapons of violence.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me not enter their council,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me not join their assembly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they have killed men in their anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hamstrung oxen as they pleased.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cursed be their anger, so fierce,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their fury, so cruel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will scatter them in Jacob
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and disperse them in Israel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Judah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Judah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like and may be derived from the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: praise
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' your brothers will praise you;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your hand will be on the neck of your enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your father’s sons will bow down to you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are a lion’s cub, Judah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you return from the prey, my son.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a lion he crouches and lies down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a lioness—who dares to rouse him?
