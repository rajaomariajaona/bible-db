document_id: GEN.49,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Blesses His Sons
  - type: text
    content: 'Then Jacob called for his sons and said: “Gather around so I can tell you what will happen to you in days to come.'
  '10':
  - type: text
    content: The scepter will not depart from Judah,
  - type: text
    content: nor the ruler’s staff from between his feet,
  - type: note
    content: Or from his descendants
  - type: text
    content: until he to whom it belongs
  - type: note
    content: Or to whom tribute belongs; the meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' shall come'
  - type: text
    content: and the obedience of the nations shall be his.
  '11':
  - type: text
    content: He will tether his donkey to a vine,
  - type: text
    content: his colt to the choicest branch;
  - type: text
    content: he will wash his garments in wine,
  - type: text
    content: his robes in the blood of grapes.
  '12':
  - type: text
    content: His eyes will be darker than wine,
  - type: text
    content: his teeth whiter than milk.
  - type: note
    content: Or will be dull from wine, / his teeth white from milk
  '13':
  - type: text
    content: “Zebulun will live by the seashore
  - type: text
    content: and become a haven for ships;
  - type: text
    content: his border will extend toward Sidon.
  '14':
  - type: text
    content: “Issachar is a rawboned
  - type: note
    content: Or strong
  - type: text
    content: ' donkey'
  - type: text
    content: lying down among the sheep pens.
  - type: note
    content: Or the campfires; or the saddlebags
  '15':
  - type: text
    content: When he sees how good is his resting place
  - type: text
    content: and how pleasant is his land,
  - type: text
    content: he will bend his shoulder to the burden
  - type: text
    content: and submit to forced labor.
  '16':
  - type: text
    content: “Dan
  - type: note
    content: Dan here means he provides justice.
  - type: text
    content: ' will provide justice for his people'
  - type: text
    content: as one of the tribes of Israel.
  '17':
  - type: text
    content: Dan will be a snake by the roadside,
  - type: text
    content: a viper along the path,
  - type: text
    content: that bites the horse’s heels
  - type: text
    content: so that its rider tumbles backward.
  '18':
  - type: text
    content: '“I look for your deliverance, '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: “Gad
  - type: note
    content: Gad sounds like the Hebrew for attack and also for band of raiders.
  - type: text
    content: ' will be attacked by a band of raiders,'
  - type: text
    content: but he will attack them at their heels.
  '2':
  - type: text
    content: “Assemble and listen, sons of Jacob;
  - type: text
    content: listen to your father Israel.
  '20':
  - type: text
    content: “Asher’s food will be rich;
  - type: text
    content: he will provide delicacies fit for a king.
  '21':
  - type: text
    content: “Naphtali is a doe set free
  - type: text
    content: that bears beautiful fawns.
  - type: note
    content: Or free; / he utters beautiful words
  '22':
  - type: text
    content: “Joseph is a fruitful vine,
  - type: text
    content: a fruitful vine near a spring,
  - type: text
    content: whose branches climb over a wall.
  - type: note
    content: Or Joseph is a wild colt, / a wild colt near a spring, / a wild donkey on a terraced hill
  '23':
  - type: text
    content: With bitterness archers attacked him;
  - type: text
    content: they shot at him with hostility.
  '24':
  - type: text
    content: But his bow remained steady,
  - type: text
    content: his strong arms stayed
  - type: note
    content: Or archers will attack… will shoot… will remain… will stay
  - type: text
    content: ' limber,'
  - type: text
    content: because of the hand of the Mighty One of Jacob,
  - type: text
    content: because of the Shepherd, the Rock of Israel,
  '25':
  - type: text
    content: because of your father’s God, who helps you,
  - type: text
    content: because of the Almighty,
  - type: note
    content: Hebrew Shaddai
  - type: text
    content: ' who blesses you'
  - type: text
    content: with blessings of the skies above,
  - type: text
    content: blessings of the deep springs below,
  - type: text
    content: blessings of the breast and womb.
  '26':
  - type: text
    content: Your father’s blessings are greater
  - type: text
    content: than the blessings of the ancient mountains,
  - type: text
    content: than
  - type: note
    content: Or of my progenitors, / as great as
  - type: text
    content: ' the bounty of the age-old hills.'
  - type: text
    content: Let all these rest on the head of Joseph,
  - type: text
    content: on the brow of the prince among
  - type: note
    content: Or of the one separated from
  - type: text
    content: ' his brothers.'
  '27':
  - type: text
    content: “Benjamin is a ravenous wolf;
  - type: text
    content: in the morning he devours the prey,
  - type: text
    content: in the evening he divides the plunder.”
  '28':
  - type: text
    content: All these are the twelve tribes of Israel, and this is what their father said to them when he blessed them, giving each the blessing appropriate to him.
  - type: heading
    content: The Death of Jacob
  '29':
  - type: text
    content: 'Then he gave them these instructions: “I am about to be gathered to my people. Bury me with my fathers in the cave in the field of Ephron the Hittite, '
  '3':
  - type: text
    content: “Reuben, you are my firstborn,
  - type: text
    content: my might, the first sign of my strength,
  - type: text
    content: excelling in honor, excelling in power.
  '30':
  - type: text
    content: 'the cave in the field of Machpelah, near Mamre in Canaan, which Abraham bought along with the field as a burial place from Ephron the Hittite. '
  '31':
  - type: text
    content: 'There Abraham and his wife Sarah were buried, there Isaac and his wife Rebekah were buried, and there I buried Leah. '
  '32':
  - type: text
    content: The field and the cave in it were bought from the Hittites.
  - type: note
    content: Or the descendants of Heth
  - type: text
    content: ”
  '33':
  - type: text
    content: When Jacob had finished giving instructions to his sons, he drew his feet up into the bed, breathed his last and was gathered to his people.
  '4':
  - type: text
    content: Turbulent as the waters, you will no longer excel,
  - type: text
    content: for you went up onto your father’s bed,
  - type: text
    content: onto my couch and defiled it.
  '5':
  - type: text
    content: “Simeon and Levi are brothers—
  - type: text
    content: their swords
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' are weapons of violence.'
  '6':
  - type: text
    content: Let me not enter their council,
  - type: text
    content: let me not join their assembly,
  - type: text
    content: for they have killed men in their anger
  - type: text
    content: and hamstrung oxen as they pleased.
  '7':
  - type: text
    content: Cursed be their anger, so fierce,
  - type: text
    content: and their fury, so cruel!
  - type: text
    content: I will scatter them in Jacob
  - type: text
    content: and disperse them in Israel.
  '8':
  - type: text
    content: “Judah,
  - type: note
    content: Judah sounds like and may be derived from the Hebrew for praise.
  - type: text
    content: ' your brothers will praise you;'
  - type: text
    content: your hand will be on the neck of your enemies;
  - type: text
    content: your father’s sons will bow down to you.
  '9':
  - type: text
    content: You are a lion’s cub, Judah;
  - type: text
    content: you return from the prey, my son.
  - type: text
    content: Like a lion he crouches and lies down,
  - type: text
    content: like a lioness—who dares to rouse him?
