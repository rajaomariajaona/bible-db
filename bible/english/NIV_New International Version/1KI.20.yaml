document_id: 1KI.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Ben-Hadad Attacks Samaria
  - type: text
    content: 'Now Ben-Hadad king of Aram mustered his entire army. Accompanied by thirty-two kings with their horses and chariots, he went up and besieged Samaria and attacked it. '
  '10':
  - type: text
    content: 'Then Ben-Hadad sent another message to Ahab: “May the gods deal with me, be it ever so severely, if enough dust remains in Samaria to give each of my men a handful.”'
  '11':
  - type: text
    content: 'The king of Israel answered, “Tell him: ‘One who puts on his armor should not boast like one who takes it off.’ ”'
  '12':
  - type: text
    content: Ben-Hadad heard this message while he and the kings were drinking in their tents,
  - type: note
    content: Or in Sukkoth; also in verse 16
  - type: text
    content: ' and he ordered his men: “Prepare to attack.” So they prepared to attack the city.'
  - type: heading
    content: Ahab Defeats Ben-Hadad
  '13':
  - type: text
    content: 'Meanwhile a prophet came to Ahab king of Israel and announced, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Do you see this vast army? I will give it into your hand today, and then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '14':
  - type: text
    content: “But who will do this?” asked Ahab.
  - type: text
    content: 'The prophet replied, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘The junior officers under the provincial commanders will do it.’ ”'
  - type: text
    content: “And who will start the battle?” he asked.
  - type: text
    content: The prophet answered, “You will.”
  '15':
  - type: text
    content: 'So Ahab summoned the 232 junior officers under the provincial commanders. Then he assembled the rest of the Israelites, 7,000 in all. '
  '16':
  - type: text
    content: 'They set out at noon while Ben-Hadad and the 32 kings allied with him were in their tents getting drunk. '
  '17':
  - type: text
    content: The junior officers under the provincial commanders went out first.
  - type: text
    content: Now Ben-Hadad had dispatched scouts, who reported, “Men are advancing from Samaria.”
  '18':
  - type: text
    content: He said, “If they have come out for peace, take them alive; if they have come out for war, take them alive.”
  '19':
  - type: text
    content: 'The junior officers under the provincial commanders marched out of the city with the army behind them '
  '2':
  - type: text
    content: 'He sent messengers into the city to Ahab king of Israel, saying, “This is what Ben-Hadad says: '
  '20':
  - type: text
    content: 'and each one struck down his opponent. At that, the Arameans fled, with the Israelites in pursuit. But Ben-Hadad king of Aram escaped on horseback with some of his horsemen. '
  '21':
  - type: text
    content: The king of Israel advanced and overpowered the horses and chariots and inflicted heavy losses on the Arameans.
  '22':
  - type: text
    content: Afterward, the prophet came to the king of Israel and said, “Strengthen your position and see what must be done, because next spring the king of Aram will attack you again.”
  '23':
  - type: text
    content: 'Meanwhile, the officials of the king of Aram advised him, “Their gods are gods of the hills. That is why they were too strong for us. But if we fight them on the plains, surely we will be stronger than they. '
  '24':
  - type: text
    content: 'Do this: Remove all the kings from their commands and replace them with other officers. '
  '25':
  - type: text
    content: You must also raise an army like the one you lost—horse for horse and chariot for chariot—so we can fight Israel on the plains. Then surely we will be stronger than they.” He agreed with them and acted accordingly.
  '26':
  - type: text
    content: 'The next spring Ben-Hadad mustered the Arameans and went up to Aphek to fight against Israel. '
  '27':
  - type: text
    content: When the Israelites were also mustered and given provisions, they marched out to meet them. The Israelites camped opposite them like two small flocks of goats, while the Arameans covered the countryside.
  '28':
  - type: text
    content: 'The man of God came up and told the king of Israel, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Because the Arameans think the '
  - type: text
    content: Lord
  - type: text
    content: ' is a god of the hills and not a god of the valleys, I will deliver this vast army into your hands, and you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '29':
  - type: text
    content: 'For seven days they camped opposite each other, and on the seventh day the battle was joined. The Israelites inflicted a hundred thousand casualties on the Aramean foot soldiers in one day. '
  '3':
  - type: text
    content: ‘Your silver and gold are mine, and the best of your wives and children are mine.’ ”
  '30':
  - type: text
    content: The rest of them escaped to the city of Aphek, where the wall collapsed on twenty-seven thousand of them. And Ben-Hadad fled to the city and hid in an inner room.
  '31':
  - type: text
    content: His officials said to him, “Look, we have heard that the kings of Israel are merciful. Let us go to the king of Israel with sackcloth around our waists and ropes around our heads. Perhaps he will spare your life.”
  '32':
  - type: text
    content: 'Wearing sackcloth around their waists and ropes around their heads, they went to the king of Israel and said, “Your servant Ben-Hadad says: ‘Please let me live.’ ”'
  - type: text
    content: The king answered, “Is he still alive? He is my brother.”
  '33':
  - type: text
    content: The men took this as a good sign and were quick to pick up his word. “Yes, your brother Ben-Hadad!” they said.
  - type: text
    content: “Go and get him,” the king said. When Ben-Hadad came out, Ahab had him come up into his chariot.
  '34':
  - type: text
    content: “I will return the cities my father took from your father,” Ben-Hadad offered. “You may set up your own market areas in Damascus, as my father did in Samaria.”
  - type: text
    content: Ahab said, “On the basis of a treaty I will set you free.” So he made a treaty with him, and let him go.
  - type: heading
    content: A Prophet Condemns Ahab
  '35':
  - type: text
    content: 'By the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' one of the company of the prophets said to his companion, “Strike me with your weapon,” but he refused.'
  '36':
  - type: text
    content: 'So the prophet said, “Because you have not obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ', as soon as you leave me a lion will kill you.” And after the man went away, a lion found him and killed him.'
  '37':
  - type: text
    content: 'The prophet found another man and said, “Strike me, please.” So the man struck him and wounded him. '
  '38':
  - type: text
    content: 'Then the prophet went and stood by the road waiting for the king. He disguised himself with his headband down over his eyes. '
  '39':
  - type: text
    content: As the king passed by, the prophet called out to him, “Your servant went into the thick of the battle, and someone came to me with a captive and said, ‘Guard this man. If he is missing, it will be your life for his life, or you must pay a talent
  - type: note
    content: That is, about 75 pounds or about 34 kilograms
  - type: text
    content: ' of silver.’ '
  '4':
  - type: text
    content: The king of Israel answered, “Just as you say, my lord the king. I and all I have are yours.”
  '40':
  - type: text
    content: While your servant was busy here and there, the man disappeared.”
  - type: text
    content: “That is your sentence,” the king of Israel said. “You have pronounced it yourself.”
  '41':
  - type: text
    content: 'Then the prophet quickly removed the headband from his eyes, and the king of Israel recognized him as one of the prophets. '
  '42':
  - type: text
    content: 'He said to the king, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘You have set free a man I had determined should die.'
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' Therefore it is your life for his life, your people for his people.’ ” '
  '43':
  - type: text
    content: Sullen and angry, the king of Israel went to his palace in Samaria.
  '5':
  - type: text
    content: 'The messengers came again and said, “This is what Ben-Hadad says: ‘I sent to demand your silver and gold, your wives and your children. '
  '6':
  - type: text
    content: But about this time tomorrow I am going to send my officials to search your palace and the houses of your officials. They will seize everything you value and carry it away.’ ”
  '7':
  - type: text
    content: The king of Israel summoned all the elders of the land and said to them, “See how this man is looking for trouble! When he sent for my wives and my children, my silver and my gold, I did not refuse him.”
  '8':
  - type: text
    content: The elders and the people all answered, “Don’t listen to him or agree to his demands.”
  '9':
  - type: text
    content: So he replied to Ben-Hadad’s messengers, “Tell my lord the king, ‘Your servant will do all you demanded the first time, but this demand I cannot meet.’ ” They left and took the answer back to Ben-Hadad.
