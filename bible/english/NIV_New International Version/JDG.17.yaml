document_id: JDG.17,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Micah’s Idols
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now a man named Micah from the hill country of Ephraim '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then Micah said to him, “Live with me and be my father and priest, and I’ll give you ten shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 4 ounces or about 115 grams
      marker-yv: yv-n
    - type: text
      text: ' of silver a year, your clothes and your food.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So the Levite agreed to live with him, and the young man became like one of his sons to him. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Micah installed the Levite, and the young man became his priest and lived in his house. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And Micah said, “Now I know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be good to me, since this Levite has become my priest.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: said to his mother, “The eleven hundred shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 28 pounds or about 13 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver that were taken from you and about which I heard you utter a curse—I have that silver with me; I took it.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then his mother said, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you, my son!”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When he returned the eleven hundred shekels of silver to his mother, she said, “I solemnly consecrate my silver to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for my son to make an image overlaid with silver. I will give it back to you.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So after he returned the silver to his mother, she took two hundred shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 5 pounds or about 2.3 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver and gave them to a silversmith, who used them to make the idol. And it was put in Micah’s house.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now this man Micah had a shrine, and he made an ephod and some household gods and installed one of his sons as his priest. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: In those days Israel had no king; everyone did as they saw fit.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'A young Levite from Bethlehem in Judah, who had been living within the clan of Judah, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: left that town in search of some other place to stay. On his way
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: To carry on his profession
      marker-yv: yv-n
    - type: text
      text: ' he came to Micah’s house in the hill country of Ephraim.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Micah asked him, “Where are you from?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I’m a Levite from Bethlehem in Judah,” he said, “and I’m looking for a place to stay.”
