document_id: 1CH.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Sons
    marker-yv: yv-h
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These were the sons of Israel:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Reuben, Simeon, Levi, Judah, Issachar, Zebulun, '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ram was the father of
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Amminadab, and Amminadab the father of Nahshon, the leader of the people of Judah. '
  '11':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Nahshon was the father of Salmon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint (see also Ruth 4:21); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Salma
      marker-yv: yv-n
    - type: text
      text: ' Salmon the father of Boaz, '
  '12':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Boaz the father of Obed and Obed the father of Jesse.
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jesse was the father of
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Eliab his firstborn; the second son was Abinadab, the third Shimea, '
  '14':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'the fourth Nethanel, the fifth Raddai, '
  '15':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'the sixth Ozem and the seventh David. '
  '16':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Their sisters were Zeruiah and Abigail. Zeruiah’s three sons were Abishai, Joab and Asahel. '
  '17':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Abigail was the mother of Amasa, whose father was Jether the Ishmaelite.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Caleb Son of Hezron
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Caleb son of Hezron had children by his wife Azubah (and by Jerioth). These were her sons: Jesher, Shobab and Ardon. '
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'When Azubah died, Caleb married Ephrath, who bore him Hur. '
  '2':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Dan, Joseph, Benjamin, Naphtali, Gad and Asher.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judah
    marker-yv: yv-h
  - type: usfm
    marker: s2
    children:
    - type: text
      text: To Hezron’s Sons
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Hur was the father of Uri, and Uri the father of Bezalel.
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Later, Hezron, when he was sixty years old, married the daughter of Makir the father of Gilead. He made love to her, and she bore him Segub. '
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Segub was the father of Jair, who controlled twenty-three towns in Gilead. '
  '23':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: (But Geshur and Aram captured Havvoth Jair,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: captured the settlements of Jair
      marker-yv: yv-n
    - type: text
      text: ' as well as Kenath with its surrounding settlements—sixty towns.) All these were descendants of Makir the father of Gilead.'
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: After Hezron died in Caleb Ephrathah, Abijah the wife of Hezron bore him Ashhur the father
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Father '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'may mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'civic leader '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: military leader
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 42, 45, 49-52 and possibly elsewhere.
      marker-yv: yv-n
    - type: text
      text: ' of Tekoa.'
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Jerahmeel Son of Hezron
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Jerahmeel the firstborn of Hezron:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ram his firstborn, Bunah, Oren, Ozem and
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Oren and Ozem, by
      marker-yv: yv-n
    - type: text
      text: ' Ahijah. '
  '26':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jerahmeel had another wife, whose name was Atarah; she was the mother of Onam.
  '27':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Ram the firstborn of Jerahmeel:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Maaz, Jamin and Eker.
  '28':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Onam:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shammai and Jada.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Shammai:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Nadab and Abishur.
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Abishur’s wife was named Abihail, who bore him Ahban and Molid.
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Judah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Er, Onan and Shelah. These three were born to him by a Canaanite woman, the daughter of Shua. Er, Judah’s firstborn, was wicked in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s sight; so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' put him to death. '
  '30':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Nadab:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Seled and Appaim. Seled died without children.
  '31':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The son of Appaim:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ishi, who was the father of Sheshan.
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Sheshan was the father of Ahlai.
  '32':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Jada, Shammai’s brother:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jether and Jonathan. Jether died without children.
  '33':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Jonathan:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Peleth and Zaza.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: These were the descendants of Jerahmeel.
  '34':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Sheshan had no sons—only daughters.
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'He had an Egyptian servant named Jarha. '
  '35':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Sheshan gave his daughter in marriage to his servant Jarha, and she bore him Attai.
  '36':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Attai was the father of Nathan,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Nathan the father of Zabad,
  '37':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zabad the father of Ephlal,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ephlal the father of Obed,
  '38':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Obed the father of Jehu,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jehu the father of Azariah,
  '39':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Azariah the father of Helez,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Helez the father of Eleasah,
  '4':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Judah’s daughter-in-law Tamar bore Perez and Zerah to Judah. He had five sons in all.
  '40':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eleasah the father of Sismai,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Sismai the father of Shallum,
  '41':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shallum the father of Jekamiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Jekamiah the father of Elishama.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Clans of Caleb
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Caleb the brother of Jerahmeel:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mesha his firstborn, who was the father of Ziph, and his son Mareshah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' who was the father of Hebron.'
  '43':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Hebron:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Korah, Tappuah, Rekem and Shema. '
  '44':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Shema was the father of Raham, and Raham the father of Jorkeam. Rekem was the father of Shammai. '
  '45':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: The son of Shammai was Maon, and Maon was the father of Beth Zur.
  '46':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Caleb’s concubine Ephah was the mother of Haran, Moza and Gazez. Haran was the father of Gazez.
  '47':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Jahdai:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Regem, Jotham, Geshan, Pelet, Ephah and Shaaph.
  '48':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Caleb’s concubine Maakah was the mother of Sheber and Tirhanah. '
  '49':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'She also gave birth to Shaaph the father of Madmannah and to Sheva the father of Makbenah and Gibea. Caleb’s daughter was Aksah. '
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Perez:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hezron and Hamul.
  '50':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: These were the descendants of Caleb.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Hur the firstborn of Ephrathah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Shobal the father of Kiriath Jearim, '
  '51':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Salma the father of Bethlehem, and Hareph the father of Beth Gader.
  '52':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Shobal the father of Kiriath Jearim were:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Haroeh, half the Manahathites, '
  '53':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'and the clans of Kiriath Jearim: the Ithrites, Puthites, Shumathites and Mishraites. From these descended the Zorathites and Eshtaolites.'
  '54':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Salma:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Bethlehem, the Netophathites, Atroth Beth Joab, half the Manahathites, the Zorites, '
  '55':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and the clans of scribes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of the Sopherites
      marker-yv: yv-n
    - type: text
      text: ' who lived at Jabez: the Tirathites, Shimeathites and Sucathites. These are the Kenites who came from Hammath, the father of the Rekabites.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:55 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: father of Beth Rekab
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Zerah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zimri, Ethan, Heman, Kalkol and Darda
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts, some Septuagint manuscripts and Syriac (see also 1 Kings 4:31); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dara
      marker-yv: yv-n
    - type: text
      text: —five in all.
  '7':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The son of Karmi:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Achar,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Achar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trouble
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Achar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is called '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Achan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in Joshua.
      marker-yv: yv-n
    - type: text
      text: ' who brought trouble on Israel by violating the ban on taking devoted things.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them.'
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The son of Ethan:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Azariah.
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons born to Hezron were:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jerahmeel, Ram and Caleb.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Kelubai, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Caleb
      marker-yv: yv-n
  - type: usfm
    marker: s2
    children:
    - type: text
      text: From Ram Son of Hezron
    marker-yv: yv-h
