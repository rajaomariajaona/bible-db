document_id: 1CH.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Sons
  - type: text
    content: 'These were the sons of Israel:'
  - type: text
    content: 'Reuben, Simeon, Levi, Judah, Issachar, Zebulun, '
  '10':
  - type: text
    content: Ram was the father of
  - type: text
    content: 'Amminadab, and Amminadab the father of Nahshon, the leader of the people of Judah. '
  '11':
  - type: text
    content: Nahshon was the father of Salmon,
  - type: note
    content: Septuagint (see also Ruth 4:21); Hebrew Salma
  - type: text
    content: ' Salmon the father of Boaz, '
  '12':
  - type: text
    content: Boaz the father of Obed and Obed the father of Jesse.
  '13':
  - type: text
    content: Jesse was the father of
  - type: text
    content: 'Eliab his firstborn; the second son was Abinadab, the third Shimea, '
  '14':
  - type: text
    content: 'the fourth Nethanel, the fifth Raddai, '
  '15':
  - type: text
    content: 'the sixth Ozem and the seventh David. '
  '16':
  - type: text
    content: 'Their sisters were Zeruiah and Abigail. Zeruiah’s three sons were Abishai, Joab and Asahel. '
  '17':
  - type: text
    content: Abigail was the mother of Amasa, whose father was Jether the Ishmaelite.
  - type: heading
    content: Caleb Son of Hezron
  '18':
  - type: text
    content: 'Caleb son of Hezron had children by his wife Azubah (and by Jerioth). These were her sons: Jesher, Shobab and Ardon. '
  '19':
  - type: text
    content: 'When Azubah died, Caleb married Ephrath, who bore him Hur. '
  '2':
  - type: text
    content: Dan, Joseph, Benjamin, Naphtali, Gad and Asher.
  - type: heading
    content: Judah
  - type: heading
    content: To Hezron’s Sons
  '20':
  - type: text
    content: Hur was the father of Uri, and Uri the father of Bezalel.
  '21':
  - type: text
    content: 'Later, Hezron, when he was sixty years old, married the daughter of Makir the father of Gilead. He made love to her, and she bore him Segub. '
  '22':
  - type: text
    content: 'Segub was the father of Jair, who controlled twenty-three towns in Gilead. '
  '23':
  - type: text
    content: (But Geshur and Aram captured Havvoth Jair,
  - type: note
    content: Or captured the settlements of Jair
  - type: text
    content: ' as well as Kenath with its surrounding settlements—sixty towns.) All these were descendants of Makir the father of Gilead.'
  '24':
  - type: text
    content: After Hezron died in Caleb Ephrathah, Abijah the wife of Hezron bore him Ashhur the father
  - type: note
    content: Father may mean civic leader or military leader; also in verses 42, 45, 49-52 and possibly elsewhere.
  - type: text
    content: ' of Tekoa.'
  - type: heading
    content: Jerahmeel Son of Hezron
  '25':
  - type: text
    content: 'The sons of Jerahmeel the firstborn of Hezron:'
  - type: text
    content: Ram his firstborn, Bunah, Oren, Ozem and
  - type: note
    content: Or Oren and Ozem, by
  - type: text
    content: ' Ahijah. '
  '26':
  - type: text
    content: Jerahmeel had another wife, whose name was Atarah; she was the mother of Onam.
  '27':
  - type: text
    content: 'The sons of Ram the firstborn of Jerahmeel:'
  - type: text
    content: Maaz, Jamin and Eker.
  '28':
  - type: text
    content: 'The sons of Onam:'
  - type: text
    content: Shammai and Jada.
  - type: text
    content: 'The sons of Shammai:'
  - type: text
    content: Nadab and Abishur.
  '29':
  - type: text
    content: Abishur’s wife was named Abihail, who bore him Ahban and Molid.
  '3':
  - type: text
    content: 'The sons of Judah:'
  - type: text
    content: 'Er, Onan and Shelah. These three were born to him by a Canaanite woman, the daughter of Shua. Er, Judah’s firstborn, was wicked in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight; so the '
  - type: text
    content: Lord
  - type: text
    content: ' put him to death. '
  '30':
  - type: text
    content: 'The sons of Nadab:'
  - type: text
    content: Seled and Appaim. Seled died without children.
  '31':
  - type: text
    content: 'The son of Appaim:'
  - type: text
    content: Ishi, who was the father of Sheshan.
  - type: text
    content: Sheshan was the father of Ahlai.
  '32':
  - type: text
    content: 'The sons of Jada, Shammai’s brother:'
  - type: text
    content: Jether and Jonathan. Jether died without children.
  '33':
  - type: text
    content: 'The sons of Jonathan:'
  - type: text
    content: Peleth and Zaza.
  - type: text
    content: These were the descendants of Jerahmeel.
  '34':
  - type: text
    content: Sheshan had no sons—only daughters.
  - type: text
    content: 'He had an Egyptian servant named Jarha. '
  '35':
  - type: text
    content: Sheshan gave his daughter in marriage to his servant Jarha, and she bore him Attai.
  '36':
  - type: text
    content: Attai was the father of Nathan,
  - type: text
    content: Nathan the father of Zabad,
  '37':
  - type: text
    content: Zabad the father of Ephlal,
  - type: text
    content: Ephlal the father of Obed,
  '38':
  - type: text
    content: Obed the father of Jehu,
  - type: text
    content: Jehu the father of Azariah,
  '39':
  - type: text
    content: Azariah the father of Helez,
  - type: text
    content: Helez the father of Eleasah,
  '4':
  - type: text
    content: Judah’s daughter-in-law Tamar bore Perez and Zerah to Judah. He had five sons in all.
  '40':
  - type: text
    content: Eleasah the father of Sismai,
  - type: text
    content: Sismai the father of Shallum,
  '41':
  - type: text
    content: Shallum the father of Jekamiah,
  - type: text
    content: and Jekamiah the father of Elishama.
  - type: heading
    content: The Clans of Caleb
  '42':
  - type: text
    content: 'The sons of Caleb the brother of Jerahmeel:'
  - type: text
    content: Mesha his firstborn, who was the father of Ziph, and his son Mareshah,
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' who was the father of Hebron.'
  '43':
  - type: text
    content: 'The sons of Hebron:'
  - type: text
    content: 'Korah, Tappuah, Rekem and Shema. '
  '44':
  - type: text
    content: 'Shema was the father of Raham, and Raham the father of Jorkeam. Rekem was the father of Shammai. '
  '45':
  - type: text
    content: The son of Shammai was Maon, and Maon was the father of Beth Zur.
  '46':
  - type: text
    content: Caleb’s concubine Ephah was the mother of Haran, Moza and Gazez. Haran was the father of Gazez.
  '47':
  - type: text
    content: 'The sons of Jahdai:'
  - type: text
    content: Regem, Jotham, Geshan, Pelet, Ephah and Shaaph.
  '48':
  - type: text
    content: 'Caleb’s concubine Maakah was the mother of Sheber and Tirhanah. '
  '49':
  - type: text
    content: 'She also gave birth to Shaaph the father of Madmannah and to Sheva the father of Makbenah and Gibea. Caleb’s daughter was Aksah. '
  '5':
  - type: text
    content: 'The sons of Perez:'
  - type: text
    content: Hezron and Hamul.
  '50':
  - type: text
    content: These were the descendants of Caleb.
  - type: text
    content: 'The sons of Hur the firstborn of Ephrathah:'
  - type: text
    content: 'Shobal the father of Kiriath Jearim, '
  '51':
  - type: text
    content: Salma the father of Bethlehem, and Hareph the father of Beth Gader.
  '52':
  - type: text
    content: 'The descendants of Shobal the father of Kiriath Jearim were:'
  - type: text
    content: 'Haroeh, half the Manahathites, '
  '53':
  - type: text
    content: 'and the clans of Kiriath Jearim: the Ithrites, Puthites, Shumathites and Mishraites. From these descended the Zorathites and Eshtaolites.'
  '54':
  - type: text
    content: 'The descendants of Salma:'
  - type: text
    content: 'Bethlehem, the Netophathites, Atroth Beth Joab, half the Manahathites, the Zorites, '
  '55':
  - type: text
    content: and the clans of scribes
  - type: note
    content: Or of the Sopherites
  - type: text
    content: ' who lived at Jabez: the Tirathites, Shimeathites and Sucathites. These are the Kenites who came from Hammath, the father of the Rekabites.'
  - type: note
    content: Or father of Beth Rekab
  '6':
  - type: text
    content: 'The sons of Zerah:'
  - type: text
    content: Zimri, Ethan, Heman, Kalkol and Darda
  - type: note
    content: Many Hebrew manuscripts, some Septuagint manuscripts and Syriac (see also 1 Kings 4:31); most Hebrew manuscripts Dara
  - type: text
    content: —five in all.
  '7':
  - type: text
    content: 'The son of Karmi:'
  - type: text
    content: Achar,
  - type: note
    content: Achar means trouble; Achar is called Achan in Joshua.
  - type: text
    content: ' who brought trouble on Israel by violating the ban on taking devoted things.'
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  '8':
  - type: text
    content: 'The son of Ethan:'
  - type: text
    content: Azariah.
  '9':
  - type: text
    content: 'The sons born to Hezron were:'
  - type: text
    content: Jerahmeel, Ram and Caleb.
  - type: note
    content: Hebrew Kelubai, a variant of Caleb
  - type: heading
    content: From Ram Son of Hezron
