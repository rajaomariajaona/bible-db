document_id: ECC.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: As dead flies give perfume a bad smell,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so a little folly outweighs wisdom and honor.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: If the ax is dull
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and its edge unsharpened,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: more strength is needed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but skill will bring success.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If a snake bites before it is charmed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the charmer receives no fee.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Words from the mouth of the wise are gracious,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but fools are consumed by their own lips.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: At the beginning their words are folly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the end they are wicked madness—
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: and fools multiply words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one knows what is coming—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who can tell someone else what will happen after them?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The toil of fools wearies them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they do not know the way to town.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Woe to the land whose king was a servant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: king is a child
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whose princes feast in the morning.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Blessed is the land whose king is of noble birth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whose princes eat at a proper time—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for strength and not for drunkenness.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Through laziness, the rafters sag;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of idle hands, the house leaks.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: A feast is made for laughter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wine makes life merry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and money is the answer for everything.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The heart of the wise inclines to the right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the heart of the fool to the left.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Do not revile the king even in your thoughts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or curse the rich in your bedroom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because a bird in the sky may carry your words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a bird on the wing may report what you say.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Even as fools walk along the road,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they lack sense
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and show everyone how stupid they are.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: If a ruler’s anger rises against you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not leave your post;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: calmness can lay great offenses to rest.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: There is an evil I have seen under the sun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the sort of error that arises from a ruler:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fools are put in many high positions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while the rich occupy the low ones.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I have seen slaves on horseback,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while princes go on foot like slaves.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Whoever digs a pit may fall into it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever breaks through a wall may be bitten by a snake.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Whoever quarries stones may be injured by them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever splits logs may be endangered by them.
