document_id: ECC.10,111
type_code: eng
verses:
  '1':
  - type: text
    content: As dead flies give perfume a bad smell,
  - type: text
    content: so a little folly outweighs wisdom and honor.
  '10':
  - type: text
    content: If the ax is dull
  - type: text
    content: and its edge unsharpened,
  - type: text
    content: more strength is needed,
  - type: text
    content: but skill will bring success.
  '11':
  - type: text
    content: If a snake bites before it is charmed,
  - type: text
    content: the charmer receives no fee.
  '12':
  - type: text
    content: Words from the mouth of the wise are gracious,
  - type: text
    content: but fools are consumed by their own lips.
  '13':
  - type: text
    content: At the beginning their words are folly;
  - type: text
    content: at the end they are wicked madness—
  '14':
  - type: text
    content: and fools multiply words.
  - type: text
    content: No one knows what is coming—
  - type: text
    content: who can tell someone else what will happen after them?
  '15':
  - type: text
    content: The toil of fools wearies them;
  - type: text
    content: they do not know the way to town.
  '16':
  - type: text
    content: Woe to the land whose king was a servant
  - type: note
    content: Or king is a child
  - type: text
    content: and whose princes feast in the morning.
  '17':
  - type: text
    content: Blessed is the land whose king is of noble birth
  - type: text
    content: and whose princes eat at a proper time—
  - type: text
    content: for strength and not for drunkenness.
  '18':
  - type: text
    content: Through laziness, the rafters sag;
  - type: text
    content: because of idle hands, the house leaks.
  '19':
  - type: text
    content: A feast is made for laughter,
  - type: text
    content: wine makes life merry,
  - type: text
    content: and money is the answer for everything.
  '2':
  - type: text
    content: The heart of the wise inclines to the right,
  - type: text
    content: but the heart of the fool to the left.
  '20':
  - type: text
    content: Do not revile the king even in your thoughts,
  - type: text
    content: or curse the rich in your bedroom,
  - type: text
    content: because a bird in the sky may carry your words,
  - type: text
    content: and a bird on the wing may report what you say.
  '3':
  - type: text
    content: Even as fools walk along the road,
  - type: text
    content: they lack sense
  - type: text
    content: and show everyone how stupid they are.
  '4':
  - type: text
    content: If a ruler’s anger rises against you,
  - type: text
    content: do not leave your post;
  - type: text
    content: calmness can lay great offenses to rest.
  '5':
  - type: text
    content: There is an evil I have seen under the sun,
  - type: text
    content: 'the sort of error that arises from a ruler:'
  '6':
  - type: text
    content: Fools are put in many high positions,
  - type: text
    content: while the rich occupy the low ones.
  '7':
  - type: text
    content: I have seen slaves on horseback,
  - type: text
    content: while princes go on foot like slaves.
  '8':
  - type: text
    content: Whoever digs a pit may fall into it;
  - type: text
    content: whoever breaks through a wall may be bitten by a snake.
  '9':
  - type: text
    content: Whoever quarries stones may be injured by them;
  - type: text
    content: whoever splits logs may be endangered by them.
