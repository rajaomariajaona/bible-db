document_id: JOS.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Covenant Renewed at Shechem
  - type: text
    content: Then Joshua assembled all the tribes of Israel at Shechem. He summoned the elders, leaders, judges and officials of Israel, and they presented themselves before God.
  '10':
  - type: text
    content: But I would not listen to Balaam, so he blessed you again and again, and I delivered you out of his hand.
  '11':
  - type: text
    content: '“ ‘Then you crossed the Jordan and came to Jericho. The citizens of Jericho fought against you, as did also the Amorites, Perizzites, Canaanites, Hittites, Girgashites, Hivites and Jebusites, but I gave them into your hands. '
  '12':
  - type: text
    content: 'I sent the hornet ahead of you, which drove them out before you—also the two Amorite kings. You did not do it with your own sword and bow. '
  '13':
  - type: text
    content: So I gave you a land on which you did not toil and cities you did not build; and you live in them and eat from vineyards and olive groves that you did not plant.’
  '14':
  - type: text
    content: '“Now fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve him with all faithfulness. Throw away the gods your ancestors worshiped beyond the Euphrates River and in Egypt, and serve the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'But if serving the '
  - type: text
    content: Lord
  - type: text
    content: ' seems undesirable to you, then choose for yourselves this day whom you will serve, whether the gods your ancestors served beyond the Euphrates, or the gods of the Amorites, in whose land you are living. But as for me and my household, we will serve the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '16':
  - type: text
    content: 'Then the people answered, “Far be it from us to forsake the '
  - type: text
    content: Lord
  - type: text
    content: ' to serve other gods! '
  '17':
  - type: text
    content: 'It was the '
  - type: text
    content: Lord
  - type: text
    content: ' our God himself who brought us and our parents up out of Egypt, from that land of slavery, and performed those great signs before our eyes. He protected us on our entire journey and among all the nations through which we traveled. '
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' drove out before us all the nations, including the Amorites, who lived in the land. We too will serve the '
  - type: text
    content: Lord
  - type: text
    content: ', because he is our God.”'
  '19':
  - type: text
    content: 'Joshua said to the people, “You are not able to serve the '
  - type: text
    content: Lord
  - type: text
    content: '. He is a holy God; he is a jealous God. He will not forgive your rebellion and your sins. '
  '2':
  - type: text
    content: 'Joshua said to all the people, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: ‘Long ago your ancestors, including Terah the father of Abraham and Nahor, lived beyond the Euphrates River and worshiped other gods. '
  '20':
  - type: text
    content: 'If you forsake the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve foreign gods, he will turn and bring disaster on you and make an end of you, after he has been good to you.”'
  '21':
  - type: text
    content: 'But the people said to Joshua, “No! We will serve the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '22':
  - type: text
    content: 'Then Joshua said, “You are witnesses against yourselves that you have chosen to serve the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: text
    content: “Yes, we are witnesses,” they replied.
  '23':
  - type: text
    content: '“Now then,” said Joshua, “throw away the foreign gods that are among you and yield your hearts to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel.”'
  '24':
  - type: text
    content: 'And the people said to Joshua, “We will serve the '
  - type: text
    content: Lord
  - type: text
    content: ' our God and obey him.”'
  '25':
  - type: text
    content: 'On that day Joshua made a covenant for the people, and there at Shechem he reaffirmed for them decrees and laws. '
  '26':
  - type: text
    content: 'And Joshua recorded these things in the Book of the Law of God. Then he took a large stone and set it up there under the oak near the holy place of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: '“See!” he said to all the people. “This stone will be a witness against us. It has heard all the words the '
  - type: text
    content: Lord
  - type: text
    content: ' has said to us. It will be a witness against you if you are untrue to your God.”'
  '28':
  - type: text
    content: Then Joshua dismissed the people, each to their own inheritance.
  - type: heading
    content: Buried in the Promised Land
  '29':
  - type: text
    content: 'After these things, Joshua son of Nun, the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ', died at the age of a hundred and ten. '
  '3':
  - type: text
    content: 'But I took your father Abraham from the land beyond the Euphrates and led him throughout Canaan and gave him many descendants. I gave him Isaac, '
  '30':
  - type: text
    content: And they buried him in the land of his inheritance, at Timnath Serah
  - type: note
    content: Also known as Timnath Heres (see Judges 2:9)
  - type: text
    content: ' in the hill country of Ephraim, north of Mount Gaash.'
  '31':
  - type: text
    content: 'Israel served the '
  - type: text
    content: Lord
  - type: text
    content: ' throughout the lifetime of Joshua and of the elders who outlived him and who had experienced everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had done for Israel.'
  '32':
  - type: text
    content: And Joseph’s bones, which the Israelites had brought up from Egypt, were buried at Shechem in the tract of land that Jacob bought for a hundred pieces of silver
  - type: note
    content: Hebrew hundred kesitahs; a kesitah was a unit of money of unknown weight and value.
  - type: text
    content: ' from the sons of Hamor, the father of Shechem. This became the inheritance of Joseph’s descendants.'
  '33':
  - type: text
    content: And Eleazar son of Aaron died and was buried at Gibeah, which had been allotted to his son Phinehas in the hill country of Ephraim.
  '4':
  - type: text
    content: and to Isaac I gave Jacob and Esau. I assigned the hill country of Seir to Esau, but Jacob and his family went down to Egypt.
  '5':
  - type: text
    content: '“ ‘Then I sent Moses and Aaron, and I afflicted the Egyptians by what I did there, and I brought you out. '
  '6':
  - type: text
    content: When I brought your people out of Egypt, you came to the sea, and the Egyptians pursued them with chariots and horsemen
  - type: note
    content: Or charioteers
  - type: text
    content: ' as far as the Red Sea.'
  - type: note
    content: Or the Sea of Reeds
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'But they cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help, and he put darkness between you and the Egyptians; he brought the sea over them and covered them. You saw with your own eyes what I did to the Egyptians. Then you lived in the wilderness for a long time.'
  '8':
  - type: text
    content: '“ ‘I brought you to the land of the Amorites who lived east of the Jordan. They fought against you, but I gave them into your hands. I destroyed them from before you, and you took possession of their land. '
  '9':
  - type: text
    content: 'When Balak son of Zippor, the king of Moab, prepared to fight against Israel, he sent for Balaam son of Beor to put a curse on you. '
