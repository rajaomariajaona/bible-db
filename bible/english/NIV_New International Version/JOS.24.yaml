document_id: JOS.24,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Covenant Renewed at Shechem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joshua assembled all the tribes of Israel at Shechem. He summoned the elders, leaders, judges and officials of Israel, and they presented themselves before God.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But I would not listen to Balaam, so he blessed you again and again, and I delivered you out of his hand.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Then you crossed the Jordan and came to Jericho. The citizens of Jericho fought against you, as did also the Amorites, Perizzites, Canaanites, Hittites, Girgashites, Hivites and Jebusites, but I gave them into your hands. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I sent the hornet ahead of you, which drove them out before you—also the two Amorite kings. You did not do it with your own sword and bow. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I gave you a land on which you did not toil and cities you did not build; and you live in them and eat from vineyards and olive groves that you did not plant.’
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and serve him with all faithfulness. Throw away the gods your ancestors worshiped beyond the Euphrates River and in Egypt, and serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if serving the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' seems undesirable to you, then choose for yourselves this day whom you will serve, whether the gods your ancestors served beyond the Euphrates, or the gods of the Amorites, in whose land you are living. But as for me and my household, we will serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the people answered, “Far be it from us to forsake the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to serve other gods! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God himself who brought us and our parents up out of Egypt, from that land of slavery, and performed those great signs before our eyes. He protected us on our entire journey and among all the nations through which we traveled. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' drove out before us all the nations, including the Amorites, who lived in the land. We too will serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', because he is our God.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua said to the people, “You are not able to serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He is a holy God; he is a jealous God. He will not forgive your rebellion and your sins. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua said to all the people, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: ‘Long ago your ancestors, including Terah the father of Abraham and Nahor, lived beyond the Euphrates River and worshiped other gods. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you forsake the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and serve foreign gods, he will turn and bring disaster on you and make an end of you, after he has been good to you.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people said to Joshua, “No! We will serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua said, “You are witnesses against yourselves that you have chosen to serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, we are witnesses,” they replied.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now then,” said Joshua, “throw away the foreign gods that are among you and yield your hearts to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the people said to Joshua, “We will serve the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God and obey him.”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day Joshua made a covenant for the people, and there at Shechem he reaffirmed for them decrees and laws. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua recorded these things in the Book of the Law of God. Then he took a large stone and set it up there under the oak near the holy place of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“See!” he said to all the people. “This stone will be a witness against us. It has heard all the words the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has said to us. It will be a witness against you if you are untrue to your God.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joshua dismissed the people, each to their own inheritance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Buried in the Promised Land
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After these things, Joshua son of Nun, the servant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', died at the age of a hundred and ten. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I took your father Abraham from the land beyond the Euphrates and led him throughout Canaan and gave him many descendants. I gave him Isaac, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they buried him in the land of his inheritance, at Timnath Serah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also known as '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Timnath Heres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see Judges 2:9)
      marker-yv: yv-n
    - type: text
      text: ' in the hill country of Ephraim, north of Mount Gaash.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israel served the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' throughout the lifetime of Joshua and of the elders who outlived him and who had experienced everything the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had done for Israel.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Joseph’s bones, which the Israelites had brought up from Egypt, were buried at Shechem in the tract of land that Jacob bought for a hundred pieces of silver
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hundred kesitahs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; a kesitah was a unit of money of unknown weight and value.
      marker-yv: yv-n
    - type: text
      text: ' from the sons of Hamor, the father of Shechem. This became the inheritance of Joseph’s descendants.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Eleazar son of Aaron died and was buried at Gibeah, which had been allotted to his son Phinehas in the hill country of Ephraim.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and to Isaac I gave Jacob and Esau. I assigned the hill country of Seir to Esau, but Jacob and his family went down to Egypt.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Then I sent Moses and Aaron, and I afflicted the Egyptians by what I did there, and I brought you out. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When I brought your people out of Egypt, you came to the sea, and the Egyptians pursued them with chariots and horsemen
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: charioteers
      marker-yv: yv-n
    - type: text
      text: ' as far as the Red Sea.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Sea of Reeds
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they cried to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for help, and he put darkness between you and the Egyptians; he brought the sea over them and covered them. You saw with your own eyes what I did to the Egyptians. Then you lived in the wilderness for a long time.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘I brought you to the land of the Amorites who lived east of the Jordan. They fought against you, but I gave them into your hands. I destroyed them from before you, and you took possession of their land. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Balak son of Zippor, the king of Moab, prepared to fight against Israel, he sent for Balaam son of Beor to put a curse on you. '
