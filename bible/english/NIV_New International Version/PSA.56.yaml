document_id: PSA.56,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 56In Hebrew texts 56:1-13 is numbered 56:2-14.
  - type: text
    content: 'For the director of music. To the tune of “A Dove on Distant Oaks.” Of David. A '
  - type: text
    content: miktam.
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' When the Philistines had seized him in Gath.'
  - type: text
    content: Be merciful to me, my God,
  - type: text
    content: for my enemies are in hot pursuit;
  - type: text
    content: all day long they press their attack.
  '10':
  - type: text
    content: In God, whose word I praise,
  - type: text
    content: 'in the '
  - type: text
    content: Lord
  - type: text
    content: ', whose word I praise—'
  '11':
  - type: text
    content: in God I trust and am not afraid.
  - type: text
    content: What can man do to me?
  '12':
  - type: text
    content: I am under vows to you, my God;
  - type: text
    content: I will present my thank offerings to you.
  '13':
  - type: text
    content: For you have delivered me from death
  - type: text
    content: and my feet from stumbling,
  - type: text
    content: that I may walk before God
  - type: text
    content: in the light of life.
  '2':
  - type: text
    content: My adversaries pursue me all day long;
  - type: text
    content: in their pride many are attacking me.
  '3':
  - type: text
    content: When I am afraid, I put my trust in you.
  '4':
  - type: text
    content: In God, whose word I praise—
  - type: text
    content: in God I trust and am not afraid.
  - type: text
    content: What can mere mortals do to me?
  '5':
  - type: text
    content: All day long they twist my words;
  - type: text
    content: all their schemes are for my ruin.
  '6':
  - type: text
    content: They conspire, they lurk,
  - type: text
    content: they watch my steps,
  - type: text
    content: hoping to take my life.
  '7':
  - type: text
    content: Because of their wickedness do not
  - type: note
    content: Probable reading of the original Hebrew text; Masoretic Text does not have do not.
  - type: text
    content: ' let them escape;'
  - type: text
    content: in your anger, God, bring the nations down.
  '8':
  - type: text
    content: Record my misery;
  - type: text
    content: list my tears on your scroll
  - type: note
    content: Or misery; / put my tears in your wineskin
  - type: text
    content: —
  - type: text
    content: are they not in your record?
  '9':
  - type: text
    content: Then my enemies will turn back
  - type: text
    content: when I call for help.
  - type: text
    content: By this I will know that God is for me.
