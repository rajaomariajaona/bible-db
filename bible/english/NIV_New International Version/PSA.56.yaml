document_id: PSA.56,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 56
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 56:1-13 is numbered 56:2-14.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. To the tune of “A Dove on Distant Oaks.” Of David. A '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: miktam.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a literary or musical term'
      marker-yv: yv-n
    - type: text
      text: ' When the Philistines had seized him in Gath.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Be merciful to me, my God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my enemies are in hot pursuit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all day long they press their attack.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: In God, whose word I praise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', whose word I praise—'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: in God I trust and am not afraid.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can man do to me?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I am under vows to you, my God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will present my thank offerings to you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For you have delivered me from death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my feet from stumbling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that I may walk before God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the light of life.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: My adversaries pursue me all day long;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in their pride many are attacking me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When I am afraid, I put my trust in you.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: In God, whose word I praise—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in God I trust and am not afraid.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can mere mortals do to me?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: All day long they twist my words;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all their schemes are for my ruin.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: They conspire, they lurk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they watch my steps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hoping to take my life.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Because of their wickedness do not
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Probable reading of the original Hebrew text; Masoretic Text does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: do not
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' let them escape;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your anger, God, bring the nations down.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Record my misery;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: list my tears on your scroll
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: misery; / put my tears in your wineskin
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are they not in your record?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then my enemies will turn back
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I call for help.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By this I will know that God is for me.
