document_id: MRK.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Prophet Without Honor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus left there and went to his hometown, accompanied by his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When the Sabbath came, he began to teach in the synagogue, and many who heard him were amazed.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Where did this man get these things?” they asked. “What’s this wisdom that has been given him? What are these remarkable miracles he is performing? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Isn’t this the carpenter? Isn’t this Mary’s son and the brother of James, Joseph,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Joses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joseph
    marker-yv: yv-n
  - type: text
    text: ' Judas and Simon? Aren’t his sisters here with us?” And they took offense at him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A prophet is not without honor except in his own town, among his relatives and in his own home.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He could not do any miracles there, except lay his hands on a few sick people and heal them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He was amazed at their lack of faith.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Sends Out the Twelve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then Jesus went around teaching from village to village. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Calling the Twelve to him, he began to send them out two by two and gave them authority over impure spirits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'These were his instructions: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take nothing for the journey except a staff—no bread, no bag, no money in your belts.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Wear sandals but not an extra shirt.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whenever you enter a house, stay there until you leave that town.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if any place will not welcome you or listen to you, leave that place and shake the dust off your feet as a testimony against them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They went out and preached that people should repent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They drove out many demons and anointed many sick people with oil and healed them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: John the Baptist Beheaded
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: King Herod heard about this, for Jesus’ name had become well known. Some were saying,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He was saying
    marker-yv: yv-n
  - type: text
    text: ' “John the Baptist has been raised from the dead, and that is why miraculous powers are at work in him.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Others said, “He is Elijah.”
- type: usfm
  marker: p
  children:
  - type: text
    text: And still others claimed, “He is a prophet, like one of the prophets of long ago.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But when Herod heard this, he said, “John, whom I beheaded, has been raised from the dead!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For Herod himself had given orders to have John arrested, and he had him bound and put in prison. He did this because of Herodias, his brother Philip’s wife, whom he had married. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For John had been saying to Herod, “It is not lawful for you to have your brother’s wife.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So Herodias nursed a grudge against John and wanted to kill him. But she was not able to, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: because Herod feared John and protected him, knowing him to be a righteous and holy man. When Herod heard John, he was greatly puzzled
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: he did many things
    marker-yv: yv-n
  - type: text
    text: ; yet he liked to listen to him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Finally the opportune time came. On his birthday Herod gave a banquet for his high officials and military commanders and the leading men of Galilee. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: When the daughter of
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: When his daughter
    marker-yv: yv-n
  - type: text
    text: ' Herodias came in and danced, she pleased Herod and his dinner guests.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The king said to the girl, “Ask me for anything you want, and I’ll give it to you.” '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: And he promised her with an oath, “Whatever you ask I will give you, up to half my kingdom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: She went out and said to her mother, “What shall I ask for?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “The head of John the Baptist,” she answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'At once the girl hurried in to the king with the request: “I want you to give me right now the head of John the Baptist on a platter.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The king was greatly distressed, but because of his oaths and his dinner guests, he did not want to refuse her. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'So he immediately sent an executioner with orders to bring John’s head. The man went, beheaded John in the prison, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'and brought back his head on a platter. He presented it to the girl, and she gave it to her mother. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: On hearing of this, John’s disciples came and took his body and laid it in a tomb.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Feeds the Five Thousand
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The apostles gathered around Jesus and reported to him all they had done and taught. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then, because so many people were coming and going that they did not even have a chance to eat, he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come with me by yourselves to a quiet place and get some rest.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So they went away by themselves in a boat to a solitary place. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But many who saw them leaving recognized them and ran on foot from all the towns and got there ahead of them. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: When Jesus landed and saw a large crowd, he had compassion on them, because they were like sheep without a shepherd. So he began teaching them many things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'By this time it was late in the day, so his disciples came to him. “This is a remote place,” they said, “and it’s already very late. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Send the people away so that they can go to the surrounding countryside and villages and buy themselves something to eat.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'But he answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You give them something to eat.”
- type: usfm
  marker: p
  children:
  - type: text
    text: They said to him, “That would take more than half a year’s wages
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: take two hundred denarii
    marker-yv: yv-n
  - type: text
    text: '! Are we to go and spend that much on bread and give it to them to eat?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How many loaves do you have?”
  - type: text
    text: ' he asked. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go and see.”
- type: usfm
  marker: p
  children:
  - type: text
    text: When they found out, they said, “Five—and two fish.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Then Jesus directed them to have all the people sit down in groups on the green grass. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'So they sat down in groups of hundreds and fifties. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Taking the five loaves and the two fish and looking up to heaven, he gave thanks and broke the loaves. Then he gave them to his disciples to distribute to the people. He also divided the two fish among them all. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'They all ate and were satisfied, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'and the disciples picked up twelve basketfuls of broken pieces of bread and fish. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: The number of the men who had eaten was five thousand.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Walks on the Water
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Immediately Jesus made his disciples get into the boat and go on ahead of him to Bethsaida, while he dismissed the crowd. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: After leaving them, he went up on a mountainside to pray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Later that night, the boat was in the middle of the lake, and he was alone on land. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'He saw the disciples straining at the oars, because the wind was against them. Shortly before dawn he went out to them, walking on the lake. He was about to pass by them, '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'but when they saw him walking on the lake, they thought he was a ghost. They cried out, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: because they all saw him and were terrified.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Immediately he spoke to them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take courage! It is I. Don’t be afraid.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Then he climbed into the boat with them, and the wind died down. They were completely amazed, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: for they had not understood about the loaves; their hearts were hardened.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'When they had crossed over, they landed at Gennesaret and anchored there. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'As soon as they got out of the boat, people recognized Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'They ran throughout that whole region and carried the sick on mats to wherever they heard he was. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: And wherever he went—into villages, towns or countryside—they placed the sick in the marketplaces. They begged him to let them touch even the edge of his cloak, and all who touched it were healed.
