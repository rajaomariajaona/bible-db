document_id: MRK.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophet Without Honor
  - type: text
    content: 'Jesus left there and went to his hometown, accompanied by his disciples. '
  '10':
  - type: text
    content: Whenever you enter a house, stay there until you leave that town.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And if any place will not welcome you or listen to you, leave that place and shake the dust off your feet as a testimony against them.”
  '12':
  - type: text
    content: 'They went out and preached that people should repent. '
  '13':
  - type: text
    content: They drove out many demons and anointed many sick people with oil and healed them.
  - type: heading
    content: John the Baptist Beheaded
  '14':
  - type: text
    content: King Herod heard about this, for Jesus’ name had become well known. Some were saying,
  - type: note
    content: Some early manuscripts He was saying
  - type: text
    content: ' “John the Baptist has been raised from the dead, and that is why miraculous powers are at work in him.”'
  '15':
  - type: text
    content: Others said, “He is Elijah.”
  - type: text
    content: And still others claimed, “He is a prophet, like one of the prophets of long ago.”
  '16':
  - type: text
    content: But when Herod heard this, he said, “John, whom I beheaded, has been raised from the dead!”
  '17':
  - type: text
    content: 'For Herod himself had given orders to have John arrested, and he had him bound and put in prison. He did this because of Herodias, his brother Philip’s wife, whom he had married. '
  '18':
  - type: text
    content: 'For John had been saying to Herod, “It is not lawful for you to have your brother’s wife.” '
  '19':
  - type: text
    content: 'So Herodias nursed a grudge against John and wanted to kill him. But she was not able to, '
  '2':
  - type: text
    content: When the Sabbath came, he began to teach in the synagogue, and many who heard him were amazed.
  - type: text
    content: '“Where did this man get these things?” they asked. “What’s this wisdom that has been given him? What are these remarkable miracles he is performing? '
  '20':
  - type: text
    content: because Herod feared John and protected him, knowing him to be a righteous and holy man. When Herod heard John, he was greatly puzzled
  - type: note
    content: Some early manuscripts he did many things
  - type: text
    content: ; yet he liked to listen to him.
  '21':
  - type: text
    content: 'Finally the opportune time came. On his birthday Herod gave a banquet for his high officials and military commanders and the leading men of Galilee. '
  '22':
  - type: text
    content: When the daughter of
  - type: note
    content: Some early manuscripts When his daughter
  - type: text
    content: ' Herodias came in and danced, she pleased Herod and his dinner guests.'
  - type: text
    content: 'The king said to the girl, “Ask me for anything you want, and I’ll give it to you.” '
  '23':
  - type: text
    content: And he promised her with an oath, “Whatever you ask I will give you, up to half my kingdom.”
  '24':
  - type: text
    content: She went out and said to her mother, “What shall I ask for?”
  - type: text
    content: “The head of John the Baptist,” she answered.
  '25':
  - type: text
    content: 'At once the girl hurried in to the king with the request: “I want you to give me right now the head of John the Baptist on a platter.”'
  '26':
  - type: text
    content: 'The king was greatly distressed, but because of his oaths and his dinner guests, he did not want to refuse her. '
  '27':
  - type: text
    content: 'So he immediately sent an executioner with orders to bring John’s head. The man went, beheaded John in the prison, '
  '28':
  - type: text
    content: 'and brought back his head on a platter. He presented it to the girl, and she gave it to her mother. '
  '29':
  - type: text
    content: On hearing of this, John’s disciples came and took his body and laid it in a tomb.
  - type: heading
    content: Jesus Feeds the Five Thousand
  '3':
  - type: text
    content: Isn’t this the carpenter? Isn’t this Mary’s son and the brother of James, Joseph,
  - type: note
    content: Greek Joses, a variant of Joseph
  - type: text
    content: ' Judas and Simon? Aren’t his sisters here with us?” And they took offense at him.'
  '30':
  - type: text
    content: 'The apostles gathered around Jesus and reported to him all they had done and taught. '
  '31':
  - type: text
    content: 'Then, because so many people were coming and going that they did not even have a chance to eat, he said to them, '
  - type: text
    content: “Come with me by yourselves to a quiet place and get some rest.”
  '32':
  - type: text
    content: 'So they went away by themselves in a boat to a solitary place. '
  '33':
  - type: text
    content: 'But many who saw them leaving recognized them and ran on foot from all the towns and got there ahead of them. '
  '34':
  - type: text
    content: When Jesus landed and saw a large crowd, he had compassion on them, because they were like sheep without a shepherd. So he began teaching them many things.
  '35':
  - type: text
    content: 'By this time it was late in the day, so his disciples came to him. “This is a remote place,” they said, “and it’s already very late. '
  '36':
  - type: text
    content: Send the people away so that they can go to the surrounding countryside and villages and buy themselves something to eat.”
  '37':
  - type: text
    content: 'But he answered, '
  - type: text
    content: “You give them something to eat.”
  - type: text
    content: They said to him, “That would take more than half a year’s wages
  - type: note
    content: Greek take two hundred denarii
  - type: text
    content: '! Are we to go and spend that much on bread and give it to them to eat?”'
  '38':
  - type: text
    content: ' '
  - type: text
    content: “How many loaves do you have?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “Go and see.”
  - type: text
    content: When they found out, they said, “Five—and two fish.”
  '39':
  - type: text
    content: 'Then Jesus directed them to have all the people sit down in groups on the green grass. '
  '4':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “A prophet is not without honor except in his own town, among his relatives and in his own home.”
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'So they sat down in groups of hundreds and fifties. '
  '41':
  - type: text
    content: 'Taking the five loaves and the two fish and looking up to heaven, he gave thanks and broke the loaves. Then he gave them to his disciples to distribute to the people. He also divided the two fish among them all. '
  '42':
  - type: text
    content: 'They all ate and were satisfied, '
  '43':
  - type: text
    content: 'and the disciples picked up twelve basketfuls of broken pieces of bread and fish. '
  '44':
  - type: text
    content: The number of the men who had eaten was five thousand.
  - type: heading
    content: Jesus Walks on the Water
  '45':
  - type: text
    content: 'Immediately Jesus made his disciples get into the boat and go on ahead of him to Bethsaida, while he dismissed the crowd. '
  '46':
  - type: text
    content: After leaving them, he went up on a mountainside to pray.
  '47':
  - type: text
    content: 'Later that night, the boat was in the middle of the lake, and he was alone on land. '
  '48':
  - type: text
    content: 'He saw the disciples straining at the oars, because the wind was against them. Shortly before dawn he went out to them, walking on the lake. He was about to pass by them, '
  '49':
  - type: text
    content: 'but when they saw him walking on the lake, they thought he was a ghost. They cried out, '
  '5':
  - type: text
    content: 'He could not do any miracles there, except lay his hands on a few sick people and heal them. '
  '50':
  - type: text
    content: because they all saw him and were terrified.
  - type: text
    content: 'Immediately he spoke to them and said, '
  - type: text
    content: “Take courage! It is I. Don’t be afraid.”
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Then he climbed into the boat with them, and the wind died down. They were completely amazed, '
  '52':
  - type: text
    content: for they had not understood about the loaves; their hearts were hardened.
  '53':
  - type: text
    content: 'When they had crossed over, they landed at Gennesaret and anchored there. '
  '54':
  - type: text
    content: 'As soon as they got out of the boat, people recognized Jesus. '
  '55':
  - type: text
    content: 'They ran throughout that whole region and carried the sick on mats to wherever they heard he was. '
  '56':
  - type: text
    content: And wherever he went—into villages, towns or countryside—they placed the sick in the marketplaces. They begged him to let them touch even the edge of his cloak, and all who touched it were healed.
  '6':
  - type: text
    content: He was amazed at their lack of faith.
  - type: heading
    content: Jesus Sends Out the Twelve
  - type: text
    content: 'Then Jesus went around teaching from village to village. '
  '7':
  - type: text
    content: Calling the Twelve to him, he began to send them out two by two and gave them authority over impure spirits.
  '8':
  - type: text
    content: 'These were his instructions: '
  - type: text
    content: “Take nothing for the journey except a staff—no bread, no bag, no money in your belts.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Wear sandals but not an extra shirt.
  - type: text
    content: ' '
