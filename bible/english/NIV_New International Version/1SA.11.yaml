document_id: 1SA.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Rescues the City of Jabesh
  - type: text
    content: Nahash
  - type: note
    content: Masoretic Text; Dead Sea Scrolls gifts. Now Nahash king of the Ammonites oppressed the Gadites and Reubenites severely. He gouged out all their right eyes and struck terror and dread in Israel. Not a man remained among the Israelites beyond the Jordan whose right eye was not gouged out by Nahash king of the Ammonites, except that seven thousand men fled from the Ammonites and entered Jabesh Gilead. About a month later, 1 Nahash
  - type: text
    content: ' the Ammonite went up and besieged Jabesh Gilead. And all the men of Jabesh said to him, “Make a treaty with us, and we will be subject to you.”'
  '10':
  - type: text
    content: They said to the Ammonites, “Tomorrow we will surrender to you, and you can do to us whatever you like.”
  '11':
  - type: text
    content: The next day Saul separated his men into three divisions; during the last watch of the night they broke into the camp of the Ammonites and slaughtered them until the heat of the day. Those who survived were scattered, so that no two of them were left together.
  - type: heading
    content: Saul Confirmed as King
  '12':
  - type: text
    content: The people then said to Samuel, “Who was it that asked, ‘Shall Saul reign over us?’ Turn these men over to us so that we may put them to death.”
  '13':
  - type: text
    content: 'But Saul said, “No one will be put to death today, for this day the '
  - type: text
    content: Lord
  - type: text
    content: ' has rescued Israel.”'
  '14':
  - type: text
    content: 'Then Samuel said to the people, “Come, let us go to Gilgal and there renew the kingship.” '
  '15':
  - type: text
    content: 'So all the people went to Gilgal and made Saul king in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: '. There they sacrificed fellowship offerings before the '
  - type: text
    content: Lord
  - type: text
    content: ', and Saul and all the Israelites held a great celebration.'
  '2':
  - type: text
    content: But Nahash the Ammonite replied, “I will make a treaty with you only on the condition that I gouge out the right eye of every one of you and so bring disgrace on all Israel.”
  '3':
  - type: text
    content: The elders of Jabesh said to him, “Give us seven days so we can send messengers throughout Israel; if no one comes to rescue us, we will surrender to you.”
  '4':
  - type: text
    content: 'When the messengers came to Gibeah of Saul and reported these terms to the people, they all wept aloud. '
  '5':
  - type: text
    content: Just then Saul was returning from the fields, behind his oxen, and he asked, “What is wrong with everyone? Why are they weeping?” Then they repeated to him what the men of Jabesh had said.
  '6':
  - type: text
    content: 'When Saul heard their words, the Spirit of God came powerfully upon him, and he burned with anger. '
  '7':
  - type: text
    content: 'He took a pair of oxen, cut them into pieces, and sent the pieces by messengers throughout Israel, proclaiming, “This is what will be done to the oxen of anyone who does not follow Saul and Samuel.” Then the terror of the '
  - type: text
    content: Lord
  - type: text
    content: ' fell on the people, and they came out together as one. '
  '8':
  - type: text
    content: When Saul mustered them at Bezek, the men of Israel numbered three hundred thousand and those of Judah thirty thousand.
  '9':
  - type: text
    content: 'They told the messengers who had come, “Say to the men of Jabesh Gilead, ‘By the time the sun is hot tomorrow, you will be rescued.’ ” When the messengers went and reported this to the men of Jabesh, they were elated. '
