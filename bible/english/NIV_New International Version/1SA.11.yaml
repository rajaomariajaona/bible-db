document_id: 1SA.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saul Rescues the City of Jabesh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nahash
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text; Dead Sea Scrolls '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'gifts. Now Nahash king of the Ammonites oppressed the Gadites and Reubenites severely. He gouged out all their right eyes and struck terror and dread in Israel. Not a man remained among the Israelites beyond the Jordan whose right eye was not gouged out by Nahash king of the Ammonites, except that seven thousand men fled from the Ammonites and entered Jabesh Gilead. About a month later, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '1 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Nahash
    marker-yv: yv-n
  - type: text
    text: ' the Ammonite went up and besieged Jabesh Gilead. And all the men of Jabesh said to him, “Make a treaty with us, and we will be subject to you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But Nahash the Ammonite replied, “I will make a treaty with you only on the condition that I gouge out the right eye of every one of you and so bring disgrace on all Israel.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The elders of Jabesh said to him, “Give us seven days so we can send messengers throughout Israel; if no one comes to rescue us, we will surrender to you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the messengers came to Gibeah of Saul and reported these terms to the people, they all wept aloud. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Just then Saul was returning from the fields, behind his oxen, and he asked, “What is wrong with everyone? Why are they weeping?” Then they repeated to him what the men of Jabesh had said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Saul heard their words, the Spirit of God came powerfully upon him, and he burned with anger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He took a pair of oxen, cut them into pieces, and sent the pieces by messengers throughout Israel, proclaiming, “This is what will be done to the oxen of anyone who does not follow Saul and Samuel.” Then the terror of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' fell on the people, and they came out together as one. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When Saul mustered them at Bezek, the men of Israel numbered three hundred thousand and those of Judah thirty thousand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They told the messengers who had come, “Say to the men of Jabesh Gilead, ‘By the time the sun is hot tomorrow, you will be rescued.’ ” When the messengers went and reported this to the men of Jabesh, they were elated. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They said to the Ammonites, “Tomorrow we will surrender to you, and you can do to us whatever you like.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The next day Saul separated his men into three divisions; during the last watch of the night they broke into the camp of the Ammonites and slaughtered them until the heat of the day. Those who survived were scattered, so that no two of them were left together.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saul Confirmed as King
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The people then said to Samuel, “Who was it that asked, ‘Shall Saul reign over us?’ Turn these men over to us so that we may put them to death.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But Saul said, “No one will be put to death today, for this day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rescued Israel.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Samuel said to the people, “Come, let us go to Gilgal and there renew the kingship.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So all the people went to Gilgal and made Saul king in the presence of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. There they sacrificed fellowship offerings before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and Saul and all the Israelites held a great celebration.'
