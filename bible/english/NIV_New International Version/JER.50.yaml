verses:
  '1':
  - type: heading
    content: A Message About Babylon
  - type: text
    content: 'This is the word the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke through Jeremiah the prophet concerning Babylon and the land of the Babylonians'
  - type: note
    content: Or Chaldeans; also in verses 8, 25, 35 and 45
  - type: text
    content: ':'
  '10':
  - type: text
    content: So Babylonia
  - type: note
    content: Or Chaldea
  - type: text
    content: ' will be plundered;'
  - type: text
    content: all who plunder her will have their fill,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: “Because you rejoice and are glad,
  - type: text
    content: you who pillage my inheritance,
  - type: text
    content: because you frolic like a heifer threshing grain
  - type: text
    content: and neigh like stallions,
  '12':
  - type: text
    content: your mother will be greatly ashamed;
  - type: text
    content: she who gave you birth will be disgraced.
  - type: text
    content: She will be the least of the nations—
  - type: text
    content: a wilderness, a dry land, a desert.
  '13':
  - type: text
    content: 'Because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger she will not be inhabited
  - type: text
    content: but will be completely desolate.
  - type: text
    content: All who pass Babylon will be appalled;
  - type: text
    content: they will scoff because of all her wounds.
  '14':
  - type: text
    content: “Take up your positions around Babylon,
  - type: text
    content: all you who draw the bow.
  - type: text
    content: Shoot at her! Spare no arrows,
  - type: text
    content: 'for she has sinned against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: Shout against her on every side!
  - type: text
    content: She surrenders, her towers fall,
  - type: text
    content: her walls are torn down.
  - type: text
    content: 'Since this is the vengeance of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: take vengeance on her;
  - type: text
    content: do to her as she has done to others.
  '16':
  - type: text
    content: Cut off from Babylon the sower,
  - type: text
    content: and the reaper with his sickle at harvest.
  - type: text
    content: Because of the sword of the oppressor
  - type: text
    content: let everyone return to their own people,
  - type: text
    content: let everyone flee to their own land.
  '17':
  - type: text
    content: “Israel is a scattered flock
  - type: text
    content: that lions have chased away.
  - type: text
    content: The first to devour them
  - type: text
    content: was the king of Assyria;
  - type: text
    content: the last to crush their bones
  - type: text
    content: was Nebuchadnezzar king of Babylon.”
  '18':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says:'
  - type: text
    content: “I will punish the king of Babylon and his land
  - type: text
    content: as I punished the king of Assyria.
  '19':
  - type: text
    content: But I will bring Israel back to their own pasture,
  - type: text
    content: and they will graze on Carmel and Bashan;
  - type: text
    content: their appetite will be satisfied
  - type: text
    content: on the hills of Ephraim and Gilead.
  '2':
  - type: text
    content: “Announce and proclaim among the nations,
  - type: text
    content: lift up a banner and proclaim it;
  - type: text
    content: keep nothing back, but say,
  - type: text
    content: ‘Babylon will be captured;
  - type: text
    content: Bel will be put to shame,
  - type: text
    content: Marduk filled with terror.
  - type: text
    content: Her images will be put to shame
  - type: text
    content: and her idols filled with terror.’
  '20':
  - type: text
    content: In those days, at that time,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “search will be made for Israel’s guilt,
  - type: text
    content: but there will be none,
  - type: text
    content: and for the sins of Judah,
  - type: text
    content: but none will be found,
  - type: text
    content: for I will forgive the remnant I spare.
  '21':
  - type: text
    content: “Attack the land of Merathaim
  - type: text
    content: and those who live in Pekod.
  - type: text
    content: Pursue, kill and completely destroy
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them; also in verse 26.
  - type: text
    content: ' them,”'
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Do everything I have commanded you.
  '22':
  - type: text
    content: The noise of battle is in the land,
  - type: text
    content: the noise of great destruction!
  '23':
  - type: text
    content: How broken and shattered
  - type: text
    content: is the hammer of the whole earth!
  - type: text
    content: How desolate is Babylon
  - type: text
    content: among the nations!
  '24':
  - type: text
    content: I set a trap for you, Babylon,
  - type: text
    content: and you were caught before you knew it;
  - type: text
    content: you were found and captured
  - type: text
    content: 'because you opposed the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has opened his arsenal'
  - type: text
    content: and brought out the weapons of his wrath,
  - type: text
    content: 'for the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has work to do'
  - type: text
    content: in the land of the Babylonians.
  '26':
  - type: text
    content: Come against her from afar.
  - type: text
    content: Break open her granaries;
  - type: text
    content: pile her up like heaps of grain.
  - type: text
    content: Completely destroy her
  - type: text
    content: and leave her no remnant.
  '27':
  - type: text
    content: Kill all her young bulls;
  - type: text
    content: let them go down to the slaughter!
  - type: text
    content: Woe to them! For their day has come,
  - type: text
    content: the time for them to be punished.
  '28':
  - type: text
    content: Listen to the fugitives and refugees from Babylon
  - type: text
    content: declaring in Zion
  - type: text
    content: 'how the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has taken vengeance,'
  - type: text
    content: vengeance for his temple.
  '29':
  - type: text
    content: “Summon archers against Babylon,
  - type: text
    content: all those who draw the bow.
  - type: text
    content: Encamp all around her;
  - type: text
    content: let no one escape.
  - type: text
    content: Repay her for her deeds;
  - type: text
    content: do to her as she has done.
  - type: text
    content: 'For she has defied the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the Holy One of Israel.
  '3':
  - type: text
    content: A nation from the north will attack her
  - type: text
    content: and lay waste her land.
  - type: text
    content: No one will live in it;
  - type: text
    content: both people and animals will flee away.
  '30':
  - type: text
    content: Therefore, her young men will fall in the streets;
  - type: text
    content: all her soldiers will be silenced in that day,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: “See, I am against you, you arrogant one,”
  - type: text
    content: 'declares the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: “for your day has come,
  - type: text
    content: the time for you to be punished.
  '32':
  - type: text
    content: The arrogant one will stumble and fall
  - type: text
    content: and no one will help her up;
  - type: text
    content: I will kindle a fire in her towns
  - type: text
    content: that will consume all who are around her.”
  '33':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “The people of Israel are oppressed,
  - type: text
    content: and the people of Judah as well.
  - type: text
    content: All their captors hold them fast,
  - type: text
    content: refusing to let them go.
  '34':
  - type: text
    content: Yet their Redeemer is strong;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is his name.'
  - type: text
    content: He will vigorously defend their cause
  - type: text
    content: so that he may bring rest to their land,
  - type: text
    content: but unrest to those who live in Babylon.
  '35':
  - type: text
    content: “A sword against the Babylonians!”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: “against those who live in Babylon
  - type: text
    content: and against her officials and wise men!
  '36':
  - type: text
    content: A sword against her false prophets!
  - type: text
    content: They will become fools.
  - type: text
    content: A sword against her warriors!
  - type: text
    content: They will be filled with terror.
  '37':
  - type: text
    content: A sword against her horses and chariots
  - type: text
    content: and all the foreigners in her ranks!
  - type: text
    content: They will become weaklings.
  - type: text
    content: A sword against her treasures!
  - type: text
    content: They will be plundered.
  '38':
  - type: text
    content: A drought on
  - type: note
    content: Or A sword against
  - type: text
    content: ' her waters!'
  - type: text
    content: They will dry up.
  - type: text
    content: For it is a land of idols,
  - type: text
    content: idols that will go mad with terror.
  '39':
  - type: text
    content: “So desert creatures and hyenas will live there,
  - type: text
    content: and there the owl will dwell.
  - type: text
    content: It will never again be inhabited
  - type: text
    content: or lived in from generation to generation.
  '4':
  - type: text
    content: “In those days, at that time,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “the people of Israel and the people of Judah together
  - type: text
    content: 'will go in tears to seek the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '40':
  - type: text
    content: As I overthrew Sodom and Gomorrah
  - type: text
    content: along with their neighboring towns,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “so no one will live there;
  - type: text
    content: no people will dwell in it.
  '41':
  - type: text
    content: “Look! An army is coming from the north;
  - type: text
    content: a great nation and many kings
  - type: text
    content: are being stirred up from the ends of the earth.
  '42':
  - type: text
    content: They are armed with bows and spears;
  - type: text
    content: they are cruel and without mercy.
  - type: text
    content: They sound like the roaring sea
  - type: text
    content: as they ride on their horses;
  - type: text
    content: they come like men in battle formation
  - type: text
    content: to attack you, Daughter Babylon.
  '43':
  - type: text
    content: The king of Babylon has heard reports about them,
  - type: text
    content: and his hands hang limp.
  - type: text
    content: Anguish has gripped him,
  - type: text
    content: pain like that of a woman in labor.
  '44':
  - type: text
    content: Like a lion coming up from Jordan’s thickets
  - type: text
    content: to a rich pastureland,
  - type: text
    content: I will chase Babylon from its land in an instant.
  - type: text
    content: Who is the chosen one I will appoint for this?
  - type: text
    content: Who is like me and who can challenge me?
  - type: text
    content: And what shepherd can stand against me?”
  '45':
  - type: text
    content: 'Therefore, hear what the '
  - type: text
    content: Lord
  - type: text
    content: ' has planned against Babylon,'
  - type: text
    content: 'what he has purposed against the land of the Babylonians:'
  - type: text
    content: The young of the flock will be dragged away;
  - type: text
    content: their pasture will be appalled at their fate.
  '46':
  - type: text
    content: At the sound of Babylon’s capture the earth will tremble;
  - type: text
    content: its cry will resound among the nations.
  '5':
  - type: text
    content: They will ask the way to Zion
  - type: text
    content: and turn their faces toward it.
  - type: text
    content: 'They will come and bind themselves to the '
  - type: text
    content: Lord
  - type: text
    content: in an everlasting covenant
  - type: text
    content: that will not be forgotten.
  '6':
  - type: text
    content: “My people have been lost sheep;
  - type: text
    content: their shepherds have led them astray
  - type: text
    content: and caused them to roam on the mountains.
  - type: text
    content: They wandered over mountain and hill
  - type: text
    content: and forgot their own resting place.
  '7':
  - type: text
    content: Whoever found them devoured them;
  - type: text
    content: their enemies said, ‘We are not guilty,
  - type: text
    content: 'for they sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ', their verdant pasture,'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ', the hope of their ancestors.’'
  '8':
  - type: text
    content: “Flee out of Babylon;
  - type: text
    content: leave the land of the Babylonians,
  - type: text
    content: and be like the goats that lead the flock.
  '9':
  - type: text
    content: For I will stir up and bring against Babylon
  - type: text
    content: an alliance of great nations from the land of the north.
  - type: text
    content: They will take up their positions against her,
  - type: text
    content: and from the north she will be captured.
  - type: text
    content: Their arrows will be like skilled warriors
  - type: text
    content: who do not return empty-handed.
