document_id: JER.50,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Message About Babylon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the word the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke through Jeremiah the prophet concerning Babylon and the land of the Babylonians'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 8, 25, 35 and 45
      marker-yv: yv-n
    - type: text
      text: ':'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So Babylonia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldea
      marker-yv: yv-n
    - type: text
      text: ' will be plundered;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who plunder her will have their fill,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because you rejoice and are glad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who pillage my inheritance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because you frolic like a heifer threshing grain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and neigh like stallions,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your mother will be greatly ashamed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she who gave you birth will be disgraced.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will be the least of the nations—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wilderness, a dry land, a desert.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger she will not be inhabited
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but will be completely desolate.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who pass Babylon will be appalled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will scoff because of all her wounds.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Take up your positions around Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all you who draw the bow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shoot at her! Spare no arrows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for she has sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shout against her on every side!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She surrenders, her towers fall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her walls are torn down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Since this is the vengeance of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take vengeance on her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do to her as she has done to others.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cut off from Babylon the sower,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the reaper with his sickle at harvest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the sword of the oppressor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let everyone return to their own people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let everyone flee to their own land.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Israel is a scattered flock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that lions have chased away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The first to devour them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was the king of Assyria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the last to crush their bones
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was Nebuchadnezzar king of Babylon.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will punish the king of Babylon and his land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I punished the king of Assyria.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I will bring Israel back to their own pasture,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will graze on Carmel and Bashan;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their appetite will be satisfied
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the hills of Ephraim and Gilead.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Announce and proclaim among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lift up a banner and proclaim it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep nothing back, but say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Babylon will be captured;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bel will be put to shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Marduk filled with terror.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her images will be put to shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her idols filled with terror.’
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In those days, at that time,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “search will be made for Israel’s guilt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but there will be none,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for the sins of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but none will be found,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I will forgive the remnant I spare.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Attack the land of Merathaim
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who live in Pekod.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pursue, kill and completely destroy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them; also in verse 26.'
      marker-yv: yv-n
    - type: text
      text: ' them,”'
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Do everything I have commanded you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The noise of battle is in the land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the noise of great destruction!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How broken and shattered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is the hammer of the whole earth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How desolate is Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among the nations!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I set a trap for you, Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you were caught before you knew it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you were found and captured
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because you opposed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has opened his arsenal'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brought out the weapons of his wrath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty has work to do'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the land of the Babylonians.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come against her from afar.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Break open her granaries;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pile her up like heaps of grain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Completely destroy her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and leave her no remnant.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Kill all her young bulls;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them go down to the slaughter!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to them! For their day has come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the time for them to be punished.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to the fugitives and refugees from Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: declaring in Zion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has taken vengeance,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: vengeance for his temple.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Summon archers against Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all those who draw the bow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Encamp all around her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let no one escape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Repay her for her deeds;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do to her as she has done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For she has defied the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Holy One of Israel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A nation from the north will attack her
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lay waste her land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one will live in it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both people and animals will flee away.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, her young men will fall in the streets;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all her soldiers will be silenced in that day,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, I am against you, you arrogant one,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “for your day has come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the time for you to be punished.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The arrogant one will stumble and fall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one will help her up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will kindle a fire in her towns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will consume all who are around her.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people of Israel are oppressed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the people of Judah as well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their captors hold them fast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: refusing to let them go.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet their Redeemer is strong;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is his name.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will vigorously defend their cause
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that he may bring rest to their land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but unrest to those who live in Babylon.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A sword against the Babylonians!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “against those who live in Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and against her officials and wise men!
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sword against her false prophets!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will become fools.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sword against her warriors!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be filled with terror.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sword against her horses and chariots
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the foreigners in her ranks!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will become weaklings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sword against her treasures!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be plundered.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A drought on
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A sword against
      marker-yv: yv-n
    - type: text
      text: ' her waters!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will dry up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For it is a land of idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: idols that will go mad with terror.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So desert creatures and hyenas will live there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there the owl will dwell.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will never again be inhabited
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or lived in from generation to generation.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In those days, at that time,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “the people of Israel and the people of Judah together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'will go in tears to seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God.'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As I overthrew Sodom and Gomorrah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along with their neighboring towns,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “so no one will live there;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no people will dwell in it.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! An army is coming from the north;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a great nation and many kings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are being stirred up from the ends of the earth.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are armed with bows and spears;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are cruel and without mercy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sound like the roaring sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they ride on their horses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they come like men in battle formation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to attack you, Daughter Babylon.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The king of Babylon has heard reports about them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his hands hang limp.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anguish has gripped him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pain like that of a woman in labor.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a lion coming up from Jordan’s thickets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to a rich pastureland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will chase Babylon from its land in an instant.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who is the chosen one I will appoint for this?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is like me and who can challenge me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what shepherd can stand against me?”
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, hear what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has planned against Babylon,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'what he has purposed against the land of the Babylonians:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young of the flock will be dragged away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their pasture will be appalled at their fate.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the sound of Babylon’s capture the earth will tremble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its cry will resound among the nations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will ask the way to Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turn their faces toward it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will come and bind themselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in an everlasting covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will not be forgotten.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My people have been lost sheep;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their shepherds have led them astray
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and caused them to roam on the mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They wandered over mountain and hill
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and forgot their own resting place.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever found them devoured them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their enemies said, ‘We are not guilty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for they sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', their verdant pasture,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the hope of their ancestors.’'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Flee out of Babylon;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leave the land of the Babylonians,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be like the goats that lead the flock.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will stir up and bring against Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an alliance of great nations from the land of the north.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will take up their positions against her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the north she will be captured.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their arrows will be like skilled warriors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who do not return empty-handed.
