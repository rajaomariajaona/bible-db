document_id: GEN.48,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh and Ephraim
  - type: text
    content: 'Some time later Joseph was told, “Your father is ill.” So he took his two sons Manasseh and Ephraim along with him. '
  '10':
  - type: text
    content: Now Israel’s eyes were failing because of old age, and he could hardly see. So Joseph brought his sons close to him, and his father kissed them and embraced them.
  '11':
  - type: text
    content: Israel said to Joseph, “I never expected to see your face again, and now God has allowed me to see your children too.”
  '12':
  - type: text
    content: 'Then Joseph removed them from Israel’s knees and bowed down with his face to the ground. '
  '13':
  - type: text
    content: 'And Joseph took both of them, Ephraim on his right toward Israel’s left hand and Manasseh on his left toward Israel’s right hand, and brought them close to him. '
  '14':
  - type: text
    content: But Israel reached out his right hand and put it on Ephraim’s head, though he was the younger, and crossing his arms, he put his left hand on Manasseh’s head, even though Manasseh was the firstborn.
  '15':
  - type: text
    content: Then he blessed Joseph and said,
  - type: text
    content: “May the God before whom my fathers
  - type: text
    content: Abraham and Isaac walked faithfully,
  - type: text
    content: the God who has been my shepherd
  - type: text
    content: all my life to this day,
  '16':
  - type: text
    content: the Angel who has delivered me from all harm
  - type: text
    content: —may he bless these boys.
  - type: text
    content: May they be called by my name
  - type: text
    content: and the names of my fathers Abraham and Isaac,
  - type: text
    content: and may they increase greatly
  - type: text
    content: on the earth.”
  '17':
  - type: text
    content: 'When Joseph saw his father placing his right hand on Ephraim’s head he was displeased; so he took hold of his father’s hand to move it from Ephraim’s head to Manasseh’s head. '
  '18':
  - type: text
    content: Joseph said to him, “No, my father, this one is the firstborn; put your right hand on his head.”
  '19':
  - type: text
    content: 'But his father refused and said, “I know, my son, I know. He too will become a people, and he too will become great. Nevertheless, his younger brother will be greater than he, and his descendants will become a group of nations.” '
  '2':
  - type: text
    content: When Jacob was told, “Your son Joseph has come to you,” Israel rallied his strength and sat up on the bed.
  '20':
  - type: text
    content: He blessed them that day and said,
  - type: text
    content: “In your
  - type: note
    content: The Hebrew is singular.
  - type: text
    content: ' name will Israel pronounce this blessing:'
  - type: text
    content: ‘May God make you like Ephraim and Manasseh.’ ”
  - type: text
    content: So he put Ephraim ahead of Manasseh.
  '21':
  - type: text
    content: Then Israel said to Joseph, “I am about to die, but God will be with you
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' and take you'
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' back to the land of your'
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' fathers. '
  '22':
  - type: text
    content: And to you I give one more ridge of land
  - type: note
    content: The Hebrew for ridge of land is identical with the place name Shechem.
  - type: text
    content: ' than to your brothers, the ridge I took from the Amorites with my sword and my bow.”'
  '3':
  - type: text
    content: Jacob said to Joseph, “God Almighty
  - type: note
    content: Hebrew El-Shaddai
  - type: text
    content: ' appeared to me at Luz in the land of Canaan, and there he blessed me '
  '4':
  - type: text
    content: and said to me, ‘I am going to make you fruitful and increase your numbers. I will make you a community of peoples, and I will give this land as an everlasting possession to your descendants after you.’
  '5':
  - type: text
    content: '“Now then, your two sons born to you in Egypt before I came to you here will be reckoned as mine; Ephraim and Manasseh will be mine, just as Reuben and Simeon are mine. '
  '6':
  - type: text
    content: 'Any children born to you after them will be yours; in the territory they inherit they will be reckoned under the names of their brothers. '
  '7':
  - type: text
    content: As I was returning from Paddan,
  - type: note
    content: That is, Northwest Mesopotamia
  - type: text
    content: ' to my sorrow Rachel died in the land of Canaan while we were still on the way, a little distance from Ephrath. So I buried her there beside the road to Ephrath” (that is, Bethlehem).'
  '8':
  - type: text
    content: When Israel saw the sons of Joseph, he asked, “Who are these?”
  '9':
  - type: text
    content: “They are the sons God has given me here,” Joseph said to his father.
  - type: text
    content: Then Israel said, “Bring them to me so I may bless them.”
