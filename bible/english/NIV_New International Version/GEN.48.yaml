document_id: GEN.48
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Manasseh and Ephraim
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Some time later Joseph was told, “Your father is ill.” So he took his two sons Manasseh and Ephraim along with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When Jacob was told, “Your son Joseph has come to you,” Israel rallied his strength and sat up on the bed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jacob said to Joseph, “God Almighty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: El-Shaddai
    marker-yv: yv-n
  - type: text
    text: ' appeared to me at Luz in the land of Canaan, and there he blessed me '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: and said to me, ‘I am going to make you fruitful and increase your numbers. I will make you a community of peoples, and I will give this land as an everlasting possession to your descendants after you.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Now then, your two sons born to you in Egypt before I came to you here will be reckoned as mine; Ephraim and Manasseh will be mine, just as Reuben and Simeon are mine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Any children born to you after them will be yours; in the territory they inherit they will be reckoned under the names of their brothers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: As I was returning from Paddan,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Northwest Mesopotamia
    marker-yv: yv-n
  - type: text
    text: ' to my sorrow Rachel died in the land of Canaan while we were still on the way, a little distance from Ephrath. So I buried her there beside the road to Ephrath” (that is, Bethlehem).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When Israel saw the sons of Joseph, he asked, “Who are these?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “They are the sons God has given me here,” Joseph said to his father.
- type: usfm
  marker: p
  children:
  - type: text
    text: Then Israel said, “Bring them to me so I may bless them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Now Israel’s eyes were failing because of old age, and he could hardly see. So Joseph brought his sons close to him, and his father kissed them and embraced them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Israel said to Joseph, “I never expected to see your face again, and now God has allowed me to see your children too.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Joseph removed them from Israel’s knees and bowed down with his face to the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Joseph took both of them, Ephraim on his right toward Israel’s left hand and Manasseh on his left toward Israel’s right hand, and brought them close to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But Israel reached out his right hand and put it on Ephraim’s head, though he was the younger, and crossing his arms, he put his left hand on Manasseh’s head, even though Manasseh was the firstborn.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then he blessed Joseph and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “May the God before whom my fathers
- type: usfm
  marker: q2
  children:
  - type: text
    text: Abraham and Isaac walked faithfully,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the God who has been my shepherd
- type: usfm
  marker: q2
  children:
  - type: text
    text: all my life to this day,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: the Angel who has delivered me from all harm
- type: usfm
  marker: q2
  children:
  - type: text
    text: —may he bless these boys.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May they be called by my name
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the names of my fathers Abraham and Isaac,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and may they increase greatly
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the earth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When Joseph saw his father placing his right hand on Ephraim’s head he was displeased; so he took hold of his father’s hand to move it from Ephraim’s head to Manasseh’s head. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Joseph said to him, “No, my father, this one is the firstborn; put your right hand on his head.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But his father refused and said, “I know, my son, I know. He too will become a people, and he too will become great. Nevertheless, his younger brother will be greater than he, and his descendants will become a group of nations.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He blessed them that day and said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In your
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is singular.
    marker-yv: yv-n
  - type: text
    text: ' name will Israel pronounce this blessing:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘May God make you like Ephraim and Manasseh.’ ”
- type: usfm
  marker: m
  children:
  - type: text
    text: So he put Ephraim ahead of Manasseh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Israel said to Joseph, “I am about to die, but God will be with you
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is plural.
    marker-yv: yv-n
  - type: text
    text: ' and take you'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is plural.
    marker-yv: yv-n
  - type: text
    text: ' back to the land of your'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is plural.
    marker-yv: yv-n
  - type: text
    text: ' fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And to you I give one more ridge of land
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '48:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ridge of land '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is identical with the place name Shechem.
    marker-yv: yv-n
  - type: text
    text: ' than to your brothers, the ridge I took from the Amorites with my sword and my bow.”'
