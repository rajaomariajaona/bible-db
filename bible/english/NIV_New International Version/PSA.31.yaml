document_id: PSA.31,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 31
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 31:1-24 is numbered 31:2-25.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I have taken refuge;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me never be put to shame;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deliver me in your righteousness.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My life is consumed by anguish
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my years by groaning;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my strength fails because of my affliction,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: guilt
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my bones grow weak.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Because of all my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am the utter contempt of my neighbors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and an object of dread to my closest friends—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who see me on the street flee from me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I am forgotten as though I were dead;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have become like broken pottery.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For I hear many whispering,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Terror on every side!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They conspire against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and plot to take my life.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'But I trust in you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I say, “You are my God.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: My times are in your hands;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deliver me from the hands of my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from those who pursue me.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Let your face shine on your servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: save me in your unfailing love.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Let me not be put to shame, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have cried out to you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but let the wicked be put to shame
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be silent in the realm of the dead.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Let their lying lips be silenced,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for with pride and contempt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they speak arrogantly against the righteous.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: How abundant are the good things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you have stored up for those who fear you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you bestow in the sight of all,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on those who take refuge in you.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Turn your ear to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come quickly to my rescue;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: be my rock of refuge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a strong fortress to save me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: In the shelter of your presence you hide them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from all human intrigues;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you keep them safe in your dwelling
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from accusing tongues.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he showed me the wonders of his love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I was in a city under siege.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: In my alarm I said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I am cut off from your sight!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you heard my cry for mercy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I called to you for help.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all his faithful people!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' preserves those who are true to him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the proud he pays back in full.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Be strong and take heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'all you who hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Since you are my rock and my fortress,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the sake of your name lead and guide me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Keep me free from the trap that is set for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are my refuge.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Into your hands I commit my spirit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'deliver me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', my faithful God.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I hate those who cling to worthless idols;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as for me, I trust in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I will be glad and rejoice in your love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you saw my affliction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and knew the anguish of my soul.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You have not given me into the hands of the enemy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but have set my feet in a spacious place.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Be merciful to me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for I am in distress;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my eyes grow weak with sorrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my soul and body with grief.
