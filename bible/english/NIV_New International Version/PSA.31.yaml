document_id: PSA.31,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 31In Hebrew texts 31:1-24 is numbered 31:2-25.
  - type: text
    content: For the director of music. A psalm of David.
  - type: text
    content: 'In you, '
  - type: text
    content: Lord
  - type: text
    content: ', I have taken refuge;'
  - type: text
    content: let me never be put to shame;
  - type: text
    content: deliver me in your righteousness.
  '10':
  - type: text
    content: My life is consumed by anguish
  - type: text
    content: and my years by groaning;
  - type: text
    content: my strength fails because of my affliction,
  - type: note
    content: Or guilt
  - type: text
    content: and my bones grow weak.
  '11':
  - type: text
    content: Because of all my enemies,
  - type: text
    content: I am the utter contempt of my neighbors
  - type: text
    content: and an object of dread to my closest friends—
  - type: text
    content: those who see me on the street flee from me.
  '12':
  - type: text
    content: I am forgotten as though I were dead;
  - type: text
    content: I have become like broken pottery.
  '13':
  - type: text
    content: For I hear many whispering,
  - type: text
    content: “Terror on every side!”
  - type: text
    content: They conspire against me
  - type: text
    content: and plot to take my life.
  '14':
  - type: text
    content: 'But I trust in you, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I say, “You are my God.”
  '15':
  - type: text
    content: My times are in your hands;
  - type: text
    content: deliver me from the hands of my enemies,
  - type: text
    content: from those who pursue me.
  '16':
  - type: text
    content: Let your face shine on your servant;
  - type: text
    content: save me in your unfailing love.
  '17':
  - type: text
    content: 'Let me not be put to shame, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for I have cried out to you;
  - type: text
    content: but let the wicked be put to shame
  - type: text
    content: and be silent in the realm of the dead.
  '18':
  - type: text
    content: Let their lying lips be silenced,
  - type: text
    content: for with pride and contempt
  - type: text
    content: they speak arrogantly against the righteous.
  '19':
  - type: text
    content: How abundant are the good things
  - type: text
    content: that you have stored up for those who fear you,
  - type: text
    content: that you bestow in the sight of all,
  - type: text
    content: on those who take refuge in you.
  '2':
  - type: text
    content: Turn your ear to me,
  - type: text
    content: come quickly to my rescue;
  - type: text
    content: be my rock of refuge,
  - type: text
    content: a strong fortress to save me.
  '20':
  - type: text
    content: In the shelter of your presence you hide them
  - type: text
    content: from all human intrigues;
  - type: text
    content: you keep them safe in your dwelling
  - type: text
    content: from accusing tongues.
  '21':
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he showed me the wonders of his love
  - type: text
    content: when I was in a city under siege.
  '22':
  - type: text
    content: In my alarm I said,
  - type: text
    content: “I am cut off from your sight!”
  - type: text
    content: Yet you heard my cry for mercy
  - type: text
    content: when I called to you for help.
  '23':
  - type: text
    content: 'Love the '
  - type: text
    content: Lord
  - type: text
    content: ', all his faithful people!'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' preserves those who are true to him,'
  - type: text
    content: but the proud he pays back in full.
  '24':
  - type: text
    content: Be strong and take heart,
  - type: text
    content: 'all you who hope in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: Since you are my rock and my fortress,
  - type: text
    content: for the sake of your name lead and guide me.
  '4':
  - type: text
    content: Keep me free from the trap that is set for me,
  - type: text
    content: for you are my refuge.
  '5':
  - type: text
    content: Into your hands I commit my spirit;
  - type: text
    content: 'deliver me, '
  - type: text
    content: Lord
  - type: text
    content: ', my faithful God.'
  '6':
  - type: text
    content: I hate those who cling to worthless idols;
  - type: text
    content: 'as for me, I trust in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: I will be glad and rejoice in your love,
  - type: text
    content: for you saw my affliction
  - type: text
    content: and knew the anguish of my soul.
  '8':
  - type: text
    content: You have not given me into the hands of the enemy
  - type: text
    content: but have set my feet in a spacious place.
  '9':
  - type: text
    content: 'Be merciful to me, '
  - type: text
    content: Lord
  - type: text
    content: ', for I am in distress;'
  - type: text
    content: my eyes grow weak with sorrow,
  - type: text
    content: my soul and body with grief.
