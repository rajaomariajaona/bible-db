document_id: ISA.20,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Egypt and Cush
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the year that the supreme commander, sent by Sargon king of Assyria, came to Ashdod and attacked and captured it— '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'at that time the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke through Isaiah son of Amoz. He said to him, “Take off the sackcloth from your body and the sandals from your feet.” And he did so, going around stripped and barefoot.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Just as my servant Isaiah has gone stripped and barefoot for three years, as a sign and portent against Egypt and Cush,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the upper Nile region; also in verse 5
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so the king of Assyria will lead away stripped and barefoot the Egyptian captives and Cushite exiles, young and old, with buttocks bared—to Egypt’s shame. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who trusted in Cush and boasted in Egypt will be dismayed and put to shame. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In that day the people who live on this coast will say, ‘See what has happened to those we relied on, those we fled to for help and deliverance from the king of Assyria! How then can we escape?’ ”
