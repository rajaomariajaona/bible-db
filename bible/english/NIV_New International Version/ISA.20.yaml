document_id: ISA.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Egypt and Cush
  - type: text
    content: 'In the year that the supreme commander, sent by Sargon king of Assyria, came to Ashdod and attacked and captured it— '
  '2':
  - type: text
    content: 'at that time the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke through Isaiah son of Amoz. He said to him, “Take off the sackcloth from your body and the sandals from your feet.” And he did so, going around stripped and barefoot.'
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Just as my servant Isaiah has gone stripped and barefoot for three years, as a sign and portent against Egypt and Cush,'
  - type: note
    content: That is, the upper Nile region; also in verse 5
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'so the king of Assyria will lead away stripped and barefoot the Egyptian captives and Cushite exiles, young and old, with buttocks bared—to Egypt’s shame. '
  '5':
  - type: text
    content: 'Those who trusted in Cush and boasted in Egypt will be dismayed and put to shame. '
  '6':
  - type: text
    content: In that day the people who live on this coast will say, ‘See what has happened to those we relied on, those we fled to for help and deliverance from the king of Assyria! How then can we escape?’ ”
