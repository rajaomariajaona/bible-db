document_id: AMO.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel to Be Destroyed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw the Lord standing by the altar, and he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Strike the tops of the pillars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that the thresholds shake.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring them down on the heads of all the people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who are left I will kill with the sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not one will get away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: none will escape.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the sinners among my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will die by the sword,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all those who say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Disaster will not overtake or meet us.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Restoration
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “In that day
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will restore David’s fallen shelter—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will repair its broken walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and restore its ruins—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will rebuild it as it used to be,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that they may possess the remnant of Edom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the nations that bear my name,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: so that the remnant of people / and all the nations that bear my name may seek me
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who will do these things.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The days are coming,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “when the reaper will be overtaken by the plowman
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the planter by the one treading grapes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: New wine will drip from the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and flow from all the hills,
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will bring my people Israel back from exile.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will restore the fortunes of my people Israel
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “They will rebuild the ruined cities and live in them.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will plant vineyards and drink their wine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will make gardens and eat their fruit.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will plant Israel in their own land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never again to be uprooted
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the land I have given them,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they dig down to the depths below,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from there my hand will take them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they climb up to the heavens above,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from there I will bring them down.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they hide themselves on the top of Carmel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there I will hunt them down and seize them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they hide from my eyes at the bottom of the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there I will command the serpent to bite them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they are driven into exile by their enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there I will command the sword to slay them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will keep my eye on them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for harm and not for good.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he touches the earth and it melts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all who live in it mourn;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the whole land rises like the Nile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then sinks like the river of Egypt;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he builds his lofty palace
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' in the heavens'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sets its foundation
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' on the earth;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he calls for the waters of the sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pours them out over the face of the land—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is his name.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Are not you Israelites
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the same to me as the Cushites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, people from the upper Nile region
      marker-yv: yv-n
    - type: text
      text: ?”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Did I not bring Israel up from Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Philistines from Caphtor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Crete
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the Arameans from Kir?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Surely the eyes of the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are on the sinful kingdom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the face of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I will not totally destroy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the descendants of Jacob,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For I will give the command,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will shake the people of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among all the nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as grain is shaken in a sieve,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not a pebble will reach the ground.
