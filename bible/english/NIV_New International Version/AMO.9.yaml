type_code: eng
verses:
  '1':
  - type: heading
    content: Israel to Be Destroyed
  - type: text
    content: 'I saw the Lord standing by the altar, and he said:'
  - type: text
    content: “Strike the tops of the pillars
  - type: text
    content: so that the thresholds shake.
  - type: text
    content: Bring them down on the heads of all the people;
  - type: text
    content: those who are left I will kill with the sword.
  - type: text
    content: Not one will get away,
  - type: text
    content: none will escape.
  '10':
  - type: text
    content: All the sinners among my people
  - type: text
    content: will die by the sword,
  - type: text
    content: all those who say,
  - type: text
    content: ‘Disaster will not overtake or meet us.’
  - type: heading
    content: Israel’s Restoration
  '11':
  - type: text
    content: “In that day
  - type: text
    content: “I will restore David’s fallen shelter—
  - type: text
    content: I will repair its broken walls
  - type: text
    content: and restore its ruins—
  - type: text
    content: and will rebuild it as it used to be,
  '12':
  - type: text
    content: so that they may possess the remnant of Edom
  - type: text
    content: and all the nations that bear my name,
  - type: note
    content: Hebrew; Septuagint so that the remnant of people / and all the nations that bear my name may seek me
  - type: text
    content: ”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ', who will do these things.'
  '13':
  - type: text
    content: '“The days are coming,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when the reaper will be overtaken by the plowman
  - type: text
    content: and the planter by the one treading grapes.
  - type: text
    content: New wine will drip from the mountains
  - type: text
    content: and flow from all the hills,
  '14':
  - type: text
    content: and I will bring my people Israel back from exile.
  - type: note
    content: Or will restore the fortunes of my people Israel
  - type: text
    content: “They will rebuild the ruined cities and live in them.
  - type: text
    content: They will plant vineyards and drink their wine;
  - type: text
    content: they will make gardens and eat their fruit.
  '15':
  - type: text
    content: I will plant Israel in their own land,
  - type: text
    content: never again to be uprooted
  - type: text
    content: from the land I have given them,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  '2':
  - type: text
    content: Though they dig down to the depths below,
  - type: text
    content: from there my hand will take them.
  - type: text
    content: Though they climb up to the heavens above,
  - type: text
    content: from there I will bring them down.
  '3':
  - type: text
    content: Though they hide themselves on the top of Carmel,
  - type: text
    content: there I will hunt them down and seize them.
  - type: text
    content: Though they hide from my eyes at the bottom of the sea,
  - type: text
    content: there I will command the serpent to bite them.
  '4':
  - type: text
    content: Though they are driven into exile by their enemies,
  - type: text
    content: there I will command the sword to slay them.
  - type: text
    content: “I will keep my eye on them
  - type: text
    content: for harm and not for good.”
  '5':
  - type: text
    content: 'The Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty—'
  - type: text
    content: he touches the earth and it melts,
  - type: text
    content: and all who live in it mourn;
  - type: text
    content: the whole land rises like the Nile,
  - type: text
    content: then sinks like the river of Egypt;
  '6':
  - type: text
    content: he builds his lofty palace
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' in the heavens'
  - type: text
    content: and sets its foundation
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' on the earth;'
  - type: text
    content: he calls for the waters of the sea
  - type: text
    content: and pours them out over the face of the land—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is his name.'
  '7':
  - type: text
    content: “Are not you Israelites
  - type: text
    content: the same to me as the Cushites
  - type: note
    content: That is, people from the upper Nile region
  - type: text
    content: ?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Did I not bring Israel up from Egypt,
  - type: text
    content: the Philistines from Caphtor
  - type: note
    content: That is, Crete
  - type: text
    content: and the Arameans from Kir?
  '8':
  - type: text
    content: '“Surely the eyes of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: are on the sinful kingdom.
  - type: text
    content: I will destroy it
  - type: text
    content: from the face of the earth.
  - type: text
    content: Yet I will not totally destroy
  - type: text
    content: the descendants of Jacob,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: “For I will give the command,
  - type: text
    content: and I will shake the people of Israel
  - type: text
    content: among all the nations
  - type: text
    content: as grain is shaken in a sieve,
  - type: text
    content: and not a pebble will reach the ground.
