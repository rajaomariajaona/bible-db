document_id: PSA.120,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 120
  - type: text
    content: A song of ascents.
  - type: text
    content: 'I call on the '
  - type: text
    content: Lord
  - type: text
    content: ' in my distress,'
  - type: text
    content: and he answers me.
  '2':
  - type: text
    content: 'Save me, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: from lying lips
  - type: text
    content: and from deceitful tongues.
  '3':
  - type: text
    content: What will he do to you,
  - type: text
    content: and what more besides,
  - type: text
    content: you deceitful tongue?
  '4':
  - type: text
    content: He will punish you with a warrior’s sharp arrows,
  - type: text
    content: with burning coals of the broom bush.
  '5':
  - type: text
    content: Woe to me that I dwell in Meshek,
  - type: text
    content: that I live among the tents of Kedar!
  '6':
  - type: text
    content: Too long have I lived
  - type: text
    content: among those who hate peace.
  '7':
  - type: text
    content: I am for peace;
  - type: text
    content: but when I speak, they are for war.
