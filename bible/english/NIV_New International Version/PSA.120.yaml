  children:
  - type: text
    text: A song of ascents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I call on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in my distress,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he answers me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Save me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: from lying lips
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from deceitful tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: What will he do to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and what more besides,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you deceitful tongue?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He will punish you with a warrior’s sharp arrows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with burning coals of the broom bush.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Woe to me that I dwell in Meshek,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I live among the tents of Kedar!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Too long have I lived
- type: usfm
  marker: q2
  children:
  - type: text
    text: among those who hate peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I am for peace;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but when I speak, they are for war.
