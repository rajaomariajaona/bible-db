          text: has testified against
      marker-yv: yv-n
    - type: text
      text: ' me; the Almighty has brought misfortune upon me.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Naomi returned from Moab accompanied by Ruth the Moabite, her daughter-in-law, arriving in Bethlehem as the barley harvest was beginning.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Elimelek, Naomi’s husband, died, and she was left with her two sons. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They married Moabite women, one named Orpah and the other Ruth. After they had lived there about ten years, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: both Mahlon and Kilion also died, and Naomi was left without her two sons and her husband.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naomi and Ruth Return to Bethlehem
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Naomi heard in Moab that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had come to the aid of his people by providing food for them, she and her daughters-in-law prepared to return home from there. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: With her two daughters-in-law she left the place where she had been living and set out on the road that would take them back to the land of Judah.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Naomi said to her two daughters-in-law, “Go back, each of you, to your mother’s home. May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' show you kindness, as you have shown kindness to your dead husbands and to me. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' grant that each of you will find rest in the home of another husband.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she kissed them goodbye and they wept aloud '
