      text: ' has made my life very bitter. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I went away full, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has brought me back empty. Why call me Naomi? The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has afflicted'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
