document_id: RUT.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Naomi Loses Her Husband and Sons
  - type: text
    content: In the days when the judges ruled,
  - type: note
    content: Traditionally judged
  - type: text
    content: ' there was a famine in the land. So a man from Bethlehem in Judah, together with his wife and two sons, went to live for a while in the country of Moab. '
  '10':
  - type: text
    content: and said to her, “We will go back with you to your people.”
  '11':
  - type: text
    content: 'But Naomi said, “Return home, my daughters. Why would you come with me? Am I going to have any more sons, who could become your husbands? '
  '12':
  - type: text
    content: 'Return home, my daughters; I am too old to have another husband. Even if I thought there was still hope for me—even if I had a husband tonight and then gave birth to sons— '
  '13':
  - type: text
    content: 'would you wait until they grew up? Would you remain unmarried for them? No, my daughters. It is more bitter for me than for you, because the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand has turned against me!”
  '14':
  - type: text
    content: At this they wept aloud again. Then Orpah kissed her mother-in-law goodbye, but Ruth clung to her.
  '15':
  - type: text
    content: “Look,” said Naomi, “your sister-in-law is going back to her people and her gods. Go back with her.”
  '16':
  - type: text
    content: 'But Ruth replied, “Don’t urge me to leave you or to turn back from you. Where you go I will go, and where you stay I will stay. Your people will be my people and your God my God. '
  '17':
  - type: text
    content: 'Where you die I will die, and there I will be buried. May the '
  - type: text
    content: Lord
  - type: text
    content: ' deal with me, be it ever so severely, if even death separates you and me.” '
  '18':
  - type: text
    content: When Naomi realized that Ruth was determined to go with her, she stopped urging her.
  '19':
  - type: text
    content: So the two women went on until they came to Bethlehem. When they arrived in Bethlehem, the whole town was stirred because of them, and the women exclaimed, “Can this be Naomi?”
  '2':
  - type: text
    content: The man’s name was Elimelek, his wife’s name was Naomi, and the names of his two sons were Mahlon and Kilion. They were Ephrathites from Bethlehem, Judah. And they went to Moab and lived there.
  '20':
  - type: text
    content: “Don’t call me Naomi,
  - type: note
    content: Naomi means pleasant.
  - type: text
    content: ” she told them. “Call me Mara,
  - type: note
    content: Mara means bitter.
  - type: text
    content: ' because the Almighty'
  - type: note
    content: Hebrew Shaddai; also in verse 21
  - type: text
    content: ' has made my life very bitter. '
  '21':
  - type: text
    content: 'I went away full, but the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought me back empty. Why call me Naomi? The '
  - type: text
    content: Lord
  - type: text
    content: ' has afflicted'
  - type: note
    content: Or has testified against
  - type: text
    content: ' me; the Almighty has brought misfortune upon me.”'
  '22':
  - type: text
    content: So Naomi returned from Moab accompanied by Ruth the Moabite, her daughter-in-law, arriving in Bethlehem as the barley harvest was beginning.
  '3':
  - type: text
    content: 'Now Elimelek, Naomi’s husband, died, and she was left with her two sons. '
  '4':
  - type: text
    content: 'They married Moabite women, one named Orpah and the other Ruth. After they had lived there about ten years, '
  '5':
  - type: text
    content: both Mahlon and Kilion also died, and Naomi was left without her two sons and her husband.
  - type: heading
    content: Naomi and Ruth Return to Bethlehem
  '6':
  - type: text
    content: 'When Naomi heard in Moab that the '
  - type: text
    content: Lord
  - type: text
    content: ' had come to the aid of his people by providing food for them, she and her daughters-in-law prepared to return home from there. '
  '7':
  - type: text
    content: With her two daughters-in-law she left the place where she had been living and set out on the road that would take them back to the land of Judah.
  '8':
  - type: text
    content: 'Then Naomi said to her two daughters-in-law, “Go back, each of you, to your mother’s home. May the '
  - type: text
    content: Lord
  - type: text
    content: ' show you kindness, as you have shown kindness to your dead husbands and to me. '
  '9':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' grant that each of you will find rest in the home of another husband.”'
  - type: text
    content: 'Then she kissed them goodbye and they wept aloud '
