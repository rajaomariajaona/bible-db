        - type: text
          text: judged
      marker-yv: yv-n
    - type: text
      text: ' there was a famine in the land. So a man from Bethlehem in Judah, together with his wife and two sons, went to live for a while in the country of Moab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and said to her, “We will go back with you to your people.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Naomi said, “Return home, my daughters. Why would you come with me? Am I going to have any more sons, who could become your husbands? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Return home, my daughters; I am too old to have another husband. Even if I thought there was still hope for me—even if I had a husband tonight and then gave birth to sons— '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'would you wait until they grew up? Would you remain unmarried for them? No, my daughters. It is more bitter for me than for you, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s hand has turned against me!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At this they wept aloud again. Then Orpah kissed her mother-in-law goodbye, but Ruth clung to her.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Look,” said Naomi, “your sister-in-law is going back to her people and her gods. Go back with her.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Ruth replied, “Don’t urge me to leave you or to turn back from you. Where you go I will go, and where you stay I will stay. Your people will be my people and your God my God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Where you die I will die, and there I will be buried. May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' deal with me, be it ever so severely, if even death separates you and me.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Naomi realized that Ruth was determined to go with her, she stopped urging her.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the two women went on until they came to Bethlehem. When they arrived in Bethlehem, the whole town was stirred because of them, and the women exclaimed, “Can this be Naomi?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The man’s name was Elimelek, his wife’s name was Naomi, and the names of his two sons were Mahlon and Kilion. They were Ephrathites from Bethlehem, Judah. And they went to Moab and lived there.
