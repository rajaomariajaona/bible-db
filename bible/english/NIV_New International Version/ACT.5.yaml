document_id: ACT.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ananias and Sapphira
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now a man named Ananias, together with his wife Sapphira, also sold a piece of property. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that moment she fell down at his feet and died. Then the young men came in and, finding her dead, carried her out and buried her beside her husband. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Great fear seized the whole church and all who heard about these events.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Apostles Heal Many
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The apostles performed many signs and wonders among the people. And all the believers used to meet together in Solomon’s Colonnade. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No one else dared join them, even though they were highly regarded by the people. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless, more and more men and women believed in the Lord and were added to their number. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As a result, people brought the sick into the streets and laid them on beds and mats so that at least Peter’s shadow might fall on some of them as he passed by. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Crowds gathered also from the towns around Jerusalem, bringing their sick and those tormented by impure spirits, and all of them were healed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Apostles Persecuted
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the high priest and all his associates, who were members of the party of the Sadducees, were filled with jealousy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They arrested the apostles and put them in the public jail. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But during the night an angel of the Lord opened the doors of the jail and brought them out. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: With his wife’s full knowledge he kept back part of the money for himself, but brought the rest and put it at the apostles’ feet.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go, stand in the temple courts,” he said, “and tell the people all about this new life.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At daybreak they entered the temple courts, as they had been told, and began to teach the people.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the high priest and his associates arrived, they called together the Sanhedrin—the full assembly of the elders of Israel—and sent to the jail for the apostles. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But on arriving at the jail, the officers did not find them there. So they went back and reported, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“We found the jail securely locked, with the guards standing at the doors; but when we opened them, we found no one inside.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On hearing this report, the captain of the temple guard and the chief priests were at a loss, wondering what this might lead to.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then someone came and said, “Look! The men you put in jail are standing in the temple courts teaching the people.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At that, the captain went with his officers and brought the apostles. They did not use force, because they feared that the people would stone them.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The apostles were brought in and made to appear before the Sanhedrin to be questioned by the high priest. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We gave you strict orders not to teach in this name,” he said. “Yet you have filled Jerusalem with your teaching and are determined to make us guilty of this man’s blood.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter and the other apostles replied: “We must obey God rather than human beings! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter said, “Ananias, how is it that Satan has so filled your heart that you have lied to the Holy Spirit and have kept for yourself some of the money you received for the land? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The God of our ancestors raised Jesus from the dead—whom you killed by hanging him on a cross. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God exalted him to his own right hand as Prince and Savior that he might bring Israel to repentance and forgive their sins. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We are witnesses of these things, and so is the Holy Spirit, whom God has given to those who obey him.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they heard this, they were furious and wanted to put them to death. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But a Pharisee named Gamaliel, a teacher of the law, who was honored by all the people, stood up in the Sanhedrin and ordered that the men be put outside for a little while. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he addressed the Sanhedrin: “Men of Israel, consider carefully what you intend to do to these men. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some time ago Theudas appeared, claiming to be somebody, and about four hundred men rallied to him. He was killed, all his followers were dispersed, and it all came to nothing. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After him, Judas the Galilean appeared in the days of the census and led a band of people in revolt. He too was killed, and all his followers were scattered. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, in the present case I advise you: Leave these men alone! Let them go! For if their purpose or activity is of human origin, it will fail. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if it is from God, you will not be able to stop these men; you will only find yourselves fighting against God.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Didn’t it belong to you before it was sold? And after it was sold, wasn’t the money at your disposal? What made you think of doing such a thing? You have not lied just to human beings but to God.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His speech persuaded them. They called the apostles in and had them flogged. Then they ordered them not to speak in the name of Jesus, and let them go.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The apostles left the Sanhedrin, rejoicing because they had been counted worthy of suffering disgrace for the Name. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Day after day, in the temple courts and from house to house, they never stopped teaching and proclaiming the good news that Jesus is the Messiah.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Ananias heard this, he fell down and died. And great fear seized all who heard what had happened. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then some young men came forward, wrapped up his body, and carried him out and buried him.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'About three hours later his wife came in, not knowing what had happened. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter asked her, “Tell me, is this the price you and Ananias got for the land?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes,” she said, “that is the price.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter said to her, “How could you conspire to test the Spirit of the Lord? Listen! The feet of the men who buried your husband are at the door, and they will carry you out also.”
