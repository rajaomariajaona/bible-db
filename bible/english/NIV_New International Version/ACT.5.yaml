document_id: ACT.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Ananias and Sapphira
  - type: text
    content: 'Now a man named Ananias, together with his wife Sapphira, also sold a piece of property. '
  '10':
  - type: text
    content: 'At that moment she fell down at his feet and died. Then the young men came in and, finding her dead, carried her out and buried her beside her husband. '
  '11':
  - type: text
    content: Great fear seized the whole church and all who heard about these events.
  - type: heading
    content: The Apostles Heal Many
  '12':
  - type: text
    content: 'The apostles performed many signs and wonders among the people. And all the believers used to meet together in Solomon’s Colonnade. '
  '13':
  - type: text
    content: 'No one else dared join them, even though they were highly regarded by the people. '
  '14':
  - type: text
    content: 'Nevertheless, more and more men and women believed in the Lord and were added to their number. '
  '15':
  - type: text
    content: 'As a result, people brought the sick into the streets and laid them on beds and mats so that at least Peter’s shadow might fall on some of them as he passed by. '
  '16':
  - type: text
    content: Crowds gathered also from the towns around Jerusalem, bringing their sick and those tormented by impure spirits, and all of them were healed.
  - type: heading
    content: The Apostles Persecuted
  '17':
  - type: text
    content: 'Then the high priest and all his associates, who were members of the party of the Sadducees, were filled with jealousy. '
  '18':
  - type: text
    content: 'They arrested the apostles and put them in the public jail. '
  '19':
  - type: text
    content: 'But during the night an angel of the Lord opened the doors of the jail and brought them out. '
  '2':
  - type: text
    content: With his wife’s full knowledge he kept back part of the money for himself, but brought the rest and put it at the apostles’ feet.
  '20':
  - type: text
    content: “Go, stand in the temple courts,” he said, “and tell the people all about this new life.”
  '21':
  - type: text
    content: At daybreak they entered the temple courts, as they had been told, and began to teach the people.
  - type: text
    content: 'When the high priest and his associates arrived, they called together the Sanhedrin—the full assembly of the elders of Israel—and sent to the jail for the apostles. '
  '22':
  - type: text
    content: 'But on arriving at the jail, the officers did not find them there. So they went back and reported, '
  '23':
  - type: text
    content: '“We found the jail securely locked, with the guards standing at the doors; but when we opened them, we found no one inside.” '
  '24':
  - type: text
    content: On hearing this report, the captain of the temple guard and the chief priests were at a loss, wondering what this might lead to.
  '25':
  - type: text
    content: 'Then someone came and said, “Look! The men you put in jail are standing in the temple courts teaching the people.” '
  '26':
  - type: text
    content: At that, the captain went with his officers and brought the apostles. They did not use force, because they feared that the people would stone them.
  '27':
  - type: text
    content: 'The apostles were brought in and made to appear before the Sanhedrin to be questioned by the high priest. '
  '28':
  - type: text
    content: “We gave you strict orders not to teach in this name,” he said. “Yet you have filled Jerusalem with your teaching and are determined to make us guilty of this man’s blood.”
  '29':
  - type: text
    content: 'Peter and the other apostles replied: “We must obey God rather than human beings! '
  '3':
  - type: text
    content: 'Then Peter said, “Ananias, how is it that Satan has so filled your heart that you have lied to the Holy Spirit and have kept for yourself some of the money you received for the land? '
  '30':
  - type: text
    content: 'The God of our ancestors raised Jesus from the dead—whom you killed by hanging him on a cross. '
  '31':
  - type: text
    content: 'God exalted him to his own right hand as Prince and Savior that he might bring Israel to repentance and forgive their sins. '
  '32':
  - type: text
    content: We are witnesses of these things, and so is the Holy Spirit, whom God has given to those who obey him.”
  '33':
  - type: text
    content: 'When they heard this, they were furious and wanted to put them to death. '
  '34':
  - type: text
    content: 'But a Pharisee named Gamaliel, a teacher of the law, who was honored by all the people, stood up in the Sanhedrin and ordered that the men be put outside for a little while. '
  '35':
  - type: text
    content: 'Then he addressed the Sanhedrin: “Men of Israel, consider carefully what you intend to do to these men. '
  '36':
  - type: text
    content: 'Some time ago Theudas appeared, claiming to be somebody, and about four hundred men rallied to him. He was killed, all his followers were dispersed, and it all came to nothing. '
  '37':
  - type: text
    content: 'After him, Judas the Galilean appeared in the days of the census and led a band of people in revolt. He too was killed, and all his followers were scattered. '
  '38':
  - type: text
    content: 'Therefore, in the present case I advise you: Leave these men alone! Let them go! For if their purpose or activity is of human origin, it will fail. '
  '39':
  - type: text
    content: But if it is from God, you will not be able to stop these men; you will only find yourselves fighting against God.”
  '4':
  - type: text
    content: Didn’t it belong to you before it was sold? And after it was sold, wasn’t the money at your disposal? What made you think of doing such a thing? You have not lied just to human beings but to God.”
  '40':
  - type: text
    content: His speech persuaded them. They called the apostles in and had them flogged. Then they ordered them not to speak in the name of Jesus, and let them go.
  '41':
  - type: text
    content: 'The apostles left the Sanhedrin, rejoicing because they had been counted worthy of suffering disgrace for the Name. '
  '42':
  - type: text
    content: Day after day, in the temple courts and from house to house, they never stopped teaching and proclaiming the good news that Jesus is the Messiah.
  '5':
  - type: text
    content: 'When Ananias heard this, he fell down and died. And great fear seized all who heard what had happened. '
  '6':
  - type: text
    content: Then some young men came forward, wrapped up his body, and carried him out and buried him.
  '7':
  - type: text
    content: 'About three hours later his wife came in, not knowing what had happened. '
  '8':
  - type: text
    content: Peter asked her, “Tell me, is this the price you and Ananias got for the land?”
  - type: text
    content: “Yes,” she said, “that is the price.”
  '9':
  - type: text
    content: Peter said to her, “How could you conspire to test the Spirit of the Lord? Listen! The feet of the men who buried your husband are at the door, and they will carry you out also.”
