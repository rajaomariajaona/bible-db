document_id: ISA.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy About Jerusalem
  - type: text
    content: 'A prophecy against the Valley of Vision:'
  - type: text
    content: What troubles you now,
  - type: text
    content: that you have all gone up on the roofs,
  '10':
  - type: text
    content: You counted the buildings in Jerusalem
  - type: text
    content: and tore down houses to strengthen the wall.
  '11':
  - type: text
    content: You built a reservoir between the two walls
  - type: text
    content: for the water of the Old Pool,
  - type: text
    content: but you did not look to the One who made it,
  - type: text
    content: or have regard for the One who planned it long ago.
  '12':
  - type: text
    content: 'The Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: called you on that day
  - type: text
    content: to weep and to wail,
  - type: text
    content: to tear out your hair and put on sackcloth.
  '13':
  - type: text
    content: But see, there is joy and revelry,
  - type: text
    content: slaughtering of cattle and killing of sheep,
  - type: text
    content: eating of meat and drinking of wine!
  - type: text
    content: “Let us eat and drink,” you say,
  - type: text
    content: “for tomorrow we die!”
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has revealed this in my hearing: “Till your dying day this sin will not be atoned for,” says the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '15':
  - type: text
    content: 'This is what the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, says:'
  - type: text
    content: “Go, say to this steward,
  - type: text
    content: 'to Shebna the palace administrator:'
  '16':
  - type: text
    content: What are you doing here and who gave you permission
  - type: text
    content: to cut out a grave for yourself here,
  - type: text
    content: hewing your grave on the height
  - type: text
    content: and chiseling your resting place in the rock?
  '17':
  - type: text
    content: '“Beware, the '
  - type: text
    content: Lord
  - type: text
    content: ' is about to take firm hold of you'
  - type: text
    content: and hurl you away, you mighty man.
  '18':
  - type: text
    content: He will roll you up tightly like a ball
  - type: text
    content: and throw you into a large country.
  - type: text
    content: There you will die
  - type: text
    content: and there the chariots you were so proud of
  - type: text
    content: will become a disgrace to your master’s house.
  '19':
  - type: text
    content: I will depose you from your office,
  - type: text
    content: and you will be ousted from your position.
  '2':
  - type: text
    content: you town so full of commotion,
  - type: text
    content: you city of tumult and revelry?
  - type: text
    content: Your slain were not killed by the sword,
  - type: text
    content: nor did they die in battle.
  '20':
  - type: text
    content: '“In that day I will summon my servant, Eliakim son of Hilkiah. '
  '21':
  - type: text
    content: 'I will clothe him with your robe and fasten your sash around him and hand your authority over to him. He will be a father to those who live in Jerusalem and to the people of Judah. '
  '22':
  - type: text
    content: 'I will place on his shoulder the key to the house of David; what he opens no one can shut, and what he shuts no one can open. '
  '23':
  - type: text
    content: I will drive him like a peg into a firm place; he will become a seat
  - type: note
    content: Or throne
  - type: text
    content: ' of honor for the house of his father. '
  '24':
  - type: text
    content: 'All the glory of his family will hang on him: its offspring and offshoots—all its lesser vessels, from the bowls to all the jars.'
  '25':
  - type: text
    content: '“In that day,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, “the peg driven into the firm place will give way; it will be sheared off and will fall, and the load hanging on it will be cut down.” The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '3':
  - type: text
    content: All your leaders have fled together;
  - type: text
    content: they have been captured without using the bow.
  - type: text
    content: All you who were caught were taken prisoner together,
  - type: text
    content: having fled while the enemy was still far away.
  '4':
  - type: text
    content: Therefore I said, “Turn away from me;
  - type: text
    content: let me weep bitterly.
  - type: text
    content: Do not try to console me
  - type: text
    content: over the destruction of my people.”
  '5':
  - type: text
    content: 'The Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, has a day'
  - type: text
    content: of tumult and trampling and terror
  - type: text
    content: in the Valley of Vision,
  - type: text
    content: a day of battering down walls
  - type: text
    content: and of crying out to the mountains.
  '6':
  - type: text
    content: Elam takes up the quiver,
  - type: text
    content: with her charioteers and horses;
  - type: text
    content: Kir uncovers the shield.
  '7':
  - type: text
    content: Your choicest valleys are full of chariots,
  - type: text
    content: and horsemen are posted at the city gates.
  '8':
  - type: text
    content: The Lord stripped away the defenses of Judah,
  - type: text
    content: and you looked in that day
  - type: text
    content: to the weapons in the Palace of the Forest.
  '9':
  - type: text
    content: You saw that the walls of the City of David
  - type: text
    content: were broken through in many places;
  - type: text
    content: you stored up water
  - type: text
    content: in the Lower Pool.
