document_id: ISA.22,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy About Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A prophecy against the Valley of Vision:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What troubles you now,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you have all gone up on the roofs,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You counted the buildings in Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tore down houses to strengthen the wall.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: You built a reservoir between the two walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the water of the Old Pool,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you did not look to the One who made it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or have regard for the One who planned it long ago.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: called you on that day
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to weep and to wail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to tear out your hair and put on sackcloth.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But see, there is joy and revelry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slaughtering of cattle and killing of sheep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: eating of meat and drinking of wine!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let us eat and drink,” you say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “for tomorrow we die!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty has revealed this in my hearing: “Till your dying day this sin will not be atoned for,” says the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'This is what the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go, say to this steward,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to Shebna the palace administrator:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: What are you doing here and who gave you permission
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to cut out a grave for yourself here,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hewing your grave on the height
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and chiseling your resting place in the rock?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Beware, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is about to take firm hold of you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hurl you away, you mighty man.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He will roll you up tightly like a ball
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and throw you into a large country.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There you will die
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there the chariots you were so proud of
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will become a disgrace to your master’s house.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: I will depose you from your office,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will be ousted from your position.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: you town so full of commotion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you city of tumult and revelry?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your slain were not killed by the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor did they die in battle.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“In that day I will summon my servant, Eliakim son of Hilkiah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I will clothe him with your robe and fasten your sash around him and hand your authority over to him. He will be a father to those who live in Jerusalem and to the people of Judah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'I will place on his shoulder the key to the house of David; what he opens no one can shut, and what he shuts no one can open. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I will drive him like a peg into a firm place; he will become a seat
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: throne
      marker-yv: yv-n
    - type: text
      text: ' of honor for the house of his father. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'All the glory of his family will hang on him: its offspring and offshoots—all its lesser vessels, from the bowls to all the jars.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“In that day,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, “the peg driven into the firm place will give way; it will be sheared off and will fall, and the load hanging on it will be cut down.” The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: All your leaders have fled together;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have been captured without using the bow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All you who were caught were taken prisoner together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: having fled while the enemy was still far away.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Therefore I said, “Turn away from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me weep bitterly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not try to console me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: over the destruction of my people.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, has a day'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of tumult and trampling and terror
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the Valley of Vision,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a day of battering down walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and of crying out to the mountains.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Elam takes up the quiver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with her charioteers and horses;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Kir uncovers the shield.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Your choicest valleys are full of chariots,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and horsemen are posted at the city gates.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The Lord stripped away the defenses of Judah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you looked in that day
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the weapons in the Palace of the Forest.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You saw that the walls of the City of David
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were broken through in many places;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you stored up water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the Lower Pool.
