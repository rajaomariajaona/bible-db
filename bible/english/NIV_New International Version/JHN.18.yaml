document_id: JHN.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Arrested
  - type: text
    content: When he had finished praying, Jesus left with his disciples and crossed the Kidron Valley. On the other side there was a garden, and he and his disciples went into it.
  '10':
  - type: text
    content: Then Simon Peter, who had a sword, drew it and struck the high priest’s servant, cutting off his right ear. (The servant’s name was Malchus.)
  '11':
  - type: text
    content: 'Jesus commanded Peter, '
  - type: text
    content: “Put your sword away! Shall I not drink the cup the Father has given me?”
  '12':
  - type: text
    content: 'Then the detachment of soldiers with its commander and the Jewish officials arrested Jesus. They bound him '
  '13':
  - type: text
    content: 'and brought him first to Annas, who was the father-in-law of Caiaphas, the high priest that year. '
  '14':
  - type: text
    content: Caiaphas was the one who had advised the Jewish leaders that it would be good if one man died for the people.
  - type: heading
    content: Peter’s First Denial
  '15':
  - type: text
    content: 'Simon Peter and another disciple were following Jesus. Because this disciple was known to the high priest, he went with Jesus into the high priest’s courtyard, '
  '16':
  - type: text
    content: but Peter had to wait outside at the door. The other disciple, who was known to the high priest, came back, spoke to the servant girl on duty there and brought Peter in.
  '17':
  - type: text
    content: “You aren’t one of this man’s disciples too, are you?” she asked Peter.
  - type: text
    content: He replied, “I am not.”
  '18':
  - type: text
    content: It was cold, and the servants and officials stood around a fire they had made to keep warm. Peter also was standing with them, warming himself.
  - type: heading
    content: The High Priest Questions Jesus
  '19':
  - type: text
    content: Meanwhile, the high priest questioned Jesus about his disciples and his teaching.
  '2':
  - type: text
    content: 'Now Judas, who betrayed him, knew the place, because Jesus had often met there with his disciples. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “I have spoken openly to the world,”
  - type: text
    content: ' Jesus replied. '
  - type: text
    content: “I always taught in synagogues or at the temple, where all the Jews come together. I said nothing in secret.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Why question me? Ask those who heard me. Surely they know what I said.”
  '22':
  - type: text
    content: When Jesus said this, one of the officials nearby slapped him in the face. “Is this the way you answer the high priest?” he demanded.
  '23':
  - type: text
    content: ' '
  - type: text
    content: “If I said something wrong,”
  - type: text
    content: ' Jesus replied, '
  - type: text
    content: “testify as to what is wrong. But if I spoke the truth, why did you strike me?”
  - type: text
    content: ' '
  '24':
  - type: text
    content: Then Annas sent him bound to Caiaphas the high priest.
  - type: heading
    content: Peter’s Second and Third Denials
  '25':
  - type: text
    content: Meanwhile, Simon Peter was still standing there warming himself. So they asked him, “You aren’t one of his disciples too, are you?”
  - type: text
    content: He denied it, saying, “I am not.”
  '26':
  - type: text
    content: 'One of the high priest’s servants, a relative of the man whose ear Peter had cut off, challenged him, “Didn’t I see you with him in the garden?” '
  '27':
  - type: text
    content: Again Peter denied it, and at that moment a rooster began to crow.
  - type: heading
    content: Jesus Before Pilate
  '28':
  - type: text
    content: 'Then the Jewish leaders took Jesus from Caiaphas to the palace of the Roman governor. By now it was early morning, and to avoid ceremonial uncleanness they did not enter the palace, because they wanted to be able to eat the Passover. '
  '29':
  - type: text
    content: So Pilate came out to them and asked, “What charges are you bringing against this man?”
  '3':
  - type: text
    content: So Judas came to the garden, guiding a detachment of soldiers and some officials from the chief priests and the Pharisees. They were carrying torches, lanterns and weapons.
  '30':
  - type: text
    content: “If he were not a criminal,” they replied, “we would not have handed him over to you.”
  '31':
  - type: text
    content: Pilate said, “Take him yourselves and judge him by your own law.”
  - type: text
    content: '“But we have no right to execute anyone,” they objected. '
  '32':
  - type: text
    content: This took place to fulfill what Jesus had said about the kind of death he was going to die.
  '33':
  - type: text
    content: Pilate then went back inside the palace, summoned Jesus and asked him, “Are you the king of the Jews?”
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Is that your own idea,”
  - type: text
    content: ' Jesus asked, '
  - type: text
    content: “or did others talk to you about me?”
  '35':
  - type: text
    content: “Am I a Jew?” Pilate replied. “Your own people and chief priests handed you over to me. What is it you have done?”
  '36':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “My kingdom is not of this world. If it were, my servants would fight to prevent my arrest by the Jewish leaders. But now my kingdom is from another place.”
  '37':
  - type: text
    content: “You are a king, then!” said Pilate.
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “You say that I am a king. In fact, the reason I was born and came into the world is to testify to the truth. Everyone on the side of truth listens to me.”
  '38':
  - type: text
    content: '“What is truth?” retorted Pilate. With this he went out again to the Jews gathered there and said, “I find no basis for a charge against him. '
  '39':
  - type: text
    content: But it is your custom for me to release to you one prisoner at the time of the Passover. Do you want me to release ‘the king of the Jews’?”
  '4':
  - type: text
    content: 'Jesus, knowing all that was going to happen to him, went out and asked them, '
  - type: text
    content: “Who is it you want?”
  '40':
  - type: text
    content: They shouted back, “No, not him! Give us Barabbas!” Now Barabbas had taken part in an uprising.
  '5':
  - type: text
    content: “Jesus of Nazareth,” they replied.
  - type: text
    content: “I am he,”
  - type: text
    content: ' Jesus said. (And Judas the traitor was standing there with them.) '
  '6':
  - type: text
    content: 'When Jesus said, '
  - type: text
    content: “I am he,”
  - type: text
    content: ' they drew back and fell to the ground.'
  '7':
  - type: text
    content: 'Again he asked them, '
  - type: text
    content: “Who is it you want?”
  - type: text
    content: “Jesus of Nazareth,” they said.
  '8':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “I told you that I am he. If you are looking for me, then let these men go.”
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'This happened so that the words he had spoken would be fulfilled: '
  - type: text
    content: “I have not lost one of those you gave me.”
  - type: note
    content: John 6:39
