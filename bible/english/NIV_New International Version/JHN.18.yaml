document_id: JHN.18,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Arrested
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he had finished praying, Jesus left with his disciples and crossed the Kidron Valley. On the other side there was a garden, and he and his disciples went into it.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Simon Peter, who had a sword, drew it and struck the high priest’s servant, cutting off his right ear. (The servant’s name was Malchus.)
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus commanded Peter, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Put your sword away! Shall I not drink the cup the Father has given me?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the detachment of soldiers with its commander and the Jewish officials arrested Jesus. They bound him '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and brought him first to Annas, who was the father-in-law of Caiaphas, the high priest that year. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Caiaphas was the one who had advised the Jewish leaders that it would be good if one man died for the people.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter’s First Denial
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Peter and another disciple were following Jesus. Because this disciple was known to the high priest, he went with Jesus into the high priest’s courtyard, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but Peter had to wait outside at the door. The other disciple, who was known to the high priest, came back, spoke to the servant girl on duty there and brought Peter in.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You aren’t one of this man’s disciples too, are you?” she asked Peter.
  - type: usfm
    marker: p
    children:
    - type: text
      text: He replied, “I am not.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It was cold, and the servants and officials stood around a fire they had made to keep warm. Peter also was standing with them, warming himself.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The High Priest Questions Jesus
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, the high priest questioned Jesus about his disciples and his teaching.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Judas, who betrayed him, knew the place, because Jesus had often met there with his disciples. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have spoken openly to the world,”
    - type: text
      text: ' Jesus replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I always taught in synagogues or at the temple, where all the Jews come together. I said nothing in secret.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why question me? Ask those who heard me. Surely they know what I said.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Jesus said this, one of the officials nearby slapped him in the face. “Is this the way you answer the high priest?” he demanded.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If I said something wrong,”
    - type: text
      text: ' Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “testify as to what is wrong. But if I spoke the truth, why did you strike me?”
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Annas sent him bound to Caiaphas the high priest.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter’s Second and Third Denials
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, Simon Peter was still standing there warming himself. So they asked him, “You aren’t one of his disciples too, are you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He denied it, saying, “I am not.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of the high priest’s servants, a relative of the man whose ear Peter had cut off, challenged him, “Didn’t I see you with him in the garden?” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again Peter denied it, and at that moment a rooster began to crow.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Before Pilate
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Jewish leaders took Jesus from Caiaphas to the palace of the Roman governor. By now it was early morning, and to avoid ceremonial uncleanness they did not enter the palace, because they wanted to be able to eat the Passover. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Pilate came out to them and asked, “What charges are you bringing against this man?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Judas came to the garden, guiding a detachment of soldiers and some officials from the chief priests and the Pharisees. They were carrying torches, lanterns and weapons.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “If he were not a criminal,” they replied, “we would not have handed him over to you.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pilate said, “Take him yourselves and judge him by your own law.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But we have no right to execute anyone,” they objected. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This took place to fulfill what Jesus had said about the kind of death he was going to die.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pilate then went back inside the palace, summoned Jesus and asked him, “Are you the king of the Jews?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Is that your own idea,”
    - type: text
      text: ' Jesus asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “or did others talk to you about me?”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Am I a Jew?” Pilate replied. “Your own people and chief priests handed you over to me. What is it you have done?”
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My kingdom is not of this world. If it were, my servants would fight to prevent my arrest by the Jewish leaders. But now my kingdom is from another place.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You are a king, then!” said Pilate.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You say that I am a king. In fact, the reason I was born and came into the world is to testify to the truth. Everyone on the side of truth listens to me.”
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What is truth?” retorted Pilate. With this he went out again to the Jews gathered there and said, “I find no basis for a charge against him. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But it is your custom for me to release to you one prisoner at the time of the Passover. Do you want me to release ‘the king of the Jews’?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus, knowing all that was going to happen to him, went out and asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who is it you want?”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They shouted back, “No, not him! Give us Barabbas!” Now Barabbas had taken part in an uprising.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Jesus of Nazareth,” they replied.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am he,”
    - type: text
      text: ' Jesus said. (And Judas the traitor was standing there with them.) '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am he,”
    - type: text
      text: ' they drew back and fell to the ground.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who is it you want?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Jesus of Nazareth,” they said.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I told you that I am he. If you are looking for me, then let these men go.”
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This happened so that the words he had spoken would be fulfilled: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have not lost one of those you gave me.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John 6:39
      marker-yv: yv-n
