document_id: GEN.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Covenant With Abram
  - type: text
    content: 'After this, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Abram in a vision:'
  - type: text
    content: “Do not be afraid, Abram.
  - type: text
    content: I am your shield,
  - type: note
    content: Or sovereign
  - type: text
    content: your very great reward.
  - type: note
    content: Or shield; / your reward will be very great
  - type: text
    content: ”
  '10':
  - type: text
    content: 'Abram brought all these to him, cut them in two and arranged the halves opposite each other; the birds, however, he did not cut in half. '
  '11':
  - type: text
    content: Then birds of prey came down on the carcasses, but Abram drove them away.
  '12':
  - type: text
    content: 'As the sun was setting, Abram fell into a deep sleep, and a thick and dreadful darkness came over him. '
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Know for certain that for four hundred years your descendants will be strangers in a country not their own and that they will be enslaved and mistreated there. '
  '14':
  - type: text
    content: 'But I will punish the nation they serve as slaves, and afterward they will come out with great possessions. '
  '15':
  - type: text
    content: 'You, however, will go to your ancestors in peace and be buried at a good old age. '
  '16':
  - type: text
    content: In the fourth generation your descendants will come back here, for the sin of the Amorites has not yet reached its full measure.”
  '17':
  - type: text
    content: 'When the sun had set and darkness had fallen, a smoking firepot with a blazing torch appeared and passed between the pieces. '
  '18':
  - type: text
    content: 'On that day the '
  - type: text
    content: Lord
  - type: text
    content: ' made a covenant with Abram and said, “To your descendants I give this land, from the Wadi'
  - type: note
    content: Or river
  - type: text
    content: ' of Egypt to the great river, the Euphrates— '
  '19':
  - type: text
    content: 'the land of the Kenites, Kenizzites, Kadmonites, '
  '2':
  - type: text
    content: 'But Abram said, “Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', what can you give me since I remain childless and the one who will inherit'
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' my estate is Eliezer of Damascus?” '
  '20':
  - type: text
    content: 'Hittites, Perizzites, Rephaites, '
  '21':
  - type: text
    content: Amorites, Canaanites, Girgashites and Jebusites.”
  '3':
  - type: text
    content: And Abram said, “You have given me no children; so a servant in my household will be my heir.”
  '4':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him: “This man will not be your heir, but a son who is your own flesh and blood will be your heir.” '
  '5':
  - type: text
    content: He took him outside and said, “Look up at the sky and count the stars—if indeed you can count them.” Then he said to him, “So shall your offspring
  - type: note
    content: Or seed
  - type: text
    content: ' be.”'
  '6':
  - type: text
    content: 'Abram believed the '
  - type: text
    content: Lord
  - type: text
    content: ', and he credited it to him as righteousness.'
  '7':
  - type: text
    content: 'He also said to him, “I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who brought you out of Ur of the Chaldeans to give you this land to take possession of it.”'
  '8':
  - type: text
    content: 'But Abram said, “Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', how can I know that I will gain possession of it?”'
  '9':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Bring me a heifer, a goat and a ram, each three years old, along with a dove and a young pigeon.”'
