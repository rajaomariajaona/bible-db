document_id: GEN.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Covenant With Abram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Abram in a vision:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not be afraid, Abram.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am your shield,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sovereign
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your very great reward.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shield; / your reward will be very great
      marker-yv: yv-n
    - type: text
      text: ”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram brought all these to him, cut them in two and arranged the halves opposite each other; the birds, however, he did not cut in half. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then birds of prey came down on the carcasses, but Abram drove them away.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the sun was setting, Abram fell into a deep sleep, and a thick and dreadful darkness came over him. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Know for certain that for four hundred years your descendants will be strangers in a country not their own and that they will be enslaved and mistreated there. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will punish the nation they serve as slaves, and afterward they will come out with great possessions. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You, however, will go to your ancestors in peace and be buried at a good old age. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the fourth generation your descendants will come back here, for the sin of the Amorites has not yet reached its full measure.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the sun had set and darkness had fallen, a smoking firepot with a blazing torch appeared and passed between the pieces. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made a covenant with Abram and said, “To your descendants I give this land, from the Wadi'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: river
      marker-yv: yv-n
    - type: text
      text: ' of Egypt to the great river, the Euphrates— '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the land of the Kenites, Kenizzites, Kadmonites, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Abram said, “Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', what can you give me since I remain childless and the one who will inherit'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' my estate is Eliezer of Damascus?” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hittites, Perizzites, Rephaites, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amorites, Canaanites, Girgashites and Jebusites.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Abram said, “You have given me no children; so a servant in my household will be my heir.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to him: “This man will not be your heir, but a son who is your own flesh and blood will be your heir.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He took him outside and said, “Look up at the sky and count the stars—if indeed you can count them.” Then he said to him, “So shall your offspring
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seed
      marker-yv: yv-n
    - type: text
      text: ' be.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram believed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he credited it to him as righteousness.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also said to him, “I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who brought you out of Ur of the Chaldeans to give you this land to take possession of it.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Abram said, “Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how can I know that I will gain possession of it?”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Bring me a heifer, a goat and a ram, each three years old, along with a dove and a young pigeon.”'
