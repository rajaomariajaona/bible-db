document_id: 1CO.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Warnings From Israel’s History
  - type: text
    content: 'For I do not want you to be ignorant of the fact, brothers and sisters, that our ancestors were all under the cloud and that they all passed through the sea. '
  '10':
  - type: text
    content: And do not grumble, as some of them did—and were killed by the destroying angel.
  '11':
  - type: text
    content: 'These things happened to them as examples and were written down as warnings for us, on whom the culmination of the ages has come. '
  '12':
  - type: text
    content: 'So, if you think you are standing firm, be careful that you don’t fall! '
  '13':
  - type: text
    content: No temptation
  - type: note
    content: The Greek for temptation and tempted can also mean testing and tested.
  - type: text
    content: ' has overtaken you except what is common to mankind. And God is faithful; he will not let you be tempted'
  - type: note
    content: The Greek for temptation and tempted can also mean testing and tested.
  - type: text
    content: ' beyond what you can bear. But when you are tempted,'
  - type: note
    content: The Greek for temptation and tempted can also mean testing and tested.
  - type: text
    content: ' he will also provide a way out so that you can endure it.'
  - type: heading
    content: Idol Feasts and the Lord’s Supper
  '14':
  - type: text
    content: 'Therefore, my dear friends, flee from idolatry. '
  '15':
  - type: text
    content: 'I speak to sensible people; judge for yourselves what I say. '
  '16':
  - type: text
    content: 'Is not the cup of thanksgiving for which we give thanks a participation in the blood of Christ? And is not the bread that we break a participation in the body of Christ? '
  '17':
  - type: text
    content: Because there is one loaf, we, who are many, are one body, for we all share the one loaf.
  '18':
  - type: text
    content: 'Consider the people of Israel: Do not those who eat the sacrifices participate in the altar? '
  '19':
  - type: text
    content: 'Do I mean then that food sacrificed to an idol is anything, or that an idol is anything? '
  '2':
  - type: text
    content: 'They were all baptized into Moses in the cloud and in the sea. '
  '20':
  - type: text
    content: 'No, but the sacrifices of pagans are offered to demons, not to God, and I do not want you to be participants with demons. '
  '21':
  - type: text
    content: 'You cannot drink the cup of the Lord and the cup of demons too; you cannot have a part in both the Lord’s table and the table of demons. '
  '22':
  - type: text
    content: Are we trying to arouse the Lord’s jealousy? Are we stronger than he?
  - type: heading
    content: The Believer’s Freedom
  '23':
  - type: text
    content: '“I have the right to do anything,” you say—but not everything is beneficial. “I have the right to do anything”—but not everything is constructive. '
  '24':
  - type: text
    content: No one should seek their own good, but the good of others.
  '25':
  - type: text
    content: 'Eat anything sold in the meat market without raising questions of conscience, '
  '26':
  - type: text
    content: for, “The earth is the Lord’s, and everything in it.”
  - type: note
    content: Psalm 24:1
  '27':
  - type: text
    content: 'If an unbeliever invites you to a meal and you want to go, eat whatever is put before you without raising questions of conscience. '
  '28':
  - type: text
    content: 'But if someone says to you, “This has been offered in sacrifice,” then do not eat it, both for the sake of the one who told you and for the sake of conscience. '
  '29':
  - type: text
    content: 'I am referring to the other person’s conscience, not yours. For why is my freedom being judged by another’s conscience? '
  '3':
  - type: text
    content: 'They all ate the same spiritual food '
  '30':
  - type: text
    content: If I take part in the meal with thankfulness, why am I denounced because of something I thank God for?
  '31':
  - type: text
    content: 'So whether you eat or drink or whatever you do, do it all for the glory of God. '
  '32':
  - type: text
    content: 'Do not cause anyone to stumble, whether Jews, Greeks or the church of God— '
  '33':
  - type: text
    content: even as I try to please everyone in every way. For I am not seeking my own good but the good of many, so that they may be saved.
  '4':
  - type: text
    content: 'and drank the same spiritual drink; for they drank from the spiritual rock that accompanied them, and that rock was Christ. '
  '5':
  - type: text
    content: Nevertheless, God was not pleased with most of them; their bodies were scattered in the wilderness.
  '6':
  - type: text
    content: 'Now these things occurred as examples to keep us from setting our hearts on evil things as they did. '
  '7':
  - type: text
    content: 'Do not be idolaters, as some of them were; as it is written: “The people sat down to eat and drink and got up to indulge in revelry.”'
  - type: note
    content: Exodus 32:6
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'We should not commit sexual immorality, as some of them did—and in one day twenty-three thousand of them died. '
  '9':
  - type: text
    content: We should not test Christ,
  - type: note
    content: Some manuscripts test the Lord
  - type: text
    content: ' as some of them did—and were killed by snakes. '
