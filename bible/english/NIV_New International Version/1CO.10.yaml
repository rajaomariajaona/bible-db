  - type: usfm
    marker: s1
    children:
    - type: text
      text: Idol Feasts and the Lord’s Supper
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, my dear friends, flee from idolatry. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I speak to sensible people; judge for yourselves what I say. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is not the cup of thanksgiving for which we give thanks a participation in the blood of Christ? And is not the bread that we break a participation in the body of Christ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because there is one loaf, we, who are many, are one body, for we all share the one loaf.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Consider the people of Israel: Do not those who eat the sacrifices participate in the altar? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do I mean then that food sacrificed to an idol is anything, or that an idol is anything? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were all baptized into Moses in the cloud and in the sea. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No, but the sacrifices of pagans are offered to demons, not to God, and I do not want you to be participants with demons. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You cannot drink the cup of the Lord and the cup of demons too; you cannot have a part in both the Lord’s table and the table of demons. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Are we trying to arouse the Lord’s jealousy? Are we stronger than he?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Believer’s Freedom
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I have the right to do anything,” you say—but not everything is beneficial. “I have the right to do anything”—but not everything is constructive. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: No one should seek their own good, but the good of others.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eat anything sold in the meat market without raising questions of conscience, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for, “The earth is the Lord’s, and everything in it.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 24:1
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If an unbeliever invites you to a meal and you want to go, eat whatever is put before you without raising questions of conscience. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if someone says to you, “This has been offered in sacrifice,” then do not eat it, both for the sake of the one who told you and for the sake of conscience. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am referring to the other person’s conscience, not yours. For why is my freedom being judged by another’s conscience? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They all ate the same spiritual food '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If I take part in the meal with thankfulness, why am I denounced because of something I thank God for?
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So whether you eat or drink or whatever you do, do it all for the glory of God. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not cause anyone to stumble, whether Jews, Greeks or the church of God— '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: even as I try to please everyone in every way. For I am not seeking my own good but the good of many, so that they may be saved.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and drank the same spiritual drink; for they drank from the spiritual rock that accompanied them, and that rock was Christ. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nevertheless, God was not pleased with most of them; their bodies were scattered in the wilderness.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now these things occurred as examples to keep us from setting our hearts on evil things as they did. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not be idolaters, as some of them were; as it is written: “The people sat down to eat and drink and got up to indulge in revelry.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 32:6
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We should not commit sexual immorality, as some of them did—and in one day twenty-three thousand of them died. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We should not test Christ,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: test the Lord
      marker-yv: yv-n
    - type: text
      text: ' as some of them did—and were killed by snakes. '
