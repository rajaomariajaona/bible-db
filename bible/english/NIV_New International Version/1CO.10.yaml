document_id: 1CO.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warnings From Israel’s History
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For I do not want you to be ignorant of the fact, brothers and sisters, that our ancestors were all under the cloud and that they all passed through the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They were all baptized into Moses in the cloud and in the sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They all ate the same spiritual food '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and drank the same spiritual drink; for they drank from the spiritual rock that accompanied them, and that rock was Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nevertheless, God was not pleased with most of them; their bodies were scattered in the wilderness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now these things occurred as examples to keep us from setting our hearts on evil things as they did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Do not be idolaters, as some of them were; as it is written: “The people sat down to eat and drink and got up to indulge in revelry.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exodus 32:6
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'We should not commit sexual immorality, as some of them did—and in one day twenty-three thousand of them died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We should not test Christ,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: test the Lord
    marker-yv: yv-n
  - type: text
    text: ' as some of them did—and were killed by snakes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: And do not grumble, as some of them did—and were killed by the destroying angel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'These things happened to them as examples and were written down as warnings for us, on whom the culmination of the ages has come. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So, if you think you are standing firm, be careful that you don’t fall! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: No temptation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'temptation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tempted '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'can also mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'testing '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tested.
    marker-yv: yv-n
  - type: text
    text: ' has overtaken you except what is common to mankind. And God is faithful; he will not let you be tempted'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'temptation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tempted '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'can also mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'testing '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tested.
    marker-yv: yv-n
  - type: text
    text: ' beyond what you can bear. But when you are tempted,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'temptation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tempted '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'can also mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'testing '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tested.
    marker-yv: yv-n
  - type: text
    text: ' he will also provide a way out so that you can endure it.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Idol Feasts and the Lord’s Supper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore, my dear friends, flee from idolatry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I speak to sensible people; judge for yourselves what I say. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Is not the cup of thanksgiving for which we give thanks a participation in the blood of Christ? And is not the bread that we break a participation in the body of Christ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Because there is one loaf, we, who are many, are one body, for we all share the one loaf.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Consider the people of Israel: Do not those who eat the sacrifices participate in the altar? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Do I mean then that food sacrificed to an idol is anything, or that an idol is anything? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'No, but the sacrifices of pagans are offered to demons, not to God, and I do not want you to be participants with demons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'You cannot drink the cup of the Lord and the cup of demons too; you cannot have a part in both the Lord’s table and the table of demons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Are we trying to arouse the Lord’s jealousy? Are we stronger than he?
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Believer’s Freedom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“I have the right to do anything,” you say—but not everything is beneficial. “I have the right to do anything”—but not everything is constructive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: No one should seek their own good, but the good of others.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Eat anything sold in the meat market without raising questions of conscience, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: for, “The earth is the Lord’s, and everything in it.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 24:1
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'If an unbeliever invites you to a meal and you want to go, eat whatever is put before you without raising questions of conscience. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But if someone says to you, “This has been offered in sacrifice,” then do not eat it, both for the sake of the one who told you and for the sake of conscience. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'I am referring to the other person’s conscience, not yours. For why is my freedom being judged by another’s conscience? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: If I take part in the meal with thankfulness, why am I denounced because of something I thank God for?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So whether you eat or drink or whatever you do, do it all for the glory of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Do not cause anyone to stumble, whether Jews, Greeks or the church of God— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: even as I try to please everyone in every way. For I am not seeking my own good but the good of many, so that they may be saved.
