document_id: 2SA.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Promise to David
  - type: text
    content: 'After the king was settled in his palace and the '
  - type: text
    content: Lord
  - type: text
    content: ' had given him rest from all his enemies around him, '
  '10':
  - type: text
    content: 'And I will provide a place for my people Israel and will plant them so that they can have a home of their own and no longer be disturbed. Wicked people will not oppress them anymore, as they did at the beginning '
  '11':
  - type: text
    content: and have done ever since the time I appointed leaders
  - type: note
    content: Traditionally judges
  - type: text
    content: ' over my people Israel. I will also give you rest from all your enemies.'
  - type: text
    content: '“ ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' declares to you that the '
  - type: text
    content: Lord
  - type: text
    content: ' himself will establish a house for you: '
  '12':
  - type: text
    content: 'When your days are over and you rest with your ancestors, I will raise up your offspring to succeed you, your own flesh and blood, and I will establish his kingdom. '
  '13':
  - type: text
    content: 'He is the one who will build a house for my Name, and I will establish the throne of his kingdom forever. '
  '14':
  - type: text
    content: 'I will be his father, and he will be my son. When he does wrong, I will punish him with a rod wielded by men, with floggings inflicted by human hands. '
  '15':
  - type: text
    content: 'But my love will never be taken away from him, as I took it away from Saul, whom I removed from before you. '
  '16':
  - type: text
    content: Your house and your kingdom will endure forever before me
  - type: note
    content: Some Hebrew manuscripts and Septuagint; most Hebrew manuscripts you
  - type: text
    content: ; your throne will be established forever.’ ”
  '17':
  - type: text
    content: Nathan reported to David all the words of this entire revelation.
  - type: heading
    content: David’s Prayer
  '18':
  - type: text
    content: 'Then King David went in and sat before the '
  - type: text
    content: Lord
  - type: text
    content: ', and he said:'
  - type: text
    content: '“Who am I, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', and what is my family, that you have brought me this far? '
  '19':
  - type: text
    content: 'And as if this were not enough in your sight, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', you have also spoken about the future of the house of your servant—and this decree, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', is for a mere human!'
  - type: note
    content: Or for the human race
  '2':
  - type: text
    content: he said to Nathan the prophet, “Here I am, living in a house of cedar, while the ark of God remains in a tent.”
  '20':
  - type: text
    content: '“What more can David say to you? For you know your servant, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: For the sake of your word and according to your will, you have done this great thing and made it known to your servant.
  '22':
  - type: text
    content: '“How great you are, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '! There is no one like you, and there is no God but you, as we have heard with our own ears. '
  '23':
  - type: text
    content: And who is like your people Israel—the one nation on earth that God went out to redeem as a people for himself, and to make a name for himself, and to perform great and awesome wonders by driving out nations and their gods from before your people, whom you redeemed from Egypt?
  - type: note
    content: See Septuagint and 1 Chron. 17:21; Hebrew wonders for your land and before your people, whom you redeemed from Egypt, from the nations and their gods.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'You have established your people Israel as your very own forever, and you, '
  - type: text
    content: Lord
  - type: text
    content: ', have become their God.'
  '25':
  - type: text
    content: '“And now, '
  - type: text
    content: Lord
  - type: text
    content: ' God, keep forever the promise you have made concerning your servant and his house. Do as you promised, '
  '26':
  - type: text
    content: 'so that your name will be great forever. Then people will say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is God over Israel!’ And the house of your servant David will be established in your sight.'
  '27':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, God of Israel, you have revealed this to your servant, saying, ‘I will build a house for you.’ So your servant has found courage to pray this prayer to you. '
  '28':
  - type: text
    content: 'Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', you are God! Your covenant is trustworthy, and you have promised these good things to your servant. '
  '29':
  - type: text
    content: 'Now be pleased to bless the house of your servant, that it may continue forever in your sight; for you, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', have spoken, and with your blessing the house of your servant will be blessed forever.”'
  '3':
  - type: text
    content: 'Nathan replied to the king, “Whatever you have in mind, go ahead and do it, for the '
  - type: text
    content: Lord
  - type: text
    content: ' is with you.”'
  '4':
  - type: text
    content: 'But that night the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Nathan, saying:'
  '5':
  - type: text
    content: '“Go and tell my servant David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Are you the one to build me a house to dwell in? '
  '6':
  - type: text
    content: 'I have not dwelt in a house from the day I brought the Israelites up out of Egypt to this day. I have been moving from place to place with a tent as my dwelling. '
  '7':
  - type: text
    content: Wherever I have moved with all the Israelites, did I ever say to any of their rulers whom I commanded to shepherd my people Israel, “Why have you not built me a house of cedar?” ’
  '8':
  - type: text
    content: '“Now then, tell my servant David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: I took you from the pasture, from tending the flock, and appointed you ruler over my people Israel. '
  '9':
  - type: text
    content: 'I have been with you wherever you have gone, and I have cut off all your enemies from before you. Now I will make your name great, like the names of the greatest men on earth. '
