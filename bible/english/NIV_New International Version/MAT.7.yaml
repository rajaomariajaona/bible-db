document_id: MAT.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judging Others
  - type: text
    content: ' '
  - type: text
    content: “Do not judge, or you too will be judged.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Or if he asks for a fish, will give him a snake?
  - type: text
    content: ' '
  '11':
  - type: text
    content: If you, then, though you are evil, know how to give good gifts to your children, how much more will your Father in heaven give good gifts to those who ask him!
  - type: text
    content: ' '
  '12':
  - type: text
    content: So in everything, do to others what you would have them do to you, for this sums up the Law and the Prophets.
  - type: heading
    content: The Narrow and Wide Gates
  '13':
  - type: text
    content: ' '
  - type: text
    content: “Enter through the narrow gate. For wide is the gate and broad is the road that leads to destruction, and many enter through it.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But small is the gate and narrow the road that leads to life, and only a few find it.
  - type: heading
    content: True and False Prophets
  '15':
  - type: text
    content: ' '
  - type: text
    content: “Watch out for false prophets. They come to you in sheep’s clothing, but inwardly they are ferocious wolves.
  - type: text
    content: ' '
  '16':
  - type: text
    content: By their fruit you will recognize them. Do people pick grapes from thornbushes, or figs from thistles?
  - type: text
    content: ' '
  '17':
  - type: text
    content: Likewise, every good tree bears good fruit, but a bad tree bears bad fruit.
  - type: text
    content: ' '
  '18':
  - type: text
    content: A good tree cannot bear bad fruit, and a bad tree cannot bear good fruit.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Every tree that does not bear good fruit is cut down and thrown into the fire.
  - type: text
    content: ' '
  '2':
  - type: text
    content: For in the same way you judge others, you will be judged, and with the measure you use, it will be measured to you.
  '20':
  - type: text
    content: Thus, by their fruit you will recognize them.
  - type: heading
    content: True and False Disciples
  '21':
  - type: text
    content: ' '
  - type: text
    content: “Not everyone who says to me, ‘Lord, Lord,’ will enter the kingdom of heaven, but only the one who does the will of my Father who is in heaven.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Many will say to me on that day, ‘Lord, Lord, did we not prophesy in your name and in your name drive out demons and in your name perform many miracles?’
  - type: text
    content: ' '
  '23':
  - type: text
    content: Then I will tell them plainly, ‘I never knew you. Away from me, you evildoers!’
  - type: heading
    content: The Wise and Foolish Builders
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Therefore everyone who hears these words of mine and puts them into practice is like a wise man who built his house on the rock.
  - type: text
    content: ' '
  '25':
  - type: text
    content: The rain came down, the streams rose, and the winds blew and beat against that house; yet it did not fall, because it had its foundation on the rock.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But everyone who hears these words of mine and does not put them into practice is like a foolish man who built his house on sand.
  - type: text
    content: ' '
  '27':
  - type: text
    content: The rain came down, the streams rose, and the winds blew and beat against that house, and it fell with a great crash.”
  '28':
  - type: text
    content: 'When Jesus had finished saying these things, the crowds were amazed at his teaching, '
  '29':
  - type: text
    content: because he taught as one who had authority, and not as their teachers of the law.
  '3':
  - type: text
    content: ' '
  - type: text
    content: “Why do you look at the speck of sawdust in your brother’s eye and pay no attention to the plank in your own eye?
  - type: text
    content: ' '
  '4':
  - type: text
    content: How can you say to your brother, ‘Let me take the speck out of your eye,’ when all the time there is a plank in your own eye?
  - type: text
    content: ' '
  '5':
  - type: text
    content: You hypocrite, first take the plank out of your own eye, and then you will see clearly to remove the speck from your brother’s eye.
  '6':
  - type: text
    content: ' '
  - type: text
    content: “Do not give dogs what is sacred; do not throw your pearls to pigs. If you do, they may trample them under their feet, and turn and tear you to pieces.
  - type: heading
    content: Ask, Seek, Knock
  '7':
  - type: text
    content: ' '
  - type: text
    content: “Ask and it will be given to you; seek and you will find; knock and the door will be opened to you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: For everyone who asks receives; the one who seeks finds; and to the one who knocks, the door will be opened.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “Which of you, if your son asks for bread, will give him a stone?
  - type: text
    content: ' '
