document_id: PSA.145,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 145
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is an acrostic poem, the verses of which (including verse 13b) begin with the successive letters of the Hebrew alphabet.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of praise. Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will exalt you, my God the King;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will praise your name for ever and ever.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All your works praise you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your faithful people extol you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They tell of the glory of your kingdom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and speak of your might,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that all people may know of your mighty acts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the glorious splendor of your kingdom.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your kingdom is an everlasting kingdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your dominion endures through all generations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is trustworthy in all he promises'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and faithful in all he does.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '145:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One manuscript of the Masoretic Text, Dead Sea Scrolls and Syriac (see also Septuagint); most manuscripts of the Masoretic Text do not have the last two lines of verse 13.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' upholds all who fall'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lifts up all who are bowed down.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The eyes of all look to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you give them their food at the proper time.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You open your hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and satisfy the desires of every living thing.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is righteous in all his ways'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and faithful in all he does.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is near to all who call on him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to all who call on him in truth.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He fulfills the desires of those who fear him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he hears their cry and saves them.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every day I will praise you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and extol your name for ever and ever.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' watches over all who love him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but all the wicked he will destroy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My mouth will speak in praise of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let every creature praise his holy name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for ever and ever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and most worthy of praise;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his greatness no one can fathom.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One generation commends your works to another;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they tell of your mighty acts.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They speak of the glorious splendor of your majesty—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will meditate on your wonderful works.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '145:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls and Syriac (see also Septuagint); Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: On the glorious splendor of your majesty / and on your wonderful works I will meditate
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They tell of the power of your awesome works—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will proclaim your great deeds.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They celebrate your abundant goodness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and joyfully sing of your righteousness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is gracious and compassionate,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: slow to anger and rich in love.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is good to all;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has compassion on all he has made.
