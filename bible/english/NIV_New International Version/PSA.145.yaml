document_id: PSA.145,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 145This psalm is an acrostic poem, the verses of which (including verse 13b) begin with the successive letters of the Hebrew alphabet.
  - type: text
    content: A psalm of praise. Of David.
  - type: text
    content: I will exalt you, my God the King;
  - type: text
    content: I will praise your name for ever and ever.
  '10':
  - type: text
    content: 'All your works praise you, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: your faithful people extol you.
  '11':
  - type: text
    content: They tell of the glory of your kingdom
  - type: text
    content: and speak of your might,
  '12':
  - type: text
    content: so that all people may know of your mighty acts
  - type: text
    content: and the glorious splendor of your kingdom.
  '13':
  - type: text
    content: Your kingdom is an everlasting kingdom,
  - type: text
    content: and your dominion endures through all generations.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is trustworthy in all he promises'
  - type: text
    content: and faithful in all he does.
  - type: note
    content: One manuscript of the Masoretic Text, Dead Sea Scrolls and Syriac (see also Septuagint); most manuscripts of the Masoretic Text do not have the last two lines of verse 13.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' upholds all who fall'
  - type: text
    content: and lifts up all who are bowed down.
  '15':
  - type: text
    content: The eyes of all look to you,
  - type: text
    content: and you give them their food at the proper time.
  '16':
  - type: text
    content: You open your hand
  - type: text
    content: and satisfy the desires of every living thing.
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is righteous in all his ways'
  - type: text
    content: and faithful in all he does.
  '18':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is near to all who call on him,'
  - type: text
    content: to all who call on him in truth.
  '19':
  - type: text
    content: He fulfills the desires of those who fear him;
  - type: text
    content: he hears their cry and saves them.
  '2':
  - type: text
    content: Every day I will praise you
  - type: text
    content: and extol your name for ever and ever.
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' watches over all who love him,'
  - type: text
    content: but all the wicked he will destroy.
  '21':
  - type: text
    content: 'My mouth will speak in praise of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Let every creature praise his holy name
  - type: text
    content: for ever and ever.
  '3':
  - type: text
    content: 'Great is the '
  - type: text
    content: Lord
  - type: text
    content: ' and most worthy of praise;'
  - type: text
    content: his greatness no one can fathom.
  '4':
  - type: text
    content: One generation commends your works to another;
  - type: text
    content: they tell of your mighty acts.
  '5':
  - type: text
    content: They speak of the glorious splendor of your majesty—
  - type: text
    content: and I will meditate on your wonderful works.
  - type: note
    content: Dead Sea Scrolls and Syriac (see also Septuagint); Masoretic Text On the glorious splendor of your majesty / and on your wonderful works I will meditate
  '6':
  - type: text
    content: They tell of the power of your awesome works—
  - type: text
    content: and I will proclaim your great deeds.
  '7':
  - type: text
    content: They celebrate your abundant goodness
  - type: text
    content: and joyfully sing of your righteousness.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is gracious and compassionate,'
  - type: text
    content: slow to anger and rich in love.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is good to all;'
  - type: text
    content: he has compassion on all he has made.
