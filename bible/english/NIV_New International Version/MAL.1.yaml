document_id: MAL.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'A prophecy: The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' to Israel through Malachi.'
  - type: note
    content: Malachi means my messenger.
  - type: heading
    content: Israel Doubts God’s Love
  '10':
  - type: text
    content: '“Oh, that one of you would shut the temple doors, so that you would not light useless fires on my altar! I am not pleased with you,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, “and I will accept no offering from your hands. '
  '11':
  - type: text
    content: 'My name will be great among the nations, from where the sun rises to where it sets. In every place incense and pure offerings will be brought to me, because my name will be great among the nations,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '12':
  - type: text
    content: '“But you profane it by saying, ‘The Lord’s table is defiled,’ and, ‘Its food is contemptible.’ '
  '13':
  - type: text
    content: 'And you say, ‘What a burden!’ and you sniff at it contemptuously,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: text
    content: '“When you bring injured, lame or diseased animals and offer them as sacrifices, should I accept them from your hands?” says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: '“Cursed is the cheat who has an acceptable male in his flock and vows to give it, but then sacrifices a blemished animal to the Lord. For I am a great king,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, “and my name is to be feared among the nations.'
  '2':
  - type: text
    content: '“I have loved you,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “But you ask, ‘How have you loved us?’
  - type: text
    content: '“Was not Esau Jacob’s brother?” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. “Yet I have loved Jacob, '
  '3':
  - type: text
    content: but Esau I have hated, and I have turned his hill country into a wasteland and left his inheritance to the desert jackals.”
  '4':
  - type: text
    content: Edom may say, “Though we have been crushed, we will rebuild the ruins.”
  - type: text
    content: 'But this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: “They may build, but I will demolish. They will be called the Wicked Land, a people always under the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'You will see it with your own eyes and say, ‘Great is the '
  - type: text
    content: Lord
  - type: text
    content: —even beyond the borders of Israel!’
  - type: heading
    content: Breaking Covenant Through Blemished Sacrifices
  '6':
  - type: text
    content: '“A son honors his father, and a slave his master. If I am a father, where is the honor due me? If I am a master, where is the respect due me?” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: text
    content: “It is you priests who show contempt for my name.
  - type: text
    content: “But you ask, ‘How have we shown contempt for your name?’
  '7':
  - type: text
    content: “By offering defiled food on my altar.
  - type: text
    content: “But you ask, ‘How have we defiled you?’
  - type: text
    content: '“By saying that the '
  - type: text
    content: Lord
  - type: text
    content: '’s table is contemptible. '
  '8':
  - type: text
    content: 'When you offer blind animals for sacrifice, is that not wrong? When you sacrifice lame or diseased animals, is that not wrong? Try offering them to your governor! Would he be pleased with you? Would he accept you?” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '9':
  - type: text
    content: '“Now plead with God to be gracious to us. With such offerings from your hands, will he accept you?”—says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
