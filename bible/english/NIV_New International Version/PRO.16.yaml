document_id: PRO.16
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: To humans belong the plans of the heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' comes the proper answer of the tongue.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: All a person’s ways seem pure to them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but motives are weighed by the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Commit to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' whatever you do,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will establish your plans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' works out everything to its proper end—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the wicked for a day of disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests all the proud of heart.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Be sure of this: They will not go unpunished.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Through love and faithfulness sin is atoned for;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'through the fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' evil is avoided.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' takes pleasure in anyone’s way,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he causes their enemies to make peace with them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Better a little with righteousness
- type: usfm
  marker: q2
  children:
  - type: text
    text: than much gain with injustice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: In their hearts humans plan their course,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' establishes their steps.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The lips of a king speak as an oracle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his mouth does not betray justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Honest scales and balances belong to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the weights in the bag are of his making.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Kings detest wrongdoing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a throne is established through righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Kings take pleasure in honest lips;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they value the one who speaks what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A king’s wrath is a messenger of death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wise will appease it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: When a king’s face brightens, it means life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his favor is like a rain cloud in spring.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: How much better to get wisdom than gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to get insight rather than silver!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The highway of the upright avoids evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who guard their ways preserve their lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pride goes before destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a haughty spirit before a fall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Better to be lowly in spirit along with the oppressed
- type: usfm
  marker: q2
  children:
  - type: text
    text: than to share plunder with the proud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Whoever gives heed to instruction prospers,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: whoever speaks prudently finds what is good
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and blessed is the one who trusts in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The wise in heart are called discerning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gracious words promote instruction.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: words make a person persuasive
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Prudence is a fountain of life to the prudent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but folly brings punishment to fools.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The hearts of the wise make their mouths prudent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their lips promote instruction.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prudent / and make their lips persuasive
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Gracious words are a honeycomb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sweet to the soul and healing to the bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: There is a way that appears to be right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but in the end it leads to death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The appetite of laborers works for them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their hunger drives them on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A scoundrel plots evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and on their lips it is like a scorching fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A perverse person stirs up conflict,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a gossip separates close friends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: A violent person entices their neighbor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leads them down a path that is not good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Whoever winks with their eye is plotting perversity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever purses their lips is bent on evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Gray hair is a crown of splendor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is attained in the way of righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Better a patient person than a warrior,
- type: usfm
  marker: q2
  children:
  - type: text
    text: one with self-control than one who takes a city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: The lot is cast into the lap,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but its every decision is from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
