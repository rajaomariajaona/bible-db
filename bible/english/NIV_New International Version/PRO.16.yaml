document_id: PRO.16,111
type_code: eng
verses:
  '1':
  - type: text
    content: To humans belong the plans of the heart,
  - type: text
    content: 'but from the '
  - type: text
    content: Lord
  - type: text
    content: ' comes the proper answer of the tongue.'
  '10':
  - type: text
    content: The lips of a king speak as an oracle,
  - type: text
    content: and his mouth does not betray justice.
  '11':
  - type: text
    content: 'Honest scales and balances belong to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: all the weights in the bag are of his making.
  '12':
  - type: text
    content: Kings detest wrongdoing,
  - type: text
    content: for a throne is established through righteousness.
  '13':
  - type: text
    content: Kings take pleasure in honest lips;
  - type: text
    content: they value the one who speaks what is right.
  '14':
  - type: text
    content: A king’s wrath is a messenger of death,
  - type: text
    content: but the wise will appease it.
  '15':
  - type: text
    content: When a king’s face brightens, it means life;
  - type: text
    content: his favor is like a rain cloud in spring.
  '16':
  - type: text
    content: How much better to get wisdom than gold,
  - type: text
    content: to get insight rather than silver!
  '17':
  - type: text
    content: The highway of the upright avoids evil;
  - type: text
    content: those who guard their ways preserve their lives.
  '18':
  - type: text
    content: Pride goes before destruction,
  - type: text
    content: a haughty spirit before a fall.
  '19':
  - type: text
    content: Better to be lowly in spirit along with the oppressed
  - type: text
    content: than to share plunder with the proud.
  '2':
  - type: text
    content: All a person’s ways seem pure to them,
  - type: text
    content: 'but motives are weighed by the '
  - type: text
    content: Lord
  - type: text
    content: .
  '20':
  - type: text
    content: Whoever gives heed to instruction prospers,
  - type: note
    content: Or whoever speaks prudently finds what is good
  - type: text
    content: 'and blessed is the one who trusts in the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: The wise in heart are called discerning,
  - type: text
    content: and gracious words promote instruction.
  - type: note
    content: Or words make a person persuasive
  '22':
  - type: text
    content: Prudence is a fountain of life to the prudent,
  - type: text
    content: but folly brings punishment to fools.
  '23':
  - type: text
    content: The hearts of the wise make their mouths prudent,
  - type: text
    content: and their lips promote instruction.
  - type: note
    content: Or prudent / and make their lips persuasive
  '24':
  - type: text
    content: Gracious words are a honeycomb,
  - type: text
    content: sweet to the soul and healing to the bones.
  '25':
  - type: text
    content: There is a way that appears to be right,
  - type: text
    content: but in the end it leads to death.
  '26':
  - type: text
    content: The appetite of laborers works for them;
  - type: text
    content: their hunger drives them on.
  '27':
  - type: text
    content: A scoundrel plots evil,
  - type: text
    content: and on their lips it is like a scorching fire.
  '28':
  - type: text
    content: A perverse person stirs up conflict,
  - type: text
    content: and a gossip separates close friends.
  '29':
  - type: text
    content: A violent person entices their neighbor
  - type: text
    content: and leads them down a path that is not good.
  '3':
  - type: text
    content: 'Commit to the '
  - type: text
    content: Lord
  - type: text
    content: ' whatever you do,'
  - type: text
    content: and he will establish your plans.
  '30':
  - type: text
    content: Whoever winks with their eye is plotting perversity;
  - type: text
    content: whoever purses their lips is bent on evil.
  '31':
  - type: text
    content: Gray hair is a crown of splendor;
  - type: text
    content: it is attained in the way of righteousness.
  '32':
  - type: text
    content: Better a patient person than a warrior,
  - type: text
    content: one with self-control than one who takes a city.
  '33':
  - type: text
    content: The lot is cast into the lap,
  - type: text
    content: 'but its every decision is from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' works out everything to its proper end—'
  - type: text
    content: even the wicked for a day of disaster.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests all the proud of heart.'
  - type: text
    content: 'Be sure of this: They will not go unpunished.'
  '6':
  - type: text
    content: Through love and faithfulness sin is atoned for;
  - type: text
    content: 'through the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' evil is avoided.'
  '7':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' takes pleasure in anyone’s way,'
  - type: text
    content: he causes their enemies to make peace with them.
  '8':
  - type: text
    content: Better a little with righteousness
  - type: text
    content: than much gain with injustice.
  '9':
  - type: text
    content: In their hearts humans plan their course,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' establishes their steps.'
