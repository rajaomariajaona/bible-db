document_id: 1KI.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark Brought to the Temple
  - type: text
    content: 'Then King Solomon summoned into his presence at Jerusalem the elders of Israel, all the heads of the tribes and the chiefs of the Israelite families, to bring up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s covenant from Zion, the City of David. '
  '10':
  - type: text
    content: 'When the priests withdrew from the Holy Place, the cloud filled the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'And the priests could not perform their service because of the cloud, for the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled his temple.'
  '12':
  - type: text
    content: 'Then Solomon said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has said that he would dwell in a dark cloud; '
  '13':
  - type: text
    content: I have indeed built a magnificent temple for you, a place for you to dwell forever.”
  '14':
  - type: text
    content: 'While the whole assembly of Israel was standing there, the king turned around and blessed them. '
  '15':
  - type: text
    content: 'Then he said:'
  - type: text
    content: '“Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who with his own hand has fulfilled what he promised with his own mouth to my father David. For he said, '
  '16':
  - type: text
    content: ‘Since the day I brought my people Israel out of Egypt, I have not chosen a city in any tribe of Israel to have a temple built so that my Name might be there, but I have chosen David to rule my people Israel.’
  '17':
  - type: text
    content: '“My father David had it in his heart to build a temple for the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '18':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to my father David, ‘You did well to have it in your heart to build a temple for my Name. '
  '19':
  - type: text
    content: Nevertheless, you are not the one to build the temple, but your son, your own flesh and blood—he is the one who will build the temple for my Name.’
  '2':
  - type: text
    content: All the Israelites came together to King Solomon at the time of the festival in the month of Ethanim, the seventh month.
  '20':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has kept the promise he made: I have succeeded David my father and now I sit on the throne of Israel, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' promised, and I have built the temple for the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '21':
  - type: text
    content: 'I have provided a place there for the ark, in which is the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he made with our ancestors when he brought them out of Egypt.”'
  - type: heading
    content: Solomon’s Prayer of Dedication
  '22':
  - type: text
    content: 'Then Solomon stood before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' in front of the whole assembly of Israel, spread out his hands toward heaven '
  '23':
  - type: text
    content: 'and said:'
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, there is no God like you in heaven above or on earth below—you who keep your covenant of love with your servants who continue wholeheartedly in your way. '
  '24':
  - type: text
    content: You have kept your promise to your servant David my father; with your mouth you have promised and with your hand you have fulfilled it—as it is today.
  '25':
  - type: text
    content: '“Now '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, keep for your servant David my father the promises you made to him when you said, ‘You shall never fail to have a successor to sit before me on the throne of Israel, if only your descendants are careful in all they do to walk before me faithfully as you have done.’ '
  '26':
  - type: text
    content: And now, God of Israel, let your word that you promised your servant David my father come true.
  '27':
  - type: text
    content: '“But will God really dwell on earth? The heavens, even the highest heaven, cannot contain you. How much less this temple I have built! '
  '28':
  - type: text
    content: 'Yet give attention to your servant’s prayer and his plea for mercy, '
  - type: text
    content: Lord
  - type: text
    content: ' my God. Hear the cry and the prayer that your servant is praying in your presence this day. '
  '29':
  - type: text
    content: 'May your eyes be open toward this temple night and day, this place of which you said, ‘My Name shall be there,’ so that you will hear the prayer your servant prays toward this place. '
  '3':
  - type: text
    content: 'When all the elders of Israel had arrived, the priests took up the ark, '
  '30':
  - type: text
    content: Hear the supplication of your servant and of your people Israel when they pray toward this place. Hear from heaven, your dwelling place, and when you hear, forgive.
  '31':
  - type: text
    content: '“When anyone wrongs their neighbor and is required to take an oath and they come and swear the oath before your altar in this temple, '
  '32':
  - type: text
    content: then hear from heaven and act. Judge between your servants, condemning the guilty by bringing down on their heads what they have done, and vindicating the innocent by treating them in accordance with their innocence.
  '33':
  - type: text
    content: '“When your people Israel have been defeated by an enemy because they have sinned against you, and when they turn back to you and give praise to your name, praying and making supplication to you in this temple, '
  '34':
  - type: text
    content: then hear from heaven and forgive the sin of your people Israel and bring them back to the land you gave to their ancestors.
  '35':
  - type: text
    content: '“When the heavens are shut up and there is no rain because your people have sinned against you, and when they pray toward this place and give praise to your name and turn from their sin because you have afflicted them, '
  '36':
  - type: text
    content: then hear from heaven and forgive the sin of your servants, your people Israel. Teach them the right way to live, and send rain on the land you gave your people for an inheritance.
  '37':
  - type: text
    content: '“When famine or plague comes to the land, or blight or mildew, locusts or grasshoppers, or when an enemy besieges them in any of their cities, whatever disaster or disease may come, '
  '38':
  - type: text
    content: 'and when a prayer or plea is made by anyone among your people Israel—being aware of the afflictions of their own hearts, and spreading out their hands toward this temple— '
  '39':
  - type: text
    content: 'then hear from heaven, your dwelling place. Forgive and act; deal with everyone according to all they do, since you know their hearts (for you alone know every human heart), '
  '4':
  - type: text
    content: 'and they brought up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the tent of meeting and all the sacred furnishings in it. The priests and Levites carried them up, '
  '40':
  - type: text
    content: so that they will fear you all the time they live in the land you gave our ancestors.
  '41':
  - type: text
    content: '“As for the foreigner who does not belong to your people Israel but has come from a distant land because of your name— '
  '42':
  - type: text
    content: 'for they will hear of your great name and your mighty hand and your outstretched arm—when they come and pray toward this temple, '
  '43':
  - type: text
    content: then hear from heaven, your dwelling place. Do whatever the foreigner asks of you, so that all the peoples of the earth may know your name and fear you, as do your own people Israel, and may know that this house I have built bears your Name.
  '44':
  - type: text
    content: '“When your people go to war against their enemies, wherever you send them, and when they pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' toward the city you have chosen and the temple I have built for your Name, '
  '45':
  - type: text
    content: then hear from heaven their prayer and their plea, and uphold their cause.
  '46':
  - type: text
    content: '“When they sin against you—for there is no one who does not sin—and you become angry with them and give them over to their enemies, who take them captive to their own lands, far away or near; '
  '47':
  - type: text
    content: 'and if they have a change of heart in the land where they are held captive, and repent and plead with you in the land of their captors and say, ‘We have sinned, we have done wrong, we have acted wickedly’; '
  '48':
  - type: text
    content: 'and if they turn back to you with all their heart and soul in the land of their enemies who took them captive, and pray to you toward the land you gave their ancestors, toward the city you have chosen and the temple I have built for your Name; '
  '49':
  - type: text
    content: 'then from heaven, your dwelling place, hear their prayer and their plea, and uphold their cause. '
  '5':
  - type: text
    content: and King Solomon and the entire assembly of Israel that had gathered about him were before the ark, sacrificing so many sheep and cattle that they could not be recorded or counted.
  '50':
  - type: text
    content: 'And forgive your people, who have sinned against you; forgive all the offenses they have committed against you, and cause their captors to show them mercy; '
  '51':
  - type: text
    content: for they are your people and your inheritance, whom you brought out of Egypt, out of that iron-smelting furnace.
  '52':
  - type: text
    content: '“May your eyes be open to your servant’s plea and to the plea of your people Israel, and may you listen to them whenever they cry out to you. '
  '53':
  - type: text
    content: 'For you singled them out from all the nations of the world to be your own inheritance, just as you declared through your servant Moses when you, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', brought our ancestors out of Egypt.”'
  '54':
  - type: text
    content: 'When Solomon had finished all these prayers and supplications to the '
  - type: text
    content: Lord
  - type: text
    content: ', he rose from before the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ', where he had been kneeling with his hands spread out toward heaven. '
  '55':
  - type: text
    content: 'He stood and blessed the whole assembly of Israel in a loud voice, saying:'
  '56':
  - type: text
    content: '“Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ', who has given rest to his people Israel just as he promised. Not one word has failed of all the good promises he gave through his servant Moses. '
  '57':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' our God be with us as he was with our ancestors; may he never leave us nor forsake us. '
  '58':
  - type: text
    content: 'May he turn our hearts to him, to walk in obedience to him and keep the commands, decrees and laws he gave our ancestors. '
  '59':
  - type: text
    content: 'And may these words of mine, which I have prayed before the '
  - type: text
    content: Lord
  - type: text
    content: ', be near to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God day and night, that he may uphold the cause of his servant and the cause of his people Israel according to each day’s need, '
  '6':
  - type: text
    content: 'The priests then brought the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '’s covenant to its place in the inner sanctuary of the temple, the Most Holy Place, and put it beneath the wings of the cherubim. '
  '60':
  - type: text
    content: 'so that all the peoples of the earth may know that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God and that there is no other. '
  '61':
  - type: text
    content: 'And may your hearts be fully committed to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, to live by his decrees and obey his commands, as at this time.”'
  - type: heading
    content: The Dedication of the Temple
  '62':
  - type: text
    content: 'Then the king and all Israel with him offered sacrifices before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '63':
  - type: text
    content: 'Solomon offered a sacrifice of fellowship offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ': twenty-two thousand cattle and a hundred and twenty thousand sheep and goats. So the king and all the Israelites dedicated the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '64':
  - type: text
    content: 'On that same day the king consecrated the middle part of the courtyard in front of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and there he offered burnt offerings, grain offerings and the fat of the fellowship offerings, because the bronze altar that stood before the '
  - type: text
    content: Lord
  - type: text
    content: ' was too small to hold the burnt offerings, the grain offerings and the fat of the fellowship offerings.'
  '65':
  - type: text
    content: 'So Solomon observed the festival at that time, and all Israel with him—a vast assembly, people from Lebo Hamath to the Wadi of Egypt. They celebrated it before the '
  - type: text
    content: Lord
  - type: text
    content: ' our God for seven days and seven days more, fourteen days in all. '
  '66':
  - type: text
    content: 'On the following day he sent the people away. They blessed the king and then went home, joyful and glad in heart for all the good things the '
  - type: text
    content: Lord
  - type: text
    content: ' had done for his servant David and his people Israel.'
  '7':
  - type: text
    content: 'The cherubim spread their wings over the place of the ark and overshadowed the ark and its carrying poles. '
  '8':
  - type: text
    content: 'These poles were so long that their ends could be seen from the Holy Place in front of the inner sanctuary, but not from outside the Holy Place; and they are still there today. '
  '9':
  - type: text
    content: 'There was nothing in the ark except the two stone tablets that Moses had placed in it at Horeb, where the '
  - type: text
    content: Lord
  - type: text
    content: ' made a covenant with the Israelites after they came out of Egypt.'
