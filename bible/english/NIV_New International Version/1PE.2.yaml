document_id: 1PE.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Therefore, rid yourselves of all malice and all deceit, hypocrisy, envy, and slander of every kind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Like newborn babies, crave pure spiritual milk, so that by it you may grow up in your salvation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: now that you have tasted that the Lord is good.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Living Stone and a Chosen People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'As you come to him, the living Stone—rejected by humans but chosen by God and precious to him— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: you also, like living stones, are being built into a spiritual house
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: into a temple of the Spirit
    marker-yv: yv-n
  - type: text
    text: ' to be a holy priesthood, offering spiritual sacrifices acceptable to God through Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For in Scripture it says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “See, I lay a stone in Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a chosen and precious cornerstone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the one who trusts in him
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never be put to shame.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 28:16
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now to you who believe, this stone is precious. But to those who do not believe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The stone the builders rejected
- type: usfm
  marker: q2
  children:
  - type: text
    text: has become the cornerstone,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 118:22
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “A stone that causes people to stumble
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a rock that makes them fall.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 8:14
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: text
    text: They stumble because they disobey the message—which is also what they were destined for.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But you are a chosen people, a royal priesthood, a holy nation, God’s special possession, that you may declare the praises of him who called you out of darkness into his wonderful light. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Once you were not a people, but now you are the people of God; once you had not received mercy, but now you have received mercy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Living Godly Lives in a Pagan Society
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dear friends, I urge you, as foreigners and exiles, to abstain from sinful desires, which wage war against your soul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Live such good lives among the pagans that, though they accuse you of doing wrong, they may see your good deeds and glorify God on the day he visits us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Submit yourselves for the Lord’s sake to every human authority: whether to the emperor, as the supreme authority, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'or to governors, who are sent by him to punish those who do wrong and to commend those who do right. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For it is God’s will that by doing good you should silence the ignorant talk of foolish people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Live as free people, but do not use your freedom as a cover-up for evil; live as God’s slaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Show proper respect to everyone, love the family of believers, fear God, honor the emperor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Slaves, in reverent fear of God submit yourselves to your masters, not only to those who are good and considerate, but also to those who are harsh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For it is commendable if someone bears up under the pain of unjust suffering because they are conscious of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But how is it to your credit if you receive a beating for doing wrong and endure it? But if you suffer for doing good and you endure it, this is commendable before God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: To this you were called, because Christ suffered for you, leaving you an example, that you should follow in his steps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “He committed no sin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no deceit was found in his mouth.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 53:9
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When they hurled their insults at him, he did not retaliate; when he suffered, he made no threats. Instead, he entrusted himself to him who judges justly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“He himself bore our sins” in his body on the cross, so that we might die to sins and live for righteousness; “by his wounds you have been healed.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: For “you were like sheep going astray,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:24,25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 53:4,5,6 (see Septuagint)
    marker-yv: yv-n
  - type: text
    text: ' but now you have returned to the Shepherd and Overseer of your souls.'
