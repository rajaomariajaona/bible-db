document_id: 1PE.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Therefore, rid yourselves of all malice and all deceit, hypocrisy, envy, and slander of every kind. '
  '10':
  - type: text
    content: Once you were not a people, but now you are the people of God; once you had not received mercy, but now you have received mercy.
  - type: heading
    content: Living Godly Lives in a Pagan Society
  '11':
  - type: text
    content: 'Dear friends, I urge you, as foreigners and exiles, to abstain from sinful desires, which wage war against your soul. '
  '12':
  - type: text
    content: Live such good lives among the pagans that, though they accuse you of doing wrong, they may see your good deeds and glorify God on the day he visits us.
  '13':
  - type: text
    content: 'Submit yourselves for the Lord’s sake to every human authority: whether to the emperor, as the supreme authority, '
  '14':
  - type: text
    content: 'or to governors, who are sent by him to punish those who do wrong and to commend those who do right. '
  '15':
  - type: text
    content: 'For it is God’s will that by doing good you should silence the ignorant talk of foolish people. '
  '16':
  - type: text
    content: 'Live as free people, but do not use your freedom as a cover-up for evil; live as God’s slaves. '
  '17':
  - type: text
    content: Show proper respect to everyone, love the family of believers, fear God, honor the emperor.
  '18':
  - type: text
    content: 'Slaves, in reverent fear of God submit yourselves to your masters, not only to those who are good and considerate, but also to those who are harsh. '
  '19':
  - type: text
    content: 'For it is commendable if someone bears up under the pain of unjust suffering because they are conscious of God. '
  '2':
  - type: text
    content: 'Like newborn babies, crave pure spiritual milk, so that by it you may grow up in your salvation, '
  '20':
  - type: text
    content: 'But how is it to your credit if you receive a beating for doing wrong and endure it? But if you suffer for doing good and you endure it, this is commendable before God. '
  '21':
  - type: text
    content: To this you were called, because Christ suffered for you, leaving you an example, that you should follow in his steps.
  '22':
  - type: text
    content: “He committed no sin,
  - type: text
    content: and no deceit was found in his mouth.”
  - type: note
    content: Isaiah 53:9
  '23':
  - type: text
    content: 'When they hurled their insults at him, he did not retaliate; when he suffered, he made no threats. Instead, he entrusted himself to him who judges justly. '
  '24':
  - type: text
    content: '“He himself bore our sins” in his body on the cross, so that we might die to sins and live for righteousness; “by his wounds you have been healed.” '
  '25':
  - type: text
    content: For “you were like sheep going astray,”
  - type: note
    content: Isaiah 53:4,5,6 (see Septuagint)
  - type: text
    content: ' but now you have returned to the Shepherd and Overseer of your souls.'
  '3':
  - type: text
    content: now that you have tasted that the Lord is good.
  - type: heading
    content: The Living Stone and a Chosen People
  '4':
  - type: text
    content: 'As you come to him, the living Stone—rejected by humans but chosen by God and precious to him— '
  '5':
  - type: text
    content: you also, like living stones, are being built into a spiritual house
  - type: note
    content: Or into a temple of the Spirit
  - type: text
    content: ' to be a holy priesthood, offering spiritual sacrifices acceptable to God through Jesus Christ. '
  '6':
  - type: text
    content: 'For in Scripture it says:'
  - type: text
    content: “See, I lay a stone in Zion,
  - type: text
    content: a chosen and precious cornerstone,
  - type: text
    content: and the one who trusts in him
  - type: text
    content: will never be put to shame.”
  - type: note
    content: Isaiah 28:16
  '7':
  - type: text
    content: Now to you who believe, this stone is precious. But to those who do not believe,
  - type: text
    content: “The stone the builders rejected
  - type: text
    content: has become the cornerstone,”
  - type: note
    content: Psalm 118:22
  '8':
  - type: text
    content: and,
  - type: text
    content: “A stone that causes people to stumble
  - type: text
    content: and a rock that makes them fall.”
  - type: note
    content: Isaiah 8:14
  - type: text
    content: They stumble because they disobey the message—which is also what they were destined for.
  '9':
  - type: text
    content: 'But you are a chosen people, a royal priesthood, a holy nation, God’s special possession, that you may declare the praises of him who called you out of darkness into his wonderful light. '
