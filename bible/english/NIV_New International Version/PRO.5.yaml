document_id: PRO.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning Against Adultery
  - type: text
    content: My son, pay attention to my wisdom,
  - type: text
    content: turn your ear to my words of insight,
  '10':
  - type: text
    content: lest strangers feast on your wealth
  - type: text
    content: and your toil enrich the house of another.
  '11':
  - type: text
    content: At the end of your life you will groan,
  - type: text
    content: when your flesh and body are spent.
  '12':
  - type: text
    content: You will say, “How I hated discipline!
  - type: text
    content: How my heart spurned correction!
  '13':
  - type: text
    content: I would not obey my teachers
  - type: text
    content: or turn my ear to my instructors.
  '14':
  - type: text
    content: And I was soon in serious trouble
  - type: text
    content: in the assembly of God’s people.”
  '15':
  - type: text
    content: Drink water from your own cistern,
  - type: text
    content: running water from your own well.
  '16':
  - type: text
    content: Should your springs overflow in the streets,
  - type: text
    content: your streams of water in the public squares?
  '17':
  - type: text
    content: Let them be yours alone,
  - type: text
    content: never to be shared with strangers.
  '18':
  - type: text
    content: May your fountain be blessed,
  - type: text
    content: and may you rejoice in the wife of your youth.
  '19':
  - type: text
    content: A loving doe, a graceful deer—
  - type: text
    content: may her breasts satisfy you always,
  - type: text
    content: may you ever be intoxicated with her love.
  '2':
  - type: text
    content: that you may maintain discretion
  - type: text
    content: and your lips may preserve knowledge.
  '20':
  - type: text
    content: Why, my son, be intoxicated with another man’s wife?
  - type: text
    content: Why embrace the bosom of a wayward woman?
  '21':
  - type: text
    content: 'For your ways are in full view of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and he examines all your paths.
  '22':
  - type: text
    content: The evil deeds of the wicked ensnare them;
  - type: text
    content: the cords of their sins hold them fast.
  '23':
  - type: text
    content: For lack of discipline they will die,
  - type: text
    content: led astray by their own great folly.
  '3':
  - type: text
    content: For the lips of the adulterous woman drip honey,
  - type: text
    content: and her speech is smoother than oil;
  '4':
  - type: text
    content: but in the end she is bitter as gall,
  - type: text
    content: sharp as a double-edged sword.
  '5':
  - type: text
    content: Her feet go down to death;
  - type: text
    content: her steps lead straight to the grave.
  '6':
  - type: text
    content: She gives no thought to the way of life;
  - type: text
    content: her paths wander aimlessly, but she does not know it.
  '7':
  - type: text
    content: Now then, my sons, listen to me;
  - type: text
    content: do not turn aside from what I say.
  '8':
  - type: text
    content: Keep to a path far from her,
  - type: text
    content: do not go near the door of her house,
  '9':
  - type: text
    content: lest you lose your honor to others
  - type: text
    content: and your dignity
  - type: note
    content: Or years
  - type: text
    content: ' to one who is cruel,'
