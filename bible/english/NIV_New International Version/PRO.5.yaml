document_id: PRO.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning Against Adultery
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, pay attention to my wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn your ear to my words of insight,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: lest strangers feast on your wealth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your toil enrich the house of another.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: At the end of your life you will groan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when your flesh and body are spent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: You will say, “How I hated discipline!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How my heart spurned correction!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I would not obey my teachers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or turn my ear to my instructors.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: And I was soon in serious trouble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the assembly of God’s people.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Drink water from your own cistern,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: running water from your own well.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Should your springs overflow in the streets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your streams of water in the public squares?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Let them be yours alone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to be shared with strangers.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: May your fountain be blessed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may you rejoice in the wife of your youth.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: A loving doe, a graceful deer—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may her breasts satisfy you always,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may you ever be intoxicated with her love.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: that you may maintain discretion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your lips may preserve knowledge.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Why, my son, be intoxicated with another man’s wife?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why embrace the bosom of a wayward woman?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'For your ways are in full view of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he examines all your paths.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The evil deeds of the wicked ensnare them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the cords of their sins hold them fast.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: For lack of discipline they will die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: led astray by their own great folly.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For the lips of the adulterous woman drip honey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her speech is smoother than oil;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: but in the end she is bitter as gall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sharp as a double-edged sword.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Her feet go down to death;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her steps lead straight to the grave.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: She gives no thought to the way of life;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her paths wander aimlessly, but she does not know it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Now then, my sons, listen to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not turn aside from what I say.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Keep to a path far from her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not go near the door of her house,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: lest you lose your honor to others
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your dignity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: years
      marker-yv: yv-n
    - type: text
      text: ' to one who is cruel,'
