document_id: EZR.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Cyrus Helps the Exiles to Return
  - type: text
    content: 'In the first year of Cyrus king of Persia, in order to fulfill the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken by Jeremiah, the '
  - type: text
    content: Lord
  - type: text
    content: ' moved the heart of Cyrus king of Persia to make a proclamation throughout his realm and also to put it in writing:'
  '10':
  - type: text
    content: gold bowls
  - type: text
    content: '30'
  - type: text
    content: matching silver bowls
  - type: text
    content: '410'
  - type: text
    content: other articles
  - type: text
    content: 1,000
  '11':
  - type: text
    content: In all, there were 5,400 articles of gold and of silver. Sheshbazzar brought all these along with the exiles when they came up from Babylon to Jerusalem.
  '2':
  - type: text
    content: '“This is what Cyrus king of Persia says:'
  - type: text
    content: '“ ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of heaven, has given me all the kingdoms of the earth and he has appointed me to build a temple for him at Jerusalem in Judah. '
  '3':
  - type: text
    content: 'Any of his people among you may go up to Jerusalem in Judah and build the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, the God who is in Jerusalem, and may their God be with them. '
  '4':
  - type: text
    content: And in any locality where survivors may now be living, the people are to provide them with silver and gold, with goods and livestock, and with freewill offerings for the temple of God in Jerusalem.’ ”
  '5':
  - type: text
    content: 'Then the family heads of Judah and Benjamin, and the priests and Levites—everyone whose heart God had moved—prepared to go up and build the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem. '
  '6':
  - type: text
    content: All their neighbors assisted them with articles of silver and gold, with goods and livestock, and with valuable gifts, in addition to all the freewill offerings.
  '7':
  - type: text
    content: 'Moreover, King Cyrus brought out the articles belonging to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', which Nebuchadnezzar had carried away from Jerusalem and had placed in the temple of his god.'
  - type: note
    content: Or gods
  - type: text
    content: ' '
  '8':
  - type: text
    content: Cyrus king of Persia had them brought by Mithredath the treasurer, who counted them out to Sheshbazzar the prince of Judah.
  '9':
  - type: text
    content: 'This was the inventory:'
  - type: text
    content: gold dishes
  - type: text
    content: '30'
  - type: text
    content: silver dishes
  - type: text
    content: 1,000
  - type: text
    content: silver pans
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: '29'
