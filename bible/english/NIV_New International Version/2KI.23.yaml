document_id: 2KI.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Josiah Renews the Covenant
  - type: text
    content: 'Then the king called together all the elders of Judah and Jerusalem. '
  '10':
  - type: text
    content: 'He desecrated Topheth, which was in the Valley of Ben Hinnom, so no one could use it to sacrifice their son or daughter in the fire to Molek. '
  '11':
  - type: text
    content: 'He removed from the entrance to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' the horses that the kings of Judah had dedicated to the sun. They were in the court'
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' near the room of an official named Nathan-Melek. Josiah then burned the chariots dedicated to the sun.'
  '12':
  - type: text
    content: 'He pulled down the altars the kings of Judah had erected on the roof near the upper room of Ahaz, and the altars Manasseh had built in the two courts of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. He removed them from there, smashed them to pieces and threw the rubble into the Kidron Valley. '
  '13':
  - type: text
    content: 'The king also desecrated the high places that were east of Jerusalem on the south of the Hill of Corruption—the ones Solomon king of Israel had built for Ashtoreth the vile goddess of the Sidonians, for Chemosh the vile god of Moab, and for Molek the detestable god of the people of Ammon. '
  '14':
  - type: text
    content: Josiah smashed the sacred stones and cut down the Asherah poles and covered the sites with human bones.
  '15':
  - type: text
    content: 'Even the altar at Bethel, the high place made by Jeroboam son of Nebat, who had caused Israel to sin—even that altar and high place he demolished. He burned the high place and ground it to powder, and burned the Asherah pole also. '
  '16':
  - type: text
    content: 'Then Josiah looked around, and when he saw the tombs that were there on the hillside, he had the bones removed from them and burned on the altar to defile it, in accordance with the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' proclaimed by the man of God who foretold these things.'
  '17':
  - type: text
    content: The king asked, “What is that tombstone I see?”
  - type: text
    content: The people of the city said, “It marks the tomb of the man of God who came from Judah and pronounced against the altar of Bethel the very things you have done to it.”
  '18':
  - type: text
    content: “Leave it alone,” he said. “Don’t let anyone disturb his bones.” So they spared his bones and those of the prophet who had come from Samaria.
  '19':
  - type: text
    content: 'Just as he had done at Bethel, Josiah removed all the shrines at the high places that the kings of Israel had built in the towns of Samaria and that had aroused the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger. '
  '2':
  - type: text
    content: 'He went up to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' with the people of Judah, the inhabitants of Jerusalem, the priests and the prophets—all the people from the least to the greatest. He read in their hearing all the words of the Book of the Covenant, which had been found in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: Josiah slaughtered all the priests of those high places on the altars and burned human bones on them. Then he went back to Jerusalem.
  '21':
  - type: text
    content: 'The king gave this order to all the people: “Celebrate the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, as it is written in this Book of the Covenant.” '
  '22':
  - type: text
    content: 'Neither in the days of the judges who led Israel nor in the days of the kings of Israel and the kings of Judah had any such Passover been observed. '
  '23':
  - type: text
    content: 'But in the eighteenth year of King Josiah, this Passover was celebrated to the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem.'
  '24':
  - type: text
    content: 'Furthermore, Josiah got rid of the mediums and spiritists, the household gods, the idols and all the other detestable things seen in Judah and Jerusalem. This he did to fulfill the requirements of the law written in the book that Hilkiah the priest had discovered in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Neither before nor after Josiah was there a king like him who turned to the '
  - type: text
    content: Lord
  - type: text
    content: ' as he did—with all his heart and with all his soul and with all his strength, in accordance with all the Law of Moses.'
  '26':
  - type: text
    content: 'Nevertheless, the '
  - type: text
    content: Lord
  - type: text
    content: ' did not turn away from the heat of his fierce anger, which burned against Judah because of all that Manasseh had done to arouse his anger. '
  '27':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I will remove Judah also from my presence as I removed Israel, and I will reject Jerusalem, the city I chose, and this temple, about which I said, ‘My Name shall be there.’'
  - type: note
    content: 1 Kings 8:29
  - type: text
    content: ”
  '28':
  - type: text
    content: As for the other events of Josiah’s reign, and all he did, are they not written in the book of the annals of the kings of Judah?
  '29':
  - type: text
    content: 'While Josiah was king, Pharaoh Necho king of Egypt went up to the Euphrates River to help the king of Assyria. King Josiah marched out to meet him in battle, but Necho faced him and killed him at Megiddo. '
  '3':
  - type: text
    content: 'The king stood by the pillar and renewed the covenant in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: '—to follow the '
  - type: text
    content: Lord
  - type: text
    content: ' and keep his commands, statutes and decrees with all his heart and all his soul, thus confirming the words of the covenant written in this book. Then all the people pledged themselves to the covenant.'
  '30':
  - type: text
    content: Josiah’s servants brought his body in a chariot from Megiddo to Jerusalem and buried him in his own tomb. And the people of the land took Jehoahaz son of Josiah and anointed him and made him king in place of his father.
  - type: heading
    content: Jehoahaz King of Judah
  '31':
  - type: text
    content: 'Jehoahaz was twenty-three years old when he became king, and he reigned in Jerusalem three months. His mother’s name was Hamutal daughter of Jeremiah; she was from Libnah. '
  '32':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as his predecessors had done. '
  '33':
  - type: text
    content: Pharaoh Necho put him in chains at Riblah in the land of Hamath so that he might not reign in Jerusalem, and he imposed on Judah a levy of a hundred talents
  - type: note
    content: That is, about 3 3/4 tons or about 3.4 metric tons
  - type: text
    content: ' of silver and a talent'
  - type: note
    content: That is, about 75 pounds or about 34 kilograms
  - type: text
    content: ' of gold. '
  '34':
  - type: text
    content: 'Pharaoh Necho made Eliakim son of Josiah king in place of his father Josiah and changed Eliakim’s name to Jehoiakim. But he took Jehoahaz and carried him off to Egypt, and there he died. '
  '35':
  - type: text
    content: Jehoiakim paid Pharaoh Necho the silver and gold he demanded. In order to do so, he taxed the land and exacted the silver and gold from the people of the land according to their assessments.
  - type: heading
    content: Jehoiakim King of Judah
  '36':
  - type: text
    content: 'Jehoiakim was twenty-five years old when he became king, and he reigned in Jerusalem eleven years. His mother’s name was Zebidah daughter of Pedaiah; she was from Rumah. '
  '37':
  - type: text
    content: 'And he did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as his predecessors had done.'
  '4':
  - type: text
    content: 'The king ordered Hilkiah the high priest, the priests next in rank and the doorkeepers to remove from the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' all the articles made for Baal and Asherah and all the starry hosts. He burned them outside Jerusalem in the fields of the Kidron Valley and took the ashes to Bethel. '
  '5':
  - type: text
    content: 'He did away with the idolatrous priests appointed by the kings of Judah to burn incense on the high places of the towns of Judah and on those around Jerusalem—those who burned incense to Baal, to the sun and moon, to the constellations and to all the starry hosts. '
  '6':
  - type: text
    content: 'He took the Asherah pole from the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' to the Kidron Valley outside Jerusalem and burned it there. He ground it to powder and scattered the dust over the graves of the common people. '
  '7':
  - type: text
    content: 'He also tore down the quarters of the male shrine prostitutes that were in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the quarters where women did weaving for Asherah.'
  '8':
  - type: text
    content: 'Josiah brought all the priests from the towns of Judah and desecrated the high places, from Geba to Beersheba, where the priests had burned incense. He broke down the gateway at the entrance of the Gate of Joshua, the city governor, which was on the left of the city gate. '
  '9':
  - type: text
    content: 'Although the priests of the high places did not serve at the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem, they ate unleavened bread with their fellow priests.'
