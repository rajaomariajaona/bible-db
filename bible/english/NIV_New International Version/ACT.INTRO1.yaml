verses:
  '1':
  - type: text
    content: Intro
  - type: text
    content: Luke’s second volume is known as the book of Acts (see the Invitation to Luke–Acts for more detailed information on the Gospel of Luke). The six parts of the book of Acts each describe a new phase in the expansion of the Messiah-following movement outward from Jerusalem. These sections are all marked by variations on the phrase the
  - type: text
    content: word of God continued to spread and flourish
  - type: text
    content: ':'
  - type: text
    content: : First, the church is established in Jerusalem and becomes Greek-speaking, allowing it to spread its message throughout the empire.
  - type: text
    content: : Next, the movement expands into the rest of Palestine.
  - type: text
    content: : Third, Gentiles are included in the gathering of Jesus-followers alongside Jews.
  - type: text
    content: : Fourth, messengers are sent west into the Roman province of Asia.
  - type: text
    content: : Fifth, these messengers enter Europe.
  - type: text
    content: : In the sixth and final phase, the movement reaches the capital city of Rome and into the highest levels of society; God’s kingdom is thus announced to all nations.
