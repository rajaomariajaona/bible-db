type_code: eng
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: Intro
  - type: usfm
    marker: im
    children:
    - type: text
      text: Luke’s second volume is known as the book of Acts (see the Invitation to Luke–Acts for more detailed information on the Gospel of Luke). The six parts of the book of Acts each describe a new phase in the expansion of the Messiah-following movement outward from Jerusalem. These sections are all marked by variations on the phrase the
    - type: usfm
      marker: qt
      children:
      - type: text
        text: word of God continued to spread and flourish
    - type: text
      text: ':'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: : First, the church is established in Jerusalem and becomes Greek-speaking, allowing it to spread its message throughout the empire.
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: : Next, the movement expands into the rest of Palestine.
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: : Third, Gentiles are included in the gathering of Jesus-followers alongside Jews.
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: : Fourth, messengers are sent west into the Roman province of Asia.
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: : Fifth, these messengers enter Europe.
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: : In the sixth and final phase, the movement reaches the capital city of Rome and into the highest levels of society; God’s kingdom is thus announced to all nations.
