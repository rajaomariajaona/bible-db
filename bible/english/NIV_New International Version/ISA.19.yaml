document_id: ISA.19,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A prophecy against Egypt:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'See, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rides on a swift cloud'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and is coming to Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The idols of Egypt tremble before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the hearts of the Egyptians melt with fear.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The workers in cloth will be dejected,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the wage earners will be sick at heart.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The officials of Zoan are nothing but fools;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wise counselors of Pharaoh give senseless advice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can you say to Pharaoh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I am one of the wise men,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a disciple of the ancient kings”?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Where are your wise men now?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them show you and make known
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has planned against Egypt.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The officials of Zoan have become fools,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the leaders of Memphis are deceived;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the cornerstones of her peoples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have led Egypt astray.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has poured into them'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a spirit of dizziness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they make Egypt stagger in all that she does,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as a drunkard staggers around in his vomit.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: There is nothing Egypt can do—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: head or tail, palm branch or reed.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'In that day the Egyptians will become weaklings. They will shudder with fear at the uplifted hand that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty raises against them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And the land of Judah will bring terror to the Egyptians; everyone to whom Judah is mentioned will be terrified, because of what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is planning against them.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'In that day five cities in Egypt will speak the language of Canaan and swear allegiance to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty. One of them will be called the City of the Sun.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts of the Masoretic Text, Dead Sea Scrolls, Symmachus and Vulgate; most manuscripts of the Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: City of Destruction
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'In that day there will be an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the heart of Egypt, and a monument to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at its border. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “I will stir up Egyptian against Egyptian—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brother will fight against brother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: neighbor against neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: city against city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: kingdom against kingdom.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'It will be a sign and witness to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty in the land of Egypt. When they cry out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' because of their oppressors, he will send them a savior and defender, and he will rescue them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will make himself known to the Egyptians, and in that day they will acknowledge the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. They will worship with sacrifices and grain offerings; they will make vows to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and keep them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strike Egypt with a plague; he will strike them and heal them. They will turn to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he will respond to their pleas and heal them.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'In that day there will be a highway from Egypt to Assyria. The Assyrians will go to Egypt and the Egyptians to Assyria. The Egyptians and Assyrians will worship together. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: In that day Israel will be the third, along with Egypt and Assyria, a blessing
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Assyria, whose names will be used in blessings '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(see Gen. 48:20); or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Assyria, who will be seen by others as blessed
      marker-yv: yv-n
    - type: text
      text: ' on the earth. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty will bless them, saying, “Blessed be Egypt my people, Assyria my handiwork, and Israel my inheritance.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The Egyptians will lose heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will bring their plans to nothing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will consult the idols and the spirits of the dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mediums and the spiritists.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I will hand the Egyptians over
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the power of a cruel master,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a fierce king will rule over them,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The waters of the river will dry up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the riverbed will be parched and dry.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The canals will stink;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the streams of Egypt will dwindle and dry up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The reeds and rushes will wither,
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: also the plants along the Nile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the mouth of the river.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every sown field along the Nile
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will become parched, will blow away and be no more.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The fishermen will groan and lament,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who cast hooks into the Nile;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who throw nets on the water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will pine away.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Those who work with combed flax will despair,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the weavers of fine linen will lose hope.
