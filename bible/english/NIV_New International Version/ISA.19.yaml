document_id: ISA.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Egypt
  - type: text
    content: 'A prophecy against Egypt:'
  - type: text
    content: 'See, the '
  - type: text
    content: Lord
  - type: text
    content: ' rides on a swift cloud'
  - type: text
    content: and is coming to Egypt.
  - type: text
    content: The idols of Egypt tremble before him,
  - type: text
    content: and the hearts of the Egyptians melt with fear.
  '10':
  - type: text
    content: The workers in cloth will be dejected,
  - type: text
    content: and all the wage earners will be sick at heart.
  '11':
  - type: text
    content: The officials of Zoan are nothing but fools;
  - type: text
    content: the wise counselors of Pharaoh give senseless advice.
  - type: text
    content: How can you say to Pharaoh,
  - type: text
    content: “I am one of the wise men,
  - type: text
    content: a disciple of the ancient kings”?
  '12':
  - type: text
    content: Where are your wise men now?
  - type: text
    content: Let them show you and make known
  - type: text
    content: 'what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty'
  - type: text
    content: has planned against Egypt.
  '13':
  - type: text
    content: The officials of Zoan have become fools,
  - type: text
    content: the leaders of Memphis are deceived;
  - type: text
    content: the cornerstones of her peoples
  - type: text
    content: have led Egypt astray.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has poured into them'
  - type: text
    content: a spirit of dizziness;
  - type: text
    content: they make Egypt stagger in all that she does,
  - type: text
    content: as a drunkard staggers around in his vomit.
  '15':
  - type: text
    content: There is nothing Egypt can do—
  - type: text
    content: head or tail, palm branch or reed.
  '16':
  - type: text
    content: 'In that day the Egyptians will become weaklings. They will shudder with fear at the uplifted hand that the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty raises against them. '
  '17':
  - type: text
    content: 'And the land of Judah will bring terror to the Egyptians; everyone to whom Judah is mentioned will be terrified, because of what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is planning against them.'
  '18':
  - type: text
    content: 'In that day five cities in Egypt will speak the language of Canaan and swear allegiance to the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. One of them will be called the City of the Sun.'
  - type: note
    content: Some manuscripts of the Masoretic Text, Dead Sea Scrolls, Symmachus and Vulgate; most manuscripts of the Masoretic Text City of Destruction
  '19':
  - type: text
    content: 'In that day there will be an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' in the heart of Egypt, and a monument to the '
  - type: text
    content: Lord
  - type: text
    content: ' at its border. '
  '2':
  - type: text
    content: “I will stir up Egyptian against Egyptian—
  - type: text
    content: brother will fight against brother,
  - type: text
    content: neighbor against neighbor,
  - type: text
    content: city against city,
  - type: text
    content: kingdom against kingdom.
  '20':
  - type: text
    content: 'It will be a sign and witness to the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty in the land of Egypt. When they cry out to the '
  - type: text
    content: Lord
  - type: text
    content: ' because of their oppressors, he will send them a savior and defender, and he will rescue them. '
  '21':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' will make himself known to the Egyptians, and in that day they will acknowledge the '
  - type: text
    content: Lord
  - type: text
    content: '. They will worship with sacrifices and grain offerings; they will make vows to the '
  - type: text
    content: Lord
  - type: text
    content: ' and keep them. '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will strike Egypt with a plague; he will strike them and heal them. They will turn to the '
  - type: text
    content: Lord
  - type: text
    content: ', and he will respond to their pleas and heal them.'
  '23':
  - type: text
    content: 'In that day there will be a highway from Egypt to Assyria. The Assyrians will go to Egypt and the Egyptians to Assyria. The Egyptians and Assyrians will worship together. '
  '24':
  - type: text
    content: In that day Israel will be the third, along with Egypt and Assyria, a blessing
  - type: note
    content: Or Assyria, whose names will be used in blessings (see Gen. 48:20); or Assyria, who will be seen by others as blessed
  - type: text
    content: ' on the earth. '
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will bless them, saying, “Blessed be Egypt my people, Assyria my handiwork, and Israel my inheritance.”'
  '3':
  - type: text
    content: The Egyptians will lose heart,
  - type: text
    content: and I will bring their plans to nothing;
  - type: text
    content: they will consult the idols and the spirits of the dead,
  - type: text
    content: the mediums and the spiritists.
  '4':
  - type: text
    content: I will hand the Egyptians over
  - type: text
    content: to the power of a cruel master,
  - type: text
    content: and a fierce king will rule over them,”
  - type: text
    content: 'declares the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '5':
  - type: text
    content: The waters of the river will dry up,
  - type: text
    content: and the riverbed will be parched and dry.
  '6':
  - type: text
    content: The canals will stink;
  - type: text
    content: the streams of Egypt will dwindle and dry up.
  - type: text
    content: The reeds and rushes will wither,
  '7':
  - type: text
    content: also the plants along the Nile,
  - type: text
    content: at the mouth of the river.
  - type: text
    content: Every sown field along the Nile
  - type: text
    content: will become parched, will blow away and be no more.
  '8':
  - type: text
    content: The fishermen will groan and lament,
  - type: text
    content: all who cast hooks into the Nile;
  - type: text
    content: those who throw nets on the water
  - type: text
    content: will pine away.
  '9':
  - type: text
    content: Those who work with combed flax will despair,
  - type: text
    content: the weavers of fine linen will lose hope.
