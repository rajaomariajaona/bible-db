document_id: EXO.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Plague on Livestock
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go to Pharaoh and say to him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, says: “Let my people go, so that they may worship me.” '
  '10':
  - type: text
    content: 'So they took soot from a furnace and stood before Pharaoh. Moses tossed it into the air, and festering boils broke out on people and animals. '
  '11':
  - type: text
    content: 'The magicians could not stand before Moses because of the boils that were on them and on all the Egyptians. '
  '12':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' hardened Pharaoh’s heart and he would not listen to Moses and Aaron, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Moses.'
  - type: heading
    content: The Plague of Hail
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Get up early in the morning, confront Pharaoh and say to him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, says: Let my people go, so that they may worship me, '
  '14':
  - type: text
    content: 'or this time I will send the full force of my plagues against you and against your officials and your people, so you may know that there is no one like me in all the earth. '
  '15':
  - type: text
    content: 'For by now I could have stretched out my hand and struck you and your people with a plague that would have wiped you off the earth. '
  '16':
  - type: text
    content: But I have raised you up
  - type: note
    content: Or have spared you
  - type: text
    content: ' for this very purpose, that I might show you my power and that my name might be proclaimed in all the earth. '
  '17':
  - type: text
    content: 'You still set yourself against my people and will not let them go. '
  '18':
  - type: text
    content: 'Therefore, at this time tomorrow I will send the worst hailstorm that has ever fallen on Egypt, from the day it was founded till now. '
  '19':
  - type: text
    content: Give an order now to bring your livestock and everything you have in the field to a place of shelter, because the hail will fall on every person and animal that has not been brought in and is still out in the field, and they will die.’ ”
  '2':
  - type: text
    content: 'If you refuse to let them go and continue to hold them back, '
  '20':
  - type: text
    content: 'Those officials of Pharaoh who feared the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' hurried to bring their slaves and their livestock inside. '
  '21':
  - type: text
    content: 'But those who ignored the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' left their slaves and livestock in the field.'
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Stretch out your hand toward the sky so that hail will fall all over Egypt—on people and animals and on everything growing in the fields of Egypt.” '
  '23':
  - type: text
    content: 'When Moses stretched out his staff toward the sky, the '
  - type: text
    content: Lord
  - type: text
    content: ' sent thunder and hail, and lightning flashed down to the ground. So the '
  - type: text
    content: Lord
  - type: text
    content: ' rained hail on the land of Egypt; '
  '24':
  - type: text
    content: 'hail fell and lightning flashed back and forth. It was the worst storm in all the land of Egypt since it had become a nation. '
  '25':
  - type: text
    content: 'Throughout Egypt hail struck everything in the fields—both people and animals; it beat down everything growing in the fields and stripped every tree. '
  '26':
  - type: text
    content: The only place it did not hail was the land of Goshen, where the Israelites were.
  '27':
  - type: text
    content: 'Then Pharaoh summoned Moses and Aaron. “This time I have sinned,” he said to them. “The '
  - type: text
    content: Lord
  - type: text
    content: ' is in the right, and I and my people are in the wrong. '
  '28':
  - type: text
    content: 'Pray to the '
  - type: text
    content: Lord
  - type: text
    content: ', for we have had enough thunder and hail. I will let you go; you don’t have to stay any longer.”'
  '29':
  - type: text
    content: 'Moses replied, “When I have gone out of the city, I will spread out my hands in prayer to the '
  - type: text
    content: Lord
  - type: text
    content: '. The thunder will stop and there will be no more hail, so you may know that the earth is the '
  - type: text
    content: Lord
  - type: text
    content: '’s. '
  '3':
  - type: text
    content: 'the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring a terrible plague on your livestock in the field—on your horses, donkeys and camels and on your cattle, sheep and goats. '
  '30':
  - type: text
    content: 'But I know that you and your officials still do not fear the '
  - type: text
    content: Lord
  - type: text
    content: ' God.”'
  '31':
  - type: text
    content: '(The flax and barley were destroyed, since the barley had headed and the flax was in bloom. '
  '32':
  - type: text
    content: The wheat and spelt, however, were not destroyed, because they ripen later.)
  '33':
  - type: text
    content: 'Then Moses left Pharaoh and went out of the city. He spread out his hands toward the '
  - type: text
    content: Lord
  - type: text
    content: '; the thunder and hail stopped, and the rain no longer poured down on the land. '
  '34':
  - type: text
    content: 'When Pharaoh saw that the rain and hail and thunder had stopped, he sinned again: He and his officials hardened their hearts. '
  '35':
  - type: text
    content: 'So Pharaoh’s heart was hard and he would not let the Israelites go, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said through Moses.'
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' will make a distinction between the livestock of Israel and that of Egypt, so that no animal belonging to the Israelites will die.’ ”'
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' set a time and said, “Tomorrow the '
  - type: text
    content: Lord
  - type: text
    content: ' will do this in the land.” '
  '6':
  - type: text
    content: 'And the next day the '
  - type: text
    content: Lord
  - type: text
    content: ' did it: All the livestock of the Egyptians died, but not one animal belonging to the Israelites died. '
  '7':
  - type: text
    content: Pharaoh investigated and found that not even one of the animals of the Israelites had died. Yet his heart was unyielding and he would not let the people go.
  - type: heading
    content: The Plague of Boils
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, “Take handfuls of soot from a furnace and have Moses toss it into the air in the presence of Pharaoh. '
  '9':
  - type: text
    content: It will become fine dust over the whole land of Egypt, and festering boils will break out on people and animals throughout the land.”
