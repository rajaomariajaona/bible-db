document_id: EXO.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Plague on Livestock
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Go to Pharaoh and say to him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of the Hebrews, says: “Let my people go, so that they may worship me.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they took soot from a furnace and stood before Pharaoh. Moses tossed it into the air, and festering boils broke out on people and animals. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The magicians could not stand before Moses because of the boils that were on them and on all the Egyptians. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hardened Pharaoh’s heart and he would not listen to Moses and Aaron, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Plague of Hail
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Get up early in the morning, confront Pharaoh and say to him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of the Hebrews, says: Let my people go, so that they may worship me, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'or this time I will send the full force of my plagues against you and against your officials and your people, so you may know that there is no one like me in all the earth. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For by now I could have stretched out my hand and struck you and your people with a plague that would have wiped you off the earth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But I have raised you up
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: have spared you
      marker-yv: yv-n
    - type: text
      text: ' for this very purpose, that I might show you my power and that my name might be proclaimed in all the earth. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You still set yourself against my people and will not let them go. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, at this time tomorrow I will send the worst hailstorm that has ever fallen on Egypt, from the day it was founded till now. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Give an order now to bring your livestock and everything you have in the field to a place of shelter, because the hail will fall on every person and animal that has not been brought in and is still out in the field, and they will die.’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you refuse to let them go and continue to hold them back, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those officials of Pharaoh who feared the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hurried to bring their slaves and their livestock inside. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But those who ignored the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' left their slaves and livestock in the field.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Stretch out your hand toward the sky so that hail will fall all over Egypt—on people and animals and on everything growing in the fields of Egypt.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Moses stretched out his staff toward the sky, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent thunder and hail, and lightning flashed down to the ground. So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rained hail on the land of Egypt; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hail fell and lightning flashed back and forth. It was the worst storm in all the land of Egypt since it had become a nation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Throughout Egypt hail struck everything in the fields—both people and animals; it beat down everything growing in the fields and stripped every tree. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The only place it did not hail was the land of Goshen, where the Israelites were.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Pharaoh summoned Moses and Aaron. “This time I have sinned,” he said to them. “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is in the right, and I and my people are in the wrong. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pray to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for we have had enough thunder and hail. I will let you go; you don’t have to stay any longer.”'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses replied, “When I have gone out of the city, I will spread out my hands in prayer to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. The thunder will stop and there will be no more hail, so you may know that the earth is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will bring a terrible plague on your livestock in the field—on your horses, donkeys and camels and on your cattle, sheep and goats. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I know that you and your officials still do not fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God.”'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(The flax and barley were destroyed, since the barley had headed and the flax was in bloom. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The wheat and spelt, however, were not destroyed, because they ripen later.)
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses left Pharaoh and went out of the city. He spread out his hands toward the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; the thunder and hail stopped, and the rain no longer poured down on the land. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Pharaoh saw that the rain and hail and thunder had stopped, he sinned again: He and his officials hardened their hearts. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Pharaoh’s heart was hard and he would not let the Israelites go, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said through Moses.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will make a distinction between the livestock of Israel and that of Egypt, so that no animal belonging to the Israelites will die.’ ”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' set a time and said, “Tomorrow the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will do this in the land.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the next day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did it: All the livestock of the Egyptians died, but not one animal belonging to the Israelites died. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pharaoh investigated and found that not even one of the animals of the Israelites had died. Yet his heart was unyielding and he would not let the people go.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Plague of Boils
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses and Aaron, “Take handfuls of soot from a furnace and have Moses toss it into the air in the presence of Pharaoh. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It will become fine dust over the whole land of Egypt, and festering boils will break out on people and animals throughout the land.”
