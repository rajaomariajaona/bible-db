verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 84
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 84:1-12 is numbered 84:2-13.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. According to '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: gittith.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a musical term'
      marker-yv: yv-n
    - type: text
      text: ' Of the Sons of Korah. A psalm.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How lovely is your dwelling place,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Better is one day in your courts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a thousand elsewhere;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would rather be a doorkeeper in the house of my God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than dwell in the tents of the wicked.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God is a sun and shield;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bestows favor and honor;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no good thing does he withhold
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from those whose walk is blameless.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: blessed is the one who trusts in you.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul yearns, even faints,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the courts of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my heart and my flesh cry out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the living God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the sparrow has found a home,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the swallow a nest for herself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where she may have her young—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a place near your altar,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, my King and my God.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed are those who dwell in your house;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are ever praising you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verse 8.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed are those whose strength is in you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose hearts are set on pilgrimage.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As they pass through the Valley of Baka,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they make it a place of springs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the autumn rains also cover it with pools.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: blessings
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They go from strength to strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till each appears before God in Zion.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear my prayer, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to me, God of Jacob.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look on our shield,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sovereign
      marker-yv: yv-n
    - type: text
      text: ' O God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look with favor on your anointed one.
