  - type: text
    content: How lovely is your dwelling place,
  - type: text
    content: Lord
  - type: text
    content: ' Almighty!'
  '10':
  - type: text
    content: Better is one day in your courts
  - type: text
    content: than a thousand elsewhere;
  - type: text
    content: I would rather be a doorkeeper in the house of my God
  - type: text
    content: than dwell in the tents of the wicked.
  '11':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' God is a sun and shield;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' bestows favor and honor;'
  - type: text
    content: no good thing does he withhold
  - type: text
    content: from those whose walk is blameless.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: blessed is the one who trusts in you.
  '2':
  - type: text
    content: My soul yearns, even faints,
  - type: text
    content: 'for the courts of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: my heart and my flesh cry out
  - type: text
    content: for the living God.
  '3':
  - type: text
    content: Even the sparrow has found a home,
  - type: text
    content: and the swallow a nest for herself,
  - type: text
    content: where she may have her young—
  - type: text
    content: a place near your altar,
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, my King and my God.'
  '4':
  - type: text
    content: Blessed are those who dwell in your house;
  - type: text
    content: they are ever praising you.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 8.
  '5':
  - type: text
    content: Blessed are those whose strength is in you,
  - type: text
    content: whose hearts are set on pilgrimage.
  '6':
  - type: text
    content: As they pass through the Valley of Baka,
  - type: text
    content: they make it a place of springs;
  - type: text
    content: the autumn rains also cover it with pools.
  - type: note
    content: Or blessings
  '7':
  - type: text
    content: They go from strength to strength,
  - type: text
    content: till each appears before God in Zion.
  '8':
  - type: text
    content: 'Hear my prayer, '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty;'
  - type: text
    content: listen to me, God of Jacob.
  '9':
  - type: text
    content: Look on our shield,
  - type: note
    content: Or sovereign
  - type: text
    content: ' O God;'
  - type: text
    content: look with favor on your anointed one.
