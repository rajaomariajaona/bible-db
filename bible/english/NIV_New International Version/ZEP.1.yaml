document_id: ZEP.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that came to Zephaniah son of Cushi, the son of Gedaliah, the son of Amariah, the son of Hezekiah, during the reign of Josiah son of Amon king of Judah:'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Judgment on the Whole Earth in the Day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “On that day,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “a cry will go up from the Fish Gate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wailing from the New Quarter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a loud crash from the hills.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Wail, you who live in the market district
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Mortar
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all your merchants will be wiped out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who trade with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' silver will be destroyed.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: At that time I will search Jerusalem with lamps
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and punish those who are complacent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who are like wine left on its dregs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'who think, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will do nothing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: either good or bad.’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Their wealth will be plundered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their houses demolished.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they build houses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will not live in them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though they plant vineyards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will not drink the wine.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The great day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is near—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: near and coming quickly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The cry on the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is bitter;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Mighty Warrior shouts his battle cry.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: That day will be a day of wrath—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day of distress and anguish,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: a day of trouble and ruin,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a day of darkness and gloom,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: a day of clouds and blackness—
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: a day of trumpet and battle cry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: against the fortified cities
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and against the corner towers.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “I will bring such distress on all people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they will grope about like those who are blind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because they have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their blood will be poured out like dust
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their entrails like dung.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Neither their silver nor their gold
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be able to save them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'on the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s wrath.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the fire of his jealousy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the whole earth will be consumed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he will make a sudden end
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of all who live on the earth.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “I will sweep away everything
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the face of the earth,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “I will sweep away both man and beast;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sweep away the birds in the sky
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fish in the sea—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the idols that cause the wicked to stumble.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this line is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When I destroy all mankind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the face of the earth,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “I will stretch out my hand against Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and against all who live in Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy every remnant of Baal worship in this place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the very names of the idolatrous priests—
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: those who bow down on the roofs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to worship the starry host,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'those who bow down and swear by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and who also swear by Molek,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Malkam
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'those who turn back from following the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and neither seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' nor inquire of him.”'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Be silent before the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is near.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has prepared a sacrifice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has consecrated those he has invited.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“On the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s sacrifice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will punish the officials
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the king’s sons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all those clad
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in foreign clothes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: On that day I will punish
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who avoid stepping on the threshold,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See 1 Samuel 5:5.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who fill the temple of their gods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with violence and deceit.
