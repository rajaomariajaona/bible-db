verses:
  '1':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Zephaniah son of Cushi, the son of Gedaliah, the son of Amariah, the son of Hezekiah, during the reign of Josiah son of Amon king of Judah:'
  - type: heading
    content: Judgment on the Whole Earth in the Day of the Lord
  '10':
  - type: text
    content: “On that day,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “a cry will go up from the Fish Gate,
  - type: text
    content: wailing from the New Quarter,
  - type: text
    content: and a loud crash from the hills.
  '11':
  - type: text
    content: Wail, you who live in the market district
  - type: note
    content: Or the Mortar
  - type: text
    content: ;
  - type: text
    content: all your merchants will be wiped out,
  - type: text
    content: all who trade with
  - type: note
    content: Or in
  - type: text
    content: ' silver will be destroyed.'
  '12':
  - type: text
    content: At that time I will search Jerusalem with lamps
  - type: text
    content: and punish those who are complacent,
  - type: text
    content: who are like wine left on its dregs,
  - type: text
    content: 'who think, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' will do nothing,'
  - type: text
    content: either good or bad.’
  '13':
  - type: text
    content: Their wealth will be plundered,
  - type: text
    content: their houses demolished.
  - type: text
    content: Though they build houses,
  - type: text
    content: they will not live in them;
  - type: text
    content: though they plant vineyards,
  - type: text
    content: they will not drink the wine.”
  '14':
  - type: text
    content: 'The great day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near—'
  - type: text
    content: near and coming quickly.
  - type: text
    content: 'The cry on the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is bitter;'
  - type: text
    content: the Mighty Warrior shouts his battle cry.
  '15':
  - type: text
    content: That day will be a day of wrath—
  - type: text
    content: a day of distress and anguish,
  - type: text
    content: a day of trouble and ruin,
  - type: text
    content: a day of darkness and gloom,
  - type: text
    content: a day of clouds and blackness—
  '16':
  - type: text
    content: a day of trumpet and battle cry
  - type: text
    content: against the fortified cities
  - type: text
    content: and against the corner towers.
  '17':
  - type: text
    content: “I will bring such distress on all people
  - type: text
    content: that they will grope about like those who are blind,
  - type: text
    content: 'because they have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Their blood will be poured out like dust
  - type: text
    content: and their entrails like dung.
  '18':
  - type: text
    content: Neither their silver nor their gold
  - type: text
    content: will be able to save them
  - type: text
    content: 'on the day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s wrath.”
  - type: text
    content: In the fire of his jealousy
  - type: text
    content: the whole earth will be consumed,
  - type: text
    content: for he will make a sudden end
  - type: text
    content: of all who live on the earth.
  '2':
  - type: text
    content: “I will sweep away everything
  - type: text
    content: from the face of the earth,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: “I will sweep away both man and beast;
  - type: text
    content: I will sweep away the birds in the sky
  - type: text
    content: and the fish in the sea—
  - type: text
    content: and the idols that cause the wicked to stumble.”
  - type: note
    content: The meaning of the Hebrew for this line is uncertain.
  - type: text
    content: “When I destroy all mankind
  - type: text
    content: on the face of the earth,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  '4':
  - type: text
    content: “I will stretch out my hand against Judah
  - type: text
    content: and against all who live in Jerusalem.
  - type: text
    content: I will destroy every remnant of Baal worship in this place,
  - type: text
    content: the very names of the idolatrous priests—
  '5':
  - type: text
    content: those who bow down on the roofs
  - type: text
    content: to worship the starry host,
  - type: text
    content: 'those who bow down and swear by the '
  - type: text
    content: Lord
  - type: text
    content: and who also swear by Molek,
  - type: note
    content: Hebrew Malkam
  '6':
  - type: text
    content: 'those who turn back from following the '
  - type: text
    content: Lord
  - type: text
    content: 'and neither seek the '
  - type: text
    content: Lord
  - type: text
    content: ' nor inquire of him.”'
  '7':
  - type: text
    content: 'Be silent before the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'for the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near.'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has prepared a sacrifice;'
  - type: text
    content: he has consecrated those he has invited.
  '8':
  - type: text
    content: '“On the day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s sacrifice
  - type: text
    content: I will punish the officials
  - type: text
    content: and the king’s sons
  - type: text
    content: and all those clad
  - type: text
    content: in foreign clothes.
  '9':
  - type: text
    content: On that day I will punish
  - type: text
    content: all who avoid stepping on the threshold,
  - type: note
    content: See 1 Samuel 5:5.
  - type: text
    content: who fill the temple of their gods
  - type: text
    content: with violence and deceit.
