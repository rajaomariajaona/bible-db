document_id: MIC.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Leaders and Prophets Rebuked
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen, you leaders of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you rulers of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should you not embrace justice,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who build Zion with bloodshed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Jerusalem with wickedness.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her leaders judge for a bribe,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her priests teach for a price,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her prophets tell fortunes for money.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet they look for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s support and say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“Is not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' among us?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No disaster will come upon us.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore because of you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Zion will be plowed like a field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem will become a heap of rubble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the temple hill a mound overgrown with thickets.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who hate good and love evil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who tear the skin from my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the flesh from their bones;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who eat my people’s flesh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strip off their skin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and break their bones in pieces;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who chop them up like meat for the pan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like flesh for the pot?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then they will cry out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he will not answer them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At that time he will hide his face from them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the evil they have done.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As for the prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who lead my people astray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they proclaim ‘peace’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if they have something to eat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but prepare to wage war against anyone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who refuses to feed them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore night will come over you, without visions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and darkness, without divination.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun will set for the prophets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the day will go dark for them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The seers will be ashamed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the diviners disgraced.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will all cover their faces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because there is no answer from God.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as for me, I am filled with power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'with the Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with justice and might,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to declare to Jacob his transgression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to Israel his sin.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear this, you leaders of Jacob,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you rulers of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who despise justice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and distort all that is right;
