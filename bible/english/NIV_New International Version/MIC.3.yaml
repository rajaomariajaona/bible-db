document_id: MIC.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Leaders and Prophets Rebuked
  - type: text
    content: Then I said,
  - type: text
    content: “Listen, you leaders of Jacob,
  - type: text
    content: you rulers of Israel.
  - type: text
    content: Should you not embrace justice,
  '10':
  - type: text
    content: who build Zion with bloodshed,
  - type: text
    content: and Jerusalem with wickedness.
  '11':
  - type: text
    content: Her leaders judge for a bribe,
  - type: text
    content: her priests teach for a price,
  - type: text
    content: and her prophets tell fortunes for money.
  - type: text
    content: 'Yet they look for the '
  - type: text
    content: Lord
  - type: text
    content: ’s support and say,
  - type: text
    content: '“Is not the '
  - type: text
    content: Lord
  - type: text
    content: ' among us?'
  - type: text
    content: No disaster will come upon us.”
  '12':
  - type: text
    content: Therefore because of you,
  - type: text
    content: Zion will be plowed like a field,
  - type: text
    content: Jerusalem will become a heap of rubble,
  - type: text
    content: the temple hill a mound overgrown with thickets.
  '2':
  - type: text
    content: you who hate good and love evil;
  - type: text
    content: who tear the skin from my people
  - type: text
    content: and the flesh from their bones;
  '3':
  - type: text
    content: who eat my people’s flesh,
  - type: text
    content: strip off their skin
  - type: text
    content: and break their bones in pieces;
  - type: text
    content: who chop them up like meat for the pan,
  - type: text
    content: like flesh for the pot?”
  '4':
  - type: text
    content: 'Then they will cry out to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but he will not answer them.
  - type: text
    content: At that time he will hide his face from them
  - type: text
    content: because of the evil they have done.
  '5':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “As for the prophets
  - type: text
    content: who lead my people astray,
  - type: text
    content: they proclaim ‘peace’
  - type: text
    content: if they have something to eat,
  - type: text
    content: but prepare to wage war against anyone
  - type: text
    content: who refuses to feed them.
  '6':
  - type: text
    content: Therefore night will come over you, without visions,
  - type: text
    content: and darkness, without divination.
  - type: text
    content: The sun will set for the prophets,
  - type: text
    content: and the day will go dark for them.
  '7':
  - type: text
    content: The seers will be ashamed
  - type: text
    content: and the diviners disgraced.
  - type: text
    content: They will all cover their faces
  - type: text
    content: because there is no answer from God.”
  '8':
  - type: text
    content: But as for me, I am filled with power,
  - type: text
    content: 'with the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and with justice and might,
  - type: text
    content: to declare to Jacob his transgression,
  - type: text
    content: to Israel his sin.
  '9':
  - type: text
    content: Hear this, you leaders of Jacob,
  - type: text
    content: you rulers of Israel,
  - type: text
    content: who despise justice
  - type: text
    content: and distort all that is right;
