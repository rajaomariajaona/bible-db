document_id: JOB.30
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “But now they mock me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: men younger than I,
- type: usfm
  marker: q1
  children:
  - type: text
    text: whose fathers I would have disdained
- type: usfm
  marker: q2
  children:
  - type: text
    text: to put with my sheep dogs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Of what use was the strength of their hands to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since their vigor had gone from them?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Haggard from want and hunger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they roamed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gnawed
    marker-yv: yv-n
  - type: text
    text: ' the parched land'
- type: usfm
  marker: q2
  children:
  - type: text
    text: in desolate wastelands at night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In the brush they gathered salt herbs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their food
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fuel
    marker-yv: yv-n
  - type: text
    text: ' was the root of the broom bush.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They were banished from human society,
- type: usfm
  marker: q2
  children:
  - type: text
    text: shouted at as if they were thieves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They were forced to live in the dry stream beds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: among the rocks and in holes in the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They brayed among the bushes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and huddled in the undergrowth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A base and nameless brood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they were driven out of the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “And now those young men mock me in song;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have become a byword among them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They detest me and keep their distance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not hesitate to spit in my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Now that God has unstrung my bow and afflicted me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they throw off restraint in my presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On my right the tribe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' attacks;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they lay snares for my feet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they build their siege ramps against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They break up my road;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they succeed in destroying me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘No one can help him,’ they say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They advance as through a gaping breach;
- type: usfm
  marker: q2
  children:
  - type: text
    text: amid the ruins they come rolling in.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Terrors overwhelm me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my dignity is driven away as by the wind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my safety vanishes like a cloud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “And now my life ebbs away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: days of suffering grip me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Night pierces my bones;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my gnawing pains never rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: In his great power God becomes like clothing to me
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: power he grasps my clothing
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he binds me like the neck of my garment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He throws me into the mud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I am reduced to dust and ashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “I cry out to you, God, but you do not answer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I stand up, but you merely look at me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: You turn on me ruthlessly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the might of your hand you attack me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You snatch me up and drive me before the wind;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you toss me about in the storm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I know you will bring me down to death,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the place appointed for all the living.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Surely no one lays a hand on a broken man
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he cries for help in his distress.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Have I not wept for those in trouble?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has not my soul grieved for the poor?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Yet when I hoped for good, evil came;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I looked for light, then came darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The churning inside me never stops;
- type: usfm
  marker: q2
  children:
  - type: text
    text: days of suffering confront me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I go about blackened, but not by the sun;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I stand up in the assembly and cry for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: I have become a brother of jackals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a companion of owls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: My skin grows black and peels;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my body burns with fever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: My lyre is tuned to mourning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my pipe to the sound of wailing.
