document_id: JOB.30,111
type_code: eng
verses:
  '1':
  - type: text
    content: “But now they mock me,
  - type: text
    content: men younger than I,
  - type: text
    content: whose fathers I would have disdained
  - type: text
    content: to put with my sheep dogs.
  '10':
  - type: text
    content: They detest me and keep their distance;
  - type: text
    content: they do not hesitate to spit in my face.
  '11':
  - type: text
    content: Now that God has unstrung my bow and afflicted me,
  - type: text
    content: they throw off restraint in my presence.
  '12':
  - type: text
    content: On my right the tribe
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' attacks;'
  - type: text
    content: they lay snares for my feet,
  - type: text
    content: they build their siege ramps against me.
  '13':
  - type: text
    content: They break up my road;
  - type: text
    content: they succeed in destroying me.
  - type: text
    content: ‘No one can help him,’ they say.
  '14':
  - type: text
    content: They advance as through a gaping breach;
  - type: text
    content: amid the ruins they come rolling in.
  '15':
  - type: text
    content: Terrors overwhelm me;
  - type: text
    content: my dignity is driven away as by the wind,
  - type: text
    content: my safety vanishes like a cloud.
  '16':
  - type: text
    content: “And now my life ebbs away;
  - type: text
    content: days of suffering grip me.
  '17':
  - type: text
    content: Night pierces my bones;
  - type: text
    content: my gnawing pains never rest.
  '18':
  - type: text
    content: In his great power God becomes like clothing to me
  - type: note
    content: Hebrew; Septuagint power he grasps my clothing
  - type: text
    content: ;
  - type: text
    content: he binds me like the neck of my garment.
  '19':
  - type: text
    content: He throws me into the mud,
  - type: text
    content: and I am reduced to dust and ashes.
  '2':
  - type: text
    content: Of what use was the strength of their hands to me,
  - type: text
    content: since their vigor had gone from them?
  '20':
  - type: text
    content: “I cry out to you, God, but you do not answer;
  - type: text
    content: I stand up, but you merely look at me.
  '21':
  - type: text
    content: You turn on me ruthlessly;
  - type: text
    content: with the might of your hand you attack me.
  '22':
  - type: text
    content: You snatch me up and drive me before the wind;
  - type: text
    content: you toss me about in the storm.
  '23':
  - type: text
    content: I know you will bring me down to death,
  - type: text
    content: to the place appointed for all the living.
  '24':
  - type: text
    content: “Surely no one lays a hand on a broken man
  - type: text
    content: when he cries for help in his distress.
  '25':
  - type: text
    content: Have I not wept for those in trouble?
  - type: text
    content: Has not my soul grieved for the poor?
  '26':
  - type: text
    content: Yet when I hoped for good, evil came;
  - type: text
    content: when I looked for light, then came darkness.
  '27':
  - type: text
    content: The churning inside me never stops;
  - type: text
    content: days of suffering confront me.
  '28':
  - type: text
    content: I go about blackened, but not by the sun;
  - type: text
    content: I stand up in the assembly and cry for help.
  '29':
  - type: text
    content: I have become a brother of jackals,
  - type: text
    content: a companion of owls.
  '3':
  - type: text
    content: Haggard from want and hunger,
  - type: text
    content: they roamed
  - type: note
    content: Or gnawed
  - type: text
    content: ' the parched land'
  - type: text
    content: in desolate wastelands at night.
  '30':
  - type: text
    content: My skin grows black and peels;
  - type: text
    content: my body burns with fever.
  '31':
  - type: text
    content: My lyre is tuned to mourning,
  - type: text
    content: and my pipe to the sound of wailing.
  '4':
  - type: text
    content: In the brush they gathered salt herbs,
  - type: text
    content: and their food
  - type: note
    content: Or fuel
  - type: text
    content: ' was the root of the broom bush.'
  '5':
  - type: text
    content: They were banished from human society,
  - type: text
    content: shouted at as if they were thieves.
  '6':
  - type: text
    content: They were forced to live in the dry stream beds,
  - type: text
    content: among the rocks and in holes in the ground.
  '7':
  - type: text
    content: They brayed among the bushes
  - type: text
    content: and huddled in the undergrowth.
  '8':
  - type: text
    content: A base and nameless brood,
  - type: text
    content: they were driven out of the land.
  '9':
  - type: text
    content: “And now those young men mock me in song;
  - type: text
    content: I have become a byword among them.
