    content: Psalm 29
  - type: text
    content: A psalm of David.
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ', you heavenly beings,'
  - type: text
    content: 'ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' glory and strength.'
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' sits enthroned over the flood;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is enthroned as King forever.'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gives strength to his people;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' blesses his people with peace.'
  '2':
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' the glory due his name;'
  - type: text
    content: 'worship the '
  - type: text
    content: Lord
  - type: text
    content: ' in the splendor of his'
  - type: note
    content: Or Lord with the splendor of
  - type: text
    content: ' holiness.'
  '3':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' is over the waters;'
  - type: text
    content: the God of glory thunders,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' thunders over the mighty waters.'
  '4':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' is powerful;'
  - type: text
    content: 'the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' is majestic.'
  '5':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' breaks the cedars;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' breaks in pieces the cedars of Lebanon.'
  '6':
  - type: text
    content: He makes Lebanon leap like a calf,
  - type: text
    content: Sirion
  - type: note
    content: That is, Mount Hermon
  - type: text
    content: ' like a young wild ox.'
  '7':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' strikes'
  - type: text
    content: with flashes of lightning.
  '8':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' shakes the desert;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' shakes the Desert of Kadesh.'
  '9':
  - type: text
    content: 'The voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' twists the oaks'
  - type: note
    content: Or Lord makes the deer give birth
  - type: text
    content: and strips the forests bare.
  - type: text
    content: And in his temple all cry, “Glory!”
