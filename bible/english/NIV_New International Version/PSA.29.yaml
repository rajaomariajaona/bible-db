document_id: PSA.29,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 29
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ascribe to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you heavenly beings,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'ascribe to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' glory and strength.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sits enthroned over the flood;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is enthroned as King forever.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives strength to his people;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' blesses his people with peace.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ascribe to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the glory due his name;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the splendor of his'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' with the splendor of'
      marker-yv: yv-n
    - type: text
      text: ' holiness.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is over the waters;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of glory thunders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' thunders over the mighty waters.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is powerful;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is majestic.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' breaks the cedars;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' breaks in pieces the cedars of Lebanon.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes Lebanon leap like a calf,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sirion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Mount Hermon
      marker-yv: yv-n
    - type: text
      text: ' like a young wild ox.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' strikes'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with flashes of lightning.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shakes the desert;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shakes the Desert of Kadesh.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The voice of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' twists the oaks'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' makes the deer give birth'
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and strips the forests bare.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in his temple all cry, “Glory!”
