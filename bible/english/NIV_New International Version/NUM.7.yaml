  - type: text
    text: 'The total number of animals for the burnt offering came to twelve young bulls, twelve rams and twelve male lambs a year old, together with their grain offering. Twelve male goats were used for the sin offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: The total number of animals for the sacrifice of the fellowship offering came to twenty-four oxen, sixty rams, sixty male goats and sixty male lambs a year old. These were the offerings for the dedication of the altar after it was anointed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '89'
  - type: text
    text: 'When Moses entered the tent of meeting to speak with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', he heard the voice speaking to him from between the two cherubim above the atonement cover on the ark of the covenant law. In this way the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to him.'
