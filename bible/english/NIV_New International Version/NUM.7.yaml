    content: On the twelfth day Ahira son of Enan, the leader of the people of Naphtali, brought his offering.
  '79':
  - type: text
    content: 'His offering was one silver plate weighing a hundred and thirty shekels and one silver sprinkling bowl weighing seventy shekels, both according to the sanctuary shekel, each filled with the finest flour mixed with olive oil as a grain offering; '
  '8':
  - type: text
    content: 'and he gave four carts and eight oxen to the Merarites, as their work required. They were all under the direction of Ithamar son of Aaron, the priest. '
  '80':
