verses:
  '1':
  - type: heading
    content: Offerings at the Dedication of the Tabernacle
  - type: text
    content: 'When Moses finished setting up the tabernacle, he anointed and consecrated it and all its furnishings. He also anointed and consecrated the altar and all its utensils. '
  '10':
  - type: text
    content: 'When the altar was anointed, the leaders brought their offerings for its dedication and presented them before the altar. '
  '11':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Moses, “Each day one leader is to bring his offering for the dedication of the altar.”'
  '12':
  - type: text
    content: The one who brought his offering on the first day was Nahshon son of Amminadab of the tribe of Judah.
  '13':
  - type: text
    content: His offering was one silver plate weighing a hundred and thirty shekels
  - type: note
    content: That is, about 3 1/4 pounds or about 1.5 kilograms; also elsewhere in this chapter
  - type: text
    content: ' and one silver sprinkling bowl weighing seventy shekels,'
  - type: note
    content: That is, about 1 3/4 pounds or about 800 grams; also elsewhere in this chapter
  - type: text
    content: ' both according to the sanctuary shekel, each filled with the finest flour mixed with olive oil as a grain offering; '
  '14':
  - type: text
    content: one gold dish weighing ten shekels,
  - type: note
    content: That is, about 4 ounces or about 115 grams; also elsewhere in this chapter
  - type: text
    content: ' filled with incense; '
  '15':
  - type: text
    content: 'one young bull, one ram and one male lamb a year old for a burnt offering; '
  '16':
  - type: text
    content: one male goat for a sin offering
  - type: note
    content: Or purification offering; also elsewhere in this chapter
  - type: text
    content: '; '
  '17':
  - type: text
    content: and two oxen, five rams, five male goats and five male lambs a year old to be sacrificed as a fellowship offering. This was the offering of Nahshon son of Amminadab.
  '18':
  - type: text
    content: On the second day Nethanel son of Zuar, the leader of Issachar, brought his offering.
  '19':
  - type: text
    content: 'The offering he brought was one silver plate weighing a hundred and thirty shekels and one silver sprinkling bowl weighing seventy shekels, both according to the sanctuary shekel, each filled with the finest flour mixed with olive oil as a grain offering; '
  '2':
  - type: text
    content: 'Then the leaders of Israel, the heads of families who were the tribal leaders in charge of those who were counted, made offerings. '
  '20':
  - type: text
    content: 'one gold dish weighing ten shekels, filled with incense; '
  '21':
