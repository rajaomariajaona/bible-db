  '84':
  - type: text
    content: 'These were the offerings of the Israelite leaders for the dedication of the altar when it was anointed: twelve silver plates, twelve silver sprinkling bowls and twelve gold dishes. '
  '85':
  - type: text
    content: Each silver plate weighed a hundred and thirty shekels, and each sprinkling bowl seventy shekels. Altogether, the silver dishes weighed two thousand four hundred shekels,
  - type: note
    content: That is, about 60 pounds or about 28 kilograms
  - type: text
    content: ' according to the sanctuary shekel. '
  '86':
  - type: text
    content: The twelve gold dishes filled with incense weighed ten shekels each, according to the sanctuary shekel. Altogether, the gold dishes weighed a hundred and twenty shekels.
  - type: note
    content: That is, about 3 pounds or about 1.4 kilograms
  - type: text
    content: ' '
  '87':
  - type: text
    content: 'The total number of animals for the burnt offering came to twelve young bulls, twelve rams and twelve male lambs a year old, together with their grain offering. Twelve male goats were used for the sin offering. '
  '88':
  - type: text
    content: The total number of animals for the sacrifice of the fellowship offering came to twenty-four oxen, sixty rams, sixty male goats and sixty male lambs a year old. These were the offerings for the dedication of the altar after it was anointed.
  '89':
  - type: text
    content: 'When Moses entered the tent of meeting to speak with the '
  - type: text
    content: Lord
  - type: text
    content: ', he heard the voice speaking to him from between the two cherubim above the atonement cover on the ark of the covenant law. In this way the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to him.'
  '9':
  - type: text
    content: But Moses did not give any to the Kohathites, because they were to carry on their shoulders the holy things, for which they were responsible.
