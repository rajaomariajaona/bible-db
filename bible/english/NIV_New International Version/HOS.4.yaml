  children:
  - type: text
    text: The Charge Against Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you Israelites,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has a charge to bring'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'against you who live in the land:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “There is no faithfulness, no love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no acknowledgment of God in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: There is only cursing,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, to pronounce a curse on
    marker-yv: yv-n
  - type: text
    text: ' lying and murder,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: stealing and adultery;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they break all bounds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bloodshed follows bloodshed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Because of this the land dries up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all who live in it waste away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the beasts of the field, the birds in the sky
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fish in the sea are swept away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “But let no one bring a charge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let no one accuse another,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your people are like those
- type: usfm
  marker: q2
  children:
  - type: text
    text: who bring charges against a priest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You stumble day and night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the prophets stumble with you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I will destroy your mother—
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: my people are destroyed from lack of knowledge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Because you have rejected knowledge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I also reject you as my priests;
- type: usfm
  marker: q1
  children:
  - type: text
    text: because you have ignored the law of your God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I also will ignore your children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The more priests there were,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the more they sinned against me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they exchanged their glorious God
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Syriac (see also an ancient Hebrew scribal tradition); Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me; / I will exchange their glory
    marker-yv: yv-n
  - type: text
    text: ' for something disgraceful.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They feed on the sins of my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: and relish their wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And it will be: Like people, like priests.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will punish both of them for their ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: and repay them for their deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “They will eat but not have enough;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will engage in prostitution but not flourish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'because they have deserted the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to give themselves '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: to prostitution;
- type: usfm
  marker: q1
  children:
  - type: text
    text: old wine and new wine
- type: usfm
  marker: q2
  children:
  - type: text
    text: take away their understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: My people consult a wooden idol,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a diviner’s rod speaks to them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A spirit of prostitution leads them astray;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are unfaithful to their God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They sacrifice on the mountaintops
- type: usfm
  marker: q2
  children:
  - type: text
    text: and burn offerings on the hills,
- type: usfm
  marker: q1
  children:
  - type: text
    text: under oak, poplar and terebinth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the shade is pleasant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore your daughters turn to prostitution
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your daughters-in-law to adultery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “I will not punish your daughters
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they turn to prostitution,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor your daughters-in-law
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they commit adultery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because the men themselves consort with harlots
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sacrifice with shrine prostitutes—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a people without understanding will come to ruin!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Though you, Israel, commit adultery,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let Judah become guilty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do not go to Gilgal;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not go up to Beth Aven.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth Aven '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'house of wickedness '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(a derogatory name for Bethel, which means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: house of God
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And do not swear, ‘As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives!’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The Israelites are stubborn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a stubborn heifer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'How then can the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' pasture them'
- type: usfm
  marker: q2
  children:
  - type: text
    text: like lambs in a meadow?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ephraim is joined to idols;
- type: usfm
  marker: q2
  children:
  - type: text
    text: leave him alone!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Even when their drinks are gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they continue their prostitution;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their rulers dearly love shameful ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A whirlwind will sweep them away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their sacrifices will bring them shame.
