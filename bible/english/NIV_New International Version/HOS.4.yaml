document_id: HOS.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Charge Against Israel
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', you Israelites,'
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ' has a charge to bring'
  - type: text
    content: 'against you who live in the land:'
  - type: text
    content: “There is no faithfulness, no love,
  - type: text
    content: no acknowledgment of God in the land.
  '10':
  - type: text
    content: “They will eat but not have enough;
  - type: text
    content: they will engage in prostitution but not flourish,
  - type: text
    content: 'because they have deserted the '
  - type: text
    content: Lord
  - type: text
    content: 'to give themselves '
  '11':
  - type: text
    content: to prostitution;
  - type: text
    content: old wine and new wine
  - type: text
    content: take away their understanding.
  '12':
  - type: text
    content: My people consult a wooden idol,
  - type: text
    content: and a diviner’s rod speaks to them.
  - type: text
    content: A spirit of prostitution leads them astray;
  - type: text
    content: they are unfaithful to their God.
  '13':
  - type: text
    content: They sacrifice on the mountaintops
  - type: text
    content: and burn offerings on the hills,
  - type: text
    content: under oak, poplar and terebinth,
  - type: text
    content: where the shade is pleasant.
  - type: text
    content: Therefore your daughters turn to prostitution
  - type: text
    content: and your daughters-in-law to adultery.
  '14':
  - type: text
    content: “I will not punish your daughters
  - type: text
    content: when they turn to prostitution,
  - type: text
    content: nor your daughters-in-law
  - type: text
    content: when they commit adultery,
  - type: text
    content: because the men themselves consort with harlots
  - type: text
    content: and sacrifice with shrine prostitutes—
  - type: text
    content: a people without understanding will come to ruin!
  '15':
  - type: text
    content: “Though you, Israel, commit adultery,
  - type: text
    content: do not let Judah become guilty.
  - type: text
    content: “Do not go to Gilgal;
  - type: text
    content: do not go up to Beth Aven.
  - type: note
    content: Beth Aven means house of wickedness (a derogatory name for Bethel, which means house of God).
  - type: text
    content: 'And do not swear, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives!’'
  '16':
  - type: text
    content: The Israelites are stubborn,
  - type: text
    content: like a stubborn heifer.
  - type: text
    content: 'How then can the '
  - type: text
    content: Lord
  - type: text
    content: ' pasture them'
  - type: text
    content: like lambs in a meadow?
  '17':
  - type: text
    content: Ephraim is joined to idols;
  - type: text
    content: leave him alone!
  '18':
  - type: text
    content: Even when their drinks are gone,
  - type: text
    content: they continue their prostitution;
  - type: text
    content: their rulers dearly love shameful ways.
  '19':
  - type: text
    content: A whirlwind will sweep them away,
  - type: text
    content: and their sacrifices will bring them shame.
  '2':
  - type: text
    content: There is only cursing,
  - type: note
    content: That is, to pronounce a curse on
  - type: text
    content: ' lying and murder,'
  - type: text
    content: stealing and adultery;
  - type: text
    content: they break all bounds,
  - type: text
    content: and bloodshed follows bloodshed.
  '3':
  - type: text
    content: Because of this the land dries up,
  - type: text
    content: and all who live in it waste away;
  - type: text
    content: the beasts of the field, the birds in the sky
  - type: text
    content: and the fish in the sea are swept away.
  '4':
  - type: text
    content: “But let no one bring a charge,
  - type: text
    content: let no one accuse another,
  - type: text
    content: for your people are like those
  - type: text
    content: who bring charges against a priest.
  '5':
  - type: text
    content: You stumble day and night,
  - type: text
    content: and the prophets stumble with you.
  - type: text
    content: So I will destroy your mother—
  '6':
  - type: text
    content: my people are destroyed from lack of knowledge.
  - type: text
    content: “Because you have rejected knowledge,
  - type: text
    content: I also reject you as my priests;
  - type: text
    content: because you have ignored the law of your God,
  - type: text
    content: I also will ignore your children.
  '7':
  - type: text
    content: The more priests there were,
  - type: text
    content: the more they sinned against me;
  - type: text
    content: they exchanged their glorious God
  - type: note
    content: Syriac (see also an ancient Hebrew scribal tradition); Masoretic Text me; / I will exchange their glory
  - type: text
    content: ' for something disgraceful.'
  '8':
  - type: text
    content: They feed on the sins of my people
  - type: text
    content: and relish their wickedness.
  '9':
  - type: text
    content: 'And it will be: Like people, like priests.'
  - type: text
    content: I will punish both of them for their ways
  - type: text
    content: and repay them for their deeds.
