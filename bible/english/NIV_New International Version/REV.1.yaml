document_id: REV.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prologue
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The revelation from Jesus Christ, which God gave him to show his servants what must soon take place. He made it known by sending his angel to his servant John, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'who testifies to everything he saw—that is, the word of God and the testimony of Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Blessed is the one who reads aloud the words of this prophecy, and blessed are those who hear it and take to heart what is written in it, because the time is near.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings and Doxology
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: John,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'To the seven churches in the province of Asia:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Grace and peace to you from him who is, and who was, and who is to come, and from the seven spirits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the sevenfold Spirit
    marker-yv: yv-n
  - type: text
    text: ' before his throne, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: and from Jesus Christ, who is the faithful witness, the firstborn from the dead, and the ruler of the kings of the earth.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'To him who loves us and has freed us from our sins by his blood, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and has made us to be a kingdom and priests to serve his God and Father—to him be glory and power for ever and ever! Amen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Look, he is coming with the clouds,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Daniel 7:13
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and “every eye will see him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even those who pierced him”;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all peoples on earth “will mourn because of him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zech. 12:10
    marker-yv: yv-n
- type: usfm
  marker: q4
  children:
  - type: text
    text: So shall it be! Amen.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I am the Alpha and the Omega,” says the Lord God, “who is, and who was, and who is to come, the Almighty.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: John’s Vision of Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I, John, your brother and companion in the suffering and kingdom and patient endurance that are ours in Jesus, was on the island of Patmos because of the word of God and the testimony of Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On the Lord’s Day I was in the Spirit, and I heard behind me a loud voice like a trumpet, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'which said: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Write on a scroll what you see and send it to the seven churches: to Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia and Laodicea.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I turned around to see the voice that was speaking to me. And when I turned I saw seven golden lampstands, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: and among the lampstands was someone like a son of man,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Daniel 7:13.
    marker-yv: yv-n
  - type: text
    text: ' dressed in a robe reaching down to his feet and with a golden sash around his chest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The hair on his head was white like wool, as white as snow, and his eyes were like blazing fire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'His feet were like bronze glowing in a furnace, and his voice was like the sound of rushing waters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: In his right hand he held seven stars, and coming out of his mouth was a sharp, double-edged sword. His face was like the sun shining in all its brilliance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When I saw him, I fell at his feet as though dead. Then he placed his right hand on me and said: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do not be afraid. I am the First and the Last.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the Living One; I was dead, and now look, I am alive for ever and ever! And I hold the keys of death and Hades.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Write, therefore, what you have seen, what is now and what will take place later.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The mystery of the seven stars that you saw in my right hand and of the seven golden lampstands is this: The seven stars are the angels'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: messengers
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of the seven churches, and the seven lampstands are the seven churches.
