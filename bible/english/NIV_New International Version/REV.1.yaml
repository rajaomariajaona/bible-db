document_id: REV.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Prologue
  - type: text
    content: 'The revelation from Jesus Christ, which God gave him to show his servants what must soon take place. He made it known by sending his angel to his servant John, '
  '10':
  - type: text
    content: 'On the Lord’s Day I was in the Spirit, and I heard behind me a loud voice like a trumpet, '
  '11':
  - type: text
    content: 'which said: '
  - type: text
    content: '“Write on a scroll what you see and send it to the seven churches: to Ephesus, Smyrna, Pergamum, Thyatira, Sardis, Philadelphia and Laodicea.”'
  '12':
  - type: text
    content: 'I turned around to see the voice that was speaking to me. And when I turned I saw seven golden lampstands, '
  '13':
  - type: text
    content: and among the lampstands was someone like a son of man,
  - type: note
    content: See Daniel 7:13.
  - type: text
    content: ' dressed in a robe reaching down to his feet and with a golden sash around his chest. '
  '14':
  - type: text
    content: 'The hair on his head was white like wool, as white as snow, and his eyes were like blazing fire. '
  '15':
  - type: text
    content: 'His feet were like bronze glowing in a furnace, and his voice was like the sound of rushing waters. '
  '16':
  - type: text
    content: In his right hand he held seven stars, and coming out of his mouth was a sharp, double-edged sword. His face was like the sun shining in all its brilliance.
  '17':
  - type: text
    content: 'When I saw him, I fell at his feet as though dead. Then he placed his right hand on me and said: '
  - type: text
    content: “Do not be afraid. I am the First and the Last.
  - type: text
    content: ' '
  '18':
  - type: text
    content: I am the Living One; I was dead, and now look, I am alive for ever and ever! And I hold the keys of death and Hades.
  '19':
  - type: text
    content: ' '
  - type: text
    content: “Write, therefore, what you have seen, what is now and what will take place later.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'who testifies to everything he saw—that is, the word of God and the testimony of Jesus Christ. '
  '20':
  - type: text
    content: 'The mystery of the seven stars that you saw in my right hand and of the seven golden lampstands is this: The seven stars are the angels'
  - type: note
    content: Or messengers
  - type: text
    content: ' '
  - type: text
    content: of the seven churches, and the seven lampstands are the seven churches.
  '3':
  - type: text
    content: Blessed is the one who reads aloud the words of this prophecy, and blessed are those who hear it and take to heart what is written in it, because the time is near.
  - type: heading
    content: Greetings and Doxology
  '4':
  - type: text
    content: John,
  - type: text
    content: 'To the seven churches in the province of Asia:'
  - type: text
    content: Grace and peace to you from him who is, and who was, and who is to come, and from the seven spirits
  - type: note
    content: That is, the sevenfold Spirit
  - type: text
    content: ' before his throne, '
  '5':
  - type: text
    content: and from Jesus Christ, who is the faithful witness, the firstborn from the dead, and the ruler of the kings of the earth.
  - type: text
    content: 'To him who loves us and has freed us from our sins by his blood, '
  '6':
  - type: text
    content: and has made us to be a kingdom and priests to serve his God and Father—to him be glory and power for ever and ever! Amen.
  '7':
  - type: text
    content: “Look, he is coming with the clouds,”
  - type: note
    content: Daniel 7:13
  - type: text
    content: and “every eye will see him,
  - type: text
    content: even those who pierced him”;
  - type: text
    content: and all peoples on earth “will mourn because of him.”
  - type: note
    content: Zech. 12:10
  - type: text
    content: So shall it be! Amen.
  '8':
  - type: text
    content: “I am the Alpha and the Omega,” says the Lord God, “who is, and who was, and who is to come, the Almighty.”
  - type: heading
    content: John’s Vision of Christ
  '9':
  - type: text
    content: 'I, John, your brother and companion in the suffering and kingdom and patient endurance that are ours in Jesus, was on the island of Patmos because of the word of God and the testimony of Jesus. '
