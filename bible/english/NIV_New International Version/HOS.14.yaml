document_id: HOS.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Repentance to Bring Blessing
  - type: note
    content: In Hebrew texts 14:1-9 is numbered 14:2-10.
  - type: text
    content: 'Return, Israel, to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.'
  - type: text
    content: Your sins have been your downfall!
  '2':
  - type: text
    content: Take words with you
  - type: text
    content: 'and return to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'Say to him:'
  - type: text
    content: “Forgive all our sins
  - type: text
    content: and receive us graciously,
  - type: text
    content: that we may offer the fruit of our lips.
  - type: note
    content: Or offer our lips as sacrifices of bulls
  '3':
  - type: text
    content: Assyria cannot save us;
  - type: text
    content: we will not mount warhorses.
  - type: text
    content: We will never again say ‘Our gods’
  - type: text
    content: to what our own hands have made,
  - type: text
    content: for in you the fatherless find compassion.”
  '4':
  - type: text
    content: “I will heal their waywardness
  - type: text
    content: and love them freely,
  - type: text
    content: for my anger has turned away from them.
  '5':
  - type: text
    content: I will be like the dew to Israel;
  - type: text
    content: he will blossom like a lily.
  - type: text
    content: Like a cedar of Lebanon
  - type: text
    content: he will send down his roots;
  '6':
  - type: text
    content: his young shoots will grow.
  - type: text
    content: His splendor will be like an olive tree,
  - type: text
    content: his fragrance like a cedar of Lebanon.
  '7':
  - type: text
    content: People will dwell again in his shade;
  - type: text
    content: they will flourish like the grain,
  - type: text
    content: they will blossom like the vine—
  - type: text
    content: Israel’s fame will be like the wine of Lebanon.
  '8':
  - type: text
    content: Ephraim, what more have I
  - type: note
    content: Or Hebrew; Septuagint What more has Ephraim
  - type: text
    content: ' to do with idols?'
  - type: text
    content: I will answer him and care for him.
  - type: text
    content: I am like a flourishing juniper;
  - type: text
    content: your fruitfulness comes from me.”
  '9':
  - type: text
    content: Who is wise? Let them realize these things.
  - type: text
    content: Who is discerning? Let them understand.
  - type: text
    content: 'The ways of the '
  - type: text
    content: Lord
  - type: text
    content: ' are right;'
  - type: text
    content: the righteous walk in them,
  - type: text
    content: but the rebellious stumble in them.
