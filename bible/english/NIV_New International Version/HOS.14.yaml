document_id: HOS.14,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Repentance to Bring Blessing
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 14:1-9 is numbered 14:2-10.
      marker-yv: yv-n
    - type: text
      text: 'Return, Israel, to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your sins have been your downfall!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take words with you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and return to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Say to him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Forgive all our sins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and receive us graciously,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that we may offer the fruit of our lips.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: offer our lips as sacrifices of bulls
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assyria cannot save us;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will not mount warhorses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will never again say ‘Our gods’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to what our own hands have made,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for in you the fatherless find compassion.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will heal their waywardness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and love them freely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my anger has turned away from them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be like the dew to Israel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will blossom like a lily.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a cedar of Lebanon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will send down his roots;
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his young shoots will grow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His splendor will be like an olive tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his fragrance like a cedar of Lebanon.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will dwell again in his shade;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will flourish like the grain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will blossom like the vine—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel’s fame will be like the wine of Lebanon.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim, what more have I
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: What more has Ephraim
      marker-yv: yv-n
    - type: text
      text: ' to do with idols?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will answer him and care for him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am like a flourishing juniper;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your fruitfulness comes from me.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is wise? Let them realize these things.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who is discerning? Let them understand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are right;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the righteous walk in them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the rebellious stumble in them.
