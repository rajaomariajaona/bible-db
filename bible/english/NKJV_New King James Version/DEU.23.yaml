document_id: DEU.23,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Those Excluded from the Congregation
  - type: text
    content: '“He who is emasculated by crushing or mutilation shall '
  - type: note
    content: Lev. 21:20; 22:24
  - type: text
    content: 'not enter the assembly of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '10':
  - type: note
    content: Lev. 15:16
  - type: text
    content: 'If there is any man among you who becomes unclean by some occurrence in the night, then he shall go outside the camp; he shall not come inside the camp. '
  '11':
  - type: text
    content: 'But it shall be, when evening comes, that '
  - type: note
    content: Lev. 15:5
  - type: text
    content: he shall wash with water; and when the sun sets, he may come into the camp.
  '12':
  - type: text
    content: '“Also you shall have a place outside the camp, where you may go out; '
  '13':
  - type: text
    content: 'and you shall have an implement among your equipment, and when you sit down outside, you shall dig with it and turn and cover your refuse. '
  '14':
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: Lev. 26:12; Deut. 7:21
  - type: text
    content: walks in the midst of your camp, to deliver you and give your enemies over to you; therefore your camp shall be holy, that He may see no unclean thing among you, and turn away from you.
  - type: heading
    content: Miscellaneous Laws
  '15':
  - type: note
    content: 1 Sam. 30:15
  - type: text
    content: '“You shall not give back to his master the slave who has escaped from his master to you. '
  '16':
  - type: text
    content: 'He may dwell with you in your midst, in the place which he chooses within one of your gates, where it seems best to him; '
  - type: note
    content: Ex. 22:21; Prov. 22:22
  - type: text
    content: you shall not oppress him.
  '17':
  - type: text
    content: '“There shall be no '
  - type: text
    content: ritual
  - type: text
    content: ' harlot of the daughters of Israel, or a '
  - type: note
    content: Gen. 19:5; 2 Kin. 23:7
  - type: text
    content: 'perverted one of the sons of Israel. '
  '18':
  - type: text
    content: 'You shall not bring the wages of a harlot or the price of a dog to the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God for any vowed offering, for both of these '
  - type: text
    content: are
  - type: text
    content: ' an abomination to the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  '19':
  - type: note
    content: Ex. 22:25; Lev. 25:35–37; Neh. 5:2–7; Ps. 15:5
  - type: text
    content: '“You shall not charge interest to your brother—interest on money '
  - type: text
    content: or
  - type: text
    content: ' food '
  - type: text
    content: or
  - type: text
    content: ' anything that is lent out at interest. '
  '2':
  - type: text
    content: '“One of illegitimate birth shall not enter the assembly of the '
  - type: heading
    content: Lord
  - type: text
    content: '; even to the tenth generation none of his '
  - type: text
    content: descendants
  - type: text
    content: ' shall enter the assembly of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  '20':
  - type: note
    content: Deut. 15:3
  - type: text
    content: 'To a foreigner you may charge interest, but to your brother you shall not charge interest, '
  - type: note
    content: Deut. 15:10
  - type: text
    content: 'that the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God may bless you in all to which you set your hand in the land which you are entering to possess.'
  '21':
  - type: note
    content: Num. 30:1, 2; Job 22:27; Ps. 61:8; Eccl. 5:4, 5; Matt. 5:33
  - type: text
    content: '“When you make a vow to the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, you shall not delay to pay it; for the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God will surely require it of you, and it would be sin to you. '
  '22':
  - type: text
    content: 'But if you abstain from vowing, it shall not be sin to you. '
  '23':
  - type: note
    content: Num. 30:2; Ps. 66:13, 14
  - type: text
    content: 'That which has gone from your lips you shall keep and perform, for you voluntarily vowed to the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God what you have promised with your mouth.'
  '24':
  - type: text
    content: '“When you come into your neighbor’s vineyard, you may eat your fill of grapes at your pleasure, but you shall not put '
  - type: text
    content: any
  - type: text
    content: ' in your container. '
  '25':
  - type: text
    content: 'When you come into your neighbor’s standing grain, '
  - type: note
    content: Matt. 12:1; Mark 2:23; Luke 6:1
  - type: text
    content: you may pluck the heads with your hand, but you shall not use a sickle on your neighbor’s standing grain.
  '3':
  - type: note
    content: Neh. 13:1, 2
  - type: text
    content: '“An Ammonite or Moabite shall not enter the assembly of the '
  - type: heading
    content: Lord
  - type: text
    content: '; even to the tenth generation none of his '
  - type: text
    content: descendants
  - type: text
    content: ' shall enter the assembly of the '
  - type: heading
    content: Lord
  - type: text
    content: ' forever, '
  '4':
  - type: note
    content: Deut. 2:27–30
  - type: text
    content: 'because they did not meet you with bread and water on the road when you came out of Egypt, and '
  - type: note
    content: Num. 22:5, 6; 23:7; Josh. 24:9; 2 Pet. 2:15; Jude 11
  - type: text
    content: 'because they hired against you Balaam the son of Beor from Pethor of Mesopotamia, to curse you. '
  '5':
  - type: text
    content: 'Nevertheless the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God would not listen to Balaam, but the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God turned the curse into a blessing for you, because the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God '
  - type: note
    content: Deut. 4:37
  - type: text
    content: 'loves you. '
  '6':
  - type: note
    content: Ezra 9:12
  - type: text
    content: You shall not seek their peace nor their prosperity all your days forever.
  '7':
  - type: text
    content: '“You shall not abhor an Edomite, '
  - type: note
    content: Gen. 25:24–26; Deut. 2:4, 8; Amos 1:11; Obad. 10, 12
  - type: text
    content: 'for he '
  - type: text
    content: is
  - type: text
    content: ' your brother. You shall not abhor an Egyptian, because '
  - type: note
    content: Ex. 22:21; 23:9; Lev. 19:34; Deut. 10:19
  - type: text
    content: 'you were an alien in his land. '
  '8':
  - type: text
    content: 'The children of the third generation born to them may enter the assembly of the '
  - type: heading
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Cleanliness of the Campsite
  '9':
  - type: text
    content: '“When the army goes out against your enemies, then keep yourself from every wicked thing. '
