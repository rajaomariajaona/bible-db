  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:25; Lev. 25:35–37; Neh. 5:2–7; Ps. 15:5
    marker-yv: yv-n
  - type: text
    text: '“You shall not charge interest to your brother—interest on money '
