  - type: text
    text: ' food '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or
  - type: text
    text: ' anything that is lent out at interest. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 15:3
    marker-yv: yv-n
  - type: text
    text: 'To a foreigner you may charge interest, but to your brother you shall not charge interest, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 15:10
    marker-yv: yv-n
  - type: text
    text: 'that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God may bless you in all to which you set your hand in the land which you are entering to possess.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 30:1, 2; Job 22:27; Ps. 61:8; Eccl. 5:4, 5; Matt. 5:33
    marker-yv: yv-n
  - type: text
    text: '“When you make a vow to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, you shall not delay to pay it; for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God will surely require it of you, and it would be sin to you. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But if you abstain from vowing, it shall not be sin to you. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 30:2; Ps. 66:13, 14
    marker-yv: yv-n
  - type: text
    text: 'That which has gone from your lips you shall keep and perform, for you voluntarily vowed to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God what you have promised with your mouth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“When you come into your neighbor’s vineyard, you may eat your fill of grapes at your pleasure, but you shall not put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any
  - type: text
    text: ' in your container. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When you come into your neighbor’s standing grain, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 12:1; Mark 2:23; Luke 6:1
    marker-yv: yv-n
  - type: text
    text: you may pluck the heads with your hand, but you shall not use a sickle on your neighbor’s standing grain.
