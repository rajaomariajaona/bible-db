  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“When the army goes out against your enemies, then keep yourself from every wicked thing. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 15:16
    marker-yv: yv-n
  - type: text
    text: 'If there is any man among you who becomes unclean by some occurrence in the night, then he shall go outside the camp; he shall not come inside the camp. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But it shall be, when evening comes, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 15:5
    marker-yv: yv-n
  - type: text
    text: he shall wash with water; and when the sun sets, he may come into the camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Also you shall have a place outside the camp, where you may go out; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and you shall have an implement among your equipment, and when you sit down outside, you shall dig with it and turn and cover your refuse. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:12; Deut. 7:21
    marker-yv: yv-n
  - type: text
    text: walks in the midst of your camp, to deliver you and give your enemies over to you; therefore your camp shall be holy, that He may see no unclean thing among you, and turn away from you.
