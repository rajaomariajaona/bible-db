document_id: JOS.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Memorial Stones
  - type: text
    content: 'And it came to pass, when all the people had completely crossed '
  - type: note
    content: Deut. 27:2; Josh. 3:17
  - type: text
    content: 'over the Jordan, that the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Joshua, saying: '
  '10':
  - type: text
    content: 'So the priests who bore the ark stood in the midst of the Jordan until everything was finished that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded Joshua to speak to the people, according to all that Moses had commanded Joshua; and the people hurried and crossed over. '
  '11':
  - type: text
    content: 'Then it came to pass, when all the people had completely crossed over, that the '
  - type: note
    content: Josh. 3:11; 6:11
  - type: text
    content: 'ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and the priests crossed over in the presence of the people. '
  '12':
  - type: text
    content: 'And '
  - type: note
    content: Num. 32:17, 20, 27, 28; Josh. 1:14
  - type: text
    content: 'the men of Reuben, the men of Gad, and half the tribe of Manasseh crossed over armed before the children of Israel, as Moses had spoken to them. '
  '13':
  - type: text
    content: 'About forty thousand prepared for war crossed over before the '
  - type: heading
    content: Lord
  - type: text
    content: ' for battle, to the plains of Jericho. '
  '14':
  - type: text
    content: 'On that day the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Josh. 3:7; 1 Chr. 29:25
  - type: text
    content: exalted Joshua in the sight of all Israel; and they feared him, as they had feared Moses, all the days of his life.
  '15':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Joshua, saying, '
  '16':
  - type: text
    content: '“Command the priests who bear '
  - type: note
    content: Ex. 25:16, 22
  - type: text
    content: 'the ark of the Testimony to come up from the Jordan.” '
  '17':
  - type: text
    content: 'Joshua therefore commanded the priests, saying, “Come up from the Jordan.” '
  '18':
  - type: text
    content: 'And it came to pass, when the priests who bore the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: ' had come from the midst of the Jordan, '
  - type: text
    content: and
  - type: text
    content: ' the soles of the priests’ feet touched the dry land, that the waters of the Jordan returned to their place '
  - type: note
    content: Josh. 3:15; 1 Chr. 12:15
  - type: text
    content: and overflowed all its banks as before.
  '19':
  - type: text
    content: 'Now the people came up from the Jordan on the tenth '
  - type: text
    content: day
  - type: text
    content: ' of the first month, and they camped '
  - type: note
    content: Josh. 5:9
  - type: text
    content: 'in Gilgal on the east border of Jericho. '
  '2':
  - type: note
    content: Josh. 3:12
  - type: text
    content: '“Take for yourselves twelve men from the people, one man from every tribe, '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: Deut. 11:30; Josh. 4:3; 5:9, 10
  - type: text
    content: 'those twelve stones which they took out of the Jordan, Joshua set up in Gilgal. '
  '21':
  - type: text
    content: 'Then he spoke to the children of Israel, saying: '
  - type: note
    content: Josh. 4:6
  - type: text
    content: '“When your children ask their fathers in time to come, saying, ‘What '
  - type: text
    content: are
  - type: text
    content: ' these stones?’ '
  '22':
  - type: text
    content: 'then you shall let your children know, saying, '
  - type: note
    content: Ex. 12:26, 27; 13:8–14; Deut. 26:5–9
  - type: text
    content: '‘Israel crossed over this Jordan on '
  - type: note
    content: Josh. 3:17
  - type: text
    content: 'dry land’; '
  '23':
  - type: text
    content: 'for the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God dried up the waters of the Jordan before you until you had crossed over, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God did to the Red Sea, '
  - type: note
    content: Ex. 14:21
  - type: text
    content: 'which He dried up before us until we had crossed over, '
  '24':
  - type: note
    content: 1 Kin. 8:42; 2 Kin. 19:19; Ps. 106:8
  - type: text
    content: 'that all the peoples of the earth may know the hand of the '
  - type: heading
    content: Lord
  - type: text
    content: ', that it '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: Ex. 15:16; 1 Chr. 29:12; Ps. 89:13
  - type: text
    content: 'mighty, that you may '
  - type: note
    content: Ex. 14:31; Deut. 6:2; Ps. 76:7; Jer. 10:7
  - type: text
    content: 'fear the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God forever.”'
  '3':
  - type: text
    content: 'and command them, saying, ‘Take for yourselves twelve stones from here, out of the midst of the Jordan, from the place where '
  - type: note
    content: Josh. 3:13
  - type: text
    content: 'the priests’ feet stood firm. You shall carry them over with you and leave them in '
  - type: note
    content: Josh. 4:19, 20
  - type: text
    content: the lodging place where you lodge tonight.’ ”
  '4':
  - type: text
    content: 'Then Joshua called the twelve men whom he had appointed from the children of Israel, one man from every tribe; '
  '5':
  - type: text
    content: 'and Joshua said to them: “Cross over before the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God into the midst of the Jordan, and each one of you take up a stone on his shoulder, according to the number of the tribes of the children of Israel, '
  '6':
  - type: text
    content: 'that this may be '
  - type: note
    content: Deut. 27:2; Ps. 103:2
  - type: text
    content: 'a sign among you '
  - type: note
    content: Ex. 12:26; 13:14; Deut. 6:20
  - type: text
    content: 'when your children ask in time to come, saying, ‘What do these stones '
  - type: text
    content: mean
  - type: text
    content: ' to you?’ '
  '7':
  - type: text
    content: 'Then you shall answer them that '
  - type: note
    content: Josh. 3:13, 16
  - type: text
    content: 'the waters of the Jordan were cut off before the ark of the covenant of the '
  - type: heading
    content: Lord
  - type: text
    content: '; when it crossed over the Jordan, the waters of the Jordan were cut off. And these stones shall be for '
  - type: note
    content: Ex. 12:14; Num. 16:40
  - type: text
    content: a memorial to the children of Israel forever.”
  '8':
  - type: text
    content: 'And the children of Israel did so, just as Joshua commanded, and took up twelve stones from the midst of the Jordan, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' had spoken to Joshua, according to the number of the tribes of the children of Israel, and carried them over with them to the place where they lodged, and laid them down there. '
  '9':
  - type: text
    content: Then Joshua set up twelve stones in the midst of the Jordan, in the place where the feet of the priests who bore the ark of the covenant stood; and they are there to this day.
