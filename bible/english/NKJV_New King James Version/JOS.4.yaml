document_id: JOS.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Memorial Stones
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And it came to pass, when all the people had completely crossed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 27:2; Josh. 3:17
    marker-yv: yv-n
  - type: text
    text: 'over the Jordan, that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Joshua, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:12
    marker-yv: yv-n
  - type: text
    text: '“Take for yourselves twelve men from the people, one man from every tribe, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and command them, saying, ‘Take for yourselves twelve stones from here, out of the midst of the Jordan, from the place where '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:13
    marker-yv: yv-n
  - type: text
    text: 'the priests’ feet stood firm. You shall carry them over with you and leave them in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 4:19, 20
    marker-yv: yv-n
  - type: text
    text: the lodging place where you lodge tonight.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Joshua called the twelve men whom he had appointed from the children of Israel, one man from every tribe; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and Joshua said to them: “Cross over before the ark of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God into the midst of the Jordan, and each one of you take up a stone on his shoulder, according to the number of the tribes of the children of Israel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'that this may be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 27:2; Ps. 103:2
    marker-yv: yv-n
  - type: text
    text: 'a sign among you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:26; 13:14; Deut. 6:20
    marker-yv: yv-n
  - type: text
    text: 'when your children ask in time to come, saying, ‘What do these stones '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mean
  - type: text
    text: ' to you?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then you shall answer them that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:13, 16
    marker-yv: yv-n
  - type: text
    text: 'the waters of the Jordan were cut off before the ark of the covenant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '; when it crossed over the Jordan, the waters of the Jordan were cut off. And these stones shall be for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:14; Num. 16:40
    marker-yv: yv-n
  - type: text
    text: a memorial to the children of Israel forever.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the children of Israel did so, just as Joshua commanded, and took up twelve stones from the midst of the Jordan, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had spoken to Joshua, according to the number of the tribes of the children of Israel, and carried them over with them to the place where they lodged, and laid them down there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Then Joshua set up twelve stones in the midst of the Jordan, in the place where the feet of the priests who bore the ark of the covenant stood; and they are there to this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So the priests who bore the ark stood in the midst of the Jordan until everything was finished that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had commanded Joshua to speak to the people, according to all that Moses had commanded Joshua; and the people hurried and crossed over. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then it came to pass, when all the people had completely crossed over, that the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:11; 6:11
    marker-yv: yv-n
  - type: text
    text: 'ark of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and the priests crossed over in the presence of the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 32:17, 20, 27, 28; Josh. 1:14
    marker-yv: yv-n
  - type: text
    text: 'the men of Reuben, the men of Gad, and half the tribe of Manasseh crossed over armed before the children of Israel, as Moses had spoken to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'About forty thousand prepared for war crossed over before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for battle, to the plains of Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On that day the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:7; 1 Chr. 29:25
    marker-yv: yv-n
  - type: text
    text: exalted Joshua in the sight of all Israel; and they feared him, as they had feared Moses, all the days of his life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Joshua, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Command the priests who bear '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:16, 22
    marker-yv: yv-n
  - type: text
    text: 'the ark of the Testimony to come up from the Jordan.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Joshua therefore commanded the priests, saying, “Come up from the Jordan.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And it came to pass, when the priests who bore the ark of the covenant of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had come from the midst of the Jordan, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' the soles of the priests’ feet touched the dry land, that the waters of the Jordan returned to their place '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:15; 1 Chr. 12:15
    marker-yv: yv-n
  - type: text
    text: and overflowed all its banks as before.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now the people came up from the Jordan on the tenth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the first month, and they camped '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 5:9
    marker-yv: yv-n
  - type: text
    text: 'in Gilgal on the east border of Jericho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 11:30; Josh. 4:3; 5:9, 10
    marker-yv: yv-n
  - type: text
    text: 'those twelve stones which they took out of the Jordan, Joshua set up in Gilgal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then he spoke to the children of Israel, saying: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 4:6
    marker-yv: yv-n
  - type: text
    text: '“When your children ask their fathers in time to come, saying, ‘What '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' these stones?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'then you shall let your children know, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:26, 27; 13:8–14; Deut. 26:5–9
    marker-yv: yv-n
  - type: text
    text: '‘Israel crossed over this Jordan on '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 3:17
    marker-yv: yv-n
  - type: text
    text: 'dry land’; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God dried up the waters of the Jordan before you until you had crossed over, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God did to the Red Sea, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 14:21
    marker-yv: yv-n
  - type: text
    text: 'which He dried up before us until we had crossed over, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 8:42; 2 Kin. 19:19; Ps. 106:8
    marker-yv: yv-n
  - type: text
    text: 'that all the peoples of the earth may know the hand of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', that it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 15:16; 1 Chr. 29:12; Ps. 89:13
    marker-yv: yv-n
  - type: text
    text: 'mighty, that you may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 14:31; Deut. 6:2; Ps. 76:7; Jer. 10:7
    marker-yv: yv-n
  - type: text
    text: 'fear the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God forever.”'
