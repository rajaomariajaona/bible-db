document_id: GEN.40,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Prisoners’ Dreams
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It came to pass after these things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:11, 13; Neh. 1:11
      marker-yv: yv-n
    - type: text
      text: 'butler and the baker of the king of Egypt offended their lord, the king of Egypt. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and in the vine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' three branches; it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' as though it budded, its blossoms shot forth, and its clusters brought forth ripe grapes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Pharaoh’s cup '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in my hand; and I took the grapes and pressed them into Pharaoh’s cup, and placed the cup in Pharaoh’s hand.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph said to him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:18; 41:12, 25; Judg. 7:14; Dan. 2:36; 4:18, 19
      marker-yv: yv-n
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the interpretation of it: The three branches '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:18; 42:17
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' three days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now within three days Pharaoh will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:27; Ps. 3:3; Jer. 52:31
      marker-yv: yv-n
    - type: text
      text: 'lift up your head and restore you to your place, and you will put Pharaoh’s cup in his hand according to the former manner, when you were his butler. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:31; Luke 23:42
      marker-yv: yv-n
    - type: text
      text: 'remember me when it is well with you, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 24:49; 47:29; Josh. 2:12; 1 Sam. 20:14, 15; 2 Sam. 9:1; 1 Kin. 2:7
      marker-yv: yv-n
    - type: text
      text: 'please show kindness to me; make mention of me to Pharaoh, and get me out of this house. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For indeed I was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:26–28
      marker-yv: yv-n
    - type: text
      text: 'stolen away from the land of the Hebrews; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 39:20
      marker-yv: yv-n
    - type: text
      text: and also I have done nothing here that they should put me into the dungeon.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the chief baker saw that the interpretation was good, he said to Joseph, “I also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in my dream, and there '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' three white baskets on my head. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the uppermost basket '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' all kinds of baked goods for Pharaoh, and the birds ate them out of the basket on my head.”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joseph answered and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:12
      marker-yv: yv-n
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the interpretation of it: The three baskets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' three days. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:13
      marker-yv: yv-n
    - type: text
      text: 'Within three days Pharaoh will lift off your head from you and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 21:22
      marker-yv: yv-n
    - type: text
      text: hang you on a tree; and the birds will eat your flesh from you.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Pharaoh was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 16:14
      marker-yv: yv-n
    - type: text
      text: 'angry with his two officers, the chief butler and the chief baker. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it came to pass on the third day, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Pharaoh’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 14:6–10
      marker-yv: yv-n
    - type: text
      text: 'birthday, that he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 6:21
      marker-yv: yv-n
    - type: text
      text: 'made a feast for all his servants; and he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:13, 19; 2 Kin. 25:27; Jer. 52:31; Matt. 25:19
      marker-yv: yv-n
    - type: text
      text: 'lifted up the head of the chief butler and of the chief baker among his servants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:13
      marker-yv: yv-n
    - type: text
      text: 'restored the chief butler to his butlership again, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:1
      marker-yv: yv-n
    - type: text
      text: 'he placed the cup in Pharaoh’s hand. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:19; Deut. 21:23; Esth. 7:10
      marker-yv: yv-n
    - type: text
      text: 'hanged the chief baker, as Joseph had interpreted to them. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet the chief butler did not remember Joseph, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 19:14; Ps. 31:12; Eccl. 9:15, 16; Is. 49:15; Amos 6:6
      marker-yv: yv-n
    - type: text
      text: forgot him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 39:1, 20, 23; 41:10
      marker-yv: yv-n
    - type: text
      text: 'So he put them in custody in the house of the captain of the guard, in the prison, the place where Joseph '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' confined. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the captain of the guard charged Joseph with them, and he served them; so they were in custody for a while.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the butler and the baker of the king of Egypt, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' confined in the prison, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:5; 41:1
      marker-yv: yv-n
    - type: text
      text: 'had a dream, both of them, each man’s dream in one night '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' each man’s dream with its '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' interpretation. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph came in to them in the morning and looked at them, and saw that they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sad. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he asked Pharaoh’s officers who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him in the custody of his lord’s house, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:2
      marker-yv: yv-n
    - type: text
      text: '“Why do you look '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' sad today?”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said to him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:15
      marker-yv: yv-n
    - type: text
      text: '“We each have had a dream, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no interpreter of it.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joseph said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 41:16; Dan. 2:11, 20–22, 27, 28, 47)
      marker-yv: yv-n
    - type: text
      text: '“Do not interpretations belong to God? Tell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to me, please.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the chief butler told his dream to Joseph, and said to him, “Behold, in my dream a vine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' before me, '
