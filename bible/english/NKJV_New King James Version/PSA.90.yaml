document_id: PSA.90,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'BOOK FOUR: Psalms 90—106'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Eternity of God, and Man’s Frailty
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Prayer '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:1
      marker-yv: yv-n
    - type: text
      text: of Moses the man of God.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lord, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 33:27; Ezek. 11:16)
      marker-yv: yv-n
    - type: text
      text: You have been our dwelling place in all generations.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The days of our lives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' seventy years;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And if by reason of strength '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' eighty years,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yet their boast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' only labor and sorrow;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For it is soon cut off, and we fly away.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Who knows the power of Your anger?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For as the fear of You, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Your wrath.'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:29; Ps. 39:4
      marker-yv: yv-n
    - type: text
      text: 'So teach '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' to number our days,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That we may gain a heart of wisdom.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Return, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:12; Deut. 32:36
      marker-yv: yv-n
    - type: text
      text: have compassion on Your servants.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Oh, satisfy us early with Your mercy,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 85:6
      marker-yv: yv-n
    - type: text
      text: That we may rejoice and be glad all our days!
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Make us glad according to the days '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' You have afflicted us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The years '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' we have seen evil.'
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Let '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 32:4); Hab. 3:2
      marker-yv: yv-n
    - type: text
      text: Your work appear to Your servants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Your glory to their children.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:4
      marker-yv: yv-n
    - type: text
      text: 'And let the beauty of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God be upon us,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 26:12
      marker-yv: yv-n
    - type: text
      text: establish the work of our hands for us;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, establish the work of our hands.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:7; (Prov. 8:25, 26)
      marker-yv: yv-n
    - type: text
      text: Before the mountains were brought forth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or ever You had formed the earth and the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even from everlasting to everlasting, You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' God.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You turn man to destruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:19; Job 34:14, 15
      marker-yv: yv-n
    - type: text
      text: “Return, O children of men.”
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Pet. 3:8
      marker-yv: yv-n
    - type: text
      text: For a thousand years in Your sight
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' like yesterday when it is past,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a watch in the night.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You carry them away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a flood;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 73:20
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' like a sleep.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the morning '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 40:6
      marker-yv: yv-n
    - type: text
      text: 'they are like grass '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' grows up:'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: In the morning it flourishes and grows up;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In the evening it is cut down and withers.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For we have been consumed by Your anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And by Your wrath we are terrified.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 50:21; (Jer. 16:17)
      marker-yv: yv-n
    - type: text
      text: You have set our iniquities before You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Our '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 19:12; (Eccl. 12:14)
      marker-yv: yv-n
    - type: text
      text: 'secret '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sins
    - type: text
      text: ' in the light of Your countenance.'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For all our days have passed away in Your wrath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We finish our years like a sigh.
