  - type: text
    content: 'these '
  - type: text
    content: are
  - type: text
    content: ' the names of the children of Israel who came to Egypt; each man and his household came with Jacob: '
  '10':
  - type: note
    content: Ps. 83:3, 4
  - type: text
    content: 'come, let us '
  - type: note
    content: Ps. 105:25; (Prov. 16:25); Acts 7:19
  - type: text
    content: 'deal shrewdly with them, lest they multiply, and it happen, in the event of war, that they also join our enemies and fight against us, and '
  - type: text
    content: so
  - type: text
    content: ' go up out of the land.” '
  '11':
  - type: text
    content: 'Therefore they set taskmasters over them '
  - type: note
    content: Gen. 15:13; Ex. 3:7; 5:6
  - type: text
    content: 'to afflict them with their '
  - type: note
    content: Ex. 1:14; 2:11; 5:4–9; 6:6
  - type: text
    content: 'burdens. And they built for Pharaoh '
  - type: note
    content: 1 Kin. 9:19; 2 Chr. 8:4
  - type: text
    content: 'supply cities, Pithom '
  - type: note
    content: Gen. 47:11
  - type: text
    content: 'and Raamses. '
  '12':
  - type: text
    content: 'But the more they afflicted them, the more they multiplied and grew. And they were in dread of the children of Israel. '
  '13':
  - type: text
    content: 'So the Egyptians made the children of Israel '
  - type: note
    content: Gen. 15:13; Ex. 5:7–19
  - type: text
    content: 'serve with rigor. '
  '14':
  - type: text
    content: 'And they '
  - type: note
    content: Ex. 2:23; 6:9; Num. 20:15; (Acts 7:19, 34)
  - type: text
    content: made their lives bitter with hard bondage—
  - type: note
    content: Ps. 81:6
  - type: text
    content: 'in mortar, in brick, and in all manner of service in the field. All their service in which they made them serve '
  - type: text
    content: was
  - type: text
    content: ' with rigor.'
  '15':
  - type: text
    content: 'Then the king of Egypt spoke to the '
  - type: note
    content: Ex. 2:6
  - type: text
    content: 'Hebrew midwives, of whom the name of one '
  - type: text
    content: was
  - type: text
    content: ' Shiphrah and the name of the other Puah; '
  '16':
  - type: text
    content: 'and he said, “When you do the duties of a midwife for the Hebrew women, and see '
  - type: text
    content: them
  - type: text
    content: ' on the birthstools, if it '
  - type: text
    content: is
  - type: text
    content: ' a '
  - type: note
    content: Matt. 2:16; Acts 7:19
  - type: text
    content: 'son, then you shall kill him; but if it '
  - type: text
    content: is
  - type: text
    content: ' a daughter, then she shall live.” '
  '17':
  - type: text
    content: 'But the midwives '
  - type: note
    content: Ex. 1:21; Prov. 16:6
  - type: text
    content: 'feared God, and did not do '
  - type: note
    content: Dan. 3:16, 18; Acts 4:18–20; 5:29
  - type: text
    content: 'as the king of Egypt commanded them, but saved the male children alive. '
  '18':
  - type: text
    content: So the king of Egypt called for the midwives and said to them, “Why have you done this thing, and saved the male children alive?”
  '19':
  - type: text
    content: 'And '
  - type: note
    content: Josh. 2:4; 2 Sam. 17:19, 20
  - type: text
    content: 'the midwives said to Pharaoh, “Because the Hebrew women '
  - type: text
    content: are
  - type: text
    content: ' not like the Egyptian women; for they '
  - type: text
    content: are
  - type: text
    content: ' lively and give birth before the midwives come to them.”'
  '2':
  - type: text
    content: 'Reuben, Simeon, Levi, and Judah; '
  '20':
  - type: note
    content: Gen. 15:1; Ruth 2:12; (Prov. 11:18); Eccl. 8:12; (Is. 3:10); Heb. 6:10
  - type: text
    content: 'Therefore God dealt well with the midwives, and the people multiplied and grew very mighty. '
  '21':
  - type: text
    content: 'And so it was, because the midwives feared God, '
  - type: note
    content: 1 Sam. 2:35; 2 Sam. 7:11, 13, 27, 29; 1 Kin. 2:24; 11:38; (Ps. 127:1)
  - type: text
    content: that He provided households for them.
  '22':
  - type: text
    content: 'So Pharaoh commanded all his people, saying, '
  - type: note
    content: Acts 7:19
  - type: text
    content: “Every son who is born you shall cast into the river, and every daughter you shall save alive.”
  '3':
  - type: text
    content: 'Issachar, Zebulun, and Benjamin; '
  '4':
  - type: text
    content: 'Dan, Naphtali, Gad, and Asher. '
  '5':
  - type: text
    content: 'All those who were descendants of Jacob were '
  - type: note
    content: Gen. 46:26, 27; (Deut. 10:22)
  - type: text
    content: 'seventy persons (for Joseph was in Egypt '
  - type: text
    content: already
  - type: text
    content: '). '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Gen. 50:26; Acts 7:15
  - type: text
    content: 'Joseph died, all his brothers, and all that generation. '
  '7':
  - type: note
    content: Gen. 12:2; 28:3; 35:11; 46:3; 47:27; 48:4; Num. 22:3; Deut. 1:10, 11; 26:5; Ps. 105:24; Acts 7:17
  - type: text
    content: But the children of Israel were fruitful and increased abundantly, multiplied and grew exceedingly mighty; and the land was filled with them.
  '8':
  - type: text
    content: 'Now there arose a new king over Egypt, '
  - type: note
    content: Acts 7:18, 19
  - type: text
    content: 'who did not know Joseph. '
  '9':
  - type: text
    content: 'And he said to his people, “Look, the people of the children of Israel '
  - type: text
    content: are
  - type: text
    content: ' more and '
  - type: note
    content: Gen. 26:16
  - type: text
    content: 'mightier than we; '
