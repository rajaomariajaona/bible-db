  - type: text
    text: 'Reuben, Simeon, Levi, and Judah; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Issachar, Zebulun, and Benjamin; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dan, Naphtali, Gad, and Asher. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'All those who were descendants of Jacob were '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 46:26, 27; (Deut. 10:22)
    marker-yv: yv-n
  - type: text
    text: 'seventy persons (for Joseph was in Egypt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: already
  - type: text
    text: '). '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 50:26; Acts 7:15
    marker-yv: yv-n
  - type: text
    text: 'Joseph died, all his brothers, and all that generation. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 12:2; 28:3; 35:11; 46:3; 47:27; 48:4; Num. 22:3; Deut. 1:10, 11; 26:5; Ps. 105:24; Acts 7:17
    marker-yv: yv-n
  - type: text
    text: But the children of Israel were fruitful and increased abundantly, multiplied and grew exceedingly mighty; and the land was filled with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now there arose a new king over Egypt, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 7:18, 19
    marker-yv: yv-n
  - type: text
    text: 'who did not know Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And he said to his people, “Look, the people of the children of Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' more and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 26:16
    marker-yv: yv-n
  - type: text
    text: 'mightier than we; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 83:3, 4
    marker-yv: yv-n
  - type: text
    text: 'come, let us '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 105:25; (Prov. 16:25); Acts 7:19
    marker-yv: yv-n
  - type: text
    text: 'deal shrewdly with them, lest they multiply, and it happen, in the event of war, that they also join our enemies and fight against us, and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so
  - type: text
    text: ' go up out of the land.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Therefore they set taskmasters over them '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 15:13; Ex. 3:7; 5:6
    marker-yv: yv-n
  - type: text
    text: 'to afflict them with their '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 1:14; 2:11; 5:4–9; 6:6
    marker-yv: yv-n
  - type: text
    text: 'burdens. And they built for Pharaoh '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:19; 2 Chr. 8:4
    marker-yv: yv-n
  - type: text
    text: 'supply cities, Pithom '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 47:11
    marker-yv: yv-n
  - type: text
    text: 'and Raamses. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the more they afflicted them, the more they multiplied and grew. And they were in dread of the children of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So the Egyptians made the children of Israel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 15:13; Ex. 5:7–19
    marker-yv: yv-n
  - type: text
    text: 'serve with rigor. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 2:23; 6:9; Num. 20:15; (Acts 7:19, 34)
    marker-yv: yv-n
  - type: text
    text: made their lives bitter with hard bondage—
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 81:6
    marker-yv: yv-n
  - type: text
    text: 'in mortar, in brick, and in all manner of service in the field. All their service in which they made them serve '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' with rigor.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the king of Egypt spoke to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 2:6
    marker-yv: yv-n
  - type: text
    text: 'Hebrew midwives, of whom the name of one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Shiphrah and the name of the other Puah; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'and he said, “When you do the duties of a midwife for the Hebrew women, and see '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' on the birthstools, if it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 2:16; Acts 7:19
    marker-yv: yv-n
  - type: text
    text: 'son, then you shall kill him; but if it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a daughter, then she shall live.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the midwives '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 1:21; Prov. 16:6
    marker-yv: yv-n
  - type: text
    text: 'feared God, and did not do '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 3:16, 18; Acts 4:18–20; 5:29
    marker-yv: yv-n
  - type: text
    text: 'as the king of Egypt commanded them, but saved the male children alive. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So the king of Egypt called for the midwives and said to them, “Why have you done this thing, and saved the male children alive?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 2:4; 2 Sam. 17:19, 20
    marker-yv: yv-n
  - type: text
    text: 'the midwives said to Pharaoh, “Because the Hebrew women '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' not like the Egyptian women; for they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' lively and give birth before the midwives come to them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 15:1; Ruth 2:12; (Prov. 11:18); Eccl. 8:12; (Is. 3:10); Heb. 6:10
    marker-yv: yv-n
  - type: text
    text: 'Therefore God dealt well with the midwives, and the people multiplied and grew very mighty. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And so it was, because the midwives feared God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 2:35; 2 Sam. 7:11, 13, 27, 29; 1 Kin. 2:24; 11:38; (Ps. 127:1)
    marker-yv: yv-n
  - type: text
    text: that He provided households for them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Pharaoh commanded all his people, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 7:19
    marker-yv: yv-n
  - type: text
    text: “Every son who is born you shall cast into the river, and every daughter you shall save alive.”
