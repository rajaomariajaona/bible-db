document_id: ACT.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Appeals to Caesar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now when Festus had come to the province, after three days he went up from '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 8:40; 25:4, 6, 13
    marker-yv: yv-n
  - type: text
    text: 'Caesarea to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 24:1; 25:15
    marker-yv: yv-n
  - type: text
    text: 'Then the high priest and the chief men of the Jews informed him against Paul; and they petitioned him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: asking a favor against him, that he would summon him to Jerusalem—
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:12, 15
    marker-yv: yv-n
  - type: text
    text: 'while '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they
  - type: text
    text: ' lay in ambush along the road to kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But Festus answered that Paul should be kept at Caesarea, and that he himself was going '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' shortly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Therefore,” he said, “let those who have authority among you go down with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: ' and accuse this man, to see '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:14; 25:18
    marker-yv: yv-n
  - type: text
    text: if there is any fault in him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when he had remained among them more than ten days, he went down to Caesarea. And the next day, sitting on the judgment seat, he commanded Paul to be brought. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When he had come, the Jews who had come down from Jerusalem stood about '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 15:3; Luke 23:2, 10; Acts 24:5, 13
    marker-yv: yv-n
  - type: text
    text: 'and laid many serious complaints against Paul, which they could not prove, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'while he answered for himself, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 6:13; 24:12; 28:17
    marker-yv: yv-n
  - type: text
    text: “Neither against the law of the Jews, nor against the temple, nor against Caesar have I offended in anything at all.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But Festus, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 12:2; 24:27
    marker-yv: yv-n
  - type: text
    text: 'wanting to do the Jews a favor, answered Paul and said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 25:20
    marker-yv: yv-n
  - type: text
    text: “Are you willing to go up to Jerusalem and there be judged before me concerning these things?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So Paul said, “I stand at Caesar’s judgment seat, where I ought to be judged. To the Jews I have done no wrong, as you very well know. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:14; 23:29; 25:25; 26:31
    marker-yv: yv-n
  - type: text
    text: 'For if I am an offender, or have committed anything deserving of death, I do not object to dying; but if there is nothing in these things of which these men accuse me, no one can deliver me to them. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 26:32; 28:19
    marker-yv: yv-n
  - type: text
    text: I appeal to Caesar.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then Festus, when he had conferred with the council, answered, “You have appealed to Caesar? To Caesar you shall go!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Before Agrippa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And after some days King Agrippa and Bernice came to Caesarea to greet Festus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When they had been there many days, Festus laid Paul’s case before the king, saying: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 24:27
    marker-yv: yv-n
  - type: text
    text: '“There is a certain man left a prisoner by Felix, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 24:1; 25:2, 3
    marker-yv: yv-n
  - type: text
    text: 'about whom the chief priests and the elders of the Jews informed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me,
  - type: text
    text: ' when I was in Jerusalem, asking for a judgment against him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 25:4, 5
    marker-yv: yv-n
  - type: text
    text: 'To them I answered, ‘It is not the custom of the Romans to deliver any man to destruction before the accused meets the accusers face to face, and has opportunity to answer for himself concerning the charge against him.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore when they had come together, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 27:19; Acts 25:6, 10
    marker-yv: yv-n
  - type: text
    text: 'without any delay, the next day I sat on the judgment seat and commanded the man to be brought in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When the accusers stood up, they brought no accusation against him of such things as I supposed, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:14, 15; 23:29
    marker-yv: yv-n
  - type: text
    text: 'but had some questions against him about their own religion and about a certain Jesus, who had died, whom Paul affirmed to be alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And because I was uncertain of such questions, I asked whether he was willing to go to Jerusalem and there be judged concerning these matters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But when Paul '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 25:11, 12
    marker-yv: yv-n
  - type: text
    text: appealed to be reserved for the decision of Augustus, I commanded him to be kept till I could send him to Caesar.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:15
    marker-yv: yv-n
  - type: text
    text: Agrippa said to Festus, “I also would like to hear the man myself.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Tomorrow,” he said, “you shall hear him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So the next day, when Agrippa and Bernice had come with great pomp, and had entered the auditorium with the commanders and the prominent men of the city, at Festus’ command '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:15
    marker-yv: yv-n
  - type: text
    text: 'Paul was brought in. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Festus said: “King Agrippa and all the men who are here present with us, you see this man about whom '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 25:2, 3, 7
    marker-yv: yv-n
  - type: text
    text: 'the whole assembly of the Jews petitioned me, both at Jerusalem and here, crying out that he was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:36; 22:22
    marker-yv: yv-n
  - type: text
    text: 'not fit to live any longer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But when I found that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 23:9, 29; 26:31
    marker-yv: yv-n
  - type: text
    text: 'he had committed nothing deserving of death, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 25:11, 12
    marker-yv: yv-n
  - type: text
    text: 'and that he himself had appealed to Augustus, I decided to send him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'I have nothing certain to write to my lord concerning him. Therefore I have brought him out before you, and especially before you, King Agrippa, so that after the examination has taken place I may have something to write. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For it seems to me unreasonable to send a prisoner and not to specify the charges against him.”
