document_id: ACT.25,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Appeals to Caesar
  - type: text
    content: 'Now when Festus had come to the province, after three days he went up from '
  - type: note
    content: Acts 8:40; 25:4, 6, 13
  - type: text
    content: 'Caesarea to Jerusalem. '
  '10':
  - type: text
    content: 'So Paul said, “I stand at Caesar’s judgment seat, where I ought to be judged. To the Jews I have done no wrong, as you very well know. '
  '11':
  - type: note
    content: Acts 18:14; 23:29; 25:25; 26:31
  - type: text
    content: 'For if I am an offender, or have committed anything deserving of death, I do not object to dying; but if there is nothing in these things of which these men accuse me, no one can deliver me to them. '
  - type: note
    content: Acts 26:32; 28:19
  - type: text
    content: I appeal to Caesar.”
  '12':
  - type: text
    content: Then Festus, when he had conferred with the council, answered, “You have appealed to Caesar? To Caesar you shall go!”
  - type: heading
    content: Paul Before Agrippa
  '13':
  - type: text
    content: 'And after some days King Agrippa and Bernice came to Caesarea to greet Festus. '
  '14':
  - type: text
    content: 'When they had been there many days, Festus laid Paul’s case before the king, saying: '
  - type: note
    content: Acts 24:27
  - type: text
    content: '“There is a certain man left a prisoner by Felix, '
  '15':
  - type: note
    content: Acts 24:1; 25:2, 3
  - type: text
    content: 'about whom the chief priests and the elders of the Jews informed '
  - type: text
    content: me,
  - type: text
    content: ' when I was in Jerusalem, asking for a judgment against him. '
  '16':
  - type: note
    content: Acts 25:4, 5
  - type: text
    content: 'To them I answered, ‘It is not the custom of the Romans to deliver any man to destruction before the accused meets the accusers face to face, and has opportunity to answer for himself concerning the charge against him.’ '
  '17':
  - type: text
    content: 'Therefore when they had come together, '
  - type: note
    content: Matt. 27:19; Acts 25:6, 10
  - type: text
    content: 'without any delay, the next day I sat on the judgment seat and commanded the man to be brought in. '
  '18':
  - type: text
    content: 'When the accusers stood up, they brought no accusation against him of such things as I supposed, '
  '19':
  - type: note
    content: Acts 18:14, 15; 23:29
  - type: text
    content: 'but had some questions against him about their own religion and about a certain Jesus, who had died, whom Paul affirmed to be alive. '
  '2':
  - type: note
    content: Acts 24:1; 25:15
  - type: text
    content: 'Then the high priest and the chief men of the Jews informed him against Paul; and they petitioned him, '
  '20':
  - type: text
    content: 'And because I was uncertain of such questions, I asked whether he was willing to go to Jerusalem and there be judged concerning these matters. '
  '21':
  - type: text
    content: 'But when Paul '
  - type: note
    content: Acts 25:11, 12
  - type: text
    content: appealed to be reserved for the decision of Augustus, I commanded him to be kept till I could send him to Caesar.”
  '22':
  - type: text
    content: 'Then '
  - type: note
    content: Acts 9:15
  - type: text
    content: Agrippa said to Festus, “I also would like to hear the man myself.”
  - type: text
    content: “Tomorrow,” he said, “you shall hear him.”
  '23':
  - type: text
    content: 'So the next day, when Agrippa and Bernice had come with great pomp, and had entered the auditorium with the commanders and the prominent men of the city, at Festus’ command '
  - type: note
    content: Acts 9:15
  - type: text
    content: 'Paul was brought in. '
  '24':
  - type: text
    content: 'And Festus said: “King Agrippa and all the men who are here present with us, you see this man about whom '
  - type: note
    content: Acts 25:2, 3, 7
  - type: text
    content: 'the whole assembly of the Jews petitioned me, both at Jerusalem and here, crying out that he was '
  - type: note
    content: Acts 21:36; 22:22
  - type: text
    content: 'not fit to live any longer. '
  '25':
  - type: text
    content: 'But when I found that '
  - type: note
    content: Acts 23:9, 29; 26:31
  - type: text
    content: 'he had committed nothing deserving of death, '
  - type: note
    content: Acts 25:11, 12
  - type: text
    content: 'and that he himself had appealed to Augustus, I decided to send him. '
  '26':
  - type: text
    content: 'I have nothing certain to write to my lord concerning him. Therefore I have brought him out before you, and especially before you, King Agrippa, so that after the examination has taken place I may have something to write. '
  '27':
  - type: text
    content: For it seems to me unreasonable to send a prisoner and not to specify the charges against him.”
  '3':
  - type: text
    content: asking a favor against him, that he would summon him to Jerusalem—
  - type: note
    content: Acts 23:12, 15
  - type: text
    content: 'while '
  - type: text
    content: they
  - type: text
    content: ' lay in ambush along the road to kill him. '
  '4':
  - type: text
    content: 'But Festus answered that Paul should be kept at Caesarea, and that he himself was going '
  - type: text
    content: there
  - type: text
    content: ' shortly. '
  '5':
  - type: text
    content: '“Therefore,” he said, “let those who have authority among you go down with '
  - type: text
    content: me
  - type: text
    content: ' and accuse this man, to see '
  - type: note
    content: Acts 18:14; 25:18
  - type: text
    content: if there is any fault in him.”
  '6':
  - type: text
    content: 'And when he had remained among them more than ten days, he went down to Caesarea. And the next day, sitting on the judgment seat, he commanded Paul to be brought. '
  '7':
  - type: text
    content: 'When he had come, the Jews who had come down from Jerusalem stood about '
  - type: note
    content: Mark 15:3; Luke 23:2, 10; Acts 24:5, 13
  - type: text
    content: 'and laid many serious complaints against Paul, which they could not prove, '
  '8':
  - type: text
    content: 'while he answered for himself, '
  - type: note
    content: Acts 6:13; 24:12; 28:17
  - type: text
    content: “Neither against the law of the Jews, nor against the temple, nor against Caesar have I offended in anything at all.”
  '9':
  - type: text
    content: 'But Festus, '
  - type: note
    content: Acts 12:2; 24:27
  - type: text
    content: 'wanting to do the Jews a favor, answered Paul and said, '
  - type: note
    content: Acts 25:20
  - type: text
    content: “Are you willing to go up to Jerusalem and there be judged before me concerning these things?”
