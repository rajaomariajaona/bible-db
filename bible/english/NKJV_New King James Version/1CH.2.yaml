    content: ' Ahijah. '
  '26':
  - type: text
    content: 'Jerahmeel had another wife, whose name was Atarah; she was the mother of Onam. '
  '27':
  - type: text
    content: 'The sons of Ram, the firstborn of Jerahmeel, were Maaz, Jamin, and Eker. '
  '28':
  - type: text
    content: 'The sons of Onam were Shammai and Jada. The sons of Shammai '
  - type: text
    content: were
  - type: text
