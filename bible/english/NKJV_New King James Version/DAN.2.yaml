document_id: DAN.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar’s Dream
  - type: text
    content: 'Now in the second year of Nebuchadnezzar’s reign, Nebuchadnezzar had dreams; '
  - type: note
    content: Gen. 40:5–8; 41:1, 8; Job33:15–17; Dan. 2:3; 4:5
  - type: text
    content: 'and his spirit was '
  - type: text
    content: so
  - type: text
    content: ' troubled that '
  - type: note
    content: Esth. 6:1; Dan. 6:18
  - type: text
    content: 'his sleep left him. '
  '10':
  - type: text
    content: 'The Chaldeans answered the king, and said, “There is not a man on earth who can tell the king’s matter; therefore no king, lord, or ruler has '
  - type: text
    content: ever
  - type: text
    content: ' asked such things of any magician, astrologer, or Chaldean. '
  '11':
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' a difficult thing that the king requests, and there is no other who can tell it to the king '
  - type: note
    content: Gen. 41:39; Dan. 5:11
  - type: text
    content: except the gods, whose dwelling is not with flesh.”
  '12':
  - type: text
    content: 'For this reason the king was angry and very furious, and gave the command to destroy all the wise '
  - type: text
    content: men
  - type: text
    content: ' of Babylon. '
  '13':
  - type: text
    content: 'So the decree went out, and they began killing the wise '
  - type: text
    content: men;
  - type: text
    content: ' and they sought '
  - type: note
    content: Dan. 1:19, 20
  - type: text
    content: 'Daniel and his companions, to kill '
  - type: text
    content: them.
  - type: heading
    content: God Reveals Nebuchadnezzar’s Dream
  '14':
  - type: text
    content: 'Then with counsel and wisdom Daniel answered Arioch, the captain of the king’s guard, who had gone out to kill the wise '
  - type: text
    content: men
  - type: text
    content: ' of Babylon; '
  '15':
  - type: text
    content: he answered and said to Arioch the king’s captain, “Why is the decree from the king so urgent?” Then Arioch made the decision known to Daniel.
  '16':
  - type: text
    content: 'So Daniel went in and asked the king to give him time, that he might tell the king the interpretation. '
  '17':
  - type: text
    content: 'Then Daniel went to his house, and made the decision known to Hananiah, Mishael, and Azariah, his companions, '
  '18':
  - type: note
    content: (Dan. 9:9; Matt. 18:19)
  - type: text
    content: 'that they might seek mercies from the God of heaven concerning this secret, so that Daniel and his companions might not perish with the rest of the wise '
  - type: text
    content: men
  - type: text
    content: ' of Babylon. '
  '19':
  - type: text
    content: 'Then the secret was revealed to Daniel '
  - type: note
    content: Num. 12:6; Job 33:15; (Prov. 3:32); Amos 3:7
  - type: text
    content: in a night vision. So Daniel blessed the God of heaven.
  '2':
  - type: note
    content: Gen. 41:8; Ex. 7:11; Is. 47:12, 13; Dan. 1:20; 2:10, 27; 4:6; 5:7
  - type: text
    content: 'Then the king gave the command to call the magicians, the astrologers, the sorcerers, and the Chaldeans to tell the king his dreams. So they came and stood before the king. '
  '20':
  - type: text
    content: 'Daniel answered and said:'
  - type: note
    content: Ps. 113:2
  - type: text
    content: “Blessed be the name of God forever and ever,
  - type: note
    content: (1 Chr. 29:11, 12; Job 12:13; Ps. 147:5; Jer. 32:19; Matt. 6:13; Rom. 11:33)
  - type: text
    content: For wisdom and might are His.
  '21':
  - type: text
    content: 'And He changes '
  - type: note
    content: Ps. 31:15; Esth. 1:13; Dan. 2:9; 7:25
  - type: text
    content: the times and the seasons;
  - type: note
    content: Job 12:18; (Ps. 75:6, 7; Jer. 27:5; Dan. 4:35)
  - type: text
    content: He removes kings and raises up kings;
  - type: note
    content: 1 Kin. 3:9, 10; 4:29; (James 1:5)
  - type: text
    content: He gives wisdom to the wise
  - type: text
    content: And knowledge to those who have understanding.
  '22':
  - type: note
    content: Job 12:22; Ps. 25:14; (Prov. 3:22)
  - type: text
    content: He reveals deep and secret things;
  - type: note
    content: Job 26:6; Ps. 139:12; (Is. 45:7; Jer. 23:24; Heb. 4:13)
  - type: text
    content: 'He knows what '
  - type: text
    content: is
  - type: text
    content: ' in the darkness,'
  - type: text
    content: 'And '
  - type: note
    content: (Ps. 36:9); Dan. 5:11, 14; (1 Tim. 6:16; James 1:17; 1 John 1:5)
  - type: text
    content: light dwells with Him.
  '23':
  - type: text
    content: “I thank You and praise You,
  - type: text
    content: O God of my fathers;
  - type: text
    content: You have given me wisdom and might,
  - type: text
    content: 'And have now made known to me what we '
  - type: note
    content: Ps. 21:2, 4; Dan. 2:18, 29, 30
  - type: text
    content: asked of You,
  - type: text
    content: For You have made known to us the king’s demand.”
  - type: heading
    content: Daniel Explains the Dream
  '24':
  - type: text
    content: 'Therefore Daniel went to Arioch, whom the king had appointed to destroy the wise '
  - type: text
    content: men
  - type: text
    content: ' of Babylon. He went and said thus to him: “Do not destroy the wise '
  - type: text
    content: men
  - type: text
    content: ' of Babylon; take me before the king, and I will tell the king the interpretation.”'
  '25':
  - type: text
    content: Then Arioch quickly brought Daniel before the king, and said thus to him, “I have found a man of the captives of Judah, who will make known to the king the interpretation.”
  '26':
  - type: text
    content: 'The king answered and said to Daniel, whose name '
  - type: text
    content: was
  - type: text
    content: ' Belteshazzar, “Are you able to make known to me the dream which I have seen, and its interpretation?”'
  '27':
  - type: text
    content: 'Daniel answered in the presence of the king, and said, “The secret which the king has demanded, the wise '
  - type: text
    content: men,
  - type: text
    content: ' the astrologers, the magicians, and the soothsayers cannot declare to the king. '
  '28':
  - type: note
    content: Gen. 40:8; Amos 4:13
  - type: text
    content: 'But there is a God in heaven who reveals secrets, and He has made known to King Nebuchadnezzar '
  - type: note
    content: Gen. 49:1; Is. 2:2; Dan. 10:14; Mic. 4:1
  - type: text
    content: 'what will be in the latter days. Your dream, and the visions of your head upon your bed, were these: '
  '29':
  - type: text
    content: 'As for you, O king, thoughts came '
  - type: text
    content: to
  - type: text
    content: ' your '
  - type: text
    content: mind
  - type: text
    content: ' '
  - type: text
    content: while
  - type: text
    content: ' on your bed, '
  - type: text
    content: about
  - type: text
    content: ' what would come to pass after this; '
  - type: note
    content: (Dan. 2:22, 28)
  - type: text
    content: 'and He who reveals secrets has made known to you what will be. '
  '3':
  - type: text
    content: And the king said to them, “I have had a dream, and my spirit is anxious to know the dream.”
  '30':
  - type: note
    content: Acts 3:12
  - type: text
    content: 'But as for me, this secret has not been revealed to me because I have more wisdom than anyone living, but for '
  - type: text
    content: our
  - type: text
    content: ' sakes who make known the interpretation to the king, '
  - type: note
    content: Dan. 2:47
  - type: text
    content: and that you may know the thoughts of your heart.
  '31':
  - type: text
    content: '“You, O king, were watching; and behold, a great image! This great image, whose splendor '
  - type: text
    content: was
  - type: text
    content: ' excellent, stood before you; and its form '
  - type: text
    content: was
  - type: text
    content: ' awesome. '
  '32':
  - type: note
    content: Dan. 2:38, 45
  - type: text
    content: 'This image’s head '
  - type: text
    content: was
  - type: text
    content: ' of fine gold, its chest and arms of silver, its belly and thighs of bronze, '
  '33':
  - type: text
    content: 'its legs of iron, its feet partly of iron and partly of clay. '
  '34':
  - type: text
    content: 'You watched while a stone was cut out '
  - type: note
    content: Dan. 8:25; (Zech. 4:6); 2 Cor. 5:1; Heb. 9:24
  - type: text
    content: 'without hands, which struck the image on its feet of iron and clay, and broke them in pieces. '
  '35':
  - type: note
    content: Dan. 7:23–27; (Rev. 16:14)
  - type: text
    content: 'Then the iron, the clay, the bronze, the silver, and the gold were crushed together, and became '
  - type: note
    content: Ps. 1:4; Is. 17:13; 41:15, 16; Hos. 13:3
  - type: text
    content: 'like chaff from the summer threshing floors; the wind carried them away so that '
  - type: note
    content: Ps. 37:10, 36
  - type: text
    content: 'no trace of them was found. And the stone that struck the image '
  - type: note
    content: (Is. 2:2, 3); Mic. 4:1
  - type: text
    content: 'became a great mountain '
  - type: note
    content: Ps. 80:9
  - type: text
    content: and filled the whole earth.
  '36':
  - type: text
    content: '“This '
  - type: text
    content: is
  - type: text
    content: ' the dream. Now we will tell the interpretation of it before the king. '
  '37':
  - type: note
    content: Ezra 7:12; Is. 47:5; Jer. 27:6, 7; Ezek. 26:7; Hos. 8:10
  - type: text
    content: 'You, O king, '
  - type: text
    content: are
  - type: text
    content: ' a king of kings. '
  - type: note
    content: Ezra 1:2
  - type: text
    content: 'For the God of heaven has given you a kingdom, power, strength, and glory; '
  '38':
  - type: note
    content: Ps. 50:10, 11; Jer. 27:6; Dan. 4:21, 22
  - type: text
    content: 'and wherever the children of men dwell, or the beasts of the field and the birds of the heaven, He has given '
  - type: text
    content: them
  - type: text
    content: ' into your hand, and has made you ruler over them all—'
  - type: note
    content: Dan. 2:32
  - type: text
    content: 'you '
  - type: text
    content: are
  - type: text
    content: ' this head of gold. '
  '39':
  - type: text
    content: 'But after you shall arise '
  - type: note
    content: Dan. 5:28, 31
  - type: text
    content: 'another kingdom '
  - type: note
    content: Dan. 2:32
  - type: text
    content: 'inferior to yours; then another, a third kingdom of bronze, which shall rule over all the earth. '
  '4':
  - type: text
    content: 'Then the Chaldeans spoke to the king in Aramaic, '
  - type: note
    content: 1 Kin. 1:31; Dan. 3:9; 5:10; 6:6, 21
  - type: text
    content: “O king, live forever! Tell your servants the dream, and we will give the interpretation.”
  '40':
  - type: text
    content: 'And '
  - type: note
    content: Dan. 7:7, 23
  - type: text
    content: 'the fourth kingdom shall be as strong as iron, inasmuch as iron breaks in pieces and shatters everything; and like iron that crushes, '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: text
    content: kingdom
  - type: text
    content: ' will break in pieces and crush all the others. '
  '41':
  - type: text
    content: 'Whereas you saw the feet and toes, partly of potter’s clay and partly of iron, the kingdom shall be divided; yet the strength of the iron shall be in it, just as you saw the iron mixed with ceramic clay. '
  '42':
  - type: text
    content: 'And '
  - type: text
    content: as
  - type: text
    content: ' the toes of the feet '
  - type: text
    content: were
  - type: text
    content: ' partly of iron and partly of clay, '
  - type: note
    content: Dan. 7:24
  - type: text
    content: so
  - type: text
    content: ' the kingdom shall be partly strong and partly fragile. '
  '43':
  - type: text
    content: 'As you saw iron mixed with ceramic clay, they will mingle with the seed of men; but they will not adhere to one another, just as iron does not mix with clay. '
  '44':
  - type: text
    content: 'And in the days of these kings '
  - type: note
    content: Dan. 2:28, 37
  - type: text
    content: 'the God of heaven will set up a kingdom '
  - type: note
    content: Is. 9:6, 7; Ezek. 37:25; Dan. 4:3, 34; 6:26; 7:14, 27; Mic. 4:7; (Luke 1:32, 33)
  - type: text
    content: 'which shall never be destroyed; and the kingdom shall not be left to other people; '
  - type: note
    content: Ps. 2:9; Is. 60:12; Dan. 2:34, 35; (1 Cor. 15:24)
  - type: text
    content: 'it shall break in pieces and consume all these kingdoms, and it shall stand forever. '
  '45':
  - type: note
    content: Dan. 2:35; Is. 28:16
  - type: text
    content: Inasmuch as you saw that the stone was cut out of the mountain without hands, and that it broke in pieces the iron, the bronze, the clay, the silver, and the gold—the great God has made known to the king what will come to pass after this. The dream is certain, and its interpretation is sure.”
  - type: heading
    content: Daniel and His Friends Promoted
  '46':
  - type: note
    content: Dan. 3:5, 7; Acts 10:25; 14:13; Rev. 19:10; 22:8
  - type: text
    content: 'Then King Nebuchadnezzar fell on his face, prostrate before Daniel, and commanded that they should present an offering '
  - type: note
    content: Lev. 26:31; Ezra 6:10
  - type: text
    content: 'and incense to him. '
  '47':
  - type: text
    content: 'The king answered Daniel, and said, “Truly '
  - type: note
    content: Dan. 3:28, 29; 4:34–37
  - type: text
    content: 'your God '
  - type: text
    content: is
  - type: text
    content: ' the God of '
  - type: note
    content: (Deut. 10:17)
  - type: text
    content: 'gods, the Lord of kings, and a revealer of secrets, since you could reveal this secret.” '
  '48':
  - type: note
    content: (Prov. 14:35; 21:1)
  - type: text
    content: 'Then the king promoted Daniel '
  - type: note
    content: Dan. 2:6
  - type: text
    content: 'and gave him many great gifts; and he made him ruler over the whole province of Babylon, and '
  - type: note
    content: Dan. 4:9; 5:11
  - type: text
    content: 'chief administrator over all the wise '
  - type: text
    content: men
  - type: text
    content: ' of Babylon. '
  '49':
  - type: text
    content: 'Also Daniel petitioned the king, '
  - type: note
    content: Dan. 1:7; 3:12
  - type: text
    content: 'and he set Shadrach, Meshach, and Abed-Nego over the affairs of the province of Babylon; but Daniel '
  - type: note
    content: Esth. 2:19, 21, 3:2; Amos 5:15
  - type: text
    content: sat
  - type: text
    content: ' in the gate of the king.'
  '5':
  - type: text
    content: 'The king answered and said to the Chaldeans, “My decision is firm: if you do not make known the dream to me, and its interpretation, you shall be '
  - type: note
    content: 2 Kin. 10:27; Ezra 6:11; Dan. 3:29
  - type: text
    content: 'cut in pieces, and your houses shall be made an ash heap. '
  '6':
  - type: note
    content: Dan. 5:16
  - type: text
    content: However, if you tell the dream and its interpretation, you shall receive from me gifts, rewards, and great honor. Therefore tell me the dream and its interpretation.”
  '7':
  - type: text
    content: They answered again and said, “Let the king tell his servants the dream, and we will give its interpretation.”
  '8':
  - type: text
    content: 'The king answered and said, “I know for certain that you would gain time, because you see that my decision is firm: '
  '9':
  - type: text
    content: 'if you do not make known the dream to me, '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: only
  - type: text
    content: ' one decree for you! For you have agreed to speak lying and corrupt words before me till the time has changed. Therefore tell me the dream, and I shall know that you can give me its interpretation.”'
