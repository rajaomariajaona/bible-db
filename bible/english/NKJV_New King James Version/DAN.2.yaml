document_id: DAN.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nebuchadnezzar’s Dream
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now in the second year of Nebuchadnezzar’s reign, Nebuchadnezzar had dreams; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:5–8; 41:1, 8; Job33:15–17; Dan. 2:3; 4:5
      marker-yv: yv-n
    - type: text
      text: 'and his spirit was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' troubled that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Esth. 6:1; Dan. 6:18
      marker-yv: yv-n
    - type: text
      text: 'his sleep left him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The Chaldeans answered the king, and said, “There is not a man on earth who can tell the king’s matter; therefore no king, lord, or ruler has '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ever
    - type: text
      text: ' asked such things of any magician, astrologer, or Chaldean. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a difficult thing that the king requests, and there is no other who can tell it to the king '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:39; Dan. 5:11
      marker-yv: yv-n
    - type: text
      text: except the gods, whose dwelling is not with flesh.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For this reason the king was angry and very furious, and gave the command to destroy all the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So the decree went out, and they began killing the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men;
    - type: text
      text: ' and they sought '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 1:19, 20
      marker-yv: yv-n
    - type: text
      text: 'Daniel and his companions, to kill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Reveals Nebuchadnezzar’s Dream
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then with counsel and wisdom Daniel answered Arioch, the captain of the king’s guard, who had gone out to kill the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: he answered and said to Arioch the king’s captain, “Why is the decree from the king so urgent?” Then Arioch made the decision known to Daniel.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So Daniel went in and asked the king to give him time, that he might tell the king the interpretation. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Daniel went to his house, and made the decision known to Hananiah, Mishael, and Azariah, his companions, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Dan. 9:9; Matt. 18:19)
      marker-yv: yv-n
    - type: text
      text: 'that they might seek mercies from the God of heaven concerning this secret, so that Daniel and his companions might not perish with the rest of the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the secret was revealed to Daniel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 12:6; Job 33:15; (Prov. 3:32); Amos 3:7
      marker-yv: yv-n
    - type: text
      text: in a night vision. So Daniel blessed the God of heaven.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:8; Ex. 7:11; Is. 47:12, 13; Dan. 1:20; 2:10, 27; 4:6; 5:7
      marker-yv: yv-n
    - type: text
      text: 'Then the king gave the command to call the magicians, the astrologers, the sorcerers, and the Chaldeans to tell the king his dreams. So they came and stood before the king. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Daniel answered and said:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 113:2
      marker-yv: yv-n
    - type: text
      text: “Blessed be the name of God forever and ever,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Chr. 29:11, 12; Job 12:13; Ps. 147:5; Jer. 32:19; Matt. 6:13; Rom. 11:33)
      marker-yv: yv-n
    - type: text
      text: For wisdom and might are His.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And He changes '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:15; Esth. 1:13; Dan. 2:9; 7:25
      marker-yv: yv-n
    - type: text
      text: the times and the seasons;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:18; (Ps. 75:6, 7; Jer. 27:5; Dan. 4:35)
      marker-yv: yv-n
    - type: text
      text: He removes kings and raises up kings;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 3:9, 10; 4:29; (James 1:5)
      marker-yv: yv-n
    - type: text
      text: He gives wisdom to the wise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And knowledge to those who have understanding.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:22; Ps. 25:14; (Prov. 3:22)
      marker-yv: yv-n
    - type: text
      text: He reveals deep and secret things;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 26:6; Ps. 139:12; (Is. 45:7; Jer. 23:24; Heb. 4:13)
      marker-yv: yv-n
    - type: text
      text: 'He knows what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the darkness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 36:9); Dan. 5:11, 14; (1 Tim. 6:16; James 1:17; 1 John 1:5)
      marker-yv: yv-n
    - type: text
      text: light dwells with Him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: “I thank You and praise You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O God of my fathers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have given me wisdom and might,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And have now made known to me what we '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 21:2, 4; Dan. 2:18, 29, 30
      marker-yv: yv-n
    - type: text
      text: asked of You,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For You have made known to us the king’s demand.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel Explains the Dream
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Therefore Daniel went to Arioch, whom the king had appointed to destroy the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon. He went and said thus to him: “Do not destroy the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' of Babylon; take me before the king, and I will tell the king the interpretation.”'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Then Arioch quickly brought Daniel before the king, and said thus to him, “I have found a man of the captives of Judah, who will make known to the king the interpretation.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The king answered and said to Daniel, whose name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Belteshazzar, “Are you able to make known to me the dream which I have seen, and its interpretation?”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Daniel answered in the presence of the king, and said, “The secret which the king has demanded, the wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men,
    - type: text
      text: ' the astrologers, the magicians, and the soothsayers cannot declare to the king. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:8; Amos 4:13
      marker-yv: yv-n
    - type: text
      text: 'But there is a God in heaven who reveals secrets, and He has made known to King Nebuchadnezzar '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:1; Is. 2:2; Dan. 10:14; Mic. 4:1
      marker-yv: yv-n
    - type: text
      text: 'what will be in the latter days. Your dream, and the visions of your head upon your bed, were these: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'As for you, O king, thoughts came '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mind
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: while
    - type: text
      text: ' on your bed, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about
    - type: text
      text: ' what would come to pass after this; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Dan. 2:22, 28)
      marker-yv: yv-n
    - type: text
      text: 'and He who reveals secrets has made known to you what will be. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And the king said to them, “I have had a dream, and my spirit is anxious to know the dream.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 3:12
      marker-yv: yv-n
    - type: text
      text: 'But as for me, this secret has not been revealed to me because I have more wisdom than anyone living, but for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' sakes who make known the interpretation to the king, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:47
      marker-yv: yv-n
    - type: text
      text: and that you may know the thoughts of your heart.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“You, O king, were watching; and behold, a great image! This great image, whose splendor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' excellent, stood before you; and its form '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' awesome. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:38, 45
      marker-yv: yv-n
    - type: text
      text: 'This image’s head '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' of fine gold, its chest and arms of silver, its belly and thighs of bronze, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'its legs of iron, its feet partly of iron and partly of clay. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'You watched while a stone was cut out '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 8:25; (Zech. 4:6); 2 Cor. 5:1; Heb. 9:24
      marker-yv: yv-n
    - type: text
      text: 'without hands, which struck the image on its feet of iron and clay, and broke them in pieces. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 7:23–27; (Rev. 16:14)
      marker-yv: yv-n
    - type: text
      text: 'Then the iron, the clay, the bronze, the silver, and the gold were crushed together, and became '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 1:4; Is. 17:13; 41:15, 16; Hos. 13:3
      marker-yv: yv-n
    - type: text
      text: 'like chaff from the summer threshing floors; the wind carried them away so that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:10, 36
      marker-yv: yv-n
    - type: text
      text: 'no trace of them was found. And the stone that struck the image '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 2:2, 3); Mic. 4:1
      marker-yv: yv-n
    - type: text
      text: 'became a great mountain '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 80:9
      marker-yv: yv-n
    - type: text
      text: and filled the whole earth.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the dream. Now we will tell the interpretation of it before the king. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 7:12; Is. 47:5; Jer. 27:6, 7; Ezek. 26:7; Hos. 8:10
      marker-yv: yv-n
    - type: text
      text: 'You, O king, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a king of kings. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 1:2
      marker-yv: yv-n
    - type: text
      text: 'For the God of heaven has given you a kingdom, power, strength, and glory; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 50:10, 11; Jer. 27:6; Dan. 4:21, 22
      marker-yv: yv-n
    - type: text
      text: 'and wherever the children of men dwell, or the beasts of the field and the birds of the heaven, He has given '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' into your hand, and has made you ruler over them all—'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:32
      marker-yv: yv-n
    - type: text
      text: 'you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' this head of gold. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'But after you shall arise '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 5:28, 31
      marker-yv: yv-n
    - type: text
      text: 'another kingdom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 2:32
      marker-yv: yv-n
    - type: text
      text: 'inferior to yours; then another, a third kingdom of bronze, which shall rule over all the earth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the Chaldeans spoke to the king in Aramaic, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:31; Dan. 3:9; 5:10; 6:6, 21
      marker-yv: yv-n
    - type: text
      text: “O king, live forever! Tell your servants the dream, and we will give the interpretation.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dan. 7:7, 23
      marker-yv: yv-n
    - type: text
      text: 'the fourth kingdom shall be as strong as iron, inasmuch as iron breaks in pieces and shatters everything; and like iron that crushes, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kingdom
    - type: text
      text: ' will break in pieces and crush all the others. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Whereas you saw the feet and toes, partly of potter’s clay and partly of iron, the kingdom shall be divided; yet the strength of the iron shall be in it, just as you saw the iron mixed with ceramic clay. '
  '42':
  - type: usfm
