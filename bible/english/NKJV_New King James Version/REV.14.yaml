verses:
  '1':
  - type: heading
    content: The Lamb and the 144,000
  - type: text
    content: 'Then I looked, and behold, a '
  - type: note
    content: Rev. 5:6
  - type: text
    content: 'Lamb standing on Mount Zion, and with Him '
  - type: note
    content: Rev. 7:4; 14:3
  - type: text
    content: 'one hundred '
  - type: text
    content: and
  - type: text
    content: ' forty-four thousand, having His Father’s name '
  - type: note
    content: Ezek. 9:4; Rev. 7:3; 22:4
  - type: text
    content: 'written on their foreheads. '
  '10':
  - type: text
    content: 'he himself '
  - type: note
    content: Ps. 75:8
  - type: text
    content: 'shall also drink of the wine of the wrath of God, which is '
  - type: note
    content: Rev. 18:6
  - type: text
    content: 'poured out full strength into '
  - type: note
    content: Rev. 16:19
  - type: text
    content: 'the cup of His indignation. '
  - type: note
    content: Rev. 20:10
  - type: text
    content: 'He shall be tormented with '
  - type: note
    content: Gen. 19:24; Ezek. 38:22; 2 Thess. 1:7; Rev. 19:20
  - type: text
    content: 'fire and brimstone in the presence of the holy angels and in the presence of the Lamb. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: Is. 34:8–10; Rev. 18:9, 18; 19:3
  - type: text
    content: the smoke of their torment ascends forever and ever; and they have no rest day or night, who worship the beast and his image, and whoever receives the mark of his name.”
  '12':
  - type: note
    content: Rev. 13:10
  - type: text
    content: 'Here is the patience of the saints; '
  - type: note
    content: Rev. 12:17
  - type: text
    content: 'here '
  - type: text
    content: are
  - type: text
    content: ' those who keep the commandments of God and the faith of Jesus.'
  '13':
  - type: text
    content: 'Then I heard a voice from heaven saying to me, “Write: '
  - type: note
    content: Eccl. 4:1, 2
  - type: text
    content: '‘Blessed '
  - type: text
    content: are
  - type: text
    content: ' the dead '
  - type: note
    content: 1 Cor. 15:18; (1 Thess. 4:16)
  - type: text
    content: who die in the Lord from now on.’ ”
  - type: text
    content: '“Yes,” says the Spirit, '
  - type: note
    content: 2 Thess. 1:7; Heb. 4:9, 10; Rev. 6:11
  - type: text
    content: '“that they may rest from their labors, and their works follow '
  - type: note
    content: (1 Cor. 3:11–15; 15:58)
  - type: text
    content: them.”
  - type: heading
    content: Reaping the Earth’s Harvest
  '14':
  - type: text
    content: 'Then I looked, and behold, a white cloud, and on the cloud sat '
  - type: text
    content: One
  - type: text
    content: ' like the Son of Man, having on His head a golden crown, and in His hand a sharp sickle. '
  '15':
  - type: text
    content: 'And another angel '
  - type: note
    content: Rev. 16:17
  - type: text
    content: 'came out of the temple, crying with a loud voice to Him who sat on the cloud, '
  - type: note
    content: Joel 3:13; Mark 4:29; Rev. 14:18
  - type: text
    content: '“Thrust in Your sickle and reap, for the time has come for You to reap, for the harvest '
  - type: note
    content: Jer. 51:33; (Matt. 13:39–41)
  - type: text
    content: 'of the earth is ripe.” '
  '16':
  - type: text
    content: So He who sat on the cloud thrust in His sickle on the earth, and the earth was reaped.
  - type: heading
    content: Reaping the Grapes of Wrath
  '17':
  - type: text
    content: Then another angel came out of the temple which is in heaven, he also having a sharp sickle.
  '18':
  - type: text
    content: 'And another angel came out from the altar, '
  - type: note
    content: Rev. 16:8
  - type: text
    content: 'who had power over fire, and he cried with a loud cry to him who had the sharp sickle, saying, '
  - type: note
    content: Joel 3:13; Mark 4:29; Rev. 14:15
  - type: text
    content: '“Thrust in your sharp sickle and gather the clusters of the vine of the earth, for her grapes are fully ripe.” '
  '19':
  - type: text
    content: 'So the angel thrust his sickle into the earth and gathered the vine of the earth, and threw '
  - type: text
    content: it
  - type: text
    content: ' into '
  - type: note
    content: Is. 63:2; Rev. 19:15
  - type: text
    content: 'the great winepress of the wrath of God. '
  '2':
  - type: text
    content: 'And I heard a voice from heaven, '
  - type: note
    content: Rev. 1:15; 19:6
  - type: text
    content: 'like the voice of many waters, and like the voice of loud thunder. And I heard the sound of '
  - type: note
    content: Rev. 5:8
  - type: text
    content: 'harpists playing their harps. '
  '20':
  - type: text
    content: 'And '
  - type: note
    content: Is. 63:3; Lam. 1:15; Rev. 19:15
  - type: text
    content: 'the winepress was trampled '
  - type: note
    content: Heb. 13:12; Rev. 11:8
  - type: text
    content: 'outside the city, and blood came out of the winepress, '
  - type: note
    content: Is. 34:3
  - type: text
    content: up to the horses’ bridles, for one thousand six hundred furlongs.
  '3':
  - type: text
    content: 'They sang as it were a new song before the throne, before the four living creatures, and the elders; and no one could learn that song '
  - type: note
    content: Rev. 5:9
  - type: text
    content: 'except the hundred '
  - type: text
    content: and
  - type: text
    content: ' forty-four thousand who were redeemed from the earth. '
  '4':
  - type: text
    content: 'These are the ones who were not defiled with women, '
  - type: note
    content: (Matt. 19:12; 2 Cor. 11:2; Eph. 5:27)
  - type: text
    content: 'for they are virgins. These are the ones '
  - type: note
    content: Rev. 3:4; 7:17
  - type: text
    content: 'who follow the Lamb wherever He goes. These '
  - type: note
    content: Rev. 5:9
  - type: text
    content: 'were redeemed from '
  - type: text
    content: among
  - type: text
    content: ' men, '
  - type: note
    content: Heb. 12:23; James 1:18
  - type: text
    content: being
  - type: text
    content: ' firstfruits to God and to the Lamb. '
  '5':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 32:2; Zeph. 3:13; Mal. 2:6; John 1:47; 1 Pet. 2:22
  - type: text
    content: 'in their mouth was found no deceit, for '
  - type: note
    content: Eph. 5:27
  - type: text
    content: they are without fault before the throne of God.
  - type: heading
    content: The Proclamations of Three Angels
  '6':
  - type: text
    content: 'Then I saw another angel '
  - type: note
    content: Rev. 8:13
  - type: text
    content: 'flying in the midst of heaven, '
  - type: note
    content: Eph. 3:9
  - type: text
    content: having the everlasting gospel to preach to those who dwell on the earth—
  - type: note
    content: Rev. 13:7
  - type: text
    content: 'to every nation, tribe, tongue, and people— '
  '7':
  - type: text
    content: 'saying with a loud voice, '
  - type: note
    content: Rev. 11:18
  - type: text
    content: '“Fear God and give glory to Him, for the hour of His judgment has come; '
  - type: note
    content: Neh. 9:6
  - type: text
    content: and worship Him who made heaven and earth, the sea and springs of water.”
  '8':
  - type: text
    content: 'And another angel followed, saying, '
  - type: note
    content: Is. 21:9; Jer. 51:8; Rev. 18:2
  - type: text
    content: '“Babylon is fallen, is fallen, that great city, because '
  - type: note
    content: Jer. 51:7; Rev. 17:2
  - type: text
    content: she has made all nations drink of the wine of the wrath of her fornication.”
  '9':
  - type: text
    content: 'Then a third angel followed them, saying with a loud voice, '
  - type: note
    content: Rev. 13:14, 15; 14:11
  - type: text
    content: '“If anyone worships the beast and his image, and receives '
  - type: text
    content: his
  - type: text
    content: ' '
  - type: note
    content: Rev. 13:16
  - type: text
    content: 'mark on his forehead or on his hand, '
