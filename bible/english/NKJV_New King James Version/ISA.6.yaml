document_id: ISA.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaiah Called to Be a Prophet
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the year that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 15:7; 2 Chr. 26:23; Is. 1:1
      marker-yv: yv-n
    - type: text
      text: 'King Uzziah died, I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 12:41; Rev. 4:2, 3; 20:11
      marker-yv: yv-n
    - type: text
      text: 'saw the Lord sitting on a throne, high and lifted up, and the train of His '
    - type: usfm
      marker: it
      children:
      - type: text
        text: robe
    - type: text
      text: ' filled the temple. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Make '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:70; Mark 6:1–6; Acts 7:51; Rom. 10:1–4
      marker-yv: yv-n
    - type: text
      text: the heart of this people dull,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their ears heavy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And shut their eyes;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 5:21
      marker-yv: yv-n
    - type: text
      text: Lest they see with their eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And hear with their ears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And understand with their heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And return and be healed.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I said, “Lord, how long?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He answered:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mic. 3:12
      marker-yv: yv-n
    - type: text
      text: “Until the cities are laid waste and without inhabitant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The houses are without a man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The land is utterly desolate,
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:21; Is. 5:9
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has removed men far away,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the forsaken places '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' many in the midst of the land.'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But yet a tenth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' in it,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And will return and be for consuming,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As a terebinth tree or as an oak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Whose stump '
    - type: usfm
      marker: it
      children:
      - type: text
        text: remains
    - type: text
      text: ' when it is cut down.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:6; Ezra 9:2
      marker-yv: yv-n
    - type: text
      text: 'the holy seed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' its stump.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Above it stood seraphim; each one had six wings: with two he covered his face, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 1:11
      marker-yv: yv-n
    - type: text
      text: 'with two he covered his feet, and with two he flew. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And one cried to another and said:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:8
      marker-yv: yv-n
    - type: text
      text: '“Holy, holy, holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:21; Ps. 72:19
      marker-yv: yv-n
    - type: text
      text: 'The whole earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' full of His glory!”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the posts of the door were shaken by the voice of him who cried out, and the house was filled with smoke.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Woe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' me, for I am undone!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' a man of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:12, 30
      marker-yv: yv-n
    - type: text
      text: unclean lips,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I dwell in the midst of a people of unclean lips;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For my eyes have seen the King,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one of the seraphim flew to me, having in his hand a live coal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' he had taken with the tongs from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 8:3
      marker-yv: yv-n
    - type: text
      text: 'the altar. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 1:9; Dan. 10:16
      marker-yv: yv-n
    - type: text
      text: 'touched my mouth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' and said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Behold, this has touched your lips;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your iniquity is taken away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And your sin purged.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also I heard the voice of the Lord, saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Whom shall I send,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And who will go for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:26
      marker-yv: yv-n
    - type: text
      text: Us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said, “Here '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' I! Send me.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said, “Go, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 43:8; Matt. 13:14; Mark 4:12; Luke 8:10; John 12:40; Acts 28:26; Rom. 11:8
      marker-yv: yv-n
    - type: text
      text: 'tell this people:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Keep on hearing, but do not understand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Keep on seeing, but do not perceive.’
