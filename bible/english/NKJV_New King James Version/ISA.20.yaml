document_id: ISA.20,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sign Against Egypt and Ethiopia
  - type: text
    content: 'In the year that '
  - type: note
    content: 2 Kin. 18:17
  - type: text
    content: 'Tartan came to Ashdod, when Sargon the king of Assyria sent him, and he fought against Ashdod and took it, '
  '2':
  - type: text
    content: 'at the same time the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke by Isaiah the son of Amoz, saying, “Go, and remove '
  - type: note
    content: Zech. 13:4; Matt. 3:4
  - type: text
    content: 'the sackcloth from your body, and take your sandals off your feet.” And he did so, '
  - type: note
    content: 1 Sam. 19:24; Mic. 1:8
  - type: text
    content: walking naked and barefoot.
  '3':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, “Just as My servant Isaiah has walked naked and barefoot three years '
  - type: note
    content: Is. 8:18
  - type: text
    content: for
  - type: text
    content: ' a sign and a wonder against Egypt and Ethiopia, '
  '4':
  - type: text
    content: 'so shall the '
  - type: note
    content: Is. 19:4
  - type: text
    content: 'king of Assyria lead away the Egyptians as prisoners and the Ethiopians as captives, young and old, naked and barefoot, '
  - type: note
    content: 2 Sam. 10:4; Is. 3:17; Jer. 13:22; Mic. 1:11
  - type: text
    content: 'with their buttocks uncovered, to the shame of Egypt. '
  '5':
  - type: note
    content: 2 Kin. 18:21; Is. 30:3–5; 31:1; Ezek. 29:6, 7
  - type: text
    content: 'Then they shall be afraid and ashamed of Ethiopia their expectation and Egypt their glory. '
  '6':
  - type: text
    content: 'And the inhabitant of this territory will say in that day, ‘Surely such '
  - type: text
    content: is
  - type: text
    content: ' our expectation, wherever we flee for '
  - type: note
    content: Is. 30:5, 7
  - type: text
    content: help to be delivered from the king of Assyria; and how shall we escape?’ ”
