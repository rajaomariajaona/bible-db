document_id: EST.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esther Agrees to Help the Jews
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Mordecai learned all that had happened, he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 1:11; Esth. 3:8–10; Jon. 3:5, 6
    marker-yv: yv-n
  - type: text
    text: 'tore his clothes and put on sackcloth '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 7:6; Ezek. 27:30
    marker-yv: yv-n
  - type: text
    text: 'and ashes, and went out into the midst of the city. He '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 27:34
    marker-yv: yv-n
  - type: text
    text: 'cried out with a loud and bitter cry. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He went as far as the front of the king’s gate, for no one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: might
  - type: text
    text: ' enter the king’s gate clothed with sackcloth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And in every province where the king’s command and decree arrived, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' great mourning among the Jews, with fasting, weeping, and wailing; and many lay in sackcloth and ashes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Esther’s maids and eunuchs came and told her, and the queen was deeply distressed. Then she sent garments to clothe Mordecai and take his sackcloth away from him, but he would not accept '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Esther called Hathach, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' of the king’s eunuchs whom he had appointed to attend her, and she gave him a command concerning Mordecai, to learn what and why this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Hathach went out to Mordecai in the city square that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in front of the king’s gate. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And Mordecai told him all that had happened to him, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:9
    marker-yv: yv-n
  - type: text
    text: 'the sum of money that Haman had promised to pay into the king’s treasuries to destroy the Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He also gave him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:14, 15
    marker-yv: yv-n
  - type: text
    text: 'a copy of the written decree for their destruction, which was given at Shushan, that he might show it to Esther and explain it to her, and that he might command her to go in to the king to make supplication to him and plead before him for her people. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Hathach returned and told Esther the words of Mordecai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Esther spoke to Hathach, and gave him a command for Mordecai: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“All the king’s servants and the people of the king’s provinces know that any man or woman who goes into '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 5:1, 6:4
    marker-yv: yv-n
  - type: text
    text: 'the inner court to the king, who has not been called, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:9
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has
  - type: text
    text: ' but one law: put '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all
  - type: text
    text: ' to death, except the one '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 5:2, 8:4
    marker-yv: yv-n
  - type: text
    text: 'to whom the king holds out the golden scepter, that he may live. Yet I myself have not been '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 2:14
    marker-yv: yv-n
  - type: text
    text: 'called to go in to the king these thirty days.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So they told Mordecai Esther’s words.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And Mordecai told '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to answer Esther: “Do not think in your heart that you will escape in the king’s palace any more than all the other Jews. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For if you remain completely silent at this time, relief and deliverance will arise for the Jews from another place, but you and your father’s house will perish. Yet who knows whether you have come to the kingdom for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: such
  - type: text
    text: ' a time as this?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Esther told '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to reply to Mordecai: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Go, gather all the Jews who are present in Shushan, and fast for me; neither eat nor drink for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 5:1
    marker-yv: yv-n
  - type: text
    text: 'three days, night or day. My maids and I will fast likewise. And so I will go to the king, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' against the law; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 43:14
    marker-yv: yv-n
  - type: text
    text: and if I perish, I perish!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So Mordecai went his way and did according to all that Esther commanded him.
