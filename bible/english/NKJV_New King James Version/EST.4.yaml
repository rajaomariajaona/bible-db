verses:
  '1':
  - type: heading
    content: Esther Agrees to Help the Jews
  - type: text
    content: 'When Mordecai learned all that had happened, he '
  - type: note
    content: 2 Sam. 1:11; Esth. 3:8–10; Jon. 3:5, 6
  - type: text
    content: 'tore his clothes and put on sackcloth '
  - type: note
    content: Josh. 7:6; Ezek. 27:30
  - type: text
    content: 'and ashes, and went out into the midst of the city. He '
  - type: note
    content: Gen. 27:34
  - type: text
    content: 'cried out with a loud and bitter cry. '
  '10':
  - type: text
    content: 'Then Esther spoke to Hathach, and gave him a command for Mordecai: '
  '11':
  - type: text
    content: '“All the king’s servants and the people of the king’s provinces know that any man or woman who goes into '
  - type: note
    content: Esth. 5:1, 6:4
  - type: text
    content: 'the inner court to the king, who has not been called, '
  - type: note
    content: Dan. 2:9
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: has
  - type: text
    content: ' but one law: put '
  - type: text
    content: all
  - type: text
    content: ' to death, except the one '
  - type: note
    content: Esth. 5:2, 8:4
  - type: text
    content: 'to whom the king holds out the golden scepter, that he may live. Yet I myself have not been '
  - type: note
    content: Esth. 2:14
  - type: text
    content: 'called to go in to the king these thirty days.” '
  '12':
  - type: text
    content: So they told Mordecai Esther’s words.
  '13':
  - type: text
    content: 'And Mordecai told '
  - type: text
    content: them
  - type: text
    content: ' to answer Esther: “Do not think in your heart that you will escape in the king’s palace any more than all the other Jews. '
  '14':
  - type: text
    content: 'For if you remain completely silent at this time, relief and deliverance will arise for the Jews from another place, but you and your father’s house will perish. Yet who knows whether you have come to the kingdom for '
  - type: text
    content: such
  - type: text
    content: ' a time as this?”'
  '15':
  - type: text
    content: 'Then Esther told '
  - type: text
    content: them
  - type: text
    content: ' to reply to Mordecai: '
  '16':
  - type: text
    content: '“Go, gather all the Jews who are present in Shushan, and fast for me; neither eat nor drink for '
  - type: note
    content: Esth. 5:1
  - type: text
    content: 'three days, night or day. My maids and I will fast likewise. And so I will go to the king, which '
  - type: text
    content: is
  - type: text
    content: ' against the law; '
  - type: note
    content: Gen. 43:14
  - type: text
    content: and if I perish, I perish!”
  '17':
  - type: text
    content: So Mordecai went his way and did according to all that Esther commanded him.
  '2':
  - type: text
    content: 'He went as far as the front of the king’s gate, for no one '
  - type: text
    content: might
  - type: text
    content: ' enter the king’s gate clothed with sackcloth. '
  '3':
  - type: text
    content: 'And in every province where the king’s command and decree arrived, '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' great mourning among the Jews, with fasting, weeping, and wailing; and many lay in sackcloth and ashes.'
  '4':
  - type: text
    content: 'So Esther’s maids and eunuchs came and told her, and the queen was deeply distressed. Then she sent garments to clothe Mordecai and take his sackcloth away from him, but he would not accept '
  - type: text
    content: them.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Then Esther called Hathach, '
  - type: text
    content: one
  - type: text
    content: ' of the king’s eunuchs whom he had appointed to attend her, and she gave him a command concerning Mordecai, to learn what and why this '
  - type: text
    content: was.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'So Hathach went out to Mordecai in the city square that '
  - type: text
    content: was
  - type: text
    content: ' in front of the king’s gate. '
  '7':
  - type: text
    content: 'And Mordecai told him all that had happened to him, and '
  - type: note
    content: Esth. 3:9
  - type: text
    content: 'the sum of money that Haman had promised to pay into the king’s treasuries to destroy the Jews. '
  '8':
  - type: text
    content: 'He also gave him '
  - type: note
    content: Esth. 3:14, 15
  - type: text
    content: 'a copy of the written decree for their destruction, which was given at Shushan, that he might show it to Esther and explain it to her, and that he might command her to go in to the king to make supplication to him and plead before him for her people. '
  '9':
  - type: text
    content: So Hathach returned and told Esther the words of Mordecai.
