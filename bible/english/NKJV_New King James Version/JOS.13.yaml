  - type: text
    content: ' said to him: “You are old, advanced in years, and there remains very much land yet to be possessed. '
  '10':
  - type: note
    content: Num. 21:24, 25
  - type: text
    content: 'all the cities of Sihon king of the Amorites, who reigned in Heshbon, as far as the border of the children of Ammon; '
  '11':
  - type: note
    content: Num. 32:1; Josh. 12:5
  - type: text
    content: 'Gilead, and the border of the Geshurites and Maachathites, all Mount Hermon, and all Bashan as far as Salcah; '
