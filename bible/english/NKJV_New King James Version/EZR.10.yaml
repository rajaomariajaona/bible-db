      - type: text
        text: (Lev. 26:40–42); Josh. 7:19; (Prov. 28:13)
      marker-yv: yv-n
    - type: text
      text: 'make confession to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of your fathers, and do His will; '
    - type: usfm
