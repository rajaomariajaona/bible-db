  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then all the assembly answered and said with a loud voice, “Yes! As you have said, so we must do. '
