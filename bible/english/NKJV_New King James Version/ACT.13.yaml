    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And that He raised Him from the dead, no more to return to corruption, He has spoken thus:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 55:3
    marker-yv: yv-n
  - type: text
    text: ‘I will give you the sure mercies of David.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Therefore He also says in another '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Psalm:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 16:10; Acts 2:27
    marker-yv: yv-n
  - type: text
    text: ‘You will not allow Your Holy One to see corruption.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“For David, after he had served his own generation by the will of God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 2:29
    marker-yv: yv-n
  - type: text
    text: 'fell asleep, was buried with his fathers, and saw corruption; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'but He whom God raised up saw no corruption. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Therefore let it be known to you, brethren, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 31:34
    marker-yv: yv-n
  - type: text
    text: 'through this Man is preached to you the forgiveness of sins; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 53:11; John 3:16)
    marker-yv: yv-n
  - type: text
    text: 'by Him everyone who believes is justified from all things from which you could not be justified by the law of Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Beware therefore, lest what has been spoken in the prophets come upon you:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ‘Behold,
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hab. 1:5
    marker-yv: yv-n
  - type: text
    text: ' you despisers,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Marvel and perish!
- type: usfm
  marker: q2
  children:
  - type: text
    text: For I work a work in your days,
- type: usfm
  marker: q2
  children:
  - type: text
    text: A work which you will by no means believe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Though one were to declare it to you.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Blessing and Conflict at Antioch
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'So when the Jews went out of the synagogue, the Gentiles begged that these words might be preached to them the next Sabbath. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Now when the congregation had broken up, many of the Jews and devout proselytes followed Paul and Barnabas, who, speaking to them, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 11:23
    marker-yv: yv-n
  - type: text
    text: 'persuaded them to continue in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Titus 2:11; Heb. 12:15; 1 Pet. 5:12
    marker-yv: yv-n
  - type: text
    text: the grace of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'On the next Sabbath almost the whole city came together to hear the word of God. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'But when the Jews saw the multitudes, they were filled with envy; and contradicting and blaspheming, they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:6; 1 Pet. 4:4; Jude 10
    marker-yv: yv-n
  - type: text
    text: 'opposed the things spoken by Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then Paul and Barnabas grew bold and said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 10:6; Acts 3:26; Rom. 1:16
    marker-yv: yv-n
  - type: text
    text: '“It was necessary that the word of God should be spoken to you first; but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 32:10; Deut. 32:21; Is. 55:5; Matt. 21:43; Rom. 10:19
    marker-yv: yv-n
  - type: text
    text: 'since you reject it, and judge yourselves unworthy of everlasting life, behold, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 18:6
    marker-yv: yv-n
  - type: text
    text: 'we turn to the Gentiles. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'For so the Lord has commanded us:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 42:6; 49:6; Luke 2:32
    marker-yv: yv-n
  - type: text
    text: ‘I have set you as a light to the Gentiles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That you should be for salvation to the ends of the earth.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Now when the Gentiles heard this, they were glad and glorified the word of the Lord. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 2:47)
    marker-yv: yv-n
  - type: text
    text: And as many as had been appointed to eternal life believed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'And the word of the Lord was being spread throughout all the region. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'But the Jews stirred up the devout and prominent women and the chief men of the city, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 7:52; 2 Tim. 3:11
    marker-yv: yv-n
  - type: text
    text: 'raised up persecution against Paul and Barnabas, and expelled them from their region. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 10:14; Mark 6:11; (Luke 9:5)
    marker-yv: yv-n
  - type: text
    text: 'But they shook off the dust from their feet against them, and came to Iconium. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And the disciples '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 5:12; John 16:22
    marker-yv: yv-n
  - type: text
    text: 'were filled with joy and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 2:4; 4:8, 31; 13:9
    marker-yv: yv-n
  - type: text
    text: with the Holy Spirit.
