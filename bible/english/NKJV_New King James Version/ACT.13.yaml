document_id: ACT.13,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Now '
  - type: note
    content: Acts 14:26
  - type: text
    content: 'in the church that was at Antioch there were certain prophets and teachers: '
  - type: note
    content: Acts 11:22
  - type: text
    content: 'Barnabas, Simeon who was called Niger, '
  - type: note
    content: Rom. 16:21
  - type: text
    content: 'Lucius of Cyrene, Manaen who had been brought up with Herod the tetrarch, and Saul. '
  '10':
  - type: text
    content: 'and said, “O full of all deceit and all fraud, '
  - type: note
    content: Matt. 13:38; John 8:44; (1 John 3:8)
  - type: text
    content: you
  - type: text
    content: ' son of the devil, '
  - type: text
    content: you
  - type: text
    content: ' enemy of all righteousness, will you not cease perverting the straight ways of the Lord? '
  '11':
  - type: text
    content: 'And now, indeed, '
  - type: note
    content: Ex. 9:3; 1 Sam. 5:6; Job 19:21; Ps. 32:4; Heb. 10:31
  - type: text
    content: 'the hand of the Lord '
  - type: text
    content: is
  - type: text
    content: ' upon you, and you shall be blind, not seeing the sun for a time.”'
  - type: text
    content: 'And immediately a dark mist fell on him, and he went around seeking someone to lead him by the hand. '
  '12':
  - type: text
    content: Then the proconsul believed, when he saw what had been done, being astonished at the teaching of the Lord.
  - type: heading
    content: At Antioch in Pisidia
  '13':
  - type: text
    content: 'Now when Paul and his party set sail from Paphos, they came to Perga in Pamphylia; and '
  - type: note
    content: Acts 15:38
  - type: text
    content: 'John, departing from them, returned to Jerusalem. '
  '14':
  - type: text
    content: 'But when they departed from Perga, they came to Antioch in Pisidia, and '
  - type: note
    content: Acts 16:13
  - type: text
    content: 'went into the synagogue on the Sabbath day and sat down. '
  '15':
  - type: text
    content: 'And '
  - type: note
    content: Luke 4:16
  - type: text
    content: 'after the reading of the Law and the Prophets, the rulers of the synagogue sent to them, saying, “Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, if you have '
  - type: note
    content: Heb. 13:22
  - type: text
    content: any word of exhortation for the people, say on.”
  '16':
  - type: text
    content: 'Then Paul stood up, and motioning with '
  - type: text
    content: his
  - type: text
    content: ' hand said, “Men of Israel, and '
  - type: note
    content: Acts 10:35
  - type: text
    content: 'you who fear God, listen: '
  '17':
  - type: text
    content: 'The God of this people Israel '
  - type: note
    content: Ex. 6:1, 6; 13:14, 16; Deut. 7:6–8
  - type: text
    content: 'chose our fathers, and exalted the people '
  - type: note
    content: Acts 7:17
  - type: text
    content: 'when they dwelt as strangers in the land of Egypt, and with an uplifted arm He '
  - type: note
    content: Ex. 14:8
  - type: text
    content: 'brought them out of it. '
  '18':
  - type: text
    content: 'Now '
  - type: note
    content: Ex. 16:35; Num. 14:34; Acts 7:36
  - type: text
    content: 'for a time of about forty years He put up with their ways in the wilderness. '
  '19':
  - type: text
    content: 'And when He had destroyed '
  - type: note
    content: Deut. 7:1
  - type: text
    content: 'seven nations in the land of Canaan, '
  - type: note
    content: Josh. 14:1, 2; 19:51; Ps. 78:55
  - type: text
    content: He distributed their land to them by allotment.
  '2':
  - type: text
    content: 'As they ministered to the Lord and fasted, the Holy Spirit said, '
  - type: note
    content: Num. 8:14; Acts 9:15; 22:21; Rom. 1:1; Gal. 1:15; 2:9
  - type: text
    content: '“Now separate to Me Barnabas and Saul for the work '
  - type: note
    content: Matt. 9:38; Acts 14:26; Rom. 10:15; Eph. 3:7, 8; 1 Tim. 2:7; 2 Tim. 1:11; Heb. 5:4
  - type: text
    content: 'to which I have called them.” '
  '20':
  - type: text
    content: '“After that '
  - type: note
    content: Judg. 2:16; 1 Sam. 4:18; 7:15
  - type: text
    content: 'He gave '
  - type: text
    content: them
  - type: text
    content: ' judges for about four hundred and fifty years, '
  - type: note
    content: 1 Sam. 3:20; Acts 3:24
  - type: text
    content: 'until Samuel the prophet. '
  '21':
  - type: note
    content: 1 Sam. 8:5
  - type: text
    content: 'And afterward they asked for a king; so God gave them '
  - type: note
    content: 1 Sam. 10:20–24
  - type: text
    content: 'Saul the son of Kish, a man of the tribe of Benjamin, for forty years. '
  '22':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 15:23, 26, 28
  - type: text
    content: 'when He had removed him, '
  - type: note
    content: 1 Sam. 16:1, 12, 13
  - type: text
    content: 'He raised up for them David as king, to whom also He gave testimony and said, '
  - type: note
    content: Ps. 89:20
  - type: text
    content: '‘I have found David the '
  - type: text
    content: son
  - type: text
    content: ' of Jesse, '
  - type: note
    content: 1 Sam. 13:14
  - type: text
    content: 'a man after My '
  - type: text
    content: own
  - type: text
    content: ' heart, who will do all My will.’ '
  '23':
  - type: note
    content: Is. 11:1
  - type: text
    content: 'From this man’s seed, according '
  - type: note
    content: Ps. 132:11
  - type: text
    content: 'to '
  - type: text
    content: the
  - type: text
    content: ' promise, God raised up for Israel '
  - type: note
    content: (Matt. 1:21)
  - type: text
    content: 'a Savior—Jesus— '
  '24':
  - type: note
    content: Matt. 3:1; (Luke 3:3)
  - type: text
    content: 'after John had first preached, before His coming, the baptism of repentance to all the people of Israel. '
  '25':
  - type: text
    content: 'And as John was finishing his course, he said, '
  - type: note
    content: Matt. 3:11; Mark 1:7; Luke 3:16
  - type: text
    content: '‘Who do you think I am? I am not '
  - type: text
    content: He.
  - type: text
    content: ' But behold, '
  - type: note
    content: John 1:20, 27
  - type: text
    content: there comes One after me, the sandals of whose feet I am not worthy to loose.’
  '26':
  - type: text
    content: '“Men '
  - type: text
    content: and
  - type: text
    content: ' brethren, sons of the family of Abraham, and '
  - type: note
    content: Ps. 66:16
  - type: text
    content: 'those among you who fear God, '
  - type: note
    content: Matt. 10:6
  - type: text
    content: 'to you the word of this salvation has been sent. '
  '27':
  - type: text
    content: 'For those who dwell in Jerusalem, and their rulers, '
  - type: note
    content: Luke 23:34
  - type: text
    content: 'because they did not know Him, nor even the voices of the Prophets which are read every Sabbath, have fulfilled '
  - type: text
    content: them
  - type: text
    content: ' in condemning '
  - type: text
    content: Him.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Matt. 27:22, 23; Mark 15:13, 14; Luke 23:21–23; John 19:15; Acts 3:14; (2 Cor. 5:21; Heb. 4:15); 1 Pet. 2:22
  - type: text
    content: 'And though they found no cause for death '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: Him,
  - type: text
    content: ' they asked Pilate that He should be put to death. '
  '29':
  - type: note
    content: Luke 18:31
  - type: text
    content: 'Now when they had fulfilled all that was written concerning Him, '
  - type: note
    content: Matt. 27:57–61; Mark 15:42–47; Luke 23:50–56; John 19:38–42
  - type: text
    content: 'they took '
  - type: text
    content: Him
  - type: text
    content: ' down from the tree and laid '
  - type: text
    content: Him
  - type: text
    content: ' in a tomb. '
  '3':
  - type: text
    content: 'Then, '
  - type: note
    content: Matt. 9:15; Mark 2:20; Luke 5:35; Acts 6:6
  - type: text
    content: 'having fasted and prayed, and laid hands on them, they sent '
  - type: text
    content: them
  - type: text
    content: ' away.'
  - type: heading
    content: Preaching in Cyprus
  '30':
  - type: note
    content: Ps. 16:10, 11; Hos. 6:2; Matt. 12:39, 40; 28:6
  - type: text
    content: 'But God raised Him from the dead. '
  '31':
  - type: note
    content: Matt. 28:16; Acts 1:3, 11; 1 Cor. 15:5–8
  - type: text
    content: 'He was seen for many days by those who came up with Him from Galilee to Jerusalem, who are His witnesses to the people. '
  '32':
  - type: text
    content: And we declare to you glad tidings—
  - type: note
    content: (Gen. 3:15)
  - type: text
    content: 'that promise which was made to the fathers. '
  '33':
  - type: text
    content: 'God has fulfilled this for us their children, in that He has raised up Jesus. As it is also written in the second Psalm:'
  - type: note
    content: Ps. 2:7; Heb. 1:5
  - type: text
    content: ‘You are My Son,
  - type: text
    content: Today I have begotten You.’
  '34':
  - type: text
    content: 'And that He raised Him from the dead, no more to return to corruption, He has spoken thus:'
  - type: note
    content: Is. 55:3
  - type: text
    content: ‘I will give you the sure mercies of David.’
  '35':
  - type: text
    content: 'Therefore He also says in another '
  - type: text
    content: 'Psalm:'
  - type: note
    content: Ps. 16:10; Acts 2:27
  - type: text
    content: ‘You will not allow Your Holy One to see corruption.’
  '36':
  - type: text
    content: '“For David, after he had served his own generation by the will of God, '
  - type: note
    content: Acts 2:29
  - type: text
    content: 'fell asleep, was buried with his fathers, and saw corruption; '
  '37':
  - type: text
    content: 'but He whom God raised up saw no corruption. '
  '38':
  - type: text
    content: 'Therefore let it be known to you, brethren, that '
  - type: note
    content: Jer. 31:34
  - type: text
    content: 'through this Man is preached to you the forgiveness of sins; '
  '39':
  - type: text
    content: 'and '
  - type: note
    content: (Is. 53:11; John 3:16)
  - type: text
    content: 'by Him everyone who believes is justified from all things from which you could not be justified by the law of Moses. '
  '4':
  - type: text
    content: 'So, being sent out by the Holy Spirit, they went down to Seleucia, and from there they sailed to '
  - type: note
    content: Acts 4:36
  - type: text
    content: 'Cyprus. '
  '40':
  - type: text
    content: 'Beware therefore, lest what has been spoken in the prophets come upon you:'
  '41':
  - type: text
    content: ‘Behold,
  - type: note
    content: Hab. 1:5
  - type: text
    content: ' you despisers,'
  - type: text
    content: Marvel and perish!
  - type: text
    content: For I work a work in your days,
  - type: text
    content: A work which you will by no means believe,
  - type: text
    content: Though one were to declare it to you.’ ”
  - type: heading
    content: Blessing and Conflict at Antioch
  '42':
  - type: text
    content: 'So when the Jews went out of the synagogue, the Gentiles begged that these words might be preached to them the next Sabbath. '
  '43':
  - type: text
    content: 'Now when the congregation had broken up, many of the Jews and devout proselytes followed Paul and Barnabas, who, speaking to them, '
  - type: note
    content: Acts 11:23
  - type: text
    content: 'persuaded them to continue in '
  - type: note
    content: Titus 2:11; Heb. 12:15; 1 Pet. 5:12
  - type: text
    content: the grace of God.
  '44':
  - type: text
    content: 'On the next Sabbath almost the whole city came together to hear the word of God. '
  '45':
  - type: text
    content: 'But when the Jews saw the multitudes, they were filled with envy; and contradicting and blaspheming, they '
  - type: note
    content: Acts 18:6; 1 Pet. 4:4; Jude 10
  - type: text
    content: 'opposed the things spoken by Paul. '
  '46':
  - type: text
    content: 'Then Paul and Barnabas grew bold and said, '
  - type: note
    content: Matt. 10:6; Acts 3:26; Rom. 1:16
  - type: text
    content: '“It was necessary that the word of God should be spoken to you first; but '
  - type: note
    content: Ex. 32:10; Deut. 32:21; Is. 55:5; Matt. 21:43; Rom. 10:19
  - type: text
    content: 'since you reject it, and judge yourselves unworthy of everlasting life, behold, '
  - type: note
    content: Acts 18:6
  - type: text
    content: 'we turn to the Gentiles. '
  '47':
  - type: text
    content: 'For so the Lord has commanded us:'
  - type: note
    content: Is. 42:6; 49:6; Luke 2:32
  - type: text
    content: ‘I have set you as a light to the Gentiles,
  - type: text
    content: That you should be for salvation to the ends of the earth.’ ”
  '48':
  - type: text
    content: 'Now when the Gentiles heard this, they were glad and glorified the word of the Lord. '
  - type: note
    content: (Acts 2:47)
  - type: text
    content: And as many as had been appointed to eternal life believed.
  '49':
  - type: text
    content: 'And the word of the Lord was being spread throughout all the region. '
  '5':
  - type: text
    content: 'And when they arrived in Salamis, '
  - type: note
    content: (Acts 13:46)
  - type: text
    content: 'they preached the word of God in the synagogues of the Jews. They also had '
  - type: note
    content: Acts 12:25; 15:37
  - type: text
    content: 'John as '
  - type: text
    content: their
  - type: text
    content: ' assistant.'
  '50':
  - type: text
    content: 'But the Jews stirred up the devout and prominent women and the chief men of the city, '
  - type: note
    content: Acts 7:52; 2 Tim. 3:11
  - type: text
    content: 'raised up persecution against Paul and Barnabas, and expelled them from their region. '
  '51':
  - type: note
    content: Matt. 10:14; Mark 6:11; (Luke 9:5)
  - type: text
    content: 'But they shook off the dust from their feet against them, and came to Iconium. '
  '52':
  - type: text
    content: 'And the disciples '
  - type: note
    content: Matt. 5:12; John 16:22
  - type: text
    content: 'were filled with joy and '
  - type: note
    content: Acts 2:4; 4:8, 31; 13:9
  - type: text
    content: with the Holy Spirit.
  '6':
  - type: text
    content: 'Now when they had gone through the island to Paphos, they found '
  - type: note
    content: Acts 8:9
  - type: text
    content: 'a certain sorcerer, a false prophet, a Jew whose name '
  - type: text
    content: was
  - type: text
    content: ' Bar-Jesus, '
  '7':
  - type: text
    content: 'who was with the proconsul, Sergius Paulus, an intelligent man. This man called for Barnabas and Saul and sought to hear the word of God. '
  '8':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 7:11; 2 Tim. 3:8
  - type: text
    content: 'Elymas the sorcerer (for so his name is translated) withstood them, seeking to turn the proconsul away from the faith. '
  '9':
  - type: text
    content: 'Then Saul, who also '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: called
  - type: text
    content: ' Paul, '
  - type: note
    content: Acts 2:4; 4:8
  - type: text
    content: 'filled with the Holy Spirit, looked intently at him '
