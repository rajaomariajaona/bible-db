document_id: JAS.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Untamable Tongue
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'My brethren, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 23:8); Rom. 2:21; 1 Tim. 1:7
    marker-yv: yv-n
  - type: text
    text: 'let not many of you become teachers, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 6:37
    marker-yv: yv-n
  - type: text
    text: 'knowing that we shall receive a stricter judgment. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 8:46
    marker-yv: yv-n
  - type: text
    text: 'we all stumble in many things. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 34:13
    marker-yv: yv-n
  - type: text
    text: 'If anyone does not stumble in word, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 12:34–37; James 3:2–12)
    marker-yv: yv-n
  - type: text
    text: 'he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a perfect man, able also to bridle the whole body. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Indeed, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 32:9
    marker-yv: yv-n
  - type: text
    text: 'we put bits in horses’ mouths that they may obey us, and we turn their whole body. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Look also at ships: although they are so large and are driven by fierce winds, they are turned by a very small rudder wherever the pilot desires. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Even so '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 12:18; 15:2; James 1:26
    marker-yv: yv-n
  - type: text
    text: 'the tongue is a little member and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 12:3; 73:8
    marker-yv: yv-n
  - type: text
    text: boasts great things.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'See how great a forest a little fire kindles! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 120:2, 3; Prov. 16:27
    marker-yv: yv-n
  - type: text
    text: 'the tongue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a fire, a world of iniquity. The tongue is so set among our members that it '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 12:36; 15:11, 18)
    marker-yv: yv-n
  - type: text
    text: 'defiles the whole body, and sets on fire the course of nature; and it is set on fire by hell. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For every kind of beast and bird, of reptile and creature of the sea, is tamed and has been tamed by mankind. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But no man can tame the tongue. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: It
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' an unruly evil, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 140:3; Eccl. 10:11; Rom. 3:13
    marker-yv: yv-n
  - type: text
    text: 'full of deadly poison. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'With it we bless our God and Father, and with it we curse men, who have been made '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 1:26; 5:1; 9:6; 1 Cor. 11:7
    marker-yv: yv-n
  - type: text
    text: 'in the similitude of God. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Out of the same mouth proceed blessing and cursing. My brethren, these things ought not to be so. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Does a spring send forth fresh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: water
  - type: text
    text: ' and bitter from the same opening? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Can a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 7:16–20
    marker-yv: yv-n
  - type: text
    text: fig tree, my brethren, bear olives, or a grapevine bear figs? Thus no spring yields both salt water and fresh.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Heavenly Versus Demonic Wisdom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 6:4
    marker-yv: yv-n
  - type: text
    text: 'Who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' wise and understanding among you? Let him show by good conduct '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' his works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: done
  - type: text
    text: ' in the meekness of wisdom. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But if you have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 13:13
    marker-yv: yv-n
  - type: text
    text: 'bitter envy and self-seeking in your hearts, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 2:17
    marker-yv: yv-n
  - type: text
    text: 'do not boast and lie against the truth. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 3:19
    marker-yv: yv-n
  - type: text
    text: 'This wisdom does not descend from above, but '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' earthly, sensual, demonic. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 3:3
    marker-yv: yv-n
  - type: text
    text: 'where envy and self-seeking '
  - type: usfm
    marker: it
    children:
    - type: text
      text: exist,
  - type: text
    text: ' confusion and every evil thing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' there. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 2:6, 7
    marker-yv: yv-n
  - type: text
    text: 'the wisdom that is from above is first pure, then peaceable, gentle, willing to yield, full of mercy and good fruits, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: James 2:1
    marker-yv: yv-n
  - type: text
    text: 'without partiality '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 12:9; 2 Cor. 6:6; 1 Pet. 1:22
    marker-yv: yv-n
  - type: text
    text: 'and without hypocrisy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 11:18; Is. 32:17; Hos. 10:12; Amos 6:12; (Gal. 6:8; Phil. 1:11)
    marker-yv: yv-n
  - type: text
    text: Now the fruit of righteousness is sown in peace by those who make peace.
