document_id: JAS.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Untamable Tongue
  - type: text
    content: 'My brethren, '
  - type: note
    content: (Matt. 23:8); Rom. 2:21; 1 Tim. 1:7
  - type: text
    content: 'let not many of you become teachers, '
  - type: note
    content: Luke 6:37
  - type: text
    content: 'knowing that we shall receive a stricter judgment. '
  '10':
  - type: text
    content: 'Out of the same mouth proceed blessing and cursing. My brethren, these things ought not to be so. '
  '11':
  - type: text
    content: 'Does a spring send forth fresh '
  - type: text
    content: water
  - type: text
    content: ' and bitter from the same opening? '
  '12':
  - type: text
    content: 'Can a '
  - type: note
    content: Matt. 7:16–20
  - type: text
    content: fig tree, my brethren, bear olives, or a grapevine bear figs? Thus no spring yields both salt water and fresh.
  - type: heading
    content: Heavenly Versus Demonic Wisdom
  '13':
  - type: note
    content: Gal. 6:4
  - type: text
    content: 'Who '
  - type: text
    content: is
  - type: text
    content: ' wise and understanding among you? Let him show by good conduct '
  - type: text
    content: that
  - type: text
    content: ' his works '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: text
    content: done
  - type: text
    content: ' in the meekness of wisdom. '
  '14':
  - type: text
    content: 'But if you have '
  - type: note
    content: Rom. 13:13
  - type: text
    content: 'bitter envy and self-seeking in your hearts, '
  - type: note
    content: Rom. 2:17
  - type: text
    content: 'do not boast and lie against the truth. '
  '15':
  - type: note
    content: Phil. 3:19
  - type: text
    content: 'This wisdom does not descend from above, but '
  - type: text
    content: is
  - type: text
    content: ' earthly, sensual, demonic. '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 3:3
  - type: text
    content: 'where envy and self-seeking '
  - type: text
    content: exist,
  - type: text
    content: ' confusion and every evil thing '
  - type: text
    content: are
  - type: text
    content: ' there. '
  '17':
  - type: text
    content: 'But '
  - type: note
    content: 1 Cor. 2:6, 7
  - type: text
    content: 'the wisdom that is from above is first pure, then peaceable, gentle, willing to yield, full of mercy and good fruits, '
  - type: note
    content: James 2:1
  - type: text
    content: 'without partiality '
  - type: note
    content: Rom. 12:9; 2 Cor. 6:6; 1 Pet. 1:22
  - type: text
    content: 'and without hypocrisy. '
  '18':
  - type: note
    content: Prov. 11:18; Is. 32:17; Hos. 10:12; Amos 6:12; (Gal. 6:8; Phil. 1:11)
  - type: text
    content: Now the fruit of righteousness is sown in peace by those who make peace.
  '2':
  - type: text
    content: 'For '
  - type: note
    content: 1 Kin. 8:46
  - type: text
    content: 'we all stumble in many things. '
  - type: note
    content: Ps. 34:13
  - type: text
    content: 'If anyone does not stumble in word, '
  - type: note
    content: (Matt. 12:34–37; James 3:2–12)
  - type: text
    content: 'he '
  - type: text
    content: is
  - type: text
    content: ' a perfect man, able also to bridle the whole body. '
  '3':
  - type: text
    content: 'Indeed, '
  - type: note
    content: Ps. 32:9
  - type: text
    content: 'we put bits in horses’ mouths that they may obey us, and we turn their whole body. '
  '4':
  - type: text
    content: 'Look also at ships: although they are so large and are driven by fierce winds, they are turned by a very small rudder wherever the pilot desires. '
  '5':
  - type: text
    content: 'Even so '
  - type: note
    content: Prov. 12:18; 15:2; James 1:26
  - type: text
    content: 'the tongue is a little member and '
  - type: note
    content: Ps. 12:3; 73:8
  - type: text
    content: boasts great things.
  - type: text
    content: 'See how great a forest a little fire kindles! '
  '6':
  - type: text
    content: 'And '
  - type: note
    content: Ps. 120:2, 3; Prov. 16:27
  - type: text
    content: 'the tongue '
  - type: text
    content: is
  - type: text
    content: ' a fire, a world of iniquity. The tongue is so set among our members that it '
  - type: note
    content: (Matt. 12:36; 15:11, 18)
  - type: text
    content: 'defiles the whole body, and sets on fire the course of nature; and it is set on fire by hell. '
  '7':
  - type: text
    content: 'For every kind of beast and bird, of reptile and creature of the sea, is tamed and has been tamed by mankind. '
  '8':
  - type: text
    content: 'But no man can tame the tongue. '
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' an unruly evil, '
  - type: note
    content: Ps. 140:3; Eccl. 10:11; Rom. 3:13
  - type: text
    content: 'full of deadly poison. '
  '9':
  - type: text
    content: 'With it we bless our God and Father, and with it we curse men, who have been made '
  - type: note
    content: Gen. 1:26; 5:1; 9:6; 1 Cor. 11:7
  - type: text
    content: 'in the similitude of God. '
