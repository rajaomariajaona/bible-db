    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:50
      marker-yv: yv-n
    - type: text
      text: 'the plains of Moab by the Jordan '
    - type: usfm
      marker: it
      children:
      - type: text
        text: across
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' Jericho, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Speak to the children of Israel, and say to them: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 19:2; Josh. 20:1–9
      marker-yv: yv-n
    - type: text
      text: '‘When you cross the Jordan into the land of Canaan, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:13; Num. 35:22–25; Deut. 19:1–13
      marker-yv: yv-n
    - type: text
      text: 'you shall appoint cities to be cities of refuge for you, that the manslayer who kills any person accidentally may flee there. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 19:6; Josh. 20:3, 5, 6
      marker-yv: yv-n
    - type: text
      text: 'They shall be cities of refuge for you from the avenger, that the manslayer may not die until he stands before the congregation in judgment. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And of the cities which you give, you shall have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:6
      marker-yv: yv-n
    - type: text
      text: 'six cities of refuge. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:41; Josh. 20:8
      marker-yv: yv-n
    - type: text
      text: 'You shall appoint three cities on this side of the Jordan, and three cities you shall appoint in the land of Canaan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' will be cities of refuge. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'These six cities shall be for refuge for the children of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 15:16
      marker-yv: yv-n
    - type: text
      text: for the stranger, and for the sojourner among them, that anyone who kills a person accidentally may flee there.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:12, 14; Lev. 24:17; Deut. 19:11, 12
      marker-yv: yv-n
    - type: text
      text: '‘But if he strikes him with an iron implement, so that he dies, he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a murderer; the murderer shall surely be put to death. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And if he strikes him with a stone in the hand, by which one could die, and he does die, he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a murderer; the murderer shall surely be put to death. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if
    - type: text
      text: ' he strikes him with a wooden hand weapon, by which one could die, and he does die, he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a murderer; the murderer shall surely be put to death. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:21, 24, 27; Deut. 19:6, 12
      marker-yv: yv-n
    - type: text
      text: 'The avenger of blood himself shall put the murderer to death; when he meets him, he shall put him to death. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 14:3, 4; 21:2, 3; Ezek. 45:1; 48:10–20
      marker-yv: yv-n
    - type: text
      text: '“Command the children of Israel that they give the Levites cities to dwell in from the inheritance of their possession, and you shall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: also
    - type: text
      text: ' give the Levites '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:32–34
      marker-yv: yv-n
    - type: text
      text: 'common-land around the cities. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 4:8; 2 Sam. 3:27; 20:10; 1 Kin. 2:31, 32
      marker-yv: yv-n
    - type: text
      text: 'If he pushes him out of hatred or, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:14; Deut. 19:11, 12
      marker-yv: yv-n
    - type: text
      text: 'while lying in wait, hurls something at him so that he dies, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'or in enmity he strikes him with his hand so that he dies, the one who struck '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' shall surely be put to death. He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a murderer. The avenger of blood shall put the murderer to death when he meets him.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '‘However, if he pushes him suddenly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:13
      marker-yv: yv-n
    - type: text
      text: 'without enmity, or throws anything at him without lying in wait, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'or uses a stone, by which a man could die, throwing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' at him without seeing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him,
    - type: text
      text: ' so that he dies, while he was not his enemy or seeking his harm, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:12; Josh. 20:6
      marker-yv: yv-n
    - type: text
      text: 'the congregation shall judge between the manslayer and the avenger of blood according to these judgments. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So the congregation shall deliver the manslayer from the hand of the avenger of blood, and the congregation shall return him to the city of refuge where he had fled, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 20:6
      marker-yv: yv-n
    - type: text
      text: 'he shall remain there until the death of the high priest '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:7; Lev. 4:3; 21:10
      marker-yv: yv-n
    - type: text
      text: 'who was anointed with the holy oil. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'But if the manslayer at any time goes outside the limits of the city of refuge where he fled, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'and the avenger of blood finds him outside the limits of his city of refuge, and the avenger of blood kills the manslayer, he shall not be guilty of blood, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: because he should have remained in his city of refuge until the death of the high priest. But after the death of the high priest the manslayer may return to the land of his possession.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '‘And these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:11
      marker-yv: yv-n
    - type: text
      text: 'a statute of judgment to you throughout your generations in all your dwellings. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'They shall have the cities to dwell in; and their common-land shall be for their cattle, for their herds, and for all their animals. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Whoever kills a person, the murderer shall be put to death on the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:6; 19:15; Matt. 18:16; John 7:51; 8:17, 18; 2 Cor. 13:1; Heb. 10:28
      marker-yv: yv-n
    - type: text
      text: 'testimony of witnesses; but one witness is not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sufficient
    - type: text
      text: ' testimony against a person for the death '
    - type: usfm
      marker: it
      children:
      - type: text
        text: penalty.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Moreover you shall take no ransom for the life of a murderer who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' guilty of death, but he shall surely be put to death. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And you shall take no ransom for him who has fled to his city of refuge, that he may return to dwell in the land before the death of the priest. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'So you shall not pollute the land where you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are;
    - type: text
      text: ' for blood '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 21:7, 8; Ps. 106:38
      marker-yv: yv-n
    - type: text
      text: 'defiles the land, and no atonement can be made for the land, for the blood that is shed on it, except '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:6
      marker-yv: yv-n
    - type: text
      text: 'by the blood of him who shed it. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:24, 25; Deut. 21:23
      marker-yv: yv-n
    - type: text
      text: 'do not defile the land which you inhabit, in the midst of which I dwell; for '
    - type: usfm
      marker: x
      children:
      - type: text
