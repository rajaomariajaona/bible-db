document_id: 2CH.11,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:21–24
      marker-yv: yv-n
    - type: text
      text: 'when Rehoboam came to Jerusalem, he assembled from the house of Judah and Benjamin one hundred and eighty thousand chosen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' who were warriors, to fight against Israel, that he might restore the kingdom to Rehoboam.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zorah, Aijalon, and Hebron, which are in Judah and Benjamin, fortified cities. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he fortified the strongholds, and put captains in them, and stores of food, oil, and wine. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also in every city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: put
    - type: text
      text: ' shields and spears, and made them very strong, having Judah and Benjamin on his side.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Priests and Levites Move to Judah
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And from all their territories the priests and the Levites who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in all Israel took their stand with him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the Levites left '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:2–5
      marker-yv: yv-n
    - type: text
      text: 'their common-lands and their possessions and came to Judah and Jerusalem, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:28–33; 2 Chr. 13:9
      marker-yv: yv-n
    - type: text
      text: 'Jeroboam and his sons had rejected them from serving as priests to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:31; 13:33; 14:9; (Hos. 13:2)
      marker-yv: yv-n
    - type: text
      text: 'Then he appointed for himself priests for the high places, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Lev. 17:7; 1 Cor. 10:20)
      marker-yv: yv-n
    - type: text
      text: 'the demons, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 12:28
      marker-yv: yv-n
    - type: text
      text: 'the calf idols which he had made. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 14:7
      marker-yv: yv-n
    - type: text
      text: 'And after '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: left,
    - type: text
      text: ' those from all the tribes of Israel, such as set their heart to seek the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 15:9, 10; 30:11, 18
      marker-yv: yv-n
    - type: text
      text: 'came to Jerusalem to sacrifice to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of their fathers. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 12:1, 13
      marker-yv: yv-n
    - type: text
      text: strengthened the kingdom of Judah, and made Rehoboam the son of Solomon strong for three years, because they walked in the way of David and Solomon for three years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Family of Rehoboam
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Rehoboam took for himself as wife Mahalath the daughter of Jerimoth the son of David, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' Abihail the daughter of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:6
      marker-yv: yv-n
    - type: text
      text: 'Eliah the son of Jesse. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she bore him children: Jeush, Shamariah, and Zaham. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 12:5; 2 Chr. 12:15
      marker-yv: yv-n
    - type: text
      text: 'to Shemaiah the man of God, saying, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After her he took '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 13:2
      marker-yv: yv-n
    - type: text
      text: 'Maachah the granddaughter of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 15:2
      marker-yv: yv-n
    - type: text
      text: 'Absalom; and she bore him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:31
      marker-yv: yv-n
    - type: text
      text: 'Abijah, Attai, Ziza, and Shelomith. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Rehoboam loved Maachah the granddaughter of Absalom more than all his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:17
      marker-yv: yv-n
    - type: text
      text: 'wives and his concubines; for he took eighteen wives and sixty concubines, and begot twenty-eight sons and sixty daughters. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Rehoboam '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 21:15–17
      marker-yv: yv-n
    - type: text
      text: 'appointed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 13:1
      marker-yv: yv-n
    - type: text
      text: 'Abijah the son of Maachah as chief, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' leader among his brothers; for he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: intended
    - type: text
      text: ' to make him king. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He dealt wisely, and dispersed some of his sons throughout all the territories of Judah and Benjamin, to every '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 11:5
      marker-yv: yv-n
    - type: text
      text: 'fortified city; and he gave them provisions in abundance. He also sought many wives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to Rehoboam the son of Solomon, king of Judah, and to all Israel in Judah and Benjamin, saying, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': “You shall not go up or fight against your brethren! Let every man return to his house, for this thing is from Me.” ’ ” Therefore they obeyed the words of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and turned back from attacking Jeroboam.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rehoboam Fortifies the Cities
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Rehoboam dwelt in Jerusalem, and built cities for defense in Judah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he built Bethlehem, Etam, Tekoa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beth Zur, Sochoh, Adullam, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gath, Mareshah, Ziph, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adoraim, Lachish, Azekah, '
