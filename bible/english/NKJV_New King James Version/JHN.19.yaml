document_id: JHN.19,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Soldiers Mock Jesus
  - type: text
    content: 'So then '
  - type: note
    content: Matt. 20:19; 27:26; Mark 15:15; Luke 18:33
  - type: text
    content: 'Pilate took Jesus and scourged '
  - type: text
    content: Him.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Then Pilate said to Him, “Are You not speaking to me? Do You not know that I have power to crucify You, and power to release You?”
  '11':
  - type: text
    content: 'Jesus answered, '
  - type: note
    content: (Luke 22:53); John 7:30
  - type: text
    content: '“You could have no power at all against Me unless it had been given you from above. Therefore '
  - type: note
    content: John 3:27; Rom. 13:1
  - type: text
    content: the one who delivered Me to you has the greater sin.”
  '12':
  - type: text
    content: 'From then on Pilate sought to release Him, but the Jews cried out, saying, “If you let this Man go, you are not Caesar’s friend. '
  - type: note
    content: Luke 23:2; John 18:33; Acts 17:7
  - type: text
    content: Whoever makes himself a king speaks against Caesar.”
  '13':
  - type: note
    content: Deut. 1:17; 1 Sam. 15:24; Prov. 29:25; Is. 51:12; Acts 4:19
  - type: text
    content: 'When Pilate therefore heard that saying, he brought Jesus out and sat down in the judgment seat in a place that is called '
  - type: text
    content: The
  - type: text
    content: ' Pavement, but in Hebrew, Gabbatha. '
  '14':
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 27:62; John 19:31, 42
  - type: text
    content: it was the Preparation Day of the Passover, and about the sixth hour. And he said to the Jews, “Behold your King!”
  '15':
  - type: text
    content: 'But they cried out, “Away with '
  - type: text
    content: Him,
  - type: text
    content: ' away with '
  - type: text
    content: Him!
  - type: text
    content: ' Crucify Him!”'
  - type: text
    content: Pilate said to them, “Shall I crucify your King?”
  - type: text
    content: 'The chief priests answered, '
  - type: note
    content: (Gen. 49:10)
  - type: text
    content: “We have no king but Caesar!”
  '16':
  - type: note
    content: Matt. 27:26, 31; Mark 15:15; Luke 23:24
  - type: text
    content: 'Then he delivered Him to them to be crucified. So they took Jesus and led '
  - type: text
    content: Him
  - type: text
    content: ' away.'
  - type: heading
    content: The King on a Cross
  '17':
  - type: note
    content: Matt. 27:31, 33; Mark 15:21, 22; Luke 23:26, 33
  - type: text
    content: 'And He, bearing His cross, '
  - type: note
    content: Num. 15:36; Heb. 13:12
  - type: text
    content: 'went out to a place called '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: Place
  - type: text
    content: ' of a Skull, which is called in Hebrew, Golgotha, '
  '18':
  - type: text
    content: 'where they crucified Him, and '
  - type: note
    content: Ps. 22:16–18; Is. 53:12; Matt. 20:19; 26:2
  - type: text
    content: 'two others with Him, one on either side, and Jesus in the center. '
  '19':
  - type: note
    content: Matt. 27:37; Mark 15:26; Luke 23:38
  - type: text
    content: 'Now Pilate wrote a title and put '
  - type: text
    content: it
  - type: text
    content: ' on the cross. And the writing was:'
  - type: text
    content: JESUS OF NAZARETH, THE KING OF THE JEWS.
  '2':
  - type: text
    content: 'And the soldiers twisted a crown of thorns and put '
  - type: text
    content: it
  - type: text
    content: ' on His head, and they put on Him a purple robe. '
  '20':
  - type: text
    content: 'Then many of the Jews read this title, for the place where Jesus was crucified was near the city; and it was written in Hebrew, Greek, '
  - type: text
    content: and
  - type: text
    content: ' Latin.'
  '21':
  - type: text
    content: Therefore the chief priests of the Jews said to Pilate, “Do not write, ‘The King of the Jews,’ but, ‘He said, “I am the King of the Jews.” ’ ”
  '22':
  - type: text
    content: Pilate answered, “What I have written, I have written.”
  '23':
  - type: note
    content: Matt. 27:35; Mark 15:24; Luke 23:34
  - type: text
    content: 'Then the soldiers, when they had crucified Jesus, took His garments and made four parts, to each soldier a part, and also the tunic. Now the tunic was without seam, woven from the top in one piece. '
  '24':
  - type: text
    content: 'They said therefore among themselves, “Let us not tear it, but cast lots for it, whose it shall be,” that the Scripture might be fulfilled which says:'
  - type: note
    content: Ps. 22:18
  - type: text
    content: “They divided My garments among them,
  - type: text
    content: And for My clothing they cast lots.”
  - type: text
    content: Therefore the soldiers did these things.
  - type: heading
    content: Behold Your Mother
  '25':
  - type: note
    content: Matt. 27:55; Mark 15:40; Luke 2:35; 23:49
  - type: text
    content: 'Now there stood by the cross of Jesus His mother, and His mother’s sister, Mary the '
  - type: text
    content: wife
  - type: text
    content: ' of '
  - type: note
    content: Luke 24:18
  - type: text
    content: 'Clopas, and Mary Magdalene. '
  '26':
  - type: text
    content: 'When Jesus therefore saw His mother, and '
  - type: note
    content: John 13:23; 20:2; 21:7, 20, 24
  - type: text
    content: 'the disciple whom He loved standing by, He said to His mother, '
  - type: note
    content: John 2:4
  - type: text
    content: “Woman, behold your son!”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Then He said to the disciple, '
  - type: text
    content: “Behold your mother!”
  - type: text
    content: ' And from that hour that disciple took her '
  - type: note
    content: Luke 18:28; John 1:11; 16:32; Acts 21:6
  - type: text
    content: 'to his own '
  - type: text
    content: home.
  - type: heading
    content: It Is Finished
  '28':
  - type: text
    content: 'After this, Jesus, knowing that all things were now accomplished, '
  - type: note
    content: Ps. 22:15
  - type: text
    content: 'that the Scripture might be fulfilled, said, '
  - type: text
    content: “I thirst!”
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Now a vessel full of sour wine was sitting there; and '
  - type: note
    content: Ps. 69:21; Matt. 27:48, 50; Mark 15:36; Luke 23:36
  - type: text
    content: 'they filled a sponge with sour wine, put '
  - type: text
    content: it
  - type: text
    content: ' on hyssop, and put '
  - type: text
    content: it
  - type: text
    content: ' to His mouth. '
  '3':
  - type: text
    content: 'Then they said, “Hail, King of the Jews!” And they '
  - type: note
    content: Is. 50:6
  - type: text
    content: struck Him with their hands.
  '30':
  - type: text
    content: 'So when Jesus had received the sour wine, He said, '
  - type: note
    content: Dan. 9:26; Zech. 11:10, 11; John 17:4
  - type: text
    content: “It is finished!”
  - type: text
    content: ' And bowing His head, He gave up His spirit.'
  - type: heading
    content: Jesus’ Side Is Pierced
  '31':
  - type: note
    content: Matt. 27:62; Mark 15:42; Luke 23:54
  - type: text
    content: 'Therefore, because it was the Preparation '
  - type: text
    content: Day,
  - type: text
    content: ' '
  - type: note
    content: Deut. 21:23; Josh. 8:29; 10:26
  - type: text
    content: 'that the bodies should not remain on the cross on the Sabbath (for that Sabbath was a '
  - type: note
    content: Ex. 12:16; Lev. 23:6, 7
  - type: text
    content: 'high day), the Jews asked Pilate that their legs might be broken, and '
  - type: text
    content: that
  - type: text
    content: ' they might be taken away. '
  '32':
  - type: text
    content: 'Then the soldiers came and broke the legs of the first and of the other who was crucified with Him. '
  '33':
  - type: text
    content: 'But when they came to Jesus and saw that He was already dead, they did not break His legs. '
  '34':
  - type: text
    content: 'But one of the soldiers pierced His side with a spear, and immediately '
  - type: note
    content: (1 John 5:6, 8)
  - type: text
    content: 'blood and water came out. '
  '35':
  - type: text
    content: 'And he who has seen has testified, and his testimony is '
  - type: note
    content: John 21:24
  - type: text
    content: 'true; and he knows that he is telling the truth, so that you may '
  - type: note
    content: (John 20:31)
  - type: text
    content: 'believe. '
  '36':
  - type: text
    content: 'For these things were done that the Scripture should be fulfilled, '
  - type: note
    content: (Ex. 12:46; Num. 9:12); Ps. 34:20
  - type: text
    content: '“Not '
  - type: text
    content: one
  - type: text
    content: ' of His bones shall be broken.” '
  '37':
  - type: text
    content: 'And again another Scripture says, '
  - type: note
    content: Ps. 22:16, 17; Zech. 12:10; 13:6; Rev. 1:7
  - type: text
    content: “They shall look on Him whom they pierced.”
  - type: heading
    content: Jesus Buried in Joseph’s Tomb
  '38':
  - type: note
    content: Matt. 27:57–61; Mark 15:42–47; Luke 23:50–56
  - type: text
    content: 'After this, Joseph of Arimathea, being a disciple of Jesus, but secretly, '
  - type: note
    content: (John 7:13; 9:22; 12:42)
  - type: text
    content: 'for fear of the Jews, asked Pilate that he might take away the body of Jesus; and Pilate gave '
  - type: text
    content: him
  - type: text
    content: ' permission. So he came and took the body of Jesus. '
  '39':
  - type: text
    content: 'And '
  - type: note
    content: John 3:1, 2; 7:50
  - type: text
    content: 'Nicodemus, who at first came to Jesus by night, also came, bringing a mixture of '
  - type: note
    content: Ps. 45:8; Prov. 7:17; Song 4:14; Matt. 2:11
  - type: text
    content: 'myrrh and aloes, about a hundred pounds. '
  '4':
  - type: text
    content: 'Pilate then went out again, and said to them, “Behold, I am bringing Him out to you, '
  - type: note
    content: Is. 53:9; John 18:33, 38; 1 Pet. 2:22–24
  - type: text
    content: that you may know that I find no fault in Him.”
  - type: heading
    content: Pilate’s Decision
  '40':
  - type: text
    content: 'Then they took the body of Jesus, and '
  - type: note
    content: Luke 24:12; John 20:5, 7; Acts 5:6
  - type: text
    content: 'bound it in strips of linen with the spices, as the custom of the Jews is to bury. '
  '41':
  - type: text
    content: 'Now in the place where He was crucified there was a garden, and in the garden a new tomb in which no one had yet been laid. '
  '42':
  - type: text
    content: 'So '
  - type: note
    content: Is. 53:9; Matt. 26:12; Mark 14:8
  - type: text
    content: 'there they laid Jesus, '
  - type: note
    content: John 19:14, 31
  - type: text
    content: 'because of the Jews’ Preparation '
  - type: text
    content: Day,
  - type: text
    content: ' for the tomb was nearby.'
  '5':
  - type: text
    content: 'Then Jesus came out, wearing the crown of thorns and the purple robe. And '
  - type: text
    content: Pilate
  - type: text
    content: ' said to them, “Behold the Man!”'
  '6':
  - type: note
    content: Acts 3:13
  - type: text
    content: 'Therefore, when the chief priests and officers saw Him, they cried out, saying, “Crucify '
  - type: text
    content: Him,
  - type: text
    content: ' crucify '
  - type: text
    content: Him!
  - type: text
    content: ”
  - type: text
    content: 'Pilate said to them, “You take Him and crucify '
  - type: text
    content: Him,
  - type: text
    content: ' for I find no fault in Him.”'
  '7':
  - type: text
    content: 'The Jews answered him, '
  - type: note
    content: Lev. 24:16
  - type: text
    content: '“We have a law, and according to our law He ought to die, because '
  - type: note
    content: Matt. 26:63–66; John 5:18; 10:33
  - type: text
    content: He made Himself the Son of God.”
  '8':
  - type: text
    content: 'Therefore, when Pilate heard that saying, he was the more afraid, '
  '9':
  - type: text
    content: 'and went again into the Praetorium, and said to Jesus, “Where are You from?” '
  - type: note
    content: Is. 53:7; Matt. 27:12, 14; Luke 23:9
  - type: text
    content: But Jesus gave him no answer.
