document_id: GAL.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul, an apostle (not from men nor through man, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:6
      marker-yv: yv-n
    - type: text
      text: 'through Jesus Christ and God the Father '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:24
      marker-yv: yv-n
    - type: text
      text: 'who raised Him from the dead), '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 10:33); 1 Thess. 2:4
      marker-yv: yv-n
    - type: text
      text: 'do I now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:7
      marker-yv: yv-n
    - type: text
      text: 'persuade men, or God? Or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 2:4
      marker-yv: yv-n
    - type: text
      text: do I seek to please men? For if I still pleased men, I would not be a bondservant of Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Call to Apostleship
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 2:16); 1 Cor. 15:1
      marker-yv: yv-n
    - type: text
      text: 'But I make known to you, brethren, that the gospel which was preached by me is not according to man. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:1
      marker-yv: yv-n
    - type: text
      text: 'I neither received it from man, nor was I taught '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: came
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 3:3–5)
      marker-yv: yv-n
    - type: text
      text: through the revelation of Jesus Christ.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you have heard of my former conduct in Judaism, how '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:1
      marker-yv: yv-n
    - type: text
      text: 'I persecuted the church of God beyond measure and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:3; 22:4, 5
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: tried
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' destroy it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I advanced in Judaism beyond many of my contemporaries in my own nation, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 26:9; Phil. 3:6
      marker-yv: yv-n
    - type: text
      text: 'being more exceedingly zealous '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 9:14; Matt. 15:2; Mark 7:3; (Col. 2:8)
      marker-yv: yv-n
    - type: text
      text: for the traditions of my fathers.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when it pleased God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:1, 5; Jer. 1:5; Acts 9:15; Rom. 1:1; Gal. 1:6
      marker-yv: yv-n
    - type: text
      text: 'who separated me from my mother’s womb and called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' through His grace, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 4:5–7)
      marker-yv: yv-n
    - type: text
      text: 'to reveal His Son in me, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:15; Gal. 2:9
      marker-yv: yv-n
    - type: text
      text: 'I might preach Him among the Gentiles, I did not immediately confer with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 16:17
      marker-yv: yv-n
    - type: text
      text: 'flesh and blood, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nor did I go up to Jerusalem to those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' apostles before me; but I went to Arabia, and returned again to Damascus.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contacts at Jerusalem
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then after three years '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:26
      marker-yv: yv-n
    - type: text
      text: 'I went up to Jerusalem to see Peter, and remained with him fifteen days. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:5
      marker-yv: yv-n
    - type: text
      text: 'I saw none of the other apostles except '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 13:55
      marker-yv: yv-n
    - type: text
      text: 'James, the Lord’s brother. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and all the brethren who are with me,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the churches of Galatia:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(Now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: concerning
    - type: text
      text: ' the things which I write to you, indeed, before God, I do not lie.)'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:30
      marker-yv: yv-n
    - type: text
      text: 'Afterward I went into the regions of Syria and Cilicia. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I was unknown by face to the churches of Judea which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:7
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in Christ. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they were '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:20, 21
      marker-yv: yv-n
    - type: text
      text: 'hearing only, “He who formerly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:3
      marker-yv: yv-n
    - type: text
      text: 'persecuted us now preaches the faith which he once '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tried
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' destroy.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 11:18
      marker-yv: yv-n
    - type: text
      text: glorified God in me.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Grace to you and peace from God the Father and our Lord Jesus Christ, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 20:28)
      marker-yv: yv-n
    - type: text
      text: 'who gave Himself for our sins, that He might deliver us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 2:5
      marker-yv: yv-n
    - type: text
      text: 'from this present evil age, according to the will of our God and Father, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to whom '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' glory forever and ever. Amen.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Only One Gospel
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I marvel that you are turning away so soon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:28); Gal. 1:15; 5:8
      marker-yv: yv-n
    - type: text
      text: 'from Him who called you in the grace of Christ, to a different gospel, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 11:4
      marker-yv: yv-n
    - type: text
      text: 'which is not another; but there are some '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:1; Gal. 5:10, 12
      marker-yv: yv-n
    - type: text
      text: 'who trouble you and want to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:17
      marker-yv: yv-n
    - type: text
      text: 'pervert the gospel of Christ. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But even if '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:22
      marker-yv: yv-n
    - type: text
      text: 'we, or an angel from heaven, preach any other gospel to you than what we have preached to you, let him be accursed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As we have said before, so now I say again, if anyone preaches any other gospel to you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:2
      marker-yv: yv-n
    - type: text
      text: than what you have received, let him be accursed.
