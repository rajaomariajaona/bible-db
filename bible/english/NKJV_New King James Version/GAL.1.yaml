document_id: GAL.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: 'Paul, an apostle (not from men nor through man, but '
  - type: note
    content: Acts 9:6
  - type: text
    content: 'through Jesus Christ and God the Father '
  - type: note
    content: Acts 2:24
  - type: text
    content: 'who raised Him from the dead), '
  '10':
  - type: text
    content: 'For '
  - type: note
    content: (1 Cor. 10:33); 1 Thess. 2:4
  - type: text
    content: 'do I now '
  - type: note
    content: 1 Sam. 24:7
  - type: text
    content: 'persuade men, or God? Or '
  - type: note
    content: 1 Thess. 2:4
  - type: text
    content: do I seek to please men? For if I still pleased men, I would not be a bondservant of Christ.
  - type: heading
    content: Call to Apostleship
  '11':
  - type: note
    content: (Rom. 2:16); 1 Cor. 15:1
  - type: text
    content: 'But I make known to you, brethren, that the gospel which was preached by me is not according to man. '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 15:1
  - type: text
    content: 'I neither received it from man, nor was I taught '
  - type: text
    content: it,
  - type: text
    content: ' but '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: came
  - type: text
    content: ' '
  - type: note
    content: (Eph. 3:3–5)
  - type: text
    content: through the revelation of Jesus Christ.
  '13':
  - type: text
    content: 'For you have heard of my former conduct in Judaism, how '
  - type: note
    content: Acts 9:1
  - type: text
    content: 'I persecuted the church of God beyond measure and '
  - type: note
    content: Acts 8:3; 22:4, 5
  - type: text
    content: tried
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' destroy it. '
  '14':
  - type: text
    content: 'And I advanced in Judaism beyond many of my contemporaries in my own nation, '
  - type: note
    content: Acts 26:9; Phil. 3:6
  - type: text
    content: 'being more exceedingly zealous '
  - type: note
    content: Jer. 9:14; Matt. 15:2; Mark 7:3; (Col. 2:8)
  - type: text
    content: for the traditions of my fathers.
  '15':
  - type: text
    content: 'But when it pleased God, '
  - type: note
    content: Is. 49:1, 5; Jer. 1:5; Acts 9:15; Rom. 1:1; Gal. 1:6
  - type: text
    content: 'who separated me from my mother’s womb and called '
  - type: text
    content: me
  - type: text
    content: ' through His grace, '
  '16':
  - type: note
    content: (2 Cor. 4:5–7)
  - type: text
    content: 'to reveal His Son in me, that '
  - type: note
    content: Acts 9:15; Gal. 2:9
  - type: text
    content: 'I might preach Him among the Gentiles, I did not immediately confer with '
  - type: note
    content: Matt. 16:17
  - type: text
    content: 'flesh and blood, '
  '17':
  - type: text
    content: 'nor did I go up to Jerusalem to those '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' apostles before me; but I went to Arabia, and returned again to Damascus.'
  - type: heading
    content: Contacts at Jerusalem
  '18':
  - type: text
    content: 'Then after three years '
  - type: note
    content: Acts 9:26
  - type: text
    content: 'I went up to Jerusalem to see Peter, and remained with him fifteen days. '
  '19':
  - type: text
    content: 'But '
  - type: note
    content: 1 Cor. 9:5
  - type: text
    content: 'I saw none of the other apostles except '
  - type: note
    content: Matt. 13:55
  - type: text
    content: 'James, the Lord’s brother. '
  '2':
  - type: text
    content: and all the brethren who are with me,
  - type: text
    content: 'To the churches of Galatia:'
  '20':
  - type: text
    content: '(Now '
  - type: text
    content: concerning
  - type: text
    content: ' the things which I write to you, indeed, before God, I do not lie.)'
  '21':
  - type: note
    content: Acts 9:30
  - type: text
    content: 'Afterward I went into the regions of Syria and Cilicia. '
  '22':
  - type: text
    content: 'And I was unknown by face to the churches of Judea which '
  - type: note
    content: Rom. 16:7
  - type: text
    content: were
  - type: text
    content: ' in Christ. '
  '23':
  - type: text
    content: 'But they were '
  - type: note
    content: Acts 9:20, 21
  - type: text
    content: 'hearing only, “He who formerly '
  - type: note
    content: Acts 8:3
  - type: text
    content: 'persecuted us now preaches the faith which he once '
  - type: text
    content: tried
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' destroy.” '
  '24':
  - type: text
    content: 'And they '
  - type: note
    content: Acts 11:18
  - type: text
    content: glorified God in me.
  '3':
  - type: text
    content: 'Grace to you and peace from God the Father and our Lord Jesus Christ, '
  '4':
  - type: note
    content: (Matt. 20:28)
  - type: text
    content: 'who gave Himself for our sins, that He might deliver us '
  - type: note
    content: Heb. 2:5
  - type: text
    content: 'from this present evil age, according to the will of our God and Father, '
  '5':
  - type: text
    content: 'to whom '
  - type: text
    content: be
  - type: text
    content: ' glory forever and ever. Amen.'
  - type: heading
    content: Only One Gospel
  '6':
  - type: text
    content: 'I marvel that you are turning away so soon '
  - type: note
    content: (Rom. 8:28); Gal. 1:15; 5:8
  - type: text
    content: 'from Him who called you in the grace of Christ, to a different gospel, '
  '7':
  - type: note
    content: 2 Cor. 11:4
  - type: text
    content: 'which is not another; but there are some '
  - type: note
    content: Acts 15:1; Gal. 5:10, 12
  - type: text
    content: 'who trouble you and want to '
  - type: note
    content: 2 Cor. 2:17
  - type: text
    content: 'pervert the gospel of Christ. '
  '8':
  - type: text
    content: 'But even if '
  - type: note
    content: 1 Cor. 16:22
  - type: text
    content: 'we, or an angel from heaven, preach any other gospel to you than what we have preached to you, let him be accursed. '
  '9':
  - type: text
    content: 'As we have said before, so now I say again, if anyone preaches any other gospel to you '
  - type: note
    content: Deut. 4:2
  - type: text
    content: than what you have received, let him be accursed.
