  - type: heading
    content: The Grief of Wisdom
  '12':
  - type: text
    content: 'I, the Preacher, was king over Israel in Jerusalem. '
  '13':
  - type: text
    content: 'And I set my heart to seek and '
  - type: note
    content: (Eccl. 7:25; 8:16, 17)
  - type: text
    content: 'search out by wisdom concerning all that is done under heaven; '
  - type: note
    content: Gen. 3:19; Eccl. 3:10
  - type: text
    content: 'this burdensome task God has given to the sons of man, by which they may be exercised. '
  '14':
  - type: text
    content: 'I have seen all the works that are done under the sun; and indeed, all '
  - type: text
    content: is
  - type: text
    content: ' vanity and grasping for the wind.'
  '15':
  - type: note
    content: Eccl. 7:13
  - type: text
    content: What
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' crooked cannot be made straight,'
  - type: text
    content: And what is lacking cannot be numbered.
  '16':
  - type: text
    content: 'I communed with my heart, saying, “Look, I have attained greatness, and have gained '
  - type: note
    content: 1 Kin. 3:12, 13; Eccl. 2:9
  - type: text
    content: 'more wisdom than all who were before me in Jerusalem. My heart has understood great wisdom and knowledge.” '
  '17':
  - type: note
    content: Eccl. 2:3, 12; 7:23, 25; (1 Thess. 5:21)
  - type: text
    content: And I set my heart to know wisdom and to know madness and folly. I perceived that this also is grasping for the wind.
  '18':
  - type: text
    content: 'For '
  - type: note
    content: Eccl. 12:12
  - type: text
    content: 'in much wisdom '
  - type: text
    content: is
  - type: text
    content: ' much grief,'
  - type: text
    content: And he who increases knowledge increases sorrow.
  '2':
  - type: text
    content: “Vanity
  - type: note
    content: Ps. 39:5, 6; 62:9; 144:4; Eccl. 12:8
  - type: text
    content: ' of vanities,” says the Preacher;'
  - type: text
