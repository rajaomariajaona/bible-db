  '3':
  - type: note
    content: Eccl. 2:22; 3:9
  - type: text
    content: What profit has a man from all his labor
  - type: text
    content: In which he toils under the sun?
  '4':
  - type: text
    content: One
  - type: text
    content: ' generation passes away, and '
  - type: text
    content: another
  - type: text
    content: ' generation comes;'
  - type: note
    content: Ps. 104:5; 119:90
  - type: text
    content: But the earth abides forever.
  '5':
  - type: note
    content: Ps. 19:4–6
  - type: text
    content: The sun also rises, and the sun goes down,
  - type: text
    content: And hastens to the place where it arose.
  '6':
  - type: note
    content: Eccl. 11:5; John 3:8
  - type: text
    content: The wind goes toward the south,
  - type: text
    content: And turns around to the north;
  - type: text
    content: The wind whirls about continually,
  - type: text
    content: And comes again on its circuit.
  '7':
  - type: note
    content: (Ps. 104:8, 9; Jer. 5:22)
  - type: text
    content: All the rivers run into the sea,
  - type: text
    content: 'Yet the sea '
