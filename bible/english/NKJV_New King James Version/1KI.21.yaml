      marker: x
      children:
      - type: text
        text: Is. 58:4
      marker-yv: yv-n
    - type: text
      text: 'They proclaimed a fast, and seated Naboth with high honor among the people. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And two men, scoundrels, came in and sat before him; and the scoundrels '
    - type: usfm
