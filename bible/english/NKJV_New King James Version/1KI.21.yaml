  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall speak to him, saying, ‘Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': “Have you murdered and also taken possession?” ’ And you shall speak to him, saying, ‘Thus says the '
    - type: usfm
