        text: 1 Kin. 22:38; 2 Kin. 9:26
      marker-yv: yv-n
    - type: text
      text: “In the place where dogs licked the blood of Naboth, dogs shall lick your blood, even yours.” ’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ahab spoke to Naboth, saying, “Give me your '
    - type: usfm
