      marker-yv: yv-n
    - type: text
      text: that I should give the inheritance of my fathers to you!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ahab went into his house sullen and displeased because of the word which Naboth the Jezreelite had spoken to him; for he had said, “I will not give you the inheritance of my fathers.” And he lay down on his bed, and turned away his face, and would eat no food. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 19:1, 2
      marker-yv: yv-n
    - type: text
      text: Jezebel his wife came to him, and said to him, “Why is your spirit so sullen that you eat no food?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to her, “Because I spoke to Naboth the Jezreelite, and said to him, ‘Give me your vineyard for money; or else, if it pleases you, I will give you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: another
    - type: text
      text: ' vineyard for it.’ And he answered, ‘I will not give you my vineyard.’ ”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Jezebel his wife said to him, “You now exercise authority over Israel! Arise, eat food, and let your heart be cheerful; I will give you the vineyard of Naboth the Jezreelite.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And she wrote letters in Ahab’s name, sealed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' with his seal, and sent the letters to the elders and the nobles who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' dwelling in the city with Naboth. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She wrote in the letters, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Proclaim a fast, and seat Naboth with high honor among the people; '
