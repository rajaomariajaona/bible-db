      children:
      - type: text
        text: Gen. 37:34; 2 Sam. 3:31; 2 Kin. 6:30
      marker-yv: yv-n
    - type: text
      text: put sackcloth on his body, and fasted and lay in sackcloth, and went about mourning.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Elijah the Tishbite, saying, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“See how Ahab has humbled himself before Me? Because he '
    - type: usfm
