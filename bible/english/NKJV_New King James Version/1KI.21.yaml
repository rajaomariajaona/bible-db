    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 16:31
      marker-yv: yv-n
    - type: text
      text: 'because Jezebel his wife stirred him up. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he behaved very abominably in following idols, according to all '
    - type: usfm
