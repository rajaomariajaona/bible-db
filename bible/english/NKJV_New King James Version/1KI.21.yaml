      - type: text
        text: (Ex. 20:16; 23:1, 7)
      marker-yv: yv-n
    - type: text
      text: 'witnessed against him, against Naboth, in the presence of the people, saying, “Naboth has blasphemed God and the king!” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 9:26; 2 Chr. 24:21; Acts 7:58, 59; Heb. 11:37
      marker-yv: yv-n
    - type: text
      text: 'Then they took him outside the city and stoned him with stones, so that he died. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they sent to Jezebel, saying, “Naboth has been stoned and is dead.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Jezebel heard that Naboth had been stoned and was dead, that Jezebel said to Ahab, “Arise, take possession of the vineyard of Naboth the Jezreelite, which he refused to give you for money; for Naboth is not alive, but dead.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So it was, when Ahab heard that Naboth was dead, that Ahab got up and went down to take possession of the vineyard of Naboth the Jezreelite.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
