      children:
      - type: text
        text: 1 Kin. 14:10; 2 Kin. 9:8
      marker-yv: yv-n
    - type: text
      text: 'I will bring calamity on you. I will take away your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 10:10
      marker-yv: yv-n
    - type: text
      text: 'posterity, and will cut off from Ahab '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:22
      marker-yv: yv-n
    - type: text
      text: 'every male in Israel, both '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 14:10
      marker-yv: yv-n
    - type: text
      text: 'bond and free. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make your house like the house of '
    - type: usfm
