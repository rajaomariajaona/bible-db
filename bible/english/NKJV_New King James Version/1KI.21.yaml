      - type: text
        text: 1 Sam. 8:14
      marker-yv: yv-n
    - type: text
      text: 'vineyard, that I may have it for a vegetable garden, because it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' near, next to my house; and for it I will give you a vineyard better than it. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Or,
    - type: text
      text: ' if it seems good to you, I will give you its worth in money.”'
