      children:
      - type: text
        text: 1 Kin. 16:30–33; 21:20
      marker-yv: yv-n
    - type: text
      text: 'there was no one like Ahab who sold himself to do wickedness in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
