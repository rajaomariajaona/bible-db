      children:
      - type: text
        text: Gen. 15:16; (Lev. 18:25–30); 2 Kin. 21:11
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the Amorites had done, whom the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had cast out before the children of Israel.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, when Ahab heard those words, that he tore his clothes and '
    - type: usfm
