    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 21:25; 2 Kin. 17:17; (Rom. 7:14)
      marker-yv: yv-n
    - type: text
      text: 'you have sold yourself to do evil in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Behold, '
    - type: usfm
