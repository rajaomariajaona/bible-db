document_id: MAT.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Satan Tempts Jesus
  - type: text
    content: 'Then '
  - type: note
    content: Matt. 4:1–11; Mark 1:12; Luke 4:1
  - type: text
    content: 'Jesus was led up by '
  - type: note
    content: Ezek. 3:14; Acts 8:39
  - type: text
    content: 'the Spirit into the wilderness to be tempted by the devil. '
  '10':
  - type: text
    content: 'Then Jesus said to him, '
  - type: text
    content: “Away with you,
  - type: text
    content: ' Satan! For it is written, '
  - type: note
    content: Deut. 6:13; 10:20; Josh. 24:14
  - type: text
    content: '‘You shall worship the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and Him only you shall serve.’'
  - type: text
    content: ' ”'
  '11':
  - type: text
    content: 'Then the devil '
  - type: note
    content: (James 4:7)
  - type: text
    content: 'left Him, and behold, '
  - type: note
    content: Matt. 26:53; Luke 22:43; (Heb. 1:14)
  - type: text
    content: angels came and ministered to Him.
  - type: heading
    content: Jesus Begins His Galilean Ministry
  '12':
  - type: note
    content: Matt. 14:3; Mark 1:14; Luke 3:20; John 4:43
  - type: text
    content: 'Now when Jesus heard that John had been put in prison, He departed to Galilee. '
  '13':
  - type: text
    content: 'And leaving Nazareth, He came and dwelt in Capernaum, which is by the sea, in the regions of Zebulun and Naphtali, '
  '14':
  - type: text
    content: 'that it might be fulfilled which was spoken by Isaiah the prophet, saying:'
  '15':
  - type: text
    content: “The
  - type: note
    content: Is. 9:1, 2
  - type: text
    content: ' land of Zebulun and the land of Naphtali,'
  - type: text
    content: By the way of the sea, beyond the Jordan,
  - type: text
    content: 'Galilee of the Gentiles:'
  '16':
  - type: note
    content: Is. 42:7; Luke 2:32
  - type: text
    content: The people who sat in darkness have seen a great light,
  - type: text
    content: And upon those who sat in the region and shadow of death
  - type: text
    content: Light has dawned.”
  '17':
  - type: note
    content: Mark 1:14, 15
  - type: text
    content: 'From that time Jesus began to preach and to say, '
  - type: note
    content: Matt. 3:2; 10:7
  - type: text
    content: '“Repent, for the kingdom of heaven '
  - type: text
    content: is at hand.”
  - type: heading
    content: Four Fishermen Called as Disciples
  '18':
  - type: note
    content: Matt. 4:18–22; Mark 1:16–20; Luke 5:2–11; John 1:40–42
  - type: text
    content: 'And Jesus, walking by the Sea of Galilee, saw two brothers, Simon '
  - type: note
    content: Matt. 10:2; 16:18; John 1:40–42
  - type: text
    content: 'called Peter, and Andrew his brother, casting a net into the sea; for they were fishermen. '
  '19':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: '“Follow Me, and '
  - type: note
    content: Luke 5:10
  - type: text
    content: I will make you fishers of men.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'And when He had fasted forty days and forty nights, afterward He was hungry. '
  '20':
  - type: note
    content: Matt. 19:27; Mark 10:28
  - type: text
    content: 'They immediately left '
  - type: text
    content: their
  - type: text
    content: ' nets and followed Him.'
  '21':
  - type: note
    content: Mark 1:19
  - type: text
    content: 'Going on from there, He saw two other brothers, James '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: son
  - type: text
    content: ' of Zebedee, and John his brother, in the boat with Zebedee their father, mending their nets. He called them, '
  '22':
  - type: text
    content: and immediately they left the boat and their father, and followed Him.
  - type: heading
    content: Jesus Heals a Great Multitude
  '23':
  - type: text
    content: 'And Jesus went about all Galilee, '
  - type: note
    content: Ps. 22:22; Matt. 9:35; Mark 1:21; 6:2; 10:1; Luke 4:15; 6:6; 13:10; John 6:59; 18:20
  - type: text
    content: 'teaching in their synagogues, preaching '
  - type: note
    content: (Matt. 24:14); Mark 1:14; Luke 4:43; 8:1; 16:16
  - type: text
    content: 'the gospel of the kingdom, '
  - type: note
    content: Mark 1:34; Luke 4:40; 7:21; Acts 10:38
  - type: text
    content: 'and healing all kinds of sickness and all kinds of disease among the people. '
  '24':
  - type: text
    content: 'Then His fame went throughout all Syria; and they '
  - type: note
    content: Mark 1:32, 33; Luke 4:40
  - type: text
    content: 'brought to Him all sick people who were afflicted with various diseases and torments, and those who were demon-possessed, epileptics, and paralytics; and He healed them. '
  '25':
  - type: note
    content: Matt. 5:1; 8:1, 18; Mark 3:7, 8
  - type: text
    content: 'Great multitudes followed Him—from Galilee, and '
  - type: text
    content: from
  - type: text
    content: ' Decapolis, Jerusalem, Judea, and beyond the Jordan.'
  '3':
  - type: text
    content: Now when the tempter came to Him, he said, “If You are the Son of God, command that these stones become bread.”
  '4':
  - type: text
    content: 'But He answered and said, '
  - type: text
    content: '“It is written, '
  - type: note
    content: Deut. 8:3
  - type: text
    content: ‘Man shall not live by bread alone, but by every word that proceeds from the mouth of God.’
  - type: text
    content: ' ”'
  '5':
  - type: text
    content: 'Then the devil took Him up '
  - type: note
    content: Neh. 11:1, 18; Dan. 9:24; Matt. 27:53
  - type: text
    content: 'into the holy city, set Him on the pinnacle of the temple, '
  '6':
  - type: text
    content: 'and said to Him, “If You are the Son of God, throw Yourself down. For it is written:'
  - type: note
    content: Ps. 91:11
  - type: text
    content: ‘He shall give His angels charge over you,’
  - type: text
    content: and,
  - type: note
    content: Ps. 91:12
  - type: text
    content: '‘In '
  - type: text
    content: their
  - type: text
    content: ' hands they shall bear you up,'
  - type: text
    content: Lest you dash your foot against a stone.’ ”
  '7':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: '“It is written again, '
  - type: note
    content: Deut. 6:16
  - type: text
    content: '‘You shall not '
  - type: text
    content: 'tempt the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.’'
  - type: text
    content: ' ”'
  '8':
  - type: text
    content: 'Again, the devil took Him up on an exceedingly high mountain, and '
  - type: note
    content: (Matt. 16:26; 1 John 2:15–17)
  - type: text
    content: 'showed Him all the kingdoms of the world and their glory. '
  '9':
  - type: text
    content: And he said to Him, “All these things I will give You if You will fall down and worship me.”
