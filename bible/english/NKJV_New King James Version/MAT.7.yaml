  '1':
  - type: heading
    content: Do Not Judge
  - type: text
    content: “Judge
  - type: text
    content: ' '
  - type: note
    content: Matt. 7:1–5; Luke 6:37; Rom. 14:3; (1 Cor. 4:3, 4)
  - type: text
    content: not, that you be not judged.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Or if he asks for a fish, will he give him a serpent?
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'If you then, '
  - type: note
    content: Gen. 6:5; 8:21; Ps. 84:11; Is. 63:7; (Rom. 8:32; James 1:17); 1 John 3:1
  - type: text
    content: being evil, know how to give good gifts to your children, how much more will your Father who is in heaven give good things to those who ask Him!
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Therefore, '
  - type: note
    content: Luke 6:31
  - type: text
    content: 'whatever you want men to do to you, do also to them, for '
  - type: note
    content: Matt. 22:40; Rom. 13:8; Gal. 5:14; (1 Tim. 1:5)
  - type: text
    content: this is the Law and the Prophets.
  - type: heading
    content: The Narrow Way
  '13':
  - type: note
    content: Luke 13:24
  - type: text
    content: '“Enter by the narrow gate; for wide '
  - type: text
    content: is
  - type: text
    content: ' the gate and broad '
  - type: text
    content: is
  - type: text
    content: ' the way that leads to destruction, and there are many who go in by it.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Because
  - type: text
    content: ' narrow '
  - type: text
    content: is
  - type: text
    content: ' the gate and '
  - type: text
    content: 'difficult '
  - type: text
    content: is
  - type: text
    content: ' the way which leads to life, and there are few who find it.'
  - type: heading
    content: You Will Know Them by Their Fruits
  '15':
  - type: note
    content: Deut. 13:3; Jer. 23:16; Ezek. 22:28; Mark 13:22; (Luke 6:26); Rom. 16:17; Eph. 5:6; (Col. 2:8; 2 Pet. 2:1; 1 John 4:1–3)
  - type: text
    content: '“Beware of false prophets, '
  - type: note
    content: Mic. 3:5
  - type: text
    content: who come to you in sheep’s clothing, but inwardly they are ravenous wolves.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Matt. 7:20; 12:33; Luke 6:44; James 3:12
  - type: text
    content: 'You will know them by their fruits. '
  - type: note
    content: Luke 6:43
  - type: text
    content: Do men gather grapes from thornbushes or figs from thistles?
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Even so, '
  - type: note
    content: Jer. 11:19; Matt. 12:33
  - type: text
    content: every good tree bears good fruit, but a bad tree bears bad fruit.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'A good tree cannot bear bad fruit, nor '
  - type: text
    content: can
  - type: text
    content: ' a bad tree bear good fruit.'
  - type: text
    content: ' '
  '19':
  - type: note
    content: Matt. 3:10; Luke 3:9; (John 15:2, 6)
  - type: text
    content: Every tree that does not bear good fruit is cut down and thrown into the fire.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'For with what '
  - type: text
    content: 'judgment you judge, you will be judged; '
  - type: note
    content: Mark 4:24; Luke 6:38
  - type: text
    content: and with the measure you use, it will be measured back to you.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Therefore by their fruits you will know them.
  - type: heading
    content: I Never Knew You
  '21':
  - type: text
    content: '“Not everyone who says to Me, '
  - type: note
    content: Hos. 8:2; Matt. 25:11; Luke 6:46; Acts 19:13
  - type: text
    content: '‘Lord, Lord,’ shall enter the kingdom of heaven, but he who '
  - type: note
    content: Rom. 2:13; James 1:22
  - type: text
    content: does the will of My Father in heaven.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Many will say to Me in that day, ‘Lord, Lord, have we '
  - type: note
    content: Num. 24:4
  - type: text
    content: not prophesied in Your name, cast out demons in Your name, and done many wonders in Your name?’
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And '
  - type: note
    content: Matt. 25:12; Luke 13:25; (2 Tim. 2:19)
  - type: text
    content: 'then I will declare to them, ‘I never knew you; '
  - type: note
    content: Ps. 5:5; 6:8; (Matt. 25:41); Luke 13:27
  - type: text
    content: depart from Me, you who practice lawlessness!’
  - type: heading
    content: Build on the Rock
  '24':
  - type: text
    content: '“Therefore '
  - type: note
    content: Matt. 7:24–27; Luke 6:47–49
  - type: text
    content: 'whoever hears these sayings of Mine, and does them, I will liken him to a wise man who built his house on the rock:'
  - type: text
    content: ' '
  '25':
  - type: text
    content: and the rain descended, the floods came, and the winds blew and beat on that house; and it did not fall, for it was founded on the rock.
  '26':
  - type: text
    content: '“But everyone who hears these sayings of Mine, and does not do them, will be like a foolish man who built his house on the sand:'
  - type: text
    content: ' '
  '27':
  - type: text
    content: and the rain descended, the floods came, and the winds blew and beat on that house; and it fell. And great was its fall.”
  '28':
  - type: text
    content: 'And so it was, when Jesus had ended these sayings, that '
  - type: note
    content: Matt. 13:54; Mark 1:22; 6:2; Luke 4:32; John 7:46
  - type: text
    content: 'the people were astonished at His teaching, '
  '29':
  - type: note
    content: (John 7:46)
  - type: text
    content: for He taught them as one having authority, and not as the scribes.
  '3':
  - type: note
    content: Luke 6:41
  - type: text
    content: And why do you look at the speck in your brother’s eye, but do not consider the plank in your own eye?
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Or how can you say to your brother, ‘Let me remove the speck from your eye’; and look, a plank '
  - type: text
    content: is
  - type: text
    content: ' in your own eye?'
  - type: text
    content: ' '
  '5':
  - type: text
    content: Hypocrite! First remove the plank from your own eye, and then you will see clearly to remove the speck from your brother’s eye.
  '6':
  - type: note
    content: Prov. 9:7, 8; Acts 13:45
  - type: text
    content: “Do not give what is holy to the dogs; nor cast your pearls before swine, lest they trample them under their feet, and turn and tear you in pieces.
  - type: heading
    content: Keep Asking, Seeking, Knocking
  '7':
  - type: note
    content: (Matt. 21:22; Mark 11:24); Luke 11:9–13; 18:1–8; (John 15:7; James 1:5, 6; 1 John 3:22)
  - type: text
    content: “Ask, and it will be given to you; seek, and you will find; knock, and it will be opened to you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: Prov. 8:17; Jer. 29:12
  - type: text
    content: everyone who asks receives, and he who seeks finds, and to him who knocks it will be opened.
  - type: text
    content: ' '
  '9':
  - type: note
    content: Luke 11:11
  - type: text
    content: Or what man is there among you who, if his son asks for bread, will give him a stone?
  - type: text
    content: ' '
