verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esau Comes to Meet Jacob
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jacob went on his way, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 22:31; 2 Kin. 6:16, 17; (Ps. 34:7; 91:1; Heb. 1:14)
      marker-yv: yv-n
    - type: text
      text: 'the angels of God met him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am not worthy of the least of all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 24:27
      marker-yv: yv-n
    - type: text
      text: 'mercies and of all the truth which You have shown Your servant; for I crossed over this Jordan with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 8:7
      marker-yv: yv-n
    - type: text
      text: 'my staff, and now I have become two companies. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 59:1, 2
      marker-yv: yv-n
    - type: text
      text: 'Deliver me, I pray, from the hand of my brother, from the hand of Esau; for I fear him, lest he come and attack me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 10:14
      marker-yv: yv-n
    - type: text
      text: 'the mother with the children. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:13–15
      marker-yv: yv-n
    - type: text
      text: 'You said, ‘I will surely treat you well, and make your descendants as the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:17
      marker-yv: yv-n
    - type: text
      text: sand of the sea, which cannot be numbered for multitude.’ ”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he lodged there that same night, and took what came to his hand as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 43:11
      marker-yv: yv-n
    - type: text
      text: 'a present for Esau his brother: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'two hundred female goats and twenty male goats, two hundred ewes and twenty rams, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'thirty milk camels with their colts, forty cows and ten bulls, twenty female donkeys and ten foals. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he delivered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to the hand of his servants, every drove by itself, and said to his servants, “Pass over before me, and put some distance between successive droves.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he commanded the first one, saying, “When Esau my brother meets you and asks you, saying, ‘To whom do you belong, and where are you going? Whose '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' these in front of you?’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then you shall say, ‘They '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' your servant Jacob’s. It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a present sent to my lord Esau; and behold, he also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' behind us.’ ” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he commanded the second, the third, and all who followed the droves, saying, “In this manner you shall speak to Esau when you find him; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jacob saw them, he said, “This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' God’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 5:14; Ps. 103:21; 148:2; Luke 2:13
      marker-yv: yv-n
    - type: text
      text: camp.” And he called the name of that place Mahanaim.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and also say, ‘Behold, your servant Jacob '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' behind us.’ ” For he said, “I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 21:14)
      marker-yv: yv-n
    - type: text
      text: 'appease him with the present that goes before me, and afterward I will see his face; perhaps he will accept me.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the present went on over before him, but he himself lodged that night in the camp.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wrestling with God
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he arose that night and took his two wives, his two female servants, and his eleven sons, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:24; Deut. 3:16; Josh. 12:2
      marker-yv: yv-n
    - type: text
      text: 'and crossed over the ford of Jabbok. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took them, sent them over the brook, and sent over what he had. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jacob was left alone; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 5:13–15; Hos. 12:2–4
      marker-yv: yv-n
    - type: text
      text: 'a Man wrestled with him until the breaking of day. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when He saw that He did not prevail against him, He touched the socket of his hip; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:41; 2 Cor. 12:7
      marker-yv: yv-n
    - type: text
      text: 'the socket of Jacob’s hip was out of joint as He wrestled with him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:28
      marker-yv: yv-n
    - type: text
      text: He said, “Let Me go, for the day breaks.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 12:4
      marker-yv: yv-n
    - type: text
      text: “I will not let You go unless You bless me!”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So He said to him, “What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your name?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “Jacob.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 35:10; 1 Kin. 18:31; 2 Kin. 17:34
      marker-yv: yv-n
    - type: text
      text: '“Your name shall no longer be called Jacob, but Israel; for you have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 12:3, 4
      marker-yv: yv-n
    - type: text
      text: 'struggled with God and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:31; 27:33
      marker-yv: yv-n
    - type: text
      text: with men, and have prevailed.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jacob asked, saying, “Tell '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' Your name, I pray.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 13:17, 18
      marker-yv: yv-n
    - type: text
      text: '“Why '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you ask about My name?” And He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 35:9
      marker-yv: yv-n
    - type: text
      text: blessed him there.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jacob sent messengers before him to Esau his brother '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:6; 33:14, 16
      marker-yv: yv-n
    - type: text
      text: 'in the land of Seir, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:30; 36:6–9; Deut. 2:5; Josh. 24:4
      marker-yv: yv-n
    - type: text
      text: 'the country of Edom. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jacob called the name of the place Peniel: “For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 16:13; Ex. 24:10, 11; 33:20; Num. 12:8; Deut. 5:24; Judg. 6:22; Is. 6:5; (Matt. 5:8; 1 Cor. 13:12)
      marker-yv: yv-n
    - type: text
      text: 'I have seen God face to face, and my life is preserved.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as he crossed over Penuel the sun rose on him, and he limped on his hip. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore to this day the children of Israel do not eat the muscle that shrank, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on the hip socket, because He touched the socket of Jacob’s hip in the muscle that shrank.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he commanded them, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 15:1
      marker-yv: yv-n
    - type: text
      text: '“Speak thus to my lord Esau, ‘Thus your servant Jacob says: “I have dwelt with Laban and stayed there until now. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 30:43
      marker-yv: yv-n
    - type: text
      text: 'I have oxen, donkeys, flocks, and male and female servants; and I have sent to tell my lord, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 33:8, 15
      marker-yv: yv-n
    - type: text
      text: I may find favor in your sight.” ’ ”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the messengers returned to Jacob, saying, “We came to your brother Esau, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 33:1
      marker-yv: yv-n
    - type: text
      text: 'he also is coming to meet you, and four hundred men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' with him.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jacob was greatly afraid and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:11; 35:3
      marker-yv: yv-n
    - type: text
      text: 'distressed; and he divided the people that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, and the flocks and herds and camels, into two companies. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he said, “If Esau comes to the one company and attacks it, then the other company which is left will escape.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 50:15)
      marker-yv: yv-n
    - type: text
      text: 'Then Jacob said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:13; 31:42
      marker-yv: yv-n
    - type: text
      text: '“O God of my father Abraham and God of my father Isaac, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 31:3, 13
      marker-yv: yv-n
    - type: text
      text: 'who said to me, ‘Return to your country and to your family, and I will deal well with you’: '
