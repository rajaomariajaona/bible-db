verses:
  '1':
  - type: heading
    content: Esau Comes to Meet Jacob
  - type: text
    content: 'So Jacob went on his way, and '
  - type: note
    content: Num. 22:31; 2 Kin. 6:16, 17; (Ps. 34:7; 91:1; Heb. 1:14)
  - type: text
    content: 'the angels of God met him. '
  '10':
  - type: text
    content: 'I am not worthy of the least of all the '
  - type: note
    content: Gen. 24:27
  - type: text
    content: 'mercies and of all the truth which You have shown Your servant; for I crossed over this Jordan with '
  - type: note
    content: Job 8:7
  - type: text
    content: 'my staff, and now I have become two companies. '
  '11':
  - type: note
    content: Ps. 59:1, 2
  - type: text
    content: 'Deliver me, I pray, from the hand of my brother, from the hand of Esau; for I fear him, lest he come and attack me '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: Hos. 10:14
  - type: text
    content: 'the mother with the children. '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: Gen. 28:13–15
  - type: text
    content: 'You said, ‘I will surely treat you well, and make your descendants as the '
  - type: note
    content: Gen. 22:17
  - type: text
    content: sand of the sea, which cannot be numbered for multitude.’ ”
  '13':
  - type: text
    content: 'So he lodged there that same night, and took what came to his hand as '
  - type: note
    content: Gen. 43:11
  - type: text
    content: 'a present for Esau his brother: '
  '14':
  - type: text
    content: 'two hundred female goats and twenty male goats, two hundred ewes and twenty rams, '
  '15':
  - type: text
    content: 'thirty milk camels with their colts, forty cows and ten bulls, twenty female donkeys and ten foals. '
  '16':
  - type: text
    content: 'Then he delivered '
  - type: text
    content: them
  - type: text
    content: ' to the hand of his servants, every drove by itself, and said to his servants, “Pass over before me, and put some distance between successive droves.” '
  '17':
  - type: text
    content: 'And he commanded the first one, saying, “When Esau my brother meets you and asks you, saying, ‘To whom do you belong, and where are you going? Whose '
  - type: text
    content: are
  - type: text
    content: ' these in front of you?’ '
  '18':
  - type: text
    content: 'then you shall say, ‘They '
  - type: text
    content: are
  - type: text
    content: ' your servant Jacob’s. It '
  - type: text
    content: is
  - type: text
    content: ' a present sent to my lord Esau; and behold, he also '
  - type: text
    content: is
  - type: text
    content: ' behind us.’ ” '
  '19':
  - type: text
    content: 'So he commanded the second, the third, and all who followed the droves, saying, “In this manner you shall speak to Esau when you find him; '
  '2':
  - type: text
    content: 'When Jacob saw them, he said, “This '
  - type: text
    content: is
  - type: text
    content: ' God’s '
  - type: note
    content: Josh. 5:14; Ps. 103:21; 148:2; Luke 2:13
  - type: text
    content: camp.” And he called the name of that place Mahanaim.
  '20':
  - type: text
    content: 'and also say, ‘Behold, your servant Jacob '
  - type: text
    content: is
  - type: text
    content: ' behind us.’ ” For he said, “I will '
  - type: note
    content: (Prov. 21:14)
  - type: text
    content: 'appease him with the present that goes before me, and afterward I will see his face; perhaps he will accept me.” '
  '21':
  - type: text
    content: So the present went on over before him, but he himself lodged that night in the camp.
  - type: heading
    content: Wrestling with God
  '22':
  - type: text
    content: 'And he arose that night and took his two wives, his two female servants, and his eleven sons, '
  - type: note
    content: Num. 21:24; Deut. 3:16; Josh. 12:2
  - type: text
    content: 'and crossed over the ford of Jabbok. '
  '23':
  - type: text
    content: 'He took them, sent them over the brook, and sent over what he had. '
  '24':
  - type: text
    content: 'Then Jacob was left alone; and '
  - type: note
    content: Josh. 5:13–15; Hos. 12:2–4
  - type: text
    content: 'a Man wrestled with him until the breaking of day. '
  '25':
  - type: text
    content: 'Now when He saw that He did not prevail against him, He touched the socket of his hip; and '
  - type: note
    content: Matt. 26:41; 2 Cor. 12:7
  - type: text
    content: 'the socket of Jacob’s hip was out of joint as He wrestled with him. '
  '26':
  - type: text
    content: 'And '
  - type: note
    content: Luke 24:28
  - type: text
    content: He said, “Let Me go, for the day breaks.”
  - type: text
    content: 'But he said, '
  - type: note
    content: Hos. 12:4
  - type: text
    content: “I will not let You go unless You bless me!”
  '27':
  - type: text
    content: 'So He said to him, “What '
  - type: text
    content: is
  - type: text
    content: ' your name?”'
  - type: text
    content: He said, “Jacob.”
  '28':
  - type: text
    content: 'And He said, '
  - type: note
    content: Gen. 35:10; 1 Kin. 18:31; 2 Kin. 17:34
  - type: text
    content: '“Your name shall no longer be called Jacob, but Israel; for you have '
  - type: note
    content: Hos. 12:3, 4
  - type: text
    content: 'struggled with God and '
  - type: note
    content: Gen. 25:31; 27:33
  - type: text
    content: with men, and have prevailed.”
  '29':
  - type: text
    content: 'Then Jacob asked, saying, “Tell '
  - type: text
    content: me
  - type: text
    content: ' Your name, I pray.”'
  - type: text
    content: 'And He said, '
  - type: note
    content: Judg. 13:17, 18
  - type: text
    content: '“Why '
  - type: text
    content: is
  - type: text
    content: ' it '
  - type: text
    content: that
  - type: text
    content: ' you ask about My name?” And He '
  - type: note
    content: Gen. 35:9
  - type: text
    content: blessed him there.
  '3':
  - type: text
    content: 'Then Jacob sent messengers before him to Esau his brother '
  - type: note
    content: Gen. 14:6; 33:14, 16
  - type: text
    content: 'in the land of Seir, '
  - type: note
    content: Gen. 25:30; 36:6–9; Deut. 2:5; Josh. 24:4
  - type: text
    content: 'the country of Edom. '
  '30':
  - type: text
    content: 'So Jacob called the name of the place Peniel: “For '
  - type: note
    content: Gen. 16:13; Ex. 24:10, 11; 33:20; Num. 12:8; Deut. 5:24; Judg. 6:22; Is. 6:5; (Matt. 5:8; 1 Cor. 13:12)
  - type: text
    content: 'I have seen God face to face, and my life is preserved.” '
  '31':
  - type: text
    content: 'Just as he crossed over Penuel the sun rose on him, and he limped on his hip. '
  '32':
  - type: text
    content: 'Therefore to this day the children of Israel do not eat the muscle that shrank, which '
  - type: text
    content: is
  - type: text
    content: ' on the hip socket, because He touched the socket of Jacob’s hip in the muscle that shrank.'
  '4':
  - type: text
    content: 'And he commanded them, saying, '
  - type: note
    content: Prov. 15:1
  - type: text
    content: '“Speak thus to my lord Esau, ‘Thus your servant Jacob says: “I have dwelt with Laban and stayed there until now. '
  '5':
  - type: note
    content: Gen. 30:43
  - type: text
    content: 'I have oxen, donkeys, flocks, and male and female servants; and I have sent to tell my lord, that '
  - type: note
    content: Gen. 33:8, 15
  - type: text
    content: I may find favor in your sight.” ’ ”
  '6':
  - type: text
    content: 'Then the messengers returned to Jacob, saying, “We came to your brother Esau, and '
  - type: note
    content: Gen. 33:1
  - type: text
    content: 'he also is coming to meet you, and four hundred men '
  - type: text
    content: are
  - type: text
    content: ' with him.” '
  '7':
  - type: text
    content: 'So Jacob was greatly afraid and '
  - type: note
    content: Gen. 32:11; 35:3
  - type: text
    content: 'distressed; and he divided the people that '
  - type: text
    content: were
  - type: text
    content: ' with him, and the flocks and herds and camels, into two companies. '
  '8':
  - type: text
    content: And he said, “If Esau comes to the one company and attacks it, then the other company which is left will escape.”
  '9':
  - type: note
    content: (Ps. 50:15)
  - type: text
    content: 'Then Jacob said, '
  - type: note
    content: Gen. 28:13; 31:42
  - type: text
    content: '“O God of my father Abraham and God of my father Isaac, the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Gen. 31:3, 13
  - type: text
    content: 'who said to me, ‘Return to your country and to your family, and I will deal well with you’: '
