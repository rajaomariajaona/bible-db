document_id: ACT.17,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Preaching Christ at Thessalonica
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when they had passed through Amphipolis and Apollonia, they came to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:11, 13; 20:4; 27:2; Phil. 4:16; 1 Thess. 1:1; 2 Thess. 1:1; 2 Tim. 4:10
      marker-yv: yv-n
    - type: text
      text: 'Thessalonica, where there was a synagogue of the Jews. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:25; 17:14
      marker-yv: yv-n
    - type: text
      text: 'the brethren immediately sent Paul and Silas away by night to Berea. When they arrived, they went into the synagogue of the Jews. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were more fair-minded than those in Thessalonica, in that they received the word with all readiness, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 34:16; Luke 16:29; John 5:39
      marker-yv: yv-n
    - type: text
      text: 'searched the Scriptures daily '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: find
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: out
    - type: text
      text: ' whether these things were so. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore many of them believed, and also not a few of the Greeks, prominent women as well as men. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the Jews from Thessalonica learned that the word of God was preached by Paul at Berea, they came there also and stirred up the crowds. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:23
      marker-yv: yv-n
    - type: text
      text: 'Then immediately the brethren sent Paul away, to go to the sea; but both Silas and Timothy remained there. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So those who conducted Paul brought him to Athens; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:5
      marker-yv: yv-n
    - type: text
      text: receiving a command for Silas and Timothy to come to him with all speed, they departed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Philosophers at Athens
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now while Paul waited for them at Athens, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Pet. 2:8
      marker-yv: yv-n
    - type: text
      text: 'his spirit was provoked within him when he saw that the city was given over to idols. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore he reasoned in the synagogue with the Jews and with the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gentile
    - type: text
      text: ' worshipers, and in the marketplace daily with those who happened to be there. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then certain Epicurean and Stoic philosophers encountered him. And some said, “What does this babbler want to say?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Others said, “He seems to be a proclaimer of foreign gods,” because he preached to them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:12
      marker-yv: yv-n
    - type: text
      text: Jesus and the resurrection.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they took him and brought him to the Areopagus, saying, “May we know what this new doctrine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' of which you speak? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Paul, as his custom was, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 4:16; Acts 9:20; 13:5, 14; 14:1; 16:13; 19:8
      marker-yv: yv-n
    - type: text
      text: 'went in to them, and for three Sabbaths '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 2:1–16
      marker-yv: yv-n
    - type: text
      text: 'reasoned with them from the Scriptures, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you are bringing some strange things to our ears. Therefore we want to know what these things mean.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For all the Athenians and the foreigners who were there spent their time in nothing else but either to tell or to hear some new thing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Addressing the Areopagus
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Paul stood in the midst of the Areopagus and said, “Men of Athens, I perceive that in all things you are very religious; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for as I was passing through and considering the objects of your worship, I even found an altar with this inscription:'
  - type: usfm
    marker: pc
    children:
    - type: text
      text: TO THE UNKNOWN GOD.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, the One whom you worship without knowing, Him I proclaim to you: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 42:5; Acts 14:15
      marker-yv: yv-n
    - type: text
      text: '“God, who made the world and everything in it, since He is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 10:14; Ps. 115:16; Matt. 11:25
      marker-yv: yv-n
    - type: text
      text: 'Lord of heaven and earth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:27; Acts 7:48–50
      marker-yv: yv-n
    - type: text
      text: 'does not dwell in temples made with hands. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nor is He worshiped with men’s hands, as though He needed anything, since He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 2:7; Is. 42:5; Dan. 5:23
      marker-yv: yv-n
    - type: text
      text: 'gives to all life, breath, and all things. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He has made from one blood every nation of men to dwell on all the face of the earth, and has determined their preappointed times and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:8; Job 12:23; Dan. 4:35
      marker-yv: yv-n
    - type: text
      text: 'the boundaries of their dwellings, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 1:20)
      marker-yv: yv-n
    - type: text
      text: 'so that they should seek the Lord, in the hope that they might grope for Him and find Him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:7; Ps. 139:7, 10; Jer. 23:23, 24; (Acts 14:17)
      marker-yv: yv-n
    - type: text
      text: 'though He is not far from each one of us; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Col. 1:17; Heb. 1:3)
      marker-yv: yv-n
    - type: text
      text: 'in Him we live and move and have our being, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 1:12
      marker-yv: yv-n
    - type: text
      text: 'as also some of your own poets have said, ‘For we are also His offspring.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, since we are the offspring of God, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 115:4–7; Is. 40:18, 19; Rom. 1:23
      marker-yv: yv-n
    - type: text
      text: 'we ought not to think that the Divine Nature is like gold or silver or stone, something shaped by art and man’s devising. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'explaining and demonstrating '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:26, 46; Acts 18:5, 28; Gal. 3:1
      marker-yv: yv-n
    - type: text
      text: 'that the Christ had to suffer and rise again from the dead, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying,
    - type: text
      text: ' “This Jesus whom I preach to you is the Christ.” '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Truly, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:16; (Rom. 3:25)
      marker-yv: yv-n
    - type: text
      text: 'these times of ignorance God overlooked, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:47; Acts 26:20; (Titus 2:11, 12); 1 Pet. 1:14; 4:3
      marker-yv: yv-n
    - type: text
      text: 'now commands all men everywhere to repent, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because He has appointed a day on which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 9:8; 96:13; 98:9; John 5:22, 27; Acts 10:42; Rom. 2:16
      marker-yv: yv-n
    - type: text
      text: 'He will judge the world in righteousness by the Man whom He has ordained. He has given assurance of this to all by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:24
      marker-yv: yv-n
    - type: text
      text: raising Him from the dead.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they heard of the resurrection of the dead, some mocked, while others said, “We will hear you again on this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: matter.
    - type: text
      text: '” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Paul departed from among them. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, some men joined him and believed, among them Dionysius the Areopagite, a woman named Damaris, and others with them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 28:24
      marker-yv: yv-n
    - type: text
      text: 'And some of them were persuaded; and a great multitude of the devout Greeks, and not a few of the leading women, joined Paul and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:22, 27, 32, 40
      marker-yv: yv-n
    - type: text
      text: Silas.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Assault on Jason’s House
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Jews who were not persuaded, becoming '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:45
      marker-yv: yv-n
    - type: text
      text: 'envious, took some of the evil men from the marketplace, and gathering a mob, set all the city in an uproar and attacked the house of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:6, 7, 9; Rom. 16:21
      marker-yv: yv-n
    - type: text
      text: 'Jason, and sought to bring them out to the people. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they did not find them, they dragged Jason and some brethren to the rulers of the city, crying out, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 16:20)
      marker-yv: yv-n
    - type: text
      text: '“These who have turned the world upside down have come here too. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jason has harbored them, and these are all acting contrary to the decrees of Caesar, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 23:2; John 19:12; 1 Pet. 2:13
      marker-yv: yv-n
    - type: text
      text: 'saying there is another king—Jesus.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they troubled the crowd and the rulers of the city when they heard these things. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So when they had taken security from Jason and the rest, they let them go.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ministering at Berea
    marker-yv: yv-h
