document_id: ACT.17,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Preaching Christ at Thessalonica
  - type: text
    content: 'Now when they had passed through Amphipolis and Apollonia, they came to '
  - type: note
    content: Acts 17:11, 13; 20:4; 27:2; Phil. 4:16; 1 Thess. 1:1; 2 Thess. 1:1; 2 Tim. 4:10
  - type: text
    content: 'Thessalonica, where there was a synagogue of the Jews. '
  '10':
  - type: text
    content: 'Then '
  - type: note
    content: Acts 9:25; 17:14
  - type: text
    content: 'the brethren immediately sent Paul and Silas away by night to Berea. When they arrived, they went into the synagogue of the Jews. '
  '11':
  - type: text
    content: 'These were more fair-minded than those in Thessalonica, in that they received the word with all readiness, and '
  - type: note
    content: Is. 34:16; Luke 16:29; John 5:39
  - type: text
    content: 'searched the Scriptures daily '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: find
  - type: text
    content: ' '
  - type: text
    content: out
  - type: text
    content: ' whether these things were so. '
  '12':
  - type: text
    content: 'Therefore many of them believed, and also not a few of the Greeks, prominent women as well as men. '
  '13':
  - type: text
    content: 'But when the Jews from Thessalonica learned that the word of God was preached by Paul at Berea, they came there also and stirred up the crowds. '
  '14':
  - type: note
    content: Matt. 10:23
  - type: text
    content: 'Then immediately the brethren sent Paul away, to go to the sea; but both Silas and Timothy remained there. '
  '15':
  - type: text
    content: 'So those who conducted Paul brought him to Athens; and '
  - type: note
    content: Acts 18:5
  - type: text
    content: receiving a command for Silas and Timothy to come to him with all speed, they departed.
  - type: heading
    content: The Philosophers at Athens
  '16':
  - type: text
    content: 'Now while Paul waited for them at Athens, '
  - type: note
    content: 2 Pet. 2:8
  - type: text
    content: 'his spirit was provoked within him when he saw that the city was given over to idols. '
  '17':
  - type: text
    content: 'Therefore he reasoned in the synagogue with the Jews and with the '
  - type: text
    content: Gentile
  - type: text
    content: ' worshipers, and in the marketplace daily with those who happened to be there. '
  '18':
  - type: text
    content: Then certain Epicurean and Stoic philosophers encountered him. And some said, “What does this babbler want to say?”
  - type: text
    content: 'Others said, “He seems to be a proclaimer of foreign gods,” because he preached to them '
  - type: note
    content: 1 Cor. 15:12
  - type: text
    content: Jesus and the resurrection.
  '19':
  - type: text
    content: 'And they took him and brought him to the Areopagus, saying, “May we know what this new doctrine '
  - type: text
    content: is
  - type: text
    content: ' of which you speak? '
  '2':
  - type: text
    content: 'Then Paul, as his custom was, '
  - type: note
    content: Luke 4:16; Acts 9:20; 13:5, 14; 14:1; 16:13; 19:8
  - type: text
    content: 'went in to them, and for three Sabbaths '
  - type: note
    content: 1 Thess. 2:1–16
  - type: text
    content: 'reasoned with them from the Scriptures, '
  '20':
  - type: text
    content: 'For you are bringing some strange things to our ears. Therefore we want to know what these things mean.” '
  '21':
  - type: text
    content: For all the Athenians and the foreigners who were there spent their time in nothing else but either to tell or to hear some new thing.
  - type: heading
    content: Addressing the Areopagus
  '22':
  - type: text
    content: 'Then Paul stood in the midst of the Areopagus and said, “Men of Athens, I perceive that in all things you are very religious; '
  '23':
  - type: text
    content: 'for as I was passing through and considering the objects of your worship, I even found an altar with this inscription:'
  - type: text
    content: TO THE UNKNOWN GOD.
  - type: text
    content: 'Therefore, the One whom you worship without knowing, Him I proclaim to you: '
  '24':
  - type: note
    content: Is. 42:5; Acts 14:15
  - type: text
    content: '“God, who made the world and everything in it, since He is '
  - type: note
    content: Deut. 10:14; Ps. 115:16; Matt. 11:25
  - type: text
    content: 'Lord of heaven and earth, '
  - type: note
    content: 1 Kin. 8:27; Acts 7:48–50
  - type: text
    content: 'does not dwell in temples made with hands. '
  '25':
  - type: text
    content: 'Nor is He worshiped with men’s hands, as though He needed anything, since He '
  - type: note
    content: Gen. 2:7; Is. 42:5; Dan. 5:23
  - type: text
    content: 'gives to all life, breath, and all things. '
  '26':
  - type: text
    content: 'And He has made from one blood every nation of men to dwell on all the face of the earth, and has determined their preappointed times and '
  - type: note
    content: Deut. 32:8; Job 12:23; Dan. 4:35
  - type: text
    content: 'the boundaries of their dwellings, '
  '27':
  - type: note
    content: (Rom. 1:20)
  - type: text
    content: 'so that they should seek the Lord, in the hope that they might grope for Him and find Him, '
  - type: note
    content: Deut. 4:7; Ps. 139:7, 10; Jer. 23:23, 24; (Acts 14:17)
  - type: text
    content: 'though He is not far from each one of us; '
  '28':
  - type: text
    content: 'for '
  - type: note
    content: (Col. 1:17; Heb. 1:3)
  - type: text
    content: 'in Him we live and move and have our being, '
  - type: note
    content: Titus 1:12
  - type: text
    content: 'as also some of your own poets have said, ‘For we are also His offspring.’ '
  '29':
  - type: text
    content: 'Therefore, since we are the offspring of God, '
  - type: note
    content: Ps. 115:4–7; Is. 40:18, 19; Rom. 1:23
  - type: text
    content: 'we ought not to think that the Divine Nature is like gold or silver or stone, something shaped by art and man’s devising. '
  '3':
  - type: text
    content: 'explaining and demonstrating '
  - type: note
    content: Luke 24:26, 46; Acts 18:5, 28; Gal. 3:1
  - type: text
    content: 'that the Christ had to suffer and rise again from the dead, and '
  - type: text
    content: saying,
  - type: text
    content: ' “This Jesus whom I preach to you is the Christ.” '
  '30':
  - type: text
    content: 'Truly, '
  - type: note
    content: Acts 14:16; (Rom. 3:25)
  - type: text
    content: 'these times of ignorance God overlooked, but '
  - type: note
    content: Luke 24:47; Acts 26:20; (Titus 2:11, 12); 1 Pet. 1:14; 4:3
  - type: text
    content: 'now commands all men everywhere to repent, '
  '31':
  - type: text
    content: 'because He has appointed a day on which '
  - type: note
    content: Ps. 9:8; 96:13; 98:9; John 5:22, 27; Acts 10:42; Rom. 2:16
  - type: text
    content: 'He will judge the world in righteousness by the Man whom He has ordained. He has given assurance of this to all by '
  - type: note
    content: Acts 2:24
  - type: text
    content: raising Him from the dead.”
  '32':
  - type: text
    content: 'And when they heard of the resurrection of the dead, some mocked, while others said, “We will hear you again on this '
  - type: text
    content: matter.
  - type: text
    content: '” '
  '33':
  - type: text
    content: 'So Paul departed from among them. '
  '34':
  - type: text
    content: However, some men joined him and believed, among them Dionysius the Areopagite, a woman named Damaris, and others with them.
  '4':
  - type: note
    content: Acts 28:24
  - type: text
    content: 'And some of them were persuaded; and a great multitude of the devout Greeks, and not a few of the leading women, joined Paul and '
  - type: note
    content: Acts 15:22, 27, 32, 40
  - type: text
    content: Silas.
  - type: heading
    content: Assault on Jason’s House
  '5':
  - type: text
    content: 'But the Jews who were not persuaded, becoming '
  - type: note
    content: Acts 13:45
  - type: text
    content: 'envious, took some of the evil men from the marketplace, and gathering a mob, set all the city in an uproar and attacked the house of '
  - type: note
    content: Acts 17:6, 7, 9; Rom. 16:21
  - type: text
    content: 'Jason, and sought to bring them out to the people. '
  '6':
  - type: text
    content: 'But when they did not find them, they dragged Jason and some brethren to the rulers of the city, crying out, '
  - type: note
    content: (Acts 16:20)
  - type: text
    content: '“These who have turned the world upside down have come here too. '
  '7':
  - type: text
    content: 'Jason has harbored them, and these are all acting contrary to the decrees of Caesar, '
  - type: note
    content: Luke 23:2; John 19:12; 1 Pet. 2:13
  - type: text
    content: 'saying there is another king—Jesus.” '
  '8':
  - type: text
    content: 'And they troubled the crowd and the rulers of the city when they heard these things. '
  '9':
  - type: text
    content: So when they had taken security from Jason and the rest, they let them go.
  - type: heading
    content: Ministering at Berea
