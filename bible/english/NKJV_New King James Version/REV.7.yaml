document_id: REV.7,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sealed of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After these things I saw four angels standing at the four corners of the earth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 49:36; Dan. 7:2; Zech. 6:5; Matt. 24:31
      marker-yv: yv-n
    - type: text
      text: 'holding the four winds of the earth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 7:3; 8:7; 9:4
      marker-yv: yv-n
    - type: text
      text: 'that the wind should not blow on the earth, on the sea, or on any tree. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and crying out with a loud voice, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 3:8; Is. 43:11; Jer. 3:23; Hos. 13:4; Rev. 19:1
      marker-yv: yv-n
    - type: text
      text: '“Salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belongs
    - type: text
      text: ' to our God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 5:13
      marker-yv: yv-n
    - type: text
      text: 'who sits on the throne, and to the Lamb!” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:6
      marker-yv: yv-n
    - type: text
      text: 'All the angels stood around the throne and the elders and the four living creatures, and fell on their faces before the throne and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:11; 5:9, 12, 14; 11:16
      marker-yv: yv-n
    - type: text
      text: 'worshiped God, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 5:13, 14
      marker-yv: yv-n
    - type: text
      text: 'saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Amen! Blessing and glory and wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Thanksgiving and honor and power and might,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Be
    - type: text
      text: ' to our God forever and ever.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Amen.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one of the elders answered, saying to me, “Who are these arrayed in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 7:9
      marker-yv: yv-n
    - type: text
      text: white robes, and where did they come from?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I said to him, “Sir, you know.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said to me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 6:9
      marker-yv: yv-n
    - type: text
      text: '“These are the ones who come out of the great tribulation, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 1:18; Zech. 3:3–5; (Heb. 9:14)
      marker-yv: yv-n
    - type: text
      text: 'washed their robes and made them white in the blood of the Lamb. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore they are before the throne of God, and serve Him day and night in His temple. And He who sits on the throne will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 4:5, 6; Rev. 21:3
      marker-yv: yv-n
    - type: text
      text: 'dwell among them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 121:5; Is. 49:10
      marker-yv: yv-n
    - type: text
      text: 'They shall neither hunger anymore nor thirst anymore; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 121:6; Rev. 21:4
      marker-yv: yv-n
    - type: text
      text: 'the sun shall not strike them, nor any heat; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the Lamb who is in the midst of the throne '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 23:1; Matt. 2:6; (John 10:11, 14)
      marker-yv: yv-n
    - type: text
      text: 'will shepherd them and lead them to living fountains of waters. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 25:8; Matt. 5:4; Rev. 21:4
      marker-yv: yv-n
    - type: text
      text: And God will wipe away every tear from their eyes.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw another angel ascending from the east, having the seal of the living God. And he cried with a loud voice to the four angels to whom it was granted to harm the earth and the sea, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 6:6
      marker-yv: yv-n
    - type: text
      text: '“Do not harm the earth, the sea, or the trees till we have sealed the servants of our God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 9:4, 6; Rev. 22:4
      marker-yv: yv-n
    - type: text
      text: 'on their foreheads.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 9:16
      marker-yv: yv-n
    - type: text
      text: 'And I heard the number of those who were sealed. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 14:1, 3
      marker-yv: yv-n
    - type: text
      text: 'One hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forty-four thousand '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:1–27
      marker-yv: yv-n
    - type: text
      text: 'of all the tribes of the children of Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'of the tribe of Judah twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Reuben twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Gad twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Asher twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Naphtali twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Manasseh twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Simeon twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Levi twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Issachar twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Zebulun twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Joseph twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'of the tribe of Benjamin twelve thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' sealed.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Multitude from the Great Tribulation
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After these things I looked, and behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:1–5; Rom. 11:25
      marker-yv: yv-n
    - type: text
      text: 'a great multitude which no one could number, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 5:9
      marker-yv: yv-n
    - type: text
      text: 'of all nations, tribes, peoples, and tongues, standing before the throne and before the Lamb, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 3:5, 18; 4:4; 6:11
      marker-yv: yv-n
    - type: text
      text: 'clothed with white robes, with palm branches in their hands, '
