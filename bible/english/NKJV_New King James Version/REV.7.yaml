verses:
  '1':
  - type: heading
    content: The Sealed of Israel
  - type: text
    content: 'After these things I saw four angels standing at the four corners of the earth, '
  - type: note
    content: Jer. 49:36; Dan. 7:2; Zech. 6:5; Matt. 24:31
  - type: text
    content: 'holding the four winds of the earth, '
  - type: note
    content: Rev. 7:3; 8:7; 9:4
  - type: text
    content: 'that the wind should not blow on the earth, on the sea, or on any tree. '
  '10':
  - type: text
    content: 'and crying out with a loud voice, saying, '
  - type: note
    content: Ps. 3:8; Is. 43:11; Jer. 3:23; Hos. 13:4; Rev. 19:1
  - type: text
    content: '“Salvation '
  - type: text
    content: belongs
  - type: text
    content: ' to our God '
  - type: note
    content: Rev. 5:13
  - type: text
    content: 'who sits on the throne, and to the Lamb!” '
  '11':
  - type: note
    content: Rev. 4:6
  - type: text
    content: 'All the angels stood around the throne and the elders and the four living creatures, and fell on their faces before the throne and '
  - type: note
    content: Rev. 4:11; 5:9, 12, 14; 11:16
  - type: text
    content: 'worshiped God, '
  '12':
  - type: note
    content: Rev. 5:13, 14
  - type: text
    content: 'saying:'
  - type: text
    content: “Amen! Blessing and glory and wisdom,
  - type: text
    content: Thanksgiving and honor and power and might,
  - type: text
    content: Be
  - type: text
    content: ' to our God forever and ever.'
  - type: text
    content: Amen.”
  '13':
  - type: text
    content: 'Then one of the elders answered, saying to me, “Who are these arrayed in '
  - type: note
    content: Rev. 7:9
  - type: text
    content: white robes, and where did they come from?”
  '14':
  - type: text
    content: And I said to him, “Sir, you know.”
  - type: text
    content: 'So he said to me, '
  - type: note
    content: Rev. 6:9
  - type: text
    content: '“These are the ones who come out of the great tribulation, and '
  - type: note
    content: Is. 1:18; Zech. 3:3–5; (Heb. 9:14)
  - type: text
    content: 'washed their robes and made them white in the blood of the Lamb. '
  '15':
  - type: text
    content: 'Therefore they are before the throne of God, and serve Him day and night in His temple. And He who sits on the throne will '
  - type: note
    content: Is. 4:5, 6; Rev. 21:3
  - type: text
    content: 'dwell among them. '
  '16':
  - type: note
    content: Ps. 121:5; Is. 49:10
  - type: text
    content: 'They shall neither hunger anymore nor thirst anymore; '
  - type: note
    content: Ps. 121:6; Rev. 21:4
  - type: text
    content: 'the sun shall not strike them, nor any heat; '
  '17':
  - type: text
    content: 'for the Lamb who is in the midst of the throne '
  - type: note
    content: Ps. 23:1; Matt. 2:6; (John 10:11, 14)
  - type: text
    content: 'will shepherd them and lead them to living fountains of waters. '
  - type: note
    content: Is. 25:8; Matt. 5:4; Rev. 21:4
  - type: text
    content: And God will wipe away every tear from their eyes.”
  '2':
  - type: text
    content: 'Then I saw another angel ascending from the east, having the seal of the living God. And he cried with a loud voice to the four angels to whom it was granted to harm the earth and the sea, '
  '3':
  - type: text
    content: 'saying, '
  - type: note
    content: Rev. 6:6
  - type: text
    content: '“Do not harm the earth, the sea, or the trees till we have sealed the servants of our God '
  - type: note
    content: Ezek. 9:4, 6; Rev. 22:4
  - type: text
    content: 'on their foreheads.” '
  '4':
  - type: note
    content: Rev. 9:16
  - type: text
    content: 'And I heard the number of those who were sealed. '
  - type: note
    content: Rev. 14:1, 3
  - type: text
    content: 'One hundred '
  - type: text
    content: and
  - type: text
    content: ' forty-four thousand '
  - type: note
