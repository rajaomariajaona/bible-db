document_id: PSA.88,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prayer for Help in Despondency
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A Song. A Psalm of the sons of Korah. To the Chief Musician. Set to “Mahalath Leannoth.” A Contemplation of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 4:31; 1 Chr. 2:6
      marker-yv: yv-n
    - type: text
      text: Heman the Ezrahite.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:9; (Luke 18:7)
      marker-yv: yv-n
    - type: text
      text: God of my salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have cried out day and night before You.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will You work wonders for the dead?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Shall the dead arise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' praise You?'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall Your lovingkindness be declared in the grave?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Or
    - type: text
      text: ' Your faithfulness in the place of destruction?'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shall Your wonders be known in the dark?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And Your righteousness in the land of forgetfulness?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But to You I have cried out, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in the morning my prayer comes before You.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', why do You cast off my soul?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Why
    - type: text
      text: ' do You hide Your face from me?'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: been
    - type: text
      text: ' afflicted and ready to die from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' youth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I suffer Your terrors;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am distraught.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your fierce wrath has gone over me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your terrors have cut me off.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They came around me all day long like water;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They engulfed me altogether.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 19:13; Ps. 31:11; 38:11
      marker-yv: yv-n
    - type: text
      text: Loved one and friend You have put far from me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' my acquaintances into darkness.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let my prayer come before You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Incline Your ear to my cry.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my soul is full of troubles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And my life '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 107:18
      marker-yv: yv-n
    - type: text
      text: draws near to the grave.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I am counted with those who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 28:1)
      marker-yv: yv-n
    - type: text
      text: go down to the pit;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:12
      marker-yv: yv-n
    - type: text
      text: 'I am like a man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has
    - type: text
      text: ' no strength,'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Adrift among the dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like the slain who lie in the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whom You remember no more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And who are cut off from Your hand.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have laid me in the lowest pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In darkness, in the depths.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your wrath lies heavy upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And You have afflicted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' with all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 42:7
      marker-yv: yv-n
    - type: text
      text: Your waves.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 19:13, 19; Ps. 31:11; 142:4
      marker-yv: yv-n
    - type: text
      text: You have put away my acquaintances far from me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have made me an abomination to them;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 3:7
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' shut up, and I cannot get out;'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My eye wastes away because of affliction.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 86:3
      marker-yv: yv-n
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I have called daily upon You;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have stretched out my hands to You.
