document_id: NUM.32,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tribes Settling East of the Jordan
  - type: text
    content: 'Now the children of Reuben and the children of Gad had a very great multitude of livestock; and when they saw the land of '
  - type: note
    content: Num. 21:32; Josh. 13:25; 2 Sam. 24:5
  - type: text
    content: 'Jazer and the land of '
  - type: note
    content: Deut. 3:13
  - type: text
    content: 'Gilead, that indeed the region '
  - type: text
    content: was
  - type: text
    content: ' a place for livestock, '
  '10':
  - type: note
    content: Num. 14:11; Deut. 1:34–36
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: '’s anger was aroused on that day, and He swore an oath, saying, '
  '11':
  - type: text
    content: '‘Surely none of the men who came up from Egypt, '
  - type: note
    content: Num. 14:28, 29; 26:63–65; Deut. 1:35
  - type: text
    content: 'from twenty years old and above, shall see the land of which I swore to Abraham, Isaac, and Jacob, because '
  - type: note
    content: Num. 14:24, 30
  - type: text
    content: 'they have not wholly followed Me, '
  '12':
  - type: text
    content: 'except Caleb the son of Jephunneh, the Kenizzite, and Joshua the son of Nun, '
  - type: note
    content: Num. 14:6–9, 24, 30; Deut. 1:36; Josh. 14:8, 9
  - type: text
    content: 'for they have wholly followed the '
  - type: heading
    content: Lord
  - type: text
    content: '.’ '
  '13':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: '’s anger was aroused against Israel, and He made them '
  - type: note
    content: Num. 14:33–35
  - type: text
    content: 'wander in the wilderness forty years, until '
  - type: note
    content: Num. 26:64, 65
  - type: text
    content: 'all the generation that had done evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was gone. '
  '14':
  - type: text
    content: 'And look! You have risen in your fathers’ place, a brood of sinful men, to increase still more the '
  - type: note
    content: Num. 11:1; Deut. 1:34
  - type: text
    content: 'fierce anger of the '
  - type: heading
    content: Lord
  - type: text
    content: ' against Israel. '
  '15':
  - type: text
    content: 'For if you '
  - type: note
    content: Deut. 30:17, 18; Josh. 22:16–18; 2 Chr. 7:19; 15:2
  - type: text
    content: turn away from following Him, He will once again leave them in the wilderness, and you will destroy all these people.”
  '16':
  - type: text
    content: 'Then they came near to him and said: “We will build sheepfolds here for our livestock, and cities for our little ones, '
  '17':
  - type: text
    content: 'but '
  - type: note
    content: Josh. 4:12, 13
  - type: text
    content: 'we ourselves will be armed, ready '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: go
  - type: text
    content: ' before the children of Israel until we have brought them to their place; and our little ones will dwell in the fortified cities because of the inhabitants of the land. '
  '18':
  - type: note
    content: Josh. 22:1–4
  - type: text
    content: 'We will not return to our homes until every one of the children of Israel has received his inheritance. '
  '19':
  - type: text
    content: 'For we will not inherit with them on the other side of the Jordan and beyond, '
  - type: note
    content: Josh. 12:1; 13:8
  - type: text
    content: because our inheritance has fallen to us on this eastern side of the Jordan.”
  '2':
  - type: text
    content: 'the children of Gad and the children of Reuben came and spoke to Moses, to Eleazar the priest, and to the leaders of the congregation, saying, '
  '20':
  - type: text
    content: 'Then '
  - type: note
    content: Deut. 3:18; Josh. 1:14
  - type: text
    content: 'Moses said to them: “If you do this thing, if you arm yourselves before the '
  - type: heading
    content: Lord
  - type: text
    content: ' for the war, '
  '21':
  - type: text
    content: 'and all your armed men cross over the Jordan before the '
  - type: heading
    content: Lord
  - type: text
    content: ' until He has driven out His enemies from before Him, '
  '22':
  - type: text
    content: 'and '
  - type: note
    content: Deut. 3:20; Josh. 11:23
  - type: text
    content: 'the land is subdued before the '
  - type: heading
    content: Lord
  - type: text
    content: ', then afterward '
  - type: note
    content: Josh. 22:4
  - type: text
    content: 'you may return and be blameless before the '
  - type: heading
    content: Lord
  - type: text
    content: ' and before Israel; and '
  - type: note
    content: Deut. 3:12, 15, 16, 18; Josh. 1:15; 13:8, 32; 22:4, 9
  - type: text
    content: 'this land shall be your possession before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'But if you do not do so, then take note, you have sinned against the '
  - type: heading
    content: Lord
  - type: text
    content: '; and be sure '
  - type: note
    content: Gen. 4:7; 44:16; Josh. 7:1–26; Is. 59:12; (Gal. 6:7)
  - type: text
    content: 'your sin will find you out. '
  '24':
  - type: note
    content: Num. 32:16
  - type: text
    content: Build cities for your little ones and folds for your sheep, and do what has proceeded out of your mouth.”
  '25':
  - type: text
    content: 'And the children of Gad and the children of Reuben spoke to Moses, saying: “Your servants will do as my lord commands. '
  '26':
  - type: note
    content: Josh. 1:14
  - type: text
    content: 'Our little ones, our wives, our flocks, and all our livestock will be there in the cities of Gilead; '
  '27':
  - type: note
    content: Josh. 4:12
  - type: text
    content: 'but your servants will cross over, every man armed for war, before the '
  - type: heading
    content: Lord
  - type: text
    content: ' to battle, just as my lord says.”'
  '28':
  - type: text
    content: 'So Moses gave command '
  - type: note
    content: Josh. 1:13
  - type: text
    content: 'concerning them to Eleazar the priest, to Joshua the son of Nun, and to the chief fathers of the tribes of the children of Israel. '
  '29':
  - type: text
    content: 'And Moses said to them: “If the children of Gad and the children of Reuben cross over the Jordan with you, every man armed for battle before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and the land is subdued before you, then you shall give them the land of Gilead as a possession. '
  '3':
  - type: text
    content: '“Ataroth, Dibon, Jazer, '
  - type: note
    content: Num. 32:36
  - type: text
    content: 'Nimrah, '
  - type: note
    content: Josh. 13:17, 26
  - type: text
    content: 'Heshbon, Elealeh, '
  - type: note
    content: Num. 32:38
  - type: text
    content: 'Shebam, Nebo, and '
  - type: note
    content: Num. 32:38
  - type: text
    content: 'Beon, '
  '30':
  - type: text
    content: But if they do not cross over armed with you, they shall have possessions among you in the land of Canaan.”
  '31':
  - type: text
    content: 'Then the children of Gad and the children of Reuben answered, saying: “As the '
  - type: heading
    content: Lord
  - type: text
    content: ' has said to your servants, so we will do. '
  '32':
  - type: text
    content: 'We will cross over armed before the '
  - type: heading
    content: Lord
  - type: text
    content: ' into the land of Canaan, but the possession of our inheritance '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: remain
  - type: text
    content: ' with us on this side of the Jordan.”'
  '33':
  - type: text
    content: 'So '
  - type: note
    content: Deut. 3:8–17; 29:8; Josh. 12:1–6; 13:8–31; 22:4
  - type: text
    content: 'Moses gave to the children of Gad, to the children of Reuben, and to half the tribe of Manasseh the son of Joseph, '
  - type: note
    content: Num. 21:24, 33, 35
  - type: text
    content: 'the kingdom of Sihon king of the Amorites and the kingdom of Og king of Bashan, the land with its cities within the borders, the cities of the surrounding country. '
  '34':
  - type: text
    content: 'And the children of Gad built '
  - type: note
    content: Num. 33:45, 46
  - type: text
    content: 'Dibon and Ataroth and '
  - type: note
    content: Deut. 2:36
  - type: text
    content: 'Aroer, '
  '35':
  - type: text
    content: 'Atroth and Shophan and '
  - type: note
    content: Num. 32:1, 3
  - type: text
    content: 'Jazer and Jogbehah, '
  '36':
  - type: note
    content: Num. 32:3
  - type: text
    content: 'Beth Nimrah and Beth Haran, '
  - type: note
    content: Num. 32:24
  - type: text
    content: 'fortified cities, and folds for sheep. '
  '37':
  - type: text
    content: 'And the children of Reuben built '
  - type: note
    content: Num. 21:27
  - type: text
    content: 'Heshbon and Elealeh and Kirjathaim, '
  '38':
  - type: note
    content: Is. 46:1
  - type: text
    content: 'Nebo and '
  - type: note
    content: Ezek. 25:9
  - type: text
    content: 'Baal Meon '
  - type: note
    content: Ex. 23:13; Josh. 23:7
  - type: text
    content: (
  - type: text
    content: their
  - type: text
    content: ' names being changed) and Shibmah; and they gave '
  - type: text
    content: other
  - type: text
    content: ' names to the cities which they built.'
  '39':
  - type: text
    content: 'And the children of '
  - type: note
    content: Gen. 50:23; Num. 27:1; 36:1
  - type: text
    content: 'Machir the son of Manasseh went to Gilead and took it, and dispossessed the Amorites who '
  - type: text
    content: were
  - type: text
    content: ' in it. '
  '4':
  - type: text
    content: 'the country '
  - type: note
    content: Num. 21:24, 34, 35
  - type: text
    content: 'which the '
  - type: heading
    content: Lord
  - type: text
    content: ' defeated before the congregation of Israel, '
  - type: text
    content: is
  - type: text
    content: ' a land for livestock, and your servants have livestock.” '
  '40':
  - type: text
    content: 'So Moses '
  - type: note
    content: Deut. 3:12, 13, 15; Josh. 13:31
  - type: text
    content: 'gave Gilead to Machir the son of Manasseh, and he dwelt in it. '
  '41':
  - type: text
    content: 'Also '
  - type: note
    content: Deut. 3:14; Josh. 13:30
  - type: text
    content: 'Jair the son of Manasseh went and took its small towns, and called them '
  - type: note
    content: Judg. 10:4; 1 Kin. 4:13
  - type: text
    content: 'Havoth Jair. '
  '42':
  - type: text
    content: Then Nobah went and took Kenath and its villages, and he called it Nobah, after his own name.
  '5':
  - type: text
    content: Therefore they said, “If we have found favor in your sight, let this land be given to your servants as a possession. Do not take us over the Jordan.”
  '6':
  - type: text
    content: 'And Moses said to the children of Gad and to the children of Reuben: “Shall your brethren go to war while you sit here? '
  '7':
  - type: text
    content: 'Now why will you '
  - type: note
    content: Num. 13:27—14:4
  - type: text
    content: 'discourage the heart of the children of Israel from going over into the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has given them? '
  '8':
  - type: text
    content: 'Thus your fathers did '
  - type: note
    content: Num. 13:3, 26
  - type: text
    content: 'when I sent them away from Kadesh Barnea '
  - type: note
    content: Deut. 1:19–25
  - type: text
    content: 'to see the land. '
  '9':
  - type: text
    content: 'For '
  - type: note
    content: Num. 13:24, 31; Deut. 1:24, 28
  - type: text
    content: 'when they went up to the Valley of Eshcol and saw the land, they discouraged the heart of the children of Israel, so that they did not go into the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had given them. '
