verses:
  '1':
  - type: heading
    content: The Coming Deliverance of Judah
  - type: text
    content: 'The burden of the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' against Israel. Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Is. 42:5; 44:24
  - type: text
    content: 'who stretches out the heavens, lays the foundation of the earth, and '
  - type: note
    content: Num. 16:22; (Eccl. 12:7; Is. 57:16); Heb. 12:9
  - type: text
    content: 'forms the spirit of man within him: '
  '10':
  - type: note
    content: Jer. 31:9; 50:4; Ezek. 39:29; (Joel 2:28, 29)
  - type: text
    content: '“And I will pour on the house of David and on the inhabitants of Jerusalem the Spirit of grace and supplication; then they will '
  - type: note
    content: John 19:34, 37; 20:27; (Rev. 1:7)
  - type: text
    content: 'look on Me whom they pierced. Yes, they will mourn for Him '
  - type: note
    content: Jer. 6:26; Amos 8:10
  - type: text
    content: 'as one mourns for '
  - type: text
    content: his
  - type: text
    content: ' only '
  - type: text
    content: son,
  - type: text
    content: ' and grieve for Him as one grieves for a firstborn. '
  '11':
  - type: text
    content: 'In that day there shall be a great '
  - type: note
    content: (Matt. 24:30); Acts 2:37; (Rev. 1:7)
  - type: text
    content: 'mourning in Jerusalem, '
  - type: note
    content: 2 Kin. 23:29
  - type: text
    content: 'like the mourning at Hadad Rimmon in the plain of Megiddo. '
  '12':
  - type: note
    content: (Matt. 24:30; Rev. 1:7)
  - type: text
    content: 'And the land shall mourn, every family by itself: the family of the house of David by itself, and their wives by themselves; the family of the house of '
  - type: note
    content: Luke 3:31
  - type: text
    content: 'Nathan by itself, and their wives by themselves; '
  '13':
  - type: text
    content: 'the family of the house of Levi by itself, and their wives by themselves; the family of Shimei by itself, and their wives by themselves; '
  '14':
  - type: text
    content: all the families that remain, every family by itself, and their wives by themselves.
  '2':
  - type: text
    content: '“Behold, I will make Jerusalem '
  - type: note
    content: Is. 51:17
  - type: text
    content: 'a cup of drunkenness to all the surrounding peoples, when they lay siege against Judah and Jerusalem. '
  '3':
  - type: note
    content: Zech. 12:4, 6, 8; 13:1
  - type: text
    content: 'And it shall happen in that day that I will make Jerusalem '
  - type: note
    content: Matt. 21:44
  - type: text
    content: 'a very heavy stone for all peoples; all who would heave it away will surely be cut in pieces, though all nations of the earth are gathered against it. '
  '4':
  - type: text
    content: 'In that day,” says the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Ps. 76:6; Ezek. 38:4
  - type: text
    content: '“I will strike every horse with confusion, and its rider with madness; I will open My eyes on the house of Judah, and will strike every horse of the peoples with blindness. '
  '5':
  - type: text
    content: 'And the governors of Judah shall say in their heart, ‘The inhabitants of Jerusalem '
  - type: text
    content: are
  - type: text
    content: ' my strength in the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, their God.’ '
  '6':
  - type: text
    content: 'In that day I will make the governors of Judah '
  - type: note
    content: Is. 10:17, 18; Obad. 18; Zech. 11:1
  - type: text
    content: like a firepan in the woodpile, and like a fiery torch in the sheaves; they shall devour all the surrounding peoples on the right hand and on the left, but Jerusalem shall be inhabited again in her own place—Jerusalem.
  '7':
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' will save the tents of Judah first, so that the glory of the house of David and the glory of the inhabitants of Jerusalem shall not become greater than that of Judah. '
  '8':
  - type: text
    content: 'In that day the '
  - type: heading
    content: Lord
  - type: text
    content: ' will defend the inhabitants of Jerusalem; the one who is feeble among them in that day shall be like David, and the house of David '
  - type: text
    content: shall
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' like God, like the Angel of the '
  - type: heading
    content: Lord
  - type: text
    content: ' before them. '
  '9':
  - type: text
    content: 'It shall be in that day '
  - type: text
    content: that
  - type: text
    content: ' I will seek to '
  - type: note
    content: Hag. 2:22
  - type: text
    content: destroy all the nations that come against Jerusalem.
  - type: heading
    content: Mourning for the Pierced One
