      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The burden of the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' against Israel. Thus says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 42:5; 44:24
    marker-yv: yv-n
  - type: text
    text: 'who stretches out the heavens, lays the foundation of the earth, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 16:22; (Eccl. 12:7; Is. 57:16); Heb. 12:9
    marker-yv: yv-n
  - type: text
    text: 'forms the spirit of man within him: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Behold, I will make Jerusalem '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 51:17
    marker-yv: yv-n
  - type: text
    text: 'a cup of drunkenness to all the surrounding peoples, when they lay siege against Judah and Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Zech. 12:4, 6, 8; 13:1
    marker-yv: yv-n
  - type: text
    text: 'And it shall happen in that day that I will make Jerusalem '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 21:44
    marker-yv: yv-n
  - type: text
    text: 'a very heavy stone for all peoples; all who would heave it away will surely be cut in pieces, though all nations of the earth are gathered against it. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'In that day,” says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 76:6; Ezek. 38:4
    marker-yv: yv-n
  - type: text
    text: '“I will strike every horse with confusion, and its rider with madness; I will open My eyes on the house of Judah, and will strike every horse of the peoples with blindness. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the governors of Judah shall say in their heart, ‘The inhabitants of Jerusalem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' my strength in the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of hosts, their God.’ '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In that day I will make the governors of Judah '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 10:17, 18; Obad. 18; Zech. 11:1
    marker-yv: yv-n
  - type: text
    text: like a firepan in the woodpile, and like a fiery torch in the sheaves; they shall devour all the surrounding peoples on the right hand and on the left, but Jerusalem shall be inhabited again in her own place—Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will save the tents of Judah first, so that the glory of the house of David and the glory of the inhabitants of Jerusalem shall not become greater than that of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'In that day the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will defend the inhabitants of Jerusalem; the one who is feeble among them in that day shall be like David, and the house of David '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shall
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' like God, like the Angel of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' before them. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'It shall be in that day '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' I will seek to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hag. 2:22
    marker-yv: yv-n
  - type: text
    text: destroy all the nations that come against Jerusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mourning for the Pierced One
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 31:9; 50:4; Ezek. 39:29; (Joel 2:28, 29)
    marker-yv: yv-n
  - type: text
    text: '“And I will pour on the house of David and on the inhabitants of Jerusalem the Spirit of grace and supplication; then they will '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 19:34, 37; 20:27; (Rev. 1:7)
    marker-yv: yv-n
  - type: text
    text: 'look on Me whom they pierced. Yes, they will mourn for Him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 6:26; Amos 8:10
    marker-yv: yv-n
  - type: text
    text: 'as one mourns for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' only '
  - type: usfm
    marker: it
    children:
    - type: text
      text: son,
  - type: text
    text: ' and grieve for Him as one grieves for a firstborn. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'In that day there shall be a great '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 24:30); Acts 2:37; (Rev. 1:7)
    marker-yv: yv-n
  - type: text
    text: 'mourning in Jerusalem, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 23:29
    marker-yv: yv-n
  - type: text
    text: 'like the mourning at Hadad Rimmon in the plain of Megiddo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 24:30; Rev. 1:7)
    marker-yv: yv-n
  - type: text
    text: 'And the land shall mourn, every family by itself: the family of the house of David by itself, and their wives by themselves; the family of the house of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 3:31
    marker-yv: yv-n
  - type: text
    text: 'Nathan by itself, and their wives by themselves; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'the family of the house of Levi by itself, and their wives by themselves; the family of Shimei by itself, and their wives by themselves; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: all the families that remain, every family by itself, and their wives by themselves.
