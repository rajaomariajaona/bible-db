  - type: text
    content: ' '
  '23':
  - type: text
    content: 'So the two men returned, descended from the mountain, and crossed over; and they came to Joshua the son of Nun, and told him all that had befallen them. '
  '24':
  - type: text
    content: 'And they said to Joshua, “Truly '
  - type: note
