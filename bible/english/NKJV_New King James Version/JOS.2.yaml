      children:
      - type: text
        text: Acts 9:25
      marker-yv: yv-n
    - type: text
      text: 'let them down by a rope through the window, for her house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' on the city wall; she dwelt on the wall. '
  '16':
