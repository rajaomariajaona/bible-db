    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So the men answered her, “Our lives for yours, if none of you tell this business of ours. And it shall be, when the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given us the land, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 47:29; Judg. 1:24; (Matt. 5:7)
      marker-yv: yv-n
    - type: text
