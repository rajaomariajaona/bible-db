    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'They departed and went to the mountain, and stayed there three days until the pursuers returned. The pursuers sought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' all along the way, but did not find '
    - type: usfm
