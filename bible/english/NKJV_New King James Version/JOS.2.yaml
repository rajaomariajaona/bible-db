    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So the two men returned, descended from the mountain, and crossed over; and they came to Joshua the son of Nun, and told him all that had befallen them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And they said to Joshua, “Truly '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:31; Josh. 6:2; 21:44
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has delivered all the land into our hands, for indeed all the inhabitants of the country are fainthearted because of us.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So the king of Jericho sent to Rahab, saying, “Bring out the men who have come to you, who have entered your house, for they have come to search out all the country.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 17:19, 20
      marker-yv: yv-n
    - type: text
      text: 'Then the woman took the two men and hid them. So she said, “Yes, the men came to me, but I did not know where they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' from. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And it happened as the gate was being shut, when it was dark, that the men went out. Where the men went I do not know; pursue them quickly, for you may overtake them.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '(But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 1:17; 2 Sam. 17:19
      marker-yv: yv-n
    - type: text
      text: 'she had brought them up to the roof and hidden them with the stalks of flax, which she had laid in order on the roof.) '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then the men pursued them by the road to the Jordan, to the fords. And as soon as those who pursued them had gone out, they shut the gate.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now before they lay down, she came up to them on the roof, '
  '9':
  - type: usfm
