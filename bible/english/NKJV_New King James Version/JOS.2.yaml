  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And if you tell this business of ours, then we will be free from your oath which you made us swear.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then she said, “According to your words, so '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' it.” And she sent them away, and they departed. And she bound the scarlet cord in the window.'
  '22':
  - type: usfm
