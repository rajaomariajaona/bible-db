  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has delivered all the land into our hands, for indeed all the inhabitants of the country are fainthearted because of us.”'
  '3':
  - type: text
    content: So the king of Jericho sent to Rahab, saying, “Bring out the men who have come to you, who have entered your house, for they have come to search out all the country.”
  '4':
  - type: note
    content: 2 Sam. 17:19, 20
  - type: text
    content: 'Then the woman took the two men and hid them. So she said, “Yes, the men came to me, but I did not know where they '
  - type: text
    content: were
  - type: text
    content: ' from. '
  '5':
  - type: text
    content: 'And it happened as the gate was being shut, when it was dark, that the men went out. Where the men went I do not know; pursue them quickly, for you may overtake them.” '
  '6':
  - type: text
    content: '(But '
  - type: note
    content: Ex. 1:17; 2 Sam. 17:19
  - type: text
    content: 'she had brought them up to the roof and hidden them with the stalks of flax, which she had laid in order on the roof.) '
  '7':
  - type: text
    content: Then the men pursued them by the road to the Jordan, to the fords. And as soon as those who pursued them had gone out, they shut the gate.
  '8':
  - type: text
    content: 'Now before they lay down, she came up to them on the roof, '
  '9':
  - type: text
    content: 'and said to the men: '
  - type: note
    content: Deut. 1:8
  - type: text
    content: '“I know that the '
  - type: heading
    content: Lord
  - type: text
    content: ' has given you the land, that '
  - type: note
    content: Gen. 35:5; Ex. 23:27; Deut. 2:25; 11:25; Josh. 9:9, 10
  - type: text
    content: 'the terror of you has fallen on us, and that all the inhabitants of the land '
  - type: note
    content: Ex. 15:15; Josh. 5:1
  - type: text
    content: 'are fainthearted because of you. '
