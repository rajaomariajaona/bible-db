document_id: 1CO.7,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Principles of Marriage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now concerning the things of which you wrote to me:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:8, 26
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good for a man not to touch a woman. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now to the married I command, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yet
    - type: text
      text: ' not I but the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 10:6–10
      marker-yv: yv-n
    - type: text
      text: 'Lord: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 2:14; (Matt. 5:32)
      marker-yv: yv-n
    - type: text
      text: 'A wife is not to depart from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' husband. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But even if she does depart, let her remain unmarried or be reconciled to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' husband. And a husband is not to divorce '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' wife.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But to the rest I, not the Lord, say: If any brother has a wife who does not believe, and she is willing to live with him, let him not divorce her. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And a woman who has a husband who does not believe, if he is willing to live with her, let her not divorce him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For the unbelieving husband is sanctified by the wife, and the unbelieving wife is sanctified by the husband; otherwise '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 9:2; Mal. 2:15
      marker-yv: yv-n
    - type: text
      text: 'your children would be unclean, but now they are holy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But if the unbeliever departs, let him depart; a brother or a sister is not under bondage in such '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cases.
    - type: text
      text: ' But God has called us '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:18
      marker-yv: yv-n
    - type: text
      text: 'to peace. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For how do you know, O wife, whether you will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 11:14; 1 Pet. 3:1
      marker-yv: yv-n
    - type: text
      text: 'save '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' husband? Or how do you know, O husband, whether you will save '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' wife?'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Live as You Are Called
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But as God has distributed to each one, as the Lord has called each one, so let him walk. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:17
      marker-yv: yv-n
    - type: text
      text: 'so I ordain in all the churches. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Was anyone called while circumcised? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:1
      marker-yv: yv-n
    - type: text
      text: 'Let him not become uncircumcised. Was anyone called while uncircumcised? Let him not be circumcised. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 2:27, 29; Gal. 3:28; 5:6; 6:15; Col. 3:11)
      marker-yv: yv-n
    - type: text
      text: 'Circumcision is nothing and uncircumcision is nothing, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 15:14)
      marker-yv: yv-n
    - type: text
      text: 'keeping the commandments of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: matters.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nevertheless, because of sexual immorality, let each man have his own wife, and let each woman have her own husband. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Let each one remain in the same calling in which he was called. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Were you called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: while
    - type: text
      text: ' a slave? Do not be concerned about it; but if you can be made free, rather use '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'For he who is called in the Lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: while
    - type: text
      text: ' a slave is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 8:36); Rom. 6:18; Philem. 16
      marker-yv: yv-n
    - type: text
      text: 'the Lord’s freedman. Likewise he who is called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: while
    - type: text
      text: ' free is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 9:21; Gal. 5:13); Eph. 6:6; Col. 3:24; 1 Pet. 2:16
      marker-yv: yv-n
    - type: text
      text: 'Christ’s slave. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:42; 1 Cor. 6:20; 1 Pet. 1:18, 19; Rev. 5:9
      marker-yv: yv-n
    - type: text
      text: 'You were bought at a price; do not become slaves of men. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Brethren, let each one remain with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Eph. 6:5–8; Col. 3:22–24)
      marker-yv: yv-n
    - type: text
      text: 'God in that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: state
    - type: text
      text: ' in which he was called.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Unmarried and Widows
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Now concerning virgins: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:8
      marker-yv: yv-n
    - type: text
      text: 'I have no commandment from the Lord; yet I give judgment as one '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 4:1; 1 Tim. 1:13, 16
      marker-yv: yv-n
    - type: text
      text: 'whom the Lord in His mercy has made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:12
      marker-yv: yv-n
    - type: text
      text: 'trustworthy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I suppose therefore that this is good because of the present distress—
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:1, 8
      marker-yv: yv-n
    - type: text
      text: 'that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good for a man to remain as he is: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Are you bound to a wife? Do not seek to be loosed. Are you loosed from a wife? Do not seek a wife. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: But even if you do marry, you have not sinned; and if a virgin marries, she has not sinned. Nevertheless such will have trouble in the flesh, but I would spare you.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 13:11); 1 Cor. 7:31; 1 Pet. 4:7; (2 Pet. 3:8, 9)
      marker-yv: yv-n
    - type: text
      text: 'this I say, brethren, the time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' short, so that from now on even those who have wives should be as though they had none, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:10
      marker-yv: yv-n
    - type: text
      text: 'Let the husband render to his wife the affection due her, and likewise also the wife to her husband. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'those who weep as though they did not weep, those who rejoice as though they did not rejoice, those who buy as though they did not possess, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'and those who use this world as not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:18
      marker-yv: yv-n
    - type: text
      text: 'misusing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
    - type: text
      text: ' For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 39:6; 1 Cor. 7:29; James 1:10; 4:14; 1 Pet. 1:24; 4:7; (1 John 2:17)
      marker-yv: yv-n
    - type: text
      text: the form of this world is passing away.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'But I want you to be without care. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 5:5
      marker-yv: yv-n
    - type: text
      text: 'He who is unmarried cares for the things of the Lord—how he may please the Lord. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'But he who is married cares about the things of the world—how he may please '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' wife. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'There is a difference between a wife and a virgin. The unmarried woman '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 10:40
      marker-yv: yv-n
    - type: text
      text: 'cares about the things of the Lord, that she may be holy both in body and in spirit. But she who is married cares about the things of the world—how she may please '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' husband. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: And this I say for your own profit, not that I may put a leash on you, but for what is proper, and that you may serve the Lord without distraction.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'But if any man thinks he is behaving improperly toward his virgin, if she is past the flower of youth, and thus it must be, let him do what he wishes. He does not sin; let them marry. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Nevertheless he who stands steadfast in his heart, having no necessity, but has power over his own will, and has so determined in his heart that he will keep his virgin, does well. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 13:4
      marker-yv: yv-n
    - type: text
      text: 'So then he who gives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' in marriage does well, but he who does not give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' in marriage does better.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 7:2
      marker-yv: yv-n
    - type: text
      text: 'A wife is bound by law as long as her husband lives; but if her husband dies, she is at liberty to be married to whom she wishes, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:14
      marker-yv: yv-n
    - type: text
      text: 'only in the Lord. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The wife does not have authority over her own body, but the husband '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does.
    - type: text
      text: ' And likewise the husband does not have authority over his own body, but the wife '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'But she is happier if she remains as she is, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:6, 25
      marker-yv: yv-n
    - type: text
      text: 'according to my judgment—and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 4:8
      marker-yv: yv-n
    - type: text
      text: I think I also have the Spirit of God.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 2:16
      marker-yv: yv-n
    - type: text
      text: 'Do not deprive one another except with consent for a time, that you may give yourselves to fasting and prayer; and come together again so that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 3:5
      marker-yv: yv-n
    - type: text
      text: 'Satan does not tempt you because of your lack of self-control. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But I say this as a concession, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:8
      marker-yv: yv-n
    - type: text
      text: 'not as a commandment. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 26:29
      marker-yv: yv-n
    - type: text
      text: I wish that all men were even as I myself. But each one has his own gift from God, one in this manner and another in that.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But I say to the unmarried and to the widows: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:1, 26
      marker-yv: yv-n
    - type: text
      text: 'It is good for them if they remain even as I am; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 5:14
      marker-yv: yv-n
    - type: text
      text: 'if they cannot exercise self-control, let them marry. For it is better to marry than to burn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: passion.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Keep Your Marriage Vows
    marker-yv: yv-h
