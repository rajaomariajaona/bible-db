document_id: ACT.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Timothy Joins Paul and Silas
  - type: text
    content: 'Then he came to '
  - type: note
    content: Acts 14:6
  - type: text
    content: 'Derbe and Lystra. And behold, a certain disciple was there, '
  - type: note
    content: Acts 19:22; Rom. 16:21; 1 Cor. 4:17; 16:10; Phil. 1:1; 2:19; 1 Thess. 3:2; 2 Tim. 1:2
  - type: text
    content: 'named Timothy, '
  - type: note
    content: 2 Tim. 1:5; 3:15
  - type: text
    content: the
  - type: text
    content: ' son of a certain Jewish woman who believed, but his father '
  - type: text
    content: was
  - type: text
    content: ' Greek. '
  '10':
  - type: text
    content: 'Now after he had seen the vision, immediately we sought to go '
  - type: note
    content: 2 Cor. 2:13
  - type: text
    content: to Macedonia, concluding that the Lord had called us to preach the gospel to them.
  - type: heading
    content: Lydia Baptized at Philippi
  '11':
  - type: text
    content: 'Therefore, sailing from Troas, we ran a straight course to Samothrace, and the next '
  - type: text
    content: day
  - type: text
    content: ' came to Neapolis, '
  '12':
  - type: text
    content: 'and from there to '
  - type: note
    content: Acts 20:6; Phil. 1:1; 1 Thess. 2:2
  - type: text
    content: 'Philippi, which is the foremost city of that part of Macedonia, a colony. And we were staying in that city for some days. '
  '13':
  - type: text
    content: 'And on the Sabbath day we went out of the city to the riverside, where prayer was customarily made; and we sat down and spoke to the women who met '
  - type: text
    content: there.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Now a certain woman named Lydia heard '
  - type: text
    content: us.
  - type: text
    content: ' She was a seller of purple from the city of '
  - type: note
    content: Rev. 1:11; 2:18, 24
  - type: text
    content: 'Thyatira, who worshiped God. '
  - type: note
    content: Luke 24:45
  - type: text
    content: 'The Lord opened her heart to heed the things spoken by Paul. '
  '15':
  - type: text
    content: 'And when she and her household were baptized, she begged '
  - type: text
    content: us,
  - type: text
    content: ' saying, “If you have judged me to be faithful to the Lord, come to my house and stay.” So '
  - type: note
    content: Gen. 19:3; 33:11; Judg. 19:21; Luke 24:29; (Heb. 13:2)
  - type: text
    content: she persuaded us.
  - type: heading
    content: Paul and Silas Imprisoned
  '16':
  - type: text
    content: 'Now it happened, as we went to prayer, that a certain slave girl '
  - type: note
    content: Lev. 19:31; 20:6, 27; Deut. 18:11; 1 Sam. 28:3, 7; 2 Kin. 21:6; 1 Chr. 10:13; Is. 8:19
  - type: text
    content: 'possessed with a spirit of divination met us, who brought her masters '
  - type: note
    content: Acts 19:24
  - type: text
    content: 'much profit by fortune-telling. '
  '17':
  - type: text
    content: 'This girl followed Paul and us, and cried out, saying, “These men are the servants of the Most High God, who proclaim to us the way of salvation.” '
  '18':
  - type: text
    content: And this she did for many days.
  - type: text
    content: 'But Paul, '
  - type: note
    content: Mark 1:25, 34
  - type: text
    content: 'greatly annoyed, turned and said to the spirit, “I command you in the name of Jesus Christ to come out of her.” '
  - type: note
    content: Mark 16:17
  - type: text
    content: 'And he came out that very hour. '
  '19':
  - type: text
    content: 'But '
  - type: note
    content: Acts 16:16; 19:25, 26
  - type: text
    content: 'when her masters saw that their hope of profit was gone, they seized Paul and Silas and '
  - type: note
    content: Matt. 10:18
  - type: text
    content: 'dragged '
  - type: text
    content: them
  - type: text
    content: ' into the marketplace to the authorities.'
  '2':
  - type: text
    content: 'He was well spoken of by the brethren who were at Lystra and Iconium. '
  '20':
  - type: text
    content: 'And they brought them to the magistrates, and said, “These men, being Jews, '
  - type: note
    content: 1 Kin. 18:17; Acts 17:8
  - type: text
    content: 'exceedingly trouble our city; '
  '21':
  - type: text
    content: 'and they teach customs which are not lawful for us, being Romans, to receive or observe.” '
  '22':
  - type: text
    content: 'Then the multitude rose up together against them; and the magistrates tore off their clothes '
  - type: note
    content: 2 Cor. 6:5; 11:23, 25; 1 Thess. 2:2
  - type: text
    content: 'and commanded '
  - type: text
    content: them
  - type: text
    content: ' to be beaten with rods. '
  '23':
  - type: text
    content: 'And when they had laid many stripes on them, they threw '
  - type: text
    content: them
  - type: text
    content: ' into prison, commanding the jailer to keep them securely. '
  '24':
  - type: text
    content: Having received such a charge, he put them into the inner prison and fastened their feet in the stocks.
  - type: heading
    content: The Philippian Jailer Saved
  '25':
  - type: text
    content: 'But at midnight Paul and Silas were praying and singing hymns to God, and the prisoners were listening to them. '
  '26':
  - type: note
    content: Acts 4:31
  - type: text
    content: 'Suddenly there was a great earthquake, so that the foundations of the prison were shaken; and immediately '
  - type: note
    content: Acts 5:19; 12:7, 10
  - type: text
    content: 'all the doors were opened and everyone’s chains were loosed. '
  '27':
  - type: text
    content: 'And the keeper of the prison, awaking from sleep and seeing the prison doors open, supposing the prisoners had fled, drew his sword and was about to kill himself. '
  '28':
  - type: text
    content: But Paul called with a loud voice, saying, “Do yourself no harm, for we are all here.”
  '29':
  - type: text
    content: 'Then he called for a light, ran in, and fell down trembling before Paul and Silas. '
  '3':
  - type: text
    content: 'Paul wanted to have him go on with him. And he '
  - type: note
    content: (1 Cor. 9:20; Gal. 2:3; 5:2)
  - type: text
    content: 'took '
  - type: text
    content: him
  - type: text
    content: ' and circumcised him because of the Jews who were in that region, for they all knew that his father was Greek. '
  '30':
  - type: text
    content: 'And he brought them out and said, '
  - type: note
    content: Luke 3:10; Acts 2:37; 9:6; 22:10
  - type: text
    content: “Sirs, what must I do to be saved?”
  '31':
  - type: text
    content: 'So they said, '
  - type: note
    content: (John 3:16, 36; 6:47; Acts 13:38, 39; Rom. 10:9–11; 1 John 5:10)
  - type: text
    content: '“Believe on the Lord Jesus Christ, and you will be saved, you and your household.” '
  '32':
  - type: text
    content: 'Then they spoke the word of the Lord to him and to all who were in his house. '
  '33':
  - type: text
    content: 'And he took them the same hour of the night and washed '
  - type: text
    content: their
  - type: text
    content: ' stripes. And immediately he and all his '
  - type: text
    content: family
  - type: text
    content: ' were baptized. '
  '34':
  - type: text
    content: 'Now when he had brought them into his house, '
  - type: note
    content: Matt. 5:4; Luke 5:29; 19:6
  - type: text
    content: he set food before them; and he rejoiced, having believed in God with all his household.
  - type: heading
    content: Paul Refuses to Depart Secretly
  '35':
  - type: text
    content: And when it was day, the magistrates sent the officers, saying, “Let those men go.”
  '36':
  - type: text
    content: So the keeper of the prison reported these words to Paul, saying, “The magistrates have sent to let you go. Now therefore depart, and go in peace.”
  '37':
  - type: text
    content: 'But Paul said to them, “They have beaten us openly, uncondemned '
  - type: note
    content: Acts 22:25–29
  - type: text
    content: 'Romans, '
  - type: text
    content: and
  - type: text
    content: ' have thrown '
  - type: text
    content: us
  - type: text
    content: ' into prison. And now do they put us out secretly? No indeed! Let them come themselves and get us out.”'
  '38':
  - type: text
    content: 'And the officers told these words to the magistrates, and they were afraid when they heard that they were Romans. '
  '39':
  - type: text
    content: 'Then they came and pleaded with them and brought '
  - type: text
    content: them
  - type: text
    content: ' out, and '
  - type: note
    content: Matt. 8:34
  - type: text
    content: 'asked '
  - type: text
    content: them
  - type: text
    content: ' to depart from the city. '
  '4':
  - type: text
    content: 'And as they went through the cities, they delivered to them the '
  - type: note
    content: Acts 15:19–21
  - type: text
    content: 'decrees to keep, '
  - type: note
    content: Acts 15:28, 29
  - type: text
    content: 'which were determined by the apostles and elders at Jerusalem. '
  '40':
  - type: text
    content: 'So they went out of the prison '
  - type: note
    content: Acts 16:14
  - type: text
    content: 'and entered '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: house
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' Lydia; and when they had seen the brethren, they encouraged them and departed.'
  '5':
  - type: note
    content: Acts 2:47; 15:41
  - type: text
    content: So the churches were strengthened in the faith, and increased in number daily.
  - type: heading
    content: The Macedonian Call
  '6':
  - type: text
    content: 'Now when they had gone through Phrygia and the region of '
  - type: note
    content: Acts 18:23; Gal. 1:1, 2
  - type: text
    content: 'Galatia, they were forbidden by the Holy Spirit to preach the word in Asia. '
  '7':
  - type: text
    content: 'After they had come to Mysia, they tried to go into Bithynia, but the Spirit did not permit them. '
  '8':
  - type: text
    content: 'So passing by Mysia, they '
  - type: note
    content: Acts 16:11; 20:5; 2 Cor. 2:12; 2 Tim. 4:13
  - type: text
    content: 'came down to Troas. '
  '9':
  - type: text
    content: 'And a vision appeared to Paul in the night. A '
  - type: note
    content: Acts 10:30
  - type: text
    content: 'man of Macedonia stood and pleaded with him, saying, “Come over to Macedonia and help us.” '
