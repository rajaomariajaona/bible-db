document_id: ACT.16,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothy Joins Paul and Silas
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he came to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 14:6
      marker-yv: yv-n
    - type: text
      text: 'Derbe and Lystra. And behold, a certain disciple was there, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:22; Rom. 16:21; 1 Cor. 4:17; 16:10; Phil. 1:1; 2:19; 1 Thess. 3:2; 2 Tim. 1:2
      marker-yv: yv-n
    - type: text
      text: 'named Timothy, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 1:5; 3:15
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' son of a certain Jewish woman who believed, but his father '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Greek. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now after he had seen the vision, immediately we sought to go '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:13
      marker-yv: yv-n
    - type: text
      text: to Macedonia, concluding that the Lord had called us to preach the gospel to them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lydia Baptized at Philippi
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, sailing from Troas, we ran a straight course to Samothrace, and the next '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' came to Neapolis, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and from there to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:6; Phil. 1:1; 1 Thess. 2:2
      marker-yv: yv-n
    - type: text
      text: 'Philippi, which is the foremost city of that part of Macedonia, a colony. And we were staying in that city for some days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the Sabbath day we went out of the city to the riverside, where prayer was customarily made; and we sat down and spoke to the women who met '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now a certain woman named Lydia heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us.
    - type: text
      text: ' She was a seller of purple from the city of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 1:11; 2:18, 24
      marker-yv: yv-n
    - type: text
      text: 'Thyatira, who worshiped God. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:45
      marker-yv: yv-n
    - type: text
      text: 'The Lord opened her heart to heed the things spoken by Paul. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when she and her household were baptized, she begged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us,
    - type: text
      text: ' saying, “If you have judged me to be faithful to the Lord, come to my house and stay.” So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:3; 33:11; Judg. 19:21; Luke 24:29; (Heb. 13:2)
      marker-yv: yv-n
    - type: text
      text: she persuaded us.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul and Silas Imprisoned
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened, as we went to prayer, that a certain slave girl '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:31; 20:6, 27; Deut. 18:11; 1 Sam. 28:3, 7; 2 Kin. 21:6; 1 Chr. 10:13; Is. 8:19
      marker-yv: yv-n
    - type: text
      text: 'possessed with a spirit of divination met us, who brought her masters '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:24
      marker-yv: yv-n
    - type: text
      text: 'much profit by fortune-telling. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This girl followed Paul and us, and cried out, saying, “These men are the servants of the Most High God, who proclaim to us the way of salvation.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And this she did for many days.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Paul, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 1:25, 34
      marker-yv: yv-n
    - type: text
      text: 'greatly annoyed, turned and said to the spirit, “I command you in the name of Jesus Christ to come out of her.” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:17
      marker-yv: yv-n
    - type: text
      text: 'And he came out that very hour. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:16; 19:25, 26
      marker-yv: yv-n
    - type: text
      text: 'when her masters saw that their hope of profit was gone, they seized Paul and Silas and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:18
      marker-yv: yv-n
    - type: text
      text: 'dragged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' into the marketplace to the authorities.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was well spoken of by the brethren who were at Lystra and Iconium. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they brought them to the magistrates, and said, “These men, being Jews, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 18:17; Acts 17:8
      marker-yv: yv-n
    - type: text
      text: 'exceedingly trouble our city; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they teach customs which are not lawful for us, being Romans, to receive or observe.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the multitude rose up together against them; and the magistrates tore off their clothes '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:5; 11:23, 25; 1 Thess. 2:2
      marker-yv: yv-n
    - type: text
      text: 'and commanded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to be beaten with rods. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had laid many stripes on them, they threw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' into prison, commanding the jailer to keep them securely. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Having received such a charge, he put them into the inner prison and fastened their feet in the stocks.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Philippian Jailer Saved
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But at midnight Paul and Silas were praying and singing hymns to God, and the prisoners were listening to them. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:31
      marker-yv: yv-n
    - type: text
      text: 'Suddenly there was a great earthquake, so that the foundations of the prison were shaken; and immediately '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:19; 12:7, 10
      marker-yv: yv-n
    - type: text
      text: 'all the doors were opened and everyone’s chains were loosed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the keeper of the prison, awaking from sleep and seeing the prison doors open, supposing the prisoners had fled, drew his sword and was about to kill himself. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Paul called with a loud voice, saying, “Do yourself no harm, for we are all here.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he called for a light, ran in, and fell down trembling before Paul and Silas. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul wanted to have him go on with him. And he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 9:20; Gal. 2:3; 5:2)
      marker-yv: yv-n
    - type: text
      text: 'took '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' and circumcised him because of the Jews who were in that region, for they all knew that his father was Greek. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he brought them out and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 3:10; Acts 2:37; 9:6; 22:10
      marker-yv: yv-n
    - type: text
      text: “Sirs, what must I do to be saved?”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 3:16, 36; 6:47; Acts 13:38, 39; Rom. 10:9–11; 1 John 5:10)
      marker-yv: yv-n
    - type: text
      text: '“Believe on the Lord Jesus Christ, and you will be saved, you and your household.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they spoke the word of the Lord to him and to all who were in his house. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he took them the same hour of the night and washed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' stripes. And immediately he and all his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: family
    - type: text
      text: ' were baptized. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when he had brought them into his house, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:4; Luke 5:29; 19:6
      marker-yv: yv-n
    - type: text
      text: he set food before them; and he rejoiced, having believed in God with all his household.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Refuses to Depart Secretly
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when it was day, the magistrates sent the officers, saying, “Let those men go.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the keeper of the prison reported these words to Paul, saying, “The magistrates have sent to let you go. Now therefore depart, and go in peace.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Paul said to them, “They have beaten us openly, uncondemned '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 22:25–29
      marker-yv: yv-n
    - type: text
      text: 'Romans, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' have thrown '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' into prison. And now do they put us out secretly? No indeed! Let them come themselves and get us out.”'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the officers told these words to the magistrates, and they were afraid when they heard that they were Romans. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they came and pleaded with them and brought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' out, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 8:34
      marker-yv: yv-n
    - type: text
      text: 'asked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to depart from the city. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as they went through the cities, they delivered to them the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:19–21
      marker-yv: yv-n
    - type: text
      text: 'decrees to keep, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:28, 29
      marker-yv: yv-n
    - type: text
      text: 'which were determined by the apostles and elders at Jerusalem. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went out of the prison '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:14
      marker-yv: yv-n
    - type: text
      text: 'and entered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: house
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' Lydia; and when they had seen the brethren, they encouraged them and departed.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:47; 15:41
      marker-yv: yv-n
    - type: text
      text: So the churches were strengthened in the faith, and increased in number daily.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Macedonian Call
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when they had gone through Phrygia and the region of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:23; Gal. 1:1, 2
      marker-yv: yv-n
    - type: text
      text: 'Galatia, they were forbidden by the Holy Spirit to preach the word in Asia. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After they had come to Mysia, they tried to go into Bithynia, but the Spirit did not permit them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So passing by Mysia, they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:11; 20:5; 2 Cor. 2:12; 2 Tim. 4:13
      marker-yv: yv-n
    - type: text
      text: 'came down to Troas. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And a vision appeared to Paul in the night. A '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:30
      marker-yv: yv-n
    - type: text
      text: 'man of Macedonia stood and pleaded with him, saying, “Come over to Macedonia and help us.” '
