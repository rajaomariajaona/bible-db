    children:
    - type: text
      text: Israel Degraded
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Moreover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 26:17; 27:2
      marker-yv: yv-n
    - type: text
      text: 'take up a lamentation for the princes of Israel, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Your mother '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 17:6
      marker-yv: yv-n
    - type: text
      text: like a vine in your bloodline,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Planted by the waters,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 8:7–9
      marker-yv: yv-n
    - type: text
      text: Fruitful and full of branches
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because of many waters.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She had strong branches for scepters of rulers.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 31:3; Dan. 4:11
      marker-yv: yv-n
    - type: text
      text: She towered in stature above the thick branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And was seen in her height amid the dense foliage.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But she was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 31:27, 28
      marker-yv: yv-n
    - type: text
      text: plucked up in fury,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She was cast down to the ground,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 17:10; Hos. 13:5
      marker-yv: yv-n
    - type: text
      text: east wind dried her fruit.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Her strong branches were broken and withered;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The fire consumed them.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And now she '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' planted in the wilderness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In a dry and thirsty land.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 9:15; 2 Kin. 24:20; Ezek. 17:18
      marker-yv: yv-n
    - type: text
      text: Fire has come out from a rod of her branches
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' devoured her fruit,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that she has no strong branch— a scepter for ruling.’ ”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 2:5
      marker-yv: yv-n
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a lamentation, and has become a lamentation.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your mother? A lioness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She lay down among the lions;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Among the young lions she nourished her cubs.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She brought up one of her cubs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 19:2; 2 Kin. 23:31, 32
      marker-yv: yv-n
    - type: text
      text: he became a young lion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He learned to catch prey,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And he devoured men.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The nations also heard of him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He was trapped in their pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And they brought him with chains to the land of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:33, 34; 2 Chr. 36:4
      marker-yv: yv-n
    - type: text
      text: Egypt.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘When she saw that she waited, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' her hope was lost,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'She took '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:34
      marker-yv: yv-n
    - type: text
      text: 'another of her cubs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' made him a young lion.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:8, 9
      marker-yv: yv-n
    - type: text
      text: He roved among the lions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 19:3
      marker-yv: yv-n
    - type: text
      text: became a young lion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He learned to catch prey;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He devoured men.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He knew their desolate places,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And laid waste their cities;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The land with its fullness was desolated
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By the noise of his roaring.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:2, 11
      marker-yv: yv-n
    - type: text
      text: Then the nations set against him from the provinces on every side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And spread their net over him;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 19:4
      marker-yv: yv-n
    - type: text
      text: He was trapped in their pit.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:6; Jer. 22:18
      marker-yv: yv-n
    - type: text
      text: They put him in a cage with chains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And brought him to the king of Babylon;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They brought him in nets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'That his voice should no longer be heard on '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 6:2
      marker-yv: yv-n
    - type: text
      text: the mountains of Israel.
