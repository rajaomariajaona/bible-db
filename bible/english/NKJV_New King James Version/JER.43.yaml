    children:
    - type: text
      text: Jeremiah Taken to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it happened, when Jeremiah had stopped speaking to all the people all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 42:9–18
      marker-yv: yv-n
    - type: text
      text: 'words of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God, for which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God had sent him to them, all these words, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say to them, ‘Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel: “Behold, I will send and bring Nebuchadnezzar the king of Babylon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:9; 27:6; Ezek. 29:18, 20
      marker-yv: yv-n
    - type: text
      text: 'My servant, and will set his throne above these stones that I have hidden. And he will spread his royal pavilion over them. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 19:1–25; Jer. 25:15–19; 44:13; 46:1, 2, 13–26; Ezek. 29:19, 20
      marker-yv: yv-n
    - type: text
      text: 'When he comes, he shall strike the land of Egypt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: deliver
    - type: text
      text: ' to death '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 15:2; Zech. 11:9
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: appointed
    - type: text
      text: ' for death, and to captivity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: appointed
    - type: text
      text: ' for captivity, and to the sword '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: appointed
    - type: text
      text: ' for the sword. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will kindle a fire in the houses of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:12; Is. 19:1; Jer. 46:25; Ezek. 30:13
      marker-yv: yv-n
    - type: text
      text: 'the gods of Egypt, and he shall burn them and carry them away captive. And he shall array himself with the land of Egypt, as a shepherd puts on his garment, and he shall go out from there in peace. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He shall also break the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacred
    - type: text
      text: ' pillars of Beth Shemesh that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in the land of Egypt; and the houses of the gods of the Egyptians he shall burn with fire.” ’ ”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 42:1
      marker-yv: yv-n
    - type: text
      text: 'that Azariah the son of Hoshaiah, Johanan the son of Kareah, and all the proud men spoke, saying to Jeremiah, “You speak falsely! The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has not sent you to say, ‘Do not go to Egypt to dwell there.’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 36:4; 45:1
      marker-yv: yv-n
    - type: text
      text: 'Baruch the son of Neriah has set you against us, to deliver us into the hand of the Chaldeans, that they may put us to death or carry us away captive to Babylon.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Johanan the son of Kareah, all the captains of the forces, and all the people would '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:26
      marker-yv: yv-n
    - type: text
      text: 'not obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to remain in the land of Judah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Johanan the son of Kareah and all the captains of the forces took '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 40:11, 12
      marker-yv: yv-n
    - type: text
      text: 'all the remnant of Judah who had returned to dwell in the land of Judah, from all nations where they had been driven— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'men, women, children, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 41:10
      marker-yv: yv-n
    - type: text
      text: 'the king’s daughters, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:10; 40:7
      marker-yv: yv-n
    - type: text
      text: 'and every person whom Nebuzaradan the captain of the guard had left with Gedaliah the son of Ahikam, the son of Shaphan, and Jeremiah the prophet and Baruch the son of Neriah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 42:19
      marker-yv: yv-n
    - type: text
      text: 'So they went to the land of Egypt, for they did not obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And they went as far as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 2:16; 44:1
      marker-yv: yv-n
    - type: text
      text: Tahpanhes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 44:1–30
      marker-yv: yv-n
    - type: text
      text: 'word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Jeremiah in Tahpanhes, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take large stones in your hand, and hide them in the sight of the men of Judah, in the clay in the brick courtyard which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' at the entrance to Pharaoh’s house in Tahpanhes; '
