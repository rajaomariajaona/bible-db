document_id: PSA.123,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer for Relief from Contempt
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song of Ascents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Unto You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 2:10; Esth. 10:3
      marker-yv: yv-n
    - type: text
      text: I lift up my eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O You '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 121:1; 141:8
      marker-yv: yv-n
    - type: text
      text: who dwell in the heavens.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Behold, as the eyes of servants '
    - type: usfm
      marker: it
      children:
      - type: text
        text: look
    - type: text
      text: ' to the hand of their masters,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the eyes of a maid to the hand of her mistress,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 2:4; 11:4; 115:3
      marker-yv: yv-n
    - type: text
      text: 'So our eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: look
    - type: text
      text: ' to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Until He has mercy on us.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Have mercy on us, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have mercy on us!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For we are exceedingly filled with contempt.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Our soul is exceedingly filled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With the scorn of those who are at ease,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With the contempt of the proud.
