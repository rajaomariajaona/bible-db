document_id: PSA.123,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Prayer for Relief from Contempt
  - type: text
    content: A Song of Ascents.
  - type: text
    content: 'Unto You '
  - type: note
    content: Neh. 2:10; Esth. 10:3
  - type: text
    content: I lift up my eyes,
  - type: text
    content: 'O You '
  - type: note
    content: Ps. 121:1; 141:8
  - type: text
    content: who dwell in the heavens.
  '2':
  - type: text
    content: 'Behold, as the eyes of servants '
  - type: text
    content: look
  - type: text
    content: ' to the hand of their masters,'
  - type: text
    content: As the eyes of a maid to the hand of her mistress,
  - type: note
    content: Ps. 2:4; 11:4; 115:3
  - type: text
    content: 'So our eyes '
  - type: text
    content: look
  - type: text
    content: ' to the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: Until He has mercy on us.
  '3':
  - type: text
    content: 'Have mercy on us, O '
  - type: heading
    content: Lord
  - type: text
    content: ', have mercy on us!'
  - type: text
    content: For we are exceedingly filled with contempt.
  '4':
  - type: text
    content: Our soul is exceedingly filled
  - type: text
    content: With the scorn of those who are at ease,
  - type: text
    content: With the contempt of the proud.
