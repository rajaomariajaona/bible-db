document_id: 1JN.2,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'My little children, these things I write to you, so that you may not sin. And if anyone sins, '
  - type: note
    content: Rom. 8:34; 1 Tim. 2:5; Heb. 7:25; 9:24
  - type: text
    content: 'we have an Advocate with the Father, Jesus Christ the righteous. '
  '10':
  - type: note
    content: (1 John 3:14)
  - type: text
    content: 'He who loves his brother abides in the light, and '
  - type: note
    content: 2 Pet. 1:10
  - type: text
    content: 'there is no cause for stumbling in him. '
  '11':
  - type: text
    content: 'But he who '
  - type: note
    content: (1 John 2:9; 3:15; 4:20)
  - type: text
    content: 'hates his brother is in darkness and '
  - type: note
    content: John 12:35; 1 John 1:6
  - type: text
    content: walks in darkness, and does not know where he is going, because the darkness has blinded his eyes.
  - type: heading
    content: Their Spiritual State
  '12':
  - type: text
    content: I write to you, little children,
  - type: text
    content: 'Because '
  - type: note
    content: (1 Cor. 6:11)
  - type: text
    content: your sins are forgiven you for His name’s sake.
  '13':
  - type: text
    content: I write to you, fathers,
  - type: text
    content: 'Because you have known Him '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: note
    content: John 1:1; Rev. 22:13
  - type: text
    content: from the beginning.
  - type: text
    content: I write to you, young men,
  - type: text
    content: Because you have overcome the wicked one.
  - type: text
    content: I write to you, little children,
  - type: text
    content: 'Because you have '
  - type: note
    content: (Rom. 8:15–17; Gal. 4:6)
  - type: text
    content: known the Father.
  '14':
  - type: text
    content: I have written to you, fathers,
  - type: text
    content: 'Because you have known Him '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' from the beginning.'
  - type: text
    content: I have written to you, young men,
  - type: text
    content: 'Because '
  - type: note
    content: Eph. 6:10
  - type: text
    content: you are strong, and the word of God abides in you,
  - type: text
    content: And you have overcome the wicked one.
  - type: heading
    content: Do Not Love the World
  '15':
  - type: note
    content: (Rom. 12:2); Gal. 1:4; James 1:27
  - type: text
    content: 'Do not love the world or the things in the world. '
  - type: note
    content: Matt. 6:24; James 4:4
  - type: text
    content: 'If anyone loves the world, the love of the Father is not in him. '
  '16':
  - type: text
    content: 'For all that '
  - type: text
    content: is
  - type: text
    content: ' in the world—the lust of the flesh, '
  - type: note
    content: (Eccl. 5:10, 11)
  - type: text
    content: 'the lust of the eyes, and the pride of life—is not of the Father but is of the world. '
  '17':
  - type: text
    content: 'And '
  - type: note
    content: 1 Cor. 7:31; 1 Pet. 1:24
  - type: text
    content: the world is passing away, and the lust of it; but he who does the will of God abides forever.
  - type: heading
    content: Deceptions of the Last Hour
  '18':
  - type: note
    content: John 21:5
  - type: text
    content: 'Little children, '
  - type: note
    content: Rom. 13:11; 1 Tim. 4:1; Heb. 1:2; 1 Pet. 4:7
  - type: text
    content: 'it is the last hour; and as you have heard that '
  - type: note
    content: 2 Thess. 2:3
  - type: text
    content: 'the Antichrist is coming, '
  - type: note
    content: Matt. 24:5, 24; 1 John 2:22; 4:3; 2 John 7
  - type: text
    content: 'even now many antichrists have come, by which we know '
  - type: note
    content: 1 Tim. 4:1
  - type: text
    content: 'that it is the last hour. '
  '19':
  - type: note
    content: Deut. 13:13
  - type: text
    content: 'They went out from us, but they were not of us; for '
  - type: note
    content: Matt. 24:24
  - type: text
    content: 'if they had been of us, they would have continued with us; but '
  - type: text
    content: they
  - type: text
    content: ' '
  - type: text
    content: went
  - type: text
    content: ' '
  - type: text
    content: out
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 11:19
  - type: text
    content: that they might be made manifest, that none of them were of us.
  '2':
  - type: text
    content: 'And '
  - type: note
    content: (Rom. 3:25); Heb. 2:17; 1 John 4:10
  - type: text
    content: 'He Himself is the propitiation for our sins, and not for ours only but '
  - type: note
    content: John 1:29
  - type: text
    content: also for the whole world.
  - type: heading
    content: The Test of Knowing Him
  '20':
  - type: text
    content: 'But '
  - type: note
    content: 2 Cor. 1:21; Heb. 1:9; 1 John 2:27
  - type: text
    content: 'you have an anointing '
  - type: note
    content: Acts 3:14
  - type: text
    content: 'from the Holy One, and '
  - type: note
    content: Prov. 28:5; (John 16:13); 1 Cor. 2:15, 16
  - type: text
    content: 'you know all things. '
  '21':
  - type: text
    content: I have not written to you because you do not know the truth, but because you know it, and that no lie is of the truth.
  '22':
  - type: note
    content: 2 John 7
  - type: text
    content: 'Who is a liar but he who denies that '
  - type: note
    content: 1 John 4:3
  - type: text
    content: 'Jesus is the Christ? He is antichrist who denies the Father and the Son. '
  '23':
  - type: note
    content: John 15:23
  - type: text
    content: 'Whoever denies the Son does not have the '
  - type: note
    content: John 5:23
  - type: text
    content: 'Father either; '
  - type: note
    content: 1 John 4:15; 5:1; 2 John 9
  - type: text
    content: he who acknowledges the Son has the Father also.
  - type: heading
    content: Let Truth Abide in You
  '24':
  - type: text
    content: 'Therefore let that abide in you '
  - type: note
    content: 2 John 5, 6
  - type: text
    content: 'which you heard from the beginning. If what you heard from the beginning abides in you, '
  - type: note
    content: John 14:23; 1 John 1:3; 2 John 9
  - type: text
    content: 'you also will abide in the Son and in the Father. '
  '25':
  - type: note
    content: John 3:14–16; 6:40; 17:2, 3; 1 John 1:2
  - type: text
    content: And this is the promise that He has promised us—eternal life.
  '26':
  - type: text
    content: 'These things I have written to you concerning those who '
  - type: text
    content: try
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' deceive you. '
  '27':
  - type: text
    content: 'But the '
  - type: note
    content: (John 14:16; 16:13); 1 John 2:20
  - type: text
    content: 'anointing which you have received from Him abides in you, and '
  - type: note
    content: (Jer. 31:33)
  - type: text
    content: 'you do not need that anyone teach you; but as the same anointing '
  - type: note
    content: (John 14:16; 1 Cor. 2:12); 1 Thess. 4:9
  - type: text
    content: teaches you concerning all things, and is true, and is not a lie, and just as it has taught you, you will abide in Him.
  - type: heading
    content: The Children of God
  '28':
  - type: text
    content: 'And now, little children, abide in Him, that when He appears, we may have '
  - type: note
    content: Eph. 3:12; 1 John 3:21; 4:17; 5:14
  - type: text
    content: 'confidence and not be ashamed before Him at His coming. '
  '29':
  - type: note
    content: Acts 22:14
  - type: text
    content: 'If you know that He is righteous, you know that '
  - type: note
    content: John 7:18; 1 John 3:7, 10
  - type: text
    content: everyone who practices righteousness is born of Him.
  '3':
  - type: text
    content: 'Now by this we know that we know Him, if we keep His commandments. '
  '4':
  - type: text
    content: 'He who says, “I know Him,” and does not keep His commandments, is a '
  - type: note
    content: Rom. 3:4
  - type: text
    content: 'liar, and the truth is not in him. '
  '5':
  - type: text
    content: 'But '
  - type: note
    content: John 14:21, 23
  - type: text
    content: 'whoever keeps His word, truly the love of God is perfected '
  - type: note
    content: (1 John 4:12)
  - type: text
    content: 'in him. By this we know that we are in Him. '
  '6':
  - type: note
    content: John 15:4
  - type: text
    content: 'He who says he abides in Him '
  - type: note
    content: Matt. 11:29; John 13:15; 15:10; 1 Pet. 2:21
  - type: text
    content: ought himself also to walk just as He walked.
  '7':
  - type: text
    content: 'Brethren, I write no new commandment to you, but an old commandment which you have had '
  - type: note
    content: John 13:34; 1 John 3:11, 23; 4:21; 2 John 5
  - type: text
    content: 'from the beginning. The old commandment is the word which you heard from the beginning. '
  '8':
  - type: text
    content: 'Again, '
  - type: note
    content: John 13:34; 15:12
  - type: text
    content: 'a new commandment I write to you, which thing is true in Him and in you, '
  - type: note
    content: Rom. 13:12; Eph. 5:8; 1 Thess. 5:4
  - type: text
    content: 'because the darkness is passing away, and '
  - type: note
    content: (John 1:9; 8:12; 12:35)
  - type: text
    content: the true light is already shining.
  '9':
  - type: note
    content: (1 Cor. 13:2); 1 John 3:14
  - type: text
    content: 'He who says he is in the light, and hates his brother, is in darkness until now. '
