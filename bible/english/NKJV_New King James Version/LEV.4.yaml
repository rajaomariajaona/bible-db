document_id: LEV.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sin Offering
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '10':
  - type: note
    content: Lev. 3:3–5
  - type: text
    content: 'as it was taken from the bull of the sacrifice of the peace offering; and the priest shall burn them on the altar of the burnt offering. '
  '11':
  - type: note
    content: Ex. 29:14; Lev. 9:11; Num. 19:5
  - type: text
    content: 'But the bull’s hide and all its flesh, with its head and legs, its entrails and offal— '
  '12':
  - type: text
    content: 'the whole bull he shall carry outside the camp to a clean place, '
  - type: note
    content: Lev. 4:21; 6:10, 11; 16:27
  - type: text
    content: 'where the ashes are poured out, and '
  - type: note
    content: (Heb. 13:11, 12)
  - type: text
    content: burn it on wood with fire; where the ashes are poured out it shall be burned.
  '13':
  - type: text
    content: '‘Now '
  - type: note
    content: Num. 15:24–26; Josh. 7:11
  - type: text
    content: 'if the whole congregation of Israel sins unintentionally, '
  - type: note
    content: Lev. 5:2–4, 17
  - type: text
    content: 'and the thing is hidden from the eyes of the assembly, and they have done something against any of the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ' in anything which should not be done, and are guilty; '
  '14':
  - type: text
    content: 'when the sin which they have committed becomes known, then the assembly shall offer a young bull for the sin, and bring it before the tabernacle of meeting. '
  '15':
  - type: text
    content: 'And the elders of the congregation '
  - type: note
    content: Lev. 1:3, 4
  - type: text
    content: 'shall lay their hands on the head of the bull before the '
  - type: heading
    content: Lord
  - type: text
    content: '. Then the bull shall be killed before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: note
    content: Lev. 4:5; (Heb. 9:12–14)
  - type: text
    content: 'The anointed priest shall bring some of the bull’s blood to the tabernacle of meeting. '
  '17':
  - type: text
    content: 'Then the priest shall dip his finger in the blood and sprinkle it seven times before the '
  - type: heading
    content: Lord
  - type: text
    content: ', in front of the veil. '
  '18':
  - type: text
    content: 'And he shall put some of the blood on the horns of the altar which is before the '
  - type: heading
    content: Lord
  - type: text
    content: ', which is in the tabernacle of meeting; and he shall pour the remaining blood at the base of the altar of burnt offering, which is at the door of the tabernacle of meeting. '
  '19':
  - type: text
    content: 'He shall take all the fat from it and burn it on the altar. '
  '2':
  - type: text
    content: '“Speak to the children of Israel, saying: '
  - type: note
    content: Lev. 5:15–18; Num. 15:22–30; 1 Sam. 14:27; Acts 3:17
  - type: text
    content: '‘If a person sins unintentionally against any of the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ' in anything which ought not to be done, and does any of them, '
  '20':
  - type: text
    content: 'And he shall do '
  - type: note
    content: Lev. 4:3
  - type: text
    content: 'with the bull as he did with the bull as a sin offering; thus he shall do with it. '
  - type: note
    content: Lev. 1:4; Num. 15:25
  - type: text
    content: 'So the priest shall make atonement for them, and it shall be forgiven them. '
  '21':
  - type: text
    content: Then he shall carry the bull outside the camp, and burn it as he burned the first bull. It is a sin offering for the assembly.
  '22':
  - type: text
    content: '‘When a ruler has sinned, and '
  - type: note
    content: Lev. 4:2, 13, 27
  - type: text
    content: 'done something unintentionally against any of the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ' his God in anything which should not be done, and is guilty, '
  '23':
  - type: text
    content: 'or '
  - type: note
    content: Lev. 4:14; 5:4
  - type: text
    content: 'if his sin which he has committed comes to his knowledge, he shall bring as his offering a kid of the goats, a male without blemish. '
  '24':
  - type: text
    content: 'And '
  - type: note
    content: Lev. 4:4; (Is. 53:6)
  - type: text
    content: 'he shall lay his hand on the head of the goat, and kill it at the place where they kill the burnt offering before the '
  - type: heading
    content: Lord
  - type: text
    content: '. It is a sin offering. '
  '25':
  - type: note
    content: Lev. 4:7, 18, 30, 34
  - type: text
    content: 'The priest shall take some of the blood of the sin offering with his finger, put it on the horns of the altar of burnt offering, and pour its blood at the base of the altar of burnt offering. '
  '26':
  - type: text
    content: 'And he shall burn all its fat on the altar, like '
  - type: note
    content: Lev. 3:3–5
  - type: text
    content: 'the fat of the sacrifice of the peace offering. '
  - type: note
    content: Lev. 4:20; Num. 15:28
  - type: text
    content: So the priest shall make atonement for him concerning his sin, and it shall be forgiven him.
  '27':
  - type: note
    content: Lev. 4:2; Num. 15:27
  - type: text
    content: '‘If anyone of the common people sins unintentionally by doing something against any of the commandments of the '
  - type: heading
    content: Lord
  - type: text
    content: ' in anything which ought not to be done, and is guilty, '
  '28':
  - type: text
    content: 'or '
  - type: note
    content: Lev. 4:23
  - type: text
    content: 'if his sin which he has committed comes to his knowledge, then he shall bring as his offering a kid of the goats, a female without blemish, for his sin which he has committed. '
  '29':
  - type: note
    content: Lev. 1:4; 4:4, 24
  - type: text
    content: 'And he shall lay his hand on the head of the sin offering, and kill the sin offering at the place of the burnt offering. '
  '3':
  - type: note
    content: Ex. 40:15; Lev. 8:12
  - type: text
    content: 'if the anointed priest sins, bringing guilt on the people, then let him offer to the '
  - type: heading
    content: Lord
  - type: text
    content: ' for his sin which he has sinned '
  - type: note
    content: Lev. 3:1; 9:2
  - type: text
    content: 'a young bull without blemish as a '
  - type: note
    content: Lev. 9:7
  - type: text
    content: 'sin offering. '
  '30':
  - type: text
    content: 'Then the priest shall take some of its blood with his finger, put it on the horns of the altar of burnt offering, and pour all the remaining blood at the base of the altar. '
  '31':
  - type: note
    content: Lev. 3:14
  - type: text
    content: 'He shall remove all its fat, '
  - type: note
    content: Lev. 3:3, 4
  - type: text
    content: 'as fat is removed from the sacrifice of the peace offering; and the priest shall burn it on the altar for a '
  - type: note
    content: Gen. 8:21; Ex. 29:18; Lev. 1:9, 13; 2:2, 9, 12
  - type: text
    content: 'sweet aroma to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Lev. 4:26
  - type: text
    content: So the priest shall make atonement for him, and it shall be forgiven him.
  '32':
  - type: text
    content: '‘If he brings a lamb as his sin offering, '
  - type: note
    content: Lev. 4:28
  - type: text
    content: 'he shall bring a female without blemish. '
  '33':
  - type: text
    content: 'Then he shall '
  - type: note
    content: Lev. 1:4; Num. 8:12
  - type: text
    content: 'lay his hand on the head of the sin offering, and kill it as a sin offering at the place where they kill the burnt offering. '
  '34':
  - type: text
    content: 'The priest shall take some of the blood of the sin offering with his finger, put it on the horns of the altar of burnt offering, and pour all the remaining blood at the base of the altar. '
  '35':
  - type: text
    content: 'He shall remove all its fat, as the fat of the lamb is removed from the sacrifice of the peace offering. Then the priest shall burn it on the altar, '
  - type: note
    content: Lev. 3:5
  - type: text
    content: 'according to the offerings made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Lev. 4:26, 31
  - type: text
    content: So the priest shall make atonement for his sin that he has committed, and it shall be forgiven him.
  '4':
  - type: text
    content: 'He shall bring the bull '
  - type: note
    content: Lev. 1:3, 4; 4:15; Num. 8:12
  - type: text
    content: 'to the door of the tabernacle of meeting before the '
  - type: heading
    content: Lord
  - type: text
    content: ', lay his hand on the bull’s head, and kill the bull before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Then the anointed priest shall '
  - type: note
    content: Lev. 16:14; Num. 19:4
  - type: text
    content: 'take some of the bull’s blood and bring it to the tabernacle of meeting. '
  '6':
  - type: text
    content: 'The priest shall dip his finger in the blood and sprinkle some of the blood seven times before the '
  - type: heading
    content: Lord
  - type: text
    content: ', in front of the '
  - type: note
    content: Ex. 40:21, 26
  - type: text
    content: 'veil of the sanctuary. '
  '7':
  - type: text
    content: 'And the priest shall '
  - type: note
    content: Lev. 4:18, 25, 30, 34; 8:15; 9:9; 16:18
  - type: text
    content: 'put some of the blood on the horns of the altar of sweet incense before the '
  - type: heading
    content: Lord
  - type: text
    content: ', which is in the tabernacle of meeting; and he shall pour '
  - type: note
    content: Ex. 40:5, 6; Lev. 5:9
  - type: text
    content: 'the remaining blood of the bull at the base of the altar of the burnt offering, which is at the door of the tabernacle of meeting. '
  '8':
  - type: text
    content: 'He shall take from it all the fat of the bull as the sin offering. The fat that covers the entrails and all the fat which is on the entrails, '
  '9':
  - type: text
    content: 'the two kidneys and the fat that is on them by the flanks, and the fatty lobe attached to the liver above the kidneys, he shall remove, '
