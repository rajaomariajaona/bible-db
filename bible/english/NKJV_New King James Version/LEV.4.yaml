document_id: LEV.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sin Offering
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:3–5
      marker-yv: yv-n
    - type: text
      text: 'as it was taken from the bull of the sacrifice of the peace offering; and the priest shall burn them on the altar of the burnt offering. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:14; Lev. 9:11; Num. 19:5
      marker-yv: yv-n
    - type: text
      text: 'But the bull’s hide and all its flesh, with its head and legs, its entrails and offal— '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'the whole bull he shall carry outside the camp to a clean place, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:21; 6:10, 11; 16:27
      marker-yv: yv-n
    - type: text
      text: 'where the ashes are poured out, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 13:11, 12)
      marker-yv: yv-n
    - type: text
      text: burn it on wood with fire; where the ashes are poured out it shall be burned.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '‘Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 15:24–26; Josh. 7:11
      marker-yv: yv-n
    - type: text
      text: 'if the whole congregation of Israel sins unintentionally, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:2–4, 17
      marker-yv: yv-n
    - type: text
      text: 'and the thing is hidden from the eyes of the assembly, and they have done something against any of the commandments of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in anything which should not be done, and are guilty; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'when the sin which they have committed becomes known, then the assembly shall offer a young bull for the sin, and bring it before the tabernacle of meeting. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the elders of the congregation '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:3, 4
      marker-yv: yv-n
    - type: text
      text: 'shall lay their hands on the head of the bull before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. Then the bull shall be killed before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:5; (Heb. 9:12–14)
      marker-yv: yv-n
    - type: text
      text: 'The anointed priest shall bring some of the bull’s blood to the tabernacle of meeting. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then the priest shall dip his finger in the blood and sprinkle it seven times before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in front of the veil. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And he shall put some of the blood on the horns of the altar which is before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which is in the tabernacle of meeting; and he shall pour the remaining blood at the base of the altar of burnt offering, which is at the door of the tabernacle of meeting. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'He shall take all the fat from it and burn it on the altar. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Speak to the children of Israel, saying: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:15–18; Num. 15:22–30; 1 Sam. 14:27; Acts 3:17
      marker-yv: yv-n
    - type: text
      text: '‘If a person sins unintentionally against any of the commandments of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in anything which ought not to be done, and does any of them, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And he shall do '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:3
      marker-yv: yv-n
    - type: text
      text: 'with the bull as he did with the bull as a sin offering; thus he shall do with it. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:4; Num. 15:25
      marker-yv: yv-n
    - type: text
      text: 'So the priest shall make atonement for them, and it shall be forgiven them. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then he shall carry the bull outside the camp, and burn it as he burned the first bull. It is a sin offering for the assembly.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '‘When a ruler has sinned, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:2, 13, 27
      marker-yv: yv-n
    - type: text
      text: 'done something unintentionally against any of the commandments of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God in anything which should not be done, and is guilty, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:14; 5:4
      marker-yv: yv-n
    - type: text
      text: 'if his sin which he has committed comes to his knowledge, he shall bring as his offering a kid of the goats, a male without blemish. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:4; (Is. 53:6)
      marker-yv: yv-n
    - type: text
      text: 'he shall lay his hand on the head of the goat, and kill it at the place where they kill the burnt offering before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. It is a sin offering. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:7, 18, 30, 34
      marker-yv: yv-n
    - type: text
      text: 'The priest shall take some of the blood of the sin offering with his finger, put it on the horns of the altar of burnt offering, and pour its blood at the base of the altar of burnt offering. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And he shall burn all its fat on the altar, like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:3–5
      marker-yv: yv-n
    - type: text
      text: 'the fat of the sacrifice of the peace offering. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:20; Num. 15:28
      marker-yv: yv-n
    - type: text
      text: So the priest shall make atonement for him concerning his sin, and it shall be forgiven him.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:2; Num. 15:27
      marker-yv: yv-n
    - type: text
      text: '‘If anyone of the common people sins unintentionally by doing something against any of the commandments of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in anything which ought not to be done, and is guilty, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'or '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:23
      marker-yv: yv-n
    - type: text
      text: 'if his sin which he has committed comes to his knowledge, then he shall bring as his offering a kid of the goats, a female without blemish, for his sin which he has committed. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:4; 4:4, 24
      marker-yv: yv-n
    - type: text
      text: 'And he shall lay his hand on the head of the sin offering, and kill the sin offering at the place of the burnt offering. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:15; Lev. 8:12
      marker-yv: yv-n
    - type: text
      text: 'if the anointed priest sins, bringing guilt on the people, then let him offer to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for his sin which he has sinned '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:1; 9:2
      marker-yv: yv-n
    - type: text
      text: 'a young bull without blemish as a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 9:7
      marker-yv: yv-n
    - type: text
      text: 'sin offering. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Then the priest shall take some of its blood with his finger, put it on the horns of the altar of burnt offering, and pour all the remaining blood at the base of the altar. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:14
      marker-yv: yv-n
    - type: text
      text: 'He shall remove all its fat, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:3, 4
      marker-yv: yv-n
    - type: text
      text: 'as fat is removed from the sacrifice of the peace offering; and the priest shall burn it on the altar for a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 8:21; Ex. 29:18; Lev. 1:9, 13; 2:2, 9, 12
      marker-yv: yv-n
    - type: text
      text: 'sweet aroma to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:26
      marker-yv: yv-n
    - type: text
      text: So the priest shall make atonement for him, and it shall be forgiven him.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '‘If he brings a lamb as his sin offering, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:28
      marker-yv: yv-n
    - type: text
      text: 'he shall bring a female without blemish. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Then he shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:4; Num. 8:12
      marker-yv: yv-n
    - type: text
      text: 'lay his hand on the head of the sin offering, and kill it as a sin offering at the place where they kill the burnt offering. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'The priest shall take some of the blood of the sin offering with his finger, put it on the horns of the altar of burnt offering, and pour all the remaining blood at the base of the altar. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'He shall remove all its fat, as the fat of the lamb is removed from the sacrifice of the peace offering. Then the priest shall burn it on the altar, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:5
      marker-yv: yv-n
    - type: text
      text: 'according to the offerings made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:26, 31
      marker-yv: yv-n
    - type: text
      text: So the priest shall make atonement for his sin that he has committed, and it shall be forgiven him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He shall bring the bull '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:3, 4; 4:15; Num. 8:12
      marker-yv: yv-n
    - type: text
      text: 'to the door of the tabernacle of meeting before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', lay his hand on the bull’s head, and kill the bull before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then the anointed priest shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 16:14; Num. 19:4
      marker-yv: yv-n
    - type: text
      text: 'take some of the bull’s blood and bring it to the tabernacle of meeting. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The priest shall dip his finger in the blood and sprinkle some of the blood seven times before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in front of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:21, 26
      marker-yv: yv-n
    - type: text
      text: 'veil of the sanctuary. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And the priest shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:18, 25, 30, 34; 8:15; 9:9; 16:18
      marker-yv: yv-n
    - type: text
      text: 'put some of the blood on the horns of the altar of sweet incense before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which is in the tabernacle of meeting; and he shall pour '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:5, 6; Lev. 5:9
      marker-yv: yv-n
    - type: text
      text: 'the remaining blood of the bull at the base of the altar of the burnt offering, which is at the door of the tabernacle of meeting. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'He shall take from it all the fat of the bull as the sin offering. The fat that covers the entrails and all the fat which is on the entrails, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'the two kidneys and the fat that is on them by the flanks, and the fatty lobe attached to the liver above the kidneys, he shall remove, '
