  '13':
  - type: text
    content: 'So he brought up the bones of Saul and the bones of Jonathan his son from there; and they gathered the bones of those who had been hanged. '
  '14':
  - type: text
    content: 'They buried the bones of Saul and Jonathan his son in the country of Benjamin in '
  - type: note
    content: 1 Sam. 31:8
  - type: text
    content: 'Zelah, in the tomb of Kish his father. So they performed all that the king commanded. And after that '
  - type: note
    content: Josh. 18:28
  - type: text
    content: God heeded the prayer for the land.
  - type: heading
