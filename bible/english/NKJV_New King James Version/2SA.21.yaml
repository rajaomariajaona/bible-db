document_id: 2SA.21,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Avenges the Gibeonites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now there was a famine in the days of David for three years, year after year; and David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:18
      marker-yv: yv-n
    - type: text
      text: 'inquired of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered, “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' because of Saul and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' bloodthirsty house, because he killed the Gibeonites.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 6:17
      marker-yv: yv-n
    - type: text
      text: 'Rizpah the daughter of Aiah took sackcloth and spread it for herself on the rock, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:7; 21:8
      marker-yv: yv-n
    - type: text
      text: from the beginning of harvest until the late rains poured on them from heaven. And she did not allow the birds of the air to rest on them by day nor the beasts of the field by night.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And David was told what Rizpah the daughter of Aiah, the concubine of Saul, had done. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then David went and took the bones of Saul, and the bones of Jonathan his son, from the men of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 21:23
      marker-yv: yv-n
    - type: text
      text: 'Jabesh Gilead who had stolen them from the street of Beth Shan, where the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 31:11–13
      marker-yv: yv-n
    - type: text
      text: 'Philistines had hung them up, after the Philistines had struck down Saul in Gilboa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So he brought up the bones of Saul and the bones of Jonathan his son from there; and they gathered the bones of those who had been hanged. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'They buried the bones of Saul and Jonathan his son in the country of Benjamin in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 31:8
      marker-yv: yv-n
    - type: text
      text: 'Zelah, in the tomb of Kish his father. So they performed all that the king commanded. And after that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 18:28
      marker-yv: yv-n
    - type: text
      text: God heeded the prayer for the land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Philistine Giants Destroyed
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When the Philistines were at war again with Israel, David and his servants with him went down and fought against the Philistines; and David grew faint. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then Ishbi-Benob, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' one of the sons of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 7:26; 2 Sam. 24:25
      marker-yv: yv-n
    - type: text
      text: 'giant, the weight of whose bronze spear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' three hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekels,
    - type: text
      text: ' who was bearing a new '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sword,
    - type: text
      text: ' thought he could kill David. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:22, 28; Josh. 15:14; 2 Sam. 21:18–22
      marker-yv: yv-n
    - type: text
      text: 'Abishai the son of Zeruiah came to his aid, and struck the Philistine and killed him. Then the men of David swore to him, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 20:6–10
      marker-yv: yv-n
    - type: text
      text: '“You shall go out no more with us to battle, lest you quench the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 18:3
      marker-yv: yv-n
    - type: text
      text: lamp of Israel.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 22:29; 1 Kin. 11:36
      marker-yv: yv-n
    - type: text
      text: 'Now it happened afterward that there was again a battle with the Philistines at Gob. Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 20:4–8
      marker-yv: yv-n
    - type: text
      text: 'Sibbechai the Hushathite killed Saph, who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' one of the sons of the giant. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Again there was war at Gob with the Philistines, where '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:29; 27:11
      marker-yv: yv-n
    - type: text
      text: 'Elhanan the son of Jaare-Oregim the Bethlehemite killed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 23:24
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: brother
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' Goliath the Gittite, the shaft of whose spear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' like a weaver’s beam.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So the king called the Gibeonites and spoke to them. Now the Gibeonites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' not of the children of Israel, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:21; 2 Sam. 5:19
      marker-yv: yv-n
    - type: text
      text: 'of the remnant of the Amorites; the children of Israel had sworn protection to them, but Saul had sought to kill them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 9:3, 15–20
      marker-yv: yv-n
    - type: text
      text: in his zeal for the children of Israel and Judah.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Yet again '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 17:4; 1 Chr. 20:5
      marker-yv: yv-n
    - type: text
      text: 'there was war at Gath, where there was a man of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: great
    - type: text
      text: ' stature, who had six fingers on each hand and six toes on each foot, twenty-four in number; and he also was born to the giant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So when he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 20:6
      marker-yv: yv-n
    - type: text
      text: defied Israel, Jonathan the son of Shimea, David’s brother, killed him.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 17:10
      marker-yv: yv-n
    - type: text
      text: These four were born to the giant in Gath, and fell by the hand of David and by the hand of his servants.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Therefore David said to the Gibeonites, “What shall I do for you? And with what shall I make atonement, that you may bless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 34:11–16)
      marker-yv: yv-n
    - type: text
      text: 'the inheritance of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And the Gibeonites said to him, “We will have no silver or gold from Saul or from his house, nor shall you kill any man in Israel for us.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he said, “Whatever you say, I will do for you.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then they answered the king, “As for the man who consumed us and plotted against us, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' we should be destroyed from remaining in any of the territories of Israel, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'let seven men of his descendants be delivered '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 26:19; 2 Sam. 20:19
      marker-yv: yv-n
    - type: text
      text: 'to us, and we will hang them before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 25:4
      marker-yv: yv-n
    - type: text
      text: 'in Gibeah of Saul, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:26
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: whom
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' chose.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the king said, “I will give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
    - type: text
      text: ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But the king spared '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:24; (Hos. 13:11)
      marker-yv: yv-n
    - type: text
      text: 'Mephibosheth the son of Jonathan, the son of Saul, because of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 4:4; 9:10
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s oath that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' between them, between David and Jonathan the son of Saul. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So the king took Armoni and Mephibosheth, the two sons of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 18:3; 20:12–17; 23:18; 2 Sam. 9:1–7
      marker-yv: yv-n
    - type: text
      text: 'Rizpah the daughter of Aiah, whom she bore to Saul, and the five sons of Michal the daughter of Saul, whom she brought up for Adriel the son of Barzillai the Meholathite; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and he delivered them into the hands of the Gibeonites, and they hanged them on the hill '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:7
      marker-yv: yv-n
    - type: text
      text: 'before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. So they fell, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' seven together, and were put to death in the days of harvest, in the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: days,
    - type: text
      text: ' in the beginning of barley harvest.'
