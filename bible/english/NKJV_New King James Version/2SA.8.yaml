document_id: 2SA.8,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Further Conquests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: After this it came to pass that David attacked the Philistines and subdued them. And David took Metheg Ammah from the hand of the Philistines.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'then Toi sent Joram his son to King David, to greet him and bless him, because he had fought against Hadadezer and defeated him (for Hadadezer had been at war with Toi); and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joram
    - type: text
      text: ' brought with him articles of silver, articles of gold, and articles of bronze. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'King David also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:65; 2 Kin. 14:28; 2 Chr. 8:4
      marker-yv: yv-n
    - type: text
      text: 'dedicated these to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', along with the silver and gold that he had dedicated from all the nations which he had subdued— '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'from Syria, from Moab, from the people of Ammon, from the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:51
      marker-yv: yv-n
    - type: text
      text: Philistines, from Amalek, and from the spoil of Hadadezer the son of Rehob, king of Zobah.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And David made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: himself
    - type: text
      text: ' a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:17–25
      marker-yv: yv-n
    - type: text
      text: 'name when he returned from killing '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:9
      marker-yv: yv-n
    - type: text
      text: 'eighteen thousand Syrians in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 14:7
      marker-yv: yv-n
    - type: text
      text: 'the Valley of Salt. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He also put garrisons in Edom; throughout all Edom he put garrisons, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 18:12; Ps. 60:title
      marker-yv: yv-n
    - type: text
      text: 'all the Edomites became David’s servants. And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' preserved David wherever he went.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Administration
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So David reigned over all Israel; and David administered judgment and justice to all his people. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 27:29, 37–40; Num. 24:18; 1 Kin. 11:15
      marker-yv: yv-n
    - type: text
      text: 'Joab the son of Zeruiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' over the army; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 19:13; 20:23; 1 Chr. 11:6
      marker-yv: yv-n
    - type: text
      text: 'Jehoshaphat the son of Ahilud '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' recorder; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 4:3
      marker-yv: yv-n
    - type: text
      text: 'Zadok the son of Ahitub and Ahimelech the son of Abiathar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the priests; Seraiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the scribe; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:4–8; 24:3
      marker-yv: yv-n
    - type: text
      text: 'Benaiah the son of Jehoiada '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over
    - type: text
      text: ' both the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 1:8; 1 Chr. 18:17
      marker-yv: yv-n
    - type: text
      text: Cherethites and the Pelethites; and David’s sons were chief ministers.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 22:51
      marker-yv: yv-n
    - type: text
      text: 'he defeated Moab. Forcing them down to the ground, he measured them off with a line. With two lines he measured off those to be put to death, and with one full line those to be kept alive. So the Moabites became David’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 24:17
      marker-yv: yv-n
    - type: text
      text: 'servants, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:31
      marker-yv: yv-n
    - type: text
      text: brought tribute.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'David also defeated Hadadezer the son of Rehob, king of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 10:27; 1 Kin. 4:21
      marker-yv: yv-n
    - type: text
      text: 'Zobah, as he went to recover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:47; 2 Sam. 10:16, 19
      marker-yv: yv-n
    - type: text
      text: 'his territory at the River Euphrates. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'David took from him one thousand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chariots,
    - type: text
      text: ' seven hundred horsemen, and twenty thousand foot soldiers. Also David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:18; 2 Sam. 10:15–19
      marker-yv: yv-n
    - type: text
      text: 'hamstrung all the chariot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: horses
    - type: text
      text: ', except that he spared '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enough
    - type: text
      text: ' of them for one hundred chariots.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:6, 9
      marker-yv: yv-n
    - type: text
      text: 'When the Syrians of Damascus came to help Hadadezer king of Zobah, David killed twenty-two thousand of the Syrians. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then David put garrisons in Syria of Damascus; and the Syrians became David’s servants, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' brought tribute. So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:23–25
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' preserved David wherever he went. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And David took '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:9; 8:14
      marker-yv: yv-n
    - type: text
      text: 'the shields of gold that had belonged to the servants of Hadadezer, and brought them to Jerusalem. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Also from Betah and from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 10:16
      marker-yv: yv-n
    - type: text
      text: Berothai, cities of Hadadezer, King David took a large amount of bronze.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'When Toi king of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 47:16
      marker-yv: yv-n
    - type: text
      text: 'Hamath heard that David had defeated all the army of Hadadezer, '
