document_id: 2SA.8,114
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Further Conquests
  - type: text
    content: After this it came to pass that David attacked the Philistines and subdued them. And David took Metheg Ammah from the hand of the Philistines.
  '10':
  - type: text
    content: 'then Toi sent Joram his son to King David, to greet him and bless him, because he had fought against Hadadezer and defeated him (for Hadadezer had been at war with Toi); and '
  - type: text
    content: Joram
  - type: text
    content: ' brought with him articles of silver, articles of gold, and articles of bronze. '
  '11':
  - type: text
    content: 'King David also '
  - type: note
    content: 1 Kin. 8:65; 2 Kin. 14:28; 2 Chr. 8:4
  - type: text
    content: 'dedicated these to the '
  - type: heading
    content: Lord
  - type: text
    content: ', along with the silver and gold that he had dedicated from all the nations which he had subdued— '
  '12':
  - type: text
    content: 'from Syria, from Moab, from the people of Ammon, from the '
  - type: note
    content: 1 Kin. 7:51
  - type: text
    content: Philistines, from Amalek, and from the spoil of Hadadezer the son of Rehob, king of Zobah.
  '13':
  - type: text
    content: 'And David made '
  - type: text
    content: himself
  - type: text
    content: ' a '
  - type: note
    content: 2 Sam. 5:17–25
  - type: text
    content: 'name when he returned from killing '
  - type: note
    content: 2 Sam. 7:9
  - type: text
    content: 'eighteen thousand Syrians in '
  - type: note
    content: 2 Kin. 14:7
  - type: text
    content: 'the Valley of Salt. '
  '14':
  - type: text
    content: 'He also put garrisons in Edom; throughout all Edom he put garrisons, and '
  - type: note
    content: 1 Chr. 18:12; Ps. 60:title
  - type: text
    content: 'all the Edomites became David’s servants. And the '
  - type: heading
    content: Lord
  - type: text
    content: ' preserved David wherever he went.'
  - type: heading
    content: David’s Administration
  '15':
  - type: text
    content: 'So David reigned over all Israel; and David administered judgment and justice to all his people. '
  '16':
  - type: note
    content: Gen. 27:29, 37–40; Num. 24:18; 1 Kin. 11:15
  - type: text
    content: 'Joab the son of Zeruiah '
  - type: text
    content: was
  - type: text
    content: ' over the army; '
  - type: note
    content: 2 Sam. 19:13; 20:23; 1 Chr. 11:6
  - type: text
    content: 'Jehoshaphat the son of Ahilud '
  - type: text
    content: was
  - type: text
    content: ' recorder; '
  '17':
  - type: note
    content: 1 Kin. 4:3
  - type: text
    content: 'Zadok the son of Ahitub and Ahimelech the son of Abiathar '
  - type: text
    content: were
  - type: text
    content: ' the priests; Seraiah '
  - type: text
    content: was
  - type: text
    content: ' the scribe; '
  '18':
  - type: note
    content: 1 Chr. 6:4–8; 24:3
  - type: text
    content: 'Benaiah the son of Jehoiada '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: over
  - type: text
    content: ' both the '
  - type: note
    content: 1 Kin. 1:8; 1 Chr. 18:17
  - type: text
    content: Cherethites and the Pelethites; and David’s sons were chief ministers.
  '2':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Sam. 22:51
  - type: text
    content: 'he defeated Moab. Forcing them down to the ground, he measured them off with a line. With two lines he measured off those to be put to death, and with one full line those to be kept alive. So the Moabites became David’s '
  - type: note
    content: Num. 24:17
  - type: text
    content: 'servants, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 12:31
  - type: text
    content: brought tribute.
  '3':
  - type: text
    content: 'David also defeated Hadadezer the son of Rehob, king of '
  - type: note
    content: 1 Sam. 10:27; 1 Kin. 4:21
  - type: text
    content: 'Zobah, as he went to recover '
  - type: note
    content: 1 Sam. 14:47; 2 Sam. 10:16, 19
  - type: text
    content: 'his territory at the River Euphrates. '
  '4':
  - type: text
    content: 'David took from him one thousand '
  - type: text
    content: chariots,
  - type: text
    content: ' seven hundred horsemen, and twenty thousand foot soldiers. Also David '
  - type: note
    content: Gen. 15:18; 2 Sam. 10:15–19
  - type: text
    content: 'hamstrung all the chariot '
  - type: text
    content: horses
  - type: text
    content: ', except that he spared '
  - type: text
    content: enough
  - type: text
    content: ' of them for one hundred chariots.'
  '5':
  - type: note
    content: Josh. 11:6, 9
  - type: text
    content: 'When the Syrians of Damascus came to help Hadadezer king of Zobah, David killed twenty-two thousand of the Syrians. '
  '6':
  - type: text
    content: 'Then David put garrisons in Syria of Damascus; and the Syrians became David’s servants, '
  - type: text
    content: and
  - type: text
    content: ' brought tribute. So '
  - type: note
    content: 1 Kin. 11:23–25
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' preserved David wherever he went. '
  '7':
  - type: text
    content: 'And David took '
  - type: note
    content: 2 Sam. 7:9; 8:14
  - type: text
    content: 'the shields of gold that had belonged to the servants of Hadadezer, and brought them to Jerusalem. '
  '8':
  - type: text
    content: 'Also from Betah and from '
  - type: note
    content: 1 Kin. 10:16
  - type: text
    content: Berothai, cities of Hadadezer, King David took a large amount of bronze.
  '9':
  - type: text
    content: 'When Toi king of '
  - type: note
    content: Ezek. 47:16
  - type: text
    content: 'Hamath heard that David had defeated all the army of Hadadezer, '
