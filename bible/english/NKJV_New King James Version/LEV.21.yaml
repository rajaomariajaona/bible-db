document_id: LEV.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Regulations for Conduct of Priests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, “Speak to the priests, the sons of Aaron, and say to them: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:28; Ezek. 44:25
    marker-yv: yv-n
  - type: text
    text: '‘None shall defile himself for the dead among his people, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'except for his relatives who are nearest to him: his mother, his father, his son, his daughter, and his brother; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'also his virgin sister who is near to him, who has had no husband, for her he may defile himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Otherwise he shall not defile himself, being a chief man among his people, to profane himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:27; Deut. 14:1; Ezek. 44:20
    marker-yv: yv-n
  - type: text
    text: '‘They shall not make any bald place on their heads, nor shall they shave the edges of their beards nor make any cuttings in their flesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'They shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:31
    marker-yv: yv-n
  - type: text
    text: 'holy to their God and not profane the name of their God, for they offer the offerings of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' made by fire, and the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 3:11
    marker-yv: yv-n
  - type: text
    text: 'bread of their God; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 52:11
    marker-yv: yv-n
  - type: text
    text: 'therefore they shall be holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 44:22
    marker-yv: yv-n
  - type: text
    text: 'They shall not take a wife who is a harlot or a defiled woman, nor shall they take a woman '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 24:1, 2
    marker-yv: yv-n
  - type: text
    text: 'divorced from her husband; for the priest is holy to his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore you shall consecrate him, for he offers the bread of your God. He shall be holy to you, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 11:44, 45
    marker-yv: yv-n
  - type: text
    text: 'I the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 8:12, 30
    marker-yv: yv-n
  - type: text
    text: 'sanctify you, am holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The daughter of any priest, if she profanes herself by playing the harlot, she profanes her father. She shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 22:21
    marker-yv: yv-n
  - type: text
    text: burned with fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '‘He who is the high priest among his brethren, on whose head the anointing oil was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 8:12
    marker-yv: yv-n
  - type: text
    text: 'poured and who is consecrated to wear the garments, shall not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 10:6, 7
    marker-yv: yv-n
  - type: text
    text: 'uncover his head nor tear his clothes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'nor shall he go '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 19:14
    marker-yv: yv-n
  - type: text
    text: 'near any dead body, nor defile himself for his father or his mother; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 10:7
    marker-yv: yv-n
  - type: text
    text: 'nor shall he go out of the sanctuary, nor profane the sanctuary of his God; for the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:6, 7
    marker-yv: yv-n
  - type: text
    text: 'consecration of the anointing oil of his God is upon him: I am the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he shall take a wife in her virginity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'A widow or a divorced woman or a defiled woman or a harlot—these he shall not marry; but he shall take a virgin of his own people as wife. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nor shall he profane his posterity among his people, for I the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sanctify him.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Speak to Aaron, saying: ‘No man of your descendants in succeeding generations, who has any defect, may approach to offer the bread of his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For any man who has a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 22:19–25
    marker-yv: yv-n
  - type: text
    text: 'defect shall not approach: a man blind or lame, who has a marred face or any limb '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 22:23
    marker-yv: yv-n
  - type: text
    text: 'too long, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'a man who has a broken foot or broken hand, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'or is a hunchback or a dwarf, or a man who has a defect in his eye, or eczema or scab, or is a eunuch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'No man of the descendants of Aaron the priest, who has a defect, shall come near to offer the offerings made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He has a defect; he shall not come near to offer the bread of his God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'He may eat the bread of his God, both the most holy and the holy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'only he shall not go near the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 16:2
    marker-yv: yv-n
  - type: text
    text: 'veil or approach the altar, because he has a defect, lest '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 21:12
    marker-yv: yv-n
  - type: text
    text: 'he profane My sanctuaries; for I the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sanctify them.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And Moses told it to Aaron and his sons, and to all the children of Israel.
