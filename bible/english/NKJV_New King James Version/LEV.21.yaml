document_id: LEV.21,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Regulations for Conduct of Priests
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, “Speak to the priests, the sons of Aaron, and say to them: '
  - type: note
    content: Lev. 19:28; Ezek. 44:25
  - type: text
    content: '‘None shall defile himself for the dead among his people, '
  '10':
  - type: text
    content: '‘He who is the high priest among his brethren, on whose head the anointing oil was '
  - type: note
    content: Lev. 8:12
  - type: text
    content: 'poured and who is consecrated to wear the garments, shall not '
  - type: note
    content: Lev. 10:6, 7
  - type: text
    content: 'uncover his head nor tear his clothes; '
  '11':
  - type: text
    content: 'nor shall he go '
  - type: note
    content: Num. 19:14
  - type: text
    content: 'near any dead body, nor defile himself for his father or his mother; '
  '12':
  - type: note
    content: Lev. 10:7
  - type: text
    content: 'nor shall he go out of the sanctuary, nor profane the sanctuary of his God; for the '
  - type: note
    content: Ex. 29:6, 7
  - type: text
    content: 'consecration of the anointing oil of his God is upon him: I am the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'And he shall take a wife in her virginity. '
  '14':
  - type: text
    content: 'A widow or a divorced woman or a defiled woman or a harlot—these he shall not marry; but he shall take a virgin of his own people as wife. '
  '15':
  - type: text
    content: 'Nor shall he profane his posterity among his people, for I the '
  - type: heading
    content: Lord
  - type: text
    content: ' sanctify him.’ ”'
  '16':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '17':
  - type: text
    content: '“Speak to Aaron, saying: ‘No man of your descendants in succeeding generations, who has any defect, may approach to offer the bread of his God. '
  '18':
  - type: text
    content: 'For any man who has a '
  - type: note
    content: Lev. 22:19–25
  - type: text
    content: 'defect shall not approach: a man blind or lame, who has a marred face or any limb '
  - type: note
    content: Lev. 22:23
  - type: text
    content: 'too long, '
  '19':
  - type: text
    content: 'a man who has a broken foot or broken hand, '
  '2':
  - type: text
    content: 'except for his relatives who are nearest to him: his mother, his father, his son, his daughter, and his brother; '
  '20':
  - type: text
    content: 'or is a hunchback or a dwarf, or a man who has a defect in his eye, or eczema or scab, or is a eunuch. '
  '21':
  - type: text
    content: 'No man of the descendants of Aaron the priest, who has a defect, shall come near to offer the offerings made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. He has a defect; he shall not come near to offer the bread of his God. '
  '22':
  - type: text
    content: 'He may eat the bread of his God, both the most holy and the holy; '
  '23':
  - type: text
    content: 'only he shall not go near the '
  - type: note
    content: Lev. 16:2
  - type: text
    content: 'veil or approach the altar, because he has a defect, lest '
  - type: note
    content: Lev. 21:12
  - type: text
    content: 'he profane My sanctuaries; for I the '
  - type: heading
    content: Lord
  - type: text
    content: ' sanctify them.’ ”'
  '24':
  - type: text
    content: And Moses told it to Aaron and his sons, and to all the children of Israel.
  '3':
  - type: text
    content: 'also his virgin sister who is near to him, who has had no husband, for her he may defile himself. '
  '4':
  - type: text
    content: Otherwise he shall not defile himself, being a chief man among his people, to profane himself.
  '5':
  - type: note
    content: Lev. 19:27; Deut. 14:1; Ezek. 44:20
  - type: text
    content: '‘They shall not make any bald place on their heads, nor shall they shave the edges of their beards nor make any cuttings in their flesh. '
  '6':
  - type: text
    content: 'They shall be '
  - type: note
    content: Ex. 22:31
  - type: text
    content: 'holy to their God and not profane the name of their God, for they offer the offerings of the '
  - type: heading
    content: Lord
  - type: text
    content: ' made by fire, and the '
  - type: note
    content: Lev. 3:11
  - type: text
    content: 'bread of their God; '
  - type: note
    content: Is. 52:11
  - type: text
    content: 'therefore they shall be holy. '
  '7':
  - type: note
    content: Ezek. 44:22
  - type: text
    content: 'They shall not take a wife who is a harlot or a defiled woman, nor shall they take a woman '
  - type: note
    content: Deut. 24:1, 2
  - type: text
    content: 'divorced from her husband; for the priest is holy to his God. '
  '8':
  - type: text
    content: 'Therefore you shall consecrate him, for he offers the bread of your God. He shall be holy to you, for '
  - type: note
    content: Lev. 11:44, 45
  - type: text
    content: 'I the '
  - type: heading
    content: Lord
  - type: text
    content: ', who '
  - type: note
    content: Lev. 8:12, 30
  - type: text
    content: 'sanctify you, am holy. '
  '9':
  - type: text
    content: 'The daughter of any priest, if she profanes herself by playing the harlot, she profanes her father. She shall be '
  - type: note
    content: Deut. 22:21
  - type: text
    content: burned with fire.
