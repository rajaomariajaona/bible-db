document_id: GEN.36,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Family of Esau
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the genealogy of Esau, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:30
      marker-yv: yv-n
    - type: text
      text: 'who is Edom. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the names of Esau’s sons: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 1:35
      marker-yv: yv-n
    - type: text
      text: 'Eliphaz the son of Adah the wife of Esau, and Reuel the son of Basemath the wife of Esau. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: And the sons of Eliphaz were Teman, Omar, Zepho, Gatam, and Kenaz.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now Timna was the concubine of Eliphaz, Esau’s son, and she bore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:8–16; Num. 24:20; Deut. 25:17–19; 1 Sam. 15:2, 3
      marker-yv: yv-n
    - type: text
      text: 'Amalek to Eliphaz. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Adah, Esau’s wife.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Reuel: Nahath, Zerah, Shammah, and Mizzah. These were the sons of Basemath, Esau’s wife.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'These were the sons of Aholibamah, Esau’s wife, the daughter of Anah, the daughter of Zibeon. And she bore to Esau: Jeush, Jaalam, and Korah.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Chiefs of Edom
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the chiefs of the sons of Esau. The sons of Eliphaz, the firstborn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: son
    - type: text
      text: ' of Esau, were Chief Teman, Chief Omar, Chief Zepho, Chief Kenaz, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Chief Korah, Chief Gatam, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' Chief Amalek. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the chiefs of Eliphaz in the land of Edom. They '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Adah.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Reuel, Esau’s son: Chief Nahath, Chief Zerah, Chief Shammah, and Chief Mizzah. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the chiefs of Reuel in the land of Edom. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Basemath, Esau’s wife.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Aholibamah, Esau’s wife: Chief Jeush, Chief Jaalam, and Chief Korah. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the chiefs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: descended
    - type: text
      text: ' from Aholibamah, Esau’s wife, the daughter of Anah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Esau, who is Edom, and these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' their chiefs.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sons of Seir
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 26:34; 28:9
      marker-yv: yv-n
    - type: text
      text: 'Esau took his wives from the daughters of Canaan: Adah the daughter of Elon the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 7:6
      marker-yv: yv-n
    - type: text
      text: 'Hittite; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 36:25
      marker-yv: yv-n
    - type: text
      text: 'Aholibamah the daughter of Anah, the daughter of Zibeon the Hivite; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 1:38–42
      marker-yv: yv-n
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Seir '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:6; Deut. 2:12, 22
      marker-yv: yv-n
    - type: text
      text: 'the Horite who inhabited the land: Lotan, Shobal, Zibeon, Anah, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dishon, Ezer, and Dishan. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the chiefs of the Horites, the sons of Seir, in the land of Edom.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'And the sons of Lotan were Hori and Hemam. Lotan’s sister '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Timna.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Shobal: Alvan, Manahath, Ebal, Shepho, and Onam.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Zibeon: both Ajah and Anah. This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' Anah who found the water in the wilderness as he pastured '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:19
      marker-yv: yv-n
    - type: text
      text: 'the donkeys of his father Zibeon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the children of Anah: Dishon and Aholibamah the daughter of Anah.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Dishon:Hemdan, Eshban, Ithran, and Cheran. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Ezer: Bilhan, Zaavan, and Akan. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Dishan: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 1:1
      marker-yv: yv-n
    - type: text
      text: Uz and Aran.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the chiefs of the Horites: Chief Lotan, Chief Shobal, Chief Zibeon, Chief Anah, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 28:9
      marker-yv: yv-n
    - type: text
      text: 'Basemath, Ishmael’s daughter, sister of Nebajoth. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Chief Dishon, Chief Ezer, and Chief Dishan. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the chiefs of the Horites, according to their chiefs in the land of Seir.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Kings of Edom
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:6, 16; 35:11; 1 Chr. 1:43
      marker-yv: yv-n
    - type: text
      text: 'Now these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the kings who reigned in the land of Edom before any king reigned over the children of Israel: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Bela the son of Beor reigned in Edom, and the name of his city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Dinhabah. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'And when Bela died, Jobab the son of Zerah of Bozrah reigned in his place. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'When Jobab died, Husham of the land of the Temanites reigned in his place. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And when Husham died, Hadad the son of Bedad, who attacked Midian in the field of Moab, reigned in his place. And the name of his city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Avith. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'When Hadad died, Samlah of Masrekah reigned in his place. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'And when Samlah died, Saul of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:11
      marker-yv: yv-n
    - type: text
      text: Rehoboth-
    - type: usfm
      marker: it
      children:
      - type: text
        text: by
    - type: text
      text: '-the-River reigned in his place. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'When Saul died, Baal-Hanan the son of Achbor reigned in his place. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And when Baal-Hanan the son of Achbor died, Hadar reigned in his place; and the name of his city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Pau. His wife’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Mehetabel, the daughter of Matred, the daughter of Mezahab.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Chiefs of Esau
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 1:35
      marker-yv: yv-n
    - type: text
      text: 'Adah bore Eliphaz to Esau, and Basemath bore Reuel. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'And these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the names of the chiefs of Esau, according to their families and their places, by their names: Chief Timnah, Chief Alvah, Chief Jetheth, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Chief Aholibamah, Chief Elah, Chief Pinon, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Chief Kenaz, Chief Teman, Chief Mibzar, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Chief Magdiel, and Chief Iram. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the chiefs of Edom, according to their dwelling places in the land of their possession. Esau '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the father of the Edomites.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And Aholibamah bore Jeush, Jaalam, and Korah. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Esau who were born to him in the land of Canaan.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then Esau took his wives, his sons, his daughters, and all the persons of his household, his cattle and all his animals, and all his goods which he had gained in the land of Canaan, and went to a country away from the presence of his brother Jacob. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 13:6, 11
      marker-yv: yv-n
    - type: text
      text: 'For their possessions were too great for them to dwell together, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:8; 28:4; Heb. 11:9
      marker-yv: yv-n
    - type: text
      text: 'the land where they were strangers could not support them because of their livestock. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So Esau dwelt in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:3; Deut. 2:5; Josh. 24:4
      marker-yv: yv-n
    - type: text
      text: 'Mount Seir. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 36:1, 19
      marker-yv: yv-n
    - type: text
      text: 'Esau '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' Edom.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the genealogy of Esau the father of the Edomites in Mount Seir. '
