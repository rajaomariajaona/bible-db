document_id: GEN.36,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Family of Esau
  - type: text
    content: 'Now this '
  - type: text
    content: is
  - type: text
    content: ' the genealogy of Esau, '
  - type: note
    content: Gen. 25:30
  - type: text
    content: 'who is Edom. '
  '10':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the names of Esau’s sons: '
  - type: note
    content: 1 Chr. 1:35
  - type: text
    content: 'Eliphaz the son of Adah the wife of Esau, and Reuel the son of Basemath the wife of Esau. '
  '11':
  - type: text
    content: And the sons of Eliphaz were Teman, Omar, Zepho, Gatam, and Kenaz.
  '12':
  - type: text
    content: 'Now Timna was the concubine of Eliphaz, Esau’s son, and she bore '
  - type: note
    content: Ex. 17:8–16; Num. 24:20; Deut. 25:17–19; 1 Sam. 15:2, 3
  - type: text
    content: 'Amalek to Eliphaz. These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Adah, Esau’s wife.'
  '13':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Reuel: Nahath, Zerah, Shammah, and Mizzah. These were the sons of Basemath, Esau’s wife.'
  '14':
  - type: text
    content: 'These were the sons of Aholibamah, Esau’s wife, the daughter of Anah, the daughter of Zibeon. And she bore to Esau: Jeush, Jaalam, and Korah.'
  - type: heading
    content: The Chiefs of Edom
  '15':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the chiefs of the sons of Esau. The sons of Eliphaz, the firstborn '
  - type: text
    content: son
  - type: text
    content: ' of Esau, were Chief Teman, Chief Omar, Chief Zepho, Chief Kenaz, '
  '16':
  - type: text
    content: 'Chief Korah, Chief Gatam, '
  - type: text
    content: and
  - type: text
    content: ' Chief Amalek. These '
  - type: text
    content: were
  - type: text
    content: ' the chiefs of Eliphaz in the land of Edom. They '
  - type: text
    content: were
  - type: text
    content: ' the sons of Adah.'
  '17':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Reuel, Esau’s son: Chief Nahath, Chief Zerah, Chief Shammah, and Chief Mizzah. These '
  - type: text
    content: were
  - type: text
    content: ' the chiefs of Reuel in the land of Edom. These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Basemath, Esau’s wife.'
  '18':
  - type: text
    content: 'And these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Aholibamah, Esau’s wife: Chief Jeush, Chief Jaalam, and Chief Korah. These '
  - type: text
    content: were
  - type: text
    content: ' the chiefs '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: descended
  - type: text
    content: ' from Aholibamah, Esau’s wife, the daughter of Anah. '
  '19':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Esau, who is Edom, and these '
  - type: text
    content: were
  - type: text
    content: ' their chiefs.'
  - type: heading
    content: The Sons of Seir
  '2':
  - type: note
    content: Gen. 26:34; 28:9
  - type: text
    content: 'Esau took his wives from the daughters of Canaan: Adah the daughter of Elon the '
  - type: note
    content: 2 Kin. 7:6
  - type: text
    content: 'Hittite; '
  - type: note
    content: Gen. 36:25
  - type: text
    content: 'Aholibamah the daughter of Anah, the daughter of Zibeon the Hivite; '
  '20':
  - type: note
    content: 1 Chr. 1:38–42
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Seir '
  - type: note
    content: Gen. 14:6; Deut. 2:12, 22
  - type: text
    content: 'the Horite who inhabited the land: Lotan, Shobal, Zibeon, Anah, '
  '21':
  - type: text
    content: 'Dishon, Ezer, and Dishan. These '
  - type: text
    content: were
  - type: text
    content: ' the chiefs of the Horites, the sons of Seir, in the land of Edom.'
  '22':
  - type: text
    content: 'And the sons of Lotan were Hori and Hemam. Lotan’s sister '
  - type: text
    content: was
  - type: text
    content: ' Timna.'
  '23':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Shobal: Alvan, Manahath, Ebal, Shepho, and Onam.'
  '24':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Zibeon: both Ajah and Anah. This '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' Anah who found the water in the wilderness as he pastured '
  - type: note
    content: Lev. 19:19
  - type: text
    content: 'the donkeys of his father Zibeon. '
  '25':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the children of Anah: Dishon and Aholibamah the daughter of Anah.'
  '26':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Dishon:Hemdan, Eshban, Ithran, and Cheran. '
  '27':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Ezer: Bilhan, Zaavan, and Akan. '
  '28':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Dishan: '
  - type: note
    content: Job 1:1
  - type: text
    content: Uz and Aran.
  '29':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the chiefs of the Horites: Chief Lotan, Chief Shobal, Chief Zibeon, Chief Anah, '
  '3':
  - type: text
    content: 'and '
  - type: note
    content: Gen. 28:9
  - type: text
    content: 'Basemath, Ishmael’s daughter, sister of Nebajoth. '
  '30':
  - type: text
    content: 'Chief Dishon, Chief Ezer, and Chief Dishan. These '
  - type: text
    content: were
  - type: text
    content: ' the chiefs of the Horites, according to their chiefs in the land of Seir.'
  - type: heading
    content: The Kings of Edom
  '31':
  - type: note
    content: Gen. 17:6, 16; 35:11; 1 Chr. 1:43
  - type: text
    content: 'Now these '
  - type: text
    content: were
  - type: text
    content: ' the kings who reigned in the land of Edom before any king reigned over the children of Israel: '
  '32':
  - type: text
    content: 'Bela the son of Beor reigned in Edom, and the name of his city '
  - type: text
    content: was
  - type: text
    content: ' Dinhabah. '
  '33':
  - type: text
    content: 'And when Bela died, Jobab the son of Zerah of Bozrah reigned in his place. '
  '34':
  - type: text
    content: 'When Jobab died, Husham of the land of the Temanites reigned in his place. '
  '35':
  - type: text
    content: 'And when Husham died, Hadad the son of Bedad, who attacked Midian in the field of Moab, reigned in his place. And the name of his city '
  - type: text
    content: was
  - type: text
    content: ' Avith. '
  '36':
  - type: text
    content: 'When Hadad died, Samlah of Masrekah reigned in his place. '
  '37':
  - type: text
    content: 'And when Samlah died, Saul of '
  - type: note
    content: Gen. 10:11
  - type: text
    content: Rehoboth-
  - type: text
    content: by
  - type: text
    content: '-the-River reigned in his place. '
  '38':
  - type: text
    content: 'When Saul died, Baal-Hanan the son of Achbor reigned in his place. '
  '39':
  - type: text
    content: 'And when Baal-Hanan the son of Achbor died, Hadar reigned in his place; and the name of his city '
  - type: text
    content: was
  - type: text
    content: ' Pau. His wife’s name '
  - type: text
    content: was
  - type: text
    content: ' Mehetabel, the daughter of Matred, the daughter of Mezahab.'
  - type: heading
    content: The Chiefs of Esau
  '4':
  - type: text
    content: 'Now '
  - type: note
    content: 1 Chr. 1:35
  - type: text
    content: 'Adah bore Eliphaz to Esau, and Basemath bore Reuel. '
  '40':
  - type: text
    content: 'And these '
  - type: text
    content: were
  - type: text
    content: ' the names of the chiefs of Esau, according to their families and their places, by their names: Chief Timnah, Chief Alvah, Chief Jetheth, '
  '41':
  - type: text
    content: 'Chief Aholibamah, Chief Elah, Chief Pinon, '
  '42':
  - type: text
    content: 'Chief Kenaz, Chief Teman, Chief Mibzar, '
  '43':
  - type: text
    content: 'Chief Magdiel, and Chief Iram. These '
  - type: text
    content: were
  - type: text
    content: ' the chiefs of Edom, according to their dwelling places in the land of their possession. Esau '
  - type: text
    content: was
  - type: text
    content: ' the father of the Edomites.'
  '5':
  - type: text
    content: 'And Aholibamah bore Jeush, Jaalam, and Korah. These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Esau who were born to him in the land of Canaan.'
  '6':
  - type: text
    content: 'Then Esau took his wives, his sons, his daughters, and all the persons of his household, his cattle and all his animals, and all his goods which he had gained in the land of Canaan, and went to a country away from the presence of his brother Jacob. '
  '7':
  - type: note
    content: Gen. 13:6, 11
  - type: text
    content: 'For their possessions were too great for them to dwell together, and '
  - type: note
    content: Gen. 17:8; 28:4; Heb. 11:9
  - type: text
    content: 'the land where they were strangers could not support them because of their livestock. '
  '8':
  - type: text
    content: 'So Esau dwelt in '
  - type: note
    content: Gen. 32:3; Deut. 2:5; Josh. 24:4
  - type: text
    content: 'Mount Seir. '
  - type: note
    content: Gen. 36:1, 19
  - type: text
    content: 'Esau '
  - type: text
    content: is
  - type: text
    content: ' Edom.'
  '9':
  - type: text
    content: 'And this '
  - type: text
    content: is
  - type: text
    content: ' the genealogy of Esau the father of the Edomites in Mount Seir. '
