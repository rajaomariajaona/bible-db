document_id: ROM.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law of Liberty
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Receive
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 14:2; 15:1; 1 Cor. 8:9; 9:22)
      marker-yv: yv-n
    - type: text
      text: ' one who is weak in the faith, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' not to disputes over doubtful things. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But why do you judge your brother? Or why do you show contempt for your brother? For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 2:16; 2 Cor. 5:10
      marker-yv: yv-n
    - type: text
      text: 'we shall all stand before the judgment seat of Christ. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it is written:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 45:23; (Phil. 2:10, 11)
      marker-yv: yv-n
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' I live, says the '
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Every knee shall bow to Me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And every tongue shall confess to God.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 12:36; 16:27; (Gal. 6:5); 1 Pet. 4:5
      marker-yv: yv-n
    - type: text
      text: 'each of us shall give account of himself to God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore let us not judge one another anymore, but rather resolve this, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 8:9
      marker-yv: yv-n
    - type: text
      text: 'not to put a stumbling block or a cause to fall in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' brother’s way.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law of Love
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I know and am convinced by the Lord Jesus '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 10:25
      marker-yv: yv-n
    - type: text
      text: 'that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' nothing unclean of itself; but to him who considers anything to be unclean, to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' unclean. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet if your brother is grieved because of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' food, you are no longer walking in love. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 14:20; 1 Cor. 8:11
      marker-yv: yv-n
    - type: text
      text: 'Do not destroy with your food the one for whom Christ died. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 12:17)
      marker-yv: yv-n
    - type: text
      text: 'Therefore do not let your good be spoken of as evil; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 8:8
      marker-yv: yv-n
    - type: text
      text: 'for the kingdom of God is not eating and drinking, but righteousness and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:6)
      marker-yv: yv-n
    - type: text
      text: 'peace and joy in the Holy Spirit. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he who serves Christ in these things '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:21; Phil. 4:8; 1 Pet. 2:12
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' acceptable to God and approved by men.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:14; Rom. 12:18; 1 Cor. 7:15; 2 Tim. 2:22; Heb. 12:14
      marker-yv: yv-n
    - type: text
      text: 'Therefore let us pursue the things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: make
    - type: text
      text: ' for peace and the things by which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 14:12; 1 Thess. 5:11
      marker-yv: yv-n
    - type: text
      text: 'one may edify another. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For one believes he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 10:25; (Titus 1:15)
      marker-yv: yv-n
    - type: text
      text: 'may eat all things, but he who is weak eats '
    - type: usfm
      marker: it
      children:
      - type: text
        text: only
    - type: text
      text: ' vegetables. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 14:15
      marker-yv: yv-n
    - type: text
      text: 'Do not destroy the work of God for the sake of food. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:15
      marker-yv: yv-n
    - type: text
      text: 'All things indeed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' pure, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 8:9–12
      marker-yv: yv-n
    - type: text
      text: 'but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' evil for the man who eats with offense. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good neither to eat '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 8:13
      marker-yv: yv-n
    - type: text
      text: 'meat nor drink wine nor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything
    - type: text
      text: ' by which your brother stumbles or is offended or is made weak. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you have faith? Have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to yourself before God. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 John 3:21)
      marker-yv: yv-n
    - type: text
      text: 'Happy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' he who does not condemn himself in what he approves. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he who doubts is condemned if he eats, because '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: does
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eat
    - type: text
      text: ' from faith; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 1:15
      marker-yv: yv-n
    - type: text
      text: 'whatever '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not from faith is sin.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let not him who eats despise him who does not eat, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 14:10, 13; Col. 2:16)
      marker-yv: yv-n
    - type: text
      text: 'let not him who does not eat judge him who eats; for God has received him. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 9:20; James 4:11, 12
      marker-yv: yv-n
    - type: text
      text: Who are you to judge another’s servant? To his own master he stands or falls. Indeed, he will be made to stand, for God is able to make him stand.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 4:10
      marker-yv: yv-n
    - type: text
      text: 'One person esteems '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' day above another; another esteems every day '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alike.
    - type: text
      text: ' Let each be fully convinced in his own mind. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 4:10
      marker-yv: yv-n
    - type: text
      text: 'observes the day, observes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to the Lord; and he who does not observe the day, to the Lord he does not observe '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
    - type: text
      text: ' He who eats, eats to the Lord, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 14:19; 15:36; (1 Cor. 10:31; 1 Tim. 4:3)
      marker-yv: yv-n
    - type: text
      text: 'he gives God thanks; and he who does not eat, to the Lord he does not eat, and gives God thanks. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 6:19; Gal. 2:20); 1 Thess. 5:10; (1 Pet. 4:2)
      marker-yv: yv-n
    - type: text
      text: 'none of us lives to himself, and no one dies to himself. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if we '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 5:14, 15
      marker-yv: yv-n
    - type: text
      text: 'live, we live to the Lord; and if we die, we die to the Lord. Therefore, whether we live or die, we are the Lord’s. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 5:15
      marker-yv: yv-n
    - type: text
      text: 'to this end Christ died and rose and lived again, that He might be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:36
      marker-yv: yv-n
    - type: text
      text: 'Lord of both the dead and the living. '
