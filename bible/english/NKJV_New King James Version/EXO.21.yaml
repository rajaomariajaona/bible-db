document_id: EXO.21,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law Concerning Servants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Now these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the judgments which you shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:3, 4; Deut. 4:14; 6:1
      marker-yv: yv-n
    - type: text
      text: 'set before them: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'If he takes another '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wife,
    - type: text
      text: ' he shall not diminish her food, her clothing, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 7:3, 5)
      marker-yv: yv-n
    - type: text
      text: 'and her marriage rights. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And if he does not do these three for her, then she shall go out free, without '
    - type: usfm
      marker: it
      children:
      - type: text
        text: paying
    - type: text
      text: ' money.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law Concerning Violence
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:6; Lev. 24:17; Num. 35:30; (Matt. 26:52)
      marker-yv: yv-n
    - type: text
      text: '“He who strikes a man so that he dies shall surely be put to death. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'However, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 19:4, 5
      marker-yv: yv-n
    - type: text
      text: 'if he did not lie in wait, but God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 24:4, 10, 18
      marker-yv: yv-n
    - type: text
      text: 'delivered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' into his hand, then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 35:11; Deut. 19:3; Josh. 20:2
      marker-yv: yv-n
    - type: text
      text: I will appoint for you a place where he may flee.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“But if a man acts with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 19:11, 12; (Heb. 10:26)
      marker-yv: yv-n
    - type: text
      text: 'premeditation against his neighbor, to kill him by treachery, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 2:28–34
      marker-yv: yv-n
    - type: text
      text: you shall take him from My altar, that he may die.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “And he who strikes his father or his mother shall surely be put to death.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 24:7
      marker-yv: yv-n
    - type: text
      text: '“He who kidnaps a man and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:28
      marker-yv: yv-n
    - type: text
      text: 'sells him, or if he is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:4
      marker-yv: yv-n
    - type: text
      text: found in his hand, shall surely be put to death.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 20:9; Prov. 20:20; Matt. 15:4; Mark 7:10
      marker-yv: yv-n
    - type: text
      text: he who curses his father or his mother shall surely be put to death.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“If men contend with each other, and one strikes the other with a stone or with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' fist, and he does not die but is confined to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' bed, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'if he rises again and walks about outside '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:29
      marker-yv: yv-n
    - type: text
      text: 'with his staff, then he who struck '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' shall be acquitted. He shall only pay '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' the loss of his time, and shall provide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' to be thoroughly healed.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:39–43; Deut. 15:12–18; Jer. 34:14
      marker-yv: yv-n
    - type: text
      text: 'If you buy a Hebrew servant, he shall serve six years; and in the seventh he shall go out free and pay nothing. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“And if a man beats his male or female servant with a rod, so that he dies under his hand, he shall surely be punished. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Notwithstanding, if he remains alive a day or two, he shall not be punished; for he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:44–46
      marker-yv: yv-n
    - type: text
      text: property.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“If men fight, and hurt a woman with child, so that she gives birth prematurely, yet no harm follows, he shall surely be punished accordingly as the woman’s husband imposes on him; and he shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 18:21, 22; 21:30; Deut. 22:18
      marker-yv: yv-n
    - type: text
      text: 'pay as the judges '
    - type: usfm
      marker: it
      children:
      - type: text
        text: determine.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'But if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' harm follows, then you shall give life for life, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 24:20; Deut. 19:21; (Matt. 5:38–44; 1 Pet. 2:19–21)
      marker-yv: yv-n
    - type: text
      text: 'eye for eye, tooth for tooth, hand for hand, foot for foot, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: burn for burn, wound for wound, stripe for stripe.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“If a man strikes the eye of his male or female servant, and destroys it, he shall let him go free for the sake of his eye. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: And if he knocks out the tooth of his male or female servant, he shall let him go free for the sake of his tooth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Animal Control Laws
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '“If an ox gores a man or a woman to death, then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:5
      marker-yv: yv-n
    - type: text
      text: 'the ox shall surely be stoned, and its flesh shall not be eaten; but the owner of the ox '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' acquitted. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'But if the ox tended to thrust with its horn in times past, and it has been made known to his owner, and he has not kept it confined, so that it has killed a man or a woman, the ox shall be stoned and its owner also shall be put to death. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'If he comes in by himself, he shall go out by himself; if he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: comes
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' married, then his wife shall go out with him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'If there is imposed on him a sum of money, then he shall pay '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:22; Num. 35:31
      marker-yv: yv-n
    - type: text
      text: 'to redeem his life, whatever is imposed on him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Whether it has gored a son or gored a daughter, according to this judgment it shall be done to him. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'If the ox gores a male or female servant, he shall give to their master '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 11:12, 13; Matt. 26:15; 27:3, 9
      marker-yv: yv-n
    - type: text
      text: 'thirty shekels of silver, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 21:28
      marker-yv: yv-n
    - type: text
      text: ox shall be stoned.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '“And if a man opens a pit, or if a man digs a pit and does not cover it, and an ox or a donkey falls in it, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'the owner of the pit shall make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' good; he shall give money to their owner, but the dead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: animal
    - type: text
      text: ' shall be his.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '“If one man’s ox hurts another’s, so that it dies, then they shall sell the live ox and divide the money from it; and the dead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ox
    - type: text
      text: ' they shall also divide. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Or if it was known that the ox tended to thrust in time past, and its owner has not kept it confined, he shall surely pay ox for ox, and the dead animal shall be his own.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'If his master has given him a wife, and she has borne him sons or daughters, the wife and her children shall be her master’s, and he shall go out by himself. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:16, 17
      marker-yv: yv-n
    - type: text
      text: 'But if the servant plainly says, ‘I love my master, my wife, and my children; I will not go out free,’ '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'then his master shall bring him to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:12; 22:8, 9
      marker-yv: yv-n
    - type: text
      text: judges. He shall also bring him to the door, or to the doorpost, and his master shall pierce his ear with an awl; and he shall serve him forever.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“And if a man '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 5:5
      marker-yv: yv-n
    - type: text
      text: 'sells his daughter to be a female slave, she shall not go out as the male slaves do. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'If she does not please her master, who has betrothed her to himself, then he shall let her be redeemed. He shall have no right to sell her to a foreign people, since he has dealt deceitfully with her. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And if he has betrothed her to his son, he shall deal with her according to the custom of daughters. '
