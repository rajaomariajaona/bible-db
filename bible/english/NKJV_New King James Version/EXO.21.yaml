  - type: text
    content: be
  - type: text
    content: ' acquitted. '
  '29':
  - type: text
    content: 'But if the ox tended to thrust with its horn in times past, and it has been made known to his owner, and he has not kept it confined, so that it has killed a man or a woman, the ox shall be stoned and its owner also shall be put to death. '
  '3':
  - type: text
    content: 'If he comes in by himself, he shall go out by himself; if he '
  - type: text
    content: comes
  - type: text
    content: ' '
  - type: text
    content: in
  - type: text
    content: ' married, then his wife shall go out with him. '
  '30':
  - type: text
    content: 'If there is imposed on him a sum of money, then he shall pay '
  - type: note
    content: Ex. 21:22; Num. 35:31
  - type: text
    content: 'to redeem his life, whatever is imposed on him. '
  '31':
  - type: text
    content: 'Whether it has gored a son or gored a daughter, according to this judgment it shall be done to him. '
  '32':
  - type: text
