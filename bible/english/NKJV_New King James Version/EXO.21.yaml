  - type: heading
    content: Animal Control Laws
  '28':
  - type: text
    content: '“If an ox gores a man or a woman to death, then '
  - type: note
    content: Gen. 9:5
  - type: text
    content: 'the ox shall surely be stoned, and its flesh shall not be eaten; but the owner of the ox '
