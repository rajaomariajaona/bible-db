  - type: text
    content: ox shall be stoned.
  '33':
  - type: text
    content: '“And if a man opens a pit, or if a man digs a pit and does not cover it, and an ox or a donkey falls in it, '
  '34':
  - type: text
    content: 'the owner of the pit shall make '
  - type: text
    content: it
  - type: text
    content: ' good; he shall give money to their owner, but the dead '
  - type: text
    content: animal
  - type: text
    content: ' shall be his.'
  '35':
  - type: text
    content: '“If one man’s ox hurts another’s, so that it dies, then they shall sell the live ox and divide the money from it; and the dead '
  - type: text
    content: ox
  - type: text
    content: ' they shall also divide. '
  '36':
  - type: text
    content: Or if it was known that the ox tended to thrust in time past, and its owner has not kept it confined, he shall surely pay ox for ox, and the dead animal shall be his own.
  '4':
  - type: text
    content: 'If his master has given him a wife, and she has borne him sons or daughters, the wife and her children shall be her master’s, and he shall go out by himself. '
  '5':
  - type: note
    content: Deut. 15:16, 17
  - type: text
    content: 'But if the servant plainly says, ‘I love my master, my wife, and my children; I will not go out free,’ '
  '6':
  - type: text
    content: 'then his master shall bring him to the '
  - type: note
    content: Ex. 12:12; 22:8, 9
  - type: text
    content: judges. He shall also bring him to the door, or to the doorpost, and his master shall pierce his ear with an awl; and he shall serve him forever.
  '7':
  - type: text
    content: '“And if a man '
  - type: note
    content: Neh. 5:5
  - type: text
    content: 'sells his daughter to be a female slave, she shall not go out as the male slaves do. '
  '8':
  - type: text
    content: 'If she does not please her master, who has betrothed her to himself, then he shall let her be redeemed. He shall have no right to sell her to a foreign people, since he has dealt deceitfully with her. '
  '9':
  - type: text
    content: 'And if he has betrothed her to his son, he shall deal with her according to the custom of daughters. '
