document_id: PSA.28,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rejoicing in Answered Prayer
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'To You I will cry, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my Rock:'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 35:22; 39:12; 83:1
      marker-yv: yv-n
    - type: text
      text: Do not be silent to me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 88:4; 143:7; Prov. 1:12
      marker-yv: yv-n
    - type: text
      text: 'Lest, if You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' silent to me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I become like those who go down to the pit.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hear the voice of my supplications
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I cry to You,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 5:7
      marker-yv: yv-n
    - type: text
      text: 'When I lift up my hands '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 138:2
      marker-yv: yv-n
    - type: text
      text: toward Your holy sanctuary.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Do not take me away with the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And with the workers of iniquity,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 12:2; 55:21; 62:4; Jer. 9:8
      marker-yv: yv-n
    - type: text
      text: Who speak peace to their neighbors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But evil '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in their hearts.'
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 62:12); 2 Tim. 4:14; (Rev. 18:6; 22:12)
      marker-yv: yv-n
    - type: text
      text: Give them according to their deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And according to the wickedness of their endeavors;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Give them according to the work of their hands;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Render to them what they deserve.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:12
      marker-yv: yv-n
    - type: text
      text: 'they do not regard the works of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor the operation of His hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall destroy them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And not build them up.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because He has heard the voice of my supplications!
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 18:2; 59:17
      marker-yv: yv-n
    - type: text
      text: my strength and my shield;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My heart '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 13:5; 112:7
      marker-yv: yv-n
    - type: text
      text: trusted in Him, and I am helped;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore my heart greatly rejoices,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And with my song I will praise Him.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' their strength,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 20:6
      marker-yv: yv-n
    - type: text
      text: saving refuge of His anointed.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Save Your people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And bless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 9:29; 32:9; 1 Kin. 8:51; Ps. 33:12); 106:40
      marker-yv: yv-n
    - type: text
      text: Your inheritance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Shepherd them also,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:31; Is. 63:9
      marker-yv: yv-n
    - type: text
      text: And bear them up forever.
