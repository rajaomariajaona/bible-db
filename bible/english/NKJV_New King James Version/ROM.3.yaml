  '1':
  - type: heading
    content: God’s Judgment Defended
  - type: text
    content: 'What advantage then has the Jew, or what '
  - type: text
    content: is
  - type: text
    content: ' the profit of circumcision? '
  '10':
  - type: text
    content: 'As it is written:'
  - type: note
    content: Ps. 14:1–3; 53:1–3; Eccl. 7:20
  - type: text
    content: “There is none righteous, no, not one;
  '11':
  - type: text
    content: There is none who understands;
  - type: text
    content: There is none who seeks after God.
  '12':
  - type: text
    content: They have all turned aside;
  - type: text
    content: They have together become unprofitable;
  - type: text
    content: There is none who does good, no, not one.”
  '13':
  - type: text
    content: “Their
  - type: note
    content: Ps. 5:9
  - type: text
    content: ' throat '
  - type: text
    content: is
  - type: text
    content: ' an open tomb;'
  - type: text
    content: With their tongues they have practiced deceit”;
  - type: note
    content: Ps. 140:3
  - type: text
    content: '“The poison of asps '
  - type: text
    content: is
  - type: text
    content: ' under their lips”;'
  '14':
  - type: text
    content: “Whose
  - type: note
    content: Ps. 10:7
  - type: text
    content: ' mouth '
  - type: text
    content: is
  - type: text
    content: ' full of cursing and bitterness.”'
  '15':
  - type: text
    content: “Their
  - type: note
    content: Prov. 1:16; Is. 59:7, 8
  - type: text
    content: ' feet '
  - type: text
    content: are
  - type: text
    content: ' swift to shed blood;'
  '16':
  - type: text
    content: 'Destruction and misery '
  - type: text
    content: are
  - type: text
    content: ' in their ways;'
  '17':
  - type: text
    content: And the way of peace they have not known.”
  '18':
  - type: text
    content: “There
  - type: note
    content: Ps. 36:1
  - type: text
    content: ' is no fear of God before their eyes.”'
  '19':
  - type: text
    content: 'Now we know that whatever '
  - type: note
    content: John 10:34
  - type: text
    content: 'the law says, it says to those who are under the law, that '
  - type: note
    content: Job 5:16; Ps. 107:42
  - type: text
    content: 'every mouth may be stopped, and all the world may become guilty before God. '
  '2':
  - type: text
    content: 'Much in every way! Chiefly because '
  - type: note
    content: Deut. 4:5–8; Ps. 147:19; Rom. 9:4
  - type: text
    content: 'to them were committed the oracles of God. '
  '20':
  - type: text
    content: 'Therefore '
  - type: note
    content: Ps. 143:2; (Acts 13:39; Gal. 2:16)
  - type: text
    content: 'by the deeds of the law no flesh will be justified in His sight, for by the law '
  - type: text
    content: is
  - type: text
    content: ' the knowledge of sin.'
  - type: heading
    content: God’s Righteousness Through Faith
  '21':
  - type: text
    content: 'But now '
  - type: note
    content: Acts 15:11
  - type: text
    content: 'the righteousness of God apart from the law is revealed, '
  - type: note
    content: John 5:46
  - type: text
    content: 'being witnessed by the Law '
  - type: note
    content: 1 Pet. 1:10
  - type: text
    content: 'and the Prophets, '
  '22':
  - type: text
    content: 'even the righteousness of God, through faith in Jesus Christ, to all and on all who believe. For '
  - type: note
    content: Rom. 10:12; (Gal. 3:28; Col. 3:11)
  - type: text
    content: 'there is no difference; '
  '23':
  - type: text
    content: 'for '
  - type: note
    content: Gal. 3:22
  - type: text
    content: 'all have sinned and fall short of the glory of God, '
  '24':
  - type: text
    content: 'being justified freely '
  - type: note
    content: Rom. 4:4, 16; (Eph. 2:8; Titus 3:5, 7)
  - type: text
    content: 'by His grace '
  - type: note
    content: (Matt. 20:28; Eph. 1:7; Col. 1:14; 1 Tim. 2:6; Heb. 9:12, 15; 1 Pet. 1:18, 19)
  - type: text
    content: 'through the redemption that is in Christ Jesus, '
  '25':
  - type: text
    content: 'whom God set forth '
  - type: note
    content: Lev. 16:15
  - type: text
    content: as
  - type: text
    content: ' a propitiation '
  - type: note
    content: Col. 1:20
  - type: text
    content: 'by His blood, through faith, to demonstrate His righteousness, because in His forbearance God had passed over '
  - type: note
    content: Acts 14:16; 17:30; (Rom. 2:4)
  - type: text
    content: 'the sins that were previously committed, '
  '26':
  - type: text
    content: to demonstrate at the present time His righteousness, that He might be just and the justifier of the one who has faith in Jesus.
  - type: heading
    content: Boasting Excluded
  '27':
  - type: note
    content: Rom. 2:17, 23; (1 Cor. 1:29); Eph. 2:9
  - type: text
    content: 'Where '
  - type: text
    content: is
  - type: text
    content: ' boasting then? It is excluded. By what law? Of works? No, but by the law of faith. '
  '28':
  - type: text
    content: 'Therefore we conclude '
  - type: note
    content: Gal. 2:16
  - type: text
    content: 'that a man is justified by faith apart from the deeds of the law. '
  '29':
  - type: text
    content: 'Or '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: He
  - type: text
    content: ' the God of the Jews only? '
  - type: text
    content: Is
  - type: text
    content: ' '
  - type: text
    content: He
  - type: text
    content: ' not also the God of the Gentiles? Yes, of the Gentiles also, '
  '3':
  - type: text
    content: 'For what if '
  - type: note
    content: Rom. 10:16; Heb. 4:2
  - type: text
    content: 'some did not believe? '
  - type: note
    content: Num. 23:19; (2 Tim. 2:13)
  - type: text
    content: 'Will their unbelief make the faithfulness of God without effect? '
  '30':
  - type: text
    content: 'since '
  - type: note
    content: Rom. 10:12; (Gal. 3:8, 20)
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' one God who will justify the circumcised by faith and the uncircumcised through faith. '
  '31':
  - type: text
    content: Do we then make void the law through faith? Certainly not! On the contrary, we establish the law.
  '4':
  - type: note
    content: Job 40:8
  - type: text
    content: 'Certainly not! Indeed, let '
  - type: note
    content: (John 3:33)
  - type: text
    content: 'God be true but '
  - type: note
    content: Ps. 62:9
  - type: text
    content: 'every man a liar. As it is written:'
  - type: note
    content: Ps. 51:4
  - type: text
    content: “That You may be justified in Your words,
  - type: text
    content: And may overcome when You are judged.”
  '5':
  - type: text
    content: 'But if our unrighteousness demonstrates the righteousness of God, what shall we say? '
  - type: text
    content: Is
  - type: text
    content: ' God unjust who inflicts wrath? '
  - type: note
    content: Rom. 6:19; 1 Cor. 9:8; 15:32; Gal. 3:15
  - type: text
    content: '(I speak as a man.) '
  '6':
  - type: text
    content: 'Certainly not! For then '
  - type: note
    content: (Gen. 18:25)
  - type: text
    content: how will God judge the world?
  '7':
  - type: text
    content: 'For if the truth of God has increased through my lie to His glory, why am I also still judged as a sinner? '
  '8':
  - type: text
    content: 'And '
  - type: text
    content: why
  - type: text
    content: ' not '
  - type: text
    content: say,
  - type: text
    content: ' '
  - type: note
    content: Rom. 5:20
  - type: text
    content: “Let us do evil that good may come”?—as we are slanderously reported and as some affirm that we say. Their condemnation is just.
  - type: heading
    content: All Have Sinned
  '9':
  - type: text
    content: 'What then? Are we better '
  - type: text
    content: than
  - type: text
    content: ' '
  - type: text
    content: they?
  - type: text
    content: ' Not at all. For we have previously charged both Jews and Greeks that '
  - type: note
    content: Rom. 3:19, 23; 11:32; Gal. 3:22
  - type: text
    content: they are all under sin.
