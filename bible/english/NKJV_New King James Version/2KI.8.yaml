  - type: text
    text: The King Restores the Shunammite’s Land
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Elisha spoke to the woman '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 4:18, 31–35
    marker-yv: yv-n
  - type: text
    text: 'whose son he had restored to life, saying, “Arise and go, you and your household, and stay wherever you can; for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 105:16; Hag. 1:11
    marker-yv: yv-n
  - type: text
    text: 'has called for a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 21:1; 1 Kin. 18:2; 2 Kin. 4:38; 6:25
    marker-yv: yv-n
  - type: text
    text: 'famine, and furthermore, it will come upon the land for seven years.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So the woman arose and did according to the saying of the man of God, and she went with her household and dwelt in the land of the Philistines seven years.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'It came to pass, at the end of seven years, that the woman returned from the land of the Philistines; and she went to make an appeal to the king for her house and for her land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then the king talked with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 4:12; 5:20–27
    marker-yv: yv-n
  - type: text
    text: 'Gehazi, the servant of the man of God, saying, “Tell me, please, all the great things Elisha has done.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now it happened, as he was telling the king how he had restored the dead to life, that there was the woman whose son he had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 4:35
    marker-yv: yv-n
  - type: text
    text: 'restored to life, appealing to the king for her house and for her land. And Gehazi said, “My lord, O king, this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the woman, and this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' her son whom Elisha restored to life.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And when the king asked the woman, she told him.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So the king appointed a certain officer for her, saying, “Restore all that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' hers, and all the proceeds of the field from the day that she left the land until now.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Death of Ben-Hadad
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then Elisha went to Damascus, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 6:24
    marker-yv: yv-n
  - type: text
    text: 'Ben-Hadad king of Syria was sick; and it was told him, saying, “The man of God has come here.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the king said to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 19:15
    marker-yv: yv-n
  - type: text
    text: 'Hazael, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 9:7; 1 Kin. 14:3; 2 Kin. 5:5
    marker-yv: yv-n
  - type: text
    text: '“Take a present in your hand, and go to meet the man of God, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 1:2
    marker-yv: yv-n
  - type: text
    text: 'inquire of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' by him, saying, ‘Shall I recover from this disease?’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 19:15
    marker-yv: yv-n
  - type: text
    text: Hazael went to meet him and took a present with him, of every good thing of Damascus, forty camel-loads; and he came and stood before him, and said, “Your son Ben-Hadad king of Syria has sent me to you, saying, ‘Shall I recover from this disease?’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Elisha said to him, “Go, say to him, ‘You shall certainly recover.’ However the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has shown me that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 8:15
    marker-yv: yv-n
  - type: text
    text: 'he will really die.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then he set his countenance in a stare until he was ashamed; and the man of God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 19:41
    marker-yv: yv-n
  - type: text
    text: 'wept. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And Hazael said, “Why is my lord weeping?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He answered, “Because I know '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 10:32; 12:17; 13:3, 7; Amos 1:3, 4
    marker-yv: yv-n
  - type: text
    text: 'the evil that you will do to the children of Israel: Their strongholds you will set on fire, and their young men you will kill with the sword; and you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 15:16; Hos. 13:16; Amos 1:13; Nah. 3:10
    marker-yv: yv-n
  - type: text
    text: will dash their children, and rip open their women with child.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So Hazael said, “But what '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 17:43; 2 Sam. 9:8
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' your servant—a dog, that he should do this gross thing?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Elisha answered, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 19:15
    marker-yv: yv-n
  - type: text
    text: '“The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has shown me that you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: become
  - type: text
    text: ' king over Syria.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then he departed from Elisha, and came to his master, who said to him, “What did Elisha say to you?” And he answered, “He told me you would surely recover.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But it happened on the next day that he took a thick cloth and dipped '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' in water, and spread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' over his face so that he died; and Hazael reigned in his place.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoram Reigns in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 1:17; 3:1
    marker-yv: yv-n
  - type: text
    text: 'in the fifth year of Joram the son of Ahab, king of Israel, Jehoshaphat '
  - type: usfm
    marker: it
    children:
    - type: text
      text: having
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: been
  - type: text
    text: ' king of Judah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 21:3
    marker-yv: yv-n
  - type: text
    text: 'Jehoram the son of Jehoshaphat began to reign as king of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 21:5–10
    marker-yv: yv-n
  - type: text
    text: 'thirty-two years old when he became king, and he reigned eight years in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And he walked in the way of the kings of Israel, just as the house of Ahab had done, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 8:26, 27
    marker-yv: yv-n
  - type: text
    text: 'the daughter of Ahab was his wife; and he did evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Yet the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' would not destroy Judah, for the sake of His servant David, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 7:13; 1 Kin. 11:36; 15:4; 2 Chr. 21:7
    marker-yv: yv-n
  - type: text
    text: 'as He promised him to give a lamp to him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' his sons forever.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In his days '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 27:40; 2 Chr. 21:8–10
    marker-yv: yv-n
  - type: text
    text: 'Edom revolted against Judah’s authority, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 22:47
    marker-yv: yv-n
  - type: text
    text: 'and made a king over themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So Joram went to Zair, and all his chariots with him. Then he rose by night and attacked the Edomites who had surrounded him and the captains of the chariots; and the troops fled to their tents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Thus Edom has been in revolt against Judah’s authority to this day. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 21:13; 2 Kin. 19:8; 2 Chr. 21:10
    marker-yv: yv-n
  - type: text
    text: And Libnah revolted at that time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now the rest of the acts of Joram, and all that he did, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' they not written in the book of the chronicles of the kings of Judah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So Joram rested with his fathers, and was buried with his fathers in the City of David. Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 22:1, 7
    marker-yv: yv-n
  - type: text
    text: Ahaziah his son reigned in his place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahaziah Reigns in Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'In the twelfth year of Joram the son of Ahab, king of Israel, Ahaziah the son of Jehoram, king of Judah, began to reign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ahaziah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 22:2
    marker-yv: yv-n
  - type: text
    text: 'twenty-two years old when he became king, and he reigned one year in Jerusalem. His mother’s name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Athaliah the granddaughter of Omri, king of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 22:3, 4
    marker-yv: yv-n
  - type: text
    text: 'And he walked in the way of the house of Ahab, and did evil in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', like the house of Ahab, for he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the son-in-law of the house of Ahab.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now he went '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 22:5
    marker-yv: yv-n
  - type: text
    text: 'with Joram the son of Ahab to war against Hazael king of Syria at '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 22:3, 29
    marker-yv: yv-n
  - type: text
    text: 'Ramoth Gilead; and the Syrians wounded Joram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 9:15
    marker-yv: yv-n
  - type: text
    text: 'King Joram went back to Jezreel to recover from the wounds which the Syrians had inflicted on him at Ramah, when he fought against Hazael king of Syria. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 9:16; 2 Chr. 22:6, 7
    marker-yv: yv-n
  - type: text
    text: And Ahaziah the son of Jehoram, king of Judah, went down to see Joram the son of Ahab in Jezreel, because he was sick.
