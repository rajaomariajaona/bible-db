document_id: 2KI.8,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The King Restores the Shunammite’s Land
  - type: text
    content: 'Then Elisha spoke to the woman '
  - type: note
    content: 2 Kin. 4:18, 31–35
  - type: text
    content: 'whose son he had restored to life, saying, “Arise and go, you and your household, and stay wherever you can; for the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 105:16; Hag. 1:11
  - type: text
    content: 'has called for a '
  - type: note
    content: 2 Sam. 21:1; 1 Kin. 18:2; 2 Kin. 4:38; 6:25
  - type: text
    content: 'famine, and furthermore, it will come upon the land for seven years.” '
  '10':
  - type: text
    content: 'And Elisha said to him, “Go, say to him, ‘You shall certainly recover.’ However the '
  - type: heading
    content: Lord
  - type: text
    content: ' has shown me that '
  - type: note
    content: 2 Kin. 8:15
  - type: text
    content: 'he will really die.” '
  '11':
  - type: text
    content: 'Then he set his countenance in a stare until he was ashamed; and the man of God '
  - type: note
    content: Luke 19:41
  - type: text
    content: 'wept. '
  '12':
  - type: text
    content: And Hazael said, “Why is my lord weeping?”
  - type: text
    content: 'He answered, “Because I know '
  - type: note
    content: 2 Kin. 10:32; 12:17; 13:3, 7; Amos 1:3, 4
  - type: text
    content: 'the evil that you will do to the children of Israel: Their strongholds you will set on fire, and their young men you will kill with the sword; and you '
  - type: note
    content: 2 Kin. 15:16; Hos. 13:16; Amos 1:13; Nah. 3:10
  - type: text
    content: will dash their children, and rip open their women with child.”
  '13':
  - type: text
    content: 'So Hazael said, “But what '
  - type: note
    content: 1 Sam. 17:43; 2 Sam. 9:8
  - type: text
    content: is
  - type: text
    content: ' your servant—a dog, that he should do this gross thing?”'
  - type: text
    content: 'And Elisha answered, '
  - type: note
    content: 1 Kin. 19:15
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' has shown me that you '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: become
  - type: text
    content: ' king over Syria.”'
  '14':
  - type: text
    content: 'Then he departed from Elisha, and came to his master, who said to him, “What did Elisha say to you?” And he answered, “He told me you would surely recover.” '
  '15':
  - type: text
    content: 'But it happened on the next day that he took a thick cloth and dipped '
  - type: text
    content: it
  - type: text
    content: ' in water, and spread '
  - type: text
    content: it
  - type: text
    content: ' over his face so that he died; and Hazael reigned in his place.'
  - type: heading
    content: Jehoram Reigns in Judah
  '16':
  - type: text
    content: 'Now '
  - type: note
    content: 2 Kin. 1:17; 3:1
  - type: text
    content: 'in the fifth year of Joram the son of Ahab, king of Israel, Jehoshaphat '
  - type: text
    content: having
  - type: text
    content: ' '
  - type: text
    content: been
  - type: text
    content: ' king of Judah, '
  - type: note
    content: 2 Chr. 21:3
  - type: text
    content: 'Jehoram the son of Jehoshaphat began to reign as king of Judah. '
  '17':
  - type: text
    content: 'He was '
  - type: note
    content: 2 Chr. 21:5–10
  - type: text
    content: 'thirty-two years old when he became king, and he reigned eight years in Jerusalem. '
  '18':
  - type: text
    content: 'And he walked in the way of the kings of Israel, just as the house of Ahab had done, for '
  - type: note
    content: 2 Kin. 8:26, 27
  - type: text
    content: 'the daughter of Ahab was his wife; and he did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Yet the '
  - type: heading
    content: Lord
  - type: text
    content: ' would not destroy Judah, for the sake of His servant David, '
  - type: note
    content: 2 Sam. 7:13; 1 Kin. 11:36; 15:4; 2 Chr. 21:7
  - type: text
    content: 'as He promised him to give a lamp to him '
  - type: text
    content: and
  - type: text
    content: ' his sons forever.'
  '2':
  - type: text
    content: So the woman arose and did according to the saying of the man of God, and she went with her household and dwelt in the land of the Philistines seven years.
  '20':
  - type: text
    content: 'In his days '
  - type: note
    content: Gen. 27:40; 2 Chr. 21:8–10
  - type: text
    content: 'Edom revolted against Judah’s authority, '
  - type: note
    content: 1 Kin. 22:47
  - type: text
    content: 'and made a king over themselves. '
  '21':
  - type: text
    content: 'So Joram went to Zair, and all his chariots with him. Then he rose by night and attacked the Edomites who had surrounded him and the captains of the chariots; and the troops fled to their tents. '
  '22':
  - type: text
    content: 'Thus Edom has been in revolt against Judah’s authority to this day. '
  - type: note
    content: Josh. 21:13; 2 Kin. 19:8; 2 Chr. 21:10
  - type: text
    content: And Libnah revolted at that time.
  '23':
  - type: text
    content: 'Now the rest of the acts of Joram, and all that he did, '
  - type: text
    content: are
  - type: text
    content: ' they not written in the book of the chronicles of the kings of Judah? '
  '24':
  - type: text
    content: 'So Joram rested with his fathers, and was buried with his fathers in the City of David. Then '
  - type: note
    content: 2 Chr. 22:1, 7
  - type: text
    content: Ahaziah his son reigned in his place.
  - type: heading
    content: Ahaziah Reigns in Judah
  '25':
  - type: text
    content: 'In the twelfth year of Joram the son of Ahab, king of Israel, Ahaziah the son of Jehoram, king of Judah, began to reign. '
  '26':
  - type: text
    content: 'Ahaziah '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 2 Chr. 22:2
  - type: text
    content: 'twenty-two years old when he became king, and he reigned one year in Jerusalem. His mother’s name '
  - type: text
    content: was
  - type: text
    content: ' Athaliah the granddaughter of Omri, king of Israel. '
  '27':
  - type: note
    content: 2 Chr. 22:3, 4
  - type: text
    content: 'And he walked in the way of the house of Ahab, and did evil in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: ', like the house of Ahab, for he '
  - type: text
    content: was
  - type: text
    content: ' the son-in-law of the house of Ahab.'
  '28':
  - type: text
    content: 'Now he went '
  - type: note
    content: 2 Chr. 22:5
  - type: text
    content: 'with Joram the son of Ahab to war against Hazael king of Syria at '
  - type: note
    content: 1 Kin. 22:3, 29
  - type: text
    content: 'Ramoth Gilead; and the Syrians wounded Joram. '
  '29':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Kin. 9:15
  - type: text
    content: 'King Joram went back to Jezreel to recover from the wounds which the Syrians had inflicted on him at Ramah, when he fought against Hazael king of Syria. '
  - type: note
    content: 2 Kin. 9:16; 2 Chr. 22:6, 7
  - type: text
    content: And Ahaziah the son of Jehoram, king of Judah, went down to see Joram the son of Ahab in Jezreel, because he was sick.
  '3':
  - type: text
    content: 'It came to pass, at the end of seven years, that the woman returned from the land of the Philistines; and she went to make an appeal to the king for her house and for her land. '
  '4':
  - type: text
    content: 'Then the king talked with '
  - type: note
    content: 2 Kin. 4:12; 5:20–27
  - type: text
    content: 'Gehazi, the servant of the man of God, saying, “Tell me, please, all the great things Elisha has done.” '
  '5':
  - type: text
    content: 'Now it happened, as he was telling the king how he had restored the dead to life, that there was the woman whose son he had '
  - type: note
    content: 2 Kin. 4:35
  - type: text
    content: 'restored to life, appealing to the king for her house and for her land. And Gehazi said, “My lord, O king, this '
  - type: text
    content: is
  - type: text
    content: ' the woman, and this '
  - type: text
    content: is
  - type: text
    content: ' her son whom Elisha restored to life.” '
  '6':
  - type: text
    content: And when the king asked the woman, she told him.
  - type: text
    content: 'So the king appointed a certain officer for her, saying, “Restore all that '
  - type: text
    content: was
  - type: text
    content: ' hers, and all the proceeds of the field from the day that she left the land until now.”'
  - type: heading
    content: Death of Ben-Hadad
  '7':
  - type: text
    content: 'Then Elisha went to Damascus, and '
  - type: note
    content: 2 Kin. 6:24
  - type: text
    content: 'Ben-Hadad king of Syria was sick; and it was told him, saying, “The man of God has come here.” '
  '8':
  - type: text
    content: 'And the king said to '
  - type: note
    content: 1 Kin. 19:15
  - type: text
    content: 'Hazael, '
  - type: note
    content: 1 Sam. 9:7; 1 Kin. 14:3; 2 Kin. 5:5
  - type: text
    content: '“Take a present in your hand, and go to meet the man of God, and '
  - type: note
    content: 2 Kin. 1:2
  - type: text
    content: 'inquire of the '
  - type: heading
    content: Lord
  - type: text
    content: ' by him, saying, ‘Shall I recover from this disease?’ ” '
  '9':
  - type: text
    content: 'So '
  - type: note
    content: 1 Kin. 19:15
  - type: text
    content: Hazael went to meet him and took a present with him, of every good thing of Damascus, forty camel-loads; and he came and stood before him, and said, “Your son Ben-Hadad king of Syria has sent me to you, saying, ‘Shall I recover from this disease?’ ”
