document_id: NUM.36,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Marriage of Female Heirs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the chief fathers of the families of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:29
      marker-yv: yv-n
    - type: text
      text: 'children of Gilead the son of Machir, the son of Manasseh, of the families of the sons of Joseph, came near and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:1–11
      marker-yv: yv-n
    - type: text
      text: 'spoke before Moses and before the leaders, the chief fathers of the children of Israel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses, so did the daughters of Zelophehad; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:33; 27:1
      marker-yv: yv-n
    - type: text
      text: 'for Mahlah, Tirzah, Hoglah, Milcah, and Noah, the daughters of Zelophehad, were married to the sons of their father’s brothers. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were married into the families of the children of Manasseh the son of Joseph, and their inheritance remained in the tribe of their father’s family.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the commandments and the judgments which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded the children of Israel by the hand of Moses '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:3; 33:50
      marker-yv: yv-n
    - type: text
      text: 'in the plains of Moab by the Jordan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: across
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' Jericho.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they said: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:55; 33:54; Josh. 17:4
      marker-yv: yv-n
    - type: text
      text: '“The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded my lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Moses
    - type: text
      text: ' to give the land as an inheritance by lot to the children of Israel, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:1, 5–7
      marker-yv: yv-n
    - type: text
      text: 'my lord was commanded by the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to give the inheritance of our brother Zelophehad to his daughters. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now if they are married to any of the sons of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' tribes of the children of Israel, then their inheritance will be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:4
      marker-yv: yv-n
    - type: text
      text: 'taken from the inheritance of our fathers, and it will be added to the inheritance of the tribe into which they marry; so it will be taken from the lot of our inheritance. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 25:10
      marker-yv: yv-n
    - type: text
      text: the Jubilee of the children of Israel comes, then their inheritance will be added to the inheritance of the tribe into which they marry; so their inheritance will be taken away from the inheritance of the tribe of our fathers.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses commanded the children of Israel according to the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:7
      marker-yv: yv-n
    - type: text
      text: '“What the tribe of the sons of Joseph speaks is right. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' what the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commands concerning the daughters of Zelophehad, saying, ‘Let them marry whom they think best, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 36:11, 12
      marker-yv: yv-n
    - type: text
      text: 'but they may marry only within the family of their father’s tribe.’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the inheritance of the children of Israel shall not change hands from tribe to tribe, for every one of the children of Israel shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 21:3
      marker-yv: yv-n
    - type: text
      text: 'keep the inheritance of the tribe of his fathers. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:22
      marker-yv: yv-n
    - type: text
      text: 'every daughter who possesses an inheritance in any tribe of the children of Israel shall be the wife of one of the family of her father’s tribe, so that the children of Israel each may possess the inheritance of his fathers. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus no inheritance shall change hands from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' tribe to another, but every tribe of the children of Israel shall keep its own inheritance.”'
