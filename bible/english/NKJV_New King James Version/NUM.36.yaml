document_id: NUM.36,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Marriage of Female Heirs
  - type: text
    content: 'Now the chief fathers of the families of the '
  - type: note
    content: Num. 26:29
  - type: text
    content: 'children of Gilead the son of Machir, the son of Manasseh, of the families of the sons of Joseph, came near and '
  - type: note
    content: Num. 27:1–11
  - type: text
    content: 'spoke before Moses and before the leaders, the chief fathers of the children of Israel. '
  '10':
  - type: text
    content: 'Just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses, so did the daughters of Zelophehad; '
  '11':
  - type: note
    content: Num. 26:33; 27:1
  - type: text
    content: 'for Mahlah, Tirzah, Hoglah, Milcah, and Noah, the daughters of Zelophehad, were married to the sons of their father’s brothers. '
  '12':
  - type: text
    content: They were married into the families of the children of Manasseh the son of Joseph, and their inheritance remained in the tribe of their father’s family.
  '13':
  - type: text
    content: 'These '
  - type: text
    content: are
  - type: text
    content: ' the commandments and the judgments which the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded the children of Israel by the hand of Moses '
  - type: note
    content: Num. 26:3; 33:50
  - type: text
    content: 'in the plains of Moab by the Jordan, '
  - type: text
    content: across
  - type: text
    content: ' '
  - type: text
    content: from
  - type: text
    content: ' Jericho.'
  '2':
  - type: text
    content: 'And they said: '
  - type: note
    content: Num. 26:55; 33:54; Josh. 17:4
  - type: text
    content: '“The '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded my lord '
  - type: text
    content: Moses
  - type: text
    content: ' to give the land as an inheritance by lot to the children of Israel, and '
  - type: note
    content: Num. 27:1, 5–7
  - type: text
    content: 'my lord was commanded by the '
  - type: heading
    content: Lord
  - type: text
    content: ' to give the inheritance of our brother Zelophehad to his daughters. '
  '3':
  - type: text
    content: 'Now if they are married to any of the sons of the '
  - type: text
    content: other
  - type: text
    content: ' tribes of the children of Israel, then their inheritance will be '
  - type: note
    content: Num. 27:4
  - type: text
    content: 'taken from the inheritance of our fathers, and it will be added to the inheritance of the tribe into which they marry; so it will be taken from the lot of our inheritance. '
  '4':
  - type: text
    content: 'And when '
  - type: note
    content: Lev. 25:10
  - type: text
    content: the Jubilee of the children of Israel comes, then their inheritance will be added to the inheritance of the tribe into which they marry; so their inheritance will be taken away from the inheritance of the tribe of our fathers.”
  '5':
  - type: text
    content: 'Then Moses commanded the children of Israel according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying: '
  - type: note
    content: Num. 27:7
  - type: text
    content: '“What the tribe of the sons of Joseph speaks is right. '
  '6':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' what the '
  - type: heading
    content: Lord
  - type: text
    content: ' commands concerning the daughters of Zelophehad, saying, ‘Let them marry whom they think best, '
  - type: note
    content: Num. 36:11, 12
  - type: text
    content: 'but they may marry only within the family of their father’s tribe.’ '
  '7':
  - type: text
    content: 'So the inheritance of the children of Israel shall not change hands from tribe to tribe, for every one of the children of Israel shall '
  - type: note
    content: 1 Kin. 21:3
  - type: text
    content: 'keep the inheritance of the tribe of his fathers. '
  '8':
  - type: text
    content: 'And '
  - type: note
    content: 1 Chr. 23:22
  - type: text
    content: 'every daughter who possesses an inheritance in any tribe of the children of Israel shall be the wife of one of the family of her father’s tribe, so that the children of Israel each may possess the inheritance of his fathers. '
  '9':
  - type: text
    content: 'Thus no inheritance shall change hands from '
  - type: text
    content: one
  - type: text
    content: ' tribe to another, but every tribe of the children of Israel shall keep its own inheritance.”'
