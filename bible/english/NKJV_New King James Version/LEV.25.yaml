document_id: LEV.25,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sabbath of the Seventh Year
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses on Mount '
  - type: note
    content: Lev. 26:46
  - type: text
    content: 'Sinai, saying, '
  '10':
  - type: text
    content: 'And you shall consecrate the fiftieth year, and '
  - type: note
    content: Is. 61:2; 63:4; Jer. 34:8, 15, 17; (Luke 4:19)
  - type: text
    content: 'proclaim liberty throughout all the land to all its inhabitants. It shall be a Jubilee for you; and each of you shall return to his possession, '
  - type: note
    content: Lev. 25:13, 28, 54; Num. 36:4
  - type: text
    content: 'and each of you shall return to his family. '
  '11':
  - type: text
    content: 'That fiftieth year shall be a Jubilee to you; in it '
  - type: note
    content: Lev. 25:5
  - type: text
    content: 'you shall neither sow nor reap what grows of its own accord, nor gather the grapes of your untended vine. '
  '12':
  - type: text
    content: 'For it is the Jubilee; it shall be holy to you; '
  - type: note
    content: Lev. 25:6, 7
  - type: text
    content: you shall eat its produce from the field.
  '13':
  - type: note
    content: Lev. 25:10; 27:24; Num. 36:4
  - type: text
    content: '‘In this Year of Jubilee, each of you shall return to his possession. '
  '14':
  - type: text
    content: 'And if you sell anything to your neighbor or buy from your neighbor’s hand, you shall not '
  - type: note
    content: Lev. 19:13
  - type: text
    content: 'oppress one another. '
  '15':
  - type: note
    content: Lev. 27:18, 23
  - type: text
    content: 'According to the number of years after the Jubilee you shall buy from your neighbor, and according to the number of years of crops he shall sell to you. '
  '16':
  - type: text
    content: 'According to the multitude of years you shall increase its price, and according to the fewer number of years you shall diminish its price; for he sells to you according to the number of the years of the crops. '
  '17':
  - type: text
    content: 'Therefore '
  - type: note
    content: Lev. 25:14; Prov. 14:31; 22:22; Jer. 7:5, 6; 1 Thess. 4:6
  - type: text
    content: 'you shall not oppress one another, '
  - type: note
    content: Lev. 19:14, 32; 25:43
  - type: text
    content: 'but you shall fear your God; for I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  - type: heading
    content: Provisions for the Seventh Year
  '18':
  - type: note
    content: Lev. 19:37
  - type: text
    content: '‘So you shall observe My statutes and keep My judgments, and perform them; '
  - type: note
    content: Lev. 26:5; Deut. 12:10; Ps. 4:8; Jer. 23:6
  - type: text
    content: 'and you will dwell in the land in safety. '
  '19':
  - type: text
    content: 'Then the land will yield its fruit, and '
  - type: note
    content: Lev. 26:5; Ezek. 34:25
  - type: text
    content: you will eat your fill, and dwell there in safety.
  '2':
  - type: text
    content: '“Speak to the children of Israel, and say to them: ‘When you come into the land which I give you, then the land shall '
  - type: note
    content: Lev. 26:34, 35
  - type: text
    content: 'keep a sabbath to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: '‘And if you say, '
  - type: note
    content: Matt. 6:25, 31
  - type: text
    content: '“What shall we eat in the seventh year, since '
  - type: note
    content: Lev. 25:4, 5
  - type: text
    content: 'we shall not sow nor gather in our produce?” '
  '21':
  - type: text
    content: 'Then I will '
  - type: note
    content: Deut. 28:8
  - type: text
    content: 'command My blessing on you in the '
  - type: note
    content: Ex. 16:29
  - type: text
    content: 'sixth year, and it will bring forth produce enough for three years. '
  '22':
  - type: note
    content: 2 Kin. 19:29
  - type: text
    content: 'And you shall sow in the eighth year, and eat '
  - type: note
    content: Lev. 26:10; Josh. 5:11
  - type: text
    content: old produce until the ninth year; until its produce comes in, you shall eat of the old harvest.
  - type: heading
    content: Redemption of Property
  '23':
  - type: text
    content: '‘The land shall not be sold permanently, for '
  - type: note
    content: Ex. 19:5; 2 Chr. 7:20
  - type: text
    content: 'the land is Mine; for you are '
  - type: note
    content: Gen. 23:4; Ex. 6:4; 1 Chr. 29:15; Ps. 39:12; Heb. 11:13; 1 Pet. 2:11
  - type: text
    content: 'strangers and sojourners with Me. '
  '24':
  - type: text
    content: And in all the land of your possession you shall grant redemption of the land.
  '25':
  - type: note
    content: Ruth 2:20; 4:4, 6
  - type: text
    content: '‘If one of your brethren becomes poor, and has sold some of his possession, and if '
  - type: note
    content: Num. 5:8; Ruth 3:2, 9, 12; (Job 19:25); Jer. 32:7, 8
  - type: text
    content: 'his redeeming relative comes to redeem it, then he may redeem what his brother sold. '
  '26':
  - type: text
    content: 'Or if the man has no one to redeem it, but he himself becomes able to redeem it, '
  '27':
  - type: text
    content: 'then '
  - type: note
    content: Lev. 25:50–52
  - type: text
    content: 'let him count the years since its sale, and restore the remainder to the man to whom he sold it, that he may return to his possession. '
  '28':
  - type: text
    content: 'But if he is not able to have it restored to himself, then what was sold shall remain in the hand of him who bought it until the Year of Jubilee; '
  - type: note
    content: Lev. 25:10, 13
  - type: text
    content: and in the Jubilee it shall be released, and he shall return to his possession.
  '29':
  - type: text
    content: '‘If a man sells a house in a walled city, then he may redeem it within a whole year after it is sold; within a full year he may redeem it. '
  '3':
  - type: text
    content: 'Six years you shall sow your field, and six years you shall prune your vineyard, and gather its fruit; '
  '30':
  - type: text
    content: 'But if it is not redeemed within the space of a full year, then the house in the walled city shall belong permanently to him who bought it, throughout his generations. It shall not be released in the Jubilee. '
  '31':
  - type: text
    content: 'However the houses of villages which have no wall around them shall be counted as the fields of the country. They may be redeemed, and they shall be released in the Jubilee. '
  '32':
  - type: text
    content: 'Nevertheless '
  - type: note
    content: Num. 35:1–8; Josh. 21:2
  - type: text
    content: 'the cities of the Levites, and the houses in the cities of their possession, the Levites may redeem at any time. '
  '33':
  - type: text
    content: 'And if a man purchases a house from the Levites, then the house that was sold in the city of his possession shall be released in the Jubilee; for the houses in the cities of the Levites are their possession among the children of Israel. '
  '34':
  - type: text
    content: 'But '
  - type: note
    content: Num. 35:2–5
  - type: text
    content: 'the field of the common-land of their cities may not be '
  - type: note
    content: Acts 4:36, 37
  - type: text
    content: sold, for it is their perpetual possession.
  - type: heading
    content: Lending to the Poor
  '35':
  - type: text
    content: '‘If one of your brethren becomes poor, and falls into poverty among you, then you shall '
  - type: note
    content: Deut. 15:7–11; 24:14, 15; Luke 6:35; 1 John 3:17
  - type: text
    content: 'help him, like a stranger or a sojourner, that he may live with you. '
  '36':
  - type: note
    content: Ex. 22:25; Deut. 23:19, 20
  - type: text
    content: 'Take no usury or interest from him; but '
  - type: note
    content: Neh. 5:9
  - type: text
    content: 'fear your God, that your brother may live with you. '
  '37':
  - type: text
    content: 'You shall not lend him your money for usury, nor lend him your food at a profit. '
  '38':
  - type: note
    content: Lev. 11:45; 22:32, 33
  - type: text
    content: 'I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, who brought you out of the land of Egypt, to give you the land of Canaan and to be your God.'
  - type: heading
    content: The Law Concerning Slavery
  '39':
  - type: text
    content: '‘And if one of your brethren who dwells by you becomes poor, and sells himself to you, you shall not compel him to serve as a slave. '
  '4':
  - type: text
    content: 'but in the '
  - type: note
    content: Deut. 15:1; Neh. 10:31
  - type: text
    content: 'seventh year there shall be a sabbath of solemn '
  - type: note
    content: (Heb. 4:9)
  - type: text
    content: 'rest for the land, a sabbath to the '
  - type: heading
    content: Lord
  - type: text
    content: '. You shall neither sow your field nor prune your vineyard. '
  '40':
  - type: text
    content: 'As a hired servant and a sojourner he shall be with you, and shall serve you until the Year of Jubilee. '
  '41':
  - type: text
    content: 'And then he shall depart from you—he and his children '
  - type: note
    content: Ex. 21:3
  - type: text
    content: 'with him—and shall return to his own family. He shall return to the possession of his fathers. '
  '42':
  - type: text
    content: 'For they are '
  - type: note
    content: Lev. 25:55; (Rom. 6:22; 1 Cor. 7:22, 23)
  - type: text
    content: 'My servants, whom I brought out of the land of Egypt; they shall not be sold as slaves. '
  '43':
  - type: note
    content: Eph. 6:9; Col. 4:1
  - type: text
    content: 'You shall not rule over him '
  - type: note
    content: Ex. 1:13, 14; Lev. 25:46, 53; Ezek. 34:4
  - type: text
    content: 'with rigor, but you '
  - type: note
    content: Ex. 1:17; Deut. 25:18; Mal. 3:5
  - type: text
    content: 'shall fear your God. '
  '44':
  - type: text
    content: 'And as for your male and female slaves whom you may have—from the nations that are around you, from them you may buy male and female slaves. '
  '45':
  - type: text
    content: 'Moreover you may buy '
  - type: note
    content: (Is. 56:3, 6, 7)
  - type: text
    content: 'the children of the strangers who dwell among you, and their families who are with you, which they beget in your land; and they shall become your property. '
  '46':
  - type: text
    content: 'And '
  - type: note
    content: Is. 14:2
  - type: text
    content: you may take them as an inheritance for your children after you, to inherit them as a possession; they shall be your permanent slaves. But regarding your brethren, the children of Israel, you shall not rule over one another with rigor.
  '47':
  - type: text
    content: '‘Now if a sojourner or stranger close to you becomes rich, and one of your brethren who dwells by him becomes poor, and sells himself to the stranger or sojourner close to you, or to a member of the stranger’s family, '
  '48':
  - type: text
    content: 'after he is sold he may be redeemed again. One of his brothers may redeem him; '
  '49':
  - type: text
    content: 'or his uncle or his uncle’s son may redeem him; or anyone who is near of kin to him in his family may redeem him; or if he is able he may redeem himself. '
  '5':
  - type: note
    content: 2 Kin. 19:29
  - type: text
    content: 'What grows of its own accord of your harvest you shall not reap, nor gather the grapes of your untended vine, for it is a year of rest for the land. '
  '50':
  - type: text
    content: 'Thus he shall reckon with him who bought him: The price of his release shall be according to the number of years, from the year that he was sold to him until the Year of Jubilee; it shall be '
  - type: note
    content: Job 7:1; Is. 16:14
  - type: text
    content: 'according to the time of a hired servant for him. '
  '51':
  - type: text
    content: 'If there are still many years remaining, according to them he shall repay the price of his redemption from the money with which he was bought. '
  '52':
  - type: text
    content: 'And if there remain but a few years until the Year of Jubilee, then he shall reckon with him, and according to his years he shall repay him the price of his redemption. '
  '53':
  - type: text
    content: 'He shall be with him as a yearly hired servant, and he shall not rule with rigor over him in your sight. '
  '54':
  - type: text
    content: 'And if he is not redeemed in these years, then he shall be released in the Year of Jubilee—he and his children with him. '
  '55':
  - type: text
    content: 'For the children of Israel are servants to Me; they are My servants whom I brought out of the land of Egypt: I am the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God.'
  '6':
  - type: text
    content: 'And the sabbath produce of the land shall be food for you: for you, your male and female servants, your hired man, and the stranger who dwells with you, '
  '7':
  - type: text
    content: for your livestock and the beasts that are in your land—all its produce shall be for food.
  - type: heading
    content: The Year of Jubilee
  '8':
  - type: text
    content: '‘And you shall count seven sabbaths of years for yourself, seven times seven years; and the time of the seven sabbaths of years shall be to you forty-nine years. '
  '9':
  - type: text
    content: 'Then you shall cause the trumpet of the Jubilee to sound on the tenth day of the seventh month; '
  - type: note
    content: Lev. 23:24, 27
  - type: text
    content: 'on the Day of Atonement you shall make the trumpet to sound throughout all your land. '
