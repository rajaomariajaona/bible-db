document_id: LEV.25
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sabbath of the Seventh Year
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Moses on Mount '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:46
    marker-yv: yv-n
  - type: text
    text: 'Sinai, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Speak to the children of Israel, and say to them: ‘When you come into the land which I give you, then the land shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:34, 35
    marker-yv: yv-n
  - type: text
    text: 'keep a sabbath to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Six years you shall sow your field, and six years you shall prune your vineyard, and gather its fruit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'but in the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 15:1; Neh. 10:31
    marker-yv: yv-n
  - type: text
    text: 'seventh year there shall be a sabbath of solemn '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Heb. 4:9)
    marker-yv: yv-n
  - type: text
    text: 'rest for the land, a sabbath to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. You shall neither sow your field nor prune your vineyard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 19:29
    marker-yv: yv-n
  - type: text
    text: 'What grows of its own accord of your harvest you shall not reap, nor gather the grapes of your untended vine, for it is a year of rest for the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the sabbath produce of the land shall be food for you: for you, your male and female servants, your hired man, and the stranger who dwells with you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: for your livestock and the beasts that are in your land—all its produce shall be for food.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Year of Jubilee
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '‘And you shall count seven sabbaths of years for yourself, seven times seven years; and the time of the seven sabbaths of years shall be to you forty-nine years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then you shall cause the trumpet of the Jubilee to sound on the tenth day of the seventh month; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 23:24, 27
    marker-yv: yv-n
  - type: text
    text: 'on the Day of Atonement you shall make the trumpet to sound throughout all your land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And you shall consecrate the fiftieth year, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 61:2; 63:4; Jer. 34:8, 15, 17; (Luke 4:19)
    marker-yv: yv-n
  - type: text
    text: 'proclaim liberty throughout all the land to all its inhabitants. It shall be a Jubilee for you; and each of you shall return to his possession, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:13, 28, 54; Num. 36:4
    marker-yv: yv-n
  - type: text
    text: 'and each of you shall return to his family. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'That fiftieth year shall be a Jubilee to you; in it '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:5
    marker-yv: yv-n
  - type: text
    text: 'you shall neither sow nor reap what grows of its own accord, nor gather the grapes of your untended vine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For it is the Jubilee; it shall be holy to you; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:6, 7
    marker-yv: yv-n
  - type: text
    text: you shall eat its produce from the field.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:10; 27:24; Num. 36:4
    marker-yv: yv-n
  - type: text
    text: '‘In this Year of Jubilee, each of you shall return to his possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And if you sell anything to your neighbor or buy from your neighbor’s hand, you shall not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:13
    marker-yv: yv-n
  - type: text
    text: 'oppress one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 27:18, 23
    marker-yv: yv-n
  - type: text
    text: 'According to the number of years after the Jubilee you shall buy from your neighbor, and according to the number of years of crops he shall sell to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'According to the multitude of years you shall increase its price, and according to the fewer number of years you shall diminish its price; for he sells to you according to the number of the years of the crops. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Therefore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:14; Prov. 14:31; 22:22; Jer. 7:5, 6; 1 Thess. 4:6
    marker-yv: yv-n
  - type: text
    text: 'you shall not oppress one another, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:14, 32; 25:43
    marker-yv: yv-n
  - type: text
    text: 'but you shall fear your God; for I am the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Provisions for the Seventh Year
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:37
    marker-yv: yv-n
  - type: text
    text: '‘So you shall observe My statutes and keep My judgments, and perform them; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:5; Deut. 12:10; Ps. 4:8; Jer. 23:6
    marker-yv: yv-n
  - type: text
    text: 'and you will dwell in the land in safety. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then the land will yield its fruit, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:5; Ezek. 34:25
    marker-yv: yv-n
  - type: text
    text: you will eat your fill, and dwell there in safety.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '‘And if you say, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 6:25, 31
    marker-yv: yv-n
  - type: text
    text: '“What shall we eat in the seventh year, since '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:4, 5
    marker-yv: yv-n
  - type: text
    text: 'we shall not sow nor gather in our produce?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then I will '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 28:8
    marker-yv: yv-n
  - type: text
    text: 'command My blessing on you in the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 16:29
    marker-yv: yv-n
  - type: text
    text: 'sixth year, and it will bring forth produce enough for three years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 19:29
    marker-yv: yv-n
  - type: text
    text: 'And you shall sow in the eighth year, and eat '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:10; Josh. 5:11
    marker-yv: yv-n
  - type: text
    text: old produce until the ninth year; until its produce comes in, you shall eat of the old harvest.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Redemption of Property
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '‘The land shall not be sold permanently, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 19:5; 2 Chr. 7:20
    marker-yv: yv-n
  - type: text
    text: 'the land is Mine; for you are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 23:4; Ex. 6:4; 1 Chr. 29:15; Ps. 39:12; Heb. 11:13; 1 Pet. 2:11
    marker-yv: yv-n
  - type: text
    text: 'strangers and sojourners with Me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And in all the land of your possession you shall grant redemption of the land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ruth 2:20; 4:4, 6
    marker-yv: yv-n
  - type: text
    text: '‘If one of your brethren becomes poor, and has sold some of his possession, and if '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 5:8; Ruth 3:2, 9, 12; (Job 19:25); Jer. 32:7, 8
    marker-yv: yv-n
  - type: text
    text: 'his redeeming relative comes to redeem it, then he may redeem what his brother sold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Or if the man has no one to redeem it, but he himself becomes able to redeem it, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:50–52
    marker-yv: yv-n
  - type: text
    text: 'let him count the years since its sale, and restore the remainder to the man to whom he sold it, that he may return to his possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'But if he is not able to have it restored to himself, then what was sold shall remain in the hand of him who bought it until the Year of Jubilee; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:10, 13
    marker-yv: yv-n
  - type: text
    text: and in the Jubilee it shall be released, and he shall return to his possession.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '‘If a man sells a house in a walled city, then he may redeem it within a whole year after it is sold; within a full year he may redeem it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But if it is not redeemed within the space of a full year, then the house in the walled city shall belong permanently to him who bought it, throughout his generations. It shall not be released in the Jubilee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'However the houses of villages which have no wall around them shall be counted as the fields of the country. They may be redeemed, and they shall be released in the Jubilee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nevertheless '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 35:1–8; Josh. 21:2
    marker-yv: yv-n
  - type: text
    text: 'the cities of the Levites, and the houses in the cities of their possession, the Levites may redeem at any time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And if a man purchases a house from the Levites, then the house that was sold in the city of his possession shall be released in the Jubilee; for the houses in the cities of the Levites are their possession among the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 35:2–5
    marker-yv: yv-n
  - type: text
    text: 'the field of the common-land of their cities may not be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 4:36, 37
    marker-yv: yv-n
  - type: text
    text: sold, for it is their perpetual possession.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lending to the Poor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '‘If one of your brethren becomes poor, and falls into poverty among you, then you shall '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 15:7–11; 24:14, 15; Luke 6:35; 1 John 3:17
    marker-yv: yv-n
  - type: text
    text: 'help him, like a stranger or a sojourner, that he may live with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:25; Deut. 23:19, 20
    marker-yv: yv-n
  - type: text
    text: 'Take no usury or interest from him; but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 5:9
    marker-yv: yv-n
  - type: text
    text: 'fear your God, that your brother may live with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'You shall not lend him your money for usury, nor lend him your food at a profit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 11:45; 22:32, 33
    marker-yv: yv-n
  - type: text
    text: 'I am the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, who brought you out of the land of Egypt, to give you the land of Canaan and to be your God.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Law Concerning Slavery
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '‘And if one of your brethren who dwells by you becomes poor, and sells himself to you, you shall not compel him to serve as a slave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'As a hired servant and a sojourner he shall be with you, and shall serve you until the Year of Jubilee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And then he shall depart from you—he and his children '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 21:3
    marker-yv: yv-n
  - type: text
    text: 'with him—and shall return to his own family. He shall return to the possession of his fathers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'For they are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 25:55; (Rom. 6:22; 1 Cor. 7:22, 23)
    marker-yv: yv-n
  - type: text
    text: 'My servants, whom I brought out of the land of Egypt; they shall not be sold as slaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 6:9; Col. 4:1
    marker-yv: yv-n
  - type: text
    text: 'You shall not rule over him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 1:13, 14; Lev. 25:46, 53; Ezek. 34:4
    marker-yv: yv-n
  - type: text
    text: 'with rigor, but you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 1:17; Deut. 25:18; Mal. 3:5
    marker-yv: yv-n
  - type: text
    text: 'shall fear your God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And as for your male and female slaves whom you may have—from the nations that are around you, from them you may buy male and female slaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Moreover you may buy '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 56:3, 6, 7)
    marker-yv: yv-n
  - type: text
    text: 'the children of the strangers who dwell among you, and their families who are with you, which they beget in your land; and they shall become your property. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 14:2
    marker-yv: yv-n
  - type: text
    text: you may take them as an inheritance for your children after you, to inherit them as a possession; they shall be your permanent slaves. But regarding your brethren, the children of Israel, you shall not rule over one another with rigor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '‘Now if a sojourner or stranger close to you becomes rich, and one of your brethren who dwells by him becomes poor, and sells himself to the stranger or sojourner close to you, or to a member of the stranger’s family, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'after he is sold he may be redeemed again. One of his brothers may redeem him; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'or his uncle or his uncle’s son may redeem him; or anyone who is near of kin to him in his family may redeem him; or if he is able he may redeem himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Thus he shall reckon with him who bought him: The price of his release shall be according to the number of years, from the year that he was sold to him until the Year of Jubilee; it shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 7:1; Is. 16:14
    marker-yv: yv-n
  - type: text
    text: 'according to the time of a hired servant for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'If there are still many years remaining, according to them he shall repay the price of his redemption from the money with which he was bought. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'And if there remain but a few years until the Year of Jubilee, then he shall reckon with him, and according to his years he shall repay him the price of his redemption. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'He shall be with him as a yearly hired servant, and he shall not rule with rigor over him in your sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'And if he is not redeemed in these years, then he shall be released in the Year of Jubilee—he and his children with him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
