  - type: text
    content: chasten.
  - type: text
    content: ' Therefore be '
  - type: text
    content: zealous and repent.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Be watchful, and strengthen the things which remain, that are ready to die, for I have not found your works perfect before '
  - type: text
    content: God.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Behold, '
  - type: note
    content: Song 5:2
  - type: text
    content: 'I stand at the door and knock. '
  - type: note
    content: Luke 12:36, 37; John 10:3
  - type: text
    content: 'If anyone hears My voice and opens the door, '
  - type: note
    content: (John 14:23)
  - type: text
    content: I will come in to him and dine with him, and he with Me.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'To him who overcomes '
  - type: note
    content: Matt. 19:28; 2 Tim. 2:12; (Rev. 2:26; 20:4)
  - type: text
    content: I will grant to sit with Me on My throne, as I also overcame and sat down with My Father on His throne.
  '22':
  - type: note
    content: Rev. 2:7
  - type: text
    content: “He who has an ear, let him hear what the Spirit says to the churches.” ’ ”
  '3':
