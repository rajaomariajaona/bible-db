  - type: text
    content: ' '
  '15':
  - type: note
    content: Rev. 3:1
  - type: text
    content: “I know your works, that you are neither cold nor hot. I could wish you were cold or hot.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'So then, because you are lukewarm, and neither '
  - type: text
    content: cold nor hot,
  - type: text
    content: ' I will vomit you out of My mouth.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Because you say, '
  - type: note
    content: Hos. 12:8; Zech. 11:5; (Matt. 5:3); 1 Cor. 4:8
  - type: text
    content: ‘I am rich, have become wealthy, and have need of nothing’—and do not know that you are wretched, miserable, poor, blind, and naked—
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'I counsel you '
  - type: note
    content: Is. 55:1; Matt. 13:44
  - type: text
    content: 'to buy from Me gold refined in the fire, that you may be rich; and '
  - type: note
    content: 2 Cor. 5:3
  - type: text
    content: 'white garments, that you may be clothed, '
  - type: text
    content: that
  - type: text
    content: ' the shame of your nakedness may not be revealed; and anoint your eyes with eye salve, that you may see.'
  - type: text
    content: ' '
