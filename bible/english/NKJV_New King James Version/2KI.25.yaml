  - type: text
    text: The Fall and Captivity of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now it came to pass '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:17; Jer. 6:6; 34:2; Ezek. 4:2; 24:1, 2; Hab. 1:6
    marker-yv: yv-n
  - type: text
    text: 'in the ninth year of his reign, in the tenth month, on the tenth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' Nebuchadnezzar king of Babylon and all his army came against Jerusalem and encamped against it; and they built a siege wall against it all around. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the city was besieged until the eleventh year of King Zedekiah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'By the ninth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 6:24, 25; Is. 3:1; Jer. 39:2; Lam. 4:9, 10
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: fourth
  - type: text
    text: ' month the famine had become so severe in the city that there was no food for the people of the land.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 39:2
    marker-yv: yv-n
  - type: text
    text: 'the city wall was broken through, and all the men of war '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fled
  - type: text
    text: ' at night by way of the gate between two walls, which was by the king’s garden, even though the Chaldeans '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' still encamped all around against the city. And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 39:4–7; Ezek. 12:12
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: king
  - type: text
    text: ' went by way of the plain. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But the army of the Chaldeans pursued the king, and they overtook him in the plains of Jericho. All his army was scattered from him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So they took the king and brought him up to the king of Babylon '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 23:33; Jer. 52:9
    marker-yv: yv-n
  - type: text
    text: 'at Riblah, and they pronounced judgment on him. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then they killed the sons of Zedekiah before his eyes, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 39:7; Ezek. 17:16
    marker-yv: yv-n
  - type: text
    text: put out the eyes of Zedekiah, bound him with bronze fetters, and took him to Babylon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And in the fifth month, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 52:12
    marker-yv: yv-n
  - type: text
    text: 'on the seventh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month (which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:12
    marker-yv: yv-n
  - type: text
    text: 'the nineteenth year of King Nebuchadnezzar king of Babylon), '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 39:9
    marker-yv: yv-n
  - type: text
    text: 'Nebuzaradan the captain of the guard, a servant of the king of Babylon, came to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:13; 2 Chr. 36:19; Ps. 79:1; Jer. 7:14
    marker-yv: yv-n
  - type: text
    text: 'He burned the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 39:8
    marker-yv: yv-n
  - type: text
    text: 'and the king’s house; all the houses of Jerusalem, that is, all the houses of the great, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 17:27
    marker-yv: yv-n
  - type: text
    text: 'he burned with fire. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And all the army of the Chaldeans who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' the captain of the guard '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 14:13; Neh. 1:3
    marker-yv: yv-n
  - type: text
    text: broke down the walls of Jerusalem all around.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then Nebuzaradan the captain of the guard carried away captive '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 1:9; Jer. 5:19; 39:9
    marker-yv: yv-n
  - type: text
    text: 'the rest of the people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' remained in the city and the defectors who had deserted to the king of Babylon, with the rest of the multitude. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But the captain of the guard '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:14; Jer. 39:10; 40:7; 52:16
    marker-yv: yv-n
  - type: text
    text: 'left '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of the poor of the land as vinedressers and farmers. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 52:17
    marker-yv: yv-n
  - type: text
    text: 'The bronze '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:15
    marker-yv: yv-n
  - type: text
    text: 'pillars that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:27
    marker-yv: yv-n
  - type: text
    text: 'the carts and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:23
    marker-yv: yv-n
  - type: text
    text: 'the bronze Sea that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the Chaldeans broke in pieces, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 20:17; Jer. 27:19–22
    marker-yv: yv-n
  - type: text
    text: 'carried their bronze to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They also took away '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 27:3; 1 Kin. 7:45
    marker-yv: yv-n
  - type: text
    text: 'the pots, the shovels, the trimmers, the spoons, and all the bronze utensils with which the priests ministered. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The firepans and the basins, the things of solid gold and solid silver, the captain of the guard took away. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The two pillars, one Sea, and the carts, which Solomon had made for the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:47
    marker-yv: yv-n
  - type: text
    text: 'the bronze of all these articles was beyond measure. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 7:15–22; Jer. 52:21
    marker-yv: yv-n
  - type: text
    text: 'The height of one pillar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' eighteen cubits, and the capital on it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' of bronze. The height of the capital was three cubits, and the network and pomegranates all around the capital were all of bronze. The second pillar was the same, with a network.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 39:9–13; 52:12–16, 24
    marker-yv: yv-n
  - type: text
    text: 'And the captain of the guard took '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 6:14; Ezra 7:1
    marker-yv: yv-n
  - type: text
    text: 'Seraiah the chief priest, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 21:1; 29:25, 29
    marker-yv: yv-n
  - type: text
    text: 'Zephaniah the second priest, and the three doorkeepers. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He also took out of the city an officer who had charge of the men of war, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:14; Jer. 52:25
    marker-yv: yv-n
  - type: text
    text: 'five men of the king’s close associates who were found in the city, the chief recruiting officer of the army, who mustered the people of the land, and sixty men of the people of the land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' found in the city. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So Nebuzaradan, captain of the guard, took these and brought them to the king of Babylon at Riblah. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then the king of Babylon struck them and put them to death at Riblah in the land of Hamath. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:33; Deut. 28:36, 64; 2 Kin. 23:27
    marker-yv: yv-n
  - type: text
    text: Thus Judah was carried away captive from its own land.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gedaliah Made Governor of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then he made Gedaliah the son of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 22:12
    marker-yv: yv-n
  - type: text
    text: 'Ahikam, the son of Shaphan, governor over '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 1:9; Jer. 40:5
    marker-yv: yv-n
  - type: text
    text: 'the people who remained in the land of Judah, whom Nebuchadnezzar king of Babylon had left. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now when all the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 40:7–9
    marker-yv: yv-n
  - type: text
    text: 'captains of the armies, they and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' men, heard that the king of Babylon had made Gedaliah governor, they came to Gedaliah at Mizpah—Ishmael the son of Nethaniah, Johanan the son of Careah, Seraiah the son of Tanhumeth the Netophathite, and Jaazaniah the son of a Maachathite, they and their men. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And Gedaliah took an oath before them and their men, and said to them, “Do not be afraid of the servants of the Chaldeans. Dwell in the land and serve the king of Babylon, and it shall be well with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 41:1–3
    marker-yv: yv-n
  - type: text
    text: 'it happened in the seventh month that Ishmael the son of Nethaniah, the son of Elishama, of the royal family, came with ten men and struck and killed Gedaliah, the Jews, as well as the Chaldeans who were with him at Mizpah. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And all the people, small and great, and the captains of the armies, arose '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 19:31; Jer. 43:4–7
    marker-yv: yv-n
  - type: text
    text: and went to Egypt; for they were afraid of the Chaldeans.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jehoiachin Released from Prison
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:12, 15; Jer. 52:31–34
    marker-yv: yv-n
  - type: text
    text: 'Now it came to pass in the thirty-seventh year of the captivity of Jehoiachin king of Judah, in the twelfth month, on the twenty-seventh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the month, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' Evil-Merodach king of Babylon, in the year that he began to reign, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 40:13, 20
    marker-yv: yv-n
  - type: text
    text: 'released Jehoiachin king of Judah from prison. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'He spoke kindly to him, and gave him a more prominent seat than those of the kings who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' with him in Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So Jehoiachin changed from his prison garments, and he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 9:7
    marker-yv: yv-n
  - type: text
    text: 'ate bread regularly before the king all the days of his life. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And as for his provisions, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a regular ration given him by the king, a portion for each day, all the days of his life.'
