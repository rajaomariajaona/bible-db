verses:
  '1':
  - type: heading
    content: The Fall and Captivity of Judah
  - type: text
    content: 'Now it came to pass '
  - type: note
    content: 2 Chr. 36:17; Jer. 6:6; 34:2; Ezek. 4:2; 24:1, 2; Hab. 1:6
  - type: text
    content: 'in the ninth year of his reign, in the tenth month, on the tenth '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' Nebuchadnezzar king of Babylon and all his army came against Jerusalem and encamped against it; and they built a siege wall against it all around. '
  '10':
  - type: text
    content: 'And all the army of the Chaldeans who '
  - type: text
    content: were
  - type: text
    content: ' '
  - type: text
    content: with
  - type: text
    content: ' the captain of the guard '
  - type: note
    content: 2 Kin. 14:13; Neh. 1:3
  - type: text
    content: broke down the walls of Jerusalem all around.
  '11':
  - type: text
    content: 'Then Nebuzaradan the captain of the guard carried away captive '
  - type: note
    content: Is. 1:9; Jer. 5:19; 39:9
  - type: text
    content: 'the rest of the people '
  - type: text
    content: who
  - type: text
    content: ' remained in the city and the defectors who had deserted to the king of Babylon, with the rest of the multitude. '
  '12':
  - type: text
    content: 'But the captain of the guard '
  - type: note
    content: 2 Kin. 24:14; Jer. 39:10; 40:7; 52:16
  - type: text
    content: 'left '
  - type: text
    content: some
  - type: text
    content: ' of the poor of the land as vinedressers and farmers. '
  '13':
  - type: note
    content: Jer. 52:17
  - type: text
    content: 'The bronze '
  - type: note
    content: 1 Kin. 7:15
  - type: text
    content: 'pillars that '
  - type: text
    content: were
  - type: text
    content: ' in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: 1 Kin. 7:27
  - type: text
    content: 'the carts and '
  - type: note
    content: 1 Kin. 7:23
  - type: text
    content: 'the bronze Sea that '
  - type: text
    content: were
  - type: text
    content: ' in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', the Chaldeans broke in pieces, and '
  - type: note
    content: 2 Kin. 20:17; Jer. 27:19–22
  - type: text
    content: 'carried their bronze to Babylon. '
  '14':
  - type: text
    content: 'They also took away '
  - type: note
    content: Ex. 27:3; 1 Kin. 7:45
  - type: text
    content: 'the pots, the shovels, the trimmers, the spoons, and all the bronze utensils with which the priests ministered. '
  '15':
  - type: text
    content: 'The firepans and the basins, the things of solid gold and solid silver, the captain of the guard took away. '
  '16':
  - type: text
    content: 'The two pillars, one Sea, and the carts, which Solomon had made for the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: 1 Kin. 7:47
  - type: text
    content: 'the bronze of all these articles was beyond measure. '
  '17':
  - type: note
    content: 1 Kin. 7:15–22; Jer. 52:21
  - type: text
    content: 'The height of one pillar '
  - type: text
    content: was
  - type: text
    content: ' eighteen cubits, and the capital on it '
  - type: text
    content: was
  - type: text
    content: ' of bronze. The height of the capital was three cubits, and the network and pomegranates all around the capital were all of bronze. The second pillar was the same, with a network.'
  '18':
  - type: note
    content: Jer. 39:9–13; 52:12–16, 24
  - type: text
    content: 'And the captain of the guard took '
  - type: note
    content: 1 Chr. 6:14; Ezra 7:1
  - type: text
    content: 'Seraiah the chief priest, '
  - type: note
    content: Jer. 21:1; 29:25, 29
  - type: text
    content: 'Zephaniah the second priest, and the three doorkeepers. '
  '19':
  - type: text
    content: 'He also took out of the city an officer who had charge of the men of war, '
  - type: note
    content: Esth. 1:14; Jer. 52:25
  - type: text
    content: 'five men of the king’s close associates who were found in the city, the chief recruiting officer of the army, who mustered the people of the land, and sixty men of the people of the land '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' found in the city. '
  '2':
  - type: text
    content: 'So the city was besieged until the eleventh year of King Zedekiah. '
  '20':
  - type: text
    content: 'So Nebuzaradan, captain of the guard, took these and brought them to the king of Babylon at Riblah. '
  '21':
  - type: text
    content: 'Then the king of Babylon struck them and put them to death at Riblah in the land of Hamath. '
  - type: note
    content: Lev. 26:33; Deut. 28:36, 64; 2 Kin. 23:27
  - type: text
    content: Thus Judah was carried away captive from its own land.
  - type: heading
    content: Gedaliah Made Governor of Judah
  '22':
  - type: text
    content: 'Then he made Gedaliah the son of '
  - type: note
    content: 2 Kin. 22:12
  - type: text
    content: 'Ahikam, the son of Shaphan, governor over '
  - type: note
    content: Is. 1:9; Jer. 40:5
  - type: text
    content: 'the people who remained in the land of Judah, whom Nebuchadnezzar king of Babylon had left. '
  '23':
  - type: text
    content: 'Now when all the '
  - type: note
    content: Jer. 40:7–9
  - type: text
    content: 'captains of the armies, they and '
  - type: text
    content: their
  - type: text
    content: ' men, heard that the king of Babylon had made Gedaliah governor, they came to Gedaliah at Mizpah—Ishmael the son of Nethaniah, Johanan the son of Careah, Seraiah the son of Tanhumeth the Netophathite, and Jaazaniah the son of a Maachathite, they and their men. '
  '24':
  - type: text
    content: And Gedaliah took an oath before them and their men, and said to them, “Do not be afraid of the servants of the Chaldeans. Dwell in the land and serve the king of Babylon, and it shall be well with you.”
  '25':
  - type: text
    content: 'But '
  - type: note
    content: Jer. 41:1–3
  - type: text
    content: 'it happened in the seventh month that Ishmael the son of Nethaniah, the son of Elishama, of the royal family, came with ten men and struck and killed Gedaliah, the Jews, as well as the Chaldeans who were with him at Mizpah. '
  '26':
  - type: text
    content: 'And all the people, small and great, and the captains of the armies, arose '
  - type: note
    content: 2 Kin. 19:31; Jer. 43:4–7
  - type: text
    content: and went to Egypt; for they were afraid of the Chaldeans.
  - type: heading
    content: Jehoiachin Released from Prison
  '27':
  - type: note
    content: 2 Kin. 24:12, 15; Jer. 52:31–34
  - type: text
    content: 'Now it came to pass in the thirty-seventh year of the captivity of Jehoiachin king of Judah, in the twelfth month, on the twenty-seventh '
  - type: text
    content: day
  - type: text
    content: ' of the month, '
  - type: text
    content: that
  - type: text
    content: ' Evil-Merodach king of Babylon, in the year that he began to reign, '
  - type: note
    content: Gen. 40:13, 20
  - type: text
    content: 'released Jehoiachin king of Judah from prison. '
  '28':
  - type: text
    content: 'He spoke kindly to him, and gave him a more prominent seat than those of the kings who '
  - type: text
    content: were
  - type: text
    content: ' with him in Babylon. '
  '29':
  - type: text
    content: 'So Jehoiachin changed from his prison garments, and he '
  - type: note
    content: 2 Sam. 9:7
  - type: text
    content: 'ate bread regularly before the king all the days of his life. '
  '3':
  - type: text
    content: 'By the ninth '
  - type: text
    content: day
  - type: text
    content: ' of the '
  - type: note
    content: 2 Kin. 6:24, 25; Is. 3:1; Jer. 39:2; Lam. 4:9, 10
  - type: text
    content: fourth
  - type: text
    content: ' month the famine had become so severe in the city that there was no food for the people of the land.'
  '30':
  - type: text
    content: 'And as for his provisions, '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' a regular ration given him by the king, a portion for each day, all the days of his life.'
  '4':
  - type: text
    content: 'Then '
  - type: note
    content: Jer. 39:2
  - type: text
    content: 'the city wall was broken through, and all the men of war '
  - type: text
    content: fled
  - type: text
    content: ' at night by way of the gate between two walls, which was by the king’s garden, even though the Chaldeans '
  - type: text
    content: were
  - type: text
    content: ' still encamped all around against the city. And '
  - type: note
    content: Jer. 39:4–7; Ezek. 12:12
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: king
  - type: text
    content: ' went by way of the plain. '
  '5':
  - type: text
    content: 'But the army of the Chaldeans pursued the king, and they overtook him in the plains of Jericho. All his army was scattered from him. '
  '6':
  - type: text
    content: 'So they took the king and brought him up to the king of Babylon '
  - type: note
    content: 2 Kin. 23:33; Jer. 52:9
  - type: text
    content: 'at Riblah, and they pronounced judgment on him. '
  '7':
  - type: text
    content: 'Then they killed the sons of Zedekiah before his eyes, '
  - type: note
    content: Jer. 39:7; Ezek. 17:16
  - type: text
    content: put out the eyes of Zedekiah, bound him with bronze fetters, and took him to Babylon.
  '8':
  - type: text
    content: 'And in the fifth month, '
  - type: note
    content: Jer. 52:12
  - type: text
    content: 'on the seventh '
  - type: text
    content: day
  - type: text
    content: ' of the month (which '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 2 Kin. 24:12
  - type: text
    content: 'the nineteenth year of King Nebuchadnezzar king of Babylon), '
  - type: note
    content: Jer. 39:9
  - type: text
    content: 'Nebuzaradan the captain of the guard, a servant of the king of Babylon, came to Jerusalem. '
  '9':
  - type: note
    content: 2 Kin. 25:13; 2 Chr. 36:19; Ps. 79:1; Jer. 7:14
  - type: text
    content: 'He burned the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Jer. 39:8
  - type: text
    content: 'and the king’s house; all the houses of Jerusalem, that is, all the houses of the great, '
  - type: note
    content: Jer. 17:27
  - type: text
    content: 'he burned with fire. '
