document_id: JHN.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus the True Shepherd
  - type: text
    content: “Most assuredly, I say to you, he who does not enter the sheepfold by the door, but climbs up some other way, the same is a thief and a robber.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'The thief does not come except to steal, and to kill, and to destroy. I have come that they may have life, and that they may have '
  - type: text
    content: it
  - type: text
    content: ' more abundantly.'
  '11':
  - type: note
    content: Gen. 49:24; Is. 40:11; Ezek. 34:23; (Heb. 13:20); 1 Pet. 2:25; 5:4; Rev. 7:17
  - type: text
    content: “I am the good shepherd. The good shepherd gives His life for the sheep.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'But a '
  - type: text
    content: 'hireling, '
  - type: text
    content: he who is
  - type: text
    content: ' not the shepherd, one who does not own the sheep, sees the wolf coming and '
  - type: note
    content: Zech. 11:16, 17
  - type: text
    content: leaves the sheep and flees; and the wolf catches the sheep and scatters them.
  - type: text
    content: ' '
  '13':
  - type: text
    content: The hireling flees because he is a hireling and does not care about the sheep.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'I am the good shepherd; and '
  - type: note
    content: Is. 40:11; Nah. 1:7; Zech. 13:7; John 6:64; 2 Tim. 2:19
  - type: text
    content: 'I know My '
  - type: text
    content: sheep,
  - type: text
    content: ' and '
  - type: note
    content: 2 Tim. 1:12
  - type: text
    content: am known by My own.
  - type: text
    content: ' '
  '15':
  - type: note
    content: Matt. 11:27
  - type: text
    content: 'As the Father knows Me, even so I know the Father; '
  - type: note
    content: Matt. 27:50; Mark 15:37; Luke 23:46; (John 15:13; 19:30); 1 John 3:16
  - type: text
    content: and I lay down My life for the sheep.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And '
  - type: note
    content: Is. 42:6; 56:8; Acts 10:45; 11:18; 13:46
  - type: text
    content: 'other sheep I have which are not of this fold; them also I must bring, and they will hear My voice; '
  - type: note
    content: Ezek. 37:22; John 11:52; 17:20; Eph. 2:13–18; 1 Pet. 2:25
  - type: text
    content: 'and there will be one flock '
  - type: text
    content: and
  - type: text
    content: ' one shepherd.'
  '17':
  - type: text
    content: '“Therefore My Father '
  - type: note
    content: John 5:20
  - type: text
    content: 'loves Me, '
  - type: note
    content: (Is. 53:7, 8, 12; Heb. 2:9)
  - type: text
    content: because I lay down My life that I may take it again.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'No one takes it from Me, but I lay it down of Myself. I '
  - type: note
    content: Matt. 26:53; (John 2:19; 5:26)
  - type: text
    content: 'have power to lay it down, and I have power to take it again. '
  - type: note
    content: (John 6:38; 14:31; 17:4; Acts 2:24, 32)
  - type: text
    content: This command I have received from My Father.”
  '19':
  - type: text
    content: 'Therefore '
  - type: note
    content: John 7:43; 9:16
  - type: text
    content: 'there was a division again among the Jews because of these sayings. '
  '2':
  - type: text
    content: But he who enters by the door is the shepherd of the sheep.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'And many of them said, '
  - type: note
    content: John 7:20
  - type: text
    content: “He has a demon and is mad. Why do you listen to Him?”
  '21':
  - type: text
    content: 'Others said, “These are not the words of one who has a demon. '
  - type: note
    content: (Ex. 4:11)
  - type: text
    content: 'Can a demon '
  - type: note
    content: John 9:6, 7, 32, 33
  - type: text
    content: open the eyes of the blind?”
  - type: heading
    content: The Shepherd Knows His Sheep
  '22':
  - type: text
    content: 'Now it was the Feast of Dedication in Jerusalem, and it was winter. '
  '23':
  - type: text
    content: 'And Jesus walked in the temple, '
  - type: note
    content: Acts 3:11; 5:12
  - type: text
    content: 'in Solomon’s porch. '
  '24':
  - type: text
    content: Then the Jews surrounded Him and said to Him, “How long do You keep us in doubt? If You are the Christ, tell us plainly.”
  '25':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“I told you, and you do not believe. '
  - type: note
    content: John 5:36; 10:38
  - type: text
    content: 'The works that I do in My Father’s name, they '
  - type: note
    content: Matt. 11:4; John 2:11; 20:30
  - type: text
    content: bear witness of Me.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'But '
  - type: note
    content: (John 8:47)
  - type: text
    content: 'you do not believe, because you are not of My sheep, '
  - type: text
    content: as I said to you.
  - type: text
    content: ' '
  '27':
  - type: note
    content: John 10:4, 14
  - type: text
    content: My sheep hear My voice, and I know them, and they follow Me.
  - type: text
    content: ' '
  '28':
  - type: text
    content: And I give them eternal life, and they shall never perish; neither shall anyone snatch them out of My hand.
  - type: text
    content: ' '
  '29':
  - type: note
    content: John 14:28
  - type: text
    content: 'My Father, '
  - type: note
    content: (John 17:2, 6, 12, 24)
  - type: text
    content: 'who has given '
  - type: text
    content: them
  - type: text
    content: ' to Me, is greater than all; and no one is able to snatch '
  - type: text
    content: them
  - type: text
    content: ' out of My Father’s hand.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'To him the doorkeeper opens, and the sheep hear his voice; and he calls his own sheep by '
  - type: note
    content: John 20:16
  - type: text
    content: name and leads them out.
  - type: text
    content: ' '
  '30':
  - type: note
    content: John 17:11, 21–24
  - type: text
    content: 'I and '
  - type: text
    content: My
  - type: text
    content: ' Father are one.”'
  - type: heading
    content: Renewed Efforts to Stone Jesus
  '31':
  - type: text
    content: 'Then '
  - type: note
    content: John 8:59
  - type: text
    content: 'the Jews took up stones again to stone Him. '
  '32':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “Many good works I have shown you from My Father. For which of those works do you stone Me?”
  '33':
  - type: text
    content: 'The Jews answered Him, saying, “For a good work we do not stone You, but for '
  - type: note
    content: Matt. 9:3
  - type: text
    content: 'blasphemy, and because You, being a Man, '
  - type: note
    content: John 5:18
  - type: text
    content: make Yourself God.”
  '34':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: '“Is it not written in your law, '
  - type: note
    content: Ps. 82:6
  - type: text
    content: ‘I said, “You are gods” ’
  - type: text
    content: '?'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'If He called them gods, '
  - type: note
    content: Matt. 5:17, 18
  - type: text
    content: 'to whom the word of God came (and the Scripture '
  - type: note
    content: 1 Pet. 1:25
  - type: text
    content: cannot be broken),
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'do you say of Him '
  - type: note
    content: John 6:27
  - type: text
    content: 'whom the Father sanctified and '
  - type: note
    content: John 3:17
  - type: text
    content: 'sent into the world, ‘You are blaspheming,’ '
  - type: note
    content: John 5:17, 18
  - type: text
    content: 'because I said, ‘I am '
  - type: note
    content: Luke 1:35
  - type: text
    content: the Son of God’?
  - type: text
    content: ' '
  '37':
  - type: note
    content: John 10:25; 15:24
  - type: text
    content: If I do not do the works of My Father, do not believe Me;
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'but if I do, though you do not believe Me, '
  - type: note
    content: John 5:36
  - type: text
    content: 'believe the works, that you may know and '
  - type: text
    content: believe
  - type: text
    content: ' '
  - type: note
    content: John 14:10, 11
  - type: text
    content: 'that the Father '
  - type: text
    content: is
  - type: text
    content: ' in Me, and I in Him.”'
  - type: text
    content: ' '
  '39':
  - type: note
    content: John 7:30, 44
  - type: text
    content: Therefore they sought again to seize Him, but He escaped out of their hand.
  - type: heading
    content: The Believers Beyond Jordan
  '4':
  - type: text
    content: And when he brings out his own sheep, he goes before them; and the sheep follow him, for they know his voice.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'And He went away again beyond the Jordan to the place '
  - type: note
    content: John 1:28
  - type: text
    content: 'where John was baptizing at first, and there He stayed. '
  '41':
  - type: text
    content: 'Then many came to Him and said, “John performed no sign, '
  - type: note
    content: (John 1:29, 36; 3:28–36; 5:33)
  - type: text
    content: 'but all the things that John spoke about this Man were true.” '
  '42':
  - type: text
    content: And many believed in Him there.
  '5':
  - type: text
    content: 'Yet they will by no means follow a '
  - type: note
    content: (2 Cor. 11:13–15)
  - type: text
    content: stranger, but will flee from him, for they do not know the voice of strangers.”
  - type: text
    content: ' '
  '6':
  - type: text
    content: Jesus used this illustration, but they did not understand the things which He spoke to them.
  - type: heading
    content: Jesus the Good Shepherd
  '7':
  - type: text
    content: 'Then Jesus said to them again, '
  - type: text
    content: “Most assuredly, I say to you, I am the door of the sheep.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'All who '
  - type: text
    content: ever
  - type: text
    content: ' came '
  - type: text
    content: before Me
  - type: text
    content: ' are thieves and robbers, but the sheep did not hear them.'
  - type: text
    content: ' '
  '9':
  - type: note
    content: (John 14:6; Eph. 2:18)
  - type: text
    content: I am the door. If anyone enters by Me, he will be saved, and will go in and out and find pasture.
  - type: text
    content: ' '
