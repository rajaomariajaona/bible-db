document_id: COL.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Masters,
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:9
      marker-yv: yv-n
    - type: text
      text: ' give your bondservants what is just and fair, knowing that you also have a Master in heaven.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christian Graces
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:29; 20:4; 27:2; Philem. 24
      marker-yv: yv-n
    - type: text
      text: 'Aristarchus my fellow prisoner greets you, with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 15:37; 2 Tim. 4:11
      marker-yv: yv-n
    - type: text
      text: 'Mark the cousin of Barnabas (about whom you received instructions: if he comes to you, welcome him), '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jesus who is called Justus. These '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my
    - type: text
      text: ' only fellow workers for the kingdom of God who are of the circumcision; they have proved to be a comfort to me.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 1:7; Philem. 23
      marker-yv: yv-n
    - type: text
      text: 'Epaphras, who is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' of you, a bondservant of Christ, greets you, always '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:30
      marker-yv: yv-n
    - type: text
      text: 'laboring fervently for you in prayers, that you may stand '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 5:48; 1 Cor. 2:6
      marker-yv: yv-n
    - type: text
      text: 'perfect and complete in all the will of God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I bear him witness that he has a great zeal for you, and those who are in Laodicea, and those in Hierapolis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 4:11; Philem. 24
      marker-yv: yv-n
    - type: text
      text: 'Luke the beloved physician and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 4:10
      marker-yv: yv-n
    - type: text
      text: 'Demas greet you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greet the brethren who are in Laodicea, and Nymphas and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:5; 1 Cor. 16:19
      marker-yv: yv-n
    - type: text
      text: 'the church that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in his house.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Closing Exhortations and Blessing
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 5:27; 2 Thess. 3:14
      marker-yv: yv-n
    - type: text
      text: 'this epistle is read among you, see that it is read also in the church of the Laodiceans, and that you likewise read the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: epistle
    - type: text
      text: ' from Laodicea. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And say to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Philem. 2
      marker-yv: yv-n
    - type: text
      text: 'Archippus, “Take heed to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 4:6; 2 Tim. 4:5
      marker-yv: yv-n
    - type: text
      text: the ministry which you have received in the Lord, that you may fulfill it.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:21; 2 Thess. 3:17
      marker-yv: yv-n
    - type: text
      text: 'This salutation by my own hand—Paul. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 13:3
      marker-yv: yv-n
    - type: text
      text: 'Remember my chains. Grace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' with you. Amen.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 18:1
      marker-yv: yv-n
    - type: text
      text: 'Continue earnestly in prayer, being vigilant in it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 2:7
      marker-yv: yv-n
    - type: text
      text: 'with thanksgiving; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:19
      marker-yv: yv-n
    - type: text
      text: 'meanwhile praying also for us, that God would '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:9
      marker-yv: yv-n
    - type: text
      text: 'open to us a door for the word, to speak '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 3:3, 4; 6:19
      marker-yv: yv-n
    - type: text
      text: 'the mystery of Christ, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:20
      marker-yv: yv-n
    - type: text
      text: 'for which I am also in chains, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that I may make it manifest, as I ought to speak.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 5:15
      marker-yv: yv-n
    - type: text
      text: 'Walk in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 10:16)
      marker-yv: yv-n
    - type: text
      text: 'wisdom toward those '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' outside, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 5:16
      marker-yv: yv-n
    - type: text
      text: 'redeeming the time. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Let
    - type: text
      text: ' your speech always '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 10:12
      marker-yv: yv-n
    - type: text
      text: 'with grace, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 9:50
      marker-yv: yv-n
    - type: text
      text: 'seasoned with salt, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Pet. 3:15
      marker-yv: yv-n
    - type: text
      text: that you may know how you ought to answer each one.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Final Greetings
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:4; Eph. 6:21; 2 Tim. 4:12; Titus 3:12
      marker-yv: yv-n
    - type: text
      text: 'Tychicus, a beloved brother, faithful minister, and fellow servant in the Lord, will tell you all the news about me. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:22
      marker-yv: yv-n
    - type: text
      text: 'I am sending him to you for this very purpose, that he may know your circumstances and comfort your hearts, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Philem. 10
      marker-yv: yv-n
    - type: text
      text: 'Onesimus, a faithful and beloved brother, who is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' of you. They will make known to you all things which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: happening
    - type: text
      text: ' here.'
