    children:
    - type: text
      text: Jeremiah Saved from Death
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the beginning of the reign of Jehoiakim the son of Josiah, king of Judah, this word came from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When the princes of Judah heard these things, they came up from the king’s house to the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and sat down in the entry of the New Gate of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: house.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the priests and the prophets spoke to the princes and all the people, saying, “This man deserves to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 38:4
      marker-yv: yv-n
    - type: text
      text: die! For he has prophesied against this city, as you have heard with your ears.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Jeremiah spoke to all the princes and all the people, saying: “The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent me to prophesy against this house and against this city with all the words that you have heard. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Now therefore, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 7:3; (Joel 2:13); Jon. 3:8
      marker-yv: yv-n
    - type: text
      text: 'amend your ways and your doings, and obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God; then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will relent concerning the doom that He has pronounced against you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'As for me, here '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 38:5
      marker-yv: yv-n
    - type: text
      text: 'I am, in your hand; do with me as seems good and proper to you. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But know for certain that if you put me to death, you will surely bring innocent blood on yourselves, on this city, and on its inhabitants; for truly the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sent me to you to speak all these words in your hearing.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So the princes and all the people said to the priests and the prophets, “This man does not deserve to die. For he has spoken to us in the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:34
      marker-yv: yv-n
    - type: text
      text: 'Then certain of the elders of the land rose up and spoke to all the assembly of the people, saying: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mic. 1:1
      marker-yv: yv-n
    - type: text
      text: '“Micah of Moresheth prophesied in the days of Hezekiah king of Judah, and spoke to all the people of Judah, saying, ‘Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mic. 3:12
      marker-yv: yv-n
    - type: text
      text: '“Zion shall be plowed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a field,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Jerusalem shall become '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 4:2; Ps. 79:1; Jer. 9:11
      marker-yv: yv-n
    - type: text
      text: heaps of ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the mountain of the temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like the bare hills of the forest.” ’
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Did Hezekiah king of Judah and all Judah ever put him to death? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 32:26; Is. 37:1, 4, 15–20
      marker-yv: yv-n
    - type: text
      text: 'Did he not fear the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 20:1–19
      marker-yv: yv-n
    - type: text
      text: 'seek the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s favor? And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:14; 2 Sam. 24:16; Jer. 18:8
      marker-yv: yv-n
    - type: text
      text: 'relented concerning the doom which He had pronounced against them. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 5:39)
      marker-yv: yv-n
    - type: text
      text: But we are doing great evil against ourselves.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': ‘Stand in '
    - type: usfm
      marker: x
      children:
      - type: text
