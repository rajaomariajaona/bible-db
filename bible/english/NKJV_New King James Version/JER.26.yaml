      marker-yv: yv-n
    - type: text
      text: 'the court of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house, and speak to all the cities of Judah, which come to worship '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house, '
    - type: usfm
      marker: x
      children:
      - type: text
