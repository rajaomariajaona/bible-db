document_id: JER.26,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Saved from Death
  - type: text
    content: 'In the beginning of the reign of Jehoiakim the son of Josiah, king of Judah, this word came from the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, '
  '10':
  - type: text
    content: 'When the princes of Judah heard these things, they came up from the king’s house to the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and sat down in the entry of the New Gate of the '
  - type: heading
    content: Lord
  - type: text
    content: '’s '
  - type: text
    content: house.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'And the priests and the prophets spoke to the princes and all the people, saying, “This man deserves to '
  - type: note
    content: Jer. 38:4
  - type: text
    content: die! For he has prophesied against this city, as you have heard with your ears.”
  '12':
  - type: text
    content: 'Then Jeremiah spoke to all the princes and all the people, saying: “The '
  - type: heading
    content: Lord
  - type: text
    content: ' sent me to prophesy against this house and against this city with all the words that you have heard. '
  '13':
  - type: text
    content: 'Now therefore, '
  - type: note
    content: Jer. 7:3; (Joel 2:13); Jon. 3:8
  - type: text
    content: 'amend your ways and your doings, and obey the voice of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God; then the '
  - type: heading
    content: Lord
  - type: text
    content: ' will relent concerning the doom that He has pronounced against you. '
  '14':
  - type: text
    content: 'As for me, here '
  - type: note
    content: Jer. 38:5
  - type: text
    content: 'I am, in your hand; do with me as seems good and proper to you. '
  '15':
  - type: text
    content: 'But know for certain that if you put me to death, you will surely bring innocent blood on yourselves, on this city, and on its inhabitants; for truly the '
  - type: heading
    content: Lord
  - type: text
    content: ' has sent me to you to speak all these words in your hearing.”'
  '16':
  - type: text
    content: 'So the princes and all the people said to the priests and the prophets, “This man does not deserve to die. For he has spoken to us in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God.”'
  '17':
  - type: note
    content: Acts 5:34
  - type: text
    content: 'Then certain of the elders of the land rose up and spoke to all the assembly of the people, saying: '
  '18':
  - type: note
    content: Mic. 1:1
  - type: text
    content: '“Micah of Moresheth prophesied in the days of Hezekiah king of Judah, and spoke to all the people of Judah, saying, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts:'
  - type: note
    content: Mic. 3:12
  - type: text
    content: '“Zion shall be plowed '
  - type: text
    content: like
  - type: text
    content: ' a field,'
  - type: text
    content: 'Jerusalem shall become '
  - type: note
    content: Neh. 4:2; Ps. 79:1; Jer. 9:11
  - type: text
    content: heaps of ruins,
  - type: text
    content: And the mountain of the temple
  - type: text
    content: Like the bare hills of the forest.” ’
  '19':
  - type: text
    content: 'Did Hezekiah king of Judah and all Judah ever put him to death? '
  - type: note
    content: 2 Chr. 32:26; Is. 37:1, 4, 15–20
  - type: text
    content: 'Did he not fear the '
  - type: heading
    content: Lord
  - type: text
    content: ' and '
  - type: note
    content: 2 Kin. 20:1–19
  - type: text
    content: 'seek the '
  - type: heading
    content: Lord
  - type: text
    content: '’s favor? And the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 32:14; 2 Sam. 24:16; Jer. 18:8
  - type: text
    content: 'relented concerning the doom which He had pronounced against them. '
  - type: note
    content: (Acts 5:39)
  - type: text
    content: But we are doing great evil against ourselves.”
  '2':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Stand in '
  - type: note
    content: 2 Chr. 24:20, 21; Jer. 19:14
  - type: text
    content: 'the court of the '
  - type: heading
    content: Lord
  - type: text
    content: '’s house, and speak to all the cities of Judah, which come to worship '
  - type: text
    content: in
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: '’s house, '
  - type: note
    content: Deut. 4:2; Jer. 43:1; Ezek. 3:10; Matt. 28:20; (Rev. 22:19)
  - type: text
    content: 'all the words that I command you to speak to them. '
  - type: note
    content: Acts 20:27
  - type: text
    content: 'Do not diminish a word. '
  '20':
  - type: text
    content: 'Now there was also a man who prophesied in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ', Urijah the son of Shemaiah of Kirjath Jearim, who prophesied against this city and against this land according to all the words of Jeremiah. '
  '21':
  - type: text
    content: 'And when Jehoiakim the king, with all his mighty men and all the princes, heard his words, the king sought to put him to death; but when Urijah heard '
  - type: text
    content: it,
  - type: text
    content: ' he was afraid and fled, and went to Egypt. '
  '22':
  - type: text
    content: 'Then Jehoiakim the king sent men to Egypt: Elnathan the son of Achbor, and '
  - type: text
    content: other
  - type: text
    content: ' men '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: went
  - type: text
    content: ' with him to Egypt. '
  '23':
  - type: text
    content: And they brought Urijah from Egypt and brought him to Jehoiakim the king, who killed him with the sword and cast his dead body into the graves of the common people.
  '24':
  - type: text
    content: 'Nevertheless '
  - type: note
    content: 2 Kin. 22:12–14; Jer. 39:14; 40:5–7
  - type: text
    content: the hand of Ahikam the son of Shaphan was with Jeremiah, so that they should not give him into the hand of the people to put him to death.
  '3':
  - type: note
    content: Is. 1:16–19; Jer. 36:3–7
  - type: text
    content: 'Perhaps everyone will listen and turn from his evil way, that I may '
  - type: note
    content: Jer. 18:8; Jon. 3:9
  - type: text
    content: 'relent concerning the calamity which I purpose to bring on them because of the evil of their doings.’ '
  '4':
  - type: text
    content: 'And you shall say to them, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  - type: note
    content: Lev. 26:14, 15; Deut. 28:15; 1 Kin. 9:6; Is. 1:20; Jer. 17:27; 22:5
  - type: text
    content: '“If you will not listen to Me, to walk in My law which I have set before you, '
  '5':
  - type: text
    content: 'to heed the words of My servants the prophets '
  - type: note
    content: Jer. 25:4; 29:19
  - type: text
    content: 'whom I sent to you, both rising up early and sending '
  - type: text
    content: them
  - type: text
    content: ' (but you have not heeded), '
  '6':
  - type: text
    content: 'then I will make this house like '
  - type: note
    content: 1 Sam. 4:10, 11; Ps. 78:60; Jer. 7:12, 14
  - type: text
    content: 'Shiloh, and will make this city '
  - type: note
    content: 2 Kin. 22:19; Is. 65:15; Jer. 24:9
  - type: text
    content: a curse to all the nations of the earth.” ’ ”
  '7':
  - type: text
    content: 'So the priests and the prophets and all the people heard Jeremiah speaking these words in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Now it happened, when Jeremiah had made an end of speaking all that the '
  - type: heading
    content: Lord
  - type: text
    content: ' had commanded '
  - type: text
    content: him
  - type: text
    content: ' to speak to all the people, that the priests and the prophets and all the people seized him, saying, “You will surely die! '
  '9':
  - type: text
    content: 'Why have you prophesied in the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, ‘This house shall be like Shiloh, and this city shall be '
  - type: note
    content: Jer. 9:11
  - type: text
    content: 'desolate, without an inhabitant’?” And all the people were gathered against Jeremiah in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: .
