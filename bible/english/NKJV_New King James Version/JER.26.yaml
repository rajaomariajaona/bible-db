      marker-yv: yv-n
    - type: text
      text: 'all the words that I command you to speak to them. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:27
      marker-yv: yv-n
    - type: text
      text: 'Do not diminish a word. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now there was also a man who prophesied in the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', Urijah the son of Shemaiah of Kirjath Jearim, who prophesied against this city and against this land according to all the words of Jeremiah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And when Jehoiakim the king, with all his mighty men and all the princes, heard his words, the king sought to put him to death; but when Urijah heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' he was afraid and fled, and went to Egypt. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then Jehoiakim the king sent men to Egypt: Elnathan the son of Achbor, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: went
    - type: text
      text: ' with him to Egypt. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: And they brought Urijah from Egypt and brought him to Jehoiakim the king, who killed him with the sword and cast his dead body into the graves of the common people.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nevertheless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:12–14; Jer. 39:14; 40:5–7
      marker-yv: yv-n
    - type: text
      text: the hand of Ahikam the son of Shaphan was with Jeremiah, so that they should not give him into the hand of the people to put him to death.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 1:16–19; Jer. 36:3–7
      marker-yv: yv-n
    - type: text
      text: 'Perhaps everyone will listen and turn from his evil way, that I may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 18:8; Jon. 3:9
      marker-yv: yv-n
    - type: text
      text: 'relent concerning the calamity which I purpose to bring on them because of the evil of their doings.’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And you shall say to them, ‘Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:14, 15; Deut. 28:15; 1 Kin. 9:6; Is. 1:20; Jer. 17:27; 22:5
      marker-yv: yv-n
    - type: text
      text: '“If you will not listen to Me, to walk in My law which I have set before you, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'to heed the words of My servants the prophets '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:4; 29:19
      marker-yv: yv-n
    - type: text
      text: 'whom I sent to you, both rising up early and sending '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' (but you have not heeded), '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'then I will make this house like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 4:10, 11; Ps. 78:60; Jer. 7:12, 14
      marker-yv: yv-n
    - type: text
      text: 'Shiloh, and will make this city '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:19; Is. 65:15; Jer. 24:9
      marker-yv: yv-n
    - type: text
      text: a curse to all the nations of the earth.” ’ ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So the priests and the prophets and all the people heard Jeremiah speaking these words in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now it happened, when Jeremiah had made an end of speaking all that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' to speak to all the people, that the priests and the prophets and all the people seized him, saying, “You will surely die! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Why have you prophesied in the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, ‘This house shall be like Shiloh, and this city shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 9:11
      marker-yv: yv-n
    - type: text
      text: 'desolate, without an inhabitant’?” And all the people were gathered against Jeremiah in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
