document_id: PSA.25,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plea for Deliverance and Forgiveness
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: A
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Psalm
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'To '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 86:4; 143:8
      marker-yv: yv-n
    - type: text
      text: 'You, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I lift up my soul.'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All the paths of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' mercy and truth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To such as keep His covenant and His testimonies.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 31:3; 79:9; 109:21; 143:11
      marker-yv: yv-n
    - type: text
      text: 'For Your name’s sake, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Pardon my iniquity, for it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' great.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the man that fears the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 25:8; 37:23)
      marker-yv: yv-n
    - type: text
      text: Him shall He teach in the way He chooses.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 19:23)
      marker-yv: yv-n
    - type: text
      text: He himself shall dwell in prosperity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 37:11; 69:36; Matt. 5:5
      marker-yv: yv-n
    - type: text
      text: his descendants shall inherit the earth.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 3:32; John 7:17)
      marker-yv: yv-n
    - type: text
      text: 'The secret of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with those who fear Him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And He will show them His covenant.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 123:2; 141:8)
      marker-yv: yv-n
    - type: text
      text: 'My eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' ever toward the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For He shall pluck my feet out of the net.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 69:16
      marker-yv: yv-n
    - type: text
      text: Turn Yourself to me, and have mercy on me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' desolate and afflicted.'
  '17':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The troubles of my heart have enlarged;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bring me out of my distresses!
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 16:12; Ps. 31:7
      marker-yv: yv-n
    - type: text
      text: Look on my affliction and my pain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And forgive all my sins.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Consider my enemies, for they are many;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they hate me with cruel hatred.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'O my God, I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:8
      marker-yv: yv-n
    - type: text
      text: trust in You;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let me not be ashamed;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 13:4; 41:11
      marker-yv: yv-n
    - type: text
      text: Let not my enemies triumph over me.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Keep my soul, and deliver me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let me not be ashamed, for I put my trust in You.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let integrity and uprightness preserve me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I wait for You.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 130:8)
      marker-yv: yv-n
    - type: text
      text: Redeem Israel, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Out of all their troubles!
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Indeed, let no one who waits on You be ashamed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let those be ashamed who deal treacherously without cause.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 33:13; Ps. 5:8; 27:11; 86:11; 119:27; 143:8
      marker-yv: yv-n
    - type: text
      text: 'Show me Your ways, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Teach me Your paths.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lead me in Your truth and teach me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the God of my salvation;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: On You I wait all the day.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Remember, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 103:17; 106:1
      marker-yv: yv-n
    - type: text
      text: Your tender mercies and Your lovingkindnesses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' from of old.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Do not remember '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 13:26; (Jer. 3:25)
      marker-yv: yv-n
    - type: text
      text: the sins of my youth, nor my transgressions;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 51:1
      marker-yv: yv-n
    - type: text
      text: According to Your mercy remember me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For Your goodness’ sake, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Good and upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore He teaches sinners in the way.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The humble He guides in justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the humble He teaches His way.
