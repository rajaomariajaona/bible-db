    children:
    - type: text
      text: Job Prays for Relief
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “My spirit is broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My days are extinguished,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 88:3, 4
      marker-yv: yv-n
    - type: text
      text: 'The grave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ready
    - type: text
      text: ' for me.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“But please, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 6:29
      marker-yv: yv-n
    - type: text
      text: come back again, all of you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For I shall not find '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' wise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: man
    - type: text
      text: ' among you.'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:6
      marker-yv: yv-n
    - type: text
      text: My days are past,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My purposes are broken off,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Even
    - type: text
      text: ' the thoughts of my heart.'
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They change the night into day;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘The light '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' near,’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: say,
    - type: text
      text: ' in the face of darkness.'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'If I wait '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' the grave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' my house,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If I make my bed in the darkness,
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'If I say to corruption, ‘You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' my father,’'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And to the worm, ‘You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' my mother and my sister,’'
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Where then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 7:6; 13:15; 14:19; 19:10
      marker-yv: yv-n
    - type: text
      text: hope?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As for my hope, who can see it?
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Will
    - type: text
      text: ' they go down '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jon. 2:6
      marker-yv: yv-n
    - type: text
      text: to the gates of Sheol?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Shall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 3:17–19; 21:33
      marker-yv: yv-n
    - type: text
      text: rest together in the dust?”
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' not mockers with me?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And does not my eye dwell on their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 1:6; Job 12:4; 17:6; 30:1, 9; 34:7
      marker-yv: yv-n
    - type: text
      text: provocation?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Now put down a pledge for me with Yourself.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:1; 17:18; 22:26
      marker-yv: yv-n
    - type: text
      text: will shake hands with me?
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For You have hidden their heart from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:20; 32:9
      marker-yv: yv-n
    - type: text
      text: understanding;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Therefore You will not exalt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He who speaks flattery to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' friends,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Even the eyes of his children will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 11:20
      marker-yv: yv-n
    - type: text
      text: fail.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“But He has made me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 30:9
      marker-yv: yv-n
    - type: text
      text: a byword of the people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And I have become one in whose face men spit.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 6:7; 31:9
      marker-yv: yv-n
    - type: text
      text: My eye has also grown dim because of sorrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And all my members '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' like shadows.'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Upright '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' are astonished at this,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the innocent stirs himself up against the hypocrite.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Yet the righteous will hold to his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 4:18
      marker-yv: yv-n
    - type: text
      text: way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And he who has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 24:4
      marker-yv: yv-n
    - type: text
      text: clean hands will be stronger and stronger.
