  - type: text
    content: 'goodness pass before you, and I will proclaim the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' before you. '
  - type: note
    content: (Rom. 9:15, 16, 18)
  - type: text
    content: 'I will be gracious to whom I will be '
  - type: note
    content: (Rom. 4:4, 16)
  - type: text
    content: 'gracious, and I will have compassion on whom I will have compassion.” '
  '2':
  - type: note
    content: Ex. 32:34; Josh. 5:14
  - type: text
    content: 'And I will send '
  - type: text
    content: My
  - type: text
    content: ' Angel before you, '
  - type: note
    content: Ex. 23:27–31; Josh. 24:11
  - type: text
    content: 'and I will drive out the Canaanite and the Amorite and the Hittite and the Perizzite and the Hivite and the Jebusite. '
  '20':
  - type: text
    content: 'But He said, “You cannot see My face; for '
  - type: note
    content: (Gen. 32:30)
  - type: text
    content: 'no man shall see Me, and live.” '
  '21':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, “Here is a place by Me, and you shall stand on the rock. '
  '22':
  - type: text
    content: 'So it shall be, while My glory passes by, that I will put you '
  - type: note
    content: Song 2:14; Is. 2:21
  - type: text
    content: 'in the cleft of the rock, and will '
  - type: note
    content: Ps. 91:1, 4; Is. 49:2; 51:16
  - type: text
    content: 'cover you with My hand while I pass by. '
  '23':
  - type: text
    content: 'Then I will take away My hand, and you shall see My back; but My face shall '
  - type: note
    content: Ex. 33:20; (John 1:18)
  - type: text
    content: not be seen.”
