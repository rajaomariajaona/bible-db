  - type: text
    content: 'For how then will it be known that Your people and I have found grace in Your sight, '
  - type: note
    content: Num. 14:14
  - type: text
    content: 'except You go with us? So we '
  - type: note
    content: Ex. 34:10; Deut. 4:7, 34
  - type: text
    content: 'shall be separate, Your people and I, from all the people who '
  - type: text
    content: are
  - type: text
    content: ' upon the face of the earth.”'
  '17':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, '
  - type: note
    content: (James 5:16)
  - type: text
    content: “I will also do this thing that you have spoken; for you have found grace in My sight, and I know you by name.”
  '18':
  - type: text
    content: 'And he said, “Please, show me '
  - type: note
    content: Ex. 24:16, 17; (1 Tim. 6:16)
  - type: text
    content: Your glory.”
  '19':
  - type: text
    content: 'Then He said, “I will make all My '
  - type: note
