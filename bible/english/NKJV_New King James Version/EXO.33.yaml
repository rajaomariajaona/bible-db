  - type: text
    content: a stiff-necked people.”
  '4':
  - type: text
    content: 'And when the people heard this bad news, '
  - type: note
    content: Num. 14:1, 39
  - type: text
    content: 'they mourned, '
  - type: note
    content: Ezra 9:3; Esth. 4:1, 4; Ezek. 24:17, 23
  - type: text
    content: 'and no one put on his ornaments. '
  '5':
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' had said to Moses, “Say to the children of Israel, ‘You '
  - type: text
    content: are
  - type: text
    content: ' a stiff-necked people. I could come up into your midst in one moment and consume you. Now therefore, take off your ornaments, that I may '
  - type: note
    content: (Ps. 139:23)
  - type: text
    content: 'know what to do to you.’ ” '
  '6':
  - type: text
    content: So the children of Israel stripped themselves of their ornaments by Mount Horeb.
  - type: heading
    content: Moses Meets with the Lord
  '7':
  - type: text
    content: 'Moses took his tent and pitched it outside the camp, far from the camp, and '
  - type: note
    content: Ex. 29:42, 43
  - type: text
    content: 'called it the tabernacle of meeting. And it came to pass '
  - type: text
    content: that
  - type: text
