  '12':
  - type: text
    content: 'Then Moses said to the '
  - type: heading
    content: Lord
  - type: text
    content: ', “See, '
  - type: note
    content: Ex. 3:10; 32:34
  - type: text
    content: 'You say to me, ‘Bring up this people.’ But You have not let me know whom You will send with me. Yet You have said, '
  - type: note
