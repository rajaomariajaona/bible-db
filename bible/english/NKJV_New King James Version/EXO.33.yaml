document_id: EXO.33,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Command to Leave Sinai
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Depart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' go up from here, you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:1, 7, 13; Josh. 3:17
      marker-yv: yv-n
    - type: text
      text: 'and the people whom you have brought out of the land of Egypt, to the land of which I swore to Abraham, Isaac, and Jacob, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:7
      marker-yv: yv-n
    - type: text
      text: '‘To your descendants I will give it.’ '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the people saw the pillar of cloud standing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at
    - type: text
      text: ' the tabernacle door, and all the people rose and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 4:31
      marker-yv: yv-n
    - type: text
      text: 'worshiped, each man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' his tent door. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 12:8; Deut. 34:10
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses face to face, as a man speaks to his friend. And he would return to the camp, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:13
      marker-yv: yv-n
    - type: text
      text: his servant Joshua the son of Nun, a young man, did not depart from the tabernacle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Promise of God’s Presence
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “See, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:10; 32:34
      marker-yv: yv-n
    - type: text
      text: 'You say to me, ‘Bring up this people.’ But You have not let me know whom You will send with me. Yet You have said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 33:17; John 10:14, 15; 2 Tim. 2:19
      marker-yv: yv-n
    - type: text
      text: '‘I know you by name, and you have also found grace in My sight.’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now therefore, I pray, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:9
      marker-yv: yv-n
    - type: text
      text: 'if I have found grace in Your sight, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 25:4; 27:11; 86:11; 119:33
      marker-yv: yv-n
    - type: text
      text: 'show me now Your way, that I may know You and that I may find grace in Your sight. And consider that this nation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:7, 10; 5:1; 32:12, 14; Deut. 9:26, 29
      marker-yv: yv-n
    - type: text
      text: Your people.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:12; Deut. 4:37; Is. 63:9
      marker-yv: yv-n
    - type: text
      text: '“My Presence will go '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you,
    - type: text
      text: ' and I will give you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:10; 25:19; Josh. 21:44; 22:4
      marker-yv: yv-n
    - type: text
      text: rest.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to Him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 33:3
      marker-yv: yv-n
    - type: text
      text: '“If Your Presence does not go '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us,
    - type: text
      text: ' do not bring us up from here. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For how then will it be known that Your people and I have found grace in Your sight, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:14
      marker-yv: yv-n
    - type: text
      text: 'except You go with us? So we '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:10; Deut. 4:7, 34
      marker-yv: yv-n
    - type: text
      text: 'shall be separate, Your people and I, from all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' upon the face of the earth.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (James 5:16)
      marker-yv: yv-n
    - type: text
      text: “I will also do this thing that you have spoken; for you have found grace in My sight, and I know you by name.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said, “Please, show me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 24:16, 17; (1 Tim. 6:16)
      marker-yv: yv-n
    - type: text
      text: Your glory.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said, “I will make all My '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:6, 7
      marker-yv: yv-n
    - type: text
      text: 'goodness pass before you, and I will proclaim the name of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' before you. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 9:15, 16, 18)
      marker-yv: yv-n
    - type: text
      text: 'I will be gracious to whom I will be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 4:4, 16)
      marker-yv: yv-n
    - type: text
      text: 'gracious, and I will have compassion on whom I will have compassion.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:34; Josh. 5:14
      marker-yv: yv-n
    - type: text
      text: 'And I will send '
    - type: usfm
      marker: it
      children:
      - type: text
        text: My
    - type: text
      text: ' Angel before you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:27–31; Josh. 24:11
      marker-yv: yv-n
    - type: text
      text: 'and I will drive out the Canaanite and the Amorite and the Hittite and the Perizzite and the Hivite and the Jebusite. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But He said, “You cannot see My face; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 32:30)
      marker-yv: yv-n
    - type: text
      text: 'no man shall see Me, and live.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Here is a place by Me, and you shall stand on the rock. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it shall be, while My glory passes by, that I will put you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Song 2:14; Is. 2:21
      marker-yv: yv-n
    - type: text
      text: 'in the cleft of the rock, and will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 91:1, 4; Is. 49:2; 51:16
      marker-yv: yv-n
    - type: text
      text: 'cover you with My hand while I pass by. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I will take away My hand, and you shall see My back; but My face shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 33:20; (John 1:18)
      marker-yv: yv-n
    - type: text
      text: not be seen.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Go
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: up
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:8
      marker-yv: yv-n
    - type: text
      text: 'to a land flowing with milk and honey; for I will not go up in your midst, lest '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:21, 45
      marker-yv: yv-n
    - type: text
      text: 'I consume you on the way, for you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:9; 33:5
      marker-yv: yv-n
    - type: text
      text: a stiff-necked people.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the people heard this bad news, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 14:1, 39
      marker-yv: yv-n
    - type: text
      text: 'they mourned, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 9:3; Esth. 4:1, 4; Ezek. 24:17, 23
      marker-yv: yv-n
    - type: text
      text: 'and no one put on his ornaments. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to Moses, “Say to the children of Israel, ‘You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a stiff-necked people. I could come up into your midst in one moment and consume you. Now therefore, take off your ornaments, that I may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 139:23)
      marker-yv: yv-n
    - type: text
      text: 'know what to do to you.’ ” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the children of Israel stripped themselves of their ornaments by Mount Horeb.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Moses Meets with the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses took his tent and pitched it outside the camp, far from the camp, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:42, 43
      marker-yv: yv-n
    - type: text
      text: 'called it the tabernacle of meeting. And it came to pass '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' everyone who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:29
      marker-yv: yv-n
    - type: text
      text: 'sought the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' went out to the tabernacle of meeting which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' outside the camp. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So it was, whenever Moses went out to the tabernacle, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' all the people rose, and each man stood '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:27
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: at
    - type: text
      text: ' his tent door and watched Moses until he had gone into the tabernacle. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Moses entered the tabernacle, that the pillar of cloud descended and stood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at
    - type: text
      text: ' the door of the tabernacle, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:22; 31:18; Ps. 99:7
      marker-yv: yv-n
    - type: text
      text: 'talked with Moses. '
