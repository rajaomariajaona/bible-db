  - type: text
    content: 'if I have found grace in Your sight, '
  - type: note
    content: Ps. 25:4; 27:11; 86:11; 119:33
  - type: text
    content: 'show me now Your way, that I may know You and that I may find grace in Your sight. And consider that this nation '
  - type: text
