verses:
  '1':
  - type: text
    content: 'So '
  - type: note
    content: Ezra 2:59
  - type: text
    content: 'all Israel was recorded by genealogies, and indeed, they '
  - type: text
    content: were
  - type: text
    content: ' inscribed in the book of the kings of Israel. But Judah was carried away captive to Babylon because of their unfaithfulness. '
  '10':
  - type: note
    content: Neh. 11:10–14
  - type: text
    content: 'Of the priests: Jedaiah, Jehoiarib, and Jachin; '
  '11':
  - type: text
    content: 'Azariah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the '
  - type: note
    content: 2 Chr. 31:13; Jer. 20:1
  - type: text
    content: 'officer over the house of God; '
  '12':
  - type: text
    content: 'Adaiah the son of Jeroham, the son of Pashur, the son of Malchijah; Maasai the son of Adiel, the son of Jahzerah, the son of Meshullam, the son of Meshillemith, the son of Immer; '
  '13':
  - type: text
    content: 'and their brethren, heads of their fathers’ houses—one thousand seven hundred and sixty. '
  - type: text
    content: They
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' very able men for the work of the service of the house of God.'
  - type: heading
    content: The Levites at Jerusalem
  '14':
  - type: text
    content: 'Of the Levites: Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, of the sons of Merari; '
  '15':
  - type: text
    content: 'Bakbakkar, Heresh, Galal, and Mattaniah the son of Micah, the son of '
  - type: note
    content: Neh. 11:17
  - type: text
    content: 'Zichri, the son of Asaph; '
  '16':
  - type: note
    content: Neh. 11:17
  - type: text
    content: 'Obadiah the son of '
  - type: note
    content: Neh. 11:17
  - type: text
    content: Shemaiah, the son of Galal, the son of Jeduthun; and Berechiah the son of Asa, the son of Elkanah, who lived in the villages of the Netophathites.
  - type: heading
    content: The Levite Gatekeepers
  '17':
  - type: text
    content: 'And the gatekeepers '
  - type: text
    content: were
  - type: text
    content: ' Shallum, Akkub, Talmon, Ahiman, and their brethren. Shallum '
  - type: text
    content: was
  - type: text
    content: ' the chief. '
  '18':
  - type: text
    content: 'Until then '
  - type: text
    content: they
  - type: text
    content: ' '
  - type: text
    content: had
  - type: text
    content: ' '
  - type: text
    content: been
  - type: text
    content: ' gatekeepers for the camps of the children of Levi at the King’s Gate on the east.'
  '19':
  - type: text
    content: 'Shallum the son of Kore, the son of Ebiasaph, the son of Korah, and his brethren, from his father’s house, the Korahites, '
  - type: text
    content: were
  - type: text
    content: ' in charge of the work of the service, gatekeepers of the tabernacle. Their fathers had been keepers of the entrance to the camp of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: note
    content: Ezra 2:70; Neh. 7:73
  - type: text
    content: 'And the first inhabitants who '
  - type: text
    content: dwelt
  - type: text
    content: ' in their possessions in their cities '
  - type: text
    content: were
  - type: text
    content: ' Israelites, priests, Levites, and '
  - type: note
    content: Ezra 2:43; 8:20
  - type: text
    content: the Nethinim.
  - type: heading
    content: Dwellers in Jerusalem
  '20':
  - type: text
    content: 'And '
  - type: note
    content: Num. 25:6–13; 31:6
  - type: text
    content: 'Phinehas the son of Eleazar had been the officer over them in time past; the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' with him. '
  '21':
  - type: note
    content: 1 Chr. 26:2, 14
  - type: text
    content: 'Zechariah the son of Meshelemiah '
  - type: text
    content: was
  - type: text
    content: ' keeper of the door of the tabernacle of meeting.'
  '22':
  - type: text
    content: 'All those chosen as gatekeepers '
  - type: text
    content: were
  - type: text
    content: ' two hundred and twelve. '
  - type: note
    content: 1 Chr. 26:1, 2
  - type: text
    content: 'They were recorded by their genealogy, in their villages. David and Samuel '
  - type: note
    content: 1 Sam. 9:9
  - type: text
    content: 'the seer had appointed them to their trusted office. '
  '23':
  - type: text
    content: 'So they and their children '
  - type: text
    content: were
  - type: text
    content: ' in charge of the gates of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', the house of the tabernacle, by assignment. '
  '24':
  - type: text
    content: 'The gatekeepers were assigned to the four directions: the east, west, north, and south. '
  '25':
  - type: text
    content: 'And their brethren in their villages '
  - type: text
    content: had
  - type: text
    content: ' to come with them from time to time '
  - type: note
    content: 2 Kin. 11:4–7; 2 Chr. 23:8
  - type: text
    content: 'for seven days. '
  '26':
  - type: text
    content: 'For in this trusted office '
  - type: text
    content: were
  - type: text
    content: ' four chief gatekeepers; they were Levites. And they had charge over the chambers and treasuries of the house of God. '
  '27':
  - type: text
    content: 'And they lodged '
  - type: text
    content: all
  - type: text
    content: ' around the house of God because they '
  - type: text
    content: had
  - type: text
    content: ' the '
  - type: note
    content: 1 Chr. 23:30–32
  - type: text
    content: 'responsibility, and they '
  - type: text
    content: were
  - type: text
    content: ' in charge of opening '
  - type: text
    content: it
  - type: text
    content: ' every morning.'
  - type: heading
    content: Other Levite Responsibilities
  '28':
  - type: text
    content: 'Now '
  - type: text
    content: some
  - type: text
    content: ' of them were in charge of the serving vessels, for they brought them in and took them out by count. '
  '29':
  - type: text
    content: Some
  - type: text
    content: ' of them '
  - type: text
    content: were
  - type: text
    content: ' appointed over the furnishings and over all the implements of the sanctuary, and over the '
  - type: note
    content: 1 Chr. 23:29
  - type: text
    content: 'fine flour and the wine and the oil and the incense and the spices. '
  '3':
  - type: text
    content: 'Now in '
  - type: note
    content: Neh. 11:1, 2
  - type: text
    content: 'Jerusalem the children of Judah dwelt, and some of the children of Benjamin, and of the children of Ephraim and Manasseh: '
  '30':
  - type: text
    content: 'And '
  - type: text
    content: some
  - type: text
    content: ' of the sons of the priests made '
  - type: note
    content: Ex. 30:22–25
  - type: text
    content: the ointment of the spices.
  '31':
  - type: text
    content: 'Mattithiah of the Levites, the firstborn of Shallum the Korahite, had the trusted office '
  - type: note
    content: Lev. 2:5; 6:21
  - type: text
    content: 'over the things that were baked in the pans. '
  '32':
  - type: text
    content: 'And some of their brethren of the sons of the Kohathites '
  - type: note
    content: Lev. 24:5–8
  - type: text
    content: were
  - type: text
    content: ' in charge of preparing the showbread for every Sabbath.'
  '33':
  - type: text
    content: 'These are '
  - type: note
    content: 1 Chr. 6:31; 25:1
  - type: text
    content: 'the singers, heads of the fathers’ '
  - type: text
    content: houses
  - type: text
    content: ' of the Levites, '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: lodged
  - type: text
    content: ' in the chambers, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' free '
  - type: text
    content: from
  - type: text
    content: ' '
  - type: text
    content: other
  - type: text
    content: ' '
  - type: text
    content: duties;
  - type: text
    content: ' for they were employed in '
  - type: text
    content: that
  - type: text
    content: ' work day and night. '
  '34':
  - type: text
    content: 'These heads of the fathers’ '
  - type: text
    content: houses
  - type: text
    content: ' of the Levites '
  - type: text
    content: were
  - type: text
    content: ' heads throughout their generations. They dwelt at Jerusalem.'
  - type: heading
    content: The Family of King Saul
  '35':
  - type: text
    content: 'Jeiel the father of Gibeon, whose wife’s name '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 8:29–32
  - type: text
    content: 'Maacah, dwelt at Gibeon. '
  '36':
  - type: text
    content: 'His firstborn son '
  - type: text
    content: was
  - type: text
    content: ' Abdon, then Zur, Kish, Baal, Ner, Nadab, '
  '37':
  - type: text
    content: 'Gedor, Ahio, Zechariah, and Mikloth. '
  '38':
  - type: text
    content: 'And Mikloth begot Shimeam. They also dwelt alongside their relatives in Jerusalem, with their brethren. '
  '39':
  - type: note
    content: 1 Chr. 8:33–38
  - type: text
    content: 'Ner begot Kish, Kish begot Saul, and Saul begot Jonathan, Malchishua, Abinadab, and Esh-Baal. '
  '4':
  - type: text
    content: 'Uthai the son of Ammihud, the son of Omri, the son of Imri, the son of Bani, of the descendants of Perez, the son of Judah. '
  '40':
  - type: text
    content: 'The son of Jonathan '
  - type: text
    content: was
  - type: text
    content: ' Merib-Baal, and Merib-Baal begot Micah. '
  '41':
  - type: text
    content: 'The sons of Micah '
  - type: text
    content: were
  - type: text
    content: ' Pithon, Melech, Tahrea, and Ahaz. '
  '42':
  - type: text
    content: 'And Ahaz begot Jarah; Jarah begot Alemeth, Azmaveth, and Zimri; and Zimri begot Moza; '
  '43':
  - type: text
    content: Moza begot Binea, Rephaiah his son, Eleasah his son, and Azel his son.
  '44':
  - type: text
    content: 'And Azel had six sons whose names '
  - type: text
    content: were
  - type: text
    content: ' these: Azrikam, Bocheru, Ishmael, Sheariah, Obadiah, and Hanan; these '
  - type: text
    content: were
  - type: text
    content: ' the sons of Azel.'
  '5':
  - type: text
    content: 'Of the Shilonites: Asaiah the firstborn and his sons. '
  '6':
  - type: text
    content: 'Of the sons of Zerah: Jeuel, and their brethren—six hundred and ninety. '
  '7':
  - type: text
    content: 'Of the sons of Benjamin: Sallu the son of Meshullam, the son of Hodaviah, the son of Hassenuah; '
  '8':
  - type: text
    content: 'Ibneiah the son of Jeroham; Elah the son of Uzzi, the son of Michri; Meshullam the son of Shephatiah, the son of Reuel, the son of Ibnijah; '
  '9':
  - type: text
    content: 'and their brethren, according to their generations—nine hundred and fifty-six. All these men '
  - type: text
    content: were
  - type: text
    content: ' heads of a father’s '
  - type: text
    content: house
  - type: text
    content: ' in their fathers’ houses.'
  - type: heading
    content: The Priests at Jerusalem
