document_id: 1CH.9,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 2:59
      marker-yv: yv-n
    - type: text
      text: 'all Israel was recorded by genealogies, and indeed, they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' inscribed in the book of the kings of Israel. But Judah was carried away captive to Babylon because of their unfaithfulness. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 11:10–14
      marker-yv: yv-n
    - type: text
      text: 'Of the priests: Jedaiah, Jehoiarib, and Jachin; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azariah the son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 31:13; Jer. 20:1
      marker-yv: yv-n
    - type: text
      text: 'officer over the house of God; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adaiah the son of Jeroham, the son of Pashur, the son of Malchijah; Maasai the son of Adiel, the son of Jahzerah, the son of Meshullam, the son of Meshillemith, the son of Immer; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and their brethren, heads of their fathers’ houses—one thousand seven hundred and sixty. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' very able men for the work of the service of the house of God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Levites at Jerusalem
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the Levites: Shemaiah the son of Hasshub, the son of Azrikam, the son of Hashabiah, of the sons of Merari; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bakbakkar, Heresh, Galal, and Mattaniah the son of Micah, the son of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 11:17
      marker-yv: yv-n
    - type: text
      text: 'Zichri, the son of Asaph; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 11:17
      marker-yv: yv-n
    - type: text
      text: 'Obadiah the son of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 11:17
      marker-yv: yv-n
    - type: text
      text: Shemaiah, the son of Galal, the son of Jeduthun; and Berechiah the son of Asa, the son of Elkanah, who lived in the villages of the Netophathites.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Levite Gatekeepers
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the gatekeepers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Shallum, Akkub, Talmon, Ahiman, and their brethren. Shallum '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the chief. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Until then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: been
    - type: text
      text: ' gatekeepers for the camps of the children of Levi at the King’s Gate on the east.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shallum the son of Kore, the son of Ebiasaph, the son of Korah, and his brethren, from his father’s house, the Korahites, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in charge of the work of the service, gatekeepers of the tabernacle. Their fathers had been keepers of the entrance to the camp of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 2:70; Neh. 7:73
      marker-yv: yv-n
    - type: text
      text: 'And the first inhabitants who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dwelt
    - type: text
      text: ' in their possessions in their cities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Israelites, priests, Levites, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 2:43; 8:20
      marker-yv: yv-n
    - type: text
      text: the Nethinim.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dwellers in Jerusalem
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 25:6–13; 31:6
      marker-yv: yv-n
    - type: text
      text: 'Phinehas the son of Eleazar had been the officer over them in time past; the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' with him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 26:2, 14
      marker-yv: yv-n
    - type: text
      text: 'Zechariah the son of Meshelemiah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' keeper of the door of the tabernacle of meeting.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All those chosen as gatekeepers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' two hundred and twelve. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 26:1, 2
      marker-yv: yv-n
    - type: text
      text: 'They were recorded by their genealogy, in their villages. David and Samuel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 9:9
      marker-yv: yv-n
    - type: text
      text: 'the seer had appointed them to their trusted office. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they and their children '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in charge of the gates of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the house of the tabernacle, by assignment. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The gatekeepers were assigned to the four directions: the east, west, north, and south. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their brethren in their villages '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' to come with them from time to time '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 11:4–7; 2 Chr. 23:8
      marker-yv: yv-n
    - type: text
      text: 'for seven days. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in this trusted office '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' four chief gatekeepers; they were Levites. And they had charge over the chambers and treasuries of the house of God. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they lodged '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' around the house of God because they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:30–32
      marker-yv: yv-n
    - type: text
      text: 'responsibility, and they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in charge of opening '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' every morning.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Other Levite Responsibilities
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of them were in charge of the serving vessels, for they brought them in and took them out by count. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Some
    - type: text
      text: ' of them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' appointed over the furnishings and over all the implements of the sanctuary, and over the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:29
      marker-yv: yv-n
    - type: text
      text: 'fine flour and the wine and the oil and the incense and the spices. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 11:1, 2
      marker-yv: yv-n
    - type: text
      text: 'Jerusalem the children of Judah dwelt, and some of the children of Benjamin, and of the children of Ephraim and Manasseh: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of the sons of the priests made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:22–25
      marker-yv: yv-n
    - type: text
      text: the ointment of the spices.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mattithiah of the Levites, the firstborn of Shallum the Korahite, had the trusted office '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:5; 6:21
      marker-yv: yv-n
    - type: text
      text: 'over the things that were baked in the pans. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And some of their brethren of the sons of the Kohathites '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 24:5–8
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in charge of preparing the showbread for every Sabbath.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:31; 25:1
      marker-yv: yv-n
    - type: text
      text: 'the singers, heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses
    - type: text
      text: ' of the Levites, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lodged
    - type: text
      text: ' in the chambers, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' free '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: duties;
    - type: text
      text: ' for they were employed in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' work day and night. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These heads of the fathers’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: houses
    - type: text
      text: ' of the Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' heads throughout their generations. They dwelt at Jerusalem.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Family of King Saul
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeiel the father of Gibeon, whose wife’s name '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 8:29–32
      marker-yv: yv-n
    - type: text
      text: 'Maacah, dwelt at Gibeon. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His firstborn son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Abdon, then Zur, Kish, Baal, Ner, Nadab, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gedor, Ahio, Zechariah, and Mikloth. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Mikloth begot Shimeam. They also dwelt alongside their relatives in Jerusalem, with their brethren. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 8:33–38
      marker-yv: yv-n
    - type: text
      text: 'Ner begot Kish, Kish begot Saul, and Saul begot Jonathan, Malchishua, Abinadab, and Esh-Baal. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Uthai the son of Ammihud, the son of Omri, the son of Imri, the son of Bani, of the descendants of Perez, the son of Judah. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The son of Jonathan '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Merib-Baal, and Merib-Baal begot Micah. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Micah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Pithon, Melech, Tahrea, and Ahaz. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Ahaz begot Jarah; Jarah begot Alemeth, Azmaveth, and Zimri; and Zimri begot Moza; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moza begot Binea, Rephaiah his son, Eleasah his son, and Azel his son.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Azel had six sons whose names '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' these: Azrikam, Bocheru, Ishmael, Sheariah, Obadiah, and Hanan; these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the sons of Azel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the Shilonites: Asaiah the firstborn and his sons. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Zerah: Jeuel, and their brethren—six hundred and ninety. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Of the sons of Benjamin: Sallu the son of Meshullam, the son of Hodaviah, the son of Hassenuah; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ibneiah the son of Jeroham; Elah the son of Uzzi, the son of Michri; Meshullam the son of Shephatiah, the son of Reuel, the son of Ibnijah; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and their brethren, according to their generations—nine hundred and fifty-six. All these men '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' heads of a father’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: house
    - type: text
      text: ' in their fathers’ houses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Priests at Jerusalem
    marker-yv: yv-h
