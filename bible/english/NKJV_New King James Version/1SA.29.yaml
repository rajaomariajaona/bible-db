    children:
    - type: text
      text: '4'
  - type: text
    text: 'But the princes of the Philistines were angry with him; so the princes of the Philistines said to him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 27:1–6; 1 Chr. 12:19, 20; Dan. 6:5
    marker-yv: yv-n
  - type: text
    text: '“Make this fellow return, that he may go back to the place which you have appointed for him, and do not let him go down with us to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 27:6
    marker-yv: yv-n
  - type: text
    text: 'battle, lest '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 14:21
    marker-yv: yv-n
  - type: text
    text: 'in the battle he become our adversary. For with what could he reconcile himself to his master, if not with the heads of these '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 29:9
    marker-yv: yv-n
  - type: text
    text: 'men? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
