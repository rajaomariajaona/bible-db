- type: usfm
  marker: p
  children:
  - type: text
    text: And Achish said to the princes of the Philistines, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' this not David, the servant of Saul king of Israel, who has been with me '
