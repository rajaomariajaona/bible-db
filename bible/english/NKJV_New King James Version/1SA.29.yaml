  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 21:11
    marker-yv: yv-n
  - type: text
    text: ‘Saul has slain his thousands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And David his ten thousands’?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Achish called David and said to him, “Surely, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives, you have been upright, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 18:7
    marker-yv: yv-n
  - type: text
    text: 'your going out and your coming in with me in the army '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' good in my sight. For to this day '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 3:25; 2 Kin. 19:27
    marker-yv: yv-n
  - type: text
    text: 'I have not found evil in you since the day of your coming to me. Nevertheless the lords do not favor you. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Therefore return now, and go in peace, that you may not displease the lords of the Philistines.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So David said to Achish, “But what have I done? And to this day what have you found in your servant as long as I have been with you, that I may not go and fight against the enemies of my lord the king?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then Achish answered and said to David, “I know that you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' as good in my sight '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 29:3
    marker-yv: yv-n
  - type: text
    text: 'as an angel of God; nevertheless '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Sam. 14:17, 20; 19:27
    marker-yv: yv-n
  - type: text
    text: 'the princes of the Philistines have said, ‘He shall not go up with us to the battle.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Now therefore, rise early in the morning with your master’s servants '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 29:4
    marker-yv: yv-n
  - type: text
    text: who have come with you. And as soon as you are up early in the morning and have light, depart.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So David and his men rose early to depart in the morning, to return to the land of the Philistines. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 12:19, 22
    marker-yv: yv-n
  - type: text
    text: And the Philistines went up to Jezreel.
