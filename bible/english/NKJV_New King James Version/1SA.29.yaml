    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' this not David, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 12:19, 20
    marker-yv: yv-n
  - type: text
    text: 'of whom they sang to one another in dances, saying:'
