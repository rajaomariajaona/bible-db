document_id: EXO.14,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Red Sea Crossing
  - type: text
    content: 'Now the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '10':
  - type: text
    content: 'And when Pharaoh drew near, the children of Israel lifted their eyes, and behold, the Egyptians marched after them. So they were very afraid, and the children of Israel '
  - type: note
    content: Josh. 24:7; Neh. 9:9; Ps. 34:17; 107:6
  - type: text
    content: 'cried out to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: note
    content: Ex. 5:21; 15:24; 16:2; 17:3; Num. 14:2, 3; 20:3; Ps. 106:7, 8
  - type: text
    content: 'Then they said to Moses, “Because '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' no graves in Egypt, have you taken us away to die in the wilderness? Why have you so dealt with us, to bring us up out of Egypt? '
  '12':
  - type: note
    content: Ex. 5:21; 6:9
  - type: text
    content: Is
  - type: text
    content: ' this not the word that we told you in Egypt, saying, ‘Let us alone that we may serve the Egyptians’? For '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: would
  - type: text
    content: ' '
  - type: text
    content: have
  - type: text
    content: ' '
  - type: text
    content: been
  - type: text
    content: ' better for us to serve the Egyptians than that we should die in the wilderness.”'
  '13':
  - type: text
    content: 'And Moses said to the people, '
  - type: note
    content: Gen. 15:1; 46:3; Ex. 20:20; 2 Chr. 20:15, 17; Is. 41:10, 13, 14
  - type: text
    content: '“Do not be afraid. '
  - type: note
    content: Ps. 46:10, 11
  - type: text
    content: 'Stand still, and see the '
  - type: note
    content: Ex. 14:30; 15:2
  - type: text
    content: 'salvation of the '
  - type: heading
    content: Lord
  - type: text
    content: ', which He will accomplish for you today. For the Egyptians whom you see today, you shall '
  - type: note
    content: Deut. 28:68
  - type: text
    content: 'see again no more forever. '
  '14':
  - type: note
    content: Ex. 14:25; 15:3; Deut. 1:30; 3:22; Josh. 10:14, 42; 23:2; 2 Chr. 20:29; Neh. 4:20; Is. 31:4
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' will fight for you, and you shall '
  - type: note
    content: (Is. 30:15)
  - type: text
    content: hold your peace.”
  '15':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, “Why do you cry to Me? Tell the children of Israel to go forward. '
  '16':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 4:17, 20; 7:19; 14:21, 26; 17:5, 6, 9; Num. 20:8, 9, 11; Is. 10:26
  - type: text
    content: 'lift up your rod, and stretch out your hand over the sea and divide it. And the children of Israel shall go on dry '
  - type: text
    content: ground
  - type: text
    content: ' through the midst of the sea. '
  '17':
  - type: text
    content: 'And I indeed will '
  - type: note
    content: Ex. 14:8
  - type: text
    content: 'harden the hearts of the Egyptians, and they shall follow them. So I will '
  - type: note
    content: Ex. 14:4
  - type: text
    content: 'gain honor over Pharaoh and over all his army, his chariots, and his horsemen. '
  '18':
  - type: text
    content: 'Then the Egyptians shall know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: ', when I have gained honor for Myself over Pharaoh, his chariots, and his horsemen.”'
  '19':
  - type: text
    content: 'And the Angel of God, '
  - type: note
    content: Ex. 13:21, 22; (Is. 63:9)
  - type: text
    content: 'who went before the camp of Israel, moved and went behind them; and the pillar of cloud went from before them and stood behind them. '
  '2':
  - type: text
    content: '“Speak to the children of Israel, '
  - type: note
    content: Ex. 13:18
  - type: text
    content: 'that they turn and camp before '
  - type: note
    content: Num. 33:7
  - type: text
    content: 'Pi Hahiroth, between '
  - type: note
    content: Jer. 44:1
  - type: text
    content: 'Migdol and the sea, opposite Baal Zephon; you shall camp before it by the sea. '
  '20':
  - type: text
    content: 'So it came between the camp of the Egyptians and the camp of Israel. Thus it was a cloud and darkness '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: one,
  - type: text
    content: ' and it gave light by night '
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: other,
  - type: text
    content: ' so that the one did not come near the other all that night.'
  '21':
  - type: text
    content: 'Then Moses stretched out his hand over the sea; and the '
  - type: heading
    content: Lord
  - type: text
    content: ' caused the sea to go '
  - type: text
    content: back
  - type: text
    content: ' by a strong east wind all that night, and '
  - type: note
    content: Ps. 66:6; 106:9; 136:13, 14
  - type: text
    content: 'made the sea into dry '
  - type: text
    content: land,
  - type: text
    content: ' and the waters were '
  - type: note
    content: Ex. 15:8; Josh. 3:16; 4:23; Neh. 9:11; Ps. 74:13; 78:13; 114:3, 5; Is. 63:12, 13
  - type: text
    content: 'divided. '
  '22':
  - type: text
    content: 'So '
  - type: note
    content: Ex. 15:19; Josh. 3:17; 4:22; Neh. 9:11; Ps. 66:6; 78:13; Is. 63:13; 1 Cor. 10:1; Heb. 11:29
  - type: text
    content: 'the children of Israel went into the midst of the sea on the dry '
  - type: text
    content: ground,
  - type: text
    content: ' and the waters '
  - type: text
    content: were
  - type: text
    content: ' '
  - type: note
    content: Ex. 14:29; 15:8; Hab. 3:10
  - type: text
    content: 'a wall to them on their right hand and on their left. '
  '23':
  - type: text
    content: And the Egyptians pursued and went after them into the midst of the sea, all Pharaoh’s horses, his chariots, and his horsemen.
  '24':
  - type: text
    content: 'Now it came to pass, in the morning '
  - type: note
    content: Judg. 7:19
  - type: text
    content: 'watch, that '
  - type: note
    content: Ex. 13:21
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' looked down upon the army of the Egyptians through the pillar of fire and cloud, and He troubled the army of the Egyptians. '
  '25':
  - type: text
    content: 'And He took off their chariot wheels, so that they drove them with difficulty; and the Egyptians said, “Let us flee from the face of Israel, for the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 7:5; 14:4, 14, 18
  - type: text
    content: fights for them against the Egyptians.”
  '26':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses, “Stretch out your hand over the sea, that the waters may come back upon the Egyptians, on their chariots, and on their horsemen.” '
  '27':
  - type: text
    content: 'And Moses stretched out his hand over the sea; and when the morning appeared, the sea '
  - type: note
    content: Josh. 4:18
  - type: text
    content: 'returned to its full depth, while the Egyptians were fleeing into it. So the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 15:1, 7; Deut. 11:4; Neh. 9:11; Ps. 78:53; Heb. 11:29
  - type: text
    content: 'overthrew the Egyptians in the midst of the sea. '
  '28':
  - type: text
    content: 'Then '
  - type: note
    content: Ps. 78:53; 106:11
  - type: text
    content: 'the waters returned and covered the chariots, the horsemen, '
  - type: text
    content: and
  - type: text
    content: ' all the army of Pharaoh that came into the sea after them. Not so much as one of them remained. '
  '29':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 14:22; Ps. 66:6; 78:52, 53; Is. 11:15
  - type: text
    content: 'the children of Israel had walked on dry '
  - type: text
    content: land
  - type: text
    content: ' in the midst of the sea, and the waters '
  - type: text
    content: were
  - type: text
    content: ' a wall to them on their right hand and on their left.'
  '3':
  - type: text
    content: 'For Pharaoh will say of the children of Israel, '
  - type: note
    content: Ps. 71:11
  - type: text
    content: '‘They '
  - type: text
    content: are
  - type: text
    content: ' bewildered by the land; the wilderness has closed them in.’ '
  '30':
  - type: text
    content: 'So the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 14:13; Ps. 106:8, 10; Is. 63:8, 11
  - type: text
    content: 'saved Israel that day out of the hand of the Egyptians, and Israel '
  - type: note
    content: Ps. 58:10; 59:10
  - type: text
    content: 'saw the Egyptians dead on the seashore. '
  '31':
  - type: text
    content: 'Thus Israel saw the great work which the '
  - type: heading
    content: Lord
  - type: text
    content: ' had done in Egypt; so the people feared the '
  - type: heading
    content: Lord
  - type: text
    content: ', and '
  - type: note
    content: Ex. 4:31; 19:9; Ps. 106:12; John 2:11; 11:45
  - type: text
    content: 'believed the '
  - type: heading
    content: Lord
  - type: text
    content: ' and His servant Moses.'
  '4':
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 4:21; 7:3; 14:17
  - type: text
    content: 'I will harden Pharaoh’s heart, so that he will pursue them; and I '
  - type: note
    content: Ex. 9:16; 14:17, 18, 23; Rom. 9:17, 22, 23
  - type: text
    content: 'will gain honor over Pharaoh and over all his army, '
  - type: note
    content: Ex. 7:5; 14:25
  - type: text
    content: 'that the Egyptians may know that I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: .” And they did so.
  '5':
  - type: text
    content: 'Now it was told the king of Egypt that the people had fled, and '
  - type: note
    content: Ps. 105:25
  - type: text
    content: 'the heart of Pharaoh and his servants was turned against the people; and they said, “Why have we done this, that we have let Israel go from serving us?” '
  '6':
  - type: text
    content: 'So he made ready his chariot and took his people with him. '
  '7':
  - type: text
    content: 'Also, he took '
  - type: note
    content: Ex. 15:4
  - type: text
    content: 'six hundred choice chariots, and all the chariots of Egypt with captains over every one of them. '
  '8':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ex. 14:4
  - type: text
    content: 'hardened the heart of Pharaoh king of Egypt, and he pursued the children of Israel; and '
  - type: note
    content: Ex. 6:1; 13:9; Num. 33:3; Acts 13:17
  - type: text
    content: 'the children of Israel went out with boldness. '
  '9':
  - type: text
    content: 'So the '
  - type: note
    content: Ex. 15:9; Josh. 24:6
  - type: text
    content: 'Egyptians pursued them, all the horses '
  - type: text
    content: and
  - type: text
    content: ' chariots of Pharaoh, his horsemen and his army, and overtook them camping by the sea beside Pi Hahiroth, before Baal Zephon.'
