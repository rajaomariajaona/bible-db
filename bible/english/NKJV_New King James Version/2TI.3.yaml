document_id: 2TI.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Perilous Times and Perilous Men
  - type: text
    content: 'But know this, that '
  - type: note
    content: 1 Tim. 4:1; 2 Pet. 3:3; 1 John 2:18; Jude 17, 18
  - type: text
    content: 'in the last days perilous times will come: '
  '10':
  - type: note
    content: Phil. 2:20, 22; 1 Tim. 4:6
  - type: text
    content: 'But you have carefully followed my doctrine, manner of life, purpose, faith, longsuffering, love, perseverance, '
  '11':
  - type: text
    content: 'persecutions, afflictions, which happened to me '
  - type: note
    content: Acts 13:44–52
  - type: text
    content: 'at Antioch, '
  - type: note
    content: Acts 14:1–6, 19
  - type: text
    content: 'at Iconium, '
  - type: note
    content: Acts 14:8–20
  - type: text
    content: 'at Lystra—what persecutions I endured. And '
  - type: note
    content: Ps. 34:19
  - type: text
    content: 'out of '
  - type: text
    content: them
  - type: text
    content: ' all the Lord delivered me. '
  '12':
  - type: text
    content: 'Yes, and '
  - type: note
    content: (Ps. 34:19)
  - type: text
    content: 'all who desire to live godly in Christ Jesus will suffer persecution. '
  '13':
  - type: note
    content: 2 Thess. 2:11
  - type: text
    content: 'But evil men and impostors will grow worse and worse, deceiving and being deceived. '
  '14':
  - type: text
    content: 'But you must '
  - type: note
    content: 2 Tim. 1:13; Titus 1:9
  - type: text
    content: 'continue in the things which you have learned and been assured of, knowing from whom you have learned '
  - type: text
    content: them,
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'and that from childhood you have known '
  - type: note
    content: Ps. 119:97–104; John 5:39
  - type: text
    content: the Holy Scriptures, which are able to make you wise for salvation through faith which is in Christ Jesus.
  '16':
  - type: note
    content: (2 Pet. 1:20)
  - type: text
    content: 'All Scripture '
  - type: text
    content: is
  - type: text
    content: ' given by inspiration of God, '
  - type: note
    content: Rom. 4:23; 15:4
  - type: text
    content: 'and '
  - type: text
    content: is
  - type: text
    content: ' profitable for doctrine, for reproof, for correction, for instruction in righteousness, '
  '17':
  - type: note
    content: 1 Tim. 6:11
  - type: text
    content: 'that the man of God may be complete, '
  - type: note
    content: 2 Tim. 2:21; Heb. 13:21
  - type: text
    content: thoroughly equipped for every good work.
  '2':
  - type: text
    content: 'For men will be lovers of themselves, lovers of money, boasters, proud, blasphemers, disobedient to parents, unthankful, unholy, '
  '3':
  - type: text
    content: 'unloving, unforgiving, slanderers, without self-control, brutal, despisers of good, '
  '4':
  - type: note
    content: 2 Pet. 2:10
  - type: text
    content: 'traitors, headstrong, haughty, lovers of pleasure rather than lovers of God, '
  '5':
  - type: note
    content: Titus 1:16
  - type: text
    content: 'having a form of godliness but '
  - type: note
    content: 1 Tim. 5:8
  - type: text
    content: 'denying its power. And '
  - type: note
    content: Matt. 23:3; 2 Thess. 3:6; 1 Tim. 6:5
  - type: text
    content: 'from such people turn away! '
  '6':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 23:14; Titus 1:11
  - type: text
    content: 'of this sort are those who creep into households and make captives of gullible women loaded down with sins, led away by various lusts, '
  '7':
  - type: text
    content: 'always learning and never able '
  - type: note
    content: 1 Tim. 2:4
  - type: text
    content: 'to come to the knowledge of the truth. '
  '8':
  - type: note
    content: Ex. 7:11, 12, 22; 8:7; 9:11
  - type: text
    content: 'Now as Jannes and Jambres resisted Moses, so do these also resist the truth: '
  - type: note
    content: 1 Tim. 6:5
  - type: text
    content: 'men of corrupt minds, '
  - type: note
    content: Rom. 1:28
  - type: text
    content: 'disapproved concerning the faith; '
  '9':
  - type: text
    content: 'but they will progress no further, for their folly will be manifest to all, '
  - type: note
    content: Ex. 7:11, 12; 8:18; 9:11
  - type: text
    content: as theirs also was.
  - type: heading
    content: The Man of God and the Word of God
