document_id: 2TI.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Perilous Times and Perilous Men
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But know this, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 4:1; 2 Pet. 3:3; 1 John 2:18; Jude 17, 18
    marker-yv: yv-n
  - type: text
    text: 'in the last days perilous times will come: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For men will be lovers of themselves, lovers of money, boasters, proud, blasphemers, disobedient to parents, unthankful, unholy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'unloving, unforgiving, slanderers, without self-control, brutal, despisers of good, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Pet. 2:10
    marker-yv: yv-n
  - type: text
    text: 'traitors, headstrong, haughty, lovers of pleasure rather than lovers of God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Titus 1:16
    marker-yv: yv-n
  - type: text
    text: 'having a form of godliness but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 5:8
    marker-yv: yv-n
  - type: text
    text: 'denying its power. And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 23:3; 2 Thess. 3:6; 1 Tim. 6:5
    marker-yv: yv-n
  - type: text
    text: 'from such people turn away! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 23:14; Titus 1:11
    marker-yv: yv-n
  - type: text
    text: 'of this sort are those who creep into households and make captives of gullible women loaded down with sins, led away by various lusts, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'always learning and never able '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 2:4
    marker-yv: yv-n
  - type: text
    text: 'to come to the knowledge of the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 7:11, 12, 22; 8:7; 9:11
    marker-yv: yv-n
  - type: text
    text: 'Now as Jannes and Jambres resisted Moses, so do these also resist the truth: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 6:5
    marker-yv: yv-n
  - type: text
    text: 'men of corrupt minds, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:28
    marker-yv: yv-n
  - type: text
    text: 'disapproved concerning the faith; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'but they will progress no further, for their folly will be manifest to all, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 7:11, 12; 8:18; 9:11
    marker-yv: yv-n
  - type: text
    text: as theirs also was.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Man of God and the Word of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 2:20, 22; 1 Tim. 4:6
    marker-yv: yv-n
  - type: text
    text: 'But you have carefully followed my doctrine, manner of life, purpose, faith, longsuffering, love, perseverance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'persecutions, afflictions, which happened to me '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 13:44–52
    marker-yv: yv-n
  - type: text
    text: 'at Antioch, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 14:1–6, 19
    marker-yv: yv-n
  - type: text
    text: 'at Iconium, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 14:8–20
    marker-yv: yv-n
  - type: text
    text: 'at Lystra—what persecutions I endured. And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 34:19
    marker-yv: yv-n
  - type: text
    text: 'out of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' all the Lord delivered me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Yes, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 34:19)
    marker-yv: yv-n
  - type: text
    text: 'all who desire to live godly in Christ Jesus will suffer persecution. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Thess. 2:11
    marker-yv: yv-n
  - type: text
    text: 'But evil men and impostors will grow worse and worse, deceiving and being deceived. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But you must '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 1:13; Titus 1:9
    marker-yv: yv-n
  - type: text
    text: 'continue in the things which you have learned and been assured of, knowing from whom you have learned '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and that from childhood you have known '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 119:97–104; John 5:39
    marker-yv: yv-n
  - type: text
    text: the Holy Scriptures, which are able to make you wise for salvation through faith which is in Christ Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Pet. 1:20)
    marker-yv: yv-n
  - type: text
    text: 'All Scripture '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' given by inspiration of God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 4:23; 15:4
    marker-yv: yv-n
  - type: text
    text: 'and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' profitable for doctrine, for reproof, for correction, for instruction in righteousness, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 6:11
    marker-yv: yv-n
  - type: text
    text: 'that the man of God may be complete, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 2:21; Heb. 13:21
    marker-yv: yv-n
  - type: text
    text: thoroughly equipped for every good work.
