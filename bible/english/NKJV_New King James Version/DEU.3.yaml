  - type: text
    content: (the Salt Sea), below the slopes of Pisgah.
  '18':
  - type: text
    content: '“Then I commanded you at that time, saying: ‘The '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has given you this land to possess. '
  - type: note
    content: Num. 32:20; Josh. 4:12, 13
  - type: text
    content: 'All you men of valor shall cross over armed before your brethren, the children of Israel. '
  '19':
  - type: text
    content: 'But your wives, your little ones, and your livestock (I know that you have much livestock) shall stay in your cities which I have given you, '
  '2':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me, ‘Do not fear him, for I have delivered him and all his people and his land into your hand; you shall do to him as you did to '
  - type: note
    content: Num. 21:34; Josh. 13:21
  - type: text
    content: Sihon king of the Amorites, who dwelt at Heshbon.’
  '20':
  - type: text
    content: 'until the '
  - type: heading
    content: Lord
  - type: text
    content: ' has given '
  - type: note
    content: Deut. 12:9, 10
  - type: text
    content: 'rest to your brethren as to you, and they also possess the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving them beyond the Jordan. Then each of you may '
  - type: note
    content: Josh. 22:4
  - type: text
    content: return to his possession which I have given you.’
  '21':
  - type: text
    content: '“And '
  - type: note
    content: (Num. 27:22, 23); Josh. 11:23
  - type: text
    content: 'I commanded Joshua at that time, saying, ‘Your eyes have seen all that the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God has done to these two kings; so will the '
  - type: heading
    content: Lord
  - type: text
    content: ' do to all the kingdoms through which you pass. '
  '22':
  - type: text
    content: 'You must not fear them, for '
  - type: note
    content: Ex. 14:14; Deut. 1:30; 20:4; Neh. 4:20
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God Himself fights for you.’'
  - type: heading
    content: Moses Forbidden to Enter the Land
  '23':
  - type: text
    content: '“Then '
  - type: note
    content: (2 Cor. 12:8, 9)
  - type: text
    content: 'I pleaded with the '
  - type: heading
    content: Lord
  - type: text
    content: ' at that time, saying: '
  '24':
  - type: text
    content: '‘O Lord '
  - type: heading
    content: God
  - type: text
    content: ', You have begun to show Your servant '
  - type: note
    content: Deut. 5:24; 11:2
  - type: text
    content: 'Your greatness and Your mighty hand, for '
  - type: note
    content: Ex. 8:10; 15:11; 2 Sam. 7:22; Ps. 71:19; 86:8
  - type: text
    content: 'what god '
  - type: text
    content: is
  - type: text
    content: ' '
  - type: text
    content: there
  - type: text
    content: ' in heaven or on earth who can do '
  - type: text
    content: anything
  - type: text
    content: ' like Your works and Your mighty '
  - type: text
    content: deeds?
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'I pray, let me cross over and see '
  - type: note
    content: Ex. 3:8; Deut. 4:22
  - type: text
    content: the good land beyond the Jordan, those pleasant mountains, and Lebanon.’
  '26':
  - type: text
    content: '“But the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Num. 20:12; 27:14; Deut. 1:37; 31:2; 32:51, 52; 34:4
  - type: text
    content: 'was angry with me on your account, and would not listen to me. So the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to me: ‘Enough of that! Speak no more to Me of this matter. '
  '27':
  - type: note
    content: Num. 23:14; 27:12
  - type: text
    content: 'Go up to the top of Pisgah, and lift your eyes toward the west, the north, the south, and the east; behold '
  - type: text
    content: it
  - type: text
    content: ' with your eyes, for you shall not cross over this Jordan. '
  '28':
  - type: text
    content: 'But '
  - type: note
    content: Num. 27:18, 23; Deut. 31:3, 7, 8, 23
  - type: text
    content: command Joshua, and encourage him and strengthen him; for he shall go over before this people, and he shall cause them to inherit the land which you will see.’
  '29':
  - type: text
    content: '“So we stayed in '
  - type: note
    content: Deut. 4:46; 34:6
  - type: text
    content: the valley opposite Beth Peor.
  '3':
  - type: text
    content: '“So the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God also delivered into our hands Og king of Bashan, with all his people, and we attacked him until he had no survivors remaining. '
  '4':
  - type: text
    content: 'And we took all his cities at that time; there was not a city which we did not take from them: sixty cities, '
  - type: note
    content: Deut. 3:13, 14
  - type: text
    content: 'all the region of Argob, the kingdom of Og in Bashan. '
  '5':
  - type: text
    content: 'All these cities '
  - type: text
    content: were
  - type: text
    content: ' fortified with high walls, gates, and bars, besides a great many rural towns. '
  '6':
  - type: text
    content: 'And we utterly destroyed them, as we did to Sihon king '
  - type: note
    content: Deut. 2:24, 34, 35
  - type: text
    content: 'of Heshbon, utterly destroying the men, women, and children of every city. '
  '7':
  - type: text
    content: But all the livestock and the spoil of the cities we took as booty for ourselves.
  '8':
  - type: text
    content: '“And at that time we took the '
  - type: note
    content: Num. 32:33; Josh. 12:6; 13:8–12
  - type: text
    content: 'land from the hand of the two kings of the Amorites who '
  - type: text
    content: were
  - type: text
    content: ' on this side of the Jordan, from the River Arnon to Mount '
  - type: note
    content: Deut. 4:48; 1 Chr. 5:23
  - type: text
    content: 'Hermon '
  '9':
  - type: text
    content: '(the Sidonians call '
  - type: note
    content: 1 Chr. 5:23
  - type: text
    content: 'Hermon Sirion, and the Amorites call it Senir), '
