verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: King Og Defeated
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“Then we turned and went up the road to Bashan; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:33–35; Deut. 29:7
      marker-yv: yv-n
    - type: text
      text: 'Og king of Bashan came out against us, he and all his people, to battle '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:4
      marker-yv: yv-n
    - type: text
      text: 'at Edrei. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:49
      marker-yv: yv-n
    - type: text
      text: 'all the cities of the plain, all Gilead, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 12:5; 13:11
      marker-yv: yv-n
    - type: text
      text: all Bashan, as far as Salcah and Edrei, cities of the kingdom of Og in Bashan.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amos 2:9
      marker-yv: yv-n
    - type: text
      text: '“For only Og king of Bashan remained of the remnant of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:5; Deut. 2:11, 20
      marker-yv: yv-n
    - type: text
      text: 'the giants. Indeed his bedstead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' an iron bedstead. ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: Is
    - type: text
      text: ' it not in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:26; Jer. 49:2; Ezek. 21:20
      marker-yv: yv-n
    - type: text
      text: 'Rabbah of the people of Ammon?) Nine cubits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' its length and four cubits its width, according to the standard cubit.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land East of the Jordan Divided
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“And this '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:33; Josh. 12:6; 13:8–12
      marker-yv: yv-n
    - type: text
      text: 'land, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' we possessed at that time, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:36; Josh. 12:2
      marker-yv: yv-n
    - type: text
      text: 'from Aroer, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' by the River Arnon, and half the mountains of Gilead and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:14
      marker-yv: yv-n
    - type: text
      text: 'its cities, I gave to the Reubenites and the Gadites. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:29–31; 17:1
      marker-yv: yv-n
    - type: text
      text: 'The rest of Gilead, and all Bashan, the kingdom of Og, I gave to half the tribe of Manasseh. (All the region of Argob, with all Bashan, was called the land of the giants. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 2:22
      marker-yv: yv-n
    - type: text
      text: 'Jair the son of Manasseh took all the region of Argob, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:13; 2 Sam. 3:3; 10:6
      marker-yv: yv-n
    - type: text
      text: 'as far as the border of the Geshurites and the Maachathites, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:41
      marker-yv: yv-n
    - type: text
      text: called Bashan after his own name, Havoth Jair, to this day.)
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“Also I gave '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:39, 40
      marker-yv: yv-n
    - type: text
      text: 'Gilead to Machir. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And to the Reubenites '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 24:5
      marker-yv: yv-n
    - type: text
      text: 'and the Gadites I gave from Gilead as far as the River Arnon, the middle of the river as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' border, as far as the River Jabbok, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:24; Deut. 2:37; Josh. 12:2
      marker-yv: yv-n
    - type: text
      text: 'the border of the people of Ammon; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'the plain also, with the Jordan as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' border, from Chinnereth '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:11, 12; Deut. 4:49; Josh. 12:3
      marker-yv: yv-n
    - type: text
      text: 'as far as the east side of the Sea of the Arabah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:3; Josh. 3:16
      marker-yv: yv-n
    - type: text
      text: (the Salt Sea), below the slopes of Pisgah.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Then I commanded you at that time, saying: ‘The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has given you this land to possess. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:20; Josh. 4:12, 13
      marker-yv: yv-n
    - type: text
      text: 'All you men of valor shall cross over armed before your brethren, the children of Israel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But your wives, your little ones, and your livestock (I know that you have much livestock) shall stay in your cities which I have given you, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, ‘Do not fear him, for I have delivered him and all his people and his land into your hand; you shall do to him as you did to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 21:34; Josh. 13:21
      marker-yv: yv-n
    - type: text
      text: Sihon king of the Amorites, who dwelt at Heshbon.’
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'until the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:9, 10
      marker-yv: yv-n
    - type: text
      text: 'rest to your brethren as to you, and they also possess the land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving them beyond the Jordan. Then each of you may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 22:4
      marker-yv: yv-n
    - type: text
      text: return to his possession which I have given you.’
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Num. 27:22, 23); Josh. 11:23
      marker-yv: yv-n
    - type: text
      text: 'I commanded Joshua at that time, saying, ‘Your eyes have seen all that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has done to these two kings; so will the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' do to all the kingdoms through which you pass. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'You must not fear them, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 14:14; Deut. 1:30; 20:4; Neh. 4:20
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God Himself fights for you.’'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Forbidden to Enter the Land
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 12:8, 9)
      marker-yv: yv-n
    - type: text
      text: 'I pleaded with the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at that time, saying: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '‘O Lord '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: God
    - type: text
      text: ', You have begun to show Your servant '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 5:24; 11:2
      marker-yv: yv-n
    - type: text
      text: 'Your greatness and Your mighty hand, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 8:10; 15:11; 2 Sam. 7:22; Ps. 71:19; 86:8
      marker-yv: yv-n
    - type: text
      text: 'what god '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' in heaven or on earth who can do '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything
    - type: text
      text: ' like Your works and Your mighty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: deeds?
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I pray, let me cross over and see '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:8; Deut. 4:22
      marker-yv: yv-n
    - type: text
      text: the good land beyond the Jordan, those pleasant mountains, and Lebanon.’
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“But the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 20:12; 27:14; Deut. 1:37; 31:2; 32:51, 52; 34:4
      marker-yv: yv-n
    - type: text
      text: 'was angry with me on your account, and would not listen to me. So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me: ‘Enough of that! Speak no more to Me of this matter. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 23:14; 27:12
      marker-yv: yv-n
    - type: text
      text: 'Go up to the top of Pisgah, and lift your eyes toward the west, the north, the south, and the east; behold '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' with your eyes, for you shall not cross over this Jordan. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:18, 23; Deut. 31:3, 7, 8, 23
      marker-yv: yv-n
    - type: text
      text: command Joshua, and encourage him and strengthen him; for he shall go over before this people, and he shall cause them to inherit the land which you will see.’
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '“So we stayed in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:46; 34:6
      marker-yv: yv-n
    - type: text
      text: the valley opposite Beth Peor.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“So the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God also delivered into our hands Og king of Bashan, with all his people, and we attacked him until he had no survivors remaining. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And we took all his cities at that time; there was not a city which we did not take from them: sixty cities, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 3:13, 14
      marker-yv: yv-n
    - type: text
      text: 'all the region of Argob, the kingdom of Og in Bashan. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'All these cities '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' fortified with high walls, gates, and bars, besides a great many rural towns. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And we utterly destroyed them, as we did to Sihon king '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:24, 34, 35
      marker-yv: yv-n
    - type: text
      text: 'of Heshbon, utterly destroying the men, women, and children of every city. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But all the livestock and the spoil of the cities we took as booty for ourselves.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“And at that time we took the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 32:33; Josh. 12:6; 13:8–12
      marker-yv: yv-n
    - type: text
      text: 'land from the hand of the two kings of the Amorites who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' on this side of the Jordan, from the River Arnon to Mount '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:48; 1 Chr. 5:23
      marker-yv: yv-n
    - type: text
      text: 'Hermon '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '(the Sidonians call '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 5:23
      marker-yv: yv-n
    - type: text
      text: 'Hermon Sirion, and the Amorites call it Senir), '
