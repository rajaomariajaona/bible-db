  - type: text
    content: 'its cities, I gave to the Reubenites and the Gadites. '
  '13':
  - type: note
    content: Josh. 13:29–31; 17:1
  - type: text
    content: 'The rest of Gilead, and all Bashan, the kingdom of Og, I gave to half the tribe of Manasseh. (All the region of Argob, with all Bashan, was called the land of the giants. '
  '14':
  - type: note
    content: 1 Chr. 2:22
  - type: text
    content: 'Jair the son of Manasseh took all the region of Argob, '
  - type: note
    content: Josh. 13:13; 2 Sam. 3:3; 10:6
  - type: text
    content: 'as far as the border of the Geshurites and the Maachathites, and '
  - type: note
    content: Num. 32:41
  - type: text
    content: called Bashan after his own name, Havoth Jair, to this day.)
  '15':
  - type: text
    content: '“Also I gave '
  - type: note
    content: Num. 32:39, 40
  - type: text
    content: 'Gilead to Machir. '
  '16':
  - type: text
    content: 'And to the Reubenites '
  - type: note
    content: 2 Sam. 24:5
  - type: text
    content: 'and the Gadites I gave from Gilead as far as the River Arnon, the middle of the river as '
  - type: text
    content: the
  - type: text
    content: ' border, as far as the River Jabbok, '
  - type: note
