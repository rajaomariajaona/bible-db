document_id: ISA.13,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Proclamation Against Babylon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 50; 51; Matt. 1:11; Rev. 14:8
      marker-yv: yv-n
    - type: text
      text: burden against Babylon which Isaiah the son of Amoz saw.
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For the stars of heaven and their constellations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will not give their light;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The sun will be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 24:21–23; Ezek. 32:7; Joel 2:31; Matt. 24:29; Mark 13:24; Luke 21:25
      marker-yv: yv-n
    - type: text
      text: darkened in its going forth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the moon will not cause its light to shine.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 26:21
      marker-yv: yv-n
    - type: text
      text: 'punish the world for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: its
    - type: text
      text: ' evil,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the wicked for their iniquity;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 2:17)
      marker-yv: yv-n
    - type: text
      text: I will halt the arrogance of the proud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And will lay low the haughtiness of the terrible.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will make a mortal more rare than fine gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A man more than the golden wedge of Ophir.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 34:4; 51:6; Hag. 2:6
      marker-yv: yv-n
    - type: text
      text: Therefore I will shake the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the earth will move out of her place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the wrath of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 110:5; Lam. 1:12
      marker-yv: yv-n
    - type: text
      text: the day of His fierce anger.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: It shall be as the hunted gazelle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And as a sheep that no man takes up;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 50:16; 51:9
      marker-yv: yv-n
    - type: text
      text: Every man will turn to his own people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And everyone will flee to his own land.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Everyone who is found will be thrust through,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And everyone who is captured will fall by the sword.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Their children also will be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 137:8, 9; Is. 13:18; 14:21; Hos. 10:14; Nah. 3:10
      marker-yv: yv-n
    - type: text
      text: dashed to pieces before their eyes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their houses will be plundered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And their wives '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 14:2
      marker-yv: yv-n
    - type: text
      text: ravished.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Behold,
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 21:2; Jer. 51:11, 28; Dan. 5:28, 31
      marker-yv: yv-n
    - type: text
      text: ' I will stir up the Medes against them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will not regard silver;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' gold, they will not delight in it.'
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' bows will dash the young men to pieces,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they will have no pity on the fruit of the womb;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their eye will not spare children.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 14:4; Dan. 4:30; Rev. 18:11–16, 19, 21
      marker-yv: yv-n
    - type: text
      text: And Babylon, the glory of kingdoms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The beauty of the Chaldeans’ pride,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Will be as when God overthrew '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:24; Deut. 29:23; Jer. 50:40; Amos 4:11
      marker-yv: yv-n
    - type: text
      text: Sodom and Gomorrah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Lift
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 18:3
      marker-yv: yv-n
    - type: text
      text: ' up a banner '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 51:25
      marker-yv: yv-n
    - type: text
      text: on the high mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Raise your voice to them;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 10:32
      marker-yv: yv-n
    - type: text
      text: Wave your hand, that they may enter the gates of the nobles.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 50:3
      marker-yv: yv-n
    - type: text
      text: It will never be inhabited,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor will it be settled from generation to generation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor will the Arabian pitch tents there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor will the shepherds make their sheepfolds there.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 34:11–15; Zeph. 2:14; Rev. 18:2
      marker-yv: yv-n
    - type: text
      text: But wild beasts of the desert will lie there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their houses will be full of owls;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ostriches will dwell there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wild goats will caper there.
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The hyenas will howl in their citadels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And jackals in their pleasant palaces.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 51:33
      marker-yv: yv-n
    - type: text
      text: 'Her time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' near to come,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And her days will not be prolonged.”
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I have commanded My sanctified ones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I have also called '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 3:11
      marker-yv: yv-n
    - type: text
      text: My mighty ones for My anger—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Those who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 149:2
      marker-yv: yv-n
    - type: text
      text: rejoice in My exaltation.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 17:12; Joel 3:14
      marker-yv: yv-n
    - type: text
      text: noise of a multitude in the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like that of many people!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A tumultuous noise of the kingdoms of nations gathered together!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts musters'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The army for battle.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They come from a far country,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From the end of heaven—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 42:13
      marker-yv: yv-n
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and His weapons of indignation,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To destroy the whole '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 24:1; 34:2
      marker-yv: yv-n
    - type: text
      text: land.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Wail, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 2:12; Ezek. 30:3; Amos 5:18; Zeph. 1:7; Rev. 6:17
      marker-yv: yv-n
    - type: text
      text: 'for the day of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' at hand!'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 10:25; Job 31:23; Joel 1:15
      marker-yv: yv-n
    - type: text
      text: It will come as destruction from the Almighty.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Therefore all hands will be limp,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Every man’s heart will melt,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: And they will be afraid.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 48:6
      marker-yv: yv-n
    - type: text
      text: 'Pangs and sorrows will take hold of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be in pain as a woman in childbirth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They will be amazed at one another;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Their faces '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' flames.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mal. 4:1
      marker-yv: yv-n
    - type: text
      text: 'the day of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' comes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Cruel, with both wrath and fierce anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To lay the land desolate;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And He will destroy '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 104:35; Prov. 2:22
      marker-yv: yv-n
    - type: text
      text: its sinners from it.
