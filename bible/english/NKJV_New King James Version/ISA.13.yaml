  '19':
  - type: note
    content: Is. 14:4; Dan. 4:30; Rev. 18:11–16, 19, 21
  - type: text
    content: And Babylon, the glory of kingdoms,
  - type: text
    content: The beauty of the Chaldeans’ pride,
  - type: text
    content: 'Will be as when God overthrew '
  - type: note
    content: Gen. 19:24; Deut. 29:23; Jer. 50:40; Amos 4:11
  - type: text
    content: Sodom and Gomorrah.
  '2':
  - type: text
    content: “Lift
  - type: note
    content: Is. 18:3
  - type: text
    content: ' up a banner '
  - type: note
    content: Jer. 51:25
  - type: text
    content: on the high mountain,
  - type: text
    content: Raise your voice to them;
  - type: note
    content: Is. 10:32
  - type: text
    content: Wave your hand, that they may enter the gates of the nobles.
  '20':
  - type: note
    content: Jer. 50:3
  - type: text
    content: It will never be inhabited,
  - type: text
    content: Nor will it be settled from generation to generation;
  - type: text
    content: Nor will the Arabian pitch tents there,
  - type: text
    content: Nor will the shepherds make their sheepfolds there.
  '21':
  - type: note
    content: Is. 34:11–15; Zeph. 2:14; Rev. 18:2
  - type: text
    content: But wild beasts of the desert will lie there,
  - type: text
    content: And their houses will be full of owls;
  - type: text
    content: Ostriches will dwell there,
  - type: text
    content: And wild goats will caper there.
  '22':
  - type: text
    content: The hyenas will howl in their citadels,
  - type: text
    content: And jackals in their pleasant palaces.
  - type: note
    content: Jer. 51:33
  - type: text
    content: 'Her time '
  - type: text
    content: is
  - type: text
    content: ' near to come,'
  - type: text
    content: And her days will not be prolonged.”
  '3':
  - type: text
    content: I have commanded My sanctified ones;
  - type: text
    content: 'I have also called '
  - type: note
    content: Joel 3:11
  - type: text
    content: My mighty ones for My anger—
  - type: text
    content: 'Those who '
  - type: note
    content: Ps. 149:2
  - type: text
    content: rejoice in My exaltation.”
