  - type: text
    content: darkened in its going forth,
  - type: text
    content: And the moon will not cause its light to shine.
  '11':
  - type: text
    content: '“I will '
  - type: note
    content: Is. 26:21
  - type: text
    content: 'punish the world for '
  - type: text
    content: its
  - type: text
    content: ' evil,'
  - type: text
    content: And the wicked for their iniquity;
  - type: note
    content: (Is. 2:17)
  - type: text
    content: I will halt the arrogance of the proud,
  - type: text
    content: And will lay low the haughtiness of the terrible.
  '12':
  - type: text
    content: I will make a mortal more rare than fine gold,
  - type: text
    content: A man more than the golden wedge of Ophir.
  '13':
  - type: note
    content: Is. 34:4; 51:6; Hag. 2:6
  - type: text
    content: Therefore I will shake the heavens,
  - type: text
    content: And the earth will move out of her place,
  - type: text
    content: 'In the wrath of the '
  - type: heading
