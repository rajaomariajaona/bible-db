  '7':
  - type: text
    content: Therefore all hands will be limp,
  - type: text
    content: Every man’s heart will melt,
  '8':
  - type: text
    content: And they will be afraid.
  - type: note
    content: Ps. 48:6
  - type: text
    content: 'Pangs and sorrows will take hold of '
  - type: text
    content: them;
  - type: text
    content: They will be in pain as a woman in childbirth;
  - type: text
    content: They will be amazed at one another;
  - type: text
    content: 'Their faces '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' '
  - type: text
    content: like
  - type: text
    content: ' flames.'
  '9':
  - type: text
    content: 'Behold, '
  - type: note
    content: Mal. 4:1
  - type: text
    content: 'the day of the '
  - type: heading
    content: Lord
  - type: text
    content: ' comes,'
  - type: text
    content: Cruel, with both wrath and fierce anger,
  - type: text
    content: To lay the land desolate;
  - type: text
