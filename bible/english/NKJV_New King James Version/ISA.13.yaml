  - type: text
    content: 'The '
  - type: note
    content: Is. 17:12; Joel 3:14
  - type: text
    content: noise of a multitude in the mountains,
  - type: text
    content: Like that of many people!
  - type: text
    content: A tumultuous noise of the kingdoms of nations gathered together!
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts musters'
  - type: text
    content: The army for battle.
  '5':
  - type: text
    content: They come from a far country,
  - type: text
    content: From the end of heaven—
  - type: text
    content: 'The '
  - type: note
    content: Is. 42:13
  - type: heading
    content: Lord
  - type: text
    content: ' and His weapons of indignation,'
  - type: text
    content: 'To destroy the whole '
