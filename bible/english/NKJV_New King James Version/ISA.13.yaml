    content: Jer. 50; 51; Matt. 1:11; Rev. 14:8
  - type: text
    content: burden against Babylon which Isaiah the son of Amoz saw.
  '10':
  - type: text
    content: For the stars of heaven and their constellations
  - type: text
    content: Will not give their light;
  - type: text
    content: 'The sun will be '
