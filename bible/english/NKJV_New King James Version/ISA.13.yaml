  - type: text
    content: ' of hosts'
  - type: text
    content: 'And in '
  - type: note
    content: Ps. 110:5; Lam. 1:12
  - type: text
    content: the day of His fierce anger.
  '14':
  - type: text
    content: It shall be as the hunted gazelle,
  - type: text
    content: And as a sheep that no man takes up;
  - type: note
    content: Jer. 50:16; 51:9
  - type: text
    content: Every man will turn to his own people,
  - type: text
    content: And everyone will flee to his own land.
  '15':
  - type: text
    content: Everyone who is found will be thrust through,
  - type: text
    content: And everyone who is captured will fall by the sword.
  '16':
  - type: text
    content: 'Their children also will be '
  - type: note
    content: Ps. 137:8, 9; Is. 13:18; 14:21; Hos. 10:14; Nah. 3:10
  - type: text
    content: dashed to pieces before their eyes;
  - type: text
    content: Their houses will be plundered
  - type: text
    content: 'And their wives '
  - type: note
    content: Zech. 14:2
  - type: text
    content: ravished.
  '17':
  - type: text
    content: “Behold,
  - type: note
    content: Is. 21:2; Jer. 51:11, 28; Dan. 5:28, 31
  - type: text
    content: ' I will stir up the Medes against them,'
