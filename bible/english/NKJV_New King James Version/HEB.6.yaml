document_id: HEB.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Peril of Not Progressing
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 5:12
      marker-yv: yv-n
    - type: text
      text: 'leaving the discussion of the elementary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: principles
    - type: text
      text: ' of Christ, let us go on to perfection, not laying again the foundation of repentance from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 9:14)
      marker-yv: yv-n
    - type: text
      text: 'dead works and of faith toward God, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 3:4
      marker-yv: yv-n
    - type: text
      text: 'God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not unjust to forget '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 1:3
      marker-yv: yv-n
    - type: text
      text: 'your work and labor of love which you have shown toward His name, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:25; Heb. 10:32–34
      marker-yv: yv-n
    - type: text
      text: 'ministered to the saints, and do minister. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And we desire that each one of you show the same diligence '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 2:2
      marker-yv: yv-n
    - type: text
      text: 'to the full assurance of hope until the end, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'that you do not become sluggish, but imitate those who through faith and patience '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 10:36
      marker-yv: yv-n
    - type: text
      text: inherit the promises.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Infallible Purpose in Christ
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For when God made a promise to Abraham, because He could swear by no one greater, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:16, 17; Luke 1:73
      marker-yv: yv-n
    - type: text
      text: 'He swore by Himself, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:16, 17
      marker-yv: yv-n
    - type: text
      text: '“Surely blessing I will bless you, and multiplying I will multiply you.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And so, after he had patiently endured, he obtained the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:4; 21:5
      marker-yv: yv-n
    - type: text
      text: 'promise. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For men indeed swear by the greater, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:11
      marker-yv: yv-n
    - type: text
      text: 'an oath for confirmation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' for them an end of all dispute. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Thus God, determining to show more abundantly to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:17; Heb. 11:9
      marker-yv: yv-n
    - type: text
      text: 'the heirs of promise '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 11:29
      marker-yv: yv-n
    - type: text
      text: 'the immutability of His counsel, confirmed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' by an oath, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'that by two immutable things, in which it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' impossible for God to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 23:19; 1 Sam. 15:29; Titus 1:2
      marker-yv: yv-n
    - type: text
      text: 'lie, we might have strong consolation, who have fled for refuge to lay hold of the hope '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Col. 1:5); Heb. 3:6; 7:19; 12:1
      marker-yv: yv-n
    - type: text
      text: 'set before '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hope
    - type: text
      text: ' we have as an anchor of the soul, both sure and steadfast, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 16:2, 15; Heb. 9:3, 7
      marker-yv: yv-n
    - type: text
      text: 'and which enters the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Presence
    - type: text
      text: ' behind the veil, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 3:25; Acts 19:3–5
      marker-yv: yv-n
    - type: text
      text: 'of the doctrine of baptisms, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 8:17)
      marker-yv: yv-n
    - type: text
      text: 'of laying on of hands, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:31
      marker-yv: yv-n
    - type: text
      text: 'of resurrection of the dead, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 24:25
      marker-yv: yv-n
    - type: text
      text: 'and of eternal judgment. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 14:2; Heb. 4:14)
      marker-yv: yv-n
    - type: text
      text: 'where the forerunner has entered for us, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even
    - type: text
      text: ' Jesus, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 14:17–19; Ps. 110:4; Heb. 3:1; 5:10, 11
      marker-yv: yv-n
    - type: text
      text: having become High Priest forever according to the order of Melchizedek.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And this we will do if God permits.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' impossible for those who were once enlightened, and have tasted '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 4:10); Eph. 2:8
      marker-yv: yv-n
    - type: text
      text: 'the heavenly gift, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gal. 3:2, 5); Heb. 2:4
      marker-yv: yv-n
    - type: text
      text: 'have become partakers of the Holy Spirit, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'and have tasted the good word of God and the powers of the age to come, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'if they fall away, to renew them again to repentance, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 10:29
      marker-yv: yv-n
    - type: text
      text: 'since they crucify again for themselves the Son of God, and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' to an open shame.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For the earth which drinks in the rain that often comes upon it, and bears herbs useful for those by whom it is cultivated, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 65:10
      marker-yv: yv-n
    - type: text
      text: 'receives blessing from God; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:6
      marker-yv: yv-n
    - type: text
      text: 'but if it bears thorns and briers, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' rejected and near to being cursed, whose end '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' to be burned.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Better Estimate
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But, beloved, we are confident of better things concerning you, yes, things that accompany salvation, though we speak in this manner. '
