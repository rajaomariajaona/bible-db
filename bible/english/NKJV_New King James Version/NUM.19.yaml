  - type: text
    content: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: text
    content: And the one who gathers the ashes of the heifer shall wash his clothes, and be unclean until evening. It shall be a statute forever to the children of Israel and to the stranger who dwells among them.
