  - type: note
    content: Lev. 21:1, 11; Num. 5:2; 6:6; 9:6, 10; 31:19; Lam. 4:14; Hag. 2:13
  - type: text
    content: '‘He who touches the dead body of anyone shall be unclean seven days. '
  '12':
  - type: note
    content: Num. 19:19; 31:19
  - type: text
    content: 'He shall purify himself with the water on the third day and on the seventh day; '
  - type: text
    content: then
  - type: text
    content: ' he will be clean. But if he does not purify himself on the third day and on the seventh day, he will not be clean. '
