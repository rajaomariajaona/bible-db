document_id: NUM.19,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Laws of Purification
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses and Aaron, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the one who gathers the ashes of the heifer shall wash his clothes, and be unclean until evening. It shall be a statute forever to the children of Israel and to the stranger who dwells among them.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 21:1, 11; Num. 5:2; 6:6; 9:6, 10; 31:19; Lam. 4:14; Hag. 2:13
      marker-yv: yv-n
    - type: text
      text: '‘He who touches the dead body of anyone shall be unclean seven days. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 19:19; 31:19
      marker-yv: yv-n
    - type: text
      text: 'He shall purify himself with the water on the third day and on the seventh day; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' he will be clean. But if he does not purify himself on the third day and on the seventh day, he will not be clean. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever touches the body of anyone who has died, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 22:3–7
      marker-yv: yv-n
    - type: text
      text: 'does not purify himself, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:31
      marker-yv: yv-n
    - type: text
      text: 'defiles the tabernacle of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. That person shall be cut off from Israel. He shall be unclean, because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 8:7; 19:9
      marker-yv: yv-n
    - type: text
      text: 'the water of purification was not sprinkled on him; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:20; 22:3
      marker-yv: yv-n
    - type: text
      text: 'his uncleanness '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' still on him.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the law when a man dies in a tent: All who come into the tent and all who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in the tent shall be unclean seven days; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and every '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:32; Num. 31:20
      marker-yv: yv-n
    - type: text
      text: 'open vessel, which has no cover fastened on it, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' unclean. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 19:11; 31:19
      marker-yv: yv-n
    - type: text
      text: Whoever in the open field touches one who is slain by a sword or who has died, or a bone of a man, or a grave, shall be unclean seven days.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And for an unclean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: person
    - type: text
      text: ' they shall take some of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 19:9
      marker-yv: yv-n
    - type: text
      text: 'ashes of the heifer burnt for purification from sin, and running water shall be put on them in a vessel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A clean person shall take '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 51:7
      marker-yv: yv-n
    - type: text
      text: 'hyssop and dip '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' in the water, sprinkle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' on the tent, on all the vessels, on the persons who were there, or on the one who touched a bone, the slain, the dead, or a grave. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The clean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: person
    - type: text
      text: ' shall sprinkle the unclean on the third day and on the seventh day; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:9
      marker-yv: yv-n
    - type: text
      text: and on the seventh day he shall purify himself, wash his clothes, and bathe in water; and at evening he shall be clean.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the ordinance of the law which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has commanded, saying: ‘Speak to the children of Israel, that they bring you a red heifer without blemish, in which there '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 22:20–25
      marker-yv: yv-n
    - type: text
      text: 'defect '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 21:3; 1 Sam. 6:7
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' on which a yoke has never come. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘But the man who is unclean and does not purify himself, that person shall be cut off from among the assembly, because he has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 19:13
      marker-yv: yv-n
    - type: text
      text: 'defiled the sanctuary of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. The water of purification has not been sprinkled on him; he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' unclean. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shall be a perpetual statute for them. He who sprinkles the water of purification shall wash his clothes; and he who touches the water of purification shall be unclean until evening. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hag. 2:11–13
      marker-yv: yv-n
    - type: text
      text: 'Whatever the unclean '
    - type: usfm
      marker: it
      children:
      - type: text
        text: person
    - type: text
      text: ' touches shall be unclean; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:5
      marker-yv: yv-n
    - type: text
      text: 'the person who touches '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' shall be unclean until evening.’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall give it to Eleazar the priest, that he may take it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:12, 21; Num. 19:9; Heb. 13:11
      marker-yv: yv-n
    - type: text
      text: 'outside the camp, and it shall be slaughtered before him; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Eleazar the priest shall take some of its blood with his finger, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:6; Heb. 9:13
      marker-yv: yv-n
    - type: text
      text: 'sprinkle some of its blood seven times directly in front of the tabernacle of meeting. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the heifer shall be burned in his sight: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:14; Lev. 4:11, 12; 9:11
      marker-yv: yv-n
    - type: text
      text: 'its hide, its flesh, its blood, and its offal shall be burned. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest shall take '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 14:4, 6, 49
      marker-yv: yv-n
    - type: text
      text: 'cedar wood and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:22; 1 Kin. 4:33
      marker-yv: yv-n
    - type: text
      text: 'hyssop and scarlet, and cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' into the midst of the fire burning the heifer. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:25; 15:5; 16:26, 28
      marker-yv: yv-n
    - type: text
      text: 'Then the priest shall wash his clothes, he shall bathe in water, and afterward he shall come into the camp; the priest shall be unclean until evening. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the one who burns it shall wash his clothes in water, bathe in water, and shall be unclean until evening. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' clean shall gather up '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 9:13, 14)
      marker-yv: yv-n
    - type: text
      text: 'the ashes of the heifer, and store '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' outside the camp in a clean place; and they shall be kept for the congregation of the children of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 19:13, 20, 21
      marker-yv: yv-n
    - type: text
      text: 'for the water of purification; it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' for purifying from sin. '
