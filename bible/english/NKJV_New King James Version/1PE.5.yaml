    marker-yv: yv-n
  - type: text
    text: 'Silvanus, our faithful brother as I consider him, I have written to you briefly, exhorting and testifying '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:24
    marker-yv: yv-n
