      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Therefore humble yourselves under the mighty hand of God, that He may exalt you in due time, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: casting all your care upon Him, for He cares for you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Be sober, be vigilant; because your adversary the devil walks about like a roaring lion, seeking whom he may devour. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Resist him, steadfast in the faith, knowing that the same sufferings are experienced by your brotherhood in the world. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But may the God of all grace, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:9; 1 Thess. 2:12
    marker-yv: yv-n
  - type: text
    text: 'who called us to His eternal glory by Christ Jesus, after you have suffered a while, perfect, establish, strengthen, and settle '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 1:6
    marker-yv: yv-n
  - type: text
    text: 'To Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' the glory and the dominion forever and ever. Amen.'
- type: usfm
  marker: s1
  children:
  - type: text
