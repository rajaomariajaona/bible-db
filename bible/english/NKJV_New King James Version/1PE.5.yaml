document_id: 1PE.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Shepherd the Flock
  - type: text
    content: 'The elders who are among you I exhort, I who am a fellow elder and a '
  - type: note
    content: Matt. 26:37
  - type: text
    content: 'witness of the sufferings of Christ, and also a partaker of the '
  - type: note
    content: Rom. 8:17, 18
  - type: text
    content: 'glory that will be revealed: '
  '10':
  - type: text
    content: 'But may the God of all grace, '
  - type: note
    content: 1 Cor. 1:9; 1 Thess. 2:12
  - type: text
    content: 'who called us to His eternal glory by Christ Jesus, after you have suffered a while, perfect, establish, strengthen, and settle '
  - type: text
    content: you.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Rev. 1:6
  - type: text
    content: 'To Him '
  - type: text
    content: be
  - type: text
    content: ' the glory and the dominion forever and ever. Amen.'
  - type: heading
    content: Farewell and Peace
  '12':
  - type: text
    content: 'By '
  - type: note
    content: 2 Cor. 1:19; 1 Thess. 1:1; 2 Thess. 1:1
  - type: text
    content: 'Silvanus, our faithful brother as I consider him, I have written to you briefly, exhorting and testifying '
  - type: note
    content: Acts 20:24
  - type: text
    content: that this is the true grace of God in which you stand.
  '13':
  - type: text
    content: 'She who is in Babylon, elect together with '
  - type: text
    content: you,
  - type: text
    content: ' greets you; and '
  - type: text
    content: so
  - type: text
    content: ' '
  - type: text
    content: does
  - type: text
    content: ' '
  - type: note
    content: Acts 12:12, 25; 15:37, 39; Col. 4:10; Philem. 24
  - type: text
    content: 'Mark my son. '
  '14':
  - type: text
    content: Greet one another with a kiss of love.
  - type: text
    content: Peace to you all who are in Christ Jesus. Amen.
  '2':
  - type: note
    content: John 21:16; Acts 20:28
  - type: text
    content: 'Shepherd the flock of God which is among you, serving as overseers, '
  - type: note
    content: 1 Cor. 9:17
  - type: text
    content: 'not by compulsion but willingly, '
  - type: note
    content: 1 Tim. 3:3
  - type: text
    content: 'not for dishonest gain but eagerly; '
  '3':
  - type: text
    content: 'nor as '
  - type: note
    content: Ezek. 34:4; Matt. 20:25
  - type: text
    content: 'being lords over '
  - type: note
    content: Ps. 33:12
  - type: text
    content: 'those entrusted to you, but '
  - type: note
    content: John 13:15; Phil. 3:17; 1 Thess. 1:7; 2 Thess. 3:9; 1 Tim. 4:12; Titus 2:7
  - type: text
    content: 'being examples to the flock; '
  '4':
  - type: text
    content: 'and when '
  - type: note
    content: Is. 40:11; Zech. 13:7; Heb. 13:20; 1 Pet. 2:25
  - type: text
    content: 'the Chief Shepherd appears, you will receive '
  - type: note
    content: 2 Tim. 4:8
  - type: text
    content: the crown of glory that does not fade away.
  - type: heading
    content: Submit to God, Resist the Devil
  '5':
  - type: text
    content: 'Likewise you younger people, submit yourselves to '
  - type: text
    content: your
  - type: text
    content: ' elders. Yes, '
  - type: note
    content: Rom. 12:10; Eph. 5:21
  - type: text
    content: 'all of '
  - type: text
    content: you
  - type: text
    content: ' be submissive to one another, and be clothed with humility, for'
  - type: note
    content: Prov. 3:34; James 4:6
  - type: text
    content: “God resists the proud,
  - type: text
    content: 'But '
  - type: note
    content: Is. 57:15
  - type: text
    content: gives grace to the humble.”
  '6':
  - type: text
    content: 'Therefore humble yourselves under the mighty hand of God, that He may exalt you in due time, '
  '7':
  - type: text
    content: casting all your care upon Him, for He cares for you.
  '8':
  - type: text
    content: 'Be sober, be vigilant; because your adversary the devil walks about like a roaring lion, seeking whom he may devour. '
  '9':
  - type: text
    content: 'Resist him, steadfast in the faith, knowing that the same sufferings are experienced by your brotherhood in the world. '
