document_id: PSA.77
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Consoling Memory of God’s Redemptive Works
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'To the Chief Musician. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 39:title
    marker-yv: yv-n
  - type: text
    text: To Jeduthun. A Psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I cried out to God with my voice—
- type: usfm
  marker: q2
  children:
  - type: text
    text: To God with my voice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And He gave ear to me.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In the day of my trouble I sought the Lord;
- type: usfm
  marker: q2
  children:
  - type: text
    text: My hand was stretched out in the night without ceasing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: My soul refused to be comforted.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I remembered God, and was troubled;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I complained, and my spirit was overwhelmed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You hold my eyelids '
  - type: usfm
    marker: it
    children:
    - type: text
      text: open;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am so troubled that I cannot speak.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I have considered the days of old,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The years of ancient times.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I call to remembrance my song in the night;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I meditate within my heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my spirit makes diligent search.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Will the Lord cast off forever?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And will He be favorable no more?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Has His mercy ceased forever?
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: His
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Pet. 3:8, 9)
    marker-yv: yv-n
  - type: text
    text: promise failed forevermore?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Has God forgotten to be gracious?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has He in anger shut up His tender mercies?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And I said, “This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' my anguish;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: But
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: remember
  - type: text
    text: ' the years of the right hand of the Most High.”'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will remember the works of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely I will remember Your wonders of old.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will also meditate on all Your work,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And talk of Your deeds.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Your way, O God, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' in the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 73:17
    marker-yv: yv-n
  - type: text
    text: sanctuary;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' so great a God as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our
  - type: text
    text: ' God?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' the God who does wonders;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You have declared Your strength among the peoples.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You have with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your
  - type: text
    text: ' arm redeemed Your people,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The sons of Jacob and Joseph.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Selah
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The waters saw You, O God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The waters saw You, they were '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 14:21; Hab. 3:8, 10
    marker-yv: yv-n
  - type: text
    text: afraid;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The depths also trembled.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The clouds poured out water;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The skies sent out a sound;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your arrows also flashed about.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The voice of Your thunder '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in the whirlwind;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: The lightnings lit up the world;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The earth trembled and shook.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Your way '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in the sea,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your path in the great waters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And Your footsteps were not known.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You led Your people like a flock
- type: usfm
  marker: q2
  children:
  - type: text
    text: By the hand of Moses and Aaron.
