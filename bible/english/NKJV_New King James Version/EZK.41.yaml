document_id: EZK.41,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dimensions of the Sanctuary
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 40:2, 3, 17
      marker-yv: yv-n
    - type: text
      text: 'brought me into the sanctuary and measured the doorposts, six cubits wide on one side and six cubits wide on the other side—the width of the tabernacle. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And between '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wall
    - type: text
      text: ' chambers was a width of twenty cubits all around the temple on every side. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The doors of the side chambers opened on the terrace, one door toward the north and another toward the south; and the width of the terrace '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits all around.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Building at the Western End
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The building that faced the separating courtyard at its western end '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' seventy cubits wide; the wall of the building '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits thick all around, and its length ninety cubits.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dimensions and Design of the Temple Area
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he measured the temple, one '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 40:47
      marker-yv: yv-n
    - type: text
      text: 'hundred cubits long; and the separating courtyard with the building and its walls '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' one hundred cubits long; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'also the width of the eastern face of the temple, including the separating courtyard, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' one hundred cubits. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He measured the length of the building behind it, facing the separating courtyard, with its '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 42:3, 5
      marker-yv: yv-n
    - type: text
      text: 'galleries on the one side and on the other side, one hundred cubits, as well as the inner temple and the porches of the court, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'their doorposts and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:4; Ezek. 40:16, 25
      marker-yv: yv-n
    - type: text
      text: 'the beveled window frames. And the galleries all around their three stories opposite the threshold were paneled with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:15
      marker-yv: yv-n
    - type: text
      text: 'wood from the ground to the windows—the windows were covered— '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: from the space above the door, even to the inner room, as well as outside, and on every wall all around, inside and outside, by measure.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' made '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:29; 2 Chr. 3:7
      marker-yv: yv-n
    - type: text
      text: 'with cherubim and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 3:5; Ezek. 40:16
      marker-yv: yv-n
    - type: text
      text: 'palm trees, a palm tree between cherub and cherub. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Each
    - type: text
      text: ' cherub had two faces, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 1:10; 10:14
      marker-yv: yv-n
    - type: text
      text: 'so that the face of a man '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' toward a palm tree on one side, and the face of a young lion toward a palm tree on the other side; thus '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' made throughout the temple all around. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The width of the entryway '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' ten cubits, and the side walls of the entrance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' five cubits on this side and five cubits on the other side; and he measured its length, forty cubits, and its width, twenty cubits.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the floor to the space above the door, and on the wall of the sanctuary, cherubim and palm trees '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' carved.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:33; Ezek. 40:9, 14, 16; 41:1
      marker-yv: yv-n
    - type: text
      text: 'doorposts of the temple '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' square, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' the front of the sanctuary; their appearance was similar. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:1–3; 1 Kin. 6:20; Rev. 8:3
      marker-yv: yv-n
    - type: text
      text: 'The altar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' of wood, three cubits high, and its length two cubits. Its corners, its length, and its sides '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' of wood; and he said to me, “This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:23, 30; Lev. 24:6; Ezek. 23:41; 44:16; Mal. 1:7, 12
      marker-yv: yv-n
    - type: text
      text: 'the table that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:8
      marker-yv: yv-n
    - type: text
      text: 'before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:31–35
      marker-yv: yv-n
    - type: text
      text: 'The temple and the sanctuary had two doors. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The doors had two '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:34
      marker-yv: yv-n
    - type: text
      text: 'panels '
    - type: usfm
      marker: it
      children:
      - type: text
        text: apiece,
    - type: text
      text: ' two folding panels: two '
    - type: usfm
      marker: it
      children:
      - type: text
        text: panels
    - type: text
      text: ' for one door and two panels for the other '
    - type: usfm
      marker: it
      children:
      - type: text
        text: door.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cherubim and palm trees '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' carved on the doors of the temple just as they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' carved on the walls. A wooden canopy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' on the front of the vestibule outside. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: There
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 40:16
      marker-yv: yv-n
    - type: text
      text: 'beveled window '
    - type: usfm
      marker: it
      children:
      - type: text
        text: frames
    - type: text
      text: ' and palm trees on one side and on the other, on the sides of the vestibule—also on the side chambers of the temple and on the canopies.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also he went inside and measured the doorposts, two cubits; and the entrance, six cubits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: high;
    - type: text
      text: ' and the width of the entrance, seven cubits. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:20; 2 Chr. 3:8
      marker-yv: yv-n
    - type: text
      text: 'He measured the length, twenty cubits; and the width, twenty cubits, beyond the sanctuary; and he said to me, “This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the Most Holy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Place.
    - type: text
      text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Side Chambers on the Wall
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Next, he measured the wall of the temple, six cubits. The width of each side chamber all around the temple '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' four cubits on every side. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:5–10
      marker-yv: yv-n
    - type: text
      text: 'The side chambers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in three stories, one above the other, thirty chambers in each story; they rested on ledges which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' for the side chambers all around, that they might be supported, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:6, 10
      marker-yv: yv-n
    - type: text
      text: 'not fastened to the wall of the temple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As one went up from story to story, the side chambers '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 6:8
      marker-yv: yv-n
    - type: text
      text: 'became wider all around, because their supporting ledges in the wall of the temple ascended like steps; therefore the width of the structure increased as one went up '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' the lowest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: story
    - type: text
      text: ' to the highest by way of the middle one. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I also saw an elevation all around the temple; it was the foundation of the side chambers, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 40:5
      marker-yv: yv-n
    - type: text
      text: 'a full rod, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' six cubits '
    - type: usfm
      marker: it
      children:
      - type: text
        text: high.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The thickness of the outer wall of the side chambers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' five cubits, and so also the remaining terrace by the place of the side chambers of the temple. '
