  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:27; Rom. 15:33; Phil. 4:9
    marker-yv: yv-n
  - type: text
    text: 'the Lord of peace Himself give you peace always in every way. The Lord '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with you all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
