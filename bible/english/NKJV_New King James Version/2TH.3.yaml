  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 7:16
    marker-yv: yv-n
  - type: text
    text: we have confidence in the Lord concerning you, both that you do and will do the things we command you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 29:18
    marker-yv: yv-n
  - type: text
    text: the Lord direct your hearts into the love of God and into the patience of Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warning Against Idleness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But we command you, brethren, in the name of our Lord Jesus Christ, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:17
    marker-yv: yv-n
  - type: text
    text: 'that you withdraw '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 5:1
    marker-yv: yv-n
  - type: text
    text: 'from every brother who walks '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 4:11
    marker-yv: yv-n
  - type: text
    text: 'disorderly and not according to the tradition which he received from us. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For you yourselves know how you ought to follow us, for we were not disorderly among you; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'nor did we eat anyone’s bread free of charge, but worked with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Thess. 2:9
    marker-yv: yv-n
  - type: text
    text: 'labor and toil night and day, that we might not be a burden to any of you, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'not because we do not have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 9:4, 6–14
    marker-yv: yv-n
  - type: text
    text: authority, but to make ourselves an example of how you should follow us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For even when we were with you, we commanded you this: If anyone will not work, neither shall he eat. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For we hear that there are some who walk among you in a disorderly manner, not working at all, but are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Tim. 5:13; 1 Pet. 4:15
    marker-yv: yv-n
  - type: text
    text: 'busybodies. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now those who are such we command and exhort through our Lord Jesus Christ '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 4:28; 1 Thess. 4:11, 12
    marker-yv: yv-n
  - type: text
    text: that they work in quietness and eat their own bread.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' you, brethren, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 4:1; Gal. 6:9
    marker-yv: yv-n
  - type: text
    text: 'do not grow weary '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' doing good. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And if anyone does not obey our word in this epistle, note that person and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 18:17
    marker-yv: yv-n
  - type: text
    text: 'do not keep company with him, that he may be ashamed. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:17
    marker-yv: yv-n
  - type: text
    text: 'Yet do not count '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' as an enemy, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Titus 3:10
    marker-yv: yv-n
  - type: text
    text: 'but admonish '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' as a brother.'
- type: usfm
  marker: s1
  children:
  - type: text
