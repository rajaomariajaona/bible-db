  '16':
  - type: text
    content: 'Now may '
  - type: note
    content: John 14:27; Rom. 15:33; Phil. 4:9
  - type: text
    content: 'the Lord of peace Himself give you peace always in every way. The Lord '
  - type: text
    content: be
  - type: text
    content: ' with you all.'
  '17':
  - type: note
    content: 1 Cor. 16:21
  - type: text
    content: The salutation of Paul with my own hand, which is a sign in every epistle; so I write.
  '18':
  - type: note
    content: Rom. 16:20, 24; 1 Thess. 5:28
  - type: text
    content: 'The grace of our Lord Jesus Christ '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  '2':
  - type: text
    content: 'and '
  - type: note
    content: Rom. 15:31
  - type: text
    content: 'that we may be delivered from unreasonable and wicked men; '
  - type: note
    content: Acts 28:24
  - type: text
    content: for not all have faith.
  '3':
  - type: text
    content: 'But '
  - type: note
    content: 1 Cor. 1:9; 1 Thess. 5:24
  - type: text
    content: 'the Lord is faithful, who will establish you and '
  - type: note
    content: John 17:15
  - type: text
    content: 'guard '
  - type: text
    content: you
  - type: text
    content: ' from the evil one. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: 2 Cor. 7:16
  - type: text
    content: we have confidence in the Lord concerning you, both that you do and will do the things we command you.
  '5':
  - type: text
    content: 'Now may '
  - type: note
    content: 1 Chr. 29:18
  - type: text
    content: the Lord direct your hearts into the love of God and into the patience of Christ.
  - type: heading
    content: Warning Against Idleness
  '6':
  - type: text
    content: 'But we command you, brethren, in the name of our Lord Jesus Christ, '
  - type: note
    content: Rom. 16:17
  - type: text
    content: 'that you withdraw '
  - type: note
    content: 1 Cor. 5:1
  - type: text
    content: 'from every brother who walks '
  - type: note
    content: 1 Thess. 4:11
  - type: text
    content: 'disorderly and not according to the tradition which he received from us. '
  '7':
  - type: text
    content: 'For you yourselves know how you ought to follow us, for we were not disorderly among you; '
  '8':
  - type: text
    content: 'nor did we eat anyone’s bread free of charge, but worked with '
  - type: note
    content: 1 Thess. 2:9
  - type: text
    content: 'labor and toil night and day, that we might not be a burden to any of you, '
  '9':
  - type: text
    content: 'not because we do not have '
  - type: note
    content: 1 Cor. 9:4, 6–14
  - type: text
    content: authority, but to make ourselves an example of how you should follow us.
