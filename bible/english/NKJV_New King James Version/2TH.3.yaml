    children:
    - type: text
      text: '3'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:9; 1 Thess. 5:24
    marker-yv: yv-n
  - type: text
    text: 'the Lord is faithful, who will establish you and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 17:15
    marker-yv: yv-n
  - type: text
    text: 'guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' from the evil one. '
  - type: usfm
