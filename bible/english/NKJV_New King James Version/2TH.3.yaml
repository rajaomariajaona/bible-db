  - type: text
    content: 'pray for us, that the word of the Lord may run '
  - type: text
    content: swiftly
  - type: text
    content: ' and be glorified, just as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' with you, '
  '10':
  - type: text
    content: 'For even when we were with you, we commanded you this: If anyone will not work, neither shall he eat. '
  '11':
  - type: text
    content: 'For we hear that there are some who walk among you in a disorderly manner, not working at all, but are '
  - type: note
    content: 1 Tim. 5:13; 1 Pet. 4:15
  - type: text
    content: 'busybodies. '
  '12':
  - type: text
    content: 'Now those who are such we command and exhort through our Lord Jesus Christ '
  - type: note
    content: Eph. 4:28; 1 Thess. 4:11, 12
  - type: text
    content: that they work in quietness and eat their own bread.
  '13':
  - type: text
    content: 'But '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: for
  - type: text
    content: ' you, brethren, '
  - type: note
    content: 2 Cor. 4:1; Gal. 6:9
  - type: text
    content: 'do not grow weary '
  - type: text
    content: in
  - type: text
    content: ' doing good. '
  '14':
  - type: text
    content: 'And if anyone does not obey our word in this epistle, note that person and '
  - type: note
    content: Matt. 18:17
  - type: text
    content: 'do not keep company with him, that he may be ashamed. '
  '15':
  - type: note
    content: Lev. 19:17
  - type: text
    content: 'Yet do not count '
  - type: text
    content: him
  - type: text
    content: ' as an enemy, '
  - type: note
    content: Titus 3:10
  - type: text
    content: 'but admonish '
  - type: text
    content: him
  - type: text
    content: ' as a brother.'
  - type: heading
