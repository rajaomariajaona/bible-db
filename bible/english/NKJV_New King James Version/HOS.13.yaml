document_id: HOS.13,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Relentless Judgment on Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When Ephraim spoke, trembling,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He exalted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: himself
    - type: text
      text: ' in Israel;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But when he offended through Baal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: worship
    - type: text
      text: ', he died.'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I will be your King;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:38
      marker-yv: yv-n
    - type: text
      text: 'Where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That he may save you in all your cities?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And your judges to whom '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 8:5, 6
      marker-yv: yv-n
    - type: text
      text: you said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Give me a king and princes’?
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 8:7; 10:17–24
      marker-yv: yv-n
    - type: text
      text: I gave you a king in My anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And took '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' away in My wrath.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “The
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:34, 35; Job 14:17; (Rom. 2:5)
      marker-yv: yv-n
    - type: text
      text: ' iniquity of Ephraim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' bound up;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'His sin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' stored up.'
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 13:8; Mic. 4:9, 10
      marker-yv: yv-n
    - type: text
      text: The sorrows of a woman in childbirth shall come upon him.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' an unwise son,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For he should not stay long where children are born.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “I will ransom them from the power of the grave;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will redeem them from death.
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 15:54, 55)
      marker-yv: yv-n
    - type: text
      text: O Death, I will be your plagues!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O Grave, I will be your destruction!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 15:6
      marker-yv: yv-n
    - type: text
      text: Pity is hidden from My eyes.”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Though he is fruitful among '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' brethren,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:6; Jer. 4:11, 12; Ezek. 17:10; 19:12
      marker-yv: yv-n
    - type: text
      text: An east wind shall come;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The wind of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall come up from the wilderness.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then his spring shall become dry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And his fountain shall be dried up.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He shall plunder the treasury of every desirable prize.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Samaria is held guilty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For she has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 18:12
      marker-yv: yv-n
    - type: text
      text: rebelled against her God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall fall by the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their infants shall be dashed in pieces,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And their women with child '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 15:16
      marker-yv: yv-n
    - type: text
      text: ripped open.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Now they sin more and more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And have made for themselves molded images,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Idols of their silver, according to their skill;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'All of it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the work of craftsmen.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They say of them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Let the men who sacrifice kiss the calves!”
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Therefore they shall be like the morning cloud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And like the early dew that passes away,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 1:4; Is. 17:13; Dan. 2:35
      marker-yv: yv-n
    - type: text
      text: Like chaff blown off from a threshing floor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And like smoke from a chimney.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“Yet '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 43:11
      marker-yv: yv-n
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ever since the land of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And you shall know no God but Me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 43:11; 45:21, 22; (1 Tim. 2:5)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' no savior besides Me.'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:7; 32:10
      marker-yv: yv-n
    - type: text
      text: I knew you in the wilderness,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 8:15
      marker-yv: yv-n
    - type: text
      text: In the land of great drought.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 8:12, 14; 32:13–15; Jer. 5:7
      marker-yv: yv-n
    - type: text
      text: When they had pasture, they were filled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They were filled and their heart was exalted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Therefore they forgot Me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lam. 3:10; Hos. 5:14
      marker-yv: yv-n
    - type: text
      text: I will be to them like a lion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Like '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 5:6
      marker-yv: yv-n
    - type: text
      text: a leopard by the road I will lurk;
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I will meet them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 17:8; Prov. 17:12
      marker-yv: yv-n
    - type: text
      text: 'like a bear deprived '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cubs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will tear open their rib cage,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And there I will devour them like a lion.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The wild beast shall tear them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “O Israel, you are destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But your help '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' from Me.'
