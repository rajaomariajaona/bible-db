    text: 'Also they shall attend to all the furnishings of the tabernacle of meeting, and to the needs of the children of Israel, to do the work of the tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 8:19; 18:6, 7
    marker-yv: yv-n
  - type: text
    text: 'you shall give the Levites to Aaron and his sons; they '
  - type: usfm
    marker: it
    children:
    - type: text
