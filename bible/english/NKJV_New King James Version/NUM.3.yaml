  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:9; Num. 18:7
    marker-yv: yv-n
  - type: text
    text: 'and they shall attend to their priesthood; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 1:51; 3:38; 16:40
    marker-yv: yv-n
  - type: text
