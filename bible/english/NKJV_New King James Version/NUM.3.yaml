  - type: text
    content: included
  - type: text
    content: ' the boards of the tabernacle, its bars, its pillars, its sockets, its utensils, all the work relating to them, '
  '37':
  - type: text
    content: and the pillars of the court all around, with their sockets, their pegs, and their cords.
  '38':
  - type: note
    content: Num. 1:53
  - type: text
    content: 'Moreover those who were to camp before the tabernacle on the east, before the tabernacle of meeting, '
  - type: text
    content: were
  - type: text
    content: ' Moses, Aaron, and his sons, '
  - type: note
    content: Num. 18:5
  - type: text
    content: 'keeping charge of the sanctuary, '
  - type: note
    content: Num. 3:7, 8
  - type: text
    content: 'to meet the needs of the children of Israel; but '
  - type: note
    content: Num. 3:10
  - type: text
    content: 'the outsider who came near was to be put to death. '
  '39':
  - type: note
    content: Num. 3:43; 4:48; 26:62
  - type: text
    content: 'All who were numbered of the Levites, whom Moses and Aaron numbered at the commandment of the '
  - type: heading
    content: Lord
  - type: text
