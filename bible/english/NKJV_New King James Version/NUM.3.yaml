  - type: text
    content: are
  - type: text
    content: ' Mine. '
  - type: note
    content: Ex. 13:12, 15; Num. 8:17
  - type: text
    content: 'On the day that I struck all the firstborn in the land of Egypt, I sanctified to Myself all the firstborn in Israel, both man and beast. They shall be Mine: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: .”
