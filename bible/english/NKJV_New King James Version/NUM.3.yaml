  - type: heading
    content: Levites Dedicated Instead of the Firstborn
  '4':
  - type: note
    content: Lev. 10:1, 2; Num. 26:61; 1 Chr. 24:2
  - type: text
    content: 'Nadab and Abihu had died before the '
  - type: heading
    content: Lord
  - type: text
    content: ' when they offered profane fire before the '
  - type: heading
    content: Lord
  - type: text
    content: ' in the Wilderness of Sinai; and they had no children. So Eleazar and Ithamar ministered as priests in the presence of Aaron their father.'
  - type: heading
    content: The Levites Serve in the Tabernacle
  '40':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Moses: '
  - type: note
    content: Num. 3:15
  - type: text
    content: '“Number all the firstborn males of the children of Israel from a month old and above, and take the number of their names. '
  '41':
  - type: note
    content: Num. 3:12, 45
  - type: text
    content: 'And you shall take the Levites for Me—I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: '—instead of all the firstborn among the children of Israel, and the livestock of the Levites instead of all the firstborn among the livestock of the children of Israel.” '
  '42':
  - type: text
    content: 'So Moses numbered all the firstborn among the children of Israel, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded him. '
  '43':
  - type: text
    content: And all the firstborn males, according to the number of names from a month old and above, of those who were numbered of them, were twenty-two thousand two hundred and seventy-three.
  '44':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '45':
  - type: note
    content: Num. 3:12, 41
  - type: text
    content: '“Take the Levites instead of all the firstborn among the children of Israel, and the livestock of the Levites instead of their livestock. The Levites shall be Mine: I '
  - type: text
    content: am
  - type: text
    content: ' the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '46':
  - type: text
    content: 'And for '
  - type: note
    content: Ex. 13:13, 15; Num. 18:15, 16
  - type: text
    content: 'the redemption of the two hundred and seventy-three of the firstborn of the children of Israel, '
  - type: note
    content: Num. 3:39, 43
  - type: text
    content: 'who are more than the number of the Levites, '
  '47':
  - type: text
    content: 'you shall take '
  - type: note
    content: Lev. 27:6; Num. 18:16
  - type: text
    content: 'five shekels for each one '
  - type: note
    content: Num. 1:2, 18, 20
  - type: text
    content: 'individually; you shall take '
  - type: text
    content: them
  - type: text
    content: ' in the currency of the shekel of the sanctuary, '
  - type: note
    content: Ex. 30:13
  - type: text
    content: 'the shekel of twenty gerahs. '
  '48':
  - type: text
    content: And you shall give the money, with which the excess number of them is redeemed, to Aaron and his sons.”
  '49':
  - type: text
    content: 'So Moses took the redemption money from those who were over and above those who were redeemed by the Levites. '
  '5':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying: '
  '50':
  - type: text
    content: 'From the firstborn of the children of Israel he took the money, '
  - type: note
    content: Num. 3:46, 47
  - type: text
    content: 'one thousand three hundred and sixty-five '
  - type: text
    content: shekels,
  - type: text
    content: ' according to the shekel of the sanctuary. '
  '51':
  - type: text
    content: 'And Moses '
  - type: note
    content: Num. 3:48
  - type: text
    content: 'gave their redemption money to Aaron and his sons, according to the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', as the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '6':
  - type: note
    content: Num. 8:6–22; 18:1–7; Deut. 10:8; 33:8–11
  - type: text
    content: '“Bring the tribe of Levi near, and present them before Aaron the priest, that they may serve him. '
  '7':
  - type: text
    content: 'And they shall attend to his needs and the needs of the whole congregation before the tabernacle of meeting, to do '
  - type: note
    content: Num. 1:50; 8:11, 15, 24, 26
  - type: text
    content: 'the work of the tabernacle. '
  '8':
  - type: text
    content: 'Also they shall attend to all the furnishings of the tabernacle of meeting, and to the needs of the children of Israel, to do the work of the tabernacle. '
  '9':
  - type: text
    content: 'And '
  - type: note
    content: Num. 8:19; 18:6, 7
  - type: text
    content: 'you shall give the Levites to Aaron and his sons; they '
  - type: text
    content: are
  - type: text
    content: ' given entirely to him from among the children of Israel. '
