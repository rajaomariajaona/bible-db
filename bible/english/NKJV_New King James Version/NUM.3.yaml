    marker: x
    children:
    - type: text
      text: Num. 8:6–22; 18:1–7; Deut. 10:8; 33:8–11
    marker-yv: yv-n
  - type: text
    text: '“Bring the tribe of Levi near, and present them before Aaron the priest, that they may serve him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
