  - type: text
    content: ' spoke to Moses, saying: '
  '12':
  - type: text
    content: '“Now behold, '
  - type: note
    content: Num. 3:41; 8:16; 18:6
  - type: text
    content: 'I Myself have taken the Levites from among the children of Israel instead of every firstborn who opens the womb among the children of Israel. Therefore the Levites shall be '
  - type: note
