document_id: PRO.31,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Words of King Lemuel’s Mother
  - type: text
    content: 'The words of King Lemuel, the utterance which his mother taught him:'
  '10':
  - type: note
    content: Ruth 3:11; Prov. 12:4; 19:14
  - type: text
    content: Who can find a virtuous wife?
  - type: text
    content: 'For her worth '
  - type: text
    content: is
  - type: text
    content: ' far above rubies.'
  '11':
  - type: text
    content: The heart of her husband safely trusts her;
  - type: text
    content: So he will have no lack of gain.
  '12':
  - type: text
    content: She does him good and not evil
  - type: text
    content: All the days of her life.
  '13':
  - type: text
    content: She seeks wool and flax,
  - type: text
    content: And willingly works with her hands.
  '14':
  - type: text
    content: She is like the merchant ships,
  - type: text
    content: She brings her food from afar.
  '15':
  - type: note
    content: Prov. 20:13; Rom. 12:11
  - type: text
    content: She also rises while it is yet night,
  - type: text
    content: 'And '
  - type: note
    content: Luke 12:42
  - type: text
    content: provides food for her household,
  - type: text
    content: And a portion for her maidservants.
  '16':
  - type: text
    content: She considers a field and buys it;
  - type: text
    content: From her profits she plants a vineyard.
  '17':
  - type: text
    content: She girds herself with strength,
  - type: text
    content: And strengthens her arms.
  '18':
  - type: text
    content: 'She perceives that her merchandise '
  - type: text
    content: is
  - type: text
    content: ' good,'
  - type: text
    content: And her lamp does not go out by night.
  '19':
  - type: text
    content: She stretches out her hands to the distaff,
  - type: text
    content: And her hand holds the spindle.
  '2':
  - type: text
    content: What, my son?
  - type: text
    content: And what, son of my womb?
  - type: text
    content: 'And what, '
  - type: note
    content: Is. 49:15
  - type: text
    content: son of my vows?
  '20':
  - type: note
    content: Deut. 15:11; Job 31:16–20; Prov. 22:9; Rom. 12:13; Eph. 4:28; Heb. 13:16
  - type: text
    content: She extends her hand to the poor,
  - type: text
    content: Yes, she reaches out her hands to the needy.
  '21':
  - type: text
    content: She is not afraid of snow for her household,
  - type: text
    content: 'For all her household '
  - type: text
    content: is
  - type: text
    content: ' clothed with scarlet.'
  '22':
  - type: text
    content: She makes tapestry for herself;
  - type: text
    content: 'Her clothing '
  - type: text
    content: is
  - type: text
    content: ' fine linen and purple.'
  '23':
  - type: note
    content: Prov. 12:4
  - type: text
    content: Her husband is known in the gates,
  - type: text
    content: When he sits among the elders of the land.
  '24':
  - type: text
    content: 'She makes linen garments and sells '
  - type: text
    content: them,
  - type: text
    content: And supplies sashes for the merchants.
  '25':
  - type: text
    content: 'Strength and honor '
  - type: text
    content: are
  - type: text
    content: ' her clothing;'
  - type: text
    content: She shall rejoice in time to come.
  '26':
  - type: text
    content: She opens her mouth with wisdom,
  - type: text
    content: 'And on her tongue '
  - type: text
    content: is
  - type: text
    content: ' the law of kindness.'
  '27':
  - type: text
    content: She watches over the ways of her household,
  - type: text
    content: And does not eat the bread of idleness.
  '28':
  - type: text
    content: Her children rise up and call her blessed;
  - type: text
    content: 'Her husband '
  - type: text
    content: also,
  - type: text
    content: ' and he praises her:'
  '29':
  - type: text
    content: “Many daughters have done well,
  - type: text
    content: But you excel them all.”
  '3':
  - type: note
    content: Prov. 5:9
  - type: text
    content: Do not give your strength to women,
  - type: text
    content: 'Nor your ways '
  - type: note
    content: Deut. 17:17; 1 Kin. 11:1; Neh. 13:26; Prov. 7:26; Hos. 4:11
  - type: text
    content: to that which destroys kings.
  '30':
  - type: text
    content: 'Charm '
  - type: text
    content: is
  - type: text
    content: ' deceitful and beauty '
  - type: text
    content: is
  - type: text
    content: ' passing,'
  - type: text
    content: 'But a woman '
  - type: text
    content: who
  - type: text
    content: ' fears the '
  - type: heading
    content: Lord
  - type: text
    content: ', she shall be praised.'
  '31':
  - type: text
    content: Give her of the fruit of her hands,
  - type: text
    content: And let her own works praise her in the gates.
  '4':
  - type: note
    content: Eccl. 10:17
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' not for kings, O Lemuel,'
  - type: text
    content: It
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' not for kings to drink wine,'
  - type: text
    content: Nor for princes intoxicating drink;
  '5':
  - type: note
    content: Hos. 4:11
  - type: text
    content: Lest they drink and forget the law,
  - type: text
    content: And pervert the justice of all the afflicted.
  '6':
  - type: note
    content: Ps. 104:15
  - type: text
    content: Give strong drink to him who is perishing,
  - type: text
    content: And wine to those who are bitter of heart.
  '7':
  - type: text
    content: Let him drink and forget his poverty,
  - type: text
    content: And remember his misery no more.
  '8':
  - type: note
    content: Job 29:15, 16; Ps. 82
  - type: text
    content: Open your mouth for the speechless,
  - type: text
    content: 'In the cause of all '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' appointed to die.'
  '9':
  - type: text
    content: 'Open your mouth, '
  - type: note
    content: Lev. 19:15; Deut. 1:16
  - type: text
    content: judge righteously,
  - type: text
    content: 'And '
  - type: note
    content: Job 29:12; Is. 1:17; Jer. 22:16
  - type: text
    content: plead the cause of the poor and needy.
  - type: heading
    content: The Virtuous Wife
