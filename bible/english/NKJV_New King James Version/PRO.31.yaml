document_id: PRO.31,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Words of King Lemuel’s Mother
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The words of King Lemuel, the utterance which his mother taught him:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 3:11; Prov. 12:4; 19:14
      marker-yv: yv-n
    - type: text
      text: Who can find a virtuous wife?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For her worth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' far above rubies.'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The heart of her husband safely trusts her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So he will have no lack of gain.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: She does him good and not evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: All the days of her life.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: She seeks wool and flax,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And willingly works with her hands.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: She is like the merchant ships,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She brings her food from afar.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 20:13; Rom. 12:11
      marker-yv: yv-n
    - type: text
      text: She also rises while it is yet night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:42
      marker-yv: yv-n
    - type: text
      text: provides food for her household,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a portion for her maidservants.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: She considers a field and buys it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From her profits she plants a vineyard.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: She girds herself with strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And strengthens her arms.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'She perceives that her merchandise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And her lamp does not go out by night.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: She stretches out her hands to the distaff,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And her hand holds the spindle.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: What, my son?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And what, son of my womb?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And what, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:15
      marker-yv: yv-n
    - type: text
      text: son of my vows?
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 15:11; Job 31:16–20; Prov. 22:9; Rom. 12:13; Eph. 4:28; Heb. 13:16
      marker-yv: yv-n
    - type: text
      text: She extends her hand to the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, she reaches out her hands to the needy.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: She is not afraid of snow for her household,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For all her household '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' clothed with scarlet.'
  '22':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: She makes tapestry for herself;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Her clothing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' fine linen and purple.'
  '23':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 12:4
      marker-yv: yv-n
    - type: text
      text: Her husband is known in the gates,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When he sits among the elders of the land.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'She makes linen garments and sells '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And supplies sashes for the merchants.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Strength and honor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' her clothing;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: She shall rejoice in time to come.
  '26':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: She opens her mouth with wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And on her tongue '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the law of kindness.'
  '27':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: She watches over the ways of her household,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And does not eat the bread of idleness.
  '28':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Her children rise up and call her blessed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Her husband '
    - type: usfm
      marker: it
      children:
      - type: text
        text: also,
    - type: text
      text: ' and he praises her:'
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “Many daughters have done well,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But you excel them all.”
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 5:9
      marker-yv: yv-n
    - type: text
      text: Do not give your strength to women,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Nor your ways '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 17:17; 1 Kin. 11:1; Neh. 13:26; Prov. 7:26; Hos. 4:11
      marker-yv: yv-n
    - type: text
      text: to that which destroys kings.
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Charm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' deceitful and beauty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' passing,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But a woman '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' fears the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', she shall be praised.'
  '31':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Give her of the fruit of her hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let her own works praise her in the gates.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 10:17
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not for kings, O Lemuel,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not for kings to drink wine,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor for princes intoxicating drink;
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 4:11
      marker-yv: yv-n
    - type: text
      text: Lest they drink and forget the law,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And pervert the justice of all the afflicted.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 104:15
      marker-yv: yv-n
    - type: text
      text: Give strong drink to him who is perishing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wine to those who are bitter of heart.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let him drink and forget his poverty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And remember his misery no more.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 29:15, 16; Ps. 82
      marker-yv: yv-n
    - type: text
      text: Open your mouth for the speechless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In the cause of all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' appointed to die.'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Open your mouth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:15; Deut. 1:16
      marker-yv: yv-n
    - type: text
      text: judge righteously,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 29:12; Is. 1:17; Jer. 22:16
      marker-yv: yv-n
    - type: text
      text: plead the cause of the poor and needy.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Virtuous Wife
    marker-yv: yv-h
