document_id: 2CH.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Revolt Against Rehoboam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:1–20
    marker-yv: yv-n
  - type: text
    text: 'Rehoboam went to Shechem, for all Israel had gone to Shechem to make him king. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So it happened, when Jeroboam the son of Nebat heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' (he was in Egypt, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:40
    marker-yv: yv-n
  - type: text
    text: 'where he had fled from the presence of King Solomon), that Jeroboam returned from Egypt. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then they sent for him and called him. And Jeroboam and all Israel came and spoke to Rehoboam, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Your father made our yoke heavy; now therefore, lighten the burdensome service of your father and his heavy yoke which he put on us, and we will serve you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So he said to them, “Come back to me after three days.” And the people departed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then King Rehoboam consulted the elders who stood before his father Solomon while he still lived, saying, “How do you advise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: ' to answer these people?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And they spoke to him, saying, “If you are kind to these people, and please them, and speak good words to them, they will be your servants forever.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:8–11
    marker-yv: yv-n
  - type: text
    text: 'But he rejected the advice which the elders had given him, and consulted the young men who had grown up with him, who stood before him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And he said to them, “What advice do you give? How should we answer this people who have spoken to me, saying, ‘Lighten the yoke which your father put on us’?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then the young men who had grown up with him spoke to him, saying, “Thus you should speak to the people who have spoken to you, saying, ‘Your father made our yoke heavy, but you make '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' lighter on us’—thus you shall say to them: ‘My little '
  - type: usfm
    marker: it
    children:
    - type: text
      text: finger
  - type: text
    text: ' shall be thicker than my father’s waist! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And now, whereas my father put a heavy yoke on you, I will add to your yoke; my father chastised you with whips, but I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: chastise
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' with scourges!’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:12–14
    marker-yv: yv-n
  - type: text
    text: 'Jeroboam and all the people came to Rehoboam on the third day, as the king had directed, saying, “Come back to me the third day.” '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the king answered them roughly. King Rehoboam rejected the advice of the elders, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and he spoke to them according to the advice of the young men, saying, “My father made your yoke heavy, but I will add to it; my father chastised you with whips, but I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: chastise
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' with scourges!” '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So the king did not listen to the people; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Judg. 14:4; 1 Chr. 5:22; 2 Chr. 11:4; 22:7
    marker-yv: yv-n
  - type: text
    text: 'for the turn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: events
  - type: text
    text: ' was from God, that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' might fulfill His '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 11:29–39
    marker-yv: yv-n
  - type: text
    text: word, which He had spoken by the hand of Ahijah the Shilonite to Jeroboam the son of Nebat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now when all Israel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saw
  - type: text
    text: ' that the king did not listen to them, the people answered the king, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “What share have we in David?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: We
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: have
  - type: text
    text: ' no inheritance in the son of Jesse.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Every man to your tents, O Israel!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now see to your own house, O David!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So all Israel departed to their tents. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But Rehoboam reigned over the children of Israel who dwelt in the cities of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then King Rehoboam sent Hadoram, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' in charge of revenue; but the children of Israel stoned him with stones, and he died. Therefore King Rehoboam mounted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' chariot in haste to flee to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 12:19
    marker-yv: yv-n
  - type: text
    text: So Israel has been in rebellion against the house of David to this day.
