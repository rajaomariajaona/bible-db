  '7':
  - type: text
    content: And they spoke to him, saying, “If you are kind to these people, and please them, and speak good words to them, they will be your servants forever.”
  '8':
  - type: note
    content: 1 Kin. 12:8–11
  - type: text
    content: 'But he rejected the advice which the elders had given him, and consulted the young men who had grown up with him, who stood before him. '
  '9':
  - type: text
    content: And he said to them, “What advice do you give? How should we answer this people who have spoken to me, saying, ‘Lighten the yoke which your father put on us’?”
