  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And He said to me, “Have you seen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,
    - type: text
      text: ' O son of man? Is it a trivial thing to the house of Judah to commit the abominations which they commit here? For they have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 9:9; Amos 3:10; Mic. 2:2
      marker-yv: yv-n
    - type: text
      text: 'filled the land with violence; then they have returned to provoke Me to anger. Indeed they put the branch to their nose. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 5:13; 16:42; 24:13
      marker-yv: yv-n
    - type: text
      text: 'Therefore I also will act in fury. My '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 5:11; 7:4, 9; 9:5, 10
      marker-yv: yv-n
    - type: text
      text: 'eye will not spare nor will I have pity; and though they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 1:28; Is. 1:15; Jer. 11:11; 14:12; Mic. 3:4; Zech. 7:13
      marker-yv: yv-n
    - type: text
      text: cry in My ears with a loud voice, I will not hear them.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
