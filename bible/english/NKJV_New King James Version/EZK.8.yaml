  - type: text
    content: 'stretched out the form of a hand, and took me by a lock of my hair; and '
  - type: note
    content: Ezek. 3:14; Acts 8:39
  - type: text
    content: 'the Spirit lifted me up between earth and heaven, and '
  - type: note
