      - type: text
        text: Rom. 1:23
      marker-yv: yv-n
    - type: text
      text: 'creeping thing, abominable beasts, and all the idols of the house of Israel, portrayed all around on the walls. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And there stood before them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:16, 25; Luke 10:1
      marker-yv: yv-n
    - type: text
      text: 'seventy men of the elders of the house of Israel, and in their midst stood Jaazaniah the son of Shaphan. Each man had a censer in his hand, and a thick cloud of incense went up. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then He said to me, “Son of man, have you seen what the elders of the house of Israel do in the dark, every man in the room of his idols? For they say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 14:1; Is. 29:15; Ezek. 9:9
      marker-yv: yv-n
    - type: text
      text: '‘The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' does not see us, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has forsaken the land.’ ”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And He said to me, “Turn again, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' you will see greater abominations that they are doing.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So He brought me to the door of the north gate of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s house; and to my dismay, women were sitting there weeping for Tammuz.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then He said to me, “Have you seen '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this,
    - type: text
      text: ' O son of man? Turn again, you will see greater abominations than these.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So He brought me into the inner court of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house; and there, at the door of the temple of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 2:17
      marker-yv: yv-n
    - type: text
      text: 'between the porch and the altar, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 11:1
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' about twenty-five men '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 29:6; Jer. 2:27; 32:33; Ezek. 23:39
      marker-yv: yv-n
    - type: text
      text: 'with their backs toward the temple of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and their faces toward the east, and they were worshiping '
    - type: usfm
