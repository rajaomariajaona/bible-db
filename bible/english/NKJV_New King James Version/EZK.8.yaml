  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So I went in and saw, and there—every '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:4; Deut. 4:16–18
      marker-yv: yv-n
