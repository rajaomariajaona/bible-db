  - type: text
    content: saw in the plain.
  '5':
  - type: text
    content: Then He said to me, “Son of man, lift your eyes now toward the north.” So I lifted my eyes toward the north, and there, north of the altar gate, was this image of jealousy in the entrance.
  '6':
  - type: text
    content: 'Furthermore He said to me, “Son of man, do you see what they are doing, the great '
  - type: note
    content: 2 Kin. 23:4, 5; Ezek. 5:11; 8:9, 17
  - type: text
    content: 'abominations that the house of Israel commits here, to make Me go far away from My sanctuary? Now turn again, you will see greater abominations.” '
  '7':
  - type: text
    content: 'So He brought me to the door of the court; and when I looked, there was a hole in the wall. '
  '8':
  - type: text
    content: Then He said to me, “Son of man, dig into the wall”; and when I dug into the wall, there was a door.
  '9':
  - type: text
    content: 'And He said to me, “Go in, and see the wicked abominations which they are doing there.” '
