    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 7:30; 32:34; Ezek. 5:11
      marker-yv: yv-n
    - type: text
      text: 'where the seat of the image of jealousy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was,
    - type: text
      text: ' which '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:4; Deut. 32:16, 21
      marker-yv: yv-n
    - type: text
      text: 'provokes to jealousy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And behold, the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 3:12; 9:3
      marker-yv: yv-n
    - type: text
      text: 'glory of the God of Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' there, like the vision that I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 1:28; 3:22, 23
      marker-yv: yv-n
    - type: text
      text: saw in the plain.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then He said to me, “Son of man, lift your eyes now toward the north.” So I lifted my eyes toward the north, and there, north of the altar gate, was this image of jealousy in the entrance.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Furthermore He said to me, “Son of man, do you see what they are doing, the great '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:4, 5; Ezek. 5:11; 8:9, 17
      marker-yv: yv-n
    - type: text
      text: 'abominations that the house of Israel commits here, to make Me go far away from My sanctuary? Now turn again, you will see greater abominations.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So He brought me to the door of the court; and when I looked, there was a hole in the wall. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then He said to me, “Son of man, dig into the wall”; and when I dug into the wall, there was a door.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And He said to me, “Go in, and see the wicked abominations which they are doing there.” '
