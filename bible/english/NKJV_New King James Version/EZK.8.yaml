      children:
      - type: text
        text: Ezek. 1:26, 27
      marker-yv: yv-n
    - type: text
      text: 'Then I looked, and there was a likeness, like the appearance of fire—from the appearance of His waist and downward, fire; and from His waist and upward, like the appearance of brightness, '
