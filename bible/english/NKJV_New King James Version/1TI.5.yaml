document_id: 1TI.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Treatment of Church Members
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Do not rebuke an older man, but exhort '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' as a father, younger men as brothers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: older women as mothers, younger women as sisters, with all purity.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Honor True Widows
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Honor widows who are really widows. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But if any widow has children or grandchildren, let them first learn to show piety at home and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 45:10
    marker-yv: yv-n
  - type: text
    text: 'to repay their parents; for this is good and acceptable before God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now she who is really a widow, and left alone, trusts in God and continues in supplications and prayers '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 26:7
    marker-yv: yv-n
  - type: text
    text: 'night and day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But she who lives in pleasure is dead while she lives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And these things command, that they may be blameless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But if anyone does not provide for his own, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 58:7; 2 Cor. 12:14
    marker-yv: yv-n
  - type: text
    text: 'and especially for those of his household, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 3:5
    marker-yv: yv-n
  - type: text
    text: 'he has denied the faith '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 18:17
    marker-yv: yv-n
  - type: text
    text: and is worse than an unbeliever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Do not let a widow under sixty years old be taken into the number, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: not
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: unless
  - type: text
    text: ' she has been the wife of one man, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'well reported for good works: if she has brought up children, if she has lodged strangers, if she has washed the saints’ feet, if she has relieved the afflicted, if she has diligently followed every good work.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But refuse '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' younger widows; for when they have begun to grow wanton against Christ, they desire to marry, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'having condemnation because they have cast off their first faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And besides they learn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' idle, wandering about from house to house, and not only idle but also gossips and busybodies, saying things which they ought not. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore I desire that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' younger '
  - type: usfm
    marker: it
    children:
    - type: text
      text: widows
  - type: text
    text: ' marry, bear children, manage the house, give no opportunity to the adversary to speak reproachfully. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For some have already turned aside after Satan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: If any believing man or woman has widows, let them relieve them, and do not let the church be burdened, that it may relieve those who are really widows.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Honor the Elders
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Let the elders who rule well be counted worthy of double honor, especially those who labor in the word and doctrine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For the Scripture says, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 25:4; 1 Cor. 9:7–9
    marker-yv: yv-n
  - type: text
    text: '“You shall not muzzle an ox while it treads out the grain,” and, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 19:13; Deut. 24:15; Matt. 10:10; Luke 10:7; 1 Cor. 9:14
    marker-yv: yv-n
  - type: text
    text: '“The laborer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' worthy of his wages.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Do not receive an accusation against an elder except '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 17:6; 19:15; Matt. 18:16
    marker-yv: yv-n
  - type: text
    text: 'from two or three witnesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Those who are sinning rebuke in the presence of all, that the rest also may fear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I charge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ' before God and the Lord Jesus Christ and the elect angels that you observe these things without '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 1:17
    marker-yv: yv-n
  - type: text
    text: 'prejudice, doing nothing with partiality. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Do not lay hands on anyone hastily, nor '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 5:6, 7; 2 John 11
    marker-yv: yv-n
  - type: text
    text: share in other people’s sins; keep yourself pure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: No longer drink only water, but use a little wine for your stomach’s sake and your frequent infirmities.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Some men’s sins are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 5:19–21
    marker-yv: yv-n
  - type: text
    text: 'clearly evident, preceding '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them
  - type: text
    text: ' to judgment, but those of some '
  - type: usfm
    marker: it
    children:
    - type: text
      text: men
  - type: text
    text: ' follow later. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Likewise, the good works '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' are clearly evident, and those that are otherwise cannot be hidden.'
