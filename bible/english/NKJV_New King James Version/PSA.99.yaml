document_id: PSA.99,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Praise to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for His Holiness'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the peoples tremble!
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 25:22; 1 Sam. 4:4; Ps. 80:1
      marker-yv: yv-n
    - type: text
      text: 'He dwells '
    - type: usfm
      marker: it
      children:
      - type: text
        text: between
    - type: text
      text: ' the cherubim;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the earth be moved!
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' great in Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' high above all the peoples.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them praise Your great and awesome name—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' holy.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The King’s strength also loves justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have established equity;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have executed justice and righteousness in Jacob.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Exalt the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And worship at His footstool—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' holy.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moses and Aaron were among His priests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And Samuel was among those who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 7:9; 12:18
      marker-yv: yv-n
    - type: text
      text: called upon His name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They called upon the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and He answered them.'
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He spoke to them in the cloudy pillar;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They kept His testimonies and the ordinance He gave them.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You answered them, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You were to them God-Who-Forgives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Though You took vengeance on their deeds.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Exalt the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And worship at His holy hill;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' holy.'
