document_id: GEN.50,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Joseph '
  - type: note
    content: Gen. 46:4, 29
  - type: text
    content: 'fell on his father’s face, and '
  - type: note
    content: 2 Kin. 13:14
  - type: text
    content: 'wept over him, and kissed him. '
  '10':
  - type: text
    content: 'Then they came to the threshing floor of Atad, which '
  - type: text
    content: is
  - type: text
    content: ' beyond the Jordan, and they '
  - type: note
    content: Acts 8:2
  - type: text
    content: 'mourned there with a great and very solemn lamentation. '
  - type: note
    content: 1 Sam. 31:13; Job 2:13
  - type: text
    content: 'He observed seven days of mourning for his father. '
  '11':
  - type: text
    content: 'And when the inhabitants of the land, the Canaanites, saw the mourning at the threshing floor of Atad, they said, “This '
  - type: text
    content: is
  - type: text
    content: ' a deep mourning of the Egyptians.” Therefore its name was called Abel Mizraim, which '
  - type: text
    content: is
  - type: text
    content: ' beyond the Jordan.'
  '12':
  - type: text
    content: 'So his sons did for him just as he had commanded them. '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: Gen. 49:29–31; Acts 7:16
  - type: text
    content: 'his sons carried him to the land of Canaan, and buried him in the cave of the field of Machpelah, before Mamre, which Abraham '
  - type: note
    content: Gen. 23:16–20
  - type: text
    content: 'bought with the field from Ephron the Hittite as property for a burial place. '
  '14':
  - type: text
    content: And after he had buried his father, Joseph returned to Egypt, he and his brothers and all who went up with him to bury his father.
  - type: heading
    content: Joseph Reassures His Brothers
  '15':
  - type: text
    content: 'When Joseph’s brothers saw that their father was dead, '
  - type: note
    content: (Job 15:21)
  - type: text
    content: 'they said, “Perhaps Joseph will hate us, and may actually repay us for all the evil which we did to him.” '
  '16':
  - type: text
    content: 'So they sent '
  - type: text
    content: messengers
  - type: text
    content: ' to Joseph, saying, “Before your father died he commanded, saying, '
  '17':
  - type: text
    content: '‘Thus you shall say to Joseph: “I beg you, please forgive the trespass of your brothers and their sin; '
  - type: note
    content: (Prov. 28:13)
  - type: text
    content: 'for they did evil to you.” ’ Now, please, forgive the trespass of the servants of '
  - type: note
    content: Gen. 49:25
  - type: text
    content: the God of your father.” And Joseph wept when they spoke to him.
  '18':
  - type: text
    content: 'Then his brothers also went and '
  - type: note
    content: Gen. 37:7–10; 41:43; 44:14
  - type: text
    content: 'fell down before his face, and they said, “Behold, we '
  - type: text
    content: are
  - type: text
    content: ' your servants.”'
  '19':
  - type: text
    content: 'Joseph said to them, '
  - type: note
    content: Gen. 45:5
  - type: text
    content: '“Do not be afraid, '
  - type: note
    content: Gen. 30:2; 2 Kin. 5:7
  - type: text
    content: 'for '
  - type: text
    content: am
  - type: text
    content: ' I in the place of God? '
  '2':
  - type: text
    content: 'And Joseph commanded his servants the physicians to '
  - type: note
    content: Gen. 50:26; 2 Chr. 16:14; Matt. 26:12; Mark 16:1; Luke 24:1; John 19:39, 40
  - type: text
    content: 'embalm his father. So the physicians embalmed Israel. '
  '20':
  - type: note
    content: Gen. 45:5, 7; Ps. 56:5
  - type: text
    content: 'But as for you, you meant evil against me; '
  - type: text
    content: but
  - type: text
    content: ' '
  - type: note
    content: (Acts 3:13–15)
  - type: text
    content: 'God meant it for good, in order to bring it about as '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' this day, to save many people alive. '
  '21':
  - type: text
    content: 'Now therefore, do not be afraid; '
  - type: note
    content: (Matt. 5:44)
  - type: text
    content: I will provide for you and your little ones.” And he comforted them and spoke kindly to them.
  - type: heading
    content: Death of Joseph
  '22':
  - type: text
    content: 'So Joseph dwelt in Egypt, he and his father’s household. And Joseph lived one hundred and ten years. '
  '23':
  - type: text
    content: 'Joseph saw Ephraim’s children '
  - type: note
    content: Gen. 48:1; Job 42:16
  - type: text
    content: 'to the third '
  - type: text
    content: generation.
  - type: text
    content: ' '
  - type: note
    content: Num. 26:29; 32:39
  - type: text
    content: 'The children of Machir, the son of Manasseh, '
  - type: note
    content: Gen. 30:3
  - type: text
    content: were also brought up on Joseph’s knees.
  '24':
  - type: text
    content: 'And Joseph said to his brethren, “I am dying; but '
  - type: note
    content: Gen. 15:14; 46:4; 48:21; Ex. 3:16, 17; Josh. 3:17; Heb. 11:22
  - type: text
    content: 'God will surely visit you, and bring you out of this land to the land '
  - type: note
    content: Gen. 26:3; 35:12; 46:4; Ex. 6:8
  - type: text
    content: 'of which He swore to Abraham, to Isaac, and to Jacob.” '
  '25':
  - type: text
    content: 'Then '
  - type: note
    content: Gen. 47:29, 30; Ex. 13:19; Josh. 24:32; Acts 7:15, 16; Heb. 11:22
  - type: text
    content: 'Joseph took an oath from the children of Israel, saying, “God will surely visit you, and '
  - type: note
    content: Gen. 17:8; 28:13; 35:12; Deut. 1:8; 30:1–8
  - type: text
    content: 'you shall carry up my '
  - type: note
    content: Ex. 13:19
  - type: text
    content: 'bones from here.” '
  '26':
  - type: text
    content: 'So Joseph died, '
  - type: text
    content: being
  - type: text
    content: ' one hundred and ten years old; and they embalmed him, and he was put in a coffin in Egypt.'
  '3':
  - type: text
    content: 'Forty days were required for him, for such are the days required for those who are embalmed; and the Egyptians '
  - type: note
    content: Gen. 37:34; Num. 20:29; Deut. 34:8
  - type: text
    content: mourned for him seventy days.
  '4':
  - type: text
    content: 'Now when the days of his mourning were past, Joseph spoke to '
  - type: note
    content: Esth. 4:2
  - type: text
    content: 'the household of Pharaoh, saying, “If now I have found favor in your eyes, please speak in the hearing of Pharaoh, saying, '
  '5':
  - type: note
    content: Gen. 47:29–31
  - type: text
    content: '‘My father made me swear, saying, “Behold, I am dying; in my grave '
  - type: note
    content: 2 Chr. 16:14; Is. 22:16; Matt. 27:60
  - type: text
    content: which I dug for myself in the land of Canaan, there you shall bury me.” Now therefore, please let me go up and bury my father, and I will come back.’ ”
  '6':
  - type: text
    content: And Pharaoh said, “Go up and bury your father, as he made you swear.”
  '7':
  - type: text
    content: 'So Joseph went up to bury his father; and with him went up all the servants of Pharaoh, the elders of his house, and all the elders of the land of Egypt, '
  '8':
  - type: text
    content: 'as well as all the house of Joseph, his brothers, and his father’s house. Only their little ones, their flocks, and their herds they left in the land of Goshen. '
  '9':
  - type: text
    content: And there went up with him both chariots and horsemen, and it was a very great gathering.
