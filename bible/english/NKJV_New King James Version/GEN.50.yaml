  - type: text
    text: 'Then Joseph '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 46:4, 29
    marker-yv: yv-n
  - type: text
    text: 'fell on his father’s face, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 13:14
    marker-yv: yv-n
  - type: text
    text: 'wept over him, and kissed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Joseph commanded his servants the physicians to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 50:26; 2 Chr. 16:14; Matt. 26:12; Mark 16:1; Luke 24:1; John 19:39, 40
    marker-yv: yv-n
  - type: text
    text: 'embalm his father. So the physicians embalmed Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Forty days were required for him, for such are the days required for those who are embalmed; and the Egyptians '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 37:34; Num. 20:29; Deut. 34:8
    marker-yv: yv-n
  - type: text
    text: mourned for him seventy days.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now when the days of his mourning were past, Joseph spoke to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 4:2
    marker-yv: yv-n
  - type: text
    text: 'the household of Pharaoh, saying, “If now I have found favor in your eyes, please speak in the hearing of Pharaoh, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 47:29–31
    marker-yv: yv-n
  - type: text
    text: '‘My father made me swear, saying, “Behold, I am dying; in my grave '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 16:14; Is. 22:16; Matt. 27:60
    marker-yv: yv-n
  - type: text
    text: which I dug for myself in the land of Canaan, there you shall bury me.” Now therefore, please let me go up and bury my father, and I will come back.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And Pharaoh said, “Go up and bury your father, as he made you swear.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So Joseph went up to bury his father; and with him went up all the servants of Pharaoh, the elders of his house, and all the elders of the land of Egypt, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'as well as all the house of Joseph, his brothers, and his father’s house. Only their little ones, their flocks, and their herds they left in the land of Goshen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: And there went up with him both chariots and horsemen, and it was a very great gathering.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then they came to the threshing floor of Atad, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' beyond the Jordan, and they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 8:2
    marker-yv: yv-n
  - type: text
    text: 'mourned there with a great and very solemn lamentation. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 31:13; Job 2:13
    marker-yv: yv-n
  - type: text
    text: 'He observed seven days of mourning for his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And when the inhabitants of the land, the Canaanites, saw the mourning at the threshing floor of Atad, they said, “This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a deep mourning of the Egyptians.” Therefore its name was called Abel Mizraim, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' beyond the Jordan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So his sons did for him just as he had commanded them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 49:29–31; Acts 7:16
    marker-yv: yv-n
  - type: text
    text: 'his sons carried him to the land of Canaan, and buried him in the cave of the field of Machpelah, before Mamre, which Abraham '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 23:16–20
    marker-yv: yv-n
  - type: text
    text: 'bought with the field from Ephron the Hittite as property for a burial place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And after he had buried his father, Joseph returned to Egypt, he and his brothers and all who went up with him to bury his father.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Reassures His Brothers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When Joseph’s brothers saw that their father was dead, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Job 15:21)
    marker-yv: yv-n
  - type: text
    text: 'they said, “Perhaps Joseph will hate us, and may actually repay us for all the evil which we did to him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So they sent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: messengers
  - type: text
    text: ' to Joseph, saying, “Before your father died he commanded, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '‘Thus you shall say to Joseph: “I beg you, please forgive the trespass of your brothers and their sin; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Prov. 28:13)
    marker-yv: yv-n
  - type: text
    text: 'for they did evil to you.” ’ Now, please, forgive the trespass of the servants of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 49:25
    marker-yv: yv-n
  - type: text
    text: the God of your father.” And Joseph wept when they spoke to him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then his brothers also went and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 37:7–10; 41:43; 44:14
    marker-yv: yv-n
  - type: text
    text: 'fell down before his face, and they said, “Behold, we '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' your servants.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Joseph said to them, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 45:5
    marker-yv: yv-n
  - type: text
    text: '“Do not be afraid, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 30:2; 2 Kin. 5:7
    marker-yv: yv-n
  - type: text
    text: 'for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: am
  - type: text
    text: ' I in the place of God? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 45:5, 7; Ps. 56:5
    marker-yv: yv-n
  - type: text
    text: 'But as for you, you meant evil against me; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Acts 3:13–15)
    marker-yv: yv-n
  - type: text
    text: 'God meant it for good, in order to bring it about as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' this day, to save many people alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now therefore, do not be afraid; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Matt. 5:44)
    marker-yv: yv-n
  - type: text
    text: I will provide for you and your little ones.” And he comforted them and spoke kindly to them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Death of Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Joseph dwelt in Egypt, he and his father’s household. And Joseph lived one hundred and ten years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Joseph saw Ephraim’s children '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 48:1; Job 42:16
    marker-yv: yv-n
  - type: text
    text: 'to the third '
  - type: usfm
    marker: it
    children:
    - type: text
      text: generation.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 26:29; 32:39
    marker-yv: yv-n
  - type: text
    text: 'The children of Machir, the son of Manasseh, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 30:3
    marker-yv: yv-n
  - type: text
    text: were also brought up on Joseph’s knees.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And Joseph said to his brethren, “I am dying; but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 15:14; 46:4; 48:21; Ex. 3:16, 17; Josh. 3:17; Heb. 11:22
    marker-yv: yv-n
  - type: text
    text: 'God will surely visit you, and bring you out of this land to the land '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 26:3; 35:12; 46:4; Ex. 6:8
    marker-yv: yv-n
  - type: text
    text: 'of which He swore to Abraham, to Isaac, and to Jacob.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 47:29, 30; Ex. 13:19; Josh. 24:32; Acts 7:15, 16; Heb. 11:22
    marker-yv: yv-n
  - type: text
    text: 'Joseph took an oath from the children of Israel, saying, “God will surely visit you, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 17:8; 28:13; 35:12; Deut. 1:8; 30:1–8
    marker-yv: yv-n
  - type: text
    text: 'you shall carry up my '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 13:19
    marker-yv: yv-n
  - type: text
    text: 'bones from here.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'So Joseph died, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: being
  - type: text
    text: ' one hundred and ten years old; and they embalmed him, and he was put in a coffin in Egypt.'
