  - type: text
    content: 'kept the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ', to do according to all that is written in this book.”'
  '22':
  - type: text
    content: 'So Hilkiah and those the king '
  - type: text
    content: had
  - type: text
    content: ' '
  - type: text
    content: appointed
  - type: text
    content: ' went to Huldah the prophetess, the wife of Shallum the son of Tokhath, the son of Hasrah, keeper of the wardrobe. (She dwelt in Jerusalem in the Second Quarter.) And they spoke to her to that '
  - type: text
    content: effect.
  '23':
  - type: text
    content: 'Then she answered them, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel, ‘Tell the man who sent you to Me, '
  '24':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Behold, I will '
  - type: note
    content: 2 Chr. 36:14–20
  - type: text
    content: 'bring calamity on this place and on its inhabitants, all the curses that are written in the '
  - type: note
    content: Deut. 28:15–68
  - type: text
    content: 'book which they have read before the king of Judah, '
  '25':
  - type: text
    content: 'because they have forsaken Me and burned incense to other gods, that they might provoke Me to anger with all the works of their hands. Therefore My wrath will be poured out on this place, and not be quenched.’ ” ’ '
  '26':
  - type: text
    content: 'But as for the king of Judah, who sent you to inquire of the '
  - type: heading
    content: Lord
  - type: text
    content: ', in this manner you shall speak to him, ‘Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of Israel: “'
  - type: text
    content: Concerning
  - type: text
    content: ' the words which you have heard— '
  '27':
  - type: text
    content: 'because your heart was tender, and you humbled yourself before God when you heard His words against this place and against its inhabitants, and you humbled yourself before Me, and you tore your clothes and wept before Me, I also have heard '
  - type: text
    content: you,
  - type: text
    content: '” says the '
  - type: note
    content: 2 Kin. 22:19; 2 Chr. 12:7; 30:6; 33:12, 13
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: “Surely I will gather you to your fathers, and you shall be gathered to your grave in peace; and your eyes shall not see all the calamity which I will bring on this place and its inhabitants.” ’ ” So they brought back word to the king.
  - type: heading
    content: Josiah Restores True Worship
  '29':
  - type: note
    content: 2 Kin. 23:1–3
  - type: text
    content: 'Then the king sent and gathered all the elders of Judah and Jerusalem. '
  '3':
  - type: text
    content: 'For in the eighth year of his reign, while he was still '
  - type: note
    content: Eccl. 12:1
  - type: text
    content: 'young, he began to '
  - type: note
    content: 2 Chr. 15:2; (Prov. 8:17)
  - type: text
    content: 'seek the God of his father David; and in the twelfth year he began '
  - type: note
    content: 1 Kin. 13:2
  - type: text
    content: 'to purge Judah and Jerusalem '
  - type: note
    content: 2 Chr. 33:17–19, 22
  - type: text
    content: 'of the high places, the wooden images, the carved images, and the molded images. '
  '30':
  - type: text
    content: 'The king went up to the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', with all the men of Judah and the inhabitants of Jerusalem—the priests and the Levites, and all the people, great and small. And he '
  - type: note
    content: Neh. 8:1–3
  - type: text
    content: 'read in their hearing all the words of the Book of the Covenant which had been found in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Then the king '
  - type: note
    content: 2 Chr. 6:13
  - type: text
    content: 'stood in '
  - type: note
    content: 2 Kin. 11:14; 23:3; 2 Chr. 30:16
  - type: text
    content: 'his place and made a '
  - type: note
    content: 2 Chr. 23:16; 29:10
  - type: text
    content: 'covenant before the '
  - type: heading
    content: Lord
  - type: text
    content: ', to follow the '
  - type: heading
    content: Lord
  - type: text
    content: ', and to keep His commandments and His testimonies and His statutes with all his heart and all his soul, to perform the words of the covenant that were written in this book. '
  '32':
  - type: text
    content: 'And he made all who were present in Jerusalem and Benjamin take a stand. So the inhabitants of Jerusalem did according to the covenant of God, the God of their fathers. '
  '33':
  - type: text
    content: 'Thus Josiah removed all the '
  - type: note
    content: 1 Kin. 11:5; 2 Chr. 33:2
  - type: text
    content: 'abominations from all the country that '
  - type: text
    content: belonged
  - type: text
    content: ' to the children of Israel, and made all who were present in Israel diligently serve the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God. '
  - type: note
    content: Jer. 3:10
  - type: text
    content: 'All his days they did not depart from following the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of their fathers.'
  '4':
  - type: note
    content: Lev. 26:30; 2 Kin. 23:4
  - type: text
    content: 'They broke down the altars of the Baals in his presence, and the incense altars which '
  - type: text
    content: were
  - type: text
    content: ' above them he cut down; and the wooden images, the carved images, and the molded images he broke in pieces, and made dust of them '
  - type: note
    content: 2 Kin. 23:6
  - type: text
    content: 'and scattered '
  - type: text
    content: it
  - type: text
    content: ' on the graves of those who had sacrificed to them. '
  '5':
  - type: text
    content: 'He also '
  - type: note
    content: 1 Kin. 13:2
  - type: text
    content: 'burned the bones of the priests on their '
  - type: note
    content: 2 Kin. 23:20
  - type: text
    content: 'altars, and cleansed Judah and Jerusalem. '
  '6':
  - type: text
    content: 'And '
  - type: text
    content: so
  - type: text
    content: ' '
  - type: text
    content: he
  - type: text
    content: ' '
  - type: text
    content: did
  - type: text
    content: ' in the cities of Manasseh, Ephraim, and Simeon, as far as Naphtali and all around, with axes. '
  '7':
  - type: text
    content: 'When he had broken down the altars and the wooden images, had '
  - type: note
    content: Deut. 9:21
  - type: text
    content: beaten the carved images into powder, and cut down all the incense altars throughout all the land of Israel, he returned to Jerusalem.
  - type: heading
    content: Hilkiah Finds the Book of the Law
  '8':
  - type: note
    content: 2 Kin. 22:3–20
  - type: text
    content: 'In the eighteenth year of his reign, when he had purged the land and the temple, he sent '
  - type: note
