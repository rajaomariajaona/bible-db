  '15':
  - type: text
    content: 'Then Hilkiah answered and said to Shaphan the scribe, “I have found the Book of the Law in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: '.” And Hilkiah gave the '
  - type: note
