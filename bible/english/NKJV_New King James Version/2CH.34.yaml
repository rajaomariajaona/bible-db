document_id: 2CH.34,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josiah Reigns in Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josiah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:1, 2; Jer. 1:2; 3:6
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' eight years old when he became king, and he reigned thirty-one years in Jerusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' in the hand of the foremen who had the oversight of the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; and they gave it to the workmen who worked in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to repair and restore the house. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They gave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to the craftsmen and builders to buy hewn stone and timber for beams, and to floor the houses which the kings of Judah had destroyed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the men did the work faithfully. Their overseers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' Jahath and Obadiah the Levites, of the sons of Merari, and Zechariah and Meshullam, of the sons of the Kohathites, to supervise. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Others
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' the Levites, all of whom were skillful with instruments of music, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 8:10
      marker-yv: yv-n
    - type: text
      text: 'over the burden bearers and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' overseers of all who did work in any kind of service. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 23:4, 5
      marker-yv: yv-n
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: some
    - type: text
      text: ' of the Levites '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' scribes, officers, and gatekeepers.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when they brought out the money that was brought into the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', Hilkiah the priest '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:8
      marker-yv: yv-n
    - type: text
      text: 'found the Book of the Law of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: given
    - type: text
      text: ' by Moses. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Hilkiah answered and said to Shaphan the scribe, “I have found the Book of the Law in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '.” And Hilkiah gave the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:24, 26
      marker-yv: yv-n
    - type: text
      text: 'book to Shaphan. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Shaphan carried the book to the king, bringing the king word, saying, “All that was committed to your servants they are doing. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they have gathered the money that was found in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and have delivered it into the hand of the overseers and the workmen.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Shaphan the scribe told the king, saying, “Hilkiah the priest has given me a book.” And Shaphan read it before the king.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus it happened, when the king heard the words of the Law, that he tore his clothes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' right in the sight of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and walked in the ways of his father David; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not
    - type: text
      text: ' turn aside to the right hand or to the left.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king commanded Hilkiah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 26:24
      marker-yv: yv-n
    - type: text
      text: 'Ahikam the son of Shaphan, Abdon the son of Micah, Shaphan the scribe, and Asaiah a servant of the king, saying, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go, inquire of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for me, and for those who are left in Israel and Judah, concerning the words of the book that is found; for great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the wrath of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that is poured out on us, because our fathers have not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 17:15–19
      marker-yv: yv-n
    - type: text
      text: 'kept the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to do according to all that is written in this book.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Hilkiah and those the king '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: appointed
    - type: text
      text: ' went to Huldah the prophetess, the wife of Shallum the son of Tokhath, the son of Hasrah, keeper of the wardrobe. (She dwelt in Jerusalem in the Second Quarter.) And they spoke to her to that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: effect.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then she answered them, “Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel, ‘Tell the man who sent you to Me, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': ‘Behold, I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:14–20
      marker-yv: yv-n
    - type: text
      text: 'bring calamity on this place and on its inhabitants, all the curses that are written in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:15–68
      marker-yv: yv-n
    - type: text
      text: 'book which they have read before the king of Judah, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because they have forsaken Me and burned incense to other gods, that they might provoke Me to anger with all the works of their hands. Therefore My wrath will be poured out on this place, and not be quenched.’ ” ’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as for the king of Judah, who sent you to inquire of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in this manner you shall speak to him, ‘Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel: “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Concerning
    - type: text
      text: ' the words which you have heard— '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because your heart was tender, and you humbled yourself before God when you heard His words against this place and against its inhabitants, and you humbled yourself before Me, and you tore your clothes and wept before Me, I also have heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you,
    - type: text
      text: '” says the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:19; 2 Chr. 12:7; 30:6; 33:12, 13
      marker-yv: yv-n
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Surely I will gather you to your fathers, and you shall be gathered to your grave in peace; and your eyes shall not see all the calamity which I will bring on this place and its inhabitants.” ’ ” So they brought back word to the king.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josiah Restores True Worship
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:1–3
      marker-yv: yv-n
    - type: text
      text: 'Then the king sent and gathered all the elders of Judah and Jerusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in the eighth year of his reign, while he was still '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eccl. 12:1
      marker-yv: yv-n
    - type: text
      text: 'young, he began to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 15:2; (Prov. 8:17)
      marker-yv: yv-n
    - type: text
      text: 'seek the God of his father David; and in the twelfth year he began '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 13:2
      marker-yv: yv-n
    - type: text
      text: 'to purge Judah and Jerusalem '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 33:17–19, 22
      marker-yv: yv-n
    - type: text
      text: 'of the high places, the wooden images, the carved images, and the molded images. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king went up to the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', with all the men of Judah and the inhabitants of Jerusalem—the priests and the Levites, and all the people, great and small. And he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Neh. 8:1–3
      marker-yv: yv-n
    - type: text
      text: 'read in their hearing all the words of the Book of the Covenant which had been found in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the king '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 6:13
      marker-yv: yv-n
    - type: text
      text: 'stood in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 11:14; 23:3; 2 Chr. 30:16
      marker-yv: yv-n
    - type: text
      text: 'his place and made a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 23:16; 29:10
      marker-yv: yv-n
    - type: text
      text: 'covenant before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to follow the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and to keep His commandments and His testimonies and His statutes with all his heart and all his soul, to perform the words of the covenant that were written in this book. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he made all who were present in Jerusalem and Benjamin take a stand. So the inhabitants of Jerusalem did according to the covenant of God, the God of their fathers. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus Josiah removed all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:5; 2 Chr. 33:2
      marker-yv: yv-n
    - type: text
      text: 'abominations from all the country that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: belonged
    - type: text
      text: ' to the children of Israel, and made all who were present in Israel diligently serve the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 3:10
      marker-yv: yv-n
    - type: text
      text: 'All his days they did not depart from following the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of their fathers.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:30; 2 Kin. 23:4
      marker-yv: yv-n
    - type: text
      text: 'They broke down the altars of the Baals in his presence, and the incense altars which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' above them he cut down; and the wooden images, the carved images, and the molded images he broke in pieces, and made dust of them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:6
      marker-yv: yv-n
    - type: text
      text: 'and scattered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' on the graves of those who had sacrificed to them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 13:2
      marker-yv: yv-n
    - type: text
      text: 'burned the bones of the priests on their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 23:20
      marker-yv: yv-n
    - type: text
      text: 'altars, and cleansed Judah and Jerusalem. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' in the cities of Manasseh, Ephraim, and Simeon, as far as Naphtali and all around, with axes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he had broken down the altars and the wooden images, had '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 9:21
      marker-yv: yv-n
    - type: text
      text: beaten the carved images into powder, and cut down all the incense altars throughout all the land of Israel, he returned to Jerusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hilkiah Finds the Book of the Law
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 22:3–20
      marker-yv: yv-n
    - type: text
      text: 'In the eighteenth year of his reign, when he had purged the land and the temple, he sent '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:22
      marker-yv: yv-n
    - type: text
      text: 'Shaphan the son of Azaliah, Maaseiah the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 18:25
      marker-yv: yv-n
    - type: text
      text: 'governor of the city, and Joah the son of Joahaz the recorder, to repair the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they came to Hilkiah the high priest, they delivered '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 12:4
      marker-yv: yv-n
    - type: text
      text: 'the money that was brought into the house of God, which the Levites who kept the doors had gathered from the hand of Manasseh and Ephraim, from all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 30:6
      marker-yv: yv-n
    - type: text
      text: 'remnant of Israel, from all Judah and Benjamin, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' they had brought back to Jerusalem. '
