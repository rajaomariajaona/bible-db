  - type: text
    content: 'Then the king commanded Hilkiah, '
  - type: note
    content: Jer. 26:24
  - type: text
    content: 'Ahikam the son of Shaphan, Abdon the son of Micah, Shaphan the scribe, and Asaiah a servant of the king, saying, '
  '21':
  - type: text
    content: '“Go, inquire of the '
  - type: heading
    content: Lord
  - type: text
    content: ' for me, and for those who are left in Israel and Judah, concerning the words of the book that is found; for great '
  - type: text
    content: is
  - type: text
