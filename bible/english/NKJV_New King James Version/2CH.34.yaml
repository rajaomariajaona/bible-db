  - type: text
    content: 'book to Shaphan. '
  '16':
  - type: text
    content: 'So Shaphan carried the book to the king, bringing the king word, saying, “All that was committed to your servants they are doing. '
  '17':
  - type: text
    content: 'And they have gathered the money that was found in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and have delivered it into the hand of the overseers and the workmen.” '
  '18':
  - type: text
    content: Then Shaphan the scribe told the king, saying, “Hilkiah the priest has given me a book.” And Shaphan read it before the king.
  '19':
  - type: text
    content: 'Thus it happened, when the king heard the words of the Law, that he tore his clothes. '
  '2':
  - type: text
    content: 'And he did '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
