document_id: 1CO.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ Crucified
  - type: text
    content: 'And I, brethren, when I came to you, did not come with excellence of speech or of wisdom declaring to you the testimony of God. '
  '10':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 11:25; 13:11; 16:17; (Gal. 1:12; Eph. 3:3, 5)
  - type: text
    content: 'God has revealed '
  - type: text
    content: them
  - type: text
    content: ' to us through His Spirit. For the Spirit searches all things, yes, the deep things of God. '
  '11':
  - type: text
    content: 'For what man knows the things of a man except the '
  - type: note
    content: Job 32:8; Eccl. 12:7; (1 Cor. 6:20; James 2:26)
  - type: text
    content: 'spirit of the man which is in him? '
  - type: note
    content: Rom. 11:33
  - type: text
    content: 'Even so no one knows the things of God except the Spirit of God. '
  '12':
  - type: text
    content: 'Now we have received, not the spirit of the world, but '
  - type: note
    content: (Rom. 8:15)
  - type: text
    content: the Spirit who is from God, that we might know the things that have been freely given to us by God.
  '13':
  - type: text
    content: 'These things we also speak, not in words which man’s wisdom teaches but which the Holy Spirit teaches, comparing spiritual things with spiritual. '
  '14':
  - type: note
    content: Matt. 16:23
  - type: text
    content: 'But the natural man does not receive the things of the Spirit of God, for they are foolishness to him; nor can he know '
  - type: text
    content: them,
  - type: text
    content: ' because they are spiritually discerned. '
  '15':
  - type: text
    content: 'But he who is spiritual judges all things, yet he himself is '
  - type: text
    content: rightly
  - type: text
    content: ' judged by no one. '
  '16':
  - type: text
    content: 'For '
  - type: note
    content: Job 15:8; Is. 40:13; Rom. 11:34
  - type: text
    content: '“who has known the mind of the '
  - type: heading
    content: Lord
  - type: text
    content: ' that he may instruct Him?” '
  - type: note
    content: (John 15:15)
  - type: text
    content: But we have the mind of Christ.
  '2':
  - type: text
    content: 'For I determined not to know anything among you '
  - type: note
    content: 1 Cor. 1:23; Gal. 6:14
  - type: text
    content: 'except Jesus Christ and Him crucified. '
  '3':
  - type: note
    content: Acts 18:1
  - type: text
    content: 'I was with you '
  - type: note
    content: (2 Cor. 4:7)
  - type: text
    content: 'in weakness, in fear, and in much trembling. '
  '4':
  - type: text
    content: 'And my speech and my preaching '
  - type: note
    content: 2 Pet. 1:16
  - type: text
    content: were
  - type: text
    content: ' not with persuasive words of human wisdom, '
  - type: note
    content: Rom. 15:19; 1 Cor. 4:20
  - type: text
    content: 'but in demonstration of the Spirit and of power, '
  '5':
  - type: text
    content: 'that your faith should not be in the wisdom of men but in the '
  - type: note
    content: Rom. 1:16; 1 Thess. 1:5
  - type: text
    content: power of God.
  - type: heading
    content: Spiritual Wisdom
  '6':
  - type: text
    content: 'However, we speak wisdom among those who are mature, yet not the wisdom of this age, nor of the rulers of this age, who are coming to nothing. '
  '7':
  - type: text
    content: 'But we speak the wisdom of God in a mystery, the hidden '
  - type: text
    content: wisdom
  - type: text
    content: ' which God ordained before the ages for our glory, '
  '8':
  - type: text
    content: 'which none of the rulers of this age knew; for '
  - type: note
    content: Luke 23:34
  - type: text
    content: 'had they known, they would not have '
  - type: note
    content: Matt. 27:33–50
  - type: text
    content: crucified the Lord of glory.
  '9':
  - type: text
    content: 'But as it is written:'
  - type: note
    content: (Is. 64:4; 65:17)
  - type: text
    content: “Eye has not seen, nor ear heard,
  - type: text
    content: Nor have entered into the heart of man
  - type: text
    content: The things which God has prepared for those who love Him.”
