document_id: 1CO.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Crucified
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'And I, brethren, when I came to you, did not come with excellence of speech or of wisdom declaring to you the testimony of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 11:25; 13:11; 16:17; (Gal. 1:12; Eph. 3:3, 5)
      marker-yv: yv-n
    - type: text
      text: 'God has revealed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to us through His Spirit. For the Spirit searches all things, yes, the deep things of God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For what man knows the things of a man except the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 32:8; Eccl. 12:7; (1 Cor. 6:20; James 2:26)
      marker-yv: yv-n
    - type: text
      text: 'spirit of the man which is in him? '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 11:33
      marker-yv: yv-n
    - type: text
      text: 'Even so no one knows the things of God except the Spirit of God. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Now we have received, not the spirit of the world, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:15)
      marker-yv: yv-n
    - type: text
      text: the Spirit who is from God, that we might know the things that have been freely given to us by God.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'These things we also speak, not in words which man’s wisdom teaches but which the Holy Spirit teaches, comparing spiritual things with spiritual. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 16:23
      marker-yv: yv-n
    - type: text
      text: 'But the natural man does not receive the things of the Spirit of God, for they are foolishness to him; nor can he know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' because they are spiritually discerned. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But he who is spiritual judges all things, yet he himself is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rightly
    - type: text
      text: ' judged by no one. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 15:8; Is. 40:13; Rom. 11:34
      marker-yv: yv-n
    - type: text
      text: '“who has known the mind of the '
    - type: usfm
      marker: sc
      children:
      - type: usfm
        marker: bd
        children:
        - type: text
          text: Lord
    - type: text
      text: ' that he may instruct Him?” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 15:15)
      marker-yv: yv-n
    - type: text
      text: But we have the mind of Christ.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For I determined not to know anything among you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:23; Gal. 6:14
      marker-yv: yv-n
    - type: text
      text: 'except Jesus Christ and Him crucified. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:1
      marker-yv: yv-n
    - type: text
      text: 'I was with you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 4:7)
      marker-yv: yv-n
    - type: text
      text: 'in weakness, in fear, and in much trembling. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And my speech and my preaching '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Pet. 1:16
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' not with persuasive words of human wisdom, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:19; 1 Cor. 4:20
      marker-yv: yv-n
    - type: text
      text: 'but in demonstration of the Spirit and of power, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'that your faith should not be in the wisdom of men but in the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:16; 1 Thess. 1:5
      marker-yv: yv-n
    - type: text
      text: power of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Spiritual Wisdom
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'However, we speak wisdom among those who are mature, yet not the wisdom of this age, nor of the rulers of this age, who are coming to nothing. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But we speak the wisdom of God in a mystery, the hidden '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wisdom
    - type: text
      text: ' which God ordained before the ages for our glory, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'which none of the rulers of this age knew; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 23:34
      marker-yv: yv-n
    - type: text
      text: 'had they known, they would not have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 27:33–50
      marker-yv: yv-n
    - type: text
      text: crucified the Lord of glory.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But as it is written:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 64:4; 65:17)
      marker-yv: yv-n
    - type: text
      text: “Eye has not seen, nor ear heard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor have entered into the heart of man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The things which God has prepared for those who love Him.”
