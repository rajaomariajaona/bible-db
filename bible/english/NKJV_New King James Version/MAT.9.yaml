  '1':
  - type: heading
    content: Jesus Forgives and Heals a Paralytic
  - type: text
    content: 'So He got into a boat, crossed over, '
  - type: note
    content: Matt. 4:13; 11:23; Mark 5:21
  - type: text
    content: 'and came to His own city. '
  '10':
  - type: note
    content: Mark 2:15; Luke 5:29
  - type: text
    content: 'Now it happened, as Jesus sat at the table in the house, '
  - type: text
    content: that
  - type: text
    content: ' behold, many tax collectors and sinners came and sat down with Him and His disciples. '
  '11':
  - type: text
    content: 'And when the Pharisees saw '
  - type: text
    content: it,
  - type: text
    content: ' they said to His disciples, “Why does your Teacher eat with '
  - type: note
    content: Matt. 11:19; Mark 2:16; Luke 5:30; 15:2
  - type: text
    content: 'tax collectors and '
  - type: note
    content: (Gal. 2:15)
  - type: text
    content: sinners?”
  '12':
  - type: text
    content: 'When Jesus heard '
  - type: text
    content: that,
  - type: text
    content: ' He said to them, '
  - type: text
    content: “Those who are well have no need of a physician, but those who are sick.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'But go and learn what '
  - type: text
    content: this
  - type: text
    content: ' means: '
  - type: note
    content: Hos. 6:6; (Mic. 6:6–8); Matt. 12:7
  - type: text
    content: ‘I desire mercy and not sacrifice.’
  - type: text
    content: ' For I did not come to call the righteous, '
  - type: note
    content: Mark 2:17; Luke 5:32; 1 Tim. 1:15
  - type: text
    content: 'but sinners, '
  - type: text
    content: to repentance.”
  - type: heading
    content: Jesus Is Questioned About Fasting
  '14':
  - type: text
    content: 'Then the disciples of John came to Him, saying, '
  - type: note
    content: Mark 2:18; Luke 5:33–35; 18:12
  - type: text
    content: “Why do we and the Pharisees fast often, but Your disciples do not fast?”
  '15':
  - type: text
    content: 'And Jesus said to them, '
  - type: text
    content: '“Can '
  - type: note
    content: John 3:29
  - type: text
    content: 'the '
  - type: text
    content: 'friends of the bridegroom mourn as long as the bridegroom is with them? But the days will come when the bridegroom will be taken away from them, and '
  - type: note
    content: Acts 13:2, 3; 14:23
  - type: text
    content: then they will fast.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'No one puts a piece of unshrunk cloth on an old garment; for '
  - type: text
    content: the patch pulls away from the garment, and the tear is made worse.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Nor do they put new wine into old wineskins, or else the wineskins '
  - type: text
    content: break, the wine is spilled, and the wineskins are ruined. But they put new wine into new wineskins, and both are preserved.”
  - type: heading
    content: A Girl Restored to Life and a Woman Healed
  '18':
  - type: note
    content: Mark 5:22–43; Luke 8:41–56
  - type: text
    content: 'While He spoke these things to them, behold, a ruler came and worshiped Him, saying, “My daughter has just died, but come and lay Your hand on her and she will live.” '
  '19':
  - type: text
    content: 'So Jesus arose and followed him, and so '
  - type: text
    content: did
  - type: text
    content: ' His '
  - type: note
    content: Matt. 10:2–4
  - type: text
    content: disciples.
  '2':
  - type: note
    content: Mark 2:3–12; Luke 5:18–26
  - type: text
    content: 'Then behold, they brought to Him a paralytic lying on a bed. '
  - type: note
    content: Matt. 8:10
  - type: text
    content: 'When Jesus saw their faith, He said to the paralytic, '
  - type: text
    content: “Son, be of good cheer; your sins are forgiven you.”
  '20':
  - type: note
    content: Mark 5:25; Luke 8:43
  - type: text
    content: 'And suddenly, a woman who had a flow of blood for twelve years came from behind and '
  - type: note
    content: Num. 15:38; Deut. 22:12; Matt. 14:36; 23:5; Mark 6:56
  - type: text
    content: 'touched the hem of His garment. '
  '21':
  - type: text
    content: 'For she said to herself, “If only I may touch His garment, I shall be made well.” '
  '22':
  - type: text
    content: 'But Jesus turned around, and when He saw her He said, '
  - type: text
    content: '“Be of good cheer, daughter; '
  - type: note
    content: Matt. 9:29; 15:28; Mark 5:34; 10:52; Luke 7:50; 8:48; 17:19; 18:42
  - type: text
    content: your faith has made you well.”
  - type: text
    content: ' And the woman was made well from that hour.'
  '23':
  - type: note
    content: Mark 5:38; Luke 8:51
  - type: text
    content: 'When Jesus came into the ruler’s house, and saw '
  - type: note
    content: 2 Chr. 35:25; Jer. 9:17; 16:6; Ezek. 24:17
  - type: text
    content: 'the flute players and the noisy crowd wailing, '
  '24':
  - type: text
    content: 'He said to them, '
  - type: note
    content: John 11:3; Acts 20:10
  - type: text
    content: “Make room, for the girl is not dead, but sleeping.”
  - type: text
    content: ' And they ridiculed Him. '
  '25':
  - type: text
    content: 'But when the crowd was put outside, He went in and '
  - type: note
    content: Matt. 8:3, 15; Mark 1:31
  - type: text
    content: 'took her by the hand, and the girl arose. '
  '26':
  - type: text
    content: 'And the '
  - type: note
    content: Matt. 4:24; Mark 1:28, 45; Luke 4:14, 37; 5:15; 7:17
  - type: text
    content: report of this went out into all that land.
  - type: heading
    content: Two Blind Men Healed
  '27':
  - type: text
    content: 'When Jesus departed from there, '
  - type: note
    content: Matt. 20:29–34
  - type: text
    content: 'two blind men followed Him, crying out and saying, '
  - type: note
    content: Matt. 15:22; Mark 10:47; Luke 18:38, 39
  - type: text
    content: “Son of David, have mercy on us!”
  '28':
  - type: text
    content: 'And when He had come into the house, the blind men came to Him. And Jesus said to them, '
  - type: text
    content: “Do you believe that I am able to do this?”
  - type: text
    content: They said to Him, “Yes, Lord.”
  '29':
  - type: text
    content: 'Then He touched their eyes, saying, '
  - type: text
    content: “According to your faith let it be to you.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: And at once some of the scribes said within themselves, “This Man blasphemes!”
  '30':
  - type: text
    content: 'And their eyes were opened. And Jesus sternly warned them, saying, '
  - type: note
    content: Matt. 8:4; Luke 5:14
  - type: text
    content: '“See '
  - type: text
    content: that
  - type: text
    content: ' no one knows '
  - type: text
    content: it
  - type: text
    content: .”
  - type: text
    content: ' '
  '31':
  - type: note
    content: Mark 7:36
  - type: text
    content: But when they had departed, they spread the news about Him in all that country.
  - type: heading
    content: A Mute Man Speaks
  '32':
  - type: note
    content: Matt. 12:22, 24; Luke 11:14
  - type: text
    content: 'As they went out, behold, they brought to Him a man, mute and demon-possessed. '
  '33':
  - type: text
    content: And when the demon was cast out, the mute spoke. And the multitudes marveled, saying, “It was never seen like this in Israel!”
  '34':
  - type: text
    content: 'But the Pharisees said, '
  - type: note
    content: Matt. 12:24; Mark 3:22; Luke 11:15; John 7:20
  - type: text
    content: “He casts out demons by the ruler of the demons.”
  - type: heading
    content: The Compassion of Jesus
  '35':
  - type: text
    content: 'Then Jesus went about all the cities and villages, '
  - type: note
    content: Matt. 4:23
  - type: text
    content: 'teaching in their synagogues, preaching the gospel of the kingdom, and healing every sickness and every disease among the people. '
  '36':
  - type: note
    content: Mark 6:34
  - type: text
    content: 'But when He saw the multitudes, He was moved with compassion for them, because they were weary and scattered, '
  - type: note
    content: Num. 27:17; 1 Kin. 22:17; Ezek. 34:5; Zech. 10:2; Mark 6:34
  - type: text
    content: 'like sheep having no shepherd. '
  '37':
  - type: text
    content: 'Then He said to His disciples, '
  - type: note
    content: Luke 10:2; John 4:35
  - type: text
    content: '“The harvest truly '
  - type: text
    content: is
  - type: text
    content: ' plentiful, but the laborers '
  - type: text
    content: are
  - type: text
    content: ' few.'
  - type: text
    content: ' '
  '38':
  - type: note
    content: (Matt. 28:19, 20; Eph. 4:11, 12); 2 Thess. 3:1
  - type: text
    content: Therefore pray the Lord of the harvest to send out laborers into His harvest.”
  '4':
  - type: text
    content: 'But Jesus, '
  - type: note
    content: Ps. 139:2; Matt. 12:25; Mark 12:15; Luke 5:22; 6:8; 9:47; 11:17
  - type: text
    content: 'knowing their thoughts, said, '
  - type: text
    content: “Why do you think evil in your hearts?
  - type: text
    content: ' '
  '5':
  - type: text
    content: For which is easier, to say, ‘
  - type: text
    content: Your
  - type: text
    content: ' sins are forgiven you,’ or to say, ‘Arise and walk’?'
  - type: text
    content: ' '
  '6':
  - type: text
    content: But that you may know that the Son of Man has power on earth to forgive sins”
  - type: text
    content: '—then He said to the paralytic, '
  - type: text
    content: “Arise, take up your bed, and go to your house.”
  - type: text
    content: ' '
  '7':
  - type: text
    content: And he arose and departed to his house.
  '8':
  - type: text
    content: 'Now when the multitudes saw '
  - type: text
    content: it,
  - type: text
    content: ' they '
  - type: note
    content: Matt. 8:27; John 7:15
  - type: text
    content: marveled and glorified God, who had given such power to men.
  - type: heading
    content: Matthew the Tax Collector
  '9':
  - type: note
    content: Mark 2:14; Luke 5:27
  - type: text
    content: 'As Jesus passed on from there, He saw a man named Matthew sitting at the tax office. And He said to him, '
  - type: text
    content: “Follow Me.”
  - type: text
    content: ' So he arose and followed Him.'
