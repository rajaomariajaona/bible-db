  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 2:15; Luke 5:29
      marker-yv: yv-n
    - type: text
      text: 'Now it happened, as Jesus sat at the table in the house, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' behold, many tax collectors and sinners came and sat down with Him and His disciples. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the Pharisees saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' they said to His disciples, “Why does your Teacher eat with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 11:19; Mark 2:16; Luke 5:30; 15:2
      marker-yv: yv-n
    - type: text
      text: 'tax collectors and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gal. 2:15)
      marker-yv: yv-n
    - type: text
      text: sinners?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that,
    - type: text
      text: ' He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Those who are well have no need of a physician, but those who are sick.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But go and learn what '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: this
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' means: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hos. 6:6; (Mic. 6:6–8); Matt. 12:7
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘I desire mercy and not sacrifice.’
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' For I did not come to call the righteous, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 2:17; Luke 5:32; 1 Tim. 1:15
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'but sinners, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to repentance.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Questioned About Fasting
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the disciples of John came to Him, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 2:18; Luke 5:33–35; 18:12
      marker-yv: yv-n
    - type: text
      text: “Why do we and the Pharisees fast often, but Your disciples do not fast?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Can '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 3:29
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'the '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'friends of the bridegroom mourn as long as the bridegroom is with them? But the days will come when the bridegroom will be taken away from them, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:2, 3; 14:23
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: then they will fast.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'No one puts a piece of unshrunk cloth on an old garment; for '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the patch pulls away from the garment, and the tear is made worse.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Nor do they put new wine into old wineskins, or else the wineskins '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: break, the wine is spilled, and the wineskins are ruined. But they put new wine into new wineskins, and both are preserved.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Girl Restored to Life and a Woman Healed
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 5:22–43; Luke 8:41–56
      marker-yv: yv-n
    - type: text
      text: 'While He spoke these things to them, behold, a ruler came and worshiped Him, saying, “My daughter has just died, but come and lay Your hand on her and she will live.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jesus arose and followed him, and so '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' His '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 10:2–4
      marker-yv: yv-n
    - type: text
      text: disciples.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 2:3–12; Luke 5:18–26
      marker-yv: yv-n
    - type: text
      text: 'Then behold, they brought to Him a paralytic lying on a bed. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 8:10
      marker-yv: yv-n
    - type: text
      text: 'When Jesus saw their faith, He said to the paralytic, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Son, be of good cheer; your sins are forgiven you.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 5:25; Luke 8:43
      marker-yv: yv-n
    - type: text
      text: 'And suddenly, a woman who had a flow of blood for twelve years came from behind and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 15:38; Deut. 22:12; Matt. 14:36; 23:5; Mark 6:56
      marker-yv: yv-n
    - type: text
      text: 'touched the hem of His garment. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For she said to herself, “If only I may touch His garment, I shall be made well.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus turned around, and when He saw her He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Be of good cheer, daughter; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:29; 15:28; Mark 5:34; 10:52; Luke 7:50; 8:48; 17:19; 18:42
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: your faith has made you well.”
    - type: text
      text: ' And the woman was made well from that hour.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 5:38; Luke 8:51
      marker-yv: yv-n
    - type: text
      text: 'When Jesus came into the ruler’s house, and saw '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 35:25; Jer. 9:17; 16:6; Ezek. 24:17
      marker-yv: yv-n
    - type: text
      text: 'the flute players and the noisy crowd wailing, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 11:3; Acts 20:10
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Make room, for the girl is not dead, but sleeping.”
    - type: text
      text: ' And they ridiculed Him. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the crowd was put outside, He went in and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 8:3, 15; Mark 1:31
      marker-yv: yv-n
    - type: text
      text: 'took her by the hand, and the girl arose. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 4:24; Mark 1:28, 45; Luke 4:14, 37; 5:15; 7:17
      marker-yv: yv-n
    - type: text
      text: report of this went out into all that land.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Two Blind Men Healed
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus departed from there, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 20:29–34
      marker-yv: yv-n
    - type: text
      text: 'two blind men followed Him, crying out and saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 15:22; Mark 10:47; Luke 18:38, 39
      marker-yv: yv-n
    - type: text
      text: “Son of David, have mercy on us!”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when He had come into the house, the blind men came to Him. And Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you believe that I am able to do this?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said to Him, “Yes, Lord.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He touched their eyes, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “According to your faith let it be to you.”
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And at once some of the scribes said within themselves, “This Man blasphemes!”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And their eyes were opened. And Jesus sternly warned them, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 8:4; Luke 5:14
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“See '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: that
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' no one knows '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: it
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .”
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 7:36
      marker-yv: yv-n
    - type: text
      text: But when they had departed, they spread the news about Him in all that country.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Mute Man Speaks
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 12:22, 24; Luke 11:14
      marker-yv: yv-n
    - type: text
      text: 'As they went out, behold, they brought to Him a man, mute and demon-possessed. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when the demon was cast out, the mute spoke. And the multitudes marveled, saying, “It was never seen like this in Israel!”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Pharisees said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 12:24; Mark 3:22; Luke 11:15; John 7:20
      marker-yv: yv-n
    - type: text
      text: “He casts out demons by the ruler of the demons.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Compassion of Jesus
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus went about all the cities and villages, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 4:23
      marker-yv: yv-n
    - type: text
      text: 'teaching in their synagogues, preaching the gospel of the kingdom, and healing every sickness and every disease among the people. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 6:34
      marker-yv: yv-n
    - type: text
      text: 'But when He saw the multitudes, He was moved with compassion for them, because they were weary and scattered, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 27:17; 1 Kin. 22:17; Ezek. 34:5; Zech. 10:2; Mark 6:34
      marker-yv: yv-n
    - type: text
      text: 'like sheep having no shepherd. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then He said to His disciples, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 10:2; John 4:35
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“The harvest truly '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: is
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' plentiful, but the laborers '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: are
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' few.'
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 28:19, 20; Eph. 4:11, 12); 2 Thess. 3:1
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore pray the Lord of the harvest to send out laborers into His harvest.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 139:2; Matt. 12:25; Mark 12:15; Luke 5:22; 6:8; 9:47; 11:17
      marker-yv: yv-n
    - type: text
      text: 'knowing their thoughts, said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you think evil in your hearts?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For which is easier, to say, ‘
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Your
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' sins are forgiven you,’ or to say, ‘Arise and walk’?'
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But that you may know that the Son of Man has power on earth to forgive sins”
    - type: text
      text: '—then He said to the paralytic, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Arise, take up your bed, and go to your house.”
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he arose and departed to his house.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when the multitudes saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 8:27; John 7:15
      marker-yv: yv-n
    - type: text
      text: marveled and glorified God, who had given such power to men.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Matthew the Tax Collector
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 2:14; Luke 5:27
      marker-yv: yv-n
    - type: text
      text: 'As Jesus passed on from there, He saw a man named Matthew sitting at the tax office. And He said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Follow Me.”
    - type: text
      text: ' So he arose and followed Him.'
