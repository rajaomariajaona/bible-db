document_id: LEV.7,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law of the Trespass Offering
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Likewise '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:14—6:7
      marker-yv: yv-n
    - type: text
      text: 'this is the law of the trespass offering (it is most holy): '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every grain offering, whether mixed with oil or dry, shall belong to all the sons of Aaron, to one as much as the other.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law of Peace Offerings
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:1; 22:18, 21; Ezek. 45:15
      marker-yv: yv-n
    - type: text
      text: '‘This is the law of the sacrifice of peace offerings which he shall offer to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he offers it for a thanksgiving, then he shall offer, with the sacrifice of thanksgiving, unleavened cakes mixed with oil, unleavened wafers '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:4; Num. 6:15
      marker-yv: yv-n
    - type: text
      text: 'anointed with oil, or cakes of blended flour mixed with oil. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Besides the cakes, as his offering he shall offer '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:12; 23:17, 18; Amos 4:5
      marker-yv: yv-n
    - type: text
      text: 'leavened bread with the sacrifice of thanksgiving of his peace offering. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And from it he shall offer one cake from each offering as a heave offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:8, 11, 19
      marker-yv: yv-n
    - type: text
      text: It shall belong to the priest who sprinkles the blood of the peace offering.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 22:29, 30
      marker-yv: yv-n
    - type: text
      text: '‘The flesh of the sacrifice of his peace offering for thanksgiving shall be eaten the same day it is offered. He shall not leave any of it until morning. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:5–8
      marker-yv: yv-n
    - type: text
      text: 'if the sacrifice of his offering is a vow or a voluntary offering, it shall be eaten the same day that he offers his sacrifice; but on the next day the remainder of it also may be eaten; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the remainder of the flesh of the sacrifice on the third day must be burned with fire. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if any of the flesh of the sacrifice of his peace offering is eaten at all on the third day, it shall not be accepted, nor shall it be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:27
      marker-yv: yv-n
    - type: text
      text: 'imputed to him; it shall be an '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:10, 11, 41; 19:7; (Prov. 15:8)
      marker-yv: yv-n
    - type: text
      text: abomination to him who offers it, and the person who eats of it shall bear guilt.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘The flesh that touches any unclean thing shall not be eaten. It shall be burned with fire. And as for the clean flesh, all who are clean may eat of it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the place where they kill the burnt offering they shall kill the trespass offering. And its blood he shall sprinkle all around on the altar. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the person who eats the flesh of the sacrifice of the peace offering that belongs to the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 2:17)
      marker-yv: yv-n
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:3; 15:3; 22:3–7; Num. 19:13; (1 Cor. 11:28)
      marker-yv: yv-n
    - type: text
      text: 'while he is unclean, that person '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:14; Ex. 31:14
      marker-yv: yv-n
    - type: text
      text: 'shall be cut off from his people. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moreover the person who touches any unclean thing, such as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:2, 3, 5
      marker-yv: yv-n
    - type: text
      text: 'human uncleanness, an '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 11:24, 28
      marker-yv: yv-n
    - type: text
      text: 'unclean animal, or any '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 4:14
      marker-yv: yv-n
    - type: text
      text: 'abominable unclean thing, and who eats the flesh of the sacrifice of the peace offering that belongs to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that person '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:20
      marker-yv: yv-n
    - type: text
      text: shall be cut off from his people.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fat and Blood May Not Be Eaten
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the children of Israel, saying: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:17; 17:10–15; Deut. 14:21; Ezek. 4:14; 44:31
      marker-yv: yv-n
    - type: text
      text: '‘You shall not eat any fat, of ox or sheep or goat. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the fat of an animal that dies naturally, and the fat of what is torn by wild beasts, may be used in any other way; but you shall by no means eat it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For whoever eats the fat of the animal of which men offer an offering made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the person who eats it shall be cut off from his people. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:4; Lev. 3:17; 17:10–16; 19:26; Deut. 12:23; 1 Sam. 14:33; Ezek. 33:25; Acts 15:20, 29
      marker-yv: yv-n
    - type: text
      text: 'Moreover you shall not eat any blood in any of your dwellings, whether of bird or beast. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whoever eats any blood, that person shall be cut off from his people.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Portion of Aaron and His Sons
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the children of Israel, saying: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:1; 22:21; Ezek. 45:15
      marker-yv: yv-n
    - type: text
      text: '‘He who offers the sacrifice of his peace offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall bring his offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from the sacrifice of his peace offering. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he shall offer from it all its fat. The fat tail and the fat that covers the entrails, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:3, 4, 9, 14
      marker-yv: yv-n
    - type: text
      text: 'His own hands shall bring the offerings made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. The fat with the breast he shall bring, that the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:24, 27; Lev. 8:27; 9:21; Num. 6:20
      marker-yv: yv-n
    - type: text
      text: 'breast may be waved as a wave offering before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 3:5, 11, 16
      marker-yv: yv-n
    - type: text
      text: 'And the priest shall burn the fat on the altar, but the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:11; Deut. 18:3
      marker-yv: yv-n
    - type: text
      text: 'breast shall be Aaron’s and his sons’. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:27; Lev. 7:34; 9:21; Num. 6:20
      marker-yv: yv-n
    - type: text
      text: 'Also the right thigh you shall give to the priest as a heave offering from the sacrifices of your peace offerings. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He among the sons of Aaron, who offers the blood of the peace offering and the fat, shall have the right thigh for his part. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:28; Lev. 10:14, 15; Num. 18:18, 19; Deut. 18:3
      marker-yv: yv-n
    - type: text
      text: the breast of the wave offering and the thigh of the heave offering I have taken from the children of Israel, from the sacrifices of their peace offerings, and I have given them to Aaron the priest and to his sons from the children of Israel by a statute forever.’ ”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the consecrated portion for Aaron and his sons, from the offerings made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', on the day when Moses presented them to minister to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' as priests. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded this to be given to them by the children of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:13–15; Lev. 8:12, 30
      marker-yv: yv-n
    - type: text
      text: on the day that He anointed them, by a statute forever throughout their generations.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the law '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:9
      marker-yv: yv-n
    - type: text
      text: 'of the burnt offering, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:14
      marker-yv: yv-n
    - type: text
      text: 'the grain offering, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:25
      marker-yv: yv-n
    - type: text
      text: 'the sin offering, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:1
      marker-yv: yv-n
    - type: text
      text: 'the trespass offering, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:1; Lev. 6:20
      marker-yv: yv-n
    - type: text
      text: 'the consecrations, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:11
      marker-yv: yv-n
    - type: text
      text: 'the sacrifice of the peace offering, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses on Mount Sinai, on the day when He commanded the children of Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 1:1, 2; Deut. 4:5
      marker-yv: yv-n
    - type: text
      text: 'to offer their offerings to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the Wilderness of Sinai.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the two kidneys and the fat that is on them by the flanks, and the fatty lobe attached to the liver above the kidneys, he shall remove; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the priest shall burn them on the altar as an offering made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. It is a trespass offering. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:16–18, 29; Num. 18:9
      marker-yv: yv-n
    - type: text
      text: 'Every male among the priests may eat it. It shall be eaten in a holy place. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:3
      marker-yv: yv-n
    - type: text
      text: 'It is most holy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:24–30; 14:13
      marker-yv: yv-n
    - type: text
      text: 'The trespass offering is like the sin offering; there is one law for them both: the priest who makes atonement with it shall have it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the priest who offers anyone’s burnt offering, that priest shall have for himself the skin of the burnt offering which he has offered. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:3, 10; Num. 18:9; Ezek. 44:29
      marker-yv: yv-n
    - type: text
      text: 'every grain offering that is baked in the oven and all that is prepared in the covered pan, or in a pan, shall be the priest’s who offers it. '
