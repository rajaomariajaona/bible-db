document_id: LEV.7,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Law of the Trespass Offering
  - type: text
    content: '‘Likewise '
  - type: note
    content: Lev. 5:14—6:7
  - type: text
    content: 'this is the law of the trespass offering (it is most holy): '
  '10':
  - type: text
    content: Every grain offering, whether mixed with oil or dry, shall belong to all the sons of Aaron, to one as much as the other.
  - type: heading
    content: The Law of Peace Offerings
  '11':
  - type: note
    content: Lev. 3:1; 22:18, 21; Ezek. 45:15
  - type: text
    content: '‘This is the law of the sacrifice of peace offerings which he shall offer to the '
  - type: heading
    content: Lord
  - type: text
    content: ': '
  '12':
  - type: text
    content: 'If he offers it for a thanksgiving, then he shall offer, with the sacrifice of thanksgiving, unleavened cakes mixed with oil, unleavened wafers '
  - type: note
    content: Lev. 2:4; Num. 6:15
  - type: text
    content: 'anointed with oil, or cakes of blended flour mixed with oil. '
  '13':
  - type: text
    content: 'Besides the cakes, as his offering he shall offer '
  - type: note
    content: Lev. 2:12; 23:17, 18; Amos 4:5
  - type: text
    content: 'leavened bread with the sacrifice of thanksgiving of his peace offering. '
  '14':
  - type: text
    content: 'And from it he shall offer one cake from each offering as a heave offering to the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  - type: note
    content: Num. 18:8, 11, 19
  - type: text
    content: It shall belong to the priest who sprinkles the blood of the peace offering.
  '15':
  - type: note
    content: Lev. 22:29, 30
  - type: text
    content: '‘The flesh of the sacrifice of his peace offering for thanksgiving shall be eaten the same day it is offered. He shall not leave any of it until morning. '
  '16':
  - type: text
    content: 'But '
  - type: note
    content: Lev. 19:5–8
  - type: text
    content: 'if the sacrifice of his offering is a vow or a voluntary offering, it shall be eaten the same day that he offers his sacrifice; but on the next day the remainder of it also may be eaten; '
  '17':
  - type: text
    content: 'the remainder of the flesh of the sacrifice on the third day must be burned with fire. '
  '18':
  - type: text
    content: 'And if any of the flesh of the sacrifice of his peace offering is eaten at all on the third day, it shall not be accepted, nor shall it be '
  - type: note
    content: Num. 18:27
  - type: text
    content: 'imputed to him; it shall be an '
  - type: note
    content: Lev. 11:10, 11, 41; 19:7; (Prov. 15:8)
  - type: text
    content: abomination to him who offers it, and the person who eats of it shall bear guilt.
  '19':
  - type: text
    content: '‘The flesh that touches any unclean thing shall not be eaten. It shall be burned with fire. And as for the clean flesh, all who are clean may eat of it. '
  '2':
  - type: text
    content: 'In the place where they kill the burnt offering they shall kill the trespass offering. And its blood he shall sprinkle all around on the altar. '
  '20':
  - type: text
    content: 'But the person who eats the flesh of the sacrifice of the peace offering that belongs to the '
  - type: note
    content: (Heb. 2:17)
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: note
    content: Lev. 5:3; 15:3; 22:3–7; Num. 19:13; (1 Cor. 11:28)
  - type: text
    content: 'while he is unclean, that person '
  - type: note
    content: Gen. 17:14; Ex. 31:14
  - type: text
    content: 'shall be cut off from his people. '
  '21':
  - type: text
    content: 'Moreover the person who touches any unclean thing, such as '
  - type: note
    content: Lev. 5:2, 3, 5
  - type: text
    content: 'human uncleanness, an '
  - type: note
    content: Lev. 11:24, 28
  - type: text
    content: 'unclean animal, or any '
  - type: note
    content: Ezek. 4:14
  - type: text
    content: 'abominable unclean thing, and who eats the flesh of the sacrifice of the peace offering that belongs to the '
  - type: heading
    content: Lord
  - type: text
    content: ', that person '
  - type: note
    content: Lev. 7:20
  - type: text
    content: shall be cut off from his people.’ ”
  - type: heading
    content: Fat and Blood May Not Be Eaten
  '22':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '23':
  - type: text
    content: '“Speak to the children of Israel, saying: '
  - type: note
    content: Lev. 3:17; 17:10–15; Deut. 14:21; Ezek. 4:14; 44:31
  - type: text
    content: '‘You shall not eat any fat, of ox or sheep or goat. '
  '24':
  - type: text
    content: 'And the fat of an animal that dies naturally, and the fat of what is torn by wild beasts, may be used in any other way; but you shall by no means eat it. '
  '25':
  - type: text
    content: 'For whoever eats the fat of the animal of which men offer an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: ', the person who eats it shall be cut off from his people. '
  '26':
  - type: note
    content: Gen. 9:4; Lev. 3:17; 17:10–16; 19:26; Deut. 12:23; 1 Sam. 14:33; Ezek. 33:25; Acts 15:20, 29
  - type: text
    content: 'Moreover you shall not eat any blood in any of your dwellings, whether of bird or beast. '
  '27':
  - type: text
    content: Whoever eats any blood, that person shall be cut off from his people.’ ”
  - type: heading
    content: The Portion of Aaron and His Sons
  '28':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '29':
  - type: text
    content: '“Speak to the children of Israel, saying: '
  - type: note
    content: Lev. 3:1; 22:21; Ezek. 45:15
  - type: text
    content: '‘He who offers the sacrifice of his peace offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ' shall bring his offering to the '
  - type: heading
    content: Lord
  - type: text
    content: ' from the sacrifice of his peace offering. '
  '3':
  - type: text
    content: 'And he shall offer from it all its fat. The fat tail and the fat that covers the entrails, '
  '30':
  - type: note
    content: Lev. 3:3, 4, 9, 14
  - type: text
    content: 'His own hands shall bring the offerings made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. The fat with the breast he shall bring, that the '
  - type: note
    content: Ex. 29:24, 27; Lev. 8:27; 9:21; Num. 6:20
  - type: text
    content: 'breast may be waved as a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '31':
  - type: note
    content: Lev. 3:5, 11, 16
  - type: text
    content: 'And the priest shall burn the fat on the altar, but the '
  - type: note
    content: Num. 18:11; Deut. 18:3
  - type: text
    content: 'breast shall be Aaron’s and his sons’. '
  '32':
  - type: note
    content: Ex. 29:27; Lev. 7:34; 9:21; Num. 6:20
  - type: text
    content: 'Also the right thigh you shall give to the priest as a heave offering from the sacrifices of your peace offerings. '
  '33':
  - type: text
    content: 'He among the sons of Aaron, who offers the blood of the peace offering and the fat, shall have the right thigh for his part. '
  '34':
  - type: text
    content: 'For '
  - type: note
    content: Ex. 29:28; Lev. 10:14, 15; Num. 18:18, 19; Deut. 18:3
  - type: text
    content: the breast of the wave offering and the thigh of the heave offering I have taken from the children of Israel, from the sacrifices of their peace offerings, and I have given them to Aaron the priest and to his sons from the children of Israel by a statute forever.’ ”
  '35':
  - type: text
    content: 'This is the consecrated portion for Aaron and his sons, from the offerings made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: ', on the day when Moses presented them to minister to the '
  - type: heading
    content: Lord
  - type: text
    content: ' as priests. '
  '36':
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded this to be given to them by the children of Israel, '
  - type: note
    content: Ex. 40:13–15; Lev. 8:12, 30
  - type: text
    content: on the day that He anointed them, by a statute forever throughout their generations.
  '37':
  - type: text
    content: 'This is the law '
  - type: note
    content: Lev. 6:9
  - type: text
    content: 'of the burnt offering, '
  - type: note
    content: Lev. 6:14
  - type: text
    content: 'the grain offering, '
  - type: note
    content: Lev. 6:25
  - type: text
    content: 'the sin offering, '
  - type: note
    content: Lev. 7:1
  - type: text
    content: 'the trespass offering, '
  - type: note
    content: Ex. 29:1; Lev. 6:20
  - type: text
    content: 'the consecrations, and '
  - type: note
    content: Lev. 7:11
  - type: text
    content: 'the sacrifice of the peace offering, '
  '38':
  - type: text
    content: 'which the '
  - type: heading
    content: Lord
  - type: text
    content: ' commanded Moses on Mount Sinai, on the day when He commanded the children of Israel '
  - type: note
    content: Lev. 1:1, 2; Deut. 4:5
  - type: text
    content: 'to offer their offerings to the '
  - type: heading
    content: Lord
  - type: text
    content: ' in the Wilderness of Sinai.'
  '4':
  - type: text
    content: 'the two kidneys and the fat that is on them by the flanks, and the fatty lobe attached to the liver above the kidneys, he shall remove; '
  '5':
  - type: text
    content: 'and the priest shall burn them on the altar as an offering made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '. It is a trespass offering. '
  '6':
  - type: note
    content: Lev. 6:16–18, 29; Num. 18:9
  - type: text
    content: 'Every male among the priests may eat it. It shall be eaten in a holy place. '
  - type: note
    content: Lev. 2:3
  - type: text
    content: 'It is most holy. '
  '7':
  - type: note
    content: Lev. 6:24–30; 14:13
  - type: text
    content: 'The trespass offering is like the sin offering; there is one law for them both: the priest who makes atonement with it shall have it. '
  '8':
  - type: text
    content: 'And the priest who offers anyone’s burnt offering, that priest shall have for himself the skin of the burnt offering which he has offered. '
  '9':
  - type: text
    content: 'Also '
  - type: note
    content: Lev. 2:3, 10; Num. 18:9; Ezek. 44:29
  - type: text
    content: 'every grain offering that is baked in the oven and all that is prepared in the covered pan, or in a pan, shall be the priest’s who offers it. '
