    content: They seem like men who lift up
  - type: text
    content: Axes among the thick trees.
  '6':
  - type: text
    content: And now they break down its carved work, all at once,
  - type: text
    content: With axes and hammers.
  '7':
  - type: text
    content: They have set fire to Your sanctuary;
  - type: text
    content: They have defiled the dwelling place of Your name to the ground.
  '8':
  - type: note
    content: Ps. 83:4
  - type: text
    content: They said in their hearts,
  - type: text
    content: “Let us destroy them altogether.”
  - type: text
    content: They have burned up all the meeting places of God in the land.
