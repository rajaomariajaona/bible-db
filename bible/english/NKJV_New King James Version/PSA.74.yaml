  '20':
  - type: note
    content: Gen. 17:7, 8; Lev. 26:44, 45
  - type: text
    content: Have respect to the covenant;
  - type: text
    content: For the dark places of the earth are full of the haunts of cruelty.
  '21':
  - type: text
    content: Oh, do not let the oppressed return ashamed!
  - type: text
    content: Let the poor and needy praise Your name.
  '22':
  - type: text
    content: Arise, O God, plead Your own cause;
  - type: text
    content: Remember how the foolish man reproaches You daily.
  '23':
  - type: text
    content: Do not forget the voice of Your enemies;
  - type: text
    content: The tumult of those who rise up against You increases continually.
  '3':
  - type: text
    content: Lift up Your feet to the perpetual desolations.
  - type: text
    content: The enemy has damaged everything in the sanctuary.
  '4':
  - type: note
    content: Lam. 2:7
  - type: text
    content: Your enemies roar in the midst of Your meeting place;
  - type: note
    content: Num. 2:2
  - type: text
    content: 'They set up their banners '
  - type: text
    content: for
  - type: text
    content: ' signs.'
  '5':
