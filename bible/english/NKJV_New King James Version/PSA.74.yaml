document_id: PSA.74
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Plea for Relief from Oppressors
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A Contemplation of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'O God, why have You cast '
  - type: usfm
    marker: it
    children:
    - type: text
      text: us
  - type: text
    text: ' off forever?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Why
  - type: text
    text: ' does Your anger smoke against the sheep of Your pasture?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Remember Your congregation, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' You have purchased of old,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The tribe of Your inheritance, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: which
  - type: text
    text: ' You have redeemed—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: This Mount Zion where You have dwelt.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lift up Your feet to the perpetual desolations.
- type: usfm
  marker: q2
  children:
  - type: text
    text: The enemy has damaged everything in the sanctuary.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lam. 2:7
    marker-yv: yv-n
  - type: text
    text: Your enemies roar in the midst of Your meeting place;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 2:2
    marker-yv: yv-n
  - type: text
    text: 'They set up their banners '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for
  - type: text
    text: ' signs.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They seem like men who lift up
- type: usfm
  marker: q2
  children:
  - type: text
    text: Axes among the thick trees.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And now they break down its carved work, all at once,
- type: usfm
  marker: q2
  children:
  - type: text
    text: With axes and hammers.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They have set fire to Your sanctuary;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have defiled the dwelling place of Your name to the ground.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 83:4
    marker-yv: yv-n
  - type: text
    text: They said in their hearts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Let us destroy them altogether.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: They have burned up all the meeting places of God in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We do not see our signs;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 3:1; Lam. 2:9; Ezek. 7:26; Amos 8:11
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' no longer any prophet;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Nor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' any among us who knows how long.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: O God, how long will the adversary reproach?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will the enemy blaspheme Your name forever?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lam. 2:3
    marker-yv: yv-n
  - type: text
    text: Why do You withdraw Your hand, even Your right hand?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Take
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' out of Your bosom and destroy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 44:4
    marker-yv: yv-n
  - type: text
    text: 'God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' my King from of old,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Working salvation in the midst of the earth.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 14:21
    marker-yv: yv-n
  - type: text
    text: You divided the sea by Your strength;
- type: usfm
  marker: q2
  children:
  - type: text
    text: You broke the heads of the sea serpents in the waters.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You broke the heads of Leviathan in pieces,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: And
  - type: text
    text: ' gave him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' food to the people inhabiting the wilderness.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 17:5, 6; Num. 20:11; Ps. 105:41; Is. 48:21
    marker-yv: yv-n
  - type: text
    text: You broke open the fountain and the flood;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 14:21, 22; Josh. 2:10; 3:13
    marker-yv: yv-n
  - type: text
    text: You dried up mighty rivers.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The day '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' Yours, the night also '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 38:12
    marker-yv: yv-n
  - type: text
    text: Yours;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 1:14–18
    marker-yv: yv-n
  - type: text
    text: You have prepared the light and the sun.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'You have '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:8; Acts 17:26
    marker-yv: yv-n
  - type: text
    text: set all the borders of the earth;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 8:22
    marker-yv: yv-n
  - type: text
    text: You have made summer and winter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Remember this, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' the enemy has reproached, O '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' a foolish people has blasphemed Your name.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oh, do not deliver the life of Your turtledove to the wild beast!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not forget the life of Your poor forever.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 17:7, 8; Lev. 26:44, 45
    marker-yv: yv-n
  - type: text
    text: Have respect to the covenant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: For the dark places of the earth are full of the haunts of cruelty.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Oh, do not let the oppressed return ashamed!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the poor and needy praise Your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Arise, O God, plead Your own cause;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Remember how the foolish man reproaches You daily.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Do not forget the voice of Your enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The tumult of those who rise up against You increases continually.
