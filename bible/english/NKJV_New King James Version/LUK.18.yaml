document_id: LUK.18,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Persistent Widow
  - type: text
    content: 'Then He spoke a parable to them, that men '
  - type: note
    content: Luke 11:5–10; Rom. 12:12; (Eph. 6:18); Col. 4:2; 1 Thess. 5:17
  - type: text
    content: 'always ought to pray and not lose heart, '
  '10':
  - type: text
    content: “Two men went up to the temple to pray, one a Pharisee and the other a tax collector.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'The Pharisee '
  - type: note
    content: Ps. 135:2
  - type: text
    content: 'stood and prayed thus with himself, '
  - type: note
    content: Is. 1:15; 58:2; Rev. 3:17
  - type: text
    content: ‘God, I thank You that I am not like other men—extortioners, unjust, adulterers, or even as this tax collector.
  - type: text
    content: ' '
  '12':
  - type: text
    content: I fast twice a week; I give tithes of all that I possess.’
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And the tax collector, standing afar off, would not so much as raise '
  - type: text
    content: his
  - type: text
    content: ' eyes to heaven, but beat his breast, saying, ‘God, be merciful to me a sinner!’'
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'I tell you, this man went down to his house justified '
  - type: text
    content: rather
  - type: text
    content: ' than the other; '
  - type: note
    content: Job 22:29; Matt. 23:12; Luke 14:11; (James 4:6; 1 Pet. 5:5)
  - type: text
    content: 'for everyone who exalts himself will be '
  - type: text
    content: humbled, and he who humbles himself will be exalted.”
  - type: heading
    content: Jesus Blesses Little Children
  '15':
  - type: note
    content: Matt. 19:13–15; Mark 10:13–16
  - type: text
    content: 'Then they also brought infants to Him that He might touch them; but when the disciples saw '
  - type: text
    content: it,
  - type: text
    content: ' they rebuked them. '
  '16':
  - type: text
    content: 'But Jesus called them to '
  - type: text
    content: Him
  - type: text
    content: ' and said, '
  - type: text
    content: '“Let the little children come to Me, and do not forbid them; for '
  - type: note
    content: Matt. 18:3; 1 Cor. 14:20; 1 Pet. 2:2
  - type: text
    content: of such is the kingdom of God.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Matt. 18:3; 19:14; Mark 10:15
  - type: text
    content: Assuredly, I say to you, whoever does not receive the kingdom of God as a little child will by no means enter it.”
  - type: heading
    content: Jesus Counsels the Rich Young Ruler
  '18':
  - type: note
    content: Matt. 19:16–29; Mark 10:17–30
  - type: text
    content: Now a certain ruler asked Him, saying, “Good Teacher, what shall I do to inherit eternal life?”
  '19':
  - type: text
    content: 'So Jesus said to him, '
  - type: text
    content: '“Why do you call Me good? No one '
  - type: text
    content: is
  - type: text
    content: ' good but '
  - type: note
    content: Ps. 86:5; 119:68
  - type: text
    content: 'One, '
  - type: text
    content: that is,
  - type: text
    content: ' God.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'saying: '
  - type: text
    content: '“There was in a certain city a judge who did not fear God nor '
  - type: text
    content: regard man.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'You know the commandments: '
  - type: note
    content: Ex. 20:12–16; Deut. 5:16–20; Mark 10:19; Rom. 13:9
  - type: text
    content: '‘Do not commit adultery,’ ‘Do not murder,’ ‘Do not steal,’ ‘Do not bear false witness,’ '
  - type: note
    content: Eph. 6:2; Col. 3:20
  - type: text
    content: ‘Honor your father and your mother.’
  - type: text
    content: ' '
  - type: text
    content: ”
  '21':
  - type: text
    content: 'And he said, “All '
  - type: note
    content: Phil. 3:6
  - type: text
    content: these things I have kept from my youth.”
  '22':
  - type: text
    content: 'So when Jesus heard these things, He said to him, '
  - type: text
    content: '“You still lack one thing. '
  - type: note
    content: Matt. 6:19, 20; 19:21; (1 Tim. 6:19)
  - type: text
    content: Sell all that you have and distribute to the poor, and you will have treasure in heaven; and come, follow Me.”
  '23':
  - type: text
    content: But when he heard this, he became very sorrowful, for he was very rich.
  - type: heading
    content: With God All Things Are Possible
  '24':
  - type: text
    content: 'And when Jesus saw that he became very sorrowful, He said, '
  - type: note
    content: Prov. 11:28; Matt. 19:23; Mark 10:23
  - type: text
    content: “How hard it is for those who have riches to enter the kingdom of God!
  - type: text
    content: ' '
  '25':
  - type: text
    content: For it is easier for a camel to go through the eye of a needle than for a rich man to enter the kingdom of God.”
  '26':
  - type: text
    content: And those who heard it said, “Who then can be saved?”
  '27':
  - type: text
    content: 'But He said, '
  - type: note
    content: Job 42:2; Jer. 32:17; Zech. 8:6; Matt. 19:26; Luke 1:37
  - type: text
    content: “The things which are impossible with men are possible with God.”
  '28':
  - type: note
    content: Matt. 19:27
  - type: text
    content: Then Peter said, “See, we have left all and followed You.”
  '29':
  - type: text
    content: 'So He said to them, '
  - type: text
    content: '“Assuredly, I say to you, '
  - type: note
    content: Deut. 33:9
  - type: text
    content: there is no one who has left house or parents or brothers or wife or children, for the sake of the kingdom of God,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Now there was a widow in that city; and she came to him, saying, '
  - type: text
    content: ‘Get justice for me from my adversary.’
  - type: text
    content: ' '
  '30':
  - type: note
    content: Job 42:10
  - type: text
    content: who shall not receive many times more in this present time, and in the age to come eternal life.”
  - type: heading
    content: Jesus a Third Time Predicts His Death and Resurrection
  '31':
  - type: note
    content: Matt. 16:21; 17:22; 20:17; Mark 10:32; Luke 9:51
  - type: text
    content: 'Then He took the twelve aside and said to them, '
  - type: text
    content: '“Behold, we are going up to Jerusalem, and all things '
  - type: note
    content: Ps. 22; (Is. 53)
  - type: text
    content: 'that are written by the prophets concerning the Son of Man will be '
  - type: text
    content: accomplished.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 26:67; 27:2, 29, 41; Mark 14:65; 15:1, 19, 20, 31; Luke 23:1; John 18:28; Acts 3:13
  - type: text
    content: He will be delivered to the Gentiles and will be mocked and insulted and spit upon.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'They will scourge '
  - type: text
    content: Him
  - type: text
    content: ' and kill Him. And the third day He will rise again.”'
  '34':
  - type: note
    content: Mark 9:32; Luke 2:50; 9:45; (John 10:6; 12:16)
  - type: text
    content: But they understood none of these things; this saying was hidden from them, and they did not know the things which were spoken.
  - type: heading
    content: A Blind Man Receives His Sight
  '35':
  - type: note
    content: Matt. 20:29–34; Mark 10:46–52
  - type: text
    content: 'Then it happened, as He was coming near Jericho, that a certain blind man sat by the road begging. '
  '36':
  - type: text
    content: 'And hearing a multitude passing by, he asked what it meant. '
  '37':
  - type: text
    content: 'So they told him that Jesus of Nazareth was passing by. '
  '38':
  - type: text
    content: 'And he cried out, saying, “Jesus, '
  - type: note
    content: Matt. 9:27
  - type: text
    content: Son of David, have mercy on me!”
  '39':
  - type: text
    content: Then those who went before warned him that he should be quiet; but he cried out all the more, “Son of David, have mercy on me!”
  '4':
  - type: text
    content: And he would not for a while; but afterward he said within himself, ‘Though I do not fear God nor regard man,
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'So Jesus stood still and commanded him to be brought to Him. And when he had come near, He asked him, '
  '41':
  - type: text
    content: 'saying, '
  - type: text
    content: “What do you want Me to do for you?”
  - type: text
    content: He said, “Lord, that I may receive my sight.”
  '42':
  - type: text
    content: 'Then Jesus said to him, '
  - type: text
    content: '“Receive your sight; '
  - type: note
    content: Luke 17:19
  - type: text
    content: your faith has made you well.”
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'And immediately he received his sight, and followed Him, '
  - type: note
    content: Luke 5:26; Acts 4:21; 11:18
  - type: text
    content: 'glorifying God. And all the people, when they saw '
  - type: text
    content: it,
  - type: text
    content: ' gave praise to God.'
  '5':
  - type: note
    content: Luke 11:8
  - type: text
    content: 'yet because this widow troubles me I will '
  - type: text
    content: avenge her, lest by her continual coming she weary me.’ ”
  '6':
  - type: text
    content: 'Then the Lord said, '
  - type: text
    content: “Hear what the unjust judge said.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And '
  - type: note
    content: Rev. 6:10
  - type: text
    content: shall God not avenge His own elect who cry out day and night to Him, though He bears long with them?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'I tell you '
  - type: note
    content: Heb. 10:37; (2 Pet. 3:8, 9)
  - type: text
    content: that He will avenge them speedily. Nevertheless, when the Son of Man comes, will He really find faith on the earth?”
  - type: heading
    content: The Parable of the Pharisee and the Tax Collector
  '9':
  - type: text
    content: 'Also He spoke this parable to some '
  - type: note
    content: Prov. 30:12; Luke 10:29; 16:15
  - type: text
    content: 'who trusted in themselves that they were righteous, and despised others: '
