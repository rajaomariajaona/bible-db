document_id: MAT.11,114
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Sends Messengers to Jesus
  - type: text
    content: 'Now it came to pass, when Jesus finished commanding His twelve disciples, that He departed from there to '
  - type: note
    content: Matt. 9:35; Luke 23:5
  - type: text
    content: teach and to preach in their cities.
  '10':
  - type: text
    content: 'For this is '
  - type: text
    content: he
  - type: text
    content: ' of whom it is written:'
  - type: note
    content: Mal. 3:1; Mark 1:2; Luke 1:76
  - type: text
    content: ‘Behold, I send My messenger before Your face,
  - type: text
    content: Who will prepare Your way before You.’
  '11':
  - type: text
    content: “Assuredly, I say to you, among those born of women there has not risen one greater than John the Baptist; but he who is least in the kingdom of heaven is greater than he.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Luke 16:16
  - type: text
    content: And from the days of John the Baptist until now the kingdom of heaven suffers violence, and the violent take it by force.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Mal. 4:4–6
  - type: text
    content: For all the prophets and the law prophesied until John.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And if you are willing to receive '
  - type: text
    content: it,
  - type: text
    content: ' he is '
  - type: note
    content: Mal. 4:5; Matt. 17:10–13; Mark 9:11–13; Luke 1:17; John 1:21
  - type: text
    content: Elijah who is to come.
  - type: text
    content: ' '
  '15':
  - type: note
    content: Matt. 13:9; Luke 8:8; Rev. 2:7, 11, 17, 29; 3:6, 13
  - type: text
    content: He who has ears to hear, let him hear!
  '16':
  - type: note
    content: Luke 7:31
  - type: text
    content: '“But to what shall I liken this generation? It is like children sitting in the marketplaces and calling to their companions, '
  '17':
  - type: text
    content: 'and saying:'
  - type: text
    content: ‘We played the flute for you,
  - type: text
    content: And you did not dance;
  - type: text
    content: We mourned to you,
  - type: text
    content: 'And you did not '
  - type: text
    content: lament.’
  '18':
  - type: text
    content: For John came neither eating nor drinking, and they say, ‘He has a demon.’
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'The Son of Man came eating and drinking, and they say, ‘Look, a glutton and a '
  - type: text
    content: 'winebibber, '
  - type: note
    content: Matt. 9:10
  - type: text
    content: 'a friend of tax collectors and sinners!’ '
  - type: note
    content: Luke 7:35; John 2:1–11
  - type: text
    content: 'But wisdom is justified by her '
  - type: text
    content: children.”
  - type: heading
    content: Woe to the Impenitent Cities
  '2':
  - type: note
    content: Luke 7:18–35
  - type: text
    content: 'And when John had heard '
  - type: note
    content: Matt. 4:12; 14:3; Mark 6:17; Luke 9:7
  - type: text
    content: 'in prison about the works of Christ, he sent two of his disciples '
  '20':
  - type: note
    content: Luke 10:13–15, 18
  - type: text
    content: 'Then He began to rebuke the cities in which most of His mighty works had been done, because they did not repent: '
  '21':
  - type: text
    content: '“Woe to you, Chorazin! Woe to you, Bethsaida! For if the mighty works which were done in you had been done in Tyre and Sidon, they would have repented long ago '
  - type: note
    content: Jon. 3:6–8
  - type: text
    content: in sackcloth and ashes.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'But I say to you, '
  - type: note
    content: Matt. 10:15; 11:24
  - type: text
    content: it will be more tolerable for Tyre and Sidon in the day of judgment than for you.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And you, Capernaum, '
  - type: note
    content: Is. 14:13; Lam. 2:1; Ezek. 26:20; 31:14; 32:18, 24
  - type: text
    content: who
  - type: text
    content: ' are exalted to heaven, will be'
  - type: text
    content: ' brought down to Hades; for if the mighty works which were done in you had been done in Sodom, it would have remained until this day.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'But I say to you '
  - type: note
    content: Matt. 10:15
  - type: text
    content: that it shall be more tolerable for the land of Sodom in the day of judgment than for you.”
  - type: heading
    content: Jesus Gives True Rest
  '25':
  - type: note
    content: Luke 10:21, 22
  - type: text
    content: 'At that time Jesus answered and said, '
  - type: text
    content: '“I thank You, Father, Lord of heaven and earth, that '
  - type: note
    content: Ps. 8:2; 1 Cor. 1:19; (2 Cor. 3:14)
  - type: text
    content: 'You have hidden these things from '
  - type: text
    content: the
  - type: text
    content: ' wise and prudent '
  - type: note
    content: Matt. 16:17
  - type: text
    content: and have revealed them to babes.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Even so, Father, for so it seemed good in Your sight.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Matt. 28:18; Luke 10:22; John 3:35; 13:3; 1 Cor. 15:27
  - type: text
    content: 'All things have been delivered to Me by My Father, and no one knows the Son except the Father. '
  - type: note
    content: John 1:18; 6:46; 10:15
  - type: text
    content: 'Nor does anyone know the Father except the Son, and '
  - type: text
    content: the one
  - type: text
    content: ' to whom the Son wills to reveal '
  - type: text
    content: Him.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Come to '
  - type: note
    content: (John 6:35–37)
  - type: text
    content: 'Me, all '
  - type: text
    content: you
  - type: text
    content: ' who labor and are heavy laden, and I will give you rest.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Take My yoke upon you '
  - type: note
    content: (John 13:15); Eph. 4:2; (Phil. 2:5; 1 Pet. 2:21; 1 John 2:6)
  - type: text
    content: 'and learn from Me, for I am '
  - type: text
    content: 'gentle and '
  - type: note
    content: Zech. 9:9; (Phil. 2:7, 8)
  - type: text
    content: 'lowly in heart, '
  - type: note
    content: Jer. 6:16
  - type: text
    content: and you will find rest for your souls.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'and said to Him, “Are You '
  - type: note
    content: Gen. 49:10; Num. 24:17; Deut. 18:15, 18; Dan. 9:24; John 6:14
  - type: text
    content: the Coming One, or do we look for another?”
  '30':
  - type: note
    content: (1 John 5:3)
  - type: text
    content: 'For My yoke '
  - type: text
    content: is
  - type: text
    content: ' easy and My burden is light.”'
  '4':
  - type: text
    content: 'Jesus answered and said to them, '
  - type: text
    content: '“Go and tell John the things which you hear and see:'
  - type: text
    content: ' '
  '5':
  - type: note
    content: Is. 29:18; 35:4–6; John 2:23
  - type: text
    content: The
  - type: text
    content: ' blind see and '
  - type: text
    content: the
  - type: text
    content: ' lame walk; '
  - type: text
    content: the
  - type: text
    content: ' lepers are cleansed and '
  - type: text
    content: the
  - type: text
    content: ' deaf hear; '
  - type: text
    content: the
  - type: text
    content: ' dead are raised up and '
  - type: note
    content: Ps. 22:26; Is. 61:1; Luke 4:18; James 2:5
  - type: text
    content: the
  - type: text
    content: ' poor have the gospel preached to them.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And blessed is he who is not '
  - type: note
    content: Is. 8:14, 15; (Rom. 9:32); 1 Pet. 2:8
  - type: text
    content: offended because of Me.”
  '7':
  - type: note
    content: Luke 7:24
  - type: text
    content: 'As they departed, Jesus began to say to the multitudes concerning John: '
  - type: text
    content: '“What did you go out into the wilderness to see? '
  - type: note
    content: (Eph. 4:14)
  - type: text
    content: A reed shaken by the wind?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But what did you go out to see? A man clothed in soft garments? Indeed, those who wear soft '
  - type: text
    content: clothing
  - type: text
    content: ' are in kings’ houses.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'But what did you go out to see? A prophet? Yes, I say to you, '
  - type: note
    content: Matt. 14:5; 21:26; Luke 1:76; 20:6
  - type: text
    content: and more than a prophet.
  - type: text
    content: ' '
