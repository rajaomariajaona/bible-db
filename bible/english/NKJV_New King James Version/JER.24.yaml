document_id: JER.24,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sign of Two Baskets of Figs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amos 7:1, 4; 8:1
      marker-yv: yv-n
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' showed me, and there were two baskets of figs set before the temple of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', after Nebuchadnezzar '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:12–16; 2 Chr. 36:10
      marker-yv: yv-n
    - type: text
      text: 'king of Babylon had carried away captive '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 22:24–28; 29:2
      marker-yv: yv-n
    - type: text
      text: 'Jeconiah the son of Jehoiakim, king of Judah, and the princes of Judah with the craftsmen and smiths, from Jerusalem, and had brought them to Babylon. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will send the sword, the famine, and the pestilence among them, till they are consumed from the land that I gave to them and their fathers.’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One basket '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' very good figs, like the figs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' first ripe; and the other basket '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had
    - type: text
      text: ' very bad figs which could not be eaten, they were so '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 5:4, 7; Jer. 29:17
      marker-yv: yv-n
    - type: text
      text: 'bad. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “What do you see, Jeremiah?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I said, “Figs, the good figs, very good; and the bad, very bad, which cannot be eaten, they are so bad.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me, saying, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel: ‘Like these good figs, so will I acknowledge those who are carried away captive from Judah, whom I have sent out of this place for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: own
    - type: text
      text: ' good, into the land of the Chaldeans. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I will set My eyes on them for good, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 12:15; 29:10; Ezek. 11:17
      marker-yv: yv-n
    - type: text
      text: 'I will bring them back to this land; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 32:41; 33:7; 42:10
      marker-yv: yv-n
    - type: text
      text: 'I will build them and not pull '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' down, and I will plant them and not pluck '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' up. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I will give them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 30:6; Jer. 32:39; Ezek. 11:19; 36:26, 27)
      marker-yv: yv-n
    - type: text
      text: 'a heart to know Me, that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '; and they shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 51:16; Jer. 30:22; 31:33; 32:38; Ezek. 14:11; Zech. 8:8; (Heb. 8:10)
      marker-yv: yv-n
    - type: text
      text: 'My people, and I will be their God, for they shall return to Me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 7:3; Ps. 119:2; Jer. 29:13
      marker-yv: yv-n
    - type: text
      text: with their whole heart.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘And as the bad '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 29:17
      marker-yv: yv-n
    - type: text
      text: 'figs which cannot be eaten, they are so bad’—surely thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '—‘so will I give up Zedekiah the king of Judah, his princes, the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 39:9
      marker-yv: yv-n
    - type: text
      text: 'residue of Jerusalem who remain in this land, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 44:1, 26–30
      marker-yv: yv-n
    - type: text
      text: 'those who dwell in the land of Egypt. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will deliver them to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:25, 37; 1 Kin. 9:7; 2 Chr. 7:20; Jer. 15:4; 29:18; 34:17
      marker-yv: yv-n
    - type: text
      text: 'trouble into all the kingdoms of the earth, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' harm, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 44:13, 14
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a reproach and a byword, a taunt and a curse, in all places where I shall drive them. '
