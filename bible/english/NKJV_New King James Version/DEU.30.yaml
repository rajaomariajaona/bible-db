  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Blessing of Returning to God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:40
      marker-yv: yv-n
    - type: text
      text: 'it shall come to pass, when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:2
      marker-yv: yv-n
    - type: text
      text: 'all these things come upon you, the blessing and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:15–45
      marker-yv: yv-n
    - type: text
      text: 'curse which I have set before you, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:29, 30
      marker-yv: yv-n
    - type: text
      text: 'you call '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to mind among all the nations where the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God drives you, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if you obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, to keep His commandments and His statutes which are written in this Book of the Law, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' if you turn to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God with all your heart and with all your soul.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Choice of Life or Death
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“For this commandment which I command you today '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 45:19
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: too
    - type: text
      text: ' mysterious for you, nor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' it far off. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 30:4; Rom. 10:6–8
      marker-yv: yv-n
    - type: text
      text: 'It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not in heaven, that you should say, ‘Who will ascend into heaven for us and bring it to us, that we may hear it and do it?’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' it beyond the sea, that you should say, ‘Who will go over the sea for us and bring it to us, that we may hear it and do it?’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' very near you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 10:8
      marker-yv: yv-n
    - type: text
      text: in your mouth and in your heart, that you may do it.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“See, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 30:1, 19
      marker-yv: yv-n
    - type: text
      text: 'I have set before you today life and good, death and evil, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in that I command you today to love the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, to walk in His ways, and to keep His commandments, His statutes, and His judgments, that you may live and multiply; and the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will bless you in the land which you go to possess. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if your heart turns away so that you do not hear, and are drawn away, and worship other gods and serve them, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:26; 8:19
      marker-yv: yv-n
    - type: text
      text: 'I announce to you today that you shall surely perish; you shall not prolong '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' days in the land which you cross over the Jordan to go in and possess. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:26
      marker-yv: yv-n
    - type: text
      text: 'I call heaven and earth as witnesses today against you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 30:15
      marker-yv: yv-n
    - type: text
      text: 'I have set before you life and death, blessing and cursing; therefore choose life, that both you and your descendants may live; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:29, 30; Neh. 1:9; Is. 55:7; Lam. 3:40; Joel 2:12
      marker-yv: yv-n
    - type: text
      text: 'return to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and obey His voice, according to all that I command you today, you and your children, with all your heart and with all your soul, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that you may love the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, that you may obey His voice, and that you may cling to Him, for He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' your '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:1; (John 11:25; 14:6; Col. 3:4)
      marker-yv: yv-n
    - type: text
      text: 'life and the length of your days; and that you may dwell in the land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore to your fathers, to Abraham, Isaac, and Jacob, to give them.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:45; Jer. 29:14; Lam. 3:22, 32
      marker-yv: yv-n
    - type: text
      text: 'that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will bring you back from captivity, and have compassion on you, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 147:2; Jer. 32:37; Ezek. 34:13
      marker-yv: yv-n
    - type: text
      text: 'gather you again from all the nations where the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has scattered you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:64; Neh. 1:9; Is. 62:11
      marker-yv: yv-n
    - type: text
      text: 'If '
    - type: usfm
      marker: it
      children:
      - type: text
        text: any
    - type: text
      text: ' of you are driven out to the farthest '
    - type: usfm
      marker: it
      children:
      - type: text
        text: parts
    - type: text
      text: ' under heaven, from there the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will gather you, and from there He will bring you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will bring you to the land which your fathers possessed, and you shall possess it. He will prosper you and multiply you more than your fathers. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 10:16; Jer. 32:39; Ezek. 11:19
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will circumcise your heart and the heart of your descendants, to love the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God with all your heart and with all your soul, that you may live.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Also the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will put all these '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 54:15–17; Jer. 30:16, 20
      marker-yv: yv-n
    - type: text
      text: 'curses on your enemies and on those who hate you, who persecuted you. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zeph. 3:20
      marker-yv: yv-n
    - type: text
      text: 'again obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and do all His commandments which I command you today. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:11
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will make you abound in all the work of your hand, in the fruit of your body, in the increase of your livestock, and in the produce of your land for good. For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will again '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:63; Jer. 32:41
      marker-yv: yv-n
    - type: text
      text: 'rejoice over you for good as He rejoiced over your fathers, '
