document_id: EPH.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Mystery Revealed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'For this reason I, Paul, the prisoner of Christ Jesus for you Gentiles— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'if indeed you have heard of the dispensation of the grace of God '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:15
    marker-yv: yv-n
  - type: text
    text: 'which was given to me for you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 22:17, 21; 26:16
    marker-yv: yv-n
  - type: text
    text: 'how that by revelation '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 11:25; 16:25; Eph. 3:4, 9; 6:19); Col. 1:26; 4:3
    marker-yv: yv-n
  - type: text
    text: 'He made known to me the mystery (as I have briefly written already, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'by which, when you read, you may understand my knowledge in the mystery of Christ), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'which in other ages was not made known to the sons of men, as it has now been revealed by the Spirit to His holy apostles and prophets: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'that the Gentiles '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gal. 3:28, 29
    marker-yv: yv-n
  - type: text
    text: 'should be fellow heirs, of the same body, and partakers of His promise in Christ through the gospel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 15:16
    marker-yv: yv-n
  - type: text
    text: 'of which I became a minister '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:5
    marker-yv: yv-n
  - type: text
    text: 'according to the gift of the grace of God given to me by '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 15:18
    marker-yv: yv-n
  - type: text
    text: the effective working of His power.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Purpose of the Mystery
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'To me, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 15:9)
    marker-yv: yv-n
  - type: text
    text: 'who am less than the least of all the saints, this grace was given, that I should preach among the Gentiles '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Col. 1:27; 2:2, 3)
    marker-yv: yv-n
  - type: text
    text: 'the unsearchable riches of Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and to make all see what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the fellowship of the mystery, which from the beginning of the ages has been hidden in God who '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 1:3; Col. 1:16; Heb. 1:2
    marker-yv: yv-n
  - type: text
    text: 'created all things through Jesus Christ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Pet. 1:12
    marker-yv: yv-n
  - type: text
    text: 'to the intent that now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Tim. 3:16)
    marker-yv: yv-n
  - type: text
    text: 'the manifold wisdom of God might be made known by the church '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:21; 6:12; Col. 1:16; 2:10, 15
    marker-yv: yv-n
  - type: text
    text: 'to the principalities and powers in the heavenly '
  - type: usfm
    marker: it
    children:
    - type: text
      text: places,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 1:4, 11)
    marker-yv: yv-n
  - type: text
    text: 'according to the eternal purpose which He accomplished in Christ Jesus our Lord, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'in whom we have boldness and access '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 3:4; Heb. 4:16; 10:19, 35; (1 John 2:28; 3:21)
    marker-yv: yv-n
  - type: text
    text: 'with confidence through faith in Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 1:14
    marker-yv: yv-n
  - type: text
    text: 'Therefore I ask that you do not lose heart at my tribulations for you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 1:6
    marker-yv: yv-n
  - type: text
    text: which is your glory.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appreciation of the Mystery
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For this reason I bow my knees to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:3
    marker-yv: yv-n
  - type: text
    text: 'Father of our Lord Jesus Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'from whom the whole family in heaven and earth is named, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'that He would grant you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 1:7; 2:4; Phil. 4:19)
    marker-yv: yv-n
  - type: text
    text: 'according to the riches of His glory, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 16:13; Phil. 4:13; Col. 1:11
    marker-yv: yv-n
  - type: text
    text: 'to be strengthened with might through His Spirit in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 7:22
    marker-yv: yv-n
  - type: text
    text: 'the inner man, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:23; Rom. 8:9; 2 Cor. 13:5; (Eph. 2:22)
    marker-yv: yv-n
  - type: text
    text: 'that Christ may dwell in your hearts through faith; that you, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 1:23
    marker-yv: yv-n
  - type: text
    text: 'being rooted and grounded in love, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:18
    marker-yv: yv-n
  - type: text
    text: 'may be able to comprehend with all the saints '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:39
    marker-yv: yv-n
  - type: text
    text: 'what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the width and length and depth and height— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'to know the love of Christ which passes knowledge; that you may be filled '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:23
    marker-yv: yv-n
  - type: text
    text: with all the fullness of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:25
    marker-yv: yv-n
  - type: text
    text: 'to Him who is able to do exceedingly abundantly '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 2:9
    marker-yv: yv-n
  - type: text
    text: 'above all that we ask or think, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 1:29
    marker-yv: yv-n
  - type: text
    text: 'according to the power that works in us, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 11:36
    marker-yv: yv-n
  - type: text
    text: 'to Him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' glory in the church by Christ Jesus to all generations, forever and ever. Amen.'
