document_id: EPH.3,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Mystery Revealed
  - type: text
    content: 'For this reason I, Paul, the prisoner of Christ Jesus for you Gentiles— '
  '10':
  - type: note
    content: 1 Pet. 1:12
  - type: text
    content: 'to the intent that now '
  - type: note
    content: (1 Tim. 3:16)
  - type: text
    content: 'the manifold wisdom of God might be made known by the church '
  - type: note
    content: Eph. 1:21; 6:12; Col. 1:16; 2:10, 15
  - type: text
    content: 'to the principalities and powers in the heavenly '
  - type: text
    content: places,
  - type: text
    content: ' '
  '11':
  - type: note
    content: (Eph. 1:4, 11)
  - type: text
    content: 'according to the eternal purpose which He accomplished in Christ Jesus our Lord, '
  '12':
  - type: text
    content: 'in whom we have boldness and access '
  - type: note
    content: 2 Cor. 3:4; Heb. 4:16; 10:19, 35; (1 John 2:28; 3:21)
  - type: text
    content: 'with confidence through faith in Him. '
  '13':
  - type: note
    content: Phil. 1:14
  - type: text
    content: 'Therefore I ask that you do not lose heart at my tribulations for you, '
  - type: note
    content: 2 Cor. 1:6
  - type: text
    content: which is your glory.
  - type: heading
    content: Appreciation of the Mystery
  '14':
  - type: text
    content: 'For this reason I bow my knees to the '
  - type: note
    content: Eph. 1:3
  - type: text
    content: 'Father of our Lord Jesus Christ, '
  '15':
  - type: text
    content: 'from whom the whole family in heaven and earth is named, '
  '16':
  - type: text
    content: 'that He would grant you, '
  - type: note
    content: (Eph. 1:7; 2:4; Phil. 4:19)
  - type: text
    content: 'according to the riches of His glory, '
  - type: note
    content: 1 Cor. 16:13; Phil. 4:13; Col. 1:11
  - type: text
    content: 'to be strengthened with might through His Spirit in '
  - type: note
    content: Rom. 7:22
  - type: text
    content: 'the inner man, '
  '17':
  - type: note
    content: John 14:23; Rom. 8:9; 2 Cor. 13:5; (Eph. 2:22)
  - type: text
    content: 'that Christ may dwell in your hearts through faith; that you, '
  - type: note
    content: Col. 1:23
  - type: text
    content: 'being rooted and grounded in love, '
  '18':
  - type: note
    content: Eph. 1:18
  - type: text
    content: 'may be able to comprehend with all the saints '
  - type: note
    content: Rom. 8:39
  - type: text
    content: 'what '
  - type: text
    content: is
  - type: text
    content: ' the width and length and depth and height— '
  '19':
  - type: text
    content: 'to know the love of Christ which passes knowledge; that you may be filled '
  - type: note
    content: Eph. 1:23
  - type: text
    content: with all the fullness of God.
  '2':
  - type: text
    content: 'if indeed you have heard of the dispensation of the grace of God '
  - type: note
    content: Acts 9:15
  - type: text
    content: 'which was given to me for you, '
  '20':
  - type: text
    content: 'Now '
  - type: note
    content: Rom. 16:25
  - type: text
    content: 'to Him who is able to do exceedingly abundantly '
  - type: note
    content: 1 Cor. 2:9
  - type: text
    content: 'above all that we ask or think, '
  - type: note
    content: Col. 1:29
  - type: text
    content: 'according to the power that works in us, '
  '21':
  - type: note
    content: Rom. 11:36
  - type: text
    content: 'to Him '
  - type: text
    content: be
  - type: text
    content: ' glory in the church by Christ Jesus to all generations, forever and ever. Amen.'
  '3':
  - type: note
    content: Acts 22:17, 21; 26:16
  - type: text
    content: 'how that by revelation '
  - type: note
    content: (Rom. 11:25; 16:25; Eph. 3:4, 9; 6:19); Col. 1:26; 4:3
  - type: text
    content: 'He made known to me the mystery (as I have briefly written already, '
  '4':
  - type: text
    content: 'by which, when you read, you may understand my knowledge in the mystery of Christ), '
  '5':
  - type: text
    content: 'which in other ages was not made known to the sons of men, as it has now been revealed by the Spirit to His holy apostles and prophets: '
  '6':
  - type: text
    content: 'that the Gentiles '
  - type: note
    content: Gal. 3:28, 29
  - type: text
    content: 'should be fellow heirs, of the same body, and partakers of His promise in Christ through the gospel, '
  '7':
  - type: note
    content: Rom. 15:16
  - type: text
    content: 'of which I became a minister '
  - type: note
    content: Rom. 1:5
  - type: text
    content: 'according to the gift of the grace of God given to me by '
  - type: note
    content: Rom. 15:18
  - type: text
    content: the effective working of His power.
  - type: heading
    content: Purpose of the Mystery
  '8':
  - type: text
    content: 'To me, '
  - type: note
    content: (1 Cor. 15:9)
  - type: text
    content: 'who am less than the least of all the saints, this grace was given, that I should preach among the Gentiles '
  - type: note
    content: (Col. 1:27; 2:2, 3)
  - type: text
    content: 'the unsearchable riches of Christ, '
  '9':
  - type: text
    content: 'and to make all see what '
  - type: text
    content: is
  - type: text
    content: ' the fellowship of the mystery, which from the beginning of the ages has been hidden in God who '
  - type: note
    content: John 1:3; Col. 1:16; Heb. 1:2
  - type: text
    content: 'created all things through Jesus Christ; '
