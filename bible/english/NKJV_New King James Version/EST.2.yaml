document_id: EST.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esther Becomes Queen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After these things, when the wrath of King Ahasuerus subsided, he remembered Vashti, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:19, 20
    marker-yv: yv-n
  - type: text
    text: 'what she had done, and what had been decreed against her. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then the king’s servants who attended him said: “Let beautiful young virgins be sought for the king; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and let the king appoint officers in all the provinces of his kingdom, that they may gather all the beautiful young virgins to Shushan the citadel, into the women’s quarters, under the custody of Hegai the king’s eunuch, custodian of the women. And let beauty preparations be given '
  - type: usfm
    marker: it
    children:
    - type: text
      text: them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then let the young woman who pleases the king be queen instead of Vashti.”
- type: usfm
  marker: p
  children:
  - type: text
    text: This thing pleased the king, and he did so.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In Shushan the citadel there was a certain Jew whose name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Mordecai the son of Jair, the son of Shimei, the son of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 9:1
    marker-yv: yv-n
  - type: text
    text: 'Kish, a Benjamite. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:14, 15; 2 Chr. 36:10, 20; Jer. 24:1
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Kish
  - type: text
    text: ' had been carried away from Jerusalem with the captives who had been captured with Jeconiah king of Judah, whom Nebuchadnezzar the king of Babylon had carried away. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mordecai
  - type: text
    text: ' had brought up Hadassah, that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is,
  - type: text
    text: ' Esther, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 2:15
    marker-yv: yv-n
  - type: text
    text: 'his uncle’s daughter, for she had neither father nor mother. The young woman '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' lovely and beautiful. When her father and mother died, Mordecai took her as his own daughter.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So it was, when the king’s command and decree were heard, and when many young women were '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 2:3
    marker-yv: yv-n
  - type: text
    text: 'gathered at Shushan the citadel, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: under
  - type: text
    text: ' the custody of Hegai, that Esther also was taken to the king’s palace, into the care of Hegai the custodian of the women. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now the young woman pleased him, and she obtained his favor; so he readily gave '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 2:3, 12
    marker-yv: yv-n
  - type: text
    text: 'beauty preparations to her, besides her allowance. Then seven choice maidservants were provided for her from the king’s palace, and he moved her and her maidservants to the best '
  - type: usfm
    marker: it
    children:
    - type: text
      text: place
  - type: text
    text: ' in the house of the women.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 2:20
    marker-yv: yv-n
  - type: text
    text: 'Esther had not revealed her people or family, for Mordecai had charged her not to reveal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And every day Mordecai paced in front of the court of the women’s quarters, to learn of Esther’s welfare and what was happening to her.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Each young woman’s turn came to go in to King Ahasuerus after she had completed twelve months’ preparation, according to the regulations for the women, for thus were the days of their preparation apportioned: six months with oil of myrrh, and six months with perfumes and preparations for beautifying women. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Thus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prepared, each
  - type: text
    text: ' young woman went to the king, and she was given whatever she desired to take with her from the women’s quarters to the king’s palace. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: In the evening she went, and in the morning she returned to the second house of the women, to the custody of Shaashgaz, the king’s eunuch who kept the concubines. She would not go in to the king again unless the king delighted in her and called for her by name.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now when the turn came for Esther '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 2:7, 9:29
    marker-yv: yv-n
  - type: text
    text: 'the daughter of Abihail the uncle of Mordecai, who had taken her as his daughter, to go in to the king, she requested nothing but what Hegai the king’s eunuch, the custodian of the women, advised. And Esther '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 5:2, 8
    marker-yv: yv-n
  - type: text
    text: 'obtained favor in the sight of all who saw her. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So Esther was taken to King Ahasuerus, into his royal palace, in the tenth month, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the month of Tebeth, in the seventh year of his reign. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The king loved Esther more than all the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' women, and she obtained grace and favor in his sight more than all the virgins; so he set the royal '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:11
    marker-yv: yv-n
  - type: text
    text: 'crown upon her head and made her queen instead of Vashti. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then the king '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:3
    marker-yv: yv-n
  - type: text
    text: made a great feast, the Feast of Esther, for all his officials and servants; and he proclaimed a holiday in the provinces and gave gifts according to the generosity of a king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mordecai Discovers a Plot
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When virgins were gathered together a second time, Mordecai sat within the king’s gate. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 2:10; (Prov. 22:6)
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Now
  - type: text
    text: ' Esther had not revealed her family and her people, just as Mordecai had charged her, for Esther obeyed the command of Mordecai as when she was brought up by him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In those days, while Mordecai sat within the king’s gate, two of the king’s eunuchs, Bigthan and Teresh, doorkeepers, became furious and sought to lay hands on King Ahasuerus. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So the matter became known to Mordecai, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 6:1, 2
    marker-yv: yv-n
  - type: text
    text: 'who told Queen Esther, and Esther informed the king in Mordecai’s name. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And when an inquiry was made into the matter, it was confirmed, and both were hanged on a gallows; and it was written in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 6:1
    marker-yv: yv-n
  - type: text
    text: the book of the chronicles in the presence of the king.
