document_id: EST.2,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Esther Becomes Queen
  - type: text
    content: 'After these things, when the wrath of King Ahasuerus subsided, he remembered Vashti, '
  - type: note
    content: Esth. 1:19, 20
  - type: text
    content: 'what she had done, and what had been decreed against her. '
  '10':
  - type: note
    content: Esth. 2:20
  - type: text
    content: 'Esther had not revealed her people or family, for Mordecai had charged her not to reveal '
  - type: text
    content: it.
  - type: text
    content: ' '
  '11':
  - type: text
    content: And every day Mordecai paced in front of the court of the women’s quarters, to learn of Esther’s welfare and what was happening to her.
  '12':
  - type: text
    content: 'Each young woman’s turn came to go in to King Ahasuerus after she had completed twelve months’ preparation, according to the regulations for the women, for thus were the days of their preparation apportioned: six months with oil of myrrh, and six months with perfumes and preparations for beautifying women. '
  '13':
  - type: text
    content: 'Thus '
  - type: text
    content: prepared, each
  - type: text
    content: ' young woman went to the king, and she was given whatever she desired to take with her from the women’s quarters to the king’s palace. '
  '14':
  - type: text
    content: In the evening she went, and in the morning she returned to the second house of the women, to the custody of Shaashgaz, the king’s eunuch who kept the concubines. She would not go in to the king again unless the king delighted in her and called for her by name.
  '15':
  - type: text
    content: 'Now when the turn came for Esther '
  - type: note
    content: Esth. 2:7, 9:29
  - type: text
    content: 'the daughter of Abihail the uncle of Mordecai, who had taken her as his daughter, to go in to the king, she requested nothing but what Hegai the king’s eunuch, the custodian of the women, advised. And Esther '
  - type: note
    content: Esth. 5:2, 8
  - type: text
    content: 'obtained favor in the sight of all who saw her. '
  '16':
  - type: text
    content: 'So Esther was taken to King Ahasuerus, into his royal palace, in the tenth month, which '
  - type: text
    content: is
  - type: text
    content: ' the month of Tebeth, in the seventh year of his reign. '
  '17':
  - type: text
    content: 'The king loved Esther more than all the '
  - type: text
    content: other
  - type: text
    content: ' women, and she obtained grace and favor in his sight more than all the virgins; so he set the royal '
  - type: note
    content: Esth. 1:11
  - type: text
    content: 'crown upon her head and made her queen instead of Vashti. '
  '18':
  - type: text
    content: 'Then the king '
  - type: note
    content: Esth. 1:3
  - type: text
    content: made a great feast, the Feast of Esther, for all his officials and servants; and he proclaimed a holiday in the provinces and gave gifts according to the generosity of a king.
  - type: heading
    content: Mordecai Discovers a Plot
  '19':
  - type: text
    content: 'When virgins were gathered together a second time, Mordecai sat within the king’s gate. '
  '2':
  - type: text
    content: 'Then the king’s servants who attended him said: “Let beautiful young virgins be sought for the king; '
  '20':
  - type: note
    content: Esth. 2:10; (Prov. 22:6)
  - type: text
    content: Now
  - type: text
    content: ' Esther had not revealed her family and her people, just as Mordecai had charged her, for Esther obeyed the command of Mordecai as when she was brought up by him.'
  '21':
  - type: text
    content: 'In those days, while Mordecai sat within the king’s gate, two of the king’s eunuchs, Bigthan and Teresh, doorkeepers, became furious and sought to lay hands on King Ahasuerus. '
  '22':
  - type: text
    content: 'So the matter became known to Mordecai, '
  - type: note
    content: Esth. 6:1, 2
  - type: text
    content: 'who told Queen Esther, and Esther informed the king in Mordecai’s name. '
  '23':
  - type: text
    content: 'And when an inquiry was made into the matter, it was confirmed, and both were hanged on a gallows; and it was written in '
  - type: note
    content: Esth. 6:1
  - type: text
    content: the book of the chronicles in the presence of the king.
  '3':
  - type: text
    content: 'and let the king appoint officers in all the provinces of his kingdom, that they may gather all the beautiful young virgins to Shushan the citadel, into the women’s quarters, under the custody of Hegai the king’s eunuch, custodian of the women. And let beauty preparations be given '
  - type: text
    content: them.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Then let the young woman who pleases the king be queen instead of Vashti.”
  - type: text
    content: This thing pleased the king, and he did so.
  '5':
  - type: text
    content: 'In Shushan the citadel there was a certain Jew whose name '
  - type: text
    content: was
  - type: text
    content: ' Mordecai the son of Jair, the son of Shimei, the son of '
  - type: note
    content: 1 Sam. 9:1
  - type: text
    content: 'Kish, a Benjamite. '
  '6':
  - type: note
    content: 2 Kin. 24:14, 15; 2 Chr. 36:10, 20; Jer. 24:1
  - type: text
    content: Kish
  - type: text
    content: ' had been carried away from Jerusalem with the captives who had been captured with Jeconiah king of Judah, whom Nebuchadnezzar the king of Babylon had carried away. '
  '7':
  - type: text
    content: 'And '
  - type: text
    content: Mordecai
  - type: text
    content: ' had brought up Hadassah, that '
  - type: text
    content: is,
  - type: text
    content: ' Esther, '
  - type: note
    content: Esth. 2:15
  - type: text
    content: 'his uncle’s daughter, for she had neither father nor mother. The young woman '
  - type: text
    content: was
  - type: text
    content: ' lovely and beautiful. When her father and mother died, Mordecai took her as his own daughter.'
  '8':
  - type: text
    content: 'So it was, when the king’s command and decree were heard, and when many young women were '
  - type: note
    content: Esth. 2:3
  - type: text
    content: 'gathered at Shushan the citadel, '
  - type: text
    content: under
  - type: text
    content: ' the custody of Hegai, that Esther also was taken to the king’s palace, into the care of Hegai the custodian of the women. '
  '9':
  - type: text
    content: 'Now the young woman pleased him, and she obtained his favor; so he readily gave '
  - type: note
    content: Esth. 2:3, 12
  - type: text
    content: 'beauty preparations to her, besides her allowance. Then seven choice maidservants were provided for her from the king’s palace, and he moved her and her maidservants to the best '
  - type: text
    content: place
  - type: text
    content: ' in the house of the women.'
