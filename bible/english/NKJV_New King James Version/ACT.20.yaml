document_id: ACT.20,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Journeys in Greece
  - type: text
    content: 'After the uproar had ceased, Paul called the disciples to '
  - type: text
    content: himself,
  - type: text
    content: ' embraced '
  - type: text
    content: them,
  - type: text
    content: ' and '
  - type: note
    content: 1 Cor. 16:5; 1 Tim. 1:3
  - type: text
    content: 'departed to go to Macedonia. '
  '10':
  - type: text
    content: 'But Paul went down, '
  - type: note
    content: 1 Kin. 17:21; 2 Kin. 4:34
  - type: text
    content: 'fell on him, and embracing '
  - type: text
    content: him
  - type: text
    content: ' said, '
  - type: note
    content: Matt. 9:23, 24; Mark 5:39
  - type: text
    content: '“Do not trouble yourselves, for his life is in him.” '
  '11':
  - type: text
    content: 'Now when he had come up, had broken bread and eaten, and talked a long while, even till daybreak, he departed. '
  '12':
  - type: text
    content: And they brought the young man in alive, and they were not a little comforted.
  - type: heading
    content: From Troas to Miletus
  '13':
  - type: text
    content: 'Then we went ahead to the ship and sailed to Assos, there intending to take Paul on board; for so he had given orders, intending himself to go on foot. '
  '14':
  - type: text
    content: 'And when he met us at Assos, we took him on board and came to Mitylene. '
  '15':
  - type: text
    content: 'We sailed from there, and the next '
  - type: text
    content: day
  - type: text
    content: ' came opposite Chios. The following '
  - type: text
    content: day
  - type: text
    content: ' we arrived at Samos and stayed at Trogyllium. The next '
  - type: text
    content: day
  - type: text
    content: ' we came to Miletus. '
  '16':
  - type: text
    content: 'For Paul had decided to sail past Ephesus, so that he would not have to spend time in Asia; for '
  - type: note
    content: Acts 18:21; 19:21; 21:4
  - type: text
    content: 'he was hurrying '
  - type: note
    content: Acts 24:17
  - type: text
    content: 'to be at Jerusalem, if possible, on '
  - type: note
    content: Acts 2:1; 1 Cor. 16:8
  - type: text
    content: the Day of Pentecost.
  - type: heading
    content: The Ephesian Elders Exhorted
  '17':
  - type: text
    content: 'From Miletus he sent to Ephesus and called for the elders of the church. '
  '18':
  - type: text
    content: 'And when they had come to him, he said to them: “You know, '
  - type: note
    content: Acts 18:19; 19:1, 10; 20:4, 16
  - type: text
    content: 'from the first day that I came to Asia, in what manner I always lived among you, '
  '19':
  - type: text
    content: 'serving the Lord with all humility, with many tears and trials which happened to me '
  - type: note
    content: Acts 20:3
  - type: text
    content: 'by the plotting of the Jews; '
  '2':
  - type: text
    content: 'Now when he had gone over that region and encouraged them with many words, he came to '
  - type: note
    content: Acts 17:15; 18:1
  - type: text
    content: 'Greece '
  '20':
  - type: text
    content: 'how '
  - type: note
    content: Acts 20:27
  - type: text
    content: 'I kept back nothing that was helpful, but proclaimed it to you, and taught you publicly and from house to house, '
  '21':
  - type: note
    content: Acts 18:5; 19:10
  - type: text
    content: 'testifying to Jews, and also to Greeks, '
  - type: note
    content: Mark 1:15
  - type: text
    content: 'repentance toward God and faith toward our Lord Jesus Christ. '
  '22':
  - type: text
    content: 'And see, now '
  - type: note
    content: Acts 19:21
  - type: text
    content: 'I go bound in the spirit to Jerusalem, not knowing the things that will happen to me there, '
  '23':
  - type: text
    content: 'except that '
  - type: note
    content: Acts 21:4, 11
  - type: text
    content: 'the Holy Spirit testifies in every city, saying that chains and tribulations await me. '
  '24':
  - type: text
    content: 'But '
  - type: note
    content: Acts 21:13
  - type: text
    content: 'none of these things move me; nor do I count my life dear to myself, '
  - type: note
    content: Acts 13:25; 2 Tim. 4:7
  - type: text
    content: 'so that I may finish my race with joy, '
  - type: note
    content: Acts 1:17
  - type: text
    content: 'and the ministry '
  - type: note
    content: Gal. 1:1
  - type: text
    content: which I received from the Lord Jesus, to testify to the gospel of the grace of God.
  '25':
  - type: text
    content: '“And indeed, now I know that you all, among whom I have gone preaching the kingdom of God, will see my face no more. '
  '26':
  - type: text
    content: 'Therefore I testify to you this day that I '
  - type: text
    content: am
  - type: text
    content: ' '
  - type: note
    content: Acts 18:6; 2 Cor. 7:2
  - type: text
    content: 'innocent of the blood of all '
  - type: text
    content: men.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'For I have not shunned to declare to you '
  - type: note
    content: Luke 7:30; John 15:15; Eph. 1:11
  - type: text
    content: 'the whole counsel of God. '
  '28':
  - type: note
    content: Luke 12:32; John 21:15–17; Acts 20:29; (1 Tim. 4:16); 1 Pet. 5:2
  - type: text
    content: 'Therefore take heed to yourselves and to all the flock, among which the Holy Spirit '
  - type: note
    content: 1 Cor. 12:28
  - type: text
    content: 'has made you overseers, to shepherd the church of God '
  - type: note
    content: Eph. 1:7, 14; Col. 1:14; Titus 2:14; Heb. 9:12; (1 Pet. 1:19); Rev. 5:9
  - type: text
    content: 'which He purchased '
  - type: note
    content: Heb. 9:14
  - type: text
    content: 'with His own blood. '
  '29':
  - type: text
    content: 'For I know this, that after my departure '
  - type: note
    content: Ezek. 22:27; Matt. 7:15
  - type: text
    content: 'savage wolves will come in among you, not sparing the flock. '
  '3':
  - type: text
    content: 'and stayed three months. And '
  - type: note
    content: Acts 9:23; 23:12; 25:3; 2 Cor. 11:26
  - type: text
    content: 'when the Jews plotted against him as he was about to sail to Syria, he decided to return through Macedonia. '
  '30':
  - type: text
    content: 'Also '
  - type: note
    content: 1 Tim. 1:20; 2 Tim. 1:15
  - type: text
    content: 'from among yourselves men will rise up, speaking perverse things, to draw away the disciples after themselves. '
  '31':
  - type: text
    content: 'Therefore watch, and remember that '
  - type: note
    content: Acts 19:8, 10; 24:17
  - type: text
    content: for three years I did not cease to warn everyone night and day with tears.
  '32':
  - type: text
    content: '“So now, brethren, I commend you to God and '
  - type: note
    content: Heb. 13:9
  - type: text
    content: 'to the word of His grace, which is able '
  - type: note
    content: Acts 9:31
  - type: text
    content: 'to build you up and give you '
  - type: note
    content: Acts 26:18; Eph. 1:14, 18; 5:5; Col. 1:12; 3:24; (Heb. 9:15; 1 Pet. 1:4)
  - type: text
    content: 'an inheritance among all those who are sanctified. '
  '33':
  - type: text
    content: 'I have coveted no one’s silver or gold or apparel. '
  '34':
  - type: text
    content: 'Yes, you yourselves know '
  - type: note
    content: Acts 18:3; 1 Cor. 4:12; 1 Thess. 2:9; 2 Thess. 3:8
  - type: text
    content: 'that these hands have provided for my necessities, and for those who were with me. '
  '35':
  - type: text
    content: 'I have shown you in every way, '
  - type: note
    content: Rom. 15:1; 1 Cor. 9:12; 2 Cor. 11:9, 12; Eph. 4:28; 1 Thess. 4:11; 2 Thess. 3:8
  - type: text
    content: 'by laboring like this, that you must support the weak. And remember the words of the Lord Jesus, that He said, '
  - type: text
    content: ‘It is more blessed to give than to receive.’
  - type: text
    content: ' ”'
  '36':
  - type: text
    content: 'And when he had said these things, he knelt down and prayed with them all. '
  '37':
  - type: text
    content: 'Then they all '
  - type: note
    content: Acts 21:13
  - type: text
    content: 'wept freely, and '
  - type: note
    content: Gen. 45:14
  - type: text
    content: 'fell on Paul’s neck and kissed him, '
  '38':
  - type: text
    content: sorrowing most of all for the words which he spoke, that they would see his face no more. And they accompanied him to the ship.
  '4':
  - type: text
    content: 'And Sopater of Berea accompanied him to Asia—also '
  - type: note
    content: Acts 19:29; Col. 4:10
  - type: text
    content: 'Aristarchus and Secundus of the Thessalonians, and '
  - type: note
    content: Acts 19:29
  - type: text
    content: 'Gaius of Derbe, and '
  - type: note
    content: Acts 16:1
  - type: text
    content: 'Timothy, and '
  - type: note
    content: Eph. 6:21; Col. 4:7; 2 Tim. 4:12; Titus 3:12
  - type: text
    content: 'Tychicus and '
  - type: note
    content: Acts 21:29; 2 Tim. 4:20
  - type: text
    content: 'Trophimus of Asia. '
  '5':
  - type: text
    content: 'These men, going ahead, waited for us at '
  - type: note
    content: 2 Cor. 2:12; 2 Tim. 4:13
  - type: text
    content: 'Troas. '
  '6':
  - type: text
    content: 'But we sailed away from Philippi after '
  - type: note
    content: Ex. 12:14, 15
  - type: text
    content: 'the Days of Unleavened Bread, and in five days joined them '
  - type: note
    content: Acts 16:8; 2 Cor. 2:12; 2 Tim. 4:13
  - type: text
    content: at Troas, where we stayed seven days.
  - type: heading
    content: Ministering at Troas
  '7':
  - type: text
    content: 'Now on '
  - type: note
    content: 1 Cor. 16:2; Rev. 1:10
  - type: text
    content: 'the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, when the disciples came together '
  - type: note
    content: Acts 2:42, 46; 20:11; 1 Cor. 10:16
  - type: text
    content: 'to break bread, Paul, ready to depart the next day, spoke to them and continued his message until midnight. '
  '8':
  - type: text
    content: 'There were many lamps '
  - type: note
    content: Acts 1:13
  - type: text
    content: 'in the upper room where they were gathered together. '
  '9':
  - type: text
    content: 'And in a window sat a certain young man named Eutychus, who was sinking into a deep sleep. He was overcome by sleep; and as Paul continued speaking, he fell down from the third story and was taken up dead. '
