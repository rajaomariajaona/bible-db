document_id: ACT.20,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Journeys in Greece
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the uproar had ceased, Paul called the disciples to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: himself,
    - type: text
      text: ' embraced '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them,
    - type: text
      text: ' and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:5; 1 Tim. 1:3
      marker-yv: yv-n
    - type: text
      text: 'departed to go to Macedonia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Paul went down, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 17:21; 2 Kin. 4:34
      marker-yv: yv-n
    - type: text
      text: 'fell on him, and embracing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 9:23, 24; Mark 5:39
      marker-yv: yv-n
    - type: text
      text: '“Do not trouble yourselves, for his life is in him.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when he had come up, had broken bread and eaten, and talked a long while, even till daybreak, he departed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they brought the young man in alive, and they were not a little comforted.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: From Troas to Miletus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then we went ahead to the ship and sailed to Assos, there intending to take Paul on board; for so he had given orders, intending himself to go on foot. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he met us at Assos, we took him on board and came to Mitylene. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We sailed from there, and the next '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' came opposite Chios. The following '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' we arrived at Samos and stayed at Trogyllium. The next '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' we came to Miletus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For Paul had decided to sail past Ephesus, so that he would not have to spend time in Asia; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:21; 19:21; 21:4
      marker-yv: yv-n
    - type: text
      text: 'he was hurrying '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 24:17
      marker-yv: yv-n
    - type: text
      text: 'to be at Jerusalem, if possible, on '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:1; 1 Cor. 16:8
      marker-yv: yv-n
    - type: text
      text: the Day of Pentecost.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ephesian Elders Exhorted
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From Miletus he sent to Ephesus and called for the elders of the church. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when they had come to him, he said to them: “You know, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:19; 19:1, 10; 20:4, 16
      marker-yv: yv-n
    - type: text
      text: 'from the first day that I came to Asia, in what manner I always lived among you, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'serving the Lord with all humility, with many tears and trials which happened to me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:3
      marker-yv: yv-n
    - type: text
      text: 'by the plotting of the Jews; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now when he had gone over that region and encouraged them with many words, he came to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 17:15; 18:1
      marker-yv: yv-n
    - type: text
      text: 'Greece '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'how '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:27
      marker-yv: yv-n
    - type: text
      text: 'I kept back nothing that was helpful, but proclaimed it to you, and taught you publicly and from house to house, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:5; 19:10
      marker-yv: yv-n
    - type: text
      text: 'testifying to Jews, and also to Greeks, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 1:15
      marker-yv: yv-n
    - type: text
      text: 'repentance toward God and faith toward our Lord Jesus Christ. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And see, now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:21
      marker-yv: yv-n
    - type: text
      text: 'I go bound in the spirit to Jerusalem, not knowing the things that will happen to me there, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'except that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:4, 11
      marker-yv: yv-n
    - type: text
      text: 'the Holy Spirit testifies in every city, saying that chains and tribulations await me. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:13
      marker-yv: yv-n
    - type: text
      text: 'none of these things move me; nor do I count my life dear to myself, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:25; 2 Tim. 4:7
      marker-yv: yv-n
    - type: text
      text: 'so that I may finish my race with joy, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:17
      marker-yv: yv-n
    - type: text
      text: 'and the ministry '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 1:1
      marker-yv: yv-n
    - type: text
      text: which I received from the Lord Jesus, to testify to the gospel of the grace of God.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And indeed, now I know that you all, among whom I have gone preaching the kingdom of God, will see my face no more. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I testify to you this day that I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:6; 2 Cor. 7:2
      marker-yv: yv-n
    - type: text
      text: 'innocent of the blood of all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I have not shunned to declare to you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 7:30; John 15:15; Eph. 1:11
      marker-yv: yv-n
    - type: text
      text: 'the whole counsel of God. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:32; John 21:15–17; Acts 20:29; (1 Tim. 4:16); 1 Pet. 5:2
      marker-yv: yv-n
    - type: text
      text: 'Therefore take heed to yourselves and to all the flock, among which the Holy Spirit '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:28
      marker-yv: yv-n
    - type: text
      text: 'has made you overseers, to shepherd the church of God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 1:7, 14; Col. 1:14; Titus 2:14; Heb. 9:12; (1 Pet. 1:19); Rev. 5:9
      marker-yv: yv-n
    - type: text
      text: 'which He purchased '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 9:14
      marker-yv: yv-n
    - type: text
      text: 'with His own blood. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know this, that after my departure '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 22:27; Matt. 7:15
      marker-yv: yv-n
    - type: text
      text: 'savage wolves will come in among you, not sparing the flock. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and stayed three months. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:23; 23:12; 25:3; 2 Cor. 11:26
      marker-yv: yv-n
    - type: text
      text: 'when the Jews plotted against him as he was about to sail to Syria, he decided to return through Macedonia. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 1:20; 2 Tim. 1:15
      marker-yv: yv-n
    - type: text
      text: 'from among yourselves men will rise up, speaking perverse things, to draw away the disciples after themselves. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore watch, and remember that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:8, 10; 24:17
      marker-yv: yv-n
    - type: text
      text: for three years I did not cease to warn everyone night and day with tears.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So now, brethren, I commend you to God and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 13:9
      marker-yv: yv-n
    - type: text
      text: 'to the word of His grace, which is able '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:31
      marker-yv: yv-n
    - type: text
      text: 'to build you up and give you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 26:18; Eph. 1:14, 18; 5:5; Col. 1:12; 3:24; (Heb. 9:15; 1 Pet. 1:4)
      marker-yv: yv-n
    - type: text
      text: 'an inheritance among all those who are sanctified. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have coveted no one’s silver or gold or apparel. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, you yourselves know '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 18:3; 1 Cor. 4:12; 1 Thess. 2:9; 2 Thess. 3:8
      marker-yv: yv-n
    - type: text
      text: 'that these hands have provided for my necessities, and for those who were with me. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have shown you in every way, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:1; 1 Cor. 9:12; 2 Cor. 11:9, 12; Eph. 4:28; 1 Thess. 4:11; 2 Thess. 3:8
      marker-yv: yv-n
    - type: text
      text: 'by laboring like this, that you must support the weak. And remember the words of the Lord Jesus, that He said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘It is more blessed to give than to receive.’
    - type: text
      text: ' ”'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when he had said these things, he knelt down and prayed with them all. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:13
      marker-yv: yv-n
    - type: text
      text: 'wept freely, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 45:14
      marker-yv: yv-n
    - type: text
      text: 'fell on Paul’s neck and kissed him, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sorrowing most of all for the words which he spoke, that they would see his face no more. And they accompanied him to the ship.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Sopater of Berea accompanied him to Asia—also '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:29; Col. 4:10
      marker-yv: yv-n
    - type: text
      text: 'Aristarchus and Secundus of the Thessalonians, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 19:29
      marker-yv: yv-n
    - type: text
      text: 'Gaius of Derbe, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:1
      marker-yv: yv-n
    - type: text
      text: 'Timothy, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:21; Col. 4:7; 2 Tim. 4:12; Titus 3:12
      marker-yv: yv-n
    - type: text
      text: 'Tychicus and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 21:29; 2 Tim. 4:20
      marker-yv: yv-n
    - type: text
      text: 'Trophimus of Asia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These men, going ahead, waited for us at '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:12; 2 Tim. 4:13
      marker-yv: yv-n
    - type: text
      text: 'Troas. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we sailed away from Philippi after '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:14, 15
      marker-yv: yv-n
    - type: text
      text: 'the Days of Unleavened Bread, and in five days joined them '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:8; 2 Cor. 2:12; 2 Tim. 4:13
      marker-yv: yv-n
    - type: text
      text: at Troas, where we stayed seven days.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ministering at Troas
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now on '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:2; Rev. 1:10
      marker-yv: yv-n
    - type: text
      text: 'the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the week, when the disciples came together '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:42, 46; 20:11; 1 Cor. 10:16
      marker-yv: yv-n
    - type: text
      text: 'to break bread, Paul, ready to depart the next day, spoke to them and continued his message until midnight. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were many lamps '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:13
      marker-yv: yv-n
    - type: text
      text: 'in the upper room where they were gathered together. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in a window sat a certain young man named Eutychus, who was sinking into a deep sleep. He was overcome by sleep; and as Paul continued speaking, he fell down from the third story and was taken up dead. '
