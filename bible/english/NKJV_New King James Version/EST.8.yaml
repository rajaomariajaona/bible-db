verses:
  '1':
  - type: heading
    content: Esther Saves the Jews
  - type: text
    content: 'On that day King Ahasuerus gave Queen Esther the house of Haman, the '
  - type: note
    content: Esth. 7:6
  - type: text
    content: 'enemy of the Jews. And Mordecai came before the king, for Esther had told '
  - type: note
    content: Esth. 2:7, 15
  - type: text
    content: 'how he '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: related
  - type: text
    content: ' to her. '
  '10':
  - type: note
    content: 1 Kin. 21:8; Esth. 3:12, 13
  - type: text
    content: 'And he wrote in the name of King Ahasuerus, sealed '
  - type: text
    content: it
  - type: text
    content: ' with the king’s signet ring, and sent letters by couriers on horseback, riding on royal horses bred from swift steeds.'
  '11':
  - type: text
    content: 'By these letters the king permitted the Jews who '
  - type: text
    content: were
  - type: text
    content: ' in every city to '
  - type: note
    content: Esth. 9:2
  - type: text
    content: 'gather together and protect their lives—to '
  - type: note
    content: Esth. 9:10, 15, 16
  - type: text
    content: 'destroy, kill, and annihilate all the forces of any people or province that would assault them, '
  - type: text
    content: both
  - type: text
    content: ' little children and women, and to plunder their possessions, '
  '12':
  - type: note
    content: Esth. 3:13, 9:1
  - type: text
    content: 'on one day in all the provinces of King Ahasuerus, on the thirteenth '
  - type: text
    content: day
  - type: text
    content: ' of the twelfth month, which '
  - type: text
    content: is
  - type: text
    content: ' the month of Adar. '
  '13':
  - type: note
    content: Esth. 3:14, 15
  - type: text
    content: 'A copy of the document was to be issued as a decree in every province and published for all people, so that the Jews would be ready on that day to avenge themselves on their enemies. '
  '14':
  - type: text
    content: The couriers who rode on royal horses went out, hastened and pressed on by the king’s command. And the decree was issued in Shushan the citadel.
  '15':
  - type: text
    content: 'So Mordecai went out from the presence of the king in royal apparel of blue and white, with a great crown of gold and a garment of fine linen and purple; and '
  - type: note
    content: Esth. 3:15; Prov. 29:2
  - type: text
    content: 'the city of Shushan rejoiced and was glad. '
  '16':
  - type: text
    content: 'The Jews had '
  - type: note
    content: Ps. 97:11; 112:4
  - type: text
    content: 'light and gladness, joy and honor. '
  '17':
  - type: text
    content: 'And in every province and city, wherever the king’s command and decree came, the Jews had joy and gladness, a feast '
  - type: note
    content: 1 Sam. 25:8; Esth. 9:19
  - type: text
    content: 'and a holiday. Then many of the people of the land '
  - type: note
    content: Ps. 18:43
  - type: text
    content: 'became Jews, because '
  - type: note
    content: Gen. 35:5; Ex. 15:16; Deut. 2:25; 11:25; 1 Chr. 14:17; Esth. 9:2
  - type: text
    content: fear of the Jews fell upon them.
  '2':
  - type: text
    content: 'So the king took off '
  - type: note
    content: Esth. 3:10
  - type: text
    content: his signet ring, which he had taken from Haman, and gave it to Mordecai; and Esther appointed Mordecai over the house of Haman.
  '3':
  - type: text
    content: 'Now Esther spoke again to the king, fell down at his feet, and implored him with tears to counteract the evil of Haman the Agagite, and the scheme which he had devised against the Jews. '
  '4':
  - type: text
    content: 'And '
  - type: note
    content: Esth. 4:11, 5:2
  - type: text
    content: 'the king held out the golden scepter toward Esther. So Esther arose and stood before the king, '
  '5':
  - type: text
    content: 'and said, “If it pleases the king, and if I have found favor in his sight and the thing '
  - type: text
    content: seems
  - type: text
    content: ' right to the king and I am pleasing in his eyes, let it be written to revoke the '
  - type: note
    content: Esth. 3:13
  - type: text
    content: 'letters devised by Haman, the son of Hammedatha the Agagite, which he wrote to annihilate the Jews who '
  - type: text
    content: are
  - type: text
    content: ' in all the king’s provinces. '
  '6':
  - type: text
    content: 'For how can I endure to see '
  - type: note
    content: Neh. 2:3; Esth. 7:4, 9:1
  - type: text
    content: the evil that will come to my people? Or how can I endure to see the destruction of my countrymen?”
  '7':
  - type: text
    content: 'Then King Ahasuerus said to Queen Esther and Mordecai the Jew, “Indeed, '
  - type: note
    content: Esth. 8:1; Prov. 13:22
  - type: text
    content: 'I have given Esther the house of Haman, and they have hanged him on the gallows because he '
  - type: text
    content: tried
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' lay his hand on the Jews. '
  '8':
  - type: text
    content: 'You yourselves write '
  - type: text
    content: a
  - type: text
    content: ' '
  - type: text
    content: decree
  - type: text
    content: ' concerning the Jews, as you please, in the king’s name, and seal '
  - type: text
    content: it
  - type: text
    content: ' with the king’s signet ring; for whatever is written in the king’s name and sealed with the king’s signet ring '
  - type: note
    content: Esth. 1:19; Dan. 6:8, 12, 15
  - type: text
    content: no one can revoke.”
  '9':
  - type: note
    content: Esth. 3:12
  - type: text
    content: 'So the king’s scribes were called at that time, in the third month, which '
  - type: text
    content: is
  - type: text
    content: ' the month of Sivan, on the twenty-third '
  - type: text
    content: day;
  - type: text
    content: ' and it was written, according to all that Mordecai commanded, to the Jews, the satraps, the governors, and the princes of the provinces '
  - type: note
    content: Esth. 1:1
  - type: text
    content: 'from India to Ethiopia, one hundred and twenty-seven provinces '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: text
    content: all,
  - type: text
    content: ' to every province '
  - type: note
    content: Esth. 1:22, 3:12
  - type: text
    content: 'in its own script, to every people in their own language, and to the Jews in their own script and language. '
