document_id: EST.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esther Saves the Jews
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On that day King Ahasuerus gave Queen Esther the house of Haman, the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 7:6
    marker-yv: yv-n
  - type: text
    text: 'enemy of the Jews. And Mordecai came before the king, for Esther had told '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 2:7, 15
    marker-yv: yv-n
  - type: text
    text: 'how he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: related
  - type: text
    text: ' to her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the king took off '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:10
    marker-yv: yv-n
  - type: text
    text: his signet ring, which he had taken from Haman, and gave it to Mordecai; and Esther appointed Mordecai over the house of Haman.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Now Esther spoke again to the king, fell down at his feet, and implored him with tears to counteract the evil of Haman the Agagite, and the scheme which he had devised against the Jews. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 4:11, 5:2
    marker-yv: yv-n
  - type: text
    text: 'the king held out the golden scepter toward Esther. So Esther arose and stood before the king, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and said, “If it pleases the king, and if I have found favor in his sight and the thing '
  - type: usfm
    marker: it
    children:
    - type: text
      text: seems
  - type: text
    text: ' right to the king and I am pleasing in his eyes, let it be written to revoke the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:13
    marker-yv: yv-n
  - type: text
    text: 'letters devised by Haman, the son of Hammedatha the Agagite, which he wrote to annihilate the Jews who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' in all the king’s provinces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For how can I endure to see '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 2:3; Esth. 7:4, 9:1
    marker-yv: yv-n
  - type: text
    text: the evil that will come to my people? Or how can I endure to see the destruction of my countrymen?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then King Ahasuerus said to Queen Esther and Mordecai the Jew, “Indeed, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 8:1; Prov. 13:22
    marker-yv: yv-n
  - type: text
    text: 'I have given Esther the house of Haman, and they have hanged him on the gallows because he '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tried
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' lay his hand on the Jews. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You yourselves write '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: decree
  - type: text
    text: ' concerning the Jews, as you please, in the king’s name, and seal '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' with the king’s signet ring; for whatever is written in the king’s name and sealed with the king’s signet ring '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:19; Dan. 6:8, 12, 15
    marker-yv: yv-n
  - type: text
    text: no one can revoke.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:12
    marker-yv: yv-n
  - type: text
    text: 'So the king’s scribes were called at that time, in the third month, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the month of Sivan, on the twenty-third '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day;
  - type: text
    text: ' and it was written, according to all that Mordecai commanded, to the Jews, the satraps, the governors, and the princes of the provinces '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:1
    marker-yv: yv-n
  - type: text
    text: 'from India to Ethiopia, one hundred and twenty-seven provinces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all,
  - type: text
    text: ' to every province '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 1:22, 3:12
    marker-yv: yv-n
  - type: text
    text: 'in its own script, to every people in their own language, and to the Jews in their own script and language. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 21:8; Esth. 3:12, 13
    marker-yv: yv-n
  - type: text
    text: 'And he wrote in the name of King Ahasuerus, sealed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' with the king’s signet ring, and sent letters by couriers on horseback, riding on royal horses bred from swift steeds.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'By these letters the king permitted the Jews who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' in every city to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 9:2
    marker-yv: yv-n
  - type: text
    text: 'gather together and protect their lives—to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 9:10, 15, 16
    marker-yv: yv-n
  - type: text
    text: 'destroy, kill, and annihilate all the forces of any people or province that would assault them, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: both
  - type: text
    text: ' little children and women, and to plunder their possessions, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:13, 9:1
    marker-yv: yv-n
  - type: text
    text: 'on one day in all the provinces of King Ahasuerus, on the thirteenth '
  - type: usfm
    marker: it
    children:
    - type: text
      text: day
  - type: text
    text: ' of the twelfth month, which '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the month of Adar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:14, 15
    marker-yv: yv-n
  - type: text
    text: 'A copy of the document was to be issued as a decree in every province and published for all people, so that the Jews would be ready on that day to avenge themselves on their enemies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The couriers who rode on royal horses went out, hastened and pressed on by the king’s command. And the decree was issued in Shushan the citadel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So Mordecai went out from the presence of the king in royal apparel of blue and white, with a great crown of gold and a garment of fine linen and purple; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esth. 3:15; Prov. 29:2
    marker-yv: yv-n
  - type: text
    text: 'the city of Shushan rejoiced and was glad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The Jews had '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 97:11; 112:4
    marker-yv: yv-n
  - type: text
    text: 'light and gladness, joy and honor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And in every province and city, wherever the king’s command and decree came, the Jews had joy and gladness, a feast '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 25:8; Esth. 9:19
    marker-yv: yv-n
  - type: text
    text: 'and a holiday. Then many of the people of the land '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 18:43
    marker-yv: yv-n
  - type: text
    text: 'became Jews, because '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 35:5; Ex. 15:16; Deut. 2:25; 11:25; 1 Chr. 14:17; Esth. 9:2
    marker-yv: yv-n
  - type: text
    text: fear of the Jews fell upon them.
