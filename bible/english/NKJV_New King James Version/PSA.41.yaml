    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: say,
    - type: text
      text: ' “clings to him.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now
    - type: text
      text: ' that he lies down, he will rise up no more.”'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 15:12; Job 19:13, 19
      marker-yv: yv-n
    - type: text
      text: Even my own familiar friend in whom I trusted,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 55:12–14, 20; Jer. 20:10; Obad. 7; (Mic. 7:5); Matt. 26:14–16, 21–25, 47–50; John 13:18, 21–30; Acts 1:16, 17
      marker-yv: yv-n
    - type: text
      text: Who ate my bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Has lifted up '
    - type: usfm
