    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 6:2; 103:3; 147:3
      marker-yv: yv-n
    - type: text
      text: Heal my soul, for I have sinned against You.”
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My enemies speak evil of me:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “When will he die, and his name perish?”
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And if he comes to see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me,
    - type: text
      text: ' he speaks lies;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His heart gathers iniquity to itself;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: When
    - type: text
      text: ' he goes out, he tells '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who hate me whisper together against me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Against me they devise my hurt.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“An evil disease,” '
    - type: usfm
      marker: it
      children:
      - type: text
