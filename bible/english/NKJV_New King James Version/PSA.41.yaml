  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will deliver him in time of trouble.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But You, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', be merciful to me, and raise me up,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That I may repay them.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: By this I know that You are well pleased with me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Because my enemy does not triumph over me.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As for me, You uphold me in my integrity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 36:7; Ps. 21:6; 34:15)
      marker-yv: yv-n
    - type: text
      text: set me before Your face forever.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 72:18, 19; 89:52; 106:48; 150:6
      marker-yv: yv-n
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of Israel'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: From everlasting to everlasting!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Amen and Amen.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will preserve him and keep him alive,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' he will be blessed on the earth;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:12
      marker-yv: yv-n
    - type: text
      text: You will not deliver him to the will of his enemies.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will strengthen him on his bed of illness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will sustain him on his sickbed.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said, “
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', be merciful to me;'
  - type: usfm
    marker: q2
