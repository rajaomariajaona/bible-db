document_id: 2PE.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Destructive Doctrines
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But there were also false prophets among the people, even as there will be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:5, 24; 1 Tim. 4:1, 2
      marker-yv: yv-n
    - type: text
      text: 'false teachers among you, who will secretly bring in destructive heresies, even denying the Lord who bought them, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' bring on themselves swift destruction. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and especially '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 4, 7, 8
      marker-yv: yv-n
    - type: text
      text: 'those who walk according to the flesh in the lust of uncleanness and despise authority. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:28; Jude 8
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' presumptuous, self-willed. They are not afraid to speak evil of dignitaries, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'whereas '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 9
      marker-yv: yv-n
    - type: text
      text: angels, who are greater in power and might, do not bring a reviling accusation against them before the Lord.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Depravity of False Teachers
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But these, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 10
      marker-yv: yv-n
    - type: text
      text: 'like natural brute beasts made to be caught and destroyed, speak evil of the things they do not understand, and will utterly perish in their own corruption, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 3:19
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' will receive the wages of unrighteousness, as those who count it pleasure '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 13:13
      marker-yv: yv-n
    - type: text
      text: 'to carouse in the daytime. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 12
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' spots and blemishes, carousing in their own deceptions while '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 11:20, 21
      marker-yv: yv-n
    - type: text
      text: 'they feast with you, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'having eyes full of adultery and that cannot cease from sin, enticing unstable souls. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 11
      marker-yv: yv-n
    - type: text
      text: 'They have a heart trained in covetous practices, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' accursed children. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They have forsaken the right way and gone astray, following the way of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 22:5, 7; Deut. 23:4; Neh. 13:2; Jude 11; Rev. 2:14
      marker-yv: yv-n
    - type: text
      text: 'Balaam the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: son
    - type: text
      text: ' of Beor, who loved the wages of unrighteousness; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but he was rebuked for his iniquity: a dumb donkey speaking with a man’s voice restrained the madness of the prophet.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jude 12, 13
      marker-yv: yv-n
    - type: text
      text: These are wells without water, clouds carried by a tempest, for whom is reserved the blackness of darkness forever.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deceptions of False Teachers
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when they speak great swelling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: words
    - type: text
      text: ' of emptiness, they allure through the lusts of the flesh, through lewdness, the ones who have actually escaped from those who live in error. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they promise them liberty, they themselves are slaves of corruption; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 8:34; Rom. 6:16
      marker-yv: yv-n
    - type: text
      text: 'for by whom a person is overcome, by him also he is brought into bondage. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And many will follow their destructive ways, because of whom the way of truth will be blasphemed. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if, after they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 12:45
      marker-yv: yv-n
    - type: text
      text: 'have escaped the pollutions of the world through the knowledge of the Lord and Savior Jesus Christ, they are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 11:26; (Heb. 6:4–6)
      marker-yv: yv-n
    - type: text
      text: 'again entangled in them and overcome, the latter end is worse for them than the beginning. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 12:47
      marker-yv: yv-n
    - type: text
      text: 'it would have been better for them not to have known the way of righteousness, than having known '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' to turn from the holy commandment delivered to them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it has happened to them according to the true proverb: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 26:11
      marker-yv: yv-n
    - type: text
      text: “A dog returns to his own vomit,” and, “a sow, having washed, to her wallowing in the mire.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: By covetousness they will exploit you with deceptive words; for a long time their judgment has not been idle, and their destruction does not slumber.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Doom of False Teachers
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if God did not spare the angels who sinned, but cast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' down to hell and delivered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' into chains of darkness, to be reserved for judgment; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and did not spare the ancient world, but saved Noah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' eight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
      text: ', a preacher of righteousness, bringing in the flood on the world of the ungodly; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and turning the cities of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:1–26; Jude 7
      marker-yv: yv-n
    - type: text
      text: 'Sodom and Gomorrah into ashes, condemned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to destruction, making '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' an example to those who afterward would live ungodly; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 19:16, 29
      marker-yv: yv-n
    - type: text
      text: 'delivered righteous Lot, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' oppressed by the filthy conduct of the wicked '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(for that righteous man, dwelling among them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:139
      marker-yv: yv-n
    - type: text
      text: 'tormented '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' righteous soul from day to day by seeing and hearing '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' lawless deeds)— '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: then
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 34:15–19; 1 Cor. 10:13; Rev. 3:10
      marker-yv: yv-n
    - type: text
      text: 'the Lord knows how to deliver the godly out of temptations and to reserve the unjust under punishment for the day of judgment, '
