  - type: heading
    content: Destructive Doctrines
  - type: text
    content: 'But there were also false prophets among the people, even as there will be '
  - type: note
    content: Matt. 24:5, 24; 1 Tim. 4:1, 2
  - type: text
    content: 'false teachers among you, who will secretly bring in destructive heresies, even denying the Lord who bought them, '
  - type: text
    content: and
  - type: text
    content: ' bring on themselves swift destruction. '
  '10':
  - type: text
    content: 'and especially '
  - type: note
    content: Jude 4, 7, 8
  - type: text
    content: 'those who walk according to the flesh in the lust of uncleanness and despise authority. '
  - type: note
    content: Ex. 22:28; Jude 8
  - type: text
    content: They
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' presumptuous, self-willed. They are not afraid to speak evil of dignitaries, '
  '11':
  - type: text
    content: 'whereas '
  - type: note
    content: Jude 9
  - type: text
    content: angels, who are greater in power and might, do not bring a reviling accusation against them before the Lord.
  - type: heading
    content: Depravity of False Teachers
  '12':
  - type: text
    content: 'But these, '
  - type: note
    content: Jude 10
  - type: text
    content: 'like natural brute beasts made to be caught and destroyed, speak evil of the things they do not understand, and will utterly perish in their own corruption, '
  '13':
  - type: note
