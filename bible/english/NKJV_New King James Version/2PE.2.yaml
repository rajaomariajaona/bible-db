  - type: note
    content: 1 Cor. 11:20, 21
  - type: text
    content: 'they feast with you, '
  '14':
  - type: text
    content: 'having eyes full of adultery and that cannot cease from sin, enticing unstable souls. '
  - type: note
    content: Jude 11
  - type: text
    content: 'They have a heart trained in covetous practices, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
