  - type: text
    content: ' accursed children. '
  '15':
  - type: text
    content: 'They have forsaken the right way and gone astray, following the way of '
  - type: note
    content: Num. 22:5, 7; Deut. 23:4; Neh. 13:2; Jude 11; Rev. 2:14
  - type: text
    content: 'Balaam the '
  - type: text
