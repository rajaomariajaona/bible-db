  - type: text
    content: ' of Beor, who loved the wages of unrighteousness; '
  '16':
  - type: text
    content: 'but he was rebuked for his iniquity: a dumb donkey speaking with a man’s voice restrained the madness of the prophet.'
  '17':
  - type: note
    content: Jude 12, 13
  - type: text
    content: These are wells without water, clouds carried by a tempest, for whom is reserved the blackness of darkness forever.
  - type: heading
    content: Deceptions of False Teachers
  '18':
  - type: text
    content: 'For when they speak great swelling '
  - type: text
    content: words
  - type: text
    content: ' of emptiness, they allure through the lusts of the flesh, through lewdness, the ones who have actually escaped from those who live in error. '
  '19':
  - type: text
    content: 'While they promise them liberty, they themselves are slaves of corruption; '
  - type: note
    content: John 8:34; Rom. 6:16
  - type: text
    content: 'for by whom a person is overcome, by him also he is brought into bondage. '
  '2':
  - type: text
    content: 'And many will follow their destructive ways, because of whom the way of truth will be blasphemed. '
  '20':
  - type: text
    content: 'For if, after they '
  - type: note
    content: Matt. 12:45
  - type: text
    content: 'have escaped the pollutions of the world through the knowledge of the Lord and Savior Jesus Christ, they are '
  - type: note
    content: Luke 11:26; (Heb. 6:4–6)
  - type: text
    content: 'again entangled in them and overcome, the latter end is worse for them than the beginning. '
  '21':
  - type: text
    content: 'For '
  - type: note
    content: Luke 12:47
  - type: text
    content: 'it would have been better for them not to have known the way of righteousness, than having known '
  - type: text
    content: it,
  - type: text
    content: ' to turn from the holy commandment delivered to them. '
  '22':
  - type: text
    content: 'But it has happened to them according to the true proverb: '
  - type: note
    content: Prov. 26:11
  - type: text
    content: “A dog returns to his own vomit,” and, “a sow, having washed, to her wallowing in the mire.”
  '3':
  - type: text
    content: By covetousness they will exploit you with deceptive words; for a long time their judgment has not been idle, and their destruction does not slumber.
  - type: heading
