document_id: DEU.27,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Law Inscribed on Stones
  - type: text
    content: 'Now Moses, with the elders of Israel, commanded the people, saying: “Keep all the commandments which I command you today. '
  '10':
  - type: text
    content: 'Therefore you shall obey the voice of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and observe His commandments and His statutes which I command you today.”'
  - type: heading
    content: Curses Pronounced from Mount Ebal
  '11':
  - type: text
    content: 'And Moses commanded the people on the same day, saying, '
  '12':
  - type: text
    content: '“These shall stand '
  - type: note
    content: Deut. 11:29; Josh. 8:33; Judg. 9:7
  - type: text
    content: 'on Mount Gerizim to bless the people, when you have crossed over the Jordan: Simeon, Levi, Judah, Issachar, Joseph, and Benjamin; '
  '13':
  - type: text
    content: 'and '
  - type: note
    content: Deut. 11:29; Josh. 8:33
  - type: text
    content: 'these shall stand on Mount Ebal to curse: Reuben, Gad, Asher, Zebulun, Dan, and Naphtali.'
  '14':
  - type: text
    content: '“And '
  - type: note
    content: Deut. 33:10; Josh. 8:33; Dan. 9:11
  - type: text
    content: 'the Levites shall speak with a loud voice and say to all the men of Israel: '
  '15':
  - type: note
    content: Ex. 20:4, 23; 34:17; Lev. 19:4; 26:1; Deut. 4:16, 23; Is. 44:9; Hos. 13:2
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who makes a carved or molded image, an abomination to the '
  - type: heading
    content: Lord
  - type: text
    content: ', the work of the hands of the craftsman, and sets '
  - type: text
    content: it
  - type: text
    content: ' up in secret.’'
  - type: note
    content: Num. 5:22; Jer. 11:5; 1 Cor. 14:16
  - type: text
    content: “And all the people shall answer and say, ‘Amen!’
  '16':
  - type: note
    content: Ex. 20:12; Lev. 19:3; 20:9; Deut. 5:16; 21:18–21; Ezek. 22:7
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who treats his father or his mother with contempt.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '17':
  - type: note
    content: Deut. 19:14; Prov. 22:28
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who moves his neighbor’s landmark.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '18':
  - type: note
    content: Lev. 19:14
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who makes the blind to wander off the road.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '19':
  - type: note
    content: Ex. 22:21, 22; 23:9; Lev. 19:33; Deut. 10:18; 24:17
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who perverts the justice due the stranger, the fatherless, and widow.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '2':
  - type: text
    content: 'And it shall be, on the day '
  - type: note
    content: Josh. 4:1
  - type: text
    content: 'when you cross over the Jordan to the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you, that '
  - type: note
    content: Josh. 8:32
  - type: text
    content: 'you shall set up for yourselves large stones, and whitewash them with lime. '
  '20':
  - type: note
    content: Lev. 18:8; 20:11; Deut. 22:30; 1 Cor. 5:1
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who lies with his father’s wife, because he has uncovered his father’s bed.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '21':
  - type: note
    content: Ex. 22:19; Lev. 18:23; 20:15, 16
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who lies with any kind of animal.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '22':
  - type: note
    content: Lev. 18:9
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who lies with his sister, the daughter of his father or the daughter of his mother.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '23':
  - type: note
    content: Lev. 18:17; 20:14
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who lies with his mother-in-law.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '24':
  - type: note
    content: Ex. 20:13; 21:12; Lev. 24:17; Num. 35:30, 31
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who attacks his neighbor secretly.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '25':
  - type: note
    content: Ex. 23:7; Ps. 15:5; Ezek. 22:12
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who takes a bribe to slay an innocent person.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '26':
  - type: note
    content: Ps. 119:21; Jer. 11:3; Gal. 3:10
  - type: text
    content: '‘Cursed '
  - type: text
    content: is
  - type: text
    content: ' the one who does not confirm '
  - type: text
    content: all
  - type: text
    content: ' the words of this law by observing them.’'
  - type: text
    content: “And all the people shall say, ‘Amen!’
  '3':
  - type: text
    content: 'You shall write on them all the words of this law, when you have crossed over, that you may enter the land which the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God is giving you, '
  - type: note
    content: Ex. 3:8
  - type: text
    content: '‘a land flowing with milk and honey,’ just as the '
  - type: heading
    content: Lord
  - type: text
    content: ' God of your fathers promised you. '
  '4':
  - type: text
    content: 'Therefore it shall be, when you have crossed over the Jordan, '
  - type: text
    content: that
  - type: text
    content: ' '
  - type: note
    content: Deut. 11:29; Josh. 8:30, 31
  - type: text
    content: 'on Mount Ebal you shall set up these stones, which I command you today, and you shall whitewash them with lime. '
  '5':
  - type: text
    content: 'And there you shall build an altar to the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, an altar of stones; '
  - type: note
    content: Ex. 20:25; Josh. 8:31
  - type: text
    content: 'you shall not use an iron '
  - type: text
    content: tool
  - type: text
    content: ' on them. '
  '6':
  - type: text
    content: 'You shall build with whole stones the altar of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God, and offer burnt offerings on it to the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '7':
  - type: text
    content: 'You shall offer peace offerings, and shall eat there, and '
  - type: note
    content: Deut. 26:11
  - type: text
    content: 'rejoice before the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
  '8':
  - type: text
    content: 'And you shall '
  - type: note
    content: Josh. 8:32
  - type: text
    content: write very plainly on the stones all the words of this law.”
  '9':
  - type: text
    content: 'Then Moses and the priests, the Levites, spoke to all Israel, saying, “Take heed and listen, O Israel: '
  - type: note
    content: Deut. 26:18
  - type: text
    content: 'This day you have become the people of the '
  - type: heading
    content: Lord
  - type: text
    content: ' your God. '
