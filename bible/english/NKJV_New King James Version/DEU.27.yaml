document_id: DEU.27,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law Inscribed on Stones
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Moses, with the elders of Israel, commanded the people, saying: “Keep all the commandments which I command you today. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore you shall obey the voice of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, and observe His commandments and His statutes which I command you today.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Curses Pronounced from Mount Ebal
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses commanded the people on the same day, saying, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“These shall stand '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 11:29; Josh. 8:33; Judg. 9:7
      marker-yv: yv-n
    - type: text
      text: 'on Mount Gerizim to bless the people, when you have crossed over the Jordan: Simeon, Levi, Judah, Issachar, Joseph, and Benjamin; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 11:29; Josh. 8:33
      marker-yv: yv-n
    - type: text
      text: 'these shall stand on Mount Ebal to curse: Reuben, Gad, Asher, Zebulun, Dan, and Naphtali.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 33:10; Josh. 8:33; Dan. 9:11
      marker-yv: yv-n
    - type: text
      text: 'the Levites shall speak with a loud voice and say to all the men of Israel: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:4, 23; 34:17; Lev. 19:4; 26:1; Deut. 4:16, 23; Is. 44:9; Hos. 13:2
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who makes a carved or molded image, an abomination to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the work of the hands of the craftsman, and sets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' up in secret.’'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 5:22; Jer. 11:5; 1 Cor. 14:16
      marker-yv: yv-n
    - type: text
      text: “And all the people shall answer and say, ‘Amen!’
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:12; Lev. 19:3; 20:9; Deut. 5:16; 21:18–21; Ezek. 22:7
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who treats his father or his mother with contempt.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 19:14; Prov. 22:28
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who moves his neighbor’s landmark.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 19:14
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who makes the blind to wander off the road.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:21, 22; 23:9; Lev. 19:33; Deut. 10:18; 24:17
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who perverts the justice due the stranger, the fatherless, and widow.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it shall be, on the day '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 4:1
      marker-yv: yv-n
    - type: text
      text: 'when you cross over the Jordan to the land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 8:32
      marker-yv: yv-n
    - type: text
      text: 'you shall set up for yourselves large stones, and whitewash them with lime. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:8; 20:11; Deut. 22:30; 1 Cor. 5:1
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who lies with his father’s wife, because he has uncovered his father’s bed.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:19; Lev. 18:23; 20:15, 16
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who lies with any kind of animal.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:9
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who lies with his sister, the daughter of his father or the daughter of his mother.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:17; 20:14
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who lies with his mother-in-law.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:13; 21:12; Lev. 24:17; Num. 35:30, 31
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who attacks his neighbor secretly.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:7; Ps. 15:5; Ezek. 22:12
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who takes a bribe to slay an innocent person.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:21; Jer. 11:3; Gal. 3:10
      marker-yv: yv-n
    - type: text
      text: '‘Cursed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the one who does not confirm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: all
    - type: text
      text: ' the words of this law by observing them.’'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “And all the people shall say, ‘Amen!’
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall write on them all the words of this law, when you have crossed over, that you may enter the land which the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:8
      marker-yv: yv-n
    - type: text
      text: '‘a land flowing with milk and honey,’ just as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God of your fathers promised you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore it shall be, when you have crossed over the Jordan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 11:29; Josh. 8:30, 31
      marker-yv: yv-n
    - type: text
      text: 'on Mount Ebal you shall set up these stones, which I command you today, and you shall whitewash them with lime. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there you shall build an altar to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, an altar of stones; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:25; Josh. 8:31
      marker-yv: yv-n
    - type: text
      text: 'you shall not use an iron '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tool
    - type: text
      text: ' on them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall build with whole stones the altar of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, and offer burnt offerings on it to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You shall offer peace offerings, and shall eat there, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 26:11
      marker-yv: yv-n
    - type: text
      text: 'rejoice before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 8:32
      marker-yv: yv-n
    - type: text
      text: write very plainly on the stones all the words of this law.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses and the priests, the Levites, spoke to all Israel, saying, “Take heed and listen, O Israel: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 26:18
      marker-yv: yv-n
    - type: text
      text: 'This day you have become the people of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
