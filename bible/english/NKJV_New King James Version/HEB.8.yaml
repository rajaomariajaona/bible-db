  '1':
  - type: heading
    content: The New Priestly Service
  - type: text
    content: 'Now '
  - type: text
    content: this
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' the main point of the things we are saying: We have such a High Priest, '
  - type: note
    content: Ps. 68:18; 110:1; Eph. 1:20; Col. 3:1; Heb. 2:17; 3:1; 10:12
  - type: text
    content: 'who is seated at the right hand of the throne of the Majesty in the heavens, '
  '10':
  - type: text
    content: 'For this '
  - type: text
    content: is
  - type: text
    content: ' the covenant that I will make with the house of Israel after those days, says the '
  - type: note
    content: Jer. 31:33; Rom. 11:27; Heb. 10:16
  - type: heading
    content: Lord
  - type: text
    content: ': I will put My laws in their mind and write them on their hearts; and '
  - type: note
    content: Zech. 8:8
  - type: text
    content: 'I will be their God, and they shall be My people. '
  '11':
  - type: note
    content: Is. 54:13; John 6:45; (1 John 2:27)
  - type: text
    content: 'None of them shall teach his neighbor, and none his brother, saying, ‘Know the '
  - type: note
    content: Jer. 31:34
  - type: heading
    content: Lord
  - type: text
    content: ',’ for all shall know Me, from the least of them to the greatest of them. '
  '12':
  - type: text
    content: 'For I will be merciful to their unrighteousness, '
  - type: note
    content: Rom. 11:27
  - type: text
    content: and their sins and their lawless deeds I will remember no more.”
  '13':
  - type: note
    content: (2 Cor. 5:17); Heb. 1:11
  - type: text
    content: 'In that He says, “A new '
  - type: text
    content: covenant
  - type: text
    content: ',” He has made the first obsolete. Now what is becoming obsolete and growing old is ready to vanish away.'
  '2':
  - type: text
    content: 'a Minister of '
  - type: note
    content: Heb. 9:8, 12
  - type: text
    content: 'the sanctuary and of '
  - type: note
    content: Heb. 9:11, 24
  - type: text
    content: the true tabernacle which the Lord erected, and not man.
  '3':
  - type: text
    content: 'For '
  - type: note
    content: (Rom. 4:25; 5:6, 8; Gal. 2:20; Eph. 5:2); Heb. 5:1; 8:4
  - type: text
    content: 'every high priest is appointed to offer both gifts and sacrifices. Therefore '
  - type: note
    content: (Eph. 5:2; Heb. 9:14)
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' necessary that this One also have something to offer. '
  '4':
  - type: text
    content: 'For if He were on earth, He would not be a priest, since there are priests who offer the gifts according to the law; '
  '5':
  - type: text
    content: 'who serve '
  - type: note
    content: Heb. 9:23, 24
  - type: text
    content: 'the copy and '
  - type: note
    content: Col. 2:17; Heb. 10:1
  - type: text
    content: 'shadow of the heavenly things, as Moses was divinely instructed when he was about to make the tabernacle. For He said, '
  - type: note
    content: Ex. 25:40
  - type: text
    content: '“See '
  - type: text
    content: that
  - type: text
    content: ' you make all things according to the pattern shown you on the mountain.” '
  '6':
  - type: text
    content: 'But now '
  - type: note
    content: (2 Cor. 3:6–8)
  - type: text
    content: 'He has obtained a more excellent ministry, inasmuch as He is also Mediator of a '
  - type: note
    content: (Luke 22:20); Heb. 7:22
  - type: text
    content: better covenant, which was established on better promises.
  - type: heading
    content: A New Covenant
  '7':
  - type: text
    content: 'For if that '
  - type: note
    content: Ex. 3:8; 19:5
  - type: text
    content: 'first '
  - type: text
    content: covenant
  - type: text
    content: ' had been faultless, then no place would have been sought for a second. '
  '8':
  - type: text
    content: 'Because finding fault with them, He says: '
  - type: note
    content: Jer. 31:31–34
  - type: text
    content: '“Behold, the days are coming, says the '
  - type: heading
    content: Lord
  - type: text
    content: ', when I will make a new covenant with the house of Israel and with the house of Judah— '
  '9':
  - type: text
    content: 'not according to the covenant that I made with their fathers in the day when I took them by the hand to lead them out of the land of Egypt; because they did not continue in My covenant, and I disregarded them, says the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
