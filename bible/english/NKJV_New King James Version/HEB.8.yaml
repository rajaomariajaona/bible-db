    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the main point of the things we are saying: We have such a High Priest, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 68:18; 110:1; Eph. 1:20; Col. 3:1; Heb. 2:17; 3:1; 10:12
    marker-yv: yv-n
  - type: text
    text: 'who is seated at the right hand of the throne of the Majesty in the heavens, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'a Minister of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 9:8, 12
    marker-yv: yv-n
  - type: text
    text: 'the sanctuary and of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 9:11, 24
    marker-yv: yv-n
  - type: text
    text: the true tabernacle which the Lord erected, and not man.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 4:25; 5:6, 8; Gal. 2:20; Eph. 5:2); Heb. 5:1; 8:4
    marker-yv: yv-n
  - type: text
    text: 'every high priest is appointed to offer both gifts and sacrifices. Therefore '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 5:2; Heb. 9:14)
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' necessary that this One also have something to offer. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For if He were on earth, He would not be a priest, since there are priests who offer the gifts according to the law; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'who serve '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 9:23, 24
    marker-yv: yv-n
  - type: text
    text: 'the copy and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 2:17; Heb. 10:1
    marker-yv: yv-n
  - type: text
    text: 'shadow of the heavenly things, as Moses was divinely instructed when he was about to make the tabernacle. For He said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:40
    marker-yv: yv-n
  - type: text
    text: '“See '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that
  - type: text
    text: ' you make all things according to the pattern shown you on the mountain.” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But now '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 3:6–8)
    marker-yv: yv-n
  - type: text
    text: 'He has obtained a more excellent ministry, inasmuch as He is also Mediator of a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Luke 22:20); Heb. 7:22
    marker-yv: yv-n
  - type: text
    text: better covenant, which was established on better promises.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A New Covenant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For if that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 3:8; 19:5
    marker-yv: yv-n
  - type: text
    text: 'first '
  - type: usfm
    marker: it
    children:
    - type: text
      text: covenant
  - type: text
    text: ' had been faultless, then no place would have been sought for a second. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Because finding fault with them, He says: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 31:31–34
    marker-yv: yv-n
  - type: text
    text: '“Behold, the days are coming, says the '
  - type: usfm
    marker: sc
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Lord
  - type: text
    text: ', when I will make a new covenant with the house of Israel and with the house of Judah— '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'not according to the covenant that I made with their fathers in the day when I took them by the hand to lead them out of the land of Egypt; because they did not continue in My covenant, and I disregarded them, says the '
  - type: usfm
    marker: sc
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the covenant that I will make with the house of Israel after those days, says the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 31:33; Rom. 11:27; Heb. 10:16
    marker-yv: yv-n
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ': I will put My laws in their mind and write them on their hearts; and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Zech. 8:8
    marker-yv: yv-n
  - type: text
    text: 'I will be their God, and they shall be My people. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 54:13; John 6:45; (1 John 2:27)
    marker-yv: yv-n
  - type: text
    text: 'None of them shall teach his neighbor, and none his brother, saying, ‘Know the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 31:34
    marker-yv: yv-n
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ',’ for all shall know Me, from the least of them to the greatest of them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For I will be merciful to their unrighteousness, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 11:27
    marker-yv: yv-n
  - type: text
    text: and their sins and their lawless deeds I will remember no more.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 5:17); Heb. 1:11
    marker-yv: yv-n
  - type: text
    text: 'In that He says, “A new '
  - type: usfm
    marker: it
    children:
    - type: text
      text: covenant
  - type: text
    text: ',” He has made the first obsolete. Now what is becoming obsolete and growing old is ready to vanish away.'
