document_id: JER.27,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Symbol of the Bonds and Yokes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the beginning of the reign of Jehoiakim the son of Josiah, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 27:3, 12, 20; 28:1
      marker-yv: yv-n
    - type: text
      text: 'king of Judah, this word came to Jeremiah from the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For they prophesy a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 23:16, 32; 28:15
      marker-yv: yv-n
    - type: text
      text: 'lie to you, to remove you far from your land; and I will drive you out, and you will perish. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But the nations that bring their necks under the yoke of the king of Babylon and serve him, I will let them remain in their own land,’ says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', ‘and they shall till it and dwell in it.’ ” ’ ”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I also spoke to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 28:1; 38:17
      marker-yv: yv-n
    - type: text
      text: 'Zedekiah king of Judah according to all these words, saying, “Bring your necks under the yoke of the king of Babylon, and serve him and his people, and live! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Prov. 8:36); Jer. 27:8; 38:23; (Ezek. 18:31)
      marker-yv: yv-n
    - type: text
      text: 'Why will you die, you and your people, by the sword, by the famine, and by the pestilence, as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken against the nation that will not serve the king of Babylon? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Therefore '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 23:16
      marker-yv: yv-n
    - type: text
      text: 'do not listen to the words of the prophets who speak to you, saying, ‘You shall not serve the king of Babylon,’ for they prophesy '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 14:14; 23:21; 29:8, 9; Ezek. 13:22
      marker-yv: yv-n
    - type: text
      text: 'a lie to you; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'for I have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 23:21; 29:9
      marker-yv: yv-n
    - type: text
      text: 'not sent them,” says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “yet they prophesy a lie in My name, that I may drive you out, and that you may perish, you and the prophets who prophesy to you.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Also I spoke to the priests and to all this people, saying, “Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ': ‘Do not listen to the words of your prophets who prophesy to you, saying, “Behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:13; 2 Chr. 36:7, 10; Jer. 28:3; Dan. 1:2
      marker-yv: yv-n
    - type: text
      text: 'the vessels of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house will now shortly be brought back from Babylon”; for they prophesy a lie to you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Do not listen to them; serve the king of Babylon, and live! Why should this city be laid waste? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But if they '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' prophets, and if the word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is with them, let them now make intercession to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, that the vessels which are left in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' the house of the king of Judah, and at Jerusalem, do not go to Babylon.’'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“For thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 7:15; 2 Kin. 25:13–17; Jer. 52:17, 20, 21
      marker-yv: yv-n
    - type: text
      text: 'concerning the pillars, concerning the Sea, concerning the carts, and concerning the remainder of the vessels that remain in this city, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to me: ‘Make for yourselves bonds and yokes, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 28:10, 12; Ezek. 4:1; 12:3; 24:3
      marker-yv: yv-n
    - type: text
      text: 'and put them on your neck, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'which Nebuchadnezzar king of Babylon did not take, when he carried away '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 24:14, 15; 2 Chr. 36:10, 18; Jer. 24:1
      marker-yv: yv-n
    - type: text
      text: 'captive Jeconiah the son of Jehoiakim, king of Judah, from Jerusalem to Babylon, and all the nobles of Judah and Jerusalem— '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'yes, thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel, concerning the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 20:5
      marker-yv: yv-n
    - type: text
      text: 'vessels that remain in the house of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and in the house of the king of Judah and of Jerusalem: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '‘They shall be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 25:13; 2 Chr. 36:18
      marker-yv: yv-n
    - type: text
      text: 'carried to Babylon, and there they shall be until the day that I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:21; Jer. 29:10; 32:5
      marker-yv: yv-n
    - type: text
      text: 'visit them,’ says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. ‘Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 1:7; 7:19
      marker-yv: yv-n
    - type: text
      text: I will bring them up and restore them to this place.’ ”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'and send them to the king of Edom, the king of Moab, the king of the Ammonites, the king of Tyre, and the king of Sidon, by the hand of the messengers who come to Jerusalem to Zedekiah king of Judah. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And command them to say to their masters, “Thus says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' of hosts, the God of Israel—thus you shall say to your masters: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 115:15; 146:6; Is. 45:12
      marker-yv: yv-n
    - type: text
      text: '‘I have made the earth, the man and the beast that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' on the ground, by My great power and by My outstretched arm, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 9:29; Ps. 115:16; Jer. 32:17; Dan. 4:17, 25, 32
      marker-yv: yv-n
    - type: text
      text: 'have given it to whom it seemed proper to Me. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 28:14
      marker-yv: yv-n
    - type: text
      text: 'And now I have given all these lands into the hand of Nebuchadnezzar the king of Babylon, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:9; 43:10; Ezek. 29:18, 20
      marker-yv: yv-n
    - type: text
      text: 'My servant; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 28:14; Dan. 2:38
      marker-yv: yv-n
    - type: text
      text: 'the beasts of the field I have also given him to serve him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 36:20
      marker-yv: yv-n
    - type: text
      text: 'So all nations shall serve him and his son and his son’s son, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:12; 50:27; (Dan. 5:26); Zech. 2:8, 9
      marker-yv: yv-n
    - type: text
      text: 'until the time of his land comes; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 25:14
      marker-yv: yv-n
    - type: text
      text: 'and then many nations and great kings shall make him serve them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And it shall be, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' the nation and kingdom which will not serve Nebuchadnezzar the king of Babylon, and which will not put its neck under the yoke of the king of Babylon, that nation I will punish,’ says the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', ‘with the sword, the famine, and the pestilence, until I have consumed them by his hand. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Therefore do not listen to your prophets, your diviners, your dreamers, your soothsayers, or your sorcerers, who speak to you, saying, “You shall not serve the king of Babylon.” '
