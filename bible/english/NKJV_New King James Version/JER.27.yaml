document_id: JER.27,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Symbol of the Bonds and Yokes
  - type: text
    content: 'In the beginning of the reign of Jehoiakim the son of Josiah, '
  - type: note
    content: Jer. 27:3, 12, 20; 28:1
  - type: text
    content: 'king of Judah, this word came to Jeremiah from the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, '
  '10':
  - type: text
    content: 'For they prophesy a '
  - type: note
    content: Jer. 23:16, 32; 28:15
  - type: text
    content: 'lie to you, to remove you far from your land; and I will drive you out, and you will perish. '
  '11':
  - type: text
    content: 'But the nations that bring their necks under the yoke of the king of Babylon and serve him, I will let them remain in their own land,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: ', ‘and they shall till it and dwell in it.’ ” ’ ”'
  '12':
  - type: text
    content: 'I also spoke to '
  - type: note
    content: Jer. 28:1; 38:17
  - type: text
    content: 'Zedekiah king of Judah according to all these words, saying, “Bring your necks under the yoke of the king of Babylon, and serve him and his people, and live! '
  '13':
  - type: note
    content: (Prov. 8:36); Jer. 27:8; 38:23; (Ezek. 18:31)
  - type: text
    content: 'Why will you die, you and your people, by the sword, by the famine, and by the pestilence, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken against the nation that will not serve the king of Babylon? '
  '14':
  - type: text
    content: 'Therefore '
  - type: note
    content: Jer. 23:16
  - type: text
    content: 'do not listen to the words of the prophets who speak to you, saying, ‘You shall not serve the king of Babylon,’ for they prophesy '
  - type: note
    content: Jer. 14:14; 23:21; 29:8, 9; Ezek. 13:22
  - type: text
    content: 'a lie to you; '
  '15':
  - type: text
    content: 'for I have '
  - type: note
    content: Jer. 23:21; 29:9
  - type: text
    content: 'not sent them,” says the '
  - type: heading
    content: Lord
  - type: text
    content: ', “yet they prophesy a lie in My name, that I may drive you out, and that you may perish, you and the prophets who prophesy to you.”'
  '16':
  - type: text
    content: 'Also I spoke to the priests and to all this people, saying, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Do not listen to the words of your prophets who prophesy to you, saying, “Behold, '
  - type: note
    content: 2 Kin. 24:13; 2 Chr. 36:7, 10; Jer. 28:3; Dan. 1:2
  - type: text
    content: 'the vessels of the '
  - type: heading
    content: Lord
  - type: text
    content: '’s house will now shortly be brought back from Babylon”; for they prophesy a lie to you. '
  '17':
  - type: text
    content: 'Do not listen to them; serve the king of Babylon, and live! Why should this city be laid waste? '
  '18':
  - type: text
    content: 'But if they '
  - type: text
    content: are
  - type: text
    content: ' prophets, and if the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' is with them, let them now make intercession to the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, that the vessels which are left in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', '
  - type: text
    content: in
  - type: text
    content: ' the house of the king of Judah, and at Jerusalem, do not go to Babylon.’'
  '19':
  - type: text
    content: '“For thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts '
  - type: note
    content: 1 Kin. 7:15; 2 Kin. 25:13–17; Jer. 52:17, 20, 21
  - type: text
    content: 'concerning the pillars, concerning the Sea, concerning the carts, and concerning the remainder of the vessels that remain in this city, '
  '2':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' to me: ‘Make for yourselves bonds and yokes, '
  - type: note
    content: Jer. 28:10, 12; Ezek. 4:1; 12:3; 24:3
  - type: text
    content: 'and put them on your neck, '
  '20':
  - type: text
    content: 'which Nebuchadnezzar king of Babylon did not take, when he carried away '
  - type: note
    content: 2 Kin. 24:14, 15; 2 Chr. 36:10, 18; Jer. 24:1
  - type: text
    content: 'captive Jeconiah the son of Jehoiakim, king of Judah, from Jerusalem to Babylon, and all the nobles of Judah and Jerusalem— '
  '21':
  - type: text
    content: 'yes, thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel, concerning the '
  - type: note
    content: Jer. 20:5
  - type: text
    content: 'vessels that remain in the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ', and in the house of the king of Judah and of Jerusalem: '
  '22':
  - type: text
    content: '‘They shall be '
  - type: note
    content: 2 Kin. 25:13; 2 Chr. 36:18
  - type: text
    content: 'carried to Babylon, and there they shall be until the day that I '
  - type: note
    content: 2 Chr. 36:21; Jer. 29:10; 32:5
  - type: text
    content: 'visit them,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: '. ‘Then '
  - type: note
    content: Ezra 1:7; 7:19
  - type: text
    content: I will bring them up and restore them to this place.’ ”
  '3':
  - type: text
    content: 'and send them to the king of Edom, the king of Moab, the king of the Ammonites, the king of Tyre, and the king of Sidon, by the hand of the messengers who come to Jerusalem to Zedekiah king of Judah. '
  '4':
  - type: text
    content: 'And command them to say to their masters, “Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts, the God of Israel—thus you shall say to your masters: '
  '5':
  - type: note
    content: Ps. 115:15; 146:6; Is. 45:12
  - type: text
    content: '‘I have made the earth, the man and the beast that '
  - type: text
    content: are
  - type: text
    content: ' on the ground, by My great power and by My outstretched arm, and '
  - type: note
    content: Deut. 9:29; Ps. 115:16; Jer. 32:17; Dan. 4:17, 25, 32
  - type: text
    content: 'have given it to whom it seemed proper to Me. '
  '6':
  - type: note
    content: Jer. 28:14
  - type: text
    content: 'And now I have given all these lands into the hand of Nebuchadnezzar the king of Babylon, '
  - type: note
    content: Jer. 25:9; 43:10; Ezek. 29:18, 20
  - type: text
    content: 'My servant; and '
  - type: note
    content: Jer. 28:14; Dan. 2:38
  - type: text
    content: 'the beasts of the field I have also given him to serve him. '
  '7':
  - type: note
    content: 2 Chr. 36:20
  - type: text
    content: 'So all nations shall serve him and his son and his son’s son, '
  - type: note
    content: Jer. 25:12; 50:27; (Dan. 5:26); Zech. 2:8, 9
  - type: text
    content: 'until the time of his land comes; '
  - type: note
    content: Jer. 25:14
  - type: text
    content: 'and then many nations and great kings shall make him serve them. '
  '8':
  - type: text
    content: 'And it shall be, '
  - type: text
    content: that
  - type: text
    content: ' the nation and kingdom which will not serve Nebuchadnezzar the king of Babylon, and which will not put its neck under the yoke of the king of Babylon, that nation I will punish,’ says the '
  - type: heading
    content: Lord
  - type: text
    content: ', ‘with the sword, the famine, and the pestilence, until I have consumed them by his hand. '
  '9':
  - type: text
    content: 'Therefore do not listen to your prophets, your diviners, your dreamers, your soothsayers, or your sorcerers, who speak to you, saying, “You shall not serve the king of Babylon.” '
