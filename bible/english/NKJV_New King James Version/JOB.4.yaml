document_id: JOB.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Eliphaz: Job Has Sinned'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Eliphaz the Temanite answered and said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: If
  - type: text
    text: ' one attempts a word with you, will you become weary?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: But who can withhold himself from speaking?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Surely you have instructed many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 35:3
    marker-yv: yv-n
  - type: text
    text: have strengthened weak hands.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Your words have upheld him who was stumbling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 35:3
    marker-yv: yv-n
  - type: text
    text: have strengthened the feeble knees;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But now it comes upon you, and you are weary;
- type: usfm
  marker: q2
  children:
  - type: text
    text: It touches you, and you are troubled.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is
  - type: text
    text: ' not '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 1:1
    marker-yv: yv-n
  - type: text
    text: 'your reverence '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 3:26
    marker-yv: yv-n
  - type: text
    text: your confidence?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the integrity of your ways your hope?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Remember now, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Job 8:20; 36:6, 7; Ps. 37:25)
    marker-yv: yv-n
  - type: text
    text: 'who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ever
  - type: text
    text: ' perished being innocent?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Or where were the upright '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ever
  - type: text
    text: ' cut off?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Even as I have seen,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Job 15:31, 35; Prov. 22:8; Hos. 10:13; Gal. 6:7)
    marker-yv: yv-n
  - type: text
    text: Those who plow iniquity
- type: usfm
  marker: q2
  children:
  - type: text
    text: And sow trouble reap the same.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: By the blast of God they perish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And by the breath of His anger they are consumed.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The roaring of the lion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: The voice of the fierce lion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 5:15; Ps. 58:6
    marker-yv: yv-n
  - type: text
    text: the teeth of the young lions are broken.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 29:17; Ps. 34:10
    marker-yv: yv-n
  - type: text
    text: The old lion perishes for lack of prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And the cubs of the lioness are scattered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Now a word was secretly brought to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And my ear received a whisper of it.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 33:15
    marker-yv: yv-n
  - type: text
    text: In disquieting thoughts from the visions of the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: When deep sleep falls on men,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fear came upon me, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hab. 3:16
    marker-yv: yv-n
  - type: text
    text: trembling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Which made all my bones shake.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then a spirit passed before my face;
- type: usfm
  marker: q2
  children:
  - type: text
    text: The hair on my body stood up.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: It stood still,
- type: usfm
  marker: q2
  children:
  - type: text
    text: But I could not discern its appearance.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'A form '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' before my eyes;'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' silence;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Then I heard a voice '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'saying:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ‘Can a mortal be more righteous than God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can a man be more pure than his Maker?
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'If He '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 15:15
    marker-yv: yv-n
  - type: text
    text: puts no trust in His servants,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: If
  - type: text
    text: ' He charges His angels with error,'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: How much more those who dwell in houses of clay,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Whose foundation is in the dust,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Who
  - type: text
    text: ' are crushed before a moth?'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 90:5, 6
    marker-yv: yv-n
  - type: text
    text: They are broken in pieces from morning till evening;
- type: usfm
  marker: q2
  children:
  - type: text
    text: They perish forever, with no one regarding.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Does not their own excellence go away?
- type: usfm
  marker: q2
  children:
  - type: text
    text: They die, even without wisdom.’
