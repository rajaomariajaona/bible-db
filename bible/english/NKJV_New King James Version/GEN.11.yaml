document_id: GEN.11,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tower of Babel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now the whole earth had one language and one speech. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:22–25; 1 Chr. 1:17
      marker-yv: yv-n
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the genealogy of Shem: Shem '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' one hundred years old, and begot Arphaxad two years after the flood. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: After he begot Arphaxad, Shem lived five hundred years, and begot sons and daughters.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Arphaxad lived thirty-five years, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 3:35
      marker-yv: yv-n
    - type: text
      text: 'and begot Salah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: After he begot Salah, Arphaxad lived four hundred and three years, and begot sons and daughters.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Salah lived thirty years, and begot Eber. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: After he begot Eber, Salah lived four hundred and three years, and begot sons and daughters.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 1:19
      marker-yv: yv-n
    - type: text
      text: 'Eber lived thirty-four years, and begot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 3:35
      marker-yv: yv-n
    - type: text
      text: 'Peleg. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: After he begot Peleg, Eber lived four hundred and thirty years, and begot sons and daughters.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Peleg lived thirty years, and begot Reu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: After he begot Reu, Peleg lived two hundred and nine years, and begot sons and daughters.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And it came to pass, as they journeyed from the east, that they found a plain in the land '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:10; 14:1; Dan. 1:2
      marker-yv: yv-n
    - type: text
      text: 'of Shinar, and they dwelt there. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Reu lived thirty-two years, and begot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 3:35
      marker-yv: yv-n
    - type: text
      text: 'Serug. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: After he begot Serug, Reu lived two hundred and seven years, and begot sons and daughters.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Serug lived thirty years, and begot Nahor. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: After he begot Nahor, Serug lived two hundred years, and begot sons and daughters.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Nahor lived twenty-nine years, and begot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 11:31; Josh. 24:2; Luke 3:34
      marker-yv: yv-n
    - type: text
      text: 'Terah. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: After he begot Terah, Nahor lived one hundred and nineteen years, and begot sons and daughters.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Now Terah lived seventy years, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 24:2; 1 Chr. 1:26
      marker-yv: yv-n
    - type: text
      text: begot Abram, Nahor, and Haran.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Terah’s Descendants
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the genealogy of Terah: Terah begot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 11:31; 17:5
      marker-yv: yv-n
    - type: text
      text: 'Abram, Nahor, and Haran. Haran begot Lot. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And Haran died before his father Terah in his native land, in Ur of the Chaldeans. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then Abram and Nahor took wives: the name of Abram’s wife '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:15; 20:12
      marker-yv: yv-n
    - type: text
      text: 'Sarai, and the name of Nahor’s wife, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:20, 23; 24:15
      marker-yv: yv-n
    - type: text
      text: 'Milcah, the daughter of Haran the father of Milcah and the father of Iscah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then they said to one another, “Come, let us make bricks and bake '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' thoroughly.” They had brick for stone, and they had asphalt for mortar. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: But
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 16:1, 2; Luke 1:36
      marker-yv: yv-n
    - type: text
      text: ' Sarai was barren; she had no child.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'And Terah '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:1
      marker-yv: yv-n
    - type: text
      text: 'took his son Abram and his grandson Lot, the son of Haran, and his daughter-in-law Sarai, his son Abram’s wife, and they went out with them from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:7; Neh. 9:7; Acts 7:4
      marker-yv: yv-n
    - type: text
      text: 'Ur of the Chaldeans to go to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:19
      marker-yv: yv-n
    - type: text
      text: 'the land of Canaan; and they came to Haran and dwelt there. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: So the days of Terah were two hundred and five years, and Terah died in Haran.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And they said, “Come, let us build ourselves a city, and a tower '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:28; 9:1; Ps. 107:26
      marker-yv: yv-n
    - type: text
      text: 'whose top '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in the heavens; let us make a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 6:4; 2 Sam. 8:13
      marker-yv: yv-n
    - type: text
      text: 'name for ourselves, lest we '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:27
      marker-yv: yv-n
    - type: text
      text: be scattered abroad over the face of the whole earth.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 18:21; Ex. 3:8; 19:11, 18, 20
      marker-yv: yv-n
    - type: text
      text: 'But the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came down to see the city and the tower which the sons of men had built. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “Indeed '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 9:19; Acts 17:26
      marker-yv: yv-n
    - type: text
      text: 'the people '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' one and they all have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 11:1
      marker-yv: yv-n
    - type: text
      text: 'one language, and this is what they begin to do; now nothing that they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:21; Ps. 2:1
      marker-yv: yv-n
    - type: text
      text: 'propose to do will be withheld from them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Come, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 1:26
      marker-yv: yv-n
    - type: text
      text: 'let Us go down and there '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 42:23; Ex. 4:11; Deut. 28:49; Is. 33:19; Jer. 5:15
      marker-yv: yv-n
    - type: text
      text: 'confuse their language, that they may not understand one another’s speech.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 11:4; Deut. 32:8; Ps. 92:9; (Luke 1:51)
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' scattered them abroad from there '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:25, 32
      marker-yv: yv-n
    - type: text
      text: 'over the face of all the earth, and they ceased building the city. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Therefore its name is called Babel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 14:23
      marker-yv: yv-n
    - type: text
      text: 'because there the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' confused the language of all the earth; and from there the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' scattered them abroad over the face of all the earth.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shem’s Descendants
    marker-yv: yv-h
