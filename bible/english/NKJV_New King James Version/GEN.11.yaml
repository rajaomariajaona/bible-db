document_id: GEN.11,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tower of Babel
  - type: text
    content: 'Now the whole earth had one language and one speech. '
  '10':
  - type: note
    content: Gen. 10:22–25; 1 Chr. 1:17
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the genealogy of Shem: Shem '
  - type: text
    content: was
  - type: text
    content: ' one hundred years old, and begot Arphaxad two years after the flood. '
  '11':
  - type: text
    content: After he begot Arphaxad, Shem lived five hundred years, and begot sons and daughters.
  '12':
  - type: text
    content: 'Arphaxad lived thirty-five years, '
  - type: note
    content: Luke 3:35
  - type: text
    content: 'and begot Salah. '
  '13':
  - type: text
    content: After he begot Salah, Arphaxad lived four hundred and three years, and begot sons and daughters.
  '14':
  - type: text
    content: 'Salah lived thirty years, and begot Eber. '
  '15':
  - type: text
    content: After he begot Eber, Salah lived four hundred and three years, and begot sons and daughters.
  '16':
  - type: note
    content: 1 Chr. 1:19
  - type: text
    content: 'Eber lived thirty-four years, and begot '
  - type: note
    content: Luke 3:35
  - type: text
    content: 'Peleg. '
  '17':
  - type: text
    content: After he begot Peleg, Eber lived four hundred and thirty years, and begot sons and daughters.
  '18':
  - type: text
    content: 'Peleg lived thirty years, and begot Reu. '
  '19':
  - type: text
    content: After he begot Reu, Peleg lived two hundred and nine years, and begot sons and daughters.
  '2':
  - type: text
    content: 'And it came to pass, as they journeyed from the east, that they found a plain in the land '
  - type: note
    content: Gen. 10:10; 14:1; Dan. 1:2
  - type: text
    content: 'of Shinar, and they dwelt there. '
  '20':
  - type: text
    content: 'Reu lived thirty-two years, and begot '
  - type: note
    content: Luke 3:35
  - type: text
    content: 'Serug. '
  '21':
  - type: text
    content: After he begot Serug, Reu lived two hundred and seven years, and begot sons and daughters.
  '22':
  - type: text
    content: 'Serug lived thirty years, and begot Nahor. '
  '23':
  - type: text
    content: After he begot Nahor, Serug lived two hundred years, and begot sons and daughters.
  '24':
  - type: text
    content: 'Nahor lived twenty-nine years, and begot '
  - type: note
    content: Gen. 11:31; Josh. 24:2; Luke 3:34
  - type: text
    content: 'Terah. '
  '25':
  - type: text
    content: After he begot Terah, Nahor lived one hundred and nineteen years, and begot sons and daughters.
  '26':
  - type: text
    content: 'Now Terah lived seventy years, and '
  - type: note
    content: Josh. 24:2; 1 Chr. 1:26
  - type: text
    content: begot Abram, Nahor, and Haran.
  - type: heading
    content: Terah’s Descendants
  '27':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' the genealogy of Terah: Terah begot '
  - type: note
    content: Gen. 11:31; 17:5
  - type: text
    content: 'Abram, Nahor, and Haran. Haran begot Lot. '
  '28':
  - type: text
    content: 'And Haran died before his father Terah in his native land, in Ur of the Chaldeans. '
  '29':
  - type: text
    content: 'Then Abram and Nahor took wives: the name of Abram’s wife '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: Gen. 17:15; 20:12
  - type: text
    content: 'Sarai, and the name of Nahor’s wife, '
  - type: note
    content: Gen. 22:20, 23; 24:15
  - type: text
    content: 'Milcah, the daughter of Haran the father of Milcah and the father of Iscah. '
  '3':
  - type: text
    content: 'Then they said to one another, “Come, let us make bricks and bake '
  - type: text
    content: them
  - type: text
    content: ' thoroughly.” They had brick for stone, and they had asphalt for mortar. '
  '30':
  - type: text
    content: But
  - type: note
    content: Gen. 16:1, 2; Luke 1:36
  - type: text
    content: ' Sarai was barren; she had no child.'
  '31':
  - type: text
    content: 'And Terah '
  - type: note
    content: Gen. 12:1
  - type: text
    content: 'took his son Abram and his grandson Lot, the son of Haran, and his daughter-in-law Sarai, his son Abram’s wife, and they went out with them from '
  - type: note
    content: Gen. 15:7; Neh. 9:7; Acts 7:4
  - type: text
    content: 'Ur of the Chaldeans to go to '
  - type: note
    content: Gen. 10:19
  - type: text
    content: 'the land of Canaan; and they came to Haran and dwelt there. '
  '32':
  - type: text
    content: So the days of Terah were two hundred and five years, and Terah died in Haran.
  '4':
  - type: text
    content: 'And they said, “Come, let us build ourselves a city, and a tower '
  - type: note
    content: Deut. 1:28; 9:1; Ps. 107:26
  - type: text
    content: 'whose top '
  - type: text
    content: is
  - type: text
    content: ' in the heavens; let us make a '
  - type: note
    content: Gen. 6:4; 2 Sam. 8:13
  - type: text
    content: 'name for ourselves, lest we '
  - type: note
    content: Deut. 4:27
  - type: text
    content: be scattered abroad over the face of the whole earth.”
  '5':
  - type: note
    content: Gen. 18:21; Ex. 3:8; 19:11, 18, 20
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' came down to see the city and the tower which the sons of men had built. '
  '6':
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said, “Indeed '
  - type: note
    content: Gen. 9:19; Acts 17:26
  - type: text
    content: 'the people '
  - type: text
    content: are
  - type: text
    content: ' one and they all have '
  - type: note
    content: Gen. 11:1
  - type: text
    content: 'one language, and this is what they begin to do; now nothing that they '
  - type: note
    content: Deut. 31:21; Ps. 2:1
  - type: text
    content: 'propose to do will be withheld from them. '
  '7':
  - type: text
    content: 'Come, '
  - type: note
    content: Gen. 1:26
  - type: text
    content: 'let Us go down and there '
  - type: note
    content: Gen. 42:23; Ex. 4:11; Deut. 28:49; Is. 33:19; Jer. 5:15
  - type: text
    content: 'confuse their language, that they may not understand one another’s speech.” '
  '8':
  - type: text
    content: 'So '
  - type: note
    content: Gen. 11:4; Deut. 32:8; Ps. 92:9; (Luke 1:51)
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' scattered them abroad from there '
  - type: note
    content: Gen. 10:25, 32
  - type: text
    content: 'over the face of all the earth, and they ceased building the city. '
  '9':
  - type: text
    content: 'Therefore its name is called Babel, '
  - type: note
    content: 1 Cor. 14:23
  - type: text
    content: 'because there the '
  - type: heading
    content: Lord
  - type: text
    content: ' confused the language of all the earth; and from there the '
  - type: heading
    content: Lord
  - type: text
    content: ' scattered them abroad over the face of all the earth.'
  - type: heading
    content: Shem’s Descendants
