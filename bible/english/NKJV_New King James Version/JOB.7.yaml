      marker-yv: yv-n
    - type: text
      text: months of futility,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wearisome nights have been appointed to me.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 28:67; Job 7:13, 14
      marker-yv: yv-n
    - type: text
      text: When I lie down, I say, ‘When shall I arise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the night be ended?’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For I have had my fill of tossing till dawn.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'My flesh is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 14:11
      marker-yv: yv-n
    - type: text
      text: caked with worms and dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My skin is cracked and breaks out afresh.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My
    - type: usfm
      marker: x
      children:
      - type: text
