      marker-yv: yv-n
    - type: text
      text: ' days are swifter than a weaver’s shuttle,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And are spent without hope.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Oh, remember that '
    - type: usfm
      marker: x
      children:
      - type: text
