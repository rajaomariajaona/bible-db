      marker-yv: yv-n
    - type: text
      text: 'my life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a breath!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My eye will never again see good.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 8:18; 20:9
      marker-yv: yv-n
    - type: text
      text: 'The eye of him who sees me will see me no '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: While
    - type: text
      text: ' your eyes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' upon me, I shall no longer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' the cloud disappears and vanishes away,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:23
      marker-yv: yv-n
    - type: text
