  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: That
    - type: text
      text: ' You should set Your heart on him,'
  '18':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That You should visit him every morning,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' test him every moment?'
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will You not look away from me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let me alone till I swallow my saliva?
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Like a servant who earnestly desires the shade,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And like a hired man who eagerly looks for his wages,
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have I sinned?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'What have I done to You, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 36:6
      marker-yv: yv-n
    - type: text
      text: O watcher of men?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Why '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 21:12
      marker-yv: yv-n
    - type: text
      text: have You set me as Your target,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: So that I am a burden to myself?
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why then do You not pardon my transgression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And take away my iniquity?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For now I will lie down in the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And You will seek me diligently,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'But I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' no longer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be.
    - type: text
      text: ”
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'So I have been allotted '
    - type: usfm
      marker: x
      children:
      - type: text
