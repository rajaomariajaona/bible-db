    children:
    - type: text
      text: My couch will ease my complaint,’
  '14':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then You scare me with dreams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And terrify me with visions,
  '15':
  - type: usfm
    marker: q2
    children:
    - type: text
