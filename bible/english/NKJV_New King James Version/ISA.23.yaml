  - type: text
    content: O you oppressed virgin daughter of Sidon.
  - type: text
    content: 'Arise, '
  - type: note
    content: Ezek. 26:13, 14; Rev. 18:22
  - type: text
    content: cross over to Cyprus;
  - type: text
    content: There also you will have no rest.”
  '13':
  - type: text
    content: 'Behold, the land of the '
  - type: note
