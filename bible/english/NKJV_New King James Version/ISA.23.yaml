  - type: text
    content: For your strength is laid waste.
  '15':
  - type: text
    content: 'Now it shall come to pass in that day that Tyre will be forgotten seventy years, according to the days of one king. At the end of seventy years it will happen to Tyre as '
  - type: text
    content: in
  - type: text
    content: ' the song of the harlot:'
  '16':
  - type: text
    content: “Take a harp, go about the city,
  - type: text
    content: You forgotten harlot;
  - type: text
    content: Make sweet melody, sing many songs,
  - type: text
    content: That you may be remembered.”
  '17':
  - type: text
    content: 'And it shall be, at the end of seventy years, that the '
  - type: heading
    content: Lord
  - type: text
    content: ' will deal with Tyre. She will return to her hire, and '
  - type: note
    content: Rev. 17:2
  - type: text
    content: 'commit fornication with all the kingdoms of the world on the face of the earth. '
  '18':
  - type: text
    content: 'Her gain and her pay '
  - type: note
