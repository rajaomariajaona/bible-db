    content: Be ashamed, O Sidon;
  - type: text
    content: For the sea has spoken,
  - type: text
    content: The strength of the sea, saying,
  - type: text
    content: “I do not labor, nor bring forth children;
  - type: text
    content: Neither do I rear young men,
  - type: text
    content: Nor
  - type: text
    content: ' bring up virgins.”'
