- type: usfm
  marker: q2
  children:
  - type: text
    text: For your strength is laid waste.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now it shall come to pass in that day that Tyre will be forgotten seventy years, according to the days of one king. At the end of seventy years it will happen to Tyre as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in
  - type: text
    text: ' the song of the harlot:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Take a harp, go about the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: You forgotten harlot;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Make sweet melody, sing many songs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: That you may be remembered.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And it shall be, at the end of seventy years, that the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will deal with Tyre. She will return to her hire, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 17:2
    marker-yv: yv-n
  - type: text
    text: 'commit fornication with all the kingdoms of the world on the face of the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Her gain and her pay '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 28:36; Zech. 14:20, 21
    marker-yv: yv-n
  - type: text
    text: 'will be set apart for the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '; it will not be treasured nor laid up, for her gain will be for those who dwell before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', to eat sufficiently, and for fine clothing.'
