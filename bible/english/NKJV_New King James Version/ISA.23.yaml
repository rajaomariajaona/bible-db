  - type: text
    content: 'will be set apart for the '
  - type: heading
    content: Lord
  - type: text
    content: '; it will not be treasured nor laid up, for her gain will be for those who dwell before the '
  - type: heading
    content: Lord
  - type: text
    content: ', to eat sufficiently, and for fine clothing.'
  '2':
  - type: text
    content: Be still, you inhabitants of the coastland,
  - type: text
    content: You merchants of Sidon,
  - type: text
    content: Whom those who cross the sea have filled.
  '3':
  - type: text
    content: And on great waters the grain of Shihor,
  - type: text
    content: 'The harvest of the River, '
  - type: text
    content: is
  - type: text
    content: ' her revenue;'
  - type: text
    content: 'And '
  - type: note
