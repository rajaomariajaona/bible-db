verses:
  '1':
  - type: heading
    content: The Family of Judah
  - type: text
    content: 'The sons of Judah '
  - type: text
    content: were
  - type: text
    content: ' '
  - type: note
    content: Gen. 38:29; 46:12
  - type: text
    content: 'Perez, Hezron, Carmi, Hur, and Shobal. '
  '10':
  - type: text
    content: 'And Jabez called on the God of Israel saying, “Oh, that You would bless me indeed, and enlarge my territory, that Your hand would be with me, and that You would keep '
  - type: text
    content: me
  - type: text
    content: ' from evil, that I may not cause pain!” So God granted him what he requested.'
  '11':
  - type: text
    content: 'Chelub the brother of '
  - type: note
    content: Job 8:1
  - type: text
    content: 'Shuhah begot Mehir, who '
  - type: text
    content: was
  - type: text
    content: ' the father of Eshton. '
  '12':
  - type: text
    content: 'And Eshton begot Beth-Rapha, Paseah, and Tehinnah the father of Ir-Nahash. These '
  - type: text
    content: were
  - type: text
    content: ' the men of Rechah.'
  '13':
  - type: text
    content: 'The sons of Kenaz '
  - type: text
    content: were
  - type: text
    content: ' '
  - type: note
    content: Josh. 15:17; Judg. 3:9, 11
  - type: text
    content: 'Othniel and Seraiah. The sons of Othniel '
  - type: text
    content: were
  - type: text
    content: ' Hathath, '
  '14':
  - type: text
    content: 'and Meonothai '
  - type: text
    content: who
  - type: text
    content: ' begot Ophrah. Seraiah begot Joab the father of '
  - type: note
    content: Neh. 11:35
  - type: text
    content: 'Ge Harashim, for they were craftsmen. '
  '15':
  - type: text
    content: 'The sons of '
  - type: note
    content: Josh. 14:6, 14; 15:13, 17; 1 Chr. 6:56
  - type: text
    content: 'Caleb the son of Jephunneh '
  - type: text
    content: were
  - type: text
    content: ' Iru, Elah, and Naam. The son of Elah '
  - type: text
    content: was
  - type: text
    content: ' Kenaz. '
  '16':
  - type: text
    content: 'The sons of Jehallelel '
  - type: text
    content: were
  - type: text
    content: ' Ziph, Ziphah, Tiria, and Asarel. '
  '17':
  - type: text
    content: 'The sons of Ezrah '
  - type: text
    content: were
  - type: text
    content: ' Jether, Mered, Epher, and Jalon. And Mered’s wife bore Miriam, Shammai, and Ishbah the father of Eshtemoa. '
  '18':
  - type: text
    content: (His wife Jehudijah bore Jered the father of Gedor, Heber the father of Sochoh, and Jekuthiel the father of Zanoah.) And these were the sons of Bithiah the daughter of Pharaoh, whom Mered took.
  '19':
  - type: text
    content: 'The sons of Hodiah’s wife, the sister of Naham, '
  - type: text
    content: were
  - type: text
    content: ' the fathers of Keilah the Garmite and of Eshtemoa the '
  - type: note
    content: 2 Kin. 25:23
  - type: text
    content: 'Maachathite. '
  '2':
  - type: text
    content: 'And Reaiah the son of Shobal begot Jahath, and Jahath begot Ahumai and Lahad. These '
  - type: text
    content: were
  - type: text
    content: ' the families of the Zorathites. '
  '20':
  - type: text
    content: 'And the sons of Shimon '
  - type: text
    content: were
  - type: text
    content: ' Amnon, Rinnah, Ben-Hanan, and Tilon. And the sons of Ishi '
  - type: text
    content: were
  - type: text
    content: ' Zoheth and Ben-Zoheth.'
  '21':
  - type: text
    content: 'The sons of '
  - type: note
    content: Gen. 38:11, 14
  - type: text
    content: 'Shelah '
  - type: note
    content: Gen. 38:1–5; 46:12
  - type: text
    content: 'the son of Judah '
  - type: text
    content: were
  - type: text
    content: ' Er the father of Lecah, Laadah the father of Mareshah, and the families of the house of the linen workers of the house of Ashbea; '
  '22':
  - type: text
    content: 'also Jokim, the men of Chozeba, and Joash; Saraph, who ruled in Moab, and Jashubi-Lehem. Now the records are ancient. '
  '23':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the potters and those who dwell at Netaim and Gederah; there they dwelt with the king for his work.'
  - type: heading
    content: The Family of Simeon
  '24':
  - type: text
    content: 'The '
  - type: note
    content: Num. 26:12–14
  - type: text
    content: 'sons of Simeon '
  - type: text
    content: were
  - type: text
    content: ' Nemuel, Jamin, Jarib, Zerah, '
  - type: text
    content: and
  - type: text
    content: ' Shaul, '
  '25':
  - type: text
    content: 'Shallum his son, Mibsam his son, and Mishma his son. '
  '26':
  - type: text
    content: 'And the sons of Mishma '
  - type: text
    content: were
  - type: text
    content: ' Hamuel his son, Zacchur his son, and Shimei his son. '
  '27':
  - type: text
    content: 'Shimei had sixteen sons and six daughters; but his brothers did not have many children, '
  - type: note
    content: Num. 2:9
  - type: text
    content: nor did any of their families multiply as much as the children of Judah.
  '28':
  - type: text
    content: 'They dwelt at Beersheba, Moladah, Hazar Shual, '
  '29':
  - type: text
    content: 'Bilhah, Ezem, Tolad, '
  '3':
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: sons
  - type: text
    content: ' '
  - type: text
    content: of
  - type: text
    content: ' the father of Etam: Jezreel, Ishma, and Idbash; and the name of their sister '
  - type: text
    content: was
  - type: text
    content: ' Hazelelponi; '
  '30':
  - type: text
    content: 'Bethuel, Hormah, Ziklag, '
  '31':
  - type: text
    content: 'Beth Marcaboth, Hazar Susim, Beth Biri, and at Shaaraim. These '
  - type: text
    content: were
  - type: text
    content: ' their cities until the reign of David. '
  '32':
  - type: text
    content: 'And their villages '
  - type: text
    content: were
  - type: text
    content: ' Etam, Ain, Rimmon, Tochen, and Ashan—five cities— '
  '33':
  - type: text
    content: 'and all the villages that '
  - type: text
    content: were
  - type: text
    content: ' around these cities as far as Baal. These '
  - type: text
    content: were
  - type: text
    content: ' their dwelling places, and they maintained their genealogy: '
  '34':
  - type: text
    content: 'Meshobab, Jamlech, and Joshah the son of Amaziah; '
  '35':
  - type: text
    content: 'Joel, and Jehu the son of Joshibiah, the son of Seraiah, the son of Asiel; '
  '36':
  - type: text
    content: 'Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, and Benaiah; '
  '37':
  - type: text
    content: 'Ziza the son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah— '
  '38':
  - type: text
    content: 'these mentioned by name '
  - type: text
    content: were
  - type: text
    content: ' leaders in their families, and their father’s house increased greatly.'
  '39':
  - type: text
    content: 'So they went to the entrance of Gedor, as far as the east side of the valley, to seek pasture for their flocks. '
  '4':
  - type: text
    content: 'and Penuel '
  - type: text
    content: was
  - type: text
    content: ' the father of Gedor, and Ezer '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' father of Hushah.'
  - type: text
    content: 'These '
  - type: text
    content: were
  - type: text
    content: ' the sons of '
  - type: note
    content: Ex. 31:2; 1 Chr. 2:50
  - type: text
    content: Hur, the firstborn of Ephrathah the father of Bethlehem.
  '40':
  - type: text
    content: 'And they found rich, good pasture, and the land '
  - type: text
    content: was
  - type: text
    content: ' broad, quiet, and peaceful; for some Hamites formerly lived there.'
  '41':
  - type: text
    content: 'These recorded by name came in the days of Hezekiah king of Judah; and they '
  - type: note
    content: 2 Kin. 18:8
  - type: text
    content: 'attacked their tents and the Meunites who were found there, and '
  - type: note
    content: 2 Kin. 19:11
  - type: text
    content: 'utterly destroyed them, as it is to this day. So they dwelt in their place, because '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' pasture for their flocks there. '
  '42':
  - type: text
    content: 'Now '
  - type: text
    content: some
  - type: text
    content: ' of them, five hundred men of the sons of Simeon, went to Mount Seir, having as their captains Pelatiah, Neariah, Rephaiah, and Uzziel, the sons of Ishi. '
  '43':
  - type: text
    content: 'And they defeated '
  - type: note
    content: Ex. 17:14; 1 Sam. 15:8; 30:17
  - type: text
    content: the rest of the Amalekites who had escaped. They have dwelt there to this day.
  '5':
  - type: text
    content: 'And '
  - type: note
    content: 1 Chr. 2:24
  - type: text
    content: 'Ashhur the father of Tekoa had two wives, Helah and Naarah. '
  '6':
  - type: text
    content: 'Naarah bore him Ahuzzam, Hepher, Temeni, and Haahashtari. These '
  - type: text
    content: were
  - type: text
    content: ' the sons of Naarah. '
  '7':
  - type: text
    content: 'The sons of Helah '
  - type: text
    content: were
  - type: text
    content: ' Zereth, Zohar, and Ethnan; '
  '8':
  - type: text
    content: and Koz begot Anub, Zobebah, and the families of Aharhel the son of Harum.
  '9':
  - type: text
    content: 'Now Jabez was '
  - type: note
    content: Gen. 34:19
  - type: text
    content: 'more honorable than his brothers, and his mother called his name Jabez, saying, “Because I bore '
  - type: text
    content: him
  - type: text
    content: ' in pain.” '
