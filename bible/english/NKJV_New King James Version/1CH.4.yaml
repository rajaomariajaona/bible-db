document_id: 1CH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The sons of Judah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 38:29; 46:12
    marker-yv: yv-n
  - type: text
    text: 'Perez, Hezron, Carmi, Hur, and Shobal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Reaiah the son of Shobal begot Jahath, and Jahath begot Ahumai and Lahad. These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the families of the Zorathites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sons
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' the father of Etam: Jezreel, Ishma, and Idbash; and the name of their sister '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Hazelelponi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and Penuel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the father of Gedor, and Ezer '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' father of Hushah.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 31:2; 1 Chr. 2:50
    marker-yv: yv-n
  - type: text
    text: Hur, the firstborn of Ephrathah the father of Bethlehem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 2:24
    marker-yv: yv-n
  - type: text
    text: 'Ashhur the father of Tekoa had two wives, Helah and Naarah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Naarah bore him Ahuzzam, Hepher, Temeni, and Haahashtari. These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the sons of Naarah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The sons of Helah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Zereth, Zohar, and Ethnan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: and Koz begot Anub, Zobebah, and the families of Aharhel the son of Harum.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now Jabez was '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 34:19
    marker-yv: yv-n
  - type: text
    text: 'more honorable than his brothers, and his mother called his name Jabez, saying, “Because I bore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: him
  - type: text
    text: ' in pain.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And Jabez called on the God of Israel saying, “Oh, that You would bless me indeed, and enlarge my territory, that Your hand would be with me, and that You would keep '
  - type: usfm
    marker: it
    children:
    - type: text
      text: me
  - type: text
    text: ' from evil, that I may not cause pain!” So God granted him what he requested.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Chelub the brother of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Job 8:1
    marker-yv: yv-n
  - type: text
    text: 'Shuhah begot Mehir, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' the father of Eshton. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Eshton begot Beth-Rapha, Paseah, and Tehinnah the father of Ir-Nahash. These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the men of Rechah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Kenaz '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 15:17; Judg. 3:9, 11
    marker-yv: yv-n
  - type: text
    text: 'Othniel and Seraiah. The sons of Othniel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Hathath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and Meonothai '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' begot Ophrah. Seraiah begot Joab the father of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neh. 11:35
    marker-yv: yv-n
  - type: text
    text: 'Ge Harashim, for they were craftsmen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sons of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Josh. 14:6, 14; 15:13, 17; 1 Chr. 6:56
    marker-yv: yv-n
  - type: text
    text: 'Caleb the son of Jephunneh '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Iru, Elah, and Naam. The son of Elah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Kenaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The sons of Jehallelel '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Ziph, Ziphah, Tiria, and Asarel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The sons of Ezrah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Jether, Mered, Epher, and Jalon. And Mered’s wife bore Miriam, Shammai, and Ishbah the father of Eshtemoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: (His wife Jehudijah bore Jered the father of Gedor, Heber the father of Sochoh, and Jekuthiel the father of Zanoah.) And these were the sons of Bithiah the daughter of Pharaoh, whom Mered took.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Hodiah’s wife, the sister of Naham, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the fathers of Keilah the Garmite and of Eshtemoa the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:23
    marker-yv: yv-n
  - type: text
    text: 'Maachathite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And the sons of Shimon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Amnon, Rinnah, Ben-Hanan, and Tilon. And the sons of Ishi '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Zoheth and Ben-Zoheth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The sons of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 38:11, 14
    marker-yv: yv-n
  - type: text
    text: 'Shelah '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 38:1–5; 46:12
    marker-yv: yv-n
  - type: text
    text: 'the son of Judah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Er the father of Lecah, Laadah the father of Mareshah, and the families of the house of the linen workers of the house of Ashbea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'also Jokim, the men of Chozeba, and Joash; Saraph, who ruled in Moab, and Jashubi-Lehem. Now the records are ancient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' the potters and those who dwell at Netaim and Gederah; there they dwelt with the king for his work.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of Simeon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 26:12–14
    marker-yv: yv-n
  - type: text
    text: 'sons of Simeon '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Nemuel, Jamin, Jarib, Zerah, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' Shaul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Shallum his son, Mibsam his son, and Mishma his son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And the sons of Mishma '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Hamuel his son, Zacchur his son, and Shimei his son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Shimei had sixteen sons and six daughters; but his brothers did not have many children, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 2:9
    marker-yv: yv-n
  - type: text
    text: nor did any of their families multiply as much as the children of Judah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They dwelt at Beersheba, Moladah, Hazar Shual, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Bilhah, Ezem, Tolad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Bethuel, Hormah, Ziklag, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Beth Marcaboth, Hazar Susim, Beth Biri, and at Shaaraim. These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' their cities until the reign of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And their villages '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' Etam, Ain, Rimmon, Tochen, and Ashan—five cities— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'and all the villages that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' around these cities as far as Baal. These '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' their dwelling places, and they maintained their genealogy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Meshobab, Jamlech, and Joshah the son of Amaziah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Joel, and Jehu the son of Joshibiah, the son of Seraiah, the son of Asiel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Elioenai, Jaakobah, Jeshohaiah, Asaiah, Adiel, Jesimiel, and Benaiah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ziza the son of Shiphi, the son of Allon, the son of Jedaiah, the son of Shimri, the son of Shemaiah— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'these mentioned by name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' leaders in their families, and their father’s house increased greatly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'So they went to the entrance of Gedor, as far as the east side of the valley, to seek pasture for their flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'And they found rich, good pasture, and the land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' broad, quiet, and peaceful; for some Hamites formerly lived there.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'These recorded by name came in the days of Hezekiah king of Judah; and they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 18:8
    marker-yv: yv-n
  - type: text
    text: 'attacked their tents and the Meunites who were found there, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 19:11
    marker-yv: yv-n
  - type: text
    text: 'utterly destroyed them, as it is to this day. So they dwelt in their place, because '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' pasture for their flocks there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some
  - type: text
    text: ' of them, five hundred men of the sons of Simeon, went to Mount Seir, having as their captains Pelatiah, Neariah, Rephaiah, and Uzziel, the sons of Ishi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And they defeated '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 17:14; 1 Sam. 15:8; 30:17
    marker-yv: yv-n
  - type: text
    text: the rest of the Amalekites who had escaped. They have dwelt there to this day.
