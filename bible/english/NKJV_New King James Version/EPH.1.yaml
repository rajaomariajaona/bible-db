  - type: note
    content: Rom. 12:5
  - type: text
    content: 'which is His body, '
  - type: note
    content: Col. 2:9
  - type: text
    content: 'the fullness of Him '
  - type: note
    content: (1 Cor. 12:6)
  - type: text
    content: who fills all in all.
  '3':
  - type: note
    content: 2 Cor. 1:3
  - type: text
    content: 'Blessed '
  - type: text
    content: be
  - type: text
    content: ' the God and Father of our Lord Jesus Christ, who has blessed us with every spiritual blessing in the heavenly '
  - type: text
    content: places
  - type: text
    content: ' in Christ, '
  '4':
  - type: text
    content: 'just as '
  - type: note
    content: Rom. 8:28
  - type: text
    content: 'He chose us in Him '
  - type: note
    content: 1 Pet. 1:2
  - type: text
    content: 'before the foundation of the world, that we should '
  - type: note
    content: Luke 1:75
  - type: text
    content: 'be holy and without blame before Him in love, '
  '5':
  - type: note
    content: Acts 13:48; (Rom. 8:29)
  - type: text
    content: 'having predestined us to '
  - type: note
    content: John 1:12
  - type: text
    content: 'adoption as sons by Jesus Christ to Himself, '
  - type: note
    content: (1 Cor. 1:21)
  - type: text
    content: 'according to the good pleasure of His will, '
  '6':
