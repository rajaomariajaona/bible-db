  - type: text
    content: 'He put all '
  - type: text
    content: things
  - type: text
    content: ' under His feet, and gave Him '
  - type: note
    content: Heb. 2:7
  - type: text
    content: to
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' head over all '
  - type: text
    content: things
  - type: text
    content: ' to the church, '
