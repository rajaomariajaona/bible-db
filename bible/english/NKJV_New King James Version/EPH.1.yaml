  - type: note
    content: (Rom. 3:24)
  - type: text
    content: 'by which He made us accepted in '
  - type: note
    content: Matt. 3:17
  - type: text
    content: the Beloved.
  '7':
  - type: note
    content: (Heb. 9:12)
  - type: text
    content: 'In Him we have redemption through His blood, the forgiveness of sins, according to '
  - type: note
    content: (Rom. 3:24, 25)
  - type: text
    content: 'the riches of His grace '
  '8':
  - type: text
    content: 'which He made to abound toward us in all wisdom and prudence, '
  '9':
  - type: note
    content: (Rom. 16:25)
  - type: text
    content: 'having made known to us the mystery of His will, according to His good pleasure '
  - type: note
    content: (2 Tim. 1:9)
  - type: text
    content: 'which He purposed in Himself, '
