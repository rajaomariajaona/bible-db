verses:
  '1':
  - type: heading
    content: Greeting
  - type: text
    content: Paul, an apostle of Jesus Christ by the will of God,
  - type: text
    content: 'To the saints who are in Ephesus, and faithful in Christ Jesus:'
  '10':
  - type: text
    content: 'that in the dispensation of '
  - type: note
    content: Gal. 4:4
  - type: text
    content: 'the fullness of the times '
  - type: note
    content: 1 Cor. 3:22
  - type: text
    content: 'He might gather together in one '
  - type: note
    content: Eph. 3:15; (Phil. 2:9; Col. 1:16, 20)
  - type: text
    content: 'all things in Christ, both which are in heaven and which are on earth—in Him. '
  '11':
  - type: note
    content: Rom. 8:17
  - type: text
    content: 'In Him also we have obtained an inheritance, being predestined according to '
  - type: note
    content: Is. 46:10
  - type: text
    content: 'the purpose of Him who works all things according to the counsel of His will, '
  '12':
  - type: note
    content: 2 Thess. 2:13
  - type: text
    content: 'that we '
  - type: note
    content: James 1:18
  - type: text
    content: who first trusted in Christ should be to the praise of His glory.
  '13':
  - type: text
    content: 'In Him you also '
  - type: text
    content: trusted,
  - type: text
    content: ' after you heard '
  - type: note
    content: John 1:17
  - type: text
    content: 'the word of truth, the gospel of your salvation; in whom also, having believed, '
  - type: note
    content: (2 Cor. 1:22)
  - type: text
    content: 'you were sealed with the Holy Spirit of promise, '
  '14':
  - type: note
    content: 2 Cor. 5:5
  - type: text
    content: 'who is the guarantee of our inheritance '
  - type: note
    content: Rom. 8:23
  - type: text
    content: 'until the redemption of '
  - type: note
    content: (Acts 20:28)
  - type: text
    content: 'the purchased possession, '
  - type: note
    content: 1 Pet. 2:9
  - type: text
    content: to the praise of His glory.
  - type: heading
    content: Prayer for Spiritual Wisdom
  '15':
  - type: text
    content: 'Therefore I also, '
  - type: note
    content: Col. 1:4; Philem. 5
  - type: text
    content: 'after I heard of your faith in the Lord Jesus and your love for all the saints, '
  '16':
  - type: note
    content: Rom. 1:9
  - type: text
    content: 'do not cease to give thanks for you, making mention of you in my prayers: '
  '17':
  - type: text
    content: 'that '
  - type: note
    content: John 20:17; Rom. 15:6
  - type: text
    content: 'the God of our Lord Jesus Christ, the Father of glory, '
  - type: note
    content: Is. 11:2; Col. 1:9
  - type: text
    content: 'may give to you the spirit of wisdom and revelation in the knowledge of Him, '
  '18':
  - type: note
    content: Acts 26:18; 2 Cor. 4:6; Heb. 6:4
  - type: text
    content: 'the eyes of your understanding being enlightened; that you may know what is '
  - type: note
    content: Eph. 2:12
  - type: text
    content: 'the hope of His calling, what are the riches of the glory of His inheritance in the saints, '
  '19':
  - type: text
    content: 'and what '
  - type: text
    content: is
  - type: text
    content: ' the exceeding greatness of His power toward us who believe, '
  - type: note
    content: Col. 2:12
  - type: text
    content: 'according to the working of His mighty power '
  '2':
  - type: text
    content: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Redemption in Christ
  '20':
  - type: text
    content: 'which He worked in Christ when '
  - type: note
    content: Acts 2:24
  - type: text
    content: 'He raised Him from the dead and '
  - type: note
    content: Ps. 110:1
  - type: text
    content: 'seated '
  - type: text
    content: Him
  - type: text
    content: ' at His right hand in the heavenly '
  - type: text
    content: places,
  - type: text
    content: ' '
