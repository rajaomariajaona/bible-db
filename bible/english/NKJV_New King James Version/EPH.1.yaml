document_id: EPH.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, an apostle of Jesus Christ by the will of God,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the saints who are in Ephesus, and faithful in Christ Jesus:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that in the dispensation of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 4:4
      marker-yv: yv-n
    - type: text
      text: 'the fullness of the times '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 3:22
      marker-yv: yv-n
    - type: text
      text: 'He might gather together in one '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 3:15; (Phil. 2:9; Col. 1:16, 20)
      marker-yv: yv-n
    - type: text
      text: 'all things in Christ, both which are in heaven and which are on earth—in Him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:17
      marker-yv: yv-n
    - type: text
      text: 'In Him also we have obtained an inheritance, being predestined according to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 46:10
      marker-yv: yv-n
    - type: text
      text: 'the purpose of Him who works all things according to the counsel of His will, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Thess. 2:13
      marker-yv: yv-n
    - type: text
      text: 'that we '
    - type: usfm
      marker: x
      children:
      - type: text
        text: James 1:18
      marker-yv: yv-n
    - type: text
      text: who first trusted in Christ should be to the praise of His glory.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Him you also '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trusted,
    - type: text
      text: ' after you heard '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:17
      marker-yv: yv-n
    - type: text
      text: 'the word of truth, the gospel of your salvation; in whom also, having believed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Cor. 1:22)
      marker-yv: yv-n
    - type: text
      text: 'you were sealed with the Holy Spirit of promise, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 5:5
      marker-yv: yv-n
    - type: text
      text: 'who is the guarantee of our inheritance '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:23
      marker-yv: yv-n
    - type: text
      text: 'until the redemption of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 20:28)
      marker-yv: yv-n
    - type: text
      text: 'the purchased possession, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Pet. 2:9
      marker-yv: yv-n
    - type: text
      text: to the praise of His glory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer for Spiritual Wisdom
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I also, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 1:4; Philem. 5
      marker-yv: yv-n
    - type: text
      text: 'after I heard of your faith in the Lord Jesus and your love for all the saints, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:9
      marker-yv: yv-n
    - type: text
      text: 'do not cease to give thanks for you, making mention of you in my prayers: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 20:17; Rom. 15:6
      marker-yv: yv-n
    - type: text
      text: 'the God of our Lord Jesus Christ, the Father of glory, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 11:2; Col. 1:9
      marker-yv: yv-n
    - type: text
      text: 'may give to you the spirit of wisdom and revelation in the knowledge of Him, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 26:18; 2 Cor. 4:6; Heb. 6:4
      marker-yv: yv-n
    - type: text
      text: 'the eyes of your understanding being enlightened; that you may know what is '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 2:12
      marker-yv: yv-n
    - type: text
      text: 'the hope of His calling, what are the riches of the glory of His inheritance in the saints, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the exceeding greatness of His power toward us who believe, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 2:12
      marker-yv: yv-n
    - type: text
      text: 'according to the working of His mighty power '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace to you and peace from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Redemption in Christ
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which He worked in Christ when '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:24
      marker-yv: yv-n
    - type: text
      text: 'He raised Him from the dead and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 110:1
      marker-yv: yv-n
    - type: text
      text: 'seated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Him
    - type: text
      text: ' at His right hand in the heavenly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: places,
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 9:6, 7; Luke 1:32, 33; Phil. 2:9, 10; Rev. 19:12
      marker-yv: yv-n
    - type: text
      text: 'far above all '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 8:38, 39)
      marker-yv: yv-n
    - type: text
      text: principality and power and might and dominion, and every name that is named, not only in this age but also in that which is to come.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 8:6; 110:1; Matt. 28:18; 1 Cor. 15:27
      marker-yv: yv-n
    - type: text
      text: 'He put all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' under His feet, and gave Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 2:7
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' head over all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' to the church, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:5
      marker-yv: yv-n
    - type: text
      text: 'which is His body, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 2:9
      marker-yv: yv-n
    - type: text
      text: 'the fullness of Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 12:6)
      marker-yv: yv-n
    - type: text
      text: who fills all in all.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 1:3
      marker-yv: yv-n
    - type: text
      text: 'Blessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' the God and Father of our Lord Jesus Christ, who has blessed us with every spiritual blessing in the heavenly '
    - type: usfm
      marker: it
      children:
      - type: text
        text: places
    - type: text
      text: ' in Christ, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'just as '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 8:28
      marker-yv: yv-n
    - type: text
      text: 'He chose us in Him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Pet. 1:2
      marker-yv: yv-n
    - type: text
      text: 'before the foundation of the world, that we should '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 1:75
      marker-yv: yv-n
    - type: text
      text: 'be holy and without blame before Him in love, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:48; (Rom. 8:29)
      marker-yv: yv-n
    - type: text
      text: 'having predestined us to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 1:12
      marker-yv: yv-n
    - type: text
      text: 'adoption as sons by Jesus Christ to Himself, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Cor. 1:21)
      marker-yv: yv-n
    - type: text
      text: 'according to the good pleasure of His will, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to the praise of the glory of His grace, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 3:24)
      marker-yv: yv-n
    - type: text
      text: 'by which He made us accepted in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 3:17
      marker-yv: yv-n
    - type: text
      text: the Beloved.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 9:12)
      marker-yv: yv-n
    - type: text
      text: 'In Him we have redemption through His blood, the forgiveness of sins, according to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 3:24, 25)
      marker-yv: yv-n
    - type: text
      text: 'the riches of His grace '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'which He made to abound toward us in all wisdom and prudence, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Rom. 16:25)
      marker-yv: yv-n
    - type: text
      text: 'having made known to us the mystery of His will, according to His good pleasure '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Tim. 1:9)
      marker-yv: yv-n
    - type: text
      text: 'which He purposed in Himself, '
