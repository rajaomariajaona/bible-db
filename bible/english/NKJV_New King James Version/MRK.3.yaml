  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 12:31, 32; Luke 12:10; (1 John 5:16)
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Assuredly, I say to you, all sins will be forgiven the sons of men, and whatever blasphemies they may utter;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
