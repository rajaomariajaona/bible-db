    children:
    - type: text
      text: Matt. 12:9–14; Luke 6:6–11
    marker-yv: yv-n
  - type: text
    text: 'He entered the synagogue again, and a man was there who had a withered hand. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Ps. 37:32); Luke 14:1; 20:20
    marker-yv: yv-n
  - type: text
    text: 'watched Him closely, whether He would '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Luke 13:14
    marker-yv: yv-n
  - type: text
    text: 'heal him on the Sabbath, so that they might accuse Him. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And He said to the man who had the withered hand, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Step forward.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Is it lawful on the Sabbath to do good or to do evil, to save life or to kill?”
  - type: text
    text: ' But they kept silent. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And when He had looked around at them with anger, being grieved by the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Zech. 7:12
    marker-yv: yv-n
  - type: text
    text: 'hardness of their hearts, He said to the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stretch out your hand.”
  - type: text
    text: ' And he stretched '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' out, and his hand was restored as whole as the other. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 2:2; Mark 12:13
    marker-yv: yv-n
  - type: text
    text: 'Then the Pharisees went out and immediately plotted with '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 22:16
    marker-yv: yv-n
  - type: text
    text: the Herodians against Him, how they might destroy Him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Great Multitude Follows Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But Jesus withdrew with His disciples to the sea. And a great multitude from Galilee followed Him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 4:25; Luke 6:17
    marker-yv: yv-n
  - type: text
    text: 'and from Judea '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and Jerusalem and Idumea and beyond the Jordan; and those from Tyre and Sidon, a great multitude, when they heard how '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 5:19
    marker-yv: yv-n
  - type: text
    text: 'many things He was doing, came to Him. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So He told His disciples that a small boat should be kept ready for Him because of the multitude, lest they should crush Him. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For He healed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 5:29, 34; Luke 7:21
    marker-yv: yv-n
  - type: text
    text: 'many, so that as many as had afflictions pressed about Him to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 9:21; 14:36; Mark 6:56; 8:22
    marker-yv: yv-n
  - type: text
    text: 'touch Him. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mark 1:23, 24; Luke 4:41
    marker-yv: yv-n
  - type: text
    text: 'And the unclean spirits, whenever they saw Him, fell down before Him and cried out, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 8:29; 14:33; Mark 1:1; 5:7; Luke 8:28
    marker-yv: yv-n
  - type: text
    text: '“You are the Son of God.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 12:16; Mark 1:25, 34
    marker-yv: yv-n
  - type: text
    text: He sternly warned them that they should not make Him known.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Twelve Apostles
  marker-yv: yv-h
- type: usfm
