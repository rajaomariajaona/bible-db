    text: 'so that they could not so much as eat bread. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But when His '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 69:8; Matt. 13:55; Mark 6:3; John 2:12
    marker-yv: yv-n
  - type: text
    text: 'own people heard '
  - type: usfm
