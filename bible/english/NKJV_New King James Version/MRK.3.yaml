  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 10:1; Mark 6:7; Luke 9:1
    marker-yv: yv-n
  - type: text
    text: 'And He went up on the mountain and called to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Him
  - type: text
    text: ' those He Himself wanted. And they came to Him. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then He appointed twelve, that they might be with Him and that He might send them out to preach, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and to have power to heal sicknesses and to cast out demons: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Simon, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 16:18; John 1:42
    marker-yv: yv-n
  - type: text
    text: 'to whom He gave the name Peter; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'James the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: son
  - type: text
    text: ' of Zebedee and John the brother of James, to whom He gave the name Boanerges, that is, “Sons of Thunder”; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Andrew, Philip, Bartholomew, Matthew, Thomas, James the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: son
  - type: text
    text: ' of Alphaeus, Thaddaeus, Simon the Cananite; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: and Judas Iscariot, who also betrayed Him. And they went into a house.
- type: usfm
