verses:
  '1':
  - type: heading
    content: Healing on the Sabbath
  - type: text
    content: 'And '
  - type: note
    content: Matt. 12:9–14; Luke 6:6–11
  - type: text
    content: 'He entered the synagogue again, and a man was there who had a withered hand. '
  '10':
  - type: text
    content: 'For He healed '
  - type: note
    content: Mark 5:29, 34; Luke 7:21
  - type: text
    content: 'many, so that as many as had afflictions pressed about Him to '
  - type: note
    content: Matt. 9:21; 14:36; Mark 6:56; 8:22
  - type: text
    content: 'touch Him. '
  '11':
  - type: note
    content: Mark 1:23, 24; Luke 4:41
  - type: text
    content: 'And the unclean spirits, whenever they saw Him, fell down before Him and cried out, saying, '
  - type: note
    content: Matt. 8:29; 14:33; Mark 1:1; 5:7; Luke 8:28
  - type: text
    content: '“You are the Son of God.” '
  '12':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 12:16; Mark 1:25, 34
  - type: text
    content: He sternly warned them that they should not make Him known.
  - type: heading
    content: The Twelve Apostles
  '13':
  - type: note
    content: Matt. 10:1; Mark 6:7; Luke 9:1
  - type: text
    content: 'And He went up on the mountain and called to '
  - type: text
    content: Him
  - type: text
    content: ' those He Himself wanted. And they came to Him. '
  '14':
  - type: text
    content: 'Then He appointed twelve, that they might be with Him and that He might send them out to preach, '
  '15':
  - type: text
    content: 'and to have power to heal sicknesses and to cast out demons: '
  '16':
  - type: text
    content: 'Simon, '
  - type: note
    content: Matt. 16:18; John 1:42
  - type: text
    content: 'to whom He gave the name Peter; '
  '17':
  - type: text
    content: 'James the '
  - type: text
    content: son
  - type: text
    content: ' of Zebedee and John the brother of James, to whom He gave the name Boanerges, that is, “Sons of Thunder”; '
  '18':
  - type: text
    content: 'Andrew, Philip, Bartholomew, Matthew, Thomas, James the '
  - type: text
    content: son
  - type: text
    content: ' of Alphaeus, Thaddaeus, Simon the Cananite; '
  '19':
  - type: text
    content: and Judas Iscariot, who also betrayed Him. And they went into a house.
  - type: heading
    content: A House Divided Cannot Stand
  '2':
  - type: text
    content: 'So they '
  - type: note
    content: (Ps. 37:32); Luke 14:1; 20:20
  - type: text
    content: 'watched Him closely, whether He would '
  - type: note
    content: Luke 13:14
  - type: text
    content: 'heal him on the Sabbath, so that they might accuse Him. '
  '20':
  - type: text
    content: 'Then the multitude came together again, '
  - type: note
    content: Mark 6:31
  - type: text
    content: 'so that they could not so much as eat bread. '
  '21':
  - type: text
    content: 'But when His '
  - type: note
    content: Ps. 69:8; Matt. 13:55; Mark 6:3; John 2:12
  - type: text
    content: 'own people heard '
  - type: text
    content: about
  - type: text
    content: ' '
  - type: text
    content: this,
  - type: text
    content: ' they went out to lay hold of Him, '
  - type: note
    content: John 7:5; 10:20; Acts 26:24; (2 Cor. 5:13)
  - type: text
    content: for they said, “He is out of His mind.”
  '22':
  - type: text
    content: 'And the scribes who came down from Jerusalem said, '
  - type: note
    content: Matt. 9:34; 10:25; Luke 11:15; John 7:20; 8:48, 52; 10:20
  - type: text
    content: '“He has Beelzebub,” and, “By the '
  - type: note
    content: (John 12:31; 14:30; 16:11; Eph. 2:2)
  - type: text
    content: ruler of the demons He casts out demons.”
  '23':
  - type: note
    content: Matt. 12:25–29; Luke 11:17–22
  - type: text
    content: 'So He called them to '
  - type: text
    content: Himself
  - type: text
    content: ' and said to them in parables: '
  - type: text
    content: “How can Satan cast out Satan?
  - type: text
    content: ' '
  '24':
  - type: text
    content: If a kingdom is divided against itself, that kingdom cannot stand.
  - type: text
    content: ' '
  '25':
  - type: text
    content: And if a house is divided against itself, that house cannot stand.
  - type: text
    content: ' '
  '26':
  - type: text
    content: And if Satan has risen up against himself, and is divided, he cannot stand, but has an end.
  - type: text
    content: ' '
  '27':
  - type: note
    content: (Is. 49:24, 25); Matt. 12:29
  - type: text
    content: No one can enter a strong man’s house and plunder his goods, unless he first binds the strong man. And then he will plunder his house.
  - type: heading
    content: The Unpardonable Sin
  '28':
  - type: note
    content: Matt. 12:31, 32; Luke 12:10; (1 John 5:16)
  - type: text
    content: “Assuredly, I say to you, all sins will be forgiven the sons of men, and whatever blasphemies they may utter;
  - type: text
    content: ' '
  '29':
  - type: text
    content: but he who blasphemes against the Holy Spirit never has forgiveness, but is subject to eternal condemnation”
  - type: text
    content: '— '
  '3':
  - type: text
    content: 'And He said to the man who had the withered hand, '
  - type: text
    content: “Step forward.”
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'because they '
  - type: note
    content: Matt. 9:34; John 7:20; 8:48, 52; 10:20
  - type: text
    content: said, “He has an unclean spirit.”
  - type: heading
    content: Jesus’ Mother and Brothers Send for Him
  '31':
  - type: note
    content: Matt. 12:46–50; Luke 8:19–21
  - type: text
    content: 'Then His brothers and His mother came, and standing outside they sent to Him, calling Him. '
  '32':
  - type: text
    content: And a multitude was sitting around Him; and they said to Him, “Look, Your mother and Your brothers are outside seeking You.”
  '33':
  - type: text
    content: 'But He answered them, saying, '
  - type: text
    content: “Who is My mother, or My brothers?”
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'And He looked around in a circle at those who sat about Him, and said, '
  - type: text
    content: “Here are My mother and My brothers!
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'For whoever does the '
  - type: note
    content: Eph. 6:6; Heb. 10:36; 1 Pet. 4:2; (1 John 2:17)
  - type: text
    content: will of God is My brother and My sister and mother.”
  '4':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: “Is it lawful on the Sabbath to do good or to do evil, to save life or to kill?”
  - type: text
    content: ' But they kept silent. '
  '5':
  - type: text
    content: 'And when He had looked around at them with anger, being grieved by the '
  - type: note
    content: Zech. 7:12
  - type: text
    content: 'hardness of their hearts, He said to the man, '
  - type: text
    content: “Stretch out your hand.”
  - type: text
    content: ' And he stretched '
  - type: text
    content: it
  - type: text
    content: ' out, and his hand was restored as whole as the other. '
  '6':
  - type: note
    content: Ps. 2:2; Mark 12:13
  - type: text
    content: 'Then the Pharisees went out and immediately plotted with '
  - type: note
    content: Matt. 22:16
  - type: text
    content: the Herodians against Him, how they might destroy Him.
  - type: heading
    content: A Great Multitude Follows Jesus
  '7':
  - type: text
    content: 'But Jesus withdrew with His disciples to the sea. And a great multitude from Galilee followed Him, '
  - type: note
    content: Matt. 4:25; Luke 6:17
  - type: text
    content: 'and from Judea '
  '8':
  - type: text
    content: 'and Jerusalem and Idumea and beyond the Jordan; and those from Tyre and Sidon, a great multitude, when they heard how '
  - type: note
    content: Mark 5:19
  - type: text
    content: 'many things He was doing, came to Him. '
  '9':
  - type: text
    content: 'So He told His disciples that a small boat should be kept ready for Him because of the multitude, lest they should crush Him. '
