  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 12:46–50; Luke 8:19–21
    marker-yv: yv-n
  - type: text
    text: 'Then His brothers and His mother came, and standing outside they sent to Him, calling Him. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: And a multitude was sitting around Him; and they said to Him, “Look, Your mother and Your brothers are outside seeking You.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'But He answered them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who is My mother, or My brothers?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And He looked around in a circle at those who sat about Him, and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Here are My mother and My brothers!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'For whoever does the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 6:6; Heb. 10:36; 1 Pet. 4:2; (1 John 2:17)
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will of God is My brother and My sister and mother.”
