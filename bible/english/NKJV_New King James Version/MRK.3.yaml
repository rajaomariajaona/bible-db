      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And the scribes who came down from Jerusalem said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 9:34; 10:25; Luke 11:15; John 7:20; 8:48, 52; 10:20
    marker-yv: yv-n
  - type: text
    text: '“He has Beelzebub,” and, “By the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (John 12:31; 14:30; 16:11; Eph. 2:2)
    marker-yv: yv-n
  - type: text
    text: ruler of the demons He casts out demons.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 12:25–29; Luke 11:17–22
    marker-yv: yv-n
  - type: text
    text: 'So He called them to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Himself
  - type: text
    text: ' and said to them in parables: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How can Satan cast out Satan?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If a kingdom is divided against itself, that kingdom cannot stand.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if a house is divided against itself, that house cannot stand.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if Satan has risen up against himself, and is divided, he cannot stand, but has an end.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 49:24, 25); Matt. 12:29
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No one can enter a strong man’s house and plunder his goods, unless he first binds the strong man. And then he will plunder his house.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Unpardonable Sin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
