document_id: LEV.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Profane Fire of Nadab and Abihu
  - type: text
    content: 'Then '
  - type: note
    content: Ex. 24:1, 9; Num. 3:2–4; 1 Chr. 24:2
  - type: text
    content: 'Nadab and Abihu, the sons of Aaron, '
  - type: note
    content: Lev. 16:12
  - type: text
    content: 'each took his censer and put fire in it, put incense on it, and offered '
  - type: note
    content: Ex. 30:9; 1 Sam. 2:17
  - type: text
    content: 'profane fire before the '
  - type: heading
    content: Lord
  - type: text
    content: ', which He had not commanded them. '
  '10':
  - type: text
    content: 'that you may '
  - type: note
    content: Lev. 11:47; 20:25; Ezek. 22:26; 44:23
  - type: text
    content: 'distinguish between holy and unholy, and between unclean and clean, '
  '11':
  - type: note
    content: Deut. 24:8; Neh. 8:2, 8; Jer. 18:18; Mal. 2:7
  - type: text
    content: 'and that you may teach the children of Israel all the statutes which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has spoken to them by the hand of Moses.”'
  '12':
  - type: text
    content: 'And Moses spoke to Aaron, and to Eleazar and Ithamar, his sons who were left: '
  - type: note
    content: Num. 18:9
  - type: text
    content: '“Take the grain offering that remains of the offerings made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: ', and eat it without leaven beside the altar; '
  - type: note
    content: Lev. 21:22
  - type: text
    content: 'for it is most holy. '
  '13':
  - type: text
    content: 'You shall eat it in a '
  - type: note
    content: Num. 18:10
  - type: text
    content: 'holy place, because it is your due and your sons’ due, of the sacrifices made by fire to the '
  - type: heading
    content: Lord
  - type: text
    content: '; for '
  - type: note
    content: Lev. 2:3; 6:16
  - type: text
    content: 'so I have been commanded. '
  '14':
  - type: note
    content: Ex. 29:24, 26, 27; Lev. 7:30–34; Num. 18:11
  - type: text
    content: 'The breast of the wave offering and the thigh of the heave offering you shall eat in a clean place, you, your sons, and your '
  - type: note
    content: Lev. 22:13
  - type: text
    content: 'daughters with you; for they are your due and your sons’ '
  - type: note
    content: Num. 18:10
  - type: text
    content: 'due, which are given from the sacrifices of peace offerings of the children of Israel. '
  '15':
  - type: note
    content: Lev. 7:29, 30, 34
  - type: text
    content: 'The thigh of the heave offering and the breast of the wave offering they shall bring with the offerings of fat made by fire, to offer as a wave offering before the '
  - type: heading
    content: Lord
  - type: text
    content: '. And it shall be yours and your sons’ with you, by a statute forever, as the '
  - type: heading
    content: Lord
  - type: text
    content: ' has commanded.”'
  '16':
  - type: text
    content: 'Then Moses made careful inquiry about '
  - type: note
    content: Lev. 9:3, 15
  - type: text
    content: 'the goat of the sin offering, and there it was—burned up. And he was angry with Eleazar and Ithamar, the sons of Aaron who were left, saying, '
  '17':
  - type: note
    content: Lev. 6:24–30
  - type: text
    content: '“Why have you not eaten the sin offering in a holy place, since it is most holy, and God has given it to you to bear '
  - type: note
    content: Ex. 28:38; Lev. 22:16; Num. 18:1
  - type: text
    content: 'the guilt of the congregation, to make atonement for them before the '
  - type: heading
    content: Lord
  - type: text
    content: '? '
  '18':
  - type: text
    content: 'See! '
  - type: note
    content: Lev. 6:30
  - type: text
    content: 'Its blood was not brought inside the holy place; indeed you should have eaten it in a holy place, '
  - type: note
    content: Lev. 6:26, 30
  - type: text
    content: as I commanded.”
  '19':
  - type: text
    content: 'And Aaron said to Moses, “Look, '
  - type: note
    content: Lev. 9:8, 12
  - type: text
    content: 'this day they have offered their sin offering and their burnt offering before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and such things have befallen me! If I had eaten the sin offering today, '
  - type: note
    content: (Is. 1:11–15); Jer. 6:20; 14:12; Hos. 9:4; (Mal. 1:10, 13; 3:1–4)
  - type: text
    content: 'would it have been accepted in the sight of the '
  - type: heading
    content: Lord
  - type: text
    content: '?” '
  '2':
  - type: text
    content: 'So '
  - type: note
    content: Gen. 19:24; Num. 11:1; 16:35; Rev. 20:9
  - type: text
    content: 'fire went out from the '
  - type: heading
    content: Lord
  - type: text
    content: ' and devoured them, and they died before the '
  - type: heading
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: So when Moses heard that, he was content.
  '3':
  - type: text
    content: 'And Moses said to Aaron, “This is what the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke, saying:'
  - type: text
    content: '‘By those '
  - type: note
    content: Ex. 19:22; Lev. 21:6; Is. 52:11; Ezek. 20:41
  - type: text
    content: who come near Me
  - type: text
    content: I must be regarded as holy;
  - type: text
    content: And before all the people
  - type: text
    content: I must be glorified.’ ”
  - type: text
    content: So Aaron held his peace.
  '4':
  - type: text
    content: 'Then Moses called Mishael and Elzaphan, the sons of Uzziel the uncle of Aaron, and said to them, “Come near, '
  - type: note
    content: Acts 5:6, 10
  - type: text
    content: 'carry your brethren from before the sanctuary out of the camp.” '
  '5':
  - type: text
    content: So they went near and carried them by their tunics out of the camp, as Moses had said.
  '6':
  - type: text
    content: 'And Moses said to Aaron, and to Eleazar and Ithamar, his sons, “Do not uncover your heads nor tear your clothes, lest you die, and '
  - type: note
    content: Num. 1:53; 16:22, 46; 18:5; Josh. 7:1; 22:18, 20; 2 Sam. 24:1
  - type: text
    content: 'wrath come upon all the people. But let your brethren, the whole house of Israel, bewail the burning which the '
  - type: heading
    content: Lord
  - type: text
    content: ' has kindled. '
  '7':
  - type: note
    content: Lev. 8:33; 21:12
  - type: text
    content: 'You shall not go out from the door of the tabernacle of meeting, lest you die, '
  - type: note
    content: Lev. 8:30
  - type: text
    content: 'for the anointing oil of the '
  - type: heading
    content: Lord
  - type: text
    content: ' is upon you.” And they did according to the word of Moses.'
  - type: heading
    content: Conduct Prescribed for Priests
  '8':
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Aaron, saying: '
  '9':
  - type: note
    content: Gen. 9:21; (Prov. 20:1; 31:5); Is. 28:7; Ezek. 44:21; Hos. 4:11; Luke 1:15; (Eph. 5:18); 1 Tim. 3:3; Titus 1:7
  - type: text
    content: '“Do not drink wine or intoxicating drink, you, nor your sons with you, when you go into the tabernacle of meeting, lest you die. It shall be a statute forever throughout your generations, '
