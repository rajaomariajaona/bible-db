  children:
  - type: text
    text: The Profane Fire of Nadab and Abihu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 24:1, 9; Num. 3:2–4; 1 Chr. 24:2
    marker-yv: yv-n
  - type: text
    text: 'Nadab and Abihu, the sons of Aaron, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 16:12
    marker-yv: yv-n
  - type: text
    text: 'each took his censer and put fire in it, put incense on it, and offered '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:9; 1 Sam. 2:17
    marker-yv: yv-n
  - type: text
    text: 'profane fire before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', which He had not commanded them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 19:24; Num. 11:1; 16:35; Rev. 20:9
    marker-yv: yv-n
  - type: text
    text: 'fire went out from the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and devoured them, and they died before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Moses said to Aaron, “This is what the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘By those '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 19:22; Lev. 21:6; Is. 52:11; Ezek. 20:41
    marker-yv: yv-n
  - type: text
    text: who come near Me
- type: usfm
  marker: q2
  children:
  - type: text
    text: I must be regarded as holy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: And before all the people
- type: usfm
  marker: q2
  children:
  - type: text
    text: I must be glorified.’ ”
- type: usfm
  marker: p
  children:
  - type: text
    text: So Aaron held his peace.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Moses called Mishael and Elzaphan, the sons of Uzziel the uncle of Aaron, and said to them, “Come near, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 5:6, 10
    marker-yv: yv-n
  - type: text
    text: 'carry your brethren from before the sanctuary out of the camp.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So they went near and carried them by their tunics out of the camp, as Moses had said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And Moses said to Aaron, and to Eleazar and Ithamar, his sons, “Do not uncover your heads nor tear your clothes, lest you die, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 1:53; 16:22, 46; 18:5; Josh. 7:1; 22:18, 20; 2 Sam. 24:1
    marker-yv: yv-n
  - type: text
    text: 'wrath come upon all the people. But let your brethren, the whole house of Israel, bewail the burning which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has kindled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 8:33; 21:12
    marker-yv: yv-n
  - type: text
    text: 'You shall not go out from the door of the tabernacle of meeting, lest you die, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 8:30
    marker-yv: yv-n
  - type: text
    text: 'for the anointing oil of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is upon you.” And they did according to the word of Moses.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conduct Prescribed for Priests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Aaron, saying: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 9:21; (Prov. 20:1; 31:5); Is. 28:7; Ezek. 44:21; Hos. 4:11; Luke 1:15; (Eph. 5:18); 1 Tim. 3:3; Titus 1:7
    marker-yv: yv-n
  - type: text
    text: '“Do not drink wine or intoxicating drink, you, nor your sons with you, when you go into the tabernacle of meeting, lest you die. It shall be a statute forever throughout your generations, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'that you may '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 11:47; 20:25; Ezek. 22:26; 44:23
    marker-yv: yv-n
  - type: text
    text: 'distinguish between holy and unholy, and between unclean and clean, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 24:8; Neh. 8:2, 8; Jer. 18:18; Mal. 2:7
    marker-yv: yv-n
  - type: text
    text: 'and that you may teach the children of Israel all the statutes which the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken to them by the hand of Moses.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And Moses spoke to Aaron, and to Eleazar and Ithamar, his sons who were left: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 18:9
    marker-yv: yv-n
  - type: text
    text: '“Take the grain offering that remains of the offerings made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and eat it without leaven beside the altar; '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 21:22
    marker-yv: yv-n
  - type: text
    text: 'for it is most holy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'You shall eat it in a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 18:10
    marker-yv: yv-n
  - type: text
    text: 'holy place, because it is your due and your sons’ due, of the sacrifices made by fire to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '; for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 2:3; 6:16
    marker-yv: yv-n
  - type: text
    text: 'so I have been commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:24, 26, 27; Lev. 7:30–34; Num. 18:11
    marker-yv: yv-n
  - type: text
    text: 'The breast of the wave offering and the thigh of the heave offering you shall eat in a clean place, you, your sons, and your '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 22:13
    marker-yv: yv-n
  - type: text
    text: 'daughters with you; for they are your due and your sons’ '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 18:10
    marker-yv: yv-n
  - type: text
    text: 'due, which are given from the sacrifices of peace offerings of the children of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 7:29, 30, 34
    marker-yv: yv-n
  - type: text
    text: 'The thigh of the heave offering and the breast of the wave offering they shall bring with the offerings of fat made by fire, to offer as a wave offering before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '. And it shall be yours and your sons’ with you, by a statute forever, as the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has commanded.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Moses made careful inquiry about '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 9:3, 15
    marker-yv: yv-n
  - type: text
    text: 'the goat of the sin offering, and there it was—burned up. And he was angry with Eleazar and Ithamar, the sons of Aaron who were left, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 6:24–30
    marker-yv: yv-n
  - type: text
    text: '“Why have you not eaten the sin offering in a holy place, since it is most holy, and God has given it to you to bear '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 28:38; Lev. 22:16; Num. 18:1
    marker-yv: yv-n
  - type: text
    text: 'the guilt of the congregation, to make atonement for them before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'See! '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 6:30
    marker-yv: yv-n
  - type: text
    text: 'Its blood was not brought inside the holy place; indeed you should have eaten it in a holy place, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 6:26, 30
    marker-yv: yv-n
  - type: text
    text: as I commanded.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And Aaron said to Moses, “Look, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 9:8, 12
    marker-yv: yv-n
  - type: text
    text: 'this day they have offered their sin offering and their burnt offering before the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and such things have befallen me! If I had eaten the sin offering today, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Is. 1:11–15); Jer. 6:20; 14:12; Hos. 9:4; (Mal. 1:10, 13; 3:1–4)
    marker-yv: yv-n
  - type: text
    text: 'would it have been accepted in the sight of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: '?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So when Moses heard that, he was content.
