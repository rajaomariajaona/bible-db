document_id: JUD.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greeting to the Called
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jude, a bondservant of Jesus Christ, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 1:13
    marker-yv: yv-n
  - type: text
    text: brother of James,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'To those who are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 1:7
    marker-yv: yv-n
  - type: text
    text: 'called, sanctified by God the Father, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 17:11, 12
    marker-yv: yv-n
  - type: text
    text: 'preserved in Jesus Christ:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mercy, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Pet. 1:2; 2 Pet. 1:2
    marker-yv: yv-n
  - type: text
    text: peace, and love be multiplied to you.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contend for the Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Beloved, while I was very diligent to write to you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Titus 1:4
    marker-yv: yv-n
  - type: text
    text: 'concerning our common salvation, I found it necessary to write to you exhorting '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 1:27
    marker-yv: yv-n
  - type: text
    text: 'you to contend earnestly for the faith which was once for all delivered to the saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For certain men have crept in unnoticed, who long ago were marked out for this condemnation, ungodly men, who turn the grace of our God into lewdness and deny the only Lord God and our Lord Jesus Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Old and New Apostates
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But I want to remind you, though you once knew this, that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 12:51; 1 Cor. 10:5–10; Heb. 3:16
    marker-yv: yv-n
  - type: text
    text: 'the Lord, having saved the people out of the land of Egypt, afterward destroyed those who did not believe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the angels who did not keep their proper domain, but left their own abode, He has reserved in everlasting chains under darkness for the judgment of the great day; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'as '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 19:24; 2 Pet. 2:6
    marker-yv: yv-n
  - type: text
    text: Sodom and Gomorrah, and the cities around them in a similar manner to these, having given themselves over to sexual immorality and gone after strange flesh, are set forth as an example, suffering the vengeance of eternal fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Pet. 2:10
    marker-yv: yv-n
  - type: text
    text: 'Likewise also these dreamers defile the flesh, reject authority, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 22:28
    marker-yv: yv-n
  - type: text
    text: 'speak evil of dignitaries. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Yet Michael the archangel, in contending with the devil, when he disputed about the body of Moses, dared not bring against him a reviling accusation, but said, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Zech. 3:2
    marker-yv: yv-n
  - type: text
    text: '“The Lord rebuke you!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Pet. 2:12
    marker-yv: yv-n
  - type: text
    text: 'But these speak evil of whatever they do not know; and whatever they know naturally, like brute beasts, in these things they corrupt themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Woe to them! For they have gone in the way '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 4:3–8; Heb. 11:4; 1 John 3:12
    marker-yv: yv-n
  - type: text
    text: 'of Cain, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 31:16; 2 Pet. 2:15; Rev. 2:14
    marker-yv: yv-n
  - type: text
    text: 'have run greedily in the error of Balaam for profit, and perished '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 16:1–3, 31–35
    marker-yv: yv-n
  - type: text
    text: in the rebellion of Korah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Apostates Depraved and Doomed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'These are spots in your love feasts, while they feast with you without fear, serving only themselves. They are clouds without water, carried about by the winds; late autumn trees without fruit, twice dead, pulled up by the roots; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 57:20
    marker-yv: yv-n
  - type: text
    text: 'raging waves of the sea, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Phil. 3:19)
    marker-yv: yv-n
  - type: text
    text: 'foaming up their own shame; wandering stars '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Pet. 2:17; Jude 6
    marker-yv: yv-n
  - type: text
    text: for whom is reserved the blackness of darkness forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now Enoch, the seventh from Adam, prophesied about these men also, saying, “Behold, the Lord comes with ten thousands of His saints, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'to execute judgment on all, to convict all who are ungodly among them of all their ungodly deeds which they have committed in an ungodly way, and of all the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 2:3
    marker-yv: yv-n
  - type: text
    text: harsh things which ungodly sinners have spoken against Him.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Apostates Predicted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These are grumblers, complainers, walking according to their own lusts; and they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Pet. 2:18
    marker-yv: yv-n
  - type: text
    text: 'mouth great swelling words, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Prov. 28:21
    marker-yv: yv-n
  - type: text
    text: 'flattering people to gain advantage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Pet. 3:2
    marker-yv: yv-n
  - type: text
    text: 'But you, beloved, remember the words which were spoken before by the apostles of our Lord Jesus Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'how they told you that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 20:29; (1 Tim. 4:1); 2 Tim. 3:1; 4:3; 2 Pet. 3:3
    marker-yv: yv-n
  - type: text
    text: 'there would be mockers in the last time who would walk according to their own ungodly lusts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: These are sensual persons, who cause divisions, not having the Spirit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maintain Your Life with God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But you, beloved, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 2:7; 1 Thess. 5:11
    marker-yv: yv-n
  - type: text
    text: 'building yourselves up on your most holy faith, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 8:26)
    marker-yv: yv-n
  - type: text
    text: 'praying in the Holy Spirit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'keep yourselves in the love of God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Titus 2:13; Heb. 9:28; 2 Pet. 3:12
    marker-yv: yv-n
  - type: text
    text: looking for the mercy of our Lord Jesus Christ unto eternal life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And on some have compassion, making a distinction; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'but '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 11:14
    marker-yv: yv-n
  - type: text
    text: 'others save with fear, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Amos 4:11; Zech. 3:2; 1 Cor. 3:15
    marker-yv: yv-n
  - type: text
    text: 'pulling them out of the fire, hating even '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Zech. 3:4, 5); Rev. 3:4
    marker-yv: yv-n
  - type: text
    text: the garment defiled by the flesh.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Glory to God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Eph. 3:20)
    marker-yv: yv-n
  - type: text
    text: Now to Him who is able to keep you from stumbling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Col. 1:22
    marker-yv: yv-n
  - type: text
    text: to present you faultless
- type: usfm
  marker: q2
  children:
  - type: text
    text: Before the presence of His glory with exceeding joy,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: To God our Savior,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who alone is wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Be glory and majesty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Dominion and power,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Both now and forever.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Amen.
