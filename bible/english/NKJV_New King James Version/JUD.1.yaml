document_id: JUD.1,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Greeting to the Called
  - type: text
    content: 'Jude, a bondservant of Jesus Christ, and '
  - type: note
    content: Acts 1:13
  - type: text
    content: brother of James,
  - type: text
    content: 'To those who are '
  - type: note
    content: Rom. 1:7
  - type: text
    content: 'called, sanctified by God the Father, and '
  - type: note
    content: John 17:11, 12
  - type: text
    content: 'preserved in Jesus Christ:'
  '10':
  - type: note
    content: 2 Pet. 2:12
  - type: text
    content: 'But these speak evil of whatever they do not know; and whatever they know naturally, like brute beasts, in these things they corrupt themselves. '
  '11':
  - type: text
    content: 'Woe to them! For they have gone in the way '
  - type: note
    content: Gen. 4:3–8; Heb. 11:4; 1 John 3:12
  - type: text
    content: 'of Cain, '
  - type: note
    content: Num. 31:16; 2 Pet. 2:15; Rev. 2:14
  - type: text
    content: 'have run greedily in the error of Balaam for profit, and perished '
  - type: note
    content: Num. 16:1–3, 31–35
  - type: text
    content: in the rebellion of Korah.
  - type: heading
    content: Apostates Depraved and Doomed
  '12':
  - type: text
    content: 'These are spots in your love feasts, while they feast with you without fear, serving only themselves. They are clouds without water, carried about by the winds; late autumn trees without fruit, twice dead, pulled up by the roots; '
  '13':
  - type: note
    content: Is. 57:20
  - type: text
    content: 'raging waves of the sea, '
  - type: note
    content: (Phil. 3:19)
  - type: text
    content: 'foaming up their own shame; wandering stars '
  - type: note
    content: 2 Pet. 2:17; Jude 6
  - type: text
    content: for whom is reserved the blackness of darkness forever.
  '14':
  - type: text
    content: 'Now Enoch, the seventh from Adam, prophesied about these men also, saying, “Behold, the Lord comes with ten thousands of His saints, '
  '15':
  - type: text
    content: 'to execute judgment on all, to convict all who are ungodly among them of all their ungodly deeds which they have committed in an ungodly way, and of all the '
  - type: note
    content: 1 Sam. 2:3
  - type: text
    content: harsh things which ungodly sinners have spoken against Him.”
  - type: heading
    content: Apostates Predicted
  '16':
  - type: text
    content: 'These are grumblers, complainers, walking according to their own lusts; and they '
  - type: note
    content: 2 Pet. 2:18
  - type: text
    content: 'mouth great swelling words, '
  - type: note
    content: Prov. 28:21
  - type: text
    content: 'flattering people to gain advantage. '
  '17':
  - type: note
    content: 2 Pet. 3:2
  - type: text
    content: 'But you, beloved, remember the words which were spoken before by the apostles of our Lord Jesus Christ: '
  '18':
  - type: text
    content: 'how they told you that '
  - type: note
    content: Acts 20:29; (1 Tim. 4:1); 2 Tim. 3:1; 4:3; 2 Pet. 3:3
  - type: text
    content: 'there would be mockers in the last time who would walk according to their own ungodly lusts. '
  '19':
  - type: text
    content: These are sensual persons, who cause divisions, not having the Spirit.
  - type: heading
    content: Maintain Your Life with God
  '2':
  - type: text
    content: 'Mercy, '
  - type: note
    content: 1 Pet. 1:2; 2 Pet. 1:2
  - type: text
    content: peace, and love be multiplied to you.
  - type: heading
    content: Contend for the Faith
  '20':
  - type: text
    content: 'But you, beloved, '
  - type: note
    content: Col. 2:7; 1 Thess. 5:11
  - type: text
    content: 'building yourselves up on your most holy faith, '
  - type: note
    content: (Rom. 8:26)
  - type: text
    content: 'praying in the Holy Spirit, '
  '21':
  - type: text
    content: 'keep yourselves in the love of God, '
  - type: note
    content: Titus 2:13; Heb. 9:28; 2 Pet. 3:12
  - type: text
    content: looking for the mercy of our Lord Jesus Christ unto eternal life.
  '22':
  - type: text
    content: 'And on some have compassion, making a distinction; '
  '23':
  - type: text
    content: 'but '
  - type: note
    content: Rom. 11:14
  - type: text
    content: 'others save with fear, '
  - type: note
    content: Amos 4:11; Zech. 3:2; 1 Cor. 3:15
  - type: text
    content: 'pulling them out of the fire, hating even '
  - type: note
    content: (Zech. 3:4, 5); Rev. 3:4
  - type: text
    content: the garment defiled by the flesh.
  - type: heading
    content: Glory to God
  '24':
  - type: note
    content: (Eph. 3:20)
  - type: text
    content: Now to Him who is able to keep you from stumbling,
  - type: text
    content: 'And '
  - type: note
    content: Col. 1:22
  - type: text
    content: to present you faultless
  - type: text
    content: Before the presence of His glory with exceeding joy,
  '25':
  - type: text
    content: To God our Savior,
  - type: text
    content: Who alone is wise,
  - type: text
    content: Be glory and majesty,
  - type: text
    content: Dominion and power,
  - type: text
    content: Both now and forever.
  - type: text
    content: Amen.
  '3':
  - type: text
    content: 'Beloved, while I was very diligent to write to you '
  - type: note
    content: Titus 1:4
  - type: text
    content: 'concerning our common salvation, I found it necessary to write to you exhorting '
  - type: note
    content: Phil. 1:27
  - type: text
    content: 'you to contend earnestly for the faith which was once for all delivered to the saints. '
  '4':
  - type: text
    content: For certain men have crept in unnoticed, who long ago were marked out for this condemnation, ungodly men, who turn the grace of our God into lewdness and deny the only Lord God and our Lord Jesus Christ.
  - type: heading
    content: Old and New Apostates
  '5':
  - type: text
    content: 'But I want to remind you, though you once knew this, that '
  - type: note
    content: Ex. 12:51; 1 Cor. 10:5–10; Heb. 3:16
  - type: text
    content: 'the Lord, having saved the people out of the land of Egypt, afterward destroyed those who did not believe. '
  '6':
  - type: text
    content: 'And the angels who did not keep their proper domain, but left their own abode, He has reserved in everlasting chains under darkness for the judgment of the great day; '
  '7':
  - type: text
    content: 'as '
  - type: note
    content: Gen. 19:24; 2 Pet. 2:6
  - type: text
    content: Sodom and Gomorrah, and the cities around them in a similar manner to these, having given themselves over to sexual immorality and gone after strange flesh, are set forth as an example, suffering the vengeance of eternal fire.
  '8':
  - type: note
    content: 2 Pet. 2:10
  - type: text
    content: 'Likewise also these dreamers defile the flesh, reject authority, and '
  - type: note
    content: Ex. 22:28
  - type: text
    content: 'speak evil of dignitaries. '
  '9':
  - type: text
    content: 'Yet Michael the archangel, in contending with the devil, when he disputed about the body of Moses, dared not bring against him a reviling accusation, but said, '
  - type: note
    content: Zech. 3:2
  - type: text
    content: '“The Lord rebuke you!” '
