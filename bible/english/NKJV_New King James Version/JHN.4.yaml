document_id: JHN.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: A Samaritan Woman Meets Her Messiah
  - type: text
    content: 'Therefore, when the Lord knew that the Pharisees had heard that Jesus made and '
  - type: note
    content: John 3:22, 26; 1 Cor. 1:17
  - type: text
    content: 'baptized more disciples than John '
  '10':
  - type: text
    content: 'Jesus answered and said to her, '
  - type: text
    content: '“If you knew the '
  - type: note
    content: (Rom. 5:15)
  - type: text
    content: 'gift of God, and who it is who says to you, ‘Give Me a drink,’ you would have asked Him, and He would have given you '
  - type: note
    content: Is. 12:3; 44:3; Jer. 2:13; Zech. 13:1; 14:8; John 7:38
  - type: text
    content: living water.”
  '11':
  - type: text
    content: 'The woman said to Him, “Sir, You have nothing to draw with, and the well is deep. Where then do You get that living water? '
  '12':
  - type: text
    content: Are You greater than our father Jacob, who gave us the well, and drank from it himself, as well as his sons and his livestock?”
  '13':
  - type: text
    content: 'Jesus answered and said to her, '
  - type: text
    content: “Whoever drinks of this water will thirst again,
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'but '
  - type: note
    content: (John 6:35, 58)
  - type: text
    content: 'whoever drinks of the water that I shall give him will never thirst. But the water that I shall give him '
  - type: note
    content: John 7:37, 38
  - type: text
    content: will become in him a fountain of water springing up into everlasting life.”
  '15':
  - type: note
    content: John 6:34, 35; 17:2, 3; (Rom. 6:23; 1 John 5:20)
  - type: text
    content: The woman said to Him, “Sir, give me this water, that I may not thirst, nor come here to draw.”
  '16':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “Go, call your husband, and come here.”
  '17':
  - type: text
    content: The woman answered and said, “I have no husband.”
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “You have well said, ‘I have no husband,’
  - type: text
    content: ' '
  '18':
  - type: text
    content: for you have had five husbands, and the one whom you now have is not your husband; in that you spoke truly.”
  '19':
  - type: text
    content: 'The woman said to Him, “Sir, '
  - type: note
    content: Matt. 21:11; Luke 7:16, 39; 24:19; John 6:14; 7:40; 9:17
  - type: text
    content: 'I perceive that You are a prophet. '
  '2':
  - type: text
    content: '(though Jesus Himself did not baptize, but His disciples), '
  '20':
  - type: text
    content: 'Our fathers worshiped on '
  - type: note
    content: Gen. 12:6–8; 33:18, 20; Judg. 9:7
  - type: text
    content: 'this mountain, and you '
  - type: text
    content: Jews
  - type: text
    content: ' say that in '
  - type: note
    content: Deut. 12:5, 11; 1 Kin. 9:3; 2 Chr. 7:12; Ps. 122:1–9
  - type: text
    content: Jerusalem is the place where one ought to worship.”
  '21':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: '“Woman, believe Me, the hour is coming '
  - type: note
    content: (Mal. 1:11); 1 Tim. 2:8
  - type: text
    content: when you will neither on this mountain, nor in Jerusalem, worship the Father.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'You worship '
  - type: note
    content: (2 Kin. 17:28–41)
  - type: text
    content: 'what you do not know; we know what we worship, for '
  - type: note
    content: (Is. 2:3; Luke 24:47; Rom. 3:1; 9:4, 5)
  - type: text
    content: salvation is of the Jews.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'But the hour is coming, and now is, when the true worshipers will '
  - type: note
    content: Matt. 18:20; (Heb. 13:10–14)
  - type: text
    content: 'worship the Father in '
  - type: note
    content: Phil. 3:3
  - type: text
    content: 'spirit '
  - type: note
    content: (John 1:17)
  - type: text
    content: and truth; for the Father is seeking such to worship Him.
  - type: text
    content: ' '
  '24':
  - type: note
    content: 2 Cor. 3:17
  - type: text
    content: 'God '
  - type: text
    content: is
  - type: text
    content: ' Spirit, and those who worship Him must worship in spirit and truth.”'
  '25':
  - type: text
    content: 'The woman said to Him, “I know that Messiah '
  - type: note
    content: Deut. 18:15
  - type: text
    content: 'is coming” (who is called Christ). “When He comes, '
  - type: note
    content: John 4:29, 39
  - type: text
    content: He will tell us all things.”
  '26':
  - type: text
    content: 'Jesus said to her, '
  - type: note
    content: Dan. 9:25; Matt. 26:63, 64; Mark 14:61, 62
  - type: text
    content: '“I who speak to you am '
  - type: text
    content: He.
  - type: text
    content: ”
  - type: heading
    content: The Whitened Harvest
  '27':
  - type: text
    content: 'And at this '
  - type: text
    content: point
  - type: text
    content: ' His disciples came, and they marveled that He talked with a woman; yet no one said, “What do You seek?” or, “Why are You talking with her?”'
  '28':
  - type: text
    content: 'The woman then left her waterpot, went her way into the city, and said to the men, '
  '29':
  - type: text
    content: '“Come, see a Man '
  - type: note
    content: John 4:25
  - type: text
    content: 'who told me all things that I ever did. Could this be the Christ?” '
  '3':
  - type: text
    content: 'He left Judea and departed again to Galilee. '
  '30':
  - type: text
    content: Then they went out of the city and came to Him.
  '31':
  - type: text
    content: In the meantime His disciples urged Him, saying, “Rabbi, eat.”
  '32':
  - type: text
    content: 'But He said to them, '
  - type: text
    content: “I have food to eat of which you do not know.”
  '33':
  - type: text
    content: 'Therefore the disciples said to one another, “Has anyone brought Him '
  - type: text
    content: anything
  - type: text
    content: ' to eat?”'
  '34':
  - type: text
    content: 'Jesus said to them, '
  - type: note
    content: Ps. 40:7, 8; Heb. 10:9
  - type: text
    content: '“My food is to do the will of Him who sent Me, and to '
  - type: note
    content: Job 23:12; (John 6:38; 17:4; 19:30)
  - type: text
    content: finish His work.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'Do you not say, ‘There are still four months and '
  - type: text
    content: then
  - type: text
    content: ' comes '
  - type: note
    content: Gen. 8:22
  - type: text
    content: 'the harvest’? Behold, I say to you, lift up your eyes and look at the fields, '
  - type: note
    content: Matt. 9:37; Luke 10:2
  - type: text
    content: for they are already white for harvest!
  - type: text
    content: ' '
  '36':
  - type: note
    content: Dan. 12:3; Rom. 6:22
  - type: text
    content: 'And he who reaps receives wages, and gathers fruit for eternal life, that '
  - type: note
    content: 1 Thess. 2:19
  - type: text
    content: both he who sows and he who reaps may rejoice together.
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'For in this the saying is true: '
  - type: note
    content: 1 Cor. 3:5–9
  - type: text
    content: ‘One sows and another reaps.’
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'I sent you to reap that for which you have not labored; '
  - type: note
    content: Jer. 44:4; (1 Pet. 1:12)
  - type: text
    content: others have labored, and you have entered into their labors.”
  - type: heading
    content: The Savior of the World
  '39':
  - type: text
    content: 'And many of the Samaritans of that city believed in Him '
  - type: note
    content: John 4:29
  - type: text
    content: 'because of the word of the woman who testified, “He told me all that I '
  - type: text
    content: ever
  - type: text
    content: ' did.” '
  '4':
  - type: text
    content: But He needed to go through Samaria.
  '40':
  - type: text
    content: 'So when the Samaritans had come to Him, they urged Him to stay with them; and He stayed there two days. '
  '41':
  - type: text
    content: 'And many more believed because of His own '
  - type: note
    content: Luke 4:32; (John 6:63)
  - type: text
    content: word.
  '42':
  - type: text
    content: 'Then they said to the woman, “Now we believe, not because of what you said, for '
  - type: note
    content: John 17:8; 1 John 4:14
  - type: text
    content: 'we ourselves have heard '
  - type: text
    content: Him
  - type: text
    content: ' and we know that this is indeed the Christ, the Savior of the world.”'
  - type: heading
    content: Welcome at Galilee
  '43':
  - type: text
    content: 'Now after the two days He departed from there and went to Galilee. '
  '44':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 13:57; Mark 6:4; Luke 4:24
  - type: text
    content: 'Jesus Himself testified that a prophet has no honor in his own country. '
  '45':
  - type: text
    content: 'So when He came to Galilee, the Galileans received Him, '
  - type: note
    content: John 2:13, 23; 3:2
  - type: text
    content: 'having seen all the things He did in Jerusalem at the feast; '
  - type: note
    content: Deut. 16:16
  - type: text
    content: for they also had gone to the feast.
  - type: heading
    content: A Nobleman’s Son Healed
  '46':
  - type: text
    content: 'So Jesus came again to Cana of Galilee '
  - type: note
    content: John 2:1, 11
  - type: text
    content: 'where He had made the water wine. And there was a certain nobleman whose son was sick at Capernaum. '
  '47':
  - type: text
    content: 'When he heard that Jesus had come out of Judea into Galilee, he went to Him and implored Him to come down and heal his son, for he was at the point of death. '
  '48':
  - type: text
    content: 'Then Jesus said to him, '
  - type: note
    content: John 6:30; Rom. 15:19; 1 Cor. 1:22; 2 Cor. 12:12; (2 Thess. 2:9); Heb. 2:4
  - type: text
    content: '“Unless you '
  - type: text
    content: people
  - type: text
    content: ' see signs and wonders, you will by no means believe.”'
  '49':
  - type: text
    content: The nobleman said to Him, “Sir, come down before my child dies!”
  '5':
  - type: text
    content: 'So He came to a city of Samaria which is called Sychar, near the plot of ground that '
  - type: note
    content: Gen. 33:19; Josh. 24:32
  - type: text
    content: 'Jacob '
  - type: note
    content: Gen. 48:22; Josh. 4:12
  - type: text
    content: 'gave to his son Joseph. '
  '50':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Go your way; your son lives.”
  - type: text
    content: ' So the man believed the word that Jesus spoke to him, and he went his way. '
  '51':
  - type: text
    content: 'And as he was now going down, his servants met him and told '
  - type: text
    content: him,
  - type: text
    content: ' saying, “Your son lives!”'
  '52':
  - type: text
    content: 'Then he inquired of them the hour when he got better. And they said to him, “Yesterday at the seventh hour the fever left him.” '
  '53':
  - type: text
    content: 'So the father knew that '
  - type: text
    content: it
  - type: text
    content: ' '
  - type: text
    content: was
  - type: text
    content: ' at the same hour in which Jesus said to him, '
  - type: text
    content: “Your son lives.”
  - type: text
    content: ' And he himself believed, and his whole household.'
  '54':
  - type: text
    content: 'This again '
  - type: text
    content: is
  - type: text
    content: ' the second sign Jesus did when He had come out of Judea into Galilee.'
  '6':
  - type: text
    content: 'Now Jacob’s well was there. Jesus therefore, being wearied from '
  - type: text
    content: His
  - type: text
    content: ' journey, sat thus by the well. It was about the sixth hour.'
  '7':
  - type: text
    content: 'A woman of Samaria came to draw water. Jesus said to her, '
  - type: text
    content: “Give Me a drink.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: For His disciples had gone away into the city to buy food.
  '9':
  - type: text
    content: 'Then the woman of Samaria said to Him, “How is it that You, being a Jew, ask a drink from me, a Samaritan woman?” For '
  - type: note
    content: Acts 10:28
  - type: text
    content: 'Jews have no dealings with '
  - type: note
    content: 2 Kin. 17:24; Matt. 10:5, 6; Luke 9:52; 10:33; 17:16; John 8:48
  - type: text
    content: Samaritans.
