    children:
    - type: text
      text: Sarah’s Death and Burial
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Sarah lived one hundred and twenty-seven years; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' the years of the life of Sarah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now Ephron dwelt among the sons of Heth; and Ephron the Hittite answered Abraham in the presence of the sons of Heth, all who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 23:18; 34:20, 24; Ruth 4:1, 4, 11
      marker-yv: yv-n
    - type: text
      text: 'entered at the gate of his city, saying, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 24:21–24
      marker-yv: yv-n
    - type: text
      text: '“No, my lord, hear me: I give you the field and the cave that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in it; I give it to you in the presence of the sons of my people. I give it to you. Bury your dead!”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then Abraham bowed himself down before the people of the land; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and he spoke to Ephron in the hearing of the people of the land, saying, “If you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: give
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' please hear me. I will give you money for the field; take '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' from me and I will bury my dead there.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Ephron answered Abraham, saying to him, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“My lord, listen to me; the land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: worth
    - type: text
      text: ' four hundred '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 30:13; Ezek. 45:12
      marker-yv: yv-n
    - type: text
      text: 'shekels of silver. What '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' that between you and me? So bury your dead.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And Abraham listened to Ephron; and Abraham '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 14:26; Jer. 32:9, 10; Zech. 11:12
      marker-yv: yv-n
    - type: text
      text: weighed out the silver for Ephron which he had named in the hearing of the sons of Heth, four hundred shekels of silver, currency of the merchants.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:9; 49:29–32; 50:13; Acts 7:16
      marker-yv: yv-n
    - type: text
      text: 'the field of Ephron which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in Machpelah, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' before Mamre, the field and the cave which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' in it, and all the trees that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in the field, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' within all the surrounding borders, were deeded '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: to Abraham as a possession in the presence of the sons of Heth, before all who went in at the gate of his city.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And after this, Abraham buried Sarah his wife in the cave of the field of Machpelah, before Mamre (that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' Hebron) in the land of Canaan. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So Sarah died in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 35:27; Josh. 14:15; 15:13; 21:11
      marker-yv: yv-n
    - type: text
      text: 'Kirjath Arba (that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 13:18; 23:19
      marker-yv: yv-n
    - type: text
      text: Hebron) in the land of Canaan, and Abraham came to mourn for Sarah and to weep for her.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So the field and the cave that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 32:10, 11
      marker-yv: yv-n
    - type: text
      text: were deeded to Abraham by the sons of Heth as property for a burial place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then Abraham stood up from before his dead, and spoke to the sons of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 10:15; 15:20; 2 Kin. 7:6
      marker-yv: yv-n
    - type: text
      text: 'Heth, saying, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 17:8); Lev. 25:23; 1 Chr. 29:15; Ps. 39:12; 105:12; 119:19; (Heb. 11:9, 13)
      marker-yv: yv-n
    - type: text
      text: '“I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am
    - type: text
      text: ' a foreigner and a visitor among you. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 7:5, 16
      marker-yv: yv-n
    - type: text
      text: Give me property for a burial place among you, that I may bury my dead out of my sight.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the sons of Heth answered Abraham, saying to him, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Hear us, my lord: You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 13:2; 14:14; 24:35
      marker-yv: yv-n
    - type: text
      text: mighty prince among us; bury your dead in the choicest of our burial places. None of us will withhold from you his burial place, that you may bury your dead.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then Abraham stood up and bowed himself to the people of the land, the sons of Heth. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And he spoke with them, saying, “If it is your wish that I bury my dead out of my sight, hear me, and meet with Ephron the son of Zohar for me, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'that he may give me the cave of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 25:9
      marker-yv: yv-n
    - type: text
      text: 'Machpelah which he has, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' at the end of his field. Let him give it to me at the full price, as property for a burial place among you.”'
