document_id: 2CO.7,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Therefore,
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 John 3:3)
      marker-yv: yv-n
    - type: text
      text: ' having these promises, beloved, let us cleanse ourselves from all filthiness of the flesh and spirit, perfecting holiness in the fear of God.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Corinthians’ Repentance
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:13; Ps. 32:10; Matt. 26:75
      marker-yv: yv-n
    - type: text
      text: 'godly sorrow produces repentance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leading
    - type: text
      text: ' to salvation, not to be regretted; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 17:22
      marker-yv: yv-n
    - type: text
      text: 'but the sorrow of the world produces death. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For observe this very thing, that you sorrowed in a godly manner: What diligence it produced in you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 5:11
      marker-yv: yv-n
    - type: text
      text: 'clearing of yourselves, what indignation, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' fear, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' vehement desire, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' zeal, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' vindication! In all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things
    - type: text
      text: ' you proved yourselves to be '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:5–11
      marker-yv: yv-n
    - type: text
      text: 'clear in this matter. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore, although I wrote to you, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: did
    - type: text
      text: ' not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: do
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' for the sake of him who had done the wrong, nor for the sake of him who suffered wrong, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:4
      marker-yv: yv-n
    - type: text
      text: but that our care for you in the sight of God might appear to you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Joy of Titus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Therefore we have been comforted in your comfort. And we rejoiced exceedingly more for the joy of Titus, because his spirit '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:32
      marker-yv: yv-n
    - type: text
      text: 'has been refreshed by you all. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For if in anything I have boasted to him about you, I am not ashamed. But as we spoke all things to you in truth, even so our boasting to Titus was found true. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And his affections are greater for you as he remembers '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:9; Phil. 2:12
      marker-yv: yv-n
    - type: text
      text: 'the obedience of you all, how with fear and trembling you received him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Therefore I rejoice that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:3; 8:22; 2 Thess. 3:4; Philem. 8, 21
      marker-yv: yv-n
    - type: text
      text: I have confidence in you in everything.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Open '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hearts
    - type: text
      text: ' to us. We have wronged no one, we have corrupted no one, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:33
      marker-yv: yv-n
    - type: text
      text: 'we have cheated no one. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I do not say '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this
    - type: text
      text: ' to condemn; for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 6:11, 12
      marker-yv: yv-n
    - type: text
      text: 'I have said before that you are in our hearts, to die together and to live together. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 3:12
      marker-yv: yv-n
    - type: text
      text: 'Great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my boldness of speech toward you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 1:4
      marker-yv: yv-n
    - type: text
      text: 'great '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my boasting on your behalf. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 2:17; Col. 1:24
      marker-yv: yv-n
    - type: text
      text: I am filled with comfort. I am exceedingly joyful in all our tribulation.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For indeed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:26; 2 Cor. 2:13
      marker-yv: yv-n
    - type: text
      text: 'when we came to Macedonia, our bodies had no rest, but '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 4:8
      marker-yv: yv-n
    - type: text
      text: 'we were troubled on every side. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 32:25
      marker-yv: yv-n
    - type: text
      text: 'Outside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' conflicts, inside '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' fears. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nevertheless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 49:13; 2 Cor. 1:3, 4
      marker-yv: yv-n
    - type: text
      text: 'God, who comforts the downcast, comforted us by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:13; 7:13
      marker-yv: yv-n
    - type: text
      text: 'the coming of Titus, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: and not only by his coming, but also by the consolation with which he was comforted in you, when he told us of your earnest desire, your mourning, your zeal for me, so that I rejoiced even more.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For even if I made you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:2
      marker-yv: yv-n
    - type: text
      text: 'sorry with my letter, I do not regret it; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 2:4
      marker-yv: yv-n
    - type: text
      text: 'though I did regret it. For I perceive that the same epistle made you sorry, though only for a while. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now I rejoice, not that you were made sorry, but that your sorrow led to repentance. For you were made sorry in a godly manner, that you might suffer loss from us in nothing. '
