document_id: PHP.4,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, my beloved and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 1:8
      marker-yv: yv-n
    - type: text
      text: 'longed-for brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 1:14
      marker-yv: yv-n
    - type: text
      text: 'my joy and crown, so '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:13; Phil. 1:27
      marker-yv: yv-n
    - type: text
      text: stand fast in the Lord, beloved.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Be United, Joyful, and in Prayer
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I rejoiced in the Lord greatly that now at last '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 11:9; Phil. 2:30
      marker-yv: yv-n
    - type: text
      text: 'your care for me has flourished again; though you surely did care, but you lacked opportunity. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not that I speak in regard to need, for I have learned in whatever state I am, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 9:8; 1 Tim. 6:6, 8; Heb. 13:5
      marker-yv: yv-n
    - type: text
      text: 'to be content: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 4:11
      marker-yv: yv-n
    - type: text
      text: 'I know how to be abased, and I know how to abound. Everywhere and in all things I have learned both to be full and to be hungry, both to abound and to suffer need. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I can do all things '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 15:5
      marker-yv: yv-n
    - type: text
      text: through Christ who strengthens me.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nevertheless you have done well that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 1:7
      marker-yv: yv-n
    - type: text
      text: 'you shared in my distress. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now you Philippians know also that in the beginning of the gospel, when I departed from Macedonia, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 11:8, 9
      marker-yv: yv-n
    - type: text
      text: 'no church shared with me concerning giving and receiving but you only. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For even in Thessalonica you sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: aid
    - type: text
      text: ' once and again for my necessities. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not that I seek the gift, but I seek '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Titus 3:14
      marker-yv: yv-n
    - type: text
      text: 'the fruit that abounds to your account. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indeed I have all and abound. I am full, having received from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 2:25
      marker-yv: yv-n
    - type: text
      text: 'Epaphroditus the things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sent
    - type: text
      text: ' from you, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 13:16
      marker-yv: yv-n
    - type: text
      text: 'a sweet-smelling aroma, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:1; 2 Cor. 9:12
      marker-yv: yv-n
    - type: text
      text: 'an acceptable sacrifice, well pleasing to God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And my God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 23:1; 2 Cor. 9:8
      marker-yv: yv-n
    - type: text
      text: 'shall supply all your need according to His riches in glory by Christ Jesus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I implore Euodia and I implore Syntyche '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 2:2; 3:16
      marker-yv: yv-n
    - type: text
      text: 'to be of the same mind in the Lord. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:27
      marker-yv: yv-n
    - type: text
      text: 'Now to our God and Father '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' glory forever and ever. Amen.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting and Blessing
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Greet every saint in Christ Jesus. The brethren '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 1:2
      marker-yv: yv-n
    - type: text
      text: 'who are with me greet you. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the saints greet you, but especially those who are of Caesar’s household.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The grace of our Lord Jesus Christ be with you all. Amen.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I urge you also, true companion, help these women who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:3
      marker-yv: yv-n
    - type: text
      text: 'labored with me in the gospel, with Clement also, and the rest of my fellow workers, whose names '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 32:32; Luke 10:20
      marker-yv: yv-n
    - type: text
      text: the Book of Life.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 12:12
      marker-yv: yv-n
    - type: text
      text: Rejoice in the Lord always. Again I will say, rejoice!
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let your gentleness be known to all men. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 16:22; Heb. 10:25, 37; (James 5:7–9); Rev. 22:7, 20
      marker-yv: yv-n
    - type: text
      text: 'The Lord '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' at hand.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 55:22; Matt. 6:25; 1 Pet. 5:7
      marker-yv: yv-n
    - type: text
      text: 'Be anxious for nothing, but in everything by prayer and supplication, with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Thess. 5:17, 18)
      marker-yv: yv-n
    - type: text
      text: 'thanksgiving, let your requests be made known to God; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 26:3; John 14:27); Phil. 4:9; Col. 3:15
      marker-yv: yv-n
    - type: text
      text: the peace of God, which surpasses all understanding, will guard your hearts and minds through Christ Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Meditate on These Things
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finally, brethren, whatever things are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 4:25
      marker-yv: yv-n
    - type: text
      text: 'true, whatever things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 8:21
      marker-yv: yv-n
    - type: text
      text: 'noble, whatever things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 16:20
      marker-yv: yv-n
    - type: text
      text: 'just, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 5:22; James 3:17
      marker-yv: yv-n
    - type: text
      text: 'whatever things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' pure, whatever things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 13:4–7
      marker-yv: yv-n
    - type: text
      text: 'lovely, whatever things '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' of good report, if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' any virtue and if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' anything praiseworthy—meditate on these things. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The things which you learned and received and heard and saw in me, these do, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 15:33; Heb. 13:20
      marker-yv: yv-n
    - type: text
      text: the God of peace will be with you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Philippian Generosity
    marker-yv: yv-h
