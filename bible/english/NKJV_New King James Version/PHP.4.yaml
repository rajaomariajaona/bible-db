document_id: PHP.4,114
type_code: eng
verses:
  '1':
  - type: text
    content: 'Therefore, my beloved and '
  - type: note
    content: Phil. 1:8
  - type: text
    content: 'longed-for brethren, '
  - type: note
    content: 2 Cor. 1:14
  - type: text
    content: 'my joy and crown, so '
  - type: note
    content: 1 Cor. 16:13; Phil. 1:27
  - type: text
    content: stand fast in the Lord, beloved.
  - type: heading
    content: Be United, Joyful, and in Prayer
  '10':
  - type: text
    content: 'But I rejoiced in the Lord greatly that now at last '
  - type: note
    content: 2 Cor. 11:9; Phil. 2:30
  - type: text
    content: 'your care for me has flourished again; though you surely did care, but you lacked opportunity. '
  '11':
  - type: text
    content: 'Not that I speak in regard to need, for I have learned in whatever state I am, '
  - type: note
    content: 2 Cor. 9:8; 1 Tim. 6:6, 8; Heb. 13:5
  - type: text
    content: 'to be content: '
  '12':
  - type: note
    content: 1 Cor. 4:11
  - type: text
    content: 'I know how to be abased, and I know how to abound. Everywhere and in all things I have learned both to be full and to be hungry, both to abound and to suffer need. '
  '13':
  - type: text
    content: 'I can do all things '
  - type: note
    content: John 15:5
  - type: text
    content: through Christ who strengthens me.
  '14':
  - type: text
    content: 'Nevertheless you have done well that '
  - type: note
    content: Phil. 1:7
  - type: text
    content: 'you shared in my distress. '
  '15':
  - type: text
    content: 'Now you Philippians know also that in the beginning of the gospel, when I departed from Macedonia, '
  - type: note
    content: 2 Cor. 11:8, 9
  - type: text
    content: 'no church shared with me concerning giving and receiving but you only. '
  '16':
  - type: text
    content: 'For even in Thessalonica you sent '
  - type: text
    content: aid
  - type: text
    content: ' once and again for my necessities. '
  '17':
  - type: text
    content: 'Not that I seek the gift, but I seek '
  - type: note
    content: Titus 3:14
  - type: text
    content: 'the fruit that abounds to your account. '
  '18':
  - type: text
    content: 'Indeed I have all and abound. I am full, having received from '
  - type: note
    content: Phil. 2:25
  - type: text
    content: 'Epaphroditus the things '
  - type: text
    content: sent
  - type: text
    content: ' from you, '
  - type: note
    content: Heb. 13:16
  - type: text
    content: 'a sweet-smelling aroma, '
  - type: note
    content: Rom. 12:1; 2 Cor. 9:12
  - type: text
    content: 'an acceptable sacrifice, well pleasing to God. '
  '19':
  - type: text
    content: 'And my God '
  - type: note
    content: Ps. 23:1; 2 Cor. 9:8
  - type: text
    content: 'shall supply all your need according to His riches in glory by Christ Jesus. '
  '2':
  - type: text
    content: 'I implore Euodia and I implore Syntyche '
  - type: note
    content: Phil. 2:2; 3:16
  - type: text
    content: 'to be of the same mind in the Lord. '
  '20':
  - type: note
    content: Rom. 16:27
  - type: text
    content: 'Now to our God and Father '
  - type: text
    content: be
  - type: text
    content: ' glory forever and ever. Amen.'
  - type: heading
    content: Greeting and Blessing
  '21':
  - type: text
    content: 'Greet every saint in Christ Jesus. The brethren '
  - type: note
    content: Gal. 1:2
  - type: text
    content: 'who are with me greet you. '
  '22':
  - type: text
    content: All the saints greet you, but especially those who are of Caesar’s household.
  '23':
  - type: text
    content: The grace of our Lord Jesus Christ be with you all. Amen.
  '3':
  - type: text
    content: 'And I urge you also, true companion, help these women who '
  - type: note
    content: Rom. 16:3
  - type: text
    content: 'labored with me in the gospel, with Clement also, and the rest of my fellow workers, whose names '
  - type: text
    content: are
  - type: text
    content: ' in '
  - type: note
    content: Ex. 32:32; Luke 10:20
  - type: text
    content: the Book of Life.
  '4':
  - type: note
    content: Rom. 12:12
  - type: text
    content: Rejoice in the Lord always. Again I will say, rejoice!
  '5':
  - type: text
    content: 'Let your gentleness be known to all men. '
  - type: note
    content: 1 Cor. 16:22; Heb. 10:25, 37; (James 5:7–9); Rev. 22:7, 20
  - type: text
    content: 'The Lord '
  - type: text
    content: is
  - type: text
    content: ' at hand.'
  '6':
  - type: note
    content: Ps. 55:22; Matt. 6:25; 1 Pet. 5:7
  - type: text
    content: 'Be anxious for nothing, but in everything by prayer and supplication, with '
  - type: note
    content: (1 Thess. 5:17, 18)
  - type: text
    content: 'thanksgiving, let your requests be made known to God; '
  '7':
  - type: text
    content: 'and '
  - type: note
    content: (Is. 26:3; John 14:27); Phil. 4:9; Col. 3:15
  - type: text
    content: the peace of God, which surpasses all understanding, will guard your hearts and minds through Christ Jesus.
  - type: heading
    content: Meditate on These Things
  '8':
  - type: text
    content: 'Finally, brethren, whatever things are '
  - type: note
    content: Eph. 4:25
  - type: text
    content: 'true, whatever things '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 8:21
  - type: text
    content: 'noble, whatever things '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
    content: Deut. 16:20
  - type: text
    content: 'just, '
  - type: note
    content: 1 Thess. 5:22; James 3:17
  - type: text
    content: 'whatever things '
  - type: text
    content: are
  - type: text
    content: ' pure, whatever things '
  - type: text
    content: are
  - type: text
    content: ' '
  - type: note
    content: 1 Cor. 13:4–7
  - type: text
    content: 'lovely, whatever things '
  - type: text
    content: are
  - type: text
    content: ' of good report, if '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' any virtue and if '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' anything praiseworthy—meditate on these things. '
  '9':
  - type: text
    content: 'The things which you learned and received and heard and saw in me, these do, and '
  - type: note
    content: Rom. 15:33; Heb. 13:20
  - type: text
    content: the God of peace will be with you.
  - type: heading
    content: Philippian Generosity
