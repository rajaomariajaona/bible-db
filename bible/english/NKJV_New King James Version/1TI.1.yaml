document_id: 1TI.1,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Greeting
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, an apostle of Jesus Christ, by the commandment of God our Savior and the Lord Jesus Christ, our hope,
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for fornicators, for sodomites, for kidnappers, for liars, for perjurers, and if there is any other thing that is contrary to sound doctrine, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'according to the glorious gospel of the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 6:15
      marker-yv: yv-n
    - type: text
      text: 'blessed God which was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 9:17
      marker-yv: yv-n
    - type: text
      text: committed to my trust.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Glory to God for His Grace
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I thank Christ Jesus our Lord who has '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:10
      marker-yv: yv-n
    - type: text
      text: 'enabled me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 7:25
      marker-yv: yv-n
    - type: text
      text: 'because He counted me faithful, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Col. 1:25
      marker-yv: yv-n
    - type: text
      text: 'putting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: me
    - type: text
      text: ' into the ministry, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'although '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:3; 1 Cor. 15:9
      marker-yv: yv-n
    - type: text
      text: 'I was formerly a blasphemer, a persecutor, and an insolent man; but I obtained mercy because '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 4:21
      marker-yv: yv-n
    - type: text
      text: 'I did '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' ignorantly in unbelief. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 5:20; 1 Cor. 3:10; 2 Cor. 4:15; Gal. 1:13–16
      marker-yv: yv-n
    - type: text
      text: 'And the grace of our Lord was exceedingly abundant, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Thess. 1:3; 1 Tim. 2:15; 4:12; 6:11; 2 Tim. 1:13; 2:22; Titus 2:2
      marker-yv: yv-n
    - type: text
      text: 'with faith and love which are in Christ Jesus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 3:1; 4:9; 2 Tim. 2:11; Titus 3:8
      marker-yv: yv-n
    - type: text
      text: 'This '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a faithful saying and worthy of all acceptance, that '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 53:5; 61:1; Hos. 6:1–3; Matt. 1:21; 9:13
      marker-yv: yv-n
    - type: text
      text: 'Christ Jesus came into the world to save sinners, of whom I am chief. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, for this reason I obtained mercy, that in me first Jesus Christ might show all longsuffering, as a pattern to those who are going to believe on Him for everlasting life. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 10:16
      marker-yv: yv-n
    - type: text
      text: 'the King eternal, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 1:23
      marker-yv: yv-n
    - type: text
      text: 'immortal, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 11:27
      marker-yv: yv-n
    - type: text
      text: 'invisible, to God '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:27
      marker-yv: yv-n
    - type: text
      text: 'who alone is wise, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 29:11
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' honor and glory forever and ever. Amen.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fight the Good Fight
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This charge I commit to you, son Timothy, according to the prophecies previously made concerning you, that by them you may wage the good warfare, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'having faith and a good conscience, which some having rejected, concerning the faith have suffered shipwreck, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To Timothy, a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 16:1, 2; Rom. 1:7; 2 Tim. 1:2; Titus 1:4
      marker-yv: yv-n
    - type: text
      text: 'true son in the faith:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gal. 1:3
      marker-yv: yv-n
    - type: text
      text: 'Grace, mercy, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' peace from God our Father and Jesus Christ our Lord.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No Other Doctrine
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'of whom are '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 2:17, 18
      marker-yv: yv-n
    - type: text
      text: 'Hymenaeus and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Tim. 4:14
      marker-yv: yv-n
    - type: text
      text: 'Alexander, whom I delivered to Satan that they may learn not to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 13:45
      marker-yv: yv-n
    - type: text
      text: blaspheme.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As I urged you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 20:1, 3
      marker-yv: yv-n
    - type: text
      text: 'when I went into Macedonia—remain in Ephesus that you may charge some '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 16:17; 2 Cor. 11:4; Gal. 1:6, 7; 1 Tim. 6:3
      marker-yv: yv-n
    - type: text
      text: 'that they teach no other doctrine, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 6:3, 4, 20; Titus 1:14
      marker-yv: yv-n
    - type: text
      text: 'nor give heed to fables and endless genealogies, which cause disputes rather than godly edification which is in faith. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 13:8–10; Gal. 5:14
      marker-yv: yv-n
    - type: text
      text: 'the purpose of the commandment is love '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 6:24
      marker-yv: yv-n
    - type: text
      text: 'from a pure heart, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' a good conscience, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from
    - type: text
      text: ' sincere faith, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'from which some, having strayed, have turned aside to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 6:4, 20
      marker-yv: yv-n
    - type: text
      text: 'idle talk, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: desiring to be teachers of the law, understanding neither what they say nor the things which they affirm.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But we know that the law '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 7:12, 16
      marker-yv: yv-n
    - type: text
      text: 'good if one uses it lawfully, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'knowing this: that the law is not made for a righteous person, but for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' lawless and insubordinate, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' ungodly and for sinners, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' unholy and profane, for murderers of fathers and murderers of mothers, for manslayers, '
