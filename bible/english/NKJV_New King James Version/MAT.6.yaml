document_id: MAT.6,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Do Good to Please God
  - type: text
    content: “Take heed that you do not do your charitable deeds before men, to be seen by them. Otherwise you have no reward from your Father in heaven.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Your kingdom come.
  - type: note
    content: Matt. 26:42; Luke 22:42; Acts 21:14
  - type: text
    content: Your will be done
  - type: text
    content: 'On earth '
  - type: note
    content: Ps. 103:20
  - type: text
    content: 'as '
  - type: text
    content: it is in heaven.
  '11':
  - type: text
    content: 'Give us this day our '
  - type: note
    content: (Job 23:12); Prov. 30:8; Is. 33:16; Luke 11:3
  - type: text
    content: daily bread.
  '12':
  - type: text
    content: 'And '
  - type: note
    content: (Matt. 18:21, 22)
  - type: text
    content: forgive us our debts,
  - type: text
    content: As we forgive our debtors.
  '13':
  - type: note
    content: (Matt. 26:41; 1 Cor. 10:31; 2 Pet. 2:9; Rev. 3:10)
  - type: text
    content: And do not lead us into temptation,
  - type: text
    content: 'But '
  - type: note
    content: John 17:15; (2 Thess. 3:3); 2 Tim. 4:18; (1 John 5:18)
  - type: text
    content: deliver us from the evil one.
  - type: text
    content: For Yours is the kingdom and the power and the glory forever. Amen.
  '14':
  - type: note
    content: (Matt. 7:2); Mark 11:25; (Eph. 4:32; Col. 3:13)
  - type: text
    content: “For if you forgive men their trespasses, your heavenly Father will also forgive you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'But '
  - type: note
    content: Matt. 18:35; James 2:13
  - type: text
    content: if you do not forgive men their trespasses, neither will your Father forgive your trespasses.
  - type: heading
    content: Fasting to Be Seen Only by God
  '16':
  - type: text
    content: '“Moreover, '
  - type: note
    content: Is. 58:3–7; Luke 18:12
  - type: text
    content: 'when you fast, do not be like the '
  - type: text
    content: hypocrites, with a sad countenance. For they disfigure their faces that they may appear to men to be fasting. Assuredly, I say to you, they have their reward.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'But you, when you fast, '
  - type: note
    content: Ruth 3:3; 2 Sam. 12:20; Dan. 10:3
  - type: text
    content: anoint your head and wash your face,
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'so that you do not appear to men to be fasting, but to your Father who '
  - type: text
    content: is
  - type: text
    content: ' in the secret '
  - type: text
    content: place;
  - type: text
    content: ' and your Father who sees in secret will reward you '
  - type: text
    content: openly.
  - type: heading
    content: Lay Up Treasures in Heaven
  '19':
  - type: note
    content: Prov. 23:4; (1 Tim. 6:17; Heb. 13:5); James 5:1
  - type: text
    content: “Do not lay up for yourselves treasures on earth, where moth and rust destroy and where thieves break in and steal;
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Therefore, '
  - type: note
    content: Rom. 12:8
  - type: text
    content: when you do a charitable deed, do not sound a trumpet before you as the hypocrites do in the synagogues and in the streets, that they may have glory from men. Assuredly, I say to you, they have their reward.
  - type: text
    content: ' '
  '20':
  - type: note
    content: Matt. 19:21; Luke 12:33; 18:22; 1 Tim. 6:19; 1 Pet. 1:4
  - type: text
    content: but lay up for yourselves treasures in heaven, where neither moth nor rust destroys and where thieves do not break in and steal.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For where your treasure is, there your heart will be also.
  - type: heading
    content: The Lamp of the Body
  '22':
  - type: note
    content: Luke 11:34, 35
  - type: text
    content: '“The lamp of the body is the eye. If therefore your eye is '
  - type: text
    content: good, your whole body will be full of light.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'But if your eye is '
  - type: text
    content: 'bad, your whole body will be full of darkness. If therefore the light that is in you is darkness, how great '
  - type: text
    content: is
  - type: text
    content: ' that darkness!'
  - type: heading
    content: You Cannot Serve God and Riches
  '24':
  - type: note
    content: Luke 16:9, 11, 13
  - type: text
    content: '“No one can serve two masters; for either he will hate the one and love the other, or else he will be loyal to the one and despise the other. '
  - type: note
    content: (Gal. 1:10; 1 Tim. 6:17; James 4:4; 1 John 2:15)
  - type: text
    content: 'You cannot serve God and '
  - type: text
    content: mammon.
  - type: heading
    content: Do Not Worry
  '25':
  - type: text
    content: '“Therefore I say to you, '
  - type: note
    content: (Ps. 55:22); Luke 12:22; (Phil. 4:6; 1 Pet. 5:7)
  - type: text
    content: do not worry about your life, what you will eat or what you will drink; nor about your body, what you will put on. Is not life more than food and the body more than clothing?
  - type: text
    content: ' '
  '26':
  - type: note
    content: Job 38:41; Ps. 147:9; Matt. 10:29; Luke 12:24
  - type: text
    content: Look at the birds of the air, for they neither sow nor reap nor gather into barns; yet your heavenly Father feeds them. Are you not of more value than they?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Which of you by worrying can add one '
  - type: text
    content: 'cubit to his '
  - type: text
    content: stature?
  '28':
  - type: text
    content: '“So why do you worry about clothing? Consider the lilies of the field, how they grow: they neither toil nor spin;'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'and yet I say to you that even Solomon in all his glory was not '
  - type: text
    content: arrayed like one of these.
  - type: text
    content: ' '
  '3':
  - type: text
    content: But when you do a charitable deed, do not let your left hand know what your right hand is doing,
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Now if God so clothes the grass of the field, which today is, and tomorrow is thrown into the oven, '
  - type: text
    content: will He
  - type: text
    content: ' not much more '
  - type: text
    content: clothe
  - type: text
    content: ' you, O you of little faith?'
  '31':
  - type: text
    content: “Therefore do not worry, saying, ‘What shall we eat?’ or ‘What shall we drink?’ or ‘What shall we wear?’
  - type: text
    content: ' '
  '32':
  - type: text
    content: For after all these things the Gentiles seek. For your heavenly Father knows that you need all these things.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'But '
  - type: note
    content: 1 Kin. 3:13; Luke 12:31; (1 Tim. 4:8)
  - type: text
    content: seek first the kingdom of God and His righteousness, and all these things shall be added to you.
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Therefore do not worry about tomorrow, for tomorrow will worry about its own things. Sufficient for the day '
  - type: text
    content: is
  - type: text
    content: ' its own trouble.'
  '4':
  - type: text
    content: 'that your charitable deed may be in secret; and your Father who sees in secret '
  - type: note
    content: Luke 14:12–14
  - type: text
    content: 'will Himself reward you '
  - type: text
    content: openly.
  - type: heading
    content: The Model Prayer
  '5':
  - type: text
    content: '“And when you pray, you shall not be like the '
  - type: text
    content: hypocrites. For they love to pray standing in the synagogues and on the corners of the streets, that they may be seen by men. Assuredly, I say to you, they have their reward.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But you, when you pray, '
  - type: note
    content: 2 Kin. 4:33
  - type: text
    content: 'go into your room, and when you have shut your door, pray to your Father who '
  - type: text
    content: is
  - type: text
    content: ' in the secret '
  - type: text
    content: place;
  - type: text
    content: ' and your Father who sees in secret will reward you '
  - type: text
    content: openly.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'And when you pray, '
  - type: note
    content: Eccl. 5:2
  - type: text
    content: 'do not use vain repetitions as the heathen '
  - type: text
    content: do.
  - type: text
    content: ' '
  - type: note
    content: 1 Kin. 18:26
  - type: text
    content: For they think that they will be heard for their many words.
  '8':
  - type: text
    content: '“Therefore do not be like them. For your Father '
  - type: note
    content: (Rom. 8:26, 27)
  - type: text
    content: knows the things you have need of before you ask Him.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'In this '
  - type: note
    content: Matt. 6:9–13; Luke 11:2–4; (John 16:24; Eph. 6:18; Jude 20)
  - type: text
    content: 'manner, therefore, pray:'
  - type: note
    content: (Matt. 5:9, 16)
  - type: text
    content: Our Father in heaven,
  - type: text
    content: 'Hallowed be Your '
  - type: note
    content: Mal. 1:11
  - type: text
    content: name.
