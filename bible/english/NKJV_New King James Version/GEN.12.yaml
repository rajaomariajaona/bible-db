  - type: text
    content: 'He '
  - type: note
    content: Gen. 20:14
  - type: text
    content: 'treated Abram well for her sake. He '
  - type: note
    content: Gen. 13:2
  - type: text
    content: had sheep, oxen, male donkeys, male and female servants, female donkeys, and camels.
  '17':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Gen. 20:18; 1 Chr. 16:21; (Ps. 105:14)
  - type: text
    content: 'plagued Pharaoh and his house with great plagues because of Sarai, Abram’s wife. '
  '18':
  - type: text
    content: 'And Pharaoh called Abram and said, '
  - type: note
    content: Gen. 20:9, 10; 26:10
  - type: text
    content: '“What '
  - type: text
    content: is
  - type: text
