  - type: text
    content: was
  - type: text
    content: ' your wife? '
  '19':
  - type: text
    content: 'Why did you say, ‘She '
  - type: text
    content: is
  - type: text
    content: ' my sister’? I might have taken her as my wife. Now therefore, here is your wife; take '
  - type: text
    content: her
  - type: text
    content: ' and go your way.” '
