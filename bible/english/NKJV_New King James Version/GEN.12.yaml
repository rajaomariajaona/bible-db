  - type: text
    content: sister, that it may be well with me for your sake, and that I may live because of you.”
  '14':
  - type: text
    content: 'So it was, when Abram came into Egypt, that the Egyptians saw the woman, that she '
  - type: text
    content: was
  - type: text
    content: ' very beautiful. '
  '15':
  - type: text
    content: 'The princes of Pharaoh also saw her and commended her to Pharaoh. And the woman was taken to Pharaoh’s house. '
