  - type: text
    content: 'Therefore it will happen, when the Egyptians see you, that they will say, ‘This '
  - type: text
    content: is
  - type: text
    content: ' his wife’; and they '
  - type: note
    content: Gen. 20:11; 26:7
  - type: text
    content: 'will kill me, but they will let you live. '
  '13':
  - type: note
    content: Gen. 20:1–18; 26:6–11
  - type: text
    content: 'Please say you '
  - type: text
    content: are
  - type: text
    content: ' my '
  - type: note
