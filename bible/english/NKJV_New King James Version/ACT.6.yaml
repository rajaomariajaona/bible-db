  - type: text
    content: 'they were not able to resist the wisdom and the Spirit by which he spoke. '
  '11':
  - type: note
    content: 1 Kin. 21:10, 13; Matt. 26:59, 60
  - type: text
    content: 'Then they secretly induced men to say, “We have heard him speak blasphemous words against Moses and God.” '
  '12':
  - type: text
    content: 'And they stirred up the people, the elders, and the scribes; and they came upon '
  - type: text
    content: him,
  - type: text
    content: ' seized him, and brought '
  - type: text
    content: him
  - type: text
    content: ' to the council. '
  '13':
  - type: text
    content: 'They also set up false witnesses who said, “This man does not cease to speak blasphemous words against this holy place and the law; '
  '14':
  - type: note
    content: Acts 10:38; 25:8
  - type: text
    content: 'for we have heard him say that this Jesus of Nazareth will destroy this place and change the customs which Moses delivered to us.” '
  '15':
  - type: text
    content: And all who sat in the council, looking steadfastly at him, saw his face as the face of an angel.
  '2':
  - type: text
    content: 'Then the twelve summoned the multitude of the disciples and said, '
  - type: note
    content: Ex. 18:17
  - type: text
    content: '“It is not desirable that we should leave the word of God and serve tables. '
  '3':
  - type: text
    content: 'Therefore, brethren, '
  - type: note
    content: Deut. 1:13; 1 Tim. 3:7
  - type: text
    content: 'seek out from among you seven men of '
  - type: text
    content: good
  - type: text
    content: ' reputation, full of the Holy Spirit and wisdom, whom we may appoint over this '
  - type: note
    content: Phil. 1:1; 1 Tim. 3:8–13
  - type: text
    content: 'business; '
  '4':
  - type: text
    content: 'but we '
  - type: note
    content: Acts 2:42
  - type: text
    content: will give ourselves continually to prayer and to the ministry of the word.”
  '5':
  - type: text
    content: 'And the saying pleased the whole multitude. And they chose Stephen, '
  - type: note
