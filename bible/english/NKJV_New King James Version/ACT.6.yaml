  - type: text
    content: 'when they had prayed, '
  - type: note
    content: Num. 8:10; 27:18; Deut. 34:9; (Mark 5:23; Acts 8:17; 9:17; 13:3; 19:6; 1 Tim. 4:14; 2 Tim. 1:6); Heb. 6:2
  - type: text
    content: they laid hands on them.
  '7':
  - type: text
    content: 'Then '
  - type: note
