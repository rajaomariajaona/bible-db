  - type: text
    content: 'wonders and signs among the people. '
  '9':
  - type: text
    content: 'Then there arose some from what is called the Synagogue of the Freedmen (Cyrenians, Alexandrians, and those from Cilicia and Asia), disputing with Stephen. '
