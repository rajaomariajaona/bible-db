document_id: ACT.6,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Seven Chosen to Serve
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now in those days, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:41; 4:4
      marker-yv: yv-n
    - type: text
      text: 'when '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: number
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' the disciples was multiplying, there arose a complaint against the Hebrews by the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 9:29; 11:20
      marker-yv: yv-n
    - type: text
      text: 'Hellenists, because their widows were neglected '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 4:35; 11:29
      marker-yv: yv-n
    - type: text
      text: 'in the daily distribution. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 4:12; Is. 54:17; Luke 21:15
      marker-yv: yv-n
    - type: text
      text: 'they were not able to resist the wisdom and the Spirit by which he spoke. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 21:10, 13; Matt. 26:59, 60
      marker-yv: yv-n
    - type: text
      text: 'Then they secretly induced men to say, “We have heard him speak blasphemous words against Moses and God.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And they stirred up the people, the elders, and the scribes; and they came upon '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him,
    - type: text
      text: ' seized him, and brought '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him
    - type: text
      text: ' to the council. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'They also set up false witnesses who said, “This man does not cease to speak blasphemous words against this holy place and the law; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 10:38; 25:8
      marker-yv: yv-n
    - type: text
      text: 'for we have heard him say that this Jesus of Nazareth will destroy this place and change the customs which Moses delivered to us.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And all who sat in the council, looking steadfastly at him, saw his face as the face of an angel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then the twelve summoned the multitude of the disciples and said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 18:17
      marker-yv: yv-n
    - type: text
      text: '“It is not desirable that we should leave the word of God and serve tables. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Therefore, brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 1:13; 1 Tim. 3:7
      marker-yv: yv-n
    - type: text
      text: 'seek out from among you seven men of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: good
    - type: text
      text: ' reputation, full of the Holy Spirit and wisdom, whom we may appoint over this '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 1:1; 1 Tim. 3:8–13
      marker-yv: yv-n
    - type: text
      text: 'business; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'but we '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:42
      marker-yv: yv-n
    - type: text
      text: will give ourselves continually to prayer and to the ministry of the word.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And the saying pleased the whole multitude. And they chose Stephen, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 6:3; 11:24
      marker-yv: yv-n
    - type: text
      text: 'a man full of faith and the Holy Spirit, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 8:5, 26; 21:8
      marker-yv: yv-n
    - type: text
      text: 'Philip, Prochorus, Nicanor, Timon, Parmenas, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 2:6, 15
      marker-yv: yv-n
    - type: text
      text: 'Nicolas, a proselyte from Antioch, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'whom they set before the apostles; and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:24
      marker-yv: yv-n
    - type: text
      text: 'when they had prayed, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 8:10; 27:18; Deut. 34:9; (Mark 5:23; Acts 8:17; 9:17; 13:3; 19:6; 1 Tim. 4:14; 2 Tim. 1:6); Heb. 6:2
      marker-yv: yv-n
    - type: text
      text: they laid hands on them.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 12:24; Col. 1:6
      marker-yv: yv-n
    - type: text
      text: 'the word of God spread, and the number of the disciples multiplied greatly in Jerusalem, and a great many '
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 12:42
      marker-yv: yv-n
    - type: text
      text: of the priests were obedient to the faith.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Stephen Accused of Blasphemy
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'And Stephen, full of faith and power, did great '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:43; 5:12; 8:15; 14:3
      marker-yv: yv-n
    - type: text
      text: 'wonders and signs among the people. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then there arose some from what is called the Synagogue of the Freedmen (Cyrenians, Alexandrians, and those from Cilicia and Asia), disputing with Stephen. '
