  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'In Your presence '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' fullness of joy;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'At Your right hand '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
