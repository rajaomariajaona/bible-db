    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' the portion of my inheritance and my cup;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You maintain my lot.
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The lines have fallen to me in pleasant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: places;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, I have a good inheritance.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I will bless the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who has given me counsel;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My heart also instructs me in the night seasons.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 2:25–28)
      marker-yv: yv-n
    - type: text
      text: 'I have set the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' always before me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Because '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' at my right hand I shall not be moved.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Therefore my heart is glad, and my glory rejoices;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My flesh also will rest in hope.
