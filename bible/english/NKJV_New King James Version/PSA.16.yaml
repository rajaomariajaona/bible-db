        text: Ps. 49:15; 86:13; Acts 2:31, 32; Heb. 13:20
      marker-yv: yv-n
    - type: text
      text: For You will not leave my soul in Sheol,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Nor will You allow Your Holy One to see corruption.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
