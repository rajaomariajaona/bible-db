        text: soul,
    - type: text
      text: ' you have said to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
