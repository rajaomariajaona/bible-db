  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'As for the saints who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' on the earth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“They are the excellent ones, in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:63
      marker-yv: yv-n
    - type: text
      text: whom is all my delight.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Their sorrows shall be multiplied who hasten '
    - type: usfm
      marker: it
      children:
      - type: text
        text: after
    - type: text
      text: ' another '
    - type: usfm
      marker: it
      children:
