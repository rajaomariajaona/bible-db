document_id: 2CH.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solomon’s Additional Achievements
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:10–14
    marker-yv: yv-n
  - type: text
    text: 'came to pass at the end of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 6:38—7:1
    marker-yv: yv-n
  - type: text
    text: 'twenty years, when Solomon had built the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and his own house, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'that the cities which Hiram had given to Solomon, Solomon built them; and he settled the children of Israel there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Solomon went to Hamath Zobah and seized it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:17, 18
    marker-yv: yv-n
  - type: text
    text: 'He also built Tadmor in the wilderness, and all the storage cities which he built in '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 18:3, 9
    marker-yv: yv-n
  - type: text
    text: 'Hamath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He built Upper Beth Horon and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 7:24
    marker-yv: yv-n
  - type: text
    text: 'Lower Beth Horon, fortified cities '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with
  - type: text
    text: ' walls, gates, and bars, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'also Baalath and all the storage cities that Solomon had, and all the chariot cities and the cities of the cavalry, and all that Solomon '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 7:11
    marker-yv: yv-n
  - type: text
    text: desired to build in Jerusalem, in Lebanon, and in all the land of his dominion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 15:18–21; 1 Kin. 9:20
    marker-yv: yv-n
  - type: text
    text: 'All the people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' left of the Hittites, Amorites, Perizzites, Hivites, and Jebusites, who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' not of Israel— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'that is, their descendants who were left in the land after them, whom the children of Israel did not destroy—from these Solomon raised forced labor, as it is to this day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But Solomon did not make the children of Israel servants for his work. Some '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' men of war, captains of his officers, captains of his chariots, and his cavalry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And others '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' chiefs of the officials of King Solomon: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:23
    marker-yv: yv-n
  - type: text
    text: two hundred and fifty, who ruled over the people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now Solomon '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 3:1; 7:8; 9:24; 11:1
    marker-yv: yv-n
  - type: text
    text: 'brought the daughter of Pharaoh up from the City of David to the house he had built for her, for he said, “My wife shall not dwell in the house of David king of Israel, because '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: places
  - type: text
    text: ' to which the ark of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has come are holy.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then Solomon offered burnt offerings to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on the altar of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' which he had built before the vestibule, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'according to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 29:38–42; Num. 28:3, 9, 11, 26; 29:1
    marker-yv: yv-n
  - type: text
    text: 'daily rate, offering according to the commandment of Moses, for the Sabbaths, the New Moons, and the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 23:14–17; 34:22, 23; Deut. 16:16
    marker-yv: yv-n
  - type: text
    text: 'three appointed yearly '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 23:1–44
    marker-yv: yv-n
  - type: text
    text: 'feasts—the Feast of Unleavened Bread, the Feast of Weeks, and the Feast of Tabernacles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And, according to the order of David his father, he appointed the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 24:3
    marker-yv: yv-n
  - type: text
    text: 'divisions of the priests for their service, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 25:1
    marker-yv: yv-n
  - type: text
    text: 'the Levites for their duties (to praise and serve before the priests) as the duty of each day required, and the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 9:17; 26:1
    marker-yv: yv-n
  - type: text
    text: 'gatekeepers by their divisions at each gate; for so David the man of God had commanded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'They did not depart from the command of the king to the priests and Levites concerning any matter or concerning the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 26:20–28
    marker-yv: yv-n
  - type: text
    text: treasuries.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Now all the work of Solomon was well-ordered from the day of the foundation of the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' until it was finished. So the house of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was completed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Solomon went to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:26; 2 Chr. 20:36
    marker-yv: yv-n
  - type: text
    text: 'Ezion Geber and Elath on the seacoast, in the land of Edom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 9:27; 2 Chr. 9:10, 13
    marker-yv: yv-n
  - type: text
    text: 'And Hiram sent him ships by the hand of his servants, and servants who knew the sea. They went with the servants of Solomon to '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Chr. 29:4
    marker-yv: yv-n
  - type: text
    text: Ophir, and acquired four hundred and fifty talents of gold from there, and brought it to King Solomon.
