document_id: 2CH.8,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Additional Achievements
  - type: text
    content: 'It '
  - type: note
    content: 1 Kin. 9:10–14
  - type: text
    content: 'came to pass at the end of '
  - type: note
    content: 1 Kin. 6:38—7:1
  - type: text
    content: 'twenty years, when Solomon had built the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' and his own house, '
  '10':
  - type: text
    content: 'And others '
  - type: text
    content: were
  - type: text
    content: ' chiefs of the officials of King Solomon: '
  - type: note
    content: 1 Kin. 9:23
  - type: text
    content: two hundred and fifty, who ruled over the people.
  '11':
  - type: text
    content: 'Now Solomon '
  - type: note
    content: 1 Kin. 3:1; 7:8; 9:24; 11:1
  - type: text
    content: 'brought the daughter of Pharaoh up from the City of David to the house he had built for her, for he said, “My wife shall not dwell in the house of David king of Israel, because '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: places
  - type: text
    content: ' to which the ark of the '
  - type: heading
    content: Lord
  - type: text
    content: ' has come are holy.”'
  '12':
  - type: text
    content: 'Then Solomon offered burnt offerings to the '
  - type: heading
    content: Lord
  - type: text
    content: ' on the altar of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which he had built before the vestibule, '
  '13':
  - type: text
    content: 'according to the '
  - type: note
    content: Ex. 29:38–42; Num. 28:3, 9, 11, 26; 29:1
  - type: text
    content: 'daily rate, offering according to the commandment of Moses, for the Sabbaths, the New Moons, and the '
  - type: note
    content: Ex. 23:14–17; 34:22, 23; Deut. 16:16
  - type: text
    content: 'three appointed yearly '
  - type: note
    content: Lev. 23:1–44
  - type: text
    content: 'feasts—the Feast of Unleavened Bread, the Feast of Weeks, and the Feast of Tabernacles. '
  '14':
  - type: text
    content: 'And, according to the order of David his father, he appointed the '
  - type: note
    content: 1 Chr. 24:3
  - type: text
    content: 'divisions of the priests for their service, '
  - type: note
    content: 1 Chr. 25:1
  - type: text
    content: 'the Levites for their duties (to praise and serve before the priests) as the duty of each day required, and the '
  - type: note
    content: 1 Chr. 9:17; 26:1
  - type: text
    content: 'gatekeepers by their divisions at each gate; for so David the man of God had commanded. '
  '15':
  - type: text
    content: 'They did not depart from the command of the king to the priests and Levites concerning any matter or concerning the '
  - type: note
    content: 1 Chr. 26:20–28
  - type: text
    content: treasuries.
  '16':
  - type: text
    content: 'Now all the work of Solomon was well-ordered from the day of the foundation of the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' until it was finished. So the house of the '
  - type: heading
    content: Lord
  - type: text
    content: ' was completed.'
  '17':
  - type: text
    content: 'Then Solomon went to '
  - type: note
    content: 1 Kin. 9:26; 2 Chr. 20:36
  - type: text
    content: 'Ezion Geber and Elath on the seacoast, in the land of Edom. '
  '18':
  - type: note
    content: 1 Kin. 9:27; 2 Chr. 9:10, 13
  - type: text
    content: 'And Hiram sent him ships by the hand of his servants, and servants who knew the sea. They went with the servants of Solomon to '
  - type: note
    content: 1 Chr. 29:4
  - type: text
    content: Ophir, and acquired four hundred and fifty talents of gold from there, and brought it to King Solomon.
  '2':
  - type: text
    content: 'that the cities which Hiram had given to Solomon, Solomon built them; and he settled the children of Israel there. '
  '3':
  - type: text
    content: 'And Solomon went to Hamath Zobah and seized it. '
  '4':
  - type: note
    content: 1 Kin. 9:17, 18
  - type: text
    content: 'He also built Tadmor in the wilderness, and all the storage cities which he built in '
  - type: note
    content: 1 Chr. 18:3, 9
  - type: text
    content: 'Hamath. '
  '5':
  - type: text
    content: 'He built Upper Beth Horon and '
  - type: note
    content: 1 Chr. 7:24
  - type: text
    content: 'Lower Beth Horon, fortified cities '
  - type: text
    content: with
  - type: text
    content: ' walls, gates, and bars, '
  '6':
  - type: text
    content: 'also Baalath and all the storage cities that Solomon had, and all the chariot cities and the cities of the cavalry, and all that Solomon '
  - type: note
    content: 2 Chr. 7:11
  - type: text
    content: desired to build in Jerusalem, in Lebanon, and in all the land of his dominion.
  '7':
  - type: note
    content: Gen. 15:18–21; 1 Kin. 9:20
  - type: text
    content: 'All the people '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: were
  - type: text
    content: ' left of the Hittites, Amorites, Perizzites, Hivites, and Jebusites, who '
  - type: text
    content: were
  - type: text
    content: ' not of Israel— '
  '8':
  - type: text
    content: 'that is, their descendants who were left in the land after them, whom the children of Israel did not destroy—from these Solomon raised forced labor, as it is to this day. '
  '9':
  - type: text
    content: 'But Solomon did not make the children of Israel servants for his work. Some '
  - type: text
    content: were
  - type: text
    content: ' men of war, captains of his officers, captains of his chariots, and his cavalry. '
