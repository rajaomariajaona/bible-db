document_id: REV.21,114
type_code: eng
verses:
  '1':
  - type: heading
    content: All Things Made New
  - type: text
    content: 'Now '
  - type: note
    content: Is. 65:17; 66:22; (2 Pet. 3:13)
  - type: text
    content: 'I saw a new heaven and a new earth, '
  - type: note
    content: (2 Pet. 3:10); Rev. 20:11
  - type: text
    content: 'for the first heaven and the first earth had passed away. Also there was no more sea. '
  '10':
  - type: text
    content: 'And he carried me away '
  - type: note
    content: Rev. 1:10
  - type: text
    content: 'in the Spirit to a great and high mountain, and showed me '
  - type: note
    content: Ezek. 48
  - type: text
    content: 'the great city, the holy Jerusalem, descending out of heaven from God, '
  '11':
  - type: note
    content: Is. 60:1; Ezek. 43:2; Rev. 15:8; 21:23; 22:5
  - type: text
    content: 'having the glory of God. Her light '
  - type: text
    content: was
  - type: text
    content: ' like a most precious stone, like a jasper stone, clear as crystal. '
  '12':
  - type: text
    content: 'Also she had a great and high wall with '
  - type: note
    content: Ezek. 48:31–34
  - type: text
    content: 'twelve gates, and twelve angels at the gates, and names written on them, which are '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: names
  - type: text
    content: ' of the twelve tribes of the children of Israel: '
  '13':
  - type: note
    content: Ezek. 48:31–34
  - type: text
    content: three gates on the east, three gates on the north, three gates on the south, and three gates on the west.
  '14':
  - type: text
    content: 'Now the wall of the city had twelve foundations, and '
  - type: note
    content: Matt. 16:18; Luke 22:29, 30; Gal. 2:9; Eph. 2:20
  - type: text
    content: 'on them were the names of the twelve apostles of the Lamb. '
  '15':
  - type: text
    content: 'And he who talked with me '
  - type: note
    content: Ezek. 40:3; Zech. 2:1; Rev. 11:1
  - type: text
    content: 'had a gold reed to measure the city, its gates, and its wall. '
  '16':
  - type: text
    content: 'The city is laid out as a square; its length is as great as its breadth. And he measured the city with the reed: twelve thousand furlongs. Its length, breadth, and height are equal. '
  '17':
  - type: text
    content: 'Then he measured its wall: one hundred '
  - type: text
    content: and
  - type: text
    content: ' forty-four cubits, '
  - type: text
    content: according
  - type: text
    content: ' to the measure of a man, that is, of an angel. '
  '18':
  - type: text
    content: 'The construction of its wall was '
  - type: text
    content: of
  - type: text
    content: ' jasper; and the city '
  - type: text
    content: was
  - type: text
    content: ' pure gold, like clear glass. '
  '19':
  - type: note
    content: Ex. 28:17–20; Is. 54:11; Ezek. 28:13
  - type: text
    content: 'The foundations of the wall of the city '
  - type: text
    content: were
  - type: text
    content: ' adorned with all kinds of precious stones: the first foundation '
  - type: text
    content: wa
  - type: text
    content: 's jasper, the second sapphire, the third chalcedony, the fourth emerald, '
  '2':
  - type: text
    content: 'Then I, John, saw '
  - type: note
    content: Is. 52:1; (Gal. 4:26); Heb. 11:10
  - type: text
    content: 'the holy city, New Jerusalem, coming down out of heaven from God, prepared '
  - type: note
    content: Is. 54:5; 2 Cor. 11:2
  - type: text
    content: 'as a bride adorned for her husband. '
  '20':
  - type: text
    content: 'the fifth sardonyx, the sixth sardius, the seventh chrysolite, the eighth beryl, the ninth topaz, the tenth chrysoprase, the eleventh jacinth, and the twelfth amethyst. '
  '21':
  - type: text
    content: 'The twelve gates '
  - type: text
    content: were
  - type: text
    content: ' twelve '
  - type: note
    content: Matt. 13:45, 46
  - type: text
    content: 'pearls: each individual gate was of one pearl. '
  - type: note
    content: Rev. 22:2
  - type: text
    content: 'And the street of the city '
  - type: text
    content: was
  - type: text
    content: ' pure gold, like transparent glass.'
  - type: heading
    content: The Glory of the New Jerusalem
  '22':
  - type: note
    content: Matt. 24:2; John 4:21, 23
  - type: text
    content: 'But I saw no temple in it, for the Lord God Almighty and the Lamb are its temple. '
  '23':
  - type: note
    content: Is. 24:23; 60:19, 20; Rev. 21:25; 22:5
  - type: text
    content: 'The city had no need of the sun or of the moon to shine in it, for the glory of God illuminated it. The Lamb '
  - type: text
    content: is
  - type: text
    content: ' its light. '
  '24':
  - type: note
    content: Is. 60:3, 5; 66:12
  - type: text
    content: 'And the nations of those who are saved shall walk in its light, and the kings of the earth bring their glory and honor into it. '
  '25':
  - type: note
    content: Is. 60:11
  - type: text
    content: 'Its gates shall not be shut at all by day '
  - type: note
    content: Is. 60:20; Zech. 14:7
  - type: text
    content: '(there shall be no night there). '
  '26':
  - type: note
    content: Rev. 21:24
  - type: text
    content: 'And they shall bring the glory and the honor of the nations into it. '
  '27':
  - type: text
    content: 'But '
  - type: note
    content: Is. 35:8; Joel 3:17
  - type: text
    content: 'there shall by no means enter it anything that defiles, or causes an abomination or a lie, but only those who are written in the Lamb’s '
  - type: note
    content: Phil. 4:3
  - type: text
    content: Book of Life.
  '3':
  - type: text
    content: 'And I heard a loud voice from heaven saying, “Behold, '
  - type: note
    content: Lev. 26:11; Ezek. 43:7; 2 Cor. 6:16
  - type: text
    content: 'the tabernacle of God '
  - type: text
    content: is
  - type: text
    content: ' with men, and He will dwell with them, and they shall be His people. God Himself will be with them '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' their God. '
  '4':
  - type: note
    content: Is. 25:8; Rev. 7:17
  - type: text
    content: 'And God will wipe away every tear from their eyes; '
  - type: note
    content: 1 Cor. 15:26; Rev. 20:14
  - type: text
    content: 'there shall be no more death, '
  - type: note
    content: Is. 35:10; 51:11; 65:19
  - type: text
    content: nor sorrow, nor crying. There shall be no more pain, for the former things have passed away.”
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: Rev. 4:2, 9; 20:11
  - type: text
    content: 'He who sat on the throne said, '
  - type: note
    content: Is. 43:19; 2 Cor. 5:17
  - type: text
    content: '“Behold, I make all things new.” And He said to me, “Write, for '
  - type: note
    content: Rev. 19:9; 22:6
  - type: text
    content: these words are true and faithful.”
  '6':
  - type: text
    content: 'And He said to me, '
  - type: note
    content: Rev. 10:6; 16:17
  - type: text
    content: '“It is done! '
  - type: note
    content: Rev. 1:8; 22:13
  - type: text
    content: 'I am the Alpha and the Omega, the Beginning and the End. '
  - type: note
    content: Is. 12:3; 55:1; John 4:10; Rev. 7:17; 22:17
  - type: text
    content: 'I will give of the fountain of the water of life freely to him who thirsts. '
  '7':
  - type: text
    content: 'He who overcomes shall inherit all things, and '
  - type: note
    content: Zech. 8:8; Heb. 8:10
  - type: text
    content: 'I will be his God and he shall be My son. '
  '8':
  - type: note
    content: 1 Cor. 6:9; Gal. 5:19; Eph. 5:5; 1 Tim. 1:9; (Heb. 12:14)
  - type: text
    content: 'But the cowardly, unbelieving, abominable, murderers, sexually immoral, sorcerers, idolaters, and all liars shall have their part in '
  - type: note
    content: Rev. 20:14
  - type: text
    content: the lake which burns with fire and brimstone, which is the second death.”
  - type: heading
    content: The New Jerusalem
  '9':
  - type: text
    content: 'Then one of '
  - type: note
    content: Rev. 15:1
  - type: text
    content: 'the seven angels who had the seven bowls filled with the seven last plagues came to me and talked with me, saying, “Come, I will show you '
  - type: note
    content: Rev. 19:7; 21:2
  - type: text
    content: 'the bride, the Lamb’s wife.” '
