document_id: REV.21,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: All Things Made New
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 65:17; 66:22; (2 Pet. 3:13)
      marker-yv: yv-n
    - type: text
      text: 'I saw a new heaven and a new earth, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (2 Pet. 3:10); Rev. 20:11
      marker-yv: yv-n
    - type: text
      text: 'for the first heaven and the first earth had passed away. Also there was no more sea. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he carried me away '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 1:10
      marker-yv: yv-n
    - type: text
      text: 'in the Spirit to a great and high mountain, and showed me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 48
      marker-yv: yv-n
    - type: text
      text: 'the great city, the holy Jerusalem, descending out of heaven from God, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:1; Ezek. 43:2; Rev. 15:8; 21:23; 22:5
      marker-yv: yv-n
    - type: text
      text: 'having the glory of God. Her light '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' like a most precious stone, like a jasper stone, clear as crystal. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Also she had a great and high wall with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 48:31–34
      marker-yv: yv-n
    - type: text
      text: 'twelve gates, and twelve angels at the gates, and names written on them, which are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: names
    - type: text
      text: ' of the twelve tribes of the children of Israel: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 48:31–34
      marker-yv: yv-n
    - type: text
      text: three gates on the east, three gates on the north, three gates on the south, and three gates on the west.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the wall of the city had twelve foundations, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 16:18; Luke 22:29, 30; Gal. 2:9; Eph. 2:20
      marker-yv: yv-n
    - type: text
      text: 'on them were the names of the twelve apostles of the Lamb. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he who talked with me '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 40:3; Zech. 2:1; Rev. 11:1
      marker-yv: yv-n
    - type: text
      text: 'had a gold reed to measure the city, its gates, and its wall. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The city is laid out as a square; its length is as great as its breadth. And he measured the city with the reed: twelve thousand furlongs. Its length, breadth, and height are equal. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he measured its wall: one hundred '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' forty-four cubits, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: according
    - type: text
      text: ' to the measure of a man, that is, of an angel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The construction of its wall was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' jasper; and the city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' pure gold, like clear glass. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 28:17–20; Is. 54:11; Ezek. 28:13
      marker-yv: yv-n
    - type: text
      text: 'The foundations of the wall of the city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' adorned with all kinds of precious stones: the first foundation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wa
    - type: text
      text: 's jasper, the second sapphire, the third chalcedony, the fourth emerald, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I, John, saw '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 52:1; (Gal. 4:26); Heb. 11:10
      marker-yv: yv-n
    - type: text
      text: 'the holy city, New Jerusalem, coming down out of heaven from God, prepared '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 54:5; 2 Cor. 11:2
      marker-yv: yv-n
    - type: text
      text: 'as a bride adorned for her husband. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the fifth sardonyx, the sixth sardius, the seventh chrysolite, the eighth beryl, the ninth topaz, the tenth chrysoprase, the eleventh jacinth, and the twelfth amethyst. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The twelve gates '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' twelve '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 13:45, 46
      marker-yv: yv-n
    - type: text
      text: 'pearls: each individual gate was of one pearl. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 22:2
      marker-yv: yv-n
    - type: text
      text: 'And the street of the city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' pure gold, like transparent glass.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Glory of the New Jerusalem
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 24:2; John 4:21, 23
      marker-yv: yv-n
    - type: text
      text: 'But I saw no temple in it, for the Lord God Almighty and the Lamb are its temple. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 24:23; 60:19, 20; Rev. 21:25; 22:5
      marker-yv: yv-n
    - type: text
      text: 'The city had no need of the sun or of the moon to shine in it, for the glory of God illuminated it. The Lamb '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' its light. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:3, 5; 66:12
      marker-yv: yv-n
    - type: text
      text: 'And the nations of those who are saved shall walk in its light, and the kings of the earth bring their glory and honor into it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:11
      marker-yv: yv-n
    - type: text
      text: 'Its gates shall not be shut at all by day '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 60:20; Zech. 14:7
      marker-yv: yv-n
    - type: text
      text: '(there shall be no night there). '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 21:24
      marker-yv: yv-n
    - type: text
      text: 'And they shall bring the glory and the honor of the nations into it. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 35:8; Joel 3:17
      marker-yv: yv-n
    - type: text
      text: 'there shall by no means enter it anything that defiles, or causes an abomination or a lie, but only those who are written in the Lamb’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Phil. 4:3
      marker-yv: yv-n
    - type: text
      text: Book of Life.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard a loud voice from heaven saying, “Behold, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:11; Ezek. 43:7; 2 Cor. 6:16
      marker-yv: yv-n
    - type: text
      text: 'the tabernacle of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' with men, and He will dwell with them, and they shall be His people. God Himself will be with them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' their God. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 25:8; Rev. 7:17
      marker-yv: yv-n
    - type: text
      text: 'And God will wipe away every tear from their eyes; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 15:26; Rev. 20:14
      marker-yv: yv-n
    - type: text
      text: 'there shall be no more death, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 35:10; 51:11; 65:19
      marker-yv: yv-n
    - type: text
      text: nor sorrow, nor crying. There shall be no more pain, for the former things have passed away.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 4:2, 9; 20:11
      marker-yv: yv-n
    - type: text
      text: 'He who sat on the throne said, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 43:19; 2 Cor. 5:17
      marker-yv: yv-n
    - type: text
      text: '“Behold, I make all things new.” And He said to me, “Write, for '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 19:9; 22:6
      marker-yv: yv-n
    - type: text
      text: these words are true and faithful.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said to me, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 10:6; 16:17
      marker-yv: yv-n
    - type: text
      text: '“It is done! '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 1:8; 22:13
      marker-yv: yv-n
    - type: text
      text: 'I am the Alpha and the Omega, the Beginning and the End. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 12:3; 55:1; John 4:10; Rev. 7:17; 22:17
      marker-yv: yv-n
    - type: text
      text: 'I will give of the fountain of the water of life freely to him who thirsts. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He who overcomes shall inherit all things, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Zech. 8:8; Heb. 8:10
      marker-yv: yv-n
    - type: text
      text: 'I will be his God and he shall be My son. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 6:9; Gal. 5:19; Eph. 5:5; 1 Tim. 1:9; (Heb. 12:14)
      marker-yv: yv-n
    - type: text
      text: 'But the cowardly, unbelieving, abominable, murderers, sexually immoral, sorcerers, idolaters, and all liars shall have their part in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 20:14
      marker-yv: yv-n
    - type: text
      text: the lake which burns with fire and brimstone, which is the second death.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The New Jerusalem
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 15:1
      marker-yv: yv-n
    - type: text
      text: 'the seven angels who had the seven bowls filled with the seven last plagues came to me and talked with me, saying, “Come, I will show you '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 19:7; 21:2
      marker-yv: yv-n
    - type: text
      text: 'the bride, the Lamb’s wife.” '
