  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Wherever I have moved about with all Israel, have I ever spoken a word to any of the judges of Israel, whom I commanded to shepherd My people, saying, ‘Why have you not built Me a house of cedar–’ ” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now therefore, thus shall you say to My servant David, ‘Thus says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of hosts: “I took you '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Sam. 16:11–13
    marker-yv: yv-n
  - type: text
    text: 'from the sheepfold, from following the sheep, to be ruler over My people Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And I have been with you wherever you have gone, and have cut off all your enemies from before you, and have made you a name like the name of the great men who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' on the earth. '
  - type: usfm
