    children:
    - type: text
      text: '5'
  - type: text
    text: 'For I have not dwelt in a house since the time that I brought up Israel, even to this day, but have gone from tent to tent, and from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
