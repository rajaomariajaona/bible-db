    children:
    - type: text
      text: (Deut. 4:6–8, 33–38); Ps. 147:20
    marker-yv: yv-n
  - type: text
    text: 'And who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
