  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So let it be established, that Your name may be magnified forever, saying, ‘The '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' of hosts, the God of Israel, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
