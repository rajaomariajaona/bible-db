  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For You, O my God, have revealed to Your servant that You will build him a house. Therefore Your servant has found it '
  - type: usfm
