document_id: 2CO.13,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Coming with Authority
  - type: text
    content: 'This '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' '
  - type: note
    content: 2 Cor. 12:14
  - type: text
    content: 'the third '
  - type: text
    content: time
  - type: text
    content: ' I am coming to you. '
  - type: note
    content: Num. 35:30; Deut. 17:6; 19:15; Matt. 18:16; John 8:17; Heb. 10:28
  - type: text
    content: '“By the mouth of two or three witnesses every word shall be established.” '
  '10':
  - type: note
    content: 1 Cor. 4:21
  - type: text
    content: 'Therefore I write these things being absent, lest being present I should use sharpness, according to the '
  - type: note
    content: 1 Cor. 5:4; 2 Cor. 10:8
  - type: text
    content: authority which the Lord has given me for edification and not for destruction.
  - type: heading
    content: Greetings and Benediction
  '11':
  - type: text
    content: 'Finally, brethren, farewell. Become complete. '
  - type: note
    content: Rom. 12:16, 18
  - type: text
    content: 'Be of good comfort, be of one mind, live in peace; and the God of love '
  - type: note
    content: Rom. 15:33; Eph. 6:23
  - type: text
    content: and peace will be with you.
  '12':
  - type: note
    content: Rom. 16:16
  - type: text
    content: Greet one another with a holy kiss.
  '13':
  - type: text
    content: All the saints greet you.
  '14':
  - type: note
    content: Rom. 16:24
  - type: text
    content: 'The grace of the Lord Jesus Christ, and the love of God, and '
  - type: note
    content: Phil. 2:1
  - type: text
    content: 'the communion of the Holy Spirit '
  - type: text
    content: be
  - type: text
    content: ' with you all. Amen.'
  '2':
  - type: note
    content: 2 Cor. 10:2
  - type: text
    content: 'I have told you before, and foretell as if I were present the second time, and now being absent I write to those '
  - type: note
    content: 2 Cor. 12:21
  - type: text
    content: 'who have sinned before, and to all the rest, that if I come again '
  - type: note
    content: 2 Cor. 1:23; 10:11
  - type: text
    content: 'I will not spare— '
  '3':
  - type: text
    content: 'since you seek a proof of Christ '
  - type: note
    content: Matt. 10:20; (1 Cor. 5:4; 7:40)
  - type: text
    content: 'speaking in me, who is not weak toward you, but mighty '
  - type: note
    content: (1 Cor. 9:2)
  - type: text
    content: 'in you. '
  '4':
  - type: note
    content: Phil. 2:7, 8; (1 Pet. 3:18)
  - type: text
    content: 'For though He was crucified in weakness, yet '
  - type: note
    content: (Rom. 1:4; 6:4; 1 Cor. 6:14)
  - type: text
    content: 'He lives by the power of God. For '
  - type: note
    content: (2 Cor. 10:3, 4)
  - type: text
    content: we also are weak in Him, but we shall live with Him by the power of God toward you.
  '5':
  - type: text
    content: 'Examine yourselves '
  - type: text
    content: as
  - type: text
    content: ' '
  - type: text
    content: to
  - type: text
    content: ' whether you are in the faith. Test yourselves. Do you not know yourselves, '
  - type: note
    content: Rom. 8:10; (Gal. 4:19)
  - type: text
    content: 'that Jesus Christ is in you?—unless indeed you are '
  - type: note
    content: 1 Cor. 9:27
  - type: text
    content: 'disqualified. '
  '6':
  - type: text
    content: But I trust that you will know that we are not disqualified.
  - type: heading
    content: Paul Prefers Gentleness
  '7':
  - type: text
    content: 'Now I pray to God that you do no evil, not that we should appear approved, but that you should do what is honorable, though '
  - type: note
    content: 2 Cor. 6:9
  - type: text
    content: 'we may seem disqualified. '
  '8':
  - type: text
    content: 'For we can do nothing against the truth, but for the truth. '
  '9':
  - type: text
    content: 'For we are glad '
  - type: note
    content: 1 Cor. 4:10
  - type: text
    content: 'when we are weak and you are strong. And this also we pray, '
  - type: note
    content: 1 Cor. 1:10; 2 Cor. 13:11; Eph. 4:12; (1 Thess. 3:10)
  - type: text
    content: 'that you may be made complete. '
