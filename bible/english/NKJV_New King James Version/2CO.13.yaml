  - type: text
    text: Coming with Authority
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 12:14
    marker-yv: yv-n
  - type: text
    text: 'the third '
  - type: usfm
    marker: it
    children:
    - type: text
      text: time
  - type: text
    text: ' I am coming to you. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 35:30; Deut. 17:6; 19:15; Matt. 18:16; John 8:17; Heb. 10:28
    marker-yv: yv-n
  - type: text
    text: '“By the mouth of two or three witnesses every word shall be established.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 10:2
    marker-yv: yv-n
  - type: text
    text: 'I have told you before, and foretell as if I were present the second time, and now being absent I write to those '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 12:21
    marker-yv: yv-n
  - type: text
    text: 'who have sinned before, and to all the rest, that if I come again '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 1:23; 10:11
    marker-yv: yv-n
  - type: text
    text: 'I will not spare— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'since you seek a proof of Christ '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 10:20; (1 Cor. 5:4; 7:40)
    marker-yv: yv-n
  - type: text
    text: 'speaking in me, who is not weak toward you, but mighty '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (1 Cor. 9:2)
    marker-yv: yv-n
  - type: text
    text: 'in you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 2:7, 8; (1 Pet. 3:18)
    marker-yv: yv-n
  - type: text
    text: 'For though He was crucified in weakness, yet '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 1:4; 6:4; 1 Cor. 6:14)
    marker-yv: yv-n
  - type: text
    text: 'He lives by the power of God. For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (2 Cor. 10:3, 4)
    marker-yv: yv-n
  - type: text
    text: we also are weak in Him, but we shall live with Him by the power of God toward you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Examine yourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' whether you are in the faith. Test yourselves. Do you not know yourselves, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:10; (Gal. 4:19)
    marker-yv: yv-n
  - type: text
    text: 'that Jesus Christ is in you?—unless indeed you are '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 9:27
    marker-yv: yv-n
  - type: text
    text: 'disqualified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But I trust that you will know that we are not disqualified.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Prefers Gentleness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now I pray to God that you do no evil, not that we should appear approved, but that you should do what is honorable, though '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Cor. 6:9
    marker-yv: yv-n
  - type: text
    text: 'we may seem disqualified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For we can do nothing against the truth, but for the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For we are glad '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 4:10
    marker-yv: yv-n
  - type: text
    text: 'when we are weak and you are strong. And this also we pray, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 1:10; 2 Cor. 13:11; Eph. 4:12; (1 Thess. 3:10)
    marker-yv: yv-n
  - type: text
    text: 'that you may be made complete. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 4:21
    marker-yv: yv-n
  - type: text
    text: 'Therefore I write these things being absent, lest being present I should use sharpness, according to the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 5:4; 2 Cor. 10:8
    marker-yv: yv-n
  - type: text
    text: authority which the Lord has given me for edification and not for destruction.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Greetings and Benediction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Finally, brethren, farewell. Become complete. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 12:16, 18
    marker-yv: yv-n
  - type: text
    text: 'Be of good comfort, be of one mind, live in peace; and the God of love '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 15:33; Eph. 6:23
    marker-yv: yv-n
  - type: text
    text: and peace will be with you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:16
    marker-yv: yv-n
  - type: text
    text: Greet one another with a holy kiss.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: All the saints greet you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 16:24
    marker-yv: yv-n
  - type: text
    text: 'The grace of the Lord Jesus Christ, and the love of God, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 2:1
    marker-yv: yv-n
  - type: text
    text: 'the communion of the Holy Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' with you all. Amen.'
