document_id: MRK.16,114
type_code: eng
verses:
  '1':
  - type: heading
    content: He Is Risen
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 28:1–8; Luke 24:1–10; John 20:1–8
  - type: text
    content: 'when the Sabbath was past, Mary Magdalene, Mary '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: mother
  - type: text
    content: ' of James, and Salome '
  - type: note
    content: Luke 23:56; John 19:39
  - type: text
    content: 'bought spices, that they might come and anoint Him. '
  '10':
  - type: note
    content: Luke 24:10
  - type: text
    content: 'She went and told those who had been with Him, as they mourned and wept. '
  '11':
  - type: note
    content: Matt. 28:17; Luke 24:11, 41; John 20:25
  - type: text
    content: And when they heard that He was alive and had been seen by her, they did not believe.
  - type: heading
    content: Jesus Appears to Two Disciples
  '12':
  - type: text
    content: 'After that, He appeared in another form '
  - type: note
    content: Luke 24:13–35
  - type: text
    content: 'to two of them as they walked and went into the country. '
  '13':
  - type: text
    content: 'And they went and told '
  - type: text
    content: it
  - type: text
    content: ' to the rest, '
  - type: text
    content: but
  - type: text
    content: ' they did not believe them either.'
  - type: heading
    content: The Great Commission
  '14':
  - type: note
    content: Luke 24:36; John 20:19, 26; 1 Cor. 15:5
  - type: text
    content: 'Later He appeared to the eleven as they sat at the table; and He rebuked their unbelief and hardness of heart, because they did not believe those who had seen Him after He had risen. '
  '15':
  - type: note
    content: Matt. 28:19; (John 15:16; Acts 1:8); Col. 1:6
  - type: text
    content: 'And He said to them, '
  - type: text
    content: '“Go into all the world '
  - type: note
    content: (Col. 1:23)
  - type: text
    content: and preach the gospel to every creature.
  - type: text
    content: ' '
  '16':
  - type: note
    content: (John 3:18, 36; Acts 2:38; 16:30, 31; Rom. 10:8–10)
  - type: text
    content: 'He who believes and is baptized will be saved; '
  - type: note
    content: (John 12:48)
  - type: text
    content: but he who does not believe will be condemned.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'And these '
  - type: note
    content: Acts 5:12
  - type: text
    content: 'signs will follow those who '
  - type: text
    content: 'believe: '
  - type: note
    content: Mark 9:38; Luke 10:17; Acts 5:16; 8:7; 16:18; 19:12
  - type: text
    content: 'In My name they will cast out demons; '
  - type: note
    content: (Acts 2:4; 1 Cor. 12:10)
  - type: text
    content: they will speak with new tongues;
  - type: text
    content: ' '
  '18':
  - type: note
    content: (Luke 10:19); Acts 28:3–6
  - type: text
    content: they
  - type: text
    content: ' will take up serpents; and if they drink anything deadly, it will by no means hurt them; '
  - type: note
    content: (Acts 5:15); James 5:14
  - type: text
    content: they will lay hands on the sick, and they will recover.”
  - type: heading
    content: Christ Ascends to God’s Right Hand
  '19':
  - type: text
    content: 'So then, '
  - type: note
    content: Acts 1:2, 3
  - type: text
    content: 'after the Lord had spoken to them, He was '
  - type: note
    content: Ps. 68:18; Luke 9:51; 24:51; John 6:62; 20:17; Acts 1:2, 9–11; (1 Tim. 3:16; Rev. 4:2)
  - type: text
    content: 'received up into heaven, and '
  - type: note
    content: (Ps. 110:1); Luke 22:69; (Acts 7:55); 1 Pet. 3:22
  - type: text
    content: 'sat down at the right hand of God. '
  '2':
  - type: note
    content: Luke 24:1; John 20:1
  - type: text
    content: 'Very early in the morning, on the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, they came to the tomb when the sun had risen. '
  '20':
  - type: text
    content: 'And they went out and preached everywhere, the Lord working with '
  - type: text
    content: them
  - type: text
    content: ' '
  - type: note
    content: Acts 5:12; (1 Cor. 2:4, 5; Heb. 2:4)
  - type: text
    content: and confirming the word through the accompanying signs. Amen.
  '3':
  - type: text
    content: 'And they said among themselves, “Who will roll away the stone from the door of the tomb for us?” '
  '4':
  - type: text
    content: 'But when they looked up, they saw that the stone had been rolled away—for it was very large. '
  '5':
  - type: note
    content: Luke 24:3; John 20:11, 12
  - type: text
    content: And entering the tomb, they saw a young man clothed in a long white robe sitting on the right side; and they were alarmed.
  '6':
  - type: note
    content: Ps. 16:10; 49:15; Hos. 6:2; Matt. 28:6; Mark 9:31; Luke 24:6
  - type: text
    content: 'But he said to them, “Do not be alarmed. You seek Jesus of Nazareth, who was crucified. He is risen! He is not here. See the place where they laid Him. '
  '7':
  - type: text
    content: 'But go, tell His disciples—and Peter—that He is going before you into Galilee; there you will see Him, '
  - type: note
    content: Matt. 26:32; 28:16, 17; Mark 14:28
  - type: text
    content: as He said to you.”
  '8':
  - type: text
    content: 'So they went out quickly and fled from the tomb, for they trembled and were amazed. '
  - type: note
    content: Matt. 28:8
  - type: text
    content: And they said nothing to anyone, for they were afraid.
  - type: heading
    content: Mary Magdalene Sees the Risen Lord
  '9':
  - type: text
    content: 'Now when '
  - type: text
    content: He
  - type: text
    content: ' rose early on the first '
  - type: text
    content: day
  - type: text
    content: ' of the week, He appeared first to Mary Magdalene, '
  - type: note
    content: Luke 8:2
  - type: text
    content: 'out of whom He had cast seven demons. '
