document_id: MRK.16,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: He Is Risen
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 28:1–8; Luke 24:1–10; John 20:1–8
      marker-yv: yv-n
    - type: text
      text: 'when the Sabbath was past, Mary Magdalene, Mary '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mother
    - type: text
      text: ' of James, and Salome '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 23:56; John 19:39
      marker-yv: yv-n
    - type: text
      text: 'bought spices, that they might come and anoint Him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:10
      marker-yv: yv-n
    - type: text
      text: 'She went and told those who had been with Him, as they mourned and wept. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 28:17; Luke 24:11, 41; John 20:25
      marker-yv: yv-n
    - type: text
      text: And when they heard that He was alive and had been seen by her, they did not believe.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Appears to Two Disciples
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'After that, He appeared in another form '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:13–35
      marker-yv: yv-n
    - type: text
      text: 'to two of them as they walked and went into the country. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And they went and told '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' to the rest, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but
    - type: text
      text: ' they did not believe them either.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Great Commission
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:36; John 20:19, 26; 1 Cor. 15:5
      marker-yv: yv-n
    - type: text
      text: 'Later He appeared to the eleven as they sat at the table; and He rebuked their unbelief and hardness of heart, because they did not believe those who had seen Him after He had risen. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 28:19; (John 15:16; Acts 1:8); Col. 1:6
      marker-yv: yv-n
    - type: text
      text: 'And He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Go into all the world '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Col. 1:23)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and preach the gospel to every creature.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 3:18, 36; Acts 2:38; 16:30, 31; Rom. 10:8–10)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'He who believes and is baptized will be saved; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 12:48)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but he who does not believe will be condemned.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And these '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:12
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'signs will follow those who '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'believe: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 9:38; Luke 10:17; Acts 5:16; 8:7; 16:18; 19:12
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'In My name they will cast out demons; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 2:4; 1 Cor. 12:10)
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: they will speak with new tongues;
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Luke 10:19); Acts 28:3–6
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: they
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ' will take up serpents; and if they drink anything deadly, it will by no means hurt them; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Acts 5:15); James 5:14
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: they will lay hands on the sick, and they will recover.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Ascends to God’s Right Hand
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So then, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 1:2, 3
      marker-yv: yv-n
    - type: text
      text: 'after the Lord had spoken to them, He was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 68:18; Luke 9:51; 24:51; John 6:62; 20:17; Acts 1:2, 9–11; (1 Tim. 3:16; Rev. 4:2)
      marker-yv: yv-n
    - type: text
      text: 'received up into heaven, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 110:1); Luke 22:69; (Acts 7:55); 1 Pet. 3:22
      marker-yv: yv-n
    - type: text
      text: 'sat down at the right hand of God. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:1; John 20:1
      marker-yv: yv-n
    - type: text
      text: 'Very early in the morning, on the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the week, they came to the tomb when the sun had risen. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And they went out and preached everywhere, the Lord working with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 5:12; (1 Cor. 2:4, 5; Heb. 2:4)
      marker-yv: yv-n
    - type: text
      text: and confirming the word through the accompanying signs. Amen.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And they said among themselves, “Who will roll away the stone from the door of the tomb for us?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But when they looked up, they saw that the stone had been rolled away—for it was very large. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 24:3; John 20:11, 12
      marker-yv: yv-n
    - type: text
      text: And entering the tomb, they saw a young man clothed in a long white robe sitting on the right side; and they were alarmed.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 16:10; 49:15; Hos. 6:2; Matt. 28:6; Mark 9:31; Luke 24:6
      marker-yv: yv-n
    - type: text
      text: 'But he said to them, “Do not be alarmed. You seek Jesus of Nazareth, who was crucified. He is risen! He is not here. See the place where they laid Him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'But go, tell His disciples—and Peter—that He is going before you into Galilee; there you will see Him, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 26:32; 28:16, 17; Mark 14:28
      marker-yv: yv-n
    - type: text
      text: as He said to you.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'So they went out quickly and fled from the tomb, for they trembled and were amazed. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Matt. 28:8
      marker-yv: yv-n
    - type: text
      text: And they said nothing to anyone, for they were afraid.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mary Magdalene Sees the Risen Lord
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Now when '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He
    - type: text
      text: ' rose early on the first '
    - type: usfm
      marker: it
      children:
      - type: text
        text: day
    - type: text
      text: ' of the week, He appeared first to Mary Magdalene, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 8:2
      marker-yv: yv-n
    - type: text
      text: 'out of whom He had cast seven demons. '
