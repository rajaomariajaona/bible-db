  '41':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 17:6; Num. 20:11; Ps. 78:15; 114:8; Is. 48:21; (1 Cor. 10:4)
      marker-yv: yv-n
    - type: text
      text: He opened the rock, and water gushed out;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'It ran in the dry places '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like
    - type: text
      text: ' a river.'
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For He remembered '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 15:13, 14; Ps. 105:8
      marker-yv: yv-n
    - type: text
      text: His holy promise,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' Abraham His servant.'
  '43':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He brought out His people with joy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His chosen ones with gladness.
  '44':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:16–23; 13:7; Ps. 78:55
      marker-yv: yv-n
    - type: text
      text: He gave them the lands of the Gentiles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they inherited the labor of the nations,
  '45':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Deut. 4:1, 40)
      marker-yv: yv-n
    - type: text
      text: That they might observe His statutes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And keep His laws.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 77:11
      marker-yv: yv-n
    - type: text
      text: Remember His marvelous works which He has done,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His wonders, and the judgments of His mouth,
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: O seed of Abraham His servant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You children of Jacob, His chosen ones!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Is. 26:9)
      marker-yv: yv-n
    - type: text
      text: 'His judgments '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' in all the earth.'
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 1:72
      marker-yv: yv-n
    - type: text
      text: remembers His covenant forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' He commanded, for a thousand generations,'
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:2; Luke 1:73; (Gal. 3:17); Heb. 6:17
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: The
    - type: text
      text: ' '
