verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Eternal Faithfulness of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oh, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 16:8–22, 34; Ps. 106:1; Is. 12:4
      marker-yv: yv-n
    - type: text
      text: 'give thanks to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Call upon His name;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 145:12
      marker-yv: yv-n
    - type: text
      text: Make known His deeds among the peoples!
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And confirmed it to Jacob for a statute,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'To Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' an everlasting covenant,'
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 13:15; 15:18
      marker-yv: yv-n
    - type: text
      text: “To you I will give the land of Canaan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As the allotment of your inheritance,”
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 34:30; (Deut. 7:7)
      marker-yv: yv-n
    - type: text
      text: When they were few in number,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed very few, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 23:4; Heb. 11:9
      marker-yv: yv-n
    - type: text
      text: and strangers in it.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they went from one nation to another,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'From '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' kingdom to another people,'
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 35:5
      marker-yv: yv-n
    - type: text
      text: He permitted no one to do them wrong;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Yes, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 12:17
      marker-yv: yv-n
    - type: text
      text: He rebuked kings for their sakes,
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Saying,
    - type: text
      text: ' “Do not touch My anointed ones,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do My prophets no harm.”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Moreover '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:54
      marker-yv: yv-n
    - type: text
      text: He called for a famine in the land;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He destroyed all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 26:26; Is. 3:1; Ezek. 4:16
      marker-yv: yv-n
    - type: text
      text: provision of bread.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Gen. 45:5)
      marker-yv: yv-n
    - type: text
      text: He sent a man before them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Joseph—
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 37:28, 36; Acts 7:9
      marker-yv: yv-n
    - type: text
      text: was sold as a slave.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 40:15
      marker-yv: yv-n
    - type: text
      text: They hurt his feet with fetters,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He was laid in irons.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Until the time that his word came to pass,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 39:11–21; 41:25, 42, 43
      marker-yv: yv-n
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tested him.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Sing to Him, sing psalms to Him;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 119:27
      marker-yv: yv-n
    - type: text
      text: Talk of all His wondrous works!
  '20':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:14
      marker-yv: yv-n
    - type: text
      text: The king sent and released him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The ruler of the people let him go free.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 41:40–44
      marker-yv: yv-n
    - type: text
      text: He made him lord of his house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And ruler of all his possessions,
  '22':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To bind his princes at his pleasure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And teach his elders wisdom.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 46:6; Acts 7:15
      marker-yv: yv-n
    - type: text
      text: Israel also came into Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And Jacob dwelt '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 78:51
      marker-yv: yv-n
    - type: text
      text: in the land of Ham.
  '24':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 1:7, 9
      marker-yv: yv-n
    - type: text
      text: He increased His people greatly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And made them stronger than their enemies.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 1:8–10; 4:21
      marker-yv: yv-n
    - type: text
      text: He turned their heart to hate His people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To deal craftily with His servants.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 3:10; 4:12–15
      marker-yv: yv-n
    - type: text
      text: He sent Moses His servant,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' Aaron whom He had chosen.'
  '27':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7—12; Ps. 78:43
      marker-yv: yv-n
    - type: text
      text: performed His signs among them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And wonders in the land of Ham.
  '28':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He sent darkness, and made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' dark;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And they did not rebel against His word.
  '29':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 7:20, 21; Ps. 78:44
      marker-yv: yv-n
    - type: text
      text: He turned their waters into blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And killed their fish.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Glory in His holy name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let the hearts of those rejoice who seek the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 8:6
      marker-yv: yv-n
    - type: text
      text: Their land abounded with frogs,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Even
    - type: text
      text: ' in the chambers of their kings.'
  '31':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 8:16, 17
      marker-yv: yv-n
    - type: text
      text: He spoke, and there came swarms of flies,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' lice in all their territory.'
  '32':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 9:23–25
      marker-yv: yv-n
    - type: text
      text: He gave them hail for rain,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' flaming fire in their land.'
  '33':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 78:47
      marker-yv: yv-n
    - type: text
      text: He struck their vines also, and their fig trees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And splintered the trees of their territory.
  '34':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 10:4
      marker-yv: yv-n
    - type: text
      text: He spoke, and locusts came,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Young locusts without number,
  '35':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And ate up all the vegetation in their land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And devoured the fruit of their ground.
  '36':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:29; 13:15; Ps. 135:8; 136:10
      marker-yv: yv-n
    - type: text
      text: He also destroyed all the firstborn in their land,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:3
      marker-yv: yv-n
    - type: text
      text: The first of all their strength.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:35, 36
      marker-yv: yv-n
    - type: text
      text: He also brought them out with silver and gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' none feeble among His tribes.'
  '38':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 12:33
      marker-yv: yv-n
    - type: text
      text: Egypt was glad when they departed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For the fear of them had fallen upon them.
  '39':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 13:21; Neh. 9:12; Ps. 78:14; Is. 4:5
      marker-yv: yv-n
    - type: text
      text: He spread a cloud for a covering,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And fire to give light in the night.
  '4':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Seek the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and His strength;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 27:8
      marker-yv: yv-n
    - type: text
