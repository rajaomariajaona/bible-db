  '40':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 16:12
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: The
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: people
    - type: text
