document_id: MAT.5,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Beatitudes
  - type: text
    content: 'And seeing the multitudes, '
  - type: note
    content: Matt. 14:23; 15:29; 17:1; Mark 3:13; Luke 6:17; 9:28; John 6:3, 15
  - type: text
    content: 'He went up on a mountain, and when He was seated His disciples came to Him. '
  '10':
  - type: note
    content: (2 Cor. 4:17); 1 Pet. 3:14
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' those who are persecuted for righteousness’ sake,'
  - type: text
    content: For theirs is the kingdom of heaven.
  '11':
  - type: note
    content: Luke 6:22
  - type: text
    content: '“Blessed are you when they revile and persecute you, and say all kinds of '
  - type: note
    content: 1 Pet. 4:14
  - type: text
    content: evil against you falsely for My sake.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Luke 6:23; Acts 5:41; 1 Pet. 4:13, 14
  - type: text
    content: 'Rejoice and be exceedingly glad, for great '
  - type: text
    content: is
  - type: text
    content: ' your reward in heaven, for '
  - type: note
    content: 2 Chr. 36:16; Neh. 9:26; Matt. 23:37; Acts 7:52; 1 Thess. 2:15; Heb. 11:35–37; James 5:10
  - type: text
    content: so they persecuted the prophets who were before you.
  - type: heading
    content: Believers Are Salt and Light
  '13':
  - type: text
    content: '“You are the salt of the earth; '
  - type: note
    content: Mark 9:50; Luke 14:34
  - type: text
    content: but if the salt loses its flavor, how shall it be seasoned? It is then good for nothing but to be thrown out and trampled underfoot by men.
  '14':
  - type: note
    content: (Prov. 4:18; John 8:12); Phil. 2:15
  - type: text
    content: “You are the light of the world. A city that is set on a hill cannot be hidden.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Nor do they '
  - type: note
    content: Mark 4:21; Luke 8:16; Phil. 2:15
  - type: text
    content: 'light a lamp and put it under a basket, but on a lampstand, and it gives light to all '
  - type: text
    content: who are
  - type: text
    content: ' in the house.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Let your light so shine before men, '
  - type: note
    content: 1 Pet. 2:12
  - type: text
    content: 'that they may see your good works and '
  - type: note
    content: (John 15:8); 1 Cor. 14:25
  - type: text
    content: glorify your Father in heaven.
  - type: heading
    content: Christ Fulfills the Law
  '17':
  - type: note
    content: Rom. 10:4
  - type: text
    content: “Do not think that I came to destroy the Law or the Prophets. I did not come to destroy but to fulfill.
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'For assuredly, I say to you, '
  - type: note
    content: Matt. 24:35; Luke 16:17
  - type: text
    content: 'till heaven and earth pass away, one '
  - type: text
    content: 'jot or one '
  - type: text
    content: tittle will by no means pass from the law till all is fulfilled.
  - type: text
    content: ' '
  '19':
  - type: note
    content: (James 2:10)
  - type: text
    content: 'Whoever therefore breaks one of the least of these commandments, and teaches men so, shall be called least in the kingdom of heaven; but whoever does and teaches '
  - type: text
    content: them,
  - type: text
    content: ' he shall be called great in the kingdom of heaven.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Then He opened His mouth and '
  - type: note
    content: (Matt. 7:29); Mark 10:1; 12:35; John 8:2
  - type: text
    content: 'taught them, saying:'
  '20':
  - type: text
    content: 'For I say to you, that unless your righteousness exceeds '
  - type: note
    content: (Rom. 10:3)
  - type: text
    content: the righteousness
  - type: text
    content: ' of the scribes and Pharisees, you will by no means enter the kingdom of heaven.'
  - type: heading
    content: Murder Begins in the Heart
  '21':
  - type: text
    content: '“You have heard that it was said to those '
  - type: text
    content: 'of old, '
  - type: note
    content: Ex. 20:13; Deut. 5:17
  - type: text
    content: ‘You shall not murder,
  - type: text
    content: ' and whoever murders will be in danger of the judgment.’'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'But I say to you that '
  - type: note
    content: (1 John 3:15)
  - type: text
    content: 'whoever is angry with his brother '
  - type: text
    content: without a cause
  - type: text
    content: ' shall be in danger of the judgment. And whoever says to his brother, '
  - type: note
    content: (James 2:20; 3:6)
  - type: text
    content: ‘Raca!’
  - type: text
    content: ' shall be in danger of the council. But whoever says, '
  - type: text
    content: '‘You fool!’ shall be in danger of '
  - type: text
    content: hell fire.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Therefore '
  - type: note
    content: Matt. 8:4
  - type: text
    content: if you bring your gift to the altar, and there remember that your brother has something against you,
  - type: text
    content: ' '
  '24':
  - type: note
    content: (Job 42:8; 1 Tim. 2:8; 1 Pet. 3:7)
  - type: text
    content: leave your gift there before the altar, and go your way. First be reconciled to your brother, and then come and offer your gift.
  - type: text
    content: ' '
  '25':
  - type: note
    content: (Prov. 25:8); Luke 12:58, 59
  - type: text
    content: 'Agree with your adversary quickly, '
  - type: note
    content: (Ps. 32:6; Is. 55:6)
  - type: text
    content: while you are on the way with him, lest your adversary deliver you to the judge, the judge hand you over to the officer, and you be thrown into prison.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Assuredly, I say to you, you will by no means get out of there till you have paid the last penny.
  - type: heading
    content: Adultery in the Heart
  '27':
  - type: text
    content: '“You have heard that it was said '
  - type: text
    content: to those of old,
  - type: text
    content: ' '
  - type: note
    content: Ex. 20:14; Deut. 5:18
  - type: text
    content: ‘You shall not commit adultery.’
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'But I say to you that whoever '
  - type: note
    content: 2 Sam. 11:2–5; Job 31:1; Prov. 6:25; (Matt. 15:19; James 1:14, 15)
  - type: text
    content: looks at a woman to lust for her has already committed adultery with her in his heart.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Mark 9:43
  - type: text
    content: 'If your right eye causes you to '
  - type: text
    content: 'sin, '
  - type: note
    content: (Col. 3:5)
  - type: text
    content: 'pluck it out and cast '
  - type: text
    content: it
  - type: text
    content: ' from you; for it is more profitable for you that one of your members perish, than for your whole body to be cast into hell.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: “Blessed
  - type: note
    content: Prov. 16:19; Is. 66:2; Luke 6:20–23
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' the poor in spirit,'
  - type: text
    content: For theirs is the kingdom of heaven.
  '30':
  - type: text
    content: 'And if your right hand causes you to '
  - type: text
    content: 'sin, cut it off and cast '
  - type: text
    content: it
  - type: text
    content: ' from you; for it is more profitable for you that one of your members perish, than for your whole body to be cast into hell.'
  - type: heading
    content: Marriage Is Sacred and Binding
  '31':
  - type: text
    content: '“Furthermore it has been said, '
  - type: note
    content: Deut. 24:1; (Jer. 3:1); Mark 10:2
  - type: text
    content: ‘Whoever divorces his wife, let him give her a certificate of divorce.’
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'But I say to you that '
  - type: note
    content: (Matt. 19:9; Mark 10:11; Luke 16:18; Rom. 7:3); 1 Cor. 7:11
  - type: text
    content: 'whoever divorces his wife for any reason except '
  - type: text
    content: sexual immorality
  - type: text
    content: ' causes her to commit adultery; and whoever marries a woman who is divorced commits adultery.'
  - type: heading
    content: Jesus Forbids Oaths
  '33':
  - type: text
    content: '“Again you have heard that '
  - type: note
    content: Matt. 23:16
  - type: text
    content: 'it was said to those of '
  - type: text
    content: 'old, '
  - type: note
    content: (Ex. 20:7); Lev. 19:12; Num. 30:2
  - type: text
    content: '‘You shall not swear falsely, but '
  - type: note
    content: Deut. 23:23
  - type: text
    content: shall perform your oaths to the Lord.’
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'But I say to you, '
  - type: note
    content: Matt. 23:16; James 5:12
  - type: text
    content: 'do not swear at all: neither by heaven, for it is '
  - type: note
    content: Is. 66:1
  - type: text
    content: God’s throne;
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'nor by the earth, for it is His footstool; nor by Jerusalem, for it is the city of '
  - type: note
    content: Ps. 48:2; (Matt. 5:2, 19; 6:10)
  - type: text
    content: the great King.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Nor shall you swear by your head, because you cannot make one hair white or black.
  - type: text
    content: ' '
  '37':
  - type: note
    content: (Col. 4:6); James 5:12
  - type: text
    content: 'But let '
  - type: text
    content: your ‘Yes’ be ‘Yes,’ and your ‘No,’ ‘No.’ For whatever is more than these is from the evil one.
  - type: heading
    content: Go the Second Mile
  '38':
  - type: text
    content: '“You have heard that it was said, '
  - type: note
    content: Ex. 21:24; Lev. 24:20; Deut. 19:21
  - type: text
    content: ‘An eye for an eye and a tooth for a tooth.’
  - type: text
    content: ' '
  '39':
  - type: note
    content: (Prov. 20:22); Luke 6:29; (Rom. 12:17; 1 Cor. 6:7; 1 Pet. 3:9)
  - type: text
    content: 'But I tell you not to resist an evil person. '
  - type: note
    content: Is. 50:6; Lam. 3:30
  - type: text
    content: But whoever slaps you on your right cheek, turn the other to him also.
  - type: text
    content: ' '
  '4':
  - type: note
    content: Is. 61:2, 3; Luke 6:21; (John 16:20); Acts 16:34; (2 Cor. 1:7); Rev. 21:4
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' those who mourn,'
  - type: text
    content: For they shall be comforted.
  '40':
  - type: text
    content: 'If anyone wants to sue you and take away your tunic, let him have '
  - type: text
    content: your
  - type: text
    content: ' cloak also.'
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'And whoever '
  - type: note
    content: Matt. 27:32
  - type: text
    content: compels you to go one mile, go with him two.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Give to him who asks you, and '
  - type: note
    content: Deut. 15:7–11; Luke 6:30–34; 1 Tim. 6:18
  - type: text
    content: from him who wants to borrow from you do not turn away.
  - type: heading
    content: Love Your Enemies
  '43':
  - type: text
    content: '“You have heard that it was said, '
  - type: note
    content: Lev. 19:18
  - type: text
    content: ‘You shall love your neighbor
  - type: text
    content: ' '
  - type: note
    content: Deut. 23:3–6; Ps. 41:10
  - type: text
    content: and hate your enemy.’
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'But I say to you, '
  - type: note
    content: Luke 6:27; Rom. 12:14
  - type: text
    content: 'love your enemies, bless those who curse you, '
  - type: note
    content: (Rom. 12:20)
  - type: text
    content: 'do good to those who hate you, and pray '
  - type: note
    content: Luke 23:34; Acts 7:60; 1 Cor. 4:12; 1 Pet. 2:23
  - type: text
    content: for those who spitefully use you and persecute you,
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'that you may be sons of your Father in heaven; for '
  - type: note
    content: Job 25:3; Ps. 65:9–13; Luke 12:16, 17; Acts 14:17
  - type: text
    content: He makes His sun rise on the evil and on the good, and sends rain on the just and on the unjust.
  - type: text
    content: ' '
  '46':
  - type: note
    content: Luke 6:32
  - type: text
    content: For if you love those who love you, what reward have you? Do not even the tax collectors do the same?
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'And if you greet your '
  - type: text
    content: brethren
  - type: text
    content: ' only, what do you do more '
  - type: text
    content: than others?
  - type: text
    content: ' Do not even the '
  - type: text
    content: tax collectors
  - type: text
    content: ' do so?'
  - type: text
    content: ' '
  '48':
  - type: note
    content: Gen. 17:1; Lev. 11:44; 19:2; Luke 6:36; (Col. 1:28; 4:12); James 1:4; 1 Pet. 1:15
  - type: text
    content: 'Therefore you shall be perfect, just '
  - type: note
    content: Eph. 5:1
  - type: text
    content: as your Father in heaven is perfect.
  '5':
  - type: note
    content: Ps. 37:11; Is. 29:19
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the meek,'
  - type: text
    content: 'For '
  - type: note
    content: (Rom. 4:13)
  - type: text
    content: 'they shall inherit the '
  - type: text
    content: earth.
  '6':
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' those who '
  - type: note
    content: Luke 1:53; Acts 2:4
  - type: text
    content: hunger and thirst for righteousness,
  - type: note
    content: (Is. 55:1; 65:13; John 4:14; 6:48; 7:37)
  - type: text
    content: For they shall be filled.
  '7':
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the merciful,'
  - type: note
    content: Ps. 41:1; Mark 11:25
  - type: text
    content: For they shall obtain mercy.
  '8':
  - type: note
    content: Ps. 15:2; 24:4; Heb. 12:14
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the pure in heart,'
  - type: text
    content: 'For '
  - type: note
    content: Acts 7:55, 56; 1 Cor. 13:12
  - type: text
    content: they shall see God.
  '9':
  - type: text
    content: 'Blessed '
  - type: text
    content: are
  - type: text
    content: ' the peacemakers,'
  - type: text
    content: For they shall be called sons of God.
