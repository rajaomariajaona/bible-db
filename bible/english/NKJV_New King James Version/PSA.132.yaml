  '1':
  - type: heading
    content: The Eternal Dwelling of God in Zion
  - type: text
    content: A Song of Ascents.
  - type: heading
    content: Lord
  - type: text
    content: ', remember David'
  - type: text
    content: And
  - type: text
    content: ' all his afflictions;'
  '10':
  - type: text
    content: For Your servant David’s sake,
  - type: text
    content: Do not turn away the face of Your Anointed.
  '11':
  - type: note
    content: Job 29:14
  - type: text
    content: 'The '
  - type: heading
    content: Lord
  - type: text
    content: ' has sworn '
  - type: text
    content: in
  - type: text
    content: ' truth to David;'
  - type: text
    content: 'He will not turn from it:'
  - type: text
    content: '“I will set upon your throne '
  - type: note
    content: (Ps. 89:3, 4, 33; 110:4)
  - type: text
    content: the fruit of your body.
  '12':
  - type: text
    content: If your sons will keep My covenant
  - type: text
    content: And My testimony which I shall teach them,
  - type: text
    content: Their sons also shall sit upon your throne forevermore.”
  '13':
  - type: note
    content: 2 Sam. 7:12; (1 Kin. 8:25; 2 Chr. 6:16; Luke 1:69; Acts 2:30)
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' has chosen Zion;'
  - type: text
    content: 'He has desired '
  - type: text
    content: it
  - type: text
    content: ' for His dwelling place:'
  '14':
  - type: text
    content: “This
  - type: note
    content: (Ps. 48:1, 2)
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' My resting place forever;'
  - type: text
    content: Here I will dwell, for I have desired it.
  '15':
  - type: note
    content: Ps. 68:16; Matt. 23:21
  - type: text
    content: I will abundantly bless her provision;
  - type: text
    content: I will satisfy her poor with bread.
  '16':
  - type: note
    content: Ps. 147:14
  - type: text
    content: I will also clothe her priests with salvation,
  - type: note
    content: 2 Chr. 6:41; Ps. 132:9; 149:4
  - type: text
    content: And her saints shall shout aloud for joy.
  '17':
  - type: note
    content: 1 Sam. 4:5; Hos. 11:12
  - type: text
    content: There I will make the horn of David grow;
  - type: note
    content: Ezek. 29:21; Luke 1:69
  - type: text
    content: I will prepare a lamp for My Anointed.
  '18':
  - type: text
    content: 'His enemies I will '
  - type: note
    content: 1 Kin. 11:36; 15:4; 2 Kin. 8:19; 2 Chr. 21:7; Ps. 18:28
  - type: text
    content: clothe with shame,
  - type: text
    content: But upon Himself His crown shall flourish.”
  '2':
  - type: text
    content: 'How he swore to the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: note
    content: (Ps. 130:7)
  - type: text
    content: And
  - type: text
    content: ' vowed to '
  - type: note
    content: Ps. 65:1
  - type: text
    content: 'the Mighty One of Jacob:'
  '3':
  - type: text
    content: “Surely I will not go into the chamber of my house,
  - type: text
    content: Or go up to the comfort of my bed;
  '4':
  - type: text
    content: 'I will '
  - type: note
    content: Gen. 49:24; Is. 49:26; 60:16
  - type: text
    content: not give sleep to my eyes
  - type: text
    content: Or
  - type: text
    content: ' slumber to my eyelids,'
  '5':
  - type: text
    content: 'Until I '
  - type: note
    content: Prov. 6:4
  - type: text
    content: 'find a place for the '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: A dwelling place for the Mighty One of Jacob.”
  '6':
  - type: text
    content: 'Behold, we heard of it '
  - type: note
    content: 1 Kin. 8:17; 1 Chr. 22:7; Ps. 26:8; Acts 7:46
  - type: text
    content: in Ephrathah;
  - type: note
    content: 1 Sam. 17:12
  - type: text
    content: 'We found it '
  - type: note
    content: 1 Sam. 7:1
  - type: text
    content: in the fields of the woods.
  '7':
  - type: text
    content: Let us go into His tabernacle;
  - type: note
    content: 1 Chr. 13:5
  - type: text
    content: Let us worship at His footstool.
  '8':
  - type: note
    content: Ps. 5:7; 99:5
  - type: text
    content: 'Arise, O '
  - type: heading
    content: Lord
  - type: text
    content: ', to Your resting place,'
  - type: text
    content: 'You and '
  - type: note
    content: Num. 10:35
  - type: text
    content: the ark of Your strength.
  '9':
  - type: text
    content: 'Let Your priests '
  - type: note
    content: Ps. 78:61
  - type: text
    content: be clothed with righteousness,
  - type: text
    content: And let Your saints shout for joy.
