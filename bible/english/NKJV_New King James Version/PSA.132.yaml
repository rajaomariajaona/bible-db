document_id: PSA.132,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Eternal Dwelling of God in Zion
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Song of Ascents.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', remember David'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' all his afflictions;'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For Your servant David’s sake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not turn away the face of Your Anointed.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 29:14
      marker-yv: yv-n
    - type: text
      text: 'The '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sworn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' truth to David;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He will not turn from it:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“I will set upon your throne '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 89:3, 4, 33; 110:4)
      marker-yv: yv-n
    - type: text
      text: the fruit of your body.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If your sons will keep My covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And My testimony which I shall teach them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their sons also shall sit upon your throne forevermore.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 7:12; (1 Kin. 8:25; 2 Chr. 6:16; Luke 1:69; Acts 2:30)
      marker-yv: yv-n
    - type: text
      text: 'For the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen Zion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'He has desired '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' for His dwelling place:'
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “This
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 48:1, 2)
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' My resting place forever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Here I will dwell, for I have desired it.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 68:16; Matt. 23:21
      marker-yv: yv-n
    - type: text
      text: I will abundantly bless her provision;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will satisfy her poor with bread.
  '16':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 147:14
      marker-yv: yv-n
    - type: text
      text: I will also clothe her priests with salvation,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Chr. 6:41; Ps. 132:9; 149:4
      marker-yv: yv-n
    - type: text
      text: And her saints shall shout aloud for joy.
  '17':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 4:5; Hos. 11:12
      marker-yv: yv-n
    - type: text
      text: There I will make the horn of David grow;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 29:21; Luke 1:69
      marker-yv: yv-n
    - type: text
      text: I will prepare a lamp for My Anointed.
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'His enemies I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 11:36; 15:4; 2 Kin. 8:19; 2 Chr. 21:7; Ps. 18:28
      marker-yv: yv-n
    - type: text
      text: clothe with shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But upon Himself His crown shall flourish.”
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'How he swore to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 130:7)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: And
    - type: text
      text: ' vowed to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 65:1
      marker-yv: yv-n
    - type: text
      text: 'the Mighty One of Jacob:'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Surely I will not go into the chamber of my house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or go up to the comfort of my bed;
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I will '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:24; Is. 49:26; 60:16
      marker-yv: yv-n
    - type: text
      text: not give sleep to my eyes
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Or
    - type: text
      text: ' slumber to my eyelids,'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Until I '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Prov. 6:4
      marker-yv: yv-n
    - type: text
      text: 'find a place for the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: A dwelling place for the Mighty One of Jacob.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Behold, we heard of it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Kin. 8:17; 1 Chr. 22:7; Ps. 26:8; Acts 7:46
      marker-yv: yv-n
    - type: text
      text: in Ephrathah;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 17:12
      marker-yv: yv-n
    - type: text
      text: 'We found it '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 7:1
      marker-yv: yv-n
    - type: text
      text: in the fields of the woods.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let us go into His tabernacle;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 13:5
      marker-yv: yv-n
    - type: text
      text: Let us worship at His footstool.
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 5:7; 99:5
      marker-yv: yv-n
    - type: text
      text: 'Arise, O '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to Your resting place,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 10:35
      marker-yv: yv-n
    - type: text
      text: the ark of Your strength.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Let Your priests '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 78:61
      marker-yv: yv-n
    - type: text
      text: be clothed with righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let Your saints shout for joy.
