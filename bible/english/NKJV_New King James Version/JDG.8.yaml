  - type: note
    content: (Ps. 106:39)
  - type: text
    content: 'played the harlot with it there. It became '
  - type: note
    content: Deut. 7:16
  - type: text
    content: a snare to Gideon and to his house.
  '28':
  - type: text
    content: 'Thus Midian was subdued before the children of Israel, so that they lifted their heads no more. '
  - type: note
    content: Judg. 5:31
  - type: text
    content: And the country was quiet for forty years in the days of Gideon.
  - type: heading
    content: Death of Gideon
  '29':
  - type: text
    content: 'Then '
  - type: note
    content: Judg. 6:32; 7:1
  - type: text
    content: 'Jerubbaal the son of Joash went and dwelt in his own house. '
  '3':
  - type: note
    content: Judg. 7:24, 25
  - type: text
    content: 'God has delivered into your hands the princes of Midian, Oreb and Zeeb. And what was I able to do in comparison with you?” Then their '
  - type: note
    content: Prov. 15:1
  - type: text
    content: anger toward him subsided when he said that.
  '30':
  - type: text
    content: 'Gideon had '
  - type: note
    content: Judg. 9:2, 5
  - type: text
    content: 'seventy sons who were his own offspring, for he had many wives. '
  '31':
  - type: note
    content: Judg. 9:1
  - type: text
    content: 'And his concubine who '
  - type: text
    content: was
  - type: text
    content: ' in Shechem also bore him a son, whose name he called Abimelech. '
  '32':
  - type: text
    content: 'Now Gideon the son of Joash died '
  - type: note
    content: Gen. 25:8; Job 5:26
  - type: text
    content: 'at a good old age, and was buried in the tomb of Joash his father, '
  - type: note
    content: Judg. 6:24; 8:27
  - type: text
    content: in Ophrah of the Abiezrites.
  '33':
  - type: text
    content: 'So it was, '
  - type: note
