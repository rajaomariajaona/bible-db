  - type: text
    content: 'to Penuel and spoke to them in the same way. And the men of Penuel answered him as the men of Succoth had answered. '
  '9':
  - type: text
    content: 'So he also spoke to the men of Penuel, saying, “When I '
  - type: note
    content: 1 Kin. 22:27
  - type: text
    content: 'come back in peace, '
  - type: note
