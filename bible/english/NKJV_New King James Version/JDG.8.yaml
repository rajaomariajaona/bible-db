  - type: text
    content: were
  - type: text
    content: ' Ishmaelites.'
  '25':
  - type: text
    content: 'So they answered, “We will gladly give '
  - type: text
    content: them.
  - type: text
    content: '” And they spread out a garment, and each man threw into it the earrings from his plunder. '
  '26':
  - type: text
    content: 'Now the weight of the gold earrings that he requested was one thousand seven hundred '
  - type: text
    content: shekels
  - type: text
