  - type: text
    content: delivered us from the hand of Midian.”
  '23':
  - type: text
    content: 'But Gideon said to them, “I will not rule over you, nor shall my son rule over you; '
  - type: note
    content: 1 Sam. 8:7; 10:19; 12:12; Ps. 10:16
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' shall rule over you.” '
  '24':
  - type: text
    content: 'Then Gideon said to them, “I would like to make a request of you, that each of you would give me the earrings from his plunder.” For they had golden earrings, '
  - type: note
    content: Gen. 37:25, 28
  - type: text
