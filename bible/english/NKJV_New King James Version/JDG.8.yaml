  - type: text
    content: 'as soon as Gideon was dead, that the children of Israel again '
  - type: note
    content: Judg. 2:17
  - type: text
    content: 'played the harlot with the Baals, '
  - type: note
    content: Judg. 9:4, 46
  - type: text
    content: 'and made Baal-Berith their god. '
  '34':
  - type: text
    content: 'Thus the children of Israel '
  - type: note
    content: Deut. 4:9; Judg. 3:7; Ps. 78:11, 42; 106:13, 21
  - type: text
    content: 'did not remember the '
  - type: heading
    content: Lord
  - type: text
    content: ' their God, who had delivered them from the hands of all their enemies on every side; '
  '35':
  - type: note
    content: Judg. 9:16–18
  - type: text
    content: nor did they show kindness to the house of Jerubbaal (Gideon) in accordance with the good he had done for Israel.
  '4':
  - type: text
    content: 'When Gideon came '
  - type: note
    content: Judg. 7:25
  - type: text
    content: 'to the Jordan, he and '
  - type: note
    content: Judg. 7:6
  - type: text
    content: 'the three hundred men who '
  - type: text
    content: were
  - type: text
    content: ' with him crossed over, exhausted but still in pursuit. '
  '5':
  - type: text
    content: 'Then he said to the men of '
  - type: note
    content: Gen. 33:17; Ps. 60:6
  - type: text
    content: Succoth, “Please give loaves of bread to the people who follow me, for they are exhausted, and I am pursuing Zebah and Zalmunna, kings of Midian.”
  '6':
  - type: text
    content: 'And the leaders of Succoth said, '
  - type: note
    content: 1 Kin. 20:11; Judg. 8:15
  - type: text
    content: “
  - type: text
    content: Are
  - type: text
    content: ' the hands of Zebah and Zalmunna now in your hand, that '
  - type: note
    content: 1 Sam. 25:11
  - type: text
    content: we should give bread to your army?”
  '7':
  - type: text
    content: 'So Gideon said, “For this cause, when the '
