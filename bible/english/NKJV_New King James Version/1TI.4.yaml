document_id: 1TI.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Great Apostasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the Spirit expressly says that in latter times some will depart from the faith, giving heed '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 3:13; Rev. 16:14
    marker-yv: yv-n
  - type: text
    text: 'to deceiving spirits and doctrines of demons, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 7:15
    marker-yv: yv-n
  - type: text
    text: 'speaking lies in hypocrisy, having their own conscience '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 4:19
    marker-yv: yv-n
  - type: text
    text: 'seared with a hot iron, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'forbidding to marry, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: commanding
  - type: text
    text: ' to abstain from foods which God created to be received with thanksgiving by those who believe and know the truth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For every creature of God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' good, and nothing is to be refused if it is received with thanksgiving; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: for it is sanctified by the word of God and prayer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Good Servant of Jesus Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'If you instruct the brethren in these things, you will be a good minister of Jesus Christ, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 3:14
    marker-yv: yv-n
  - type: text
    text: 'nourished in the words of faith and of the good doctrine which you have carefully followed. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 2:16; Titus 1:14
    marker-yv: yv-n
  - type: text
    text: 'reject profane and old wives’ fables, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. 5:14
    marker-yv: yv-n
  - type: text
    text: 'exercise yourself toward godliness. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 8:8
    marker-yv: yv-n
  - type: text
    text: 'bodily exercise profits a little, but godliness is profitable for all things, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 37:9
    marker-yv: yv-n
  - type: text
    text: 'having promise of the life that now is and of that which is to come. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' a faithful saying and worthy of all acceptance. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For to this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: end
  - type: text
    text: ' we both labor and suffer reproach, because we trust in the living God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 36:6
    marker-yv: yv-n
  - type: text
    text: 'who is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' Savior of all men, especially of those who believe. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: These things command and teach.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Take Heed to Your Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Let no one despise your youth, but be an '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Phil. 3:17; Titus 2:7; 1 Pet. 5:3
    marker-yv: yv-n
  - type: text
    text: 'example to the believers in word, in conduct, in love, in spirit, in faith, in purity. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Till I come, give attention to reading, to exhortation, to doctrine. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Tim. 1:6
    marker-yv: yv-n
  - type: text
    text: 'Do not neglect the gift that is in you, which was given to you by prophecy '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 6:6; 1 Tim. 5:22
    marker-yv: yv-n
  - type: text
    text: 'with the laying on of the hands of the eldership. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Meditate on these things; give yourself entirely to them, that your progress may be evident to all. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Take heed to yourself and to the doctrine. Continue in them, for in doing this you will save both yourself and those who hear you.
