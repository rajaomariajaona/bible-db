document_id: 1TI.4,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Great Apostasy
  - type: text
    content: 'Now the Spirit expressly says that in latter times some will depart from the faith, giving heed '
  - type: note
    content: 2 Tim. 3:13; Rev. 16:14
  - type: text
    content: 'to deceiving spirits and doctrines of demons, '
  '10':
  - type: text
    content: 'For to this '
  - type: text
    content: end
  - type: text
    content: ' we both labor and suffer reproach, because we trust in the living God, '
  - type: note
    content: Ps. 36:6
  - type: text
    content: 'who is '
  - type: text
    content: the
  - type: text
    content: ' Savior of all men, especially of those who believe. '
  '11':
  - type: text
    content: These things command and teach.
  - type: heading
    content: Take Heed to Your Ministry
  '12':
  - type: text
    content: 'Let no one despise your youth, but be an '
  - type: note
    content: Phil. 3:17; Titus 2:7; 1 Pet. 5:3
  - type: text
    content: 'example to the believers in word, in conduct, in love, in spirit, in faith, in purity. '
  '13':
  - type: text
    content: 'Till I come, give attention to reading, to exhortation, to doctrine. '
  '14':
  - type: note
    content: 2 Tim. 1:6
  - type: text
    content: 'Do not neglect the gift that is in you, which was given to you by prophecy '
  - type: note
    content: Acts 6:6; 1 Tim. 5:22
  - type: text
    content: 'with the laying on of the hands of the eldership. '
  '15':
  - type: text
    content: 'Meditate on these things; give yourself entirely to them, that your progress may be evident to all. '
  '16':
  - type: text
    content: Take heed to yourself and to the doctrine. Continue in them, for in doing this you will save both yourself and those who hear you.
  '2':
  - type: note
    content: Matt. 7:15
  - type: text
    content: 'speaking lies in hypocrisy, having their own conscience '
  - type: note
    content: Eph. 4:19
  - type: text
    content: 'seared with a hot iron, '
  '3':
  - type: text
    content: 'forbidding to marry, '
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: commanding
  - type: text
    content: ' to abstain from foods which God created to be received with thanksgiving by those who believe and know the truth. '
  '4':
  - type: text
    content: 'For every creature of God '
  - type: text
    content: is
  - type: text
    content: ' good, and nothing is to be refused if it is received with thanksgiving; '
  '5':
  - type: text
    content: for it is sanctified by the word of God and prayer.
  - type: heading
    content: A Good Servant of Jesus Christ
  '6':
  - type: text
    content: 'If you instruct the brethren in these things, you will be a good minister of Jesus Christ, '
  - type: note
    content: 2 Tim. 3:14
  - type: text
    content: 'nourished in the words of faith and of the good doctrine which you have carefully followed. '
  '7':
  - type: text
    content: 'But '
  - type: note
    content: 2 Tim. 2:16; Titus 1:14
  - type: text
    content: 'reject profane and old wives’ fables, and '
  - type: note
    content: Heb. 5:14
  - type: text
    content: 'exercise yourself toward godliness. '
  '8':
  - type: text
    content: 'For '
  - type: note
    content: 1 Cor. 8:8
  - type: text
    content: 'bodily exercise profits a little, but godliness is profitable for all things, '
  - type: note
    content: Ps. 37:9
  - type: text
    content: 'having promise of the life that now is and of that which is to come. '
  '9':
  - type: text
    content: 'This '
  - type: text
    content: is
  - type: text
    content: ' a faithful saying and worthy of all acceptance. '
