  - type: text
    text: 'Bezalel made '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:10–20
    marker-yv: yv-n
  - type: text
    text: 'the ark of acacia wood; two and a half cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' its length, a cubit and a half its width, and a cubit and a half its height. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He overlaid it with pure gold inside and outside, and made a molding of gold all around it. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And he cast for it four rings of gold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: set
  - type: text
    text: ' in its four corners: two rings on one side, and two rings on the other side of it. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He made poles of acacia wood, and overlaid them with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And he put the poles into the rings at the sides of the ark, to bear the ark. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He also made the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:17
    marker-yv: yv-n
  - type: text
    text: 'mercy seat of pure gold; two and a half cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' its length and a cubit and a half its width. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He made two cherubim of beaten gold; he made them of one piece at the two ends of the mercy seat: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'one cherub at one end on this side, and the other cherub at the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: other
  - type: text
    text: ' end on that side. He made the cherubim at the two ends '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: piece
  - type: text
    text: ' with the mercy seat. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The cherubim spread out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their
  - type: text
    text: ' wings above, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and
  - type: text
    text: ' covered the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:20
    marker-yv: yv-n
  - type: text
    text: mercy seat with their wings. They faced one another; the faces of the cherubim were toward the mercy seat.
