  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He made '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:23–29
    marker-yv: yv-n
  - type: text
    text: 'the table of acacia wood; two cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' its length, a cubit its width, and a cubit and a half its height. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he overlaid it with pure gold, and made a molding of gold all around it. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Also he made a frame of a handbreadth all around it, and made a molding of gold for the frame all around it. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And he cast for it four rings of gold, and put the rings on the four corners that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' at its four legs. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The rings were close to the frame, as holders for the poles to bear the table. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he made the poles of acacia wood to bear the table, and overlaid them with gold. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He made of pure gold the utensils which were on the table: its '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:29
    marker-yv: yv-n
  - type: text
    text: dishes, its cups, its bowls, and its pitchers for pouring.
- type: usfm
  marker: s1
  children:
  - type: text
