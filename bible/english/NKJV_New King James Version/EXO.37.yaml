    children:
    - type: text
      text: '17'
  - type: text
    text: 'He also made the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 25:31–39
    marker-yv: yv-n
  - type: text
    text: 'lampstand of pure gold; of hammered work he made the lampstand. Its shaft, its branches, its bowls, its '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ornamental
  - type: text
    text: ' knobs, and its flowers were of the same piece. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And six branches came out of its sides: three branches of the lampstand out of one side, and three branches of the lampstand out of the other side. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'There were three bowls made like almond '
  - type: usfm
    marker: it
    children:
    - type: text
      text: blossoms
  - type: text
    text: ' on one branch, with an '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ornamental
  - type: text
    text: ' knob and a flower, and three bowls made like almond '
  - type: usfm
    marker: it
    children:
    - type: text
      text: blossoms
  - type: text
    text: ' on the other branch, with an '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ornamental
  - type: text
    text: ' knob and a flower—and so for the six branches coming out of the lampstand. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And on the lampstand itself '
  - type: usfm
    marker: it
    children:
    - type: text
      text: were
  - type: text
    text: ' four bowls made like almond '
  - type: usfm
    marker: it
    children:
    - type: text
      text: blossoms, each with
  - type: text
    text: ' its '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ornamental
  - type: text
    text: ' knob and flower. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: it
    children:
    - type: text
      text: There
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a knob under the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: first
  - type: text
    text: ' two branches of the same, a knob under the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: second
  - type: text
    text: ' two branches of the same, and a knob under the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: third
  - type: text
    text: ' two branches of the same, according to the six branches extending from it. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Their knobs and their branches were of one piece; all of it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' one hammered piece of pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And he made its seven lamps, its '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Num. 4:9
    marker-yv: yv-n
  - type: text
    text: 'wick-trimmers, and its trays of pure gold. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Of a talent of pure gold he made it, with all its utensils.
- type: usfm
  marker: s1
  children:
