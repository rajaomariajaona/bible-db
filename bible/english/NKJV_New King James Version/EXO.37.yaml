  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:1–5
    marker-yv: yv-n
  - type: text
    text: 'He made the incense altar of acacia wood. Its length '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' a cubit and its width a cubit—'
  - type: usfm
    marker: it
    children:
    - type: text
      text: it
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' square—and two cubits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' its height. Its horns were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: piece
  - type: text
    text: ' with it. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And he overlaid it with pure gold: its top, its sides all around, and its horns. He also made for it a molding of gold all around it. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He made two rings of gold for it under its molding, by its two corners on both sides, as holders for the poles with which to bear it. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And he '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex. 30:5
    marker-yv: yv-n
  - type: text
    text: made the poles of acacia wood, and overlaid them with gold.
