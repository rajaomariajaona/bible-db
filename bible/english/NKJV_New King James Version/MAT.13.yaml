document_id: MAT.13,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Sower
  - type: text
    content: 'On the same day Jesus went out of the house '
  - type: note
    content: Matt. 13:1–15; Mark 4:1–12; Luke 8:4–10
  - type: text
    content: 'and sat by the sea. '
  '10':
  - type: text
    content: And the disciples came and said to Him, “Why do You speak to them in parables?”
  '11':
  - type: text
    content: 'He answered and said to them, '
  - type: text
    content: '“Because '
  - type: note
    content: (Matt. 11:25; 16:17); Mark 4:10, 11; (John 6:65; 1 Cor. 2:10; Col. 1:27; 1 John 2:20, 27)
  - type: text
    content: 'it has been given to you to know the '
  - type: text
    content: mysteries of the kingdom of heaven, but to them it has not been given.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Matt. 25:29; Mark 4:25; Luke 8:18; 19:26
  - type: text
    content: For whoever has, to him more will be given, and he will have abundance; but whoever does not have, even what he has will be taken away from him.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Therefore I speak to them in parables, because seeing they do not see, and hearing they do not hear, nor do they understand.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'And in them the prophecy of Isaiah is fulfilled, which says:'
  - type: note
    content: Is. 6:9, 10; Ezek. 12:2; Mark 4:12; Luke 8:10; John 12:40; Acts 28:26, 27; Rom. 11:8; (2 Cor. 3:14, 15)
  - type: text
    content: ‘Hearing you will hear and shall not understand,
  - type: text
    content: 'And seeing you will see and not '
  - type: note
    content: (John 3:36)
  - type: text
    content: perceive;
  '15':
  - type: text
    content: For the hearts of this people have grown dull.
  - type: text
    content: Their
  - type: text
    content: ' '
  - type: text
    content: 'ears '
  - type: note
    content: Ps. 119:70; Zech. 7:11; 2 Tim. 4:4; Heb. 5:11
  - type: text
    content: are hard of hearing,
  - type: text
    content: 'And their eyes they have '
  - type: note
    content: Luke 19:42
  - type: text
    content: closed,
  - type: text
    content: Lest they should see with
  - type: text
    content: ' '
  - type: text
    content: their
  - type: text
    content: ' '
  - type: text
    content: eyes and hear with
  - type: text
    content: ' '
  - type: text
    content: their
  - type: text
    content: ' '
  - type: text
    content: ears,
  - type: text
    content: Lest they should understand with
  - type: text
    content: ' '
  - type: text
    content: their
  - type: text
    content: ' '
  - type: text
    content: hearts and turn,
  - type: text
    content: 'So that I '
  - type: text
    content: should
  - type: text
    content: ' '
  - type: note
    content: Acts 28:26, 27
  - type: text
    content: heal them.’
  '16':
  - type: text
    content: 'But '
  - type: note
    content: (Prov. 20:12; Matt. 16:17); Luke 10:23, 24; (John 20:29)
  - type: text
    content: 'blessed '
  - type: text
    content: are
  - type: text
    content: ' your eyes for they see, and your ears for they hear;'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'for assuredly, I say to you '
  - type: note
    content: John 8:56; Heb. 11:13; 1 Pet. 1:10, 11
  - type: text
    content: 'that many prophets and righteous '
  - type: text
    content: men
  - type: text
    content: ' desired to see what you see, and did not see '
  - type: text
    content: it,
  - type: text
    content: ' and to hear what you hear, and did not hear '
  - type: text
    content: it.
  - type: heading
    content: The Parable of the Sower Explained
  '18':
  - type: note
    content: Mark 4:13–20; Luke 8:11–15
  - type: text
    content: '“Therefore hear the parable of the sower:'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'When anyone hears the word '
  - type: note
    content: Matt. 4:23
  - type: text
    content: 'of the kingdom, and does not understand '
  - type: text
    content: it,
  - type: text
    content: ' then the wicked '
  - type: text
    content: one
  - type: text
    content: ' comes and snatches away what was sown in his heart. This is he who received seed by the wayside.'
  - type: text
    content: ' '
  '2':
  - type: note
    content: Luke 8:4
  - type: text
    content: 'And great multitudes were gathered together to Him, so that '
  - type: note
    content: Luke 5:3
  - type: text
    content: He got into a boat and sat; and the whole multitude stood on the shore.
  '20':
  - type: text
    content: 'But he who received the seed on stony places, this is he who hears the word and immediately '
  - type: note
    content: Is. 58:2; Ezek. 33:31, 32; John 5:35
  - type: text
    content: receives it with joy;
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'yet he has no root in himself, but endures only for a while. For when '
  - type: note
    content: (Acts 14:22)
  - type: text
    content: 'tribulation or persecution arises because of the word, immediately '
  - type: note
    content: Matt. 11:6; 2 Tim. 1:15
  - type: text
    content: he stumbles.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Now '
  - type: note
    content: Matt. 19:23; Mark 10:23; Luke 18:24; 1 Tim. 6:9; 2 Tim. 4:10
  - type: text
    content: 'he who received seed '
  - type: note
    content: Jer. 4:3
  - type: text
    content: among the thorns is he who hears the word, and the cares of this world and the deceitfulness of riches choke the word, and he becomes unfruitful.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'But he who received seed on the good ground is he who hears the word and understands '
  - type: text
    content: it,
  - type: text
    content: ' who indeed bears '
  - type: note
    content: (John 15:5); Phil. 1:11; Col. 1:6
  - type: text
    content: 'fruit and produces: some a hundredfold, some sixty, some thirty.”'
  - type: heading
    content: The Parable of the Wheat and the Tares
  '24':
  - type: text
    content: 'Another parable He put forth to them, saying: '
  - type: text
    content: “The kingdom of heaven is like a man who sowed good seed in his field;
  - type: text
    content: ' '
  '25':
  - type: text
    content: but while men slept, his enemy came and sowed tares among the wheat and went his way.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But when the grain had sprouted and produced a crop, then the tares also appeared.
  - type: text
    content: ' '
  '27':
  - type: text
    content: So the servants of the owner came and said to him, ‘Sir, did you not sow good seed in your field? How then does it have tares?’
  - type: text
    content: ' '
  '28':
  - type: text
    content: He said to them, ‘An enemy has done this.’ The servants said to him, ‘Do you want us then to go and gather them up?’
  - type: text
    content: ' '
  '29':
  - type: text
    content: But he said, ‘No, lest while you gather up the tares you also uproot the wheat with them.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then He spoke many things to them in parables, saying: '
  - type: note
    content: Luke 8:5
  - type: text
    content: “Behold, a sower went out to sow.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Let both grow together until the harvest, and at the time of harvest I will say to the reapers, “First gather together the tares and bind them in bundles to burn them, but '
  - type: note
    content: Matt. 3:12
  - type: text
    content: gather the wheat into my barn.” ’ ”
  - type: heading
    content: The Parable of the Mustard Seed
  '31':
  - type: text
    content: 'Another parable He put forth to them, saying: '
  - type: note
    content: (Is. 2:2, 3; Mic. 4:1); Mark 4:30; Luke 13:18, 19
  - type: text
    content: “The kingdom of heaven is like a mustard seed, which a man took and sowed in his field,
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'which indeed is the least of all the seeds; but when it is grown it is greater than the herbs and becomes a '
  - type: note
    content: Ps. 104:12; Ezek. 17:22–24; 31:3–9; Dan. 4:12
  - type: text
    content: tree, so that the birds of the air come and nest in its branches.”
  - type: heading
    content: The Parable of the Leaven
  '33':
  - type: note
    content: Luke 13:20, 21
  - type: text
    content: 'Another parable He spoke to them: '
  - type: text
    content: '“The kingdom of heaven is like leaven, which a woman took and hid in three '
  - type: text
    content: measures
  - type: text
    content: ' of meal till '
  - type: note
    content: (1 Cor. 5:6; Gal. 5:9)
  - type: text
    content: it was all leavened.”
  - type: heading
    content: Prophecy and the Parables
  '34':
  - type: note
    content: Mark 4:33, 34; John 10:6; 16:25
  - type: text
    content: 'All these things Jesus spoke to the multitude in parables; and without a parable He did not speak to them, '
  '35':
  - type: text
    content: 'that it might be fulfilled which was spoken by the prophet, saying:'
  - type: note
    content: Ps. 78:2
  - type: text
    content: “I will open My mouth in parables;
  - type: note
    content: Rom. 16:25, 26; 1 Cor. 2:7; Eph. 3:9; Col. 1:26
  - type: text
    content: I will utter things kept secret from the foundation of the world.”
  - type: heading
    content: The Parable of the Tares Explained
  '36':
  - type: text
    content: Then Jesus sent the multitude away and went into the house. And His disciples came to Him, saying, “Explain to us the parable of the tares of the field.”
  '37':
  - type: text
    content: 'He answered and said to them: '
  - type: text
    content: “He who sows the good seed is the Son of Man.
  - type: text
    content: ' '
  '38':
  - type: note
    content: Matt. 24:14; 28:19; Mark 16:15; Luke 24:47; Rom. 10:18; Col. 1:6
  - type: text
    content: 'The field is the world, the good seeds are the sons of the kingdom, but the tares are '
  - type: note
    content: Gen. 3:15; John 8:44; Acts 13:10
  - type: text
    content: 'the sons of the wicked '
  - type: text
    content: one.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'The enemy who sowed them is the devil, '
  - type: note
    content: Joel 3:13; Rev. 14:15
  - type: text
    content: the harvest is the end of the age, and the reapers are the angels.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'And as he sowed, some '
  - type: text
    content: seed
  - type: text
    content: ' fell by the wayside; and the birds came and devoured them.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: Therefore as the tares are gathered and burned in the fire, so it will be at the end of this age.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'The Son of Man will send out His angels, '
  - type: note
    content: Matt. 18:7; 2 Pet. 2:1, 2
  - type: text
    content: and they will gather out of His kingdom all things that offend, and those who practice lawlessness,
  - type: text
    content: ' '
  '42':
  - type: note
    content: Matt. 3:12; Rev. 19:20; 20:10
  - type: text
    content: 'and will cast them into the furnace of fire. '
  - type: note
    content: Matt. 8:12; 13:50
  - type: text
    content: There will be wailing and gnashing of teeth.
  - type: text
    content: ' '
  '43':
  - type: note
    content: (Dan. 12:3; 1 Cor. 15:42, 43, 58)
  - type: text
    content: 'Then the righteous will shine forth as the sun in the kingdom of their Father. '
  - type: note
    content: Matt. 13:9
  - type: text
    content: He who has ears to hear, let him hear!
  - type: heading
    content: The Parable of the Hidden Treasure
  '44':
  - type: text
    content: '“Again, the kingdom of heaven is like treasure hidden in a field, which a man found and hid; and for joy over it he goes and '
  - type: note
    content: Phil. 3:7, 8
  - type: text
    content: 'sells all that he has and '
  - type: note
    content: (Is. 55:1; Rev. 3:18)
  - type: text
    content: buys that field.
  - type: heading
    content: The Parable of the Pearl of Great Price
  '45':
  - type: text
    content: “Again, the kingdom of heaven is like a merchant seeking beautiful pearls,
  - type: text
    content: ' '
  '46':
  - type: text
    content: 'who, when he had found '
  - type: note
    content: Prov. 2:4; 3:14, 15; 8:10, 19
  - type: text
    content: one pearl of great price, went and sold all that he had and bought it.
  - type: heading
    content: The Parable of the Dragnet
  '47':
  - type: text
    content: '“Again, the kingdom of heaven is like a dragnet that was cast into the sea and '
  - type: note
    content: Matt. 22:9, 10
  - type: text
    content: gathered some of every kind,
  - type: text
    content: ' '
  '48':
  - type: text
    content: which, when it was full, they drew to shore; and they sat down and gathered the good into vessels, but threw the bad away.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'So it will be at the end of the age. The angels will come forth, '
  - type: note
    content: Matt. 25:32
  - type: text
    content: separate the wicked from among the just,
  - type: text
    content: ' '
  '5':
  - type: text
    content: Some fell on stony places, where they did not have much earth; and they immediately sprang up because they had no depth of earth.
  - type: text
    content: ' '
  '50':
  - type: text
    content: and cast them into the furnace of fire. There will be wailing and gnashing of teeth.”
  '51':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “Have you understood all these things?”
  - type: text
    content: They said to Him, “Yes, Lord.”
  '52':
  - type: text
    content: 'Then He said to them, '
  - type: text
    content: '“Therefore every '
  - type: text
    content: 'scribe instructed '
  - type: text
    content: concerning
  - type: text
    content: ' the kingdom of heaven is like a householder who brings out of his treasure '
  - type: note
    content: Song 7:13
  - type: text
    content: things
  - type: text
    content: ' new and old.”'
  - type: heading
    content: Jesus Rejected at Nazareth
  '53':
  - type: text
    content: 'Now it came to pass, when Jesus had finished these parables, that He departed from there. '
  '54':
  - type: note
    content: Ps. 22:22; Matt. 2:23; Mark 6:1; Luke 4:16; John 7:15
  - type: text
    content: 'When He had come to His own country, He taught them in their synagogue, so that they were astonished and said, “Where did this '
  - type: text
    content: Man
  - type: text
    content: ' get this wisdom and '
  - type: text
    content: these
  - type: text
    content: ' mighty works? '
  '55':
  - type: note
    content: Is. 49:7; Mark 6:3; (Luke 3:23); John 6:42
  - type: text
    content: 'Is this not the carpenter’s son? Is not His mother called Mary? And '
  - type: note
    content: Matt. 12:46
  - type: text
    content: 'His brothers '
  - type: note
    content: Mark 15:40
  - type: text
    content: 'James, Joses, Simon, and Judas? '
  '56':
  - type: text
    content: 'And His sisters, are they not all with us? Where then did this '
  - type: text
    content: Man
  - type: text
    content: ' get all these things?” '
  '57':
  - type: text
    content: 'So they '
  - type: note
    content: Matt. 11:6; Mark 6:3, 4
  - type: text
    content: were offended at Him.
  - type: text
    content: 'But Jesus said to them, '
  - type: note
    content: Luke 4:24; John 4:44
  - type: text
    content: “A prophet is not without honor except in his own country and in his own house.”
  - type: text
    content: ' '
  '58':
  - type: text
    content: 'Now '
  - type: note
    content: Mark 6:5, 6; John 5:44, 46, 47
  - type: text
    content: He did not do many mighty works there because of their unbelief.
  '6':
  - type: text
    content: But when the sun was up they were scorched, and because they had no root they withered away.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And some fell among thorns, and the thorns sprang up and choked them.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But others fell on good ground and yielded a crop: some '
  - type: note
    content: Gen. 26:12; Matt. 13:23
  - type: text
    content: a hundredfold, some sixty, some thirty.
  - type: text
    content: ' '
  '9':
  - type: note
    content: Matt. 11:15; Mark 4:9; Rev. 2:7, 11, 17, 29; 3:6, 13, 22
  - type: text
    content: He who has ears to hear, let him hear!”
  - type: heading
    content: The Purpose of Parables
