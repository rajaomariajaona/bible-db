document_id: JOB.21,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job’s Discourse on the Wicked
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Job answered and said:'
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their bull breeds without failure;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Their cow calves '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:26
      marker-yv: yv-n
    - type: text
      text: without miscarriage.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They send forth their little ones like a flock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their children dance.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They sing to the tambourine and harp,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And rejoice to the sound of the flute.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 21:23; 36:11
      marker-yv: yv-n
    - type: text
      text: spend their days in wealth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And in a moment go down to the grave.
  '14':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:17
      marker-yv: yv-n
    - type: text
      text: Yet they say to God, ‘Depart from us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For we do not desire the knowledge of Your ways.
  '15':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 5:2; Job 22:17; 34:9
      marker-yv: yv-n
    - type: text
      text: 'Who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the Almighty, that we should serve Him?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 35:3; Mal. 3:14
      marker-yv: yv-n
    - type: text
      text: what profit do we have if we pray to Him?’
  '16':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Indeed their prosperity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' not in their hand;'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 22:18; Ps. 1:1; Prov. 1:10
      marker-yv: yv-n
    - type: text
      text: The counsel of the wicked is far from me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How often is the lamp of the wicked put out?
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: How
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: often
    - type: text
      text: ' does their destruction come upon them,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The sorrows '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Job 31:2, 3; Luke 12:46)
      marker-yv: yv-n
    - type: text
      text: distributes in His anger?
  '18':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 1:4; 35:5; Is. 17:13; Hos. 13:3
      marker-yv: yv-n
    - type: text
      text: They are like straw before the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And like chaff that a storm carries away.
  '19':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: They
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: say,
    - type: text
      text: ' ‘God lays up one’s iniquity '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 20:5); Jer. 31:29; Ezek. 18:2
      marker-yv: yv-n
    - type: text
      text: for his children’;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Let Him recompense him, that he may know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen carefully to my speech,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And let this be your consolation.
  '20':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let his eyes see his destruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 75:8; Is. 51:17; Jer. 25:15; Rev. 14:10; 19:15
      marker-yv: yv-n
    - type: text
      text: let him drink of the wrath of the Almighty.
  '21':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For what does he care about his household after him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When the number of his months is cut in half?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 35:11; 36:22; (Is. 40:13; 45:9; Rom. 11:34; 1 Cor. 2:16)
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anyone
    - type: text
      text: ' teach God knowledge,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Since He judges those on high?
  '23':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: One dies in his full strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Being wholly at ease and secure;
  '24':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: His pails are full of milk,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And the marrow of his bones is moist.
  '25':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Another man dies in the bitterness of his soul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Never having eaten with pleasure.
  '26':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'They '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 3:13; 20:11; Eccl. 9:2
      marker-yv: yv-n
    - type: text
      text: lie down alike in the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And worms cover them.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look, I know your thoughts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And the schemes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' you would wrong me.'
  '28':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For you say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘Where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the house of the prince?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And where '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the tent,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The dwelling place of the wicked?’
  '29':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have you not asked those who travel the road?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And do you not know their signs?
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Bear with me that I may speak,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And after I have spoken, keep '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 16:10
      marker-yv: yv-n
    - type: text
      text: mocking.
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 20:29; (Prov. 16:4; 2 Pet. 2:9)
      marker-yv: yv-n
    - type: text
      text: For the wicked are reserved for the day of doom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: They shall be brought out on the day of wrath.
  '31':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who condemns his way to his face?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And who repays him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' he has done?'
  '32':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet he shall be brought to the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And a vigil kept over the tomb.
  '33':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The clods of the valley shall be sweet to him;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. 9:27
      marker-yv: yv-n
    - type: text
      text: Everyone shall follow him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'As countless '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gone
    - type: text
      text: ' before him.'
  '34':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How then can you comfort me with empty words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Since falsehood remains in your answers?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“As for me, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' my complaint against man?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were,
    - type: text
      text: ' why should I not be impatient?'
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Look at me and be astonished;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 18:19; Job 13:5; 29:9; 40:4
      marker-yv: yv-n
    - type: text
      text: 'Put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' hand over '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your
    - type: text
      text: ' mouth.'
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Even when I remember I am terrified,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And trembling takes hold of my flesh.
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 12:6; Ps. 17:10, 14; 73:3, 12; (Jer. 12:1); Hab. 1:13, 16
      marker-yv: yv-n
    - type: text
      text: 'Why do the wicked live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' become old,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, become mighty in power?
  '8':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Their descendants are established with them in their sight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And their offspring before their eyes.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Their houses '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' safe from fear,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 73:5
      marker-yv: yv-n
    - type: text
      text: 'Neither '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' the rod of God upon them.'
