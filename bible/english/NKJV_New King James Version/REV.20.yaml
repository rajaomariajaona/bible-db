segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Satan Bound 1,000 Years
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I saw an angel coming down from heaven, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 1:18; 9:1
    marker-yv: yv-n
  - type: text
    text: 'having the key to the bottomless pit and a great chain in his hand. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He laid hold of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 24:22; 2 Pet. 2:4; Jude 6
    marker-yv: yv-n
  - type: text
    text: 'the dragon, that serpent of old, who is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' Devil and Satan, and bound him for a thousand years; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and he cast him into the bottomless pit, and shut him up, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 6:17; Matt. 27:66
    marker-yv: yv-n
  - type: text
    text: 'set a seal on him, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 12:9; 20:8, 10
    marker-yv: yv-n
  - type: text
    text: so that he should deceive the nations no more till the thousand years were finished. But after these things he must be released for a little while.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Saints Reign with Christ 1,000 Years
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And I saw '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:9; Matt. 19:28; Luke 22:30
    marker-yv: yv-n
  - type: text
    text: 'thrones, and they sat on them, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:22; (1 Cor. 6:2, 3)
    marker-yv: yv-n
  - type: text
    text: 'judgment was committed to them. Then '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saw
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 6:9
    marker-yv: yv-n
  - type: text
    text: 'the souls of those who had been beheaded for their witness to Jesus and for the word of God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 13:12
    marker-yv: yv-n
  - type: text
    text: 'who had not worshiped the beast '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 13:15
    marker-yv: yv-n
  - type: text
    text: 'or his image, and had not received '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his
  - type: text
    text: ' mark on their foreheads or on their hands. And they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: John 14:19
    marker-yv: yv-n
  - type: text
    text: 'lived and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rom. 8:17; 2 Tim. 2:12
    marker-yv: yv-n
  - type: text
    text: 'reigned with Christ for a thousand years. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But the rest of the dead did not live again until the thousand years were finished. This '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the first resurrection. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Blessed and holy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' he who has part in the first resurrection. Over such '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rev. 2:11; 20:14)
    marker-yv: yv-n
  - type: text
    text: 'the second death has no power, but they shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 61:6; 1 Pet. 2:9; Rev. 1:6
    marker-yv: yv-n
  - type: text
    text: 'priests of God and of Christ, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 20:4
    marker-yv: yv-n
  - type: text
    text: and shall reign with Him a thousand years.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Satanic Rebellion Crushed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now when the thousand years have expired, Satan will be released from his prison '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'and will go out '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 12:9; 20:3, 10
    marker-yv: yv-n
  - type: text
    text: 'to deceive the nations which are in the four corners of the earth, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ezek. 38:2; 39:1, 6
    marker-yv: yv-n
  - type: text
    text: 'Gog and Magog, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 16:14
    marker-yv: yv-n
  - type: text
    text: 'to gather them together to battle, whose number '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' as the sand of the sea. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 8:8; Ezek. 38:9, 16
    marker-yv: yv-n
  - type: text
    text: 'They went up on the breadth of the earth and surrounded the camp of the saints and the beloved city. And fire came down from God out of heaven and devoured them. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The devil, who deceived them, was cast into the lake of fire and brimstone '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 19:20; 20:14, 15
    marker-yv: yv-n
  - type: text
    text: 'where the beast and the false prophet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are.
  - type: text
    text: ' And they '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 14:10
    marker-yv: yv-n
  - type: text
    text: will be tormented day and night forever and ever.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Great White Throne Judgment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then I saw a great white throne and Him who sat on it, from whose face '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Pet. 3:7; Rev. 21:1
    marker-yv: yv-n
  - type: text
    text: 'the earth and the heaven fled away. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 2:35; Rev. 12:8
    marker-yv: yv-n
  - type: text
    text: 'And there was found no place for them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And I saw the dead, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 19:5
    marker-yv: yv-n
  - type: text
    text: 'small and great, standing before God, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dan. 7:10
    marker-yv: yv-n
  - type: text
    text: 'and books were opened. And another '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 69:28; Dan. 12:1; Phil. 4:3; Rev. 3:5
    marker-yv: yv-n
  - type: text
    text: 'book was opened, which is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Book
  - type: text
    text: ' of Life. And the dead were judged '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 17:10; Matt. 16:27; Rom. 2:6; Rev. 2:23; 20:12
    marker-yv: yv-n
  - type: text
    text: 'according to their works, by the things which were written in the books. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sea gave up the dead who were in it, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:26; Rev. 1:18; 6:8; 21:4
    marker-yv: yv-n
  - type: text
    text: 'and Death and Hades delivered up the dead who were in them. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 16:27; Rev. 2:23; 20:12
    marker-yv: yv-n
  - type: text
    text: 'And they were judged, each one according to his works. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Cor. 15:26; Rev. 1:18; 6:8; 21:4
    marker-yv: yv-n
  - type: text
    text: 'Death and Hades were cast into the lake of fire. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 21:8
    marker-yv: yv-n
  - type: text
    text: 'This is the second death. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And anyone not found written in the Book of Life '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rev. 19:20
    marker-yv: yv-n
  - type: text
    text: was cast into the lake of fire.
