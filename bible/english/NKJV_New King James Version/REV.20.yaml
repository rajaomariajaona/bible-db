document_id: REV.20,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Satan Bound 1,000 Years
  - type: text
    content: 'Then I saw an angel coming down from heaven, '
  - type: note
    content: Rev. 1:18; 9:1
  - type: text
    content: 'having the key to the bottomless pit and a great chain in his hand. '
  '10':
  - type: text
    content: 'The devil, who deceived them, was cast into the lake of fire and brimstone '
  - type: note
    content: Rev. 19:20; 20:14, 15
  - type: text
    content: 'where the beast and the false prophet '
  - type: text
    content: are.
  - type: text
    content: ' And they '
  - type: note
    content: Rev. 14:10
  - type: text
    content: will be tormented day and night forever and ever.
  - type: heading
    content: The Great White Throne Judgment
  '11':
  - type: text
    content: 'Then I saw a great white throne and Him who sat on it, from whose face '
  - type: note
    content: 2 Pet. 3:7; Rev. 21:1
  - type: text
    content: 'the earth and the heaven fled away. '
  - type: note
    content: Dan. 2:35; Rev. 12:8
  - type: text
    content: 'And there was found no place for them. '
  '12':
  - type: text
    content: 'And I saw the dead, '
  - type: note
    content: Rev. 19:5
  - type: text
    content: 'small and great, standing before God, '
  - type: note
    content: Dan. 7:10
  - type: text
    content: 'and books were opened. And another '
  - type: note
    content: Ps. 69:28; Dan. 12:1; Phil. 4:3; Rev. 3:5
  - type: text
    content: 'book was opened, which is '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: Book
  - type: text
    content: ' of Life. And the dead were judged '
  - type: note
    content: Jer. 17:10; Matt. 16:27; Rom. 2:6; Rev. 2:23; 20:12
  - type: text
    content: 'according to their works, by the things which were written in the books. '
  '13':
  - type: text
    content: 'The sea gave up the dead who were in it, '
  - type: note
    content: 1 Cor. 15:26; Rev. 1:18; 6:8; 21:4
  - type: text
    content: 'and Death and Hades delivered up the dead who were in them. '
  - type: note
    content: Matt. 16:27; Rev. 2:23; 20:12
  - type: text
    content: 'And they were judged, each one according to his works. '
  '14':
  - type: text
    content: 'Then '
  - type: note
    content: 1 Cor. 15:26; Rev. 1:18; 6:8; 21:4
  - type: text
    content: 'Death and Hades were cast into the lake of fire. '
  - type: note
    content: Rev. 21:8
  - type: text
    content: 'This is the second death. '
  '15':
  - type: text
    content: 'And anyone not found written in the Book of Life '
  - type: note
    content: Rev. 19:20
  - type: text
    content: was cast into the lake of fire.
  '2':
  - type: text
    content: 'He laid hold of '
  - type: note
    content: Is. 24:22; 2 Pet. 2:4; Jude 6
  - type: text
    content: 'the dragon, that serpent of old, who is '
  - type: text
    content: the
  - type: text
    content: ' Devil and Satan, and bound him for a thousand years; '
  '3':
  - type: text
    content: 'and he cast him into the bottomless pit, and shut him up, and '
  - type: note
    content: Dan. 6:17; Matt. 27:66
  - type: text
    content: 'set a seal on him, '
  - type: note
    content: Rev. 12:9; 20:8, 10
  - type: text
    content: so that he should deceive the nations no more till the thousand years were finished. But after these things he must be released for a little while.
  - type: heading
    content: The Saints Reign with Christ 1,000 Years
  '4':
  - type: text
    content: 'And I saw '
  - type: note
    content: Dan. 7:9; Matt. 19:28; Luke 22:30
  - type: text
    content: 'thrones, and they sat on them, and '
  - type: note
    content: Dan. 7:22; (1 Cor. 6:2, 3)
  - type: text
    content: 'judgment was committed to them. Then '
  - type: text
    content: I
  - type: text
    content: ' '
  - type: text
    content: saw
  - type: text
    content: ' '
  - type: note
    content: Rev. 6:9
  - type: text
    content: 'the souls of those who had been beheaded for their witness to Jesus and for the word of God, '
  - type: note
    content: Rev. 13:12
  - type: text
    content: 'who had not worshiped the beast '
  - type: note
    content: Rev. 13:15
  - type: text
    content: 'or his image, and had not received '
  - type: text
    content: his
  - type: text
    content: ' mark on their foreheads or on their hands. And they '
  - type: note
    content: John 14:19
  - type: text
    content: 'lived and '
  - type: note
    content: Rom. 8:17; 2 Tim. 2:12
  - type: text
    content: 'reigned with Christ for a thousand years. '
  '5':
  - type: text
    content: 'But the rest of the dead did not live again until the thousand years were finished. This '
  - type: text
    content: is
  - type: text
    content: ' the first resurrection. '
  '6':
  - type: text
    content: 'Blessed and holy '
  - type: text
    content: is
  - type: text
    content: ' he who has part in the first resurrection. Over such '
  - type: note
    content: (Rev. 2:11; 20:14)
  - type: text
    content: 'the second death has no power, but they shall be '
  - type: note
    content: Is. 61:6; 1 Pet. 2:9; Rev. 1:6
  - type: text
    content: 'priests of God and of Christ, '
  - type: note
    content: Rev. 20:4
  - type: text
    content: and shall reign with Him a thousand years.
  - type: heading
    content: Satanic Rebellion Crushed
  '7':
  - type: text
    content: 'Now when the thousand years have expired, Satan will be released from his prison '
  '8':
  - type: text
    content: 'and will go out '
  - type: note
    content: Rev. 12:9; 20:3, 10
  - type: text
    content: 'to deceive the nations which are in the four corners of the earth, '
  - type: note
    content: Ezek. 38:2; 39:1, 6
  - type: text
    content: 'Gog and Magog, '
  - type: note
    content: Rev. 16:14
  - type: text
    content: 'to gather them together to battle, whose number '
  - type: text
    content: is
  - type: text
    content: ' as the sand of the sea. '
  '9':
  - type: note
    content: Is. 8:8; Ezek. 38:9, 16
  - type: text
    content: 'They went up on the breadth of the earth and surrounded the camp of the saints and the beloved city. And fire came down from God out of heaven and devoured them. '
