verses:
  '1':
  - type: heading
    content: The Parable of the Lost Sheep
  - type: text
    content: 'Then '
  - type: note
    content: (Matt. 9:10–13)
  - type: text
    content: 'all the tax collectors and the sinners drew near to Him to hear Him. '
  '10':
  - type: text
    content: Likewise, I say to you, there is joy in the presence of the angels of God over one sinner who repents.”
  - type: heading
    content: The Parable of the Lost Son
  '11':
  - type: text
    content: 'Then He said: '
  - type: text
    content: “A certain man had two sons.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'And the younger of them said to '
  - type: text
    content: his
  - type: text
    content: ' father, ‘Father, give me the portion of goods that falls '
  - type: text
    content: to me.
  - type: text
    content: '’ So he divided to them '
  - type: note
    content: Mark 12:44
  - type: text
    content: his
  - type: text
    content: ' livelihood.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'And not many days after, the younger son gathered all together, journeyed to a far country, and there wasted his possessions with '
  - type: text
    content: prodigal living.
  - type: text
    content: ' '
  '14':
  - type: text
    content: But when he had spent all, there arose a severe famine in that land, and he began to be in want.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Then he went and joined himself to a citizen of that country, and he sent him into his fields to feed swine.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'And he would gladly have filled his stomach with the '
  - type: text
    content: 'pods that the swine ate, and no one gave him '
  - type: text
    content: anything.
  '17':
  - type: text
    content: “But when he came to himself, he said, ‘How many of my father’s hired servants have bread enough and to spare, and I perish with hunger!
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'I will arise and go to my father, and will say to him, “Father, '
  - type: note
    content: Ex. 9:27; 10:16; Num. 22:34; Josh. 7:20; 1 Sam. 15:24, 30; 26:21; 2 Sam. 12:13; 24:10, 17; Ps. 51:4; Matt. 27:4
  - type: text
    content: I have sinned against heaven and before you,
  - type: text
    content: ' '
  '19':
  - type: text
    content: and I am no longer worthy to be called your son. Make me like one of your hired servants.” ’
  '2':
  - type: text
    content: 'And the Pharisees and scribes complained, saying, “This Man receives sinners '
  - type: note
    content: Acts 11:3; Gal. 2:12
  - type: text
    content: 'and eats with them.” '
  '20':
  - type: text
    content: '“And he arose and came to his father. But '
  - type: note
    content: (Jer. 3:12); Matt. 9:36; (Acts 2:39; Eph. 2:13, 17)
  - type: text
    content: when he was still a great way off, his father saw him and had compassion, and ran and fell on his neck and kissed him.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'And the son said to him, ‘Father, I have sinned against heaven '
  - type: note
    content: Ps. 51:4
  - type: text
    content: and in your sight, and am no longer worthy to be called your son.’
  '22':
  - type: text
    content: '“But the father said to his servants, '
  - type: text
    content: ‘Bring
  - type: text
    content: ' out the best robe and put '
  - type: text
    content: it
  - type: text
    content: ' on him, and put a ring on his hand and sandals on '
  - type: text
    content: his
  - type: text
    content: ' feet.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'And bring the fatted calf here and kill '
  - type: text
    content: it,
  - type: text
    content: ' and let us eat and be merry;'
  - type: text
    content: ' '
  '24':
  - type: note
    content: Matt. 8:22; Luke 9:60; 15:32; Rom. 11:15; (Eph. 2:1, 5; 5:14; Col. 2:13; 1 Tim. 5:6)
  - type: text
    content: for this my son was dead and is alive again; he was lost and is found.’ And they began to be merry.
  '25':
  - type: text
    content: “Now his older son was in the field. And as he came and drew near to the house, he heard music and dancing.
  - type: text
    content: ' '
  '26':
  - type: text
    content: So he called one of the servants and asked what these things meant.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And he said to him, ‘Your brother has come, and because he has received him safe and sound, your father has killed the fatted calf.’
  '28':
  - type: text
    content: “But he was angry and would not go in. Therefore his father came out and pleaded with him.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'So he answered and said to '
  - type: text
    content: his
  - type: text
    content: ' father, ‘Lo, these many years I have been serving you; I never transgressed your commandment at any time; and yet you never gave me a young goat, that I might make merry with my friends.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'So He spoke this parable to them, saying:'
  '30':
  - type: text
    content: But as soon as this son of yours came, who has devoured your livelihood with harlots, you killed the fatted calf for him.’
  '31':
  - type: text
    content: “And he said to him, ‘Son, you are always with me, and all that I have is yours.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'It was right that we should make merry and be glad, '
  - type: note
    content: Luke 15:24
  - type: text
    content: for your brother was dead and is alive again, and was lost and is found.’ ”
  '4':
  - type: note
    content: Matt. 18:12–14; 1 Pet. 2:25
  - type: text
    content: “What man of you, having a hundred sheep, if he loses one of them, does not leave the ninety-nine in the wilderness, and go after the one which is lost until he finds it?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'And when he has found '
  - type: text
    content: it,
  - type: text
    content: ' he lays '
  - type: text
    content: it
  - type: text
    content: ' on his shoulders, rejoicing.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'And when he comes home, he calls together '
  - type: text
    content: his
  - type: text
    content: ' friends and neighbors, saying to them, '
  - type: note
    content: (Rom. 12:15)
  - type: text
    content: '‘Rejoice with me, for I have found my sheep '
  - type: note
    content: (Luke 19:10; 1 Pet. 2:10, 25)
  - type: text
    content: which was lost!’
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'I say to you that likewise there will be more joy in heaven over one sinner who repents '
  - type: note
    content: (Luke 5:32)
  - type: text
    content: 'than over ninety-nine '
  - type: text
    content: 'just persons who '
  - type: note
    content: (Mark 2:17)
  - type: text
    content: need no repentance.
  - type: heading
    content: The Parable of the Lost Coin
  '8':
  - type: text
    content: '“Or what woman, having ten silver '
  - type: text
    content: coins,
  - type: text
    content: ' if she loses one coin, does not light a lamp, sweep the house, and search carefully until she finds '
  - type: text
    content: it?
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'And when she has found '
  - type: text
    content: it,
  - type: text
    content: ' she calls '
  - type: text
    content: her
  - type: text
    content: ' friends and neighbors together, saying, ‘Rejoice with me, for I have found the piece which I lost!’'
  - type: text
    content: ' '
