  '1':
  - type: heading
    content: Prayer that the Lord Will Restore Favor to the Land
  - type: text
    content: 'To the Chief Musician. A Psalm '
  - type: note
    content: Ps. 42:title
  - type: text
    content: of the sons of Korah.
  - type: heading
    content: Lord
  - type: text
    content: ', You have been favorable to Your land;'
  - type: text
    content: 'You have '
  - type: note
    content: Ezra 1:11—2:1; Ps. 14:7; Jer. 30:18; 31:23; Ezek. 39:25; Hos. 6:11; Joel 3:1
  - type: text
    content: brought back the captivity of Jacob.
  '10':
  - type: text
    content: Mercy and truth have met together;
  - type: note
    content: Ps. 72:3; (Is. 32:17); Luke 2:14
  - type: text
    content: Righteousness and peace have kissed.
  '11':
  - type: text
    content: Truth shall spring out of the earth,
  - type: text
    content: And righteousness shall look down from heaven.
  '12':
  - type: note
    content: (Ps. 84:11; James 1:17)
  - type: text
    content: 'Yes, the '
  - type: heading
    content: Lord
  - type: text
    content: ' will give '
  - type: text
    content: what
  - type: text
    content: ' '
  - type: text
    content: is
  - type: text
    content: ' good;'
  - type: text
    content: And our land will yield its increase.
  '13':
  - type: text
    content: Righteousness will go before Him,
  - type: text
    content: 'And shall make His footsteps '
  - type: text
    content: our
  - type: text
    content: ' pathway.'
  '2':
  - type: text
    content: You have forgiven the iniquity of Your people;
  - type: text
    content: You have covered all their sin.
  - type: text
    content: Selah
  '3':
  - type: text
    content: You have taken away all Your wrath;
  - type: text
    content: You have turned from the fierceness of Your anger.
  '4':
  - type: note
    content: Ps. 80:3, 7
  - type: text
    content: Restore us, O God of our salvation,
  - type: text
    content: And cause Your anger toward us to cease.
  '5':
  - type: note
    content: Ps. 79:5
  - type: text
    content: Will You be angry with us forever?
  - type: text
    content: Will You prolong Your anger to all generations?
  '6':
  - type: text
    content: 'Will You not '
  - type: note
    content: Hab. 3:2
  - type: text
    content: revive us again,
  - type: text
    content: That Your people may rejoice in You?
  '7':
  - type: text
    content: 'Show us Your mercy, '
  - type: heading
    content: Lord
  - type: text
    content: ','
  - type: text
    content: And grant us Your salvation.
  '8':
  - type: text
    content: 'I will hear what God the '
  - type: heading
    content: Lord
  - type: text
    content: ' will speak,'
  - type: text
    content: For He will speak peace
  - type: text
    content: To His people and to His saints;
  - type: text
    content: But let them not turn back to folly.
  '9':
  - type: text
    content: 'Surely '
  - type: note
    content: Is. 46:13
  - type: text
    content: 'His salvation '
  - type: text
    content: is
  - type: text
    content: ' near to those who fear Him,'
  - type: note
    content: Hag. 2:7; Zech. 2:5; (John 1:14)
  - type: text
    content: That glory may dwell in our land.
