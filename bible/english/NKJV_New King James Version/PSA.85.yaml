document_id: PSA.85,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Prayer that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Will Restore Favor to the Land'
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'To the Chief Musician. A Psalm '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 42:title
      marker-yv: yv-n
    - type: text
      text: of the sons of Korah.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', You have been favorable to Your land;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You have '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezra 1:11—2:1; Ps. 14:7; Jer. 30:18; 31:23; Ezek. 39:25; Hos. 6:11; Joel 3:1
      marker-yv: yv-n
    - type: text
      text: brought back the captivity of Jacob.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mercy and truth have met together;
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 72:3; (Is. 32:17); Luke 2:14
      marker-yv: yv-n
    - type: text
      text: Righteousness and peace have kissed.
  '11':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Truth shall spring out of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And righteousness shall look down from heaven.
  '12':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ps. 84:11; James 1:17)
      marker-yv: yv-n
    - type: text
      text: 'Yes, the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: what
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And our land will yield its increase.
  '13':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Righteousness will go before Him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'And shall make His footsteps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our
    - type: text
      text: ' pathway.'
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You have forgiven the iniquity of Your people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have covered all their sin.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Selah
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You have taken away all Your wrath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You have turned from the fierceness of Your anger.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 80:3, 7
      marker-yv: yv-n
    - type: text
      text: Restore us, O God of our salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And cause Your anger toward us to cease.
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 79:5
      marker-yv: yv-n
    - type: text
      text: Will You be angry with us forever?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will You prolong Your anger to all generations?
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Will You not '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hab. 3:2
      marker-yv: yv-n
    - type: text
      text: revive us again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That Your people may rejoice in You?
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Show us Your mercy, '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And grant us Your salvation.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I will hear what God the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will speak,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For He will speak peace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: To His people and to His saints;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But let them not turn back to folly.
  '9':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Surely '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 46:13
      marker-yv: yv-n
    - type: text
      text: 'His salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' near to those who fear Him,'
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Hag. 2:7; Zech. 2:5; (John 1:14)
      marker-yv: yv-n
    - type: text
      text: That glory may dwell in our land.
