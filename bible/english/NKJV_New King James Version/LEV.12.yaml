document_id: LEV.12,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ritual After Childbirth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses, saying, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Speak to the children of Israel, saying: ‘If a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 15:19; (Job 14:4; Ps. 51:5)
      marker-yv: yv-n
    - type: text
      text: 'woman has conceived, and borne a male child, then '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:30; Lev. 8:33; 13:4; Luke 2:22
      marker-yv: yv-n
    - type: text
      text: 'she shall be unclean seven days; '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 18:19
      marker-yv: yv-n
    - type: text
      text: 'as in the days of her customary impurity she shall be unclean. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 17:12; Luke 1:59; 2:21; John 7:22, 23; Gal. 5:3
      marker-yv: yv-n
    - type: text
      text: 'eighth day the flesh of his foreskin shall be circumcised. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She shall then continue in the blood of her purification thirty-three days. She shall not touch any hallowed thing, nor come into the sanctuary until the days of her purification are fulfilled.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘But if she bears a female child, then she shall be unclean two weeks, as in her customary impurity, and she shall continue in the blood of her purification sixty-six days.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Luke 2:22
      marker-yv: yv-n
    - type: text
      text: '‘When the days of her purification are fulfilled, whether for a son or a daughter, she shall bring to the priest a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (John 1:29; 1 Pet. 1:18, 19)
      marker-yv: yv-n
    - type: text
      text: 'lamb of the first year as a burnt offering, and a young pigeon or a turtledove as a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:7
      marker-yv: yv-n
    - type: text
      text: 'sin offering, to the door of the tabernacle of meeting. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he shall offer it before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and make atonement for her. And she shall be clean from the flow of her blood. This is the law for her who has borne a male or a female.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:7; Luke 2:22–24
      marker-yv: yv-n
    - type: text
      text: '‘And if she is not able to bring a lamb, then she may bring two turtledoves or two young pigeons—one as a burnt offering and the other as a sin offering. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 4:26
      marker-yv: yv-n
    - type: text
      text: So the priest shall make atonement for her, and she will be clean.’ ”
