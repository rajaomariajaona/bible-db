document_id: LEV.12,114
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ritual After Childbirth
  - type: text
    content: 'Then the '
  - type: heading
    content: Lord
  - type: text
    content: ' spoke to Moses, saying, '
  '2':
  - type: text
    content: '“Speak to the children of Israel, saying: ‘If a '
  - type: note
    content: Lev. 15:19; (Job 14:4; Ps. 51:5)
  - type: text
    content: 'woman has conceived, and borne a male child, then '
  - type: note
    content: Ex. 22:30; Lev. 8:33; 13:4; Luke 2:22
  - type: text
    content: 'she shall be unclean seven days; '
  - type: note
    content: Lev. 18:19
  - type: text
    content: 'as in the days of her customary impurity she shall be unclean. '
  '3':
  - type: text
    content: 'And on the '
  - type: note
    content: Gen. 17:12; Luke 1:59; 2:21; John 7:22, 23; Gal. 5:3
  - type: text
    content: 'eighth day the flesh of his foreskin shall be circumcised. '
  '4':
  - type: text
    content: She shall then continue in the blood of her purification thirty-three days. She shall not touch any hallowed thing, nor come into the sanctuary until the days of her purification are fulfilled.
  '5':
  - type: text
    content: ‘But if she bears a female child, then she shall be unclean two weeks, as in her customary impurity, and she shall continue in the blood of her purification sixty-six days.
  '6':
  - type: note
    content: Luke 2:22
  - type: text
    content: '‘When the days of her purification are fulfilled, whether for a son or a daughter, she shall bring to the priest a '
  - type: note
    content: (John 1:29; 1 Pet. 1:18, 19)
  - type: text
    content: 'lamb of the first year as a burnt offering, and a young pigeon or a turtledove as a '
  - type: note
    content: Lev. 5:7
  - type: text
    content: 'sin offering, to the door of the tabernacle of meeting. '
  '7':
  - type: text
    content: 'Then he shall offer it before the '
  - type: heading
    content: Lord
  - type: text
    content: ', and make atonement for her. And she shall be clean from the flow of her blood. This is the law for her who has borne a male or a female.'
  '8':
  - type: note
    content: Lev. 5:7; Luke 2:22–24
  - type: text
    content: '‘And if she is not able to bring a lamb, then she may bring two turtledoves or two young pigeons—one as a burnt offering and the other as a sin offering. '
  - type: note
    content: Lev. 4:26
  - type: text
    content: So the priest shall make atonement for her, and she will be clean.’ ”
