  - type: text
    content: ': '
  - type: note
    content: Ezek. 24:17, 22, 23
  - type: text
    content: '“Do not enter the house of mourning, nor go to lament or bemoan them; for I have taken away My peace from this people,” says the '
  - type: heading
    content: Lord
  - type: text
    content: ', “lovingkindness and mercies. '
  '6':
