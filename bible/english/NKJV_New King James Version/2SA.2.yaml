verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Anointed King of Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It happened after this that David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 1:19, 25
      marker-yv: yv-n
    - type: text
      text: 'inquired of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', saying, “Shall I go up to any of the cities of Judah?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Go up.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: David said, “Where shall I go up?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And He said, “To '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:1; 1 Sam. 23:2, 4, 9; 30:7, 8
      marker-yv: yv-n
    - type: text
      text: Hebron.”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ishbosheth, Saul’s son, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' forty years old when he began to reign over Israel, and he reigned two years. Only the house of Judah followed David. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 29:1
      marker-yv: yv-n
    - type: text
      text: the time that David was king in Hebron over the house of Judah was seven years and six months.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel and Judah at War
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Abner the son of Ner, and the servants of Ishbosheth the son of Saul, went out from Mahanaim to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 5:5; 1 Kin. 2:11
      marker-yv: yv-n
    - type: text
      text: 'Gibeon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:2–12; 18:25
      marker-yv: yv-n
    - type: text
      text: 'Joab the son of Zeruiah, and the servants of David, went out and met them by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 26:6; 2 Sam. 8:16; 1 Chr. 2:16; 11:6
      marker-yv: yv-n
    - type: text
      text: 'the pool of Gibeon. So they sat down, one on one side of the pool and the other on the other side of the pool. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Abner said to Joab, “Let the young men now arise and compete before us.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Joab said, “Let them arise.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they arose and went over by number, twelve from Benjamin, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: followers
    - type: text
      text: ' of Ishbosheth the son of Saul, and twelve from the servants of David. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And each one grasped his opponent by the head and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thrust
    - type: text
      text: ' his sword in his opponent’s side; so they fell down together. Therefore that place was called the Field of Sharp Swords, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' in Gibeon. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So there was a very fierce battle that day, and Abner and the men of Israel were beaten before the servants of David.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jer. 41:12
      marker-yv: yv-n
    - type: text
      text: 'three sons of Zeruiah were there: Joab and Abishai and Asahel. And Asahel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 2:16
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' fleet of foot '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 12:8; Hab. 3:19
      marker-yv: yv-n
    - type: text
      text: 'as a wild gazelle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Asahel pursued Abner, and in going he did not turn to the right hand or to the left from following Abner.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David went up there, and his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 30:31; 2 Sam. 2:11; 5:1–3; 1 Kin. 2:11
      marker-yv: yv-n
    - type: text
      text: 'two wives also, Ahinoam the Jezreelitess, and Abigail the widow of Nabal the Carmelite. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Abner looked behind him and said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Are
    - type: text
      text: ' you Asahel?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered, “I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: am.
    - type: text
      text: ”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abner said to him, “Turn aside to your right hand or to your left, and lay hold on one of the young men and take his armor for yourself.” But Asahel would not turn aside from following him. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abner said again to Asahel, “Turn aside from following me. Why should I strike you to the ground? How then could I face your brother Joab?” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, he refused to turn aside. Therefore Abner struck him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 18:33
      marker-yv: yv-n
    - type: text
      text: 'in the stomach with the blunt end of the spear, so that the spear came out of his back; and he fell down there and died on the spot. So it was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' as many as came to the place where Asahel fell down and died, stood '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 3:27; 4:6; 20:10
      marker-yv: yv-n
    - type: text
      text: still.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joab and Abishai also pursued Abner. And the sun was going down when they came to the hill of Ammah, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' before Giah by the road to the Wilderness of Gibeon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the children of Benjamin gathered together behind Abner and became a unit, and took their stand on top of a hill. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Abner called to Joab and said, “Shall the sword devour forever? Do you not know that it will be bitter in the latter end? How long will it be then until you tell the people to return from pursuing their brethren?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Joab said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: As
    - type: text
      text: ' God lives, unless '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 20:12
      marker-yv: yv-n
    - type: text
      text: 'you had spoken, surely then by morning all the people would have given up pursuing their brethren.” '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joab blew a trumpet; and all the people stood still and did not pursue Israel anymore, nor did they fight anymore. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Abner and his men went on all that night through the plain, crossed over the Jordan, and went through all Bithron; and they came to Mahanaim.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David brought up '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 25:42, 43; 30:5
      marker-yv: yv-n
    - type: text
      text: 'the men who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' with him, every man with his household. So they dwelt in the cities of Hebron.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joab returned from pursuing Abner. And when he had gathered all the people together, there were missing of David’s servants nineteen men and Asahel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the servants of David had struck down, of Benjamin and Abner’s men, three hundred and sixty men who died. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they took up Asahel and buried him in his father’s tomb, which '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 2:14
      marker-yv: yv-n
    - type: text
      text: Bethlehem. And Joab and his men went all night, and they came to Hebron at daybreak.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 27:2, 3; 30:1; 1 Chr. 12:1
      marker-yv: yv-n
    - type: text
      text: 'Then the men of Judah came, and there they '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 30:26; 2 Sam. 2:11; 5:5; 19:14, 41–43
      marker-yv: yv-n
    - type: text
      text: 'anointed David king over the house of Judah. And they told David, saying, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 16:13; 2 Sam. 5:3
      marker-yv: yv-n
    - type: text
      text: '“The men of Jabesh Gilead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ones
    - type: text
      text: ' who buried Saul.” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David sent messengers to the men of Jabesh Gilead, and said to them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 31:11–13
      marker-yv: yv-n
    - type: text
      text: '“You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' blessed of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for you have shown this kindness to your lord, to Saul, and have buried him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ruth 2:20; 3:10
      marker-yv: yv-n
    - type: text
      text: 'the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' show kindness and truth to you. I also will repay you this kindness, because you have done this thing. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now therefore, let your hands be strengthened, and be valiant; for your master Saul is dead, and also the house of Judah has anointed me king over them.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ishbosheth Made King of Israel
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:6; 2 Tim. 1:16, 18
      marker-yv: yv-n
    - type: text
      text: 'Abner the son of Ner, commander of Saul’s army, took Ishbosheth the son of Saul and brought him over to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 14:50; 2 Sam. 3:6
      marker-yv: yv-n
    - type: text
      text: 'Mahanaim; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and he made him king over '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 32:2; Josh. 21:38; 2 Sam. 17:24
      marker-yv: yv-n
    - type: text
      text: 'Gilead, over the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 22:9
      marker-yv: yv-n
    - type: text
      text: 'Ashurites, over '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Judg. 1:32
      marker-yv: yv-n
    - type: text
      text: 'Jezreel, over Ephraim, over Benjamin, and over all Israel. '
