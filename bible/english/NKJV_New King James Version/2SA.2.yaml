    content: David Anointed King of Judah
  - type: text
    content: 'It happened after this that David '
  - type: note
    content: 2 Sam. 1:19, 25
  - type: text
    content: 'inquired of the '
  - type: heading
    content: Lord
  - type: text
    content: ', saying, “Shall I go up to any of the cities of Judah?”'
  - type: text
    content: 'And the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to him, “Go up.”'
  - type: text
    content: David said, “Where shall I go up?”
  - type: text
    content: 'And He said, “To '
  - type: note
    content: Judg. 1:1; 1 Sam. 23:2, 4, 9; 30:7, 8
  - type: text
    content: Hebron.”
  '10':
  - type: text
    content: 'Ishbosheth, Saul’s son, '
  - type: text
    content: was
  - type: text
    content: ' forty years old when he began to reign over Israel, and he reigned two years. Only the house of Judah followed David. '
  '11':
  - type: text
    content: 'And '
  - type: note
    content: 1 Sam. 29:1
  - type: text
    content: the time that David was king in Hebron over the house of Judah was seven years and six months.
  - type: heading
    content: Israel and Judah at War
  '12':
  - type: text
    content: 'Now Abner the son of Ner, and the servants of Ishbosheth the son of Saul, went out from Mahanaim to '
  - type: note
    content: 2 Sam. 5:5; 1 Kin. 2:11
  - type: text
    content: 'Gibeon. '
  '13':
  - type: text
    content: 'And '
  - type: note
    content: Josh. 10:2–12; 18:25
  - type: text
    content: 'Joab the son of Zeruiah, and the servants of David, went out and met them by '
  - type: note
    content: 1 Sam. 26:6; 2 Sam. 8:16; 1 Chr. 2:16; 11:6
  - type: text
    content: 'the pool of Gibeon. So they sat down, one on one side of the pool and the other on the other side of the pool. '
  '14':
  - type: text
    content: Then Abner said to Joab, “Let the young men now arise and compete before us.”
  - type: text
    content: And Joab said, “Let them arise.”
  '15':
  - type: text
    content: 'So they arose and went over by number, twelve from Benjamin, '
  - type: text
    content: followers
  - type: text
    content: ' of Ishbosheth the son of Saul, and twelve from the servants of David. '
  '16':
  - type: text
    content: 'And each one grasped his opponent by the head and '
  - type: text
    content: thrust
  - type: text
    content: ' his sword in his opponent’s side; so they fell down together. Therefore that place was called the Field of Sharp Swords, which '
  - type: text
    content: is
  - type: text
    content: ' in Gibeon. '
  '17':
  - type: text
    content: So there was a very fierce battle that day, and Abner and the men of Israel were beaten before the servants of David.
  '18':
  - type: text
    content: 'Now the '
  - type: note
    content: Jer. 41:12
  - type: text
    content: 'three sons of Zeruiah were there: Joab and Abishai and Asahel. And Asahel '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: note
    content: 1 Chr. 2:16
  - type: text
    content: as
  - type: text
    content: ' fleet of foot '
  - type: note
    content: 1 Chr. 12:8; Hab. 3:19
  - type: text
    content: 'as a wild gazelle. '
  '19':
  - type: text
    content: So Asahel pursued Abner, and in going he did not turn to the right hand or to the left from following Abner.
  '2':
  - type: text
    content: 'So David went up there, and his '
  - type: note
    content: 1 Sam. 30:31; 2 Sam. 2:11; 5:1–3; 1 Kin. 2:11
  - type: text
    content: 'two wives also, Ahinoam the Jezreelitess, and Abigail the widow of Nabal the Carmelite. '
  '20':
  - type: text
    content: Then Abner looked behind him and said, “
  - type: text
    content: Are
  - type: text
    content: ' you Asahel?”'
  - type: text
    content: 'He answered, “I '
  - type: text
    content: am.
  - type: text
    content: ”
  '21':
  - type: text
    content: 'And Abner said to him, “Turn aside to your right hand or to your left, and lay hold on one of the young men and take his armor for yourself.” But Asahel would not turn aside from following him. '
  '22':
  - type: text
    content: 'So Abner said again to Asahel, “Turn aside from following me. Why should I strike you to the ground? How then could I face your brother Joab?” '
  '23':
  - type: text
    content: 'However, he refused to turn aside. Therefore Abner struck him '
  - type: note
    content: Ps. 18:33
  - type: text
    content: 'in the stomach with the blunt end of the spear, so that the spear came out of his back; and he fell down there and died on the spot. So it was '
  - type: text
    content: that
  - type: text
    content: ' as many as came to the place where Asahel fell down and died, stood '
  - type: note
    content: 2 Sam. 3:27; 4:6; 20:10
  - type: text
    content: still.
  '24':
  - type: text
    content: 'Joab and Abishai also pursued Abner. And the sun was going down when they came to the hill of Ammah, which '
  - type: text
    content: is
  - type: text
    content: ' before Giah by the road to the Wilderness of Gibeon. '
  '25':
  - type: text
    content: 'Now the children of Benjamin gathered together behind Abner and became a unit, and took their stand on top of a hill. '
  '26':
  - type: text
    content: Then Abner called to Joab and said, “Shall the sword devour forever? Do you not know that it will be bitter in the latter end? How long will it be then until you tell the people to return from pursuing their brethren?”
  '27':
  - type: text
    content: And Joab said, “
  - type: text
    content: As
  - type: text
    content: ' God lives, unless '
  - type: note
    content: 2 Sam. 20:12
  - type: text
    content: 'you had spoken, surely then by morning all the people would have given up pursuing their brethren.” '
  '28':
  - type: text
    content: 'So Joab blew a trumpet; and all the people stood still and did not pursue Israel anymore, nor did they fight anymore. '
  '29':
  - type: text
    content: Then Abner and his men went on all that night through the plain, crossed over the Jordan, and went through all Bithron; and they came to Mahanaim.
  '3':
  - type: text
    content: 'And David brought up '
  - type: note
    content: 1 Sam. 25:42, 43; 30:5
  - type: text
    content: 'the men who '
  - type: text
    content: were
  - type: text
    content: ' with him, every man with his household. So they dwelt in the cities of Hebron.'
  '30':
  - type: text
    content: 'So Joab returned from pursuing Abner. And when he had gathered all the people together, there were missing of David’s servants nineteen men and Asahel. '
  '31':
  - type: text
    content: 'But the servants of David had struck down, of Benjamin and Abner’s men, three hundred and sixty men who died. '
  '32':
  - type: text
    content: 'Then they took up Asahel and buried him in his father’s tomb, which '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: in
  - type: text
    content: ' '
  - type: note
    content: 2 Sam. 2:14
  - type: text
    content: Bethlehem. And Joab and his men went all night, and they came to Hebron at daybreak.
  '4':
  - type: note
    content: 1 Sam. 27:2, 3; 30:1; 1 Chr. 12:1
  - type: text
    content: 'Then the men of Judah came, and there they '
  - type: note
    content: 1 Sam. 30:26; 2 Sam. 2:11; 5:5; 19:14, 41–43
  - type: text
    content: 'anointed David king over the house of Judah. And they told David, saying, '
  - type: note
    content: 1 Sam. 16:13; 2 Sam. 5:3
  - type: text
    content: '“The men of Jabesh Gilead '
  - type: text
    content: were
  - type: text
    content: ' '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: ones
  - type: text
    content: ' who buried Saul.” '
  '5':
  - type: text
    content: 'So David sent messengers to the men of Jabesh Gilead, and said to them, '
  - type: note
    content: 1 Sam. 31:11–13
  - type: text
    content: '“You '
  - type: text
    content: are
  - type: text
    content: ' blessed of the '
  - type: heading
    content: Lord
  - type: text
    content: ', for you have shown this kindness to your lord, to Saul, and have buried him. '
  '6':
  - type: text
    content: 'And now may '
  - type: note
    content: Ruth 2:20; 3:10
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' show kindness and truth to you. I also will repay you this kindness, because you have done this thing. '
  '7':
  - type: text
    content: Now therefore, let your hands be strengthened, and be valiant; for your master Saul is dead, and also the house of Judah has anointed me king over them.”
  - type: heading
    content: Ishbosheth Made King of Israel
  '8':
  - type: text
    content: 'But '
  - type: note
    content: Ex. 34:6; 2 Tim. 1:16, 18
  - type: text
    content: 'Abner the son of Ner, commander of Saul’s army, took Ishbosheth the son of Saul and brought him over to '
  - type: note
    content: 1 Sam. 14:50; 2 Sam. 3:6
  - type: text
    content: 'Mahanaim; '
  '9':
  - type: text
    content: 'and he made him king over '
  - type: note
    content: Gen. 32:2; Josh. 21:38; 2 Sam. 17:24
  - type: text
    content: 'Gilead, over the '
  - type: note
    content: Josh. 22:9
  - type: text
    content: 'Ashurites, over '
  - type: note
    content: Judg. 1:32
  - type: text
    content: 'Jezreel, over Ephraim, over Benjamin, and over all Israel. '
