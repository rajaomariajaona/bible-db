document_id: JOS.11,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Northern Conquest
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it came to pass, when Jabin king of Hazor heard '
    - type: usfm
      marker: it
      children:
      - type: text
        text: these
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: things,
    - type: text
      text: ' that he '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:3
      marker-yv: yv-n
    - type: text
      text: 'sent to Jobab king of Madon, to the king '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 19:15
      marker-yv: yv-n
    - type: text
      text: 'of Shimron, to the king of Achshaph, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua turned back at that time and took Hazor, and struck its king with the sword; for Hazor was formerly the head of all those kingdoms. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they struck all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in it with the edge of the sword, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 20:16
      marker-yv: yv-n
    - type: text
      text: 'utterly destroying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them.
    - type: text
      text: ' There was none left '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:40
      marker-yv: yv-n
    - type: text
      text: breathing. Then he burned Hazor with fire.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the cities of those kings, and all their kings, Joshua took and struck with the edge of the sword. He utterly destroyed them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:50–56; Deut. 7:2; 20:16
      marker-yv: yv-n
    - type: text
      text: 'as Moses the servant of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for
    - type: text
      text: ' the cities that stood on their mounds, Israel burned none of them, except Hazor only, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: which
    - type: text
      text: ' Joshua burned. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 20:14–18
      marker-yv: yv-n
    - type: text
      text: 'spoil of these cities and the livestock, the children of Israel took as booty for themselves; but they struck every man with the edge of the sword until they had destroyed them, and they left none breathing. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:10–17
      marker-yv: yv-n
    - type: text
      text: 'As the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses his servant, so '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 31:7, 8
      marker-yv: yv-n
    - type: text
      text: 'Moses commanded Joshua, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 1:7
      marker-yv: yv-n
    - type: text
      text: 'so Joshua did. He left nothing undone of all that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Summary of Joshua’s Conquests
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus Joshua took all this land: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 12:8
      marker-yv: yv-n
    - type: text
      text: 'the mountain country, all the South, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:40, 41
      marker-yv: yv-n
    - type: text
      text: 'all the land of Goshen, the lowland, and the Jordan plain—the mountains of Israel and its lowlands, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 12:7
      marker-yv: yv-n
    - type: text
      text: 'from Mount Halak and the ascent to Seir, even as far as Baal Gad in the Valley of Lebanon below Mount Hermon. He captured '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:24
      marker-yv: yv-n
    - type: text
      text: 'all their kings, and struck them down and killed them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua made war a long time with all those kings. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was not a city that made peace with the children of Israel, except '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 9:3–7
      marker-yv: yv-n
    - type: text
      text: 'the Hivites, the inhabitants of Gibeon. All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others
    - type: text
      text: ' they took in battle. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and to the kings who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' from the north, in the mountains, in the plain south of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 34:11
      marker-yv: yv-n
    - type: text
      text: 'Chinneroth, in the lowland, and in the heights '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 17:11; Judg. 1:27; 1 Kin. 4:11
      marker-yv: yv-n
    - type: text
      text: 'of Dor on the west, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 2:30
      marker-yv: yv-n
    - type: text
      text: 'it was of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to harden their hearts, that they should come against Israel in battle, that He might utterly destroy them, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and
    - type: text
      text: ' that they might receive no mercy, but that He might destroy them, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 20:16, 17
      marker-yv: yv-n
    - type: text
      text: 'as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had commanded Moses.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And at that time Joshua came and cut off '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 13:22, 33; Deut. 1:28; 9:2; Josh. 15:13, 14
      marker-yv: yv-n
    - type: text
      text: 'the Anakim from the mountains: from Hebron, from Debir, from Anab, from all the mountains of Judah, and from all the mountains of Israel; Joshua utterly destroyed them with their cities. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'None of the Anakim were left in the land of the children of Israel; they remained only '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 17:4
      marker-yv: yv-n
    - type: text
      text: 'in Gaza, in Gath, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 15:46; 1 Sam. 5:1; Is. 20:1
      marker-yv: yv-n
    - type: text
      text: and in Ashdod.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua took the whole land, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 33:2; Num. 34:2–15
      marker-yv: yv-n
    - type: text
      text: 'according to all that the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to Moses; and Joshua gave it as an inheritance to Israel '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 26:53; Josh. 14; 15
      marker-yv: yv-n
    - type: text
      text: 'according to their divisions by their tribes. Then the land '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 12:9, 10; 25:19; (Heb. 4:8)
      marker-yv: yv-n
    - type: text
      text: rested from war.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to the Canaanites in the east and in the west, the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 9:1
      marker-yv: yv-n
    - type: text
      text: 'Amorite, the Hittite, the Perizzite, the Jebusite in the mountains, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 7:1; Judg. 3:3, 5; 1 Kin. 9:20
      marker-yv: yv-n
    - type: text
      text: 'and the Hivite below '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 11:17; 13:5, 11
      marker-yv: yv-n
    - type: text
      text: 'Hermon '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 31:49
      marker-yv: yv-n
    - type: text
      text: 'in the land of Mizpah. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went out, they and all their armies with them, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' many people '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 22:17; 32:12; Judg. 7:12; 1 Sam. 13:5
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' the sand that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' on the seashore in multitude, with very many horses and chariots. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when all these kings had met together, they came and camped together at the waters of Merom to fight against Israel.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 10:8
      marker-yv: yv-n
    - type: text
      text: '“Do not be afraid because of them, for tomorrow about this time I will deliver all of them slain before Israel. You shall '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 8:4
      marker-yv: yv-n
    - type: text
      text: 'hamstring their horses and burn their chariots with fire.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua and all the people of war with him came against them suddenly by the waters of Merom, and they attacked them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivered them into the hand of Israel, who defeated them and chased them to Greater '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 49:13
      marker-yv: yv-n
    - type: text
      text: 'Sidon, to the Brook '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 13:6
      marker-yv: yv-n
    - type: text
      text: 'Misrephoth, and to the Valley of Mizpah eastward; they attacked them until they left none of them remaining. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua did to them as the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had told him: he hamstrung their horses and burned their chariots with fire.'
