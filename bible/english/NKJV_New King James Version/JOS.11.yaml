  '5':
  - type: text
    content: And when all these kings had met together, they came and camped together at the waters of Merom to fight against Israel.
  '6':
  - type: text
    content: 'But the '
  - type: heading
    content: Lord
  - type: text
    content: ' said to Joshua, '
  - type: note
