document_id: LEV.2,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Grain Offering
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '‘When anyone offers '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:14; 9:17; Num. 15:4
      marker-yv: yv-n
    - type: text
      text: 'a grain offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', his offering shall be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' fine flour. And he shall pour oil on it, and put '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 5:11
      marker-yv: yv-n
    - type: text
      text: 'frankincense on it. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:3; 6:16
      marker-yv: yv-n
    - type: text
      text: 'what is left of the grain offering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' Aaron’s and his sons’. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' most holy of the offerings to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made by fire.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '‘No grain offering which you bring to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' shall be made with '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 23:18; 34:25; Lev. 6:16, 17; (Matt. 16:12; Mark 8:15; Luke 12:1; 1 Cor. 5:8; Gal. 5:9)
      marker-yv: yv-n
    - type: text
      text: 'leaven, for you shall burn no leaven nor any honey in any offering to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made by fire. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 22:29; 34:22; Lev. 23:10, 11, 17, 18
      marker-yv: yv-n
    - type: text
      text: 'As for the offering of the firstfruits, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Mark 9:49, 50; Col. 4:6)
      marker-yv: yv-n
    - type: text
      text: 'you shall offer them to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but they shall not be burned on the altar for a sweet aroma. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And every offering of your grain offering you shall season with salt; you shall not allow '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 18:19; 2 Chr. 13:5
      marker-yv: yv-n
    - type: text
      text: 'the salt of the covenant of your God to be lacking from your grain offering. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ezek. 43:24
      marker-yv: yv-n
    - type: text
      text: 'With all your offerings '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 23:10, 14
      marker-yv: yv-n
    - type: text
      text: you shall offer salt.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '‘If you offer a grain offering of your firstfruits to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you shall offer for the grain offering of your firstfruits green heads of grain roasted on the fire, grain beaten from '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Kin. 4:42
      marker-yv: yv-n
    - type: text
      text: 'full heads. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:1
      marker-yv: yv-n
    - type: text
      text: 'you shall put oil on it, and lay frankincense on it. It '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a grain offering. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then the priest shall burn '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:2
      marker-yv: yv-n
    - type: text
      text: 'the memorial portion: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: part
    - type: text
      text: ' of its beaten grain and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: part
    - type: text
      text: ' of its oil, with all the frankincense, as an offering made by fire to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He shall bring it to Aaron’s sons, the priests, one of whom shall take from it his handful of fine flour and oil with all the frankincense. And the priest shall burn '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:9; 5:12; 6:15; 24:7; Acts 10:4
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as
    - type: text
      text: ' a memorial on the altar, an offering made by fire, a sweet aroma to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:9
      marker-yv: yv-n
    - type: text
      text: 'The rest of the grain offering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' Aaron’s and his '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 6:6; 10:12, 13
      marker-yv: yv-n
    - type: text
      text: 'sons’. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:37; Num. 18:9
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' most holy of the offerings to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made by fire.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '‘And if you bring as an offering a grain offering baked in the oven, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' unleavened cakes of fine flour mixed with oil, or unleavened wafers '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:2
      marker-yv: yv-n
    - type: text
      text: 'anointed with oil. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But if your offering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a grain offering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: baked
    - type: text
      text: ' in a pan, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shall
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' fine flour, unleavened, mixed with oil. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'You shall break it in pieces and pour oil on it; it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a grain offering.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '‘If your offering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' a grain offering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: baked
    - type: text
      text: ' in a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 7:9
      marker-yv: yv-n
    - type: text
      text: 'covered pan, it shall be made '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' fine flour with oil. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'You shall bring the grain offering that is made of these things to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. And when it is presented to the priest, he shall bring it to the altar. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then the priest shall take from the grain offering '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lev. 2:2, 16; 5:12; 6:15
      marker-yv: yv-n
    - type: text
      text: 'a memorial portion, and burn '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' on the altar. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: It
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' an '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 29:18
      marker-yv: yv-n
    - type: text
      text: 'offering made by fire, a sweet aroma to the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
