  - type: text
    content: dogs.”
  '27':
  - type: text
    content: And she said, “Yes, Lord, yet even the little dogs eat the crumbs which fall from their masters’ table.”
  '28':
  - type: text
    content: 'Then Jesus answered and said to her, '
  - type: text
    content: '“O woman, '
