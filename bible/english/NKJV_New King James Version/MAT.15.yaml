  '21':
  - type: note
    content: Mark 7:24–30
  - type: text
    content: 'Then Jesus went out from there and departed to the region of Tyre and Sidon. '
  '22':
  - type: text
    content: 'And behold, a woman of Canaan came from that region and cried out to Him, saying, “Have mercy on me, O Lord, '
  - type: note
    content: Matt. 1:1; 22:41, 42
  - type: text
    content: Son of David! My daughter is severely demon-possessed.”
  '23':
  - type: text
    content: But He answered her not a word.
  - type: text
    content: And His disciples came and urged Him, saying, “Send her away, for she cries out after us.”
  '24':
  - type: text
    content: 'But He answered and said, '
  - type: note
    content: Matt. 10:5, 6; (Rom. 15:8)
  - type: text
    content: “I was not sent except to the lost sheep of the house of Israel.”
  '25':
  - type: text
    content: Then she came and worshiped Him, saying, “Lord, help me!”
  '26':
  - type: text
    content: 'But He answered and said, '
  - type: text
    content: '“It is not good to take the children’s bread and throw '
  - type: text
    content: it
  - type: text
