  - type: note
    content: Gen. 6:5; 8:21; Prov. 6:14; Jer. 17:9; Mark 7:21; (Rom. 1:29–32; Gal. 5:19–21)
  - type: text
    content: For out of the heart proceed evil thoughts, murders, adulteries, fornications, thefts, false witness, blasphemies.
  - type: text
    content: ' '
  '2':
  - type: note
    content: Mark 7:5
  - type: text
    content: “Why do Your disciples transgress the tradition of the elders? For they do not wash their hands when they eat bread.”
