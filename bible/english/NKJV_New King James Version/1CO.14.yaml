  - type: text
    content: And yet, for all that, they will not hear Me,”
  - type: text
    content: says the Lord.
  '22':
  - type: text
    content: 'Therefore tongues are for a '
  - type: note
    content: Mark 16:17
  - type: text
    content: 'sign, not to those who believe but to unbelievers; but prophesying is not for unbelievers but for those who believe. '
  '23':
  - type: text
    content: 'Therefore if the whole church comes together in one place, and all speak with tongues, and there come in '
  - type: text
    content: those
  - type: text
    content: ' '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' uninformed or unbelievers, '
  - type: note
