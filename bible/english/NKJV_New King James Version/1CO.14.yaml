  '13':
  - type: text
    content: 'Therefore let him who speaks in a tongue pray that he may '
  - type: note
    content: 1 Cor. 12:10
  - type: text
    content: 'interpret. '
  '14':
  - type: text
    content: 'For if I pray in a tongue, my spirit prays, but my understanding is unfruitful. '
  '15':
  - type: text
    content: 'What is '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: conclusion
  - type: text
    content: ' then? I will pray with the spirit, and I will also pray with the understanding. '
  - type: note
    content: Eph. 5:19; Col. 3:16
  - type: text
    content: 'I will sing with the spirit, and I will also sing '
  - type: note
