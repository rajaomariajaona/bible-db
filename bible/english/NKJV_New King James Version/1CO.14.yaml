  - type: text
    content: 'will they not say that you are out of your mind? '
  '24':
  - type: text
    content: 'But if all prophesy, and an unbeliever or an uninformed person comes in, he is convinced by all, he is convicted by all. '
  '25':
  - type: text
    content: 'And thus the secrets of his heart are revealed; and so, falling down on '
  - type: text
    content: his
  - type: text
    content: ' face, he will worship God and report '
  - type: note
    content: Is. 45:14; Dan. 2:47; Zech. 8:23; Acts 4:13
  - type: text
    content: that God is truly among you.
  - type: heading
    content: Order in Church Meetings
  '26':
  - type: text
    content: 'How is it then, brethren? Whenever you come together, each of you has a psalm, '
  - type: note
    content: 1 Cor. 12:8–10; 14:6
  - type: text
    content: 'has a teaching, has a tongue, has a revelation, has an interpretation. '
  - type: note
    content: 1 Cor. 12:7; (2 Cor. 12:19)
  - type: text
    content: 'Let all things be done for edification. '
  '27':
  - type: text
    content: 'If anyone speaks in a tongue, '
  - type: text
    content: let
  - type: text
    content: ' '
  - type: text
    content: there
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' two or at the most three, '
  - type: text
    content: each
  - type: text
    content: ' in turn, and let one interpret. '
  '28':
  - type: text
    content: 'But if there is no interpreter, let him keep silent in church, and let him speak to himself and to God. '
  '29':
  - type: text
    content: 'Let two or three prophets speak, and '
  - type: note
    content: 1 Cor. 12:10
  - type: text
    content: 'let the others judge. '
  '3':
  - type: text
    content: 'But he who prophesies speaks '
  - type: note
    content: Rom. 14:19; 15:2; 2 Cor. 10:8; 12:19; Eph. 4:12, 29
  - type: text
    content: 'edification and '
  - type: note
    content: 1 Tim. 4:13; 2 Tim. 4:2; Titus 1:9; 2:15; Heb. 3:13; 10:25
  - type: text
    content: 'exhortation and comfort to men. '
  '30':
  - type: text
    content: 'But if '
  - type: text
    content: anything
  - type: text
    content: ' is revealed to another who sits by, '
  - type: note
    content: (1 Thess. 5:19, 20)
  - type: text
    content: 'let the first keep silent. '
  '31':
  - type: text
    content: 'For you can all prophesy one by one, that all may learn and all may be encouraged. '
  '32':
  - type: text
    content: 'And '
  - type: note
    content: 1 John 4:1
  - type: text
    content: 'the spirits of the prophets are subject to the prophets. '
  '33':
  - type: text
    content: 'For God is not '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: author
  - type: text
    content: ' of confusion but of peace, '
  - type: note
    content: 1 Cor. 11:16
  - type: text
    content: as in all the churches of the saints.
  '34':
  - type: note
    content: 1 Tim. 2:11; 1 Pet. 3:1
  - type: text
    content: 'Let your women keep silent in the churches, for they are not permitted to speak; but '
  - type: text
    content: they
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' to be submissive, as the '
  - type: note
    content: Gen. 3:16
  - type: text
    content: 'law also says. '
  '35':
  - type: text
    content: And if they want to learn something, let them ask their own husbands at home; for it is shameful for women to speak in church.
  '36':
  - type: text
    content: 'Or did the word of God come '
  - type: text
    content: originally
  - type: text
    content: ' from you? Or '
  - type: text
    content: was
  - type: text
    content: ' '
  - type: text
    content: it
  - type: text
    content: ' you only that it reached? '
  '37':
  - type: note
    content: 2 Cor. 10:7; (1 John 4:6)
  - type: text
    content: 'If anyone thinks himself to be a prophet or spiritual, let him acknowledge that the things which I write to you are the commandments of the Lord. '
  '38':
  - type: text
    content: But if anyone is ignorant, let him be ignorant.
  '39':
  - type: text
    content: 'Therefore, brethren, '
  - type: note
    content: 1 Cor. 12:31; 1 Thess. 5:20
  - type: text
    content: 'desire earnestly to prophesy, and do not forbid to speak with tongues. '
  '4':
  - type: text
    content: 'He who speaks in a tongue edifies himself, but he who prophesies edifies the church. '
  '40':
  - type: note
    content: 1 Cor. 14:33
  - type: text
    content: Let all things be done decently and in order.
  '5':
  - type: text
    content: 'I wish you all spoke with tongues, but even more that you prophesied; for he who prophesies '
  - type: text
    content: is
  - type: text
    content: ' greater than he who speaks with tongues, unless indeed he interprets, that the church may receive edification.'
  - type: heading
    content: Tongues Must Be Interpreted
  '6':
  - type: text
    content: 'But now, brethren, if I come to you speaking with tongues, what shall I profit you unless I speak to you either by '
  - type: note
    content: 1 Cor. 14:26; Eph. 1:17
  - type: text
    content: 'revelation, by knowledge, by prophesying, or by teaching? '
  '7':
  - type: text
    content: 'Even things without life, whether flute or harp, when they make a sound, unless they make a distinction in the sounds, how will it be known what is piped or played? '
  '8':
  - type: text
    content: 'For if the trumpet makes an uncertain sound, who will prepare for battle? '
  '9':
  - type: text
    content: 'So likewise you, unless you utter by the tongue words easy to understand, how will it be known what is spoken? For you will be speaking into the air. '
