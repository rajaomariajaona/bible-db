document_id: 1CO.14,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy and Tongues
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Pursue love, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:31; 14:39
      marker-yv: yv-n
    - type: text
      text: 'desire spiritual '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gifts,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 11:25, 29
      marker-yv: yv-n
    - type: text
      text: 'but especially that you may prophesy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'There are, it may be, so many kinds of languages in the world, and none of them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' without significance. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore, if I do not know the meaning of the language, I shall be a foreigner to him who speaks, and he who speaks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' a foreigner to me. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Even so you, since you are zealous for spiritual '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gifts, let it be
    - type: text
      text: ' for the edification of the church '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that
    - type: text
      text: ' you seek to excel.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Therefore let him who speaks in a tongue pray that he may '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:10
      marker-yv: yv-n
    - type: text
      text: 'interpret. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For if I pray in a tongue, my spirit prays, but my understanding is unfruitful. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'What is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: conclusion
    - type: text
      text: ' then? I will pray with the spirit, and I will also pray with the understanding. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eph. 5:19; Col. 3:16
      marker-yv: yv-n
    - type: text
      text: 'I will sing with the spirit, and I will also sing '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 47:7
      marker-yv: yv-n
    - type: text
      text: 'with the understanding. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Otherwise, if you bless with the spirit, how will he who occupies the place of the uninformed say “Amen” '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 27:15–26; 1 Chr. 16:36; Neh. 5:13; 8:6; Ps. 106:48; Jer. 11:5; 28:6; 1 Cor. 11:24; Rev. 5:14; 7:12
      marker-yv: yv-n
    - type: text
      text: 'at your giving of thanks, since he does not understand what you say? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For you indeed give thanks well, but the other is not edified.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I thank my God I speak with tongues more than you all; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: yet in the church I would rather speak five words with my understanding, that I may teach others also, than ten thousand words in a tongue.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tongues a Sign to Unbelievers
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For he who '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:4; 10:46
      marker-yv: yv-n
    - type: text
      text: 'speaks in a tongue does not speak to men but to God, for no one understands '
    - type: usfm
      marker: it
      children:
      - type: text
        text: him;
    - type: text
      text: ' however, in the spirit he speaks mysteries. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 131:2; (Matt. 11:25; 18:3; 19:14); Rom. 16:19; 1 Cor. 3:1; Eph. 4:14; Heb. 5:12, 13
      marker-yv: yv-n
    - type: text
      text: 'do not be children in understanding; however, in malice '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Matt. 18:3; 1 Pet. 2:2)
      marker-yv: yv-n
    - type: text
      text: be babes, but in understanding be mature.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: text
        text: John 10:34; 1 Cor. 14:34
      marker-yv: yv-n
    - type: text
      text: 'In the law it is written:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 28:11, 12
      marker-yv: yv-n
    - type: text
      text: '“With '
    - type: usfm
      marker: it
      children:
      - type: text
        text: men
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' other tongues and other lips'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will speak to this people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And yet, for all that, they will not hear Me,”
  - type: usfm
    marker: p
    children:
    - type: text
      text: says the Lord.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Therefore tongues are for a '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mark 16:17
      marker-yv: yv-n
    - type: text
      text: 'sign, not to those who believe but to unbelievers; but prophesying is not for unbelievers but for those who believe. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Therefore if the whole church comes together in one place, and all speak with tongues, and there come in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: those
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' uninformed or unbelievers, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 2:13
      marker-yv: yv-n
    - type: text
      text: 'will they not say that you are out of your mind? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But if all prophesy, and an unbeliever or an uninformed person comes in, he is convinced by all, he is convicted by all. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'And thus the secrets of his heart are revealed; and so, falling down on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his
    - type: text
      text: ' face, he will worship God and report '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 45:14; Dan. 2:47; Zech. 8:23; Acts 4:13
      marker-yv: yv-n
    - type: text
      text: that God is truly among you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Order in Church Meetings
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'How is it then, brethren? Whenever you come together, each of you has a psalm, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:8–10; 14:6
      marker-yv: yv-n
    - type: text
      text: 'has a teaching, has a tongue, has a revelation, has an interpretation. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:7; (2 Cor. 12:19)
      marker-yv: yv-n
    - type: text
      text: 'Let all things be done for edification. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'If anyone speaks in a tongue, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: let
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be
    - type: text
      text: ' two or at the most three, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each
    - type: text
      text: ' in turn, and let one interpret. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'But if there is no interpreter, let him keep silent in church, and let him speak to himself and to God. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Let two or three prophets speak, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:10
      marker-yv: yv-n
    - type: text
      text: 'let the others judge. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But he who prophesies speaks '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rom. 14:19; 15:2; 2 Cor. 10:8; 12:19; Eph. 4:12, 29
      marker-yv: yv-n
    - type: text
      text: 'edification and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 4:13; 2 Tim. 4:2; Titus 1:9; 2:15; Heb. 3:13; 10:25
      marker-yv: yv-n
    - type: text
      text: 'exhortation and comfort to men. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But if '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anything
    - type: text
      text: ' is revealed to another who sits by, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (1 Thess. 5:19, 20)
      marker-yv: yv-n
    - type: text
      text: 'let the first keep silent. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'For you can all prophesy one by one, that all may learn and all may be encouraged. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 John 4:1
      marker-yv: yv-n
    - type: text
      text: 'the spirits of the prophets are subject to the prophets. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'For God is not '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: author
    - type: text
      text: ' of confusion but of peace, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 11:16
      marker-yv: yv-n
    - type: text
      text: as in all the churches of the saints.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Tim. 2:11; 1 Pet. 3:1
      marker-yv: yv-n
    - type: text
      text: 'Let your women keep silent in the churches, for they are not permitted to speak; but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: are
    - type: text
      text: ' to be submissive, as the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gen. 3:16
      marker-yv: yv-n
    - type: text
      text: 'law also says. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: And if they want to learn something, let them ask their own husbands at home; for it is shameful for women to speak in church.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Or did the word of God come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: originally
    - type: text
      text: ' from you? Or '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it
    - type: text
      text: ' you only that it reached? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Cor. 10:7; (1 John 4:6)
      marker-yv: yv-n
    - type: text
      text: 'If anyone thinks himself to be a prophet or spiritual, let him acknowledge that the things which I write to you are the commandments of the Lord. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: But if anyone is ignorant, let him be ignorant.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Therefore, brethren, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 12:31; 1 Thess. 5:20
      marker-yv: yv-n
    - type: text
      text: 'desire earnestly to prophesy, and do not forbid to speak with tongues. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He who speaks in a tongue edifies himself, but he who prophesies edifies the church. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 14:33
      marker-yv: yv-n
    - type: text
      text: Let all things be done decently and in order.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'I wish you all spoke with tongues, but even more that you prophesied; for he who prophesies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: is
    - type: text
      text: ' greater than he who speaks with tongues, unless indeed he interprets, that the church may receive edification.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tongues Must Be Interpreted
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But now, brethren, if I come to you speaking with tongues, what shall I profit you unless I speak to you either by '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Cor. 14:26; Eph. 1:17
      marker-yv: yv-n
    - type: text
      text: 'revelation, by knowledge, by prophesying, or by teaching? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Even things without life, whether flute or harp, when they make a sound, unless they make a distinction in the sounds, how will it be known what is piped or played? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For if the trumpet makes an uncertain sound, who will prepare for battle? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'So likewise you, unless you utter by the tongue words easy to understand, how will it be known what is spoken? For you will be speaking into the air. '
