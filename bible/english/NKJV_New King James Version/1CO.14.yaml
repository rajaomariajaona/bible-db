  '16':
  - type: text
    content: 'Otherwise, if you bless with the spirit, how will he who occupies the place of the uninformed say “Amen” '
  - type: note
    content: Deut. 27:15–26; 1 Chr. 16:36; Neh. 5:13; 8:6; Ps. 106:48; Jer. 11:5; 28:6; 1 Cor. 11:24; Rev. 5:14; 7:12
  - type: text
    content: 'at your giving of thanks, since he does not understand what you say? '
  '17':
  - type: text
    content: For you indeed give thanks well, but the other is not edified.
  '18':
  - type: text
    content: 'I thank my God I speak with tongues more than you all; '
  '19':
  - type: text
    content: yet in the church I would rather speak five words with my understanding, that I may teach others also, than ten thousand words in a tongue.
  - type: heading
    content: Tongues a Sign to Unbelievers
  '2':
  - type: text
    content: 'For he who '
  - type: note
    content: Acts 2:4; 10:46
  - type: text
    content: 'speaks in a tongue does not speak to men but to God, for no one understands '
  - type: text
    content: him;
  - type: text
    content: ' however, in the spirit he speaks mysteries. '
  '20':
  - type: text
    content: 'Brethren, '
  - type: note
    content: Ps. 131:2; (Matt. 11:25; 18:3; 19:14); Rom. 16:19; 1 Cor. 3:1; Eph. 4:14; Heb. 5:12, 13
  - type: text
    content: 'do not be children in understanding; however, in malice '
  - type: note
    content: (Matt. 18:3; 1 Pet. 2:2)
  - type: text
    content: be babes, but in understanding be mature.
  '21':
  - type: note
    content: John 10:34; 1 Cor. 14:34
  - type: text
    content: 'In the law it is written:'
  - type: note
