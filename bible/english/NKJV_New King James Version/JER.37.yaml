document_id: JER.37
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zedekiah’s Vain Hope
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now King '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:17; 1 Chr. 3:15; 2 Chr. 36:10; Jer. 22:24
    marker-yv: yv-n
  - type: text
    text: 'Zedekiah the son of Josiah reigned instead of Coniah the son of Jehoiakim, whom Nebuchadnezzar king of Babylon made king in the land of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:19, 20; 2 Chr. 36:12–16; (Prov. 29:12)
    marker-yv: yv-n
  - type: text
    text: 'But neither he nor his servants nor the people of the land gave heed to the words of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' which He spoke by the prophet Jeremiah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And Zedekiah the king sent Jehucal the son of Shelemiah, and '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 21:1, 2; 29:25; 52:24
    marker-yv: yv-n
  - type: text
    text: 'Zephaniah the son of Maaseiah, the priest, to the prophet Jeremiah, saying, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Kin. 13:6; Jer. 42:2; Acts 8:24
    marker-yv: yv-n
  - type: text
    text: '“Pray now to the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God for us.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Now Jeremiah was coming and going among the people, for they had not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: yet
  - type: text
    text: ' put him in prison. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 24:7; Jer. 37:7; Ezek. 17:15
    marker-yv: yv-n
  - type: text
    text: Pharaoh’s army came up from Egypt; and when the Chaldeans who were besieging Jerusalem heard news of them, they departed from Jerusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then the word of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to the prophet Jeremiah, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Thus says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, ‘Thus you shall say to the king of Judah, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 36:6; Jer. 21:2; Ezek. 17:17
    marker-yv: yv-n
  - type: text
    text: 'who sent you to Me to inquire of Me: “Behold, Pharaoh’s army which has come up to help you will return to Egypt, to their own land. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Chr. 36:19; Jer. 34:22
    marker-yv: yv-n
  - type: text
    text: 'And the Chaldeans shall come back and fight against this city, and take it and burn it with fire.” ’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thus says the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ': ‘Do not deceive yourselves, saying, “The Chaldeans will surely depart from us,” for they will not depart. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 26:36–38; Is. 30:17; Jer. 21:4, 5
    marker-yv: yv-n
  - type: text
    text: 'For though you had defeated the whole army of the Chaldeans who fight against you, and there remained '
  - type: usfm
    marker: it
    children:
    - type: text
      text: only
  - type: text
    text: ' wounded men among them, they would rise up, every man in his tent, and burn the city with fire.’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Imprisoned
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And it happened, when the army of the Chaldeans left '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: siege
  - type: text
    text: ' of Jerusalem for fear of Pharaoh’s army, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'that Jeremiah went out of Jerusalem to go into the land of Benjamin to claim his property there among the people. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And when he was in the Gate of Benjamin, a captain of the guard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' there whose name '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was
  - type: text
    text: ' Irijah the son of Shelemiah, the son of Hananiah; and he seized Jeremiah the prophet, saying, “You are defecting to the Chaldeans!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then Jeremiah said, “False! I am not defecting to the Chaldeans.” But he did not listen to him.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Irijah seized Jeremiah and brought him to the princes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Therefore the princes were angry with Jeremiah, and they struck him '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 20:2; (Matt. 21:35)
    marker-yv: yv-n
  - type: text
    text: 'and put him in prison in the '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gen. 39:20; 2 Chr. 16:10; 18:26; Jer. 38:26; Acts 5:18
    marker-yv: yv-n
  - type: text
    text: house of Jonathan the scribe. For they had made that the prison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When Jeremiah entered '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 38:6
    marker-yv: yv-n
  - type: text
    text: 'the dungeon and the cells, and Jeremiah had remained there many days, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'then Zedekiah the king sent and took him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: out.
  - type: text
    text: ' The king asked him secretly in his house, and said, “Is there '
  - type: usfm
    marker: it
    children:
    - type: text
      text: any
  - type: text
    text: ' word from the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And Jeremiah said, “There is.” Then he said, “You shall be '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:4–7; Jer. 21:7; Ezek. 12:12, 13; 17:19–21
    marker-yv: yv-n
  - type: text
    text: delivered into the hand of the king of Babylon!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moreover Jeremiah said to King Zedekiah, “What offense have I committed against you, against your servants, or against this people, that you have put me in prison? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Where now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' your prophets who prophesied to you, saying, ‘The king of Babylon will not come against you or against this land’? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Therefore please hear now, O my lord the king. Please, let my petition be accepted before you, and do not make me return to the house of Jonathan the scribe, lest I die there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then Zedekiah the king commanded that they should commit Jeremiah '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jer. 32:2; 38:13, 28
    marker-yv: yv-n
  - type: text
    text: 'to the court of the prison, and that they should give him daily a piece of bread from the bakers’ street, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Kin. 25:3; Jer. 38:9; 52:6
    marker-yv: yv-n
  - type: text
    text: until all the bread in the city was gone. Thus Jeremiah remained in the court of the prison.
