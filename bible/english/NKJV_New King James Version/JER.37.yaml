document_id: JER.37,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Zedekiah’s Vain Hope
  - type: text
    content: 'Now King '
  - type: note
    content: 2 Kin. 24:17; 1 Chr. 3:15; 2 Chr. 36:10; Jer. 22:24
  - type: text
    content: 'Zedekiah the son of Josiah reigned instead of Coniah the son of Jehoiakim, whom Nebuchadnezzar king of Babylon made king in the land of Judah. '
  '10':
  - type: note
    content: Lev. 26:36–38; Is. 30:17; Jer. 21:4, 5
  - type: text
    content: 'For though you had defeated the whole army of the Chaldeans who fight against you, and there remained '
  - type: text
    content: only
  - type: text
    content: ' wounded men among them, they would rise up, every man in his tent, and burn the city with fire.’ ”'
  - type: heading
    content: Jeremiah Imprisoned
  '11':
  - type: text
    content: 'And it happened, when the army of the Chaldeans left '
  - type: text
    content: the
  - type: text
    content: ' '
  - type: text
    content: siege
  - type: text
    content: ' of Jerusalem for fear of Pharaoh’s army, '
  '12':
  - type: text
    content: 'that Jeremiah went out of Jerusalem to go into the land of Benjamin to claim his property there among the people. '
  '13':
  - type: text
    content: 'And when he was in the Gate of Benjamin, a captain of the guard '
  - type: text
    content: was
  - type: text
    content: ' there whose name '
  - type: text
    content: was
  - type: text
    content: ' Irijah the son of Shelemiah, the son of Hananiah; and he seized Jeremiah the prophet, saying, “You are defecting to the Chaldeans!”'
  '14':
  - type: text
    content: Then Jeremiah said, “False! I am not defecting to the Chaldeans.” But he did not listen to him.
  - type: text
    content: 'So Irijah seized Jeremiah and brought him to the princes. '
  '15':
  - type: text
    content: 'Therefore the princes were angry with Jeremiah, and they struck him '
  - type: note
    content: Jer. 20:2; (Matt. 21:35)
  - type: text
    content: 'and put him in prison in the '
  - type: note
    content: Gen. 39:20; 2 Chr. 16:10; 18:26; Jer. 38:26; Acts 5:18
  - type: text
    content: house of Jonathan the scribe. For they had made that the prison.
  '16':
  - type: text
    content: 'When Jeremiah entered '
  - type: note
    content: Jer. 38:6
  - type: text
    content: 'the dungeon and the cells, and Jeremiah had remained there many days, '
  '17':
  - type: text
    content: 'then Zedekiah the king sent and took him '
  - type: text
    content: out.
  - type: text
    content: ' The king asked him secretly in his house, and said, “Is there '
  - type: text
    content: any
  - type: text
    content: ' word from the '
  - type: heading
    content: Lord
  - type: text
    content: ?”
  - type: text
    content: 'And Jeremiah said, “There is.” Then he said, “You shall be '
  - type: note
    content: 2 Kin. 25:4–7; Jer. 21:7; Ezek. 12:12, 13; 17:19–21
  - type: text
    content: delivered into the hand of the king of Babylon!”
  '18':
  - type: text
    content: 'Moreover Jeremiah said to King Zedekiah, “What offense have I committed against you, against your servants, or against this people, that you have put me in prison? '
  '19':
  - type: text
    content: 'Where now '
  - type: text
    content: are
  - type: text
    content: ' your prophets who prophesied to you, saying, ‘The king of Babylon will not come against you or against this land’? '
  '2':
  - type: note
    content: 2 Kin. 24:19, 20; 2 Chr. 36:12–16; (Prov. 29:12)
  - type: text
    content: 'But neither he nor his servants nor the people of the land gave heed to the words of the '
  - type: heading
    content: Lord
  - type: text
    content: ' which He spoke by the prophet Jeremiah.'
  '20':
  - type: text
    content: Therefore please hear now, O my lord the king. Please, let my petition be accepted before you, and do not make me return to the house of Jonathan the scribe, lest I die there.”
  '21':
  - type: text
    content: 'Then Zedekiah the king commanded that they should commit Jeremiah '
  - type: note
    content: Jer. 32:2; 38:13, 28
  - type: text
    content: 'to the court of the prison, and that they should give him daily a piece of bread from the bakers’ street, '
  - type: note
    content: 2 Kin. 25:3; Jer. 38:9; 52:6
  - type: text
    content: until all the bread in the city was gone. Thus Jeremiah remained in the court of the prison.
  '3':
  - type: text
    content: 'And Zedekiah the king sent Jehucal the son of Shelemiah, and '
  - type: note
    content: Jer. 21:1, 2; 29:25; 52:24
  - type: text
    content: 'Zephaniah the son of Maaseiah, the priest, to the prophet Jeremiah, saying, '
  - type: note
    content: 1 Kin. 13:6; Jer. 42:2; Acts 8:24
  - type: text
    content: '“Pray now to the '
  - type: heading
    content: Lord
  - type: text
    content: ' our God for us.” '
  '4':
  - type: text
    content: 'Now Jeremiah was coming and going among the people, for they had not '
  - type: text
    content: yet
  - type: text
    content: ' put him in prison. '
  '5':
  - type: text
    content: 'Then '
  - type: note
    content: 2 Kin. 24:7; Jer. 37:7; Ezek. 17:15
  - type: text
    content: Pharaoh’s army came up from Egypt; and when the Chaldeans who were besieging Jerusalem heard news of them, they departed from Jerusalem.
  '6':
  - type: text
    content: 'Then the word of the '
  - type: heading
    content: Lord
  - type: text
    content: ' came to the prophet Jeremiah, saying, '
  '7':
  - type: text
    content: '“Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ', the God of Israel, ‘Thus you shall say to the king of Judah, '
  - type: note
    content: Is. 36:6; Jer. 21:2; Ezek. 17:17
  - type: text
    content: 'who sent you to Me to inquire of Me: “Behold, Pharaoh’s army which has come up to help you will return to Egypt, to their own land. '
  '8':
  - type: note
    content: 2 Chr. 36:19; Jer. 34:22
  - type: text
    content: 'And the Chaldeans shall come back and fight against this city, and take it and burn it with fire.” ’ '
  '9':
  - type: text
    content: 'Thus says the '
  - type: heading
    content: Lord
  - type: text
    content: ': ‘Do not deceive yourselves, saying, “The Chaldeans will surely depart from us,” for they will not depart. '
