  - type: heading
    content: Philistia Destroyed
  '28':
  - type: text
    content: 'This is the burden which came in the year that '
  - type: note
    content: 2 Kin. 16:20; 2 Chr. 28:27
  - type: text
    content: King Ahaz died.
  '29':
  - type: text
    content: “Do not rejoice, all you of Philistia,
  - type: note
    content: 2 Chr. 26:6
