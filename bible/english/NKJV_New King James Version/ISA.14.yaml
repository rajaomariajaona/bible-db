  - type: text
    content: the staff of the wicked,
  - type: text
    content: The scepter of the rulers;
  '6':
  - type: text
    content: He who struck the people in wrath with a continual stroke,
  - type: text
    content: He who ruled the nations in anger,
  - type: text
    content: 'Is persecuted '
  - type: text
    content: and
  - type: text
    content: ' no one hinders.'
  '7':
  - type: text
