  - type: text
    content: mount of the congregation
  - type: note
    content: Ps. 48:2
  - type: text
    content: On the farthest sides of the north;
  '14':
  - type: text
    content: I will ascend above the heights of the clouds,
  - type: note
    content: Is. 47:8; 2 Thess. 2:4
  - type: text
    content: I will be like the Most High.’
  '15':
  - type: text
    content: 'Yet you '
  - type: note
    content: Ezek. 28:8; Matt. 11:23; Luke 10:15
  - type: text
    content: shall be brought down to Sheol,
  - type: text
    content: To the lowest depths of the Pit.
  '16':
  - type: text
    content: “Those who see you will gaze at you,
  - type: text
    content: And
  - type: text
    content: ' consider you, '
  - type: text
    content: 'saying:'
  - type: text
    content: ‘
  - type: text
    content: Is
  - type: text
    content: ' this the man who made the earth tremble,'
  - type: text
    content: Who shook kingdoms,
  '17':
  - type: text
    content: Who made the world as a wilderness
  - type: text
    content: And destroyed its cities,
  - type: text
    content: Who
  - type: text
    content: ' did not open the house of his prisoners?’'
  '18':
  - type: text
    content: “All the kings of the nations,
  - type: text
    content: All of them, sleep in glory,
  - type: text
    content: Everyone in his own house;
  '19':
  - type: text
    content: But you are cast out of your grave
  - type: text
    content: Like an abominable branch,
  - type: text
    content: Like
  - type: text
    content: ' the garment of those who are slain,'
  - type: text
    content: Thrust through with a sword,
  - type: text
    content: Who go down to the stones of the pit,
  - type: text
    content: Like a corpse trodden underfoot.
  '2':
  - type: text
    content: 'Then people will take them '
  - type: note
    content: Is. 49:22; 60:9; 66:20
  - type: text
    content: 'and bring them to their place, and the house of Israel will possess them for servants and maids in the land of the '
  - type: heading
    content: Lord
  - type: text
    content: '; they will take them captive whose captives they were, '
  - type: note
    content: Is. 60:14
  - type: text
    content: and rule over their oppressors.
  - type: heading
    content: Fall of the King of Babylon
  '20':
  - type: text
    content: You will not be joined with them in burial,
  - type: text
    content: Because you have destroyed your land
  - type: text
    content: And
  - type: text
    content: ' slain your people.'
  - type: note
    content: Job 18:19; Ps. 21:10; 109:13; Is. 1:4; 31:2
  - type: text
    content: The brood of evildoers shall never be named.
  '21':
  - type: text
    content: Prepare slaughter for his children
  - type: note
    content: Ex. 20:5; Lev. 26:39; Is. 13:16; Matt. 23:35
  - type: text
    content: Because of the iniquity of their fathers,
  - type: text
    content: Lest they rise up and possess the land,
  - type: text
    content: And fill the face of the world with cities.”
  - type: heading
    content: Babylon Destroyed
  '22':
  - type: text
    content: '“For I will rise up against them,” says the '
  - type: heading
    content: Lord
  - type: text
    content: ' of hosts,'
  - type: text
