    content: 2 Kin. 18:8
  - type: text
    content: 'And its offspring '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' a fiery flying serpent.'
  '3':
  - type: text
    content: 'It shall come to pass in the day the '
  - type: heading
    content: Lord
  - type: text
    content: ' gives you rest from your sorrow, and from your fear and the hard bondage in which you were made to serve, '
  '30':
  - type: text
    content: The firstborn of the poor will feed,
  - type: text
    content: And the needy will lie down in safety;
  - type: text
    content: I will kill your roots with famine,
  - type: text
    content: And it will slay your remnant.
  '31':
  - type: text
    content: Wail, O gate! Cry, O city!
  - type: text
    content: 'All you of Philistia '
  - type: text
    content: are
  - type: text
    content: ' dissolved;'
  - type: text
    content: For smoke will come from the north,
  - type: text
    content: 'And no one '
  - type: text
    content: will
  - type: text
    content: ' '
  - type: text
    content: be
  - type: text
    content: ' alone in his appointed times.”'
