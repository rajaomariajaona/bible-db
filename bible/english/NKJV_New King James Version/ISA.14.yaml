  '8':
  - type: note
    content: Is. 55:12; Ezek. 31:16
  - type: text
    content: Indeed the cypress trees rejoice over you,
  - type: text
    content: And
  - type: text
    content: ' the cedars of Lebanon,'
  - type: text
    content: Saying,
  - type: text
    content: ' ‘Since you were cut down,'
  - type: text
    content: No woodsman has come up against us.’
  '9':
  - type: text
    content: “Hell
  - type: note
    content: Ezek. 32:21
  - type: text
    content: ' from beneath is excited about you,'
  - type: text
    content: 'To meet '
  - type: text
    content: you
  - type: text
    content: ' at your coming;'
  - type: text
    content: It stirs up the dead for you,
  - type: text
    content: All the chief ones of the earth;
  - type: text
