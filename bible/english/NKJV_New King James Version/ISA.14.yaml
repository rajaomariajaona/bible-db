  - type: text
    content: 'will still choose Israel, and settle them in their own land. '
  - type: note
    content: Is. 60:4, 5, 10
  - type: text
    content: 'The strangers will be joined with them, and they will cling to the house of Jacob. '
  '10':
  - type: text
    content: 'They all shall '
  - type: note
    content: Ezek. 32:21
  - type: text
    content: 'speak and say to you:'
  - type: text
    content: ‘Have you also become as weak as we?
  - type: text
    content: Have you become like us?
  '11':
  - type: text
    content: Your pomp is brought down to Sheol,
  - type: text
    content: And
  - type: text
    content: ' the sound of your stringed instruments;'
  - type: text
    content: The maggot is spread under you,
  - type: text
    content: And worms cover you.’
  - type: heading
    content: The Fall of Lucifer
  '12':
  - type: text
    content: “How
  - type: note
    content: Is. 34:4; Luke 10:18; (Rev. 12:7–9)
  - type: text
    content: ' you are fallen from heaven,'
  - type: text
    content: O Lucifer, son of the morning!
  - type: text
    content: How
  - type: text
    content: ' you are cut down to the ground,'
  - type: text
    content: You who weakened the nations!
  '13':
  - type: text
    content: 'For you have said in your heart:'
  - type: note
    content: Ezek. 28:2; Matt. 11:23
  - type: text
    content: ‘I will ascend into heaven,
  - type: note
    content: Dan. 8:10; 2 Thess. 2:4
  - type: text
