  '1':
  - type: heading
    content: Mercy on Jacob
  - type: text
    content: 'For the '
  - type: heading
    content: Lord
  - type: text
    content: ' '
  - type: note
    content: Ps. 102:13; Is. 49:13, 15; 54:7, 8
  - type: text
    content: 'will have mercy on Jacob, and '
  - type: note
