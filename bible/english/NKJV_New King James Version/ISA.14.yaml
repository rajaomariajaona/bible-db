  - type: text
    content: What will they answer the messengers of the nation?
  - type: text
    content: 'That '
  - type: note
    content: Ps. 87:1, 5
  - type: text
    content: 'the '
  - type: heading
    content: Lord
  - type: text
    content: ' has founded Zion,'
  - type: text
    content: 'And '
  - type: note
    content: Zech. 11:11
  - type: text
    content: the poor of His people shall take refuge in it.
  '4':
  - type: text
    content: 'that you '
  - type: note
    content: Is. 13:19; Hab. 2:6
  - type: text
    content: 'will take up this proverb against the king of Babylon, and say:'
  - type: text
