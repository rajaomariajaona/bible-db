document_id: 1CH.20,114
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rabbah Is Conquered
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: It
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 11:1
      marker-yv: yv-n
    - type: text
      text: ' happened in the spring of the year, at the time kings go out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: battle,
    - type: text
      text: ' that Joab led out the armed forces and ravaged the country of the people of Ammon, and came and besieged Rabbah. But '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 11:2—12:25
      marker-yv: yv-n
    - type: text
      text: 'David stayed at Jerusalem. And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:26
      marker-yv: yv-n
    - type: text
      text: 'Joab defeated Rabbah and overthrew it. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then David '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 12:30, 31
      marker-yv: yv-n
    - type: text
      text: 'took their king’s crown from his head, and found it to weigh a talent of gold, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: there
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' precious stones in it. And it was set on David’s head. Also he brought out the spoil of the city in great abundance. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And he brought out the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' in it, and put '
    - type: usfm
      marker: it
      children:
      - type: text
        text: them
    - type: text
      text: ' to work with saws, with iron picks, and with axes. So David did to all the cities of the people of Ammon. Then David and all the people returned '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' Jerusalem.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Philistine Giants Destroyed
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now it happened afterward '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Sam. 21:18
      marker-yv: yv-n
    - type: text
      text: 'that war broke out at Gezer with the Philistines, at which time '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 11:29
      marker-yv: yv-n
    - type: text
      text: 'Sibbechai the Hushathite killed Sippai, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one
    - type: text
      text: ' of the sons of the giant. And they were subdued.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Again there was war with the Philistines, and Elhanan the son of Jair killed Lahmi the brother of Goliath the Gittite, the shaft of whose spear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' like a weaver’s '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 17:7; 1 Chr. 11:23
      marker-yv: yv-n
    - type: text
      text: beam.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Yet again '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Sam. 5:8; 2 Sam. 21:20
      marker-yv: yv-n
    - type: text
      text: 'there was war at Gath, where there was a man of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: great
    - type: text
      text: ' stature, with twenty-four fingers and toes, six '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hand
    - type: text
      text: ' and six '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: each
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: foot;
    - type: text
      text: ' and he also was born to the giant. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: So when he defied Israel, Jonathan the son of Shimea, David’s brother, killed him.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: These were born to the giant in Gath, and they fell by the hand of David and by the hand of his servants.
