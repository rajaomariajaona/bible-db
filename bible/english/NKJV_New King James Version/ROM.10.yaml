document_id: ROM.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Needs the Gospel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Brethren, my heart’s desire and prayer to God for Israel is that they may be saved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For I bear them witness '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 21:20; Gal. 1:14
    marker-yv: yv-n
  - type: text
    text: 'that they have a zeal for God, but not according to knowledge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For they being ignorant of '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Rom. 1:17)
    marker-yv: yv-n
  - type: text
    text: 'God’s righteousness, and seeking to establish their own '
  - type: usfm
    marker: x
    children:
    - type: text
      text: (Phil. 3:9)
    marker-yv: yv-n
  - type: text
    text: 'righteousness, have not submitted to the righteousness of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 5:17; (Rom. 7:1–4; Gal. 3:24; 4:5)
    marker-yv: yv-n
  - type: text
    text: 'Christ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' the end of the law for righteousness to everyone who believes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For Moses writes about the righteousness which is of the law, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lev. 18:5; Neh. 9:29; Ezek. 20:11, 13, 21; Rom. 7:10; Gal. 3:12
    marker-yv: yv-n
  - type: text
    text: '“The man who does those things shall live by them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But the righteousness of faith speaks in this way, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 30:12–14
    marker-yv: yv-n
  - type: text
    text: '“Do not say in your heart, ‘Who will ascend into heaven?’ ” (that is, to bring Christ down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: above
  - type: text
    text: ') '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'or, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 30:13
    marker-yv: yv-n
  - type: text
    text: '“ ‘Who will descend into the abyss?’ ” (that is, to bring Christ up from the dead). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But what does it say? '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 30:14
    marker-yv: yv-n
  - type: text
    text: '“The word is near you, in your mouth and in your heart” (that is, the word of faith which we preach): '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'that '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Matt. 10:32; Luke 12:8; Acts 8:37; Rom. 14:9; (1 Cor. 12:3); Phil. 2:11
    marker-yv: yv-n
  - type: text
    text: 'if you confess with your mouth the Lord Jesus and believe in your heart that God has raised Him from the dead, you will be saved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For with the heart one believes unto righteousness, and with the mouth confession is made unto salvation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the Scripture says, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 28:16; Jer. 17:7; Rom. 9:33
    marker-yv: yv-n
  - type: text
    text: '“Whoever believes on Him will not be put to shame.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 15:9; Rom. 3:22, 29; Gal. 3:28
    marker-yv: yv-n
  - type: text
    text: 'there is no distinction between Jew and Greek, for '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 10:36; 1 Tim. 2:5
    marker-yv: yv-n
  - type: text
    text: 'the same Lord over all '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eph. 1:7
    marker-yv: yv-n
  - type: text
    text: 'is rich to all who call upon Him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Joel 2:32; Acts 2:21
    marker-yv: yv-n
  - type: text
    text: '“whoever calls '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 9:14
    marker-yv: yv-n
  - type: text
    text: 'on the name of the '
  - type: usfm
    marker: sc
    children:
    - type: text
      text: Lord
  - type: text
    text: ' shall be saved.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Rejects the Gospel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'How then shall they call on Him in whom they have not believed? And how shall they believe in Him of whom they have not heard? And how shall they hear '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Acts 8:31; Titus 1:3
    marker-yv: yv-n
  - type: text
    text: 'without a preacher? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And how shall they preach unless they are sent? As it is written:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 52:7; Nah. 1:15
    marker-yv: yv-n
  - type: text
    text: “How beautiful are the feet of those who preach the gospel of peace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who bring glad tidings of good things!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But they have not all obeyed the gospel. For Isaiah says, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 53:1; John 12:38
    marker-yv: yv-n
  - type: text
    text: “
  - type: usfm
    marker: sc
    children:
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Lord
  - type: text
    text: ', who has believed our report?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So then faith '
  - type: usfm
    marker: it
    children:
    - type: text
      text: comes
  - type: text
    text: ' by hearing, and hearing by the word of God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But I say, have they not heard? Yes indeed:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps. 19:4; Matt. 24:14; Mark 16:15; Rom. 1:8; Col. 1:6, 23; 1 Thess. 1:8
    marker-yv: yv-n
  - type: text
    text: “Their sound has gone out to all the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: And their words to the ends of the world.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But I say, did Israel not know? First Moses says:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Deut. 32:21; Rom. 11:11
    marker-yv: yv-n
  - type: text
    text: '“I will provoke you to jealousy by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: those
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are
  - type: text
    text: ' not a nation,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I will move you to anger by a '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Titus 3:3
    marker-yv: yv-n
  - type: text
    text: foolish nation.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But Isaiah is very bold and says:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 65:1; Rom. 9:30
    marker-yv: yv-n
  - type: text
    text: “I was found by those who did not seek Me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was made manifest to those who did not ask for Me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But to Israel he says:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Is. 65:2
    marker-yv: yv-n
  - type: text
    text: “All day long I have stretched out My hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: To a disobedient and contrary people.”
