document_id: ROM.10,114
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Needs the Gospel
  - type: text
    content: 'Brethren, my heart’s desire and prayer to God for Israel is that they may be saved. '
  '10':
  - type: text
    content: 'For with the heart one believes unto righteousness, and with the mouth confession is made unto salvation. '
  '11':
  - type: text
    content: 'For the Scripture says, '
  - type: note
    content: Is. 28:16; Jer. 17:7; Rom. 9:33
  - type: text
    content: '“Whoever believes on Him will not be put to shame.” '
  '12':
  - type: text
    content: 'For '
  - type: note
    content: Acts 15:9; Rom. 3:22, 29; Gal. 3:28
  - type: text
    content: 'there is no distinction between Jew and Greek, for '
  - type: note
    content: Acts 10:36; 1 Tim. 2:5
  - type: text
    content: 'the same Lord over all '
  - type: note
    content: Eph. 1:7
  - type: text
    content: 'is rich to all who call upon Him. '
  '13':
  - type: text
    content: 'For '
  - type: note
    content: Joel 2:32; Acts 2:21
  - type: text
    content: '“whoever calls '
  - type: note
    content: Acts 9:14
  - type: text
    content: 'on the name of the '
  - type: heading
    content: Lord
  - type: text
    content: ' shall be saved.”'
  - type: heading
    content: Israel Rejects the Gospel
  '14':
  - type: text
    content: 'How then shall they call on Him in whom they have not believed? And how shall they believe in Him of whom they have not heard? And how shall they hear '
  - type: note
    content: Acts 8:31; Titus 1:3
  - type: text
    content: 'without a preacher? '
  '15':
  - type: text
    content: 'And how shall they preach unless they are sent? As it is written:'
  - type: note
    content: Is. 52:7; Nah. 1:15
  - type: text
    content: “How beautiful are the feet of those who preach the gospel of peace,
  - type: text
    content: Who bring glad tidings of good things!”
  '16':
  - type: text
    content: 'But they have not all obeyed the gospel. For Isaiah says, '
  - type: note
    content: Is. 53:1; John 12:38
  - type: text
    content: “
  - type: heading
    content: Lord
  - type: text
    content: ', who has believed our report?” '
  '17':
  - type: text
    content: 'So then faith '
  - type: text
    content: comes
  - type: text
    content: ' by hearing, and hearing by the word of God.'
  '18':
  - type: text
    content: 'But I say, have they not heard? Yes indeed:'
  - type: note
    content: Ps. 19:4; Matt. 24:14; Mark 16:15; Rom. 1:8; Col. 1:6, 23; 1 Thess. 1:8
  - type: text
    content: “Their sound has gone out to all the earth,
  - type: text
    content: And their words to the ends of the world.”
  '19':
  - type: text
    content: 'But I say, did Israel not know? First Moses says:'
  - type: note
    content: Deut. 32:21; Rom. 11:11
  - type: text
    content: '“I will provoke you to jealousy by '
  - type: text
    content: those
  - type: text
    content: ' '
  - type: text
    content: who
  - type: text
    content: ' '
  - type: text
    content: are
  - type: text
    content: ' not a nation,'
  - type: text
    content: 'I will move you to anger by a '
  - type: note
    content: Titus 3:3
  - type: text
    content: foolish nation.”
  '2':
  - type: text
    content: 'For I bear them witness '
  - type: note
    content: Acts 21:20; Gal. 1:14
  - type: text
    content: 'that they have a zeal for God, but not according to knowledge. '
  '20':
  - type: text
    content: 'But Isaiah is very bold and says:'
  - type: note
    content: Is. 65:1; Rom. 9:30
  - type: text
    content: “I was found by those who did not seek Me;
  - type: text
    content: I was made manifest to those who did not ask for Me.”
  '21':
  - type: text
    content: 'But to Israel he says:'
  - type: note
    content: Is. 65:2
  - type: text
    content: “All day long I have stretched out My hands
  - type: text
    content: To a disobedient and contrary people.”
  '3':
  - type: text
    content: 'For they being ignorant of '
  - type: note
    content: (Rom. 1:17)
  - type: text
    content: 'God’s righteousness, and seeking to establish their own '
  - type: note
    content: (Phil. 3:9)
  - type: text
    content: 'righteousness, have not submitted to the righteousness of God. '
  '4':
  - type: text
    content: 'For '
  - type: note
    content: Matt. 5:17; (Rom. 7:1–4; Gal. 3:24; 4:5)
  - type: text
    content: 'Christ '
  - type: text
    content: is
  - type: text
    content: ' the end of the law for righteousness to everyone who believes.'
  '5':
  - type: text
    content: 'For Moses writes about the righteousness which is of the law, '
  - type: note
    content: Lev. 18:5; Neh. 9:29; Ezek. 20:11, 13, 21; Rom. 7:10; Gal. 3:12
  - type: text
    content: '“The man who does those things shall live by them.” '
  '6':
  - type: text
    content: 'But the righteousness of faith speaks in this way, '
  - type: note
    content: Deut. 30:12–14
  - type: text
    content: '“Do not say in your heart, ‘Who will ascend into heaven?’ ” (that is, to bring Christ down '
  - type: text
    content: from
  - type: text
    content: ' '
  - type: text
    content: above
  - type: text
    content: ') '
  '7':
  - type: text
    content: 'or, '
  - type: note
    content: Deut. 30:13
  - type: text
    content: '“ ‘Who will descend into the abyss?’ ” (that is, to bring Christ up from the dead). '
  '8':
  - type: text
    content: 'But what does it say? '
  - type: note
    content: Deut. 30:14
  - type: text
    content: '“The word is near you, in your mouth and in your heart” (that is, the word of faith which we preach): '
  '9':
  - type: text
    content: 'that '
  - type: note
    content: Matt. 10:32; Luke 12:8; Acts 8:37; Rom. 14:9; (1 Cor. 12:3); Phil. 2:11
  - type: text
    content: 'if you confess with your mouth the Lord Jesus and believe in your heart that God has raised Him from the dead, you will be saved. '
