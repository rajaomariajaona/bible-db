    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now Israel remained in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 33:49; Josh. 2:1
      marker-yv: yv-n
    - type: text
      text: 'Acacia Grove, and the '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Rev. 2:14
      marker-yv: yv-n
    - type: text
      text: 'people began to commit harlotry with the women of Moab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then the '
    - type: usfm
