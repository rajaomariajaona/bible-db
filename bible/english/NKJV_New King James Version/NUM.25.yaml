  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 31:1–3
      marker-yv: yv-n
    - type: text
      text: '“Harass the Midianites, and attack them; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'for they harassed you with their '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 31:16; Rev. 2:14
      marker-yv: yv-n
    - type: text
      text: schemes by which they seduced you in the matter of Peor and in the matter of Cozbi, the daughter of a leader of Midian, their sister, who was killed in the day of the plague because of Peor.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Josh. 22:17; Hos. 9:10
      marker-yv: yv-n
    - type: text
      text: 'They invited the people to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 34:15; Deut. 32:38; 1 Cor. 10:20
      marker-yv: yv-n
    - type: text
      text: 'the sacrifices of their gods, and the people ate and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 20:5
      marker-yv: yv-n
    - type: text
      text: 'bowed down to their gods. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So Israel was joined to Baal of Peor, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:28, 29
      marker-yv: yv-n
    - type: text
      text: 'the anger of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was aroused against Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:3
      marker-yv: yv-n
    - type: text
      text: '“Take all the leaders of the people and hang the offenders before the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ', out in the sun, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 25:11; Deut. 13:17
      marker-yv: yv-n
    - type: text
      text: 'that the fierce anger of the '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: Lord
    - type: text
      text: ' may turn away from Israel.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So Moses said to '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 18:21
      marker-yv: yv-n
    - type: text
      text: 'the judges of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 13:6, 9
      marker-yv: yv-n
    - type: text
      text: “Every one of you kill his men who were joined to Baal of Peor.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And indeed, one of the children of Israel came and presented to his brethren a Midianite woman in the sight of Moses and in the sight of all the congregation of the children of Israel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Joel 2:17
      marker-yv: yv-n
    - type: text
      text: 'who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: were
    - type: text
      text: ' weeping at the door of the tabernacle of meeting. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Now '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:30
      marker-yv: yv-n
    - type: text
      text: 'when Phinehas '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 6:25
      marker-yv: yv-n
    - type: text
      text: 'the son of Eleazar, the son of Aaron the priest, saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: it,
    - type: text
      text: ' he rose from among the congregation and took a javelin in his hand; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and he went after the man of Israel into the tent and thrust both of them through, the man of Israel, and the woman through her body. So '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:30
      marker-yv: yv-n
    - type: text
      text: 'the plague was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 16:46–48
      marker-yv: yv-n
    - type: text
      text: 'stopped among the children of Israel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Deut. 4:3
      marker-yv: yv-n
    - type: text
      text: those who died in the plague were twenty-four thousand.
