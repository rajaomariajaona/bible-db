      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps. 106:30
      marker-yv: yv-n
    - type: text
      text: '“Phinehas the son of Eleazar, the son of Aaron the priest, has turned back My wrath from the children of Israel, because he was zealous with My zeal among them, so that I did not consume the children of Israel in '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Ex. 20:5); Deut. 32:16, 21; 1 Kin. 14:22; Ps. 78:58; Ezek. 16:38
      marker-yv: yv-n
    - type: text
      text: 'My zeal. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore say, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Mal. 2:4, 5; 3:1)
      marker-yv: yv-n
    - type: text
      text: '‘Behold, I give to him '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Is. 54:10; Ezek. 34:25; 37:26; Mal. 2:5
      marker-yv: yv-n
    - type: text
      text: 'My covenant of peace; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and it shall be to him and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Chr. 6:4–15
      marker-yv: yv-n
    - type: text
      text: 'his descendants after him a covenant of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ex. 40:15
      marker-yv: yv-n
    - type: text
      text: 'an everlasting priesthood, because he was '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Acts 22:3; Rom. 10:2
      marker-yv: yv-n
    - type: text
      text: 'zealous for his God, and '
    - type: usfm
      marker: x
      children:
      - type: text
        text: (Heb. 2:17)
      marker-yv: yv-n
    - type: text
      text: made atonement for the children of Israel.’ ”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Now the name of the Israelite who was killed, who was killed with the Midianite woman, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Zimri the son of Salu, a leader of a father’s house among the Simeonites. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And the name of the Midianite woman who was killed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' Cozbi the daughter of '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Num. 31:8; Josh. 13:21
      marker-yv: yv-n
    - type: text
      text: 'Zur; he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was
    - type: text
      text: ' head of the people of a father’s house in Midian.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
