  - type: heading
    content: Prayer for Safekeeping from Wickedness
  - type: text
    content: A Psalm of David.
  - type: heading
    content: Lord
  - type: text
    content: ', I cry out to You;'
  - type: text
    content: Make haste to me!
  - type: text
